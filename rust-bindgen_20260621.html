<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Vtable::codegen` indexes `args[0]` to overwrite the implicit `this` pointer of a virtual method. `args` comes from `utils::fnsig_arguments(ctx, signature)` on the method's parsed signature. If a (malformed or unusual) virtual method signature yields zero arguments, this indexes out of bounds and panics. The code relies on the invariant that every non-static method signature has a leading `this` argument, but nothing in this function verifies it.","fix":"Guard with `if args.is_empty() { return None; }` (skip the method) or assert with a descriptive message before indexing `args[0]`.","locations":[{"ref":"bindgen/codegen/mod.rs:1289-1296","code":" 1289 |                     let mut args = utils::fnsig_arguments(ctx, signature);\n 1290 |                     let ret = utils::fnsig_return_ty(ctx, signature);\n 1291 | \n 1292 |                     args[0] = if m.is_const() {\n 1293 |                         quote! { this: *const #class_ident }\n 1294 |                     } else {\n 1295 |                         quote! { this: *mut #class_ident }\n 1296 |                     };","lines":8,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L1289-L1296"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Method::codegen_method` writes `args[0] = ...` for non-static, non-constructor methods (and `args.remove(0)` for constructors) without first checking that `args` is non-empty. While there is an `assert!(!exprs.is_empty())` for the `exprs` vector in the non-static branch, the `args` vector indexing at line 3161 and the `args.remove(0)` at 3174 are unguarded. A method signature with no parameters parsed would panic.","fix":"Add an explicit emptiness check/assert on `args` with a clear message before indexing/removing, mirroring the `exprs` assert, or bail out of method generation when the self argument is missing.","locations":[{"ref":"bindgen/codegen/mod.rs:3160-3176","code":" 3160 |         if !self.is_static() && !self.is_constructor() {\n 3161 |             args[0] = if self.is_const() {\n 3162 |                 quote! { &self }\n 3163 |             } else {\n 3164 |                 quote! { &mut self }\n 3165 |             };\n 3166 |         }\n 3167 | \n 3168 |         // If it's a constructor, we always return `Self`, and we inject the\n 3169 |         // \"this\" parameter, so there's no need to ask the user for it.\n 3170 |         //\n 3171 |         // Note that constructors in Clang are represented as functions with\n 3172 |         // return-type = void.\n 3173 |         if self.is_constructor() {\n 3174 |             args.remove(0);\n 3175 |             ret = quote! { -> Self };\n 3176 |         }","lines":17,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L3160-L3176"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`args.last().unwrap()` panics if the wrapped variadic function has no remaining named arguments after the va_list argument is pruned. When `wrap_as_variadic` is set, the va_list parameter is removed from `args` (filter at lines 99-113); if it was the only parameter, `args` is empty here and the unwrap panics during codegen instead of producing a diagnostic. `va_start(ap, last_named)` also requires a preceding named parameter, so an empty list is a real malformed-input case.","fix":"Handle the empty-args case explicitly, returning a `CodegenError::Serialize` with the function location rather than panicking.","locations":[{"ref":"bindgen/codegen/serialize.rs:157-161","code":"  157 |             writeln!(\n  158 |                 writer,\n  159 |                 \"{INDENT}va_start(ap, {});\",\n  160 |                 args.last().unwrap().0\n  161 |             )?;","lines":5,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/serialize.rs#L157-L161"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"When evaluating a character macro whose value does not fit in a single byte, parsing panics instead of skipping the macro. `CChar::Raw(c)` (a `u64`, used for wide/raw char literals such as `L'\\uFFFF'` or `'\\x1FF'`) is forced into a `u8` with `u8::try_from(c).unwrap()`, and `CChar::Char(c)` (a Rust `char`, e.g. from `u'é'`) is checked with `assert_eq!(c.len_utf8(), 1)`. Either branch aborts the whole bindgen run on input headers that contain perfectly valid multi-byte character constants.","fix":"Replace the `unwrap()`/`assert_eq!` with graceful handling: if the value does not fit in a `u8` (or the char is multi-byte), return `Err(ParseError::Continue)` to skip the macro (optionally `warn!`) instead of panicking.","locations":[{"ref":"bindgen/ir/var.rs:231-241","code":"  231 |                     EvalResult::Char(c) => {\n  232 |                         let c = match c {\n  233 |                             CChar::Char(c) => {\n  234 |                                 assert_eq!(c.len_utf8(), 1);\n  235 |                                 c as u8\n  236 |                             }\n  237 |                             CChar::Raw(c) => u8::try_from(c).unwrap(),\n  238 |                         };\n  239 | \n  240 |                         (TypeKind::Int(IntKind::U8), VarType::Char(c))\n  241 |                     }","lines":11,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/ir/var.rs#L231-L241"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`root_import` is reached during module codegen and runs `proc_macro2::TokenStream::from_str(raw_line).unwrap()` on user-supplied `module_lines` (lines added via `--module-raw-line` / the builder). If a user passes a raw line that is not lexable as a Rust token stream, this `unwrap()` panics inside bindgen instead of surfacing a clean error. The input is externally-derived (user configuration), so it is reachable in normal operation.","fix":"Replace the `.unwrap()` with proper error propagation (return a CodegenError) or at least a descriptive panic message that quotes the offending line, so the failure is actionable.","locations":[{"ref":"bindgen/codegen/mod.rs:656-663","code":"  656 |             if let Some(raw_lines) = ctx.options().module_lines.get(&path) {\n  657 |                 for raw_line in raw_lines {\n  658 |                     found_any = true;\n  659 |                     result.push(\n  660 |                         proc_macro2::TokenStream::from_str(raw_line).unwrap(),\n  661 |                     );\n  662 |                 }\n  663 |             }","lines":8,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L656-L663"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Custom attribute strings returned by callbacks / annotations are parsed with `.parse().unwrap()` / `.expect(\"Invalid field attribute\")` in several places. These strings come from user-provided callbacks (`add_attributes`, `field_attributes`), annotations, and `field_attr_patterns`, i.e. external input. A malformed attribute string panics codegen rather than producing a diagnostic.","fix":"Validate/parse these attribute strings once with a recoverable error path and emit a warning or CodegenError that names the offending attribute, instead of unwrapping deep in token generation.","locations":[{"ref":"bindgen/codegen/mod.rs:1108-1112","code":" 1108 |                         attributes.extend(\n 1109 |                             custom_attributes\n 1110 |                                 .iter()\n 1111 |                                 .map(|s| s.parse().unwrap()),\n 1112 |                         );","lines":5,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L1108-L1112"},{"ref":"bindgen/codegen/mod.rs:1182-1188","code":" 1182 |                         for attr in &all_field_attributes {\n 1183 |                             let attr_tokens: proc_macro2::TokenStream =\n 1184 |                                 attr.parse().expect(\"Invalid field attribute\");\n 1185 |                             field_tokens.append_all(quote! {\n 1186 |                                 #[#attr_tokens]\n 1187 |                             });\n 1188 |                         }","lines":7,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L1182-L1188"},{"ref":"bindgen/codegen/mod.rs:1672-1677","code":" 1672 |         for attr in &all_field_attributes {\n 1673 |             let attr_tokens: proc_macro2::TokenStream =\n 1674 |                 attr.parse().expect(\"Invalid field attribute\");\n 1675 |             field.append_all(quote! {\n 1676 |                 #[#attr_tokens]\n 1677 |             });","lines":6,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L1672-L1677"},{"ref":"bindgen/codegen/mod.rs:2611-2616","code":" 2611 |         attributes.extend(\n 2612 |             item.annotations()\n 2613 |                 .attributes()\n 2614 |                 .iter()\n 2615 |                 .map(|s| s.parse().unwrap()),\n 2616 |         );","lines":6,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L2611-L2616"},{"ref":"bindgen/codegen/mod.rs:2628","code":" 2628 |         attributes.extend(custom_attributes.iter().map(|s| s.parse().unwrap()));","lines":1,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L2628"},{"ref":"bindgen/codegen/mod.rs:3810-3825","code":" 3810 |             attrs.extend(\n 3811 |                 item.annotations()\n 3812 |                     .attributes()\n 3813 |                     .iter()\n 3814 |                     .map(|s| s.parse().unwrap()),\n 3815 |             );\n 3816 | \n 3817 |             // The custom attribute callback may return a list of attributes;\n 3818 |             // add them to the end of the list.\n 3819 |             let custom_attributes = ctx.options().all_callbacks(|cb| {\n 3820 |                 cb.add_attributes(&AttributeInfo {\n 3821 |                     name: &name,\n 3822 |                     kind: DeriveTypeKind::Enum,\n 3823 |                 })\n 3824 |             });\n 3825 |             attrs.extend(custom_attributes.iter().map(|s| s.parse().unwrap()));","lines":16,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L3810-L3825"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Enum repr resolution panics with `panic!(\"Unexpected type as enum repr\")` when the canonical type of an enum's declared repr is not an `Int`. Enum repr comes from parsed C/C++; an unusual or malformed repr type would abort generation rather than degrade gracefully (the adjacent `None` branch already falls back to `IntKind::Int` with a warning).","fix":"Replace the panic with a `warn!` + fallback to a guessed integer kind, consistent with the neighbouring forward-declaration handling.","locations":[{"ref":"bindgen/codegen/mod.rs:3728-3732","code":" 3728 |                 let kind = if let Some(repr) = repr {\n 3729 |                     match *repr.canonical_type(ctx).kind() {\n 3730 |                         TypeKind::Int(int_kind) => int_kind,\n 3731 |                         _ => panic!(\"Unexpected type as enum repr\"),\n 3732 |                     }","lines":5,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L3728-L3732"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`extern_fn_block_attrs` (user-supplied via builder/CLI) are parsed with `proc_macro2::TokenStream::from_str(attr).unwrap_or_else(|err| panic!(...))`. A malformed user attribute string aborts the whole generation with a panic. Unlike most other parses here it at least names the attribute, but it is still a hard panic on external input.","fix":"Surface this as a recoverable CodegenError (or validate the attributes when the option is set) rather than panicking during codegen.","locations":[{"ref":"bindgen/codegen/mod.rs:4788-4799","code":" 4788 |         for attr in &ctx.options().extern_fn_block_attrs {\n 4789 |             let parsed_attr = proc_macro2::TokenStream::from_str(attr).unwrap_or_else(\n 4790 |                 |err| {\n 4791 |                     panic!(\n 4792 |                         \"Error parsing extern fn block attribute `{attr}`: {err}\"\n 4793 |                     )\n 4794 |                 },\n 4795 |             );\n 4796 |             block_attributes.extend(quote! {\n 4797 |                 #parsed_attr\n 4798 |             });\n 4799 |         }","lines":12,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/mod.rs#L4788-L4799"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`CompInfo::is_opaque` calls `.expect(\"Bitfield without layout? Gah!\")` on the bitfield type's layout. Elsewhere the codebase explicitly handles the missing-bitfield-layout case by marking `CompFields::Error` (see `bitfields_to_allocation_units` returning `Err(())` when `layout(ctx)` is `None`). `is_opaque` returns early for `CompFields::Error`, so in normal flow this expect is unreachable, but it couples two code paths by an invariant (Error state was set during unit computation) that a future change to ordering could break, turning a recoverable case into a hard panic.","fix":"Treat a missing bitfield layout as opaque rather than panicking: `match ctx.resolve_type(bf.ty()).layout(ctx) { Some(l) => bf.width() > l.size as u32 * 8, None => true }`.","locations":[{"ref":"bindgen/ir/comp.rs:1892-1903","code":" 1892 |         if self.fields().iter().any(|f| match *f {\n 1893 |             Field::DataMember(_) => false,\n 1894 |             Field::Bitfields(ref unit) => unit.bitfields().iter().any(|bf| {\n 1895 |                 let bitfield_layout = ctx\n 1896 |                     .resolve_type(bf.ty())\n 1897 |                     .layout(ctx)\n 1898 |                     .expect(\"Bitfield without layout? Gah!\");\n 1899 |                 bf.width() / 8 > bitfield_layout.size as u32\n 1900 |             }),\n 1901 |         }) {\n 1902 |             return true;\n 1903 |         }","lines":12,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/ir/comp.rs#L1892-L1903"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`build_builtin_ty` panics via `panic!(\"Non floating-type complex? ...\")`\n(line 2010) and `.expect(\"Not able to resolve complex type?\")` (line 2003)\nwhen handling a `CXType_Complex` whose element type is not one of the recognized\nfloating kinds. While C/C++ complex types are normally floating-point, this is a\nhard panic driven by the parsed input/clang rather than a bindgen invariant; an\nunusual or future clang complex element kind would abort the whole run instead\nof degrading to opaque.","fix":"Return `None` (falling through to non-builtin handling / opaque) instead of panicking when the complex element type is unrecognized, mirroring the `_ => return None` arm used for unknown top-level kinds.","locations":[{"ref":"bindgen/ir/context.rs:2001-2015","code":" 20 ","severity":"high","easy":false,"description":"Same 64-bit-field-at-unaligned-offset shift overflow as in `get`, here in the unsafe pointer variant `raw_get`. The loop `val |= (byte as u64) << (i * 8)` runs with `bytes_needed` up to 9, so `i * 8` reaches 64. Debug panic / wrong release value, identical reachability to the safe variant.","fix":"Apply the same overflow-safe accumulation fix used for `get`.","locations":[{"ref":"bindgen/codegen/bitfield_unit.rs:158-173","code":"  158 |         let bytes_needed = (bit_width as usize + bit_shift + 7) / 8;\n  159 | \n  160 |         let storage_ptr =\n  161 |             unsafe { core::ptr::addr_of!((*this).storage) as *const u8 };\n  162 | \n  163 |         if cfg!(target_endian = \"big\") {\n  164 |             for i in 0..bytes_needed {\n  165 |                 let byte = unsafe { *storage_ptr.add(start_byte + i) };\n  166 |                 val |= (byte.reverse_bits() as u64) << (i * 8);\n  167 |             }\n  168 |         } else {\n  169 |             for i in 0..bytes_needed {\n  170 |                 let byte = unsafe { *storage_ptr.add(start_byte + i) };\n  171 |                 val |= (byte as u64) << (i * 8);\n  172 |             }\n  173 |         }","lines":16,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/codegen/bitfield_unit.rs#L158-L173"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Same 64-bit-field shift overflow in `set`. With bit_width=64 and bit_shift>=1, `bytes_needed` is 9, and although the per-byte work uses `(val >> (i*8))` (which for i=8 is also `>> 64`), the value `val` was shifted by `bit_shift` and the upper bits that belong in the 9th byte are lost; the `>> (i*8)` for i=8 shift-overflows as well. Verified: set(1, 64, 0xFFFF_FFFF_FFFF_FFFF) then get(1,64) returns 0x7fff_ffff_ffff_ffff (top bit dropped) in release; debug panics. The field_mask computation a y":false,"description":"In bitfield allocation-unit computation, `bitfield_align * 8 - 1` is used as a bit mask. `bitfield_align` comes from `ctx.resolve_type(bitfield.ty()).layout(ctx)` and is not guaranteed to be non-zero (`Layout::new` accepts align 0, and some computed/opaque layouts can have align 0). If `bitfield_align == 0`, then `bitfield_align * 8 - 1` underflows: it panics in debug builds and wraps to `usize::MAX` in release, corrupting the alignment/offset math for the whole unit.","fix":"Clamp the alignment before using it as a mask, e.g. `let bitfield_align = cmp::max(1, bitfield_layout.align);`, or guard the masking expression so a zero alignment does not underflow.","locations":[{"ref":"bindgen/ir/comp.rs:599-611","code":"  599 |         let mut offset_in_struct =\n  600 |             bitfield.offset().unwrap_or(unit_size_in_bits);\n  601 | \n  602 |         // A zero-width field serves as alignment / padding.\n  603 |         if !packed &&\n  604 |             offset_in_struct != 0 &&\n  605 |             (bitfield_width == 0 ||\n  606 |                 (offset_in_struct & (bitfield_align * 8 - 1)) +\n  607 |                     bitfield_width >\n  608 |                     bitfield_size * 8)\n  609 |         {\n  610 |             offset_in_struct = align_to(offset_in_struct, bitfield_align * 8);\n  611 |         }","lines":13,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/ir/comp.rs#L599-L611"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"Alignment values are cast to `i64` via `int_expr(explicit as i64)` (struct align) and `int_expr(align as i64)` (opaque array align). `explicit`/`align` are `usize` alignments derived from parsed layout. On a 64-bit host an absurd/corrupt alignment near `usize::MAX` would wrap to a negative `i64`, producing a nonsensical `repr(align(...))` literal. Real alignments are tiny so 5","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `EvalResult::as_int`, the overflow guards are dead code that can never fire. `c_ulonglong` is `u64` and `c_longlong` is `i64` on every supported platform, so `value > u64::MAX as c_ulonglong`, `value > i64::MAX as c_longlong`, and `value < i64::MIN as c_longlong` are all comparisons against the type's own min/max and are always false. The guards give a false impression of bounds-checking; if libclang ever returned a value the comments imply is out of range, it would silently pass through instead of returning None.","fix":"Either remove the always-false comparisons (and the misleading comment that a wrapping cast 'will be losslessly cast back to u64 later'), or, if a genuine range restriction is intended, compare against the actual intended bound (e.g. i64 range for the signed path) rather than the C type's own limits.","locations":[{"ref":"bindgen/clang.rs:2347-2371","code":" 2347 |     pub(crate) fn as_int(&self) -> Option<i64> {\n 2348 |         if self.kind() != CXEval_Int {\n 2349 |             return None;\n 2350 |         }\n 2351 | \n 2352 |         if unsafe { clang_EvalResult_isUnsignedInt(self.x) } != 0 {\n 2353 |             let value = unsafe { clang_EvalResult_getAsUnsigned(self.x) };\n 2354 |             if value > u64::MAX as c_ulonglong {\n 2355 |                 return None;\n 2356 |             }\n 2357 | \n 2358 |             // Do a wrapping cast to i64. This will be losslessly cast back to u64 later.\n 2359 |             return Some(value as i64);\n 2360 |         }\n 2361 | \n 2362 |         let value = unsafe { clang_EvalResult_getAsLongLong(self.x) };\n 2363 |         if value > i64::MAX as c_longlong {\n 2364 |             return None;\n 2365 |         }\n 2366 |         if value < i64::MIN as c_longlong {\n 2367 |             return None;\n 2368 |         }\n 2369 |         #[allow(clippy::unnecessary_cast)]\n 2370 |         Some(value as i64)\n 2371 |     }","lines":25,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/clang.rs#L2347-L2371"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`preprocess_multi_line` strips a leading `!` only after stripping `*` (`.trim_start_matches('*').trim_start_matches('!')`), so it normalizes `/*!` Doxygen banners but a line like `* ! text` keeps `! text` only partly handled, and a `//!` inner-doc style is not handled by the single-line path at all (it strips only `/`). Lines beginning with `!` that are not preceded by `*` are left intact, producing inconsistent Rustdoc output for QtDoc/Doxygen `//!`-style comments.","fix":"Decide on consistent handling of `!` markers across both single-line and multi-line paths; if `!` stripping is intended for doc banners, apply it uniformly (or document why only the multi-line path strips it).","locations":[{"ref":"bindgen/ir/comment.rs:47-66","code":"   47 | fn preprocess_multi_line(comment: &str) -> String {\n   48 |     let comment = comment\n   49 |         .trim_start_matches('/')\n   50 |         .trim_end_matches('/')\n   51 |         .trim_end_matches('*');\n   52 | \n   53 |     // Strip any potential `*` characters preceding each line.\n   54 |     let mut lines: Vec<_> = comment\n   55 |         .lines()\n   56 |         .map(|line| line.trim().trim_start_matches('*').trim_start_matches('!'))\n   57 |         .skip_while(|line| line.trim().is_empty()) // Skip the first empty lines.\n   58 |         .collect();\n   59 | \n   60 |     // Remove the trailing line corresponding to the `*/`.\n   61 |     if lines.last().is_some_and(|l| l.trim().is_empty()) {\n   62 |         lines.pop();\n   63 |     }\n   64 | \n   65 |     lines.join(\"\\n\")\n   66 | }","lines":20,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/ir/comment.rs#L47-L66"},{"ref":"bindgen/ir/comment.rs:37-45","code":"   37 | fn preprocess_single_lines(comment: &str) -> String {\n   38 |     debug_assert!(comment.starts_with(\"//\"), \"comment is not single line\");\n   39 | \n   40 |     let lines: Vec<_> = comment\n   41 |         .lines()\n   42 |         .map(|l| l.trim().trim_start_matches('/'))\n   43 |         .collect();\n   44 |     lines.join(\"\\n\")\n   45 | }","lines":9,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/ir/comment.rs#L37-L45"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `try_ensure_fallback_translation_unit`, the base name used to build the PCH\nfilename is derived with `header_name.split(\".h\").next()`. This splits on the\nfirst occurrence of the substring `.h` anywhere in the file name, not on a\ntrailing extension. A header such as `my.header.h` yields base `my`, and\n`a.hxx`/`a.hpp` yield `a` only by luck of where `.h` first appears; any file name\ncontaining `.h` earlier (e.g. `foo.h.config.h`) is truncated unexpectedly,\nproducing a surprising/colliding PCH path.","fix":"Strip the actual extension using `Path::file_stem()` (or `path.file_stem()` on the original path) instead of `split(\".h\")`.","locations":[{"ref":"bindgen/ir/context.rs:2079-2080","code":" 2079 |                 header_names_to_compile\n 2080 |                     .push(header_name.split(\".h\").next()?.to_string());","lines":2,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/ir/context.rs#L2079-L2080"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Item::name_target`'s `use_instead_of` early return (line 691, even once the\n`self`-vs-`item` issue noted separately is fixed) is partially redundant with\n`real_canonical_name`, which independently re-checks\n`target.annotations.use_instead_of()` at line 845 after cal           .map(|s| CString::new(s.as_bytes()).unwrap())\n 1834 |             .collect();","lines":5,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/clang.rs#L1830-L1834"},{"ref":"bindgen/clang.rs:2036-2038","code":" 2036 |     pub(crate) fn new(name: &str, contents: &str) -> UnsavedFile {\n 2037 |         let name = CString::new(name.as_bytes()).unwrap();\n 2038 |         let contents = CString::new(contents.as_bytes()).unwrap();","lines":3,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/clang.rs#L2036-L2038"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"When `--output` is given, the output file is created with `File::create(path)?` at the top of the output-handling block, before `dump_preprocessed_input`, the custom-derive/attribute callbacks, and other builder configuration run. If any later step in builder_from_flags fails (or the program exits early), an empty/truncated output file has already been written to disk, clobbering any pre-existing bindings.","fix":"Defer file creation until just before the bindings are actually written, or document that the output file is truncated eagerly. At minimum create the writer as late as possible after all fallible setup.","locations":[{"ref":"bindgen/options/cli.rs:1023-1042","code":" 1023 |     let output = if let Some(path) = &output {\n 1024 |         let file = File::create(path)?;\n 1025 |         if let Some(depfile) = depfile {\n 1026 |             builder = builder.depfile(path, depfile);\n 1027 |         }\n 1028 |         Box::new(io::BufWriter::new(file)) as Box<dyn io::Write>\n 1029 |     } else {\n 1030 |         if let Some(depfile) = depfile {\n 1031 |             builder = builder.depfile(\"-\", depfile);\n 1032 |         }\n 1033 |         Box::new(io::BufWriter::new(io::stdout())) as Box<dyn io::Write>\n 1034 |     };\n 1035 | \n 1036 |     if dump_preprocessed_input {\n 1037 |         builder.dump_preprocessed_input()?;\n 1038 |     }\n 1039 | \n 1040 |     if let Some(path) = rustfmt_configuration_file {\n 1041 |         builder = builder.rustfmt_configuration_file(Some(path));\n 1042 |     }","lines":20,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/options/cli.rs#L1023-L1042"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`FallbackTranslationUnit::new` creates/truncates the file at `file` on disk but only `Drop` removes it; `pch_path` is never created here yet is unconditionally removed on drop. More importantly the empty file is created with `OpenOptions` and immediately dropped, then parsed - there is no guard that two FallbackTranslationUnit instances (or a leftover file from a previous crashed run) don't collide on the same path. Combined with `Drop` unconditionally `remove_file`-ing both paths, a shared/temp path could delete a file another unit relies on.","fix":"Document/enforce that `file` and `pch_path` are unique per instance (e.g. via tempfile), and avoid removing `pch_path` on drop if this unit never created it. At minimum confirm callers pass per-instance unique paths.","locations":[{"ref":"bindgen/clang.rs:1928-1993","code":" 1928 | impl FallbackTranslationUnit {\n 1929 |     /// Create a new fallback translation unit\n 1930 |     pub(crate) fn new(\n 1931 |         file: String,\n 1932 |         pch_path: String,\n 1933 |         c_args: &[Box<str>],\n 1934 |     ) -> Option<Self> {\n 1935 |         // Create empty file\n 1936 |         OpenOptions::new()\n 1937 |             .write(true)\n 1938 |             .create(true)\n 1939 |             .truncate(true)\n 1940 |             .open(&file)\n 1941 |             .ok()?;\n 1942 | \n 1943 |         let f_index = Box::new(Index::new(true, false));\n 1944 |         let f_translation_unit = TranslationUnit::parse(\n 1945 |             &f_index,\n 1946 |             &file,\n 1947 |             c_args,\n 1948 |             &[],\n 1949 |             CXTranslationUnit_None,\n 1950 |         )?;\n 1951 |         Some(FallbackTranslationUnit {\n 1952 |             file_path: file,\n 1953 |             pch_path,\n 1954 |             tu: f_translation_unit,\n 1955 |             idx: f_index,\n 1956 |         })\n 1957 |     }\n 1958 | \n 1959 |     /// Get reference to underlying translation unit.\n 1960 |     pub(crate) fn translation_unit(&self) -> &TranslationUnit {\n 1961 |         &self.tu\n 1962 |     }\n 1963 | \n 1964 |     /// Reparse a translation unit.\n 1965 |     pub(crate) fn reparse(\n 1966 |         &mut self,\n 1967 |         unsaved_contents: &str,\n 1968 |     ) -> Result<(), CXErrorCode> {\n 1969 |         let unsaved = &[UnsavedFile::new(&self.file_path, unsaved_contents)];\n 1970 |         let mut c_unsaved: Vec<CXUnsavedFile> =\n 1971 |             unsaved.iter().map(|f| f.x).collect();\n 1972 |         let ret = unsafe {\n 1973 |             clang_reparseTranslationUnit(\n 1974 |                 self.tu.x,\n 1975 |                 unsaved.len() as c_uint,\n 1976 |                 c_unsaved.as_mut_ptr(),\n 1977 |                 clang_defaultReparseOptions(self.tu.x),\n 1978 |             )\n 1979 |         };\n 1980 |         if ret != 0 {\n 1981 |             Err(ret)\n 1982 |         } else {\n 1983 |             Ok(())\n 1984 |         }\n 1985 |     }\n 1986 | }\n 1987 | \n 1988 | impl Drop for FallbackTranslationUnit {\n 1989 |     fn drop(&mut self) {\n 1990 |         let _ = std::fs::remove_file(&self.file_path);\n 1991 |         let _ = std::fs::remove_file(&self.pch_path);\n 1992 |     }\n 1993 | }","lines":66,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/clang.rs#L1928-L1993"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`num_args` (Cursor) and `num_args` (Type) treat only the sentinel `-1` as the error value (`if w == -1`). libclang documents `-1` as the not-a-function return, but the result is `c_int`; any other negative value (should it ever occur) would fall through the `Ok` branch and be cast to a huge `u32` via `w as u32`, then drive an allocation/loop of that size in `args()`. The same pattern appears for `bit_width` (`w == -1`) and `num_elements` (`== -1`).","fix":"Guard with `if w < 0` instead of `if w == -1` so any negative sentinel maps to the error/None path before the unsigned cast.","locations":[{"ref":"bindgen/clang.rs:863-872","code":"  863 |     pub(crate) fn num_args(&self) -> Result<u32, ()> {\n  864 |         unsafe {\n  865 |             let w = clang_Cursor_getNumArguments(self.x);\n  866 |             if w == -1 {\n  867 |                 Err(())\n  868 |             } else {\n  869 |                 Ok(w as u32)\n  870 |             }\n  871 |         }\n  872 |     }","lines":10,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/clang.rs#L863-L872"},{"ref":"bindgen/clang.rs:1396-1405","code":" 1396 |     pub(crate) fn num_args(&self) -> Result<u32, ()> {\n 1397 |         unsafe {\n 1398 |             let w = clang_getNumArgTypes(self.x);\n 1399 |             if w == -1 {\n 1400 |                 Err(())\n 1401 |             } else {\n 1402 |                 Ok(w as u32)\n 1403 |             }\n 1404 |         }\n 1405 |     }","lines":10,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/clang.rs#L1396-L1405"},{"ref":"bindgen/clang.rs:703-719","code":"  703 |     pub(crate) fn bit_width(&self) -> Option<u32> {\n  704 |         // It is not safe to check the bit width without ensuring it doesn't\n  705 |         // depend on a template parameter. See\n  706 |         // https://github.com/rust-lang/rust-bindgen/issues/2239\n  707 | FG_TARGET_ARCH\").is_some();\n   65 |                 if !is_build_script {\n   66 |                     return None;\n   67 |                 }","lines":6,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/features.rs#L62-L67"},{"ref":"bindgen/diagnostics.rs:52-55","code":"   52 |     pub(crate) fn display(&self) {\n   53 |         std::thread_local! {\n   54 |             static INVOKED_BY_BUILD_SCRIPT: bool =  std::env::var_os(\"CARGO_CFG_TARGET_ARCH\").is_some();\n   55 |         }","lines":4,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/diagnostics.rs#L52-L55"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`is_dependent_on_template_parameter` recursively calls `referenced.visit(...)` for every referenced cursor while already recursing with `CXChildVisit_Recurse`. For deep/templated ASTs this can re-traverse large subtrees and is a known hot path; the nested visit on each referenced node multiplies traversal cost.","fix":"Consider relying on the outer `CXChildVisit_Recurse` traversal and only checking `referenced()` for the immediate node, or memoize results, to avoid quadratic re-traversal.","locations":[{"ref":"bindgen/clang.rs:334-371","code":"  334 |     pub(crate) fn is_dependent_on_template_parameter(&self) -> bool {\n  335 |         fn visitor(\n  336 |             found_template_parameter: &mut bool,\n  337 |             cur: Cursor,\n  338 |         ) -> CXChildVisitResult {\n  339 |             // If we found a template parameter, it is dependent.\n  340 |             if cur.is_template_parameter() {\n  341 |                 *found_template_parameter = true;\n  342 |                 return CXChildVisit_Break;\n  343 |             }\n  344 | \n  345 |             // Get the referent and traverse it as well.\n  346 |             if let Some(referenced) = cur.referenced() {\n  347 |                 if referenced.is_template_parameter() {\n  348 |                     *found_template_parameter = true;\n  349 |                     return CXChildVisit_Break;\n  350 |                 }\n  351 | \n  352 |                 referenced\n  353 |                     .visit(|next| visitor(found_template_parameter, next));\n  354 |                 if *found_template_parameter {\n  355 |                     return CXChildVisit_Break;\n  356 |                 }\n  357 |             }\n  358 | \n  359 |             // Continue traversing the AST at the original cursor.\n  360 |             CXChildVisit_Recurse\n  361 |         }\n  362 | \n  363 |         if self.is_template_parameter() {\n  364 |             return true;\n  365 |         }\n  366 | \n  367 |         let mut found_template_parameter = false;\n  368 |         self.visit(|next| visitor(&mut found_template_parameter, next));\n  369 | \n  370 |         found_template_parameter\n  371 |     }","lines":38,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/clang.rs#L334-L371"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Type::spelling` calls `s.split(\"::\")` twice on every invocation (once in the `all(is_valid_identifier)` check, once again to take `.last()`), and `is_valid_identifier` walks the whole string. spelling() is called very frequently during parsing (debug formatting, associated-type regex matching, etc.). The double split allocates/iterates redundantly.","fix":"Split once into a reusable iterator/collection, or compute `rsplit(\"::\").next()` and validate components in a single pass.","locations":[{"ref":"bindgen/clang.rs:1247-1259","code":" 1247 |     /// Get a raw display name for this type.\n 1248 |     pub(crate) fn spelling(&self) -> String {\n 1249 |         let s = unsafe { cxstring_into_string(clang_getTypeSpelling(self.x)) };\n 1250 |         // Clang 5.0 introduced changes in the spelling API so it returned the\n 1251 |         // full qualified name. Let's undo that here.\n 1252 |         if s.split(\"::\").all(is_valid_identifier) {\n 1253 |             if let Some(s) = s.split(\"::\").last() {\n 1254 |                 return s.to_owned();\n 1255 |             }\n 1256 |         }\n 1257 | \n 1258 |         s\n 1259 |     }","lines":13,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/clang.rs#L1247-L1259"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`get_line` reads from the start of the file and iterates line by line via `file.lines().nth(line - 1)` to fetch a single source line for a diagnostic. For diagnostics deep into a large header this scans the whole prefix of the file on every call. `line.wrapping_sub(1)` with `line == 0` also degenerates to iterating the entire file and returning `None`.","fix":"Guard `line == 0` explicitly and consider caching file contents (or reading once per file) when emitting multiple diagnostics for the same source; this code path is only used for diagnostics so impact is limited.","locations":[{"ref":"bindgen/diagnostics.rs:136-146","code":"  136 | pub(crate) fn get_line(\n  137 |     filename: &str,\n  138 |     line: usize,\n  139 | ) -> io::Result<Option<String>> {\n  140 |     let file = BufReader::new(File::open(filename)?);\n  141 |     if let Some(line) = file.lines().nth(line.wrapping_sub(1)) {\n  142 |         return line.map(Some);\n  143 |     }\n  144 | \n  145 |     Ok(None)\n  146 | }","lines":11,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/diagnostics.rs#L136-L146"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`initial_worklist` for `CannotDerive` and `UsedTemplateParameters` (and the closure in `UsedTemplateParameters::new`) re-traces the full transitive closure of every allowlisted item to build the worklist, computing the same reachability already implied by `dependencies`/`allowlisted_items`. The same trace-and-flatten pattern is duplicated across these methods. For large IR graphs this is an extra full traversal per analysis.","fix":"Factor the \"transitive closure of allowlisted items\" computation into a single shared helper and reuse the precomputed set rather than re-tracing in each method.","locations":[{"ref":"bindgen/ir/analysis/derive.rs:603-622","code":"  603 |     fn initial_worklist(&self) -> Vec<ItemId> {\n  604 |         // The transitive closure of all allowlisted items, including explicitly\n  605 |         // blocklisted items.\n  606 |         self.ctx\n  607 |             .allowlisted_items()\n  608 |             .iter()\n  609 |             .copied()\n  610 |             .flat_map(|i| {\n  611 |                 let mut reachable = vec![i];\n  612 |                 i.trace(\n  613 |                     self.ctx,\n  614 |                     &mut |s, _| {\n  615 |                         reachable.push(s);\n  616 |                     },\n  617 |                     &(),\n  618 |                 );\n  619 |                 reachable\n  620 |             })\n  621 |             .collect()\n  622 |     }","lines":20,"link":"https://github.com/rust-lang/rust-bindgen/blob/2048231f45c87cd65d7891f55090aac81cc0d66b/bindgen/ir/analysis/derive.rs#L603-L622"},{"ref":"bindgen/ir/analysis/template_params.rs:489-508","code":"  489 |     fn initial_worklist(&self) -> Vec<ItemId> {\n  490 |         // The transitive closure of all allowlisted items, including explicitly\n  491 |         // blocklisted items.\n  492 |         self.ctx\n  493 |             .allowlisted_items()\n  494 |             .iter()\n  495 |             .copied()\n  496 |             .flat_map(|i| {\n  497 |                 let mut reachable = vec![i];\n  498 |                 i.trace(\n  499 | const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};

    const p = new URLSearchParams();

    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
