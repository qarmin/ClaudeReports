<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"MusicRepositoryImpl uses @Volatile on library and currentIndexingState, but mutations such as createPlaylist, renamePlaylist, deletePlaylist, addToPlaylist, and rewritePlaylist read library under a synchronized block and then immediately release the lock before calling library.createPlaylist / library.renamePlaylist / etc. (which are IO-bound suspending calls). A concurrent index() call can swap this.library to a new MutableLibrary between the time the old library is captured and the time the mutation result (newLibrary) is stored back. The result is that the freshly indexed library is silently overwritten by the stale mutation result.","fix":"Hold the lock around the entire read-modify-write, or at minimum re-check that this.library is still the same instance after the suspending call completes before storing newLibrary back.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/MusicRepository.kt:320-358","code":"  320 |     override suspend fun createPlaylist(name: String, songs: List<Song>) {\n  321 |         val library = synchronized(this) { library ?: return }\n  322 |         L.d(\"Creating playlist $name with ${songs.size} songs\")\n  323 |         val newLibrary = library.createPlaylist(name, songs)\n  324 |         synchronized(this) { this.library = newLibrary }\n  325 |         withContext(Dispatchers.Main) { dispatchLibraryChange(device = false, user = true) }\n  326 |     }\n  327 | \n  328 |     override suspend fun renamePlaylist(playlist: Playlist, name: String) {\n  329 |         val library = synchronized(this) { library ?: return }\n  330 |         L.d(\"Renaming $playlist to $name\")\n  331 |         val newLibrary = library.renamePlaylist(playlist, name)\n  332 |         synchronized(this) { this.library = newLibrary }\n  333 |         withContext(Dispatchers.Main) { dispatchLibraryChange(device = false, user = true) }\n  334 |     }\n  335 | \n  336 |     override suspend fun deletePlaylist(playlist: Playlist) {\n  337 |         val library = synchronized(this) { library ?: return }\n  338 |         L.d(\"Deleting $playlist\")\n  339 |         val newLibrary = library.deletePlaylist(playlist)\n  340 |         synchronized(this) { this.library = newLibrary }\n  341 |         withContext(Dispatchers.Main) { dispatchLibraryChange(device = false, user = true) }\n  342 |     }\n  343 | \n  344 |     override suspend fun addToPlaylist(songs: List<Song>, playlist: Playlist) {\n  345 |         val library = synchronized(this) { library ?: return }\n  346 |         L.d(\"Adding ${songs.size} songs to $playlist\")\n  347 |         val newLibrary = library.addToPlaylist(playlist, songs)\n  348 |         synchronized(this) { this.library = newLibrary }\n  349 |         withContext(Dispatchers.Main) { dispatchLibraryChange(device = false, user = true) }\n  350 |     }\n  351 | \n  352 |     override suspend fun rewritePlaylist(playlist: Playlist, songs: List<Song>) {\n  353 |         val library = synchronized(this) { library ?: return }\n  354 |         L.d(\"Rewriting $playlist with ${songs.size} songs\")\n  355 |         val newLibrary = library.rewritePlaylist(playlist, songs)\n  356 |         synchronized(this) { this.library = newLibrary }\n  357 |         withContext(Dispatchers.Main) { dispatchLibraryChange(device = false, user = true) }\n  358 |     }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"ExoPlaybackStateHolder shares a single parent Job (`saveJob`) between two separate CoroutineScopes (`saveScope` and `restoreScope`). Cancelling `saveJob` in `release()` also cancels any in-flight restore coroutine. More importantly, both scopes launch into the same job hierarchy, so a cancellation or exception in either scope can affect the other. The save and restore operations need independent lifecycle management.","fix":"Give `restoreScope` its own independent `Job()` (e.g. `private val restoreJob = Job()`), cancel it separately in `release()`, and use `CoroutineScope(Dispatchers.IO + restoreJob)` for `restoreScope`.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/service/ExoPlaybackStateHolder.kt:85-87","code":"   85 |     private val saveJob = Job()\n   86 |     private val saveScope = CoroutineScope(Dispatchers.IO + saveJob)\n   87 |     private val restoreScope = CoroutineScope(Dispatchers.IO + saveJob)"}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"In Start.kt (Tasker plugin), StartActionRunner.run() polls AuxioService.isForeground in a busy\nloop on a background thread (lines 67-69): `while (!AuxioService.isForeground) { Thread.sleep(100) }`.\nThe `isForeground` companion object property has no `@Volatile` annotation and is not protected\nby any synchronization, so the reading thread may see a stale cached value of `false` indefinitely\n(the JVM is allowed to cache the field value in a register). This can cause the Tasker action to\nspin forever or time out.","fix":"Annotate `isForeground` with `@Volatile`, or use `AtomicBoolean`, to guarantee visibility across threads.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/tasker/Start.kt:67-69","code":"   67 |         while (!AuxioService.isForeground) {\n   68 |             Thread.sleep(100)\n   69 |         }"},{"ref":"app/src/main/java/org/oxycblt/auxio/AuxioService.kt:159","code":"  159 |         var isForeground = false"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"In Compress.transcodeInto(), if bitmap.compress() throws an exception, bitmap.recycle() on the next line is never reached. Bitmaps hold native memory outside the JVM heap, so a leaked Bitmap is not promptly recovered by GC and can cause OutOfMemoryError under memory pressure, especially when processing many large cover images.","fix":"Wrap the compress call in a try/finally block: `try { bitmap.compress(format, quality, output) } finally { bitmap.recycle() }`.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/covers/stored/Transcoding.kt:88-92","code":"   88 |                 requireNotNull(BitmapFactory.decodeByteArray(data, 0, data.size, this)) {\n   89 |                     \"Failed to decode bitmap\"\n   90 |                 }\n   91 |             bitmap.compress(format, quality, output)\n   92 |             bitmap.recycle()"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In `MetadataExtractorImpl.extract`, a `FileInputStream` (`fis`) is created and closed via\n`.also { fis.close() }` chained on the return value of `TagLibJNI.open`. If `TagLibJNI.open`\n(specifically its `openNative` JNI call) throws an exception, the `.also` lambda is never\nexecuted and `fis` is not closed. Inside `TagLibJNI.open`, the `NativeInputStream` wraps\n`fis.channel`; if `openNative` throws, `inputStream.close()` (which closes the channel) is\nalso skipped. The `ParcelFileDescriptor` (`fd`) is correctly closed by the outer `use` block,\nso the OS file descriptor is eventually reclaimed, but the `FileInputStream` Java wrapper and\nits `FileChannel` are not explicitly closed, causing a resource leak for the duration until GC.","fix":"Use a try/finally (or `use`) around `fis` inside the `use { fd -> }` block:\n```kotlin\ncontentResolver.openFileDescriptor(deviceFile.uri, \"r\")?.use { fd ->\n    val fis = FileInputStream(fd.fileDescriptor)\n    try {\n        TagLibJNI.open(deviceFile, fis)\n    } finally {\n        fis.close()\n    }\n} ?: MetadataResult.ProviderFailed\n```","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/metadata/MetadataExtractor.kt:49-55","code":"   49 |     override suspend fun extract(deviceFile: File): MetadataResult =\n   50 |         withContext(Dispatchers.IO) {\n   51 |             contentResolver.openFileDescriptor(deviceFile.uri, \"r\")?.use { fd ->\n   52 |                 val fis = FileInputStream(fd.fileDescriptor)\n   53 |                 TagLibJNI.open(deviceFile, fis).also { fis.close() }\n   54 |             } ?: MetadataResult.ProviderFailed\n   55 |         }"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/metadata/TagLibJNI.kt:34-39","code":"   34 |     fun open(deviceFile: File, fis: FileInputStream): MetadataResult {\n   35 |         val inputStream = NativeInputStream(deviceFile, fis)\n   36 |         val tag = openNative(inputStream)\n   37 |         inputStream.close()\n   38 |         return tag\n   39 |     }"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In ExoPlaybackStateHolder.endSession, if `playbackManager.progression.isPlaying` is true at the time the save callback runs (because the user started playing again before the IO completes), `sessionOngoing` is never set to false and `StateAck.SessionEnded` is never dispatched. This means the foreground service notification is never released and the service cannot stop. A subsequent endSession call could trigger this path again without the session ever cleanly finishing.","fix":"Track that an end was requested separately from whether isPlaying recovered, and ensure StateAck.SessionEnded is dispatched when the session-end intent is confirmed, independent of transient re-play.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/service/ExoPlaybackStateHolder.kt:445-457","code":"  445 |     override fun endSession() {\n  446 |         // This session has ended, so we need to reset this flag for when the next\n  447 |         // session starts.\n  448 |         playbackManager.playing(false)\n  449 |         save {\n  450 |             // User could feasibly start playing again if they were fast enough, so\n  451 |             // we need to avoid stopping the foreground state if that's the case.\n  452 |             if (!playbackManager.progression.isPlaying) {\n  453 |                 sessionOngoing = false\n  454 |                 playbackManager.ack(this, StateAck.SessionEnded)\n  455 |             }\n  456 |         }\n  457 |     }"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In DetailViewModel.movePlaylistSongs(), the move logic has the source and destination indices swapped.\nThe call is `editedPlaylist.add(realFrom, editedPlaylist.removeAt(realTo))`, which removes the item\nat `realTo` (the destination) and re-inserts it at `realFrom` (the source). This is backwards:\nto move item from position A to position B, you should `removeAt(A)` and `add(B, ...)`.\nAs a result drag-reordering in the playlist editor moves the wrong element in the backing list,\ncorrupting the playlist order silently while the UI appears correct (because the adapter is given\na direct Move instruction separately).","fix":"Swap the indices: `editedPlaylist.add(realTo, editedPlaylist.removeAt(realFrom))`.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/detail/DetailViewModel.kt:500","code":"  500 |         editedPlaylist.add(realFrom, editedPlaylist.removeAt(realTo))"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In DetailViewModel.refreshDetail(), the condition that triggers a Replace instruction is\n`replace == -1`, but the callers that want to trigger a Replace always pass `-1` literally\n(from DetailGeneratorImpl.onAlbumSongSortChanged etc. via `invalidate(type, -1)`), while the\ncode comment says \"replace == -1 means replace the final section.\" This means that any non-null\nnon-(-1) `replace` value passed to refreshDetail() is silently treated as Diff, including the\nlegitimate scrolling-to-position cases that might one day be wired. More critically the public\n`invalidate()` override in DetailViewModel uses the raw `replace` param from the generator:\nwhen `replace` is null, the Diff path runs, which is correct; when `replace` is -1, Replace\nruns, also correct. However when replace is any other integer (future use) it would silently\nbecome Diff. The real defect is that the function signature implies a general position but the\nonly handled values are null and -1. This is a semantic mismatch that will cause silent data\ncorruption if the API is extended.","fix":"Rename the sentinel from -1 to a typed enum/sealed class, or at minimum add a check that throws on unrecognized non-null values.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/detail/DetailViewModel.kt:612","code":"  612 |             if (replace == -1 && i == detail.sections.lastIndex) {"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"MusicRepositoryImpl.emitIndexingProgress and emitIndexingCompletion call yield() before acquiring the synchronized lock, but the synchronized block then calls listener callbacks (onIndexingStateChanged) still inside the lock. Those listeners may themselves try to read indexingState (which calls into the same synchronized getter), causing a re-entrant deadlock on the JVM monitor. Additionally, because yield() is called *before* the synchronized block, a coroutine cancellation after yield() but before the block is entered will leave the UI in an inconsistent state (e.g. no completion event ever dispatched).","fix":"Move yield() outside of (before) the synchronized block – which it already is – but also move the listener dispatch *outside* the lock (collect listeners under the lock, then call them without holding the lock), as is done in dispatchLibraryChange. This avoids holding the monitor while running arbitrary listener code.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/MusicRepository.kt:431-439","code":"  431 |     private suspend fun emitIndexingProgress(progress: IndexingProgress) {\n  432 |         yield()\n  433 |         synchronized(this) {\n  434 |             currentIndexingState = IndexingState.Indexing(progress)\n  435 |             for (listener in indexingListeners) {\n  436 |                 listener.onIndexingStateChanged()\n  437 |             }\n  438 |         }\n  439 |     }"},{"ref":"app/src/main/java/org/oxycblt/auxio/music/MusicRepository.kt:474-484","code":"  474 |     private suspend fun emitIndexingCompletion(error: Exception?) {\n  475 |         yield()\n  476 |         synchronized(this) {\n  477 |             previousCompletedState = IndexingState.Completed(error)\n  478 |             currentIndexingState = null\n  479 |             L.d(\"Dispatching completion state [error=$error]\")\n  480 |             for (listener in indexingListeners) {\n  481 |                 listener.onIndexingStateChanged()\n  482 |             }\n  483 |         }\n  484 |     }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In playFromGenreImpl, when a genre cannot be resolved the code incorrectly shows PlaybackDecision.PlayFromArtist(song) instead of PlaybackDecision.PlayFromGenre(song). This causes the artist-picker dialog to appear when a user tries to play from a genre with multiple genres, and the genre-picker dialog is never shown.","fix":"Change `startPlaybackDecision(PlaybackDecision.PlayFromArtist(song))` to `startPlaybackDecision(PlaybackDecision.PlayFromGenre(song))` in playFromGenreImpl.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/PlaybackViewModel.kt:314","code":"  314 |         startPlaybackDecision(PlaybackDecision.PlayFromArtist(song))"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In PlaybackPickerViewModel.setPickerSongUid, the warning log condition is inverted. `if (_currentPickerSong.value != null)` logs \"Given song UID was invalid\" when the song was found successfully. The condition should be `== null` to log when the UID did not resolve to a song.","fix":"Change `if (_currentPickerSong.value != null)` to `if (_currentPickerSong.value == null)` so the warning fires only when the UID resolves to nothing.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/decision/PlaybackPickerViewModel.kt:68-70","code":"   68 |         if (_currentPickerSong.value != null) {\n   69 |             L.w(\"Given song UID was invalid\")\n   70 |         }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In DBCache.read(), ParsedTags is constructed with `durationMs = dbSong.durationMs` where dbSong.durationMs is Long? (nullable), but ParsedTags.durationMs is Long (non-null, required first parameter). This is a type mismatch: the !! operator is correctly used on the same field for the Properties constructor on line 59, but is omitted for the ParsedTags call on line 67. If the Kotlin compiler allows this (e.g., due to Java platform type widening or a suppressed check), a null value would silently produce a NullPointerException at runtime when the tag is accessed.","fix":"Change `durationMs = dbSong.durationMs` to `durationMs = dbSong.durationMs!!` to match the same pattern used for Properties construction on line 59, and to satisfy the non-null contract of ParsedTags.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/cache/db/DBCache.kt:67","code":"   67 |                             durationMs = dbSong.durationMs,"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Location.Unopened inherits Location.equals() which considers any Location subclass with the same URI as equal (`other is Location`). Location.Opened overrides equals() to also require the same path and uses `other is Opened` guard. This creates an asymmetric equals() contract: `unopened.equals(opened)` can return true (base implementation accepts any Location), while `opened.equals(unopened)` always returns false (Opened's implementation rejects non-Opened). Additionally, base hashCode() = 31 * uri.hashCode() differs from Opened.hashCode() = 31 * uri.hashCode() + path.hashCode(), so two objects that compare equal via Unopened.equals may have different hashCodes, violating the equals/hashCode contract.","fix":"Give Unopened its own equals()/hashCode() override that checks `other is Unopened` (symmetry with Opened). Alternatively, refactor the sealed class so that equals/hashCode are not overridden in the base class and each subclass has its own complete implementation.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/fs/Location.kt:29-31","code":"   29 |     override fun equals(other: Any?) = other is Location && uri == other.uri\n   30 | \n   31 |     override fun hashCode() = 31 * uri.hashCode()"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/fs/Location.kt:78-80","code":"   78 |         override fun equals(other: Any?) = other is Opened && uri == other.uri && path == other.path\n   79 | \n   80 |         override fun hashCode() = 31 * uri.hashCode() + path.hashCode()"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","description":"ArtistImpl.durationMs returns 0 instead of null when an artist has no songs, violating the Artist interface contract. The Artist interface (Music.kt line 370) declares durationMs: Long? and documents 'Will be null if there are no songs.' Album-artist-only artists (those referenced only via preAlbum.preArtists, not preSong.preArtists) have empty songVertices and thus empty core.songs. The sumOf{} on an empty collection returns 0L, not null, so callers checking for null to detect no-song artists receive incorrect data.","fix":"Change line 52 of ArtistImpl.kt to: override val durationMs = core.songs.sumOf { it.durationMs }.takeIf { core.songs.isNotEmpty() }","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/model/ArtistImpl.kt:52","code":"   52 |     override val durationMs = core.songs.sumOf { it.durationMs }"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/Music.kt:367-370","code":"  367 |      * The duration of all [Song]s in the artist, in milliseconds. Will be null if there are no\n  368 |      * songs.\n  369 |      */\n  370 |     val durationMs: Long?"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/graph/MusicGraph.kt:208-218","code":"  208 |                 val albumArtistVertices =\n  209 |                     preSong.preAlbum.preArtists.preArtists.map { preArtist ->\n  210 |                         artistVertices.getOrPut(preArtist) { ArtistVertex(preArtist) }\n  211 |                     }\n  212 |                 val albumVertex = AlbumVertex(preSong.preAlbum, albumArtistVertices.toMutableList())\n  213 |                 // Album vertex is linked, now link artists back to album.\n  214 |                 albumArtistVertices.forEach { artistVertex ->\n  215 |                     artistVertex.albumVertices.add(albumVertex)\n  216 |                 }\n  217 |                 albumVertex\n  218 |             }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","description":"ArtistImpl.hashCode uses multiplication (*) instead of addition (+) when incorporating songs.hashCode(). All other model classes (AlbumImpl, GenreImpl, SongImpl, PlaylistImpl) use the standard Horner-method pattern '31 * X + Y'. ArtistImpl uses '31 * (31 * uid.hashCode() + core.preArtist.hashCode()) * core.songs.hashCode()'. Because Java's Set.hashCode() returns the XOR of element hashCodes, an empty set returns 0, and any set whose element hashCodes XOR to 0 also returns 0. When songs.hashCode() == 0, the entire expression collapses to 0 regardless of uid or preArtist, causing massive hash collisions among ArtistImpl instances stored in the LibraryImpl.artists Set.","fix":"Change to the standard additive pattern: private val hashCode = 31 * (31 * uid.hashCode() + core.preArtist.hashCode()) + core.songs.hashCode()","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/model/ArtistImpl.kt:58-59","code":"   58 |     private val hashCode =\n   59 |         31 * (31 * uid.hashCode() + core.preArtist.hashCode()) * core.songs.hashCode()"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","description":"M3U #EXTINF duration is written in milliseconds instead of seconds. The M3U spec defines the #EXTINF duration field as an integer number of seconds. song.durationMs (e.g. 180000 for a 3-minute track) is written directly, producing values 1000x too large. Compliant players will display incorrect durations and may seek to wrong positions when fast-forwarding.","fix":"Divide durationMs by 1000 before formatting: \"#EXTINF:${song.durationMs / 1000},${song.name.raw}\"","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/playlist/m3u/M3U.kt:185","code":"  185 |             writer.writeLine(\"#EXTINF:${song.durationMs},${song.name.raw}\")"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`tryAsync` in LangUtil.kt accepts a `context: CoroutineContext` parameter but never passes it to\n`async {}`. The call is `async { ... }` instead of `async(context) { ... }`, so all coroutines\nlaunched via `tryAsync` — including the outer and all inner workers in `mapParallel` — always\ninherit the calling scope's dispatcher regardless of what was passed. Every `mapParallel` call in\nExploreStep and ExtractStep explicitly requests `Dispatchers.IO`, but the actual coroutines run\non whichever dispatcher the enclosing scope uses. If that scope is on `Dispatchers.Main` (e.g.\na viewModelScope), all file I/O and metadata extraction blocks the UI thread. The `context`\nparameter is effectively dead code in this function.","fix":"Change `= async {` to `= async(context) {` on line 37 of LangUtil.kt so the coroutine actually runs on the requested dispatcher.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/util/LangUtil.kt:34-44","code":"   34 | fun CoroutineScope.tryAsync(\n   35 |     context: CoroutineContext,\n   36 |     block: suspend () -> Unit,\n   37 | ): Deferred<Result<Unit>> = async {\n   38 |     try {\n   39 |         block()\n   40 |         Result.success(Unit)\n   41 |     } catch (e: Throwable) {\n   42 |         Result.failure(e)\n   43 |     }\n   44 | }"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/pipeline/ExploreStep.kt:57","code":"   57 |             scope.mapParallel(PARALLELISM, files, classified, Dispatchers.IO) { file ->"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/pipeline/ExploreStep.kt:76","code":"   76 |             scope.mapParallel(PARALLELISM, classified, finalized, Dispatchers.IO) { item ->"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/pipeline/ExtractStep.kt:73","code":"   73 |             scope.mapParallel(PARALLELISM, explored, extract, Dispatchers.IO) { item ->"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/pipeline/ExtractStep.kt:92","code":"   92 |             scope.mapParallel(PARALLELISM, extract, parsed, Dispatchers.IO) { item ->"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`mapParallel` does not close its output channel when an inner coroutine fails. The flow is:\n(1) `n` inner `tryAsync` coroutines all read from `input` and write to `output`;\n(2) `deferreds.tryAwaitAll()` is called; (3) `output.close()` is called. However, if any inner\ncoroutine throws (e.g. an IOException during metadata extraction), `tryAwaitAll()` re-throws\nthe exception, which is caught by the outer `tryAsync` and stored as `Result.failure`. The\n`output.close()` line is never reached, so `output` remains open indefinitely. Any downstream\ncoroutine that iterates `for (item in output)` then blocks forever. In ExploreStep the `finalized`\nchannel can remain unclosed, causing `mergeTask` (which iterates `finalized`) to hang. `merge()`\nthen waits on `mergeTask` forever — a deadlock on any processing error.","fix":"Wrap the body of the outer `tryAsync` in a try/finally that always closes `output`:\n```kotlin\nreturn tryAsync(context) {\n    val deferreds = ArrayList<Deferred<Result<Unit>>>()\n    try {\n        for (i in 0 until n) {\n            deferreds.add(tryAsync(context) {\n                for (item in input) { block(item).let { output.send(it) } }\n            })\n        }\n        deferreds.tryAwaitAll()\n    } finally {\n        output.close()\n    }\n}\n```\nAlternatively, switch to `produce {}` + `consumeEach {}` which handle channel lifetime automatically.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/util/LangUtil.kt:77-98","code":"   77 | fun <T, R> CoroutineScope.mapParallel(\n   78 |     n: Int,\n   79 |     input: Channel<T>,\n   80 |     output: Channel<R>,\n   81 |     context: CoroutineContext = Dispatchers.Default,\n   82 |     block: suspend (T) -> R,\n   83 | ): Deferred<Result<Unit>> {\n   84 |     return tryAsync(context) {\n   85 |         val deferreds = ArrayList<Deferred<Result<Unit>>>()\n   86 |         for (i in 0 until n) {\n   87 |             val deferred =\n   88 |                 tryAsync(context) {\n   89 |                     for (item in input) {\n   90 |                         block(item).let { output.send(it) }\n   91 |                     }\n   92 |                 }\n   93 |             deferreds.add(deferred)\n   94 |         }\n   95 |         deferreds.tryAwaitAll()\n   96 |         output.close()\n   97 |     }\n   98 | }"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/pipeline/ExploreStep.kt:55-122","code":"   55 |         val classified = Channel<Classified>(Channel.UNLIMITED)\n   56 |         val classifiedTask =\n   57 |             scope.mapParallel(PARALLELISM, files, classified, Dispatchers.IO) { file ->\n   58 |                 if (\n   59 |                     file.mimeType == M3U.MIME_TYPE ||\n   60 |                         (!file.mimeType.startsWith(\"audio/\") &&\n   61 |                             file.mimeType != \"application/ogg\" &&\n   62 |                             file.mimeType != \"application/x-ogg\" &&\n   63 |                             file.mimeType != \"application/octet-stream\")\n   64 |                 ) {\n   65 |                     return@mapParallel Finalized(NotAudio)\n   66 |                 }\n   67 |                 when (val cacheResult = storage.cache.read(file)) {\n   68 |                     is CacheResult.Hit -> NeedsHydration(cacheResult.file)\n   69 |                     is CacheResult.Stale -> Finalized(NewSong(cacheResult.file))\n   70 |                     is CacheResult.Miss -> Finalized(NewSong(cacheResult.file))\n   71 |                 }\n   72 |             }\n   73 | \n   74 |         val finalized = Channel<Finalized>(Channel.UNLIMITED)\n   75 |         val exploredTask =\n   76 |             scope.mapParallel(PARALLELISM, classified, finalized, Dispatchers.IO) { item ->\n   77 |                 when (item) {\n   78 |                     is Finalized -> item\n   79 |                     is NeedsHydration -> {\n   80 |                         val audio = item.cachedFile.audio ?: return@mapParallel Finalized(NotAudio)\n   81 |                         val coverId =\n   82 |                             when (\n   83 |                                 val result = audio.coverId?.let { id -> storage.covers.obtain(id) }\n   84 |                             ) {\n   85 |                                 is CoverResult.Hit -> result.cover\n   86 |                                 is CoverResult.Miss ->\n   87 |                                     return@mapParallel Finalized(NewSong(item.cachedFile.file))\n   88 |                                 null -> null\n   89 |                             }\n   90 | \n   91 |                         Finalized(\n   92 |                             RawSong(\n   93 |                                 item.cachedFile.file,\n   94 |                                 audio.properties,\n   95 |                                 audio.tags,\n   96 |                                 coverId,\n   97 |                                 item.cachedFile.addedMs,\n   98 |                             )\n   99 |                         )\n  100 |                     }\n  101 |                 }\n  102 |             }\n  103 |         val playlists = Channel<Explored>(Channel.UNLIMITED)\n  104 |         val playlistsTask =\n  105 |             scope.tryAsyncWith(playlists, Dispatchers.IO) {\n  106 |                 for (playlist in storage.storedPlaylists.read()) {\n  107 |                     val rawPlaylist = RawPlaylist(playlist)\n  108 |                     it.send(rawPlaylist)\n  109 |                 }\n  110 |             }\n  111 | \n  112 |         val mergeTask =\n  113 |             scope.tryAsyncWith(explored, Dispatchers.Main) {\n  114 |                 for (item in finalized) {\n  115 |                     it.send(item.explored)\n  116 |                 }\n  117 |                 for (playlist in playlists) {\n  118 |                     it.send(playlist)\n  119 |                 }\n  120 |             }\n  121 | \n  122 |         return scope.merge(filesTask, classifiedTask, exploredTask, playlistsTask, mergeTask)"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/pipeline/ExtractStep.kt:65-142","code":"   65 |     override suspend fun extract(\n   66 |         scope: CoroutineScope,\n   67 |         explored: Channel<Explored>,\n   68 |         extracted: Channel<Extracted>,\n   69 |     ): Deferred<Result<Unit>> {\n   70 |         val addingMs = System.currentTimeMillis()\n   71 |         val extract = Channel<ParsedExtractItem>(PARALLELISM)\n   72 |         val extractTask =\n   73 |             scope.mapParallel(PARALLELISM, explored, extract, Dispatchers.IO) { item ->\n   74 |                 when (item) {\n   75 |                     is RawSong -> Finalized(item)\n   76 |                     is RawPlaylist -> Finalized(item)\n   77 |                     is NewSong -> {\n   78 |                         when (val result = metadataExtractor.extract(item.file)) {\n   79 |                             is MetadataResult.Success ->\n   80 |                                 result.metadata?.let { metadata -> NeedsParsing(item, metadata) }\n   81 |                                     ?: Finalized(InvalidSong)\n   82 |                             MetadataResult.NoMetadata -> Finalized(InvalidSong)\n   83 |                             MetadataResult.NotAudio -> Finalized(NotAudio)\n   84 |                             MetadataResult.ProviderFailed -> Finalized(InvalidSong)\n   85 |                         }\n   86 |                     }\n   87 |                     is NotAudio -> Finalized(NotAudio)\n   88 |                 }\n   89 |             }\n   90 |         val parsed = Channel<ParsedCachingItem>(Channel.UNLIMITED)\n   91 |         val parsedTask =\n   92 |             scope.mapParallel(PARALLELISM, extract, parsed, Dispatchers.IO) { item ->\n   93 |                 when (item) {\n   94 |                     is Finalized -> item\n   95 |                     is NeedsParsing -> {\n   96 |                         val tags = tagParser.parse(item.metadata)\n   97 |                         val cover =\n   98 |                             when (val result = covers.create(item.newSong.file, item.metadata)) {\n   99 |                                 is CoverResult.Hit -> result.cover\n  100 |                                 else -> null\n  101 |                             }\n  102 |                         NeedsCaching(\n  103 |                             RawSong(\n  104 |                                 item.newSong.file,\n  105 |                                 item.metadata.properties,\n  106 |                                 tags,\n  107 |                                 cover,\n  108 |                                 // The thing about date added is that it's resolution can\n  109 |                                 // actually be expensive in some modes (ex. saf backend), so\n  110 |                                 // we resolve this by moving date added extraction as an\n  111 |                                 // extraction operation rather than doing the redundant work\n  112 |                                 // during exploration (well, kind of, MediaStore's date\n  113 |                                 // added query is basically free, it's only saf that has\n  114 |                                 // it's slow hacky workaround that we must accommodate\n  115 |                                 // here.)\n  116 |                                 item.newSong.file.addedMs.resolve() ?: addingMs,\n  117 |                             )\n  118 |                         )\n  119 |                     }\n  120 |                 }\n  121 |             }\n  122 |         val finalizedTask =\n  123 |             scope.tryAsyncWith(extracted, Dispatchers.IO) {\n  124 |                 val exclude = mutableListOf<CachedFile>()\n  125 |                 for (item in parsed) {\n  126 |                     val result =\n  127 |                         when (item) {\n  128 |                             is Finalized -> item\n  129 |                             is NeedsCaching -> {\n  130 |                                 cache.write(item.rawSong.toCachedFile())\n  131 |                                 Finalized(item.rawSong)\n  132 |                             }\n  133 |                         }\n  134 |                     if (result.extracted is RawSong) {\n  135 |                         exclude.add(result.extracted.toCachedFile())\n  136 |                     }\n  137 |                     it.send(result.extracted)\n  138 |                 }\n  139 |                 cache.cleanup(exclude)\n  140 |             }\n  141 | \n  142 |         return scope.merge(extractTask, parsedTask, finalizedTask)"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In WavySlider.updateActiveTrackSuppression(), the local variable `suppress` is always hardcoded\nto `true` (line 644: `val suppress = true`). The suppression of the linear active track is\ntherefore never lifted—the wavy slider always suppresses the original straight active track even\nwhen the wave is disabled. This means the straight-track fallback never appears when `waveEnabled`\nis false and there is no transition in progress, which is likely unintended.","fix":"Replace `val suppress = true` with the intended condition, presumably `val suppress = shouldDrawWave()` (i.e. suppress when wave is active or transitioning).","locations":[{"ref":"app/src/main/java/com/google/android/material/slider/WavySlider.kt:644","code":"  644 |         val suppress = true"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In WavySlider.invalidateCachedWavePath(), the loop runs `for (i in 0..cycleCount)` (inclusive),\nso it generates `cycleCount + 1` cubic Bezier pairs. The wave path therefore always has one extra\nwavelength appended beyond what fits in the track. While the extra segment is needed for the\nphase-scroll wrapping trick, the comment in the code does not explain this and the variable\n`cycleCount` is named as if it is the final count (misleading), making maintenance error-prone.\nMore concretely, if `cycleCount` is exactly 1 (very short track), the loop runs twice (i=0 and\ni=1), producing a path with 4 cubic segments instead of 2, which could cause rendering artifacts\nat extreme zoom or very small slider widths.","fix":"Add a comment explaining the intentional extra cycle, or cap the loop to `0 until cycleCount + 1` and document why the extra cycle is needed for phase scrolling.","locations":[{"ref":"app/src/main/java/com/google/android/material/slider/WavySlider.kt:692","code":"  692 |         for (i in 0..cycleCount) {"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In AuxioService.onLoadChildren() (both overloads, lines 105-117), the `options` Bundle parameter\nin the second overload is ignored entirely—the options-aware overload calls the exact same\n`musicFragment.getChildren(parentId, maximumRootChildLimit, result)` as the no-options overload.\nThe Android Media APIs pass important hints (e.g., page number, page size for pagination) in the\noptions Bundle. Ignoring them means paginated browsing from Android Auto/media controllers cannot\nwork correctly, and all items will always be returned regardless of page hints.","fix":"Pass the `options` Bundle to `musicFragment.getChildren()` and handle pagination hints (EXTRA_PAGE, EXTRA_PAGE_SIZE) if pagination support is needed, or at minimum document why options are intentionally ignored.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/AuxioService.kt:110-117","code":"  110 |     override fun onLoadChildren(\n  111 |         parentId: String,\n  112 |         result: Result<MutableList<MediaItem>>,\n  113 |         options: Bundle,\n  114 |     ) {\n  115 |         val maximumRootChildLimit = getRootChildrenLimit()\n  116 |         musicFragment.getChildren(parentId, maximumRootChildLimit, result)\n  117 |     }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In SongDetailDialog.updateSong(), the log message always says \"No song to show, navigating away\"\nregardless of whether the song is null or non-null. When `song != null` the function just returns\nwithout navigating, so the log is flat-out wrong in that case and would confuse anyone debugging.\nThe function body runs `L.d(...)` first, then checks `if (song == null)`, so the message fires\non every invocation, including successful ones.","fix":"Move the log inside the null branch: `if (song == null) { L.d(\"No song to show, navigating away\"); findNavController().navigateUp(); return }`.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/detail/SongDetailDialog.kt:70-74","code":"   70 |         L.d(\"No song to show, navigating away\")\n   71 |         if (song == null) {\n   72 |             findNavController().navigateUp()\n   73 |             return\n   74 |         }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In HomeFragment.handlePlaylistDecision(), the `musicModel.playlistDecision.consume()` call is\ninvoked and the function returns early only for the `PlaylistDecision.Import` case (lines 348-350).\nAll other decision cases navigate via `findNavController().navigateSafe(directions)` at line 376,\nbut they never consume `playlistDecision`. This means the next observer in any other fragment that\nalso collects `playlistDecision` (such as AlbumDetailFragment or ArtistDetailFragment) would\nre-process the already-handled decision after it has been acted upon in HomeFragment. In detail\nfragments the other decision types (New, Rename, Delete, Export) would hit `error(...)` and crash.\nThis only manifests when both HomeFragment and a detail fragment are simultaneously observing\n`playlistDecision`, which can happen during navigation animations.","fix":"Add `musicModel.playlistDecision.consume()` before the `findNavController().navigateSafe(directions)` call at the end of `handlePlaylistDecision`.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/home/HomeFragment.kt:376","code":"  376 |         findNavController().navigateSafe(directions)"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In HomeSettings.migrate(), the SharedPreferences edit block uses `putInt` then calls `apply()`\ninside the same `edit { }` lambda. The `edit { }` extension from `androidx.core.content` already\ncalls `apply()` (or `commit()`) automatically at the end of the lambda. The explicit `apply()`\ncall at line 88 is therefore a no-op (redundant), but more importantly makes the intent unclear\nand could cause issues if someone later wraps this in a synchronous `commit()` call instead.","fix":"Remove the explicit `apply()` call inside the `edit { }` block; the extension already commits.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/home/HomeSettings.kt:86-88","code":"   86 |             sharedPreferences.edit {\n   87 |                 putInt(getString(R.string.set_key_home_tabs), Tab.toIntCode(oldTabs))\n   88 |                 remove(OLD_KEY_LIB_TABS)"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In Tab.fromIntCode(), the validity check at line 143 is `distinct.size < MAX_SEQUENCE_IDX`.\nMAX_SEQUENCE_IDX is 4, meaning a 4-tab result is rejected (< 4 means 0..3 are rejected). But the\ndefault tab set has 5 tabs (Songs, Albums, Artists, Genres, Playlists) and MAX_SEQUENCE_IDX is the\nindex of the last tab (4), not the count. A well-formed 5-tab sequence gives distinct.size == 5,\nwhich passes `5 < 4` → false (ok), but a 4-tab sequence (which could be valid if one tab type was\nlegitimately absent) gives `4 < 4` → false (ok too). The real problem is that a 5-tab sequence\nwith exactly 4 distinct entries (one duplicate removed) would give distinct.size == 4, which passes\nwhen it probably shouldn't. The boundary condition is at best confusing and at worst allows\nshorter-than-expected sequences through.","fix":"The intent appears to be to require exactly MAX_SEQUENCE_IDX+1 (= 5) tabs. Change the condition to `distinct.size != MAX_SEQUENCE_IDX + 1` or add an explicit comment justifying the current boundary.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/home/tabs/Tab.kt:143","code":"  143 |             if (distinct.isEmpty() || distinct.size < MAX_SEQUENCE_IDX) {"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In MusicSettingsImpl.revision setter, the SharedPreferences edit block calls both putString and apply(), but apply() inside an edit { } block is a no-op because edit { } already commits after the lambda. The apply() inside the lambda is the SharedPreferences.Editor.apply(), not the Kotlin extension, so it commits immediately and then the outer edit { } commits a second time. This is harmless but misleading. The same pattern appears in the separators setter.","fix":"Remove the redundant inner apply() calls; the androidx core-ktx edit { } extension already calls commit/apply after the block.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/MusicSettings.kt:89-94","code":"   89 |         set(value) {\n   90 |             sharedPreferences.edit {\n   91 |                 putString(getString(R.string.set_key_library_revision), value.toString())\n   92 |                 apply()\n   93 |             }\n   94 |         }"},{"ref":"app/src/main/java/org/oxycblt/auxio/music/MusicSettings.kt:103-108","code":"  103 |         set(value) {\n  104 |             sharedPreferences.edit {\n  105 |                 putString(getString(R.string.set_key_separators), value)\n  106 |                 apply()\n  107 |             }\n  108 |         }"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In MusicUtil.areNamesTheSame, the loop iterates from 0 to max(size, other.size) but returns false if getOrNull(i) is null (line 67-68). This means if the lists have different sizes the function will return false when the shorter list runs out, which is correct. However, the loop bound uses max() so the code effectively iterates max(n,m) times even though it will always return false on the first missing element. More importantly, if *both* lists are empty the loop never executes and the function returns true – that is correct – but if one list has size 0 and the other has size > 0, the loop body immediately returns false (correct). The real bug is subtle: getOrNull(i) ?: return false on line 67 will return false when oldItem is null. But b is also checked: if b is null it also returns false. So two lists of the same length where all names match will correctly return true. The logic is actually correct but needlessly O(max(n,m)) with early-return making the effective behavior O(min(n,m)+1 at most). However there is still a genuine flaw: if size != other.size the function may return false for different reasons than name mismatch, but callers that use it as a pure name-comparison check (e.g. in DiffCallbacks) may miss updates when list lengths change while names stay identical for the shorter portion. The function should check size equality first.","fix":"Add `if (size != other.size) return false` at the start of areNamesTheSame, and change the loop to use `indices` of either list since they are now guaranteed equal in length.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/MusicUtil.kt:65-75","code":"   65 | fun <T : Music> List<T>.areNamesTheSame(other: List<T>): Boolean {\n   66 |     for (i in 0 until max(size, other.size)) {\n   67 |         val a = getOrNull(i) ?: return false\n   68 |         val b = other.getOrNull(i) ?: return false\n   69 |         if (a.name != b.name) {\n   70 |             return false\n   71 |         }\n   72 |     }\n   73 | \n   74 |     return true\n   75 | }"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In NewPlaylistDialog.updatePendingPlaylist (line 111), the code checks `if (args.template != null)` to decide whether to populate the text field, but also checks `if (pendingNewPlaylist.template != null)` (line 107). When template is null the else branch uses `pendingNewPlaylist.preferredName` as a hint. However when the library changes and the callback fires again with a new pendingNewPlaylist (e.g. song UIDs refreshed), but initializedField is already true, the function returns early (line 108: `if (initializedField) return`). This is only reached when template != null. So far so good. But consider: if the user had a template set (initializedField=true) and the library reloads with the song list changed (onMusicChanges fires), the dialog still shows stale song contents from the old pendingPlaylist even though the ViewModel now has a different song list. The dialog will create a playlist with the old (possibly deleted) songs.","fix":"Track song-list changes separately from name field initialization. Only guard the text field initialization with initializedField, but always accept updated songs from the ViewModel.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/decision/NewPlaylistDialog.kt:100-117","code":"  100 |     private fun updatePendingPlaylist(pendingNewPlaylist: PendingNewPlaylist?) {\n  101 |         if (pendingNewPlaylist == null) {\n  102 |             L.d(\"No playlist to create, leaving\")\n  103 |             findNavController().navigateUp()\n  104 |             return\n  105 |         }\n  106 |         val binding = requireBinding()\n  107 |         if (pendingNewPlaylist.template != null) {\n  108 |             if (initializedField) return\n  109 |             initializedField = true\n  110 |             // Need to convert args.existingName to an Editable\n  111 |             if (args.template != null) {\n  112 |                 binding.playlistName.text = EDITABLE_FACTORY.newEditable(args.template)\n  113 |             }\n  114 |         } else {\n  115 |             binding.playlistName.hint = pendingNewPlaylist.preferredName\n  116 |         }\n  117 |     }"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"PlaylistPickerViewModel.setPendingPlaylist accesses musicRepository.library twice (lines 157 and 159-174) without holding a lock, and the library reference could change between the two calls if a re-index occurs on a background thread simultaneously. The local variable `library` (line 157) is used only for the do-while loop condition, while a second call `musicRepository.library?.let { ... }` is made on line 164. If the library is replaced between these two calls the loop uses one library instance for the name uniqueness check but resolves songs from potentially a different one.","fix":"Capture `val library = musicRepository.library ?: return` once at the top and use that single reference throughout the function.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/decision/PlaylistPickerViewModel.kt:156-184","code":"  156 |         L.d(\"Opening ${songUids.size} songs to create a playlist from\")\n  157 |         val library = musicRepository.library ?: return\n  158 |         val songs =\n  159 |             musicRepository.library\n  160 |                 ?.let { songUids.mapNotNull(it::findSong) }\n  161 |                 ?.also(::refreshPlaylistChoices)\n  162 | \n  163 |         val possibleName =\n  164 |             musicRepository.library?.let {\n  165 |                 // Attempt to generate a unique default name for the playlist, like \"Playlist 1\".\n  166 |                 var i = 1\n  167 |                 var possibleName: String\n  168 |                 do {\n  169 |                     possibleName = context.getString(R.string.fmt_def_playlist, i)\n  170 |                     L.d(\"Trying $possibleName as a playlist name\")\n  171 |                     ++i\n  172 |                 } while (library.playlists.any { it.name.resolve(context) == possibleName })\n  173 |                 L.d(\"$possibleName is unique, using it as the playlist name\")\n  174 |                 possibleName\n  175 |             }\n  176 | \n  177 |         _currentPendingNewPlaylist.value =\n  178 |             if (possibleName != null && songs != null) {\n  179 |                 PendingNewPlaylist(possibleName, songs, template, reason)\n  180 |             } else {\n  181 |                 L.w(\"Given song UIDs to create were invalid\")\n  182 |                 null\n  183 |             }\n  184 |     }"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In LocationAdapter.addAll, duplicate entries are not filtered out. The add function (single item) checks `if (_locations.contains(location)) return`, but addAll simply calls _locations.addAll(locations) without any deduplication, so adding overlapping lists will insert duplicates into the adapter.","fix":"Filter duplicates in addAll: `val toAdd = locations.filter { !_locations.contains(it) }` and use toAdd instead of locations.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/locations/LocationAdapter.kt:73-83","code":"   73 |     fun addAll(locations: List<T>) {\n   74 |         L.d(\"Adding ${locations.size} locations\")\n   75 |         val wasEmpty = _locations.isEmpty()\n   76 |         val oldSize = _locations.size\n   77 |         _locations.addAll(locations)\n   78 |         if (wasEmpty && locations.isNotEmpty()) {\n   79 |             notifyItemChanged(0)\n   80 |         } else if (locations.isNotEmpty()) {\n   81 |             notifyItemRangeInserted(oldSize, locations.size)\n   82 |         }\n   83 |     }"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In LocationAdapter.remove, the function calls `_locations.indexOf(location)` and then unconditionally calls `_locations.removeAt(idx)` without checking if idx == -1. If the location is not in the list (which can happen due to a race with another mutation or duplicate calls), removeAt(-1) will throw IndexOutOfBoundsException.","fix":"Guard the removeAt call: `val idx = _locations.indexOf(location); if (idx == -1) { L.w(\"Location not found\"); return }; _locations.removeAt(idx); ...`","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/locations/LocationAdapter.kt:85-94","code":"   85 |     fun remove(location: T) {\n   86 |         L.d(\"Removing $location\")\n   87 |         val idx = _locations.indexOf(location)\n   88 |         _locations.removeAt(idx)\n   89 |         if (_locations.isEmpty()) {\n   90 |             notifyItemChanged(0)\n   91 |         } else {\n   92 |             notifyItemRemoved(idx)\n   93 |         }\n   94 |     }"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In LocationsDialog, the addDocumentTreeUriToDirs callback does NOT null-check `location` result from Location.Unopened.from(context, uri). The API signature requires a non-null return from Location.Unopened.from according to the import, but the function does check for ThirdParty volumes. More concretely, when addDocumentTreeUriToDirs is called for the localOnlyOpenDocumentTreeLauncher path (locationsFilterAdd), the pendingLocationCallback invoked is the filterLocationAdapter.add callback, which uses Location.Unopened typed adapter. However, the disableThirdParty=true path calls `requireContext().showToast` and sets pendingLocationCallback = null before the callback is invoked, so no crash. The real issue is that openDocumentTreeLauncher = null is set in onDestroyBinding but localOnlyOpenDocumentTreeLauncher is NOT nulled out in onDestroyBinding (line 279-283). A callback from the activity result contract that arrives after the binding is destroyed will thus dereference the dangling localOnlyOpenDocumentTreeLauncher reference.","fix":"Add `localOnlyOpenDocumentTreeLauncher = null` alongside `openDocumentTreeLauncher = null` in onDestroyBinding.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/locations/LocationsDialog.kt:277-284","code":"  277 |     override fun onDestroyBinding(binding: DialogMusicLocationsBinding) {\n  278 |         super.onDestroyBinding(binding)\n  279 |         openDocumentTreeLauncher = null\n  280 |         storagePermissionLauncher = null\n  281 |         binding.locationsIncludeRecycler.adapter = null\n  282 |         binding.locationsExcludeRecycler.adapter = null\n  283 |         binding.locationsFilterRecycler.adapter = null\n  284 |     }"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In IndexerNotifications.IndexingNotification.updateIndexingState, when a IndexingProgress.Songs event arrives, the notification reads the current time twice: once to check the throttle (now = SystemClock.elapsedRealtime()) and then again to store the update time (lastUpdateTime = SystemClock.elapsedRealtime()). Between those two calls, real time advances, so lastUpdateTime is always slightly later than the value used for the throttle check. In a pathological case where the system clock ticks between the two calls this can lead to very slightly inaccurate throttle windows – negligible in practice but still incorrect.","fix":"Capture `val now = SystemClock.elapsedRealtime()` once and reuse it for both the check and the assignment.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/service/IndexerNotifications.kt:79-89","code":"   79 |                 val now = SystemClock.elapsedRealtime()\n   80 |                 if (lastUpdateTime > -1 && (now - lastUpdateTime) < 1500) {\n   81 |                     return false\n   82 |                 }\n   83 |                 lastUpdateTime = SystemClock.elapsedRealtime()\n   84 |                 L.d(\"Updating state to $progress\")\n   85 |                 setContentText(\n   86 |                     context.getString(R.string.fmt_indexing, progress.loaded, progress.explored)\n   87 |                 )\n   88 |                 setProgress(progress.loaded, progress.explored, false)\n   89 |                 return true"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In IndexingHolder.acquireSafe and releaseSafe, each extension function references the outer class field `wakeLock` instead of the receiver `this`. The receiver (parameter named `this` of type PowerManager.WakeLock) is shadowed by the outer class field also named `wakeLock`. So `if (!wakeLock.isHeld)` and `if (wakeLock.isHeld)` check the outer field, not the receiver, meaning if these functions were ever called on a *different* WakeLock instance (e.g. in a subclass or during testing) they would incorrectly check/release the wrong lock. Currently there is only one WakeLock so this is latent, but the code expresses the wrong intent.","fix":"Use the receiver instead of the outer field: change `if (!wakeLock.isHeld)` to `if (!isHeld)` and `if (wakeLock.isHeld)` to `if (isHeld)` inside the extension functions.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/service/IndexingHolder.kt:212-230","code":"  212 |     private fun PowerManager.WakeLock.acquireSafe() {\n  213 |         // Avoid unnecessary acquire calls.\n  214 |         if (!wakeLock.isHeld) {\n  215 |             L.d(\"Acquiring wake lock\")\n  216 |             // Time out after a minute, which is the average music loading time for a medium-sized\n  217 |             // library. If this runs out, we will re-request the lock, and if music loading is\n  218 |             // shorter than the timeout, it will be released early.\n  219 |             acquire(WAKELOCK_TIMEOUT_MS)\n  220 |         }\n  221 |     }\n  222 | \n  223 |     /** Utility to safely release a [PowerManager.WakeLock] without crashes/inefficiency. */\n  224 |     private fun PowerManager.WakeLock.releaseSafe() {\n  225 |         // Avoid unnecessary release calls.\n  226 |         if (wakeLock.isHeld) {\n  227 |             L.d(\"Releasing wake lock\")\n  228 |             release()\n  229 |         }\n  230 |     }"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In MusicBrowser.getItem, the item is fetched from the repository twice unnecessarily and incorrectly: the inner find call passes it.uid (the uid of the already-found item) back to find, which is always the same object – adding zero value but wasting a lookup. The intent appears to be a no-op lookup, but it is confusing and could silently hide a case where the item should be re-resolved from the library.","fix":"Replace the double lookup with a single call: `val music = when (val uid = MediaSessionUID.fromString(mediaId)) { is MediaSessionUID.SingleItem -> musicRepository.find(uid.uid) ... }`","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/service/MusicBrowser.kt:119-121","code":"  119 |                 is MediaSessionUID.SingleItem ->\n  120 |                     musicRepository.find(uid.uid)?.let { musicRepository.find(it.uid) }\n  121 |                 null -> null"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In MusicBrowser.getChildren (via getCategoryMediaItems), when there are more tabs than maxTabs, the code builds a \"More\" tab as the last entry: `tabs.take(maxTabs - 1).map { … } + TabNode.More.toMediaItem(context)`. However, when getChildren is called with maxTabs == 0 or maxTabs == 1, `tabs.take(maxTabs - 1)` becomes `tabs.take(-1)` or `tabs.take(0)`, both of which return an empty list. The first case (maxTabs == 0) calls take(-1) which Kotlin's stdlib silently treats as take(0), so only the \"More\" item is shown with no real tabs – but every tab is then reported under the \"More\" node (line 203: `homeGenerator.tabs().drop(maxTabs - 1)` = `drop(-1)` = `drop(0)` = all tabs), which causes infinite recursion-like confusion in automotive clients that drive the root/more split.","fix":"Guard against maxTabs <= 1 and treat it as showing all tabs directly.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/service/MusicBrowser.kt:191-213","code":"  191 |     private fun getCategoryMediaItems(node: TabNode, maxTabs: Int) =\n  192 |         when (node) {\n  193 |             is TabNode.Root -> {\n  194 |                 val tabs = homeGenerator.tabs()\n  195 |                 if (maxTabs < tabs.size) {\n  196 |                     tabs.take(maxTabs - 1).map { TabNode.Home(it).toMediaItem(context) } +\n  197 |                         TabNode.More.toMediaItem(context)\n  198 |                 } else {\n  199 |                     tabs.map { TabNode.Home(it).toMediaItem(context) }\n  200 |                 }\n  201 |             }\n  202 |             is TabNode.More -> {\n  203 |                 homeGenerator.tabs().drop(maxTabs - 1).map { TabNode.Home(it).toMediaItem(context) }\n  204 |             }\n  205 |             is TabNode.Home ->\n  206 |                 // homeGenerator returns emptyLists\n  207 |                 when (node.type) {\n  208 |                     MusicType.SONGS -> homeGenerator.songs().map { it.toMediaItem(context) }\n  209 |                     MusicType.ALBUMS -> homeGenerator.albums().map { it.toMediaItem(context) }\n  210 |                     MusicType.ARTISTS -> homeGenerator.artists().map { it.toMediaItem(context) }\n  211 |                     MusicType.GENRES -> homeGenerator.genres().map { it.toMediaItem(context) }\n  212 |                     MusicType.PLAYLISTS -> homeGenerator.playlists().map { it.toMediaItem(context) }\n  213 |                 }"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In ExoPlaybackStateHolder.newPlayback, the `.also` block is called on the nullable result of `command.song?.let { command.queue.indexOf(it) }`. When `command.song` is null the chain evaluates to `null`, so `.also { check(it != -1) }` receives `null` (not -1) and the check always passes silently — the guard that should crash on a missing song is a no-op whenever `command.song` is null. The intent was to crash if indexOf returned -1, but the check is attached via `also` before the null is distinguished from -1.","fix":"Move the check inside the `let` lambda so it only runs when `command.song != null`: `command.song?.let { s -> val idx = command.queue.indexOf(s); check(idx != -1) { \"Start song not in queue\" }; idx }`.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/service/ExoPlaybackStateHolder.kt:252-255","code":"  252 |         val startIndex =\n  253 |             command.song\n  254 |                 ?.let { command.queue.indexOf(it) }\n  255 |                 .also { check(it != -1) { \"Start song not in queue\" } }"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In ExoPlaybackStateHolder.onPlaybackStateChanged, when the player reaches STATE_ENDED with REPEAT_MODE_OFF the code calls the internal `goto(0)` which goes through `unscrambleQueueIndices()` to translate the logical 0-index. However `goto` also calls `player.play()` (when rememberPause is false), which immediately restarts playback — right before `player.pause()` is called. The play/pause pair happens in the same call but `play` triggers `onPlayWhenReadyChanged` which marks `sessionOngoing = true` again. This causes the subsequent `player.pause()` and `goto` to fight each other and can leave the session in a playing state after what should be a final stop.","fix":"Instead of reusing `goto(0)`, seek directly and avoid the internal play/pause conflict: call `player.seekTo(player.currentTimeline.getFirstWindowIndex(player.shuffleModeEnabled), C.TIME_UNSET)` then `player.pause()`, and issue a single `playbackManager.ack(this, StateAck.IndexMoved)`.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/service/ExoPlaybackStateHolder.kt:489-496","code":"  489 |     override fun onPlaybackStateChanged(playbackState: Int) {\n  490 |         super.onPlaybackStateChanged(playbackState)\n  491 | \n  492 |         if (playbackState == Player.STATE_ENDED && player.repeatMode == Player.REPEAT_MODE_OFF) {\n  493 |             goto(0)\n  494 |             player.pause()\n  495 |         }\n  496 |     }"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In PlaybackCommandFactoryImpl.newCommand (the generic overload that disambiguates artist/genre parents), the fallback condition checks `song.genres.size == 1` instead of checking the size of the provided `parents` list. When called for artist disambiguation (`songFromArtist`), `parents` is `song.artists`, but the code examines `song.genres`. A song with a single artist but multiple genres (or vice versa) will be incorrectly handled: the genre check will pass/fail when the artist count is what matters.","fix":"Replace `song.genres.size == 1` with `parents.size == 1` so the condition correctly checks whether the relevant parent collection is unambiguous.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/state/PlaybackCommand.kt:146","code":"  146 |         } else if (song.genres.size == 1) {"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In PlaybackStateManagerImpl.requestAction, the guard for a mismatched stateHolder is only enforced in DEBUG builds (`BuildConfig.DEBUG && ...`). In release builds, if a stale or wrong stateHolder calls requestAction, the pending deferred action will be dispatched to it unconditionally. The symmetric guard in `ack` has the same issue. This is inconsistent with `unregisterStateHolder` which always checks identity.","fix":"Remove the `BuildConfig.DEBUG &&` guard so the identity check always applies, or at minimum keep the early return without the debug gate.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/state/PlaybackStateManager.kt:544-548","code":"  544 |     override fun requestAction(stateHolder: PlaybackStateHolder) {\n  545 |         if (BuildConfig.DEBUG && this.stateHolder !== stateHolder) {\n  546 |             L.w(\"Given internal player did not match current internal player\")\n  547 |             return\n  548 |         }"},{"ref":"app/src/main/java/org/oxycblt/auxio/playback/state/PlaybackStateManager.kt:585-589","code":"  585 |     override fun ack(stateHolder: PlaybackStateHolder, ack: StateAck) {\n  586 |         if (BuildConfig.DEBUG && this.stateHolder !== stateHolder) {\n  587 |             L.w(\"Given internal player did not match current internal player\")\n  588 |             return\n  589 |         }"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In LangUtil.kt, the splitEscaped() function's escape-handling condition is wrong. At line 92 it\nchecks `b != null && a == '\\\\' && a == selector`. Because `a == '\\\\'` and `a == selector`\nare ANDed together, this condition is only true when the separator character IS the backslash\ncharacter itself. For any other separator (which is the common case), the escape branch is dead\ncode and can never execute, making the \"escaped separator\" feature non-functional.","fix":"Change to `b != null && a == '\\\\' && b == selector` so that a backslash followed by the separator is treated as an escaped separator.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/util/LangUtil.kt:92","code":"   92 |         if (b != null && a == '\\\\' && a == selector) {"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In WidgetBitmapTransformation.transform(), the scaling condition at line 49 is\n`if (inputArea != maxBitmapArea)`. This means the bitmap is only scaled when the area is not\nexactly equal to the cap—but due to floating point and integer arithmetic, `inputArea` will almost\nnever equal `maxBitmapArea` exactly. The check should be `if (inputArea > maxBitmapArea)` to only\nscale down (not up) images that exceed the cap; otherwise tiny bitmaps would be upscaled to the\ncap area, wasting memory rather than saving it.","fix":"Change `if (inputArea != maxBitmapArea)` to `if (inputArea > maxBitmapArea)` so only oversized bitmaps are downscaled.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/widgets/WidgetBitmapTransformation.kt:49","code":"   49 |         if (inputArea != maxBitmapArea) {"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In WidgetProvider.newDefaultLayout(), `setupBackground(uiSettings)` is called twice in a chain\n(lines 185-186). The second call is redundant and has no effect since the method is idempotent,\nbut it indicates a copy-paste error. Only one call is needed.","fix":"Remove the duplicate `.setupBackground(uiSettings)` call.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/widgets/WidgetProvider.kt:185-187","code":"  185 |         newRemoteViews(context, R.layout.widget_default)\n  186 |             .setupBackground(uiSettings)\n  187 |             .setupBackground(uiSettings)"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In DBCache.read() the in-memory mapping is populated once from the database and never invalidated. MutableDBCache.write() inserts or replaces rows in the database but does not clear or update the DBCache.mapping field. Within the same session, any subsequent call to read() for a file that was just written will return the pre-write stale data (a Miss or old Hit), not the newly cached entry. This defeats the purpose of write-then-read patterns.","fix":"After a write, set `inner.mapping = null` (under the lock) to force a reload on the next read, or update the mapping in-place with the newly written entry.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/cache/db/DBCache.kt:40-47","code":"   40 |     private var mapping: Map<Uri, CachedFileData>? = null\n   41 |     private val mappingLock = Mutex()\n   42 | \n   43 |     override suspend fun read(file: File): CacheResult {\n   44 |         val currentMapping =\n   45 |             mappingLock.withLock {\n   46 |                 mapping ?: readDao.selectAllSongs().associateBy { it.uri }.also { mapping = it }\n   47 |             }"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/cache/db/DBCache.kt:120-153","code":"  120 |     override suspend fun
