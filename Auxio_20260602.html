48 |                 replayGainTrackAdjustment = cachedFile.audio?.tags?.replayGainTrackAdjustment,\n  149 |                 replayGainAlbumAdjustment = cachedFile.audio?.tags?.replayGainAlbumAdjustment,\n  150 |                 coverId = cachedFile.audio?.coverId,\n  151 |             )\n  152 |         writeDao.updateSong(dbSong)\n  153 |     }"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In FSCoverStorage.write(), the return value of File.renameTo() is silently discarded. If the rename fails (returns false), the temp file remains on disk and targetFile does not exist, yet FSStoredCover(targetFile) is still returned. Any subsequent call to open() or fd() on this cover will fail because the backing file does not exist. The rename failure is not surfaced as an exception, so callers cannot detect or recover from it.","fix":"Check the return value and throw on failure: `if (!tempFile.renameTo(targetFile)) { tempFile.delete(); throw IOException(\"Failed to rename temp file to target\") }`. This also ensures the temp file is cleaned up on rename failure.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/covers/stored/CoverStorage.kt:119-120","code":"  119 |                         tempFile.renameTo(targetFile)\n  120 |                         FSStoredCover(targetFile)"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In DocumentPathFactoryImpl.unpackDocumentTreeUri(), the code builds an intermediate document URI using DocumentsContract.buildDocumentUriUsingTree() and then immediately calls DocumentsContract.getTreeDocumentId() on it. The result of getTreeDocumentId() on the newly constructed URI is exactly the same string as the tree document ID retrieved by the first getTreeDocumentId(uri) call. The two intermediate steps (buildDocumentUriUsingTree + getTreeDocumentId on the result) are a no-op and add confusion.","fix":"Simplify to: `return from for (cluster in artistUidClusters.values) {\n  262 |             // everything in the cluster must have the same pre-artist\n  263 |             val canon = cluster.maxBy { it.songVertices.size }.preArtist\n  264 |             val same = cluster.all { it.preArtist == canon }\n  265 |             if (!same) {\n  266 |                 // invalid mbid setup, strip mbids from all artists in the cluster\n  267 |                 val noMbidPreArtist = canon\n  268 |                 val simpleMbidVertex =\n  269 |                     artistVertices.getOrPut(noMbidPreArtist) { ArtistVertex(noMbidPreArtist) }\n  270 |                 for (artist in cluster) {\n  271 |                     meldArtistVertices(artist, simpleMbidVertex)\n  272 |                 }\n  273 |             }\n  274 |         }"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/graph/MusicGraph.kt:281-297","code":"  281 |         // second pass: check for identical uids and meld together vertices w/the same uid\n  282 |         // to prevent broken album objects\n  283 |         val uidClusters = albumVertices.values.groupBy { it.preAlbum.uid }\n  284 |         for (cluster in uidClusters.values) {\n  285 |             val canon = cluster.maxBy { it.songVertices.size }.preAlbum\n  286 |             val same = cluster.all { it.preAlbum == canon }\n  287 |             if (!same) {\n  288 |                 val noMbidPreAlbum = canon\n  289 |                 val simpleMbidVertex =\n  290 |                     albumVertices.getOrPut(noMbidPreAlbum) {\n  291 |                         AlbumVertex(noMbidPreAlbum, mutableListOf())\n  292 |                     }\n  293 |                 for (album in cluster) {\n  294 |                     meldAlbumVertices(album, simpleMbidVertex)\n  295 |                 }\n  296 |             }\n  297 |         }"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"meldGenreVertices replaces only the first occurrence of the source GenreVertex in a song's genreVertices list (via indexOf + single assignment at index). If a song was constructed with duplicate genre entries (same PreGenre tag appearing more than once in preSong.preGenres, which is possible), subsequent occurrences remain pointing to the removed src vertex. These become stale references: genreVertices.remove(src.preGenre) deletes the source vertex from the map, so src.tag is never set by LibraryFactory. When LibraryFactory.SongVertexCore.resolveGenres() calls tag(it) for each genreVertex, the stale entry causes the check to fail with 'Dead Vertex Detected' (LibraryFactory.kt:133), crashing library construction.","fix":"Replace the single indexOf+replace pattern with a loop over all indices (matching the approach used in meldArtistVertices lines 421-425): src.songVertices.forEach { sv -> for (idx in sv.genreVertices.indices) { if (sv.genreVertices[idx] == src) sv.genreVertices[idx] = dst } }","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/graph/MusicGraph.kt:355-366","code":"  355 |         // Update all songs and artists to point to the relevant genre.\n  356 |         src.songVertices.forEach {\n  357 |             val index = it.genreVertices.indexOf(src)\n  358 |             check(index >= 0) { \"Illegal state: directed edge between genre and song\" }\n  359 |             it.genreVertices[index] = dst\n  360 |         }\n  361 |         src.artistVertices.forEach {\n  362 |             it.genreVertices.remove(src)\n  363 |             it.genreVertices.add(dst)\n  364 |         }\n  365 |         // Remove the irrelevant genre from the graph.\n  366 |         genreVertices.remove(src.preGenre)"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/model/LibraryFactory.kt:93","code":"   93 |         override fun resolveGenres(): List<Genre> = vertex.genreVertices.map { tag(it) }"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/model/LibraryFactory.kt:131-134","code":"  131 |         private inline fun <reified T : Mu     // Since the navigation listener is also reliant on the bottom sheets, we must also update\n  375 |         // it every frame.\n  376 |         requireNotNull(sheetBackCallback) { \"SheetBackPressedCallback was not available\" }\n  377 |             .invalidateEnabled()\n  378 | \n  379 |         // Stop the FrameLayout containing the fabs from eating touch events elsewhere\n  380 |         binding.mainFabContainer.isVisible =\n  381 |             binding.homeNewPlaylistFab.mainFab.isVisible || binding.homeShuffleFab.isVisible\n  382 | \n  383 |         return true\n  384 |     }"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In DetailViewModel.setAlbum/setArtist/setGenre/setPlaylist, the identity check uses referential\nequality (`uid === _currentAlbum.value?.uid`) instead of structural equality (`uid ==`). Since\nMusic.UID is likely a data class or value class, structural equality (`==`) is the appropriate\ncheck. Referential equality might work in practice because UIDs for the same entity are the same\nobject in memory, but it is fragile and unexpected.","fix":"Change `===` to `==` for UID comparisons to use structural equality.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/detail/DetailViewModel.kt:350","code":"  350 |         if (uid === _currentAlbum.value?.uid) {"},{"ref":"app/src/main/java/org/oxycblt/auxio/detail/DetailViewModel.kt:377","code":"  377 |         if (uid === _currentArtist.value?.uid) {"},{"ref":"app/src/main/java/org/oxycblt/auxio/detail/DetailViewModel.kt:401","code":"  401 |         if (uid === _currentGenre.value?.uid) {"},{"ref":"app/src/main/java/org/oxycblt/auxio/detail/DetailViewModel.kt:425","code":"  425 |         if (uid === _currentPlaylist.value?.uid) {"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In PlaylistDetailFragment, the `pendingImportTarget` field is set during `handlePlaylistDecision`\n(line 362) but is never cleared after the import completes. If the user triggers an import and then\nanother playlist decision arrives before the import callback fires, `pendingImportTarget` may refer\nto a stale playlist. Additionally, if the fragment is recreated during the import (e.g., rotation),\nthe target is lost because it is not saved in `onSaveInstanceState`.","fix":"Clear `pendingImportTarget = null` after it is used in the content picker callback, and consider saving/restoring it across configuration changes.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/detail/PlaylistDetailFragment.kt:71","code":"   71 |     private var getContentLauncher: ActivityResultLauncher<String>? = null"},{"ref":"app/src/main/java/org/oxycblt/auxio/detail/PlaylistDetailFragment.kt:361-362","code":"  361 |                     L.d(\"Importing playlist\")\n  362 |                     pendingImportTarget = decision.target"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In ThemedSpeedDialView.addActionItem(), at line 293, the `rightMargin` variable is referenced\ninside the `labelBackground` block (line 293) but it is declared inside the outer `fab.apply`\nblock (line 277). In Kotlin, the `apply` block creates a new lambda scope, so `rightMargin` is\ncaptured from the outer `addActionItem` function's local scope, which is correct. However,\n`rightMargin` is declared inside the `fab.apply { ... }` lambda, not in the function scope,\nso referencing it from the sibling `labelBackground.apply { ... }` block would cause a compile\nerror. Looking more carefully: `rightMargin` is declared at line 277 `val rightMargin = ...`\ninside the `fab.apply` block. It is then referenced at line 293 inside `labelBackground.apply`.\nIn Kotlin lambdas both blocks capture the enclosing function's scope but `rightMargin` is local\nto the `fab.apply` lambda—this would not compile unless the two apply blocks are at the same\nnesting level. Reviewing: both tab.\" — calling it \"A visible tab\" is the opposite of what it represents, which will\nmislead anyone who reads the documentation.","fix":"Change the KDoc first sentence to \"An invisible tab.\"","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/home/tabs/Tab.kt:38","code":"   38 |     /**"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In FlexibleListDiffer.update, when processing UpdateInstructions.Replace (lines 139-146), the code calls updateCallback.onRemoved(instructions.from, currentList.size - instructions.from) and then sets currentList = newList. If newList is shorter than instructions.from items the subsequent onInserted call is skipped (line 142-145). However, the onRemoved notification tells RecyclerView that items from `from` to the end of the old list were removed, but if newList is also shorter than `from`, the RecyclerView adapter now has a list shorter than `from` items – yet no additional removals are dispatched for items 0..from-1. The list state and the RecyclerView's internal model become inconsistent, which can cause IndexOutOfBoundsException in subsequent operations.","fix":"Validate that instructions.from <= currentList.size before calling onRemoved, and handle the case where newList.size < instructions.from by also dispatching removals for [newList.size, instructions.from).","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/list/adapter/FlexibleListAdapter.kt:139-146","code":"  139 |             is UpdateInstructions.Replace -> {\n  140 |                 updateCallback.onRemoved(instructions.from, currentList.size - instructions.from)\n  141 |                 currentList = newList\n  142 |                 if (newList.lastIndex >= instructions.from) {\n  143 |                     // Need to re-insert the new data.\n  144 |                     updateCallback.onInserted(instructions.from, newList.size - instructions.from)\n  145 |                 }\n  146 |                 callback?.invoke()"}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In AuxioRecyclerView, onRestoreInstanceState stores the parcelable state and replays it in onApplyWindowInsets. However, if onApplyWindowInsets is never called (e.g. the view is inside a window that does not dispatch insets), savedState will never be consumed and the scroll position will never be restored. This leaves the user at an incorrect scroll position after process death/recreation on certain device configurations.","fix":"Also restore savedState in onLayout or via a ViewTreeObserver.OnGlobalLayoutListener as a fallback if insets have not been dispatched within a reasonable time.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/list/recycler/AuxioRecyclerView.kt:61-79","code":"   61 |     override fun onApplyWindowInsets(insets: WindowInsets): WindowInsets {\n   62 |         // Update the RecyclerView's padding such that the bottom insets are applied\n   63 |         // while still preserving bottom padding.\n   64 |         updatePadding(bottom = initialPaddingBottom + insets.systemBarInsetsCompat.bottom)\n   65 |         if (savedState != null) {\n   66 |             // State restore happens before we get insets, so there will be scroll drift unless\n   67 |             // we restore the state after the insets are applied.\n   68 |             // We must only do this once, otherwise we'll get jumpy behavior.\n   69 |             super.onRestoreInstanceState(savedState)\n   70 |             savedState = null\n   71 |         }\n   72 |         return insets\n   73 |     }\n   74 | \n   75 |     override fun onRestoreInstanceState(state: Parcelable?) {\n   76 |         super.onRestoreInstanceState(state)\n   77 |         savedState = state\n   78 |     }\n   79 | }"}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In MusicRepository.indexImpl, if musicSettings.revision is null (first run), `newRevision` is set to UUID.randomUUID() (line 395). On the next run with withCache=true, `currentRevision?.takeIf { withCache }` will return the saved UUID, and newRevision will be the same as currentRevision, so the cache will be used. This is correct. However, if withCache is false AND currentRevision is null (e.g., cleared by the user), newRevision is still a fresh UUID, and `musicSettings.revision = newRevision` is written at line 416. This is fine. But there is a subtle issue: if `Musikr.new(context, config).run(...)` throws an exception that is caught in `index()` (line 374-378), `emitIndexingCompletion(e)` is called but musicSettings.revision is never updated. On the next withCache=true run, the old (pre-crash) revision is used, potentially reusing a cache that was built with different covers or configuration. This is because revision is written after a successful run (line 416) but error paths skip it.","fix":"Either clear the revision on error (set musicSettings.revision = null) or document that partial caches are intentionally accepted.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/MusicRepository.kt:382-429","code":"  382 |     private suspend fun indexImpl(withCache: Boolean) {\n  383 |         L.d(\"Index requested, initializing\")\n  384 |         // Obtain configuration information\n  385 |         val separators = Separators.from(musicSettings.separators)\n  386 |         L.d(\"Separators: $separators\")\n  387 |         val nameFactory =\n  388 |             if (musicSettings.intelligentSorting) {\n  389 |                 Naming.intelligent()\n  390 |             } else {\n  391 |                 Naming.simple()\n  392 |             }\n  393 |         L.d(\"Names: $nameFactory\")\n  394 |         val currentRevision = musicSettings.revision\n  395 |         val newRevision = currentRevision?.takeIf { withCache } ?: UUID.randomUUID()\n  396 |         L.d(\"Revisions: cur=$currentRevision, new=$newRevision\")\n  397 |         val cache = if (withCache) cache else WriteOnlyMutableCache(cache)\n  398 |         L.d(\"Cache: $cache\")\n  399 |         val covers = settingCovers.mutate(context, newRevision)\n  400 |         L.d(\"Covers: $covers\")\n  401 |         val fs =\n  402 |             when (musicSettings.locationMode) {\n  403 |                 LocationMode.SAF -> SAF.from(context, musicSettings.safQuery)\n  404 |                 LocationMode.MEDIA_STORE -> MediaStore.from(context, musicSettings.mediaStoreQuery)\n  405 |             }\n  406 |         L.d(\"FS: $fs\")\n  407 |         val storage = Storage(cache, covers, storedPlaylists)\n  408 |         val interpretation = Interpretation(nameFactory, separators)\n  409 |         val config = Config(fs, storage, interpretation)\n  410 |         L.d(\"Running index...\")\n  411 |         val start = System.currentTimeMillis()\n  412 |         val result = Musikr.new(context, config).run(::emitIndexingProgress)\n  413 |         L.d(\"Index finished in ${System.currentTimeMillis() - start}ms\")\n  414 |         // Music loading completed, update the revision right now so we re-use this work\n  415 |         // later.\n  416 |         L.d(\"Revisioning from $currentRevision -> $newRevision\")\n  417 |         musicSettings.revision = newRevision\n  418 |         // Deliver the library to the rest of the app\n  419 |         // This will more or less block until all required item translation and\n  420 |         // cleanup finishes.\n  421 |         L.d(\"Emitting new library\")\n  422 |         emitLibrary(result.library)\n  423 |         // Clean up old data that is now impossible for the app to be using.\n  424 |         L.d(\"Cleanup\")\n  425 |         result.cleanup()\n  426 |         // Finish up loading.\n  427 |         L.d(\"Indexing complete\")\n  428 |         emitIndexingCompletion(null)\n  429 |     }"}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In MusicViewModel.onMusicChanges (line 95), the function returns early if changes.deviceLibrary is false. This means statistics are only updated when the device library changes. However, the statistics include total song duration and size which are derived from songs. If a playlist-only change (userLibrary=true, deviceLibrary=false) somehow modified the set of loaded songs, statistics would be stale. While the current architecture doesn't do this, the guard is overly strict and the statistics block could trivially run even for userLibrary changes since it is cheap.","fix":"This is a minor design issue; the code is correct given current invariants. Low severity.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/music/MusicViewModel.kt:94-107","code":"   94 |     override fun onMusicChanges(changes: MusicRepository.Changes) {\n   95 |         if (!changes.deviceLibrary) return\n   96 |         val library = musicRepository.library ?: return\n   97 |         _statistics.value =\n   98 |             Statistics(\n   99 |                 library.songs.size,\n  100 |                 library.albums.size,\n  101 |                 library.artists.size,\n  102 |                 library.genres.size,\n  103 |                 library.songs.sumOf { it.durationMs },\n  104 |                 library.songs.sumOf { it.size },\n  105 |             )\n  106 |         L.d(\"Updated statistics: ${_statistics.value}\")\n  107 |     }"}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In MusicViewModel.renamePlaylist (line 259-262), after renaming the playlist the code calls musicRepository.rewritePlaylist(playlist, applySongs) using the old `playlist` object. However, renamePlaylist returns a new MutableLibrary and updates this.library with the renamed playlist. The old `playlist` reference no longer corresponds to any object in this.library. Whether rewritePlaylist can handle a stale playlist reference depends on the library implementation – if it uses es), child(detail.parent))\n  223 |                     }\n  224 |                 is DetailSection.Albums ->\n  225 |                     section.items.map { it.toMediaItem(context, header(section.stringRes)) }\n  226 |                 is DetailSection.Artists ->\n  227 |                     section.items.map { it.toMediaItem(context, header(section.stringRes)) }\n  228 |                 is DetailSection.Discs ->\n  229 |                     section.discs.flatMap { (disc, songs) ->\n  230 |                         val discString = disc.resolve(context)\n  231 |                         songs.map {\n  232 |                             it.toMediaItem(context, header(discString), child(detail.parent))\n  233 |                         }\n  234 |                     }\n  235 |                 else -> error(\"Unknown section type: $section\")\n  236 |             }\n  237 |         }"}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In PersistenceRepositoryImpl.saveState, when `state` is non-null the heap is built with `requireNotNull(song)` applied to every entry in `state.heap`. However `state.heap` is a `List<Song?>` that can legally contain nulls (representing songs absent from the library at save time). If such a null entry is present, `requireNotNull` throws an IllegalArgumentException and the save operation fails mid-flight, leaving the database in a partially cleared state (heap and mapping already nuked, nothing written back).","fix":"Filter out null entries before mapping: `state.heap.mapIndexedNotNull { i, song -> song?.let { QueueHeapItem(i, it.uid) } }`, and ensure the index-to-uid mapping remains consistent with `applySavedState`'s null-aware heap reconstruction.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/persist/PersistenceRepository.kt:108","code":"  108 |                 state.heap.mapIndexed { i, song -> QueueHeapItem(i, requireNotNull(song).uid) }"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In QueueViewModel.moveQueueDataItems, the debug log at line 149 prints `adapterFrom` twice (\"Moving $adapterFrom to $adapterFrom\") instead of logging the destination index `adapterTo`. This makes the log message misleading and useless for debugging.","fix":"Change the log to `L.d(\"Moving $adapterFrom to $adapterTo in queue\")`.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/queue/QueueViewModel.kt:149","code":"  149 |         L.d(\"Moving $adapterFrom to $adapterFrom in queue\")"}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In PlaybackStateManagerImpl.playNext, when nothing is playing and `currentSong == null`, `play(QueueCommand(songs))` is called without checking whether `stateHolder` is non-null first. `play()` early-returns if `stateHolder` is null, so this is safe, but the `@Synchronized` block calls `play()` which itself is `@Synchronized`. In Kotlin/JVM `@Synchronized` on the same object is reentrant, so no deadlock occurs, but the dual lock acquisition is confusing and inconsistent with other queue operations that guard on stateHolder before acting.","fix":"Extract the stateHolder guard before the null check, or document the reentrant synchronization explicitly.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/state/PlaybackStateManager.kt:482-491","code":"  482 |     override fun playNext(songs: List<Song>) {\n  483 |         if (currentSong == null) {\n  484 |             L.d(\"Nothing playing, short-circuiting to new playback\")\n  485 |             play(QueueCommand(songs))\n  486 |         } else {\n  487 |             val stateHolder = stateHolder ?: return\n  488 |             L.d(\"Adding ${songs.size} songs to start of queue\")\n  489 |             stateHolder.playNext(songs, StateAck.PlayNext(stateMirror.index + 1, songs.size))\n  490 |         }\n  491 |     }"}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In PlaybackStateManagerImpl.applySavedState, after rebuilding the heap and shuffled mapping, the index correction loop walks backward from the saved index until it finds a song matching `savedState.songUid`. If the song is entirely absent (all entries were null/removed), the loop walks all the way to index -1 and the function resets state. However if `savedState.index` is 0 and the song at index 0 is absent, the loop starts at -1 immediately (the while condition `index > -1` prevents even the first iteration), so it will reset correctly — but only by coincidence. If the initial index is correct but the song is wrong, the loop stops prematurely.","fix":"Start the search from `savedState.index` downward but also scan upward when the downward search fails, to correctly handle the case where songs above the saved index have been removed.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/state/PlaybackStateManager.kt:773-776","code":"  773 |         var index = savedState.index\n  774 |         while (!pointingAtSong(index) && index > -1) {\n  775 |             index--\n  776 |         }"}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In SecondsView.cycle, the end-listener that chains animation steps is attached to whichever of the three icons is currently changing alpha. If none of them differ from their targets (i.e., the view is already at the desired alpha), no end-listener is attached at all, and the cycling animation silently stops mid-cycle. This can leave the indicator frozen at an in-between state.","fix":"Guarantee the end-listener is always attached to at least one animation, or attach it unconditionally to a chosen spring (e.g., always `one.addEndListener(endListener)`) and rely on ExoPlayer's spring settling to still complete.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/ui/stepper/SecondsView.kt:132-143","code":"  132 |         when {\n  133 |             cyclicAlpha[row] != binding.icon1.alpha -> {\n  134 |                 one.addEndListener(endListener)\n  135 |             }\n  136 |             cyclicAlpha[row + 1] != binding.icon2.alpha -> {\n  137 |                 two.addEndListener(endListener)\n  138 |             }\n  139 |             cyclicAlpha[row + 2] != binding.icon3.alpha -> {\n  140 |                 three.addEndListener(endListener)\n  141 |             }\n  142 |         }\n  143 |         animations = listOf(one, two, three)"}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In StepperOverlay.onDoubleTap, the method returns `false` in all code paths (including the normal seek cases). Returning `false` from a GestureDetector double-tap callback tells the detector the event was NOT consumed, which can allow other gesture handlers or parent views to also process the same double-tap event, potentially causing unintended interactions.","fix":"Return `true` from `onDoubleTap` after a seek direction is resolved to signal the event was consumed.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/ui/stepper/StepperOverlay.kt:286-287","code":"  286 | \n  287 |         return false"}]},{"id":"LOGIC_62","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In SearchSettings.migrate(), the migration unconditionally overwrites the `set_key_search_filters`\npreference even when the old key `OLD_KEY_SEARCH_FILTER` doesn't exist (defaulting to 0 and\nwriting 0). This means every app launch through the normal code path that calls migrate() will\nwrite 0 to the search filters preference, resetting any user changes made to filters. The method\nnever checks `sharedPreferences.contains(OLD_KEY_SEARCH_FILTER)` before migrating, unlike every\nother migrate() implementation in the codebase.","fix":"Guard the migration with `if (sharedPreferences.contains(OLD_KEY_SEARCH_FILTER))` and remove the key afterward, following the pattern used in HomeSettings.migrate().","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/search/SearchSettings.kt:61-72","code":"   61 |         val filter = MusicType.fromIntCode(sharedPreferences.getInt(OLD_KEY_SEARCH_FILTER, 0))\n   62 |         val intCode =\n   63 |             when (filter) {\n   64 |                 MusicType.SONGS -> BIT_SONGS\n   65 |                 MusicType.ALBUMS -> BIT_ALBUMS\n   66 |                 MusicType.ARTISTS -> BIT_ARTISTS\n   67 |                 MusicType.GENRES -> BIT_GENRES\n   68 |                 MusicType.PLAYLISTS -> BIT_PLAYLISTS\n   69 |                 else -> 0\n   70 |             }\n   71 |         sharedPreferences.edit { putInt(getString(R.string.set_key_search_filters), intCode) }\n   72 |     }"}]},{"id":"LOGIC_63","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In FadingToolbarOffsetListener.onOffsetChanged(), the toolbar alpha formula is:\n`toolbar.alpha = 1f - (abs(verticalOffset.toFloat()) / (range.toFloat() / 2))`.\nWhen `verticalOffset` exceeds half the scroll range (i.e., the AppBar is more than half\ncollapsed), the alpha becomes negative (e.g., -0.5f). The Android View system clamps this to\n0.0f at render time, but an alpha of 0.0f is still fully transparent—an off-by-one/scaling bug\ndoesn't cause visible glitches here, but the alpha value stored on the view object will be a\nnegative float, which can confuse any code that reads `toolbar.alpha` directly (e.g., visibility\nlogic).","fix":"Clamp the computed alpha: `toolbar.alpha = (1f - abs(verticalOffset.toFloat()) / (range.toFloat() / 2f)).coerceIn(0f, 1f)`.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/ui/FadingToolbarOffsetListener.kt:33","code":"   33 |         toolbar.alpha = 1f - (abs(verticalOffset.toFloat()) / (range.toFloat() / 2))"}]},{"id":"LOGIC_64","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In MultiToolbar.animateToolbarsVisibility(), the local variable `from` (line 67) shadows the\nfunction parameter `from` (line 62) via `val from = getChildAt(from)`. While this compiles and\nworks because the parameter is consumed before shadowing, it is confusing and fragile—a reader\ncould mistakenly think the original `from: Int` is still accessible after line 67.","fix":"Rename the local view variable: `val fromView = getChildAt(from)` and `val toView = getChildAt(to)` to avoid shadowing.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/ui/MultiToolbar.kt:62-67","code":"   62 |     private fun animateToolbarsVisibility(from: Int, to: Int): Boolean {\n   63 |         // Set up the target transitions for both the inner and selection toolbars.\n   64 |         L.d(\"Changing toolbar visibility $from -> 0f, $to -> 1f\")\n   65 |         inAnimators?.forEach { it.cancel() }\n   66 |         outAnimators?.forEach { it.cancel() }\n   67 |         val from = getChildAt(from)"}]},{"id":"LOGIC_65","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In WidthFixMaterialButton.setIconResource(), both `removeCallbacks(applyPendingIconRunnable)` and\n`postOnAnimation(applyPendingIconRunnable)` are called back-to-back (lines 63-65). The\n`removeCallbacks` on line 64 removes any previously posted runnable, but on line 65\n`postOnAnimation` immediately re-adds it. Line 62 already called `super.setIconResource(iconRes)`\nwhich sets the icon immediately, and then line 63 calls `postOnAnimation` again, scheduling a\nsecond deferred application. The flow is: set icon now (line 62), schedule deferred re-set (line\n63), cancel scheduled re-set (line 64), schedule again (line 65). Lines 63 and 64 are therefore\nredundant and can be removed.","fix":"Remove the redundant `postOnAnimation` on line 63 and the `removeCallbacks` on line 64, keeping only the final `postOnAnimation(applyPendingIconRunnable)` at line 65.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/ui/WidthFixMaterialButton.kt:62-65","code":"   62 |         super.setIconResource(iconRes)\n   63 |         pendingIconRes = iconRes\n   64 |         postOnAnimation(applyPendingIconRunnable)\n   65 |         removeCallbacks(applyPendingIconRunnable)"}]},{"id":"LOGIC_66","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Date.from(year: Int)` treats any integer in the range `10000000..100000000` as a packed\nYYYYMMDD timestamp. The upper bound `100000000` is a 9-digit number, so the value\n`100000000` itself is included. When that value is parsed, `stringYear.substring(0..3)`\nyields `\"1000\"` (year), `substring(4..5)` yields `\"00\"` (invalid month), and\n`substring(6..7)` yields `\"00\"` (invalid day), producing `Date(year = 1000)`. The ninth\ndigit is silently discarded. The intended upper bound for an 8-digit YYYYMMDD value is\n`99999999`, making the correct exclusive range `10000000..99999999`. While a song tag\ncarrying the literal integer `100000000` is highly unusual, the off-by-one is still a\ndefect.","fix":"Change the range check from `year in 10000000..100000000` to `year in 10000000..99999999`.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/tag/Date.kt:123","code":"  123 |             if (year in 10000000..100000000) {"}]},{"id":"LOGIC_67","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"IntegerTable.kt has two constants with the same comment \"LocationMode.FileSystem\" (lines 153-155):\nFILTER_MODE_INCLUDE and FILTER_MODE_EXCLUDE. The comments should read \"FilterMode.Include\" and\n\"FilterMode.Exclude\" respectively, as \"LocationMode.FileSystem\" describes neither of them.","fix":"Change the comments to `/** FilterMode.Include */` and `/** FilterMode.Exclude */` respectively.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/IntegerTable.kt:153-155","code":"  153 |     const val FILTER_MODE_INCLUDE = 0xA129\n  154 |     /** LocationMode.FileSystem */\n  155 |     const val FILTER_MODE_EXCLUDE = 0xA12A"}]},{"id":"LOGIC_68","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"In Sort.Mode.ByTrack.sortSongs (lines 346-353 of Sort.kt), the final `songs.sortBy { it.disc }` call is placed *after* the direction-conditional sort block instead of before it (unlike ByDisc.sortSongs which sorts by track then disc in the correct stable-sort order). This means disc is applied as the final (dominant) sort key, overriding the track sort, making direction effectively irrelevant for disc-grouped songs. The intent is to sort by disc-then-track-direction, but the implementation sorts by track-direction-then-disc.","fix":"Move `songs.sortBy { it.disc }` to before the direction-conditional block: songs.sortBy { it.name }; songs.sortBy { it.disc }; when (direction) { ASCENDING -> songs.sortBy { it.track } ... }","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/list/sort/Sort.kt:342-354","code":"  342 |         data object ByTrack : Mode {\n  343 |             override val intCode = IntegerTable.SORT_BY_TRACK\n  344 |             override val stringRes = R.string.lbl_track\n  345 | \n  346 |             override fun sortSongs(songs: MutableList<Song>, direction: Direction) {\n  347 |                 songs.sortBy { it.name }\n  348 |                 when (direction) {\n  349 |                     Direction.ASCENDING -> songs.sortBy { it.track }\n  350 |                     Direction.DESCENDING -> songs.sortByDescending { it.track }\n  351 |                 }\n  352 |                 songs.sortBy { it.disc }\n  353 |             }\n  354 |         }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","description":"Both `tryAsync` and `tryAsyncWith` catch `Throwable` (line 41 and line 56 of LangUtil.kt),\nwhich includes `kotlinx.coroutines.CancellationException`. In Kotlin structured concurrency,\n`CancellationException` must not be caught and suppressed — it is the mechanism by which the\ncoroutine runtime signals cancellation. By swallowing it into a `Result.failure`, a cancelled\ncoroutine appears to complete normally from the parent's point of view, its output channels are\nnever closed (the finally-close problem above), and scope cancellation does not propagate\ncorrectly. This means the library cannot be reliably cancelled (e.g. when the user navigates\naway while indexing).","fix":"Change `catch (e: Throwable)` to `catch (e: Exception)` in both `tryAsync` and `tryAsyncWith`. `CancellationException` extends `CancellationException -> IllegalStateException -> RuntimeException -> Exception` in older coroutines but in recent kotlinx.coroutines it is a direct subclass of `IllegalStateException` which IS an `Exception`, so also explicitly rethrow CancellationException: `if (e is CancellationException) throw e` before wrapping in `Result.failure`.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/util/LangUtil.kt:34-44","code":"   34 | fun CoroutineScope.tryAsync(\n   35 |     context: CoroutineContext,\n   36 |     block: suspend () -> Unit,\n   37 | ): Deferred<Result<Unit>> = async {\n   38 |     try {\n   39 |         block()\n   40 |         Result.success(Unit)\n   41 |     } catch (e: Throwable) {\n   42 |         Result.failure(e)\n   43 |     }\n   44 | }"},{"ref":"musikr/src/main/java/org/oxycblt/musikr/util/LangUtil.kt:46-60","code":"   46 | fun <T> CoroutineScope.tryAsyncWith(\n   47 |     channel: Channel<T>,\n   48 |     context: CoroutineContext,\n   49 |     block: suspend (Channel<T>) -> Unit,\n   50 | ): Deferred<Result<Unit>> =\n   51 |     async(context) {\n   52 |         try {\n   53 |             block(channel)\n   54 |             channel.close()\n   55 |             Result.success(Unit)\n   56 |         } catch (e: Throwable) {\n   57 |             channel.close(e)\n   58 |             Result.failure(e)\n   59 |         }\n   60 |     }"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"FSStoredCover.open() calls file.inputStream() without any exception handling. The Cover interface contract explicitly states that open() should return null if an error occurs, but file.inputStream() throws IOException (e.g., FileNotFoundException) if the file does not exist or cannot be read. Any caller relying on the null-return contract will instead receive an unhandled exception.","fix":"Wrap the call in a try/catch: `return try { file.inputStream() } catch (e: IOException) { null }`.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/covers/stored/CoverStorage.kt:154","code":"  154 |     override suspend fun open() = withContext(Dispatchers.IO) { file.inputStream() }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"In CoverProvider.openFile, the provider uses runBlocking to call SettingCovers.immutable(context).obtain(id). ContentProvider.openFile is called on a Binder thread from the MediaSession client (e.g. Android Auto). runBlocking on a Binder thread is generally acceptable but blocks the Binder thread for the duration of disk IO. If this is called rapidly (e.g. for every song icon in a large list from Android Auto), it can saturate the Binder thread pool and cause ANR-like stalls in the client.","fix":"This is inherent to ContentProvider's synchronous API contract for openFile. Consider pre-fetching or caching opened file descriptors to reduce the per-call latency.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/image/CoverProvider.kt:36-47","code":"   36 |     override fun openFile(uri: Uri, mode: String): ParcelFileDescriptor? {\n   37 |         if (mode != \"r\" || uriMatcher.match(uri) != 1) {\n   38 |             return null\n   39 |         }\n   40 |         val id = uri.lastPathSegment ?: return null\n   41 |         return runBlocking {\n   42 |             when (val result = SettingCovers.immutable(requireNotNull(context)).obtain(id)) {\n   43 |                 is CoverResult.Hit -> result.cover.fd()\n   44 |                 else -> null\n   45 |             }\n   46 |         }\n   47 |     }"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"In MediaSessionHolder.updateMediaMetadata, `METADATA_KEY_AUTHOR`, `METADATA_KEY_COMPOSER`, and `METADATA_KEY_WRITER` are all set to the track artist string. The MediaMetadata spec reserves AUTHOR for the author of the content, COMPOSER for the music composer, and WRITER for the lyricist — not the performing artist. Conflating these fields with the track artist will give incorrect information to media controllers and assistant integrations that read these fields.","fix":"Leave METADATA_KEY_AUTHOR, METADATA_KEY_COMPOSER, and METADATA_KEY_WRITER unset (or set them from song metadata if available) rather than aliasing all three to the track artist.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/service/MediaSessionHolder.kt:234-236","code":"  234 |                 .putText(MediaMetadataCompat.METADATA_KEY_AUTHOR, artist)\n  235 |                 .putText(MediaMetadataCompat.METADATA_KEY_COMPOSER, artist)\n  236 |                 .putText(MediaMetadataCompat.METADATA_KEY_WRITER, artist)"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"`Transliterator.getInstance(\"Any-Latin;\")` in Naming.kt uses a trailing semicolon in the\ntransliterator ID. In ICU4J, a semicolon is a compound-transliterator separator; a trailing\nsemicolon implies an empty second stage. While some ICU versions silently ignore it, others may\nthrow `IllegalArgumentException` or create an unexpectedly composed transliterator. The\navailability guard on the same path checks for `\"Any-Latin\"` (without semicolon), so the IDs\nused for the guard and for instantiation are inconsistent.","fix":"Change `Transliterator.getInstance(\"Any-Latin;\")` to `Transliterator.getInstance(\"Any-Latin\")` so the ID is consistent with the availability check and avoids ambiguous compound-transliterator parsing.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/tag/interpret/Naming.kt:109-111","code":"  109 |                 Transliterator.getAvailableIDs().toList().contains(\"Any-Latin\")\n  110 |         ) {\n  111 |             stripped = Transliterator.getInstance(\"Any-Latin;\").transliterate(stripped)"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"In CoverCompositionFetcher.fetch() (line 55-88), all covers in data.covers.covers are decoded as bitmaps via BitmapFactory.decodeStream but only 4 are needed (take(4)). The asFlow().mapNotNull { cover.open() }.mapNotNull { stream -> BitmapFactory.decodeStream(stream).also { stream.close() } }.take(4) chain does stop at 4 decoded bitmaps, but it still opens streams for all covers before the flow is collected – potentially opening hundreds of file descriptors for large collections with many covers.","fix":"Apply take(4) on the covers list *before* opening streams: `data.covers.covers.asFlow().take(4).mapNotNull { ... }`.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/image/coil/CoverCompositionFetcher.kt:55-68","code":"   55 |     final override suspend fun fetch(): FetchResult? {\n   56 |         val bitmaps =\n   57 |             data.covers.covers\n   58 |                 .asFlow()\n   59 |                 .mapNotNull { cover -> cover.open() }\n   60 |                 .mapNotNull { stream -> BitmapFactory.decodeStream(stream).also { stream.close() } }\n   61 |                 .take(4)\n   62 |                 .toList()\n   63 |         if (bitmaps.size < 4) {\n   64 |             val first = bitmaps.firstOrNull() ?: return null\n   65 |             return ImageFetchResult(\n   66 |                 image = first.toDrawable(context.resources).asImage(),\n   67 |                 isSampled = true,\n   68 |                 dataSource = DataSource.DISK,"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","description":"In `IntelligentKnownName.parseTokens` (Naming.kt), the call\n`Transliterator.getAvailableIDs().toList().contains(\"Any-Latin\")` is executed every time a\nname is parsed. `getAvailableIDs()` returns an `Enumeration<String>` that is materialized into\na new list on each call, and `contains` then performs a linear scan through it. Because\n`parseTokens` is called for every song name, artist name, album name, and genre name during\nlibrary loading, this results in O(songs * transliterators) work to check a condition that\nnever changes at runtime. A library with 5,000 songs and 200 transliterator IDs performs\napproximately 1,000,000 string comparisons just for this guard.","fix":"Cache the availability check as a top-level `val` or companion object property: `private val isAnyLatinAvailable: Boolean = Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q && Transliterator.getAvailableIDs().toList().contains(\"Any-Latin\")`. Then reference this cached boolean inside `parseTokens`.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/tag/interpret/Naming.kt:107-111","code":"  107 |         if (\n  108 |             Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q &&\n  109 |                 Transliterator.getAvailableIDs().toList().contains(\"Any-Latin\")\n  110 |         ) {\n  111 |             stripped = Transliterator.getInstance(\"Any-Latin;\").transliterate(stripped)"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"In ListUtil.kt, CookieShapeDrawable.computeMaxRadius() samples the path at a fixed interval of 1\npixel (line 135: `sampleCount = max((length / 1f).roundToInt(), 1)`), iterating once per pixel\nalong the entire cookie path. For a large view (e.g., 200px wide), this produces hundreds of\nPathMeasure.getPosTan() calls on every layout change. The sample density of 1px is far higher\nthan needed for finding the maximum radius; 4-8px steps would give the same effective result.","fix":"Increase the step size: `sampleCount = max((length / 4f).roundToInt(), 1)` to reduce the number of samples by 4x without meaningfully affecting accuracy.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/home/list/ListUtil.kt:135","code":"  135 |             for (sample in 0..sampleCount) {"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"In CoverCompositionFetcher.fetch(), the random number generator is seeded and then deliberately cycled 10+ times (lines 75-81) with comments acknowledging this is a workaround. This adds unnecessary computation on each composition fetch. The two nested loops (0..10 and 0..random.nextInt(1..30)) mean between 11 and 42 random.nextLong() calls per fetch just to advance the RNG state.","fix":"Use a deterministic but non-trivial seed derivation (e.g., hash the seed value multiple times) instead of cycling the RNG in a loop.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/image/coil/CoverCompositionFetcher.kt:74-81","code":"   74 |         val random = Random(data.seed)\n   75 |         for (i in 0..10) {\n   76 |             // cycle random a few times\n   77 |             random.nextLong()\n   78 |         }\n   79 |         for (i in 0..random.nextInt(1..30)) {\n   80 |             // then cycle it some more\n   81 |             random.nextLong()"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"In SoftBurstShapeDrawable.computeMaxRadius and the identical copy in SoftBurstPopupDrawable (in FastScrollRecyclerView.kt), the path is sampled at 1-pixel granularity: `sampleCount = max((length / 1f).roundToInt(), 1)`. For a typical popup drawable of ~128dp this results in hundreds of samples per contour just to find the max radius, on every onBoundsChange call.","fix":"Increase the granularity divisor (e.g., `length / 8f`) to sample fewer points, which is sufficient for finding the approximate maximum radius.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/list/recycler/SoftBurstShapeDrawable.kt:113-134","code":"  113 |     private fun computeMaxRadius(source: Path, centerX: Float, centerY: Float): Float {\n  114 |         val measure = PathMeasure(source, false)\n  115 |         var maxRadius = 0f\n  116 | \n  117 |         do {\n  118 |             val length = measure.length\n  119 |             if (length <= 0f) {\n  120 |                 continue\n  121 |             }\n  122 | \n  123 |             val sampleCount = max((length / 1f).roundToInt(), 1)\n  124 |             for (sample in 0..sampleCount) {\n  125 |                 val distance = length * sample / sampleCount\n  126 |                 if (measure.getPosTan(distance, pathPosition, null)) {\n  127 |                     maxRadius =\n  128 |                         max(maxRadius, hypot(pathPosition[0] - centerX, pathPosition[1] - centerY))\n  129 |                 }\n  130 |             }\n  131 |         } while (measure.nextContour())\n  132 | \n  133 |         return maxRadius\n  134 |     }"},{"ref":"app/src/main/java/org/oxycblt/auxio/list/recycler/FastScrollRecyclerView.kt:879-900","code":"  879 |     private fun computeMaxRadius(source: Path, centerX: Float, centerY: Float): Float {\n  880 |         val measure = PathMeasure(source, false)\n  881 |         var maxRadius = 0f\n  882 | \n  883 |         do {\n  884 |             val length = measure.length\n  885 |             if (length <= 0f) {\n  886 |                 continue\n  887 |             }\n  888 | \n  889 |             val sampleCount = max((length / 1f).roundToInt(), 1)\n  890 |             for (sample in 0..sampleCount) {\n  891 |                 val distance = length * sample / sampleCount\n  892 |                 if (measure.getPosTan(distance, pathPosition, null)) {\n  893 |                     maxRadius =\n  894 |                         max(maxRadius, hypot(pathPosition[0] - centerX, pathPosition[1] - centerY))\n  895 |                 }\n  896 |             }\n  897 |         } while (measure.nextContour())\n  898 | \n  899 |         return maxRadius\n  900 |     }"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"In PlaybackViewModel.onProgressionChanged, the coroutine launched to poll position runs an infinite `while(true)` loop that calls `calculateElapsedPositionMs()` and then delays 100 ms. The loop is never explicitly terminated — it is only replaced when a new Progression arrives (via job cancellation). If the ViewModel is never cleared (e.g., it outlives the Activity but stays attached) and progression changes rapidly, many short-lived coroutines are created and cancelled. Additionally, the loop continues to run even when `isAdvancing` is false (i.e., buffering or paused with audio focus loss), where position never changes, wasting CPU cycles every 100 ms.","fix":"Check `progression.isAdvancing` before launching the polling loop, and do not start the loop when the position is static. Return early or skip the delay if the player is not advancing.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/playback/PlaybackViewModel.kt:197-204","code":"  197 |         lastPositionJob =\n  198 |             viewModelScope.launch {\n  199 |                 while (true) {\n  200 |                     _positionDs.value = progression.calculateElapsedPositionMs().msToDs()\n  201 |                     // Wait a deci-second for the next position tick.\n  202 |                     delay(100)\n  203 |                 }\n  204 |             }"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"In SearchViewModel.searchImpl(), the search results list is built with `buildList { }` and\n`addAll(SORT.artists(it))` etc., where each `SORT.xxx(it)` call sorts the already-filtered\ncollection. Because the sort is always ascending by name, the five potential sort operations\ncreate five independent sorted lists. If all five collections are non-empty this is five\nseparate sort passes of potentially thousands of items each on the coroutine thread. The\narchitecture is fine, but a comment noting that sorting happens here (not in the engine) would\nhelp maintainers understand the performance budget.","fix":"No immediate code change required, but consider documenting that sorting is done post-search and is linear in total result count.","locations":[{"ref":"app/src/main/java/org/oxycblt/auxio/search/SearchViewModel.kt:135-182","code":"  135 |         return buildList {\n  136 |             results.artists?.let {\n  137 |                 L.d(\"Adding ${it.size} artists to search results\")\n  138 |                 val header = BasicHeader(R.string.lbl_artists)\n  139 |                 add(header)\n  140 |                 addAll(SORT.artists(it))\n  141 |             }\n  142 |             results.albums?.let {\n  143 |                 L.d(\"Adding ${it.size} albums to search results\")\n  144 |                 val header = BasicHeader(R.string.lbl_albums)\n  145 |                 if (isNotEmpty()) {\n  146 |                     add(PlainDivider(header))\n  147 |                 }\n  148 | \n  149 |                 add(header)\n  150 |                 addAll(SORT.albums(it))\n  151 |             }\n  152 |             results.playlists?.let {\n  153 |                 L.d(\"Adding ${it.size} playlists to search results\")\n  154 |                 val header = BasicHeader(R.string.lbl_playlists)\n  155 |                 if (isNotEmpty()) {\n  156 |                     add(PlainDivider(header))\n  157 |                 }\n  158 | \n  159 |                 add(header)\n  160 |                 addAll(SORT.playlists(it))\n  161 |             }\n  162 |             results.genres?.let {\n  163 |                 L.d(\"Adding ${it.size} genres to search results\")\n  164 |                 val header = BasicHeader(R.string.lbl_genres)\n  165 |                 if (isNotEmpty()) {\n  166 |                     add(PlainDivider(header))\n  167 |                 }\n  168 | \n  169 |                 add(header)\n  170 |                 addAll(SORT.genres(it))\n  171 |             }\n  172 |             results.songs?.let {\n  173 |                 L.d(\"Adding ${it.size} songs to search results\")\n  174 |                 val header = BasicHeader(R.string.lbl_songs)\n  175 |                 if (isNotEmpty()) {\n  176 |                     add(PlainDivider(header))\n  177 |                 }\n  178 | \n  179 |                 add(header)\n  180 |                 addAll(SORT.songs(it))\n  181 |             }\n  182 |         }"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"In SAF.exploreDirectoryImpl(), `query.exclude.mapTo(mutableSetOf()) { it.path }` constructs the exclude path set on every call, including every recursive sub-directory traversal. When SAF.explore() maps over multiple source locations, this set is also rebuilt for each location. For deeply nested directory trees or many source locations, this repeated set construction is wasteful.","fix":"Compute the exclude set once before the map call: `val excludePaths = query.exclude.mapTo(mutableSetOf()) { it.path }`, then pass it to each exploreDirectoryImpl call.","locations":[{"ref":"musikr/src/main/java/org/oxycblt/musikr/fs/saf/SAF.kt:66","code":"   66 |                         query.exclude.mapTo(mutableSetOf()) { it.path },"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"MusicGraph.renderToGraphviz() (called in DEBUG builds) uses List.indexOf() inside nested forEachIndexed loops to find vertex indices for graph edge rendering. This produces O(n^2) complexity for song->album edges (songs * albums), O(n*m) for song->artist, song->genre, and album->arti function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
