<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `build.rs`, `.ancestors().nth(3).unwrap()` panics if the `OUT_DIR` path has fewer than 4 components. This can occur in unusual build environments or on paths very close to the filesystem root. Cargo normally provides a deep `OUT_DIR`, but the unwrap is still unsafe.","fix":"Replace `.unwrap()` with `.ok_or_else(|| std::io::Error::new(std::io::ErrorKind::Other, \"OUT_DIR has unexpected structure\"))?` and return early, or use a fallback path.","locations":[{"ref":"cli/build.rs:17","code":"   17 |     let outdir_path = &Path::new(&outdir_str).ancestors().nth(3).unwrap();","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"create_shading_pattern() and create_shading_soft_mask() both call GradientProperties::try_from_paint(paint).unwrap(). try_from_paint() returns None for Paint::Color and Paint::Pattern. Both functions are only ever called from path.rs inside LinearGradient/RadialGradient match arms, but the function signatures accept any &Paint and will panic if called with a non-gradient paint.","fix":"Return Result or Option from these functions instead of unwrapping. Alternatively restrict the parameter type to something that only represents gradients.","locations":[{"ref":"src/render/gradient.rs:55","code":"   55 |     let properties = GradientProperties::try_from_paint(paint).unwrap();","lines":1},{"ref":"src/render/gradient.rs:68","code":"   68 |     let properties = GradientProperties::try_from_paint(paint).unwrap();","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In create_x_object() the call chain group.layer_bounding_box().transform(group.transform()).unwrap() can panic if the transformed bounding box is degenerate (e.g. a scale-to-zero transform produces an empty rectangle that cannot be converted to NonZeroRect). This path is taken for every isolated group.","fix":"Replace .unwrap() with .ok_or(UnknownError)? consistent with the pattern used elsewhere in the codebase.","locations":[{"ref":"src/render/group.rs:88-92","code":"   88 |     let pdf_bbox = group\n   89 |         .layer_bounding_box()\n   90 |         .transform(group.transform())\n   91 |         .unwrap()\n   92 |         .to_pdf_rect();","lines":5}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In draw_path(), a QuadTo segment accesses p_prev.unwrap() to compute the cubic approximation control points. p_prev is None until the first MoveTo or LineTo is seen. A malformed (but usvg-validated) path that starts with a QuadTo would panic. Even if usvg guarantees MoveTo comes first, this invariant is undocumented and the code silently relies on it.","fix":"Replace p_prev.unwrap() with an early-return or map the Option to avoid a silent panic. Add a comment explaining why the invariant holds if it is guaranteed by the caller.","locations":[{"ref":"src/render/path.rs:66-78","code":"   66 |             PathSegment::QuadTo(p1, p2) => {\n   67 |                 // Since PDF doesn't support quad curves, we need to convert them into\n   68 |                 // cubic.\n   69 |                 let prev = p_prev.unwrap();\n   70 |                 content.cubic_to(\n   71 |                     calc(prev.x, p1.x),\n   72 |                     calc(prev.y, p1.y),\n   73 |                     calc(p2.x, p1.x),\n   74 |                     calc(p2.y, p1.y),\n   75 |                     p2.x,\n   76 |                     p2.y,\n   77 |                 );\n   78 |                 p_prev = Some(p2);","lines":13}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`generate_to` in the shell-completion loop uses `.unwrap()`. If generating completions for any shell fails (e.g. I/O error writing to the artifacts directory), the build script panics with no useful context message.","fix":"Replace `.unwrap()` with `?` to propagate the error through the `main() -> Result<(), std::io::Error>` return type, consistent with how the rest of the build script handles errors.","locations":[{"ref":"cli/build.rs:28","code":"   28 |         generate_to(*shell, &mut cmd, \"svg2pdf\", &artifacts_path).unwrap();","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"create_transparent_image() ends with a catch-all panic!() branch for channel counts outside 1-4. The image crate currently only produces 1-4 channels, making this unreachable today, but the branch is not marked unreachable!() and would silently become reachable if the image crate adds new colour types.","fix":"Return an Err(InvalidImage) instead of panicking, keeping the conversion fallible rather than aborting the process.","locations":[{"ref":"src/render/image.rs:97-113","code":"   97 |     let encoded_image: Vec<u8> = match (channels, bits / channels > 8) {\n   98 |         (1 | 2, false) => image.to_luma8().pixels().flat_map(|&Luma(c)| c).collect(),\n   99 |         (1 | 2, true) => image\n  100 |             .to_luma16()\n  101 |             .pixels()\n  102 |             .flat_map(|&Luma(x)| x)\n  103 |             .flat_map(|x| x.to_be_bytes())\n  104 |             .collect(),\n  105 |         (3 | 4, false) => image.to_rgb8().pixels().flat_map(|&Rgb(c)| c).collect(),\n  106 |         (3 | 4, true) => image\n  107 |             .to_rgb16()\n  108 |             .pixels()\n  109 |             .flat_map(|&Rgb(c)| c)\n  110 |             .flat_map(|x| x.to_be_bytes())\n  111 |             .collect(),\n  112 |         _ => panic!(\"unknown number of channels={channels}\"),\n  113 |     };","lines":17}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In create_raster_image(), Size::from_wh(dynamic_image.width() as f32, dynamic_image.height() as f32).unwrap() panics if the decoded image has zero width or height. The image crate can return 0-dimension images for certain malformed inputs.","fix":"Replace .unwrap() with .ok_or(InvalidImage)? so malformed zero-dimension images produce an error instead of a panic.","locations":[{"ref":"src/render/image.rs:174-176","code":"  174 |     let image_size =\n  175 |         Size::from_wh(dynamic_image.width() as f32, dynamic_image.height() as f32)\n  176 |             .unwrap();","lines":3}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In create_raster_image(), dynamic_image.width() and .height() (both u32) are cast to i32 via as. For images wider or taller than 2,147,483,647 pixels the cast silently wraps to a negative value, which pdf-writer would encode as a negative integer in the /Width and /Height PDF entries - invalid per the spec. Integer-to-integer as casts in Rust do not saturate.","fix":"Use i32::try_from(dynamic_image.width()).map_err(|_| InvalidImage)? instead of the silent as i32 cast.","locations":[{"ref":"src/render/image.rs:167-168","code":"  167 |         s_mask.width(dynamic_image.width() as i32);\n  168 |         s_mask.height(dynamic_image.height() as i32);","lines":2},{"ref":"src/render/image.rs:182-183","code":"  182 |     image_x_object.width(dynamic_image.width() as i32);\n  183 |     image_x_object.height(dynamic_image.height() as i32);","lines":2}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In write_font(), the glyph width index variables first and end are of type usize but are cast to u16 when calling width_writer.same(first as u16, last as u16, w). A font with more than 65535 remapped glyphs would silently truncate the glyph indices to u16, producing incorrect width entries in the PDF. While extremely rare in practice, the cast is unchecked.","fix":"Add a bounds check or use u16::try_from(first).map_err(...) before the cast.","locations":[{"ref":"src/render/text.rs:95-103","code":"   95 |     let mut first = 0;\n   96 |     let mut width_writer = cid.widths();\n   97 |     for (w, group) in widths.group_by_key(|&w| w) {\n   98 |         let end = first + group.len();\n   99 |         if w != 0.0 {\n  100 |             let last = end - 1;\n  101 |             width_writer.same(first as u16, last as u16, w);\n  102 |         }\n  103 |         first = end;","lines":9}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"When no output path is given, the auto-derived PDF path strips the directory from the input. `input.file_name()` returns only the bare filename (e.g. `foo.svg`), which is then wrapped in a new `Path` and extended to `foo.pdf`. So `svg2pdf /some/dir/foo.svg` silently writes `./foo.pdf` instead of `/some/dir/foo.pdf`.","fix":"Replace `let name = Path::new(input.file_name()...); let output = output.unwrap_or_else(|| name.with_extension(\"pdf\"));` with `let output = output.unwrap_or_else(|| input.with_extension(\"pdf\"));`. The `Path::new()` wrapper around `file_name()` is the culprit - call `with_extension` directly on `input`.","locations":[{"ref":"cli/src/convert.rs:45-46","code":"   45 |     let name = Path::new(input.file_name().ok_or(\"Input path does not point to a file\")?);\n   46 |     let output = output.unwrap_or_else(|| name.with_extension(\"pdf\"));","lines":2}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"save_state_checked() calls self.save_state() first and then checks if the nesting depth exceeds 28. This means the 29th q operator is already written to the content stream before the error is returned. The PDF spec (ISO 32000-1, Table 57) limits q/Q nesting to 28 levels, so the 29th q produces a malformed content stream that will be discarded only if the caller propagates the error. The check should happen before the state is pushed, or the threshold should be 27.","fix":"Check the depth before calling save_state(): if self.state_nesting_depth() >= 28 { return Err(...); } self.save_state(); Ok(())","locations":[{"ref":"src/util/helper.rs:58-64","code":"   58 |     fn save_state_checked(&mut self) -> Result<()> {\n   59 |         self.save_state();\n   60 |         if self.state_nesting_depth() > 28 {\n   61 |             return Err(ConversionError::TooMuchNesting);\n   62 |         }\n   63 |         Ok(())\n   64 |     }","lines":7}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"stroke_path() skips drawing when bounds are zero in BOTH dimensions (&&), whereas fill_path() skips when EITHER dimension is zero (||). A perfectly horizontal or vertical path (width=0 or height=0 but not both) will still attempt a stroke but silently skip the fill. This is likely intentional (lines have no fill area) but the asymmetry is undocumented and may confuse maintainers.","fix":"Add a brief comment on both guards explaining the intentional difference between the two conditions.","locations":[{"ref":"src/render/path.rs:100","code":"  100 |     if path.data().bounds().width() == 0.0 && path.data().bounds().height() == 0.0 {","lines":1},{"ref":"src/render/path.rs:226","code":"  226 |     if path.data().bounds().width() == 0.0 || path.data().bounds().height() == 0.0 {","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In fill_fonts(), the subroots loop collects errors using result = result.and(...), which only keeps the first error and silently discards subsequent errors from other subroots. While this is unlikely to hide important failures in practice, the pattern is surprising and the last error would be the one propagated if the loop body re-assigns result.","fix":"Use early return on the first error inside the closure instead of accumulating with .and(), or use a break-on-error pattern.","locations":[{"ref":"src/render/text.rs:570-574","code":"  570 |         let mut result = Ok(());\n  571 |         child.subroots(|subroot| {\n  572 |             result = result.and(fill_fonts(subroot, ctx, fontdb));\n  573 |         });\n  574 |         result?;","lines":5}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"The OS error from `fs::read_to_string` and `fs::write` is silently discarded via `map_err(|_| ...)`. The user sees a generic message like \"Failed to load SVG file\" with no indication of why (e.g. permission denied, file not found, disk full).","fix":"Preserve the OS error: `map_err(|e| format!(\"Failed to load SVG file: {e}\"))` and `map_err(|e| format!(\"Failed to write PDF file: {e}\"))`.","locations":[{"ref":"cli/src/convert.rs:48","code":"   48 |     let svg = std::fs::read_to_string(input).map_err(|_| \"Failed to load SVG file\")?;","lines":1},{"ref":"cli/src/convert.rs:55","code":"   55 |     std::fs::write(output, pdf).map_err(|_| \"Failed to write PDF file\")?;","lines":1}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`ColorChoice::Always` in `print_error` forces ANSI color codes on stderr even when stderr is redirected to a file or a non-terminal. The `termcolor` crate provides `ColorChoice::Auto` (or `ColorChoice::AlwaysAnsi`) for correct tty detection.","fix":"Use `ColorChoice::Auto` so color is only emitted when stderr is a real terminal that supports it.","locations":[{"ref":"cli/src/main.rs:57","code":"   57 |     let mut w = StandardStream::stderr(ColorChoice::Always);","lines":1}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In create_simple_clip_path(), when a simple clip path has no shapes with fills (clip_rules is empty), the vacuous all() predicate is true and create_simple_clip_path() is called with the default FillRule::NonZero. The function still emits a move_to(0,0) sentinel point and a clip_nonzero/end_path pair against an empty path. While this produces the correct effect (clips to nothing), the move_to(0,0) dummy point is an undocumented hack that could interact unexpectedly with viewers that interpret lone points differently.","fix":"Document the dummy move_to(0,0) sentinel with a clear comment explaining that it ensures the clip path operator is always emitted even when all children are invisible.","locations":[{"ref":"src/render/clip_path.rs:109-124","code":"  109 |     // Just a dummy operation, so that in case the clip path only has hidden children the clip\n  110 |     // path will still be applied and everything will be hidden.\n  111 |     content.move_to(0.0, 0.0);\n  112 | \n  113 |     let base_transform = clip_path.transform();\n  114 | \n  115 |     let mut segments = vec![];\n  116 |     extend_segments_from_group(clip_path.root(), &base_transform, &mut segments);\n  117 |     draw_path(segments.into_iter(), content);\n  118 | \n  119 |     if clip_rule == FillRule::NonZero {\n  120 |         content.clip_nonzero();\n  121 |     } else {\n  122 |         content.clip_even_odd();\n  123 |     }\n  124 |     content.end_path();","lines":16}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":true,"description":"`convert_()` accepts `input: &PathBuf` instead of `input: &Path`. Accepting `&PathBuf` is an anti-pattern in Rust - it unnecessarily restricts callers and is semantically identical to `&Path` for all path operations used inside the function.","fix":"Change the parameter type to `input: &Path` and update the call-site in `main.rs` from `&input` to `input.as_path()` or simply `&input` (coercion works automatically when the type is `&Path`).","locations":[{"ref":"cli/src/convert.rs:9","code":"    9 |     input: &PathBuf,","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"render() in text.rs clones the entire ctx.fonts HashMap on every call to a Text node (one clone per text element in the SVG). The clone is required only to avoid a simultaneous immutable and mutable borrow of ctx, but it can be expensive for documents with many fonts. The comment itself acknowledges this with \"TODO: Don't clone here\".","fix":"Restructure the code to avoid the dual borrow. For example, collect the needed font data into a small local vec before the second loop, rather than cloning the whole map.","locations":[{"ref":"src/render/text.rs:225-227","code":"  225 |     // TODO: Don't clone here...\n  226 |     let fonts = ctx.fonts.clone();\n  227 | ","lines":3}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"When the CLI is built without the `text` feature, `convert_()` still constructs a full `fontdb::Database`, optionally calls `load_system_fonts()` (which can be slow - it scans system font directories), iterates font paths, and sets five generic font families - all of this work is immediately discarded because the `fontdb` variable is unused in the `#[cfg(not(feature = \"text\"))]` branch.","fix":"Wrap lines 19-33 in `#[cfg(feature = \"text\")]` so the font database is only built when it will actually be used.","locations":[{"ref":"cli/src/convert.rs:19-33","code":"   19 |     let mut fontdb = fontdb::Database::new();\n   20 | \n   21 |     if !font_options.ignore_system_fonts {\n   22 |         fontdb.load_system_fonts();\n   23 |     }\n   24 | \n   25 |     for font_path in &font_options.font_paths {\n   26 |         fontdb.load_fonts_dir(font_path);\n   27 |     }\n   28 | \n   29 |     fontdb.set_serif_family(\"Times New Roman\");\n   30 |     fontdb.set_sans_serif_family(\"Arial\");\n   31 |     fontdb.set_cursive_family(\"Comic Sans MS\");\n   32 |     fontdb.set_fantasy_family(\"Impact\");\n   33 |     fontdb.set_monospace_family(\"Courier New\");","lines":15},{"ref":"cli/src/convert.rs:41-42","code":"   41 |     #[cfg(not(feature = \"text\"))]\n   42 |     let options = usvg::Options::default();","lines":2}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"fill_fonts() in text.rs parses each font face twice: once in fill_fonts() (to extract units_per_em) and once in write_font() (to write the font data). The TODO comment on line 525 acknowledges this. For documents with many fonts or large font files this doubles the parsing cost.","fix":"Cache the parsed Face or its extracted metadata in the Font struct during fill_fonts() so write_font() can reuse it without re-parsing.","locations":[{"ref":"src/render/text.rs:524-543","code":"  524 |                                 .with_face_data(g.font, |data, face_index| {\n  525 |                                     // TODO: Currently, we are parsing each font twice, once here\n  526 |                                     // and once again when writing the fonts. We should probably\n  527 |                                     // improve on that...\n  528 |                                     if let Ok(ttf) =\n  529 |                                         ttf_parser::Face::parse(data, face_index)\n  530 |                                     {\n  531 |                                         let reference = allocator.alloc_ref();\n  532 |                                         let glyph_set = BTreeMap::new();\n  533 |                                         let glyph_remapper = GlyphRemapper::new();\n  534 |                                         return Some(Font {\n  535 |                                             id: g.font,\n  536 |                                             reference,\n  537 |                                             face_data: Arc::new(Vec::from(data)),\n  538 |                                             units_per_em: ttf.units_per_em(),\n  539 |                                             glyph_set,\n  540 |                                             glyph_remapper,\n  541 |                                             face_index,\n  542 |                                         });\n  543 |                                     }","lines":20}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"medium","easy":false,"description":"The `verbosity` CLI argument is parsed and stored but never read or acted upon. The log level is hardcoded to `Warn` unconditionally in `convert_()`, and there is no code path that maps `args.verbosity` to a log level. The flag is advertised in the help text (`-v = warning & error, -vv = info, -vvvv = trace`) but has no effect.","fix":"Either remove the `--verbosity` / `-v` argument, or implement the mapping (e.g. `match args.verbosity { 0 => Warn, 1 => Info, 2 => Debug, _ => Trace }`) before calling `log::set_max_level`. The logger's `enabled` method also needs updating to reflect the chosen level.","locations":[{"ref":"cli/src/args.rs:15-18","code":"   15 |     /// Sets the level of logging verbosity:\n   16 |     /// -v = warning & error, -vv = info, -vvv = debug, -vvvv = trace\n   17 |     #[clap(short, long, action = ArgAction::Count)]\n   18 |     pub verbosity: u8,","lines":4},{"ref":"cli/src/convert.rs:15-17","code":"   15 |     if let Ok(()) = log::set_logger(&LOGGER) {\n   16 |         log::set_max_level(log::LevelFilter::Warn);\n   17 |     }","lines":3}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"The `Info`, `Debug`, and `Trace` branches in the `SimpleLogger::log` match are unreachable at runtime because the logger's `enabled` method unconditionally filters to `<= Warn` and `set_max_level` is set to `Warn`. These three match arms can never execute.","fix":"Either fix the verbosity handling so these levels become reachable (see the verbosity finding) "lines":2}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"Font database initialization is duplicated between `convert_()` and `fonts()`. Both functions contain the same pattern: create `fontdb::Database::new()`, conditionally call `load_system_fonts()`, loop over `font_paths` calling `load_fonts_dir()`. The only difference is that `convert_()` also sets default families.","fix":"Extract a shared helper, e.g. `fn build_fontdb(args: &FontsArgs) -> fontdb::Database`, that handles the common setup, then call it from both `convert_()` and `fonts()`.","locations":[{"ref":"cli/src/convert.rs:19-27","code":"   19 |     let mut fontdb = fontdb::Database::new();\n   20 | \n   21 |     if !font_options.ignore_system_fonts {\n   22 |         fontdb.load_system_fonts();\n   23 |     }\n   24 | \n   25 |     for font_path in &font_options.font_paths {\n   26 |         fontdb.load_fonts_dir(font_path);\n   27 |     }","lines":9},{"ref":"cli/src/fonts.rs:7-15","code":"    7 |     let mut fontdb = fontdb::Database::new();\n    8 | \n    9 |     if !command.font.ignore_system_fonts {\n   10 |         fontdb.load_system_fonts();\n   11 |     }\n   12 | \n   13 |     for font_path in &command.font.font_paths {\n   14 |         fontdb.load_fonts_dir(font_path);\n   15 |     }","lines":9}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"The fill() and stroke() functions in path.rs are structurally near-identical: both match on Paint, set a colour space, handle opacity via a graphics state, construct a shading pattern with soft mask, then call an operation closure. The only differences are stroke vs fill API calls and one extra opacity parameter for gradient strokes (to work around an XPDF bug). This duplication (~80 lines each) means bug fixes and changes must be applied in both places.","fix":"Extract a shared paint_setup() helper that takes a PaintTarget enum (Stroke / Fill) and handles the common logic, reducing duplication.","locations":[{"ref":"src/render/path.rs:126-215","code":"  126 | /// Prepare the stroke color and then perform some operation (either drawing text or\n  127 | /// drawing a path).\n  128 | #[allow(clippy::too_many_arguments)]\n  129 | pub(crate) fn stroke(\n  130 |     stroke: &Stroke,\n  131 |     chunk: &mut Chunk,\n  132 |     content: &mut Content,\n  133 |     ctx: &mut Context,\n  134 |     rc: &mut ResourceContainer,\n  135 |     operation: impl Fn(&mut Content, &Stroke) -> Result<()>,\n  136 |     accumulated_transform: Transform,\n  137 |     bbox: Rect,\n  138 | ) -> Result<()> {\n  139 |     let paint = &stroke.paint();\n  140 | \n  141 |     content.save_state_checked()?;\n  142 | \n  143 |     match paint {\n  144 |         Paint::Color(c) => {\n  145 |             set_opacity_gs(chunk, content, ctx, Some(stroke.opacity()), None, rc);\n  146 |             let srgb_name = rc.add_color_space(ctx.srgb_ref());\n  147 |             let srgb_name = ColorSpaceOperand::Named(srgb_name.to_pdf_name());\n  148 |             content.set_stroke_color_space(srgb_name);\n  149 |             content.set_stroke_color(c.to_pdf_color());\n  150 |         }\n  151 |         Paint::Pattern(p) => {\n  152 |             // Instead of setting the opacity via an external graphics state, we to it\n  153 |             // by passing the opacity on to the pattern. The reason is that, for example\n  154 |             // if we use a pattern as a stroke and set a stroke-opacity of 0.5, when rendering\n  155 |             // the pattern, the opacity would only apply to strokes in that pattern, instead of\n  156 |             // the whole pattern itself. This is why we need to handle this case differently.\n  157 |             let pattern_ref = pattern::create(\n  158 |                 p.clone(),\n  159 |                 chunk,\n  160 |                 ctx,\n  161 |                 accumulated_transform,\n  162 |                 Some(stroke.opacity()),\n  163 |             )?;\n  164 |             let pattern_name = rc.add_pattern(pattern_ref);\n  165 |             content.set_stroke_color_space(Pattern);\n  166 |             content.set_stroke_pattern(None, pattern_name.to_pdf_name());\n  167 |         }\n  168 |         Paint::LinearGradient(_) | Paint::RadialGradient(_) => {\n  169 |             // In XPDF, the opacity will only be applied to the gradient if we also set the\n  170 |             // fill opacity.\n  171 |             set_opacity_gs(\n  172 |                 chunk,\n  173 |                 content,\n  174 |                 ctx,\n  175 |                 Some(stroke.opacity()),\n  176 |                 Some(stroke.opacity()),\n  177 |                 rc,\n  178 |             );\n  179 | \n  180 |             if let Some(soft_mask) =\n  181 |                 gradient::create_shading_soft_mask(paint, chunk, ctx, bbox)\n  182 |             {\n  183 |                 let soft_mask_name = rc.add_graphics_state(soft_mask);\n  184 |                 content.set_parameters(soft_mask_name.to_pdf_name());\n  185 |             }\n  186 | \n  187 |             let pattern_ref = gradient::create_shading_pattern(\n  188 |                 paint,\n  189 |                 chunk,\n  190 |                 ctx,\n  191 |                 &accumulated_transform,\n  192 |             );\n  193 |             let pattern_name = rc.add_pattern(pattern_ref);\n  194 |             content.set_stroke_color_space(Pattern);\n  195 |             content.set_stroke_pattern(None, pattern_name.to_pdf_name());\n  196 |         }\n  197 |     }\n  198 | \n  199 |     content.set_line_width(stroke.width().get());\n  200 |     content.set_miter_limit(stroke.miterlimit().get());\n  201 |     content.set_line_cap(stroke.linecap().to_pdf_line_cap());\n  202 |     content.set_line_join(stroke.linejoin().to_pdf_line_join());\n  203 | \n  204 |     if let Some(dasharray) = &stroke.dasharray() {\n  205 |         content.set_dash_pattern(dasharray.iter().cloned(), stroke.dashoffset());\n  206 |     } else {\n  207 |         content.set_dash_pattern(vec![], 0.0);\n  208 |     }\n  209 | \n  210 |     operation(content, stroke)?;\n  211 | \n  212 |     content.restore_state();\n  213 | \n  214 |     Ok(())\n  215 | }","lines":90},{"ref":"src/render/path.rs:252-316","code":"  252 | /// Prepare the fill color and then perform some operation (either drawing text or\n  253 | /// drawing a path).\n  254 | #[allow(clippy::too_many_arguments)]\n  255 | pub(crate) fn fill(\n  256 |     fill: &Fill,\n  257 |     chunk: &mut Chunk,\n  258 |     content: &mut Content,\n  259 |     ctx: &mut Context,\n  260 |     rc: &mut ResourceContainer,\n  261 |     operation: impl Fn(&mut Content, &Fill) -> Result<()>,\n  262 |     accumulated_transform: Transform,\n  263 |     bbox: Rect,\n  264 | ) -> Result<()> {\n  265 |     let paint = &fill.paint();\n  266 | \n  267 |     content.save_state_checked()?;\n  268 | \n  269 |     match paint {\n  270 |         Paint::Color(c) => {\n  271 |             set_opacity_gs(chunk, content, ctx, None, Some(fill.opacity()), rc);\n  272 |             let srgb_name = rc.add_color_space(ctx.srgb_ref());\n  273 |             let srgb_name = ColorSpaceOperand::Named(srgb_name.to_pdf_name());\n  274 |             content.set_fill_color_space(srgb_name);\n  275 |             content.set_fill_color(c.to_pdf_color());\n  276 |         }\n  277 |         Paint::Pattern(p) => {\n  278 |             // See note in the `stroke` function.\n  279 |             let pattern_ref = pattern::create(\n  280 |                 p.clone(),\n  281 |                 chunk,\n  282 |                 ctx,\n  283 |                 accumulated_transform,\n  284 |                 Some(fill.opacity()),\n  285 |             )?;\n  286 |             let pattern_name = rc.add_pattern(pattern_ref);\n  287 |             content.set_fill_color_space(Pattern);\n  288 |             content.set_fill_pattern(None, pattern_name.to_pdf_name());\n  289 |         }\n  290 |         Paint::LinearGradient(_) | Paint::RadialGradient(_) => {\n  291 |             set_opacity_gs(chunk, content, ctx, None, Some(fill.opacity()), rc);\n  292 | \n  293 |             if let Some(soft_mask) =\n  294 |                 gradient::create_shading_soft_mask(paint, chunk, ctx, bbox)\n  295 |             {\n  296 |                 let soft_mask_name = rc.add_graphics_state(soft_mask);\n  297 |                 content.set_parameters(soft_mask_name.to_pdf_name());\n  298 |             }\n  299 | \n  300 |             let pattern_ref = gradient::create_shading_pattern(\n  301 |                 paint,\n  302 |                 chunk,\n  303 |                 ctx,\n  304 |                 &accumulated_transform,\n  305 |             );\n  306 |             let pattern_name = rc.add_pattern(pattern_ref);\n  307 |             content.set_fill_color_space(Pattern);\n  308 |             content.set_fill_pattern(None, pattern_name.to_pdf_name());\n  309 |         }\n  310 |     }\n  311 | \n  312 |     operation(content, fill)?;\n  313 |     content.restore_state();\n  314 | \n  315 |     Ok(())\n  316 | }","lines":65}]}]</script>

<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: 'text/markdown'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
