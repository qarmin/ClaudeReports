<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"luci-app-advanced-reboot defines handleTogglePartition() which calls `this.callTogglePartition()`, but callTogglePartition is never declared. Any UI path that triggers this handler will throw `TypeError: this.callTogglePartition is not a function`.","fix":"Either delete this dead/broken handler, or implement callTogglePartition properly (likely by wiring it to luci.advanced-reboot.boot_partition).","locations":[{"ref":"applications/luci-app-advanced-reboot/htdocs/luci-static/resources/view/system/advanced-reboot.js:169-219","code":"  169 | \thandleTogglePartition: function (ev) {\n  170 | \t\treturn this.callTogglePartition().then(\n  171 | \t\t\tL.bind(function (res) {\n  172 | \t\t\t\tif (res.error) {\n  173 | \t\t\t\t\tui.hideModal();\n  174 | \t\t\t\t\treturn ui.addNotification(\n  175 | \t\t\t\t\t\tnull,\n  176 | \t\t\t\t\t\tE(\"p\", this.translateTable[res.error](res.args))\n  177 | \t\t\t\t\t);\n  178 | \t\t\t\t}\n  179 | \n  180 | \t\t\t\treturn this.callReboot()\n  181 | \t\t\t\t\t.then(function (res) {\n  182 | \t\t\t\t\t\tif (res != 0) {\n  183 | \t\t\t\t\t\t\tui.addNotification(\n  184 | \t\t\t\t\t\t\t\tnull,\n  185 | \t\t\t\t\t\t\t\tE(\"p\", _(\"The reboot command failed with code %d\").format(res))\n  186 | \t\t\t\t\t\t\t);\n  187 | \t\t\t\t\t\t\tL.raise(\"Error\", \"Reboot failed\");\n  188 | \t\t\t\t\t\t}\n  189 | \n  190 | \t\t\t\t\t\tui.showModal(_(\"Rebooting…\"), [\n  191 | \t\t\t\t\t\t\tE(\n  192 | \t\t\t\t\t\t\t\t\"p\",\n  193 | \t\t\t\t\t\t\t\t{ class: \"spinning\" },\n  194 | \t\t\t\t\t\t\t\t_(\n  195 | \t\t\t\t\t\t\t\t\t\"The system is rebooting to an alternative partition now.<br /> DO NOT POWER OFF THE DEVICE!<br /> \" +\n  196 | \t\t\t\t\t\t\t\t\t\"Wait a few minutes before you try to reconnect.\" +\n  197 | \t\t\t\t\t\t\t\t\t\" It might be necessary to renew the address of your computer to reach the \n   86 | \t\t\tif (match(logdir, /\\.\\.\\//)) {\n   87 | \t\t\t\tlogdir = ddns_log_path;\n   88 | \t\t\t}\n   89 | \n   90 | \t\t\t// Check if service_name is provided and log file exists\n   91 | \t\t\tif (request.args && request.args.service_name && stat(`${logdir}/${request.args.service_name}.log`)?.type == 'file' ) {\n   92 | \t\t\t\tresult = readfile(`${logdir}/${request.args.service_name}.log`);\n   93 | \t\t\t}\n   94 | \n   95 | \t\t\tuci.unload();\n   96 | \t\t\treturn { result: result };\n   97 | \t\t}\n   98 | \t},"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"dockerman docker_rpc.uc run_ttyd builds a shell command string with user-supplied id, cmd, port and uid directly interpolated, then runs it via `system(ttyd_cmd)`. All four values are controllable from the LuCI UI (and thus from any authenticated user with docker ACL). Examples: setting cmd to `/bin/sh; rm -rf /` or uid to `'$(id)'` yields trivial command injection. The pkill string also interpolates port unquoted into a pattern.","fix":"Validate inputs strictly (id: container id regex; port: integer; uid: numeric or POSIX user; cmd: allowlist), and prefer spawning ttyd with argv array via popen(['ttyd', ...], 'r') instead of building a shell line.","locations":[{"ref":"applications/luci-app-dockerman/root/usr/share/rpcd/ucode/docker_rpc.uc:289-325","code":"  289 | function run_ttyd(request) {\n  290 | \n  291 | \tconst id = request.args.id || '';\n  292 | \tconst cmd = request.args.cmd || '/bin/sh';\n  293 | \tconst port = request.args.port || 7682;\n  294 | \tconst uid = request.args.uid || '';\n  295 | \n  296 | \tif (!id) {\n  297 | \t\treturn { error: 'Container ID is required' };\n  298 | \t}\n  299 | \n  300 | \tlet ttyd_cmd = `ttyd -q -d 2 --once --writable -p ${port} docker`;\n  301 | \tconst sock_addr = ds.get_socket_dest();\n  302 | \n  303 | \t/* Build the full command:\n  304 | \tttyd --writable -d 2 --once -p PORT docker -H unix://SOCKET exec -it [-u UID] CONTAINER CMD\n  305 | \n  306 | \tif the socket is /var/run/docker.sock, prefix unix://\n  307 | \n  308 | \tNote: invocations of docker -H x.x.x.x:2375 [..] will fail after v27 without --tls*\n  309 | \t*/\n  310 | \tconst sock_str = index(sock_addr, '/') != -1 && index(sock_addr, 'unix://') == -1 ? 'unix://' + sock_addr : sock_addr;\n  311 | \tttyd_cmd = `${ttyd_cmd} -H \"${sock_str}\" exec -it`;\n  312 | \tif (uid && uid !== '') {\n  313 | \t\tttyd_cmd = `${ttyd_cmd} -u ${uid}`;\n  314 | \t}\n  315 | \n  316 | \tttyd_cmd = `${ttyd_cmd} ${id} ${cmd} &`;\n  317 | \n  318 | \t// Try to kill any existing ttyd processes on this port\n  319 | \tsystem(`pkill -f \"ttyd.*-p ${port}\"` + ' 2>/dev/null; true');\n  320 | \n  321 | \t// Start ttyd\n  322 | \tsystem(ttyd_cmd);\n  323 | \n  324 | \treturn { status: 'ttyd started', command: ttyd_cmd };\n  325 | }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"`Zone.__init__` calls `uci.get('firewall', 'zone')` and then iterates over `sections.length` — but `uci.get(config, sid)` returns a single section object (or null) for the section literally named 'zone', not an array. As a consequence the lookup-by-name loop never finds anything (it iterates over the `length` property of an object/null, which is undefined or throws on null). The author clearly meant `uci.sections('firewall', 'zone')`, which is used correctly in `lookupZone()`.","fix":"Replace `var sections = uci.get('firewall', 'zone');` with `var sections = uci.sections('firewall', 'zone');` inside the Zone constructor.","locations":[{"ref":"modules/luci-base/htdocs/luci-static/resources/firewall.js:313-332","code":"  313 | Zone = AbstractFirewallItem.extend({\n  314 | \t__init__: function(name) {\n  315 | \t\tvar section = uci.get('firewall', name);\n  316 | \n  317 | \t\tif (section != null && section['.type'] == 'zone') {\n  318 | \t\t\tthis.sid  = name;\n  319 | \t\t\tthis.data = section;\n  320 | \t\t}\n  321 | \t\telse if (name != null) {\n  322 | \t\t\tvar sections = uci.get('firewall', 'zone');\n  323 | \n  324 | \t\t\tfor (var i = 0; i < sections.length; i++) {\n  325 | \t\t\t\tif (sections[i].name != name)\n  326 | \t\t\t\t\tcontinue;\n  327 | \n  328 | \t\t\t\tthis.sid  = sections[i]['.name'];\n  329 | \t\t\t\tthis.data = sections[i];\n  330 | \t\t\t\tbreak;\n  331 | \t\t\t}\n  332 | \t\t}"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"`uci.apply()` captures the current time once into `date = new Date()` and then compares `date.getTime() < try_deadline` inside the retry callback. Since `date` is never refreshed, this comparison is effectively `now0 < now0 + 1000*timeout`, which is always true. The function will therefore retry `try_confirm` forever on non-zero return codes instead of giving up after `timeout` seconds. Additionally, `window.setTimeout(try_confirm, 1000)` is not returned, so the outer promise resolves with `undefined` and the caller cannot observe success/failure of the confirm phase.","fix":"Use `Date.now()` inside `try_confirm` for the deadline comparison and return a chained promise so the caller can await it.","locations":[{"ref":"modules/luci-base/htdocs/luci-static/resources/uci.js:991-1018","code":"  991 | \tapply(timeout) {\n  992 | \t\tconst self = this;\n  993 | \t\tconst date = new Date();\n  994 | \n  995 | \t\tif (typeof(timeout) != 'number' || timeout < 1)\n  996 | \t\t\ttimeout = 10;\n  997 | \n  998 | \t\treturn self.callApply(timeout, true).then(rv => {\n  999 | \t\t\tif (rv != 0)\n 1000 | \t\t\t\treturn Promise.reject(rv);\n 1001 | \n 1002 | \t\t\tconst try_deadline = date.getTime() + 1000 * timeout;\n 1003 | \t\t\tconst try_confirm = () => {\n 1004 | \t\t\t\treturn self.callConfirm().then(rv => {\n 1005 | \t\t\t\t\tif (rv != 0) {\n 1006 | \t\t\t\t\t\tif (date.getTime() < try_deadline)\n 1007 | \t\t\t\t\t\t\twindow.setTimeout(try_confirm, 250);\n 1008 | \t\t\t\t\t\telse\n 1009 | \t\t\t\t\t\t\treturn Promise.reject(rv);\n 1010 | \t\t\t\t\t}\n 1011 | \n 1012 | \t\t\t\t\treturn rv;\n 1013 | \t\t\t\t});\n 1014 | \t\t\t};\n 1015 | \n 1016 | \t\t\twindow.setTimeout(try_confirm, 1000);\n 1017 | \t\t});\n 1018 | \t},"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"querySelector with malformed CSS selector. The selector string `'input:not([type=\"hidden\"]):not([type=\"checkbox\"]'` is missing both the closing `]` for the second attribute selector and the closing `)` for the `:not()` pseudo-class. This will throw a SyntaxError at runtime whenever the user presses arrow-down on the last `<li>` in a dropdown with `create:true`, breaking keyboard navigation in Combobox widgets and other create-enabled dropdowns.","fix":"Close the attribute and `:not()`: replace with `'input:not([type=\"hidden\"]):not([type=\"checkbox\"])'`.","locations":[{"ref":"modules/luci-base/htdocs/luci-static/resources/ui.js:1925-1934","code":" 1925 | \t\t\tcase 40:\n 1926 | \t\t\t\tif (active && active.nextElementSibling) {\n 1927 | \t\t\t\t\tconst li = active.nextElementSibling;\n 1928 | \t\t\t\t\tthis.setFocus(sb, li);\n 1929 | \t\t\t\t\tif (this.options.create && li == li.parentNode.lastElementChild) {\n 1930 | \t\t\t\t\t\tconst input = li.querySelector('input:not([type=\"hidden\"]):not([type=\"checkbox\"]');\n 1931 | \t\t\t\t\t\tif (input) input.focus();\n 1932 | \t\t\t\t\t}\n 1933 | \t\t\t\t\tev.preventDefault();\n 1934 | \t\t\t\t}"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"Template literals use single quotes instead of backticks, so `${info.name}` and `${info.color}` are never interpolated. The querySelector ends up searching for the literal selector `[data-indicator=\"${info.name}\"]` (which matches nothing), so `info.element` is null and the next line `info.element.innerHTML = ...` throws a TypeError. The dashboard bat ffset);\n  439 | \t\t\tlet ubiVol = amo.ubiVolume == null ? 0 : int(amo.ubiVolume);\n  440 | \t\t\tlet idx = mtd_index(mtd);\n  441 | \t\t\tif (idx != null) {\n  442 | \t\t\t\tlet op_ubi = idx + mtdOff;\n  443 | \t\t\t\tinfo = get_partition_info_alt(op_ubi, dev.vendor ?? null, ubiVol);\n  444 | \t\t\t\tif (info && info.label == null && info.os == null) info = {};\n  445 | \t\t\t}\n  446 | \t\t}"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","description":"attendedsysupgrade handleInstall sets `form_data.append('filemode', 600)` with a decimal literal, intending an octal POSIX mode 0600. 600 decimal is 0o1130 — completely different permission bits. The uploaded firmware ends up with unexpected mode.","fix":"Pass the value as the string '0600' (or 0o600 / 384 decimal).","locations":[{"ref":"applications/luci-app-attendedsysupgrade/htdocs/luci-static/resources/view/attendedsysupgrade/overview.js:458-465","code":"  458 | \t\t\t.then((response) => {\n  459 | \t\t\t\tlet form_data = new FormData();\n  460 | \t\t\t\tform_data.append('sessionid', rpc.getSessionID());\n  461 | \t\t\t\tform_data.append('filename', '/tmp/firmware.bin');\n  462 | \t\t\t\tform_data.append('filemode', 600);\n  463 | \t\t\t\tform_data.append('filedata', response.blob());\n  464 | \n  465 | \t\t\t\tui.showModal(_('Uploading...'), ["}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","description":"DDNS overview defines HandleStopDDnsRule (capital H), wired to the 'Stop' button, but it invokes the helper with `'start'` instead of `'stop'`. Pressing 'Stop' for a service actually (re)starts it.","fix":"Rename to handleStopDDnsRule and pass 'stop' (or the correct subcommand) to dynamic_dns_lucihelper.sh.","locations":[{"ref":"applications/luci-app-ddns/htdocs/luci-static/resources/view/ddns/overview.js:174-179","code":"  174 | \tHandleStopDDnsRule(m, section_id, ev) {\n  175 | \t\treturn fs.exec('/usr/lib/ddns/dynamic_dns_lucihelper.sh',\n  176 | \t\t\t\t\t\t\t[ '-S', section_id, '--', 'start' ])\n  177 | \t\t\t.then(L.bind(m.render, m))\n  178 | \t\t\t.catch(function(e) { ui.addNotification(null, E('p', e.message)) });\n  179 | \t},"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"high","description":"ddns.uc hasFetchSsl checks `stat('/lib/libustream-ssl.so') == 0`. The fs.stat() function returns an object or null, never the integer 0, so this expression is always false and the SSL capability is never detected for uclient-fetch.","fix":"Test for truthiness: `return stat('/lib/libustream-ssl.so') != null;` (or use glob() to handle versioned filenames).","locations":[{"ref":"applications/luci-app-ddns/root/usr/share/rpcd/ucode/ddns.uc:258-260","code":"  258 | \t\t\tconst hasFetchSsl = () => {\n  259 | \t\t\t\treturn stat('/lib/libustream-ssl.so') == 0 ? true : false;\n  260 | \t\t\t};"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"high","description":"dockerman common.js getContainerStatus is invoked without an argument at one call site (this.getContainerStatus()), even though the function requires a container parameter and unconditionally accesses this_container.State.Status. With no argument it returns 'unknown' instead of the real state, so the WebSocket-console tab incorrectly always reports the container as not running.","fix":"Pass this_container as in every other call site: `const status = this.getContainerStatus(this_container);`.","locations":[{"ref":"applications/luci-app-dockerman/htdocs/luci-static/resources/view/dockerman/container.js:1087-1095","code":" 1087 | \t\t\to = s.taboption('wsconsole', form.DummyValue, 'wsconsole_controls', _('WebSocket Console'));\n 1088 | \t\t\to.render = L.bind(function() {\n 1089 | \t\t\t\tconst status = this.getContainerStatus();\n 1090 | \t\t\t\tconst isRunning = status === 'running';\n 1091 | \n 1092 | \t\t\t\tif (!isRunning) {\n 1093 | \t\t\t\t\treturn E('div', { 'class': 'alert- 64 | \t\t\t\t\t\t\t\t\t\t'id': 'columnMaxWidths-input',\n  965 | \t\t\t\t\t\t\t\t\t\t'value': Object.values(config.columnMaxWidths).join(''),\n  966 | \t\t\t\t\t\t\t\t\t\t'style': 'width:100%; margin-bottom:10px;'\n  967 | \t\t\t\t\t\t\t\t\t})\n  968 | \t\t\t\t\t\t\t\t]),"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"high","description":"filemanager queries the DOM with a CSS attribute selector containing the raw file path: `document.querySelector(\\`tr[data-file-path='${filePath}']\\`)`. If filePath contains a single quote (legal in Unix filenames) the selector becomes syntactically invalid and querySelector throws SyntaxError.","fix":"Escape the path with CSS.escape() or store a reference to the row element.","locations":[{"ref":"applications/luci-app-filemanager/htdocs/luci-static/resources/view/system/filemanager.js:1887-1895","code":" 1887 | \thandleFileClick(filePath, mode) {\n 1888 | \t\tconst self = this;\n 1889 | \t\tconst fileRow = document.querySelector(`tr[data-file-path='${filePath}']`);\n 1890 | \t\tconst editorMessage = document.getElementById('editor-message');\n 1891 | \n 1892 | \t\t// Set original file permissions\n 1893 | \t\tself.originalFilePermissions = fileRow ? fileRow.getAttribute('data-numeric-permissions') : '644';\n 1894 | \t\tself.editorMode = mode;\n 1895 | "}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`etx_color` and `snr_colors` are referenced in OLSR view files but defined only in the common_js.js module and never exported via the L.Class.extend wrapper. Calling these helpers from neighbors.js / routes.js / topology.js throws ReferenceError unless a separate <script> tag has loaded common_js.js into the global scope first.","fix":"Export `etx_color` and `snr_colors` from common_js.js as members of the returned L.Class.","locations":[{"ref":"applications/luci-app-olsr/htdocs/luci-static/resources/olsr/common_js.js:6-32","code":"    6 | function k to the .mk file\n   65 | \t\t\techo \"$updated_content\" > $(dirname \"$0\")/../luci.mk\n   66 | \n   67 | \t\t\techo \"Be sure to update the new language name in $(dirname \"$0\")/../luci.mk\"\n   68 | \n   69 | \t\tfi\n   70 | \tdone\n   71 | fi"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"high","description":"build/i18n-init.sh's git probe is effectively only \"git binary exists\" — the `git status` output is swallowed by the redirection, so SCM will be set to \"git\" even when run outside any git working tree, leading the later `git add` to fail.","fix":"Replace with: `git -C . rev-parse --is-inside-work-tree >/dev/null 2>&1 && SCM=git`.","locations":[{"ref":"build/i18n-init.sh:10-17","code":"   10 | [ -d .svn ] && SCM=\"svn\"\n   11 | git=$( command -v git 2>/dev/null )\n   12 | [ \"$git\" ] && \"$git\" status >/dev/null && SCM=\"git\"\n   13 | \n   14 | [ -z \"$SCM\" ] && {\n   15 | \techo \"Unsupported SCM tool\" >&2\n   16 | \texit 1\n   17 | }"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"high","description":"i18n-update.pl uses the classic Perl precedence bug: `open P, \"< $file\" || die \"...\"`. Because `||` binds tighter than the comma here, the die only fires when the literal mode string is false, which never happens. As a result a failing open is silently ignored and subsequent `readline P` runs on an unopened handle.","fix":"Use parentheses or `or` (lower precedence): `open(P, \"< $file\") or die \"open(): $!\"`.","locations":[{"ref":"build/i18n-update.pl:13-15","code":"   13 | \topen P, \"< $file\" || die \"open(): $!\";\n   14 | \tmy $data = readline P;\n   15 | \tclose P;"},{"ref":"build/i18n-update.pl:34-36","code":"   34 | \topen P, \"< $file\" || die \"open(): $!\";\n   35 | \tmy $data = readline P;\n   36 | \tclose P;"},{"ref":"build/i18n-update.pl:46-49","code":"   46 | \topen P, \"> $file\" || die \"open(): $!\";\n   47 | \tprint P $data;\n   48 | \tclose P;\n   49 | }"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In Lua's luci.json encoder, parse_iter treats a Lua table as an OBJECT only when `#obj == 0 and next(obj)` is true. This means *non-empty* sequences (arrays with #obj > 0) always fall into the array branch even if the table has additional string keys, and any data set as a mixed (associative+positional) table is silently truncated to an array.","fix":"Detect object semantics with a proper test (e.g. iterate once and check if any non-integer key exists, or expose explicit array/object markers).","locations":[{"ref":"libs/luci-lib-json/luasrc/json.lua:142-182","code":"  142 | function Encoder.parse_iter(self, obj)\n  143 | \tif obj == null then\n  144 | \t\treturn self:put(\"null\")\n  145 | \tend\n  146 | \n  147 | \tif type(obj) == \"table\" and (#obj == 0 and next(obj)) then\n  148 | \t\tself:put(\"{\")\n  149 | \t\tlocal first = true\n  150 | \n  151 | \t\tfor key, entry in pairs(obj) do\n  152 | \t\t\tif key ~= null then\n  153 | \t\t\t\tfirst = first or self:put(\",\")\n  154 | \t\t\t\tfirst = first and false\n  155 | \t\t\t\tself:parse_string(tostring(key))\n  156 | \t\t\t\tself:put(\":\")\n  157 | \t\t\t\tself:dispatch(entry)\n  158 | \t\t\tend\n  159 | \t\tend\n  160 | \n  161 | \t\tself:put(\"}\")\n  162 | \telse\n  163 | \t\tself:put(\"[\")\n  164 | \t\tlocal first = true\n  165 | \n  166 | \t\tif type(obj) == \"table\" then\n  167 | \t\t\tfor i=1, #obj do\n  168 | \t\t\t\tfirst = first or self:put(\",\")\n  169 | \t\t\t\tfirst = first and nil\n  170 | \t\t\t\tself:dispatch(obj[i])\n  171 | \t\t\tend\n  172 | \t\telse\n  173 | \t\t\tfor entry in obj do\n  174 | \t\t\t\tfirst = first or self:put(\",\")\n  175 | \t\t\t\tfirst = first and nil\n  176 | \t\t\t\tself:dispatch(entry)\n  177 | \t\t\tend\n  178 | \t\tend\n  179 | \n  180 | \t\tself:put(\"]\")\n  181 | \tend\n  182 | end"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"high","description":"nixio.fs.stat(dest, type) passes the Lua built-in function `type` (not the string \"type\") as the second argument to stat. The function reference is never equal to the string \"dir\", so the directory-exists check almost always evaluates false and mkdir is called on already-existing directories.","fix":"Use the string literal: `if nixio.fs.stat(dest, \"type\") ~= \"dir\" then`.","locations":[{"ref":"libs/luci-lib-nixio/root/usr/lib/lua/nixio/fs.lua:74-79","code":"   74 | \tif stat.type == \"dir\" then\n   75 | \t\tif nixio.fs.stat(dest, type) ~= \"dir\" then\n   76 | \t\t\tres, code, msg = nixio.fs.mkdir(dest)\n   77 | \t\telse\n   78 | \t\t\tstat = true\n   79 | \t\tend"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`Map.checkDepends()` is a depth-limited recursive dependency resolver, but the recursion limit increments using the wrong default when `n` is undefined. `(n ?? 10) + 1` evaluates to `11` on the first nested call (because the OR default is 10, not 0), and the next iteration's guard `(11 ?? 0) < 10` is false, so recursion stops after a single re-evaluation pass. The intent is to allow up to 10 dependency re-evaluation rounds; only one happens.","fix":"Use `(n ?? 0) + 1` in the recursive call so the counter starts at 1 and grows monotonically until reaching the limit.","locations":[{"ref":"modules/luci-base/htdocs/luci-static/resources/form.js:755-766","code":"  755 | \tcheckDepends(ev, n) {\n  756 | \t\tlet changed = false;\n  757 | \n  758 | \t\tfor (let i = 0, s = this.children[0]; (s = this.children[i]) != null; i++)\n  759 | \t\t\tif (s.checkDepends(ev, n))\n  760 | \t\t\t\tchanged = true;\n  761 | \n  762 | \t\tif (changed && (n ?? 0) < 10)\n  763 | \t\t\tthis.checkDepends(ev, (n ?? 10) + 1);\n  764 | \n  765 | \t\tui.tabs.updateTabs(ev, this.root);\n  766 | \t},"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`ZoneSelect.renderWidget` defaults a non-existent emptyval to the empty string (`|| ''`), then later uses `if (emptyval == null && anyval)` as the test for cloning anyval into emptyval. Because `'' == null` is `false`, the cloning branch never executes when querySelector returned null, and subsequent `emptyval.querySelector('span')` calls are guarded by truthiness — the entire fix-up of the empty-zone option is silently skipped after switching from output-only to bidirectional zone selection.","fix":"Either drop the `|| ''` fallbacks and use `if (!emptyval && anyval)`, or convert all subsequent checks to truthiness checks.","locations":[{"ref":"modules/luci-base/htdocs/luci-static/resources/tools/widgets.js:209-231","code":"  209 | \t\t\t\telse {\n  210 | \t\t\t\t\tconst anyval = node.querySelector('[data-value=\"*\"]') || '';\n  211 | \t\t\t\t\tlet emptyval = node.querySelector('[data-value=\"\"]') || '';\n  212 | \n  213 | \t\t\t\t\tif (emptyval == null && anyval) {\n  214 | \t\t\t\t\t\temptyval = anyval.cloneNode(true);\n  215 | \t\t\t\t\t\temptyval.removeAttribute('display');\n  216 | \t\t\t\t\t\temptyval.removeAttribute('selected');\n  217 | \t\t\t\t\t\temptyval.setAttribute('data-value', '');\n  218 | \t\t\t\t\t}\n  219 | \n  220 | \t\t\t\t\tif (opt[0]?.allowlocal && emptyval)\n  221 | \t\t\t\t\t\tL.dom.content(emptyval.querySelector('span'), [\n  222 | \t\t\t\t\t\t\tE('strong', _('Device')), E('span', ' (%s)'.format(_('input')))\n  223 | \t\t\t\t\t\t]);\n  224 | \t\t\t\t\tif (opt[0]?.allowany && anyval && emptyval) {\n  225 | \t\t\t\t\t\tL.dom.content(anyval.querySelector('span'), [\n  226 | \t\t\t\t\t\t\tE('strong', _('Any zone')), E('span', ' (%s)'.format(_('forward')))\n  227 | \t\t\t\t\t\t]);\n  228 | \n  229 | \t\t\t\t\t\tanyval.parentNode.insertBefore(emptyval, anyval);\n  230 | \t\t\t\t\t}\n  231 | \t\t\t\t}"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Boolean values are passed to `L.naturalCompare` (which is `Intl.Collator.compare`). The collator coerces them to the strings `\"false\"`/`\"true\"`, and `\"false\" < \"true\"` lexicographically — so directory rows sort AFTER file rows instead of being grouped first.","fix":"Compare directly: `return (b.type == 'directory') - (a.type == 'directory') || L.naturalCompare(a.name, b.name);`.","locations":[{"ref":"modules/luci-base/htdocs/luci-static/resources/ui.js:3463-3466","code":" 3463 | \t\tlist.sort((a, b) => {\n 3464 | \t\t\treturn L.naturalCompare(a.type == 'directory', b.type == 'directory') ||\n 3465 | \t\t\t\t   L.naturalCompare(a.name, b.name);\n 3466 | \t\t});"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`getActiveTabId()` returns `NaN` whenever no stored tab state exists for the given path. `+(undefined)` produces `NaN`, and `NaN ?? 0` returns `NaN` because `??` only substitutes `null`/`undefined`. Callers then compare `selected < 0 || selected >= panes.length` which yields false for NaN, and use NaN as an array index, breaking tab initialization fall-back logic.","fix":"Replace `return p ?? 0;` with `return isNaN(p) ? 0 : p;`.","locations":[{"ref":"modules/luci-base/htdocs/luci-static/resources/ui.js:4809-4813","code":" 4809 | \t\tgetActiveTabId(pane) {\n 4810 | \t\t\tconst path = this.getPathForPane(pane);\n 4811 | \t\t\tconst p = +(this.getActiveTabState().paths[path]);\n 4812 | \t\t\treturn p ?? 0;\n 4813 | \t\t},"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`pingDevice()` registers `setTimeout(rejectFn, 1000)` to fail the promise after 1 s, but never clears that timer when `img.onload`/`img.onerror` fires first. `awaitReconnect` loops this every poll tick (2 × N hosts), so each tick leaks N×2 outstanding timers and Image objects until they expire, costing real memory during a long reconnect.","fix":"Capture the timer id and clear it from `img.onload`/`img.onerror`.","locations":[{"ref":"modules/luci-base/htdocs/luci-static/resources/ui.js:5062-5075","code":" 5062 | \tpingDevice(proto, ipaddr) {\n 5063 | \t\tconst target = '%s://%s%s?%s'.format(proto ?? 'http', ipaddr ?? window.location.host, L.resource('icons/loading.svg'), Math.random());\n 5064 | \n 5065 | \t\treturn new Promise((resolveFn, rejectFn) => {\n 5066 | \t\t\tconst img = new Image();\n 5067 | \n 5068 | \t\t\timg.onload = resolveFn;\n 5069 | \t\t\timg.onerror = rejectFn;\n 5070 | \n 5071 | \t\t\twindow.setTimeout(rejectFn, 1000);\n 5072 | \n 5073 | \t\t\timg.src = target;\n 5074 | \t\t});\n 5075 | \t},"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`for (let ip in addrs)` followed by `data[idx][ver].value = addrs[ip].split('/')[0]` overwrites the same `value` slot on every iteration, so only the last address survives. The IPv4 address list is silently truncated to a single string.","fix":"Map the array instead of mutating in place: `data[idx][ver].value = addrs.map(a => a.split('/')[0]);`.","locations":[{"ref":"modules/luci-mod-dashboard/htdocs/luci-static/resources/view/dashboard/include/10_router.js:116-123","code":"  116 | \t\t\t\t\t\tif ('addrsv4' === ver) {\n  117 | \t\t\t\t\t\t\tconst addrs = data[idx][ver].value;\n  118 | \t\t\t\t\t\t\tif(Array.isArray(addrs) && addrs.length) {\n  119 | \t\t\t\t\t\t\t\tfor(let ip in addrs) {\n  120 | \t\t\t\t\t\t\t\t\tdata[idx][ver].value = addrs[ip].split('/')[0];\n  121 | \t\t\t\t\t\t\t\t}\n  122 | \t\t\t\t\t\t\t}\n  123 | \t\t\t\t\t\t}"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`L.bind(() => { this.failed = true; }, includes[i])` — `L.bind` cannot rebind `this` of an arrow function, since arrow functions capture lexical `this`. Therefore the failure flag is set on the dashboard view itself (lexical `this`), not on `includes[i]`, and the subsequent `if (includes[i].failed) continue;` never fires.","fix":"Use a non-arrow function: `tasks.push(includes[i].load().catch(function() { this.failed = true; }.bind(includes[i])));`","locations":[{"ref":"modules/luci-mod-dashboard/htdocs/luci-static/resources/view/dashboard/index.js:14-32","code":"   14 | function invokeIncludesLoad(includes) {\n   15 | \tconst tasks = [];\n   16 | \tlet has_load = false;\n   17 | \n   18 | \tfor (let i = 0; i < includes.length; i++) {\n   19 | \t\tif (typeof(includes[i].load) == 'function') {\n   20 | \t\t\ttasks.push(includes[i].load().catch(L.bind(() => {\n   21 | \t\t\t\tthis.failed = true;\n   22 | \t\t\t}, includes[i])));\n   23 | \n   24 | \t\t\thas_load = true;\n   25 | \t\t}\n   26 | \t\telse {\n   27 | \t\t\ttasks.push(null);\n   28 | \t\t}\n   29 | \t}\n   30 | \n   31 | \treturn has_load ? Promise.all(tasks) : Promise.resolve(null);\n   32 | }"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`isValidMAC` is defined with signature `(sid, s)` but invoked as `isValidMAC(mac)` (one argument) inside `expandAndFormatMAC`. That call passes `mac` as `sid` and leaves `s` undefined, so the function returns `true` for every MAC. All inputs to `expandAndFormatMAC` are therefore treated as valid and pushed to the result with `mac.split(':')`, which throws if mac is not a string.","fix":"Call the validator as `isValidMAC(null, mac)` (or refactor `isValidMAC` into a one-arg helper).","locations":[{"ref":"modules/luci-mod-network/htdocs/luci-static/resources/view/network/dhcp.js:185-208","code":"  185 | function expandAndFormatMAC(macs) {\n  186 | \tconst result = [];\n  187 | \n  188 | \tmacs.forEach(mac => {\n  189 | \t\tif (isValidMAC(mac)) {\n  190 | \t\t\tconst expandedMac = mac.split(':').map(part => {\n  191 | \t\t\t\treturn (part.length === 1 && part !== '*') ? '0' + part : part;\n  192 | \t\t\t}).join(':').toUpperCase();\n  193 | \t\t\tresult.push(expandedMac);\n  194 | \t\t}\n  195 | \t});\n  196 | \n  197 | \treturn result.length ? result : null;\n  198 | }\n  199 | \n  200 | function isValidMAC(sid, s) {\n  201 | \tif (!s) return true;\n  202 | \n  203 | \tfor (const mac of L.toArray(s))\n  204 | \t\tif (!mac.match(/^(([0-9a-f]{2}|\\*):){5}([0-9a-f]{2}|\\*)$/i))\n  205 | \t\t\treturn _('Expecting a valid MAC address, optionally including wildcards') + _('; invalid MAC: ') + mac;\n  206 | \n  207 | \treturn true;\n  208 | }"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Lua operator precedence bug: `if not type(mod) == \"table\"` parses as `(not type(mod)) == \"table\"`, which evaluates `not <string>` to `false` and `false == \"table\"` to `false`. The condition therefore never triggers and the early break is dead. As a result, non-table intermediates are not detected and `rawget` may be called on a non-table value, raising an error.","fix":"Change `if not type(mod) == \"table\" then` to `if type(mod) ~= \"table\" then`.","locations":[{"ref":"modules/luci-mod-rpc/luasrc/jsonrpc.lua:11-19","code":"   11 | \tfor j=1, #path-1 do\n   12 | \t\tif not type(mod) == \"table\" then\n   13 | \t\t\tbreak\n   14 | \t\tend\n   15 | \t\tmod = rawget(mod, path[j])\n   16 | \t\tif not mod then\n   17 | \t\t\tbreak\n   18 | \t\tend\n   19 | \tend"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Variable `q` is declared (`let q;`) but never assigned before `render_signal_badge(q, local_wifi.signal)` is called for the local interface row. So the signal badge always sees `signalPercent === undefined`, falling through the if/else and using the `signal-075-100.svg` icon regardless of actual signal.","fix":"Compute `q` for the local interface (e.g. `Math.min((local_wifi.signal + 110) / 70 * 100, 100)`) before passing it to `render_signal_badge`.","locations":[{"ref":"modules/luci-mod-status/htdocs/luci-static/resources/view/status/channel_analysis.js:200-243","code":"  200 | \t\tconst radio = this.radios[this.active_tab];\n  201 | \t\tlet q;\n 6","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"In the xfrm protocol file, the method is named `getDevice` (singular). All other protocols define `getDevices` (plural). The network framework iterates protocols' getDevices(), so the xfrm singular override is dead code.","fix":"Rename `getDevice` to `getDevices`.","locations":[{"ref":"protocols/luci-proto-xfrm/htdocs/luci-static/resources/protocol/xfrm.js:28-30","code":"   28 | \tgetDevice: function() {\n   29 | \t\treturn null;\n   30 | \t},"}]},{"id":"CPY_7","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"`o2.default = o.disabled;` references the outer-scope variable `o` (last assigned during the parent `render`'s body) instead of `o2`. The s2 builder runs in a deferred callback, so `o` may point to an unrelated option.","fix":"Use `o2.default = o2.disabled;`.","locations":[{"ref":"applications/luci-app-travelmate/htdocs/luci-static/resources/view/travelmate/stations.js:1020-1024","code":" 1020 | \t\t\to2 = s2.option(form.Flag, 'ca_cert_usesystem', _('Use system certificates'), _(\"Validate server certificate using built-in system CA bundle\"));\n 1021 | \t\t\to2.depends({ encryption: 'wpa', '!contains': true });\n 1022 | \t\t\to2.enabled = '1';\n 1023 | \t\t\to2.disabled = '0';\n 1024 | \t\t\to2.default = o.disabled;"}]},{"id":"CPY_8","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"The 'Show: DHCP' tab message is registered against tab 'manual' instead of tab 'dhcp', so the description appears under the wrong tab.","fix":"Change `s.taboption('manual', ...)` to `s.taboption('dhcp', ...)`.","locations":[{"ref":"applications/luci-app-unbound/htdocs/luci-static/resources/view/unbound/files.js:112-121","code":"  112 | \t\tif (dhcp_c.content) {\n  113 | \t\t\ts.tab('dhcp', _('Show: DHCP'));\n  114 | \t\t\tconst dhcp_msg = s.taboption('manual', form.DummyValue, '_dhcp_msg', '');\n  115 | \t\t\tdhcp_msg.default =  _(\"This s a.append('sessionid', rpc.getSessionID());\n  461 | \t\t\t\tform_data.append('filename', '/tmp/firmware.bin');\n  462 | \t\t\t\tform_data.append('filemode', 600);\n  463 | \t\t\t\tform_data.append('filedata', response.blob());\n  464 | \n  465 | \t\t\t\tui.showModal(_('Uploading...'), [\n  466 | \t\t\t\t\tE(\n  467 | \t\t\t\t\t\t'p',\n  468 | \t\t\t\t\t\t{ class: 'spinning' },\n  469 | \t\t\t\t\t\t_('Uploading firmware from browser to device')\n  470 | \t\t\t\t\t),\n  471 | \t\t\t\t]);\n  472 | \n  473 | \t\t\t\trequest\n  474 | \t\t\t\t\t.get(`${L.env.cgi_base}/cgi-upload`, {\n  475 | \t\t\t\t\t\tmethod: 'PUT',\n  476 | \t\t\t\t\t\tcontent: form_data,\n  477 | \t\t\t\t\t})\n  478 | \t\t\t\t\t.then((response) => response.json())\n  479 | \t\t\t\t\t.then((response) => {\n  480 | \t\t\t\t\t\tif (response.sha256sum != sha256) {\n  481 | \t\t\t\t\t\t\tui.showModal(_('Wrong checksum'), [\n  482 | \t\t\t\t\t\t\t\tE('p', _('Error during download of firmware. Please try again')),\n  483 | \t\t\t\t\t\t\t\tE('div', { class: 'btn', click: ui.hideModal }, _('Close')),\n  484 | \t\t\t\t\t\t\t]);\n  485 | \t\t\t\t\t\t} else {\n  486 | \t\t\t\t\t\t\tui.showModal(_('Installing...'), [\n  487 | \t\t\t\t\t\t\t\tE('div', { class: 'spinning' }, [\n  488 | \t\t\t\t\t\t\t\t\tE('p', _('Installing the sysupgrade image...')),\n  489 | \t\t\t\t\t\t\t\t\tE('p',\n  490 | \t\t\t\t\t\t\t\t\t_('Once the image is written, the system will reboot.')\n  491 | \t\t\t\t\t\t\t\t\t+ ' ' +\n  492 | \t\t\t\t\t\t\t\t\t_('This should take at least a minute, so please wait for the login screen.')\n  493 | \t\t\t\t\t\t\t\t\t),\n  494 | \t\t\t\t\t\t\t\t\tE('b', _('While you are waiting, do not unpower device!')),\n  495 | \t\t\t\t\t\t\t\t]),\n  496 | \t\t\t\t\t\t\t]);\n  497 | \n  498 | \t\t\t\t\t\t\tL.resolveDefault(callUpgradeStart(keep), {}).then((response) => {\n  499 | \t\t\t\t\t\t\t\t// Wait 10 seconds before we try to reconnect...\n  500 | \t\t\t\t\t\t\t\tlet hosts = keep ? [] : ['192.168.1.1', 'openwrt. <div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-21 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
