<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"GroupByDialog::CollectionGroupingChanged() looks up each GroupBy value in the boost multi_index mapping with .get<tag_group_by>().find(g[i]) and immediately dereferences the result (->combo_box_index) without checking against end(). The mapping populated in the constructor (lines 79-98) is missing CollectionModel::GroupBy::OriginalYearAlbumDisc (value 8) entirely. CollectionModel can hold OriginalYearAlbumDisc (it is a valid enum value, used by IsAlbumGroupBy and the model code). When the persisted grouping in settings is OriginalYearAlbumDisc (stored as int 8 by CollectionFilterWidget::GroupingChanged), CollectionFilterWidget::Init() connects model GroupingChanged -> group_by_dialog_->CollectionGroupingChanged and then calls SetGroupBy, which emits GroupingChanged. find() returns end() and the dereference is undefined behavior / crash on startup. The same unchecked dereference pattern also exists in accept() (lines 119-124), though those indices are always valid.","fix":"Add a Mapping entry for CollectionModel::GroupBy::OriginalYearAlbumDisc (and audit that every GroupBy enumerator is present in the mapping). Additionally, guard the find() results against end() in CollectionGroupingChanged() (and accept()) before dereferencing, falling back to a sensible default index.","locations":[{"ref":"src/collection/groupbydialog.cpp:129-136","code":"  129 | void GroupByDialog::CollectionGroupingChanged(const CollectionModel::Grouping g, const bool separate_albums_by_grouping) {\n  130 | \n  131 |   ui_->combobox_first->setCurrentIndex(p_->mapping_.get<tag_group_by>().find(g[0])->combo_box_index);\n  132 |   ui_->combobox_second->setCurrentIndex(p_->mapping_.get<tag_group_by>().find(g[1])->combo_box_index);\n  133 |   ui_->combobox_third->setCurrentIndex(p_->mapping_.get<tag_group_by>().find(g[2])->combo_box_index);\n  134 |   ui_->checkbox_separate_albums_by_grouping->setChecked(separate_albums_by_grouping);\n  135 | \n  136 | }"},{"ref":"src/collection/groupbydialog.cpp:79-98","code":"   79 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::None, 0));\n   80 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Artist, 1));\n   81 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::AlbumArtist, 2));\n   82 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Album, 3));\n   83 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::AlbumDisc, 4));\n   84 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Disc, 5));\n   85 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Format, 6));\n   86 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Genre, 7));\n   87 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Year, 8));\n   88 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::YearAlbum, 9));\n   89 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::YearAlbumDisc, 10));\n   90 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::OriginalYear, 11));\n   91 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::OriginalYearAlbum, 12));\n   92 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Composer, 13));\n   93 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Performer, 14));\n   94 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Grouping, 15));\n   95 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::FileType, 16));\n   96 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Samplerate, 17));\n   97 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Bitdepth, 18));\n   98 |   p_->mapping_.insert(Mapping(CollectionModel::GroupBy::Bitrate, 19));"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"In GstEngine::StreamDiscovered, gst_discoverer_stream_info_get_caps(stream_info) can return NULL (its documented contract allows it). The result is used immediately and unconditionally: gst_caps_get_size(caps) is called (NULL deref), the for loop iterates over caps, gst_pb_utils_get_codec_description(caps) is passed NULL, and gst_caps_unref(caps) is called on NULL (assertion/crash). This is reachable for streams where the audio stream's caps are unavailable, crashing the discovery callback.","fix":"After GstCaps *caps = gst_discoverer_stream_info_get_caps(stream_info); add a null check: if (caps) { ... existing caps handling ... gst_caps_unref(caps); } and skip the codec-description fallback when caps is null. Also still call gst_discoverer_stream_info_list_free(audio_streams) on the null-caps path.","locations":[{"ref":"src/engine/gstengine.cpp:1139-1166","code":" 1139 |     GstCaps *caps = gst_discoverer_stream_info_get_caps(stream_info);\n 1140 | \n 1141 |     const guint caps_size = gst_caps_get_size(caps);\n 1142 |     for (guint i = 0; i < caps_size; ++i) {\n 1143 |       GstStructure *gst_structure = gst_caps_get_structure(caps, i);\n 1144 |       if (!gst_structure) continue;\n 1145 |       QString mimetype = QString::fromUtf8(gst_structure_get_name(gst_structure));\n 1146 |       if (!mimetype.isEmpty() && mimetype != \"audio/mpeg\"_L1) {\n 1147 |         engine_metadata.filetype = Song::FiletypeByMimetype(mimetype);\n 1148 |         if (engine_metadata.filetype == Song::FileType::Unknown) {\n 1149 |           qLog(Error) << \"Unknown mimetype\" << mimetype;\n 1150 |         }\n 1151 |       }\n 1152 |     }\n 1153 | \n 1154 |     if (engine_metadata.filetype == Song::FileType::Unknown) {\n 1155 |       gchar *codec_description = gst_pb_utils_get_codec_description(caps);\n 1156 |       QString filetype_description = (codec_description ? QString::fromUtf8(codec_description) : QString());\n 1157 |       g_free(codec_description);\n 1158 |       if (!filetype_description.isEmpty()) {\n 1159 |         engine_metadata.filetype = Song::FiletypeByDescription(filetype_description);\n 1160 |         if (engine_metadata.filetype == Song::FileType::Unknown) {\n 1161 |           qLog(Error) << \"Unknown filetype\" << filetype_description;\n 1162 |         }\n 1163 |       }\n 1164 |     }\n 1165 | \n 1166 |     gst_caps_unref(caps);"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"Mpris2::SetLoopStatus() and SetShuffle() unconditionally call playlist_manager_->active()->sequence()->... . Both are WRITE D-Bus properties (LoopStatus, Shuffle) callable by any external MPRIS client. The corresponding getters guard against a null active()/sequence(), proving the author knows these can be null, but the setters do not, so a D-Bus SetLoopStatus/SetShuffle call while there is no active playlist null-dereferences and crashes.","fix":"Add `if (!playlist_manager_->active() || !playlist_manager_->active()->sequence()) return;` at the start of both setters before dereferencing.","locations":[{"ref":"src/mpris2/mpris2.cpp:351-367","code":"  351 | void Mpris2::SetLoopStatus(const QString &value) {\n  352 | \n  353 |   PlaylistSequence::RepeatMode mode = PlaylistSequence::RepeatMode::Off;\n  354 | \n  355 |   if (value == \"None\"_L1) {\n  356 |     mode = PlaylistSequence::RepeatMode::Off;\n  357 |   }\n  358 |   else if (value == \"Track\"_L1) {\n  359 |     mode = PlaylistSequence::RepeatMode::Track;\n  360 |   }\n  361 |   else if (value == \"Playlist\"_L1) {\n  362 |     mode = PlaylistSequence::RepeatMode::Playlist;\n  363 |   }\n  364 | \n  365 |   playlist_manager_->active()->sequence()->SetRepeatMode(mode);\n  366 | \n  367 | }"},{"ref":"src/mpris2/mpris2.cpp:386-388","code":"  386 | void Mpris2::SetShuffle(bool enable) {\n  387 |   playlist_manager_->active()->sequence()->SetShuffleMode(enable ? PlaylistSequence::ShuffleMode::All : PlaylistSequence::ShuffleMode::Off);\n  388 | }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"Mpris2::Rating() dereferences playlist_manager_->active() with no null check, unlike the neighbouring getters LoopStatus() (line 338-342) and Shuffle() (line 381) which explicitly guard against active() being null. Rating is exposed as a readable D-Bus property (Q_PROPERTY Rating), so any MPRIS client can read it at any time, including at startup before a playlist becomes active. When active() returns nullptr this crashes with a null dereference.","fix":"Guard with `if (!playlist_manager_->active()) return 0;` before calling current_item_metadata(), matching the defensive pattern already used in LoopStatus() and Shuffle().","locations":[{"ref":"src/mpris2/mpris2.cpp:392-395","code":"  392 | double Mpris2::Rating() const {\n  393 |   float rating = playlist_manager_->active()->current_item_metadata().rating();\n  394 |   return (rating <= 0) ? 0 : rating;\n  395 | }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","description":"AnalyzerBase::paintEvent() dereferences engine_->state() without checking engine_ for null. engine_ is set separately via set_engine() (called from AnalyzerContainer::ChangeAnalyzer with engine_, which may itself be null if SetEngine() has not run yet). The repaint timer starts on showEvent independently of engine assignment, so if an analyzer becomes visible before an engine is assigned, the paint event null-dereferences.","fix":"Return early (e.g. paint just the window background) when engine_ is null, before the switch on engine_->state().","locations":[{"ref":"src/analyzer/analyzerbase.cpp:107-112","code":"  107 | void AnalyzerBase::paintEvent(QPaintEvent *e) {\n  108 | \n  109 |   QPainter p(this);\n  110 |   p.fillRect(e->rect(), palette().color(QPalette::Window));\n  111 | \n  112 |   switch (engine_->state()) {"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","description":"CollectionDirectoryModel::data() indexes storage_[idx.row()] for MusicStorage::Role_Storage / Role_StorageForceConnect without validating idx.row() against storage_.size(). For an out-of-range or invalid index (row() == -1) this is an out-of-bounds access. In normal operation Qt passes valid rows, so impact is low, but the access is unguarded.","fix":"Bounds-check idx.row() against storage_.size() (and idx.isValid()) before indexing, returning an empty QVariant otherwise.","locations":[{"ref":"src/collection/collectiondirectorymodel.cpp:82-96","code":"   82 | QVariant CollectionDirectoryModel::data(const QModelIndex &idx, int role) const {\n   83 | \n   84 |   switch (role) {\n   85 |     case MusicStorage::Role_Storage:\n   86 |     case MusicStorage::Role_StorageForceConnect:\n   87 |       return QVariant::fromValue(storage_[idx.row()]);\n   88 |     case MusicStorage::Role_FreeSpace:\n   89 |       return Utilities::FileSystemFreeSpace(data(idx, Qt::DisplayRole).toString());\n   90 |     case MusicStorage::Role_Capacity:\n   91 |       return Utilities::FileSystemCapacity(data(idx, Qt::DisplayRole).toString());\n   92 |     default:\n   93 |       return QStandardItemModel::data(idx, role);\n   94 |   }\n   95 | \n   96 | }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","description":"DarwinDemangle indexes split[3] without verifying the split produced at least 4 elements. A backtrace symbol line that does not match the expected format would index out of bounds. Only reachable from DumpStackTrace on macOS (cold crash-handling path).","fix":"Check split.size() >= 4 before accessing split[3]; otherwise return the original symbol.","locations":[{"ref":"src/core/logging.cpp:336-343","code":"  336 | QString DarwinDemangle(const QString &symbol);\n  337 | QString DarwinDemangle(const QString &symbol) {\n  338 | \n  339 |   const QStringList split = symbol.split(QLatin1Char(' '), Qt::SkipEmptyParts);\n  340 |   QString mangled_function = split[3];\n  341 |   return CXXDemangle(mangled_function);\n  342 | \n  343 | }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"Seeked() dereferences app_->player()->GetCurrentItem()->EffectiveMetadata() without a null check. In normal operation the Player only emits Seeked while length>0 (i.e. a current item exists), so it is currently safe, but unlike sibling slots (UpdateTrackPosition) it has no guard, making it fragile to future changes (e.g. command-line --seek-to while stopped).","fix":"Guard with PlaylistItemPtr item = app_->player()->GetCurrentItem(); if (!item) return; before using EffectiveMetadata().","locations":[{"ref":"src/core/mainwindow.cpp:1792-1796","code":" 1792 | void MainWindow::Seeked(const qint64 microseconds) {\n 1793 | \n 1794 |   const qint64 position = microseconds / kUsecPerSec;\n 1795 |   const qint64 length = app_->player()->GetCurrentItem()->EffectiveMetadata().length_nanosec() / kNsecPerSec;\n 1796 |   systemtrayicon_->SetProgress(static_cast<int>(static_cast<double>(position) / static_cast<double>(length) * 100.0));"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"DeviceLister::GuessIconForPath dereferences the pointer returned by itdb_device_get_ipod_info() without a null check. libgpod's itdb_device_get_ipod_info() can return NULL (e.g. when the device's SysInfo cannot be read or the model is not in the table), and line 246 immediately reads info->ipod_model, which would crash. This runs whenever an iPod-like device is detected and an icon is guessed.","fix":"After `const Itdb_IpodInfo *info = itdb_device_get_ipod_info(device);` add `if (!info) { ret << u\"device-ipod\"_s; itdb_device_free(device); return ret; }` (or guard the dereference) before using info->ipod_model.","locations":[{"ref":"src/device/devicelister.cpp:242-266","code":"  242 |     Itdb_Device *device = itdb_device_new();\n  243 |     itdb_device_set_mountpoint(device, path.toLocal8Bit().constData());\n  244 |     const Itdb_IpodInfo *info = itdb_device_get_ipod_info(device);\n  245 | \n  246 |     if (info->ipod_model == ITDB_IPOD_MODEL_INVALID) {\n  247 |       ret << u\"device-ipod\"_s;\n  248 |     }\n  249 |     else {\n  250 |       QString model = GetIpodModel(info->ipod_model);\n  251 |       QString colour = GetIpodColour(info->ipod_model);\n  252 | \n  253 |       if (!model.isEmpty()) {\n  254 |         QString model_icon = QStringLiteral(\"multimedia-player-ipod-%1\").arg(model);\n  255 |         if (QFile(model_icon).exists()) ret << model_icon;\n  256 |         if (!colour.isEmpty()) {\n  257 |           QString colour_icon = QStringLiteral(\"multimedia-player-ipod-%1-%2\").arg(model, colour);\n  258 |           if (QFile(colour_icon).exists()) ret << colour_icon;\n  259 |         }\n  260 |       }\n  261 | \n  262 |       if (ret.isEmpty()) {\n  263 |         ret << u\"device-ipod\"_s;\n  264 |       }\n  265 | \n  266 |     }"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"In DeviceManager::TasksChanged the first loop fetches `DeviceInfo *device_info = IndexToItem(idx);` and immediately dereferences it (device_info->task_percentage_) without a null check, whereas the second loop in the same function correctly guards with `if (!device_info) continue;`. If IndexToItem returns nullptr for a still-valid-but-stale persistent index this is a null dereference. The inconsistency between the two loops indicates the check was forgotten in the first.","fix":"Add `if (!device_info) continue;` immediately after `DeviceInfo *device_info = IndexToItem(idx);` in the first loop, matching the second loop.","locations":[{"ref":"src/device/devicemanager.cpp:859-876","code":"  859 |   for (const TaskManager::Task &task : tasks) {\n  860 |     if (!active_tasks_.contains(task.id)) continue;\n  861 | \n  862 |     const QPersistentModelIndex idx = active_tasks_.value(task.id);\n  863 |     if (!idx.isValid()) continue;\n  864 | \n  865 |     DeviceInfo *device_info = IndexToItem(idx);\n  866 |     if (task.progress_max) {\n  867 |       device_info->task_percentage_ = static_cast<int>(static_cast<float>(task.progress) / static_cast<float>(task.progress_max) * 100);\n  868 |     }\n  869 |     else {\n  870 |       device_info->task_percentage_ = 0;\n  871 |     }\n  872 | \n  873 |     Q_EMIT dataChanged(idx, idx);\n  874 |     finished_tasks.removeAll(idx);\n  875 | \n  876 |   }"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","description":"In GstEnginePipeline::ErrorMessageReceived, when ignoring an error for the next (preloaded) URI it fetches the audiobin sink pad and sends an EOS event without checking for null: gst_element_get_static_pad(audiobin_, \"sink\") -> gst_pad_send_event(pad, ...) -> gst_object_unref(pad). If the ghost sink pad cannot be retrieved (pad == NULL), gst_pad_send_event(NULL, ...) triggers a GStreamer assertion / null deref. Other callers in this file guard the pad result (e.g. lines 437-444, 446-453, 847-852).","fix":"Guard the pad: GstPad *pad = gst_element_get_static_pad(audiobin_, \"sink\"); if (pad) { gst_pad_send_event(pad, gst_event_new_eos()); gst_object_unref(pad); }","locations":[{"ref":"src/engine/gstenginepipeline.cpp:1695-1697","code":" 1695 |     GstPad *pad = gst_element_get_static_pad(audiobin_, \"sink\");\n 1696 |     gst_pad_send_event(pad, gst_event_new_eos());\n 1697 |     gst_object_unref(pad);"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","description":"Mpris2::current_playlist_row() dereferences playlist_manager_->active()->current_row() with no null check. It is called from AlbumCoverLoaded() (line 433) and SetPosition() (line 582). SetPosition is reachable directly via D-Bus, so an external SetPosition call when active() is null crashes before the subsequent `current_row == -1` guard can help. OpenUri() (line 597) and ActivatePlaylist (calls active() indirectly) have the same unguarded-active() shape.","fix":"Have current_playlist_row() return -1 when active() is null, and null-check active() in OpenUri() before calling InsertUrls().","locations":[{"ref":"src/mpris2/mpris2.cpp:410-412","code":"  410 | int Mpris2::current_playlist_row() const {\n  411 |   return playlist_manager_->active()->current_row();\n  412 | }"},{"ref":"src/mpris2/mpris2.cpp:596-598","code":"  596 | void Mpris2::OpenUri(const QString &uri) {\n  597 |   playlist_manager_->active()->InsertUrls(QList<QUrl>() << QUrl(uri), -1, true);\n  598 | }"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","description":"drawControl() casts option to QStyleOptionHeader* via qstyleoption_cast (which returns nullptr on type mismatch) and immediately dereferences header_option->rect/text/fontMetrics without a null check when element == CE_HeaderLabel. If ever invoked with element==CE_HeaderLabel but a non-header option, this is a null-pointer dereference. In practice CE_HeaderLabel always carries a header option, so this is a defensive-coding gap rather than a normally-reachable crash.","fix":"Guard the cast: `if (const QStyleOptionHeader *header_option = qstyleoption_cast<const QStyleOptionHeader*>(option)) { ... }` and fall through to the default drawControl when the cast fails.","locations":[{"ref":"src/playlist/playlistproxystyle.cpp:39-52","code":"   39 |   if (element == CE_HeaderLabel) {\n   40 |     const QStyleOptionHeader *header_option = qstyleoption_cast<const QStyleOptionHeader*>(option);\n   41 |     const QRect &rect = header_option->rect;\n   42 |     const QString &text = header_option->text;\n   43 |     const QFontMetrics &font_metrics = header_option->fontMetrics;\n   44 | \n   45 |     // Spaces added to make transition less abrupt\n   46 |     if (rect.width() < font_metrics.horizontalAdvance(text + u\"  \"_s)) {\n   47 |       const Playlist::Column column = static_cast<Playlist::Column>(header_option->section);\n   48 |       QStyleOptionHeader new_option(*header_option);\n   49 |       new_option.text = Playlist::abbreviated_column_name(column);\n   50 |       QProxyStyle::drawControl(element, &new_option, painter, widget);\n   51 |       return;\n   52 |     }"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","description":"CurrentPlaylistChanged() guards the disconnect block with `if (current_playlist_)` but then assigns the new `playlist` and immediately dereferences it (current_playlist_->queue(), ui_->list->setModel(current_playlist_->queue()), connect on current_playlist_) without a null check. If PlaylistManager::CurrentChanged ever emits a null Playlist* (e.g. during teardown), this dereferences a null pointer and crashes. The previous handler PlaylistDestroyed() explicitly sets current_playlist_ to nullptr, showing null is an expected transient state.","fix":"Add `if (!playlist) { current_playlist_ = nullptr; return; }` after the disconnect block, or guard all dereferences of current_playlist_ with a null check.","locations":[{"ref":"src/queue/queueview.cpp:105-130","code":"  105 | void QueueView::CurrentPlaylistChanged(Playlist *playlist) {\n  106 | \n  107 |   if (current_playlist_) {\n  108 |     QObject::disconnect(current_playlist_->queue(), &Queue::rowsInserted, this, &QueueView::UpdateButtonState);\n  109 |     QObject::disconnect(current_playlist_->queue(), &Queue::rowsRemoved, this, &QueueView::UpdateButtonState);\n  110 |     QObject::disconnect(current_playlist_->queue(), &Queue::layoutChanged, this, &QueueView::UpdateButtonState);\n  111 |     QObject::disconnect(current_playlist_->queue(), &Queue::SummaryTextChanged, ui_->summary, &QLabel::setText);\n  112 |     QObject::disconnect(current_playlist_, &Playlist::destroyed, this, &QueueView::PlaylistDestroyed);\n  113 |   }\n  114 | \n  115 |   current_playlist_ = playlist;\n  116 | \n  117 |   QObject::connect(current_playlist_->queue(), &Queue::rowsInserted, this, &QueueView::UpdateButtonState);\n  118 |   QObject::connect(current_playlist_->queue(), &Queue::rowsRemoved, this, &QueueView::UpdateButtonState);\n  119 |   QObject::connect(current_playlist_->queue(), &Queue::layoutChanged, this, &QueueView::UpdateButtonState);\n  120 |   QObject::connect(current_playlist_->queue(), &Queue::SummaryTextChanged, ui_->summary, &QLabel::setText);\n  121 |   QObject::connect(current_playlist_, &Playlist::destroyed, this, &QueueView::PlaylistDestroyed);\n  122 | \n  123 |   ui_->list->setModel(current_playlist_->queue());\n  124 | \n  125 |   QObject::connect(ui_->list->selectionModel(), &QItemSelectionModel::currentChanged, this, &QueueView::UpdateButtonState);\n  126 |   QObject::connect(ui_->list->selectionModel(), &QItemSelectionModel::selectionChanged, this, &QueueView::UpdateButtonState);\n  127 | \n  128 |   QMetaObject::invokeMethod(current_playlist_->queue(), &Queue::UpdateSummaryText);\n  129 | \n  130 | }"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","description":"Transcoder::NewPadCallback dereferences the result of gst_element_get_static_pad() without a null check: `GstPad *const audiopad = gst_element_get_static_pad(state->convert_element_, \"sink\"); if (GST_PAD_IS_LINKED(audiopad)) ...`. If the pad lookup fails (returns null), GST_PAD_IS_LINKED/gst_pad_link dereference null. The analogous code in MoodbarPipeline::NewPadCallback guards with `if (!audiopad) return;`.","fix":"Add `if (!audiopad) return;` after obtaining the pad, mirroring MoodbarPipeline::NewPadCallback.","locations":[{"ref":"src/transcoder/transcoder.cpp:359-372","code":"  359 | void Transcoder::NewPadCallback(GstElement *element, GstPad *pad, gpointer data) {\n  360 | \n  361 |   Q_UNUSED(element)\n  362 | \n  363 |   JobState *state = reinterpret_cast<JobState*>(data);\n  364 |   GstPad *const audiopad = gst_element_get_static_pad(state->convert_element_, \"sink\");\n  365 | \n  366 |   if (GST_PAD_IS_LINKED(audiopad)) {\n  367 |     qLog(Debug) << \"Audiopad is already linked, unlinking old pad\";\n  368 |     gst_pad_unlink(audiopad, GST_PAD_PEER(audiopad));\n  369 |   }\n  370 | \n  371 |   gst_pad_link(pad, audiopad);\n  372 |   gst_object_unref(audiopad);"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","description":"IndexAboveOrBelow dereferences `visual_rects_[index]` at the very first line with no bounds check. moveCursor only guards against `model()->rowCount() == 0`, but visual_rects_ is populated lazily in LayoutItems. If moveCursor is invoked (keyboard navigation) at a moment where the model has rows but visual_rects_ has not yet been (re)built — e.g. an immediate cursor move before a layout pass — `visual_rects_[index]` is an out-of-bounds read and crashes.","fix":"Guard IndexAboveOrBelow (and moveCursor) against an empty/short visual_rects_, e.g. `if (index < 0 || index >= visual_rects_.count()) return index;` before the initial access, or bail out of moveCursor when visual_rects_.isEmpty().","locations":[{"ref":"src/widgets/groupediconview.cpp:401-404","code":"  401 | int GroupedIconView::IndexAboveOrBelow(int index, const int d) const {\n  402 | \n  403 |   const QRect orig_rect(visual_rects_[index]);\n  404 | "},{"ref":"src/widgets/groupediconview.cpp:371-398","code":"  371 | QModelIndex GroupedIconView::moveCursor(CursorAction action, const Qt::KeyboardModifiers keyboard_modifiers) {\n  372 | \n  373 |   Q_UNUSED(keyboard_modifiers)\n  374 | \n  375 |   if (model()->rowCount() == 0) {\n  376 |     return QModelIndex();\n  377 |   }\n  378 | \n  379 |   int ret = currentIndex().row();\n  380 |   if (ret == -1) {\n  381 |     ret = 0;\n  382 |   }\n  383 | \n  384 |   switch (action) {\n  385 |     case MoveUp:    ret = IndexAboveOrBelow(ret, -1); break;\n  386 |     case MovePrevious:\n  387 |     case MoveLeft:  ret--; break;\n  388 |     case MoveDown:  ret = IndexAboveOrBelow(ret, +1); break;\n  389 |     case MoveNext:\n  390 |     case MoveRight: ret++; break;\n  391 |     case MovePageUp:\n  392 |     case MoveHome:  ret = 0; break;\n  393 |     case MovePageDown:\n  394 |     case MoveEnd:   ret = model()->rowCount() - 1; break;\n  395 |   }\n  396 | \n  397 |   return model()->index(qBound(0, ret, model()->rowCount() - 1), 0);\n  398 | "}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","description":"task_text[0] = task_text[0].toLower(); accesses index 0 of task.name unconditionally. If a task's name is an empty QString, this is an out-of-bounds character access (undefined behaviour / assert in debug builds). The later text_[0] accesses are correctly guarded by `!text_.isEmpty()`, but the per-task name is not.","fix":"Skip the case-change when the name is empty: `if (!task_text.isEmpty()) task_text[0] = task_text[0].toLower();`","locations":[{"ref":"src/widgets/multiloadingindicator.cpp:79-82","code":"   79 |   for (const TaskManager::Task &task : tasks) {\n   80 |     QString task_text = task.name;\n   81 |     task_text[0] = task_text[0].toLower();\n   82 | "}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"SaveEmbeddedCoverFinished dereferences a raw AlbumItem* captured in a lambda connected to TagReaderReply::Finished, but the AlbumItem can be destroyed before the reply finishes. ArtistChanged() calls ui_->albums->clear() (which deletes all AlbumItem objects) and CancelRequests(); CancelRequests only clears cover_save_tasks_ but does NOT disconnect/cancel the pending TagReaderReply lambdas (they are bound to receiver 'this', not to album_item). When a previously-issued SaveCoverAsync completes after the album list was cleared and the reply reports success, the guard cover_save_tasks_.contains(album_item) is false so it falls through to album_item->setData(...) / LoadAlbumCoverAsync(album_item) on freed memory.","fix":"Cancel/disconnect outstanding SaveCoverAsync replies in CancelRequests (or before clearing the album list), or re-check that album_item is still a valid item (e.g. validate against current cover_save_tasks_/list membership) before touching it in SaveEmbeddedCoverFinished, and bail out early if the task is no longer tracked.","locations":[{"ref":"src/covermanager/albumcovermanager.cpp:1109-1130","code":" 1109 | void AlbumCoverManager::SaveEmbeddedCoverFinished(TagReaderReplyPtr reply, AlbumItem *album_item, const QUrl &url, const bool art_embedded) {\n 1110 | \n 1111 |   if (cover_save_tasks_.contains(album_item, url)) {\n 1112 |     cover_save_tasks_.remove(album_item, url);\n 1113 |   }\n 1114 | \n 1115 |   if (!reply->success()) {\n 1116 |     Q_EMIT Error(tr(\"Could not save cover to file %1.\").arg(url.toLocalFile()));\n 1117 |     return;\n 1118 |   }\n 1119 | \n 1120 |   if (cover_save_tasks_.contains(album_item)) {\n 1121 |     return;\n 1122 |   }\n 1123 | \n 1124 |   album_item->setData(Role_ArtEmbedded, true);\n 1125 |   album_item->setData(Role_ArtUnset, false);\n 1126 |   Song song = AlbumItemAsSong(album_item);\n 1127 |   album_cover_choice_controller_->SaveArtEmbeddedToSong(&song, art_embedded);\n 1128 |   LoadAlbumCoverAsync(album_item);\n 1129 | \n 1130 | }"},{"ref":"src/covermanager/albumcovermanager.cpp:333-349","code":"  333 | void AlbumCoverManager::CancelRequests() {\n  334 | \n  335 |   albumcover_loader_->CancelTasks(QSet<quint64>(cover_loading_tasks_.keyBegin(), cover_loading_tasks_.keyEnd()));\n  336 |   cover_loading_pending_.clear();\n  337 |   cover_loading_tasks_.clear();\n  338 |   cover_save_tasks_.clear();\n  339 | \n  340 |   cover_exporter_->Cancel();\n  341 | \n  342 |   cover_fetching_tasks_.clear();\n  343 |   cover_fetcher_->Clear();\n  344 |   progress_bar_->hide();\n  345 |   abort_progress_->hide();\n  346 |   statusBar()->clearMessage();\n  347 |   EnableCoversButtons();\n  348 | \n  349 | }"},{"ref":"src/covermanager/albumcovermanager.cpp:387-393","code":"  387 | void AlbumCoverManager::ArtistChanged(QListWidgetItem *current) {\n  388 | \n  389 |   if (!current) return;\n  390 | \n  391 |   ui_->albums->clear();\n  392 |   context_menu_items_.clear();\n  393 |   CancelRequests();"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"FancyTabData allocates its page widget with `new QWidget()` (no parent). The page is only reparented to the QTabWidget when InsertTab inserts it. A tab that is created via AddTab but never enabled (EnableTab not called), or one that is removed via DisableTab/removeTab (Qt's removeTab does not delete the page and leaves it parentless), ends up with page_ owned by nothing. FancyTabData has only the default destructor and never deletes page_, so the page widget leaks when the FancyTabData (a QObject child of FancyTabWidget) is destroyed at shutdown.","fix":"Give page_ a parent (e.g. pass the FancyTabWidget parent into the QWidget constructor) or add a FancyTabData destructor that deletes page_ when it has no parent, so the page is destroyed even when the tab was never inserted or was removed.","locations":[{"ref":"src/widgets/fancytabdata.cpp:27-43","code":"   27 | FancyTabData::FancyTabData(QWidget *widget_view, const QString &name, const QIcon &icon, const QString &label, const int idx, QWidget *parent)\n   28 |     : QObject(parent),\n   29 |       widget_view_(widget_view),\n   30 |       name_(name), icon_(icon),\n   31 |       label_(label),\n   32 |       index_(idx),\n   33 |       page_(new QWidget()) {\n   34 | \n   35 |   // In order to achieve the same effect as the \"Bottom Widget\" of the old Nokia based FancyTabWidget a VBoxLayout is used on each page\n   36 | \n   37 |   QVBoxLayout *layout = new QVBoxLayout(page_);\n   38 |   layout->setSpacing(0);\n   39 |   layout->setContentsMargins(0, 0, 0, 0);\n   40 |   layout->addWidget(widget_view_);\n   41 |   page_->setLayout(layout);\n   42 | \n   43 | }"},{"ref":"src/widgets/fancytabwidget.cpp:241-253","code":"  241 | bool FancyTabWidget::DisableTab(QWidget *widget_view) {\n  242 | \n  243 |   if (!tabs_.contains(widget_view)) return false;\n  244 |   FancyTabData *tab = tabs_.value(widget_view);\n  245 | \n  246 |   int idx = QTabWidget::indexOf(tab->page());\n  247 |   if (idx < 0) return false;\n  248 | \n  249 |   removeTab(idx);\n  250 | \n  251 |   return true;\n  252 | \n  253 | }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In MtpDevice::LoadFinished the loader thread is told to exit but is never deleted or nulled: loader_thread_->exit() is called, loader_ is set to nullptr, but loader_thread_ (the heap-allocated QThread created in Init) is left dangling. The destructor's cleanup of loader_thread_ is guarded by `if (loader_)`, which is now false, so the QThread is never deleteLater'd/joined. Every MTP device connect/disconnect cycle leaks a QThread (and the thread is only exit()'d, not wait()'d). Compare GPodDevice::LoadFinished which correctly quits, waits, deleteLater's and nulls loader_thread_.","fix":"In LoadFinished, after loader_thread_->exit(), call loader_thread_->wait(); loader_thread_->deleteLater(); loader_thread_ = nullptr; (mirroring GPodDevice::LoadFinished), so the thread object is reclaimed.","locations":[{"ref":"src/device/mtpdevice.cpp:131-146","code":"  131 | void MtpDevice::LoadFinished(const bool success, MtpConnection *connection) {\n  132 | \n  133 |   connection_.reset(connection);\n  134 | \n  135 |   loader_thread_->exit();\n  136 |   loader_->deleteLater();\n  137 |   loader_ = nullptr;\n  138 |   db_busy_.unlock();\n  139 |   if (closing_) {\n  140 |     ConnectedDevice::Close();\n  141 |   }\n  142 |   else {\n  143 |     Q_EMIT DeviceConnectFinished(unique_id_, success);\n  144 |   }\n  145 | \n  146 | }"},{"ref":"src/device/mtpdevice.cpp:80-91","code":"   80 | MtpDevice::~MtpDevice() {\n   81 | \n   82 |   if (loader_) {\n   83 |     loader_thread_->exit();\n   84 |     loader_thread_->wait();\n   85 |     loader_->deleteLater();\n   86 |     loader_ = nullptr;\n   87 |     db_busy_.unlock();\n   88 |     loader_thread_->deleteLater();\n   89 |   }\n   90 | \n   91 | }"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"StandardItemIconLoader::SetModel disconnects only the rowsAboutToBeRemoved signal from the previous model_, but the modelAboutToBeReset->ModelReset connection made for the previous model is never disconnected. If SetModel is called more than once (or with a different model), the stale modelAboutToBeReset connection to the old model remains. If the old model is later reset/destroyed it can fire into this loader with covers belonging to a different model.","fix":"In the if (model_) block also QObject::disconnect(model_, &QAbstractItemModel::modelAboutToBeReset, this, &StandardItemIconLoader::ModelReset); before reassigning model_.","locations":[{"ref":"src/core/standarditemiconloader.cpp:45-56","code":"   45 | void StandardItemIconLoader::SetModel(QAbstractItemModel *model) {\n   46 | \n   47 |   if (model_) {\n   48 |     QObject::disconnect(model_, &QAbstractItemModel::rowsAboutToBeRemoved, this, &StandardItemIconLoader::RowsAboutToBeRemoved);\n   49 |   }\n   50 | \n   51 |   model_ = model;\n   52 | \n   53 |   QObject::connect(model_, &QAbstractItemModel::rowsAboutToBeRemoved, this, &StandardItemIconLoader::RowsAboutToBeRemoved);\n   54 |   QObject::connect(model_, &QAbstractItemModel::modelAboutToBeReset, this, &StandardItemIconLoader::ModelReset);\n   55 | \n   56 | }"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"RadioBrowserService::Abort() (called from the destructor) aborts and deleteLater()s any in-flight search reply, but the TaskManager task started in Search() (task_id, captured only inside the SearchReply lambda) is never finished because the lambda is disconnected and the reply destroyed. The task indicator for 'Searching Radio Browser' is leaked. Likewise SomaFM/RadioParadise abort paths drop their task_id without SetTaskFinished. Impact is limited to a lingering task indicator, and primarily occurs at shutdown, so impact is minor.","fix":"Track outstanding task ids alongside replies (or call task_manager_->SetTaskFinished for each pending task) inside Abort() so search/channel tasks are always finished even when the replies are cancelled.","locations":[{"ref":"src/radios/radiobrowserservice.cpp:65-83","code":"   65 | void RadioBrowserService::Abort() {\n   66 | \n   67 |   while (!replies_.isEmpty()) {\n   68 |     QNetworkReply *reply = replies_.takeFirst();\n   69 |     QObject::disconnect(reply, nullptr, this, nullptr);\n   70 |     if (reply->isRunning()) reply->abort();\n   71 |     reply->deleteLater();\n   72 |   }\n   73 | \n   74 |   if (dns_lookup_) {\n   75 |     dns_lookup_->abort();\n   76 |     dns_lookup_->deleteLater();\n   77 |     dns_lookup_ = nullptr;\n   78 |   }\n   79 | \n   80 |   has_pending_search_ = false;\n   81 |   has_pending_countries_ = false;\n   82 | \n   83 | }"},{"ref":"src/radios/radiobrowserservice.cpp:236-247","code":"  236 |   const int task_id = task_manager_->StartTask(tr(\"Searching Radio Browser\"));\n  237 |   QObject::connect(reply, &QNetworkReply::finished, this, [this, reply, task_id, limit]() { SearchReply(reply, task_id, limit); });\n  238 | \n  239 | }\n  240 | \n  241 | void RadioBrowserService::SearchReply(QNetworkReply *reply, const int task_id, const int limit) {\n  242 | \n  243 |   if (replies_.contains(reply)) replies_.removeAll(reply);\n  244 |   reply->deleteLater();\n  245 | \n  246 |   const QJsonArray array = ExtractJsonArray(reply);\n  247 |   task_manager_->SetTaskFinished(task_id);"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"SetupButton writes the QAction tooltip into the fixed-size THUMBBUTTON::szTip (260 wchar_t) via toWCharArray without bounding the length, then writes a NUL at szTip[action->text().length()]. If an action's text is >= 260 characters this overflows the buffer. The inline comment acknowledges the buffer is not bounded. Windows-only; action texts are normally short so impact is low.","fix":"Clamp the copy length, e.g. const int n = qMin(action->text().length(), 259); memcpy/toWCharArray only n chars and set szTip[n] = L'\\0'.","locations":[{"ref":"src/core/windows7thumbbar.cpp:103-105","code":"  103 |     // This is unsafe - doesn't obey 260-char restriction\n  104 |     action->text().toWCharArray(button->szTip);\n  105 |     button->szTip[action->text().length()] = L'\\0';"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In GstEngine::UpdateScope, on the final chunk the byte count is computed as map.size - (chunk_size * scope_chunk_). scope_chunks_ is derived from the buffer duration via ceil(), while chunk_size is derived independently from map.size/duration. Because of the ceiling, chunk_size * scope_chunk_ can exceed map.size, making the unsigned subtraction wrap to a huge value (later clamped by qMin to scope_.size()*sizeof). More importantly 'source' is advanced by (chunk_size/sizeof(sample_type)) * scope_chunk_ at line 1058 before the clamp, which can point past the end of the mapped buffer, so the subsequent memcpy reads out of bounds of the GStreamer buffer.","fix":"Clamp the source offset and remaining bytes against map.size before copying, e.g. compute size_t offset = (chunk_size/sizeof(sample_type))*scope_chunk_; if (offset >= map.size/sizeof(sample_type)) { gst_buffer_unmap; return; } and clamp bytes to map.size - offset_in_bytes.","locations":[{"ref":"src/engine/gstengine.cpp:1056-1068","code":" 1056 |   const sample_type *source = reinterpret_cast<sample_type*>(map.data);\n 1057 |   sample_type *dest = scope_.data();\n 1058 |   source += (chunk_size / sizeof(sample_type)) * scope_chunk_;\n 1059 | \n 1060 |   size_t bytes = 0;\n 1061 | \n 1062 |   // Make sure we don't go beyond the end of the buffer\n 1063 |   if (scope_chunk_ == scope_chunks_ - 1) {\n 1064 |     bytes = qMin(static_cast<EngineBase::Scope::size_type>(map.size - (chunk_size * scope_chunk_)), scope_.size() * sizeof(sample_type));\n 1065 |   }\n 1066 |   else {\n 1067 |     bytes = qMin(static_cast<EngineBase::Scope::size_type>(chunk_size), scope_.size() * sizeof(sample_type));\n 1068 |   }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In GstEnginePipeline::BufferProbeCallback the F32LE analyzer conversion multiplies each float sample by 32768.0 and casts straight to int16_t without clamping. Float samples outside [-1.0,1.0) (common with ReplayGain/intersample peaks before the limiter, and the probe sits pre-volume/pre-EQ) produce values outside int16 range, so the cast overflows/wraps to garbage (e.g. 1.5 -> 49152 wraps to a large negative). This corrupts the visualization buffer for those frames.","fix":"Clamp before casting: float sample_float = qBound(-32768.0f, s[i] * 32768.0f, 32767.0f); d[i] = static_cast<int16_t>(sample_float);","locations":[{"ref":"src/engine/gstenginepipeline.cpp:1383-1386","code":" 1383 |       for (int i = 0; i < (samples * channels); ++i) {\n 1384 |         float sample_float = (s[i] * static_cast<float>(32768.0));\n 1385 |         d[i] = static_cast<int16_t>(sample_float);\n 1386 |       }"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"StreamTagReader::readBlock truncates 64-bit offsets to 32-bit `uint`: `const uint start = static_cast<uint>(cursor_); const uint end = static_cast<uint>(std::min(cursor_ + length - 1, length_ - 1));` where cursor_/length_ are size_t. For streamed files larger than 4 GiB the start/end (and the byte-cache indices derived from them) wrap, causing wrong Range requests and cache indexing. Tags are normally near the start/end so this is rarely hit, but the cast is unsafe for large remote files.","fix":"Use a 64-bit unsigned type for start/end (and the cache index type), or explicitly clamp/validate that offsets fit in the cache index type before casting.","locations":[{"ref":"src/tagreader/streamtagreader.cpp:63-67","code":"   63 | TagLib::ByteVector StreamTagReader::readBlock(const TagLibLengthType length) {\n   64 | \n   65 |   const uint start = static_cast<uint>(cursor_);\n   66 |   const uint end = static_cast<uint>(std::min(cursor_ + length - 1, length_ - 1));\n   67 | "}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"GME::UnpackBytes32 builds a 32-bit value with `value |= static_cast<unsigned char>(bytes[i]) << (8 * i);`. `unsigned char` is promoted to `int`, so for i==3 the expression shifts a value into bit 31 of a signed `int` (e.g. 0xFF << 24), which is signed left-shift overflow and undefined behavior. This runs on every VGM GD3 pointer/length parse.","fix":"Cast each byte to the unsigned result type before shifting: `value |= static_cast<quint32>(static_cast<unsigned char>(bytes[i])) << (8 * i);`","locations":[{"ref":"src/tagreader/tagreadergme.cpp:59-69","code":"   59 | quint32 GME::UnpackBytes32(const char *const bytes, size_t length) {\n   60 | \n   61 |   Q_ASSERT(length <= 4 && length > 0);\n   62 | \n   63 |   quint32 value = 0;\n   64 |   for (size_t i = 0; i < length; i++) {\n   65 |     value |= static_cast<unsigned char>(bytes[i]) << (8 * i);\n   66 |   }\n   67 | \n   68 |   return value;\n   69 | "}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In DrawText, the \"used\" size is computed as `total_ - free_` (both quint64) with no guard. DrawBar at lines 137-138 explicitly guards this exact subtraction with a comment noting that some FUSE/MTP filesystems report free_ > total_, in which case the unsigned subtraction wraps to a near-UINT64_MAX value. DrawText omits that guard, so on such filesystems the \"Used\" label will display a garbage size (TextForSize sees size > 0 and runs PrettySize on the wrapped value). The two code paths are inconsistent.","fix":"Compute used once with the same guard used in DrawBar, e.g. `const quint64 used = (total_ > free_) ? (total_ - free_) : 0;` and pass `used` to TextForSize(used_text_, ...). Optionally also clamp the exceeded/free calculations consistently.","locations":[{"ref":"src/widgets/freespacebar.cpp:204-214","code":"  204 |   QList<Label> labels;\n  205 |   labels << Label(TextForSize(used_text_, total_ - free_), kColorBar1);\n  206 |   if (additional_ > 0) {\n  207 |     labels << Label(TextForSize(additional_text_, additional_), kColorAdd1);\n  208 |   }\n  209 |   if (free_ > additional_ || additional_ == 0) {\n  210 |     labels << Label(TextForSize(free_text_, free_ - additional_), kColorBg2);\n  211 |   }\n  212 |   else {\n  213 |     labels << Label(TextForSize(exceeded_text_, additional_ - free_), kColorBar2);\n  214 |   }"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"NetworkProxyFactory stores port_ as quint64 (read from settings via toULongLong) but passes it to QNetworkProxy::setPort, which takes quint16. A settings value above 65535 is silently truncated. Not reachable from external/untrusted input in normal operation (proxy port comes from local settings UI), so impact is negligible.","fix":"Store port_ as quint16 (or int) and validate the range when loading from settings.","locations":[{"ref":"src/core/networkproxyfactory.cpp:89-137","code":"   89 |   port_ = s.value(\"port\", 8080).toULongLong();\n   90 |   use_authentication_ = s.value(\"use_authentication\", false).toBool();\n   91 |   username_ = s.value(\"username\").toString();\n   92 |   password_ = s.value(\"password\").toString();\n   93 | \n   94 |   s.endGroup();\n   95 | \n   96 | }\n   97 | \n   98 | QList<QNetworkProxy> NetworkProxyFactory::queryProxy(const QNetworkProxyQuery &query) {\n   99 | \n  100 |   QMutexLocker l(&mutex_);\n  101 | \n  102 |   QNetworkProxy ret;\n  103 | \n  104 |   switch (mode_) {\n  105 |     case Mode::System:\n  106 | #ifdef Q_OS_LINUX\n  107 |       Q_UNUSED(query);\n  108 | \n  109 |       if (env_url_.isEmpty()) {\n  110 |         ret.setType(QNetworkProxy::NoProxy);\n  111 |       }\n  112 |       else {\n  113 |         ret.setHostName(env_url_.host());\n  114 |         ret.setPort(env_url_.port());\n  115 |         ret.setUser(env_url_.userName());\n  116 |         ret.setPassword(env_url_.password());\n  117 |         if (env_url_.scheme().startsWith(\"http\"_L1)) {\n  118 |           ret.setType(QNetworkProxy::HttpProxy);\n  119 |         }\n  120 |         else {\n  121 |           ret.setType(QNetworkProxy::Socks5Proxy);\n  122 |         }\n  123 |         qLog(Debug) << \"Using proxy URL:\" << env_url_;\n  124 |       }\n  125 |       break;\n  126 | #else\n  127 |       return systemProxyForQuery(query);\n  128 | #endif\n  129 | \n  130 |     case Mode::Direct:\n  131 |       ret.setType(QNetworkProxy::NoProxy);\n  132 |       break;\n  133 | \n  134 |     case Mode::Manual:\n  135 |       ret.setType(type_);\n  136 |       ret.setHostName(hostname_);\n  137 |       ret.setPort(port_);"},{"ref":"src/core/networkproxyfactory.h:60","code":"   60 |   quint64 port_;"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"VolumeSlider's constructor defaults max to 0 (header declares `uint max = 0`), which calls setRange(0, 0). paintEvent computes `(width() - 2*padding) * value() / maximum()`; with maximum()==0 this is a division by zero producing inf/NaN and then undefined behaviour on the static_cast<int>. In practice the only instance is created from mainwindow.ui which sets maximum=100 before any paint, so it is not reachable in normal operation, but a direct programmatic `new VolumeSlider(parent)` followed by a paint would hit it.","fix":"Guard against a zero maximum in paintEvent (e.g. `const int max = qMax(1, maximum());`) or give the constructor a sensible non-zero default such as 100.","locations":[{"ref":"src/widgets/volumeslider.cpp:99-119","code":"   99 | void VolumeSlider::paintEvent(QPaintEvent *e) {\n  100 | \n  101 |   Q_UNUSED(e)\n  102 | \n  103 |   QPainter p(this);\n  104 | \n  105 |   const int padding = 7;\n  106 |   const int offset = static_cast<int>(static_cast<double>((width() - 2 * padding) * value()) / maximum());\n  107 | \n  108 |   // If theme changed since last paintEvent, redraw the volume pixmap with new theme colors\n  109 |   if (previous_theme_text_color_ != palette().color(QPalette::WindowText)) {\n  110 |     pixmap_inset_ = drawVolumePixmap();\n  111 |     previous_theme_text_color_ = palette().color(QPalette::WindowText);\n  112 |   }\n  113 | \n  114 |   if (previous_theme_highlight_color_ != palette().color(QPalette::Highlight)) {\n  115 |     drawVolumeSliderHandle();\n  116 |     previous_theme_highlight_color_ = palette().color(QPalette::Highlight);\n  117 |   }\n  118 | \n  119 |   p.drawPixmap(0, 0, pixmap_gradient_, 0, 0, offset + padding, 0);"},{"ref":"src/widgets/volumeslider.h:46","code":"   46 |   explicit VolumeSlider(QWidget *parent, uint max = 0);"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"CollectionWatcher::ScanTransaction hardcodes its expire_unavailable_songs_days_ member to 60 in both constructors (line 97 default-member-init style and line 268 in the ScanTransaction ctor) and it is never copied from the watcher's user-configured CollectionWatcher::expire_unavailable_songs_days_ (set in ReloadSettings from CollectionSettings::kExpireUnavailableSongs). The transaction emits UpdateLastSeen(dir_id_, expire_unavailable_songs_days_) (line 371) with the hardcoded 60. CollectionBackend::UpdateLastSeen then calls ExpireSongs only when the value > 0, deleting unavailable songs older than that many days. As a result the user's configured expiry setting is completely ignored during scans: setting a value other than 60 has no effect, and setting 0 to disable expiration does NOT disable it (songs are still expired at 60 days). This can cause unexpected deletion of songs from the collection database.","fix":"Pass the watcher's expire_unavailable_songs_days_ into the ScanTransaction constructor (add a parameter) or have the transaction read watcher_->expire_unavailable_songs_days_, so the configured value is used for UpdateLastSeen instead of the hardcoded 60.","locations":[{"ref":"src/collection/collectionwatcher.cpp:261-273","code":"  261 | CollectionWatcher::ScanTransaction::ScanTransaction(CollectionWatcher *watcher, const int dir, const bool incremental, const bool ignores_mtime, const bool mark_songs_unavailable)\n  262 |     : progress_(0),\n  263 |       progress_max_(0),\n  264 |       dir_id_(dir),\n  265 |       incremental_(incremental),\n  266 |       ignores_mtime_(ignores_mtime),\n  267 |       mark_songs_unavailable_(mark_songs_unavailable),\n  268 |       expire_unavailable_songs_days_(60),\n  269 |       watcher_(watcher),\n  270 |       cached_songs_dirty_(true),\n  271 |       cached_songs_missing_fingerprint_dirty_(true),\n  272 |       cached_songs_missing_loudness_characteristics_dirty_(true),\n  273 |       known_subdirs_dirty_(true) {"},{"ref":"src/collection/collectionwatcher.cpp:369-372","code":"  369 | \n  370 |   if (incremental_ || ignores_mtime_) {\n  371 |     Q_EMIT watcher_->UpdateLastSeen(dir_id_, expire_unavailable_songs_days_);\n  372 |   }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"MusicBrainz query escaping is a no-op. The code calls .replace(u'\"', \"\\\"\"_L1) which replaces a double-quote character with a string containing exactly one double-quote (it does NOT escape it). The album/artist values are then interpolated into a Lucene query of the form release:\"%1\" AND artist:\"%2\". If the album or artist title legitimately contains a double-quote, the embedded quote terminates the quoted Lucene term, producing a malformed query and silently breaking cover search for those albums. The intent was clearly to escape the quote (e.g. to \\\\\\\").","fix":"Escape the quote properly for Lucene, e.g. replace(u'\"', \"\\\\\\\"\"_L1) (backslash + quote), or strip quotes from the search terms before building the query.","locations":[{"ref":"src/covermanager/musicbrainzcoverprovider.cpp:80-80","code":"   80 |   const QString query = QStringLiteral(\"release:\\\"%1\\\" AND artist:\\\"%2\\\"\").arg(request.album.trimmed().replace(u'\"', \"\\\"\"_L1), request.artist.trimmed().replace(u'\"', \"\\\"\"_L1));"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"PlaylistGeneratorInserter stores enqueue_next_ (set from the caller in Load(), e.g. the smart playlist \"Play next\" action invoked via Playlist at playlist.cpp:983), but Finished() never uses it. The call to destination_->InsertItems(items, row_, play_now_, enqueue_) only forwards play_now_ and enqueue_, leaving the enqueue_next parameter at its default false. As a result, enqueuing a smart playlist's results as \"play next\" silently behaves like a normal append/enqueue rather than inserting at the front of the queue.","fix":"Pass enqueue_next_ to InsertItems: destination_->InsertItems(items, row_, play_now_, enqueue_, enqueue_next_);","locations":[{"ref":"src/smartplaylists/playlistgeneratorinserter.cpp:80-93","code":"   80 | void PlaylistGeneratorInserter::Finished() {\n   81 | \n   82 |   QFutureWatcher<PlaylistItemPtrList> *watcher = static_cast<QFutureWatcher<PlaylistItemPtrList>*>(sender());\n   83 |   PlaylistItemPtrList items = watcher->result();\n   84 |   watcher->deleteLater();\n   85 | \n   86 |   if (items.isEmpty()) {\n   87 |     if (is_dynamic_) {\n   88 |       destination_->TurnOffDynamicPlaylist();\n   89 |     }\n   90 |   }\n   91 |   else {\n   92 |     destination_->InsertItems(items, row_, play_now_, enqueue_);\n   93 |   }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"EditSmartPlaylistFinished() always updates the generator at context_menu_index_, but the edit can be initiated from the toolbar button (EditSmartPlaylistFromButton), which edits ui_->view->selectionModel()->selectedIndexes().first() rather than the right-click context index. If the currently selected row differs from the last right-clicked row (context_menu_index_), the changes from the wizard are applied to the wrong smart playlist (or to a stale/invalid index). The New path uses the wizard's own generator and is fine; only the Edit-via-button path is affected.","fix":"Track the index actually being edited (e.g. store it on the wizard or in a member set by EditSmartPlaylist) and use that in EditSmartPlaylistFinished instead of context_menu_index_; or have EditSmartPlaylist remember the edited QModelIndex used to launch the wizard.","locations":[{"ref":"src/smartplaylists/smartplaylistsviewcontainer.cpp:253-259","code":"  253 | void SmartPlaylistsViewContainer::EditSmartPlaylistFromButton() {\n  254 | \n  255 |   if (ui_->view->selectionModel()->selectedIndexes().count() == 0) return;\n  256 | \n  257 |   EditSmartPlaylist(ui_->view->selectionModel()->selectedIndexes().first());\n  258 | \n  259 | }"},{"ref":"src/smartplaylists/smartplaylistsviewcontainer.cpp:294-307","code":"  294 | void SmartPlaylistsViewContainer::EditSmartPlaylistFinished() {\n  295 | \n  296 |   if (!context_menu_index_.isValid()) return;\n  297 | \n  298 |   const SmartPlaylistWizard *wizard = qobject_cast<SmartPlaylistWizard*>(sender());\n  299 |   if (!wizard) return;\n  300 | \n  301 |   QObject::disconnect(wizard, &SmartPlaylistWizard::accepted, this, &SmartPlaylistsViewContainer::EditSmartPlaylistFinished);\n  302 | \n  303 |   PlaylistGeneratorPtr generator = wizard->CreateGenerator();\n  304 |   if (!generator) return;\n  305 |   model_->UpdateGenerator(context_menu_index_, generator);\n  306 | \n  307 | }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","description":"RainbowAnalyzer::rainbowtype is a static member shared by ALL RainbowAnalyzer instances (set in the constructor: `rainbowtype = rbtype;`). NyanCatAnalyzer and RainbowDashAnalyzer therefore both write the same global. It happens to work today only because AnalyzerContainer keeps a single current_analyzer_ alive at a time; if both ever coexist (or the type is read after the other type was last constructed) the wrong sprite/geometry tables are used. The per-instance type should not be static.","fix":"Make rainbowtype a non-static instance member (RainbowType rainbowtype_;) initialized in the constructor, and update all references accordingly.","locations":[{"ref":"src/analyzer/rainbowanalyzer.h:64","code":"   64 |   static RainbowType rainbowtype;"},{"ref":"src/analyzer/rainbowanalyzer.cpp:49","code":"   49 | RainbowAnalyzer::RainbowType RainbowAnalyzer::rainbowtype;"},{"ref":"src/analyzer/rainbowanalyzer.cpp:72","code":"   72 |   rainbowtype = rbtype;"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Multiple symlink-loop-prevention checks use QString::startsWith(dir.path) to decide whether a (sym)link points into an already-watched collection directory. A plain prefix test gives false positives for sibling directories that share a name prefix, e.g. real_path \"/music2/foo\" startsWith dir.path \"/music\" is true, so a legitimate separate directory can be silently skipped from scanning / file counting. This affects ScanSubdirectory (symlink-into-watched check) and FilesCountForPath.","fix":"Compare canonical paths for equality or ensure the prefix is followed by a path separator (e.g. real_path == dir.path || real_path.startsWith(dir.path + QDir::separator())).","locations":[{"ref":"src/collection/collectionwatcher.cpp:543-547","code":"  543 |     for (const CollectionDirectory &i : std::as_const(watched_dirs_)) {\n  544 |       if (real_path.startsWith(i.path)) {\n  545 |         return;\n  546 |       }\n  547 |     }"},{"ref":"src/collection/collectionwatcher.cpp:1396-1400","code":" 1396 |     for (const CollectionDirectory &dir : std::as_const(watched_dirs_)) {\n 1397 |       if (real_path.startsWith(dir.path)) {\n 1398 |         return 0;\n 1399 |       }\n 1400 |     }"},{"ref":"src/collection/collectionwatcher.cpp:1428-1436","code":" 1428 |         bool points_into_watched_dir = false;\n 1429 |         for (const CollectionDirectory &dir : std::as_const(watched_dirs_)) {\n 1430 |           if (real_path.startsWith(dir.path)) {\n 1431 |             points_into_watched_dir = true;\n 1432 |             break;\n 1433 |           }\n 1434 |         }\n 1435 |         // A symlink into an already-watched directory would recurse/double-count; skip it.\n 1436 |         if (points_into_watched_dir) continue;"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ChildByKey() compares child->key, but SimpleTreeItem has no member named 'key' (the key member is 'container_key'). The function would fail to compile if ever instantiated. It is currently never called, so it survives only because template member functions are instantiated lazily. This is broken/dead code.","fix":"Either remove ChildByKey() if unused, or fix it to compare child->container_key == _key.","locations":[{"ref":"src/core/simpletreeitem.h:146-152","code":"  146 | template<typename T>\n  147 | T *SimpleTreeItem<T>::ChildByKey(const QString &_key) const {\n  148 |   for (T *child : children) {\n  149 |     if (child->key == _key) return child;\n  150 |   }\n  151 |   return nullptr;\n  152 | }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In SongLoader::MagicReady, when the parser is ASX/INI over http the code sets parser_ = nullptr and calls StopTypefindAsync(true) (which sets state_=Finished and queues StopTypefind), but then falls through: the subsequent `state_ = State::WaitingForData;` (line 719) overwrites the just-set Finished state, and `if (!IsPipelinePlaying()) EndOfStreamReached();` may run with the wrong state. A `return` is missing after the mms-conversion branch. It currently still produces the intended raw-stream outcome only because StopTypefind ignores state_, so impact is limited, but the control flow is incorrect and fragile.","fix":"Add `return;` after `StopTypefindAsync(true);` inside the `if (parser_->name() == u\"ASX/INI\"_s ...)` block so the function does not fall through and reset state_.","locations":[{"ref":"src/core/songloader.cpp:708-723","code":"  708 |   if (parser_->name() == u\"ASX/INI\"_s && url_.scheme() == u\"http\"_s) {\n  709 |     // This is actually a weird MS-WMSP stream. Changing the protocol to MMS from HTTP makes it playable.\n  710 |     parser_ = nullptr;\n  711 |     url_.setScheme(u\"mms\"_s);\n  712 |     StopTypefindAsync(true);\n  713 |   }\n  714 | \n  715 |   if (parser_) {\n  716 |     QObject::connect(parser_, &ParserBase::Error, this, &SongLoader::ParserError, static_cast<Qt::ConnectionType>(Qt::QueuedConnection | Qt::UniqueConnection));\n  717 |   }\n  718 | \n  719 |   state_ = State::WaitingForData;\n  720 | \n  721 |   if (!IsPipelinePlaying()) {\n  722 |     EndOfStreamReached();\n  723 |   }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"FinishTask only scales/finalizes the cover when BOTH image_data is non-empty AND image is non-null. However AlbumCoverImageResult::is_valid() (used in ProcessTask to mark task->success and skip art loading) returns true when only 'image' is set (image_data empty). Thus a cover supplied as an image-only AlbumCoverImageResult (or via the QImage overload) is reported as a successful load but produces NO scaled image and emits an empty image_data result. In the current tree this is latent because the only live AlbumCoverImageResult callers populate image_data, and the QImage overload is unused, but the inconsistency is a real defect waiting for a caller.","fix":"Make FinishTask handle the image-only case: scale from task->album_cover.image whenever it is non-null (regardless of image_data), and only gate the image_data manipulation on image_data being present.","locations":[{"ref":"src/covermanager/albumcoverloader.cpp:243-262","code":"  243 | void AlbumCoverLoader::FinishTask(TaskPtr task, const AlbumCoverLoaderResult::Type result_type) {\n  244 | \n  245 |   QImage image_scaled;\n  246 |   if (!task->album_cover.image_data.isEmpty() && !task->album_cover.image.isNull()) {\n  247 |     task->result_type = result_type;\n  248 |     task->album_cover.mime_type = Utilities::MimeTypeFromData(task->album_cover.image_data);\n  249 |     if (task->scaled_image()) {\n  250 |       image_scaled = ImageUtils::ScaleImage(task->album_cover.image, task->options.desired_scaled_size, task->options.device_pixel_ratio, task->pad_scaled_image());\n  251 |     }\n  252 |     if (!task->raw_image_data() && !task->album_cover.image_data.isNull()) {\n  253 |       task->album_cover.image_data = QByteArray();\n  254 |     }\n  255 |     if (!task->original_image() && !task->album_cover.image.isNull()) {\n  256 |       task->album_cover.image = QImage();\n  257 |     }\n  258 |   }\n  259 | \n  260 |   Q_EMIT AlbumCoverLoaded(task->id, AlbumCoverLoaderResult(task->success, task->result_type, task->album_cover, image_scaled, task->art_manual_updated, task->art_automatic_updated));\n  261 | \n  262 | }"},{"ref":"src/covermanager/albumcoverimageresult.h:43-43","code":"   43 |   bool is_valid() const { return !image_data.isNull() || !image.isNull(); }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"MusicBrainz artist aggregation always overwrites the artist with 'Various artists' whenever more than one artist-credit entry was parsed (if (i > 1) artist = \"Various artists\"), even when one of those credited artists exactly matches the searched artist. Unlike the analogous Discogs code (which uses 'i > 1 && artist != search->artist'), this discards a valid exact-artist match for multi-credit releases, degrading match scoring for legitimate collaborations.","fix":"Mirror the Discogs logic: only set 'Various artists' when i > 1 AND no credited artist matched search->artist; otherwise keep the matching artist name.","locations":[{"ref":"src/covermanager/musicbrainzcoverprovider.cpp:206-233","code":"  206 |     int i = 0;\n  207 |     QString artist;\n  208 |     for (const QJsonValue &value_artist : array_artists) {\n  209 |       if (!value_artist.isObject()) {\n  210 |         Error(u\"Invalid Json reply, artist is not a object.\"_s);\n  211 |         continue;\n  212 |       }\n  213 |       const QJsonObject object_artist = value_artist.toObject();\n  214 | \n  215 |       if (!object_artist.contains(\"artist\"_L1)) {\n  216 |         Error(u\"Invalid Json reply, artist is missing.\"_s, object_artist);\n  217 |         continue;\n  218 |       }\n  219 |       const QJsonValue value_artist2 = object_artist[\"artist\"_L1];\n  220 |       if (!value_artist2.isObject()) {\n  221 |         Error(u\"Invalid Json reply, artist is not an object.\"_s, value_artist2);\n  222 |         continue;\n  223 |       }\n  224 |       const QJsonObject obj_artist2 = value_artist2.toObject();\n  225 | \n  226 |       if (!obj_artist2.contains(\"name\"_L1)) {\n  227 |         Error(u\"Invalid Json reply, artist is missing name.\"_s, value_artist2);\n  228 |         continue;\n  229 |       }\n  230 |       artist = obj_artist2[\"name\"_L1].toString();\n  231 |       ++i;\n  232 |     }\n  233 |     if (i > 1) artist = \"Various artists\"_L1;"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"DeviceInfo::LoadIcon fallback loop iterates over every string entry in `icons` but always recomputes the hint from `icons.first().toString()` instead of the current `icon` element. As a result every iteration produces an identical `hint` and identical icon_name_ guess, so the loop body is effectively constant and the iteration over multiple icons is pointless; a per-element name would never be considered. Likely a copy/paste leftover where `icon` should have been used.","fix":"Use the current loop variable for the hint, e.g. `QString hint = icon_name.toLower() + name_hint.toLower();`, or break after the first element if a single hint is intended.","locations":[{"ref":"src/device/deviceinfo.cpp:135-150","code":"  135 |   for (const QVariant &icon : icons) {\n  136 |     if (!icon.isNull() && icon.userType() == QMetaType::QString) {\n  137 |       QString icon_name = icon.toString();\n  138 |       if (!icon_name.isEmpty()) {\n  139 |         QString hint = icons.first().toString().toLower() + name_hint.toLower();\n  140 |         if (hint.contains(\"phone\"_L1)) icon_name_ = \"device-phone\"_L1;\n  141 |         else if (hint.contains(\"ipod\"_L1) || hint.contains(\"apple\"_L1)) icon_name_ = \"device-ipod\"_L1;\n  142 |         else if ((hint.contains(\"usb\"_L1)) && (hint.contains(\"reader\"_L1))) icon_name_ = \"device-usb-flash\"_L1;\n  143 |         else if (hint.contains(\"usb\"_L1)) icon_name_ = \"device-usb-drive\"_L1;\n  144 |         icon_ = IconLoader::Load(icon_name_);\n  145 |         if (!icon_.isNull()) {\n  146 |           return;\n  147 |         }\n  148 |       }\n  149 |     }\n  150 |   }"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"When the tags-art cover finishes loading, the art-summary text is rebuilt from ui_->tags_summary->toPlainText() (and likewise ui_->summary->toPlainText()), then HTML fragments (\"<br />\" and the HTML returned by GetArtSummary) are appended and pushed back through setText(). Because toPlainText() strips the previously-set rich text, the original bold \"<b>title<\/b>\" / \"N songs selected\" markup is lost and is re-rendered as the literal escaped/plain text, while the freshly appended <br /> is interpreted as HTML. The summary header formatting is silently degraded every time a cover loads.","fix":"Keep the original HTML summary string in a member variable and append the art summary to that HTML, instead of round-tripping through toPlainText(); or use toHtml() and insert before the closing tags.","locations":[{"ref":"src/dialogs/edittagdialog.cpp:1069-1075","code":" 1069 |       const QModelIndex idx = ui_->song_list->selectionModel()->selectedIndexes().first();\n 1070 |       QString summary = ui_->summary->toPlainText();\n 1071 |       summary += \"<br />\"_L1;\n 1072 |       summary += \"<br />\"_L1;\n 1073 |       summary += GetArtSummary(data_[idx.row()].current_, result.type);\n 1074 |       ui_->summary->setText(summary);\n 1075 |     }"},{"ref":"src/dialogs/edittagdialog.cpp:1096-1106","code":" 1096 |     if (first_song.is_valid()) {\n 1097 |       QString summary = ui_->tags_summary->toPlainText();\n 1098 |       summary += \"<br />\"_L1;\n 1099 |       summary += \"<br />\"_L1;\n 1100 |       if (cover_action == UpdateCoverAction::None) {\n 1101 |         summary += GetArtSummary(first_song, result.type);\n 1102 |       }\n 1103 |       else {\n 1104 |         summary += GetArtSummary(cover_action);\n 1105 |       }\n 1106 |       ui_->tags_summary->setText(summary);"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Equalizer::closeEvent() looks up the current preset in presets_ using ui_->preset->currentText(), which returns the TRANSLATED display name (e.g. via tr()). But presets_ is keyed by the original, untranslated preset name (AddPreset stores presets_[name] = params with the raw name, and only adds the translated string as the combobox display text). So for any non-English UI, presets_.contains(name) at line 366 is always false, presets_[name] at line 368 default-constructs an all-zero Params, and the 'auto-save modified preset on close' feature silently never runs. DelPreset()/Save() correctly use itemData() (original name) instead of currentText(), confirming the intended key is the untranslated name.","fix":"Use the original name from item data instead of the display text: QString name = ui_->preset->itemData(ui_->preset->currentIndex()).toString(); then check presets_.contains(name) and compare current_params().","locations":[{"ref":"src/equalizer/equalizer.cpp:361-372","code":"  361 | void Equalizer::closeEvent(QCloseEvent *e) {\n  362 | \n  363 |   Q_UNUSED(e)\n  364 | \n  365 |   QString name = ui_->preset->currentText();\n  366 |   if (!presets_.contains(name)) return;\n  367 | \n  368 |   if (presets_[name] == current_params()) return;\n  369 | \n  370 |   SavePreset();\n  371 | \n  372 | }"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"GlobalShortcutsManager::Register() returns as soon as the FIRST available+enabled backend's Register() is called, returning that backend's result. If the highest-priority backend is available and enabled but its DoRegister() fails (returns false), Register() returns false without attempting any of the remaining enabled backends, so global shortcuts silently stop working even though a fallback backend was configured and available.","fix":"Track success across backends; only return after trying each enabled+available backend, or continue to the next backend when one fails to register.","locations":[{"ref":"src/globalshortcuts/globalshortcutsmanager.cpp:190-201","code":"  190 | bool GlobalShortcutsManager::Register() {\n  191 | \n  192 |   for (GlobalShortcutsBackend *backend : std::as_const(backends_)) {\n  193 |     if (backend->IsAvailable() && backends_enabled_.contains(backend->type())) {\n  194 |       return backend->Register();\n  195 |     }\n  196 |   }\n  197 | \n  198 |   qLog(Warning) << \"No global shortcuts enabled.\";\n  199 | \n  200 |   return false;\n  201 | "}]},{"id":"
