LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In MoodbarBuilder::Finish() the inner loop writes the running accumulator back into the source frame: `frames_[j] = rgb;`. The accumulator `rgb` already contains `frame.r*255` etc. When `width > frames_.count()` multiple output pixels map to the same frame index `j`; the first iteration corrupts `frames_[j]`, and a later output pixel that reads the same `j` reads the corrupted (accumulated) value, producing wrong moodbar colors. The write-back serves no purpose because the output bytes are computed from the local `rgb`, not from `frames_`.","fix":"Remove the `frames_[j] = rgb;` line; it is a leftover that mutates the input while it is still being read. Output is already produced from the local `rgb` accumulator.","locations":[{"ref":"src/moodbar/moodbarbuilder.cpp:176-195","code":"  176 |   for (int i = 0; i < width; ++i) {\n  177 |     Rgb rgb;\n  178 |     const int start = static_cast<int>(i * frames_.count() / width);\n  179 |     const int end = std::max(static_cast<int>((i + 1) * frames_.count() / width), start + 1);\n  180 | \n  181 |     for (int j = start; j < end; j++) {\n  182 |       const Rgb frame = frames_.value(j);\n  183 |       rgb.r += frame.r * 255;\n  184 |       rgb.g += frame.g * 255;\n  185 |       rgb.b += frame.b * 255;\n  186 |       frames_[j] = rgb;\n  187 |     }\n  188 | \n  189 |     const int n = end - start;\n  190 | \n  191 |     *(data++) = static_cast<char>(rgb.r / n);\n  192 |     *(data++) = static_cast<char>(rgb.g / n);\n  193 |     *(data++) = static_cast<char>(rgb.b / n);\n  194 | \n  195 |   }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In Playlist::Shuffle(), when the playlist is dynamic the current item is first swapped to index 0 (lines 2025-2026, begin set to 1), and then begin is additionally advanced by current_item_index_.row() + 1 (line 2032). Because the current item was already moved to position 0, advancing begin past the original current-row position shuffles part of the history region inconsistently and does not actually keep the intended 'history - current - future' layout fixed (compare with sort(), which uses only current_item_index_.row() + 1 and does no swap). No out-of-bounds occurs (loop stays within count), but the resulting order is wrong for the dynamic case.","fix":"For the dynamic case, do not also perform the index-0 swap, or compute begin from the post-swap layout. Mirror sort(): when dynamic_playlist_ && current valid, set begin to current_item_index_.row() + 1 without swapping the current item to position 0.","locations":[{"ref":"src/playlist/playlist.cpp:2019-2044","code":" 2019 | void Playlist::Shuffle() {\n 2020 | \n 2021 |   PlaylistItemPtrList new_items(items_);\n 2022 | \n 2023 |   int begin = 0;\n 2024 |   if (current_item_index_.isValid()) {\n 2025 |     if (new_items[0] != new_items[current_item_index_.row()]) {\n 2026 |       std::swap(new_items[0], new_items[current_item_index_.row()]);\n 2027 |     }\n 2028 |     begin = 1;\n 2029 |   }\n 2030 | \n 2031 |   if (dynamic_playlist_ && current_item_index_.isValid()) {\n 2032 |     begin += current_item_index_.row() + 1;\n 2033 |   }\n 2034 | \n 2035 |   const int count = static_cast<int>(items_.count());\n 2036 |   for (int i = begin; i < count; ++i) {\n 2037 |     const int new_pos = i + (rand() % (count - i));\n 2038 | \n 2039 |     std::swap(new_items[i], new_items[new_pos]);\n 2040 |   }\n 2041 | \n 2042 |   undo_stack_->push(new PlaylistUndoCommandShuffleItems(this, new_items));\n 2043 | \n 2044 | }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","description":"After closing a tab, the code selects the previous tab only when menu_index_ > 1, so closing the second tab (menu_index_ == 1) does not reselect index 0. The condition should be > 0 to correctly move selection to the immediately preceding tab in that case.","fix":"Change `if (menu_index_ > 1)` to `if (menu_index_ > 0)` so closing the tab at index 1 selects index 0.","locations":[{"ref":"src/playlist/playlisttabbar.cpp:274-277","code":"  274 |   // Select the nearest tab.\n  275 |   if (menu_index_ > 1) {\n  276 |     setCurrentIndex(menu_index_ - 1);\n  277 |   }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","description":"SongLoaderInserter::AsyncLoad assumes pending_[0] is the loader that already had LoadMetadataBlocking() called in the first loop, so it skips i==0 in the second loop (line 227). However the first loop calls LoadMetadataBlocking() on the first loader that did NOT error (first_loaded gate at lines 202-211), which may be pending_[i] for some i>0 if pending_[0] errored. As a result, when pending_[0] errored, the already-loaded loader gets its metadata loaded twice (wasted blocking I/O) and pending_[0] (if not errored later) may be relied on incorrectly. Cosmetic correctness/perf issue on the cold error path.","fix":"Track the actual index of the loader that received the early LoadMetadataBlocking() (e.g. store first_loaded_index) and skip exactly that index in the second loop instead of hardcoding i != 0.","locations":[{"ref":"src/playlist/songloaderinserter.cpp:206-233","code":"  206 |     if (!first_loaded) {\n  207 |       // Load everything from the first song.\n  208 |       // It'll start playing as soon as we emit PreloadFinished, so it needs to have the duration set to show properly in the UI.\n  209 |       loader->LoadMetadataBlocking();\n  210 |       first_loaded = true;\n  211 |     }\n  212 | \n  213 |     songs_ << loader->songs();\n  214 |     playlist_name_ = loader->playlist_name();\n  215 | \n  216 |   }\n  217 |   task_manager_->SetTaskFinished(async_load_id);\n  218 |   Q_EMIT PreloadFinished();\n  219 | \n  220 |   // Songs are inserted in playlist, now load them completely.\n  221 |   async_progress = 0;\n  222 |   async_load_id = task_manager_->StartTask(tr(\"Loading tracks info\"));\n  223 |   task_manager_->SetTaskProgress(async_load_id, static_cast<quint64>(async_progress), static_cast<quint64>(songs_.count()));\n  224 |   SongList songs;\n  225 |   for (int i = 0; i < pending_.count(); ++i) {\n  226 |     SongLoader *loader = pending_.value(i);\n  227 |     if (i != 0) {\n  228 |       // We already did this earlier for the first song.\n  229 |       loader->LoadMetadataBlocking();\n  230 |     }\n  231 |     songs << loader->songs();\n  232 |     task_manager_->SetTaskProgress(async_load_id, static_cast<quint64>(songs.count()));\n  233 |   }"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"albums_total_ and songs_total_ are initialized to 0 in the constructor and never assigned anywhere afterward, yet they are used as the divisor in GetProgress() at lines 740 (albums_received_/albums_total_) and 1006 (songs_received_/songs_total_). The per-reply local 'albums_total'/'songs_total' values parsed from the API response are only forwarded to the *FinishCheck callbacks and never stored to the members. Result: for FavouriteAlbums/SearchAlbums and FavouriteSongs/SearchSongs queries the progress computation is received/0, i.e. a float division by zero whose static_cast<int> result is technically undefined behavior (in practice 0/garbage), so the progress bar never advances. Spotify's equivalent code sets albums_total_ (spotifyrequest.cpp:648) and songs_total_ (spotifyrequest.cpp:959), confirming the intended pattern.","fix":"Assign the parsed totals to the members, e.g. set albums_total_ = albums_total in AlbumsReceived for FavouriteAlbums/SearchAlbums (mirroring the artists_total_ assignment at line 429) and songs_total_ = songs_total in SongsReceived for FavouriteSongs/SearchSongs, before emitting UpdateProgress. Alternatively guard GetProgress against total<=0.","locations":[{"ref":"src/qobuz/qobuzrequest.cpp:738-741","code":"  738 |   if (query_type_ == Type::FavouriteAlbums || query_type_ == Type::SearchAlbums) {\n  739 |     albums_received_ += albums_received;\n  740 |     Q_EMIT UpdateProgress(query_id_, GetProgress(albums_received_, albums_total_));\n  741 |   }"},{"ref":"src/qobuz/qobuzrequest.cpp:1004-1007","code":" 1004 |   if (query_type_ == Type::FavouriteSongs || query_type_ == Type::SearchSongs) {\n 1005 |     songs_received_ += songs_received;\n 1006 |     Q_EMIT UpdateProgress(query_id_, GetProgress(songs_received_, songs_total_));\n 1007 |   }"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Off-by-one in the Radio Browser fallback-server iteration when DNS discovery fails. When the DNS lookup fails, DnsLookupFinished tests kFallbackServers.at(fallback_index_) (index 0) and then increments fallback_index_ to 1 immediately (lines 116-118). If that first server test then fails, ServerTestReply does ++fallback_index_ FIRST (now 2) and tests at(2), so kFallbackServers.at(1) ('de2.api.radio-browser.info') is silently skipped. The DNS-success path (lines 133-134) correctly does NOT pre-increment, so its 0,1,2,3 sequence is right; only the DNS-failure path is inconsistent. Net effect: when DNS is unavailable, one of the four fallback servers is never tried, reducing the chance of recovering radio browser functionality on a flaky network.","fix":"Make the failure path consistent with ServerTestReply by not pre-incrementing: in DnsLookupFinished's failure branch set fallback_index_ = 0 and call TestServer(kFallbackServers.at(0)) without the ++fallback_index_, matching the DNS-success branch. ServerTestReply's leading ++fallback_index_ will then walk 0,1,2,3 correctly.","locations":[{"ref":"src/radios/radiobrowserservice.cpp:116-119","code":"  116 |     if (fallback_index_ < kFallbackServers.size()) {\n  117 |       TestServer(kFallbackServers.at(fallback_index_));\n  118 |       ++fallback_index_;\n  119 |     }"},{"ref":"src/radios/radiobrowserservice.cpp:158-167","code":"  158 |   if (reply->error() != QNetworkReply::NoError) {\n  159 |     // Try next fallback\n  160 |     ++fallback_index_;\n  161 |     if (fallback_index_ < kFallbackServers.size()) {\n  162 |       TestServer(kFallbackServers.at(fallback_index_));\n  163 |     }\n  164 |     else {\n  165 |       Q_EMIT SearchError(tr(\"No Radio Browser server available.\"));\n  166 |     }\n  167 |     return;"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In StreamingSearchModel::BuildContainers the empty-value guard only repairs display_text. The condition 'if (display_text.isEmpty() || sort_text.isEmpty())' sets display_text = \"Unknown\" but never assigns a non-empty sort_text. So when display_text is non-empty but sort_text is empty, display_text is needlessly overwritten with \"Unknown\" while sort_text stays empty, producing a container labelled 'Unknown' that also sorts under an empty key. The container key (display_text + unique_tag) can also collide for distinct items that both hit this branch.","fix":"Handle the two cases independently, e.g. if (display_text.isEmpty()) display_text = tr(\"Unknown\"); and if (sort_text.isEmpty()) sort_text = display_text; before computing the container key.","locations":[{"ref":"src/streaming/streamingsearchmodel.cpp:256-261","code":"  256 |   if (display_text.isEmpty() || sort_text.isEmpty()) {\n  257 |     display_text = \"Unknown\"_L1;\n  258 |   }\n  259 | \n  260 |   // Find a container for this level\n  261 |   key->group_[level] = display_text + unique_tag;"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Same defect as Qobuz: albums_total_ and songs_total_ are initialized to 0 and never assigned (only artists_total_ is set, at line 406), but they are used as the divisor in GetProgress() at line 723 (albums_received_/albums_total_) and line 923 (songs_received_/songs_total_). The parsed 'albums_total'/'songs_total' locals are only passed to the *FinishCheck callbacks. For FavouriteAlbums/SearchAlbums and FavouriteSongs/SearchSongs this produces a received/0 float division (undefined when cast to int), so progress never advances. Spotify sets these members correctly, confirming the intended behavior.","fix":"Store the parsed totals into albums_total_ / songs_total_ (as done for artists_total_ at line 406) before emitting the progress updates, or make GetProgress return 0 when total <= 0.","locations":[{"ref":"src/tidal/tidalrequest.cpp:721-724","code":"  721 |   if (query_type_ == Type::FavouriteAlbums || query_type_ == Type::SearchAlbums) {\n  722 |     albums_received_ += albums_received;\n  723 |     Q_EMIT UpdateProgress(query_id_, GetProgress(albums_received_, albums_total_));\n  724 |   }"},{"ref":"src/tidal/tidalrequest.cpp:921-924","code":"  921 |   if (query_type_ == Type::FavouriteSongs || query_type_ == Type::SearchSongs) {\n  922 |     songs_received_ += songs_received;\n  923 |     Q_EMIT UpdateProgress(query_id_, GetProgress(songs_received_, songs_total_));\n  924 |   }"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"The constant kUseSortTags is defined with the persisted key string \"use_short_tags\" (note 'short' instead of 'sort'). The name and the comment-equivalent intent (sort tags) contradict the stored key. It is used consistently for both Load and Save so there is no functional break today, but the key is misspelled and would be a hidden trap if anyone migrates or references the raw setting name elsewhere.","fix":"If backward compatibility with existing user configs is not a concern, correct the key to \"use_sort_tags\"; otherwise keep the value but add a clarifying comment noting the historical misspelling.","locations":[{"ref":"src/constants/collectionsettings.h:40","code":"   40 | constexpr char kUseSortTags[] = \"use_short_tags\";"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"MimeData and SongMimeData constructors accept a QObject *parent but discard it via Q_UNUSED, so a parent passed by a caller is silently ignored and the object is not parented. All current call sites use 'new MimeData' without a parent, so there is no live impact, but the API is misleading.","fix":"Either forward parent to the QMimeData base (QMimeData supports a QObject parent) or remove the unused parent parameter from the signatures.","locations":[{"ref":"src/core/mimedata.cpp:28-39","code":"   28 | MimeData::MimeData(const bool clear, const bool play_now, const bool enqueue, const bool enqueue_next_now, const bool open_in_new_playlist, QObject *parent)\n   29 |     : override_user_settings_(false),\n   30 |       clear_first_(clear),\n   31 |       play_now_(play_now),\n   32 |       enqueue_now_(enqueue),\n   33 |       enqueue_next_now_(enqueue_next_now),\n   34 |       open_in_new_playlist_(open_in_new_playlist),\n   35 |       from_doubleclick_(false) {\n   36 | \n   37 |   Q_UNUSED(parent);\n   38 | \n   39 | }"},{"ref":"src/core/songmimedata.cpp:24-26","code":"   24 | SongMimeData::SongMimeData(QObject *parent) : backend(nullptr) {\n   25 |   Q_UNUSED(parent);\n   26 | }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"PreviousVirtualIndex uses last_song.artist() to decide whether two tracks belong to the same album, while the symmetric forward function NextVirtualIndex uses last_song.effective_albumartist() (compared with this_song.effective_albumartist()). This is a copy/paste divergence: when navigating backwards in Repeat-Album or Shuffle-InsideAlbum mode, the album-grouping test differs from forward navigation. For compilations or albums where the per-track artist differs from the album artist, going to the previous track selects different/incorrect tracks than going forward, breaking the album-only navigation invariant.","fix":"Change line 634 to use effective_albumartist() consistently: replace `last_song.artist() == this_song.artist()` with `last_song.effective_albumartist() == this_song.effective_albumartist()` so PreviousVirtualIndex matches NextVirtualIndex.","locations":[{"ref":"src/playlist/playlist.cpp:629-636","code":"  629 |   for (int j = i - 1; j >= 0; --j) {\n  630 |     if (item_at(virtual_items_[j])->GetShouldSkip()) {\n  631 |       continue;\n  632 |     }\n  633 |     Song this_song = item_at(virtual_items_[j])->EffectiveMetadata();\n  634 |     if (((last_song.is_compilation() && this_song.is_compilation()) || last_song.artist() == this_song.artist()) && last_song.album() == this_song.album() && FilterContainsVirtualIndex(j)) {\n  635 |       return j;  // Found one\n  636 |     }"},{"ref":"src/playlist/playlist.cpp:589-599","code":"  589 |   for (int j = i + 1; j < virtual_items_.count(); ++j) {\n  590 |     if (item_at(virtual_items_[j])->GetShouldSkip()) {\n  591 |       continue;\n  592 |     }\n  593 |     const Song this_song = item_at(virtual_items_[j])->EffectiveMetadata();\n  594 |     if (((last_song.is_compilation() && this_song.is_compilation()) ||\n  595 |          last_song.effective_albumartist() == this_song.effective_albumartist()) &&\n  596 |         last_song.album() == this_song.album() &&\n  597 |         FilterContainsVirtualIndex(j)) {\n  598 |       return j;  // Found one\n  599 |     }"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"The default value for doubleclick_playlist_addmode_ (type PlaylistAddBehaviour) is computed using the wrong enum: static_cast<int>(BehaviourSettings::PlayBehaviour::Never). This is a copy-paste from the line above (doubleclick_playmode_). It currently works only by coincidence because PlayBehaviour::Never == 1 and PlaylistAddBehaviour::Play == 1, so the intended default (Play) happens to resolve correctly. If either enum is renumbered, the default playlist double-click behaviour silently changes.","fix":"Use static_cast<int>(BehaviourSettings::PlaylistAddBehaviour::Play) (or the correct intended default of the PlaylistAddBehaviour enum) instead of PlayBehaviour::Never.","locations":[{"ref":"src/core/mainwindow.cpp:1206","code":" 1206 |   doubleclick_playlist_addmode_ = static_cast<BehaviourSettings::PlaylistAddBehaviour>(s.value(BehaviourSettings::kDoubleClickPlaylistAddMode, static_cast<int>(BehaviourSettings::PlayBehaviour::Never)).toInt());"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"Song::IsFileInfoEqual compares d->mtime_ == other.d->mtime_ twice (lines 972 and 974) while never comparing some other intended field. The duplicated mtime_ comparison is harmless to correctness but is clearly a copy-paste artifact: the second occurrence was likely meant to be a different field (the only file-info fields it tracks are all already present, so it is simply redundant). No field is actually missing from the set tracked elsewhere, so impact is only a redundant comparison.","fix":"Remove the duplicate `d->mtime_ == other.d->mtime_` on line 974 (or replace it with whatever field was intended).","locations":[{"ref":"src/core/song.cpp:964-977","code":"  964 | bool Song::IsFileInfoEqual(const Song &other) const {\n  965 | \n  966 |   return d->beginning_ == other.d->beginning_ &&\n  967 |          d->end_ == other.d->end_ &&\n  968 |          d->url_ == other.d->url_ &&\n  969 |          d->basefilename_ == other.d->basefilename_ &&\n  970 |          d->filetype_ == other.d->filetype_ &&\n  971 |          d->filesize_ == other.d->filesize_ &&\n  972 |          d->mtime_ == other.d->mtime_ &&\n  973 |          d->ctime_ == other.d->ctime_ &&\n  974 |          d->mtime_ == other.d->mtime_ &&\n  975 |          d->stream_url_ == other.d->stream_url_;\n  976 | \n  977 | }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"GetSongsByForeignId pre-sizes the result with QList<Song> ret(ids.count()) of default-constructed Song objects (Song::Source::Unknown, invalid), fills only the rows whose foreign id matched a DB row, and returns ret.toList() including the unmatched default-constructed entries. Callers iterating the result will receive invalid placeholder Song objects for ids that had no match, rather than a list of only the found songs. The function is currently unused outside the backend, limiting impact, but the contract is surprising and error-prone.","fix":"Either document that the returned list is index-aligned with ids and may contain invalid Songs, or build the result without placeholder rows (skip unmatched ids) consistent with the other GetSongsBy* helpers.","locations":[{"ref":"src/collection/collectionbackend.cpp:1140-1173","code":" 1140 | SongList CollectionBackend::GetSongsByForeignId(const QStringList &ids, const QString &table, const QString &column) {\n 1141 | \n 1142 |   QMutexLocker l(db_->Mutex());\n 1143 |   QSqlDatabase db(db_->Connect());\n 1144 | \n 1145 |   // Bind each id as a positional parameter so the (possibly untrusted) foreign ids can't break out of the SQL.\n 1146 |   QStringList placeholders;\n 1147 |   placeholders.reserve(ids.count());\n 1148 |   for (int i = 0; i < ids.count(); ++i) {\n 1149 |     placeholders << u\"?\"_s;\n 1150 |   }\n 1151 |   const QString in = placeholders.join(u',');\n 1152 | \n 1153 |   SqlQuery q(db);\n 1154 |   q.prepare(QStringLiteral(\"SELECT %3.ROWID, %2, %3.%4 FROM %3, %1 WHERE %3.%4 IN (%5) AND %1.ROWID = %3.ROWID AND unavailable = 0\").arg(songs_table_, Song::kColumnSpec, table, column, in));\n 1155 |   for (const QString &id : ids) {\n 1156 |     q.addBindValue(id);\n 1157 |   }\n 1158 |   if (!q.Exec()) {\n 1159 |     db_->ReportErrors(q);\n 1160 |     return SongList();\n 1161 |   }\n 1162 | \n 1163 |   QList<Song> ret(ids.count());\n 1164 |   while (q.next()) {\n 1165 |     const QString foreign_id = q.value(static_cast<int>(Song::kColumns.count()) + 1).toString();\n 1166 |     const qint64 index = ids.indexOf(foreign_id);\n 1167 |     if (index == -1) continue;\n 1168 | \n 1169 |     ret[index].InitFromQuery(q, true);\n 1170 |   }\n 1171 |   return ret.toList();\n 1172 | \n 1173 | }"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"CoverFromURLDialog::LoadCoverFromURLFinished uses qobject_cast<QNetworkReply*>(sender()) and then immediately calls reply->deleteLater() and reply->error() without checking for null. If the slot is ever invoked in a context where sender() is not a QNetworkReply (or null), this dereferences a null pointer. While the current connection always supplies a valid reply, the unchecked cast is fragile compared to the rest of the codebase which passes the reply explicitly.","fix":"Capture the QNetworkReply* in the connect lambda (as done in the cover providers) or guard 'if (!reply) return;' after the qobject_cast before dereferencing.","locations":[{"ref":"src/covermanager/coverfromurldialog.cpp:84-94","code":"   84 | void CoverFromURLDialog::LoadCoverFromURLFinished() {\n   85 | \n   86 |   ui_->busy->hide();\n   87 | \n   88 |   QNetworkReply *reply = qobject_cast<QNetworkReply*>(sender());\n   89 |   reply->deleteLater();\n   90 | \n   91 |   if (reply->error() != QNetworkReply::NoError) {\n   92 |     QMessageBox::information(this, tr(\"Fetching cover error\"), tr(\"The site you requested does not exist!\"));\n   93 |     return;\n   94 |   }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"MtpDevice::ProgressCallback computes static_cast<float>(sent) / static_cast<float>(total) without guarding total == 0. libmtp may invoke the progress callback with total == 0 (unknown size), producing inf/NaN progress reported to the UI.","fix":"Guard against zero: `job->progress_(total > 0 ? static_cast<float>(sent) / static_cast<float>(total) : 0.0f);`","locations":[{"ref":"src/device/mtpdevice.cpp:172-178","code":"  172 | static int ProgressCallback(uint64_t const sent, uint64_t const total, void const *const data) {\n  173 | \n  174 |   const MusicStorage::CopyJob *job = reinterpret_cast<const MusicStorage::CopyJob*>(data);\n  175 |   job->progress_(static_cast<float>(sent) / static_cast<float>(total));\n  176 | \n  177 |   return 0;\n  178 | "}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"GlobalShortcut::nativeKeycode() on X11 returns `false` (i.e. 0) when there is no X11 display: `if (!disp) return false;`. The function return type is int (a keycode). Using a bool literal as an int keycode is a type/intent mismatch; it relies on false==0 being interpreted as 'no keycode'. Functionally benign today but misleading and fragile.","fix":"Return 0 instead of false to express 'invalid keycode' with the correct type.","locations":[{"ref":"src/globalshortcuts/globalshortcut-x11.cpp:77-80","code":"   77 | int GlobalShortcut::nativeKeycode(const Qt::Key qt_keycode) {\n   78 | \n   79 |   Display *disp = X11Display();\n   80 |   if (!disp) return false;"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In ArtistsReplyReceived the early-return guard 'if (!replies_.contains(reply)) return;' (line 380) executes before the active-counter decrement '--artists_requests_active_' (lines 387-388). If the reply is ever no longer in replies_ when this slot fires (e.g. it was aborted/removed elsewhere), the function returns without decrementing artists_requests_active_, leaving the counter permanently elevated and preventing the FinishCheck guards (which require artists_requests_active_ <= 0) from ever completing, hanging the query. The albums/songs paths decrement in the wrapper before the contains-check, so they are not affected. Same shape exists in the Tidal/Spotify ArtistsReplyReceived.","fix":"Decrement and increment the active/received counters before the replies_.contains() guard (as the album/song reply wrappers do), or ensure the counter is always balanced on the not-contained path.","locations":[{"ref":"src/qobuz/qobuzrequest.cpp:378-389","code":"  378 | void QobuzRequest::ArtistsReplyReceived(QNetworkReply *reply, const int limit_requested, const int offset_requested) {\n  379 | \n  380 |   if (!replies_.contains(reply)) return;\n  381 |   replies_.removeAll(reply);\n  382 |   QObject::disconnect(reply, nullptr, this, nullptr);\n  383 |   reply->deleteLater();\n  384 | \n  385 |   const JsonObjectResult json_object_result = ParseJsonObject(reply);\n  386 | \n  387 |   --artists_requests_active_;\n  388 |   ++artists_requests_received_;\n  389 | "},{"ref":"src/tidal/tidalrequest.cpp:370-381","code":"  370 | void TidalRequest::ArtistsReplyReceived(QNetworkReply *reply, const int limit_requested, const int offset_requested) {\n  371 | \n  372 |   if (!replies_.contains(reply)) return;\n  373 |   replies_.removeAll(reply);\n  374 |   QObject::disconnect(reply, nullptr, this, nullptr);\n  375 |   reply->deleteLater();\n  376 | \n  377 |   const JsonObjectResult json_object_result = ParseJsonObject(reply);\n  378 | \n  379 |   --artists_requests_active_;\n  380 |   ++artists_requests_received_;\n  381 | "},{"ref":"src/spotify/spotifyrequest.cpp:397-408","code":"  397 | void SpotifyRequest::ArtistsReplyReceived(QNetworkReply *reply, const int limit_requested, const int offset_requested) {\n  398 | \n  399 |   if (!replies_.contains(reply)) return;\n  400 |   replies_.removeAll(reply);\n  401 |   QObject::disconnect(reply, nullptr, this, nullptr);\n  402 |   reply->deleteLater();\n  403 | \n  404 |   const JsonObjectResult json_object_result = ParseJsonObject(reply);\n  405 | \n  406 |   --artists_requests_active_;\n  407 |   ++artists_requests_received_;\n  408 | "}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Utilities::Copy() treats a zero-byte return from QIODevice::read()/write() as a successful loop terminator. The write loop `do { bytes_written = destination->write(...); if (-1) return false; pos += bytes_written; } while (bytes_written > 0 && pos != bytes)` will exit and return true even if write() returns 0 (device temporarily unable to accept data) before pos reaches bytes, silently reporting success on a truncated/incomplete copy. Same pattern on the read side can leave the buffer partially filled while still returning true.","fix":"After the loops, verify pos == bytes and return false otherwise; treat write()==0 as a retry/error condition rather than completion.","locations":[{"ref":"src/utilities/fileutils.cpp:67-84","code":"   67 |   qint64 bytes_read = 0;\n   68 |   do {\n   69 |     bytes_read = source->read(data.get() + pos, bytes - pos);\n   70 |     if (bytes_read == -1) return false;\n   71 | \n   72 |     pos += bytes_read;\n   73 |   } while (bytes_read > 0 && pos != bytes);\n   74 | \n   75 |   pos = 0;\n   76 |   qint64 bytes_written = 0;\n   77 |   do {\n   78 |     bytes_written = destination->write(data.get() + pos, bytes - pos);\n   79 |     if (bytes_written == -1) return false;\n   80 | \n   81 |     pos += bytes_written;\n   82 |   } while (bytes_written > 0 && pos != bytes);\n   83 | \n   84 |   return true;"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"In LocalRedirectServer::ReadyRead, when the full request has not yet been received the code re-connects socket_'s readyRead signal to ReadyRead (line 129). That signal was already connected once in incomingConnection (line 102), and no Qt::UniqueConnection flag is used, so each partial read adds another duplicate connection, causing ReadyRead to be invoked multiple times per subsequent readyRead. It happens not to corrupt the buffer (the extra invocations read an already-drained socket and append empty data), but it is an API contract misuse that multiplies slot invocations.","fix":"Remove the redundant QObject::connect in the else branch (the connection established in incomingConnection persists), or pass Qt::UniqueConnection.","locations":[{"ref":"src/core/localredirectserver.cpp:112-131","code":"  112 | void LocalRedirectServer::ReadyRead() {\n  113 | \n  114 |   buffer_.append(socket_->readAll());\n  115 |   if (socket_->atEnd() || buffer_.endsWith(\"\\r\\n\\r\\n\")) {\n  116 |     WriteTemplate();\n  117 |     socket_->close();\n  118 |     socket_->deleteLater();\n  119 |     socket_ = nullptr;\n  120 |     request_url_ = ParseUrlFromRequest(buffer_);\n  121 |     success_ = request_url_.isValid();\n  122 |     if (!request_url_.isValid()) {\n  123 |       error_ = \"Invalid request URL\"_L1;\n  124 |     }\n  125 |     close();\n  126 |     Q_EMIT Finished();\n  127 |   }\n  128 |   else {\n  129 |     QObject::connect(socket_, &QAbstractSocket::readyRead, this, &LocalRedirectServer::ReadyRead);\n  130 |   }\n  131 | "}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"Udisks2Lister::UpdateDeviceFreeSpace uses `device_data_[id]` (operator[]), which silently inserts a default-constructed PartitionData if `id` is not present, then reads mount_paths.value(0) (empty) and emits DeviceChanged for a phantom device. All other accessors in this class guard with `device_data_.contains(id)` first. As a public slot it can be invoked for an id that has since been removed.","fix":"Guard with a contains() check under the write lock before mutating/emitting: `if (!device_data_.contains(id)) return;` and use value(id).mount_paths.","locations":[{"ref":"src/device/udisks2lister.cpp:187-191","code":"  187 | void Udisks2Lister::UpdateDeviceFreeSpace(const QString &id) {\n  188 |   QWriteLocker locker(&device_data_lock_);\n  189 |   device_data_[id].free_space = Utilities::FileSystemFreeSpace(device_data_.value(id).mount_paths.value(0));\n  190 |   Q_EMIT DeviceChanged(id);\n  191 | }"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"QComboBox::currentData(int role) is called with the changed item index passed as the 'role' argument. currentData() ignores the index and returns the data of the *current* item at the given role; passing the index (0/1/2) as a role makes it return DisplayRole/DecorationRole/EditRole data instead of the Qt::UserRole int that stores the CacheSizeUnit. As a result, the unit detection in the switch almost never matches the intended enum (e.g. selecting MB does not cap the spinbox maximum to INT_MAX/1024), so the cache-size spinbox maximum is set incorrectly.","fix":"Use the item index, not a role: replace currentData(index) with ui_->combobox_cache_size->itemData(index). Since the signal fires when the index becomes current, currentData() (default Qt::UserRole) would also work.","locations":[{"ref":"src/settings/collectionsettingspage.cpp:315-328","code":"  315 | void CollectionSettingsPage::CacheSizeUnitChanged(int index) {\n  316 | \n  317 |   const CacheSizeUnit cache_size_unit = static_cast<CacheSizeUnit>(ui_->combobox_cache_size->currentData(index).toInt());\n  318 | \n  319 |   switch (cache_size_unit) {\n  320 |     case CacheSizeUnit::MB:\n  321 |       ui_->spinbox_cache_size->setMaximum(std::numeric_limits<int>::max() / 1024);\n  322 |       break;\n  323 |     default:\n  324 |       ui_->spinbox_cache_size->setMaximum(std::numeric_limits<int>::max());\n  325 |       break;\n  326 |   }\n  327 | \n  328 | }"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"Same QComboBox::currentData(int role) misuse as in CacheSizeUnitChanged: the item index is passed where a role is expected, so the returned data is not the stored CacheSizeUnit int. The GB branch (which caps the disk-cache spinbox maximum to 4) is effectively never taken, allowing an unreasonably large disk-cache size value when GB is selected.","fix":"Replace ui_->combobox_disk_cache_size->currentData(index) with ui_->combobox_disk_cache_size->itemData(index) (or currentData() with the default role).","locations":[{"ref":"src/settings/collectionsettingspage.cpp:330-343","code":"  330 | void CollectionSettingsPage::DiskCacheSizeUnitChanged(int index) {\n  331 | \n  332 |   const CacheSizeUnit cache_size_unit = static_cast<CacheSizeUnit>(ui_->combobox_disk_cache_size->currentData(index).toInt());\n  333 | \n  334 |   switch (cache_size_unit) {\n  335 |     case CacheSizeUnit::GB:\n  336 |       ui_->spinbox_disk_cache_size->setMaximum(4);\n  337 |       break;\n  338 |     default:\n  339 |       ui_->spinbox_disk_cache_size->setMaximum(std::numeric_limits<int>::max());\n  340 |       break;\n  341 |   }\n  342 | \n  343 | }"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"ScopedWCharArray initializes data_ in the member initializer list using chars_ (data_(new wchar_t[chars_ + 1])). Per C++ rules, members are initialized in declaration order, and in the header chars_ is declared BEFORE data_, so chars_ is initialized first and this happens to work. However the initialization order is fragile and relies entirely on declaration order in the header matching the init-list order; if the member declaration order in scopedwchararray.h were ever reordered (data_ before chars_), data_ would be allocated with an uninitialized chars_, causing an undersized/garbage allocation and a buffer overflow in str.toWCharArray. This is an easily-broken latent hazard.","fix":"Make the dependency explicit and robust, e.g. compute the length into a local before allocating, or add a comment/static_assert documenting that chars_ must be declared before data_. Preferably initialize from str.length() directly in both members.","locations":[{"ref":"src/utilities/scopedwchararray.cpp:25-29","code":"   25 | ScopedWCharArray::ScopedWCharArray(const QString &str)\n   26 |     : chars_(str.length()), data_(new wchar_t[static_cast<size_t>(chars_ + 1)]) {\n   27 |   str.toWCharArray(data_.get());\n   28 |   data_[static_cast<size_t>(chars_)] = '\\0';\n   29 | }"},{"ref":"src/utilities/scopedwchararray.h:44-45","code":"   44 |   qint64 chars_;\n   45 |   ScopedPtr<wchar_t[]> data_;"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","description":"snprintf is called with sizeof(str) - 1 as the buffer size. snprintf's size argument already accounts for the NUL terminator (it writes at most size-1 chars plus NUL), so subtracting 1 needlessly shrinks the usable buffer by one byte. Harmless here (card numbers are short) but the intent ('hw:%d') is to use the full 32-byte buffer.","fix":"Use snprintf(str, sizeof(str), \"hw:%d\", card);","locations":[{"ref":"src/engine/alsadevicefinder.cpp:56-57","code":"   56 |     char str[32];\n   57 |     snprintf(str, sizeof(str) - 1, \"hw:%d\", card);"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"Utilities::Transliterate() constructs a brand new ICU icu::Transliterator via Transliterator::createInstance() on every single call. createInstance parses transliteration rule sets and is expensive. This function is called repeatedly in hot paths: every lyrics provider URL fixup (StringFixup in azlyrics/elyrics/letras/songlyrics/musixmatch providers calls it per search, and Genius/HTML parsing flows), and CoverUtils::AlbumCoverFilename / cover filename generation for every saved cover. Re-creating the transliterator each time wastes significant CPU. The transliterator is stateless after creation and could be cached in a function-local static (guarded for thread-safety since providers run on a worker thread).","fix":"Cache the created transliterator (e.g. a thread_local ScopedPtr<icu::Transliterator>, or a static initialized once) and reuse it across calls; icu::Transliterator::transliterate on a UnicodeString does not require a fresh instance per call. Guard creation for the worker-thread usage.","locations":[{"ref":"src/utilities/transliterate.cpp:35-52","code":"   35 | QString Transliterate(const QString &accented_str) {\n   36 | \n   37 |   UErrorCode errorcode = U_ZERO_ERROR;\n   38 |   ScopedPtr<icu::Transliterator> transliterator;\n   39 |   transliterator.reset(icu::Transliterator::createInstance(\"Any-Latin; Latin-ASCII;\", UTRANS_FORWARD, errorcode));\n   40 | \n   41 |   if (!transliterator) return accented_str;\n   42 | \n   43 |   QByteArray accented_data = accented_str.toUtf8();\n   44 |   icu::UnicodeString ustring = icu::UnicodeString::fromUTF8(icu::StringPiece(accented_data.constData(), static_cast<int>(accented_data.size())));\n   45 |   transliterator->transliterate(ustring);\n   46 | \n   47 |   std::string unaccented_str;\n   48 |   ustring.toUTF8String(unaccented_str);\n   49 | \n   50 |   return QString::fromStdString(unaccented_str);\n   51 | \n   52 | }  // Transliterate"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"GstEngine::ValidOutput(output) calls GetOutputsList() which walks the entire GStreamer element-factory registry (gst_registry_get_feature_list + per-feature metadata string parsing and QString splits) every time it is called, just to test membership of a single output name. If called frequently (e.g. during settings validation / UI refresh) this is an avoidable full-registry scan and many QString allocations per call.","fix":"Cache the output list (or at least the set of valid names) and invalidate on registry change, or iterate factories with an early-return on first name match instead of building the full OutputDetailsList.","locations":[{"ref":"src/engine/gstengine.cpp:509-514","code":"  509 | bool GstEngine::ValidOutput(const QString &output) {\n  510 | \n  511 |   const OutputDetailsList output_details = GetOutputsList();\n  512 |   return std::any_of(output_details.begin(), output_details.end(), [output](const OutputDetails &output_detail) { return output_detail.name == output; });\n  513 | \n  514 | }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"FilterTreeAnd::accept and FilterTreeOr::accept capture the Song by value in their std::any_of lambdas ([song]). This filter tree is evaluated once per song while filtering the (potentially large) collection/playlist on every keystroke, and each node copies the Song into the lambda. Song is implicitly-shared so each copy is only a ref-count bump, but for deep trees over many songs this is needless churn; capturing by const reference avoids it.","fix":"Capture by reference: [&song](FilterTree *child){ ... } in both accept() implementations.","locations":[{"ref":"src/filterparser/filtertreeand.cpp:32-34","code":"   32 | bool FilterTreeAnd::accept(const Song &song) const {\n   33 |   return !std::any_of(children_.begin(), children_.end(), [song](FilterTree *child) { return !child->accept(song); });\n   34 | }"},{"ref":"src/filterparser/filtertreeor.cpp:36-38","code":"   36 | bool FilterTreeOr::accept(const Song &song) const {\n   37 |   return std::any_of(children_.begin(), children_.end(), [song](FilterTree *child) { return child->accept(song); });\n   38 | }"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"ASXParser::Load re-runs QString::fromUtf8(data) on the entire file contents on every iteration of the href-fixup loop (both in the loop body's match call and the condition re-evaluation), and mutates `data` with replace() inside the loop. For a playlist with many href attributes this is O(n*m) work converting the whole byte array repeatedly. Functionally correct but wasteful.","fix":"Convert to QString once before the loop (QString text = QString::fromUtf8(data)), operate on that string with the regex iterator, then write the fixed string back to the buffer once.","locations":[{"ref":"src/playlistparsers/asxparser.cpp:50-64","code":"   50 |   QByteArray data = device->readAll();\n   51 | \n   52 |   // Some playlists have unescaped & characters in URLs :(\n   53 |   static const QRegularExpression ex(u\"(href\\\\s*=\\\\s*\\\")([^\\\"]+)\\\"\"_s, QRegularExpression::CaseInsensitiveOption);\n   54 |   qint64 index = 0;\n   55 |   for (QRegularExpressionMatch re_match = ex.match(QString::fromUtf8(data), index); re_match.hasMatch(); re_match = ex.match(QString::fromUtf8(data), index)) {\n   56 |     index = re_match.capturedStart();\n   57 |     QString url = re_match.captured(2);\n   58 |     static const QRegularExpression regex_html_entities(u\"&(?!amp;|quot;|apos;|lt;|gt;)\"_s);\n   59 |     url.replace(regex_html_entities, u\"&amp;\"_s);\n   60 | \n   61 |     QByteArray replacement = QStringLiteral(\"%1%2\\\"\").arg(re_match.captured(1), url).toLocal8Bit();\n   62 |     data.replace(re_match.captured(0).toLocal8Bit(), replacement);\n   63 |     index += replacement.length();\n   64 |   }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","description":"Mpris2::CanPause() calls PlaybackStatus() twice in the same boolean expression (`PlaybackStatus() == \"Paused\" || PlaybackStatus() == \"Stopped\"`). Each call recomputes player_->GetState() and constructs a QString. Minor redundant work in a frequently queried D-Bus property.","fix":"Compute `const QString status = PlaybackStatus();` once and compare the local against both literals.","locations":[{"ref":"src/mpris2/mpris2.cpp:508-514","code":"  508 | bool Mpris2::CanPause() const {\n  509 | \n  510 |   const bool can_pause = (player_->GetCurrentItem() && player_->GetState() == EngineBase::State::Playing && !(player_->GetCurrentItem()->options() & PlaylistItem::Option::PauseDisabled)) || PlaybackStatus() == \"Paused\"_L1 || PlaybackStatus() == \"Stopped\"_L1;\n  511 |   qLog(Debug) << \"MPRIS2: Can pause\" << can_pause;\n  512 |   return can_pause;\n  513 | \n  514 | }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"UpdateTrackSliderPosition fetches item = GetCurrentItem() but never uses it (unlike UpdateTrackPosition which returns early on a null item). The fetched PlaylistItemPtr is unused dead code; the slider position is computed directly from the engine.","fix":"Remove the unused item variable, or add an early return on !item for consistency with UpdateTrackPosition.","locations":[{"ref":"src/core/mainwindow.cpp:1838-1848","code":" 1838 | void MainWindow::UpdateTrackSliderPosition() {\n 1839 | \n 1840 |   PlaylistItemPtr item(app_->player()->GetCurrentItem());\n 1841 | \n 1842 |   const int slider_position = std::floor(static_cast<float>(app_->player()->engine()->position_nanosec()) / kNsecPerMsec);\n 1843 |   const int slider_length = static_cast<int>(app_->player()->engine()->length_nanosec() / kNsecPerMsec);\n 1844 | \n 1845 |   // Update the slider\n 1846 |   ui_->track_slider->SetValue(slider_position, slider_length);\n 1847 | \n 1848 | }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"Song::FiletypeByDescription has two consecutive `if` checks against the identical string \"Module Music Format (MOD)\": the first returns FileType::MOD, the second returns FileType::S3M. The second comparison can never be true (same string, same case-insensitive flag), so S3M is unreachable here and any caller relying on description-based S3M detection will get MOD instead.","fix":"Change the second comparison string to the actual S3M description (e.g. \"Module Music Format (S3M)\") or remove the dead line if S3M is not detectable by description.","locations":[{"ref":"src/core/song.cpp:1438-1439","code":" 1438 |   if (text.compare(\"Module Music Format (MOD)\"_L1, Qt::CaseInsensitive) == 0) return FileType::MOD;\n 1439 |   if (text.compare(\"Module Music Format (MOD)\"_L1, Qt::CaseInsensitive) == 0) return FileType::S3M;"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","description":"c.toHsl() is called but its return value (a converted copy) is discarded; QColor::toHsl() does not mutate the receiver. The subsequent lightnessF() works on any color spec so the result is still correct, but the toHsl() call is a no-op / misleading.","fix":"Remove the dead c.toHsl(); line, or assign it (QColor c = QColor(rgbColor).toHsl();) if HSL conversion was intended.","locations":[{"ref":"src/core/stylehelper.cpp:428-429","code":"  428 |         c.toHsl();\n  429 |         float l = c.lightnessF();"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","description":"Comma-operator typo when setting the desired scaled size. 'cover_options.desired_scaled_size = ui_->covers->iconSize(), ui_->covers->iconSize();' parses as an assignment followed by a discarded second iconSize() expression (the comma operator). The second iconSize() call is dead, and the line clearly intended to set a second option (most likely device_pixel_ratio, as done elsewhere when ScaledImage is requested). As written no device pixel ratio is set for searcher thumbnails.","fix":"Replace the stray comma expression with the intended second assignment, e.g. set cover_options.device_pixel_ratio = devicePixelRatioF(); on its own line, and assign desired_scaled_size once.","locations":[{"ref":"src/covermanager/albumcoversearcher.cpp:219-221","code":"  219 |     AlbumCoverLoaderOptions cover_options(AlbumCoverLoaderOptions::Option::RawImageData | AlbumCoverLoaderOptions::Option::OriginalImage | AlbumCoverLoaderOptions::Option::ScaledImage | AlbumCoverLoaderOptions::Option::PadScaledImage);\n  220 |     cover_options.desired_scaled_size = ui_->covers->iconSize(), ui_->covers->iconSize();\n  221 |     quint64 new_id = albumcover_loader_->LoadImageAsync(cover_options, false, result.image_url, QUrl(), false);"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In TagReaderTagLib::Read() a local `QString lyrics;` is declared and at the end `if (!lyrics.isEmpty()) song->set_lyrics(lyrics);` is executed, but `lyrics` is never assigned anywhere in this function (lyrics are set directly via song->set_lyrics(...) inside the Parse* helpers). The local and the trailing conditional are dead code and the comment intent is misleading.","fix":"Remove the unused `lyrics` local and the `if (!lyrics.isEmpty()) song->set_lyrics(lyrics);` statement.","locations":[{"ref":"src/tagreader/tagreadertaglib.cpp:367-367","code":"  367 |   QString lyrics;"},{"ref":"src/tagreader/tagreadertaglib.cpp:496-496","code":"  496 |   if (!lyrics.isEmpty()) song->set_lyrics(lyrics);"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"CDDASongLoader has a member `bool whatever_` that is initialized in the constructor initializer list but never read or written anywhere else. It is dead state.","fix":"Remove the whatever_ member and its initializer.","locations":[{"ref":"src/device/cddasongloader.h:86","code":"   86 |   bool whatever_;"},{"ref":"src/device/cddasongloader.cpp:60","code":"   60 |       whatever_(false) {"}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"DiscordRPC::ClearPresence() begins with `if (state_ != State::Connected) return;` and then builds and sends a frame via SendFrame(), but SendFrame() itself already short-circuits with the identical `if (state_ != State::Connected ...) return;` check. The early guard in ClearPresence is redundant.","fix":"Either drop the redundant guard in ClearPresence or rely on it solely; no behavioural change needed, this is cleanup only.","locations":[{"ref":"src/discord/discordrpc.cpp:495-519","code":"  495 | void DiscordRPC::ClearPresence() {\n  496 | \n  497 |   if (state_ != State::Connected) {\n  498 |     return;\n  499 |   }\n  500 | \n  501 |   // To clear presence, send SET_ACTIVITY with null activity\n  502 |   QJsonObject obj;\n  503 |   obj[\"cmd\"_L1] = \"SET_ACTIVITY\"_L1;\n  504 |   obj[\"nonce\"_L1] = QString::number(nonce_++);\n  505 | \n  506 |   QJsonObject args;\n  507 | #ifdef Q_OS_WIN32\n  508 |   args[\"pid\"_L1] = static_cast<qint64>(GetCurrentProcessId());\n  509 | #else\n  510 |   args[\"pid\"_L1] = static_cast<qint64>(getpid());\n  511 | #endif\n  512 |   // Don't add activity field or set it to null to clear presence\n  513 |   args[\"activity\"_L1] = QJsonValue::Null;\n  514 | \n  515 |   obj[\"args\"_L1] = args;\n  516 | \n  517 |   const QJsonDocument doc(obj);\n  518 |   const QByteArray data = doc.toJson(QJsonDocument::Compact);\n  519 |   SendFrame(data);"},{"ref":"src/discord/discordrpc.cpp:257-261","code":"  257 | void DiscordRPC::SendFrame(const QByteArray &data) {\n  258 | \n  259 |   if (state_ != State::Connected || socket_->state() != QLocalSocket::ConnectedState) {\n  260 |     return;\n  261 |   }"}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"PlaylistListModel declares the member folders_by_path_ (QMap<QString, QStandardItem*>) but it is never read or written anywhere; folder lookups are done by walking the tree in FolderByPath(). The member is dead and the comment in FolderByPath even notes that maintaining such a map is hard, confirming it is unused.","fix":"Remove the unused folders_by_path_ member.","locations":[{"ref":"src/playlist/playlistlistmodel.h:104","code":"  104 |   QMap<QString, QStandardItem*> folders_by_path_;"},{"ref":"src/playlist/playlistlistmodel.cpp:157-192","code":"  157 | QStandardItem *PlaylistListModel::FolderByPath(const QString &path) {\n  158 | \n  159 |   if (path.isEmpty()) {\n  160 |     return invisibleRootItem();\n  161 |   }\n  162 | \n  163 |   // Walk down from the root until we find the target folder.  This is pretty\n  164 |   // inefficient but maintaining a path -> item map is difficult.\n  165 |   QStandardItem *parent = invisibleRootItem();\n  166 | \n  167 |   const QStringList parts = path.split(u'/', Qt::SkipEmptyParts);\n  168 |   for (const QString &part : parts) {\n  169 |     QStandardItem *matching_child = nullptr;\n  170 | \n  171 |     const int child_count = parent->rowCount();\n  172 |     for (int i = 0; i < child_count; ++i) {\n  173 |       if (parent->child(i)->data(Qt::DisplayRole).toString() == part) {\n  174 |         matching_child = parent->child(i);\n  175 |         break;\n  176 |       }\n  177 |     }\n  178 | \n  179 |     // Does this folder exist already?\n  180 |     if (matching_child) {\n  181 |       parent = matching_child;\n  182 |     }\n  183 |     else {\n  184 |       QStandardItem *child = NewFolder(part);\n  185 |       parent->appendRow(child);\n  186 |       parent = child;\n  187 |     }\n  188 |   }\n  189 | \n  190 |   return parent;\n  191 | \n  192 | }"}]},{"id":"DEAD_9","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In RadioBrowserService::DnsLookupFinished the resolved DNS records are copied into a local 'records' variable that is never used afterwards (the code immediately deletes the QDnsLookup and falls back to a hardcoded hostname list, as the adjacent comment explains). The copy of hostAddressRecords() is pure dead work.","fix":"Remove the unused 'const auto records = dns_lookup_->hostAddressRecords();' line (line 127), since the records are intentionally not used.","locations":[{"ref":"src/radios/radiobrowserservice.cpp:126-134","code":"  126 |   // Use first resolved hostname\n  127 |   const auto records = dns_lookup_->hostAddressRecords();\n  128 |   dns_lookup_->deleteLater();\n  129 |   dns_lookup_ = nullptr;\n  130 | \n  131 |   // Try fallback servers since we can't easily do reverse DNS in Qt\n  132 |   // The DNS lookup confirms the service exists, now use a known hostname\n  133 |   fallback_index_ = 0;\n  134 |   TestServer(kFallbackServers.at(fallback_index_));"}]},{"id":"DEAD_10","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"Helper function qt_RectToHRGN() is defined but never used; the surrounding code uses QRegion::toHRGN() directly (line 44). The forward declaration plus definition are dead code.","fix":"Remove the unused qt_RectToHRGN declaration and definition.","locations":[{"ref":"src/utilities/winutils.cpp:32-35","code":"   32 | HRGN qt_RectToHRGN(const QRect &rc);\n   33 | HRGN qt_RectToHRGN(const QRect &rc) {\n   34 |   return CreateRectRgn(rc.left(), rc.top(), rc.right() + 1, rc.bottom() + 1);\n   35 | }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Song::CompareSongsName is declared to return int (song.h:519) and named like a three-way comparator, but its body returns a boolean less-than predicate (`localeAwareCompare(...) < 0`). It is only ever used as a std::sort comparator (song.cpp:1519), for which the boolean semantics are correct, so behavior is fine; the int return type and comparator-style name are misleading.","fix":"Change the return type to bool and/or rename to reflect that it is a less-than predicate, to avoid future misuse as a 3-way comparison.","locations":[{"ref":"src/core/song.cpp:1513-1519","code":" 1513 | int Song::CompareSongsName(const Song &song1, const Song &song2) {\n 1514 |   return song1.PrettyTitleWithArtist().localeAwareCompare(song2.PrettyTitleWithArtist()) < 0;\n 1515 | }\n 1516 | \n 1517 | void Song::SortSongsListAlphabetically(SongList *songs) {\n 1518 |   Q_ASSERT(songs);\n 1519 |   std::sort(songs->begin(), songs->end(), CompareSongsName);"},{"ref":"src/core/song.h:519","code":"  519 |   static int CompareSongsName(const Song &song1, const Song &song2);"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"QobuzFavoriteRequest appends the reply to replies_ a second time after CreateRequest() already added it. QobuzBaseRequest::CreateRequest (qobuzbaserequest.cpp:104-105) does 'replies_ << reply;' for every request it creates, but AddFavoritesRequest/RemoveFavoritesRequest then do 'replies_ << reply;' again, so the same QNetworkReply pointer is stored twice in replies_. It is harmless today because the reply handlers use removeAll() (which removes both copies), but it is inconsistent with every other Qobuz request path and would cause double-processing or double-abort if the list semantics or handler code change.","fix":"Remove the redundant 'replies_ << reply;' lines in AddFavoritesRequest and RemoveFavoritesRequest since CreateRequest already registers the reply.","locations":[{"ref":"src/qobuz/qobuzfavoriterequest.cpp:126-128","code":"  126 |   QNetworkReply *reply = CreateRequest(u\"favorite/create\"_s, params);\n  127 |   QObject::connect(reply, &QNetworkReply::finished, this, [this, reply, type, songs]() { AddFavoritesReply(reply, type, songs); });\n  128 |   replies_ << reply;"},{"ref":"src/qobuz/qobuzfavoriterequest.cpp:217-219","code":"  217 |   QNetworkReply *reply = CreateRequest(u\"favorite/delete\"_s, params);\n  218 |   QObject::connect(reply, &QNetworkReply::finished, this, [this, reply, type, songs]() { RemoveFavoritesReply(reply, type, songs); });\n  219 |   replies_ << reply;"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"negligible","description":"GetProgress() divides count by total and casts the float result to int with no guard against total == 0. When total is 0 this is a division by zero on a float (producing inf/nan) and the subsequent static_cast<int> is undefined behavior (benign on mainstream platforms, yielding 0). This is reachable through the missing albums_total_/songs_total_ assignments noted separately, and also if an API returns 0 total with non-empty items.","fix":"Return 0 (or 100) early when total <= 0, e.g. 'if (total <= 0) return 0;' at the start of GetProgress in each service's request class.","locations":[{"ref":"src/qobuz/qobuzrequest.cpp:1432-1436","code":" 1432 | int QobuzRequest::GetProgress(const int count, const int total) {\n 1433 | \n 1434 |   return static_cast<int>((static_cast<float>(count) / static_cast<float>(total)) * 100.0F);\n 1435 | \n 1436 | }"},{"ref":"src/tidal/tidalrequest.cpp:1317-1321","code":" 1317 | int TidalRequest::GetProgress(const int count, const int total) {\n 1318 | \n 1319 |   return static_cast<int>((static_cast<float>(count) / static_cast<float>(total)) * 100.0F);\n 1320 | \n 1321 | }"},{"ref":"src/spotify/spotifyrequest.cpp:1381-1385","code":" 1381 | int SpotifyRequest::GetProgress(const int count, const int total) {\n 1382 | \n 1383 |   return static_cast<int>((static_cast<float>(count) / static_cast<float>(total)) * 100.0F);\n 1384 | \n 1385 | }"}]}]</script>

<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
