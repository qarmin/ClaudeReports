<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","description":"At lines 723 and 3864, `DC_RASTER_TO_BLOCK_P.iter().position(|&b| b == blk).unwrap()` is called with `blk in 0..16`.\nWhile this particular lookup cannot panic in practice (the array is a permutation of 0..15), the `unwrap()` hides\nthe invariant and creates fragility. If the array were ever inadvertently modified or `blk` were to be computed\nincorrectly, the panic would be difficult to diagnose.","fix":"Replace with a precomputed inverse lookup table. The inverse of `[0,1,4,5,2,3,6,7,8,9,12,13,10,11,14,15]` is\n`[0,1,4,5,2,3,7,8,9,10,12,13,3,11,14,15]` — but this needs careful verification. Alternatively, add an assertion\nand replace `.unwrap()` with `.expect(\"DC raster index not found\")` with a descriptive message.","locations":[{"ref":"src/decode_cabac.rs:723","code":"  723 |                         let dc_idx = DC_RASTER_TO_BLOCK_P.iter().position(|&b| b == blk).unwrap();","lines":1},{"ref":"src/decode_cabac.rs:3864","code":" 3864 |                 let dc_idx = DC_RASTER_TO_BLOCK.iter().position(|&b| b == blk).unwrap();","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"`pop_lowest` (OrderedDecoder) calls `.unwrap()` on the result of `min_by_key`. The\nbuffer is never empty when `pop_lowest` is called (it is only called from the\n`while self.buffer.len() > self.max_depth` loop, which requires the buffer to be\nnon-empty), but the contract is implicit and fragile. If a future refactor calls\n`pop_lowest` on an empty buffer, it panics.","fix":"Replace `.unwrap()` with `?` propagation or an explicit guard returning `Option<Frame>`.","locations":[{"ref":"src/decoder.rs:1246-1252","code":" 1246 |         let idx = self\n 1247 |             .buffer\n 1248 |             .iter()\n 1249 |             .enumerate()\n 1250 |             .min_by_key(|(_, (g, f))| (*g, f.pic_order_cnt))\n 1251 |             .map(|(i, _)| i)\n 1252 |             .unwrap();","lines":7}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`refill2` computes `let i = self.low.trailing_zeros().wrapping_sub(CABAC_BITS)`.\n`CABAC_BITS = 16`. If `self.low` is non-zero but its trailing_zeros count is less than 16\n(e.g. trailing_zeros = 0), then `trailing_zeros().wrapping_sub(16)` wraps around to\na large u32 value like `0xFFFF_FFF0`. This large shift is then used in\n`self.low.wrapping_add(x << i)`, where `x << i` with i >= 32 is always 0 in Rust\n(shift overflow returns 0 for u32), silently corrupting the decode state instead of\npanicking or producing correct behavior.\n\nThe invariant for calling `refill2` is that the low register has exactly `CABAC_BITS`\ntrailing zeros, but this is not enforced and could be violated by unusual bitstreams or\nencoder errors.","fix":"Replace `wrapping_sub` with a saturating or checked subtraction, or add an assertion:\n`debug_assert!(self.low.trailing_zeros() >= CABAC_BITS)`. If the invariant cannot be\nguaranteed, use `let i = self.low.trailing_zeros().saturating_sub(CABAC_BITS)`.","locations":[{"ref":"src/cabac.rs:253-272","code":"  253 |     #[inline]\n  254 |     fn refill2(&mut self) {\n  255 |         // Count trailing zeros to determine shift\n  256 |         let i = self.low.trailing_zeros().wrapping_sub(CABAC_BITS);\n  257 | \n  258 |         let b0 = if self.pos < self.data.len() {\n  259 |             self.data[self.pos]\n  260 |         } else {\n  261 |             0\n  262 |         };\n  263 |         let b1 = if self.pos + 1 < self.data.len() {\n  264 |             self.data[self.pos + 1]\n  265 |         } else {\n  266 |             0\n  267 |         };\n  268 |         let x = (b0 as u32) << 9 | (b1 as u32) << 1;\n  269 |         let x = x.wrapping_sub(CABAC_MASK);\n  270 |         self.low = self.low.wrapping_add(x << i);\n  271 |         self.pos += 2;\n  272 |     }","lines":20}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In `derive_temporal_direct_blk`, the computed L0/L1 motion vectors are cast directly to\n`i16` without clamping (lines 591-594). The intermediate value\n`(scale * col_mv[0] as i32 + 128) >> 8` can exceed the i16 range: `scale` is clamped to\n[-1024, 1023] and `col_mv[0]` is `i16` (up to 32767), so the product reaches ~33.5M.\nAfter the right shift by 8, the result is ~130,939, which overflows i16 (max 32767).\nThe cast `as i16` silently truncates, producing a wrong motion vector. Similarly for the\nY component and for `mx_l1 = mx_l0 - col_mv[0]` (line 593) which can underflow.","fix":"Clamp the scaled result to a valid MV range before casting to i16. Per H.264 spec the MV\ncomponents should be in the range used by the encoder. A safe bound is [-2048, 2047] in\nquarter-pel units (spec 7.4.5.1), but practically the values after rounding should already\nfit. Apply an explicit clamp:\n```rust\nlet mx_l0 = ((scale * col_mv[0] as i32 + 128) >> 8).clamp(i16::MIN as i32, i16::MAX as i32) as i16;\nlet my_l0 = ((scale * col_mv[1] as i32 + 128) >> 8).clamp(i16::MIN as i32, i16::MAX as i32) as i16;\nlet mx_l1 = (mx_l0 as i32 - col_mv[0] as i32).clamp(i16::MIN as i32, i16::MAX as i32) as i16;\nlet my_l1 = (my_l0 as i32 - col_mv[1] as i32).clamp(i16::MIN as i32, i16::MAX as i32) as i16;\n```","locations":[{"ref":"src/mv_pred.rs:591-594","code":"  591 |         let mx_l0 = ((scale * col_mv[0] as i32 + 128) >> 8) as i16;\n  592 |         let my_l0 = ((scale * col_mv[1] as i32 + 128) >> 8) as i16;\n  593 |         let mx_l1 = mx_l0 - col_mv[0];\n  594 |         let my_l1 = my_l0 - col_mv[1];","lines":4}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"inverse_hadamard_4x4 uses plain i32 addition without wrapping arithmetic, unlike inverse_dct_4x4 and inverse_dct_8x8 which explicitly use std::num::Wrapping. A malformed stream could supply DC coefficients large enough that the two-pass butterfly (4 adds per stage, two stages) overflows an i32, causing a panic in debug builds or silent UB in release builds. The IDCT functions explicitly comment 'Use wrapping arithmetic — malformed coefficients can cause overflow' but Hadamard functions do not.","fix":"Apply wrapping arithmetic as done in inverse_dct_4x4: use Wrapping<i32> for all additions, or call .wrapping_add() explicitly. Example: tmp[i*4] = a.wrapping_add(b).wrapping_add(c).wrapping_add(d);","locations":[{"ref":"src/residual.rs:23-49","code":"   23 | pub fn inverse_hadamard_4x4(dc: &mut [i32; 16]) {\n   24 |     let mut tmp = [0i32; 16];\n   25 | \n   26 |     // Horizontal transform\n   27 |     for i in 0..4 {\n   28 |         let a = dc[i * 4];\n   29 |         let b = dc[i * 4 + 1];\n   30 |         let c = dc[i * 4 + 2];\n   31 |         let d = dc[i * 4 + 3];\n   32 |         tmp[i * 4] = a + b + c + d;\n   33 |         tmp[i * 4 + 1] = a + b - c - d;\n   34 |         tmp[i * 4 + 2] = a - b - c + d;\n   35 |         tmp[i * 4 + 3] = a - b + c - d;\n   36 |     }\n   37 | \n   38 |     // Vertical transform\n   39 |     for j in 0..4 {\n   40 |         let a = tmp[j];\n   41 |         let b = tmp[4 + j];\n   42 |         let c = tmp[8 + j];\n   43 |         let d = tmp[12 + j];\n   44 |         dc[j] = a + b + c + d;\n   45 |         dc[4 + j] = a + b - c - d;\n   46 |         dc[8 + j] = a - b - c + d;\n   47 |         dc[12 + j] = a - b + c - d;\n   48 |     }\n   49 | }","lines":27}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"inverse_hadamard_2x2 has the same issue: it uses plain i32 arithmetic with no wrapping protection. An extreme malformed coefficient (close to i32::MAX/4) in any of the four entries would overflow.","fix":"Use wrapping arithmetic: let a = dc[0].wrapping_add(dc[1]).wrapping_add(dc[2]).wrapping_add(dc[3]); and similarly for b, c, d.","locations":[{"ref":"src/residual.rs:52-61","code":"   52 | pub fn inverse_hadamard_2x2(dc: &mut [i32; 4]) {\n   53 |     let a = dc[0] + dc[1] + dc[2] + dc[3];\n   54 |     let b = dc[0] - dc[1] + dc[2] - dc[3];\n   55 |     let c = dc[0] + dc[1] - dc[2] - dc[3];\n   56 |     let d = dc[0] - dc[1] - dc[2] + dc[3];\n   57 |     dc[0] = a;\n   58 |     dc[1] = b;\n   59 |     dc[2] = c;\n   60 |     dc[3] = d;\n   61 | }","lines":10}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In `bitstream.rs`, `more_rbsp_data` computes `let data_bits_in_byte = 7 - stop_bit as u8`\nwhere `stop_bit` is the result of `byte.trailing_zeros()` (a u32). For a zero byte,\n`trailing_zeros()` returns 8, and `7u8 - 8u8` would underflow to 255, which could\nproduce a false-positive \"more data\" result. The surrounding loop already ensures\n`last_nz - 1` points to a non-zero byte, so `byte` will never be 0 in practice.\nHowever, the implicit assumption is fragile and not documented.","fix":"Add an assertion or cast safely:\n`let stop_bit = byte.trailing_zeros();` already documented; add\n`debug_assert_ne!(byte, 0, \"more_rbsp_data: last non-zero byte is zero?\");`\nbefore the computation, or use saturating arithmetic.","locations":[{"ref":"src/bitstream.rs:151-154","code":"  151 |         let byte = self.data[self.byte_offset];\n  152 |         let stop_bit = byte.trailing_zeros();\n  153 |         let data_bits_in_byte = 7 - stop_bit as u8;\n  154 |         self.bit_offset < data_bits_in_byte","lines":4}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In `decode_residual_cabac_field`, when the significance scan completes without finding\na `last_significant_coeff_flag=1`, the code unconditionally pushes `max_coeff - 1`\nto `sig_positions` (line 531). However, if the loop found no significant coefficients at\nall (no `sig=1` bits), then `sig_positions` is empty and the last position is appended\nanyway, then `coeff_count = 1` and the phase 2 loop decodes one coefficient level for\nposition `max_coeff - 1`. Per spec 9.3.3.1.3, if the loop completes without seeing the\nlast flag, the last significant position IS `max_coeff - 1`. But this means that a\ncoefficient that didn't appear in the significance map (all zeros up to pos max_coeff-2)\nstill gets its level decoded unnecessarily. The subsequent `if sig_positions.is_empty()`\ncheck on line 534 is dead — `sig_positions` always contains at least one element after\nline 531, so the `return (vec![], 0)` branch is unreachable.","fix":"Move the `if sig_positions.is_empty()` check before the unconditional push:\n```rust\nif !found_last {\n    sig_positions.push(max_coeff - 1);\n}\nif sig_positions.is_empty() {\n    return (vec![], 0);\n}\n```\nThis makes the early-return reachable and prevents decoding a spurious level for\nall-zero blocks where the encoder happened to not encode any significant flags.","locations":[{"ref":"src/cabac.rs:506-536","code":"  506 |         let mut found_last = false;\n  507 | \n  508 |         for pos in 0..max_coeff - 1 {\n  509 |             // For 8x8 blocks, use per-position context offsets\n  510 |             let sig_ctx = if is_8x8 {\n  511 |                 sig_base + SIGNIFICANT_COEFF_FLAG_OFFSET_8X8[pos] as usize\n  512 |             } else {\n  513 |                 sig_base + pos\n  514 |             };\n  515 |             let sig = self.get_cabac(&mut state[sig_ctx]);\n  516 |             if sig != 0 {\n  517 |                 sig_positions.push(pos);\n  518 |                 let last_ctx = if is_8x8 {\n  519 |                     last_base + LAST_COEFF_FLAG_OFFSET_8X8[pos] as usize\n  520 |                 } else {\n  521 |                     last_base + pos\n  522 |                 };\n  523 |                 let last = self.get_cabac(&mut state[last_ctx]);\n  524 |                 if last != 0 {\n  525 |                     found_last = true;\n  526 |                     break;\n  527 |                 }\n  528 |             }\n  529 |         }\n  530 |         if !found_last {\n  531 |             sig_positions.push(max_coeff - 1);\n  532 |         }\n  533 | \n  534 |         if sig_positions.is_empty() {\n  535 |             return (vec![], 0);\n  536 |         }","lines":31}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"MMCO op=1 computes `pic_num_to_remove = mmco_curr_pic_num - (param & 0xFFFF) as i32 - 1`\nand then casts the (potentially negative) result to `u32` before passing it to\n`mark_short_term_unused`. If the subtraction underflows (malformed stream with a large\n`difference_of_pic_nums_minus1`), the cast wraps to a large positive u32, causing the\nDPB to search for a non-existent frame_num rather than returning an error. The same\nissue exists for op=3.","fix":"Check that `pic_num_to_remove >= 0` before the cast:\n  if pic_num_to_remove < 0 { /* ignore or return error */ } else {\n      self.dpb.mark_short_term_unused(pic_num_to_remove as u32);\n  }","locations":[{"ref":"src/decoder.rs:321-334","code":"  321 |                 1 => {\n  322 |                     let pic_num_to_remove =\n  323 |                         mmco_curr_pic_num - ((param & 0xFFFF) as i32 + 1);\n  324 |                     self.dpb.mark_short_term_unused(pic_num_to_remove as u32);\n  325 |                 }\n  326 |                 2 => {\n  327 |                     self.dpb.mark_long_term_unused(param);\n  328 |                 }\n  329 |                 3 => {\n  330 |                     let abs_diff_minus1 = param & 0xFFFF;\n  331 |                     let long_term_frame_idx = param >> 16;\n  332 |                     let pic_num = mmco_curr_pic_num - (abs_diff_minus1 as i32 + 1);\n  333 |                     self.dpb\n  334 |                         .assign_long_term(pic_num as u32, long_term_frame_idx);","lines":14}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`apply_ref_list_modification` for idc=2 (long-term ref reordering) matches the\nlong-term picture by `p.frame_num == long_term_pic_num` (line 324). The spec requires\nmatching by `long_term_pic_num` which for frame pictures equals `long_term_frame_idx`,\nnot `frame_num`. `DecodedPicture` does not store `long_term_frame_idx`, so the code\napproximates by using `frame_num`. For a stream where the encoder assigns\n`long_term_frame_idx` independently of `frame_num` (e.g. MMCO op=3 or op=6 with an\narbitrary index), this will fail to find the correct entry and silently leave the\nreference list unmodified, causing wrong MC for subsequent B/P frames.","fix":"Add a `long_term_frame_idx: Option<u32>` field to `DecodedPicture` and match on it in the idc=2 branch.","locations":[{"ref":"src/dpb.rs:315-344","code":"  315 |             if idc == 2 {\n  316 |                 // Long-term ref reordering (spec 8.2.4.3.2)\n  317 |                 let long_term_pic_num = val; // long_term_pic_num directly\n  318 |                 if let Some(found_pos) = ref_list.iter().position(|p| {\n  319 |                     // Match by frame_num used as long_term_frame_idx proxy\n  320 |                     // In practice, the DPB entry's long_term_frame_idx is stored\n  321 |                     // but DecodedPicture doesn't carry it. Match by position in list.\n  322 |                     // Actually, long_term_pic_num == long_term_frame_idx for frames.\n  323 |                     // We find LT refs appended at the end of the list.\n  324 |                     p.frame_num == long_term_pic_num\n  325 |                 }) {\n  326 |                     let pic = ref_list[found_pos].clone();\n  327 |                     ref_list.push(ref_list.last().unwrap().clone());\n  328 |                     let end = ref_list.len() - 1;\n  329 |                     for c in (ref_idx_lx + 1..=end).rev() {\n  330 |                         ref_list[c] = ref_list[c - 1].clone();\n  331 |                     }\n  332 |                     ref_list[ref_idx_lx] = pic.clone();\n  333 |                     // Remove duplicate: entries after ref_idx_lx with same pic\n  334 |                     let mut n = ref_idx_lx + 1;\n  335 |                     for c in (ref_idx_lx + 1)..ref_list.len() {\n  336 |                         if !Rc::ptr_eq(&ref_list[c], &pic) {\n  337 |                             ref_list[n] = ref_list[c].clone();\n  338 |                             n += 1;\n  339 |                         }\n  340 |                     }\n  341 |                     ref_list.truncate(num_active);\n  342 |                 }\n  343 |                 ref_idx_lx += 1;\n  344 |                 continue;","lines":30}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`lps_range_lookup` computes the index as `2 * (range & 0xC0) as usize + state as usize`.\nThe `state` parameter is a `u8`, so it could be 0-255, but LPS_RANGE only has 512 entries.\nThe maximum safe `(range & 0xC0)` value is 192, so 2*192 = 384. Adding state=255 gives index\n639, which is out of bounds and will panic at runtime.\n\nIn practice, states produced by `init_cabac_states` are clamped to 0-126, and\n`MLPS_STATE` transitions also keep states in [0, 127], so valid callers won't exceed state=127\n(max index = 384+127 = 511, just at the boundary). However, there is no type-level or\nassertion-based enforcement of this constraint, and a corrupt state byte (e.g. from\n`get_cabac` writing MLPS_STATE[128+s] when s is unexpectedly large) could trigger a\npanic.","fix":"Add a debug_assert or saturate the state value: change the index computation to\n`2 * (range & 0xC0) as usize + (state & 0x7F) as usize`  (masking to 127), or add\n`debug_assert!(state <= 127)` before the table lookup.","locations":[{"ref":"src/cabac.rs:164-166","code":"  164 | fn lps_range_lookup(range: u32, state: u8) -> u32 {\n  165 |     LPS_RANGE[2 * (range & 0xC0) as usize + state as usize] as u32\n  166 | }","lines":3}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`decode_chroma_pred_mode` reads from context 67 for both the horizontal and vertical\nchecks (lines 801 and 804). The two consecutive `if self.get_cabac(&mut state[67]) == 0`\ncalls both read from the same context 67. Per spec Table 9-34 (and the reference\nimplementations), the contexts for the 2nd and 3rd bins of chroma_pred_mode should both\nbe index 67 — BUT each call advances the arithmetic coder state and updates `state[67]`\nin place, so the second read correctly reads the updated state. This is actually correct\nbehavior but the variable `ctx` computed on lines 788-793 is created and then immediately\ndiscarded with `ctx - 64` yielding `ctx_offset`, which is used only for the first read\n(`state[64 + ctx_offset]`). The intermediate variable `ctx` (set on line 788-792) serves\nno purpose beyond computing `ctx_offset`, making the code needlessly confusing.","fix":"Remove the `ctx` variable entirely and compute directly:\n```rust\nlet ctx_offset = (left_mode != 0) as usize + (top_mode != 0) as usize;\nif self.get_cabac(&mut state[64 + ctx_offset]) == 0 { return 0; }\n```\nThis eliminates the redundant `ctx` variable and makes the intent clearer.","locations":[{"ref":"src/cabac.rs:788-808","code":"  788 |         let mut ctx = 64usize;\n  789 |         if left_mode != 0 {\n  790 |             ctx += 1;\n  791 |         }\n  792 |         if top_mode != 0 {\n  793 |             ctx += 1;\n  794 |         }\n  795 |         // Note: ctx is computed from neighbor modes, not the state index offset\n  796 |         let ctx_offset = ctx - 64;\n  797 | \n  798 |         if self.get_cabac(&mut state[64 + ctx_offset]) == 0 {\n  799 |             return 0; // DC\n  800 |         }\n  801 |         if self.get_cabac(&mut state[67]) == 0 {\n  802 |             return 1; // Horizontal\n  803 |         }\n  804 |         if self.get_cabac(&mut state[67]) == 0 {\n  805 |             return 2; // Vertical\n  806 |         }\n  807 |         3 // Plane\n  808 |     }","lines":21}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`decode_ref_idx` uses context 58 for the second decoded bit (ref_idx=1) and context 59\nfor all subsequent bits (ref_idx >= 2). Per H.264 spec Table 9-34 (section 9.3.3.1.1.6),\nthe reference index uses contexts 54..57 for the first four bins and context 57 for all\nsubsequent bins. The code uses ctx=58 and ctx=59 (i.e. base 54 + 4 and 54 + 5), which\nare off by one from the spec (should be 54+3=57 and 54+3=57). This would cause incorrect\nCABAC state updates for streams with ref_idx >= 1, potentially producing bitstream errors.","fix":"Per spec 9.3.3.1.1.6, for ref_idx >= 1 all remaining bins use ctxIdx = 54 + 3 = 57.\nChange:\n  ctx = 58;  // should be 57\n  ctx = 59;  // should stay at 57\nto:\n  ctx = 57;\n  // ctx stays at 57 for all subsequent bins","locations":[{"ref":"src/cabac.rs:859-867","code":"  859 |         let mut ref_idx = 1i8;\n  860 |         ctx = 58; // context 4+ (54 + 4)\n  861 |         while self.get_cabac(&mut state[ctx]) != 0 {\n  862 |             ref_idx += 1;\n  863 |             ctx = 59; // stay at context 5 (54 + 5) for subsequent\n  864 |             if ref_idx >= 32 {\n  865 |                 break;\n  866 |             }\n  867 |         }","lines":9}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`is_new_picture` is determined solely by `first_mb == 0` (line 205). This is wrong for\nMBAFF streams: in MBAFF, `first_mb_in_slice` is a MB-pair address, so\n`first_mb_in_slice == 0` always means the first MB pair (MB indices 0 and 1). A\ncontinuation slice in MBAFF starting at pair address 1 has `first_mb == 1`, not 0, and\nwill be correctly detected as a continuation. However, a single-frame MBAFF I-stream\nwhere all rows fit in one slice always has `first_mb == 0`, which is also correct. The\nreal issue is that the new-picture detection relies purely on `first_mb == 0` without\nverifying that the frame_num/field/POC match the pending picture — a bitstream that\nsends a new picture starting with `first_mb > 0` (e.g. a slice-group stream) would be\nsilently appended to the wrong pending picture.","fix":"Also compare `frame_num` (and `field_pic_flag`/`bottom_field_flag`) from the pending state against the new NAL's header to detect picture boundaries even when `first_mb > 0`.","locations":[{"ref":"src/decoder.rs:198-205","code":"  198 |                 // Peek at first_mb_in_slice to detect new vs continuation slice\n  199 |                 let mut peek = BitstreamReader::new(&nal.rbsp);\n  200 |                 let first_mb = peek.read_ue().unwrap_or(0);\n  201 | \n  202 |                 // Check if this is a new picture: first_mb==0 means first\n  203 |                 // slice of a new picture. Continuation slices (first_mb > 0)\n  204 |                 // belong to the same picture even for IDR NALs.\n  205 |                 let is_new_picture = first_mb == 0;","lines":8}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`finalize_pending` calls `self.dpb.clear()` for IDR NALs before MMCO operations are\nprocessed (line 299), then processes MMCO ops including op=5 (`clear_all_refs`) which\ncalls `clear_all_refs` again (line 340). This double-clear is harmless, but the MMCO\nops run on an already-empty DPB. More critically, if an IDR slice has both\n`long_term_reference_flag=true` (handled at reference construction, line 303-304) and\nMMCO op=6, both the IDR long-term path and op=6 are applied to the current picture.\nThe spec forbids this combination (IDR pictures use `long_term_reference_flag`, not\nMMCO), but the decoder does not validate it and silently double-processes.","fix":"Skip MMCO processing entirely for IDR NALs, since spec 7.4.3 says MMCO is only for non-IDR slices.","locations":[{"ref":"src/decoder.rs:298-348","code":"  298 |         if ps.nal_unit_type == NalUnitType::SliceIdr {\n  299 |             self.dpb.clear();\n  300 |         }\n  301 | \n  302 |         let reference = if ps.nal_ref_idc > 0 {\n  303 |             if ps.nal_unit_type == NalUnitType::SliceIdr && ps.long_term_reference_flag {\n  304 |                 ReferenceStatus::LongTerm(0) // IDR with long_term_reference_flag → LT idx 0\n  305 |             } else {\n  306 |                 ReferenceStatus::ShortTerm\n  307 |             }\n  308 |         } else {\n  309 |             ReferenceStatus::Unused\n  310 |         };\n  311 | \n  312 |         // For MMCO, use CurrPicNum (= 2*frame_num+1 for field pictures)\n  313 |         let mmco_curr_pic_num = if ps.field_pic_flag {\n  314 |             (ps.frame_num * 2 + 1) as i32\n  315 |         } else {\n  316 |             ps.frame_num as i32\n  317 |         };\n  318 |         let mut has_mmco5 = false;\n  319 |         for &(op, param) in &ps.mmco_ops {\n  320 |             match op {\n  321 |                 1 => {\n  322 |                     let pic_num_to_remove =\n  323 |                         mmco_curr_pic_num - ((param & 0xFFFF) as i32 + 1);\n  324 |                     self.dpb.mark_short_term_unused(pic_num_to_remove as u32);\n  325 |                 }\n  326 |                 2 => {\n  327 |                     self.dpb.mark_long_term_unused(param);\n  328 |                 }\n  329 |                 3 => {\n  330 |                     let abs_diff_minus1 = param & 0xFFFF;\n  331 |                     let long_term_frame_idx = param >> 16;\n  332 |                     let pic_num = mmco_curr_pic_num - (abs_diff_minus1 as i32 + 1);\n  333 |                     self.dpb\n  334 |                         .assign_long_term(pic_num as u32, long_term_frame_idx);\n  335 |                 }\n  336 |                 4 => {\n  337 |                     self.dpb.set_max_long_term_frame_idx(param);\n  338 |                 }\n  339 |                 5 => {\n  340 |                     self.dpb.clear_all_refs();\n  341 |                     has_mmco5 = true;\n  342 |                 }\n  343 |                 6 => {\n  344 |                     // Will be applied after insert (current pic must be in DPB first)\n  345 |                 }\n  346 |                 _ => {}\n  347 |             }\n  348 |         }","lines":51}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`finalize_pending` stores the already-cropped pixel data in `DecodedPicture`\n(`y/u/v` are cloned from `ps.frame` before the crop is applied), but the crop\nhappens later in the same function, after the `Rc::new(DecodedPicture{...})` call.\nTherefore the DPB stores the full MB-aligned (uncropped) pixel buffer as the\nreference picture, which is correct for MC. However if the outer crop changes\n`ps.frame.y/u/v` in place, the Rc copy is already detached, so this is fine.\nThe real problem is that `DecodedPicture.height` is computed as\n`(ps.frame.height.div_ceil(16)) * 16` using the display height, not `mb_height * 16`.\nFor non-16-aligned content (e.g. 100x76) `ps.frame.height = 76`, so\n`div_ceil(76, 16) * 16 = 80`, which matches `mb_height * 16`. This is correct, but the\ndescription in the comment says `width: ps.mb_width * 16` yet `height` is computed\ndifferently. This inconsistency is a maintenance hazard and will produce a wrong\n`height` for field pictures because `ps.frame.height` is the field height (frame_height/2)\nnot the frame height, so the stored `DecodedPicture.height` will be half the correct value\nfor field picture references.","fix":"Use `ps.mb_height * 16` for `DecodedPicture.height` consistently with the `width` field.","locations":[{"ref":"src/decoder.rs:350-373","code":"  350 |         let pic = Rc::new(DecodedPicture {\n  351 |  .next()\n  492 |             .ok_or(DecodeError::InvalidSyntax(\"no PPS available\"))?;","lines":6}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The implicit-weight computation at decoder.rs line 631 divides by `td` which has\nalready been clamped to [-128, 127] and been confirmed non-zero by the outer `if td ==\n0` check. However, `tx = (16384 + (td.abs() / 2)) / td` performs signed integer\ndivision. If `td` is negative, the division is well-defined in Rust but the spec\nformula expects `Clip3(-1024, 1023, (16384 + Abs(tb/2)) / td)` where division is\nmathematically exact. The rounding of `td.abs() / 2` when `td < 0` adds `abs(td)/2`\ninstead of the spec's `abs(td)/2 = abs(td.abs()/2)` — there is no sign issue here\nsince `td.abs()` is always positive. The real issue is that `tx` is computed as\n`(16384 + (td.abs() / 2)) / td` where the denominator is `td` (which may be negative),\ngiving a negative `tx` for negative `td`. Then `w1 = (tb * tx + 32) >> 8` and finally\n`64 - w1` may produce a value outside [0, 64] before the `(-64..=128)` guard. The guard\nclamps to 32 in that case, so the result is conservative (defaults to equal weights).\nThis matches behaviour described in the spec for out-of-range values but the guard\nbounds `(-64..=128)` do not match the spec's `Clip3(0, 128, ...)` — `w1 < -64` should\nalso be clamped to 0 (weight 64) not 32 (weight 32).","fix":"Change the out-of-range guard to match spec: when `!(-64..=128).contains(&w1)`, use `w1.clamp(0, 128)` as the fallback instead of a hard-coded 32.","locations":[{"ref":"src/decoder.rs:626-637","code":"  626 |                             let td = (ref_l1.pic_order_cnt - ref_l0.pic_order_cnt).clamp(-128, 127);\n  627 |                             if td == 0 {\n  628 |                                 32\n  629 |                             } else {\n  630 |                                 let tb = (current_poc - ref_l0.pic_order_cnt).clamp(-128, 127);\n  631 |                                 let tx = (16384 + (td.abs() / 2)) / td;\n  632 |                                 let w1 = (tb * tx + 32) >> 8;\n  633 |                                 if !(-64..=128).contains(&w1) {\n  634 |                                     32\n  635 |                                 } else {\n  636 |                                     64 - w1\n  637 |                                 }","lines":12}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`compute_poc_type1` does not update `prev_poc_msb`/`prev_poc_lsb` after computing a\nnon-IDR picture's POC. POC type 1 is stateless (frame_num-derived), so this is\nintentional, but the function takes `&self` (immutable). However the sibling\n`compute_poc_type0` takes `&mut self` and writes `prev_poc_msb`/`prev_poc_lsb`. If an\nSPS switches from type 0 to type 1 mid-stream (unusual but valid), the stale\n`prev_poc_msb`/`prev_poc_lsb` values will be used on the next type 0 picture, producing\nwrong MSB wrapping. Additionally, `compute_poc_type1` does not reset those fields on an\nIDR boundary, so if a stream starts with POC type 1 followed by POC type 0, the initial\n`prev_poc_lsb = 0` happens to be correct for IDR but only because the IDR branch in\ntype 0 resets it directly.","fix":"Reset `prev_poc_msb = 0` and `prev_poc_lsb = 0` inside `compute_poc_type1` on IDR boundaries (already done for type 0), or reset unconditionally in `compute_poc` before dispatching.","locations":[{"ref":"src/dpb.rs:479-542","code":"  479 |     /// POC type 1 (spec 8.2.1.2) — uses delta_pic_order_cnt with cycle offsets.\n  480 |     fn compute_poc_type1(\n  481 |         &self,\n  482 |         sps: &Sps,\n  483 |         header: &SliceHeader,\n  484 |         nal_unit_type: NalUnitType,\n  485 |         nal_ref_idc: u8,\n  486 |     ) -> i32 {\n  487 |         if nal_unit_type == NalUnitType::SliceIdr {\n  488 |             return 0;\n  489 |         }\n  490 | \n  491 |         let num_ref_frames_in_cycle = sps.num_ref_frames_in_pic_order_cnt_cycle as usize;\n  492 |         let expected_delta_per_cycle: i32 = sps.offset_for_ref_frame.iter().sum();\n  493 | \n  494 |         let abs_frame_num = if num_ref_frames_in_cycle > 0 {\n  495 |             header.frame_num as i32\n  496 |         } else {\n  497 |             0\n  498 |         };\n  499 | \n  500 |         let expected_poc = if nal_ref_idc == 0 && abs_frame_num > 0 {\n  501 |             let cycle = (abs_frame_num - 1) / num_ref_frames_in_cycle.max(1) as i32;\n  502 |             let idx = ((abs_frame_num - 1) % num_ref_frames_in_cycle.max(1) as i32) as usize;\n  503 |             let partial: i32 = sps.offset_for_ref_frame[..=idx]\n  504 |                 .iter()\n  505 |                 .copied()\n  506 |                 .fold(0i32, |a, b| a.wrapping_add(b));\n  507 |             cycle\n  508 |                 .wrapping_mul(expected_delta_per_cycle)\n  509 |                 .wrapping_add(partial)\n  510 |                 .wrapping_add(sps.offset_for_non_ref_pic)\n  511 |         } else if abs_frame_num > 0 {\n  512 |             let cycle = (abs_frame_num - 1) / num_ref_frames_in_cycle.max(1) as i32;\n  513 |             let idx = ((abs_frame_num - 1) % num_ref_frames_in_cycle.max(1) as i32) as usize;\n  514 |             let partial: i32 = sps.offset_for_ref_frame[..=idx]\n  515 |                 .iter()\n  516 |                 .copied()\n  517 |                 .fold(0i32, |a, b| a.wrapping_add(b));\n  518 |             cycle\n  519 |                 .wrapping_mul(expected_delta_per_cycle)\n  520 |                 .wrapping_add(partial)\n  521 |         } else {\n  522 |             0\n  523 |         };\n  524 | \n  525 |         let top_field_order_cnt = expected_poc + header.delta_pic_order_cnt[0];\n  526 |         if header.field_pic_flag {\n  527 |             // Field picture: POC is just this field's order count\n  528 |             if header.bott ct. The use of `.max(1)` for `max` when the loop condition\nis `self.max_ref_frames > 0` means `max` is always at least 1, so the real eviction\nthreshold is `max_ref_frames.max(1)`, not `max_ref_frames`. When `max_ref_frames == 1`\nthis evicts to 0, which may leave too few references for subsequent P-slices.","fix":"Change the comparison from `total_ref_count < max` to `total_ref_count < self.max_ref_frames` (without the `.max(1)` clamping), and let `max_ref_frames == 0` be handled by the early exit.","locations":[{"ref":"src/dpb.rs:557-591","code":"  557 |     fn sliding_window_mark(&mut self) {\n  558 |         let max = self.max_ref_frames.max(1);\n  559 |         while self.max_ref_frames > 0 {\n  560 |             // Total ref count includes both short-term and long-term (spec 8.2.5.3).\n  561 |             // For field pictures, two fields from the same frame_num count as ONE\n  562 |             // toward the limit. Count distinct frame_nums among reference entries.\n  563 |             let mut seen_frame_nums = std::collections::HashSet::new();\n  564 |             for e in &self.entries {\n  565 |                 if e.reference != ReferenceStatus::Unused {\n  566 |                     seen_frame_nums.insert(e.pic.frame_num);\n  567 |                 }\n  568 |             }\n  569 |             let total_ref_count = seen_frame_nums.len();\n  570 |             if total_ref_count < max {\n  571 |                 break;\n  572 |             }\n  573 |             // Evict the oldest short-term reference (first in insertion order).\n  574 |             // Using insertion order handles frame_num wraparound correctly\n  575 |             // (spec 8.2.5.3: evict smallest FrameNumWrap, which is the oldest).\n  576 |             if let Some(idx) = self\n  577 |                 .entries\n  578 |                 .iter()\n  579 |                 .position(|e| e.reference == ReferenceStatus::ShortTerm)\n  580 |             {\n  581 |                 // Evict both fields of this frame_num (if any)\n  582 |                 let evict_fn = self.entries[idx].pic.frame_num;\n  583 |                 for e in &mut self.entries {\n  584 |                     if e.reference == ReferenceStatus::ShortTerm && e.pic.frame_num == evict_fn {\n  585 |                         e.reference = ReferenceStatus::Unused;\n  586 |                     }\n  587 |                 }\n  588 |             } else {\n  589 |                 break;\n  590 |             }\n  591 |         }","lines":35}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`mark_short_term_unused` (MMCO op=1) breaks after marking the first matching entry\n(line 599: `break`). For field pictures, two DPB entries can share the same `frame_num`\n(top and bottom fields). Marking only the first one leaves the second field as a\ndangling short-term reference that consumes a slot in the sliding window count and may\nbe returned in reference lists.","fix":"Remove the `break` so the loop marks all entries with the matching `frame_num` as unused.","locations":[{"ref":"src/dpb.rs:595-603","code":"  595 |     pub fn mark_short_term_unused(&mut self, frame_num: u32) {\n  596 |         for entry in &mut self.entries {\n  597 |             if entry.reference == ReferenceStatus::ShortTerm && entry.pic.frame_num == frame_num {\n  598 |                 entry.reference = ReferenceStatus::Unused;\n  599 |                 break;\n  600 |             }\n  601 |         }\n  602 |         self.remove_unused();\n  603 |     }","lines":9}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `mbaff_above_neighbor`, the `(true, true)` branch (both field-coded, current top MB\nlooking above) returns the TOP-field MB of the above pair (`above_pair * 2`, line 865).\nPer H.264 spec Table 6-4 and the MBAFF field-order rules, when current top-field MB and\nabove pair are both field-coded, the above neighbor should be the BOTTOM-field MB of the\nabove pair (`above_pair * 2 + 1`), because within a field-coded pair the bottom-field MB\nis decoded after the top-field MB and its spatial region is immediately above the current\ntop-field MB in field-scan order. Using the top-field MB of the above pair references\ncontent from two field-pair rows up.","fix":"Change the return for the (true, true) case to use the bottom-field MB:\n```rust\n(true, true) => {\n    // Both field: above = bottom field of above pair (same-field parity), row 15\n    Some((above_pair * 2 + 1, 15))\n}\n```\nNote: this should be validated against spec Table 6-4 and confirmed against byte-exact\nfield-coded MBAFF tests before applying, as the existing tests pass with the current code.","locations":[{"ref":"src/mv_pred.rs:862-866","code":"  862 |             }\n  863 |             (true, true) => {\n  864 |                 // Both field: above = top field of above pair (same field parity), row 15\n  865 |                 Some((above_pair * 2, 15))\n  866 |             }","lines":5}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"MMCO operation 3 in `slice.rs` packs two ue(v) fields into a single u32 by doing\n`diff | (long_term_frame_idx << 16)` (line 304). This assumes `diff < 65536` and\n`long_term_frame_idx < 65536`. Per spec 7.4.3.3, `difference_of_pic_nums_minus1` is\nunbounded (it is a ue(v)), and encoders can legitimately produce values >= 65536\nfor long GOP streams, causing data loss when `diff >= 65536` because the upper bits\nof `diff` overlap with `long_term_frame_idx`. The decoder in `dpb.rs` would then extract\nincorrect values when unpacking with `& 0xFFFF` and `>> 16`.","fix":"Use a dedicated struct or a tuple (u32, u32) in mmco_ops instead of packing into one u32.\nFor example change `Vec<(u32, u32)>` to `Vec<MmcoOp>` where MmcoOp is an enum that carries\nthe appropriate parameters per opcode type.","locations":[{"ref":"src/slice.rs:301-305","code":"  301 |                     3 => {\n  302 |                         let diff = r.read_ue()?;\n  303 |                         let long_term_frame_idx = r.read_ue()?;\n  304 |                         mmco_ops.push((3, diff | (long_term_frame_idx << 16)));\n  305 |                     }","lines":5}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `init_cabac_states`, the comment on line 379 says \"pre is now 1..126\" but the clamping\nlogic on lines 376-378 allows `pre=0` when the original pre was 0 (since `0 ^ (0 >> 31) = 0`\nand 0 is not > 124). So the comment is inaccurate — pre can be 0. This is likely harmless\nsince state 0 is valid, but misleading for code maintainers.","fix":"Correct the comment to say \"pre is now 0..126\".","locations":[{"ref":"src/cabac.rs:374-380","code":"  374 |         // Map to state: pre ^= pre >> 31 (not abs — gives abs(x)-1 for negative x)\n  375 |         pre ^= pre >> 31;\n  376 |         if pre > 124 {\n  377 |             pre = 124 + (pre & 1);\n  378 |         }\n  379 |         // pre is now 1..126; state = pre (odd = MPS=1, even = MPS=0)\n  380 |         states[i] = pre as u8;","lines":7}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In the B-slice B_8x8 path, ref_idx writes to the store occur twice for the same blocks:\n- First at lines 2335-2344 (L0) and 2374-2383 (L1): immediately after decoding each sub-MB's ref_idx.\n- Then again at lines 2386-2398: a redundant re-write loop labeled \"Store ref_idx into cache for MV prediction\".\n\nThe second loop (2386-2398) writes identical values to ref_idx_store_l0 and ref_idx_store_l1 that were already\nstored in the first loops. This is dead/redundant work but not a correctness issue.","fix":"Remove the redundant store loop at lines 2386-2398.","locations":[{"ref":"src/decode_cabac.rs:2335-2344","code":" 2335 |                         // Write L0 ref_idx immediately for 2395 |                                 self.ref_idx_store_l1[mb_idx * 16 + blk] = sub_ref_l1[smb];\n 2396 |                             }\n 2397 |                         }\n 2398 |                     }","lines":13}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In the B-slice 8×8-DCT path, when a luma 8×8 block is skipped (CBP bit clear), the code explicitly zeroes all four nc_luma entries for that block (lines 795–797). The identical P-slice 8×8-DCT path (lines 1479–1481) omits this zeroing. While nc_luma is initialised to 0 for a new picture so this is harmless for the first frame, the asymmetry is a maintenance risk — if nc_luma ever becomes persistent across pictures the P-slice path would produce stale nc values.","fix":"Add the same zeroing loop to the P-slice 8×8-DCT skip path for consistency, or document clearly why both paths rely on 0-initialisation at picture start.","locations":[{"ref":"src/decode_cavlc.rs:793-798","code":"  793 |                     if cbp_luma & (1 << i8x8) == 0 {\n  794 |                         for sub in 0..4 {\n  795 |                             self.nc_luma[mb_idx * 16 + i8x8 * 4 + sub] = 0;\n  796 |                         }\n  797 |                         continue;\n  798 |                     }","lines":6},{"ref":"src/decode_cavlc.rs:1479-1481","code":" 1479 |                     if cbp_luma & (1 << i8x8) == 0 {\n 1480 |                         continue;\n 1481 |                     }","lines":3}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`finalize_pending` inserts the decoded picture into the DPB as `ShortTerm` even when\n`ps.nal_ref_idc == 0` — wait, actually the code correctly sets `reference =\nReferenceStatus::Unused` in that case. However, `dpb.insert` is still called for\n`Unused` pictures, which triggers `remove_unused()` immediately after pushing, so the\nentry is inserted and then immediately removed. This is wasteful but harmless. The\nframe data is still preserved in the returned `Frame`. An unused picture should not be\npushed into the DPB at all, since `remove_unused` will purge it immediately, wasting\nallocation and a `Vec::retain` scan.","fix":"Guard the `dpb.insert` call: only call it when `reference != ReferenceStatus::Unused`.","locations":[{"ref":"src/decoder.rs:376","code":"  376 |         self.dpb.insert(pic, reference);","lines":1}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`compute_poc_type1` uses `header.frame_num as i32` as `abs_frame_num`, but the H.264\nspec defines `AbsFrameNum` differently for POC type 1: it must account for\n`frame_num` wrap-around using `MaxFrameNum` (spec 8.2.1.2, step 1). The current code\nignores wrapping, producing wrong POC values for long streams where `frame_num` wraps.","fix":"Track the previous `frame_num` and detect wrap-around (similar to how POC type 0 tracks `prev_poc_lsb`), then add `MaxFrameNum` multiples to compute the true `AbsFrameNum`.","locations":[{"ref":"src/dpb.rs:491-498","code":"  491 |         let num_ref_frames_in_cycle = sps.num_ref_frames_in_pic_order_cnt_cycle as usize;\n  492 |         let expected_delta_per_cycle: i32 = sps.offset_for_ref_frame.iter().sum();\n  493 | \n  494 |         let abs_frame_num = if num_ref_frames_in_cycle > 0 {\n  495 |             header.frame_num as i32\n  496 |         } else {\n  497 |             0\n  498 |         };","lines":8}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In predict_intra_8x8, ftr (filtered top-right samples) is initialised to [0i32; 8] (line 445), while ft (filtered top) defaults to [128i32; 8]. When above is None, ftr stays all-zero while ft stays all-128. Modes 3 (Diagonal Down-Left) and 7 (Vertical-Left) combine ft and ftr into a 16-element array t[]; if above is somehow None while these modes are selected, the t array would blend 128s with 0s, producing incorrect neighbour samples rather than a uniform 128 value. Callers are expected by the spec not to invoke DDL/VL without an above row, but the function offers no defence against this.","fix":"Initialise ftr to [128i32; 8] to be consistent with ft's default, or document the contract explicitly with a debug_assert!(above.is_some() || (mode != 3 && mode != 7)) at the function entry.","locations":[{"ref":"src/intra_pred.rs:444-455","code":"  444 |     // Filtered top-right samples (t8..t15)\n  445 |     let mut ftr = [0i32; 8];\n  446 |     if let Some(a) = above {\n  447 |         if has_topright {\n  448 |             for i in 0..7 {\n  449 |                 ftr[i] = (a[7 + i] as i32 + 2 * a[8 + i] as i32 + a[9 + i] as i32 + 2) >> 2;\n  450 |             }\n  451 |             ftr[7] = (a[14] as i32 + 3 * a[15] as i32 + 2) >> 2;\n  452 |         } else {\n  453 |             ftr.fill(a[7] as i32);\n  454 |         }\n  455 |     }","lines":12},{"ref":"src/intra_pred.rs:500-515","code":"  500 |         3 => {\n  501 |             // Diagonal Down-Left\n  502 |             // Combine t0..t7 and t8..t15 (top-right)\n  503 |             let mut t = [0i32; 16];\n  504 |             t[..8].copy_from_slice(&ft);\n  505 |             t[8..].copy_from_slice(&ftr);\n  506 |             for y in 0..8 {\n  507 |                 for x in 0..8 {\n  508 |                     let i = x + y;\n  509 |                     output[y * 8 + x] = if x == 7 && y == 7 {\n  510 |                         ((t[14] + 3 * t[15] + 2) >> 2) as u8\n  511 |                     } else {\n  512 |                         ((t[i] + 2 * t[i + 1] + t[i + 2] + 2) >> 2) as u8\n  513 |                     };\n  514 |                 }\n  515 |             }","lines":16},{"ref":"src/intra_pred.rs:621-635","code":"  621 |         7 => {\n  622 |             // Vertical-Left\n  623 |             let mut t = [0i32; 16];\n  624 |             t[..8].copy_from_slice(&ft);\n  625 |             t[8..]. ef":"src/neighbor.rs:638-641","code":"  638 |                 let scan_idx = ZIGZAG_4X4\n  639 |                     .iter()\n  640 |                     .position(|&(zr, zc)| zr == r && zc == c)\n  641 |                     .unwrap();","lines":4}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"medium","description":"dequant_4x4_full performs an O(16) linear scan of ZIGZAG_4X4 to find the scan-order index for each (r, c) raster position. With 16 coefficients per block and up to 16 AC blocks per macroblock, this is O(4096) comparisons per macroblock. The OFFSET_TO_BLOCK constant on line 422 already provides an O(1) reverse map from (row, col) → block index, though for the scan_idx lookup a similar const table could be built.","fix":"Add a 4x4 const table mapping (row, col) to scan-order index (the inverse of ZIGZAG_4X4) and replace the .iter().position().unwrap() call with a direct table lookup. Alternatively use ZIGZAG_4X4[idx] = (r, c) which already provides the mapping in the forward direction — iterate in scan order and index block by ZIGZAG_4X4[idx] directly instead of iterating by raster position.","locations":[{"ref":"src/residual.rs:459-464","code":"  459 |                 // Find the scan-order index for this raster position to look up the scale\n  460 |                 let scan_idx = ZIGZAG_4X4\n  461 |                     .iter()\n  462 |                     .position(|&(zr, zc)| zr == r && zc == c)\n  463 |                     .unwrap();\n  464 |                 let v = LEVEL_SCALE[qp_rem][pc] * scale[scan_idx] as i32;","lines":6}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"`BitsteamReader::read_bits` decodes up to 32 bits one bit at a time in a loop\n(lines 52-57), calling `read_bit()` up to 32 times. Each call individually checks\nbounds, shifts, and updates two fields. For frequently-called sites like SPS/PPS parsing\n(frame_num_bits = up to 20 bits), this could be replaced with a multi-bit read that\nloads the current byte and next byte, extracts the needed bits, and advances position\nin one step.","fix":"Add a fast-path for common sizes (e.g. <= 24 bits) using byte-level reads:\n```rust\nif self.bit_offset == 0 && n <= 8 {\n    // Fast single-byte read\n    let byte = self.data[self.byte_offset];\n    self.byte_offset += 1;\n    return Ok((byte >> (8 - n)) as u32);\n}\n```\nOr replace the loop with a shift-and-mask over the padded buffer.","locations":[{"ref":"src/bitstream.rs:52-58","code":"   52 |     pub fn read_bits(&mut self, n: u8) -> Result<u32, &'static str> {\n   53 |         let mut val: u32 = 0;\n   54 |         for _ in 0..n {\n   55 |             val = (val << 1) | self.read_bit()? as u32;\n   56 |         }\n   57 |         Ok(val)\n   58 |     }","lines":7}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"In the I16×16 reconstruction path, `DC_RASTER_TO_BLOCK.iter().position(|&b| b == blk).unwrap()` performs a linear O(16) scan for each of 16 blocks, giving O(256) total work to build the inverse mapping. The DC raster-to-block ordering is static and could be pre-computed as a compile-time inverse table.","fix":"Add a compile-time constant `const BLOCK_TO_DC_RASTER: [usize; 16] = ...;` (the inverse of DC_RASTER_TO_BLOCK) and index it directly: `let dc_idx = BLOCK_TO_DC_RASTER[blk];`. This also eliminates the `unwrap()`.","locations":[{"ref":"src/decode_cavlc.rs:2074","code":" 2074 |                 let dc_idx = DC_RASTER_TO_BLOCK.iter().position(|&b| b == blk).unwrap();","lines":1}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"`ref_list_l1_b` recomputes `ref_list_l0_b` in full (calling `self.ref_list_l0_b(...)`)\njust to compare it with the L1 list for the spec's swap-if-equal check (lines 249-258).\nThis rebuilds and sorts up to two vectors every time L1 is constructed for a B-slice.","fix":"Pass the already-built L0 rdering of side effects.\n\nIn particular, `reconstruct_chroma_plane`, `reconstruct_luma_8x8_block`,\n`reconstruct_luma_4x4_block`, and `reconstruct_luma_16x16` all live on `SliceContext` but\nonly use a small subset of its fields. The `derive_direct_mvs` method is nearly 100 lines\nof duplicated spatial/temporal × inference_flag branching logic that could be factored\ninto separate functions.","fix":"Consider splitting `SliceContext` into focused sub-structs (e.g. `PixelOutput`,\n`MvStore`, `CabacNeighborState`). For `derive_direct_mvs`, the six branching paths\n(spatial×{4,16,n} and temporal×{4,16,n}) could be collapsed by factoring the\nper-block derivation into a closure or helper function taking `(blk_start, blk_count)`\nand eliminating the duplicated spatial-vs-temporal branches.","locations":[{"ref":"src/slice_context.rs:59-127","code":"   59 | pub(crate) struct SliceContext<'a> {\n   60 |     // Pixel output\n   61 |     pub frame: &'a mut Frame,\n   62 |     pub stride: usize,\n   63 |     pub width: u32,\n   64 |     pub height: u32,\n   65 | \n   66 |     // Geometry\n   67 |     pub mb_width: u32,\n   68 | \n   69 |     // MBAFF state\n   70 |     pub mbaff: bool,\n   71 |     pub mb_field_decoding: &'a mut [bool],\n   72 | \n   73 |     // Per-4x4-block coefficient counts (for CABAC CBF / CAVLC nC)\n   74 |     pub nc_luma: &'a mut [u8],\n   75 |     pub nc_cb: &'a mut [u8],\n   76 |     pub nc_cr: &'a mut [u8],\n   77 | \n   78 |     // Per-4x4-block motion vectors and reference indices\n   79 |     pub mv_store_l0: &'a mut [[i16; 2]],\n   80 |     pub mv_store_l1: &'a mut [[i16; 2]],\n   81 |     pub ref_idx_store_l0: &'a mut [i8],\n   82 |     pub ref_poc_store_l0: &'a mut [i32],\n   83 |     pub ref_idx_store_l1: &'a mut [i8],\n   84 | \n   85 |     // Per-4x4-block MVD (for CABAC amvd context)\n   86 |     pub mvd_store: &'a mut [[i16; 2]],\n   87 |     pub mvd_store_l1: &'a mut [[i16; 2]],\n   88 | \n   89 |     // Per-MB deblocking / neighbor inf   const p = new URLSearchParams();

  const p = new URLSearchParams(location.hash.slice(1));

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
