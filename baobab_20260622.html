<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In Treemap.draw_item the color index passed to get_item_color is derived from cr_rect.x/y, which can be negative. calculate_item_geometry seeds the root p_area at x=-ITEM_PADDING/2 (-3) and y=-3, so the leftmost/topmost rectangles have a slightly negative cr_rect.x/y. get_item_color computes color_number = (int)(rel_position / 33.33); a negative rel_position yields a negative color_number and chart_colors[color_number] reads out of bounds of the fixed Gdk.RGBA[6] array, corrupting memory / crashing.","fix":"Clamp rel_position into [0,100) (or color_number into [0,NUM_COLORS-1]) before indexing chart_colors, e.g. var idx = ((int)(rel_position / (100.0/3))).clamp(0, NUM_COLORS-1).","locations":[{"ref":"src/baobab-treemap.vala:97-104","code":"   97 |             if ((item.depth % 2) != 0) {\n   98 |                 fill_color = get_item_color (rect.x / allocation.width * 200,\n   99 |                                              item.depth, highlighted);\n  100 |                 width = rect.width - ITEM_PADDING;\n  101 |                 height = rect.height;\n  102 |             } else {\n  103 |                 fill_color = get_item_color (rect.y / allocation.height * 200,\n  104 |                                              item.depth, highlighted);","lines":8,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-treemap.vala#L97-104"},{"ref":"src/baobab-chart.vala:424-428","code":"  424 |                 int color_number = (int) (rel_position / (100.0/3));\n  425 |                 int next_color_number = (color_number + 1) % NUM_COLORS;\n  426 | \n  427 |                 color_a = chart_colors[color_number];\n  428 |                 color_b = chart_colors[next_color_number];","lines":5,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L424-428"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In cancel_scan(), the first guard checks `active_location != null && active_location.scanner != null`, but the second block enters whenever `scan_completed_handler > 0` and unconditionally dereferences `active_location.scanner.disconnect(...)`. If active_location is null at that point (it is set null only at the end of this same function, but it can also legitimately be null while scan_completed_handler is non-zero is not normally possible - however the two conditions are decoupled), the deref will crash. The real defect is that handler disconnection is guarded by a different condition than the null-check above it: the disconnect path assumes active_location and its scanner are non-null without re-checking. Any code path that nulls active_location while leaving scan_completed_handler set produces a null deref.","fix":"Disconnect the handler inside the same guarded block: `if (active_location != null && active_location.scanner != null) { active_location.scanner.cancel (); if (scan_completed_handler > 0) { active_location.scanner.disconnect (scan_completed_handler); scan_completed_handler = 0; } }`. Also clear scanning_progress_id here via Source.remove if set, since cancel_scan currently leaks the 500ms progress timeout.","locations":[{"ref":"src/baobab-window.vala:221-232","code":"  221 |         void cancel_scan () {\n  222 |             if (active_location != null && active_location.scanner != null) {\n  223 |                 active_location.scanner.cancel ();\n  224 |             }\n  225 | \n  226 |             if (scan_completed_handler > 0) {\n  227 |                 active_location.scanner.disconnect (scan_completed_handler);\n  228 |                 scan_completed_handler = 0;\n  229 |             }\n  230 | \n  231 |             active_location = null;\n  232 |         }","lines":12,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L221-232"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"open_item(), copy_path() and trash_file() all dereference `active_location.scanner.get_file(results)` with no null check on active_location. These are invoked from the treeview context-menu actions (treeview-open-folder/copy/trash) via get_selected_item(). If active_location was cleared by cancel_scan() (e.g. results page hidden / scan cancelled) while a stale clicked_item is still held, active_location is null and this crashes.","fix":"Guard each public method with `if (active_location == null || active_location.scanner == null) return;` before calling get_file().","locations":[{"ref":"src/baobab-window.vala:325-339","code":"  325 |         public void open_item (Scanner.Results results) {\n  326 |             var file = active_location.scanner.get_file (results);\n  327 |             try {\n  328 |                 AppInfo.launch_default_for_uri (file.get_uri (), null);\n  329 |             } catch (Error e) {\n  330 |                 warning (\"Failed to open file: %s\\n\", e.message);\n  331 |                 toast (_(\"Failed to open file\"));\n  332 |             }\n  333 |         }\n  334 | \n  335 |         public void copy_path (Scanner.Results results) {\n  336 |             var parse_name = active_location.scanner.get_file (results).get_parse_name ();\n  337 |             var clipboard = get_clipboard ();\n  338 |             clipboard.set_text (parse_name);\n  339 |         }","lines":15,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L325-339"},{"ref":"src/baobab-window.vala:341-342","code":"  341 |         public void trash_file (Scanner.Results results) {\n  342 |             var file = active_location.scanner.get_file (results);","lines":2,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L341-342"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"trash_file() dereferences `results.parent.children_list_store` after the trash() call. For a root-level Results node, parent is null (Scanner.Results.parent is `unowned Results?`), so removing the trashed item from its parent's list store null-derefs. The hint that `var parent = results.parent;` is captured but then `results.parent` is dereferenced again (the captured `parent` local is never used) compounds the smell.","fix":"Null-check before touching the parent: `var parent = results.parent; if (parent == null) return; uint position = 0; if (parent.children_list_store.find (results, out position)) parent.children_list_store.remove (position);`.","locations":[{"ref":"src/baobab-window.vala:341-358","code":"  341 |         public void trash_file (Scanner.Results results) {\n  342 |             var file = active_location.scanner.get_file (results);\n  343 |             try {\n  344 |                 file.trash ();\n  345 |             } catch (Error e) {\n  346 |                 if (!e.matches (GLib.IOError.quark (), GLib.IOError.NOT_FOUND)) {\n  347 |                     warning (\"Failed to move to file to the trash: %s\", e.message);\n  348 |                     toast (_(\"Failed to trash file\"));\n  349 |                     return;\n  350 |                 }\n  351 |             }\n  352 | \n  353 |             var parent = results.parent;\n  354 |             uint position = 0;\n  355 |             if (results.parent.children_list_store.find (results, out position)) {\n  356 |                 results.parent.children_list_store.remove (position);\n  357 |             }\n  358 |         }","lines":18,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L341-358"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"columnview_selection_find() casts each model item to Gtk.TreeListRow via `as` and then dereferences `row.item` with no null check when passthrough is true. If any item is not a TreeListRow the cast yields null and `row.item` crashes. The non-passthrough branch is safe, but the passthrough branch is not.","fix":"In the passthrough branch: `var row = columnview_selection.get_item (i) as Gtk.TreeListRow; if (row != null && row.item == item) { position = i; return true; }`.","locations":[{"ref":"src/baobab-window.vala:382-389","code":"  382 |             for (uint i = 0; i < columnview_selection.n_items && i < uint.MAX; i++) {\n  383 |                 if (passthrough) {\n  384 |                     // The item is a Scanner.Results contained by a Gtk.TreeListRow\n  385 |                     var row = columnview_selection.get_item (i) as Gtk.TreeListRow;\n  386 |                     if (row.item == item) {\n  387 |                         position = i;\n  388 |                         return true;\n  389 |                     }","lines":8,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L382-389"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"columnview_activate() casts `columnview.model.get_object(position) as Gtk.TreeListRow` and immediately dereferences `row.item` without a null check. If the cast fails (object is not a TreeListRow) or get_object returns null (position out of range), row is null and `row.item` is a null deref crash. This is reachable from row activation.","fix":"Guard: `var row = columnview.model.get_object (position) as Gtk.TreeListRow; if (row == null) return; var path = row.item as Scanner.Results; if (path == null) return; reroot_treeview (path, true);`.","locations":[{"ref":"src/baobab-window.vala:527-531","code":"  527 |         void columnview_activate (uint position) {\n  528 |             var row = columnview.model.get_object (position) as Gtk.TreeListRow;\n  529 |             var path = row.item as Scanner.Results;\n  530 |             reroot_treeview (path, true);\n  531 |         }","lines":5,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L527-531"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"get_item_color, when highlighted and depth>0, divides each channel by maximum = max(red,green,blue). If the resulting color is (near) black -- which can happen because the non-highlighted color has already been multiplied by intensity, and intensity = 1-((depth-1)*0.3)/MAX_DEPTH can be small for deep items -- maximum can be 0 (or very near 0), producing a division by zero -> NaN/inf channel values that Cairo will reject or render incorrectly.","fix":"Guard against maximum <= 0 (skip normalization, or clamp to a small epsilon) before dividing the channels.","locations":[{"ref":"src/baobab-chart.vala:441-444","code":"  441 |                     float maximum = float.max (color.red, float.max (color.green, color.blue));\n  442 |                     color.red /= maximum;\n  443 |                     color.green /= maximum;\n  444 |                     color.blue /= maximum;","lines":4,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L441-444"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"tree_root getter can return null (root_ null and no location/scanner), but can_move_up_root() and move_up_root() dereference tree_root.parent directly. show_popover_at always calls can_move_up_root() to set the menu action's enabled state regardless of whether an item is highlighted, so a secondary click before a scan/model is set null-derefs.","fix":"Null-check tree_root: return tree_root != null && tree_root.parent != null; and guard move_up_root similarly.","locations":[{"ref":"src/baobab-chart.vala:477-486","code":"  477 |         protected bool can_move_up_root () {\n  478 |             return tree_root.parent != null;\n  479 |         }\n  480 | \n  481 |         public void move_up_root () {\n  482 |             if (tree_root.parent != null) {\n  483 |                 tree_root = tree_root.parent;\n  484 |                 item_activated (tree_root);\n  485 |             }\n  486 |         }","lines":10,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L477-486"},{"ref":"src/baobab-chart.vala:518-519","code":"  518 |             action = action_group.lookup_action (\"move-up\") as SimpleAction;\n  519 |             action.set_enabled (can_move_up_root ());","lines":2,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L518-519"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"on_reload_activate() calls scan_location(active_location, true) with no null check. scan_location immediately calls cancel_scan() (which sets active_location = null) and then does `active_location = location` using the passed argument, plus `pathbar.location = location` and `folder_display.location = location`. If active_location is null when reload fires (the reload action is disabled on the home page, but the action's enabled-state and active_location are tracked independently), this passes null into scan_location -> Location property setters -> null deref.","fix":"Add `if (active_location == null) return;` at the top of on_reload_activate().","locations":[{"ref":"src/baobab-window.vala:217-219","code":"  217 |         void on_reload_activate () {\n  218 |             scan_location (active_location, true);\n  219 |         }","lines":3,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L217-219"},{"ref":"src/baobab-window.vala:657-663","code":"  657 |         void scan_location (Location location, bool force = false) {\n  658 |             cancel_scan ();\n  659 | \n  660 |             active_location = location;\n  661 | \n  662 |             pathbar.location = location;\n  663 |             folder_display.location = location;","lines":7,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L657-663"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"The cell bind callbacks in baobab-window.vala cast `item.item as Gtk.TreeListRow` then dereference `row.item` with no null check (`var row = item.item as Gtk.TreeListRow; var results = row.item as Scanner.Results;`). If the bound item is ever not a TreeListRow the cast returns null and row.item crashes. Same pattern repeated in all four window bind callbacks.","fix":"Add `if (row == null) return;` after the cast in each bind callback, or centralise per the duplicate_code finding.","locations":[{"ref":"src/baobab-window.vala:709-716","code":"  709 |         private void folder_cell_bind (GLib.Object object) {\n  710 |             var item = object as Gtk.ColumnViewCell;\n  711 |             var row = item.item as Gtk.TreeListRow;\n  712 |             var results = row.item as Scanner.Results;\n  713 |             var child = item.child as FileCell;\n  714 |             child.item = results;\n  715 |             child.list_row = row;\n  716 |         }","lines":8,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L709-716"},{"ref":"src/baobab-window.vala:739-746","code":"  739 |         [GtkCallback]\n  740 |         private void size_cell_bind (GLib.Object object) {\n  741 |             var item = object as Gtk.ColumnViewCell;\n  742 |             var row = item.item as Gtk.TreeListRow;\n  743 |             var results = row.item as Scanner.Results;\n  744 |             var child = item.child as SizeCell;\n  745 |             child.item = results;\n  746 |         }","lines":8,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L739-746"},{"ref":"src/baobab-window.vala:769-776","code":"  769 |         [GtkCallback]\n  770 |         private void contents_cell_bind (GLib.Object object) {\n  771 |             var item = object as Gtk.ColumnViewCell;\n  772 |             var row = item.item as Gtk.TreeListRow;\n  773 |             var results = row.item as Scanner.Results;\n  774 |             var child = item.child as ContentsCell;\n  775 |             child.item = results;\n  776 |         }","lines":8,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L769-776"},{"ref":"src/baobab-window.vala:799-806","code":"  799 |         [GtkCallback]\n  800 |         private void time_modified_cell_bind (GLib.Object object) {\n  801 |             var item = object as Gtk.ColumnViewCell;\n  802 |             var row = item.item as Gtk.TreeListRow;\n  803 |             var results = row.item as Scanner.Results;\n  804 |             var child = item.child as TimeModifiedCell;\n  805 |             child.item = results;\n  806 |         }","lines":8,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L799-806"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":false,"description":"cancel_scan() never removes the scanning_progress_id Timeout source. scan_location() installs a 500ms repeating Timeout (returning Source.CONTINUE) and stores its id in scanning_progress_id, but only scanner_completed() removes it. If a scan is cancelled (results_hidden -> cancel_scan, or a new scan starting which calls cancel_scan first) before completion, the old timeout keeps firing forever, calling location.progress() on a stale/abandoned location every 500ms. It also gets overwritten by the next scan_location without being removed.","fix":"In cancel_scan(), add `if (scanning_progress_id > 0) { Source.remove (scanning_progress_id); scanning_progress_id = 0; }`.","locations":[{"ref":"src/baobab-window.vala:221-232","code":"  221 |         void cancel_scan () {\n  222 |             if (active_location != null && active_location.scanner != null) {\n  223 |                 active_location.scanner.cancel ();\n  224 |             }\n  225 | \n  226 |             if (scan_completed_handler > 0) {\n  227 |                 active_location.scanner.disconnect (scan_completed_handler);\n  228 |                 scan_completed_handler = 0;\n  229 |             }\n  230 | \n  231 |             active_location = null;\n  232 |         }","lines":12,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L221-232"},{"ref":"src/baobab-window.vala:675-678","code":"  675 |             scanning_progress_id = Timeout.add (500, () => {\n  676 |                 location.progress ();\n  677 |                 return Source.CONTINUE;\n  678 |             });","lines":4,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L675-678"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"Pathbar.make_button() connects a `clicked` handler that captures `path` (a Scanner.Results) for every non-current button, and these buttons are recreated on every path change via clear()/append. clear() removes the widgets from button_box but the closure keeps a strong reference to `path` (the Scanner.Results tree node) for the lifetime of the button; nothing disconnects the handler. While GTK destroys the removed widgets eventually, the lambda-captured Results references can keep large result subtrees alive longer than necessary, and the handler is never explicitly disconnected.","fix":"This is mostly mitigated by widget disposal, but to be safe keep button references minimal; ensure removed boxes/buttons are actually unparented (they are) so closures are freed. If profiling shows retention, store the handler id and disconnect in clear(), or use a weak capture of path.","locations":[{"ref":"src/baobab-pathbar.vala:139-164","code":"  139 |         void clear () {\n  140 |             for (Gtk.Widget? child = button_box.get_first_child (); child != null; child = button_box.get_first_child ()) {\n  141 |                 button_box.remove (child);\n  142 |             }\n  143 |         }\n  144 | \n  145 |         PathButton make_button (Scanner.Results? path, bool is_current_dir) {\n  146 |             string label;\n  147 |             Icon? gicon = null;\n  148 | \n  149 |             if (path == null || path.get_depth () == 1) {\n  150 |                 label = location.name;\n  151 |                 gicon = location.symbolic_icon;\n  152 |             } else {\n  153 |                 label = path.display_name;\n  154 |             }\n  155 | \n  156 |             var button = new PathButton (label, gicon, is_current_dir);\n  157 |             if (path != null && !is_current_dir) {\n  158 |                 button.clicked.connect (() => {\n  159 |                     item_activated (path);\n  160 |                 });\n  161 |             }\n  162 | \n  163 |             return button;\n  164 |         }","lines":26,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-pathbar.vala#L139-164"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"subtips_update schedules a Timeout whose closure captures `this` (the widget). On unrealize/dispose the pending tips_timeout_id is never removed (there is no dispose/unrealize override), so a destroyed Ringschart keeps a GSource alive holding a reference to the widget until the timeout fires, and the fired callback then calls queue_draw on a potentially disposed widget.","fix":"Override dispose()/unroot() to Source.remove(tips_timeout_id) and reset it; do not capture a strong ref (or check get_realized in the callback).","locations":[{"ref":"src/baobab-ringschart.vala:58-79","code":"   58 |         void subtips_update () {\n   59 |             if (drawing_subtips) {\n   60 |                 queue_draw ();\n   61 |             }\n   62 |             drawing_subtips = false;\n   63 | \n   64 |             if (tips_timeout_id != 0) {\n   65 |                 Source.remove (tips_timeout_id);\n   66 |                 tips_timeout_id = 0;\n   67 |             }\n   68 | \n   69 |             subtip_items = null;\n   70 | \n   71 |             if (highlighted_item != null) {\n   72 |                 tips_timeout_id = Timeout.add (SUBTIP_TIMEOUT, () => {\n   73 |                     drawing_subtips = true;\n   74 |                     tips_timeout_id = 0;\n   75 |                     queue_draw ();\n   76 |                     return false;\n   77 |                 });\n   78 |             }\n   79 |         }","lines":22,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-ringschart.vala#L58-79"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"FolderDisplay.location setter connects a `location_.progress` handler and stores its id, disconnecting only the previous one on the next set. The very last location's handler is never disconnected at teardown, and the closure captures `results` keeping that empty Results alive for the location's lifetime. Minor, but it is an undisconnected signal handler tied to object lifetime rather than display lifetime.","fix":"Disconnect location_progress_handler in a dispose/destroy override, or weakly reference results in the closure.","locations":[{"ref":"src/baobab-folder-display.vala:39-61","code":"   39 |         private ulong location_progress_handler;\n   40 | \n   41 |         Location location_;\n   42 |         public Location location {\n   43 |             set {\n   44 |                 if (location_progress_handler > 0) {\n   45 |                     SignalHandler.disconnect (location_, location_progress_handler);\n   46 |                     location_progress_handler = 0;\n   47 |                 }\n   48 | \n   49 |                 location_ = value;\n   50 | \n   51 |                 var results = new Scanner.Results.empty ();\n   52 |                 results.display_name = location.name;\n   53 |                 var list_store = new ListStore (typeof (Scanner.Results));\n   54 |                 list_store.append (results);\n   55 |                 columnview_sort_model.model = list_store;\n   56 | \n   57 |                 location_progress_handler = location_.progress.connect (() => {\n   58 |                     results.size = location_.scanner.total_size;\n   59 |                     results.elements = location_.scanner.total_elements;\n   60 |                 });\n   61 |             }","lines":23,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-folder-display.vala#L39-61"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"LocationList.construct installs a repeating Timeout.add_seconds(2, ...) that re-queries filesystem usage forever and is never removed (the source id is not stored). It also connects six VolumeMonitor signals and per-volume volume.changed handlers (volume_added) that are never disconnected. VolumeMonitor.get() returns a long-lived singleton, so these handlers (capturing the LocationList) keep the LocationList alive for the lifetime of the monitor, and the timer keeps firing, preventing the LocationList from ever being finalized and leaking the closures.","fix":"Store the timeout source id and remove it in a destructor/dispose, and disconnect the VolumeMonitor signal handlers (and per-volume handlers) when the LocationList is destroyed, or use a weak reference in the closures.","locations":[{"ref":"src/baobab-location-list.vala:111-131","code":"  111 |         construct {\n  112 |             monitor = VolumeMonitor.get ();\n  113 |             monitor.mount_changed.connect (mount_changed);\n  114 |             monitor.mount_removed.connect (mount_removed);\n  115 |             monitor.mount_added.connect (mount_added);\n  116 |             monitor.volume_changed.connect (volume_changed);\n  117 |             monitor.volume_removed.connect (volume_removed);\n  118 |             monitor.volume_added.connect (volume_added);\n  119 | \n  120 |             local_list_box.row_activated.connect (row_activated);\n  121 | \n  122 |             remote_list_box.row_activated.connect (row_activated);\n  123 | \n  124 |             populate ();\n  125 | \n  126 |             queue_query_fs_usage ();\n  127 |             Timeout.add_seconds(2, (() => {\n  128 |                 queue_query_fs_usage ();\n  129 |                 return Source.CONTINUE;\n  130 |             }));\n  131 |         }","lines":21,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-location-list.vala#L111-131"},{"ref":"src/baobab-location-list.vala:189-196","code":"  189 |         void volume_added (Volume volume) {\n  190 |             locations.append (new Location.from_volume (volume));\n  191 |             volume.changed.connect (() => {\n  192 |                 volume_changed (volume);\n  193 |             });\n  194 | \n  195 |             update ();\n  196 |         }","lines":8,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-location-list.vala#L189-196"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In populate(), every call connects a fresh 'removed' signal handler lambda to each newly created ExcludedRow, and connects a new row_activated handler is not re-added (that one is in construct, fine). The rows themselves are removed from the list box on the next populate(), but populate() is called on every add/remove and rebuilds all rows. While the rows are unref'd when removed, this teardown/rebuild of the entire list on every single add/remove is inefficient and relies on GTK dropping the last reference; any lingering reference (e.g. the captured 'uri' closures) keeps rows alive longer than necessary.","fix":"Avoid the full rebuild: add/remove only the affected ExcludedRow incrementally, and bind the model to the GSettings key (changed signal) rather than recreating all rows each time.","locations":[{"ref":"src/baobab-preferences-dialog.vala:73-96","code":"   73 |         void populate () {\n   74 |             for (Gtk.Widget? child = excluded_list_box.get_first_child (); child != null; child = excluded_list_box.get_first_child ()) {\n   75 |                 excluded_list_box.remove (child);\n   76 |             }\n   77 | \n   78 |             foreach (var uri in prefs_settings.get_strv (\"excluded-uris\")) {\n   79 |                 var file = File.new_for_uri (uri);\n   80 |                 var row = new ExcludedRow (file);\n   81 |                 excluded_list_box.append (row);\n   82 | \n   83 |                 row.removed.connect (() => {\n   84 |                     remove_uri (uri);\n   85 |                     populate ();\n   86 |                 });\n   87 |             }\n   88 | \n   89 |             var button_row = new Adw.ButtonRow ();\n   90 | \n   91 |             button_row.title = (_(\"_Add Location\"));\n   92 |             button_row.start_icon_name = (\"list-add-symbolic\");\n   93 |             button_row.use_underline = true;\n   94 | \n   95 |             excluded_list_box.append (button_row);\n   96 |         }","lines":24,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-preferences-dialog.vala#L73-96"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"format_time_approximate uses an inconsistent month length (31 days) versus year length (365 days), creating a gap and a discontinuity in the displayed age. The months branch covers ts < 365 days using months = ts / (31*DAY), so at 360 days it shows '11 months'; at 365 days control falls through to the years branch and shows '1 year'. A file roughly 12 months old never displays '12 months', and the months value tops out at 11 even just below the one-year boundary. Months count can also undercount because a real calendar month is ~30.44 days, not 31.","fix":"Use a consistent approximation, e.g. months = ts / (30 * TimeSpan.DAY) (or 30.44) and gate the years branch on ts >= 12 months computed the same way, so the boundaries line up and '12 months' is reachable, or compute calendar deltas with DateTime arithmetic.","locations":[{"ref":"src/baobab-cellrenderers.vala:40-52","code":"   40 |         if (ts < 31 * TimeSpan.DAY) {\n   41 |             var days = (ulong) (ts / TimeSpan.DAY);\n   42 |             // Translators: when the last modified time is \"days\" days ago\n   43 |             return ngettext (\"%lu day\", \"%lu days\", days).printf (days);\n   44 |         }\n   45 |         if (ts < 365 * TimeSpan.DAY) {\n   46 |             var months = (ulong) (ts / (31 * TimeSpan.DAY));\n   47 |             // Translators: when the last modified time is \"months\" months ago\n   48 |             return ngettext (\"%lu month\", \"%lu months\", months).printf (months);\n   49 |         }\n   50 |         var years = (ulong) (ts / (365 * TimeSpan.DAY));\n   51 |         // Translators: when the last modified time is \"years\" years ago\n   52 |         return ngettext (\"%lu year\", \"%lu years\", years).printf (years);","lines":13,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-cellrenderers.vala#L40-52"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In get_items the children loop condition is item.depth < max_depth + 1 (i.e. depth <= max_depth), so items at depth == max_depth still get their children created and added. But calculate_item_geometry for those children returns early (depth > max_depth) leaving them invisible. This builds and sorts a full SortListModel of grandchildren that are never drawn, wasting CPU/allocations on every model rebuild for the deepest visible ring/level.","fix":"Only descend when item.depth < max_depth (children at depth <= max_depth will be visible); avoid creating one extra invisible level.","locations":[{"ref":"src/baobab-chart.vala:327-343","code":"  327 |                 if ((!item.results.is_empty) && (item.depth < max_depth + 1)) {\n  328 |                     double rel_start = 0;\n  329 |                     CompareDataFunc<Scanner.Results> reverse_size_cmp = (a, b) => {\n  330 |                         return a.size < b.size ? 1 :\n  331 |                                a.size > b.size ? -1 :\n  332 |                                0;\n  333 |                     };\n  334 |                     var sorter = new Gtk.CustomSorter (reverse_size_cmp);\n  335 |                     var sorted = new Gtk.SortListModel (item.results.children_list_store, sorter);\n  336 |                     for (var i = 0; i < sorted.n_items; i++) {\n  337 |                         var child_iter = sorted.get_object (i) as Scanner.Results;\n  338 |                         unowned List<ChartItem> child_node = add_item (item.depth + 1, rel_start, child_iter.percent, child_iter);\n  339 |                         var child = child_node.data;\n  340 |                         child.parent = node;\n  341 |                         rel_start += child_iter.percent;\n  342 |                     }\n  343 |                 }","lines":17,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L327-343"},{"ref":"src/baobab-ringschart.vala:316-321","code":"  316 |                 ringsitem.min_radius = ringsitem.depth * thickness;\n  317 |                 if (ringsitem.depth > max_depth) {\n  318 |                     return;\n  319 |                 } else {\n  320 |                     ringsitem.max_radius = ringsitem.min_radius + thickness;\n  321 |                 }","lines":6,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-ringschart.vala#L316-321"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"get_item_color buckets rel_position with the float divisor 100.0/3 (line 424) but then computes the interpolation fraction using the integer expression 100/3, which truncates to 33 (line 430). The bucket width (33.33) and the fraction denominator (33) disagree, so (rel_position - color_number*33)/33 can exceed 1.0 and the interpolation overshoots, producing color banding/discontinuities at bucket boundaries.","fix":"Use the same float constant everywhere: define const double COLOR_STEP = 100.0/3 and compute fraction = (rel_position - color_number*COLOR_STEP)/COLOR_STEP.","locations":[{"ref":"src/baobab-chart.vala:424-430","code":"  424 |                 int color_number = (int) (rel_position / (100.0/3));\n  425 |                 int next_color_number = (color_number + 1) % NUM_COLORS;\n  426 | \n  427 |                 color_a = chart_colors[color_number];\n  428 |                 color_b = chart_colors[next_color_number];\n  429 | \n  430 |                 color = interpolate_colors (color_a, color_b, (float) (rel_position - color_number * 100/3) / (100/3));","lines":7,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L424-430"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"FolderDisplay.location setter disconnects the old progress handler but reads `location.name` and connects the new handler using the property getter `location` AFTER assigning `location_ = value`. It builds an empty Results, sets display_name from location.name, and connects location_.progress. If value is null, `location.name` (getter returns location_, now null) null-derefs. The setter has no null guard while the analogous Pathbar.location setter also assumes non-null. Passing null (e.g. via the reload-with-null path) crashes here.","fix":"Add `if (value == null) return;` (or handle null explicitly) at the start of the location setter.","locations":[{"ref":"src/baobab-folder-display.vala:42-61","code":"   42 |         public Location location {\n   43 |             set {\n   44 |                 if (location_progress_handler > 0) {\n   45 |                     SignalHandler.disconnect (location_, location_progress_handler);\n   46 |                     location_progress_handler = 0;\n   47 |                 }\n   48 | \n   49 |                 location_ = value;\n   50 | \n   51 |                 var results = new Scanner.Results.empty ();\n   52 |                 results.display_name = location.name;\n   53 |                 var list_store = new ListStore (typeof (Scanner.Results));\n   54 |                 list_store.append (results);\n   55 |                 columnview_sort_model.model = list_store;\n   56 | \n   57 |                 location_progress_handler = location_.progress.connect (() => {\n   58 |                     results.size = location_.scanner.total_size;\n   59 |                     results.elements = location_.scanner.total_elements;\n   60 |                 });\n   61 |             }","lines":20,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-folder-display.vala#L42-61"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"ExcludedRow stores a folder chosen via the file chooser using its URI, and the title shown to the user is the path only when the scheme is exactly 'file'. The list box rows connect removed -> remove_uri(uri) using the URI captured in populate(); however add_uri stores the raw uri from file_chooser.get_file ().get_uri (). If the same location is added twice with differing URI encodings (e.g. trailing slash, percent-encoding differences) the 'uri in uris' duplicate check at add_uri can fail to detect the duplicate, allowing duplicate-looking rows that each map to slightly different strings.","fix":"Normalize URIs before storing/comparing (e.g. File.new_for_uri (uri).get_uri () to canonicalize, and strip trailing slashes) so the duplicate check and removal compare canonical forms.","locations":[{"ref":"src/baobab-preferences-dialog.vala:98-104","code":"   98 |         void add_uri (string uri) {\n   99 |             var uris = prefs_settings.get_strv (\"excluded-uris\");\n  100 |             if (! (uri in uris)) {\n  101 |                 uris += uri;\n  102 |                 prefs_settings.set_strv (\"excluded-uris\", uris);\n  103 |             }\n  104 |         }","lines":7,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-preferences-dialog.vala#L98-104"},{"ref":"src/baobab-preferences-dialog.vala:29-34","code":"   29 |         public ExcludedRow (File file) {\n   30 |             if (file.has_uri_scheme (\"file\")) {\n   31 |                 title = file.get_path ();\n   32 |             } else {\n   33 |                 title = file.get_uri ();\n   34 |             }","lines":6,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-preferences-dialog.vala#L29-34"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Ringschart.is_point_over_item tests angle in [start_angle, start_angle+angle] but angle from atan2 is normalized to [0, 2*PI). A sector whose start_angle+angle crosses the 0/2*PI seam (e.g. start_angle near 2*PI) will have an upper bound exceeding 2*PI, so points in the wrapped region (small angles) never match -> the sector is not hoverable/clickable across the seam. The depth-0 full disk (start 0, angle 2*PI) works only by luck of the <= bound.","fix":"Normalize the comparison: compute delta = angle - start_angle, wrap into [0,2*PI), and test delta <= ringsitem.angle, handling the seam crossing.","locations":[{"ref":"src/baobab-ringschart.vala:404-410","code":"  404 |             var angle = Math.atan2 (y, x);\n  405 |             angle = (angle > 0) ? angle : (angle + 2 * Math.PI);\n  406 | \n  407 |             return ((radius >= ringsitem.min_radius) &&\n  408 |                     (radius <= ringsitem.max_radius) &&\n  409 |                     (angle >= ringsitem.start_angle) &&\n  410 |                     (angle <= (ringsitem.start_angle + ringsitem.angle)));","lines":7,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-ringschart.vala#L404-410"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Hardlink dedup only counts a hardlinked file once (first occurrence wins, subsequent ones 'continue' and are skipped entirely, not even counted in total_elements/parent size). This means later directories containing additional links to the same inode under-report their size and element count. More importantly, the GenericSet 'hardlinks' is reset only in cancel_and_reset (per scan), so it is correct per scan, but the dedup is global across the whole tree rather than scoped, so a hardlink whose links live in two sibling subtrees will attribute the full size to whichever subtree is enumerated first, skewing per-directory percentages. This is a deliberate design choice but the resulting per-directory sizes can be misleading.","fix":"Document the global-dedup semantics, or attribute hardlinked size proportionally; at minimum still increment total_elements/parent element count for skipped links so the element count reflects reality.","locations":[{"ref":"src/baobab-scanner.vala:267-287","code":"  267 |                     case FileType.REGULAR:\n  268 |                         if (child_info.has_attribute (FileAttribute.UNIX_NLINK)) {\n  269 |                             if (child_info.get_attribute_uint32 (FileAttribute.UNIX_NLINK) > 1) {\n  270 |                                 var hl = new HardLink (child_info);\n  271 | \n  272 |                                 // check if we've already encountered this file\n  273 |                                 if (hl in hardlinks) {\n  274 |                                     continue;\n  275 |                                 }\n  276 | \n  277 |                                 hardlinks.add ((owned) hl);\n  278 |                             }\n  279 | \n  280 |                         }\n  281 | \n  282 |                         var child_results = new Results (child_info, results);\n  283 |                         total_size += child_results.size;\n  284 |                         total_elements++;\n  285 |                         results.update_with_child (child_results);\n  286 |                         results_array.results += (owned) child_results;\n  287 |                         break;","lines":21,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-scanner.vala#L267-287"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"add_directory() can return null (when EXCLUDE_MOUNTS is set and the directory's device differs from unix_device), but scan_in_thread unconditionally dereferences the return value with results.percent = 100.0 and pushes it. For the root call this is currently safe only because unix_device is set from the very same FileInfo just above, so they always match; however this is a latent null-dereference (crash) that breaks the moment the root device assignment or exclusion logic changes. There is no defensive null check.","fix":"Guard against null: if (results != null) { results.percent = 100.0; array.results += (owned) results; results_queue.push ((owned) array); } else handle the excluded-root case explicitly (report an error / completed).","locations":[{"ref":"src/baobab-scanner.vala:344-347","code":"  344 |                 unix_device = info.get_attribute_uint32 (FileAttribute.UNIX_DEVICE);\n  345 |                 var results = add_directory (directory, info);\n  346 |                 results.percent = 100.0;\n  347 |                 array.results += (owned) results;","lines":4,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-scanner.vala#L344-347"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"process_results returns from inside the foreach as soon as it sees a results object with parent == null (the root), emitting completed() and stopping the idle (return false). If the root's ResultsArray were ever pushed before some child arrays were drained, those remaining queued arrays in the current results_array and any later ones are never processed and the children are silently dropped. Correctness depends entirely on the worker pushing the root strictly last (which it does), but the early return discards the rest of the current results_array's loop iterations without draining - any results after the root in the same array are lost.","fix":"Do not return early from within the array loop; finish processing the current results_array, then check for the root/completion condition. Ensure the root is always the sole/last element of its array (it is) and drain fully before emitting completed().","locations":[{"ref":"src/baobab-scanner.vala:357-395","code":"  357 |         bool process_results () {\n  358 |             while (true) {\n  359 |                 var results_array = results_queue.try_pop ();\n  360 | \n  361 |                 if (results_array == null) {\n  362 |                     break;\n  363 |                 }\n  364 | \n  365 |                 foreach (unowned Results results in results_array.results) {\n  366 |                     if (results.parent != null) {\n  367 |                         results.parent.children_list_store.insert (0, results);\n  368 |                     }\n  369 | \n  370 |                     State state;\n  371 |                     if (results.child_error) {\n  372 |                         results.state = State.CHILD_ERROR;\n  373 |                     } else if (results.error != null) {\n  374 |                         results.state = State.ERROR;\n  375 |                     } else {\n  376 |                         results.state = State.DONE;\n  377 |                     }\n  378 | \n  379 |                     if (results.max_depth > max_depth) {\n  380 |                         max_depth = results.max_depth;\n  381 |                     }\n  382 | \n  383 |                     // We reached the root, we're done\n  384 |                     if (results.parent == null) {\n  385 |                         this.root = results;\n  386 |                         scan_error = results.error;\n  387 |                         successful = true;\n  388 |                         completed ();\n  389 |                         return false;\n  390 |                     }\n  391 |                 }\n  392 |             }\n  393 | \n  394 |             return this.self != null;\n  395 |         }","lines":39,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-scanner.vala#L357-395"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"cancel() sets scan_error to a CANCELLED IOError and emits completed(), but only when !successful. cancel_and_reset() (called from both cancel() and scan()) joins the worker thread and removes the idle source, then drains the queue. However cancel_and_reset is also invoked at the start of every scan() via the !successful path; it resets scan_error to null AFTER potentially being set. The ordering in cancel() is: cancel_and_reset() (which sets scan_error = null) THEN scan_error = new IOError.CANCELLED. That is correct. But scan(force) when force=true sets successful=false then cancel_and_reset() - if a previous scan had set scan_error, it is cleared, which is intended. No bug in ordering, but note: completed() is emitted from cancel() even if a scan was never started, and finish() will then throw CANCELLED for a brand-new scanner that was merely cancelled.","fix":"Optionally guard cancel() to only set CANCELLED / emit completed when a scan was actually in progress (thread != null) to avoid spurious CANCELLED errors from finish() on an idle scanner.","locations":[{"ref":"src/baobab-scanner.vala:451-463","code":"  451 |         public void cancel () {\n  452 |             if (!successful) {\n  453 |                 cancel_and_reset ();\n  454 |                 scan_error = new IOError.CANCELLED (\"Scan was cancelled\");\n  455 |             }\n  456 |             completed ();\n  457 |         }\n  458 | \n  459 |         public void finish () throws Error {\n  460 |             if (scan_error != null) {\n  461 |                 throw scan_error;\n  462 |             }\n  463 |         }","lines":13,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-scanner.vala#L451-463"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"TreeListRowSorter.compare() breaks ties between two non-TreeListRow items using raw pointer comparison `&item1 < &item2`. item1/item2 are local parameter variables, so `&item1`/`&item2` take the addresses of the stack/local references, NOT the addresses of the underlying objects. Those local addresses are unrelated to object identity and are not stable across calls, so this does not produce a consistent total order and is essentially meaningless. (In practice both items are always TreeListRows here so the branch is dead, but if it ever runs it violates the sorter's TOTAL-order contract and can corrupt the sort.)","fix":"Compare the object identities, e.g. by casting to pointers of the objects themselves: `return (void*) item1 < (void*) item2 ? Gtk.Ordering.SMALLER : Gtk.Ordering.LARGER;`, or better return EQUAL since this branch is unreachable given the model only ever contains TreeListRows.","locations":[{"ref":"src/baobab-tree-list-row-sorter.vala:75-83","code":"   75 |             if (!(item1 is Gtk.TreeListRow)) {\n   76 |                 if (item2 is Gtk.TreeListRow) {\n   77 |                     return Gtk.Ordering.LARGER;\n   78 |                 } else {\n   79 |                     return &item1 < &item2 ? Gtk.Ordering.SMALLER : Gtk.Ordering.LARGER;\n   80 |                 }\n   81 |             } else if (!(item2 is Gtk.TreeListRow)) {\n   82 |                 return Gtk.Ordering.SMALLER;\n   83 |             }","lines":9,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-tree-list-row-sorter.vala#L75-83"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"TreeListRowSorter.compare(): during the depth-equalisation loops, `result` is overwritten on every iteration rather than only being set once. If rows differ in depth by more than one level, the loop runs multiple times and result ends up reflecting only the last iteration. More importantly, after equalising depth the code falls through to the common-parent walk; if row1==row2 after equalisation it returns the depth-based result, but the depth-result is only meaningful when one row is a descendant of the other. When they are at different depths but in unrelated subtrees, the returned ordering can be inconsistent with the ordering of their actual ancestors at the same depth, risking a non-total / non-transitive order.","fix":"Mirror Gtk's reference TreeListRowSorter exactly: only use the depth-difference result as the tie-breaker for the ancestor/descendant case (row1==row2 after climbing), and for unrelated subtrees always climb both to a common parent first and compare there; do not let intermediate loop iterations clobber the final tie-break value.","locations":[{"ref":"src/baobab-tree-list-row-sorter.vala:94-116","code":"   94 |             while (depth1 > depth2) {\n   95 |                 row1 = row1.get_parent ();\n   96 |                 depth1--;\n   97 |                 if (sort_order == Gtk.SortType.ASCENDING) {\n   98 |                     result = Gtk.Ordering.LARGER;\n   99 |                 } else {\n  100 |                     result = Gtk.Ordering.SMALLER;\n  101 |                 }\n  102 |             }\n  103 |             while (depth2 > depth1) {\n  104 |                 row2 = row2.get_parent ();\n  105 |                 depth2--;\n  106 |                 if (sort_order == Gtk.SortType.ASCENDING) {\n  107 |                     result = Gtk.Ordering.SMALLER;\n  108 |                 } else {\n  109 |                     result = Gtk.Ordering.LARGER;\n  110 |                 }\n  111 |             }\n  112 | \n  113 |             /* Now walk up until we find a common parent */\n  114 |             if (row1 == row2) {\n  115 |                 return result;\n  116 |             }","lines":23,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-tree-list-row-sorter.vala#L94-116"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The --all-file-systems flag is stored in a static and consumed in open() on the primary instance, but it is not forwarded across the D-Bus activation boundary. When a second invocation 'baobab -a /some/dir' is dispatched to an already-running primary instance, only the File list is sent via open(); the remote process's all_file_systems static is set but the primary's is not, so the scan uses the primary's (likely default) flag value and EXCLUDE_MOUNTS is applied despite -a being passed.","fix":"Pass the all-file-systems intent through the open() path (e.g. encode it in the hint string, or use command_line/add_platform_data), or set ApplicationFlags so options are handled in the primary instance, so the flag reaches the instance that actually performs the scan.","locations":[{"ref":"src/baobab-application.vala:29-52","code":"   29 |         static bool all_file_systems;\n   30 | \n   31 |         const OptionEntry[] option_entries = {\n   32 |             { \"all-file-systems\", 'a', 0, OptionArg.NONE, ref all_file_systems,\n   33 |               N_(\"Do not skip directories on different file systems. Ignored if DIRECTORY is not specified.\"), null },\n   34 |             { \"version\", 'v', 0, OptionArg.NONE, null, N_(\"Print version information and exit\"), null },\n   35 |             { null }\n   36 |         };\n   37 | \n   38 |         const GLib.ActionEntry[] action_entries = {\n   39 |             { \"quit\", on_quit_activate }\n   40 |         };\n   41 | \n   42 |         protected override void activate () {\n   43 |             ensure_window ();\n   44 |             window.present ();\n   45 |         }\n   46 | \n   47 |         protected override void open (File[] files, string hint) {\n   48 |             ensure_window ();\n   49 | \n   50 |             var scan_flags = all_file_systems ? ScanFlags.NONE : ScanFlags.EXCLUDE_MOUNTS;\n   51 |             window.scan_directory (files[0], scan_flags);\n   52 |         }","lines":24,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-application.vala#L29-52"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"open() always scans only files[0] and silently ignores any additional files/directories passed on the command line. With ApplicationFlags.HANDLES_OPEN, GApplication may invoke open() with multiple File arguments (e.g. 'baobab dir1 dir2'); only the first is scanned, with no warning to the user.","fix":"Either document/scan only one directory by validating files.length == 1 and warning otherwise, or iterate and scan each (or the last) file. At minimum guard against files.length == 0 before indexing files[0].","locations":[{"ref":"src/baobab-application.vala:47-52","code":"   47 |         protected override void open (File[] files, string hint) {\n   48 |             ensure_window ();\n   49 | \n   50 |             var scan_flags = all_file_systems ? ScanFlags.NONE : ScanFlags.EXCLUDE_MOUNTS;\n   51 |             window.scan_directory (files[0], scan_flags);\n   52 |         }","lines":6,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-application.vala#L47-52"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_item_color only ever uses 4 of the 6 defined chart colors for normal (non-overflowing) rel_position in [0,100]: color_number = rel_position/33.33 yields 0..3, so chart_colors[4] and chart_colors[5] are only reached via rel_position values >100 (treemap *200 scaling, ringschart *99). The comment 'Keep in sync with colors defined in CSS' and NUM_COLORS=6 imply all six should be used uniformly; the palette mapping is effectively arbitrary/inconsistent between the two charts.","fix":"Scale rel_position consistently against NUM_COLORS (e.g. bucket width = 100.0/NUM_COLORS) and feed both charts a 0..100 value, so all six colors are used and the wrap to next_color_number is correct.","locations":[{"ref":"src/baobab-chart.vala:55","code":"   55 |         const int NUM_COLORS = 6;","lines":1,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L55"},{"ref":"src/baobab-chart.vala:424-430","code":"  424 |                 int color_number = (int) (rel_position / (100.0/3));\n  425 |                 int next_color_number = (color_number + 1) % NUM_COLORS;\n  426 | \n  427 |                 color_a = chart_colors[color_number];\n  428 |                 color_b = chart_colors[next_color_number];\n  429 | \n  430 |                 color = interpolate_colors (color_a, color_b, (float) (rel_position - color_number * 100/3) / (100/3));","lines":7,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L424-430"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"add_item documents/returns 'items' (the list head) after items.prepend(item); this happens to be the new node only because prepend puts the element at the head. Callers then take child_node.data and set child.parent = node. This is fragile: it depends on prepend returning the head being the just-added node, and the function name/return type suggest it returns the node for the added item without making that contract explicit.","fix":"Return the prepended node explicitly and assert/comment that prepend places it at the head; or keep a direct reference to the created node.","locations":[{"ref":"src/baobab-chart.vala:291-305","code":"  291 |         unowned List<ChartItem> add_item (uint depth, double rel_start, double rel_size, Scanner.Results results) {\n  292 |             var item = create_new_chartitem ();\n  293 |             item.depth = depth;\n  294 |             item.rel_start = rel_start;\n  295 |             item.rel_size = rel_size;\n  296 |             item.visible = false;\n  297 |             item.has_visible_children = false;\n  298 |             item.results = results;\n  299 |             item.parent = null;\n  300 | \n  301 |             items.prepend (item);\n  302 | \n  303 |             unowned List<ChartItem> ret = items;\n  304 |             return ret;\n  305 |         }","lines":15,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L291-305"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"draw_func decides whether to rebuild items by comparing items.data.results to tree_root. After get_items, items.reverse() is called so items.data is the LAST-added item (deepest), not the root. The intent (detect that the displayed root changed) compares against the wrong element; the guard is unreliable and may rebuild unnecessarily or fail to detect a root change, relying on model_changed to mask it.","fix":"Store the current root path explicitly (a member) and compare against it instead of inspecting items.data after reversal.","locations":[{"ref":"src/baobab-chart.vala:381-394","code":"  381 |         void draw_func (Gtk.DrawingArea da, Cairo.Context cr, int width, int height) {\n  382 |             if (model != null) {\n  383 |                 if (model_changed || items == null) {\n  384 |                     get_items (tree_root);\n  385 |                 } else {\n  386 |                     var current_path = items.data.results;\n  387 |                     if (tree_root != current_path) {\n  388 |                         get_items (tree_root);\n  389 |                     }\n  390 |                 }\n  391 | \n  392 |                 draw_chart (cr);\n  393 |             }\n  394 |         }","lines":14,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L381-394"},{"ref":"src/baobab-chart.vala:348","code":"  348 |             items.reverse ();","lines":1,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L348"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"interpolate_colors hardcodes color.alpha = 1.0, discarding the alpha of both input colors. While current palette colors are opaque, the function name implies a general interpolation; any future translucent chart color would be silently forced opaque.","fix":"Interpolate alpha too: color.alpha = colora.alpha - (colora.alpha-colorb.alpha)*percentage.","locations":[{"ref":"src/baobab-chart.vala:396-410","code":"  396 |         Gdk.RGBA interpolate_colors (Gdk.RGBA colora, Gdk.RGBA colorb, float percentage) {\n  397 |             var color = Gdk.RGBA ();\n  398 | \n  399 |             float diff;\n  400 | \n  401 |             diff = colora.red - colorb.red;\n  402 |             color.red = colora.red - diff * percentage;\n  403 |             diff = colora.green - colorb.green;\n  404 |             color.green = colora.green - diff * percentage;\n  405 |             diff = colora.blue - colorb.blue;\n  406 |             color.blue = colora.blue - diff * percentage;\n  407 | \n  408 |             color.alpha = (float) 1.0;\n  409 | \n  410 |             return color;","lines":15,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L396-410"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ContentsCell.format_items_cb returns \"\" for ERROR state and for items < 0, but does NOT special-case CHILD_ERROR or the case where item is a file (not a folder). SizeCell returns \"\" only on ERROR. The two cells use inconsistent guards (ContentsCell also checks items < 0, SizeCell does not check size validity), so error/edge presentation differs between columns for the same row state.","fix":"Decide on one consistent policy for ERROR/CHILD_ERROR/invalid values and apply it in both cells (and TimeModifiedCell, which only guards item == null).","locations":[{"ref":"src/baobab-contents-cell.vala:27-33","code":"   27 |         [GtkCallback]\n   28 |         private string format_items_cb (int items) {\n   29 |             if (item == null || items < 0 || item.state == Scanner.State.ERROR)\n   30 |                 return \"\";\n   31 | \n   32 |             return format_items (items);\n   33 |         }","lines":7,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-contents-cell.vala#L27-33"},{"ref":"src/baobab-size-cell.vala:27-33","code":"   27 |         [GtkCallback]\n   28 |         private string format_size_cb (uint64 size) {\n   29 |             if (item == null || item.state == Scanner.State.ERROR)\n   30 |                 return \"\";\n   31 | \n   32 |             return format_size (size);\n   33 |         }","lines":7,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-size-cell.vala#L27-33"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"populate_recent uses recent_items.remove_link(iter) while iterating, and earlier nth(MAX_RECENT_LOCATIONS-1) followed by last.next = null to truncate the list. remove_link on an unowned iter detaches the link but the GLib.List ownership semantics here are subtle: recent_items is the owning head; remove_link returns the new head which is ignored. If the removed link is the head itself, recent_items still points at the (now detached) old head, corrupting subsequent iteration/sort. The head-removal case is not handled.","fix":"Capture the return of remove_link to update the head (recent_items = recent_items.remove_link(iter)) or filter into a fresh list rather than mutating during iteration.","locations":[{"ref":"src/baobab-location-list.vala:247-272","code":"  247 |         void populate_recent () {\n  248 |             Gtk.RecentManager recent_manager = Gtk.RecentManager.get_default ();\n  249 |             List<Gtk.RecentInfo> recent_items = recent_manager.get_items ();\n  250 | \n  251 |             unowned List<Gtk.RecentInfo> iter = recent_items;\n  252 |             while (iter != null) {\n  253 |                 unowned List<Gtk.RecentInfo> next = iter.next;\n  254 |                 if (!iter.data.has_group (\"baobab\") || !iter.data.exists () || already_present (File.new_for_uri (iter.data.get_uri ()))) {\n  255 |                     recent_items.remove_link (iter);\n  256 |                 }\n  257 |                 iter = next;\n  258 |             }\n  259 | \n  260 |             recent_items.sort ((a, b) => {\n  261 |                 return (int)(b.get_modified ().difference (a.get_modified ()));\n  262 |             });\n  263 | \n  264 |             unowned List<Gtk.RecentInfo> last = recent_items.nth (MAX_RECENT_LOCATIONS - 1);\n  265 |             if (last != null) {\n  266 |                 last.next = null;\n  267 |             }\n  268 | \n  269 |             foreach (var info in recent_items) {\n  270 |                 locations.append (new Location.for_recent_info (info));\n  271 |             }\n  272 |         }","lines":26,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-location-list.vala#L247-272"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In Location.for_main_volume, get_hostname() may throw and name is set to null in the catch, then the null check substitutes _(\"Computer\"). That is fine. But Location.from_mount calls Uri.parse_scheme (file.get_uri ()) where file comes from mount.get_root (); if a mount's root were null (some GMount implementations can return null), file.get_uri() is a null dereference. from_mount does not null-check file before using it, unlike other paths.","fix":"Null-check file after mount.get_root () in fill_from_mount / from_mount before calling get_uri(), and handle the null-root case gracefully.","locations":[{"ref":"src/baobab-location.vala:91-98","code":"   91 |         public Location.from_mount (Mount mount_) {\n   92 |             mount = mount_;\n   93 |             fill_from_mount ();\n   94 | \n   95 |             var uri_scheme = Uri.parse_scheme (file.get_uri ());\n   96 |             string[] remote_schemes = { \"ftp\", \"sftp\", \"ssh\", \"smb\", \"google-drive\", \"afp\" };\n   97 |             is_remote = (uri_scheme in remote_schemes);\n   98 |         }","lines":8,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-location.vala#L91-98"},{"ref":"src/baobab-location.vala:165-176","code":"  165 |         void fill_from_mount () {\n  166 |             name = mount.get_name ();\n  167 |             icon = mount.get_icon ();\n  168 |             symbolic_icon = mount.get_symbolic_icon ();\n  169 |             file = mount.get_root ();\n  170 | \n  171 |             if (file != null && file.equal (File.new_for_path (Environment.get_home_dir ()))) {\n  172 |                 make_this_home_location ();\n  173 |             }\n  174 | \n  175 |             scanner = new Scanner (file, ScanFlags.EXCLUDE_MOUNTS);\n  176 |         }","lines":12,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-location.vala#L165-176"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Pathbar.path setter builds the breadcrumb by walking parents with GLib.List.prepend in a do/while loop, then renders. The `is_current_dir` flag is true only for the first (deepest) node and make_button only connects a click handler when `!is_current_dir`, so the current d
