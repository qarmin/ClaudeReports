irectory button is non-clickable - intended. However make_button treats `path.get_depth() == 1` as the root and substitutes location.name/icon; if a non-root node happens to have depth computed as 1 due to a detached parent chain (parent set null mid-scan), the wrong label/icon is shown. Minor display correctness issue tied to the scanner setting parent links from a worker thread.","fix":"Distinguish 'is location root' from 'depth==1' explicitly, e.g. compare the node against location.scanner.root rather than inferring from depth.","locations":[{"ref":"src/baobab-pathbar.vala:103-164","code":"  103 |         public new Scanner.Results path {\n  104 |             set {\n  105 |                 if (location == null || location.scanner == null) {\n  106 |                     return;\n  107 |                 }\n  108 | \n  109 |                 clear ();\n  110 | \n  111 |                 Scanner.Results path_tmp = value;\n  112 | \n  113 |                 List<PathButton> buttons = null;\n  114 | \n  115 |                 // The path will be set to null while scanning the location, but\n  116 |                 // we still want to display a button for the location's root.\n  117 |                 bool is_current_dir = true;\n  118 |                 do {\n  119 |                     buttons.prepend (make_button (path_tmp, is_current_dir));\n  120 |                     path_tmp = path_tmp.parent;\n  121 |                     is_current_dir = false;\n  122 |                 } while (path_tmp != null);\n  123 | \n  124 |                 bool first_directory = true;\n  125 |                 foreach (var button in buttons) {\n  126 |                     Gtk.Box box = new Gtk.Box(Gtk.Orientation.HORIZONTAL, 0);\n  127 |                     if (!first_directory) {\n  128 |                         Gtk.Label label = new Gtk.Label (GLib.Path.DIR_SEPARATOR_S);\n  129 |                         label.add_css_class (\"dim-label\");\n  130 |                         box.append (label);\n  131 |                     }\n  132 |                     box.append (button);\n  133 |                     button_box.append (box);\n  134 |                     first_directory = false;\n  135 |                 }\n  136 |             }\n  137 |         }\n  138 | \n  139 |         void clear () {\n  140 |             for (Gtk.Widget? child = button_box.get_first_child (); child != null; child = button_box.get_first_child ()) {\n  141 |                 button_box.remove (child);\n  142 |             }\n  143 |         }\n  144 | \n  145 |         PathButton make_button (Scanner.Results? path, bool is_current_dir) {\n  146 |             string label;\n  147 |             Icon? gicon = null;\n  148 | \n  149 |             if (path == null || path.get_depth () == 1) {\n  150 |                 label = location.name;\n  151 |                 gicon = location.symbolic_icon;\n  152 |             } else {\n  153 |                 label = path.display_name;\n  154 |             }\n  155 | \n  156 |             var button = new PathButton (label, gicon, is_current_dir);\n  157 |             if (path != null && !is_current_dir) {\n  158 |                 button.clicked.connect (() => {\n  159 |                     item_activated (path);\n  160 |                 });\n  161 |             }\n  162 | \n  163 |             return button;\n  164 |         }","lines":62,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-pathbar.vala#L103-164"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ProgressCell.fraction setter calls notify_property (\"fraction\") manually but the property is annotated [CCode(notify = false)]. update_text() is also called inside the setter before notify. If the property is data-bound (e.g. via Gtk expression in the .ui), the manual notify is required, but the early-return on _fraction == clamped_value compares doubles for exact equality; tiny floating-point differences in incoming fraction values will still re-run update_text/notify unnecessarily, while genuinely-equal-after-clamp updates are dropped. The bigger concern: comparing _fraction (already clamped) to clamped_value is correct, but the get accessor returns _fraction so external reads are clamped silently with no way to detect the clamp.","fix":"This is mostly acceptable; if precise change detection matters, compare with a small epsilon. Otherwise no change needed - documented here as a minor robustness note.","locations":[{"ref":"src/baobab-progress-cell.vala:27-44","code":"   27 |         [CCode(notify = false)]\n   28 |         public double fraction {\n   29 |             set {\n   30 |                 var clamped_value = value.clamp (0.0, 1.0);\n   31 |                 if (_fraction == clamped_value)\n   32 |                     return;\n   33 | \n   34 |                 _fraction = clamped_value;\n   35 | \n   36 |                 update_text ();\n   37 | \n   38 |                 notify_property (\"fraction\");\n   39 |                 queue_allocate ();\n   40 |             }\n   41 |             get {\n   42 |                 return _fraction;\n   43 |             }\n   44 |         }","lines":18,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-progress-cell.vala#L27-44"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"snapshot() pushes a clip rect computed as get_width () * fraction even when progress is not visible (fraction == 0 gives a zero-width clip, which is harmless, but the alt_label is always snapshotted under a clip whose width tracks fraction independently of progress.visible). When fraction is 0 the in-progress alt_label is clipped to zero width (correct), but the trough/label path and the progress-visible gating in size_allocate use progress.visible while snapshot uses the raw fraction, so the two code paths can momentarily disagree about whether progress should be shown (e.g. progress.visible toggles in update_text only on _fraction > 0.0).","fix":"Gate the alt_label clip/snapshot on progress.visible (or _fraction > 0.0) consistently with size_allocate and update_text, and skip pushing the clip entirely when there is nothing to show.","locations":[{"ref":"src/baobab-progress-cell.vala:107-118","code":"  107 |         protected override void snapshot (Gtk.Snapshot snapshot) {\n  108 |             snapshot_child (trough, snapshot);\n  109 |             snapshot_child (label, snapshot);\n  110 |             snapshot_child (progress, snapshot);\n  111 | \n  112 |             Graphene.Rect rect = {};\n  113 |             rect.init (0, 0, (float) (get_width () * fraction), get_height ());\n  114 | \n  115 |             snapshot.push_clip (rect);\n  116 |             snapshot_child (alt_label, snapshot);\n  117 |             snapshot.pop ();\n  118 |         }","lines":12,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-progress-cell.vala#L107-118"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_item_rectangle in Ringschart misuses Gdk.Rectangle fields as min/max accumulators: get_point_min_rect stores the max x in rect.width and max y in rect.height, then after the cardinal-axis adjustments rect.width -= rect.x / rect.height -= rect.y converts them to extents. The four cardinal checks compare against rect.x/rect.y/rect.width/rect.height that are still in mixed min/max state, and they use double.max/min on ints that were just truncated, so the bounding rect can be off by up to a pixel and miscomputed when a sector spans an axis. This rect is used for tooltip tip area and hit hints.","fix":"Use clearly named min_x/min_y/max_x/max_y doubles, take ceil/floor at the end, then set rect.width = max_x-min_x, rect.height = max_y-min_y.","locations":[{"ref":"src/baobab-ringschart.vala:337-392","code":"  337 |         void get_point_min_rect (double cx, double cy, double radius, double angle, ref Gdk.Rectangle r) {\n  338 |             double x, y;\n  339 |             x = cx + Math.cos (angle) * radius;\n  340 |             y = cy + Math.sin (angle) * radius;\n  341 | \n  342 |             r.x = int.min (r.x, (int)x);\n  343 |             r.y = int.min (r.y, (int)y);\n  344 |             r.width = int.max (r.width, (int)x);\n  345 |             r.height = int.max (r.height, (int)y);\n  346 |         }\n  347 | \n  348 |         protected override void get_item_rectangle (ChartItem item) {\n  349 |             RingschartItem ringsitem = item as RingschartItem;\n  350 |             Gdk.Rectangle rect = Gdk.Rectangle ();\n  351 |             double cx, cy, r1, r2, a1, a2;\n  352 |             Gtk.Allocation allocation;\n  353 | \n  354 |             get_allocation (out allocation);\n  355 |             cx = allocation.width / 2;\n  356 |             cy = allocation.height / 2;\n  357 |             r1 = ringsitem.min_radius;\n  358 |             r2 = ringsitem.max_radius;\n  359 |             a1 = ringsitem.start_angle;\n  360 |             a2 = ringsitem.start_angle + ringsitem.angle;\n  361 | \n  362 |             rect.x = allocation.width;\n  363 |             rect.y = allocation.height;\n  364 |             rect.width = 0;\n  365 |             rect.height = 0;\n  366 | \n  367 |             get_point_min_rect (cx, cy, r1, a1, ref rect);\n  368 |             get_point_min_rect (cx, cy, r2, a1, ref rect);\n  369 |             get_point_min_rect (cx, cy, r1, a2, ref rect);\n  370 |             get_point_min_rect (cx, cy, r2, a2, ref rect);\n  371 | \n  372 |             if ((a1 <= Math.PI / 2) && (a2 >= Math.PI / 2)) {\n  373 |                 rect.height = (int) double.max (rect.height, cy + Math.sin (Math.PI / 2) * r2);\n  374 |             }\n  375 | \n  376 |             if ((a1 <= Math.PI) && (a2 >= Math.PI)) {\n  377 |                 rect.x = (int) double.min (rect.x, cx + Math.cos (Math.PI) * r2);\n  378 |             }\n  379 | \n  380 |             if ((a1 <= Math.PI * 1.5) && (a2 >= Math.PI * 1.5)) {\n  381 |                 rect.y = (int) double.min (rect.y, cy + Math.sin (Math.PI * 1.5) * r2);\n  382 |             }\n  383 | \n  384 |             if ((a1 <= Math.PI * 2) && (a2 >= Math.PI * 2)) {\n  385 |                 rect.width = (int) double.max (rect.width, cx + Math.cos (Math.PI * 2) * r2);\n  386 |             }\n  387 | \n  388 |             rect.width -= rect.x;\n  389 |             rect.height -= rect.y;\n  390 | \n  391 |             ringsitem.rect = rect;\n  392 |         }","lines":56,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-ringschart.vala#L337-392"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_file builds the ancestor name list with names.prepend in a loop, then iterates foreach (var name in names.next), deliberately skipping the first list element (the root's own name, which corresponds to 'directory'). This relies on names being non-null and on prepend's auto-reassign semantics. If results were ever null the for-loop body never runs and names stays null, then names.next dereferences a null List head. The single skipped element is also implicit and fragile - a reader can easily break it. It works for current callers but is not robust.","fix":"Guard for empty list and make the root-skip explicit, e.g. iterate from names.next only after asserting names != null, or build the path by walking parents directly and stopping before the root rather than slicing with names.next.","locations":[{"ref":"src/baobab-scanner.vala:55-68","code":"   55 |         public File get_file (Results results) {\n   56 |             List<string> names = null;\n   57 | \n   58 |             for (Results? child = results; child != null; child = child.parent) {\n   59 |                 names.prepend (child.name);\n   60 |             }\n   61 | \n   62 |             var file = directory;\n   63 |             foreach (var name in names.next) {\n   64 |                 file = file.get_child (name);\n   65 |             }\n   66 | \n   67 |             return file;\n   68 |         }","lines":14,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-scanner.vala#L55-68"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"TimeModifiedCell.format_time_approximate_cb only guards item == null and otherwise always formats the time, even when item.state == ERROR (where the mtime may be 0/garbage). SizeCell and ContentsCell both suppress output on ERROR, so an errored row can show a stale/'Unknown' time while its size/contents are blank, an inconsistent presentation.","fix":"Also return \"\" when item.state == Scanner.State.ERROR, matching SizeCell/ContentsCell.","locations":[{"ref":"src/baobab-time-modified-cell.vala:27-33","code":"   27 |         [GtkCallback]\n   28 |         private string format_time_approximate_cb (uint64 time) {\n   29 |             if (item == null)\n   30 |                 return \"\";\n   31 | \n   32 |             return format_time_approximate (time);\n   33 |         }","lines":7,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-time-modified-cell.vala#L27-33"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"scan_in_thread wraps the root query_info / add_directory / queue push in a try block whose catch body is completely empty. If directory.query_info() throws (e.g. permission denied, path does not exist, cancelled), the error is silently discarded: no ResultsArray is ever pushed, this.root is never set, scan_error is never set, and process_results never reaches the parent==null branch, so completed() is never emitted and the spinner/UI hangs forever. The user gets a permanently scanning state with no error reported. finish() also will not throw because scan_error stays null.","fix":"In the catch, store the error (e.g. scan_error = e or create an empty root Results with error set and push it) and ensure completed() is eventually emitted on the main thread. At minimum set scan_error = (owned) e and push a sentinel so process_results emits completed().","locations":[{"ref":"src/baobab-scanner.vala:335-350","code":"  335 |         void* scan_in_thread () {\n  336 |             try {\n  337 |                 var array = new ResultsArray ();\n  338 |                 var info = directory.query_info (ATTRIBUTES, 0, cancellable);\n  339 | \n  340 |                 // Use allocated size if available, where availability is defined as allocated size > 0\n  341 |                 // for the root element. This is consistent with how we attribute sizes in the Results structure\n  342 |                 show_allocated_size = info.get_attribute_uint64 (FileAttribute.STANDARD_ALLOCATED_SIZE) > 0;\n  343 | \n  344 |                 unix_device = info.get_attribute_uint32 (FileAttribute.UNIX_DEVICE);\n  345 |                 var results = add_directory (directory, info);\n  346 |                 results.percent = 100.0;\n  347 |                 array.results += (owned) results;\n  348 |                 results_queue.push ((owned) array);\n  349 |             } catch (Error e) {\n  350 |             }","lines":16,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-scanner.vala#L335-350"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"set_ui_state() dereferences `active_location.name` in the non-home branch (`this.title = active_location.name;`). This is called from scanner_completed()/scan_location() where active_location is set, but it is a latent null deref if ever called for the result page while active_location is null. Coupled with the reload path above, the invariant 'active_location non-null whenever result_page is shown' is assumed but not enforced.","fix":"Either assert/guard active_location at the top of the else branch, or pass the location/title in explicitly rather than reading the field.","locations":[{"ref":"src/baobab-window.vala:578-593","code":"  578 |         void set_ui_state (Gtk.Widget child, bool busy) {\n  579 |             set_busy (busy);\n  580 | \n  581 |             if (child == home_page) {\n  582 |                 var action = lookup_action (\"reload\") as SimpleAction;\n  583 |                 action.set_enabled (false);\n  584 |                 this.title = _(\"Devices & Locations\");\n  585 |                 nav_view.pop ();\n  586 |             } else {\n  587 |                 var action = lookup_action (\"reload\") as SimpleAction;\n  588 |                 action.set_enabled (true);\n  589 |                 this.title = active_location.name;\n  590 |                 if (nav_view.visible_page != result_page) {\n  591 |                     nav_view.push_by_tag (\"results\");\n  592 |                 }\n  593 |             }","lines":16,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L578-593"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"handle_local_options prints the version using Environment.get_application_name (), but the application name is never set via set_application_name() in this codebase (only Adw.AboutDialog sets a local application_name property at window.vala:262). At this early point get_application_name() typically falls back to the program name or returns null, so 'baobab --version' may print an unexpected or empty name before the version string.","fix":"Call GLib.Environment.set_application_name (_(\"Disk Usage Analyzer\")) in the constructor/startup, or print a fixed literal (e.g. \"baobab %s\") in the version output instead of relying on get_application_name ().","locations":[{"ref":"src/baobab-application.vala:86-90","code":"   86 |         protected override int handle_local_options (GLib.VariantDict options) {\n   87 |             if (options.contains(\"version\")) {\n   88 |                 print (\"%s %s\\n\", Environment.get_application_name (), Config.VERSION);\n   89 |                 return 0;\n   90 |             }","lines":5,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-application.vala#L86-90"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Numerous Gdk.RGBA.parse() calls ignore their bool return value (chart_colors setup, get_item_color #d3d6d1/#e0e2dd). If a literal were ever mistyped the color silently stays default-zero (transparent black) rather than failing visibly. Minor, but these are unchecked API calls.","fix":"These are constant literals; either assert the parse result in a test/debug build or document that they are known-valid.","locations":[{"ref":"src/baobab-chart.vala:249-254","code":"  249 |             chart_colors[0].parse(\"#e01b24\");\n  250 |             chart_colors[1].parse(\"#ff7800\");\n  251 |             chart_colors[2].parse(\"#f6d32d\");\n  252 |             chart_colors[3].parse(\"#33d17a\");\n  253 |             chart_colors[4].parse(\"#3584e4\");\n  254 |             chart_colors[5].parse(\"#9141ac\");","lines":6,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L249-254"},{"ref":"src/baobab-chart.vala:419","code":"  419 |                 color.parse(\"#d3d6d1\");","lines":1,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L419"},{"ref":"src/baobab-chart.vala:439","code":"  439 |                     color.parse(\"#e0e2dd\");","lines":1,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L439"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"queue_query_fs_usage's async completion handler has an empty catch (Error e) {} (line 213). Filesystem-info query failures are swallowed with no logging. Combined with the fact that size/used/reserved were reset to null just before, a transient error silently shows the location as having unknown usage with no diagnostic, making field debugging of remote-mount issues hard.","fix":"Log the error with debug()/warning() in the catch so failures are diagnosable, e.g. debug (\"fs usage query failed: %s\", e.message).","locations":[{"ref":"src/baobab-location.vala:213-214","code":"  213 |                 } catch (Error e) {\n  214 |                 }","lines":2,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-location.vala#L213-214"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"add_children's enumerate_children / next_file errors are caught in add_directory (lines 313-317) and stored on results.error, which is reasonable, but the GFileEnumerator returned by enumerate_children is never explicitly closed. When next_file throws mid-enumeration or the loop ends, the enumerator is only closed by GC finalization, not promptly. For deep scans with many directories this leaks open directory file descriptors until the enumerator objects are collected, which can exhaust the fd limit on large filesystems.","fix":"Explicitly call children.close (cancellable) in a finally-style block (Vala try/catch) after the while loop, or after catching the error, to release the fd promptly.","locations":[{"ref":"src/baobab-scanner.vala:252-294","code":"  252 |         void add_children (File directory, Results results, ResultsArray results_array) throws Error {\n  253 |             var children = directory.enumerate_children (ATTRIBUTES, FileQueryInfoFlags.NOFOLLOW_SYMLINKS, cancellable);\n  254 |             FileInfo? child_info;\n  255 |             while ((child_info = children.next_file (cancellable)) != null) {\n  256 |                 switch (child_info.get_file_type ()) {\n  257 |                     case FileType.DIRECTORY:\n  258 |                         var child = directory.get_child (child_info.get_name ());\n  259 |                         var child_results = add_directory (child, child_info, results);\n  260 | \n  261 |                         if (child_results != null) {\n  262 |                             results.update_with_child (child_results);\n  263 |                             results_array.results += (owned) child_results;\n  264 |                         }\n  265 |                         break;\n  266 | \n  267 |                     case FileType.REGULAR:\n  268 |                         if (child_info.has_attribute (FileAttribute.UNIX_NLINK)) {\n  269 |                             if (child_info.get_attribute_uint32 (FileAttribute.UNIX_NLINK) > 1) {\n  270 |                                 var hl = new HardLink (child_info);\n  271 | \n  272 |                                 // check if we've already encountered this file\n  273 |                                 if (hl in hardlinks) {\n  274 |                                     continue;\n  275 |                                 }\n  276 | \n  277 |                                 hardlinks.add ((owned) hl);\n  278 |                             }\n  279 | \n  280 |                         }\n  281 | \n  282 |                         var child_results = new Results (child_info, results);\n  283 |                         total_size += child_results.size;\n  284 |                         total_elements++;\n  285 |                         results.update_with_child (child_results);\n  286 |                         results_array.results += (owned) child_results;\n  287 |                         break;\n  288 | \n  289 |                     default:\n  290 |                         // ignore other types (symlinks, sockets, devices, etc)\n  291 |                         break;\n  292 |                 }\n  293 |             }\n  294 |         }","lines":43,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-scanner.vala#L252-294"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"row_activated casts row to LocationRow with 'as' and immediately dereferences location_widget.location without a null check. If a non-LocationRow row ever ends up in either ListBox (e.g. a placeholder/header row), the 'as' cast returns null and this is an immediate null-dereference crash. Vala 'as' casts can return null and must be checked.","fix":"Check for null: var location_widget = row as LocationRow; if (location_widget != null && location_widget.location != null) location_activated (location_widget.location);","locations":[{"ref":"src/baobab-location-list.vala:274-277","code":"  274 |         void row_activated (Gtk.ListBoxRow row) {\n  275 |             var location_widget = row as LocationRow;\n  276 |             location_activated (location_widget.location);\n  277 |         }","lines":4,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-location-list.vala#L274-277"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"In Pathbar.path setter, `List<PathButton> buttons = null;` then `buttons.prepend(...)` relies on Vala auto-reassigning the list head. This works, but the result of prepend is discarded syntactically (Vala rewrites it). It is correct here but fragile: any refactor that changes prepend to a context where auto-reassign does not apply silently loses elements. Worth a terse note that the return value is load-bearing.","fix":"Optionally make the reassignment explicit (`buttons = buttons.prepend(...)` is not valid for unowned-head; keep as-is) but add a one-line comment that Vala auto-reassigns the list head, so the statement must not be 'simplified'.","locations":[{"ref":"src/baobab-pathbar.vala:113-122","code":"  113 |                 List<PathButton> buttons = null;\n  114 | \n  115 |                 // The path will be set to null while scanning the location, but\n  116 |                 // we still want to display a button for the location's root.\n  117 |                 bool is_current_dir = true;\n  118 |                 do {\n  119 |                     buttons.prepend (make_button (path_tmp, is_current_dir));\n  120 |                     path_tmp = path_tmp.parent;\n  121 |                     is_current_dir = false;\n  122 |                 } while (path_tmp != null);","lines":10,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-pathbar.vala#L113-122"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"PreferencesDialog uses Gtk.FileChooserNative, which is deprecated in GTK 4.10+ in favor of Gtk.FileDialog. FileChooserNative.response/destroy pattern here also requires manual lifecycle management; the native chooser is created on each row activation.","fix":"Migrate to Gtk.FileDialog (select_folder async) which returns the chosen File via a callback and manages its own lifetime.","locations":[{"ref":"src/baobab-preferences-dialog.vala:51-67","code":"   51 |                 var file_chooser = new Gtk.FileChooserNative (_(\"Select Location to Ignore\"),\n   52 |                                                               (Gtk.Window) this.get_root (),\n   53 |                                                                Gtk.FileChooserAction.SELECT_FOLDER,\n   54 |                                                                null, null);\n   55 | \n   56 |                 file_chooser.modal = true;\n   57 | \n   58 |                 file_chooser.response.connect ((response) => {\n   59 |                     if (response == Gtk.ResponseType.ACCEPT) {\n   60 |                         var uri = file_chooser.get_file ().get_uri ();\n   61 |                         add_uri (uri);\n   62 |                         populate ();\n   63 |                     }\n   64 |                     file_chooser.destroy ();\n   65 |                 });\n   66 | \n   67 |                 file_chooser.show ();","lines":17,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-preferences-dialog.vala#L51-67"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"These widgets use the GTK3-era get_allocation()/get_style_context()/render_* APIs and Cairo set_draw_func inside GTK4. get_allocation is deprecated in GTK4 (use get_width()/get_height()) and Gtk.StyleContext.render_* are deprecated; relying on them risks breakage and ignores scale/snapshot integration. Called on essentially every draw and geometry pass.","fix":"Migrate to get_width()/get_height() and the GtkSnapshot / non-deprecated style APIs where feasible.","locations":[{"ref":"src/baobab-ringschart.vala:104-108","code":"  104 |             Gtk.Allocation allocation;\n  105 |             get_allocation (out allocation);\n  106 | \n  107 |             var q_width = allocation.width / 2;\n  108 |             var q_height = allocation.height / 2;","lines":5,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-ringschart.vala#L104-108"},{"ref":"src/baobab-ringschart.vala:237-245","code":"  237 |             Gtk.Allocation allocation;\n  238 |             get_allocation (out allocation);\n  239 | \n  240 |             var context = get_style_context ();\n  241 | \n  242 |             Gdk.RGBA border_color;\n  243 |             Gdk.RGBA bg_color;\n  244 |             context.lookup_color (\"chart_borders\", out border_color);\n  245 |             context.lookup_color (\"theme_bg_color\", out bg_color);","lines":9,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-ringschart.vala#L237-245"},{"ref":"src/baobab-chart.vala:256","code":"  256 |             set_draw_func (draw_func);","lines":1,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-chart.vala#L256"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"While drawing subtips, draw_item calls subtip_items.append(item) for every matching child. GLib.List.append walks to the tail each call, so building the subtip list is O(n^2) in the number of children, executed inside the draw path. For directories with many children this is a measurable redraw cost.","fix":"Use subtip_items.prepend(item) (O(1)) and reverse once after the draw loop, or accumulate into an array/queue.","locations":[{"ref":"src/baobab-ringschart.vala:231","code":"  231 |                     subtip_items.append (item);","lines":1,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-ringschart.vala#L231"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"get_excluded_locations constructs a brand new Settings object ('org.gnome.baobab.preferences') on every call. It is invoked once per scan start (baobab-scanner.vala:423), and PreferencesDialog also creates its own separate Settings instance. Repeatedly instantiating GSettings is wasteful and means the two components do not share a single settings object.","fix":"Cache a single Settings instance as a member of Application (lazily or in construct) and reuse it in get_excluded_locations ().","locations":[{"ref":"src/baobab-application.vala:64-73","code":"   64 |         public GenericSet<string> get_excluded_locations () {\n   65 |             var excluded_locations = new GenericSet<string> (str_hash, str_equal);\n   66 | \n   67 |             var prefs_settings = new Settings (\"org.gnome.baobab.preferences\");\n   68 |             foreach (var uri in prefs_settings.get_strv (\"excluded-uris\")) {\n   69 |                 excluded_locations.add (uri);\n   70 |             }\n   71 | \n   72 |             return excluded_locations;\n   73 |         }","lines":10,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-application.vala#L64-73"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"process_results runs on a 100ms Timeout polling the AsyncQueue. Each tick drains everything available, but for very large scans the main thread can be flooded inserting thousands of children into ListStores in one tick (no batching/yield), causing UI jank. Conversely, the 100ms fixed interval adds up to 100ms latency to the final completed() emission after the worker finishes. Minor, but a glib idle with queue-pop signalling would be smoother than fixed polling.","fix":"Consider an event-driven dispatch (e.g. push a g_idle / GSourceFunc from the worker via the main context) instead of fixed 100ms polling, and/or cap inserts per tick.","locations":[{"ref":"src/baobab-scanner.vala:357-395","code":"  357 |         bool process_results () {\n  358 |             while (true) {\n  359 |                 var results_array = results_queue.try_pop ();\n  360 | \n  361 |                 if (results_array == null) {\n  362 |                     break;\n  363 |                 }\n  364 | \n  365 |                 foreach (unowned Results results in results_array.results) {\n  366 |                     if (results.parent != null) {\n  367 |                         results.parent.children_list_store.insert (0, results);\n  368 |                     }\n  369 | \n  370 |                     State state;\n  371 |                     if (results.child_error) {\n  372 |                         results.state = State.CHILD_ERROR;\n  373 |                     } else if (results.error != null) {\n  374 |                         results.state = State.ERROR;\n  375 |                     } else {\n  376 |                         results.state = State.DONE;\n  377 |                     }\n  378 | \n  379 |                     if (results.max_depth > max_depth) {\n  380 |                         max_depth = results.max_depth;\n  381 |                     }\n  382 | \n  383 |                     // We reached the root, we're done\n  384 |                     if (results.parent == null) {\n  385 |                         this.root = results;\n  386 |                         scan_error = results.error;\n  387 |                         successful = true;\n  388 |                         completed ();\n  389 |                         return false;\n  390 |                     }\n  391 |                 }\n  392 |             }\n  393 | \n  394 |             return this.self != null;\n  395 |         }","lines":39,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-scanner.vala#L357-395"},{"ref":"src/baobab-scanner.vala:439-445","code":"  439 |                 process_result_idle = Timeout.add (100, () => {\n  440 |                         bool res = process_results();\n  441 |                         if (!res) {\n  442 |                             process_result_idle = 0;\n  443 |                         }\n  444 |                         return res;\n  445 |                     });","lines":7,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-scanner.vala#L439-445"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"A large commented-out block (scanner_has_first_row / reroot_when_scanner_not_empty) referencing the old Gtk.TreeModel API remains in baobab-window.vala. It is stale dead code referencing APIs no longer used (the code now uses ListStore/TreeListModel) and only adds noise.","fix":"Delete the commented-out block.","locations":[{"ref":"src/baobab-window.vala:596-609","code":"  596 |         /*void scanner_has_first_row (Gtk.TreeModel model, Gtk.TreePath path, Gtk.TreeIter iter) {\n  597 |             model.row_has_child_toggled.disconnect (scanner_has_first_row);\n  598 |             reroot_treeview (path);\n  599 |         }\n  600 | \n  601 |         void reroot_when_scanner_not_empty () {\n  602 |             Gtk.TreeIter first;\n  603 | \n  604 |             if (active_location.scanner.get_iter_first (out first)) {\n  605 |                 reroot_treeview (new Gtk.TreePath.first ());\n  606 |             } else {\n  607 |                 active_location.scanner.row_has_child_toggled.connect (scanner_has_first_row);\n  608 |             }\n  609 |         }*/","lines":14,"link":"https://gitlab.gnome.org/GNOME/baobab/-/blob/de1abfe9f1666b205db6a9ff091eff7f6afd5885/src/baobab-window.vala#L596-609"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"scroll_cb comment says 'Up or to the left' for the branch dx > 0.0 || dy < 0.0, but dx > 0.0 is a scroll to the RIGHT, not the left (dy < 0.0 is up). The other branch's comment 'Down or to the right' is likewise wrong for dx < 0.0 (left). The horizontal handling is also arguably inverted relative to the comment's intent.","fix":"Correct the comments (and decide intended horizontal mapping): dx>0 is right, dx<0 is left.","locations":[{"ref":"src/baobab- eMode.END);\n  137 |                 Pango.Rectangle layout_rect;\n  138 |                 layout.get_pixel_extents (null, out layout_rect);\n  139 | \n  140 |                 // get the center point of the tooltip rectangle\n  141 |                 double tip_x, tip_y;\n  142 |                 if (middle_angle_n < q_angle) {\n  143 |                     tip_x = q_width - layout_rect.width / 2 - hpadding;\n  144 |                     tip_y = Math.tan (middle_angle_n) * tip_x;\n  145 |                 } else {\n  146 |                     tip_y = q_height - layout_rect.height / 2 - vpadding;\n  147 |                     tip_x = tip_y / Math.tan (middle_angle_n);\n  148 |                 }\n  149 | \n  150 |                 // get the tooltip rectangle\n  151 |                 Cairo.Rectangle tooltip_rect = Cairo.Rectangle ();\n  152 |                 tooltip_rect.x = q_width + tip_x - layout_rect.width / 2 - padding.left;\n  153 |                 tooltip_rect.y = q_height + tip_y - layout_rect.height / 2 - padding.top;\n  154 |                 tooltip_rect.width = layout_rect.width + hpadding;\n  155 |                 tooltip_rect.height = layout_rect.height + vpadding;\n  156 | \n  157 |                 // translate tooltip rectangle and edge angles to the original quadrant\n  158 |                 var a = middle_angle;\n  159 |                 int i = 0;\n  160 |                 while (a > Math.PI / 2) {\n  161 |                     if (i % 2 == 0) {\n  162 |                         tooltip_rect.x = allocation.width - tooltip_rect.x - tooltip_rect.width;\n  163 |                     } else {\n  164 |                         tooltip_rect.y = allocation.height - tooltip_rect.y - tooltip_rect.height;\n  165 |                     }\n  166 |                     i++;\n  167 |                     a -= Math.PI / 2;\n  168 |                 }\n  169 | \n  170 |                 // get the Gdk.Rectangle of the tooltip (with a little padding)\n  171 |                 Gdk.Recta <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
