 is the mean distance of touches from their centroid; if two or more fingers report identical positions (reachable from raw device input), the denominator is 0.0 and `zoom_delta` becomes `inf` or `NaN` (0/0). The 2D variants have the same issue. A NaN/inf zoom factor then propagates into transforms and can corrupt downstream layout/painting.","fix":"Guard each division: `let zoom_delta = if state_previous.avg_distance > 0.0 { state.current.avg_distance / state_previous.avg_distance } else { 1.0 };` and likewise return 1.0 for the 2D components when the previous abs-distance is 0.0.","locations":[{"ref":"crates/egui/src/input_state/touch_state.rs:195-207","code":"  195 |             let zoom_delta = state.current.avg_distance / state_previous.avg_distance;\n  196 | \n  197 |             let zoom_delta_2d = match state.pinch_type {\n  198 |                 PinchType::Horizontal => Vec2::new(\n  199 |                     state.current.avg_abs_distance2.x / state_previous.avg_abs_distance2.x,\n  200 |                     1.0,\n  201 |                 ),\n  202 |                 PinchType::Vertical => Vec2::new(\n  203 |                     1.0,\n  204 |                     state.current.avg_abs_distance2.y / state_previous.avg_abs_distance2.y,\n  205 |                 ),\n  206 |                 PinchType::Proportional => Vec2::splat(zoom_delta),\n  207 |             };","lines":13}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ViewportCommand::requires_parent_repaint` returns true only for `Self::Close`. Other commands that affect the parent's view of a child viewport are not flagged, but more importantly the method's narrow definition is easy to silently break: adding a new parent-affecting command will not be caught, and there is no test asserting the set. This is fragile coupling between command semantics and repaint scheduling in `send_viewport_cmd_to`.","fix":"Document precisely why only `Close` requires a parent repaint, and add a test (or exhaustive `match`) so new variants force a deliberate decision.","locations":[{"ref":"crates/egui/src/viewport.rs:1235-1239","code":" 1235 |     /// This command requires the parent viewport to repaint.\n 1236 |     pub fn requires_parent_repaint(&self) -> bool {\n 1237 |         self == &Self::Close\n 1238 |     }\n 1239 | }","lines":5},{"ref":"crates/egui/src/context.rs:3920-3928","code":" 3920 |     pub fn send_viewport_cmd_to(&self, id: ViewportId, command: ViewportCommand) {\n 3921 |         self.request_repaint_of(id);\n 3922 | \n 3923 |         if command.requires_parent_repaint() {\n 3924 |             self.request_repaint_of(self.parent_viewport_id());\n 3925 |         }\n 3926 | \n 3927 |         self.write(|ctx| ctx.viewport_for(id).commands.push(command));\n 3928 |     }","lines":9}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`color_slider_2d` doc comment claims \"bottom-right: black `[s: 0.0, v: 1.0]`\" but bottom-right of the 2D area corresponds to s=1.0 (or high s) and v=0.0 (black), i.e. `[s: 1.0, v: 0.0]`. The listed values `[s: 0.0, v: 1.0]` are the same as top-left and are wrong; this misleads anyone using the documented `color_at` convention.","fix":"Correct the comment to describe bottom-right as `[s: 1.0, v: 0.0]` (black at full saturation, zero value), matching the actual axis mapping where y maps bottom->top as v 0->1.","locations":[{"ref":"crates/egui/src/widgets/color_picker.rs:200-201","code":"  200 | /// * top-right: fully saturated color `[s: 1.0, v: 1.0]`\n  201 | /// * bottom-right: black `[s: 0.0, v: 1.0].`","lines":2}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `DragValue::ui`, the on-hover explanation tooltip formats the value as `value as f32` while the comment says \"Show full precision value on-hover\". Casting an f64 to f32 truncates precision, directly contradicting the stated intent (the TODO on the same line acknowledges this). For f64-backed DragValues this shows a lower-precision number on hover than the widget actually holds.","fix":"Format the f64 directly (e.g. `format!(\"{value}\")` or with a chosen precision) instead of casting to f32, or remove the misleading comment if the f32 cast is intentional.","locations":[{"ref":"crates/egui/src/widgets/drag_value.rs:614-619","code":"  614 |             if ui.style().explanation_tooltips {\n  615 |                 response = response.on_hover_text(format!(\n  616 |                     \"{}\\nDrag to edit or click to enter a value.\\nPress 'Shift' while dragging for better control.\",\n  617 |                     value as f32, // Show full precision value on-hover. TODO(emilk): figure out f64 vs f32\n  618 |                 ));\n  619 |             }","lines":6}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Default `TextBuffer::clear` calls `self.delete_char_range(0..self.as_str().len())`, passing a byte length (`str::len`) where the trait contract specifies a character index/range. For multi-byte UTF-8 content the byte length exceeds the char count. Built-in impls override `clear()` and the default path is saved only because `byte_index_from_char_index` clamps out-of-range char indices, but a third-party `TextBuffer` whose `delete_char_range` slices directly would receive an out-of-bounds char index.","fix":"Use the character count for the range end: `self.delete_char_range(0..self.as_str().chars().count());`","locations":[{"ref":"crates/egui/src/widgets/text_edit/text_buffer.rs:56-58","code":"   56 |     fn clear(&mut self) {\n   57 |         self.delete_char_range(0..self.as_str().len());\n   58 |     }","lines":3}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`decrease_indentation` (Shift+Tab) deletes `len` indentation chars at `line_start` and then does `if *ccursor != line_start { *ccursor -= len; }`. If the caret sits strictly inside the removed indent (e.g. 2 chars into a 4-char indent), it still subtracts the full `len`, moving the caret before the line start (onto the previous line's content). The CCursor subtraction saturates so no panic, but the caret lands in the wrong place.","fix":"Clamp the shift to the distance actually before the cursor: only when `ccursor.index > line_start.index`, subtract `len.min(ccursor.index - line_start.index)`.","locations":[{"ref":"crates/egui/src/widgets/text_edit/text_buffer.rs:107-112","code":"  107 |         if let Some(len) = remove_len {\n  108 |             self.delete_char_range(line_start.index..(line_start.index + len));\n  109 |             if *ccursor != line_start {\n  110 |                 *ccursor -= len;\n  111 |             }\n  112 |         }","lines":6}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The sub-second field is computed as hundredths of a second (`time % 1.0 * 100.0`, range 0-99) but formatted with `{:03}` as if it were milliseconds. The label reads e.g. `12:00:00.012` for 0.12s elapsed instead of `.120`, making the fractional part misleading (it can never exceed 099). The analogous `clock_button` in wrap_app.rs correctly uses `{:02}` for the same hundredths value.","fix":"Either format with `{:02}` to match that it is hundredths, or compute milliseconds (`time % 1.0 * 1000.0`) and keep `{:03}`.","locations":[{"ref":"crates/egui_demo_app/src/apps/fractal_clock.rs:67-73","code":"   67 |             ui.label(format!(\n   68 |                 \"Local time: {:02}:{:02}:{:02}.{:03}\",\n   69 |                 (self.time % (24.0 * 60.0 * 60.0) / 3600.0).floor(),\n   70 |                 (self.time % (60.0 * 60.0) / 60.0).floor(),\n   71 |                 (self.time % 60.0).floor(),\n   72 |                 (self.time % 1.0 * 100.0).floor()\n   73 |             ));","lines":7}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `Sizing::to_lengths`, the remainder-reservation loop subtracts each below-minimum remainder's `range.min` and decrements `num_remainders`, but it computes `avg_remainder_length` only once before the loop and compares every remainder against that single stale average. It never re-iterates after shrinking the pool, so when several remainders are below the minimum the final per-remainder length can still be below some of their minimums (the final `range.clamp` then over-allocates relative to `length`). This is an approximation that can mis-size columns when multiple `Remainder` columns have different `at_least` minimums.","fix":"Iterate to a fixed point (repeatedly recompute the average and remove newly-below-min remainders) instead of a single pass, or document the limitation.","locations":[{"ref":"crates/egui_extras/src/sizing.rs:141-159","code":"  141 |         let avg_remainder_length = if num_remainders == 0 {\n  142 |             0.0\n  143 |         } else {\n  144 |             let mut remainder_length = length - sum_non_remainder;\n  145 |             let avg_remainder_length = 0.0f32.max(remainder_length / num_remainders as f32).floor();\n  146 |             for &size in &self.sizes {\n  147 |                 if let Size::Remainder { range } = size\n  148 |                     && avg_remainder_length < range.min\n  149 |                 {\n  150 |                     remainder_length -= range.min;\n  151 |                     num_remainders -= 1;\n  152 |                 }\n  153 |             }\n  154 |             if num_remainders > 0 {\n  155 |                 0.0f32.max(remainder_length / num_remainders as f32)\n  156 |             } else {\n  157 |                 0.0\n  158 |             }\n  159 |         };","lines":19}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Strip::cell`/`empty` build the child Ui id salt from `self.size_index` *after* `next_cell_size()` has already incremented it, so the id is derived from the next cell's index rather than the current cell's. It still happens to be unique per cell, but it is off-by-one relative to the logical cell index and inconsistent with intent (and with the index reported in the over-allocation panic message).","fix":"Capture the index before incrementing (e.g. return it from `next_cell_size`) and use that for `egui::Id::new(...)`.","locations":[{"ref":"crates/egui_extras/src/strip.rs:191-204","code":"  191 |     pub fn cell(&mut self, add_contents: impl FnOnce(&mut Ui)) {\n  192 |         let (width, height) = self.next_cell_size();\n  193 |         let flags = StripLayoutFlags {\n  194 |             clip: self.clip,\n  195 |             ..Default::default()\n  196 |         };\n  197 |         self.layout.add(\n  198 |             flags,\n  199 |             width,\n  200 |             height,\n  201 |             egui::Id::new(self.size_index),\n  202 |             add_contents,\n  203 |         );\n  204 |     }","lines":14},{"ref":"crates/egui_extras/src/strip.rs:170-187","code":"  170 |     #[cfg_attr(debug_assertions, track_caller)]\n  171 |     fn next_cell_size(&mut self) -> (CellSize, CellSize) {\n  172 |         let size = if let Some(size) = self.sizes.get(self.size_index) {\n  173 |             self.size_index += 1;\n  174 |             *size\n  175 |         } else {\n  176 |             crate::log_or_panic!(\n  177 |                 \"Added more `Strip` cells than were pre-allocated ({} pre-allocated)\",\n  178 |                 self.sizes.len()\n  179 |             );\n  180 |             8.0 // anything will look wrong, so pick something that is obviously wrong\n  181 |         };\n  182 | \n  183 |         match self.direction {\n  184 |             CellDirection::Horizontal => (CellSize::Absolute(size), CellSize::Remainder),\n  185 |             CellDirection::Vertical => (CellSize::Remainder, CellSize::Absolute(size)),\n  186 |         }\n  187 |     }","lines":18}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`_try_run` increments `steps` at the top of the loop and only errors when `steps > self.max_steps`. With the default `max_steps = 4` this actually runs up to 5 steps before failing (steps reaches 5, then the check fires). The `ExceededMaxStepsError`/docs advertise `max_steps` as the cap, so the harness runs one more frame than documented.","fix":"Use `if steps >= self.max_steps` for the check, or document that the effective cap is `max_steps + 1`.","locations":[{"ref":"crates/egui_kittest/src/lib.rs:337-358","code":"  337 |     fn _try_run(&mut self, sleep: bool) -> Result<u64, ExceededMaxStepsError> {\n  338 |         let mut steps = 0;\n  339 |         loop {\n  340 |             steps += 1;\n  341 |             self.step();\n  342 | \n  343 |             let wait_for_images = self.wait_for_pending_images && self.ctx.has_pending_images();\n  344 | \n  345 |             // We only care about immediate repaints\n  346 |             if self.root_viewport_output().repaint_delay != Duration::ZERO && !wait_for_images {\n  347 |                 break;\n  348 |             } else if sleep || wait_for_images {\n  349 |                 std::thread::sleep(Duration::from_secs_f32(self.step_dt));\n  350 |             }\n  351 |             if steps > self.max_steps {\n  352 |                 return Err(ExceededMaxStepsError {\n  353 |                     max_steps: self.max_steps,\n  354 |                     repaint_causes: self.ctx.repaint_causes(),\n  355 |                 });\n  356 |             }\n  357 |         }\n  358 |         Ok(steps)","lines":22}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"MarginF32 -> Margin conversion uses `marginf.left as _` (f32->i8), which truncates toward zero, whereas Margin::from(f32)/from(Vec2) use `.round()`. So 2.9 becomes 2 here but 3 via From<f32>: inconsistent and lossy rounding between two conversions to the same type.","fix":"Use `.round() as _` for consistency with Margin::from(f32).","locations":[{"ref":"crates/epaint/src/margin_f32.rs:32-42","code":"   32 | impl From<MarginF32> for Margin {\n   33 |     #[inline]\n   34 |     fn from(marginf: MarginF32) -> Self {\n   35 |         Self {\n   36 |             left: marginf.left as _,\n   37 |             right: marginf.right as _,\n   38 |             top: marginf.top as _,\n   39 |             bottom: marginf.bottom as _,\n   40 |         }\n   41 |     }\n   42 | }","lines":11}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"resize_to_min_height doubles the atlas height while `required_height >= image.height()`. Atlas rows occupy indices [0, required_height), so a height equal to required_height already fits; the `>=` doubles one extra time in the exact-fit case, wasting up to ~2x texture memory and triggering an unnecessary full-atlas dirty/reupload.","fix":"Change the condition to `while required_height > image.height()`.","locations":[{"ref":"crates/epaint/src/texture_atlas.rs:266-269","code":"  266 | fn resize_to_min_height(image: &mut ColorImage, required_height: usize) -> bool {\n  267 |     while required_height >= image.height() {\n  268 |         image.size[1] *= 2; // double the height\n  269 |     }","lines":4}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In `zoom_with_keyboard`, both ZOOM_IN (Cmd+Plus) and ZOOM_IN_SECONDARY (Cmd+Equals) are consumed and each independently calls `zoom_in`. If both shortcuts were somehow active in the same frame they would zoom in twice (+0.2). In practice the two key combos can't both be pressed at once, so impact is negligible, but the `||` short-circuit was likely intended to zoom only once.","fix":"The `||` already short-circuits the second consume when the first matches, so behavior is fine; if defensive single-zoom is desired, gate ZOOM_OUT in an `else` like ZOOM_RESET does. No change strictly required.","locations":[{"ref":"crates/egui/src/gui_zoom.rs:37-44","code":"   37 |         if ctx.input_mut(|i| i.consume_shortcut(&kb_shortcuts::ZOOM_IN))\n   38 |             || ctx.input_mut(|i| i.consume_shortcut(&kb_shortcuts::ZOOM_IN_SECONDARY))\n   39 |         {\n   40 |             zoom_in(ctx);\n   41 |         }\n   42 |         if ctx.input_mut(|i| i.consume_shortcut(&kb_shortcuts::ZOOM_OUT)) {\n   43 |             zoom_out(ctx);\n   44 |         }","lines":8}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`syntax_highlighting` extracts a file extension via `response.url.rsplitn(2, '.').collect()` and takes `.first()`. `rsplitn` yields the part AFTER the last dot first, so for URLs with no extension but dots in the host (e.g. `https://picsum.photos/seed/x/640`) the \"extension\" becomes the whole path segment `photos/seed/x/640`. This isn't a panic (highlighting just no-ops on an unknown extension) but the extraction is wrong for any URL whose path has no dot.","fix":"Parse the path segment after the last `/` first, then take its extension; or only treat the suffix as an extension if it contains no `/`.","locations":[{"ref":"crates/egui_demo_app/src/apps/http_app.rs:223-224","code":"  223 |     let extension_and_rest: Vec<&str> = response.url.rsplitn(2, '.').collect();\n  224 |     let extension = extension_and_rest.first()?;","lines":2}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`ScrollStickTo::ui` increments `self.n_items` by one every frame and unconditionally requests a repaint, so the row count grows without bound for as long as the demo window is open. In a long-running session this is an ever-growing counter (theoretically overflows usize, and the row list grows unboundedly). It is intentional for the 'stick to end' visual but has no cap.","fix":"Cap `n_items` at a reasonable maximum, or use `saturating_add(1)`, to avoid unbounded growth.","locations":[{"ref":"crates/egui_demo_lib/src/demo/scrolling.rs:391-392","code":"  391 |         self.n_items += 1;\n  392 |         ui.request_repaint();","lines":2}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"FontColorTransferFunction matches the identity case with the float-literal pattern `Self::Gamma(1.0)`. Float-literal patterns rely on exact bit equality and are a deny-by-default future-incompat lint in newer Rust; behavior is correct today but fragile.","fix":"Replace with a match guard: `Self::Gamma(g) if g == 1.0 => ...`.","locations":[{"ref":"crates/epaint/src/image.rs:405","code":"  405 |             Self::Off | Self::Gamma(1.0) => input_color,","lines":1},{"ref":"crates/epaint/src/image.rs:426","code":"  426 |             Self::Off | Self::Gamma(1.0) => coverage,","lines":1}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"LocationHash::new returns `LocationHash(0)` for the empty (default) coords fast-path, but a non-empty location hashed with `crate::util::hash` can also legitimately produce 0. Such a collision would make a non-default variation location share a glyph/advance cache key with the default location, yielding wrong cached metrics/glyphs. Probability ~2^-64, but a real key-collision hazard.","fix":"Use a non-hash sentinel for the empty case (an Option or enum), or fold a discriminant into the hash so the empty case can never collide.","locations":[{"ref":"crates/epaint/src/text/font.rs:88-93","code":"   88 |         if location.coords().is_empty() {\n   89 |             // Fast path for the (common) default-coords case.\n   90 |             Self(0)\n   91 |         } else {\n   92 |             Self(crate::util::hash(location))\n   93 |         }","lines":6}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`age` is a `u32` bounded to `0..=120` by the slider, but the \"Increment\" button does `self.age += 1` with no cap, so the value can exceed the slider range (and would panic on overflow in debug at u32::MAX, unreachable in practice). Since these hello_world examples are the most-copied starting points, the unbounded increment past the advertised range is a mildly misleading pattern.","fix":"Use `self.age = self.age.saturating_add(1)` or clamp to the slider range, so the displayed value stays consistent with the slider bounds.","locations":[{"ref":"examples/hello_world/src/main.rs:48-50","code":"   48 |             if ui.button(\"Increment\").clicked() {\n   49 |                 self.age += 1;\n   50 |             }","lines":3},{"ref":"examples/hello_world_par/src/main.rs:53-55","code":"   53 |                 if ui.button(\"Increment\").clicked() {\n   54 |                     self.age += 1;\n   55 |                 }","lines":3},{"ref":"examples/custom_keypad/src/main.rs:57-59","code":"   57 |                 if ui.button(\"Increment\").clicked() {\n   58 |                     self.age += 1;\n   59 |                 }","lines":3}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In `Hsva::from_rgba_premultiplied`, the check for fully-transparent black omits the green channel: it tests `r == 0.0 && b == 0.0 && a == 0.0`. A pure-green additive color such as `(0.0, g, 0.0, 0.0)` therefore takes the `Self::default()` branch (all zeros), losing the green value, instead of being treated as an additive color via `from_additive_rgb`. Classic copy-paste omission of the `g` term.","fix":"Add the missing green check: `if r == 0.0 && g == 0.0 && b == 0.0 && a == 0.0`.","locations":[{"ref":"crates/ecolor/src/hsva.rs:45-50","code":"   45 |         if a <= 0.0 {\n   46 |             if r == 0.0 && b == 0.0 && a == 0.0 {\n   47 |                 Self::default()\n   48 |             } else {\n   49 |                 Self::from_additive_rgb([r, g, b])\n   50 |             }","lines":6}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"Copy-paste bug in the syntect highlighter: the `underline` flag is derived from the ITALIC font style instead of the UNDERLINE font style. As a result text is underlined whenever it is italic, and never underlined for syntect themes that mark tokens as underlined. The line above already reads ITALIC into `italics`.","fix":"Change the second line to `let underline = style.font_style.contains(FontStyle::UNDERLINE);`.","locations":[{"ref":"crates/egui_extras/src/syntax_highlighting.rs:581-582","code":"  581 |                 let italics = style.font_style.contains(FontStyle::ITALIC);\n  582 |                 let underline = style.font_style.contains(FontStyle::ITALIC);","lines":2}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The non-persistence `SerializableAny` bound reads `'static + Any + Clone + for<'a> Send + Sync`. The `for<'a>` higher-ranked binder binds a lifetime never used by `Send + Sync`; it is an inert leftover copied from the persistence version (where it correctly qualifies `for<'a> serde::Deserialize<'a>`). Misleading.","fix":"Remove `for<'a>`: `pub trait SerializableAny: 'static + Any + Clone + Send + Sync {}` and the matching impl.","locations":[{"ref":"crates/egui/src/util/id_type_map.rs:50-53","code":"   50 | pub trait SerializableAny: 'static + Any + Clone + for<'a> Send + Sync {}\n   51 | \n   52 | #[cfg(not(feature = \"persistence\"))]\n   53 | impl<T> SerializableAny for T where T: 'static + Any + Clone + for<'a> Send + Sync {}","lines":4}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"find_cross_t divides by `a`, `3*a*a`, and `27*a*a*a` (computing h, p, q) with no guard for `a == 0.0`. The leading cubic coefficient `a` vanishes for many ordinary closed curves (symmetric control points where the t^3 term cancels). When a is 0 the divisions yield NaN/Inf which propagate through sqrt/acos/cbrt; the `p > 0.0` early-out does NOT catch NaN (NaN comparisons are false), so correctness relies on the resulting NaN t-values incidentally failing the 0..1 range checks rather than on an explicit degenerate branch. The cubic-root solver is also simply wrong for the a==0 (quadratic) case, so fill-splitting of such cubic beziers can be incorrect.","fix":"Before computing h/p/q, branch on `a == 0.0` (or |a| < epsilon) and either return None or solve the reduced quadratic `b*t^2 + c*t + d = 0` for the crossing t.","locations":[{"ref":"crates/epaint/src/shapes/bezier_shape.rs:248-256","code":"  248 |         let h = -b / (3.0 * a);\n  249 |         let p = (3.0 * a * c - b * b) / (3.0 * a * a);\n  250 |         let q = (2.0 * b * b * b - 9.0 * a * b * c + 27.0 * a * a * d) / (27.0 * a * a * a);\n  251 | \n  252 |         if p > 0.0 {\n  253 |             return None;\n  254 |         }\n  255 |         let r = (-(p / 3.0).powi(3)).sqrt();\n  256 |         let theta = (-q / (2.0 * r)).acos() / 3.0;","lines":9}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `Context::tessellate`, when no font matches the requested `pixels_per_point`, the fallback path does `ctx.fonts.iter().next().expect(\"No fonts loaded\")`. `ctx.fonts` is an `Option<Fonts>`, so `.iter().next()` yields the single font set if present and `None` otherwise; if `tessellate` is ever called before fonts are created (no prior `run_ui`), this panics. The surrounding API is public and the panic message (\"No fonts loaded\") would surface as a hard crash rather than a graceful degradation.","fix":"Handle the no-fonts case gracefully (e.g. return an empty tessellation or skip tessellation with a logged warning) instead of `.expect(...)`, since `tessellate` is callable independently of `run_ui`.","locations":[{"ref":"crates/egui/src/context.rs:2770-2779","code":" 2770 |             let texture_atlas = if let Some(fonts) = ctx.fonts.as_ref() {\n 2771 |                 fonts.texture_atlas()\n 2772 |             } else {\n 2773 |                 log::warn!(\"No font size matching {pixels_per_point} pixels per point found.\");\n 2774 |                 ctx.fonts\n 2775 |                     .iter()\n 2776 |                     .next()\n 2777 |                     .expect(\"No fonts loaded\")\n 2778 |                     .texture_atlas()\n 2779 |             };","lines":10}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `FileStorage::flush`, the previous save's `JoinHandle::join()` result is discarded with `.ok()`, swallowing both join errors (panicked persist thread) and the (unit) result. A panic in the background `save_to_disk` thread is silently ignored, so persistent serialization failures that manifest as panics leave no trace and the next flush proceeds as if nothing happened.","fix":"Log when `join()` returns `Err` (a panicked persist thread) so silent data-loss is at least observable.","locations":[{"ref":"crates/eframe/src/native/file_storage.rs:162-189","code":"  162 |     fn flush(&mut self) {\n  163 |         if self.dirty {\n  164 |             profiling::scope!(\"FileStorage::flush\");\n  165 |             self.dirty = false;\n  166 | \n  167 |             let file_path = self.ron_filepath.clone();\n  168 |             let kv = self.kv.clone();\n  169 | \n  170 |             if let Some(join_handle) = self.last_save_join_handle.take() {\n  171 |                 // wait for previous save to complete.\n  172 |                 join_handle.join().ok();\n  173 |             }\n  174 | \n  175 |             let result = std::thread::Builder::new()\n  176 |                 .name(\"eframe_persist\".to_owned())\n  177 |                 .spawn(move || {\n  178 |                     save_to_disk(&file_path, &kv);\n  179 |                 });\n  180 |             match result {\n  181 |                 Ok(join_handle) => {\n  182 |                     self.last_save_join_handle = Some(join_handle);\n  183 |                 }\n  184 |                 Err(err) => {\n  185 |                     log::warn!(\"Failed to spawn thread to save app state: {err}\");\n  186 |                 }\n  187 |             }\n  188 |         }\n  189 |     }","lines":28}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`pos_from_mouse_event`, `pos_from_touch`, and the IME `move_to` clamping all divide by `ctx.zoom_factor()` without guarding against a zero/negative zoom factor. `egui::Context::set_zoom_factor` does not strictly prevent a 0 value from user code; a zero zoom factor would produce `inf`/`NaN` pointer positions feeding into egui hit-testing.","fix":"Clamp `zoom_factor` to a small positive minimum before dividing, or rely on egui guaranteeing a positive zoom factor and document that invariant.","locations":[{"ref":"crates/eframe/src/web/input.rs:3-14","code":"    3 | pub fn pos_from_mouse_event(\n    4 |     canvas: &web_sys::HtmlCanvasElement,\n    5 |     event: &web_sys::MouseEvent,\n    6 |     ctx: &egui::Context,\n    7 | ) -> egui::Pos2 {\n    8 |     let rect = canvas_content_rect(canvas);\n    9 |     let zoom_factor = ctx.zoom_factor();\n   10 |     egui::Pos2 {\n   11 |         x: (event.client_x() as f32 - rect.left()) / zoom_factor,\n   12 |         y: (event.client_y() as f32 - rect.top()) / zoom_factor,\n   13 |     }\n   14 | }","lines":12},{"ref":"crates/eframe/src/web/input.rs:74-84","code":"   74 | fn pos_from_touch(\n   75 |     canvas_rect: egui::Rect,\n   76 |     touch: &web_sys::Touch,\n   77 |     egui_ctx: &egui::Context,\n   78 | ) -> egui::Pos2 {\n   79 |     let zoom_factor = egui_ctx.zoom_factor();\n   80 |     egui::Pos2 {\n   81 |         x: (touch.client_x() as f32 - canvas_rect.left()) / zoom_factor,\n   82 |         y: (touch.client_y() as f32 - canvas_rect.top()) / zoom_factor,\n   83 |     }\n   84 | }","lines":11}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Renderer::update_egui_texture_from_wgpu_texture_with_sampler_options` labels the newly-created bind group with `self.next_user_texture_id` (e.g. `egui_user_image_{next_user_texture_id}`), but this method never increments `next_user_texture_id` and operates on an already-existing id. The label is therefore misleading/duplicated across updates (cosmetic only, affects debugging/labels).","fix":"Label the bind group using the actual `id` being updated (e.g. `format!(\"egui_user_image_update_{id:?}\")`) rather than `next_user_texture_id`.","locations":[{"ref":"crates/egui-wgpu/src/renderer.rs:858-895","code":"  858 |     pub fn update_egui_texture_from_wgpu_texture_with_sampler_options(\n  859 |         &mut self,\n  860 |         device: &wgpu::Device,\n  861 |         texture: &wgpu::TextureView,\n  862 |         sampler_descriptor: wgpu::SamplerDescriptor<'_>,\n  863 |         id: epaint::TextureId,\n  864 |     ) {\n  865 |         profiling::function_scope!();\n  866 | \n  867 |         let Texture {\n  868 |             bind_group: user_texture_binding,\n  869 |             ..\n  870 |         } = self\n  871 |             .textures\n  872 |             .get_mut(&id)\n  873 |             .expect(\"Tried to update a texture that has not been allocated yet.\");\n  874 | \n  875 |         let sampler = device.create_sampler(&wgpu::SamplerDescriptor {\n  876 |             compare: None,\n  877 |             ..sampler_descriptor\n  878 |         });\n  879 | \n  880 |         let bind_group = device.create_bind_group(&wgpu::BindGroupDescriptor {\n  881 |             label: Some(format!(\"egui_user_image_{}\", self.next_user_texture_id).as_str()),\n  882 |             layout: &self.texture_bind_group_layout,\n  883 |             entries: &[\n  884 |                 wgpu::BindGroupEntry {\n  885 |                     binding: 0,\n  886 |                     resource: wgpu::BindingResource::TextureView(texture),\n  887 |                 },\n  888 |                 wgpu::BindGroupEntry {\n  889 |                     binding: 1,\n  890 |                     resource: wgpu::BindingResource::Sampler(&sampler),\n  891 |                 },\n  892 |             ],\n  893 |         });\n  894 | \n  895 |         *user_texture_binding = bind_group;","lines":38}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`EguiGlow::new` unwraps the result of `Painter::new` after only logging the error, so any shader-compile or buffer-creation failure aborts the whole app via panic instead of being propagated. The surrounding code has a `TODO(emilk): return error instead of unwrap`, confirming this is a known rough edge worth flagging.","fix":"Make `EguiGlow::new` return `Result<Self, PainterError>` and propagate the painter error to the caller instead of unwrapping.","locations":[{"ref":"crates/egui_glow/src/winit.rs:31-37","code":"   31 |         #[expect(clippy::unwrap_used)] // TODO(emilk): return error instead of unwrap\n   32 |         let painter = crate::Painter::new(gl, \"\", shader_version, dithering)\n   33 |             .map_err(|err| {\n   34 |                 log::error!(\"error occurred in initializing painter:\\n{err}\");\n   35 |             })\n   36 |             .unwrap();\n   37 | ","lines":7}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"When `Mode::UpdateFailing` and the image is above threshold, the diff image is written to `diff_path` (line 493-500) and then `update_snapshot()` overwrites the checked-in snapshot. The stale `.diff.png` is left on disk after a successful update; it is only cleaned up on the next test run (lines 414-416). This can leave a misleading diff artifact next to a freshly-updated, now-passing snapshot.","fix":"In the `UpdateFailing` (and `UpdateAll`) update path, remove `diff_path` after calling `update_snapshot()`, or skip writing the diff image when in an update mode.","locations":[{"ref":"crates/egui_kittest/src/snapshot.rs:491-522","code":"  491 |     let below_threshold = num_wrong_pixels as i64 <= *failed_pixel_count_threshold as i64;\n  492 | \n  493 |     if !below_threshold {\n  494 |         diff_image\n  495 |             .save(diff_path.clone())\n  496 |             .map_err(|err| SnapshotError::WriteSnapshot {\n  497 |                 path: diff_path.clone(),\n  498 |                 err,\n  499 |             })?;\n  500 |     }\n  501 | \n  502 |     match mode {\n  503 |         Mode::Test => {\n  504 |             if below_threshold {\n  505 |                 Ok(())\n  506 |             } else {\n  507 |                 write_new_png()?;\n  508 | \n  509 |                 Err(SnapshotError::Diff {\n  510 |                     name,\n  511 |                     diff: num_wrong_pixels,\n  512 |                     diff_path,\n  513 |                 })\n  514 |             }\n  515 |         }\n  516 |         Mode::UpdateFailing => {\n  517 |             if below_threshold {\n  518 |                 Ok(())\n  519 |             } else {\n  520 |                 update_snapshot()\n  521 |             }\n  522 |         }","lines":32}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`ns_view_from_handle` returns `Option<&NSView>` whose lifetime is elided to the input `&AppKitWindowHandle`, but the `NSView` it points to is owned by AppKit, not by the handle. The returned reference's lifetime is therefore tied to an unrelated borrow. While the immediate caller (`window_chrome_metrics`) uses it within scope and the SAFETY comment notes the AppKit ownership assumption, the misleading lifetime makes it easy for a future refactor to extend the reference's apparent lifetime beyond what is actually sound, risking a use-after-free.","fix":"Return an owned `objc2::rc::Retained<NSView>` (retain the view) instead of a borrowed `&NSView`, so the lifetime reflects real ownership and cannot dangle.","locations":[{"ref":"crates/eframe/src/native/macos.rs:60-76","code":"   60 | fn ns_view_from_handle(handle: &AppKitWindowHandle) -> Option<&NSView> {\n   61 |     let ns_view_ptr = handle.ns_view.as_ptr().cast::<NSView>();\n   62 | \n   63 |     // Validate the pointer is non-null\n   64 |     if ns_view_ptr.is_null() {\n   65 |         None\n   66 |     } else {\n   67 |         // SAFETY:\n   68 |         // - We've verified the pointer is non-null\n   69 |         // - The pointer comes from the windowing system, so it should be valid\n   70 |         // - NSView pointers from AppKit are expected to remain valid for the window lifetime\n   71 |         #[expect(unsafe_code)]\n   72 |         unsafe {\n   73 |             ns_view_ptr.as_ref()\n   74 |         }\n   75 |     }\n   76 | }","lines":17}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`combo_box_dyn` registers the same `button_id` widget twice in one frame: once inside the `button_frame` content closure (`ui.interact(button_rect, button_id, Sense::click())`) to pick visuals, and again in `button_frame` itself (`ui.interact(outer_rect, id, sense)`) using a differently-computed rect. Double-registering the same id with two different rects is a smell and can cause subtle hit-test/interact_rect inconsistencies; only the visuals from the inner call are used.","fix":"Compute the button rect once and interact a single time, or derive the visuals from the response returned by `button_frame` instead of doing a second `ui.interact` with the same id.","locations":[{"ref":"crates/egui/src/containers/combo_box.rs:363-391","code":"  363 |         let (_, rect) = ui.allocate_space(Vec2::new(actual_width, actual_height));\n  364 |         let button_rect = ui.min_rect().expand2(ui.spacing().button_padding);\n  365 |         let response = ui.interact(button_rect, button_id, Sense::click());\n  366 |         // response.active |= is_popup_open;\n  367 | \n  368 |         if ui.is_rect_visible(rect) {\n  369 |             let icon_rect = Align2::RIGHT_CENTER.align_size_within_rect(icon_size, rect);\n  370 |             let visuals = if is_popup_open {\n  371 |                 &ui.visuals().widgets.open\n  372 |             } else {\n  373 |                 ui.style().interact(&response)\n  374 |             };\n  375 | \n  376 |             if let Some(icon) = icon {\n  377 |                 icon(\n  378 |                     ui,\n  379 |                     icon_rect.expand(visuals.expansion),\n  380 |                     visuals,\n  381 |                     is_popup_open,\n  382 |                 );\n  383 |             } else {\n  384 |                 paint_default_icon(ui.painter(), icon_rect.expand(visuals.expansion), visuals);\n  385 |             }\n  386 | \n  387 |             let text_rect = Align2::LEFT_CENTER.align_size_within_rect(galley.size(), rect);\n  388 |             ui.painter()\n  389 |                 .galley(text_rect.min, galley, visuals.text_color());\n  390 |         }\n  391 |     });","lines":29},{"ref":"crates/egui/src/containers/combo_box.rs:424-446","code":"  424 | fn button_frame(\n  425 |     ui: &mut Ui,\n  426 |     id: Id,\n  427 |     is_popup_open: bool,\n  428 |     sense: Sense,\n  429 |     add_contents: impl FnOnce(&mut Ui),\n  430 | ) -> Response {\n  431 |     let where_to_put_background = ui.painter().add(Shape::Noop);\n  432 | \n  433 |     let margin = ui.spacing().button_padding;\n  434 |     let interact_size = ui.spacing().interact_size;\n  435 | \n  436 |     let mut outer_rect = ui.available_rect_before_wrap();\n  437 |     outer_rect.set_height(outer_rect.height().at_least(interact_size.y));\n  438 | \n  439 |     let inner_rect = outer_rect.shrink2(margin);\n  440 |     let mut content_ui = ui.new_child(UiBuilder::new().max_rect(inner_rect));\n  441 |     add_contents(&mut content_ui);\n  442 | \n  443 |     let mut outer_rect = content_ui.min_rect().expand2(margin);\n  444 |     outer_rect.set_height(outer_rect.height().at_least(interact_size.y));\n  445 | \n  446 |     let response = ui.interact(outer_rect, id, sense);","lines":23}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`Id::from_high_entropy_bits` is marked `unsafe` but the doc explicitly states it is \"not unsafe in terms of memory safety\" and its only failure mode is a `panic` on a zero value. Using `unsafe` for a non-memory-safety invariant is misleading: it forces callers into `unsafe {}` blocks for no soundness reason and dilutes the meaning of `unsafe` in the codebase.","fix":"Make the function safe (it already panics on zero), or return `Option<Id>`/`Result` instead of panicking; reserve `unsafe` for genuine memory-safety invariants.","locations":[{"ref":"crates/egui/src/id.rs:111-124","code":"  111 |     ///\n  112 |     /// # Safety\n  113 |     /// You need to ensure that the value is high-entropy since it might be used in\n  114 |     /// a [`IdSet`] or [`IdMap`], which rely on the assumption that [`Id`]s have good entropy.\n  115 |     ///\n  116 |     /// The method is not unsafe in terms of memory safety.\n  117 |     ///\n  118 |     /// # Panics\n  119 |     /// If the value is zero, this will panic.\n  120 |     #[doc(hidden)]\n  121 |     #[expect(unsafe_code)]\n  122 |     pub unsafe fn from_high_entropy_bits(value: u64) -> Self {\n  123 |         Self(NonZeroU64::new(value).expect(\"Id must be non-zero.\"))\n  124 |     }","lines":14}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"`Layout` derives `PartialEq, Eq` and the commented-out serde derive line is left in source (line 101). Minor dead/commented code; not a correctness issue, but the dangling `// #[cfg_attr(feature = \"serde\", ...)]` suggests an unfinished decision about serializing Layout.","fix":"Either enable serde for Layout or remove the commented-out attribute to avoid confusion.","locations":[{"ref":"crates/egui/src/layout.rs:100-101","code":"  100 | #[derive(Clone, Copy, Debug, PartialEq, Eq)]\n  101 | // #[cfg_attr(feature = \"serde\", derive(serde::Deserialize, serde::Serialize))]","lines":2}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"Several `aligns.iter().find(...).unwrap()` calls assume the current `Align2` value is always one of the 9 listed combinations. This holds today (all 9 Align2 combos are listed and the value is only ever set via the same list), but the `.unwrap()` is a latent panic if the value source ever changes (e.g. serde-loaded state in TextRotation). Defensive only.","fix":"Use `.map_or(\"?\", |(_, name)| *name)` or similar fallback instead of `.unwrap()` on the selected-text lookup.","locations":[{"ref":"crates/egui_demo_lib/src/demo/misc_demo_window.rs:785","code":"  785 |             .selected_text(aligns.iter().find(|(a, _)| *a == self.align).unwrap().1)","lines":1},{"ref":"crates/egui_demo_lib/src/demo/popups.rs:205","code":"  205 |                     .selected_text(aligns.iter().find(|(a, _)| a == align).unwrap().1)","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`InputState::begin_pass` clones the entire `Vec<Event>` every frame (`events: new.events.clone()`), then moves `new` (the RawInput, which still holds its own `events`) into `self.raw` on the next line, so the event vector is duplicated and allocated every input frame on the hot path. The author flagged it with a TODO.","fix":"Store events once: e.g. `events: std::mem::take(&mut new.events)` and read `self.raw.events` where the duplicate is needed, eliminating the per-frame clone+allocation.","locations":[{"ref":"crates/egui/src/input_state/mod.rs:487-488","code":"  487 |             events: new.events.clone(), // TODO(emilk): remove clone() and use raw.events\n  488 |             raw: new,","lines":2}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`FileStorage::flush` clones the entire `kv` HashMap (`self.kv.clone()`) on every flush to hand it to the background save thread, even when the data is large. For apps that persist big blobs of egui memory plus user state, this doubles peak memory and adds a full copy on each autosave (every 30s) and on focus-loss saves.","fix":"Serialize to a `String`/`Vec<u8>` on the calling thread (or wrap `kv` in an `Arc` snapshot) and move only the serialized bytes into the persist thread, avoiding cloning the whole map.","locations":[{"ref":"crates/eframe/src/native/file_storage.rs:166-179","code":"  166 | \n  167 |             let file_path = self.ron_filepath.clone();\n  168 |             let kv = self.kv.clone();\n  169 | \n  170 |             if let Some(join_handle) = self.last_save_join_handle.take() {\n  171 |                 // wait for previous save to complete.\n  172 |                 join_handle.join().ok();\n  173 |             }\n  174 | \n  175 |             let result = std::thread::Builder::new()\n  176 |                 .name(\"eframe_persist\".to_owned())\n  177 |                 .spawn(move || {\n  178 |                     save_to_disk(&file_path, &kv);\n  179 |                 });","lines":14}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Atoms::text()` returns a `Cow<str>` that starts borrowed but, as soon as there is more than one text atom, calls `to_mut()` and reallocates/copies the whole concatenation every call. `text()` is called once per frame for buttons/checkboxes/radio (for widget_info / accessibility), so multi-text widgets (e.g. menu buttons with shortcut text) allocate a String every frame even when nothing changed.","fix":"This is largely inherent to producing a single label; acceptable but worth caching. If kept, document the allocation. Alternatively, only build the owned string lazily inside the widget_info closure (which is itself lazy) rather than eagerly in the widget body.","locations":[{"ref":"crates/egui/src/atomics/atoms.rs:56-79","code":"   56 |     pub fn text(&self) -> Option<Cow<'_, str>> {\n   57 |         let mut string: Option<Cow<'_, str>> = None;\n   58 |         for atom in &self.0 {\n   59 |             if let AtomKind::Text(text) = &atom.kind {\n   60 |                 if let Some(string) = &mut string {\n   61 |                     let string = string.to_mut();\n   62 |                     string.push(' ');\n   63 |                     string.push_str(text.text());\n   64 |                 } else {\n   65 |                     string = Some(Cow::Borrowed(text.text()));\n   66 |                 }\n   67 |             }\n   68 |         }\n   69 | \n   70 |         // If there is no text, try to find an image with alt text.\n   71 |         if string.is_none() {\n   72 |             string = self.iter().find_map(|a| match &a.kind {\n   73 |                 AtomKind::Image(image) => image.alt_text.as_deref().map(Cow::Borrowed),\n   74 |                 _ => None,\n   75 |             });\n   76 |         }\n   77 | \n   78 |         string\n   79 |     }","lines":24}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`title_ui` calls `ui.fonts_mut(|f| f.row_height(...))` on every frame the window title bar is shown, taking a write lock on the fonts just to read a row height. For windows this runs every frame. A read-only `fonts` access (or caching the heading row height) would avoid taking the mutable lock in a per-frame path.","fix":"Use a read-only `ui.fonts(|f| f.row_height(...))` accessor if available, or cache the heading row height.","locations":[{"ref":"crates/egui/src/containers/window.rs:1300-1302","code":" 1300 |     let heading_font_height =\n 1301 |         ui.fonts_mut(|f| f.row_height(&TextStyle::Heading.resolve(ui.style())));\n 1302 |     let button_allocation_size = Vec2::splat(heading_font_height);","lines":3}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Context::begin_pass`/`end_pass` and several internal helpers repeatedly do `self.viewports.entry(self.viewport_id()).or_default()` (e.g. lines 429 and 452 fetch the viewport twice in a single `begin_pass`, with unrelated work in between that does not need the first borrow). Each `entry().or_default()` is a hash lookup; doing it twice per begin_pass for the same id is redundant work in the hottest path.","fix":"Fetch the viewport once and reuse the reference (restructuring the zoom-factor block so it does not force an early borrow release), avoiding the duplicate `entry().or_default()` lookup.","locations":[{"ref":"crates/egui/src/context.rs:429-452","code":"  429 |         let viewport = self.viewports.entry(viewport_id).or_default();\n  430 | \n  431 |         if is_outermost_viewport && let Some(new_zoom_factor) = self.new_zoom_factor.take() {\n  432 |             let ratio = self.memory.options.zoom_factor / new_zoom_factor;\n  433 |             self.memory.options.zoom_factor = new_zoom_factor;\n  434 | \n  435 |             let input = &viewport.input;\n  436 |             // This is a bit hacky, but is required to avoid jitter:\n  437 |             let mut rect = input.content_rect();\n  438 |             rect.min = (ratio * rect.min.to_vec2()).to_pos2();\n  439 |             rect.max = (ratio * rect.max.to_vec2()).to_pos2();\n  440 |             new_raw_input.screen_rect = Some(rect);\n  441 |             // We should really scale everything else in the input too,\n  442 |             // but the `screen_rect` is the most important part.\n  443 |         }\n  444 |         let native_pixels_per_point = new_raw_input\n  445 |             .viewport()\n  446 |             .native_pixels_per_point\n  447 |             .unwrap_or(1.0);\n  448 |         let pixels_per_point = self.memory.options.zoom_factor * native_pixels_per_point;\n  449 | \n  450 |         let all_viewport_ids: ViewportIdSet = self.all_viewport_ids();\n  451 | \n  452 |         let viewport = self.viewports.entry(self.viewport_id()).or_default();","lines":24}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Context::end_pass` unconditionally calls `self.options(|o| o.quit_shortcuts.clone())` every pass, cloning the `Vec<KeyboardShortcut>` even when it is empty or unchanged. This is a small allocation in the hot per-pass path; similarly the `zoom_with_keyboard` option is read separately. Minor but avoidable.","fix":"Avoid cloning the shortcut list each pass, e.g. by consuming shortcuts inside a single `self.write(...)` closure that borrows `quit_shortcuts`, or early-out when the list is empty.","locations":[{"ref":"crates/egui/src/context.rs:2382-2386","code":" 2382 |         for shortcut in self.options(|o| o.quit_shortcuts.clone()) {\n 2383 |             if self.input_mut(|i| i.consume_shortcut(&shortcut)) {\n 2384 |                 self.send_viewport_cmd(ViewportCommand::Close);\n 2385 |             }\n 2386 |         }","lines":5}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Cache `byte_size()` implementations count only the payload and ignore the memory held by the cache keys/structures themselves: the `Cow<'static, str>` URIs in `DefaultBytesLoader`, and the `PrimaryKey { uri: String, .. }` + per-bucket HashMap allocations in `DefaultTextureLoader`. With many distinct URIs (notably SVGs cached per size-hint), this under-reports the cache size that the trait docs say should be returned, which can defeat memory-budget logic built on `byte_size`.","fix":"Include key overhead in the sums (e.g. `key.uri.len()` for the bytes loader, `key.uri.len() + size_of::<PrimaryKey>()` plus bucket-map overhead for the texture loader), or document explicitly that the figure is payload-only.","locations":[{"ref":"crates/egui/src/load/bytes_loader.rs:66-68","code":"   66 |     fn byte_size(&self) -> usize {\n   67 |         self.cache.lock().values().map(|bytes| bytes.len()).sum()\n   68 |     }","lines":3},{"ref":"crates/egui/src/load/texture_loader.rs:137-149","code":"  137 |     fn byte_size(&self) -> usize {\n  138 |         self.state\n  139 |             .lock()\n  140 |             .cache\n  141 |             .values()\n  142 |             .map(|bucket| {\n  143 |                 bucket\n  144 |                     .values()\n  145 |                     .map(|texture| texture.handle.byte_size())\n  146 |                     .sum::<usize>()\n  147 |             })\n  148 |             .sum()\n  149 |     }","lines":13}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Areas::visible_layer_ids` allocates a fresh `HashSet<LayerId>` (chaining the last-frame and current-frame sets) on every call, and `visible_windows` calls it and then iterates+filters the result. `visible_windows` is used by `Context::globally_used_rect`. For UIs with many areas this is an avoidable allocation in a per-frame path.","fix":"Have `visible_windows` iterate the two sets directly (e.g. `std::iter::chain` over the two `HashSet`s, deduping by `LayerId`) instead of collecting into a new `HashSet` first, or cache the union.","locations":[{"ref":"crates/egui/src/memory/mod.rs:1257-1272","code":" 1257 |     pub fn visible_layer_ids(&self) -> ahash::HashSet<LayerId> {\n 1258 |         std::iter::chain(\n 1259 |             &self.visible_areas_last_frame,\n 1260 |             &self.visible_areas_current_frame,\n 1261 |         )\n 1262 |         .copied()\n 1263 |         .collect()\n 1264 |     }\n 1265 | \n 1266 |     pub(crate) fn visible_windows(&self) -> impl Iterator<Item = (LayerId, &area::AreaState)> {\n 1267 |         self.visible_layer_ids()\n 1268 |             .into_iter()\n 1269 |             .filter(|layer| layer.order == crate::Order::Middle)\n 1270 |             .filter(|&layer| !self.is_sublayer(&layer))\n 1271 |             .filter_map(|layer| Some((layer, self.get(layer.id)?)))\n 1272 |     }","lines":16}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Ui::end_row` clones the `Painter` on every call (`&self.painter().clone()`) only to satisfy the borrow checker (self.placer is borrowed mutably while self.painter is borrowed immutably). For grids/wrapping layouts end_row is called once per row, so this is a small but avoidable per-row allocation/Arc-bump in the UI-building hot path.","fix":"Restructure so the painter reference can be passed without cloning, e.g. split out the painter before borrowing the placer, or have Placer::end_row take the ctx/clip-rect it actually needs.","locations":[{"ref":"crates/egui/src/ui.rs:2504-2507","code":" 2504 |     pub fn end_row(&mut self) {\n 2505 |         self.placer\n 2506 |             .end_row(self.spacing().item_spacing, &self.painter().clone());\n 2507 |     }","lines":4}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`PersistedMap::from_map` calls `generation.elements.clone()` for every kept generation when building the persisted list. Each `SerializedElement` holds an `Arc<str>`, so this bumps refcounts and reallocates the Vec, even though `types_map` is a throwaway local that could be consumed. Runs on every serialization/save.","fix":"Consume the local map by value (`for stats in types_map.into_values()` / `into_values()` on generations) and move with `persisted.append(&mut generation.elements)` or `persisted.extend(generation.elements)`, dropping the `.clone()`.","locations":[{"ref":"crates/egui/src/util/id_type_map.rs:737","code":"  737 |                         persisted.append(&mut generation.elements.clone());","lines":1}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`TextEdit::show` unconditionally clones the entire buffer into a fresh `String` (`let prev_text = text.as_str().to_owned();`) on every frame for every TextEdit, but it is only consumed inside the lazily-evaluated `widget_info` closures (and only the 'changed' branch truly needs it). This is a wasted full-buffer allocation each frame for the common case where the text did not change.","fix":"Capture `prev_text` only when needed (e.g. inside the `response.changed()` branch / behind a `text_changed` guard), avoiding the per-frame clone when the text is unchanged.","locations":[{"ref":"crates/egui/src/widgets/text_edit/builder.rs:468","code":"  468 |         let prev_text = text.as_str().to_owned();","lines":1}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`TextEdit::events` calls `state.undoer.lock().feed_state(time, &(cursor_range, text.as_str().to_owned()))` both before and after the event loop, each performing a full owned `String` clone of the entire buffer on every frame the widget has focus. For large multiline editors this is two full-buffer allocations+copies per frame regardless of whether anything changed.","fix":"Have the undoer borrow `&str` and clone only when it actually decides to push a snapshot, or skip the pre-loop `feed_state` clone (the post-loop one already captures the latest state).","locations":[{"ref":"crates/egui/src/widgets/text_edit/builder.rs:989-992","code":"  989 |     state.undoer.lock().feed_state(\n  990 |         ui.input(|i| i.time),\n  991 |         &(cursor_range, text.as_str().to_owned()),\n  992 |     );","lines":4},{"ref":"crates/egui/src/widgets/text_edit/builder.rs:1242-1245","code":" 1242 |     state.undoer.lock().feed_state(\n 1243 |         ui.input(|i| i.time),\n 1244 |         &(cursor_range, text.as_str().to_owned()),\n 1245 |     );","lines":4}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`Gradient::to_pixel_row` simply clones the inner Vec and returns it; the only caller (`TextureManager::get`) immediately consumes the result to build a ColorImage. The clone is redundant - the method exists only to copy the data.","fix":"Use `gradient.0.clone()` (or pass the slice directly) inline in `TextureManager::get` and remove the `to_pixel_row` helper, or have it return `&[Color32]`.","locations":[{"ref":"crates/egui_demo_lib/src/rendering_test.rs:408-410","code":"  408 |     pub fn to_pixel_row(&self) -> Vec<Color32> {\n  409 |         self.0.clone()\n  410 |     }","lines":3},{"ref":"crates/egui_demo_lib/src/rendering_test.rs:417-428","code":"  417 |     fn get(&mut self, ctx: &egui::Context, gradient: &Gradient) -> &TextureHandle {\n  418 |         self.0.entry(gradient.clone()).or_insert_with(|| {\n  419 |             let pixels = gradient.to_pixel_row();\n  420 |             let width = pixels.len();\n  421 |             let height = 1;\n  422 |             ctx.load_texture(\n  423 |                 \"color_test_gradient\",\n  424 |                 epaint::ColorImage::new([width, height], pixels),\n  425 |                 TextureOptions::LINEAR,\n  426 |             )\n  427 |         })\n  428 |     }","lines":12}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Painter::paint_mesh` (glow backend) calls `buffer_data_u8_slice` with `glow::STREAM_DRAW` for both the vertex and index buffers once per mesh, reallocating/orphaning GPU buffer storage on every draw call every frame. For UIs with many separate meshes this is a per-mesh GPU buffer re-upload. This mirrors a known trade-off but is worth noting as a per-frame reallocation hotspot compared to the wgpu backend which uses a single grown-on-demand sliced buffer.","fix":"Consider growing a persistent vertex/index buffer (orphaning only when capacity must grow) and using `buffer_sub_data` into a pre-sized buffer, similar to the `SlicedBuffer` strategy in the wgpu renderer.","locations":[{"ref":"crates/egui_glow/src/painter.rs:470-485","code":"  470 |             unsafe {\n  471 |                 self.gl.bind_buffer(glow::ARRAY_BUFFER, Some(self.vbo));\n  472 |                 self.gl.buffer_data_u8_slice(\n  473 |                     glow::ARRAY_BUFFER,\n  474 |                     bytemuck::cast_slice(&mesh.vertices),\n  475 |                     glow::STREAM_DRAW,\n  476 |                 );\n  477 | \n  478 |                 self.gl\n  479 |                     .bind_buffer(glow::ELEMENT_ARRAY_BUFFER, Some(self.element_array_buffer));\n  480 |                 self.gl.buffer_data_u8_slice(\n  481 |                     glow::ELEMENT_ARRAY_BUFFER,\n  482 |                     bytemuck::cast_slice(&mesh.indices),\n  483 |                     glow::STREAM_DRAW,\n  484 |                 );\n  485 | ","lines":16}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Per-call allocation in tessellate_ellipse: it builds a fresh `Vec<Vec2>` for the quarter arc and a separate `Vec<Pos2> points` every call, instead of using the existing `scratchpad_points`/`scratchpad_path` reused buffers like the other tessellate_* methods. Ellipses are flagged for parallel tessellation (they are considered 'large/slow'), so this runs on the hot path.","fix":"Reuse self.scratchpad_points (clear + extend) for the points buffer and avoid the intermediate `quarter` Vec, or at least `Vec::with_capacity`.","locations":[{"ref":"crates/epaint/src/tessellator.rs:1572-1595","code":" 1572 |         let quarter: Vec<Vec2> = (1..num_points)\n 1573 |             .map(|i| {\n 1574 |                 let percent = i as f32 / num_points as f32;\n 1575 | \n 1576 |                 // Ease the percent value, concentrating points around tight bends\n 1577 |                 let eased = 2.0 * (percent - percent.powf(2.0)) * ratio + percent.powf(2.0);\n 1578 | \n 1579 |                 // Scale the ease to the quarter\n 1580 |                 let t = eased * std::f32::consts::FRAC_PI_2;\n 1581 |                 Vec2::new(radius.x * f32::cos(t), radius.y * f32::sin(t))\n 1582 |             })\n 1583 |             .collect();\n 1584 | \n 1585 |         // Build the ellipse from the 4 known vertices filling arcs between\n 1586 |         // them by mirroring the points between 0 and pi/2\n 1587 |         let mut points = Vec::new();\n 1588 |         points.push(center + Vec2::new(radius.x, 0.0));\n 1589 |         points.extend(quarter.iter().map(|p| center + *p));\n 1590 |         points.push(center + Vec2::new(0.0, radius.y));\n 1591 |         points.extend(quarter.iter().rev().map(|p| center + Vec2::new(-p.x, p.y)));\n 1592 |         points.push(center + Vec2::new(-radius.x, 0.0));\n 1593 |         points.extend(quarter.iter().map(|p| center - *p));\n 1594 |         points.push(center + Vec2::new(0.0, -radius.y));\n 1595 |         points.extend(quarter.iter().rev().map(|p| center + Vec2::new(p.x, -p.y)));","lines":24}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In `automatic_area_position` the `existing` rectangles vector is collected and sorted every time a new area needs an automatic position. This only runs when an area has no stored position (first frame), so impact is minor, but the column-bucketing loop re-includes `existing[0]` (it is seeded into `column_bbs` and then iterated again), doing a redundant self-union on the first element.","fix":"Start the iteration at `existing[1..]` since `column_bbs` is already seeded with `existing[0]`, avoiding the redundant self-union (purely cosmetic).","locations":[{"ref":"crates/egui/src/containers/area.rs:700-732","code":"  700 | fn automatic_area_position(ctx: &Context, constrain_rect: Rect, layer_id: LayerId) -> Pos2 {\n  701 |     let mut existing: Vec<Rect> = ctx.memory(|mem| {\n  702 |         mem.areas()\n  703 |             .visible_windows()\n  704 |             .filter(|(id, _)| id != &layer_id) // ignore ourselves\n  705 |             .filter(|(_, state)| state.pivot_pos.is_some() && state.size.is_some())\n  706 |             .map(|(_, state)| state.rect())\n  707 |             .collect()\n  708 |     });\n  709 |     existing.sort_by_key(|r| r.left().round() as i32);\n  710 | \n  711 |     let spacing = 16.0;\n  712 |     let left = constrain_rect.left() + spacing;\n  713 |     let top = constrain_rect.top() + spacing;\n  714 | \n  715 |     if existing.is_empty() {\n  716 |         return pos2(left, top);\n  717 |     }\n  718 | \n  719 |     // Separate existing rectangles into columns:\n  720 |     let mut column_bbs = vec![existing[0]];\n  721 | \n  722 |     for &rect in &existing {\n  723 |         #[expect(clippy::unwrap_used)]\n  724 |         let current_column_bb = column_bbs.last_mut().unwrap();\n  725 |         if rect.left() < current_column_bb.right() {\n  726 |             // same column\n  727 |             *current_column_bb |= rect;\n  728 |         } else {\n  729 |             // new column\n  730 |             column_bbs.push(rect);\n  731 |         }\n  732 |     }","lines":33}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`GridLayout::save` clones the entire `curr_state` (two `Vec<f32>`) to store it: `self.curr_state.clone().store(...)`. This runs every frame the grid sizes change. `store` takes `self` by value, so the clone exists only because `save` takes `&self`.","fix":"Have `save` take `&mut self` (or `self`) and move `curr_state` into `store` (e.g. `std::mem::take(&mut self.curr_state)`) to avoid the per-frame Vec clone.","locations":[{"ref":"crates/egui/src/grid.rs:275-282","code":"  275 |     pub(crate) fn save(&self) {\n  276 |         // We need to always save state on the first frame, otherwise request_discard\n  277 |         // would be called repeatedly (see #5132)\n  278 |         if self.curr_state != self.prev_state || self.is_first_frame {\n  279 |             self.curr_state.clone().store(&self.ctx, self.id);\n  280 |             self.ctx.request_repaint();\n  281 |         }\n  282 |     }","lines":8}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`PluginsOrdered::ordered_plugins`/`Plugins::ordered_plugins` clones the entire `Vec<Arc<Mutex<PluginHandle>>>` (`PluginsOrdered::clone`) on every `begin_pass`, `end_pass`, `on_input`, and `on_output` call (four times per pass), just to iterate it without holding the context lock. Each clone bumps the refcount of every plugin Arc. With few plugins this is cheap, but it is an avoidable per-pass allocation.","fix":"Store the ordered plugin list behind a shared `Arc<Vec<...>>` so it can be cloned cheaply (single refcount bump), or restructure so iteration borrows without cloning.","locations":[{"ref":"crates/egui/src/plugin.rs:194-197","code":"  194 | impl Plugins {\n  195 |     pub fn ordered_plugins(&self) -> PluginsOrdered {\n  196 |         self.plugins_ordered.clone()\n  197 |     }","lines":4},{"ref":"crates/egui/src/context.rs:786","code":"  786 |         let plugins = self.read(|ctx| ctx.plugins.ordered_plugins());","lines":1},{"ref":"crates/egui/src/context.rs:899","code":"  899 |         let plugins = self.read(|ctx| ctx.plugins.ordered_plugins());","lines":1},{"ref":"crates/egui/src/context.rs:2393","code":" 2393 |         let plugins = self.read(|ctx| ctx.plugins.ordered_plugins());","lines":1}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Style::text_styles()` allocates a new `Vec<TextStyle>` (cloning every key) on each call. It is used in the panic path of `TextStyle::resolve` and in the style editor combo-boxes; the latter calls it inside `show_ui` closures. Not a hot path for normal rendering, but the allocation+clone is avoidable when only iteration is needed.","fix":"Where only iteration is needed (e.g. the combo-box population), iterate `self.text_styles.keys()` directly instead of materializing a Vec.","locations":[{"ref":"crates/egui/src/style.rs:376-378","code":"  376 |     pub fn text_styles(&self) -> Vec<TextStyle> {\n  377 |         self.text_styles.keys().cloned().collect()\n  378 |     }","lines":3}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Hyperlink::new` calls `url.to_string()` then `url.clone()` to populate both the `url` field and the `text` field, performing two allocations of the same string. Minor, but avoidable.","fix":"Build the text from the already-owned url without an extra clone, e.g. `let url = url.to_string(); Self { text: url.clone().into(), url, new_tab: false }` is unavoidable for two owners, but the WidgetText could borrow; alternatively accept the single extra clone and document it. (Negligible.)","locations":[{"ref":"crates/egui/src/widgets/hyperlink.rs:100-107","code":"  100 |     pub fn new(url: impl ToString) -> Self {\n  101 |         let url = url.to_string();\n  102 |         Self {\n  103 |             url: url.clone(),\n  104 |             text: url.into(),\n  105 |             new_tab: false,\n  106 |         }\n  107 |     }","lines":8}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`test_parse_query` compares `parse_query_map(...)` (which returns `BTreeMap<String, Vec<String>>`) against `BTreeMap::from_iter([(\"foo\", \"\")])` which infers `BTreeMap<&str, &str>`. These types are not comparable, so the test cannot compile. It is only saved by the fact that the whole `web` module is wasm32-only and the test is never actually built/run, as the comment on line 182 admits. The test gives a false sense of coverage and is effectively dead/invalid code.","fix":"Move `parse_query_map` and its test out of the wasm-only module (or behind a `#[cfg(test)]` that compiles on the host target) and fix the expected-value types to `String`/`Vec<String>` so the test actually compiles and runs.","locations":[{"ref":"crates/eframe/src/web/backend.rs:182-210","code":"  182 | // TODO(emilk): this test is never acgtually run, because this whole module is wasm32 only 🤦‍♂️\n  183 | #[test]\n  184 | fn test_parse_query() {\n  185 |     assert_eq!(parse_query_map(\"\"), BTreeMap::default());\n  186 |     assert_eq!(parse_query_map(\"foo\"), BTreeMap::from_iter([(\"foo\", \"\")]));\n  187 |     assert_eq!(\n  188 |         parse_query_map(\"foo=bar\"),\n  189 |         BTreeMap::from_iter([(\"foo\", \"bar\")])\n  190 |     );\n  191 |     assert_eq!(\n  192 |         parse_query_map(\"foo=bar&baz=42\"),\n  193 |         BTreeMap::from_iter([(\"foo\", \"bar\"), (\"baz\", \"42\")])\n  194 |     );\n  195 |     assert_eq!(\n  196 |         parse_query_map(\"foo&baz=42\"),\n  197 |         BTreeMap::from_iter([(\"foo\", \"\"), (\"baz\", \"42\")])\n  198 |     );\n  199 |     assert_eq!(\n  200 |         parse_query_map(\"foo&baz&&\"),\n  201 |         BTreeMap::from_iter([(\"foo\", \"\"), (\"baz\", \"\")])\n  202 |     );\n  203 |     assert_eq!(\n  204 |         parse_query_map(\"badger=data.rrd%3Fparam1%3Dfoo%26param2%3Dbar&mushroom=snake\"),\n  205 |         BTreeMap::from_iter([\n  206 |             (\"badger\", \"data.rrd?param1=foo&param2=bar\"),\n  207 |             (\"mushroom\", \"snake\")\n  208 |         ])\n  209 |     );\n  210 | }","lines":29}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"Permanently-dead `if true { … } else { … }` branch. The `else` arm (which would set `content_max_size[d] = f32::INFINITY` for scrollable axes) can never execute, so it is unreachable dead code that just confuses readers.","fix":"Delete the `if true { … } else { … }` scaffold, keeping only the comment that documents why we fit content to the available size. If the alternative behavior is wanted in the future, gate it behind a real flag.","locations":[{"ref":"crates/egui/src/containers/scroll_area.rs:786-796","code":"  786 |         if true {\n  787 |             // Tell the inner Ui to *try* to fit the content without needing to scroll,\n  788 |             // i.e. better to wrap text and shrink images than showing a horizontal scrollbar!\n  789 |         } else {\n  790 |             // Tell the inner Ui to use as much space as possible, we can scroll to see it!\n  791 |             for d in 0..2 {\n  792 |                 if direction_enabled[d] {\n  793 |                     content_max_size[d] = f32::INFINITY;\n  794 |                 }\n  795 |             }\n  796 |         }","lines":11}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`Classes`'s `Display` impl writes each class with no separator between them and then ends with `f.write_str(\"\")`, which is a no-op. So `Classes` containing [\"selected\", \"root\"] prints as \"selectedroot\" (ambiguous/unparseable), and the trailing empty write is dead. This makes the Display output useless for logging/debugging class sets.","fix":"Join classes with a separator (e.g. ' ') and drop the trailing `write_str(\"\")`: use `write!(f, \"{}\", self.classes.iter().map(|c| c.as_str()).collect::<Vec<_>>().join(\" \"))` or an itertools-style join.","locations":[{"ref":"crates/egui/src/widget_style.rs:259-266","code":"  259 | impl std::fmt::Display for Classes {\n  260 |     fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {\n  261 |         self.classes.iter().for_each(|class| {\n  262 |             let _ = f.write_str(class.as_str());\n  263 |         });\n  264 |         f.write_str(\"\")\n  265 |     }\n  266 | }","lines":8}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The expression computing `d` in find_cross_t algebraically cancels to exactly 0: `p0.x*(p3.y-p0.y)` cancels `p0.x*(p0.y-p3.y)`, and `-p0.y*(p3.x-p0.x)` cancels `+p0.y*(p3.x-p0.x)`. The cubic's constant term is indeed 0, so this is misleading dead arithmetic that obscures intent and invites copy-paste error.","fix":"Replace with `let d = 0.0;` (constant term is zero) or remove the redundant terms.","locations":[{"ref":"crates/epaint/src/shapes/bezier_shape.rs:244-246","code":"  244 |         let d = p0.x * (p3.y - p0.y) - p0.y * (p3.x - p0.x)\n  245 |             + p0.x * (p0.y - p3.y)\n  246 |             + p0.y * (p3.x - p0.x);","lines":3}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`on_keydown` contains an `if false { log::debug!(...) }` block - permanently-disabled debug logging. This is dead code that should either be removed or gated behind a real debug flag/const like `DEBUG_RESIZE`.","fix":"Remove the `if false { … }` block, or replace `false` with a named debug constant so the intent is clear.","locations":[{"ref":"crates/eframe/src/web/events.rs:198-204","code":"  198 |         if false {\n  199 |             log::debug!(\n  200 |                 \"On keydown {:?} {egui_key:?}, has_focus: {has_focus}, egui_wants_keyboard: {}, prevent_default: {prevent_default}\",\n  201 |                 event.key().as_str(),\n  202 |                 runner.egui_ctx().egui_wants_keyboard_input()\n  203 |             );\n  204 |         }","lines":7}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`install_dpr_change_event` wraps its only real work in `if true { … }`. The constant condition is dead-code scaffolding that obscures intent and can never take the (missing) else branch.","fix":"Remove the `if true` wrapper and inline the canvas-resize block.","locations":[{"ref":"crates/eframe/src/web/events.rs:447-454","code":"  447 |         if true {\n  448 |             // Explicitly resize canvas to match the new DPR.\n  449 |             // This is a bit ugly, but I haven't found a better way to do it.\n  450 |             let canvas = app_runner.canvas();\n  451 |             canvas.set_width((canvas.width() as f32 * new_dpr / original_dpr).round() as _);\n  452 |             canvas.set_height((canvas.height() as f32 * new_dpr / original_dpr).round() as _);\n  453 |             log::debug!(\"Resized canvas to {}x{}\", canvas.width(), canvas.height());\n  454 |         }","lines":8}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"Commented-out leftover code `// response.active |= is_popup_open;` inside `combo_box_dyn`. Stale commented code should not be left in the source.","fix":"Remove the commented-out line.","locations":[{"ref":"crates/egui/src/containers/combo_box.rs:366","code":"  366 |         // response.active |= is_popup_open;","lines":1}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"The `InTouch` enum variant uses a plain `//` comment for its documentation while the sibling variants `Static` and `Smoothing` use `///` doc comments. As a result `InTouch` has no rustdoc, an inconsistency that drops it from generated docs.","fix":"Change the `// We're in-between` comment above `InTouch` to a `///` doc comment.","locations":[{"ref":"crates/egui/src/input_state/wheel_state.rs:27-34","code":"   27 |     /// Not scrolling,\n   28 |     Static,\n   29 | \n   30 |     /// We're smoothing out previous scroll events\n   31 |     Smoothing,\n   32 | \n   33 |     // We're in-between [`TouchPhase::Start`] and [`TouchPhase::End`] of a trackpad scroll.\n   34 |     InTouch,","lines":8}]},{"id":"DEAD_9","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`impl<P: Plugin> TypedPluginGuard<'_, P> {}` is an empty impl block with no items, left over (presumably) from refactoring. It is dead code that adds noise.","fix":"Remove the empty impl block.","locations":[{"ref":"crates/egui/src/plugin.rs:91","code":"   91 | impl<P: Plugin> TypedPluginGuard<'_, P> {}","lines":1}]},{"id":"DEAD_10","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`color_picker_hsvag_2d` contains two `if false { color_slider_1d(...) }` blocks for the saturation and value 1D sliders. This is permanently-disabled dead code kept inline, cluttering the function and confusing readers about whether the 1D S/V sliders are ever shown.","fix":"Remove the `if false` blocks (the 2D slider on the next lines replaces them), or gate them behind a real config flag if they are meant to be optionally enabled.","locations":[{"ref":"crates/egui/src/widgets/color_picker.rs:368-374","code":"  368 |     if false {\n  369 |         color_slider_1d(ui, s, |s| HsvaGamma { s, ..opaque }.into()).on_hover_text(\"Saturation\");\n  370 |     }\n  371 | \n  372 |     if false {\n  373 |         color_slider_1d(ui, v, |v| HsvaGamma { v, ..opaque }.into()).on_hover_text(\"Value\");\n  374 |     }","lines":7}]},{"id":"DEAD_11","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"Large commented-out alternate disc-radiu
