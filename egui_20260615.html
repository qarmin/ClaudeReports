<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"The entire glow integration file is compiled with `#![expect(clippy::unwrap_used)]` and contains many `.unwrap()`/`.expect()` calls on fallible GPU / windowing operations. In particular `change_gl_context` unwraps `make_not_current()` and `make_current()` (GL context switches that can genuinely fail), and `GlutinWindowContext::resize` unwraps `current_gl_context.as_ref()`. A driver/context loss turns these into hard panics that crash the whole app instead of surfacing a `crate::Error`. The file's own module doc even flags this (\"like removing a bunch of `unwraps`\").","fix":"Propagate these failures as `crate::Error` (the surrounding functions already return `Result`), or at minimum log and bail gracefully. Replace `.unwrap()` on `make_current`/`make_not_current`/`current_gl_context.as_ref()` with `?`-based error handling.","locations":[{"ref":"crates/eframe/src/native/glow_integration.rs:935-948","code":"  935 |     let not_current = if let Some(not_current_context) = not_current_gl_context.take() {\n  936 |         not_current_context\n  937 |     } else {\n  938 |         profiling::scope!(\"make_not_current\");\n  939 |         current_gl_context\n  940 |             .take()\n  941 |             .unwrap()\n  942 |             .make_not_current()\n  943 |             .unwrap()\n  944 |     };\n  945 | \n  946 |     profiling::scope!(\"make_current\");\n  947 |     *current_gl_context = Some(not_current.make_current(gl_surface).unwrap());\n  948 | }","lines":14},{"ref":"crates/eframe/src/native/glow_integration.rs:1299-1318","code":" 1299 |     fn resize(&mut self, viewport_id: ViewportId, physical_size: winit::dpi::PhysicalSize<u32>) {\n 1300 |         let width_px = NonZeroU32::new(physical_size.width).unwrap_or(NonZeroU32::MIN);\n 1301 |         let height_px = NonZeroU32::new(physical_size.height).unwrap_or(NonZeroU32::MIN);\n 1302 | \n 1303 |         if let Some(viewport) = self.viewports.get(&viewport_id)\n 1304 |             && let Some(gl_surface) = &viewport.gl_surface\n 1305 |         {\n 1306 |             change_gl_context(\n 1307 |                 &mut self.current_gl_context,\n 1308 |                 &mut self.not_current_gl_context,\n 1309 |                 gl_surface,\n 1310 |             );\n 1311 |             gl_surface.resize(\n 1312 |                 self.current_gl_context\n 1313 |                     .as_ref()\n 1314 |                     .expect(\"failed to get current context to resize surface\"),\n 1315 |                 width_px,\n 1316 |                 height_px,\n 1317 |             );\n 1318 |         }","lines":20}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`render_immediate_viewport` (glow) unwraps `current_gl_context.as_ref()` right after `change_gl_context`. If the context switch left `current_gl_context` as `None` (e.g. a transient failure in the non-panicking Windows path was added later), this panics inside user-driven immediate-viewport rendering. The surrounding function returns `()` and already uses graceful `let-else`/`if let Err` everywhere else, so this single unwrap is inconsistent and crash-prone.","fix":"Use `let Some(current_gl_context) = current_gl_context.as_ref() else { log::error!(...); return; };` to match the graceful error handling used elsewhere in this function.","locations":[{"ref":"crates/eframe/src/native/glow_integration.rs:1568-1570","code":" 1568 |     change_gl_context(current_gl_context, not_current_gl_context, gl_surface);\n 1569 | \n 1570 |     let current_gl_context = current_gl_context.as_ref().unwrap();","lines":3}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`init_webgl1`/`init_webgl2` call `.expect(\"Failed to query about WebGL2 context\")` on `canvas.get_context(...)` and `.unwrap()` on the `dyn_into` cast. A `get_context` call can return `Err` (e.g. when the canvas already has an incompatible context type bound, which happens if the user reuses a canvas), turning recoverable WebGL setup failure into an uncatchable wasm panic instead of the intended `Err(\"WebGL isn't supported\")` path.","fix":"Convert the `.expect()` on `get_context` into `.ok().flatten()` returning `None`, and handle the `dyn_into` failure as `None`, so the caller falls through to the proper WebGL-unsupported error.","locations":[{"ref":"crates/eframe/src/web/web_painter_glow.rs:132-171","code":"  132 | fn init_webgl1(canvas: &HtmlCanvasElement) -> Option<(glow::Context, &'static str)> {\n  133 |     let gl1_ctx = canvas\n  134 |         .get_context(\"webgl\")\n  135 |         .expect(\"Failed to query about WebGL2 context\");\n  136 | \n  137 |     let gl1_ctx = gl1_ctx?;\n  138 |     log::debug!(\"WebGL1 selected.\");\n  139 | \n  140 |     let gl1_ctx = gl1_ctx\n  141 |         .dyn_into::<web_sys::WebGlRenderingContext>()\n  142 |         .unwrap();\n  143 | \n  144 |     let shader_prefix = if webgl1_requires_brightening(&gl1_ctx) {\n  145 |         log::debug!(\"Enabling webkitGTK brightening workaround.\");\n  146 |         \"#define APPLY_BRIGHTENING_GAMMA\"\n  147 |     } else {\n  148 |         \"\"\n  149 |     };\n  150 | \n  151 |     let gl = glow::Context::from_webgl1_context(gl1_ctx);\n  152 | \n  153 |     Some((gl, shader_prefix))\n  154 | }\n  155 | \n  156 | fn init_webgl2(canvas: &HtmlCanvasElement) -> Option<(glow::Context, &'static str)> {\n  157 |     let gl2_ctx = canvas\n  158 |         .get_context(\"webgl2\")\n  159 |         .expect(\"Failed to query about WebGL2 context\");\n  160 | \n  161 |     let gl2_ctx = gl2_ctx?;\n  162 |     log::debug!(\"WebGL2 selected.\");\n  163 | \n  164 |     let gl2_ctx = gl2_ctx\n  165 |         .dyn_into::<web_sys::WebGl2RenderingContext>()\n  166 |         .unwrap();\n  167 |     let gl = glow::Context::from_webgl2_context(gl2_ctx);\n  168 |     let shader_prefix = \"\";\n  169 | \n  170 |     Some((gl, shader_prefix))\n  171 | }","lines":40}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`PaintList::reset_shape` indexes `self.0[idx.0]` directly with no bounds check, unlike the sibling methods `set` (which checks `len() <= idx.0` and warns) and `mutate_shape` (which uses `get_mut`). A stale or out-of-range `ShapeIdx` (e.g. an index allocated in a different/cleared `PaintList`) will panic with an out-of-bounds index. `transform_range` (slicing `self.0[start.0..end.0]`) has the same unchecked-panic risk.","fix":"Make `reset_shape` bounds-check like `set`/`mutate_shape` (e.g. `if let Some(s) = self.0.get_mut(idx.0) { s.shape = Shape::Noop; }`), and guard `transform_range` against `start`/`end` exceeding `len()`.","locations":[{"ref":"crates/egui/src/layers.rs:159-162","code":"  159 |     #[inline(always)]\n  160 |     pub fn reset_shape(&mut self, idx: ShapeIdx) {\n  161 |         self.0[idx.0].shape = Shape::Noop;\n  162 |     }","lines":4},{"ref":"crates/egui/src/layers.rs:177-183","code":"  177 |     /// Transform each [`Shape`] and clip rectangle in range by this much, in-place\n  178 |     pub fn transform_range(&mut self, start: ShapeIdx, end: ShapeIdx, transform: TSTransform) {\n  179 |         for ClippedShape { clip_rect, shape } in &mut self.0[start.0..end.0] {\n  180 |             *clip_rect = transform.mul_rect(*clip_rect);\n  181 |             shape.transform(transform);\n  182 |         }\n  183 |     }","lines":7}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"The EasyMark highlighter assumes the character after a backslash escape is exactly one byte: when `text.starts_with('\\')` it sets `skip = 2`, then slices `text[skip..]` (lines 109/112). If the escaped character is multi-byte UTF-8 (e.g. `\\é`), `text[2..]` slices in the middle of the character and panics. The highlighter runs on the live editor buffer, so this is reachable by typing into the EasyMark editor.","fix":"Compute the byte length of the escaped char: `let skip = 1 + text[1..].chars().next().map_or(0, |c| c.len_utf8());` instead of the hard-coded `2`.","locations":[{"ref":"crates/egui_demo_lib/src/easy_mark/easy_mark_highlighter.rs:61-62","code":"   61 |         if text.starts_with('\\\\') && text.len() >= 2 {\n   62 |             skip = 2;","lines":2},{"ref":"crates/egui_demo_lib/src/easy_mark/easy_mark_highlighter.rs:109-114","code":"  109 |         let line_end = text[skip..]\n  110 |             .find('\\n')\n  111 |             .map_or_else(|| text.len(), |i| skip + i + 1);\n  112 |         let end = text[skip..]\n  113 |             .find(&['*', '`', '~', '_', '/', '$', '^', '\\\\', '<', '['][..])\n  114 |             .map_or_else(|| text.len(), |i| (skip + i).max(1));","lines":6}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"The EasyMark parser slices the byte right after a backslash escape on hard-coded byte offsets: `&self.s[1..2]` and `&self.s[2..]`. When the character following `\\` is a multi-byte UTF-8 character (e.g. typing `\\é` in the EasyMark editor), index 1 and/or 2 fall in the middle of that character and `str` indexing panics. This is reachable from the live EasyMark editor/viewer with arbitrary user text.","fix":"Take the next char by its real byte length instead of assuming 1 byte: e.g. `let c = self.s[1..].chars().next(); let len = c.map_or(0, |c| c.len_utf8()); let text = &self.s[1..1+len]; self.s = &self.s[1+len..];`.","locations":[{"ref":"crates/egui_demo_lib/src/easy_mark/easy_mark_parser.rs:214-219","code":"  214 |             if self.s.starts_with('\\\\') && self.s.len() >= 2 {\n  215 |                 let text = &self.s[1..2];\n  216 |                 self.s = &self.s[2..];\n  217 |                 self.start_of_line = false;\n  218 |                 return Some(Item::Text(self.style, text));\n  219 |             }","lines":6}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`AnimatedImage::get_image` indexes `self.frames[index % self.frames.len()]`. If `load_gif` decodes an animation with zero frames (e.g. a malformed/empty GIF that still decodes), `frames.len()` is 0 and the modulo panics with divide-by-zero, taking down the UI thread on untrusted image input.","fix":"Guard against empty frames: return an error from `load_gif` if no frames were decoded, or have `get_image` return `Option`/a placeholder when `frames.is_empty()`.","locations":[{"ref":"crates/egui_extras/src/loaders/gif_loader.rs:54-57","code":"   54 |     /// Gets image at index\n   55 |     pub fn get_image(&self, index: usize) -> Arc<ColorImage> {\n   56 |         Arc::clone(&self.frames[index % self.frames.len()])\n   57 |     }","lines":4},{"ref":"crates/egui_extras/src/loaders/gif_loader.rs:18-39","code":"   18 |     fn load_gif(data: &[u8]) -> Result<Self, String> {\n   19 |         let decoder = image::codecs::gif::GifDecoder::new(Cursor::new(data))\n   20 |             .map_err(|err| format!(\"Failed to decode gif: {err}\"))?;\n   21 |         let mut images = vec![];\n   22 |         let mut durations = vec![];\n   23 |         for frame in decoder.into_frames() {\n   24 |             let frame = frame.map_err(|err| format!(\"Failed to decode gif: {err}\"))?;\n   25 |             let img = frame.buffer();\n   26 |             let pixels = img.as_flat_samples();\n   27 | \n   28 |             let delay: Duration = frame.delay().into();\n   29 |             images.push(Arc::new(ColorImage::from_rgba_unmultiplied(\n   30 |                 [img.width() as usize, img.height() as usize],\n   31 |                 pixels.as_slice(),\n   32 |             )));\n   33 |             durations.push(delay);\n   34 |         }\n   35 |         Ok(Self {\n   36 |             frames: images,\n   37 |             frame_durations: FrameDurations::new(durations),\n   38 |         })\n   39 |     }","lines":22}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Same zero-frame divide-by-zero panic risk as the GIF loader: `AnimatedImage::get_image_by_index` indexes `self.frames[index % self.frames.len()]` with no check that `frames` is non-empty. A WebP that reports `has_animation()` but yields zero decoded frames will panic.","fix":"Reject animations with zero frames during decode, or make `get_image_by_index` handle the empty case without a modulo-by-zero.","locations":[{"ref":"crates/egui_extras/src/loaders/webp_loader.rs:110-112","code":"  110 |     pub fn get_image_by_index(&self, index: usize) -> Arc<ColorImage> {\n  111 |         Arc::clone(&self.frames[index % self.frames.len()])\n  112 |     }","lines":3},{"ref":"crates/egui_extras/src/loaders/webp_loader.rs:28-48","code":"   28 |             let mut images = vec![];\n   29 |             let mut durations = vec![];\n   30 | \n   31 |             for frame in decoder.into_frames() {\n   32 |                 let frame =\n   33 |                     frame.map_err(|error| format!(\"WebP frame decode failure ({error})\"))?;\n   34 |                 let image = frame.buffer();\n   35 |                 let pixels = image.as_flat_samples();\n   36 | \n   37 |                 images.push(Arc::new(ColorImage::from_rgba_unmultiplied(\n   38 |                     [image.width() as usize, image.height() as usize],\n   39 |                     pixels.as_slice(),\n   40 |                 )));\n   41 | \n   42 |                 let delay: Duration = frame.delay().into();\n   43 |                 durations.push(delay);\n   44 |             }\n   45 |             Ok(Self::Animated(AnimatedImage {\n   46 |                 frames: images,\n   47 |                 frame_durations: FrameDurations::new(durations),\n   48 |             }))","lines":21}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`ShaderVersion::parse` contains several `unwrap()`s that panic on malformed driver version strings. `glsl_ver.find(|c| char::is_ascii_digit(&c)).unwrap()` panics if the version string contains no digit at all, and the final `.try_into().unwrap()` panics if the collected `Vec<u8>` does not have exactly 2 elements (it can have length 1 when the version string has a digit but no `.`, e.g. `\"3\"`, since `splitn(3,'.').take(2)` yields a single element). A driver returning an unusual `SHADING_LANGUAGE_VERSION` string would crash egui_glow at startup rather than falling back to a default.","fix":"Handle the no-digit case by returning a sane default (e.g. `Gl120`) instead of unwrapping `find`, and build `[maj, min]` without `try_into().unwrap()` (pad missing components with 0).","locations":[{"ref":"crates/egui_glow/src/shader_version.rs:33-45","code":"   33 |     pub(crate) fn parse(glsl_ver: &str) -> Self {\n   34 |         let start = glsl_ver.find(|c| char::is_ascii_digit(&c)).unwrap();\n   35 |         let es = glsl_ver[..start].contains(\" ES \");\n   36 |         let ver = glsl_ver[start..]\n   37 |             .split_once(' ')\n   38 |             .map_or(&glsl_ver[start..], |x| x.0);\n   39 |         let [maj, min]: [u8; 2] = ver\n   40 |             .splitn(3, '.')\n   41 |             .take(2)\n   42 |             .map(|x| x.parse().unwrap_or_default())\n   43 |             .collect::<Vec<u8>>()\n   44 |             .try_into()\n   45 |             .unwrap();","lines":13}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"split_to_u16's inner loop guard only checks `index_cursor < self.indices.len()`, but the body then reads `self.indices[index_cursor + i]` for i in 0..3. If `indices.len()` is not a multiple of 3 (an invalid mesh that can still reach here, since the release build's `is_valid` debug_assert is compiled out), this indexes out of bounds and panics. The common-case fast path (vertices.len() <= 65535) hides this for small meshes, but a large mesh with a non-multiple-of-3 index count panics.","fix":"Guard with `index_cursor + 3 <= self.indices.len()` before reading the three indices, or assert `indices.len() % 3 == 0` at the top of split_to_u16.","locations":[{"ref":"crates/epaint/src/mesh.rs:265-271","code":"  265 |             while index_cursor < self.indices.len() {\n  266 |                 let (mut new_min, mut new_max) = (min_vindex, max_vindex);\n  267 |                 for i in 0..3 {\n  268 |                     let idx = self.indices[index_cursor + i];\n  269 |                     new_min = new_min.min(idx);\n  270 |                     new_max = new_max.max(idx);\n  271 |                 }","lines":7}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`ContextImpl::accesskit_node_builder` resolves an accesskit parent via the recursive helper `find_accesskit_parent`, which walks `parent_map` with no cycle detection. If `parent_map` ever contains a cycle (e.g. A's parent is B and B's parent is A, due to a misuse of `register_accesskit_parent`), this recurses infinitely and overflows the stack. Accesskit parent registration comes from user-influenced `UiBuilder::accessibility_parent`.","fix":"Add cycle/`depth` protection to `find_accesskit_parent` (e.g. bound the recursion depth or track visited ids) so a malformed parent map cannot cause unbounded recursion.","locations":[{"ref":"crates/egui/src/context.rs:594-616","code":"  594 |             /// Find the first ancestor that already has an accesskit node.\n  595 |             fn find_accesskit_parent(\n  596 |                 parent_map: &IdMap<Id>,\n  597 |                 node_map: &IdMap<accesskit::Node>,\n  598 |                 id: Id,\n  599 |             ) -> Option<Id> {\n  600 |                 if let Some(parent_id) = parent_map.get(&id) {\n  601 |                     if node_map.contains_key(parent_id) {\n  602 |                         Some(*parent_id)\n  603 |                     } else {\n  604 |                         find_accesskit_parent(parent_map, node_map, *parent_id)\n  605 |                     }\n  606 |                 } else {\n  607 |                     None\n  608 |                 }\n  609 |             }\n  610 | \n  611 |             let parent_id = find_accesskit_parent(&state.parent_map, builders, id)\n  612 |                 .unwrap_or_else(crate::accesskit_root_id);\n  613 | \n  614 |             let parent_builder = builders.get_mut(&parent_id)?;\n  615 |             parent_builder.push_child(id.accesskit_id());\n  616 |         }","lines":23}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`TextStyle::resolve` panics (via `unwrap_or_else(|| panic!(...))`) if the style is missing from `Style::text_styles`. Since user code can freely mutate `style.text_styles` (e.g. remove `Body`), a missing entry will crash the whole UI rather than degrading gracefully. `FontSelection::resolve` ultimately funnels through here for the default body style too.","fix":"Consider falling back to a sane default FontId (and logging a warning once) instead of panicking, so a misconfigured text_styles map cannot crash the app.","locations":[{"ref":"crates/egui/src/style.rs:112-121","code":"  112 |     pub fn resolve(&self, style: &Style) -> FontId {\n  113 |         style.text_styles.get(self).cloned().unwrap_or_else(|| {\n  114 |             panic!(\n  115 |                 \"Failed to find {:?} in Style::text_styles. Available styles:\\n{:#?}\",\n  116 |                 self,\n  117 |                 style.text_styles()\n  118 |             )\n  119 |         })\n  120 |     }\n  121 | }","lines":10}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`match self.degree` handles only 3 and 4, with `_ => unreachable!()`. `degree` is a serde-persisted `usize` (the struct derives Deserialize with serde(default)), so a corrupted or out-of-date persisted state with any other value reaches `unreachable!()` and panics on startup.","fix":"Clamp/validate `degree` to {3,4} when used (e.g. treat any non-3 value as 4), or replace `unreachable!()` with a graceful fallback that paints nothing.","locations":[{"ref":"crates/egui_demo_lib/src/demo/paint_bezier.rs:126-154","code":"  126 |         match self.degree {\n  127 |             3 => {\n  128 |                 let points = points_in_screen.clone().try_into().unwrap();\n  129 |                 let shape =\n  130 |                     QuadraticBezierShape::from_points_stroke(points, true, self.fill, self.stroke);\n  131 |                 painter.add(epaint::RectShape::stroke(\n  132 |                     shape.visual_bounding_rect(),\n  133 |                     0.0,\n  134 |                     self.bounding_box_stroke,\n  135 |                     StrokeKind::Outside,\n  136 |                 ));\n  137 |                 painter.add(shape);\n  138 |             }\n  139 |             4 => {\n  140 |                 let points = points_in_screen.clone().try_into().unwrap();\n  141 |                 let shape =\n  142 |                     CubicBezierShape::from_points_stroke(points, true, self.fill, self.stroke);\n  143 |                 painter.add(epaint::RectShape::stroke(\n  144 |                     shape.visual_bounding_rect(),\n  145 |                     0.0,\n  146 |                     self.bounding_box_stroke,\n  147 |                     StrokeKind::Outside,\n  148 |                 ));\n  149 |                 painter.add(shape);\n  150 |             }\n  151 |             _ => {\n  152 |                 unreachable!();\n  153 |             }\n  154 |         }","lines":29}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The datepicker year/month arrows mutate `popup_state.year` with no bounds, and `last_day_of_month`/`month_data`/the Save handler call `Date::new(year, month, ...).expect(...)`. jiff's `Date` only supports years in `-9999..=9999`; holding the `<<<`/`>>>` (year) arrows past that range makes `Date::new` return `Err` and the `expect` panics. Likewise `month_data` uses `start.yesterday().unwrap()`/`tomorrow().unwrap()` which panic at the min/max representable date.","fix":"Clamp `popup_state.year` to jiff's supported range (e.g. `-9999..=9999`) after each arrow, and handle the `Date::new` result instead of unwrapping.","locations":[{"ref":"crates/egui_extras/src/datepicker/popup.rs:19-25","code":"   19 | impl DatePickerPopupState {\n   20 |     fn last_day_of_month(&self) -> i8 {\n   21 |         Date::new(self.year, self.month, 1)\n   22 |             .expect(\"Could not create Date\")\n   23 |             .days_in_month()\n   24 |     }\n   25 | }","lines":7},{"ref":"crates/egui_extras/src/datepicker/popup.rs:186-191","code":"  186 |                                         popup_state.year -= 1;\n  187 |                                         popup_state.day =\n  188 |                                             popup_state.day.min(popup_state.last_day_of_month());\n  189 |                                         ui.data_mut(|data| {\n  190 |                                             data.insert_persisted(id, popup_state.clone());\n  191 |                                         });","lines":6},{"ref":"crates/egui_extras/src/datepicker/mod.rs:15-33","code":"   15 | fn month_data(year: i16, month: i8) -> Vec<Week> {\n   16 |     let first = Date::new(year, month, 1).expect(\"Could not create Date\");\n   17 |     let mut start = first;\n   18 |     while start.weekday() != Weekday::Monday {\n   19 |         start = start.yesterday().unwrap();\n   20 |     }\n   21 |     let mut weeks = vec![];\n   22 |     let mut week = vec![];\n   23 |     while start < first || start.month() == first.month() || start.weekday() != Weekday::Monday {\n   24 |         week.push(start);\n   25 | \n   26 |         if start.weekday() == Weekday::Sunday {\n   27 |             weeks.push(Week {\n   28 |                 number: ISOWeekDate::from(start).week() as u8,\n   29 |                 days: std::mem::take(&mut week),\n   30 |             });\n   31 |         }\n   32 |         start = start.tomorrow().unwrap();\n   33 |     }","lines":19}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`WgpuTestRenderer::render` rounds the content size to `u32` pixels and unconditionally creates a render-target texture of that size. If the harness content rect is empty (zero width or height, e.g. an empty UI or a degenerate `with_size`), `screen.size_in_pixels` becomes `[0, 0]` and `create_texture` will panic / validation-error in wgpu (textures must have non-zero extent). A test author with an empty UI hits an opaque GPU panic instead of a clear error.","fix":"Clamp `size_in_pixels` to a minimum of 1 in each dimension (e.g. `.max(1)`), or return a `RenderError` describing the empty render area.","locations":[{"ref":"crates/egui_kittest/src/wgpu.rs:167-199","code":"  167 |         let size = ctx.content_rect().size() * ctx.pixels_per_point();\n  168 |         let screen = ScreenDescriptor {\n  169 |             pixels_per_point: ctx.pixels_per_point(),\n  170 |             size_in_pixels: [size.x.round() as u32, size.y.round() as u32],\n  171 |         };\n  172 | \n  173 |         let tessellated = ctx.tessellate(output.shapes.clone(), ctx.pixels_per_point());\n  174 | \n  175 |         let user_buffers = renderer.update_buffers(\n  176 |             &self.render_state.device,\n  177 |             &self.render_state.queue,\n  178 |             &mut encoder,\n  179 |             &tessellated,\n  180 |             &screen,\n  181 |         );\n  182 | \n  183 |         let texture = self\n  184 |             .render_state\n  185 |             .device\n  186 |             .create_texture(&wgpu::TextureDescriptor {\n  187 |                 label: Some(\"Egui Texture\"),\n  188 |                 size: wgpu::Extent3d {\n  189 |                     width: screen.size_in_pixels[0],\n  190 |                     height: screen.size_in_pixels[1],\n  191 |                     depth_or_array_layers: 1,\n  192 |                 },\n  193 |                 mip_level_count: 1,\n  194 |                 sample_count: 1,\n  195 |                 dimension: wgpu::TextureDimension::D2,\n  196 |                 format: self.render_state.target_format,\n  197 |                 usage: wgpu::TextureUsages::RENDER_ATTACHMENT | wgpu::TextureUsages::COPY_SRC,\n  198 |                 view_formats: &[],\n  199 |             });","lines":33}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"`DefaultTextureLoader::end_pass` only evicts stale entries from a bucket when `2 <= bucket.len()`. A `PrimaryKey` whose bucket holds exactly one entry is never evicted by age, regardless of how many passes elapse since `last_used`. The single-entry case is the common one for normal (non-SVG) images, so any image/URI shown once stays in the GPU texture cache for the rest of the session unless an explicit `forget`/`forget_all` is called. Apps that cycle through many distinct image URIs (galleries, avatar lists) grow the texture cache unbounded.","fix":"Evict any entry whose `texture.last_used + N < *pass_index` regardless of bucket length (with a generous N or configurable policy), then drop empty buckets.","locations":[{"ref":"crates/egui/src/load/texture_loader.rs:119-135","code":"  119 |     fn end_pass(&self, pass_index: u64) {\n  120 |         let mut state = self.state.lock();\n  121 |         state.pass_index = pass_index;\n  122 | \n  123 |         let State { pass_index, cache } = &mut *state;\n  124 | \n  125 |         cache.retain(|_key, bucket| {\n  126 |             if 2 <= bucket.len() {\n  127 |                 // There are multiple textures of the same URI (e.g. SVGs of different scales).\n  128 |                 // This could be because someone has an SVG in a resizable container,\n  129 |                 // and so we get a lot of different sizes of it.\n  130 |                 // This could wast VRAM, so we remove the ones that are not used in this frame.\n  131 |                 bucket.retain(|_, texture| *pass_index <= texture.last_used + 1);\n  132 |             }\n  133 |             !bucket.is_empty()\n  134 |         });\n  135 |     }","lines":17}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `tint_color_towards`, for very low non-zero alpha values the divisor `(2 * 255 / a as i32) as u8` overflows `u8`. For `a == 1` the i32 value is `510`, which truncates to `254` when cast to `u8` (not a panic, but a silently wrong tint divisor). The intermediate computation should not be narrowed to `u8` before use, since `2 * 255 / a` can exceed 255 for `a < 3`.","fix":"Keep the divisor as `i32` (or `u32`) for the division: e.g. `let div = (2 * 255 / a as i32).max(1); r = r / 2 + (target.r() as i32 / div) as u8;` Avoid casting the divisor to `u8`.","locations":[{"ref":"crates/ecolor/src/lib.rs:181-188","code":"  181 |     } else if a < 170 {\n  182 |         // Cheapish and looks ok.\n  183 |         // Works for e.g. grid stripes.\n  184 |         let div = (2 * 255 / a as i32) as u8;\n  185 |         r = r / 2 + target.r() / div;\n  186 |         g = g / 2 + target.g() / div;\n  187 |         b = b / 2 + target.b() / div;\n  188 |         a /= 2;","lines":8}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`WebInput` derives `Default`, so `accumulated_scale` initializes to `0.0`. `handle_gesture` computes `scale_delta = new_scale / runner.input.accumulated_scale`. The `gesturestart` handler resets it to `1.0`, but if a `gesturechange`/`gestureend` event is ever delivered without a preceding `gesturestart` (browser quirk, or a re-entrant/edge sequence), this divides by zero, producing `inf`/`NaN` zoom deltas that propagate into egui as a `Zoom` event.","fix":"Initialize `accumulated_scale` to `1.0` (e.g. via a manual `Default` impl or `new()` constructor) and guard against a zero divisor in `handle_gesture`.","locations":[{"ref":"crates/eframe/src/web/backend.rs:18-25","code":"   18 |     pub accumulated_scale: f32,\n   19 | \n   20 |     /// Helps to track the delta rotation from gesture events\n   21 |     pub accumulated_rotation: f32,\n   22 | \n   23 |     /// The raw input to `egui`.\n   24 |     pub raw: egui::RawInput,\n   25 | }","lines":8},{"ref":"crates/eframe/src/web/events.rs:877-879","code":"  877 |     let scale_delta = new_scale / runner.input.accumulated_scale;\n  878 |     let rotation_delta = new_rotation - runner.input.accumulated_rotation;\n  879 |     runner.input.accumulated_scale *= scale_delta;","lines":3}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`ccursor_previous_word` computes `num_chars - ccursor.index` and `ccursor_previous_line` computes `num_chars - ccursor.index`; if a caller ever passes a `CCursor` whose `index` exceeds the char count of the text (the functions are `pub` and take a raw `&str`, so callers are not guaranteed to clamp), this subtraction underflows and panics in debug / wraps in release, leading to an out-of-range index later. Current internal callers happen to pass clamped cursors, but the public API has no guard.","fix":"Clamp the index to `num_chars` before subtracting, e.g. `let idx = ccursor.index.min(num_chars);` and use `num_chars - idx`.","locations":[{"ref":"crates/egui/src/text_selection/text_cursor_state.rs:180-197","code":"  180 | pub fn ccursor_previous_word(text: &str, ccursor: CCursor) -> CCursor {\n  181 |     let num_chars = text.chars().count();\n  182 |     let reversed: String = text.graphemes(true).rev().collect();\n  183 |     CCursor {\n  184 |         index: num_chars\n  185 |             - next_word_boundary_char_index(&reversed, num_chars - ccursor.index).min(num_chars),\n  186 |         prefer_next_row: true,\n  187 |     }\n  188 | }\n  189 | \n  190 | fn ccursor_previous_line(text: &str, ccursor: CCursor) -> CCursor {\n  191 |     let num_chars = text.chars().count();\n  192 |     CCursor {\n  193 |         index: num_chars\n  194 |             - next_line_boundary_char_index(text.chars().rev(), num_chars - ccursor.index),\n  195 |         prefer_next_row: true,\n  196 |     }\n  197 | }","lines":18}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`load_svg_bytes_with_size` divides by `source_size.x` / `source_size.y` when computing the scaled size. An SVG that reports a zero width or height produces inf/NaN, which becomes `0` or a garbage `u32` after `as u32`. The subsequent `Pixmap::new(w, h)` returns `None` and the error is surfaced, so it does not crash, but the error message (`Failed to create SVG Pixmap of size 0x0`) is misleading and the NaN path is fragile.","fix":"Early-return a clear error when `source_size.x == 0.0 || source_size.y == 0.0` before doing the divisions.","locations":[{"ref":"crates/egui_extras/src/image.rs:76-105","code":"   76 |     let source_size = Vec2::new(rtree.size().width(), rtree.size().height());\n   77 | \n   78 |     let scaled_size = match size_hint {\n   79 |         SizeHint::Size {\n   80 |             width,\n   81 |             height,\n   82 |             maintain_aspect_ratio,\n   83 |         } => {\n   84 |             if maintain_aspect_ratio {\n   85 |                 // As large as possible, without exceeding the given size:\n   86 |                 let mut size = source_size;\n   87 |                 size *= width as f32 / source_size.x;\n   88 |                 if size.y > height as f32 {\n   89 |                     size *= height as f32 / size.y;\n   90 |                 }\n   91 |                 size\n   92 |             } else {\n   93 |                 Vec2::new(width as _, height as _)\n   94 |             }\n   95 |         }\n   96 |         SizeHint::Height(h) => source_size * (h as f32 / source_size.y),\n   97 |         SizeHint::Width(w) => source_size * (w as f32 / source_size.x),\n   98 |         SizeHint::Scale(scale) => scale.into_inner() * source_size,\n   99 |     };\n  100 | \n  101 |     let scaled_size = scaled_size.round();\n  102 |     let (w, h) = (scaled_size.x as u32, scaled_size.y as u32);\n  103 | \n  104 |     let mut pixmap =\n  105 |         Pixmap::new(w, h).ok_or_else(|| format!(\"Failed to create SVG Pixmap of size {w}x{h}\"))?;","lines":30}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Margin's From<f32> and From<Vec2> do `v.round() as _` into i8 with no range check. A margin of e.g. 200.0 silently saturates (f32->i8 `as` saturates) to 127, and large negatives to -128, losing the intended value with no warning - surprising for a public conversion.","fix":"Document the i8 clamping, or debug_assert the value fits in i8 before casting.","locations":[{"ref":"crates/epaint/src/margin.rs:108-120","code":"  108 | impl From<f32> for Margin {\n  109 |     #[inline]\n  110 |     fn from(v: f32) -> Self {\n  111 |         Self::same(v.round() as _)\n  112 |     }\n  113 | }\n  114 | \n  115 | impl From<Vec2> for Margin {\n  116 |     #[inline]\n  117 |     fn from(v: Vec2) -> Self {\n  118 |         Self::symmetric(v.x.round() as _, v.y.round() as _)\n  119 |     }\n  120 | }","lines":13}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"split_to_u16 computes `new_span_size = new_max - new_min + 1` in u32. For a maliciously crafted/huge index range where `new_max - new_min == u32::MAX`, the `+ 1` wraps to 0, which passes the `<= MAX_SIZE` check, so an impossibly large span is wrongly accepted and the later `vertices[min..=max]` slice panics or mis-slices.","fix":"Compute the span in u64: `(new_max - new_min) as u64 + 1` and compare against `MAX_SIZE as u64`.","locations":[{"ref":"crates/epaint/src/mesh.rs:273-274","code":"  273 |                 let new_span_size = new_max - new_min + 1; // plus one, because it is an inclusive range\n  274 |                 if new_span_size <= MAX_SIZE {","lines":2}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"A rasterized glyph's pixel extent (from kurbo f64 bounds.width()/height()) is cast to u16. At very large font sizes a glyph extent can exceed 65535 and silently truncate to a small/garbage value. The atlas `allocate` assert checks the already-truncated value, so it never catches the overflow and the glyph renders at the wrong size.","fix":"Clamp width/height to the atlas size before casting, or keep them as usize and only cast the final atlas-bounded coordinates.","locations":[{"ref":"crates/epaint/src/text/font.rs:275-276","code":"  275 |         let width = bounds.width() as u16;\n  276 |         let height = bounds.height() as u16;","lines":2}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`max_rows_remaining -= galley.rows.len()` can underflow (debug panic / release wrap) if a paragraph layout ever returns more rows than the remaining budget. It relies entirely on the layout invariant that a job laid out with `max_rows = max_rows_remaining` never returns more than that many rows; any off-by-one there becomes a crash here.","fix":"Use `max_rows_remaining = max_rows_remaining.saturating_sub(galley.rows.len());`.","locations":[{"ref":"crates/epaint/src/text/fonts.rs:1108-1110","code":" 1108 |             if max_rows_remaining != usize::MAX {\n 1109 |                 max_rows_remaining -= galley.rows.len();\n 1110 |             }","lines":3}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"resize_to_min_height doubles `image.size[1]` with no upper bound. A degenerate/huge `required_height` can overflow usize or attempt an enormous allocation before any guard. The `allocate` caller checks max_height before calling, but this helper is unguarded on its own.","fix":"Use checked/saturating doubling and assert `required_height` is within a sane bound.","locations":[{"ref":"crates/epaint/src/texture_atlas.rs:266-269","code":"  266 | fn resize_to_min_height(image: &mut ColorImage, required_height: usize) -> bool {\n  267 |     while required_height >= image.height() {\n  268 |         image.size[1] *= 2; // double the height\n  269 |     }","lines":4}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`FrameCache` is keyed by a 64-bit hash (`crate::util::hash(key)`) stored in a `nohash_hasher::IntMap<u64, (u32, Value)>`, and the original `Key` is never stored. On a 64-bit hash collision between two distinct keys, `get()` finds the Occupied entry and returns the cached value computed for the OTHER key, with no equality check. For caches whose value depends on the key (e.g. text-layout/galley caches) this is a silent correctness bug. `FramePublisher` avoids this by using a real `HashMap<Key, ...>`; `FrameCache` does not. (Contrast `util/fixed_cache.rs`, which DOES verify `k == key` before returning.)","fix":"Store the original key (or a second verifier) alongside the value and compare on Occupied hits, recomputing on mismatch (e.g. `IntMap<u64, (u32, Key, Value)>`), or switch to `ahash::HashMap<Key, ...>` like `FramePublisher`.","locations":[{"ref":"crates/egui/src/cache/frame_cache.rs:15-68","code":"   15 |     cache: nohash_hasher::IntMap<u64, (u32, Value)>,\n   16 | }\n   17 | \n   18 | impl<Value, Computer> Default for FrameCache<Value, Computer>\n   19 | where\n   20 |     Computer: Default,\n   21 | {\n   22 |     fn default() -> Self {\n   23 |         Self::new(Computer::default())\n   24 |     }\n   25 | }\n   26 | \n   27 | impl<Value, Computer> FrameCache<Value, Computer> {\n   28 |     pub fn new(computer: Computer) -> Self {\n   29 |         Self {\n   30 |             generation: 0,\n   31 |             computer,\n   32 |             cache: Default::default(),\n   33 |         }\n   34 |     }\n   35 | \n   36 |     /// Must be called once per frame to clear the cache.\n   37 |     pub fn evict_cache(&mut self) {\n   38 |         let current_generation = self.generation;\n   39 |         self.cache.retain(|_key, cached| {\n   40 |             cached.0 == current_generation // only keep those that were used this frame\n   41 |         });\n   42 |         self.generation = self.generation.wrapping_add(1);\n   43 |     }\n   44 | }\n   45 | \n   46 | impl<Value, Computer> FrameCache<Value, Computer> {\n   47 |     /// Get from cache (if the same key was used last frame)\n   48 |     /// or recompute and store in the cache.\n   49 |     pub fn get<Key>(&mut self, key: Key) -> &Value\n   50 |     where\n   51 |         Key: Copy + std::hash::Hash,\n   52 |         Computer: ComputerMut<Key, Value>,\n   53 |     {\n   54 |         let hash = crate::util::hash(key);\n   55 | \n   56 |         match self.cache.entry(hash) {\n   57 |             std::collections::hash_map::Entry::Occupied(entry) => {\n   58 |                 let cached = entry.into_mut();\n   59 |                 cached.0 = self.generation;\n   60 |                 &cached.1\n   61 |             }\n   62 |             std::collections::hash_map::Entry::Vacant(entry) => {\n   63 |                 let value = self.computer.compute(key);\n   64 |                 let inserted = entry.insert((self.generation, value));\n   65 |                 &inserted.1\n   66 |             }\n   67 |         }\n   68 |     }","lines":54}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`sin_in` is mathematically wrong. The canonical AHEasing reference is `sin((p - 1) * PI/2) + 1`, which gives a quarter-sine ease-in. The code uses `((t - 1.0) * 2.0 * PI).sin() + 1.0`, a full sine cycle, so the curve oscillates wildly between 0 and 2 instead of being a monotone ease-in from 0 to 1 (e.g. `sin_in(0.75) = sin(-PI/2)+1 = 0`, should be ~0.62).","fix":"Use the half-pi factor: `((t - 1.0) * 0.5 * PI).sin() + 1.0`.","locations":[{"ref":"crates/emath/src/easing.rs:76-79","code":"   76 | #[inline]\n   77 | pub fn sin_in(t: f32) -> f32 {\n   78 |     ((t - 1.) * 2. * PI).sin() + 1.\n   79 | }","lines":4}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`sin_out` is mathematically wrong. The doc-comment says it models a quarter sine wave, and the canonical AHEasing reference (cited in the module header) is `sin(p * PI/2)`, which must satisfy `f(0)=0, f(1)=1`. The code uses `(t * 2.0 * PI).sin()`, a full sine cycle, so `sin_out(1.0) = sin(2*PI) = 0.0` instead of `1.0`, and `sin_out(0.25) = sin(PI/2) = 1.0` instead of ~0.38. The easing curve is completely broken (it oscillates and ends at 0).","fix":"Use the half-pi factor: `(t * 0.5 * PI).sin()` (i.e. `std::f32::consts::FRAC_PI_2 * t`).","locations":[{"ref":"crates/emath/src/easing.rs:84-87","code":"   84 | #[inline]\n   85 | pub fn sin_out(t: f32) -> f32 {\n   86 |     (t * 2. * PI).sin()\n   87 | }","lines":4}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`circular_out` computes the wrong formula. The canonical AHEasing reference is `CircularEaseOut(p) = sqrt((2 - p) * p)`, but the code computes `(2.0 - t).sqrt() * t`, i.e. `sqrt(2-t) * t` instead of `sqrt((2-t) * t)`. Endpoints happen to match (0 and 1) but intermediate values are wrong, e.g. `circular_out(0.5)` yields ~0.612 instead of the correct ~0.866.","fix":"Multiply inside the sqrt: `((2.0 - t) * t).sqrt()`.","locations":[{"ref":"crates/emath/src/easing.rs:108-111","code":"  108 | #[inline]\n  109 | pub fn circular_out(t: f32) -> f32 {\n  110 |     (2. - t).sqrt() * t\n  111 | }","lines":4}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`RawInput::append` overwrites `safe_area_insets` unconditionally (`self.safe_area_insets = safe_area;`), but the field is documented (see lines 26-28 of raw_input.rs) as `None` meaning \"same as last frame\", identical to `screen_rect`. `screen_rect` correctly preserves the prior value with `.or(self.screen_rect)` on the line just above, so when a newer RawInput is merged with `safe_area_insets == None`, the previously-set insets are wiped instead of retained, contradicting the documented contract and diverging from the sibling field's handling.","fix":"Use `self.safe_area_insets = safe_area.or(self.safe_area_insets);` to match the documented \"same as last frame\" semantics and the `screen_rect` handling.","locations":[{"ref":"crates/egui/src/data/input/raw_input.rs:159-169","code":"  159 |         self.screen_rect = screen_rect.or(self.screen_rect);\n  160 |         self.max_texture_side = max_texture_side.or(self.max_texture_side);\n  161 |         self.time = time; // use latest time\n  162 |         self.predicted_dt = predicted_dt; // use latest dt\n  163 |         self.modifiers = modifiers; // use latest\n  164 |         self.events.append(&mut events);\n  165 |         self.hovered_files.append(&mut hovered_files);\n  166 |         self.dropped_files.append(&mut dropped_files);\n  167 |         self.focused = focused;\n  168 |         self.system_theme = system_theme;\n  169 |         self.safe_area_insets = safe_area;","lines":11}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Order::allow_interaction` is a `match` over all five variants that unconditionally returns `true`, so the method is dead logic that can never return `false`. Worse, it contradicts the documentation of `Order::Tooltip` (\"You cannot interact with these\"): tooltips are treated as interactable. Either the method or the doc is wrong, and a reader cannot tell which behavior was intended.","fix":"Decide the real semantics: if tooltips should not be interactable, return `false` for `Self::Tooltip` (and `Self::Debug` per its doc); otherwise simplify to `true` and fix the `Tooltip` doc comment.","locations":[{"ref":"crates/egui/src/layers.rs:40-47","code":"   40 |     #[inline(always)]\n   41 |     pub fn allow_interaction(&self) -> bool {\n   42 |         match self {\n   43 |             Self::Background | Self::Middle | Self::Foreground | Self::Tooltip | Self::Debug => {\n   44 |                 true\n   45 |             }\n   46 |         }\n   47 |     }","lines":8},{"ref":"crates/egui/src/layers.rs:21-23","code":"   21 |     /// Things floating on top of everything else, like tooltips.\n   22 |     /// You cannot interact with these.\n   23 |     Tooltip,","lines":3}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ProgressBar loading animation uses `time.cos().abs()` for brightness and `240°.to_radians() * time.sin()` for the arc sweep, where `time` is the absolute wall-clock seconds (`i.time`). As `time` grows large, floating-point precision of `cos`/`sin` of a huge argument degrades and the animation phase becomes inconsistent / jittery on long-running apps. The spinner has the exact same problem.","fix":"Use a phase wrapped to a period, e.g. `let t = ui.input(|i| i.time) % some_period;` before computing sin/cos, so the trig argument stays small and the animation is stable regardless of uptime.","locations":[{"ref":"crates/egui/src/widgets/progress_bar.rs:148-167","code":"  148 |             let color_factor = if animate {\n  149 |                 let time = ui.input(|i| i.time);\n  150 |                 lerp(dark..=bright, time.cos().abs())\n  151 |             } else {\n  152 |                 bright\n  153 |             };\n  154 | \n  155 |             ui.painter().rect_filled(\n  156 |                 inner_rect,\n  157 |                 corner_radius,\n  158 |                 Color32::from(\n  159 |                     Rgba::from(fill.unwrap_or(visuals.selection.bg_fill)) * color_factor as f32,\n  160 |                 ),\n  161 |             );\n  162 | \n  163 |             if animate && !has_custom_cr {\n  164 |                 let n_points = 20;\n  165 |                 let time = ui.input(|i| i.time);\n  166 |                 let start_angle = time * std::f64::consts::TAU;\n  167 |                 let end_angle = start_angle + 240f64.to_radians() * time.sin();","lines":20},{"ref":"crates/egui/src/widgets/spinner.rs:47-49","code":"   47 |             let time = ui.input(|i| i.time);\n   48 |             let start_angle = time * std::f64::consts::TAU;\n   49 |             let end_angle = start_angle + 240f64.to_radians() * time.sin();","lines":3}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`Anchor::all()` omits the `ImageViewer` variant, even though `ImageViewer` is a valid anchor (gated on the same `image_viewer` feature) and is shown in `apps_iter_mut`. On the web build, `from_str_case_insensitive` is built from `all()`, so the URL hash `#imageviewer` will never be recognized and deep-linking / restoring the Image Viewer tab from the URL silently fails.","fix":"Add `#[cfg(feature = \"image_viewer\")] Self::ImageViewer,` to the vec returned by `Anchor::all()`, matching the other feature-gated variants.","locations":[{"ref":"crates/egui_demo_app/src/wrap_app.rs:106-117","code":"  106 |     fn all() -> Vec<Self> {\n  107 |         vec![\n  108 |             Self::Demo,\n  109 |             Self::EasyMarkEditor,\n  110 |             #[cfg(feature = \"http\")]\n  111 |             Self::Http,\n  112 |             Self::Clock,\n  113 |             #[cfg(any(feature = \"glow\", feature = \"wgpu\"))]\n  114 |             Self::Custom3d,\n  115 |             Self::Rendering,\n  116 |         ]\n  117 |     }","lines":12}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`TSTransform::is_valid` only checks `translation.x.is_finite()` and never checks `translation.y`. A transform with a NaN/infinite y translation will be reported as valid, defeating the purpose of the check and potentially propagating non-finite coordinates downstream.","fix":"Also check the y component: `self.scaling.is_finite() && self.translation.is_finite() && self.scaling != 0.0` (Vec2 already has `is_finite`).","locations":[{"ref":"crates/emath/src/ts_transform.rs:55-57","code":"   55 |     pub fn is_valid(&self) -> bool {\n   56 |         self.scaling.is_finite() && self.translation.x.is_finite() && self.scaling != 0.0\n   57 |     }","lines":3}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ColorImage::region casts region coordinates to usize via `as usize` and only asserts `min_x <= max_x && min_y <= max_y`. The doc comment explicitly claims it 'Panics ... if a region larger than the image is passed', but there is no bounds check against `self.size`: if `max_x > width` or `max_y > height`, the slice `pixels[row*stride+min_x .. row*stride+max_x]` silently reads into the following row (wrong pixels) or panics with an opaque slice-index error rather than the documented assertion. NaN/inf coords cast to 0/usize::MAX silently.","fix":"Add `assert!(max_x <= self.size[0] && max_y <= self.size[1], ...)` (matching the documented behavior) and reject non-finite region coordinates.","locations":[{"ref":"crates/epaint/src/image.rs:249-268","code":"  249 |     pub fn region(&self, region: &emath::Rect, pixels_per_point: Option<f32>) -> Self {\n  250 |         let pixels_per_point = pixels_per_point.unwrap_or(1.0);\n  251 |         let min_x = (region.min.x * pixels_per_point) as usize;\n  252 |         let max_x = (region.max.x * pixels_per_point) as usize;\n  253 |         let min_y = (region.min.y * pixels_per_point) as usize;\n  254 |         let max_y = (region.max.y * pixels_per_point) as usize;\n  255 |         assert!(\n  256 |             min_x <= max_x && min_y <= max_y,\n  257 |             \"Screenshot region is invalid: {region:?}\"\n  258 |         );\n  259 |         let width = max_x - min_x;\n  260 |         let height = max_y - min_y;\n  261 |         let mut output = Vec::with_capacity(width * height);\n  262 |         let row_stride = self.size[0];\n  263 | \n  264 |         for row in min_y..max_y {\n  265 |             output.extend_from_slice(\n  266 |                 &self.pixels[row * row_stride + min_x..row * row_stride + max_x],\n  267 |             );\n  268 |         }","lines":20}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Mesh::clear is documented as 'Restore to default state, but without freeing memory', and clears indices/vertices to keep their capacity. But the next line reassigns `self.vertices = Default::default()`, which drops the just-cleared vertex Vec and frees its capacity, defeating the stated purpose and creating an asymmetry: indices keep capacity, vertices do not. This forces a reallocation of the vertex buffer on the next fill, a per-frame cost in the tessellation hot path.","fix":"Remove the `self.vertices = Default::default();` line so both vectors retain their capacity, matching the doc comment.","locations":[{"ref":"crates/epaint/src/mesh.rs:85-89","code":"   85 |     pub fn clear(&mut self) {\n   86 |         self.indices.clear();\n   87 |         self.vertices.clear();\n   88 |         self.vertices = Default::default();\n   89 |     }","lines":5}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The default cubic/quadratic bezier flattening tolerance is derived only from the X distance between the curve endpoints, ignoring Y. A vertical/near-vertical curve (points[0].x == last.x) gets tolerance ~0.0, forcing pathologically fine flattening: num_quadratics = (err/(432*tol^2))^(1/6) explodes and is cast `as u32` (saturating up to ~4 billion), driving the flatten loop into an effective hang. A tall, narrow curve likewise gets a tolerance far too small for its true extent.","fix":"Base the default tolerance on the full chord length, e.g. `(points[0]-points[last]).length()*0.001`, clamped to a small positive minimum so a zero-length chord cannot produce tolerance 0.0.","locations":[{"ref":"crates/epaint/src/shapes/bezier_shape.rs:300-301","code":"  300 |         let tolerance =\n  301 |             tolerance.unwrap_or_else(|| (self.points[0].x - self.points[3].x).abs() * 0.001);","lines":2},{"ref":"crates/epaint/src/shapes/bezier_shape.rs:316-317","code":"  316 |         let tolerance =\n  317 |             tolerance.unwrap_or_else(|| (self.points[0].x - self.points[3].x).abs() * 0.001);","lines":2},{"ref":"crates/epaint/src/shapes/bezier_shape.rs:523-524","code":"  523 |         let tolerance =\n  524 |             tolerance.unwrap_or_else(|| (self.points[0].x - self.points[2].x).abs() * 0.001);","lines":2}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"FontsView::glyph_width converts the unscaled advance to points via `px_scale_factor(font_size)`, omitting `tweak.scale`. Every other points/pixel conversion (styled_metrics and all of text_layout.rs via StyledMetrics::px_scale_factor) multiplies by `font_size * tweak.scale`. For any font with `FontTweak::scale != 1.0` (e.g. the built-in emoji fonts at 0.81 / 0.90) this public API returns the wrong width.","fix":"Multiply by `tweak.scale` too (e.g. `px_scale_factor(font_size * tweak.scale)`), or reuse the StyledMetrics::px_scale_factor that already includes tweak.scale.","locations":[{"ref":"crates/epaint/src/text/font.rs:715","code":"  715 |         glyph_info.advance_width_unscaled.0 * font_face.font.px_scale_factor(font_size)","lines":1}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`ViewportState::set_visible_recursive` takes a `visible: bool` parameter and sets `self.visible = visible`, but the recursive call to children hard-codes `true` instead of forwarding `visible`. Calling it with `false` would set the parent invisible while leaving children visible. It happens to work today only because the single call site always passes `true`, making the parameter misleading and the recursion buggy.","fix":"Forward the argument: `child.write().set_visible_recursive(visible);`.","locations":[{"ref":"tests/test_viewports/src/main.rs:106-111","code":"  106 |     pub fn set_visible_recursive(&mut self, visible: bool) {\n  107 |         self.visible = visible;\n  108 |         for child in &self.children {\n  109 |             child.write().set_visible_recursive(true);\n  110 |         }\n  111 |     }","lines":6}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`AppRunner` is created with `input.raw.focused` at its `Default` (`false`), and `WebInput::set_focus` early-returns when the new value equals the current one. On startup the canvas may already have focus, but because the stored value starts `false`, the very first `update_focus` only fires a `WindowFocused(true)` if `has_focus()` differs; if the browser reports focus asynchronously the initial state can be momentarily wrong. More concretely, `set_focus` only pushes `WindowFocused` on change, so an app that relies on an initial focus event may never receive one. This is subtle and platform-dependent.","fix":"Initialize `raw.focused` from `has_focus()` at runner construction, or always emit an initial `WindowFocused` event after the first `update_focus` poll.","locations":[{"ref":"crates/eframe/src/web/backend.rs:49-60","code":"   49 |     /// On alt-tab, or user clicking another HTML element.\n   50 |     pub fn set_focus(&mut self, focused: bool) {\n   51 |         if self.raw.focused == focused {\n   52 |             return;\n   53 |         }\n   54 | \n   55 |         // log::debug!(\"on_web_page_focus_change: {focused}\");\n   56 |         self.raw.modifiers = egui::Modifiers::default(); // Avoid sticky modifier keys on alt-tab:\n   57 |         self.raw.focused = focused;\n   58 |         self.raw.events.push(egui::Event::WindowFocused(focused));\n   59 |         self.primary_touch = None;\n   60 |     }","lines":12},{"ref":"crates/eframe/src/web/app_runner.rs:237-249","code":"  237 |     pub fn update_focus(&mut self) {\n  238 |         let has_focus = self.has_focus();\n  239 |         if self.input.raw.focused != has_focus {\n  240 |             log::trace!(\"{} Focus changed to {has_focus}\", self.canvas().id());\n  241 |             self.input.set_focus(has_focus);\n  242 | \n  243 |             if !has_focus {\n  244 |                 // We lost focus - good idea to save\n  245 |                 self.save();\n  246 |             }\n  247 |             self.egui_ctx().request_repaint();\n  248 |         }\n  249 |     }","lines":13}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the wgpu `WebPainterWgpu::paint_and_update_textures`, when `get_current_texture()` returns `Suboptimal`, the code sets `needs_reconfigure = true` and proceeds to render into the suboptimal frame this same pass; `needs_reconfigure` is only consumed at the top of the next paint and only inside the non-zero-sized branch. If the surface stays at a zero size (canvas collapsed) the reconfigure never happens; more importantly, the reconfigure-on-next-frame requires another paint to be scheduled, but the `Suboptimal` arm does not call `request_repaint`, unlike the `RecreateSurface` arm. A surface that is permanently suboptimal but no longer animating may never reconfigure.","fix":"When marking `needs_reconfigure = true` for a suboptimal frame, also call `self.ctx.request_repaint()` so a follow-up paint is guaranteed to consume the flag, mirroring the `RecreateSurface` handling.","locations":[{"ref":"crates/eframe/src/web/web_painter_wgpu.rs:250-280","code":"  250 |             if self.needs_reconfigure {\n  251 |                 self.surface\n  252 |                     .configure(&render_state.device, &self.surface_configuration);\n  253 |                 self.needs_reconfigure = false;\n  254 |             }\n  255 | \n  256 |             let output_frame = match self.surface.get_current_texture() {\n  257 |                 wgpu::CurrentSurfaceTexture::Success(frame) => frame,\n  258 |                 wgpu::CurrentSurfaceTexture::Suboptimal(frame) => {\n  259 |                     self.needs_reconfigure = true;\n  260 |                     frame\n  261 |                 }\n  262 |                 other => {\n  263 |                     match (*self.on_surface_status)(&other) {\n  264 |                         SurfaceErrorAction::Reconfigure => {\n  265 |                             self.surface\n  266 |                                 .configure(&render_state.device, &self.surface_configuration);\n  267 |                         }\n  268 |                         SurfaceErrorAction::RecreateSurface => {\n  269 |                             // Full recovery needs `&mut self`, which conflicts with the live\n  270 |                             // `render_state` / `self.surface` borrows here. Defer to the top\n  271 |                             // of the next paint via the `needs_recreate` flag, and request a\n  272 |                             // repaint so the next frame actually invokes `paint` to consume it.\n  273 |                             self.needs_recreate = true;\n  274 |                             self.ctx.request_repaint();\n  275 |                         }\n  276 |                         SurfaceErrorAction::SkipFrame => {}\n  277 |                     }\n  278 |                     return Ok(());\n  279 |                 }\n  280 |             };","lines":31}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`AnimationManager::animate_value` applies the `animation_time == 0.0` short-circuit (snapping `from_value`/`to_value` to `value`) AFTER computing `current_value` via `remap_clamp` with range `0.0..=animation_time` (i.e. `0.0..=0.0`). `remap_clamp` over a zero-width range returns the start of the output range, so for a brand-new toggle in the same call `current_value` is `anim.from_value` (the old value) rather than the new `value`, meaning a zero-time \"animation\" can return the stale value for one frame instead of snapping instantly.","fix":"When `animation_time == 0.0`, return `value` directly (handle the zero-time case before computing `current_value`).","locations":[{"ref":"crates/egui/src/animation_manager.rs:87-107","code":"   87 |             Some(anim) => {\n   88 |                 let time_since_toggle = (input.time - anim.toggle_time) as f32;\n   89 |                 // On the frame we toggle we don't want to return the old value,\n   90 |                 // so we extrapolate forwards by half a frame:\n   91 |                 let time_since_toggle = time_since_toggle + input.predicted_dt / 2.0;\n   92 |                 let current_value = remap_clamp(\n   93 |                     time_since_toggle,\n   94 |                     0.0..=animation_time,\n   95 |                     anim.from_value..=anim.to_value,\n   96 |                 );\n   97 |                 if anim.to_value != value {\n   98 |                     anim.from_value = current_value; //start new animation from current position of playing animation\n   99 |                     anim.to_value = value;\n  100 |                     anim.toggle_time = input.time;\n  101 |                 }\n  102 |                 if animation_time == 0.0 {\n  103 |                     anim.from_value = value;\n  104 |                     anim.to_value = value;\n  105 |                 }\n  106 |                 current_value\n  107 |             }","lines":21}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `Atom::into_sized`, the wrap_mode computed at line 112-113 (set to `Extend` when not shrink and max width is infinite) is unconditionally overwritten to `Truncate` at line 119-121 whenever `max_size.x` is finite. The two branches use the same `is_infinite`/`is_finite` discriminant on the same value, so the first assignment is only meaningful in the infinite case and the second only in the finite case; written as two sequential `if`s this is confusing and the intermediate state is dead. More importantly, a caller-provided `wrap_mode` is silently discarded for any atom with a finite max width, even Wrap.","fix":"Combine into a single if/else on `max_size.x.is_finite()` and only override `wrap_mode` when it was `None`/unset, so an explicit Wrap request from the caller is honored: `if wrap_mode.is_none() { wrap_mode = Some(if finite { Truncate } else { Extend }); }`.","locations":[{"ref":"crates/egui/src/atomics/atom.rs:112-121","code":"  112 |         if !self.shrink && self.max_size.x.is_infinite() {\n  113 |             wrap_mode = Some(TextWrapMode::Extend);\n  114 |         }\n  115 |         available_size = available_size.at_most(self.max_size);\n  116 |         if let Some(size) = self.size {\n  117 |             available_size = available_size.at_most(size);\n  118 |         }\n  119 |         if self.max_size.x.is_finite() {\n  120 |             wrap_mode = Some(TextWrapMode::Truncate);\n  121 |         }","lines":10}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`AllocatedAtomLayout::paint` computes `grow_width = max(extra_space / grow_count as f32, 0.0)`. When `grow_count == 0`, `extra_space / 0.0` is `+inf` (extra_space>0) or `NaN` (extra_space==0). The `max(_, 0.0)` turns `+inf` into `+inf` (not 0) and `NaN` into `NaN`. It happens to be harmless only because `grow_width` is then multiplied by `sized.is_grow()` which is false for every atom when grow_count==0, so the inf/NaN is never read. This is fragile: any future code that reads grow_width unconditionally would propagate inf/NaN into geometry.","fix":"Guard the division: `let grow_width = if grow_count > 0 { (extra_space / grow_count as f32).max(0.0).floor_ui() } else { 0.0 };`","locations":[{"ref":"crates/egui/src/atomics/atom_layout.rs:474-477","code":"  474 |         let width_to_fill = inner_rect.width();\n  475 |         let extra_space = f32::max(width_to_fill - desired_size.x, 0.0);\n  476 |         let grow_width = f32::max(extra_space / grow_count as f32, 0.0).floor_ui();\n  477 | ","lines":4}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`DragAndDrop::on_end_pass` only sets the `Grabbing` cursor when the current cursor is `CursorIcon::Default`. Because this runs at end-of-pass and inspects `output.cursor_icon`, any widget that legitimately set the cursor to `Default` explicitly this frame (which is indistinguishable from \"unset\") will get overridden to `Grabbing` while a payload is held. The heuristic conflates \"user did not set a cursor\" with \"user set Default\".","fix":"Track whether the cursor was explicitly set this frame (e.g. an `Option<CursorIcon>` in output, or a per-frame dirty flag) rather than comparing against `CursorIcon::Default`.","locations":[{"ref":"crates/egui/src/drag_and_drop.rs:62-68","code":"   62 |                 // We set the cursor icon only if its default, as the user code might have\n   63 |                 // explicitly set it already.\n   64 |                 ui.output_mut(|o| {\n   65 |                     if o.cursor_icon == CursorIcon::Default {\n   66 |                         o.cursor_icon = CursorIcon::Grabbing;\n   67 |                     }\n   68 |                 });","lines":7}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`GridLayout::new` debug-asserts `initial_available.min.x.is_finite()` with the message \"Grid not yet available for right-to-left layouts\", but the grid is always created inside `Grid::show_dyn` via `ui.horizontal(...)` which is left-to-right (or right-to-left if `prefer_right_to_left`). In a right-to-left context this assert will fire in debug builds, i.e. grids silently misbehave / crash-on-assert rather than being explicitly unsupported at the API level.","fix":"Either properly support RTL grids, or document the limitation and degrade gracefully (force LTR for the grid's inner Ui) instead of relying on a debug_assert that only triggers in debug builds.","locations":[{"ref":"crates/egui/src/grid.rs:97-103","code":"   97 |         let initial_available = ui.placer().max_rect().intersect(ui.cursor());\n   98 |         debug_assert!(\n   99 |             initial_available.min.x.is_finite(),\n  100 |             \"Grid not yet available for right-to-left layouts\"\n  101 |         );\n  102 | \n  103 |         ui.ctx().check_for_id_clash(id, initial_available, \"Grid\");","lines":7},{"ref":"crates/egui/src/grid.rs:461-462","code":"  461 |         ui.scope_builder(ui_builder, |ui| {\n  462 |             ui.horizontal(|ui| {","lines":2}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"MultiTouchInfo divides by `avg_distance` / `avg_abs_distance2` without guarding against zero. `avg_distance`
