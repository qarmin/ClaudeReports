<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"low","description":"ImageSessionState.instance is declared without the `volatile` keyword (line 20), but the singleton is initialised inside a fully-synchronized `getInstance()` method. While the fully-synchronised factory method is technically correct for safe publication, the missing `volatile` is inconsistent with the class's own use of `volatile` for leftImageUri/rightImageUri (lines 23-24) and makes the intent unclear. Other threads that obtain the instance and then call `swap()`, `release()`, or URI setters do so without synchronisation, creating potential visibility issues for non-volatile fields such as those in the two ImageInfoHolder instances.","fix":"Add `volatile` to the `instance` field for clarity and safe publication. For swap/release, document which thread is expected to call them (main thread only), or add synchronisation if they can be called from background threads.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/domain/model/ImageSessionState.java:20","code":"   20 |   private static ImageSessionState instance;"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/domain/model/ImageSessionState.java:68-78","code":"   68 |   public void swap() {\n   69 |     Uri temp = leftImageUri;\n   70 |     leftImageUri = rightImageUri;\n   71 |     rightImageUri = temp;\n   72 | \n   73 |     ImageInfoHolder imageInfoHolder = new ImageInfoHolder();\n   74 |     imageInfoHolder.updateFromImageHolder(firstImageInfoHolder);\n   75 | \n   76 |     firstImageInfoHolder.updateFromImageHolder(secondImageInfoHolder);\n   77 |     secondImageInfoHolder.updateFromImageHolder(imageInfoHolder);\n   78 |   }"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/domain/model/ImageSessionState.java:84-89","code":"   84 |   public void release() {\n   85 |     firstImageInfoHolder.release();\n   86 |     secondImageInfoHolder.release();\n   87 |     leftImageUri = null;\n   88 |     rightImageUri = null;\n   89 |   }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"low","description":"BitmapTransformer.TRANSPARENT_PAINT is a static final instance shared across all threads.\nIt is configured once in a static initialiser and only read (never mutated) during\ncanvas.drawPath() calls. While Android's Paint documentation does not explicitly declare\nthread-safety for reads, the current usage pattern (read-only after initialisation) is\nsafe in practice with the JMM. However, if any future code ever calls setXfermode() or\nmodifies other paint properties on a background thread, a subtle race would be introduced.","fix":"Either create a fresh Paint per call (small overhead), or add a clear comment asserting\nthe paint is write-once/read-many to prevent accidental modification. Alternatively,\npass the Paint as a parameter from callers that already create them per-call.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/BitmapTransformer.java:20-25","code":"   20 |   private static final Paint TRANSPARENT_PAINT;\n   21 | \n   22 |   static {\n   23 |     TRANSPARENT_PAINT = new Paint(Paint.ANTI_ALIAS_FLAG);\n   24 |     TRANSPARENT_PAINT.setXfermode(new PorterDuffXfermode(PorterDuff.Mode.DST_OUT));\n   25 |   }"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","description":"differences/ViewModel.processImages() allocates bmp1 and bmp2 via loadMutableBitmap() and\nthen potentially a third 'scaled' copy. If any step after the null-check throws (e.g. an\nOutOfMemoryError during getPixels(), buildDiffMask(), or findTopRegions()), the outer\ncatch block at line 148 posts ProcessingState.ERROR but does NOT recycle bmp1 and bmp2.\nThose bitmaps are never stored in annotatedOne/annotatedTwo and never reachable from\nrecycleBitmaps(), so they are permanently leaked for the lifetime of the process.","fix":"Wrap the body of processImages() in a try/finally that recycles bmp1 and bmp2 if they\nhave not been written to the result array (or wrap processImages itself so the caller can\nclean up). Example:\n  try {\n    Bitmap[] result = processImages(...);\n    ...\n  } catch (Exception e) {\n    // postValue ERROR, no bitmaps to clean up here since processImages handles them\n  }\n  // Inside processImages:\n  try {\n    ...\n    return new Bitmap[]{bmp1, bmp2};\n  } catch (Exception e) {\n    bmp1.recycle(); bmp2.recycle(); throw e;\n  }","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/compare/differences/ViewModel.java:137-153","code":"  137 |           try {\n  138 |             Bitmap[] result = processImages(uriOne, uriTwo, maxDifferences, circleColor);\n  139 |             if (cleared.get()) {\n  140 |               // ViewModel was cleared while we were running; discard to avoid leaking bitmaps.\n  141 |               result[0].recycle();\n  142 |               result[1].recycle();\n  143 |             } else {\n  144 |               annotatedOne = result[0];\n  145 |               annotatedTwo = result[1];\n  146 |               processingState.postValue(ProcessingState.DONE);\n  147 |             }\n  148 |           } catch (Exception e) {\n  149 |             if (!cleared.get()) {\n  150 |               processingState.postValue(ProcessingState.ERROR);\n  151 |             }\n  152 |           }\n  153 |         });"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"high","description":"overlayCut/ViewModel does not recycle bitmapBase, bitmapSource, or bitmapAdjusted in\nonCleared(). When the Activity is permanently finished, these three (potentially large)\nbitmaps remain unreleased. Similarly, overlaySlide/ViewModel does not recycle bitmapBase,\nbitmapSource, or the pre-allocated transparentBitmap in its onCleared(). Both ViewModels\nonly shut down the executor but leave all bitmap memory unreclaimed.","fix":"Add explicit recycle() calls in each ViewModel's onCleared():\n  // OverlayCut ViewModel\n  if (bitmapBase != null) { bitmapBase.recycle(); bitmapBase = null; }\n  if (bitmapSource != null) { bitmapSource.recycle(); bitmapSource = null; }\n  if (bitmapAdjusted != null && bitmapAdjusted != bitmapSource) {\n      bitmapAdjusted.recycle(); bitmapAdjusted = null;\n  }\n  // OverlaySlide ViewModel — same pattern, plus transparentBitmap.recycle().","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/compare/overlayCut/ViewModel.java:144-147","code":"  144 |   protected void onCleared() {\n  145 |     super.onCleared();\n  146 |     executor.shutdownNow();\n  147 |   }"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/compare/overlaySlide/ViewModel.java:135-138","code":"  135 |   protected void onCleared() {\n  136 |     super.onCleared();\n  137 |     executor.shutdownNow();\n  138 |   }"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"PreviewBitmap.updateFrom() copies both the scaledBase and cachedTransformed Bitmap references from another PreviewBitmap by reference (lines 54-55), discarding the current instance's scaledBase without recycling it (recycleCachedTransformed() is called first, recycling cachedTransformed, but scaledBase is silently replaced without being freed). If the receiving PreviewBitmap already had a non-null scaledBase at the time updateFrom() is called, that Bitmap is leaked.","fix":"Before assigning `this.scaledBase = other.scaledBase`, check whether the current scaledBase is non-null and not already shared with cachedTransformed; if so, recycle it. Alternatively, call `release()` first and then re-assign all fields.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/domain/model/PreviewBitmap.java:52-57","code":"   52 |   public void updateFrom(PreviewBitmap other) {\n   53 |     recycleCachedTransformed();\n   54 |     this.scaledBase = other.scaledBase;\n   55 |     this.cachedTransformed = other.cachedTransformed;\n   56 |     this.cachedRotationDegrees = other.cachedRotationDegrees;\n   57 |     this.cachedMirrored = other.cachedMirrored;"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"OverlayCutActivity's Check button (line 233) overwrites viewModel.bitmapAdjusted with a\nnew copy without recycling the previous value. Every press of the Check button that\nfollows a prior press leaks the previous copy bitmap. Similarly the Reset button (line 216)\nsets bitmapAdjusted back to bitmapSource, discarding any prior committed-copy bitmap\nwithout recycling it.","fix":"Before each assignment to viewModel.bitmapAdjusted, recycle the old value if it is not\nthe same object as bitmapSource:\n  Bitmap old = viewModel.bitmapAdjusted;\n  viewModel.bitmapAdjusted = current.copy(Bitmap.Config.ARGB_8888, false);\n  if (old != null && old != viewModel.bitmapSource && !old.isRecycled()) old.recycle();","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/compare/overlayCut/OverlayCutActivity.java:213-235","code":"  213 |     binding.overlayCutBtnReset.setOnClickListener(\n  214 |         view -> {\n  215 |           // Discard any committed edits and restore the original source image.\n  216 |           viewModel.bitmapAdjusted = viewModel.bitmapSource;\n  217 | \n  218 |           // Re-apply the active crop to the restored baseline (if two seekbars\n  219 |           // are already selected) so the user sees a consistent result immediately.\n  220 |           if (seekBarTracker.canCrop() && viewModel.bitmapAdjusted != null) {\n  221 |             viewModel.submitCrop(\n  222 |                 viewModel.bitmapAdjusted.copy(Bitmap.Config.ARGB_8888, true), buildCropParams());\n  223 |           } else if (viewModel.bitmapAdjusted != null) {\n  224 |             binding.fullSlideImageViewFront.setBitmapImage(viewModel.bitmapAdjusted);\n  225 |           }\n  226 |         });\n  227 | \n  228 |     binding.overlayCutBtnCheck.setOnClickListener(\n  229 |         view -> {\n  230 |           // Commit the currently visible crop as the new baseline for further edits.\n  231 |           Bitmap current = binding.fullSlideImageViewFront.getCurrentBitmap();\n  232 |           if (current != null) {\n  233 |             viewModel.bitmapAdjusted = current.copy(Bitmap.Config.ARGB_8888, false);\n  234 |           }\n  235 |         });"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"In OverlayCut's seekbar listener (lines 221-222 and 257-258), viewModel.bitmapAdjusted.copy()\nis called BEFORE submitCrop() is called (which internally calls cancelPendingCrop()).\nIf the previous task was still pending and gets cancelled, its 'source' Bitmap argument\n(a copy created by the previous seekbar event) is stranded: the task's lambda checks\nisInterrupted() and returns early without recycling the bitmap. On rapid seekbar drags\nmany bitmaps pile up until GC collects them, increasing GC pressure and risk of OOM.","fix":"In ViewModel.submitCrop(), recycle the source bitmap when the task is cancelled:\n  pendingCrop = executor.submit(() -> {\n      if (Thread.currentThread().isInterrupted()) {\n          source.recycle();   // <-- add this\n          return;\n      }\n      ...\n  });","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/compare/overlayCut/OverlayCutActivity.java:220-222","code":"  220 |           if (seekBarTracker.canCrop() && viewModel.bitmapAdjusted != null) {\n  221 |             viewModel.submitCrop(\n  222 |                 viewModel.bitmapAdjusted.copy(Bitmap.Config.ARGB_8888, true), buildCropParams());"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/compare/overlayCut/ViewModel.java:121-133","code":"  121 |   public void submitCrop(@NonNull Bitmap source, @NonNull CropParams params) {\n  122 |     cancelPendingCrop();\n  123 |     pendingCrop =\n  124 |         executor.submit(\n  125 |             () -> {\n  126 |               if (Thread.currentThread().isInterrupted()) {\n  127 |                 return;\n  128 |               }\n  129 |               Bitmap result = BitmapTransformer.cutBitmapAny(source, params);\n  130 |               if (!Thread.currentThread().isInterrupted()) {\n  131 |                 frontBitmap.postValue(result);\n  132 |               }\n  133 |             });"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"BitmapTransformer.getCutBitmapWithTransparentBackgroundWithCanvas() calls getCutBitmap()\nwhich creates a new Bitmap via Bitmap.createBitmap(), then immediately passes it to\nmergeBitmap() which draws it onto a second new Bitmap and returns that. The intermediate\n'cutBitmap' is never recycled. On each seekbar frame in OverlaySlide this allocates two\nbitmaps but only the merged result reaches the caller; the cut slice is silently abandoned.","fix":"Recycle the intermediate cutBitmap after mergeBitmap() is done with it:\n  Bitmap cutBitmap = getCutBitmap(bitmap, width, cutFromRightToLeft);\n  Bitmap merged = mergeBitmap(cutBitmap, transparentBitmap, cutFromRightToLeft ? 0 : width);\n  cutBitmap.recycle();\n  return merged;","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/BitmapTransformer.java:139-148","code":"  139 |   public static Bitmap getCutBitmapWithTransparentBackgroundWithCanvas(\n  140 |       Bitmap bitmap, Bitmap transparentBitmap, int width, boolean cutFromRightToLeft) {\n  141 |     Bitmap cutBitmap = BitmapTransformer.getCutBitmap(bitmap, width, cutFromRightToLeft);\n  142 | \n  143 |     if (cutFromRightToLeft) {\n  144 |       width = 0;\n  145 |     }\n  146 | \n  147 |     return BitmapTransformer.mergeBitmap(cutBitmap, transparentBitmap, width);\n  148 |   }"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/BitmapTransformer.java:117-127","code":"  117 |   private static Bitmap getCutBitmap(Bitmap bitmap, int width, boolean keepFromLeft) {\n  118 |     int fromX = 0;\n  119 |     int toX = width;\n  120 | \n  121 |     if (!keepFromLeft) {\n  122 |       fromX = width;\n  123 |       toX = bitmap.getWidth() - width;\n  124 |     }\n  125 | \n  126 |     return Bitmap.createBitmap(bitmap, fromX, 0, toX, bitmap.getHeight());\n  127 |   }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In CompareActivityLauncher.launch, the background 'CompareActivityLauncher-wait' thread is started unconditionally and holds strong references to the Activity and ActivityMainBinding. When the Activity is destroyed before the futures complete (e.g. user presses back mid-encode, or a configuration change occurs), executor.shutdownNow() (called from onDestroy) will interrupt the executor threads and cause futureOne.get()/futureTwo.get() to throw InterruptedException, which is caught. However, the finally block then calls activity.runOnUiThread(() -> binding.pbProgess.setVisibility(View.GONE)) on a destroyed Activity. If the Activity has been garbage-collected or is finishing, this runOnUiThread is effectively a no-op on the main thread, but the binding reference prevents the Activity from being collected until the thread finishes. There is no isFinishing()/isDestroyed() guard.","fix":"In the finally block (and the catch block's runOnUiThread call), check activity.isFinishing() || activity.isDestroyed() before accessing binding or showing a Toast. Also consider moving openingActivity.set(false) into the finally block to ensure it is always reset even if the wait thread is interrupted.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/main/CompareActivityLauncher.java:132-161","code":"  132 |     new Thread(\n  133 |             () -> {\n  134 |               try {\n  135 |                 Uri uriOne = futureOne.get();\n  136 |                 Uri uriTwo = futureTwo.get();\n  137 | \n  138 |                 if (uriOne == null || uriTwo == null) {\n  139 |                   throw new Exception(\"Error saving compare images\");\n  140 |                 }\n  141 | \n  142 |                 intent.putExtra(IntentExtras.IMAGE_URI_ONE, uriOne.toString());\n  143 |                 intent.putExtra(IntentExtras.IMAGE_URI_TWO, uriTwo.toString());\n  144 |                 intent.putExtra(IntentExtras.IMAGE_NAME_ONE, first.getImageName());\n  145 |                 intent.putExtra(IntentExtras.IMAGE_NAME_TWO, second.getImageName());\n  146 | \n  147 |                 openingActivity.set(false);\n  148 |                 activity.startActivity(intent);\n  149 |               } catch (Exception e) {\n  150 |                 openingActivity.set(false);\n  151 |                 activity.runOnUiThread(\n  152 |                     () ->\n  153 |                         Toast.makeText(activity, R.string.error_message_general, Toast.LENGTH_SHORT)\n  154 |                             .show());\n  155 |               } finally {\n  156 |                 activity.runOnUiThread(() -> binding.pbProgess.setVisibility(View.GONE));\n  157 |               }\n  158 |             },\n  159 |             \"CompareActivityLauncher-wait\")\n  160 |         .start();\n  161 |   }"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"onGalleryResult does not check the return value of BitmapExtractor.fromUri for null before passing it to holder.updateFromBitmap() and then immediately calling holder.getBitmapSmall(). If the bitmap decode fails (corrupt file, OOM, unsupported format), updateFromBitmap receives null, and the subsequent getBitmapSmall() call reaches PreviewBitmap.getSmall(), which calls BitmapTransformer.createScaledBitmapToMaxLength(source.bitmap(), ...) where source.bitmap() is null — causing a NullPointerException crash. The camera path (onCameraResult) correctly checks for null and shows an error toast, but the gallery path is missing this guard.","fix":"After calling BitmapExtractor.fromUri, check if the result is null and show an error toast (and return) just like the camera path does at lines 181-188.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/main/ImageSlotPickerHelper.java:225-236","code":"  225 |     setUri(localUri);\n  226 | \n  227 |     ImageInfoHolder holder = getHolder();\n  228 |     holder.updateFromBitmap(\n  229 |         BitmapExtractor.fromUri(activity.getContentResolver(), localUri),\n  230 |         dimensions.maxSide(),\n  231 |         dimensions.maxSideForPreview(),\n  232 |         originalName);\n  233 |     (isLeft() ? binding.homeImageLeft : binding.homeImageRight)\n  234 |         .setImageBitmap(holder.getBitmapSmall());\n  235 |     (isLeft() ? binding.mainTextViewNameImageLeft : binding.mainTextViewNameImageRight)\n  236 |         .setText(holder.getImageName());"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"BitmapTransformer.getCutBitmap() computes the 'toX' (width argument to createBitmap) incorrectly when keepFromLeft is false.\nWhen keepFromLeft is false, fromX is set to 'width', but toX is then set to 'bitmap.getWidth() - width',\nwhich is the remaining number of pixels from the right side. However, Bitmap.createBitmap(bitmap, x, y, width, height)\nexpects the third argument to be a width value (number of pixels wide), not an end X coordinate.\nFor the left-side branch (keepFromLeft=true), toX=width is also used as the width argument — this is correct only if width\nhappens to equal the desired pixel count from x=0. Both branches pass 'toX' as the width parameter to createBitmap.\nFor the right branch: fromX=width, toX=bitmap.getWidth()-width. The resulting slice would be bitmap.getWidth()-2*width wide.\nIf 'width' is 60% of the bitmap, fromX=60% and the width passed=40%, which is correct by coincidence.\nBut if width > bitmap.getWidth()/2, bitmap.getWidth()-width < width and the arithmetic produces a negative width, which\ncauses createBitmap to throw (or crash on older APIs). The variable naming ('toX' used as a width) also makes the\nsemantics misleading and prone to future bugs.","fix":"Rename variables to reflect their semantics: in the keepFromLeft=false branch, use fromX=width and rectWidth=bitmap.getWidth()-width. Add a guard: if rectWidth <= 0, return an empty/original bitmap rather than passing a non-positive width to createBitmap.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/BitmapTransformer.java:117-127","code":"  117 |   private static Bitmap getCutBitmap(Bitmap bitmap, int width, boolean keepFromLeft) {\n  118 |     int fromX = 0;\n  119 |     int toX = width;\n  120 | \n  121 |     if (!keepFromLeft) {\n  122 |       fromX = width;\n  123 |       toX = bitmap.getWidth() - width;\n  124 |     }\n  125 | \n  126 |     return Bitmap.createBitmap(bitmap, fromX, 0, toX, bitmap.getHeight());\n  127 |   }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"UserSettings.resetAllSettings() removes all known preference keys but silently omits KeyValueStorage.ASKED_FOR_REVIEW. After a reset, the 'asked for review' flag is left stale in storage, so the review prompt will never be shown again even after the user explicitly resets all app settings. The constant is defined in KeyValueStorage (not UserSettings), making it easy to overlook.","fix":"Add `this.keyValueStorage.remove(KeyValueStorage.ASKED_FOR_REVIEW);` inside resetAllSettings(), or document explicitly that the review flag is intentionally excluded from a reset.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/data/preferences/UserSettings.java:180-197","code":"  180 |   public void resetAllSettings() {\n  181 |     this.keyValueStorage.remove(UserSettings.USER_THEME);\n  182 |     this.keyValueStorage.remove(UserSettings.SYNC_IMAGE_INTERACTIONS);\n  183 |     this.keyValueStorage.remove(UserSettings.SHOW_EXTENSIONS);\n  184 |     this.keyValueStorage.remove(UserSettings.LAST_COMPARE_MODE);\n  185 |     this.keyValueStorage.remove(UserSettings.MAX_ZOOM);\n  186 |     this.keyValueStorage.remove(UserSettings.RESET_IMAGE_ON_LINKING);\n  187 |     this.keyValueStorage.remove(UserSettings.MIRRORING_TYPE);\n  188 |     this.keyValueStorage.remove(UserSettings.TAP_HIDE_MODE);\n  189 |     this.keyValueStorage.remove(UserSettings.MIN_ZOOM);\n  190 |     this.keyValueStorage.remove(UserSettings.DOUBLE_TAP_ZOOM);\n  191 |     this.keyValueStorage.remove(UserSettings.SHOW_NAVIGATION_BAR);\n  192 |     this.keyValueStorage.remove(UserSettings.DIFFERENCES_MAX_COUNT);\n  193 |     this.keyValueStorage.remove(UserSettings.DIFFERENCES_CIRCLE_COLOR);\n  194 | \n  195 |     this.leftImageResizeSettings.resetAllSettings();\n  196 |     this.rightImageResizeSettings.resetAllSettings();\n  197 |   }"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/data/preferences/KeyValueStorage.java:19","code":"   19 |   public static final String ASKED_FOR_REVIEW = \"ASKED_FOR_REVIEW\";"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"ControlsBarManager.showAnimated sets isAnimatingIn = true immediately before calling controlsBarView.startAnimation(anim), and then sets it back to false immediately after on the very next line — before the animation has had any chance to run. View.startAnimation() is asynchronous; the flag is cleared before the animation completes. This means the guard 'if (isAnimatingIn) return' can never prevent a duplicate animation: any concurrent call to showAnimated() will always see isAnimatingIn == false and launch another animation.","fix":"Reset isAnimatingIn to false inside the animation's onAnimationEnd callback (which already exists in ResizeAnimation) rather than synchronously after startAnimation. Alternatively, remove the flag entirely since clearAnimation() + startAnimation() already replaces any running animation, and the pendingHide cancellation provides the necessary idempotency.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/animation/ControlsBarManager.java:44-64","code":"   44 |   public void showAnimated() {\n   45 |     cancelPendingHide();\n   46 |     continueHiding.set(false);\n   47 | \n   48 |     if (isAnimatingIn) return;\n   49 |     isAnimatingIn = true;\n   50 | \n   51 |     ResizeAnimation anim =\n   52 |         new ResizeAnimation(\n   53 |             controlsBarView,\n   54 |             Calculator.dpToPx(CONTROLS_BAR_HEIGHT_DP, resources),\n   55 |             ResizeAnimation.Dimension.HEIGHT,\n   56 |             ResizeAnimation.AnimationMode.SHOW,\n   57 |             continueHiding);\n   58 |     anim.setDuration(ResizeAnimation.DURATION_SHORT);\n   59 |     controlsBarView.clearAnimation();\n   60 |     controlsBarView.startAnimation(anim);\n   61 | \n   62 |     isAnimatingIn = false;\n   63 |     scheduleHide();\n   64 |   }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In onCameraResult's background thread, the catch block at line 197 silently swallows all exceptions without showing an error to the user or returning. Execution then falls through unconditionally to the runOnUiThread call that invokes ImageRestoreHelper.restoreImageViews (line 200-201). This means that after an unexpected exception during camera processing, the UI is 'refreshed' with stale state but the user receives no feedback that anything went wrong.","fix":"In the catch block, show an error toast via activity.runOnUiThread and then return before the restoreImageViews call. Move restoreImageViews into the try block after successful processing only, or restructure with a finally that only executes on success.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/main/ImageSlotPickerHelper.java:197-201","code":"  197 |               } catch (Exception ignored) {\n  198 |               }\n  199 | \n  200 |               activity.runOnUiThread(\n  201 |                   () -> ImageRestoreHelper.restoreImageViews(sessionState, binding));"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In UserSettingsActivity, tapping the theme toggle button calls Theme.updateTheme() to apply the new mode to AppCompatDelegate, but does NOT call recreate(). The activity was created with the old theme, so the current screen does not visually update. Only the Reset button calls recreate() after a settings change. As a result, the user sees the old theme in the settings screen until they navigate away and back.","fix":"Add a call to recreate() inside the theme button's click listener after calling Theme.updateTheme(newTheme), the same way the reset button does at line 161.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/settings/usersettings/UserSettingsActivity.java:165-172","code":"  165 |   private void setUpThemeToggleButton(Button buttonTheme) {\n  166 |     buttonTheme.setOnClickListener(\n  167 |         view -> {\n  168 |           int newTheme = presenter.cycleTheme();\n  169 |           Theme.updateTheme(newTheme);\n  170 |           buttonTheme.setText(UserSettingsPresenter.themeButtonTextResId(newTheme));\n  171 |         });\n  172 |   }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"BitmapTransformer.getCutBitmapWithTransparentBackgroundWithCanvas() mutates its 'width' parameter\n(line 144: 'width = 0') after using it. While this is technically valid Java (local variable\nreassignment), the side effect of this reassignment — passing 0 as paddingLeft to mergeBitmap —\nis the core logic controlling where the cut bitmap is placed on the transparent canvas. The intent\nis clear only after reading mergeBitmap. If a caller ever expects 'width' to retain its original\nvalue after this call (impossible since it is pass-by-value in Java), it would be confused. More\nimportantly, when cutFromRightToLeft is false, 'width' is passed unchanged as paddingLeft, which\npositions the cut right-side bitmap starting at pixel 'width' from the left — but the cut bitmap\nwas taken from x=width onwards with a width of bitmap.getWidth()-width pixels. Placing it at\npaddingLeft=width means it fills from x=width to x=width+(bitmap.getWidth()-width) = bitmap.getWidth(),\nwhich is correct. The logic works but is fragile and hard to follow.","fix":"Introduce clearly named local variables (e.g. int paddingLeft = cutFromRightToLeft ? 0 : width) instead of mutating the parameter. This makes the intent self-documenting.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/BitmapTransformer.java:139-148","code":"  139 |   public static Bitmap getCutBitmapWithTransparentBackgroundWithCanvas(\n  140 |       Bitmap bitmap, Bitmap transparentBitmap, int width, boolean cutFromRightToLeft) {\n  141 |     Bitmap cutBitmap = BitmapTransformer.getCutBitmap(bitmap, width, cutFromRightToLeft);\n  142 | \n  143 |     if (cutFromRightToLeft) {\n  144 |       width = 0;\n  145 |     }\n  146 | \n  147 |     return BitmapTransformer.mergeBitmap(cutBitmap, transparentBitmap, width);\n  148 |   }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"BitmapTransformer.getPoints() always allocates a Point array of size 5, but individual branches may\nreturn the array with only some entries populated (e.g. the topSeekBarActive+rightSeekBarActive branch\npopulates indices 0, 1, 2 and leaves indices 3 and 4 as null). The caller buildPath() iterates the\nfull array and breaks on the first null — this is the intended design. However, the final fallthrough\n'return points' at line 257 returns an array where ALL five entries are null (points[0]==null).\nThe guard in getCutBitmapFromPoints() (line 262) treats points[0]==null as \"no crop active\" and\nreturns early — which is correct. But the no-crop case is reached when NONE of the six two-bar\ncombinations is active. This means single-bar-active cases (e.g. only topSeekBarActive with no\nsecond bar) are silently ignored and treated as no-crop. This may or may not be intentional, but it\nis undocumented and could confuse maintainers or produce wrong results if seekbars are added.","fix":"Add a comment explicitly stating that single-edge crops are intentionally unsupported. Alternatively, if single-edge crops should be supported, add the missing single-bar branches.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/BitmapTransformer.java:195-258","code":"  195 |   private static Point[] getPoints(\n  196 |       int width,\n  197 |       int height,\n  198 |       boolean topSeekBarActive,\n  199 |       int topSeekBarProgress,\n  200 |       boolean leftSeekBarActive,\n  201 |       int leftSeekBarProgress,\n  202 |       boolean rightSeekBarActive,\n  203 |       int rightSeekBarProgress,\n  204 |       boolean bottomSeekBarActive,\n  205 |       int bottomSeekBarProgress) {\n  206 |     // Corner Points are now created inline only in the branch that needs them,\n  207 |     // avoiding 1-3 unnecessary heap allocations per call.\n  208 |     Point[] points = new Point[5];\n  209 |     int i = 0;\n  210 | \n  211 |     if (topSeekBarActive && rightSeekBarActive) {\n  212 |       points[i++] = new Point(width, (height * rightSeekBarProgress / 100));\n  213 |       points[i++] = new Point((width * topSeekBarProgress / 100), 0);\n  214 |       points[i] = new Point(width, 0); // topright\n  215 |       return points;\n  216 |     }\n  217 | \n  218 |     if (topSeekBarActive && bottomSeekBarActive) {\n  219 |       points[i++] = new Point((width * bottomSeekBarProgress / 100), height);\n  220 |       points[i++] = new Point((width * topSeekBarProgress / 100), 0);\n  221 |       points[i++] = new Point(width, 0); // topright\n  222 |       points[i] = new Point(width, height); // bottomright\n  223 |       return points;\n  224 |     }\n  225 | \n  226 |     if (topSeekBarActive && leftSeekBarActive) {\n  227 |       points[i++] = new Point(0, (height * leftSeekBarProgress / 100));\n  228 |       points[i++] = new Point((width * topSeekBarProgress / 100), 0);\n  229 |       points[i++] = new Point(width, 0); // topright\n  230 |       points[i++] = new Point(width, height); // bottomright\n  231 |       points[i] = new Point(0, height); // bottomleft\n  232 |       return points;\n  233 |     }\n  234 | \n  235 |     if (rightSeekBarActive && bottomSeekBarActive) {\n  236 |       points[i++] = new Point((width * bottomSeekBarProgress / 100), height);\n  237 |       points[i++] = new Point(width, (height * rightSeekBarProgress / 100));\n  238 |       points[i] = new Point(width, height); // bottomright\n  239 |       return points;\n  240 |     }\n  241 | \n  242 |     if (rightSeekBarActive && leftSeekBarActive) {\n  243 |       points[i++] = new Point(0, (height * leftSeekBarProgress / 100));\n  244 |       points[i++] = new Point(width, (height * rightSeekBarProgress / 100));\n  245 |       points[i++] = new Point(width, height); // bottomright\n  246 |       points[i] = new Point(0, height); // bottomleft\n  247 |       return points;\n  248 |     }\n  249 | \n  250 |     if (bottomSeekBarActive && leftSeekBarActive) {\n  251 |       points[i++] = new Point(0, (height * leftSeekBarProgress / 100));\n  252 |       points[i++] = new Point((width * bottomSeekBarProgress / 100), height);\n  253 |       points[i] = new Point(0, height); // bottomleft\n  254 |       return points;\n  255 |     }\n  256 | \n  257 |     return points;\n  258 |   }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"MainHelper.getImageName calls DocumentFile.fromSingleUri(context, uri), which can return null according to the Android documentation (it may return null if context is null, though that is unlikely here). Calling df.getName() on a potentially null DocumentFile reference without a null-check first can cause a NullPointerException. The outer try/catch will absorb the crash and fall through to return R.string.unknown, but the caller then uses the 'unknown' string as a filename prefix (e.g. '1_unknown'), which may cause filename collisions if multiple images fail name resolution.","fix":"Add a null check for df before calling df.getName(): if (df != null && df.getName() != null) { return df.getName(); }.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/main/MainHelper.java:94-106","code":"   94 |   public static String getImageName(Context context, Uri uri) {\n   95 |     try {\n   96 |       DocumentFile df = DocumentFile.fromSingleUri(context, uri);\n   97 |       if (df.getName() != null) {\n   98 |         return df.getName();\n   99 |       }\n  100 | \n  101 |       return uri.getLastPathSegment();\n  102 |     } catch (Exception ignored) {\n  103 |     }\n  104 | \n  105 |     return context.getString(R.string.unknown);\n  106 |   }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In TouchRevealView.reset(), the JPEG snapshot is decoded with BitmapFactory.decodeByteArray()\nwithout specifying inPreferredConfig=ARGB_8888. The original source was compressed as JPEG\nat 95% quality from an ARGB_8888 bitmap. The decoded 'restored' bitmap may use a different\nconfig (e.g. RGB_565 on some devices or Android versions). It is then drawn onto the\nARGB_8888 mutableBitmap canvas using drawBitmap(restored, 0, 0, null), which silently\naccepts any config. The visual result may be slightly different in alpha/color fidelity\nafter reset compared to the original state.","fix":"Specify the config explicitly:\n  BitmapFactory.Options opts = new BitmapFactory.Options();\n  opts.inPreferredConfig = Bitmap.Config.ARGB_8888;\n  Bitmap restored = BitmapFactory.decodeByteArray(originalBytes, 0, originalBytes.length, opts);","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/widget/TouchRevealView.java:216-228","code":"  216 |   public void reset() {\n  217 |     if (originalBytes == null || mutableBitmap == null || bitmapCanvas == null) return;\n  218 | \n  219 |     Bitmap restored = BitmapFactory.decodeByteArray(originalBytes, 0, originalBytes.length);\n  220 |     if (restored == null) return;\n  221 | \n  222 |     // Reuse the existing bitmapCanvas — no new Canvas allocation.\n  223 |     bitmapCanvas.drawColor(0, PorterDuff.Mode.CLEAR);\n  224 |     bitmapCanvas.drawBitmap(restored, 0, 0, null);\n  225 |     restored.recycle();\n  226 | \n  227 |     invalidate();\n  228 |   }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"BitmapTransformer.applyRotateAndMirror() contains the guard condition on line 103:\n  'if (rotated != source && rotated != mirroredBitmap && !rotated.isRecycled())'\nThe third sub-condition '!rotated.isRecycled()' is defensive but logically redundant: if rotated\nwas already recycled before this point, it means either mirrorBitmap() recycled it (which it does\nnot — mirrorBitmap only reads the bitmap) or some external caller recycled it concurrently (a race\ncondition). In normal single-threaded use, rotated can never be recycled here. The check adds a\nfalse sense of safety against concurrent mutation without actually being thread-safe.","fix":"Remove the '!rotated.isRecycled()' check and add a comment stating that applyRotateAndMirror must be called from a single thread. If thread safety is required, add proper synchronization instead.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/BitmapTransformer.java:103-105","code":"  103 |       if (rotated != source && rotated != mirroredBitmap && !rotated.isRecycled()) {\n  104 |         rotated.recycle();\n  105 |       }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"All transform methods in BitmapTransformer (createScaledBitmapToMaxLength, resizeBitmap, rotateBitmap,\nmirrorBitmap) silently catch all exceptions ('catch (Exception ignored)') and return the original\nbitmap as if the operation succeeded. Callers have no way to know whether the transform was applied\nor not. For example, if rotateBitmap fails due to an OutOfMemoryError (which is an Error, not an\nException, so it would propagate anyway) or an IllegalArgumentException (e.g. zero-dimension input),\nthe caller receives the unrotated bitmap and continues as if rotation succeeded. This can produce\nsilent data corruption in the compare view where the user sees wrong images with no indication of\nthe problem. The same pattern is repeated across BitmapExtractor, ImageFileSaver, and other places.","fix":"At minimum, log the exception at a WARN/ERROR level before swallowing it (e.g. Log.e(TAG, 'rotateBitmap failed', e)). For callers that depend on transformation success, return an Optional or throw a checked exception so the caller can handle the failure gracefully (e.g. show a Toast). OutOfMemoryError should specifically not be caught by catch(Exception) — it won't be, but callers should still handle the OOM scenario.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/BitmapTransformer.java:28-58","code":"   28 |     try {\n   29 |       int width = image.getWidth();\n   30 |       int height = image.getHeight();\n   31 | \n   32 |       float ratioBitmap = (float) width / (float) height;\n   33 |       float ratioMax = (float) maxWidth / (float) maxHeight;\n   34 | \n   35 |       int finalWidth = maxWidth;\n   36 |       int finalHeight = maxHeight;\n   37 | \n   38 |       if (ratioMax > ratioBitmap) {\n   39 |         finalWidth = (int) ((float) maxHeight * ratioBitmap);\n   40 |       } else {\n   41 |         finalHeight = (int) ((float) maxWidth / ratioBitmap);\n   42 |       }\n   43 | \n   44 |       return Bitmap.createScaledBitmap(image, finalWidth, finalHeight, true);\n   45 |     } catch (Exception ignored) {\n   46 |     }\n   47 | \n   48 |     return image;\n   49 |   }\n   50 | \n   51 |   public static Bitmap resizeBitmap(Bitmap image, int width, int height) {\n   52 |     try {\n   53 |       return Bitmap.createScaledBitmap(image, width, height, true);\n   54 |     } catch (Exception ignored) {\n   55 |     }\n   56 | \n   57 |     return image;\n   58 |   }"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/BitmapTransformer.java:65-74","code":"   65 |     try {\n   66 |       Matrix matrix = new Matrix();\n   67 |       matrix.postRotate(degree);\n   68 | \n   69 |       return Bitmap.createBitmap(bitmap, 0, 0, bitmap.getWidth(), bitmap.getHeight(), matrix, true);\n   70 |     } catch (Exception ignored) {\n   71 |     }\n   72 | \n   73 |     return bitmap;\n   74 |   }"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/ImageFileSaver.java:50-53","code":"   50 |     } catch (Exception ignored) {\n   51 |       return null;\n   52 |     }\n   53 |   }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","description":"ZoomImageView.getCurrentBitmap() (line 111) performs an unchecked cast and dereference:\n  return ((BitmapDrawable) super.getDrawable()).getBitmap();\ngetDrawable() returns null if no image has been set, causing a NullPointerException.\nAdditionally, if the drawable is not a BitmapDrawable (e.g. a vector or color drawable)\nit throws a ClassCastException. getCurrentBitmap() is called in OverlayCutActivity\n(Check button, line 231) without any null check.","fix":"Add a null/type check:\n  @Override\n  public Bitmap getCurrentBitmap() {\n      Drawable d = super.getDrawable();\n      if (d instanceof BitmapDrawable bd) return bd.getBitmap();\n      return null;\n  }\nThen guard the call site:\n  Bitmap current = binding.fullSlideImageViewFront.getCurrentBitmap();\n  if (current != null) { ... }","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/widget/ZoomImageView.java:110-112","code":"  110 |   public Bitmap getCurrentBitmap() {\n  111 |     return ((BitmapDrawable) super.getDrawable()).getBitmap();\n  112 |   }"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/compare/overlayCut/OverlayCutActivity.java:231-234","code":"  231 |           Bitmap current = binding.fullSlideImageViewFront.getCurrentBitmap();\n  232 |           if (current != null) {\n  233 |             viewModel.bitmapAdjusted = current.copy(Bitmap.Config.ARGB_8888, false);\n  234 |           }"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"saveCurrentImage passes the wildcard MIME type 'image/*' to MediaStore.Images.Media.MIME_TYPE. MediaStore requires a concrete MIME type (e.g. 'image/jpeg' or 'image/png') for correct metadata, thumbnail generation, and gallery categorisation. Using a wildcard type can cause the saved file to be unrecognised or miscategorised in the media library on some devices and API levels.","fix":"Determine the real MIME type from the source URI (ContentResolver.getType(imageUri)) and use that value. If unavailable, fall back to 'image/jpeg'.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/main/ImageSlotPickerHelper.java:296","code":"  296 |       contentValues.put(MediaStore.Images.Media.MIME_TYPE, \"image/*\");"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","description":"onGalleryResult performs heavyweight file I/O (ImageFileSaver.saveUriToFile) and full bitmap decoding (BitmapExtractor.fromUri) on the main thread. For large gallery photos this will block the UI thread for potentially hundreds of milliseconds, causing jank or even an ANR. The camera path (onCameraResult) correctly offloads to a background thread, but the gallery path does not.","fix":"Wrap the body of onGalleryResult in a new Thread (or use the existing executor from CompareActivityLauncher pattern) the same way onCameraResult does. Update the ImageView and TextView only via activity.runOnUiThread() after the work completes.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/main/ImageSlotPickerHelper.java:208-237","code":"  208 |   private void onGalleryResult(Uri receivedUri) {\n  209 |     if (receivedUri == null) {\n  210 |       Toast.makeText(activity, R.string.error_message_general, Toast.LENGTH_SHORT).show();\n  211 |       return;\n  212 |     }\n  213 | \n  214 |     String originalName = MainHelper.getImageName(activity, receivedUri);\n  215 |     String prefix = isLeft() ? \"1_\" : \"2_\";\n  216 |     File localFile = new File(activity.getCacheDir(), prefix + originalName);\n  217 |     Uri localUri =\n  218 |         ImageFileSaver.saveUriToFile(activity.getContentResolver(), receivedUri, localFile);\n  219 | \n  220 |     if (localUri == null) {\n  221 |       Toast.makeText(activity, R.string.error_message_general, Toast.LENGTH_SHORT).show();\n  222 |       return;\n  223 |     }\n  224 | \n  225 |     setUri(localUri);\n  226 | \n  227 |     ImageInfoHolder holder = getHolder();\n  228 |     holder.updateFromBitmap(\n  229 |         BitmapExtractor.fromUri(activity.getContentResolver(), localUri),\n  230 |         dimensions.maxSide(),\n  231 |         dimensions.maxSideForPreview(),\n  232 |         originalName);\n  233 |     (isLeft() ? binding.homeImageLeft : binding.homeImageRight)\n  234 |         .setImageBitmap(holder.getBitmapSmall());\n  235 |     (isLeft() ? binding.mainTextViewNameImageLeft : binding.mainTextViewNameImageRight)\n  236 |         .setText(holder.getImageName());\n  237 |   }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","description":"differences/ViewModel.processImages() allocates two int[] pixel arrays whose size equals\nwidth*height of the decoded image. For a 20 MP image (e.g. 5504x4128) this is ~22.7 M\nints per array, totalling ~182 MB of heap just for the pixel staging buffers, on top of\nthe two decoded bitmaps (~87 MB each for ARGB_8888). This can easily cause OOM on\nmid-range devices. Additionally, a boolean[] diffMask of the same length is allocated.\nNo downscaling is applied before pixel extraction.","fix":"Before calling getPixels(), downscale both bitmaps to a bounded resolution (e.g. 1280x960)\nusing BitmapTransformer.createScaledBitmapToMaxLength(). The pixel-level comparison result\nis essentially the same at reduced resolution, and memory usage drops from ~350 MB to ~15 MB.\nKeep the original bitmaps for the final circle annotation step.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/compare/differences/ViewModel.java:197-206","code":"  197 |     int width = bmp1.getWidth();\n  198 |     int height = bmp1.getHeight();\n  199 |     int total = width * height;\n  200 | \n  201 |     int[] pixels1 = new int[total];\n  202 |     int[] pixels2 = new int[total];\n  203 |     bmp1.getPixels(pixels1, 0, width, 0, 0, width, height);\n  204 |     bmp2.getPixels(pixels2, 0, width, 0, 0, width, height);\n  205 | \n  206 |     boolean[] diffMask = buildDiffMask(pixels1, pixels2);"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","description":"saveCurrentImage performs ContentResolver I/O (insert, openInputStream, openOutputStream, bulk copy, and update) on the main thread. For a large image this can block the UI thread for several hundred milliseconds and trigger an ANR warning.","fix":"Offload saveCurrentImage to a background thread (similar to how onCameraResult offloads its work). Show a progress indicator while saving and only show the success/error Toast from the UI thread once the operation completes.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/main/ImageSlotPickerHelper.java:278-349","code":"  278 |   private void saveCurrentImage() {\n  279 |     try {\n  280 |       Uri imageUri = isLeft() ? sessionState.getLeftImageUri() : sessionState.getRightImageUri();\n  281 | \n  282 |       if (imageUri == null) {\n  283 |         Toast.makeText(\n  284 |                 activity, activity.getString(R.string.error_msg_missing_images), Toast.LENGTH_SHORT)\n  285 |             .show();\n  286 |         return;\n  287 |       }\n  288 | \n  289 |       String imageName = getHolder().getImageName();\n  290 |       if (imageName == null || imageName.isEmpty()) {\n  291 |         imageName = \"image_\" + System.currentTimeMillis() + \".jpg\";\n  292 |       }\n  293 | \n  294 |       ContentValues contentValues = new ContentValues();\n  295 |       contentValues.put(MediaStore.Images.Media.DISPLAY_NAME, imageName);\n  296 |       contentValues.put(MediaStore.Images.Media.MIME_TYPE, \"image/*\");\n  297 |       if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {\n  298 |         contentValues.put(\n  299 |             MediaStore.Images.Media.RELATIVE_PATH, Environment.DIRECTORY_PICTURES);\n  300 |         contentValues.put(MediaStore.Images.Media.IS_PENDING, 1);\n  301 |       }\n  302 | \n  303 |       Uri collection;\n  304 |       if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {\n  305 |         collection = MediaStore.Images.Media.getContentUri(MediaStore.VOLUME_EXTERNAL_PRIMARY);\n  306 |       } else {\n  307 |         collection = MediaStore.Images.Media.EXTERNAL_CONTENT_URI;\n  308 |       }\n  309 |       Uri savedUri =\n  310 |           activity.getContentResolver().insert(collection, contentValues);\n  311 | \n  312 |       if (savedUri == null) {\n  313 |         Toast.makeText(\n  314 |                 activity, activity.getString(R.string.error_message_general), Toast.LENGTH_SHORT)\n  315 |             .show();\n  316 |         return;\n  317 |       }\n  318 | \n  319 |       try (InputStream in = activity.getContentResolver().openInputStream(imageUri);\n  320 |           OutputStream out = activity.getContentResolver().openOutputStream(savedUri)) {\n  321 |         if (in == null || out == null) {\n  322 |           activity.getContentResolver().delete(savedUri, null, null);\n  323 |           Toast.makeText(\n  324 |                   activity, activity.getString(R.string.error_message_general), Toast.LENGTH_SHORT)\n  325 |               .show();\n  326 |           return;\n  327 |         }\n  328 |         byte[] buffer = new byte[8192];\n  329 |         int bytesRead;\n  330 |         while ((bytesRead = in.read(buffer)) != -1) {\n  331 |           out.write(buffer, 0, bytesRead);\n  332 |         }\n  333 |       }\n  334 | \n  335 |       if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {\n  336 |         contentValues.clear();\n  337 |         contentValues.put(MediaStore.Images.Media.IS_PENDING, 0);\n  338 |         activity.getContentResolver().update(savedUri, contentValues, null, null);\n  339 |       }\n  340 | \n  341 |       Toast.makeText(\n  342 |               activity, activity.getString(R.string.save_image_success), Toast.LENGTH_SHORT)\n  343 |           .show();\n  344 |     } catch (Exception ignored) {\n  345 |       Toast.makeText(\n  346 |               activity, activity.getString(R.string.error_message_general), Toast.LENGTH_SHORT)\n  347 |           .show();\n  348 |     }\n  349 |   }"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"DemoTest.naturalSlideFromTo() steps the seekbar one progress unit at a time with a 50 ms pause\nbetween each step (SUPER_SHORT_PAUSE_MS). For a 0→100 range this issues 100 Espresso ViewActions\nover 5 seconds, each involving a UI-thread hop. On a slow emulator or under load this can make the\ndemo unnecessarily long and fragile. Additionally, the method signature accepts a 'from' value but\nonly uses it as the loop start — it does NOT actually set the seekbar to 'from' before beginning,\nso if the seekbar is currently at a different position the animation will appear to jump at the first\nstep.","fix":"Call setProgress(from) once before the loop begins to ensure the seekbar starts at the intended position. Consider increasing the step size (e.g. step by 2 or 5) to reduce the number of Espresso interactions without a visible quality difference in the recording.","locations":[{"ref":"app/src/androidTest/java/com/vincentengelsoftware/androidimagecompare/demo/DemoTest.java:352-358","code":"  352 |   private void naturalSlideFromTo(int viewId, int from, int to) throws InterruptedException {\n  353 |     int step = from <= to ? 1 : -1;\n  354 |     for (int i = from; from <= to ? i < to : i > to; i += step) {\n  355 |       onView(withId(viewId)).perform(setProgress(i));\n  356 |       pause(SUPER_SHORT_PAUSE_MS);\n  357 |     }\n  358 |   }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"IntentImageHandler.handleSendImage and handleSendMultipleImages both perform file I/O (ImageFileSaver.saveUriToFile) and bitmap decoding (BitmapExtractor.fromUri) on the main thread. These methods are called from Activity.onCreate and Activity.onNewIntent, which run on the main thread. For large shared images (e.g. shared from a camera app at full resolution) this can cause perceptible delays or an ANR warning.","fix":"Offload the saveUriToFile and BitmapExtractor.fromUri calls to a background thread. Update image views only via runOnUiThread after the work completes, similar to how onCameraResult handles the same pattern.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/main/IntentImageHandler.java:56-87","code":"   56 |   private static void handleSendImage(\n   57 |       Intent intent,\n   58 |       AppCompatActivity activity,\n   59 |       ImageSessionState sessionState,\n   60 |       ActivityMainBinding binding,\n   61 |       Dimensions dimensions) {\n   62 |     Uri imageUri = UriExtractor.getOutOfParcelableExtra(intent);\n   63 |     if (imageUri == null) return;\n   64 | \n   65 |     boolean isFirst = sessionState.getFirstImageInfoHolder().getBitmap() == null;\n   66 |     ImageInfoHolder holder =\n   67 |         isFirst ? sessionState.getFirstImageInfoHolder() : sessionState.getSecondImageInfoHolder();\n   68 | \n   69 |     String originalName = MainHelper.getImageName(activity, imageUri);\n   70 |     String fileName = (isFirst ? \"1_\" : \"2_\") + originalName;\n   71 |     File localFile = new File(activity.getCacheDir(), fileName);\n   72 |     Uri localUri = ImageFileSaver.saveUriToFile(activity.getContentResolver(), imageUri, localFile);\n   73 | \n   74 |     if (localUri == null) return;\n   75 | \n   76 |     if (isFirst) sessionState.setLeftImageUri(localUri);\n   77 |     else sessionState.setRightImageUri(localUri);\n   78 | \n   79 |     MainHelper.updateImageFromIntent(\n   80 |         holder,\n   81 |         BitmapExtractor.fromUri(activity.getContentResolver(), localUri),\n   82 |         dimensions.maxSide(),\n   83 |         dimensions.maxSideForPreview(),\n   84 |         originalName,\n   85 |         isFirst ? binding.homeImageLeft : binding.homeImageRight,\n   86 |         isFirst ? binding.mainTextViewNameImageLeft : binding.mainTextViewNameImageRight);\n   87 |   }"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/main/IntentImageHandler.java:89-141","code":"   89 |   private static void handleSendMultipleImages(\n   90 |       Intent intent,\n   91 |       AppCompatActivity activity,\n   92 |       ImageSessionState sessionState,\n   93 |       ActivityMainBinding binding,\n   94 |       Dimensions dimensions) {\n   95 |     ArrayList<Uri> imageUris = UriExtractor.getOutOfParcelableArrayListExtra(intent);\n   96 |     if (imageUris == null) return;\n   97 | \n   98 |     if (!imageUris.isEmpty() && imageUris.get(0) != null) {\n   99 |       Uri src = imageUris.get(0);\n  100 |       String name = MainHelper.getImageName(activity, src);\n  101 |       File dest = new File(activity.getCacheDir(), \"1_\" + name);\n  102 |       Uri localUri = ImageFileSaver.saveUriToFile(activity.getContentResolver(), src, dest);\n  103 |       if (localUri != null) {\n  104 |         sessionState.setLeftImageUri(localUri);\n  105 |         MainHelper.updateImageFromIntent(\n  106 |             sessionState.getFirstImageInfoHolder(),\n  107 |             BitmapExtractor.fromUri(activity.getContentResolver(), localUri),\n  108 |             dimensions.maxSide(),\n  109 |             dimensions.maxSideForPreview(),\n  110 |             name,\n  111 |             binding.homeImageLeft,\n  112 |             binding.mainTextViewNameImageLeft);\n  113 |       }\n  114 |     }\n  115 | \n  116 |     if (imageUris.size() > 1 && imageUris.get(1) != null) {\n  117 |       Uri src = imageUris.get(1);\n  118 |       String name = MainHelper.getImageName(activity, src);\n  119 |       File dest = new File(activity.getCacheDir(), \"2_\" + name);\n  120 |       Uri localUri = ImageFileSaver.saveUriToFile(activity.getContentResolver(), src, dest);\n  121 |       if (localUri != null) {\n  122 |         sessionState.setRightImageUri(localUri);\n  123 |         MainHelper.updateImageFromIntent(\n  124 |             sessionState.getSecondImageInfoHolder(),\n  125 |             BitmapExtractor.fromUri(activity.getContentResolver(), localUri),\n  126 |             dimensions.maxSide(),\n  127 |             dimensions.maxSideForPreview(),\n  128 |             name,\n  129 |             binding.homeImageRight,\n  130 |             binding.mainTextViewNameImageRight);\n  131 |       }\n  132 |     }\n  133 | \n  134 |     if (imageUris.size() > 2) {\n  135 |       Toast.makeText(\n  136 |               activity.getApplicationContext(),\n  137 |               R.string.error_message_intent_more_than_two_images,\n  138 |               Toast.LENGTH_LONG)\n  139 |           .show();\n  140 |     }\n  141 |   }"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"BitmapTransformer.mergeBitmap() creates a new result Bitmap and draws both 'back' and 'front' onto\nit with a Canvas. The result bitmap is always sized to back.getWidth() x back.getHeight(). However\nit uses front.getConfig() as the config (line 130), with a fallback to ARGB_8888. Since the\ntransparent bitmap passed as 'back' is always ARGB_8888 (created by createTransparentBitmap),\nand 'front' (the cut bitmap) inherits the config of the source bitmap (which might be RGB_565 or\nHARDWARE), the merged result will use the front bitmap's config. If that is RGB_565, the transparency\nthat was carefully prepared in the transparent background will be lost (RGB_565 has no alpha channel),\nresulting in a black background instead of transparent.","fix":"Always use Bitmap.Config.ARGB_8888 for the result bitmap in mergeBitmap, since the whole purpose of this method is to compose onto a transparent background. Change line 130 to: 'Bitmap.Config config = Bitmap.Config.ARGB_8888;'","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/BitmapTransformer.java:129-137","code":"  129 |   private static Bitmap mergeBitmap(Bitmap front, Bitmap back, int paddingLeft) {\n  130 |     Bitmap.Config config = front.getConfig() != null ? front.getConfig() : Bitmap.Config.ARGB_8888;\n  131 |     Bitmap result = Bitmap.createBitmap(back.getWidth(), back.getHeight(), config);\n  132 |     Canvas canvas = new Canvas(result);\n  133 |     canvas.drawBitmap(back, 0f, 0f, null);\n  134 |     canvas.drawBitmap(front, paddingLeft, 0f, null);\n  135 | \n  136 |     return result;\n  137 |   }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"ResizeAnimation.initialize() overrides the parent method only to call super.initialize(), providing no additional behaviour. This is a no-op override that adds noise without purpose.","fix":"Remove the initialize() override entirely.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/animation/ResizeAnimation.java:81-83","code":"   81 |   public void initialize(int width, int height, int parentWidth, int parentHeight) {\n   82 |     super.initialize(width, height, parentWidth, parentHeight);\n   83 |   }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"ExampleInstrumentedTest and ExampleUnitTest are the auto-generated stub tests created by Android\nStudio when a project is first set up. ExampleInstrumentedTest just checks the package name and\nExampleUnitTest asserts 2+2==4. Neither tests anything meaningful about the application and they\nadd noise to the test suite. They were never updated with real assertions.","fix":"Remove the two placeholder test classes, or replace them with real unit/instrumented tests for utility classes such as Calculator, BitmapTransformer, or DimensionsInitializer.","locations":[{"ref":"app/src/androidTest/java/com/vincentengelsoftware/androidimagecompare/ExampleInstrumentedTest.java:18-23","code":"   18 |   @Test\n   19 |   public void useAppContext() {\n   20 |     // Context of the app under test.\n   21 |     Context appContext = InstrumentationRegistry.getInstrumentation().getTargetContext();\n   22 |     assertEquals(\"com.vincentengelsoftware.androidimagecompare\", appContext.getPackageName());\n   23 |   }"},{"ref":"app/src/test/java/com/vincentengelsoftware/androidimagecompare/ExampleUnitTest.java:13-16","code":"   13 |   @Test\n   14 |   public void addition_isCorrect() {\n   15 |     assertEquals(4, 2 + 2);\n   16 |   }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"The local variable `sourceBitmap` in `ImageInfoHolder.getAdjustedBitmap()` (line 90) stores `source.bitmap()` but is only used once on line 101 for an identity comparison. While technically used, it shadows a field access and is easy to misread as unused dead code. More importantly, calling `source.bitmap()` twice (once at line 90 and once implicitly through `scaleSource`) is redundant.","fix":"Pass `source.bitmap()` directly in the recycling guard on line 101 and remove the `sourceBitmap` local variable, or add a brief comment explaining why the local is needed for the identity check.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/domain/model/ImageInfoHolder.java:90-101","code":"   90 |     Bitmap sourceBitmap = source.bitmap();\n   91 | \n   92 |     // Step 1: scale the source bitmap to the configured target size.\n   93 |     Bitmap scaled = scaleSource(source, transformSettings);\n   94 | \n   95 |     // Step 2: apply rotation and mirror in the canonical order (rotate → mirror).\n   96 |     Bitmap result = BitmapTransformer.applyRotateAndMirror(\n   97 |         scaled, transformSettings.getRotationDegrees(), transformSettings.isMirrored());\n   98 | \n   99 |     // Recycle intermediate scaled bitmap if it is a new allocation (not the original source\n  100 |     // and not returned as the final result).\n  101 |     if (scaled != sourceBitmap && scaled != result && !scaled.isRecycled()) {"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"CacheManager.cleanup() Javadoc says it 'Deletes every file in cacheDir whose canonical path is not referenced by the current left or right image URI in sessionState', but the implementation unconditionally adds the camera temp file AND both compare output files to the keep-set (lines 74-76) regardless of whether those files are referenced by the session URIs. In practice, cleanup() never deletes the three well-known cache files even when no image is loaded. The Javadoc is therefore inaccurate about what the method preserves.","fix":"Update the Javadoc to explicitly state that the camera-temp file and both compare-output files are always preserved, in addition to any files referenced by the session URIs.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/data/cache/CacheManager.java:43-45","code":"   43 |    * Deletes every file in {@code cacheDir} whose canonical path is not referenced by the current\n   44 |    * left or right image URI in {@code sessionState}. Safe to call from {@code Activity.onDestroy}.\n   45 |    */"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/data/cache/CacheManager.java:73-76","code":"   73 |     // Always preserve the camera temp file and calculated image files\n   74 |     paths.add(getCameraTempFile(cacheDir).getCanonicalPath());\n   75 |     paths.add(getCompareFileOne(cacheDir).getCanonicalPath());\n   76 |     paths.add(getCompareFileTwo(cacheDir).getCanonicalPath());"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"FullScreenHelper.apply() has a Javadoc comment that is exactly inverted with respect to\nthe actual code behaviour. The comment states: 'When showNavigationBar is true the\nnavigation bar and status bar are hidden'. In reality the code calls controller.show()\nwhen showNavigationBar is true (bars are shown) and controller.hide() when it is false\n(bars are hidden / immersive mode). The intent extra SHOW_NAVIGATION_BAR semantics and\nthe code are both correct; only the Javadoc is wrong.","fix":"Correct the Javadoc to match the code:\n  * <p>When {@code showNavigationBar} is {@code true} the system bars are shown and the\n  * screen is kept on. When {@code false} the app enters immersive full-screen mode: the\n  * system bars are hidden with swipe-to-reveal behaviour.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/compare/shared/FullScreenHelper.java:22-31","code":"   22 |    * Conditionally applies full-screen flags based on the {@code showNavigationBar} parameter.\n   23 |    *\n   24 |    * <p>When {@code showNavigationBar} is {@code true} the navigation bar and status bar are hidden\n   25 |    * and the screen is kept on. When {@code false} the system bars are explicitly shown, {@code\n   26 |    * decorFitsSystemWindows} is restored to {@code true} (content stays inside the bars), and only\n   27 |    * the keep-screen-on flag is applied.\n   28 |    *\n   29 |    * @param window the window to configure\n   30 |    * @param showNavigationBar whether to enter immersive showNavigationBar mode\n   31 |    */"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"ImageFileSaver.saveBitmapToFile() has a comment on line 58-59 that reads:\n'BufferedOutputStream (64 KB buffer) coalesces the WebP encoder's many small writes...'\nbut the actual compression format used is JPEG (line 60: Bitmap.CompressFormat.JPEG, 100).\nThe comment mentions 'WebP encoder' which is wrong and misleading.","fix":"Change the comment to reference the JPEG encoder, not WebP. Also consider whether JPEG is the intended format (JPEG with quality=100 is lossless but produces large files; a lossless format like PNG or WebP lossless might be more appropriate for saving a compared image).","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/ImageFileSaver.java:58-60","code":"   58 |       // BufferedOutputStream (64 KB buffer) coalesces the WebP encoder's many small\n   59 |       // writes into larger, fewer system calls before they reach the kernel.\n   60 |       bitmap.compress(Bitmap.CompressFormat.JPEG, 100, out);"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","description":"AppVersion.getPackageInfo() and PackageInfoHelper.getPackageInfo() are essentially identical\nimplementations — both check Build.VERSION.SDK_INT >= TIRAMISU, call getPackageManager().getPackageInfo()\nwith PackageManager.PackageInfoFlags.of(GET_META_DATA) for API 33+, and fall back to the deprecated\nint-flag overload for older APIs. The two methods are 12 lines each of nearly identical code living\nin separate classes in the same package. AppVersion also duplicates PackageInfoHelper's functionality:\nAppVersion.getVersionName() could simply call PackageInfoHelper.getPackageVersion() and prepend \"v\".\nThis creates a maintenance burden — if the package-info retrieval ever needs to change (e.g. for API\n34+ or new flags), it must be updated in two places.","fix":"Delete AppVersion.getPackageInfo() and delegate to PackageInfoHelper.getPackageInfo(). Have AppVersion.getVersionName() call PackageInfoHelper.getPackageVersion() and prefix with 'v'.","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/AppVersion.java:22-34","code":"   22 |   public static PackageInfo getPackageInfo(Context context)\n   23 |       throws PackageManager.NameNotFoundException {\n   24 |     if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {\n   25 |       return context\n   26 |           .getPackageManager()\n   27 |           .getPackageInfo(\n   28 |               context.getPackageName(),\n   29 |               PackageManager.PackageInfoFlags.of(PackageManager.GET_META_DATA));\n   30 |     }\n   31 |     return context\n   32 |         .getPackageManager()\n   33 |         .getPackageInfo(context.getPackageName(), PackageManager.GET_META_DATA);\n   34 |   }"},{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/util/PackageInfoHelper.java:8-22","code":"    8 |   @SuppressWarnings(\"deprecation\")\n    9 |   public static PackageInfo getPackageInfo(Context context)\n   10 |       throws PackageManager.NameNotFoundException {\n   11 |     if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.TIRAMISU) {\n   12 |       return context\n   13 |           .getPackageManager()\n   14 |           .getPackageInfo(\n   15 |               context.getPackageName(),\n   16 |               PackageManager.PackageInfoFlags.of(PackageManager.GET_META_DATA));\n   17 |     }\n   18 | \n   19 |     return context\n   20 |         .getPackageManager()\n   21 |         .getPackageInfo(context.getPackageName(), PackageManager.GET_META_DATA);\n   22 |   }"}]},{"id":"DUPLIC_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The URI validation and null/empty check in initImages() is copy-pasted across four\nActivity classes: DifferencesActivity (lines 83-88), OverlayTapActivity (lines 101-105),\nOverlayTransparentActivity (lines 135-140), and SideBySideActivity (lines 97-102). Each\nhas the same pattern: getStringExtra for IMAGE_URI_ONE and IMAGE_URI_TWO, check for\nnull-or-empty, return false if invalid. This is more than 25 lines of functionally\nidentical logic spread across the codebase.","fix":"Move the check to IntentExtras or a base class:\n  // In IntentExtras.java\n  public static boolean hasValidUris(Intent intent) {\n      String one = intent.getStringExtra(IMAGE_URI_ONE);\n      String two = intent.getStringExtra(IMAGE_URI_TWO);\n      return one != null && !one.isEmpty() && two != null && !two.isEmpty();\n  }","locations":[{"ref":"app/src/main/java/com/vincentengelsoftware/androidimagecompare/ui/compare/differences/DifferencesActivity.java:83-88","code":"   83 |     if (uriStringOne == null\n   84 |         || uriStringOne.isEmpty()\
