m number of allocated inodes.\n  175 |     pub fn set_inodes_hard_limit(&mut self, limit: u64) {\n  176 |         self.0.dqb_ihardlimit = limit;\n  177 |     }\n  178 | \n  179 |     /// Preferred inode limit\n  180 |     pub fn inodes_soft_limit(&self) -> Option<u64> {\n  181 |         let valid_fields =\n  182 |             QuotaValidFlags::from_bits_truncate(self.0.dqb_valid);\n  183 |         if valid_fields.contains(QuotaValidFlags::QIF_ILIMITS) {\n  184 |             Some(self.0.dqb_isoftlimit)\n  185 |         } else {\n  186 |             None\n  187 |         }\n  188 |     }\n  189 | \n  190 |     /// Set the preferred limit of allocated inodes.\n  191 |     pub fn set_inodes_soft_limit(&mut self, limit: u64) {\n  192 |         self.0.dqb_isoftlimit = limit;\n  193 |     }\n  194 | \n  195 |     /// Current number of allocated inodes.\n  196 |     pub fn allocated_inodes(&self) -> Option<u64> {\n  197 |         let valid_fields =\n  198 |             QuotaValidFlags::from_bits_truncate(self.0.dqb_valid);\n  199 |         if valid_fields.contains(QuotaValidFlags::QIF_INODES) {\n  200 |             Some(self.0.dqb_curinodes)\n  201 |         } else {\n  202 |             None\n  203 |         }\n  204 |     }\n  205 | \n  206 |     /// Time limit for excessive disk use.\n  207 |     pub fn block_time_limit(&self) -> Option<u64> {\n  208 |         let valid_fields =\n  209 |             QuotaValidFlags::from_bits_truncate(self.0.dqb_valid);\n  210 |         if valid_fields.contains(QuotaValidFlags::QIF_BTIME) {\n  211 |             Some(self.0.dqb_btime)\n  212 |         } else {\n  213 |             None\n  214 |         }\n  215 |     }\n  216 | \n  217 |     /// Set the time limit for excessive disk use.\n  218 |     pub fn set_block_time_limit(&mut self, limit: u64) {\n  219 |         self.0.dqb_btime = limit;\n  220 |     }\n  221 | \n  222 |     /// Time limit for excessive files.\n  223 |     pub fn inode_time_limit(&self) -> Option<u64> {\n  224 |         let valid_fields =\n  225 |             QuotaValidFlags::from_bits_truncate(self.0.dqb_valid);\n  226 |         if valid_fields.contains(QuotaValidFlags::QIF_ITIME) {\n  227 |             Some(self.0.dqb_itime)\n  228 |         } else {\n  229 |             None\n  230 |         }\n  231 |     }\n  232 | \n  233 |     /// Set the time limit for excessive files.\n  234 |     pub fn set_inode_time_limit(&mut self, limit: u64) {\n  235 |         self.0.dqb_itime = limit;\n  236 |     }\n  237 | }","lines":119}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`AlgAddr::new` in addr.rs calls `alg_type.to_string()` and `alg_name.to_string()` just to call\n`.as_bytes()` on the result, performing an unnecessary heap allocation.  The input is already a\n`&str` and `.as_bytes()` can be called directly on it.","fix":"Replace `alg_type.to_string().as_bytes()` with `alg_type.as_bytes()` and similarly for `alg_name`.","locations":[{"ref":"src/sys/socket/addr.rs:1692-1694","code":" 1692 |                 .copy_from_slice(alg_type.to_string().as_bytes());\n 1693 |             addr.salg_name[..alg_name.len()]\n 1694 |                 .copy_from_slice(alg_name.to_string().as_bytes());","lines":3}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`getcwd` (line 946) calls `buf.shrink_to_fit()` on the successful path before returning. This\ncauses a reallocation to trim the buffer to exactly the path length. For callers that immediately\nuse the path and discard it, this extra allocation is pure waste. The shrink is not needed for\ncorrectness.","fix":"Remove the `buf.shrink_to_fit()` call.","locations":[{"ref":"src/unistd.rs:961-961","code":"  961 |                 buf.shrink_to_fit();","lines":1}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"In net/if_.rs, if_indextoname allocates a Vec<u8> of IF_NAMESIZE bytes, then calls CStr::from_bytes_until_nul followed by to_owned to create a CString. This does two heap allocations: one for the Vec and one for the CString. The initial Vec could be replaced with a stack array since IF_NAMESIZE is a small constant (typically 16 bytes).","fix":"Use a [u8; IF_NAMESIZE] stack array instead of Vec<u8>.","locations":[{"ref":"src/net/if_.rs:32-39","code":"   32 |     let mut buf = vec![0u8; IF_NAMESIZE];\n   33 | \n   34 |     let return_buf = unsafe {\n   35 |         libc::if_indextoname(index, buf.as_mut_ptr().cast())\n   36 |     };\n   37 | \n   38 |     Errno::result(return_buf.cast())?;\n   39 |     Ok(CStr::from_bytes_until_nul(buf.as_slice()).unwrap().to_owned())","lines":8}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"The match expression in setsiginfo (lines 566-569) is a no-op: it matches Ok(_) => Ok(()) and Err(e) => Err(e), which is identical to returning the result directly. This adds noise without any effect.","fix":"Replace the match with: Errno::result(ret).map(drop)","locations":[{"ref":"src/sys/ptrace/linux.rs:566-569","code":"  566 |     match Errno::result(ret) {\n  567 |         Ok(_) => Ok(()),\n  568 |         Err(e) => Err(e),\n  569 |     }","lines":4}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"Lines 38-41 of mod.rs have two unconditional `pub use self::addr::{AddressFamily, UnixAddr}`\nre-exports: one inside `#[cfg(solarish)]` and one inside `#[cfg(not(solarish))]`.  They are\nidentical in content (both re-export the same two items), so one of them is always dead.  This\npattern was presumably intended to re-export different items depending on the platform, but both\nbranches re-export the same symbols.","fix":"Collapse into a single unconditional `pub use self::addr::{AddressFamily, UnixAddr};`.","locations":[{"ref":"src/sys/socket/mod.rs:38-41","code":"   38 | #[cfg(solarish)]\n   39 | pub use self::addr::{AddressFamily, UnixAddr};\n   40 | #[cfg(not(solarish))]\n   41 | pub use self::addr::{AddressFamily, UnixAddr};","lines":4}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In dir.rs line 330, the safety comment says 'safe because we knod that de.d_name is in valid memory' - 'knod' is a typo for 'know', making the comment unclear.","fix":"Fix the typo: 'knod' -> 'know'.","locations":[{"ref":"src/dir.rs:330","code":"  330 |         // Safety: safe because we knod that de.d_name is in valid memory.","lines":1}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In mount/linux.rs line 79, the doc comment for MntFlags says 'Used with [`umount2].' - the closing backtick/bracket is missing from the link, making the rustdoc link malformed.","fix":"Change the doc comment to 'Used with [`umount2`].' to properly close the rustdoc link.","locations":[{"ref":"src/mount/linux.rs:79","code":"   79 |     /// Used with [`umount2].","lines":1}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc-comment on PtyMaster says `Constructs a PytMaster wrapping an existing OwnedFd` (typo: PytMaster instead of PtyMaster). This is a documentation error in a public unsafe API.","fix":"Change 'PytMaster' to 'PtyMaster' in the doc comment.","locations":[{"ref":"src/pty.rs:56-57","code":"   56 |     /// Constructs a `PytMaster` wrapping an existing `OwnedFd`.\n   57 |     ///","lines":2}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The safety comment in write_user (line 817) says 'in PTRACE_POKEDATA situation' but the function calls ptrace_other with Request::PTRACE_POKEUSER. The comment was copied from write() which uses PTRACE_POKEDATA.","fix":"Change the comment to reference PTRACE_POKEUSER instead of PTRACE_POKEDATA.","locations":[{"ref":"src/sys/ptrace/linux.rs:815-818","code":"  815 |         // Safety(not_unsafe_ptr_arg_deref):\n  816 |         // `ptrace_other` is a common abstract\n  817 |         // but in `PTRACE_POKEDATA` situation, `data` is exactly what will be wtitten\n  818 |         ptrace_other(Request::PTRACE_POKEUSER, pid, offset, data as *mut c_void)","lines":4}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment above `SA_SIGINFO` in the `SaFlags` bitflags says \"This flag is\ncontrolled internally by Nix.\"  That is true in `SigAction::new`, but the flag\nis exposed as a public variant in the bitflags, so users can set it directly in\nthe `flags` argument passed to `SigAction::new`.  The code in `new` then\nsilently overrides it, making the comment misleading: users might expect to be\nable to control the flag directly.","fix":"Clarify the comment: e.g., \"This flag is overridden by SigAction::new; users should not set it directly.\"","locations":[{"ref":"src/sys/signal.rs:462-463","code":"  462 |         /// This flag is controlled internally by Nix.\n  463 |         SA_SIGINFO;","lines":2}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment at mod.rs line 1876 says \"can't be changed later by pushing anything into self.addresses\"\n(with a typo: \"can'be\") but the variable `addresses` is immediately consumed by\n`iter_mut()` and stored in `items`, so the comment's intent is correct but the typo makes it\nconfusing.","fix":"Fix typo: \"can'be\" -> \"can't be\".","locations":[{"ref":"src/sys/socket/mod.rs:1876","code":" 1876 |         // slice so it can'be changed later by pushing anything into self.addresses","lines":1}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `time.rs`, the doc comment for `TimeSpec::microseconds` says \"Makes a new `TimeSpec` with given number of microseconds\" but the internal panic message reads `\"TimeSpec::milliseconds out of bounds\"` (wrong unit).","fix":"Change the panic message to `\"TimeSpec::microseconds out of bounds\"`.","locations":[{"ref":"src/sys/time.rs:289","code":"  289 |             .expect(\"TimeSpec::milliseconds out of bounds\");","lines":1}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `getppid` (line 309) incorrectly links to `getpid(2)` instead of `getppid(2)`.\nThe URL is `https://pubs.opengroup.org/onlinepubs/9699919799/functions/getpid.html` but should be\n`.../functions/getppid.html`.","fix":"Change the link target from `getpid.html` to `getppid.html`.","locations":[{"ref":"src/unistd.rs:308-310","code":"  308 | /// Get the pid of this processes' parent (see\n  309 | /// [getpid(2)](https://pubs.opengroup.org/onlinepubs/9699919799/functions/getppid.html)).\n  310 | ///","lines":3}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The `mkdtemp` doc comment (line 2319) incorrectly says `See also mkstemp(2)` and links to the\n`mkdtemp` POSIX page, but the text says `mkstemp(2)` - that is the wrong function name in the\ncomment text.","fix":"Change `mkstemp(2)` in the `See also` line to `mkdtemp(2)`.","locations":[{"ref":"src/unistd.rs:2319-2319","code":" 2319 | /// See also [mkstemp(2)](http://pubs.opengroup.org/onlinepubs/9699919799/functions/mkdtemp.html)","lines":1}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `setresgid` at line 3270 links to `setresuid(2)` instead of `setresgid(2)`:\n`[see setresuid(2)](https://man7.org/linux/man-pages/man2/setresuid.2.html)`. This is clearly a\ncopy-paste error from the `setresuid` documentation directly above it.","fix":"Change the link text and URL to reference `setresgid(2)` instead of `setresuid(2)`.","locations":[{"ref":"src/unistd.rs:3270-3284","code":" 3270 |     /// ([see setresuid(2)](https://man7.org/linux/man-pages/man2/setresuid.2.html))\n 3271 |     ///\n 3272 |     /// * `rgid`: real group id\n 3273 |     /// * `egid`: effective group id\n 3274 |     /// * `sgid`: saved group id\n 3275 |     /// * returns: Ok or libc error code.\n 3276 |     ///\n 3277 |     /// Err is returned if the user doesn't have permission to set this GID.\n 3278 |     #[inline]\n 3279 |     pub fn setresgid(rgid: Gid, egid: Gid, sgid: Gid) -> Result<()> {\n 3280 |         let res =\n 3281 |             unsafe { libc::setresgid(rgid.into(), egid.into(), sgid.into()) };\n 3282 | \n 3283 |         Errno::result(res).map(drop)\n 3284 |     }","lines":15}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `Group::from_gid` at line 3932 says it internally calls `getgrgid_r(3)` but\nlinks to the `getpwuid_r` man page URL:\n`https://pubs.opengroup.org/onlinepubs/9699919799/functions/getpwuid_r.html`.\nSame copy-paste error appears in the `Group::from_name` doc comment at line 3957.","fix":"Update the links to point to the `getgrgid_r` and `getgrnam_r` man pages respectively.","locations":[{"ref":"src/unistd.rs:3929-3932","code":" 3929 |     /// Get a group by GID.\n 3930 |     ///\n 3931 |     /// Internally, this function calls\n 3932 |     /// [getgrgid_r(3)](https://pubs.opengroup.org/onlinepubs/9699919799/functions/getpwuid_r.html)","lines":4},{"ref":"src/unistd.rs:3954-3957","code":" 3954 |     /// Get a group by name.\n 3955 |     ///\n 3956 |     /// Internally, this function calls\n 3957 |     /// [getgrnam_r(3)](https://pubs.opengroup.org/onlinepubs/9699919799/functions/getpwuid_r.html)","lines":4}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The four match arms in openpty (both-Some, winsize-only, termios-only, neither-Some) repeat the libc::openpty call with ptr::null_mut() substituted for the missing arguments. The four-way combination expansion exists only to avoid a let binding for `inner_termios` in the None case. This could be collapsed to two variables (termios_ptr, winsize_ptr) computed before the call, eliminating roughly 25 lines of near-identical unsafe code.","fix":"Compute `let term_ptr: *mut libc::termios = ...` and `let win_ptr: *mut Winsize = ...` before the libc::openpty call, then make a single call.","locations":[{"ref":"src/pty.rs:269-314","code":"  269 |     let ret = {\n  270 |         match (termios.into(), winsize.into()) {\n  271 |             (Some(termios), Some(winsize)) => {\n  272 |                 let inner_termios = termios.get_libc_termios();\n  273 |                 unsafe {\n  274 |                     libc::openpty(\n  275 |                         master.as_mut_ptr(),\n  276 |                         slave.as_mut_ptr(),\n  277 |                         ptr::null_mut(),\n  278 |                         &*inner_termios as *const libc::termios as *mut _,\n  279 |                         winsize as *const Winsize as *mut _,\n  280 |                     )\n  281 |                 }\n  282 |             }\n  283 |             (None, Some(winsize)) => unsafe {\n  284 |                 libc::openpty(\n  285 |                     master.as_mut_ptr(),\n  286 |                     slave.as_mut_ptr(),\n  287 |                     ptr::null_mut(),\n  288 |                     ptr::null_mut(),\n  289 |                     winsize as *const Winsize as *mut _,\n  290 |                 )\n  291 |             },\n  292 |             (Some(termios), None) => {\n  293 |                 let inner_termios = termios.get_libc_termios();\n  294 |                 unsafe {\n  295 |                     libc::openpty(\n  296 |                         master.as_mut_ptr(),\n  297 |                         slave.as_mut_ptr(),\n  298 |                         ptr::null_mut(),\n  299 |                         &*inner_termios as *const libc::termios as *mut _,\n  300 |                         ptr::null_mut(),\n  301 |                     )\n  302 |                 }\n  303 |             }\n  304 |             (None, None) => unsafe {\n  305 |                 libc::openpty(\n  306 |                     master.as_mut_ptr(),\n  307 |                     slave.as_mut_ptr(),\n  308 |                     ptr::null_mut(),\n  309 |                     ptr::null_mut(),\n  310 |                     ptr::null_mut(),\n  311 |                 )\n  312 |             },\n  313 |         }\n  314 |     };","lines":46}]},{"id":"DUP_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The `read_events` method body in `fanotify.rs` and `inotify.rs` follows the same structure: read into a fixed 4096-byte buffer, loop while remaining bytes exceed header size, `ptr::copy_nonoverlapping` into a `MaybeUninit`, `assume_init`, then advance offset. The pattern is copy-pasted with minor type substitutions. Any fix applied to one (e.g. the `event_len` validation) must be manually applied to the other.","fix":"Extract a generic helper that reads kernel event structs from a buffer, or at minimum ensure both implementations apply the same bounds checks.","locations":[{"ref":"src/sys/fanotify.rs:357-383","code":"  357 |     pub fn read_events(&self) -> Result<Vec<FanotifyEvent>> {\n  358 |         let metadata_size = size_of::<libc::fanotify_event_metadata>();\n  359 |         const BUFSIZ: usize = 4096;\n  360 |         let mut buffer = [0u8; BUFSIZ];\n  361 |         let mut events = Vec::new();\n  362 |         let mut offset = 0;\n  363 | \n  364 |         let nread = read(&self.fd, &mut buffer)?;\n  365 | \n  366 |         while (nread - offset) >= metadata_size {\n  367 |             let metadata = unsafe {\n  368 |                 let mut metadata =\n  369 |                     MaybeUninit::<libc::fanotify_event_metadata>::uninit();\n  370 |                 ptr::copy_nonoverlapping(\n  371 |                     buffer.as_ptr().add(offset),\n  372 |                     metadata.as_mut_ptr().cast(),\n  373 |                     (BUFSIZ - offset).min(metadata_size),\n  374 |                 );\n  375 |                 metadata.assume_init()\n  376 |             };\n  377 | \n  378 |             events.push(FanotifyEvent(metadata));\n  379 |             offset += metadata.event_len as usize;\n  380 |         }\n  381 | \n  382 |         Ok(events)\n  383 |     }","lines":27},{"ref":"src/sys/inotify.rs:203-247","code":"  203 |     pub fn read_events(&self) -> Result<Vec<InotifyEvent>> {\n  204 |         let header_size = size_of::<libc::inotify_event>();\n  205 |         const BUFSIZ: usize = 4096;\n  206 |         let mut buffer = [0u8; BUFSIZ];\n  207 |         let mut events = Vec::new();\n  208 |         let mut offset = 0;\n  209 | \n  210 |         let nread = read(&self.fd, &mut buffer)?;\n  211 | \n  212 |         while (nread - offset) >= header_size {\n  213 |             let event = unsafe {\n  214 |                 let mut event = MaybeUninit::<libc::inotify_event>::uninit();\n  215 |                 ptr::copy_nonoverlapping(\n  216 |                     buffer.as_ptr().add(offset),\n  217 |                     event.as_mut_ptr().cast(),\n  218 |                     (BUFSIZ - offset).min(header_size),\n  219 |                 );\n  220 |                 event.assume_init()\n  221 |             };\n  222 | \n  223 |             let name = match event.len {\n  224 |                 0 => None,\n  225 |                 _ => {\n  226 |                     let ptr = unsafe {\n  227 |                         buffer.as_ptr().add(offset + header_size)\n  228 |                             as *const c_char\n  229 |                     };\n  230 |                     let cstr = unsafe { CStr::from_ptr(ptr) };\ rs_os() {\n   52 |                 env::remove_var(name);\n   53 |             }","lines":4}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","easy":false,"description":"ptsname_r uses a fixed 64-byte buffer with no retry. If the slave PTY device path is >= 64 bytes, libc::ptsname_r returns ERANGE and the function propagates the error without retrying with a larger buffer. On most Linux systems paths like /dev/pts/NNN are short, but long paths could appear in containers or unusual devtmpfs configurations. The function silently fails where a retry loop would succeed.","fix":"On ERANGE, double the buffer size and retry (similar to the loop in inner_readlink). Start with 64 bytes and keep doubling until ptsname_r returns 0 or a non-ERANGE error.","locations":[{"ref":"src/pty.rs:217-230","code":"  217 | pub fn ptsname_r(fd: &PtyMaster) -> Result<String> {\n  218 |     let mut name_buf = Vec::<libc::c_char>::with_capacity(64);\n  219 |     let name_buf_ptr = name_buf.as_mut_ptr();\n  220 |     let cname = unsafe {\n  221 |         let cap = name_buf.capacity();\n  222 |         if libc::ptsname_r(fd.as_raw_fd(), name_buf_ptr, cap) != 0 {\n  223 |             return Err(crate::Error::last());\n  224 |         }\n  225 |         CStr::from_ptr(name_buf.as_ptr())\n  226 |     };\n  227 | \n  228 |     let name = cname.to_string_lossy().into_owned();\n  229 |     Ok(name)\n  230 | }","lines":14}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"In syslog.rs, the syslog() function defensively uses '%s' as a format string to avoid format-string injection. This is correct. However, the formatter CStr and message CStr are constructed via with_nix_path which rejects strings containing interior NUL bytes with EINVAL. If a caller passes a message with an embedded NUL, the syslog call never happens and the caller receives EINVAL. This silent failure mode is not obvious from the function signature.","fix":"Document that messages containing NUL bytes will fail with EINVAL, or truncate the message at the first NUL byte.","locations":[{"ref":"src/syslog.rs:82-96","code":"   82 | pub fn syslog<P, S>(priority: P, message: &S) -> Result<()>\n   83 | where\n   84 |     P: Into<Priority>,\n   85 |     S: AsRef<OsStr> + ?Sized,\n   86 | {\n   87 |     let priority = priority.into();\n   88 |     let formatter = OsStr::new(\"%s\");\n   89 |     let message = OsStr::new(message);\n   90 |     formatter.with_nix_path(|formatter| {\n   91 |         message.with_nix_path(|message| unsafe {\n   92 |             libc::syslog(priority.0, formatter.as_ptr(), message.as_ptr())\n   93 |         })\n   94 |     })??;\n   95 |     Ok(())\n   96 | }","lines":15}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"low","easy":false,"description":"In ucontext.rs, UContext stores a libc::ucontext_t by value and derives Copy and Clone. The ucontext_t structure contains a uc_stack field (the alternate signal stack) which typically holds a pointer to the stack memory. Copying a UContext also copies this pointer, meaning two UContext values may reference the same stack memory. If the original's stack is freed, the copy's uc_stack becomes dangling. There are no lifetime constraints preventing this.","fix":"Remove Clone/Copy from UContext, or add clear documentation that the stack memory must outlive all copies.","locations":[{"ref":"src/ucontext.rs:9-12","code":"    9 | #[derive(Clone, Copy, Debug, Eq, Hash, PartialEq)]\n   10 | pub struct UContext {\n   11 |     context: libc::ucontext_t,\n   12 | }","lines":4}]}]</script>

(function(){

function loadHash() {

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
