.rs:1432-1453","code":" 1432 |                 #[allow(deprecated)] // https://github.com/rust-lang/libc/issues/1501\n 1433 |                 let af_alg_iv = libc::af_alg_iv {\n 1434 |                     ivlen: iv.len() as u32,\n 1435 |                     iv: [0u8; 0],\n 1436 |                 };\n 1437 | \n 1438 |                 let size = mem::size_of_val(&af_alg_iv);\n 1439 | \n 1440 |                 unsafe {\n 1441 |                     ptr::copy_nonoverlapping(\n 1442 |                         &af_alg_iv as *const _ as *const u8,\n 1443 |                         cmsg_data,\n 1444 |                         size,\n 1445 |                     );\n 1446 |                     ptr::copy_nonoverlapping(\n 1447 |                         iv.as_ptr(),\n 1448 |                         cmsg_data.add(size),\n 1449 |                         iv.len()\n 1450 |                     );\n 1451 |                 };\n 1452 | \n 1453 |                 return","lines":22}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Inconsistency between From<libc::termios> and update_wrapper for control_flags. From<libc::termios> (line 240) uses from_bits_truncate, silently discarding unknown bits. update_wrapper (line 224) uses from_bits_retain, preserving unknown bits. After tcgetattr followed by any cfset*/cfmakeraw call (which calls get_libc_termios_mut + update_wrapper), control_flags will include unknown bits that were not present after initial construction. This means a Termios value constructed via From and one obtained after a round-trip through the kernel may behave differently.","fix":"Use the same from_bits_* variant in both places. Prefer from_bits_retain in From<libc::termios> as well, since control_flags includes platform-specific bits like CBAUD/CBAUDEX that are not defined in the enum but are valid.","locations":[{"ref":"src/sys/termios.rs:224","code":"  224 |         self.control_flags = ControlFlags::from_bits_retain(termios.c_cflag);","lines":1},{"ref":"src/sys/termios.rs:240","code":"  240 |             control_flags: ControlFlags::from_bits_truncate(termios.c_cflag),","lines":1}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `timerfd.rs`, `TimerFd::wait` reads 8 bytes from the timerfd to consume the expiration count. On success it returns `Ok(())`, discarding the expiration count. If the timer has fired multiple times, the caller cannot know the count of missed expirations. The function silently ignores the returned 8-byte counter. This is a design limitation documented nowhere in the function's doc comment.","fix":"Update the doc comment to note that the number of expirations is discarded; alternatively return `Result<u64>` with the count.","locations":[{"ref":"src/sys/timerfd.rs:219-229","code":"  219 |     pub fn wait(&self) -> Result<()> {\n  220 |         while let Err(e) = read(&self.fd, &mut [0u8; 8]) {\n  221 |             if e == Errno::ECANCELED {\n  222 |                 break;\n  223 |             }\n  224 |             if e != Errno::EINTR {\n  225 |                 return Err(e);\n  226 |             }\n  227 |         }\n  228 | \n  229 |         Ok(())","lines":11}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In time.rs, clock_nanosleep() always returns remain=TimeSpec::new(0,0) on success when TIMER_ABSTIME is set, because with absolute timeouts the kernel does not fill in the remaining time on interruption (it returns EINTR directly). But for relative sleeps interrupted by a signal, the kernel fills 'remain' only when clock_nanosleep returns EINTR (a non-zero return value), not when it returns 0. The current code returns remain on Ok(0), which will always be all-zeros for relative sleeps that completed normally - this is correct. However, for interrupted relative sleeps, the function returns an error (since ret != 0), discarding the 'remain' value that would let callers retry with the correct remaining time.","fix":"Consider introducing a new error type that carries the remaining TimeSpec for EINTR, or document that callers must call clock_gettime to determine remaining time if they need to retry after interruption.","locations":[{"ref":"src/time.rs:287-306","code":"  287 | pub fn clock_nanosleep(\n  288 |     clock_id: ClockId,\n  289 |     flags: ClockNanosleepFlags,\n  290 |     request: &TimeSpec,\n  291 | ) -> Result<TimeSpec> {\n  292 |     let mut remain = TimeSpec::new(0, 0);\n  293 |     let ret = unsafe {\n  294 |         libc::clock_nanosleep(\n  295 |             clock_id.as_raw(),\n  296 |             flags.bits(),\n  297 |             request.as_ref() as *const _,\n  298 |             remain.as_mut() as *mut _,\n  299 |         )\n  300 |     };\n  301 |     if ret == 0 {\n  302 |         Ok(remain)\n  303 |     } else {\n  304 |         Err(Errno::from_raw(ret))\n  305 |     }\n  306 | }","lines":20}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`reserve_double_buffer_size` (line 915-926) computes the new capacity as\n`min(buf.capacity() * 2, limit)`. When `buf.capacity()` is 0, the expression `0 * 2 = 0` and\n`buf.reserve(0)` is a no-op, leaving the capacity unchanged. Any caller that starts with a\nzero-capacity Vec will loop forever (or until `reserve_double_buffer_size` returns `ERANGE` because\ncapacity >= limit, which it never will if limit > 0). In practice `User::from_anything` initializes\n`cbuf` with `Vec::with_capacity(bufsize)` where `bufsize` comes from sysconf, so this is\nnon-zero in normal operation. However, the `Ok(None)` path for `GETPW_R_SIZE_MAX` defaults to\n`16384` which is fine. The issue is a latent correctness bug when the function is ever called with\nan empty Vec.","fix":"Guard against zero capacity: `let capacity = min(buf.capacity().max(1) * 2, limit);`","locations":[{"ref":"src/unistd.rs:912-926","code":"  912 | // Double the buffer capacity up to limit. In case it already has\n  913 | // reached the limit, return Errno::ERANGE.\n  914 | #[cfg(any(feature = \"fs\", feature = \"user\"))]\n  915 | fn reserve_double_buffer_size<T>(buf: &mut Vec<T>, limit: usize) -> Result<()> {\n  916 |     use std::cmp::min;\n  917 | \n  918 |     if buf.capacity() >= limit {\n  919 |         return Err(Errno::ERANGE);\n  920 |     }\n  921 | \n  922 |     let capacity = min(buf.capacity() * 2, limit);\n  923 |     buf.reserve(capacity);\n  924 | \n  925 |     Ok(())\n  926 | }","lines":15}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`gethostname` at line 1341 allocates a buffer with capacity 256, then guards against a missing NUL\nterminator by force-writing a NUL at `buf.as_mut_ptr().wrapping_add(len - 1)` (line 1350), where\n`len = buffer.capacity() = 256`. This writes the NUL at index 255 - the last byte of the capacity.\nHowever, `buffer` was created with `Vec::with_capacity(256)` and has length 0; the memory past\nindex 0 is uninitialized. `CStr::from_ptr` is then called on `buffer.as_ptr()` which reads through\nthis uninitialized memory until it hits the forced NUL at index 255. If `gethostname` did not write\na NUL within its output (e.g. because the buffer was exactly filled), reading uninitialized memory\nbetween the end of the hostname and index 255 is undefined behavior. The forced NUL write is also\nusing `wrapping_add` on an uninitialized byte range which is only accessible via raw pointers - the\nsemantics are correct for pointer arithmetic but the read by `CStr::from_ptr` through uninitialized\nbytes is UB.","fix":"Initialize the buffer (e.g. `vec![0u8; 256]`) so that the memory is fully zeroed before passing it to `gethostname`, making the forced NUL write redundant but the `CStr::from_ptr` read safe.","locations":[{"ref":"src/unistd.rs:1341-1356","code":" 1341 | pub fn gethostname() -> Result<OsString> {\n 1342 |     // The capacity is the max length of a hostname plus the NUL terminator.\n 1343 |     let mut buffer: Vec<u8> = Vec::with_capacity(256);\n 1344 |     let ptr = buffer.as_mut_ptr().cast();\n 1345 |     let len = buffer.capacity() as size_t;\n 1346 | \n 1347 |     let res = unsafe { libc::gethostname(ptr, len) };\n 1348 |     Errno::result(res).map(|_| {\n 1349 |         unsafe {\n 1350 |             buffer.as_mut_ptr().wrapping_add(len - 1).write(0); // ensure always null-terminated\n 1351 |             let len = CStr::from_ptr(buffer.as_ptr().cast()).len();\n 1352 |             buffer.set_len(len);\n 1353 |         }\n 1354 |         OsString::from_vec(buffer)\n 1355 |     })\n 1356 | }","lines":16}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`getgroups` (line 1881) handles a ngroups return of 0 by returning an empty Vec early (line\n1897-1899), but it then calls `Errno::result(ngroups)?` on the first `getgroups(0, null)` call\nreturn value. The comment at line 1897 says this prevents a buffer over-read if the number of\ngroups increases from zero. However, if `ngroups == 0` actually meant success with zero groups (the\ncommon case on platforms where the calling process has no supplementary groups), this is fine. But\nthe preceding check at line 1891 calls `libc::getgroups(0, ptr::null_mut())` without checking for\nerror first - if this call returns -1 (error), the `if ngroups == 0` check at line 1897 does not\ntrigger, and `Errno::result(ngroups)?` correctly propagates the error. This flow is correct.\n\nThe real subtle bug is: `getgroups(0, NULL)` is documented to return the number of supplementary\ngroups. On platforms where the calling user has zero supplementary groups, it returns 0. On error\nit returns -1. The code correctly handles 0 as a success case. However, the capacity calculation\nat line 1905 is `Errno::result(ngroups)? as usize` which re-checks the same `ngroups` value from\nline 1891 - but only after passing the `ngroups == 0` check. So `ngroups` at line 1905 is the\npositive count from the *first* call. This is correct but the reuse of the same variable name is\nconfusing because the inner loop at line 1910 also calls `getgroups` and returns its result into\na variable also named `ngroups`.","fix":"No immediate code change needed for correctness, but rename the inner `ngroups` variable to reduce confusion and document the two-phase protocol.","locations":[{"ref":"src/unistd.rs:1881-1931","code":" 1881 | pub fn getgroups() -> Result<Vec<Gid>> {\n 1882 |     // First get the maximum number of groups. The value returned\n 1883 |     // shall always be greater than or equal to one and less than or\n 1884 |     // equal to the value of {NGROUPS_MAX} + 1.\n 1885 |     let ngroups_max = match sysconf(SysconfVar::NGROUPS_MAX) {\n 1886 |         Ok(Some(n)) => (n + 1) as usize,\n 1887 |         Ok(None) | Err(_) => usize::MAX,\n 1888 |     };\n 1889 | \n 1890 |     // Next, get the number of groups so we can size our Vec\n 1891 |     let ngroups = unsafe { libc::getgroups(0, ptr::null_mut()) };\n 1892 | \n 1893 |     // If there are no supplementary groups, return early.\n 1894 |     // This prevents a potential buffer over-read if the number of groups\n 1895 |     // increases from zero before the next call. It would return the total\n 1896 |     // number of groups beyond the capacity of the buffer.\n 1897 |     if ngroups == 0 {\n 1898 |         return Ok(Vec::new());\n 1899 |     }\n 1900 | \n 1901 |     // Now actually get the groups. We try multiple times in case the number of\n 1902 |     // groups has changed since the first call to getgroups() and the buffer is\n 1903 |     // now too small.\n 1904 |     let mut groups =\n 1905 |         Vec::<Gid>::with_capacity(Errno::result(ngroups)? as usize);\n 1906 |     loop {\n 1907 |         // FIXME: On the platforms we currently support, the `Gid` struct has\n 1908 |         // the same representation in memory as a bare `gid_t`. This is not\n 1909 |         // necessarily the case on all Rust platforms, though. See RFC 1785.\n 1910 |         let ngroups = unsafe {\n 1911 |             libc::getgroups(\n 1912 |                 groups.capacity() as c_int,\n 1913 |                 groups.as_mut_ptr().cast(),\n 1914 |             )\n 1915 |         };\n 1916 | \n 1917 |         match Errno::result(ngroups) {\n 1918 |             Ok(s) => {\n 1919 |                 unsafe { groups.set_len(s as usize) };\n 1920 |                 return Ok(groups);\n 1921 |             }\n 1922 |             Err(Errno::EINVAL) => {\n 1923 |                 // EINVAL indicates that the buffer size was too\n 1924 |                 // small, resize it up to ngroups_max as limit.\n 1925 |                 reserve_double_buffer_size(&mut groups, ngroups_max)\n 1926 |                     .or(Err(Errno::EINVAL))?;\n 1927 |             }\n 1928 |             Err(e) => return Err(e),\n 1929 |         }\n 1930 |     }\n 1931 | }","lines":51}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`getgrouplist` (lines 2020-2058) calls `reserve_double_buffer_size` when `ret == -1`. It passes\n`ngroups_max as usize` as the limit. However, `ngroups_max` was obtained as `n as c_int` from\n`sysconf(SysconfVar::NGROUPS_MAX)` (line 2022). If the sysconf call fails or returns `None`, the\nfallback is `c_int::MAX` (line 2023). Casting `c_int::MAX` to `usize` is fine on 32-bit (gives\n2147483647) and on 64-bit (same). But the `reserve_double_buffer_size` limit path with `usize::MAX`\nwould be reached only when `sysconf` returns `None`. In that scenario, `groups.capacity() >= limit`\nat line 919 can never be true, and the loop will keep doubling until the allocator OOMs. This is\nan unbounded memory growth path.","fix":"When sysconf returns None for NGROUPS_MAX, use a reasonable constant (e.g. 65536) as the upper bound rather than c_int::MAX.","locations":[{"ref":"src/unistd.rs:2020-2058","code":" 2020 | pub fn getgrouplist(user: &CStr, group: Gid) -> Result<Vec<Gid>> {\n 2021 |     let ngroups_max = match sysconf(SysconfVar::NGROUPS_MAX) {\n 2022 |         Ok(Some(n)) => n as c_int,\n 2023 |         Ok(None) | Err(_) => c_int::MAX,\n 2024 |     };\n 2025 |     use std::cmp::min;\n 2026 |     let mut groups = Vec::<Gid>::with_capacity(min(ngroups_max, 8) as usize);\n 2027 |     cfg_if! {\n 2028 |         if #[cfg(apple_targets)] {\n 2029 |             type getgrouplist_group_t = c_int;\n 2030 |         } else {\n 2031 |             type getgrouplist_group_t = gid_t;\n 2032 |         }\n 2033 |     }\n 2034 |     let gid: gid_t = group.into();\n 2035 |     loop {\n 2036 |         let mut ngroups = groups.capacity() as i32;\n 2037 |         let ret = unsafe {\n 2038 |             libc::getgrouplist(\n 2039 |                 user.as_ptr(),\n 2040 |                 gid as getgrouplist_group_t,\n 2041 |                 groups.as_mut_ptr().cast(),\n 2042 |                 &mut ngroups,\n 2043 |             )\n 2044 |         };\n 2045 | \n 2046 |         // BSD systems only return 0 or -1, Linux returns ngroups on success.\n 2047 |         if ret >= 0 {\n 2048 |             unsafe { groups.set_len(ngroups as usize) };\n 2049 |             return Ok(groups);\n 2050 |         } else if ret == -1 {\n 2051 |             // Returns -1 if ngroups is too small, but does not set errno.\n 2052 |             // BSD systems will still fill the groups buffer with as many\n 2053 |             // groups as possible, but Linux manpages do not mention this\n 2054 |             // behavior.\n 2055 |             reserve_double_buffer_size(&mut groups, ngroups_max as usize)\n 2056 |                 .map_err(|_| Errno::EINVAL)?;\n 2057 |         }\n 2058 |     }","lines":39}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`User::from_anything` checks for ERANGE by reading `Errno::last()` (line 3760):\n`} else if Errno::last() == Errno::ERANGE {`. The POSIX spec for `getpwuid_r` says the function\nreturns the error code directly as its return value (not via errno). The code at line 3745 stores\nthis return value in `error` and checks `if error == 0` (success) at line 3751. But for the ERANGE\ncase it checks `Errno::last()` instead of comparing `error == libc::ERANGE`. Reading from errno\nafter a non-zero return is unreliable - errno may have been set by some other call or may retain\na stale value. The `getgwuid_r` man page (POSIX 2008) states the return value IS the error number,\nso `error == libc::ERANGE` is the correct check. The same bug exists in `Group::from_anything` at\nline 3920.","fix":"Replace `Errno::last() == Errno::ERANGE` with `error == libc::ERANGE` (and similarly `return Err(Errno::last())` with `return Err(Errno::from_raw(error))`). This matches the POSIX contract that these functions return the error code directly.","locations":[{"ref":"src/unistd.rs:3751-3766","code":" 3751 |             if error == 0 {\n 3752 |                 if res.is_null() {\n 3753 |                     return Ok(None);\n 3754 |                 } else {\n 3755 |                     // SAFETY: `f` guarantees that `pwd` is initialized if `res`\n 3756 |                     // is not null.\n 3757 |                     let pwd = unsafe { pwd.assume_init() };\n 3758 |                     return Ok(Some(User::from(&pwd)));\n 3759 |                 }\n 3760 |             } else if Errno::last() == Errno::ERANGE {\n 3761 |                 // Trigger the internal buffer resizing logic.\n 3762 |                 reserve_double_buffer_size(&mut cbuf, buflimit)?;\n 3763 |             } else {\n 3764 |                 return Err(Errno::last());\n 3765 |             }\n 3766 |         }","lines":16},{"ref":"src/unistd.rs:3911-3926","code":" 3911 |             if error == 0 {\n 3912 |                 if res.is_null() {\n 3913 |                     return Ok(None);\n 3914 |                 } else {\n 3915 |                     // SAFETY: `f` guarantees that `grp` is initialized if `res`\n 3916 |                     // is not null.\n 3917 |                     let grp = unsafe { grp.assume_init() };\n 3918 |                     return Ok(Some(Group::from(&grp)));\n 3919 |                 }\n 3920 |             } else if Errno::last() == Errno::ERANGE {\n 3921 |                 // Trigger the internal buffer resizing logic.\n 3922 |                 reserve_double_buffer_size(&mut cbuf, buflimit)?;\n 3923 |             } else {\n 3924 |                 return Err(Errno::last());\n 3925 |             }\n 3926 |         }","lines":16}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In features.rs, kernel_version() caches the result in a static AtomicUsize using Relaxed ordering and a sentinel value of 0 (meaning 'not yet initialized'). The valid kernel version constants start at 1 (VERS_UNKNOWN = 1). However, there is a race window between loading 0 and storing the parsed version where multiple threads may all call parse_kernel_version() simultaneously. This is harmless since the result is idempotent, but the function may perform redundant uname syscalls without any protection. Using Relaxed on both load and store is also insufficient to ensure other threads see the stored value in a timely manner (though it is not incorrect given the idempotent nature).","fix":"Use a OnceLock or use compare_exchange to ensure parse_kernel_version is called at most once. Alternatively document that the race is intentional and harmless.","locations":[{"ref":"src/features.rs:75-85","code":"   75 |     fn kernel_version() -> Result<usize> {\n   76 |         static KERNEL_VERS: AtomicUsize = AtomicUsize::new(0);\n   77 |         let mut kernel_vers = KERNEL_VERS.load(Ordering::Relaxed);\n   78 | \n   79 |         if kernel_vers == 0 {\n   80 |             kernel_vers = parse_kernel_version()?;\n   81 |             KERNEL_VERS.store(kernel_vers, Ordering::Relaxed);\n   82 |         }\n   83 | \n   84 |         Ok(kernel_vers)\n   85 |     }","lines":11}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In mq_set_nonblock, the newattr passed to mq_setattr includes mq_curmsgs copied from oldattr. The mq_setattr(2) man page states that only mq_flags is honoured; mq_maxmsg, mq_msgsize, and mq_curmsgs are ignored. Copying mq_curmsgs from a snapshot of the queue is harmless today but is semantically wrong: mq_curmsgs is a read-only kernel field representing the live message count, not something the caller controls. Sending a stale mq_curmsgs value as if it were an input is misleading and may break on future kernel versions that start validating the field.","fix":"Zero-initialise the newattr or explicitly set mq_curmsgs to 0, since only mq_flags matters to mq_setattr: `MqAttr::new(mq_attr_member_t::from(MQ_OFlag::O_NONBLOCK.bits()), 0, 0, 0)`.","locations":[{"ref":"src/mqueue.rs:290-298","code":"  290 | pub fn mq_set_nonblock(mqd: &MqdT) -> Result<MqAttr> {\n  291 |     let oldattr = mq_getattr(mqd)?;\n  292 |     let newattr = MqAttr::new(\n  293 |         mq_attr_member_t::from(MQ_OFlag::O_NONBLOCK.bits()),\n  294 |         oldattr.mq_attr.mq_maxmsg,\n  295 |         oldattr.mq_attr.mq_msgsize,\n  296 |         oldattr.mq_attr.mq_curmsgs,\n  297 |     );\n  298 |     mq_setattr(mqd, &newattr)","lines":9}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In sched.rs, the clone() function computes the stack top as stack.as_mut_ptr().add(stack.len()), then subtracts (ptr as usize % 16) to align it to 16 bytes. If the stack slice is empty (len == 0), add(0) is fine, but the subsequent sub might underflow the pointer if the pointer's address is not already 16-byte aligned. Additionally, the alignment computation using the raw pointer address as a usize assumes the virtual address space is flat and may be architecturally incorrect on unusual platforms.","fix":"Check that stack.len() is sufficient before computing the top, and use a proper alignment function such as pointer::align_offset rather than usize arithmetic.","locations":[{"ref":"src/sched.rs:120-121","code":"  120 |             let ptr = stack.as_mut_ptr().add(stack.len());\n  121 |             let ptr_aligned = ptr.sub(ptr as usize % 16);","lines":2}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `fanotify.rs`, `read_events` copies `(BUFSIZ - offset).min(metadata_size)` bytes into the `metadata` MaybeUninit. When `BUFSIZ - offset < metadata_size` (i.e. the event spans the buffer boundary) this copies fewer than `metadata_size` bytes, leaving part of the struct uninitialized, and then calls `metadata.assume_init()`. In practice the while-condition `(nread - offset) >= metadata_size` prevents this since `nread <= BUFSIZ`, but the `.min(metadata_size)` expression is misleading - it implies the caller thinks a partial copy is safe, which it is not.","fix":"Remove the `.min(metadata_size)` clamp and rely solely on the while-condition to guarantee there are always `metadata_size` bytes available; add a debug_assert that `BUFSIZ - offset >= metadata_size` to make the invariant explicit.","locations":[{"ref":"src/sys/fanotify.rs:370-376","code":"  370 |                 ptr::copy_nonoverlapping(\n  371 |                     buffer.as_ptr().add(offset),\n  372 |                     metadata.as_mut_ptr().cast(),\n  373 |                     (BUFSIZ - offset).min(metadata_size),\n  374 |                 );\n  375 |                 metadata.assume_init()\n  376 |             };","lines":7}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The `select` and `pselect` functions automatically compute `nfds` when `None` is passed by finding the highest fd and adding 1. This calls `FdSet::highest()` which in turn calls `fds(None)` which iterates all `FD_SETSIZE` positions. But `highest()` is called on mutable references obtained via `iter_mut()` on Options - using `iter_mut()` on `&mut Option<&mut FdSet>` is sound but reads the same set twice (once to compute nfds, and again in the kernel call). The computed nfds may be wrong if `None` is passed with all three `FdSet` arguments being `None`: `max().unwrap_or(-1) + 1` evaluates to 0, which is valid for select() but means no fds are monitored. This is arguably documented behavior but easy to misuse silently.","fix":"This is a documentation issue - add a note that passing `None` for all three FdSets and `None` for nfds results in a plain sleep.","locations":[{"ref":"src/sys/select.rs:209-222","code":"  209 |     let nfds = nfds.into().unwrap_or_else(|| {\n  210 |         readfds\n  211 |             .iter_mut()\n  212 |             .chain(writefds.iter_mut())\n  213 |             .chain(errorfds.iter_mut())\n  214 |             .map(|set| {\n  215 |                 set.highest()\n  216 |                     .map(|borrowed_fd| borrowed_fd.as_raw_fd())\n  217 |                     .unwrap_or(-1)\n  218 |             })\n  219 |             .max()\n  220 |             .unwrap_or(-1)\n  221 |             + 1\n  222 |     });","lines":14}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`SigSet::PartialEq` and `SigSet::Hash` both iterate over `Signal::iterator()`\nwhich only covers the signals listed in the compile-time `SIGNALS` constant.\nThis means two `SigSet`s whose difference lies entirely in real-time signals\n(SIGRTMIN..SIGRTMAX) or in any platform signal not listed in `SIGNALS` will\ncompare as equal even if they are not, and will hash identically even if they\ndiffer.  This violates the contract that `a == b` implies `hash(a) == hash(b)`\nonly partially (the converse direction is violated).","fix":"Consider hashing and comparing the raw `libc::sigset_t` bytes directly (as a\nbyte array), which would cover all signals including real-time ones.","locations":[{"ref":"src/sys/signal.rs:702-721","code":"  702 | impl PartialEq for SigSet {\n  703 |     fn eq(&self, other: &Self) -> bool {\n  704 |         for signal in Signal::iterator() {\n  705 |             if self.contains(signal) != other.contains(signal) {\n  706 |                 return false;\n  707 |             }\n  708 |         }\n  709 |         true\n  710 |     }\n  711 | }\n  712 | \n  713 | impl Hash for SigSet {\n  714 |     fn hash<H: Hasher>(&self, state: &mut H) {\n  715 |         for signal in Signal::iterator() {\n  716 |             if self.contains(signal) {\n  717 |                 signal.hash(state);\n  718 |             }\n  719 |         }\n  720 |     }\n  721 | }","lines":20}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`do_pthread_sigmask` returns `Ok(())` immediately when both `set` and `oldset`\nare `None`.  This silently ignores the `how` argument; a caller providing a\nnon-default `how` value with both `None` arguments will see a successful no-op\nrather than an argument error.  The same early-return pattern exists in\n`sigprocmask`.  While this matches the man page behaviour (pthread_sigmask with\nNULL both set and oldset is documented as a no-op), bypassing the kernel call\nmeans errno is never consulted and the `how` value is never validated.","fix":"Document that `how` is ignored when both `set` and `oldset` are `None`, and note this is intentional per POSIX.","locations":[{"ref":"src/sys/signal.rs:1014-1016","code":" 1014 |     if set.is_none() && oldset.is_none() {\n 1015 |         return Ok(())\n 1016 |     }","lines":3},{"ref":"src/sys/signal.rs:1057-1059","code":" 1057 |     if set.is_none() && oldset.is_none() {\n 1058 |         return Ok(())\n 1059 |     }","lines":3}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`SockaddrStorage::len()` on Linux/Android/Fuchsia/Solaris/Cygwin (lines 1232-1240 in addr.rs)\nfalls back to `mem::size_of_val(self)` for non-Unix addresses.  `SockaddrStorage` is a union\nwhose size equals `sizeof(sockaddr_storage)` (128 bytes), which is always returned for e.g. IPv4\nor IPv6 addresses.  Callers that inspect `.len()` for a just-received `SockaddrStorage` of family\n`AF_INET` will get 128 instead of the expected 16.  The `accessors!` macro works around this by\nchecking `>= sizeof(libc_ty)`, but the advertised `len()` value is semantically wrong.","fix":"Dispatch on `ss_family` in the `len()` implementation (mirroring what `as_unix_addr` does) to\nreturn the correct type-specific length for fixed-size families like AF_INET and AF_INET6.","locations":[{"ref":"src/sys/socket/addr.rs:1232-1240","code":" 1232 |     #[cfg(any(linux_android, target_os = \"fuchsia\", solarish, target_os = \"cygwin\"))]\n 1233 |     fn len(&self) -> libc::socklen_t {\n 1234 |         match self.as_unix_addr() {\n 1235 |             // The UnixAddr type knows its own length\n 1236 |             Some(ua) => ua.len(),\n 1237 |             // For all else, we're just a boring SockaddrStorage\n 1238 |             None => mem::size_of_val(self) as libc::socklen_t,\n 1239 |         }\n 1240 |     }","lines":9}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`read_mhdr` in mod.rs (line 2095) always wraps the result bytes `r: isize` into `r as usize`\nwithout checking for a negative value.  Although `Errno::result` just above ensures `r >= 0`, the\n`read_mhdr` function itself takes an `isize` and performs an unchecked cast.  If the function is\never called directly with a negative value (e.g. future refactoring), the byte count will silently\nwrap to a very large `usize`.","fix":"Assert or use `r.try_into().unwrap_or(0)` at the call sites, or add a `debug_assert!(r >= 0)` inside `read_mhdr`.","locations":[{"ref":"src/sys/socket/mod.rs:2065-2095","code":" 2065 | unsafe fn read_mhdr<'a, 'i, S>(\n 2066 |     mhdr: msghdr,\n 2067 |     r: isize,\n 2068 |     msg_controllen: usize,\n 2069 |     mut address: S,\n 2070 | ) -> RecvMsg<'a, 'i, S>\n 2071 |     where S: SockaddrLike\n 2072 | {\n 2073 |     // The cast is not unnecessary on all platforms.\n 2074 |     #[allow(clippy::unnecessary_cast)]\n 2075 |     let cmsghdr = {\n 2076 |         let ptr = if mhdr.msg_controllen > 0 {\n 2077 |             debug_assert!(!mhdr.msg_control.is_null());\n 2078 |             debug_assert!(msg_controllen >= mhdr.msg_controllen as usize);\n 2079 |             unsafe { CMSG_FIRSTHDR(&mhdr as *const msghdr) }\n 2080 |         } else {\n 2081 |             ptr::null()\n 2082 |         };\n 2083 | \n 2084 |         unsafe {\n 2085 |             ptr.as_ref()\n 2086 |         }\n 2087 |     };\n 2088 | \n 2089 |     // Ignore errors if this socket address has statically-known length\n 2090 |     //\n 2091 |     // This is to ensure that unix socket addresses have their length set appropriately.\n 2092 |     let _ = unsafe { address.set_length(mhdr.msg_namelen as usize) };\n 2093 | \n 2094 |     RecvMsg {\n 2095 |         bytes: r as usize,","lines":31}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In termios.rs, the doc comment for cfsetispeed on the BSD branch (line 743) says 'sets the intput baud rate' (typo: 'intput' instead of 'input'). The same typo appears in the non-BSD branch at line 797.","fix":"Fix 'intput' to 'input' in both doc comments.","locations":[{"ref":"src/sys/termios.rs:743","code":"  743 |         /// `cfsetispeed()` sets the intput baud rate in the given `Termios` structure.","lines":1},{"ref":"src/sys/termios.rs:797","code":"  797 |         /// `cfsetispeed()` sets the intput baud rate in the given `Termios` structure.","lines":1}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `timer.rs` `TimerSpec::from(Expiration)` for the `Interval` case sets both `it_value` and `it_interval` to the same `TimeSpec`. The conversion back `Expiration::from(TimerSpec)` checks if `int_ts == val_ts` (by comparing sec and nsec fields) to decide `Interval` vs `IntervalDelayed`. If a caller creates an `IntervalDelayed(t, t)` (same delay and interval), the round-trip converts it to `Interval(t)`, losing the distinction. While functionally equivalent, it is a silent semantic change that could confuse callers who inspect the returned `Expiration`.","fix":"Document that `IntervalDelayed(t, t)` round-trips as `Interval(t)`, or add a separate encoding.","locations":[{"ref":"src/sys/time.rs:112-141","code":"  112 |     impl From<TimerSpec> for Expiration {\n  113 |         fn from(timerspec: TimerSpec) -> Expiration {\n  114 |             match timerspec {\n  115 |                 TimerSpec(libc::itimerspec {\n  116 |                     it_interval:\n  117 |                         libc::timespec {\n  118 |                             tv_sec: 0,\n  119 |                             tv_nsec: 0,\n  120 |                             ..\n  121 |                         },\n  122 |                     it_value: ts,\n  123 |                 }) => Expiration::OneShot(ts.into()),\n  124 |                 TimerSpec(libc::itimerspec {\n  125 |                     it_interval: int_ts,\n  126 |                     it_value: val_ts,\n  127 |                 }) => {\n  128 |                     if (int_ts.tv_sec == val_ts.tv_sec)\n  129 |                         && (int_ts.tv_nsec == val_ts.tv_nsec)\n  130 |                     {\n  131 |                         Expiration::Interval(int_ts.into())\n  132 |                     } else {\n  133 |                         Expiration::IntervalDelayed(\n  134 |                             val_ts.into(),\n  135 |                             int_ts.into(),\n  136 |                         )\n  137 |                     }\n  138 |                 }\n  139 |             }\n  140 |         }\n  141 |     }","lines":30}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `timer.rs`, `Timer::drop` ignores all errors from `timer_delete` except `EINVAL`. Other error codes (e.g. `EFAULT`) would be silently swallowed. This is consistent with most Drop impls, but EINVAL is specifically re-panicked which means a double-timer-delete (via e.g. a buggy `from_raw`) will panic instead of silently leaking, which is arguably correct. However it should be documented.","fix":"Low-priority; add a comment explaining why only EINVAL causes a panic.","locations":[{"ref":"src/sys/timer.rs:178-186","code":"  178 | impl Drop for Timer {\n  179 |     fn drop(&mut self) {\n  180 |         if !std::thread::panicking() {\n  181 |             let result = Errno::result(unsafe { libc::timer_delete(self.0) });\n  182 |             if let Err(Errno::EINVAL) = result {\n  183 |                 panic!(\"close of Timer encountered EINVAL\");\n  184 |             }\n  185 |         }\n  186 |     }","lines":9}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In syslog.rs, the openlog() non-Linux variant calls ident.map(OsStr::new) but the function parameter is already Option<&S> where S: AsRef<OsStr>. The map converts it to Option<&OsStr>, but then calls ident.with_nix_path(...) which goes through the [u8] NixPath impl. If the OsStr contains an interior NUL byte, with_nix_path returns Err(EINVAL), propagated correctly. However, the Linux variant accepts &'static CStr and uses CStr::with_nix_path which is infallible - the two variants have subtly different error behavior for invalid identifiers.","fix":"This is a minor API inconsistency. Document the difference clearly, or unify the error-path behavior.","locations":[{"ref":"src/syslog.rs:20-63","code":"   20 | #[cfg(target_os = \"linux\")]\n   21 | pub fn openlog(\n   22 |     ident: Option<&'static std::ffi::CStr>,\n   23 |     logopt: LogFlags,\n   24 |     facility: Facility,\n   25 | ) -> Result<()> {\n   26 |     let logopt = logopt.bits();\n   27 |     let facility = facility as libc::c_int;\n   28 |     match ident {\n   29 |         None => unsafe {\n   30 |             libc::openlog(ptr::null(), logopt, facility);\n   31 |         },\n   32 |         Some(ident) => ident.with_nix_path(|ident| unsafe {\n   33 |             libc::openlog(ident.as_ptr(), logopt, facility);\n   34 |         })?,\n   35 |     }\n   36 | \n   37 |     Ok(())\n   38 | }\n   39 | \n   40 | /// Logging options of subsequent [`syslog`] calls can be set by calling [`openlog`].\n   41 | ///\n   42 | /// The parameter `ident` is a string that will be prepended to every message. The `logopt`\n   43 | /// argument specifies logging options. The `facility` parameter encodes a default facility to be\n   44 | /// assigned to all messages that do not have an explicit facility encoded.\n   45 | #[cfg(not(target_os = \"linux\"))]\n   46 | pub fn openlog<S: AsRef<OsStr> + ?Sized>(\n   47 |     ident: Option<&S>,\n   48 |     logopt: LogFlags,\n   49 |     facility: Facility,\n   50 | ) -> Result<()> {\n   51 |     let logopt = logopt.bits();\n   52 |     let facility = facility as libc::c_int;\n   53 |     match ident.map(OsStr::new) {\n   54 |         None => unsafe {\n   55 |             libc::openlog(ptr::null(), logopt, facility);\n   56 |         },\n   57 |         Some(ident) => ident.with_nix_path(|ident| unsafe {\n   58 |             libc::openlog(ident.as_ptr(), logopt, facility);\n   59 |         })?,\n   60 |     }\n   61 | \n   62 |     Ok(())\n   63 | }","lines":44}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In syslog.rs, setlogmask() with mask=None passes 0 to libc::setlogmask(). On Linux, setlogmask(0) returns the current mask without modifying it, which matches the documented intent. However, this relies on undocumented behavior: the POSIX spec does not guarantee that 0 means 'no change' - it could mean 'suppress all log messages'. The code comment documents the intent but the actual mask value 0 is fragile.","fix":"Use a separate query mechanism if available, or document clearly that this relies on Linux/glibc-specific behavior where setlogmask(0) acts as a query.","locations":[{"ref":"src/syslog.rs:107-112","code":"  107 |     let mask = match mask {\n  108 |         Some(mask) => mask.0,\n  109 |         None => 0,\n  110 |     };\n  111 |     let prev_mask = unsafe { libc::setlogmask(mask) };\n  112 |     LogMask(prev_mask)","lines":6}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":true,"description":"In mq_open, when attr is None the call is `libc::mq_open(cstr.as_ptr(), oflag.bits())` with only 2 arguments. However, when O_CREAT is in oflag, POSIX mq_open() is a variadic function that requires a third argument (mode_t) and optionally a fourth (struct mq_attr *). Passing O_CREAT without the mode argument causes the kernel to read an arbitrary stack value as the mode, resulting in unpredictable permissions on the created queue. The nix wrapper already accepts a mode parameter from the caller but silently drops it when attr is None.","fix":"Always pass the mode argument. When attr is None, use `libc::mq_open(cstr.as_ptr(), oflag.bits(), mode.bits() as libc::mode_t, std::ptr::null::<libc::mq_attr>())` instead of the 2-argument form.","locations":[{"ref":"src/mqueue.rs:159-169","code":"  159 |     let res = name.with_nix_path(|cstr| match attr {\n  160 |         Some(mq_attr) => unsafe {\n  161 |             libc::mq_open(\n  162 |                 cstr.as_ptr(),\n  163 |                 oflag.bits(),\n  164 |                 mode.bits() as libc::c_int,\n  165 |                 &mq_attr.mq_attr as *const libc::mq_attr,\n  166 |             )\n  167 |         },\n  168 |         None => unsafe { libc::mq_open(cstr.as_ptr(), oflag.bits()) },\n  169 |     })?;","lines":11}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":true,"description":"`lio_listio` constructs a temporary `SigEvent` on the stack, then immediately\ntakes a raw pointer to the result of calling `.sigevent()` (which returns a\n*copy* by value) and passes that dangling pointer to `libc::lio_listio`:\n\n    let sigev = SigEvent::new(sigev_notify);\n    let sigevp = &mut sigev.sigevent() as *mut libc::sigevent;\n    Errno::result(unsafe { libc::lio_listio(..., sigevp) })\n\n`.sigevent()` creates a temporary `libc::sigevent` that is dropped at the end\nof that statement.  `sigevp` therefore points to freed stack space by the time\n`lio_listio` is called.  This is unsound on all platforms even though the kernel\ntypically only reads the struct during the syscall (so the race window is tiny).","fix":"Bind the sigevent to a local variable first: `let mut sev = sigev.sigevent(); let sigevp = &mut sev as *mut libc::sigevent;`","locations":[{"ref":"src/sys/aio.rs:1226-1229","code":" 1226 |     let sigev = SigEvent::new(sigev_notify);\n 1227 |     let sigevp = &mut sigev.sigevent() as *mut libc::sigevent;\n 1228 |     Errno::result(unsafe {\n 1229 |         libc::lio_listio(mode as i32, p, list.len() as i32, sigevp)","lines":4}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"ptrace_get_data passes std::mem::size_of::<T>() as the addr (third) argument to libc::ptrace. For PTRACE_GETREGS this field is documented as ignored, but for PTRACE_GETSIGINFO and PTRACE_GETEVENTMSG the kernel also ignores addr - however passing a size value as a pointer is semantically incorrect and fragile. If this helper is ever used for a request that does interpret addr (e.g. PTRACE_PEEKDATA), it would silently pass the type size as an address, reading from a garbage location in the tracee. The correct value for ignored addr arguments is ptr::null_mut().","fix":"Pass ptr::null_mut::<c_void>() as the addr argument instead of mem::size_of::<T>(). The size argument was likely a copy-paste artifact from a different ptrace call convention.","locations":[{"ref":"src/sys/ptrace/linux.rs:501-513","code":"  501 | fn ptrace_get_data<T>(request: Request, pid: Pid) -> Result<T> {\n  502 |     let mut data = mem::MaybeUninit::<T>::uninit();\n  503 |     let res = unsafe {\n  504 |         libc::ptrace(\n  505 |             request as RequestType,\n  506 |             libc::pid_t::from(pid),\n  507 |             std::mem::size_of::<T>(),\n  508 |             data.as_mut_ptr(),\n  509 |         )\n  510 |     };\n  511 |     Errno::result(res)?;\n  512 |     Ok(unsafe { data.assume_init() })\n  513 | }","lines":13}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"`dup2_raw` calls `newfd.into_raw_fd()` to consume the fd value, then immediately wraps the return\nvalue of `libc::dup2` in an `OwnedFd` - but if `libc::dup2` fails (returns -1), the function\nconstructs an `OwnedFd` from -1 and returns it inside `Ok(...)`. The early-return error check\n(`Errno::result(res)?`) is absent; the only guard is the `Ok(unsafe { OwnedFd::from_raw_fd(...) })`\nwrapped around the raw return value. Looking at the code at line 641-648: `libc::dup2` is called,\nits result is stored in `duplicated_fd`, then `Ok(unsafe { OwnedFd::from_raw_fd(duplicated_fd) })`\nis returned unconditionally. There is no `Errno::result(duplicated_fd)?` before constructing the\n`OwnedFd`. This means a failed `dup2` silently returns an invalid `OwnedFd(-1)` to the caller\ninstead of propagating the error.","fix":"Add `Errno::result(duplicated_fd)?;` before `Ok(unsafe { OwnedFd::from_raw_fd(duplicated_fd) })`, mirroring the pattern used in `dup3_raw` at lines 721-728.","locations":[{"ref":"src/unistd.rs:635-649","code":"  635 | pub unsafe fn dup2_raw<Fd1: std::os::fd::AsFd, Fd2: std::os::fd::IntoRawFd>(oldfd: Fd1, newfd: Fd2) -> Result<std::os::fd::OwnedFd> {\n  636 |     use std::os::fd::AsRawFd;\n  637 |     use std::os::fd::FromRawFd;\n  638 |     use std::os::fd::OwnedFd;\n  639 | \n  640 |     let duplicated_fd = unsafe {\n  641 |         libc::dup2(oldfd.as_fd().as_raw_fd(), newfd.into_raw_fd())\n  642 |     };\n  643 |     // SAFETY:\n  644 |     //\n  645 |     // This is unsafe if `newfd` is not a file descriptor that can be consumed\n  646 |     Ok(unsafe {\n  647 |         OwnedFd::from_raw_fd(duplicated_fd)\n  648 |     })\n  649 | }","lines":15}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"`execveat` (Linux-only) is implemented via `libc::syscall(libc::SYS_execveat, ...)` but passes\n`flags` as an `AtFlags` bitflags struct value rather than as `flags.bits()` (a raw integer). The\n`libc::syscall` variadic interface expects C-compatible integer arguments. Passing a Rust struct\ndirectly is undefined behavior - the struct layout may differ from the raw `c_int` the kernel\nexpects. All other `AtFlags` uses in this file (e.g. `linkat`, `faccessat`, `fchownat`) correctly\ncall `.bits()`.","fix":"Change `flags` to `flags.bits()` in the `libc::syscall` argument list.","locations":[{"ref":"src/unistd.rs:1243-1252","code":" 1243 |     unsafe {\n 1244 |         libc::syscall(\n 1245 |             libc::SYS_execveat,\n 1246 |             dirfd.as_fd().as_raw_fd(),\n 1247 |             pathname.as_ptr(),\n 1248 |             args_p.as_ptr(),\n 1249 |             env_p.as_ptr(),\n 1250 |             flags,\n 1251 |         );\n 1252 |     };","lines":10}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In dir.rs, from_fd() calls fd.into_raw_fd() to extract the raw fd before passing it to fdopendir(). If fdopendir() fails (returns NULL), Errno::last() is read correctly, but the raw fd is now consumed and will NOT be closed because the OwnedFd was already consumed by into_raw_fd(). This results in a file descriptor leak on fdopendir failure.","fix":"On fdopendir failure, explicitly close the raw_fd before returning the error, e.g. with libc::close(raw_fd) or by reconstructing the OwnedFd.","locations":[{"ref":"src/dir.rs:107-113","code":"  107 |     pub fn from_fd(fd: std::os::fd::OwnedFd) -> Result<Self> {\n  108 |         // take the ownership as the constructed `Dir` is now the owner\n  109 |         let raw_fd = fd.into_raw_fd();\n  110 |         let d = ptr::NonNull::new(unsafe { libc::fdopendir(raw_fd) })\n  111 |             .ok_or(Errno::last())?;\n  112 |         Ok(Dir(d))\n  113 |     }","lines":7}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In mount/linux.rs, the mount() function passes the 'data' optional path pointer as *const libc::c_void directly to libc::mount. When data is None, with_opt_nix_path passes a null pointer. This is correct for most flags. However, with MS_BIND | MS_REMOUNT, the data argument is documented to be ignored but must still be NULL - this is fine. The issue is that there is no type distinction between data as a NUL-terminated string vs. data as an arbitrary binary blob, so callers using binary mount data (e.g., CIFS credentials structure) are forced into the string-conversion path which will fail or corrupt the data if it contains interior NUL bytes.","fix":"This is a pre-existing API limitation. Consider providing an alternative mount_with_data function that accepts *const c_void directly for binary mount data, alongside the existing NixPath-based API.","locations":[{"ref":"src/mount/linux.rs:104-133","code":"  104 | pub fn mount<\n  105 |     P1: ?Sized + NixPath,\n  106 |     P2: ?Sized + NixPath,\n  107 |     P3: ?Sized + NixPath,\n  108 |     P4: ?Sized + NixPath,\n  109 | >(\n  110 |     source: Option<&P1>,\n  111 |     target: &P2,\n  112 |     fstype: Option<&P3>,\n  113 |     flags: MsFlags,\n  114 |     data: Option<&P4>,\n  115 | ) -> Result<()> {\n  116 |     let res = crate::with_opt_nix_path(source, |s| {\n  117 |         target.with_nix_path(|t| {\n  118 |             crate::with_opt_nix_path(fstype, |ty| {\n  119 |                 crate::with_opt_nix_path(data, |d| unsafe {\n  120 |                     libc::mount(\n  121 |                         s,\n  122 |                         t.as_ptr(),\n  123 |                         ty,\n  124 |                         flags.bits(),\n  125 |                         d as *const libc::c_void,\n  126 |                     )\n  127 |                 })\n  128 |             })\n  129 |         })\n  130 |     })????;\n  131 | \n  132 |     Errno::result(res).map(drop)\n  133 | }","lines":30}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`lio_listio` reinterprets the `list` slice as a slice of raw `*mut libc::aiocb`\npointers by casting through multiple pointer levels:\n\n    let p = list as *mut [Pin<&mut dyn AsMut<libc::aiocb>>]\n        as *mut [*mut libc::aiocb] as *mut *mut libc::aiocb;\n\n`Pin<&mut dyn AsMut<libc::aiocb>>` is a fat pointer (two words: data ptr +\nvtable ptr) on all current targets, while `*mut libc::aiocb` is a thin pointer\n(one word).  This transmutation is unsound: the size and layout of the two types\ndiffer, so the pointer array passed to `lio_listio` will contain interleaved\nvtable pointers interpreted as data pointers, causing the kernel to read from\nwrong addresses.  This is a correctness bug even before considering the\ndeprecated status of the function.","fix":"Build an explicit `Vec<*mut libc::aiocb>` from the list:\n    let mut ptrs: Vec<*mut libc::aiocb> = list.iter_mut()\n        .map(|op| op.as_mut().as_mut() as *mut libc::aiocb)\n        .collect();","locations":[{"ref":"src/sys/aio.rs:1224-1225","code":" 1224 |     let p = list as *mut [Pin<&mut dyn AsMut<libc::aiocb>>]\n 1225 |         as *mut [*mut libc::aiocb] as *mut *mut libc::aiocb;","lines":2}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In bsd.rs, the ioctl_write_int! for freebsdlike uses request_code_write_int! (bsd.rs macro, line 73-82) which passes VOID as the direction flag rather than IN. On BSD, IOWINT is encoded as VOID with a size, meaning 'pass int by value with no data pointer'. The non-freebsdlike path in mod.rs uses request_code_write! with size_of::<c_int>(), encoding IN with a size. These two paths produce different ioctl numbers for the same semantic operation. While this matches platform conventions, any cross-platform abstraction that compares ioctl numbers across the two paths will get wrong results.","fix":"This is intentional per BSD vs Linux conventions, but add a comment explaining why VOID is used on BSD (integer passed in ioctl number itself) vs IN on Linux. No code change required unless cross-platform number comparison is needed.","locations":[{"ref":"src/sys/ioctl/mod.rs:533-545","code":"  533 |         #[macro_export(local_inner_macros)]\n  534 |         macro_rules! ioctl_write_int {\n  535 |             ($(#[$attr:meta])* $name:ident, $ioty:expr, $nr:expr) => (\n  536 |                 $(#[$attr])*\n  537 |                 pub unsafe fn $name(fd: $crate::libc::c_int,\n  538 |                                     data: $crate::sys::ioctl::ioctl_param_type)\n  539 |                                     -> $crate::Result<$crate::libc::c_int> {\n  540 |                     unsafe {\n  541 |                         convert_ioctl_res!($crate::libc::ioctl(fd, request_code_write_int!($ioty, $nr) as $crate::sys::ioctl::ioctl_num_type, data))\n  542 |                     }\n  543 |                 }\n  544 |             )\n  545 |         }","lines":13},{"ref":"src/sys/ioctl/mod.rs:577-588","code":"  577 |         macro_rules! ioctl_write_int {\n  578 |             ($(#[$attr:meta])* $name:ident, $ioty:expr, $nr:expr) => (\n  579 |                 $(#[$attr])*\n  580 |                 pub unsafe fn $name(fd: $crate::libc::c_int,\n  581 |                                     data: $crate::sys::ioctl::ioctl_param_type)\n  582 |                                     -> $crate::Result<$crate::libc::c_int> {\n  583 |                     unsafe {\n  584 |                         convert_ioctl_res!($crate::libc::ioctl(fd, request_code_write!($ioty, $nr, ::std::mem::size_of::<$crate::libc::c_int>()) as $crate::sys::ioctl::ioctl_num_type, data))\n  585 |                     }\n  586 |                 }\n  587 |             )\n  588 |         }","lines":12},{"ref":"src/sys/ioctl/bsd.rs:73-82","code":"   73 | macro_rules! request_code_write_int {\n   74 |     ($g:expr, $n:expr) => {\n   75 |         ioc!(\n   76 |             $crate::sys::ioctl::VOID,\n   77 |             $g,\n   78 |             $n,\n   79 |             ::std::mem::size_of::<$crate::libc::c_int>()\n   80 |         )\n   81 |     };\n   82 | }","lines":10}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In ptrace_peek (lines 323-337), the match arm Err(Errno::UnknownErrno) => Ok(ret) is intended to handle the case where ptrace returns -1 with errno==0, meaning -1 is a valid data value. However Errno::UnknownErrno is returned when errno is non-zero but not a recognized value - it is not the same as errno==0. For errno==0, Errno::result returns Ok(-1) directly. Therefore the UnknownErrno arm swallows genuine unknown errors, treating them as successful -1 data reads. The real errno==0 case is already handled by the Ok arm.","fix":"Change the match to only accept Ok(ret) and let Err variants propagate: match Errno::result(ret) { Ok(..) => Ok(ret), err @ Err(..) => err }. The Errno::UnknownErrno case is not needed and is misleading.","locations":[{"ref":"src/sys/ptrace/linux.rs:333-336","code":"  333 |     match Errno::result(ret) {\n  334 |         Ok(..) | Err(Errno::UnknownErrno) => Ok(ret),\n  335 |         err @ Err(..) => err,\n  336 |     }","lines":4}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"The public `SA_SIGINFO` flag in `SaFlags` is exposed so users can include it\nin the `flags` argument to `SigAction::new`, but `new` explicitly overrides it\nbased on the handler variant.  This means the user-supplied value of\n`SA_SIGINFO` is silently ignored, which is a surprising API contract that can\nlead to incorrect assumptions about the resulting action's flags.","fix":"Either remove `SA_SIGINFO` from the public `SaFlags` bitflags, or document clearly in `SigAction::new` that the caller's `SA_SIGINFO` bit is ignored.","locations":[{"ref":"src/sys/signal.rs:462-464","code":"  462 |         /// This flag is controlled internally by Nix.\n  463 |         SA_SIGINFO;\n  464 |     }","lines":3},{"ref":"src/sys/signal.rs:856-860","code":"  856 |             (*p).sa_flags = match handler {\n  857 |                 #[cfg(not(target_os = \"redox\"))]\n  858 |                 SigHandler::SigAction(_) => (flags | SaFlags::SA_SIGINFO).bits(),\n  859 |                 _ => (flags - SaFlags::SA_SIGINFO).bits(),\n  860 |             };","lines":5}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`AlgAddr::new` indexes `addr.salg_type` and `addr.salg_name` with `[..alg_type.len()]` and\n`[..alg_name.len()]` without first verifying that the lengths fit within the fixed-size arrays.\n`salg_type` and `salg_name` are 14 and 64 bytes respectively in the kernel ABI.  Passing a string\nlonger than the array capacity will panic with an index-out-of-bounds at the `copy_from_slice` call.","fix":"Add a length check before copying and return `Err(Errno::ENAMETOOLONG)` (or panic with a clearer message), matching the pattern used by `SysControlAddr::from_name`.","locations":[{"ref":"src/sys/socket/addr.rs:1691-1694","code":" 1691 |             addr.salg_type[..alg_type.len()]\n 1692 |                 .copy_from_slice(alg_type.to_string().as_bytes());\n 1693 |             addr.salg_name[..alg_name.len()]\n 1694 |                 .copy_from_slice(alg_name.to_string().as_bytes());","lines":4}]},{"id":"API_13","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`recvfrom` (mod.rs lines 2425-2443) computes `let mut len = mem::size_of_val(&addr) as socklen_t`\nwhere `addr` has type `MaybeUninit<T>`.  `mem::size_of_val` on `MaybeUninit<T>` returns\n`size_of::<T>()`, which is correct for fixed-size types, but the variable is named `len` and used\nboth as the initial length and the output length.  This is structurally correct but differs from\nthe `getpeername`/`getsockname` pattern that uses `T::size()` explicitly.  More importantly,\n`addr.assume_init().as_ptr()` (line 2442) is called after a potentially partial write: if the\nkernel returned a shorter address than `T::size()`, `assume_init()` constructs `T` from partially\nwritten memory, which is undefined behavior for types that require full initialization (though in\npractice all `SockaddrLike` types are C structs that tolerate partial initialization if zeroed\nfirst - but `MaybeUninit::uninit()` does not zero).","fix":"Initialize `addr` with `mem::MaybeUninit::<T>::zeroed()` so that any bytes not written by the\nkernel are zero rather than uninitialized, matching `getpeername` which also relies on the returned\n`len` for `from_raw`.","locations":[{"ref":"src/sys/socket/mod.rs:2430-2442","code":" 2430 |         let mut addr = mem::MaybeUninit::<T>::uninit();\n 2431 |         let mut len = mem::size_of_val(&addr) as socklen_t;\n 2432 | \n 2433 |         let ret = Errno::result(libc::recvfrom(\n 2434 |             sockfd,\n 2435 |             buf.as_mut_ptr().cast(),\n 2436 |             buf.len() as size_t,\n 2437 |             0,\n 2438 |             addr.as_mut_ptr().cast(),\n 2439 |             &mut len as *mut socklen_t,\n 2440 |         ))? as usize;\n 2441 | \n 2442 |         Ok((ret, T::from_raw(addr.assume_init().as_ptr(), Some(len))))","lines":13}]},{"id":"API_14","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In `wait.rs`, the `syscall_stop` function checks `libc::WSTOPSIG(status) == libc::SIGTRAP | 0x80`. Due to Rust operator precedence this is parsed as `WSTOPSIG(status) == (SIGTRAP | 0x80)` which is the intended meaning. However, `SIGTRAP` is typically 5, so `SIGTRAP | 0x80 = 133`. `WSTOPSIG` returns bits 8-15 of status, so the comparison is correct. This is fine but a parenthesis around `libc::SIGTRAP | 0x80` would make precedence explicit and prevent future misreadings.","fix":"Write `libc::WSTOPSIG(status) == (libc::SIGTRAP | 0x80)` with explicit parentheses.","locations":[{"ref":"src/sys/wait.rs:168","code":"  168 |     libc::WSTOPSIG(status) == libc::SIGTRAP | 0x80","lines":1}]},{"id":"API_15","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In dir.rs, the Drop impl for Dir panics with 'Closing an invalid file descriptor!' when closedir() returns EBADF, unless a panic is already in progress. This panic is appropriate for detecting double-close bugs, but closedir() on Linux/glibc may return EBADF for other reasons (e.g., the fd was closed by the kernel after a fork). The panic message does not distinguish between these cases and gives no information about which fd triggered the error.","fix":"The behavior is intentional and documented; consider improving the panic message to include the fd number for easier debugging.","locations":[{"ref":"src/dir.rs:144-151","code":"  144 | impl Drop for Dir {\n  145 |     fn drop(&mut self) {\n  146 |         let e = Errno::result(unsafe { libc::closedir(self.0.as_ptr()) });\n  147 |         if !std::thread::panicking() && e == Err(Errno::EBADF) {\n  148 |             panic!(\"Closing an invalid file descriptor!\");\n  149 |         };\n  150 |     }\n  151 | }","lines":8}]},{"id":"API_16","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"The openat2 wrapper calls `libc::syscall(libc::SYS_openat2, ...) as RawFd` before checking the return value with Errno::result(fd). On 64-bit Linux, libc::syscall returns i64 and RawFd is i32, so the cast truncates the value. While errno values and file descriptor numbers are always small enough to fit in i32, casting a negative i64 error code to i32 before the error check means Errno::result sees the truncated (but still negative) value. This is safe in practice for all reachable errno codes but the correct pattern is to keep the value as c_long and only convert to RawFd after Errno::result has confirmed success.","fix":"Store the syscall result as `libc::c_long`, pass it to Errno::result, and only cast to RawFd inside the Ok branch: `let ret: libc::c_long = libc::syscall(...); Errno::result(ret)?; Ok(OwnedFd::from_raw_fd(ret as RawFd))`.","locations":[{"ref":"src/fcntl.rs:397-411","code":"  397 |             let fd = path.with_nix_path(|cstr| unsafe {\n  398 |                 libc::syscall(\n  399 |                     libc::SYS_openat2,\n  400 |                     dirfd.as_fd().as_raw_fd(),\n  401 |                     cstr.as_ptr(),\n  402 |                     &mut how as *mut OpenHow,\n  403 |                     std::mem::size_of::<libc::open_how>(),\n  404 |                 )\n  405 |             })? as RawFd;\n  406 |             Errno::result(fd)?;\n  407 | \n  408 |             // SAFETY:\n  409 |             //\n  410 |             // `openat2(2)` should return a valid owned fd on success\n  411 |             Ok( unsafe { OwnedFd::from_raw_fd(fd)  } )","lines":15}]},{"id":"API_17","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"In mount/apple.rs, the mount() function takes a *mut c_void data argument derived from a const NixPath pointer via d.cast_mut().cast(). The libc::mount signature on Apple targets takes *mut c_void but does not modify the data; casting away const is correct but may confuse static analysis tools and violates Rust's aliasing rules if the underlying data is in read-only memory.","fix":"Document the cast or use libc::mount with a matching signature that reflects the actual constness.","locations":[{"ref":"src/mount/apple.rs:92","code":"   92 |                     d.cast_mut().cast(),","lines":1}]},{"id":"API_18","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`mlock` and `munlock` accept `length: size_t` (plain `usize`) rather than\n`NonZeroUsize`.  Passing `length = 0` is a no-op on Linux but may produce\nerrors or undefined behavior on other platforms.  The inconsistency with `mmap`\n(which uses `NonZeroUsize`) is also a documentation hazard.","fix":"Use `NonZeroUsize` for `length` in `mlock` and `munlock` to match the `mmap` API style.","locations":[{"ref":"src/sys/mman.rs:381-383","code":"  381 | pub unsafe fn mlock(addr: NonNull<c_void>, length: size_t) -> Result<()> {\n  382 |     unsafe { Errno::result(libc::mlock(addr.as_ptr(), length)).map(drop) }\n  383 | }","lines":3},{"ref":"src/sys/mman.rs:394-396","code":"  394 | pub unsafe fn munlock(addr: NonNull<c_void>, length: size_t) -> Result<()> {\n  395 |     unsafe { Errno::result(libc::munlock(addr.as_ptr(), length)).map(drop) }\n  396 | }","lines":3}]},{"id":"API_19","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`mmap` and `mmap_anonymous` accept `length: NonZeroUsize`, which prevents\nzero-length mappings at the Rust type level.  However, the `munmap` wrapper\naccepts `len: size_t` (which is `usize`) without any non-zero check.  A caller\ncan therefore call `munmap` with `len = 0`, which is undefined behavior on some\nplatforms.  Consistency with `mmap` would require `NonZeroUsize` for the length\nparameter.","fix":"Change `len: size_t` to `len: NonZeroUsize` in `munmap`, or at minimum add a debug assertion.","locations":[{"ref":"src/sys/mman.rs:540-542","code":"  540 | pub unsafe fn munmap(addr: NonNull<c_void>, len: size_t) -> Result<()> {\n  541 |     unsafe { Errno::result(libc::munmap(addr.as_ptr(), len)).map(drop) }\n  542 | }","lines":3}]},{"id":"API_20","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In `prctl.rs`, `get_name` uses a buffer `[0u8; 16]` which matches Linux TASK_COMM_LEN. However the buffer is declared as `let buf = [0u8; 16]` and passed to `prctl` as `&buf` (a shared reference). The kernel writes through this pointer. While this works in practice (the kernel does write, and Rust does not enforce immutability at the machine level for prctl), it is technically undefined behavior to pass a pointer to immutable memory to a function that writes to it.","fix":"Declare `buf` as `let mut buf = [0u8; 16]` and pass `buf.as_mut_ptr()` explicitly, or use `MaybeUninit`.","locations":[{"ref":"src/sys/prctl.rs:156-163","code":"  156 |     let buf = [0u8; 16];\n  157 | \n  158 |     let res = unsafe { libc::prctl(libc::PR_GET_NAME, &buf, 0, 0, 0) };\n  159 | \n  160 |     Errno::result(res).and_then(|_| {\n  161 |         CStr::from_bytes_until_nul(&buf)\n  162 |             .map(CStr::to_owned)\n  163 |             .map_err(|_| Errno::EINVAL)","lines":8}]},{"id":"API_21","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In `sendfile.rs` (solarish), `sendfilev` passes `vec.len() as i32` for the `sfvcnt` parameter. If `vec.len()` exceeds `i32::MAX` the cast wraps to a negative number, causing incorrect behavior.","fix":"Assert or error if `vec.len() > i32::MAX as usize` before casting.","locations":[{"ref":"src/sys/sendfile.rs:356","code":"  356 |                 libc::sendfilev(out_sock.as_fd().as_raw_fd(), vec.as_ptr() as *const libc::sendfilevec_t, vec.len() as i32, &mut len)","lines":1}]},{"id":"API_22","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`SockaddrStorage::from_raw` without a length (the `else` branch at mod.rs-equivalent\naddr.rs:1188-1229) returns `None` for `AF_UNIX` because `AF_UNIX` is not listed in the match.\nThis means if a caller provides an `AF_UNIX` pointer without a length, they silently get `None`\ninstead of an error or partial result.  The `AF_UNIX` case genuinely cannot be handled without a\nlength, but the absence of a comment here makes it a silent footgun.","fix":"Add an explicit `libc::AF_UNIX => None` arm with a comment explaining why length is required, to make the behavior intentional and documented.","locations":[{"ref":"src/sys/socket/addr.rs:1188-1229","code":" 1188 |         } else {\n 1189 |             // If length is not available and addr is of a fixed-length type,\n 1190 |             // copy it.  If addr is of a variable length type and len is not\n 1191 |             // available, then there's nothing we can do.\n 1192 |             match unsafe { (*addr).sa_family as i32 } {\n 1193 |                 #[cfg(linux_android)]\n 1194 |                 libc::AF_ALG => unsafe {\n 1195 |                     AlgAddr::from_raw(addr, l).map(|alg| Self { alg })\n 1196 |                 },\n 1197 |                 #[cfg(feature = \"net\")]\n 1198 |                 libc::AF_INET => unsafe {\n 1199 |                     SockaddrIn::from_raw(addr, l).map(|sin| Self { sin })\n 1200 |                 },\n 1201 |                 #[cfg(feature = \"net\")]\n 1202 |                 libc::AF_INET6 => unsafe {\n 1203 |                     SockaddrIn6::from_raw(addr, l).map(|sin6| Self { sin6 })\n 1204 |                 },\n 1205 |                 #[cfg(any(bsd, solarish, target_os = \"haiku\"))]\n 1206 | :1},{"ref":"src/sys/uio.rs:101","code":"  101 |             iov.as_ptr().cast(),","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"wrap_readlink_result calls v.shrink_to_fit() followed by v.to_vec(). shrink_to_fit() may trigger a reallocation to reduce capacity, and then to_vec() unconditionally allocates a brand-new Vec by cloning the data. The original Vec v is then dropped, wasting the allocation from shrink_to_fit. The result is up to two unnecessary allocations. The shrink_to_fit call is also redundant since we are about to clone into a new Vec anyway.","fix":"Replace the body with `unsafe { v.set_len(len as usize) }; Ok(OsString::from_vec(v))` to reuse the existing allocation directly. The set_len is already done, no clone needed.","locations":[{"ref":"src/fcntl.rs:498-502","code":"  498 | fn wrap_readlink_result(mut v: Vec<u8>, len: ssize_t) -> Result<OsString> {\n  499 |     unsafe { v.set_len(len as usize) }\n  500 |     v.shrink_to_fit();\n  501 |     Ok(OsString::from_vec(v.to_vec()))\n  502 | }","lines":5}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `quota.rs`, every getter method on `Dqblk` (e.g. `blocks_hard_limit`, `blocks_soft_limit`, `occupied_space`, etc.) re-parses `dqb_valid` with `QuotaValidFlags::from_bits_truncate`. With eight separate getter methods this is eight separate bit-test operations on each call, which is trivial but needlessly repetitive. A single `valid_flags()` helper would clarify intent.","fix":"Extract `fn valid_flags(&self) -> QuotaValidFlags` and call it from each getter.","locations":[{"ref":"src/sys/quota.rs:119-237","code":"  119 | impl Dqblk {\n  120 |     /// The absolute limit on disk quota blocks allocated.\n  121 |     pub fn blocks_hard_limit(&self) -> Option<u64> {\n  122 |         let valid_fields =\n  123 |             QuotaValidFlags::from_bits_truncate(self.0.dqb_valid);\n
