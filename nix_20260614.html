<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"F_GETPATH, F_GETPATH_NOFIRMLINK, and F_KINFO all call `optr.to_str().unwrap()` to convert the kernel-returned path to a Rust &str before constructing OsString. This panics if the path contains non-UTF-8 bytes. macOS paths are formally UTF-8 but HFS+ historically permits arbitrary byte sequences via some APIs, and the kernel may return paths that are not valid UTF-8. The correct approach is to use OsString::from_vec(optr.to_bytes().to_vec()) without going through &str.","fix":"Replace `OsString::from(optr.to_str().unwrap())` with `OsStr::from_bytes(optr.to_bytes()).to_owned()` (using std::os::unix::ffi::OsStrExt) to avoid the UTF-8 requirement and the potential panic.","locations":[{"ref":"src/fcntl.rs:918","code":"  918 |                 *path = PathBuf::from(OsString::from(optr.to_str().unwrap()));","lines":1},{"ref":"src/fcntl.rs:930","code":"  930 |                 *path = PathBuf::from(OsString::from(optr.to_str().unwrap()));","lines":1},{"ref":"src/fcntl.rs:939","code":"  939 |                 *path = PathBuf::from(OsString::from(optr.to_str().unwrap()));","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`GetStruct::assume_init`, `GetBool::assume_init`, `GetU8::assume_init`, `GetUsize::assume_init`,\nand `GetOwnedFd::assume_init` all assert that `self.len` equals `mem::size_of::<T>()` after a\nsuccessful `getsockopt` call.  The kernel is allowed to return a *shorter* length for options whose\nwire size is smaller than the Rust type size (e.g. on 32-bit targets, or for socket options that\nhave grown over time).  If the kernel writes fewer bytes than `size_of::<T>()`, the assert fires\nand the process panics.  This is reachable from safe code via the public `getsockopt` wrapper.","fix":"Replace the `assert_eq!` with a bounds check that returns `Err(Errno::EINVAL)` instead of\npanicking, or at minimum use `assert!(self.len as usize <= mem::size_of::<T>())` so that\npartial reads (which are valid for some options) do not crash the process.","locations":[{"ref":"src/sys/socket/sockopt.rs:1673-1679","code":" 1673 |         assert_eq!(\n 1674 |             self.len as usize,\n 1675 |             mem::size_of::<T>(),\n 1676 |             \"invalid getsockopt implementation\"\n 1677 |         );\n 1678 |         unsafe { self.val.assume_init() }\n 1679 |     }","lines":7},{"ref":"src/sys/socket/sockopt.rs:1729-1736","code":" 1729 |     unsafe fn assume_init(self) -> bool {\n 1730 |         assert_eq!(\n 1731 |             self.len as usize,\n 1732 |             mem::size_of::<c_int>(),\n 1733 |             \"invalid getsockopt implementation\"\n 1734 |         );\n 1735 |         unsafe { self.val.assume_init() != 0 }\n 1736 |     }","lines":8},{"ref":"src/sys/socket/sockopt.rs:1791-1797","code":" 1791 |         assert_eq!(\n 1792 |             self.len as usize,\n 1793 |             mem::size_of::<u8>(),\n 1794 |             \"invalid getsockopt implementation\"\n 1795 |         );\n 1796 |         unsafe { self.val.assume_init() }\n 1797 |     }","lines":7},{"ref":"src/sys/socket/sockopt.rs:1849-1855","code":" 1849 |         assert_eq!(\n 1850 |             self.len as usize,\n 1851 |             mem::size_of::<c_int>(),\n 1852 |             \"invalid getsockopt implementation\"\n 1853 |         );\n 1854 |         unsafe { self.val.assume_init() as usize }\n 1855 |     }","lines":7},{"ref":"src/sys/socket/sockopt.rs:1909-1915","code":" 1909 |         assert_eq!(\n 1910 |             self.len as usize,\n 1911 |             mem::size_of::<c_int>(),\n 1912 |             \"invalid getsockopt implementation\"\n 1913 |         );\n 1914 |         unsafe { OwnedFd::from_raw_fd(self.val.assume_init() as RawFd) }\n 1915 |     }","lines":7}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"cfgetispeed and cfgetospeed on non-BSD platforms (Linux/Android) call .unwrap() on the result of TryFrom<libc::speed_t> for BaudRate. If the kernel returns a speed_t constant that is not in the BaudRate enum (e.g. a future or vendor-specific baud rate), this panics instead of returning an error. There is no way for the caller to handle an unrecognized baud rate gracefully.","fix":"Change the return type to Result<BaudRate> and propagate the TryFrom error via ? or map_err, so callers can handle unknown baud rates without a panic.","locations":[{"ref":"src/sys/termios.rs:782","code":"  782 |             unsafe { libc::cfgetispeed(&*inner_termios) }.try_into().unwrap()","lines":1},{"ref":"src/sys/termios.rs:791","code":"  791 |             unsafe { libc::cfgetospeed(&*inner_termios) }.try_into().unwrap()","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"The F_GETPATH and F_GETPATH_NOFIRMLINK handlers call `CStr::from_bytes_until_nul(&buffer).unwrap()`. Although the buffer is zero-initialised (so a null byte is always present and the unwrap can never actually fail at runtime), this leaves a latent unwrap in an unsafe context. The F_KINFO handler has the same pattern on a raw byte slice from kinfo_file::kf_path.","fix":"Replace .unwrap() with .unwrap_or_else(|_| unreachable!(\"buffer always contains a NUL\")) or, more cleanly, use expect() with a short message, or construct the CStr from the zero-initialised buffer with a known-safe method.","locations":[{"ref":"src/fcntl.rs:917","code":"  917 |                 let optr = CStr::from_bytes_until_nul(&buffer).unwrap();","lines":1},{"ref":"src/fcntl.rs:929","code":"  929 |                 let optr = CStr::from_bytes_until_nul(u8_slice).unwrap();","lines":1},{"ref":"src/fcntl.rs:938","code":"  938 |                 let optr = CStr::from_bytes_until_nul(&buffer).unwrap();","lines":1}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"PollFd::events() calls unwrap() on PollFlags::from_bits(). Because the events field was set via PollFlags::bits() in PollFd::new or set_events, it should always be a valid bitfield value, but if the raw pollfd is ever constructed through other means (e.g., transmute or foreign FFI), this will panic instead of returning None or an error.","fix":"Return Option<PollFlags> (matching the revents() API) or use from_bits_truncate to avoid the panic.","locations":[{"ref":"src/poll.rs:87","code":"   87 |         PollFlags::from_bits(self.pollfd.events).unwrap()","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"PollTimeout::as_millis() calls unwrap() on u32::try_from(self.0). It is only called when is_some() is true, meaning self.0 >= 0. However, self.0 is i32::MAX at most, and u32::try_from cannot fail for non-negative i32 values. But the is_some() guard only excludes values <= -1, so values in range [-1+epsilon..0) are excluded but values of exactly -1 are also excluded. The unwrap is logically safe, but the code does not make the safety invariant explicit, and a future maintenance change could break it silently.","fix":"Use an explicit assert or replace with u32::try_from(self.0).expect(\"as_millis called with negative timeout\") with clear documentation, or restructure to avoid the unwrap.","locations":[{"ref":"src/poll_timeout.rs:30","code":"   30 |         self.is_some().then_some(u32::try_from(self.0).unwrap())","lines":1}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`AioFsync::mode()` calls `AioFsyncMode::try_from(self.aiocb.aiocb.0.aio_lio_opcode).unwrap()`.\nAfter `AioFsync::submit` zeroes out `aio_lio_opcode` (see above), `mode()`\nwill either return the wrong mode or panic if 0 is not a valid `AioFsyncMode`\nvariant on the current platform.","fix":"Store the mode in a dedicated field; do not use `aio_lio_opcode` as a side channel.","locations":[{"ref":"src/sys/aio.rs:448-450","code":"  448 |     pub fn mode(&self) -> AioFsyncMode {\n  449 |         AioFsyncMode::try_from(self.aiocb.aiocb.0.aio_lio_opcode).unwrap()\n  450 |     }","lines":3},{"ref":"src/sys/aio.rs:492","code":"  492 |         let mode = mem::replace(&mut aiocb.aio_lio_opcode, 0);","lines":1}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`SigSet::contains` calls `libc::sigismember` and maps any return value other\nthan 0 or 1 to `unreachable!()`, which panics.  POSIX says sigismember returns\n-1 on error (e.g. EINVAL when the signal number is out of range).  Because the\n`Signal` enum is `#[non_exhaustive]` and constructed through `TryFrom<i32>`,\nonly valid signal numbers can reach this path, so the panic is unlikely in\npractice.  However, if `sigismember` ever returns -1 for platform-specific\nreasons the process terminates rather than returning an error.","fix":"Return `false` (or a `Result<bool>`) on negative return values instead of panicking, matching what most callers would expect.","locations":[{"ref":"src/sys/signal.rs:540-547","code":"  540 |     pub fn contains(&self, signal: Signal) -> bool {\n  541 |         let res = unsafe { libc::sigismember(&self.sigset as *const libc::sigset_t, signal as libc::c_int) };\n  542 | \n  543 |         match res {\n  544 |             1 => true,\n  545 |             0 => false,\n  546 |             _ => unreachable!(\"unexpected value from sigismember\"),\n  547 |         }","lines":8}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`UnixAddr::new` and `UnixAddr::new_abstract` call `.unwrap()` on `TryInto::<u8>::try_into(sun_len)`\n(the computed `sun_len` value).  If the path or abstract name is longer than 253 bytes\n(which can happen because `ret.sun_path.len()` is typically 108 bytes, but the `>= ret.sun_path.len()`\nguard for `new` and `>= ret.sun_path.len()` for `new_abstract` rejects paths only at exactly that\nlength, not longer), the `try_into().unwrap()` would panic.  In practice the length check fires\nfirst, but if `offset_of!(sockaddr_un, sun_path)` is large enough that the sum overflows `u8` while\nstill fitting in `sun_path`, a panic is possible.  More broadly, using `.unwrap()` in a library\nfunction that already returns `Result` is an unnecessary risk.","fix":"Replace `.unwrap()` with `.map_err(|_| Errno::EINVAL)?` (or `Errno::ENAMETOOLONG`) and propagate the error.","locations":[{"ref":"src/sys/socket/addr.rs:363-366","code":"  363 |             let sun_len = (bytes.len()\n  364 |                 + offset_of!(libc::sockaddr_un, sun_path))\n  365 |             .try_into()\n  366 |             .unwrap();","lines":4},{"ref":"src/sys/socket/addr.rs:400-403","code":"  400 |             let sun_len =\n  401 |                 (path.len() + 1 + offset_of!(libc::sockaddr_un, sun_path))\n  402 |                     .try_into()\n  403 |                     .unwrap();","lines":4},{"ref":"src/sys/socket/addr.rs:425-426","code":"  425 |         let sun_len: u8 =\n  426 |             offset_of!(libc::sockaddr_un, sun_path).try_into().unwrap();","lines":2}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`GetCString::assume_init` calls `.expect(\"string should be null-terminated\")` on the result of\n`CStr::from_bytes_until_nul`.  If the kernel returns a buffer with no NUL byte (which can happen\nfor malformed or unexpected option values), this panics in safe calling code.","fix":"Return `Err(Errno::EINVAL)` instead of panicking: change the signature of `assume_init` to return\n`Result<CString>`, or at minimum use `.unwrap_or_else(|_| CString::default())` to avoid a panic.","locations":[{"ref":"src/sys/socket/sockopt.rs:2033-2038","code":" 2033 |     unsafe fn assume_init(self) -> CString {\n 2034 |         let mut v = unsafe { self.val.assume_init() };\n 2035 |         CStr::from_bytes_until_nul(v.as_mut())\n 2036 |             .expect(\"string should be null-terminated\")\n 2037 |             .to_owned()\n 2038 |     }","lines":6}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `WaitStatus::from_raw`, when `continued(status)` is false for a status that is not exited, signaled, or stopped, the code calls `assert!(continued(status))`. A raw status value that has none of these bits set (e.g. 0) will reach the assert and panic. The kernel should never produce such a status, but callers of the public `WaitStatus::from_raw` can pass arbitrary i32 values, turning this into a panic on bad input rather than returning `Err(Errno::EINVAL)`.","fix":"Replace `assert!(continued(status))` with `if !continued(status) { return Err(Errno::EINVAL); }` so invalid raw status values are rejected gracefully.","locations":[{"ref":"src/sys/wait.rs:225","code":"  225 |             assert!(continued(status));","lines":1}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `WaitStatus::from_siginfo`, an `assert_eq!` is used to verify `siginfo.si_signo == libc::SIGCHLD`. If a caller passes a `siginfo_t` from a signal other than SIGCHLD (which the Safety doc says must be valid), the assertion panics instead of returning `Err(Errno::EINVAL)`.","fix":"Replace `assert_eq!(siginfo.si_signo, libc::SIGCHLD)` with `if siginfo.si_signo != libc::SIGCHLD { return Err(Errno::EINVAL); }`.","locations":[{"ref":"src/sys/wait.rs:253","code":"  253 |         assert_eq!(siginfo.si_signo, libc::SIGCHLD);","lines":1}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`From<&libc::passwd> for User` calls `.unwrap()` on `CString::new(...)` twice: once for `pw_passwd`\n(line 3580) and once for `pw_gecos` (line 3590). `CString::new` fails with `NulError` when the\nbyte slice contains an interior NUL byte. A `passwd` entry with an interior-NUL password hash or\nGECOS field (possible in theory, and common when the OS fills these from untrusted sources) would\ncause a panic instead of returning an error.","fix":"Replace `.unwrap()` with a fallback such as `.unwrap_or_default()` or propagate the error by converting `From` into a fallible `TryFrom`.","locations":[{"ref":"src/unistd.rs:3568-3645","code":" 3568 | impl From<&libc::passwd> for User {\n 3569 |     fn from(pw: &libc::passwd) -> User {\n 3570 |         unsafe {\n 3571 |             User {\n 3572 |                 name: if pw.pw_name.is_null() {\n 3573 |                     Default::default()\n 3574 |                 } else {\n 3575 |                     CStr::from_ptr(pw.pw_name).to_string_lossy().into_owned()\n 3576 |                 },\n 3577 |                 passwd: if pw.pw_passwd.is_null() {\n 3578 |                     Default::default()\n 3579 |                 } else {\n 3580 |                     CString::new(CStr::from_ptr(pw.pw_passwd).to_bytes())\n 3581 |                         .unwrap()\n 3582 |                 },\n 3583 |                 #[cfg(not(all(\n 3584 |                     target_os = \"android\",\n 3585 |                     target_pointer_width = \"32\"\n 3586 |                 )))]\n 3587 |                 gecos: if pw.pw_gecos.is_null() {\n 3588 |                     Default::default()\n 3589 |                 } else {\n 3590 |                     CString::new(CStr::from_ptr(pw.pw_gecos).to_bytes())\n 3591 |                         .unwrap()\n 3592 |                 },\n 3593 |                 dir: if pw.pw_dir.is_null() {\n 3594 |                     Default::default()\n 3595 |                 } else {\n 3596 |                     PathBuf::from(OsStr::from_bytes(\n 3597 |                         CStr::from_ptr(pw.pw_dir).to_bytes(),\n 3598 |                     ))\n 3599 |                 },\n 3600 |                 shell: if pw.pw_shell.is_null() {\n 3601 |                     Default::default()\n 3602 |                 } else {\n 3603 |                     PathBuf::from(OsStr::from_bytes(\n 3604 |                         CStr::from_ptr(pw.pw_shell).to_bytes(),\n 3605 |                     ))\n 3606 |                 },\n 3607 |                 uid: Uid::from_raw(pw.pw_uid),\n 3608 |                 gid: Gid::from_raw(pw.pw_gid),\n 3609 |                 #[cfg(not(any(\n 3610 |                     linux_android,\n 3611 |                     solarish,\n 3612 |                     target_os = \"aix\",\n 3613 |                     target_os = \"fuchsia\",\n 3614 |                     target_os = \"haiku\",\n 3615 |                     target_os = \"hurd\",\n 3616 |                     target_os = \"emscripten\",\n 3617 |                     target_os = \"cygwin\",\n 3618 |                 )))]\n 3619 |                 class: CString::new(CStr::from_ptr(pw.pw_class).to_bytes())\n 3620 |                     .unwrap(),\n 3621 |                 #[cfg(not(any(\n 3622 |                     linux_android,\n 3623 |                     solarish,\n 3624 |                     target_os = \"aix\",\n 3625 |                     target_os = \"fuchsia\",\n 3626 |                     target_os = \"haiku\",\n 3627 |                     target_os = \"hurd\",\n 3628 |                     target_os = \"emscripten\",\n 3629 |                     target_os = \"cygwin\",\n 3630 |                 )))]\n 3631 |                 change: pw.pw_change,\n 3632 |                 #[cfg(not(any(\n 3633 |                     linux_android,\n 3634 |                     solarish,\n 3635 |                     target_os = \"aix\",\n 3636 |                     target_os = \"fuchsia\",\n 3637 |                     target_os = \"haiku\",\n 3638 |                     target_os = \"hurd\",\n 3639 |                     target_os = \"emscripten\",\n 3640 |                     target_os = \"cygwin\",\n 3641 |                 )))]\n 3642 |                 expire: pw.pw_expire,\n 3643 |             }\n 3644 |         }\n 3645 |     }","lines":78}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`From<User> for libc::passwd` calls `.unwrap()` at lines 3656 and 3660 when constructing CStrings\nfrom the `dir` and `shell` PathBuf values that converted successfully to `String` via `into_string`.\nBecause the Strings originate from `OsString::into_string` they are valid UTF-8 and therefore\ncannot contain interior NULs (which are not valid UTF-8), so these particular `.unwrap()` calls are\nsound. However, the `.unwrap()` calls at lines 3709 and 3711 construct `CString::new(\"\")` which is\nalways safe; those are just unnecessarily defensive. The genuinely dangerous `.unwrap()` is inside\n`name` construction at line 3652: `CString::new(u.name)` where `u.name` is a `String`. A `String`\ncannot contain NUL bytes, so this is safe. Net: the `unwrap` calls here do not actually panic in\npractice but they are still fragile - see the companion finding about `From<&libc::passwd>`.","fix":"Negligible in practice, but for consistency replace with `.unwrap_or_default()` to eliminate any confusion in future refactors.","locations":[{"ref":"src/unistd.rs:3651-3662","code":" 3651 |         let name = match CString::new(u.name) {\n 3652 |             Ok(n) => n.into_raw(),\n 3653 |             Err(_) => CString::new(\"\").unwrap().into_raw(),\n 3654 |         };\n 3655 |         let dir = match u.dir.into_os_string().into_string() {\n 3656 |             Ok(s) => CString::new(s.as_str()).unwrap().into_raw(),\n 3657 |             Err(_) => CString::new(\"\").unwrap().into_raw(),\n 3658 |         };\n 3659 |         let shell = match u.shell.into_os_string().into_string() {\n 3660 |             Ok(s) => CString::new(s.as_str()).unwrap().into_raw(),\n 3661 |             Err(_) => CString::new(\"\").unwrap().into_raw(),\n 3662 |         };","lines":12}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`From<&libc::group> for Group` calls `.unwrap()` on `CString::new(CStr::from_ptr(gr.gr_passwd).to_bytes())`\nat line 3849. Same reasoning as the `passwd` finding above - an interior NUL in `gr_passwd` causes\na panic.","fix":"Use `.unwrap_or_default()` or convert to a `TryFrom` impl.","locations":[{"ref":"src/unistd.rs:3836-3861","code":" 3836 | #[cfg(not(target_os = \"redox\"))] // RedoxFS does not support passwd\n 3837 | impl From<&libc::group> for Group {\n 3838 |     fn from(gr: &libc::group) -> Group {\n 3839 |         unsafe {\n 3840 |             Group {\n 3841 |                 name: if gr.gr_name.is_null() {\n 3842 |                     Default::default()\n 3843 |                 } else {\n 3844 |                     CStr::from_ptr(gr.gr_name).to_string_lossy().into_owned()\n 3845 |                 },\n 3846 |                 passwd: if gr.gr_passwd.is_null() {\n 3847 |                     Default::default()\n 3848 |                 } else {\n 3849 |                     CString::new(CStr::from_ptr(gr.gr_passwd).to_bytes())\n 3850 |                         .unwrap()\n 3851 |                 },\n 3852 |                 gid: Gid::from_raw(gr.gr_gid),\n 3853 |                 mem: if gr.gr_mem.is_null() {\n 3854 |                     Default::default()\n 3855 |                 } else {\n 3856 |                     Group::members(gr.gr_mem)\n 3857 |                 },\n 3858 |             }\n 3859 |         }\n 3860 |     }\n 3861 | }","lines":26}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"Nmount::push_nix_path calls unwrap() on the Result returned by NixPath::with_nix_path. If the path contains an interior NUL byte, with_nix_path returns Err(Errno::EINVAL), which causes a panic inside the builder method instead of propagating the error to the caller. This makes Nmount's builder API unable to report path encoding errors gracefully.","fix":"Change push_nix_path to return a Result<()> and propagate the error, adjusting str_opt_owned, null_opt_owned, and nmount accordingly.","locations":[{"ref":"src/mount/bsd_without_apple.rs:224-225","code":"  224 |         })\n  225 |         .unwrap();","lines":2}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"if_indextoname calls unwrap() on CStr::from_bytes_until_nul(). The buffer is zero-initialized with length IF_NAMESIZE, so there will always be at least one NUL byte, making the unwrap safe in practice. However, the call is not documented as infallible and the unwrap could mask a future buffer size change.","fix":"Use ? or map_err to propagate the error, or add a comment explaining why the unwrap cannot fail.","locations":[{"ref":"src/net/if_.rs:39","code":"   39 |     Ok(CStr::from_bytes_until_nul(buf.as_slice()).unwrap().to_owned())","lines":1}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`AioCb::cancel` and `aio_cancel_all` both contain `panic!(\"unknown aio_cancel\nreturn value\")` for unexpected return values.  While the POSIX spec lists only\nthree valid return values, a panic is not appropriate for a library; it turns a\npotentially-ignorable error into a process crash.","fix":"Return `Err(Errno::last())` or `Err(Errno::EINVAL)` instead of panicking.","locations":[{"ref":"src/sys/aio.rs:141","code":"  141 |             _ => panic!(\"unknown aio_cancel return value\"),","lines":1},{"ref":"src/sys/aio.rs:1022","code":" 1022 |         _ => panic!(\"unknown aio_cancel return value\"),","lines":1}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`AioCb::error` contains `panic!(\"unknown aio_error return value {num:?}\")` for\nany negative return code other than -1.  Again, a library should never panic on\nunexpected OS return values.","fix":"Map unexpected negative values to `Err(Errno::EINVAL)` or `Err(Errno::last())`.","locations":[{"ref":"src/sys/aio.rs:171","code":"  171 |             num => panic!(\"unknown aio_error return value {num:?}\"),","lines":1}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`SigSet::wait` calls `Signal::try_from(signum.assume_init()).unwrap()`.  If the\nkernel ever fills `signum` with a value that is not a recognised `Signal`\nvariant (e.g. a real-time signal SIGRTMIN..SIGRTMAX which are not enumerated),\nthe unwrap panics in the calling thread rather than returning an error.","fix":"Propagate the TryFrom error as `Errno::EINVAL` or add SIGRTMIN/SIGRTMAX coverage.","locations":[{"ref":"src/sys/signal.rs:593-595","code":"  593 |         Errno::result(res).map(|_| unsafe {\n  594 |             Signal::try_from(signum.assume_init()).unwrap()\n  595 |         })","lines":3}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`SigSet::suspend` uses `unreachable!()` for the `Ok(_)` branch returned by\n`Errno::result`.  `sigsuspend(2)` always returns -1, so this code should never\nbe reached, but a panic is the wrong way to document that; it also adds a\nbranch that must be compiled and optimised away.","fix":"Use `std::hint::unreachable_unchecked()` in a safety comment, or restructure to use only the `Err` branch.","locations":[{"ref":"src/sys/signal.rs:620-624","code":"  620 |         match Errno::result(res).map(drop) {\n  621 |             Err(Errno::EINTR) => Ok(()),\n  622 |             Err(e) => Err(e),\n  623 |             Ok(_) => unreachable!(\"because this syscall always returns -1 if returns\"),\n  624 |         }","lines":5}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`SignalFd::read_signal` contains `unreachable!(\"partial read on signalfd\")`. A partial read can in theory occur if the kernel is buggy or if the fd is somehow not a real signalfd (e.g. constructed via the unsafe `from_owned_fd`). This would cause an unconditional panic in a production program.","fix":"Return `Err(Errno::EIO)` (or a custom error) instead of calling `unreachable!`.","locations":[{"ref":"src/sys/signalfd.rs:124","code":"  124 |             Ok(_) => unreachable!(\"partial read on signalfd\"),","lines":1}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`umask` in `stat.rs` calls `.expect(\"[BUG] umask returned invalid Mode\")` on the result of `Mode::from_bits`. The `umask(2)` syscall is documented to always return the previous mask, which may contain bits not present in the `Mode` bitflags. On such a platform this panics. `from_bits_truncate` would be safer.","fix":"Use `Mode::from_bits_truncate(prev)` instead of `Mode::from_bits(prev).expect(...)`.","locations":[{"ref":"src/sys/stat.rs:211","code":"  211 |     Mode::from_bits(prev).expect(\"[BUG] umask returned invalid Mode\")","lines":1}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`statfs::filesystem_type_name` calls `.unwrap()` on `CStr::to_str()`. If the kernel returns a filesystem type name that is not valid UTF-8 (unusual but theoretically possible), this panics.","fix":"Return `Result<&str, ...>` or use `to_str().unwrap_or(\"?\")`, or expose `&OsStr` / raw bytes instead.","locations":[{"ref":"src/sys/statfs.rs:312","code":"  312 |         c_str.to_str().unwrap()","lines":1}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":false,"description":"In dir.rs, from_fd() leaks the file descriptor on fdopendir() failure. After raw_fd = fd.into_raw_fd(), the OwnedFd is consumed. If libc::fdopendir(raw_fd) returns NULL, the function returns Err(...) without closing raw_fd. This fd leak persists until the process exits.","fix":"Reconstruct an OwnedFd from raw_fd on the error path to ensure it is closed: let result = libc::fdopendir(raw_fd); if result.is_null() { let _ = std::os::fd::OwnedFd::from_raw_fd(raw_fd); return Err(Errno::last()); }","locations":[{"ref":"src/dir.rs:109-111","code":"  109 |         let raw_fd = fd.into_raw_fd();\n  110 |         let d = ptr::NonNull::new(unsafe { libc::fdopendir(raw_fd) })\n  111 |             .ok_or(Errno::last())?;","lines":3}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":false,"description":"MqdT has no Drop implementation, so the underlying POSIX message queue descriptor is never closed automatically. The public API provides mq_close() which takes MqdT by value, consuming it. If mq_close() returns an error (including EINTR), the MqdT has already been consumed and there is no remaining handle to retry the close; the file descriptor leaks for the lifetime of the process. On Linux, mqd_t is a file descriptor integer, and a leaked file descriptor can cause fd exhaustion. The design forces callers to silently lose the resource on any close error with no way to recover.","fix":"Implement Drop for MqdT that calls libc::mq_close and logs or ignores errors (similar to how std::fs::File::drop works). This matches the pattern used by OwnedFd. Alternatively, make mq_close take &mut MqdT and only consume it on success, returning ownership on failure.","locations":[{"ref":"src/mqueue.rs:85-85","code":"   85 | pub struct MqdT(mqd_t);","lines":1},{"ref":"src/mqueue.rs:189-192","code":"  189 | pub fn mq_close(mqdes: MqdT) -> Result<()> {\n  190 |     let res = unsafe { libc::mq_close(mqdes.0) };\n  191 |     Errno::result(res).map(drop)\n  192 | }","lines":4}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":false,"description":"`From<User> for libc::passwd` (lines 3649-3716) converts a `User` into a `libc::passwd` by calling\n`.into_raw()` on `CString` values and storing the resulting raw pointers in the struct. The raw\npointers are now owned by the `libc::passwd` struct, but `libc::passwd` has no `Drop` impl and Rust\nwill never free these allocations. Any code that creates a `libc::passwd` via this `From` impl and\nthen drops it will leak the memory pointed to by `pw_name`, `pw_passwd`, `pw_dir`, `pw_shell` (and\non BSD targets `pw_gecos`, `pw_class`). The same pattern applies to the dummy empty `CString`\nfallback allocations on lines 3653, 3657, 3661, 3709, 3711.","fix":"Document that callers must free the pointers before dropping the struct, or wrap the result in a type that implements `Drop` and frees them. Alternatively, remove the `From` impl if it is not needed by any public API.","locations":[{"ref":"src/unistd.rs:3649-3716","code":" 3649 | impl From<User> for libc::passwd {\n 3650 |     fn from(u: User) -> Self {\n 3651 |         let name = match CString::new(u.name) {\n 3652 |             Ok(n) => n.into_raw(),\n 3653 |             Err(_) => CString::new(\"\").unwrap().into_raw(),\n 3654 |         };\n 3655 |         let dir = match u.dir.into_os_string().into_string() {\n 3656 |             Ok(s) => CString::new(s.as_str()).unwrap().into_raw(),\n 3657 |             Err(_) => CString::new(\"\").unwrap().into_raw(),\n 3658 |         };\n 3659 |         let shell = match u.shell.into_os_string().into_string() {\n 3660 |             Ok(s) => CString::new(s.as_str()).unwrap().into_raw(),\n 3661 |             Err(_) => CString::new(\"\").unwrap().into_raw(),\n 3662 |         };\n 3663 |         Self {\n 3664 |             pw_name: name,\n 3665 |             pw_passwd: u.passwd.into_raw(),\n 3666 |             #[cfg(not(all(\n 3667 |                 target_os = \"android\",\n 3668 |                 target_pointer_width = \"32\"\n 3669 |             )))]\n 3670 |             pw_gecos: u.gecos.into_raw(),\n 3671 |             pw_dir: dir,\n 3672 |             pw_shell: shell,\n 3673 |             pw_uid: u.uid.0,\n 3674 |             pw_gid: u.gid.0,\n 3675 |             #[cfg(not(any(\n 3676 |                 linux_android,\n 3677 |                 solarish,\n 3678 |                 target_os = \"aix\",\n 3679 |                 target_os = \"fuchsia\",\n 3680 |                 target_os = \"haiku\",\n 3681 |                 target_os = \"hurd\",\n 3682 |                 target_os = \"emscripten\",\n 3683 |                 target_os = \"cygwin\",\n 3684 |             )))]\n 3685 |             pw_class: u.class.into_raw(),\n 3686 |             #[cfg(not(any(\n 3687 |                 linux_android,\n 3688 |                 solarish,\n 3689 |                 target_os = \"aix\",\n 3690 |                 target_os = \"fuchsia\",\n 3691 |                 target_os = \"haiku\",\n 3692 |                 target_os = \"hurd\",\n 3693 |                 target_os = \"emscripten\",\n 3694 |                 target_os = \"cygwin\",\n 3695 |             )))]\n 3696 |             pw_change: u.change,\n 3697 |             #[cfg(not(any(\n 3698 |                 linux_android,\n 3699 |                 solarish,\n 3700 |                 target_os = \"aix\",\n 3701 |                 target_os = \"fuchsia\",\n 3702 |                 target_os = \"haiku\",\n 3703 |                 target_os = \"hurd\",\n 3704 |                 target_os = \"emscripten\",\n 3705 |                 target_os = \"cygwin\",\n 3706 |             )))]\n 3707 |             pw_expire: u.expire,\n 3708 |             #[cfg(solarish)]\n 3709 |             pw_age: CString::new(\"\").unwrap().into_raw(),\n 3710 |             #[cfg(any(solarish, target_os = \"cygwin\"))]\n 3711 |             pw_comment: CString::new(\"\").unwrap().into_raw(),\n 3712 |             #[cfg(freebsdlike)]\n 3713 |             pw_fields: 0,\n 3714 |         }\n 3715 |     }\n 3716 | }","lines":68}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"PosixSpawnAttr::reinit and PosixSpawnFileActions::reinit both call posix_spawnattr_destroy / posix_spawn_file_actions_destroy and then posix_spawnattr_init / posix_spawn_file_actions_init on the same object. If the destroy succeeds but the init fails, the `?` operator causes an early return, dropping `self`. The Drop impl then calls destroy again on the already-destroyed object, which is undefined behaviour on any platform where destroy frees heap-allocated internal state (POSIX explicitly leaves this implementation-defined). On Linux/glibc, destroy is a no-op, so there is no immediate crash, but on musl, BSD, or other implementations the double-destroy may corrupt the allocator.","fix":"Use ManuallyDrop or std::mem::forget to prevent the Drop impl from running in the failure path, or restructure so that a new object is created from scratch rather than reusing self.","locations":[{"ref":"src/spawn.rs:40-56","code":"   40 |     pub fn reinit(mut self) -> Result<PosixSpawnAttr> {\n   41 |         let res = unsafe {\n   42 |             libc::posix_spawnattr_destroy(\n   43 |                 &mut self.attr as *mut libc::posix_spawnattr_t,\n   44 |             )\n   45 |         };\n   46 |         Errno::result(res)?;\n   47 | \n   48 |         let res = unsafe {\n   49 |             libc::posix_spawnattr_init(\n   50 |                 &mut self.attr as *mut libc::posix_spawnattr_t,\n   51 |             )\n   52 |         };\n   53 |         Errno::result(res)?;\n   54 | \n   55 |         Ok(self)\n   56 |     }","lines":17},{"ref":"src/spawn.rs:259-275","code":"  259 |     pub fn reinit(mut self) -> Result<PosixSpawnFileActions> {\n  260 |         let res = unsafe {\n  261 |             libc::posix_spawn_file_actions_destroy(\n  262 |                 &mut self.fa as *mut libc::posix_spawn_file_actions_t,\n  263 |             )\n  264 |         };\n  265 |         Errno::result(res)?;\n  266 | \n  267 |         let res = unsafe {\n  268 |             libc::posix_spawn_file_actions_init(\n  269 |                 &mut self.fa as *mut libc::posix_spawn_file_actions_t,\n  270 |             )\n  271 |         };\n  272 |         Errno::result(res)?;\n  273 | \n  274 |         Ok(self)\n  275 |     }","lines":17}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In `fanotify.rs`, `FanotifyEvent` closes its file descriptor in `Drop`. However, if `read_events` pushes events into `events` Vec and then panics (e.g. due to OOM in the Vec push), the already-pushed events would still be dropped correctly by the Vec's destructor. But if the copy in `ptr::copy_nonoverlapping` reads beyond valid memory (see the `event_len` logic-error finding), memory safety is violated before Drop can run. The memory leak scenario itself is not present here, but the `OwnedFd`-equivalents inside `FanotifyEvent` rely on correct parsing to be initialized.","fix":"Addressed by fixing the `event_len` validation in the logic_error finding above.","locations":[{"ref":"src/sys/fanotify.rs:357-383","code":"  357 |     pub fn read_events(&self) -> Result<Vec<FanotifyEvent>> {\n  358 |         let metadata_size = size_of::<libc::fanotify_event_metadata>();\n  359 |         const BUFSIZ: usize = 4096;\n  360 |         let mut buffer = [0u8; BUFSIZ];\n  361 |         let mut events = Vec::new();\n  362 |         let mut offset = 0;\n  363 | \n  364 |         let nread = read(&self.fd, &mut buffer)?;\n  365 | \n  366 |         while (nread - offset) >= metadata_size {\n  367 |             let metadata = unsafe {\n  368 |                 let mut metadata =\n  369 |                     MaybeUninit::<libc::fanotify_event_metadata>::uninit();\n  370 |                 ptr::copy_nonoverlapping(\n  371 |                     buffer.as_ptr().add(offset),\n  372 |                     metadata.as_mut_ptr().cast(),\n  373 |                     (BUFSIZ - offset).min(metadata_size),\n  374 |                 );\n  375 |                 metadata.assume_init()\n  376 |             };\n  377 | \n  378 |             events.push(FanotifyEvent(metadata));\n  379 |             offset += metadata.event_len as usize;\n  380 |         }\n  381 | \n  382 |         Ok(events)\n  383 |     }","lines":27}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In features.rs, the digit() function performs *dst *= 10; *dst += (b - b'0') as usize; without any overflow check. On a system whose kernel release string has a very long component (e.g., a custom kernel build with a long patch number), this would silently wrap on 64-bit and overflow on 32-bit usize, producing a wrong version comparison result and possibly enabling features on unsupported kernels.","fix":"Add a saturating_mul/saturating_add, or clamp the accumulator after each digit, or break out of the loop when the accumulated value exceeds a reasonable threshold.","locations":[{"ref":"src/features.rs:23-26","code":"   23 |     fn digit(dst: &mut usize, b: u8) {\n   24 |         *dst *= 10;\n   25 |         *dst += (b - b'0') as usize;\n   26 |     }","lines":4}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`aio_suspend` casts `list.len()` to `i32` without bounds checking:\n`list.len() as i32`.  If `list.len()` exceeds `i32::MAX` (2 147 483 647) the\ncast silently wraps to a negative value, causing `libc::aio_suspend` to receive\na negative count.","fix":"Use `i32::try_from(list.len()).map_err(|_| Errno::EINVAL)?` before the cast.","locations":[{"ref":"src/sys/aio.rs:1071","code":" 1071 |     Errno::result(unsafe { libc::aio_suspend(p, list.len() as i32, timep) })","lines":1}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `event.rs`, the deprecated `kevent` helper converts `timeout_ms: usize` to a `timespec` by computing `tv_nsec = ((timeout_ms % 1000) * 1_000_000) as c_long`. The multiplication `(timeout_ms % 1000) * 1_000_000` is done in `usize` arithmetic. On a 32-bit target where `usize` is 32 bits, `999 * 1_000_000 = 999_000_000` which fits, but if the compiler performs this in a signed context or if a reviewer misreads this as milliseconds, overflow could occur in a related expression. More concretely: `tv_sec = (timeout_ms / 1000) as time_t` - if `timeout_ms` is near `usize::MAX` (e.g. `usize::MAX / 1000` overflows `time_t` on 32-bit).","fix":"Use `u64` or checked arithmetic: `let ms = timeout_ms as u64; tv_sec = (ms / 1000) as time_t; tv_nsec = ((ms % 1000) * 1_000_000) as c_long;`.","locations":[{"ref":"src/sys/event.rs:527-530","code":"  527 |     let timeout = timespec {\n  528 |         tv_sec: (timeout_ms / 1000) as time_t,\n  529 |         tv_nsec: ((timeout_ms % 1000) * 1_000_000) as c_long,\n  530 |     };","lines":4}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"On platforms where ioctl_num_type is c_int (i32) - specifically Android, musl, ohos, fuchsia - the ioc! macro can produce signed integer overflow at runtime. For the generic Linux layout (DIRBITS=2, DIRSHIFT=30), a readwrite ioctl encodes direction READ|WRITE=3 shifted left by 30 bits: 3i32 << 30 = 0xC000_0000, which is negative and overflows i32. In Rust debug builds this panics; in release builds it wraps to a negative value. The kernel expects an unsigned 32-bit ioctl number, but receives a sign-extended negative value.","fix":"Use u32 as the intermediate type for the ioc! arithmetic before casting to ioctl_num_type. Alternatively, always use c_ulong/u64 for the computation and cast only at the final step, ensuring no overflow occurs.","locations":[{"ref":"src/sys/ioctl/linux.rs:95-109","code":"   95 |     ($dir:expr, $ty:expr, $nr:expr, $sz:expr) => {\n   96 |         (($dir as $crate::sys::ioctl::ioctl_num_type\n   97 |             & $crate::sys::ioctl::DIRMASK)\n   98 |             << $crate::sys::ioctl::DIRSHIFT)\n   99 |             | (($ty as $crate::sys::ioctl::ioctl_num_type\n  100 |                 & $crate::sys::ioctl::TYPEMASK)\n  101 |                 << $crate::sys::ioctl::TYPESHIFT)\n  102 |             | (($nr as $crate::sys::ioctl::ioctl_num_type\n  103 |                 & $crate::sys::ioctl::NRMASK)\n  104 |                 << $crate::sys::ioctl::NRSHIFT)\n  105 |             | (($sz as $crate::sys::ioctl::ioctl_num_type\n  106 |                 & $crate::sys::ioctl::SIZEMASK)\n  107 |                 << $crate::sys::ioctl::SIZESHIFT)\n  108 |     };\n  109 | }","lines":15},{"ref":"src/sys/ioctl/linux.rs:1-22","code":"    1 | use cfg_if::cfg_if;\n    2 | \n    3 | /// The datatype used for the ioctl number\n    4 | #[cfg(any(\n    5 |     target_os = \"android\",\n    6 |     target_os = \"fuchsia\",\n    7 |     target_os = \"cygwin\",\n    8 |     target_env = \"musl\",\n    9 |     target_env = \"ohos\"\n   10 | ))]\n   11 | #[doc(hidden)]\n   12 | pub type ioctl_num_type = ::libc::c_int;\n   13 | #[cfg(not(any(\n   14 |     target_os = \"android\",\n   15 |     target_os = \"fuchsia\",\n   16 |     target_os = \"cygwin\",\n   17 |     target_env = \"musl\",\n   18 |     target_env = \"ohos\"\n   19 | )))]\n   20 | #[doc(hidden)]\n   21 | pub type ioctl_num_type = ::libc::c_ulong;\n   22 | /// The datatype used for the 3rd argument","lines":22}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `sendfile.rs` (Linux/Solaris variant), `count: usize` is passed directly to `libc::sendfile` which expects `size_t`. On a 64-bit platform this is fine, but the function signature accepts `usize` while the kernel internally caps the transfer and returns `ssize_t`. The return value is then cast with `r as usize`, which would convert a negative `ssize_t` to a huge positive `usize` if `Errno::result` somehow failed to catch a negative return. In practice `Errno::result` guards this, but see below for the count truncation concern on 32-bit platforms where `usize` is 32 bits yet `size_t` in libc may still be `u32`, so no truncation actually occurs. However the FreeBSD/Dragonfly variants take `count: Option<usize>` and pass `count.unwrap_or(0)` (a Rust `usize`) to `libc::sendfile` which expects `size_t`. On ILP32 targets the usize is 32-bit so no truncation, but a future 128-bit target would truncate. This is a latent issue.","fix":"Add a bounds check or cast comment; for absolute safety use `count.try_into().map_err(|_| Errno::EINVAL)?` before passing to the syscall.","locations":[{"ref":"src/sys/sendfile.rs:36-48","code":"   36 | ) -> Result<usize> {\n   37 |     let offset = offset\n   38 |         .map(|offset| offset as *mut _)\n   39 |         .unwrap_or(ptr::null_mut());\n   40 |     let ret = unsafe {\n   41 |         libc::sendfile(\n   42 |             out_fd.as_fd().as_raw_fd(),\n   43 |             in_fd.as_fd().as_raw_fd(),\n   44 |             offset,\n   45 |             count,\n   46 |         )\n   47 |     };\n   48 |     Errno::result(ret).map(|r| r as usize)","lines":13},{"ref":"src/sys/sendfile.rs:280-287","code":"  280 |                 libc::sendfile(in_fd.as_fd().as_raw_fd(),\n  281 |                                out_sock.as_fd().as_raw_fd(),\n  282 |                                offset,\n  283 |                                count.unwrap_or(0),\n  284 |                                hdtr_ptr as *mut libc::sf_hdtr,\n  285 |                                &mut bytes_sent as *mut off_t,\n  286 |                                0)\n  287 |             };","lines":8}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`AlgSetKey::set` and `TcpUlp::set` cast `val.as_ref().len()` directly to `libc::socklen_t`\n(u32 on most platforms) without bounds checking.  On a platform where `usize` > 32 bits, a slice\nlonger than `u32::MAX` bytes would silently wrap around to a small value.  While uncommon in\npractice, the API contract should be enforced.","fix":"Use `socklen_t::try_from(len).map_err(|_| Errno::EINVAL)?` before the `setsockopt` call.","locations":[{"ref":"src/sys/socket/sockopt.rs:1399","code":" 1399 |                 val.as_ref().len() as libc::socklen_t,","lines":1},{"ref":"src/sys/socket/sockopt.rs:1447","code":" 1447 |             );","lines":1}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`SetUsize::new` casts `*val as c_int`, truncating any `usize` value larger than `i32::MAX`\n(or on 64-bit, larger than `c_int::MAX`) silently.  The truncated value is then passed as the\n`option_value` to `setsockopt` for `SO_RCVBUF` / `SO_SNDBUF` and other `usize`-typed options.\nA caller passing a large buffer size will silently get a negative or tiny value sent to the kernel.","fix":"Add a bounds check: `if *val > c_int::MAX as usize { return Err(Errno::EINVAL); }` before the\ncast, or use `c_int::try_from(*val).map_err(|_| Errno::EINVAL)?`.","locations":[{"ref":"src/sys/socket/sockopt.rs:1868","code":" 1868 |         SetUsize { val: *val as c_int }","lines":1}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `time.rs`, `TimeSpec::num_nanoseconds` computes `self.num_seconds() * 1_000_000_000` in `i64`. If `num_seconds()` is near `i64::MAX / 1_000_000_000` the multiplication overflows silently (no checked_mul). For `TS_MAX_SECONDS` on 64-bit (= i64::MAX/1e9 - 1 ≈ 9.2e9) the product is near `i64::MAX` so it barely fits, but `TimeSpec` values created via `TimeSpec::new()` (which bypasses the range check) or via `From<timespec>` can hold arbitrary `tv_sec`, so `num_nanoseconds()` can overflow.","fix":"Use `self.num_seconds().checked_mul(1_000_000_000).expect(\"TimeSpec::num_nanoseconds overflow\")` or saturate.","locations":[{"ref":"src/sys/time.rs:334","code":"  334 |         let secs = self.num_seconds() * 1_000_000_000;","lines":1}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Similarly `TimeVal::num_microseconds` computes `self.num_seconds() * 1_000_000` in `i64` without overflow check. A `TimeVal` with a large `tv_sec` (set via `TimeVal::new` or `From<timeval>`) can overflow.","fix":"Use checked multiplication, or document that the caller must only call this on values returned from the safe constructors.","locations":[{"ref":"src/sys/time.rs:605","code":"  605 |         let secs = self.num_seconds() * 1_000_000;","lines":1}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`lio_listio` casts `list.len()` to `i32` without overflow checking:\n`list.len() as i32`.  Same class of issue as in `aio_suspend`.","fix":"Use `i32::try_from(list.len()).map_err(|_| Errno::EINVAL)?`.","locations":[{"ref":"src/sys/aio.rs:1229","code":" 1229 |         libc::lio_listio(mode as i32, p, list.len() as i32, sigevp)","lines":1}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `epoll.rs`, `epoll_wait` (the deprecated free function) takes `timeout_ms: isize` and casts it to `c_int` as `timeout_ms as c_int`. On a 64-bit platform `isize` is 64 bits and `-1` is the infinite-wait sentinel, but any value outside `[i32::MIN, i32::MAX]` silently truncates to an incorrect timeout. An `isize` value like `10_000_000_000` would become a wrong (possibly positive) `c_int`.","fix":"Take `timeout_ms: i32` directly, or add a `TryInto<c_int>` conversion with an error return.","locations":[{"ref":"src/sys/epoll.rs:249","code":"  249 |             events.len() as c_int,","lines":1}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `sendfile.rs` (FreeBSD/Dragonfly), `hdr_cnt` and `trl_cnt` in `sf_hdtr` are computed as `v.len() as i32`. If a caller passes more than `i32::MAX` headers or trailers the cast wraps to a negative value, causing undefined behavior in the kernel call.","fix":"Assert or return an error if `v.len() > i32::MAX as usize` before casting.","locations":[{"ref":"src/sys/sendfile.rs:118","code":"  118 |                         hdr_cnt: header_iovecs.as_ref().map(|v| v.len()).unwrap_or(0) as i32,","lines":1},{"ref":"src/sys/sendfile.rs:125","code":"  125 |                         trl_cnt: trailer_iovecs.as_ref().map(|v| v.len()).unwrap_or(0) as i32","lines":1}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`AlgSetAeadAuthSize::set` casts `*val` (a `usize`) directly to `libc::socklen_t` and passes it\nas the *length* argument of `setsockopt` (where the kernel reads the auth size from `option_len`,\nnot from the data pointer).  On 64-bit Linux, `socklen_t` is `u32`, so any `usize` value above\n`u32::MAX` wraps silently.","fix":"Cast via `socklen_t::try_from(*val).map_err(|_| Errno::EINVAL)?`.","locations":[{"ref":"src/sys/socket/sockopt.rs:1365","code":" 1365 |                 *val as libc::socklen_t,","lines":1}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `sysinfo.rs`, `scale_mem` multiplies `units as u64 * self.0.mem_unit as u64`. If the `sysinfo` struct has `mem_unit = 1` and `totalram = u64::MAX` (possible on a theoretical 128-bit or future platform where `mem_blocks_t` is u64 and the system has that much RAM), the multiplication overflows. In practice on current 64-bit Linux `totalram` is bounded by physical RAM, but the computation is unchecked.","fix":"Use `units.checked_mul(self.0.mem_unit as u64).unwrap_or(u64::MAX)` to saturate instead of silently wrapping.","locations":[{"ref":"src/sys/sysinfo.rs:71-73","code":"   71 |     fn scale_mem(&self, units: mem_blocks_t) -> u64 {\n   72 |         units as u64 * self.0.mem_unit as u64\n   73 |     }","lines":3}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In `sethostname` (line 1318), `name.as_ref().len() as sethostname_len_t` truncates a `usize` to\n`c_int` or `size_t`. On platforms where `sethostname_len_t = c_int` (freebsd, solaris, apple,\naix), if the name length exceeds `i32::MAX` (theoretically possible, though the OS would reject it\nanyway), the cast silently produces a negative value, which the kernel would interpret as an invalid\nlength. In practice hostnames are bounded to ~255 bytes, so this never fires, but it is an\nunchecked narrowing cast.","fix":"Add a length check before casting, or use `try_from` with a proper error return.","locations":[{"ref":"src/unistd.rs:1305-1322","code":" 1305 | pub fn sethostname<S: AsRef<OsStr>>(name: S) -> Result<()> {\n 1306 |     // Handle some differences in type of the len arg across platforms.\n 1307 |     cfg_if! {\n 1308 |         if #[cfg(any(freebsdlike,\n 1309 |                      solarish,\n 1310 |                      apple_targets,\n 1311 |                      target_os = \"aix\"))] {\n 1312 |             type sethostname_len_t = c_int;\n 1313 |         } else {\n 1314 |             type sethostname_len_t = size_t;\n 1315 |         }\n 1316 |     }\n 1317 |     let ptr = name.as_ref().as_bytes().as_ptr().cast();\n 1318 |     let len = name.as_ref().len() as sethostname_len_t;\n 1319 | \n 1320 |     let res = unsafe { libc::sethostname(ptr, len) };\n 1321 |     Errno::result(res).map(drop)\n 1322 | }","lines":18}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In `getgroups` at line 1885, `(n + 1) as usize` is used to compute `ngroups_max` from the sysconf\nresult (type `c_long`). If `n == c_long::MAX` this addition overflows. In practice NGROUPS_MAX is\nalways small (typically 65536 on Linux), but the unchecked arithmetic is fragile.","fix":"Use `n.saturating_add(1) as usize` or check for overflow before adding.","locations":[{"ref":"src/unistd.rs:1885-1887","code":" 1885 |     let ngroups_max = match sysconf(SysconfVar::NGROUPS_MAX) {\n 1886 |         Ok(Some(n)) => (n + 1) as usize,\n 1887 |         Ok(None) | Err(_) => usize::MAX,","lines":3}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In ifaddrs.rs, the workaround_xnu_bug function copies (*src_sock).sa_len bytes from the source sockaddr. It does not verify that sa_len is <= sizeof(sockaddr_storage) before passing it to copy_nonoverlapping. If the kernel returns a corrupt or unexpectedly large sa_len value (e.g., 255), the copy would write beyond the end of the stack-allocated sockaddr_storage buffer, causing a stack buffer overflow.","fix":"Add a bounds check: if (*src_sock).sa_len as usize > mem::size_of::<libc::sockaddr_storage>() { return None; } before the copy_nonoverlapping call.","locations":[{"ref":"src/ifaddrs.rs:57-83","code":"   57 | unsafe fn workaround_xnu_bug(info: &libc::ifaddrs) -> Option<SockaddrStorage> {\n   58 |     let src_sock = info.ifa_netmask;\n   59 |     if src_sock.is_null() {\n   60 |         return None;\n   61 |     }\n   62 | \n   63 |     let mut dst_sock = mem::MaybeUninit::<libc::sockaddr_storage>::zeroed();\n   64 | \n   65 |     let dst_sock = unsafe {\n   66 |         // memcpy only sa_len bytes, assume the rest is zero\n   67 |         std::ptr::copy_nonoverlapping(\n   68 |             src_sock as *const u8,\n   69 |             dst_sock.as_mut_ptr().cast(),\n   70 |             (*src_sock).sa_len.into(),\n   71 |         );\n   72 | \n   73 |         // Initialize ss_len to sizeof(libc::sockaddr_storage).\n   74 |         (*dst_sock.as_mut_ptr()).ss_len =\n   75 |             u8::try_from(mem::size_of::<libc::sockaddr_storage>()).unwrap();\n   76 |         dst_sock.assume_init()\n   77 |     };\n   78 | \n   79 |     let dst_sock_ptr =\n   80 |         &dst_sock as *const libc::sockaddr_storage as *const libc::sockaddr;\n   81 | \n   82 |     unsafe { SockaddrStorage::from_raw(dst_sock_ptr, None) }\n   83 | }","lines":27}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In `VsockAddr::eq` on Apple targets (lines 2095-2108 of addr.rs), the comparison for `svm_len`\ncompares `inner.svm_len` against `inner.svm_len` (both from `self`) rather than against\n`other.svm_len`.  This means two `VsockAddr` values with different `svm_len` fields but equal\n`svm_family`, `svm_cid`, and `svm_port` will incorrectly compare as equal.","fix":"Change the second `inner.svm_len` on line 2107 to `other.svm_len`.","locations":[{"ref":"src/sys/socket/addr.rs:2094-2108","code":" 2094 |         #[cfg(apple_targets)]\n 2095 |         fn eq(&self, other: &Self) -> bool {\n 2096 |             let (inner, other) = (self.0, other.0);\n 2097 |             (\n 2098 |                 inner.svm_family,\n 2099 |                 inner.svm_cid,\n 2100 |                 inner.svm_port,\n 2101 |                 inner.svm_len,\n 2102 |             ) == (\n 2103 |                 other.svm_family,\n 2104 |                 other.svm_cid,\n 2105 |                 other.svm_port,\n 2106 |                 inner.svm_len,\n 2107 |             )\n 2108 |         }","lines":15}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"From<Termios> for libc::termios (line 251) returns the inner RefCell value without first synchronizing it from the public fields. If a user modifies termios.control_flags, termios.input_flags, etc. and then calls .into::<libc::termios>(), the returned libc::termios reflects the state the inner was last synced to (e.g. at construction time), not the current public field values. The sync only happens when get_libc_termios or get_libc_termios_mut is called. Any code path that calls .into() directly after mutating public fields will silently pass stale data.","fix":"Before returning inner.into_inner(), synchronize the inner struct from the public fields, mirroring what get_libc_termios does. For example: termios.get_libc_termios(); termios.inner.into_inner().","locations":[{"ref":"src/sys/termios.rs:249-253","code":"  249 | impl From<Termios> for libc::termios {\n  250 |     fn from(termios: Termios) -> Self {\n  251 |         termios.inner.into_inner()\n  252 |     }\n  253 | }","lines":5}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In features.rs, the kernel version parser treats any 2.7.x kernel as VERS_UNKNOWN (the same as pre-2.6). The comment says '2.7.x: unknown' but no 2.7 kernel was ever released. More importantly, if the actual minor version in the release string overflows because of long patch strings or the digit accumulator wraps, minor could spuriously become >= 7, silently marking a 2.6.28+ kernel as VERS_UNKNOWN and causing accept4/pipe2 to be treated as unavailable.","fix":"This is closely coupled to the overflow issue above. Fix the overflow and then confirm whether the 2.7 check is still needed.","locations":[{"ref":"src/features.rs:57-59","code":"   57 |             if minor >= 7 {\n   58 |                 VERS_UNKNOWN\n   59 |             } else if minor >= 6 {","lines":3}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In sched.rs, the clone() callback receives a *mut CloneCb (which is *mut Box<dyn FnMut() -> isize>). The parent's cb local variable is passed as &mut cb, meaning the child process holds a raw pointer into the parent's stack frame. If the parent returns from the clone() call before the child has finished executing the callback (which is possible when CLONE_VM is not set), the pointer becomes dangling and the child dereferences freed stack memory. When CLONE_VM is set the memory is shared but then the parent's cb moving out of scope creates a race.","fix":"This is a fundamental safety issue with the clone API that requires careful documentation. The safety requirements should be documented explicitly: the caller must ensure the child does not outlive the cb closure. Consider using a heap-allocated CloneCb.","locations":[{"ref":"src/sched.rs:113-133","code":"  113 |         extern \"C\" fn callback(data: *mut CloneCb) -> c_int {\n  114 |             let cb: &mut CloneCb = unsafe { &mut *data };\n  115 |             (*cb)() as c_int\n  116 |         }\n  117 | \n  118 |         let combined = flags.bits() | signal.unwrap_or(0);\n  119 |         let res = unsafe {\n  120 |             let ptr = stack.as_mut_ptr().add(stack.len());\n  121 |             let ptr_aligned = ptr.sub(ptr as usize % 16);\n  122 |             libc::clone(\n  123 |                 mem::transmute::<\n  124 |                     extern \"C\" fn(*mut Box<dyn FnMut() -> isize>) -> i32,\n  125 |                     extern \"C\" fn(*mut libc::c_void) -> i32,\n  126 |                 >(\n  127 |                     callback\n  128 |                         as extern \"C\" fn(*mut Box<dyn FnMut() -> isize>) -> i32,\n  129 |                 ),\n  130 |                 ptr_aligned as *mut c_void,\n  131 |                 combined,\n  132 |                 &mut cb as *mut _ as *mut c_void,\n  133 |             )","lines":21}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`AioFsync::submit` reads `aio_lio_opcode` to retrieve the fsync mode stored by\n`AioFsync::new`, replaces it with 0, then calls `aio_fsync(mode, p)`.  The\n`aio_lio_opcode` field is set to 0 before passing `p` to `libc::aio_fsync`.\nPOSIX does not require `aio_lio_opcode` to be zero for `aio_fsync`, but some\nkernels may inspect it.  More critically, after submit is called `mode()` will\nreturn `AioFsyncMode::try_from(0).unwrap()`, which maps to `O_SYNC` regardless\nof whether the original mode was `O_DSYNC`.  The `unwrap()` here also panics if\n0 is not a valid `AioFsyncMode` on a platform.","fix":"Store the mode in a separate struct field instead of overloading `aio_lio_opcode`; clear the opcode only after retrieving the mode, and remove the `unwrap()` in `mode()`.","locations":[{"ref":"src/sys/aio.rs:490-497","code":"  490 |     fn submit(mut self: Pin<&mut Self>) -> Result<()> {\n  491 |         let aiocb = &mut self.as_mut().aiocb().aiocb.0;\n  492 |         let mode = mem::replace(&mut aiocb.aio_lio_opcode, 0);\n  493 |         let p: *mut libc::aiocb = aiocb;\n  494 |         Errno::result(unsafe { libc::aio_fsync(mode, p) }).map(|_| {\n  495 |             self.aiocb().set_in_progress();\n  496 |         })\n  497 |     }","lines":8},{"ref":"src/sys/aio.rs:448-450","code":"  448 |     pub fn mode(&self) -> AioFsyncMode {\n  449 |         AioFsyncMode::try_from(self.aiocb.aiocb.0.aio_lio_opcode).unwrap()\n  450 |     }","lines":3}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `fanotify.rs`, `read_events` uses a fixed 4096-byte buffer and advances `offset` by `metadata.event_len as usize`. But `event_len` comes from the untrusted kernel-provided struct copied out of the buffer. If `event_len` is 0 (a malformed or unexpected event), the loop becomes infinite. Also, if `event_len` is larger than the remaining buffer bytes, the next iteration reads past valid data (the while-condition uses `nread - offset >= metadata_size`, not checking that `event_len <= nread - offset`).","fix":"After pushing the event, validate `metadata.event_len >= metadata_size as u32` and that `offset + metadata.event_len as usize <= nread`, and break or return an error if violated.","locations":[{"ref":"src/sys/fanotify.rs:366-383","code":"  366 |         while (nread - offset) >= metadata_size {\n  367 |             let metadata = unsafe {\n  368 |                 let mut metadata =\n  369 |                     MaybeUninit::<libc::fanotify_event_metadata>::uninit();\n  370 |                 ptr::copy_nonoverlapping(\n  371 |                     buffer.as_ptr().add(offset),\n  372 |                     metadata.as_mut_ptr().cast(),\n  373 |                     (BUFSIZ - offset).min(metadata_size),\n  374 |                 );\n  375 |                 metadata.assume_init()\n  376 |             };\n  377 | \n  378 |             events.push(FanotifyEvent(metadata));\n  379 |             offset += metadata.event_len as usize;\n  380 |         }\n  381 | \n  382 |         Ok(events)\n  383 |     }","lines":18}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `inotify.rs`, `read_events` advances `offset` by `header_size + event.len as usize`. `event.len` is a `u32` from the kernel and represents the padded filename field length. If the kernel returns a malformed event where `event.len` is 0 but a name was expected, or an extremely large value that causes `offset` to jump past `nread`, subsequent iterations read stale buffer bytes as events. Additionally, if `event.len > 0`, the code reads the filename starting at `offset + header_size` inside the current buffer, but there is no bounds check that `offset + header_size + event.len as usize <= nread`.","fix":"Validate `offset + header_size + event.len as usize <= nread` before reading the filename, and break or return an error if the check fails.","locations":[{"ref":"src/sys/inotify.rs:212-243","code":"  212 |         while (nread - offset) >= header_size {\n  213 |             let event = unsafe {\n  214 |                 let mut event = MaybeUninit::<libc::inotify_event>::uninit();\n  215 |                 ptr::copy_nonoverlapping(\n  216 |                     buffer.as_ptr().add(offset),\n  217 |                     event.as_mut_ptr().cast(),\n  218 |                     (BUFSIZ - offset).min(header_size),\n  219 |                 );\n  220 |                 event.assume_init()\n  221 |             };\n  222 | \n  223 |             let name = match event.len {\n  224 |                 0 => None,\n  225 |                 _ => {\n  226 |                     let ptr = unsafe {\n  227 |                         buffer.as_ptr().add(offset + header_size)\n  228 |                             as *const c_char\n  229 |                     };\n  230 |                     let cstr = unsafe { CStr::from_ptr(ptr) };\n  231 | \n  232 |                     Some(OsStr::from_bytes(cstr.to_bytes()).to_owned())\n  233 |                 }\n  234 |             };\n  235 | \n  236 |             events.push(InotifyEvent {\n  237 |                 wd: WatchDescriptor { wd: event.wd },\n  238 |                 mask: AddWatchFlags::from_bits_truncate(event.mask),\n  239 |                 cookie: event.cookie,\n  240 |                 name,\n  241 |             });\n  242 | \n  243 |             offset += header_size + event.len as usize;","lines":32}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In bsd.rs ptrace cont(), the addr argument is hardcoded to 1 as AddressType (line 115). On BSD, the addr argument to PT_CONTINUE specifies the address at which execution resumes, with 1 meaning 'continue from where execution was stopped'. This magic value 1 is correct per BSD ptrace semantics, but is undocumented and non-obvious. The kill() function uses 0 as AddressType (line 125), which on some BSDs is also a defined sentinel. Both casts from integer literals to raw pointer types are technically valid but should at minimum have explanatory comments.","fix":"Add comments explaining that 1 means 'resume at current PC' per BSD ptrace(2) semantics, and 0 is ignored for PT_KILL. Consider defining named constants for these sentinels.","locations":[{"ref":"src/sys/ptrace/bsd.rs:115","code":"  115 |         ptrace_other(Request::PT_CONTINUE, pid, 1 as AddressType, data)","lines":1},{"ref":"src/sys/ptrace/bsd.rs:125","code":"  125 |         ptrace_other(Request::PT_KILL, pid, 0 as AddressType, 0).map(drop)","lines":1}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `SigAction::new`, the `SaFlags_t` subtraction `(flags - SaFlags::SA_SIGINFO)`\nis used for all handler kinds that are not `SigHandler::SigAction`.  The `-`\noperator on bitflags types is not guaranteed to clear the bit; it depends on the\nspecific bitflags macro implementation.  The safer and more explicit idiom is\n`flags & !SaFlags::SA_SIGINFO` (bitwise-AND with complement).  If the macro's\n`-` clears the bit this is fine, but it is fragile and unclear.","fix":"Replace `(flags - SaFlags::SA_SIGINFO).bits()` with `(flags & !SaFlags::SA_SIGINFO).bits()`.","locations":[{"ref":"src/sys/signal.rs:859","code":"  859 |                 _ => (flags - SaFlags::SA_SIGINFO).bits(),","lines":1}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`ControlMessage::AlgSetIv::len()` (line 1531 in mod.rs) returns\n`mem::size_of::<&[u8]>() + iv.len()`.  On 64-bit systems `mem::size_of::<&[u8]>()` is 16 bytes\n(fat pointer: ptr + len), but the actual on-wire prefix written by `copy_to_cmsg_data` (lines\n1432-1453) uses `libc::af_alg_iv { ivlen: u32, iv: [u8; 0] }`, which is only 4 bytes.  So the\n`space()` / `cmsg_len()` calculations over-estimate the IV message size by 12 bytes on 64-bit,\nwasting buffer space, though the actual copy is correct.  On a 32-bit target the fat pointer is 8\nbytes so the discrepancy is 4.  This does not corrupt memory but causes unnecessary allocation.","fix":"Change `len()` for `AlgSetIv` to return `mem::size_of::<libc::af_alg_iv>() + iv.len()` (i.e.\n`4 + iv.len()`), matching the actual bytes written.","locations":[{"ref":"src/sys/socket/mod.rs:1530-1532","code":" 1530 |             ControlMessage::AlgSetIv(iv) => {\n 1531 |                 mem::size_of::<&[u8]>() + iv.len()\n 1532 |             },","lines":3},{"ref":"src/sys/socket/mod
