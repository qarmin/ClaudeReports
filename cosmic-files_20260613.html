he overloaded usize encoding.","locations":[{"ref":"src/dialog.rs:606-628","code":"  606 |         for (choice_i, choice) in self.choices.iter().enumerate() {\n  607 |             match choice {\n  608 |                 DialogChoice::CheckBox { label, value, .. } => {\n  609 |                     row = row.push(\n  610 |                         widget::checkbox(*value)\n  611 |                             .label(label)\n  612 |                             .on_toggle(move |checked| {\n  613 |                                 Message::Choice(choice_i, usize::from(checked))\n  614 |                             }),\n  615 |                     );\n  616 |                 }\n  617 |                 DialogChoice::ComboBox {\n  618 |                     label,\n  619 |                     options,\n  620 |                     selected,\n  621 |                     ..\n  622 |                 } => {\n  623 |                     row = row.push(widget::text::heading(label));\n  624 |                     row = row.push(widget::dropdown(options, *selected, move |option_i| {\n  625 |                         Message::Choice(choice_i, option_i)\n  626 |                     }));\n  627 |                 }\n  628 |             }","lines":23},{"ref":"src/dialog.rs:1378-1392","code":" 1378 |             Message::Choice(choice_i, option_i) => {\n 1379 |                 if let Some(choice) = self.choices.get_mut(choice_i) {\n 1380 |                     match choice {\n 1381 |                         DialogChoice::CheckBox { value, .. } => *value = option_i > 0,\n 1382 |                         DialogChoice::ComboBox {\n 1383 |                             options, selected, ..\n 1384 |                         } => {\n 1385 |                             if option_i < options.len() {\n 1386 |                                 *selected = Some(option_i);\n 1387 |                             } else {\n 1388 |                                 *selected = None;\n 1389 |                             }\n 1390 |                         }\n 1391 |                     }\n 1392 |                 }","lines":15}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Message::DialogUpdate writes to dialog_pages[0] (the front) but DialogCancel/DialogComplete pop_front. If two dialog pages are ever queued (e.g. a NewFolder push_back while a Replace is shown, or vice versa), an on_input update targeting the visible page (front) is correct, but DialogUpdate indexes [0] while the rest of the code treats the queue as a stack via push_back. Mixing push_back with front-based editing means the displayed page (front) and a newly pushed page (back) can desynchronize. Currently only one page is ever shown so impact is low, but the queue/stack model is inconsistent.","fix":"Pick one model: either a single Option<DialogPage>, or consistently push_front/pop_front. Editing front via index [0] is fine only if pushes also go to the front.","locations":[{"ref":"src/dialog.rs:1431-1435","code":" 1431 |             Message::DialogUpdate(dialog_page) => {\n 1432 |                 if !self.dialog_pages.is_empty() {\n 1433 |                     self.dialog_pages[0] = dialog_page;\n 1434 |                 }\n 1435 |             }","lines":5},{"ref":"src/dialog.rs:1578-1581","code":" 1578 |                     self.dialog_pages.push_back(DialogPage::NewFolder {\n 1579 |                         parent: path.clone(),\n 1580 |                         name: String::new(),\n 1581 |                     });","lines":4},{"ref":"src/dialog.rs:1718-1721","code":" 1718 |                         self.dialog_pages.push_back(DialogPage::Replace {\n 1719 |                             filename: filename.clone(),\n 1720 |                         });\n 1721 |                         return widget::button::focus(REPLACE_BUTTON_ID.clone());","lines":4}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `should_use_dedicated_worker`, `mb_needed = bytes_needed / MB_TO_BYTES` truncates toward zero, so an image needing e.g. 1.9 MB reports 1 MB. The comparison `mb_needed > per_worker_budget_mb` therefore under-counts the real requirement and can route a too-large image to the shared parallel pool, undershooting the memory budget. The same truncation appears in `check_ram_available` (line 204) but there the precise `bytes_needed` is used for the actual comparison, so only the dedicated-worker routing decision is affected.","fix":"Compare bytes directly: `if bytes_needed > per_worker_budget_mb.saturating_mul(MB_TO_BYTES)`, avoiding the lossy MB truncation for the routing decision.","locations":[{"ref":"src/large_image.rs:131-134","code":"  131 |     let mb_needed = bytes_needed / MB_TO_BYTES;\n  132 |     let per_worker_budget_mb = total_budget_mb / parallel_workers as u64;\n  133 | \n  134 |     if mb_needed > per_worker_budget_mb {","lines":4}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`decode_large_image` sets `limits.max_alloc` but never sets `limits.max_image_width`/`max_image_height`. `max_alloc` bounds a single allocation during decode, but a decompression-bomb image (e.g. tiny PNG declaring huge dimensions) can still allocate the final RGBA buffer up to GALLERY_MEMORY_LIMIT_MB (2 GB decimal). The RAM availability check in `try_decode` mitigates this on Linux only; on Windows/macOS there is no RAM gate, so a 2 GB allocation can be attempted.","fix":"Also set `limits.max_image_width` and `limits.max_image_height` to sane caps so malformed/bomb images are rejected before allocating the decoded buffer, on all platforms.","locations":[{"ref":"src/large_image.rs:277-279","code":"  277 |                         let mut limits = image::Limits::default();\n  278 |                         limits.max_alloc = Some(GALLERY_MEMORY_LIMIT_MB * DECIMAL_MB_TO_BYTES);\n  279 |                         reader.limits(limits);","lines":3}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`needs_redecode_for_size` divides `new_size.0 as f32 / old_size.0 as f32` (and height) without guarding against a stored `old_size` of 0. A previously stored display size of (0, 0) would produce inf/NaN; `inf > 0.2` is true so it would force redecode, NaN comparisons are false so it would not. Stored sizes come from `try_decode`'s `display_dimensions` which can in principle be (0,0). Low impact (worst case is a spurious redecode) but the math is unguarded.","fix":"Return false early if either component of `old_size` is 0, or use checked ratio computation.","locations":[{"ref":"src/large_image.rs:462-466","code":"  462 |         let width_increase = (new_size.0 as f32 / old_size.0 as f32) - 1.0;\n  463 |         let height_increase = (new_size.1 as f32 / old_size.1 as f32) - 1.0;\n  464 | \n  465 |         let needs_redecode =\n  466 |             width_increase > REDECODE_THRESHOLD || height_increase > REDECODE_THRESHOLD;","lines":5}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"selected_desktop_entry is only set when the matched .desktop item is encountered while `selected == 1` (i.e., it is the first selected item). If a non-desktop item is selected first and a single .desktop second, selected would be 2 at that point and the entry is never captured — but more subtly, if the FIRST selected item is a .desktop and a second item is then selected, selected_desktop_entry stays Some while selected becomes 2; the later `if selected == 1` guard (line 169) nullifies it, so behavior is correct, yet the in-loop `selected == 1` guard at line 144 is redundant/confusing and couples capture order to selection order.","fix":"Capture the desktop-entry candidate independent of count, then gate solely on the final `selected == 1` check, or document the order coupling.","locations":[{"ref":"src/menu.rs:143-148","code":"  143 |                     Some(Location::Path(path))\n  144 |                         if selected == 1\n  145 |                             && path.extension().and_then(|s| s.to_str()) == Some(\"desktop\") =>\n  146 |                     {\n  147 |                         selected_desktop_entry = Some(&**path);\n  148 |                     }","lines":6},{"ref":"src/menu.rs:168-177","code":"  168 |     let selected_desktop_entry = selected_desktop_entry.and_then(|path| {\n  169 |         if selected == 1 {\n  170 |             let lang_id = crate::localize::LANGUAGE_LOADER.current_language();\n  171 |             let language = lang_id.language.as_str();\n  172 |             // Cache?\n  173 |             cosmic::desktop::load_desktop_file(&[language.into()], path.into())\n  174 |         } else {\n  175 |             None\n  176 |         }\n  177 |     });","lines":10}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"menu_bar computes delete_item/delete_item_action with two arms that both yield Action::Delete and differ only in the label string. The action is identical, so the shift/in_trash branch only changes the displayed text; the actual permanent-vs-trash decision must happen elsewhere (in Action::Delete handling). This is easy to misread as routing to different actions and is brittle: label and behavior are decided in two separate places keyed on the same modifier.","fix":"Either select label only (drop the tuple), or route to a distinct Action::PermanentlyDelete for the shift/in_trash case to keep label and behavior in sync.","locations":[{"ref":"src/menu.rs:624-628","code":"  624 |     let (delete_item, delete_item_action) = if in_trash || modifiers.shift() {\n  625 |         (fl!(\"delete-permanently\"), Action::Delete)\n  626 |     } else {\n  627 |         (fl!(\"move-to-trash\"), Action::Delete)\n  628 |     };","lines":5}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In menu_bar's File menu, the 'open' enabled predicate is `(selected > 0 && selected_dir == 0) || (selected_dir == 1 && selected == 1)`. This disables Open when multiple directories are selected, or when a mix of files and dirs is selected, even though the corresponding context_menu uses the same predicate to SHOW Open. Consistent with context menu, but means multi-directory selection cannot be opened from the menu bar; verify this matches intended UX (it silently greys out Open for >1 selected dirs).","fix":"If opening multiple directories is intended (e.g. open-in-new-tabs), broaden the predicate; otherwise document the limitation.","locations":[{"ref":"src/menu.rs:647-652","code":"  647 |                         menu_button_optional(\n  648 |                             fl!(\"open\"),\n  649 |                             Action::Open,\n  650 |                             (selected > 0 && selected_dir == 0)\n  651 |                                 || (selected_dir == 1 && selected == 1),\n  652 |                         ),","lines":6},{"ref":"src/menu.rs:218-221","code":"  218 |             } else if selected > 0 {\n  219 |                 if selected_dir == 1 && selected == 1 || selected_dir == 0 {\n  220 |                     children.push(menu_item(fl!(\"open\"), Action::Open).into());\n  221 |                 }","lines":4}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"State::click hardcodes mouse::Button::Left when constructing the chained Click regardless of which button triggered it. It is currently only called from the left-button/touch press path (line 601), so this is latent, but the function name and signature suggest general use; calling it for another button would mislabel the click and corrupt double-click detection.","fix":"Pass the actual mouse::Button into State::click, or document that it is left/touch only.","locations":[{"ref":"src/mouse_area.rs:261-285","code":"  261 |     fn click(&mut self, pos: Point) -> mouse::Click {\n  262 |         let now = Instant::now();\n  263 | \n  264 |         let new = if let Some((prev_click, prev_time)) = self.prev_click.take() {\n  265 |             if now.duration_since(prev_time) < DOUBLE_CLICK_DURATION {\n  266 |                 match prev_click.kind() {\n  267 |                     mouse::click::Kind::Single => {\n  268 |                         mouse::Click::new(pos, mouse::Button::Left, Some(prev_click))\n  269 |                     }\n  270 |                     mouse::click::Kind::Double => {\n  271 |                         mouse::Click::new(pos, mouse::Button::Left, Some(prev_click))\n  272 |                     }\n  273 |                     mouse::click::Kind::Triple => {\n  274 |                         mouse::Click::new(pos, mouse::Button::Left, Some(prev_click))\n  275 |                     }\n  276 |                 }\n  277 |             } else {\n  278 |                 mouse::Click::new(pos, mouse::Button::Left, None)\n  279 |             }\n  280 |         } else {\n  281 |             mouse::Click::new(pos, mouse::Button::Left, None)\n  282 |         };\n  283 |         self.prev_click = Some((new, now));\n  284 |         new\n  285 |     }","lines":25},{"ref":"src/mouse_area.rs:598-619","code":"  598 |     if let Event::Mouse(mouse::Event::ButtonPressed(mouse::Button::Left))\n  599 |     | Event::Touch(touch::Event::FingerPressed { .. }) = event\n  600 |     {\n  601 |         let click = state.click(cursor.position_in(layout_bounds).unwrap_or_default());\n  602 |         match click.kind() {\n  603 |             click::Kind::Single => {\n  604 |                 if let Some(message) = widget.on_press.as_ref() {\n  605 |                     shell.publish(message(cursor.position_in(layout_bounds)));\n  606 |                 }\n  607 |             }\n  608 |             click::Kind::Double => {\n  609 |                 if let Some(message) = widget.on_double_click.as_ref() {\n  610 |                     shell.publish(message(cursor.position_in(layout_bounds)));\n  611 |                 }\n  612 |             }\n  613 |             click::Kind::Triple => {\n  614 |                 // TODO what to do here\n  615 |                 if let Some(message) = widget.on_press.as_ref() {\n  616 |                     shell.publish(message(cursor.position_in(layout_bounds)));\n  617 |                 }\n  618 |             }\n  619 |         }","lines":22}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"on_resize fires whenever the viewport Rectangle changes (position or size), not only on size changes. viewport_changed is `state.viewport != Some(*viewport)`, which is true on scroll/translation as well as resize. Consumers expecting a true resize callback will be invoked on scroll. The trait is named OnResize and docs say 'on resizing'.","fix":"Compare only viewport.size() if the intent is resize, or rename/redocument to 'on viewport change'.","locations":[{"ref":"src/mouse_area.rs:531-539","code":"  531 |     let viewport_changed = state.viewport != Some(*viewport);\n  532 | \n  533 |     if let Some(message) = widget.on_resize.as_ref()\n  534 |         && viewport_changed\n  535 |     {\n  536 |         shell.publish(message(*viewport));\n  537 |     }\n  538 | \n  539 |     state.viewport = Some(*viewport);","lines":9}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Operation::Delete` (move-to-trash) ignores the `_items_opt` result from `trash::delete` (mod.rs:861-864) and never aggregates failures: each path is trashed in a separate spawn_blocking and any per-path error is propagated by `?` aborting the rest, while a successful-but-empty trash result is silently dropped. There is also no overwrite/conflict handling and no `OperationSelection` of trashed items returned for undo (the TODO at mod.rs:864 notes restore is not wired up).","fix":"Capture trash items for undo support and decide on partial-failure semantics (collect and continue, or clearly report which paths failed).","locations":[{"ref":"src/operation/mod.rs:849-867","code":"  849 |             Self::Delete { paths } => {\n  850 |                 let total = paths.len();\n  851 |                 for (i, path) in paths.into_iter().enumerate() {\n  852 |                     futures::executor::block_on(async {\n  853 |                         controller\n  854 |                             .check()\n  855 |                             .await\n  856 |                             .map_err(|s| OperationError::from_state(s, &controller))\n  857 |                     })?;\n  858 | \n  859 |                     controller.set_progress((i as f32) / (total as f32));\n  860 | \n  861 |                     let _items_opt = compio::runtime::spawn_blocking(|| trash::delete(path))\n  862 |                         .await\n  863 |                         .map_err(wrap_compio_spawn_error)?;\n  864 |                     //TODO: items_opt allows for easy restore\n  865 |                 }\n  866 |                 Ok(OperationSelection::default())\n  867 |             }","lines":19}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`EmptyTrash` reports overall failure if any item fails to purge (mod.rs:939-954), but `DeleteTrash` purges items one-by-one and aborts on the first error via `?` (mod.rs:893-894), leaving the remaining selected trash items un-deleted with no indication of which succeeded. The two trash-deletion paths have inconsistent partial-failure handling; DeleteTrash should collect errors and continue like EmptyTrash does, or at least report which items were not deleted.","fix":"Make DeleteTrash collect per-item errors and continue (mirroring EmptyTrash at mod.rs:921-954) so a single bad item does not silently abort deletion of the rest.","locations":[{"ref":"src/operation/mod.rs:883-901","code":"  883 |                         for (i, item) in items.into_iter().enumerate() {\n  884 |                             futures::executor::block_on(async {\n  885 |                                 controller\n  886 |                                     .check()\n  887 |                                     .await\n  888 |                                     .map_err(|s| OperationError::from_state(s, &controller))\n  889 |                             })?;\n  890 | \n  891 |                             controller.set_progress(i as f32 / count as f32);\n  892 | \n  893 |                             trash::os_limited::purge_all([item])\n  894 |                                 .map_err(|e| OperationError::from_err(e, &controller))?;\n  895 |                         }\n  896 |                         Ok(())\n  897 |                     })\n  898 |                     .await\n  899 |                     .map_err(wrap_compio_spawn_error)?\n  900 |                     .map_err(|e| OperationError::from_err(e, &controller))?;\n  901 |                 }","lines":19}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"format_size uses decimal SI units (KB=1000, MB=1000*KB, ...) and labels them 'KB'/'MB'/'GB'/'TB'. For a file manager users typically expect either binary units (KiB) or at least consistency with the rest of the desktop; using 1000-based divisions with 'KB' labels yields sizes that disagree with `ls -l`/`du` (which often use 1024) and the label is technically ambiguous. (Flagged as a correctness/expectation issue, not a crash.)","fix":"Confirm the intended unit convention; if binary is desired use 1024 with KiB/MiB labels, otherwise the current SI choice is fine but should be intentional/documented.","locations":[{"ref":"src/tab.rs:342-359","code":"  342 | fn format_size(size: u64) -> String {\n  343 |     const KB: u64 = 1000;\n  344 |     const MB: u64 = 1000 * KB;\n  345 |     const GB: u64 = 1000 * MB;\n  346 |     const TB: u64 = 1000 * GB;\n  347 | \n  348 |     if size >= TB {\n  349 |         format!(\"{:.1} TB\", size as f64 / TB as f64)\n  350 |     } else if size >= GB {\n  351 |         format!(\"{:.1} GB\", size as f64 / GB as f64)\n  352 |     } else if size >= MB {\n  353 |         format!(\"{:.1} MB\", size as f64 / MB as f64)\n  354 |     } else if size >= KB {\n  355 |         format!(\"{:.1} KB\", size as f64 / KB as f64)\n  356 |     } else {\n  357 |         format!(\"{size} B\")\n  358 |     }\n  359 | }","lines":18}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"format_time / FormatTime::from_secs only handle timestamps in the past: from_secs computes now - (now - secs) and returns None if secs is in the future (now_secs.checked_sub(secs) fails) or negative. File mtimes slightly in the future (clock skew, network filesystems, archives) will render as no time at all instead of the actual date, silently dropping the Modified column for such files.","fix":"Construct the SystemTime directly from the epoch seconds (UNIX_EPOCH +/- Duration) handling both past and future, rather than the now-relative subtraction dance.","locations":[{"ref":"src/tab.rs:409-428","code":"  409 |     fn from_secs(\n  410 |         secs: i64,\n  411 |         date_time_formatter: &'a DateTimeFormatter<fieldsets::YMDT>,\n  412 |         time_formatter: &'a DateTimeFormatter<fieldsets::T>,\n  413 |     ) -> Option<Self> {\n  414 |         // This looks convoluted because we need to ensure the units match up\n  415 |         let secs: u64 = secs.try_into().ok()?;\n  416 |         let now = SystemTime::now();\n  417 |         let filetime_diff = now\n  418 |             .duration_since(SystemTime::UNIX_EPOCH)\n  419 |             .map(|from_epoch| from_epoch.as_secs())\n  420 |             .ok()\n  421 |             .and_then(|now_secs| now_secs.checked_sub(secs))\n  422 |             .map(Duration::from_secs)?;\n  423 |         now.checked_sub(filetime_diff).map(|time| Self {\n  424 |             time,\n  425 |             date_time_formatter,\n  426 |             time_formatter,\n  427 |         })\n  428 |     }","lines":20}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"children_opt for directories is populated with fs::read_dir(path).count() during item creation (item_from_entry / item_from_gvfs_info), which counts ALL entries including hidden files (dotfiles). The displayed 'N items' count therefore includes hidden files even when show_hidden is off, so the count shown in list/preview can disagree with what the user actually sees inside the folder.","fix":"Either document that the count includes hidden entries, or filter dotfiles to match the show_hidden setting (noting the count is computed at scan time, independent of the viewing tab's config).","locations":[{"ref":"src/tab.rs:824-837","code":"  824 |     let mut children_opt = None;\n  825 |     let mut dir_size = DirSize::NotDirectory;\n  826 |     if metadata.is_dir() && !remote {\n  827 |         dir_size = DirSize::Calculating(Controller::default());\n  828 |         //TODO: calculate children in the background (and make it cancellable?)\n  829 |         match fs::read_dir(&path) {\n  830 |             Ok(entries) => {\n  831 |                 children_opt = Some(entries.count());\n  832 |             }\n  833 |             Err(err) => {\n  834 |                 log::warn!(\"failed to read directory {}: {}\", path.display(), err);\n  835 |             }\n  836 |         }\n  837 |     }","lines":14},{"ref":"src/tab.rs:685-698","code":"  685 |     let mut children_opt = None;\n  686 |     let mut dir_size = DirSize::NotDirectory;\n  687 |     if is_dir && !remote {\n  688 |         dir_size = DirSize::Calculating(Controller::default());\n  689 |         //TODO: calculate children in the background (and make it cancellable?)\n  690 |         match fs::read_dir(&path) {\n  691 |             Ok(entries) => {\n  692 |                 children_opt = Some(entries.count());\n  693 |             }\n  694 |             Err(err) => {\n  695 |                 log::warn!(\"failed to read directory {}: {}\", path.display(), err);\n  696 |             }\n  697 |         }\n  698 |     }","lines":14}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"EditLocation::select uses `completions.len() - 1` for the backwards-wrap default. This is guarded by the preceding `completions.is_empty()` check so it cannot underflow in practice, but the value is computed via plain subtraction while the forward path carefully uses checked_add/checked_sub, an inconsistency that is fragile if the empty guard is ever refactored away.","fix":"Use completions.len().checked_sub(1).unwrap_or(0) for consistency and defense-in-depth.","locations":[{"ref":"src/tab.rs:1374-1402","code":" 1374 |     pub fn select(&mut self, forwards: bool) {\n 1375 |         if let Some(completions) = &self.completions {\n 1376 |             if completions.is_empty() {\n 1377 |                 self.selected = None;\n 1378 |             } else {\n 1379 |                 let mut selected = if forwards {\n 1380 |                     self.selected.and_then(|x| x.checked_add(1)).unwrap_or(0)\n 1381 |                 } else {\n 1382 |                     self.selected\n 1383 |                         .and_then(|x| x.checked_sub(1))\n 1384 |                         .unwrap_or(completions.len() - 1)\n 1385 |                 };\n 1386 |                 if selected >= completions.len() {\n 1387 |                     selected = 0;\n 1388 |                 }\n 1389 |                 self.selected = Some(selected);\n 1390 | \n 1391 |                 // Automatically resolve if there is only one completion\n 1392 |                 if completions.len() == 1\n 1393 |                     && let Some(resolved) = self.resolve()\n 1394 |                 {\n 1395 |                     self.location = resolved;\n 1396 |                     self.selected = None;\n 1397 |                 }\n 1398 |             }\n 1399 |         } else {\n 1400 |             self.selected = None;\n 1401 |         }\n 1402 |     }","lines":29}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`thumbnail_uri` calls `fs::canonicalize(path)`, which resolves symlinks and requires the file to exist. This means the thumbnail cache key is keyed on the canonical (symlink-resolved) path, so two different symlink paths pointing at the same target share a thumbnail (usually fine), but it also means the URI written into the thumbnail differs from the freedesktop convention of using the original requested URI. More importantly, canonicalize fails (returns Err, propagated to `new`) for any not-yet-existing or permission-restricted path, disabling caching for those entirely.","fix":"Confirm the freedesktop spec expectation: the Thumb::URI should generally be the URI of the file as referenced. Consider using an absolute (non-canonicalized) path via `path.canonicalize().unwrap_or_else(|_| absolute path)` or `std::path::absolute` to remain robust when canonicalize fails.","locations":[{"ref":"src/thumbnail_cacher.rs:292-305","code":"  292 | fn thumbnail_uri(path: &Path) -> io::Result<String> {\n  293 |     let absolute_path = fs::canonicalize(path)?;\n  294 |     let url = Url::from_file_path(&absolute_path).map_err(|()| {\n  295 |         io::Error::other(format!(\n  296 |             \"failed to create URI for thumbnail_file: {}\",\n  297 |             absolute_path.display()\n  298 |         ))\n  299 |     })?;\n  300 |     // Technically square brackets don't need to be percent encoded,\n  301 |     // and they aren't by the url crate, but the thumbnailer used by\n  302 |     // Gnome Files does. In order to share thumbnails and not get duplicates\n  303 |     // we should do the same.\n  304 |     let url = url.as_str().replace('[', \"%5B\").replace(']', \"%5D\");\n  305 |     Ok(url)","lines":14}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `zoom_in_view`, values of `*icon_size` strictly between MAX_ZOOM (500) and step's post-loop value (525) are not clamped down to MAX_ZOOM. The final clamp `if *icon_size > step` uses `step == 525` (MAX_ZOOM + ZOOM_STEP) after the loop, so an icon size of e.g. 510 (which can come from a hand-edited or migrated config) stays 510 instead of being clamped to 500. Symmetrically `zoom_out_view` does not raise an out-of-range value below MIN_ZOOM (e.g. 40) up to MIN_ZOOM.","fix":"Clamp `*icon_size` to the [MIN_ZOOM, MAX_ZOOM] range up front, or compare against MAX_ZOOM/MIN_ZOOM constants in the final clamp rather than the over/undershot `step` value.","locations":[{"ref":"src/zoom.rs:16-30","code":"   16 | pub(crate) fn zoom_in_view(view: View, icon_sizes: &mut IconSizes) {\n   17 |     let icon_size = select_resized_icon(view, icon_sizes);\n   18 | \n   19 |     let mut step = MIN_ZOOM;\n   20 |     while step <= MAX_ZOOM {\n   21 |         if *icon_size < step {\n   22 |             *icon_size = step;\n   23 |             break;\n   24 |         }\n   25 |         step = step.saturating_add(ZOOM_STEP);\n   26 |     }\n   27 |     if *icon_size > step {\n   28 |         *icon_size = step;\n   29 |     }\n   30 | }","lines":15},{"ref":"src/zoom.rs:32-46","code":"   32 | pub(crate) fn zoom_out_view(view: View, icon_sizes: &mut IconSizes) {\n   33 |     let icon_size = select_resized_icon(view, icon_sizes);\n   34 | \n   35 |     let mut step = MAX_ZOOM;\n   36 |     while step >= MIN_ZOOM {\n   37 |         if *icon_size > step {\n   38 |             *icon_size = step;\n   39 |             break;\n   40 |         }\n   41 |         step = NonZeroU16::new(step.get().saturating_sub(ZOOM_STEP)).unwrap();\n   42 |     }\n   43 |     if *icon_size < step {\n   44 |         *icon_size = step;\n   45 |     }\n   46 | }","lines":15}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`copy_unique_path` loops `for n in 0..` with no upper bound; `n` is only used in `format!`, so its type defaults to `i32`. In the pathological case of billions of existing colliding names it would overflow (panic in debug, wrap in release). Practically unreachable, but the unbounded counter type is fragile.","fix":"Use an explicit unbounded type (e.g. `for n in 0u64..`) or cap the search with a sane upper bound and a fallback (e.g. random suffix).","locations":[{"ref":"src/operation/mod.rs:287-304","code":"  287 |         for n in 0.. {\n  288 |             let new_name = if n == 0 {\n  289 |                 file_name.to_string()\n  290 |             } else {\n  291 |                 match ext {\n  292 |                     Some(ref ext) => format!(\"{} ({} {}).{}\", stem, fl!(\"copy_noun\"), n, ext),\n  293 |                     None => format!(\"{} ({} {})\", stem, fl!(\"copy_noun\"), n),\n  294 |                 }\n  295 |             };\n  296 | \n  297 |             to.push(&new_name);\n  298 | \n  299 |             if !matches!(to.try_exists(), Ok(true)) {\n  300 |                 break;\n  301 |             }\n  302 |             // Continue if a copy with index exists\n  303 |             to.pop();\n  304 |         }","lines":18}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In handle_overlap the sort comparator computes the second key as `a.1.width * b.1.height`, mixing element `a`'s width with element `b`'s height. This is a copy-paste error: it should be `a.1.width * a.1.height` so that overlaps are sorted by their own area. The bug makes the sort order of overlapping surfaces "CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In select_last_pos_opt, the same column tie-break bug appears mirrored: `col.max(last_row)` is used instead of `col.max(last_col)` when two selected items are on the same row. The 'last selected position' can be wrong, breaking ItemRight/ItemDown navigation from a multi-selection.","fix":"Change `Ordering::Equal => (row, col.max(last_row))` to `Ordering::Equal => (row, col.max(last_col))`.","locations":[{"ref":"src/tab.rs:3214","code":" 3214 |                     Ordering::Equal => (row, col.max(last_row)),","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"When parsing a pasted `text/uri-list` or `x-special/gnome-copied-files` payload, any single malformed line aborts the entire `TryFrom` with `?`, discarding all paths parsed so far. A clipboard with one bad URI (e.g. a trailing comment line, a `# ...` comment that the uri-list spec actually permits, or a non-file scheme URL) makes the whole paste fail instead of pasting the valid entries. The uri-list format explicitly allows comment lines beginning with '#', which `Url::parse` will reject.","fix":"Skip blank lines and lines starting with '#' (per the text/uri-list spec), and on a parse/conversion error for an individual line log a warning and `continue` rather than returning an error for the whole payload.","locations":[{"ref":"src/clipboard.rs:135-141","code":"  135 |                 for line in text.lines() {\n  136 |                     let url = Url::parse(line)?;\n  137 |                     match url.to_file_path() {\n  138 |                         Ok(path) => paths.push(path),\n  139 |                         Err(()) => Err(format!(\"invalid file URL {url:?}\"))?,\n  140 |                     }\n  141 |                 }","lines":7},{"ref":"src/clipboard.rs:146-160","code":"  146 |                 for (i, line) in text.lines().enumerate() {\n  147 |                     if i == 0 {\n  148 |                         kind = match line {\n  149 |                             \"copy\" => ClipboardKind::Copy,\n  150 |                             \"cut\" => ClipboardKind::Cut { is_dnd: false },\n  151 |                             _ => Err(format!(\"unsupported clipboard operation {line:?}\"))?,\n  152 |                         };\n  153 |                     } else {\n  154 |                         let url = Url::parse(line)?;\n  155 |                         match url.to_file_path() {\n  156 |                             Ok(path) => paths.push(path),\n  157 |                             Err(()) => Err(format!(\"invalid file URL {url:?}\"))?,\n  158 |                         }\n  159 |                     }\n  160 |                 }","lines":15}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"On copy failure the partially-written destination is removed with `_ = compio::fs::remove_file(&self.to)` (recursive.rs:348-350), discarding the result. If that cleanup fails (e.g. permission change applied earlier at recursive.rs:481-488 made the file undeletable, or the path is now a directory), a corrupt/partial file is left behind silently with no log and no error surfaced to the user, who may mistake it for a complete copy.","fix":"Log a warning if the cleanup `remove_file` fails so partial files are not left silently, and ensure the destination is writable/deletable before attempting removal.","locations":[{"ref":"src/operation/recursive.rs:347-353","code":"  347 | \n  348 |                 if result.is_err() {\n  349 |                     _ = compio::fs::remove_file(&self.to).await;\n  350 |                 }\n  351 | \n  352 |                 crate::operation::actively_writing_remove(&self.to);\n  353 |                 return result;","lines":7}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Cross-device (EXDEV) detection during move relies on `err.raw_os_error() == Some(EXDEV)` after a failed `hard_link` (recursive.rs:373-396). `hard_link` can fail with EXDEV not only for cross-filesystem moves but the fallback only triggers on exactly EXDEV; other errors (e.g. EPERM when the source filesystem disallows hardlinks even within the same device, EMLINK for too many links, or EOPNOTSUPP) are returned as hard errors with no copy fallback, so legitimately movable files on filesystems that don't support hardlinks (FAT, some network mounts) will fail the move entirely instead of falling back to copy+remove.","fix":"Fall back to the copy path for the broader set of errors that indicate hard_link is unsupported (EXDEV, EPERM, EMLINK, EOPNOTSUPP/ENOTSUP), not EXDEV alone.","locations":[{"ref":"src/operation/recursive.rs:372-398","code":"  372 |                 // This is atomic and ensures `to` is not created by any other process\n  373 |                 match compio::fs::hard_link(&self.from, &self.to).await {\n  374 |                     Ok(()) => {}\n  375 |                     Err(err) => {\n  376 |                         // https://docs.rs/windows-sys/latest/windows_sys/Win32/Foundation/constant.ERROR_NOT_SAME_DEVICE.html\n  377 |                         #[cfg(windows)]\n  378 |                         const EXDEV: i32 = 17;\n  379 |                         #[cfg(unix)]\n  380 |                         const EXDEV: i32 = libc::EXDEV as _;\n  381 | \n  382 |                         if err.raw_os_error() == Some(EXDEV) {\n  383 |                             if cross_device_copy {\n  384 |                                 // Do not clean up if cross_device_copy is set\n  385 |                                 self.skipped.cleanup.set(true);\n  386 |                             }\n  387 |                             // Try standard copy if hard link fails with cross device error\n  388 |                             let mut copy_op = Self {\n  389 |                                 kind: OpKind::Copy,\n  390 |                                 from: self.from.clone(),\n  391 |                                 to: self.to.clone(),\n  392 |                                 skipped: self.skipped.clone(),\n  393 |                                 is_cleanup: self.is_cleanup,\n  394 |                             };\n  395 |                             return Box::pin(copy_op.run(ctx, progress)).await;\n  396 |                         }\n  397 |                         return Err(err.into());\n  398 |                     }","lines":27}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Permissions are copied to the destination before the file contents are written (recursive.rs:481-488). If the source file is read-only or has a restrictive mode, `set_permissions` applies that mode to the freshly created destination, then the subsequent `write_at` loop writes into it. On some filesystems/permission setups writing after setting a read-only mode on an open fd may still succeed (the fd was opened writable), but the ordering is fragile, and if the copy is interrupted the partial file is left with the final permissions before content is complete. Setting times/permissions should happen after content is fully written.","fix":"Write file contents first, then apply permissions and timestamps just before closing (as is already done for times at recursive.rs:563-585).","locations":[{"ref":"src/operation/recursive.rs:481-488","code":"  481 |         if let Some(metadata) = metadata.as_ref()\n  482 |             && let Err(why) = to_file.set_permissions(metadata.permissions()).await\n  483 |         {\n  484 |             // This error is not propagated upwards as some filesystems do not support setting permissions\n  485 |             if !matches!(why.kind(), std::io::ErrorKind::Unsupported) {\n  486 |                 tracing::warn!(?why, \"failed to set permissions for {}\", self.to.display(),);\n  487 |             }\n  488 |         }","lines":8}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"The Drop handler reads the destination directory with fs::read_dir to dedupe already-present paths, but on the early-return path (`from.paths.is_empty()`) it returns `commands` directly, bypassing the trailing logic at the end of update() that emits the context-menu close command and the scroll-to-top command. Returning mid-function from a handler in a function that has post-match side effects is fragile and can skip required UI updates.","fix":"Replace the early `return commands;` with breaking out of the dedupe loop / not pushing the DropFiles command, so control falls through to the common tail logic.","locations":[{"ref":"src/tab.rs:4462-4470","code":" 4462 |                         if let Ok(entries) = fs::read_dir(&to) {\n 4463 |                             for i in entries.into_iter().filter_map(Result::ok) {\n 4464 |                                 let i = i.path();\n 4465 |                                 from.paths.retain(|p| &i != p);\n 4466 |                                 if from.paths.is_empty() {\n 4467 |                                     log::info!(\"All dropped files already in target directory.\");\n 4468 |                                     return commands;\n 4469 |                                 }\n 4470 |                             }","lines":9}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The applet `FileManager::open` spawns `cosmic-files` and blocks on `child.wait()` inside a synchronous D-Bus method handler. A long-running (daemonized) cosmic-files process would block the zbus method return; combined with the `//TODO: return error?` this means D-Bus callers (ShowFolders/ShowItems/ShowItemProperties) never receive a meaningful error and may stall.","fix":"Do not block on `wait()` inside the interface method; spawn detached (as the main app does via spawn_detached) and return promptly, optionally mapping spawn failures to a D-Bus error.","locations":[{"ref":"cosmic-files-applet/src/file_manager.rs:12-33","code":"   12 |     fn open(&self, uris: &[&str], _startup_id: &str) {\n   13 |         match process::Command::new(\"cosmic-files\").args(uris).spawn() {\n   14 |             Ok(mut child) => {\n   15 |                 log::info!(\"spawned cosmic-files with id {:?}\", child.id());\n   16 |                 match child.wait() {\n   17 |                     Ok(status) => {\n   18 |                         if status.success() {\n   19 |                             log::info!(\"cosmic-files exited with {status}\");\n   20 |                         } else {\n   21 |                             log::warn!(\"failed to run cosmic-files: exited with {status}\");\n   22 |                         }\n   23 |                     }\n   24 |                     Err(err) => {\n   25 |                         log::warn!(\"failed to run cosmic-files: {err}\");\n   26 |                     }\n   27 |                 }\n   28 |             }\n   29 |             Err(err) => {\n   30 |                 log::warn!(\"failed to spawn cosmic-files: {err}\");\n   31 |             }\n   32 |         }\n   33 |     }","lines":22}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"update_notification() unwraps in three places when closing a notify_rust notification: `Arc::try_unwrap(notification_arc).unwrap()` (fails and panics if any other Arc clone still exists), `notification_mutex.into_inner().unwrap()` (panics on poisoned mutex), and `.await.unwrap()` on the spawn_blocking join (panics if the blocking task panicked). The code itself comments `//TODO: this is nasty`. A lingering Arc clone (the Message::Notification still in a queued message) would crash the app on operation completion.","fix":"Handle each fallible step gracefully: on `Arc::try_unwrap` failure, skip closing (or store back); use `into_inner().unwrap_or_else(PoisonError::into_inner)` style recovery; and match on the join result logging errors instead of unwrapping.","locations":[{"ref":"src/app.rs:1864-1875","code":" 1864 |             if let Some(notification_arc) = self.notification_opt.take() {\n 1865 |                 return Task::future(async move {\n 1866 |                     tokio::task::spawn_blocking(move || {\n 1867 |                         //TODO: this is nasty\n 1868 |                         let notification_mutex = Arc::try_unwrap(notification_arc).unwrap();\n 1869 |                         let notification = notification_mutex.into_inner().unwrap();\n 1870 |                         notification.close();\n 1871 |                     })\n 1872 |                     .await\n 1873 |                     .unwrap();\n 1874 |                     cosmic::action::app(Message::MaybeExit)\n 1875 |                 });","lines":12}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The gzip/tar/bzip2/xz extraction paths call `tar::Archive::unpack` directly. `unpack` preserves permissions and mtimes and follows tar's own traversal guards, but unlike the zip path there is NO cancellation (`controller.check`) or progress reporting threaded through tar extraction — a large tar cannot be cancelled and shows no progress. Inconsistent with the zip path which supports both.","fix":"Implement a manual tar entry loop (like zip_extract) that checks the controller and reports progress, instead of the one-shot `archive.unpack(new_dir)`.","locations":[{"ref":"src/archive.rs:52-97","code":"   52 |         \"application/gzip\" | \"application/x-compressed-tar\" => {\n rchive.unpack(new_dir))\n   88 |             .map_err(|e| OperationError::from_err(e, controller))?,\n   89 |         #[cfg(feature = \"lzma-rust2\")]\n   90 |         \"application/x-xz\" | \"application/x-xz-compressed-tar\" => {\n   91 |             OpReader::new(path, controller.clone())\n   92 |                 .map(io::BufReader::new)\n   93 |                 .map(|reader| lzma_rust2::XzReader::new(reader, true))\n   94 |                 .map(tar::Archive::new)\n   95 |                 .and_then(|mut archive| archive.unpack(new_dir))\n   96 |                 .map_err(|e| OperationError::from_err(e, controller))?;\n   97 |         }","lines":46}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In Message::Open, update_recently_used's result is discarded with `let _ =`. A failure to record recents is non-fatal, but it is silently swallowed with no log line, unlike the rest of the file which logs warnings on IO failures. Inconsistent and makes recents bugs invisible.","fix":"Match the Result and log::warn! on Err, consistent with other fs error handling in this file.","locations":[{"ref":"src/dialog.rs:1656-1663","code":" 1656 |                             if self.flags.config.show_recents {\n 1657 |                                 let _ = update_recently_used(\n 1658 |                                     path,\n 1659 |                                     Self::APP_ID.to_string(),\n 1660 |                                     \"cosmic-files\".to_string(),\n 1661 |                                     None,\n 1662 |                                 );\n 1663 |                             }","lines":8}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"is_remote defaults to true when query_filesystem_info fails (line 65 and 496). Treating an unknown filesystem as remote disables local-path optimizations (size_opt, child counting, metadata) in network_scan for any mount whose remote attribute cannot be queried, even when it is in fact a fast local device. This is a conservative choice but can degrade behavior for local mounts that do not report the attribute.","fix":"Consider defaulting to false (local) when the attribute is unavailable, or distinguish 'query failed' from 'attribute absent' before deciding; at minimum document why remote-by-default is intended.","locations":[{"ref":"src/mounter/gvfs.rs:57-65","code":"   57 |             let root = MountExt::root(&mount);\n   58 |             let is_remote = root\n   59 |                 .query_filesystem_info(\n   60 |                     gio::FILE_ATTRIBUTE_FILESYSTEM_REMOTE,\n   61 |                     gio::Cancellable::NONE,\n   62 |                 )\n   63 |                 .ok()\n   64 |                 .map(|info| info.boolean(gio::FILE_ATTRIBUTE_FILESYSTEM_REMOTE))\n   65 |                 .unwrap_or(true); // Default to remote if query fails","lines":9},{"ref":"src/mounter/gvfs.rs:490-496","code":"  490 |                                                     item.is_remote = root\n  491 |                                                         .query_filesystem_info(\n  492 |                                                             gio::FILE_ATTRIBUTE_FILESYSTEM_REMOTE,\n  493 |                                                             gio::Cancellable::NONE,\n  494 |                                                         )\n  495 |                                                         .ok().map(|info| info.boolean(gio::FILE_ATTRIBUTE_FILESYSTEM_REMOTE))\n  496 |                                                         .unwrap_or(true);","lines":7}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"dir_info maps gio errors through but Gvfs::dir_info discards them with .and_then(|res| res.ok()), so any GVFS error (permission, not mounted, network failure) is silently turned into None with no logging, making failures hard to diagnose.","fix":"Log the error before discarding it, or propagate a Result so callers can distinguish 'no info' from 'error querying info'.","locations":[{"ref":"src/mounter/gvfs.rs:686-692","code":"  686 |     fn dir_info(&self, uri: &str) -> Option<(String, String, Option<PathBuf>)> {\n  687 |         let (result_tx, mut result_rx) = mpsc::channel(1);\n  688 |         self.command_tx\n  689 |             .send(Cmd::DirInfo(uri.to_string(), result_tx))\n  690 |             .unwrap();\n  691 |         result_rx.blocking_recv().and_then(|res| res.ok())\n  692 |     }","lines":7}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In `ThumbnailCacher::new`, when the thumbnail subdirectory does not exist the code logs at `error` level with the misleading message 'failed to create directory' BEFORE any creation is attempted, and the `let _: () = log::error!(...)` pattern is odd. The directory creation `fs::create_dir_all(&thumbnail_dir).unwrap_or(())` then silently swallows real failures, so a genuinely un-creatable cache dir produces a spurious error log on success and no error on actual failure (the later rename will fail confusingly).","fix":"Only log on actual creation failure: `if let Err(e) = fs::create_dir_all(&thumbnail_dir) { log::warn!(...) }`, and remove the unconditional preemptive error log and the `let _: ()` binding.","locations":[{"ref":"src/thumbnail_cacher.rs:35-45","code":"   35 |         if !thumbnail_dir.is_dir() {\n   36 |             log::warn!(\n   37 |                 \"{} is not a directory, creating one now\",\n   38 |                 thumbnail_dir.display()\n   39 |             );\n   40 |             let _: () = log::error!(\n   41 |                 \"{} failed to create directory, this error can be expected on first run\",\n   42 | e main conf and each tab with the new config\n 1686 |         let commands = std::iter::once(cosmic::command::set_theme(self.config.app_theme.theme()))\n 1687 |             .chain(tabs.into_iter().map(|entity| {\n 1688 |                 self.update(Message::TabMessage(\n 1689 |                     Some(entity),\n 1690 |                     tab::Message::Config(self.config.tab),\n 1691 |                 ))\n 1692 |             }));\n 1693 |         Task::batch(commands)\n 1694 |     }","lines":14},{"ref":"src/app.rs:1751-1858","code":" 1751 |     fn update_nav_model(&mut self) {\n 1752 |         let mut nav_model = segmented_button::ModelBuilder::default();\n 1753 | \n 1754 |         if self.config.show_recents {\n 1755 |             nav_model = nav_model.insert(|b| {\n 1756 |                 b.text(fl!(\"recents\"))\n 1757 |                     .icon(icon::from_name(\"document-open-recent-symbolic\"))\n 1758 |                     .data(Location::Recents)\n 1759 |             });\n 1760 |         }\n 1761 | \n 1762 |         for (favorite_i, favorite) in self.config.favorites.iter().enumerate() {\n 1763 |             if let Some(path) = favorite.path_opt() {\n 1764 |                 let name = if matches!(favorite, Favorite::Home) {\n 1765 |                     fl!(\"home\")\n 1766 |                 } else if let Favorite::Network { name, .. } = favorite {\n 1767 |                     name.clone()\n 1768 |                 } else if let Some(file_name) = path.file_name().and_then(|x| x.to_str()) {\n 1769 |                     file_name.to_string()\n 1770 |                 } else {\n 1771 |                     fl!(\"filesystem\")\n 1772 |                 };\n 1773 |                 nav_model = nav_model.insert(move |b| {\n 1774 |                     b.text(name.clone())\n 1775 |                         .icon(\n 1776 |                             icon::icon(if path.is_dir() {\n 1777 |                                 tab::folder_icon_symbolic(&path, 16)\n 1778 | o materialize the FULL-resolution RGBA buffer first, and only THEN resizes to the (much smaller) target dimensions. For a large source image this allocates the entire full-resolution RGBA buffer (width*height*4 bytes) even when the target is tiny, defeating much of the memory-budget purpose. The full buffer and the resized buffer both exist simultaneously during `imageops::resize`.","fix":"Decode to a scaled buffer where the format allows (e.g. use the decoder's downscale hints / `DynamicImage::resize` on the decoded image is unavoidable, but at minimum drop the full `rgba` buffer reference promptly), or decode then resize via `img.resize(..)` before `into_rgba8()` so the intermediate is the smaller image. Consider format-aware downscaling at decode time to avoid the full-resolution allocation.","locations":[{"ref":"src/large_image.rs:281-313","code":"  281 |                         match reader.decode() {\n  282 |                             Ok(img) => {\n  283 |                                 let rgba = img.into_rgba8();\n  284 |                                 let orig_width = rgba.width();\n  285 |                                 let orig_height = rgba.height();\n  286 | \n  287 |                                 // Resize if target dimensions provided\n  288 |                                 let (final_img, width, height) = if let Some((target_w, target_h)) = target_dimensions {\n  289 |                                     log::info!(\n  290 |                                         \"Resizing {}x{} -> {}x{} for memory optimization: {}\",\n  291 |                                         orig_width, orig_height, target_w, target_h,\n  292 |                                         path.display()\n  293 |                                     );\n  294 | \n  295 |                                     // Use Lanczos3 for high-quality downsampling\n  296 |                                     let resized = image::imageops::resize(\n  297 | se per char, or use str::eq_ignore_ascii_case on the prefix length / unicode-aware starts_with helper), avoiding a full String allocation per item.","locations":[{"ref":"src/tab.rs:3023-3034","code":" 3023 |     fn select_first_prefix_match<'a>(\n 3024 |         prefix: &str,\n 3025 |         items: impl Iterator<Item = (usize, &'a mut Item)>,\n 3026 |     ) -> Option<usize> {\n 3027 |         for (i, item) in items {\n 3028 |             if item.name.to_lowercase().starts_with(prefix) {\n 3029 |                 item.selected = true;\n 3030 |                 return Some(i);\n 3031 |             }\n 3032 |         }\n 3033 |         None\n 3034 |     }","lines":12},{"ref":"src/tab.rs:2928-2983","code":" 2928 |     pub fn select_by_prefix(&mut self, prefix: &str) -> bool {\n 2929 |         let prefix_lower = prefix.to_lowercase();\n 2930 |         let focus = self.select_focus.take();\n 2931 | \n 2932 |         if let Some(ref mut items) = self.items_opt {\n 2933 |             // First, deselect all items\n 2934 |             for item in items.iter_mut() {\n 2935 |                 item.selected = false;\n 2936 |             }\n 2937 | \n 2938 |             // Determine the start index of the search. When the index is before the currently focused item, it will be\n 2939 |             // considered first, otherwise last. Consider the focused item last when only a single character has been\n 2940 |             // typed, so we eagerly switch focus on the first character and stay on the same item as long as the prefix\n 2941 |             // matches.\n 2942 |             let single_char = prefix_lower.chars().count() == 1;\n 2943 |             let start = if single_char {\n 2944 |                 Self::index_after_focus(focus, self.sort_direction)\n 2945 |             } else {\n 2946 |                 Self::index_before_focus(focus, self.sort_direction)\n 2947 |             };\n 2948 |             self.select_focus = Self::select_first_prefix_from_index(\n 2949 | 1 |             mouse::Click::new(pos, mouse::Button::Left, None)\n  282 |         };","lines":19}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"menu_item_disabled builds a menu_button! row that has no .on_press, so it is non-interactive, but it is constructed with full text styling each render. Only used for the disabled Paste entry. Minor; the disabled styling duplicates what menu_button_optional/ButtonDisabled already provide for the MenuBar path, indicating two parallel disabled-item mechanisms.","fix":"Consolidate on a single disabled-item representation.","locations":[{"ref":"src/menu.rs:96-103","code":"   96 |     let menu_item_disabled = |label, action: Action| {\n   97 |         let key = find_key(&action);\n   98 |         menu_button!(\n   99 |             text::body(label).class(theme::Text::Custom(disabled_style)),\n  100 |             space::horizontal(),\n  101 |             text::body(key).class(theme::Text::Custom(disabled_style))\n  102 |         )\n  103 |     };","lines":8},{"ref":"src/menu.rs:42-52","code":"   42 | const fn menu_button_optional(\n   43 |     label: String,\n   44 |     action: Action,\n   45 |     enabled: bool,\n   46 | ) -> menu::Item<Action, String> {\n   47 |     if enabled {\n   48 |         menu::Item::Button(label, None, action)\n   49 |     } else {\n   50 |         menu::Item::ButtonDisabled(label, None, action)\n   51 |     }\n   52 | }","lines":11}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In ItemThumbnail::new, the local `tried_supported_file` is set true at line 2059 (`tried_supported_file = tried_supported_file || !thumbnailer(&mime).is_empty();`) but every subsequent branch that reads it (svg/text) re-assigns it to true before use, and the only later read is the fail-marker guard at line 2115. The line 2059 recomputation runs thumbnailer(&mime) again (a second lookup) whose result only matters when neither svg nor text branch is taken; this is subtle and largely redundant with the earlier external-thumbnailer attempt.","fix":"Clarify intent: track 'was this a thumbnailable type' once, or comment why thumbnailer(&mime) is queried a second time here.","locations":[{"ref":"src/tab.rs:2059","code":" 2059 |         tried_supported_file = tried_supported_file || !thumbnailer(&mime).is_empty();","lines":1}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Auto-scroll variable naming is inverted relative to its meaning. `let bottom = viewport.y;` and `let top = viewport.y + viewport.height;` — in screen coordinates viewport.y is the TOP edge and viewport.y+height is the BOTTOM edge. The variables named 'bottom' and 'top' are swapped, making the code read backwards (e.g. `if virtual_position.y < bottom` actually means 'above the top edge'). Logic happens to be correct but the names actively mislead maintainers.","fix":"Rename: `let top = viewport.y;` and `let bottom = viewport.y + viewport.height;`.","locations":[{"ref":"src/mouse_area.rs:575-583","code":"  575 |                 let bottom = viewport.y;\n  576 |                 let top = viewport.y + viewport.height;\n  577 |                 if virtual_position.y < bottom {\n  578 |                     Some(virtual_position.y - bottom)\n  579 |                 } else if virtual_position.y > top {\n  580 |                     Some(virtual_position.y - top)\n  581 |                 } else {\n  582 |                     None\n  583 |                 }","lines":9}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on THUMB_SEMAPHORE says it 'Uses 4 workers', but the actual limit is num_cpus::get().min(4), i.e. up to 4 — on a 1- or 2-core machine it will be 1 or 2 workers, not 4. The comment is misleading about the concurrency level.","fix":"Reword to 'limited to min(num_cpus, 4) workers' to match the code.","locations":[{"ref":"src/tab.rs:84-87","code":"   84 | // Thumbnail generation semaphore - limits parallel thumbnail workers\n   85 | // Uses 4 workers for balanced throughput and memory usage\n   86 | pub static THUMB_SEMAPHORE: LazyLock<tokio::sync::Semaphore> =\n   87 |     LazyLock::new(|| tokio::sync::Semaphore::const_new(num_cpus::get().min(4)));","lines":4}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment at the App struct says `// The [`App`] stores application-specific state.` using a `//` line comment with rustdoc intra-doc link syntax, which is not rendered as documentation and the backtick link is meaningless in a plain comment. Minor; several `//TODO` comments (e.g. 'this is nasty', 'this could change favorites IDs while they are in use') flag known unaddressed issues.","fix":"Convert to a doc comment (`///`) if documentation is intended, or drop the link syntax. Track the TODOs as issues.","locations":[{"ref":"src/app.rs:714","code":"  714 | // The [`App`] stores application-specific state.","lines":1},{"ref":"src/app.rs:3515","code":" 3515 |                 //TODO: this could change favorites IDs while they are in use","lines":1}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment on `TabConfig::military_time` says the field is `#[serde(skip)]` because the user's global preference is used; this is accurate, but the field is documented as 'neither serialized nor deserialized' while `#[serde(default)]` on the struct means it is still populated from `Default` on load. The wording could mislead a reader into thinking the field is absent entirely.","fix":"Clarify the comment to state the value is sourced from the global time preference at runtime and defaults to false when not set.","locations":[{"ref":"src/config.rs:326-329","code":"  326 | reate sequence is race-free.","fix":"Clarify the comment to scope the atomicity claim to the single create/link syscall, not the surrounding check-and-prompt logic.","locations":[{"ref":"src/operation/recursive.rs:372","code":"  372 |                 // This is atomic and ensures `to` is not created by any other process","lines":1},{"ref":"src/operation/recursive.rs:465","code":"  465 |             // This is atomic and ensures `to` is not created by any other process","lines":1}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The container().style(...) closure that paints the menu background/border (icon_color, text_color, background, border with radius_s+1.0) is duplicated verbatim between context_menu and location_context_menu. The TODO at line 417 already notes it should move to libcosmic.","fix":"Extract a shared `fn menu_container_style(theme) -> container::Style` and reuse in both.","locations":[{"ref":"src/menu.rs:415-434","code":"  415 |     container(column::with_children(children))\n  416 |         .padding(1)\n  417 |         //TODO: move style to libcosmic\n  418 |         .style(|theme| {\n  419 |             let cosmic = theme.cosmic();\n  420 |             let component = &cosmic.background.component;\n  421 |             container::Style {\n  422 |                 icon_color: Some(component.on.into()),\n  423 |                 text_color: Some(component.on.into()),\n  424 |                 background: Some(Background::Color(component.base.into())),\n  425 |                 border: Border {\n  426 |                     radius: cosmic.radius_s().map(|x| x + 1.0).into(),\n  427 |                     width: 1.0,\n  428 |                     color: component.divider.into(),\n  429 |                 },\n  430 |                 ..Default::default()\n  431 |             }\n  432 |         })\n  433 |         .width(Length::Fixed(360.0))\n  434 |         .into()","lines":20},{"ref":"src/menu.     commands.push(Command::Iced(widget::button::focus(id).into()));\n 4318 |                     }","lines":15}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"high","easy":false,"description":"The single `update()` method spans roughly lines 2849-5443 (~2600 lines) and handles well over a hundred distinct Message variants inline, mixing UI state, filesystem operations, clipboard, window management, DnD, mounters and config persistence in one monolithic match. Similarly `dialog()` (5517-6285) builds every dialog variant inline (~770 lines), and the whole file is 7327 lines. This makes the code hard to test, review, and maintain, and is a frequent source of the copy-paste bugs noted elsewhere in this audit.","fix":"Split message handling into focused helper methods grouped by concern (clipboard, operations, dnd, dialogs, mounters) returning Task<Message>, and move each DialogPage's view construction into its own function/impl on DialogPage. This is incremental and does not change behavior.","locations":[{"ref":"src/app.rs:2849-5443","code":" 2849 |     fn update(&mut self, message: Self::Message) -> Task<Self::Message> {\n 2850 |         // Helper for updating config values efficiently\n 2851 |         macro_rules! config_set {\n 2852 |             ($name: ident, $value: expr) => {\n 2853 |                 match &self.config_handler {\n 2854 |                     Some(config_handler) => {\n 2855 |                         match paste::paste! { self.config.[<set_ $name>](config_handler, $value) } {\n 2856 |                             Ok(_) => {}\n 2857 |                             Err(err) => {\n 2858 |                                 log::warn!(\n 2859 |                                     \"failed to save config {:?}: {}\",\n 2860 |                                     stringify!($name),\n 2861 |                                     err\n 2862 |                                 );\n 2863 |                             }\n 2864 |
