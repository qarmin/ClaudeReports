<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In Message::AddToSidebar the code does `tab.items_opt.as_ref().and_then(|items| items.iter().find(|&i| i.path_opt() == Some(&path))).unwrap().location_opt.as_ref().unwrap()`. The `tab` variable is rebound to the active tab when `in_current_tab` is true, but `path` originates from `selected_paths(entity_opt)` (a possibly different tab). If the rebound tab does not contain `path`, or the matched item has `location_opt == None`, the chained `.unwrap()` calls panic and crash the application. Both unwraps are reachable with normal user interaction (adding a selection to the sidebar while tabs differ, or items without a location).","fix":"Replace the `find(...).unwrap().location_opt.as_ref().unwrap()` chain with proper Option handling, e.g. use `and_then` to look up the item and its `location_opt`, falling back to `Favorite::from_path(path)` when no network location is found instead of unwrapping.","locations":[{"ref":"src/app.rs:2900-2913","code":" 2900 |                         if let Location::Network(uri, _, _) = tab\n 2901 |                             .items_opt\n 2902 |                             .as_ref()\n 2903 |                             .and_then(|items| items.iter().find(|&i| i.path_opt() == Some(&path)))\n 2904 |                             .unwrap()\n 2905 |                             .location_opt\n 2906 |                             .as_ref()\n 2907 |                             .unwrap()\n 2908 |                         {\n 2909 |                             Some((uri.clone(), name, path.clone()))\n 2910 |                         } else {\n 2911 |                             None\n 2912 |                         }\n 2913 |                     });","lines":14}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Multiple channel sends on the glib worker thread unwrap and will panic the entire GVFS thread if the receiver was dropped (e.g. the requesting UI task was cancelled or the mpsc(1) receiver went away). items_tx.send(...).await.unwrap() (line 439), items_tx.blocking_send(...).unwrap() inside the mount callback (line 564), items_tx.send(...).await.unwrap() (line 580) and result_tx.send(...).await.unwrap() (line 584). A dropped one-shot/mpsc receiver is a normal occurrence (request abandoned), so this is a reachable panic that kills mounting/scanning for the rest of the session.","fix":"Replace .unwrap() with error logging (e.g. if let Err(err) = items_tx.send(...) { log::warn!(...) }) so a dropped receiver does not bring down the worker thread/main loop.","locations":[{"ref":"src/mounter/gvfs.rs:439","code":"  439 |                             items_tx.send(items(&monitor, sizes)).await.unwrap();","lines":1},{"ref":"src/mounter/gvfs.rs:564","code":"  564 |                                         items_tx.blocking_send(network_scan(&uri, sizes)).unwrap();","lines":1},{"ref":"src/mounter/gvfs.rs:580","code":"  580 |                                 items_tx.send(network_scan(&uri, sizes)).await.unwrap();","lines":1},{"ref":"src/mounter/gvfs.rs:584","code":"  584 |                             result_tx.send(dir_info(&uri)).await.unwrap();","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"DialogPage::ExtractPassword completion does `self.failed_operations.get(&id).unwrap()` and then `match &operation { Operation::Extract { .. } => ..., _ => unreachable!() }`. If the failed operation has already been removed (e.g. dialog races with another action that cleared failed_operations) or is somehow not an Extract operation, this panics. The id comes from a dialog page whose lifetime is independent of failed_operations.","fix":"Use `if let Some((operation, _, _)) = self.failed_operations.get(&id)` and `if let Operation::Extract { .. } = operation` guards, logging a warning and returning instead of unwrap/unreachable.","locations":[{"ref":"src/app.rs:3171-3181","code":" 3171 |                         DialogPage::ExtractPassword { id, password } => {\n 3172 |                             let (operation, _, _err) = self.failed_operations.get(&id).unwrap();\n 3173 |                             let new_op = match &operation {\n 3174 |                                 Operation::Extract { to, paths, .. } => Operation::Extract {\n 3175 |                                     to: to.clone(),\n 3176 |                                     paths: paths.clone(),\n 3177 |                                     password: Some(password),\n 3178 |                                 },\n 3179 |                                 _ => unreachable!(),\n 3180 |                             };\n 3181 |                             tasks.push(self.operation(new_op));","lines":11}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"MounterItem::None match arms call unreachable!() in every accessor (name, uri, is_mounted, icon, path, is_remote). The None variant is constructed nowhere but is public-ish (#[allow(dead_code)]) and is the only variant when the gvfs feature is disabled; any code path holding a None variant and calling these methods panics. With gvfs disabled, MounterItem has only the None variant, so these methods are effectively all-panic.","fix":"Either remove the None variant entirely (and make the enum/methods conditional on the gvfs feature) or have the accessors return a sensible default/Option instead of unreachable!().","locations":[{"ref":"src/mounter/mod.rs:45-101","code":"   45 | #[derive(Clone, Debug)]\n   46 | pub enum MounterItem {\n   47 |     #[cfg(feature = \"gvfs\")]\n   48 |     Gvfs(gvfs::Item),\n   49 |     #[allow(dead_code)]\n   50 |     None,\n   51 | }\n   52 | \n   53 | impl MounterItem {\n   54 |     pub fn name(&self) -> String {\n   55 |         match self {\n   56 |             #[cfg(feature = \"gvfs\")]\n   57 |             Self::Gvfs(item) => item.name(),\n   58 |             Self::None => unreachable!(),\n   59 |         }\n   60 |     }\n   61 | \n   62 |     pub fn uri(&self) -> String {\n   63 |         match self {\n   64 |             #[cfg(feature = \"gvfs\")]\n   65 |             Self::Gvfs(item) => item.uri(),\n   66 |             Self::None => unreachable!(),\n   67 |         }\n   68 |     }\n   69 | \n   70 |     pub fn is_mounted(&self) -> bool {\n   71 |         match self {\n   72 |             #[cfg(feature = \"gvfs\")]\n   73 |             Self::Gvfs(item) => item.is_mounted(),\n   74 |             Self::None => unreachable!(),\n   75 |         }\n   76 |     }\n   77 | \n   78 |     pub fn icon(&self, symbolic: bool) -> Option<widget::icon::Handle> {\n   79 |         match self {\n   80 |             #[cfg(feature = \"gvfs\")]\n   81 |             Self::Gvfs(item) => item.icon(symbolic),\n   82 |             Self::None => unreachable!(),\n   83 |         }\n   84 |     }\n   85 | \n   86 |     pub fn path(&self) -> Option<PathBuf> {\n   87 |         match self {\n   88 |             #[cfg(feature = \"gvfs\")]\n   89 |             Self::Gvfs(item) => item.path(),\n   90 |             Self::None => unreachable!(),\n   91 |         }\n   92 |     }\n   93 | \n   94 |     pub fn is_remote(&self) -> bool {\n   95 |         match self {\n   96 |             #[cfg(feature = \"gvfs\")]\n   97 |             Self::Gvfs(item) => item.is_remote(),\n   98 |             Self::None => unreachable!(),\n   99 |         }\n  100 |     }\n  101 | }","lines":57}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"FormatTime::fmt unwraps jiff::Zoned::try_from(self.time). SystemTime values that cannot be represented as a jiff Zoned (e.g. extreme/garbage mtimes coming from a remote/gvfs filesystem or a corrupt directory entry) will panic the whole GUI. This Display impl is reached from list_view/preview rendering for every file row, so a single bad timestamp from external input can crash the app on render.","fix":"Return a fmt::Error or a fallback string instead of unwrapping, e.g. `let Ok(zoned) = jiff::Zoned::try_from(self.time) else { return f.write_str(\"-\"); };`.","locations":[{"ref":"src/tab.rs:433","code":"  433 |         let zoned = jiff::Zoned::try_from(self.time).unwrap();","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The thumbnail subscription and tab_complete subscription both call .unwrap() on the JoinHandle result of tokio::task::spawn_blocking. If the blocking closure panics (e.g. an unexpected panic deep in image decoding or ICU/regex code), the JoinError unwrap propagates the panic into the iced runtime task instead of being logged/handled.","fix":"Handle the JoinError (log it and emit a fallback message) instead of unwrapping the spawn_blocking result.","locations":[{"ref":"src/tab.rs:6723-6726","code":" 6723 |                                         })\n 6724 |                                         .await\n 6725 |                                         .unwrap()\n 6726 |                                     };","lines":4},{"ref":"src/tab.rs:6979-6982","code":" 6979 |                                 })\n 6980 |                                 .await\n 6981 |                                 .unwrap()\n 6982 |                             };","lines":4}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`thumbnailer()` does `THUMBNAILER_CACHE.lock().unwrap()`. If any thread panics while holding this Mutex (e.g. during `reload()` parsing), the lock is poisoned and every subsequent `thumbnailer()` call panics on `unwrap()`, cascading the failure across all thumbnail generation.","fix":"Recover from poisoning, e.g. `.lock().unwrap_or_else(|e| e.into_inner())`, so a single parse panic does not permanently break thumbnailing.","locations":[{"ref":"src/thumbnailer.rs:172","code":"  172 |     let thumbnailer_cache = THUMBNAILER_CACHE.lock().unwrap();","lines":1}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"Message::TabNext computes `... % len as u16` where `len = self.tab_model.len()`. If `len` were ever 0 this is a divide-by-zero panic. In practice there is always at least one tab (enforced by TabClose closing the window on the last tab), so this is currently unreachable, but the invariant is implicit and the adjacent `.expect(\"should always be at least one tab open\")` relies on the same assumption.","fix":"Guard with `if len == 0 { return Task::none(); }` (or use checked arithmetic) to make the invariant explicit and robust against future refactors.","locations":[{"ref":"src/app.rs:4387-4395","code":" 4387 |             Message::TabNext => {\n 4388 |                 let len = self.tab_model.len();\n 4389 |                 let pos = (self\n 4390 |                     .tab_model\n 4391 |                     .position(self.tab_model.active())\n 4392 |                     .expect(\"should always be at least one tab open\")\n 4393 |                     + 1)\n 4394 |                     // Wraparound to 0 if i + 1 > num of tabs\n 4395 |                     % len as u16;","lines":9},{"ref":"src/app.rs:4402-4409","code":" 4402 |             Message::TabPrev => {\n 4403 |                 let pos = self\n 4404 |                     .tab_model\n 4405 |                     .position(self.tab_model.active())\n 4406 |                     .expect(\"should always be at least one tab open\")\n 4407 |                     .checked_sub(1)\n 4408 |                     // Subtraction underflow => last tab; i.e. it wraps around\n 4409 |                     .unwrap_or_else(|| (self.tab_model.len() as u16).saturating_sub(1));","lines":8}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"`State::default()` and `Config`/`DesktopConfig`/`ThumbCfg`/`IconSizes` defaults use `100.try_into().unwrap()` / `4.try_into().unwrap()` etc. on `NonZeroU16`. These are correct today (all literals are non-zero), but they are panic points that depend on the literals staying non-zero; a future edit to `0` would compile and panic at startup.","fix":"Use `NonZeroU16::new(N).unwrap()` in a const context or `const { NonZeroU16::new(N).unwrap() }` so the non-zero invariant is checked at compile time rather than panicking at runtime.","locations":[{"ref":"src/config.rs:255-260","code":"  255 |             grid_spacing: 100.try_into().unwrap(),\n  256 |             icon_size: 100.try_into().unwrap(),\n  257 |             show_content: true,\n  258 |             show_mounted_drives: false,\n  259 |             show_trash: false,\n  260 |         }","lines":6},{"ref":"src/config.rs:307-309","code":"  307 |             jobs: 4.try_into().unwrap(),\n  308 |             max_mem_mb: 2000.try_into().unwrap(),\n  309 |             max_size_mb: 64.try_into().unwrap(),","lines":3},{"ref":"src/config.rs:361-362","code":"  361 |             list: 100.try_into().unwrap(),\n  362 |             grid: 100.try_into().unwrap(),","lines":2}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"medium","easy":false,"description":"MounterItem::Gvfs stores a positional index into monitor.mounts()/monitor.volumes() captured at items()/Rescan time. Mount, Unmount and the mount-success path all re-enumerate the live monitor and match by `i == item.index`. Between the snapshot and the command, volumes/mounts can be added or removed, so the index can refer to a different device. There is a name-equality guard that prevents acting on the wrong device, but when the index now points to a differently-named entry the operation is silently skipped (the loop just `continue`s/`break`s with no action and no user feedback), so a mount/unmount can silently fail after the device list shifts.","fix":"Match volumes/mounts by a stable identifier (e.g. volume/mount uri, GVolume identifier, or name) instead of, or in addition to, the enumeration index, and report an error back through the result channel when no matching device is found.","locations":[{"ref":"src/mounter/gvfs.rs:326","code":"  326 |     is_mounted: bool,","lines":1},{"ref":"src/mounter/gvfs.rs:457-466","code":"  457 |                             for (i, volume) in monitor.volumes().into_iter().enumerate() {\n  458 |                                 if i != item.index {\n  459 |                                     continue;\n  460 |                                 }\n  461 | \n  462 |                                 let name = VolumeExt::name(&volume);\n  463 |                                 if item.name != name {\n  464 |                                     log::warn!(\"trying to mount volume {} failed: name is {:?} when {:?} was expected\", i, name, item.name);\n  465 |                                     continue;\n  466 |                                 }","lines":10},{"ref":"src/mounter/gvfs.rs:589-598","code":"  589 |                             for (i, mount) in monitor.mounts().into_iter().enumerate() {\n  590 |                                 if i != item.index {\n  591 |                                     continue;\n  592 |                                 }\n  593 | \n  594 |                                 let name = MountExt::name(&mount);\n  595 |                                 if item.name != name {\n  596 |                                     log::warn!(\"trying to unmount mount {} failed: name is {:?} when {:?} was expected\", i, name, item.name);\n  597 |                                     continue;\n  598 |                                 }","lines":10}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"medium","easy":false,"description":"TOCTOU between conflict detection and the actual write. Destination existence is checked with `is_file()` (recursive.rs:362/412/445) and conflicts are pre-counted at recursive.rs:185-193, but the user dialog and the eventual write happen later. Copy mitigates this with `create_new(true)` (recursive.rs:467-471, atomic) and move uses `hard_link` (atomic) — good — but the symlink branch uses `std::os::unix::fs::symlink`/`symlink_file` which is NOT create-exclusive: between the `is_file()` check / dialog and the symlink call, another process could create the path, and the symlink call would then fail or (after a Replace remove_file) a new file could appear and be clobbered. The pre-counted `remaining_conflicts` can also be stale by the time each op runs.","fix":"Create symlinks atomically (e.g. symlink to a temp name then atomic rename, or use symlinkat with appropriate handling) and treat the existence checks as advisory, relying on atomic create semantics for correctness.","locations":[{"ref":"src/operation/recursive.rs:410-433","code":"  410 |             OpKind::Symlink { ref target } => {\n  411 |                 // Remove `to` if overwriting and it is an existing file\n  412 |                 if self.to.is_file() {\n  413 |                     match ctx.replace(self).await? {\n  414 |                         ControlFlow::Continue(to) => {\n  415 |                             self.to = to;\n  416 |                         }\n  417 |                         ControlFlow::Break(ret) => {\n  418 |                             return Ok(ret);\n  419 |                         }\n  420 |                     }\n  421 |                 }\n  422 |                 #[cfg(unix)]\n  423 |                 {\n  424 |                     std::os::unix::fs::symlink(target, &self.to)?;\n  425 |                 }\n  426 |                 #[cfg(windows)]\n  427 |                 {\n  428 |                     if target.is_dir() {\n  429 |                         std::os::windows::fs::symlink_dir(target, &self.to)?;\n  430 |                     } else {\n  431 |                         std::os::windows::fs::symlink_file(target, &self.to)?;\n  432 |                     }\n  433 |                 }","lines":24}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"low","easy":false,"description":"`copy_unique_path` performs a check-then-use loop: it pushes a candidate name, tests `to.try_exists()`, and breaks if it does not exist (mod.rs:287-304). Between this check and the eventual create at the destination, another process (or another concurrent op in the same batch) may create that path, so the generated 'unique' name may collide. The copy/move final write uses `create_new(true)`/`hard_link` (atomic) so data is not clobbered, but the operation will then fail rather than picking the next free name.","fix":"Treat the generated name as a best-effort hint and retry name generation on EEXIST from the atomic create, rather than assuming the chosen name remains free.","locations":[{"ref":"src/operation/mod.rs:287-305","code":"  287 |         for n in 0.. {\n  288 |             let new_name = if n == 0 {\n  289 |                 file_name.to_string()\n  290 |             } else {\n  291 |                 match ext {\n  292 |                     Some(ref ext) => format!(\"{} ({} {}).{}\", stem, fl!(\"copy_noun\"), n, ext),\n  293 |                     None => format!(\"{} ({} {})\", stem, fl!(\"copy_noun\"), n),\n  294 |                 }\n  295 |             };\n  296 | \n  297 |             to.push(&new_name);\n  298 | \n  299 |             if !matches!(to.try_exists(), Ok(true)) {\n  300 |                 break;\n  301 |             }\n  302 |             // Continue if a copy with index exists\n  303 |             to.pop();\n  304 |         }\n  305 |     }","lines":19}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","easy":false,"description":"`zip_extract` allocates a 4 MB read buffer per call (`vec![0; 4 * 1024 * 1024]`). That itself is fine, but on any error during the per-file loop (read/write/permission/cancellation), the function returns early leaving partially-written output files and freshly-created directories on disk with no cleanup, AND the unix permission second-pass (which restores intended modes after forcing 0o700 writable) and the mtime pass are skipped — so on a mid-extraction failure, directories are left with the forced-writable 0o700-OR'd permissions rather than their intended modes. Extracted files are not rolled back.","fix":"On error, either roll back `written_files`/`target_dirs` or document that partial extraction is left in place; at minimum run the permission-restoration pass in a cleanup/finally path so directories are not left with elevated 0o700 permissions after a failure.","locations":[{"ref":"src/archive.rs:141-289","code":"  141 |     let mut buffer = vec![0; 4 * 1024 * 1024];\n  142 |     let total_files = archive.len();\n  143 |     let mut written_files = Vec::with_capacity(total_files);\n  144 |     let mut target_dirs = HashSet::new();\n  145 |     #[cfg(unix)]\n  146 |     let mut files_by_unix_mode = Vec::with_capacity(total_files);\n  147 |     let mut files_by_last_modified = Vec::with_capacity(total_files);\n  148 | \n  149 |     for i in 0..total_files {\n  150 |         futures::executor::block_on(async {\n  151 |             controller\n  152 |                 .check()\n  153 |                 .await\n  154 |                 .map_err(|s| io::Error::other(OperationError::from_state(s, &controller)))\n  155 |         })?;\n  156 | \n  157 |         controller.set_progress(i as f32 / total_files as f32);\n  158 | \n  159 |         let mut file = match password {\n  160 |             None => archive.by_index(i),\n  161 |             Some(pwd) => archive.by_index_decrypt(i, pwd.as_bytes()),\n  162 |         }?;\n  163 | \n  164 |         let filepath = file\n  165 |             .enclosed_name()\n  166 |             .ok_or(ZipError::InvalidArchive(\"Invalid file path\".into()))?;\n  167 | \n  168 |         let outpath = directory.as_ref().join(filepath);\n  169 | \n  170 |         if let Some(last_modified) = file.last_modified() {\n  171 |             files_by_last_modified.push((outpath.clone(), last_modified));\n  172 |         }\n  173 | \n  174 |         if file.is_dir() {\n  175 |             make_writable_dir_all(&outpath, &mut target_dirs)?;\n  176 | \n  177 |             #[cfg(unix)]\n  178 |             if let Some(mode) = file.unix_mode() {\n  179 |                 files_by_unix_mode.push((outpath, mode));\n  180 |             }\n  181 |             continue;\n  182 |         }\n  183 | \n  184 |         if let Some(parent) = outpath.parent() {\n  185 |             make_writable_dir_all(parent, &mut target_dirs)?;\n  186 |         }\n  187 | \n  188 |         if file.is_symlink() && (cfg!(unix) || cfg!(windows)) {\n  189 |             let mut target = Vec::with_capacity(file.size() as usize);\n  190 |             file.read_to_end(&mut target)?;\n  191 |             // File no longer needed, drop to allow reading target on windows\n  192 |             drop(file);\n  193 | \n  194 |             #[cfg(unix)]\n  195 |             {\n  196 |                 use std::os::unix::ffi::OsStringExt;\n  197 |                 let target = OsString::from_vec(target);\n  198 |                 std::os::unix::fs::symlink(&target, outpath.as_path())?;\n  199 |             }\n  200 |             #[cfg(windows)]\n  201 |             {\n  202 |                 let Ok(target) = String::from_utf8(target) else {\n  203 |                     return Err(ZipError::InvalidArchive(\n  204 |                         \"Invalid UTF-8 as symlink target\".into(),\n  205 |                     ));\n  206 |                 };\n  207 |                 let target_is_dir_from_archive = match password {\n  208 |                     None => archive.by_name(&target),\n  209 |                     Some(pwd) => archive.by_name_decrypt(&target, pwd.as_bytes()),\n  210 |                 }\n  211 |                 .map_or(false, |x| x.is_dir());\n  212 |                 let target_path = directory.as_ref().join(OsString::from(target.to_string()));\n  213 |                 let target_is_dir = if target_is_dir_from_archive {\n  214 |                     true\n  215 |                 } else if let Ok(meta) = std::fs::metadata(&target_path) {\n  216 |                     meta.is_dir()\n  217 |                 } else {\n  218 |                     false\n  219 |                 };\n  220 |                 if target_is_dir {\n  221 |                     std::os::windows::fs::symlink_dir(target_path, outpath.as_path())?;\n  222 |                 } else {\n  223 |                     std::os::windows::fs::symlink_file(target_path, outpath.as_path())?;\n  224 |                 }\n  225 |             }\n  226 | \n  227 |             written_files.push(outpath);\n  228 |             continue;\n  229 |         }\n  230 | \n  231 |         let total = file.size();\n  232 |         let mut outfile = fs::File::create(&outpath)?;\n  233 |         let mut current = 0;\n  234 |         loop {\n  235 |             futures::executor::block_on(async {\n  236 |                 controller\n  237 |                     .check()\n  238 |                     .await\n  239 |                     .map_err(|s| io::Error::other(OperationError::from_state(s, &controller)))\n  240 |             })?;\n  241 | \n  242 |             let count = file.read(&mut buffer)?;\n  243 |             if count == 0 {\n  244 |                 break;\n  245 |             }\n  246 |             outfile.write_all(&buffer[..count])?;\n  247 |             current += count as u64;\n  248 | \n  249 |             if current < total {\n  250 |                 let file_progress = current as f32 / total as f32;\n  251 |                 let total_progress = (i as f32 + file_progress) / total_files as f32;\n  252 |                 controller.set_progress(total_progress);\n  253 |             }\n  254 |         }\n  255 | \n  256 |         // Check for real permissions, which we'll set in a second pass\n  257 |         #[cfg(unix)]\n  258 |         if let Some(mode) = file.unix_mode() {\n  259 |             files_by_unix_mode.push((outpath.clone(), mode));\n  260 |         }\n  261 | \n  262 |         written_files.push(outpath);\n  263 |     }\n  264 |     #[cfg(unix)]\n  265 |     {\n  266 |         use std::cmp::Reverse;\n  267 |         use std::os::unix::fs::PermissionsExt;\n  268 | \n  269 |         if files_by_unix_mode.len() > 1 {\n  270 |             // Ensure we update children's permissions before making a parent unwritable\n  271 |             files_by_unix_mode.sort_by_key(|(path, _)| Reverse(path.components().count()));\n  272 |         }\n  273 |         for (path, mode) in files_by_unix_mode {\n  274 |             fs::set_permissions(&path, fs::Permissions::from_mode(mode))?;\n  275 |         }\n  276 |     }\n  277 | \n  278 |     for (path, last_modified) in files_by_last_modified {\n  279 |         if let Some(modified) = zip_date_time_to_system_time(last_modified) {\n  280 |             let file_time = filetime::FileTime::from_system_time(modified);\n  281 |             filetime::set_file_mtime(&path, file_time)?;\n  282 |         }\n  283 |     }\n  284 | \n  285 |     // Flush files to disk\n  286 |     futures::executor::block_on(async { sync_to_disk(written_files, target_dirs).await });\n  287 | \n  288 |     Ok(())\n  289 | }","lines":149}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"low","easy":false,"description":"In the success path of `copy`, `from_file` is never explicitly closed: only `to_file.close().await` is called (recursive.rs:587). On error paths both files are closed (e.g. recursive.rs:509, 532, 553), but on the normal completion path `from_file` is dropped without an explicit async close. With compio/io_uring, dropping a file without awaiting close can lead to a synchronous/blocking close or a deferred close that is not awaited; at minimum it is asymmetric with the error paths.","fix":"Explicitly `from_file.close().await` alongside `to_file.close().await` on the success path.","locations":[{"ref":"src/operation/recursive.rs:561-589","code":"  561 |         ctx.buf = buf_in;\n  562 | \n  563 |         if let Some(metadata) = metadata.as_ref() {\n  564 |             let mut times = fs::FileTimes::new();\n  565 |             if let Ok(time) = metadata.modified() {\n  566 |                 times = times.set_modified(time);\n  567 |             }\n  568 |             if let Ok(time) = metadata.accessed() {\n  569 |                 times = times.set_accessed(time);\n  570 |             }\n  571 |             //TODO: upstream set_times implementation to compio?\n  572 |             let op = AsyncifyFd::new(to_file.to_shared_fd(), move |file: &std::fs::File| {\n  573 |                 BufResult(file.set_times(times).map(|_| 0), ())\n  574 |             });\n  575 |             match compio::runtime::submit(op).await.0.map(|_| ()) {\n  576 |                 Ok(()) => {\n  577 |                     tracing::info!(\"set times for {} to {:?}\", self.to.display(), times);\n  578 |                 }\n  579 |                 Err(why) => {\n  580 |                     if !matches!(why.kind(), std::io::ErrorKind::Unsupported) {\n  581 |                         tracing::error!(?why, \"failed to set times for {}\", self.to.display());\n  582 |                     }\n  583 |                 }\n  584 |             }\n  585 |         }\n  586 | \n  587 |         _ = to_file.close().await;\n  588 | \n  589 |         Ok(true)","lines":29}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"low","easy":false,"description":"`update_with_image` creates a NamedTempFile via `tempfile_in`, then immediately opens a SECOND handle to the same path with `File::create(temp_file.path())` and writes the PNG through that handle. The NamedTempFile's own file handle is left open and unused; the PNG is written through the separately-created handle. While the temp file is still cleaned up on drop, this opens two handles to the same path and writes through the wrong one, relying on path-based reopen. It is fragile and wastes a descriptor.","fix":"Write through the NamedTempFile's own handle (e.g. `temp_file.as_file()` / `reopen`) instead of `File::create(temp_file.path())`, avoiding a redundant second descriptor and the reopen-by-path race.","locations":[{"ref":"src/thumbnail_cacher.rs:104-122","code":"  104 |         let temp_file = tempfile::Builder::new()\n  105 |             .prefix(\"cosmic-files-\")\n  106 |             .tempfile_in(&self.thumbnail_dir)?;\n  107 |         {\n  108 |             let file = File::create(temp_file.path())?;\n  109 |             let image = image\n  110 |                 .thumbnail(\n  111 |                     self.thumbnail_size.pixel_size(),\n  112 |                     self.thumbnail_size.pixel_size(),\n  113 |                 )\n  114 |                 .into_rgba8();\n  115 |             let writer = BufWriter::new(file);\n  116 |             let mut encoder = png::Encoder::new(writer, image.width(), image.height());\n  117 |             encoder.set_color(png::ColorType::Rgba);\n  118 |             encoder.set_depth(png::BitDepth::Eight);\n  119 |             encoder\n  120 |                 .write_header()?\n  121 |                 .write_image_data(&image.into_raw())?;\n  122 |         }","lines":19}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`should_use_dedicated_worker` computes `total_budget_mb / parallel_workers as u64` without guarding against `parallel_workers == 0`. A zero worker count (e.g. a misconfigured pool or `available_parallelism` returning a low value that gets decremented elsewhere) causes an integer divide-by-zero panic. The function already validates `width`/`height` but not the divisor it controls.","fix":"Guard the divisor: `let per_worker_budget_mb = total_budget_mb / parallel_workers.max(1) as u64;` or early-return the dedicated-worker path when `parallel_workers == 0`.","locations":[{"ref":"src/large_image.rs:132","code":"  132 |     let per_worker_budget_mb = total_budget_mb / parallel_workers as u64;","lines":1}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`zip_extract` allocates `Vec::with_capacity(file.size() as usize)` for a symlink target buffer using the archive-declared `file.size()`. A malicious zip can declare a huge size for a symlink entry, causing a large speculative allocation before any data is read (a mini decompression/allocation bomb). Regular files avoid this by streaming into a fixed 4 MB buffer, but the symlink branch trusts the declared size.","fix":"Cap the symlink target pre-allocation (symlink targets are bounded, e.g. PATH_MAX); use `Vec::with_capacity(file.size().min(4096) as usize)` or just `Vec::new()` and let `read_to_end` grow it.","locations":[{"ref":"src/archive.rs:189","code":"  189 |             let mut target = Vec::with_capacity(file.size() as usize);","lines":1}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`calculate_target_dimensions` casts `display_width as f32 * DISPLAY_SCALE_FACTOR` to `u32`. If the display dimensions are pathologically large (close to u32::MAX) the multiply can exceed f32's exact-integer range and the `as u32` cast saturates, but more importantly a `display_height` of 0 makes `target_aspect = target_width / 0.0 = inf`, and `target_height` 0 makes the `else` branch compute `h = 0` then `.max(1)` recovers width only via aspect. The zero-display-size path produces target (target_width, 1)-ish dimensions silently rather than returning None. Low impact because display sizes are realistically bounded, but the function has no explicit zero/early guard.","fix":"Early-return `None` when `display_width == 0 || display_height == 0`, and clamp/validate before computing aspect ratios.","locations":[{"ref":"src/large_image.rs:47-68","code":"   47 |     let target_width = (display_width as f32 * DISPLAY_SCALE_FACTOR) as u32;\n   48 |     let target_height = (display_height as f32 * DISPLAY_SCALE_FACTOR) as u32;\n   49 | \n   50 |     if image_width <= target_width && image_height <= target_height {\n   51 |         return None;\n   52 |     }\n   53 | \n   54 |     let image_aspect = image_width as f32 / image_height as f32;\n   55 |     let target_aspect = target_width as f32 / target_height as f32;\n   56 | \n   57 |     let (new_width, new_height) = if image_aspect > target_aspect {\n   58 |         let w = target_width;\n   59 |         let h = (target_width as f32 / image_aspect) as u32;\n   60 |         (w, h)\n   61 |     } else {\n   62 |         let h = target_height;\n   63 |         let w = (target_height as f32 * image_aspect) as u32;\n   64 |         (w, h)\n   65 |     };\n   66 | \n   67 |     let new_width = new_width.max(1);\n   68 |     let new_height = new_height.max(1);","lines":22}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`check_ram_available` computes `available_bytes = available_kb * 1024` without overflow protection. `mem_available` is a u64 of KB; on a machine with an absurd reported value this would wrap, but realistically KB*1024 cannot overflow u64 for any real system. Negligible-to-low: defensive `saturating_mul` would be cleaner and matches the `saturating_sub` used two lines below.","fix":"Use `available_kb.saturating_mul(1024)` for consistency with the surrounding saturating arithmetic.","locations":[{"ref":"src/large_image.rs:210-211","code":"  210 |             let available_kb = meminfo.mem_available.unwrap_or(0);\n  211 |             let available_bytes = available_kb * 1024;","lines":2}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Progress is computed as `current as f32 / total as f32` / op-count divisions in several places (e.g. mod.rs:181-187, mod.rs:717/752/819-822, mod.rs:859/891/935/983/1068/1137, reader.rs:41). f32 has only ~24 bits of mantissa, so byte counters above ~16 MiB lose precision and very large files (multi-GiB) yield coarse/inaccurate progress. More importantly, in OpReader (reader.rs:41) the divisor `self.metadata.len()` is the file size captured at open time; for a zero-length file this divides by zero producing NaN/inf progress that is then stored. The on_progress total-ops divisor in mod.rs:187 assumes `total_ops > 0`.","fix":"Guard zero-length / zero-op divisors (return 1.0 when total is 0, as is already done at mod.rs:177-179 for total_bytes), and consider computing progress ratios in f64 or as integer fractions to preserve precision on large files.","locations":[{"ref":"src/operation/reader.rs:41-42","code":"   41 |         let progress = self.current as f32 / self.metadata.len() as f32;\n   42 |         self.controller.set_progress(progress);","lines":2},{"ref":"src/operation/mod.rs:176-188","code":"  176 |                 let item_progress = match progress.total_bytes {\n  177 |                     Some(total_bytes) => {\n  178 |                         if total_bytes == 0 {\n  179 |                             1.0\n  180 |                         } else {\n  181 |                             progress.current_bytes as f32 / total_bytes as f32\n  182 |                         }\n  183 |                     }\n  184 |                     None => 0.0,\n  185 |                 };\n  186 |                 let total_progress =\n  187 |                     (item_progress + progress.current_ops as f32) / progress.total_ops as f32;\n  188 |                 controller.set_progress(total_progress);","lines":13}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"AutoScroll converts scroll_speed_float * 10.0 to i16 via `as i16`. If the f32 scroll speed ever exceeds 3276.7 (or is NaN/inf) the cast saturates/produces 0 silently. Comment acknowledges the lossy conversion. Realistic auto-scroll deltas are small so impact is negligible, but the unchecked cast is a latent footgun.","fix":"Use `.clamp()` before casting, or `num_traits`/`as` with an explicit range check; not strictly necessary given expected value range.","locations":[{"ref":"src/dialog.rs:1876-1884","code":" 1876 |                         tab::Command::AutoScroll(scroll_speed) => {\n 1877 |                             // converting an f32 to an i16 here by multiplying by 10 and casting to i16\n 1878 |                             // further resolution isn't necessary\n 1879 |                             if let Some(scroll_speed_float) = scroll_speed {\n 1880 |                                 self.auto_scroll_speed = Some((scroll_speed_float * 10.0) as i16);\n 1881 |                             } else {\n 1882 |                                 self.auto_scroll_speed = None;\n 1883 |                             }\n 1884 |                         }","lines":9}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"zip symlink extraction on unix writes the symlink target verbatim from the archive (`OsString::from_vec(target)`) and creates the symlink with no validation that the target stays within the extraction directory. While the symlink FILE is placed at an `enclosed_name`-validated `outpath`, its TARGET is attacker-controlled and may be an absolute path or `../../etc/...`. A subsequent extracted entry whose path resolves THROUGH this symlink can then write outside the destination directory (classic symlink-based zip-slip). The tar path delegates to tar's `unpack` which has its own guarding, but the zip symlink path here is hand-rolled and unguarded.","fix":"Before creating symlinks, defer them and/or validate that resolving each later file path does not traverse a just-created symlink outside `directory`; or refuse symlinks whose target escapes the extraction root. At minimum, extract all regular files first and create symlinks last with target containment checks (the windows branch already resolves the target into the destination via join, but the unix branch writes the raw target).","locations":[{"ref":"src/archive.rs:188-228","code":"  188 |         if file.is_symlink() && (cfg!(unix) || cfg!(windows)) {\n  189 |             let mut target = Vec::with_capacity(file.size() as usize);\n  190 |             file.read_to_end(&mut target)?;\n  191 |             // File no longer needed, drop to allow reading target on windows\n  192 |             drop(file);\n  193 | \n  194 |             #[cfg(unix)]\n  195 |             {\n  196 |                 use std::os::unix::ffi::OsStringExt;\n  197 |                 let target = OsString::from_vec(target);\n  198 |                 std::os::unix::fs::symlink(&target, outpath.as_path())?;\n  199 |             }\n  200 |             #[cfg(windows)]\n  201 |             {\n  202 |                 let Ok(target) = String::from_utf8(target) else {\n  203 |                     return Err(ZipError::InvalidArchive(\n  204 |                         \"Invalid UTF-8 as symlink target\".into(),\n  205 |                     ));\n  206 |                 };\n  207 |                 let target_is_dir_from_archive = match password {\n  208 |                     None => archive.by_name(&target),\n  209 |                     Some(pwd) => archive.by_name_decrypt(&target, pwd.as_bytes()),\n  210 |                 }\n  211 |                 .map_or(false, |x| x.is_dir());\n  212 |                 let target_path = directory.as_ref().join(OsString::from(target.to_string()));\n  213 |                 let target_is_dir = if target_is_dir_from_archive {\n  214 |                     true\n  215 |                 } else if let Ok(meta) = std::fs::metadata(&target_path) {\n  216 |                     meta.is_dir()\n  217 |                 } else {\n  218 |                     false\n  219 |                 };\n  220 |                 if target_is_dir {\n  221 |                     std::os::windows::fs::symlink_dir(target_path, outpath.as_path())?;\n  222 |                 } else {\n  223 |                     std::os::windows::fs::symlink_file(target_path, outpath.as_path())?;\n  224 |                 }\n  225 |             }\n  226 | \n  227 |             written_files.push(outpath);\n  228 |             continue;","lines":41}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`Controller::unpause` uses a logical OR on two mutually-exclusive predicates: `if !self.is_cancelled() | !self.is_failed()`. Because the controller holds a single state value, at most one of `is_cancelled()`/`is_failed()` can be true at a time, so at least one of the negated terms is always true and the condition is effectively always true. This means a Cancelled or Failed operation will be forcibly reset to Running by `unpause()`. It also uses bitwise `|` instead of `||`. The intent was clearly `if !self.is_cancelled() && !self.is_failed()` (only resume to Running when neither cancelled nor failed). Resuming a cancelled/failed file operation can cause it to keep mutating user files after the user asked to stop.","fix":"Change to `if !self.is_cancelled() && !self.is_failed() { self.set_state(ControllerState::Running); }`.","locations":[{"ref":"src/operation/controller.rs:127-131","code":"  127 |     pub fn unpause(&self) {\n  128 |         if !self.is_cancelled() | !self.is_failed() {\n  129 |             self.set_state(ControllerState::Running);\n  130 |         }\n  131 |     }","lines":5}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In the Move fast path, existing destinations are silently skipped without any Replace prompt and the source is left untouched. `copy_or_move` builds move pairs and, for each, `if to.exists() { return Some((from, to)); }` (mod.rs:139-141) defers to the recursive mover instead of attempting a rename. The recursive mover then hard-links `from` to `to`; but for the top-level item, when `to` is a directory that already exists, the WalkDir of `from` produces a Mkdir op whose `to` is the existing dir (handled by create_dir_all, fine), yet file children that already exist at the destination go through the `is_file()` replace gate. The net effect: the TODO at mod.rs:138 (\"show replace dialog here?\") means a top-level move onto an existing path of a different type may neither prompt nor move, leaving the user believing the move happened. The behavior of move-onto-existing is inconsistent with copy and not surfaced to the user.","fix":"Route move-onto-existing destinations through the same replace/conflict resolution used by copy (handle_replace), rather than blindly deferring to the recursive path which only resolves file conflicts.","locations":[{"ref":"src/operation/mod.rs:135-169","code":"  135 |         let from_to_pairs: Vec<(PathBuf, PathBuf)> = if matches!(method, Method::Move { .. }) {\n  136 |             from_to_pairs_iter\n  137 |                 .map(|(from, to)| async move {\n  138 |                     //TODO: show replace dialog here?\n  139 |                     if to.exists() {\n  140 |                         return Some((from, to));\n  141 |                     }\n  142 | \n  143 |                     match compio::fs::rename(&from, &to).await {\n  144 |                         Ok(()) => {\n  145 |                             log::info!(\"renamed {} to {}\", from.display(), to.display());\n  146 |                             None\n  147 |                         }\n  148 |                         Err(err) => {\n  149 |                             log::info!(\n  150 |                                 \"failed to rename {} to {}, fallback to recursive move: {}\",\n  151 |                                 from.display(),\n  152 |                                 to.display(),\n  153 |                                 err\n  154 |                             );\n  155 |                             Some((from, to))\n  156 |                         }\n  157 |                     }\n  158 |                 })\n  159 |                 .collect::<cosmic::iced::futures::stream::FuturesOrdered<_>>()\n  160 |                 .fold(Vec::new(), |mut pairs, pair| async move {\n  161 |                     if let Some(pair) = pair {\n  162 |                         pairs.push(pair);\n  163 |                     }\n  164 |                     pairs\n  165 |                 })\n  166 |                 .await\n  167 |         } else {\n  168 |             from_to_pairs_iter.collect()\n  169 |         };","lines":35}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Overwrite/conflict detection only treats the destination as a conflict when it is a regular file (`op.to.is_file()`). This is used for the conflict count (recursive.rs:191) and for the replace gate in copy (recursive.rs:445), move (recursive.rs:362), and symlink (recursive.rs:411-412). `Path::is_file()` follows symlinks and returns false for directories, symlinks-to-directories, FIFOs, sockets, device nodes, and broken symlinks. Consequences: (1) if `to` is an existing directory or special file, no Replace dialog is shown and the subsequent `create_new(true)`/`hard_link`/`symlink` call fails with an opaque error instead of prompting the user; (2) `is_file()` follows the link, so when `to` is itself a symlink the check inspects the link target, not the link — an existing symlink at the destination may be silently overwritten or cause a confusing failure. Destination existence should be checked with `symlink_metadata`/`try_exists` (not following links) so all existing entries are detected as conflicts.","fix":"Detect destination existence with `op.to.symlink_metadata().is_ok()` (or `fs::symlink_metadata`), not `is_file()`, so directories, symlinks, and special files at the destination also trigger the replace flow and are correctly counted/handled.","locations":[{"ref":"src/operation/recursive.rs:185-193","code":"  185 |         self.remaining_conflicts = ops\n  186 |             .iter()\n  187 |             .filter(|op| {\n  188 |                 matches!(\n  189 |                     op.kind,\n  190 |                     OpKind::Copy | OpKind::Move { .. } | OpKind::Symlink { .. }\n  191 |                 ) && op.to.is_file()\n  192 |             })\n  193 |             .count();","lines":9},{"ref":"src/operation/recursive.rs:362","code":"  362 |                 if self.to.is_file() {","lines":1},{"ref":"src/operation/recursive.rs:412","code":"  412 |                 if self.to.is_file() {","lines":1},{"ref":"src/operation/recursive.rs:445","code":"  445 |         if self.to.is_file() {","lines":1}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"When the user chooses Replace, `replace()` unconditionally calls `compio::fs::remove_file(&op.to)` (recursive.rs:268). If the destination conflict is a directory or a symlink-to-directory, `remove_file` fails (EISDIR/EPERM) and the whole operation aborts; the existing destination directory is left and the copy/move never completes. Combined with the `is_file()` gate above, replacing a directory with a file (or vice versa) is not handled. Even when the gate is fixed to detect directories, `remove_file` alone cannot remove a directory destination.","fix":"Before removing, stat the destination (without following links): use `remove_file` for files/symlinks and `remove_dir_all` for directories, or explicitly disallow replacing a directory with a non-directory and surface a clear error/dialog.","locations":[{"ref":"src/operation/recursive.rs:263-270","code":"  263 |         match replace_result {\n  264 |             ReplaceResult::Replace(apply_to_all) => {\n  265 |                 if apply_to_all {\n  266 |                     self.replace_result_opt = Some(replace_result);\n  267 |                 }\n  268 |                 compio::fs::remove_file(&op.to).await?;\n  269 |                 Ok(ControlFlow::Continue(op.to.clone()))\n  270 |             }","lines":8}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Incremental search insertion assumes the items vector is sorted ascending by modified time, but search results are displayed sorted descending by modified time (sort_options() returns (Modified, false) for Search, and column_sort reverses the comparison). binary_search_by(|other| item_modified.cmp(&other.metadata.modified())) is therefore run against a descending-ordered slice, so the returned insertion index is essentially arbitrary. New search results are inserted at incorrect positions and the final on-screen order does not match the documented sort. The code's own TODO at line 4251 acknowledges this must match column_sort but it does not.","fix":"Match the descending order used by column_sort: invert the comparison to `other.metadata.modified().cmp(&item_modified)` (or sort/insert via the same key column_sort uses), so binary_search operates on the actual displayed ordering.","locations":[{"ref":"src/tab.rs:4251-4270","code":" 4251 |                                 //TODO: combine this with column_sort logic, they must match!\n 4252 |                                 let index =\n 4253 |                                     if let SearchItem::Path(_, _, ref metadata) = search_item {\n 4254 |                                         let item_modified = metadata.modified().ok();\n 4255 |                                         match items.binary_search_by(|other| {\n 4256 |                                             item_modified.cmp(&other.metadata.modified())\n 4257 |                                         }) {\n 4258 |                                             Ok(index) => index,\n 4259 |                                             Err(index) => index,\n 4260 |                                         }\n 4261 |                                     } else {\n 4262 |                                         items.len()\n 4263 |                                     };\n 4264 | \n 4265 |                                 if index < MAX_SEARCH_RESULTS {\n 4266 |                                     //TODO: use correct IconSizes\n 4267 |                                     let item =\n 4268 |                                         item_from_search_item(search_item, IconSizes::default());\n 4269 |                                     items.insert(index, item);\n 4270 |                                 }","lines":20}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Message::Copy and Message::Cut iterate `self.selected_paths(entity_opt)` twice: once to build `self.clipboard_cache` and again to build the `ClipboardCopy` written to the system clipboard. Because the iterator is lazily recomputed against current tab state, the two snapshots can diverge if selection changes between them (unlikely within one synchronous call, but the double traversal also re-walks all selected items and re-clones every PathBuf needlessly). More importantly it is fragile duplicated logic that can silently get out of sync.","fix":"Collect the selected paths once into a `Vec<PathBuf>`, then build both the cache (`ClipboardPaste { paths: paths.clone(), .. }`) and `ClipboardCopy::new(kind, paths.iter().cloned())` from that single snapshot.","locations":[{"ref":"src/app.rs:2969-2976","code":" 2969 |                 let paths = self.selected_paths(entity_opt);\n 2970 |                 self.clipboard_cache = ClipboardCache::Files(ClipboardPaste {\n 2971 |                     paths: paths.map(|p| p.to_path_buf()).collect(),\n 2972 |                     kind: ClipboardKind::Copy,\n 2973 |                 });\n 2974 |                 let contents =\n 2975 |                     ClipboardCopy::new(ClipboardKind::Copy, self.selected_paths(entity_opt));\n 2976 |                 return clipboard::write_data(contents);","lines":8},{"ref":"src/app.rs:3015-3025","code":" 3015 |                 let paths = self.selected_paths(entity_opt);\n 3016 |                 self.clipboard_cache = ClipboardCache::Files(ClipboardPaste {\n 3017 |                     paths: paths.map(|p| p.to_path_buf()).collect(),\n 3018 |                     kind: ClipboardKind::Cut { is_dnd: false },\n 3019 |                 });\n 3020 |                 let contents = ClipboardCopy::new(\n 3021 |                     ClipboardKind::Cut { is_dnd: false },\n 3022 |                     self.selected_paths(entity_opt),\n 3023 |                 );\n 3024 | \n 3025 |                 return clipboard::write_data(contents);","lines":11}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"When building the `text/plain` clipboard representation, path strings are joined with CRLF but no escaping or sanitization is performed (the `//TODO: what if the path contains CR or NL?` even acknowledges this). A filename containing a newline produces a text/plain payload that, when parsed back as a line-delimited list, splits into multiple bogus paths. Filenames may legally contain newlines on Unix.","fix":"Either document that text/plain is best-effort display only, or filter/escape control characters (CR/LF) out of path strings before joining. Paste parsing should rely on uri-list / gnome-copied-files, not text/plain, which it already does.","locations":[{"ref":"src/clipboard.rs:51-52","code":"   51 |                     //TODO: what if the path contains CR or NL?\n   52 |                     text_plain.push_str(path_str);","lines":2}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"DialogLabel::from treats an escaped underscore incorrectly. An input '_' sets next_underline=true so the following char is underlined and consumed as the accelerator key. To render a literal underscore the convention would be '__', but the code path `if c == '_' && !underline` means the second '_' (with underline==true) is pushed as an underlined span and ALSO becomes the alt key bind, rather than producing a literal non-underlined '_'. There is no way to emit a literal underscore, and a label that legitimately contains an underscore (e.g. a filename-derived accept label) silently turns the next character into an Alt accelerator.","fix":"Handle '__' as an escape for a literal underscore: when c=='_' and underline is true (previous was an escape marker), push a literal '_' span with underline=false and do not set a key bind.","locations":[{"ref":"src/dialog.rs:156-183","code":"  156 |         for c in text.as_ref().chars() {\n  157 |             let underline = next_underline;\n  158 |             next_underline = false;\n  159 | \n  160 |             if c == '_' && !underline {\n  161 |                 next_underline = true;\n  162 |                 continue;\n  163 |             }\n  164 | \n  165 |             if underline && key_bind_opt.is_none() {\n  166 |                 key_bind_opt = Some(KeyBind {\n  167 |                     modifiers: vec![Modifier::Alt],\n  168 |                     key: Key::Character(c.to_lowercase().to_string().into()),\n  169 |                 });\n  170 |             }\n  171 | \n  172 |             if let Some(span) = spans.last_mut()\n  173 |                 && underline == span.underline\n  174 |             {\n  175 |                 span.text.push(c);\n  176 |                 continue;\n  177 |             }\n  178 | \n  179 |             spans.push(DialogLabelSpan {\n  180 |                 text: String::from(c),\n  181 |                 underline,\n  182 |             });\n  183 |         }","lines":28}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Command-line argument parsing treats any arg that `url::Url::parse` accepts with a non-file scheme as a remote URI. A relative path or filename that happens to contain a colon (e.g. `foo:bar`, a valid Unix filename) parses as a URL with scheme `foo` and is pushed onto `uris` instead of being canonicalized as a local path. Windows drive paths like `C:\\dir` similarly parse as scheme `c`.","fix":"Before attempting URL parsing, check whether the argument refers to an existing path on disk (or starts with `/`, `./`, `../`, `~`), and only fall back to URL parsing for args that are clearly URIs (contain `://` or a recognized scheme).","locations":[{"ref":"src/lib.rs:172-182","code":"  172 |             let path = match url::Url::parse(&arg) {\n  173 |                 Ok(url) if url.scheme() == \"file\" => if let Ok(path) = url.to_file_path() { path } else {\n  174 |                     log::warn!(\"invalid argument {arg:?}\");\n  175 |                     continue;\n  176 |                 },\n  177 |                 Ok(url) => {\n  178 |                     uris.push(url);\n  179 |                     continue;\n  180 |                 }\n  181 |                 _ => PathBuf::from(arg),\n  182 |             };","lines":11}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"selected_trash_only is set to true whenever ANY selected item is in Trash/Search(Trash) (line 141), then narrowed by `&& selected == 1` afterward (line 157). But the branch that consumes it is gated on tab.location being a Path/Recents/Search(Path|Recents) mode (lines 181-189) — a selection whose item.location_opt is Trash inside a non-trash tab.location is unusual. The 'trash only' single-item open/empty-trash menu is thus shown based on per-item location while the outer match keys on tab.location, which can present an inconsistent menu (Open + Empty Trash) for a single item that merely reports a Trash location_opt while browsing a normal directory.","fix":"Derive selected_trash_only from tab.location, or assert that item.location_opt cannot be Trash unless the tab location is Trash.","locations":[{"ref":"src/menu.rs:139-157","code":"  139 |                 match &item.location_opt {\n  140 |                     Some(Location::Trash) | Some(Location::Search(SearchLocation::Trash, ..)) => {\n  141 |                         selected_trash_only = true\n  142 |                     }\n  143 |                     Some(Location::Path(path))\n  144 |                         if selected == 1\n  145 |                             && path.extension().and_then(|s| s.to_str()) == Some(\"desktop\") =>\n  146 |                     {\n  147 |                         selected_desktop_entry = Some(&**path);\n  148 |                     }\n  149 |                     _ => (),\n  150 |                 }\n  151 |                 selected_types.push(item.mime.clone());\n  152 |             }\n  153 |         }\n  154 |     }\n  155 |     selected_types.sort_unstable();\n  156 |     selected_types.dedup();\n  157 |     selected_trash_only = selected_trash_only && selected == 1;","lines":19},{"ref":"src/menu.rs:190-194","code":"  190 |             if selected_trash_only {\n  191 |                 children.push(menu_item(fl!(\"open\"), Action::Open).into());\n  192 |                 if !Trash::is_empty() {\n  193 |                     children.push(menu_item(fl!(\"empty-trash\"), Action::EmptyTrash).into());\n  194 |                 }","lines":5}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"get_default_terminal strips the desktop suffix with string.trim().replace(\".desktop\", \"\"), which replaces every occurrence of \".desktop\" anywhere in the id, not just the trailing extension. A desktop id that legitimately contains the substring \".desktop\" (e.g. \"org.foo.desktopthing.desktop\") would be mangled, breaking the subsequent id comparison in terminal().","fix":"Use string.trim().strip_suffix(\".desktop\").unwrap_or(trimmed).to_string() to strip only the trailing suffix, matching the approach used in set_default (lines 468-471) and the defaults loop (line 357).","locations":[{"ref":"src/mime_app.rs:411-414","code":"  411 |         String::from_utf8(output.stdout)\n  412 |             .ok()\n  413 |             .map(|string| string.trim().replace(\".desktop\", \"\"))\n  414 |     }","lines":4}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In network_scan every enumerated child is assigned the hardcoded mime type \"inode/directory\", regardless of whether the entry is actually a file or a directory. The TODO on line 184 (\"get mime from content_type?\") acknowledges this. Downstream tab logic sorts and treats items by mime/is_dir, so plain files on a network share are mislabeled as directories, affecting sorting, icons (the icon fallback uses metadata.is_dir() separately so it can disagree with the mime), and open behavior.","fix":"Derive the mime from info.content_type() (gio FILE_ATTRIBUTE_STANDARD_CONTENT_TYPE) or from info.file_type(), and only use inode/directory when the entry is actually a directory; otherwise parse the content type or fall back to application/octet-stream.","locations":[{"ref":"src/mounter/gvfs.rs:183-190","code":"  183 |             (\n  184 |                 //TODO: get mime from content_type?\n  185 |                 \"inode/directory\".parse().unwrap(),\n  186 |                 file_icon(sizes.grid()),\n  187 |                 file_icon(sizes.list()),\n  188 |                 file_icon(sizes.list_condensed()),\n  189 |             )\n  190 |         };","lines":8}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Double-click is lost when on_press is set. On a left ButtonPressed, if click.kind() is Double the on_double_click message is published, but then lines 624-627 unconditionally `shell.capture_event(); return;` whenever on_press is Some. That is fine. However the prev_click reset logic on release (lines 647-668) requires a 'recent_click' within DOUBLE_CLICK_DURATION; if the user double-clicks slowly the second press is treated as Single. More importantly, the Triple arm (line 613) routes to on_press, so a triple click fires on_press again instead of on_double_click or a dedicated handler, silently dropping the triple-click distinction (TODO at line 614 acknowledges this).","fix":"Decide explicit behavior for Triple clicks; currently treating them as a fresh single press can cause an unexpected extra selection toggle.","locations":[{"ref":"src/mouse_area.rs:602-628","code":"  602 |         match click.kind() {\n  603 |             click::Kind::Single => {\n  604 |                 if let Some(message) = widget.on_press.as_ref() {\n  605 |                     shell.publish(message(cursor.position_in(layout_bounds)));\n  606 |                 }\n  607 |             }\n  608 |             click::Kind::Double => {\n  609 |                 if let Some(message) = widget.on_double_click.as_ref() {\n  610 |                     shell.publish(message(cursor.position_in(layout_bounds)));\n  611 |                 }\n  612 |             }\n  613 |             click::Kind::Triple => {\n  614 |                 // TODO what to do here\n  615 |                 if let Some(message) = widget.on_press.as_ref() {\n  616 |                     shell.publish(message(cursor.position_in(layout_bounds)));\n  617 |                 }\n  618 |             }\n  619 |         }\n  620 |         if widget.on_drag.is_some() {\n  621 |             state.drag_initiated = cursor.position();\n  622 |         }\n  623 | \n  624 |         if widget.on_press.is_some() {\n  625 |             shell.capture_event();\n  626 |             return;\n  627 |         }\n  628 |     }","lines":27}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the left-button release handling, when on_release is None the event is not captured and drag_initiated is cleared only inside the `if let Some(message)` block (line 661 is before it, line 662). Actually drag_initiated is reset at line 661 unconditionally within the recent_click branch, but if widget.on_release is None the function falls through and continues evaluating the right/middle/back/forward/scroll/drag branches for a left-button-release event. Those matches won't fire for Left, but the trailing on_drag publish at line 787 WILL run on the release event, publishing a drag rectangle on mouse-up even though the drag just ended. This can emit a spurious selection-rectangle message after release.","fix":"Return after handling the left-button release regardless of whether on_release is set, or clear drag_initiated before reaching the on_drag block on release events.","locations":[{"ref":"src/mouse_area.rs:651-668","code":"  651 |     if matches!(\n  652 |         event,\n  653 |         Event::Mouse(mouse::Event::ButtonReleased(mouse::Button::Left))\n  654 |             | Event::Touch(touch::Event::FingerLifted { .. })\n  655 |     ) && state.prev_click.is_some()\n  656 |     {\n  657 |         if !recent_click {\n  658 |             state.prev_click = None;\n  659 |             return;\n  660 |         }\n  661 |         state.drag_initiated = None;\n  662 |         if let Some(message) = widget.on_release.as_ref() {\n  663 |             shell.publish(message(cursor.position_in(layout_bounds)));\n  664 | \n  665 |             shell.capture_event();\n  666 |             return;\n  667 |         }\n  668 |     }","lines":18},{"ref":"src/mouse_area.rs:787-795","code":"  787 |     if let Some((message, drag_rect)) = widget.on_drag.as_ref().zip(state.drag_rect(cursor)) {\n  788 |         shell.publish(message(drag_rect.intersection(&layout_bounds).map(\n  789 |             |mut rect| {\n  790 |                 rect.x -= layout_bounds.x;\n  791 |                 rect.y -= layout_bounds.y;\n  792 |                 rect\n  793 |             },\n  794 |         )));\n  795 |     }","lines":9}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Symlink copies/moves preserve the link target verbatim via `fs::read_link` (recursive.rs:123-130) and recreate it at the new location (recursive.rs:422-433). For relative symlinks this can silently break the link when the destination is in a different directory (the relative path no longer resolves), and for absolute symlinks pointing inside the copied tree the copy will still point at the original tree rather than the copy. There is no rewriting of internal relative targets when copying a directory tree, which can produce dangling or cross-pointing links in the copied data.","fix":"Document/decide intended semantics; at minimum, when copying a directory tree, rewrite relative symlink targets that point within the source tree to point within the destination tree, or warn the user about links that will dangle.","locations":[{"ref":"src/operation/recursive.rs:123-130","code":"  123 |                 } else if file_type.is_symlink() {\n  124 |                     let target = fs::read_link(&from).map_err(|err| {\n  125 |                         OperationError::from_err(\n  126 |                             format!(\"failed to read link {}: {}\", from_parent.display(), err),\n  127 |                             &self.controller,\n  128 |                         )\n  129 |                     })?;\n  130 |                     OpKind::Symlink { target }","lines":8},{"ref":"src/operation/recursive.rs:410-433","code":"  410 |             OpKind::Symlink { ref target } => {\n  411 |                 // Remove `to` if overwriting and it is an existing file\n  412 |                 if self.to.is_file() {\n  413 |                     match ctx.replace(self).await? {\n  414 |                         ControlFlow::Continue(to) => {\n  415 |                             self.to = to;\n  416 |                         }\n  417 |                         ControlFlow::Break(ret) => {\n  418 |                             return Ok(ret);\n  419 |                         }\n  420 |                     }\n  421 |                 }\n  422 |                 #[cfg(unix)]\n  423 |                 {\n  424 |                     std::os::unix::fs::symlink(target, &self.to)?;\n  425 |                 }\n  426 |                 #[cfg(windows)]\n  427 |                 {\n  428 |                     if target.is_dir() {\n  429 |                         std::os::windows::fs::symlink_dir(target, &self.to)?;\n  430 |                     } else {\n  431 |                         std::os::windows::fs::symlink_file(target, &self.to)?;\n  432 |                     }\n  433 |                 }","lines":24}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`remaining_conflicts` (the conflict count shown in the Replace dialog) is computed once before the loop (recursive.rs:185-193) and never decremented as conflicts are resolved. Every subsequent conflict dialog reports the original total rather than the number of conflicts still remaining, so the count shown to the user is wrong for all but the first conflict.","fix":"Decrement `self.remaining_conflicts` each time a conflict is resolved (in `replace()`), or recompute/pass the remaining count when invoking the on_replace callback.","locations":[{"ref":"src/operation/recursive.rs:185-193","code":"  185 |         self.remaining_conflicts = ops\n  186 |             .iter()\n  187 |             .filter(|op| {\n  188 |                 matches!(\n  189 5046 |                 {\n 5047 |                     self.tab_dnd_hover = None;\n 5048 |                     return self.update(Message::TabActivate(entity));\n 5049 |                 }\n 5050 |             }","lines":10}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In footer(), `total_progress /= count as f32` can divide by zero when `progress_operations` is non-empty but no pending operation reports `show_progress_notification()` and none of the progress ids are present in `complete_operations` (e.g. an operation removed from pending without being added to complete). This yields `total_progress = NaN`, which is then fed into the progress bar and `((total_progress * 100.0) as i32)` (NaN-to-int is 0), showing a broken/blank progress bar.","fix":"Guard the division: `if count > 0 { total_progress /= count as f32; } else { total_progress = 0.0; }` (or return None / skip rendering when count == 0).","locations":[{"ref":"src/app.rs:6313-6338","code":" 6313 |         let running = count;\n 6314 |         // Adjust the progress bar so it does not jump around when operations finish\n 6315 |         for id in &self.progress_operations {\n 6316 |             if self.complete_operations.contains_key(id) {\n 6317 |                 total_progress += 1.0;\n 6318 |                 count += 1;\n 6319 |             }\n 6320 |         }\n 6321 |         let finished = count - running;\n 6322 |         total_progress /= count as f32;\n 6323 |         if running >= 1 && (running > 1 || finished > 0) {\n 6324 |             if finished > 0 {\n 6325 |                 title = fl!(\n 6326 |                     \"operations-running-finished\",\n 6327 |                     running = running,\n 6328 |                     finished = finished,\n 6329 |                     percent = ((total_progress * 100.0) as i32)\n 6330 |                 );\n 6331 |             } else {\n 6332 |                 title = fl!(\n 6333 |  + file_progress) / total_files as f32;\n  252 |                 controller.set_progress(total_progress);\n  253 |             }\n  254 |         }","lines":24}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`system_time_to_zip_date_time` and `zip_date_time_to_system_time` cast year/month/day/etc via `as i16`/`as u16`/`as i8`/`as u8` with no range checks. For dates outside the DOS/zip representable range (1980-2107) `zip::DateTime::from_date_and_time` returns Err (handled via `.ok()`), but the `as` casts on out-of-range jiff values silently wrap before validation, so a year like 2024 is fine but an extreme year could wrap into a spuriously-valid in-range value and be accepted as a wrong date.","fix":"Use checked conversions (`u16::try_from(date_time.year()).ok()?` etc.) before constructing the zip DateTime so out-of-range values are rejected rather than wrapped.","locations":[{"ref":"src/archive.rs:291-321","code":"  291 | fn zip_date_time_to_system_time(date_time: zip::DateTime) -> Option<SystemTime> {\n  292 |     let dt = DateTime::new(\n  293 |         date_time.year() as i16,\n  294 |         date_time.month() as i8,\n  295 |         date_time.day() as i8,\n  296 |         date_time.hour() as i8,\n  297 |         date_time.minute() as i8,\n  298 |         date_time.second() as i8,\n  299 |         0,\n  300 |     )\n  301 |     .ok()?;\n  302 |     TimeZone::system()\n  303 |         .to_ambiguous_zoned(dt)\n  304 |         .later()\n  305 |         .ok()\n  306 |         .map(SystemTime::from)\n  307 | }\n  308 | \n  309 | pub fn system_time_to_zip_date_time(system_time: SystemTime) -> Option<zip::DateTime> {\n  310 |     let date_time = Zoned::try_from(system_time).ok()?;\n  311 | \n  312 |     zip::DateTime::from_date_and_time(\n  313 |         date_time.year() as u16,\n  314 |         date_time.month() as u8,\n  315 |         date_time.day() as u8,\n  316 |         date_time.hour() as u8,\n  3
