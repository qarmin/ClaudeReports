g position or size on first display.","fix":"Always update parent_space regardless of visibility, and ensure at least one extra layout pass is triggered after first show.","locations":[{"ref":"src/widgets/help_screen.rs:156-175","code":"  156 | \tfn layout(&self, available_space: LogicalRect) {\n  157 | \t\tlet mut borrowed = self.data.borrow_mut();\n  158 | \t\tif !borrowed.visible {\n  159 | \t\t\treturn;\n  160 | \t\t}\n  161 | \t\tif !borrowed.initiaizlied {\n  162 | \t\t\tborrowed.initiaizlied = true;\n  163 | \t\t\tlet img_data = borrowed.usage_image.get_metadata().unwrap();\n  164 | \t\t\tborrowed.placement = WidgetPlacement {\n  165 | \t\t\t\twidth: Length::Fixed(img_data.width as f32 * 0.5),\n  166 | \t\t\t\theight: Length::Fixed(img_data.height as f32 * 0.5),\n  167 | \t\t\t\thorizontal_align: Alignment::Center,\n  168 | \t\t\t\tvertical_align: Alignment::Center,\n  169 | \t\t\t\tignore_layout: true,\n  170 | \t\t\t\t..Default::default()\n  171 | \t\t\t};\n  172 | \t\t}\n  173 | \t\tborrowed.default_layout(available_space);\n  174 | \t\tborrowed.parent_space = available_space;\n  175 | \t}","lines":20}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The benchmark code path is broken: `update_draw_dt` is defined as a local closure inside `Application::start_event_loop` (lines 100-121) but is called inside the `window_event` method on `AppWithAppHandler` (line 218), which is an entirely different function scope. When the `benchmark` feature is enabled this will fail to compile because `update_draw_dt` is out of scope.","fix":"Move `update_draw_dt` into the `AppWithAppHandler` struct as a field (behind `#[cfg(feature = \"benchmark\")]`), or store the closure in a field that `window_event` can access.","locations":[{"ref":"subcrates/gelatin/src/application.rs:99-121","code":"   99 | \t\t#[cfg(feature = \"benchmark\")]\n  100 | \t\tlet mut update_draw_dt = {\n  101 | \t\t\tlet mut last_draw_time = std::time::Instant::now();\n  102 | \t\t\tlet mut prev_draw_dts = vec![0f32; 64];\n  103 | \t\t\tlet mut prev_draw_dt_index = 0;\n  104 | \n  105 | \t\t\tmove || {\n  106 | \t\t\t\tlet now = std::time::Instant::now();\n  107 | \t\t\t\tlet delta_time = now.duration_since(last_draw_time).as_secs_f32();\n  108 | \t\t\t\tlast_draw_time = now;\n  109 | \t\t\t\tprev_draw_dts[prev_draw_dt_index] = delta_time;\n  110 | \t\t\t\tprev_draw_dt_index = (prev_draw_dt_index + 1) % prev_draw_dts.len();\n  111 | \t\t\t\tif prev_draw_dt_index == 0 {\n  112 | \t\t\t\t\tlet max_dt = prev_draw_dts.iter().fold(0.0f32, |a, &b| a.max(b));\n  113 | \t\t\t\t\tprintln!(\n  114 | \t\t\t\t\t\t\"{} redraws finsished, max delta time in that duration was: {}ms, {} FPS\",\n  115 | \t\t\t\t\t\tprev_draw_dts.len(),\n  116 | \t\t\t\t\t\t(max_dt * 1000.0).round() as i32,\n  117 | \t\t\t\t\t\t(1.0 / max_dt).round() as i32\n  118 | \t\t\t\t\t);\n  119 | \t\t\t\t}\n  120 | \t\t\t}\n  121 | \t\t};","lines":23},{"ref":"subcrates/gelatin/src/application.rs:218","code":"  218 | \t\t\tupdate_draw_dt();","lines":1}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"When `stretch_widget_count == 0.0` (no Stretch children) but `max_stretch_space > 0.0`, `stretch_space_per_widget = max_stretch_space / 0.0` evaluates to positive infinity in IEEE 754. This infinity is then passed to `layout_aligned_children`. Inside that function the guard `if stretch_space_per_widget > 0.0` is true for infinity, so any remaining Stretch child (that should not exist but could arrive via logic path with `min == 0`) would be given infinite width/height, corrupting the layout.","fix":"Guard against zero: `let stretch_space_per_widget = if stretch_widget_count > 0.0 { max_stretch_space / stretch_widget_count } else { 0.0 };`","locations":[{"ref":"subcrates/gelatin/src/line_layout_container.rs:237","code":"  237 | \t\tlet stretch_space_per_widget = max_stretch_space / stretch_widget_count;","lines":1},{"ref":"subcrates/gelatin/src/line_layout_container.rs:112-135","code":"  112 | \tfn layout_aligned_children(\n  113 | \t\talignement_group: &[Rc<dyn Widget>],\n  114 | \t\tstretch_space_per_widget: f32,\n  115 | \t\twidget_available_space: &mut LogicalRect,\n  116 | \t) {\n  117 | \t\tfor child in alignement_group.iter() {\n  118 | \t\t\tlet placement: WidgetPlacement = child.placement();\n  119 | \t\t\tlet margins = Dim::margin_start(&placement) + Dim::margin_end(&placement);\n  120 | \t\t\tmatch Dim::extent(&placement) {\n  121 | \t\t\t\tLength::Fixed(extent) => {\n  122 | \t\t\t\t\t*Dim::rect_size_mut(widget_available_space) = extent + margins;\n  123 | \t\t\t\t}\n  124 | \t\t\t\tLength::Stretch { max, .. } => {\n  125 | \t\t\t\t\tif stretch_space_per_widget > 0.0 {\n  126 | \t\t\t\t\t\tlet max_space = max + margins;\n  127 | \t\t\t\t\t\t*Dim::rect_size_mut(widget_available_space) =\n  128 | \t\t\t\t\t\t\tstretch_space_per_widget.min(max_space);\n  129 | \t\t\t\t\t}\n  130 | \t\t\t\t}\n  131 | \t\t\t}\n  132 | \t\t\tchild.layout(*widget_available_space);\n  133 | \t\t\t*Dim::rect_pos_mut(widget_available_space) += Dim::rect_size(widget_available_space);\n  134 | \t\t}\n  135 | \t}","lines":24}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Slider::set_value` accepts any `u32` without validating that it is less than `borrowed.steps`. A caller can set `value >= steps`, causing `value_ratio > 1.0` in the draw path and the slider thumb to render outside the widget bounds. There is also no clamping or assertion.","fix":"Add `borrowed.value = value.min(borrowed.steps.saturating_sub(1));` inside `set_value`.","locations":[{"ref":"subcrates/gelatin/src/slider.rs:84-88","code":"   84 | \tpub fn set_value(&self, value: u32) {\n   85 | \t\tlet mut borrowed = self.data.borrow_mut();\n   86 | \t\tborrowed.value = value;\n   87 | \t\tborrowed.render_validity.invalidate();\n   88 | \t}","lines":5}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `Slider::draw`, when `borrowed.steps == 0`, the expression `borrowed.steps as f32` is `0.0`, so `value_ratio = (value as f32 + 0.5) / 0.0` is `+Inf`. The resulting `slider_pos` is infinite, and the subsequent matrix transforms produce NaN/Inf uniforms sent to the GPU. While unlikely to crash (drivers typically clamp), it wastes a draw call and can trigger driver warnings or undefined rendering behavior.","fix":"Early-return from draw (or skip the slider-position draw call) when `borrowed.steps == 0`.","locations":[{"ref":"subcrates/gelatin/src/slider.rs:133-134","code":"  133 | \t\t\tlet value_ratio = (borrowed.value as f32 + 0.5) / (borrowed.steps as f32);\n  134 | \t\t\tlet slider_pos = Vector3::new(position.x + value_ratio * size.x, position.y, 0.0);","lines":2}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `Slider::handle_event`, when `MouseButton::Left` is Pressed, `borrowed.click` is set from the stale `borrowed.hover` value (which was last updated by the most recent `MouseMove` event). Only afterwards does `check_value_change()` refresh `borrowed.hover`. If the cursor moves directly over the slider and clicks without a preceding `MouseMove` event (possible on some platforms/touch), `hover` is false, so `click` is set to false, and the initial click is lost. The slider becomes unresponsive until a MouseMove fires.","fix":"Update `borrowed.hover` from `event.cursor_pos` before reading it to set `borrowed.click`, or restructure so `check_value_change` is called first and then `click` is set from the freshly-updated hover.","locations":[{"ref":"subcrates/gelatin/src/slider.rs:229-233","code":"  229 | \t\t\t\t\t{\n  230 | \t\t\t\t\t\tlet mut borrowed = self.data.borrow_mut();\n  231 | \t\t\t\t\t\tborrowed.click = borrowed.hover;\n  232 | \t\t\t\t\t}\n  233 | \t\t\t\t\tcheck_value_change();","lines":5}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Window::new` sets `window_attributes.inner_size = Some(desc.size.into())` unconditionally on line 208, then sets it again identically on line 216 inside the `if !desc.maximized` branch. The first assignment is dead - it is always overwritten by the second when not maximized, or remains set (contrary to the doc comment which says size is ignored when maximized) when `desc.maximized == true`. When maximized, the size hint should not be set.","fix":"Remove the first `inner_size` assignment (line 208). The second assignment inside `if !desc.maximized` is the correct one.","locations":[{"ref":"subcrates/gelatin/src/window.rs:208","code":"  208 | \t\twindow_attributes.inner_size = Some(desc.size.into());","lines":1},{"ref":"subcrates/gelatin/src/window.rs:216","code":"  216 | \t\t\twindow_attributes.inner_size = Some(desc.size.into());","lines":1}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"update_directory only resets curr_file_idx when files.len() <= curr_file_idx (line 252). The condition is <= rather than <, so when the list shrinks to exactly match curr_file_idx (i.e., curr_file_idx == files.len()), the code enters the if branch and resets to 0 correctly - but the surrounding comment says 'preserve index', which is misleading. However the real bug is that the condition should be >= not <=: len <= idx means idx is out of bounds.","fix":"The condition `self.files.len() <= self.curr_file_idx` is actually correct for an out-of-bounds check (len must be > idx for a valid index), so this is fine logically, but the comment should clarify the intent.","locations":[{"ref":"src/image_cache/directory.rs:252","code":"  252 | \t\tif self.files.len() <= self.curr_file_idx && !self.files.is_empty() {","lines":1}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `load_specific`, after calling `change_directory_with_filename`, there is a check `if self.dir.path() != parent` (line 426) to detect a directory change. However, `change_directory_with_filename` may itself change the directory if `dir_path` is different. The check uses the path comparison after the change, so if the directory was already correct the condition is false, but this path is only followed when the directory DID change -- which is correct. The intent appears to be detecting that the directory changed *as a result of this call*, but the variable `parent` vs `self.dir.path()` comparison is fragile: if `change_directory_with_filename` normalizes the path differently from `parent`, the comparison could give wrong results.","fix":"Track whether a directory change actually occurred (e.g., record the path before and after the call) rather than relying on a path string comparison.","locations":[{"ref":"src/image_cache/mod.rs:420-432","code":"  420 | \t\tif let Some(target_file_name) = target_file_name {\n  421 | \t\t\tself.change_directory_with_filename(&parent, &target_file_name)?;\n  422 | \t\t} else {\n  423 | \t\t\tself.change_directory(&parent)?;\n  424 | \t\t\tself.current_frame_idx = 0;\n  425 | \t\t}\n  426 | \t\tif self.dir.path() != parent {\n  427 | \t\t\tlet DirItem { path, request_id } = self.curr_dir_item().ok_or_else(|| {\n  428 | \t\t\t\tTextureError::Other(\"Could not get path for current image\".into())\n  429 | \t\t\t})?;\n  430 | \t\t\tself.send_request_for_file(path, request_id, RequestKind::Priority { display });\n  431 | \t\t\treturn Err(TextureError::WaitingOnLoader);\n  432 | \t\t}","lines":13}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `process_prefetched`, the early return on error (`if retval.is_err() { return retval; }`) happens inside the outer `for id in req_ids` loop, meaning any upload failure immediately aborts processing of all remaining pending requests. This may leave valid prefetched images unprocessed.","fix":"Collect errors and continue processing remaining requests, returning only the last or first error at the end.","locations":[{"ref":"src/image_cache/mod.rs:568-571","code":"  568 | \t\t\t#[allow(clippy::question_mark)]\n  569 | \t\t\tif retval.is_err() {\n  570 | \t\t\t\treturn retval;\n  571 | \t\t\t}","lines":4}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"contains() returns false for finished requests (line 66-70), but get_all_ids() returns all IDs including finished ones (line 57-59). This inconsistency means callers using get_all_ids() to iterate and then calling contains() will incorrectly treat finished-but-not-yet-removed requests as absent.","fix":"Document clearly which methods include finished entries and which don't, or make get_all_ids filter consistently.","locations":[{"ref":"src/image_cache/pending_requests.rs:57-70","code":"   57 | \tpub fn get_all_ids(&self) -> Vec<u32> {\n   58 | \t\tself.by_id.keys().copied().collect()\n   59 | \t}\n   60 | \n   61 | \tpub fn cancelled(&self, id: &u32) -> Option<bool> {\n   62 | \t\tself.get(id).map(|i| i.cancelled)\n   63 | \t}\n   64 | \n   65 | \tpub fn contains(&self, id: &u32) -> bool {\n   66 | \t\tif let Some(info) = self.by_id.get(id) {\n   67 | \t\t\t!info.finished\n   68 | \t\t} else {\n   69 | \t\t\tfalse\n   70 | \t\t}","lines":14}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `PlaybackManager::update_directory`, the comment says 'The there's no file to open, just request to open the empty path' (line 232), but the code actually calls `self.image_cache.current_file_path().unwrap_or_default()` and then requests loading that path. If `current_file_path()` returns `None` (no current file), `unwrap_or_default()` gives an empty `PathBuf`, and `request_load(LoadRequest::FilePath(empty_path))` is called. Loading an empty path will likely result in an error or unexpected behavior.","fix":"When `current_file_path()` returns `None`, skip the load request or use a dedicated `LoadRequest` variant to signal 'clear current image' rather than requesting an empty path.","locations":[{"ref":"src/playback_manager.rs:233-234","code":"  233 | \t\t\t\tlet path = self.image_cache.current_file_path().unwrap_or_default();\n  234 | \t\t\t\tself.request_load(LoadRequest::FilePath(path));","lines":2}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"fit_image_to_panel performs size.x / size.y (panel aspect ratio) and img_phys_w / img_pyhs_h (image aspect ratio) without guarding against zero. A zero-height panel or a degenerate zero-height image produces NaN/infinity for the texel size, silently corrupting the zoom level.","fix":"Return early if `size.y == 0.0 || img_pyhs_h == 0.0` before computing aspect ratios.","locations":[{"ref":"src/widgets/picture_widget.rs:185","code":"  185 | \t\t\tlet panel_aspect = size.x / size.y;","lines":1},{"ref":"src/widgets/picture_widget.rs:190","code":"  190 | \t\t\tlet img_aspect = img_phys_w / img_pyhs_h;","lines":1}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Button::draw` does not check `borrowed.visible` before drawing. Every other widget (`Label`, `Slider`, the container) guards `if !borrowed.visible { return Ok(NextUpdate::Latest); }` at the start of `draw`. A hidden button still renders its icon or colored quad.","fix":"Add `if !borrowed.visible { return Ok(NextUpdate::Latest); }` immediately after the borrow at line 93.","locations":[{"ref":"subcrates/gelatin/src/button.rs:90-171","code":"   90 | \tfn draw(&self, target: &mut Frame, context: &DrawContext) -> Result<NextUpdate, WidgetError> {\n   91 | \t\tuse glium::{Blend, BlendingFunction, LinearBlendingFact  Into::<[f32; 3]>::into(Vector3::<f32>::new(0.0, 0.0, 0.0)),\n  134 | \t\t\t\t\tshadow_offset: if borrowed.click {\n  135 | \t\t\t\t\t\t0.5f32\n  136 | \t\t\t\t\t} else if borrowed.hover { 0.7 } else { 1.0f32 }\n  137 | \t\t\t\t};\n  138 | \t\t\t\ttarget\n  139 | \t\t\t\t\t.draw(\n  140 | \t\t\t\t\t\tcontext.unit_quad_vertices,\n  141 | \t\t\t\t\t\tcontext.unit_quad_indices,\n  142 | \t\t\t\t\t\tcontext.textured_program,\n  143 | \t\t\t\t\t\t&uniforms,\n  144 | \t\t\t\t\t\t&image_draw_params,\n  145 | \t\t\t\t\t)\n  146 | \t\t\t\t\t.unwrap();\n  147 | \t\t\t} else {\n  148 | \t\t\t\t// building the uniforms\n  149 | \t\t\t\tlet uniforms = uniform! {\n  150 | \t\t\t\t\tmatrix: Into::<[[f32; 4]; 4]>::into(transform),\n  151 | \t\t\t\t\tbg_color: borrowed.bg_color,\n  152 | \t\t\t\t\tsize: texture_size,\n  153 | \t\t\t\t\t//brighten: if self.hover { 0.15f32 } else { 0.0f32 },\n  154 | \t\t\t\t\tbrighten: 0.0f32,\n  155 | \t\t\t\t\tshadow_color: Into::<[f32; 3]>::into(Vector3::<f32>::new(0.0, 0.0, 0.0)),\n  156 | \t\t\t\t\tshadow_offset: if borrowed.click {\n  157 | \t\t\t\t\t\t0.5f32\n  158 | \t\t\t\t\t} else if borrowed.hover { 0.7 } else { 1.0f32 }\n  159 | \t\t\t\t};\n  160 | \t\t\t\ttarget\n  161 | \t\t\t\t\t.draw(\n  162 | \t\t\t\t\t\tcontext.unit_quad_vertices,\n  163 | \t\t\t\t\t\tcontext.unit_quad_indices,\n  164 | \t\t\t\t\t\tcontext.colored_shadowed_program,\n  165 | \t\t\t\t\t\t&uniforms,\n  166 | \t\t\t\t\t\t&image_draw_params,\n  167 | \t\t\t\t\t)\n  168 | \t\t\t\t\t.unwrap();\n  169 | \t\t\t}\n  170 | \t\t}\n  171 | \t\tOk(NextUpdate::Latest)","lines":82}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Button::handle_event` does not guard on `borrowed.visible`. An invisible button still receives and processes mouse events (hover/click state changes, fires `on_click` callback). `Slider::handle_event` correctly early-returns when not visible.","fix":"Add `if !self.data.borrow().visible { return; }` at the start of `handle_event`.","locations":[{"ref":"subcrates/gelatin/src/button.rs:179-214","code":"  179 | \tfn handle_event(&self, event: &Event) {\n  180 | \t\tmatch event.kind {\n  181 | \t\t\tEventKind::MouseMove => {\n  182 | \t\t\t\tlet mut borrowed = self.data.borrow_mut();\n  183 | \t\t\t\tlet prev_hover = borrowed.hover;\n  184 | \t\t\t\tborrowed.hover = borrowed.drawn_bounds.contains(event.cursor_pos);\n  185 | \t\t\t\tif borrowed.hover != prev_hover {\n  186 | \t\t\t\t\tborrowed.render_validity.invalidate();\n  187 | \t\t\t\t}\n  188 | \t\t\t}\n  189 | \t\t\tEventKind::MouseButton { state, button: MouseButton::Left, .. } => match state {\n  190 | \t\t\t\tElementState::Pressed => {\n  191 | \t\t\t\t\tlet mut borrowed = self.data.borrow_mut();\n  192 | \t\t\t\t\tborrowed.click = borrowed.hover;\n  193 | \t\t\t\t\tborrowed.render_validity.invalidate();\n  194 | \t\t\t\t}\n  195 | \t\t\t\tElementState::Released => {\n  196 | \t\t\t\t\tlet on_click;\n  197 | \t\t\t\t\t{\n  198 | \t\t\t\t\t\tlet mut borrowed = self.data.borrow_mut();\n  199 | \t\t\t\t\t\tif borrowed.click && borrowed.hover {\n  200 | \t\t\t\t\t\t\ton_click = borrowed.on_click.clone();\n  201 | \t\t\t\t\t\t} else {\n  202 | \t\t\t\t\t\t\ton_click = None;\n  203 | \t\t\t\t\t\t}\n  204 | \t\t\t\t\t\tborrowed.click = false;\n  205 | \t\t\t\t\t\tborrowed.render_validity.invalidate();\n  206 | \t\t\t\t\t}\n  207 | \t\t\t\t\tif let Some(callback) = on_click {\n  208 | \t\t\t\t\t\tcallback();\n  209 | \t\t\t\t\t}\n  210 | \t\t\t\t}\n  211 | \t\t\t},\n  212 | \t\t\t_ => (),\n  213 | \t\t}\n  214 | \t}","lines":36}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `Label::draw`, the `color` uniform is hardcoded to `[1.0, 0.1, 0.5, 0.5]` (a semi-transparent pink/magenta) in both the textured and the colored-shadowed branches. The `Label` widget exposes no API to set this color. This appears to be leftover debug/prototype code; labels likely should use a configurable or neutral color.","fix":"Add a `color: [f32; 4]` field to `LabelData` with a sensible default (e.g. white), expose `set_color()`, and pass `borrowed.color` to the uniform.","locations":[{"ref":"subcrates/gelatin/src/label.rs:118","code":"  118 | \t\t\t\t\tcolor: [1.0f32, 0.1, 0.5, 0.5],","lines":1},{"ref":"subcrates/gelatin/src/label.rs:138","code":"  138 | \t\t\t\t\tcolor: [1.0f32, 0.1, 0.5, 0.5],","lines":1}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`LineLayoutContainer::handle_event` propagates events to all children including invisible ones. Invisible children can still update hover/click state and fire callbacks.","fix":"Skip invisible children: `for child in children.iter() { if child.visible() { child.handle_event(event); } }`","locations":[{"ref":"subcrates/gelatin/src/line_layout_container.rs:277-279","code":"  277 | \t\tfor child in children.iter() {\n  278 | \t\t\tchild.handle_event(event);\n  279 | \t\t}","lines":3}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `Window::set_fullscreen` (line 702), `borrowed.fullscreen = fullscreen` is always written, but there is no guard preventing the call from being a no-op (setting fullscreen to its current value). Calling `window.set_fullscreen` with the already-active value is benign but redundant and could confuse `size_before_fullscreen` tracking.","fix":"Add an early return when `borrowed.fullscreen == fullscreen`.","locations":[{"ref":"subcrates/gelatin/src/window.rs:702-716","code":"  702 | \tpub fn set_fullscreen(&self, fullscreen: bool) {\n  703 | \t\tlet mut borrowed = self.data.borrow_mut();\n  704 | \t\tborrowed.fullscreen = fullscreen;\n  705 | \t\tlet monitor = if fullscreen {\n  706 | \t\t\tlet curr_mon;\n  707 | \t\t\tborrowed.size_before_fullscreen = {\n  708 | \t\t\t\tcurr_mon = borrowed.window.current_monitor();\n  709 | \t\t\t\tborrowed.window.inner_size()\n  710 | \t\t\t};\n  711 | \t\t\tSome(Fullscreen::Borderless(curr_mon))\n  712 | \t\t} else {\n  713 | \t\t\tNone\n  714 | \t\t};\n  715 | \t\tborrowed.window.set_fullscreen(monitor);\n  716 | \t}","lines":15}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `upload_to_texture`, when `self.pending_requests.cancelled(&req_id)` returns `None` (the request ID is not found in pending requests), the function returns `Ok(None)` silently (lines 659-664 and 699-703). This means frames for unknown request IDs are silently discarded. A `None` return from `cancelled()` for an in-flight result indicates a logic error (results arriving for requests never recorded), which should at least be logged.","fix":"Add a `log::warn!` or `log::debug!` for the case where `cancelled()` returns `None`, to aid in diagnosing logic errors.","locations":[{"ref":"src/image_cache/mod.rs:658-664","code":"  658 | \t\t\t\tif let Some(cancelled) = self.pending_requests.cancelled(&req_id) {\n  659 | \t\t\t\t\tif cancelled {\n  660 | \t\t\t\t\t\treturn Ok(None);\n  661 | \t\t\t\t\t}\n  662 | \t\t\t\t} else {\n  663 | \t\t\t\t\treturn Ok(None);\n  664 | \t\t\t\t}","lines":7},{"ref":"src/image_cache/mod.rs:698-703","code":"  698 | \t\t\t\tif let Some(cancelled) = self.pending_requests.cancelled(&req_id) {\n  699 | \t\t\t\t\tif cancelled {\n  700 | \t\t\t\t\t\treturn Ok(None);\n  701 | \t\t\t\t\t}\n  702 | \t\t\t\t} else {\n  703 | \t\t\t\t\treturn Ok(None);","lines":6}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `get_config_and_cache_paths`, `std::env::current_exe()` is called with `.expect(\"Failed to get current executable path\")`. This panics during startup if the executable path cannot be determined (e.g., on some exotic platforms or after the executable is deleted). This is a startup panic with a reasonable message, but it is in the fallback path that is only reached when `ProjectDirs` returns `None`.","fix":"Return a `Result` from this function and propagate the error to `main`, exiting gracefully with an error message.","locations":[{"ref":"src/main.rs:510-517","code":"  510 | \t\tlet exe_path = std::env::current_exe().expect(\"Failed to get current executable path\");\n  511 | \t\tlet exe_folder = exe_path.parent().expect(&format!(\n  512 | \t\t\t\"Failed to get executable folder from exe path: {:?}\",\n  513 | \t\t\texe_path\n  514 | \t\t));\n  515 | \t\tconfig_folder = exe_folder.to_owned();\n  516 | \t\tcache_folder = exe_folder.to_owned();\n  517 | \t}","lines":8}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"HelpScreen::draw passes uniforms to context.textured_program (which compiles texture_shadow_f_140.glsl) without including the required bg_color uniform. The shader uses bg_color in a mix() call. In OpenGL the missing uniform defaults to vec4(0), meaning the help image is composited against a transparent black background instead of the actual background color, producing incorrect alpha blending.","fix":"Add `bg_color: [0.0f32, 0.0, 0.0, 0.0]` (or the actual window background color) to the uniform block, matching the pattern used in gelatin/src/label.rs:119.","locations":[{"ref":"src/widgets/help_screen.rs:130-139","code":"  130 | \t\t\tlet uniforms = uniform! {\n  131 | \t\t\t\tmatrix: Into::<[[f32; 4]; 4]>::into(transform),\n  132 | \t\t\t\ttex: sampler,\n  133 | \t\t\t\tcolor: [1.0f32, 0.1, 0.5, 0.5],\n  134 | \t\t\t\ttexture_size: texture_size,\n  135 | \t\t\t\t//brighten: if self.hover { 0.15f32 } else { 0.0f32 },\n  136 | \t\t\t\tbrighten: 0.0f32,\n  137 | \t\t\t\tshadow_color: Into::<[f32; 3]>::into(Vector3::<f32>::new(0.0, 0.0, 0.0)),\n  138 | \t\t\t\tshadow_offset: 1.0f32\n  139 | \t\t\t};","lines":10}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"collect_directory calls dir_files.clone() to pass the file list to filter_action.give_input while also assigning the original to self.files. This clones the entire Vec<DirItem> (which includes a PathBuf per entry). For large directories this is an unnecessary allocation.","fix":"Assign self.files first and pass self.files.clone() to give_input, or restructure give_input to accept a reference and clone internally only if needed.","locations":[{"ref":"src/image_cache/directory.rs:291","code":"  291 | \t\tself.filter_action.give_input(dir_files.clone());","lines":1}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"In `refresh_cache`, `cache.into_iter().enumerate()` produces `(usize, (u32, CachedTexture))` tuples which are then sorted and filtered. The entire `texture_cache` BTreeMap is taken out via `mem::take`, converted to a `Vec`, sorted, filtered, and then re-inserted. For large caches this involves multiple full allocations and copies. The final `collect()` also requires sorting again (BTreeMap insertion is O(log n)). This is called on every image navigation.","fix":"Consider maintaining an auxiliary sorted structure or performing cache eviction incrementally rather than rebuilding the entire map on every load.","locations":[{"ref":"src/image_cache/mod.rs:454-482","code":"  454 | \tfn refresh_cache(&mut self) {\n  455 | \t\ttrace!(\"Begin `refresh_cache`\");\n  456 | \t\tif let Some(curr_index) = self.dir.curr_img_index() {\n  457 | \t\t\tlet cache = mem::take(&mut self.texture_cache);\n  458 | \n  459 | \t\t\t// Delete all entries that are outside the range of files around the current file\n  460 | \t\t\t// allowed by the capacity.\n  461 | \t\t\t// Walk through our list of directory entries sorted by their distance from the current\n  462 | \t\t\t// file and in each step remove an entry from the cache until we reach the desired cache\n  463 | \t\t\t// size\n  464 | \t\t\tlet mut sorted_files: Vec<_> = cache.into_iter().enumerate().collect();\n  465 | \t\t\tsorted_files\n  466 | \t\t\t\t.sort_unstable_by_key(|&(index, _)| (index as isize - curr_index as isize).abs());\n  467 | \t\t\tself.remaining_capacity = self.total_capacity;\n  468 | \t\t\tsorted_files.retain(|(_, (_, texture))| {\n  469 | \t\t\t\t// TODO consider retaining individual frames.\n  470 | \t\t\t\tlet all_frames_size = get_anim_size_estimate(&texture.frames);\n  471 | \n  472 | \t\t\t\tif self.remaining_capacity > (all_frames_size + self.curr_est_size) {\n  473 | \t\t\t\t\tself.remaining_capacity -= all_frames_size;\n  474 | \t\t\t\t\ttrue\n  475 | \t\t\t\t} else {\n  476 | \t\t\t\t\tfalse\n  477 | \t\t\t\t}\n  478 | \t\t\t});\n  479 | \n  480 | \t\t\tself.texture_cache = sorted_files.into_iter().map(|(_, entry)| entry).collect();\n  481 | \t\t}\n  482 | \t}","lines":29}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"PendingRequests::len() iterates over all entries and counts them via iter().count(), which is O(n). It is called in code paths that check the queue size. The actual count could be maintained as a field incremented/decremented on add/remove.","fix":"Add a count: usize field to PendingRequests, increment it in add_request and decrement it in set_finished/take_results.","locations":[{"ref":"src/image_cache/pending_requests.rs:83-85","code":"   83 | \tpub fn len(&self) -> usize {\n   84 | \t\tself.iter().count()\n   85 | \t}","lines":3}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"execute_triggered_commands (input_handling.rs line 82) calls cmd.status() on line 105, which blocks the calling thread until the spawned process exits. This function is called synchronously from the UI event loop (picture_widget.rs line 649). A long-running user command will freeze the entire application UI for its duration.","fix":"Use cmd.spawn() instead of cmd.status() to launch the command in the background without blocking the UI thread.","locations":[{"ref":"src/input_handling.rs:105-107","code":"  105 | \t\t\t\tif let Err(e) = cmd.status() {\n  106 | \t\t\t\t\teprintln!(\"Error while executing the following user command. See the error below.\\n{:?}\\nError: {:?}\", command, e);\n  107 | \t\t\t\t}","lines":3}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `prefetch_neighbors`, the loop only ever increments `index` (lines 751-758), never looking behind the current file. This means only images after the current image in directory order are prefetched, not images before it. Navigating backward will always result in cache misses.","fix":"Prefetch in both directions by alternating between `index + offset` and `index - offset` for increasing `offset` values.","locations":[{"ref":"src/playback_manager.rs:745-759","code":"","lines":15},{"ref":"src/image_cache/mod.rs:745-759","code":"  745 | \tpub fn prefetch_neighbors(&mut self) {\n  746 | \t\tif let Some(mut index) = self.dir.curr_img_index() {\n  747 | \t\t\t// Send enough load requests so that the estimated total will just fill the cache\n  748 | \t\t\tlet mut estimated_remaining_cap = self.remaining_capacity;\n  749 | \n  750 | \t\t\twhile estimated_remaining_cap > self.curr_est_size {\n  751 | \t\t\t\t// Send a load request for the closest file not in the cache or outdated\n  752 | \t\t\t\tindex += 1;\n  753 | \t\t\t\tif self.prefetch_at_index(index) {\n  754 | \t\t\t\t\testimated_remaining_cap -= self.curr_est_size;\n  755 | \t\t\t\t} else {\n  756 | \t\t\t\t\tbreak;\n  757 | \t\t\t\t}\n  758 | \t\t\t}\n  759 | \t\t}","lines":15}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Window::redraw` borrows `self.data` three separate times before the drawing phase (lines 636, 637, 640): once for `dpi_scaling`, once to <div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
