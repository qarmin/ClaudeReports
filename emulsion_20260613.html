<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"handle_panic.rs calls .expect() and .unwrap() inside the panic hook. If write_to_file fails (e.g. disk full, permissions), the .expect() on line 42 panics again inside the panic hook. Likewise, create_dir_all on line 57 uses .unwrap(). Panicking inside a panic hook causes an immediate process abort, losing the original panic message and backtrace that the handler was meant to preserve.","fix":"Replace both .expect() and .unwrap() inside handle_panic/write_to_file with error-returning paths or silent eprintln! fallbacks so the handler never itself panics.","locations":[{"ref":"src/handle_panic.rs:42-42","code":"   42 | \twrite_to_file(&msg).expect(\"Could not write panic to file.\");","lines":1},{"ref":"src/handle_panic.rs:57-57","code":"   57 | \t\tstd::fs::create_dir_all(&local_data_folder).unwrap();","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"jump_to_prev performs an underflow subtraction when files is empty. `(self.files.len() - 1) - self.curr_file_idx` will underflow when files.len() == 0 because usize subtraction wraps/panics in debug mode.","fix":"Guard the function with an early return if self.files.is_empty(), or use saturating/checked arithmetic.","locations":[{"ref":"src/image_cache/directory.rs:172","code":"  172 | \t\tlet skip = (self.files.len() - 1) - self.curr_file_idx;","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"thread_loop calls load_request.recv().unwrap() and request_send.send(request).unwrap() while holding the Mutex lock. If the channel is disconnected (e.g. during shutdown), recv() returns Err and this panics, crashing the worker thread. The running flag is set to false before waking threads, but recv() will panic before the flag is checked.","fix":"Match on the result of recv() and break the loop on Err; do the same for the requeue send.","locations":[{"ref":"src/image_cache/image_loader.rs:363","code":"  363 | \t\t\t\trequest = load_request.recv().unwrap();","lines":1},{"ref":"src/image_cache/image_loader.rs:371","code":"  371 | \t\t\t\t\trequest_send.send(request).unwrap();","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `load_jump`, when `file_jump_count.abs() == 1`, `self.dir.curr_descriptor()` is called and immediately unwrapped without checking for `None`. This can occur when the directory hasn't finished filtering yet (the filter thread hasn't produced any results), leading to a panic.","fix":"Return `Err(PathResolutionError::WaitingOnDirFilter)` instead of unwrapping: `let target_path = match self.dir.curr_descriptor() { Some(d) => d.path.clone(), None => return Err(PathResolutionError::WaitingOnDirFilter) };`","locations":[{"ref":"src/image_cache/mod.rs:518","code":"  518 | \t\t\ttarget_path = self.dir.curr_descriptor().unwrap().path.clone();","lines":1}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `load_jump`, when `file_jump_count.abs() > 1` and both `curr_img_index` and `image_count` are available, `self.dir.image_by_index(target_index).unwrap()` is called on line 526 without handling `None`. The directory filter could still be in an intermediate state where `image_count()` returns `Some` but `image_by_index` returns `None` for the computed index.","fix":"Use `ok_or(PathResolutionError::WaitingOnDirFilter)?` instead of `.unwrap()`.","locations":[{"ref":"src/image_cache/mod.rs:526","code":"  526 | \t\t\ttarget_path = self.dir.image_by_index(target_index).unwrap().path.clone();","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `receive_prefetched`, a channel disconnect is treated as an unrecoverable panic: `Err(TryRecvError::Disconnected) => panic!(\"Channel disconnected unexpectidly.\")`. If the loader thread exits early due to any error, this will hard-crash the application with no chance for cleanup or user-facing error reporting.","fix":"Log an error and break out of the loop (or set a flag indicating the loader has failed) rather than panicking. The caller can then surface a user-visible error.","locations":[{"ref":"src/image_cache/mod.rs:542","code":"  542 | \t\t\t\tErr(TryRecvError::Disconnected) => panic!(\"Channel disconnected unexpectidly.\"),","lines":1}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"HelpScreen::draw calls target.draw(...).unwrap() twice (for the overlay quad and for the image quad) while the function signature returns Result<NextUpdate, WidgetError>. GPU errors will panic instead of being propagated.","fix":"Use `?` on both draw calls instead of `.unwrap()`.","locations":[{"ref":"src/widgets/help_screen.rs:100-108","code":"  100 | \t\t\ttarget\n  101 | \t\t\t\t.draw(\n  102 | \t\t\t\t\tcontext.unit_quad_vertices,\n  103 | \t\t\t\t\tcontext.unit_quad_indices,\n  104 | \t\t\t\t\tcontext.colored_program,\n  105 | \t\t\t\t\t&uniforms,\n  106 | \t\t\t\t\t&image_draw_params,\n  107 | \t\t\t\t)\n  108 | \t\t\t\t.unwrap();","lines":9},{"ref":"src/widgets/help_screen.rs:140-148","code":"  140 | \t\t\ttarget\n  141 | \t\t\t\t.draw(\n  142 | \t\t\t\t\tcontext.unit_quad_vertices,\n  143 | \t\t\t\t\tcontext.unit_quad_indices,\n  144 | \t\t\t\t\tcontext.textured_program,\n  145 | \t\t\t\t\t&uniforms,\n  146 | \t\t\t\t\t&image_draw_params,\n  147 | \t\t\t\t)\n  148 | \t\t\t\t.unwrap();","lines":9}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"unreachable!() is used when upgrading the Weak<Window> reference on a double-click. If the window is dropped while the widget is still alive (e.g. during shutdown), this panics. A Weak upgrade can legitimately return None, so unreachable! is wrong here.","fix":"Replace `None => unreachable!()` with `None => {}` or a log statement to silently skip the action when the window is gone.","locations":[{"ref":"src/widgets/picture_widget.rs:803","code":"  803 | \t\t\t\t\t\t\t\t\tNone => unreachable!(),","lines":1}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"draw_tex_grid calls target.draw(...).unwrap() in the per-frame hot path. Any GPU/driver error (out-of-memory, context loss) causes an unconditional panic instead of propagating the error through the Result<NextUpdate, WidgetError> return type of Widget::draw.","fix":"Return the error with `?` or map it to WidgetError, as the function signature already supports Result.","locations":[{"ref":"src/widgets/picture_widget.rs:1098-1106","code":" 1098 | \t\ttarget\n 1099 | \t\t\t.draw(\n 1100 | \t\t\t\tcontext.unit_quad_vertices,\n 1101 | \t\t\t\tcontext.unit_quad_indices,\n 1102 | \t\t\t\t&data.program,\n 1103 | \t\t\t\t&uniforms,\n 1104 | \t\t\t\t&image_draw_params,\n 1105 | \t\t\t)\n 1106 | \t\t\t.unwrap();","lines":9}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `window_event`, `self.application.windows.get(&window_id).unwrap()` is called twice (lines 215 and 234) and will panic if `window_id` is not found in the map. The winit event loop can deliver events for windows that the application did not register (e.g. a window created directly via winit without going through gelatin's `ActiveEventLoop::create_window`). There is no guard against this.","fix":"Replace `.unwrap()` with `.expect(\"unknown window id\")` or, better, guard with `if let Some(window) = ... { }` and log a warning on the missing-window case.","locations":[{"ref":"subcrates/gelatin/src/application.rs:214-215","code":"  214 | \t\t\tlet new_control_flow =\n  215 | \t\t\t\tself.application.windows.get(&window_id).unwrap().redraw().into();","lines":2},{"ref":"subcrates/gelatin/src/application.rs:231-235","code":"  231 | \t\tself.application\n  232 | \t\t\t.windows\n  233 | \t\t\t.get(&window_id)\n  234 | \t\t\t.unwrap()\n  235 | \t\t\t.process_event::<UserEvent>(event, event_loop);","lines":5}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `Button::draw`, both the textured-icon and the colored-shadowed branches call `.unwrap()` on `target.draw(...)`. A GPU draw error causes a panic instead of being surfaced as `WidgetError`.","fix":"Replace `.unwrap()` with `.map_err(|e| WidgetError::...)? ` to propagate draw errors through the existing `Result<NextUpdate, WidgetError>` return type.","locations":[{"ref":"subcrates/gelatin/src/button.rs:139-145","code":"  139 | \t\t\t\t\t.draw(\n  140 | \t\t\t\t\t\tcontext.unit_quad_vertices,\n  141 | \t\t\t\t\t\tcontext.unit_quad_indices,\n  142 | \t\t\t\t\t\tcontext.textured_program,\n  143 | \t\t\t\t\t\t&uniforms,\n  144 | \t\t\t\t\t\t&image_draw_params,\n  145 | \t\t\t\t\t)","lines":7},{"ref":"subcrates/gelatin/src/button.rs:161-168","code":"  161 | \t\t\t\t\t.draw(\n  162 | \t\t\t\t\t\tcontext.unit_quad_vertices,\n  163 | \t\t\t\t\t\tcontext.unit_quad_indices,\n  164 | \t\t\t\t\t\tcontext.colored_shadowed_program,\n  165 | \t\t\t\t\t\t&uniforms,\n  166 | \t\t\t\t\t\t&image_draw_params,\n  167 | \t\t\t\t\t)\n  168 | \t\t\t\t\t.unwrap();","lines":8}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `Label::draw`, both the textured and colored branches call `.unwrap()` on `target.draw(...)` with the same problem as Button.","fix":"Same fix as Button: propagate with `?` / `map_err`.","locations":[{"ref":"subcrates/gelatin/src/label.rs:127-133","code":"  127 | \t\t\t\t\t.draw(\n  128 | \t\t\t\t\t\tcontext.unit_quad_vertices,\n  129 | \t\t\t\t\t\tcontext.unit_quad_indices,\n  130 | \t\t\t\t\t\tcontext.textured_program,\n  131 | \t\t\t\t\t\t&uniforms,\n  132 | \t\t\t\t\t\t&image_draw_params,\n  133 | \t\t\t\t\t)","lines":7},{"ref":"subcrates/gelatin/src/label.rs:145-153","code":"  145 | \t\t\t\ttarget\n  146 | \t\t\t\t\t.draw(\n  147 | \t\t\t\t\t\tcontext.unit_quad_vertices,\n  148 | \t\t\t\t\t\tcontext.unit_quad_indices,\n  149 | \t\t\t\t\t\tcontext.colored_shadowed_program,\n  150 | \t\t\t\t\t\t&uniforms,\n  151 | \t\t\t\t\t\t&image_draw_params,\n  152 | \t\t\t\t\t)\n  153 | \t\t\t\t\t.unwrap();","lines":9}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `Picture::cpu_to_texture`, `SrgbTexture2d::with_mipmaps` is called with `.unwrap()`. A GPU texture allocation failure (out of VRAM, context loss, etc.) causes an unconditional panic instead of propagating an error to the caller.","fix":"Return `Result<SrgbTexture2d, glium::texture::TextureCreationError>` from `cpu_to_texture` and propagate the error with `?`. Convert or wrap the error type so `texture()` / `upload_to_texture` can return it.","locations":[{"ref":"subcrates/gelatin/src/picture.rs:128-133","code":"  128 | \t\tSrgbTexture2d::with_mipmaps(\n  129 | \t\t\tfacade,\n  130 | \t\t\timage,\n  131 | \t\t\tglium::texture::MipmapsOption::AutoGeneratedMipmaps,\n  132 | \t\t)\n  133 | \t\t.unwrap()","lines":6}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `Slider::draw`, both `target.draw(...)` calls use `.unwrap()`, panicking on any GPU error.","fix":"Propagate draw errors with `?` / `map_err` like the other widget draw methods.","locations":[{"ref":"subcrates/gelatin/src/slider.rs:144-151","code":"  144 | \t\t\ttarget\n  145 | \t\t\t\t.draw(\n  146 | \t\t\t\t\tcontext.unit_quad_vertices,\n  147 | \t\t\t\t\tcontext.unit_quad_indices,\n  148 | \t\t\t\t\tcontext.colored_program,\n  149 | \t\t\t\t\t&uniforms,\n  150 | \t\t\t\t\t&image_draw_params,\n  151 | \t\t\t\t)","lines":8},{"ref":"subcrates/gelatin/src/slider.rs:171-178","code":"  171 | \t\t\ttarget\n  172 | \t\t\t\t.draw(\n  173 | \t\t\t\t\tcontext.unit_quad_vertices,\n  174 | \t\t\t\t\tcontext.unit_quad_indices,\n  175 | \t\t\t\t\tcontext.colored_shadowed_program,\n  176 | \t\t\t\t\t&uniforms,\n  177 | \t\t\t\t\t&image_draw_params,\n  178 | \t\t\t\t)","lines":8}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`NonZeroU32::new(width).unwrap()` and `NonZeroU32::new(height).unwrap()` in `build_winit_window` (lines 393-394) panic if the window's inner size is zero. While `Window::new` enforces a minimum of 200 px on the *requested* size, the actual OS-reported `inner_size()` at creation time can be 0 on some compositors before the window is mapped. This is a crash in the initialization path.","fix":"Use `NonZeroU32::new(width.max(1))` and `NonZeroU32::new(height.max(1))` to avoid the panic.","locations":[{"ref":"subcrates/gelatin/src/window.rs:393-394","code":"  393 | \t\t\t\t\tNonZeroU32::new(width).unwrap(),\n  394 | \t\t\t\t\tNonZeroU32::new(height).unwrap(),","lines":2}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`Window::process_event` calls `return` early (line 472) inside the block that handles `WindowEvent::Resized` when the size is zero, but does so with `self.data` still mutably borrowed via `borrowed`. The `RefMut` guard is held across all match arms; the early `return` drops it correctly in Rust, but while exiting it also skips the `event = None` assignment at line 470 that was already executed. The real panic risk is the `assert!(borrowed.global_event_handlers.is_empty())` on line 466: if any global event handler calls `add_global_event_handler` during the callback loop, this assert fires and crashes the process, even in production builds. Assertions should not be used for user-controllable invariants.","fix":"Replace `assert!` with a `warn!` or `debug_assert!` if the invariant only needs to hold internally. Alternatively document clearly that event handlers must not register new handlers.","locations":[{"ref":"subcrates/gelatin/src/window.rs:466","code":"  466 | \t\t\tassert!(borrowed.global_event_handlers.is_empty());","lines":1}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"clipboard_handler.rs line 103 panics with panic!(\"{}\", e) when condvar.wait_timeout returns a PoisonError. A PoisonError on this mutex happens when the main thread panics while holding the state lock (e.g. inside request_copy or try_get_result). This secondary panic kills the clipboard background thread, after which Drop::drop calls handle.join().unwrap() on the now-dead thread, which itself panics in the main thread's drop path.","fix":"Replace the panic!() branch with a return or break so the thread exits cleanly when the mutex is poisoned.","locations":[{"ref":"src/clipboard_handler.rs:98-105","code":"   98 | \t\t\t\t\t\tmatch request_handle.condvar.wait_timeout(state_guard, WAIT_TIMEOUT) {\n   99 | \t\t\t\t\t\t\tOk((guard, _)) => {\n  100 | \t\t\t\t\t\t\t\tstate_guard = guard;\n  101 | \t\t\t\t\t\t\t}\n  102 | \t\t\t\t\t\t\tErr(e) => {\n  103 | \t\t\t\t\t\t\t\tpanic!(\"{}\", e);\n  104 | \t\t\t\t\t\t\t}\n  105 | \t\t\t\t\t\t}","lines":8}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ClipboardHandler::drop calls handle.join().unwrap() on line 174. Same problem as in ParallelAction: if the clipboard worker thread ever panics (e.g. from the panic!() on line 103), unwrapping the join result panics in drop.","fix":"Log the error instead of unwrapping the join result.","locations":[{"ref":"src/clipboard_handler.rs:174-174","code":"  174 | \t\t\thandle.join().unwrap();","lines":1}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"TitleSection::format_file_path calls .unwrap() on file_name() when displayed_folders is Some(0) or None. A path with no file-name component (e.g. the root '/' or a directory ending in '..') causes a panic.","fix":"Use .and_then(|n| Some(n.to_string_lossy())).unwrap_or_default() or return an empty Cow.","locations":[{"ref":"src/configuration.rs:188","code":"  188 | \t\t\tSome(0) | None => file_path.file_name().unwrap().to_string_lossy(),","lines":1}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"change_directory_with_filename calls .unwrap() on file_name() for every directory entry without guarding against paths where file_name() returns None (e.g. paths ending in '/').","fix":"Replace .unwrap() with .unwrap_or_default() or skip entries where file_name() is None.","locations":[{"ref":"src/image_cache/directory.rs:133","code":"  133 | \t\t\tif desc.path.file_name().unwrap() == filename {","lines":1}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"collect_directory sorts files with .unwrap() on file_name(). A path that ends in '..' (a legitimate result of some canonicalization paths) returns None from file_name(), causing a panic in the sort comparator.","fix":"Use .unwrap_or_default() or filter out paths where file_name() is None before sorting.","locations":[{"ref":"src/image_cache/directory.rs:279-281","code":"  279 | \t\t\t\t&a.path.file_name().unwrap().to_string_lossy(),\n  280 | \t\t\t\t&b.path.file_name().unwrap().to_string_lossy(),\n  281 | \t\t\t)","lines":3}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"set_image_index_from_file_index unconditionally calls .unwrap() on an Option<u32> obtained from file_i_to_img_i. If the current file index points to a non-image file (None entry), this panics.","fix":"Use if let Some(Some(img_idx)) = self.file_i_to_img_i.get(self.curr_file_idx) to skip the unwrap.","locations":[{"ref":"src/image_cache/directory.rs:314","code":"  314 | \t\t\tself.curr_image_idx = img_idx.unwrap() as usize;","lines":1}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"send_load_request calls self.path_tx.send(request).unwrap(). If all worker threads have panicked or exited (e.g. after a previous panic), the channel is disconnected and this panics the caller thread.","fix":"Propagate the error via Result rather than unwrapping, so the caller can handle a failed send gracefully.","locations":[{"ref":"src/image_cache/image_loader.rs:384","code":"  384 | \t\tself.path_tx.send(request).unwrap();","lines":1}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ImageLoader::Drop sends a dummy LoadRequest per thread to unblock recv(). However it holds no guarantee that the dummy requests won't be dequeued and processed by threads: a thread may pick up a dummy request and call fs::metadata on an empty path, which will return an error and send a Failed result to the already-dropped receiver, causing send().unwrap() to panic.","fix":"Use a dedicated shutdown sentinel value (e.g. an enum wrapping the request), or check for an empty path in load_and_send and return early.","locations":[{"ref":"src/image_cache/image_loader.rs:416-420","code":"  416 | \t\tif let Some(join_handles) = self.join_handles.take() {\n  417 | \t\t\tfor _ in join_handles.iter() {\n  418 | \t\t\t\tself.path_tx.send(LoadRequest { req_id: 0, path: PathBuf::from(\"\") }).unwrap();\n  419 | \t\t\t}\n  420 | ","lines":5}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"add_load_result hits unreachable!() when a load result arrives for an unknown request ID. Because load results are sent from worker threads asynchronously, a race where the request was cancelled/removed before the result arrives will cause a panic instead of silently dropping the result.","fix":"Replace unreachable!() with a no-op or a debug log, since an unknown ID is a valid race condition during cancellation.","locations":[{"ref":"src/image_cache/pending_requests.rs:93","code":"   93 | \t\t\tunreachable!()","lines":1}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In `main.rs`, `exiting()` calls `self.cache.lock().unwrap().save(&self.cache_path).unwrap()`. If saving the cache fails (e.g., disk full, permission error), the program panics during shutdown instead of printing a meaningful error message.","fix":"Use `if let Err(e) = ... { eprintln!(\"Failed to save cache: {e}\"); }` instead of `.unwrap()`.","locations":[{"ref":"src/main.rs:400","code":"  400 | \t\tself.cache.lock().unwrap().save(&self.cache_path).unwrap();","lines":1}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In `exiting()`, joining the update checker thread with `.unwrap()` will panic if that thread panicked. This is a secondary panic during shutdown that produces a confusing message.","fix":"Use `if let Err(e) = h.join() { eprintln!(\"Update checker thread panicked: {:?}\", e); }` instead of `.unwrap()`.","locations":[{"ref":"src/main.rs:401-403","code":"  401 | \t\tif let Some(h) = self.update_checker_join_handle.take() {\n  402 | \t\t\th.join().unwrap();\n  403 | \t\t}","lines":3}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`make_icon()` calls `.unwrap()` twice: once on `image::load_from_memory` and once on `Icon::from_rgba`. If the embedded PNG bytes are malformed or the platform rejects the icon dimensions, the application panics at startup with no user-visible error.","fix":"Propagate errors or log them and fall back to no icon rather than unwrapping.","locations":[{"ref":"src/main.rs:408-411","code":"  408 | \tlet img = image::load_from_memory(include_bytes!(\"../resource/emulsion48.png\")).unwrap();\n  409 | \tlet rgba = img.into_rgba8();\n  410 | \tlet (w, h) = rgba.dimensions();\n  411 | \tIcon::from_rgba(rgba.into_raw(), w, h).unwrap()","lines":4}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ParallelAction::drop calls handle.join().unwrap() on line 110. If the worker thread panicked for any reason, join() returns Err and unwrap() panics inside Drop, which is undefined behavior in Rust (double-panic from drop aborts the process with a confusing message).","fix":"Use `if let Err(e) = handle.join() { eprintln!(\"Worker thread panicked: {:?}\", e); }` instead of unwrap().","locations":[{"ref":"src/parallel_action.rs:110-110","code":"  110 | \t\t\thandle.join().unwrap();","lines":1}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"CopyNotifications::set_started, set_finished, and update all call self.widget.upgrade().unwrap(). The widget field is a Weak<Label>. If the Label is dropped before CopyNotifications (e.g. during shutdown or a programming error), all three callers panic.","fix":"Use if-let or return early when upgrade() returns None, rather than unwrapping.","locations":[{"ref":"src/widgets/copy_notification.rs:50","code":"   50 | \t\tlet widget = self.widget.upgrade().unwrap();","lines":1},{"ref":"src/widgets/copy_notification.rs:57","code":"   57 | \t\tlet widget = self.widget.upgrade().unwrap();","lines":1},{"ref":"src/widgets/copy_notification.rs:66","code":"   66 | \t\tlet widget = self.widget.upgrade().unwrap();","lines":1}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"HelpScreen::layout calls borrowed.usage_image.get_metadata().unwrap() to obtain image dimensions on the first layout pass. If get_metadata() returns an error (corrupt embedded image, decoding failure), this panics.","fix":"Handle the error: log it and use a fallback size, or propagate via the Widget API.","locations":[{"ref":"src/widgets/help_screen.rs:163","code":"  163 | \t\t\tlet img_data = borrowed.usage_image.get_metadata().unwrap();","lines":1}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`DrawContext::logical_rect_to_viewport` computes `window_phys_height - (rect.bottom() * dpi_scale) as u32` (line 372) as a `u32` subtraction. If a widget's bottom edge exceeds the window height (due to layout overflow, negative margins, or rounding) the subtraction wraps/panics in debug builds.","fix":"Use `window_phys_height.saturating_sub((rect.bottom() * dpi_scale) as u32)` or clamp the cast value before subtracting.","locations":[{"ref":"subcrates/gelatin/src/lib.rs:372","code":"  372 | \t\t\tbottom: window_phys_height - (rect.bottom() * dpi_scale) as u32,","lines":1}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`DrawContext::clear_color` calls `target.draw(...).unwrap()` (line 414) and `Window::set_alpha_to_1` calls `target.draw(...).unwrap()` (line 747). GPU draw failures (out-of-memory, context loss) will crash the process rather than being surfaced as recoverable errors. `Window::redraw` also calls `target.finish().unwrap()` on line 693.","fix":"Propagate draw and finish errors up via `Result`; at minimum log them and attempt a context recovery instead of panicking.","locations":[{"ref":"subcrates/gelatin/src/lib.rs:406-414","code":"  406 | \t\ttarget\n  407 | \t\t\t.draw(\n  408 | \t\t\t\tself.unit_quad_vertices,\n  409 | \t\t\t\tself.unit_quad_indices,\n  410 | \t\t\t\tself.colored_program,\n  411 | \t\t\t\t&uniforms,\n  412 | \t\t\t\t&image_draw_params,\n  413 | \t\t\t)\n  414 | \t\t\t.unwrap();","lines":9},{"ref":"subcrates/gelatin/src/window.rs:739-747","code":"  739 | \t\ttarget\n  740 | \t\t\t.draw(\n  741 | \t\t\t\tcontext.unit_quad_vertices,\n  742 | \t\t\t\tcontext.unit_quad_indices,\n  743 | \t\t\t\tcontext.colored_program,\n  744 | \t\t\t\t&uniforms,\n  745 | \t\t\t\t&image_draw_params,\n  746 | \t\t\t)\n  747 | \t\t\t.unwrap();","lines":9},{"ref":"subcrates/gelatin/src/window.rs:693","code":"  693 | \t\ttarget.finish().unwrap();","lines":1}]},{"id":"PANIC_34","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"TitleSection::format_file_path calls .last().unwrap() on the ancestors iterator (line 202). While the logic attempts to guarantee at least one ancestor exists, if the path is empty or root the iterator can be empty and this panics.","fix":"Use .last()? or handle the None case explicitly.","locations":[{"ref":"src/configuration.rs:202","code":"  202 | \t\t\t\t\tlet ancestor = file_path.ancestors().take(2 + n as usize).last().unwrap();","lines":1}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"load_svg unconditionally calls .unwrap() on Pixmap::new(width, height). If width or height is 0 (e.g. an SVG with zero dimensions), Pixmap::new returns None and this panics.","fix":"Check that width > 0 && height > 0 before constructing the Pixmap, returning an error if not.","locations":[{"ref":"src/image_cache/image_loader.rs:171","code":"  171 | \tlet mut pixmap = tiny_skia::Pixmap::new(width, height).unwrap();","lines":1}]},{"id":"PANIC_36","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"load_svg calls image::RgbaImage::from_raw(...).unwrap(). Although the buffer from pixmap.take() should always be the right size, if the tiny_skia Pixmap API ever returns a buffer whose length doesn't match width*height*4, this panics silently.","fix":"Return an error via map_err/ok_or instead of unwrap.","locations":[{"ref":"src/image_cache/image_loader.rs:174","code":"  174 | \tOk(image::RgbaImage::from_raw(width, height, pixmap.take()).unwrap())","lines":1}]},{"id":"PANIC_37","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In `create_window`, the `WindowDescriptorBuilder::build()` call is immediately unwrapped. While unlikely to fail with the given defaults, any builder validation failure produces a panic with no diagnostic information beyond the default message.","fix":"Use `.expect(\"WindowDescriptor is invalid\")` at minimum, or propagate the error to the caller.","locations":[{"ref":"src/main.rs:194","code":"  194 | \t\t\t\t.unwrap();","lines":1}]},{"id":"PANIC_38","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In `make_update_notification`, the visit-site button calls `open::that(...).unwrap()`. If the system cannot open a browser (e.g., no desktop environment, sandbox), the application panics on a button click.","fix":"Use `if let Err(e) = open::that(...) { eprintln!(\"Could not open URL: {e}\"); }` instead of `.unwrap()`.","locations":[{"ref":"src/main.rs:472","code":"  472 | \t\topen::that(\"https://arturkovacs.github.io/emulsion-website/\").unwrap();","lines":1}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","easy":false,"description":"thread_loop reads PRIORITY_REQUEST_ID while holding the channel Mutex, then re-queues the request if priority doesn't match - but the priority can change between the re-queue and the next recv(), causing the request to be re-queued indefinitely if the priority keeps being set to a different value. Worse, all worker threads can simultaneously re-queue the same batch of non-priority requests in a tight busy-loop, burning CPU without making progress on any request.","fix":"Add a small sleep or a condvar/notification mechanism before re-queuing; or move the priority check outside the mutex scope and use a proper work-stealing queue.","locations":[{"ref":"src/image_cache/image_loader.rs:357-373","code":"  357 | \t\twhile running.load(Ordering::Acquire) {\n  358 | \t\t\tlet request;\n  359 | \t\t\t{\n  360 | \t\t\t\t// It is very important that we release the mutex before starting to load the image\n  361 | \t\t\t\tlet load_request = request_recv.lock().unwrap();\n  362 | \t\t\t\tlet priority = PRIORITY_REQUEST_ID.load(Ordering::SeqCst);\n  363 | \t\t\t\trequest = load_request.recv().unwrap();\n  364 | \t\t\t\tlet focus_test_passed =\n  365 | \t\t\t\t\tpriority == request.req_id || priority == NON_EXISTENT_REQUEST_ID;\n  366 | \t\t\t\tif !focus_test_passed {\n  367 | \t\t\t\t\t//println!(\"Priority test failed, priority was {}\", priority);\n  368 | \t\t\t\t\t//DEBUG_FAIL_COUNT += 1;\n  369 | \t\t\t\t\t//if DEBUG_FAIL_COUNT > 4 { panic!(\"DEBUG_FAIL_COUNT > 4\"); }\n  370 | \t\t\t\t\t// Just place the request neatly back to the request queue.\n  371 | \t\t\t\t\trequest_send.send(request).unwrap();\n  372 | \t\t\t\t\tcontinue;\n  373 | \t\t\t\t}","lines":17}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"medium","easy":false,"description":"In thread_loop, PRIORITY_REQUEST_ID is loaded with SeqCst inside the mutex lock, but it is written from the main thread without any mutex. This means the priority can change between when the thread reads it and when it re-queues, causing a request that was just made the priority to be incorrectly re-queued.","fix":"Load the priority outside of the mutex scope to reduce the critical section, and accept that a single re-queue may occur for freshly promoted requests - this is unavoidable without a more sophisticated scheduler.","locations":[{"ref":"src/image_cache/image_loader.rs:362-366","code":"  362 | \t\t\t\tlet priority = PRIORITY_REQUEST_ID.load(Ordering::SeqCst);\n  363 | \t\t\t\trequest = load_request.recv().unwrap();\n  364 | \t\t\t\tlet focus_test_passed =\n  365 | \t\t\t\t\tpriority == request.req_id || priority == NON_EXISTENT_REQUEST_ID;\n  366 | \t\t\t\tif !focus_test_passed {","lines":5}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"medium","easy":false,"description":"In parallel_action.rs run_processor, after the worker thread swaps state from InputGiven to Pending (line 39-44) and releases the mutex, the caller can call give_input() which sets state back to InputGiven. When the worker finishes action(input) and re-acquires the mutex (line 51), it checks `if let ActionState::Pending = &*state` - but state is now InputGiven, so the output is silently discarded (line 52-54). The computed result of the action is thrown away without any notification.","fix":"Store the output unconditionally (or check for both Pending and InputGiven states), or document clearly that outputs can be dropped when give_input races with action completion.","locations":[{"ref":"src/parallel_action.rs:49-56","code":"   49 | \t\tif let Some(input) = input {\n   50 | \t\t\tlet output = action(input);\n   51 | \t\t\tlet mut state = shared.state.lock().unwrap();\n   52 | \t\t\tif let ActionState::Pending = &*state {\n   53 | \t\t\t\t*state = ActionState::OutputReady(output);\n   54 | \t\t\t}\n   55 | \t\t}\n   56 | \t}","lines":8}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"The Drop impl for PictureWidget contains a comment acknowledging a known circular Rc reference that prevents the widget from being dropped. The circular reference is never resolved (CloseRequested only drops the clipboard_handler, not the Rc cycle). Any PictureWidget instance that goes out of scope without CloseRequested being processed will leak all memory reachable from it.","fix":"Identify the Rc cycle (likely PictureWidget -> BottomBar/HelpScreen -> some callback that holds an Rc<PictureWidget> or similar) and break it with Weak references.","locations":[{"ref":"src/widgets/picture_widget.rs:985-991","code":"  985 | impl Drop for PictureWidget {\n  986 | \tfn drop(&mut self) {\n  987 | \t\t// This doesn't work. Would be nice to fix at some point. I think I managed to create a\n  988 | \t\t// circular reference with my `Rc`s\n  989 | \t\t//println!(\"Called drop for the picture widget.\");\n  990 | \t}\n  991 | }","lines":7}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","easy":false,"description":"In `change_directory`, all pending load requests are cancelled by setting a flag (line 835-837), but the worker threads that are currently processing those requests continue running until they finish. In-flight decoded frames sent back on the channel will be received by `receive_prefetched` and added to `pending_requests`, but because the texture cache was cleared, `upload_to_texture`'s `cancelled()` check (which returns `None` for unknown IDs) causes them to be silently dropped. This is functionally correct, but the worker threads are not actually stopped - they continue consuming CPU and memory until they finish decoding an image that will never be used.","fix":"This is an architectural limitation. Document the behavior explicitly. If cancellation latency matters, consider adding a shared cancellation token that worker threads check during decode.","locations":[{"ref":"src/image_cache/mod.rs:827-841","code":"  827 | \tfn change_directory(&mut self, dir_path: &Path) -> directory::Result<()> {\n  828 | \t\tif self.dir.path() == dir_path {\n  829 | \t\t\treturn Ok(());\n  830 | \t\t}\n  831 | \t\tself.texture_cache.clear();\n  832 | \t\tself.remaining_capacity = self.total_capacity;\n  833 | \n  834 | \t\t// Cancel all pending load requests\n  835 | \t\tfor (_, request) in self.pending_requests.iter_mut() {\n  836 | \t\t\trequest.cancel();\n  837 | \t\t}\n  838 | \n  839 | \t\tself.dir.change_directory(dir_path)?;\n  840 | \t\tOk(())\n  841 | \t}","lines":15}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"medium","easy":false,"description":"In `Picture::get_metadata` and `Picture::upload_to_texture`, the original `PictureData` is moved out of `self.data` via `std::mem::swap` into a temporary `PictureData::Path(\"\".into())` placeholder. If `image::open(path)?` returns an `Err`, the function returns early while `self.data` still holds the dummy placeholder `Path(\"\")`. The real file path (and any `Cpu` image that should have been preserved) is dropped. Any subsequent call to `get_metadata` or `texture` will attempt to open the path `\"\"` and fail again permanently.","fix":"On error, swap the original data back: use a pattern like `let orig = std::mem::replace(&mut *borrowed, tmp); // on error: *borrowed = orig;`. Or use an `Option<PictureData>` in `PictureData` to take/replace safely.","locations":[{"ref":"subcrates/gelatin/src/picture.rs:58-87","code":"   58 | \t\tlet mut borrowed = self.data.borrow_mut();\n   59 | \t\tlet mut tmp_picture = PictureData::Path(\"\".into());\n   60 | \t\tstd::mem::swap(&mut *borrowed, &mut tmp_picture);\n   61 | \t\tlet dimensions;\n   62 | \t\tmatch tmp_picture {\n   63 | \t\t\tPictureData::Path(path) => {\n   64 | \t\t\t\tlet img = image::open(path)?;\n   65 | \t\t\t\tlet rgba = img.into_rgba8();\n   66 | \t\t\t\tdimensions = rgba.dimensions();\n   67 | \t\t\t\t*borrowed = PictureData::Cpu(rgba);\n   68 | \t\t\t}\n   69 | \t\t\tPictureData::EncodedBytes(bytes) => {\n   70 | \t\t\t\tlet img = image::load_from_memory(bytes)?;\n   71 | \t\t\t\tlet rgba = img.into_rgba8();\n   72 | \t\t\t\tdimensions = rgba.dimensions();\n   73 | \t\t\t\t*borrowed = PictureData::Cpu(rgba);\n   74 | \t\t\t}\n   75 | \t\t\tPictureData::Cpu(img) => {\n   76 | \t\t\t\tdimensions = img.dimensions();\n   77 | \t\t\t\t*borrowed = PictureData::Cpu(img);\n   78 | \t\t\t}\n   79 | \t\t\tPictureData::Gpu(img) => {\n   80 | \t\t\t\t// This must be done because `img` was taken from `borrowed` when\n   81 | \t\t\t\t// `borrowed` was swapped with `tmp_picture`.\n   82 | \t\t\t\tdimensions = img.dimensions();\n   83 | \t\t\t\t*borrowed = PictureData::Gpu(img);\n   84 | \t\t\t}\n   85 | \t\t}\n   86 | \t\tOk(PictureMetadata { width: dimensions.0, height: dimensions.1 })\n   87 | \t}","lines":30},{"ref":"subcrates/gelatin/src/picture.rs:98-123","code":"   98 | \tfn upload_to_texture<F: Facade>(&self, facade: &F) -> Result<(), ImageError> {\n   99 | \t\tlet mut borrowed = self.data.borrow_mut();\n  100 | \t\tlet mut tmp_picture = PictureData::Path(\"\".into());\n  101 | VF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In `texture_from_img_rect`, mipmap level computation uses `31 - img_w.leading_zeros()` (line 233-234). If `img_w` or `img_h` is 0, `leading_zeros()` returns 32, making the subtraction `31 - 32` overflow (underflow for u32), panicking in debug mode and wrapping to a huge value in release mode, which would produce an absurdly large `max_mipmap_levels`.","fix":"Guard against zero dimensions before computing leading_zeros, e.g., `if img_w == 0 || img_h == 0 { return Err(...); }`, or use `img_w.checked_ilog2().unwrap_or(0)` (stable in Rust 1.67+).","locations":[{"ref":"src/image_cache/mod.rs:233-236","code":"  233 | \tlet x_pow = 31 - img_w.leading_zeros();\n  234 | \tlet y_pow = 31 - img_h.leading_zeros();\n  235 | \n  236 | \tlet max_mipmap_levels = x_pow.min(y_pow).min(4);","lines":4}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `AnimationFrameTexture::from_image`, if `w == 0` then `(w - 1) / max_size` (line 161) causes a u32 underflow (wraps to u32::MAX in release, panics in debug). The same applies to `h == 0` on line 162.","fix":"Guard against zero-dimension images before entering the grid computation, returning a `TextureError` for zero-size images.","locations":[{"ref":"src/image_cache/mod.rs:161-162","code":"  161 | \t\tlet grid_cols = ((w - 1) / max_size) + 1;\n  162 | \t\tlet grid_rows = ((h - 1) / max_size) + 1;","lines":2}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In configuration.rs line 199, the expression `component_count - root_index` performs u32 subtraction. If root_index were ever greater than component_count (which the code tries to prevent by only setting root_index inside the loop, but is not formally guaranteed), this underflows in debug mode (panic) or wraps in release mode (silent wrong result). The condition is then used to decide how much of the path to display.","fix":"Use saturating_sub or add an explicit guard `if root_index <= component_count` before the subtraction in configuration.rs.","locations":[{"ref":"src/cmd_line.rs:55-58","code":"   55 | \tlet displayed_folders = if is_absolute {\n   56 | \t\t// Subtract one because we later want to add one to this value, and we don't want\n   57 | \t\t// an overflow\n   58 | \t\tSome(u32::MAX - 1)","lines":4}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `refresh_cache`, `BTreeMap::into_iter().enumerate()` yields `(usize_enumeration_index, (req_id, CachedTexture))` pairs. The sort key uses the enumeration index (position in iteration order, which is sorted by `req_id`) as the file position, not the actual directory index of the image. This means proximity is measured relative to request-ID order rather than directory order, so the wrong images get evicted from the cache.","fix":"Sort by actual directory index of each cached entry (retrieved via the directory), not by BTreeMap iteration order. Alternatively, store the directory index inside `CachedTexture` at insertion time.","locations":[{"ref":"src/image_cache/mod.rs:464-480","code":"  464 | \t\t\tlet mut sorted_files: Vec<_> = cache.into_iter().enumerate().collect();\n  465 | \t\t\tsorted_files\n  466 | \t\t\t\t.sort_unstable_by_key(|&(index, _)| (index as isize - curr_index as isize).abs());\n  467 | \t\t\tself.remaining_capacity = self.total_capacity;\n  468 | \t\t\tsorted_files.retain(|(_, (_, texture))| {\n  469 | \t\t\t\t// TODO consider retaining individual frames.\n  470 | \t\t\t\tlet all_frames_size = get_anim_size_estimate(&texture.frames);\n  471 | \n  472 | \t\t\t\tif self.remaining_capacity > (all_frames_size + self.curr_est_size) {\n  473 | \t\t\t\t\tself.remaining_capacity -= all_frames_size;\n  474 | \t\t\t\t\ttrue\n  475 | \t\t\t\t} else {\n  476 | \t\t\t\t\tfalse\n  477 | \t\t\t\t}\n  478 | \t\t\t});\n  479 | \n  480 | \t\t\tself.texture_cache = sorted_files.into_iter().map(|(_, entry)| entry).collect();","lines":17}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"ParallelAction::give_input (line 82) always overwrites the shared state with ActionState::InputGiven(input), even if the state is already InputGiven (a previous input has not yet been consumed by the worker). The prior unprocessed input is silently dropped. The doc comment on line 81 says 'Returns the given input if the thread is currently occupied', implying it should return the input back on failure, but the function signature returns () and there is no rejection logic.","fix":"Either return an Option<InpT> that gives back the input when the thread is busy (matching the doc comment), or at minimum document that the previous input is intentionally discarded.","locations":[{"ref":"src/parallel_action.rs:81-85","code":"   81 | \t/// Returns the given input if the thread is currently occupied\n   82 | \tpub fn give_input(&self, input: InpT) {\n   83 | \t\tlet mut state = self.shared.state.lock().unwrap();\n   84 | \t\t*state = ActionState::InputGiven(input);\n   85 | \t}","lines":5}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"zoom_image divides by self.img_texel_size at line 224 to compute the new image position. img_texel_size is initialized to 0.0 and is only set to a non-zero value after the first draw that has a loaded texture. If the user scrolls the mouse wheel before any image is loaded and drawn, img_texel_size is 0.0, producing NaN/infinity for img_pos, which permanently corrupts the image position.","fix":"Guard zoom_image with `if self.img_texel_size == 0.0 { return; }` or initialize img_texel_size to 1.0.","locations":[{"ref":"src/widgets/picture_widget.rs:224","code":"  224 | \t\tself.img_pos = (image_texel_size / self.img_texel_size) * (self.img_pos - anchor) + anchor;","lines":1},{"ref":"src/widgets/picture_widget.rs:493","code":"  493 | \t\t\timg_texel_size: 0.0,","lines":1}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"HoveredFileCancelled handler only restores the previous image when prev_path is LoadedImgPath::Loaded. When prev_path is NotYetLoaded or ErrLoading the load request is silently skipped, so the playback manager keeps showing the file that was dragged over the window rather than reverting to the original state.","fix":"Handle all LoadedImgPath variants in the HoveredFileCancelled branch. For NotYetLoaded, call a 'cancel current load' or 'go to directory start' request. For ErrLoading, similarly restore or clear state.","locations":[{"ref":"src/widgets/picture_widget.rs:941-948","code":"  941 | \t\t\t\t\tHoverState::ItemHovered { prev_path } => {\n  942 | \t\t\t\t\t\tif let LoadedImgPath::Loaded(prev_path) = prev_path {\n  943 | \t\t\t\t\t\t\tborrowed\n  944 | \t\t\t\t\t\t\t\t.playback_manager\n  945 | \t\t\t\t\t\t\t\t.request_load(LoadRequest::FilePath(prev_path));\n  946 | \t\t\t\t\t\t}\n  947 | \t\t\t\t\t\tborrowed.hover_state = HoverState::None;\n  948 | \t\t\t\t\t}","lines":8}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In `WidgetData::default_layout` (lib.rs) the vertical stretch-alignment branch contains `if height > max { self.apply_vertical_alignement(...); }`. After `height = height.clamp(min, max)`, height is always <= max, so this condition is dead and `apply_vertical_alignement` is NEVER called for vertically-stretched widgets. Vertical alignment (Center, End) is silently ignored for any widget with a Stretch height. The horizontal branch correctly uses `if width < max` (meaning the space was the limiting factor), so the intended condition for height is `if height < max`.","fix":"Change `if height > max` to `if height < max`. Also add the corresponding `else` branch (apply margin_top only) to mirror the horizontal case.","locations":[{"ref":"subcrates/gelatin/src/lib.rs:150-152","code":"  150 | \t\t\t\tif height > max {\n  151 | \t\t\t\t\tself.apply_vertical_alignement(available_space, height);\n  152 | \t\t\t\t}","lines":3}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In `WidgetData::default_layout`, the vertical-stretch branch checks `if height > max` to decide whether to call `apply_vertical_alignement`, but after `height.clamp(min, max)` the value is always `<= max`, so this branch is unreachable dead code. The correct condition - matching the horizontal branch - is `if height < max`. As a result, `apply_vertical_alignement` is NEVER called for widgets using `Length::Stretch` on their height, so vertical alignment (Center, End) is broken for all stretched widgets.","fix":"Change `if height > max {` to `if height < max {` to mirror the horizontal branch at line 133.","locations":[{"ref":"subcrates/gelatin/src/lib.rs:150-153","code":"  150 | \t\t\t\tif height > max {\n  151 | \t\t\t\t\tself.apply_vertical_alignement(available_space, height);\n  152 | \t\t\t\t}\n  153 | \t\t\t\tself.drawn_bounds().pos.vec.y += self.placement().margin_top;","lines":4}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"collect_directory resets curr_file_idx to the first supported image found during iteration, but only when a supported file exists. If no supported file exists, curr_file_idx retains its old value from the previous directory, which can then be out of bounds for the new (possibly smaller) files list.","fix":"Always reset curr_file_idx to 0 at the start of collect_directory, then set it to the first image if one exists.","locations":[{"ref":"src/image_cache/directory.rs:284-290","code":"  284 | \t\t// Set the current file index to the first image\n appen to have an 'svg' extension. The check should be done first, before attempting magic-byte detection.","fix":"Move the SVG extension check before read_exact, so it is always handled regardless of file size, and does not block magic-byte detection for other formats.","locations":[{"ref":"src/image_cache/image_loader.rs:92-98","code":"   92 | \tif file.read_exact(&mut file_start_bytes).is_ok() {\n   93 | \t\tif path.extension() == Some(std::ffi::OsStr::new(\"svg\")) {\n   94 | \t\t\treturn Ok(ImgFormat::Svg);\n   95 | \t\t}\n   96 | \t\tif let Ok(format) = image::guess_format(&file_start_bytes) {\n   97 | \t\t\treturn Ok(ImgFormat::Image(format));\n   98 | \t\t}","lines":7}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"is_file_supported falls through to detect_format(filename) for files with unsupported or missing extensions. detect_format opens the file and reads 512 bytes for every unrecognized file in a directory. This is called during directory listing and sorting, making directory traversal on folders with many non-image files very expensive (a syscall-per-file).","fix":"Return false immediately for files with extensions that are clearly not images, and only call detect_format for files with no extension at all.","locations":[{"ref":"src/image_cache/image_loader.rs:254-270","code":"  254 | pub fn is_file_supported(filename: &Path) -> bool {\n  255 | \tif let Some(ext) = filename.extension() {\n  256 | \t\tif let Some(ext) = ext.to_str() {\n  257 | \t\t\tlet ext = ext.to_lowercase();\n  258 | \t\t\tmatch ext.as_str() {\n  259 | \t\t\t\t\"jpg\" | \"jpeg\" | \"png\" | \"apng\" | \"gif\" | \"webp\" | \"tif\" | \"tiff\" | \"tga\"\n  260 | \t\t\t\t| \"bmp\" | \"ico\" | \"hdr\" | \"pbm\" | \"pam\" | \"ppm\" | \"pgm\" => {\n  261 | \t\t\t\t\treturn true;\n  262 | \t\t\t\t}\n  263 | \t\t\t\t#[cfg(feature = \"avif\")]\n  264 | \t\t\t\t\"avif\" => return true,\n  265 | \t\t\t\t_ => (),\n  266 | \t\t\t}\n  267 | \t\t}\n  268 | \t}\n  269 | \tdetect_format(filename).is_ok()\n  270 | }","lines":17}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `update_image`, after `mem::swap` resets `self.load_request` to `None`, when a `WaitingOnLoader` or `WaitingOnDirFilter` error is returned from the actual load, the code sets `self.load_request = LoadRequest::Jump(0)` to retry. However, the `frame_delta_time_nanos` and timing logic computed earlier already assumed there was no pending request (since `load_request == None` was the branch taken). On the very next call, `load_request` is `Jump(0)` but `playback_state` may be `Paused`, causing the code to enter the `Paused` branch with a `Jump(0)` request and return `WaitUntil(few_millisecs_from_now)` - this part is correct. But during non-paused playback the `load_request != None` branch (line 472-474) is hit and returns `WaitUntil` without resetting timing state, potentially causing drift accumulation.","fix":"When retrying due to `WaitingOnLoader`, also reset or preserve `last_frame_change_time` to avoid timing drift accumulation across retry cycles.","locations":[{"ref":"src/playback_manager.rs:384-534","code":"  384 | \t\tlet frame_delta_time_nanos;\n  385 | \t\tmatch self.playback_state {\n  386 | \t\t\tPlaybackState::Present | PlaybackState::RandomPresent => {\n  387 | \t\t\t\tframe_delta_time_nanos = (NANOS_PER_SEC * 6) as i64;\n  388 | \t\t\t}\n  389 | \t\t\t_ => {\n  390 | \t\t\t\tframe_delta_time_nanos = P::delay_nanos(self) as i64;\n  391 | \t\t\t}\n  392 | \t\t};\n  393 | \t\tif self.playback_state == PlaybackState::Paused {\n  394 | \t\t\tif let Err(e) = image_cache.process_prefetched(display) {\n  395 | \t\t\t\teprintln!(\"Failed to process prefetched images with error '{:?}'\", e);\n  396 | \t\t\t}\n  397 | \t\t\tmatch load_request {\n  398 | \t\t\t\tLoadRequest::Jump(0) => {\n  399 | \t\t\t\t\t// Waiting on current image to be loaded.\n  400 | frame_step {\n  437 | \t\t\t\t\t\t\ttarget = self.present_remaining.pop();\n  438 | \t\t\t\t\t\t\tif target.is_none() {\n  439 | \t\t\t\t\t\t\t\t// Restart\n  440 | \t\t\t\t\t\t\t\t// WARNING we silently assume that the folder is fully\n  441 | \t\t\t\t\t\t\t\t// filtered at this point.\n  442 | \t\t\t\t\t\t\t\tself.fill_present_remainig_with_random(image_cache);\n  443 | \t\t\t\t\t\t\t\ttarget = self.present_remaining.pop();\n  444 | \t\t\t\t\t\t\t}\n  445 | \t\t\t\t\t\t}\n  446 | \t\t\t\t\t\tmatch target {\n  447 | \t\t\t\t\t\t\tSome(index) => LoadRequest::LoadAtIndex(index),\n  448 | \t\t\t\t\t\t\tNone => LoadRequest::None,\n  449 | \t\t\t\t\t\t}\n  450 | \t\t\t\t\t}\n  451 | \t\t\t\t\tPlaybackState::Paused => unreachable!(),\n  452 | \t\t\t\t};\n  453 | \t\t\t\tself.last_frame_change_time = Instant::now();\n  454 | \t\t\t\tself.frametime_drift_offset = -nanos_til_next;\n  455 | \t\t\t} else {\n  456 | \t\t\t\tlet _ = image_cache.process_prefetched(display);\n  457 | \t\t\t\tconst BUISY_WAIT_THRESHOLD: f32 = 0.8;\n  458 | \t\t\t\tif elapsed_nanos > (frame_delta_time_nanos as f32 * BUISY_WAIT_THRESHOLD) as i64 {\n  459 | \t\t\t\t\t// Just buisy wait if we are getting very close to the next frame swap\n  460 | \t\t\t\t\tnext_update = gelatin::NextUpdate::Soonest;\n  461 | \t\t\t\t} else {\n  462 | \t\t\t\t\tmatch self.playback_state {\n  463 | \t\t\t\t\t\tPlaybackState::RandomPresent => {\n  464 | \t\t\t\t\t\t\tif let Some(&last) = self.present_remaining.iter().last() {\n  465 | \t\t\t\t\t\t\t\timage_cache.prefetch_at_index(last);\n  466 | \t\t\t\t\t\t\t}\n  467 | \t\t\t\t\t\t}\n  468 | \t\t\t\t\t\t_ => image_cache.prefetch_neighbors(),\n  469 | \t\t\t\t\t}\n  470 | \t\t\t\t}\n  471 | \t\t\t}\n  472 | \t\t} else {\n  473 | \t\t\tnext_update = gelatin::NextUpdate::WaitUntil(few_millisecs_from_now);\n  474 | \t\t}\n  475 | \t\tmatch load_request {\n  476 | \t\t\tLoadRequest::None | LoadRequest::FilePath(..) => (),\n  477 | \t\t\t_ => {\n  478 | \t\t\t\tif image_cache.current_dir_len() == Some(0) {\n  479 | \t\t\t\t\treturn gelatin::NextUpdate::Latest;\n  480 | \t\t\t\t}\n  481 | \t\t\t}\n  482 | \t\t}\n  483 | \t\ttrace!(\"Attempting actual load in `update_image`\");\n  484 | \t\tlet load_result = match load_request {\n  485 | \t\t\tLoadRequest::LoadNext => Some(P::load_next(image_cache, display)),\n  486 | \t\t\tLoadRequest::LoadPrevious => Some(P::load_prev(image_cache, display)),\n  487 | \t\t\tLoadRequest::FilePath(file_path) => {\n  488 | \t\t\t\tlet load_result = P::load_path(image_cache, display, &file_path);\n  489 | \t\t\t\tSome(Ok((file_path, load_result)))\n  490 | \t\t\t}\n  491 | \t\t\tLoadRequest::LoadAtIndex(index) => Some(P::load_at_index(image_cache, display, index)),\n  492 | \t\t\tLoadRequest::Jump(jump_count) => Some(P::load_jump(image_cache, display, jump_count)),\n  493 | \t\t\tLoadRequest::None => None,\n  494 | \t\t};\n  495 | \t\tif let Some(loaded_image) = load_result {\n  496 | \t\t\tmatch loaded_image {\n  497 | \t\t\t\tOk((path, result)) => match result {\n  498 | \t\t\t\t\tOk(frame) => {\n  499 | \t\t\t\t\t\tself.image_texture = Some(frame);\n  500 | \t\t\t\t\t\tself.file_path = LoadedImgPath::Loaded(path);\n  501 | \t\t\t\t\t}\n  502 | \t\t\t\t\tErr(image_cache::TextureError::WaitingOnLoader) => {\n  503 | \t\t\t\t\t\t// Set the load request to jump in place so that\n  504 | \t\t\t\t\t\t// next time we attempt to load this again.\n  505 | \t\t\t\t\t\tself.load_request = LoadRequest::Jump(0);\n  506 | \t\t\t\t\t\tnext_update = gelatin::NextUpdate::WaitUntil(few_millisecs_from_now);\n  507 | \t\t\t\t\t}\n  508 | \t\t\t\t\tErr(err) => {\n  509 | \t\t\t\t\t\tself.image_texture = None;\n  510 | \t\t\t\t\t\tself.file_path = LoadedImgPath::ErrLoading(path);\n  511 | \t\t\t\t\t\tlet stderr = &mut ::std::io::stderr();\n  512 | \t\t\t\t\t\tlet stderr_errmsg = \"Error writing to stderr\";\n  513 | \t\t\t\t\t\twriteln!(stderr, \"Error occurred while loading image: {}\", err)\n  514 | \t\t\t\t\t\t\t.expect(std
