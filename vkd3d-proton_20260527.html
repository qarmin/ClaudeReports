<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"d3d12_command_list_SetPipelineState dereferences state->pipeline_type at line 12773 even though the immediately preceding block (12752-12771) explicitly handles state == NULL by setting active_pipeline_type to NONE. D3D12 permits ID3D12GraphicsCommandList::SetPipelineState(NULL). When a non-NULL PSO was previously bound and the app then calls SetPipelineState(NULL), the early-out `list->state == state` (12741) is false, control falls through, and `state->pipeline_type` is a NULL-pointer dereference -> crash in the command-recording hot path.","fix":"Guard the trailing stencil/meta-flags block with `if (state)`, wrapping lines 12773-12797 so the dynamic-state update is skipped when unbinding the pipeline (state == NULL).","locations":[{"ref":"libs/vkd3d/command.c:12741-12798","code":"12741 |     if (list->state == state)\n12742 |         return;\n12743 | \n12744 |     if (VKD3D_CONFIG_FLAG_IS_SET(RETAIN_PSOS) && state)\n12745 |         d3d12_command_allocator_retain_pipeline_state(list->allocator, state);\n12746 | \n12747 |     d3d12_command_list_invalidate_current_pipeline(list, false);\n12748 |     /* SetPSO and SetPSO1 alias the same internal active pipeline state even if they are completely different types. */\n12749 |     list->state = state;\n12750 |     list->rt_state = NULL;\n12751 | \n12752 |     if (!state || list->active_pipeline_type != state->pipeline_type)\n12753 |     {\n12754 |         if (state)\n12755 |         {\n12756 |             bindings = d3d12_command_list_get_bindings(list, state->pipeline_type);\n12757 |             if (bindings->root_signature)\n12758 |             {\n12759 |                 /* We might have clobbered push constants in the new bind point,\n12760 |                  * invalidate all state which can affect push constants.\n12761 |                  * We might also change the pipeline layout, in case we switch between mesh and legacy graphics.\n12762 |                  * In this scenario, the push constant layout will be incompatible due to stage\n12763 |                  * differences, so everything must be rebound. */\n12764 |                 d3d12_command_list_invalidate_root_parameters(list, bindings, true, NULL);\n12765 |             }\n12766 | \n12767 |             list->active_pipeline_type = state->pipeline_type;\n12768 |         }\n12769 |         else\n12770 |             list->active_pipeline_type = VKD3D_PIPELINE_TYPE_NONE;\n12771 |     }\n12772 | \n12773 |     if (state->pipeline_type != VKD3D_PIPELINE_TYPE_COMPUTE)\n12774 |     {\n12775 |         if (list->dynamic_state.stencil_front.write_mask != state->graphics.ds_desc.front.writeMask ||\n12776 |                 list->dynamic_state.stencil_back.write_mask != state->graphics.ds_desc.back.writeMask)\n12777 |         {\n12778 |             list->dynamic_state.stencil_front.write_mask = state->graphics.ds_desc.front.writeMask;\n12779 |             list->dynamic_state.stencil_back.write_mask = state->graphics.ds_desc.back.writeMask;\n12780 |             list->dynamic_state.dirty_flags |= VKD3D_DYNAMIC_STATE_STENCIL_WRITE_MASK;\n12781 |         }\n12782 | \n12783 |         /* Only consider FRAGMENT for workarounds when it comes to barriers.\n12784 |          * Other shader stages tend to be highly reused anyway.\n12785 |          * FRAGMENT is always last if it exists. */\n12786 |         if (state->graphics.stages[state->graphics.stage_count - 1].stage == VK_SHADER_STAGE_FRAGMENT_BIT)\n12787 |             list->current_meta_flags = state->graphics.code[state->graphics.stage_count - 1].meta.flags;\n12788 |     }\n12789 |     else\n12790 |     {\n12791 |         list->current_meta_flags = state->compute.code.meta.flags;\n12792 | #ifdef VKD3D_ENABLE_BREADCRUMBS\n12793 |         list->current_meta_flags |= vkd3d_breadcrumb_tracer_shader_hash_forces_barrier(\n12794 |                 &list->device->breadcrumb_tracer,\n12795 |                 state->compute.code.meta.hash);\n12796 | #endif\n12797 |     }\n12798 | }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"d3d12_command_list_workgraph_setup_indirect reads `input = wg_state->entry_points[i].node_input` and immediately dereferences `input->launch_type` for every pipeline index in [0, num_pipelines) with no NULL check. d3d12_wg_state_object_rearrange_entry_points pads sparse node arrays with zero-initialized entries whose node_input is NULL, so this NULL-derefs for padded slots. The analogous loop in d3d12_wg_state_object_compile_program guards with `if (!node_input) continue;`. Reachable for GPU-input dispatch of any work graph with sparse/padded node arrays.","fix":"Skip padding slots: add `if (!input) { write sentinel/continue; }` before dereferencing input->launch_type, mirroring the guard in d3d12_wg_state_object_compile_program.","locations":[{"ref":"libs/vkd3d/workgraphs.c:3155-3175","code":" 3155 |     for (i = 0; i < program->num_pipelines; i++)\n 3156 |     {\n 3157 |         const struct vkd3d_shader_node_input_data *input;\n 3158 |         int coalesce_divider_or_amp;\n 3159 |         uint32_t max_amplification;\n 3160 | \n 3161 |         input = wg_state->entry_points[i].node_input;\n 3162 |         if (input->launch_type == VKD3D_SHADER_NODE_LAUNCH_TYPE_BROADCASTING)\n 3163 |         {\n 3164 |             max_amplification = input->broadcast_grid[0] * input->broadcast_grid[1] * input->broadcast_grid[2];\n 3165 |             max_amplification = min(max_amplification, MAX_AMPLIFICATION_RATE);\n 3166 |             coalesce_divider_or_amp = -(int)max_amplification;\n 3167 |         }\n 3168 |         else if (input->launch_type == VKD3D_SHADER_NODE_LAUNCH_TYPE_COALESCING)\n 3169 |             coalesce_divider_or_amp = (int)input->coalesce_factor;\n 3170 |         else\n 3171 |             coalesce_divider_or_amp = THREAD_COALESCE_COUNT;\n 3172 | \n 3173 |         ((uint32_t *)entry_scratch.host_ptr)[i] = UINT32_MAX;\n 3174 |         ((int32_t *)dividers_scratch.host_ptr)[i] = coalesce_divider_or_amp;\n 3175 |     }"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"d3d12_dred_settings_create passes the result of vkd3d_malloc straight to d3d12_dred_settings_init and then dereferences it (vtbl, AddRef) without a NULL check. vkd3d_malloc only logs and returns NULL on failure, so under memory pressure this is a NULL-pointer dereference / crash instead of returning E_OUTOFMEMORY.","fix":"Check the allocation: if NULL, unlock debug_singleton_lock and return E_OUTOFMEMORY before calling d3d12_dred_settings_init.","locations":[{"ref":"libs/d3d12core/debug.c:128-141","code":"  128 |     if (!d3d12_dred_settings_instance)\n  129 |     {\n  130 |         d3d12_dred_settings_instance = vkd3d_malloc(sizeof(*d3d12_dred_settings_instance));\n  131 |         d3d12_dred_settings_init(d3d12_dred_settings_instance);\n  132 |     }\n  133 | \n  134 |     iface = &d3d12_dred_settings_instance->ID3D12DeviceRemovedExtendedDataSettings_iface;\n  135 |     ID3D12DeviceRemovedExtendedDataSettings_AddRef(iface);\n  136 | \n  137 |     pthread_mutex_unlock(&debug_singleton_lock);\n  138 | \n  139 |     *object = iface;\n  140 |     return hr;\n  141 | }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"vkd3d_shader_dxil_copy_subobject calls vkd3d_malloc(payload_size) and immediately memcpy()s into the result without checking for NULL (vkd3d_malloc only logs and returns NULL on OOM). The vkd3d_malloc for pExports at 2174-2179 is used the same way. Reachable while parsing untrusted DXIL library subobjects (RDAT); on allocation failure this is a NULL write/deref crash instead of a graceful error.","fix":"Check each vkd3d_malloc result before memcpy; have vkd3d_shader_dxil_copy_subobject return a status and propagate VKD3D_ERROR_OUT_OF_MEMORY at its call sites.","locations":[{"ref":"libs/vkd3d-shader/dxil.c:2132-2134","code":" 2132 |             subobject->data.payload.data = vkd3d_malloc(dxil_subobject->payload_size);\n 2133 |             memcpy(subobject->data.payload.data, dxil_subobject->payload, dxil_subobject->payload_size);\n 2134 |             subobject->data.payload.size = dxil_subobject->payload_size;"},{"ref":"libs/vkd3d-shader/dxil.c:2174-2179","code":" 2174 |             assert(dxil_subobject->num_exports >= 1);\n 2175 |             subobject->data.association.SubobjectToAssociate = vkd3d_dup_entry_point(dxil_subobject->exports[0]);\n 2176 |             subobject->data.association.pExports = vkd3d_malloc((dxil_subobject->num_exports - 1) * sizeof(LPCWSTR));\n 2177 |             subobject->data.association.NumExports = dxil_subobject->num_exports - 1;\n 2178 |             for (i = 1; i < dxil_subobject->num_exports; i++)\n 2179 |                 subobject->data.association.pExports[i - 1] = vkd3d_dup_entry_point(dxil_subobject->exports[i]);"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"vkd3d_breadcrumb_tracer_link_submission dereferences trace_contexts[context] without checking `context == UINT32_MAX`, unlike every other tracer entrypoint (begin/add/signal/end all early-out on UINT32_MAX). If a command list failed to allocate a breadcrumb context (ring exhausted -> UINT32_MAX), this indexes trace_contexts out of bounds.","fix":"Add `if (context == UINT32_MAX) return;` after reading context, consistent with the other tracer functions.","locations":[{"ref":"libs/vkd3d/breadcrumbs.c:793-803","code":"  793 | void vkd3d_breadcrumb_tracer_link_submission(struct d3d12_command_list *list,\n  794 |         struct d3d12_command_list *prev, struct d3d12_command_list *next)\n  795 | {\n  796 |     struct vkd3d_breadcrumb_tracer *breadcrumb_tracer = &list->device->breadcrumb_tracer;\n  797 |     struct vkd3d_breadcrumb_command_list_trace_context *trace;\n  798 |     unsigned int context = list->breadcrumb_context_index;\n  799 | \n  800 |     trace = &breadcrumb_tracer->trace_contexts[context];\n  801 |     trace->prev = prev ? prev->breadcrumb_context_index : UINT32_MAX;\n  802 |     trace->next = next ? next->breadcrumb_context_index : UINT32_MAX;\n  803 | }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"vkd3d_supports_minimum_coopmat_caps calls `props = vkd3d_calloc(count, sizeof(*props))` and does not check it for NULL before the loop at 3061-3062 dereferences props[i]. On allocation failure (count > 0, the normal case when cooperativeMatrix is enabled) this is a NULL-pointer dereference. Every other enumeration helper in this file checks its allocation.","fix":"Check `if (!(props = vkd3d_calloc(count, sizeof(*props)))) return false;` before initializing the array.","locations":[{"ref":"libs/vkd3d/device.c:3060-3065","code":" 3060 |     props = vkd3d_calloc(count, sizeof(*props));\n 3061 |     for (i = 0; i < count; i++)\n 3062 |         props[i].sType = VK_STRUCTURE_TYPE_COOPERATIVE_MATRIX_PROPERTIES_KHR;\n 3063 | \n 3064 |     if (VK_CALL(vkGetPhysicalDeviceCooperativeMatrixPropertiesKHR(\n 3065 |             device->vk_physical_device, &count, props)) != VK_SUCCESS)"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"d3d12_root_signature_create_from_blob unconditionally writes object->root_signature_blob via vkd3d_malloc + memcpy without checking the malloc result for NULL. Under memory pressure (with EXTENDED_DEBUG_UTILS set, non-local root signature) vkd3d_malloc returns NULL and memcpy NULL-derefs. bytecode_length is app/blob-influenced so the allocation can also be large.","fix":"Check the malloc result; on NULL skip storing the blob (blob=NULL,size=0) or fail creation, rather than memcpy into NULL.","locations":[{"ref":"libs/vkd3d/state.c:2182-2189","code":" 2182 |     if (SUCCEEDED(hr) && !raw_payload &&\n 2183 |             !(root_signature_desc.d3d12.Desc_1_2.Flags & D3D12_ROOT_SIGNATURE_FLAG_LOCAL_ROOT_SIGNATURE) &&\n 2184 |             VKD3D_CONFIG_FLAG_IS_SET(EXTENDED_DEBUG_UTILS))\n 2185 |     {\n 2186 |         object->root_signature_blob = vkd3d_malloc(bytecode_length);\n 2187 |         memcpy(object->root_signature_blob, bytecode, bytecode_length);\n 2188 |         object->root_signature_blob_size = bytecode_length;\n 2189 |     }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"openvr_instance_extensions and openvr_device_extensions call vkd3d_calloc(len, sizeof(BYTE)) without checking for NULL, then pass the buffer to RegQueryValueExA which writes len bytes into it. On allocation failure this is a NULL write / crash.","fix":"Check the calloc result; on NULL, RegCloseKey(vr_key) and return NULL.","locations":[{"ref":"libs/d3d12core/main.c:162-163","code":"  162 |     openvr_instance_extensions = vkd3d_calloc(len, sizeof(BYTE));\n  163 |     status = RegQueryValueExA(vr_key, \"openvr_vulkan_instance_extensions\", NULL, &type, (BYTE *)openvr_instance_extensions, &len);"},{"ref":"libs/d3d12core/main.c:210-211","code":"  210 |     openvr_device_extensions = vkd3d_calloc(len, sizeof(BYTE));\n  211 |     status = RegQueryValueExA(vr_key, key_name, NULL, &type, (BYTE *)openvr_device_extensions, &len);"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"openxr_vulkan_extensions does not check the vkd3d_malloc(len) return before passing the buffer to get_extensions(), which writes the extension string into it. A NULL allocation leads to a NULL write and crash rather than a graceful NULL return.","fix":"After `ret = vkd3d_malloc(len);` add `if (!ret) return NULL;` before calling get_extensions().","locations":[{"ref":"libs/d3d12core/main.c:242-248","code":"  242 |     ret = vkd3d_malloc(len);\n  243 |     if (get_extensions(len, &len, ret))\n  244 |     {\n  245 |         WARN(\"Failed to get OpenXR extensions from wineopenxr.\\n\");\n  246 |         return NULL;\n  247 |     }\n  248 |     return ret;"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"In the Win32 VR-extension augmentation paths, `calloc(len, sizeof(char *))` is not checked for NULL before `memcpy(extensions, ...)` writes into it. Allocation failure causes a NULL-pointer write / crash.","fix":"Check the calloc return; if NULL, fall back to the base extension list instead of memcpy'ing into NULL.","locations":[{"ref":"libs/d3d12core/main.c:621-622","code":"  621 |         char **extensions = calloc(len, sizeof(char *));\n  622 |         memcpy(extensions, instance_extensions, sizeof(char *) * ARRAY_SIZE(instance_extensions));"},{"ref":"libs/d3d12core/main.c:717-718","code":"  717 |         char **extensions = calloc(len, sizeof(char *));\n  718 |         memcpy(extensions, device_extensions, sizeof(char *) * ARRAY_SIZE(device_extensions));"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","description":"vkd3d_utf16_read reads s[1] (the low surrogate) when s[0] is a high surrogate, but the bounded caller (vkd3d_strdup_w_utf8 with max_elements) only validates the cursor for s[0] < max_elements. A high surrogate at the last in-bounds element causes an out-of-bounds read of s[1] one element past the window. For NUL-terminated input this is masked (s[1]==0 treated invalid), but for length-bounded non-NUL buffers it is a genuine OOB read.","fix":"Pass the remaining element count (or end pointer) into vkd3d_utf16_read and treat a trailing high surrogate with no available second element as invalid (return 0, advance by 1).","locations":[{"ref":"libs/vkd3d-common/utf8.c:87-106","code":"   87 | static uint32_t vkd3d_utf16_read(const WCHAR **src)\n   88 | {\n   89 |     const WCHAR *s = *src;\n   90 | \n   91 |     if (s[0] < 0xd800 || s[0] > 0xdfff) /* Not a surrogate pair. */\n   92 |     {\n   93 |         *src += 1;\n   94 |         return s[0];\n   95 |     }\n   96 | \n   97 |     if (s[0] > 0xdbff /* Invalid high surrogate. */\n   98 |             || s[1] < 0xdc00 || s[1] > 0xdfff) /* Invalid low surrogate. */\n   99 |     {\n  100 |         *src += 1;\n  101 |         return 0;\n  102 |     }\n  103 | \n  104 |     *src += 2;\n  105 |     return 0x10000 + ((s[0] & 0x3ff) << 10) + (s[1] & 0x3ff);\n  106 | }"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","description":"vkd3d_dxil_converter_set_options dereferences compiler_args unconditionally (min_subgroup_size / max_subgroup_size), and vkd3d_shader_compile_dxil dereferences compiler_args->promote_wave_size_heuristics unconditionally, yet later code in the same function guards with `if (compiler_args)`. The inconsistency means a NULL compiler_args crashes; the guard is misleading/dead given the earlier unconditional deref.","fix":"Either assert compiler_args is non-NULL on the DXIL path (removing the dead guard), or make the early dereferences NULL-safe to match the guard.","locations":[{"ref":"libs/vkd3d-shader/dxil.c:1000-1012","code":" 1000 |     {\n 1001 |         const struct dxil_spv_option_subgroup_properties helper =\n 1002 |                 { { DXIL_SPV_OPTION_SUBGROUP_PROPERTIES },\n 1003 |                         compiler_args->min_subgroup_size,\n 1004 |                         compiler_args->max_subgroup_size };\n 1005 |         if (dxil_spv_converter_add_option(converter, &helper.base) != DXIL_SPV_SUCCESS)\n 1006 |         {\n 1007 |             WARN(\"dxil-spirv does not support SUBGROUP_PROPERTIES.\\n\");\n 1008 |             return VKD3D_ERROR_NOT_IMPLEMENTED;\n 1009 |         }\n 1010 |     }\n 1011 | \n 1012 |     if (compiler_args)"},{"ref":"libs/vkd3d-shader/dxil.c:1613","code":" 1613 |     if (compiler_args->promote_wave_size_heuristics)"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","description":"d3d12_bundle_add_command does not check the result of d3d12_bundle_allocator_alloc_chunk_data, which returns NULL on OOM. The next esource_incref(resource_info->resources[i]);\n25260 |     }"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","description":"d3d12_device_GetResourceAllocationInfo1 allocates `desc1 = vkd3d_malloc(sizeof(*desc1) * count)` with no NULL check when count > 16, then the loop dereferences desc1[i]. An application can pass an arbitrary count; on OOM this is a NULL deref.","fix":"Check desc1 for NULL after vkd3d_malloc; on failure take the existing invalid/error path instead of dereferencing.","locations":[{"ref":"libs/vkd3d/device.c:8278-8289","code":" 8278 |     if (count > ARRAY_SIZE(local_descs))\n 8279 |         desc1 = vkd3d_malloc(sizeof(*desc1) * count);\n 8280 |     else\n 8281 |     {\n 8282 |         /* Avoid a compiler warning */\n 8283 |         memset(local_descs, 0, sizeof(local_descs));\n 8284 |         desc1 = local_descs;\n 8285 |     }\n 8286 | \n 8287 | \n 8288 |     for (i = 0; i < count; i++)\n 8289 |         d3d12_resource_promote_desc(&resource_descs[i], &desc1[i]);"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","description":"The opacity-micromap and acceleration-structure prebuild-info helpers use vkd3d_malloc results for usages/geometries/primitive_counts/omm_triangles_infos without NULL checks when the app-supplied geometry/usage count exceeds VKD3D_BUILD_INFO_STACK_COUNT. A large count combined with OOM yields a NULL dereference inside the convert_inputs calls.","fix":"Check each vkd3d_malloc return for NULL and bail (memset info to 0 and cleanup) before passing the buffers to convert_inputs.","locations":[{"ref":"libs/vkd3d/device.c:8433-8446","code":" 8433 |     if (usages_count > VKD3D_BUILD_INFO_STACK_COUNT)\n 8434 |     {\n 8435 |         if (device->device_info.using_khr_opacity_micromap)\n 8436 |             usages.khr = vkd3d_malloc(usages_count * sizeof(*usages.khr));\n 8437 |         else\n 8438 |             usages.ext = vkd3d_malloc(usages_count * sizeof(*usages.ext));\n 8439 |     }\n 8440 |     else\n 8441 |     {\n 8442 |         if (device->device_info.using_khr_opacity_micromap)\n 8443 |             usages.khr = usages_stack.khr;\n 8444 |         else\n 8445 |             usages.ext = usages_stack.ext;\n 8446 |     }"},{"ref":"libs/vkd3d/device.c:8542-8550","code":" 8542 |     if (geometry_count > VKD3D_BUILD_INFO_STACK_COUNT)\n 8543 |     {\n 8544 |         primitive_counts = vkd3d_malloc(geometry_count * sizeof(*primitive_counts));\n 8545 |         geometries = vkd3d_malloc(geometry_count * sizeof(*geometries));\n 8546 |         if (device->device_info.using_khr_opacity_micromap)\n 8547 |             omm_triangles_infos.khr = vkd3d_malloc(geometry_count * sizeof(*omm_triangles_infos.khr));\n 8548 |         else\n 8549 |             omm_triangles_infos.ext = vkd3d_malloc(geometry_count * sizeof(*omm_triangles_infos.ext));\n 8550 |     }"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","description":"vkd3d_meta_get_execute_indirect_pipeline ignores the return value of vkd3d_array_reserve. On allocation failure `pipelines` stays NULL/too small and the following writes to pipelines[pipelines_count].workgroup_size_x/.vk_pipeline dereference NULL or write out of bounds while the mutex is held.","fix":"Check the vkd3d_array_reserve return; on failure unlock the mutex and return E_OUTOFMEMORY.","locations":[{"ref":"libs/vkd3d/meta.c:1766-1775","code":" 1766 |     vkd3d_array_reserve((void**)&meta_indirect_ops->pipelines, &meta_indirect_ops->pipelines_size,\n 1767 |             meta_indirect_ops->pipelines_count + 1, sizeof(*meta_indirect_ops->pipelines));\n 1768 | \n 1769 |     meta_indirect_ops->pipelines[meta_indirect_ops->pipelines_count].workgroup_size_x = patch_command_count;\n 1770 | \n 1771 |     vr = vkd3d_meta_create_compute_pipeline(meta_ops->device,\n 1772 |             debug ? sizeof(cs_execute_indirect_patch_debug_ring) : sizeof(cs_execute_indirect_patch),\n 1773 |             debug ? cs_execute_indirect_patch_debug_ring : cs_execute_indirect_patch,\n 1774 |             meta_indirect_ops->vk_pipeline_layout, &spec,\n 1775 |             true, NULL, &meta_indirect_ops->pipelines[meta_indirect_ops->pipelines_count].vk_pipeline);"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","description":"d3d12_resource_init_subresource_layouts stores vkd3d_calloc into resource->subresource_layouts without checking for NULL, and the caller ignores the return. A failed allocation leaves subresource_layouts NULL; later WriteToSubresource/ReadFromSubresource dereference resource->subresource_layouts[sub_resource] -> NULL deref / OOB.","fix":"Have d3d12_resource_init_subresource_layouts return HRESULT and propagate E_OUTOFMEMORY on calloc failure; fail resource creation accordingly.","locations":[{"ref":"libs/vkd3d/resource.c:4035-4041","code":" 4035 | static size_t d3d12_resource_init_subresource_layouts(struct d3d12_resource *resource, struct d3d12_device *device)\n 4036 | {\n 4037 |     unsigned int subresource_count = d3d12_resource_get_sub_resource_count(resource);\n 4038 | \n 4039 |     resource->subresource_layouts = vkd3d_calloc(subresource_count, sizeof(*resource->subresource_layouts));\n 4040 |     return vkd3d_compute_resource_layouts_from_desc(device, &resource->desc, resource->subresource_layouts);\n 4041 | }"},{"ref":"libs/vkd3d/resource.c:4138-4144","code":" 4138 |     if (!(flags & VKD3D_RESOURCE_RESERVED) && d3d12_resource_is_texture(object) &&\n 4139 |             is_cpu_accessible_heap(heap_properties))\n 4140 |     {\n 4141 |         const UINT unsupported_flags = D3D12_RESOURCE_FLAG_ALLOW_SIMULTANEOUS_ACCESS | D3D12_RESOURCE_FLAG_ALLOW_UNORDERED_ACCESS;\n 4142 | \n 4143 |         object->flags |= VKD3D_RESOURCE_LINEAR_STAGING_COPY | VKD3D_RESOURCE_GENERAL_LAYOUT;\n 4144 |         d3d12_resource_init_subresource_layouts(object, device);"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","description":"vkd3d_create_raw_buffer_view asserts `resource && resource->va && resource->size` after vkd3d_va_map_deref, then unconditionally dereferences resource->vk_buffer/size. In release builds (asserts compiled out) a stale/invalid GPU VA that fails to resolve yields resource == NULL and an immediate NULL dereference rather than a graceful failure.","fix":"Replace the assert with a runtime `if (!resource) return false;` guard before dereferencing.","locations":[{"ref":"libs/vkd3d/resource.c:8142-8149","code":" 8142 |     resource = vkd3d_va_map_deref(&device->memory_allocator.va_map, gpu_address);\n 8143 |     assert(resource && resource->va && resource->size);\n 8144 | \n 8145 |     offset = gpu_address - resource->va;\n 8146 |     range = min(resource->size - offset, device->vk_info.device_limits.maxStorageBufferRange);\n 8147 | \n 8148 |     return vkd3d_create_raw_r32ui_vk_buffer_view(device, resource->vk_buffer,\n 8149 |             offset, range, vk_buffer_view);"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","description":"vkd3d_get_descriptor_size_for_binding dereferences `mutable = vk_find_pnext(..., MUTABLE_DESCRIPTOR_TYPE_CREATE_INFO_EXT)` then accesses mutable->pMutableDescriptorTypeLists[binding_index] with no NULL check and no bounds check against mutableDescriptorTypeListCount. A MUTABLE_EXT binding whose pNext chain lacks the mutable info NULL-derefs.","fix":"Guard that `mutable` is non-NULL and binding_index < mutableDescriptorTypeListCount before indexing.","locations":[{"ref":"libs/vkd3d/state.c:7329-7341","code":" 7329 |     if (vk_binding->descriptorType != VK_DESCRIPTOR_TYPE_MUTABLE_EXT)\n 7330 |         max_size = vkd3d_get_descriptor_size_for_type(device, vk_binding->descriptorType);\n 7331 |     else\n 7332 |     {\n 7333 |         mutable = vk_find_pnext(set_layout_info->pNext, VK_STRUCTURE_TYPE_MUTABLE_DESCRIPTOR_TYPE_CREATE_INFO_EXT);\n 7334 |         type_list = &mutable->pMutableDescriptorTypeLists[binding_index];\n 7335 | \n 7336 |         max_size = 0;\n 7337 |         for (i = 0; i < type_list->descriptorTypeCount; i++)\n 7338 |         {\n 7339 |             type_size = vkd3d_get_descriptor_size_for_type(device, type_list->pDescriptorTypes[i]);\n 7340 |             max_size = max(max_size, type_size);\n 7341 |         }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","description":"The pipeline-library TOC parser sums three disk/blob-controlled uint32_t counts in 32-bit unsigned arithmetic before widening to size_t: `total_toc_entries = header->pipeline_count + header->spirv_count + header->driver_cache_count`. If the sum exceeds 2^32 it wraps to a small value, so header_entry_size stays small and the `blob_length < header_entry_size` guard passes. serialized_data_base then points inside the tiny TOC, and the three unserialize_hash_map calls iterate over the REAL per-map counts (up to ~4 billion) indexing header->entries[i] and reading blob_offset/blob_length far past the buffer end -> massive OOB read and hash-map entries referencing arbitrary memory. The blob originates from CreatePipelineLibrary input and on-disk cache files.","fix":"Accumulate the counts as uint64_t and reject the blob if `total_toc_entries * sizeof(toc_entry) + header size` exceeds blob_length; additionally bound each individual count against the remaining TOC space before its per-map iteration. The serialize path at cache.c:2034-2037 has the same 32-bit sum and should match.","locations":[{"ref":"libs/vkd3d/cache.c:2445-2482","code":" 2445 |     total_toc_entries = header->pipeline_count + header->spirv_count + header->driver_cache_count;\n 2446 | \n 2447 |     header_entry_size = offsetof(struct vkd3d_serialized_pipeline_library_toc, entries) +\n 2448 |             total_toc_entries * sizeof(struct vkd3d_serialized_pipeline_toc_entry);\n 2449 | \n 2450 |     if (blob_length < header_entry_size)\n 2451 |     {\n 2452 |         if (VKD3D_CONFIG_FLAG_IS_SET(PIPELINE_LIBRARY_LOG))\n 2453 |             INFO(\"Rejecting pipeline library due to too small blob length compared to expected size.\\n\");\n 2454 |         return D3D12_ERROR_DRIVER_VERSION_MISMATCH;\n 2455 |     }\n 2456 | \n 2457 |     serialized_data_size = blob_length - header_entry_size;\n 2458 |     serialized_data_base = (const uint8_t *)&header->entries[total_toc_entries];\n 2459 |     name_table = serialized_data_base;\n 2460 | \n 2461 |     i = 0;\n 2462 | \n 2463 |     if (FAILED(hr = d3d12_pipeline_library_unserialize_hash_map(pipeline_library,\n 2464 |             &header->entries[i], header->spirv_count,\n 2465 |             &pipeline_library->spirv_cache_map, serialized_data_base, serialized_data_size,\n 2466 |             &name_table)))\n 2467 |         return hr;\n 2468 |     i += header->spirv_count;\n 2469 | \n 2470 |     if (FAILED(hr = d3d12_pipeline_library_unserialize_hash_map(pipeline_library,\n 2471 |             &header->entries[i], header->driver_cache_count,\n 2472 |             &pipeline_library->driver_cache_map, serialized_data_base, serialized_data_size,\n 2473 |             &name_table)))\n 2474 |         return hr;\n 2475 |     i += header->driver_cache_count;\n 2476 | \n 2477 |     if (FAILED(hr = d3d12_pipeline_library_unserialize_hash_map(pipeline_library,\n 2478 |             &header->entries[i], header->pipeline_count,\n 2479 |             &pipeline_library->pso_map, serialized_data_base, serialized_data_size,\n 2480 |             &name_table)))\n 2481 |         return hr;\n 2482 |     i += header->pipeline_count;"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"In the buffered logging path, local_buffer_count is the vsnprintf return value — the number of bytes that WOULD have been written, not what fit. If the formatted message exceeds the 4096-byte local_buffer, local_buffer_count > 4096; as long as the total still fits the ring buffer, `memcpy(..., local_buffer, local_buffer_count)` at line 225 reads out of bounds of the 4096-byte stack array. The same applies to prefix_buffer_count vs the 256-byte prefix_buffer, and required_count (signed int) can overflow.","fix":"Clamp the counts to the actual buffer sizes before using them as memcpy lengths (e.g. min(count, (int)sizeof(buf) - 1)) and guard against negative vsnprintf return values.","locations":[{"ref":"libs/vkd3d-common/debug.c:198-226","code":"  198 |         prefix_buffer_count = snprintf(prefix_buffer, sizeof(prefix_buffer),\n  199 |                 \"%04x:%s:%s: \", tid, debug_level_names[level], function);\n  200 |         local_buffer_count = vsnprintf(local_buffer, sizeof(local_buffer), fmt, args);\n  201 |         required_count = prefix_buffer_count + local_buffer_count;\n  202 | \n  203 |         spinlock_acquire(&vkd3d_debug_buffer_spin);\n  204 |         if (vkd3d_dbg_buffer.offset + required_count > vkd3d_dbg_buffer.size)\n  205 |         {\n  206 |             if (vkd3d_log_file)\n  207 |             {\n  208 |                 fwrite(vkd3d_dbg_buffer.buffer, 1, vkd3d_dbg_buffer.offset, vkd3d_log_file);\n  209 |             }\n  210 |             else\n  211 |             {\n  212 |                 /* Binary vs text matters on Win32.\n  213 |                  * Don't bother trying to be clever here reopening stdio files as O_BINARY, etc. */\n  214 |                 fputs(vkd3d_dbg_buffer.buffer, stderr);\n  215 |             }\n  216 | \n  217 |             vkd3d_dbg_buffer.offset = 0;\n  218 |         }\n  219 | \n  220 |         /* Here we trade performance for robustness. Some data will be left behind on early termination or crash. */\n  221 |         if (vkd3d_dbg_buffer.offset + required_count <= vkd3d_dbg_buffer.size)\n  222 |         {\n  223 |             memcpy(vkd3d_dbg_buffer.buffer + vkd3d_dbg_buffer.offset, prefix_buffer, prefix_buffer_count);\n  224 |             vkd3d_dbg_buffer.offset += prefix_buffer_count;\n  225 |             memcpy(vkd3d_dbg_buffer.buffer + vkd3d_dbg_buffer.offset, local_buffer, local_buffer_count);\n  226 |             vkd3d_dbg_buffer.offset += local_buffer_count;"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"debugstr_a reads each byte into a plain (signed) `char c` and for non-printable bytes does `sprintf(ptr, \"%02x\", c)`. For c >= 0x80 the signed char is promoted to a negative int and printed as 8 hex digits (e.g. \"ffffff80\"), but the code only advances ptr by 2, so ~6 extra bytes are written past the accounted-for position, overflowing the per-thread 512-byte debug buffer. isprint(c)/the switch on a negative char value is also undefined behavior.","fix":"Read the byte as `unsigned char` (or cast before isprint and the sprintf): `sprintf(ptr, \"%02x\", (unsigned char)c);`.","locations":[{"ref":"libs/vkd3d-common/debug.c:302-348","code":"  302 | const char *debugstr_a(const char *str)\n  303 | {\n  304 |     char *buffer, *ptr;\n  305 |     char c;\n  306 | \n  307 |     if (!str)\n  308 |         return \"(null)\";\n  309 | \n  310 |     ptr = buffer = get_buffer();\n  311 | \n  312 |     *ptr++ = '\"';\n  313 |     while ((c = *str++) && ptr <= buffer + VKD3D_DEBUG_BUFFER_SIZE - 8)\n  314 |     {\n  315 |         int escape_char;\n  316 | \n  317 |         switch (c)\n  318 |         {\n  319 |             case '\"':\n  320 |             case '\\\\':\n  321 |             case '\\n':\n  322 |             case '\\r':\n  323 |             case '\\t':\n  324 |                 escape_char = c;\n  325 |                 break;\n  326 |             default:\n  327 |                 escape_char = 0;\n  328 |                 break;\n  329 |         }\n  330 | \n  331 |         if (escape_char)\n  332 |         {\n  333 |             *ptr++ = '\\\\';\n  334 |             *ptr++ = escape_char;\n  335 |             continue;\n  336 |         }\n  337 | \n  338 |         if (isprint(c))\n  339 |         {\n  340 |             *ptr++ = c;\n  341 |         }\n  342 |         else\n  343 |         {\n  344 |             *ptr++ = '\\\\';\n  345 |             sprintf(ptr, \"%02x\", c);\n  346 |             ptr += 2;\n  347 |         }\n  348 |     }"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"require_space computes `(data_size - offset) / count >= size` with both operands as size_t. The root-signature sub-parsers (descriptor_table/table1, root_constants, root_descriptor/_descriptor1, etc.) pass an attacker-controlled `offset` read straight from the blob without first checking `offset <= data_size`. When offset > data_size the subtraction wraps to a huge size_t, the check passes, and `ptr = &context->data[offset]` + read_uint32 reads out of bounds. parse_dxbc guards this for chunk offsets, but these sub-parsers do not. Reachable from untrusted root-signature blobs via vkd3d_shader_parse_root_signature / CreateRootSignatureDeserializer.","fix":"Make require_space robust to offset > data_size, e.g. `return offset <= data_size && (!count || (data_size - offset) / count >= size);` and add explicit `offset > data_size` guards before dereferencing context->data[offset] in each sub-parser.","locations":[{"ref":"libs/vkd3d-shader/dxbc.c:41-44","code":"   41 | static bool require_space(size_t offset, size_t count, size_t size, size_t data_size)\n   42 | {\n   43 |     return !count || (data_size - offset) / count >= size;\n   44 | }"},{"ref":"libs/vkd3d-shader/dxbc.c:450-455","code":"  450 |     if (!require_space(offset, 2, sizeof(DWORD), context->data_size))\n  451 |     {\n  452 |         WARN(\"Invalid data size %#x (offset %u).\\n\", context->data_size, offset);\n  453 |         return VKD3D_ERROR_INVALID_ARGUMENT;\n  454 |     }\n  455 |     ptr = &context->data[offset];"},{"ref":"libs/vkd3d-shader/dxbc.c:477-482","code":"  477 |     if (!require_space(offset, 2, sizeof(DWORD), context->data_size))\n  478 |     {\n  479 |         WARN(\"Invalid data size %#x (offset %u).\\n\", context->data_size, offset);\n  480 |         return VKD3D_ERROR_INVALID_ARGUMENT;\n  481 |     }\n  482 |     ptr = &context->data[offset];"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"d3d12_device_CreateSharedHandle writes a session prefix into buffer[MAX_PATH] via swprintf, then `memcpy(buffer + len, name, (name_len + 1) * sizeof(WCHAR))` copies the caller-supplied name with no check that `len + name_len + 1 <= MAX_PATH`. A long name overflows the fixed stack buffer (stack smash). len and name_len are never validated against ARRAY_SIZE(buffer).","fix":"Validate `len + name_len + 1 <= ARRAY_SIZE(buffer)` (return E_INVALIDARG otherwise), or size the buffer dynamically.","locations":[{"ref":"libs/vkd3d/device.c:7259-7271","code":" 7259 |     {\n 7260 |         DWORD session, len, name_len = wcslen(name);\n 7261 | \n 7262 |         ProcessIdToSessionId(GetCurrentProcessId(), &session);\n 7263 |         len = swprintf(buffer, ARRAY_SIZE(buffer), L\"\\\\Sessions\\\\%u\\\\BaseNamedObjects\\\\\", session);\n 7264 |         memcpy(buffer + len, name, (name_len + 1) * sizeof(WCHAR));\n 7265 |         name_str.MaximumLength = name_str.Length = (len + name_len) * sizeof(WCHAR);\n 7266 |         name_str.MaximumLength += sizeof(WCHAR);\n 7267 |         name_str.Buffer = buffer;\n 7268 | \n 7269 |         attr.ObjectName = &name_str;\n 7270 |         attr.Attributes = OBJ_CASE_INSENSITIVE;\n 7271 |     }"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"vkd3d_array_reserve computes `max_capacity = ~(size_t)0 / element_size` with no guard for element_size == 0 (division by zero). All in-tree callers pass a non-zero sizeof, so this is latent rather than currently triggerable, but the helper does not defend against it.","fix":"Early-return false (or assert) when element_size == 0 before the division.","locations":[{"ref":"libs/vkd3d-common/memory.c:24-34","code":"   24 | bool vkd3d_array_reserve(void **elements, size_t *capacity, size_t element_count, size_t element_size)\n   25 | {\n   26 |     size_t new_capacity, max_capacity;\n   27 |     void *new_elements;\n   28 | \n   29 |     if (element_count <= *capacity)\n   30 |         return true;\n   31 | \n   32 |     max_capacity = ~(size_t)0 / element_size;\n   33 |     if (max_capacity < element_count)\n   34 |         return false;"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"vkd3d_acceleration_structure_convert_inputs / get_geometry_count use desc->NumDescs (app-controlled UINT) directly to size memsets and geometry arrays with no upper-bound sanity check. On 32-bit builds count*element-size can overflow size_t for extreme NumDescs, yielding an undersized allocation followed by OOB writes.","fix":"Validate desc->NumDescs against a sane maximum and/or use a checked multiply before sizing allocations/memsets.","locations":[{"ref":"libs/vkd3d/acceleration_structure.c:89-96","code":"   89 | uint32_t vkd3d_acceleration_structure_get_geometry_count(\n   90 |         const D3D12_BUILD_RAYTRACING_ACCELERATION_STRUCTURE_INPUTS *desc)\n   91 | {\n   92 |     if (desc->Type != D3D12_RAYTRACING_ACCELERATION_STRUCTURE_TYPE_BOTTOM_LEVEL)\n   93 |         return 1;\n   94 |     else\n   95 |         return desc->NumDescs;\n   96 | }"},{"ref":"libs/vkd3d/acceleration_structure.c:231-246","code":"  231 |         memset(geometry_infos, 0, sizeof(*geometry_infos) * desc->NumDescs);\n  232 |         if (device->device_info.using_khr_opacity_micromap)\n  233 |         {\n  234 |             if (omm_triangles_infos.khr)\n  235 |                 memset(omm_triangles_infos.khr, 0, sizeof(*omm_triangles_infos.khr) * desc->NumDescs);\n  236 |         }\n  237 |         else\n  238 |         {\n  239 |             if (omm_triangles_infos.ext)\n  240 |                 memset(omm_triangles_infos.ext, 0, sizeof(*omm_triangles_infos.ext) * desc->NumDescs);\n  241 |         }\n  242 | \n  243 |         if (primitive_counts)\n  244 |             memset(primitive_counts, 0, sizeof(*primitive_counts) * desc->NumDescs);\n  245 | \n  246 |         build_info->geometryCount = desc->NumDescs;"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"d3d12_bundle_SetSamplePositions computes `array_size = sample_count * pixel_count` in 32-bit UINT arithmetic before widening to size_t, then allocates `sizeof(*args) + sizeof(*sample_positions) * array_size`. Large app-supplied values can wrap the product and under-allocate; the subsequent memcpy then overflows.","fix":"Compute the product as size_t (cast operands) and/or validate sample_count/pixel_count against D3D12 limits before allocating.","locations":[{"ref":"libs/vkd3d/bundle.c:1406-1415","code":" 1406 |     size_t array_size = sample_count * pixel_count;\n 1407 | \n 1408 |     TRACE(\"iface %p, sample_count %u, pixel_count %u, sample_positions %p.\\n\",\n 1409 |             iface, sample_count, pixel_count, sample_positions);\n 1410 | \n 1411 |     args = d3d12_bundle_add_command(bundle, &d3d12_bundle_exec_set_sample_positions,\n 1412 |             sizeof(*args) + sizeof(*sample_positions) * array_size);\n 1413 |     args->sample_count = sample_count;\n 1414 |     args->pixel_count = pixel_count;\n 1415 |     memcpy(args->positions, sample_positions, sizeof(*sample_positions) * array_size);"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"Signed left-shift UB in varint decode: `buffer[offset]` (uint8_t) is promoted to int, `(buffer[offset] & 0x7f)` is int, and at shift == 28 the expression `(0x7f << 28)` exceeds INT_MAX — undefined behavior for signed shift. The encoder caps at 5 bytes so shift reaches 28 for any word with bits >= 28 set. In practice it wraps correctly but trips UBSan and is not standard-guaranteed.","fix":"Cast to unsigned before shifting: `*w |= (uint32_t)(buffer[offset] & 0x7f) << shift;`","locations":[{"ref":"libs/vkd3d/cache.c:155-163","code":"  155 |         shift = 0;\n  156 |         do\n  157 |         {\n  158 |             if (offset >= buffer_size || shift >= 32u)\n  159 |                 return false;\n  160 | \n  161 |             *w |= (buffer[offset] & 0x7f) << shift;\n  162 |             shift += 7;\n  163 |         } while (buffer[offset++] & 0x80);"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"max_miplevel_count truncates 64-bit desc->Width into `unsigned int size = max(desc->Width, desc->Height)`. For in-range textures this is benign, but the implicit 64->32 truncation silently mishandles out-of-range widths (computing a wrong mip count instead of rejecting).","fix":"Use uint64_t for the intermediate, or clamp/validate desc->Width before truncation.","locations":[{"ref":"libs/vkd3d/resource.c:302-308","code":"  302 | static unsigned int max_miplevel_count(const D3D12_RESOURCE_DESC1 *desc)\n  303 | {\n  304 |     unsigned int size = max(desc->Width, desc->Height);\n  305 |     if (desc->Dimension == D3D12_RESOURCE_DIMENSION_TEXTURE3D)\n  306 |         size = max(size, desc->DepthOrArraySize);\n  307 |     return vkd3d_log2i(size) + 1;\n  308 | }"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"d3d12_resource_get_tiling computes the buffer tile count `align(desc->Width, VKD3D_TILE_SIZE) / VKD3D_TILE_SIZE` into a 32-bit `unsigned int tile_count` and stores it into *total_tile_count (UINT). desc->Width is UINT64; a very large reserved buffer silently truncates the tile count.","fix":"Compute tile_count as uint64_t and validate it fits in UINT before assigning, or clamp.","locations":[{"ref":"libs/vkd3d/resource.c:1933-1951","code":" 1933 |     if (desc->Dimension == D3D12_RESOURCE_DIMENSION_BUFFER)\n 1934 |     {\n 1935 |         tile_count = align(desc->Width, VKD3D_TILE_SIZE) / VKD3D_TILE_SIZE;\n 1936 | \n 1937 |         packed_mip_info->NumStandardMips = 0;\n 1938 |         packed_mip_info->NumPackedMips = 0;\n 1939 |         packed_mip_info->NumTilesForPackedMips = 0;\n 1940 |         packed_mip_info->StartTileIndexInOverallResource = 0;\n 1941 | \n 1942 |         tile_shape->WidthInTexels = VKD3D_TILE_SIZE;\n 1943 |         tile_shape->HeightInTexels = 1;\n 1944 |         tile_shape->DepthInTexels = 1;\n 1945 | \n 1946 |         tilings[0].WidthInTiles = tile_count;\n 1947 |         tilings[0].HeightInTiles = 1;\n 1948 |         tilings[0].DepthInTiles = 1;\n 1949 |         tilings[0].StartTileIndexInOverallResource = 0;\n 1950 | \n 1951 |         *total_tile_count = tile_count;"}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"d3d12_resource_supports_small_resource_alignment computes the slice size estimate as `desc->Width * desc->Height * format->byte_count * format->block_byte_count / (...)`. desc->Width is UINT64 but the other factors are 32-bit, so intermediates can overflow 32-bit before the UINT64 result is assigned, potentially mis-classifying a large texture as eligible for small alignment.","fix":"Cast to uint64_t at the start of the product, e.g. `(uint64_t)desc->Width * desc->Height * ...`.","locations":[{"ref":"libs/vkd3d/resource.c:2950-2963","code":" 2950 |     uint64_t estimated_size;\n 2951 | \n 2952 |     if (desc->Flags & (D3D12_RESOURCE_FLAG_ALLOW_DEPTH_STENCIL | D3D12_RESOURCE_FLAG_ALLOW_RENDER_TARGET))\n 2953 |         return false;\n 2954 | \n 2955 |     /* MSAA does not support 4K alignment at all (but it would most likely be covered by RTV/DSV check). */\n 2956 |     if (desc->SampleDesc.Count > 1)\n 2957 |         return false;\n 2958 | \n 2959 |     /* Windows uses the slice size to determine small alignment eligibility. DepthOrArraySize is ignored. */\n 2960 |     estimated_size = desc->Width * desc->Height * format->byte_count * format->block_byte_count\n 2961 |             / (format->block_width * format->block_height);\n 2962 | \n 2963 |     return estimated_size <= D3D12_DEFAULT_RESOURCE_PLACEMENT_ALIGNMENT;"}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"root-signature `info->cost` is a uint32_t accumulated directly from blob-controlled Num32BitValues with no per-iteration bound before the aggregate `cost > D3D12_MAX_ROOT_COST` (64) check. A crafted blob can wrap cost. The expression `(D3D12_MAX_ROOT_COST - info->cost) / 2` then underflows in unsigned arithmetic (saved only by a preceding min()), and a wrapped small cost could bypass the >64 rejection and mis-size the inline-redzone path.","fix":"Use a 64-bit (or saturating) accumulator for cost, and reorder the subtraction to guard against cost >= D3D12_MAX_ROOT_COST before subtracting.","locations":[{"ref":"libs/vkd3d/state.c:555-558","code":"  555 |             case D3D12_ROOT_PARAMETER_TYPE_32BIT_CONSTANTS:\n  556 |                 info->root_constant_count += 1;\n  557 |                 info->cost += p->Constants.Num32BitValues;\n  558 |                 break;"},{"ref":"libs/vkd3d/state.c:574-575","code":"  574 |         info->hoist_descriptor_count = min(info->hoist_descriptor_count, VKD3D_MAX_HOISTED_DESCRIPTORS);\n  575 |         info->hoist_descriptor_count = min(info->hoist_descriptor_count, (D3D12_MAX_ROOT_COST - info->cost) / 2);"},{"ref":"libs/vkd3d/state.c:1863-1867","code":" 1863 |     if (info.cost > D3D12_MAX_ROOT_COST)\n 1864 |     {\n 1865 |         WARN(\"Root signature cost %u exceeds maximum allowed cost.\\n\", info.cost);\n 1866 |         return E_INVALIDARG;\n 1867 |     }"}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"vkd3d_shader_transform_feedback_info_dup allocates `NumStrides * sizeof(...)` and `NumEntries * sizeof(...)` where NumStrides/NumEntries are app-supplied UINTs. The count*size product is computed without an overflow guard; on 32-bit builds a large NumEntries can overflow the multiply and under-allocate, after which the memcpy of NumEntries elements overflows the heap buffer.","fix":"Use vkd3d_calloc (which guards count*size) or validate NumStrides/NumEntries against D3D12 stream-output limits before allocating/copying.","locations":[{"ref":"libs/vkd3d/state.c:2803-2817","code":" 2803 |     new_buffer_strides = vkd3d_malloc(so_desc->NumStrides * sizeof(*new_buffer_strides));\n 2804 |     if (!new_buffer_strides)\n 2805 |         goto fail;\n 2806 |     memcpy(new_buffer_strides, so_desc->pBufferStrides, so_desc->NumStrides * sizeof(*new_buffer_strides));\n 2807 |     xfb_info->buffer_strides = new_buffer_strides;\n 2808 | \n 2809 |     new_entries = vkd3d_malloc(so_desc->NumEntries * sizeof(*new_entries));\n 2810 |     if (!new_entries)\n 2811 |         goto fail;\n 2812 |     memcpy(new_entries, so_desc->pSODeclaration, so_desc->NumEntries * sizeof(*new_entries));\n 2813 |     xfb_info->elements = new_entries;\n 2814 | \n 2815 |     for (i = 0; i < so_desc->NumEntries; i++, num_duped++)\n 2816 |         if (!(new_entries[i].semantic_name = vkd3d_strdup(new_entries[i].semantic_name)))\n 2817 |             goto fail;"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"When vkd3d_array_reserve fails (OOM) the meta-pipeline getters return E_OUTOFMEMORY without unlocking the ops mutex that was locked earlier in the function. The mutex stays permanently locked, deadlocking all subsequent meta-pipeline lookups of that kind. The copy-image, resolve-image, and swapchain getters share this pattern.","fix":"Call pthread_mutex_unlock(&...->mutex) before returning E_OUTOFMEMORY in each array-reserve failure branch.","locations":[{"ref":"libs/vkd3d/meta.c:879-884","code":"  879 |     if (!vkd3d_array_reserve((void **)&meta_copy_image_ops->pipelines, &meta_copy_image_ops->pipelines_size,\n  880 |             meta_copy_image_ops->pipeline_count + 1, sizeof(*meta_copy_image_ops->pipelines)))\n  881 |     {\n  882 |         ERR(\"Failed to reserve space for pipeline.\\n\");\n  883 |         return E_OUTOFMEMORY;\n  884 |     }"},{"ref":"libs/vkd3d/meta.c:1271-1276","code":" 1271 |     if (!vkd3d_array_reserve((void **)&meta_resolve_image_ops->pipelines, &meta_resolve_image_ops->pipelines_size,\n 1272 |             meta_resolve_image_ops->pipeline_count + 1, sizeof(*meta_resolve_image_ops->pipelines)))\n 1273 |     {\n 1274 |         ERR(\"Failed to reserve space for pipeline.\\n\");\n 1275 |         return E_OUTOFMEMORY;\n 1276 |     }"},{"ref":"libs/vkd3d/meta.c:1417-1422","code":" 1417 |     if (!vkd3d_array_reserve((void **)&meta_swapchain_ops->pipelines, &meta_swapchain_ops->pipelines_size,\n 1418 |             meta_swapchain_ops->pipeline_count + 1, sizeof(*meta_swapchain_ops->pipelines)))\n 1419 |     {\n 1420 |         ERR(\"Failed to reserve space for pipeline.\\n\");\n 1421 |         return E_OUTOFMEMORY;\n 1422 |     }"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"d3d12_resource_create_reserved does `return E_FAIL;` directly (instead of `goto fail;`) when vkd3d_get_buffer_device_address returns 0 for a sparse buffer. This leaks the entire d3d12_resource: the sparse VkBuffer, the sparse tiling/tile arrays, the view map, the private store, and the device reference taken in d3d12_resource_create. The object is never destroyed and the device refcount never balanced.","fix":"Set `hr = E_FAIL;` and `goto fail;` so d3d12_resource_destroy_and_release_device runs, matching every other error path in this function.","locations":[{"ref":"libs/vkd3d/resource.c:4785-4789","code":" 4785 |         if (!object->res.va)\n 4786 |         {\n 4787 |             ERR(\"Failed to get VA for sparse resource.\\n\");\n 4788 |             return E_FAIL;\n 4789 |         }"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"On Win32, d3d12core_CreateDeviceFromFactory acquires dxgi_adapter via d3d12_get_adapter (which AddRefs it), but if vkd3d_create_instance_global fails it does `return hr;` directly, bypassing the out_release_adapter label that calls IDXGIAdapter_Release. Every failed instance creation leaks an IDXGIAdapter reference.","fix":"Replace the early `return hr;` with `goto out_release_adapter;` (Win32) so the adapter reference is released on the error path.","locations":[{"ref":"libs/d3d12core/main.c:688-738","code":"  688 | #endif\n  689 | \n  690 |     if (FAILED(hr = vkd3d_create_instance_global(&instance)))\n  691 |         return hr;\n  692 | \n  693 |     memset(&device_create_info, 0, sizeof(device_create_info));\n  694 |     device_create_info.minimum_feature_level = minimum_feature_level;\n  695 |     device_create_info.instance = instance;\n  696 |     device_create_info.instance_create_info = NULL;\n  697 |     device_create_info.device_extensions = device_extensions;\n  698 |     device_create_info.device_extension_count = ARRAY_SIZE(device_extensions);\n  699 |     device_create_info.optional_device_extensions = optional_device_extensions;\n  700 |     device_create_info.optional_device_extension_count = ARRAY_SIZE(optional_device_extensions);\n  701 |     device_create_info.independent = factory != NULL;\n  702 |     if (factory)\n  703 |         device_create_info.device_factory_flags = ID3D12DeviceFactory_GetFlags(factory);\n  704 | \n  705 | #ifdef _WIN32\n  706 |     device_create_info.vk_physical_device = d3d12_find_physical_device(instance, vulkan_vkGetInstanceProcAddr, &adapter_desc);\n  707 |     device_create_info.parent = (IUnknown *)dxgi_adapter;\n  708 |     memcpy(&device_create_info.adapter_luid, &adapter_desc.AdapterLuid, VK_LUID_SIZE);\n  709 | \n  710 |     openvr_extensions = openvr_device_extensions(&adapter_desc);\n  711 |     openxr_extensions = openxr_vulkan_extensions(true);\n  712 |     vr_extension_count = parse_extension_list(openvr_extensions, NULL) + parse_extension_list(openxr_extensions, NULL);\n  713 |     if (vr_extension_count > 0)\n  714 |     {\n  715 |         size_t len = ARRAY_SIZE(device_extensions) + vr_extension_count;\n  716 |         uint32_t offset = ARRAY_SIZE(device_extensions);\n  717 |         char **extensions = calloc(len, sizeof(char *));\n  718 |         memcpy(extensions, device_extensions, sizeof(char *) * ARRAY_SIZE(device_extensions));\n  719 |         offset += parse_extension_list(openvr_extensions, extensions + offset);\n  720 |         parse_extension_list(openxr_extensions, extensions + offset);\n  721 |         device_create_info.device_extensions = (const char *const *)extensions;\n  722 |         device_create_info.device_extension_count = len;\n  723 |     }\n  724 | #endif\n  725 | \n  726 |     hr = vkd3d_create_device(&device_create_info, iid, device);\n  727 |     vkd3d_instance_decref(instance);\n  728 | \n  729 | #ifdef _WIN32\n  730 |     passthrough_unix_environment(\"VKD3D_UNIX_POST_ENV\");\n  731 |     if (device_create_info.device_extensions != device_extensions)\n  732 |         vkd3d_free((void *)device_create_info.device_extensions);\n  733 |     vkd3d_free(openvr_extensions);\n  734 |     vkd3d_free(openxr_extensions);\n  735 | \n  736 | out_release_adapter:\n  737 |     IDXGIAdapter_Release(dxgi_adapter);\n  738 | #endif"}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In vkd3d_memory_allocation_init the host_ptr coherent-fallback branch calls vkMapMemory only to make Flush/Invalidate legal; if it fails the error is merely logged and execution continues with cpu_address set to the imported host_ptr. This diverges from the non-host_ptr branch which frees on map failure, and the implicit mapping is not explicitly unmapped on later teardown paths (bounded by vkFreeMemory implicitly unmapping).","fix":"Treat vkMapMemory failure in the host_ptr branch as fatal (free the allocation and return), mirroring the non-host_ptr branch.","locations":[{"ref":"libs/vkd3d/memory.c:1460-1486","code":" 1460 |     if (host_ptr)\n 1461 |     {\n 1462 |         /* D3D12 expects us to forward the host pointer as-is. Map the memory\n 1463 |          * region anyway so that calling Flush/Invalidate becomes legal, but\n 1464 |          * discard the mapped pointer. */\n 1465 |         allocation->flags |= VKD3D_ALLOCATION_FLAG_CPU_ACCESS;\n 1466 |         allocation->cpu_address = host_ptr;\n 1467 | \n 1468 |         if (!(device->memory_properties.memoryTypes[allocation->device_allocation.vk_memory_type].propertyFlags & VK_MEMORY_PROPERTY_HOST_COHERENT_BIT))\n 1469 |         {\n 1470 |             if ((vr = VK_CALL(vkMapMemory(device->vk_device, allocation->device_allocation.vk_memory,\n 1471 |                     0, VK_WHOLE_SIZE, 0, &dummy_mapping))))\n 1472 |                 ERR(\"Failed to map memory, vr %d.\\n\", vr);\n 1473 |         }\n 1474 |     }\n 1475 |     else if (type_flags & VK_MEMORY_PROPERTY_HOST_VISIBLE_BIT)\n 1476 |     {\n 1477 |         allocation->flags |= VKD3D_ALLOCATION_FLAG_CPU_ACCESS;\n 1478 | \n 1479 |         if ((vr = VK_CALL(vkMapMemory(device->vk_device, allocation->device_allocation.vk_memory,\n 1480 |                 0, VK_WHOLE_SIZE, 0, &allocation->cpu_address))))\n 1481 |         {\n 1482 |             ERR(\"Failed to map memory, vr %d.\\n\", vr);\n 1483 |             vkd3d_memory_allocation_free(allocation, device, allocator);\n 1484 |             return hresult_from_vk_result(vr);\n 1485 |         }\n 1486 |     }"}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"vkd3d_meta_get_copy_image_pipeline increments pipeline_count BEFORE vkd3d_meta_create_copy_image_pipeline is called. On failure (e.g. unhandled view type returns E_INVALIDARG, or a Vulkan failure) the function returns with pipeline_count already incremented, pointing at a slot whose vk_pipeline is uninitialized garbage; on later cleanup vkDestroyPipeline is called on that garbage handle. The resolve-image getter avoids this by incrementing only after success.","fix":"Do not increment pipeline_count until vkd3d_meta_create_copy_image_pipeline succeeds, or zero the slot before creation.","locations":[{"ref":"libs/vkd3d/meta.c:886-892","code":"  886 |     pipeline = &meta_copy_image_ops->pipelines[meta_copy_image_ops->pipeline_count++];\n  887 | \n  888 |     if (FAILED(hr = vkd3d_meta_create_copy_image_pipeline(meta_ops, key, pipeline, heap)))\n  889 |     {\n  890 |         pthread_mutex_unlock(&meta_copy_image_ops->mutex);\n  891 |         return hr;\n  892 |     }"}]},{"id":"RES_6","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"d3d12_query_heap_create: on the inline (buffer-backed) path object->vk_buffer and object->device_allocation are created, but if vkd3d_private_store_init then fails it only calls vkd3d_free(object), leaking the VkBuffer and the device memory allocation (the query-pool path leaks the pool similarly).","fix":"Before vkd3d_free(object) in the private_store_init failure branch, destroy object->vk_query_pool / object->vk_buffer and free object->device_allocation.","locations":[{"ref":"libs/vkd3d/resource.c:10566-10570","code":"10566 |     if (FAILED(hr = vkd3d_private_store_init(&object->private_store)))\n10567 |     {\n10568 |         vkd3d_free(object);\n10569 |         return hr;\n10570 |     }"}]},{"id":"RES_7","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"d3d12_command_queue_ExecuteCommandLists returns immediately when the cmd_cost allocation fails, without freeing the already-allocated `buffers` and `allocators` arrays (the allocators-failure path just above correctly frees `buffers`). Both leak on every OOM here.","fix":"Before returning, `vkd3d_free(allocators); vkd3d_free(buffers);` (and complete the timeline trace as the other error paths do).","locations":[{"ref":"libs/vkd3d/command.c:23033-23037","code":"23033 |     if (!(cmd_cost = vkd3d_calloc(num_command_buffers, sizeof(*cmd_cost))))\n23034 |     {\n23035 |         ERR(\"Failed to allocate command buffer cost array.\\n\");\n23036 |         return;\n23037 |     }"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","description":"In vkd3d_create_vk_device the `extensions` array (allocated earlier) is leaked on two error paths after vkCreateDevice succeeds: when vkd3d_load_vk_device_procs fails (4106-4112) and when d3d12_device_create_vkd3d_queues fails (4116-4121). `extensions` is only assigned to device->vk_info.extension_names at 4123-4124 (where the destroy path frees it), so both earlier failures `return hr;` without freeing it. (The vr<0 path at 4102 frees it correctly.)","fix":"Add `vkd3d_free((void *)extensions);` before `return hr;` in both the load-procs failure block and the create-queues failure block.","locations":[{"ref":"libs/vkd3d/device.c:4099-4124","code":" 4099 |     if (vr < 0)\n 4100 |     {\n 4101 |         ERR(\"Failed to create Vulkan device, vr %d.\\n\", vr);\n 4102 |         vkd3d_free((void *)extensions);\n 4103 |         return hresult_from_vk_result(vr);\n 4104 |     }\n 4105 | \n 4106 |     if (FAILED(hr = vkd3d_load_vk_device_procs(&device->vk_procs, vk_procs, vk_device)))\n 4107 |     {\n 4108 |         ERR(\"Failed to load device procs, hr %#x.\\n\", (int)hr);\n 4109 |         if (device->vk_procs.vkDestroyDevice)\n 4110 |             device->vk_procs.vkDestroyDevice(vk_device, NULL);\n 4111 |         return hr;\n 4112 |     }\n 4113 | \n 4114 |     device->vk_device = vk_device;\n 4115 | \n 4116 |     if (FAILED(hr = d3d12_device_create_vkd3d_queues(device, &device_queue_info)))\n 4117 |     {\n 4118 |         ERR(\"Failed to create queues, hr %#x.\\n\", (int)hr);\n 4119 |
