stages[graphics->stage_count] = shader_stages_lut[i].stage;\n 5714 |             ++graphics->stage_count;\n 5715 |             continue;\n 5716 |         }\n 5717 | \n 5718 |         prev_stage = curr_stage;\n 5719 |         curr_stage = shader_stages_lut[i].stage;\n 5720 | \n 5721 |         memset(&io_input_signature, 0, sizeof(io_input_signature));\n 5722 | \n 5723 |         /* Ignore errors when a signature is not present. If a missing signature\n 5724 |          * leads to compatibility issues, validation will fail later anyway. */\n 5725 |         if (curr_stage == VK_SHADER_STAGE_TESSELLATION_CONTROL_BIT ||\n 5726 |                 curr_stage == VK_SHADER_STAGE_MESH_BIT_EXT)\n 5727 |             vkd3d_shader_parse_patch_constant_signature(&dxbc, &pc_output_signature);\n 5728 | \n 5729 |         if (curr_stage == VK_SHADER_STAGE_TESSELLATION_EVALUATION_BIT)\n 5730 |         {\n 5731 |             vkd3d_shader_parse_patch_constant_signature(&dxbc, &pc_input_signature);\n 5732 | \n 5733 |             if (!vkd3d_validate_shader_io_signatures(prev_stage, &pc_output_signature, curr_stage, &pc_input_signature))\n 5734 |             {\n 5735 |                 hr = E_INVALIDARG;\n 5736 |                 goto fail;\n 5737 |             }\n 5738 |         }\n 5739 | \n 5740 |         if (curr_stage != VK_SHADER_STAGE_VERTEX_BIT &&\n 5741 |                 curr_stage != VK_SHADER_STAGE_TASK_BIT_EXT &&\n 5742 |                 curr_stage != VK_SHADER_STAGE_MESH_BIT_EXT)\n 5743 |         {\n 5744 |             vkd3d_shader_parse_input_signature(&dxbc, &io_input_signature);\n 5745 | \n 5746 |             if (state->pipeline_type == VKD3D_PIPELINE_TYPE_MESH_GRAPHICS)\n 5747 |             {\n 5748 |                 /* Mesh shaders are special since register assignment is based on semantics. */\n 5749 |                 if (!vkd3d_validate_mesh_shader_io_signatures(&io_output_signature, &pc_output_signature, &io_input_signature))\n 5750 |                 {\n 5751 |                     hr = E_INVALIDARG;\n 5752 |                     goto fail;\n 5753 |                 }\n 5754 |             }\n 5755 |             else\n 5756 |             {\n 5757 |                 if (!vkd3d_validate_shader_io_signatures(prev_stage,\n 5758 |                         &io_output_signature, curr_stage, &io_input_signature))\n 5759 |                 {\n 5760 |                     hr = E_INVALIDARG;\n 5761 |                     goto fail;\n 5762 |                 }\n 5763 |             }\n 5764 |         }\n 5765 | \n 5766 |         vkd3d_shader_free_shader_signature(&io_input_signature);\n 5767 |         vkd3d_shader_free_shader_signature(&io_output_signature);\n 5768 | \n 5769 |         memset(&io_output_signature, 0, sizeof(io_output_signature));\n 5770 | \n 5771 |         /* Read output signature for validation purposes. */\n 5772 |         if (shader_stages_lut[i].stage != VK_SHADER_STAGE_TASK_BIT_EXT)\n 5773 |             vkd3d_shader_parse_output_signature(&dxbc, &io_output_signature);\n 5774 | \n 5775 |         switch (shader_stages_lut[i].stage)\n 5776 |         {\n 5777 |             case VK_SHADER_STAGE_VERTEX_BIT:\n 5778 |                 if ((ret = vkd3d_shader_parse_input_signature(&dxbc, &vs_input_signature)) < 0)\n 5779 |                 {\n 5780 |                     hr = hresult_from_vkd3d_result(ret);\n 5781 |                     goto fail;\n 5782 |                 }\n 5783 | \n 5784 |                 if (!vkd3d_validate_vertex_input_signature(&vs_input_signature, &desc->input_layout))\n 5785 |                 {\n 5786 |                     hr = E_INVALIDARG;\n 5787 |                     goto fail;\n 5788 |                 }\n 5789 |                 break;\n 5790 | \n 5791 |             case VK_SHADER_STAGE_TESSELLATION_CONTROL_BIT:\n 5792 |             case VK_SHADER_STAGE_TESSELLATION_EVALUATION_BIT:\n 5793 |                 if (desc->primitive_topology_type != D3D12_PRIMITIVE_TOPOLOGY_TYPE_PATCH)\n 5794 |                 {\n 5795 |                     WARN(\"D3D12_PRIMITIVE_TOPOLOGY_TYPE_PATCH must be used with tessellation shaders.\\n\");\n 5796 |                     hr = E_INVALIDARG;\n 5797 |                     goto fail;\n 5798 |                 }\n 5799 |                 break;\n 5800 | \n 5801 |             case VK_SHADER_STAGE_GEOMETRY_BIT:\n 5802 |             case VK_SHADER_STAGE_TASK_BIT_EXT:\n 5803 |             case VK_SHADER_STAGE_MESH_BIT_EXT:\n 5804 |                 break;\n 5805 | \n 5806 |             case VK_SHADER_STAGE_FRAGMENT_BIT:\n 5807 |                 if (FAILED(hr = d3d12_pipeline_state_validate_blend_state(state, device, desc, &io_output_signature)))\n 5808 |                     goto fail;\n 5809 |                 break;\n 5810 | \n 5811 |             default:\n 5812 |                 hr = E_INVALIDARG;\n 5813 |                 goto fail;\n 5814 |         }\n 5815 | \n 5816 |         /* Not owned yet. If we return from pipeline creation without having concrete SPIR-V,\n 5817 |          * we'll have to dupe the bytecode and potentially compile to SPIR-V late. */\n 5818 |         graphics->cached_desc.bytecode[graphics->stage_count] = *b;\n 5819 |         graphics->cached_desc.bytecode_stages[graphics->stage_count] = shader_stages_lut[i].stage;\n 5820 | \n 5821 |         ++graphics->stage_count;\n 5822 |     }\n 5823 | \n 5824 |     vkd3d_shader_free_shader_signature(&pc_input_signature);\n 5825 |     vkd3d_shader_free_shader_signature(&pc_output_signature);\n 5826 |     vkd3d_shader_free_shader_signature(&io_output_signature);"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"vkd3d_breadcrumb_trace_contexts_are_linked spins forever on a non-linked/corrupted context chain: when the link-validity test at line 442 is false (next == UINT32_MAX, a self-loop, or a prev mismatch), context_index is never advanced yet the while-condition stays true. Reached during NV device-lost breadcrumb analysis when contexts are not actually linked.","fix":"Break out of the loop (return false) when the condition at line 442 is not satisfied, instead of looping with context_index unchanged.","locations":[{"ref":"libs/vkd3d/breadcrumbs.c:436-447","code":"  436 | static bool vkd3d_breadcrumb_trace_contexts_are_linked(struct vkd3d_breadcrumb_tracer *tracer,\n  437 |         uint32_t context_index, uint32_t target_context_index)\n  438 | {\n  439 |     while (context_index != target_context_index)\n  440 |     {\n  441 |         uint32_t next = tracer->trace_contexts[context_index].next;\n  442 |         if (next != UINT32_MAX && next != context_index && tracer->trace_contexts[next].prev == context_index)\n  443 |             context_index = next;\n  444 |     }\n  445 | \n  446 |     return context_index == target_context_index;\n  447 | }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"d3d12_command_list_EndRenderPass tests the wrong bitfield for \"render pass never started\": it ANDs `list->rendering_info.info.flags` (a VkRenderingFlags value, where bit 0 is VK_RENDERING_CONTENTS_SECONDARY_COMMAND_BUFFERS_BIT) with VKD3D_RENDERING_ACTIVE (a vkd3d state bit, value 1). Every other \"is rendering active\" check in the file uses `rendering_info.state_flags & VKD3D_RENDERING_ACTIVE`. As written, pending load/store/clear work may be skipped or a redundant render pass forced.","fix":"Change the condition to `!(list->rendering_info.state_flags & VKD3D_RENDERING_ACTIVE)`.","locations":[{"ref":"libs/vkd3d/command.c:20116-20123","code":"20116 |     if (list->rendering_info.has_pending_render_pass_load_store_work &&\n20117 |             !(list->rendering_info.info.flags & VKD3D_RENDERING_ACTIVE))\n20118 |     {\n20119 |         /* If we never started the render pass due to no draw calls,\n20120 |          * forcefully start it so that we can get the fused clears in the proper render pass,\n20121 |          * and not forcing a separate clear. */\n20122 |         d3d12_command_list_begin_render_pass(list, VKD3D_PIPELINE_TYPE_NONE);\n20123 |     }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In the 16-bit dispatch-grid branch of the work-graph static-broadcast path, a spurious outer `for (i = 0; i < desc->NumRecords; i++)` wraps an inner `for (i = 0; i < node_input->dispatch_grid_components; i++)` that reuses and clobbers the same loop variable `i`. The 32-bit sibling branch has no such outer loop, confirming a copy-paste mistake; `grid` is also read from a fixed offset regardless of record.","fix":"Remove the spurious outer NumRecords loop in the 16-bit branch so it matches the 32-bit branch, reading grid directly with a single component loop.","locations":[{"ref":"libs/vkd3d/workgraphs.c:2688-2696","code":" 2688 |             else\n 2689 |             {\n 2690 |                 for (i = 0; i < desc->NumRecords; i++)\n 2691 |                 {\n 2692 |                     const uint16_t *grid = (const uint16_t *)(records + node_input->dispatch_grid_offset);\n 2693 |                     for (i = 0; i < node_input->dispatch_grid_components; i++)\n 2694 |                         num_wgx[i] = grid[i];\n 2695 |                 }\n 2696 |             }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Win32 vkd3d_get_program_name uses strncpy(program_name, name, VKD3D_PATH_MAX) without forcing NUL termination. strncpy does not NUL-terminate when the source length >= VKD3D_PATH_MAX, leaving program_name non-terminated. The Linux variant correctly does `program_name[VKD3D_PATH_MAX - 1] = 0`; the Win32 path omits it, so later string use can read past the buffer.","fix":"Add `program_name[VKD3D_PATH_MAX - 1] = 0;` after the strncpy in the Win32 implementation.","locations":[{"ref":"libs/vkd3d-common/platform.c:133-154","code":"  133 | bool vkd3d_get_program_name(char program_name[VKD3D_PATH_MAX])\n  134 | {\n  135 |     char *name;\n  136 |     char exe_path[VKD3D_PATH_MAX];\n  137 |     GetModuleFileNameA(NULL, exe_path, VKD3D_PATH_MAX);\n  138 | \n  139 |     if ((name = strrchr(exe_path, '/')))\n  140 |     {\n  141 |         ++name;\n  142 |     }\n  143 |     else if ((name = strrchr(exe_path, '\\\\')))\n  144 |     {\n  145 |         ++name;\n  146 |     }\n  147 |     else\n  148 |     {\n  149 |         name = exe_path;\n  150 |     }\n  151 | \n  152 |     strncpy(program_name, name, VKD3D_PATH_MAX);\n  153 |     return true;\n  154 | }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Win32 vkd3d_get_env_var success test `len > 0 && len <= value_size` is off-by-one versus GetEnvironmentVariableA semantics (it returns char count NOT including the NUL on success, and the required size INCLUDING the NUL when too small). The canonical test is `len < value_size`; the `<=` boundary is the wrong contract and muddies truncation detection.","fix":"Use `if (len > 0 && len < value_size)`.","locations":[{"ref":"libs/vkd3d-common/platform.c:221-236","code":"  221 | bool vkd3d_get_env_var(const char *name, char *value, size_t value_size)\n  222 | {\n  223 |     DWORD len;\n  224 |     \n  225 |     assert(value);\n  226 |     assert(value_size > 0);\n  227 | \n  228 |     len = GetEnvironmentVariableA(name, value, value_size);\n  229 |     if (len > 0 && len <= value_size)\n  230 |     {\n  231 |         return true;\n  232 |     }\n  233 | \n  234 |     value[0] = '\\0';\n  235 |     return false;\n  236 | }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"vkd3d_export_strequal_mixed compares an unsigned-short WCHAR (*a) against a signed `char` (*b). For byte values >= 0x80 the char is sign-extended to a negative int while the WCHAR stays positive, so identical non-ASCII bytes never compare equal. Only ASCII comparisons are reliable.","fix":"Compare against `(unsigned char)*b`.","locations":[{"ref":"libs/vkd3d-common/string.c:85-98","code":"   85 | bool vkd3d_export_strequal_mixed(const WCHAR *a, const char *b)\n   86 | {\n   87 |     if (!a || !b)\n   88 |         return false;\n   89 | \n   90 |     while (*a != '\\0' && *b != '\\0')\n   91 |     {\n   92 |         if (*a != *b)\n   93 |             return false;\n   94 |         a++;\n   95 |         b++;\n   96 |     }\n   97 |     return *a == *b;\n   98 | }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","description":"vkd3d_get_cached_spirv_code_from_d3d12_desc allocates and decodes `decompressed_spirv_size` bytes read from the (untrusted) cache blob, but never checks that the value is a multiple of 4. SPIR-V must be a multiple of 4 bytes; a non-multiple value silently yields a partially-uninitialized shader blob handed to Vulkan (the size is set to the full value while trailing bytes are never written). Not memory-unsafe but a correctness/robustness gap.","fix":"Reject the chunk if `decompressed_spirv_size % sizeof(uint32_t) != 0` before allocating/decoding.","locations":[{"ref":"libs/vkd3d/cache.c:726-741","code":"  726 |     duped_code = vkd3d_malloc(spirv->decompressed_spirv_size);\n  727 |     if (!duped_code)\n  728 |         return E_OUTOFMEMORY;\n  729 | \n  730 |     if (!vkd3d_decode_varint(duped_code,\n  731 |             spirv->decompressed_spirv_size / sizeof(uint32_t),\n  732 |             spirv->data, spirv->compressed_spirv_size))\n  733 |     {\n  734 |         FIXME(\"Failed to decode VARINT.\\n\");\n  735 |         vkd3d_free(duped_code);\n  736 |         return E_INVALIDARG;\n  737 |     }\n  738 | \n  739 |     spirv_code->code = duped_code;\n  740 |     spirv_code->size = spirv->decompressed_spirv_size;\n  741 | "}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In vkd3d_create_texture_srv_view the PREALLOCATE_SRV_MIP_CLAMPS loop treats mip_count as an end index: `for (i = starting_mip; i < mip_count; i++)`, but mip_count is a count, not an end index. When starting_mip > 0 this skips clamp levels and iterates the wrong range. Config-flag-gated optimization, so impact is missed prealloc rather than corruption.","fix":"Iterate `for (i = starting_mip; i < starting_mip + mip_count; i++)` (clamped to resource->desc.MipLevels).","locations":[{"ref":"libs/vkd3d/resource.c:6993-7005","code":" 6993 |             uint32_t starting_mip = key.u.texture.miplevel_idx;\n 6994 |             uint32_t mip_count = key.u.texture.miplevel_count != UINT32_MAX ?\n 6995 |                     key.u.texture.miplevel_count :\n 6996 |                     resource->desc.MipLevels - starting_mip;\n 6997 |             uint32_t i;\n 6998 | \n 6999 |             struct vkd3d_view_key preallocate_key = key;\n 7000 | \n 7001 |             for (i = starting_mip; i < mip_count; i++)\n 7002 |             {\n 7003 |                 preallocate_key.u.texture.miplevel_clamp = (float)(i);\n 7004 |                 vkd3d_view_map_create_view(&resource->view_map, device, &preallocate_key);\n 7005 |             }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"d3d12_root_signature_init_root_descriptor_tables relies on a subtle, undocumented invariant that count_srv_uav_table (counting up to 4 bindings per range) and init_srv_uav_binding (appending up to 4 bindings: aux + buffer + raw_ssbo + image) stay in lockstep. A mismatch would overflow root_signature->bindings (heap corruption).","fix":"Add `assert(context->binding_index + table->binding_count <= root_signature->binding_count)` after each table is filled to catch count/fill divergence before it corrupts the heap.","locations":[{"ref":"libs/vkd3d/state.c:418-439","code":"  418 | static void d3d12_root_signature_info_count_srv_uav_table(struct d3d12_root_signature_info *info,\n  419 |         struct d3d12_device *device, D3D12_DESCRIPTOR_RANGE_TYPE range_type)\n  420 | {\n  421 |     /* Separate image + buffer descriptors + (most likely) aux buffer descriptor.\n  422 |      * Needs to match d3d12_root_signature_init_srv_uav_binding. */\n  423 |     bool can_skip_rtas_binding = d3d12_device_use_descriptor_heap(device) && range_type == D3D12_DESCRIPTOR_RANGE_TYPE_SRV;\n  424 |     info->binding_count += 2;\n  425 | \n  426 |     /* For UAV we always need an extra binding for the UAV counter.\n  427 |      * This UAV counter is either a texel buffer or a raw VA binding.\n  428 |      * For SRV we can map to RTAS. */\n  429 |     if (!can_skip_rtas_binding)\n  430 |         info->binding_count += 1;\n  431 | \n  432 |     if (device->bindless_state.flags & VKD3D_BINDLESS_RAW_SSBO)\n  433 |         info->binding_count += 1;\n  434 | \n  435 |     if (device->bindless_state.flags & VKD3D_SSBO_OFFSET_BUFFER)\n  436 |         info->has_ssbo_offset_buffer = true;\n  437 |     if (device->bindless_state.flags & VKD3D_TYPED_OFFSET_BUFFER)\n  438 |         info->has_typed_offset_buffer = true;\n  439 | }"},{"ref":"libs/vkd3d/state.c:774-827","code":"  774 | static void d3d12_root_signature_init_srv_uav_binding(struct d3d12_root_signature *root_signature,\n  775 |         struct vkd3d_descriptor_set_context *context, D3D12_DESCRIPTOR_RANGE_TYPE range_type,\n  776 |         struct vkd3d_shader_resource_binding *binding,\n  777 |         struct vkd3d_shader_resource_binding *out_bindings_base, uint32_t *out_index)\n  778 | {\n  779 |     /* Always true if not using heap */\n  780 |     bool uses_typed_uav_counter = root_signature->device->bindless_state.heap.uav_counter_embedded_offset == 0;\n  781 |     struct vkd3d_bindless_state *bindless_state = &root_signature->device->bindless_state;\n  782 |     enum vkd3d_bindless_set_flag range_flag;\n  783 | \n  784 |     range_flag = vkd3d_bindless_set_flag_from_descriptor_range_type(range_type);\n  785 |     binding->flags = VKD3D_SHADER_BINDING_FLAG_BINDLESS | VKD3D_SHADER_BINDING_FLAG_AUX_BUFFER;\n  786 | \n  787 |     if (d3d12_device_use_embedded_mutable_descriptors(root_signature->device) &&\n  788 |             uses_typed_uav_counter && range_type == D3D12_DESCRIPTOR_RANGE_TYPE_UAV)\n  789 |     {\n  790 |         /* If we're relying on embedded mutable descriptors we have to be a bit careful with aliasing raw VAs.\n  791 |          * With application bugs in play, it's somewhat easy to end up aliasing a true texel buffer\n  792 |          * descriptor and raw VA descriptor. Avoid this scenario by pretending the AUX_BUFFER texel buffers\n  793 |          * and normal texel buffers are one and the same. This is robust against many kinds of hypothetical app bugs:\n  794 |          * - App creates RWStructuredBuffer without counter: Counter will point to base address of the RWStructuredBuffer.\n  795 |          * - App creates texel buffer: Counter will point to the texel buffer itself.\n  796 |          * - NULL resource: Implicitly handled without shader magic.\n  797 |          * - App creates RWStructuredBuffer with counter, app reads as typed buffer: Typed buffer will read from counter. */\n  798 |         if (vkd3d_bindless_state_find_binding(bindless_state, range_flag | VKD3D_BINDLESS_SET_BUFFER, &binding->binding))\n  799 |             out_bindings_base[(*out_index)++] = *binding;\n  800 |     }\n  801 |     else if (range_type == D3D12_DESCRIPTOR_RANGE_TYPE_UAV || !d3d12_device_use_descriptor_heap(root_signature->device))\n  802 |     {\n  803 |         /* Use raw VA for both RTAS and UAV counters.\n  804 |          * On heap, we use proper descriptors for RTAS, so skip this path for SRV. We'll pick up the normal buffer bindings. */\n  805 |         binding->flags |= VKD3D_SHADER_BINDING_FLAG_RAW_VA;\n  806 |         binding->binding = root_signature->raw_va_aux_buffer_binding;\n  807 |         out_bindings_base[(*out_index)++] = *binding;\n  808 |     }\n  809 | \n  810 |     if (vkd3d_bindless_state_find_binding(bindless_state, range_flag | VKD3D_BINDLESS_SET_BUFFER, &binding->binding))\n  811 |     {\n  812 |         binding->flags = VKD3D_SHADER_BINDING_FLAG_BINDLESS | VKD3D_SHADER_BINDING_FLAG_BUFFER;\n  813 |         out_bindings_base[(*out_index)++] = *binding;\n  814 |     }\n  815 | \n  816 |     if (vkd3d_bindless_state_find_binding(bindless_state, range_flag | VKD3D_BINDLESS_SET_RAW_SSBO, &binding->binding))\n  817 |     {\n  818 |         binding->flags = VKD3D_SHADER_BINDING_FLAG_BINDLESS | VKD3D_SHADER_BINDING_FLAG_BUFFER | VKD3D_SHADER_BINDING_FLAG_RAW_SSBO;\n  819 |         out_bindings_base[(*out_index)++] = *binding;\n  820 |     }\n  821 | \n  822 |     if (vkd3d_bindless_state_find_binding(bindless_state, range_flag | VKD3D_BINDLESS_SET_IMAGE, &binding->binding))\n  823 |     {\n  824 |         binding->flags = VKD3D_SHADER_BINDING_FLAG_BINDLESS | VKD3D_SHADER_BINDING_FLAG_IMAGE;\n  825 |         out_bindings_base[(*out_index)++] = *binding;\n  826 |     }\n  827 | }"},{"ref":"libs/vkd3d/state.c:1053-1063","code":" 1053 |                     d3d12_root_signature_init_srv_uav_binding(root_signature, context, range->RangeType,\n 1054 |                             &binding, table->first_binding, &table->binding_count);\n 1055 |                     break;\n 1056 |                 default:\n 1057 |                     FIXME(\"Unhandled descriptor range type %u.\\n\", range->RangeType);\n 1058 |             }\n 1059 | \n 1060 |             range_descriptor_offset = binding.descriptor_offset + binding.register_count;\n 1061 |         }\n 1062 | \n 1063 |         context->binding_index += table->binding_count;"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"vkd3d_report_pipeline_creation_feedback_results prints the per-stage compile duration using `feedback->pPipelineCreationFeedback->duration` (the GLOBAL feedback) inside the per-stage loop, instead of `feedback->pPipelineStageCreationFeedbacks[i].duration`. Every stage is reported with the global pipeline duration, making the per-stage timing log incorrect (diagnostic only).","fix":"Use feedback->pPipelineStageCreationFeedbacks[i].duration for the per-stage INFO line.","locations":[{"ref":"libs/vkd3d/state.c:3418-3432","code":" 3418 |     for (i = 0; i < feedback->pipelineStageCreationFeedbackCount; i++)\n 3419 |     {\n 3420 |         if (feedback->pPipelineStageCreationFeedbacks[i].flags &\n 3421 |                 VK_PIPELINE_CREATION_FEEDBACK_VALID_BIT_EXT)\n 3422 |         {\n 3423 |             if (feedback->pPipelineStageCreationFeedbacks[i].flags &\n 3424 |                     VK_PIPELINE_CREATION_FEEDBACK_APPLICATION_PIPELINE_CACHE_HIT_BIT_EXT)\n 3425 |             {\n 3426 |                 INFO(\"  Stage %u: Pipeline compilation reused pipeline cache.\\n\", i);\n 3427 |             }\n 3428 |             else\n 3429 |             {\n 3430 |                 INFO(\"  Stage %u: compilation took %\"PRIu64\" ns.\\n\",\n 3431 |                         i, feedback->pPipelineCreationFeedback->duration);\n 3432 |             }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"d3d12_pipeline_state_create_pipeline_variant fallback path: if vkd3d_late_compile_shader_stages succeeds and the second vkCreateGraphicsPipelines also returns VK_PIPELINE_COMPILE_REQUIRED (a positive code, not < 0), the vr<0 error block is skipped and the function falls through to the success return with a VK_NULL_HANDLE/uninitialized vk_pipeline that the caller treats as success.","fix":"Treat vr == VK_PIPELINE_COMPILE_REQUIRED after the fallback create as a hard error (set vk_pipeline = VK_NULL_HANDLE and goto err).","locations":[{"ref":"libs/vkd3d/state.c:6981-7031","code":" 6981 |     if (vr == VK_PIPELINE_COMPILE_REQUIRED)\n 6982 |     {\n 6983 |         if (FAILED(hr = vkd3d_late_compile_shader_stages(state)))\n 6984 |         {\n 6985 |             ERR(\"Late compilation of SPIR-V failed.\\n\");\n 6986 |             vk_pipeline = VK_NULL_HANDLE;\n 6987 |             goto err;\n 6988 |         }\n 6989 | \n 6990 |         flags2.flags &= ~VK_PIPELINE_CREATE_2_FAIL_ON_PIPELINE_COMPILE_REQUIRED_BIT;\n 6991 | \n 6992 |         /* Internal modules are known to be non-null now. */\n 6993 |         pipeline_desc.pStages = state->graphics.stages;\n 6994 | \n 6995 |         cookie = vkd3d_queue_timeline_trace_register_pso_compile(&device->queue_timeline_trace);\n 6996 |         vr = VK_CALL(vkCreateGraphicsPipelines(device->vk_device, vk_cache, 1, &pipeline_desc, NULL, &vk_pipeline));\n 6997 | \n 6998 |         if (vkd3d_queue_timeline_trace_cookie_is_valid(cookie))\n 6999 |         {\n 7000 |             const char *kind = vr == VK_SUCCESS ? \"FALLBACK OK\" : \"FALLBACK ERR\";\n 7001 |             vkd3d_queue_timeline_trace_complete_pso_compile(&device->queue_timeline_trace,\n 7002 |                     cookie, vkd3d_pipeline_cache_compatibility_condense(&state->pipeline_cache_compat), kind);\n 7003 |         }\n 7004 |     }\n 7005 | \n 7006 |     TRACE(\"Completed vkCreateGraphicsPipelines.\\n\");\n 7007 | \n 7008 |     if (vr < 0)\n 7009 |     {\n 7010 |         ERR(\"Failed to create Vulkan graphics pipeline, vr %d.\\n\", vr);\n 7011 |         d3d12_pipeline_state_log_graphics_state(state);\n 7012 | \n 7013 |         vk_pipeline = VK_NULL_HANDLE;\n 7014 |         goto err;\n 7015 |     }\n 7016 | \n 7017 |     if (feedback_info.pipelineStageCreationFeedbackCount)\n 7018 |         vkd3d_report_pipeline_creation_feedback_results(&feedback_info);\n 7019 | \n 7020 |     if (library_flags)\n 7021 |         graphics->library_create_flags = flags2.flags & VK_PIPELINE_CREATE_2_FAIL_ON_PIPELINE_COMPILE_REQUIRED_BIT;\n 7022 | \n 7023 | err:\n 7024 |     /* Clean up any temporary SPIR-V modules we created. */\n 7025 |     while (stages_module_dup_mask)\n 7026 |     {\n 7027 |         i = vkd3d_bitmask_iter32(&stages_module_dup_mask);\n 7028 |         VK_CALL(vkDestroyShaderModule(device->vk_device, stages[i].module, NULL));\n 7029 |     }\n 7030 | \n 7031 |     return vk_pipeline;"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"In the three deferred COLLECTION matching loops (entry points, hit groups, subobjects) the inner loop iterates `j` over num_exports to find a matching export, but the export descriptor is indexed with the OUTER loop variable: `exports[i].ExportToRename / exports[i].Name`. `i` ranges over deferred->entry_points_count / hit_groups_count / subobjects_count, unrelated to num_exports — so it compares the wrong export name (logic bug) and reads out of bounds of the app-provided exports[] array whenever i >= num_exports. App-controlled OOB read.","fix":"Use exports[j] consistently inside the inner loop, matching the non-deferred compile path which correctly uses collection->exports[j].","locations":[{"ref":"libs/vkd3d/raytracing_pipeline.c:714-723","code":"  714 |             for (j = 0; j < num_exports; j++)\n  715 |                 if (vkd3d_export_equal(exports[i].ExportToRename ? exports[i].ExportToRename : exports[i].Name, entry))\n  716 |                     break;\n  717 | \n  718 |             if (j < num_exports)\n  719 |             {\n  720 |                 export_desc = &exports[i];\n  721 |                 accept_entry_point = true;\n  722 |             }\n  723 |         }"},{"ref":"libs/vkd3d/raytracing_pipeline.c:780-794","code":"  780 |             for (j = 0; j < num_exports; j++)\n  781 |             {\n  782 |                 if (exports[i].ExportToRename)\n  783 |                     FIXME(\"Cannot rename deferred COLLECTION hit group export name.\\n\");\n  784 | \n  785 |                 if (vkd3d_export_strequal(\n  786 |                         exports[i].ExportToRename ? exports[i].ExportToRename : exports[i].Name,\n  787 |                         deferred->hit_groups[i]->HitGroupExport))\n  788 |                 {\n  789 |                     break;\n  790 |                 }\n  791 | ne_count;\n  449 |     signal_semaphore_infos[1].stageMask = VK_PIPELINE_STAGE_2_COPY_BIT;\n  450 | \n  451 |     memset(&submit_info, 0, sizeof(submit_info));\n  452 |     submit_info.sType = VK_STRUCTURE_TYPE_SUBMIT_INFO_2;\n  453 |     submit_info.commandBufferInfoCount = 1;\n  454 |     submit_info.pCommandBufferInfos = &cmd_buffer_info;\n  455 |     submit_info.signalSemaphoreInfoCount = ARRAY_SIZE(signal_semaphore_infos);\n  456 |     submit_info.pSignalSemaphoreInfos = signal_semaphore_infos;\n  457 | \n  458 |     vr = VK_CALL(vkQueueSubmit2(vk_queue, 1, &submit_info, VK_NULL_HANDLE));\n  459 |     vkd3d_queue_release(queue->vkd3d_queue);\n  460 | \n  461 |     VKD3D_DEVICE_REPORT_FAULT_AND_BREADCRUMB_IF(queue->device, vr == VK_ERROR_DEVICE_LOST);\n  462 | \n  463 |     if (vr < 0)\n  464 |     {\n  465 |         ERR(\"Failed to submit command buffer, vr %d.\\n\", vr);\n  466 |         return hresult_from_vk_result(vr);\n  467 |     }\n  468 | \n  469 |     /* Stall future submissions on other queues until the clear has finished */\n  470 |     vkd3d_add_wait_to_all_queues(queue->device, queue->vk_semaphore, queue->next_signal_value);\n  471 | \n  472 |     /* Keep next_signal always one ahead of the last signaled value */\n  473 |     queue->next_signal_value += 1;\n  474 |     queue->num_bytes_pending = 0;\n  475 |     queue->transfer_count = 0;\n  476 |     queue->command_buffer_index += 1;\n  477 |     queue->command_buffer_index %= VKD3D_MEMORY_TRANSFER_COMMAND_BUFFER_COUNT;\n  478 |     return S_OK;"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"vkd3d_bindless_state_add_binding only ERR-logs (does not return) when the first vkCreateDescriptorSetLayout fails, then continues to use the (undefined/VK_NULL_HANDLE) layout: it calls vkGetDescriptorSetLayoutBindingOffsetEXT / builds copy templates on it, unconditionally does set_count++, and returns. This is API-misuse/UB on the error path.","fix":"On vkCreateDescriptorSetLayout failure, immediately return hresult_from_vk_result(vr) before touching the invalid layout handle; do not increment set_count for a failed set.","locations":[{"ref":"libs/vkd3d/state.c:7460-7514","code":" 7460 |     if ((vr = VK_CALL(vkCreateDescriptorSetLayout(device->vk_device,\n 7461 |             &vk_set_layout_info, NULL, &set_info->vk_set_layout))) < 0)\n 7462 |         ERR(\"Failed to create descriptor set layout, vr %d.\\n\", vr);\n 7463 | \n 7464 |     /* If we're able, we should implement descriptor copies with functions we roll ourselves. */\n 7465 |     if (d3d12_device_uses_descriptor_buffers(device))\n 7466 |     {\n 7467 |         INFO(\"Device supports VK_EXT_descriptor_buffer!\\n\");\n 7468 |         VK_CALL(vkGetDescriptorSetLayoutBindingOffsetEXT(device->vk_device, set_info->vk_set_layout,\n 7469 |                 set_info->binding_index, &desc_offset));\n 7470 |         set_info->host_mapping_offset = desc_offset;\n 7471 |         set_info->host_mapping_descriptor_size = vkd3d_get_descriptor_size_for_binding(device,\n 7472 |                 &vk_set_layout_info, set_info->binding_index);\n 7473 | \n 7474 |         set_info->host_copy_template =\n 7475 |                 vkd3d_bindless_find_copy_template(set_info->host_mapping_descriptor_size);\n 7476 |         set_info->host_copy_template_single =\n 7477 |                 vkd3d_bindless_find_copy_template_single(set_info->host_mapping_descriptor_size);\n 7478 | \n 7479 |         if (!set_info->host_copy_template || !set_info->host_copy_template_single)\n 7480 |         {\n 7481 |             FIXME(\"Couldn't find suitable host copy template.\\n\");\n 7482 |             set_info->host_copy_template = NULL;\n 7483 |             set_info->host_copy_template_single = NULL;\n 7484 |         }\n 7485 |     }\n 7486 |     else\n 7487 |     {\n 7488 |         set_info->host_mapping_offset = 0;\n 7489 |         set_info->host_mapping_descriptor_size = 0;\n 7490 |         set_info->host_copy_template = NULL;\n 7491 |         set_info->host_copy_template_single = NULL;\n 7492 |     }\n 7493 | \n 7494 |     /* If we have descriptor buffers, we don't need host descriptor set layouts at all. We'll just malloc manually. */\n 7495 |     if (!d3d12_device_uses_descriptor_buffers(device))\n 7496 |     {\n 7497 |         vk_binding->descriptorCount = d3d12_max_host_descriptor_count_from_heap_type(device, set_info->heap_type);\n 7498 | \n 7499 |         if (device->bindless_state.flags & VKD3D_BINDLESS_MUTABLE_TYPE)\n 7500 |         {\n 7501 |             /* If we have mutable descriptor extension, we will allocate these descriptors with\n 7502 |              * HOST_BIT and not UPDATE_AFTER_BIND, since that is enough to get threading guarantees. */\n 7503 |             vk_binding_flags[set_info->binding_index] = VK_DESCRIPTOR_BINDING_VARIABLE_DESCRIPTOR_COUNT_BIT;\n 7504 |             vk_set_layout_info.flags = VK_DESCRIPTOR_SET_LAYOUT_CREATE_HOST_ONLY_POOL_BIT_EXT;\n 7505 |         }\n 7506 | \n 7507 |         if ((vr = VK_CALL(vkCreateDescriptorSetLayout(device->vk_device,\n 7508 |                 &vk_set_layout_info, NULL, &set_info->vk_host_set_layout))) < 0)\n 7509 |             ERR(\"Failed to create descriptor set layout, vr %d.\\n\", vr);\n 7510 |     }\n 7511 | \n 7512 |     bindless_state->legacy.set_count++;\n 7513 | \n 7514 |     return hresult_from_vk_result(vr);"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"d3d12_device_report_fault calls vkd3d_calloc/vkd3d_malloc for addressInfos/vendorBinary/vendorInfo without NULL checks, then passes the pointers to vkGetDeviceFaultInfoEXT which writes into them. On a large count with allocation failure the driver writes through NULL. This is the device-lost diagnostic path, so it can turn a recoverable DEVICE_LOST report into a hard crash.","fix":"Check each allocation for NULL (when its count/size is non-zero) and skip the corresponding output array, or abort the fault dump gracefully.","locations":[{"ref":"libs/vkd3d/device.c:11394-11398","code":"11394 |     fault_info.pAddressInfos = vkd3d_calloc(fault_counts.addressInfoCount, sizeof(*fault_info.pAddressInfos));\n11395 |     fault_info.pVendorBinaryData = vkd3d_malloc(fault_counts.vendorBinarySize);\n11396 |     fault_info.pVendorInfos = vkd3d_calloc(fault_counts.vendorInfoCount, sizeof(*fault_info.pVendorInfos));\n11397 | \n11398 |     vr = VK_CALL(vkGetDeviceFaultInfoEXT(device->vk_device, &fault_counts, &fault_info));"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"GetVulkanQueueInfoEx (and the DXVK-interop GetVulkanQueueInfo) write through *vk_queue / *vk_queue_index / *vk_queue_flags / *vk_queue_family and dereference `queue` without any NULL validation, unlike the adjacent GetVulkanHandles which validates its out-params. A caller passing NULL crashes inside the driver.","fix":"Validate `queue` and the output pointers for NULL and return E_INVALIDARG, consistent with GetVulkanHandles.","locations":[{"ref":"libs/vkd3d/device_vkd3d_ext.c:413-426","code":"  413 | static HRESULT STDMETHODCALLTYPE d3d12_device_vkd3d_ext_GetVulkanQueueInfoEx(d3d12_device_vkd3d_ext_iface *iface,\n  414 |        ID3D12CommandQueue *queue, VkQueue *vk_queue, UINT32 *vk_queue_index, UINT32 *vk_queue_flags, UINT32 *vk_queue_family)\n  415 | {\n  416 |     TRACE(\"iface %p, queue %p, vk_queue %p, vk_queue_index %p, vk_queue_flags %p vk_queue_family %p.\\n\",\n  417 |             iface, queue, vk_queue, vk_queue_index, vk_queue_flags, vk_queue_family);\n  418 | \n  419 |     *vk_queue = vkd3d_lock_vk_queue(queue);\n  420 |     vkd3d_unlock_vk_queue(queue);\n  421 | \n  422 |     *vk_queue_index = vkd3d_get_vk_queue_index(queue);\n  423 |     *vk_queue_flags = vkd3d_get_vk_queue_flags(queue);\n  424 |     *vk_queue_family = vkd3d_get_vk_queue_family_index(queue);\n  425 |     return S_OK;\n  426 | }"},{"ref":"libs/vkd3d/device_vkd3d_ext.c:863-873","code":"  863 | static HRESULT STDMETHODCALLTYPE d3d12_dxvk_interop_device_GetVulkanQueueInfo(d3d12_dxvk_interop_device_iface *iface,\n  864 |         ID3D12CommandQueue *queue, VkQueue *vk_queue, UINT32 *vk_queue_family)\n  865 | {\n  866 |     TRACE(\"iface %p, queue %p, vk_queue %p, vk_queue_family %p.\\n\", iface, queue, vk_queue, vk_queue_family);\n  867 | \n  868 |     *vk_queue = vkd3d_lock_vk_queue(queue);\n  869 |     vkd3d_unlock_vk_queue(queue);\n  870 | \n  871 |     *vk_queue_family = vkd3d_get_vk_queue_family_index(queue);\n  872 |     return S_OK;\n  873 | }"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"GetCudaMergedTextureSamplerObject leaves image_index/sampler_index at their initial 0 when params->texDesc / smpDesc are 0 (lookup skipped), so the `image_index == UINT32_MAX` guard never fires and a stale index 0 is passed to vkGetDeviceCombinedImageSamplerIndexNVX, silently using an unspecified descriptor.","fix":"Track whether each lookup actually ran and reject (E_INVALIDARG) when a required descriptor handle was not provided, rather than defaulting to index 0.","locations":[{"ref":"libs/vkd3d/device_vkd3d_ext.c:462-498","code":"  462 |     uint32_t image_index = 0, sampler_index = 0;\n  463 | \n  464 |     TRACE(\"iface %p, tex_desc %zu, smp_desc %zu.\\n\",\n  465 |             iface, (size_t)params->texDesc, (size_t)params->smpDesc);\n  466 | \n  467 |     if (!device->vk_info.supports_cubin_64bit)\n  468 |         return E_NOTIMPL;\n  469 | \n  470 |     if (params->pNext)\n  471 |     {\n  472 |         FIXME(\"pNext not supported.\\n\");\n  473 |         params->pNext = NULL;\n  474 |     }\n  475 | \n  476 |     if (d3d12_device_use_descriptor_heap(device))\n  477 |     {\n  478 |         if (params->texDesc)\n  479 |         {\n  480 |             image_index = d3d12_device_find pipeline creation failure the ERR logs the local `hr`, which is only assigned inside conditional branches (identifier path / fallback path). If the first vkCreateComputePipelines fails before either branch runs, `hr` was never written and the printed value is garbage/UB. The function correctly returns hresult_from_vk_result(vr); only the diagnostic is wrong.","fix":"Log `vr` (the real result) instead of `(int)hr`.","locations":[{"ref":"libs/vkd3d/state.c:3605-3611","code":" 3605 |     if (vr < 0)\n 3606 |     {\n 3607 |         ERR(\"Failed to create Vulkan compute pipeline, hr %#x.\\n\", (int)hr);\n 3608 |         ERR(\"  Root signature: %\"PRIx64\"\\n\", state->root_signature->pso_compatibility_hash);\n 3609 |         ERR(\"  Shader: %\"PRIx64\".\\n\", state->compute.code.meta.hash);\n 3610 |         return hresult_from_vk_result(vr);\n 3611 |     }"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"vkd3d_va_map_query_descriptor_heap_offset reads the mappings base pointer (resource_mappings / sampler_mappings) BEFORE acquiring va_map->mutex, then dereferences it after taking the lock. A concurrent vkd3d_va_map_insert_descriptor_heap holds the same mutex and may vkd3d_array_reserve -> realloc the array, freeing the old backing store. The reader then indexes a stale (freed) pointer — use-after-free / OOB read. The count is read under the lock but the base pointer is not, defeating the locking.","fix":"Read the `mappings` base pointer inside the critical section (after pthread_mutex_lock), together with `count`.","locations":[{"ref":"libs/vkd3d/va_map.c:453-479","code":"  453 | size_t vkd3d_va_map_query_descriptor_heap_offset(struct vkd3d_va_map *va_map,\n  454 |         uintptr_t va, D3D12_DESCRIPTOR_HEAP_TYPE type)\n  455 | {\n  456 |     const struct vkd3d_descriptor_heap_mapping *mappings = type == D3D12_DESCRIPTOR_HEAP_TYPE_CBV_SRV_UAV\n  457 |             ? va_map->resource_mappings : va_map->sampler_mappings;\n  458 |     size_t ret = SIZE_MAX;\n  459 |     size_t count;\n  460 |     size_t i;\n  461 | \n  462 |     pthread_mutex_lock(&va_map->mutex);\n  463 | \n  464 |     count = type == D3D12_DESCRIPTOR_HEAP_TYPE_CBV_SRV_UAV ?\n  465 |             va_map->resource_mappings_count : va_map->sampler_mappings_count;\n  466 | \n  467 |     /* We don't expect there to be that many shader visible descriptor heaps live on the device,\n  468 |      * so a simple linear search is perfectly fine. */\n  469 |     for (i = 0; i < count; i++)\n  470 |     {\n  471 |         if (va >= mappings[i].va && va < mappings[i].va + mappings[i].range)\n  472 |         {\n  473 |             ret = va - mappings[i].va;\n  474 |             break;\n  475 |         }\n  476 |     }\n  477 | \n  478 |     pthread_mutex_unlock(&va_map->mutex);\n  479 |     return ret;"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"vkd3d_va_map_insert/_remove write each block entry's {va, resource} as two independent relaxed atomic stores, and vkd3d_va_map_deref_mutable reads them with two separate relaxed loads. A reader concurrent with insert/remove can observe a torn pair — a non-zero va with a stale/NULL resource, or a fresh resource with an old va — yielding a wrong or NULL resource for a valid VA. The relaxed ordering provides no cross-field atomicity.","fix":"Update {va,resource} as a single atomic unit (double-width atomic or seqlock), or use release/acquire and re-validate va after loading resource (retry on change).","locations":[{"ref":"libs/vkd3d/va_map.c:142-152","code":"  142 |             if (block_va < min_va)\n  143 |             {\n  144 |                 vkd3d_atomic_uint64_store_explicit(&block->r.va, min_va, vkd3d_memory_order_relaxed);\n  145 |                 vkd3d_atomic_ptr_store_explicit(&block->r.resource, resource, vkd3d_memory_order_relaxed);\n  146 |             }\n  147 |             else\n  148 |             {\n  149 |                 vkd3d_atomic_uint64_store_explicit(&block->l.va, max_va, vkd3d_memory_order_relaxed);\n  150 |                 vkd3d_atomic_ptr_store_explicit(&block->l.resource, resource, vkd3d_memory_order_relaxed);\n  151 |             }\n  152 | "},{"ref":"libs/vkd3d/va_map.c:192-201","code":"  192 |             if (vkd3d_atomic_ptr_load_explicit(&block->l.resource, vkd3d_memory_order_relaxed) == resource)\n  193 |             {\n  194 |                 vkd3d_atomic_uint64_store_explicit(&block->l.va, 0, vkd3d_memory_order_relaxed);\n  195 |                 vkd3d_atomic_ptr_store_explicit(&block->l.resource, NULL, vkd3d_memory_order_relaxed);\n  196 |             }\n  197 |             else if (vkd3d_atomic_ptr_load_explicit(&block->r.resource, vkd3d_memory_order_relaxed) == resource)\n  198 |             {\n  199 |                 vkd3d_atomic_uint64_store_explicit(&block->r.va, 0, vkd3d_memory_order_relaxed);\n  200 |                 vkd3d_atomic_ptr_store_explicit(&block->r.resource, NULL, vkd3d_memory_order_relaxed);\n  201 |             }"},{"ref":"libs/vkd3d/va_map.c:222-243","code":"  222 | static struct vkd3d_unique_resource *vkd3d_va_map_deref_mutable(struct vkd3d_va_map *va_map, VkDeviceAddress va)\n  223 | {\n  224 |     struct vkd3d_va_block *block = vkd3d_va_map_find_block(va_map, va);\n  225 |     struct vkd3d_unique_resource *resource = NULL;\n  226 | \n  227 |     if (block)\n  228 |     {\n  229 |         if (va < vkd3d_atomic_uint64_load_explicit(&block->l.va, vkd3d_memory_order_relaxed))\n  230 |             resource = vkd3d_atomic_ptr_load_explicit(&block->l.resource, vkd3d_memory_order_relaxed);\n  231 |         else if (va >= vkd3d_atomic_uint64_load_explicit(&block->r.va, vkd3d_memory_order_relaxed))\n  232 |             resource = vkd3d_atomic_ptr_load_explicit(&block->r.resource, vkd3d_memory_order_relaxed);\n  233 |     }\n  234 | \n  235 |     if (!resource)\n  236 |     {\n  237 |         pthread_mutex_lock(&va_map->mutex);\n  238 |         resource = vkd3d_va_map_find_small_entry(va_map, va, NULL);\n  239 |         pthread_mutex_unlock(&va_map->mutex);\n  240 |     }\n  241 | \n  242 |     return resource;\n  243 | }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"vkd3d_memory_transfer_queue_wait_allocation reads allocation->clear_semaphore_value without synchronization, while vkd3d_memory_transfer_queue_fill_allocation writes it under queue->mutex. For a chunk allocation whose clear value is updated concurrently this can read a stale value and, combined with the later wait_value adjustment, under-wait and let the GPU still be clearing freed memory.","fix":"Read allocation->clear_semaphore_value under queue->mutex (or via an atomic paired with the store in fill_allocation) before deciding whether to wait.","locations":[{"ref":"libs/vkd3d/memory.c:538-557","code":"  538 |     else if (allocation->resource.vk_buffer)\n  539 |     {\n  540 |         pthread_mutex_lock(&queue->mutex);\n  541 |         allocation->clear_semaphore_value = queue->next_signal_value;\n  542 | \n  543 |         if (allocation->chunk)\n  544 |             allocation->chunk->allocation.clear_semaphore_value = queue->next_signal_value;\n  545 | \n  546 |         memset(&transfer, 0, sizeof(transfer));\n  547 |         transfer.op = value != 0 ?\n  548 |                 VKD3D_MEMORY_TRANSFER_OP_DEBUG_FILL_ALLOCATION :\n  549 |                 VKD3D_MEMORY_TRANSFER_OP_CLEAR_ALLOCATION;\n  550 |         transfer.vk_buffer = allocation->resource.vk_buffer;\n  551 |         transfer.vk_buffer_offset = allocation->offset;\n  552 |         transfer.vk_buffer_size = allocation->resource.size;\n  553 |         transfer.fill_value = value * 0x01010101u;\n  554 | \n  555 |         vkd3d_memory_transfer_queue_execute_transfer_locked(queue, &transfer);\n  556 |         pthread_mutex_unlock(&queue->mutex);\n  557 |     }"},{"ref":"libs/vkd3d/memory.c:591-640","code":"  591 | static void vkd3d_memory_transfer_queue_wait_allocation(struct vkd3d_memory_transfer_queue *queue,\n  592 |         const struct vkd3d_memory_allocation *allocation)\n  593 | {\n  594 |     uint64_t wait_value = allocation->clear_semaphore_value;\n  595 |     size_t i;\n  596 | \n  597 |     /* If the clear semaphore has been signaled to the expected value,\n  598 |      * the GPU is already done clearing the allocation, and it cannot\n  599 |      * be in the clear queue either, so there is nothing to do. */\n  600 |     if (vkd3d_memory_transfer_queue_wait_semaphore(queue, wait_value, 0))\n  601 |         return;\n  602 | \n  603 |     /* If the allocation is still in the queue, the GPU has not started\n  604 |      * using it yet so we can remove it from the queue and exit. */\n  605 |     pthread_mutex_lock(&queue->mutex);\n  606 | \n  607 |     for (i = 0; i < queue->transfer_count; i++)\n  608 |     {\n  609 |         if ((queue->transfers[i].op == VKD3D_MEMORY_TRANSFER_OP_CLEAR_ALLOCATION ||\n  610 |                 queue->transfers[i].op == VKD3D_MEMORY_TRANSFER_OP_DEBUG_FILL_ALLOCATION) &&\n  611 |                 queue->transfers[i].vk_buffer == allocation->resource.vk_buffer &&\n  612 |                 queue->transfers[i].vk_buffer_offset == allocation->offset &&\n  613 |                 queue->transfers[i].vk_buffer_size == allocation->resource.size)\n  614 |         {\n  615 |             queue->transfers[i] = queue->transfers[--queue->transfer_count];\n  616 |             queue->num_bytes_pending -= allocation->resource.size;\n  617 |             pthread_mutex_unlock(&queue->mutex);\n  618 |             return;\n  619 |         }\n  620 |     }\n  621 | \n  622 |     /* If this is a chunk and a suballocation from it had been immediately\n  623 |      * freed, it is possible that the suballocation got removed from the\n  624 |      * clear queue so that the chunk's wait value never gets signaled. Wait\n  625 |      * for the last signaled value in that case. */\n  626 |     if (wait_value == queue->next_signal_value)\n  627 |         wait_value = queue->next_signal_value - 1;\n  628 | \n  629 |     pthread_mutex_unlock(&queue->mutex);\n  630 | \n  631 |     /* If this allocation was suballocated from a chunk, we will wait\n  632 |      * on the semaphore when the parent chunk itself gets destroyed. */\n  633 |     if (allocation->chunk)\n  634 |         return;\n  635 | \n  636 |     /* Otherwise, we actually have to wait for the GPU. */\n  637 |     WARN(\"Waiting for GPU to clear allocation %p.\\n\", allocation);\n  638 | \n  639 |     vkd3d_memory_transfer_queue_wait_semaphore(queue, wait_value, UINT64_MAX);\n  640 | }"}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"low","description":"vkd3d_breadcrumb_tracer_allocate_command_list appends to allocator->breadcrumb_context_indices (vkd3d_array_reserve + write) outside tracer->lock and without any allocator-side lock; tracer->lock only protects trace_contexts. Concurrent breadcrumb-context allocation for command lists from the same allocator races. (Command allocators are generally single-thread per D3D12 rules, limiting impact.)","fix":"Document/enforce exclusive caller access to the allocator, or protect the allocator array with an appropriate lock.","locations":[{"ref":"libs/vkd3d/breadcrumbs.c:283-286","code":"  283 |     vkd3d_array_reserve((void**)&allocator->breadcrumb_context_indices, &allocator->breadcrumb_context_index_size,\n  284 |             allocator->breadcrumb_context_index_count + 1,\n  285 |             sizeof(*allocator->breadcrumb_context_indices));\n  286 |     allocator->breadcrumb_context_indices[allocator->breadcrumb_context_index_count++] = index;"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"The Win32 file-mapping path tests CreateFileMappingA's result with `== INVALID_HANDLE_VALUE`, but that API returns NULL on failure (not INVALID_HANDLE_VALUE). On failure the NULL handle passes the check, execution falls through to MapViewOfFile(NULL, ...) and then CloseHandle(NULL); the real error is swallowed.","fix":"Test `if (!file_mapping) goto out;` and only CloseHandle(file_mapping) when non-NULL.","locations":[{"ref":"libs/vkd3d-common/file_utils.c:145-151","code":"  145 |     file_mapping = CreateFileMappingA(handle, NULL, PAGE_READONLY, 0, 0, NULL);\n  146 |     if (file_mapping == INVALID_HANDLE_VALUE)\n  147 |         goto out;\n  148 | \n  149 |     file->mapped = MapViewOfFile(file_mapping, FILE_MAP_READ, 0, 0, file->mapped_size);\n  150 |     CloseHandle(file_mapping);\n  151 |     file_mapping = INVALID_HANDLE_VALUE;"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"vkd3d_init_profiling mmaps the profiling region but checks the result with `if (!mapped_blocks)`. mmap returns MAP_FAILED ((void*)-1) on failure, never NULL, so on a real failure the sentinel passes the NULL check: mapped_blocks is left as -1, the fd is leaked, vkd3d_uses_profiling() returns true, and a later vkd3d_profiling_notify_work dereferences (void*)-1 -> crash. file_utils.c correctly checks against MAP_FAILED.","fix":"Check `if (mapped_blocks == MAP_FAILED) { mapped_blocks = NULL; close(profiling_fd); return; }`.","locations":[{"ref":"libs/vkd3d-common/profiling.c:108-118","code":"  108 |         mapped_blocks = mmap(NULL, VKD3D_MAX_PROFILING_REGIONS * sizeof(*mapped_blocks),\n  109 |                 PROT_READ | PROT_WRITE, MAP_SHARED, profiling_fd, 0);\n  110 |         if (!mapped_blocks)\n  111 |         {\n  112 |             ERR(\"Failed to map block.\\n\");\n  113 |             close(profiling_fd);\n  114 |             return;\n  115 |         }\n  116 |         memset(mapped_blocks, 0, VKD3D_MAX_PROFILING_REGIONS * sizeof(*mapped_blocks));\n  117 |         close(profiling_fd);\n  118 |     }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Redundant duplicated inline comment: the 3-byte UTF-8 branch in vkd3d_utf8_append repeats the \"0x800-0xffff: 3 bytes\" comment twice (on the if line and the line above).","fix":"Remove the duplicated trailing comment.","locations":[{"ref":"libs/vkd3d-common/utf8.c:64-65","code":"   64 |     /* 0x800-0xffff: 3 bytes */\n   65 |     if (c < 0x10000)  /* 0x800-0xffff: 3 bytes */"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In vkd3d_instance_deduce_config_flags_from_environment the INFO \"shader_cache is used, global_pipeline_cache is enforced.\" is printed unconditionally inside the `if (!APP_CACHE_ONLY)` branch even when VKD3D_SHADER_CACHE_PATH is unset (the default), wrongly stating the shader cache \"is used\". The adjacent comment also does not match the branch.","fix":"Reword to reflect that global pipeline cache is enabled unless app-cache-only is requested, and only log when meaningful.","locations":[{"ref":"libs/vkd3d/device.c:1177-1189","code":" 1177 |     vkd3d_get_env_var(\"VKD3D_SHADER_CACHE_PATH\", env, sizeof(env));\n 1178 |     if (strcmp(env, \"0\") == 0)\n 1179 |     {\n 1180 |         INFO(\"Shader cache is explicitly disabled, relying solely on application caches.\\n\");\n 1181 |         vkd3d_config_flag_global_add(VKD3D_CONFIG_FLAG(PIPELINE_LIBRARY_APP_CACHE_ONLY));\n 1182 |     }\n 1183 | \n 1184 |     /* If we're using a global shader cache, it's meaningless to use PSO caches. */\n 1185 |     if (!VKD3D_CONFIG_FLAG_IS_SET(PIPELINE_LIBRARY_APP_CACHE_ONLY))\n 1186 |     {\n 1187 |         INFO(\"shader_cache is used, global_pipeline_cache is enforced.\\n\");\n 1188 |         vkd3d_config_flag_global_add(VKD3D_CONFIG_FLAG(GLOBAL_PIPELINE_CACHE));\n 1189 |     }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"A duplicated \"Special path when copying stencil -> color.\" comment appears once just before the format if-chain and again inside the actual VK_FORMAT_R8_UINT branch; the outer copy is misplaced/redundant.","fix":"Remove the redundant outer comment, keeping only the one inside the R8_UINT branch.","locations":[{"ref":"libs/vkd3d/meta.c:812-816","code":"  812 |     /* Special path when copying stencil -> color. */\n  813 |     if (key->format->vk_format == VK_FORMAT_R8_UINT)\n  814 |     {\n  815 |         /* Special path when copying stencil -> color. */\n  816 |         module_info = &meta_copy_image_ops->vk_fs_uint_module;"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The root-signature deserializer comment calls its QueryInterface \"broken\" for returning E_NOINTERFACE on IUnknown, but this intentionally matches native D3D12 behavior (the deserializer deliberately does not expose IUnknown). \"Broken\" misleads future maintainers.","fix":"Reword to state this intentionally matches native D3D12 behavior.","locations":[{"ref":"libs/vkd3d/vkd3d_main.c:97-99","code":"   97 |     /* QueryInterface() implementation is broken, E_NOINTERFACE is returned for\n   98 |      * IUnknown.\n   99 |      */"},{"ref":"libs/vkd3d/vkd3d_main.c:224-226","code":"  224 |     /* QueryInterface() implementation is broken, E_NOINTERFACE is returned for\n  225 |      * IUnknown.\n  226 |      */"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"negligible","description":"d3d12_device_caps_init_feature_options1 unconditionally emits FIXME(\"TotalLaneCount ... may be inaccurate.\") on every device creation, even on the AMD/NV paths where the value is computed from real properties — log noise on the device-init path; the FIXME is only meaningful for the fallback else branch.","fix":"Move the FIXME into the fallback else branch only, or downgrade to TRACE.","locations":[{"ref":"libs/vkd3d/device.c:9742-9760","code":" 9742 |         options1->TotalLaneCount = compute_units * 64;\n 9743 |     }\n 9744 |     else if (device->vk_info.NV_shader_sm_builtins)\n 9745 |     {\n 9746 |         /* Approximation, since we cannot query the number of lanes\n 9747 |          * per SM. Appears to be correct on Pascal and Turing. */\n 9748 |         const VkPhysicalDeviceShaderSMBuiltinsPropertiesNV *nv = &device->device_info.shader_sm_builtins_properties;\n 9749 |         options1->TotalLaneCount = nv->shaderSMCount * nv->shaderWarpsPerSM * 2;\n 9750 |     }\n 9751 |     else\n 9752 |     {\n 9753 |         options1->TotalLaneCount = 32 * device->device_info.vulkan_1_1_properties.subgroupSize;\n 9754 |         WARN(\"No device info available for TotalLaneCount = %u.\\n\", options1->TotalLaneCount);\n 9755 |     }\n 9756 | \n 9757 |     options1->ExpandedComputeResourceStates = TRUE;\n 9758 |     options1->Int64ShaderOps = device->device_info.features2.features.shaderInt64;\n 9759 | \n 9760 |     FIXME(\"TotalLaneCount = %u, may be inaccurate.\\n\", options1->TotalLaneCount);"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"negligible","description":"vkd3d_view_map_create_view2 emits an O(n)-style WARN (\"Intense view map pressure\") every time used_count hits a multiple of 1024, evaluated under the write spinlock — avoidable contention on a hot descriptor-creation path when view maps grow large.","fix":"Capture the count and log after releasing the spinlock.","locations":[{"ref":"libs/vkd3d/resource.c:1613-1624","code":" 1613 |     {\n 1614 |         /* If we start emitting too many typed SRVs, we will eventually crash on NV, since\n 1615 |          * VkBufferView objects appear to consume GPU resources. */\n 1616 |         if ((view_map->map.used_count % 1024) == 0)\n 1617 |         {\n 1618 |             WARN(\"Intense view map pressure! Got %u views in hash map %p. This may lead to out-of-memory errors in the extreme case.\\n\",\n 1619 |                     view_map->map.used_count, &view_map->map);\n 1620 |         }\n 1621 | \n 1622 | const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
