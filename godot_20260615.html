<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

ar *renderer = (const char *)glGetString(GL_RENDERER);\n  211 | \n  212 | \t\t\tunsigned int vendor_len = strlen(vendor) + 1;\n  213 | \t\t\tunsigned int renderer_len = strlen(renderer) + 1;","lines":5}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"The get_local_port() method dereferences _sock without checking if it is valid/null first. While the constructor initializes _sock with NetSocket::create(), this could theoretically return null. Additionally, other methods like join_multicast_group check for null before dereferencing _sock.","fix":"Add null check: `ERR_FAIL_COND_V(_sock.is_null(), 0);` before dereferencing _sock.","locations":[{"ref":"core/io/packet_peer_udp.cpp:352","code":"  352 | \t_sock->get_socket_address(&addr);","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In EditorProperty::get_edited_property_display_value() at line 823, code calls Object::cast_to<Control>(root->get_node_or_null(np)) without checking if root is null. If EditorNode::get_singleton()->get_edited_scene() returns nullptr, root will be null and calling get_node_or_null on null pointer is undefined.","fix":"Add null check: Node *root = EditorNode::get_singleton()->get_edited_scene(); if (!root) return get_edited_property_value(); before accessing root->get_node_or_null()","locations":[{"ref":"editor/inspector/editor_inspector.cpp:821-823","code":"  821 | \t\t\tNode *root = EditorNode::get_singleton()->get_edited_scene();\n  822 | \t\t\tNodePath np = multi->get_node(0);\n  823 | \t\t\tcontrol = Object::cast_to<Control>(root->get_node_or_null(np));","lines":3}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"critical","easy":true,"description":"In func_PackedByteArray_has_encoded_var, func_PackedByteArray_decode_var, and func_PackedByteArray_decode_var_size: The bounds check only verifies p_offset >= 0, but does NOT verify that p_offset <= size. When p_offset > size, the pointer arithmetic r + p_offset points beyond the allocated array, and the subtraction size - p_offset becomes negative. This causes buffer overflow when decode_variant() accesses memory via the invalid pointer.","fix":"Add bounds check: ERR_FAIL_COND_V(p_offset < 0 || p_offset > int64_t(size), ...) before calling decode_variant to ensure p_offset is within valid range [0, size].","locations":[{"ref":"core/variant/variant_call.cpp:930","code":"  930 | \t\tError err = decode_variant(ret, r + p_offset, size - p_offset, nullptr, p_allow_objects);","lines":1},{"ref":"core/variant/variant_call.cpp:939","code":"  939 | \t\tError err = decode_variant(ret, r + p_offset, size - p_offset, nullptr, p_allow_objects);","lines":1},{"ref":"core/variant/variant_call.cpp:952","code":"  952 | \t\tError err = decode_variant(ret, r + p_offset, size - p_offset, &r_size, p_allow_objects);","lines":1}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"critical","easy":true,"description":"Potential null pointer dereference in render_draw(). At line 1196, render.encoder.get() is called and assigned to enc, but enc is never null-checked before being dereferenced at line 1197 with enc->drawPrimitives(). Although _render_set_dirty_state() is called at line 1187, this function may not guarantee that render.encoder is non-null. If the encoder is null, the dereference will crash.","fix":"Add null check after line 1196: if (enc == nullptr) { ERR_FAIL_MSG(\"Render encoder is null\"); } before calling enc->drawPrimitives().","locations":[{"ref":"drivers/metal/metal3_objects.cpp:239-240","code":"  239 | \t\t\trender.encoder = NS::RetainPtr(command_buffer()->renderCommandEncoder(render.desc.get()));\n  240 | \t\t\t_encode_barrier(render.encoder.get());","lines":2},{"ref":"drivers/metal/metal3_objects.cpp:1169-1170","code":" 1169 | \t\trender.encoder = NS::RetainPtr(command_buffer()->renderCommandEncoder(desc.get()));\n 1170 | \t\t_encode (), then j - sd->start can exceed sd->text.length(), causing a buffer over-read.","fix":"Clamp r_end as suggested in the previous fix, or add explicit bounds check in the loop before accessing sd->text[j - sd->start]: `if (j - sd->start >= sd->text.length()) break;`","locations":[{"ref":"modules/text_server_adv/text_server_adv.cpp:6566-6566","code":" 6566 | \t\t\t\t\tchar32_t c = sd->text[j - sd->start];","lines":1}]},{"id":"MEM_21","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"Potential memory leak in tvg_svg_in_ot.cpp. In tvg_svg_in_ot_preset_slot(), when picture->load() fails at line 207 or subsequent operations fail, tvg::Paint::rel(picture) is called to release the picture, but the function returns with ERR_FAIL_V_MSG without cleaning up state->glyph_map entry that may have been partially initialized. More importantly, if picture allocation via tvg::Picture::gen() fails (returns nullptr), the code proceeds without null-checking.","fix":"After tvg::Picture::gen() on line 204 and 313, check if picture is nullptr before calling methods on it. If picture allocation fails, ensure the gl_state is not marked as ready.","locations":[{"ref":"modules/text_server_adv/thorvg_svg_in_ot.cpp:336-339","code":"  336 | \tres = sw_canvas->add(picture);\n  337 | \tif (res != tvg::Result::Success) {\n  338 | \t\tERR_FAIL_V_MSG(FT_Err_Invalid_Outline, \"Failed to set SVG canvas source.\");\n  339 | \t}","lines":4}]},{"id":"MEM_22","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In GodotJavaWrapper::set_window_color(), a jstring is created via NewStringUTF() but never released with DeleteLocalRef(). This causes a JNI local reference leak.","fix":"Add 'env->DeleteLocalRef(jStrColor);' after line 612, before the closing brace of the if statement.","locations":[{"ref":"platform/android/java_godot_wrapper.cpp:606-614","code":"  606 | void GodotJavaWrapper::set_window_color(const Color &p_color) {\n  607 | \tif (_set_window_color) {\n  608 | \t\tJNIEnv *env = get_jni_env();\n  609 | \t\tERR_FAIL_NULL(env);\n  610 | \t\tString color = \"#\" + p_color.to_html(false);\n  611 | \t\tjstring jStrColor = env->NewStringUTF(color.utf8().get_data());\n  612 | \t\tenv->CallVoidMethod(godot_native_bridge, _set_window_color, jStrColor);\n  613 | \t}\n  614 | }","lines":9}]},{"id":"MEM_23","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In GodotJavaWrapper::on_editor_workspace_selected(), a jstring is created via NewStringUTF() but never released with DeleteLocalRef(). This causes a JNI local reference leak.","fix":"Add 'env->DeleteLocalRef(j_workspace);' after line 622, before the closing brace of the if statement.","locations":[{"ref":"platform/android/java_godot_wrapper.cpp:616-624","code":"  616 | void GodotJavaWrapper::on_editor_workspace_selected(const String &p_workspace) {\n  617 | \tif (_on_editor_workspace_selected) {\n  618 | \t\tJNIEnv *env = get_jni_env();\n  619 | \t\tERR_FAIL_NULL(env);\n  620 | \n  621 | \t\tjstring j_workspace = env->NewStringUTF(p_workspace.utf8().get_data());\n  622 | \t\tenv->CallVoidMethod(godot_native_bridge, _on_editor_workspace_selected, j_workspace);\n  623 | \t}\n  624 | }","lines":9}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","easy":true,"description":"Division by zero vulnerability in _texture_rect_update_area(). At lines 132 and 137, the code divides by texture->get_width() and texture->get_height() without checking if they are zero first. If a Texture3D has zero width or height, this will cause a division by zero, crashing the editor. Although there are post-division checks that set the results to minimum 1, the division itself is unsafe.","fix":"Add guards before the divisions: if (texture->get_height() == 0 || texture->get_width() == 0) { return; } at the start of _texture_rect_update_area(), or add ERR_FAIL_COND checks.","locations":[{"ref":"editor/scene/texture/texture_3d_editor_plugin.cpp:132","code":"  132 | \tint tex_width = texture->get_width() * size.height / texture->get_height();","lines":1},{"ref":"editor/scene/texture/texture_3d_editor_plugin.cpp:137","code":"  137 | \t\ttex_height = texture->get_height() * tex_width / texture->get_width();","lines":1}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","easy":true,"description":"Division by zero: Line 434 performs 'p_process_step = 1.0 / fixed_fps' without verifying that fixed_fps is non-zero. The fixed_fps field is initialized to 0 by default (main_timer_sync.h:112) and only checked for != -1 at line 433. If fixed_fps is 0 (the default), this will cause a floating-point divide by zero.","fix":"Change the condition from 'if (fixed_fps != -1)' to 'if (fixed_fps > 0)' to ensure fixed_fps is positive before division. The check should reject both -1 (disabled) and 0 (uninitialized/invalid).","locations":[{"ref":"main/main_timer_sync.cpp:433-435","code":"  433 | \tif (fixed_fps != -1) {\n  434 | \t\tp_process_step = 1.0 / fixed_fps;\n  435 | \t}","lines":3}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","easy":true,"description":"Division by zero in GodotPinJoint2D::pre_solve when both bodies have zero inertia. The code computes i_sum = 1.0 / (i_sum_local) without checking if i_sum_local is zero. For static bodies (inv_inertia=0), both bodies could sum to zero, causing inf/nan.","fix":"Add a check: if (i_sum_local > CMP_EPSILON) { i_sum = 1.0 / i_sum_local; } else { i_sum = 0.0; }","locations":[{"ref":"modules/godot_physics_2d/godot_joints_2d.cpp:177-181","code":"  177 | \treal_t i_sum_local = A->get_inv_inertia();\n  178 | \tif (B) {\n  179 | \t\ti_sum_local += B->get_inv_inertia();\n  180 | \t}\n  181 | \ti_sum = 1.0 / (i_sum_local);","lines":5}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow" -1109","code":" 1108 | \t\tlink.c3 = link.n[1]->q - link.n[0]->q;\n 1109 | \t\tlink.c2 = 1 / (link.c3.length_squared() * link.c0);","lines":2}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","easy":true,"description":"Buffer overflow in bio_recv: The function receives a destination buffer 'buf' with size 'len', but copies 'buffer_size' bytes without checking if buffer_size exceeds len. This can cause heap corruption when an untrusted DTLS peer sends a large packet.","fix":"Add bounds check: size_t to_copy = MIN((size_t)buffer_size, len); memcpy(buf, buffer, to_copy); return to_copy;","locations":[{"ref":"modules/mbedtls/packet_peer_mbed_dtls.cpp:53-77","code":"   53 | int PacketPeerMbedDTLS::bio_recv(void *ctx, unsigned char *buf, size_t len) {\n   54 | \tif (buf == nullptr || len == 0) {\n   55 | \t\treturn 0;\n   56 | \t}\n   57 | \n   58 | \tPacketPeerMbedDTLS *sp = static_cast<PacketPeerMbedDTLS *>(ctx);\n   59 | \n   60 | \tERR_FAIL_NULL_V(sp, 0);\n   61 | \n   62 | \tint pc = sp->base->get_available_packet_count();\n   63 | \tif (pc == 0) {\n   64 | \t\treturn MBEDTLS_ERR_SSL_WANT_READ;\n   65 | \t} else if (pc < 0) {\n   66 | \t\tERR_FAIL_V(MBEDTLS_ERR_SSL_INTERNAL_ERROR);\n   67 | \t}\n   68 | \n   69 | \tconst uint8_t *buffer;\n   70 | \tint buffer_size = 0;\n   71 | \tError err = sp->base->get_packet(&buffer, buffer_size);\n   72 | \tif (err != OK) {\n   73 | \t\treturn MBEDTLS_ERR_SSL_INTERNAL_ERROR;\n   74 | \t}\n   75 | \tmemcpy(buf, buffer, buffer_size);\n   76 | \treturn buffer_size;\n   77 | }","lines":25}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","easy":true,"description":"Out-of-bounds array access in OpenXRVisibilityMaskExtension. The mesh_data array has a fixed size of 4 elements, but mesh_count can be set to a larger value from get_view_count() without validation. The _update_mesh() function then reads from mesh_data[i] where i can excee t(dll_base_dir)) {\n  190 | \t\tif (file.begins_with(new_pdb_base_name) && file.ends_with(\".pdb\")) {\n  191 | \t\t\tString path = dll_base_dir.path_join(file);\n  192 | \n  193 | \t\t\t// Just try to delete without showing any errors.\n  194 | \t\t\tError err = DirAccess::remove_absolute(path);\n  195 | \t\t\tif (err == OK && temp_pdbs[p_dll_path].has(path)) {\n  196 | \t\t\t\ttemp_pdbs[p_dll_path].erase(path);\n  197 | \t\t\t}\n  198 | \t\t}\n  199 | \t}\n  200 | \n  201 | \t// Try to copy PDB with new name and patch DLL.\n  202 | \tRef<DirAccess> d = DirAccess::create(DirAccess::ACCESS_FILESYSTEM);\n  203 | \tfor (int i = 0; i < max_pdb_names; i++) {\n  204 | \t\tString new_pdb_name = vformat(\"%s%d.pdb\", new_pdb_base_name, i);\n  205 | \t\tString new_pdb_path = dll_base_dir.path_join(new_pdb_name);\n  206 | \t\tError err = OK;\n  207 | \n  208 | \t\tRef<FileAccess> test_pdb_is_locked = FileAccess::open(new_pdb_path, FileAccess::READ_WRITE, &err);\n  209 | \t\tif (err == ERR_FILE_CANT_OPEN) {\n  210 | \t\t\t// If the file is blocked, continue searching.\n  211 | \t\t\tcontinue;\n  212 | \t\t} else if (err != OK && err != ERR_FILE_NOT_FOUND) {\n  213 | \t\t\tERR_FAIL_V_MSG(err, vformat(\"Failed to open '%s' to check if it is locked.\", new_pdb_path));\n  214 | \t\t}\n  215 | \n  216 | \t\terr = d->copy(copy_pdb_path, new_pdb_path);\n  217 | \t\tERR_FAIL_COND_V_MSG(err != OK, err, vformat(\"Failed to copy PDB from '%s' to '%s'.\", copy_pdb_path, new_pdb_path));\n  218 | \t\ttemp_pdbs[p_dll_path].append(new_pdb_path);\n  219 | \n  220 | \t\tRef<FileAccess> file = FileAccess::open(p_dll_path, FileAccess::READ_WRITE, &err);\n  221 | \t\tERR_FAIL_COND_V_MSG(err != OK, err, vformat(\"Failed to open '%s' to patch the PDB path.\", p_dll_path));\n  222 | \n  223 | \t\tint original_path_size = pdb_info.path.utf8().length();\n  224 | \t\t// Double-check file bounds.\n  225 | \t\tERR_FAIL_UNSIGNED_INDEX_V_MSG(pdb_info.address + original_path_size, file->get_length(), FAILED, vformat(\"Failed to write a new PDB path. Probably '%s' has been changed.\", p_dll_path));\n  226 | \n  227 | \t\tVector<uint8_t> u8 = new_pdb_name.to_utf8_buffer();\n  228 | \t\tfile->seek(pdb_info.address);\n  229 | \t\tfile->store_buffer(u8);\n  230 | \n  231 | \t\t// Terminate string and fill the remaining part of the original string with the '\\0'.\n  232 | \t\tVector<uint8_t> padding_buffer;\n  233 | \t\tpadding_buffer.resize_initialized((int64_t)original_path_size - u8.size());\n  234 | \t\tfile->store_buffer(padding_buffer);\n  235 | \t\tERR_FAIL_COND_V_MSG(err != OK, err, vformat(\"Failed to write a new PDB path to '%s'.\", p_dll_path));\n  236 | ","lines":72}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Off-by-one buffer overread in ScriptStackDump deserialization. Line 51 checks CHECK_SIZE(p_arr, size) but then accesses elements from p_arr[1] to p_arr[size-1] in the loop. The check should verify size >= 1 + size (total needed), not just size. If p_arr.size() exactly equals size, accessing p_arr[size] will be out of bounds. Similar issue at line 137 in OutputError deserialization.","fix":"Increase CHECK_SIZE requirement by 1: For ScriptStackDump at line 51 change to CHECK_SIZE(p_arr, size + 1). For OutputError at line 137, the stack frame data ends at idx which needs to fit, so change to CHECK_SIZE(p_arr, 11 + stack_size). Ensure final idx is within bounds.","locations":[{"ref":"core/debugger/debugger_marshalls.cpp:49-63","code":"   49 | \tCHECK_SIZE(p_arr, 1, \"ScriptStackDump\");\n   50 | \tuint32_t size = p_arr[0];\n   51 | \tCHECK_SIZE(p_arr, size, \"ScriptStackDump\");\n   52 | \tint idx = 1;\n   53 | \tfor (uint32_t i = 0; i < size / 3; i++) {\n   54 | \t\tScriptLanguage::StackInfo sf;\n   55 | \t\tsf.file = p_arr[idx];\n   56 | \t\tsf.line = p_arr[idx + 1];\n   57 | \t\tsf.func = p_arr[idx + 2];\n   58 | \t\tframes.push_back(sf);\n   59 | \t\tidx += 3;\n   60 | \t}\n low","severity":"high","easy":true,"description":"Buffer overflow vulnerability in get_packet(). The packet_buffer is fixed size (PACKET_BUFFER_SIZE = 65536 bytes), but store_packet() doesn't validate that p_buf_size <= PACKET_BUFFER_SIZE. If a caller (like UDPServer, which is documented to use this method) passes p_buf_size > 65536, the stored size value will be read back and used to read past the buffer bounds at line 124.","fix":"Add validation in store_packet() to reject oversized packets: `ERR_FAIL_COND_V_MSG(p_buf_size > PACKET_BUFFER_SIZE, ERR_INVALID_PARAMETER, \"Packet size exceeds maximum buffer size\");` at line 327.","locations":[{"ref":"core/io/packet_peer_udp.cpp:126","code":"  126 | \trb.read(packet_buffer, size, true);","lines":1}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Integer overflow in Expression token parser when parsing $N input parameter indices. The code multiplies index by 10 in a loop without overflow checking, allowing maliciously crafted expressions like '$9999999999' to cause integer overflow.","fix":"Add overflow check before multiplying: if (index > INT_MAX / 10) { _set_error(\"Input parameter index too large\"); return ERR_PARSE_ERROR; }","locations":[{"ref":"core/math/expression.cpp:78-94","code":"   78 | \t\t\tcase '$': {\n   79 | \t\t\t\tr_token.type = TK_INPUT;\n   80 | \t\t\t\tint index = 0;\n   81 | \t\t\t\tdo {\n   82 | \t\t\t\t\tif (!is_digit(expression[str_ofs])) {\n   83 | \t\t\t\t\t\t_set_error(\"Expected number after '$'\");\n   84 | \t\t\t\t\t\tr_token.type = TK_ERROR;\n   85 | \t\t\t\t\t\treturn ERR_PARSE_ERROR;\n   86 | \t\t\t\t\t}\n   87 | \t\t\t\t\tindex *= 10;\n   88 | \t\t\t\t\tindex += expression[str_ofs] - '0';\n   89 | \t\t\t\t\tstr_ofs++;\n   90 | \n   91 | \t\t\t\t} while (is_digit(expression[str_ofs]));\n   92 | \n   93 | \t\t\t\tr_token.value = index;\n   94 | \t\t\t\treturn OK;","lines":17}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Integer overflow in hex_encode_buffer: The calculation `p_len * 2 + 1` can overflow when p_len is large (e.g., > INT_MAX/2). This can cause incorrect buffer size allocation, leading to buffer overrun.","fix":"Check for overflow before multiplication: if (p_len > INT_MAX / 2) return appropriate error or use size_t for calculations.","locations":[{"ref":"core/string/ustring.cpp:1645","code":" 1645 | \tret.resize_uninitialized(p_len * 2 + 1);","lines":1}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Integer overflow/underflow in _replace_common size calculation. When calculating replacement string size, the code performs (int)found.size() * (with_length - key_length) without overflow checking. The subtraction between int and size_t can cause unexpected type promotion and underflow, and the multiplication can overflow.","fix":"Cast all values to a consistent type (e.g., int64_t or size_t) and add overflow checking before the multiplication and addition operations. Example: int64_t size_diff = (int64_t)with_length - (int64_t)key_length; if (size_diff > INT32_MAX / found.size()) { ... handle overflow ... }","locations":[{"ref":"core/string/ustring.cpp:3628","code":" 3628 | \tnew_string.resize_uninitialized(old_length + int(found.size()) * (with_length - key_length) + 1);","lines":1},{"ref":"core/string/ustring.cpp:3687","code":" 3687 | \tnew_string.resize_uninitialized(old_length + int(found.size()) * (with_length - key_length) + 1);","lines":1}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In func_PackedByteArray_encode_var at line 1150: The check 'uint64_t(p_offset + len) > size' is vulnerable to signed integer overflow. Since p_offset is int64_t and len is int (signed), if p_offset approaches INT64_MAX and len is positive, the addition p_offset + len overflows in signed arithmetic before the cast to uint64_t. This could bypass the bounds check and allow out-of-bounds write.","fix":"Cast operands to unsigned before addition: 'if (uint64_t(p_offset) + uint64_t(len) > size)' to perform the comparison in unsigned arithmetic without overflow.","locations":[{"ref":"core/variant/variant_call.cpp:1150","code":" 1150 | \t\tif (uint64_t(p_offset + len) > size) {","lines":1}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Integer overflow in texture resizing calculation. The multiplication target_image->get_height() * new_width and target_image->get_width() * new_height can overflow an int. For example, if both dimensions are near 32000, the product could overflow. The correct approach is to cast to int64_t before multiplication.","fix":"Cast to int64_t before multiplication: int new_height = int((int64_t)target_image->get_height() * new_width / target_image->get_width()); and similarly for line 834.","locations":[{"ref":"editor/import/resource_importer_texture.cpp:825-825","code":"  825 | \t\t\t\tint new_height = target_image->get_height() * new_width / target_image->get_width();","lines":1},{"ref":"editor/import/resource_importer_texture.cpp:834-834","code":"  834 | \t\t\t\tint new_width = target_image->get_width() * new_height / target_image->get_height();","lines":1}]},{"id":"OVF_19","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Integer overflow when calculating texture memory size. Image::get_image_data_size() returns int64_t, but the result is stored in const int after multiplication with texture->get_depth(). For large textures (e.g., 4096x4096x256), this can overflow 32-bit signed integer limits (~2GB), causing negative memory values to be passed to String::humanize_size() and potentially displaying incorrect memory usage information.","fix":"Change 'const int memory' to 'const int64_t memory' on both lines 169 and 180 to preserve the full range of the multiplication result.","locations":[{"ref":"editor/scene/texture/texture_3d_editor_plugin.cpp:169","code":"  169 | \t\tconst int memory = Image::get_image_data_size(texture->get_width(), texture->get_height(), format, true) * texture->get_depth();","lines":1},{"ref":"editor/scene/texture/texture_3d_editor_plugin.cpp:180","code":"  180 | \t\tconst int memory = Image::get_image_data_size(texture->get_width(), texture->get_height(), format, false) * texture->get_depth();","lines":1}]},{"id":"OVF_20","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Potential integer overflow when multiplying untrusted input values. In gltf_accessor.cpp line 1099 and similar locations, 'input_size * vector_size' is computed where input_size comes from untrusted glTF data (p_input_data.size()). If input_size is large, this multiplication could overflow int64_t.","fix":"Add overflow checks before the multiplication, e.g., check if input_size > INT64_MAX / vector_size before multiplying, and fail gracefully if overflow would occur.","locations":[{"ref":"modules/gltf/structures/gltf_accessor.cpp:1099","code":" 1099 | \tnumbers.resize(input_size * vector_size);","lines":1},{"ref":"modules/gltf/structures/gltf_accessor.cpp:613","code":"  613 | \tconst int64_t raw_number_count = raw_vector_count * vector_size;","lines":1},{"ref":"modules/gltf/structures/gltf_accessor.cpp:747","code":"  747 | \tERR_FAIL_COND_V_MSG(sparse_values.size() != sparse_count * vector_size, ret_numbers, \"glTF import: Sparse values size does not match the sparse count.\");","lines":1}]},{"id":"OVF_21","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Division by zero in update_link_constants when linear_stiffness is zero or negative. The setter set_linear_stiffness() does not validate the input, allowing zero to be set. Then at line 288, inv_linear_stiffness = 1.0 / linear_stiffness causes division by zero if user sets linear_stiffness to 0.","fix":"Add validation in set_linear_stiffness(): ERR_FAIL_COND(p_val <= 0.0) to ensure only positive values are accepted.","locations":[{"ref":"modules/godot_physics_3d/godot_soft_body_3d.cpp:287-290","code":"  287 | void GodotSoftBody3D::update_link_constants() {\n  288 | \treal_t inv_linear_stiffness = 1.0 / linear_stiffness;\n  289 | \tfor (Link &link : links) {\n  290 | \t\tlink.c0 = (link.n[0]->im + link.n[1]->im) * inv_linear_stiffness;","lines":4}]},{"id":"OVF_22","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Unsigned integer underflow in seek_page_internal loop. When test_page decrements from 0, it wraps to UINT32_MAX, causing the loop condition 'test_page >= after_page_inclusive' to remain true indefinitely, leading to out-of-bounds array accesses.","fix":"Use signed integers or add explicit bounds checking. Change: for (uint32_t test_page = actual_middle_page; test_page >= after_page_inclusive; test_page--) to: for (int32_t test_page = actual_middle_page; test_page >= (int32_t)after_page_inclusive; test_page--)","locations":[{"ref":"modules/ogg/ogg_packet_sequence.cpp:186","code":"  186 | \t\tfor (uint32_t test_page = actual_middle_page; test_page >= after_page_inclusive; test_page--) {","lines":1}]},{"id":"OVF_23","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Integer truncation when assigning uint64_t offset to int32_t index array in visibility mask extension. The offset variable tracks cumulative vertex counts across multiple meshes and can exceed INT32_MAX, causing incorrect mesh indices when stored in the int32_t array.","fix":"Change the indices array from PackedInt32Array to PackedUint32Array, or cast offset to int32_t with proper bounds checking. The indices array should use uint32_t since it rep e (e.g., 48000) and length > 90000 seconds, the multiplication overflows int32. This causes buffer allocation and processing to use incorrect sizes.","fix":"Change 'int frames_total = mix_rate * length;' to 'int64_t frames_total = (int64_t)mix_rate * length;' then validate frames_total fits in expected bounds before use.","locations":[{"ref":"platform/web/audio_driver_web.cpp:241","code":"  241 | \tint frames_total = mix_rate * length;","lines":1}]},{"id":"OVF_26","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In sign_bytecode() at line 245, unsigned integer underflow can occur when r_dxil_blob.size() < 20. The expression 'r_dxil_blob.size() - 20' will underflow to a huge value when size is small, causing buffer overread in compute_dxil_hash().","fix":"Add bounds checking: ERR_FAIL_COND_V(r_dxil_blob.size() < 24, ); before calling compute_dxil_hash() to ensure sufficient data exists for hash computation.","locations":[{"ref":"rendering_shader_container_d3d12.cpp:243-246","code":null,"lines":4}]},{"id":"OVF_27","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Division by zero in Spcap::calculate() at line 94. The variable 'sum_squared_gains' accumulates squared gain values. If all gains are zero (which can happen if effective_number_of_speakers is zero due to the prior bug, or in certain geometric configurations), this results in 0/0 = NaN.","fix":"Add a guard: if (sum_squared_gains > CMP_EPSILON) { volumes[speaker_num] = std::sqrt(r[speaker_num].squared_gain / sum_squared_gains); } else { volumes[speaker_num] = 0.0; }","locations":[{"ref":"scene/3d/audio_stream_player_3d.cpp:94","code":"   94 | \t\t\tvolumes[speaker_num] = std::sqrt(r[speaker_num].squared_gain / sum_squared_gains);","lines":1}]},{"id":"OVF_28","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Array out-of-bounds access: In pa e 346 in draw_nine_patch_stretched(). When max_middle_real_size equals 0 (when width_total <= first_section_size + last_section_size), the expression divides by zero: middle_section_size *= ... / max_middle_real_size. This can occur with valid input stretching values.","fix":"Add a guard: if (max_middle_real_size > 0.0) { middle_section_size *= MIN(max_middle_real_size, real_middle_size) / max_middle_real_size; } else { middle_section_size = 0.0; }","locations":[{"ref":"scene/gui/texture_progress_bar.cpp:346","code":"  346 | \t\t\t\tmiddle_section_size *= MIN(max_middle_real_size, real_middle_size) / max_middle_real_size;","lines":1}]},{"id":"OVF_31","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Division by zero at line 390 in draw_nine_patch_stretched(). The expression divides by max_middle_real_size without checking if it's zero, similar to line 346 bug. Line 404 has the same issue.","fix":"Wrap both lines with conditional checks: if (max_middle_real_size > 0.0) { center_mapped_from_real_width = (width_total * 0.5 - topleft.x) / max_middle_real_size * max_middle_texture_size + topleft.x; } else { center_mapped_from_real_width = topleft.x; }","locations":[{"ref":"scene/gui/texture_progress_bar.cpp:390","code":"  390 | \t\t\t\tdouble center_mapped_from_real_width = (width_total * 0.5 - topleft.x) / max_middle_real_size * max_middle_texture_size + topleft.x;","lines":1},{"ref":"scene/gui/texture_progress_bar.cpp:404","code":"  404 | \t\t\t\tdouble center_mapped_from_real_width = (width_total * 0.5 - topleft.y) / max_middle_real_size * max_middle_texture_size + topleft.y;","lines":1}]},{"id":"OVF_32","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Out-of-bounds array access in tangents swapping loop. The loop condition 'i < tangents.size() - 1' with increment 'i += 12' allows accessing indices beyond array bounds. When tangents.size() = 8 (2 vertices .x = min_time * handle_length;\n 3584 | \t\t\tout_handle.y = 0;\n 3585 | \t\t} else if (p_set_mode == HANDLE_SET_MODE_AUTO) {\n 3586 | \t\t\treal_t tangent = (p_next_value - p_prev_value) / min_time;\n 3587 | \t\t\tin_handle.x = -min_time * handle_length;\n 3588 | \t\t\tin_handle.y = in_handle.x * tangent;\n 3589 | \t\t\tout_handle.x = min_time * handle_length;\n 3590 | \t\t\tout_handle.y = out_handle.x * tangent;\n 3591 | \t\t}\n 3592 | \t}","lines":25}]},{"id":"OVF_35","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Potential division by zero in bezier_track_interpolate at line 3667. The expression `(high_pos.x - low_pos.x)` can be zero if the bezier interpolation produces identical x-coordinates for the low and high positions, resulting in undefined behavior (NaN or inf).","fix":"Add a check before division: if `Math::is_zero_approx(high_pos.x - low_pos.x)`, use a fallback value for `c` (such as 0.5 or clamp to [0, 1]). Alternatively, use safe division: `real_t c = high_pos.x == low_pos.x ? 0.5 : (t - low_pos.x) / (high_pos.x - low_pos.x);`","locations":[{"ref":"scene/resources/animation.cpp:3664-3670","code":" 3664 | \t//interpolate the result:\n 3665 | \tVector2 low_pos = start.bezier_interpolate(start_out, end_in, end, low);\n 3666 | \tVector2 high_pos = start.bezier_interpolate(start_out, end_in, end, high);\n 3667 | \treal_t c = (t - low_pos.x) / (high_pos.x - low_pos.x);\n 3668 | \n 3669 | \treturn low_pos.lerp(high_pos, c).y;\n 3670 | }","lines":7}]},{"id":"OVF_36","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Potential integer underflow in lightmap_tap_sh_light (line 2238). The code does `node = Math::abs(node) - 1` where node is int32_t. If node is negative (which is expected from BSP tree), Math::abs can fail if node is INT32_MIN. Additionally, there's no bounds checking that `node` (after the -1) is within valid range of tetrahedra * rd_geometry.vertex_stride` can overflow if vertex_count and vertex_stride are large. The multiplication is performed with no overflow checking before adding the offset.","fix":"Use checked multiplication: ensure `rd_geometry.vertex_count` and `rd_geometry.vertex_stride` do not multiply to overflow uint64_t before adding offset. Consider: `if (rd_geometry.vertex_count > UINT64_MAX / rd_geometry.vertex_stride)` before the multiplication.","locations":[{"ref":"servers/rendering/rendering_device.cpp:328","code":"  328 | \t\tERR_FAIL_COND_V_MSG((rd_geometry.vertex_offset + rd_geometry.vertex_count * rd_geometry.vertex_stride) > vertex_buffer->size, RID(), \"The specified vertex offset and count are outside the range of the vertex buffer.\");","lines":1}]},{"id":"OVF_39","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Integer overflow in index buffer geometry validation: `rd_geometry.index_offset + rd_geometry.index_count * index_stride` can overflow if index_count and index_stride are large. Similar to vertex buffer case above.","fix":"Use checked multiplication: `if (rd_geometry.index_count > UINT64_MAX / index_stride)` before the multiplication to prevent overflow in the bounds check.","locations":[{"ref":"servers/rendering/rendering_device.cpp:350","code":"  350 | \t\t\tERR_FAIL_COND_V_MSG((rd_geometry.index_offset + rd_geometry.index_count * index_stride) > index_buffer->size, RID(), \"The specified index offset and count are outside the range of the index buffer.\");","lines":1}]},{"id":"OVF_40","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Integer overflow in instance buffer pointer arithmetic: `instance_buffer.data_ptr + instance_buffer_offset + (instance_size * i)` on line 564 can overflow if instance_size and loop counter i are large. No overflow check before pointer arithmetic.","fix":"Add overflow check: verify `instance_size <= UINT64_MAX / p_instances.size()` before the loop to ensure `instance_size * i` cannot overflow.","locations":[{"ref":"servers/rendering/rendering_device.cpp:564","code":"  564 | \t\tdriver->acceleration_structure_instance_write(instance_buffer.data_ptr + instance_buffer_offset + (instance_size * i), rdd_instance);","lines":1}]},{"id":"OVF_41","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Off-by-one error in instance_index bounds validation. Line 10043 correctly validates custom_instance_index with >= comparison, but line 10209 uses > comparison when auto-incrementing instance_index. This allows instance_index to reach MAX_INSTANCE_UNIFORM_INDICES (16) when the valid range is 0-15, enabling out-of-bounds writes to the instance uniform index array.","fix":"Change line 10209 from 'if (instance_index > MAX_INSTANCE_UNIFORM_INDICES)' to 'if (instance_index >= MAX_INSTANCE_UNIFORM_INDICES)' to match the validation at line 10043. The post-increment at line 10208 means after assigning index 15, instance_index becomes 16, which should fail the check.","locations":[{"ref":"servers/rendering/shader_language.cpp:10043","code":"10043 | \t\t\t\t\t\t\t\t\tif (custom_instance_index >= MAX_INSTANCE_UNIFORM_INDICES) {","lines":1},{"ref":"servers/rendering/shader_language.cpp:10209","code":"10209 | \t\t\t\t\t\t\tif (instance_index > MAX_INSTANCE_UNIFORM_INDICES) {","lines":1}]},{"id":"OVF_42","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Potential integer overflow in write_array_std140 template function. Lines 301-302 compute 'elements * p_array_size' and 'p_stride * p_array_size' without checking for overflow. With large inputs this can wrap around, causing incorrect memset size on line 306 and out-of-bounds buffer writes on line 313.","fix":"Add overflow validation before multiplications: if (p_array_size > 0 && elements > INT_MAX / p_array_size) { handle_error(); }","locations":[{"ref":"servers/rendering/storage/variant_converters.h:301-302","code":"  301 | \tconst int dst_count = elements * p_array_size;\n  302 | \tconst int stride_count = p_stride * p_array_size;","lines":2},{"ref":"servers/rendering/storage/variant_converters.h:306","code":"  306 | \tmemset(p_write, 0, sizeof(To) * stride_count);","lines":1},{"ref":"servers/rendering/storage/variant_converters.h:313","code":"  313 | \t\t\t\tp_write[j + e] = read[i + e];","lines":1}]},{"id":"OVF_43","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Integer overflow vulnerability at line 272. The value 'ds' is read from untrusted file data without validation. When computing 'f->get_position() - ds - 8', if 'ds' is very large, this could result in underflow/negative seek position, causing undefined behavior or security issues.","fix":"Add bounds checking to validate 'ds' value: ERR_FAIL_COND_V_MSG(ds > f->get_position(), false, \"Invalid directory size in pack file\");","locations":[{"ref":"core/io/file_access_pack.cpp:272","code":"  272 | \t\t\tf->seek(f->get_position() - ds - 8);","lines":1}]},{"id":"OVF_44","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Potential 64-bit integer overflow when adding file_base and ofs at line 369. Both are uint64_t values read from the pack file without validation. If file_base + ofs overflows, it could point to invalid memory.","fix":"Add overflow check: ERR_FAIL_COND_V_MSG(file_base > UINT64_MAX - ofs, false, \"File offset overflow\");","locations":[{"ref":"core/io/file_access_pack.cpp:369","code":"  369 | \t\t\tPackedData::get_singleton()->add_path(p_path, path, file_base + ofs, size, md5, this, p_replace_files, (flags & PACK_FILE_ENCRYPTED), sparse_bundle, (flags & PACK_FILE_DELTA), salt);","lines":1}]},{"id":"OVF_45","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"Integer overflow in Memory::alloc_aligned_static() at line 57. The offset (uintptr_t) is cast to uint32_t without checking if the value exceeds UINT32_MAX. If p_alignment is extremely large (> 2^32), the cast truncates the offset, causing free_aligned_static() to read the wrong offset value and corrupt memory or crash when freeing. While rare with typical alignments, this is a latent vulnerability.","fix":"Either assert that offset fits in uint32_t, or use size_t/uintptr_t for the offset field if available: DEV_ASSERT((uintptr_t)p2 - (uintptr_t)p1 <= UINT32_MAX); before the cast","locations":[{"ref":"core/os/memory.cpp:57","code":"   57 | \t*((uint32_t *)p2 - 1) = (uint32_t)((uintptr_t)p2 - (uintptr_t)p1);","lines":1}]},{"id":"OVF_46","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Potential integer overflow in String::join: The calculation `(parts.size() - 1) * this_length` at line 1328 can overflow when both parts.size() and this_length are large.","fix":"Add overflow checks before arithmetic operations: Check if (parts.size() - 1) > INT_MAX / this_length before multiplying. Use size_t for size calculations.","locations":[{"ref":"core/string/ustring.cpp:1328-1332","code":" 1328 | \tint new_size = (parts.size() - 1) * this_length;\n 1329 | \tfor (const String &part : parts) {\n 1330 | \t\tnew_size += part.length();\n 1331 | \t}\n 1332 | \tnew_size += 1;","lines":5}]},{"id":"OVF_47","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"Truncating cast from int64_t to int in VariantUtilityFunctions::wrap() at line 616. The code calls 'wrapi((int)p_x, (int)p_min, (int)p_max)' but wrapi() expects int64_t arguments (see line 630). Casting int64_t values to 32-bit int causes silent truncation of values outside the int32 range, leading to incorrect results.","fix":"Change 'wrapi((int)p_x, (int)p_min, (int)p_max)' to 'wrapi((int64_t)p_x, (int64_t)p_min, (int64_t)p_max)' to preserve 64-bit values and match the function signature on line 630.","locations":[{"ref":"core/variant/variant_utility.cpp:616","code":"  616 | \t\t\t\tvalue = wrapi((int)p_x, (int)p_min, (int)p_max);","lines":1}]},{"id":"OVF_48","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"Type mismatch: uint32_t rear = -1 initializes an unsigned variable with -1, which becomes UINT32_MAX. Then at line 186 the modulo operation (rear + 1) % size on first call: (UINT32_MAX + 1) % size = 0 which happens to work correctly but is misleading and error-prone","fix":"Change to int32_t rear = -1; or use uint32_t rear = UINT32_MAX; with explicit intent","locations":[{"ref":"drivers/metal/rendering_context_driver_metal.cpp:102","code":"  102 | \tuint32_t rear = -1;","lines":1}]},{"id":"OVF_49","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"Out-of-bounds array access without bounds checking. At line 8048 in _menu_gizmo_toggled(), gizmo_plugins_by_name.write[p_option] is accessed with p_option parameter from menu callback. p_option is not validated to be within array bounds (0 to gizmo_plugins_by_name.size()-1), potentially causing out-of-bounds memory access.","fix":"Add bounds check: if (p_option < 0 || p_option >= gizmo_plugins_by_name.size()) { return; } before accessing gizmo_plugins_by_name.write[p_option]","locations":[{"ref":"editor/scene/3d/node_3d_editor_plugin.cpp:8030-8051","code":" 8030 | void Node3DEditor::_menu_gizmo_toggled(int p_option) {\n 8031 | \tconst int idx = gizmos_menu->get_item_index(p_option);\n 8032 | \tgizmos_menu->toggle_item_multistate(idx);\n 8033 | \n 8034 | \t// Change icon\n 8035 | \tconst int state = gizmos_menu->get_item_state(idx);\n 8036 | \tswitch (state) {\n 8037 | \t\tcase EditorNode3DGizmoPlugin::VISIBLE:\n 8038 | \t\t\tgizmos_menu->set_item_icon(idx, get_editor_theme_icon(SNAME(\"GuiVisibilityVisible\")));\ multiplies by height. If height is large, this can overflow an int32_t, causing incorrect file metadata.","fix":"Use uint64_t for the calculation and validate no overflow occurs: `uint64_t row_bytes = ((uint64_t)p_movie_size.width * 24 / 8 + 3) & 0xFFFFFFFC; uint64_t image_size = row_bytes * p_movie_size.height; if (image_size > UINT32_MAX) { ERR_FAIL_V(...); }`","locations":[{"ref":"modules/jpg/movie_writer_mjpeg.cpp:120","code":"  120 | \tf->store_32(((p_movie_size.width * 24 / 8 + 3) & 0xFFFFFFFC) * p_movie_size.height); // SizeImage","lines":1}]},{"id":"OVF_52","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"Unsafe array bounds access in godotsharp_array_ptrw. The function accesses Array::operator[](0) without checking if the array is empty. This results in undefined behavior and potential out-of-bounds access when the array has zero elements.","fix":"Check if the array is empty before accessing element 0. Return a null pointer or handle the empty array case explicitly. Example: if (p_self->is_empty()) return nullptr; else return reinterpret_cast<godot_variant *>(&reinterpret_cast<Array *>(p_self)->operator[](0));","locations":[{"ref":"modules/mono/glue/runtime_interop.cpp:970","code":"  970 | \treturn reinterpret_cast<godot_variant *>(&reinterpret_cast<Array *>(p_self)->operator[](0));","lines":1}]},{"id":"OVF_53","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Bit shift overflow on line 432: When i >= 64, expression '1ULL << i' performs undefined behavior since r_indexes is uint64_t. With more than 64 watched properties, this causes data corruption in the index bitmap.","fix":"Add bounds check before bit shift: 'if (i < 64) { r_indexes |= 1ULL << i; } else { WARN_PRINT(...); }' to prevent overflow when watchers.size() > 64. Consider using a larger integer type or array-based bitmap for systems needing >64 watched properties.","locations":[ re buffer allocation.","fix":"Add overflow checks: verify that p_raygen_shader_count * raygen_shader_group_stride and p_miss_shader_count * shader_group_stride don't overflow uint32_t. Use safer multiplication or check intermediate values before buffer allocation.","locations":[{"ref":"servers/rendering/rendering_device.cpp:5089-5094","code":" 5089 | \tuint32_t raygen_sbt_size = p_raygen_shader_count * raygen_shader_group_stride;\n 5090 | \tuint32_t miss_sbt_offset = STEPIFY(raygen_sbt_size, shader_group_base_alignment);\n 5091 | \t// Reserve handle-aligned slots for miss shaders.\n 5092 | \tuint32_t miss_sbt_size = p_miss_shader_count * shader_group_stride;\n 5093 | \n 5094 | \tr_sbt_buffer.size = miss_sbt_offset + miss_sbt_size;","lines":6}]},{"id":"OVF_61","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Potential integer overflow in os_version calculation: (uint32_t)ver.majorVersion * 10000 could overflow if majorVersion > 429496, though unlikely in practice for OS version numbers","fix":"Use safer calculation: os_version = (uint64_t)ver.majorVersion * 10000 + ... then cast to uint32_t if within range, or reconsider the encoding scheme","locations":[{"ref":"drivers/metal/metal_device_properties.cpp:355","code":"  355 | \tos_version = (uint32_t)ver.majorVersion * 10000 + (uint32_t)ver.minorVersion * 100 + (uint32_t)ver.patchVersion;","lines":1}]},{"id":"OVF_62","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Potential out-of-bounds read in disassembler when processing variable-length instructions. Lines like 'int instr_var_args = _code_ptr[++ip]' pre-increment ip before reading. If ip == _code_size - 1 at the start of processing a variable-length instruction, then ++ip makes it _code_size, and _code_ptr[_code_size] is out of bounds. This affects variable-length instruction opcodes (CONSTRUCT, CONSTRUCT_VALIDATED, CONSTRUCT_ARRAY, CONSTRUCT_TYPED_ARRAY, CONSTRUCT_TYPED_DICTIONARY, CALL, etc.). However, this only manifests in DEBUG_ENABLED builds (line 31 conditional compilation).","fix":"Add bounds checking before reading variable-length instruction headers. Ensure ip + 1 < _code_size before executing _code_ptr[++ip]. Alternatively, restructure to avoid pre-increment, or add error recovery to stop disassembly if bounds are exceeded.","locations":[{"ref":"modules/gdscript/gdscript_disassembler.cpp:515","code":"  515 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:535","code":"  535 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:555","code":"  555 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:573","code":"  573 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:608","code":"  608 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:628","code":"  628 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:685","code":"  685 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:717","code":"  717 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:747","code":"  747 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:770","code":"  770 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:794","code":"  794 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_disassembler.cpp:814","code":"  814 | \t\t\t\tint instr_var_args = _code_ptr[++ip];","lines":1},{"ref":"modules/gdscript/gdscript_ nts to proceed. This affects any types using this macro for indexed access.","fix":"Add 'return;' statement after the type check failure block (around line 635), matching the INDEXED_SETGET_STRUCT_TYPED pattern.","locations":[{"ref":"core/variant/variant_setget.cpp:619-632","code":"  619 | \t\tstatic void set(Variant *base, int64_t index, const Variant *value, bool *valid, bool *oob) { \\\n  620 | \t\t\tif (value->get_type() != GetTypeInfo<m_elem_type>::VARIANT_TYPE) { \\\n  621 | \t\t\t\t*oob = false; \\\n  622 | \t\t\t\t*valid = false; \\\n  623 | \t\t\t} \\\n  624 | \t\t\tif (index < 0 || index >= m_max) { \\\n  625 | \t\t\t\t*oob = true; \\\n  626 | \t\t\t\t*valid = false; \\\n  627 | \t\t\t\treturn; \\\n  628 | \t\t\t} \\\n  629 | \t\t\tVariantInternalAccessor<m_base_type>::get(base).m_set(index, VariantInternalAccessor<m_elem_type>::get(value)); \\\n  630 | \t\t\t*oob = false; \\\n  631 | \t\t\t*valid = true; \\\n  632 | \t\t} \\","lines":14}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Incorrect use of AND operator in condition at line 2110. The condition checks if line_point_count differs AND if vertex_array is non-zero, but the logic should be checking if either differs (line_point_count OR sdf_point_count) before freeing resources. If sdf_point_count changes but line_point_count doesn't, the vertices won't be properly freed/reallocated.","fix":"Change AND (&&) to OR (||) in the condition: `if (oc->sdf_index_count != sdf_indices.size() || oc->sdf_point_count != p_points.size() && oc->sdf_vertex_array != 0)`. Also should be consistent with line 2007 pattern.","locations":[{"ref":"drivers/gles3/rasterizer_canvas_gles3.cpp:2110","code":" 2110 | \tif (oc->sdf_index_count != sdf_indices.size() && oc->sdf_point_count != p_points.size() && oc->sdf_vertex_array != 0) {","lines":1}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Incorrect logical operator in roughness texture detection - uses OR (||) instead of AND (&&) to check if hint is within ROUGHNESS range. This causes the roughness detection callback to be invoked for almost all texture hints, not just roughness hints, leading to incorrect callback invocation.","fix":"Change the condition from:\n  if (tex->detect_roughness_callback && (p_texture_uniforms[i].hint >= ShaderLanguage::ShaderNode::Uniform::HINT_ROUGHNESS_R || p_texture_uniforms[i].hint <= ShaderLanguage::ShaderNode::Uniform::HINT_ROUGHNESS_GRAY))\nto:\n  if (tex->detect_roughness_callback && (p_texture_uniforms[i].hint >= ShaderLanguage::ShaderNode::Uniform::HINT_ROUGHNESS_R && p_texture_uniforms[i].hint <= ShaderLanguage::ShaderNode::Uniform::HINT_ROUGHNESS_GRAY))\nThis properly restricts the callback to only roughness texture hints.","locations":[{"ref":"drivers/gles3/storage/material_storage.cpp:959","code":"  959 | \t\t\t\t\tif (tex->detect_roughness_callback && (p_texture_uniforms[i].hint >= ShaderLanguage::ShaderNode::Uniform::HINT_ROUGHNESS_R || p_texture_uniforms[i].hint <= ShaderLanguage::ShaderNode::Uniform::HINT_ROUGHNESS_GRAY)) {","lines":1}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Array index without bounds checking in render_clear_attachments. The attachment_index variable (obtained from either attClear.color_attachment or subpass.depth_stencil_reference.attachment) is used to directly index into clear_colors[], which is sized as ClearAttKey::ATTACHMENT_COUNT (10 elements). However, attachment_index could be any value from the render pass, potentially much larger than 10, causing out-of-bounds array access.","fix":"Add bounds checking before indexing clear_colors[]. Verify that attachment_index < ClearAttKey::ATTACHMENT_COUNT, or map the attachment reference to a clamped index. Also verify this at line 791 where key.set_color_format(attachment_index, mda.format) is called.","locations":[{"ref":"drivers/metal/metal3_objects.cpp:789-792","code":"  789 | \t\tMDAttachment const &mda = render.pass->attachments[attachment_index];\n  790 | \t\tif (attClear.aspect.has_flag(RDD::TEXTURE_ASPECT_COLOR_BIT)) {\n  791 | \t\t\tkey.set_color_format(attachment_index, mda.format);\n  792 | \t\t\tclear_colors[attachment_index] = {","lines":4}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Incorrect type casting from signed to unsigned in audio sample channel mixing. When mixing audio channels with uneven counts, the code casts signed int32_t samples to uint32_t, which causes incorrect behavior for negative sample values. This results in audio distortion or clipping when processing negative-valued audio samples.","fix":"Change 'uint32_t l' and 'uint32_t r' to 'int32_t l' and 'int32_t r'. This matches the pattern used in WASAPI driver (drivers/wasapi/audio_driver_wasapi.cpp:801-802) and preserves the signed nature of audio samples through the mixing operation.","locations":[{"ref":"drivers/pulseaudio/audio_driver_pulseaudio.cpp:434-435","code":"  434 | \t\t\t\t\t\tuint32_t l = ad->samples_in[in_idx++] >> 16;\n  435 | \t\t\t\t\t\tuint32_t r = ad->samples_in[in_idx++] >> 16;","lines":2}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In get_entropy() with NO_URANDOM path, the loop at line 298 reads the full p_bytes size on every iteration instead of reading only the remaining bytes (left) and offset the buffer pointer correctly. This causes incomplete entropy collection - only the last chunk read overwrites the buffer, losing data from previous iterations.","fix":"Line 298 should be: ssize_t ret = read(r, r_buffer + (p_bytes - left), left); This reads only the remaining bytes into the correct offset position.","locations":[{"ref":"drivers/unix/os_unix.cpp:294-301","code":"  294 | \tint r = open(\"/dev/urandom\", O_RDONLY);\n  295 | \tERR_FAIL_COND_V(r < 0, FAILED);\n  296 | \tint left = p_bytes;\n  297 | \tdo {\n  298 | \t\tssize_t ret = read(r, r_buffer, p_bytes);\n  299 | \t\tERR_FAIL_COND_V(ret <= 0, FAILED);\n  300 | \t\tleft -= ret;\n  301 | \t} while (left > 0);","lines":8}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Null pointer dereference in _cleanup_animation() at lines 7756 and 7761. The 'root' member pointer is dereferenced without a null check. Other parts of the code (e.g., line 5280) guard access to 'root' with 'if (root && ...)'. If 'root' is null, calling 'root->has_node_and_resource()' and 'root->get_node_and_resource()' will crash the application.","fix":"Add a null check before the loop: 'if (!root) { _update_tracks(); return; }' or wrap the entire block with 'if (root) { ... }'. Alternatively, guard each access with 'if (root) { }' checks like line 5280 does.","locations":[{"ref":"editor/animation/animation_track_editor.cpp:7756","code":" 7756 | \t\tif (!root->has_node_and_resource(p_animation->track_get_path(i))) {","lines":1},{"ref":"editor/animation/animation_track_editor.cpp:7761","code":" 7761 | \t\tNode *node = root->get_node_and_resource(p_animation->track_get_path(i), res, leftover_path);","lines":1}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Infinite loop due to incorrect condition. The while loop at line 499 uses OR (||) instead of AND (&&). The condition `base_type != \"Resource\" || base_type != \"\"` is always true because a string cannot simultaneously equal both \"Resource\" and \"\" - it will always be not-equal to at least one of them. This causes an infinite loop when searching up the inheritance tree for a theme icon, eventually calling ClassDB::get_parent_class() until it returns an empty string, which still satisfies the condition.","fix":"Change the OR operator to AND: `while (base_type != \"Resource\" && base_type != \"\")` to properly terminate when reaching the Resource base class or when the parent class is empty.","locations":[{"ref":"editor/debugger/script_editor_debugger.cpp:499","code":"  499 | \t\t\twhile (base_type != \"Resource\" || base_type != \"\") {","lines":1}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Type mismatch in _update_visibility(): bool variable 'any_visible' is assigned a Control pointer instead of true. This is misleading code with incorrect semantics.","fix":"Change 'any_visible = c;' to 'any_visible = true;'","locations":[{"ref":"editor/docks/editor_dock_manager.cpp:75","code":"   75 | \t\tany_visible = c;","lines":1}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Array size mismatch in _convert_dialog_action() at lines 2006-2008. The code fills `converted_resources` only when `conversion_id == selected_conversion_id` (inner loop with break), but `selected_resources` contains all selected resources. Later, it loops through `converted_resources.size()` and accesses `selected_resources.get(i)`, causing an out-of-bounds access when sizes differ.","fix":"Match the loop condition to `selected_resources.size()` instead of `converted_resources.size()`, or ensure equal-sized vectors are built by tracking conversion success per resource.","locations":[{"ref":"editor/docks/filesystem_dock.cpp:1978-2016","code":" 1978 | \tfor (Ref<Resource> res : selected_resources) {\n 1979 | \t\tVector<Ref<EditorResourceConversionPlugin>> conversions = EditorNode::get_singleton()->find_resource_conversion_plugin_for_resource(res);\n 1980 | \t\tfor (const Ref<EditorResourceConversionPlugin> &conversion : conversions) {\n 1981 | \t\t\tint conversion_id = 0;\n 1982 | \t\t\tfor (const String &target : cached_valid_conversion_targets) {\n 1983 | \t\t\t\tif (conversion_id == selected_conversion_id && conversion->converts_to() == target) {\n 1984 | \t\t\t\t\tRef<Resource> converted_res = conversion->convert(res);\n 1985 | \t\t\t\t\tERR_FAIL_COND(converted_res.is_null());\n 1986 | \t\t\t\t\tERR_FAIL_COND(res.is_null());\n 1987 | \t\t\t\t\tconverted_resources.push_back(converted_res);\n 1988 | \t\t\t\t\tresources_to_erase_history_for.insert(res);\n 1989 | \t\t\t\t\tbreak;\n 1990 | \t\t\t\t}\n 1991 | \t\t\t\tconversion_id++;\n 1992 | \t\t\t}\n 1993 | \t\t}\n 1994 | \t}\n 1995 | \n 1996 | \t// Clear history for the objects being replaced.\n 1997 | \tEditorUndoRedoManager *undo_redo = EditorUndoRedoManager::get_singleton();\n 1998 | \tfor (Ref<Resource> res : resources_to_erase_history_for) {\n 1999 | \t\tundo_redo->clear_history(true, undo_redo->get_history_id_for_object(res.ptr()));\n 2000 | \t}\n 2001 | \n 2002 | \t// Updates all the resources existing as node properties.\n 2003 | \tEditorNode::get_singleton()->replace_resources_in_scenes(selected_resources, converted_resources);\n 2004 | \n 2005 | \t// Overwrite the old resources.\n 2006 | \tfor (int i = 0; i < converted_resources.size(); i++) {\n 2007 | \t\tRef<Resource> original_resource = selected_resources.get(i);\n 2008 | \t\tRef<Resource> new_resource = converted_resources.get(i);\n 2009 | \n 2010 | \t\t// Notify plugins that the original resource is removed.\n 2011 | \t\temit_signal(SNAME(\"file_removed\"), original_resource->get_path());\n 2012 | \t\t// Overwrite the path.\n 2013 | \t\tnew_resource->set_path(original_resource->get_path(), true);\n 2014 | \n 2015 | \t\tResourceSaver::save(new_resource);\n 2016 | \t}","lines":39}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Inverted boolean logic in line 5115. The condition checks `!target_node || !target_node->is_queued_for_deletion()` but should be `!target_node || target_node->is_queued_for_deletion()` (missing negation on second part). The code attempts to reacquire the node when it exists AND is NOT marked for deletion, which is backwards - it should reacquire when it's marked for deletion or doesn't exist.","fix":"Change line 5115 from `if (!target_node || !target_node->is_queued_for_deletion())` to `if (!target_node || target_node->is_queued_for_deletion())`","locations":[{"ref":"editor/editor_node.cpp:5115","code":" 5115 | \t\t\tif (!target_node || !target_node->is_queued_for_deletion()) {","lines":1}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In CodeSignRequirements::_parse_key(), the r_pos variable is incremented at line 474 before being used at line 475. This causes incorrect pointer arithmetic when reading string data - it reads from the updated position (which is past the data) instead of the original position. The data buffer offset calculation becomes (new_r_pos + 4) instead of (original_r_pos + 4), reading from wrong memory location.","fix":"Move the r_pos increment to after the String::utf8() call, or save the position before incrementing: 'uint32_t old_pos = r_pos; r_pos += 4 + key_size + PAD(key_size, 4); r_out += \"[\" + String::utf8((const char *)blob.ptr() + old_pos + 4, key_size) + \"]\";'","locations":[{"ref":"editor/export/codesign.cpp:469-477","code":"  469 | _FORCE_INLINE_ void CodeSignRequirements::_parse_key(uint32_t &r_pos, String &r_out, uint32_t p_rq_size) const {\n  470 | #define _R(x) BSWAP32(*(uint32_t *)(blob.ptr() + x))\n  471 | \tERR_FAIL_COND_MSG(r_pos >= p_rq_size, \"CodeSign/Requirements: Out of bounds.\");\n  472 | \tconst uint32_t key_size = _R(r_pos);\n  473 | \tERR_FAIL_COND_MSG(r_pos + key_size > p_rq_size, \"CodeSign/Requirements: Out of bounds.\");\n  474 | \tr_pos += 4 + key_size + PAD(key_size, 4);\n  475 | \tr_out += \"[\" + String::utf8((const char *)blob.ptr() + r_pos + 4, key_size) + \"]\";\n  476 | #undef _R\n  477 | }","lines":9}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In CodeSignRequirements::_parse_value(), the same bug ex ng calculations in the file. This causes the embedded PCK to not be properly aligned to 8-byte boundaries.","fix":"Change 'int pad = f->get_position() % 8;' to 'int pad = _get_pad(8, f->get_position());' to match the pattern used elsewhere and correctly calculate padding to the next 8-byte boundary.","locations":[{"ref":"editor/export/editor_export_platform.cpp:2325-2325","code":" 2325 | \t\tint pad = f->get_position() % 8;","lines":1}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Incorrect padding calculation at line 2393. Uses 'uint64_t pad = embed_end % 8;' which computes the remainder instead of padding needed. Should use (8 - (embed_end % 8)) % 8 or equivalent logic. This causes embedded data to not be properly aligned to 8-byte boundaries.","fix":"Change 'uint64_t pad = embed_end % 8;' to 'uint64_t pad = (8 - (embed_end % 8)) % 8;' to correctly calculate padding to the next 8-byte boundary.","locations":[{"ref":"editor/export/editor_export_platform.cpp:2393-2393","code":" 2393 | \t\tuint64_t pad = embed_end % 8;","lines":1}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In EditorAbout::_license_tree_selected(), the result of _tpl_tree->get_selected() at line 106 is dereferenced at line 108 without null checking. Tree::get_selected() can return nullptr when no item is selected, causing a null pointer dereference crash.","fix":"Add ERR_FAIL_NULL check after line 106 to handle the case where get_selected() returns nullptr","locations":[{"ref":"editor/gui/editor_about.cpp:106-108","code":"  106 | \tTreeItem *selected = _tpl_tree->get_selected();\n  107 | \t_tpl_text->scroll_to_line(0);\n  108 | \t_tpl_text->set_text(selected->get_metadata(0));","lines":3}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Unchecked null dereference after get_node() call: At line 725, ap->get_
