ling _activate_submenu: if (mouse_over >= 0 && mouse_over < items.size() && items[mouse_over].submenu) { _activate_submenu(mouse_over); }","locations":[{"ref":"scene/gui/popup_menu.cpp:500-503","code":"  500 | void PopupMenu::_submenu_timeout() {\n  501 | \tif (mouse_over == submenu_over) {\n  502 | \t\t_activate_submenu(mouse_over);\n  503 | \t}","lines":4}]},{"id":"LOGIC_117","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Potential out-of-bounds array access. At lines 2951 and 3029, c_frame->lines[c_line] is accessed without validating that c_line is within valid bounds of the c_frame->lines vector. The _find_click function sets c_line but does not guarantee it's within bounds.","fix":"Add bounds check: if (c_frame && c_line >= 0 && c_line < (int)c_frame->lines.size())","locations":[{"ref":"scene/gui/rich_text_label.cpp:2951","code":" 2951 | \t\t\t\t\t\tconst Line &l = c_frame->lines[c_line];","lines":1},{"ref":"scene/gui/rich_text_label.cpp:3029","code":" 3029 | \t\t\t\t\tconst Line &l = c_frame->lines[c_line];","lines":1}]},{"id":"LOGIC_118","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Missing validation check: push_pulse() function lacks the ERR_FAIL_COND(current->type == ITEM_TABLE) safety check that all other push_* functions (push_fade, push_shake, push_wave, push_tornado, push_rainbow) have. This could allow invalid items to be added inside tables.","fix":"Add 'ERR_FAIL_COND(current->type == ITEM_TABLE);' after the MutexLock at line 5116","locations":[{"ref":"scene/gui/rich_text_label.cpp:5114-5122","code":" 5114 | void RichTextLabel::push_pulse(const Color &p_color, float p_frequency, float p_ease) {\n 5115 | \t_stop_thread();\n 5116 | \tMutexLock data_lock(data_mutex);\n 5117 | \n 5118 | \tItemPulse *item = memnew(ItemPulse);\n 5119 | \titem->color = p_color;\n 5120 | \titem->frequency = p_frequency;\n 5121 | \titem->ease = p_ease;\n 5122 | \t_add_item(item, true);","lines":9}]},{"id":"LOGIC_119","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In ScrollContainer drag deceleration (NOTIFICATION_INTERNAL_PROCESS), when deceleration reduces val_x or val_y to negative values, these negative values are used directly in line 619 to compute the new drag_speed. This causes reversed scroll direction instead of stopping. For example, if drag_speed.x=4 pixels/frame, after deceleration val_x becomes -12, resulting in drag_speed.x = -12, making content scroll backwards. Should clamp to 0.","fix":"Clamp val_x and val_y to 0 before using them at line 619. Change lines 605 and 613 to: 'val_x = MAX(0, val_x - 1000 * get_process_delta_time());' and similarly for val_y.","locations":[{"ref":"scene/gui/scroll_container.cpp:603-619","code":"  603 | \t\t\t\t\tfloat sgn_x = drag_speed.x < 0 ? -1 : 1;\n  604 | \t\t\t\t\tfloat val_x = Math::abs(drag_speed.x);\n  605 | \t\t\t\t\tval_x -= 1000 * get_process_delta_time();\n  606 | \n  607 | \t\t\t\t\tif (val_x < 0) {\n  608 | \t\t\t\t\t\tturnoff_h = true;\n  609 | \t\t\t\t\t}\n  610 | \n  611 | \t\t\t\t\tfloat sgn_y = drag_speed.y < 0 ? -1 : 1;\n  612 | \t\t\t\t\tfloat val_y = Math::abs(drag_speed.y);\n  613 | \t\t\t\t\tval_y -= 1000 * get_process_delta_time();\n  614 | \n  615 | \t\t\t\t\tif (val_y < 0) {\n  616 | \t\t\t\t\t\tturnoff_v = true;\n  617 | \t\t\t\t\t}\n  618 | \n  619 | \t\t\t\t\tdrag_speed = Vector2(sgn_x * val_x, sgn_y * val_y);","lines":17}]},{"id":"LOGIC_120","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Inverted condition at line 3372 in _update_placeholder(). Code checks if (placeholder_bidi_override.is_empty()) and then calls set_bidi_override with the empty array. Should be if (!placeholder_bidi_override.is_empty()) to only set when data exists. As written, bidi override is only set when it's empty, which is backwards.","fix":"Change condition from 'if (placeholder_bidi_override.is_empty())' to 'if (!placeholder_bidi_override.is_empty())'","locations":[{"ref":"scene/gui/text_edit.cpp:3371-3374","code":" 3371 | \tplaceholder_bidi_override = structured_text_parser(st_parser, st_args, placeholder_translated);\n 3372 | \tif (placeholder_bidi_override.is_empty()) {\n 3373 | \t\tTS->shaped_text_set_bidi_override(placeholder_data_buf->get_rid(), placeholder_bidi_override);\n 3374 | \t}","lines":4}]},{"id":"LOGIC_121","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Potential infinite loop in decompression loop. If StreamPeerGzip::put_partial_data() returns OK but w=0 (no data consumed), the while loop will never terminate because 'left -= w' won't change left and the while(left) condition remains true.","fix":"Add a check after put_partial_data to ensure w > 0. If w == 0 on OK, either break the loop or treat it as a decompression error, since no progress is being made.","locations":[{"ref":"scene/main/http_request.cpp:469-489","code":"  469 | \t\t\t\twhile (left) {\n  470 | \t\t\t\t\tint w = 0;\n  471 | \t\t\t\t\tError err = decompressor->put_partial_data(compressed.ptr() + pos, left, w);\n  472 | \t\t\t\t\tif (err == OK) {\n  473 | \t\t\t\t\t\tPackedByteArray dc;\n  474 | \t\t\t\t\t\tdc.resize(decompressor->get_available_bytes());\n  475 | \t\t\t\t\t\terr = decompressor->get_data(dc.ptrw(), dc.size());\n  476 | \t\t\t\t\t\tchunk.append_array(dc);\n  477 | \t\t\t\t\t}\n  478 | \t\t\t\t\tif (err != OK) {\n  479 | \t\t\t\t\t\t_defer_done(RESULT_BODY_DECOMPRESS_FAILED, response_code, response_headers, PackedByteArray());\n  480 | \t\t\t\t\t\treturn true;\n  481 | \t\t\t\t\t}\n  482 | \t\t\t\t\t// We need this check here because a \"zip bomb\" could result in a chunk of few kilos decompressing into gigabytes of data.\n  483 | \t\t\t\t\tif (body_size_limit >= 0 && final_body_size.get() + chunk.size() > body_size_limit) {\n  484 | \t\t\t\t\t\t_defer_done(RESULT_BODY_SIZE_LIMIT_EXCEEDED, response_code, response_headers, PackedByteArray());\n  485 | \t\t\t\t\t\treturn true;\n  486 | \t\t\t\t\t}\n  487 | \t\t\t\t\tpos += w;\n  488 | \t\t\t\t\tleft -= w;\n  489 | \t\t\t\t}","lines":21}]},{"id":"LOGIC_122","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Null pointer dereference in is_greater_than() at line 2185-2187. The while loop condition checks deep->data.depth but doesn't verify that deep->data.parent is non-null before dereferencing it. If the tree depths are inconsistent or a node's parent is unexpectedly null, the assignment at line 2186 (deep = deep->data.parent) will set deep to null, and the next iteration will try to access deep->data.depth on a null pointer.","fix":"Add a null check for deep->data.parent before assignment: while (deep->data.depth > shallow->data.depth) { if (!deep->data.parent) break; deep = deep->data.parent; }","locations":[{"ref":"scene/main/node.cpp:2185-2187","code":" 2185 | \twhile (deep->data.depth > shallow->data.depth) {\n 2186 | \t\tdeep = deep->data.parent;\n 2187 | \t}","lines":3}]},{"id":"LOGIC_123","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In _make_transient(), if get_parent_visible_window() returns nullptr, then transient_parent is never initialized but is accessed on line 1150, causing a null pointer dereference.","fix":"Add a null check before accessing transient_parent on line 1150. Should be: if (window && transient_parent && transient_parent->window_id != DisplayServerEnums::INVALID_WINDOW_ID && window_id != DisplayServerEnums::INVALID_WINDOW_ID)","locations":[{"ref":"scene/main/window.cpp:1143-1152","code":" 1143 | \tif (window) {\n 1144 | \t\ttransient_parent = window;\n 1145 | \t\twindow->transient_children.insert(this);\n 1146 | \t\t_set_transient_exclusive_child();\n 1147 | \t}\n 1148 | \n 1149 | \t//see if we can make transient\n 1150 | \tif (transient_parent->window_id != DisplayServerEnums::INVALID_WINDOW_ID && window_id != Display om_data_layers_by_name.has(p_value))' will never be true because an empty string would never be a key in the map. More importantly, when renaming a layer to a new non-empty name, the old name entry is never removed from the custom_data_layers_by_name map, causing stale references.","fix":"Replace the logic at lines 1129-1133 with proper handling of renaming: first remove the old layer name from the map if it exists, then add the new name. Should be something like: 'for (auto it = custom_data_layers_by_name.begin(); it != custom_data_layers_by_name.end(); ++it) { if (it->value == p_layer_id) { custom_data_layers_by_name.erase(it->key); break; } } if (!p_value.is_empty()) { custom_data_layers_by_name[p_value] = p_layer_id; }'","locations":[{"ref":"scene/resources/2d/tile_set.cpp:1117-1137","code":" 1117 | void TileSet::set_custom_data_layer_name(int p_layer_id, String p_value) {\n 1118 | \tERR_FAIL_INDEX(p_layer_id, custom_data_layers.size());\n 1119 | \n 1120 | \t// Exit if another property has the same name.\n 1121 | \tif (!p_value.is_empty()) {\n 1122 | \t\tfor (int other_layer_id = 0; other_layer_id < get_custom_data_layers_count(); other_layer_id++) {\n 1123 | \t\t\tif (other_layer_id != p_layer_id && get_custom_data_layer_name(other_layer_id) == p_value) {\n 1124 | \t\t\t\tERR_FAIL_MSG(vformat(\"There is already a custom property named %s\", p_value));\n 1125 | \t\t\t}\n 1126 | \t\t}\n 1127 | \t}\n 1128 | \n 1129 | \tif (p_value.is_empty() && custom_data_layers_by_name.has(p_value)) {\n 1130 | \t\tcustom_data_layers_by_name.erase(p_value);\n 1131 | \t} else {\n 1132 | \t\tcustom_data_layers_by_name[p_value] = p_layer_id;\n 1133 | \t}\n 1134 | \n 1135 | \tcustom_data_layers.write[p_layer_id].name = p_value;\n 1136 | \temit_changed();\n 1137 | }","lines":21}]},{"id":"LOGIC_127","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Inverted logic in cleanup_invalid_tile_proxies() function. The function is named to clean up IN k(a);\n 1349 | \t\t}\n 1350 | \t}\n 1351 | \tfor (int i = 0; i < alternative_to_remove.size(); i++) {\n 1352 | \t\tArray a = alternative_to_remove[i];\n 1353 | \t\tremove_alternative_level_tile_proxy(a[0], a[1], a[2]);\n 1354 | \t}\n 1355 | }","lines":38}]},{"id":"LOGIC_128","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"TileSet::TileData::duplicate() at line 6189 hardcodes terrain_set to -1 instead of copying from the source tile's terrain_set. All other properties are correctly copied (flip_h, flip_v, transpose, texture_origin, material, modulate, z_index, y_sort_origin, occluders, physics, probability, custom_data, and terrain_peering_bits), but terrain_set is unconditionally reset to -1, causing duplicated tiles to lose their terrain association.","fix":"Change line 6189 from `output->terrain_set = -1;` to `output->terrain_set = terrain_set;` to properly copy the terrain_set value from the source tile.","locations":[{"ref":"scene/resources/2d/tile_set.cpp:6189","code":" 6189 | \toutput->terrain_set = -1;","lines":1}]},{"id":"LOGIC_129","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"track_move_down has incorrect bounds checking. The condition `(uint32_t)p_track < tracks.size()` at line 3894 allows p_track=0, which then attempts to swap with tracks[p_track - 1] = tracks[-1], causing an out-of-bounds array access when p_track is 0. The check should ensure p_track > 0.","fix":"Change line 3894 from `if ((uint32_t)p_track < tracks.size())` to `if ((uint32_t)p_track > 0 && (uint32_t)p_track < tracks.size())` or simply `if (p_track > 0)`. This prevents attempting to access index -1 when p_track=0.","locations":[{"ref":"scene/resources/animation.cpp:3893-3899","code":" 3893 | void Animation::track_move_down(int p_track) {\n 3894 | \tif ((uint32_t)p_track < tracks.size()) {\n 3895 | \t\tSWAP(tracks[p_track], tracks[p_track - 1]);\n 3896 | \t}\n 3897 | \n 3898 | \temit_changed();\n 3899 | }","lines":7}]},{"id":"LOGIC_130","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Division by zero risk when computing linear tangents. When setting tangent mode to TANGENT_LINEAR, the code computes v.y / v.x where v is a normalized vector. For vertical tangent directions (where v.x = 0), this causes division by zero, producing infinite or NaN values in tangent calculations.","fix":"Add a check to handle the case when v.x is zero or near-zero: if (Math::is_zero_approx(v.x)) { tangent = INFINITY; } else { tangent = v.y / v.x; }. Alternatively, use a different tangent representation that doesn't require division.","locations":[{"ref":"scene/resources/curve.cpp:194","code":"  194 | \t\t\t_points[p_index].left_tangent = v.y / v.x;","lines":1},{"ref":"scene/resources/curve.cpp:206","code":"  206 | \t\t\t_points[p_index].right_tangent = v.y / v.x;","lines":1},{"ref":"scene/resources/curve.cpp:297","code":"  297 | \t\t\tp.left_tangent = v.y / v.x;","lines":1},{"ref":"scene/resources/curve.cpp:301","code":"  301 | \t\t\t_points[p_index - 1].right_tangent = v.y / v.x;","lines":1},{"ref":"scene/resources/curve.cpp:308","code":"  308 | \t\t\tp.right_tangent = v.y / v.x;","lines":1},{"ref":"scene/resources/curve.cpp:312","code":"  312 | \t\t\t_points[p_index + 1].left_tangent = v.y / v.x;","lines":1}]},{"id":"LOGIC_131","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Divide-by-zero error in GradientTexture1D::_update() when width is 1. The validation in set_width() allows width >= 1, but the update code divides by (width-1) without checking for width==1.","fix":"Add a check before the loop: if (width < 2) return; or use MAX(width - 1, 1) instead of (width - 1) in the denominator.","locations":[{"ref":"scene/resources/gradient_texture.cpp:104","code":"  104 | \t\t\tfloat ofs = float(i) / (width - 1);","lines":1},{"ref":"scene/resources/gradient_texture.cpp:123","code":"  123 | \t\t\t\tfloat ofs = float(i) / (width - 1);","lines":1}]},{"id":"LOGIC_132","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Missing bounds checking for index values read from ir[j-2], ir[j-1], and ir[j] in PRIMITIVE_TRIANGLE_STRIP processing. While line 360 checks 'index >= vc' for the PRIMITIVE_TRIANGLES case, the TRIANGLE_STRIP case (lines 364-374) directly accesses vr[ir[j-2]], vr[ir[j-1]], and vr[ir[j]] without validating that these loaded indices are within bounds [0, vc). This can cause out-of-bounds reads if the index buffer contains negative values or values >= vc.","fix":"Add explicit bounds checking for each index: ERR_FAIL_COND_V(ir[j-2] < 0 || ir[j-2] >= vc, ...) and similarly for ir[j-1] and ir[j] before dereferencing vr[index].","locations":[{"ref":"scene/resources/mesh.cpp:357-375","code":"  357 | \t\t\tif (primitive == PRIMITIVE_TRIANGLES) {\n  358 | \t\t\t\tfor (int j = 0; j < ic; j++) {\n  359 | \t\t\t\t\tint index = ir[j];\n  360 | \t\t\t\t\tERR_FAIL_COND_V(index >= vc, Ref<TriangleMesh>());\n  361 | \t\t\t\t\tfacesw[widx++] = vr[index];\n  362 | \t\t\t\t}\n  363 | \t\t\t} else { // PRIMITIVE_TRIANGLE_STRIP\n  364 | \t\t\t\tfor (int j = 2; j < ic; j++) {\n  365 | \t\t\t\t\tif (j % 2 == 0) {\n  366 | \t\t\t\t\t\tfacesw[widx++] = vr[ir[j - 2]];\n  367 | \t\t\t\t\t\tfacesw[widx++] = vr[ir[j - 1]];\n  368 | \t\t\t\t\t\tfacesw[widx++] = vr[ir[j]];\n  369 | \t\t\t\t\t} else {\n  370 | \t\t\t\t\t\tfacesw[widx++] = vr[ir[j - 2]];\n  371 | \t\t\t\t\t\tfacesw[widx++] = vr[ir[j]];\n  372 | \t\t\t\t\t\tfacesw[widx++] = vr[ir[j - 1]];\n  373 | \t\t\t\t\t}\n  374 | \t\t\t\t}\n  375 | \t\t\t}","lines":19}]},{"id":"LOGIC_133","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Missing emit_changed() call in set_instance_transform (3D). The 2D variant (set_instance_transform_2d at line 268) calls emit_changed() to notify observers of changes, but the 3D variant (set_instance_transform at line 261) does not. This inconsistency means 3D transform changes won't trigger property updates, potentially causing UI/editor synchronization issues.","fix":"Add 'emit_changed();' call after line 261 in set_instance_transform, matching the behavior of set_instance_transform_2d.","locations":[{"ref":"scene/resources/multimesh.cpp:258-262","code":"  258 | void MultiMesh::set_instance_transform(int p_instance, const Transform3D &p_transform) {\n  259 | \tERR_FAIL_INDEX_MSG(p_instance, instance_count, \"Instance index out of bounds. Instance index must be less than `instance_count` and greater than or equal to zero.\");\n  260 | \tERR_FAIL_COND_MSG(transform_format == TRANSFORM_2D, \"Can't set Transform3D on a Multimesh configured to use Transform2D. Ensure that you have set the `transform_format` to `TRANSFORM_3D`.\");\n  261 | \tRenderingServer::get_singleton()->multimesh_instance_set_transform(multimesh, p_instance, p_transform);\n  262 | }","lines":5}]},{"id":"LOGIC_134","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Division by zero in ParticleProcessMaterial::set_sub_emitter_frequency(). The method divides 1.0 by p_frequency without checking if it's zero. The default value of sub_emitter_frequency is 0.0, so this division by zero can occur if the setter is called with 0 or if the default is used.","fix":"Add validation to check that p_frequency is not zero before division. Either reject zero values with ERR_FAIL_COND, use a safe default frequency value, or clamp the value to a non-zero minimum.","locations":[{"ref":"scene/resources/particle_process_material.cpp:2296-2299","code":" 2296 | void ParticleProcessMaterial::set_sub_emitter_frequency(double p_frequency) {\n 2297 | \tsub_emitter_frequency = p_frequency;\n 2298 | \tRenderingServer::get_singleton()->material_set_param(_get_material(), shader_names->sub_emitter_frequency, 1.0 / p_frequency); //pass delta instead of frequency, since its easier to compute\n 2299 | }","lines":4}]},{"id":"LOGIC_135","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Incorrect arithmetic in AudioFilterSW::prepare_coefficients() at lines 183-184. The division operations use '0.0 - a0' instead of '-a0'. While mathematically equivalent (0.0 - a0 = -a0), this pattern is unusual and suggests a copy-paste error or typo. The expression '/= 0.0 - a0' is equivalent to '/= -a0', but writing it this way is confusing and potentially indicates an unintended operation. This affects filter coefficient calculations and could lead to incorrect audio filtering.","fix":"Change 'p_coeffs->a1 /= 0.0 - a0;' to 'p_coeffs->a1 /= -a0;' and 'p_coeffs->a2 /= 0.0 - a0;' to 'p_coeffs->a2 /= -a0;'","locations":[{"ref":"servers/audio/audio_filter_sw.cpp:183-184","code":"  183 | \tp_coeffs->a1 /= 0.0 - a0;\n  184 | \tp_coeffs->a2 /= 0.0 - a0;","lines":2}]},{"id":"LOGIC_136","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Buffer overflow in AudioServer::start_playback_stream(). The loop iterating over p_bus_volumes (line 1257) does not check if idx >= MAX_BUSES_PER_PLAYBACK before writing to bus_details arrays at lines 1264-1268. This allows unbounded writes to fixed-size arrays, causing buffer overflow when more than MAX_BUSES_PER_PLAYBACK (6) buses are provided. The similar function set_playback_bus_volumes_linear() correctly checks idx >= MAX_BUSES_PER_PLAYBACK at line 1349.","fix":"Add a bounds check before accessing the arrays: if (idx >= MAX_BUSES_PER_PLAYBACK) break; at line 1257-1258 (or after checking the pair.value.size())","locations":[{"ref":"servers/audio/audio_server.cpp:1257-1270","code":" 1257 | \tfor (KeyValue<StringName, Vector<AudioFrame>> pair : p_bus_volumes) {\n 1258 | \t\tif (pair.value.size() < channel_count || pair.value.size() != MAX_CHANNELS_PER_BUS) {\n 1259 | \t\t\tdelete playback_node;\n 1260 | \t\t\tdelete new_bus_details;\n 1261 | \t\t\tERR_FAIL();\n 1262 | \t\t}\n 1263 | \n 1264 | \t\tnew_bus_details->bus_active[idx] = true;\n 1265 | \t\tnew_bus_details->bus[idx] = pair.key;\n 1266 | \t\tfor (int channel_idx = 0; channel_idx < MAX_CHANNELS_PER_BUS; channel_idx++) {\n 1267 | \t\t\tnew_bus_details->volume[idx][channel_idx] = pair.value[channel_idx];\n 1268 | \t\t}\n 1269 | \t\tidx++;\n 1270 | \t}","lines":14}]},{"id":"LOGIC_137","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Type mismatch in bounds check: fftBufferSize (bytes) is compared against MAX_FRAME_LENGTH (element count). This check will always trigger false positive for valid FFT sizes (256-4096), causing the function to return early with an error instead of processing audio. fftBufferSize = fftFrameSize * sizeof(float) will be 1024-16384 bytes, compared to MAX_FRAME_LENGTH = 8192 (elements). Should compare fftFrameSize > MAX_FRAME_LENGTH instead.","fix":"Change line 165 from 'if (unlikely(fftBufferSize > MAX_FRAME_LENGTH))' to 'if (unlikely(fftFrameSize > MAX_FRAME_LENGTH))'","locations":[{"ref":"servers/audio/effects/audio_effect_pitch_shift.cpp:165","code":"  165 | \t\t\tif (unlikely(fftBufferSize > MAX_FRAME_LENGTH)) {","lines":1}]},{"id":"LOGIC_138","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Incorrect validation check in voxel_gi_get_distance_field - checks data_buffer.is_valid() but uses sdf_texture. If data_buffer is valid but sdf_texture is null, the function will attempt to call texture_get_data on a null/invalid texture, resulting in undefined behavior or crash.","fix":"Change line 231 from 'if (voxel_gi->data_buffer.is_valid())' to 'if (voxel_gi->sdf_texture.is_valid())' to properly validate the texture before accessing it.","locations":[{"ref":"servers/rendering/renderer_rd/environment/gi.cpp:231-232","code":"  231 | \tif (voxel_gi->data_buffer.is_valid()) {\n  232 | \t\treturn RD::get_singleton()->texture_get_data(voxel_gi->sdf_texture, 0);","lines":2}]},{"id":"LOGIC_139","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Incorrect logical operator in roughness hint check: uses OR instead of AND. Line 996 checks `hint >= HINT_ROUGHNESS_R || hint <= HINT_ROUGHNESS_GRAY`, which will always be true for any hint value (since any value is either >= some value OR <= some value). Should use AND (&&) to check if hint is within the range [HINT_ROUGHNESS_R, HINT_ROUGHNESS_GRAY].","fix":"Change `||` to `&&` in the condition: `(p_texture_uniforms[i].hint >= ShaderLanguage::ShaderNode::Uniform::HINT_ROUGHNESS_R && p_texture_uniforms[i].hint <= ShaderLanguage::ShaderNode::Uniform::HINT_ROUGHNESS_GRAY)`","locations":[{"ref":"servers/rendering/renderer_rd/storage_rd/material_storage.cpp:996","code":"  996 | \t\t\t\t\tif (tex->detect_roughness_callback && (p_texture_uniforms[i].hint >= ShaderLanguage::ShaderNode::Uniform::HINT_ROUGHNESS_R || p_texture_uniforms[i].hint <= ShaderLanguage::ShaderNode::Uniform::HINT_ROUGHNESS_GRAY)) {","lines":1}]},{"id":"LOGIC_140","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In create_texture_view(), the function calls update_sizes(named_texture) but should call update_sizes(view_texture). The view_texture was just created on line 381 and needs its 'sizes' array initialized. Currently, the original named_texture's sizes get updated instead, leaving the newly-created view_texture with uninitialized sizes. This will cause get_texture_slice_size() to return garbage values when called on the view texture.","fix":"Change 'update_sizes(named_texture)' to 'update_sizes(view_texture)' on line 386 to initialize the correct texture's sizes array.","locations":[{"ref":"servers/rendering/renderer_rd/storage_rd/render_scene_buffers_rd.cpp:386-386","code":"  386 | \tupdate_sizes(named_texture);","lines":1}]},{"id":"LOGIC_141","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Logic error in texture dimension validation: Line 3066 uses AND operator (`&&`) when it should use OR operator (`||`). Currently checks `src_tex->width != dst_tex->width && src_tex->height != dst_tex->height && src_tex->depth != dst_tex->depth`, which only fails if ALL three dimensions differ. Should fail if ANY dimension differs.","fix":"Change `&&` to `||`: `ERR_FAIL_COND_V_MSG(src_tex->width != dst_tex->width || src_tex->height != dst_tex->height || src_tex->depth != dst_tex->depth, ...)`","locations":[{"ref":"servers/rendering/rendering_device.cpp:3066","code":" 3066 | \tERR_FAIL_COND_V_MSG(src_tex->width != dst_tex->width && src_tex->height != dst_tex->height && src_tex->depth != dst_tex->depth, ERR_INVALID_PARAMETER, \"Source and Destination textures must have the same dimensions.\");","lines":1}]},{"id":"LOGIC_142","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Off-by-one logic error in draw_list_bind_uniform_set, identical to the compute_list version. Condition at line 5783 uses '>' instead of '>=', causing the same set_count tracking issue.","fix":"Change line 5783 from 'if (p_index > draw_list.state.set_count)' to 'if (p_index >= draw_list.state.set_count)' and line 5784 from 'draw_list.state.set_count = p_index;' to 'draw_list.state.set_count = p_index + 1;'","locations":[{"ref":"servers/rendering/rendering_device.cpp:5783-5785","code":" 5783 | \tif (p_index > draw_list.state.set_count) {\n 5784 | \t\tdraw_list.state.set_count = p_index;\n 5785 | \t}","lines":3}]},{"id":"LOGIC_143","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Off-by-one logic error in compute_list_bind_uniform_set. The condition at line 6752 uses '>' instead of '>=', and line 6753 sets set_count=p_index instead of p_index+1. This causes the first bound uniform set at index 0 to not be counted in set_count, potentially skipping its execution in the dispatch loop which checks 'i < set_count'.","fix": lats;\n  249 | \tconst double lon_step = Math::TAU / p_lons;","lines":2}]},{"id":"LOGIC_146","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Line 2268: Logic error in division validation. Condition 'p_ret_type == TYPE_UINT && p_ret_type <= TYPE_UVEC4' is impossible - p_ret_type cannot be equal to TYPE_UINT AND be less than or equal to TYPE_UVEC4 simultaneously. Should use >= to check if p_ret_type is in the unsigned integer range. This prevents unsigned integer division by zero detection.","fix":"Change 'p_ret_type == TYPE_UINT &&' to 'p_ret_type >= TYPE_UINT &&'","locations":[{"ref":"servers/rendering/shader_language.cpp:2268","code":" 2268 | \t\t\t} else if (p_ret_type == TYPE_UINT && p_ret_type <= TYPE_UVEC4) {","lines":1}]},{"id":"LOGIC_147","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"MAGIC_POSITION_WRITE check has a critical logic bug: multiple consecutive _get_token() calls in the same if condition each advance the token position independently. The check expects the tokens to be TK_OP_ASSIGN, TK_TYPE_VEC4, TK_PARENTHESIS_OPEN, and TK_COMMA in sequence, but each _get_token() call advances past one token, making the entire pattern check impossible to succeed. For example, after _get_token() returns type TK_OP_ASSIGN, the next _get_token() call will check the token AFTER TK_TYPE_VEC4, not TK_TYPE_VEC4 itself.","fix":"Save each token result in a variable and check in sequence, or use separate _get_token() calls with _set_tkpos() for backtracking.","locations":[{"ref":"servers/rendering/shader_language.cpp:6681-6691","code":" 6681 | \t\t\t\t\t\t\tTkPos prev_pos = _get_tkpos();\n 6682 | \t\t\t\t\t\t\tif (_get_token().type == TK_OP_ASSIGN &&\n 6683 | \t\t\t\t\t\t\t\t\t_get_token().type == TK_TYPE_VEC4 &&\n 6684 | \t\t\t\t\t\t\t\t\t_get_token().type == TK_PARENTHESIS_OPEN &&\n 6685 | \t\t\t\t\t\t\t\t\t_get_token().text == \"VERTEX\" &&\n 6686 | \t\t\t\t\t\t\t\t\t_get_token(). esses section_line[p_section_index].second without bounds checking. If p_section_index is out of range, this will cause undefined behavior. Should validate p_section_index < section_line.size() first.","fix":"Add bounds check: if (p_section_index < 0 || p_section_index >= section_line.size()) { ERR_FAIL_COND(...); return; } before accessing section_line[p_section_index].","locations":[{"ref":"editor/doc/editor_help.cpp:3381-3389","code":" 3381 | void EditorHelp::scroll_to_section(int p_section_index) {\n 3382 | \t_wait_for_thread();\n 3383 | \tint line = section_line[p_section_index].second;\n 3384 | \tif (class_desc->is_finished()) {\n 3385 | \t\tclass_desc->scroll_to_paragraph(line);\n 3386 | \t} else {\n 3387 | \t\tscroll_to = line;\n 3388 | \t}\n 3389 | }","lines":9}]},{"id":"LOGIC_154","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Unsigned integer underflow when computing paragraph index. On line 409, log->get_paragraph_count() - 2 is called without checking if the count is >= 2. If paragraph count is 0 or 1, this causes an underflow to a very large unsigned value (e.g., SIZE_MAX - 1), which is then passed to remove_paragraph(), potentially corrupting the UI or causing undefined behavior.","fix":"Add bounds check before the subtraction: if (log->get_paragraph_count() >= 2) { log->remove_paragraph(log->get_paragraph_count() - 2); }","locations":[{"ref":"editor/editor_log.cpp:409","code":"  409 | \t\tlog->remove_paragraph(log->get_paragraph_count() - 2);","lines":1}]},{"id":"LOGIC_155","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"At line 2119, get_slice(\"::\", 2) is used to extract the script path from a dependency string, but this returns an empty string when the format is \"path::type\" (which has only 2 parts: indices 0 and 1). This should be get_slice(\"::\", 0) to get the path component, as used in line 1000. The current code silently fails to look up the icon y_local_transform() at lines 2031-2033. The condition 'if (is_y_sort_enabled())' inside 'if (!notify)' can never be true because notify was already set to (is_using_kinematic_bodies() || is_y_sort_enabled()), so if it's false here, is_y_sort_enabled() must be false.","fix":"Remove the redundant inner if statement (lines 2031-2034), or restructure the logic to be clearer about the intent.","locations":[{"ref":"scene/2d/tile_map_layer.cpp:2028-2035","code":" 2028 | void TileMapLayer::_update_notify_local_transform() {\n 2029 | \tbool notify = is_using_kinematic_bodies() || is_y_sort_enabled();\n 2030 | \tif (!notify) {\n 2031 | \t\tif (is_y_sort_enabled()) {\n 2032 | \t\t\tnotify = true;\n 2033 | \t\t}\n 2034 | \t}\n 2035 | \tset_notify_local_transform(notify);","lines":8}]},{"id":"LOGIC_220","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In fit_rect_in_parent(), the bounds checking on lines 2340-2345 uses p_parent_rect.size directly but should account for p_parent_rect.position. The function assumes parent rect starts at (0,0) when it doesn't.","fix":"Replace 'Size2i limit = p_parent_rect.size' with 'Size2i limit = p_parent_rect.position + p_parent_rect.size' and adjust all subsequent comparisons to use p_parent_rect.position as reference.","locations":[{"ref":"scene/main/window.cpp:2337-2358","code":" 2337 | Rect2i Window::fit_rect_in_parent(Rect2i p_rect, const Rect2i &p_parent_rect) const {\n 2338 | \tERR_READ_THREAD_GUARD_V(Rect2i());\n 2339 | \tSize2i limit = p_parent_rect.size;\n 2340 | \tif (p_rect.position.x + p_rect.size.x > limit.x) {\n 2341 | \t\tp_rect.position.x = limit.x - p_rect.size.x;\n 2342 | \t}\n 2343 | \tif (p_rect.position.y + p_rect.size.y > limit.y) {\n 2344 | \t\tp_rect.position.y = limit.y - p_rect.size.y;\n 2345 | \t}\n 2346 | \n 2347 | \tif (p_rect.position.x < 0) {\n 2348 | \t\tp_rect.position.x = 0;\n 2349 | \t}\n 2350 | \n 2351 | \tint title_height = get_flag(Window::FLAG_BORDERLESS) ? 0 : theme_cache.title_height;\n 2352 | \n 2353 | \tif (p_rect.position.y < title_height) {\n 2354 | \t\tp_rect.position.y = title_height;\n 2355 | \t}\n 2356 | \n 2357 | \treturn p_rect;\n 2358 | }","lines":22}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"critical","easy":true,"description":"EditorPropertyMultilineText has duplicate class name in method signatures. Lines 399, 407, 411, 419 all have 'EditorPropertyMultilineText::EditorPropertyMultilineText::' instead of just 'EditorPropertyMultilineText::', causing syntax errors.","fix":"Remove the duplicate class name from all four method signatures:\n- Line 399: void EditorPropertyMultilineText::set_monospaced(bool p_monospaced)\n- Line 407: bool EditorPropertyMultilineText::get_monospaced()\n- Line 411: void EditorPropertyMultilineText::set_wrap_lines(bool p_wrap_lines)\n- Line 419: bool EditorPropertyMultilineText::get_wrap_lines()","locations":[{"ref":"editor/inspector/editor_properties.cpp:399-420","code":"  399 | void EditorPropertyMultilineText::EditorPropertyMultilineText::set_monospaced(bool p_monospaced) {\n  400 | \tif (p_monospaced == monospaced) {\n  401 | \t\treturn;\n  402 | \t}\n  403 | \tmonospaced = p_monospaced;\n  404 | \t_update_theme();\n  405 | }\n  406 | \n  407 | bool EditorPropertyMultilineText::EditorPropertyMultilineText::get_monospaced() {\n  408 | \treturn monospaced;\n  409 | }\n  410 | \n  411 | void EditorPropertyMultilineText::EditorPropertyMultilineText::set_wrap_lines(bool p_wrap_lines) {\n  412 | \tif (p_wrap_lines == wrap_lines) {\n  413 | \t\treturn;\n  414 | \t}\n  415 | \twrap_lines = p_wrap_lines;\n  416 | \t_update_theme();\n  417 | }\n  418 | \n  419 | bool EditorPropertyMultilineText::EditorPropertyMultilineText::get_wrap_lines() {\n  420 | \treturn wrap_lines;","lines":22}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"critical","easy":true,"description":"Double plus operator syntax error in string concatenation. Line 3954 has 'boot_logo_path + +' which should be 'boot_logo_path +'. The extra plus operator will cause a compilation error.","fix":"Change 'boot_logo_path + +' to 'boot_logo_path +' on line 3954. The full corrected line should be: ERR_PRINT(\"Non-existing or invalid boot splash at '\" + boot_logo_path + \"'. \" + msg + \" Loading default splash.\");","locations":[{"ref":"main/main.cpp:3954","code":" 3954 | \t\t\t\t\tERR_PRINT(\"Non-existing or invalid boot splash at '\" + boot_logo_path + +\"'. \" + msg + \" Loading default splash.\");","lines":1}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"critical","easy":true,"description":"In PackedArray decode loop (lines 1011-1044), the set() calls use wrong index variable. All iterations set value_index instead of j, causing data corruption. The loop index j is ignored.","fix":"Change packed_array.set(value_index, ...) to packed_array.set(j, ...) in all five cases (PACKED_BYTE_ARRAY, PACKED_INT32_ARRAY, PACKED_INT64_ARRAY, PACKED_FLOAT32_ARRAY, PACKED_FLOAT64_ARRAY).","locations":[{"ref":"modules/gltf/structures/gltf_accessor.cpp:1015","code":" 1015 | \t\t\t\t\tpacked_array.set(value_index, numbers[number_index + j]);","lines":1},{"ref":"modules/gltf/structures/gltf_accessor.cpp:1022","code":" 1022 | \t\t\t\t\tpacked_array.set(value_index, numbers[number_index + j]);","lines":1},{"ref":"modules/gltf/structures/gltf_accessor.cpp:1029","code":" 1029 | \t\t\t\t\tpacked_array.set(value_index, numbers[number_index + j]);","lines":1},{"ref":"modules/gltf/structures/gltf_accessor.cpp:1036","code":" 1036 | \t\t\t\t\tpacked_array.set(value_index, numbers[number_index + j]);","lines":1},{"ref":"modules/gltf/structures/gltf_accessor.cpp:1043","code":" 1043 | \t\t\t\t\tpacked_array.set(value_index, numbers[number_index + j]);","lines":1}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Incorrect error message format in script reload error handling. Line 711 incorrectly includes error_names[err] in the message context where err refers to a previous ResourceLoader operation, not the current null script check. The message text says 'Not a script!' but then appends an unrelated error code, which is misleading and incorrect.","fix":"Remove error_names[err] from the vformat call: ERR_CONTINUE_MSG(script.is_null(), vformat(\"Could not reload script '%s': Not a script!\", path));","locations":[{"ref":"core/debugger/remote_debugger.cpp:711","code":"  711 | \t\t\t\tERR_CONTINUE_MSG(script.is_null(), vformat(\"Could not reload script '%s': Not a script!\", path, error_names[err]));","lines":1}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Color::hash() function hashes component 'r' twice instead of hashing all four components (r, g, b, a). Line 245 hashes 'r' when it should hash 'g'. This causes incorrect hash values for colors that differ only in the green or blue channels, potentially leading to hash collisions and incorrect behavior in hash-based collections.","fix":"Change line 245 from 'h = hash_murmur3_one_float(r, h);' to 'h = hash_murmur3_one_float(g, h);' to correctly hash the green component after the red component.","locations":[{"ref":"core/math/color.h:245","code":"  245 | \t\th = hash_murmur3_one_float(r, h);","lines":1}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In Dictionary::set_typed(const ContainerType &p_key_type, const ContainerType &p_value_type), the wrong script parameter is passed to the implementation function. The third parameter should be p_value_type.script but instead p_key_type.script is passed, causing value_type to be initialized with the key_type's script instead of its own.","fix":"Change line 641 from:\n\tset_typed(p_key_type.builtin_type, p_key_type.class_name, p_key_type.script, p_value_type.builtin_type, p_value_type.class_name, p_key_type.script);\nto:\n\tset_typed(p_key_type.builtin_type, p_key_type.class_name, p_key_type.script, p_value_type.builtin_type, p_value_type.class_name, p_value_type.script);","locations":[{"ref":"core/variant/dictionary.cpp:641-641","code":"  641 | \tset_typed(p_key_type.builtin_type, p_key_type.class_name, p_key_type.script, p_value_type.builtin_type, p_value_type.class_name, p_key_type.script);","lines":1}]},{"id":"CPY_7","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Copy-paste bug in operator Vector2i(). Four branches (lines 1769, 1771, 1773, 1775) return Vector2() instead of Vector2i(). This causes implicit type conversion where int vectors are incorrectly returned as float vectors. The function signature is 'operator Vector2i()' but returns Vector2 in the fallback cases for VECTOR3, VECTOR3I, VECTOR4, and VECTOR4I types.","fix":"Change all occurrences of 'Vector2(' to 'Vector2i(' in lines 1769, 1771, 1773, 1775. For example, line 1769: 'return Vector2(reinterpret_cast<const Vector3 *>(_data._mem)->x, reinterpret_cast<const Vector3 *>(_data._mem)->y);' should be 'return Vector2i(reinterpret_cast<const Vector3 *>(_data._mem)->x, reinterpret_cast<const Vector3 *>(_data._mem)->y);'","locations":[{"ref":"core/variant/variant.cpp:1763-1779","code":" 1763 | Variant::operator Vector2i() const {\n 1764 | \tif (type == VECTOR2I) {\n 1765 | \t\treturn *reinterpret_cast<const Vector2i *>(_data._mem);\n 1766 | \t} else if (type == VECTOR2) {\n 1767 | \t\treturn *reinterpret_cast<const Vector2 *>(_data._mem);\n 1768 | \t} else if (type == VECTOR3) {\n 1769 | \t\treturn Vector2(reinterpret_cast<const Vector3 *>(_data._mem)->x, reinterpret_cast<const Vector3 *>(_data._mem)->y);\n 1770 | \t} else if (type == VECTOR3I) {\n 1771 | \t\treturn Vector2(reinterpret_cast<const Vector3i *>(_data._mem)->x, reinterpret_cast<const Vector3i *>(_data._mem)->y);\n 1772 | \t} else if (type == VECTOR4) {\n 1773 | \t\treturn Vector2(reinterpret_cast<const Vector4 *>(_data._mem)->x, reinterpret_cast<const Vector4 *>(_data._mem)->y);\n 1774 | \t} else if (type == VECTOR4I) {\n 1775 | \t\treturn Vector2(reinterpret_cast<const Vector4i *>(_data._mem)->x, reinterpret_cast<const Vector4i *>(_data._mem)->y);\n 1776 | \t} else {\n 1777 | \t\treturn Vector2i();\n 1778 | \t}\n 1779 | }","lines":17}]},{"id":"CPY_8","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Duplicate buffer deletion in destructor. Lines 2906-2907 delete data.canvas_quad_vertices and data.canvas_quad_array, then lines 2909-2910 immediately repeat the same deletion. This will attempt to delete already-freed resources, causing undefined behavior.","fix":"Remove the duplicate deletion at lines 2909-2910. These should likely be deletion of particle_quad_vertices and particle_quad_array instead, or should simply be removed.","locations":[{"ref":"drivers/gles3/rasterizer_canvas_gles3.cpp:2906-2910","code":" 2906 | \tglDeleteBuffers(1, &data.canvas_quad_vertices);\n 2907 | \tglDeleteVertexArrays(1, &data.canvas_quad_array);\n 2908 | \n 2909 | \tglDeleteBuffers(1, &data.canvas_quad_vertices);\n 2910 | \tglDeleteVertexArrays(1, &data.canvas_quad_array);","lines":5}]},{"id":"CPY_9","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"Wrong image format conversion for RGBA16 fallback - converts to RGH (2-channel half-float) instead of RGBAH (4-channel half-float). This causes data loss when RGBA16 textures cannot be supported and must fall back to half-float format.","fix":"Change lines 685-687 from:\n  p_image->convert(Image::FORMAT_RGH);\n  r_real_format = Image::FORMAT_RGH;\nto:\n  p_image->convert(Image::FORMAT_RGBAH);\n  r_real_format = Image::FORMAT_RGBAH;\nThe alpha channel must be preserved for proper RGBA16 fallback behavior.","locations":[{"ref":"drivers/gles3/storage/texture_storage.cpp:685-687","code":"  685 | \t\t\t\t\t\tp_image->convert(Image::FORMAT_RGH);\n  686 | \t\t\t\t\t}\n  687 | \t\t\t\t\tr_real_format = Image::FORMAT_RGH;","lines":3}]},{"id":"CPY_10","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In uniform_set_create(), for UNIFORM_TYPE_ACCELERATION_STRUCTURE case, the code uses vk_writes[i] instead of vk_writes[writes_amount] when setting descriptorType and pNext. This corrupts the writes array by writing to the wrong index, potentially overwriting data from other uniform types and causing descriptor set updates to fail or use incorrect data.","fix":"Change vk_writes[i] to vk_writes[writes_amount] on lines 4873-4874 to match the pattern used throughout the rest of the switch statement.","locations":[{"ref":"drivers/vulkan/rendering_device_driver_vulkan.cpp:4873-4874","code":" 4873 | \t\t\t\tvk_writes[i].descriptorType = VK_DESCRIPTOR_TYPE_ACCELERATION_STRUCTURE_KHR;\n 4874 | \t\t\t\tvk_writes[i].pNext = acceleration_structure_write;","lines":2}]},{"id":"CPY_11","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"At line 178 in dxil_hash.cpp, the hex constant is 0x4881d05 (27 bits) instead of a proper 32-bit constant. This appears to be missing a leading zero and should be 0x04881d05. This is part of MD5 Round 3 constants from the IETF RFC 1321 specification.","fix":"Change the constant from 0x4881d05 to 0x04881d05 to match the MD5 algorithm specification and ensure proper 32-bit operations.","locations":[{"ref":"dxil_hash.cpp:178","code":null,"lines":1}]},{"id":"CPY_12","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In _cleanup_animation(), when handling audio track trimming, the code uses the member variable 'animation->' instead of the parameter 'p_animation->' in three places (lines 7824-7825, 7829). This causes the wrong animation object to be accessed, leading to incorrect audio key manipulation. The code should use p_animation instead of animation for consistency with the parameter passed to the function.","fix":"Change 'animation->audio_track_get_key_stream(i, j)' to 'p_animation->audio_track_get_key_stream(i, j)' on line 7824; change 'animation->audio_track_get_key_start_offset(i, j)' to 'p_animation->audio_track_get_key_start_offset(i, j)' on line 7825; change 'animation->track_get_key_time(i, j)' to 'p_animation->track_get_key_time(i, j)' on line 7829.","locations":[{"ref":"editor/animation/animation_track_editor.cpp:7824-7825","code":" 7824 | \t\t\t\t\t\tRef<AudioStream> stream = animation->audio_track_get_key_stream(i, j);\n 7825 | \t\t\t\t\t\tdouble len = stream->get_length() - animation->audio_track_get_key_start_offset(i, j);","lines":2},{"ref":"editor/animation/animation_track_editor.cpp:7829","code":" 7829 | \t\t\t\t\t\tdouble prev_time = animation->track_get_key_time(i, j);","lines":1}]},{"id":"CPY_13","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Out-of-bounds array access in make_mesh_previews(). On line 187, the code accesses (*p_transforms)[i] without checking if the p_transforms vector is large enough. If p_transforms is provided but has fewer elements than p_meshes, this causes out-of-bounds read. The condition checks 'if (p_transforms != nullptr)' but not the size.","fix":"Add a size check: if (p_transforms != nullptr && i < p_transforms->size()) { mesh_xform = (*p_transforms)[i]; }","locations":[{"ref":"editor/editor_interface.cpp:187","code":"  187 | \t\t\tmesh_xform = (*p_transforms)[i];","lines":1}]},{"id":"CPY_14","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Copy-paste bug at line 1649. The X and Y offsets both use title_bar->get_global_position().y. Should use .x for the first parameter of Vector2i. This causes incorrect window button offset positioning.","fix":"Change first parameter from 'title_bar->get_global_position().y' to 'title_bar->get_global_position().x': Vector2i(title_bar->get_global_position().x + title_bar->get_size().y / 2, title_bar->get_global_position().y + title_bar->get_size().y / 2)","locations":[{"ref":"editor/editor_node.cpp:1649","code":" 1649 | \tDisplayServer::get_singleton()->window_set_window_buttons_offset(Vector2i(title_bar->get_global_position().y + title_bar->get_size().y / 2, title_bar->get_global_position().y + title_bar->get_size().y / 2), DisplayServerEnums::MAIN_WINDOW_ID);","lines":1}]},{"id":"CPY_15","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Copy-paste bug in hash calculation for scene customization. Line 1468 updates custom_resources_hash instead of custom_scene_hash when processing customize_scenes plugins. This causes the custom_scene_hash to be initialized with only the configuration hash, missing the plugin name hash that should be part of it.","fix":"Change line 1468 from 'custom_resources_hash = hash_murmur3_one_64(export_plugins[i]->get_name().hash64(), custom_resources_hash);' to 'custom_scene_hash = hash_murmur3_one_64(export_plugins[i]->get_name().hash64(), custom_scene_hash);'","locations":[{"ref":"editor/export/editor_export_platform.cpp:1468-1468","code":" 1468 | \t\t\tcustom_resources_hash = hash_murmur3_one_64(export_plugins[i]->get_name().hash64(), custom_resources_hash);","lines":1}]},{"id":"CPY_16","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"At line 3810, prev_page_button->set_accessibility_name() is called with 'Next Page' text, when it should be next_page_button->set_accessibility_name(). This is a classic copy-paste error where the variable name wasn't updated after copying the previous button initialization code.","fix":"Change 'prev_page_button->set_accessibility_name(TTRC(\"Next Page\"));' to 'next_page_button->set_accessibility_name(TTRC(\"Next Page\"));'","locations":[{"ref":"editor/inspector/editor_inspector.cpp:3810","code":" 3810 | \tprev_page_button->set_accessibility_name(TTRC(\"Next Page\"));","lines":1}]},{"id":"CPY_17","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Type mismatch in set_cell call. At line 1746, set_cell is passed Vector2(...) instead of Vector2i(...). Line 1741 uses the correct Vector2i type in an identical context just before this. This is a copy-paste error where the type was not updated.","fix":"Change Vector2(organized_size.x + unorganized_index, vertical_offset) to Vector2i(organized_size.x + unorganized_index, vertical_offset)","locations":[{"ref":"editor/scene/2d/tiles/tile_map_layer_editor.cpp:1746","code":" 1746 | \t\t\tselection_pattern->set_cell(Vector2(organized_size.x + unorganized_index, vertical_offset), cell->source_id, cell->get_atlas_coords(), cell->alternative_tile);","lines":1}]},{"id":"CPY_18","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Copy-paste error in seam blending loop. Line 2404 uses 'uv_offsets[0].z' for the blend value while the UV offsets on lines 2402-2403 use 'uv_offsets[j]'. This causes the wrong blend strength to be applied to seams during iterations j > 0, resulting in visual artifacts in lightmap seam blending.","fix":"Change 'uv_offsets[0].z' to 'uv_offsets[j].z' on line 2404 to maintain consistency with the UV offset indices used in the same iteration","locations":[{"ref":"lightmapper_rd.cpp:2404-2404","code":null,"lines":1}]},{"id":"CPY_19","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In _request_buffers loop, _unmap_buffers is called with wrong loop variable index. The function is called with 'i' (the total buffer count being queried) instead of 'b' (the number of successfully mapped buffers). This causes incorrect buffers to be unmapped when an mmap failure occurs, potentially leaving some mappings intact while trying to unmap uninitialized buffer indices.","fix":"Change line 154 from '_unmap_buffers(i);' to '_unmap_buffers(b);'","locations":[{"ref":"modules/camera/camera_feed_linux.cpp:153-154","code":"  153 | \t\t\tfor (unsigne high","easy":true,"description":"In nav_agent_3d.cpp get_avoidance_data(), the time_horizon_obstacles for 3D avoidance is hardcoded to 0.0 instead of using the actual rvo_agent_3d.timeHorizonObst_ value, while the 2D version correctly uses rvo_agent_2d.timeHorizonObst_. This causes incorrect debug data to be returned for 3D agents.","fix":"Change `_avoidance_data[\"time_horizon_obstacles\"] = 0.0;` to `_avoidance_data[\"time_horizon_obstacles\"] = float(rvo_agent_3d.timeHorizonObst_);`","locations":[{"ref":"modules/navigation_3d/nav_agent_3d.cpp:363","code":"  363 | \t\t_avoidance_data[\"time_horizon_obstacles\"] = 0.0;","lines":1}]},{"id":"CPY_24","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"TGA palette index bounds not validated before palette access. When loading indexed color TGA images (8-bit), the palette index read from the image data is used to access p_palette without verifying that index < color_map_length. The palette is allocated with size = color_map_length * 3 (for 24-bit colors). An index value >= color_map_length will cause out-of-bounds buffer read.","fix":"Add bounds check: if (index >= tga_header.color_map_length) { return ERR_PARSE_ERROR; } before accessing p_palette at lines 170-172.","locations":[{"ref":"modules/tga/image_loader_tga.cpp:156-172","code":"  156 | \t\t\twhile (y != y_end) {\n  157 | \t\t\t\twhile (x != x_end) {\n  158 | \t\t\t\t\tif (i >= p_input_size) {\n  159 | \t\t\t\t\t\treturn ERR_PARSE_ERROR;\n  160 | \t\t\t\t\t}\n  161 | \t\t\t\t\tuint8_t index = p_buffer[i];\n  162 | \t\t\t\t\tuint8_t r = 0x00;\n  163 | \t\t\t\t\tuint8_t g = 0x00;\n  164 | \t\t\t\t\tuint8_t b = 0x00;\n  165 | \t\t\t\t\tuint8_t a = 0xff;\n  166 | \n  167 | \t\t\t\t\tif (p_header.color_map_depth == 24) {\n  168 | \t\t\t\t\t\t// Due to low-high byte order, the color table must be\n  169 | \t\t\t\t\t\t// read in the same order as image data (little endian)\n  170 | \t\t\t\t\t\tr = (p_palette[(index * 3) + 2]);\n  1 ode":"  235 | \tscancode_map[0x31] = Key::QUOTELEFT;","lines":1},{"ref":"platform/linuxbsd/wayland/key_mapping_xkb.cpp:241","code":"  241 | \tscancode_map[0x31] = Key::SECTION;","lines":1},{"ref":"platform/linuxbsd/x11/key_mapping_x11.cpp:280","code":"  280 | \tscancode_map[0x5E] = Key::SECTION;","lines":1},{"ref":"platform/linuxbsd/wayland/key_mapping_xkb.cpp:286","code":"  286 | \tscancode_map[0x5E] = Key::QUOTELEFT;","lines":1}]},{"id":"CPY_29","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Line 94: Wrong environment variable constant passed. The second call to get_or_env should use ENV_MAC_CODESIGN_CERT_PASS instead of ENV_MAC_CODESIGN_CERT_FILE. This causes the certificate password to read from the wrong environment variable (GODOT_MACOS_CODESIGN_CERTIFICATE_FILE instead of GODOT_MACOS_CODESIGN_CERTIFICATE_PASSWORD), potentially leading to code signing failures when users set certificate password via environment variable.","fix":"Change the second ENV_MAC_CODESIGN_CERT_FILE to ENV_MAC_CODESIGN_CERT_PASS on line 94. The line should read: ad_hoc = p_preset->get_or_env(\"codesign/certificate_file\", ENV_MAC_CODESIGN_CERT_FILE).operator String().is_empty() || p_preset->get_or_env(\"codesign/certificate_password\", ENV_MAC_CODESIGN_CERT_PASS).operator String().is_empty();","locations":[{"ref":"platform/macos/export/export_plugin.cpp:94-94","code":"   94 | \t\t\t\tad_hoc = p_preset->get_or_env(\"codesign/certificate_file\", ENV_MAC_CODESIGN_CERT_FILE).operator String().is_empty() || p_preset->get_or_env(\"codesign/certificate_password\", ENV_MAC_CODESIGN_CERT_FILE).operator String().is_empty();","lines":1}]},{"id":"CPY_30","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"NX_KEYTYPE_SOUND_DOWN assigned to VOLUMEUP instead of VOLUMEDOWN. Line 84 has identical assignment to line 81, suggesting a copy-paste error where the case for SOUND_DOWN should assign Key::VOLUMEDOWN instead.","fix":"Change line 84 from 'keycode = Key::VOLUMEUP;' to 'keycode = Key::VOLUMEDOWN;'","locations":[{"ref":"platform/macos/godot_application.mm:83-85","code":"   83 | \t\tcase NX_KEYTYPE_SOUND_DOWN: {\n   84 | \t\t\tkeycode = Key::VOLUMEUP;\n   85 | \t\t} break;","lines":3}]},{"id":"CPY_31","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Copy-paste error in cpu_particles_2d.cpp: tex_anim_offset samples from PARAM_ANGLE curve instead of PARAM_ANIM_OFFSET. Lines 917-918 check and sample curve_parameters[PARAM_ANGLE] when they should check PARAM_ANIM_OFFSET, causing incorrect animation offset values in particle initialization.","fix":"Change lines 917-918 to check and sample curve_parameters[PARAM_ANIM_OFFSET] instead of curve_parameters[PARAM_ANGLE]. The code should be:\n\t\t\treal_t tex_anim_offset = 1.0;\n\t\t\tif (curve_parameters[PARAM_ANIM_OFFSET].is_valid()) {\n\t\t\t\ttex_anim_offset = curve_parameters[PARAM_ANIM_OFFSET]->sample(tv);\n\t\t\t}","locations":[{"ref":"scene/2d/cpu_particles_2d.cpp:917-918","code":"  917 | \t\t\tif (curve_parameters[PARAM_ANGLE].is_valid()) {\n  918 | \t\t\t\ttex_anim_offset = curve_parameters[PARAM_ANGLE]->sample(tv);","lines":2}]},{"id":"CPY_32","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"SliderJointData::_set() passes wrong variable to SLIDER_JOINT_LINEAR_LIMIT_DAMPING. Line 361 uses linear_limit_restitution instead of linear_limit_damping when setting the damping parameter to the physics server.","fix":"Change line 361 from 'PhysicsServer3D::get_singleton()->slider_joint_set_param(j, PhysicsServer3D::SLIDER_JOINT_LINEAR_LIMIT_DAMPING, linear_limit_restitution);' to 'PhysicsServer3D::get_singleton()->slider_joint_set_param(j, PhysicsServer3D::SLIDER_JOINT_LINEAR_LIMIT_DAMPING, linear_limit_damping);'","locations":[{"ref":"scene/3d/physics/physical_bone_3d.cpp:358-362","code":"  358 | \t} else if (\"joint_constraints/linear_limit_damping\" == p_n n 5252 | \t\tunsigned char permission_args = 0;\n 5253 | \t\tunsigned char transfer_mode_args = 0;\n 5254 | \n 5255 | \t\tfor (int i = 0; i < p_annotation->resolved_arguments.size(); i++) {\n 5256 | \t\t\tif (i == 3) {\n 5257 | \t\t\t\trpc_config[\"channel\"] = p_annotation->resolved_arguments[i].operator int();\n 5258 | \t\t\t\tcontinue;\n 5259 | \t\t\t}\n 5260 | \n 5261 | \t\t\tString arg = p_annotation->resolved_arguments[i].operator String();\n 5262 | \t\t\tif (arg == \"call_local\") {\n 5263 | \t\t\t\tlocality_args++;\n 5264 | \t\t\t\trpc_config[\"call_local\"] = true;\n 5265 | \t\t\t} else if (arg == \"call_remote\") {\n 5266 | \t\t\t\tlocality_args++;\n 5267 | \t\t\t\trpc_config[\"call_local\"] = false;\n 5268 | \t\t\t} else if (arg == \"any_peer\") {\n 5269 | \t\t\t\tpermission_args++;\n 5270 | \t\t\t\trpc_config[\"rpc_mode\"] = MultiplayerAPI::RPC_MODE_ANY_PEER;\n 5271 | \t\t\t} else if (arg == \"authority\") {\n 5272 | \t\t\t\tpermission_args++;\n 5273 | \t\t\t\trpc_config[\"rpc_mode\"] = MultiplayerAPI::RPC_MODE_AUTHORITY;\n 5274 | \t\t\t} else if (arg == \"reliable\") {\n 5275 | \t\t\t\ttransfer_mode_args++;\n 5276 | \t\t\t\trpc_config[\"transfer_mode\"] = MultiplayerPeer::TRANSFER_MODE_RELIABLE;\n 5277 | \t\t\t} else if (arg == \"unreliable\") {\n 5278 | \t\t\t\ttransfer_mode_args++;\n 5279 | \t\t\t\trpc_config[\"transfer_mode\"] = MultiplayerPeer::TRANSFER_MODE_UNRELIABLE;\n 5280 | \t\t\t} else if (arg == \"unreliable_ordered\") {\n 5281 | \t\t\t\ttransfer_mode_args++;\n 5282 | \t\t\t\trpc_config[\"transfer_mode\"] = MultiplayerPeer::TRANSFER_MODE_UNRELIABLE_ORDERED;\n 5283 | \t\t\t} else {\n 5284 | \t\t\t\tpush_error(R\"(Invalid RPC argument. Must be one of: \"call_local\"/\"call_remote\" (local calls), \"any_peer\"/\"authority\" (permission), \"reliable\"/\"unreliable\"/\"unreliable_ordered\" (transfer mode).)\", p_annotation);\n 5285 | \t\t\t}\n 5286 | \t\t}\n 5287 | \n 5288 | \t\tif (locality_args > 1) {\n 5289 | \t\t\tpush_error(R\"(Invalid RPC co le(STD_OUTPUT_HANDLE);\n   83 | \tif (OS::get_singleton()->get_stdout_type() != OS::STD_HANDLE_CONSOLE || !hCon || hCon == INVALID_HANDLE_VALUE) {\n   84 | \t\tStdLogger::log_error(p_function, p_file, p_line, p_code, p_rationale, p_editor_notify, p_type, p_script_backtraces);\n   85 | \t} else {\n   86 | \t\tCONSOLE_SCREEN_BUFFER_INFO sbi; //original\n   87 | \t\tGetConsoleScreenBufferInfo(hCon, &sbi);\n   88 | \n   89 | \t\tWORD current_bg = sbi.wAttributes & (BACKGROUND_RED | BACKGROUND_GREEN | BACKGROUND_BLUE | BACKGROUND_INTENSITY);\n   90 | \n   91 | \t\tuint32_t basecol = 0;\n   92 | \t\tswitch (p_type) {\n   93 | \t\t\tcase ERR_WARNING:\n   94 | \t\t\t\tbasecol = FOREGROUND_RED | FOREGROUND_GREEN;\n   95 | \t\t\t\tbreak;\n   96 | \t\t\tcase ERR_SCRIPT:\n   97 | \t\t\t\tbasecol = FOREGROUND_RED | FOREGROUND_BLUE;\n   98 | \t\t\t\tbreak;\n   99 | \t\t\tcase ERR_SHADER:\n  100 | \t\t\t\tbasecol = FOREGROUND_GREEN | FOREGROUND_BLUE;\n  101 | \t\t\t\tbreak;\n  102 | \t\t\tcase ERR_ERROR:\n  103 | \t\t\tdefault:\n  104 | \t\t\t\tbasecol = FOREGROUND_RED;\n  105 | \t\t\t\tbreak;\n  106 | \t\t}\n  107 | \n  108 | \t\tbasecol |= current_bg;\n  109 | \n  110 | \t\tSetConsoleTextAttribute(hCon, basecol | FOREGROUND_INTENSITY);\n  111 | \t\tlogf_error(\"%s:\", error_type_string(p_type));\n  112 | \n  113 | \t\tSetConsoleTextAttribute(hCon, basecol);\n  114 | \t\tif (p_rationale && p_rationale[0]) {\n  115 | \t\t\tlogf_error(\" %s\\n\", p_rationale);\n  116 | \t\t} else {\n  117 | \t\t\tlogf_error(\" %s\\n\", p_code);\n  118 | \t\t}\n  119 | \n  120 | \t\t// `FOREGROUND_INTENSITY` alone results in gray text.\n  121 | \t\tSetConsoleTextAttribute(hCon, FOREGROUND_INTENSITY);\n  122 | \t\tif (p_rationale && p_rationale[0]) {\n  123 | \t\t\tlogf_error(\"%sat: (%s:%i)\\n\", error_type_indent(p_type), p_file, p_line);\n  124 | \t\t} else {\n  125 | \t\t\tlogf_error(\"%sat: %s (%s:%i)\\n\", error_type_indent(p_type), p_function, p_file, p_line);\n  126 | \t\t}\n  127 | \n  128 | havior or invalid casts.","fix":"Add validation before casting: Check that object->get(\"hframes\") and object->get(\"vframes\") return valid integer values before casting and using in comparisons.","locations":[{"ref":"editor/inspector/editor_inspector.cpp:1204","code":" 1204 | \t\t\t\t\tif (int64_t(object->get(property)) + 1 < (int64_t(object->get(\"hframes\")) * int64_t(object->get(\"vframes\")))) {","lines":1}]},{"id":"API_109","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"The setup_with_move_element_function() method at line 3626 accepts a p_add_item_text parameter but never uses it, unlike the similar setup_with_count_property() method at line 3641 which does use p_add_item_text to set add_button->set_text(). If a user specifies add_button_text in the class_name_components for a move-element-function array, it will be silently ignored.","fix":"Add 'add_button->set_text(p_add_item_text);' at line 3635 in setup_with_move_element_function(), and also pass p_add_item_text parameter when calling setup_with_move_element_function() at line 4686.","locations":[{"ref":"editor/inspector/editor_inspector.cpp:3626-3638","code":" 3626 | void EditorInspectorArray::setup_with_move_element_function(Object *p_object, const String &p_category, const String &p_label, const StringName &p_array_element_prefix, int p_page, const Color &p_bg_color, bool p_foldable, bool p_movable, bool p_is_const, bool p_numbered, int p_page_length, const String &p_add_item_text) {\n 3627 | \tcount_property = \"\";\n 3628 | \tmode = MODE_USE_MOVE_ARRAY_ELEMENT_FUNCTION;\n 3629 | \tarray_element_prefix = p_array_element_prefix;\n 3630 | \tpage = p_page;\n 3631 | \tmovable = p_movable;\n 3632 | \tis_const = p_is_const;\n 3633 | \tpage_length = p_page_length;\n 3634 | \tnumbered = p_numbered;\n 3635 | \n 3636 | \tEditorInspectorSection::setup(p_category + \"/\" + p_label.to_lower(), String(p_array_element_prefix) + \"_array\", p_label, p_object, p_bg_color (function(){

// Data

const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.

const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
