281 |             session->unique_bytes += file->actual_file_size;\n 1282 |         }","lines":4},{"ref":"lib/shredder.c:1474","code":" 1474 |     rm_shred_group_find_original(tag->session, group->held_files, group->status);","lines":1},{"ref":"lib/shredder.c:1485","code":" 1485 |     rm_shred_group_find_original(tag->session, group->held_files, group->status);","lines":1}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"rm_shred_group_transfer() decrements the source group's counters inconsistently with how rm_shred_group_push_file() incremented them. push_file adds rm_file_n_files(file) (counts the whole hardlink/ext_cksum cluster), rm_file_n_prefd, rm_file_n_nprefd and rm_file_n_new(file) (== summed file->is_new over the cluster). transfer() instead subtracts 1, file->is_prefd, !file->is_prefd, and crucially !file->is_new (INVERTED). So for clustered/hardlinked files the source group's num_files/n_pref/n_npref are wrong, and n_new is decremented by the logical negation of what was added. This corrupts the re-qualification check (rm_shred_group_qualifies) at line 1479 when --mtime-window or --unmatched-basenames is combined with hardlinks/ext-cksum twins.","fix":"Mirror the increments: source->num_files -= rm_file_n_files(file); source->n_pref -= rm_file_n_prefd(file); source->n_npref -= rm_file_n_nprefd(file); source->n_new -= rm_file_n_new(file); also decrement n_clusters/n_inodes/n_unhashed_clusters to stay consistent.","locations":[{"ref":"lib/shredder.c:1370-1379","code":" 1370 | static void rm_shred_group_transfer(RmFile *file, RmShredGroup *source,\n 1371 |                                     RmShredGroup *dest) {\n 1372 |     rm_shred_group_push_file(dest, file, FALSE);\n 1373 |     gboolean success = g_queue_remove(source->held_files, file);\n 1374 |     g_assert(success); (void)success;\n 1375 |     source->num_files--;\n 1376 |     source->n_pref -= file->is_prefd;\n 1377 |     source->n_npref -= !file->is_prefd;\n 1378 |     source->n_new -= !file->is_new;\n 1379 | }","lines":10},{"ref":"lib/shredder.c:920-923","code":"  920 |         shred_group->num_files += rm_file_n_files(file);\n  921 |         shred_group->n_pref += rm_file_n_prefd(file);\n  922 |         shred_group->n_npref += rm_file_n_nprefd(file);\n  923 |         shred_group->n_new += rm_file_n_new(file);","lines":4}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The same count_tree is read with GPOINTER_TO_INT in rm_tm_feed (line 588) but with GPOINTER_TO_UINT in rm_tm_cluster_up (line 1001). The count tree stores -1 (via GINT_TO_POINTER) as the error sentinel for invalid/over-the-root directories. Read as unsigned, -1 becomes UINT_MAX, so an error directory gets file_count == UINT_MAX instead of -1. The check 'parent->dupe_count == parent->file_count && parent->file_count > 0' then can never match the huge value (mostly benign), but the error semantics are silently lost and the inconsistency is a latent bug if the comparison logic changes.","fix":"Use GPOINTER_TO_INT consistently in rm_tm_cluster_up so the -1 error sentinel is preserved, matching rm_tm_feed.","locations":[{"ref":"lib/treemerge.c:588","code":"  588 |         int file_count = GPOINTER_TO_INT(rm_trie_search(&self->count_tree, dirname));","lines":1},{"ref":"lib/treemerge.c:999-1001","code":"  999 |         /* Get the actual file count */\n 1000 |         parent->file_count =\n 1001 |             GPOINTER_TO_UINT(rm_trie_search(&self->count_tree, parent_dir));","lines":3}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"rm_util_parent_node() returns ino_t (an unsigned integer type) but returns -1 on stat\nfailure. -1 becomes a huge valid-looking inode number (e.g. 0xFFFFFFFFFFFFFFFF). Callers\nsuch as rm_util_is_path_double() compare parent_node(path1) == parent_node(path2); two\nunrelated unreadable paths would both yield the same sentinel and be treated as having the\nsame parent directory, potentially misclassifying files as path doubles.","fix":"Return a documented sentinel that cannot collide (e.g. 0) and have callers handle the failure explicitly, or change the return type/contract so callers can detect the error.","locations":[{"ref":"lib/utilities.c:170-181","code":"  170 | ino_t rm_util_parent_node(const char *path) {\n  171 |     char *parent_path = g_path_get_dirname(path);\n  172 | \n  173 |     RmStat stat_buf;\n  174 |     if(!rm_sys_stat(parent_path, &stat_buf)) {\n  175 |         g_free(parent_path);\n  176 |         return stat_buf.st_ino;\n  177 |     } else {\n  178 |         g_free(parent_path);\n  179 |         return -1;\n  180 |     }\n  181 | }","lines":12},{"ref":"lib/utilities.c:1126-1131","code":" 1126 | static gboolean rm_util_is_path_double(char *path1, char *path2) {\n 1127 |     char *basename1 = rm_util_basename(path1);\n 1128 |     char *basename2 = rm_util_basename(path2);\n 1129 |     return (strcmp(basename1, basename2) == 0 &&\n 1130 |             rm_util_parent_node(path1) == rm_util_parent_node(path2));\n 1131 | }","lines":6}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In rm_mounts_create_tables(), the NFS branch computes\n`until_slash = MIN((int)sizeof(entry->fsname), nfs_marker - entry->fsname)`.\nsizeof(entry->fsname) is sizeof(char*) (8 on 64-bit), NOT the length of the string buffer.\nSo the NFS server name copied into diskname is truncated to at most 8 bytes regardless of the\nreal prefix length, producing wrong/collapsed nfs server identifiers and potentially merging\ndistinct NFS servers into the same diskname.","fix":"Use the actual prefix length (nfs_marker - entry->fsname), clamped to sizeof(diskname)-1, not sizeof(entry->fsname).","locations":[{"ref":"lib/utilities.c:745-748","code":"  745 |             } else if((nfs_marker = strstr(entry->fsname, \":/\")) != NULL) {\n  746 |                 size_t until_slash =\n  747 |                     MIN((int)sizeof(entry->fsname), nfs_marker - entry->fsname);\n  748 |                 strncpy(diskname, entry->fsname, until_slash);","lines":4}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"rm_offset_get_fiemap() allocates sizeof(struct fiemap) + n_extents * sizeof(struct\nfiemap_extent). n_extents is `const int`; callers pass 1, but the multiplication\n`n_extents * sizeof(...)` mixes signed int with size_t. If a future caller passes a large or\nnegative n_extents the int*size_t promotion can wrap. Current callers are safe (always 1), so\nmedium-at-most as latent.","fix":"Take n_extents as size_t (or validate n_extents > 0) and compute the size in size_t arithmetic.","locations":[{"ref":"lib/utilities.c:990-1000","code":"  990 | static struct fiemap *rm_offset_get_fiemap(int fd, const int n_extents,\n  991 |                                            const uint64_t file_offset) {\n  992 | #if _RM_OFFSET_DEBUG\n  993 |     rm_log_debug_line(_(\"rm_offset_get_fiemap: fd=%d, n_extents=%d, file_offset=%d\"),\n  994 |                       fd, n_extents, file_offset);\n  995 | #endif\n  996 |     /* struct fiemap does not allocate any extents by default,\n  997 |      * so we allocate the nominated number\n  998 |      * */\n  999 |     struct fiemap *fm =\n 1000 |         g_malloc0(sizeof(struct fiemap) + n_extents * sizeof(struct fiemap_extent));","lines":11}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rm_cmd_size_range_string_to_bytes initializes *max to G_MAXULONG (unsigned long, 32-bit on LLP64/Windows and historically signaling intent of ULONG) whereas the field is RmOff/uint64 and the documented limit is 2**64. On platforms where long is 32-bit this caps the default max far below intended; even on 64-bit it is inconsistent with the G_MAXUINT64 used as default maxsize in rm_cfg_set_default.","fix":"Use G_MAXUINT64 for *max to match RmOff width and the configured default.","locations":[{"ref":"lib/cmdline.c:400-403","code":"  400 | static gboolean rm_cmd_size_range_string_to_bytes(const char *range_spec, RmOff *min,\n  401 |                                                   RmOff *max, GError **error) {\n  402 |     *min = 0;\n  403 |     *max = G_MAXULONG;","lines":4},{"ref":"lib/cfg.c:49","code":"   49 |     cfg->maxsize = G_MAXUINT64;","lines":1}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rm_cmd_set_paranoia_from_cnt: on out-of-range index it sets an error only `if(error && *error == NULL)` but otherwise silently does nothing and the caller (rm_cmd_parse_paranoid/less_paranoid) still returns true. So -ppppppp beyond the max is silently clamped-to-noop rather than reported when error is NULL (e.g. when called internally), and the counter keeps incrementing so subsequent -P do not undo it cleanly.","fix":"Clamp paranoia_count to the valid range so repeated +/- behave symmetrically, and have the parse callbacks propagate the failure boolean.","locations":[{"ref":"lib/cmdline.c:916-931","code":"  916 | static void rm_cmd_set_paranoia_from_cnt(RmCfg *cfg, int paranoia_counter,\n  917 |                                          GError **error) {\n  918 |     /* Handle the paranoia option */\n  919 |     int index = paranoia_counter + RM_PARANOIA_NORMAL;\n  920 | \n  921 |     if(index < 0 || index > RM_PARANOIA_MAX) {\n  922 |         if(error && *error == NULL) {\n  923 |             g_set_error(error, RM_ERROR_QUARK, 0,\n  924 |                         _(\"Only up to -%.*s or down to -%.*s flags allowed\"),\n  925 |                         RM_PARANOIA_MAX - RM_PARANOIA_NORMAL, \"ppppp\", RM_PARANOIA_NORMAL,\n  926 |                         \"PPPPP\");\n  927 |         }\n  928 |     } else {\n  929 |         cfg->checksum_type = RM_PARANOIA_LEVELS[index];\n  930 |     }\n  931 | }","lines":16},{"ref":"lib/cmdline.c:1069-1081","code":" 1069 | static gboolean rm_cmd_parse_paranoid(_UNUSED const char *option_name,\n 1070 |                                       _UNUSED const gchar *count, RmSession *session,\n 1071 |                                       _UNUSED GError **error) {\n 1072 |     rm_cmd_set_paranoia_from_cnt(session->cfg, ++session->paranoia_count, error);\n 1073 |     return true;\n 1074 | }\n 1075 | \n 1076 | static gboolean rm_cmd_parse_less_paranoid(_UNUSED const char *option_name,\n 1077 |                                            _UNUSED const gchar *count, RmSession *session,\n 1078 |                                            _UNUSED GError **error) {\n 1079 |     rm_cmd_set_paranoia_from_cnt(session->cfg, --session->paranoia_count, error);\n 1080 |     return true;\n 1081 | }","lines":13}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In rm_file_new, when not using absolute offsets the guard `if((int)(actual_file_size * cfg->skip_end_factor) == 0)` casts a potentially large RmOff (uint64) product of a double to int. For large files multiplied by skip_end_factor the (int) cast truncates/overflows, so the zero-check is unreliable: a genuinely tiny effective slice may pass the check, or a wrap could spuriously trigger return NULL. The later check `(self->file_size - start_seek) == 0` partly compensates but the int cast here is the wrong type.","fix":"Compare the double/RmOff result directly without casting to int, e.g. `if((RmOff)(actual_file_size * cfg->skip_end_factor) == 0)` or check the double against a threshold.","locations":[{"ref":"lib/file.c:48-51","code":"   48 |             start_seek = cfg->skip_start_factor * actual_file_size;\n   49 |             if((int)(actual_file_size * cfg->skip_end_factor) == 0) {\n   50 |                 return NULL;\n   51 |             }","lines":4}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rm_fmt_remove_by_name pushes the GList *node* of handler_order onto deleted_iters while still iterating handler_order, then later g_queue_delete_link(handler_order, iter) for each. This works but is subtle; more importantly it removes path_to_handler by handler->path for the copy, yet the value stored there was the template (see separate finding), and it never frees the FILE* (fclose) for the removed handler nor the handler_copy memory beyond what handler_to_file's GDestroyNotify covers - the FILE* in handler_to_file is removed but never fclosed, leaking the open file descriptor.","fix":"Before g_hash_table_remove(self->handler_to_file, handler), fetch the FILE* and fclose it (unless it is a std stream). Verify path_to_handler value matches the key's owner.","locations":[{"ref":"lib/formats.c:152-171","code":"  152 | void rm_fmt_remove_by_name(RmFmtTable *self, char *name) {\n  153 |     GQueue deleted_iters = G_QUEUE_INIT;\n  154 |     for(GList *iter = self->handler_order->head; iter; iter = iter->next) {\n  155 |         RmFmtHandler *handler = iter->data;\n  156 |         if(!g_str_equal(handler->name, name)) {\n  157 |             continue;\n  158 |         }\n  159 | \n  160 |         g_hash_table_remove(self->handler_to_file, handler);\n  161 |         g_hash_table_remove(self->path_to_handler, handler->path);\n  162 |         g_queue_push_tail(&deleted_iters, iter);\n  163 |     }\n  164 | \n  165 |     for(GList *iter = deleted_iters.head; iter; iter = iter->next) {\n  166 |         g_queue_delete_link(self->handler_order, iter);\n  167 |     }\n  168 | \n  169 |     // Since we removed all handlers\n  170 |     g_hash_table_remove(self->handler_set, name);\n  171 | }","lines":20}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","description":"_equal rm_fmt_elem: when mismatch_found is already true it calls rm_fmt_report_failure() again on every subsequent element. report_failure sets exit code, sets mismatch_found, and calls rm_session_abort() repeatedly - redundant repeated abort calls and exit-code re-stamping. Minor, but the early-return path should just return without re-reporting.","fix":"If self->mismatch_found just return early without calling rm_fmt_report_failure again.","locations":[{"ref":"lib/formats/_equal.c:79-83","code":"   79 |     /*  No need to check anymore, it's not equal. */\n   80 |     if(self->mismatch_found) {\n   81 |         rm_fmt_report_failure(self, session);\n   82 |         return;\n   83 |     }","lines":5},{"ref":"lib/formats/_equal.c:52-56","code":"   52 | static void rm_fmt_report_failure(RmFmtHandlerEqual *self, RmSession *session) {\n   53 |     session->equal_exit_code = EXIT_FAILURE;\n   54 |     self->mismatch_found = true;\n   55 |     rm_session_abort();\n   56 | }","lines":5}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","description":"json rm_fmt_elem mutates the shared RmFile (file->is_original = true/false) during output for UNIQUE_FILE entries. This output handler has a side effect on the model object that other concurrently-running handlers (each under their own mutex, but iterating the same RmFile) observe, so the value of is_original printed for a unique file can differ between json and other formatters depending on ordering.","fix":"Compute a local bool for the printed value instead of overwriting file->is_original shared state.","locations":[{"ref":"lib/formats/json.c:264-280","code":"  264 |     if(file->lint_type == RM_LINT_TYPE_UNIQUE_FILE) {\n  265 |         if(!rm_fmt_get_config_value(session->formats, \"json\", \"unique\")) {\n  266 |             if(!file->digest || !session->cfg->write_unfinished) {\n  267 |                 return;\n  268 |             }\n  269 |         }\n  270 | \n  271 |         if(session->cfg->keep_all_tagged && !file->is_prefd) {\n  272 |             /* don't list 'untagged' files as unique */\n  273 |             file->is_original = false;\n  274 |         } else if(session->cfg->keep_all_untagged && file->is_prefd) {\n  275 |             /* don't list 'tagged' files as unique */\n  276 |             file->is_original = false;\n  277 |         } else {\n  278 |             file->is_original = true;\n  279 |         }\n  280 |     }","lines":17}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","description":"JSON 'progress' is computed as a gdouble (0..100 with fractional part) but emitted via rm_fmt_json_key_int(out, \"progress\", progress) whose parameter is RmOff (guint64). The double is implicitly truncated toward zero, so the per-element progress is always an integer percentage and 99.9% prints as 99. The header/footer pass literal 0/100 so only body elements are affected.","fix":"Use rm_fmt_json_key_float for 'progress', or document that it is intentionally integer and cast explicitly to make intent clear.","locations":[{"ref":"lib/formats/json.c:305-316","code":"  305 |         gdouble progress = 0;\n  306 |         if(session->shred_bytes_after_preprocess) {\n  307 |             progress = CLAMP(\n  308 |                 100 - 100 * (\n  309 |                     (gdouble)session->shred_bytes_remaining /\n  310 |                     (gdouble)session->shred_bytes_after_preprocess\n  311 |                 ),\n  312 |                 0,\n  313 |                 100\n  314 |             );\n  315 |         }\n  316 |         rm_fmt_json_key_int(out, \"progress\", progress);","lines":12}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","description":"progressbar speed/eta running means are only initialized in the RM_PROGRESS_STATE_INIT branch (rm_running_mean_init). If INIT is skipped (e.g. replay returns earlier, or state sequence starts at SHREDDER), rm_fmt_progress_calculate_eta calls rm_running_mean_add/get on uninitialized RmRunningMean, and the PRE_SHUTDOWN unref frees an uninitialized pointer. update_interval is likewise only set in INIT (defaulting to 50 there), so a non-INIT first call uses update_interval==0.","fix":"Initialize means/update_interval in the handler struct initializer or lazily on first use (alongside the timer==NULL lazy init) rather than only in the INIT state branch.","locations":[{"ref":"lib/formats/progressbar.c:403-434","code":"  403 |     if(state == RM_PROGRESS_STATE_INIT) {\n  404 |         /* Do initialization here */\n  405 |         const char *update_interval_str =\n  406 |             rm_fmt_get_config_value(session->formats, \"progressbar\", \"update_interval\");\n  407 | \n  408 |         rm_running_mean_init(&self->speed_mean, 10);\n  409 |         rm_running_mean_init(&self->eta_mean, 25);\n  410 |         self->last_shred_bytes_read = 0;\n  411 |         self->last_check_time = g_get_monotonic_time();\n  412 | \n  413 |         self->plain = true;\n  414 |         if(rm_fmt_get_config_value(session->formats, \"progressbar\", \"fancy\") != NULL) {\n  415 |             self->plain = false;\n  416 |         }\n  417 | \n  418 |         self->use_unicode_glyphs = true;\n  419 |         if(rm_fmt_get_config_value(session->formats, \"progressbar\", \"ascii\") != NULL) {\n  420 |             self->use_unicode_glyphs = false;\n  421 |         }\n  422 | \n  423 |         if(update_interval_str) {\n  424 |             self->update_interval = g_ascii_strtoull(update_interval_str, NULL, 10);\n  425 |         }\n  426 | \n  427 |         if(self->update_interval == 0) {\n  428 |             self->update_interval = 50; /* milliseconds */\n  429 |         }\n  430 | \n  431 |         fprintf(out, \"\\e[?25l\"); /* Hide the cursor */\n  432 |         fflush(out);\n  433 |         return;\n  434 |     }","lines":32},{"ref":"lib/formats/progressbar.c:91-128","code":"   91 | static gdouble rm_fmt_progress_calculate_eta(\n   92 |         RmSession *session,\n   93 |         RmFmtHandlerProgress *self,\n   94 |         RmFmtProgressState state) {\n   95 |     if(state != RM_PROGRESS_STATE_SHREDDER) {\n   96 |         return -1.0;\n   97 |     }\n   98 | \n   99 |     // Diff is the number of bytes that we read in the last time interval.\n  100 |     // This does not involve bytes that were just skipped due to bad checksums.\n  101 |     RmOff diff = session->shred_bytes_read - self->last_shred_bytes_read;\n  102 | \n  103 |     // took is the length of the time interval it took in seconds.\n  104 |     gint64 now = g_get_monotonic_time();\n  105 |     gdouble took = (now - self->last_check_time) / (1000.0 * 1000.0);\n  106 | \n  107 |     self->last_check_time = now;\n  108 |     self->last_shred_bytes_read = session->shred_bytes_read;\n  109 | \n  110 |     if(diff > 0) {\n  111 |         // speed is the average time a single file took to process or filter in files/sec.\n  112 |         gdouble speed = diff / took;\n  113 | \n  114 |         // Average the mean, to make sure that we do not directly give in to \"speed bumps\"\n  115 |         rm_running_mean_add(&self->speed_mean, speed);\n  116 |     }\n  117 | \n  118 |     gdouble mean_speed = rm_running_mean_get(&self->speed_mean);\n  119 |     if(FLOAT_SIGN_DIFF(mean_speed, 0.0, MTIME_TOL) <= 0) {\n  120 |         return -1;\n  121 |     }\n  122 | \n  123 |     gdouble eta_sec = session->shred_bytes_remaining / mean_speed;\n  124 |     rm_running_mean_add(&self->eta_mean, eta_sec);\n  125 | \n  126 |     gdouble mean_eta = rm_running_mean_get(&self->eta_mean);\n  127 |     return mean_eta;\n  128 | }","lines":38}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","description":"uniques rm_fmt_head marks session as _UNUSED but immediately dereferences session->formats (line 40). The _UNUSED attribute is incorrect and misleading; same pattern as the json foot issue.","fix":"Drop _UNUSED from the session parameter.","locations":[{"ref":"lib/formats/uniques.c:38-40","code":"   38 | static void rm_fmt_head(_UNUSED RmSession *session, _UNUSED RmFmtHandler *parent, _UNUSED FILE *out) {\n   39 |     RmFmtHandlerUniques *self = (RmFmtHandlerUniques *)parent;\n   40 |     const char *print0_option = rm_fmt_get_config_value(session->formats, \"uniques\", \"print0\");","lines":3}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","description":"uniques handler casts a non-NULL config-value pointer directly to bool: self->print0 = (bool)print0_option; where print0_option is the *string value* of the config key. rm_fmt_get_config_value returns the stored value string; if a user sets uniques:print0=0 or print0=false the pointer is still non-NULL so print0 becomes true. Presence, not value, is what matters, which is inconsistent with how a key=value option reads.","fix":"Use presence-only semantics explicitly: self->print0 = (print0_option != NULL); and document that the value is ignored, or parse the value for truthiness.","locations":[{"ref":"lib/formats/uniques.c:40-41","code":"   40 |     const char *print0_option = rm_fmt_get_config_value(session->formats, \"uniques\", \"print0\");\n   41 |     self->print0 = (bool)print0_option;","lines":2}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rm_hasher_print allocates a VLA `char checksum_str[size]` where size = rm_digest_get_bytes(digest)*2 + 1, then memset's all `size` bytes to '0' and sets the last to NUL before rm_digest_hexstring overwrites it. The memset to '0' is dead work (immediately overwritten by hexstring for the first size-1 bytes). More importantly a VLA sized by digest bytes is unbounded stack allocation driven by digest type; for normal digests it is small, but using a VLA here is fragile. The pre-fill with '0' is misleading/dead.","fix":"Drop the memset (hexstring fills the buffer); optionally use a fixed-size buffer sized to the max digest length instead of a VLA.","locations":[{"ref":"lib/hash-utility.c:62-71","code":"   62 | static void rm_hasher_print(RmDigest *digest, char *path) {\n   63 |     gsize size = rm_digest_get_bytes(digest) * 2 + 1;\n   64 | \n   65 |     char checksum_str[size];\n   66 |     memset(checksum_str, '0', size);\n   67 |     checksum_str[size - 1] = 0;\n   68 | \n   69 |     rm_digest_hexstring(digest, checksum_str);\n   70 | \n   71 |     g_print(\"%s  %s\\n\", checksum_str, path);","lines":10}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In rm_hasher_main the per-path success array tag.read_succesful is indexed by `i` from the original argv order, and for failed/non-regular files the path slot is freed and set to NULL (lines 243-244) and a dummy callback fired. But for the print_in_order path the completed_digests_buffer is consulted at session->path_index; a path that was a directory or stat-failure never produces a digest, yet the dummy rm_hasher_callback(NULL,...) is what advances the in-order printer past it. That relies on the NULL-digest dummy call - if rm_hasher itself also fires a callback for that index there'd be a double-advance. Coupling between the explicit dummy call and the hasher's own callbacks is subtle and undocumented.","fix":"Document that exactly one callback (real or dummy) is fired per index; consider asserting completed_digests_buffer[index] was NULL before assignment to catch double-callbacks.","locations":[{"ref":"lib/hash-utility.c:222-246","code":"  222 |     for(int i = 0; tag.paths && tag.paths[i]; ++i) {\n  223 |         /* check it is a regular file */\n  224 | \n  225 |         RmStat stat_buf;\n  226 |         if(rm_sys_stat(tag.paths[i], &stat_buf) == -1) {\n  227 |             rm_log_warning_line(_(\"Can't open directory or file \\\"%s\\\": %s\"),\n  228 |                                 tag.paths[i], strerror(errno));\n  229 |         } else if(S_ISDIR(stat_buf.st_mode)) {\n  230 |             rm_log_warning_line(_(\"Directories are not supported: %s\"), tag.paths[i]);\n  231 |         } else if(S_ISREG(stat_buf.st_mode)) {\n  232 |             RmHasherTask *task = rm_hasher_task_new(hasher, NULL, GINT_TO_POINTER(i));\n  233 |             tag.read_succesful[i] =\n  234 |                 rm_hasher_task_hash(task, tag.paths[i], 0, stat_buf.st_size, FALSE, NULL);\n  235 | \n  236 |             rm_hasher_task_finish(task);\n  237 |             continue;\n  238 |         } else {\n  239 |             rm_log_warning_line(_(\"%s: Unknown file type\"), tag.paths[i]);\n  240 |         }\n  241 | \n  242 |         /* dummy callback for failed paths */\n  243 |         g_free(tag.paths[i]);\n  244 |         tag.paths[i] = NULL;\n  245 |         rm_hasher_callback(hasher, NULL, &tag, GINT_TO_POINTER(i));\n  246 |     }","lines":25}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rm_parrot_check_depth returns true when file->depth == 0 OR depth <= cfg->depth. The depth==0 special-case means any entry whose JSON lacks a 'depth' member (defaults to 0) always passes the depth filter regardless of cfg->depth, silently bypassing -d/--max-depth for older caches. This may be intentional (treat 0 as 'unknown/root') but is undocumented and surprising.","fix":"Document the intent of the depth==0 escape hatch, or track presence of the depth member explicitly rather than overloading 0.","locations":[{"ref":"lib/replay.c:429-431","code":"  429 | static bool rm_parrot_check_depth(const RmCfg *cfg, const RmFile *file) {\n  430 |     return (file->depth == 0 || file->depth <= cfg->depth);\n  431 | }","lines":3}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rm_session_read_kernel_version treats `sscanf(...) != EOF` as success, but sscanf returns the count of assigned fields (0 on a non-matching release string) and only returns EOF on input failure before any conversion. A release string that fails to match \"%d.%d\" returns 0, passing the != EOF test, so version[] stays {-1,-1} yet it logs 'Linux kernel version is -1.-1'.","fix":"Check `sscanf(...) >= 2` (both major and minor parsed) before logging success.","locations":[{"ref":"lib/session.c:62-68","code":"   62 |     struct utsname buf;\n   63 |     if(uname(&buf) != -1 &&\n   64 |        sscanf(buf.release, \"%d.%d.*\", &version[0], &version[1]) != EOF) {\n   65 |         rm_log_debug_line(\"Linux kernel version is %d.%d.\", version[0], version[1]);\n   66 |     } else {\n   67 |         rm_log_warning_line(\"Unable to read Linux kernel version\");\n   68 |     }","lines":7}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","description":"For symlinks, the byte counter is decremented by the full file_size on every hash increment instead of by bytes_to_read: `if(file->is_symlink) rm_shred_adjust_counters(tag, 0, -(gint64)file->file_size)`. The initial counter add (line 1115) only added file_size - hash_offset once. If a symlink target ever produced more than one increment, shred_bytes_remaining would be over-decremented (driven negative). In practice symlinks are tiny/single-increment so impact is low, but the asymmetry is a latent accounting bug.","fix":"Decrement by the bytes actually attributed to this increment (e.g. -(gint64)bytes_to_read, or the remaining size on the final increment) consistently with the non-symlink branch and the initial add.","locations":[{"ref":"lib/shredder.c:1685-1689","code":" 1685 |         if(file->is_symlink) {\n 1686 |             rm_shred_adjust_counters(tag, 0, -(gint64)file->file_size);\n 1687 |         } else {\n 1688 |             rm_shred_adjust_counters(tag, 0, -(gint64)bytes_to_read);\n 1689 |         }","lines":5}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rm_tm_sort_orig_criteria, rm_tm_cmp_directory_groups and rm_tm_sort_paths return the result of subtracting gint64 fields (prefd_files, mergeups) truncated to int. For pathological large counts the truncation could flip the comparison sign, violating sort ordering. Counts are realistically small so impact is low, but the pattern is fragile.","fix":"Return SIGN_DIFF(a, b) style comparisons that yield -1/0/1 instead of raw truncated differences of 64-bit values.","locations":[{"ref":"lib/treemerge.c:700-705","code":"  700 |     if(da->prefd_files - db->prefd_files) {\n  701 |         if(cfg->keep_all_untagged) {\n  702 |             return da->prefd_files - db->prefd_files;\n  703 |         } else {\n  704 |             return db->prefd_files - da->prefd_files;\n  705 |         }","lines":6},{"ref":"lib/treemerge.c:747-755","code":"  747 | static int rm_tm_cmp_directory_groups(GQueue *a, GQueue *b) {\n  748 |     if(a->length == 0 || b->length == 0) {\n  749 |         return b->length - a->length;\n  750 |     }\n  751 | \n  752 |     RmDirectory *first_a = a->head->data;\n  753 |     RmDirectory *first_b = b->head->data;\n  754 |     return first_b->mergeups - first_a->mergeups;\n  755 | }","lines":9}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In rm_mounts_create_tables() the `else` branch (unknown device) does\n`strncpy(diskname, \"unknown\", sizeof(diskname))`. strncpy with the full buffer size on a short\nsource is fine here, but the ramdisk/blkid-fail branches use `sizeof(diskname)-1` and do NOT\nguarantee NUL termination when the source is exactly buffer-sized; entry->fsname copied via\nstrncpy(diskname, entry->fsname, sizeof(diskname)-1) leaves diskname unterminated only if\nfsname >= PATH_MAX-1, but diskname is zeroed first (memset at line 732) only covering this by\nluck of the -1. The inconsistent sizing (-1 vs full) is a latent termination hazard.","fix":"Standardize on strncpy(dst, src, sizeof(dst)-1) and always explicitly set dst[sizeof(dst)-1]='\\0', or use g_strlcpy.","locations":[{"ref":"lib/utilities.c:741-760","code":"  741 |             if(rm_mounts_is_ramdisk(entry->fsname)) {\n  742 |                 strncpy(diskname, entry->fsname, sizeof(diskname)-1);\n  743 |                 is_rotational = false;\n  744 |                 whole_disk = stat_buf_folder.st_dev;\n  745 |             } else if((nfs_marker = strstr(entry->fsname, \":/\")) != NULL) {\n  746 |                 size_t until_slash =\n  747 |                     MIN((int)sizeof(entry->fsname), nfs_marker - entry->fsname);\n  748 |                 strncpy(diskname, entry->fsname, until_slash);\n  749 |                 is_rotational = true;\n  750 | \n  751 |                 /* Assign different dev ids (with major id 0) to different nfs servers */\n  752 |                 if(!g_hash_table_contains(self->nfs_table, diskname)) {\n  753 |                     g_hash_table_insert(self->nfs_table, g_strdup(diskname), NULL);\n  754 |                 }\n  755 |                 whole_disk = makedev(0, g_hash_table_size(self->nfs_table));\n  756 |             } else {\n  757 |                 strncpy(diskname, \"unknown\", sizeof(diskname));\n  758 |                 is_rotational = true;\n  759 |                 whole_disk = 0;\n  760 |             }","lines":20},{"ref":"lib/utilities.c:771","code":"  771 |                 strncpy(diskname, entry->fsname, sizeof(diskname)-1);","lines":1}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rm_offset_get_fiemap() debug log uses %d for file_offset which is a uint64_t\n(`file_offset=%d`). This is a format-specifier/type mismatch (wrong value printed, UB on\nvarargs). Only compiled under _RM_OFFSET_DEBUG, hence low severity.","fix":"Use %\" G_GUINT64_FORMAT \" for file_offset.","locations":[{"ref":"lib/utilities.c:993-994","code":"  993 |     rm_log_debug_line(_(\"rm_offset_get_fiemap: fd=%d, n_extents=%d, file_offset=%d\"),\n  994 |                       fd, n_extents, file_offset);","lines":2}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rm_format_elapsed_time() uses strict `>` comparisons against the unit thresholds. A duration\nof exactly 60 seconds prints as \"60.00s\" (rather than \"1m  0.00s\"), exactly 3600s as\n\"3600.00s\", etc. Boundary values are not normalized into the higher unit.","fix":"Use >= for the unit thresholds.","locations":[{"ref":"lib/utilities.c:1391-1409","code":" 1391 |     if(elapsed_sec > SECONDS_PER_DAY) {\n 1392 |         gint days = elapsed_sec / SECONDS_PER_DAY;\n 1393 |         elapsed_sec -= days * SECONDS_PER_DAY;\n 1394 |         g_string_append_printf(buf, \"%2dd \", days);\n 1395 |     }\n 1396 | \n 1397 |     if(elapsed_sec > SECONDS_PER_HOUR) {\n 1398 |         gint hours = elapsed_sec / SECONDS_PER_HOUR;\n 1399 |         elapsed_sec -= hours * SECONDS_PER_HOUR;\n 1400 |         g_string_append_printf(buf, \"%2dh \", hours);\n 1401 |     }\n 1402 | \n 1403 |     if(elapsed_sec > SECONDS_PER_MINUTE) {\n 1404 |         gint minutes = elapsed_sec / SECONDS_PER_MINUTE;\n 1405 |         elapsed_sec -= minutes * SECONDS_PER_MINUTE;\n 1406 |         g_string_append_printf(buf, \"%2dm \", minutes);\n 1407 |     }\n 1408 | \n 1409 |     g_string_append_printf(buf, \"%2.*fs\", sec_precision, elapsed_sec);","lines":19}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rm_running_mean_add() uses pos = (++m->cursor) % m->max_values (pre-increment). The first\nvalue is written to slot 1, slot 0 is unused until cursor wraps around to a multiple of\nmax_values. The running mean stays numerically correct (sum is updated consistently and\nget() divides by MIN(max_values,cursor)), so this is not a correctness bug, but it wastes one\nslot and is a confusing off-by-one. If max_values were ever 1, pos = (++cursor) % 1 is always\n0 which is fine; but the pre-increment idiom obscures the intended ring-buffer semantics.","fix":"Use pos = m->cursor % m->max_values; then increment cursor afterwards so the first value lands in slot 0 and the ring buffer is used fully.","locations":[{"ref":"lib/utilities.c:1420-1434","code":" 1420 | void rm_running_mean_add(RmRunningMean *m, gdouble value) {\n 1421 |     int pos = (++m->cursor) % m->max_values;\n 1422 |     m->sum += value;\n 1423 |     m->sum -= m->values[pos];\n 1424 |     m->values[pos] = value;\n 1425 | }\n 1426 | \n 1427 | gdouble rm_running_mean_get(RmRunningMean *m) {\n 1428 |     int n = MIN(m->max_values, m->cursor);\n 1429 |     if(n == 0) {\n 1430 |         return 0.0;\n 1431 |     }\n 1432 | \n 1433 |     return m->sum / n;\n 1434 | }","lines":15}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","description":"memset(buf, 0, sizeof(buf_size)) zeroes only sizeof(size_t) (8) bytes of the key buffer, not buf_size bytes. The intent (per the comment 'Be safe') was to clear the whole buffer. It is mostly masked because snprintf() NUL-terminates within buf_size, but the clear is wrong and misleading; if a future caller relied on a fully zeroed buffer it would break.","fix":"Use memset(buf, 0, buf_size);","locations":[{"ref":"lib/xattr.c:142","code":"  142 |     memset(buf, 0, sizeof(buf_size));","lines":1}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"JSON id generator XORs file->actual_file_size (guint64) into a guint32 hash via 'hash ^= file->actual_file_size', silently truncating the high 32 bits. Combined with inode^dev (also truncated) this is just a seed for MurmurHash and de-dup collision is handled, so harmless, but the truncating implicit conversion is a latent smell.","fix":"Cast explicitly (hash ^= (guint32)file->actual_file_size) to document intent, or fold high/low halves.","locations":[{"ref":"lib/formats/json.c:51-69","code":"   51 | static guint32 rm_fmt_json_generate_id(RmFmtHandlerJSON *self, RmFile *file,\n   52 |                                        const char *file_path, char *cksum) {\n   53 |     guint32 hash = 0;\n   54 |     hash = file->inode ^ file->dev;\n   55 |     hash ^= file->actual_file_size;\n   56 | \n   57 |     for(int i = 0; i < 8192; ++i) {\n   58 |         hash ^= MurmurHash3_x86_32(file_path, strlen(file_path), i);\n   59 |         if(cksum != NULL) {\n   60 |             hash ^= MurmurHash3_x86_32(cksum, strlen(cksum), i);\n   61 |         }\n   62 | \n   63 |         if(!g_hash_table_contains(self->id_set, GUINT_TO_POINTER(hash))) {\n   64 |             break;\n   65 |         }\n   66 |     }\n   67 | \n   68 |     g_hash_table_add(self->id_set, GUINT_TO_POINTER(hash));\n   69 |     return hash;","lines":19}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"In the no-extension branch, the length of file B is computed from basename_a instead of basename_b. When file_b has no extension its compared length is taken from file_a's basename, so the SIGN_DIFF length pre-check and the subsequent strncasecmp use a wrong length for B. This makes rm_file_cmp_without_extension (used for --match-without-extension grouping) produce wrong/asymmetric comparisons, breaking grouping and the sort invariant.","fix":"Change the b_len fallback to use basename_b: 'size_t b_len = (ext_b) ? (ext_b - basename_b) : strlen(basename_b);'.","locations":[{"ref":"lib/preprocess.c:57-58","code":"   57 |     size_t a_len = (ext_a) ? (ext_a - basename_a) : (int)strlen(basename_a);\n   58 |     size_t b_len = (ext_b) ? (ext_b - basename_b) : (int)strlen(basename_a);","lines":2}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"path_to_handler maps the copy's path to the *template* handler instead of the copy. handler_to_file is keyed by new_handler_copy, but path_to_handler stores new_handler (the shared template) as the value. Consumers that retrieve the handler via rm_fmt_get_pair_iter (e.g. summary.c) get a template that has path==NULL and shares state across all outputs of that format; only handler->name happens to be correct, masking the bug.","fix":"Insert new_handler_copy as the value: g_hash_table_insert(self->path_to_handler, new_handler_copy->path, new_handler_copy);","locations":[{"ref":"lib/formats.c:309-310","code":"  309 |     g_hash_table_insert(self->handler_to_file, new_handler_copy, file_handle);\n  310 |     g_hash_table_insert(self->path_to_handler, new_handler_copy->path, new_handler);","lines":2}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"rm_digest_copy() returns NULL when interface->copy is NULL, but the RmDigest shell was already allocated via g_slice_copy(sizeof(RmDigest), digest) at line 947 and is leaked (never freed) on that early return. Additionally callers (lib/shredder.c:1362, lib/file.c:119, lib/replay.c:832) assign the NULL result without NULL-checking, so a later rm_digest_free()/rm_digest_update() on it would crash. All current interfaces define copy, so it is latent, but the leak-on-error path is real.","fix":"g_slice_free(RmDigest, copy) before returning NULL, and/or make callers handle NULL. Since every interface provides copy, consider g_assert(interface->copy) instead of silently returning NULL.","locations":[{"ref":"lib/checksum.c:944-956","code":"  944 | RmDigest *rm_digest_copy(RmDigest *digest) {\n  945 |     g_assert(digest);\n  946 | \n  947 |     RmDigest *copy = g_slice_copy(sizeof(RmDigest), digest);\n  948 | \n  949 |     const RmDigestInterface *interface = rm_digest_get_interface(digest->type);\n  950 |     if(interface->copy == NULL) {\n  951 |         return NULL;\n  952 |     }\n  953 | \n  954 |     copy->state = interface->copy(digest->state);\n  955 |     return copy;\n  956 | }","lines":13}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"rm_cmd_parse_small_output / rm_cmd_parse_large_output call rm_cmd_parse_output_pair (which sets *error on failure) but always `return true`. The GError gets set on the real error pointer yet the callback reports success, so g_option_context_parse may continue / report inconsistent state, and a bad -o/-O value is effectively swallowed. The error param is even annotated _UNUSED while being used.","fix":"Return the boolean result of rm_cmd_parse_output_pair (propagate failure), and drop the _UNUSED annotation on error.","locations":[{"ref":"lib/cmdline.c:956-970","code":"  956 | static gboolean rm_cmd_parse_small_output(_UNUSED const char *option_name,\n  957 |                                           const gchar *output_pair, RmSession *session,\n  958 |                                           _UNUSED GError **error) {\n  959 |     session->output_cnt[0] = MAX(session->output_cnt[0], 0);\n  960 |     session->output_cnt[0] += rm_cmd_parse_output_pair(session, output_pair, error);\n  961 |     return true;\n  962 | }\n  963 | \n  964 | static gboolean rm_cmd_parse_large_output(_UNUSED const char *option_name,\n  965 |                                           const gchar *output_pair, RmSession *session,\n  966 |                                           _UNUSED GError **error) {\n  967 |     session->output_cnt[1] = MAX(session->output_cnt[1], 0);\n  968 |     session->output_cnt[1] += rm_cmd_parse_output_pair(session, output_pair, error);\n  969 |     return true;\n  970 | }","lines":15}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"rm_fmt_close() calls fclose(file) on every handler's FILE* but ignores the return value, and no handler flushes/checks errors. For file outputs (json, csv, sh, etc.) a failed write or a full disk during the buffered fclose flush is silently lost, so rmlint reports success while the result file is truncated/corrupt. None of the per-format fprintf/fputs/fwrite calls check for errors either.","fix":"Check fclose() return (and optionally ferror(file) before close) for non-stream handlers and emit a warning / non-zero exit when a write error occurred. Skip fclose for stdout/stderr/stdin.","locations":[{"ref":"lib/formats.c:414-419","code":"  414 |     RM_FMT_FOR_EACH_HANDLER_BEGIN(self) {\n  415 |         RM_FMT_CALLBACK(handler->foot);\n  416 |         fclose(file);\n  417 |         g_mutex_clear(&handler->print_mtx);\n  418 |     }\n  419 |     RM_FMT_FOR_EACH_HANDLER_END","lines":6}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"The 'type' member is read via json_object_get_string_member(object, \"type\") with no check that the member exists or is a string. If 'type' is missing or non-string, json_object_get_string_member emits a g_critical and returns NULL; rm_file_string_to_lint_type(NULL) then returns RM_LINT_TYPE_UNKNOWN and the warning at line 242-243 calls json_object_get_string_member a SECOND time (re-triggering the critical) and prints '%s' with NULL. Malformed JSON produces noisy criticals and a NULL passed to a %s format.","fix":"Fetch the type member once with json_object_get_member, verify it is a string node, store it in a local const char*, and reuse it for both the lookup and the warning message. Skip the entry if the member is missing/non-string.","locations":[{"ref":"lib/replay.c:238-245","code":"  238 |     RmLintType type =\n  239 |         rm_file_string_to_lint_type(json_object_get_string_member(object, \"type\"));\n  240 | \n  241 |     if(type == RM_LINT_TYPE_UNKNOWN) {\n  242 |         rm_log_warning_line(_(\"lint type '%s' not recognised\"),\n  243 |                             json_object_get_string_member(object, \"type\"));\n  244 |         return NULL;\n  245 |     }","lines":8}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In rm_pp_compile_patterns, if rm_pp_parse_pattern fails it returns 0 and sets *error, but the surrounding loop does not break. With i unchanged and the 'r'/'x' character re-examined on the next iteration (i incremented by only 1), parsing continues over malformed input and may overwrite/re-prefix the error, instead of stopping at the first failure.","fix":"After calling rm_pp_parse_pattern, if *error is set (or it returned 0), break out of the loop immediately.","locations":[{"ref":"lib/preprocess.c:331-352","code":"  331 |         i += rm_pp_parse_pattern(&sortcrit[i + 1], &regex, error);\n  332 | \n  333 |         if(regex != NULL) {\n  334 |             if(pattern_count < (int)RM_PATTERN_N_MAX && pattern_count != -1) {\n  335 |                 /* Append to already compiled patterns */\n  336 |                 g_ptr_array_add(session->pattern_cache, regex);\n  337 |                 pattern_count++;\n  338 |             } else if(pattern_count != -1) {\n  339 |                 g_set_error(error, RM_ERROR_QUARK, 0,\n  340 |                             _(\"Cannot add more than %lu regex patterns.\"),\n  341 |                             (unsigned long)RM_PATTERN_N_MAX);\n  342 | \n  343 |                 /* Make sure to set the warning only once */\n  344 |                 pattern_count = -1;\n  345 |                 g_regex_unref(regex);\n  346 |             } else {\n  347 |                 g_regex_unref(regex);\n  348 |             }\n  349 |         }\n  350 |     }\n  351 | \n  352 |     g_prefix_error(error, _(\"Error while parsing sortcriteria patterns: \"));","lines":22}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"depth is read with json_node_get_int(depth_node) and checksum/parent_path via json_node_get_string / json_object_get_string_member with no type validation. json_node_get_int on a non-integer node and json_node_get_string on a non-string node return 0/NULL with a g_critical. parent_path (line 330) in particular: if a PART_OF_DIRECTORY entry lacks parent_path it returns NULL and rm_trie_search/rm_trie_insert receive a NULL key path.","fix":"Validate node types before extraction; guard parent_path against NULL before passing to the trie.","locations":[{"ref":"lib/replay.c:307-338","code":"  307 |     JsonNode *depth_node = json_object_get_member(object, \"depth\");\n  308 |     if(depth_node != NULL) {\n  309 |         file->depth = json_node_get_int(depth_node);\n  310 |     }\n  311 | \n  312 |     /* Fake the checksum using RM_DIGEST_EXT */\n  313 |     const JsonNode *cksum_node = json_object_get_member(object, \"checksum\");\n  314 |     if(cksum_node != NULL) {\n  315 |         const char *cksum = json_object_get_string_member(object, \"checksum\");\n  316 |         if(cksum != NULL) {\n  317 |             rm_digest_update(file->digest, (unsigned char *)cksum, strlen(cksum));\n  318 |         }\n  319 |     }\n  320 | \n  321 |     /* Fix the hardlink relationship */\n  322 |     const JsonNode *hardlink_of = json_object_get_member(object, \"hardlink_of\");\n  323 |     if(hardlink_of != NULL) {\n  324 |         rm_file_hardlink_add(polly->last_original, file);\n  325 |     } else {\n  326 |         g_assert(!file->hardlinks);\n  327 |     }\n  328 | \n  329 |     if(file->lint_type == RM_LINT_TYPE_PART_OF_DIRECTORY) {\n  330 |         const char *parent_path = json_object_get_string_member(object, \"parent_path\");\n  331 |         GQueue *children = rm_trie_search(&polly->directory_trie, parent_path);\n  332 |         if(children == NULL) {\n  333 |             children = g_queue_new();\n  334 |             rm_trie_insert(&polly->directory_trie, parent_path, children);\n  335 |         }\n  336 | \n  337 |         g_queue_push_tail(children, file);\n  338 |     }","lines":32}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"rm_parrot_cage_load logs error->message in the failure branch, but rm_parrot_open can return non-NULL with error==NULL on success; the guard `polly == NULL || error != NULL` is correct. However if polly!=NULL and error==NULL the function proceeds normally - fine. The real issue: the warning unconditionally dereferences error->message, which is safe only because every NULL-return path in rm_parrot_open sets error. This is an implicit invariant; should rm_parrot_open ever return NULL without setting error (e.g. future edit), this NULL-derefs. Defensive check recommended.","fix":"Use rm_log_warning_line(\"Error: %s\", error ? error->message : \"unknown\"); and only g_error_free(error) when error != NULL.","locations":[{"ref":"lib/replay.c:783-787","code":"  783 |     if(polly == NULL || error != NULL) {\n  784 |         rm_log_warning_line(\"Error: %s\", error->message);\n  785 |         g_error_free(error);\n  786 |         return false;\n  787 |     }","lines":5}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In rm_util_is_nonstripped(), gelf_getshdr(scn, &shdr) return value is ignored. If it fails it\nreturns NULL and leaves shdr uninitialized, and the subsequent read of shdr.sh_type is on\nuninitialized stack memory, which could spuriously match SHT_SYMTAB (false positive) or read\ngarbage.","fix":"Check the return of gelf_getshdr() and skip/continue the section if it returns NULL.","locations":[{"ref":"lib/utilities.c:340-347","code":"  340 |         gelf_getshdr(scn, &shdr);\n  341 | \n  342 |         /* If a section header holding a symbol table (.symtab)\n  343 |          * is found, this ELF file has not been stripped. */\n  344 |         if(shdr.sh_type == SHT_SYMTAB) {\n  345 |             is_ns = true;\n  346 |             break;\n  347 |         }","lines":8}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"rm_offset_get_from_fd() calls fsync(fd) and ignores its return value. More relevant to\nperformance/correctness: fsync on a read-only fd (the fd is opened O_RDONLY in\nrm_offset_get_from_path and in rm_util_link_type) is of dubious value and on some\nfilesystems is a no-op or error; the result is discarded so a failure is silently swallowed.","fix":"Drop the fsync on read-only fds, or check/log its return; document why it is needed if it is intentional (forcing delayed allocation to commit for accurate fiemap).","locations":[{"ref":"lib/utilities.c:1029","code":" 1029 |     fsync(fd);","lines":1}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"rm_util_thread_pool_new() logs the error and frees it but still returns the (NULL) pool from\ng_thread_pool_new on failure without making the failure unambiguous to callers beyond the\nreturn value; more importantly callers that do not check for NULL will pass NULL into\nrm_util_thread_pool_push -> g_thread_pool_push(NULL,...) which asserts/crashes. The function\nsilently returns NULL which is easy to misuse.","fix":"Document the NULL-on-failure contract clearly and audit callers; consider aborting or returning an explicit error to force handling.","locations":[{"ref":"lib/utilities.c:1346-1355","code":" 1346 | GThreadPool *rm_util_thread_pool_new(GFunc func, gpointer data, int threads) {\n 1347 |     GError *error = NULL;\n 1348 |     GThreadPool *pool = g_thread_pool_new(func, data, threads, FALSE, &error);\n 1349 | \n 1350 |     if(error != NULL) {\n 1351 |         rm_log_error_line(\"Unable to create thread pool.\");\n 1352 |         g_error_free(error);\n 1353 |     }\n 1354 |     return pool;\n 1355 | }","lines":10}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"rm_xattr_mark_deduplicated initializes result = EXIT_FAILURE and only overwrites it inside the loop when a matching .mtime entry is found. If the map has no matching mtime entry (common: file never hashed by rmlint, or mtime changed) the function returns EXIT_FAILURE even though nothing actually failed - it simply had nothing to mark. Callers cannot distinguish 'nothing to do' from a real setxattr error. Also `result` is overwritten on every matching key, so only the last setxattr's status survives.","fix":"Return EXIT_SUCCESS when no error occurred; accumulate failures (e.g. OR/keep first non-zero rc) rather than overwriting result each iteration, and treat 'no match' as success.","locations":[{"ref":"lib/xattr.c:464-491","code":"  464 |     int result = EXIT_FAILURE;\n  465 |     char *key = NULL, *value = NULL;\n  466 |     GHashTable *map = rm_xattr_list(path, follow_symlinks);\n  467 |     GHashTableIter iter;\n  468 | \n  469 |     g_hash_table_iter_init(&iter, map);\n  470 |     while(g_hash_table_iter_next(&iter, (gpointer)&key, (gpointer)&value)) {\n  471 |         if(!g_str_has_suffix(key, \".mtime\")) {\n  472 |             continue;\n  473 |         }\n  474 | \n  475 |         gdouble mtime = g_ascii_strtod(value, NULL);\n  476 |         if(FLOAT_SIGN_DIFF(mtime, stat_buf.st_mtime, MTIME_TOL) != 0) {\n  477 |             continue;\n  478 |         }\n  479 | \n  480 |         rm_xattr_change_subkey(key, \"cksum\");\n  481 |         char *cksum = g_hash_table_lookup(map, key);\n  482 |         if(cksum == NULL) {\n  483 |             continue;\n  484 |         }\n  485 | \n  486 |         rm_xattr_change_subkey(key, \"dedup\");\n  487 |         result = rm_sys_setxattr(path, key, cksum, strlen(cksum), 0, follow_symlinks);\n  488 |     }\n  489 | \n  490 |     g_hash_table_destroy(map);\n  491 |     return result;","lines":28}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","description":"rm_hasher_symlink_read does not detect truncation: readlink() returns up to buf_size bytes and never null-terminates; if the target path length equals buf_size the link is silently truncated and only the truncated bytes are hashed, with no error. Unlikely with the default 16KiB buffer but possible with a small --read-buffer-len.","fix":"Treat 'len == buf_size' as possible truncation (retry with a larger buffer or log a warning), as PATH_MAX-style readlink callers normally do.","locations":[{"ref":"lib/hasher.c:148-158","code":"  148 |     RmBuffer *buffer = rm_buffer_new(hasher->buf_sem, hasher->buf_size);\n  149 |     gint len = readlink(path, (char *)buffer->data, hasher->buf_size);\n  150 | \n  151 |     if (len < 0) {\n  152 |         rm_log_perror(\"Cannot read symbolic link\");\n  153 |         rm_buffer_free(hasher->buf_sem, buffer);\n  154 |         return FALSE;\n  155 |     }\n  156 | \n  157 |     *bytes_actually_read = len;\n  158 |     buffer->len = len;","lines":11}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","description":"rm_trav_buffer_new logs 'Unable to stat file' on stat failure but still returns a buffer with a zeroed stat_buf (g_new0). rm_traverse_tree then branches on buffer->stat_buf.st_mode; a zeroed mode matches none of S_ISLNK/S_ISREG/S_ISDIR, so the path is silently dropped into the final else (treated as 'block device/fifo/weird') and freed, with no user-visible warning that the requested path could not be processed.","fix":"Detect the stat failure (return state) and emit a clear per-path warning (or skip with a distinct message) instead of letting it fall through as an unknown file type.","locations":[{"ref":"lib/traverse.c:81-96","code":"   81 | static RmTravBuffer *rm_trav_buffer_new(RmSession *session, RmPath *rmpath) {\n   82 |     RmTravBuffer *self = g_new0(RmTravBuffer, 1);\n   83 |     self->rmpath = rmpath;\n   84 | \n   85 |     int stat_state;\n   86 |     if(session->cfg->follow_symlinks) {\n   87 |         stat_state = rm_sys_stat(rmpath->path, &self->stat_buf);\n   88 |     } else {\n   89 |         stat_state = rm_sys_lstat(rmpath->path, &self->stat_buf);\n   90 |     }\n   91 | \n   92 |     if(stat_state == -1) {\n   93 |         rm_log_perror(\"Unable to stat file\");\n   94 |     }\n   95 |     return self;\n   96 | }","lines":16},{"ref":"lib/traverse.c:514-540","code":"  514 |         if(S_ISLNK(buffer->stat_buf.st_mode) && !rmpath->realpath_worked) {\n  515 |             /* A symlink where we could not get the actual path from\n  516 |              * (and it was given directly, e.g. by a find call)\n  517 |              */\n  518 |             rm_traverse_file(trav_session, &buffer->stat_buf, rmpath->path,\n  519 |                              rmpath->is_prefd, rmpath->idx, RM_LINT_TYPE_BADLINK, false,\n  520 |                              is_hidden, FALSE, 0);\n  521 |         } else if(S_ISREG(buffer->stat_buf.st_mode)) {\n  522 |             rm_traverse_file(trav_session, &buffer->stat_buf, rmpath->path,\n  523 |                              rmpath->is_prefd, rmpath->idx, RM_LINT_TYPE_UNKNOWN, false,\n  524 |                              is_hidden, FALSE, 0);\n  525 | \n  526 |             rm_trav_buffer_free(buffer);\n  527 |         } else if(S_ISDIR(buffer->stat_buf.st_mode)) {\n  528 |             /* It's a directory, traverse it. */\n  529 |             buffer->disk =\n  530 |                 rm_mds_device_get(mds, rmpath->path, (cfg->fake_pathindex_as_disk)\n  531 |                                                          ? rmpath->idx + 1\n  532 |                                                          : buffer->stat_buf.st_dev);\n  533 |             rm_mds_device_ref(buffer->disk, 1);\n  534 |             rm_mds_push_task(buffer->disk, buffer->stat_buf.st_dev, 0, rmpath->path,\n  535 |                              buffer);\n  536 | \n  537 |         } else {\n  538 |             /* Probably a block device, fifo or something weird. */\n  539 |             rm_trav_buffer_free(buffer);\n  540 |         }","lines":27}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"rm_userlist_contains() assigns the return of g_sequence_lookup() (a GSequenceIter* pointer)\ndirectly into `bool gid_found`/`bool uid_found`. Converting a pointer to bool works for the\ntruthiness test, but the variables are declared bool and the implicit pointer->bool narrowing\nis fragile/relies on the compiler. More notably, g_sequence_lookup returns NULL when the value\nis not found OR when it would be the begin-iterator in some edge cases; relying on it as a\nplain boolean is brittle.","fix":"Store the iter in a GSequenceIter* and set the bool explicitly: `uid_found = (iter != NULL);`.","locations":[{"ref":"lib/utilities.c:426-434","code":"  426 |     bool gid_found = FALSE;\n  427 |     bool uid_found = FALSE;\n  428 | \n  429 |     g_mutex_lock(&self->lock);\n  430 |     {\n  431 |         gid_found = g_sequence_lookup(self->groups, GUINT_TO_POINTER(gid),\n  432 |                                       rm_userlist_cmp_ids, NULL);\n  433 |         uid_found = g_sequence_lookup(self->users, GUINT_TO_POINTER(uid),\n  434 |                                       rm_userlist_cmp_ids, NULL);","lines":9}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"rm_cfg_add_path stores either realpath()-allocated memory (malloc) or g_canonicalize_filename()-allocated memory (g_malloc) in rmpath->path. rm_path_free always frees it with plain free(). g_-allocated memory must be released with g_free(); mixing allocators is undefined under custom GLib allocators (works only because the default GLib slice/mem uses malloc).","fix":"Allocate consistently: wrap the realpath() result with g_strdup and free the original, or track which allocator was used; then free with g_free in rm_path_free.","locations":[{"ref":"lib/cfg.c:32-35","code":"   32 | static void rm_path_free(RmPath *rmpath) {\n   33 |     free(rmpath->path);\n   34 |     g_slice_free(RmPath, rmpath);\n   35 | }","lines":4},{"ref":"lib/cfg.c:135-148","code":"  135 |     bool realpath_worked = true;\n  136 |     char *real_path = realpath(path, NULL);\n  137 |     if(real_path == NULL) {\n  138 |         rm_log_debug_line(_(\"Can't get real path for directory or file \\\"%s\\\": %s\"),\n  139 |                             path, strerror(errno));\n  140 | \n  141 |         /* Continue with the path we got,\n  142 |          * this is likely a bad symbolic link */\n  143 |         real_path = g_canonicalize_filename(path, NULL);\n  144 |         realpath_worked = false;\n  145 |     }\n  146 | \n  147 |     RmPath *rmpath = g_slice_new(RmPath);\n  148 |     rmpath->path = real_path;","lines":14}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"rm_digest_glib_steal() always allocates a full GChecksum copy (g_checksum_copy) on every steal just to call g_checksum_get_digest (which is destructive). For md5/sha1/sha256/sha512 every rm_digest_equal()/steal() pays an alloc+free. This is a per-comparison performance cost on the glib hash backends; the other backends (sha3, blake) copy a small stack-sized slice instead.","fix":"Unavoidable with GChecksum's destructive API, but the cost is real; consider caching the finalized digest once finalization is reached, or note the overhead. At minimum acceptable, but flagged as a hot-path allocation.","locations":[{"ref":"lib/checksum.c:441-445","code":"  441 | static void rm_digest_glib_steal(GChecksum *state, guint8 *result, gsize *len) {\n  442 |     GChecksum *copy = g_checksum_copy(state);\n  443 |     g_checksum_get_digest(copy, result, len);\n  444 |     g_checksum_free(copy);\n  445 | }","lines":5}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"stats.c prints session->dup_counter, dup_group_counter and other_lint_cnt (all RmOff == guint64) with the signed conversion %15ld and an explicit (long) cast. On LP64 long is 64-bit so it usually works, but on LLP64/32-bit long the value is truncated, and a count above LONG_MAX would print as negative. Inconsistent with the rest of the codebase which uses the LLU (G_GUINT64_FORMAT) macro for RmOff.","fix":"Print with %\" LLU \" (G_GUINT64_FORMAT) and drop the (long) casts, matching summary.c.","locations":[{"ref":"lib/formats/stats.c:96-101","code":"   96 |     fprintf(out, _(\"%s%15ld%s Duplicate files\\n\"), MAYBE_RED(out, session),\n   97 |             (long)session->dup_counter, MAYBE_RESET(out, session));\n   98 |     fprintf(out, _(\"%s%15ld%s Groups in total\\n\"), MAYBE_RED(out, session),\n   99 |             (long)session->dup_group_counter, MAYBE_RESET(out, session));\n  100 |     fprintf(out, _(\"%s%15ld%s Other lint items\\n\"), MAYBE_RED(out, session),\n  101 |             (long)session->other_lint_cnt, MAYBE_RESET(out, session));","lines":6}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"rm_hasher_joiner is declared to return 'RmHasherCallback *' (a pointer-to-function-pointer) but returns the integer literal 0, and the function is then cast to RmHasherCallback at assignment (line 398). The real RmHasherCallback typedef returns int. The mismatched return type only works because of the cast; it is misleading and relies on undefined-behaviour-adjacent function-pointer casting.","fix":"Declare rm_hasher_joiner with the exact RmHasherCallback signature (returning int, returning 0) and drop the cast at line 398.","locations":[{"ref":"lib/hasher.c:356-361","code":"  356 | static RmHasherCallback *rm_hasher_joiner(RmHasher *hasher, RmDigest *digest,\n  357 |                                           _UNUSED gpointer session_user_data,\n  358 |                                           _UNUSED gpointer task_user_data) {\n  359 |     g_async_queue_push(hasher->return_queue, digest);\n  360 |     return 0;\n  361 | }","lines":6},{"ref":"lib/hasher.c:398","code":"  398 |         self->callback = (RmHasherCallback)rm_hasher_joiner;","lines":1}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"rm_mounts_is_nonrotational/get_disk_id/is_evil/can_reflink use GINT_TO_POINTER and\nGUINT_TO_POINTER inconsistently for dev_t keys (e.g. part_table inserts with\nGUINT_TO_POINTER(stat_buf_folder.st_dev) at line 787 but is looked up with\nGINT_TO_POINTER(device) at line 862 and GINT_TO_POINTER(dev) at 886/909). On 64-bit dev_t,\nGINT_TO_POINTER truncates to int and sign-extends differently than GUINT_TO_POINTER, so a\ndev_t with the high bit of its low 32 bits set hashes to a different pointer key on insert vs\nlookup, causing missed lookups (falling back to \"Partition not found\" / treating as\nrotational).","fix":"Use a single consistent macro (GUINT_TO_POINTER) for all dev_t keys on both insert and lookup, or hash the full dev_t via a proper 64-bit key.","locations":[{"ref":"lib/utilities.c:787-808","code":"  787 |             g_hash_table_insert(self->part_table,\n  788 |                                 GUINT_TO_POINTER(stat_buf_folder.st_dev),\n  789 |                                 rm_part_info_new(entry->dir, entry->fsname, whole_disk));\n  790 |         } else {\n  791 |             rm_log_debug_line(\"Skipping duplicate mount entry for dir %s dev %02u:%02u\",\n  792 |                               entry->dir, major(stat_buf_folder.st_dev),\n  793 |                               minor(stat_buf_folder.st_dev));\n  794 |             continue;\n  795 |         }\n  796 | \n  797 |         /* small hack, so also the full disk id can be given to the api below */\n  798 |         if(!g_hash_table_contains(self->part_table, GINT_TO_POINTER(whole_disk))) {\n  799 |             g_hash_table_insert(self->part_table,\n  800 |                                 GUINT_TO_POINTER(whole_disk),\n  801 |                                 rm_part_info_new(entry->dir, entry->fsname, whole_disk));\n  802 |         }\n  803 | \n  804 |         if(!g_hash_table_contains(self->disk_table, GINT_TO_POINTER(whole_disk))) {\n  805 |             g_hash_table_insert(self->disk_table,\n  806 |                                 GINT_TO_POINTER(whole_disk),\n  807 |                                 rm_disk_info_new(diskname, is_rotational));\n  808 |         }","lines":22},{"ref":"lib/utilities.c:861-866","code":"  861 |     RmPartitionInfo *part =\n  862 |         g_hash_table_lookup(self->part_table, GINT_TO_POINTER(device));\n  863 |     if(part) {\n  864 |         RmDiskInfo *disk =\n  865 |             g_hash_table_lookup(self->disk_table, GINT_TO_POINTER(part->disk));\n  866 |         if(disk) {","lines":6},{"ref":"lib/utilities.c:886","code":"  886 |     RmPartitionInfo *part = g_hash_table_lookup(self->part_table, GINT_TO_POINTER(dev));","lines":1},{"ref":"lib/utilities.c:909","code":"  909 |                 g_hash_table_insert(self->part_table, GINT_TO_POINTER(dev), part);","lines":1}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","description":"rm_pp_handle_hardlink and rm_pp_check_path_double / rm_pp_handle_other_lint are passed as RmRFunc (gint(*)(gpointer,gpointer)) but return bool/gboolean values via TRUE/FALSE macros while declared to return gint/gboolean inconsistently (rm_pp_handle_hardlink returns 'FALSE'/'TRUE' though typed gint). This works because the values coincide, but mixing gboolean returns with the RmRFunc gint contract is type-unsafe and confusing.","fix":"Make the return types/values consistent with the RmRFunc contract (return gint 0/1, not FALSE/TRUE), or document the equivalence.","locations":[{"ref":"lib/preprocess.c:514-526","code":"  514 | static gint rm_pp_handle_hardlink(RmFile *file, RmFile *head) {\n  515 |     if(file == head) {\n  516 |         return FALSE;\n  517 |     }\n  518 | \n  519 |     if(head->hardlinks) {\n  520 |         /* bundle hardlink */\n  521 |         rm_file_hardlink_add(head, file);\n  522 |     }\n  523 | \n  524 |     /* remove file from inode_cluster queue */\n  525 |     return TRUE;\n  526 | }","lines":13}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"fs_supports_reflinks() shells out via system() running `xfs_info '%s' | grep -q ...` for every\nXFS mount during mount-table construction. This forks a shell, spawns xfs_info and grep, and is\nrun once per XFS mountpoint at startup. system() also does not sanitize the mountpoint, and the\npath is single-quoted but a mountpoint containing a single quote would break the command\n(quoting/injection concern). It blocks startup on slow/hung filesystems.","fix":"Detect XFS reflink support via statfs/ioctl or by reading the geometry programmatically rather than system(); at minimum properly escape the mountpoint (g_shell_quote).","locations":[{"ref":"lib/utilities.c:582-597","code":"  582 | static bool fs_supports_reflinks(char *fstype, char *mountpoint) {\n  583 |     if(strcmp(fstype, \"btrfs\")==0) {\n  584 |         return true;\n  585 |     }\n  586 |     if(strcmp(fstype, \"ocfs2\")==0) {\n  587 |         return true;\n  588 |     }\n  589 |     if(strcmp(fstype, \"xfs\")==0) {\n  590 |         /* xfs *might* support reflinks...*/\n  591 |         char *cmd = g_strdup_printf(\"xfs_info '%s' 2>/dev/null | grep -q 'reflink=1'\", mountpoint);\n  592 |         int res = system(cmd);\n  593 |         g_free(cmd);\n  594 |         return(res==0);\n  595 |     }\n  596 |     return false;\n  597 | }","lines":16}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"Every formatter writes per-file via fprintf/fputs/fputc directly to the FILE* under a per-handler mutex, with no batching. For large duplicate sets to a real file this is many small stdio calls; uniques.c emits one fputs + one fputc per file, fdupes builds a 544-byte stack buffer per file. Combined with the per-call mutex lock in RM_FMT_CALLBACK this adds measurable overhead on big runs.","fix":"Consider buffering output (e.g. a GString per group flushed once) or at least relying on stdio buffering with setvbuf, and minimize per-element lock/printf churn.","locations":[{"ref":"lib/formats.c:227-240","code":"  227 | #define RM_FMT_CALLBACK(func, ...)                               \\\n  228 |     if(func) {                                                   \\\n  229 |         g_mutex_lock(&handler->print_mtx);                       \\\n  230 |         {                                                        \\\n  231 |             if(!handler->was_initialized && handler->head) {     \\\n  232 |                 if(handler->head) {                              \\\n  233 |                     handler->head(self->session, handler, file); \\\n  234 |                 }                                                \\\n  235 |                 handler->was_initialized = true;                 \\\n  236 |             }                                                    \\\n  237 |             func(self->session, handler, file, ##__VA_ARGS__);   \\\n  238 |         }                                                        \\\n  239 |         g_mutex_unlock(&handler->print_mtx);                     \\\n  240 |     }","lines":14},{"ref":"lib/formats/uniques.c:60-67","code":"   60 |     RM_DEFINE_PATH(file);\n   61 |     fputs(file_path, out);\n   62 |     if(self->print0) {\n   63 |         fputc('\\0', out);\n   64 |     } else {\n   65 |         fputc('\\n', out);\n   66 |     }\n   67 | }","lines":8}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"For RM_DIGEST_PARANOID, rm_shred_get_read_size() is effectively computed twice per increment: once inside rm_shred_reassign_checksum() under group->lock (lines 1592-1593, to size the paranoid digest) and again in rm_shred_process_file() at line 1663. The recomputation re-derives the same next_offset. Minor redundant work in a hot per-increment path; also part of why the unlocked call in process_file is fragile.","fix":"Cache the bytes_to_read computed during reassign for paranoid digests, or always compute it once under the group lock and reuse it.","locations":[{"ref":"lib/shredder.c:1592-1593","code":" 1592 |             if(group->next_offset == 0) {\n 1593 |                 (void)rm_shred_get_read_size(file, main);","lines":2},{"ref":"lib/shredder.c:1663","code":" 1663 |         RmOff bytes_to_read = rm_shred_get_read_size(file, tag);","lines":1}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"rm_tm_hidden_file calls RM_DEFINE_PATH(file), which builds the full file path into a PATH_MAX stack buffer via rm_file_build_path, but the result is never used; the function only returns file->is_hidden. This wastes a path reconstruction for every file filtered with --partial-hidden.","fix":"Remove the RM_DEFINE_PATH(file) line; just return file->is_hidden.","locations":[{"ref":"lib/treemerge.c:757-760","code":"  757 | static int rm_tm_hidden_file(RmFile *file, _UNUSED gpointer user_data) {\n  758 |     RM_DEFINE_PATH(file);\n  759 |     return file->is_hidden;\n  760 | }","lines":4}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"rm_util_same_device() calls g_unix_mounts_get() (which parses /proc/mounts and allocates the\nfull mount list) on every invocation. rm_util_link_type() may call it for each candidate file\npair when st_dev differs, so a duplicate-set spanning subvolumes re-reads and re-parses the\nentire mount table repeatedly - O(pairs * mounts) syscalls/allocations.","fix":"Cache the mount list (or the relevant device mapping) once per run, e.g. reuse the existing RmMountTable, instead of re-querying g_unix_mounts_get per call.","locations":[{"ref":"lib/utilities.c:1136-1159","code":" 1136 | static gboolean rm_util_same_device(const char *path1, const char *path2) {\n 1137 |     const char *best1 = NULL;\n 1138 |     const char *best2 = NULL;\n 1139 |     int len1 = 0;\n 1140 |     int len2 = 0;\n 1141 | \n 1142 |     GList *mounts = g_unix_mounts_get(NULL);\n 1143 |     for(GList *iter = mounts; iter; iter = iter->next) {\n 1144 |         GUnixMountEntry *mount = iter->data;\n 1145 |         const char *mountpath = g_unix_mount_get_mount_path(mount);\n 1146 |         int len = strlen(mountpath);\n 1147 |         if(len > len1 && strncmp(mountpath, path1, len) == 0) {\n 1148 |             best1 = g_unix_mount_get_device_path(mount);\n 1149 |             len1 = len;\n 1150 |         }\n 1151 |         if(len > len2 && strncmp(mountpath, path2, len) == 0) {\n 1152 |             best2 = g_unix_mount_get_device_path(mount);\n 1153 |             len2 = len;\n 1154 |         }\n 1155 |     }\n 1156 |     gboolean result = (best1 && best2 && strcmp(best1, best2) == 0);\n 1157 |     g_list_free_full(mounts, (GDestroyNotify)g_unix_mount_free);\n 1158 |     return result;\n 1159 | }","lines":24},{"ref":"lib/utilities.c:1233-1239","code":" 1233 |     if(stat1.st_dev != stat2.st_dev) {\n 1234 |         /* reflinks must be on same filesystem but not necessarily\n 1235 |          * same st_dev (btrfs subvolumes have different st_dev's) */\n 1236 |         if(!rm_util_same_device(path1, path2)) {\n 1237 |             RM_RETURN(RM_LINK_XDEV);\n 1238 |         }\n 1239 |     }","lines":7}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","description":"rm_digest_paranoid_buffered_update appends to the buffer list via g_slist_append(paranoid->buffer_tail, buffer)->next and keeps buffer_tail updated, which is O(1) - good. However g_slist_length(paranoid->buffers) used in the _RM_CHECKSUM_DEBUG branches is O(n); only compiled when debugging, so impact is negligible but worth noting if that debug flag is ever enabled in hot paths.","fix":"If debug logging is ever enabled, track a buffer count instead of calling g_slist_length.","locations":[{"ref":"lib/checksum.c:750-753","code":"  750 | #if _RM_CHECKSUM_DEBUG\n  751 |             rm_log_debug_line(\"Ejected candidate match at buffer #%u\",\n  752 |                               g_slist_length(paranoid->buffers));\n  753 | #endif","lines":4}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","description":"rm_parrot_check_path does an O(n) scan over cfg->paths with strncmp for every file to find the longest matching prefix; the code comment already notes this could be a RmTrie. For replays of huge JSON caches with many command-line paths this is O(files * paths). Noted as known/acceptable per the inline comment.","fix":"If profiling shows it matters, build a RmTrie of cfg->paths once and do longest-prefix lookups; otherwise leave as-is.","locations":[{"ref":"lib/replay.c:496-528","code":"  496 | static bool rm_parrot_check_path(RmParrot *polly, RmFile *file, const char *file_path) {\n  497 |     RmCfg *cfg = polly->session->cfg;\n  498 | \n  499 |     size_t highest_match = 0;\n  500 | \n  501 |     /* Find the highest matching path given on the commandline.\n  502 |      * If found, the path_index and is_prefd information is taken from it.\n  503 |      * If not found, the file will be discarded.\n  504 |      *\n  505 |      * If this turns out to be an performance problem, we could turn cfg->paths\n  506 |      * into a RmTrie and use it to find the longest prefix easily.\n  507 |      */\n  508 | \n  509 |     for(GSList *iter = cfg->paths; iter; iter = iter->next) {\n  510 |         const RmPath *rmpath = iter->data;\n  511 |         size_t path_len = strlen(rmpath->path);\n  512 | \n  513 |         if(strncmp(file_path, rmpath->path, path_len) == 0) {\n  514 |             if(path_len > highest_match) {\n  515 |                 highest_match = path_len;\n  516 | \n  517 |                 file->is_prefd = rmpath->is_prefd || polly->is_prefd;\n  518 |                 file->path_index = rmpath->idx;\n  519 |             }\n  520 |         }\n  521 |     }\n  522 | \n  523 |     if(highest_match == 0) {\n  524 |         FAIL_MSG(\"nope: no prefix\");\n  525 |     }\n  526 | \n  527 |     return (highest_match > 0);\n  528 | }","lines":33}]},{"id":"DEAD_1","type":"dea
