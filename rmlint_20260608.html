d_code","type_label":"Dead Code","severity":"low","description":"The macro RM_DIGEST_CUMULATIVE_DATA (defined as data64 on 64-bit, data32 on 32-bit) is never used anywhere; the union member it would name does not even exist (the union members are 'data' and 'bigdata'). Misleading leftover that suggests a renamed field.","fix":"Remove the unused RM_DIGEST_CUMULATIVE_DATA defines.","locations":[{"ref":"lib/checksum.c:288","code":"  288 | #define RM_DIGEST_CUMULATIVE_DATA data64","lines":1},{"ref":"lib/checksum.c:294","code":"  294 | #define RM_DIGEST_CUMULATIVE_DATA data32","lines":1},{"ref":"lib/checksum.c:299-305","code":"  299 | typedef struct RmDigestCumulative {\n  300 |     union {\n  301 |         guint8 *data;\n  302 |         RM_DIGEST_CUMULATIVE_T *bigdata;\n  303 |     };\n  304 |     RM_DIGEST_CUMULATIVE_T bytes; /* data length */\n  305 | } RmDigestCumulative;","lines":7}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"cache_quota_bytes is accepted by rm_hasher_new(), stored into self->cache_quota_bytes (line 393), but never read anywhere in the hasher. It is effectively dead state, and the related header doc additionally references a non-existent 'target_kept_bytes' parameter (hasher.h:90).","fix":"Remove the unused field/parameter (and the stale target_kept_bytes doc line), or wire cache_quota_bytes into the buffer-count limiting that the semaphore now does via num_threads*64.","locations":[{"ref":"lib/hasher.c:61","code":"   61 |     guint64 cache_quota_bytes;","lines":1},{"ref":"lib/hasher.c:393","code":"  393 |     self->cache_quota_bytes = cache_quota_bytes;","lines":1},{"ref":"lib/hasher.h:89-90","code":"   89 |  * @param cache_quota_bytes Total bytes to allocate for read buffers\n   90 |  * @param target_kept_bytes Target number of bytes to be stored in paranoid digest buffers","lines":2}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","description":"rm_shred_preprocess_input() declares `guint removed = 0;`, never updates it, then logs it ('removed %u of ...'). The value is always 0 and the log line is misleading - it suggests it reports how many groups/files were removed during preprocessing but always prints 0.","fix":"Either remove the `removed` variable and drop it from the log message, or actually count removed groups/files and report the real number.","locations":[{"ref":"lib/shredder.c:1211-1224","code":" 1211 | static void rm_shred_preprocess_input(RmShredTag *main) {\n 1212 |     RmSession *session = main->session;\n 1213 |     guint removed = 0;\n 1214 | \n 1215 |     /* move files from node tables into initial RmShredGroups */\n 1216 |     rm_log_debug_line(\"preparing size groups for shredding (dupe finding)...\");\n 1217 |     RmFileTables *tables = session->tables;\n 1218 |     g_slist_foreach(tables->size_groups, (GFunc)rm_shred_process_group, main);\n 1219 |     g_slist_free(tables->size_groups);\n 1220 |     tables->size_groups = NULL;\n 1221 |     rm_log_debug_line(\"...done at time %.3f; removed %u of %\" LLU,\n 1222 |                       g_timer_elapsed(session->timer, NULL), removed,\n 1223 |                       session->total_filtered_files);\n 1224 | }","lines":14}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"RM_FMT_CALLBACK macro has a redundant nested 'if(handler->head)' inside an outer 'if(!handler->was_initialized && handler->head)'. The inner check is always true given the outer guard.","fix":"Remove the redundant inner 'if(handler->head)'.","locations":[{"ref":"lib/formats.c:227-240","code":"  227 | #define RM_FMT_CALLBACK(func, ...)                               \\\n  228 |     if(func) {                                                   \\\n  229 |         g_mutex_lock(&handler->print_mtx);                       \\\n  230 |         {                                                        \\\n  231 |             if(!handler->was_initialized && handler->head) {     \\\n  232 |                 if(handler->head) {                              \\\n  233 |                     handler->head(self->session, handler, file); \\\n  234 |                 }                                                \\\n  235 |                 handler->was_initialized = true;                 \\\n  236 |             }                                                    \\\n  237 |             func(self->session, handler, file, ##__VA_ARGS__);   \\\n  238 |         }                                                        \\\n  239 |         g_mutex_unlock(&handler->print_mtx);                     \\\n  240 |     }","lines":14}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"rm_mds_compare is a pure pass-through wrapper that just calls prioritiser(a,b) and returns the result; it adds an extra indirection on the sort hot path for no benefit. The 'gint result =' temporary is also pointless.","fix":"Pass mds->prioritiser (suitably cast to GCompareDataFunc) directly to g_slist_sort_with_data and delete rm_mds_compare.","locations":[{"ref":"lib/md-scheduler.c:185-191","code":"  185 | /** @brief GCompareDataFunc wrapper for mds->prioritiser\n  186 |  **/\n  187 | static gint rm_mds_compare(const RmMDSTask *a, const RmMDSTask *b,\n  188 |                            RmMDSSortFunc prioritiser) {\n  189 |     gint result = prioritiser(a, b);\n  190 |     return result;\n  191 | }","lines":7},{"ref":"lib/md-scheduler.c:211-216","code":"  211 |             if(mds->prioritiser) {\n  212 |                 device->sorted_tasks = g_slist_concat(\n  213 |                     g_slist_sort_with_data(device->unsorted_tasks,\n  214 |                                            (GCompareDataFunc)rm_mds_compare,\n  215 |                                            (RmMDSSortFunc)mds->prioritiser),\n  216 |                     device->sorted_tasks);","lines":6}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"rm_trie_insert_unlocked is declared in pathtricia.h:85 but is never defined in pathtricia.c (only rm_trie_insert exists). The declaration is dead/misleading API surface; any caller would fail to link.","fix":"Remove the unused declaration, or implement it if an unlocked insert variant is actually intended.","locations":[{"ref":"lib/pathtricia.h:85","code":"   85 | RmNode *rm_trie_insert_unlocked(RmTrie *self, const char *path, void *value);","lines":1}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"rm_shred_group_qualifies() begins its boolean expression with a constant `1 &&`, which is dead and only adds noise. It does nothing.","fix":"Drop the leading `1 && ` so the expression starts at `(group->num_files >= 2)`.","locations":[{"ref":"lib/shredder.c:798-799","code":"  798 | static gboolean rm_shred_group_qualifies(RmShredGroup *group) {\n  799 |     return 1 && (group->num_files >= 2)","lines":2}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"RmMountEntries has a `current` field used as an iterator cursor, but rm_mount_list_open()\niterates the freshly built list with rm_mount_list_next() to do the evilfs/reflink scan,\nleaving `current` pointing at the end; rm_mounts_create_tables() then calls\nrm_mount_list_next() again on the same struct, relying on current having been left at the\ntail so the second pass starts fresh only because current->next is NULL then wraps. This\nimplicit shared-cursor reuse across two unrelated passes is fragile and effectively a hidden\ncoupling rather than clean iteration.","fix":"Reset self->current = NULL before the second iteration pass, or use explicit GList iteration instead of the shared cursor.","locations":[{"ref":"lib/utilities.c:566-580","code":"  566 | static RmMountEntry *rm_mount_list_next(RmMountEntries *self) {\n  567 |     g_assert(self);\n  568 | \n  569 |     if(self->current) {\n  570 |         self->current = self->current->next;\n  571 |     } else {\n  572 |         self->current = self->entries;\n  573 |     }\n  574 | \n  575 |     if(self->current) {\n  576 |         return self->current->data;\n  577 |     } else {\n  578 |         return NULL;\n  579 |     }\n  580 | }","lines":15},{"ref":"lib/utilities.c:617-618","code":"  617 |     RmMountEntry *wrap_entry = NULL;\n  618 |     while((wrap_entry = rm_mount_list_next(self))) {","lines":2},{"ref":"lib/utilities.c:716-723","code":"  716 |     RmMountEntry *entry = NULL;\n  717 |     RmMountEntries *mnt_entries = rm_mount_list_open(self);\n  718 | \n  719 |     if(mnt_entries == NULL) {\n  720 |         return false;\n  721 |     }\n  722 | \n  723 |     while((entry = rm_mount_list_next(mnt_entries))) {","lines":8}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The top-of-file comment is garbled: 'This file is mostly boring interface definitions to conform all of the difference hash types to a single interface.\\n code except for the paranoid digest optimisations' - 'difference' should be 'different' and the sentence fragment ' code except for...' is broken (a clause was lost), making it unreadable.","fix":"Rewrite the comment into a single coherent sentence, e.g. 'Mostly boring interface definitions that conform all the different hash types to a single interface; the only tricky code is the paranoid digest optimisations.'","locations":[{"ref":"lib/checksum.c:26-30","code":"   26 | /* This file is mostly boring interface definitions to conform all of the\n   27 |  * difference hash types to a single interface.\n   28 |  *  code except for the paranoid digest\n   29 |  * optimisations which are pretty insane.\n   30 |  **/","lines":5}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The RmDigestType enum comments for BLAKE2SP and BLAKE2BP are swapped: RM_DIGEST_BLAKE2SP is labelled 'Parallel version of BLAKE2P' and RM_DIGEST_BLAKE2BP 'Parallel version of BLAKE2S'. BLAKE2SP is the parallel variant of BLAKE2S and BLAKE2BP of BLAKE2B; both comments are wrong (one even says the non-existent 'BLAKE2P').","fix":"Swap/fix: BLAKE2SP = parallel version of BLAKE2S, BLAKE2BP = parallel version of BLAKE2B.","locations":[{"ref":"lib/checksum.h:57-58","code":"   57 |     RM_DIGEST_BLAKE2SP /*  Parallel version of BLAKE2P */,\n   58 |     RM_DIGEST_BLAKE2BP /*  Parallel version of BLAKE2S */,","lines":2}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Doxygen comment for rm_semaphore_destroy() is copy-pasted from rm_semaphore_new(): it says '@brief Allocate a new RmSemaphore' and documents a '@param n' that the destroy function does not take. Misleading.","fix":"Fix the comment to describe destruction and the sem parameter.","locations":[{"ref":"lib/checksum.h:127-132","code":"  127 | /**\n  128 |  * @brief Allocate a new RmSemaphore.\n  129 |  *\n  130 |  * @param n: The number of acquire operations before the semaphore blocks.\n  131 |  */\n  132 | void rm_semaphore_destroy(RmSemaphore *sem);","lines":6}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"rm_digest_hexstring() Doxygen lists parameters 'input', 'buflen' and 'buffer' that do not exist in the function signature (it takes only RmDigest *digest and char *buffer). Stale documentation that could mislead callers about the buffer-size contract (the function has no bounds checking and assumes buffer is large enough for 2*digest->bytes + 1).","fix":"Update the doc block to match the real signature and explicitly state the required buffer size (2 * rm_digest_get_bytes() + 1).","locations":[{"ref":"lib/checksum.h:222-237","code":"  222 | /**\n  223 |  * @brief Convert the checksum to a hexstring (like `md5sum`)\n  224 |  *\n  225 |  * rm_digest_update is not allowed to be called after finalizing.\n  226 |  *\n  227 |  * If the type is RM_DIGEST_PARANOID, this will return the hexstring\n  228 |  * of the shadow digest built in the background.\n  229 |  *\n  230 |  * @param digest a pointer to a RmDigest\n  231 |  * @param input The input buffer to convert\n  232 |  * @param buflen Size of the buffer.\n  233 |  * @param buffer The buffer to write the hexadecimal checksum to.\n  234 |  *\n  235 |  * @return how many bytes were written. (for md5sum: 32)\n  236 |  */\n  237 | int rm_digest_hexstring(RmDigest *digest, char *buffer);","lines":16},{"ref":"lib/checksum.c:1040-1058","code":" 1040 | int rm_digest_hexstring(RmDigest *digest, char *buffer) {\n 1041 |     static const char *hex = \"0123456789abcdef\";\n 1042 |     if(digest == NULL) {\n 1043 |         return 0;\n 1044 |     }\n 1045 | \n 1046 |     guint8 *input = rm_digest_steal(digest);\n 1047 |     gsize bytes = digest->bytes;\n 1048 |     gsize out = 0;\n 1049 | \n 1050 |     for(gsize i = 0; i < bytes; ++i) {\n 1051 |         buffer[out++] = hex[input[i] / 16];\n 1052 |         buffer[out++] = hex[input[i] % 16];\n 1053 |     }\n 1054 |     buffer[out++] = '\\0';\n 1055 | \n 1056 |     g_slice_free1(bytes, input);\n 1057 |     return out;\n 1058 | }","lines":19}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"RmMDSFunc is documented to return 'amount to decrement device worker's per-pass quota' (md-scheduler.h:102), but rm_mds_factory treats the return value as a boolean: 'if(mds->func(...)) ++processed;' (line 230). The magnitude of the return value is ignored; processed is only ever incremented by 1. The documented quota-by-amount contract does not match the implementation.","fix":"Either honour the documented semantics ('processed += mds->func(...)') or fix the header doc to state the callback returns a boolean 'task counted' flag.","locations":[{"ref":"lib/md-scheduler.c:228-235","code":"  228 |     while(processed < mds->pass_quota &&\n  229 |           (task = rm_util_slist_pop(&device->sorted_tasks, &device->lock))) {\n  230 |         if(mds->func(task->task_data, mds->user_data)) {\n  231 |             /* task succeeded; update counters */\n  232 |             ++processed;\n  233 |         }\n  234 |         rm_mds_task_free(task);\n  235 |     }","lines":8},{"ref":"lib/md-scheduler.h:98-110","code":"   98 |  * @brief RmMDSFunc function prototype, called for each task\n   99 |  *\n  100 |  * @param task_user_data User data passed via rm_mds_push_...()\n  101 |  * @param session_user_data User data passed to rm_mds_new()\n  102 |  * @retval amount to decrement device worker's per-pass quota\n  103 |  *\n  104 |  * The number of tasks processed on each pass through a device can be\n  105 |  * limited by a quota.  This may be useful in cases where the same file\n  106 |  * is accessed several times in quick succession, since the file\n  107 |  * metadata and data may still be cached.\n  108 |  *\n  109 |  **/\n  110 | typedef gint (*RmMDSFunc)(RmMDSTask *task, gpointer session_user_data);","lines":13}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment says 'strold can not parse all of a guin64' - typo for strtold/guint64. Also the surrounding comment describes parsing 'with strtoull until the dot, and continue with strtold after', but the code never calls strtold; the fraction is parsed with strtoull. The comment misdescribes the implementation.","fix":"Correct the typos and update the comment to reflect that both integer and fraction parts are parsed with strtoull.","locations":[{"ref":"lib/cmdline.c:280-286","code":"  280 |     // We have a small issue here:\n  281 |     // 1) strold can not parse all of a guin64.\n  282 |     // 2) strtoull can only parse integers.\n  283 |     //\n  284 |     // We \"solve\" this by parsing with strtoull until the dot,\n  285 |     // and continue with strtold after. If we hit an overflow\n  286 |     // during multiplication later we warn the user and abort.","lines":7}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Misleading/typo comments. uniques.c says 'we only not want to list unfinished files.' (garbled, and the code actually lists ONLY unique files). fdupes.c elem says 'we do not want to list unfinished files.' for the UNIQUE_FILE skip, which is the same garbled intent.","fix":"Reword to accurate English, e.g. 'only list unique (finished) files' / 'skip unique files; we do not list them here.'","locations":[{"ref":"lib/formats/uniques.c:48","code":"   48 |         /* we only not want to list unfinished files. */","lines":1},{"ref":"lib/formats/fdupes.c:48","code":"   48 |         /* we do not want to list unfinished files. */","lines":1}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Typo/misleading wording in comments: 'rm_hasher_callback' read_succesful field name is misspelled (read_succesful vs read_successful) throughout; 'Accumuluate' (line 823), 'canidate' (line 585), 'GQeues' (line 129). The 'dummy callback for failed paths' comment plus the read_succesful misspelling propagate. Cosmetic only.","fix":"Fix spelling in identifiers/comments for readability (read_successful, accumulate, candidate, GQueues).","locations":[{"ref":"lib/hash-utility.c:42","code":"   42 |     bool *read_succesful;","lines":1},{"ref":"lib/replay.c:585","code":"  585 |      * was unpacked. If that dir has other duplicates inside them","lines":1},{"ref":"lib/replay.c:823","code":"  823 |          * Accumuluate those in a single group that come in front of the other groups.","lines":1},{"ref":"lib/replay.c:129","code":"  129 |     /* Free the GQeues in the trie */","lines":1}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment for rm_pp_cmp_orig_criteria (in preprocess.h, mirrored by the comment above the impl) states 'Returns: -1 if a > b, 0 if a == b and +1 else.' The function returns a negative value when 'a' outranks 'b' (which is the intended ordering), but the wording '-1 if a > b' is ambiguous/misleading given a,b are RmFile* not magnitudes; the inline comment above the function says the opposite phrasing ('negative integer if file a outranks b'). The two descriptions are inconsistent.","fix":"Make both comments agree and unambiguous, e.g. 'negative if a outranks (is more original than) b, 0 if equal, positive if b outranks a'.","locations":[{"ref":"lib/preprocess.c:429-435","code":"  429 | /* Sort criteria for sorting by preferred path (first) then user-input criteria */\n  430 | /* Return:\n  431 |  *      a negative integer file 'a' outranks 'b',\n  432 |  *      0 if they are equal,\n  433 |  *      a positive integer if file 'b' outranks 'a'\n  434 |  */\n  435 | int rm_pp_cmp_orig_criteria(const RmFile *a, const RmFile *b, const RmSession *session) {","lines":7},{"ref":"lib/preprocess.h:64-69","code":"   64 |  * @brief Compare two files in order to find out which file is the\n   65 |  * higher ranked (ie original).\n   66 |  *\n   67 |  * Returns: -1 if a > b, 0 if a == b and +1 else.\n   68 |  */\n   69 | int rm_pp_cmp_orig_criteria(const RmFile *a, const RmFile *b, const RmSession *session);","lines":6}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Generation-progression comment lists 'Generation 3' twice (~100MB and ~150MB); the second should be 'Generation 4'. Copy-paste typo in the explanatory header diagram.","fix":"Change line 55 to 'Generation 4: Same size and same hash of first ~150MB'.","locations":[{"ref":"lib/shredder.c:54-55","code":"   54 |  * Generation 3: Same size and same hash of first ~100MB\n   55 |  * Generation 3: Same size and same hash of first ~150MB","lines":2}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment block in rm_tm_count_art_callback says 'Therefore start at -2' but the loop actually starts at 'strlen(path) - 1'. The described -2 hack is not reflected in the code, making the comment misleading.","fix":"Update the comment to match the actual loop (start at strlen(path) - 1) or remove the stale -2 note.","locations":[{"ref":"lib/treemerge.c:152-160","code":"  152 |     /* Ascend the path parts up, add one for each part we meet.\n  153 |        If a part was never found before, add it.\n  154 |        This is the 'm' above: The count of separators in the path.\n  155 | \n  156 |        Hack: path[key_len] is nul, at key_len it must be either an\n  157 |              extra slash (bad) or the beginning of a file name.\n  158 |              Therefore start at -2.\n  159 |      */\n  160 |     for(int i = strlen(path) - 1; i >= 0; --i) {","lines":9}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment at rm_mounts_is_nonrotational doc in header says \"return true if it is non a\nnonrational device.\" - typo (\"non a nonrational\") and the spelling \"nonrational\" should be\n\"nonrotational\". Misleading/garbled doc.","fix":"Reword: 'return true if it is a nonrotational device.'","locations":[{"ref":"lib/utilities.h:373-382","code":"  373 |  * @brief Check if the device is or is part of a nonrotational device.\n  374 |  *\n  375 |  * This operation has constant time.\n  376 |  *\n  377 |  * @param self the table to lookup from.\n  378 |  * @param device the dev_t of a file, e.g. looked up from rm_sys_stat(2)\n  379 |  *\n  380 |  * @return true if it is non a nonrational device.\n  381 |  */\n  382 | bool rm_mounts_is_nonrotational(RmMountTable *self, dev_t device);","lines":10}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment claims 'They happen to have all 5 byte long sub keys by chance' and the function silently no-ops if sub_key_len != 5. The sub keys actually used are 'cksum' (5), 'mtime' (5) and 'dedup' (5); the magic-number guard ties correctness to that coincidence with no assertion. If a future key of different length is introduced rm_xattr_change_subkey will silently do nothing, producing wrong lookups with no error.","fix":"Replace the silent length==5 guard with an explicit length-equal assertion or general code that handles equal-length sub keys, and document the invariant rather than relying on 'by chance'.","locations":[{"ref":"lib/xattr.c:392-404","code":"  392 | static void rm_xattr_change_subkey(char *key, char *sub_key) {\n  393 |     size_t key_len = strlen(key);\n  394 |     size_t sub_key_len = strlen(sub_key);\n  395 | \n  396 |     // This method is only thought to be used for our xattr keys.\n  397 |     // They happen to have all 5 byte long sub keys by chance.\n  398 |     // So take the chance to save some allocations.\n  399 |     if(sub_key_len != 5) {\n  400 |         return;\n  401 |     }\n  402 | \n  403 |     strcpy(&key[key_len - sub_key_len], sub_key);\n  404 | }","lines":13}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The glib (RM_DIGEST_DEFINE_GLIB), sha3 (RM_DIGEST_DEFINE_SHA3) and blake (CREATE_BLAKE_INTERFACE) families each repeat a near-identical new/free/copy/steal + interface-struct pattern, and the steal functions for sha3_256/384/512 differ only by the literal bit count (256/8, 384/8, 512/8). The sha3 steal could be folded into the macro using BITS (the macro already has BITS) instead of three hand-written functions, reducing copy-paste surface where a wrong constant would silently truncate a digest.","fix":"Generate rm_digest_sha3_##BITS##_steal inside RM_DIGEST_DEFINE_SHA3 using BITS/8 for the memcpy length, removing the three duplicated hand-written steal functions.","locations":[{"ref":"lib/checksum.c:538-569","code":"  538 | static void rm_digest_sha3_256_steal(sha3_context *state, guint8 *result) {\n  539 |     sha3_context *copy = g_slice_copy(sizeof(sha3_context), state);\n  540 |     memcpy(result, sha3_Finalize(copy), 256 / 8);\n  541 |     rm_digest_sha3_free(copy);\n  542 | }\n  543 | \n  544 | static void rm_digest_sha3_384_steal(sha3_context *state, guint8 *result) {\n  545 |     sha3_context *copy = g_slice_copy(sizeof(sha3_context), state);\n  546 |     memcpy(result, sha3_Finalize(copy), 384 / 8);\n  547 |     rm_digest_sha3_free(copy);\n  548 | }\n  549 | \n  550 | static void rm_digest_sha3_512_steal(sha3_context *state, guint8 *result) {\n  551 |     sha3_context *copy = g_slice_copy(sizeof(sha3_context), state);\n  552 |     memcpy(result, sha3_Finalize(copy), 512 / 8);\n  553 |     rm_digest_sha3_free(copy);\n  554 | }\n  555 | \n  556 | #define RM_DIGEST_DEFINE_SHA3(BITS)                            \\\n  557 |     static const RmDigestInterface sha3_##BITS##_interface = { \\\n  558 |         .name = (\"sha3-\" #BITS),                               \\\n  559 |         .bits = BITS, \\\n  560 |         .len = NULL, \\\n  561 |         .new = (RmDigestNewFunc)rm_digest_sha3_##BITS##_new,   \\\n  562 |         .free = (RmDigestFreeFunc)rm_digest_sha3_free,         \\\n  563 |         .update = (RmDigestUpdateFunc)sha3_Update,             \\\n  564 |         .copy = (RmDigestCopyFunc)rm_digest_sha3_copy,         \\\n  565 |         .steal = (RmDigestStealFunc)rm_digest_sha3_##BITS##_steal};\n  566 | \n  567 | RM_DIGEST_DEFINE_SHA3(256)\n  568 | RM_DIGEST_DEFINE_SHA3(384)\n  569 | RM_DIGEST_DEFINE_SHA3(512)","lines":32}]},{"id":"DUPLIC_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The --no-match-extension entry ('E', cfg->match_with_extension) is listed twice, identically, in inversed_option_entries. The second registration is dead/redundant and could trigger a GOption duplicate-name situation.","fix":"Delete the duplicated line 1478.","locations":[{"ref":"lib/cmdline.c:1477-1478","code":" 1477 |         {\"no-match-extension\"         , 'E' , DISABLE | HIDDEN , G_OPTION_ARG_NONE     , &cfg->match_with_extension    , \"Disable --match-extension\"           , NULL} ,\n 1478 |         {\"no-match-extension\"         , 'E' , DISABLE | HIDDEN , G_OPTION_ARG_NONE     , &cfg->match_with_extension    , \"Disable --match-extension\"           , NULL} ,","lines":2}]},{"id":"DUPLIC_3","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The 'clear the whole terminal line on abort' block (ioctl TIOCGWINSZ then loop printing ws_col spaces then newline) is duplicated verbatim between stats.c and summary.c, as is the ARROW macro definition. The progress 'format human size into a fixed buffer then fprintf with MAYBE_RED/RESET' pattern is also repeated many times in stats.c.","fix":"Factor the terminal-clear and the ARROW macro into a shared helper/header used by both stats and summary.","locations":[{"ref":"lib/formats/stats.c:60-71","code":"   60 |     if(rm_session_was_aborted()) {\n   61 |         /* Clear the whole terminal line.\n   62 |          * Progressbar might leave some junk.\n   63 |          */\n   64 |         struct winsize terminal;\n   65 |         ioctl(fileno(out), TIOCGWINSZ, &terminal);\n   66 |         for(int i = 0; i < terminal.ws_col; ++i) {\n   67 |             fprintf(out, \" \");\n   68 |         }\n   69 | \n   70 |         fprintf(out, \"\\n\");\n   71 |     }","lines":12},{"ref":"lib/formats/summary.c:62-72","code":"   62 |     if(rm_session_was_aborted()) {\n   63 |         /* Clear the whole terminal line.\n   64 |          * Progressbar might leave some junk.\n   65 |          */\n   66 |         struct winsize terminal;\n   67 |         ioctl(fileno(out), TIOCGWINSZ, &terminal);\n   68 |         for(int i = 0; i < terminal.ws_col; ++i) {\n   69 |             fprintf(out, \" \");\n   70 |         }\n   71 | \n   72 | [PATH_MAX - 1]) {\n  107 |         iter->path_buf[PATH_MAX - 1] = 0;\n  108 |         rm_log_error(\"path too long, truncated to: %s\", iter->path_buf);\n  109 |     }\n  110 | \n  111 |     iter->curr_elem = iter->path_buf;\n  112 | }","lines":13}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","description":"_rm_trie_iter ignores the non-zero return value of the callback at recursion boundaries. The callback can return non-zero to stop, and the function does `return;` when the current node's callback returns non-zero - but when a child's recursive _rm_trie_iter wants to stop, the parent's g_hash_table_iter loop keeps iterating the remaining siblings (the recursive call's early return is not propagated). So early-termination only stops one subtree branch, not the whole traversal, contradicting the implied 'stop' semantics.","fix":"Make _rm_trie_iter return an int status and have callers break out of the g_hash_table_iter loop when a recursive call signals stop.","locations":[{"ref":"lib/pathtricia.c:235-263","code":"  235 | static void _rm_trie_iter(RmTrie *self, RmNode *root, bool pre_order, bool all_nodes,\n  236 |                           RmTrieIterCallback callback, void *user_data, int level) {\n  237 |     GHashTableIter iter;\n  238 |     gpointer key, value;\n  239 | \n  240 |     if(root == NULL) {\n  241 |         root = self->root;\n  242 |     }\n  243 | \n  244 |     if(pre_order && (all_nodes || root->has_value)) {\n  245 |         if(callback(self, root, level, user_data) != 0) {\n  246 |             return;\n  247 |         }\n  248 |     }\n  249 | \n  250 |     if(root->children != NULL) {\n  251 |         g_hash_table_iter_init(&iter, root->children);\n  252 |         while(g_hash_table_iter_next(&iter, &key, &value)) {\n  253 |             _rm_trie_iter(self, value, pre_order, all_nodes, callback, user_data,\n  254 |                           level + 1);\n  255 |         }\n  256 |     }\n  257 | \n  258 |     if(!pre_order && (all_nodes || root->has_value)) {\n  259 |         if(callback(self, root, level, user_data) != 0) {\n  260 |             return;\n  261 |         }\n  262 |     }\n  263 | }","lines":29}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"negligible","description":"In rm_hasher_unbuffered_read the iovec array is over-sized by one: 'struct iovec readvec[n_preadv_buffers + 1]' (line 275). Only indices 0..n_preadv_buffers-1 are ever populated or passed to preadv (n_preadv_buffers as the count), so the trailing element is dead. It is harmless (memset to 0) but misleading.","fix":"Size the array as 'struct iovec readvec[n_preadv_buffers];'.","locations":[{"ref":"lib/hasher.c:275","code":"  275 |     struct iovec readvec[n_preadv_buffers + 1];","lines":1}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"negligible","description":"rm_shred_tag_hardlink_rejects()'s `tag` parameter is annotated _UNUSED but is actually used (tag->session->cfg->keep_hardlinked_dupes on line 1428). The annotation is misleading; it is harmless under GCC/Clang attribute((unused)) but documents the opposite of reality.","fix":"Remove the _UNUSED qualifier from the tag parameter.","locations":[{"ref":"lib/shredder.c:1427-1428","code":" 1427 | static void rm_shred_tag_hardlink_rejects(RmShredGroup *group, _UNUSED RmShredTag *tag) {\n 1428 |     if(!tag->session->cfg->keep_hardlinked_dupes) {","lines":2}]},{"id":"ARCHIT_1","type":"architecture","type_label":"Architecture","severity":"medium","description":"rm_cmd_parse_args is a ~330-line monster function mixing GUI/hasher dispatch, cwd/cmdline capture, four large GOption table definitions, parsing, and a long chain of post-parse validation and side effects (color, fiemap, sse, clamp checks). This hampers readability/testability and is where several of the above bugs hide.","fix":"Extract the option-table construction and the post-parse validation/normalization into separate helper functions (e.g. rm_cmd_build_op <script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
