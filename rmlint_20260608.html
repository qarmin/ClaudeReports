<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"rm_parrot_open() assumes the root array has at least one element and that element[0] is an object. json_array_get_object_element(polly->root, 0) on an empty array triggers a g_critical/assertion (out-of-range index) and returns NULL; if element 0 is present but not a JSON object it returns NULL with a critical. Either way the subsequent json_object_get_member(object, \"merge_directories\") dereferences a NULL object. A malformed but syntactically valid JSON file like `[]` or `[1,2,3]` thus crashes the replay instead of being rejected gracefully.","fix":"Check json_array_get_length(polly->root) > 0 and that json_array_get_element(root,0) is JSON_NODE_OBJECT before calling json_array_get_object_element; on failure g_set_error and return (after freeing polly). Guard the object pointer against NULL before json_object_get_member. Note: json-glib treats out-of-range index and wrong node type as programmer errors (critical/assert), not silent NULL in all builds.","locations":[{"ref":"lib/replay.c:174-175","code":"  174 |     JsonObject *object = json_array_get_object_element(polly->root, 0);\n  175 |     JsonNode *merge_directories_node = json_object_get_member(object, \"merge_directories\");","lines":2}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"In rm_parrot_try_next() each per-element object is fetched with json_array_get_object_element(polly->root, polly->index) without verifying the element is an object. If any array element (index 1..len-1) is not a JSON object (e.g. a number/string/array in an attacker-supplied or hand-edited cache), this returns NULL and the following json_object_get_member(object, \"path\") dereferences NULL, crashing. Untrusted JSON should never crash the parser.","fix":"After fetching the element node, verify JSON_NODE_TYPE is JSON_NODE_OBJECT (use json_array_get_element + type check) and `return NULL` (skip) the entry if not, before any json_object_get_member call.","locations":[{"ref":"lib/replay.c:224-230","code":"  224 |     JsonObject *object = json_array_get_object_element(polly->root, polly->index);\n  225 | \n  226 |     /* Deliver a higher index the next time, even if it fails */\n  227 |     polly->index += 1;\n  228 | \n  229 |     /* Read the path (without generating a warning if it's not there) */\n  230 |     JsonNode *path_node = json_object_get_member(object, \"path\");","lines":7}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"When following symlinks, if realpath() fails (e.g. dangling/relative-target link or path that no longer resolves), rm_traverse_rel_realpath() returns NULL. That NULL is then passed as `path` to rm_file_new() -> rm_file_set_path() -> rm_trie_insert(), which does g_assert(path) and then dereferences it in rm_path_iter_init (`*path == '/'`). With assertions compiled out this is a NULL-pointer dereference crash; with them on it aborts. A broken symlink under --follow-symlinks can therefore crash traversal.","fix":"After `path = resolved_path;` check `if(path == NULL) { return; }` (freeing nothing, since resolved_path is already NULL) before calling rm_file_new.","locations":[{"ref":"lib/traverse.c:186-195","code":"  186 |         char *resolved_path = rm_traverse_rel_realpath(path, new_path_buf);\n  187 |         g_free(new_path_buf);\n  188 | \n  189 |         path = resolved_path;\n  190 |         is_symlink = false;\n  191 |         path_needs_free = true;\n  192 |     }\n  193 | \n  194 |     RmFile *file =\n  195 |         rm_file_new(session, path, statp, file_type, is_prefd, path_index, depth);","lines":10}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"rm_digest_new() unconditionally calls interface->update() to mix in the seed when seed != 0, but the paranoid interface has .update = NULL (line 807). Creating a paranoid digest with a non-zero seed would dereference a NULL function pointer and crash. Currently all callers pass seed 0 for paranoid (lib/shredder.c:1599), so it is latent, but nothing enforces it.","fix":"Guard the seed update with if(seed && interface->update) or assert interface->update != NULL when seed is non-zero, and document that paranoid does not support seeding.","locations":[{"ref":"lib/checksum.c:806-808","code":"  806 |     .free = (RmDigestFreeFunc)rm_digest_paranoid_free,\n  807 |     .update = NULL,\n  808 |     .copy = (RmDigestCopyFunc)rm_digest_paranoid_copy,","lines":3},{"ref":"lib/checksum.c:906-908","code":"  906 |     if(seed) {\n  907 |         interface->update(digest->state, (const unsigned char *)&seed, sizeof(seed));\n  908 |     }","lines":3}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"In rm_cmd_size_string_to_bytes a size like \"5.0\" parses the post-dot integer as 0. Then `fraction = fraction_num / pow(10, 1 + (int)log10(fraction_num))` computes `(int)log10(0)`. log10(0.0) is -inf, and casting -inf to int is undefined behavior; the subsequent pow/divide yields NaN, and later `result = fres;` casts a NaN double to RmOff (uint64), also UB. User-controlled option input (e.g. -s 5.0) triggers this.","fix":"Guard the fraction conversion: if fraction_num == 0 set fraction = 0.0 and skip the log10/pow computation.","locations":[{"ref":"lib/cmdline.c:341-364","code":"  341 |     char *dot = strchr(size_spec_stripped, '.');\n  342 |     if(dot != NULL) {\n  343 |         need_multiply = true;\n  344 | \n  345 |         // Parse with strtoull since we only accept numbers after the dot.\n  346 |         // (not 1e10 or negative number like strtod would support them)\n  347 |         char *first_error = NULL;\n  348 |         RmOff fraction_num = strtoull(&dot[1], &first_error, 10);\n  349 |         if(first_error != NULL && *first_error != 0) {\n  350 |             g_set_error(error, RM_ERROR_QUARK, 0, _(\"Failed to parse size fraction\"));\n  351 |             return 0;\n  352 |         }\n  353 | \n  354 |         if(fraction_num == ULLONG_MAX && errno == ERANGE) {\n  355 |             g_set_error(error, RM_ERROR_QUARK, 0, _(\"Fraction is too big for uint64\"));\n  356 |             return 0;\n  357 |         }\n  358 | \n  359 |         // Make sure number parsing doesn't see the dot.\n  360 |         *dot = 0;\n  361 | \n  362 |         // Convert the integer (e.g. 523) to a fraction (e.g. 0.523).\n  363 |         fraction = ((double)fraction_num) / pow(10, 1 + ((int)log10(fraction_num)));\n  364 |     }","lines":24}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"rm_fmt_json_fix() can overflow the caller's stack buffer. The loop guard checks (safe_iter - fixed) < fixed_len *before* appending, but each iteration may append up to 6 bytes (\\u00xx) via g_stpcpy. When safe_iter is within 5 bytes of the end, the append writes past fixed_len. In rm_fmt_json_key_unsafe the buffer is safe_value[PATH_MAX + 4 + 1]; a path/cwd/args string near PATH_MAX consisting of control characters overflows the stack buffer by up to ~5 bytes.","fix":"Reserve worst-case room: loop while (safe_iter - fixed) + 6 < fixed_len, or pass the true remaining size to a bounded copy and bail out (return false) when the next escape would not fit.","locations":[{"ref":"lib/formats/json.c:95-145","code":"   95 | static bool rm_fmt_json_fix(const char *string, char *fixed, size_t fixed_len) {\n   96 |     /* More information here:\n   97 |      *\n   98 |      * http://stackoverflow.com/questions/4901133/json-and-escaping-characters/4908960#4908960\n   99 |      */\n  100 | \n  101 |     int n = strlen(string);\n  102 |     char *safe_iter = fixed;\n  103 | \n  104 |     for(int i = 0; i < n && (size_t)(safe_iter - fixed) < fixed_len; ++i) {\n  105 |         unsigned char *curr = (unsigned char *)&string[i];\n  106 | \n  107 |         char text[20];\n  108 |         memset(text, 0, sizeof(text));\n  109 | \n  110 |         if(*curr == '\"' || *curr == '\\\\') {\n  111 |             /* Printable, but needs to be escaped */\n  112 |             text[0] = '\\\\';\n  113 |             text[1] = *curr;\n  114 |         } else if((*curr > 0 && *curr < 0x1f) || *curr == 0x7f) {\n  115 |             /* Something unprintable */\n  116 |             switch(*curr) {\n  117 |             case '\\b':\n  118 |                 g_snprintf(text, sizeof(text), \"\\\\b\");\n  119 |                 break;\n  120 |             case '\\f':\n  121 |                 g_snprintf(text, sizeof(text), \"\\\\f\");\n  122 |                 break;\n  123 |             case '\\n':\n  124 |                 g_snprintf(text, sizeof(text), \"\\\\n\");\n  125 |                 break;\n  126 |             case '\\r':\n  127 |                 g_snprintf(text, sizeof(text), \"\\\\r\");\n  128 |                 break;\n  129 |             case '\\t':\n  130 |                 g_snprintf(text, sizeof(text), \"\\\\t\");\n  131 |                 break;\n  132 |             default:\n  133 |                 g_snprintf(text, sizeof(text), \"\\\\u00%02x\", (guint)*curr);\n  134 |                 break;\n  135 |             }\n  136 |         } else {\n  137 |             /* Take it unmodified */\n  138 |             text[0] = *curr;\n  139 |         }\n  140 | \n  141 |         safe_iter = g_stpcpy(safe_iter, text);\n  142 |     }\n  143 | \n  144 |     return (size_t)(safe_iter - fixed) < fixed_len;\n  145 | }","lines":51},{"ref":"lib/formats/json.c:147-157","code":"  147 | static void rm_fmt_json_key_unsafe(FILE *out, const char *key, const char *value) {\n  148 |     char safe_value[PATH_MAX + 4 + 1];\n  149 |     memset(safe_value, 0, sizeof(safe_value));\n  150 | \n  151 |     if(rm_fmt_json_fix(value, safe_value, sizeof(safe_value))) {\n  152 |         fprintf(out, \"\\\"%s\\\": \\\"%s\\\"\", key, safe_value);\n  153 |     } else {\n  154 |         /* This should never happen but give at least means of debugging */\n  155 |         fprintf(out, \"\\\"%s\\\": \\\"<BROKEN PATH>\\\"\", key);\n  156 |     }\n  157 | }","lines":11}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"When reading paths from stdin, realpath(strtok_r(path_buf, \"\\n\", &tokbuf), NULL) is called and the result added unconditionally. If a line contains only a newline/whitespace, strtok_r returns NULL and realpath(NULL,...) is undefined / sets errno; more critically realpath returns NULL for any non-existent path, and the NULL is stored into the paths array. Later g_strv_length and the hashing loop tolerate trailing NULL as terminator, but an embedded NULL (a bad path followed by good paths) truncates the list silently, dropping all subsequent files.","fix":"Guard strtok_r result against NULL (skip empty lines) and only g_ptr_array_add when realpath returns non-NULL, or store the raw token so non-existent paths still produce a 'Can't open' warning instead of silently terminating the array.","locations":[{"ref":"lib/hash-utility.c:181-184","code":"  181 |         while(fgets(path_buf, PATH_MAX, stdin)) {\n  182 |             char *abs_path = realpath(strtok_r(path_buf, \"\\n\", &tokbuf), NULL);\n  183 |             g_ptr_array_add(paths, abs_path);\n  184 |         }","lines":4}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","description":"rm_util_get_groupname() calls getpwuid(geteuid()) and immediately dereferences the result\n(user->pw_gid) without checking for NULL. If the effective uid has no passwd entry\n(possible in containers, LDAP/NSS gaps, or deleted accounts) getpwuid returns NULL and this\nNULL-dereferences and crashes. Note rm_util_get_username() right above it does check for NULL.","fix":"Check `user` for NULL before accessing user->pw_gid; return NULL if it is NULL.","locations":[{"ref":"lib/utilities.c:365-373","code":"  365 | char *rm_util_get_groupname(void) {\n  366 |     struct passwd *user = getpwuid(geteuid());\n  367 |     struct group *grp = getgrgid(user->pw_gid);\n  368 |     if(grp) {\n  369 |         return grp->gr_name;\n  370 |     } else {\n  371 |         return NULL;\n  372 |     }\n  373 | }","lines":9}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","description":"rm_xattr_list() returns NULL when listxattr fails (e.g. fs without xattr support, permission error). Both rm_xattr_is_deduplicated() and rm_xattr_mark_deduplicated() store that return value in `map` and immediately call g_hash_table_iter_init(&iter, map) without a NULL check, which dereferences NULL inside GLib. A path on a filesystem that does not support xattrs will crash these functions.","fix":"After `GHashTable *map = rm_xattr_list(...);` add `if(map == NULL) { return ...; }` in both functions before iterating.","locations":[{"ref":"lib/xattr.c:417-420","code":"  417 |     GHashTable *map = rm_xattr_list(path, follow_symlinks);\n  418 |     GHashTableIter iter;\n  419 | \n  420 |     g_hash_table_iter_init(&iter, map);","lines":4},{"ref":"lib/xattr.c:466-469","code":"  466 |     GHashTable *map = rm_xattr_list(path, follow_symlinks);\n  467 |     GHashTableIter iter;\n  468 | \n  469 |     g_hash_table_iter_init(&iter, map);","lines":4}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"rm_digest_paranoid_copy() allocates the copy with g_slice_new0 and only sets shadow_hash. The incoming_twin_candidates GAsyncQueue field is left NULL. When the copied paranoid digest is later freed, rm_digest_paranoid_free() calls g_async_queue_unref(paranoid->incoming_twin_candidates) on a NULL pointer, which crashes (GLib aborts on NULL queue). Paranoid digests are copied in practice via rm_digest_copy() (e.g. lib/shredder.c:1362 rm_shred_create_rejects, lib/file.c:119), so this is reachable whenever paranoid mode produces rejects and the copy is freed.","fix":"In rm_digest_paranoid_copy, allocate the incoming_twin_candidates queue (copy->incoming_twin_candidates = g_async_queue_new()) so the copy is a self-consistent paranoid state that free() can handle. Alternatively guard rm_digest_paranoid_free with if(paranoid->incoming_twin_candidates) before unref.","locations":[{"ref":"lib/checksum.c:703-717","code":"  703 | static RmParanoid *rm_digest_paranoid_copy(RmParanoid *paranoid) {\n  704 |     RmParanoid *copy = g_slice_new0(RmParanoid);\n  705 |     if(paranoid->shadow_hash != NULL) {\n  706 |         copy->shadow_hash = rm_digest_copy(paranoid->shadow_hash);\n  707 |     }\n  708 |     return copy;\n  709 | }\n  710 | \n  711 | static void rm_digest_paranoid_free(RmParanoid *paranoid) {\n  712 |     rm_digest_free(paranoid->shadow_hash);\n  713 |     rm_digest_paranoid_release_buffers(paranoid);\n  714 |     g_async_queue_unref(paranoid->incoming_twin_candidates);\n  715 |     g_slist_free(paranoid->rejects);\n  716 |     g_slice_free(RmParanoid, paranoid);\n  717 | }","lines":15}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"rm_mount_list_open() stores wrap_entry->type (a heap pointer owned by the RmMountEntry)\nas the *value* in self->reflinkfs_table. rm_mount_list_close() then g_free()s every\nentry->type. The reflinkfs_table is created with NULL key/value destroy functions and\nsurvives the close, so it is left holding dangling pointers. They are later dereferenced:\nrm_mounts_get_disk_id() does `char *parent_type = g_hash_table_lookup(reflinkfs_table,...)`\nand re-inserts it, and the strings are read for debug output. The table also stores it for\nlater inheritance to subvolumes. This is a use-after-free of freed mount-type strings.","fix":"Store a g_strdup() of wrap_entry->type in reflinkfs_table and create the table with g_free as the value destroy function, or store a stable interned/static string instead of the soon-to-be-freed entry buffer.","locations":[{"ref":"lib/utilities.c:681-683","code":"  681 |                 g_hash_table_insert(table->reflinkfs_table,\n  682 |                                     GUINT_TO_POINTER(dir_stat.st_dev),\n  683 |                                     wrap_entry->type);","lines":3},{"ref":"lib/utilities.c:553-559","code":"  553 |     for(GList *iter = self->entries; iter; iter = iter->next) {\n  554 |         RmMountEntry *entry = iter->data;\n  555 |         g_free(entry->fsname);\n  556 |         g_free(entry->dir);\n  557 |         g_free(entry->type);\n  558 |         g_slice_free(RmMountEntry, entry);\n  559 |     }","lines":7},{"ref":"lib/utilities.c:911-916","code":"  911 |                 char *parent_type = g_hash_table_lookup(\n  912 |                     self->reflinkfs_table, GUINT_TO_POINTER(stat_buf.st_dev));\n  913 |                 if(parent_type) {\n  914 |                     g_hash_table_insert(self->reflinkfs_table, GUINT_TO_POINTER(dev),\n  915 |                                         parent_type);\n  916 |                 }","lines":6}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"low","description":"progressbar rm_fmt_prog() destroys its timer and unrefs the running means at PRE_SHUTDOWN (g_timer_destroy + rm_running_mean_unref), but self->timer is left dangling rather than NULLed. If prog() is invoked again after PRE_SHUTDOWN (the state machine allows SUMMARY etc. and SUMMARY only returns *after* the timer==NULL check at top), g_timer_elapsed / g_timer_start would operate on freed memory. Currently saved by ordering, but brittle.","fix":"After g_timer_destroy set self->timer = NULL, and guard the means unref so repeated PRE_SHUTDOWN / later states cannot double-free or use freed memory.","locations":[{"ref":"lib/formats/progressbar.c:516-521","code":"  516 |     if(state == RM_PROGRESS_STATE_PRE_SHUTDOWN) {\n  517 |         fprintf(out, \"\\n\\n\");\n  518 |         g_timer_destroy(self->timer);\n  519 |         rm_running_mean_unref(&self->speed_mean);\n  520 |         rm_running_mean_unref(&self->eta_mean);\n  521 |     }","lines":6},{"ref":"lib/formats/progressbar.c:389-396","code":"  389 |     if(self->timer == NULL) {\n  390 |         self->timer = g_timer_new();\n  391 |         force_draw = true;\n  392 |     }\n  393 | \n  394 |     if(state == RM_PROGRESS_STATE_SUMMARY) {\n  395 |         return;\n  396 |     }","lines":8}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"TOCTOU between device lookup/ref and device self-free. rm_mds_factory decides to free a device when rm_mds_device_ref(device,0) returns 0 (line 237) and then, after dec_and_test on threads, removes it from mds->disks and frees it under mds->lock (lines 244-255). However the ref-count check at line 237 is NOT performed under mds->lock, and a producer thread takes a separate two-step path: rm_mds_device_get() returns the device under mds->lock, then the caller increments the ref count in a *separate* call (e.g. shredder.c:1110 + 1113, traverse.c:533). A device whose ref_count momentarily hit 0 can be looked up and handed out, then freed by the factory thread before/while the producer calls rm_mds_device_ref(device,1) on it -> use-after-free of device->lock and a lost task. The code relies on an undocumented, fragile invariant that ref_count never reaches 0 while any producer can still push.","fix":"Perform the 'ref==0 -> remove from hashtable -> free' decision atomically with respect to lookup/ref: take mds->lock, re-check device->ref_count under that same lock before removing from mds->disks, and have rm_mds_device_get_by_disk ref the device (return it already-referenced) so lookup and ref are a single critical section.","locations":[{"ref":"lib/md-scheduler.c:237-255","code":"  237 |     if(rm_mds_device_ref(device, 0) > 0) {\n  238 |         /* return self to pool for further processing */\n  239 |         if(processed == 0) {\n  240 |             /* stalled queue; chill for a bit */\n  241 |             g_usleep(1000);\n  242 |         }\n  243 |         rm_util_thread_pool_push(mds->pool, device);\n  244 |     } else if(g_atomic_int_dec_and_test(&device->threads)) {\n  245 |         /* free self and signal to rm_mds_free() */\n  246 |         g_mutex_lock(&mds->lock);\n  247 |         {\n  248 |             rm_log_debug_line(\"Freeing device %\" LLU \" (pointer %p)\", (RmOff)device->disk,\n  249 |                               device);\n  250 |             g_hash_table_remove(mds->disks, GINT_TO_POINTER(device->disk));\n  251 |             rm_mds_device_free(device);\n  252 |             g_cond_signal(&mds->cond);\n  253 |         }\n  254 |         g_mutex_unlock(&mds->lock);\n  255 |     }","lines":19},{"ref":"lib/md-scheduler.c:289-307","code":"  289 | static RmMDSDevice *rm_mds_device_get_by_disk(RmMDS *mds, const dev_t disk) {\n  290 |     RmMDSDevice *result = NULL;\n  291 |     g_assert(mds);\n  292 |     g_mutex_lock(&mds->lock);\n  293 |     {\n  294 |         g_assert(mds->disks);\n  295 | \n  296 |         result = g_hash_table_lookup(mds->disks, GINT_TO_POINTER(disk));\n  297 |         if(!result) {\n  298 |             result = rm_mds_device_new(mds, disk);\n  299 |             g_hash_table_insert(mds->disks, GINT_TO_POINTER(disk), result);\n  300 |             if(g_atomic_int_get(&mds->running) == TRUE) {\n  301 |                 rm_mds_device_start(result, mds);\n  302 |             }\n  303 |         }\n  304 |     }\n  305 |     g_mutex_unlock(&mds->lock);\n  306 |     return result;\n  307 | }","lines":19},{"ref":"lib/md-scheduler.c:379-388","code":"  379 | gint rm_mds_device_ref(RmMDSDevice *device, const gint ref_count) {\n  380 |     gint result = 0;\n  381 |     g_mutex_lock(&device->lock);\n  382 |     {\n  383 |         device->ref_count += ref_count;\n  384 |         result = device->ref_count;\n  385 |     }\n  386 |     g_mutex_unlock(&device->lock);\n  387 |     return result;\n  388 | }","lines":10}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"high","description":"rm_shred_get_read_size() mutates shared RmShredGroup state (group->next_offset, and file->fadvise_requested) and its own header comment says 'call this with group locked', but rm_shred_process_file() calls it WITHOUT holding group->lock. With the default threads_per_disk=2, two device threads can process two files of the same RmShredGroup (same disk) concurrently, both writing group->next_offset. The values written happen to be equal in the common case, but the assert at line 1058 (file->hash_offset == file->shred_group->next_offset) can fire, and a concurrent rm_shred_group_push_file that advances/changes the group makes this a genuine data race on next_offset/hash_offset.","fix":"Take group->lock around the rm_shred_get_read_size() call in rm_shred_process_file(), matching the locked usage in rm_shred_reassign_checksum() (lines 1590-1597). Compute bytes_to_read and the shredder_waiting next_offset check inside that lock.","locations":[{"ref":"lib/shredder.c:1663","code":" 1663 |         RmOff bytes_to_read = rm_shred_get_read_size(file, tag);","lines":1},{"ref":"lib/shredder.c:495-533","code":"  495 | /* Compute optimal size for next hash increment call this with group locked */\n  496 | static gint32 rm_shred_get_read_size(RmFile *file, RmShredTag *tag) {\n  497 |     g_assert(file);\n  498 |     RmShredGroup *group = file->shred_group;\n  499 |     g_assert(group);\n  500 | \n  501 |     gint32 result = 0;\n  502 | \n  503 |     /* calculate next_offset property of the RmShredGroup */\n  504 |     g_assert(tag);\n  505 |     RmOff balanced_bytes = tag->page_size * SHRED_BALANCED_PAGES;\n  506 |     RmOff target_bytes = balanced_bytes * group->offset_factor;\n  507 |     if(group->next_offset == 2) {\n  508 |         file->fadvise_requested = 1;\n  509 |     }\n  510 | \n  511 |     /* round to even number of pages, round up to MIN_READ_PAGES */\n  512 |     RmOff target_pages = MAX(target_bytes / tag->page_size, 1);\n  513 |     target_bytes = target_pages * tag->page_size;\n  514 | \n  515 |     /* test if cost-effective to read the whole file */\n  516 |     if(group->hash_offset + target_bytes + (balanced_bytes) >= group->file_size) {\n  517 |         group->next_offset = group->file_size;\n  518 |         file->fadvise_requested = 1;\n  519 |     } else {\n  520 |         group->next_offset = group->hash_offset + target_bytes;\n  521 |     }\n  522 | \n  523 |     /* for paranoid digests, make sure next read is not > max size of paranoid buffer */\n  524 |     if(group->digest_type == RM_DIGEST_PARANOID) {\n  525 |         group->next_offset =\n  526 |             MIN(group->next_offset, group->hash_offset + SHRED_PARANOID_BYTES);\n  527 |     }\n  528 | \n  529 |     file->status = RM_FILE_STATE_NORMAL;\n  530 |     result = (group->next_offset - file->hash_offset);\n  531 | \n  532 |     return result;\n  533 | }","lines":39},{"ref":"lib/shredder.c:1058","code":" 1058 |     g_assert(file->hash_offset == file->shred_group->next_offset);","lines":1}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"session->ignored_files is declared `volatile gint` and is incremented atomically (g_atomic_int_inc) from the traversal threads at lines 334/332, but rm_traverse_file() increments the same counter with a plain non-atomic `++` at lines 152 and 168. rm_traverse_file runs on the multi-threaded md-scheduler workers (rm_traverse_directory is the RmMDSFunc), so concurrent non-atomic and atomic updates to the same word race, producing lost updates and an undercounted ignored_files total.","fix":"Use g_atomic_int_inc(&trav_session->session->ignored_files) in both places, matching the atomic increments used elsewhere.","locations":[{"ref":"lib/traverse.c:152","code":"  152 |             trav_session->session->ignored_files++;","lines":1},{"ref":"lib/traverse.c:168","code":"  168 |                     trav_session->session->ignored_files++;","lines":1}]},{"id":"RACE_4","type":"race_condition","type_label":"Race Condition","severity":"low","description":"device->threads is written non-atomically in rm_mds_device_start ('device->threads = mds->threads_per_disk;', line 265, outside both locks) and asserted non-atomically (line 262), but is decremented with g_atomic_int_dec_and_test in rm_mds_factory (line 244). Mixing a plain store with atomic RMW on the same field is undefined under the C/GLib memory model; the initial store could race with a factory thread that started early. Same plain-vs-atomic mixing applies to mds->running (plain write line 360 / read with g_atomic_int_get line 300).","fix":"Use g_atomic_int_set for the initial device->threads store (and set it before any thread is pushed), and g_atomic_int_set/get consistently for mds->running.","locations":[{"ref":"lib/md-scheduler.c:262-265","code":"  262 |     g_assert(device->threads == 0);\n  263 | \n  264 |     g_assert(mds);\n  265 |     device->threads = mds->threads_per_disk;","lines":4},{"ref":"lib/md-scheduler.c:244","code":"  244 |     } else if(g_atomic_int_dec_and_test(&device->threads)) {","lines":1},{"ref":"lib/md-scheduler.c:300","code":"  300 |             if(g_atomic_int_get(&mds->running) == TRUE) {","lines":1},{"ref":"lib/md-scheduler.c:360","code":"  360 |     mds->running = FALSE;","lines":1}]},{"id":"RACE_5","type":"race_condition","type_label":"Race Condition","severity":"low","description":"session->shred_bytes_read is updated with a plain += from multiple device worker threads (the code itself flags this with a 'TODO: make this threadsafe' comment). This is a non-atomic read-modify-write on a shared counter; concurrent updates can lose increments, making the bytes-read progress stat inaccurate. Only a statistics counter, so impact is low, but it is a real data race.","fix":"Route this through the existing single-threaded counter_pool / rm_shred_adjust_counters mechanism, or use g_atomic_int_add / a dedicated mutex like the other session counters.","locations":[{"ref":"lib/shredder.c:1680-1681","code":" 1680 |         /* TODO: make this threadsafe: */\n 1681 |         session->shred_bytes_read += bytes_read;","lines":2}]},{"id":"RACE_6","type":"race_condition","type_label":"Race Condition","severity":"low","description":"rm_util_link_type() opens path1/path2 with rm_sys_open() and then separately rm_sys_lstat()s\nthe same paths. Between open and lstat (and between the two opens) the path could be replaced\n(TOCTOU). Since the fd is already held, the size/type checks should use fstat on the open fd\nrather than lstat on the path to avoid acting on a different file than the one opened.","fix":"Use fstat(fd1)/fstat(fd2) on the already-open descriptors instead of lstat on the paths for the size/regular-file checks.","locations":[{"ref":"lib/utilities.c:1165-1211","code":" 1165 |     int fd1 = rm_sys_open(path1, O_RDONLY);\n 1166 |     if(fd1 == -1) {\n 1167 |         rm_log_perrorf(\"rm_util_link_type: Error opening %s\", path1);\n 1168 |         return RM_LINK_ERROR;\n 1169 |     }\n 1170 | \n 1171 | #define RM_RETURN(value)   \\\n 1172 |     {                      \\\n 1173 |         rm_sys_close(fd1); \\\n 1174 |         return (value);    \\\n 1175 |     }\n 1176 | \n 1177 |     RmStat stat1;\n 1178 |     int stat_state = rm_sys_lstat(path1, &stat1);\n 1179 |     if(stat_state == -1) {\n 1180 |         rm_log_perrorf(\"rm_util_link_type: Unable to stat file %s\", path1);\n 1181 |         RM_RETURN(RM_LINK_ERROR);\n 1182 |     }\n 1183 | \n 1184 |     if(!S_ISREG(stat1.st_mode)) {\n 1185 |         RM_RETURN(RM_LINK_NOT_FILE);\n 1186 |     }\n 1187 | \n 1188 |     int fd2 = rm_sys_open(path2, O_RDONLY);\n 1189 |     if(fd2 == -1) {\n 1190 |         rm_log_perrorf(\"rm_util_link_type: Error opening %s\", path2);\n 1191 |         RM_RETURN(RM_LINK_ERROR);\n 1192 |     }\n 1193 | \n 1194 | #undef RM_RETURN\n 1195 | #define RM_RETURN(value)   \\\n 1196 |     {                      \\\n 1197 |         rm_sys_close(fd1); \\\n 1198 |         rm_sys_close(fd2); \\\n 1199 |         return (value);    \\\n 1200 |     }\n 1201 | \n 1202 |     RmStat stat2;\n 1203 |     stat_state = rm_sys_lstat(path2, &stat2);\n 1204 |     if(stat_state == -1) {\n 1205 |         rm_log_perrorf(\"rm_util_link_type: Unable to stat file %s\", path2);\n 1206 |         RM_RETURN(RM_LINK_ERROR);\n 1207 |     }\n 1208 | \n 1209 |     if(!S_ISREG(stat2.st_mode)) {\n 1210 |         RM_RETURN(RM_LINK_NOT_FILE);\n 1211 |     }","lines":47}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"rm_parrot_open() returns NULL on two early-error paths (json_parser_load_from_file failure, and root not being a JSON array) without freeing the already-allocated polly struct. polly->parser (a GObject), polly->disk_ids hash table, and the initialized directory_trie are all leaked. Replaying a malformed/non-array JSON file leaks these resources on every call.","fix":"Before each early `return NULL;`, call rm_parrot_close(polly) (or jump to a cleanup label that does so). Note rm_parrot_close already handles unref of parser/disk_ids and trie destruction.","locations":[{"ref":"lib/replay.c:162-170","code":"  162 |     if(!json_parser_load_from_file(polly->parser, json_path, error)) {\n  163 |         return NULL;\n  164 |     }\n  165 | \n  166 |     JsonNode *root = json_parser_get_root(polly->parser);\n  167 |     if(JSON_NODE_TYPE(root) != JSON_NODE_ARRAY) {\n  168 |         g_set_error(error, RM_ERROR_QUARK, 0, _(\"No valid json cache (no array in /)\"));\n  169 |         return NULL;\n  170 |     }","lines":9}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"If rm_tm_count_files fails, rm_tm_new returns 0 without freeing anything it already allocated: the RmTreeMerger slice, free_map, result_table, file_groups, known_hashs hash tables, and the two initialized tries (dir_tree, count_tree). Callers (cmdline.c, replay.c) just treat NULL as failure and exit, so the allocations leak.","fix":"On the failure path, unref the three/four hash tables, destroy both tries, g_slice_free the RmTreeMerger, and then return NULL.","locations":[{"ref":"lib/treemerge.c:524-549","code":"  524 | RmTreeMerger *rm_tm_new(RmSession *session) {\n  525 |     RmTreeMerger *self = g_slice_new(RmTreeMerger);\n  526 |     self->session = session;\n  527 |     self->callback = NULL;\n  528 |     self->callback_data = NULL;\n  529 |     self->free_map = g_hash_table_new(NULL, NULL);\n  530 |     g_queue_init(&self->valid_dirs);\n  531 | \n  532 |     self->result_table = g_hash_table_new_full((GHashFunc)rm_directory_hash,\n  533 |                                                (GEqualFunc)rm_directory_equal, NULL,\n  534 |                                                (GDestroyNotify)g_queue_free);\n  535 | \n  536 |     self->file_groups =\n  537 |         g_hash_table_new_full((GHashFunc)rm_digest_hash, (GEqualFunc)rm_digest_equal,\n  538 |                               NULL, (GDestroyNotify)g_queue_free);\n  539 | \n  540 |     self->known_hashs = g_hash_table_new_full(NULL, NULL, NULL, NULL);\n  541 | \n  542 |     rm_trie_init(&self->dir_tree);\n  543 |     rm_trie_init(&self->count_tree);\n  544 | \n  545 |     if(!rm_tm_count_files(&self->count_tree, session->cfg)) {\n  546 |         return 0;\n  547 |     }\n  548 | \n  549 |     return self;","lines":26}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"json rm_fmt_foot uses session even though the parameter is marked _UNUSED (it calls rm_fmt_get_config_value(session->formats,...) at line 221). The _UNUSED annotation is an invalid/misleading attribute that contradicts actual use; under compilers honoring 'used after unused' it is merely misleading, but it signals copy-paste from a handler that truly ignored session.","fix":"Remove the _UNUSED marker from the session parameter of rm_fmt_foot in json.c.","locations":[{"ref":"lib/formats/json.c:218-221","code":"  218 | static void rm_fmt_foot(_UNUSED RmSession *session, RmFmtHandler *parent, FILE *out) {\n  219 |     RmFmtHandlerJSON *self = (RmFmtHandlerJSON *)parent;\n  220 | \n  221 |     if(rm_fmt_get_config_value(session->formats, \"json\", \"no_footer\")) {","lines":4}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"rm_mounts_get_disk_id() walks parent directories duplicating `path` into `prev` and chaining\ng_path_get_dirname. On the success path it frees prev and parent_path and returns. But if\ng_path_get_dirname keeps returning the same string for a path that never reaches \"/\" (e.g. a\nrelative path with no parents, where dirname returns \".\" repeatedly), the loop compares\nprev==\".\" which is != \"/\", frees prev, sets prev=parent_path=\".\" and loops forever, leaking\nnothing but never terminating. The \"/\" termination check only covers absolute paths.","fix":"Also break when g_path_get_dirname returns a string equal to prev (no further ascent possible), e.g. \".\" or unchanged value.","locations":[{"ref":"lib/utilities.c:894-932","code":"  894 |     char *prev = g_strdup(path);\n  895 |     while(TRUE) {\n  896 |         char *parent_path = g_path_get_dirname(prev);\n  897 | \n  898 |         RmStat stat_buf;\n  899 |         if(!rm_sys_stat(parent_path, &stat_buf)) {\n  900 |             RmPartitionInfo *parent_part =\n  901 |                 g_hash_table_lookup(self->part_table, GINT_TO_POINTER(stat_buf.st_dev));\n  902 |             if(parent_part) {\n  903 |                 /* create new partition table entry for dev pointing to parent_part*/\n  904 |                 rm_log_debug_line(\"Adding partition info for \" GREEN \"%s\" RESET\n  905 |                                   \" - looks like subvolume %s on volume \" GREEN\n  906 |                                   \"%s\" RESET,\n se the fd, g_unlink(bootstrap_path), g_free(bootstrap_path) before returning.","locations":[{"ref":"lib/cmdline.c:179-185","code":"  179 |     if(write(bootstrap_fd, rm_py_bootstrap, sizeof(rm_py_bootstrap) - 1) < 0) {\n  180 |         rm_log_warning_line(\"Could not bootstrap gui: Unable to write to tempfile: %s\",\n  181 |                             g_strerror(errno));\n  182 |         return;\n  183 |     }\n  184 | \n  185 |     close(bootstrap_fd);","lines":7}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"rm_cmd_parse_timestamp_file: if rm_cmd_parse_timestamp fails it `return false` while stamp_file is still open, leaking the FILE* (and skipping the fclose at line 891).","fix":"fclose(stamp_file) before the early `return false`, or restructure to a single cleanup/return path.","locations":[{"ref":"lib/cmdline.c:876-891","code":"  876 |         if(fgets(stamp_buf, sizeof(stamp_buf), stamp_file) != NULL) {\n  877 |             success = rm_cmd_parse_timestamp(\n  878 |                 option_name,\n  879 |                 g_strstrip(stamp_buf),\n  880 |                 session,\n  881 |                 error\n  882 |             );\n  883 | \n  884 |             if(!success) {\n  885 |                 return false;\n  886 |             }\n  887 | \n  888 |             plain = rm_cmd_timestamp_is_plain(stamp_buf);\n  889 |         }\n  890 | \n  891 |         fclose(stamp_file);","lines":16}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"rm_fmt_close() unconditionally calls fclose(file) for every handler, including the stdout/stderr/stdin streams opened in rm_fmt_add (file_handle = stdout/stderr/stdin). Closing the standard streams of the process is incorrect; subsequent library/runtime output (or another formatter writing to the same stream) breaks, and double-handling can occur if two handlers point at stdout.","fix":"Track whether the handle is a standard xt_set_main_group, which takes ownership. That is fine, but if g_option_context_parse fails the code calls exit(EXIT_FAILURE) without freeing context (minor, process exits). More notably `error` from a successful path and the GOptionContext are only freed after the paths==NULL handling; on the `No valid paths given` exit(EXIT_FAILURE) at line 191 the context is never freed. These are process-exit leaks (low impact) but flagged for completeness.","fix":"Move g_option_context_free(context) before the early exit paths, or accept the leak as the process is terminating (document intent).","locations":[{"ref":"lib/hash-utility.c:169-194","code":"  169 |     if(!g_option_context_parse(context, &argc, (char ***)&argv, &error)) {\n  170 |         /* print g_option error message */\n  171 |         rm_log_error_line(\"%s\", error->message);\n  172 |         exit(EXIT_FAILURE);\n  173 |     }\n  174 | \n  175 |     if(tag.paths == NULL) {\n  176 |         /* read paths from stdin */\n  177 |         char path_buf[PATH_MAX];\n  178 |         char *tokbuf = NULL;\n  179 |         GPtrArray *paths = g_ptr_array_new();\n  180 | \n  181 |         while(fgets(path_buf, PATH_MAX, stdin)) {\n  182 |             char *abs_path = realpath(strtok_r(path_buf, \"\\n\", &tokbuf), NULL);\n  183 |             g_ptr_array_add(paths, abs_path);\n  184 |         }\n  185 | \n  186 |         tag.paths = (char **)g_ptr_array_free(paths, FALSE);\n  187 |     }\n  188 | \n  189 |     if(tag.paths == NULL || tag.paths[0] == NULL) {\n  190 |         rm_log_error_line(_(\"No valid paths given\"));\n  191 |         exit(EXIT_FAILURE);\n  192 |     }\n  193 | \n  194 |     g_option_context_free(context);","lines":26}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"rm_cmd_start_gui bounds the argv-copy loop with `i < sizeof(all_argv) / 2`. `all_argv` is `const char *all_argv[512]`, so `sizeof(all_argv)` is 4096 on a 64-bit system and `/2` evaluates to 2048, not 512. With a large argc the loop writes up to ~2048 pointers into a 512-element stack array, a stack buffer overflow. The intent was clearly `sizeof(all_argv) / sizeof(all_argv[0])` (and accounting for the 2 slots already used).","fix":"Bound the loop by the real element count: `i < (sizeof(all_argv) / sizeof(all_argv[0])) - (argp - all_argv) - 1` (leave room for the trailing NULL), or compute remaining capacity from argp directly.","locations":[{"ref":"lib/cmdline.c:188-197","code":"  188 |         const char *all_argv[512];\n  189 |         const char **argp = &all_argv[0];\n  190 |         memset(all_argv, 0, sizeof(all_argv));\n  191 | \n  192 |         *argp++ = *command;\n  193 |         *argp++ = bootstrap_path;\n  194 | \n  195 |         for(size_t i = 0; i < (size_t)argc && i < sizeof(all_argv) / 2; i++) {\n  196 |             *argp++ = argv[i];\n  197 |         }","lines":10}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In rm_digest_cumulative_update the loop-bound pointer stop_big = (T*)(stop + 1 - ALIGN) is computed by pointer arithmetic that can underflow / form an invalid pointer when size < ALIGN-1 (stop = data + size, so stop + 1 - ALIGN points before the buffer start when size+1 < ALIGN). The subsequent comparison ptr_big < stop_big is undefined behaviour when stop_big is a pointer outside the object. In practice it usually skips the word loop, but relying on out-of-object pointer comparison is UB and brittle.","fix":"Compute the word-loop bound using integer sizes instead of out-of-bounds pointers, e.g. iterate while (pos_bytes + ALIGN <= size) using a byte offset, or guard the whole word loop with if(size >= ALIGN).","locations":[{"ref":"lib/checksum.c:330-345","code":"  330 |     RM_DIGEST_CUMULATIVE_T pos = 0; /* byte offset within data */\n  331 |     guint8 *ptr = (guint8 *)data;\n  332 |     guint8 *stop = ptr + size;\n  333 | \n  334 |     RM_DIGEST_CUMULATIVE_T *ptr_big = (RM_DIGEST_CUMULATIVE_T *)ptr;\n  335 |     RM_DIGEST_CUMULATIVE_T *stop_big =\n  336 |         (RM_DIGEST_CUMULATIVE_T *)(stop + 1 - RM_DIGEST_CUMULATIVE_ALIGN);\n  337 | \n  338 |     /* plough through body of data efficiently */\n  339 |     while(ptr_big < stop_big) {\n  340 |         state->bigdata[pos / RM_DIGEST_CUMULATIVE_ALIGN] ^= *ptr_big++;\n  341 |         pos = pos + RM_DIGEST_CUMULATIVE_ALIGN;\n  342 |         if(pos == state->bytes) {\n  343 |             pos = 0;\n  344 |         }\n  345 |     }","lines":16}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In rm_hasher_unbuffered_read, bytes_read is declared gint32 (line 241) but holds the return value of rm_sys_preadv across N_PREADV_BUFFERS (4) buffers, each of hasher->buf_size bytes. buf_size derives from the user-configurable --read-buffer-len. With a large buffer length, 4 * buf_size can exceed INT32_MAX, so the ssize_t result is truncated into a gint32 and can become negative, spuriously triggering the 'preadv failed' error branch (and freeing buffers) or corrupting the per-buffer length CLAMP arithmetic at line 313.","fix":"Use ssize_t (or gint64) for bytes_read and the CLAMP arithmetic, and bound buf_size so n_preadv_buffers*buf_size stays within ssize_t range.","locations":[{"ref":"lib/hasher.c:241","code":"  241 |     gint32 bytes_read = 0;","lines":1},{"ref":"lib/hasher.c:289","code":"  289 |         bytes_read = rm_sys_preadv(fd, readvec, n_preadv_buffers, file_offset);","lines":1},{"ref":"lib/hasher.c:313","code":"  313 |             buffer->len = CLAMP(bytes_read - i * (gint32)hasher->buf_size, 0,","lines":1}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"rm_util_size_to_human_readable() uses int literals for the thresholds: `512 * 1024 * 1024`\nis computed as int (= 536870912, still fits) but the next branch boundary is fine; however\nthe comparison `num < 512 * 1024 * 1024` promotes the int constant - it is just within int\nrange, yet the intent (512MB) is fragile and any future bump (e.g. adding a TB tier with\n512*1024*1024*1024) silently overflows a 32-bit int to a negative/wrapped value. The GB\nbranch also never scales beyond GB, so a 5 TB file prints as \"5120.00 GB\".","fix":"Use explicit unsigned/64-bit constants (e.g. 512ULL * 1024 * 1024) and consider adding TB/PB tiers; cast thresholds to RmOff.","locations":[{"ref":"lib/utilities.c:375-385","code":"  375 | void rm_util_size_to_human_readable(RmOff num, char *in, gsize len) {\n  376 |     if(num < 512) {\n  377 |         snprintf(in, len, \"%\" LLU \" B\", num);\n  378 |     } else if(num < 512 * 1024) {\n  379 |         snprintf(in, len, \"%.2f KB\", num / 1024.0);\n  380 |     } else if(num < 512 * 1024 * 1024) {\n  381 |         snprintf(in, len, \"%.2f MB\", num / (1024.0 * 1024.0));\n  382 |     } else {\n  383 |         snprintf(in, len, \"%.2f GB\", num / (1024.0 * 1024.0 * 1024.0));\n  384 |     }\n  385 | }","lines":11}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"rm_cmd_size_string_to_bytes does not reset errno before the strtoull calls. The ERANGE overflow checks (`base_size == ULLONG_MAX && errno == ERANGE`) can therefore misfire on a stale errno, or a legitimate input of exactly ULLONG_MAX combined with a previously-set ERANGE would be wrongly rejected.","fix":"Set errno = 0 immediately before each strtoull call, then test errno == ERANGE.","locations":[{"ref":"lib/cmdline.c:348-377","code":"  348 |         RmOff fraction_num = strtoull(&dot[1], &first_error, 10);\n  349 |         if(first_error != NULL && *first_error != 0) {\n  350 |             g_set_error(error, RM_ERROR_QUARK, 0, _(\"Failed to parse size fraction\"));\n  351 |             return 0;\n  352 |         }\n  353 | \n  354 |         if(fraction_num == ULLONG_MAX && errno == ERANGE) {\n  355 |             g_set_error(error, RM_ERROR_QUARK, 0, _(\"Fraction is too big for uint64\"));\n  356 |             return 0;\n  357 |         }\n  358 | \n  359 |         // Make sure number parsing doesn't see the dot.\n  360 |         *dot = 0;\n  361 | \n  362 |         // Convert the integer (e.g. 523) to a fraction (e.g. 0.523).\n  363 |         fraction = ((double)fraction_num) / pow(10, 1 + ((int)log10(fraction_num)));\n  364 |     }\n  365 | \n  366 |     if(*size_spec_stripped != 0) {\n  367 |         char *first_error = NULL;\n  368 |         base_size = strtoull(size_spec_stripped, &first_error, 10);\n  369 |         if(first_error != NULL && *first_error != 0) {\n  370 |             g_set_error(error, RM_ERROR_QUARK, 0, _(\"This does not look like a number\"));\n  371 |             return 0;\n  372 |         }\n  373 | \n  374 |         if(base_size == ULLONG_MAX && errno == ERANGE) {\n  375 |             g_set_error(error, RM_ERROR_QUARK, 0, _(\"Size is too big for uint64\"));\n  376 |             return 0;\n  377 |         }","lines":30}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"rm_file_lint_type_to_string indexes LINT_TYPES with MIN(type, N) where N = number of array elements. The valid indices are 0..N-1, so when type == N this reads LINT_TYPES[N], one element past the end of the array (out-of-bounds read). The clamp should be N-1.","fix":"Return LINT_TYPES[MIN(type, (sizeof(LINT_TYPES)/sizeof(const char *)) - 1)];","locations":[{"ref":"lib/file.c:164-166","code":"  164 | const char *rm_file_lint_type_to_string(RmLintType type) {\n  165 |     return LINT_TYPES[MIN(type, sizeof(LINT_TYPES) / sizeof(const char *))];\n  166 | }","lines":3}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"rm_fmt_progress_print_text() computes width - self->text_len with unsigned arithmetic. text_len is guint32; if it ever exceeds width (e.g. due to the color-stripping length math in rm_fmt_progress_format_text mis-accounting multibyte/UTF-8 lengths) the subtraction wraps to a huge unsigned value and the padding loop prints billions of spaces. The guard 'if(self->text_len < (unsigned)width)' protects the common case but the format_text length bookkeeping (g_utf8_strlen mixing with byte-based color subtraction) is fragile.","fix":"Compute padding as int and clamp: int pad = (int)width - (int)self->text_len; for(int i=0;i<pad;i++)... Ensure text_len can never be set larger than max_len.","locations":[{"ref":"lib/formats/progressbar.c:261-269","code":"  261 | static void rm_fmt_progress_print_text(RmFmtHandlerProgress *self, int width, FILE *out) {\n  262 |     if(self->text_len < (unsigned)width) {\n  263 |         for(guint32 i = 0; i < width - self->text_len; ++i) {\n  264 |             fprintf(out, \" \");\n  265 |         }\n  266 |     }\n  267 | \n  268 |     fprintf(out, \"%s\", self->text_buf);\n  269 | }","lines":9},{"ref":"lib/formats/progressbar.c:234-258","code":"  234 |     /* Support unicode messages - translated text might contain some. */\n  235 |     self->text_len = g_utf8_strlen(self->text_buf, self->text_len);\n  236 | \n  237 |     /* Get rid of colors to get the correct length of the text. This is\n  238 |      * necessary to correctly guess the length of the displayed text in cells.\n  239 |      */\n  240 |     int text_iter = 0;\n  241 |     for(char *iter = &self->text_buf[0]; *iter; iter++) {\n  242 |         if(*iter == '\\x1b') {\n  243 |             char *jump = strchr(iter, 'm');\n  244 |             if(jump != NULL) {\n  245 |                 self->text_len -= jump - iter + 1;\n  246 |                 iter = jump;\n  247 |                 continue;\n  248 |             }\n  249 |         }\n  250 | \n  251 |         if(text_iter >= max_len) {\n  252 |             *iter = 0;\n  253 |             self->text_len = text_iter;\n  254 |             break;\n  255 |         }\n  256 | \n  257 |         text_iter++;\n  258 |     }","lines":25}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"buf_size is computed as `int buf_size = (g_strv_length(tag.paths) + 1) * sizeof(RmDigest *);`. The multiplication is done in int (g_strv_length returns guint, sizeof is size_t, but the result is stored in an int). With a very large number of input paths from stdin this overflows int, producing a too-small or negative allocation size passed to g_slice_alloc0, leading to heap overflow when indexing completed_digests_buffer/read_succesful by path index.","fix":"Use gsize buf_size = ((gsize)g_strv_length(tag.paths) + 1) * sizeof(RmDigest *);","locations":[{"ref":"lib/hash-utility.c:202-207","code":"  202 |     int buf_size = (g_strv_length(tag.paths) + 1) * sizeof(RmDigest *);\n  203 |     tag.read_succesful = g_slice_alloc0(buf_size);\n  204 | \n  205 |     if(tag.print_in_order) {\n  206 |         /* allocate buffer to collect results */\n  207 |         tag.completed_digests_buffer = g_slice_alloc0(buf_size);","lines":6}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"size and n_children are read from JSON via json_object_get_int_member (gint64) and assigned to file->actual_file_size (RmOff, unsigned) and a size_t cast. A negative JSON integer (e.g. \"size\": -1) becomes a huge unsigned value, and json_object_get_int_member emits a critical and returns 0 if the member is missing or non-integer. There is no validation. n_children is later added to session->total_files / dup_counter, so a crafted negative/huge value corrupts the statistics and reported lint size.","fix":"Verify the members exist and are non-negative integers before use (json_object_has_member + JSON_NODE type check); clamp/reject negative values.","locations":[{"ref":"lib/replay.c:287-295","code":"  287 |     if(type == RM_LINT_TYPE_DUPE_DIR_CANDIDATE) {\n  288 |         // stat() reports directories as size zero.\n  289 |         // Fix this by actually using the size field from the json node.\n  290 |         if(stat_info->st_mode & S_IFDIR) {\n  291 |             file->actual_file_size = json_object_get_int_member(object, \"size\");\n  292 |         }\n  293 | \n  294 |         file->n_children = (size_t)json_object_get_int_member(object, \"n_children\");\n  295 |     }","lines":9}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"When cfg->find_duplicates is false, the code decrements the unsigned RmOff counters dup_group_counter (by 1) and dup_counter (by file_list->length - 1) for every remaining file group. These counters are RmOff (unsigned). If treemerge produces more leftover groups/files than were previously counted as duplicates, these unsigned subtractions wrap to huge values, corrupting the final statistics.","fix":"Guard the subtractions (clamp at 0) or track these counts with signed arithmetic, ensuring the decrement never exceeds the accumulated count.","locations":[{"ref":"lib/treemerge.c:970-973","code":"  970 |             if(self->session->cfg->find_duplicates == false) {\n  971 |                 self->session->dup_group_counter -= 1;\n  972 |                 self->session->dup_counter -= file_list->length - 1;\n  973 |             } else {","lines":4}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"rm_hasher_buffered_read in read-to-EOF mode (bytes_to_read == 0) sets bytes_remaining = 0 and then executes 'bytes_remaining -= bytes_read' (line 204), underflowing the gsize to a huge value on the first iteration. It happens to stay correct because want_bytes = MIN(huge, buf_size) = buf_size and the loop exits on feof, but the underflow is fragile and confusing. Also rm_hasher_request_readahead is passed G_MAXSIZE for read-to-EOF (line 182) and then computes 'readahead = bytes_to_read * 8' (line 134), overflowing the readahead hint.","fix":"Guard the bytes_remaining bookkeeping with !read_to_eof, and clamp/skip the *8 readahead multiplier when bytes_to_read is the EOF sentinel.","locations":[{"ref":"lib/hasher.c:191","code":"  191 |     gsize bytes_remaining = bytes_to_read;","lines":1},{"ref":"lib/hasher.c:204","code":"  204 |         bytes_remaining -= bytes_read;","lines":1},{"ref":"lib/hasher.c:131-135","code":"  131 | static void rm_hasher_request_readahead(int fd, RmOff seek_offset, RmOff bytes_to_read) {\n  132 | /* Give the kernel scheduler some hints */\n  133 | #if HAVE_POSIX_FADVISE && HASHER_FADVISE_FLAGS\n  134 |     RmOff readahead = bytes_to_read * 8;\n  135 |     posix_fadvise(fd, seek_offset, readahead, HASHER_FADVISE_FLAGS);","lines":5},{"ref":"lib/hasher.c:180-182","code":"  180 |     gboolean read_to_eof = (bytes_to_read == 0);\n  181 |     rm_hasher_request_readahead(fileno(fd), start_offset,\n  182 |                                 read_to_eof ? G_MAXSIZE : bytes_to_read);","lines":3}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"rm_fmt_add() re-initializes the print mutex on the wrong object. After memcpy'ing the template into new_handler_copy, it calls g_mutex_init(&new_handler->print_mtx) on the *template* handler, not on new_handler_copy. The copy therefore inherits, via memcpy, a bit-copy of the template's GMutex (copying a GMutex is undefined and can leave it in a broken/locked state), and the per-instance mutex used by RM_FMT_CALLBACK (handler->print_mtx on the copy) is never freshly initialized. Multiple outputs of the same format may then share/corrupt lock state.","fix":"Change to g_mutex_init(&new_handler_copy->print_mtx); so the freshly allocated copy gets its own initialized mutex.","locations":[{"ref":"lib/formats.c:285-287","code":"  285 |     RmFmtHandler *new_handler_copy = g_malloc0(new_handler->size);\n  286 |     memcpy(new_handler_copy, new_handler, new_handler->size);\n  287 |     g_mutex_init(&new_handler->print_mtx);","lines":3}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In rm_hasher_callback's ignore-order branch (print_in_order false), the success flag is checked with session->read_succesful[session->path_index] but the printed path is session->paths[index]. path_index is only advanced in the in-order branch and stays 0 here, so every out-of-order completion consults read_succesful[0] instead of read_succesful[index]. This prints/suppresses hashes based on the wrong file's read result (e.g. file 0 failed -> all hashes suppressed; or a failed file index>0 gets printed).","fix":"Use the per-task index: if(session->read_succesful[index]) rm_hasher_print(digest, session->paths[index]);","locations":[{"ref":"lib/hash-utility.c:101-105","code":"  101 |         } else if(digest) {\n  102 |             if(session->read_succesful[session->path_index]) {\n  103 |                 rm_hasher_print(digest, session->paths[index]);\n  104 |             }\n  105 |         }","lines":5}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In rm_hasher_unbuffered_read the read-to-EOF mode (bytes_to_read == 0) is completely broken. bytes_remaining is initialised to bytes_to_read, i.e. 0. On the very first iteration line 302 computes bytes_read = MIN((gsize)bytes_read, bytes_remaining) = MIN(bytes_read, 0) = 0, so every read is clamped to zero bytes, no buffer is ever hashed, and the loop immediately exits via the read_to_eof && bytes_read == 0 branch returning success=TRUE. Any caller relying on the documented bytes_to_read==0 ('read whole file') contract with the unbuffered/preadv path would silently hash an empty file. The buffered path handles this correctly; only the preadv path is wrong. Currently masked because both in-tree callers always pass an explicit byte count, but it is a latent correctness landmine.","fix":"Only clamp against bytes_remaining when not in read_to_eof mode, e.g. 'if(!read_to_eof) bytes_read = MIN((gsize)bytes_read, bytes_remaining);' and skip the 'bytes_remaining -= bytes_read' bookkeeping (or treat bytes_remaining as unlimited) when read_to_eof is set.","locations":[{"ref":"lib/hasher.c:279","code":"  279 |     guint64 bytes_remaining = bytes_to_read;","lines":1},{"ref":"lib/hasher.c:301-307","code":"  301 |         /* ignore over-reads */\n  302 |         bytes_read = MIN((gsize)bytes_read, bytes_remaining);\n  303 | \n  304 |         /* update totals */\n  305 |         file_offset += bytes_read;\n  306 |         *bytes_actually_read += bytes_read;\n  307 |         bytes_remaining -= bytes_read;","lines":7},{"ref":"lib/hasher.c:325-327","code":"  325 |         if(read_to_eof && bytes_read == 0) {\n  326 |             success = TRUE;\n  327 |             break;","lines":3}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"rm_path_parent_inode returns 0 when stat(2) on the parent path fails. rm_path_have_same_parent treats equal parent inodes as 'same parent'. If both files' parents fail to stat (returning 0 each), they are considered to share a parent. Combined with matching inode/dev/basename in rm_path_double_equal, two genuinely distinct files can be classified as path-doubles, causing one of them to be destroyed (rm_pp_check_path_double -> rm_file_destroy). This is potential data loss / under-reporting of duplicates on unreadable parent dirs.","fix":"Return a sentinel that never compares equal on failure (e.g. return distinct values, or have rm_path_have_same_parent treat a 0/failed lookup as 'not same parent'). At minimum, do not treat two failed stats as equal.","locations":[{"ref":"lib/preprocess.c:151-179","code":"  151 | static ino_t rm_path_parent_inode(RmFile *file) {\n  152 |     char parent_path[PATH_MAX];\n  153 |     rm_trie_build_path(\n  154 |         (RmTrie *)&file->session->cfg->file_trie,\n  155 |         file->folder->parent,\n  156 |         parent_path,\n  157 |         PATH_MAX\n  158 |     );\n  159 | \n  160 |     RmStat stat_buf;\n  161 |     int retval = rm_sys_stat(parent_path, &stat_buf);\n  162 |     if(retval == -1) {\n  163 |         RM_DEFINE_PATH(file);\n  164 |         rm_log_error_line(\n  165 |             \"Failed to get parent path of %s: stat failed: %s\",\n  166 |             file_path,\n  167 |             g_strerror(errno)\n  168 |         );\n  169 |         return 0;\n  170 |     }\n  171 | \n  172 |     return stat_buf.st_ino;\n  173 | }\n  174 | \n  175 | static bool rm_path_have_same_parent(RmPathDoubleKey *key_a, RmPathDoubleKey *key_b) {\n  176 |     RmFile *file_a = key_a->file, *file_b = key_b->file;\n  177 |     return (file_a->folder->parent == file_b->folder->parent ||\n  178 |             rm_path_parent_inode(file_a) == rm_path_parent_inode(file_b));\n  179 | }","lines":29}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"rm_digest_paranoid_copy() makes a shallow copy that omits buffers, buffer_tail, twin_candidate, twin_candidate_buffer and rejects (all left NULL by g_slice_new0). The copied digest therefore cannot be used for paranoid byte-by-byte comparison; rm_digest_equal() on such a copy would fall through to the shadow-hash comparison only (or misbehave). The copy is only valid if callers exclusively rely on the shadow hash afterwards, an undocumented and fragile invariant.","fix":"Either deep-copy the buffer list and reset the candidate/reject state explicitly, or document clearly that a copied paranoid digest is shadow-hash-only and assert buffers were already released before copying.","locations":[{"ref":"lib/checksum.c:703-709","code":"  703 | static RmParanoid *rm_digest_paranoid_copy(RmParanoid *paranoid) {\n  704 |     RmParanoid *copy = g_slice_new0(RmParanoid);\n  705 |     if(paranoid->shadow_hash != NULL) {\n  706 |         copy->shadow_hash = rm_digest_copy(paranoid->shadow_hash);\n  707 |     }\n  708 |     return copy;\n  709 | }","lines":7}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"rm_fmt_register() initializes a mutex on every registered template handler (g_mutex_init(&handler->print_mtx)), but rm_fmt_close() only clears mutexes for handlers in handler_order (the copies). The template handlers' mutexes are initialized and never cleared; combined with the wrong-object init in rm_fmt_add, the mutex ownership model is inconsistent. The template mutex is never actually used for locking (only copies are in handler_order), so the init here is effectively dead/misleading.","fix":"Do not init the template mutex in rm_fmt_register; only init per-copy mutexes in rm_fmt_add (on the copy). Keep the clear in rm_fmt_close matched to the copies.","locations":[{"ref":"lib/formats.c:215-218","code":"  215 | void rm_fmt_register(RmFmtTable *self, RmFmtHandler *handler) {\n  216 |     g_hash_table_insert(self->name_to_handler, (char *)handler->name, handler);\n  217 |     g_mutex_init(&handler->print_mtx);\n  218 | }","lines":4},{"ref":"lib/formats.c:414-419","code":"  414 |     RM_FMT_FOR_EACH_HANDLER_BEGIN(self) {\n  415 |         RM_FMT_CALLBACK(handler->foot);\n  416 |         fclose(file);\n  417 |         g_mutex_clear(&handler->print_mtx);\n  418 |     }\n  419 |     RM_FMT_FOR_EACH_HANDLER_END","lines":6}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"_equal handler checksum comparison uses strncmp(checksum, last_checksum, cksum_bytes) where cksum_bytes counts the trailing NUL. Both strings are NUL-terminated hex of the same length, so this works only as long as every compared file has an identical digest byte length. If two compared files have digests of different byte length (different cksum_bytes), strncmp with the first file's length may read past the shorter string's buffer or mis-compare; more importantly the equality logic assumes equal lengths without checking, so a shorter-but-prefix-equal checksum could be declared equal.","fix":"Compare with strcmp (NUL-terminated) and/or first compare rm_digest_get_bytes() of both files; store the length alongside last_checksum and require equality.","locations":[{"ref":"lib/formats/_equal.c:100-120","code":"  100 |     size_t cksum_bytes = rm_digest_get_bytes(file->digest) * 2 + 1;\n  101 |     char *checksum = g_malloc0(cksum_bytes);\n  102 | \n  103 |     memset(checksum, '0', cksum_bytes);\n  104 |     checksum[cksum_bytes - 1] = 0;\n  105 |     rm_digest_hexstring(file->digest, checksum);\n  106 | \n  107 |     if(self->last_checksum != NULL) {\n  108 |         if(!strncmp(checksum, self->last_checksum, cksum_bytes)) {\n  109 |             session->equal_exit_code = EXIT_SUCCESS;\n  110 |         } else {\n  111 |             rm_fmt_report_failure(self, session);\n  112 |             rm_log_debug_line(\n  113 |                     \"First differing items:\\n\\t%s (%s)\\n\\tlast checksum: (%s)\",\n  114 |                     file_path, checksum, self->last_checksum\n  115 |             );\n  116 |         }\n  117 |         g_free(self->last_checksum);\n  118 |     }\n  119 | \n  120 |     self->last_checksum = checksum;","lines":21}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Integer overflow / precision loss in algorithm-efficiency stats. efficiency = 100 * (duplicate_bytes + original_bytes + unique_bytes) / shred_bytes_read performs the multiply and divide in 64-bit unsigned integer arithmetic (all operands are RmOff) and only converts to gfloat at assignment. For large data sets 100 * total_bytes can overflow guint64, and integer division discards the fraction the float result pretends to carry, yielding wrong percentages.","fix":"Cast to gdouble before arithmetic: efficiency = 100.0 * (gdouble)(dup+orig+uniq) / (gdouble)shred_bytes_read;","locations":[{"ref":"lib/formats/stats.c:115-127","code":"  115 |     if(session->shred_bytes_read != 0) {\n  116 |         gfloat efficiency = 100 * (\n  117 |                 session->duplicate_bytes +\n  118 |                 session->original_bytes +\n  119 |                 session->unique_bytes\n  120 |             ) /\tsession->shred_bytes_read;\n  121 | \n  122 | \n  123 |         snprintf(eff_total, sizeof(eff_total), \"%.0f%%\", efficiency);\n  124 |         efficiency = 100 * (0 + session->duplicate_bytes + session->original_bytes) /\n  125 |                      session->shred_bytes_read;\n  126 |         snprintf(eff_dupes, sizeof(eff_dupes), \"%.1f%%\", efficiency);\n  127 |     }","lines":13}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"When an escaped marker is encountered (iter[-1] == '\\\\'), the loop uses 'break' instead of 'continue'. This terminates the whole bracket-balance scan at the first escaped '<' or '>', so a pattern containing an escaped marker (e.g. r<a\\<b>) ends the loop early, leaving balance != 0 and reporting a bogus '< or > imbalance' error for an otherwise valid pattern.","fix":"Use 'continue' instead of 'break' so the scan skips the escaped marker and keeps searching for the real closing bracket.","locations":[{"ref":"lib/preprocess.c:256-272","code":"  256 |     while((iter = strpbrk(&iter[1], \"<>\"))) {\n  257 |         if(iter[-1] == '\\\\') {\n  258 |             /* escaped, skip */\n  259 |             break;\n  260 |         }\n  261 | \n  262 |         if(iter && *iter == '<') {\n  263 |             ++balance;\n  264 |         } else if(iter) {\n  265 |             --balance;\n  266 |             last = iter;\n  267 |         }\n  268 | \n  269 |         if(balance == 0) {\n  270 |             break;\n  271 |         }\n  272 |     }","lines":17}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"file->is_symlink is set from (lstat_buf.st_mode & S_IFLNK). S_IFLNK is a multi-bit file-type mask (0120000), not a single flag; masking with & yields a non-zero int that is correct here only because is_symlink is bool. More importantly the correct idiom is S_ISLNK(lstat_buf.st_mode) ((st_mode & S_IFMT) == S_IFLNK); the bare `& S_IFLNK` can be true for other file types whose type bits overlap S_IFLNK's bits (e.g. sockets S_IFSOCK 0140000 shares bit 0100000... actually S_IFLNK=0120000 shares the 0020000 and 0100000 bits with several types), so non-symlinks can be misclassified as symlinks.","fix":"Use file->is_symlink = S_ISLNK(lstat_buf.st_mode);","locations":[{"ref":"lib/replay.c:278","code":"  278 |     file->is_symlink = (lstat_buf.st_mode & S_IFLNK);","lines":1}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"rm_parrot_fix_duplicate_entries() removes a duplicate node by calling g_queue_delete_link(cage->groups, old_iter), but old_iter is a link belonging to `group` (the per-group queue passed in), NOT to cage->groups. Deleting a link from the wrong queue corrupts cage->groups' length/pointers and fails to actually unlink the node from `group`. This is a copy/paste-style bug; rm_parrot_merge_identical_groups correctly deletes from cage->groups because its iter genuinely belongs to cage->groups.","fix":"Delete the link from the queue it belongs to: g_queue_delete_link(group, old_iter);","locations":[{"ref":"lib/replay.c:612-616","code":"  612 |             GList *old_iter = iter;\n  613 |             iter = iter->prev;\n  614 |             g_queue_delete_link(cage->groups, old_iter);\n  615 |             rm_file_destroy(file);\n  616 |         }","lines":5}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"rm_parrot_merge_identical_groups and rm_parrot_cage_flush dereference group->head->data without checking group->head is non-NULL. push_to_group can enqueue only groups with length>0, but rm_parrot_fix_must_match_tagged and rm_parrot_fix_duplicate_entries (called from write_group, which runs in flush AFTER merge) can g_queue_clear a group to length 0. Merge runs before write_group so head is valid there; however head_file->digest is dereferenced (line 875-877) assuming digest is always set - rm_parrot_try_next always sets digest, so currently safe, but the unchecked group->head->data in merge is fragile if empty groups ever reach cage->groups.","fix":"Guard `if(group->head == NULL) continue;` at the top of the merge loop body before dereferencing group->head->data.","locations":[{"ref":"lib/replay.c:873-877","code":"  873 |     for(GList *iter = cage->groups->head; iter; iter = iter->next) {\n  874 |         GQueue *group = iter->data;\n  875 |         RmFile *head_file = group->head->data;\n  876 | \n  877 |         if (!head_file->digest->bytes)","lines":5}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Double-counting of session->unique_bytes for groups that never qualify as duplicates. rm_shred_group_postprocess() calls rm_shred_group_find_original() twice (lines 1474 and 1485). For a group that arrives DORMANT (failed to qualify), BOTH calls execute the else-branch that runs `file->lint_type = RM_LINT_TYPE_UNIQUE_FILE; session->unique_bytes += file->actual_file_size;` for every file, so unique_bytes is added twice. unique_bytes is only ever incremented at this one site (session.h:99), so the reported unique-file byte total is inflated for all non-duplicate groups.","fix":"Only accumulate unique_bytes / set UNIQUE_FILE once. E.g. move the unique-file bookkeeping out of the first find_original call, or guard it so it runs a single time per file (the first call could pass FINISHING-only semantics and the bookkeeping done solely in the second, status-final call).","locations":[{"ref":"lib/shredder.c:1279-1282","code":" 1279 |         } else {\n 1280 |             file->lint_type = RM_LINT_TYPE_UNIQUE_FILE;\n 1
