 |                 }\n  117 |             }\n  118 |         } else if let Some(name) = n.attribute(AId::FontSize) {\n  119 |             font_size = convert_named_font_size(name, font_size);\n  120 |         }\n  121 |     }\n  122 | \n  123 |     font_size\n  124 | }"}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"low","description":"`GlyphPainter::push_clip` does `self.clip_with_path(&self.path_buf.clone())` — allocating a copy of the entire path buffer string on every push_clip. The clone is only there because of borrow-checker constraints; the underlying logic doesn't actually need a copy.","fix":"Refactor `clip_with_path` to take an immutable `&str` and inline its body, or use `mem::take` to move the String through without copying. The function only reads the path.","locations":[{"ref":"crates/usvg/src/text/colr.rs:322-324","code":"  322 |     fn push_clip(&mut self) {\n  323 |         self.clip_with_path(&self.path_buf.clone());\n  324 |     }"}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"low","description":"`Path::new` clones the entire `tiny_skia_path::Path` data before transforming it when `abs_transform.has_skew()` (the TODO at line 1319 says 'avoid re-alloc'). This happens once per Path during construction, even though the cloned path is discarded after computing bounding boxes.","fix":"Compute the transformed bounds without materializing a Path (apply the transform per-segment). Alternatively, accept the cost but only clone when bounding box computation is actually requested.","locations":[{"ref":"crates/usvg/src/tree/mod.rs:1318-1325","code":" 1318 |         if abs_transform.has_skew() {\n 1319 |             // TODO: avoid re-alloc\n 1320 |             let path2 = data.as_ref().clone();\n 1321 |             let path2 = path2.transform(abs_transform)?;\n 1322 |             abs_bounding_box = path2.compute_tight_bounds()?;\n 1323 |             abs_stroke_bounding_box =\n 1324 |                 Path::calculate_stroke_bbox(stroke.as_ref(), &path2).unwrap_or(abs_bounding_box);\n 1325 |         } else {"}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"low","description":"`Tree::collect_paint_servers`, `collect_clip_paths`, `collect_masks`, and `collect_filters` all use linear `iter().any(|other| Arc::ptr_eq(...))` to deduplicate, giving O(n²) over the number of unique paint servers / clip-paths / etc. For large SVGs this is wasteful.","fix":"Use a `HashSet<usize>` keyed on `Arc::as_ptr(...) as usize` to dedup in O(1) per insertion.","locations":[{"ref":"crates/usvg/src/tree/mod.rs:1674-1701","code":" 1674 |     pub(crate) fn collect_paint_servers(&mut self) {\n 1675 |         loop_over_paint_servers(&self.root, &mut |paint| match paint {\n 1676 |             Paint::Color(_) => {}\n 1677 |             Paint::LinearGradient(lg) => {\n 1678 |                 if !self\n 1679 |                     .linear_gradients\n 1680 |                     .iter()\n 1681 |                     .any(|other| Arc::ptr_eq(lg, other))\n 1682 |                 {\n 1683 |                     self.linear_gradients.push(lg.clone());\n 1684 |                 }\n 1685 |             }\n 1686 |             Paint::RadialGradient(rg) => {\n 1687 |                 if !self\n 1688 |                     .radial_gradients\n 1689 |                     .iter()\n 1690 |                     .any(|other| Arc::ptr_eq(rg, other))\n 1691 |                 {\n 1692 |                     self.radial_gradients.push(rg.clone());\n 1693 |                 }\n 1694 |             }\n 1695 |             Paint::Pattern(patt) => {\n 1696 |                 if !self.patterns.iter().any(|other| Arc::ptr_eq(patt, other)) {\n 1697 |                     self.patterns.push(patt.clone());\n 1698 |                 }\n 1699 |             }\n 1700 |         });\n 1701 |     }"},{"ref":"crates/usvg/src/tree/mod.rs:1770-1834","code":" 1770 |     pub(crate) fn collect_clip_paths(&self, clip_paths: &mut Vec<Arc<ClipPath>>) {\n 1771 |         for node in self.children() {\n 1772 |             if let Node::Group(g) = node {\n 1773 |                 if let Some(clip) = &g.clip_path {\n 1774 |                     if !clip_paths.iter().any(|other| Arc::ptr_eq(clip, other)) {\n 1775 |                         clip_paths.push(clip.clone());\n 1776 |                     }\n 1777 | \n 1778 |                     if let Some(sub_clip) = &clip.clip_path {\n 1779 |                         if !clip_paths.iter().any(|other| Arc::ptr_eq(sub_clip, other)) {\n 1780 |                             clip_paths.push(sub_clip.clone());\n 1781 |                         }\n 1782 |                     }\n 1783 |                 }\n 1784 |             }\n 1785 | \n 1786 |             node.subroots(|subroot| subroot.collect_clip_paths(clip_paths));\n 1787 | \n 1788 |             if let Node::Group(g) = node {\n 1789 |                 g.collect_clip_paths(clip_paths);\n 1790 |             }\n 1791 |         }\n 1792 |     }\n 1793 | \n 1794 |     pub(crate) fn collect_masks(&self, masks: &mut Vec<Arc<Mask>>) {\n 1795 |         for node in self.children() {\n 1796 |             if let Node::Group(g) = node {\n 1797 |                 if let Some(mask) = &g.mask {\n 1798 |                     if !masks.iter().any(|other| Arc::ptr_eq(mask, other)) {\n 1799 |                         masks.push(mask.clone());\n 1800 |                     }\n 1801 | \n 1802 |                     if let Some(sub_mask) = &mask.mask {\n 1803 |                         if !masks.iter().any(|other| Arc::ptr_eq(sub_mask, other)) {\n 1804 |                             masks.push(sub_mask.clone());\n 1805 |                         }\n 1806 |                     }\n 1807 |                 }\n 1808 |             }\n 1809 | \n 1810 |             node.subroots(|subroot| subroot.collect_masks(masks));\n 1811 | \n 1812 |             if let Node::Group(g) = node {\n 1813 |                 g.collect_masks(masks);\n 1814 |             }\n 1815 |         }\n 1816 |     }\n 1817 | \n 1818 |     pub(crate) fn collect_filters(&self, filters: &mut Vec<Arc<filter::Filter>>) {\n 1819 |         for node in self.children() {\n 1820 |             if let Node::Group(g) = node {\n 1821 |                 for filter in g.filters() {\n 1822 |                     if !filters.iter().any(|other| Arc::ptr_eq(filter, other)) {\n 1823 |                         filters.push(filter.clone());\n 1824 |                     }\n 1825 |                 }\n 1826 |             }\n 1827 | \n 1828 |             node.subroots(|subroot| subroot.collect_filters(filters));\n 1829 | \n 1830 |             if let Node::Group(g) = node {\n 1831 |                 g.collect_filters(filters);\n 1832 |             }\n 1833 |         }\n 1834 |     }"}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"negligible","description":"`path.clone()` is called unconditionally in three arms of the `match (raw_paint_order.order, marker)` block in `convert_path`, even though only one arm runs per call and `path` is owned by the function (could be moved into the chosen arm). Minor — only one clone per path conversion.","fix":"Refactor so `path` is moved into the chosen arm instead of cloned (e.g. compute an arm-selector first, then a single `match` that moves `path`).","locations":[{"ref":"crates/usvg/src/parser/converter.rs:996-1011","code":"  996 |     match (raw_paint_order.order, marker) {\n  997 |         ([PaintOrderKind::Markers, _, _], Some(markers_node)) => {\n  998 |             parent.children.push(Node::Group(Box::new(markers_node)));\n  999 |             parent.children.push(Node::Path(Box::new(path.clone())));\n 1000 |         }\n 1001 |         ([first, PaintOrderKind::Markers, last], Some(markers_node)) => {\n 1002 |             append_single_paint_path(first, &path, parent);\n 1003 |             parent.children.push(Node::Group(Box::new(markers_node)));\n 1004 |             append_single_paint_path(last, &path, parent);\n 1005 |         }\n 1006 |         ([_, _, PaintOrderKind::Markers], Some(markers_node)) => {\n 1007 |             parent.children.push(Node::Path(Box::new(path.clone())));\n 1008 |             parent.children.push(Node::Group(Box::new(markers_node)));\n 1009 |         }\n 1010 |         _ => parent.children.push(Node::Path(Box::new(path.clone()))),\n 1011 |     }"}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"negligible","description":"`write_span` builds `decorations: Vec<_>` (line 763-772) by collecting filtered tuples just to count and re-iterate. The collection allocates; only the count is actually needed for the matching `end_element` calls.","fix":"Track the count while opening decoration tspans and use it directly for the end_element loop; no Vec needed.","locations":[{"ref":"crates/usvg/src/writer.rs:762-790","code":"  762 |                     for span in &chunk.spans {\n  763 |                         let decorations: Vec<_> = [\n  764 |                             (\"underline\", &span.decoration.underline),\n  765 |                             (\"line-through\", &span.decoration.line_through),\n  766 |                             (\"overline\", &span.decoration.overline),\n  767 |                         ]\n  768 |                         .iter()\n  769 |                         .filter_map(|&(key, option_value)| {\n  770 |                             option_value.as_ref().map(|value| (key, value))\n  771 |                         })\n  772 |                         .collect();\n  773 | \n  774 |                         // Decorations need to be dumped BEFORE we write the actual span data\n  775 |                         // (so that for example stroke color of span doesn't affect the text\n  776 |                         // itself while baseline shifts need to be written after (since they are\n  777 |                         // affected by the font size)\n  778 |                         for (deco_name, deco) in &decorations {\n  779 |                             xml.start_svg_element(EId::Tspan);\n  780 |                             xml.write_svg_attribute(AId::TextDecoration, deco_name);\n  781 |                             write_fill(&deco.fill, false, opt, xml);\n  782 |                             write_stroke(&deco.stroke, opt, xml);\n  783 |                         }\n  784 | \n  785 |                         write_span(is_clip_path, opt, xml, chunk, span);\n  786 | \n  787 |                         // End for each tspan we needed to create for decorations\n  788 |                         for _ in &decorations {\n  789 |                             xml.end_element();\n  790 |                         }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment on `apply_inner` at line 453 says `// TODO: explain` but never gets around to it. The `subregion2` logic for clipping non-Offset results is non-obvious — and the helper that draws four rectangles uses confusing dimensions (e.g., line 482-483 creates a rect with full width/height starting at `subregion2.right()`), which works due to Clear blend mode but is misleading. Lines 471-491 should be documented.","fix":"Replace the `TODO: explain` with an actual comment explaining (a) why feOffset is special-cased, and (b) why the four clearing rects can use the full pixmap width/height rather than computing tight rects.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:453","code":"  453 |             // TODO: explain"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Typo \"is no a\" instead of \"is not a\" in the warning emitted for an invalid clipPath child element.","fix":"Change `\"'{}' is no a valid 'clip-path' child.\"` to `\"'{}' is not a valid 'clip-path' child.\"`.","locations":[{"ref":"crates/usvg/src/parser/converter.rs:711","code":"  711 |             log::warn!(\"'{}' is no a valid 'clip-path' child.\", tag_name);"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Typo \"ulr\" instead of \"url\" in the example SVG output shown in the doc-comment for `clip_element`.","fix":"Change `<g clip-path=\"ulr(#clipPath1)\">` to `<g clip-path=\"url(#clipPath1)\">`.","locations":[{"ref":"crates/usvg/src/parser/use_node.rs:236","code":"  236 |     // <g clip-path=\"ulr(#clipPath1)\">"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In `convolve_matrix.rs:109`, the comment reads `// Do not use mem::swap because data referenced via FFI.` The same comment exists in `morphology.rs:71`. Neither file actually uses FFI; `data` is a Rust `&mut [RGBA8]` slice owned by Rust. The original constraint may have been from a previous API. The comment is stale and misleading.","fix":"Remove or update the misleading comment. If avoiding `mem::swap` is intentional for buffer-ownership reasons, explain the actual reason.","locations":[{"ref":"crates/resvg/src/filter/convolve_matrix.rs:109-110","code":"  109 |     // Do not use `mem::swap` because `data` referenced via FFI.\n  110 |     src.data.copy_from_slice(buf.data);"},{"ref":"crates/resvg/src/filter/morphology.rs:71-72","code":"   71 |     // Do not use `mem::swap` because `data` referenced via FFI.\n   72 |     src.data.copy_from_slice(buf.data);"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment in `iir_blur.rs` reads `// TODO: Blurs right and bottom sides twice for some reason.` (line 26). This is a multi-year-old TODO that suggests a known correctness defect in the algorithm but has never been addressed or removed. Either the bug exists and should be fixed, or the comment is stale.","fix":"Investigate the right/bottom double-blur claim. If still a bug, fix the algorithm so each side is only filtered once. If not actually a bug, remove the comment.","locations":[{"ref":"crates/resvg/src/filter/iir_blur.rs:26","code":"   26 | // TODO: Blurs right and bottom sides twice for some reason."}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment in `collect_normals` (writer accuracy comment) reads 'we have to increase out accuracy accordingly' — typo 'out' should be 'our'.","fix":"Fix typo: 'out accuracy' → 'our accuracy'.","locations":[{"ref":"crates/usvg/src/text/layout.rs:808-810","code":"  808 |             // Accuracy depends on a current scale.\n  809 |             // When we have a tiny path scaled by a large value,\n  810 |             // we have to increase out accuracy accordingly."}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment in `apply_letter_spacing` says 'A space after the last cluster should be ignored, since it affects the bbox and text alignment.' but the implementation skips applying letter-spacing to the last cluster regardless of whether it's whitespace. The implementation is more conservative than the comment describes.","fix":"Either update the comment to match the actual behavior ('we never add spacing past the last cluster of the chunk'), or only skip when the last cluster is whitespace.","locations":[{"ref":"crates/usvg/src/text/layout.rs:1099-1103","code":" 1099 |                 // A space after the last cluster should be ignored,\n 1100 |                 // since it affects the bbox and text alignment.\n 1101 |                 if i != num_clusters - 1 {\n 1102 |                     cluster.advance += span.letter_spacing;\n 1103 |                 }"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment at writer.rs:1421 says 'Round numbers up to the specified precision' — the operation is actually round-to-nearest (`.round()`), not round-up (ceiling).","fix":"Change 'Round numbers up' to 'Round numbers to' to match `f32::round`'s actual half-away-from-zero behavior.","locations":[{"ref":"crates/usvg/src/writer.rs:1421-1423","code":" 1421 |     // Round numbers up to the specified precision to prevent writing\n 1422 |     // ugly numbers like 29.999999999999996.\n 1423 |     // It's not 100% correct, but differences are insignificant."}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"`for _ in 0..(offsets.len() - normals.len())` will underflow when `normals.len() > offsets.len()`. This can happen because of the bug above (some clusters can have a None inserted AND a Some matched). In debug builds this panics with 'attempt to subtract with overflow'; in release it wraps to a huge `usize` value which causes the loop to attempt to push billions of `None` and OOM.","fix":"Use `offsets.len().saturating_sub(normals.len())`. Also fix the upstream invariant (see related finding).","locations":[{"ref":"crates/usvg/src/text/layout.rs:848","code":"  848 |     for _ in 0..(offsets.len() - normals.len()) {"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"`subscript_offset`/`superscript_offset` are computed as `(units_per_em / 0.2).round() as i16` and `(units_per_em / 0.4).round() as i16`. The comment says '0.2 and 0.4 are generic offsets' which suggests the intended math is MULTIPLICATION by 0.2 / 0.4 (i.e., 20% / 40% of em), not division. For typical fonts with units_per_em = 2048 the current code yields 10240 / 5120 (a 5× / 2.5× em shift!), which is wildly larger than any reasonable sub/superscript offset. For units_per_em up to 16384 (legal per OpenType) the result exceeds i16::MAX and the saturating `as i16` cast silently truncates to 32767. The dividend-vs-multiplier inversion is a strong sign the operator is wrong.","fix":"Replace `(units_per_em.get() as f32 / 0.2).round() as i16` with `(units_per_em.get() as f32 * 0.2).round() as i16`, and likewise `* 0.4` for the superscript offset. (Optionally use saturating casts.)","locations":[{"ref":"crates/usvg/src/text/layout.rs:1256-1258","code":" 1256 |             // 0.2 and 0.4 are generic offsets used by some applications (Inkscape/librsvg).\n 1257 |             let mut subscript_offset = (units_per_em.get() as f32 / 0.2).round() as i16;\n 1258 |             let mut superscript_offset = (units_per_em.get() as f32 / 0.4).round() as i16;"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`ConvolveMatrixData::new` validates with `(columns * rows) as usize != data.len()`. The multiplication `columns * rows` is `u32 * u32` and silently wraps on overflow (release mode), producing a 'valid' small number that may coincidentally match `data.len()` and bypass validation. The subsequent `get(x, y)` then uses `y * self.columns + x`, which can also overflow u32 with large but valid columns/rows.","fix":"Use checked arithmetic / promote to usize first: `(columns as usize).checked_mul(rows as usize).map_or(true, |n| n != data.len())`. In `get`, also use `(y as usize) * (self.columns as usize) + (x as usize)`.","locations":[{"ref":"crates/usvg/src/tree/filter.rs:458","code":"  458 |         if (columns * rows) as usize != data.len() || target_x >= columns || target_y >= rows {"},{"ref":"crates/usvg/src/tree/filter.rs:476-478","code":"  476 |     pub fn get(&self, x: u32, y: u32) -> f32 {\n  477 |         self.data[(y * self.columns + x) as usize]\n  478 |     }"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`box_blur::create_box_gauss` doesn't bound `sigma` from above. With a pathological transform leading to extremely large sigma, `w_ideal.floor() as i32` saturates to `i32::MAX`. Then `wu = wl + 2` overflows i32 in debug mode (panics) or wraps in release. Subsequently `((box_size - 1) / 2) as usize` would be huge or negative, leading to potential OOM in the back-buffer allocation.","fix":"Clamp sigma to a reasonable upper bound (e.g., a few thousand) before the calculation, or saturate the resulting box widths to a sane maximum. Note that the upstream `resolve_std_dev` already disables blur for very small sigmas but does not bound from above.","locations":[{"ref":"crates/resvg/src/filter/box_blur.rs:37-71","code":"   37 | fn create_box_gauss(sigma: f32) -> [i32; STEPS] {\n   38 |     if sigma > 0.0 {\n   39 |         let n_float = STEPS as f32;\n   40 | \n   41 |         // Ideal averaging filter width\n   42 |         let w_ideal = (12.0 * sigma * sigma / n_float).sqrt() + 1.0;\n   43 |         let mut wl = w_ideal.floor() as i32;\n   44 |         if wl % 2 == 0 {\n   45 |             wl -= 1;\n   46 |         }\n   47 | \n   48 |         let wu = wl + 2;\n   49 | \n   50 |         let wl_float = wl as f32;\n   51 |         let m_ideal = (12.0 * sigma * sigma\n   52 |             - n_float * wl_float * wl_float\n   53 |             - 4.0 * n_float * wl_float\n   54 |             - 3.0 * n_float)\n   55 |             / (-4.0 * wl_float - 4.0);\n   56 |         let m = m_ideal.round() as usize;\n   57 | \n   58 |         let mut sizes = [0; STEPS];\n   59 |         for i in 0..STEPS {\n   60 |             if i < m {\n   61 |                 sizes[i] = wl;\n   62 |             } else {\n   63 |                 sizes[i] = wu;\n   64 |             }\n   65 |         }\n   66 | \n   67 |         sizes\n   68 |     } else {\n   69 |         [1; STEPS]\n   70 |     }\n   71 | }"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`iir_blur::apply` computes `(src.width * src.height) as usize` to size its backing buffer. For very large pixmaps (over u32::MAX total pixels), this multiplication can overflow before the cast. The cast then yields a wrong (small) buffer size while the data slice has the correct length, leading to indexing past the buffer end inside `gaussianiir2d`.","fix":"Promote to wider arithmetic first: `let buf_size = src.width as usize * src.height as usize;`. (usize is at least 32-bit and typically 64-bit on supported targets, so the multiplication won't overflow for realistic sizes.)","locations":[{"ref":"crates/resvg/src/filter/iir_blur.rs:49","code":"   49 |     let buf_size = (src.width * src.height) as usize;"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`resolve_font_weight` computes `weight - step` on `usize` (e.g. `weight=100, step=200` ⇒ underflow). The final `bound(100, …, 900)` clamps the result back to the valid range, but in debug builds the underflow itself panics before reaching `bound`. The code only \"works\" by relying on release-mode wrapping; this is fragile and would break under `overflow-checks=true`.","fix":"Use signed math (`(weight as i32 - step as i32).max(100).min(900) as usize`) or `weight.saturating_sub(step)` before passing into `bound`.","locations":[{"ref":"crates/usvg/src/parser/text.rs:586-625","code":"  586 |     fn bound(min: usize, val: usize, max: usize) -> usize {\n  587 |         std::cmp::max(min, std::cmp::min(max, val))\n  588 |     }\n  589 | \n  590 |     let nodes: Vec<_> = node.ancestors().collect();\n  591 |     let mut weight = 400;\n  592 |     for n in nodes.iter().rev().skip(1) {\n  593 |         // skip Root\n  594 |         weight = match n.attribute(AId::FontWeight).unwrap_or(\"\") {\n  595 |             \"normal\" => 400,\n  596 |             \"bold\" => 700,\n  597 |             \"100\" => 100,\n  598 |             \"200\" => 200,\n  599 |             \"300\" => 300,\n  600 |             \"400\" => 400,\n  601 |             \"500\" => 500,\n  602 |             \"600\" => 600,\n  603 |             \"700\" => 700,\n  604 |             \"800\" => 800,\n  605 |             \"900\" => 900,\n  606 |             \"bolder\" => {\n  607 |                 // By the CSS2 spec the default value should be 400\n  608 |                 // so `bolder` will result in 500.\n  609 |                 // But Chrome and Inkscape will give us 700.\n  610 |                 // Have no idea is it a bug or something, but\n  611 |                 // we will follow such behavior for now.\n  612 |                 let step = if weight == 400 { 300 } else { 100 };\n  613 | \n  614 |                 bound(100, weight + step, 900)\n  615 |             }\n  616 |             \"lighter\" => {\n  617 |                 // By the CSS2 spec the default value should be 400\n  618 |                 // so `lighter` will result in 300.\n  619 |                 // But Chrome and Inkscape will give us 200.\n  620 |                 // Have no idea is it a bug or something, but\n  621 |                 // we will follow such behavior for now.\n  622 |                 let step = if weight == 400 { 200 } else { 100 };\n  623 | \n  624 |                 bound(100, weight - step, 900)\n  625 |             }"}]}]</script>

  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
