<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"In `transform_light_source` for `SpotLight`, the y-coordinate is being computed by subtracting `region.x()` instead of `region.y()`. This applies to both `light.y` and `light.points_at_y`. The result is that spot light coordinates are translated incorrectly along the y axis, producing wrong lighting whenever the filter region does not start at x==y, leading to mis-rendered specular/diffuse spotlight effects.","fix":"Replace `region.x()` with `region.y()` on both line 1079 (`light.y = point.y - region.y() as f32;`) and line 1085 (`light.points_at_y = point.y - region.y() as f32;`). Compare with the PointLight branch (line 1070) which uses `region.y()` correctly.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:1078-1085","code":" 1078 |             light.x = point.x - region.x() as f32;\n 1079 |             light.y = point.y - region.x() as f32;\n 1080 |             light.z *= sz;\n 1081 | \n 1082 |             let mut point = tiny_skia::Point::from_xy(light.points_at_x, light.points_at_y);\n 1083 |             ts.map_point(&mut point);\n 1084 |             light.points_at_x = point.x - region.x() as f32;\n 1085 |             light.points_at_y = point.y - region.x() as f32;"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"When a `use` element references a `symbol` and a viewport clip rect is required, `is_context_element = true` is incorrectly set on the outer clip-wrapper group `g` instead of the inner use group `g2`. Compare with the non-clipped branch at lines 122-126 where `g.is_context_element = true` is set on the use group itself. Because of this asymmetry, context paint resolution (e.g. for `context-fill`/`context-stroke` inside the symbol) will look at the clip wrapper's bbox/transform rather than the use group's, producing incorrect paints whenever a viewport clip is applied to a `<use>` referencing a `<symbol>`.","fix":"Replace `g.is_context_element = true;` at line 98 with `g2.is_context_element = true;` so the inner use group is flagged, matching the symmetric non-clipped branch at line 123.","locations":[{"ref":"crates/usvg/src/parser/use_node.rs:86-110","code":"   86 |         if let Some(clip_rect) = get_clip_rect(node, child, &use_state) {\n   87 |             let mut g = clip_element(node, clip_rect, orig_ts, &use_state, cache);\n   88 |             g.abs_transform = parent.abs_transform;\n   89 | \n   90 |             // Make group for `use`.\n   91 |             if let Some(mut g2) =\n   92 |                 converter::convert_group(node, &use_state, true, cache, &mut g, &|cache, g2| {\n   93 |                     convert_children(child, new_ts, &use_state, cache, false, g2);\n   94 |                 })\n   95 |             {\n   96 |                 // We must reset transform, because it was already set\n   97 |                 // to the group with clip-path.\n   98 |                 g.is_context_element = true;\n   99 |                 g2.id = String::new(); // Prevent ID duplication.\n  100 |                 g2.transform = Transform::default();\n  101 |                 g.children.push(Node::Group(Box::new(g2)));\n  102 |             }\n  103 | \n  104 |             if g.children.is_empty() {\n  105 |                 return;\n  106 |             }\n  107 | \n  108 |             g.calculate_bounding_boxes();\n  109 |             parent.children.push(Node::Group(Box::new(g)));\n  110 |             return;"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"In `default_fallback_selector`, when picking a display family name for the fallback face, the `unwrap_or` fallback uses `&base_face.families[0]` instead of `&face.families[0]`. This means the warn message can report the base face's family name as the new fallback family. Classic copy-paste error from the block immediately above (lines 171-175).","fix":"Change `.unwrap_or(&base_face.families[0])` in the `new_family` block to `.unwrap_or(&face.families[0])`.","locations":[{"ref":"crates/usvg/src/text/mod.rs:177-181","code":"  177 |                 let new_family = face\n  178 |                     .families\n  179 |                     .iter()\n  180 |                     .find(|f| f.1 == fontdb::Language::English_UnitedStates)\n  181 |                     .unwrap_or(&base_face.families[0]);"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In `apply_drop_shadow`, after replacing `shadow_pixmap` channels with the user-specified `fe.color()` (which is in sRGB), the code applies a color-space conversion based on `cs`. However, the SRGB branch calls `shadow_pixmap.into_srgb()`, which actually converts data from LinearRGB into sRGB (the function is named for the target color space). Since the data is already in sRGB at this point, this incorrectly applies a linear-to-sRGB transform to sRGB values, producing visibly wrong (over-saturated/over-bright) drop shadow colors whenever the filter's color-interpolation-filters is sRGB.","fix":"When cs == SRGB the shadow_pixmap is already in sRGB and no conversion is needed. When cs == LinearRGB, calling `into_linear_rgb()` (sRGB -> linear) is correct. Replace the match with: `if cs == usvg::filter::ColorInterpolation::LinearRGB { shadow_pixmap.into_linear_rgb(); }` (no action for SRGB).","locations":[{"ref":"crates/resvg/src/filter/mod.rs:612-615","code":"  612 |     match cs {\n  613 |         usvg::filter::ColorInterpolation::SRGB => shadow_pixmap.into_srgb(),\n  614 |         usvg::filter::ColorInterpolation::LinearRGB => shadow_pixmap.into_linear_rgb(),\n  615 |     }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In `morphology::apply`, the kernel size is computed as `min(rx.ceil()*2, src.width)` instead of `min(rx.ceil()*2 + 1, src.width)`. The SVG spec requires the morphology kernel to be `(2*radiusX+1) x (2*radiusY+1)` (a symmetric kernel centered on the pixel). For example, with rx=1 the kernel should be 3 pixels wide, but the current code only iterates 2 columns, dropping the right-most neighbor and producing asymmetric, biased dilation/erosion.","fix":"Change to `let columns = std::cmp::min(rx.ceil() as u32 * 2 + 1, src.width);` and `let rows = std::cmp::min(ry.ceil() as u32 * 2 + 1, src.height);` so the kernel is symmetric per the SVG spec.","locations":[{"ref":"crates/resvg/src/filter/morphology.rs:17-18","code":"   17 |     let columns = std::cmp::min(rx.ceil() as u32 * 2, src.width);\n   18 |     let rows = std::cmp::min(ry.ceil() as u32 * 2, src.height);"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The gradient-stop \"shift equal offsets\" pass writes `offset1` (the previous offset) into `stops[i].offset` instead of preserving the original `offset2`. When applied repeatedly across runs of identical offsets, each iteration overwrites the previously-decremented stop with `offset1 - f32::EPSILON`, so for a 3-stop run `[0.5,0.5,0.5]` the result is `[0.5-EPS, 0.5-EPS, 0.5]` — two stops with identical sub-epsilon offsets, defeating the deduplication. The docstring example (lines 374-384) only shows the 2-stop case where this happens to work.","fix":"Rewrite the pass to be monotonic: track a `running_prev`, and for each i set `stops[i].offset = stops[i].offset.get().max(running_prev + EPSILON)` (with appropriate clamping). Alternatively, process the whole `stops` slice in a single pass that handles arbitrary-length runs of equal offsets.","locations":[{"ref":"crates/usvg/src/parser/paint_server.rs:385-401","code":"  385 |     {\n  386 |         let mut i = 1;\n  387 |         while i < stops.len() {\n  388 |             let offset1 = stops[i - 1].offset.get();\n  389 |             let offset2 = stops[i - 0].offset.get();\n  390 | \n  391 |             // Next offset must be smaller then previous.\n  392 |             if offset1 > offset2 || offset1.approx_eq_ulps(&offset2, 4) {\n  393 |                 // Make previous offset a bit smaller.\n  394 |                 let new_offset = offset1 - f32::EPSILON;\n  395 |                 stops[i - 1].offset = StopOffset::new_clamped(new_offset);\n  396 |                 stops[i - 0].offset = StopOffset::new_clamped(offset1);\n  397 |             }\n  398 | \n  399 |             i += 1;\n  400 |         }\n  401 |     }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In `collect_normals`, when a cluster offset is negative (cluster outside the start of the path), `normals.push(None)` is executed but the code does NOT `continue` — it still pushes the offset to `offsets`. Then later in the segment loop, the same offset can match `>= length && <= length + curve_len` and a Some normal is pushed for that slot, leaving `normals.len() > offsets.len()` and producing duplicate/misaligned normals. The final fix-up loop `for _ in 0..(offsets.len() - normals.len())` then subtracts a larger from a smaller usize and panics in debug builds (underflow).","fix":"When pushing `None` for a negative offset, also `continue` so we don't append to `offsets`. Alternatively, store offsets as `Vec<Option<f64>>` and skip None entries when matching against the curve. Also use `saturating_sub` in the final fill loop.","locations":[{"ref":"crates/usvg/src/text/layout.rs:744-753","code":"  744 |             let offset = advance + half_width;\n  745 | \n  746 |             // Clusters outside the path have no normals.\n  747 |             if offset < 0.0 {\n  748 |                 normals.push(None);\n  749 |             }\n  750 | \n  751 |             offsets.push(offset as f64);\n  752 |             advance += cluster.advance;\n  753 |         }"},{"ref":"crates/usvg/src/text/layout.rs:818-840","code":"  818 |         for offset in &offsets[normals.len()..] {\n  819 |             if *offset >= length && *offset <= length + curve_len {\n  820 |                 let mut offset = curve.inv_arclen(offset - length, arclen_accuracy as f64);\n  821 |                 // some rounding error may occur, so we give offset a little tolerance\n  822 |                 debug_assert!((-1.0e-3..=1.0 + 1.0e-3).contains(&offset));\n  823 |                 offset = offset.clamp(0.0, 1.0);\n  824 | \n  825 |                 let pos = curve.eval(offset);\n  826 |                 let d = curve.deriv().eval(offset);\n  827 |                 let d = kurbo::Vec2::new(-d.y, d.x); // tangent\n  828 |                 let angle = d.atan2().to_degrees() - 90.0;\n  829 | \n  830 |                 normals.push(Some(PathNormal {\n  831 |                     x: pos.x as f32,\n  832 |                     y: pos.y as f32,\n  833 |                     angle: angle as f32,\n  834 |                 }));\n  835 | \n  836 |                 if normals.len() == offsets.len() {\n  837 |                     break;\n  838 |                 }\n  839 |             }\n  840 |         }"},{"ref":"crates/usvg/src/text/layout.rs:847-850","code":"  847 |     // If path ended and we still have unresolved normals - set them to `None`.\n  848 |     for _ in 0..(offsets.len() - normals.len()) {\n  849 |         normals.push(None);\n  850 |     }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`apply_length_adjust` for `LengthAdjust::SpacingAndGlyphs` computes `let factor = target_width / width;` and then checks `if factor < 0.001 { continue; }`. The comment says 'Prevent multiplying by zero' but the actual hazard is dividing by zero (`width == 0.0` produces +Inf or NaN). When width==0 and target_width>0, factor is +Inf which is NOT < 0.001, so the bad value is used in `pre_scale(factor, 1.0)` corrupting the transform. The check also doesn't catch negative factor (if target_width is negative).","fix":"Guard on `width`: `if !width.is_finite() || width.approx_zero_ulps(4) { continue; }` before computing factor, then also bail if `!factor.is_finite() || factor <= 0.0`.","locations":[{"ref":"crates/usvg/src/text/layout.rs:1021-1026","code":" 1021 |         } else {\n 1022 |             let factor = target_width / width;\n 1023 |             // Prevent multiplying by zero.\n 1024 |             if factor < 0.001 {\n 1025 |                 continue;\n 1026 |             }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In `default_fallback_selector`, the style/weight/stretch filter uses `&&` (AND) where the intent is OR. As written, a candidate face is skipped only when ALL THREE of style, weight, and stretch differ from the base face. If even one matches (e.g. same weight 400), the face is accepted regardless of how different style/stretch are. The comment immediately above says 'Check that the new face has the same style.' — i.e., reject candidates that differ in any of these attributes.","fix":"Change `&&` to `||` so the skip-candidate test is `if base_face.style != face.style || base_face.weight != face.weight || base_face.stretch != face.stretch { continue; }`.","locations":[{"ref":"crates/usvg/src/text/mod.rs:160-165","code":"  160 |                 if base_face.style != face.style\n  161 |                     && base_face.weight != face.weight\n  162 |                     && base_face.stretch != face.stretch\n  163 |                 {\n  164 |                     continue;\n  165 |                 }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`write_span`'s text escaping does `cur_text.replace('&', \"&amp;\")` but does NOT escape `<` or `>`. Any text content containing `<` or `>` produces invalid/ill-formed XML output. Even though many SVG renderers might tolerate it, the output is no longer well-formed XML and breaks round-tripping any SVG whose text has `<` in it (legitimate via `&lt;` in source).","fix":"Add `<` → `&lt;` and `>` → `&gt;` escaping, e.g. `cur_text.replace('&', \"&amp;\").replace('<', \"&lt;\").replace('>', \"&gt;\")`.","locations":[{"ref":"crates/usvg/src/writer.rs:1583","code":" 1583 |     xml.write_text(&cur_text.replace('&', \"&amp;\"));"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `convolve_matrix::apply`, the per-channel output formula uses `bias * new_a` instead of `bias`. For `preserve_alpha=true`, the result becomes `(unpremul_sum/divisor + bias*alpha) * alpha = unpremul*alpha + bias*alpha^2`, but the correct premultiplied result with bias added before premultiplication should be `(unpremul_sum/divisor + bias) * alpha`. The `bias` constant is effectively scaled by alpha^2 instead of alpha, producing darker bias contributions in semi-transparent regions.","fix":"Compute the unpremul result first (`x = new_r / divisor + bias`), bound to [0,1], then multiply by alpha when preserve_alpha is true. For `preserve_alpha=false`, bias should be added without the alpha multiplication. The current intertwined formula should be split per case.","locations":[{"ref":"crates/resvg/src/filter/convolve_matrix.rs:79-91","code":"   79 |             new_a = new_a / matrix.divisor().get() + matrix.bias();\n   80 |         }\n   81 | \n   82 |         let bounded_new_a = f32_bound(0.0, new_a, 1.0);\n   83 | \n   84 |         let calc = |x| {\n   85 |             let x = x / matrix.divisor().get() + matrix.bias() * new_a;\n   86 | \n   87 |             let x = if matrix.preserve_alpha() {\n   88 |                 f32_bound(0.0, x, 1.0) * bounded_new_a\n   89 |             } else {\n   90 |                 f32_bound(0.0, x, bounded_new_a)\n   91 |             };"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`apply_morphology` returns early with `pixmap.clear()` whenever EITHER `rx <= 0.0` OR `ry <= 0.0`. Per the SVG spec, only when BOTH radii are zero should the primitive be a no-op (return input). When one radius is positive and the other is zero, the kernel becomes a 1D morphology along the non-zero axis. The current behavior wipes the result to transparent, which is incorrect for axis-aligned morphology.","fix":"Only clear when both `rx <= 0.0 && ry <= 0.0`. Otherwise, call `morphology::apply` with the actual radii (which will need to handle a 0 radius in one dimension gracefully, by collapsing the kernel along that axis).","locations":[{"ref":"crates/resvg/src/filter/mod.rs:941-944","code":"  941 |     if !(rx > 0.0 && ry > 0.0) {\n  942 |         pixmap.clear();\n  943 |         return Ok(Image::from_image(pixmap, cs));\n  944 |     }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`<line>` is intentionally permitted inside `<clipPath>` (the dispatcher calls `is_graphic()` which includes Line, and the comment at converter.rs:653-655 explicitly says \"line doesn't impact rendering because stroke is always disabled\"). However, `convert_clip_path_elements_impl` does not list `EId::Line` in its match arms, so a `<line>` falls into the `_ => log::warn!(\"'{}' is no a valid 'clip-path' child.\", …)` branch and is silently dropped with a misleading warning.","fix":"Add `EId::Line => {}` (a deliberate no-op) to the match arm, or filter `EId::Line` out earlier in `convert_clip_path_elements` so it never reaches the warning path.","locations":[{"ref":"crates/usvg/src/parser/converter.rs:653-714","code":"  653 | //\n  654 | // `line` doesn't impact rendering because stroke is always disabled\n  655 | // for `clipPath` children.\n  656 | #[inline(never)]\n  657 | pub(crate) fn convert_clip_path_elements(\n  658 |     clip_node: SvgNode,\n  659 |     state: &State,\n  660 |     cache: &mut Cache,\n  661 |     parent: &mut Group,\n  662 | ) {\n  663 |     for node in clip_node.children() {\n  664 |         let tag_name = match node.tag_name() {\n  665 |             Some(v) => v,\n  666 |             None => continue,\n  667 |         };\n  668 | \n  669 |         if !tag_name.is_graphic() {\n  670 |             continue;\n  671 |         }\n  672 | \n  673 |         if !node.is_visible_element(state.opt) {\n  674 |             continue;\n  675 |         }\n  676 | \n  677 |         if tag_name == EId::Use {\n  678 |             super::use_node::convert(node, state, cache, parent);\n  679 |             continue;\n  680 |         }\n  681 | \n  682 |         if let Some(g) = convert_group(node, state, false, cache, parent, &|cache, g| {\n  683 |             convert_clip_path_elements_impl(tag_name, node, state, cache, g);\n  684 |         }) {\n  685 |             parent.children.push(Node::Group(Box::new(g)));\n  686 |         }\n  687 |     }\n  688 | }\n  689 | \n  690 | #[inline(never)]\n  691 | fn convert_clip_path_elements_impl(\n  692 |     tag_name: EId,\n  693 |     node: SvgNode,\n  694 |     state: &State,\n  695 |     cache: &mut Cache,\n  696 |     parent: &mut Group,\n  697 | ) {\n  698 |     match tag_name {\n  699 |         EId::Rect | EId::Circle | EId::Ellipse | EId::Polyline | EId::Polygon | EId::Path => {\n  700 |             if let Some(path) = super::shapes::convert(node, state) {\n  701 |                 convert_path(node, path, state, cache, parent);\n  702 |             }\n  703 |         }\n  704 |         EId::Text => {\n  705 |             #[cfg(feature = \"text\")]\n  706 |             {\n  707 |                 super::text::convert(node, state, cache, parent);\n  708 |             }\n  709 |         }\n  710 |         _ => {\n  711 |             log::warn!(\"'{}' is no a valid 'clip-path' child.\", tag_name);\n  712 |         }\n  713 |     }\n  714 | }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`collect_children` for filter primitives uses `None => break` when `resolve_primitive_region` returns `None` — this aborts the entire primitive list on the first primitive with a missing/invalid region, even though later primitives might be valid. Effectively, one bad `<feFoo x=\"…\">` silently truncates the filter chain instead of skipping just that primitive.","fix":"Change `None => break` to `None => continue` (and consider logging a warning), or move the `tag_name` whitelist check before `resolve_primitive_region` so non-fe elements don't try to resolve a region in the first place.","locations":[{"ref":"crates/usvg/src/parser/filter.rs:324-334","code":"  324 |         let filter_subregion = match resolve_primitive_region(\n  325 |             child,\n  326 |             tag_name,\n  327 |             units,\n  328 |             state,\n  329 |             object_bbox,\n  330 |             filter_region,\n  331 |         ) {\n  332 |             Some(v) => v,\n  333 |             None => break,\n  334 |         };"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"When an `feImage` resolves to an SVG node (the `if let Some(node) = fe.try_attribute::<SvgNode>(AId::Href)` branch), the id of the resolved element is hoisted from `root.children.first_mut()` to the wrapping group `root`, but only if that first child is a `Node::Group`. If the wrapping `convert_element` collapses the element into `Node::Path`, `Node::Image`, or `Node::Text`, the id is dropped silently — breaking subsequent `url(#…)` references to that element. The comment around line 838 suggests the id should always be transferred.","fix":"Handle all four `Node` variants when transferring the id (or, equivalently, transfer the id from whichever first child exists), not only `Node::Group`.","locations":[{"ref":"crates/usvg/src/parser/filter.rs:836-854","code":"  836 |         return if root.has_children() {\n  837 |             root.calculate_bounding_boxes();\n  838 |             // Transfer node id from group's child to the group itself if needed.\n  839 |             if let Some(Node::Group(g)) = root.children.first_mut() {\n  840 |                 if let Some(child2) = g.children.first_mut() {\n  841 |                     g.id = child2.id().to_string();\n  842 |                     match child2 {\n  843 |                         Node::Group(g2) => g2.id.clear(),\n  844 |                         Node::Path(path) => path.id.clear(),\n  845 |                         Node::Image(image) => image.id.clear(),\n  846 |                         Node::Text(text) => text.id.clear(),\n  847 |                     }\n  848 |                 }\n  849 |             }\n  850 | \n  851 |             Some(Kind::Image(Image { root }))\n  852 |         } else {\n  853 |             None\n  854 |         };"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`font-variation-settings` tag-length validation uses `tag_str.len() != 4`, which is the BYTE length but the comment says \"must be 4 characters\". A tag like `\"äë\"` (2 chars / 4 bytes) passes the check, then `tag_bytes[0..4]` is interpreted as an OpenType tag and produces non-ASCII garbage. OpenType tags must be 4 ASCII bytes.","fix":"Validate via `tag_str.len() == 4 && tag_str.is_ascii()` (or equivalently `tag_str.chars().count() == 4 && tag_str.is_ascii()`) so non-ASCII tags are rejected.","locations":[{"ref":"crates/usvg/src/parser/text.rs:531-560","code":"  531 |         // Tag must be exactly 4 characters\n  532 |         if tag_str.len() != 4 {\n  533 |             log::warn!(\n  534 |                 \"Invalid font-variation-settings tag: '{}' (must be 4 characters)\",\n  535 |                 tag_str\n  536 |             );\n  537 |             continue;\n  538 |         }\n  539 | \n  540 |         // Skip whitespace before value\n  541 |         while chars.peek().map_or(false, |c| c.is_whitespace()) {\n  542 |             chars.next();\n  543 |         }\n  544 | \n  545 |         // Parse the numeric value\n  546 |         let value_str: String = chars.collect();\n  547 |         let value_str = value_str.trim();\n  548 | \n  549 |         let value = match value_str.parse::<f32>() {\n  550 |             Ok(v) => v,\n  551 |             Err(_) => {\n  552 |                 log::warn!(\"Invalid font-variation-settings value: '{}'\", value_str);\n  553 |                 continue;\n  554 |             }\n  555 |         };\n  556 | \n  557 |         let tag_bytes = tag_str.as_bytes();\n  558 |         let tag = [tag_bytes[0], tag_bytes[1], tag_bytes[2], tag_bytes[3]];\n  559 | \n  560 |         variations.push(FontVariation::new(tag, value));"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The private `has_text_nodes` helper does NOT recurse into Group children. It only checks direct children of the passed-in Group plus subroots (clip-paths, masks, filter feImage). Any text wrapped in a Group (the typical case for non-trivial SVGs) is missed. The public `Tree::has_text_nodes` API claims to check the entire tree.","fix":"Recurse into Node::Group children: add `if let Node::Group(g) = node { if has_text_nodes(g) { return true; } }` before the subroots check.","locations":[{"ref":"crates/usvg/src/tree/mod.rs:1720-1744","code":" 1720 | fn has_text_nodes(root: &Group) -> bool {\n 1721 |     for node in &root.children {\n 1722 |         if let Node::Text(_) = node {\n 1723 |             return true;\n 1724 |         }\n 1725 | \n 1726 |         let mut has_text = false;\n 1727 | \n 1728 |         if let Node::Image(image) = node {\n 1729 |             if let ImageKind::SVG(tree) = &image.kind {\n 1730 |                 if has_text_nodes(&tree.root) {\n 1731 |                     has_text = true;\n 1732 |                 }\n 1733 |             }\n 1734 |         }\n 1735 | \n 1736 |         node.subroots(|subroot| has_text |= has_text_nodes(subroot));\n 1737 | \n 1738 |         if has_text {\n 1739 |             return true;\n 1740 |         }\n 1741 |     }\n 1742 | \n 1743 |     false\n 1744 | }"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`collect_clip_paths` and `collect_masks` only inspect one level of nested clip-path / mask references (parent.clip_path and parent.clip_path.clip_path). The data model permits arbitrary recursion via `ClipPath::clip_path: Option<Arc<ClipPath>>` and `Mask::mask: Option<Arc<Mask>>`. A clip-path chained three or more levels deep will not be collected, causing missing defs in serialization.","fix":"Walk the entire chain: `let mut cur = Some(clip); while let Some(c) = cur { if !clip_paths.iter().any(|other| Arc::ptr_eq(c, other)) { clip_paths.push(c.clone()); } cur = c.clip_path.as_ref(); }`. Same pattern for masks.","locations":[{"ref":"crates/usvg/src/tree/mod.rs:1770-1816","code":" 1770 |     pub(crate) fn collect_clip_paths(&self, clip_paths: &mut Vec<Arc<ClipPath>>) {\n 1771 |         for node in self.children() {\n 1772 |             if let Node::Group(g) = node {\n 1773 |                 if let Some(clip) = &g.clip_path {\n 1774 |                     if !clip_paths.iter().any(|other| Arc::ptr_eq(clip, other)) {\n 1775 |                         clip_paths.push(clip.clone());\n 1776 |                     }\n 1777 | \n 1778 |                     if let Some(sub_clip) = &clip.clip_path {\n 1779 |                         if !clip_paths.iter().any(|other| Arc::ptr_eq(sub_clip, other)) {\n 1780 |                             clip_paths.push(sub_clip.clone());\n 1781 |                         }\n 1782 |                     }\n 1783 |                 }\n 1784 |             }\n 1785 | \n 1786 |             node.subroots(|subroot| subroot.collect_clip_paths(clip_paths));\n 1787 | \n 1788 |             if let Node::Group(g) = node {\n 1789 |                 g.collect_clip_paths(clip_paths);\n 1790 |             }\n 1791 |         }\n 1792 |     }\n 1793 | \n 1794 |     pub(crate) fn collect_masks(&self, masks: &mut Vec<Arc<Mask>>) {\n 1795 |         for node in self.children() {\n 1796 |             if let Node::Group(g) = node {\n 1797 |                 if let Some(mask) = &g.mask {\n 1798 |                     if !masks.iter().any(|other| Arc::ptr_eq(mask, other)) {\n 1799 |                         masks.push(mask.clone());\n 1800 |                     }\n 1801 | \n 1802 |                     if let Some(sub_mask) = &mask.mask {\n 1803 |                         if !masks.iter().any(|other| Arc::ptr_eq(sub_mask, other)) {\n 1804 |                             masks.push(sub_mask.clone());\n 1805 |                         }\n 1806 |                     }\n 1807 |                 }\n 1808 |             }\n 1809 | \n 1810 |             node.subroots(|subroot| subroot.collect_masks(masks));\n 1811 | \n 1812 |             if let Node::Group(g) = node {\n 1813 |                 g.collect_masks(masks);\n 1814 |             }\n 1815 |         }\n 1816 |     }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`write_filters` deduplicates already-written `feImage` child nodes by comparing `child.id()` strings. If two feImage children have empty ids (no id was assigned), they will compare equal and only the first is written, dropping the others.","fix":"Skip dedup for empty ids, or dedup by `Arc::ptr_eq` / `Arc::as_ptr` of the underlying Node reference. Even better, ensure feImage children always have unique ids during parsing.","locations":[{"ref":"crates/usvg/src/writer.rs:166-176","code":"  166 | fn write_filters(tree: &Tree, opt: &WriteOptions, xml: &mut XmlWriter) {\n  167 |     let mut written_fe_image_nodes: Vec<String> = Vec::new();\n  168 |     for filter in tree.filters() {\n  169 |         for fe in &filter.primitives {\n  170 |             if let filter::Kind::Image(ref img) = fe.kind {\n  171 |                 if let Some(child) = img.root().children.first() {\n  172 |                     if !written_fe_image_nodes.iter().any(|id| id == child.id()) {\n  173 |                         write_element(child, false, opt, xml);\n  174 |                         written_fe_image_nodes.push(child.id().to_string());\n  175 |                     }\n  176 |                 }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`write_image_data` recursively serializes an embedded SVG with `WriteOptions::default()` instead of inheriting the caller's `opt`. This loses `id_prefix`, `coordinates_precision`, `transforms_precision`, `use_single_quote`, and indentation settings for the nested SVG, producing inconsistent serialization between the outer and inner trees.","fix":"Pass the caller's `opt` down: plumb `opt` into `write_image_data` and use it instead of `WriteOptions::default()` for the nested call.","locations":[{"ref":"crates/usvg/src/writer.rs:1097-1100","code":" 1097 |             ImageKind::SVG(tree) => {\n 1098 |                 svg_string = tree.to_string(&WriteOptions::default());\n 1099 |                 (\"svg+xml\", svg_string.as_bytes())\n 1100 |             }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`write_num` does `write!(buf, \"{}\", num as i32)` when `num.fract().approx_zero_ulps(4)`. For numbers > i32::MAX (~2.1e9) or < i32::MIN, the `as i32` cast saturates silently and writes a wrong value (e.g., a coordinate of 1e10 becomes 2147483647). For NaN/Infinity the fract is also 'approx zero' so they hit the same buggy path and get cast to saturating i32. SVG coordinates can legitimately exceed i32 with low precision.","fix":"Add a range check: `if num.is_finite() && num.fract().approx_zero_ulps(4) && (i32::MIN as f32 ..= i32::MAX as f32).contains(&num) { write!(buf, \"{}\", num as i32).unwrap(); return; }`.","locations":[{"ref":"crates/usvg/src/writer.rs:1414-1418","code":" 1414 | fn write_num(num: f32, buf: &mut Vec<u8>, precision: u8) {\n 1415 |     // If number is an integer, it's faster to write it as i32.\n 1416 |     if num.fract().approx_zero_ulps(4) {\n 1417 |         write!(buf, \"{}\", num as i32).unwrap();\n 1418 |         return;"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`apply_displacement_map` performs a redundant bounds check `if x < w as u32 && y < h as u32 && ox >= 0 && ox < w && oy >= 0 && oy < h`. The `x < w` and `y < h` predicates are always true because `x`,`y` are loop counters incremented up to `src.width`,`src.height` exactly (and `w = src.width as i32`, `h = src.height as i32`). The check should be removed for clarity (or replaced with a `debug_assert!`).","fix":"Drop the `x < w as u32 && y < h as u32 &&` portion of the condition; keep only `ox >= 0 && ox < w && oy >= 0 && oy < h`.","locations":[{"ref":"crates/resvg/src/filter/displacement_map.rs:52","code":"   52 |         if x < w as u32 && y < h as u32 && ox >= 0 && ox < w && oy >= 0 && oy < h {"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`iir_blur::gaussianiir2d` computes `post_scale = ((dnu_x*dnu_y).sqrt() / (lambda_x*lambda_y).sqrt()).powi(2*steps)`. When only one axis is filtered (e.g., sigma_x=0), the unused axis sets `lambda=dnu=1.0`, but the formula then mixes the active axis's parameters with the inactive axis's 1.0 placeholders, which is not equivalent to the correct 1D normalization. The result is subtly wrong brightness for axis-only blurs.","fix":"Compute and apply the per-axis post-scale only when that axis was actually filtered (i.e., inside each conditional block, before the cross-axis multiplication). Or skip post-scaling entirely when one of the sigmas is zero, applying only the active-axis normalization.","locations":[{"ref":"crates/resvg/src/filter/iir_blur.rs:138-140","code":"  138 |     let post_scale =\n  139 |         ((dnu_x * dnu_y).sqrt() / (lambda_x * lambda_y).sqrt()).powi(2 * d.steps as i32);\n  140 |     buf.iter_mut().for_each(|v| *v *= post_scale);"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`demultiply_alpha` divides by `a = p.a / 255.0` without guarding against `p.a == 0`. For a non-zero RGB with zero alpha (which is an invalid premultiplied input but could come from raster image decoders or buggy upstream code), this produces +inf and `(inf + 0.5) as u8` saturates to 255, turning a transparent pixel into a fully opaque white. With well-formed inputs this is benign, but it's a sharp edge.","fix":"Guard against `p.a == 0` and skip (leaving RGB at 0) when alpha is zero: `if p.a == 0 { continue; }` at the top of the loop body.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:139-146","code":"  139 | fn demultiply_alpha(data: &mut [RGBA8]) {\n  140 |     for p in data {\n  141 |         let a = p.a as f32 / 255.0;\n  142 |         p.b = (p.b as f32 / a + 0.5) as u8;\n  143 |         p.g = (p.g as f32 / a + 0.5) as u8;\n  144 |         p.r = (p.r as f32 / a + 0.5) as u8;\n  145 |     }\n  146 | }"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`apply_inner`'s `region` is computed via `filter.rect().transform(ts).map(|r| r.to_int_rect())`. `to_int_rect()` rounds outward to the nearest integer bounds, but coordinates near `f32::MAX` or NaN produce undefined `i32` casts that may saturate to `i32::MIN`/`i32::MAX`. Subsequently `region.translate_to(0, 0)` and arithmetic on `region.width()`/`region.height()` may then overflow.","fix":"After computing `region`, validate that its width/height are sane (e.g., `< some_max_dim`) and return `Error::InvalidRegion` otherwise.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:362-366","code":"  362 |     let region = filter\n  363 |         .rect()\n  364 |         .transform(ts)\n  365 |         .map(|r| r.to_int_rect())\n  366 |         .ok_or(Error::InvalidRegion)?;"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`apply_inner`'s subregion-clip code (lines 471-491) uses `tiny_skia::Rect::from_xywh(subregion2.right() as f32, 0.0, w, h)` to clear the area to the right of `subregion2`. This rect's width `w` is the full pixmap width, so the rect extends from `subregion2.right()` to `subregion2.right() + w`, which is past the right edge. Because the blend mode is `Clear`, this still works (out-of-bounds pixels are ignored), but the code is misleading and likely intended `w - subregion2.right() as f32`.","fix":"Use the correct tight rects: `from_xywh(subregion2.right() as f32, 0.0, w - subregion2.right() as f32, h)` for the right strip, and `from_xywh(0.0, subregion2.bottom() as f32, w, h - subregion2.bottom() as f32)` for the bottom strip.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:474-490","code":"  474 |                 if let Some(rect) = tiny_skia::Rect::from_xywh(0.0, 0.0, w, subregion2.y() as f32) {\n  475 |                     pixmap.fill_rect(rect, &paint, tiny_skia::Transform::identity(), None);\n  476 |                 }\n  477 | \n  478 |                 if let Some(rect) = tiny_skia::Rect::from_xywh(0.0, 0.0, subregion2.x() as f32, h) {\n  479 |                     pixmap.fill_rect(rect, &paint, tiny_skia::Transform::identity(), None);\n  480 |                 }\n  481 | \n  482 |                 if let Some(rect) = tiny_skia::Rect::from_xywh(subregion2.right() as f32, 0.0, w, h)\n  483 |                 {\n  484 |                     pixmap.fill_rect(rect, &paint, tiny_skia::Transform::identity(), None);\n  485 |                 }\n  486 | \n  487 |                 if let Some(rect) =\n  488 |                     tiny_skia::Rect::from_xywh(0.0, subregion2.bottom() as f32, w, h)\n  489 |                 {\n  490 |                     pixmap.fill_rect(rect, &paint, tiny_skia::Transform::identity(), None);"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `apply_offset` and `apply_drop_shadow`, displacement is truncated toward zero (`dx as i32`). For negative `dx`, e.g. `-1.7`, this gives `-1`, but for the corresponding positive case `+1.7` it gives `+1` — losing the fractional part inconsistently with `displacement_map.rs:47-48` which uses `.round() as i32`. This causes the drop shadow to land one pixel off for negative subpixel offsets.","fix":"Use `dx.round() as i32` (and `dy.round() as i32`) for consistent rounding behaviour, matching displacement_map's convention.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:618-619","code":"  618 |         dx as i32,\n  619 |         dy as i32,"},{"ref":"crates/resvg/src/filter/mod.rs:677-678","code":"  677 |         dx as i32,\n  678 |         dy as i32,"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`resolve_clip_path_transform` parses the transform string with `svgtypes::Transform::from_str`, builds a `Transform`, checks `ts.is_valid()`, and then discards `ts` to call `node.resolve_transform(AId::Transform, state)` (which re-parses the same value and additionally applies `transform-origin`). Besides the wasted work, the validity check is performed on the un-origin-shifted transform, so a transform that is valid before but invalid after `transform-origin` is applied (or vice-versa) would be mis-classified.","fix":"After computing the final transform via `resolve_transform`, check that one's validity instead of the raw parsed one; or, return the already-validated transform without re-parsing.","locations":[{"ref":"crates/usvg/src/parser/clippath.rs:94-125","code":"   94 | fn resolve_clip_path_transform(node: SvgNode, state: &converter::State) -> Option<Transform> {\n   95 |     // Do not use Node::attribute::<Transform>, because it will always\n   96 |     // return a valid transform.\n   97 | \n   98 |     let value: &str = match node.attribute(AId::Transform) {\n   99 |         Some(v) => v,\n  100 |         None => return Some(Transform::default()),\n  101 |     };\n  102 | \n  103 |     let ts = match svgtypes::Transform::from_str(value) {\n  104 |         Ok(v) => v,\n  105 |         Err(_) => {\n  106 |             log::warn!(\"Failed to parse {} value: '{}'.\", AId::Transform, value);\n  107 |             return None;\n  108 |         }\n  109 |     };\n  110 | \n  111 |     let ts = Transform::from_row(\n  112 |         ts.a as f32,\n  113 |         ts.b as f32,\n  114 |         ts.c as f32,\n  115 |         ts.d as f32,\n  116 |         ts.e as f32,\n  117 |         ts.f as f32,\n  118 |     );\n  119 | \n  120 |     if ts.is_valid() {\n  121 |         Some(node.resolve_transform(AId::Transform, state))\n  122 |     } else {\n  123 |         None\n  124 |     }\n  125 | }"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","description":"When `clip-path: url(#missing)` is set on an element, `convert_group` returns `None`, causing the entire element (its mask, filter, and children) to vanish from the output tree. Per the SVG spec, an invalid `clip-path` reference should be ignored — the element should still render, just without clipping (this is also how Chrome/Firefox behave). The current code is the documented behaviour for `filter` (where vanishing is explicit and matches Chrome/Firefox), but the same logic was applied to `clip-path` where it is wrong.","fix":"When `clippath::convert` returns `None`, set `clip_path = None` and continue (i.e. render without clipping), reserving the early-return behaviour for the `filter` branch.","locations":[{"ref":"crates/usvg/src/parser/converter.rs:798-804","code":"  798 |     let mut clip_path = None;\n  799 |     if let Some(link) = node.attribute::<SvgNode>(AId::ClipPath) {\n  800 |         clip_path = super::clippath::convert(link, state, object_bbox, cache);\n  801 |         if clip_path.is_none() {\n  802 |             return None;\n  803 |         }\n  804 |     }"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`convert_color_matrix_kind` for `saturate` clamps the value to `[0, 1]` via `f32_bound(0.0, list[0], 1.0)`, but the SVG 1.1 spec defines the valid range for the `saturate` matrix as `[0, +inf)` (no upper bound). Clamping to 1.0 silently degrades any over-saturation value provided by the user.","fix":"Replace `crate::f32_bound(0.0, list[0], 1.0)` with `list[0].max(0.0)` for the saturate branch; `PositiveF32::new` already rejects negative/NaN/zero values.","locations":[{"ref":"crates/usvg/src/parser/filter.rs:538-549","code":"  538 | fn convert_color_matrix_kind(fe: SvgNode) -> Option<ColorMatrixKind> {\n  539 |     match fe.attribute(AId::Type) {\n  540 |         Some(\"saturate\") => {\n  541 |             if let Some(list) = fe.attribute::<Vec<f32>>(AId::Values) {\n  542 |                 if !list.is_empty() {\n  543 |                     let n = crate::f32_bound(0.0, list[0], 1.0);\n  544 |                     return Some(ColorMatrixKind::Saturate(PositiveF32::new(n).unwrap()));\n  545 |                 } else {\n  546 |                     return Some(ColorMatrixKind::Saturate(PositiveF32::new(1.0).unwrap()));\n  547 |                 }\n  548 |             }\n  549 |         }"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","description":"CSS filter-function builders for `invert`, `opacity`, `grayscale`, and `sepia` clamp `amount` only on the upper bound (`amount.min(1.0)`) but not on the lower bound, so negative or NaN values propagate. For `invert(-0.5)` the result table becomes `[-0.5, 1.5]` which is well outside the spec-defined `[0, 1]` table range. The CSS Filter Effects spec says these should be clamped to `[0, 1]`.","fix":"Use `let amount = amount.clamp(0.0, 1.0) as f32;` (or `f32_bound(0.0, amount as f32, 1.0)`) so both ends are clamped and NaN is mapped to a sane value.","locations":[{"ref":"crates/usvg/src/parser/filter.rs:1087-1186","code":" 1087 | #[inline(never)]\n 1088 | fn convert_grayscale_function(amount: f64) -> Kind {\n 1089 |     let amount = amount.min(1.0) as f32;\n 1090 |     Kind::ColorMatrix(ColorMatrix {\n 1091 |         input: Input::SourceGraphic,\n 1092 |         kind: ColorMatrixKind::Matrix(vec![\n 1093 |             (0.2126 + 0.7874 * (1.0 - amount)),\n 1094 |             (0.7152 - 0.7152 * (1.0 - amount)),\n 1095 |             (0.0722 - 0.0722 * (1.0 - amount)),\n 1096 |             0.0,\n 1097 |             0.0,\n 1098 |             (0.2126 - 0.2126 * (1.0 - amount)),\n 1099 |             (0.7152 + 0.2848 * (1.0 - amount)),\n 1100 |             (0.0722 - 0.0722 * (1.0 - amount)),\n 1101 |             0.0,\n 1102 |             0.0,\n 1103 |             (0.2126 - 0.2126 * (1.0 - amount)),\n 1104 |             (0.7152 - 0.7152 * (1.0 - amount)),\n 1105 |             (0.0722 + 0.9278 * (1.0 - amount)),\n 1106 |             0.0,\n 1107 |             0.0,\n 1108 |             0.0,\n 1109 |             0.0,\n 1110 |             0.0,\n 1111 |             1.0,\n 1112 |             0.0,\n 1113 |         ]),\n 1114 |     })\n 1115 | }\n 1116 | \n 1117 | #[inline(never)]\n 1118 | fn convert_sepia_function(amount: f64) -> Kind {\n 1119 |     let amount = amount.min(1.0) as f32;\n 1120 |     Kind::ColorMatrix(ColorMatrix {\n 1121 |         input: Input::SourceGraphic,\n 1122 |         kind: ColorMatrixKind::Matrix(vec![\n 1123 |             (0.393 + 0.607 * (1.0 - amount)),\n 1124 |             (0.769 - 0.769 * (1.0 - amount)),\n 1125 |             (0.189 - 0.189 * (1.0 - amount)),\n 1126 |             0.0,\n 1127 |             0.0,\n 1128 |             (0.349 - 0.349 * (1.0 - amount)),\n 1129 |             (0.686 + 0.314 * (1.0 - amount)),\n 1130 |             (0.168 - 0.168 * (1.0 - amount)),\n 1131 |             0.0,\n 1132 |             0.0,\n 1133 |             (0.272 - 0.272 * (1.0 - amount)),\n 1134 |             (0.534 - 0.534 * (1.0 - amount)),\n 1135 |             (0.131 + 0.869 * (1.0 - amount)),\n 1136 |             0.0,\n 1137 |             0.0,\n 1138 |             0.0,\n 1139 |             0.0,\n 1140 |             0.0,\n 1141 |             1.0,\n 1142 |             0.0,\n 1143 |         ]),\n 1144 |     })\n 1145 | }\n 1146 | \n 1147 | #[inline(never)]\n 1148 | fn convert_saturate_function(amount: f64) -> Kind {\n 1149 |     let amount = PositiveF32::new(amount as f32).unwrap_or(PositiveF32::ZERO);\n 1150 |     Kind::ColorMatrix(ColorMatrix {\n 1151 |         input: Input::SourceGraphic,\n 1152 |         kind: ColorMatrixKind::Saturate(amount),\n 1153 |     })\n 1154 | }\n 1155 | \n 1156 | #[inline(never)]\n 1157 | fn convert_hue_rotate_function(amount: svgtypes::Angle) -> Kind {\n 1158 |     Kind::ColorMatrix(ColorMatrix {\n 1159 |         input: Input::SourceGraphic,\n 1160 |         kind: ColorMatrixKind::HueRotate(amount.to_degrees() as f32),\n 1161 |     })\n 1162 | }\n 1163 | \n 1164 | #[inline(never)]\n 1165 | fn convert_invert_function(amount: f64) -> Kind {\n 1166 |     let amount = amount.min(1.0) as f32;\n 1167 |     Kind::ComponentTransfer(ComponentTransfer {\n 1168 |         input: Input::SourceGraphic,\n 1169 |         func_r: TransferFunction::Table(vec![amount, 1.0 - amount]),\n 1170 |         func_g: TransferFunction::Table(vec![amount, 1.0 - amount]),\n 1171 |         func_b: TransferFunction::Table(vec![amount, 1.0 - amount]),\n 1172 |         func_a: TransferFunction::Identity,\n 1173 |     })\n 1174 | }\n 1175 | \n 1176 | #[inline(never)]\n 1177 | fn convert_opacity_function(amount: f64) -> Kind {\n 1178 |     let amount = amount.min(1.0) as f32;\n 1179 |     Kind::ComponentTransfer(ComponentTransfer {\n 1180 |         input: Input::SourceGraphic,\n 1181 |         func_r: TransferFunction::Identity,\n 1182 |         func_g: TransferFunction::Identity,\n 1183 |         func_b: TransferFunction::Identity,\n 1184 |         func_a: TransferFunction::Table(vec![0.0, amount]),\n 1185 |     })\n 1186 | }"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`convert_drop_shadow_function` and `convert_blur_function` pass `AId::Dx` to `units::convert_user_length(std_dev, …, AId::Dx, …)`. When `std-deviation` is a percentage (`stdDeviation=\"5%\"`), `units::convert_length` uses the AId to decide whether to resolve relative to viewBox width, height, or diagonal — and `AId::Dx` resolves to viewBox width. Per the SVG spec, `stdDeviation` percentages should resolve relative to the viewport diagonal (the `_` arm in `units::convert_length`). Using `AId::Dx` gives subtly wrong results when `stdDeviation` is in percent units.","fix":"Pass an AId that falls into the `_ =>` (diagonal) arm of `convert_length` — e.g. a synthetic `AId::StdDeviation` or an existing non-axis AId — when resolving `std-deviation` lengths.","locations":[{"ref":"crates/usvg/src/parser/filter.rs:1231-1244","code":" 1231 | fn convert_blur_function(node: SvgNode, std_dev: Length, state: &converter::State) -> Kind {\n 1232 |     let std_dev = PositiveF32::new(super::units::convert_user_length(\n 1233 |         std_dev,\n 1234 |         node,\n 1235 |         AId::Dx,\n 1236 |         state,\n 1237 |     ))\n 1238 |     .unwrap_or(PositiveF32::ZERO);\n 1239 |     Kind::GaussianBlur(GaussianBlur {\n 1240 |         input: Input::SourceGraphic,\n 1241 |         std_dev_x: std_dev,\n 1242 |         std_dev_y: std_dev,\n 1243 |     })\n 1244 | }"},{"ref":"crates/usvg/src/parser/filter.rs:1255-1261","code":" 1255 |     let std_dev = PositiveF32::new(super::units::convert_user_length(\n 1256 |         std_dev,\n 1257 |         node,\n 1258 |         AId::Dx,\n 1259 |         state,\n 1260 |     ))\n 1261 |     .unwrap_or(PositiveF32::ZERO);"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`convert_drop_shadow_function` (CSS-filter shorthand) does not multiply `opacity` by `flood-opacity`, even though the SVG `feDropShadow` path (`convert_drop_shadow`, lines 744-755) does. The CSS Filter Effects spec requires the same semantics. Net effect: `filter: drop-shadow(...)` ignores `flood-opacity` while `<feDropShadow>` honors it, producing different output for nominally-equivalent inputs.","fix":"Read `AId::FloodOpacity` (defaulting to `Opacity::ONE`) inside `convert_drop_shadow_function` and multiply it into `opacity`, mirroring lines 744-755.","locations":[{"ref":"crates/usvg/src/parser/filter.rs:1247-1279","code":" 1247 | fn convert_drop_shadow_function(\n 1248 |     node: SvgNode,\n 1249 |     color: Option<svgtypes::Color>,\n 1250 |     dx: Length,\n 1251 |     dy: Length,\n 1252 |     std_dev: Length,\n 1253 |     state: &converter::State,\n 1254 | ) -> Kind {\n 1255 |     let std_dev = PositiveF32::new(super::units::convert_user_length(\n 1256 |         std_dev,\n 1257 |         node,\n 1258 |         AId::Dx,\n 1259 |         state,\n 1260 |     ))\n 1261 |     .unwrap_or(PositiveF32::ZERO);\n 1262 | \n 1263 |     let (color, opacity) = color\n 1264 |         .unwrap_or_else(|| {\n 1265 |             node.find_attribute(AId::Color)\n 1266 |                 .unwrap_or_else(svgtypes::Color::black)\n 1267 |         })\n 1268 |         .split_alpha();\n 1269 | \n 1270 |     Kind::DropShadow(DropShadow {\n 1271 |         input: Input::SourceGraphic,\n 1272 |         dx: super::units::convert_user_length(dx, node, AId::Dx, state),\n 1273 |         dy: super::units::convert_user_length(dy, node, AId::Dy, state),\n 1274 |         std_dev_x: std_dev,\n 1275 |         std_dev_y: std_dev,\n 1276 |         color,\n 1277 |         opacity,\n 1278 |     })\n 1279 | }"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`get_subpath_start` computes `let offset = segments.len() - idx;` without checking `idx <= segments.len()`. Today only `idx == segments.len()` is reachable (when handling a trailing `Segment::Close`), so this works, but a future change to `calc_vertex_angle` or other callers could pass `idx > segments.len()` and silently underflow to `usize::MAX`.","fix":"Use `segments.len().saturating_sub(idx)`, or add `debug_assert!(idx <= segments.len())` at the top of the function.","locations":[{"ref":"crates/usvg/src/parser/marker.rs:438-447","code":"  438 | fn get_subpath_start(segments: &[Segment], idx: usize) -> tiny_skia_path::Point {\n  439 |     let offset = segments.len() - idx;\n  440 |     for seg in segments.iter().rev().skip(offset) {\n  441 |         if let Segment::MoveTo(p) = *seg {\n  442 |             return p;\n  443 |         }\n  444 |     }\n  445 | \n  446 |     tiny_skia_path::Point::zero()\n  447 | }"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`prev_offset` (the fallback for the next gradient stop's offset) is updated from the raw unclamped `offset` rather than the clamped one. If a stop has `offset=\"2.0\"` or `offset=\"NaN\"`, the next stop without an explicit offset inherits that out-of-range value before the f32_bound clamp is applied, producing spec-violating intermediate values. Also the `_ => prev_offset.number` fallback at line 293 silently reuses a potentially-out-of-range value for unsupported unit types.","fix":"Move `prev_offset = Length::new_number(offset as f64);` until AFTER the `f32_bound` clamp, and assign the clamped value back: `prev_offset = Length::new_number(offset as f64);`.","locations":[{"ref":"crates/usvg/src/parser/paint_server.rs:289-296","code":"  289 |             let offset = stop.attribute(AId::Offset).unwrap_or(prev_offset);\n  290 |             let offset = match offset.unit {\n  291 |                 Unit::None => offset.number,\n  292 |                 Unit::Percent => offset.number / 100.0,\n  293 |                 _ => prev_offset.number,\n  294 |             };\n  295 |             prev_offset = Length::new_number(offset);\n  296 |             let offset = crate::f32_bound(0.0, offset as f32, 1.0);"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`GlyphPainter::outline_glyph` only updates `self.outline_transform = self.transform` on success. On failure (line 256: `None => return`) the previous outline_transform stays set, meaning subsequent paint calls use a stale transform from a previous glyph. Likely incorrect when an outline failure is followed by another paint call.","fix":"Either always update outline_transform, or clear `self.path_buf` so subsequent paint calls have no path to render (and bail out).","locations":[{"ref":"crates/usvg/src/text/colr.rs:251-262","code":"  251 |     fn outline_glyph(&mut self, glyph_id: ttf_parser::GlyphId) {\n  252 |         self.path_buf.clear();\n  253 |         let mut builder = Builder(self.path_buf);\n  254 |         match self.face.outline_glyph(glyph_id, &mut builder) {\n  255 |             Some(v) => v,\n  256 |             None => return,\n  257 |         };\n  258 |         builder.finish();\n  259 | \n  260 |         // We have to write outline using the current transform.\n  261 |         self.outline_transform = self.transform;\n  262 |     }"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`outline_with_variations` in flatten.rs does NOT initialize variation axes to their defaults before applying the user `variations` (unlike `outline`, which iterates `font.variation_axes()` and sets each to `def_value`). If `variations` doesn't include every axis the font defines, the unspecified axes are at whatever ttf_parser's internal default state is. Inconsistency between `outline` and `outline_with_variations` can produce different glyph outlines for the same glyph depending on which path is taken.","fix":"Mirror the `outline` function: at the start of `outline_with_variations`, set every axis to its `def_value`, then apply the user-provided variations on top.","locations":[{"ref":"crates/usvg/src/text/flatten.rs:277-317","code":"  277 |     #[inline(never)]\n  278 |     fn outline_with_variations(\n  279 |         &self,\n  280 |         id: ID,\n  281 |         glyph_id: GlyphId,\n  282 |         variations: &[crate::FontVariation],\n  283 |         font_size: f32,\n  284 |         font_optical_sizing: crate::FontOpticalSizing,\n  285 |     ) -> Option<tiny_skia_path::Path> {\n  286 |         self.with_face_data(id, |data, face_index| -> Option<tiny_skia_path::Path> {\n  287 |             let mut font = ttf_parser::Face::parse(data, face_index).ok()?;\n  288 | \n  289 |             for v in variations {\n  290 |                 font.set_variation(ttf_parser::Tag::from_bytes(&v.tag), v.value);\n  291 |             }\n  292 | \n  293 |             // Auto-set opsz if font-optical-sizing is auto and not explicitly set\n  294 |             if font_optical_sizing == crate::FontOpticalSizing::Auto {\n  295 |                 let has_explicit_opsz = variations.iter().any(|v| v.tag == *b\"opsz\");\n  296 |                 if !has_explicit_opsz {\n  297 |                     // Check if font has opsz axis\n  298 |                     if let Some(axes) = font.tables().fvar {\n  299 |                         let has_opsz_axis = axes\n  300 |                             .axes\n  301 |                             .into_iter()\n  302 |                             .any(|axis| axis.tag == ttf_parser::Tag::from_bytes(b\"opsz\"));\n  303 |                         if has_opsz_axis {\n  304 |                             font.set_variation(ttf_parser::Tag::from_bytes(b\"opsz\"), font_size);\n  305 |                         }\n  306 |                     }\n  307 |                 }\n  308 |             }\n  309 | \n  310 |             let mut builder = PathBuilder {\n  311 |                 builder: tiny_skia_path::PathBuilder::new(),\n  312 |             };\n  313 | \n  314 |             font.outline_glyph(glyph_id, &mut builder)?;\n  315 |             builder.builder.finish()\n  316 |         })?\n  317 |     }"},{"ref":"crates/usvg/src/text/flatten.rs:256-275","code":"  256 |     #[inline(never)]\n  257 |     fn outline(&self, id: ID, glyph_id: GlyphId) -> Option<tiny_skia_path::Path> {\n  258 |         self.with_face_data(id, |data, face_index| -> Option<tiny_skia_path::Path> {\n  259 |             let mut font = ttf_parser::Face::parse(data, face_index).ok()?;\n  260 | \n  261 |             // For variable fonts, we need to set default variation values to get proper outlines\n  262 |             if font.is_variable() {\n  263 |                 for axis in font.variation_axes() {\n  264 |                     font.set_variation(axis.tag, axis.def_value);\n  265 |                 }\n  266 |             }\n  267 | \n  268 |             let mut builder = PathBuilder {\n  269 |                 builder: tiny_skia_path::PathBuilder::new(),\n  270 |             };\n  271 | \n  272 |             font.outline_glyph(glyph_id, &mut builder)?;\n  273 |             builder.builder.finish()\n  274 |         })?\n  275 |     }"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`StrokeMiterlimit::new` uses `let n = if !(n >= 1.0) { 1.0 } else { n };` which is a roundabout way of also handling NaN (NaN comparisons return false, so `!(n >= 1.0)` is true for NaN). The code works but is opaque; the surrounding `debug_assert!` calls also trigger on NaN/<1 in dev builds, which is inconsistent with the silent clamping in release.","fix":"Write it explicitly: `let n = if n.is_finite() && n >= 1.0 { n } else { 1.0 };` with a comment explaining the NaN guard.","locations":[{"ref":"crates/usvg/src/tree/mod.rs:498-506","code":"  498 |     #[inline]\n  499 |     pub fn new(n: f32) -> Self {\n  500 |         debug_assert!(n.is_finite());\n  501 |         debug_assert!(n >= 1.0);\n  502 | \n  503 |         let n = if !(n >= 1.0) { 1.0 } else { n };\n  504 | \n  505 |         StrokeMiterlimit(n)\n  506 |     }"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`writer.rs` has_text_paths recursively traverses children but the inner `Path::new(...)` it constructs (and discards) ignores `is_some` for the empty-path case incorrectly: an empty path returns None from `Path::new` (because `compute_tight_bounds` returns None), so `has_text_paths` returns `false` for empty textPath chunks even though the empty path still needs the `<path>` element in defs (so the `<textPath>` xlink:href resolves). This is a corner case but produces broken SVG output.","fix":"Replace the Path::new based check with a direct check on `TextFlow::Path(_)` presence (i.e., `return true;` whenever a textPath chunk is found). Likewise simplify `write_text_path_paths`.","locations":[{"ref":"crates/usvg/src/writer.rs:586-600","code":"  586 |                     let path = Path::new(\n  587 |                         text_path.id().to_string(),\n  588 |                         true,\n  589 |                         None,\n  590 |                         None,\n  591 |                         PaintOrder::default(),\n  592 |                         ShapeRendering::default(),\n  593 |                         text_path.path.clone(),\n  594 |                         Transform::default(),\n  595 |                     );\n  596 |                     if path.is_some() {\n  597 |                         return true;\n  598 |                     }\n  599 |                 }\n  600 |             }"},{"ref":"crates/usvg/src/writer.rs:623-637","code":"  623 |                     let path = Path::new(\n  624 |                         text_path.id().to_string(),\n  625 |                         true,\n  626 |                         None,\n  627 |                         None,\n  628 |                         PaintOrder::default(),\n  629 |                         ShapeRendering::default(),\n  630 |                         text_path.path.clone(),\n  631 |                         Transform::default(),\n  632 |                     );\n  633 |                     if let Some(path) = &path {\n  634 |                         write_path(path, false, Transform::default(), None, opt, xml);\n  635 |                     }\n  636 |                 }\n  637 |             }"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`write_numbers` formats numbers with `format_args!(\"{} \", n)` instead of going through `write_num`. This bypasses the `coordinates_precision` setting from `WriteOptions`, so attributes like `text.rotate`, `text.dx`, `text.dy`, filter `kernelMatrix`, and feFunc `tableValues` are written at full f32 precision regardless of user preference.","fix":"Plumb `WriteOptions` (or just the precision) into `write_numbers` and call `write_num(*n, buf, precision)` per element.","locations":[{"ref":"crates/usvg/src/writer.rs:1009-1019","code":" 1009 |     fn write_numbers(&mut self, aid: AId, list: &[f32]) {\n 1010 |         self.write_attribute_raw(aid.to_str(), |buf| {\n 1011 |             for n in list {\n 1012 |                 buf.write_fmt(format_args!(\"{} \", n)).unwrap();\n 1013 |             }\n 1014 | \n 1015 |             if !list.is_empty() {\n 1016 |                 buf.pop();\n 1017 |             }\n 1018 |         });\n 1019 |     }"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`write_filter_primitive_attrs` skips writing x/y/width/height by exact `f32` `!=` comparison against parent_rect. Float equality is fragile — small floating-point drift between the parent rect and primitive rect causes either over- or under-emission of attributes. The rest of the crate consistently uses `approx_eq_ulps` for f32 comparison.","fix":"Use ULP-tolerant comparison: `if !parent_rect.x().approx_eq_ulps(&fe.rect().x(), 4) { ... }` etc.","locations":[{"ref":"crates/usvg/src/writer.rs:1032-1044","code":" 1032 |     fn write_filter_primitive_attrs(&mut self, parent_rect: NonZeroRect, fe: &filter::Primitive) {\n 1033 |         if parent_rect.x() != fe.rect().x() {\n 1034 |             self.write_svg_attribute(AId::X, &fe.rect().x());\n 1035 |         }\n 1036 |         if parent_rect.y() != fe.rect().y() {\n 1037 |             self.write_svg_attribute(AId::Y, &fe.rect().y());\n 1038 |         }\n 1039 |         if parent_rect.width() != fe.rect().width() {\n 1040 |             self.write_svg_attribute(AId::Width, &fe.rect().width());\n 1041 |         }\n 1042 |         if parent_rect.height() != fe.rect().height() {\n 1043 |             self.write_svg_attribute(AId::Height, &fe.rect().height());\n 1044 |         }"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"In `write_image_data`, the data URI uses `;base64, ` (with a space after the comma). The grammar of RFC 2397 does not include this space; while most browsers accept it, strict parsers may reject. The space also bloats every embedded image by one byte.","fix":"Use `b\";base64,\"` (no trailing space).","locations":[{"ref":"crates/usvg/src/writer.rs:1106","code":" 1106 |             buf.extend_from_slice(b\";base64, \");"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"`write_span` has `FontStretch::Normal => unreachable!()` inside the stretch name match. The outer `if span.font.stretch != FontStretch::Normal` guards it today, but the pattern is fragile: any refactor that moves the match outside the guard introduces a panic. Same pattern for `DominantBaseline::Auto => unreachable!()` (line 1545) and `AlignmentBaseline::Auto => unreachable!()` (line 1563).","fix":"Use a fallible mapping returning `Option<&str>` and skip writing the attribute on None — eliminates the unreachable! and is robust to refactoring.","locations":[{"ref":"crates/usvg/src/writer.rs:1495","code":" 1495 |             FontStretch::Normal => unreachable!(),"},{"ref":"crates/usvg/src/writer.rs:1545","code":" 1545 |             DominantBaseline::Auto => unreachable!(),"},{"ref":"crates/usvg/src/writer.rs:1563","code":" 1563 |             AlignmentBaseline::Auto => unreachable!(),"}]},{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"`main.rs::fit_to_rect` unconditionally unwraps `IntRect::from_ltrb(left, top, right, bottom)`. When the input rect `r` is entirely outside `bounds` (e.g., `r.right() < bounds.left()`), the clamped values produce `left > right` (or `top > bottom`) and `from_ltrb` returns `None`, causing the binary to panic. The parallel function in `geom.rs::fit_to_rect` already returns `Option` and avoids this. This is also redundant duplicated code that has diverged.","fix":"Make `main.rs::fit_to_rect` return `Option<IntRect>` (or share `geom::fit_to_rect` by exposing it pub(crate)), and update `trim_pixmap` to handle the None case gracefully instead of unwrapping.","locations":[{"ref":"crates/resvg/src/main.rs:782-804","code":"  782 | fn fit_to_rect(r: tiny_skia::IntRect, bounds: tiny_skia::IntRect) -> tiny_skia::IntRect {\n  783 |     let mut left = r.left();\n  784 |     if left < bounds.left() {\n  785 |         left = bounds.left();\n  786 |     }\n  787 | \n  788 |     let mut top = r.top();\n  789 |     if top < bounds.top() {\n  790 |         top = bounds.top();\n  791 |     }\n  792 | \n  793 |     let mut right = r.right();\n  794 |     if right > bounds.right() {\n  795 |         right = bounds.right();\n  796 |     }\n  797 | \n  798 |     let mut bottom = r.bottom();\n  799 |     if bottom > bounds.bottom() {\n  800 |         bottom = bounds.bottom();\n  801 |     }\n  802 | \n  803 |     tiny_skia::IntRect::from_ltrb(left, top, right, bottom).unwrap()\n  804 | }"},{"ref":"crates/resvg/src/geom.rs:5-30","code":"    5 | pub fn fit_to_rect(\n    6 |     r: tiny_skia::IntRect,\n    7 |     bounds: tiny_skia::IntRect,\n    8 | ) -> Option<tiny_skia::IntRect> {\n    9 |     let mut left = r.left();\n   10 |     if left < bounds.left() {\n   11 |         left = bounds.left();\n   12 |     }\n   13 | \n   14 |     let mut top = r.top();\n   15 |     if top < bounds.top() {\n   16 |         top = bounds.top();\n   17 |     }\n   18 | \n   19 |     let mut right = r.right();\n   20 |     if right > bounds.right() {\n   21 |         right = bounds.right();\n   22 |     }\n   23 | \n   24 |     let mut bottom = r.bottom();\n   25 |     if bottom > bounds.bottom() {\n   26 |         bottom = bounds.bottom();\n   27 |     }\n   28 | \n   29 |     tiny_skia::IntRect::from_ltrb(left, top, right, bottom)\n   30 | }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"`collect_normals` indexes `path.points()[0]` to get the initial move-to coordinates. If the input path has zero points (e.g., a malformed or degenerate textPath target), this panics. The function is reachable from `resolve_clusters_positions_path` for any text-on-path.","fix":"Replace with `let first = path.points().first().copied(); if first.is_none() { return vec![None; clusters.len()]; } let first = first.unwrap();` (or guard with an early return).","locations":[{"ref":"crates/usvg/src/text/layout.rs:756-757","code":"  756 |     let mut prev_mx = path.points()[0].x;\n  757 |     let mut prev_my = path.points()[0].y;"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"`default_fallback_selector` does `let base_font_id = exclude_fonts[0];` unconditionally. If a caller (or future refactor) ever passes an empty `exclude_fonts` slice, this panics with an out-of-bounds index. The type signature of `FallbackSelectionFn` does not document this precondition.","fix":"Guard with `let base_font_id = *exclude_fonts.first()?;` to return `None` instead of panicking.","locations":[{"ref":"crates/usvg/src/text/mod.rs:148-149","code":"  148 |         Box::new(|c, exclude_fonts, fontdb| {\n  149 |             let base_font_id = exclude_fonts[0];"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"Several rendering helpers call `tiny_skia::Pixmap::new(w, h).unwrap()` to allocate the same dimensions as the source pixmap. While the source pixmap is known to be valid, allocation can still fail under low-memory conditions (Pixmap::new returns None on allocation failure, not just on invalid sizes), causing the whole render to panic instead of degrading gracefully.","fix":"Replace `.unwrap()` with proper handling (e.g., return early via `?` and log a warning using `log_none(...)` like `render.rs:103-104` already does), so that out-of-memory situations don't crash the process.","locations":[{"ref":"crates/resvg/src/clip.rs:11","code":"   11 |     let mut clip_pixmap = tiny_skia::Pixmap::new(pixmap.width(), pixmap.height()).unwrap();"},{"ref":"crates/resvg/src/clip.rs:76","code":"   76 |     let mut clip_pixmap = tiny_skia::Pixmap::new(pixmap.width(), pixmap.height()).unwrap();"},{"ref":"crates/resvg/src/mask.rs:17","code":"   17 |     let mut mask_pixmap = tiny_skia::Pixmap::new(pixmap.width(), pixmap.height()).unwrap();"},{"ref":"crates/resvg/src/mask.rs:22","code":"   22 |         let mut alpha_mask = tiny_skia::Mask::new(pixmap.width(), pixmap.height()).unwrap();"},{"ref":"crates/resvg/src/image.rs:42","code":"   42 |     let mut sub_pixmap = tiny_skia::Pixmap::new(pixmap.width(), pixmap.height()).unwrap();"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"`apply_inner` performs `subregion.translate(-region.x(), -region.y()).unwrap()`. If the filter region's x/y is `i32::MIN`, the negation overflows and `translate` may return `None`, panicking. Similarly, `apply_tile` does `input.region.translate(-region.x(), -region.y()).unwrap()`. Although huge negative regions are unusual, malformed input could trigger this.","fix":"Replace `.unwrap()` with `.ok_or(Error::InvalidRegion)?` so the filter pipeline rejects pathological regions cleanly instead
