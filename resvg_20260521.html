of panicking.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:458-460","code":"  458 |                 subregion.translate(-region.x(), -region.y())\n  459 |             }\n  460 |             .unwrap();"},{"ref":"crates/resvg/src/filter/mod.rs:831","code":"  831 |     let subregion = input.region.translate(-region.x(), -region.y()).unwrap();"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"`draw_markers` computes `let total = path.len() - 1;` (line 239) and `let idx = path.len() - 1;` (line 258) without checking that `path` is non-empty. `path.len()` returns `usize`, so the subtraction panics in debug builds and wraps to `usize::MAX` in release. Today all callers pass non-empty segment lists (built from `tiny_skia_path::Path`s with `>= 2` segments), but the function signature does not enforce this and a future refactor (or a path that contains only a `Close`) could trip the panic.","fix":"Add `if path.is_empty() { return; }` at the top of `draw_markers`, or replace `path.len() - 1` with `path.len().saturating_sub(1)` and short-circuit when the result is 0.","locations":[{"ref":"crates/usvg/src/parser/marker.rs:238-273","code":"  238 |         MarkerKind::Middle => {\n  239 |             let total = path.len() - 1;\n  240 |             let mut i = 1;\n  241 |             while i < total {\n  242 |                 let p = match path[i] {\n  243 |                     Segment::MoveTo(p) => p,\n  244 |                     Segment::LineTo(p) => p,\n  245 |                     Segment::CubicTo(_, _, p) => p,\n  246 |                     _ => {\n  247 |                         i += 1;\n  248 |                         continue;\n  249 |                     }\n  250 |                 };\n  251 | \n  252 |                 draw_marker(p, i);\n  253 | \n  254 |                 i += 1;\n  255 |             }\n  256 |         }\n  257 |         MarkerKind::End => {\n  258 |             let idx = path.len() - 1;\n  259 |             match path.last().cloned() {\n  260 |                 Some(Segment::LineTo(p)) => {\n  261 |                     draw_marker(p, idx);\n  262 |                 }\n  263 |                 Some(Segment::CubicTo(_, _, p)) => {\n  264 |                     draw_marker(p, idx);\n  265 |                 }\n  266 |                 Some(Segment::Close) => {\n  267 |                     let p = get_subpath_start(path, idx);\n  268 |                     draw_marker(p, idx);\n  269 |                 }\n  270 |                 _ => {}\n  271 |             }\n  272 |         }\n  273 |     }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"`parent.parent_element().unwrap()` panics if the text/tspan has no element-type ancestor. In practice the parser ensures every text/tspan reaches the SVG root element, but a malformed document tree — or a future change to how the synthetic Root is exposed — would cause an unwrap panic when `dominant-baseline: no-change` is set on the root-most text element.","fix":"Use `if let Some(p) = parent.parent_element() { dominant_baseline = p.find_attribute(AId::DominantBaseline).unwrap_or_default(); }` instead of unwrapping.","locations":[{"ref":"crates/usvg/src/parser/text.rs:249-256","code":"  249 |         // `no-change` means \"use parent\".\n  250 |         if dominant_baseline == DominantBaseline::NoChange {\n  251 |             dominant_baseline = parent\n  252 |                 .parent_element()\n  253 |                 .unwrap()\n  254 |                 .find_attribute(AId::DominantBaseline)\n  255 |                 .unwrap_or_default();\n  256 |         }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","description":"`path_length` accesses `path.points()[0].x` / `path.points()[0].y` without checking that the path has any points. The current sole caller (`resolve_text_flow`) passes paths from `shapes::convert` which today always produce non-empty paths, but this is an undocumented invariant. If `shapes::convert` ever returns a non-empty `Arc<Path>` containing zero points (e.g. via a future PathBuilder change or a shape that returns a degenerate path), `path_length` would panic in production.","fix":"Guard with `let Some(first) = path.points().first() else { return 0.0; };` and use `first.x`/`first.y` instead of indexing.","locations":[{"ref":"crates/usvg/src/parser/text.rs:912-916","code":"  912 | fn path_length(path: &tiny_skia_path::Path) -> f64 {\n  913 |     let mut prev_mx = path.points()[0].x;\n  914 |     let mut prev_my = path.points()[0].y;\n  915 |     let mut prev_x = prev_mx;\n  916 |     let mut prev_y = prev_my;"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","description":"`ByteIndex::char_from` does `text[self.0..].chars().next().unwrap()`. If `self.0 == text.len()`, the iterator returns None and unwrap panics. While `ByteIndex` documents being in-bounds, `form_glyph_clusters` and other callers use `glyphs[0].byte_idx` which originates from rustybuzz output — a malformed input or unusual font could produce an out-of-bounds index, and there is no defense.","fix":"Use `text.get(self.0..).and_then(|s| s.chars().next()).unwrap_or('\\u{FFFD}')` or change the return type to `Option<char>` and propagate.","locations":[{"ref":"crates/usvg/src/text/layout.rs:1813-1815","code":" 1813 |     pub(crate) fn char_from(&self, text: &str) -> char {\n 1814 |         text[self.0..].chars().next().unwrap()\n 1815 |     }"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"`write_num` in the writer indexes `POW_VEC[precision as usize]` where `POW_VEC` has 13 entries (0..=12). `WriteOptions::coordinates_precision`/`transforms_precision` are `u8` with no validation; a caller constructing `WriteOptions` with precision > 12 panics on out-of-bounds. The CLI clamps to 2..=8 but the public `WriteOptions` API does not enforce this.","fix":"Clamp `precision` to `POW_VEC.len() - 1` at the entry of `write_num`, or validate in `WriteOptions` (e.g., by making it a bounded newtype).","locations":[{"ref":"crates/usvg/src/writer.rs:1428","code":" 1428 |     let v = (num * POW_VEC[precision as usize]).round() / POW_VEC[precision as usize];"},{"ref":"crates/usvg/src/writer.rs:1398-1412","code":" 1398 | static POW_VEC: &[f32] = &[\n 1399 |     1.0,\n 1400 |     10.0,\n 1401 |     100.0,\n 1402 |     1_000.0,\n 1403 |     10_000.0,\n 1404 |     100_000.0,\n 1405 |     1_000_000.0,\n 1406 |     10_000_000.0,\n 1407 |     100_000_000.0,\n 1408 |     1_000_000_000.0,\n 1409 |     10_000_000_000.0,\n 1410 |     100_000_000_000.0,\n 1411 |     1_000_000_000_000.0,\n 1412 | ];"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","description":"`apply_morphology` calls `rx.ceil() as u32`; for very large but finite `rx` (e.g., scaled by a huge transform), `ceil()` produces a value that saturates to `u32::MAX`. Multiplying by 2 then overflows in debug or wraps in release. The function is reached from `apply_morphology` in mod.rs only after `scale_coordinates`, which performs no bounds check on the scaled radius.","fix":"Clamp `rx`/`ry` to a sane upper bound before casting (e.g., `rx.clamp(0.0, src.width as f32)` so the kernel is never larger than the image).","locations":[{"ref":"crates/resvg/src/filter/morphology.rs:17-18","code":"   17 |     let columns = std::cmp::min(rx.ceil() as u32 * 2, src.width);\n   18 |     let rows = std::cmp::min(ry.ceil() as u32 * 2, src.height);"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","description":"In `turbulence::init`, when `seed == i32::MIN`, the expression `-seed` overflows (i32::MIN cannot be negated). In debug builds this panics; in release it wraps to `i32::MIN` and produces a negative seed after `% (RAND_M - 1) + 1`, defeating the normalization. The seed value comes directly from user input (`fe.seed()`).","fix":"Use `seed.wrapping_neg()` or compute via `seed.unsigned_abs()` cast back to i32 with saturation: `if seed <= 0 { seed = (seed.wrapping_neg().rem_euclid(RAND_M - 1)) + 1; }`, or handle the i32::MIN edge case explicitly.","locations":[{"ref":"crates/resvg/src/filter/turbulence.rs:97-99","code":"   97 |     if seed <= 0 {\n   98 |         seed = -seed % (RAND_M - 1) + 1;\n   99 |     }"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","description":"`Size::from_wh(r.width() * stroke_scale, r.height() * stroke_scale).unwrap()` can panic if the multiplication overflows to `+inf` for huge user-supplied `markerWidth`, `markerHeight`, or `stroke-width`. `Size::from_wh` requires finite, positive values, so an attacker-controlled SVG with extreme dimensions can reach the unwrap.","fix":"Replace `.unwrap()` with `.unwrap_or_else(|| Size::from_wh(1.0, 1.0).unwrap())`, or early-return from the closure when `Size::from_wh` returns `None`.","locations":[{"ref":"crates/usvg/src/parser/marker.rs:183-187","code":"  183 |         if let Some(vbox) = view_box {\n  184 |             let size = Size::from_wh(r.width() * stroke_scale, r.height() * stroke_scale).unwrap();\n  185 |             let vbox_ts = vbox.to_transform(size);\n  186 |             let (sx, sy) = vbox_ts.get_scale();\n  187 |             ts = ts.pre_scale(sx, sy);"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","description":"`NodeId::new` does `id + 1` on a `u32` to produce a `NonZeroU32`. The `debug_assert!(id < u32::MAX)` only fires in debug builds; in release, `id == u32::MAX` wraps to 0 and `NonZeroU32::new(0).unwrap()` panics. The 1_000_000-element limit in `parse_svg_element` prevents this in practice, but the API is fragile — anyone removing/changing the limit can re-introduce the bug.","fix":"Use `id.checked_add(1).and_then(NonZeroU32::new).expect(\"NodeId overflow\")` instead of `NonZeroU32::new(id + 1).unwrap()` so the failure mode is consistent across debug and release builds.","locations":[{"ref":"crates/usvg/src/parser/svgtree/mod.rs:155-162","code":"  155 | impl NodeId {\n  156 |     #[inline]\n  157 |     fn new(id: u32) -> Self {\n  158 |         debug_assert!(id < u32::MAX);\n  159 | \n  160 |         // We are using `NonZeroU32` to reduce overhead of `Option<NodeId>`.\n  161 |         NodeId(NonZeroU32::new(id + 1).unwrap())\n  162 |     }"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","description":"`fix_recursive_fe_image` calls `fe_node.parent().unwrap()` to get the enclosing filter element. The SVG spec requires `feImage` to be inside `<filter>`, but a malformed input could place it at the document root, causing a panic during pre-processing rather than a graceful skip.","fix":"Use `let Some(parent) = fe_node.parent() else { continue; }; let filter_id = parent.element_id();` so malformed inputs are skipped.","locations":[{"ref":"crates/usvg/src/parser/svgtree/parse.rs:786-810","code":"  786 | fn fix_recursive_fe_image(doc: &mut Document) {\n  787 |     let mut ids = Vec::new();\n  788 |     for fe_node in doc\n  789 |         .root()\n  790 |         .descendants()\n  791 |         .filter(|n| n.tag_name() == Some(EId::FeImage))\n  792 |     {\n  793 |         if let Some(link) = fe_node.node_attribute(AId::Href) {\n  794 |             if let Some(filter_uri) = link.attribute::<&str>(AId::Filter) {\n  795 |                 let filter_id = fe_node.parent().unwrap().element_id();\n  796 |                 for func in svgtypes::FilterValueListParser::from(filter_uri).flatten() {\n  797 |                     if let svgtypes::FilterValue::Url(url) = func {\n  798 |                         if url == filter_id {\n  799 |                             ids.push(link.id);\n  800 |                         }\n  801 |                     }\n  802 |                 }\n  803 |             }\n  804 |         }\n  805 |     }\n  806 | \n  807 |     for id in ids {\n  808 |         let idx = doc.get(id).attribute_id(AId::Filter).unwrap();\n  809 |         doc.attrs[idx].value = roxmltree::StringStorage::Borrowed(\"none\");\n  810 |     }"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","description":"`shape_text_with_font` line 1505 does `sub_text[start..end].to_string()`. `end` is derived from either `infos.get(last).map_or(sub_text.len(), |info| info.cluster as usize)`; for an RTL run when `i > 0`, `end = infos[i-1].cluster as usize`. If clusters in this RTL run are out of expected monotone order (degenerate font output), `start > end` and the slice panics. There is no defensive check, only a `// TODO: can fail?` next to the cluster_len calculation.","fix":"Normalize the order: `let (start, end) = if start <= end { (start, end) } else { (end, start) };` (or skip the glyph) before slicing. Also propagate to the cluster_len computation.","locations":[{"ref":"crates/usvg/src/text/layout.rs:1494-1505","code":" 1494 |                 let end = if ltr {\n 1495 |                     i.checked_add(1)\n 1496 |                 } else {\n 1497 |                     i.checked_sub(1)\n 1498 |                 }\n 1499 |                 .and_then(|last| infos.get(last))\n 1500 |                 .map_or(sub_text.len(), |info| info.cluster as usize);\n 1501 | \n 1502 |                 glyphs.push(Glyph {\n 1503 |                     byte_idx: ByteIndex::new(idx),\n 1504 |                     cluster_len: end.checked_sub(start).unwrap_or(0), // TODO: can fail?\n 1505 |                     text: sub_text[start..end].to_string(),"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"negligible","description":"`apply_blend`, `apply_composite`, `apply_merge`, etc., call `Pixmap::try_create(region.width(), region.height())?`. However, `apply_flood` uses the same pattern. If `region.width()` or `region.height()` is zero (which is technically reachable when the filter's rect is degenerate after the transform), `Pixmap::new(0, _)` returns None, producing an `InvalidRegion` error. That error is then suppressed by `apply`'s outer handler which only logs a warning. Net effect is no panic, but the silent failure may surprise debugging users.","fix":"Add an explicit check for zero-width/zero-height regions earlier in `apply_inner` and either return cleanly or log a more descriptive warning.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:343-354","code":"  343 |     // Clear on error.\n  344 |     if result.is_err() {\n  345 |         source.fill(tiny_skia::Color::TRANSPARENT);\n  346 |     }\n  347 | \n  348 |     match result {\n  349 |         Ok(_) => {}\n  350 |         Err(Error::InvalidRegion) => {\n  351 |             log::warn!(\"Filter has an invalid region.\");\n  352 |         }\n  353 |         Err(Error::NoResults) => {}\n  354 |     }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In `apply_convolve_matrix`, when `preserve_alpha=true`, the code demultiplies alpha but never re-multiplies it before producing the output `Image`. However, `convolve_matrix::apply` itself outputs premultiplied RGB (it multiplies each channel by `bounded_new_a`), so the pixmap returned is actually premultiplied as expected — but the initial `demultiply_alpha` is wasted work because the entire image is re-written by `convolve_matrix::apply`. This is a performance bug; the demultiplication of the source is only meaningful for the actual reads inside the kernel, which is correct, but the asymmetry with `apply_color_matrix`/`apply_component_transfer` (which both round-trip multiply/demultiply) is confusing.","fix":"Document that the convolve kernel itself handles premultiplication, or rename for clarity. No correctness fix required, but the inconsistency with the surrounding filter handlers is a maintainability hazard.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:912-926","code":"  912 | fn apply_convolve_matrix(\n  913 |     fe: &usvg::filter::ConvolveMatrix,\n  914 |     cs: usvg::filter::ColorInterpolation,\n  915 |     input: Image,\n  916 | ) -> Result<Image, Error> {\n  917 |     let mut pixmap = input.into_color_space(cs)?.take()?;\n  918 | \n  919 |     if fe.preserve_alpha() {\n  920 |         demultiply_alpha(pixmap.data_mut().as_rgba_mut());\n  921 |     }\n  922 | \n  923 |     convolve_matrix::apply(fe, pixmap.as_image_ref_mut());\n  924 | \n  925 |     Ok(Image::from_image(pixmap, cs))\n  926 | }"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`background_path` returns `None` and silently omits the background when `NormalizedF32::new(alpha as f32 / 255.0)` returns `None`. `alpha as f32 / 255.0` is always in `[0, 1]` for a `u8` alpha, so this is unreachable in practice — but the silent `?` suppresses what would be a programming error if the math ever changed (e.g. if `Color::alpha` becomes `u16` or `f32`).","fix":"Replace `NormalizedF32::new(...)?` with `NormalizedF32::new(...).unwrap_or(NormalizedF32::ONE)` (defence-in-depth), or `unwrap_or_else(|| { log::warn!(\"...\"); NormalizedF32::ONE })`.","locations":[{"ref":"crates/usvg/src/parser/converter.rs:470-487","code":"  470 | fn background_path(background_color: svgtypes::Color, area: Rect) -> Option<Path> {\n  471 |     let path = PathBuilder::from_rect(area);\n  472 | \n  473 |     let fill = Fill {\n  474 |         paint: Paint::Color(Color::new_rgb(\n  475 |             background_color.red,\n  476 |             background_color.green,\n  477 |             background_color.blue,\n  478 |         )),\n  479 |         opacity: NormalizedF32::new(background_color.alpha as f32 / 255.0)?,\n  480 |         ..Default::default()\n  481 |     };\n  482 | \n  483 |     let mut path = Path::new_simple(Arc::new(path))?;\n  484 |     path.fill = Some(fill);\n  485 | \n  486 |     Some(path)\n  487 | }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`points_to_path` silently swallows individual point-parse errors from `PointsParser` (the iterator simply terminates on the first parse failure with no warning). A malformed `points` attribute may produce a truncated path without any user-visible diagnostic, even though the analogous code path in `convert_path` at least emits an explicit `Err(_) => break`.","fix":"Log a warning if `PointsParser` truncates early (or if the resulting builder is empty), mirroring the diagnostics emitted by other shape converters.","locations":[{"ref":"crates/usvg/src/parser/shapes.rs:185-220","code":"  185 | fn points_to_path(node: SvgNode, eid: &str) -> Option<tiny_skia_path::PathBuilder> {\n  186 |     use svgtypes::PointsParser;\n  187 | \n  188 |     let mut builder = tiny_skia_path::PathBuilder::new();\n  189 |     match node.attribute::<&str>(AId::Points) {\n  190 |         Some(text) => {\n  191 |             for (x, y) in PointsParser::from(text) {\n  192 |                 if builder.is_empty() {\n  193 |                     builder.move_to(x as f32, y as f32);\n  194 |                 } else {\n  195 |                     builder.line_to(x as f32, y as f32);\n  196 |                 }\n  197 |             }\n  198 |         }\n  199 |         _ => {\n  200 |             log::warn!(\n  201 |                 \"{} '{}' has an invalid 'points' value. Skipped.\",\n  202 |                 eid,\n  203 |                 node.element_id()\n  204 |             );\n  205 |             return None;\n  206 |         }\n  207 |     };\n  208 | \n  209 |     // 'polyline' and 'polygon' elements must contain at least 2 points.\n  210 |     if builder.len() < 2 {\n  211 |         log::warn!(\n  212 |             \"{} '{}' has less than 2 points. Skipped.\",\n  213 |             eid,\n  214 |             node.element_id()\n  215 |         );\n  216 |         return None;\n  217 |     }\n  218 | \n  219 |     Some(builder)\n  220 | }"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`text/colr.rs` uses `println!(\"Warning: ...\")` for unsupported sweep gradients (line 188) and unsupported blend modes (line 288). The rest of the codebase consistently uses `log::warn!`. `println!` to stdout corrupts piped output (the CLI uses stdout for SVG output when `-c` is set) and bypasses the user's `--quiet` flag and log level config.","fix":"Replace `println!(\"Warning: ...\")` with `log::warn!(...)`.","locations":[{"ref":"crates/usvg/src/text/colr.rs:188","code":"  188 |         println!(\"Warning: sweep gradients are not supported.\");"},{"ref":"crates/usvg/src/text/colr.rs:288","code":"  288 |                 println!(\"Warning: unsupported blend mode: {:?}\", mode);"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`write_image_data` does `enc.write_all(data).unwrap()` and `enc.finish().unwrap()`. The underlying writer is a `Vec<u8>` so write failures cannot happen in practice, but the use of `unwrap()` rather than `expect(\"...\")` makes the failure mode opaque if the buffer type ever changes.","fix":"Use `.expect(\"in-memory write cannot fail\")` (and the same for `finish`).","locations":[{"ref":"crates/usvg/src/writer.rs:1108-1112","code":" 1108 |             let mut enc =\n 1109 |                 base64::write::EncoderWriter::new(buf, &base64::engine::general_purpose::STANDARD);\n 1110 |             enc.write_all(data).unwrap();\n 1111 |             enc.finish().unwrap();\n 1112 |         });"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`scale_coordinates` always returns `Some(...)`, so the `match` arms `None => return ...` in multiple call sites are unreachable. Similarly, `resolve_std_dev` propagates `?` from `scale_coordinates`, which can never short-circuit. This is dead code that obscures the true control flow.","fix":"Either make `scale_coordinates` return `(f32, f32)` directly (removing the `Option`) and inline the call sites, or make it actually validate (e.g., check for NaN/inf) and return None in those cases.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:580-583","code":"  580 |     let (dx, dy) = match scale_coordinates(fe.dx(), fe.dy(), ts) {\n  581 |         Some(v) => v,\n  582 |         None => return Ok(input),\n  583 |     };"},{"ref":"crates/resvg/src/filter/mod.rs:666-669","code":"  666 |     let (dx, dy) = match scale_coordinates(fe.dx(), fe.dy(), ts) {\n  667 |         Some(v) => v,\n  668 |         None => return Ok(input),\n  669 |     };"},{"ref":"crates/resvg/src/filter/mod.rs:936-939","code":"  936 |     let (rx, ry) = match scale_coordinates(fe.radius_x().get(), fe.radius_y().get(), ts) {\n  937 |         Some(v) => v,\n  938 |         None => return Ok(Image::from_image(pixmap, cs)),\n  939 |     };"},{"ref":"crates/resvg/src/filter/mod.rs:964-967","code":"  964 |     let (sx, sy) = match scale_coordinates(fe.scale(), fe.scale(), ts) {\n  965 |         Some(v) => v,\n  966 |         None => return Ok(Image::from_image(pixmap1, cs)),\n  967 |     };"},{"ref":"crates/resvg/src/filter/mod.rs:1113","code":" 1113 |     let (mut std_dx, mut std_dy) = scale_coordinates(std_dx, std_dy, ts)?;"},{"ref":"crates/resvg/src/filter/mod.rs:1137-1140","code":" 1137 | fn scale_coordinates(x: f32, y: f32, ts: usvg::Transform) -> Option<(f32, f32)> {\n 1138 |     let (sx, sy) = ts.get_scale();\n 1139 |     Some((x * sx, y * sy))\n 1140 | }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`resolve_primitive_region` contains a stale commented-out line (`// let ts_bbox = tiny_skia::Rect::new(ts.e, ts.f, ts.a, ts.d).unwrap();`) alongside a vague `// TODO: wrong` comment that does not explain what's wrong. Either the TODO should be acted on (or detailed) or the dead code should be removed to reduce noise.","fix":"Delete the commented-out line and replace `// TODO: wrong` with a comment that explains the spec-divergence (\"TODO: account for rotate/skew in the bbox transform; current implementation assumes axis-aligned bbox\").","locations":[{"ref":"crates/usvg/src/parser/filter.rs:395-419","code":"  395 |     let region = match kind {\n  396 |         EId::FeFlood | EId::FeImage => {\n  397 |             // `feImage` uses the object bbox.\n  398 |             if units == Units::ObjectBoundingBox {\n  399 |                 let bbox = bbox?;\n  400 | \n  401 |                 // TODO: wrong\n  402 |                 // let ts_bbox = tiny_skia::Rect::new(ts.e, ts.f, ts.a, ts.d).unwrap();\n  403 | \n  404 |                 let r = NonZeroRect::from_xywh(\n  405 |                     x.unwrap_or(0.0),\n  406 |                     y.unwrap_or(0.0),\n  407 |                     width.unwrap_or(1.0),\n  408 |                     height.unwrap_or(1.0),\n  409 |                 )?;\n  410 | \n  411 |                 return Some(r.bbox_transform(bbox));\n  412 |             } else {\n  413 |                 filter_region\n  414 |             }\n  415 |         }\n  416 |         _ => filter_region,\n  417 |     };\n  418 | \n  419 |     // TODO: Wrong! Does not account rotate and skew."}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`has_xlink` line 1158 has `_ => {}` catch-all but `Node` only has 4 variants (Group, Path, Image, Text), all of which are explicitly matched above. The catch-all is dead. Removing it (or restricting to `Node::Path(_) => {}`) makes the match exhaustive and surfaces compile errors when new Node variants are added.","fix":"Replace `_ => {}` with `Node::Path(_) => {}` to get an exhaustiveness check.","locations":[{"ref":"crates/usvg/src/writer.rs:1118-1159","code":" 1118 |         match node {\n 1119 |             Node::Group(g) => {\n 1120 |                 for filter in &g.filters {\n 1121 |                     if filter\n 1122 |                         .primitives\n 1123 |                         .iter()\n 1124 |                         .any(|p| matches!(p.kind, filter::Kind::Image(_)))\n 1125 |                     {\n 1126 |                         return true;\n 1127 |                     }\n 1128 |                 }\n 1129 | \n 1130 |                 if let Some(mask) = &g.mask {\n 1131 |                     if has_xlink(mask.root()) {\n 1132 |                         return true;\n 1133 |                     }\n 1134 | \n 1135 |                     if let Some(sub_mask) = &mask.mask {\n 1136 |                         if has_xlink(&sub_mask.root) {\n 1137 |                             return true;\n 1138 |                         }\n 1139 |                     }\n 1140 |                 }\n 1141 | \n 1142 |                 if has_xlink(g) {\n 1143 |                     return true;\n 1144 |                 }\n 1145 |             }\n 1146 |             Node::Image(_) => {\n 1147 |                 return true;\n 1148 |             }\n 1149 |             Node::Text(text) => {\n 1150 |                 if text\n 1151 |                     .chunks\n 1152 |                     .iter()\n 1153 |                     .any(|t| matches!(t.text_flow, TextFlow::Path(_)))\n 1154 |                 {\n 1155 |                     return true;\n 1156 |                 }\n 1157 |             }\n 1158 |             _ => {}\n 1159 |         }"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"Two near-identical `fit_to_rect` implementations exist: one in `geom.rs` returning `Option<IntRect>`, one in `main.rs` returning `IntRect` (with an unsafe `.unwrap()`). The main.rs version is also slightly less safe (as called out in the panic finding above). Keeping both invites drift.","fix":"Expose `geom::fit_to_rect` as `pub(crate)` (or `pub`) and remove the duplicate in `main.rs`. Update `trim_pixmap` to handle the Option.","locations":[{"ref":"crates/resvg/src/geom.rs:5-30","code":"    5 \n  162 | \n  163 |     pub(crate) fn gen_clip_path_id(&mut self) -> NonEmptyString {\n  164 |         loop {\n  165 |             self.clip_path_index += 1;\n  166 |             let new_id = format!(\"clipPath{}\", self.clip_path_index);\n  167 |             let new_hash = string_hash(&new_id);\n  168 |             if !self.all_ids.contains(&new_hash) {\n  169 |                 return NonEmptyString::new(new_id).unwrap();\n  170 |             }\n  171 |         }\n  172 |     }\n  173 | \n  174 |     pub(crate) fn gen_mask_id(&mut self) -> NonEmptyString {\n  175 |         loop {\n  176 |             self.mask_index += 1;\n  177 |             let new_id = format!(\"mask{}\", self.mask_index);\n  178 |             let new_hash = string_hash(&new_id);\n  179 |             if !self.all_ids.contains(&new_hash) {\n  180 |                 return NonEmptyString::new(new_id).unwrap();\n  181 |             }\n  182 |         }\n  183 |     }\n  184 | \n  185 |     pub(crate) fn gen_filter_id(&mut self) -> NonEmptyString {\n  186 |         loop {\n  187 |             self.filter_index += 1;\n  188 |             let new_id = format!(\"filter{}\", self.filter_index);\n  189 |             let new_hash = string_hash(&new_id);\n  190 |             if !self.all_ids.contains(&new_hash) {\n  191 |                 return NonEmptyString::new(new_id).unwrap();\n  192 |             }\n  193 |         }\n  194 |     }\n  195 | \n  196 |     pub(crate) fn gen_image_id(&mut self) -> NonEmptyString {\n  197 |         loop {\n  198 |             self.image_index += 1;\n  199 |             let new_id = format!(\"image{}\", self.image_index);\n  200 |             let new_hash = string_hash(&new_id);\n  201 |             if !self.all_ids.contains(&new_hash) {\n  202 |                 return NonEmptyString::new(new_id).unwrap();\n  203 |             }\n  204 |         }\n  205 |     }"}]},{"id":"DUPLIC_3","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"`has_xlink` checks `g.mask` recursively (lines 1130-1140) and then again via `node.subroots(...)` at line 1162, since `Group::subroots` already iterates mask/clip-path/feImage roots. The mask (and feImage filters) are therefore traversed twice.","fix":"Remove the explicit mask/filter handling for Node::Group since `node.subroots` already covers them. Only the recursive `has_xlink(g)` for the group's own children needs to remain.","locations":[{"ref":"crates/usvg/src/writer.rs:1119-1145","code":" 1119 |             Node::Group(g) => {\n 1120 |                 for filter in &g.filters {\n 1121 |                     if filter\n 1122 |                         .primitives\n 1123 |                         .iter()\n 1124 |                         .any(|p| matches!(p.kind, filter::Kind::Image(_)))\n 1125 |                     {\n 1126 |                         return true;\n 1127 |                     }\n 1128 |                 }\n 1129 | \n 1130 |                 if let Some(mask) = &g.mask {\n 1131 |                     if has_xlink(mask.root()) {\n 1132 |                         return true;\n 1133 |                     }\n 1134 | \n 1135 |                     if let Some(sub_mask) = &mask.mask {\n 1136 |                         if has_xlink(&sub_mask.root) {\n 1137 |                             return true;\n 1138 |                         }\n 1139 |                     }\n 1140 |                 }\n 1141 | \n 1142 |                 if has_xlink(g) {\n 1143 |                     return true;\n 1144 |                 }\n 1145 |             }"},{"ref":"crates/usvg/src/writer.rs:1161-1165","code":" 1161 |         let mut present = false;\n 1162 |         node.subroots(|root| present |= has_xlink(root));\n 1163 |         if present {\n 1164 |             return true;\n 1165 |         }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"`PixmapExt::into_srgb`/`into_linear_rgb` call `data_mut().as_rgba_mut()` three separate times (once each for `demultiply_alpha`, the table lookup, and `multiply_alpha`). Each call materialises a new mutable slice view of the pixel buffer. While the underlying memory is the same, each function also iterates the entire image. For a single color-space conversion this means three full passes over every pixel (demultiply, table lookup, multiply) instead of one fused pass.","fix":"Fuse the three passes into a single loop that demultiplies, looks up the table, and re-multiplies in one go. This roughly cuts memory bandwidth by 3x for color-space conversions, which are invoked frequently per filter primitive.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:115-125","code":"  115 |     fn into_srgb(&mut self) {\n  116 |         demultiply_alpha(self.data_mut().as_rgba_mut());\n  117 |         from_linear_rgb(self.data_mut().as_rgba_mut());\n  118 |         multiply_alpha(self.data_mut().as_rgba_mut());\n  119 |     }\n  120 | \n  121 |     fn into_linear_rgb(&mut self) {\n  122 |         demultiply_alpha(self.data_mut().as_rgba_mut());\n  123 |         into_linear_rgb(self.data_mut().as_rgba_mut());\n  124 |         multiply_alpha(self.data_mut().as_rgba_mut());\n  125 |     }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","description":"`get_input` for `SourceGraphic` clones the entire source pixmap on every reference; for `SourceAlpha` it clones and then zeroes the RGB channels in a per-pixel loop. Both happen for every filter primitive that references them, even if a single filter chain references `SourceGraphic` ten times — the pixmap is copied ten times. Combined with the existing `Rc<tiny_skia::Pixmap>` wrapping in `Image`, this is unnecessary.","fix":"Cache `SourceGraphic` and `SourceAlpha` images on first access (e.g., compute once before the primitives loop, store in `Option<Image>` locals) and return clones of the `Rc<Pixmap>` (cheap) instead of cloning the underlying pixmap each time.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:522-545","code":"  522 |     match input {\n  523 |         usvg::filter::Input::SourceGraphic => {\n  524 |             let image = source.clone();\n  525 | \n  526 |             Ok(Image {\n  527 |                 image: Rc::new(image),\n  528 |                 region,\n  529 |                 color_space: usvg::filter::ColorInterpolation::SRGB,\n  530 |             })\n  531 |         }\n  532 |         usvg::filter::Input::SourceAlpha => {\n  533 |             let mut image = source.clone();\n  534 |             // Set RGB to black. Keep alpha as is.\n  535 |             for p in image.data_mut().as_rgba_mut() {\n  536 |                 p.r = 0;\n  537 |                 p.g = 0;\n  538 |                 p.b = 0;\n  539 |             }\n  540 | \n  541 |             Ok(Image {\n  542 |                 image: Rc::new(image),\n  543 |                 region,\n  544 |                 color_space: usvg::filter::ColorInterpolation::SRGB,\n  545 |             })"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","description":"`apply_length_adjust` builds the per-span `cluster_indexes` with an O(span_length × clusters_len) loop: for every byte index in `span.start..span.end` it does `clusters.iter().position(...)`. For large spans this is slow and then the result gets sorted/deduped. A single linear scan over `clusters` filtering by `span_contains(span, c.byte_idx)` is O(clusters_len) and avoids sort/dedup since each cluster is yielded at most once.","fix":"Replace with `let cluster_indexes: Vec<usize> = clusters.iter().enumerate().filter(|(_, c)| span_contains(span, c.byte_idx)).map(|(i, _)| i).collect();`.","locations":[{"ref":"crates/usvg/src/text/layout.rs:991-999","code":"  991 |         let mut cluster_indexes = Vec::new();\n  992 |         for i in span.start..span.end {\n  993 |             if let Some(index) = clusters.iter().position(|c| c.byte_idx.value() == i) {\n  994 |                 cluster_indexes.push(index);\n  995 |             }\n  996 |         }\n  997 |         // Complex scripts can have multi-codepoint clusters therefore we have to remove duplicates.\n  998 |         cluster_indexes.sort();\n  999 |         cluster_indexes.dedup();"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","description":"`ByteIndex::code_point_at` is O(n): it iterates `char_indices` from the start of the string for every call. It is called inside loops (`resolve_clusters_positions_horizontal`, `resolve_clusters_positions_path`, `collect_normals`) once per cluster, giving O(n²) behavior over text length. For long text chunks this is a noticeable slowdown.","fix":"Precompute a byte_idx-to-code_point map once per chunk, or maintain a running counter while iterating clusters in byte order, instead of recomputing from text origin each time.","locations":[{"ref":"crates/usvg/src/text/layout.rs:1806-1810","code":" 1806 |     pub(crate) fn code_point_at(&self, text: &str) -> usize {\n 1807 |         text.char_indices()\n 1808 |             .take_while(|(i, _)| *i != self.0)\n 1809 |             .count()\n 1810 |     }"},{"ref":"crates/usvg/src/text/layout.rs:556","code":"  556 |         let cp = offset + cluster.byte_idx.code_point_at(&chunk.text);"},{"ref":"crates/usvg/src/text/layout.rs:672","code":"  672 |         let cp = char_offset + cluster.byte_idx.code_point_at(&chunk.text);"},{"ref":"crates/usvg/src/text/layout.rs:741","code":"  741 |             let cp = char_offset + cluster.byte_idx.code_point_at(&chunk.text);"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"medium","description":"Inside the fallback loop, `fontdb.face(base_font_id)?` is called on every iteration even though the result is invariant for the duration of the loop. For a large `fontdb.faces()` set this performs O(n) redundant lookups.","fix":"Hoist the lookup out of the loop: compute `let base_face = fontdb.face(base_font_id)?;` once before iterating.","locations":[{"ref":"crates/usvg/src/text/mod.rs:158-159","code":"  158 |                 // Check that the new face has the same style.\n  159 |                 let base_face = fontdb.face(base_font_id)?;"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"medium","description":"`has_text_paths` is called regardless of `opt.preserve_text`. When `preserve_text == false`, text is flattened into `<g><path>...` and the textPath def is never referenced, so writing it is dead output (and wasted CPU).","fix":"Skip when preserve_text is false: `let has_text_paths = opt.preserve_text && has_text_paths(&tree.root);`.","locations":[{"ref":"crates/usvg/src/writer.rs:156-159","code":"  156 |     let has_text_paths = has_text_paths(&tree.root);\n  157 |     if tree.has_defs_nodes() || has_text_paths {\n  158 |         write_defs(tree, opt, &mut xml, has_text_paths);\n  159 |     }"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"medium","description":"`has_text_paths` constructs a full `Path` via `Path::new(...)` just to check `if path.is_some()`. `Path::new` calls `data.compute_tight_bounds()` (expensive — full path traversal) plus computes both bounding boxes. This is run for every textPath chunk in the tree just to compute a single boolean.","fix":"Replace the Path construction with a cheap check, e.g. `return true;` (the existence of a `TextFlow::Path` chunk is the actual signal). Or check `text_path.path` is non-empty without constructing a Path.","locations":[{"ref":"crates/usvg/src/writer.rs:586-599","code":"  586 |                     let path = Path::new(\n  587 |                         text_path.id().to_string(),\n  588 |                         true,\n  589 |                         None,\n  590 |                         None,\n  591 |                         PaintOrder::default(),\n  592 |                         ShapeRendering::default(),\n  593 |                         text_path.path.clone(),\n  594 |                         Transform::default(),\n  595 |                     );\n  596 |                     if path.is_some() {\n  597 |                         return true;\n  598 |                     }\n  599 |                 }"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"`color_matrix::apply` and `composite::arithmetic` cast their floating-point results with truncation: `(value * 255.0) as u8` instead of `(value * 255.0 + 0.5) as u8`. This systematically biases output downward by ~0.5 (consistently darker output). Other places in the same file (e.g., `multiply_alpha`, lighting outputs) correctly add `0.5` before casting.","fix":"Add `0.5` before the `as u8` cast: e.g., `(f32_bound(0.0, c, 1.0) * 255.0 + 0.5) as u8`.","locations":[{"ref":"crates/resvg/src/filter/color_matrix.rs:108-110","code":"  108 | fn from_normalized(c: f32) -> u8 {\n  109 |     (f32_bound(0.0, c, 1.0) * 255.0) as u8\n  110 | }"},{"ref":"crates/resvg/src/filter/composite.rs:43-46","code":"   43 |         let r = (calc(c1.r, c2.r, a) * 255.0) as u8;\n   44 |         let g = (calc(c1.g, c2.g, a) * 255.0) as u8;\n   45 |         let b = (calc(c1.b, c2.b, a) * 255.0) as u8;\n   46 |         let a = (a * 255.0) as u8;"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"`Image::take` calls `Rc::try_unwrap(self.image)` and falls back to `(*v).clone()` (full image copy) when the Rc has multiple references. Image gets cloned via `v.image.clone()` in `get_input` for every reference to a previously-computed filter result. With long filter chains, downstream filters that call `take()` end up performing full pixmap copies. Tracking whether a primitive's result is consumed once and never referenced again would let us preserve sole ownership.","fix":"Either avoid `Rc` (using ownership-based passing where possible) or detect single-consumer cases and remove the intermediate clone.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:310-315","code":"  310 |     fn take(self) -> Result<tiny_skia::Pixmap, Error> {\n  311 |         match Rc::try_unwrap(self.image) {\n  312 |             Ok(v) => Ok(v),\n  313 |             Err(v) => Ok((*v).clone()),\n  314 |         }\n  315 |     }"},{"ref":"crates/resvg/src/filter/mod.rs:547-555","code":"  547 |         usvg::filter::Input::Reference(name) => {\n  548 |             if let Some(v) = results.iter().rev().find(|v| v.name == *name) {\n  549 |                 Ok(v.image.clone())\n  550 |             } else {\n  551 |                 // Technically unreachable.\n  552 |                 log::warn!(\"Unknown filter primitive reference '{}'.\", name);\n  553 |                 get_input(&usvg::filter::Input::SourceGraphic, region, source, results)\n  554 |             }\n  555 |         }"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","description":"`apply_inner` calls `Pixmap::clone()` (full image copy) inside `apply_drop_shadow`, then runs blur on the clone. The unclones case (`input.into_color_space(cs)?.take()?`) already produces an owned pixmap, but the code clones it again. If `Rc::try_unwrap` succeeded in `take()`, we could mutate the input directly without the clone.","fix":"Avoid `input_pixmap.clone()` when possible. Restructure so the blur is run on the owned `input_pixmap`, and a separate buffer is kept only for the un-blurred copy needed for the second `draw_pixmap`.","locations":[{"ref":"crates/resvg/src/filter/mod.rs:585-587","code":"  585 |     let mut pixmap = tiny_skia::Pixmap::try_create(input.width(), input.height())?;\n  586 |     let input_pixmap = input.into_color_space(cs)?.take()?;\n  587 |     let mut shadow_pixmap = input_pixmap.clone();"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","description":"`font_lookup!` always clones the cached `Option<T>` on a cache hit, even for `Tree` and `Node` which contain large allocated structures. For COLR/SVG glyphs used repeatedly the clone cost can be significant.","fix":"Wrap cached values in `Arc<T>` (or `Rc<T>`) so cloning is cheap, or change callers to use the cached value by reference.","locations":[{"ref":"crates/usvg/src/parser/converter.rs:79-94","code":"   79 | macro_rules! font_lookup {\n   80 |     ($method_name:ident, $cache_map:ident, $font_variant:ident, $return_type:ty) => {\n   81 |         #[cfg(feature = \"text\")]\n   82 |         pub(crate) fn $method_name(&mut self, font: ID, glyph: GlyphId) -> Option<$return_type> {\n   83 |             let key = (font, glyph);\n   84 |             match self.$cache_map.get(&key) {\n   85 |                 Some(cache_hit) => cache_hit.clone(),\n   86 |                 None => {\n   87 |                     let lookup = self.fontdb.$font_variant(font, glyph);\n   88 |                     self.$cache_map.insert(key, lookup.clone());\n   89 |                     lookup\n   90 |                 }\n   91 |             }\n   92 |         }\n   93 |     };\n   94 | }"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","description":"Generated-id uniqueness is checked against `cache.all_ids`, which stores `u64` hashes via `DefaultHasher` rather than the original strings. A user-supplied id that happens to hash-collide with `\"linearGradient42\"` etc. silently causes the generator to skip that index and emit a different id, but if multiple collisions stack, two different generated ids could collapse onto the same string. The risk is tiny (64-bit collisions) but the design is built on a non-cryptographic hash for a correctness-critical property. The generator also fails to insert the generated id back into `all_ids`, so two consecutive calls with the same prefix may collide.","fix":"Switch `all_ids` to `HashSet<String>` and compare the full new_id directly. Also insert the newly-generated id into `all_ids` after each successful `gen_*_id` so subsequent calls don't re-emit it.","locations":[{"ref":"crates/usvg/src/parser/converter.rs:129-205","code":"  129 |     // TODO: macros?\n  130 |     pub(crate) fn gen_linear_gradient_id(&mut self) -> NonEmptyString {\n  131 |         loop {\n  132 |             self.linear_gradient_index += 1;\n  133 |             let new_id = format!(\"linearGradient{}\", self.linear_gradient_index);\n  134 |             let new_hash = string_hash(&new_id);\n  135 |             if !self.all_ids.contains(&new_hash) {\n  136 |                 return NonEmptyString::new(new_id).unwrap();\n  137 |             }\n  138 |         }\n  139 |     }\n  140 | \n  141 |     pub(crate) fn gen_radial_gradient_id(&mut self) -> NonEmptyString {\n  142 |         loop {\n  143 |             self.radial_gradient_index += 1;\n  144 |             let new_id = format!(\"radialGradient{}\", self.radial_gradient_index);\n  145 |             let new_hash = string_hash(&new_id);\n  146 |             if !self.all_ids.contains(&new_hash) {\n  147 |                 return NonEmptyString::new(new_id).unwrap();\n  148 |             }\n  149 |         }\n  150 |     }\n  151 | \n  152 |     pub(crate) fn gen_pattern_id(&mut self) -> NonEmptyString {\n  153 |         loop {\n  154 |             self.pattern_index += 1;\n  155 |             let new_id = format!(\"pattern{}\", self.pattern_index);\n  156 |             let new_hash = string_hash(&new_id);\n  157 |             if !self.all_ids.contains(&new_hash) {\n  158 |                 return NonEmptyString::new(new_id).unwrap();\n  159 |             }\n  160 |         }\n  161 |     }\n  162 | \n  163 |     pub(crate) fn gen_clip_path_id(&mut self) -> NonEmptyString {\n  164 |         loop {\n  165 |             self.clip_path_index += 1;\n  166 |             let new_id = format!(\"clipPath{}\", self.clip_path_index);\n  167 |             let new_hash = string_hash(&new_id);\n  168 |             if !self.all_ids.contains(&new_hash) {\n  169 |                 return NonEmptyString::new(new_id).unwrap();\n  170 |             }\n  171 |         }\n  172 |     }\n  173 | \n  174 |     pub(crate) fn gen_mask_id(&mut self) -> NonEmptyString {\n  175 |         loop {\n  176 |             self.mask_index += 1;\n  177 |             let new_id = format!(\"mask{}\", self.mask_index);\n  178 |             let new_hash = string_hash(&new_id);\n  179 |             if !self.all_ids.contains(&new_hash) {\n  180 |                 return NonEmptyString::new(new_id).unwrap();\n  181 |             }\n  182 |         }\n  183 |     }\n  184 | \n  185 |     pub(crate) fn gen_filter_id(&mut self) -> NonEmptyString {\n  186 |         loop {\n  187 |             self.filter_index += 1;\n  188 |             let new_id = format!(\"filter{}\", self.filter_index);\n  189 |             let new_hash = string_hash(&new_id);\n  190 |             if !self.all_ids.contains(&new_hash) {\n  191 |                 return NonEmptyString::new(new_id).unwrap();\n  192 |             }\n  193 |         }\n  194 |     }\n  195 | \n  196 |     pub(crate) fn gen_image_id(&mut self) -> NonEmptyString {\n  197 |         loop {\n  198 |             self.image_index += 1;\n  199 |             let new_id = format!(\"image{}\", self.image_index);\n  200 |             let new_hash = string_hash(&new_id);\n  201 |             if !self.all_ids.contains(&new_hash) {\n  202 |                 return NonEmptyString::new(new_id).unwrap();\n  203 |             }\n  204 |         }\n  205 |     }"},{"ref":"crates/usvg/src/parser/converter.rs:224-228","code":"  224 | fn string_hash(s: &str) -> u64 {\n  225 |     let mut h = std::collections::hash_map::DefaultHasher::new();\n  226 |     s.hash(&mut h);\n  227 |     h.finish()\n  228 | }"}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","description":"`update_paint_servers` re-evaluates `if group.is_context_element { … }` inside the `for child in &mut group.children` loop. The choice depends only on the group, not the child, so it can be hoisted out of the loop. This is on the paint-server resolution hot path.","fix":"Compute `(ctx_t, ctx_b) = if group.is_context_element { (group.abs_transform, Some(group.bounding_box)) } else { (context_transform, context_bbox) };` once before the loop, then pass them into the recursive call.","locations":[{"ref":"crates/usvg/src/parser/paint_server.rs:554-572","code":"  554 | pub fn update_paint_servers(\n  555 |     group: &mut Group,\n  556 |     context_transform: Transform,\n  557 |     context_bbox: Option<Rect>,\n  558 |     text_bbox: Option<Rect>,\n  559 |     cache: &mut Cache,\n  560 | ) {\n  561 |     for child in &mut group.children {\n  562 |         // Set context transform and bbox if applicable if the\n  563 |         // current group is a use node.\n  564 |         let (context_transform, context_bbox) = if group.is_context_element {\n  565 |             (group.abs_transform, Some(group.bounding_box))\n  566 |         } else {\n  567 |             (context_transform, context_bbox)\n  568 |         };\n  569 | \n  570 |         node_to_user_coordinates(child, context_transform, context_bbox, text_bbox, cache);\n  571 |     }\n  572 | }"}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","description":"In `process_context_paint` and `to_user_coordinates`, the fallback branch (when `Arc::get_mut` returns `None`) unconditionally clones `lg.stops` / `rg.stops` / `pat.root` even though only the gradient transform / id / units change. For deeply-nested SVGs with the same gradient referenced many times, this multiplies vector and Group allocations. A shared `Arc<Vec<Stop>>` would avoid the clone.","fix":"Refactor `BaseGradient`/`Pattern` so the heavy data (`stops`, `root`) lives behind its own `Arc` shared across copies; only the per-use header (id, transform, units) is cloned.","locations":[{"ref":"crates/usvg/src/parser/paint_server.rs:836-882","code":"  836 |         Paint::LinearGradient(lg) => {\n  837 |             let transform = lg.transform.post_concat(rev_transform);\n  838 |             *paint = Paint::LinearGradient(Arc::new(LinearGradient {\n  839 |                 x1: lg.x1,\n  840 |                 y1: lg.y1,\n  841 |                 x2: lg.x2,\n  842 |                 y2: lg.y2,\n  843 |                 base: BaseGradient {\n  844 |                     id: cache.gen_linear_gradient_id(),\n  845 |                     units: lg.units,\n  846 |                     transform,\n  847 |                     spread_method: lg.spread_method,\n  848 |                     stops: lg.stops.clone(),\n  849 |                 },\n  850 |             }));\n  851 |         }\n  852 |         Paint::RadialGradient(rg) => {\n  853 |             let transform = rg.transform.post_concat(rev_transform);\n  854 |             *paint = Paint::RadialGradient(Arc::new(RadialGradient {\n  855 |                 cx: rg.cx,\n  856 |                 cy: rg.cy,\n  857 |                 r: rg.r,\n  858 |                 fx: rg.fx,\n  859 |                 fy: rg.fy,\n  860 |                 fr: rg.fr,\n  861 |                 base: BaseGradient {\n  862 |                     id: cache.gen_radial_gradient_id(),\n  863 |                     units: rg.units,\n  864 |                     transform,\n  865 |                     spread_method: rg.spread_method,\n  866 |                     stops: rg.stops.clone(),\n  867 |                 },\n  868 |             }));\n  869 |         }\n  870 |         Paint::Pattern(pat) => {\n  871 |             let transform = pat.transform.post_concat(rev_transform);\n  872 |             *paint = Paint::Pattern(Arc::new(Pattern {\n  873 |                 id: cache.gen_pattern_id(),\n  874 |                 units: pat.units,\n  875 |                 content_units: pat.content_units,\n  876 |                 transform,\n  877 |                 rect: pat.rect,\n  878 |                 view_box: pat.view_box,\n  879 |                 root: pat.root.clone(),\n  880 |             }));\n  881 |         }\n  882 |     }"},{"ref":"crates/usvg/src/parser/paint_server.rs:947-1060","code":"  947 | impl Paint {\n  948 |     fn to_user_coordinates(&mut self, bbox: Rect, cache: &mut Cache) -> Option<()> {\n  949 |         let name = if matches!(self, Paint::Pattern(_)) {\n  950 |             \"Pattern\"\n  951 |         } else {\n  952 |             \"Gradient\"\n  953 |         };\n  954 |         let bbox = bbox\n  955 |             .to_non_zero_rect()\n  956 |             .log_none(|| log::warn!(\"{} on zero-sized shapes is not allowed.\", name))?;\n  957 | \n  958 |         // `Arc::get_mut()` allow us to modify some paint servers in-place.\n  959 |         // This reduces the amount of cloning and preserves the original ID as well.\n  960 |         match self {\n  961 |             Paint::Color(_) => {} // unreachable\n  962 |             Paint::LinearGradient(lg) => {\n  963 |                 let transform = lg.transform.post_concat(Transform::from_bbox(bbox));\n  964 |                 if let Some(lg) = Arc::get_mut(lg) {\n  965 |                     lg.base.transform = transform;\n  966 |                     lg.base.units = Units::UserSpaceOnUse;\n  967 |                 } else {\n  968 |                     *lg = Arc::new(LinearGradient {\n  969 |                         x1: lg.x1,\n  970 |                         y1: lg.y1,\n  971 |                         x2: lg.x2,\n  972 |                         y2: lg.y2,\n  973 |                         base: BaseGradient {\n  974 |                             id: cache.gen_linear_gradient_id(),\n  975 |                             units: Units::UserSpaceOnUse,\n  976 |                             transform,\n  977 |                             spread_method: lg.spread_method,\n  978 |                             stops: lg.stops.clone(),\n  979 |                         },\n  980 |                     });\n  981 |                 }\n  982 |             }\n  983 |             Paint::RadialGradient(rg) => {\n  984 |                 let transform = rg.transform.post_concat(Transform::from_bbox(bbox));\n  985 |                 if let Some(rg) = Arc::get_mut(rg) {\n  986 |                     rg.base.transform = transform;\n  987 |                     rg.base.units = Units::UserSpaceOnUse;\n  988 |                 } else {\n  989 |                     *rg = Arc::new(RadialGradient {\n  990 |                         cx: rg.cx,\n  991 |                         cy: rg.cy,\n  992 |                         r: rg.r,\n  993 |                         fx: rg.fx,\n  994 |                         fy: rg.fy,\n  995 |                         fr: rg.fr,\n  996 |                         base: BaseGradient {\n  997 |                             id: cache.gen_radial_gradient_id(),\n  998 |                             units: Units::UserSpaceOnUse,\n  999 |                             transform,\n 1000 |                             spread_method: rg.spread_method,\n 1001 |                             stops: rg.stops.clone(),\n 1002 |                         },\n 1003 |                     });\n 1004 |                 }\n 1005 |             }\n 1006 |             Paint::Pattern(patt) => {\n 1007 |                 let rect = if patt.units == Units::ObjectBoundingBox {\n 1008 |                     patt.rect.bbox_transform(bbox)\n 1009 |                 } else {\n 1010 |                     patt.rect\n 1011 |                 };\n 1012 | \n 1013 |                 if let Some(patt) = Arc::get_mut(patt) {\n 1014 |                     patt.rect = rect;\n 1015 |                     patt.units = Units::UserSpaceOnUse;\n 1016 | \n 1017 |                     if patt.content_units == Units::ObjectBoundingBox && patt.view_box.is_none() {\n 1018 |                         // No need to shift patterns.\n 1019 |                         let transform = Transform::from_scale(bbox.width(), bbox.height());\n 1020 |                         push_pattern_transform(&mut patt.root, transform);\n 1021 |                     }\n 1022 | \n 1023 |                     if let Some(view_box) = patt.view_box {\n 1024 |                         push_pattern_transform(&mut patt.root, view_box.to_transform(rect.size()));\n 1025 |                     }\n 1026 | \n 1027 |                     patt.content_units = Units::UserSpaceOnUse;\n 1028 |                 } else {\n 1029 |                     let mut root = if patt.content_units == Units::ObjectBoundingBox\n 1030 |                         && patt.view_box.is_none()\n 1031 |                     {\n 1032 |                         // No need to shift patterns.\n 1033 |                         let transform = Transform::from_scale(bbox.width(), bbox.height());\n 1034 | \n 1035 |                         let mut g = patt.root.clone();\n 1036 |                         push_pattern_transform(&mut g, transform);\n 1037 |                         g\n 1038 |                     } else {\n 1039 |                         patt.root.clone()\n 1040 |                     };\n 1041 | \n 1042 |                     if let Some(view_box) = patt.view_box {\n 1043 |                         push_pattern_transform(&mut root, view_box.to_transform(rect.size()));\n 1044 |                     }\n 1045 | \n 1046 |                     *patt = Arc::new(Pattern {\n 1047 |                         id: cache.gen_pattern_id(),\n 1048 |                         units: Units::UserSpaceOnUse,\n 1049 |                         content_units: Units::UserSpaceOnUse,\n 1050 |                         transform: patt.transform,\n 1051 |                         rect,\n 1052 |                         view_box: patt.view_box,\n 1053 |                         root,\n 1054 |                     });\n 1055 |                 }\n 1056 |             }\n 1057 |         }\n 1058 | \n 1059 |         Some(())\n 1060 |     }"}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","description":"`resolve_font_weight` and `resolve_font_size` both call `node.ancestors().collect::<Vec<_>>()` purely so they can iterate in reverse (root-first) order. For every text span and every font-size resolution, this allocates a heap Vec. The same effect can be achieved with a `SmallVec` or a recursive helper, avoiding heap allocations in the common shallow-tree case.","fix":"Replace `let nodes: Vec<_> = node.ancestors().collect(); for n in nodes.iter().rev().skip(1) { … }` with a recursive helper that walks parent-to-self, or use `smallvec::SmallVec<[_; 8]>` for the typical ancestor-chain depth.","locations":[{"ref":"crates/usvg/src/parser/text.rs:585-631","code":"  585 | fn resolve_font_weight(node: SvgNode) -> u16 {\n  586 |     fn bound(min: usize, val: usize, max: usize) -> usize {\n  587 |         std::cmp::max(min, std::cmp::min(max, val))\n  588 |     }\n  589 | \n  590 |     let nodes: Vec<_> = node.ancestors().collect();\n  591 |     let mut weight = 400;\n  592 |     for n in nodes.iter().rev().skip(1) {\n  593 |         // skip Root\n  594 |         weight = match n.attribute(AId::FontWeight).unwrap_or(\"\") {\n  595 |             \"normal\" => 400,\n  596 |             \"bold\" => 700,\n  597 |             \"100\" => 100,\n  598 |             \"200\" => 200,\n  599 |             \"300\" => 300,\n  600 |             \"400\" => 400,\n  601 |             \"500\" => 500,\n  602 |             \"600\" => 600,\n  603 |             \"700\" => 700,\n  604 |             \"800\" => 800,\n  605 |             \"900\" => 900,\n  606 |             \"bolder\" => {\n  607 |                 // By the CSS2 spec the default value should be 400\n  608 |                 // so `bolder` will result in 500.\n  609 |                 // But Chrome and Inkscape will give us 700.\n  610 |                 // Have no idea is it a bug or something, but\n  611 |                 // we will follow such behavior for now.\n  612 |                 let step = if weight == 400 { 300 } else { 100 };\n  613 | \n  614 |                 bound(100, weigh
