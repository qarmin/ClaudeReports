<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"split() in arg.rs tracks `pos` as a count of `char`s consumed from the iterator (incremented once per char at the bottom of the loop), but then uses it as a byte offset to slice the original &str `s` at `s[dollar_quote_start..pos]` when closing a $'...' dollar-quoted segment. For any input containing multi-byte UTF-8 characters before or inside a dollar-quoted segment, the char-count and the true byte-offset diverge, so the slice either panics (slicing not on a UTF-8 char boundary, or out of bounds) or silently returns the wrong byte range. Verified empirically: split(\"café $'abc'\") returns Arg(\"café\"), Arg(\"'ab\") instead of Arg(\"café\"), Arg(\"abc\"); split(\"日本語 $'abc'\") returns Arg(\"語\") instead of Arg(\"abc\"). This function is used in report.rs to re-parse the recorded command line from a report header (the round-trip used by `fclones remove`/`link`/`move`/`dedupe`), so any non-ASCII path/argument that was STFU8/dollar-quote-escaped when the report was written can come back corrupted or crash when the report is replayed for a dedupe/remove/link/move operation.","fix":"Track a true byte offset instead of a char count, e.g. advance `pos` by `c.len_utf8()` for the consumed char (or build the slice incrementally using a CharIndices iterator) so that dollar_quote_start/pos always refer to valid byte offsets into `s`.","locations":[{"ref":"fclones/src/arg.rs:246-247","code":"  246 |     let mut pos = 0;\n  247 |     let mut dollar_quote_start = 0;","lines":2,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/arg.rs#L246-L247"},{"ref":"fclones/src/arg.rs:340-360","code":"  340 |             Dollar => match c {\n  341 |                 None => return Err(ParseError::new(\"Unexpected end of input\")),\n  342 |                 Some('\\'') => {\n  343 |                     dollar_quote_start = pos + 1;\n  344 |                     DollarQuoted\n  345 |                 }\n  346 |                 Some(_) => return Err(ParseError::new(\"Expected single quote\")),\n  347 |             },\n  348 |             DollarQuoted => match c {\n  349 |                 None => return Err(ParseError::new(\"Unclosed single quote\")),\n  350 |                 Some('\\\\') => DollarQuotedBackslash,\n  351 |                 Some('\\'') => {\n  352 |                     let quoted_slice = &s[dollar_quote_start..pos].replace(\"\\\\'\", \"'\");\n  353 |                     let decoded = from_stfu8(quoted_slice).map_err(|e| {\n  354 |                         ParseError::new(format!(\"Failed to decode STFU-8 chunk: {e}\").as_str())\n  355 |                     })?;\n  356 |                     word.push(decoded.as_os_str());\n  357 |                     Unquoted\n  358 |                 }\n  359 |                 Some(_) => DollarQuoted,\n  360 |             },","lines":21,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/arg.rs#L340-L360"},{"ref":"fclones/src/arg.rs:371","code":"  371 |         pos += 1;","lines":1,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/arg.rs#L371"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In log_script, items are produced on a background thread via `s.spawn(move |_| { script.into_par_iter().for_each_with(tx, |tx, item| tx.send(item).unwrap()) });` while the main thread consumes them with `rx.recv()` and writes them with `writeln!(out, \"{line}\")?` (line 1065). If writing to `out` fails (e.g. EPIPE because the process output is piped into `head` or another program that closes the pipe early, a very realistic scenario for `fclones ... --dry-run | head`), the `?` causes the consuming closure to return early, dropping `rx`. The background thread spawned via `s.spawn` may still be mid-iteration and will call `tx.send(item).unwrap()`, which panics because the channel's receiver has been dropped. The panic is then re-raised by the final `.unwrap()` on the crossbeam scope result (line 1076), crashing the whole process instead of cleanly reporting the I/O error.","fix":"Use `tx.send(item)` and ignore/break on send failure instead of `.unwrap()` (e.g. `let _ = tx.send(item);` or use try_for_each and stop on error), so a closed receiver does not cause a panic on the producer thread.","locations":[{"ref":"fclones/src/dedupe.rs:1031-1035","code":" 1031 |         s.spawn(move |_| {\n 1032 |             script\n 1033 |                 .into_par_iter()\n 1034 |                 .for_each_with(tx, |tx, item| tx.send(item).unwrap())\n 1035 |         });","lines":5,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L1031-L1035"},{"ref":"fclones/src/dedupe.rs:1042-1069","code":" 1042 |         while let Ok((group_index, commands)) = rx.recv() {\n 1043 |             // Push the command group we received from the iterator.\n 1044 |             // We may receive them in an incorrect order, so we push them to a PriorityQueue.\n 1045 |             queue.push(\n 1046 |                 FsCommandGroup::new(group_index, commands),\n 1047 |                 Reverse(group_index), // we want to get items with lowest-index first\n 1048 |             );\n 1049 | \n 1050 |             // Process items in the queue as soon as possible to save memory.\n 1051 |             while let Some((group, _)) = queue.peek() {\n 1052 |                 // Only process the item if it is the next one we expect.\n 1053 |                 // If we see an out-of-order item, we simply need to wait for more items\n 1054 |                 // to be pushed.\n 1055 |                 if group.index != next_group_index {\n 1056 |                     break;\n 1057 |                 }\n 1058 |                 // We got the right item, let's pop it from the queue and log it:\n 1059 |                 next_group_index += 1;\n 1060 |                 let cmd_vec = queue.pop().unwrap().0.commands;\n 1061 |                 for cmd in cmd_vec {\n 1062 |                     processed_count += 1;\n 1063 |                     reclaimed_space += cmd.space_to_reclaim();\n 1064 |                     for line in cmd.to_shell_str() {\n 1065 |                         writeln!(out, \"{line}\")?;\n 1066 |                     }\n 1067 |                 }\n 1068 |             }\n 1069 |         }","lines":28,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L1042-L1069"},{"ref":"fclones/src/dedupe.rs:1076","code":" 1076 |     .unwrap()","lines":1,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L1076"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"get_mount_point() falls back to `&self.mount_points[0].0` via `unwrap_or`, whose argument is evaluated eagerly regardless of whether `find()` succeeded. `mount_points` is populated only from `sys.disks()` in DiskDevices::new(); if sysinfo reports zero disks (which can happen in containers, sandboxes, or restricted environments where /proc or disk enumeration is unavailable), `mount_points` stays empty and this indexing panics with index out of bounds. Note get_by_path() at line 285-290 is safe because it indexes into `devices[0]`, which is always populated by the synthetic \"default\" device added in new(), but get_mount_point() has no equivalent safety net since mount_points has no synthetic fallback entry.","fix":"Add a synthetic fallback mount point (e.g. \"/\" mapped to the default device index) in DiskDevices::new() the same way a default device is always added, or change get_mount_point() to use `.unwrap_or_else(|| ...)` guarded by an is_empty() check that returns a sentinel Path instead of indexing an empty vec.","locations":[{"ref":"fclones/src/device.rs:276-282","code":"  276 |     pub fn get_mount_point(&self, path: &Path) -> &Path {\n  277 |         self.mount_points\n  278 |             .iter()\n  279 |             .map(|(p, _)| p)\n  280 |             .find(|p| p.is_prefix_of(path))\n  281 |             .unwrap_or(&self.mount_points[0].0)\n  282 |     }","lines":7,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/device.rs#L276-L282"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"DiskDevices::is_empty() asserts `self.devices.is_empty()` and then unconditionally returns false. Since `devices` is documented (and guaranteed by `new()`, which always pushes a synthetic \"default\" device) to never be empty, this assert will always fail and panic whenever is_empty() is called, exactly contradicting both its own doc comment (\"Always returns false, because the default device is guaranteed to exist\") and its purpose. This is a public API method (DiskDevices is re-exported from lib.rs) so any caller invoking it crashes instead of getting `false`.","fix":"Invert the assertion to assert!(!self.devices.is_empty()) (or simply drop the assert and return false directly, since the invariant is already guaranteed by new()).","locations":[{"ref":"fclones/src/device.rs:308-312","code":"  308 |     /// Always returns false, because the default device is guaranteed to exist\n  309 |     pub fn is_empty(&self) -> bool {\n  310 |         assert!(self.devices.is_empty());\n  311 |         false\n  312 |     }","lines":5,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/device.rs#L308-L312"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"Pattern::regex_with builds two regex strings from the same trimmed pattern: anchored_regex = \"^\" + pattern + \"$\" and prefix_regex = \"^\" + pattern (no trailing $). These are not equivalent regex sources: a pattern ending in an unescaped trailing backslash (e.g. user input \"foo\\\\\") makes anchored_regex become \"^foo\\$\", which compiles fine because the appended $ is consumed as an escaped literal dollar sign. But prefix_regex becomes \"^foo\\\" (dangling backslash, nothing to escape), which fails to compile with a syntax error. Since the code unconditionally does `prefix_regex.unwrap()` only inside the Ok(anchored_regex) branch (assuming success of one implies success of the other), this panics instead of returning the PatternError that the function signature promises. Verified directly: `Pattern::regex(\"foo\\\\\")` panics at the unwrap with 'incomplete escape sequence, reached end of pattern prematurely'. This is reachable from the public `--regex` CLI mode via config.rs's compile_pattern, which calls Pattern::regex_with(s, ...) directly on raw user-supplied input.","fix":"Build prefix_regex inside the same Ok(anchored_regex) branch and propagate its own Err as a PatternError instead of unwrapping, e.g. match prefix_regex { Ok(p) => ..., Err(e) => return Err(PatternError{...}) }. Alternatively reuse the already-validated anchored_regex's compiled source and strip the trailing $ pattern-matching constraint without recompiling a second independent regex string.","locations":[{"ref":"fclones/src/pattern.rs:81-102","code":"   81 |     pub fn regex_with(pattern: &str, opts: &PatternOpts) -> Result<Pattern, PatternError> {\n   82 |         let pattern = pattern.trim_start_matches('^');\n   83 |         let pattern = pattern.trim_end_matches('$');\n   84 |         let pattern = pattern.to_string();\n   85 | \n   86 |         let anchored_regex = \"^\".to_string() + &pattern + \"$\";\n   87 |         let anchored_regex = Regex::new(anchored_regex.as_str(), opts.case_insensitive);\n   88 |         let prefix_regex = \"^\".to_string() + &pattern;\n   89 |         let prefix_regex = Regex::new(prefix_regex.as_str(), opts.case_insensitive);\n   90 | \n   91 |         match anchored_regex {\n   92 |             Ok(anchored_regex) => Ok(Pattern {\n   93 |                 src: pattern,\n   94 |                 anchored_regex,\n   95 |                 prefix_regex: prefix_regex.unwrap(),\n   96 |             }),\n   97 |             Err(e) => Err(PatternError {\n   98 |                 input: pattern,\n   99 |                 cause: e.to_string(),\n  100 |             }),\n  101 |         }\n  102 |     }","lines":22,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/pattern.rs#L81-L102"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In Regex::get_fixed_prefix, when a '*' or '?' quantifier is the very first character processed (e.g. user regex \"^*foo\" or \"^?foo\" after the leading '^' is skipped), `result` is still empty, so `result.len() - 1` underflows (panics with 'attempt to subtract with overflow' in debug builds; wraps to usize::MAX and panics in .take() iteration regardless). This is reachable from CLI: Pattern::regex_with (fclones/src/pattern.rs:81-90) strips any leading '^' from a user-supplied --regex pattern and re-adds exactly one '^', then calls Regex::new, which calls get_fixed_prefix on the resulting string. A user running fclones with `--regex` and a pattern starting with `*` or `?` (e.g. `--name-regex '*foo'`) crashes the program instead of getting a normal pattern-compile error.","fix":"Guard the subtraction: only trim when `!result.is_empty()`, e.g. `if !result.is_empty() { result = result.chars().take(result.chars().count() - 1).collect(); }` else leave result empty. Also see related multi-byte char-counting bug noted separately.","locations":[{"ref":"fclones/src/regex.rs:54-88","code":"   54 |     fn get_fixed_prefix(s: &str) -> String {\n   55 |         let mut escape = false;\n   56 |         let mut result = String::new();\n   57 |         let magic_chars = ['.', '^', '$', '(', ')', '{', '}', '[', ']', '|', '.', '+'];\n   58 | \n   59 |         for (i, c) in s.chars().enumerate() {\n   60 |             if c == '^' && i == 0 {\n   61 |                 continue;\n   62 |             }\n   63 |             if magic_chars.contains(&c) && !escape {\n   64 |                 break;\n   65 |             }\n   66 |             // these may make the previous character optional,\n   67 |             // so we erase the last added one\n   68 |             if ['?', '*'].contains(&c) && !escape {\n   69 |                 result = result.chars().take(result.len() - 1).collect();\n   70 |                 break;\n   71 |             }\n   72 |             // escaped alphabetic character means a character class,\n   73 |             // so let's stop here as well\n   74 |             if c.is_ascii_alphabetic() && escape {\n   75 |                 break;\n   76 |             }\n   77 | \n   78 |             // we\\re not adding the escape char to the output, because the output is not a regexp\n   79 |             if c == '\\\\' {\n   80 |                 escape = true;\n   81 |                 continue;\n   82 |             }\n   83 | \n   84 |             result.push(c);\n   85 |         }\n   86 | \n   87 |         result\n   88 |     }","lines":35,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/regex.rs#L54-L88"},{"ref":"fclones/src/pattern.rs:81-90","code":"   81 |     pub fn regex_with(pattern: &str, opts: &PatternOpts) -> Result<Pattern, PatternError> {\n   82 |         let pattern = pattern.trim_start_matches('^');\n   83 |         let pattern = pattern.trim_end_matches('$');\n   84 |         let pattern = pattern.to_string();\n   85 | \n   86 |         let anchored_regex = \"^\".to_string() + &pattern + \"$\";\n   87 |         let anchored_regex = Regex::new(anchored_regex.as_str(), opts.case_insensitive);\n   88 |         let prefix_regex = \"^\".to_string() + &pattern;\n   89 |         let prefix_regex = Regex::new(prefix_regex.as_str(), opts.case_insensitive);\n   90 | ","lines":10,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/pattern.rs#L81-L90"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"read_group_header parses a text report's group header line with three `.unwrap()` calls after only validating the line with a regex. The regex `[a-f0-9]+` for the hash group does not guarantee an even number of hex digits, so `FileHash::from_str(...).unwrap()` panics on `hex::decode` returning `FromHexError::OddLength` for a hash with an odd digit count. Similarly, `[0-9]+` for file_len/count has no length limit, so a report with a huge numeric literal (more digits than fit in u64/usize) makes `.parse::<u64>().unwrap()` / `.parse::<usize>().unwrap()` panic with a ParseIntError. This function reads group data piped on stdin into `fclones link/dedupe/move/remove` (see fclones/src/main.rs read_header/read_groups call sites), so a hand-edited or corrupted report crashes the process instead of returning the io::Result error the function signature promises. Contrast with read_header's parse_u64/parse_usize helpers a few lines below, which map parse errors to io::Result properly - this function should follow the same pattern.","fix":"Replace the `.unwrap()` calls with proper error propagation, e.g. `FileHash::from_str(...).map_err(|e| Error::new(ErrorKind::InvalidData, format!(\"Malformed hash: {e}\")))?` and `.parse::<u64>().map_err(|e| Error::new(ErrorKind::InvalidData, format!(\"Malformed file size: {e}\")))?`, mirroring the parse_u64/parse_usize helpers used in read_header.","locations":[{"ref":"fclones/src/report.rs:392-396","code":"  392 |         Ok(Some(GroupHeader {\n  393 |             file_hash: FileHash::from_str(captures.get(1).unwrap().as_str()).unwrap(),\n  394 |             file_len: FileLen(captures.get(2).unwrap().as_str().parse::<u64>().unwrap()),\n  395 |             count: captures.get(3).unwrap().as_str().parse::<usize>().unwrap(),\n  396 |         }))","lines":5,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/report.rs#L392-L396"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"FileHash::u128_prefix (file.rs:444-451) calls `.read_u128::<LittleEndian>().expect(\"Hash must be at least 128-bit long\")` on the raw byte buffer. This is safe today because every StreamHasher implementation produces at least 128 bits and the only non-test FileHash::from_str caller path is exclusively in dedupe.rs's #[cfg(test)] module, but FileHash is a pub struct with a public FromStr impl (file.rs:473-479) that accepts arbitrary hex strings of any length with no minimum-length validation. Any future or external code path that builds a FileHash from untrusted/short hex data (e.g. a hand-edited or corrupted results file fed back through FromStr) and then calls u128_prefix (used for sorting in group.rs:1252) will panic instead of returning an error.","fix":"Either validate minimum length (>=16 bytes) in FromStr::from_str and return Err(FromHexError) for short input, or make u128_prefix fallible (return Option<u128>/Result) instead of expect()-panicking.","locations":[{"ref":"fclones/src/file.rs:444-451","code":"  444 | impl FileHash {\n  445 |     pub fn u128_prefix(&self) -> u128 {\n  446 |         self.0\n  447 |             .as_ref()\n  448 |             .read_u128::<LittleEndian>()\n  449 |             .expect(\"Hash must be at least 128-bit long\")\n  450 |     }\n  451 | }","lines":8,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/file.rs#L444-L451"},{"ref":"fclones/src/file.rs:473-479","code":"  473 | impl FromStr for FileHash {\n  474 |     type Err = FromHexError;\n  475 | \n  476 |     fn from_str(s: &str) -> Result<Self, Self::Err> {\n  477 |         Ok(FileHash(hex::decode(s)?.into_boxed_slice()))\n  478 |     }\n  479 | }","lines":7,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/file.rs#L473-L479"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"gen-test-files/src/main.rs:23 calls `thread_rng().gen_range(1..options.max_group_size)`. If the user passes `--max-group-size 0` or `--max-group-size 1` (the `-c` flag), the range `1..0` or `1..1` is empty/invalid and rand's gen_range panics with 'cannot sample empty range' instead of producing a sensible error or a group size of 1. Default value is 5 so this only triggers when the user explicitly requests a small group size, but those are very natural values to pass (e.g. wanting at most 1 file per group / unique files only).","fix":"Validate max_group_size >= 2 up front and print a clear error, or change the range to `1..=options.max_group_size.max(1)` so 0/1 degrade gracefully to a group size of 1 instead of panicking.","locations":[{"ref":"gen-test-files/src/main.rs:22-23","code":"   22 |     for i in 0..options.count {\n   23 |         let group_size: usize = thread_rng().gen_range(1..options.max_group_size);","lines":2,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/gen-test-files/src/main.rs#L22-L23"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Sub<FileLen> for FilePos (file.rs:82-87) and Sub for FileLen (file.rs:140-145) perform raw `self.0 - rhs.0` on u64 with no checked/saturating arithmetic. The release profile (Cargo.toml [profile.release]) does not set overflow-checks = true, so in release builds a subtraction where rhs > self silently wraps to a value near u64::MAX instead of panicking. These operators are the building blocks for offset math used throughout the codebase, e.g. group.rs:1103 computes `fi.len.as_pos() - suffix_len` to find the start offset of a file's suffix chunk to hash; if suffix_len is ever computed larger than fi.len (e.g. a file shrinks between size discovery and suffix-hash phase, a classic TOCTOU during a long scan), the subtraction wraps to a huge FilePos. That huge offset is then handed to FileChunk and ultimately to File::seek via FilePos::into() -> SeekFrom::Start, causing a seek far past EOF (silently returns 0 bytes read) and silently wrong/empty hash results instead of a clear error.","fix":"Use checked_sub or saturating_sub in these Sub impls (or expose a checked_sub helper used by call sites like group.rs:1103) and return/handle a zero-length chunk or explicit error instead of silently wrapping; alternatively enable overflow-checks = true for the release profile so misuse fails loudly instead of producing wrong hashes.","locations":[{"ref":"fclones/src/file.rs:82-87","code":"   82 | impl Sub<FileLen> for FilePos {\n   83 |     type Output = FilePos;\n   84 |     fn sub(self, rhs: FileLen) -> Self::Output {\n   85 |         FilePos(self.0 - rhs.0)\n   86 |     }\n   87 | }","lines":6,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/file.rs#L82-L87"},{"ref":"fclones/src/file.rs:140-145","code":"  140 | impl Sub for FileLen {\n  141 |     type Output = FileLen;\n  142 |     fn sub(self, rhs: Self) -> Self::Output {\n  143 |         FileLen(self.0 - rhs.0)\n  144 |     }\n  145 | }","lines":6,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/file.rs#L140-L145"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In group_by_suffix, suffix_len is taken directly from the user-controllable config.max_suffix_size (no validation), while the pre_filter that selects which files get suffix-hashed only checks `g.file_len >= suffix_threshold`, where suffix_threshold is a fixed, disk-kind-derived constant (e.g. 64KB on SSD) that is completely independent of max_suffix_size. If a user passes a --max-suffix-size larger than suffix_threshold (e.g. 1MB) while a qualifying file is only just above the threshold (e.g. 70KB on an SSD), the closure computes `fi.len.as_pos() - suffix_len` via FilePos's Sub impl, which does plain `self.0 - rhs.0` on u64. This underflows: in debug builds (and tests) it panics; in release builds (this project's [profile.release] has no overflow-checks=true) it silently wraps to a huge FilePos, producing a bogus seek offset and corrupting/breaking the suffix hash for that file instead of erroring cleanly.","fix":"Either clamp/validate max_suffix_size against the file length before subtracting (e.g. `let suffix_len = min(suffix_len, fi.len);` inside the closure, or skip files where fi.len < suffix_len), or validate at config-parsing time that max_suffix_size cannot exceed reasonable bounds relative to min_size, and use checked_sub / saturating_sub when computing the start position.","locations":[{"ref":"fclones/src/group.rs:1082-1108","code":" 1082 |     let suffix_len = ctx\n 1083 |         .config\n 1084 |         .max_suffix_size\n 1085 |         .unwrap_or_else(|| suffix_len(&ctx.devices, flat_iter(&groups)));\n 1086 |     let suffix_threshold = suffix_threshold(&ctx.devices, flat_iter(&groups));\n 1087 |     let pre_filter =\n 1088 |         |g: &FileGroup<FileInfo>| g.file_len >= suffix_threshold && g.unique_count() > 1;\n 1089 |     let file_count = unique_file_count(groups.iter().filter(|g| pre_filter(g)));\n 1090 |     let progress = ctx.log.progress_bar(\n 1091 |         &ctx.phases.format(Phase::GroupBySuffix),\n 1092 |         ProgressBarLength::Items(file_count as u64),\n 1093 |     );\n 1094 | \n 1095 |     let groups = rehash(\n 1096 |         groups,\n 1097 |         pre_filter,\n 1098 |         |g| g.matches(&ctx.group_filter),\n 1099 |         &ctx.devices,\n 1100 |         FileAccess::Random,\n 1101 |         |(fi, old_hash)| {\n 1102 |             progress.inc(1);\n 1103 |             let chunk = FileChunk::new(&fi.path, fi.len.as_pos() - suffix_len, suffix_len);\n 1104 |             ctx.hasher\n 1105 |                 .hash_file_or_log_err(&chunk, |_| {})\n 1106 |                 .map(|new_hash| old_hash ^ new_hash)\n 1107 |         },\n 1108 |     );","lines":27,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/group.rs#L1082-L1108"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In the Windows variant of FsCommand::to_shell_str, the generated `mklink` commands pass arguments in the wrong order. Windows `mklink` syntax is `mklink [options] <Link> <Target>` (the new link name comes first, the existing target second), but the code emits `format!(\"mklink {} {}\", target, link)` for symlinks and `format!(\"mklink /H {} {}\", target, link)` for hardlinks, i.e. target first and link second. Anyone who runs the generated --dry-run shell script on Windows will create a link/hardlink with the arguments swapped, which either fails outright or creates a bogus link under the wrong name pointing the wrong direction. The corresponding Unix branch correctly uses `ln -s {target} {link}` / `ln {target} {link}` (where `ln`'s argument order is target-then-link), which is the opposite convention from `mklink`, so this is a straightforward copy-paste-across-platforms mistake.","fix":"Swap the arguments: `format!(\"mklink {} {}\", link, target)` and `format!(\"mklink /H {} {}\", link, target)`.","locations":[{"ref":"fclones/src/dedupe.rs:443","code":"  443 |                 result.push(format!(\"mklink {} {}\", target, link));","lines":1,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L443"},{"ref":"fclones/src/dedupe.rs:451","code":"  451 |                 result.push(format!(\"mklink /H {} {}\", target, link));","lines":1,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L451"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"FileGroup::redundant_count has a 'fast path' for when filter.root_paths is empty: it returns `self.file_count().saturating_sub(rf)`, which counts every file in the group as a separate replica. This ignores filter.group_by_id entirely. Every other place that determines replica counts for the very same group (subgroup_count, used by matches/matches_strictly, and the 'else' branch of redundant_count itself when root_paths is non-empty) goes through FileSubGroup::group(&self.files, &filter.root_paths, filter.group_by_id), which correctly merges files sharing the same FileId (hard links) into a single subgroup/replica. Since group_filter() in config.rs sets group_by_id = !match_links (true by default) and root_paths is empty unless --isolate is passed (not the default), the fast path is hit by default whenever hard-linked duplicates are present. Example: rf_over=1 (find duplicates), a group with files A and B that are hard links of each other (same FileId) plus a separate file C with identical content: subgroup_count correctly reports 2 replicas (A+B merged, C separate), but redundant_count's fast path reports file_count()=3, giving 'redundant' = 3-1 = 2 instead of the correct 1. This number feeds directly into the report's FileStats (redundant_file_count/redundant_file_size in write_report) and into stage_stats used for progress logging, so users see incorrect 'reclaimable space' statistics whenever hard links are involved and --isolate is not used (the common case).","fix":"Make the fast path honor group_by_id, e.g. only take the saturating_sub shortcut when !filter.group_by_id, or compute the deduplicated-by-id file count first (similar to FileGroup::unique_count, which already requires sorting by id) before subtracting rf. Alternatively, always go through FileSubGroup::group regardless of whether root_paths is empty, since subgroup_count already does this correctly for the matches()/matches_strictly() checks on the same struct.","locations":[{"ref":"fclones/src/group.rs:399-419","code":"  399 |     pub fn redundant_count(&self, filter: &FileGroupFilter) -> usize {\n  400 |         match filter.replication {\n  401 |             Replication::Underreplicated(_) => 0,\n  402 |             Replication::Overreplicated(rf) => {\n  403 |                 let rf = max(rf, 1);\n  404 |                 if filter.root_paths.is_empty() {\n  405 |                     // fast-path, equivalent to the code in the else branch, but way faster\n  406 |                     self.file_count().saturating_sub(rf)\n  407 |                 } else {\n  408 |                     let sub_groups =\n  409 |                         FileSubGroup::group(&self.files, &filter.root_paths, filter.group_by_id);\n  410 |                     let sub_group_lengths = sub_groups\n  411 |                         .into_iter()\n  412 |                         .map(|sg| sg.files.len())\n  413 |                         .collect_vec();\n  414 |                     let cutoff_index = min(rf, sub_group_lengths.len());\n  415 |                     sub_group_lengths[cutoff_index..].iter().sum()\n  416 |                 }\n  417 |             }\n  418 |         }\n  419 |     }","lines":21,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/group.rs#L399-L419"},{"ref":"fclones/src/group.rs:429-432","code":"  429 |     /// The number of subgroups of paths with distinct root prefix.\n  430 |     fn subgroup_count(&self, filter: &FileGroupFilter) -> usize {\n  431 |         FileSubGroup::group(&self.files, &filter.root_paths, filter.group_by_id).len()\n  432 |     }","lines":4,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/group.rs#L429-L432"},{"ref":"fclones/src/group.rs:379-384","code":"  379 |     pub fn missing_count(&self, filter: &FileGroupFilter) -> usize {\n  380 |         match filter.replication {\n  381 |             Replication::Overreplicated(_) => 0,\n  382 |             Replication::Underreplicated(rf) => rf.saturating_sub(self.subgroup_count(filter)),\n  383 |         }\n  384 |     }","lines":6,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/group.rs#L379-L384"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Both put() and get() clamp file modification times before UNIX_EPOCH to Duration::ZERO via `.duration_since(UNIX_EPOCH).unwrap_or(Duration::ZERO)`. Any file with an mtime before 1970 (possible via FAT-style filesystems, manually set timestamps with touch -d, or restored backups/archives) gets modified_timestamp_ms = 0 regardless of its actual pre-epoch timestamp. If such a file's mtime changes from one pre-1970 value to another pre-1970 value while content also changes, the cache cannot distinguish the two states (both hash to timestamp 0) and will incorrectly return the stale cached hash instead of invalidating the entry.","fix":"Propagate the duration_since error (or use a signed representation, e.g. store nanos-since-epoch as i128/i64) instead of collapsing all pre-epoch timestamps to zero, so distinct pre-1970 mtimes remain distinguishable.","locations":[{"ref":"fclones/src/cache.rs:100-105","code":"  100 |             modified_timestamp_ms: file\n  101 |                 .modified()\n  102 |                 .map_err(|e| format!(\"Unable to get file modification timestamp: {e}\"))?\n  103 |                 .duration_since(UNIX_EPOCH)\n  104 |                 .unwrap_or(Duration::ZERO)\n  105 |                 .as_millis() as u64,","lines":6,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/cache.rs#L100-L105"},{"ref":"fclones/src/cache.rs:141-146","code":"  141 |         let modified = metadata\n  142 |             .modified()\n  143 |             .map_err(|e| format!(\"Unable to get file modification timestamp: {e}\"))?\n  144 |             .duration_since(UNIX_EPOCH)\n  145 |             .unwrap_or(Duration::ZERO)\n  146 |             .as_millis() as u64;","lines":6,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/cache.rs#L141-L146"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"FsCommand::to_shell_str for the Move command (both Unix and Windows variants) emits only `mv source target` (or `cp`/`copy` + `rm`/`del`), with no directory-creation step for the target's parent directory. However, the actual execution path (FsCommand::execute -> move_rename / move_copy) always calls `Self::mkdirs(target.parent().unwrap())` before renaming or copying (lines 240 and 249), because PartitionedFileGroup::move_target reconstructs the entire source directory structure under the configured target_dir, which very likely does not exist yet on a fresh run. A user who exports a dry-run script with `fclones move --dry-run` and then executes that script will get 'No such file or directory' failures for essentially every moved file, since the script never creates the destination directories that the real execution path silently creates.","fix":"Emit a `mkdir -p <target_dir>` (Unix) / `mkdir <target_dir>` (Windows, with existence check) line before the `mv`/`cp`/`move`/`copy` command in to_shell_str, mirroring what move_rename/move_copy do at execution time.","locations":[{"ref":"fclones/src/dedupe.rs:412-425","code":"  412 |             FsCommand::Move {\n  413 |                 source,\n  414 |                 target,\n  415 |                 use_rename,\n  416 |             } => {\n  417 |                 let source = source.path.quote();\n  418 |                 let target = target.quote();\n  419 |                 if *use_rename {\n  420 |                     result.push(format!(\"mv {} {}\", &source, &target));\n  421 |                 } else {\n  422 |                     result.push(format!(\"cp {} {}\", &source, &target));\n  423 |                     result.push(format!(\"rm {}\", &source));\n  424 |                 }\n  425 |             }","lines":14,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L412-L425"},{"ref":"fclones/src/dedupe.rs:457-470","code":"  457 |             FsCommand::Move {\n  458 |                 source,\n  459 |                 target,\n  460 |                 use_rename,\n  461 |             } => {\n  462 |                 let source = source.path.quote();\n  463 |                 let target = target.quote();\n  464 |                 if *use_rename {\n  465 |                     result.push(format!(\"move {} {}\", &source, &target));\n  466 |                 } else {\n  467 |                     result.push(format!(\"copy {} {}\", &source, &target));\n  468 |                     result.push(format!(\"del {}\", &source));\n  469 |                 }\n  470 |             }","lines":14,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L457-L470"},{"ref":"fclones/src/dedupe.rs:238-253","code":"  238 |     fn move_rename(source: &Path, target: &Path) -> io::Result<()> {\n  239 |         Self::check_can_rename(source, target)?;\n  240 |         Self::mkdirs(target.parent().unwrap())?;\n  241 |         Self::unsafe_rename(source, target)?;\n  242 |         Ok(())\n  243 |     }\n  244 | \n  245 |     /// Moves the file by copying it first to another location and then removing the original.\n  246 |     /// Fails if target exists.\n  247 |     fn move_copy(source: &Path, target: &Path) -> io::Result<()> {\n  248 |         Self::check_can_rename(source, target)?;\n  249 |         Self::mkdirs(target.parent().unwrap())?;\n  250 |         Self::unsafe_copy(source, target)?;\n  251 |         Self::remove(source)?;\n  252 |         Ok(())\n  253 |     }","lines":16,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L238-L253"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In group_transformed's hash closure (lines 968-979), the transform's resulting length is written back with `fi.len = len;`, but `fi` is `&mut fg[0].file_info` inside rehash's spawn_fifo task (group.rs:650) -- only the first file of the id-group `fg` gets its `file_info.len` updated. The resulting hash, however, is applied to every file in `fg` uniformly (`for mut f in fg { f.file_hash = hash.clone(); tx.send(f).unwrap(); }`, lines 651-654). Back in rehash, the final grouping key used to build FileGroups is `(f.file_info.len, f.file_hash)` (line 591). Since `fg` groups files sharing the same FileId (e.g. hard links of one inode, see the `group_by(|f| f.file_info.id)` at line 632), if such hard-linked files are processed through the transform pipeline (config.transform set), only the representative file (fg[0]) gets the post-transform length while its hard-link siblings keep their stale pre-transform length. They then end up keyed by different (len, hash) pairs and get split into separate FileGroups, even though they are guaranteed to be byte-identical (same inode) and should never be split apart by rehash.","fix":"After computing the new length and hash for fg[0], propagate the new length to every other file in fg as well, e.g. `for mut f in fg { f.file_info.len = fg0_len; f.file_hash = hash.clone(); tx.send(f).unwrap(); }`, or key the GroupMap solely by file_hash post-transform rather than by (len, hash).","locations":[{"ref":"fclones/src/group.rs:649-654","code":"  649 |                         let old_hash = fg[0].file_hash.clone();\n  650 |                         if let Some(hash) = hash_fn((&mut fg[0].file_info, old_hash)) {\n  651 |                             for mut f in fg {\n  652 |                                 f.file_hash = hash.clone();\n  653 |                                 tx.send(f).unwrap();\n  654 |                             }","lines":6,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/group.rs#L649-L654"},{"ref":"fclones/src/group.rs:968-979","code":"  968 |         |(fi, _)| {\n  969 |             let chunk = FileChunk::new(&fi.path, FilePos(0), fi.len);\n  970 |             let result =\n  971 |                 ctx.hasher\n  972 |                     .hash_transformed_or_log_err(&chunk, |_| {})\n  973 |                     .map(|(len, hash)| {\n  974 |                         fi.len = len;\n  975 |                         hash\n  976 |                     });\n  977 |             progress.inc(1);\n  978 |             result\n  979 |         },","lines":12,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/group.rs#L968-L979"},{"ref":"fclones/src/group.rs:591","code":"  591 |         GroupMap::new(|f: HashedFileInfo| ((f.file_info.len, f.file_hash), f.file_info));","lines":1,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/group.rs#L591"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In Regex::get_fixed_prefix (fclones/src/regex.rs:68-70), when trimming the last character before a '?'/'*' quantifier, the code uses `result.len()` (byte length of the String) as the chars-to-take count for `result.chars().take(result.len() - 1)`. For any fixed prefix containing multi-byte UTF-8 characters, byte length exceeds character count, so the take() count is too large and the intended last character is NOT removed. Example: prefix \"ą\" (1 char, 2 bytes) before '*' should reduce to \"\" but `take(2-1=1)` keeps \"ą\" unchanged. This makes is_partial_match incorrectly treat the optional/repeated character as a mandatory fixed prefix character for non-ASCII patterns, producing false negatives in partial matching (used for directory-walk pruning), potentially causing the directory walker to skip directories it should descend into.","fix":"Use `result.chars().count() - 1` instead of `result.len() - 1`, or track the char count incrementally alongside `result` to avoid recomputing it.","locations":[{"ref":"fclones/src/regex.rs:68-70","code":"   68 |             if ['?', '*'].contains(&c) && !escape {\n   69 |                 result = result.chars().take(result.len() - 1).collect();\n   70 |                 break;","lines":3,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/regex.rs#L68-L70"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"try_sort_by_key (fclones/src/util.rs:18-28) documents 'Items for which the key could not be obtained are sorted last,' but the implementation maps errors to None via `f(t).map_err(...).ok()` and sorts using the default Option<K> Ord, under which None sorts BEFORE any Some(_) value. So elements whose key lookup failed are actually sorted FIRST, contradicting both the doc comment and the intended behavior. This function is used in dedupe.rs (lines 689-699) to order duplicate files by creation/modification/access time for keep/delete decisions (Priority::Newest/Oldest/etc.); if metadata retrieval fails for some files (e.g. unsupported timestamp on some filesystems), those files end up at the front of the priority order instead of the back, which can cause dedupe to keep/delete the wrong file.","fix":"Invert the ordering for the error case, e.g. sort by `Reverse(Option<K>)`-style wrapper, or implement a custom comparator that explicitly places None after Some, such as `v.sort_by(|a, b| match (f(a), f(b)) { (Ok(ka), Ok(kb)) => ka.cmp(&kb), (Ok(_), Err(_)) => Less, (Err(_), Ok(_)) => Greater, (Err(_), Err(_)) => Equal })` while still collecting errors.","locations":[{"ref":"fclones/src/util.rs:18-28","code":"   18 | /// Sorts an array using a key generation function that can fail.\n   19 | /// Items for which the key could not be obtained are sorted last.\n   20 | /// Returns vector of errors encountered when obtaining the keys.\n   21 | pub fn try_sort_by_key<T, K, E>(v: &mut [T], f: impl Fn(&T) -> Result<K, E>) -> Vec<E>\n   22 | where\n   23 |     K: Ord,\n   24 | {\n   25 |     let mut errors: Vec<E> = Vec::new();\n   26 |     v.sort_by_key(|t| f(t).map_err(|e| errors.push(e)).ok());\n   27 |     errors\n   28 | }","lines":11,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/util.rs#L18-L28"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"IgnoreStack::push (walk.rs:86-109) only loads .fdignore rules for a directory if .gitignore does NOT exist in that same directory (`if !path_buf.is_file() { path = ...fdignore... }`). If a directory contains both a .gitignore and a .fdignore, the .fdignore is completely ignored -- its rules never get applied, with no warning to the user. The doc comment ('If .gitignore file exists in given dir, creates a Gitignore struct for it... otherwise returns a cloned self') doesn't even mention this mutual exclusivity, and the existing tests (respect_gitignore/respect_fdignore in walk.rs:655-663) only exercise each ignore file in isolation, never both together, so this gap isn't caught by tests.","fix":"Load and merge rules from both .gitignore and .fdignore when both are present in the same directory (push both Gitignore structs onto the stack instead of an if/else choosing only one), and update the doc comment to describe the combined behavior.","locations":[{"ref":"fclones/src/walk.rs:86-109","code":"   86 |     pub fn push(&self, dir: &Path, log: Option<&dyn Log>) -> IgnoreStack {\n   87 |         let mut path = Arc::new(dir.clone()).resolve(Path::from(\".gitignore\"));\n   88 |         let mut path_buf = path.to_path_buf();\n   89 |         if !path_buf.is_file() {\n   90 |             path = Arc::new(dir.clone()).resolve(Path::from(\".fdignore\"));\n   91 |             path_buf = path.to_path_buf();\n   92 |         }\n   93 |         if !path_buf.is_file() {\n   94 |             return self.clone();\n   95 |         }\n   96 |         let gitignore = Gitignore::new(&path_buf);\n   97 |         if let Some(err) = gitignore.1 {\n   98 |             if let Some(log) = log {\n   99 |                 log.warn(format!(\n  100 |                     \"Error while loading ignore file {}: {}\",\n  101 |                     path.display(),\n  102 |                     err\n  103 |                 ))\n  104 |             }\n  105 |         }\n  106 |         let mut stack = self.0.as_ref().clone();\n  107 |         stack.push(gitignore.0);\n  108 |         IgnoreStack(Arc::new(stack))\n  109 |     }","lines":24,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/walk.rs#L86-L109"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"DiskDevice::min_prefix_len() and max_prefix_len() both return the exact same constant (4*1024) for every DiskKind::SSD, DiskKind::HDD, and DiskKind::Unknown(_) in min_prefix_len() (lines 96-100), making the per-disk-kind match pointless dead branching; the match only meaningfully differs in max_prefix_len(). This isn't incorrect behavior, but the redundant per-variant match in min_prefix_len() that always evaluates to the same value across all arms suggests either an incomplete tuning (someone intended to differentiate min prefix length by disk kind but never did) or unnecessary code that should just be a flat constant.","fix":"If min_prefix_len is intentionally disk-kind-independent, replace the match with a flat `FileLen(4 * 1024)`; if it was meant to be tuned per disk kind (matching the asymmetry in max_prefix_len), give SSD/HDD/Unknown distinct values.","locations":[{"ref":"fclones/src/device.rs:95-101","code":"   95 |     pub fn min_prefix_len(&self) -> FileLen {\n   96 |         FileLen(match self.disk_kind {\n   97 |             DiskKind::SSD => 4 * 1024,\n   98 |             DiskKind::HDD => 4 * 1024,\n   99 |             DiskKind::Unknown(_) => 4 * 1024,\n  100 |         })\n  101 |     }","lines":7,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/device.rs#L95-L101"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"StdLog::progress_bar (fclones/src/log.rs:102-110) is missing the `finish_and_clear()` call on the previously-installed progress bar/spinner that is present in the otherwise near-identical StdLog::spinner (lines 87-100) and StdLog::bytes_progress_bar (lines 117-131). The doc comment on line 102 explicitly states 'Clears any previous progress bar or spinner and installs a new progress bar', but the implementation does not do that. Since the trait method Log::progress_bar dispatches ProgressBarLength::Items to this exact function (line 149), every phase transition reported with a known item count (used throughout group.rs, e.g. lines 694-1129) leaves the prior bar's rendered output on screen instead of clearing it, producing visual artifacts/duplicated progress lines in the terminal.","fix":"Add the same previous-bar clearing logic used in spinner()/bytes_progress_bar(): before constructing the new ProgressBar, do `self.progress_bar.lock().unwrap().upgrade().iter().for_each(|pb| pb.finish_and_clear());`.","locations":[{"ref":"fclones/src/log.rs:102-110","code":"  102 |     /// Clears any previous progress bar or spinner and installs a new progress bar.\n  103 |     pub fn progress_bar(&self, msg: &str, len: u64) -> Arc<ProgressBar> {\n  104 |         if self.no_progress {\n  105 |             return Arc::new(ProgressBar::new_hidden());\n  106 |         }\n  107 |         let result = Arc::new(ProgressBar::new_progress_bar(msg, len));\n  108 |         *self.progress_bar.lock().unwrap() = Arc::downgrade(&result);\n  109 |         result\n  110 |     }","lines":9,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/log.rs#L102-L110"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"GroupConfig::validate's two checks duplicate nearly the same isolate-related guard-and-error-message structure (lines 378-386 and 387-399), differing only in which replication factor function is used and the error wording. Any future change to one (e.g. fixing the off-by-one phrasing or adding a new replication mode) is likely to be applied to only one copy, as already happened: the first check unconditionally checks `rf_over()` even when `unique`/`rf_under` is set (where rf_over() degenerates to 0, making the check effectively dead), while the second check has its own separate gating condition `(self.rf_under.is_some() || self.unique)`.","fix":"Factor the two checks into a single helper that takes the bound, comparison, and message template as parameters, or add a comment explaining why the first check's guard differs from the second's so the asymmetry is clearly intentional rather than a missed update.","locations":[{"ref":"fclones/src/config.rs:377-402","code":"  377 |     fn validate(&self) -> Result<(), String> {\n  378 |         if self.isolate && self.paths.len() <= self.rf_over() {\n  379 |             return Err(format!(\n  380 |                 \"The --isolate flag requires that the number of input paths ({}) \\\n  381 |                  is at least as large as the replication factor lower bound ({}). \\\n  382 |                  No files would be considered duplicate, regardless of their contents.\",\n  383 |                 self.paths.len(),\n  384 |                 self.rf_over() + 1,\n  385 |             ));\n  386 |         }\n  387 |         if self.isolate\n  388 |             && (self.rf_under.is_some() || self.unique)\n  389 |             && self.paths.len() < self.rf_under()\n  390 |         {\n  391 |             return Err(format!(\n  392 |                 \"The --isolate flag requires that the number of input paths ({}) \\\n  393 |                  is larger than the replication factor upper bound ({}). \\\n  394 |                  All files would be considered unique or under-replicated, \\\n  395 |                  regardless of their contents.\",\n  396 |                 self.paths.len(),\n  397 |                 self.rf_under() - 1,\n  398 |             ));\n  399 |         }\n  400 | \n  401 |         Ok(())\n  402 |     }","lines":26,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/config.rs#L377-L402"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"In FsCommand::execute, the result of Self::maybe_lock is propagated with `?` for Remove, SoftLink, HardLink and RefLink (e.g. line 315: `let _ = Self::maybe_lock(&file.path, should_lock)?;`), so a genuine locking error aborts the operation. In the Move branch the `?` is dropped: `let _ = Self::maybe_lock(&source.path, should_lock);` silently discards any locking error (including I/O errors distinct from ErrorKind::Unsupported) and proceeds to move the file anyway. This defeats the purpose of `should_lock` specifically for the Move operation and is inconsistent with every other branch in the same match, indicating a copy-paste omission rather than an intentional design choice.","fix":"Propagate the error like the other branches: `let _ = Self::maybe_lock(&source.path, should_lock)?;` so a real lock failure aborts the move instead of being silently ignored.","locations":[{"ref":"fclones/src/dedupe.rs:339","code":"  339 |                 let _ = Self::maybe_lock(&source.path, should_lock);","lines":1,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L339"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In FileHasher::hash_file (hasher.rs:251-253) and the identical pattern in hash_transformed (hasher.rs:311-313), `FileMetadata::new(chunk.path).ok()` silently discards the underlying io::Error (e.g. permission denied, file vanished, non-UTF8/path issues) when the cache is enabled. Because `metadata` becomes None, the derived `key` is also None, so load_hash/store_hash are skipped entirely for that file with zero diagnostic output. This is inconsistent with every other cache failure path in the same file (load_hash logs via self.log.warn at hasher.rs:411-414, store_hash logs at hasher.rs:432-434) which all surface a warning. A user running with --cache enabled gets silently degraded (uncached) hashing for any file whose metadata stat fails, with no indication in the logs that caching isn't working for those files.","fix":"Replace `.ok()` with a match/if-let that logs a warning via self.log.warn (consistent with load_hash/store_hash) when FileMetadata::new fails and the cache is active, e.g. `cache.and_then(|_| FileMetadata::new(chunk.path).map_err(|e| self.log.warn(...)).ok())`.","locations":[{"ref":"fclones/src/hasher.rs:251-253","code":"  251 |         let cache = self.cache.as_ref();\n  252 |         let metadata = cache.and_then(|_| FileMetadata::new(chunk.path).ok());\n  253 |         let metadata = metadata.as_ref();","lines":3,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/hasher.rs#L251-L253"},{"ref":"fclones/src/hasher.rs:311-313","code":"  311 |         let cache = self.cache.as_ref();\n  312 |         let metadata = cache.and_then(|_| FileMetadata::new(chunk.path).ok());\n  313 |         let metadata = metadata.as_ref();","lines":3,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/hasher.rs#L311-L313"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"restore_xattrs first removes ALL existing extended attributes from the destination file (looping over file.list_xattr() and calling remove_xattr for each, propagating any failure via ?), and only afterward re-adds the previously saved xattrs in a second loop. If set_xattr fails partway through the second loop (line 291's ? propagates the error up), the function returns Err with the destination file left in a partially-restored state: some original xattrs were stripped and never replaced, with no rollback or original-value fallback. This is invoked from reflink()'s closure (line 38) and the resulting error simply propagates up via the outer ? - the caller has no way to know the file's xattrs are now inconsistent rather than simply 'still the old destination's xattrs'.","fix":"Either restore xattrs additively/idempotently without first wiping all existing ones (only remove xattrs that are not in the saved set, then set the saved ones), or collect set_xattr failures without early-return (continue restoring the rest) and report all the partial failures together so the caller/log clearly indicates an incomplete restoration rather than treating it as a single opaque IO error.","locations":[{"ref":"fclones/src/reflink.rs:272-305","code":"  272 | #[cfg(unix)]\n  273 | fn restore_xattrs(path: &std::path::Path, xattrs: Vec<XAttr>) -> io::Result<()> {\n  274 |     use xattr::FileExt;\n  275 |     let file = fs::File::open(path)?;\n  276 |     for name in file.list_xattr()? {\n  277 |         file.remove_xattr(&name).map_err(|e| {\n  278 |             io::Error::new(\n  279 |                 e.kind(),\n  280 |                 format!(\n  281 |                     \"Failed to clear extended attribute {} of {}: {}\",\n  282 |                     name.to_string_lossy(),\n  283 |                     path.display(),\n  284 |                     e\n  285 |                 ),\n  286 |             )\n  287 |         })?;\n  288 |     }\n  289 |     for attr in xattrs {\n  290 |         if let Some(value) = attr.value {\n  291 |             file.set_xattr(&attr.name, &value).map_err(|e| {\n  292 |                 io::Error::new(\n  293 |                     e.kind(),\n  294 |                     format!(\n  295 |                         \"Failed to set extended attribute {} of {}: {}\",\n  296 |                         attr.name.to_string_lossy(),\n  297 |                         path.display(),\n  298 |                         e\n  299 |                     ),\n  300 |                 )\n  301 |             })?;\n  302 |         }\n  303 |     }\n  304 |     Ok(())\n  305 | }","lines":34,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/reflink.rs#L272-L305"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"parse_command (used to split the user-supplied --transform command string and substitute $IN/$OUT) silently drops trailing unparsable input instead of reporting an error. The nom parser chain `separated_list0(p_whitespace, p_arg)` stops as soon as it cannot make progress on the next argument and returns whatever it has consumed so far, but the caller does `result.expect(\"Parse error\").1`, which only panics on an outright Err and otherwise just takes `.1` (the partial Vec<OsString>) while discarding any unconsumed remainder of the input string. Concretely, `parse_command(\"foo $ bar\", ...)` parses to just `[\"foo\"]`, silently losing \" bar\" with no warning, because a lone `$` not followed by an alphanumeric/underscore variable name fails both the p_var and p_non_var alternatives, causing separated_list0 to stop early. Unlike pattern.rs's glob_to_regex, which explicitly checks for Ok((\"\", regex)) and reports 'Unexpected ... at end of input' otherwise, this code never validates that the whole input was consumed.","fix":"After parsing, check that the nom parser consumed the entire input (remaining == \"\") and return an io::Error describing the unparsed remainder, mirroring the pattern used in pattern.rs's glob_to_regex/glob_with. Since parse_command's signature doesn't currently return a Result, either make it fallible and propagate the error through Transform::new, or at minimum log a warning when trailing input is discarded.","locations":[{"ref":"fclones/src/transform.rs:411-441","code":"  411 | fn parse_command<F>(command: &str, substitute: F) -> Vec<OsString>\n  412 | where\n  413 |     F: Fn(&str) -> OsString,\n  414 | {\n  415 |     fn join_chars(chars: Vec<char>) -> OsString {\n  416 |         let mut result = OsString::new();\n  417 |         for c in chars {\n  418 |             result.push(c.to_string())\n  419 |         }\n  420 |         result\n  421 |     }\n  422 | \n  423 |     fn join_str(strings: Vec<OsString>) -> OsString {\n  424 |         let mut result = OsString::new();\n  425 |         for c in strings {\n  426 |             result.push(c)\n  427 |         }\n  428 |         result\n  429 |     }\n  430 | \n  431 |     let r_var = Regex::new(r\"^([[:alnum:]]|_)+\").unwrap();\n  432 |     let p_var = map(tuple((tag(\"$\"), re_find(r_var))), |(_, str)| {\n  433 |         (substitute)(str)\n  434 |     });\n  435 |     let p_non_var = map(many1(none_of(\" $\")), join_chars);\n  436 |     let p_arg = map(many1(alt((p_var, p_non_var))), join_str);\n  437 |     let p_whitespace = many1(one_of(\" \\t\"));\n  438 |     let p_args = |s| separated_list0(p_whitespace, p_arg)(s);\n  439 |     let result: IResult<&str, Vec<OsString>> = (p_args)(command);\n  440 |     result.expect(\"Parse error\").1\n  441 | }","lines":31,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/transform.rs#L411-L441"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"Walk::sorted_entries (walk.rs:401-419) silently drops two classes of errors with no logging: (1) line 406, `rd.filter_map(|e| e.ok())` discards io::Errors yielded mid-iteration by ReadDir (e.g. permission errors or I/O errors on individual directory entries while iterating); (2) line 411, `Entry::from_dir_entry(&path, e).ok()` discards the io::Error from `dir_entry.file_type()` (walk.rs:60), which can fail due to races (entry deleted between readdir and stat) or filesystem quirks. Every other error site in this file (visit_path, visit_dir, visit_link, same_fs, Walk::run) calls self.log_warn(...) so the user sees what was skipped and why; here entries simply vanish from the walk results with no trace, making it impossible for a user to tell whether a missing file was filtered out intentionally (ignore rules, hidden) or silently dropped due to an I/O error.","fix":"Replace the filter_map(|e| e.ok()) chains with explicit handling that calls self.log_warn for the Err case, mirroring the pattern already used in visit_dir's fs::read_dir error handling (walk.rs:382). Since sorted_entries is a static method without access to `self`, either thread a logger reference/closure into it or fold its body back into visit_dir where `self` is available.","locations":[{"ref":"fclones/src/walk.rs:401-419","code":"  401 |     fn sorted_entries(parent: Path, rd: ReadDir) -> impl Iterator<Item = Entry> {\n  402 |         let mut files = vec![];\n  403 |         let mut links = vec![];\n  404 |         let mut dirs = vec![];\n  405 |         let path = Arc::new(parent);\n  406 |         let mut entries: Vec<DirEntry> = rd.filter_map(|e| e.ok()).collect();\n  407 |         // Accessing entries in the order of identifiers should be faster on rotational drives\n  408 |         Self::sort_dir_entries_by_inode(&mut entries);\n  409 |         entries\n  410 |             .into_iter()\n  411 |             .filter_map(|e| Entry::from_dir_entry(&path, e).ok())\n  412 |             .for_each(|e| match e.tpe {\n  413 |                 EntryType::File => files.push(e),\n  414 |                 EntryType::SymLink => links.push(e),\n  415 |                 EntryType::Dir => dirs.push(e),\n  416 |                 EntryType::Other => {}\n  417 |             });\n  418 |         dirs.into_iter().chain(links).chain(files)\n  419 |     }","lines":19,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/walk.rs#L401-L419"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"close() flushes the cache directly via self.cache.flush() but never inspects self.flusher.err_channel for an error that the background flusher thread may have already reported from an earlier periodic flush. Background flush errors are only surfaced opportunistically inside put() on the *next* call; if put() is not called again before close() (e.g. all of a batch's puts already succeeded and the background thread reported an error from its own subsequent flush), that error is silently dropped because nothing ever calls err_channel.try_recv() again before the program exits via close().","fix":"Have close() also check self.flusher.err_channel.try_recv() (in addition to the direct flush) and return/log any pending background flush error before returning Ok.","locations":[{"ref":"fclones/src/cache.rs:168-174","code":"  168 |     /// Flushes all unwritten data and closes the cache.\n  169 |     pub fn close(self) -> Result<(), Error> {\n  170 |         self.cache\n  171 |             .flush()\n  172 |             .map_err(|e| format!(\"Failed to flush cache: {e}\"))?;\n  173 |         Ok(())\n  174 |     }","lines":7,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/cache.rs#L168-L174"},{"ref":"fclones/src/cache.rs:115-119","code":"  115 |         // Check for cache flush errors. If there were errors, report them to the caller.\n  116 |         match self.flusher.err_channel.try_recv() {\n  117 |             Ok(err) => Err(err),\n  118 |             Err(_) => Ok(()),\n  119 |         }","lines":5,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/cache.rs#L115-L119"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"read_first_non_comment_line treats both a genuine EOF and an empty/blank input line identically: read_line() returning 0 bytes (true EOF) and a line that trims to empty (e.g. a stray blank line in the middle of a hand-edited report) both produce `Ok(None)`, which callers interpret as 'no more groups' rather than a malformed-input error. This silently truncates report reading instead of surfacing a parse error for unexpected blank lines.","fix":"Distinguish actual EOF (read_line returns Ok(0)) from a blank/whitespace-only line that appears before EOF; treat the latter as a malformed-data error rather than silently stopping iteration.","locations":[{"ref":"fclones/src/report.rs:359-372","code":"  359 |     fn read_first_non_comment_line(&mut self) -> io::Result<Option<&str>> {\n  360 |         loop {\n  361 |             self.line_buf.clear();\n  362 |             self.stream.read_line(&mut self.line_buf)?;\n  363 |             let line = self.line_buf.trim();\n  364 |             if line.is_empty() {\n  365 |                 return Ok(None);\n  366 |             }\n  367 |             if !line.starts_with('#') {\n  368 |                 break;\n  369 |             }\n  370 |         }\n  371 |         Ok(Some(self.line_buf.trim()))\n  372 |     }","lines":14,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/report.rs#L359-L372"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"main() unconditionally calls std::env::current_dir() and exits the whole process if it fails, even though only the Command::Move branch actually uses the resulting `cwd` value. Commands like Group, Remove, Link, Dedupe, and Complete never reference `cwd`, so if the current working directory has been deleted or is otherwise inaccessible (a real possibility, e.g. running from a directory removed by another process), those unrelated commands fail with a misleading \"cannot determine current working directory\" error instead of running normally.","fix":"Compute cwd lazily only inside the Command::Move branch (where it's actually needed), e.g. by moving the std::env::current_dir() call and its error handling into that match arm.","locations":[{"ref":"fclones/src/main.rs:272-278","code":"  272 |     let cwd = match std::env::current_dir() {\n  273 |         Ok(cwd) => cwd,\n  274 |         Err(e) => {\n  275 |             log.err(format!(\"Cannot determine current working directory: {e}\"));\n  276 |             exit(1);\n  277 |         }\n  278 |     };","lines":7,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/main.rs#L272-L278"},{"ref":"fclones/src/main.rs:295-299","code":"  295 |         Command::Move { config, target } => {\n  296 |             let target = fclones::Path::from(target);\n  297 |             let target = Arc::new(fclones::Path::from(cwd)).resolve(target);\n  298 |             run_dedupe(DedupeOp::Move(Arc::new(target)), config, &log)\n  299 |         }","lines":5,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/main.rs#L295-L299"}]},{"id":"PERF_2","t
