ype":"performance","type_label":"Performance","severity":"low","easy":false,"description":"write_as_json always rebuilds every FileGroup by cloning each Path/FileHash into a new Vec via `f.as_ref().clone()`, even when the caller already owns the groups (the common case when called from the `write` dispatcher with owned data). Since FileGroup, Path and FileHash all already implement Serialize directly, the intermediate clone-and-rebuild is unnecessary allocation/copy overhead on every group during JSON export of potentially large duplicate-file reports.","fix":"Serialize directly from references (e.g. implement Serialize for a wrapper that holds `&FileGroup<P>` / iterate and serialize `g.as_ref()` directly) instead of materializing a fully-owned cloned FileGroup for every entry.","locations":[{"ref":"fclones/src/report.rs:271-294","code":"  271 |     pub fn write_as_json<I, G, P>(&mut self, header: &ReportHeader, groups: I) -> io::Result<()>\n  272 |     where\n  273 |         I: IntoIterator<Item = G>,\n  274 |         G: AsRef<FileGroup<P>>,\n  275 |         P: AsRef<Path>,\n  276 |     {\n  277 |         let groups = groups.into_iter().map(|g| FileGroup {\n  278 |             file_len: g.as_ref().file_len,\n  279 |             file_hash: g.as_ref().file_hash.clone(),\n  280 |             files: g\n  281 |                 .as_ref()\n  282 |                 .files\n  283 |                 .iter()\n  284 |                 .map(|f| f.as_ref().clone())\n  285 |                 .collect(),\n  286 |         });\n  287 |         let report = SerializableReport {\n  288 |             header,\n  289 |             groups: IteratorWrapper(Cell::new(Some(groups))),\n  290 |         };\n  291 | \n  292 |         serde_json::to_writer_pretty(&mut self.out, &report)?;\n  293 |         Ok(())\n  294 |     }","lines":24,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/report.rs#L271-L294"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In Walk::visit_link (walk.rs:330-340), resolve_link (walk.rs:422-433) already performs a stat on the symlink target via `link_buf.metadata()` to determine entry_type. When follow_links and one_fs are both set, the code then calls same_fs(&target, dev) (walk.rs:334), which internally calls FileId::new(path) -> fs::metadata(path) (file.rs:208-220 unix path), performing a second, redundant stat syscall on the exact same already-resolved target path within the same logical operation.","fix":"Have resolve_link return the already-fetched Metadata (or just its device id) alongside the EntryType so same_fs can reuse it instead of re-stating the same path; e.g. extract device id from link_buf.metadata() at the same point entry_type is computed.","locations":[{"ref":"fclones/src/walk.rs:330-341","code":"  330 |         if self.follow_links || self.report_links {\n  331 |             match self.resolve_link(&path) {\n  332 |                 Ok((_, EntryType::File)) if self.report_links => self.visit_file(path, state),\n  333 |                 Ok((target, _)) => {\n  334 |                     if self.follow_links && (!self.one_fs || self.same_fs(&target, dev)) {\n  335 |                         self.visit_path(target, dev, scope, level, gitignore, state);\n  336 |                     }\n  337 |                 }\n  338 |                 Err(e) => self.log_warn(format!(\"Failed to read link {}: {}\", path.display(), e)),\n  339 |             }\n  340 |         }\n  341 |     }","lines":12,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/walk.rs#L330-L341"},{"ref":"fclones/src/walk.rs:422-433","code":"  422 |     fn resolve_link(&self, link: &Path) -> io::Result<(Path, EntryType)> {\n  423 |         let link_buf = link.to_path_buf();\n  424 |         let target = read_link(&link_buf)?;\n  425 |         let entry_type = EntryType::from(link_buf.metadata()?.file_type());\n  426 |         let target = Path::from(target);\n  427 |         let resolved = if target.is_relative() {\n  428 |             link.parent().unwrap().join(target)\n  429 |         } else {\n  430 |             target\n  431 |         };\n  432 |         Ok((self.absolute(resolved), entry_type))\n  433 |     }","lines":12,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/walk.rs#L422-L433"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"Path::capacity() (used by to_path_buf() to pre-size the resulting OsString) sums `c.to_bytes().len() + 1` per component, treating the result as a byte count. On Windows, OsString::with_capacity's unit is platform-defined (effectively UTF-16 code unit count internally for the std implementation), so the capacity hint computed from UTF-8 byte lengths can under- or over-estimate the actual buffer needed once the bytes are decoded and re-encoded as UTF-16 in c_to_os_str. This does not cause incorrect output (capacity is just a hint, the Vec/OsString will reallocate as needed), only a possible extra reallocation on Windows.","fix":"Low priority: if precise pre-sizing matters on Windows, compute capacity in UTF-16 code units there (e.g. via c.to_bytes().len() as a rough 1:1 ASCII-fallback approximation is already what happens, so this is likely fine to leave as-is given the modest win); otherwise leave as a known minor inefficiency.","locations":[{"ref":"fclones/src/path.rs:188-194","code":"  188 |     /// Converts this path to a standard library path buffer.\n  189 |     /// We need this to be able to use this path with other standard library I/O functions.\n  190 |     pub fn to_path_buf(&self) -> PathBuf {\n  191 |         let mut result = PathBuf::from(OsString::with_capacity(self.capacity()));\n  192 |         self.for_each_component(|c| result.push(c_to_os_str(c)));\n  193 |         result\n  194 |     }","lines":7,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/path.rs#L188-L194"},{"ref":"fclones/src/path.rs:280-285","code":"  280 |     /// Estimates size of this path in bytes\n  281 |     fn capacity(&self) -> usize {\n  282 |         let mut result: usize = 0;\n  283 |         self.for_each_component(|c| result += c.to_bytes().len() + 1);\n  284 |         result\n  285 |     }","lines":6,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/path.rs#L280-L285"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In reflink_overwrite, the ioctl error path special-cases libc::EOPNOTSUPP and libc::EINVAL with comment-only, functionally empty if/else-if branches, then falls through to `Err(err)` unconditionally regardless of which branch (or neither) matched. The #[allow(clippy::if_same_then_else)] attribute was added specifically to silence the warning this redundancy triggers, confirming the branches really do produce identical behavior. The comments describing each error code's meaning are useful documentation, but the branching control flow itself does nothing - the same Err(err) is returned in all cases including codes other than EOPNOTSUPP/EINVAL.","fix":"Either remove the if/else-if dead branches and keep the explanatory comments as plain comments above the unconditional Err(err) return, or, if differentiated handling was intended (e.g. distinct log messages or different cleanup for EINVAL vs EOPNOTSUPP), implement that actual differentiation instead of empty blocks.","locations":[{"ref":"fclones/src/reflink.rs:157-167","code":"  157 |     #[allow(clippy::if_same_then_else)]\n  158 |     if ret == -1 {\n  159 |         let err = io::Error::last_os_error();\n  160 |         let code = err.raw_os_error().unwrap(); // unwrap () Ok, created from `last_os_error()`\n  161 |         if code == libc::EOPNOTSUPP { // 95\n  162 |              // Filesystem does not supported reflinks.\n  163 |              // No cleanup required, file is left untouched.\n  164 |         } else if code == libc::EINVAL { // 22\n  165 |              // Source filesize was larger than destination.\n  166 |         }\n  167 |         Err(err)","lines":11,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/reflink.rs#L157-L167"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"The magic_chars array in Regex::get_fixed_prefix contains the character '.' twice: `['.', '^', '$', '(', ')', '{', '}', '[', ']', '|', '.', '+']` (first and second-to-last elements). The duplicate is redundant - it doesn't change behavior since array membership check (`contains`) is unaffected by duplicates - but it suggests a typo where a different intended character (e.g. one more PCRE metacharacter) was meant to be added instead.","fix":"Remove the duplicate '.' entry, or replace it with the intended character if one was meant to be added.","locations":[{"ref":"fclones/src/regex.rs:57","code":"   57 |         let magic_chars = ['.', '^', '$', '(', ')', '{', '}', '[', ']', '|', '.', '+'];","lines":1,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/regex.rs#L57"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","easy":true,"description":"SPECIAL_CHARS in arg.rs is meant to list shell metacharacters that require quoting (per the function doc: \"Escapes special characters... so that it will retain its literal meaning when used as a part of command in Unix shell\"). The array contains the character '˜' (U+02DC SMALL TILDE) instead of the actual ASCII tilde '~' (U+007E), which is the character with shell meaning (home-directory expansion). A literal filename starting with '~' is therefore never quoted by quote(), so when the generated shell commands (used in dedupe.rs for mv/rm script generation, and in report.rs/arg::join for command-line reconstruction) are pasted into or sourced by a real shell, an unquoted leading '~' undergoes unintended tilde expansion instead of being treated as a literal character.","fix":"Replace '˜' (U+02DC) with the ASCII tilde '~' (U+007E) in the SPECIAL_CHARS array.","locations":[{"ref":"fclones/src/arg.rs:129-132","code":"  129 | const SPECIAL_CHARS: [char; 25] = [\n  130 |     '|', '&', ';', '<', '>', '(', ')', '{', '}', '$', '`', '\\\\', '\\'', '\"', ' ', '\\t', '*', '?',\n  131 |     '+', '[', ']', '#', '˜', '=', '%',\n  132 | ];","lines":4,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/arg.rs#L129-L132"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","easy":true,"description":"The doc comment on `may_drop` states: \"Returns true if given path matches all of the `drop` patterns.\" The implementation actually returns true if the path matches ANY name pattern OR ANY path pattern (`matches_any_name() || matches_any_path()`), not all of them. Since this function directly gates which files are eligible to be deleted/linked-over, a maintainer relying on the comment's \"matches all\" semantics when reasoning about or modifying drop-pattern behavior could introduce a real deletion-logic bug.","fix":"Fix the comment to match the implementation, e.g.: \"Returns true if given path matches any of the `drop` name patterns or any of the `drop` path patterns (or if no drop patterns are configured at all).\"","locations":[{"ref":"fclones/src/dedupe.rs:557-558","code":"  557 | /// Returns true if given path matches all of the `drop` patterns.\n  558 | /// If there are no `drop` patterns, returns true.","lines":2,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L557-L558"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on GroupMap::add says \"Note, this doesn't take `&mut self` so this can be called from safely from many threads,\" but the very next line is `pub fn add(&mut self, item: T)`, which does take `&mut self`. The comment is stale/wrong and could mislead a future maintainer into thinking GroupMap::add can be safely invoked concurrently from multiple threads on a shared reference (e.g. via Arc<GroupMap>), when in fact it requires exclusive mutable access. Current call sites are all safe because they only ever call add from a single thread (e.g. rehash drains the channel and calls hash_map_ref.add serially), but the comment doesn't reflect that constraint at all.","fix":"Fix the comment to accurately describe the actual thread-safety contract, e.g. \"Note: this takes `&mut self`, so concurrent producers must merge through a channel/mutex and call add from a single consumer thread, as done in rehash.\"","locations":[{"ref":"fclones/src/group.rs:82-87","code":"   82 |     /// Adds an item to the map.\n   83 |     /// Note, this doesn't take `&mut self` so this can be called from safely from many threads.\n   84 |     pub fn add(&mut self, item: T) {\n   85 |         let (key, new_item) = (self.split_fn)(item);\n   86 |         self.groups.entry(key).or_default().push(new_item);\n   87 |     }","lines":6,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/group.rs#L82-L87"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"reflink_overwrite's function doc comment states it expects target and link to be 'equally sized', and the inline comment at line 136 claims '.truncate(true) is not required because the files are already of the same size'. This is false for the first of its two call sites in linux_reflink: `reflink_overwrite(&std_link, &std_tmp)` at line 104 reflinks the original destination file (std_link, real size) onto std_tmp, a freshly created temp file opened with .create(true) that does not exist yet and therefore has size 0 before the call. The function only behaves correctly here because the underlying FICLONE ioctl itself resizes the destination as part of the clone (that's the whole point of using it for backup), not because of any equal-size precondition actually being true at this call site.","fix":"Correct the doc comment and inline comment to clarify that FICLONE itself handles destination resizing and that the 'equal size' assumption only applies to the second call site (fs_target -> std_link, both presumed duplicate files), not the backup call (std_link -> std_tmp, a brand-new empty file).","locations":[{"ref":"fclones/src/reflink.rs:128-141","code":"  128 | /// Reflink `target` to `link` and expect these two files to be equally sized.\n  129 | #[cfg(any(target_os = \"linux\", target_os = \"android\"))]\n  130 | fn reflink_overwrite(target: &std::path::Path, link: &std::path::Path) -> io::Result<()> {\n  131 |     use nix::request_code_write;\n  132 |     use std::os::unix::prelude::AsRawFd;\n  133 | \n  134 |     let src = fs::File::open(target)?;\n  135 | \n  136 |     // This operation does not require `.truncate(true)` because the files are already of the same size.\n  137 |     let dest = fs::OpenOptions::new()\n  138 |         .create(true)\n  139 |         .truncate(false)\n  140 |         .write(true)\n  141 |         .open(link)?;","lines":14,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/reflink.rs#L128-L141"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on Walk::absolute (walk.rs:450-453) ends mid-sentence: 'File symlinks are not resolved, because we need' -- the rationale is never completed, leaving the reader without the actual justification for the documented behavior.","fix":"Finish the sentence explaining why file symlinks are intentionally left unresolved here (e.g. because resolving them is the job of visit_link/report_links downstream, and resolving eagerly here would break --report-links semantics), or remove the dangling clause.","locations":[{"ref":"fclones/src/walk.rs:453","code":"  453 |     /// File symlinks are not resolved, because we need","lines":1,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/walk.rs#L453"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"FileHasher::hash_file (hasher.rs:263-277) and FileHasher::hash_transformed (hasher.rs:331-345) both contain a near-identical 14-line `match self.algorithm { ... }` dispatch block enumerating every HashFn variant behind the same feature gates, differing only in which inner function is called (file_hash vs stream_hash) and its argument list. Together these are 28 near-identical lines that must be kept in sync by hand whenever a new HashFn variant or feature gate is added; it would be easy to add a variant to one match and forget the other (as nearly happened, since the variant lists are otherwise letter-for-letter identical).","fix":"Factor the per-algorithm dispatch into a single macro or a generic dispatch function taking a closure parameterized by the hashing function (file_hash vs stream_hash signature), so new HashFn variants only need to be added in one place.","locations":[{"ref":"fclones/src/hasher.rs:263-277","code":"  263 |         let hash = match self.algorithm {\n  264 |             HashFn::Metro => file_hash::<MetroHash128>(chunk, self.buf_len, progress),\n  265 |             #[cfg(feature = \"xxhash\")]\n  266 |             HashFn::Xxhash => file_hash::<Xxh3>(chunk, self.buf_len, progress),\n  267 |             #[cfg(feature = \"blake3\")]\n  268 |             HashFn::Blake3 => file_hash::<blake3::Hasher>(chunk, self.buf_len, progress),\n  269 |             #[cfg(feature = \"sha2\")]\n  270 |             HashFn::Sha256 => file_hash::<Sha256>(chunk, self.buf_len, progress),\n  271 |             #[cfg(feature = \"sha2\")]\n  272 |             HashFn::Sha512 => file_hash::<Sha512>(chunk, self.buf_len, progress),\n  273 |             #[cfg(feature = \"sha3\")]\n  274 |             HashFn::Sha3_256 => file_hash::<Sha3_256>(chunk, self.buf_len, progress),\n  275 |             #[cfg(feature = \"sha3\")]\n  276 |             HashFn::Sha3_512 => file_hash::<Sha3_512>(chunk, self.buf_len, progress),\n  277 |         }?;","lines":15,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/hasher.rs#L263-L277"},{"ref":"fclones/src/hasher.rs:331-345","code":"  331 |         let hash = match self.algorithm {\n  332 |             HashFn::Metro => stream_hash::<MetroHash128>(stream, chunk.len, buf_len, |_| {}),\n  333 |             #[cfg(feature = \"xxhash\")]\n  334 |             HashFn::Xxhash => stream_hash::<Xxh3>(stream, chunk.len, buf_len, |_| {}),\n  335 |             #[cfg(feature = \"blake3\")]\n  336 |             HashFn::Blake3 => stream_hash::<blake3::Hasher>(stream, chunk.len, buf_len, |_| {}),\n  337 |             #[cfg(feature = \"sha2\")]\n  338 |             HashFn::Sha256 => stream_hash::<Sha256>(stream, chunk.len, buf_len, |_| {}),\n  339 |             #[cfg(feature = \"sha2\")]\n  340 |             HashFn::Sha512 => stream_hash::<Sha512>(stream, chunk.len, buf_len, |_| {}),\n  341 |             #[cfg(feature = \"sha3\")]\n  342 |             HashFn::Sha3_256 => stream_hash::<Sha3_256>(stream, chunk.len, buf_len, |_| {}),\n  343 |             #[cfg(feature = \"sha3\")]\n  344 |             HashFn::Sha3_512 => stream_hash::<Sha3_512>(stream, chunk.len, buf_len, |_| {}),\n  345 |         };","lines":15,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/hasher.rs#L331-L345"}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"DedupeConfig.rf_over uses `value_parser = clap::value_parser!(u64).range(1..)` (rejects 0) while GroupConfig.rf_over and GroupConfig.rf_under (both Option<usize>) have no range/value validation at all, allowing `--rf-over 0` or `--rf-under 0` from `fclones group`. The inconsistency means the two `rf_over` fields (one in GroupConfig, one in DedupeConfig) that conceptually represent the same setting have different validity domains, which is easy to miss when maintaining both in parallel.","fix":"Apply the same range validation (or document explicitly why 0 is meaningful for GroupConfig.rf_over but not for DedupeConfig.rf_over) so the two parallel definitions stay consistent.","locations":[{"ref":"fclones/src/config.rs:253-254","code":"  253 |     #[arg(short('n'), long, conflicts_with(\"rf_under\"), value_name(\"COUNT\"))]\n  254 |     pub rf_over: Option<usize>,","lines":2,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/config.rs#L253-L254"},{"ref":"fclones/src/config.rs:610-614","code":"  610 |     #[arg(\n  611 |         short = 'n', long, value_name = \"COUNT\",\n  612 |         value_parser = clap::value_parser!(u64).range(1..)\n  613 |     )]\n  614 |     pub rf_over: Option<usize>,","lines":5,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/config.rs#L610-L614"}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"FsCommand::execute (lines 312-348) and FsCommand::to_shell_str (two cfg-gated copies, lines 376-428 and 431-473) both encode the exact same set of per-variant behaviors (lock, safe-remove-and-replace, move-with-fallback) but as three independent, hand-maintained switch statements. Any future change to the move/link semantics (such as the missing mkdir step or the mklink argument order bugs found in this audit) has to be replicated correctly across all three, and nothing enforces that consistency, which is how the to_shell_str bugs in this file arose in the first place.","fix":"Consider deriving the shell-script representation from the same per-command step list used by execute() (e.g. a small enum of primitive steps: Lock, MkdirP(path), Rename(a,b), Copy(a,b), Remove(a)) so that execute() and to_shell_str() interpret one shared command sequence instead of being maintained as parallel implementations.","locations":[{"ref":"fclones/src/dedupe.rs:312-348","code":"  312 |     pub fn execute(&self, should_lock: bool, log: &dyn Log) -> io::Result<FileLen> {\n  313 |         match self {\n  314 |             FsCommand::Remove { file } => {\n  315 |                 let _ = Self::maybe_lock(&file.path, should_lock)?;\n  316 |                 Self::remove(&file.path)?;\n  317 |                 Ok(file.metadata.len())\n  318 |             }\n  319 |             FsCommand::SoftLink { target, link } => {\n  320 |                 let _ = Self::maybe_lock(&link.path, should_lock)?;\n  321 |                 Self::safe_remove(&link.path, |link| Self::symlink(&target.path, link), log)?;\n  322 |                 Ok(link.metadata.len())\n  323 |             }\n  324 |             FsCommand::HardLink { target, link } => {\n  325 |                 let _ = Self::maybe_lock(&link.path, should_lock)?;\n  326 |                 Self::safe_remove(&link.path, |link| Self::hardlink(&target.path, link), log)?;\n  327 |                 Ok(link.metadata.len())\n  328 |             }\n  329 |             FsCommand::RefLink { target, link } => {\n  330 |                 let _ = Self::maybe_lock(&link.path, should_lock)?;\n  331 |                 crate::reflink::reflink(target, link, log)?;\n  332 |                 Ok(link.metadata.len())\n  333 |             }\n  334 |             FsCommand::Move {\n  335 |                 source,\n  336 |                 target,\n  337 |                 use_rename,\n  338 |             } => {\n  339 |                 let _ = Self::maybe_lock(&source.path, should_lock);\n  340 |                 let len = source.metadata.len();\n  341 |                 if *use_rename && Self::move_rename(&source.path, target).is_ok() {\n  342 |                     return Ok(len);\n  343 |                 }\n  344 |                 Self::move_copy(&source.path, target)?;\n  345 |                 Ok(len)\n  346 |             }\n  347 |         }\n  348 |     }","lines":37,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L312-L348"},{"ref":"fclones/src/dedupe.rs:376-428","code":"  376 |     pub fn to_shell_str(&self) -> Vec<String> {\n  377 |         let mut result = Vec::new();\n  378 |         match self {\n  379 |             FsCommand::Remove { file, .. } => {\n  380 |                 let path = file.path.quote();\n  381 |                 result.push(format!(\"rm {path}\"));\n  382 |             }\n  383 |             FsCommand::SoftLink { target, link, .. } => {\n  384 |                 let tmp = Self::temp_file(&link.path);\n  385 |                 let target = target.path.quote();\n  386 |                 let link = link.path.quote();\n  387 |                 result.push(format!(\"mv {} {}\", link, tmp.quote()));\n  388 |                 result.push(format!(\"ln -s {target} {link}\"));\n  389 |                 result.push(format!(\"rm {}\", tmp.quote()));\n  390 |             }\n  391 |             FsCommand::HardLink { target, link, .. } => {\n  392 |                 let tmp = Self::temp_file(&link.path);\n  393 |                 let target = target.path.quote();\n  394 |                 let link = link.path.quote();\n  395 |                 result.push(format!(\"mv {} {}\", link, tmp.quote()));\n  396 |                 result.push(format!(\"ln {target} {link}\"));\n  397 |                 result.push(format!(\"rm {}\", tmp.quote()));\n  398 |             }\n  399 |             FsCommand::RefLink { target, link, .. } => {\n  400 |                 let tmp = Self::temp_file(&link.path);\n  401 |                 let target = target.path.quote();\n  402 |                 let link = link.path.quote();\n  403 |                 // Not really what happens on Linux, there the `mv` is also a reflink.\n  404 |                 result.push(format!(\"mv {} {}\", link, tmp.quote()));\n  405 |                 if cfg!(target_os = \"macos\") {\n  406 |                     result.push(format!(\"cp -c {target} {link}\"));\n  407 |                 } else {\n  408 |                     result.push(format!(\"cp --reflink=always {target} {link}\"));\n  409 |                 };\n  410 |                 result.push(format!(\"rm {}\", tmp.quote()));\n  411 |             }\n  412 |             FsCommand::Move {\n  413 |                 source,\n  414 |                 target,\n  415 |                 use_rename,\n  416 |             } => {\n  417 |                 let source = source.path.quote();\n  418 |                 let target = target.quote();\n  419 |                 if *use_rename {\n  420 |                     result.push(format!(\"mv {} {}\", &source, &target));\n  421 |                 } else {\n  422 |                     result.push(format!(\"cp {} {}\", &source, &target));\n  423 |                     result.push(format!(\"rm {}\", &source));\n  424 |                 }\n  425 |             }\n  426 |         }\n  427 |         result\n  428 |     }","lines":53,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L376-L428"},{"ref":"fclones/src/dedupe.rs:431-473","code":"  431 |     pub fn to_shell_str(&self) -> Vec<String> {\n  432 |         let mut result = Vec::new();\n  433 |         match self {\n  434 |             FsCommand::Remove { file, .. } => {\n  435 |                 let path = file.path.quote();\n  436 |                 result.push(format!(\"del {}\", path));\n  437 | 16cf23/fclones/src/dedupe.rs#L431-L473"}]},{"id":"ARCH_3","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"rehash (lines 563-686) mixes several distinct responsibilities in one function: partitioning by pre/post filters, partitioning by device, per-device sorting and thread-pool selection, semaphore-based task throttling, an unsafe lifetime transmute to work around rayon scope limitations, and final regrouping into FileGroup via GroupMap. At over 120 lines with nested closures, an unsafe block, and a hand-rolled channel-based synchronization protocol, it is hard to verify correctness locally (as shown by the silent length-propagation bug found separately) and hard to unit-test the sub-steps in isolation.","fix":"Consider splitting rehash into smaller named helpers (e.g. spawn_device_hashing_tasks, collect_hashed_results) so the unsafe transmute, the semaphore throttling, and the regrouping logic can be reasoned about and tested independently.","locations":[{"ref":"fclones/src/group.rs:563-686","code":"  563 | fn rehash<'a, F1, F2, H>(\n  564 |     groups: Vec<FileGroup<FileInfo>>,\n  565 |     group_pre_filter: F1,\n  566 |     group_post_filter: F2,\n  567 |     devices: &DiskDevices,\n  568 |     access_type: FileAccess,\n  569 |     hash_fn: H,\n  570 | ) -> Vec<FileGroup<FileInfo>>\n  571 | where\n  572 |     F1: Fn(&FileGroup<FileInfo>) -> bool,\n  573 |     F2: Fn(&FileGroup<FileInfo>) -> bool,\n  574 |     H: Fn((&mut FileInfo, FileHash)) -> Option<FileHash> + Sync + Send + 'a,\n  575 | {\n  576 |     // Allow sharing the hash function between threads:\n  577 |     type HashFn<'a> = dyn Fn((&mut FileInfo, FileHash)) -> Option<FileHash> + Sync + Send + 'a;\n  578 |     let hash_fn: &HashFn<'a> = &hash_fn;\n  579 | \n  580 |     let (tx, rx): (Sender<HashedFileInfo>, Receiver<HashedFileInfo>) = channel();\n  581 | \n  582 |     // There is no point in processing groups containing a single file.\n  583 |     // Normally when searching for duplicates such groups are filtered out automatically after\n  584 |     // each stage, however they are possible when searching for unique files.\n  585 |     let (groups_to_fclones, groups_to_pass): (Vec<_>, Vec<_>) =\n  586 |         groups.into_iter().partition(group_pre_filter);\n  587 | \n  588 |     // This way we can split processing to separate thread-pools, one per device:\n  589 |     let files = partition_by_devices(groups_to_fclones, devices);\n  590 |     let mut hash_map =\n  591 |         GroupMap::new(|f: HashedFileInfo| ((f.file_info.len, f.file_hash), f.file_info));\n  592 |     let hash_map_ref = &mut hash_map;\n  593 | \n  594 |     // Scope needed so threads can access shared stuff like groups or shared functions.\n  595 |     // The threads we launch are guaranteed to not live longer than this scope.\n  596 |     thread::scope(move |s| {\n  597 |         // Process all files in background\n  598 |         for (mut files, device) in files.into_iter().zip(devices.iter()) {\n  599 |             if files.is_empty() {\n  600 |                 continue;\n  601 |             }\n  602 | \n  603 |             let tx = tx.clone();\n  604 | \n  605 |             // Launch a separate thread for each device, so we can process\n  606 |             // files on each device independently\n  607 |             s.spawn(move |_| {\n  608 |                 // Sort files by their physical location, to reduce disk seek latency on HDD.\n  609 |                 // Additionally, files with the same id end up directly\n  610 |                 // next to each other so we can avoid rehashing the same files.\n  611 |                 files.par_sort_unstable_by_key(|f| f.file_info.location);\n  612 | \n  613 |                 // Some devices like HDDs may benefit from different amount of parallelism\n  614 |                 // depending on the access type. Therefore we chose a thread pool appropriate\n  615 |                 // for the access type\n  616 |                 let thread_pool = match access_type {\n  617 |                     FileAccess::Sequential => device.seq_thread_pool(),\n  618 |                     FileAccess::Random => device.rand_thread_pool(),\n  619 |                 };\n  620 | \n  621 |                 let thread_count = thread_pool.current_num_threads() as isize;\n  622 | \n  623 |                 // Limit the number of tasks spawned at once into the thread-pool.\n  624 |                 // Each task creates a heap allocation and reserves memory in the queue.\n  625 |                 // It is more memory efficient to keep these tasks as long as possible\n  626 |                 // in our vector. Without this limit we observed over 20% more memory use\n  627 |                 // when processing 1M of files.\n  628 |                 let semaphore = Arc::new(Semaphore::new(8 * thread_count));\n  629 | \n  630 |                 // Run hashing on the thread-pool dedicated to the device.\n  631 |                 // Group files by their identifiers so we hash only one file per unique id.\n  632 |                 for (_, fg) in &files.into_iter().group_by(|f| f.file_info.id) {\n  633 |                     let mut fg = fg.collect_vec();\n  634 |                     let tx = tx.clone();\n  635 |                     let guard = semaphore.clone().access_owned();\n  636 | \n  637 |                     // Spawning a task into a thread-pool requires a static lifetime,\n  638 |                     // because generally the task could outlive caller's stack frame.\n  639 |                     // However, this is not the case for rehash function, because\n  640 |                     // we don't exit before all tasks are closed.\n  641 |                     // In the perfect world we should use scopes for that. Unfortunately\n  642 |                     // the current implementation of rayon scopes runs the scope body\n  643 |                     // on one of the thread-pool worker threads, so it is not possible\n  644 |                     // to safely block inside the scope, because that leads to deadlock\n  645 |                     // when the pool has only one thread.\n  646 |                     let hash_fn: &HashFn<'static> = unsafe { std::mem::transmute(hash_fn) };\n  647 |                     thread_pool.spawn_fifo(move || {\n  648 |                         let _open_files_guard = RLIMIT_OPEN_FILES.clone().access_owned();\n  649 |                         let old_hash = fg[0].file_hash.clone();\n  650 |                         if let Some(hash) = hash_fn((&mut fg[0].file_info, old_hash)) {\n  651 |                             for mut f in fg {\n  652 |                                 f.file_hash = hash.clone();\n  653 |                                 tx.send(f).unwrap();\n  654 |                             }\n  655 |                         }\n  656 |                         // This forces moving the guard into this task and be released when\n  657 |                         // the task is done\n  658 |                         drop(guard);\n  659 |                     });\n  660 |                 }\n  661 |             });\n  662 |         }\n  663 |         // Drop the original tx, so all tx are closed when the threads finish and\n  664 |         // the next while loop will eventually exit\n  665 |         drop(tx);\n  666 | \n  667 |         // Collect the results from all threads and group them.\n  668 |         // Note that this will happen as soon as data are available\n  669 |         while let Ok(hashed_file) = rx.recv() {\n  670 |             hash_map_ref.add(hashed_file);\n  671 |         }\n  672 |     })\n  673 |     .unwrap();\n  674 | \n  675 |     // Convert the hashmap into vector, leaving only large-enough groups:\n  676 |     hash_map\n  677 |         .into_iter()\n  678 |         .map(|((len, hash), files)| FileGroup {\n  679 |             file_len: len,\n  680 |             file_hash: hash,\n  681 |             files: files.to_vec(),\n  682 |         })\n  683 |         .chain(groups_to_pass)\n  684 |         .filter(group_post_filter)\n  685 |         .collect()\n  686 | }","lines":124,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/group.rs#L563-L686"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","easy":false,"description":"HashCache::put/get truncate the file's modification SystemTime to milliseconds via `.as_millis() as u64`, but typical filesystems (e.g. ext4, xfs) report mtime with nanosecond precision. Two distinct writes to the same file occurring within the same millisecond (common for small/fast files or scripted batch edits) produce identical modified_timestamp_ms values; if the resulting file_len also matches (e.g. an in-place edit that preserves length), get() will report the file as unchanged and hand back the stale cached hash for genuinely different content. This is exactly the kind of cache-invalidation bug that silently produces wrong dedup results.","fix":"Store the modification time at full precision (e.g. as nanoseconds, or as the (secs, nanos) pair from SystemTime) instead of truncating to milliseconds, so the cache key reflects the filesystem's actual mtime resolution.","locations":[{"ref":"fclones/src/cache.rs:100-105","code":"  100 |             modified_timestamp_ms: file\n  101 |                 .modified()\n  102 |                 .map_err(|e| format!(\"Unable to get file modification timestamp: {e}\"))?\n  103 |                 .duration_since(UNIX_EPOCH)\n  104 |                 .unwrap_or(Duration::ZERO)\n  105 |                 .as_millis() as u64,","lines":6,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/cache.rs#L100-L105"},{"ref":"fclones/src/cache.rs:141-148","code":"  141 |         let modified = metadata\n  142 |             .modified()\n  143 |             .map_err(|e| format!(\"Unable to get file modification timestamp: {e}\"))?\n  144 |             .duration_since(UNIX_EPOCH)\n  145 |             .unwrap_or(Duration::ZERO)\n  146 |             .as_millis() as u64;\n  147 | \n  148 |         if value.modified_timestamp_ms != modified || value.file_len != metadata.len() {","lines":8,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/cache.rs#L141-L148"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"medium","easy":false,"description":"HashCacheFlusher::drop() calls `self.thread_handle.take().unwrap().join().unwrap()`. If the background flush thread panics for any reason (e.g. an internal sled/typed_sled bug, allocation failure), join() returns Err and the second unwrap() panics inside Drop::drop. A panic while already unwinding from another panic (or simply an unhandled panic during a normal drop in some contexts, e.g. drop running inside another panic's cleanup) causes the whole process to abort, which destroys the original error context and gives the user an opaque abort instead of a clean diagnosable error message.","fix":"Use `if let Err(e) = ... .join() { eprintln!(\"hash cache flusher thread panicked: {:?}\", e); }` (or log via the crate's logging facility) instead of unwrapping the join result in Drop.","locations":[{"ref":"fclones/src/cache.rs:211-218","code":"  211 | impl Drop for HashCacheFlusher {\n  212 |     fn drop(&mut self) {\n  213 |         // Signal the flusher thread to exit:\n  214 |         drop(self.control_channel.take());\n  215 |         // Wait for the flusher thread to exit:\n  216 |         self.thread_handle.take().unwrap().join().unwrap();\n  217 |     }\n  218 | }","lines":8,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/cache.rs#L211-L218"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"medium","easy":false,"description":"check_can_rename (called from both move_rename and move_copy) checks `target.to_path_buf().exists()` and then, if absent, proceeds to call `fs::rename`/`fs::copy` afterward. This check-then-act sequence is a TOCTOU race: between the existence check and the actual rename/copy, another process (or, since dedupe commands for different groups run concurrently on the Rayon thread pool within the same fclones invocation, a different worker thread targeting an overlapping path) could create a file at `target`. `fs::rename` on most platforms silently overwrites an existing destination, so the race can cause an unrelated file at the target path to be silently clobbered, contradicting the function's doc comment \"Fails if target exists.\"","fix":"Where supported, use an atomic create-exclusive primitive (e.g. open the target with O_EXCL / `fs::OpenOptions::new().write(true).create_new(true)` and then perform the data move into that handle, or use `renameat2` with RENAME_NOREPLACE on Linux) instead of a separate existence check followed by a plain rename, to close the race window.","locations":[{"ref":"fclones/src/dedupe.rs:180-192","code":"  180 |     fn check_can_rename(source: &Path, target: &Path) -> io::Result<()> {\n  181 |         if target.to_path_buf().exists() {\n  182 |             return Err(io::Error::new(\n  183 |                 ErrorKind::AlreadyExists,\n  184 |                 format!(\n  185 |                     \"Cannot move {} to {}: Target already exists\",\n  186 |                     source.display(),\n  187 |                     target.display()\n  188 |                 ),\n  189 |             ));\n  190 |         }\n  191 |         Ok(())\n  192 |     }","lines":13,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L180-L192"},{"ref":"fclones/src/dedupe.rs:236-253","code":"  236 |     /// Moves the file from one location to another by single `fs::rename` command.\n  237 |     /// Fails if target exists.\n  238 |     fn move_rename(source: &Path, target: &Path) -> io::Result<()> {\n  239 |         Self::check_can_rename(source, target)?;\n  240 |         Self::mkdirs(target.parent().unwrap())?;\n  241 |         Self::unsafe_rename(source, target)?;\n  242 |         Ok(())\n  243 |     }\n  244 | \n  245 |     /// Moves the file by copying it first to another location and then removing the original.\n  246 |     /// Fails if target exists.\n  247 |     fn move_copy(source: &Path, target: &Path) -> io::Result<()> {\n  248 |         Self::check_can_rename(source, target)?;\n  249 |         Self::mkdirs(target.parent().unwrap())?;\n  250 |         Self::unsafe_copy(source, target)?;\n  251 |         Self::remove(source)?;\n  252 |         Ok(())\n  253 |     }","lines":18,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/dedupe.rs#L236-L253"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"medium","easy":true,"description":"write_as_csv writes file paths verbatim (only STFU8-escaped for control characters, not formula-escaped) into CSV cells. A file path/name beginning with '=', '+', '-', or '@' is written as-is into a CSV field and will be interpreted as a formula by Excel/LibreOffice/Google Sheets when the report is opened, enabling classic CSV/formula injection (DDE/command execution) since file names are fully attacker- or user-controlled on a filesystem scanned by fclones.","fix":"Before writing a field that starts with '=', '+', '-', '@', '\\t', or '\\r', prefix it with a single quote (') or otherwise neutralize it (e.g. prepend a space) as recommended by OWASP CSV injection guidance, at least as an opt-in/default-on safety measure for the CSV writer.","locations":[{"ref":"fclones/src/report.rs:201-226","code":"  201 |     pub fn write_as_csv<I, G, P>(&mut self, _header: &ReportHeader, groups: I) -> io::Result<()>\n  202 |     where\n  203 |         I: IntoIterator<Item = G>,\n  204 |         G: AsRef<FileGroup<P>>,\n  205 |         P: AsRef<Path>,\n  206 |     {\n  207 |         let mut wtr = csv::WriterBuilder::new()\n  208 |             .delimiter(b',')\n  209 |             .quote_style(csv::QuoteStyle::Necessary)\n  210 |             .flexible(true)\n  211 |             .from_writer(&mut self.out);\n  212 | \n  213 |         wtr.write_record([\"size\", \"hash\", \"count\", \"files\"])?;\n  214 |         for g in groups {\n  215 |             let g = g.as_ref();\n  216 |             let mut record = csv::StringRecord::new();\n  217 |             record.push_field(g.file_len.0.to_string().as_str());\n  218 |             record.push_field(g.file_hash.to_string().as_str());\n  219 |             record.push_field(g.files.len().to_string().as_str());\n  220 |             for f in g.files.iter() {\n  221 |                 record.push_field(f.as_ref().to_escaped_string().as_ref());\n  222 |             }\n  223 |             wtr.write_record(&record)?;\n  224 |         }\n  225 |         wtr.flush()\n  226 |     }","lines":26,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/report.rs#L201-L226"}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"low","easy":false,"description":"Execution::err_stream (a JoinHandle<String> running the stderr_reaper background thread) is never joined inside Execution::Drop. Drop only drains out_stream and waits on the child process; if an Execution value is dropped before the caller explicitly takes and joins err_stream (e.g. an early return elsewhere in hasher.rs before reaching the exit-status check), the JoinHandle is simply dropped, which detaches the thread - it keeps running in the background un-joined rather than being awaited or cancelled. The thread will eventually terminate on its own (it's bounded by reading stderr to EOF and waiting on the child), so this isn't a true resource leak, but it is an inconsistency: the type's only consumer (hasher.rs) always takes() and joins err_stream after a successful run, so the only path that hits this detached-thread behavior is an error/early-return path, which is precisely when the program is least equipped to wait around for a stray thread holding a clone of the Arc<Mutex<Child>>.","fix":"In Execution::Drop, if err_stream is still Some, join() it (or at minimum signal it isn't needed) after waiting on the child, so all spawned resources tied to one Execution are deterministically cleaned up by the time Drop returns, matching the cleanup guarantee Drop already provides for the child process and out_stream.","locations":[{"ref":"fclones/src/transform.rs:270-285","code":"  270 | /// Keeps the results of the transform program execution\n  271 | pub struct Execution {\n  272 |     pub(crate) child: Arc<Mutex<Child>>,\n  273 |     pub(crate) out_stream: Box<dyn Read>,\n  274 |     pub(crate) err_stream: Option<JoinHandle<String>>,\n  275 |     _input: Input,   // holds the temporary input file(s) until execution is done\n  276 |     _output: Output, // holds the temporary output file(s) until execution is done\n  277 | }\n  278 | \n  279 | impl Drop for Execution {\n  280 |     fn drop(&mut self) {\n  281 |         let mut buf = [0; 4096];\n  282 |         while let Ok(1..) = self.out_stream.read(&mut buf) {}\n  283 |         let _ = self.child.lock().unwrap().wait();\n  284 |     }\n  285 | }","lines":16,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/transform.rs#L270-L285"}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"low","easy":false,"description":"Walk::resolve_link (walk.rs:422-433) performs read_link(&link_buf) and link_buf.metadata() as two separate syscalls. Between them the symlink target can change (race: link is re-pointed, deleted, or replaced by another process), so the EntryType returned for `target` can describe a different filesystem object than the one actually resolved into `target`'s path. This is a classic TOCTOU; on a misbehaving or actively-mutated tree it can cause a symlink whose target became a directory to be reported/visited as EntryType::File (or vice versa), feeding the wrong branch in visit_link (walk.rs:330-340).","fix":"Where the platform supports it, resolve the type via a single combined syscall result (e.g. open the path with O_NOFOLLOW semantics or use fstatat relative to an opened directory) instead of two independent lookups; at minimum document the residual race since a full fix requires platform-specific code.","locations":[{"ref":"fclones/src/walk.rs:422-433","code":"  422 |     fn resolve_link(&self, link: &Path) -> io::Result<(Path, EntryType)> {\n  423 |         let link_buf = link.to_path_buf();\n  424 |         let target = read_link(&link_buf)?;\n  425 |         let entry_type = EntryType::from(link_buf.metadata()?.file_type());\n  426 |         let target = Path::from(target);\n  427 |         let resolved = if target.is_relative() {\n  428 |             link.parent().unwrap().join(target)\n  429 |         } else {\n  430 |             target\n  431 |         };\n  432 |         Ok((self.absolute(resolved), entry_type))\n  433 |     }","lines":12,"link":"https://github.com/pkolaczk/fclones/blob/a74f90d293e05856d19a4c0ac2b29b46ef16cf23/fclones/src/walk.rs#L422-L433"}]}]</script>

function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
