\n   99 |             randoms\n  100 |                 .server\n  101 |                 .clone_from_slice(&server_hello.random.0[..]);","lines":4}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In `VecInput::discard`, the second arm `else if taken >= self.used` is a redundant guard: it is the exact logical negation of the `if taken < self.used` condition, so it is always true when reached. The condition adds a needless branch test and obscures that this is simply the `else` case.","fix":"Replace `} else if taken >= self.used {` with a plain `} else {`.","locations":[{"ref":"rustls/src/msgs/deframer/buffers.rs:20-39","code":"   20 |         if taken < self.used {\n   21 |             /* Before:\n   22 |              * +----------+----------+----------+\n   23 |              * | taken    | pending  |xxxxxxxxxx|\n   24 |              * +----------+----------+----------+\n   25 |              * 0          ^ taken    ^ self.used\n   26 |              *\n   27 |              * After:\n   28 |              * +----------+----------+----------+\n   29 |              * | pending  |xxxxxxxxxxxxxxxxxxxxx|\n   30 |              * +----------+----------+----------+\n   31 |              * 0          ^ self.used\n   32 |              */\n   33 | \n   34 |             self.buf\n   35 |                 .copy_within(taken..self.used, 0);\n   36 |             self.used -= taken;\n   37 |         } else if taken >= self.used {\n   38 |             self.used = 0;\n   39 |         }","lines":20}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`Ord::max(0, max_name_len.saturating_sub(name.as_ref().len()))` is redundant: `saturating_sub` on `usize` already returns a value `>= 0`, so the `Ord::max(0, ...)` wrapper can never change the result. It restates the RFC's `max(0, L - D)` formula but the floor is already guaranteed by the unsigned saturating subtraction.","fix":"Replace with `max_name_len.saturating_sub(name.as_ref().len())` (keep a brief comment referencing the RFC's max(0, L-D) intent).","locations":[{"ref":"rustls/src/client/ech.rs:708-713","code":"  708 |         let name_padding_len = match &inner_hello.server_name {\n  709 |             Some(ServerNamePayload::SingleDnsName(name)) => {\n  710 |                 // name.len() = D\n  711 |                 // max(0, L - D)\n  712 |                 Ord::max(0, max_name_len.saturating_sub(name.as_ref().len()))\n  713 |             }","lines":6}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`EncodedMessage::<OutboundPlain>::encoded_len` is annotated `#[expect(dead_code)]`, indicating it\nis currently unused. Dead code in the crypto record layer should either be wired up or removed to\navoid maintenance drift and accidental future misuse.","fix":"Remove the unused method, or use it where record length is computed and drop the `#[expect(dead_code)]`.","locations":[{"ref":"rustls/src/crypto/cipher/messages.rs:157-160","code":"  157 |     #[expect(dead_code)]\n  158 |     pub(crate) fn encoded_len(&self, record_layer: &EncryptionState) -> usize {\n  159 |         HEADER_SIZE + record_layer.encrypted_len(self.payload.len())\n  160 |     }","lines":4}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`EarlyDataState::peek` and `EarlyDataState::pop` on the server are both annotated `#[expect(dead_code)]`\nand are never called. They are carried purely to satisfy lints. Dead code in a security-sensitive crate\nadds maintenance surface and may mask intent.","fix":"Remove `peek` and `pop` unless a near-term caller is planned.","locations":[{"ref":"rustls/src/server/connection.rs:479-493","code":"  479 |     #[expect(dead_code)]\n  480 |     fn peek(&self) -> Option<&[u8]> {\n  481 |         match self {\n  482 |             Self::Accepted { received, .. } => received.peek(),\n  483 |             _ => None,\n  484 |         }\n  485 |     }\n  486 | \n  487 |     #[expect(dead_code)]\n  488 |     fn pop(&mut self) -> Option<Vec<u8>> {\n  489 |         match self {\n  490 |             Self::Accepted { received, .. } => received.pop(),\n  491 |             _ => None,\n  492 |         }\n  493 |     }","lines":15}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`KeyScheduleEarlyClient::protocol()` is defined but its necessity is unclear; more notably\nthe `#[cfg(all(test, bench))]` benchmark module (`bench_sha256`) references `test::Bencher`\nand `test::black_box` which require the unstable `test` crate feature and the `bench` cfg,\nneither of which is part of the standard build/test matrix shown. This benchmark code is\neffectively never compiled and silently rots (it already imports `core::fmt::Debug` without\nusing it meaningfully). Dead/unbuildable benchmark scaffolding accumulates maintenance risk.","fix":"Either wire the benchmark into a maintained nightly bench job, migrate it to `criterion` like other rustls benches, or remove it.","locations":[{"ref":"rustls/src/tls13/key_schedule.rs:1406-1455","code":" 1406 | #[cfg(all(test, bench))]\n 1407 | mod benchmarks {\n 1408 |     #[bench]\n 1409 |     fn bench_sha256(b: &mut test::Bencher) {\n 1410 |         use core::fmt::Debug;\n 1411 | \n 1412 |         use super::{\n 1413 |             KeySchedule, Protocol, SecretKind, Side, derive_traffic_iv, derive_traffic_key,\n 1414 |         };\n 1415 |         use crate::KeyLog;\n 1416 |         use crate::crypto::test_provider::TLS13_TEST_SUITE;\n 1417 | \n 1418 |         fn extract_traffic_secret(ks: &KeySchedule, kind: SecretKind) {\n 1419 |             #[derive(Debug)]\n 1420 |             struct Log;\n 1421 | \n 1422 |             impl KeyLog for Log {\n 1423 |                 fn log(&self, _label: &str, _client_random: &[u8], _secret: &[u8]) {}\n 1424 |             }\n 1425 | \n 1426 |             let hash = [0u8; 32];\n 1427 |             let traffic_secret = ks.derive_logged_secret(kind, &hash, &Log, &[0u8; 32]);\n 1428 |             let traffic_secret_expander = TLS13_TEST_SUITE\n 1429 |                 .hkdf_provider\n 1430 |                 .expander_for_okm(&traffic_secret);\n 1431 |             test::black_box(derive_traffic_key(\n 1432 |                 traffic_secret_expander.as_ref(),\n 1433 |                 TLS13_TEST_SUITE.aead_alg,\n 1434 |             ));\n 1435 |             test::black_box(derive_traffic_iv(\n 1436 |                 traffic_secret_expander.as_ref(),\n 1437 |                 TLS13_TEST_SUITE.aead_alg.iv_len(),\n 1438 |             ));\n 1439 |         }\n 1440 | \n 1441 |         b.iter(|| {\n 1442 |             let mut ks =\n 1443 |                 KeySchedule::new_with_empty_secret(Side::Client, Protocol::Tcp, TLS13_TEST_SUITE);\n 1444 |             ks.input_secret(&[0u8; 32]);\n 1445 | \n 1446 |             extract_traffic_secret(&ks, SecretKind::ClientHandshakeTrafficSecret);\n 1447 |             extract_traffic_secret(&ks, SecretKind::ServerHandshakeTrafficSecret);\n 1448 | \n 1449 |             ks.input_empty();\n 1450 | \n 1451 |             extract_traffic_secret(&ks, SecretKind::ClientApplicationTrafficSecret);\n 1452 |             extract_traffic_secret(&ks, SecretKind::ServerApplicationTrafficSecret);\n 1453 |         });\n 1454 |     }\n 1455 | }","lines":50}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The `coalesce()` doc-comment references functions `requires_coalesce` and `coalesce_one` that do not exist in the codebase. The logic was consolidated into `coalesce()` itself; the worked example narration is stale and misleads readers trying to find the named helpers.","fix":"Reword the example to describe what `coalesce()` actually does (find the first incomplete span, move the following span to be contiguous, re-dissect) instead of naming non-existent `requires_coalesce`/`coalesce_one` helpers.","locations":[{"ref":"rustls/src/msgs/deframer/mod.rs:161-162","code":"  161 |     /// In this case, `requires_coalesce` returns `Some(0)`.  Then\n  162 |     /// `coalesce_one` moves the second range leftwards:","lines":2}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The comment in `KeyScheduleEarly::client_early_traffic_secret` (\"If 0-RTT should be rejected,\nthis will be clobbered by ExtensionProcessing before the application can see\") describes\nclient-side behavior, but this same code path is also reached on the server side via\n`KeyScheduleEarlyServer::client_early_traffic_secret`. On the server the QUIC `early_secret`\nslot is populated too, and the comment's claim about `ExtensionProcessing` clobbering only\nmakes sense for the client. The comment is misleading about which side(s) execute it.","fix":"Clarify the comment to state the behavior for both client and server, or move the QUIC early_secret installation so the comment accurately reflects the side it applies to.","locations":[{"ref":"rustls/src/tls13/key_schedule.rs:137-144","code":"  137 |         if let Some(quic) = output.quic() {\n  138 |             // If 0-RTT should be rejected, this will be clobbered by ExtensionProcessing\n  139 |             // before the application can see.\n  140 |             quic.early_secret(Some(client_early_traffic_secret.clone()));\n  141 |         }\n  142 | \n  143 |         client_early_traffic_secret\n  144 |     }","lines":8},{"ref":"rustls/src/tls13/key_schedule.rs:65-81","code":"   65 |     /// Computes the `client_early_traffic_secret` and installs it as decrypter.\n   66 |     pub(crate) fn client_early_traffic_secret(\n   67 |         &self,\n   68 |         hs_hash: &hash::Output,\n   69 |         key_log: &dyn KeyLog,\n   70 |         client_random: &[u8; 32],\n   71 |         output: &mut dyn Output<'_>,\n   72 |         proof: &HandshakeAlignedProof,\n   73 |     ) {\n   74 |         self.0.ks.set_decrypter(\n   75 |             &self\n   76 |                 .0\n   77 |                 .client_early_traffic_secret(hs_hash, key_log, client_random, output),\n   78 |             output.receive(),\n   79 |             proof,\n   80 |         );\n   81 |     }","lines":17}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `derive_for_empty_hash` lists `SecretKind::ExternalPskBinderKey`\nand `SecretKind::ResumptionPSKBinderKey` as valid kinds, but neither identifier exists\nin the `SecretKind` enum. The enum only has `ResumptionPskBinderKey` (note the different\ncasing) and `DerivedSecret`. The comment is stale/incorrect and will not compile if used\nas a doc-link, misleading future readers about which variants are valid here.","fix":"Update the comment to reference the actual variants: `ResumptionPskBinderKey` and `DerivedSecret`. Remove the nonexistent `ExternalPskBinderKey` reference and fix the casing of `ResumptionPSKBinderKey`.","locations":[{"ref":"rustls/src/tls13/key_schedule.rs:899-912","code":"  899 |     /// where `kind` is `Label`.\n  900 |     ///\n  901 |     /// Useful only for the following `SecretKind`s:\n  902 |     /// - `SecretKind::ExternalPskBinderKey`\n  903 |     /// - `SecretKind::ResumptionPSKBinderKey`\n  904 |     /// - `SecretKind::DerivedSecret`\n  905 |     fn derive_for_empty_hash(&self, kind: SecretKind) -> OkmBlock {\n  906 |         let hp = self.suite.common.hash_provider;\n  907 |         let empty_hash = hp\n  908 |             .algorithm()\n  909 |             .hash_for_empty_input()\n  910 |             .unwrap_or_else(|| hp.hash(b\"\"));\n  911 |         self.derive(kind, empty_hash.as_ref())\n  912 |     }","lines":14},{"ref":"rustls/src/tls13/key_schedule.rs:1183-1196","code":" 1183 | enum SecretKind {\n 1184 |     ResumptionPskBinderKey,\n 1185 |     ClientEarlyTrafficSecret,\n 1186 |     EarlyExporterMasterSecret,\n 1187 |     ClientHandshakeTrafficSecret,\n 1188 |     ServerHandshakeTrafficSecret,\n 1189 |     ClientApplicationTrafficSecret,\n 1190 |     ServerApplicationTrafficSecret,\n 1191 |     ExporterMasterSecret,\n 1192 |     ResumptionMasterSecret,\n 1193 |     DerivedSecret,\n 1194 |     ServerEchConfirmationSecret,\n 1195 |     ServerEchHrrConfirmationSecret,\n 1196 | }","lines":14}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The test is named `tls13_empty_signature_mapping_panics` and its inline comment says\n\"never parsed; panic happens first\", but `verify_tls13_signature` does not panic on an\nempty scheme mapping: line 132-137 uses `.first().ok_or(ApiMisuse::NoSignatureVerificationAlgorithms)`,\nreturning an `Err` rather than panicking. The test body itself asserts `unwrap_err()` equals\nthat error. The name and comment are stale/misleading and could lead a future reader to\nbelieve an empty mapping is a panic hazard (and to \"fix\" it by reintroducing one).","fix":"Rename the test to e.g. `tls13_empty_signature_mapping_errors` and remove the 'panic happens first' comment.","locations":[{"ref":"rustls/src/webpki/verify.rs:197-219","code":"  197 |     #[test]\n  198 |     fn tls13_empty_signature_mapping_panics() {\n  199 |         let supported = WebPkiSupportedAlgorithms {\n  200 |             all: TEST_PROVIDER\n  201 |                 .signature_verification_algorithms\n  202 |                 .all,\n  203 |             mapping: &[(SignatureScheme::ED25519, &[])],\n  204 |         };\n  205 | \n  206 |         let cert = CertificateDer::from(vec![0u8]); // never parsed; panic happens first\n  207 |         let dss = DigitallySignedStruct::new(SignatureScheme::ED25519, vec![]);\n  208 |         let signer = SignerPublicKey::X509(&cert);\n  209 |         let input = SignatureVerificationInput {\n  210 |             message: b\"hello\",\n  211 |             signer: &signer,\n  212 |             signature: &dss,\n  213 |         };\n  214 | \n  215 |         assert_eq!(\n  216 |             verify_tls13_signature(&input, &supported).unwrap_err(),\n  217 |             Error::ApiMisuse(ApiMisuse::NoSignatureVerificationAlgorithms)\n  218 |         );\n  219 |     }","lines":23}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The comment block (lines 87-93) on `early_data_key_schedule` says \"If this is `None` then we do not support early data.\" but the field type is `Option<(KeyScheduleEarlyClient, bool)>` and is also `None` in the common non-resumption / no-PSK case (see tls13.rs / hs.rs where it is left `None` whenever there is no TLS1.3 PSK to resume), not only when early data is unsupported. The comment overstates the meaning of `None`.","fix":"Reword the comment to: `None` when there is no resumption PSK / early-data key schedule to carry (e.g. full handshake, or early data unsupported).","locations":[{"ref":"rustls/src/client/hs.rs:87-94","code":"   87 |     // The key schedule for sending early data.\n   88 |     //\n   89 |     // If the server accepts the PSK used for early data then\n   90 |     // this is used to compute the rest of the key schedule.\n   91 |     // Otherwise, it is thrown away.\n   92 |     //\n   93 |     // If this is `None` then we do not support early data.\n   94 |     pub(super) early_data_key_schedule: Option<(KeyScheduleEarlyClient, bool)>,","lines":8}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment for `extended_master_secret()` has unbalanced backticks: `Some(true)` and `Some(false)` are each missing the closing backtick, so rustdoc renders the rest of the line as inline code spanning to the next backtick.","fix":"Close the backticks: `` `Some(true)` `` and `` `Some(false)` ``.","locations":[{"ref":"rustls/src/common_state.rs:159-160","code":"  159 |     /// - `Some(true) for TLS 1.2 if the extension was negotiated.\n  160 |     /// - `Some(false) otherwise.","lines":2}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `KeyBlockShape` reads \"ciphersuites with non-zero `mac_key_length` are  not\ncurrently supported.\" with a double space between \"are\" and \"not\". Minor, but it is a typo in a\npublic-facing doc comment describing a security-relevant constraint.","fix":"Fix the double space: \"ciphersuites with non-zero `mac_key_length` are not currently supported.\"","locations":[{"ref":"rustls/src/crypto/cipher/mod.rs:118-120","code":"  118 | /// How a TLS1.2 `key_block` is partitioned.\n  119 | ///\n  120 | /// Note: ciphersuites with non-zero `mac_key_length` are  not currently supported.","lines":3}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The `LimitedCache` doc comment claims \"This implementation uses all the allocated storage\"\nand the eviction logic keys on `self.oldest.capacity()` rather than the requested\n`capacity_order_of_magnitude`. Because `VecDeque::with_capacity`/`HashMap::with_capacity`\nmay round the capacity up, the effective cache size silently exceeds the value the caller\nasked for (potentially by a large rounding factor for the hash map). This is intentional per\nthe comment, but the divergence between \"requested capacity\" and \"actual capacity\" is a\nsubtle gotcha for callers sizing security-sensitive caches (e.g. session caches) and is not\nflagged at the call sites.","fix":"Document on `new` that the effective capacity may be rounded up, or track and enforce the requested capacity explicitly instead of relying on `oldest.capacity()`.","locations":[{"ref":"rustls/src/limited_cache.rs:8-30","code":"    8 | /// A HashMap-alike, which never gets larger than a specified\n    9 | /// capacity, and evicts the oldest insertion to maintain this.\n   10 | ///\n   11 | /// The requested capacity may be rounded up by the underlying\n   12 | /// collections.  This implementation uses all the allocated\n   13 | /// storage.\n   14 | ///\n   15 | /// This is inefficient: it stores keys twice.\n   16 | pub(crate) struct LimitedCache<K, V> {\n   17 |     map: HashMap<K, V>,\n   18 | \n   19 |     // first item is the oldest key\n   20 |     oldest: VecDeque<K>,\n   21 | }\n   22 | \n   23 | impl<K: Eq + Hash + Clone + Debug, V> LimitedCache<K, V> {\n   24 |     /// Create a new LimitedCache with the given rough capacity.\n   25 |     pub(crate) fn new(capacity_order_of_magnitude: usize) -> Self {\n   26 |         Self {\n   27 |             map: HashMap::with_capacity(capacity_order_of_magnitude),\n   28 |             oldest: VecDeque::with_capacity(capacity_order_of_magnitude),\n   29 |         }\n   30 |     }","lines":23},{"ref":"rustls/src/limited_cache.rs:48-53","code":"   48 |         // ensure next insertion does not require a realloc\n   49 |         if inserted_new_item && self.oldest.capacity() == self.oldest.len() {\n   50 |             if let Some(oldest_key) = self.oldest.pop_front() {\n   51 |                 self.map.remove(&oldest_key);\n   52 |             }\n   53 |         }","lines":6}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The comment on `SessionId::read` path is fine, but `SessionId::read` returns\n`InvalidMessage::TrailingData(\"SessionID\")` when the declared length exceeds 32\n(handshake.rs:106-108). \"TrailingData\" is a misleading error category for an\nover-long length field - it is an oversized/invalid length, not trailing bytes. This\ncan confuse diagnostics of malformed ClientHello/ServerHello session ids.","fix":"Return a more accurate error variant (e.g. a dedicated 'session id to // URL hash — debounced so rapid filter changes don't thrash history

function loadHash() {

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
