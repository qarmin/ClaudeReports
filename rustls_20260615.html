<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`emit_client_hello_for_retry` unwraps `self.next.offered_key_share.unwrap()` (HRR path) and `st.offered_key_share.unwrap()` (server-hello path) relying on the invariant \"we always send a key share when TLS 1.3 is enabled\". These reach the TLS1.3 code paths only after the server selected TLS1.3, which is only offered when TLS1.3 is configured, so the invariant should hold. However these are network-reachable code paths guarded only by an implicit invariant rather than an explicit error; a logic regression elsewhere (e.g. a TLS1.3 ServerHello accepted without a key share having been offered) would turn into a panic instead of a protocol error.","fix":"Replace `.unwrap()` with `.ok_or(Error::Unreachable(\"...\"))?` (or a PeerMisbehaved variant) to convert the invariant violation into a graceful error rather than a panic.","locations":[{"ref":"rustls/src/client/hs.rs:252","code":"  252 |         let offered_key_share = self.next.offered_key_share.unwrap();","lines":1},{"ref":"rustls/src/client/tls13.rs:140","code":"  140 |         let our_key_share = st.offered_key_share.unwrap();","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`EncodedMessage::<InboundOpaque>::into_plain_message_range` indexes the payload with a caller\nsupplied `Range<usize>` (`&self.payload.into_inner()[range]`). An out-of-range start/end panics.\nThe doc comment acknowledges this (\"panics if it is out of range\"), but the function is `pub` and\noperates on inbound (attacker-influenced) message payloads, so any caller mistake on a length\nderived from peer data turns into a panic / DoS. Prefer a checked accessor for an inbound type.","fix":"Use `get(range)` and return an error/`Option` instead of panicking, or restrict the API so the range cannot be derived from peer-controlled lengths.","locations":[{"ref":"rustls/src/crypto/cipher/messages.rs:124-130","code":"  124 |     pub fn into_plain_message_range(self, range: Range<usize>) -> EncodedMessage<&'a [u8]> {\n  125 |         EncodedMessage {\n  126 |             typ: self.typ,\n  127 |             version: self.version,\n  128 |             payload: &self.payload.into_inner()[range],\n  129 |         }\n  130 |     }","lines":7}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`prf` (TLS1.2 PRF) and `HkdfExpanderUsingHmac::expand_unchecked` call `out.chunks_mut(chunk_size)`\nwhere `chunk_size = hmac_key.tag_len()` / `self.0.tag_len()`. `slice::chunks_mut(0)` panics. A\ncustom `hmac::Key` implementation returning `tag_len() == 0` therefore panics rather than failing\ngracefully. There is no validation that the configured HMAC tag length is non-zero.","fix":"Assert `tag_len() > 0` (e.g. `debug_assert!`) or document the invariant on the `hmac::Key::tag_len` contract and rely on it explicitly.","locations":[{"ref":"rustls/src/crypto/tls12.rs:98-116","code":"   98 | pub fn prf(out: &mut [u8], hmac_key: &dyn hmac::Key, label: &[u8], seed: &[u8]) {\n   99 |     let mut previous_a: Option<hmac::Tag> = None;\n  100 | \n  101 |     let chunk_size = hmac_key.tag_len();\n  102 |     for chunk in out.chunks_mut(chunk_size) {\n  103 |         let a_i = match previous_a {\n  104 |             // A(0) = HMAC_hash(secret, label + seed)\n  105 |             None => hmac_key.sign(&[label, seed]),\n  106 |             // A(i) = HMAC_hash(secret, A(i - 1))\n  107 |             Some(previous_a) => hmac_key.sign(&[previous_a.as_ref()]),\n  108 |         };\n  109 | \n  110 |         // P_hash[i] = HMAC_hash(secret, A(i) + label + seed)\n  111 |         let p_term = hmac_key.sign(&[a_i.as_ref(), label, seed]);\n  112 |         chunk.copy_from_slice(&p_term.as_ref()[..chunk.len()]);\n  113 | \n  114 |         previous_a = Some(a_i);\n  115 |     }\n  116 | }","lines":19},{"ref":"rustls/src/crypto/tls13.rs:16-28","code":"   16 |     fn expand_unchecked(&self, info: &[&[u8]], output: &mut [u8]) {\n   17 |         let mut term = hmac::Tag::new(b\"\");\n   18 | \n   19 |         for (n, chunk) in output\n   20 |             .chunks_mut(self.0.tag_len())\n   21 |             .enumerate()\n   22 |         {\n   23 |             term = self\n   24 |                 .0\n   25 |                 .sign_concat(term.as_ref(), info, &[(n + 1) as u8]);\n   26 |             chunk.copy_from_slice(&term.as_ref()[..chunk.len()]);\n   27 |         }\n   28 |     }","lines":13}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`ServerConnection::set_resumption_data` (QUIC) panics via `assert!` when the caller passes\nresumption data of length >= 2^15, rather than returning an `Err`. The function already\nreturns `Result<(), Error>`, so a recoverable error would be more appropriate than aborting\nthe process on an application-supplied length. This is an API-misuse panic reachable purely\nfrom caller-controlled input. The non-QUIC `server::ServerConnection::set_resumption_data`\nshares the same pattern.","fix":"Return `Err(ApiMisuse::ResumptionDataTooLong.into())` (or similar) instead of `assert!`, so oversized data is reported as a recoverable error consistent with the function's `Result` return type.","locations":[{"ref":"rustls/src/quic.rs:267-273","code":"  267 |     pub fn set_resumption_data(&mut self, resumption_data: &[u8]) -> Result<(), Error> {\n  268 |         assert!(resumption_data.len() < 2usize.pow(15));\n  269 |         match &mut self.inner.core.state {\n  270 |             Ok(st) => st.set_resumption_data(resumption_data),\n  271 |             Err(e) => Err(e.clone()),\n  272 |         }\n  273 |     }","lines":7}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`set_resumption_data` asserts `data.len() < 2usize.pow(15)` and panics if the caller passes more than\n32767 bytes. This is a public API taking application-controlled input; a debug-asserted size limit\nshould be returned as a recoverable `Error` (the function already returns `Result<(), Error>`) rather\nthan aborting the process via panic.","fix":"Replace the `assert!` with an early `return Err(...)` (e.g. an `ApiMisuse` variant) when `data.len() >= 1 << 15`.","locations":[{"ref":"rustls/src/server/connection.rs:87-93","code":"   87 |     pub fn set_resumption_data(&mut self, data: &[u8]) -> Result<(), Error> {\n   88 |         assert!(data.len() < 2usize.pow(15));\n   89 |         match &mut self.inner.core.state {\n   90 |             Ok(st) => st.set_resumption_data(data),\n   91 |             Err(e) => Err(e.clone()),\n   92 |         }\n   93 |     }","lines":7}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`NoClientAuth` implements every `ClientVerifier` method except `offer_client_auth` (which\nreturns false) with `unimplemented!()`, which panics if called. In the normal server flow\nthese are gated behind `offer_client_auth()`/`client_auth_mandatory()` so they are not\nreached, but `NoClientAuth` is a public type returned by `WebPkiClientVerifier::no_client_auth()`\nand the `ClientVerifier` trait is public; any code path or future refactor that calls\n`verify_identity`/`verify_tls12_signature`/`verify_tls13_signature`/`root_hint_subjects`/\n`supported_verify_schemes` on it will panic rather than fail gracefully. A panic in a\nsecurity library is a denial-of-service hazard.","fix":"Return a hard error (e.g. `Error::ApiMisuse(...)` or a dedicated variant) instead of `unimplemented!()`, so a misuse fails the connection rather than aborting the process.","locations":[{"ref":"rustls/src/verify.rs:280-310","code":"  280 | impl ClientVerifier for NoClientAuth {\n  281 |     fn verify_identity(&self, _identity: &ClientIdentity<'_>) -> Result<PeerVerified, Error> {\n  282 |         unimplemented!();\n  283 |     }\n  284 | \n  285 |     fn verify_tls12_signature(\n  286 |         &self,\n  287 |         _input: &SignatureVerificationInput<'_>,\n  288 |     ) -> Result<HandshakeSignatureValid, Error> {\n  289 |         unimplemented!();\n  290 |     }\n  291 | \n  292 |     fn verify_tls13_signature(\n  293 |         &self,\n  294 |         _input: &SignatureVerificationInput<'_>,\n  295 |     ) -> Result<HandshakeSignatureValid, Error> {\n  296 |         unimplemented!();\n  297 |     }\n  298 | \n  299 |     fn root_hint_subjects(&self) -> Arc<[DistinguishedName]> {\n  300 |         unimplemented!();\n  301 |     }\n  302 | \n  303 |     fn offer_client_auth(&self) -> bool {\n  304 |         false\n  305 |     }\n  306 | \n  307 |     fn supported_verify_schemes(&self) -> Vec<SignatureScheme> {\n  308 |         unimplemented!();\n  309 |     }\n  310 | }","lines":31}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"`rewind_epoch` performs `self.common.epoch -= delta as u64`, which underflows (panics in debug) if\n`delta` exceeds the stored epoch. These are `#[doc(hidden)]` test-only helpers, so the blast radius is\nlimited, but the unchecked subtraction is still a latent panic.","fix":"Use `self.common.epoch = self.common.epoch.saturating_sub(delta as u64);`.","locations":[{"ref":"rustls/src/client/mod.rs:193-195","code":"  193 |     pub fn rewind_epoch(&mut self, delta: u32) {\n  194 |         self.common.epoch -= delta as u64;\n  195 |     }","lines":3},{"ref":"rustls/src/client/mod.rs:279-281","code":"  279 |     pub fn rewind_epoch(&mut self, delta: u32) {\n  280 |         self.common.epoch -= delta as u64;\n  281 |     }","lines":3}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`obfuscated_ticket_age` computes `age_secs as u32 * 1000` where `age_secs` is a `u64`. The\n`as u32` cast silently truncates a 64-bit seconds value, and the subsequent `* 1000` is performed in\nu32 and can overflow (panic under debug overflow-checks, wrap in release). `age_secs` is derived from\nstored-session `epoch` and the current time; although `has_expired()` and `MAX_TICKET_LIFETIME`\n(7 days) normally bound it, a corrupted/attacker-supplied persisted session (`from_slice` parses\n`epoch` straight from bytes) or a clock anomaly can produce a large `age_secs`, yielding a wrong\nobfuscated ticket age or a debug panic.","fix":"Do the arithmetic in u64 with saturation before truncating: `let age_millis = age_secs.saturating_mul(1000) as u32; age_millis.wrapping_add(self.value.age_add)`.","locations":[{"ref":"rustls/src/client/mod.rs:84-91","code":"   84 |     pub(crate) fn obfuscated_ticket_age(&self) -> u32 {\n   85 |         let age_secs = self\n   86 |             .retrieved_at\n   87 |             .as_secs()\n   88 |             .saturating_sub(self.value.common.epoch);\n   89 |         let age_millis = age_secs as u32 * 1000;\n   90 |         age_millis.wrapping_add(self.value.age_add)\n   91 |     }","lines":8}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`EncodedMessage::<OutboundOpaque>::encode` truncates the payload length to `u16` via\n`self.payload.len() as u16`. The encoded TLS record header would carry a wrong length if the\nopaque payload ever exceeds 65535 bytes. This is a silent narrowing cast in the record-encoding\npath with no bounds check or debug assertion. Records are normally bounded by the fragmenter, but\na defensive assertion is warranted in a security-critical encoder.","fix":"Add a `debug_assert!(self.payload.len() <= u16::MAX as usize)` before the cast, or have `encode` return an error on oversized payloads.","locations":[{"ref":"rustls/src/crypto/cipher/messages.rs:163-172","code":"  163 | impl EncodedMessage<OutboundOpaque> {\n  164 |     /// Encode this message to a vector of bytes.\n  165 |     pub fn encode(self) -> Vec<u8> {\n  166 |         let length = self.payload.len() as u16;\n  167 |         let mut encoded_payload = self.payload.0;\n  168 |         encoded_payload[0] = self.typ.into();\n  169 |         encoded_payload[1..3].copy_from_slice(&self.version.to_array());\n  170 |         encoded_payload[3..5].copy_from_slice(&(length).to_be_bytes());\n  171 |         encoded_payload\n  172 |     }","lines":10}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`make_tls12_aad` truncates the record length to `u16` via `put_u16(len as u16, ...)`. If `len`\nexceeds 65535 the AAD silently encodes a wrong (truncated) length, which would either cause\nauthentication failures (best case) or, combined with another bug, mis-authenticate a record.\nThere is no debug assertion bounding `len`. In practice records are bounded by fragmentation, but\nthis is a silent narrowing cast in a security-critical AAD construction with no guard.","fix":"Add a `debug_assert!(len <= u16::MAX as usize)` (or return an error) before casting `len` to `u16`.","locations":[{"ref":"rustls/src/crypto/cipher/mod.rs:332-344","code":"  332 | pub fn make_tls12_aad(\n  333 |     seq: u64,\n  334 |     typ: ContentType,\n  335 |     vers: ProtocolVersion,\n  336 |     len: usize,\n  337 | ) -> [u8; TLS12_AAD_SIZE] {\n  338 |     let mut out = [0; TLS12_AAD_SIZE];\n  339 |     put_u64(seq, &mut out[0..]);\n  340 |     out[8] = typ.into();\n  341 |     put_u16(vers.into(), &mut out[9..]);\n  342 |     put_u16(len as u16, &mut out[11..]);\n  343 |     out\n  344 | }","lines":13}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"On encode, `LengthPrefixedBuffer::drop` only verifies the body length against the\nlength-prefix capacity with `debug_assert!`. In release builds an oversized body is\nsilently truncated by `len as u8` / `len as u16` / `len as u32`, writing a wrong\nlength prefix and producing a corrupt/ambiguous wire message. Combined with the\n`payload_encode` of a handshake message using `ListLength::U24 { max: usize::MAX, .. }`\n(see mod.rs:504-510), a body exceeding 16MB would emit a truncated u24 length with no\nruntime error. This is encode-side (our own data) so impact is limited, but it can\ndesynchronize the peer instead of failing loudly.","fix":"Replace the debug_asserts with checked conversions (e.g. u8::try_from(len)) and either return/propagate an error or panic unconditionally; cap the handshake U24 `max` at the real protocol limit rather than usize::MAX.","locations":[{"ref":"rustls/src/msgs/codec.rs:296-320","code":"  296 |     fn drop(&mut self) {\n  297 |         match self.size_len {\n  298 |             ListLength::NonZeroU8 { .. } => {\n  299 |                 let len = self.buf.len() - self.len_offset - 1;\n  300 |                 debug_assert!(len <= 0xff);\n  301 |                 self.buf[self.len_offset] = len as u8;\n  302 |             }\n  303 |             ListLength::U16 | ListLength::NonZeroU16 { .. } => {\n  304 |                 let len = self.buf.len() - self.len_offset - 2;\n  305 |                 debug_assert!(len <= 0xffff);\n  306 |                 let out: &mut [u8; 2] = (&mut self.buf[self.len_offset..self.len_offset + 2])\n  307 |                     .try_into()\n  308 |                     .unwrap();\n  309 |                 *out = u16::to_be_bytes(len as u16);\n  310 |             }\n  311 |             ListLength::U24 { .. } | ListLength::NonZeroU24 { .. } => {\n  312 |                 let len = self.buf.len() - self.len_offset - 3;\n  313 |                 debug_assert!(len <= 0xff_ffff);\n  314 |                 let len_bytes = u32::to_be_bytes(len as u32);\n  315 |                 let out: &mut [u8; 3] = (&mut self.buf[self.len_offset..self.len_offset + 3])\n  316 |                     .try_into()\n  317 |                     .unwrap();\n  318 |                 out.copy_from_slice(&len_bytes[1..]);\n  319 |             }\n  320 |         }","lines":25},{"ref":"rustls/src/msgs/mod.rs:504-510","code":"  504 |         let nested = LengthPrefixedBuffer::new(\n  505 |             ListLength::U24 {\n  506 |                 max: usize::MAX,\n  507 |                 error: InvalidMessage::MessageTooLarge,\n  508 |             },\n  509 |             bytes,\n  510 |         );","lines":7}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`hkdf_expand_label_inner` casts the output length, label length, and context length with\n`n as u16` / `(...) as u8` / `context.len() as u8` without checking bounds. These are\nHKDF-Expand-Label `info` length fields. While current callers happen to supply bounded\nlengths (static labels, hash-sized contexts, `SizedPayload<u8>` ticket nonces), the function\nis `pub(crate)` and offers no guard: a future caller passing a context >255 bytes or output\n>65535 would silently truncate the length prefix and derive a wrong (attacker-influenceable)\nkey with no error. Defensive bounds checks belong here since this is the single chokepoint\nfor all label expansion.","fix":"Debug-assert or return an error when `n > u16::MAX`, `LABEL_PREFIX.len()+label.len() > u8::MAX`, or `context.len() > u8::MAX`, rather than silently truncating via `as` casts.","locations":[{"ref":"rustls/src/tls13/key_schedule.rs:1153-1179","code":" 1153 | fn hkdf_expand_label_inner<F, T>(\n 1154 |     expander: &dyn HkdfExpander,\n 1155 |     label: &[u8],\n 1156 |     context: &[u8],\n 1157 |     n: usize,\n 1158 |     f: F,\n 1159 | ) -> T\n 1160 | where\n 1161 |     F: FnOnce(&dyn HkdfExpander, &[&[u8]]) -> T,\n 1162 | {\n 1163 |     const LABEL_PREFIX: &[u8] = b\"tls13 \";\n 1164 | \n 1165 |     let output_len = u16::to_be_bytes(n as u16);\n 1166 |     let label_len = u8::to_be_bytes((LABEL_PREFIX.len() + label.len()) as u8);\n 1167 |     let context_len = u8::to_be_bytes(context.len() as u8);\n 1168 | \n 1169 |     let info = &[\n 1170 |         &output_len[..],\n 1171 |         &label_len[..],\n 1172 |         LABEL_PREFIX,\n 1173 |         label,\n 1174 |         &context_len[..],\n 1175 |         context,\n 1176 |     ];\n 1177 | \n 1178 |     f(expander, info)\n 1179 | }","lines":27}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":true,"description":"In `set_freshness`, the elapsed server-side ticket age in seconds is truncated\nto u32 (`... as u32`) *before* multiplying by 1000, rather than saturating in\nu64 first. `(time_now.as_secs().saturating_sub(creation_time_sec) as u32)\n.saturating_mul(1000)`. For ages above u32::MAX seconds (~136 years) the cast\nwraps, producing a small `server_age_ms` and potentially mis-classifying an\nextremely old ticket as fresh. Not realistically reachable (ticket lifetimes\nare tiny), but the cast-then-multiply ordering defeats the intent of the\nsaturating arithmetic.","fix":"Compute the age in u64 and saturate the multiplication in u64, e.g. `time_now.as_secs().saturating_sub(creation_time_sec).saturating_mul(1000).min(u32::MAX as u64) as u32`.","locations":[{"ref":"rustls/src/server/tls13.rs:1252-1255","code":" 1252 |         let server_age_ms = (time_now\n 1253 |             .as_secs()\n 1254 |             .saturating_sub(self.common.creation_time_sec) as u32)\n 1255 |             .saturating_mul(1000);","lines":4}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`ClientSessionMemoryCache` stores `kx_hint`, the TLS1.2 session, and all TLS1.3 tickets for a server\nin a single `ServerData` entry keyed by `ClientSessionKey`, inside a `LimitedCache` whose capacity is\n`size / MAX_TLS13_TICKETS_PER_SERVER` (server slots). The cache size argument (e.g. the default 256)\nis documented as \"the maximum number of stored sessions\", but because each server slot can hold up to\n8 TLS1.3 tickets plus a TLS1.2 session, the actual maximum number of stored *sessions* is up to ~8x\nthe configured number, and the number of distinct servers tracked is only `size/8` (32 for the\ndefault 256). This is a mismatch between the documented unit (\"sessions\") and the enforced unit\n(\"servers * up-to-8-tickets\"), which can both surprise memory budgeting and silently evict\nper-server kx hints / TLS1.2 sessions far sooner than a user expects.","fix":"Align documentation and computation: either document `size` as 'number of servers', or track sessions directly so the configured number is the real bound.","locations":[{"ref":"rustls/src/client/handy.rs:71-84","code":"   71 |     pub struct ClientSessionMemoryCache {\n   72 |         servers: Mutex<limited_cache::LimitedCache<ClientSessionKey<'static>, ServerData>>,\n   73 |     }\n   74 | \n   75 |     impl ClientSessionMemoryCache {\n   76 |         /// Make a new ClientSessionMemoryCache.  `size` is the\n   77 |         /// maximum number of stored sessions.\n   78 |         pub fn new(size: usize) -> Self {\n   79 |             let max_servers = size.saturating_add(MAX_TLS13_TICKETS_PER_SERVER - 1)\n   80 |                 / MAX_TLS13_TICKETS_PER_SERVER;\n   81 |             Self {\n   82 |                 servers: Mutex::new(limited_cache::LimitedCache::new(max_servers)),\n   83 |             }\n   84 |         }","lines":14},{"ref":"rustls/src/client/config.rs:548-553","code":"  548 |     pub fn in_memory_sessions(num: usize) -> Self {\n  549 |         Self {\n  550 |             store: Arc::new(ClientSessionMemoryCache::new(num)),\n  551 |             tls12_resumption: Tls12Resumption::SessionIdOrTickets,\n  552 |         }\n  553 |     }","lines":6},{"ref":"rustls/src/client/config.rs:584-588","code":"  584 |     /// Create an in-memory session store resumption with up to 256 server names, allowing\n  585 |     /// a TLS 1.2 session to resume with a session id or RFC 5077 ticket.\n  586 |     fn default() -> Self {\n  587 |         Self::in_memory_sessions(256)\n  588 |     }","lines":5}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`insert_tls13_ticket` bounds the per-server TLS1.3 ticket count using `data.tls13.capacity()`\ninstead of the `MAX_TLS13_TICKETS_PER_SERVER` constant. The number of tickets is controlled by the\nserver (NewSessionTicket messages), and the trait docs explicitly say \"The number of times this is\ncalled is controlled by the server, so implementations of this trait should apply a reasonable\nbound\". `VecDeque::capacity()` is only a *lower bound*: the allocator/`VecDeque` may round the\nrequested capacity (8) up to a larger value (e.g. the next power of two), so the effective per-server\nlimit becomes whatever the allocator chose rather than the intended 8. This lets a malicious or\nmisconfigured server cause the client to retain more tickets per server than documented, undermining\nthe intended memory bound.","fix":"Compare against the `MAX_TLS13_TICKETS_PER_SERVER` constant: `if data.tls13.len() >= MAX_TLS13_TICKETS_PER_SERVER { data.tls13.pop_front(); }`.","locations":[{"ref":"rustls/src/client/handy.rs:126-136","code":"  126 |         fn insert_tls13_ticket(&self, key: ClientSessionKey<'static>, value: Tls13Session) {\n  127 |             self.servers\n  128 |                 .lock()\n  129 |                 .unwrap()\n  130 |                 .get_or_insert_default_and_edit(key, |data| {\n  131 |                     if data.tls13.len() == data.tls13.capacity() {\n  132 |                         data.tls13.pop_front();\n  133 |                     }\n  134 |                     data.tls13.push_back(value);\n  135 |                 });\n  136 |         }","lines":11},{"ref":"rustls/src/client/handy.rs:45","code":"   45 |     const MAX_TLS13_TICKETS_PER_SERVER: usize = 8;","lines":1},{"ref":"rustls/src/client/handy.rs:62","code":"   62 |                 tls13: VecDeque::with_capacity(MAX_TLS13_TICKETS_PER_SERVER),","lines":1}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"When ECH was offered and rejected, the client stores the server's retry configs only when `ech_status == EchStatus::Rejected`. But `ech_status` becomes `Rejected` only via `confirm_acceptance` (full handshake) or `confirm_hrr_acceptance`. If the server accepted ECH in ServerHello (status `Accepted`) but then sends an EncryptedExtensions ECH ack with retry_configs, the `(EchStatus::NotOffered | EchStatus::Accepted, Some(_))` arm correctly errors. However the `(EchStatus::Offered, _)` case is not handled by any explicit arm and falls through to `_ => None`, silently discarding any retry configs while leaving status as `Offered`. Status `Offered` should be unreachable at EncryptedExtensions time (it is resolved to Accepted/Rejected in handle_server_hello), but if a future refactor leaves it `Offered`, retry configs would be silently dropped rather than producing a defined error. Worth an explicit guard.","fix":"Add an explicit arm for `(EchStatus::Offered, _)` (or `EchStatus::Grease`) that returns an internal error / unreachable, instead of letting it fall into the catch-all `_ => None`.","locations":[{"ref":"rustls/src/client/tls13.rs:564-577","code":"  564 |         let ech_retry_configs = match (self.ech_status, &exts.encrypted_client_hello_ack) {\n  565 |             // If we didn't offer ECH, or ECH was accepted, but the server sent an ECH encrypted\n  566 |             // extension with retry configs, we must error.\n  567 |             (EchStatus::NotOffered | EchStatus::Accepted, Some(_)) => {\n  568 |                 return Err(PeerMisbehaved::UnsolicitedEchExtension.into());\n  569 |             }\n  570 |             // If we offered ECH, and it was rejected, store the retry configs (if any) from\n  571 |             // the server's ECH extension. We will return them in an error produced at the end\n  572 |             // of the handshake.\n  573 |             (EchStatus::Rejected, ext) => ext\n  574 |                 .as_ref()\n  575 |                 .map(|ext| ext.retry_configs.to_vec()),\n  576 |             _ => None,\n  577 |         };","lines":14}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Nonce::new_inner` silently drops the `path_id` when the IV length is 8, 9, 10 or 11 bytes.\nThe QUIC-multipath branch only writes `path_id` into the buffer when `iv_len >= 12`; for\n`8 <= iv_len < 12` the `path_id` is ignored entirely, so two different paths sharing the same\npacket number produce the *same* nonce. Nonce reuse across paths breaks AEAD security\n(catastrophic for confidentiality/integrity). While the standard QUIC IV is 12 bytes (so this\nis latent), there is no assertion or error for shorter IVs - the failure is silent. A custom\nprovider supplying a shorter IV would silently get nonce collisions instead of an error.","fix":"When `path_id.is_some()` but `iv_len < 12`, return an error or assert, rather than silently producing a nonce that ignores `path_id`.","locations":[{"ref":"rustls/src/crypto/cipher/mod.rs:247-269","code":"  247 |     fn new_inner(path_id: Option<u32>, iv: &Iv, seq: u64) -> Self {\n  248 |         let iv_len = iv.len();\n  249 |         let mut buf = [0u8; Iv::MAX_LEN];\n  250 | \n  251 |         if iv_len >= 8 {\n  252 |             put_u64(seq, &mut buf[iv_len - 8..iv_len]);\n  253 |             if let Some(path_id) = path_id {\n  254 |                 if iv_len >= 12 {\n  255 |                     buf[iv_len - 12..iv_len - 8].copy_from_slice(&path_id.to_be_bytes());\n  256 |                 }\n  257 |             }\n  258 |         } else {\n  259 |             let seq_bytes = seq.to_be_bytes();\n  260 |             buf[..iv_len].copy_from_slice(&seq_bytes[8 - iv_len..]);\n  261 |         }\n  262 | \n  263 |         buf[..iv_len]\n  264 |             .iter_mut()\n  265 |             .zip(iv.as_ref())\n  266 |             .for_each(|(s, iv)| *s ^= *iv);\n  267 | \n  268 |         Self { buf, len: iv_len }\n  269 |     }","lines":23}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `TicketRotator::maybe_roll`, when rotation occurs the old `current` is moved into\n`previous` only when it is `Some`. However, two rotations occurring within a single\n`lifetime` window (e.g. if `maybe_roll` is invoked with two `now` values both past the\ncurrent expiry but the second after a fresh generation) will overwrite a still-grace-period\n`previous` with the just-demoted `current`, silently dropping the older ticketer. Tickets\nencrypted by the dropped ticketer that are still within their advertised two-`lifetime`\nvalidity window will then fail to decrypt, causing spurious resumption failures. The\nrotation logic assumes at most one rotation per lifetime but does not enforce or document\nthat invariant.","fix":"Either document/enforce that callers must not skip rotation epochs, or track expiry of `previous` and only overwrite it once it is itself out of its grace period; consider chaining demotions so a valid `previous` is not discarded prematurely.","locations":[{"ref":"rustls/src/ticketer.rs:104-147","code":"  104 |     pub(crate) fn maybe_roll(\n  105 |         &self,\n  106 |         now: Instant,\n  107 |     ) -> Option<RwLockReadGuard<'_, TicketRotatorState>> {\n  108 |         // Fast, common, & read-only path in case we do not need to switch\n  109 |         // to the next ticketer yet\n  110 |         {\n  111 |             let read = self.state.read().ok()?;\n  112 |             match &read.current {\n  113 |                 Some(current) if now <= current.expires_at => return Some(read),\n  114 |                 _ => {}\n  115 |             }\n  116 |         }\n  117 | \n  118 |         let mut write = self.state.write().ok()?;\n  119 |         if let Some(current) = &write.current {\n  120 |             if now <= current.expires_at {\n  121 |                 // Another thread beat us to it. Nothing to do.\n  122 |                 drop(write);\n  123 |                 return self.state.read().ok();\n  124 |             }\n  125 |         }\n  126 | \n  127 |         // We need to switch ticketers, and make a new one.\n  128 |         // Generate a potential \"next\" ticketer outside the lock.\n  129 |         let next = (self.generator)()\n  130 |             .ok()\n  131 |             .map(|producer| Generation {\n  132 |                 producer,\n  133 |                 expires_at: now + self.lifetime,\n  134 |             });\n  135 | \n  136 |         // Now we have:\n  137 |         // - confirmed we need rotation\n  138 |         // - confirmed we are the thread that will do it\n  139 |         // - successfully made the replacement ticketer\n  140 |         let prev = mem::replace(&mut write.current, next);\n  141 |         if prev.is_some() {\n  142 |             write.previous = prev;\n  143 |         }\n  144 |         drop(write);\n  145 | \n  146 |         self.state.read().ok()\n  147 |     }","lines":44}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"On the client `LimitedCache`, capacity is computed as\n`size.saturating_add(MAX_TLS13_TICKETS_PER_SERVER - 1) / MAX_TLS13_TICKETS_PER_SERVER`. When the user\npasses `size == 0` (e.g. intending to effectively disable in-memory caching while still using a\n`ClientSessionMemoryCache`), this yields `7 / 8 == 0`, so `LimitedCache::new(0)` is created. With a\nzero capacity the eviction logic (`oldest.capacity() == oldest.len()`) can permit inserting one entry\nthat is then immediately evicted on the next insert, giving surprising/near-useless behavior rather\nthan a clear contract. Documented default is 256 so this is an edge case, but a `size` of a few\nsessions also rounds oddly (e.g. `1..=8` all collapse to one server slot).","fix":"Document the rounding explicitly and/or clamp `max_servers` to at least 1 when `size > 0`, so a non-zero requested size always yields a usable cache.","locations":[{"ref":"rustls/src/client/handy.rs:78-84","code":"   78 |         pub fn new(size: usize) -> Self {\n   79 |             let max_servers = size.saturating_add(MAX_TLS13_TICKETS_PER_SERVER - 1)\n   80 |                 / MAX_TLS13_TICKETS_PER_SERVER;\n   81 |             Self {\n   82 |                 servers: Mutex::new(limited_cache::LimitedCache::new(max_servers)),\n   83 |             }\n   84 |         }","lines":7}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Bitwise `&` is used instead of logical `&&` in the condition `matches!(ech_status, EchStatus::Rejected | EchStatus::Grease) & retryreq.is_some()`. Both operands are `bool` so the result is correct, but `&` is non-short-circuiting and unidiomatic in a boolean guard; it reads like a typo and a future change to a non-bool operand would change semantics.","fix":"Use `&&` instead of `&`.","locations":[{"ref":"rustls/src/client/hs.rs:707","code":"  707 |     if matches!(ech_status, EchStatus::Rejected | EchStatus::Grease) & retryreq.is_some() {","lines":1}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"TLS1.2 EMS resumption acceptance condition is redundant and turns a graceful\nfallback into a fatal alert. `check_session` accepts a session for resumption\nwhen `session.extended_ms == using_ems || session.extended_ms && !using_ems`.\nThe second disjunct only adds the case `session.extended_ms == true &&\nusing_ems == false` (a client that previously negotiated Extended Master Secret\nbut is now offering a ClientHello without the EMS extension). For that case\n`start_resumption` immediately returns `PeerMisbehaved::ResumptionAttemptedWithVariedEms`\n(tls12.rs:313-315), aborting the connection with a fatal alert instead of\nfalling back to a full handshake. The extra disjunct should be removed so such\na ticket simply causes a full handshake (the RFC-recommended behaviour),\nmatching how other resumption mismatches are handled (return None).","fix":"Replace the condition with `session.extended_ms == using_ems` so an EMS/non-EMS mismatch yields `(ticket, None)` and a full handshake, instead of being accepted here and then rejected fatally in start_resumption.","locations":[{"ref":"rustls/src/server/tls12.rs:291-294","code":"  291 |         match session.extended_ms == using_ems || session.extended_ms && !using_ems {\n  292 |             true => (ticket, Some(session.into_owned())),\n  293 |             false => (ticket, None),\n  294 |         }","lines":4},{"ref":"rustls/src/server/tls12.rs:313-315","code":"  313 |         if resumedata.extended_ms && !using_ems {\n  314 |             return Err(PeerMisbehaved::ResumptionAttemptedWithVariedEms.into());\n  315 |         }","lines":3}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Generation::in_grace_period` returns `now <= self.expires_at + lifetime`, and `maybe_roll`\nrolls only when `now > current.expires_at` (strictly). At the exact boundary instants the\nticket is still considered usable. The documented contract is \"usable for at least one\n`lifetime`, and at most two `lifetime`s\". `Instant` arithmetic `self.expires_at + lifetime`\ncan panic on overflow if `lifetime` is very large (e.g. near `Duration::MAX`), since\n`Instant + Duration` panics on overflow. A pathological but caller-supplied `lifetime`\npassed to `TicketRotator::new` would make grace-period checks abort.","fix":"Use `Instant::checked_add(lifetime)` and treat overflow as 'not in grace period', or validate `lifetime` in `TicketRotator::new` to a sane upper bound.","locations":[{"ref":"rustls/src/ticketer.rs:183-187","code":"  183 | impl Generation {\n  184 |     fn in_grace_period(&self, now: Instant, lifetime: Duration) -> bool {\n  185 |         now <= self.expires_at + lifetime\n  186 |     }\n  187 | }","lines":5},{"ref":"rustls/src/ticketer.rs:31-46","code":"   31 |     pub fn new(\n   32 |         lifetime: Duration,\n   33 |         generator: fn() -> Result<Box<dyn TicketProducer>, Error>,\n   34 |     ) -> Result<Self, Error> {\n   35 |         Ok(Self {\n   36 |             generator,\n   37 |             lifetime,\n   38 |             state: RwLock::new(TicketRotatorState {\n   39 |                 current: Some(Generation {\n   40 |                     producer: generator()?,\n   41 |                     expires_at: Instant::now() + lifetime,\n   42 |                 }),\n   43 |                 previous: None,\n   44 |             }),\n   45 |         })\n   46 |     }","lines":16}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`pki_error` maps webpki's `InvalidCertValidity` to `CertificateError::Expired`. In\nrustls-webpki, `InvalidCertValidity` is raised when a certificate's notBefore/notAfter\nrange is itself malformed (e.g. notBefore > notAfter), which is not the same condition as\nthe cert being expired against the current time. The mapping still rejects the certificate\n(it produces an error, so there is no acceptance-of-invalid-cert risk), but it surfaces a\nmisleading `Expired` reason and a `CertificateExpired` alert for a structurally invalid\nvalidity window.","fix":"Map `InvalidCertValidity` to `CertificateError::BadEncoding` (structural problem) or a dedicated variant, rather than `Expired`.","locations":[{"ref":"rustls/src/webpki/mod.rs:61","code":"   61 |         InvalidCertValidity => CertificateError::Expired.into(),","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`HashAdapter::finish` and `SecurityDomain::new` both `unwrap()` the result of slicing the hash output\n(`[..8]` / `[..32]`). Correctness depends entirely on the runtime invariant that the selected hash\nprovider outputs >= 32 bytes, enforced only by the `.expect(...)` in `SecurityDomain::new` (line 481).\nIf a custom `CryptoProvider` ever advertised a cipher suite whose hash claimed `output_len() >= 32`\nbut whose `finish()`/`fork_finish()` returned fewer bytes, these `unwrap()`s would panic. This is a\nprovider-trust invariant, but the coupling between `output_len()` and actual output length is not\nchecked.","fix":"Validate that the produced output length matches `output_len()` (or use a checked conversion returning a configuration error) instead of `unwrap()`.","locations":[{"ref":"rustls/src/client/config.rs:292-306","code":"  292 | impl Hasher for HashAdapter<'_> {\n  293 |     fn finish(&self) -> u64 {\n  294 |         // SAFETY: this is private to `SecurityDomain::new`, which guarantees `hash::Output`\n  295 |         // is at least 32 bytes.\n  296 |         u64::from_be_bytes(\n  297 |             self.0.fork_finish().as_ref()[..8]\n  298 |                 .try_into()\n  299 |                 .unwrap(),\n  300 |         )\n  301 |     }\n  302 | \n  303 |     fn write(&mut self, bytes: &[u8]) {\n  304 |         self.0.update(bytes)\n  305 |     }\n  306 | }","lines":15},{"ref":"rustls/src/client/config.rs:476-504","code":"  476 |         // Use a hash function that outputs at least 32 bytes.\n  477 |         let hash = provider\n  478 |             .iter_cipher_suites()\n  479 |             .map(|cs| cs.hash_provider())\n  480 |             .find(|h| h.output_len() >= 32)\n  481 |             .expect(\"no suitable cipher suite available (with |H| >= 32)\"); // this is -- in practice -- all cipher suites\n  482 | \n  483 |         let mut h = hash.start();\n  484 |         let mut adapter = HashAdapter(h.as_mut());\n  485 | \n  486 |         // Include TypeId of impl, so two different types with different non-configured\n  487 |         // behavior do not collide even if their `hash_config()`s are the same.\n  488 |         client_auth_cert_resolver\n  489 |             .type_id()\n  490 |             .hash(&mut DynHasher(&mut adapter));\n  491 |         client_auth_cert_resolver.hash_config(&mut adapter);\n  492 | \n  493 |         verifier\n  494 |             .type_id()\n  495 |             .hash(&mut DynHasher(&mut adapter));\n  496 |         verifier.hash_config(&mut adapter);\n  497 | \n  498 |         time_provider\n  499 |             .type_id()\n  500 |             .hash(&mut DynHasher(&mut adapter));\n  501 | \n  502 |         let config_hash = h.finish().as_ref()[..32]\n  503 |             .try_into()\n  504 |             .unwrap();","lines":29}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`prepare_resumption` calls `suite.can_resume_from(tls13.suite)?` where `can_resume_from` returns an `Option`; the `?` therefore converts a `None` (incompatible suite) into an early `return None` from this function (meaning \"no PSK / no resumption\"), silently dropping resumption rather than surfacing the incompatibility. This is benign for the initial hello but the silent path differs from the equivalent server-hello handling in tls13.rs (line 149) which raises `PeerMisbehaved::ResumptionOfferedWithIncompatibleCipherSuite`. The asymmetry is easy to misread; here it merely declines to send the PSK which is acceptable, but the `?`-on-Option control flow is non-obvious.","fix":"Make the intent explicit: `if suite.can_resume_from(tls13.suite).is_none() { return None; }` with a comment that an incompatible selected suite means we decline to offer the PSK.","locations":[{"ref":"rustls/src/client/hs.rs:971-973","code":"  971 |     if let Some(suite) = suite {\n  972 |         suite.can_resume_from(tls13.suite)?;\n  973 |     }","lines":3}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`SharedSecret::strip_leading_zeros` advances `offset` past any leading zero bytes; if the secret\nis all zeros it advances `offset` to `len()`, yielding an empty `secret_bytes()`. For TLS1.2 FFDHE\nthis is the RFC-specified behaviour, but an all-zero (or degenerate) DH shared secret is a sign of\na small-subgroup / invalid peer key; silently producing an empty secret rather than rejecting it\nis fragile. The function relies entirely on the kx implementation having validated the peer key.\nThis is a defense-in-depth observation, not a confirmed vuln.","fix":"Consider treating an all-zero shared secret as an error in `complete_for_tls_version`, since it indicates an invalid/contributory-behaviour-violating key share.","locations":[{"ref":"rustls/src/crypto/kx/mod.rs:614-623","code":"  614 |     fn strip_leading_zeros(&mut self) {\n  615 |         let start = self\n  616 |             .secret_bytes()\n  617 |             .iter()\n  618 |             .enumerate()\n  619 |             .find(|(_i, x)| **x != 0)\n  620 |             .map(|(i, _x)| i)\n  621 |             .unwrap_or_else(|| self.secret_bytes().len());\n  622 |         self.offset += start;\n  623 |     }","lines":10}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`HandshakeMessagePayload::read_version` reads the 3-byte handshake length with\n`U24::read(r)?.0 as usize` and immediately does `r.sub(len)` with no upper bound,\ndespite the doc in codec.rs (CERTIFICATE_MAX_SIZE_LIMIT / \"We contract that to 64KB\")\nasserting that rustls limits peer-controllable handshake sizes. The `sub` is bounded by\nbytes already buffered so there is no large allocation here, but the absence of an\nexplicit ceiling means the only limit is whatever the deframer reassembles; the\ncontracted 64KB-style limit is not enforced at this parse point.","fix":"Reject handshake lengths above an explicit maximum (e.g. the same CERTIFICATE_MAX_SIZE_LIMIT-style bound) before calling r.sub(len).","locations":[{"ref":"rustls/src/msgs/mod.rs:382-384","code":"  382 |         let typ = HandshakeType::read(r)?;\n  383 |         let len = U24::read(r)?.0 as usize;\n  384 |         let mut sub = r.sub(len)?;","lines":3}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`emit_ticket` (TLS1.2) silently sends an empty NewSessionTicket when the\nticketer fails to encrypt (`ticketer.encrypt(&plain).unwrap_or_default()`).\nAn empty ticket is useless to the client and the client will store it and may\nlater offer it, only to have it fail to decrypt. While the comment explains the\nconstraint that no error can be returned here, sending an empty ticket wastes a\nround of work and a client ticket slot; not emitting the NewSessionTicket at all\n(as the TLS1.3 path does at tls13.rs:1357-1359) would be cleaner and avoid the\nclient caching a dead ticket.","fix":"When `ticketer.encrypt` returns None, skip emitting the NewSessionTicket message entirely instead of sending an empty ticket, mirroring the TLS1.3 behaviour.","locations":[{"ref":"rustls/src/server/tls12.rs:883-902","code":"  883 |     // If we can't produce a ticket for some reason, we can't\n  884 |     // report an error. Send an empty one.\n  885 |     let ticket = ticketer\n  886 |         .encrypt(&plain)\n  887 |         .unwrap_or_default();\n  888 |     let ticket_lifetime = ticketer.lifetime();\n  889 | \n  890 |     let m = Message {\n  891 |         version: ProtocolVersion::TLSv1_2,\n  892 |         payload: MessagePayload::handshake(HandshakeMessagePayload(\n  893 |             HandshakePayload::NewSessionTicket(NewSessionTicketPayload::new(\n  894 |                 ticket_lifetime,\n  895 |                 ticket,\n  896 |             )),\n  897 |         )),\n  898 |     };\n  899 | \n  900 |     transcript.add_message(&m);\n  901 |     output.send_msg(m, false);\n  902 |     Ok(())","lines":20}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`compression_for_impl` releases the cache mutex (line 362 `drop(cache)`) before doing the\nexpensive `compressor.compress(...)`, then re-acquires it to insert. Two concurrent\nconnections that miss on the same key will both compress the identical input and both push\nan entry, producing duplicate cache entries for one logical key (wasting LRU slots and\ndefeating the amortization the cache exists for). The eviction check `if cache.len() == max_size`\nkeeps the total bounded, but the duplicates remain until evicted. This is purely a\nperformance/correctness-of-caching issue, not a memory-safety one.","fix":"After re-acquiring the lock, re-scan for an existing matching entry before pushing the freshly compressed one (return the existing one if a racer inserted it), or hold a per-key in-progress marker.","locations":[{"ref":"rustls/src/compress.rs:351-385","code":"  351 |         let mut cache = entries\n  352 |             .lock()\n  353 |             .map_err(|_| CompressionFailed)?;\n  354 |         for (i, item) in cache.iter().enumerate() {\n  355 |             if item.algorithm == algorithm && item.original == encoding {\n  356 |                 // this item is now MRU\n  357 |                 let item = cache.remove(i).unwrap();\n  358 |                 cache.push_back(item.clone());\n  359 |                 return Ok(item);\n  360 |             }\n  361 |         }\n  362 |         drop(cache);\n  363 | \n  364 |         // do compression:\n  365 |         let uncompressed_len = encoding.len() as u32;\n  366 |         let compressed = compressor.compress(encoding.clone(), CompressionLevel::Amortized)?;\n  367 |         let new_entry = Arc::new(CompressionCacheEntry {\n  368 |             algorithm,\n  369 |             original: encoding,\n  370 |             compressed: CompressedCertificatePayload {\n  371 |                 alg: algorithm,\n  372 |                 uncompressed_len,\n  373 |                 compressed: SizedPayload::from(Payload::new(compressed)),\n  374 |             },\n  375 |         });\n  376 | \n  377 |         // insert into cache\n  378 |         let mut cache = entries\n  379 |             .lock()\n  380 |             .map_err(|_| CompressionFailed)?;\n  381 |         if cache.len() == max_size {\n  382 |             cache.pop_front();\n  383 |         }\n  384 |         cache.push_back(new_entry.clone());\n  385 |         Ok(new_entry)","lines":35}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`prepare_read` calls `self.buf.resize(need_capacity, 0)` to grow the read buffer, zero-initializing the newly added bytes on every read that grows the buffer. The bytes are about to be overwritten by `rd.read(&mut self.buf[self.used..])`, so the zeroing is wasted work on the hot receive path. For 4K growth steps this is a memset per read.","fix":"Use `reserve`/`set_len` with care, or track an initialized-length watermark, to avoid re-zeroing buffer space that is immediately filled by the socket read. Alternatively use `Vec::resize` only when genuinely extending past previously-initialized capacity.","locations":[{"ref":"rustls/src/msgs/deframer/buffers.rs:84-90","code":"   84 |         let need_capacity = Ord::min(MAX_HANDSHAKE_SIZE, self.used + READ_SIZE);\n   85 |         if need_capacity > self.buf.len() {\n   86 |             self.buf.resize(need_capacity, 0);\n   87 |         } else if self.used == 0 || self.buf.len() > MAX_HANDSHAKE_SIZE {\n   88 |             self.buf.resize(need_capacity, 0);\n   89 |             self.buf.shrink_to(need_capacity);\n   90 |         }","lines":7}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`compressed_exts.clone()` {\n  465 |         self.0\n  466 |     }\n  467 | }\n  468 | \n  469 | impl DerefMut for InboundOpaque<'_> {\n  470 |     fn deref_mut(&mut self) -> &mut Self::Target {\n  471 |         self.0\n  472 |     }\n  473 | }\n  474 | \n  475 | /// Decode a TLS1.3 `TLSInnerPlaintext` encoding.\n  476 | ///\n  477 | /// `p` is a message payload, immediately post-decryption.  This function\n  478 | /// removes zero padding bytes, until a non-zero byte is encountered which is\n  479 | /// the content type, which is returned.  See RFC8446 s5.2.\n  480 | ///\n  481 | /// ContentType(0) is returned if the message payload is empty or all zeroes.\n  482 | fn unpad_tls13_payload(p: &mut InboundOpaque<'_>) -> ContentType {\n  483 |     loop {\n  484 |         match p.pop() {\n  485 |             Some(0) => {}\n  486 |             Some(content_type) => return ContentType::from(content_type),\n  487 |             None => return ContentType(0),\n  488 |         }\n  489 |     }\n  490 | }","lines":42}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`HelloRetryRequestExtensions::read` allocates a `Vec` (`order`) on every parse to record\nextension decoding order, even though it is only needed for the rare ECH HRR\nconfirmation round-trip. For the common HRR this is a needless heap allocation in the\nparse path.","fix":"Only build/retain the order vector when ECH/round-trip re-encoding is actually required, or reserve based on a small expected count.","locations":[{"ref":"rustls/src/msgs/handshake.rs:470-490","code":"  470 |     fn read(r: &mut Reader<'a>) -> Result<Self, InvalidMessage> {\n  471 |         let mut out = Self::default();\n  472 | \n  473 |         // we must record order, so re-encoding round trips.  this is needed,\n  474 |         // unfortunately, for ECH HRR confirmation\n  475 |         let mut order = vec![];\n  476 | \n  477 |         let len = usize::from(u16::read(r)?);\n  478 |         let mut on_data` into HandshakeState directly and clone it into emit_ticket only when a ticket is sent, or vice versa, to avoid the unconditional extra allocation.","locations":[{"ref":"rustls/src/server/tls12.rs:343","code":"  343 |             resumption_data: resumption_data.to_vec(),","lines":1},{"ref":"rustls/src/server/tls12.rs:365-381","code":"  365 |         if send_ticket {\n  366 |             let now = hs.config.current_time()?;\n  367 | \n  368 |             if let Some(ticketer) = hs.config.ticketer.as_deref() {\n  369 |                 emit_ticket(\n  370 |                     &secrets,\n  371 |                     &mut hs.transcript,\n  372 |                     using_ems,\n  373 |                     resumedata.common.peer_identity.as_ref(),\n  374 |                     hs.alpn_protocol.as_ref(),\n  375 |                     hs.sni.as_ref(),\n  376 |                     resumption_data,\n  377 |                     output,\n  378 |                     ticketer,\n  379 |                     now,\n  380 |                 )?;\n  381 |             }","lines":17}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`KeyScheduleSuite::export_keying_material` recomputes `hash_provider.hash(&[])` (hash of the\nempty input) on every export call instead of using the cached `algorithm().hash_for_empty_input()`\nfast path that the rest of the key schedule uses (see `derive_for_empty_hash`). For SHA-256/384\nthis is a precomputed constant; recomputing the empty hash per RFC5705 export is wasted work.","fix":"Use `self.suite.common.hash_provider.algorithm().hash_for_empty_input().unwrap_or_else(|| hash(&[]))` for the empty-hash `h_empty`, consistent with `derive_for_empty_hash`.","locations":[{"ref":"rustls/src/tls13/key_schedule.rs:1019-1032","code":" 1019 |     ) -> Result<(), Error> {\n 1020 |         let secret = {\n 1021 |             let h_empty = self\n 1022 |                 .suite\n 1023 |
