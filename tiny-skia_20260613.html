<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In the non-AA hairline rasterizer, the 'mostly horizontal' branch added a `max_y` upper-bound guard (lines 100-108) specifically to avoid blitting at `y == image_height`, which the comment says causes a panic by accessing pixels outside the buffer. The symmetric 'mostly vertical' branch has NO equivalent upper-bound guard on `iy0`: it only checks `start_x >= 0 && iy0 >= 0` before calling `blit_h((start_x >> 16) as u32, iy0 as u32, ...)`. The same rounding/precision drift that motivated `max_y` can push `iy0` to equal the clip bottom / image height, and `blit_h` builds a ScreenIntRect via `from_xywh_safe` (no clamping) that indexes the pixmap, leading to out-of-bounds access. There is also no upper bound on the column for `start_x`.","fix":"Mirror the horizontal-branch logic in the vertical branch: compute a `max_x` (and reuse the clip bottom for `iy0`) and only blit when `start_x >> 16 < max_x` and `iy0 < max_y`.","locations":[{"ref":"src/scan/hairline.rs:139-142","code":"  139 |             loop {\n  140 |                 if start_x >= 0 && iy0 >= 0 {\n  141 |                     blitter.blit_h((start_x >> 16) as u32, iy0 as u32, LENGTH_U32_ONE);\n  142 |                 }","lines":4},{"ref":"src/scan/hairline.rs:100-110","code":"  100 |             let max_y = if let Some(clip_bounds) = clip_bounds {\n  101 |                 fdot16::from_f32(clip_bounds.bottom())\n  102 |             } else {\n  103 |                 i32::MAX\n  104 |             };\n  105 | \n  106 |             debug_assert!(ix0 < ix1);\n  107 |             loop {\n  108 |                 if ix0 >= 0 && start_y >= 0 && start_y < max_y {\n  109 |                     blitter.blit_h(ix0 as u32, (start_y >> 16) as u32, LENGTH_U32_ONE);\n  110 |                 }","lines":11}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Rect::bbox_transform` and `NonZeroRect::bbox_transform` compute `x = self.x()*bbox.width()+bbox.x()`, `w = self.width()*bbox.width()`, etc., then call `from_xywh(...).unwrap()`. Even though both inputs are finite and bounded, the products/sums can overflow f32 to infinity (e.g. self spanning near f32::MAX scaled by a bbox width > 1), making `from_xywh` return `None` and the `unwrap()` panic. These are presented as infallible APIs.","fix":"Return `Option<Self>` and propagate the `from_xywh` result instead of unwrapping, or clamp/validate the products before constructing the rect.","locations":[{"ref":"path/src/rect.rs:483-490","code":"  483 |     /// Applies a bounding box transform.\n  484 |     pub fn bbox_transform(&self, bbox: NonZeroRect) -> Self {\n  485 |         let x = self.x() * bbox.width() + bbox.x();\n  486 |         let y = self.y() * bbox.height() + bbox.y();\n  487 |         let w = self.width() * bbox.width();\n  488 |         let h = self.height() * bbox.height();\n  489 |         Self::from_xywh(x, y, w, h).unwrap()\n  490 |     }","lines":8},{"ref":"path/src/rect.rs:685-692","code":"  685 |     /// Applies a bounding box transform.\n  686 |     pub fn bbox_transform(&self, bbox: NonZeroRect) -> Self {\n  687 |         let x = self.x() * bbox.width() + bbox.x();\n  688 |         let y = self.y() * bbox.height() + bbox.y();\n  689 |         let w = self.width() * bbox.width();\n  690 |         let h = self.height() * bbox.height();\n  691 |         Self::from_xywh(x, y, w, h).unwrap()\n  692 |     }","lines":8}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Unbounded inner loop indexes `self.segments[new_seg_index]` while incrementing `new_seg_index` with no upper-bound check. Termination relies on the invariant that a segment with a point_index different from `old_point_index` always exists before the end of the array (guaranteed only because `stop_seg.point_index > seg.point_index`). If the segment list is ever malformed (e.g. distances/point indices not strictly consistent due to floating-point accumulation), this indexes out of bounds and panics.","fix":"Add a bounds guard, e.g. `while new_seg_index + 1 < self.segments.len() && self.segments[new_seg_index + 1].point_index == old_point_index { new_seg_index += 1; }` plus an early-return/break if the end is reached, so the loop cannot index past the slice.","locations":[{"ref":"path/src/stroker.rs:486-491","code":"  486 | \n  487 |         if reduction_type == ReductionType::Line {\n  488 |             self.line_to(p2, None);\n  489 |             return;\n  490 |         }\n  491 | ","lines":6}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`PathSegmentsIter::auto_close` does `self.verb_index -= 1` when emitting the synthetic LineTo for an auto-closed contour. The next `next()` call then re-reads the same Close verb and emits the real Close. This relies on `verb_index` being >= 1 at the time (it is, since a Close verb was just consumed), but the decrement-then-reprocess pattern is fragile: if `auto_close` were ever called in another context it would underflow `usize`. Currently safe but undocumented invariant.","fix":"Add an assert/comment documenting that `auto_close` is only reachable right after consuming a Close verb (so `verb_index >= 1`), or restructure to avoid mutating `verb_index` backwards.","locations":[{"ref":"path/src/path.rs:277-284","code":"  277 |     pub(crate) fn auto_close(&mut self) -> PathSegment {\n  278 |         if self.is_auto_close && self.last_point != self.last_move_to {\n  279 |             self.verb_index -= 1;\n  280 |             PathSegment::LineTo(self.last_move_to)\n  281 |         } else {\n  282 |             PathSegment::Close\n  283 |         }\n  284 |     }","lines":8}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`NonZeroRect::to_int_rect` casts width/height via `self.width().ceil() as u32` and position via `self.x().floor() as i32`, then `IntRect::from_xywh(...).unwrap()`. For a NonZeroRect whose floored x plus ceiled width exceed i32::MAX (legal since edges may be up to ~f32::MAX), `IntRect::from_xywh` returns `None` (its internal `checked_add`/`try_from`), causing the documented-infallible conversion to panic.","fix":"Return `Option<IntRect>` and propagate, or saturate the float-to-int conversions (use `SaturateCast`) so the rect always fits.","locations":[{"ref":"path/src/rect.rs:700-708","code":"  700 |     pub fn to_int_rect(&self) -> IntRect {\n  701 |         IntRect::from_xywh(\n  702 |             self.x().floor() as i32,\n  703 |             self.y().floor() as i32,\n  704 |             core::cmp::max(1, self.width().ceil() as u32),\n  705 |             core::cmp::max(1, self.height().ceil() as u32),\n  706 |         )\n  707 |         .unwrap()\n  708 |     }","lines":9}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`blit_anti_h2`/`blit_anti_v2` build a rect via `ScreenIntRect::from_xywh(x, y, 2, 1).unwrap()` / `from_xywh(x, y, 1, 2).unwrap()`. `from_xywh` returns None when `x`/`y` exceed i32::MAX or when `x + width` / `y + height` overflows u32, so the unwrap can panic on extreme coordinates. In normal rendering the coordinates are clamped to the pixmap, but these are public Blitter trait entry points receiving externally-derived x/y.","fix":"Return early (no-op) instead of unwrapping, or document/enforce the coordinate precondition; e.g. use `if let Some(bounds) = ScreenIntRect::from_xywh(...) { ... }`.","locations":[{"ref":"src/pipeline/blitter.rs:310-311","code":"  310 |     fn blit_anti_h2(&mut self, x: u32, y: u32, alpha0: AlphaU8, alpha1: AlphaU8) {\n  311 |         let bounds = ScreenIntRect::from_xywh(x, y, 2, 1).unwrap();","lines":2},{"ref":"src/pipeline/blitter.rs:322-323","code":"  322 |     fn blit_anti_v2(&mut self, x: u32, y: u32, alpha0: AlphaU8, alpha1: AlphaU8) {\n  323 |         let bounds = ScreenIntRect::from_xywh(x, y, 1, 2).unwrap();","lines":2}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`SuperBlitter::blit_h` does `width = LengthU32::new(x + width.get()).unwrap()` in the fallback branch when `x < super_left` ('hack, until I figure out why my cubics go beyond the bounds'). The author admits cubics can violate the expected bounds; if `x + width.get()` ever overflows or is zero this `unwrap()` panics in the AA fill hot path. The whole branch is a documented band-aid for an unresolved correctness issue.","fix":"Investigate the root cause (cubic edges exceeding bounds) noted in the comment; until then replace the unwrap with a saturating/guarded path that cannot panic on malformed input.","locations":[{"ref":"src/scan/path_aa.rs:226-232","code":"  226 |         match x.checked_sub(self.base.super_left) {\n  227 |             Some(n) => x = n,\n  228 |             None => {\n  229 |                 width = LengthU32::new(x + width.get()).unwrap();\n  230 |                 x = 0;\n  231 |             }\n  232 |         }","lines":7}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"average_gradient_color computes a convex combination of stop colors and reconstructs a Color via `Color::from_rgba(...).unwrap()`. Color::from_rgba uses NormalizedF32::new which strictly rejects values > 1.0 (or < 0.0). Although the integral is mathematically within [0,1], floating-point rounding of the accumulated `blend` can produce a value marginally above 1.0 (e.g. 1.0000001), causing `unwrap()` to panic. This path is reachable for a degenerate linear gradient (start ~= end) in Reflect/Repeat mode.","fix":"Clamp each component to [0,1] before constructing the Color (e.g. use NormalizedF32::new_clamped, or clamp the f32x4 to [0,1]) instead of unwrapping new().","locations":[{"ref":"src/shaders/linear_gradient.rs:119-122","code":"  119 |     fn store_color(c: f32x4) -> Color {\n  120 |         let c: [f32; 4] = c.into();\n  121 |         Color::from_rgba(c[0], c[1], c[2], c[3]).unwrap()\n  122 |     }","lines":4},{"ref":"src/shaders/linear_gradient.rs:160-161","code":"  160 | \n  161 |     store_color(blend)","lines":2}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`fdot16::mul` computes `(i64 * i64) >> 16` and then casts to `i32` with `as FDot16`. When the true fixed-point product does not fit in i32 (e.g. multiplying two large FDot16 values), the `as` cast silently truncates/wraps instead of clamping. This contradicts the function's own comment which claims it clamps to a signed 32-bit result, and can produce wildly wrong edge slopes/positions feeding the rasterizer. Callers in src/edge.rs (e.g. lines 101, 135) rely on this for x positions.","fix":"Clamp before narrowing: `let v = (i64::from(a) * i64::from(b)) >> 16; bound(i32::MIN as i64, v, i32::MAX as i64) as i32` to match the documented behavior (this is what Skia's SkFixedMul historically does for the overflow-safe variant).","locations":[{"ref":"src/fixed_point.rs:114-116","code":"  114 |     pub fn mul(a: FDot16, b: FDot16) -> FDot16 {\n  115 |         ((i64::from(a) * i64::from(b)) >> 16) as FDot16\n  116 |     }","lines":3}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Mask buffer size is computed as `width as usize * height as usize` with no overflow or dimension-limit check, unlike Pixmap which routes every allocation through `data_len_for_size` (checked multiplications plus an i32::MAX/4 width cap). On 32-bit targets `width * height` can overflow `usize` and wrap to a small value, producing a Mask whose `data` is far shorter than `width*height`; later indexing in `from_pixmap`/`submask`/`subpixmap` then reads/writes out of bounds. Even on 64-bit, a caller-supplied huge size triggers an unchecked multi-gigabyte allocation. Affects Mask::new, Mask::from_pixmap, and Mask::from_vec.","fix":"Add a checked size helper for masks (mirroring data_len_for_size): `width.checked_mul(height)` returning Option, and enforce the same i32::MAX/4 (or i32::MAX) dimension limit documented for Pixmap. Return None on overflow instead of computing the length with a plain `as usize` multiply.","locations":[{"ref":"src/mask.rs:48-54","code":"   48 |     pub fn new(width: u32, height: u32) -> Option<Self> {\n   49 |         let size = IntSize::from_wh(width, height)?;\n   50 |         Some(Mask {\n   51 |             data: vec![0; width as usize * height as usize],\n   52 |             size,\n   53 |         })\n   54 |     }","lines":7},{"ref":"src/mask.rs:57-62","code":"   57 |     pub fn from_pixmap(pixmap: PixmapRef, mask_type: MaskType) -> Self {\n   58 |         let data_len = pixmap.width() as usize * pixmap.height() as usize;\n   59 |         let mut mask = Mask {\n   60 |             data: vec![0; data_len],\n   61 |             size: pixmap.size(),\n   62 |         };","lines":6},{"ref":"src/mask.rs:98-105","code":"   98 |     pub fn from_vec(data: Vec<u8>, size: IntSize) -> Option<Self> {\n   99 |         let data_len = size.width() as usize * size.height() as usize;\n  100 |         if data.len() != data_len {\n  101 |             return None;\n  102 |         }\n  103 | \n  104 |         Some(Mask { data, size })\n  105 |     }","lines":8}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`x - left` is an unsigned (u32) subtraction inside `LengthU32::new(x - left)` in the inner scanline fill loop. It relies on edges being perfectly x-sorted so that the interval-finishing `x` is always >= the interval-starting `left`. After the backward ripple re-sorts on accumulated slope drift, this invariant can be momentarily violated by rounding, causing an underflow panic (debug) or a wrapped huge width (release) in the hot fill path.","fix":"Use `x.checked_sub(left).and_then(LengthU32::new)` instead of computing `x - left` eagerly.","locations":[{"ref":"src/scan/path.rs:232-237","code":"  232 |             if (w & winding_mask) == 0 {\n  233 |                 // we finished an interval\n  234 |                 if let Some(width) = LengthU32::new(x - left) {\n  235 |                     blitter.blit_h(left, curr_y, width);\n  236 |                 }\n  237 |             }","lines":6}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`right_clip - left` is an unsigned (u32) subtraction evaluated before being passed to `LengthU32::new`. `left` is derived from a rounded edge x (`fdot16::round_to_i32(edges[curr_idx].x) as u32`) and is not guaranteed to be <= `right_clip` (the shifted clip right). When the last started interval's left edge rounds beyond the right clip boundary, `right_clip - left` underflows: panic in debug builds, and in release it wraps to a huge u32 that `LengthU32::new` happily accepts, producing a gigantic blit width.","fix":"Guard with a checked/saturating subtraction, e.g. `if let Some(w) = right_clip.checked_sub(left).and_then(LengthU32::new) { blitter.blit_h(left, curr_y, w); }`.","locations":[{"ref":"src/scan/path.rs:295-300","code":"  295 |         if (w & winding_mask) != 0 {\n  296 |             // was our right-edge culled away?\n  297 |             if let Some(width) = LengthU32::new(right_clip - left) {\n  298 |                 blitter.blit_h(left, curr_y, width);\n  299 |             }\n  300 |         }","lines":6}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`LineEdge::new` and `QuadraticEdge::new2`/`CubicEdge::new2` convert float points to fixed point with plain `as i32` casts (e.g. `(p0.x * scale) as i32`). For very large coordinates this saturates rather than wrapping (Rust `as`), but the subsequent arithmetic (`x1 - x0`, `left_shift`, slope division) assumes the values are within the documented +-32767 dot range. Inputs are only guaranteed finite (via edge_builder's is_finite checks), not range-bounded, so a finite-but-huge coordinate that survives clipping can produce slope/`compute_dy` results that overflow the i32 intermediate math (left_shift by 10/16).","fix":"Document/enforce the coordinate-range precondition (the hairline path clips to +-32767 first; the fill path relies on conservative_round_to_int) or add debug_asserts that the post-scale ints fit the dot6/dot16 envelope, matching the asserts present in the hairline code.","locations":[{"ref":"src/edge.rs:72-107","code":"   72 |     pub fn new(p0: Point, p1: Point, shift: i32) -> Option<Self> {\n   73 |         let scale = (1 << (shift + 6)) as f32;\n   74 |         let mut x0 = (p0.x * scale) as i32;\n   75 |         let mut y0 = (p0.y * scale) as i32;\n   76 |         let mut x1 = (p1.x * scale) as i32;\n   77 |         let mut y1 = (p1.y * scale) as i32;\n   78 | \n   79 |         let mut winding = 1;\n   80 | \n   81 |         if y0 > y1 {\n   82 |             core::mem::swap(&mut x0, &mut x1);\n   83 |             core::mem::swap(&mut y0, &mut y1);\n   84 |             winding = -1;\n   85 |         }\n   86 | \n   87 |         let top = fdot6::round(y0);\n   88 |         let bottom = fdot6::round(y1);\n   89 | \n   90 |         // are we a zero-height line?\n   91 |         if top == bottom {\n   92 |             return None;\n   93 |         }\n   94 | \n   95 |         let slope = fdot6::div(x1 - x0, y1 - y0);\n   96 |         let dy = compute_dy(top, y0);\n   97 | \n   98 |         Some(LineEdge {\n   99 |             next: None,\n  100 |             prev: None,\n  101 |             x: fdot6::to_fdot16(x0 + fdot16::mul(slope, dy)),\n  102 |             dx: slope,\n  103 |             first_y: top,\n  104 |             last_y: bottom - 1,\n  105 |             winding,\n  106 |         })\n  107 |     }","lines":36},{"ref":"src/edge.rs:169-247","code":"  169 |     fn new2(points: &[Point], mut shift: i32) -> Option<Self> {\n  170 |         let scale = (1 << (shift + 6)) as f32;\n  171 |         let mut x0 = (points[0].x * scale) as i32;\n  172 |         let mut y0 = (points[0].y * scale) as i32;\n  173 |         let x1 = (points[1].x * scale) as i32;\n  174 |         let y1 = (points[1].y * scale) as i32;\n  175 |         let mut x2 = (points[2].x * scale) as i32;\n  176 |         let mut y2 = (points[2].y * scale) as i32;\n  177 | \n  178 |         let mut winding = 1;\n  179 |         if y0 > y2 {\n  180 |             core::mem::swap(&mut x0, &mut x2);\n  181 |             core::mem::swap(&mut y0, &mut y2);\n  182 |             winding = -1;\n  183 |         }\n  184 |         debug_assert!(y0 <= y1 && y1 <= y2);\n  185 | \n  186 |         let top = fdot6::round(y0);\n  187 |         let bottom = fdot6::round(y2);\n  188 | \n  189 |         // are we a zero-height quad (line)?\n  190 |         if top == bottom {\n  191 |             return None;\n  192 |         }\n  193 | \n  194 |         // compute number of steps needed (1 << shift)\n  195 |         {\n  196 |             let dx = (left_shift(x1, 1) - x0 - x2) >> 2;\n  197 |             let dy = (left_shift(y1, 1) - y0 - y2) >> 2;\n  198 |             // This is a little confusing:\n  199 |             // before this line, shift is the scale up factor for AA;\n  200 |             // after this line, shift is the fCurveShift.\n  201 |             shift = diff_to_shift(dx, dy, shift);\n  202 |             debug_assert!(shift >= 0);\n  203 |         }\n  204 | \n  205 |         // need at least 1 subdivision for our bias trick\n  206 |         if shift == 0 {\n  207 |             shift = 1;\n  208 |         } else if shift > MAX_COEFF_SHIFT {\n  209 |             shift = MAX_COEFF_SHIFT;\n  210 |         }\n  211 | \n  212 |         let curve_count = (1 << shift) as i8;\n  213 | \n  214 |         // We want to reformulate into polynomial form, to make it clear how we\n  215 |         // should forward-difference.\n  216 |         //\n  217 |         // p0 (1 - t)^2 + p1 t(1 - t) + p2 t^2 ==> At^2 + Bt + C\n  218 |         //\n  219 |         // A = p0 - 2p1 + p2\n  220 |         // B = 2(p1 - p0)\n  221 |         // C = p0\n  222 |         //\n  223 |         // Our caller must have constrained our inputs (p0..p2) to all fit into\n  224 |         // 16.16. However, as seen above, we sometimes compute values that can be\n  225 |         // larger (e.g. B = 2*(p1 - p0)). To guard against overflow, we will store\n  226 |         // A and B at 1/2 of their actual value, and just apply a 2x scale during\n  227 |         // application in updateQuadratic(). Hence we store (shift - 1) in\n  228 |         // curve_shift.\n  229 | \n  230 |         let curve_shift = (shift - 1) as u8;\n  231 | \n  232 |         let mut a = fdot6_to_fixed_div2(x0 - x1 - x1 + x2); // 1/2 the real value\n  233 |         let mut b = fdot6::to_fdot16(x1 - x0); // 1/2 the real value\n  234 | \n  235 |         let qx = fdot6::to_fdot16(x0);\n  236 |         let qdx = b + (a >> shift); // biased by shift\n  237 |         let qddx = a >> (shift - 1); // biased by shift\n  238 | \n  239 |         a = fdot6_to_fixed_div2(y0 - y1 - y1 + y2); // 1/2 the real value\n  240 |         b = fdot6::to_fdot16(y1 - y0); // 1/2 the real value\n  241 | \n  242 |         let qy = fdot6::to_fdot16(y0);\n  243 |         let qdy = b + (a >> shift); // biased by shift\n  244 |         let qddy = a >> (shift - 1); // biased by shift\n  245 | \n  246 |         let q_last_x = fdot6::to_fdot16(x2);\n  247 |         let q_last_y = fdot6::to_fdot16(y2);","lines":79}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`fdot6::from_f32` does `(n * 64.0) as i32` with no saturation or rounding. For large/NaN/inf inputs the float-to-int `as` cast saturates (Rust semantics), but unlike `fdot16::from_f32` which uses `SaturateCast` and documents the rounding tradeoff, this truncates toward zero with no rounding, so e.g. 0.49 px maps to 31/64 not 31.36 rounded. Callers guard the magnitude only with `debug_assert!(can_convert_to_fdot16(..))`, which is absent in release builds. Behavior diverges from the documented fdot16 path and can introduce off-by-one sub-pixel error.","fix":"If parity with Skia's SkScalarToFixed/round semantics is wanted, round before truncating: `(n * 64.0 + if n < 0.0 { -0.5 } else { 0.5 }) as i32`, or document explicitly that truncation (not rounding) is intentional.","locations":[{"ref":"src/fixed_point.rs:34-36","code":"   34 |     pub fn from_f32(n: f32) -> FDot6 {\n   35 |         (n * 64.0) as i32\n   36 |     }","lines":3}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"`AAMaskCtx::copy_at_xy` computes `(self.stride as usize * dy + dx) - self.shift` with an unchecked subtraction. `shift` is `left + top*row_bytes`; for the offset to be valid the caller must guarantee `stride*dy + dx >= shift`. If the clip rect passed to blit_mask is ever positioned before the mask bounds, this underflows (wrapping in release, panic in debug) and then falls through to the `_ => [0,0]` arm only after the subtraction already wrapped. The match arms only handle offsets 0 and 1, so any other computed offset is silently treated as the unreachable case.","fix":"Use checked/saturating arithmetic for the offset, or assert the precondition; ensure the function cannot produce a wrapped offset that still happens to match arm (0,..)/(1,..).","locations":[{"ref":"src/pipeline/mod.rs:227-236","code":"  227 |     pub fn copy_at_xy(&self, dx: usize, dy: usize, tail: usize) -> [u8; 2] {\n  228 |         let offset = (self.stride as usize * dy + dx) - self.shift;\n  229 |         // We have only 3 variants, so unroll them.\n  230 |         match (offset, tail) {\n  231 |             (0, 1) => [self.pixels[0], 0],\n  232 |             (0, 2) => [self.pixels[0], self.pixels[1]],\n  233 |             (1, 1) => [self.pixels[1], 0],\n  234 |             _ => [0, 0], // unreachable\n  235 |         }\n  236 |     }","lines":10}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Point::is_finite` returns `(self.x * self.y).is_finite()`. Two individually-finite but large coordinates whose product overflows to infinity (e.g. x = y = 1e30) make this return false, wrongly reporting a finite point as non-finite. Conversely it cannot distinguish; the doc claims it checks 'both values are other than infinities and NaN'. Callers like Conic::compute_quad_pow2 and chop_into_quads_pow2 rely on this and may take the wrong branch.","fix":"Check each coordinate independently: `self.x.is_finite() && self.y.is_finite()`. If the multiply trick is intentionally kept (Skia parity), update the doc to describe the actual behavior.","locations":[{"ref":"path/src/lib.rs:109-114","code":"  109 |     /// Returns true if both x and y are measurable values.\n  110 |     ///\n  111 |     /// Both values are other than infinities and NaN.\n  112 |     pub fn is_finite(&self) -> bool {\n  113 |         (self.x * self.y).is_finite()\n  114 |     }","lines":6}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"The sweep gradient applies its t-remap (t = t*scale + bias) only when BOTH scale and bias differ from identity, using `&&`. For any sweep with start_angle == 0 (so bias = -scale*t0 = 0) but end_angle != 360 (so scale = 1/(t1-t0) != 1.0), the condition `scale != 1.0 && bias != 0.0` evaluates false and the ApplyConcentricScaleBias stage is skipped, so the scale is never applied and the gradient is rendered with the wrong color mapping. E.g. start_angle=0, end_angle=180 gives scale=2.0, bias=0.0 -> stage skipped. The analogous radial code at radial_gradient.rs:268 correctly uses `(p0, p1) != (1.0, 0.0)` (apply if EITHER differs), so this is an inconsistency between the gradient variants. The condition should be `||`, or better `(scale, bias) != (1.0, 0.0)`.","fix":"Change the guard to `if scale != 1.0 || bias != 0.0` (matching the radial variant's `(p0, p1) != (1.0, 0.0)` check) so the scale is applied whenever the mapping is not the identity.","locations":[{"ref":"src/shaders/sweep_gradient.rs:98-100","code":"   98 |                 if scale != 1.0 && bias != 0.0 {\n   99 |                     p.push(Stage::ApplyConcentricScaleBias)\n  100 |                 }","lines":3},{"ref":"src/shaders/radial_gradient.rs:268-270","code":"  268 |                         if (p0, p1) != (1.0, 0.0) {\n  269 |                             p.push(pipeline::Stage::ApplyConcentricScaleBias);\n  270 |                         }","lines":3}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"i32x8::cmp_lt AVX2 path computes `<=` instead of `<`. It does `NOT(cmpgt(self, rhs))`, i.e. NOT(self > rhs) = (self <= rhs). For lanes where self == rhs it returns all-ones (true) whereas a correct less-than must return false. The scalar/per-lane fallback (self.0.cmp_lt(rhs.0), ...) is correct, so the AVX2 build silently diverges from every other target. The function currently has no callers outside the wide module, so this is a latent bug, but it is a real correctness defect waiting to bite the first AVX2 consumer.","fix":"Build the strict less-than mask, e.g. `_mm256_cmpgt_epi32(rhs.0, self.0)` (rhs > self == self < rhs), instead of inverting cmpgt(self, rhs). Drop the XOR-with-all-ones.","locations":[{"ref":"src/wide/i32x8_t.rs:75-87","code":"   75 |     pub fn cmp_lt(self, rhs: Self) -> Self {\n   76 |         cfg_if::cfg_if! {\n   77 |             if #[cfg(all(feature = \"simd\", target_feature = \"avx2\"))] {\n   78 |                 // There is no `_mm256_cmpLT_epi32`, therefore we have to use\n   79 |                 // `_mm256_cmpGT_epi32` and then invert the result.\n   80 |                 let v = unsafe { _mm256_cmpgt_epi32(self.0, rhs.0) };\n   81 |                 let all_bits = unsafe { _mm256_set1_epi16(-1) };\n   82 |                 Self(unsafe { _mm256_xor_si256(v, all_bits) })\n   83 |             } else {\n   84 |                 Self(self.0.cmp_lt(rhs.0), self.1.cmp_lt(rhs.1))\n   85 |             }\n   86 |         }\n   87 |     }","lines":13}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"find_first_interval's loop condition `if dash_offset > gap || (dash_offset == gap && gap != 0.0)` returns `(gap - dash_offset, i)` in the else branch, but when dash_offset == gap and gap == 0.0 it returns `(0.0, i)` for a zero-length on-interval at an even index, which produces a zero-length first segment. This matches Skia, but the trailing fallback `(dash_array[0], 0)` (dash.rs:154) is reached only via floating-point error and silently resets to interval 0, which can mis-phase the dash for pathological offsets. Worth a guard/comment confirming the fallback index is intended.","fix":"Confirm and document that the fallback should return index 0 (matching Skia) and that callers tolerate first_len == dash_array[0]; consider asserting the loop normally returns to catch logic regressions.","locations":[{"ref":"path/src/dash.rs:141-155","code":"  141 | fn find_first_interval(dash_array: &[f32], mut dash_offset: f32) -> (f32, usize) {\n  142 |     for (i, gap) in dash_array.iter().copied().enumerate() {\n  143 |         if dash_offset > gap || (dash_offset == gap && gap != 0.0) {\n  144 |             dash_offset -= gap;\n  145 |         } else {\n  146 |             return (gap - dash_offset, i);\n  147 |         }\n  148 |     }\n  149 | \n  150 |     // If we get here, phase \"appears\" to be larger than our length. This\n  151 |     // shouldn't happen with perfect precision, but we can accumulate errors\n  152 |     // during the initial length computation (rounding can make our sum be too\n  153 |     // big or too small. In that event, we just have to eat the error here.\n  154 |     (dash_array[0], 0)\n  155 | }","lines":15}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Redundant always-true condition: `dash.first_len >= 0.0`. StrokeDash::new guarantees first_len >= 0.0 (see the debug_assert at dash.rs:67), so this guard never filters anything and is misleading - it suggests first_len could be negative.","fix":"Drop the `&& dash.first_len >= 0.0` clause (or assert the invariant once) to make the intent clear.","locations":[{"ref":"path/src/dash.rs:235","code":"  235 |         if contour.is_closed && is_even(dash.first_index) && dash.first_len >= 0.0 {","lines":1}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`PathBuilder::push_path` sets `self.last_move_to_index = self.points.len()` before appending, assuming the appended path's first verb is a Move at offset 0. But it never validates that `other` starts with a Move, and unlike `push_path_builder` it ignores `other`'s own `last_move_to_index`. If `other` has multiple contours, `last_move_to_index` ends up pointing at the start of the appended block rather than the last Move, so a subsequent `inject_move_to_if_needed` reopens the wrong contour.","fix":"Mirror the `push_path_builder` logic: compute the new `last_move_to_index` from `other`'s last move position, not the start of the appended block.","locations":[{"ref":"path/src/path_builder.rs:339-344","code":"  339 |     pub fn push_path(&mut self, other: &Path) {\n  340 |         self.last_move_to_index = self.points.len();\n  341 | \n  342 |         self.verbs.extend_from_slice(&other.verbs);\n  343 |         self.points.extend_from_slice(&other.points);\n  344 |     }","lines":6},{"ref":"path/src/path_builder.rs:346-357","code":"  346 |     pub(crate) fn push_path_builder(&mut self, other: &PathBuilder) {\n  347 |         if other.is_empty() {\n  348 |             return;\n  349 |         }\n  350 | \n  351 |         if self.last_move_to_index != 0 {\n  352 |             self.last_move_to_index = self.points.len() + other.last_move_to_index;\n  353 |         }\n  354 | \n  355 |         self.verbs.extend_from_slice(&other.verbs);\n  356 |         self.points.extend_from_slice(&other.points);\n  357 |     }","lines":12}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Transform::is_scale` requires `has_scale()` to be true, where `has_scale()` is defined as `sx != 1.0 || sy != 1.0`. A transform with `sx == sy == 1.0` but, say, a different but still scale-like matrix is not the concern; the real edge is that a scale of exactly 1x1 with no skew/translate is classified as identity-only and `is_scale()` returns false even though it is conceptually a (unit) scale. More importantly, `has_scale` treating sx==1,sy==1 as 'no scale' means `is_scale_translate` mis-routes a pure unit-scale+translate through correct branch only by luck. This naming/semantics gap can surprise callers relying on `has_scale`.","fix":"Document clearly that `has_scale` means 'scale differs from 1', and audit callers (e.g. map_point branch selection) to confirm a unit scale is intentionally treated as no-scale.","locations":[{"ref":"path/src/transform.rs:134-156","code":"  134 |     pub fn is_scale(&self) -> bool {\n  135 |         self.has_scale() && !self.has_skew() && !self.has_translate()\n  136 |     }\n  137 | \n  138 |     /// Checks that transform is skew-only.\n  139 |     pub fn is_skew(&self) -> bool {\n  140 |         !self.has_scale() && self.has_skew() && !self.has_translate()\n  141 |     }\n  142 | \n  143 |     /// Checks that transform is translate-only.\n  144 |     pub fn is_translate(&self) -> bool {\n  145 |         !self.has_scale() && !self.has_skew() && self.has_translate()\n  146 |     }\n  147 | \n  148 |     /// Checks that transform contains only scale and translate.\n  149 |     pub fn is_scale_translate(&self) -> bool {\n  150 |         (self.has_scale() || self.has_translate()) && !self.has_skew()\n  151 |     }\n  152 | \n  153 |     /// Checks that transform contains a scale part.\n  154 |     pub fn has_scale(&self) -> bool {\n  155 |         self.sx != 1.0 || self.sy != 1.0\n  156 |     }","lines":23}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`AlphaRuns::is_empty` asserts `self.runs[0].is_some()` and then still has a `None => true` arm for `self.runs[0]`, which is dead under the debug_assert but live in release. The two disagree: in debug a None run[0] aborts, in release it silently reports 'empty'. The intent (a freshly reset run always has runs[0] = Some) means the None arm masks a real invariant violation in release builds instead of surfacing it.","fix":"Decide on one behavior: either drop the debug_assert and treat None as a legitimate empty state, or make runs[0] a non-optional invariant and remove the None arm.","locations":[{"ref":"src/alpha_runs.rs:43-49","code":"   43 |     pub fn is_empty(&self) -> bool {\n   44 |         debug_assert!(self.runs[0].is_some());\n   45 |         match self.runs[0] {\n   46 |             Some(run) => self.alpha[0] == 0 && self.runs[usize::from(run.get())].is_none(),\n   47 |             None => true,\n   48 |         }\n   49 |     }","lines":7}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Mask::from_pixmap Luminance path uses `.ceil()` when converting the float luma to u8 (`((luma * a) * 255.0).clamp(0.0, 255.0).ceil() as u8`), whereas every other float->u8 conversion in this crate rounds (`+ 0.5` then truncate, e.g. color_f32_to_u8). Ceil systematically biases the mask brighter by up to ~1 LSB per pixel and is inconsistent with the rest of the pipeline.","fix":"Use round-to-nearest for consistency: `((luma * a) * 255.0 + 0.5).clamp(0.0, 255.0) as u8` (or `.round()`).","locations":[{"ref":"src/mask.rs:86-88","code":"   86 |                     let luma = r * 0.2126 + g * 0.7152 + b * 0.0722;\n   87 |                     *ma = ((luma * a) * 255.0).clamp(0.0, 255.0).ceil() as u8;\n   88 |                 }","lines":3}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `blit_rect_rp`, the colorspace `expand_dest_stage` is pushed *inside* the `if let Some(blend_stage) = blend_mode.to_stage()` block (lines 139-144), unlike `blit_anti_h_rp` and `blit_mask_rp` where it is pushed unconditionally after LoadDestination. This is currently safe only because the sole BlendMode whose `to_stage()` returns None is `Source`, which is excluded by the `blend_mode != BlendMode::Source` guard. It is a latent inconsistency: if any future blend mode returns None from `to_stage()`, LoadDestination would run without the matching gamma-expand, producing incorrect colors in expanded colorspaces.","fix":"Push `expand_dest_stage` immediately after LoadDestination (unconditionally), matching the structure used in the other two builders, then push the blend stage if present.","locations":[{"ref":"src/pipeline/blitter.rs:137-145","code":"  137 |                 if blend_mode != BlendMode::Source {\n  138 |                     p.push(pipeline::Stage::LoadDestination);\n  139 |                     if let Some(blend_stage) = blend_mode.to_stage() {\n  140 |                         if let Some(stage) = paint.colorspace.expand_dest_stage() {\n  141 |                             p.push(stage);\n  142 |                         }\n  143 |                         p.push(blend_stage);\n  144 |                     }\n  145 |                 }","lines":9}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `do_scanline` and `fill_dot8`, after computing `let mut left = l >> 8;` the code recomputes `u32::try_from(l >> 8)` again inside the `l & 0xFF != 0` branch instead of using the already-computed `left`. This is harmless but the `left` local that was incremented (`left += 1`) is then the one actually used for the subsequent width math, so the duplicated `l >> 8` recomputation is redundant and slightly confusing - a future edit could desynchronize them.","fix":"Reuse the `left` local (cast once) rather than recomputing `l >> 8` for the blit_v call.","locations":[{"ref":"src/scan/hairline_aa.rs:159-167","code":"  159 |     let mut left = l >> 8;\n  160 | \n  161 |     if l & 0xFF != 0 {\n  162 |         if let Ok(left) = u32::try_from(l >> 8) {\n  163 |             blitter.blit_v(left, top, one_len, alpha_mul(alpha, 256 - (l & 0xFF)));\n  164 |         }\n  165 | \n  166 |         left += 1;\n  167 |     }","lines":9},{"ref":"src/scan/hairline_aa.rs:103-111","code":"  103 |             if l & 0xFF != 0 {\n  104 |                 if let (Ok(left), Ok(top)) = (u32::try_from(left), u32::try_from(top)) {\n  105 |                     blitter.blit_v(left, top, height, to_alpha(256 - (l & 0xFF)));\n  106 |                 } else {\n  107 |                     debug_assert!(false);\n  108 |                 }\n  109 | \n  110 |                 left += 1;\n  111 |             }","lines":9}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`solve_cubic_poly` three-real-roots branch computes `theta = (r / q3.sqrt()).bound(-1.0, 1.0).acos()`. When `q < 0`, `q3 = q*q*q < 0` and `q3.sqrt()` is NaN, so `r/NaN` is NaN; `bound(NaN,...)` returns the max (1.0) by the documented SkTPin behavior, masking the degenerate case rather than handling it explicitly. This mirrors Skia but the reliance on `bound`'s NaN-to-max quirk is subtle and undocumented here.","fix":"Add a comment noting that `bound` intentionally maps NaN to the max bound, so the degenerate `q<0` path is absorbed safely.","locations":[{"ref":"path/src/path_geometry.rs:350-362","code":"  350 |     if r2_minus_q3 < 0.0 {\n  351 |         // we have 3 real roots\n  352 |         // the divide/root can, due to finite precisions, be slightly outside of -1...1\n  353 |         let theta = (r / q3.sqrt()).bound(-1.0, 1.0).acos();\n  354 |         let neg2_root_q = -2.0 * q.sqrt();\n  355 | \n  356 |         t_values[0] = NormalizedF32::new_clamped(neg2_root_q * (theta / 3.0).cos() - adiv3);\n  357 |         t_values[1] = NormalizedF32::new_clamped(\n  358 |             neg2_root_q * ((theta + 2.0 * FLOAT_PI) / 3.0).cos() - adiv3,\n  359 |         );\n  360 |         t_values[2] = NormalizedF32::new_clamped(\n  361 |             neg2_root_q * ((theta - 2.0 * FLOAT_PI) / 3.0).cos() - adiv3,\n  362 |         );","lines":13}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`Conic::build_unit_arc` uses `debug_assert!((x + 1.0) <= SCALAR_NEARLY_ZERO)` and similar debug asserts that encode tolerance expectations. In release builds these are no-ops, so malformed unit vectors (non-normalized u_start/u_stop) silently proceed through the quadrant classification, which assumes well-formed unit inputs. The function does not validate its inputs are unit-length.","fix":"Either document the precondition that u_start/u_stop must be unit vectors and that callers guarantee it, or add a runtime check returning None on malformed input.","locations":[{"ref":"path/src/path_geometry.rs:730-745","code":"  730 |         let mut quadrant = 0;\n  731 |         if y == 0.0 {\n  732 |             quadrant = 2; // 180\n  733 |             debug_assert!((x + 1.0) <= SCALAR_NEARLY_ZERO);\n  734 |         } else if x == 0.0 {\n  735 |             debug_assert!(abs_y - 1.0 <= SCALAR_NEARLY_ZERO);\n  736 |             quadrant = if y > 0.0 { 1 } else { 3 }; // 90 / 270\n  737 |         } else {\n  738 |             if y < 0.0 {\n  739 |                 quadrant += 2;\n  740 |             }\n  741 | \n  742 |             if (x < 0.0) != (y < 0.0) {\n  743 |                 quadrant += 1;\n  744 |             }\n  745 |         }","lines":16}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Cubic stroke abort check tests the x coordinate twice instead of x and y. A non-finite y on the projected quad endpoint will not trigger the abort, so a NaN/Inf y can leak into the output path and downstream geometry. This is a clear copy-paste mistake (the first operand should test .x, the second .y).","fix":"Change the second operand to test the y coordinate: `if !quad_points.quad[2].x.is_finite() || !quad_points.quad[2].y.is_finite()`.","locations":[{"ref":"path/src/stroker.rs:664","code":"  664 |         if !quad_points.quad[2].x.is_finite() || !quad_points.quad[2].x.is_finite() {","lines":1}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"Tautological debug assertion: `debug_assert!(stop_seg_index <= stop_seg_index)` compares a value to itself and is always true, so it asserts nothing. It was clearly meant to validate the ordering of the start and stop segment indices (seg_index <= stop_seg_index).","fix":"Replace with `debug_assert!(seg_index <= stop_seg_index);`.","locations":[{"ref":"path/src/stroker.rs:453","code":"  453 |             .prev_pt","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`IntRect::inset` computes `self.left()+dx`, `self.right()-dx` etc. with plain i32 arithmetic (no checked/saturating ops), unlike the sibling `make_outset` which uses `saturating_*`. With a large `dx`/`dy` these additions can overflow in debug builds (panic) or wrap in release builds, producing a bogus rect that may then pass `from_ltrb`.","fix":"Use `checked_add`/`checked_sub` (returning None on overflow) or `saturating_*` like `make_outset` does.","locations":[{"ref":"path/src/rect.rs:121-128","code":"  121 |     pub fn inset(&self, dx: i32, dy: i32) -> Option<Self> {\n  122 |         IntRect::from_ltrb(\n  123 |             self.left() + dx,\n  124 |             self.top() + dy,\n  125 |             self.right() - dx,\n  126 |             self.bottom() - dy,\n  127 |         )\n  128 |     }","lines":8}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`IntRect::translate` uses `self.x()+tx` and `self.y()+ty` with unchecked i32 addition. A large `tx`/`ty` overflows (debug panic / release wrap) before `from_xywh` can reject it, so the overflow protection of the constructor is bypassed.","fix":"Use `checked_add` and return `None` on overflow before calling `from_xywh`.","locations":[{"ref":"path/src/rect.rs:141-143","code":"  141 |     pub fn translate(&self, tx: i32, ty: i32) -> Option<Self> {\n  142 |         IntRect::from_xywh(self.x() + tx, self.y() + ty, self.width(), self.height())\n  143 |     }","lines":3}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`to_fdot16` and `fast_div` protect against overflow / division-by-zero only with `debug_assert!`. In release builds `left_shift(n, 10)` and `left_shift(a, 16)` can silently overflow (wrap), and `left_shift(a,16)/b` can panic on `b == 0` (integer divide-by-zero is a panic even in release). These are reachable if a caller's own debug_assert guard (e.g. can_convert_to_fdot16) is compiled out, so the safety relies entirely on debug builds.","fix":"Either keep the contract documented and accept release-mode UB-adjacent wrapping, or fall back to the checked 64-bit `fdot16::div`/`fdot16::to_fdot16` equivalents when the fast-path precondition is not met, mirroring how `fdot6::div` already dispatches to `fdot16::div` for out-of-range inputs.","locations":[{"ref":"src/fixed_point.rs:50-53","code":"   50 |     pub fn to_fdot16(n: FDot6) -> FDot16 {\n   51 |         debug_assert!((left_shift(n, 10) >> 10) == n);\n   52 |         left_shift(n, 10)\n   53 |     }","lines":4},{"ref":"src/fixed_point.rs:125-129","code":"  125 |     pub fn fast_div(a: FDot6, b: FDot6) -> FDot16 {\n  126 |         debug_assert!((left_shift(a, 16) >> 16) == a);\n  127 |         debug_assert!(b != 0);\n  128 |         left_shift(a, 16) / b\n  129 |     }","lines":5}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Pixmap::fill and PixmapMut::fill assign pixels one-by-one through `pixels_mut()` in a scalar loop. Filling a solid color is a hot operation; since the target color is a fixed 4-byte pattern, this can use a far faster bulk fill. The duplicated per-pixel loop in both impls also constitutes copy-paste.","fix":"Use `slice::fill(c)` on the `&mut [PremultipliedColorU8]` (or write the 4-byte pattern with chunks) and factor the shared body into one helper to avoid duplication.","locations":[{"ref":"src/pixmap.rs:220-225","code":"  220 |     pub fn fill(&mut self, color: Color) {\n  221 |         let c = color.premultiply().to_color_u8();\n  222 |         for p in self.as_mut().pixels_mut() {\n  223 |             *p = c;\n  224 |         }\n  225 |     }","lines":6},{"ref":"src/pixmap.rs:513-518","code":"  513 |     pub fn fill(&mut self, color: Color) {\n  514 |         let c = color.premultiply().to_color_u8();\n  515 |         for p in self.pixels_mut() {\n  516 |             *p = c;\n  517 |         }\n  518 |     }","lines":6}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"PixmapRef::encode_png clones the entire pixmap solely to demultiply alpha (`self.to_owned().take_demultiply()`). For large images this is a full extra allocation and copy of the whole buffer on every encode. The code itself acknowledges this with a `TODO: remove allocation`.","fix":"Demultiply directly into a single output buffer (or stream rows to the encoder) rather than cloning the whole Pixmap and then mutating it in place.","locations":[{"ref":"src/pixmap.rs:410-428","code":"  410 |     pub fn encode_png(&self) -> Result<Vec<u8>, png::EncodingError> {\n  411 |         // Skia uses skcms here, which is somewhat similar to RasterPipeline.\n  412 | \n  413 |         // Sadly, we have to copy the pixmap here, because of demultiplication.\n  414 |         // Not sure how to avoid this.\n  415 |         // TODO: remove allocation\n  416 |         let demultiplied_data = self.to_owned().take_demultiplied();\n  417 | \n  418 |         let mut data = Vec::new();\n  419 |         {\n  420 |             let mut encoder = png::Encoder::new(&mut data, self.width(), self.height());\n  421 |             encoder.set_color(png::ColorType::Rgba);\n  422 |             encoder.set_depth(png::BitDepth::Eight);\n  423 |             let mut writer = encoder.write_header()?;\n  424 |             writer.write_image_data(&demultiplied_data)?;\n  425 |         }\n  426 | \n  427 |         Ok(data)\n  428 |     }","lines":19}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"stroke_close_enough clones the 3-point stroke array on every call (`&quad_points.quad.clone()`) solely to satisfy the borrow checker, even though the function only reads it. This clone happens per recursion step of quad/cubic stroking, which can be very frequent on curved paths.","fix":"Restructure so the stroke array is read before the perp-ray mutation (copy the three Points into locals once, or compute ray0/ray1 first), avoiding the per-call array clone.","locations":[{"ref":"path/src/stroker.rs:809","code":"  809 |         self.stroke_close_enough(&quad_points.quad.clone(), &[ray0, ray1], quad_points)","lines":1},{"ref":"path/src/stroker.rs:1071","code":" 1071 |         self.stroke_close_enough(&quad_points.quad.clone(), &[ray0, ray1], quad_points)","lines":1}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In the clip-rejection path, `clip.to_int_rect()` is recomputed multiple times per segment (intersect check, contains check, then intersect again for subclip). Similarly in `stroke_path_impl` `clip.to_int_rect()` is called five times. These conversions are cheap but happen per path segment in a hot loop.","fix":"Compute `let ir = clip.to_int_rect();` once per call and reuse it.","locations":[{"ref":"src/scan/hairline_aa.rs:290-297","code":"  290 |             if clip.to_int_rect().intersect(&ir).is_none() {\n  291 |                 continue;\n  292 |             }\n  293 | \n  294 |             if !clip.to_int_rect().contains(&ir) {\n  295 |                 let subclip = ir\n  296 |                     .intersect(&clip.to_int_rect())\n  297 |                     .and_then(|r| r.to_screen_int_rect());","lines":8},{"ref":"src/scan/hairline.rs:174-198","code":"  174 |         if clip.to_int_rect().intersect(&ibounds).is_none() {\n  175 |             return;\n  176 |         }\n  177 | \n  178 |         if !clip.to_int_rect().contains(&ibounds) {\n  179 |             // We now cache two scalar rects, to use for culling per-segment (e.g. cubic).\n  180 |             // Since we're hairlining, the \"bounds\" of the control points isn't necessarily the\n  181 |             // limit of where a segment can draw (it might draw up to 1 pixel beyond in aa-hairs).\n  182 |             //\n  183 |             // Compute the pt-bounds per segment is easy, so we do that, and then inversely adjust\n  184 |             // the culling bounds so we can just do a straight compare per segment.\n  185 |             //\n  186 |             // insetClip is use for quick-accept (i.e. the segment is not clipped), so we inset\n  187 |             // it from the clip-bounds (since segment bounds can be off by 1).\n  188 |             //\n  189 |             // outsetClip is used for quick-reject (i.e. the segment is entirely outside), so we\n  190 |             // outset it from the clip-bounds.\n  191 |             match clip.to_int_rect().make_outset(1, 1) {\n  192 |                 Some(v) => outset_clip = Some(v),\n  193 |                 None => return,\n  194 |             }\n  195 |             match clip.to_int_rect().inset(1, 1) {\n  196 |                 Some(v) => inset_clip = Some(v),\n  197 |                 None => return,\n  198 |             }","lines":25}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"f32x16::abs round-trips through [f32; 8] arrays and applies a per-lane closure, while f32x8::abs does the whole thing with a single bitwise AND against a sign-mask splat (`self & non_sign_bits`). The f32x16 version defeats vectorization (each lane is loaded/stored individually) for no functional reason; it could simply be `Self(self.0.abs(), self.1.abs())`.","fix":"Implement as `Self(self.0.abs(), self.1.abs())` to reuse the vectorized f32x8::abs.","locations":[{"ref":"src/wide/f32x16_t.rs:26-55","code":"   26 |     #[inline]\n   27 |     pub fn abs(&self) -> Self {\n   28 |         // Yes, Skia does it in the same way.\n   29 |         let abs = |x| bytemuck::cast::<i32, f32>(bytemuck::cast::<f32, i32>(x) & 0x7fffffff);\n   30 | \n   31 |         let n0: [f32; 8] = self.0.into();\n   32 |         let n1: [f32; 8] = self.1.into();\n   33 |         Self(\n   34 |             f32x8::from([\n   35 |                 abs(n0[0]),\n   36 |                 abs(n0[1]),\n   37 |                 abs(n0[2]),\n   38 |                 abs(n0[3]),\n   39 |                 abs(n0[4]),\n   40 |                 abs(n0[5]),\n   41 |                 abs(n0[6]),\n   42 |                 abs(n0[7]),\n   43 |             ]),\n   44 |             f32x8::from([\n   45 |                 abs(n1[0]),\n   46 |                 abs(n1[1]),\n   47 |                 abs(n1[2]),\n   48 |                 abs(n1[3]),\n   49 |                 abs(n1[4]),\n   50 |                 abs(n1[5]),\n   51 |                 abs(n1[6]),\n   52 |                 abs(n1[7]),\n   53 |             ]),\n   54 |         )\n   55 |     }","lines":30},{"ref":"src/wide/f32x8_t.rs:148-151","code":"  148 |     pub fn abs(self) -> Self {\n  149 |         let non_sign_bits = f32x8::splat(f32::from_bits(i32::MAX as u32));\n  150 |         self & non_sign_bits\n  151 |     }","lines":4}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In `Rect::from_points`, `accum` is initialized to `f32x4::default()` (all zeros) and updated via `accum *= xy`. Multiplying zeros by inputs keeps it zero for all finite inputs and only becomes NaN if an input is inf/NaN (0*inf = NaN). The finiteness check `accum * f32x4::default() == f32x4::default()` works but is non-obvious and the running product carries no information other than NaN-poisoning. This is intentional Skia-style code but warrants a clarifying comment.","fix":"Add a comment explaining that `accum` exists solely to NaN-poison on any non-finite input, or replace with an explicit per-component finiteness check.","locations":[{"ref":"path/src/rect.rs:416-431","code":"  416 |         let mut accum = f32x4::default();\n  417 |         while offset != points.len() {\n  418 |             let pt0 = points[offset + 0];\n  419 |             let pt1 = points[offset + 1];\n  420 |             let xy = f32x4([pt0.x, pt0.y, pt1.x, pt1.y]);\n  421 | \n  422 |             accum *= xy;\n  423 |             min = min.min(xy);\n  424 |             max = max.max(xy);\n  425 |             offset += 2;\n  426 |         }\n  427 | \n  428 |         let all_finite = accum * f32x4::default() == f32x4::default();\n  429 |         let min: [f32; 4] = min.0;\n  430 |         let max: [f32; 4] = max.0;\n  431 |         if all_finite {","lines":16}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Cubic64::as_f64_slice` allocates and returns a fresh `[f64; 8]` array every call. In the intersection paths it is called multiple times per query (e.g. `coefficients(&cubic.as_f64_slice()[1..])` and again `find_extrema(&cubic.as_f64_slice()[1..])` within the same function), recomputing the same copy. Minor, but avoidable in a hot rasterization path.","fix":"Compute the slice once into a local and reuse it for both `coefficients` and `find_extrema`, or have `coefficients`/`find_extrema` accept `&Cubic64` directly.","locations":[{"ref":"src/path64/cubic64.rs:30-41","code":"   30 |     pub fn as_f64_slice(&self) -> [f64; POINT_COUNT * 2] {\n   31 |         [\n   32 |             self.points[0].x,\n   33 |             self.points[0].y,\n   34 |             self.points[1].x,\n   35 |             self.points[1].y,\n   36 |             self.points[2].x,\n   37 |             self.points[2].y,\n   38 |             self.points[3].x,\n   39 |             self.points[3].y,\n   40 |         ]\n   41 |     }","lines":12},{"ref":"src/path64/line_cubic_intersections.rs:78-86","code":"   78 |     let (a, b, c, mut d) = cubic64::coefficients(&cubic.as_f64_slice()[1..]);\n   79 |     d -= axis_intercept;\n   80 |     let mut count = cubic64::roots_valid_t(a, b, c, d, roots);\n   81 |     let mut index = 0;\n   82 |     while index < count {\n   83 |         let calc_pt = cubic.point_at_t(roots[index]);\n   84 |         if !calc_pt.y.approximately_equal(axis_intercept) {\n   85 |             let mut extreme_ts = [0.0; 6];\n   86 |             let extrema = cubic64::find_extrema(&cubic.as_f64_slice()[1..], &mut extreme_ts);","lines":9},{"ref":"src/path64/line_cubic_intersections.rs:104-112","code":"  104 |     let (a, b, c, mut d) = cubic64::coefficients(&cubic.as_f64_slice());\n  105 |     d -= axis_intercept;\n  106 |     let mut count = cubic64::roots_valid_t(a, b, c, d, roots);\n  107 |     let mut index = 0;\n  108 |     while index < count {\n  109 |         let calc_pt = cubic.point_at_t(roots[index]);\n  110 |         if !calc_pt.x.approximately_equal(axis_intercept) {\n  111 |             let mut extreme_ts = [0.0; 6];\n  112 |             let extrema = cubic64::find_extrema(&cubic.as_f64_slice(), &mut extreme_ts);","lines":9}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`highp::mask_u8` builds the coverage vector with a scalar loop `for i in 0..p.tail` writing into a `[f32; 8]` (lines 339-342), then converts to f32x8. Unlike the load/store tail helpers, this is run for every full (tail==8) span too, defeating vectorization on the hot full-width path. The lowp counterpart has the same scalar-loop pattern (lines 367-370). Since mask handling is otherwise routed through lowp, impact is small, but on the full path a branchless splat-from-slice would be faster.","fix":"For the full-width case load all STAGE_WIDTH bytes directly (as load_8888 does) and only use the scalar fill for the tail variant, or provide separate full/tail mask_u8 functions like the load/store split.","locations":[{"ref":"src/pipeline/highp.rs:337-343","code":"  337 | fn mask_u8(p: &mut Pipeline) {\n  338 |     let offset = p.mask_ctx.offset(p.dx, p.dy);\n  339 |     let mut c = [0.0; 8];\n  340 |     for i in 0..p.tail {\n  341 |         c[i] = p.mask_ctx.data[offset + i] as f32;\n  342 |     }\n  343 |     let c = f32x8::from(c) / f32x8::splat(255.0);","lines":7},{"ref":"src/pipeline/lowp.rs:364-370","code":"  364 | fn mask_u8(p: &mut Pipeline) {\n  365 |     let offset = p.mask_ctx.offset(p.dx, p.dy);\n  366 | \n  367 |     let mut c = u16x16::default();\n  368 |     for i in 0..p.tail {\n  369 |         c.0[i] = u16::from(p.mask_ctx.data[offset + i]);\n  370 |     }","lines":7}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`call_hline_blitter` allocates two stack buffers (`runs: [None; 101]`, `aa: [0u8; 100]`) on every call. It is invoked per pixel/per cap in the AA hairline blitters (e.g. HLineAntiHairBlitter::draw_cap calls it up to twice per pixel), so 200 bytes of stack are zero-initialized on each tiny blit in the hairline hot loop.","fix":"For the common single-pixel case (count == 1) call `blit_anti_h` with a tiny fixed 1-element runs/aa pair instead of zeroing the full 100-element buffers.","locations":[{"ref":"src/scan/hairline_aa.rs:184-224","code":"  184 | fn call_hline_blitter(\n  185 |     mut x: u32,\n  186 |     y: Option<u32>,\n  187 |     count: LengthU32,\n  188 |     alpha: AlphaU8,\n  189 |     blitter: &mut dyn Blitter,\n  190 | ) {\n  191 |     const HLINE_STACK_BUFFER: usize = 100;\n  192 | \n  193 |     let mut runs = [None; HLINE_STACK_BUFFER + 1];\n  194 |     let mut aa = [0u8; HLINE_STACK_BUFFER];\n  195 | \n  196 |     let mut count = count.get();\n  197 |     loop {\n  198 |         // In theory, we should be able to just do this once (outside of the loop),\n  199 |         // since aa[] and runs[] are supposed\" to be const when we call the blitter.\n  200 |         // In reality, some wrapper-blitters (e.g. RgnClipBlitter) cast away that\n  201 |         // constness, and modify the buffers in-place. Hence the need to be defensive\n  202 |         // here and reseed the aa value.\n  203 |         aa[0] = alpha;\n  204 | \n  205 |         let mut n = count;\n  206 |         if n > HLINE_STACK_BUFFER as u32 {\n  207 |             n = HLINE_STACK_BUFFER as u32;\n  208 |         }\n  209 | \n  210 |         debug_assert!(n <= u16::MAX as u32);\n  211 |         runs[0] = NonZeroU16::new(n as u16);\n  212 |         runs[n as usize] = None;\n  213 |         if let Some(y) = y {\n  214 |             blitter.blit_anti_h(x, y, &mut aa, &mut runs);\n  215 |         }\n  216 |         x += n;\n  217 | \n  218 |         if n >= count || count == 0 {\n  219 |             break;\n  220 |         }\n  221 | \n  222 |         count -= n;\n  223 |     }\n  224 | }","lines":41},{"ref":"src/scan/hairline_aa.rs:626-643","code":"  626 |     fn draw_cap(&mut self, x: u32, mut fy: FDot16, _: FDot16, mod64: i32) -> FDot16 {\n  627 |         fy += fdot16::ONE / 2;\n  628 |         fy = fy.max(0);\n  629 | \n  630 |         let y = (fy >> 16) as u32;\n  631 |         let a = i32_to_alpha(fy >> 8);\n  632 | \n  633 |         // lower line\n  634 |         let mut ma = fdot6::small_scale(a, mod64);\n  635 |         if ma != 0 {\n  636 |             call_hline_blitter(x, Some(y), LENGTH_U32_ONE, ma, self.0);\n  637 |         }\n  638 | \n  639 |         // upper line\n  640 |         ma = fdot6::small_scale(255 - a, mod64);\n  641 |         if ma != 0 {\n  642 |             call_hline_blitter(x, y.checked_sub(1), LENGTH_U32_ONE, ma, self.0);\n  643 |         }","lines":18}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"Each branch clones the whole GradientStop only to read its Copy `color` field: `stops.first()?.clone().color`. GradientStop holds a NormalizedF32 plus a Color, so this clones more than needed. `Color` is Copy, so the stop clone is wasteful.","fix":"Use `stops.first()?.color` and `stops.last()?.color` directly (Color is Copy), dropping the `.clone()`.","locations":[{"ref":"src/shaders/radial_gradient.rs:154-155","code":"  154 |                     let start_color = stops.first()?.clone().color;\n  155 |                     let end_color = stops.last()?.clone().color;","lines":2}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`set_point_length` takes an `orig_length: &mut Option<f32>` parameter, but every caller (`set_length_from`, which all public entry points funnel through) passes `&mut None`. The two `if orig_length.is_some()` branches and the `mag` variable are therefore dead code: `mag` is computed but never observed, and `*orig_length` is never written to a `Some`. This is leftover from the Skia API that returned the original length.","fix":"Remove the `orig_length` parameter and the two `is_some()` branches plus the `mag` variable, or actually wire the original length back to a caller that needs it. Simplify the signature of `set_point_length`.","locations":[{"ref":"path/src/lib.rs:237-272","code":"  237 | fn set_point_length(\n  238 |     pt: &mut Point,\n  239 |     mut x: f32,\n  240 |     mut y: f32,\n  241 |     length: f32,\n  242 |     orig_length: &mut Option<f32>,\n  243 | ) -> bool {\n  244 |     // our mag2 step overflowed to infinity, so use doubles instead.\n  245 |     // much slower, but needed when x or y are very large, other wise we\n  246 |     // divide by inf. and return (0,0) vector.\n  247 |     let xx = x as f64;\n  248 |     let yy = y as f64;\n  249 |     let dmag = (xx * xx + yy * yy).sqrt();\n  250 |     let dscale = length as f64 / dmag;\n  251 |     x *= dscale as f32;\n  252 |     y *= dscale as f32;\n  253 | \n  254 |     // check if we're not finite, or we're zero-length\n  255 |     if !x.is_finite() || !y.is_finite() || (x == 0.0 && y == 0.0) {\n  256 |         *pt = Point::zero();\n  257 |         return false;\n  258 |     }\n  259 | \n  260 |     let mut mag = 0.0;\n  261 |     if orig_length.is_some() {\n  262 |         mag = dmag as f32;\n  263 |     }\n  264 | \n  265 |     *pt = Point::from_xy(x, y);\n  266 | \n  267 |     if orig_length.is_some() {\n  268 |         *orig_length = Some(mag);\n  269 |     }\n  270 | \n  271 |     true\n  272 | }","lines":36}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"DrawTiler has a `finished: bool` field that is initialized to `false` in `new` and read in `next` (`if self.finished { return None; }`), but is never set to `true` anywhere. Iteration termination is driven entirely by the `x_offset`/`y_offset` bounds checks, so the field and its guard are dead code.","fix":"Either remove the `finished` field and its guard, or set `self.finished = true` when the last tile is produced so the field actually does something.","locations":[{"ref":"src/painter.rs:617","code":"  617 |     finished: bool,","lines":1},{"ref":"src/painter.rs:635","code":"  635 |                 finished: false,","lines":1},{"ref":"src/painter.rs:647-649","code":"  647 |         if self.finished {\n  648 |             return None;\n  649 |         }","lines":3}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In DrawTiler::next the inner `if self.y_offset < self.image_height` is always true: the enclosing `if` on line 653 already requires `self.y_offset < self.image_height`. The `else` branch (`self.image_height`) is therefore unreachable, and the conditional is redundant.","fix":"Replace the conditional with `let h = (self.image_height - self.y_offset).min(Self::MAX_DIMENSIONS);` and drop the dead else branch.","locations":[{"ref":"src/painter.rs:653-658","code":"  653 |         if self.x_offset < self.image_width && self.y_offset < self.image_height {\n  654 |             let h = if self.y_offset < self.image_height {\n  655 |                 (self.image_height - self.y_offset).min(Self::MAX_DIMENSIONS)\n  656 |             } else {\n  657 |                 self.image_height\n  658 |             };","lines":6}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`backward_insert_start` walks `prev` links until it finds an edge with `x <= x`, but `insert_new_edges` (its only caller) immediately re-runs an equivalent forward search loop (lines 378-390) starting from the returned index, advancing past any edges whose x is still less than the new edge's x. The backward walk's result is essentially redundant with the forward loop; the function can over-shoot to the head and the forward loop just re-discovers the correct slot. This is at best confusing and at worst wasted work in a hot insertion path.","fix":"Verify against Skia's SkScan_Path: the backward search should stop at the correct predecessor; either simplify to rely on a single search direction or document why both passes are needed.","locations":[{"ref":"src/scan/path.rs:351-360","code":"  351 | fn backward_insert_start(mut prev_idx: usize, x: FDot16, edges: &mut [Edge]) -> usize {\n  352 |     while let Some(prev) = edges[prev_idx].prev {\n  353 |         prev_idx = prev as usize;\n  354 |         if edges[prev_idx].x <= x {\n  355 |             break;\n  356 |         }\n  357 |     }\n  358 | \n  359 |     prev_idx\n  360 | }","lines":10},{"ref":"src/scan/path.rs:373-390","code":"  373 |     let mut start_idx = backward_insert_start(prev_idx, edges[new_idx].x, edges);\n  374 |     // insert the lot, fixing up the links as we go\n  375 |     loop {\n  376 |         let next_idx = edges[new_idx].next.unwrap() as usize;\n  377 |         let mut keep_edge = false;\n  378 |         loop {\n  379 |             let after_idx = edges[start_idx].next.unwrap() as usize;\n  380 |             if after_idx == new_idx {\n  381 |                 keep_edge = true;\n  382 |                 break;\n  383 |             }\n  384 | \n  385 |             if edges[after_idx].x >= edges[new_idx].x {\n  386 |                 break;\n  387 |             }\n  388 | \n  389 |             start_idx = after_idx;\n  390 |         }","lines":18}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"Commented-out test helpers new_quad_to and new_cubic_to remain in the test module as dead comment blocks.","fix":"Delete the commented-out helper definitions, or implement and use them.","locations
