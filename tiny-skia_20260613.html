":[{"ref":"path/src/stroker.rs:2054-2060","code":" 2054 |         // fn new_quad_to(x1: f32, y1: f32, x: f32, y: f32) -> Self {\n 2055 |         //     PathSegment::QuadTo(Point::from_xy(x1, y1), Point::from_xy(x, y))\n 2056 |         // }\n 2057 | \n 2058 |         // fn new_cubic_to(x1: f32, y1: f32, x2: f32, y2: f32, x: f32, y: f32) -> Self {\n 2059 |         //     PathSegment::CubicTo(Point::from_xy(x1, y1), Point::from_xy(x2, y2), Point::from_xy(x, y))\n 2060 |         // }","lines":7}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"points_to_unit_ts is declared to return Option<Transform> and the caller uses `?` on it, but the function unconditionally returns `Some(ts)` - it can never return None. The fallible signature and the `?` at the call site are effectively dead error handling (the `mag != 0.0` guard is already guaranteed by the caller's prior degenerate-length check).","fix":"Either return Transform directly (and drop the `?` at the call site), or keep the Option but document why the None branch is unreachable; currently it is misleading dead error handling.","locations":[{"ref":"src/shaders/linear_gradient.rs:99-110","code":"   99 | fn points_to_unit_ts(start: Point, end: Point) -> Option<Transform> {\n  100 |     let mut vec = end - start;\n  101 |     let mag = vec.length();\n  102 |     let inv = if mag != 0.0 { mag.invert() } else { 0.0 };\n  103 | \n  104 |     vec.scale(inv);\n  105 | \n  106 |     let mut ts = ts_from_sin_cos_at(-vec.y, vec.x, start.x, start.y);\n  107 |     ts = ts.post_translate(-start.x, -start.y);\n  108 |     ts = ts.post_scale(inv, inv);\n  109 |     Some(ts)\n  110 | }","lines":12},{"ref":"src/shaders/linear_gradient.rs:84-87","code":"   84 |         let unit_ts = points_to_unit_ts(start, end)?;\n   85 |         Some(Shader::LinearGradient(LinearGradient {\n   86 |             base: Gradient::new(stops, mode, transform, unit_ts),\n   87 |         }))","lines":4}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"i32x8::blend, cmp_eq, cmp_gt and cmp_lt are public but have no callers anywhere outside the wide module (verified by grep across src/). They are carried as untested SIMD code paths; the cmp_lt one is actually buggy on AVX2 (see the logic_error finding), which would normally have been caught had the method been exercised.","fix":"Either remove the unused methods or add unit tests that exercise them on every target (which would surface the cmp_lt bug).","locations":[{"ref":"src/wide/i32x8_t.rs:45-87","code":"   45 |     pub fn blend(self, t: Self, f: Self) -> Self {\n   46 |         cfg_if::cfg_if! {\n   47 |             if #[cfg(all(feature = \"simd\", target_feature = \"avx2\"))] {\n   48 |                 Self(unsafe { _mm256_blendv_epi8(f.0, t.0, self.0) })\n   49 |             } else {\n   50 |                 Self(self.0.blend(t.0, f.0), self.1.blend(t.1, f.1))\n   51 |             }\n   52 |         }\n   53 |     }\n   54 | \n   55 |     pub fn cmp_eq(self, rhs: Self) -> Self {\n   56 |         cfg_if::cfg_if! {\n   57 |             if #[cfg(all(feature = \"simd\", target_feature = \"avx2\"))] {\n   58 |                 Self(unsafe { _mm256_cmpeq_epi32(self.0, rhs.0) })\n   59 |             } else {\n   60 |                 Self(self.0.cmp_eq(rhs.0), self.1.cmp_eq(rhs.1))\n   61 |             }\n   62 |         }\n   63 |     }\n   64 | \n   65 |     pub fn cmp_gt(self, rhs: Self) -> Self {\n   66 |         cfg_if::cfg_if! {\n   67 |             if #[cfg(all(feature = \"simd\", target_feature = \"avx2\"))] {\n   68 |                 Self(unsafe { _mm256_cmpgt_epi32(self.0, rhs.0) })\n   69 |             } else {\n   70 |                 Self(self.0.cmp_gt(rhs.0), self.1.cmp_gt(rhs.1))\n   71 |             }\n   72 |         }\n   73 |     }\n   74 | \n   75 |     pub fn cmp_lt(self, rhs: Self) -> Self {\n   76 |         cfg_if::cfg_if! {\n   77 |             if #[cfg(all(feature = \"simd\", target_feature = \"avx2\"))] {\n   78 |                 // There is no `_mm256_cmpLT_epi32`, therefore we have to use\n   79 |                 // `_mm256_cmpGT_epi32` and then invert the result.\n   80 |                 let v = unsafe { _mm256_cmpgt_epi32(self.0, rhs.0) };\n   81 |                 let all_bits = unsafe { _mm256_set1_epi16(-1) };\n   82 |                 Self(unsafe { _mm256_xor_si256(v, all_bits) })\n   83 |             } else {\n   84 |                 Self(self.0.cmp_lt(rhs.0), self.1.cmp_lt(rhs.1))\n   85 |             }\n   86 |         }\n   87 |     }","lines":43}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The comment block above `set_point_length` (and the inner comment 'our mag2 step overflowed to infinity, so use doubles instead') describes a fast f32 path with a slow f64 fallback only on overflow. The actual implementation has no fast path at all: it unconditionally computes the magnitude in f64 every time. The comments are misleading about what the code does.","fix":"Rewrite the comments to reflect that the magnitude is always computed in f64, or reintroduce the f32 fast path the comment describes.","locations":[{"ref":"path/src/lib.rs:231-258","code":"  231 | // We have to worry about 2 tricky conditions:\n  232 | // 1. underflow of mag2 (compared against nearlyzero^2)\n  233 | // 2. overflow of mag2 (compared w/ isfinite)\n  234 | //\n  235 | // If we underflow, we return false. If we overflow, we compute again using\n  236 | // doubles, which is much slower (3x in a desktop test) but will not overflow.\n  237 | fn set_point_length(\n  238 |     pt: &mut Point,\n  239 |     mut x: f32,\n  240 |     mut y: f32,\n  241 |     length: f32,\n  242 |     orig_length: &mut Option<f32>,\n  243 | ) -> bool {\n  244 |     // our mag2 step overflowed to infinity, so use doubles instead.\n  245 |     // much slower, but needed when x or y are very large, other wise we\n  246 |     // divide by inf. and return (0,0) vector.\n  247 |     let xx = x as f64;\n  248 |     let yy = y as f64;\n  249 |     let dmag = (xx * xx + yy * yy).sqrt();\n  250 |     let dscale = length as f64 / dmag;\n  251 |     x *= dscale as f32;\n  252 |     y *= dscale as f32;\n  253 | \n  254 |     // check if we're not finite, or we're zero-length\n  255 |     if !x.is_finite() || !y.is_finite() || (x == 0.0 && y == 0.0) {\n  256 |         *pt = Point::zero();\n  257 |         return false;\n  258 |     }","lines":28}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Comment claims the dot product is negated ('negate the dot since we're using normals instead of tangents'), but the code computes `before_unit_normal.dot(after_unit_normal)` with no negation. The sign convention is actually handled later in the sin_half_angle formula (1 + dot). The comment is misleading about what the immediately following line does.","fix":"Reword the comment to explain that no negation is applied here and that the normal-vs-tangent sign convention is absorbed into the `(1.0 + dot_prod)` term used below.","locations":[{"ref":"path/src/stroker.rs:1584-1585","code":" 1584 |     // negate the dot since we're using normals instead of tangents\n 1585 |     let dot_prod = before_unit_normal.dot(after_unit_normal);","lines":2}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment above `fdot16::mul` says \"The divide may exceed 32 bits. Clamp to a signed 32 bit result.\" but the function performs a multiplication, not a division, and it does NOT clamp - it truncates the 48-bit shifted product with `as FDot16`. The comment is a stale copy of the one above `div` and is misleading on both the operation and the clamping behavior.","fix":"Replace the comment with something accurate, e.g. \"The product is computed in 64 bits then truncated to 32 bits (overflow wraps).\" If clamping is actually intended (as the comment claims), use `bound(i32::MIN as i64, .., i32::MAX as i64)` like `div` does.","locations":[{"ref":"src/fixed_point.rs:113-116","code":"  113 |     // The divide may exceed 32 bits. Clamp to a signed 32 bit result.\n  114 |     pub fn mul(a: FDot16, b: FDot16) -> FDot16 {\n  115 |         ((i64::from(a) * i64::from(b)) >> 16) as FDot16\n  116 |     }","lines":4}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment claims the loop runs 'only 4 steps', but STAGE_WIDTH for highp is 8 (declared at line 24) and the loop iterates `0..STAGE_WIDTH`. The number in the comment is wrong (copy-paste from a 4-wide variant), which is misleading to future maintainers reasoning about bounds-check elision.","fix":"Change the comment to say '8 steps' (or reference STAGE_WIDTH) to match the actual iteration count.","locations":[{"ref":"src/pipeline/highp.rs:1327-1330","code":" 1327 |     // This is better than `for i in 0..tail`, because this way the compiler\n 1328 |     // knows that we have only 4 steps and slices access is guarantee to be valid.\n 1329 |     // This removes bounds checking and a possible panic call.\n 1330 |     for i in 0..STAGE_WIDTH {","lines":4}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Doc comments on Pixmap::new and from_vec say `Zero size in an error.` (typo for `is an error`), and PixmapRef/PixmapMut::from_bytes repeat `Zero size in an error.`. Minor but user-facing in the public API docs.","fix":"Correct to `Zero size is an error.`","locations":[{"ref":"src/pixmap.rs:40","code":"   40 |     /// Zero size in an error.","lines":1},{"ref":"src/pixmap.rs:315","code":"  315 |     /// Zero size in an error. Width is limited by i32::MAX/4.","lines":1},{"ref":"src/pixmap.rs:464","code":"  464 |     /// Zero size in an error. Width is limited by i32::MAX/4.","lines":1}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Typo in code comment: `We cannon use RasterPipeline here` should be `cannot`. Appears in the alpha-premultiply path of decode_png.","fix":"Fix `cannon` -> `cannot`.","locations":[{"ref":"src/pixmap.rs:143","code":"  143 |         // We cannon use RasterPipeline here, which is faster,","lines":1}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment `// 0 will be set later, so start with 1.` does not match the code: the loop iterates over all existing edges (`0..edges.len()`) and sets `prev = Some(i + 0)` and `next = Some(i + 2)`. The `i as u32 + 0` is a no-op `+ 0`. The indices assume the head edge will be inserted at position 0 (shifting every edge up by one), which is what makes `prev = i` (the previous neighbour after the shift) correct - but the comment about '0 set later / start with 1' is misleading because the loop does start at 0.","fix":"Remove the meaningless `+ 0` and rewrite the comment to explain that indices are pre-computed for the post-insert layout (head inserted at index 0 shifts each edge to index+1).","locations":[{"ref":"src/scan/path.rs:137-141","code":"  137 |     for i in 0..edges.len() {\n  138 |         // 0 will be set later, so start with 1.\n  139 |         edges[i].prev = Some(i as u32 + 0);\n  140 |         edges[i].next = Some(i as u32 + 2);\n  141 |     }","lines":5}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `struct SweepGradient` reads `/// A radial gradient.`, which is a copy-paste leftover from radial_gradient.rs. This is a sweep gradient, not a radial gradient, and the misleading doc is user-facing.","fix":"Change the comment to `/// A sweep gradient shader.`","locations":[{"ref":"src/shaders/sweep_gradient.rs:18","code":"   18 | /// A radial gradient.","lines":1}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `SweepGradient::new` reads `/// Creates a new 2-point conical gradient shader.`, copy-pasted from the radial/conical constructor. It describes the wrong gradient type for this user-facing API.","fix":"Change the comment to `/// Creates a new sweep (angular) gradient shader.`","locations":[{"ref":"src/shaders/sweep_gradient.rs:27","code":"   27 |     /// Creates a new 2-point conical gradient shader.","lines":1}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The function `size_scale_f64` is named as if it operates in f64, but every arithmetic operation inside uses f32 (`s2.height.get()` etc. are f32). The `_f64` suffix is misleading; only `size_scale` for IntSize differs by operating on integer-derived f32 with `.ceil()`.","fix":"Rename `size_scale_f64` to drop the misleading `_f64` suffix, or document why it is named that way.","locations":[{"ref":"path/src/size.rs:206-219","code":"  206 | fn size_scale_f64(s1: Size, s2: Size, expand: bool) -> Size {\n  207 |     let rw = s2.height.get() * s1.width.get() / s1.height.get();\n  208 |     let with_h = if expand {\n  209 |         rw <= s2.width.get()\n  210 |     } else {\n  211 |         rw >= s2.width.get()\n  212 |     };\n  213 |     if !with_h {\n  214 |         Size::from_wh(rw, s2.height.get()).unwrap()\n  215 |     } else {\n  216 |         let h = s2.width.get() * s1.height.get() / s1.width.get();\n  217 |         Size::from_wh(s2.width.get(), h).unwrap()\n  218 |     }\n  219 | }","lines":14}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Stray/incorrect comment 'just made up the 1/2' in cheap_dist_exceeds_limit - there is no 1/2 factor anywhere in this function; the distance is compared directly against `tolerance`. The comment was copied from Skia and no longer matches the code.","fix":"Remove the stale '// just made up the 1/2' comment.","locations":[{"ref":"path/src/stroker.rs:864-867","code":"  864 |                 // add caps to start and end\n  865 | \n  866 |                 // cap the end\n  867 |                 let pt = self.inner.last_point().unwrap_or_default();","lines":4}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `to_rect` states \"u32 always fits into f32\". A u32 can be up to ~4.29e9, which exceeds the 24-bit integer precision of f32 (2^24 = 16_777_216), so large u32 values do not fit exactly - they round. The Rect construction still succeeds, so this is a misleading comment rather than a panic, but the stated justification is false.","fix":"Reword to note that the conversion is lossy for u32 values above 2^24 but cannot fail, rather than claiming u32 always fits into f32.","locations":[{"ref":"src/geom.rs:138-148","code":"  138 |     pub fn to_rect(&self) -> Rect {\n  139 |         // Can't fail, because `ScreenIntRect` is always valid.\n  140 |         // And u32 always fits into f32.\n  141 |         Rect::from_ltrb(\n  142 |             self.x as f32,\n  143 |             self.y as f32,\n  144 |             self.x as f32 + self.width.get() as f32,\n  145 |             self.y as f32 + self.height.get() as f32,\n  146 |         )\n  147 |         .unwrap()\n  148 |     }","lines":11}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comments describing the tail range say `tail` is always in a `1..STAGE_WIDTH-1` range. The tail value computed in `start` is `end - x` with `0 < end - x < STAGE_WIDTH`, i.e. the true range is `1..=STAGE_WIDTH-1` (1..STAGE_WIDTH exclusive). Writing it as `1..STAGE_WIDTH-1` excludes the legitimate maximum value STAGE_WIDTH-1 and is therefore inaccurate.","fix":"State the range as 1..=STAGE_WIDTH-1 (or '1 to STAGE_WIDTH-1 inclusive').","locations":[{"ref":"src/pipeline/highp.rs:1287","code":" 1287 |     // Fill a dummy array with `tail` values. `tail` is always in a 1..STAGE_WIDTH-1 range.","lines":1},{"ref":"src/pipeline/lowp.rs:295-296","code":"  295 |     // Fill a dummy array with `tail` values. `tail` is always in a 1..STAGE_WIDTH-1 range.\n  296 |     // This way we can reuse the `load_8888__` method and remove any branches.","lines":2},{"ref":"src/pipeline/lowp.rs:779-780","code":"  779 |     // Fill a dummy array with `tail` values. `tail` is always in a 1..STAGE_WIDTH-1 range.\n  780 |     // This way we can reuse the `load_8888__` method and remove any branches.","lines":2}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Typo in comment: `return; // noting to do` should be 'nothing to do' (compare the identical correct comment in hair_quad at line 414).","fix":"Fix typo: 'noting' -> 'nothing'.","locations":[{"ref":"src/scan/hairline.rs:536","code":"  536 |             return; // noting to do","lines":1}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"`size_scale` (IntSize, f32 math) and `size_scale_f64` (Size, f32 math despite the name) are near-identical: same structure of computing `rw`, the `expand` branch selecting `with_h`, and the two `from_wh(...).unwrap()` construction paths. The two `bbox_transform` implementations in rect.rs are also identical line-for-line. This is copy-paste that must be kept in sync manually.","fix":"Extract the shared scaling logic into a single generic/helper, and factor the bbox_transform body into one shared function used by both Rect and NonZeroRect.","locations":[{"ref":"path/src/size.rs:92-106","code":"   92 | fn size_scale(s1: IntSize, s2: IntSize, expand: bool) -> IntSize {\n   93 |     let rw = (s2.height() as f32 * s1.width() as f32 / s1.height() as f32).ceil() as u32;\n   94 |     let with_h = if expand {\n   95 |         rw <= s2.width()\n   96 |     } else {\n   97 |         rw >= s2.width()\n   98 |     };\n   99 | \n  100 |     if !with_h {\n  101 |         IntSize::from_wh(rw, s2.height()).unwrap()\n  102 |     } else {\n  103 |         let h = (s2.width() as f32 * s1.height() as f32 / s1.width() as f32).ceil() as u32;\n  104 |         IntSize::from_wh(s2.width(), h).unwrap()\n  105 |     }\n  106 | }","lines":15},{"ref":"path/src/size.rs:206-219","code":"  206 | fn size_scale_f64(s1: Size, s2: Size, expand: bool) -> Size {\n  207 |     let rw = s2.height.get() * s1.width.get() / s1.height.get();\n  208 |     let with_h = if expand {\n  209 |         rw <= s2.width.get()\n  210 |     } else {\n  211 |         rw >= s2.width.get()\n  212 |     };\n  213 |     if !with_h {\n  214 |         Size::from_wh(rw, s2.height.get()).unwrap()\n  215 |     } else {\n  216 |         let h = s2.width.get() * s1.height.get() / s1.width.get();\n  217 |         Size::from_wh(s2.width.get(), h).unwrap()\n  218 |     }\n  219 | }","lines":14},{"ref":"path/src/rect.rs:483-490","code":"  483 |     /// Applies a bounding box transform.\n  484 |     pub fn bbox_transform(&self, bbox: NonZeroRect) -> Self {\n  485 |         let x = self.x() * bbox.width() + bbox.x();\n  486 |         let y = self.y() * bbox.height() + bbox.y();\n  487 |         let w = self.width() * bbox.width();\n  488 |         let h = self.height() * bbox.height();\n  489 |         Self::from_xywh(x, y, w, h).unwrap()\n  490 |     }","lines":8},{"ref":"path/src/rect.rs:685-692","code":"  685 |     /// Applies a bounding box transform.\n  686 |     pub fn bbox_transform(&self, bbox: NonZeroRect) -> Self {\n  687 |         let x = self.x() * bbox.width() + bbox.x();\n  688 |         let y = self.y() * bbox.height() + bbox.y();\n  689 |         let w = self.width() * bbox.width();\n  690 |         let h = self.height() * bbox.height();\n  691 |         Self::from_xywh(x, y, w, h).unwrap()\n  692 |     }","lines":8}]},{"id":"DUP_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"set_normal_unit_normal and set_normal_unit_normal2 are near-identical: both normalize a vector, rotate_ccw, and scale by radius. The only difference is set_normal_unit_normal first computes `(after-before)*scale` before delegating. This is duplicated logic that could share an implementation.","fix":"Have set_normal_unit_normal compute the scaled delta vector and call set_normal_unit_normal2, removing the duplicated normalize/rotate/scale body.","locations":[{"ref":"path/src/stroker.rs:1686-1716","code":" 1686 | fn set_normal_unit_normal(\n 1687 |     before: Point,\n 1688 |     after: Point,\n 1689 |     scale: f32,\n 1690 |     radius: f32,\n 1691 |     normal: &mut Point,\n 1692 |     unit_normal: &mut Point,\n 1693 | ) -> bool {\n 1694 |     if !unit_normal.set_normalize((after.x - before.x) * scale, (after.y - before.y) * scale) {\n 1695 |         return false;\n 1696 |     }\n 1697 | \n 1698 |     unit_normal.rotate_ccw();\n 1699 |     *normal = unit_normal.scaled(radius);\n 1700 |     true\n 1701 | }\n 1702 | \n 1703 | fn set_normal_unit_normal2(\n 1704 |     vec: Point,\n 1705 |     radius: f32,\n 1706 |     normal: &mut Point,\n 1707 |     unit_normal: &mut Point,\n 1708 | ) -> bool {\n 1709 |     if !unit_normal.set_normalize(vec.x, vec.y) {\n 1710 |         return false;\n 1711 |     }\n 1712 | \n 1713 |     unit_normal.rotate_ccw();\n 1714 |     *normal = unit_normal.scaled(radius);\n 1715 |     true\n 1716 | }","lines":31}]},{"id":"DUP_3","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"quad_in_line and cubic_in_line share a large duplicated block: the nested loop scanning all point pairs to find the two outermost points (largest abs X/Y diff), the same <script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
