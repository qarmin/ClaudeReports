mand_put_byte (comm, len);\n  529 |   g_output_stream_write (G_OUTPUT_STREAM (comm), str, len, NULL, NULL);\n  530 | }","lines":15}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"enumerate_cb() reads a signed 'gint16 count' directly from the server reply and then does g_ptr_array_new_full(count, ...) and 'for (i = 0; i < count; i++)'. A malicious server can send a negative count; g_ptr_array_new_full takes a guint reserved_size so a negative count becomes a huge allocation request, and although the 'i < count' loop with i,count both gint16 won't iterate for negative count, the huge reserved-size allocation is an unnecessary DoS vector. The per-iteration seek to start_pos + struct_length is also unvalidated.","fix":"Treat count as unsigned/validate count >= 0 before using it as an allocation size, and verify each entry's struct_length keeps the position within the reply.","locations":[{"ref":"daemon/gvfsafpvolume.c:2212-2247","code":" 2212 |   g_vfs_afp_reply_read_int16 (reply, &count);\n 2213 |   infos = g_ptr_array_new_full (count, g_object_unref);\n 2214 |   \n 2215 |   for (i = 0; i < count; i++)\n 2216 |   {\n 2217 |     goffset start_pos;\n 2218 |     guint16 struct_length;\n 2219 |     guint8 FileDir;\n 2220 |     \n 2221 |     gboolean directory;\n 2222 |     guint16 bitmap;\n 2223 |     GFileInfo *info;\n 2224 | \n 2225 |     start_pos = g_vfs_afp_reply_get_pos (reply);\n 2226 |     \n 2227 |     g_vfs_afp_reply_read_uint16 (reply, &struct_length);\n 2228 |     g_vfs_afp_reply_read_byte (reply, &FileDir);\n 2229 |     /* pad byte */\n 2230 |     g_vfs_afp_reply_read_byte (reply, NULL);\n 2231 | \n 2232 |     directory = (FileDir & 0x80); \n 2233 |     bitmap =  directory ? dir_bitmap : file_bitmap;\n 2234 |     \n 2235 |     info = g_file_info_new ();\n 2236 |     if (!g_vfs_afp_server_fill_info (priv->server, info, reply, directory, bitmap, &err))\n 2237 |     {\n 2238 |       g_object_unref (reply);\n 2239 |       g_task_return_error (task, err);\n 2240 |       g_object_unref (task);\n 2241 |       return;\n 2242 |     }\n 2243 |     \n 2244 |     g_ptr_array_add (infos, info);\n 2245 | \n 2246 |     g_vfs_afp_reply_seek (reply, start_pos + struct_length, G_SEEK_SET);\n 2247 |   }","lines":36}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"command_read_cb reads data_len directly from the wire (g_ntohl of attacker/peer-controlled request->data_len, a guint32) and passes it unbounded to g_malloc(data_len). A malicious or buggy client connected to the per-mount socket can request up to ~4GB allocation per request, and there is no sanity cap against the protocol's expected maximum block size. This enables trivial memory exhaustion / DoS of the backend daemon. The peer is same-uid-authorized but a compromised app in the session can abuse it.","fix":"Bound data_len against a reasonable protocol maximum (e.g. the max write block size) before g_malloc; on violation, close the connection via g_vfs_channel_connection_closed and free the reader.","locations":[{"ref":"daemon/gvfschannel.c:516-531","code":"  516 |   request = (GVfsDaemonSocketProtocolRequest *)reader->buffer;\n  517 |   data_len  = g_ntohl (request->data_len);\n  518 | \n  519 |   if (data_len > 0)\n  520 |     {\n  521 |       reader->data = g_malloc (data_len);\n  522 |       reader->data_len = data_len;\n  523 |       reader->data_pos = 0;\n  524 | \n  525 |       g_input_stream_read_async (reader->command_stream,\n  526 | \t\t\t\t reader->data + reader->data_pos,\n  527 | \t\t\t\t reader->data_len - reader->data_pos,\n  528 | \t\t\t\t 0, reader->cancellable,\n  529 | \t\t\t\t data_read_cb, reader);\n  530 |       return;\n  531 |     }","lines":16}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"The journal SETV path reads the string-vector count and entries directly from the mapped journal with no bounds validation. get_stringv_from_journal() reads num_strings = *(guint32*)valuep and then calls get_next_arg() (strlen-based advance) num_strings times, walking pointers through the mmapped journal with no check that they stay inside the entry / mmap. The CRC check in verify_journal_entry only guarantees byte integrity, not that the count or embedded NUL-terminated strings stay within the entry. A valid-CRC but semantically corrupt SETV entry causes out-of-bounds reads (apply_journal_to_builder, meta_tree_lookup_stringv via journal, enumerate).","fix":"Pass the entry end pointer (entry + entry_size) into get_stringv_from_journal and bound num_strings and each get_next_arg() advance against it; bail out / treat journal as invalid on overrun.","locations":[{"ref":"metadata/metatree.c:1595-1623","code":" 1595 | static char **\n 1596 | get_stringv_from_journal (gpointer value,\n 1597 | \t\t\t  gboolean dup_strings)\n 1598 | {\n 1599 |   char *valuep = value;\n 1600 |   guint32 num_strings, i;\n 1601 |   char **res;\n 1602 | \n 1603 |   while (((gsize)valuep) % 4 != 0)\n 1604 |     valuep++;\n 1605 | \n 1606 |   num_strings = GUINT32_FROM_BE (*(guint32 *)valuep);\n 1607 |   valuep += 4;\n 1608 | \n 1609 |   res = g_new (char *, num_strings + 1);\n 1610 | \n 1611 |   for (i = 0; i < num_strings; i++)\n 1612 |     {\n 1613 |       if (dup_strings)\n 1614 | \tres[i] = g_strdup (valuep);\n 1615 |       else\n 1616 | \tres[i] = valuep;\n 1617 |       valuep = get_next_arg (valuep);\n 1618 |     }\n 1619 | \n 1620 |   res[i] = NULL;\n 1621 | \n 1622 |   return res;\n 1623 | }","lines":29},{"ref":"metadata/metatree.c:2316-2328","code":" 2316 | \tcase JOURNAL_OP_SETV_KEY:\n 2317 | \t  journal_key = get_next_arg (journal_path);\n 2318 | \t  value = get_next_arg (journal_key);\n 2319 | \t  strv = get_stringv_from_journal (value, FALSE);\n 2320 | \t  file = meta_builder_lookup (builder, journal_path, TRUE);\n 2321 | \n 2322 | \t  metafile_key_list_set (file, journal_key);\n 2323 | \t  for (i = 0; strv[i] != NULL; i++)\n 2324 | \t    metafile_key_list_add (file, journal_key, strv[i]);\n 2325 | \n 2326 | \t  g_free (strv);\n 2327 | \t  metafile_set_mtime (file, mtime);\n 2328 | \t  break;","lines":13}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"g_vfs_afp_reply_read_afp_name() stores the reply position in 'gint old_pos' although the position field (reply->pos) is a goffset (64-bit signed). For replies larger than INT_MAX the saved restore position is truncated, and seeking back on a short read would corrupt the parse offset. Replies are server-supplied.","fix":"Declare old_pos as goffset to match g_vfs_afp_reply_get_pos()/reply->pos.","locations":[{"ref":"daemon/gvfsafpconnection.c:322-359","code":"  322 | gboolean\n  323 | g_vfs_afp_reply_read_afp_name (GVfsAfpReply *reply, gboolean read_text_encoding,\n  324 |                                GVfsAfpName **afp_name)\n  325 | {\n  326 |   gint old_pos;\n  327 |   \n  328 |   guint32 text_encoding;\n  329 |   guint16 len;\n  330 |   gchar *str;\n  331 | \n  332 |   old_pos = reply->pos;\n  333 |   \n  334 |   if (read_text_encoding)\n  335 |   {\n  336 |     if (!g_vfs_afp_reply_read_uint32 (reply, &text_encoding))\n  337 |       return FALSE;\n  338 |   }\n  339 |   else\n  340 |     text_encoding = 0;\n  341 |   \n  342 |   if (!g_vfs_afp_reply_read_uint16 (reply, &len))\n  343 |   {\n  344 |     reply->pos = old_pos;\n  345 |     return FALSE;\n  346 |   }  \n  347 |   \n  348 |   if (!g_vfs_afp_reply_get_data (reply, len, (guint8 **)&str))\n  349 |   {\n  350 |     reply->pos = old_pos;\n  351 |     return FALSE;\n  352 |   }\n  353 | \n  354 |   if (afp_name)\n  355 |     *afp_name = g_vfs_afp_name_new (text_encoding, g_strndup (str, len), len);\n  356 | \n  357 |   return TRUE;\n  358 |     \n  359 | }","lines":38}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"g_vfs_backend_afc_set_info_from_afcinfo(): st_blocks is parsed with atoi() into\nan int `blocks`, then used as `blocks * G_GUINT64_CONSTANT (512)`. atoi on a\ndevice-reported value can overflow int (negative/garbage), and the multiply is\ndone in the type of blocks before promotion is irrelevant since G_GUINT64\npromotes - but a negative `blocks` yields a wildly large unsigned ALLOCATED_SIZE.\nst_size uses atoll (good) but st_blocks/st_nlink/st_mtime mix atoi/atoll\ninconsistently.","fix":"Parse st_blocks with g_ascii_strtoull into a guint64 and validate before computing allocated size.","locations":[{"ref":"daemon/gvfsbackendafc.c:1549-1556","code":" 1549 |       else if (g_str_equal (afcinfo[i], \"st_blocks\"))\n 1550 |         {\n 1551 |           int blocks = atoi(afcinfo[i+1]);\n 1552 |           g_file_info_set_attribute_uint64 (info, G_FILE_ATTRIBUTE_UNIX_BLOCKS, blocks);\n 1553 |           g_file_info_set_attribute_uint64 (info,\n 1554 |                                             G_FILE_ATTRIBUTE_STANDARD_ALLOCATED_SIZE,\n 1555 |                                             blocks * G_GUINT64_CONSTANT (512));\n 1556 |         }","lines":8}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"getcontentlength is parsed with g_ascii_strtoll into a gint64 and passed straight to g_file_info_set_size with no validation. A server returning a negative value or trailing garbage (partial parse) yields a negative/garbage file size, which can confuse downstream clients (progress callbacks, preallocations).","fix":"Validate the parsed value is >= 0 and that the whole string parsed before calling g_file_info_set_size; otherwise skip.","locations":[{"ref":"daemon/gvfsbackenddav.c:1169-1174","code":" 1169 |           else if (node_has_name (node, \"getcontentlength\"))\n 1170 |             {\n 1171 |               gint64 size;\n 1172 |               size = g_ascii_strtoll (text, NULL, 10);\n 1173 |               g_file_info_set_size (info, size);\n 1174 |             }","lines":6}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"query_fs_info_reply() computes filesystem USED as frsize * (blocks - bfree) from untrusted server values. If a malicious/buggy server reports bfree > blocks, the unsigned subtraction underflows to a huge value, and frsize * blocks / frsize * bavail can also overflow guint64. Only affects reported free-space numbers (display), not memory safety.","fix":"Guard against bfree > blocks (clamp used to 0) and consider overflow-checked multiplication for the size computations.","locations":[{"ref":"daemon/gvfsbackendsftp.c:4752-4765","code":" 4752 |   if (bfree || bavail)\n 4753 |     {\n 4754 |       g_file_info_set_attribute_uint64 (info,\n 4755 |                                         G_FILE_ATTRIBUTE_FILESYSTEM_FREE,\n 4756 |                                         frsize * bavail);\n 4757 | \n 4758 |       g_file_info_set_attribute_uint64 (info,\n 4759 |                                         G_FILE_ATTRIBUTE_FILESYSTEM_SIZE,\n 4760 |                                         frsize * blocks);\n 4761 | \n 4762 |       g_file_info_set_attribute_uint64 (info,\n 4763 |                                         G_FILE_ATTRIBUTE_FILESYSTEM_USED,\n 4764 |                                         frsize * (blocks - bfree));\n 4765 |     }","lines":14}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Filesystem size computation multiplies untrusted server-provided statvfs fields without overflow guards: size = st.f_bsize * st.f_blocks * (f_frsize ? f_frsize : 1). With large f_blocks/f_bsize/f_frsize from a malicious or buggy SMB server this 64-bit multiplication can overflow and report nonsensical sizes; used-space (size - free_space) can also underflow to a huge value.","fix":"Use checked/saturating multiplication (e.g. g_uint64_checked_mul) and clamp; ensure free_space <= size before subtracting for USED.","locations":[{"ref":"daemon/gvfsbackendsmb.c:1699-1704","code":" 1699 |               guint64 size, free_space;\n 1700 |               size = st.f_bsize * st.f_blocks * ((st.f_frsize == 0) ? 1 : st.f_frsize);\n 1701 |               free_space = st.f_bsize * st.f_bfree * ((st.f_frsize == 0) ? 1 : st.f_frsize);\n 1702 |               g_file_info_set_attribute_uint64 (info, G_FILE_ATTRIBUTE_FILESYSTEM_SIZE, size);\n 1703 |               g_file_info_set_attribute_uint64 (info, G_FILE_ATTRIBUTE_FILESYSTEM_FREE, free_space);\n 1704 |               g_file_info_set_attribute_uint64 (info, G_FILE_ATTRIBUTE_FILESYSTEM_USED, size - free_space);","lines":6}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In seek() for G_SEEK_END, offset = priv->request_offset + content_length + offset is computed in signed goffset arithmetic from a server-supplied Content-Length with no overflow/sign check. A hostile or buggy server returning a huge Content-Length combined with request_offset can overflow goffset, producing a negative or wrapped target offset that is then used to build the Range header and as priv->offset, corrupting subsequent reads/tells.","fix":"Validate content_length and the sum against G_MAXOFFSET / negative results before using them; fail the seek on overflow.","locations":[{"ref":"daemon/gvfshttpinputstream.c:417-426","code":"  417 |   if (type == G_SEEK_END && priv->msg)\n  418 |     {\n  419 |       goffset content_length = soup_message_headers_get_content_length (soup_message_get_response_headers (priv->msg));\n  420 | \n  421 |       if (content_length)\n  422 | \t{\n  423 | \t  type = G_SEEK_SET;\n  424 | \t  offset = priv->request_offset + content_length + offset;\n  425 | \t}\n  426 |     }","lines":10}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":true,"description":"find_string and fill_mountable_info loop with a signed int/gint index compared against guint length fields (array->len, scheme_aliases_len). Signed/unsigned comparison; harmless for realistic sizes but technically incorrect and compiler-warning-worthy.","fix":"Use guint/gsize index variables to match the unsigned length types.","locations":[{"ref":"client/gdaemonvfs.c:548-562","code":"  548 | static int\n  549 | find_string (GPtrArray *array, const char *find_me)\n  550 | {\n  551 |   int i;\n  552 |   \n  553 |   g_return_val_if_fail (find_me != NULL, -1);\n  554 |   \n  555 |   for (i = 0; i < array->len; ++i)\n  556 |     {\n  557 |       if (strcmp (g_ptr_array_index (array, i), find_me) == 0)\n  558 | \treturn i;\n  559 |     }\n  560 |   \n  561 |   return -1;\n  562 | }","lines":15},{"ref":"client/gdaemonvfs.c:635-645","code":"  635 |       scheme_aliases_len = g_strv_length ((gchar **) scheme_aliases);\n  636 |       if (scheme_aliases_len > 0)\n  637 |         {\n  638 |           info->scheme_aliases = g_new (char *, scheme_aliases_len + 1);\n  639 |           for (i = 0; i < scheme_aliases_len; i++)\n  640 |             {\n  641 |               info->scheme_aliases[i] = g_strdup (scheme_aliases[i]);\n  642 |               if (find_string (uri_schemes, scheme_aliases[i]) == -1)\n  643 |                 g_ptr_array_add (uri_schemes, g_strdup (scheme_aliases[i]));\n  644 |             }\n  645 |           info->scheme_aliases[scheme_aliases_len] = NULL;","lines":11}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"file_transfer builds the progress-callback D-Bus object path as g_strdup_printf(\"/org/gtk/vfs/callback/%p\", &obj_path) - embedding the address of the local stack variable &obj_path, not a unique identifier. Stack addresses are not unique across concurrent transfers on different threads (same frame offset yields the same value), so two simultaneous copy/move operations can export the same progress object path and collide.","fix":"Generate a genuinely unique token via a global atomic counter or g_dbus_generate_guid() instead of &obj_path.","locations":[{"ref":"client/gdaemonfile.c:2761-2762","code":" 2761 |   if (send_progress)\n 2762 |     obj_path = g_strdup_printf (\"/org/gtk/vfs/callback/%p\", &obj_path);","lines":2}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"io_op->io_allow_cancel = file->input_buffer->len == 0 && !op->sent_cancel is computed right after g_string_set_size(file->input_buffer, current_len + len) where len > 0 was just confirmed. Therefore file->input_buffer->len is never 0 at this point and the left operand is always FALSE - the header read is never marked cancellable. The intended test is on the pre-growth length current_len (no header byte received yet). The output-stream analog uses only !op->sent_cancel, confirming the input-stream 'len == 0' clause is wrong. This defeats cancellation while blocked waiting for a reply header.","fix":"Replace with io_op->io_allow_cancel = current_len == 0 && !op->sent_cancel; in all three input-stream HANDLE_HEADER states.","locations":[{"ref":"client/gdaemonfileinputstream.c:757","code":"  757 | \t      io_op->io_allow_cancel = file->input_buffer->len == 0 && !op->sent_cancel;","lines":1},{"ref":"client/gdaemonfileinputstream.c:1284","code":" 1284 | \t      io_op->io_allow_cancel = file->input_buffer->len == 0 && !op->sent_cancel;","lines":1},{"ref":"client/gdaemonfileinputstream.c:1564","code":" 1564 | \t      io_op->io_allow_cancel = file->input_buffer->len == 0 && !op->sent_cancel;","lines":1}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"FUSE prefix matching uses g_str_has_prefix(fuse_path, mount_info->fuse_mountpoint) then computes len and slices the remainder. The cache-lookup boundary check (lines 716-728) and the mount_path computation in _g_daemon_vfs_get_mount_info_by_fuse_sync (lines 998-1010) treat the boundary differently. If fuse_mountpoint carries a trailing '/', len includes the slash and mount_path_end starts without a leading '/', so g_build_filename(mount_prefix, mount_path_end) can mis-join, and the two paths can disagree on whether a fuse_path matches a mount.","fix":"Normalize fuse_mountpoint (strip trailing '/') when stored, or handle the fuse_path[len] == '/' case explicitly and consistently in both code paths.","locations":[{"ref":"client/gdaemonvfs.c:716-728","code":"  716 | \n  717 |       if (mount_info->fuse_mountpoint != NULL &&\n  718 | \t  g_str_has_prefix (fuse_path, mount_info->fuse_mountpoint))\n  719 |         {\n  720 |           int len = strlen (mount_info->fuse_mountpoint);\n  721 |           /* empty path always matches. Also check if we have a path\n  722 |            * not two paths that accidently share the same prefix */\n  723 |           if (fuse_path[len] == 0 || fuse_path[len] == '/')\n  724 |             {\n  725 |               info = g_mount_info_ref (mount_info);\n  726 |               break;\n  727 |             }\n  728 |         }","lines":13},{"ref":"client/gdaemonvfs.c:998-1010","code":"  998 |   if (info)\n  999 |     {\n 1000 |       if (info->fuse_mountpoint)\n 1001 | \t{\n 1002 | \t  len = strlen (info->fuse_mountpoint);\n 1003 | \t  if (fuse_path[len] == 0)\n 1004 | \t    mount_path_end = \"/\";\n 1005 | \t  else\n 1006 | \t    mount_path_end = fuse_path + len;\n 1007 | \n 1008 | \t  *mount_path = g_build_filename (info->mount_spec->mount_prefix,\n 1009 | \t\t\t\t\t  mount_path_end, NULL);\n 1010 | \t}","lines":13}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In vfs_create the mount-list guard 'if (path_is_mount_list(path)) result = -EEXIST;' is missing an 'else' before the following 'if ((file = file_from_full_path(path)))'. For the mount-list root path, file_from_full_path returns NULL, so control falls past the if-block into the final else and result is overwritten with -ENOENT instead of the intended -EEXIST. vfs_open (lines 1113-1115) correctly uses 'else if'. The -EEXIST value set at line 1179 is dead.","fix":"Change line 1180 to 'else if ((file = file_from_full_path(path)))'.","locations":[{"ref":"client/gvfsfusedaemon.c:1178-1180","code":" 1178 |   if (path_is_mount_list (path))\n 1179 |     result = -EEXIST;\n 1180 |   if ((file = file_from_full_path (path)))","lines":3}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In g_vfs_encode_uri the entire authority block (userinfo, host, port) is guarded by 'if (decoded->host != NULL)'. If a GDecodedUri has userinfo and/or port set but host == NULL, the userinfo and port are silently dropped from the encoded URI - e.g. a mount spec carrying a user/port but no host loses credentials/port without error.","fix":"Emit userinfo/port independently of host, or return an error / log when userinfo or port is present but host is NULL so the data loss is not silent.","locations":[{"ref":"client/gvfsuriutils.c:288-315","code":"  288 |   if (decoded->host != NULL)\n  289 |     {\n  290 |       if (decoded->userinfo)\n  291 | \t{\n  292 | \t  /* userinfo    = *( unreserved / pct-encoded / sub-delims / \":\" ) */\n  293 | \t  g_string_append_uri_escaped (uri, decoded->userinfo,\n  294 | \t\t\t\t       G_URI_RESERVED_CHARS_ALLOWED_IN_USERINFO, allow_utf8);\n  295 | \t  g_string_append_c (uri, '@');\n  296 | \t}\n  297 | \n  298 |       if (gvfs_is_ipv6 (decoded->host))\n  299 |         {\n  300 |           g_string_append (uri, decoded->host);\n  301 |         }\n  302 |       else\n  303 |         {\n  304 |           g_string_append_uri_escaped (uri, decoded->host,\n  305 |  atoi() truncated into a guint32 to drive pointer arithmetic on the filename (result->fe_fname + result->fe_fnlen - fe_size - 4) and strncmp of 4 bytes there. fe_size derives from the untrusted server size field; though there is a guard (fe_size <= fe_fnlen-4 && fe_fnlen > fe_size+4), the mixed signed/unsigned and atoi overflow on very large/negative size strings make the bound checks fragile for crafted listings.","fix":"Parse the size with a robust unsigned parser (g_ascii_strtoull) into a 64-bit value, and validate it as an offset within [0, fe_fnlen] explicitly before doing pointer arithmetic.","locations":[{"ref":"daemon/ParseFTPList.c:1196-1209","code":" 1196 |         if (result->fe_type == 'l' && result->fe_fnlen > 4)\n 1197 |         {\n 1198 |           /* First try to use result->fe_size to find \" -> \" sequence.\n 1199 |              This can give proper result for cases like \"aaa -> bbb -> ccc\". */\n 1200 |           guint32 fe_size = atoi(result->fe_size);\n 1201 | \n 1202 |           if (fe_size <= result->fe_fnlen - 4 &&\n 1203 |               result->fe_fnlen > (fe_size + 4) &&\n 1204 |               strncmp(result->fe_fname + result->fe_fnlen - fe_size - 4 , \" -> \", 4) == 0)\n 1205 |           {\n 1206 |             result->fe_lname = result->fe_fname + (result->fe_fnlen - fe_size);\n 1207 |             result->fe_lnlen = (&(line[linelen])) - (result->fe_lname);\n 1208 |             result->fe_fnlen -= fe_size + 4;\n 1209 |           }","lines":14}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In open_thread_func() the DSI option-parsing loop reads optionType/optionLength from server-supplied 'reply' and advances pos by optionLength with 'pos += optionLength' without validating that optionLength bytes actually remain (only the 4-byte option payloads are bounds-checked). A malformed status reply can advance pos past totalDataLength; because the loop guard '(dsi_header.totalData e other code paths take daemon->lock for shared state. Mounts are normally initiated from the main loop so contention is unlikely, but the counter is read/written outside the lock that protects the rest of the daemon's shared structures, an inconsistent locking discipline that could produce duplicate object paths if ever called concurrently.","fix":"Use g_atomic_int_add or take daemon->lock when generating the object path, consistent with other shared-state access.","locations":[{"ref":"daemon/gvfsdaemon.c:967","code":"  967 |   obj_path = g_strdup_printf (\"/org/gtk/vfs/mount/%d\", ++daemon->mount_counter);","lines":1}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"spawn_mount_handle_spawned and child_watch_cb can race / double-complete. When spawn succeeds the spawned helper sends the Spawned signal handled by spawn_mount_handle_spawned (which may call mount_finish), while child_watch_cb (registered via g_child_watch_add for the same pid because G_SPAWN_DO_NOT_REAP_CHILD is set) can independently call mount_finish on a 126/127 exit. Both reference the same `data`; mount_finish frees it. If both fire, the second is a use-after-free of MountData. With pkexec double-fork the pids differ, but the lifetimes are not coordinated.","fix":"Coordinate ownership: have child_watch_cb and spawn_mount_handle_spawned share a flag (or remove the child watch once the spawn handshake completes) so MountData is freed exactly once.","locations":[{"ref":"daemon/mount.c:370-411","code":"  370 | static gboolean\n  371 | spawn_mount_handle_spawned (GVfsDBusSpawner *object,\n  372 |                             GDBusMethodInvocation *invocation,\n  373 |                             gboolean arg_succeeded,\n  374 |                             const gchar *arg_error_message,\n  375 |                             guint arg_error_code,\n  376 |                             gpointer user_data)\n  377 | {\n  378 |   MountData *data = user_data;\n  379 |   GError *error = NULL;\n  380 | \n  381 |   g_dbus_interface_skeleton_unexport (G_DBUS_INTERFACE_SKELETON (data->spawner));\n  382 | \n  383 |   if (!arg_succeeded)\n  384 |     {\n  385 |       if (arg_error_code == G_IO_ERROR_ALREADY_MOUNTED &&\n  386 |           data->mountable->dbus_name != NULL)\n  387 |         {\n  388 |           /* This means the spawn failed since someone already owned the name.\n  389 |              It might not strictly be mounted yet, as the mount might not\n  390 |              be registred yet. So, to avoid races we ask the new owner of\n  391 |              the name to mount. It'll typically return an ALREADY_MOUNTED\n  392 |              error which we treat as success.\n  393 |           */\n  394 |           mountable_mount_with_name (data, data->mountable->dbus_name);\n  395 |         }\n  396 |       else\n  397 |         {\n  398 |           g_set_error_literal (&error, G_IO_ERROR, arg_error_code, arg_error_message);\n  399 |           mount_finish (data, error);\n  400 |           g_error_free (error);\n  401 |         }\n  402 |     }\n  403 |   else\n  404 |     {\n  405 |       mountable_mount_with_name (data, g_dbus_method_invocation_get_sender (invocation));\n  406 |     }\n  407 |   \n  408 |   gvfs_dbus_spawner_complete_spawned (object, invocation);\n  409 |   \n  410 |   return TRUE;\n  411 | }","lines":42},{"ref":"daemon/mount.c:413-443","code":"  413 | static void\n  414 | child_watch_cb (GPid pid,\n  415 |                 gint status,\n  416 |                 gpointer user_data)\n  417 | {\n  418 |   MountData *data = user_data;\n  419 |   GError *error = NULL;\n  420 |   gint code = 0;\n  421 | \n  422 |   if (!g_spawn_check_wait_status (status, &error))\n  423 |     {\n  424 |       if (error->domain == G_SPAWN_EXIT_ERROR)\n  425 |         code = error->code;\n  426 | \n  427 |       g_clear_error (&error);\n  428 |     }\n  429 | \n  430 |   /* GVfs daemons always exit with 0, but gvfsd-admin is spawned over pkexec,\n  431 |    * which can fail when the authentication dialog is dismissed for example.\n  432 |    */\n  433 |   if (code == 126 || code == 127)\n  434 |     {\n  435 |       error = g_error_new_literal (G_IO_ERROR,\n  436 |                                    G_IO_ERROR_PERMISSION_DENIED,\n  437 |                                    _(\"Permission denied\"));\n  438 |       mount_finish (data, error);\n  439 |       g_error_free (error);\n  440 |     }\n  441 | \n  442 |   g_spawn_close_pid (pid);\n  443 | }","lines":31}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"child_watch_cb only calls mount_finish(data,...) when the spawned process exits with code 126/127 (pkexec auth failure). For any other non-zero exit (or signal) of a spawned mount helper that exits before completing the D-Bus spawn handshake, neither child_watch_cb nor spawn_mount_handle_spawned ever completes the MountData, so the caller's MountCallback is never invoked and the ongoing entry/MountData is leaked indefinitely (and the originating D-Bus mount invocation hangs until timeout). The TODO at line 517 acknowledges no timeout exists.","fix":"When the child exits without having sent the Spawned signal (data->spawner still exported), treat any failure exit as a mount error: unexport spawner and call mount_finish with an appropriate GError. Add the missing spawn timeout.","locations":[{"ref":"daemon/mount.c:413-443","code":"  413 | static void\n  414 | child_watch_cb (GPid pid,\n  415 |                 gint status,\n  416 |                 gpointer user_data)\n  417 | {\n  418 |   MountData *data = user_data;\n  419 |   GError *error = NULL;\n  420 |   gint code = 0;\n  421 | \n  422 |   if (!g_spawn_check_wait_status (status, &error))\n  423 |     {\n  424 |       if (error->domain == G_SPAWN_EXIT_ERROR)\n  425 |         code = error->code;\n  426 | \n  427 |       g_clear_error (&error);\n  428 |     }\n  429 | \n  430 |   /* GVfs daemons always exit with 0, but gvfsd-admin is spawned over pkexec,\n  431 |    * which can fail when the authentication dialog is dismissed for example.\n  432 |    */\n  433 |   if (code == 126 || code == 127)\n  434 |     {\n  435 |       error = g_error_new_literal (G_IO_ERROR,\n  436 |                                    G_IO_ERROR_PERMISSION_DENIED,\n  437 |                                    _(\"Permission denied\"));\n  438 |       mount_finish (data, error);\n  439 |       g_error_free (error);\n  440 |     }\n  441 | \n  442 |   g_spawn_close_pid (pid);\n  443 | }","lines":31},{"ref":"daemon/mount.c:517","code":"  517 |       /* TODO: Add a timeout here to detect spawned app crashing */","lines":1}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"handle_register_mount: when the very first check (already-registered) matches it returns an error reply but then falls through the if/else-if chain - actually it is structured as if/else-if/else so only one branch runs, which is correct. BUT mount_spec ownership: in the success branch mount_spec is taken over by the VfsMount; in the match_vfs_mount-already-mounted branch (line 714) the mount_spec successfully parsed at line 708 is NEVER unref'd, leaking the GMountSpec on every duplicate-spec registration attempt.","fix":"Unref mount_spec in the `match_vfs_mount(mount_spec) != NULL` branch before returning (it is only consumed in the final success branch).","locations":[{"ref":"daemon/mount.c:708-719","code":"  708 |   else if ((mount_spec = g_mount_spec_from_dbus (arg_mount_spec)) == NULL) {\n  709 |     g_dbus_method_invocation_return_error_literal (invocation, \n  710 |                                                    G_IO_ERROR,\n  711 |                                                    G_IO_ERROR_INVALID_ARGUMENT,\n  712 |                                                    \"Error in mount spec\");\n  713 |   }\n  714 |   else if (match_vfs_mount (mount_spec) != NULL) {\n  715 |     g_dbus_method_invocation_return_error_literal (invocation,\n  716 |                                                    G_IO_ERROR,\n  717 |                                                    G_IO_ERROR_ALREADY_MOUNTED,\n  718 |                                                    \"Mountpoint Already registered\");\n  719 |   }","lines":12}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"get_mount_for_mount_path() caches a GVolumeMonitor in a function-local 'static GVolumeMonitor *union_monitor' and checks/initializes it without holding any lock (lines 321-322). This static method can be invoked concurrently from multiple threads (it is the GNativeVolumeMonitor.get_mount_for_mount_path vfunc), so two threads can both see NULL and both call g_volume_monitor_get(), leaking one reference, or observe a torn pointer. The proxy_vm lock is only taken afterwards.","fix":"Initialize the cached union_monitor under proxy_vm (or use g_once) before releasing/while holding the lock, or use g_atomic pointer operations.","locations":[{"ref":"monitor/proxy/gproxyvolumemonitor.c:296-322","code":"  296 |   GProxyMount *candidate_mount;\n  297 |   static GVolumeMonitor *union_monitor = NULL;\n  298 | \n  299 |   /* There's a problem here insofar that this static method on GNativeVolumeMonitor can\n  300 |    * be called *before* any of our monitors are constructed. Since this method doesn't\n  301 |    * pass in the class structure we *do not know* which native remote monitor to use.\n  302 |    *\n  303 |    * To work around that, we get the singleton GVolumeMonitor... This will trigger\n  304 |    * construction of a GUnionVolumeMonitor in gio which will construct the *appropriate*\n  305 |    * remote volume monitors to use (it's up to gio to pick which one to use).\n  306 |    *\n  307 |    * Note that we will *hold* on to this reference effectively making us a resident\n  308 |    * module. And effectively keeping volume monitoring alive.\n  309 |    *\n  310 |    * The reason we hold on to the reference is that otherwise we'd be constructing/destructing\n  311 |    * *all* proxy volume monitors (which includes synchronous D-Bus calls to seed the monitor)\n  312 |    * every time this method is called.\n  313 |    *\n  314 |    * Note that *simple* GIO apps that a) don't use volume monitors; and b) don't use the\n  315 |    * g_file_find_enclosing_mount() method will never see any volume monitor overhead.\n  316 |    */\n  317 | \n  318 |   /* Note that g_volume_monitor_get() is thread safe. We don't want to call it while\n  319 |    * holding the proxy_vm lock since it might end up calling our constructor.\n  320 |    */\n  321 |   if (union_monitor == NULL)\n  322 |     union_monitor = g_volume_monitor_get ();","lines":27}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gvfs_udisks2_volume_monitor_update() removes the pending update source then calls update_func(monitor) directly. update_func sets monitor->update_id = 0 at its start - but update_id was already non-zero and just removed via g_source_remove, so this is consistent. However, update_func is invoked synchronously here while it is also the GSource callback; if update_func (via update_all -> emit signals -> client settle) re-enters and schedules/forces another update, monitor->update_id bookkeeping can race. More concretely, g_source_remove is called on update_id without resetting update_id to 0 before update_func runs, but update_func sets it to 0 first thing, so the removed id is fine; the real issue is the duplicated removal logic vs schedule_update which guards on update_id != 0.","fix":"Use g_clear_handle_id (&monitor->update_id, g_source_remove) before calling update_func to keep update_id consistent and avoid relying on update_func resetting it.","locations":[{"ref":"monitor/udisks2/gvfsudisks2volumemonitor.c:640-650","code":"  640 | void\n  641 | gvfs_udisks2_volume_monitor_update (GVfsUDisks2VolumeMonitor *monitor)\n  642 | {\n  643 |   g_return_if_fail (GVFS_IS_UDISKS2_VOLUME_MONITOR (monitor));\n  644 |   udisks_client_settle (monitor->client);\n  645 | \n  646 |   if (monitor->update_id != 0)\n  647 |     g_source_remove (monitor->update_id);\n  648 | \n  649 |   update_func (monitor);\n  650 | }","lines":11},{"ref":"monitor/udisks2/gvfsudisks2volumemonitor.c:619-638","code":"  619 | static gboolean\n  620 | update_func (gpointer user_data)\n  621 | {\n  622 |   GVfsUDisks2VolumeMonitor *monitor = GVFS_UDISKS2_VOLUME_MONITOR (user_data);\n  623 | \n  624 |   monitor->update_id = 0;\n  625 | \n  626 |   update_all (monitor, TRUE, FALSE);\n  627 | \n  628 |   return G_SOURCE_REMOVE;\n  629 | }\n  630 | \n  631 | static void\n  632 | schedule_update (GVfsUDisks2VolumeMonitor *monitor)\n  633 | {\n  634 |   if (monitor->update_id != 0)\n  635 |     return;\n  636 | \n  637 |   monitor->update_id = g_timeout_add (UPDATE_TIMEOUT, update_func, monitor);\n  638 | }","lines":20}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"vfs_utimens converts tv[i].tv_nsec to usec without checking for the UTIME_NOW (1e9-1) and UTIME_OMIT (1e9-2) sentinel values. A request to omit or set-to-now a timestamp is instead written as a bogus ~999 ms usec with a huge derived seconds value, corrupting the timestamp.","fix":"Check for UTIME_NOW/UTIME_OMIT in tv_nsec and handle per the utimensat contract (omit the field or use current time) before converting.","locations":[{"ref":"client/gvfsfusedaemon.c:2220-2235","code":" 2220 |       guint32 atime_usec;\n 2221 |       guint64 mtime;\n 2222 |       guint32 mtime_usec;\n 2223 |       GFileInfo *info;\n 2224 | \n 2225 |       if (tv)\n 2226 |         {\n 2227 |           atime = (guint64) tv [0].tv_sec;\n 2228 |           atime_usec = (guint32) tv [0].tv_nsec / (guint32) 1000;\n 2229 |           mtime = (guint64) tv [1].tv_sec;\n 2230 |           mtime_usec = (guint32) tv [1].tv_nsec / (guint32) 1000;\n 2231 |         }\n 2232 |       else\n 2233 |         {\n 2234 |           struct timeval tiv;\n 2235 | ","lines":16}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The 'port' GParamSpec maximum is declared as 65536, but valid TCP/UDP ports are 0-65535. Off-by-one in the allowed range.","fix":"Use 65535 as the maximum.","locations":[{"ref":"common/gvfsdnssdresolver.c:673-684","code":"  673 |   g_object_class_install_property (gobject_class,\n  674 |                                    PROP_PORT,\n  675 |                                    g_param_spec_uint (\"port\",\n  676 |                                                       \"Port\",\n  677 |                                                       \"Port\",\n  678 |                                                       0,\n  679 |                                                       65536,\n  680 |                                                       0,\n  681 |                                                       G_PARAM_READABLE |\n  682 |                                                       G_PARAM_STATIC_NAME |\n  683 |                                                       G_PARAM_STATIC_BLURB |\n  684 |                                                       G_PARAM_STATIC_NICK));","lines":12}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The \\xNN branch only checks s[2]>='0' && s[3]>='0', not that the characters are valid hex digits, so chars like ':' ';' 'g'-'z' are accepted and mis-decoded by the hand-rolled hexdigit() (which then hits g_return_val_if_fail and emits warnings). udev only emits valid \\xNN so impact is limited, but the validation is wrong.","fix":"Use g_ascii_isxdigit()/g_ascii_xdigit_value() instead of the > }  \n  435 |       \n  436 |       dirp = (struct smbc_dirent *)dirents;\n  437 |       while (res > 0)\n  438 | \t{\n  439 | \t  unsigned int dirlen;\n  440 | \n  441 | \t  if (dirp->smbc_type != SMBC_IPC_SHARE &&\n  442 | \t      dirp->smbc_type != SMBC_COMMS_SHARE &&\n  443 | \t      dirp->smbc_type != SMBC_PRINTER_SHARE &&\n  444 | \t      strcmp (dirp->name, \".\") != 0 &&\n  445 | \t      strcmp (dirp->name, \"..\") != 0)\n  446 | \t    {\n  447 | \t      BrowseEntry *entry = g_new (BrowseEntry, 1);\n  448 | \t      gboolean valid_utf8;\n  449 | \n  450 | \t      entry->smbc_type = dirp->smbc_type;\n  451 | \t      entry->name = g_strdup (dirp->name);\n  452 | \t      entry->name_utf8 = smb_name_to_utf8 (dirp->name, &valid_utf8);\n  453 | \t      entry->name_normalized = normalize_smb_name_helper (dirp->name, -1, valid_utf8);\n  454 | \t      entry->comment = smb_name_to_utf8 (dirp->comment, NULL);\n  455 | \t      \n  456 | \t      entries = g_list_prepend (entries, entry);\n  457 | \t    }\n  458 | \t\t  \n  459 | \t  dirlen = dirp->dirlen;\n  460 | \t  dirp = (struct smbc_dirent *) (((char *)dirp) + dirlen);\n  461 | \t  res -= dirlen;\n  462 | \t}\n  463 | \n  464 |       entries = g_list_reverse (entries);\n  465 |     }","lines":41}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gvfs_output_stream_splice: the inner write loop breaks on n_written==-1 setting res=FALSE, but if g_output_stream_write returns 0 (no progress, not an error) the inner `while (n_read > 0)` loop spins forever because p/n_read/bytes_copied are unchanged. GOutputStream write of >0 bytes returning 0 is unusual but not contractually impossible for some streams.","fix":"Treat n_written==0 as end/error and break out of the loop to avoid a potential infinite loop.","locations":[{"ref":"daemon/gvfsdaemonutils.c:397-413","code":"  397 |       p = buffer;\n  398 |       while (n_read > 0)\n  399 |         {\n  400 |           n_written = g_output_stream_write (stream, p, n_read, cancellable, error);\n  401 |           if (n_written == -1)\n  402 |             {\n  403 |               res = FALSE;\n  404 |               break;\n  405 |             }\n  406 | \n  407 |           p += n_written;\n  408 |           n_read -= n_written;\n  409 |           bytes_copied += n_written;\n  410 | \n  411 |           if (progress_callback)\n  412 |             progress_callback (bytes_copied, total_size, progress_callback_data);\n  413 |         }","lines":17}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"g_vfs_ftp_connection_receive() reads response lines and indexes line[0]..line[3] without verifying the line is at least 4 characters long. For the FIRST_LINE case it checks line[0]/line[1]/line[2]/line[3], but a server sending a line shorter than 4 bytes (e.g. \"2\\0\") makes line[1..3] read past the string's NUL into adjacent buffer bytes. g_data_input_stream_read_line returns a NUL-terminated string so reads stay within the allocation up to the NUL, but the parsing logic relies on bytes that may be the terminator/garbage.","fix":"Check strlen(line) >= 4 before indexing line[0..3]; treat shorter lines as an invalid reply.","locations":[{"ref":"daemon/gvfsftpconnection.c:220-251","code":"  220 |       if (reply_state == FIRST_LINE)\n  221 |         {\n  222 |           if (line[0] <= '0' || line[0] > '5' ||\n  223 |               line[1] < '0' || line[1] > '9' ||\n  224 |               line[2] < '0' || line[2] > '9')\n  225 |             {\n  226 |               g_set_error_literal (error, G_IO_ERROR, G_IO_ERROR_FAILED,\n  227 |         \t\t\t   _(\"Invalid reply\"));\n  228 |               goto fail;\n  229 |             }\n  230 |           response = 100 * (line[0] - '0') +\n  231 |         \t      10 * (line[1] - '0') +\n  232 |         \t \t   (line[2] - '0');\n  233 |           if (line[3] == ' ')\n  234 |             reply_state = DONE;\n  235 |           else if (line[3] == '-')\n  236 |             reply_state = MULTILINE;\n  237 |           else\n  238 |             {\n  239 |               g_set_error_literal (error, G_IO_ERROR, G_IO_ERROR_FAILED,\n  240 |         \t\t\t   _(\"Invalid reply\"));\n  241 |               goto fail;\n  242 |             }\n  243 |         }\n  244 |       else\n  245 |         {\n  246 |           if (line[0] - '0' == response / 100 &&\n  247 |               line[1] - '0' == (response / 10) % 10 &&\n  248 |               line[2] - '0' == response % 10 &&\n  249 |               line[3] == ' ')\n  250 |             reply_state = DONE;\n  251 |         }","lines":32}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"g_vfs_ftp_task_setup_data_connection_pasv() parses the PASV reply with sscanf scanning byte-by-byte for '%*u,%*u,%*u,%*u,%u,%u' and forms the port as port1 << 8 | port2. port1/port2 are guint parsed from the (untrusted) reply with no range check (should be 0-255). A server returning values >255 yields a wrong port silently; combined with the curl-style any-position scan, malformed replies can be misparsed rather than rejected.","fix":"After sscanf, validate port1 and port2 are <= 255 (and ideally that the four leading octets match the connection address) before computing the port.","locations":[{"ref":"daemon/gvfsftptask.c:884-898","code":"  884 |   for (s = reply[0]; *s; s++)\n  885 |     {\n  886 |       if (sscanf (s, \"%*u,%*u,%*u,%*u,%u,%u\", &port1, &port2) == 2)\n  887 |         break;\n  888 |     }\n  889 |   if (*s == 0)\n  890 |     {\n  891 |       g_strfreev (reply);\n  892 |       g_set_error_literal (&task->error, G_IO_ERROR, G_IO_ERROR_FAILED,\n  893 |         \t\t   _(\"Invalid reply\"));\n  894 |       return G_VFS_FTP_METHOD_ANY;\n  895 |     }\n  896 |   g_strfreev (reply);\n  897 | \n  898 |   addr = g_vfs_ftp_task_create_remote_address (task, port1 << 8 | port2);","lines":15}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"g_vfs_http_input_stream_close_async() returns TRUE immediately when priv->stream == NULL but does NOT unref the GTask it created (it returns the boolean then falls through without g_object_unref(task)), unlike every other early-return in this file which unrefs the task. This leaks the GTask on the no-underlying-stream close path.","fix":"Add g_object_unref (task); after g_task_return_boolean in the priv->stream == NULL branch (and return).","locations":[{"ref":"daemon/gvfshttpinputstream.c:373-381","code":"  373 |   if (priv->stream == NULL)\n  374 |     {\n  375 |       g_task_return_boolean (task, TRUE);\n  376 |       return;\n  377 |     }\n  378 | \n  379 |   g_input_stream_close_async (priv->stream, io_priority,\n  380 | \t\t\t      cancellable, close_callback, task);\n  381 | }","lines":9}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"g_vfs_job_succeeded() unconditionally sets job->failed = FALSE and calls g_vfs_job_send_reply(), unlike g_vfs_job_failed*/ which guard on the current state. If a backend erroneously calls g_vfs_job_succeeded() after a job has already failed (or twice), the failed flag is cleared and a second reply is emitted, which can double-complete the D-Bus invocation / channel reply. The failed paths are protected by an early-return on job->failed; the success path has no equivalent guard.","fix":"Guard the terminal transition, e.g. return early if a reply was already sent (track via job->sent_reply) so succeeded() cannot override a prior failed() or fire a second reply.","locations":[{"ref":"daemon/gvfsjob.c:296-301","code":"  296 | void\n  297 | g_vfs_job_succeeded (GVfsJob *job)\n  298 | {\n  299 |   job->failed = FALSE;\n  300 |   g_vfs_job_send_reply (job);\n  301 | }","lines":6}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"g_spawn_async return value is ignored in on_name_acquired when launching gvfsd-fuse. If the fuse helper fails to spawn there is no warning and no error handling; the GError out-param is NULL so failures are completely silent, making fuse-mount failures very hard to diagnose.","fix":"Pass a GError and log a g_warning on spawn failure.","locations":[{"ref":"daemon/main.c:101-106","code":"  101 |       g_spawn_async (NULL,\n  102 |                      argv2,\n  103 |                      NULL,\n  104 |                      G_SPAWN_LEAVE_DESCRIPTORS_OPEN,\n  105 |                      NULL, NULL,\n  106 |                      NULL, NULL);","lines":6}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"sigusr1_handler and reload_pipes_cb use `while (write(...) != 1)` and `while (read(...) != 1)` busy-spin loops that will loop forever on a genuine error (e.g. EBADF) rather than only on EINTR/short transfer, potentially hanging the signal handler. Also write() in a signal handler racing a full pipe could spin. Minor since these pipes are local and single-byte.","fix":"Loop only on EINTR (and short writes); break out and ignore on other errno values.","locations":[{"ref":"daemon/mount.c:1127-1147","code":" 1127 | static void\n 1128 | sigusr1_handler (int sig)\n 1129 | {\n 1130 |   while (write (reload_pipes[1], \"a\", 1) != 1)\n 1131 |     ;\n 1132 | }\n 1133 | \n 1134 | static gboolean\n 1135 | reload_pipes_cb (GIOChannel *io,\n 1136 | \t\t GIOCondition condition,\n 1137 | \t\t gpointer data)\n 1138 | {\n 1139 |   char a;\n 1140 |   \n 1141 |   while (read (reload_pipes[0], &a, 1) != 1)\n 1142 |     ;\n 1143 | \n 1144 |   re_read_mountable_config ();\n 1145 |   \n 1146 |   return TRUE;\n 1147 | }","lines":21}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_id_for_key uses bsearch over tree->attributes comparing string pointers via strcmp (find_attribute_id). The attributes array is assumed sorted, which holds for files written by metabuilder (keys are g_list_sort'd). However find_data_element computes 'key->id - key_id' as the comparison result for bsearch; both are guint32 and the difference is implicitly converted to int. If two attribute ids differ by more than INT_MAX the sign of the comparator is wrong. Attribute counts are tiny in practice so impact is negligible, but the comparator is not robust.","fix":"Return (key->id > key_id) - (key->id < key_id) instead of a subtraction.","locations":[{"ref":"metadata/metatree.c:827-837","code":"  827 | static int\n  828 | find_data_element (const void *_key, const void *_dataent)\n  829 | {\n  830 |   const struct FindId *key = _key;\n  831 |   const MetaFileDataEnt *dataent = _dataent;\n  832 |   guint32 key_id;\n  833 | \n  834 |   key_id = GUINT32_FROM_BE (dataent->key) & ~KEY_IS_LIST_MASK;\n  835 | \n  836 |   return key->id - key_id;\n  837 | }","lines":11}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_access_token_cb() and get_password_cb() call goa_object_peek_files(self->object) into a local 'files' and only check it for NULL; the variable is otherwise unused (the mount uses self->root). The dead 'files' fetch is harmless but signals the NULL check may have been intended to gate something more than the error path, or the variable is leftover.","fix":"Either drop the unused 'files' local or document that it is only a presence check; ensure the GoaFiles presence check still matches intent.","locations":[{"ref":"monitor/goa/goavolume.c:280-301","code":"  280 |   GoaAccount *account;\n  281 |   GoaFiles *files;\n  282 |   MountOp *data = g_task_get_task_data (task);\n  283 | \n  284 |   error = NULL;\n  285 |   if (!goa_oauth2_based_call_get_access_token_finish (oauth2_based, &data->passwd, NULL, res, &error))\n  286 |     {\n  287 |       g_task_return_error (task, error);\n  288 |       g_object_unref (task);\n  289 |       return;\n  290 |     }\n  291 | \n  292 |   account = goa_object_peek_account (self->object);\n  293 |   files = goa_object_peek_files (self->object);\n  294 |   if (files == NULL)\n  295 |     {\n  296 |       g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED,\n  297 |                                _(\"Failed to get org.gnome.OnlineAccounts.Files for %s\"),\n  298 |                                goa_account_get_id (account));\n  299 |       g_object_unref (task);\n  300 |       return;\n  301 |     }","lines":22},{"ref":"monitor/goa/goavolume.c:319-340","code":"  319 |   GoaAccount *account;\n  320 |   GoaFiles *files;\n  321 |   MountOp *data = g_task_get_task_data (task);\n  322 | \n  323 |   error = NULL;\n  324 |   if (!goa_password_based_call_get_password_finish (passwd_based, &data->passwd, res, &error))\n  325 |     {\n  326 |       g_task_return_error (task, error);\n  327 |       g_object_unref (task);\n  328 |       return;\n  329 |     }\n  330 | \n  331 |   account = goa_object_peek_account (self->object);\n  332 |   files = goa_object_peek_files (self->object);\n  333 |   if (files == NULL)\n  334 |     {\n  335 |       g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED,\n  336 |                                _(\"Failed to get org.gnome.OnlineAccounts.Files for %s\"),\n  337 |                                goa_account_get_id (account));\n  338 |       g_object_unref (task);\n  339 |       return;\n  340 |     }","lines":22}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gvfs_udisks2_utils_lookup_fstab_options_value() uses strstr() to find the key substring anywhere in the options string (the comment acknowledges it ignores prefix). This means an option like 'x-gvfs-name=' embedded inside another option value (e.g. a path or a comment) can be falsely matched, and a key that is a substring of a longer key collides. For x-gvfs-show vs x-gvfs-shown-style hypothetical options this is a latent correctness bug; today it mostly works because keys end with '='.","fix":"Tokenize fstab options on ',' and compare each token's prefix against the key, rather than using a free strstr() over the whole string.","locations":[{"ref":"monitor/udisks2/gvfsudisks2utils.c:102-132","code":"  102 | gchar *\n  103 | gvfs_udisks2_utils_lookup_fstab_options_value (const gchar *fstab_options,\n  104 |                                                const gchar *key)\n  105 | {\n  106 |   gchar *ret = NULL;\n  107 | \n  108 |   if (fstab_options != NULL)\n  109 |     {\n  110 |       const gchar *start;\n  111 |       guint n;\n  112 | \n  113 |       /* The code doesn't care about prefix, which may cause problems for\n  114 |        * options like \"auto\" and \"noauto\". However, this function is only used\n  115 |        * with our \"x-gvfs-*\" options, where mentioned problems are unlikely.\n  116 |        * Be careful, that some people rely on this bug and use \"comment=x-gvfs-*\"\n  117 |        * as workaround, see: https://gitlab.gnome.org/GNOME/gvfs/issues/348\n  118 |        */\n  119 |       start = strstr (fstab_options, key);\n  120 |       if (start != NULL)\n  121 |         {\n  122 |           start += strlen (key);\n  123 |           for (n = 0; start[n] != ',' && start[n] != '\\0'; n++)\n  124 |             ;\n  125 |           if (n == 0)\n  126 |             ret = g_strdup (\"\");\n  127 |           else if (n >= 1)\n  128 |             ret = g_uri_unescape_segment (start, start + n, NULL);\n  129 |         }\n  130 |     }\n  131 |   return ret;\n  132 | }","lines":31}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"find_lonely_mount_for_mount_point() looks the mount up in monitor->mounts using g_unix_mount_point_get_mount_path(mount_point) as a plain string key. monitor->mounts uses the custom gvfs_mount_path_str_hash/equal (trailing-slash-insensitive) hashing, which is correct here, but the function name 'lonely' and the early g_object_unref(volume) with no other effect make the volume!=NULL branch a silent no-op that reads as dead/confusing. Not a correctness bug but the volume lookup result is discarded immediately.","fix":"Simplify: if a volume is already associated, return NULL directly; the intermediate g_object_unref with goto-less fallthrough obscures intent.","locations":[{"ref":"monitor/udisks2/gvfsudisks2volumemonitor.c:1359-1383","code":" 1359 | static GVfsUDisks2Mount *\n 1360 | find_lonely_mount_for_mount_point (GVfsUDisks2VolumeMonitor *monitor,\n 1361 |                                    GUnixMountPoint          *mount_point)\n 1362 | {\n 1363 |   GVfsUDisks2Mount *ret = NULL;\n 1364 |   GVfsUDisks2Mount *mount;\n 1365 | \n 1366 |   mount = g_hash_table_lookup (monitor->mounts, g_unix_mount_point_get_mount_path (mount_point));\n 1367 |   if (mount != NULL)\n 1368 |     {\n 1369 |       GVolume *volume = g_mount_get_volume (G_MOUNT (mount));\n 1370 |       if (volume != NULL)\n 1371 |         {\n 1372 |           g_object_unref (volume);\n 1373 |         }\n 1374 |       else\n 1375 |         {\n 1376 |           ret = mount;\n 1377 |           goto out;\n 1378 |         }\n 1379 |     }\n 1380 | \n 1381 |  out:\n 1382 |   return ret;\n 1383 | }","lines":25}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"get_vol_parms_cb() computes FILESYSTEM_USED as bytes_total - bytes_free using unsigned 64-bit values. If a server reports bytes_free > bytes_total (possible with quotas/over-provisioning), the subtraction underflows to a huge 'used' value reported to the UI.","fix":"Clamp: used = bytes_total > bytes_free ? bytes_total - bytes_free : 0.","locations":[{"ref":"daemon/gvfsafpvolume.c:270-273","code":"  270 |   if (vol_bitmap & AFP_VOLUME_BITMAP_EXT_BYTES_FREE_BIT &&\n  271 |       vol_bitmap & AFP_VOLUME_BITMAP_EXT_BYTES_TOTAL_BIT)\n  272 |     g_file_info_set_attribute_uint64 (info, G_FILE_ATTRIBUTE_FILESYSTEM_USED,\n  273 |                                       bytes_total - bytes_free);","lines":4}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"localtest inject_error() conflates success and error reporting: when no error is injected it calls\ng_vfs_job_succeeded(job) itself. Callers then sometimes also treat the return value as the success flag\n(e.g. do_enumerate sets res from it and only calls enumerate_done when res is TRUE). For operations where\nthe caller already needs to emit additional results, the helper succeeding the job inside the operation is\neasy to misuse and has caused the enumerate/append flows to be tightly coupled to inject_error's side\neffect. This is test-only code, but the design is a foot-gun.","fix":"Have inject_error only decide whether to fail; let each operation explicitly call g_vfs_job_succeeded on its own success path.","locations":[{"ref":"daemon/gvfsbackendlocaltest.c:91-108","code":"   91 | static gboolean     \n   92 | inject_error (GVfsBackend *backend,\n   93 | \t\t\t  GVfsJob *job,\n   94 | \t\t\t  GVfsJobType job_type)\n   95 | {\n   96 |   GVfsBackendLocalTest *op_backend = G_VFS_BACKEND_LOCALTEST (backend);\n   97 | \n   98 |   if ((op_backend->errorneous > 0) && ((random() % op_backend->errorneous) == 0) && \n   99 | \t  ((op_backend->inject_op_types < 1) || ((op_backend->inject_op_types & job_type) == job_type)))\n  100 |   {\n  101 | \t  g_print (\"(II) inject_error: BANG! injecting error... \\n\");\n  102 |       g_vfs_job_failed (G_VFS_JOB (job),\n  103 | \t\t\tG_IO_ERROR, G_IO_ERROR_FAILED,\n  104 | \t\t\t\"Injected error\");\n  105 |       return FALSE;\n  106 |   } else g_vfs_job_succeeded (job);\n  107 |   return TRUE;\n  108 | }","lines":18}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"The 'address' property is installed with g_object_class_install_property(gobject_class, PROP_DOMAIN, ...) instead of PROP_ADDRESS. PROP_DOMAIN was already installed earlier, so 'address' is registered under the wrong id (double-installing PROP_DOMAIN) and PROP_ADDRESS is never registered. As a result the get_property case PROP_ADDRESS is unreachable via a valid pspec and g_object_notify(resolver, \"address\") misbehaves/warns.","fix":"Change the property id at the address install call from PROP_DOMAIN to PROP_ADDRESS.","locations":[{"ref":"common/gvfsdnssdresolver.c:641-650","code":"  641 |   g_object_class_install_property (gobject_class,\n  642 |                                    PROP_DOMAIN,\n  643 |                                    g_param_spec_string (\"address\",\n  644 |                                                         \"Address\",\n  645 |                                                         \"Address\",\n  646 |                                                         NULL,\n  647 |                                                         G_PARAM_READABLE |\n  648 |                                                         G_PARAM_STATIC_NAME |\n  649 |                                                         G_PARAM_STATIC_BLURB |\n  650 |                                                         G_PARAM_STATIC_NICK));","lines":10}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"vfs_file_monitor_destroyed() iterates over file_monitor_proxies to find the dead\nmonitor, but on a match it removes the proxy from dir_monitor_proxies (the wrong\nlist) via g_list_remove. The result is that the destroyed file monitor proxy is\nnever removed from file_monitor_proxies (leaving a dangling MonitorProxy whose\nvfs_monitor has been finalized, so later monitors_emit_internal() dereferences a\nfreed GVfsMonitor -> use-after-free), while an unrelated entry may be dropped\nfrom dir_monitor_proxies. Compare with the correct vfs_dir_monitor_destroyed().","fix":"Remove from the correct list: `gphoto2_backend->file_monitor_proxies = g_list_remove (gphoto2_backend->file_monitor_proxies, proxy);`.","locations":[{"ref":"daemon/gvfsbackendgphoto2.c:3455-3465","code":" 3455 |   for (l = gphoto2_backend->file_monitor_proxies; l != NULL; l = l->next)\n 3456 |     {\n 3457 |       MonitorProxy *proxy = l->data;\n 3458 |       if (G_OBJECT (proxy->vfs_monitor) == where_the_object_was)\n 3459 |         {\n 3460 |           gphoto2_backend->dir_monitor_proxies = g_list_remove (gphoto2_backend->dir_monitor_proxies, proxy);\n 3461 |           g_debug (\"  Removed dead file monitor for '%s'\\n\", proxy->path);\n 3462 |           monitor_proxy_free (proxy);\n 3463 |           break;\n 3464 |         }\n 3465 |     }  ","lines":11}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"In copy_file(), after opening the destination file to_file, the error check incorrectly tests from_file again instead of to_file. If the destination open fails (to_file == NULL), the code falls through into the copy loop and passes a NULL SMBCFILE to smbc_write(), causing a write failure or crash and silently losing the backup/copy. The first check (line 1027) correctly tests from_file; the second (line 1033) is a copy-paste mistake that should test to_file.","fix":"Change the second check to 'if (to_file == NULL || g_vfs_job_is_cancelled (job))'.","locations":[{"ref":"daemon/gvfsbackendsmb.c:1030-1034","code":" 1030 |   to_file = smbc_open (backend->smb_context, to_uri,\n 1031 | \t\t       O_CREAT|O_WRONLY|O_TRUNC, 0666);\n 1032 |   \n 1033 |   if (from_file == NULL || g_vfs_job_is_cancelled (job))\n 1034 |     goto out;","lines":5}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"create_reply() for the StopMountable job completes the wrong D-Bus method: it calls gvfs_dbus_mount_complete_enumerate() instead of gvfs_dbus_mount_complete_stop_mountable(). It only works because both methods reply with an empty body; it is the wrong completion function for the invoked method and will break if signatures diverge.","fix":"Replace gvfs_dbus_mount_complete_enumerate(object, invocation) with gvfs_dbus_mount_complete_stop_mountable(object, invocation).","locations":[{"ref":"daemon/gvfsjobstopmountable.c:143-149","code":"  143 | static void\n  144 | create_reply (GVfsJob *job,\n  145 |               GVfsDBusMount *object,\n  146 |               GDBusMethodInvocation *invocation)\n  147 | {\n  148 |   gvfs_dbus_mount_complete_enumerate (object, invocation);\n  149 | }","lines":7}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"create_reply() completes the wrong D-Bus method: it calls gvfs_dbus_mount_complete_enumerate() instead of gvfs_dbus_mount_complete_unmount_mountable(). This file handles both UnmountMountable and EjectMountable. It happens to work on the wire only because all three methods (Enumerate, UnmountMountable, EjectMountable) have an empty reply signature, so the marshalled reply is accidentally compatible. It is still incorrect API use and a latent crash/marshalling-mismatch the moment any of these method signatures change.","fix":"Call gvfs_dbus_mount_complete_unmount_mountable(object, invocation) for the unmount case and gvfs_dbus_mount_complete_eject_mountable(object, invocation) for the eject case (the job knows op_job->eject), instead of gvfs_dbus_mount_complete_enumerate().","locations":[{"ref":"daemon/gvfsjobunmountmountable.c:216-221","code":"  216 | create_reply (GVfsJob *job,\n  217 |               GVfsDBusMount *object,\n  218 |               GDBusMethodInvocation *invocation)\n  219 | {\n  220 |   gvfs_dbus_mount_complete_enumerate (object, invocation);\n  221 | }","lines":6}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"drive_to_dbus() adds the drive's identifiers to identifiers_builder TWICE: once in the loop at lines 610-619 and again in an identical loop at lines 625-634. The second loop appears to be a mis-paste (it sits right after the expansion_builder is populated and re-uses the identifiers_builder). This produces an a{ss} dictionary with every key duplicated, which is malformed/wasteful for GVariant and is then parsed by the proxy side. The volume_to_dbus()/mount_to_dbus() equivalents only loop once.","fix":"Delete the second identifiers loop (lines 625-634); identifiers should be added to identifiers_builder exactly once.","locations":[{"ref":"monitor/proxy/gvfsproxyvolumemonitordaemon.c:609-634","code":"  609 |   identifiers_builder = g_variant_builder_new (G_VARIANT_TYPE (\"a{ss}\"));\n  610 |   for (n = 0; identifiers != NULL && identifiers[n] != NULL; n++)\n  611 |     {\n  612 |       char *id_value;\n  613 |       id_value = g_drive_get_identifier (drive, identifiers[n]);\n  614 | \n  615 |       g_variant_builder_add (identifiers_builder, \"{ss}\",\n  616 |                              identifiers[n],\n  617 |                              id_value);\n  618 |       g_free (id_value);\n  619 |     }\n  620 | \n  621 |   expansion_builder = g_variant_builder_new (G_VARIANT_TYPE_VARDICT);\n  622 |   g_variant_builder_add (expansion_builder, \"{sv}\", \"is-removable\", g_variant_new_boolean (is_removable));\n  623 |   /* left for future expansion without ABI breaks */\n  624 | \n  625 |   for (n = 0; identifiers != NULL && identifiers[n] != NULL; n++)\n  626 |     {\n  627 |       char *id_value;\n  628 |       id_value = g_drive_get_identifier (drive, identifiers[n]);\n  629 | \n  630 |       g_variant_builder_add (identifiers_builder, \"{ss}\",\n  631 |                              identifiers[n],\n  632 |                              id_value);\n  633 |       g_free (id_value);\n  634 |     }","lines":26}]},{"id":"CPY_7","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"unique_names_being_watched hash table is created with g_str_hash as the hash function but g_int_equal as the key-equal function. The keys are duplicated strings (g_strdup of the D-Bus unique name) and are looked up by string. g_int_equal compares the first sizeof(gint) bytes as integers, so two distinct bus names that share a 4-byte prefix (e.g. ':1.1' vs ':1.10') compare equal, and lookups/removals can match the wrong entry. Should be g_str_equal.","fix":"Use g_hash_table_new_full (g_str_hash, g_str_equal, g_free, NULL).","locations":[{"ref":"monitor/proxy/gvfsproxyvolumemonitordaemon.c:2062","code":" 2062 |   unique_names_being_watched = g_hash_table_new_full (g_str_hash, g_int_equal, g_free, NULL);","lines":1}]},{"id":"CPY_8","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In do_slow_file_rename_in_same_dir() the overwrite path calls\ngp_camera_file_delete() but ignores its return value, then checks `if (rc != 0)`\nwhich still holds the value from the previous gp_file_set_name() call (which was\n0, since we reached this code). The delete failure is therefore never detected,\nand the subsequent error message/handling is keyed on a stale rc. This is a\nclassic copy-paste mistake: the call result was meant to be assigned to rc.","fix":"Assign the result: `rc = gp_camera_file_delete (...);` before checking `if (rc != 0)`.","locations":[{"ref":"daemon/gvfsbackendgphoto2.c:2316-2327","code":" 2316 |   if (allow_overwrite)\n 2317 |     {\n 2318 |       gp_camera_file_delete (gphoto2_backend->camera,\n 2319 |                              dir,\n 2320 |                              new_name,\n 2321 |                              gphoto2_backend->context);\n 2322 |       if (rc != 0)\n 2323 |         {\n 2324 |           g_debug (\"  file delete failed as part of slow rename rc=%d\\n\", rc);\n 2325 |           goto out;\n 2326 |         }\n 2327 |     }","lines":12}]},{"id":"CPY_9","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In mount_mountable_async_cb the diagnostic uses _(\"Invalid return value from %s\") with the literal \"call\" as the argument (a template leftover) rather than the actual method name, producing the unhelpful message \"Invalid return value from call\".","fix":"Pass the real method name, e.g. \"MountMountable\".","locations":[{"ref":"client/gdaemonfile.c:1372-1373","code":" 1372 |           g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED,\n 1373 |                                    _(\"Invalid return value from %s\"), \"call\");","lines":2}]},{"id":"CPY_10","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"ask_question_reply and show_processes_reply re-fetch op_dbus via g_object_get_data(op, \"dbus-op\"), overwriting the 'data' parameter, while ask_password_reply trusts the passed 'data' directly. Since both resolve to the same pointer this is harmless, but the inconsistency is a copy-paste smell.","fix":"Make all three reply callbacks consistent (drop the redundant re-fetch).","locations":[{"ref":"common/gmountoperationdbus.c:120-143","code":"  120 | static void\n  121 | ask_question_reply (GMountOperation *op,\n  122 | \t\t    GMountOperationResult result,\n  123 | \t\t    gpointer data)\n  124 | {\n  125 |   GMountOperationDBus *op_dbus = data;\n  126 |   guint32 choice;\n  127 |   gboolean handled, abort_dbus;\n  128 | \n  129 |   op_dbus = g_object_get_data (G_OBJECT (op), \"dbus-op\");\n  130 | \n  131 |   handled = (result != G_MOUNT_OPERATION_UNHANDLED);\n  132 |   abort_dbus = (result == G_MOUNT_OPERATION_ABORTED);\n  133 |   \n  134 |   choice = g_mount_operation_get_choice (op);\n  135 | \n  136 |   gvfs_dbus_mount_operation_complete_ask_question (op_dbus->object,\n  137 |                                                    op_dbus->invocation,\n  138 |
