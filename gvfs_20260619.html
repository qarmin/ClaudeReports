<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":false,"description":"read_reply() reads the DATA count from the server-controlled reply (count = read_uint32) and then does g_input_stream_read_all() of that many bytes directly into G_VFS_JOB_READ(job)->buffer, which is only bytes_requested bytes large. A malicious or buggy SFTP server can return a SSH_FXP_DATA payload with count larger than the requested size, causing a heap buffer overflow write in the gvfs daemon. count is never validated against bytes_requested.","fix":"Clamp/validate count: read it, and if it exceeds the originally requested size (passed via user_data or stored on the handle) fail with G_IO_ERROR_FAILED. Never read more than the caller's buffer can hold.","locations":[{"ref":"daemon/gvfsbackendsftp.c:2864-2873","code":" 2864 |   count = g_data_input_stream_read_uint32 (reply, NULL, NULL);\n 2865 | \n 2866 |   if (!g_input_stream_read_all (G_INPUT_STREAM (reply),\n 2867 |                                 G_VFS_JOB_READ (job)->buffer, count,\n 2868 |                                 NULL, NULL, NULL))\n 2869 |     {\n 2870 |       g_vfs_job_failed (job, G_IO_ERROR, G_IO_ERROR_FAILED,\n 2871 |                         _(\"Invalid reply received\"));\n 2872 |       return;\n 2873 |     }","lines":10}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In trigger_async_done the list split does 'rest->prev->next = NULL; rest->prev = NULL;' after rest = g_list_nth(l, daemon->async_requested_files). When async_requested_files == 0, g_list_nth(l, 0) returns the head node l itself, whose prev is NULL, so rest->prev->next dereferences NULL and crashes. async_requested_files is taken directly from the num_files argument of next_files_async with no lower-bound validation, and next_files_async(enum, 0, ...) is a legal GFileEnumerator call.","fix":"Guard the split with rest && rest->prev; for num_files == 0 return an empty list without splitting daemon->infos.","locations":[{"ref":"client/gdaemonfileenumerator.c:443-453","code":"  443 |   if (ok)\n  444 |     {\n  445 |       l = daemon->infos;\n  446 |       rest = g_list_nth (l, daemon->async_requested_files);\n  447 |       if (rest)\n  448 | \t{\n  449 | \t  /* Split list */\n  450 | \t  rest->prev->next = NULL;\n  451 | \t  rest->prev = NULL;\n  452 | \t}\n  453 |       daemon->infos = rest;","lines":11}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"dispatch_reply() handles a DSI_ATTENTION packet by reading priv->reply_buf[0]. If the server sends an attention DSI packet with totalDataLength == 0, read_dsi_header_cb() never allocates reply_buf (it stays NULL) and dispatch_reply() is called directly, so reply_buf[0] dereferences a NULL pointer and crashes the daemon. The attention code is fully attacker-controlled network input.","fix":"In the DSI_ATTENTION case, verify priv->reply_buf != NULL (and that at least 1 byte was received, i.e. totalDataLength >= 1) before reading reply_buf[0]; otherwise ignore the attention packet.","locations":[{"ref":"daemon/gvfsafpconnection.c:1001-1009","code":" 1001 |     case DSI_ATTENTION:\n 1002 |     {\n 1003 |       guint8 attention_code;\n 1004 | \n 1005 |       attention_code = priv->reply_buf[0] >> 4;\n 1006 | \n 1007 |       g_signal_emit (afp_connection, signals[ATTENTION], 0, attention_code);\n 1008 |       break;\n 1009 |     }","lines":9},{"ref":"daemon/gvfsafpconnection.c:1119-1144","code":" 1119 |   if (dsi_header->totalDataLength > 0)\n 1120 |   {\n 1121 |     RequestData *req_data;\n 1122 | \n 1123 |     req_data = g_hash_table_lookup (priv->request_hash,\n 1124 |                                     GUINT_TO_POINTER ((guint)dsi_header->requestID));\n 1125 |     if (req_data && req_data->reply_buf)\n 1126 |     {\n 1127 |         priv->reply_buf = req_data->reply_buf;\n 1128 |         priv->free_reply_buf = FALSE;\n 1129 |     }\n 1130 |     else\n 1131 |     {\n 1132 |       priv->reply_buf = g_malloc (dsi_header->totalDataLength);\n 1133 |       priv->free_reply_buf = TRUE;\n 1134 |     }\n 1135 |     \n 1136 |     read_all_async (input, priv->reply_buf, dsi_header->totalDataLength,\n 1137 |                     0, priv->read_cancellable, read_data_cb, afp_conn);\n 1138 |     \n 1139 |     return;\n 1140 |   }\n 1141 | \n 1142 |   dispatch_reply (afp_conn);\n 1143 |   read_reply (afp_conn);\n 1144 | }","lines":26}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"NULL dereference in the privileged admin helper at startup. g_vfs_backend_admin_pre_setup() calls\ng_setenv(\"DBUS_SESSION_BUS_ADDRESS\", session_address, TRUE) where session_address is the value of the\noptional --address command-line option (default NULL). If the helper is launched without --address,\nsession_address is NULL and g_setenv() is called with a NULL value, which triggers a glib assertion /\ncrash. This is the entry path of the root helper.","fix":"Validate session_address (and ideally runtime_dir) is non-NULL after option parsing; g_error/exit with a clear message if missing, before calling g_setenv.","locations":[{"ref":"daemon/gvfsbackendadmin.c:1105-1147","code":" 1105 | static char *session_address = NULL;\n 1106 | static char *runtime_dir = NULL;\n 1107 | static GOptionEntry entries[] = {\n 1108 |   { \"address\", 0, 0, G_OPTION_ARG_STRING, &session_address, \"DBus session address\", NULL },\n 1109 |   { \"dir\", 0, 0, G_OPTION_ARG_STRING, &runtime_dir, \"Runtime dir\", NULL },\n 1110 |   { NULL }\n 1111 | };\n 1112 | \n 1113 | void\n 1114 | g_vfs_backend_admin_pre_setup (int *argc,\n 1115 |                                char **argv[])\n 1116 | {\n 1117 |   const char *pkexec_uid;\n 1118 |   uid_t uid;\n 1119 |   GError *error = NULL;\n 1120 |   GOptionContext *context;\n 1121 | \n 1122 |   context = g_option_context_new (NULL);\n 1123 |   g_option_context_set_ignore_unknown_options (context, TRUE);\n 1124 |   g_option_context_add_main_entries (context, entries, GETTEXT_PACKAGE);\n 1125 |   g_option_context_parse (context, argc, argv, &error);\n 1126 |   g_option_context_free (context);\n 1127 |   if (error != NULL)\n 1128 |     {\n 1129 |       g_printerr (\"Can't parse arguments: %s\", error->message);\n 1130 |       g_error_free (error);\n 1131 |       exit (1);\n 1132 |     }\n 1133 | \n 1134 |   pkexec_uid = g_getenv (\"PKEXEC_UID\");\n 1135 |   if (pkexec_uid == NULL)\n 1136 |     {\n 1137 |       g_printerr (\"gvfsd-admin must be executed under pkexec\\n\");\n 1138 |       exit (1);\n 1139 |     }\n 1140 | \n 1141 |   errno = 0;\n 1142 |   uid = strtol (pkexec_uid, NULL, 10);\n 1143 |   if (errno != 0)\n 1144 |     g_error (\"Unable to convert PKEXEC_UID string to uid_t\");\n 1145 | \n 1146 |   acquire_caps (uid);\n 1147 |   g_setenv (\"DBUS_SESSION_BUS_ADDRESS\", session_address, TRUE);","lines":43}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"g_vfs_backend_file_handle_new() looks up the AppInfo for `app` in self->apps and\nthen immediately does `info->num_users++` with no NULL check. The callers\n(open_for_read, create, append_to, replace) verify the app's info before opening\nthe file, but between that lookup and this call the apps hash can be mutated by\nthe HouseArrest GC (g_vfs_backend_gc_house_arrest) / a concurrent enumerate that\nreloads apps; if info is NULL here it is an unguarded NULL deref. Even absent a\nrace, this function asserts nothing while g_vfs_backend_file_handle_free() does\ng_assert(info->num_users != 0) - inconsistent and crash-prone.","fix":"NULL-check info before incrementing num_users (and have the caller propagate failure), mirroring the assert in file_handle_free.","locations":[{"ref":"daemon/gvfsbackendafc.c:872-880","code":"  872 | \n  873 |   g_mutex_lock (&self->apps_lock);\n  874 |   info = g_hash_table_lookup (self->apps, app);\n  875 |   info->num_users++;\n  876 |   g_mutex_unlock (&self->apps_lock);\n  877 | \n  878 |   handle->app = g_strdup (app);\n  879 | \n  880 |   return handle;","lines":9}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"Remotely-triggerable NULL dereference parsing a PROPFIND multistatus response. text = node_get_content(node) returns NULL for an element with no children or whose first child is a non-text node (e.g. <getcontenttype><x/><\/getcontenttype>). The node_is_empty() guard does not catch this case (it returns FALSE for an element that has children). The getcontenttype branch then does mime_type = g_strdup(text) (NULL) and immediately strchr(mime_type, ';'), dereferencing NULL. getcontentlength also calls g_ascii_strtoll(text, ...) with text possibly NULL. A malicious or broken WebDAV server controls this XML.","fix":"Skip the node when text == NULL (or guard each text-consuming branch with an explicit NULL check). Only resourcetype legitimately needs no text content.","locations":[{"ref":"daemon/gvfsbackenddav.c:1126-1174","code":" 1126 |           text = node_get_content (node);\n 1127 | \n 1128 |           if (node_has_name (node, \"resourcetype\"))\n 1129 |             {\n 1130 |               file_type = parse_resourcetype (node);\n 1131 |             }\n 1132 |           else if (node_has_name (node, \"displayname\") && text)\n 1133 |             {\n 1134 |               g_file_info_set_display_name (info, text);\n 1135 |               have_display_name = TRUE;\n 1136 |             }\n 1137 |           else if (node_has_name (node, \"getetag\"))\n 1138 |             {\n 1139 |               g_file_info_set_attribute_string (info, G_FILE_ATTRIBUTE_ETAG_VALUE,\n 1140 |                                                 text);\n 1141 |             }\n 1142 |           else if (node_has_name (node, \"creationdate\"))\n 1143 |             {\n 1144 |               GDateTime *dt;\n 1145 | \n 1146 |               if ((dt = g_date_time_new_from_iso8601 (text, NULL)) == NULL)\n 1147 |                 continue;\n 1148 | \n 1149 |               g_file_info_set_attribute_uint64 (info,\n 1150 |                                                 G_FILE_ATTRIBUTE_TIME_CREATED,\n 1151 |                                                 g_date_time_to_unix (dt));\n 1152 |               g_date_time_unref (dt);\n 1153 |             }\n 1154 |           else if (node_has_name (node, \"getcontenttype\"))\n 1155 |             {\n 1156 |               char *ptr;\n 1157 | \n 1158 |               mime_type = g_strdup (text);\n 1159 | \n 1160 |               /* Ignore parameters of the content type */\n 1161 |               ptr = strchr (mime_type, ';');\n 1162 |               if (ptr)\n 1163 |                 {\n 1164 |                   do\n 1165 |                     *ptr-- = '\\0';\n 1166 |                   while (ptr >= mime_type && g_ascii_isspace (*ptr));\n 1167 |                 }\n 1168 |             }\n 1169 |           else if (node_has_name (node, \"getcontentlength\"))\n 1170 |             {\n 1171 |               gint64 size;\n 1172 |               size = g_ascii_strtoll (text, NULL, 10);\n 1173 |               g_file_info_set_size (info, size);\n 1174 |             }","lines":49},{"ref":"daemon/gvfsbackenddav.c:686-715","code":"  686 | static const char *\n  687 | node_get_content (xmlNodePtr node)\n  688 | {\n  689 |     if (node == NULL)\n  690 |       return NULL;\n  691 | \n  692 |     switch (node->type)\n  693 |       {\n  694 |         case XML_ELEMENT_NODE:\n  695 |           return node_get_content (node->children);\n  696 |           break;\n  697 |         case XML_TEXT_NODE:\n  698 |           return (const char *) node->content;\n  699 |           break;\n  700 |         default:\n  701 |           return NULL;\n  702 |       }\n  703 | }\n  704 | \n  705 | static gboolean\n  706 | node_is_empty (xmlNodePtr node)\n  707 | {\n  708 |   if (node == NULL)\n  709 |     return TRUE;\n  710 | \n  711 |   if (node->type == XML_TEXT_NODE)\n  712 |     return node->content == NULL || node->content[0] == '\\0';\n  713 | \n  714 |   return node->children == NULL;\n  715 | }","lines":30}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"do_pull(): g_file_query_info() is called and on the very next lines `error` is\ndereferenced unconditionally: `dest_exists = local_info || error->code != ...`\nand `if (!local_info && error->code != ...)`. When the query SUCCEEDS,\nlocal_info is non-NULL and error is NULL, so `error->code` is a NULL-pointer\ndereference. C short-circuit evaluation does NOT save this: in the first\nexpression `||` evaluates `error->code` only when local_info is NULL, but the\nsecond `if` evaluates `error->code` whenever local_info is NULL too - however the\nreal crash is the common success case where local_info != NULL: `local_info ||\nerror->code` short-circuits, but `dest_is_dir`/later logic is fine; the genuine\nhazard is that error may be NULL while local_info is NULL is impossible, yet the\ncode reads error->code in the first clause's right operand path. Net: reading\nerror->code while error can be NULL is undefined; relying on g_file_query_info\nto always set error on failure AND assuming error stays valid on success.","fix":"Test `error != NULL` before reading error->code, e.g. `dest_exists = (local_info != NULL) || (error != NULL && error->code != G_IO_ERROR_NOT_FOUND);` and clear error appropriately.","locations":[{"ref":"daemon/gvfsbackendmtp.c:1845-1856","code":" 1845 |   GError *error = NULL;\n 1846 |   local_info =\n 1847 |     g_file_query_info (local_file, G_FILE_ATTRIBUTE_STANDARD_TYPE,\n 1848 |                        0, G_VFS_JOB (job)->cancellable, &error);\n 1849 |   gboolean dest_exists = local_info || error->code != G_IO_ERROR_NOT_FOUND;\n 1850 |   if (!local_info && error->code != G_IO_ERROR_NOT_FOUND) {\n 1851 |     g_vfs_j de":"  686 | static const char *\n  687 | node_get_content (xmlNodePtr node)\n  688 | {\n  689 |     if (node == NULL)\n  690 |       return NULL;\n  691 | \n  692 |     switch (node->type)\n  693 |       {\n  694 |         case XML_ELEMENT_NODE:\n  695 |           return node_get_content (node->children);\n  696 |           break;\n  697 |         case XML_TEXT_NODE:\n  698 |           return (const char *) node->content;\n  699 |           break;\n  700 |         default:\n  701 |           return NULL;\n  702 |       }\n  703 | }","lines":18}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In build_file_info(), for a native Google file the ALTERNATE link is looked up and immediately dereferenced: uri = gdata_link_get_uri(alternate) without checking alternate != NULL. gdata_entry_look_up_link() returns NULL when the link is absent; a native entry from the server that lacks an alternate link causes a NULL dereference.","fix":"Check alternate != NULL before calling gdata_link_get_uri(), and skip setting the target URI when absent.","locations":[{"ref":"daemon/gvfsbackendgoogle.c:1387-1393","code":" 1387 |           GDataLink *alternate;\n 1388 |           const gchar *uri;\n 1389 | \n 1390 |           file_type = G_FILE_TYPE_SHORTCUT;\n 1391 |           alternate = gdata_entry_look_up_link (entry, GDATA_LINK_ALTERNATE);\n 1392 |           uri = gdata_link_get_uri (alternate);\n 1393 |           g_file_info_set_attribute_string (info, G_FILE_ATTRIBUTE_STANDARD_TARGET_URI, uri);","lines":7}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"fail_job(): when the libmtp error stack is non-empty, the code does\n`text = g_strrstr (error->error_text, \":\") + 1;`. g_strrstr returns NULL when\nthe substring is absent; NULL + 1 yields an invalid pointer (0x1) which is then\npassed to g_vfs_job_failed() as a printf %s argument -> crash. error->error_text\nmay also be NUL ode":"  863 |   else if (strstr (buffer, \"Key fingerprint:\") != NULL)\n  864 |     {\n  865 |       /* SSH.com*/\n  866 |       startpos = strstr (buffer, \"Key fingerprint:\");\n  867 |       if (startpos == NULL)\n  868 |         {\n  869 |           g_free (hostname);\n  870 |           return FALSE;\n  871 |         }\n  872 |       \n  873 |       startpos = startpos + 18;\n  874 |       endpos = strchr (startpos, '\\r');\n  875 |       fingerprint = g_strndup (startpos, endpos - startpos);\n  876 |     }","lines":14}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"do_enumerate() walks the smbc_getdents() buffer advancing by dirp->dirlen with no validation. A dirlen of 0 causes an infinite loop (pointer never advances, res never decremented); an oversized dirlen steps the pointer past the dirents buffer leading to out-of-bounds reads. Same unvalidated-network-data pattern as in the browse backend.","fix":"Bounds-check dirp->dirlen against the remaining res before advancing; break if dirlen == 0 or dirlen > res.","locations":[{"ref":"daemon/gvfsbackendsmb.c:1896-1937","code":" 1896 |       while (res > 0)\n 1897 | \t{\n 1898 | \t  unsigned int dirlen;\n 1899 | \n 1900 | \t  /* TODO: Only do stat if required for flags */\n 1901 | \t  \n 1902 | \t  if ((dirp->smbc_type == SMBC_DIR ||\n 1903 | \t       dirp->smbc_type == SMBC_FILE ||\n 1904 | \t       dirp->smbc_type == SMBC_LINK) &&\n 1905 | \t      strcmp (dirp->name, \".\") != 0 &&\n 1906 | \t      strcmp (dirp->name, \"..\") != 0)\n 1907 | \t    {\n 1908 | \t      int stat_res;\n 1909 | \t      g_string_truncate (uri, uri_start_len);\n 1910 |               g_string_append_uri_escaped (uri, dirp->name, SUB_DELIM_CHARS \":@/\", FALSE);\n 1911 | \n 1912 | \t      if (matcher == NULL ||\n 1913 | \t\t  g_file_attribute_matcher_matches_only (matcher, G_FILE_ATTRIBUTE_STANDARD_NAME))\n 1914 | \t\t{\n 1915 | \t\t  info = g_file_info_new ();\n 1916 | \t\t  g_file_             g_free (basename);\n 2041 |                     }\n 2042 | #endif\n 2043 | \n 2044 |                   activation_root = g_file_new_for_uri (uri);","lines":20}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":false,"description":"Author-acknowledged race (comment lines 435-441) in the async next_files completion path. trigger_async_done can be entered from async_changed/async_timeout (main thread) and async_cancelled concurrently; the infos lock serializes each entry but there is no idempotency flag, so two entrants can both run the body - splitting/freeing the infos list twice and calling g_object_unref(task) twice (double-unref / use-after-free).","fix":"Add a per-request 'completed' boolean on the enumerator, checked and set under the already-held infos lock at the top of trigger_async_done; make the second entrant a no-op, and reset it when a new request starts in next_files_async.","locations":[{"ref":"client/gdaemonfileenumerator.c:405-471","code":"  405 | static void\n  406 | trigger_async_done (GTask *task, gboolean ok)\n  407 | {\n  408 |   GDaemonFileEnumerator *daemon = G_DAEMON_FILE_ENUMERATOR (g_task_get_source_object (task));\n  409 |   GList *rest, *l = NULL;\n  410 | \n  411 |   if (daemon->cancelled_tag != 0)\n  412 |     {\n  413 |       GCancellable *cancellable = g_task_get_cancellable (task);\n  414 | \n  415 |       /* If ok, we're a normal callback on the main thread,\n  416 | \t ensure protection against a thread cancelling and\n  417 | \t running the callback again.\n  418 | \t If !ok then we're in a callback which may be\n  419 | \t from another thread, but we're guaranteed that\n  420 | \t cancellation will only happen once. However\n  421 | \t we can't use g_cancellable_disconnect, as this\n  422 | \t deadlocks if we call it from within the signal\n  423 | \t handler.\n  424 |       */\n  425 |       if (ok)\n  426 | \tg_cancellable_disconnect (cancellable,\n  427 | \t\t\t\t  daemon->cancelled_tag);\n  428 |       else\n  429 | \tg_signal_handler_disconnect (cancellable,\n  430 | \t\t\t\t     daemon->cancelled_tag);\n  431 |     }\n  432 | \n  433 |   /* cancelled signal handler won't execute after this */\n  434 | \n  435 |   /* TODO: There is actually a small race here, where\n  436 |      trigger_async_done could happen twice if the operation\n  437 |      succeeds for some other reason and cancellation happens\n  438 |      on some other thread right before the above call.\n  439 |      However, this can only happen if cancellation happens\n  440 |      outside the main thread which is kinda unusual for async\n  441 |      ops. However, it would be nice to handle this too. */\n  442 | \n  443 |   if (ok)\n  444 |     {\n  445 |       l = daemon->infos;\n  446 |       rest = g_list_nth (l, daemon->async_requested_files);\n  447 |       if (rest)\n  448 | \t{\n  449 | \t  /* Split list */\n  450 | \t  rest->prev->next = NULL;\n  451 | \t  rest->prev = NULL;\n  452 | \t}\n  453 |       daemon->infos = rest;\n  454 | \n  455 |       g_list_foreach (l, (GFunc)add_metadata, daemon);\n  456 |     }\n  457 | \n  458 |   /* Result has to be returned in idle in order to avoid deadlock */\n  459 |   _g_task_return_pointer_idle (task, l, (GDestroyNotify) free_info_list);\n  460 | \n  461 |   g_signal_handlers_disconnect_by_data (daemon, task);\n  462 |   daemon->cancelled_tag = 0;\n  463 | \n  464 |   if (daemon->timeout_tag != 0)\n  465 |     g_source_remove (daemon->timeout_tag);\n  466 |   daemon->timeout_tag = 0;\n  467 |   \n  468 |   daemon->async_requested_files = 0;\n  469 | \n  470 |   g_object_unref (task);\n  471 | }","lines":67},{"ref":"client/gdaemonfileenumerator.c:575-591","code":"  575 | static void\n  576 | async_cancelled (GCancellable *cancellable,\n  577 |                  GTask *task)\n  578 | {\n  579 |   G_LOCK (infos);\n  580 |   trigger_async_done (task, FALSE);\n  581 |   G_UNLOCK (infos);\n  582 | }\n  583 | \n  584 | static gboolean\n  585 | async_timeout (GTask *task)\n  586 | {\n  587 |   G_LOCK (infos);\n  588 |   trigger_async_done (task, TRUE);\n  589 |   G_UNLOCK (infos);\n  590 |   return FALSE;\n  591 | }","lines":17}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":true,"description":"Double unref of 'item' on the rename error path in set_display_name(). item is g_object_ref()'d at line 1669 and unref'd at line 1673 (balancing that ref). On the error branch it is unref'd AGAIN at line 1678, over-releasing a reference and dropping the object below its true refcount, leading to premature finalization / use-after-free of a cached MsgDriveItem.","fix":"Remove the extra g_object_unref (item) at line 1678; the ref taken at 1669 is already balanced by the unref at 1673.","locations":[{"ref":"daemon/gvfsbackendonedrive.c:1669-1680","code":" 1669 |   g_object_ref (item);\n 1670 |   remove_item (self, parent, item);\n 1671 | \n 1672 |   new_item = msg_drive_service_rename (self->service, item, display_name, cancellable, &error);\n 1673 |   g_object_unref (item);\n 1674 |   if (error != NULL)\n 1675 |     {\n 1676 |       g_vfs_job_failed_from_error (G_VFS_JOB (job), error);\n 1677 |       g_error_free (error);\n 1678 |       g_object_unref (item);\n 1679 |       goto out;\n 1680 |     }","lines":12}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":false,"description":"In g_vfs_afc_volume_mount() the activation root GFile is obtained via g_object_get_data() (a borrowed reference, no ref taken) and stored in data->root (line 347). The completion callback mount_callback() then calls g_object_unref(data->root) (afcvolume.c:321), releasing a reference the op never owned. This over-unrefs the GFile that is owned by the volume's 'root' object-data, leading to premature destruction / use-after-free of that GFile. The analogous gphoto2/mtp code does not unref the root at all.","fix":"Either take g_object_ref(root) when assigning data->root, or remove the g_object_unref(data->root) from mount_callback() (matching gphoto2/mtp, which store no root in the op data).","locations":[{"ref":"monitor/afc/afcvolume.c:341-355","code":"  341 |   root = g_object_get_data (G_OBJECT (volume), \"root\");\n  342 | \n  343 |   data = g_new0 (ActivationMountOp, 1);\n  344 |   data->enclosing_volume = afc_volume;\n  345 |   data->callback = callback;\n  346 |   data->user_data = user_data;\n  347 |   data->root = root;\n  348 | \n  349 |   g_file_mount_enclosing_volume (root,\n  350 |                                  0,\n  351 |                                  mount_operation,\n  352 |                                  cancellable,\n  353 |                                  mount_callback,\n  354 |                                  data);\n  355 | }","lines":15},{"ref":"monitor/afc/afcvolume.c:314-323","code":"  314 | static void\n  315 | mount_callback (GObject *source_object,\n  316 |                 GAsyncResult *res,\n  317 |                 gpointer user_data)\n  318 | {\n  319 |   ActivationMountOp *data = user_data;\n  320 |   data->callback (G_OBJECT (data->enclosing_volume), res, data->user_data);\n  321 |   g_object_unref (data->root);\n  322 |   g_free (data);\n  323 | }","lines":10}]},{"id":"UAF_4","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":false,"description":"_udisks_client_get_device_for_part() returns a const string from udisks_block_get_device(block), but that string is owned by the UDisksBlock which lives in the `objects` list. The function then frees the whole list with g_list_free_full(objects, g_object_unref), destroying the block and the string before returning the now-dangling pointer. Callers (find_volume_for_device, mount_point_has_device) immediately stat() this pointer, reading freed memory. This is triggered by any fstab/mount entry using PARTLABEL= or PARTUUID= device specifications.","fix":"Return a g_strdup()'d copy of the device path (and have callers free it), or restructure so the block stays alive while the device string is used.","locations":[{"ref":"monitor/udisks2/gvfsudisks2volumemonitor.c:1387-1416","code":" 1387 | static const char *\n 1388 | _udisks_client_get_device_for_part (UDisksClient *client, const char *label, const char *uuid)\n 1389 | {\n 1390 |   GList *objects;\n 1391 |   const char *device = NULL;\n 1392 |   GList *l;\n 1393 | \n 1394 |   objects = g_dbus_object_manager_get_objects (udisks_client_get_object_manager (client));\n 1395 |   for (l = objects; l != NULL; l = l->next)\n 1396 |     {\n 1397 |       UDisksPartition *partition;\n 1398 |       UDisksBlock *block;\n 1399 | \n 1400 |       partition = udisks_object_peek_partition (UDISKS_OBJECT (l->data));\n 1401 |       block = udisks_object_peek_block (UDISKS_OBJECT (l->data));\n 1402 |       if (partition == NULL || block == NULL)\n 1403 |         continue;\n 1404 | \n 1405 |       if ((label != NULL && g_strcmp0 (udisks_partition_get_name (partition), label) == 0) ||\n 1406 |           (uuid != NULL && g_strcmp0 (udisks_partition_get_uuid (partition), uuid) == 0))\n 1407 |         {\n 1408 |           device = udisks_block_get_device (block);\n 1409 |           break;\n 1410 |         }\n 1411 |     }\n 1412 | \n 1413 |   g_list_free_full (objects, g_object_unref);\n 1414 | \n 1415 |   return device;\n 1416 | }","lines":30}]},{"id":"UAF_5","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"g_vfs_backend_afc_mount(): the pretty-name branch passes the result of\ng_strdup_printf() directly as the display_name argument to\ng_vfs_backend_set_display_name() for the jailbreak/apps cases (lines 496, 503).\ng_vfs_backend_set_display_name() does NOT take ownership (it dups internally),\nso these g_strdup_printf allocations are leaked. (The plain AFC case at 489\ncorrectly passes the existing display_name which is freed later.)","fix":"Store the g_strdup_printf result in a temporary, pass it, then g_free it.","locations":[{"ref":"daemon/gvfsbackendafc.c:491-504","code":"  491 |             case VIRTUAL_PORT_AFC_JAILBROKEN:\n  492 |               g_vfs_backend_set_display_name (G_VFS_BACKEND(self),\n  493 |               /* translators:\n  494 |                * This is the device name, with the service being browsed in brackets, eg.:\n  495 |                * Alan Smithee's iPhone (jailbreak) */\n  496 |                                               g_strdup_printf (_(\"%s (jailbreak)\"), display_name));\n  497 |               break;\n  498 |             case VIRTUAL_PORT_APPS:\n  499 |               g_vfs_backend_set_display_name (G_VFS_BACKEND(self),\n  500 |               /* translators:\n  501 |                * This is \"Documents on foo\" where foo is the device name, eg.:\n  502 |                * Documents on Alan Smithee's iPhone */\n  503 |                                               g_strdup_printf (_(\"Documents on %s\"), display_name));\n  504 |               break;","lines":14}]},{"id":"UAF_6","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"close_replace_exchange_files_cb() passes job->handle as user_data to close_replace_close_fork_cb (which calls afp_handle_free), and in parallel passes 'job' to close_replace_get_filedir_parms_cb. Both async callbacks reference the same AfpHandle/job; once close_replace_close_fork_cb frees the AfpHandle, the still-outstanding get_filedir_parms request and its callback operate on a job whose handle has been freed. If the ETAG callback (close_replace_get_filedir_parms_cb) runs after the close-fork chain freed the handle, any later access to job->handle is a use-after-free.","fix":"Serialize the two operations (only start the ETAG query after the fork is closed and the handle is no longer needed), or ensure the handle is freed exactly once after both async chains complete.","locations":[{"ref":"daemon/gvfsbackendafp.c:949-975","code":"  949 | close_replace_exchange_files_cb (GObject *source_object, GAsyncResult *res, gpointer user_data)\n  950 | {\n  951 |   GVfsAfpVolume *volume = G_VFS_AFP_VOLUME (source_object);\n  952 |   GVfsJobCloseWrite *job = G_VFS_JOB_CLOSE_WRITE (user_data);\n  953 |   AfpHandle *afp_handle = (AfpHandle *)job->handle;\n  954 | \n  955 |   GError *err = NULL;\n  956 | \n  957 |   if (!g_vfs_afp_volume_exchange_files_finish (volume, res, &err))\n  958 |   {\n  959 |     g_vfs_job_failed_from_error (G_VFS_JOB (job), err);\n  960 |     g_error_free (err);\n  961 |     afp_handle_free (afp_handle);\n  962 |     return;\n  963 |   }\n  964 | \n  965 |   /* Close fork and remove/rename the temporary file even if the exchange failed */\n  966 |   g_vfs_afp_volume_close_fork (volume, afp_handle->fork_refnum,\n  967 |                                G_VFS_JOB (job)->cancellable,\n  968 |                                close_replace_close_fork_cb, job->handle);\n  969 |   \n  970 |   /* Get ETAG */\n  971 |   g_vfs_afp_volume_get_filedir_parms (volume, afp_handle->filename,\n  972 |                                       AFP_FILE_BITMAP_MOD_DATE_BIT, 0,\n  973 |                                       G_VFS_JOB (job)->cancellable,\n  974 |                                       close_replace_get_filedir_parms_cb, job);\n  975 | }","lines":27},{"ref":"daemon/gvfsbackendafp.c:907-946","code":"  907 | static void\n  908 | close_replace_delete_backup_cb (GObject *source_object, GAsyncResult *res, gpointer user_data)\n  909 | {\n  910 |   GVfsAfpVolume *volume = G_VFS_AFP_VOLUME (source_object);\n  911 |   AfpHandle *afp_handle = (AfpHandle *)user_data;\n  912 | \n  913 |   char *backup_name;\n  914 | \n  915 |   /* We ignore all errors and just try to rename the temporary file anyway */\n  916 |   backup_name = g_strconcat (afp_handle->filename, \"~\", NULL);\n  917 | \n  918 |   g_vfs_afp_volume_move_and_rename (volume, afp_handle->tmp_filename, backup_name,\n  919 |                                     NULL, NULL, NULL);\n  920 |   afp_handle_free (afp_handle);\n  921 | }\n  922 | \n  923 | static void\n  924 | close_replace_close_fork_cb (GObject *source_object, GAsyncResult *res, gpointer user_data)\n  925 | {\n  926 |   GVfsAfpVolume *volume = G_VFS_AFP_VOLUME (source_object);\n  927 |   AfpHandle *afp_handle = (AfpHandle *)user_data;\n  928 | \n  929 |   if (afp_handle->make_backup)\n  930 |   {\n  931 |     char *backup_name = g_strconcat (afp_handle->filename, \"~\", NULL);\n  932 |     \n  933 |     /* Delete old backup */\n  934 |     g_vfs_afp_volume_delete (volume, backup_name, NULL,\n  935 |                              close_replace_delete_backup_cb, afp_handle);\n  936 |     g_free (backup_name);\n  937 |   }\n  938 | \n  939 |   else\n  940 |   {\n  941 |     /* Delete temporary file */\n  942 |     g_vfs_afp_volume_delete (volume, afp_handle->tmp_filename, NULL, NULL, NULL);\n  943 |     \n  944 |     afp_handle_free (afp_handle);\n  945 |   }\n  946 | }","lines":40}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"g_daemon_file_set_attribute leaks the GVfsDBusMount proxy on every error path. g_object_unref(proxy) is only reached on the success path (line 2671); when the D-Bus call fails the function does _g_propagate_error_stripped() and returns FALSE without unref-ing proxy. All sibling functions (delete/trash/make_directory/make_symbolic_link) unref the proxy before branching on the result.","fix":"Move g_object_unref(proxy) to run unconditionally after g_free(path) (before the 'if (! res)' block), matching g_daemon_file_delete.","locations":[{"ref":"client/gdaemonfile.c:2650-2673","code":" 2650 |   proxy = create_proxy_for_file (file, NULL, &path, NULL, cancellable, error);\n 2651 |   if (proxy == NULL)\n 2652 |     return FALSE;\n 2653 | \n 2654 |   my_error = NULL;\n 2655 |   res = gvfs_dbus_mount_call_set_attribute_sync (proxy,\n 2656 |  |   if (fd_list == NULL || g_unix_fd_list_get_length (fd_list) != 1 ||\n 3101 |       (fd = g_unix_fd_list_get (fd_list, fd_id, NULL)) == -1)\n 3102 |     {\n 3103 |       g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED,\n 3104 |                                _(\"Couldn’t get stream file descriptor\"));\n 3105 |     }\n 3106 |   else\n 3107 |     {\n 3108 |       output_stream = g_daemon_file_output_stream_new (fd, flags, initial_offset);\n 3109 |       g_task_return_pointer (task, output_stream, g_object_unref);\n 3110 |       g_object_unref (fd_list);\n 3111 |     }","lines":12}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In mount_mountable_async_cb the GVariant iter_mountspec returned by gvfs_dbus_mount_call_mount_mountable_finish is only unref'd in the non-URI branch. When is_uri is TRUE, iter_mountspec is never freed, leaking a GVariant on every mount-mountable call that returns a URI.","fix":"Unref iter_mountspec in both branches (e.g. move g_variant_unref(iter_mountspec) after the if/else).","locations":[{"ref":"client/gdaemonfile.c:1361-1381","code":" 1361 |   if (is_uri)\n 1362 |     {\n 1363 |       file = g_file_new_for_uri (out_path);\n 1364 |     }\n 1365 |   else\n 1366 |     {\n 1367 |       mount_spec = g_mount_spec_from_dbus (iter_mountspec);\n 1368 |       g_variant_unref (iter_mountspec);\n 1369 |       \n 1370 |       if (mount_spec == NULL)\n 1371 |         {\n 1372 |           g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED,\n 1373 |                                    _(\"Invalid return value from %s\"), \"call\");\n 1374 |           goto out;\n 1375 |         }\n 1376 |       \n 1377 |       file = g_daemon_file_new (mount_spec, out_path);\n 1378 |       g_mount_spec_unref (mount_spec);\n 1379 |     }\n 1380 |   \n 1381 |   g_free (out_path);","lines":21}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In g_vfs_icon_load, when the sync D-Bus call succeeded (res TRUE) but the returned FD data is malformed, the error branch returns NULL without unref-ing fd_id_val (a GVariant) or fd_list (a GUnixFDList); those are only unref'd on the success path. On a successful call fd_id_val is always set and fd_list normally non-NULL, so this leaks a GVariant and usually a GUnixFDList every time the FD count/handle is bad. The async sibling open_icon_read_cb has the analogous issue: it does not unref fd_list on the malformed-FD path.","fix":"In the error branch add g_clear_pointer(&fd_id_val, g_variant_unref) and g_clear_object(&fd_list) before returning; unref fd_list on the error branch of open_icon_read_cb as well.","locations":[{"ref":"client/gvfsiconloadable.c:142-149","code":"  142 |   if (fd_list == NULL || fd_id_val == NULL ||\n  143 |       g_unix_fd_list_get_length (fd_list) != 1 ||\n  144 |       (fd = g_unix_fd_list_get (fd_list, g_variant_get_handle (fd_id_val), NULL)) == -1)\n  145 |     {\n  146 |       g_set_error_literal (error, G_IO_ERROR, G_IO_ERROR_FAILED,\n  147 |                            _(\"Didn’t get stream file descriptor\"));\n  148 |       return NULL;\n  149 |     }","lines":8},{"ref":"client/gvfsiconloadable.c:359-373","code":"  359 |   fd_id = g_variant_get_handle (fd_id_val);\n  360 |   g_variant_unref (fd_id_val);\n  361 | \n  362 |   if (fd_list == NULL || g_unix_fd_list_get_length (fd_list) != 1 ||\n  363 |       (fd = g_unix_fd_list_get (fd_list, fd_id, NULL)) == -1)\n  364 |     {\n  365 |       g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED,\n  366 |                                _(\"Couldn’t get stream file descriptor\"));\n  367 |     }\n  368 |   else\n  369 |     {\n  370 |       stream = g_daemon_file_input_stream_new (fd, can_seek);\n  371 |       g_task_return_pointer (task, stream, g_object_unref);\n  372 |       g_object_unref (fd_list);\n  373 |     }","lines":15}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"clear_avahi_data frees and nulls every cached field (address, interface, ...) except txt_records, which is set to NULL without g_strfreev, leaking the whole string vector. This runs on every AVAHI_RESOLVER_FAILURE and on client disconnect/reconnect, so it leaks repeatedly over the daemon's lifetime.","fix":"g_strfreev (resolver->txt_records); before resolver->txt_records = NULL;","locations":[{"ref":"common/gvfsdnssdresolver.c:1055-1060","code":" 1055 |   if (resolver->txt_records != NULL)\n 1056 |     {\n 1057 |       resolver->txt_records = NULL;\n 1058 |       g_object_notify (G_OBJECT (resolver), \"txt-records\");\n 1059 |       changed = TRUE;\n 1060 |     }","lines":6}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"Per-file reference leak in admin do_enumerate(). g_file_enumerator_iterate() returns a GFileInfo owned\nby the enumerator (valid only until the next iterate call). The code passes g_object_ref(info) to\ng_vfs_job_enumerate_add_info(), but add_info does NOT take ownership (it only reads/serializes the info;\nall other backends call add_info then g_object_unref themselves). The extra ref taken here is never\nreleased, leaking one GFileInfo ref for every enumerated entry.","fix":"Pass info directly without the extra ref: g_vfs_job_enumerate_add_info (enumerate_job, info); do not g_object_ref it (the enumerator owns it).","locations":[{"ref":"daemon/gvfsbackendadmin.c:525-538","code":"  525 |   while (TRUE)\n  526 |     {\n  527 |       if (!g_file_enumerator_iterate (enumerator, &info, NULL,\n  528 |                                       job->cancellable, &error))\n  529 |         {\n  530 |           g_object_unref (enumerator);\n  531 |           goto out;\n  532 |         }\n  533 | \n  534 |       if (!info)\n  535 |         break;\n  536 | \n  537 |       g_vfs_job_enumerate_add_info (enumerate_job, g_object_ref (info));\n  538 |     }","lines":14}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"g_vfs_backend_afc_mount() error handling leaks and double-frees. self->service\nis allocated (lines 427/432/437) but is only freed on the out_destroy_service\npath; the goto out_destroy_lockdown and out_destroy_dev paths free lockdown/dev\nbut NOT self->service, and they do not fall through to out_destroy_service (each\nlabel returns by falling to the next, but out_destroy_lockdown falls into\nout_destroy_dev which does idevice_free(self->dev) then falls into\nout_destroy_service which frees service+model+display_name). Conversely, the\nidevice_check failure at line 474 jumps to out_destroy_service which frees\nservice/model but the device was never created - fine - yet self->dev from a\nPARTIAL idevice_new failure is not freed there. The fallthrough chain also calls\nidevice_free(self->dev) without resetting self->dev=NULL, so a later finalize\n(close_connection -> idevice_free) double-frees self->dev.","fix":"Set self->dev=NULL after idevice_free in the out_destroy_dev label, and ensure self->service is freed exactly once on every failure path.","locations":[{"ref":"daemon/gvfsbackendafc.c:691-702","code":"  691 | out_destroy_lockdown:\n  692 |   lockdownd_client_free (lockdown_cli);\n  693 |   lockdownd_service_descriptor_free (lockdown_service);\n  694 | \n  695 | out_destroy_dev:\n  696 |   idevice_free (self->dev);\n  697 | \n  698 | out_destroy_service:\n  699 |   g_free (self->service);\n  700 |   g_free (self->model);\n  701 |   g_free (display_name);\n  702 | }","lines":12}]},{"id":"MEM_8","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"Burn backend leaks its temp directory and entire virtual node tree on finalize. g_vfs_backend_burn_finalize()\nonly unrefs mount_spec; it never frees backend->tempdir (a heap string) nor frees backend->root_node via\nvirtual_node_unref(). Because owned backing files are unlinked only in virtual_node_free(), failing to free\nthe root node also leaks the temp files and the gvfs-burn directory created in try_mount().","fix":"In finalize, virtual_node_unref(backend->root_node) (which deep-frees children and unlinks owned files), g_free(backend->tempdir), and remove the now-empty tempdir.","locations":[{"ref":"daemon/gvfsbackendburn.c:326-337","code":"  326 | static void\n  327 | g_vfs_backend_burn_finalize (GObject *object)\n  328 | {\n  329 |   GVfsBackendBurn *backend;\n  330 | \n  331 |   backend = G_VFS_BACKEND_BURN (object);\n  332 | \n  333 |   g_mount_spec_unref (backend->mount_spec);\n  334 | \n  335 |   if (G_OBJECT_CLASS (g_vfs_backend_burn_parent_class)->finalize)\n  336 |     (*G_OBJECT_CLASS (g_vfs_backend_burn_parent_class)->finalize) (object);\n  337 | }","lines":12},{"ref":"daemon/gvfsbackendburn.c:376-378","code":"  376 |   burn_backend->tempdir = filename;\n  377 |   burn_backend->root_node =\n  378 |     virtual_node_new (NULL, VIRTUAL_NODE_DIRECTORY);","lines":3}]},{"id":"MEM_9","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"PollForMediaData leak in computer backend. In try_mount_mountable(), when a drive has no media, a\nPollForMediaData is g_slice_new0'd. It is only freed in poll_for_media_cb() on the success+has_media\npath (line 933). On every other path the struct is leaked: (a) if g_drive_is_media_check_automatic()\nis TRUE the code calls report_no_media_error() and returns without ever freeing data or starting the\npoll; (b) in poll_for_media_cb() the no-media branch and the error branch never free data. Each failed\nmount-mountable on a mediumless drive leaks the struct.","fix":"Free PollForMediaData on all completion paths: g_slice_free it in the automatic-media-check branch before report_no_media_error, and in both the no-media and error branches of poll_for_media_cb().","locations":[{"ref":"daemon/gvfsbackendcomputer.c:982-995","code":"  982 |                   PollForMediaData *data;\n  983 | \n  984 |                   data = g_slice_new0 (PollForMediaData);\n  985 |                   mount_op = g_mount_source_get_operation (mount_source);\n  986 |                   data->job = job;\n  987 |                   data->mount_op = mount_op;\n  988 |                   if (!g_drive_is_media_check_automatic (file->drive))\n  989 |                     g_drive_poll_for_media (file->drive,\n  990 |                                             G_VFS_JOB (job)->cancellable,\n  991 |                                             poll_for_media_cb,\n  992 |                                             data);\n  993 |                   else\n  994 |                     report_no_media_error (G_VFS_JOB (job));\n  995 |                 }","lines":14},{"ref":"daemon/gvfsbackendcomputer.c:909-941","code":"  909 | static void\n  910 | poll_for_media_cb (GObject *source_object,\n  911 |                    GAsyncResult *res,\n  912 |                    gpointer user_data)\n  913 | {\n  914 |   PollForMediaData *data = user_data;\n  915 |   GDrive *drive;\n  916 |   GError *error;\n  917 |   \n  918 |   drive = G_DRIVE (source_object);\n  919 |   error = NULL;\n  920 |   \n  921 |   if (g_drive_poll_for_media_finish (drive, res, &error))\n  922 |     {\n  923 |       gboolean has_media;\n  924 |       has_media = g_drive_has_media (drive);\n  925 | \n  926 |       if (!has_media)\n  927 |         {\n  928 |           report_no_media_error (G_VFS_JOB (data->job));\n  929 |         }\n  930 |       else\n  931 |         {\n  932 |           mount_volume_from_drive (drive, G_VFS_JOB (data->job), data->mount_op);\n  933 | \t  g_slice_free (PollForMediaData, data);\n  934 |         }\n  935 |     }\n  936 |   else\n  937 |     {\n  938 |       g_vfs_job_failed_from_error  (G_VFS_JOB (data->job), error);\n  939 |       g_error_free (error);\n  940 |     }\n  941 | }","lines":33}]},{"id":"MEM_10","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In setup_connection(), after read_reply_sync() succeeds, several early-return error paths (SSH_FXP_VERSION mismatch -> 'Protocol error', and the get_uid_sync/get_home_sync failure path) return FALSE without g_object_unref(reply). The GDataInputStream 'reply' is leaked on those error branches. The normal path unrefs it at line 1994.","fix":"Add g_object_unref(reply) before the return FALSE statements at the protocol-error and uid/home-failure branches (or use g_autoptr).","locations":[{"ref":"daemon/gvfsbackendsftp.c:1970-2001","code":" 1970 |   if (g_data_input_stream_read_byte (reply, NULL, NULL) != SSH_FXP_VERSION)\n 1971 |     {\n 1972 |       g_set_error_literal (error, G_IO_ERROR, G_IO_ERROR_FAILED, _(\"Protocol error\"));\n 1973 |       return FALSE;\n 1974 |     }\n 1975 | \n 1976 |   op_backend->protocol_version = g_data_input_stream_read_uint32 (reply, NULL, NULL);\n 1977 | \n 1978 |   while ((extension_name = read_string (reply, NULL)) != NULL)\n 1979 |     {\n 1980 |       extension_data = read_string (reply, NULL);\n 1981 |       if (extension_data)\n 1982 |         {\n 1983 |           for (i = 0; i < G_N_ELEMENTS (extensions); i++)\n 1984 |             {\n 1985 |               if (!strcmp (extension_name, extensions[i].name) &&\n 1986 |                   !strcmp (extension_data, extensions[i].data))\n 1987 |                 op_backend->extensions |= 1 << extensions[i].enable;\n 1988 |             }\n 1989 |         }\n 1990 |       g_free (extension_name);\n 1991 |       g_free (extension_data);\n 1992 |     }\n 1993 | \n 1994 |   g_object_unref (reply);\n 1995 | \n 1996 |   if (initial_connection &&\n 1997 |       (!get_uid_sync (op_backend) || !get_home_sync (op_backend)))\n 1998 |     {\n 1999 |       g_set_error_literal (error, G_IO_ERROR, G_IO_ERROR_FAILED, _(\"Protocol error\"));\n 2000 |       return FALSE;\n 2001 |     }","lines":32}]},{"id":"MEM_11","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"auth_callback() unconditionally g_strdup()s username/domain/password into backend->last_user/last_domain/last_password on every invocation without freeing the previous values. During the mount loop the callback is invoked multiple times, leaking the prior strings each time. These fields are also never freed in g_vfs_backend_smb_finalize(), so the final copies (including the plaintext password) leak for the backend's lifetime.","fix":"g_free() (or g_clear_pointer) the old last_user/last_domain/last_password before reassigning in auth_callback, and free them in g_vfs_backend_smb_finalize().","locations":[{"ref":"daemon/gvfsbackendsmb.c:322-324","code":"  322 |   backend->last_user = g_strdup (username_out);\n  323 |   backend->last_domain = g_strdup (domain_out);\n  324 |   backend->last_password = g_strdup (password_out);","lines":3},{"ref":"daemon/gvfsbackendsmb.c:99-114","code":"   99 | g_vfs_backend_smb_finalize (GObject *object)\n  100 | {\n  101 |   GVfsBackendSmb *backend;\n  102 | \n  103 |   backend = G_VFS_BACKEND_SMB (object);\n  104 | \n  105 |   g_free (backend->share);\n  106 |   g_free (backend->server);\n  107 |   g_free (backend->user);\n  108 |   g_free (backend->domain);\n  109 |   g_free (backend->path);\n  110 |   g_free (backend->default_workgroup);\n  111 |   \n  112 |   if (G_OBJECT_CLASS (g_vfs_backend_smb_parent_class)->finalize)\n  113 |     (*G_OBJECT_CLASS (g_vfs_backend_smb_parent_class)->finalize) (object);\n  114 | }","lines":16}]},{"id":"MEM_12","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"Same leak as the smb backend: auth_callback() overwrites backend->last_user/last_domain/last_password via g_strdup without freeing the previous values (callback runs multiple times in the mount loop), and g_vfs_backend_smb_browse_finalize() never frees them, leaking the final credentials (including password) for the backend lifetime.","fix":"Free the old values before reassigning in auth_callback, and free last_user/last_domain/last_password in the finalize function.","locations":[{"ref":"daemon/gvfsbackendsmbbrowse.c:383-385","code":"  383 |   backend->last_user = g_strdup (username_out);\n  384 |   backend->last_domain = g_strdup (domain_out);\n  385 |   backend->last_password = g_strdup (password_out);","lines":3},{"ref":"daemon/gvfsbackendsmbbrowse.c:170-191","code":"  170 | g_vfs_backend_smb_browse_finalize (GObject *object)\n  171 | {\n  172 |   GVfsBackendSmbBrowse *backend;\n  173 | \n  174 |   backend = G_VFS_BACKEND_SMB_BROWSE (object);\n  175 | \n  176 |   g_free (backend->user);\n  177 |   g_free (backend->domain);\n  178 |   g_free (backend->mounted_server);\n  179 |   g_free (backend->server);\n  180 |   g_free (backend->default_workgroup);\n  181 |   \n  182 |   g_mutex_clear (&backend->entries_lock);\n  183 |   g_mutex_clear (&backend->update_cache_lock);\n  184 | \n  185 |   smbc_free_context (backend->smb_context, TRUE);\n  186 |   \n  187 |   g_list_free_full (backend->entries, (GDestroyNotify)browse_entry_free);\n  188 |   \n  189 |   if (G_OBJECT_CLASS (g_vfs_backend_smb_browse_parent_class)->finalize)\n  190 |     (*G_OBJECT_CLASS (g_vfs_backend_smb_browse_parent_class)->finalize) (object);\n  191 | }","lines":22}]},{"id":"MEM_13","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In _g_vfs_afc_volume_update_metadata(), when the device model is iPod or iPad the code frees the old self->icon (g_free) before reassigning, but reassigns self->symbolic_icon without freeing the previous value set in g_vfs_afc_volume_init (\"phone-apple-iphone-symbolic\"). Each metadata update for such a device leaks the previous symbolic_icon string.","fix":"Add g_free (self->symbolic_icon); before each self->symbolic_icon = g_strdup (...) assignment, matching the handling of self->icon.","locations":[{"ref":"monitor/afc/afcvolume.c:188-199","code":"  188 |       if (g_str_equal(model, \"iPod\") != FALSE)\n  189 |         {\n  190 |           g_free (self->icon);\n  191 |           self->icon = g_strdup (\"multimedia-player-apple-ipod-touch\");\n  192 |           self->symbolic_icon = g_strdup (\"multimedia-player-apple-ipod-touch-symbolic\");\n  193 |         }\n  194 |       else if (g_str_equal(model, \"iPad\") != FALSE)\n  195 |         {\n  196 |           g_free (self->icon);\n  197 |           self->icon = g_strdup (\"computer-apple-ipad\");\n  198 |           self->symbolic_icon = g_strdup (\"computer-apple-ipad-symbolic\");\n  199 |         }","lines":12}]},{"id":"MEM_14","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"g_vfs_afc_volume_new() allocates the GVfsAfcVolume object, sets uuid/service, then calls _g_vfs_afc_volume_update_metadata(). If that returns 0 the function returns NULL but never unrefs 'self', leaking the just-created volume object (and its uuid/service strings) every time metadata collection fails (e.g. device unplugged, lockdown handshake fails).","fix":"Before 'return NULL', call g_object_unref (self).","locations":[{"ref":"monitor/afc/afcvolume.c:219-238","code":"  219 |   self = G_VFS_AFC_VOLUME(g_object_new (G_VFS_TYPE_AFC_VOLUME, NULL));\n  220 |   self->monitor = monitor;\n  221 |   self->uuid = g_strdup (uuid);\n  222 |   self->service = g_strdup (service);\n  223 | \n  224 |   if (service == NULL)\n  225 |     uri = g_strdup_printf (\"afc://%s\", self->uuid);\n  226 |   else\n  227 |     uri = g_strdup_printf (\"afc://%s:%s\", self->uuid, service);\n  228 | \n  229 |   root = g_file_new_for_uri (uri);\n  230 |   g_free (uri);\n  231 | \n  232 |   g_object_set_data_full (G_OBJECT(self), \"root\", root, g_object_unref);\n  233 | \n  234 |   /* Get mount information here */\n  235 |   if (!_g_vfs_afc_volume_update_metadata (self))\n  236 |       return NULL;\n  237 | \n  238 |   return self;","lines":20}]},{"id":"MEM_15","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"g_mtp_volume_finalize() frees volume->name and volume->icon but not volume->symbolic_icon, even though g_mtp_volume_init/g_mtp_volume_new allocate symbolic_icon with g_strdup/g_vfs_get_volume_symbolic_icon. Every finalized MTP volume leaks its symbolic_icon string. The sibling gphoto2 finalize frees all three icon/name strings.","fix":"Add g_free (volume->symbolic_icon); in g_mtp_volume_finalize.","locations":[{"ref":"monitor/mtp/gmtpvolume.c:59-76","code":"   59 | static void\n   60 | g_mtp_volume_finalize (GObject *object)\n   61 | {\n   62 |   GMtpVolume *volume;\n   63 | \n   64 |   volume = G_MTP_VOLUME (object);\n   65 | \n   66 |   g_clear_object (&volume->device);\n   67 |   g_clear_object (&volume->activation_root);\n   68 | \n   69 |   if (volume->volume_monitor != NULL)\n   70 |     g_object_remove_weak_pointer (G_OBJECT (volume->volume_monitor), (gpointer) &(volume->volume_monitor));\n   71 | \n   72 |   g_free (volume->name);\n   73 |   g_free (volume->icon);\n   74 | \n   75 |   (*G_OBJECT_CLASS (g_mtp_volume_parent_class)->finalize) (object);\n   76 | }","lines":18}]},{"id":"MEM_16","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"free_unmount_and_lock_op() frees data->pending_mounts (g_list_free_full with g_object_unref) but never frees data->pending_encrypted. The pending_encrypted list holds refs to UDisksEncrypted objects taken via g_object_ref in unmount_and_lock(). If the operation fails or is freed while encrypted entries remain pending (e.g. an early unmount failure aborts before all encrypted devices are processed), the list nodes and the held UDisksEncrypted references leak.","fix":"Add g_list_free_full (data->pending_encrypted, g_object_unref); to free_unmount_and_lock_op().","locations":[{"ref":"monitor/udisks2/gvfsudisks2drive.c:550-556","code":"  550 | static void\n  551 | free_unmount_and_lo ds & GP_STORAGEINFO_BASE)\n  490 |         basedir = storage_info[i].basedir;\n  491 |       else\n  492 |         basedir = \"/\";\n  493 | \n  494 |       l = g_list_prepend (l, g_strdup (basedir));\n  495 |     }\n  496 | \n  497 | out:\n  498 |   /* Clean up */\n  499 |   if (il != NULL)\n  500 |     gp_port_info_list_free (il);\n  501 |   if (context != NULL)\n  502 |     gp_context_unref (context);\n  503 |   if (camera != NULL)\n  504 |     gp_camera_unref (camera);\n  505 | \n  506 |   g_free (port);\n  507 | \n  508 |   return l;","lines":40}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"read_string() reads a 32-bit length from the (untrusted) server then does g_malloc(len + 1). len is guint32; when len == G_MAXUINT32 the expression len+1 wraps to 0, so a 0-byte (or tiny) buffer is allocated, and g_input_stream_read_all() then writes up to 4GB into it -> heap overflow. Even short of the wrap, no upper bound is enforced on attacker-controlled allocation sizes (DoS).","fix":"Use gsize arithmetic: g_malloc((gsize)len + 1); and impose a sane maximum length (reject lengths above e.g. the max packet size) before allocating/reading.","locations":[{"ref":"daemon/gvfsbackendsftp.c:762-791","code":"  762 | static char *\n  763 | read_string (GDataInputStream *stream, gsize *len_out)\n  764 | {\n  765 |   guint32 len;\n  766 |   char *data;\n  767 |   GError *error;\n  768 | \n  769 |   error = NULL;\n  770 |   len = g_data_input_stream_read_uint32 (stream, NULL, &error);\n  771 |   if (error)\n  772 |     {\n  773 |       g_error_free (error);\n  774 |       return NULL;\n  775 |     }\n  776 |   \n  777 |   data = g_malloc (len + 1);\n  778 | \n  779 |   if (!g_input_stream_read_all (G_INPUT_STREAM (stream), data, len, NULL, NULL, NULL))\n  780 |     {\n  781 |       g_free (data);\n  782 |       return NULL;\n  783 |     }\n  784 |   \n  785 |   data[len] = 0;\n  786 | \n  787 |   if (len_out)\n  788 |     *len_out = len;\n  789 |   \n  790 |   return data;\n  791 | }","lines":30}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"verify_array_block() computes the block length as sizeof(guint32) + num * element_size, where num is a guint32 read from the (untrusted, mmapped) on-disk file and element_size is a gsize. The product is computed in 64-bit but is then passed to verify_block_pointer() whose len parameter is guint32, truncating the value. A crafted/corrupt file with num close to 0x100000000/element_size (e.g. num=0x10000000 for MetaFileDirEnt size 16) makes num*element_size wrap to a small value mod 2^32 (here 0), so the bounds check passes while callers (enumerate_dir, copy_tree_to_builder, meta_tree_lookup_stringv, enumerate_data) then iterate num times reading far past the mapping - a heap/mmap out-of-bounds read and potential crash.","fix":"Compute the size in gsize and reject before truncation: gsize total = (gsize)sizeof(guint32) + (gsize)num * element_size; if (total > tree->len) return NULL; and change verify_block_pointer to take a gsize len (and compare against tree->len in gsize without 32-bit wraparound).","locations":[{"ref":"metadata/metatree.c:218-230","code":"  218 | static gpointer\n  219 | verify_array_block (MetaTree *tree, guint32 pos, gsize element_size)\n  220 | {\n  221 |   guint32 *nump, num;\n  222 | \n  223 |   nump = verify_block_pointer (tree, pos, sizeof (guint32));\n  224 |   if (nump == NULL)\n  225 |     return NULL;\n  226 | \n  227 |   num = GUINT32_FROM_BE (*nump);\n  228 | \n  229 |   return verify_block_pointer (tree, pos, sizeof (guint32) + num * element_size);\n  230 | }","lines":13},{"ref":"metadata/metatree.c:199-216","code":"  199 | static gpointer\n  200 | verify_block_pointer (MetaTree *tree, guint32 pos, guint32 len)\n  201 | {\n  202 |   pos = GUINT32_FROM_BE (pos);\n  203 | \n  204 |   /* Ensure 32bit aligned */\n  205 |   if (pos %4 != 0)\n  206 |     return NULL;\n  207 | \n  208 |   if (pos > tree->len)\n  209 |     return NULL;\n  210 | \n  211 |   if (pos + len < pos ||\n  212 |       pos + len > tree->len)\n  213 |     return NULL;\n  214 | \n  215 |   return tree->data + pos;\n  216 | }","lines":18}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"read_stream declares gsize n_bytes_read and returns it via 'gint result = n_bytes_read;'. The FUSE return type is gint (signed 32-bit). Any byte count with bit 31 set (>= 2 GiB) becomes negative and would be misinterpreted by FUSE as a negative errno. write_stream has the same pattern ('gint result = n_bytes_written;'). Relies on FUSE's negotiated max-read invariant which is not asserted here.","fix":"Keep a gssize/size_t byte count and only narrow to gint after verifying it fits FUSE's negotiated limits; assert the bound.","locations":[{"ref":"client/gvfsfusedaemon.c:1264-1349","code":" 1264 | static gint\n 1265 | read_stream (FileHandle *fh, gchar *output_buf, size_t output_buf_size, off_t offset)\n 1266 | {\n 1267 |   GInputStream *input_stream;\n 1268 |   gint          n_bytes_skipped = 0;\n 1269 |   gsize         n_bytes_read    = 0;\n 1270 |   gint          result          = 0;\n 1271 |   GError       *error           = NULL;\n 1272 | \n 1273 |   input_stream = fh->stream;\n 1274 | \n 1275 |   if (offset != fh->pos)\n 1276 |     {\n 1277 |       if (g_seekable_can_seek (G_SEEKABLE (input_stream)))\n 1278 |         {\n 1279 |           /* Can seek */\n 1280 | \n 1281 |           g_debug (\"read_stream: seeking to offset %jd.\\n\", offset);\n 1282 | \n 1283 |           if (g_seekable_seek (G_SEEKABLE (input_stream), offset, G_SEEK_SET, NULL, &error))\n 1284 |             {\n 1285 |               fh->pos = offset;\n 1286 |             }\n 1287 |           else\n 1288 |             {\n 1289 |               result = -errno_from_error (error);\n 1290 |               g_error_free (error);\n 1291 |             }\n 1292 |         }\n 1293 |       else if (offset > fh->pos)\n 1294 |         {\n 1295 |           /* Can skip ahead */\n 1296 | \n 1297 |           g_debug (\"read_stream: skipping to offset %jd.\\n\", offset);\n 1298 | \n 1299 |           n_bytes_skipped = g_input_stream_skip (input_stream, offset - fh->pos, NULL, &error);\n 1300 | \n 1301 |           if (n_bytes_skipped > 0)\n 1302 |             fh->pos += n_bytes_skipped;\n 1303 | \n 1304 |           if (offset != fh->pos)\n 1305 |             {\n 1306 |               if (error)\n 1307 |                 {\n 1308 |                   result = -errno_from_error (error);\n 1309 |                   g_error_free (error);\n 1310 |                 }\n 1311 |               else\n 1312 |                 {\n 1313 |                   result = -EIO;\n 1314 |                 }\n 1315 |             }\n 1316 |         }\n 1317 |       else\n 1318 |         {\n 1319 |           /* Can't seek, can't skip backwards */\n 1320 | \n 1321 |           g_debug (\"read_stream: can't seek nor skip to offset %jd!\\n\", offset);\n 1322 | \n 1323 |           result = -ENOTSUP;\n 1324 |         }\n 1325 |     }\n 1326 | \n 1327 |   if (result == 0)\n 1328 |     {\n 1329 |       g_input_stream_read_all (input_stream,\n 1330 |                                output_buf,\n 1331 |                                output_buf_size,\n 1332 |                                &n_bytes_read,\n 1333 |                                NULL,\n 1334 |                                &error);\n 1335 | \n 1336 |       fh->pos += n_bytes_read;\n 1337 |       result = n_bytes_read;\n 1338 | \n 1339 |       if (error != NULL)\n 1340 |         {\n 1341 |           g_debug (\"read_stream: wanted %zd bytes, but got %zd.\\n\", output_buf_size, n_bytes_read);\n 1342 | \n 1343 |           result = -errno_from_error (error);\n 1344 |           g_error_free (error);\n 1345 |         }\n 1346 |     }\n 1347 | \n 1348 |   return
