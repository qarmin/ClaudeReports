\n  127 | \tif (! local_vfs) {\n  128 | \t\tg_vfs_job_failed (job,\tG_IO_ERROR, G_IO_ERROR_FAILED,\n  129 | \t\t\t\t\"Cannot get local vfs\"); \n  130 | \t    g_print (\" (EE) get_g_file_from_local (filename = '%s'): local_vfs == NULL \\n\", filename);\n  131 | \t    return NULL;\n  132 | \t}\n  133 | \n  134 | \tfile = g_vfs_get_file_for_path (local_vfs, filename);\n  135 | \tif (! file) {\n  136 | \t\tg_vfs_job_failed (job,\tG_IO_ERROR, G_IO_ERROR_FAILED,\n  137 | \t\t\t\t\"Cannot get file from local vfs\"); \n  138 | \t    g_print (\" (EE) get_g_file_from_local (filename = '%s'): file == NULL \\n\", filename);\n  139 | \t\treturn NULL;\n  140 | \t}\n  141 | \treturn file;\n  142 | }","lines":23},{"ref":"daemon/gvfsbackendlocaltest.c:298-300","code":"  298 |   file = get_g_file_from_local (filename, G_VFS_JOB (job));\n  299 |   g_assert (file != NULL);\n  300 |   res = TRUE;","lines":3}]},{"id":"API_13","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"g_vfs_http_input_stream_close_finish() uses g_return_val_if_fail(..., -1) for a function that returns gboolean. The bogus sentinel -1 is truthy (interpreted as TRUE) on the validation-failure path, so an invalid GAsyncResult would be reported as a successful close. Should return FALSE.","fix":"Return FALSE from the g_return_val_if_fail in g_vfs_http_input_stream_close_finish.","locations":[{"ref":"daemon/gvfshttpinputstream.c:383-391","code":"  383 | static gboolean\n  384 | g_vfs_http_input_stream_close_finish (GInputStream  *stream,\n  385 | \t\t\t\t      GAsyncResult  *result,\n  386 | \t\t\t\t      GError       **error)\n  387 | {\n  388 |   g_return_val_if_fail (g_task_is_valid (result, stream), -1);\n  389 | \n  390 |   return g_task_propagate_boolean (G_TASK (result), error);\n  391 | }","lines":9}]},{"id":"API_14","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"create_enumerator_proxy() asserts the synchronously created proxy is non-NULL with g_assert(proxy != NULL), but passes NULL for the GError out-param so a real construction failure (e.g. peer gone) yields proxy == NULL and aborts the whole daemon via the assertion rather than reporting an error. The progress-proxy construction in gvfsjobprogress.c handles the same failure gracefully (warn + continue), so this is inconsistent and turns a recoverable D-Bus error into a crash.","fix":"Pass a GError and, on failure, log/handle it and bail out of the enumerate reply gracefully instead of asserting; at minimum do not g_assert on a value derived from a fallible synchronous D-Bus call.","locations":[{"ref":"daemon/gvfsjobenumerate.c:115-135","code":"  115 | static GVfsDBusEnumerator *\n  116 | create_enumerator_proxy (GVfsJobEnumerate *job)\n  117 | {\n  118 |   GDBusConnection *connection;\n  119 |   const gchar *sender;\n  120 |   GVfsDBusEnumerator *proxy;\n  121 | \n  122 |   connection = g_dbus_method_invocation_get_connection (G_VFS_JOB_DBUS (job)->invocation);\n  123 |   sender = g_dbus_method_invocation_get_sender (G_VFS_JOB_DBUS (job)->invocation);\n  124 | \n  125 |   proxy = gvfs_dbus_enumerator_proxy_new_sync (connection,\n  126 |                                                G_DBUS_PROXY_FLAGS_DO_NOT_LOAD_PROPERTIES | G_DBUS_PROXY_FLAGS_DO_NOT_CONNECT_SIGNALS,\n  127 |                                                sender,\n  128 |                                                job->object_path,\n  129 |                                                NULL,\n  130 |                                                NULL);\n  131 |   g_assert (proxy != NULL);\n  132 |   g_dbus_proxy_set_default_timeout (G_DBUS_PROXY (proxy), G_MAXINT);\n  133 | \n  134 |   return proxy;\n  135 | }","lines":21}]},{"id":"API_15","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"path_counter is declared `static volatile gint` and accessed via g_atomic_int_add. `volatile` is neither necessary nor sufficient for atomicity and the glib atomic API does not expect a volatile qualifier; mixing them is a code smell (and can warn). Functionally works on common platforms.","fix":"Drop the `volatile` qualifier; g_atomic_int_add already provides the necessary semantics.","locations":[{"ref":"daemon/gvfsmonitor.c:63-64","code":"   63 | /* atomic */\n   64 | static volatile gint path_counter = 1;","lines":2},{"ref":"daemon/gvfsmonitor.c:138","code":"  138 |   id = g_atomic_int_add (&path_counter, 1);","lines":1}]},{"id":"API_16","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"meta_journal_add_entry writes journal->header->num_entries using GUINT_TO_BE (operates on 'guint') whereas the field is guint32 and every other access uses GUINT32_FROM_BE. guint == guint32 on supported platforms so it is currently harmless, but it is an inconsistent/incorrect macro for a fixed-width on-disk field.","fix":"Use GUINT32_TO_BE to match the guint32 field width and the reader side.","locations":[{"ref":"metadata/metatree.c:1123","code":" 1123 |   journal->header->num_entries = GUINT_TO_BE (journal->last_entry_num + 1);","lines":1}]},{"id":"API_17","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In gvfs_udisks2_volume_mount(), udisks_client_get_cleartext_block() returns a referenced UDisksBlock which is immediately unreffed (line 1628-1629) while the raw pointer `block` continues to be used afterwards (g_dbus_interface_get_object, udisks_object_peek_filesystem, etc.). The code relies on the UDisksClient keeping the object alive for the duration. This is the documented udisks pattern but is fragile: an intervening main-loop iteration (none here, so currently safe) could drop the last client-held ref. Same pattern recurs but is benign because it is synchronous.","fix":"Keep the reference (do not unref until done with `block`), or document the invariant that no main-loop runs between the peek and use.","locations":[{"ref":"monitor/udisks2/gvfsudisks2volume.c:1626-1642","code":" 1626 |   /* if encrypted and already unlocked, just mount the cleartext block device */\n 1627 |   block = udisks_client_get_cleartext_block (client, volume->block);\n 1628 |   if (block != NULL)\n 1629 |     g_object_unref (block);\n 1630 |   else\n 1631 |     block = volume->block;\n 1632 | \n 1633 |   object = g_dbus_interface_get_object (G_DBUS_INTERFACE (block));\n 1634 |   if (object == NULL)\n 1635 |     {\n 1636 |       g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED,\n 1637 |                                \"No object for D-Bus interface\");\n 1638 |       g_object_unref (task);\n 1639 |       return;\n 1640 |     }\n 1641 | \n 1642 |   filesystem = udisks_object_peek_filesystem (UDISKS_OBJECT (object));","lines":17}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"readdir_for_file calls filler(buf, name, &sbuf, 0, FUSE_FILL_DIR_PLUS) for each entry and ignores filler's return value. fuse_fill_dir_t returns 1 when the buffer is full; the code keeps enumerating and issuing remote g_file_enumerator_next_file round-trips even after the buffer is full, wasting work.","fix":"Break out of the enumeration loop when filler(...) returns non-zero.","locations":[{"ref":"client/gvfsfusedaemon.c:1585-1597","code":" 1585 |       return result;\n 1586 |     }\n 1587 | \n 1588 |   filler (buf, \".\", NULL, 0, 0);\n 1589 |   filler (buf, \"..\", NULL, 0, 0);\n 1590 | \n 1591 |   while ((file_info = g_file_enumerator_next_file (enumerator, NULL, &error)) != NULL)\n 1592 |     {\n 1593 |       struct stat sbuf = {0};\n 1594 | \n 1595 |       set_attributes_from_info (file_info, &sbuf);\n 1596 | \n 1597 |       filler (buf, g_file_info_get_name (file_info), &sbuf, 0, FUSE_FILL_DIR_PLUS);","lines":13}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"archive_entry_determine_size() reads and decompresses the entire data of an archive entry merely to\ncompute its size whenever archive_entry_size_is_set() is false. During create_file_tree() (run at mount)\nthis is done for every such entry, so mounting an archive whose entries lack stored sizes can require\nfully decompressing the whole archive just to populate file sizes, with O(total uncompressed bytes) cost\nat mount time.","fix":"Avoid eagerly determining size by full decompression at mount; leave size unset (or estimate) when not provided, or compute lazily on query, to keep mount latency bounded.","locations":[{"ref":"daemon/gvfsbackendarchive.c:374-414","code":"  374 | /* Read archive entry data blocks to determine file size */\n  375 | static int64_t\n  376 | archive_entry_determine_size (GVfsArchive          *archive,\n  377 | \t\t\t      struct archive_entry *entry)\n  378 | {\n  379 |   size_t read;\n  380 |   int result;\n  381 |   const void *block;\n  382 |   int64_t offset, size = 0;\n  383 | \n  384 |   do\n  385 |     {\n  386 |       result = archive_read_data_block (archive->archive, &block, &read, &offset);\n  387 |       if (result >= ARCHIVE_FAILED && result <= ARCHIVE_OK)\n  388 | \t{\n  389 | \t  if (result < ARCHIVE_OK) {\n  390 |             g_debug (\"archive_read_data_block: result = %d, error = '%s'\\n\", result, archive_error_string (archive->archive));\n  391 | \t    archive_set_error (archive->archive, ARCHIVE_OK, \"No error\");\n  392 | \t    archive_clear_error (archive->archive);\n  393 |             if (result == ARCHIVE_RETRY)\n  394 |               continue;\n  395 | \n  396 | \t    /* We don't want to fail the mount job, just because of unknown file\n  397 | \t     * size (e.g. caused by unsupported archive encryption). */\n  398 | \t    if (result < ARCHIVE_WARN)\n  399 | \t      {\n  400 | \t        size = -1;\n  401 | \t        break;\n  402 | \t      }\n  403 | \t  }\n  404 | \n  405 | \t  size += read;\n  406 | \t}\n  407 |     }\n  408 |   while (result >= ARCHIVE_FAILED && result != ARCHIVE_EOF);\n  409 | \n  410 |   if (result == ARCHIVE_FATAL)\n  411 |     gvfs_archive_set_error_from_errno (archive);\n  412 | \n  413 |   return size;\n  414 | }","lines":41},{"ref":"daemon/gvfsbackendarchive.c:477-487","code":"  477 |   if (archive_entry_size_is_set (entry))\n  478 |     {\n  479 |       size = archive_entry_size (entry);\n  480 |     }\n  481 |   else\n  482 |     {\n  483 |       size = archive_entry_determine_size (archive, entry);\n  484 |     }\n  485 | \n  486 |   if (size >= 0)\n  487 |     g_file_info_set_size (info, size);","lines":11}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"add_cache_entries_for_filename() resolves a path component-by-component by\ncalling LIBMTP_Get_Files_And_Folders() for each path level and linearly scanning\n(strcmp) every child to find the next component, destroying all the others.\nget_cache_entry() invokes this on every cache miss. For deep trees / large\nfolders this is O(depth * children) round-trips to the device per uncached\nquery_info/open/etc., which on MTP (slow USB control transfers) is a real\nlatency problem. There is no negative caching either, so repeated misses on a\nnon-existent path re-walk the whole tree each time.","fix":"Cache folder listings (or at least the per-directory child lists) and add negative-result caching so repeated lookups don't re-enumerate the device.","locations":[{"ref":"daemon/gvfsbackendmtp.c:294-321","code":"  294 |   for (i = 2; i < ne; i++) {\n  295 |     LIBMTP_file_t *f =\n  296 |       LIBMTP_Get_Files_And_Folders (device, storage->id, parent_id);\n  297 |     while (f != NULL) {\n  298 |       g_debug (\"(III) query (entity = %s, name = %s)\\n\", f->filename, elements[i]);\n  299 |       if (strcmp (f->filename, elements[i]) == 0) {\n  300 |         file = f;\n  301 |         f = f->next;\n  302 |         char *partial = build_partial_path (elements, i + 1);\n  303 |         add_cache_entry (backend, partial, file->storage_id, file->item_id);\n  304 |         break;\n  305 |       } else {\n  306 |         LIBMTP_file_t *tmp = f;\n  307 |         f = f->next;\n  308 |         LIBMTP_destroy_file_t (tmp);\n  309 |       }\n  310 |     }\n  311 |     while (f != NULL) {\n  312 |       LIBMTP_file_t *tmp = f;\n  313 |       f = f->next;\n  314 |       LIBMTP_destroy_file_t (tmp);\n  315 |     }\n  316 |     if (!file) {\n  317 |       g_debug (\"(III) Ignoring query for non-existent file\\n\");\n  318 |       goto exit;\n  319 |     }\n  320 |     parent_id = file->item_id;\n  321 |   }","lines":28}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"g_vfs_job_progress_callback() performs a synchronous, blocking g_dbus_connection_flush_sync() on the connection after every (rate-limited) progress notification. This blocks the I/O thread on a full round-trip flush for each progress update during copy/move/pull/push operations, which can noticeably slow large transfers. The progress call itself is already issued asynchronously, making the forced sync flush the dominant cost.","fix":"Drop the per-callback g_dbus_connection_flush_sync(), or flush far less frequently (e.g. only on the final current==total notification). The async call will be flushed by the main loop anyway.","locations":[{"ref":"daemon/gvfsjobprogress.c:89-95","code":"   89 |   gvfs_dbus_progress_call_progress (job->progress_proxy,\n   90 |                                     current_num_bytes,\n   91 |                                     total_num_bytes,\n   92 |                                     NULL,\n   93 |                                     NULL,\n   94 |                                     NULL);\n   95 |   g_dbus_connection_flush_sync (g_dbus_method_invocation_get_connection (dbus_job->invocation), NULL, NULL);","lines":7}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"g_vfs_monitor_emit_event creates a brand-new GDBusProxy asynchronously for *every* event and *every* subscriber via gvfs_dbus_monitor_client_proxy_new, then unrefs it after one call. For backends emitting frequent file-change events this is very heavy (proxy creation involves a bus round trip). Proxies should be cached per subscriber.","fix":"Cache the GVfsDBusMonitorClient proxy on the Subscriber struct and reuse it across events; create lazily on first event.","locations":[{"ref":"daemon/gvfsmonitor.c:365-398","code":"  365 | void\n  366 | g_vfs_monitor_emit_event (GVfsMonitor       *monitor,\n  367 | \t\t\t  GFileMonitorEvent  event_type,\n  368 | \t\t\t  const char        *file_path,\n  369 | \t\t\t  const char        *other_file_path)\n  370 | {\n  371 |   GList *l;\n  372 |   Subscriber *subscriber;\n  373 | \n  374 |   g_mutex_lock (&monitor->priv->subscribers_lock);\n  375 | \n  376 |   for (l = monitor->priv->subscribers; l != NULL; l = l->next)\n  377 |     {\n  378 |       EmitEventData *data;\n  379 |       \n  380 |       subscriber = l->data;\n  381 | \n  382 |       data = g_new0 (EmitEventData, 1);\n  383 |       data->monitor = g_object_ref (monitor);\n  384 |       data->event_type = event_type;\n  385 |       data->file_path = g_strdup (file_path);\n  386 |       data->other_file_path = g_strdup (other_file_path);\n  387 | \n  388 |       gvfs_dbus_monitor_client_proxy_new (subscriber->connection,\n  389 |                                           G_DBUS_PROXY_FLAGS_DO_NOT_LOAD_PROPERTIES | G_DBUS_PROXY_FLAGS_DO_NOT_CONNECT_SIGNALS,\n  390 |                                           subscriber->id,\n  391 |                                           subscriber->object_path,\n  392 |                                           NULL,\n  393 |                                           (GAsyncReadyCallback) got_proxy_cb,\n  394 |                                           data);\n  395 |     }\n  396 | \n  397 |   g_mutex_unlock (&monitor->priv->subscribers_lock);\n  398 | }","lines":34}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"n_read/n_write busy-loop on EAGAIN: the loop treats EAGAIN/EINTR identically and immediately retries with no blocking/poll. _pty_getpt explicitly clears O_NONBLOCK, and the sync handshake fds are pipes (blocking), so in practice they block; but if any fd here is ever non-blocking these helpers spin at 100% CPU. Fragile coupling between fd blocking-mode and these helpers.","fix":"On EAGAIN, poll() the fd for readiness instead of immediate retry, or assert/ensure the fds are blocking.","locations":[{"ref":"daemon/pty_open.c:244-308","code":"  244 | /* Like read, but hide EINTR and EAGAIN. */\n  245 | static ssize_t\n  246 | n_read(int fd, void *buffer, size_t count)\n  247 | {\n  248 | \tsize_t n = 0;\n  249 | \tchar *buf = buffer;\n  250 | \tint i;\n  251 | \twhile (n < count) {\n  252 | \t\ti = read(fd, buf + n, count - n);\n  253 | \t\tswitch (i) {\n  254 | \t\tcase 0:\n  255 | \t\t\treturn n;\n  256 | \t\t\tbreak;\n  257 | \t\tcase -1:\n  258 | \t\t\tswitch (errno) {\n  259 | \t\t\tcase EINTR:\n  260 | \t\t\tcase EAGAIN:\n  261 | #ifdef ERESTART\n  262 | \t\t\tcase ERESTART:\n  263 | #endif\n  264 | \t\t\t\tbreak;\n  265 | \t\t\tdefault:\n  266 | \t\t\t\treturn -1;\n  267 | \t\t\t}\n  268 | \t\t\tbreak;\n  269 | \t\tdefault:\n  270 | \t\t\tn += i;\n  271 | \t\t\tbreak;\n  272 | \t\t}\n  273 | \t}\n  274 | \treturn n;\n  275 | }\n  276 | \n  277 | /* Like write, but hide EINTR and EAGAIN. */\n  278 | static ssize_t\n  279 | n_write(int fd, const void *buffer, size_t count)\n  280 | {\n  281 | \tsize_t n = 0;\n  282 | \tconst char *buf = buffer;\n  283 | \tint i;\n  284 | \twhile (n < count) {\n  285 | \t\ti = write(fd, buf + n, count - n);\n  286 | \t\tswitch (i) {\n  287 | \t\tcase 0:\n  288 | \t\t\treturn n;\n  289 | \t\t\tbreak;\n  290 | \t\tcase -1:\n  291 | \t\t\tswitch (errno) {\n  292 | \t\t\tcase EINTR:\n  293 | \t\t\tcase EAGAIN:\n  294 | #ifdef ERESTART\n  295 | \t\t\tcase ERESTART:\n  296 | #endif\n  297 | \t\t\t\tbreak;\n  298 | \t\t\tdefault:\n  299 | \t\t\t\treturn -1;\n  300 | \t\t\t}\n  301 | \t\t\tbreak;\n  302 | \t\tdefault:\n  303 | \t\t\tn += i;\n  304 | \t\t\tbreak;\n  305 | \t\t}\n  306 | \t}\n  307 | \treturn n;\n  308 | }","lines":65}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In handle_mount_unmount/handle_volume_mount/handle_drive_eject/handle_drive_stop/handle_drive_start/handle_drive_poll_for_media the daemon resolves the target object by enumerating the full GVolumeMonitor list and g_strdup_printf(\"%p\") for every element to string-compare against arg_id. This is O(n) string formatting per D-Bus call for what is effectively a pointer lookup, repeated across six handlers.","fix":"Consider parsing arg_id once and comparing pointers, or maintaining an id->object hash, instead of formatting every candidate's pointer to a string.","locations":[{"ref":"monitor/proxy/gvfsproxyvolumemonitordaemon.c:1019-1031","code":" 1019 |   for (l = mounts; l != NULL; l = l->next)\n 1020 |     {\n 1021 |       char *mount_id;\n 1022 |       gboolean same;\n 1023 | \n 1024 |       mount = G_MOUNT (l->data);\n 1025 |       mount_id = g_strdup_printf (\"%p\", mount);\n 1026 |       same = strcmp (mount_id, arg_id) == 0;\n 1027 |       g_free (mount_id);\n 1028 | \n 1029 |       if (same)\n 1030 |         break;\n 1031 |     }","lines":13},{"ref":"monitor/proxy/gvfsproxyvolumemonitordaemon.c:1258-1270","code":" 1258 |   for (l = volumes; l != NULL; l = l->next)\n 1259 |     {\n 1260 |       char *volume_id;\n 1261 |       gboolean same;\n 1262 | \n 1263 |       volume = G_VOLUME (l->data);\n 1264 |       volume_id = g_strdup_printf (\"%p\", volume);\n 1265 |       same = strcmp (volume_id, arg_id) == 0;\n 1266 |       g_free (volume_id);\n 1267 | \n 1268 |       if (same)\n 1269 |     while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
