","type_label":"Copy Paste","severity":"low","easy":false,"description":"find_volume_for_device() and mount_point_has_device() contain near-identical 25+ line blocks parsing LABEL=/UUID=/PARTLABEL=/PARTUUID=/dev/ prefixes to resolve a device path (including the same udisks_client_get_block_for_label/uuid and _udisks_client_get_device_for_part calls). They have diverged subtly: mount_point_has_device returns TRUE for non-/dev/ specs (network mounts) while find_volume_for_device goes to out (returns NULL). Maintaining two copies risks fixing the UAF (see use_after_free finding) in only one place.","fix":"Extract a shared helper that resolves a mount-point/fstab device spec to a real /dev path (returning an owned string), and call it from both functions.","locations":[{"ref":"monitor/udisks2/gvfsudisks2volumemonitor.c:1418-1476","code":" 1418 | static GVfsUDisks2Volume *\n 1419 | find_volume_for_device (GVfsUDisks2VolumeMonitor *monitor,\n 1420 |                         const gchar              *device)\n 1421 | {\n 1422 |   GVfsUDisks2Volume *ret = NULL;\n 1423 |   GList *blocks = NULL;\n 1424 |   struct stat statbuf;\n 1425 |   guint64 dev_id;\n 1426 | \n 1427 |   /* don't consider e.g. network mounts */\n 1428 |   if (g_str_has_prefix (device, \"LABEL=\"))\n 1429 |     {\n 1430 |       blocks = udisks_client_get_block_for_label (monitor->client, device + 6);\n 1431 |       if (blocks != NULL)\n 1432 |         device = udisks_block_get_device (UDISKS_BLOCK (blocks->data));\n 1433 |       else\n 1434 |         goto out;\n 1435 |     }\n 1436 |   else if (g_str_has_prefix (device, \"UUID=\"))\n 1437 |     {\n 1438 |       blocks = udisks_client_get_block_for_uuid (monitor->client, device + 5);\n 1439 |       if (blocks != NULL)\n 1440 |         device = udisks_block_get_device (UDISKS_BLOCK (blocks->data));\n 1441 |       else\n 1442 |         goto out;\n 1443 |     }\n 1444 |   else if (g_str_has_prefix (device, \"PARTLABEL=\"))\n 1445 |     {\n 1446 |       device = _udisks_client_get_device_for_part (monitor->client, device + 10, NULL);\n 1447 |     }\n 1448 |   else if (g_str_has_prefix (device, \"PARTUUID=\"))\n 1449 |     {\n 1450 |       device = _udisks_client_get_device_for_part (monitor->client, NULL, device + 9);\n 1451 |     }\n 1452 |   else if (!g_str_has_prefix (device, \"/dev/\"))\n 1453 |     {\n 1454 |       goto out;\n 1455 |     }\n 1456 | \n 1457 |   if (device == NULL)\n 1458 |     goto out;\n 1459 | \n 1460 |   if (stat (device, &statbuf) != 0)\n 1461 |     goto out;\n 1462 | \n 1463 |   dev_id = (guint64) statbuf.st_rdev;\n 1464 | \n 1465 |   ret = g_hash_table_lookup (monitor->volumes_by_dev_id, &dev_id);\n 1466 |   if (ret != NULL)\n 1467 |     goto out;\n 1468 | \n 1469 |   ret = g_hash_table_lookup (monitor->disc_volumes_by_dev_id, &dev_id);\n 1470 |   if (ret != NULL)\n 1471 |     goto out;\n 1472 | \n 1473 |  out:\n 1474 |   g_list_free_full (blocks, g_object_unref);\n 1475 |   return ret;\n 1476 | }","lines":59},{"ref":"monitor/udisks2/gvfsudisks2volumemonitor.c:1648-1727","code":" 1648 | static gboolean\n 1649 | mount_point_has_device (GVfsUDisks2VolumeMonitor  *monitor,\n 1650 |                         GUnixMountPoint           *mount_point)\n 1651 | {\n 1652 |   gboolean ret = FALSE;\n 1653 |   const gchar *device;\n 1654 |   struct stat statbuf;\n 1655 |   UDisksBlock *block;\n 1656 |   GList *blocks = NULL;\n 1657 | \n 1658 |   device = g_unix_mount_point_get_device_path (mount_point);\n 1659 |   if (g_str_has_prefix (device, \"LABEL=\"))\n 1660 |     {\n 1661 |       blocks = udisks_client_get_block_for_label (monitor->client, device + 6);\n 1662 |       if (blocks != NULL)\n 1663 |         device = udisks_block_get_device (UDISKS_BLOCK (blocks->data));\n 1664 |       else\n 1665 |         goto out;\n 1666 |     }\n 1667 |   else if (g_str_has_prefix (device, \"UUID=\"))\n 1668 |     {\n 1669 |       blocks = udisks_client_get_block_for_uuid (monitor->client, device + 5);\n 1670 |       if (blocks != NULL)\n 1671 |         device = udisks_block_get_device (UDISKS_BLOCK (blocks->data));\n 1672 |       else\n 1673 |         goto out;\n 1674 |     }\n 1675 |   else if (g_str_has_prefix (device, \"PARTLABEL=\"))\n 1676 |     {\n 1677 |       device = _udisks_client_get_device_for_part (monitor->client, device + 10, NULL);\n 1678 |     }\n 1679 |   else if (g_str_has_prefix (device, \"PARTUUID=\"))\n 1680 |     {\n 1681 |       device = _udisks_client_get_device_for_part (monitor->client, NULL, device + 9);\n 1682 |     }\n 1683 |   else if (!g_str_has_prefix (device, \"/dev/\"))\n 1684 |     {\n 1685 |       /* NFS, CIFS and other non-device mounts always have a device */\n 1686 |       ret = TRUE;\n 1687 |       goto out;\n 1688 |     }\n 1689 | \n 1690 |   if (device == NULL)\n 1691 |     goto out;\n 1692 | \n 1693 |   if (stat (device, &statbuf) != 0)\n 1694 |     goto out;\n 1695 | \n 1696 |   if (statbuf.st_rdev == 0)\n 1697 |     goto out;\n 1698 | \n 1699 |   /* assume non-existant if media is not available */\n 1700 |   block = udisks_client_get_block_for_dev (monitor->client, statbuf.st_rdev);\n 1701 |   if (block != NULL)\n 1702 |     {\n 1703 |       UDisksDrive *drive;\n 1704 |       drive = udisks_client_get_drive_for_block (monitor->client, block);\n 1705 |       if (drive != NULL)\n 1706 |         {\n 1707 |           if (!udisks_drive_get_media_available (drive))\n 1708 |             {\n 1709 |               g_object_unref (drive);\n 1710 |               g_object_unref (block);\n 1711 |               goto out;\n 1712 |             }\n 1713 |           g_object_unref (drive);\n 1714 |         }\n 1715 |       g_object_unref (block);\n 1716 |     }\n 1717 |   else\n 1718 |     {\n 1719 |       /* not known by udisks, assume media is available */\n 1720 |     }\n 1721 | \n 1722 |   ret = TRUE;\n 1723 | \n 1724 |  out:\n 1725 |   g_list_free_full (blocks, g_object_unref);\n 1726 |   return ret;\n 1727 | }","lines":80}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"read_data_cb() and read_dsi_header_cb() call exit(0) whenever a read fails (host closed connection, I/O error, etc.). A remote AFP server (or any network disruption) can therefore terminate the whole gvfsd-afp daemon process by simply dropping the connection. This is a denial-of-service and also abandons any other mounts handled by the same process.","fix":"Replace exit(0) with a clean teardown of the connection: transition to STATE_CLOSED, fail all pending requests with G_IO_ERROR_CLOSED, and quit the worker main loop instead of killing the process.","locations":[{"ref":"daemon/gvfsafpconnection.c:1056-1069","code":" 1056 |   result = read_all_finish (input, res, NULL, &err);\n 1057 |   if (!result)\n 1058 |   {\n 1059 |     if (g_error_matches (err, G_IO_ERROR, G_IO_ERROR_CLOSED) ||\n 1060 |         g_error_matches (err, G_IO_ERROR, G_IO_ERROR_CONNECTION_CLOSED))\n 1061 |     {\n 1062 |       g_message (_(\"Host closed connection\"));\n 1063 |     }\n 1064 |     else\n 1065 |     {\n 1066 |       g_warning (\"FAIL!!! \\\"%s\\\"\\n\", err->message);\n 1067 |     }\n 1068 |     exit (0);\n 1069 |   }","lines":14},{"ref":"daemon/gvfsafpconnection.c:1098-1111","code":" 1098 |   result = read_all_finish (input, res, NULL, &err);\n 1099 |   if (!result)\n 1100 |   {\n 1101 |     if (g_error_matches (err, G_IO_ERROR, G_IO_ERROR_CLOSED) ||\n 1102 |         g_error_matches (err, G_IO_ERROR, G_IO_ERROR_CONNECTION_CLOSED))\n 1103 |     {\n 1104 |       g_message (_(\"Host closed connection\"));\n 1105 |     }\n 1106 |     else\n 1107 |     {\n 1108 |       g_warning (\"FAIL!!! \\\"%s\\\"\\n\", err->message);\n 1109 |     }\n 1110 |     exit (0);\n 1111 |   }","lines":14}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"g_vfs_ftp_task_login() is declared to return gboolean but assigns and returns the guint FTP status code (status). Callers compare the result with != 0, so a 0 status (send failure) is treated as failure correctly, but the function semantics are confused: it returns the raw status (e.g. 530, 230) as if a boolean. Worse, when the USER command returns a non-3xx, non-2xx code, no PASS is sent and the raw status is returned; do_mount relies on task.error being set for the retry loop, not the return value.","fix":"Return a proper gboolean (e.g. !g_vfs_ftp_task_is_in_error(task)) or change the declared return type to guint and document it. Make the success/failure contract explicit and consistent with callers in do_mount().","locations":[{"ref":"daemon/gvfsftptask.c:78-112","code":"   78 | gboolean\n   79 | g_vfs_ftp_task_login (GVfsFtpTask *task,\n   80 |                       const char * username,\n   81 |                       const char * password)\n   82 | {\n   83 |   guint status;\n   84 | \n   85 |   g_return_val_if_fail (task != NULL, FALSE);\n   86 |   g_return_val_if_fail (username != NULL, FALSE);\n   87 |   g_return_val_if_fail (password != NULL, FALSE);\n   88 | \n   89 |   if (g_vfs_ftp_task_is_in_error (task))\n   90 |     return FALSE;\n   91 | \n   92 |   status = g_vfs_ftp_task_send (task, G_VFS_FTP_PASS_300,\n   93 |                                 \"USER %s\", username);\n   94 |  \n   95 |   if (G_VFS_FTP_RESPONSE_GROUP (status) == 3)\n   96 |     {\n   97 |       /* rationale for choosing the default password:\n   98 |        * - some ftp servers expect something that looks like an email address\n   99 |        * - we don't want to send the user's name or address, as that would be\n  100 |        *   a privacy problem\n  101 |        * - we want to give ftp server administrators a chance to notify us of\n  102 |        *   problems with our client.\n  103 |        * - we don't want to drown in spam.\n  104 |        */\n  105 |       if (password == NULL || password[0] == 0)\n  106 |         password = \"gvfsd-ftp-\" VERSION \"@example.com\";\n  107 |       status = g_vfs_ftp_task_send (task, 0,\n  108 |         \t\t\t    \"PASS %s\", password);\n  109 |     }\n  110 | \n  111 |   return status;\n  112 | }","lines":35}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"In the child process, after the final open(path, O_RDWR) to acquire the controlling terminal, a failure does `return -1;` instead of `_exit()`. This returns out of _pty_fork_on_pty_name into _pty_open_unix98 and ultimately pty_open *inside the forked child*, so the child continues executing parent code paths (the GVfs daemon main loop, atexit handlers, etc.) with duplicated state - a classic fork-without-exec disaster. Every other failure point in the child correctly calls _exit().","fix":"Replace `return -1;` with `_exit (127);` (or _exit(1)) in the child open-failure branch, matching the other child error paths.","locations":[{"ref":"daemon/pty_open.c:535-538","code":"  535 | \t\tfd = open(path, O_RDWR);\n  536 | \t\tif (fd == -1) {\n  537 | \t\t\treturn -1;\n  538 | \t\t}","lines":4}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"In on_mount_operation_reply(), when result != G_MOUNT_OPERATION_HANDLED and the operation is flagged x-udisks2-is-unlocked, the code looks up the cleartext block. If cleartext_block is NULL (the unlock did not actually produce a cleartext device), none of the inner branches call g_task_return_* , yet execution falls through to g_object_unref(task) at the end of the block. The GTask is unreffed without ever being completed, so the caller's GAsyncReadyCallback never fires and mount_finish is never reached - the mount operation hangs and the task data (passphrase etc.) is destroyed without resolution.","fix":"Add an else branch (cleartext_block == NULL) that calls g_task_return_new_error(...) before the shared g_object_unref(task), so the task is always completed on this path.","locations":[{"ref":"monitor/udisks2/gvfsudisks2volume.c:1322-1372","code":" 1322 |   if (result != G_MOUNT_OPERATION_HANDLED)\n 1323 |     {\n 1324 |       if (GPOINTER_TO_INT (g_object_get_data (G_OBJECT (data->mount_operation), \"x-udisks2-is-unlocked\")) == 1)\n 1325 |         {\n 1326 |           UDisksClient *client;\n 1327 |           UDisksBlock *cleartext_block;\n 1328 | \n 1329 |           g_object_set_data (G_OBJECT (data->mount_operation), \"x-udisks2-is-unlocked\", GINT_TO_POINTER (0));\n 1330 | \n 1331 |           client = gvfs_udisks2_volume_monitor_get_udisks_client (volume->monitor);\n 1332 |           cleartext_block = udisks_client_get_cleartext_block (client, volume->block);\n 1333 |           if (cleartext_block != NULL)\n 1334 |             {\n 1335 |               UDisksObject *object;\n 1336 | \n 1337 |               object = UDISKS_OBJECT (g_dbus_interface_get_object (G_DBUS_INTERFACE (cleartext_block)));\n 1338 |               g_object_unref (cleartext_block);\n 1339 |               if (object != NULL)\n 1340 |                 {\n 1341 |                   data->filesystem_to_mount = udisks_object_get_filesystem (object);\n 1342 |                   if (data->filesystem_to_mount != NULL)\n 1343 |                     {\n 1344 |                       do_mount (task);\n 1345 |                       return;\n 1346 |                     }\n 1347 |                   else\n 1348 |                     {\n 1349 |                       g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED,\n 1350 |                                                \"No filesystem interface on D-Bus object for cleartext device\");\n 1351 |                     }\n 1352 |                 }\n 1353 |               else\n 1354 |                 {\n 1355 |                   g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED,\n 1356 |                                            \"No object for D-Bus interface\");\n 1357 |                 }\n 1358 |             }\n 1359 |         }\n 1360 |       else if (result == G_MOUNT_OPERATION_ABORTED)\n 1361 |         {\n 1362 |           /* The user aborted the operation so consider it \"handled\" */\n 1363 |           g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED_HANDLED,\n 1364 |                                    \"Password dialog aborted\");\n 1365 |         }\n 1366 |       else\n 1367 |         {\n 1368 |           g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_PERMISSION_DENIED,\n 1369 |                                    \"Expected G_MOUNT_OPERATION_HANDLED but got %d\", result);\n 1370 |         }\n 1371 |       g_object_unref (task);\n 1372 |       return;","lines":51}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"After a partial header read the code reads get_reply_header_missing_bytes (based on daemon-supplied reply.arg2) and then g_string_set_size(input_buffer, current_len + len) followed by a blocking read of that size. There is no upper bound on arg2 (REPLY_ERROR/REPLY_INFO/REPLY_CLOSED extra-data length, up to ~4 GiB). A malicious or buggy daemon can force multi-gigabyte client-side allocations and blocking reads - a memory/DoS amplification. Unlike data blocks (capped via MIN against buffer_size), the header extra-data path has no cap.","fix":"Bound arg2 in get_reply_header_missing_bytes (reject replies whose extra-data length exceeds a sane maximum, e.g. a few MiB) and fail the stream with a protocol error instead of allocating attacker-controlled sizes.","locations":[{"ref":"client/gdaemonfileinputstream.c:439-455","code":"  439 | {\n  440 |   GVfsDaemonSocketProtocolReply *reply;\n  441 |   guint32 type;\n  442 |   guint32 arg2;\n  443 |   \n  444 |   if (buffer->len < G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_SIZE)\n  445 |     return G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_SIZE - buffer->len;\n  446 | \n  447 |   reply = (GVfsDaemonSocketProtocolReply *)buffer->str;\n  448 | \n  449 |   type = g_ntohl (reply->type);\n  450 |   arg2 = g_ntohl (reply->arg2);\n  451 |   \n  452 |   if (type == G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_ERROR ||\n  453 |       type == G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_INFO)\n  454 |     return G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_SIZE + arg2 - buffer->len;\n  455 |   return 0;","lines":17},{"ref":"client/gdaemonfileinputstream.c:742-759","code":"  742 | \t  if (io_op->io_res > 0)\n  743 | \t    {\n  744 | \t      gsize unread_size = io_op->io_size - io_op->io_res;\n  745 | \t      g_string_set_size (file->input_buffer,\n  746 | \t\t\t\t file->input_buffer->len - unread_size);\n  747 | \t    }\n  748 | \t  \n  749 | \t  len = get_reply_header_missing_bytes (file->input_buffer);\n  750 | \t  if (len > 0)\n  751 | \t    {\n  752 | \t      gsize current_len = file->input_buffer->len;\n  753 | \t      g_string_set_size (file->input_buffer,\n  754 | \t\t\t\t current_len + len);\n  755 | \t      io_op->io_buffer = file->input_buffer->str + current_len;\n  756 | \t      io_op->io_size = len;\n  757 | \t      io_op->io_allow_cancel = file->input_buffer->len == 0 && !op->sent_cancel;\n  758 | \t      return STATE_OP_READ;\n  759 | \t    }","lines":18},{"ref":"client/gdaemonfileoutputstream.c:393-406","code":"  393 |   if (buffer->len < G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_SIZE)\n  394 |     return G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_SIZE - buffer->len;\n  395 | \n  396 |   reply = (GVfsDaemonSocketProtocolReply *)buffer->str;\n  397 | \n  398 |   type = g_ntohl (reply->type);\n  399 |   arg2 = g_ntohl (reply->arg2);\n  400 | \n  401 |   /* ERROR, CLOSED and INFO has extra data w/ len in arg2 */\n  402 |   if (type == G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_ERROR ||\n  403 |       type == G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_CLOSED ||\n  404 |       type == G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_INFO)\n  405 |     return G_VFS_DAEMON_SOCKET_PROTOCOL_REPLY_SIZE + arg2 - buffer->len;\n  406 |   return 0;","lines":14}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"g_daemon_vfs_init calls g_bus_get_sync(G_BUS_TYPE_SESSION, NULL, NULL) discarding the GError and returns early on failure, before 'the_vfs' is assigned. the_vfs therefore stays NULL on init failure. Public helpers such as _g_daemon_vfs_get_mount_spec_for_path dereference the_vfs->to_uri_hash (line 439) and would NULL-deref the_vfs if invoked when init bailed out.","fix":"Assign the_vfs before the bus check, or have the public _g_daemon_vfs_* helpers guard against the_vfs == NULL; at minimum document that these must not be called when the vfs is inactive.","locations":[{"ref":"client/gdaemonvfs.c:286-292","code":"  286 |   vfs->async_bus = g_bus_get_sync (G_BUS_TYPE_SESSION, NULL, NULL);\n  287 | \n  288 |   if (vfs->async_bus == NULL)\n  289 |     return; /* Not supported, return here and return false in vfs_is_active() */\n  290 | \n  291 |   g_assert (the_vfs == NULL);\n  292 |   the_vfs = vfs;","lines":7},{"ref":"client/gdaemonvfs.c:439","code":"  439 |   mapper = g_hash_table_lookup (the_vfs->to_uri_hash, type);","lines":1}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"errno_from_error maps several distinct GIO errors to EIO (e.g. TIMED_OUT, CANCELLED, NOT_MOUNTED) and returns EIO for any non-G_IO_ERROR domain unconditionally, losing fidelity (timeouts surface as EIO rather than ETIMEDOUT, breaking some callers' retry/recovery logic).","fix":"Expand the map with faithful errno values (TIMED_OUT->ETIMEDOUT, CANCELLED->EINTR, NOT_MOUNTED->ENXIO/ENODEV) and handle a few common non-GIO domains.","locations":[{"ref":"client/gvfsfusedaemon.c:160-181","code":"  160 |       { G_IO_ERROR_TIMED_OUT,          EIO          },\n  161 |       { G_IO_ERROR_BUSY,               EBUSY        },\n  162 |       { G_IO_ERROR_WOULD_BLOCK,        EAGAIN       },\n  163 |       { G_IO_ERROR_WOULD_RECURSE,      EXDEV        },\n  164 |       { G_IO_ERROR_WOULD_MERGE,        ENOTEMPTY    },\n  165 |       { -1,                            -1           }\n  166 |     };\n  167 | \n  168 |   if (error->domain != G_IO_ERROR)\n  169 |     return EIO;\n  170 | \n  171 |   for (i = 0; error_map [i].gioerror >= 0; i++)\n  172 |     {\n  173 |       if (error_map [i].gioerror == error->code)\n  174 |         break;\n  175 |     }\n  176 | \n  177 |   if (error_map [i].gioerror >= 0)\n  178 |     return error_map [i].errno_value;\n  179 | \n  180 |   return EIO;\n  181 | }","lines":22}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In read_stream's skip-ahead branch, n_bytes_skipped is declared gint but assigned from g_input_stream_skip which returns gssize. For large skip distances (offset - fh->pos can exceed INT_MAX on big files) this truncates, and a wrapped/negative value mishandles the position tracking.","fix":"Declare n_bytes_skipped as gssize.","locations":[{"ref":"client/gvfsfusedaemon.c:1299-1302","code":" 1299 |           n_bytes_skipped = g_input_stream_skip (input_stream, offset - fh->pos, NULL, &error);\n 1300 | \n 1301 |           if (n_bytes_skipped > 0)\n 1302 |             fh->pos += n_bytes_skipped;","lines":4}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In write_stream, after a successful write_all the code advances fh->pos += n_bytes_written and sets result = n_bytes_written, then flushes; on flush failure it overwrites result with -errno but leaves fh->pos/fh->size already advanced as if the write succeeded. On flush failure the kernel sees an error yet the daemon's internal position/size reflect a committed write, corrupting subsequent offset tracking.","fix":"Only advance fh- rror);\n 1693 |         }\n 1694 |       else\n 1695 |         {\n 1696 |           reindex_file_handle_for_path (old_path, new_path);\n 1697 |         }\n 1698 | \n 1699 |       if (fh)\n 1700 |         {\n 1701 |           g_mutex_unlock (&fh->mutex);\n 1702 |           file_handle_unref (fh);\n 1703 |         }","lines":27},{"ref":"client/gvfsfusedaemon.c:350-372","code":"  350 | static void\n  351 | reindex_file_handle_for_path (const gchar *old_path, const gchar *new_path)\n  352 | {\n  353 |   gchar      *old_path_internal;\n  354 |   FileHandle *fh;\n  355 | \n  356 |   g_mutex_lock (&global_mutex);\n  357 | \n  358 |   if (!g_hash_table_lookup_extended (global_path_to_fh_map, old_path,\n  359 |                                      (gpointer *) &old_path_internal,\n  360 |                                      (gpointer *) &fh))\n  361 |       goto out;\n  362 | \n  363 |   g_hash_table_steal (global_path_to_fh_map, old_path);\n  364 | \n  365 |   g_free (fh->path);\n  366 |   fh->path = g_strdup (new_path);\n  367 | \n  368 |   g_hash_table_insert (global_path_to_fh_map, fh->path, fh);\n  369 | \n  370 |  out:\n  371 |   g_mutex_unlock (&global_mutex);\n  372 | }","lines":23}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"vfs_init can return NULL on D-Bus/proxy failure, after which FUSE continues running with dbus_conn/gvfs/volume_monitor partially or never initialized. Subsequent VFS callbacks dereference volume_monitor (e.g. via mount_list_update / g_volume_monitor_get_mounts), leading to NULL-deref or operating without the gvfs backend. The init failure is not propagated as a fatal mount failure.","fix":"On unrecoverable init failure, abort the mount (call fuse_exit / exit) rather than returning NULL and limping along with NULL globals.","locations":[{"ref":"client/gvfsfusedaemon.c:2405-2467","code":" 2405 | vfs_init (struct fuse_conn_info *conn, struct fuse_config ing resources\n(gp_context_new, gp_camera_new, gp_port_info_list_new/load, gp_camera_init,\ngudev client + signal handler) but none of them call release_device() or free\nthe partially-built state before returning the failed job. The port info list\n`il` in particular is leaked on every error path between gp_port_info_list_new()\n(line 1337) and gp_port_info_list_free() (line 1388), e.g. the\nGP_ERROR_UNKNOWN_PORT path, the get_info failure, and the set_port_info failure.\nAlthough the backend object is finalized on mount failure (which calls\nrelease_device), `il` is a local not tracked by the backend and is leaked.","fix":"Add a single error label that does gp_port_info_list_free(il) (and frees other locals) before failing the job, and goto it from each error branch.","locations":[{"ref":"daemon/gvfsbackendgphoto2.c:1356-1388","code":" 1356 | \n 1357 |   n = gp_port_info_list_lookup_path (il, gphoto2_backend->gphoto2_port);\n 1358 |   if (n == GP_ERROR_UNKNOWN_PORT)\n 1359 |     {\n 1360 |       error = get_error_from_gphoto2 (_(\"Error looking up device information\"), rc);\n 1361 |       g_vfs_job_failed_from_error (G_VFS_JOB (job), error);\n 1362 |       g_error_free (error);\n 1363 |       return;\n 1364 |     }\n 1365 | \n 1366 |   rc = gp_port_info_list_get_info (il, n, &info);\n 1367 |   if (rc != 0)\n 1368 |     {\n 1369 |       error = get_error_from_gphoto2 (_(\"Error getting device information\"), rc);\n 1370 |       g_vfs_job_failed_from_error (G_VFS_JOB (job), error);\n 1371 |       g_error_free (error);\n 1372 |       return;\n 1373 |     }\n 1374 | \n 1375 | #ifndef HAVE_GPHOTO25\n 1376 |   g_debug (\"  '%s' '%s' '%s'\\n\",  info.name, info.path, info.library_filename);\n 1377 | #endif\n 1378 |   \n 1379 |   /* set port */\n 1380 |   rc = gp_camera_set_port_info (gphoto2_backend->camera, info);\n 1381 |   if (rc != 0)\n 1382 |     {\n 1383 |       error = get_error_from_gphoto2 (_(\"Error setting up camera communications port\"), rc);\n 1384 |  |   g_data_input_stream_set_newline_type (data, G_DATA_STREAM_NEWLINE_TYPE_LF);\n  667 |   while ((line = g_data_input_stream_read_line (data, &length, cancellable, error)))\n  668 |     {\n  669 |       struct list_result result = { 0, };\n  670 |       GFileType file_type = G_FILE_TYPE_UNKNOWN;\n  671 |       time_t mtime;\n  672 | \n  673 |       /* strip trailing \\r - ParseFTPList only removes it if the line ends in \\r\\n,\n  674 |        * but we stripped the \\n already.\n  675 |        */\n  676 |       if (length > 0 && line[length - 1] == '\\r')\n  677 |         line[--length] = '\\0';\n  678 | \n  679 |       g_debug (\"<<%2d <<  %s\\n\", debug_id, line);\n  680 |       type = ParseFTPList (line, &state, &result);\n  681 |       if (type != 'd' && type != 'f' && type != 'l')\n  682 |         {\n  683 |           g_free (line);\n  684 |           continue;\n  685 |         }\n  686 | \n  687 |       /* don't list . and .. directories\n  688 |        * Let's hope they're not important files on some ftp servers\n  689 |        */\n  690 |       if (result.fe_fnlen == 1 &&\n  691 |           result.fe_fname[0] == '.')\n  692 |         {\n  693 |           g_free (line);\n  694 |           continue;\n  695 |         }\n  696 |       if (result.fe_fnlen == 2 &&\n  697 |           result.fe_fname[0] == '.' &&\n  698 |           result.fe_fname[1] == '.')\n  699 |         {\n  700 |           g_free (line);\n  701 |           continue;\n  702 |         }\n  703 | \n  704 |       s = g_strndup (result.fe_fname, result.fe_fnlen);\n  705 |       file = g_vfs_ftp_file_new_child  (dir, s, NULL);\n  706 |       g_free (s);\n  707 |       if (file == NULL)\n  708 |         {\n  709 |           g_debug (\"# invalid filename, skipping\");\n  710 |           g_free (line);\n  711 |           continue;\n  712 |         }\n  713 | \n  714 |       info = g_file_info_new ();\n  715 | \n  716 |       s = g_path_get_basename (g_vfs_ftp_file_get_gvfs_path (file));\n  717 |       g_file_info_set_name (info, s);\n  718 |       g_free (s);\n  719 | \n  720 |       if (type == 'l')\n  721 |         {\n  722 |           char *link;\n  723 | \n  724 |           /* Malformed listing may leave fe_lname NULL / fe_lnlen 0 */\n  725 |           if (result.fe_lname != NULL && result.fe_lnlen > 0)\n  726 |             link = g_strndup (result.fe_lname, result.fe_lnlen);\n  727 |           else\n  728 |             link = g_strdup (\"\");\n  729 | \n  730 |           g_file_info_set_symlink_target (info, link);\n  731 |           g_file_info_set_is_symlink (info, TRUE);\n  732 |           g_free (link);\n  733 |         }\n  734 |       else\n  735 |         g_file_info_set_is_symlink (info, FALSE);\n  736 | \n  737 |       g_file_info_set_size (info, g_ascii_strtoull (result.fe_size, NULL, 10));\n  738 | \n  739 |       /* If unix format then parse the attributes */\n  740 |       if (state.lstyle == 'U')\n  741 |         {\n  742 |           char file_mode[10], uid[64], gid[64];\n  743 |           guint32 mode;\n  744 | \n  745 |           /* POSIX ls -l form: mode, links, owner, group */\n  746 |           if (sscanf(line, \"%10c %*u %63s %63s\", file_mode, uid, gid) == 3)\n  747 |             {\n  748 |               if (g_vfs_ftp_parse_mode (file_mode, &mode, &file_type))\n  749 |                 {\n  750 |                   g_file_info_set_attribute_uint32 (info, G_FILE_ATTRIBUTE_UNIX_MODE, mode);\n  751 |                   g_file_info_set_attribute_string (info, G_FILE_ATTRIBUTE_OWNER_USER, uid);\n  752 |                   g_file_info_set_attribute_string (info, G_FILE_ATTRIBUTE_OWNER_GROUP, gid);\n  753 |                 }\n  754 |             }\n  755 |           else\n  756 |             g_debug (\"# unknown listing format\\n\");\n  757 |         }\n  758 | \n  759 |       g_file_info_set_attribute_boolean (info, G_FILE_ATTRIBUTE_ACCESS_CAN_TRASH, FALSE);\n  760 | \n  761 |       if (file_type == G_FILE_TYPE_UNKNOWN)\n  762 |         {\n  763 sues as long as fd_list closes all its fd's when it's finalized */\n  213 |   close (remote_fd);\n  214 |   g_object_unref (fd_list);","lines":27}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Same defect as in gvfsjobopenforread.c: when g_unix_fd_list_append() fails (fd_id == -1) the error is merely warned and the code proceeds to complete open_for_write / open_for_write_flags with the invalid handle index -1 and an fd_list missing the descriptor, handing the client a broken write stream while the backend handle has already been transferred into the channel.","fix":"On fd_id == -1, return a D-Bus error (G_IO_ERROR_TOO_MANY_OPEN_FILES), unref the channel and fd_list, and abort instead of completing the call.","locations":[{"ref":"daemon/gvfsjobopenforwrite.c:361-394","code":"  361 |   fd_list = g_unix_fd_list_new ();\n  362 |   error = NULL;\n  363 |   fd_id = g_unix_fd_list_append (fd_list, remote_fd, &error);\n  364 |   if (fd_id == -1)\n  365 |     {\n  366 |       g_warning (\"create_reply: %s (%s, %d)\\n\", error->message, g_quark_to_string (error->domain), error->code);\n  367 |       g_error_free (error);\n  368 |     }\n  369 | \n  370 |   g_vfs_channel_set_backend_handle (G_VFS_CHANNEL (channel), open_job->backend_handle);\n  371 |   open_job->backend_handle = NULL;\n  372 |   open_job->write_channel = channel;\n  373 | \n  374 |   g_signal_emit_by_name (job, \"new-source\", open_job->write_channel);\n  375 | \n  376 |   switch (open_job->version)\n  377 |     {\n  378 |       case OPEN_FOR_WRITE_VERSION_ORIGINAL:\n  379 |         gvfs_dbus_mount_complete_open_for_write (object, invocation,\n  380 |                                                  fd_list, g_variant_new_handle (fd_id),\n  381 |                                                  open_job->can_seek ? OPEN_FOR_WRITE_FLAG_CAN_SEEK : 0,\n  382 |                                                  open_job->initial_offset);\n  383 |         break;\n  384 |       case OPEN_FOR_WRITE_VERSION_WITH_FLAGS:\n  385 |         gvfs_dbus_mount_complete_open_for_write_flags (object, invocation,\n  386 |                                                  fd_list, g_variant_new_handle (fd_id),\n  387 |                                                  (open_job->can_seek ? OPEN_FOR_WRITE_FLAG_CAN_SEEK : 0) |\n  388 |                                                  (open_job->can_truncate ? OPEN_FOR_WRITE_FLAG_CAN_TRUNCATE : 0),\n  389 |                                                  open_job->initial_offset);\n  390 |         break;\n  391 |     }\n  392 |   \n  393 |   close (remote_fd);\n  394 |   g_object_unref (fd_list);","lines":34}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"meta_builder_write: after g_mkstemp succeeds and the temp file is written, if meta_builder_create_new_journal() fails the code jumps to 'out' which unlinks the temp file - good - but the partially-created journal (if create_new_journal wrote then chmod-failed it still returns TRUE) and, more importantly, the function leaves the original tree file unrotated and its old journal in place while having discarded the new data. Additionally mmap at line 1242 of the old file is not checked to be at least RANDOM_TAG_OFFSET+4 bytes; a truncated/garbage pre-existing file would map fewer bytes and the *(guint32*)(data+RANDOM_TAG_OFFSET) read could fault. Old files are normally 32-byte headers so impact is low.","fix":"fstat fd2 and skip the rotate/mmap if size < RANDOM_TAG_OFFSET+4; ensure failure paths after journal creation clean up the just-created journal file.","locations":[{"ref":"metadata/metabuilder.c:1211-1255","code":" 1211 | \n 1212 |   if (!meta_builder_create_new_journal (filename, random_tag))\n 1213 |     goto out;\n 1214 | \n 1215 |   /* Open old file so we can set it rotated */\n 1216 |   fd2 = open (filename ion failure it does 'return FALSE;' - a gboolean constant copy-pasted from the gboolean-returning siblings. It happens to equal NULL but is type-confused and misleading.","fix":"Return NULL instead of FALSE.","locations":[{"ref":"client/gdaemonfile.c:2472-2474","code":" 2472 |   proxy = create_proxy_for_file (file, NULL, &path, NULL, cancellable, error);\n 2473 |   if (proxy == NULL)\n 2474 |     return FALSE;","lines":3}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The async error path calls invalidate_local_connection(async_call->dbus_id, &async_call->io_error), which removes from the thread-local local_connections hash of whatever thread the async callback runs on. The sync connection cache that needs invalidating is keyed per the originating thread, which may differ, so this removes from the wrong table. The inner global _g_daemon_vfs_invalidate still runs, so the effect is mostly cosmetic, but the thread-local invalidation from an async callback is misleading.","fix":"In the async SERVICE_UNKNOWN branch, set the RETRY error and call _g_daemon_vfs_invalidate directly instead of the thread-local-aware invalidate_local_connection.","locations":[{"ref":"client/gvfsdaemondbus.c:255-256","code":"  255 |       if (g_error_matches (error, G_DBUS_ERROR, G_DBUS_ERROR_SERVICE_UNKNOWN))\n  256 |         invalidate_local_connection (async_call->dbus_id, &async_call->io_error);","lines":2},{"ref":"client/gvfsdaemondbus.c:549-565","code":"  549 | static void\n  550 | invalidate_local_connection (const char *dbus_id,\n  551 | \t\t\t     GError **error)\n  552 | {\n  553 |   ThreadLocalConnections *local;\n  554 |   \n  555 |   _g_daemon_vfs_invalidate (dbus_id, NULL);\n  556 | \n  557 |   local = g_private_get (&local_connections);\n  558 |   if (local)\n  559 |     g_hash_table_remove (local->connections, dbus_id);\n  560 |   \n  561 |   g_set_error_literal (error,\n  562 | \t\t       G ng","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"wsdd_monitor_changed_cb() falls through from the G_FILE_MONITOR_EVENT_UNMOUNTED case into default. After g_clear_object(&backend->wsdd_monitor) the fallthrough calls schedule_recompute(); recompute_files() then sees wsdd_monitor == NULL and re-creates a monitor on the (now unmounted) wsdd:/// backend on every event. The missing break also makes the intent ambiguous. Functionally the cleared monitor is immediately recreated, defeating the unmount handling.","fix":"Add an explicit break after the UNMOUNTED handling, or restructure so recompute is only scheduled when appropriate; guard monitor recreation against the unmounted state.","locations":[{"ref":"daemon/gvfsbackendnetwork.c:836-846","code":"  836 | \n  837 |   switch (event_type)\n  838 |     {\n  839 |       case G_FILE_MONITOR_EVENT_UNMOUNTED:\n  840 |         g_clear_object (&backend->wsdd_monitor);\n  841 | \n  842 |       default:\n  843 |         schedule_recompute (backend);\n  844 |         break;\n  845 |     }\n  846 | }","lines":11}]},{"id":"ERR_36","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"nfs_init_context() return value is not checked. If context allocation fails it returns NULL, and the code immediately calls nfs_set_debug() and nfs_mount() on a NULL context, which dereferences NULL inside libnfs and crashes the daemon. Every other path checks allocations (e.g. smbc_new_context).","fix":"Check op_backend->ctx for NULL after nfs_init_context() and fail the mount job with G_IO_ERROR_FAILED if it is NULL.","locations":[{"ref":"daemon/gvfsbackendnfs.c:256-266","code":"  256 |   op_backend->ctx = nfs_init_context ();\n  257 | \n  258 |   debug = g_getenv (\"GVFS_NFS_DEBUG\");\n  259 |   if (debug)\n  260 |     debug_val = atoi (debug);\n  261 |   else\n  262 |     debug_val = 0;\n  263 | \n  264 |   nfs_set_debug (op_backend->ctx, debug_va riv->reply_stream = g_unix_output_stream_new (socket_fds[0], FALSE);\n  208 |       channel->priv->remote_fd = socket_fds[1];\n  209 | \n  210 |       /* Set as nonblocking to be sure that _async methods don't block. */\n  211 |       fcntl (socket_fds[0], F_SETFL, O_NONBLOCK);\n  212 |       fcntl (socket_fds[1], F_SETFL, O_NONBLOCK);\n  213 | \n  214 |       start_request_reader (channel);\n  215 |     }\n  216 | }","lines":26},{"ref":"daemon/gvfschannel.c:775-794","code":"  775 | void\n  776 | g_vfs_channel_force_close (GVfsChannel *channel)\n  777 | {\n  778 |   GVfsJob *job;\n  779 |   gint     fd;\n  780 | \n  781 |   fd = g_unix_input_stream_get_fd (G_UNIX_INPUT_STREAM (channel->priv->command_stream));\n  782 | \n  783 |   shutdown (fd, SHUT_RDWR);\n  784 | \n  785 |   job = channel->priv->current_job;\n  786 | \n  787 |   if (job)\n  788 |     g_vfs_job_cancel (job);\n  789 | \n  790 |   g_list_free_full (channel->priv->queued_requests, free_queued_requests);\n  791 |   channel->priv->queued_requests = NULL;\n  792 | \n  793 |   g_vfs_job_source_closed (G_VFS_JOB_SOURCE (channel));\n  794 | }","lines":20}]},{"id":"ERR_41","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"g_vfs_ftp_connection_send() asserts the command ends with CRLF via g_return_val_if_fail(command[len-2]=='\\r' && command[len-1]=='\\n'). If a caller ever passes len < 2 (or len 0 after strlen of an empty string), command[len-2] indexes before the buffer. All current callers append \\r\\n so it's not currently triggered, but the precondition check itself can read OOB for short inputs.","fix":"Guard with len >= 2 before dereferencing command[len-2].","locations":[{"ref":"daemon/gvfsftpconnection.c:162-165","code":"  162 |   g_return_val_if_fail (len >= -1, FALSE);\n  163 |   if (len < 0)\n  164 |     len = strlen (command);\n  165 |   g_return_val_if_fail (command[len-2] == '\\r' && command[len-1] == '\\n', FALSE);","lines":4}]},{"id":"ERR_42","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"verify_journal_entry reads entry->entry_size and uses 'offset > journal->len - 4' before the later sanity check 'journal->len < 4+4+8+1+1+4'. The minimum-size guard at line 894 is independent of offset and would be better evaluated up front; also note journal->len is gsize so 'journal->len - 4' underflows to a huge value only if len < 4, which the header-size guarantee (>=20) prevents. Mostly a code-ordering / clarity robustness issue.","fix":"Validate the journal has at least the minimum header+entry size once at open time, and order the checks so length subtractions can never underflow.","locations":[{"ref":"metadata/metatree.c:882-899","code":"  882 |   /* entry_size must be valid */\n  883 |   if (offset > journal->len - 4)\n  884 |     return NULL;\n  885 | \n  886 |   /* Verify that entry fits and has right size */\n  887 |   entry_len = GUINT32_FROM_BE (entry->entry_size);\n  888 | \n  889 |   /* Must be 32bit aligned */\n  890 |   if (entry_len % 4 != 0)\n  891 |     return NULL;\n  892 |   /* Must have space for at the very least:\n  893 |      len+crc32+mtime+type+path_terminating_zeor+end_len */\n  894 |   if (journal->len < 4 + 4 + 8 + 1 + 1 + 4)\n  895 |     return NULL;\n  896 | \n  897 |   if (entry_len > journal->len ||\n  898 |       offset > journal->len - entry_len)\n  899 |     return NULL;","lines":18}]},{"id":"ERR_43","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In g_proxy_volume_monitor_register(), when gvfs_dbus_daemon_call_list_monitor_implementations_sync() fails the error is dereferenced/freed in the else branch, but in the outer 'proxy == NULL' else branch at line 1510 'error->message' is printed assuming error was set. g_dbus proxy creation may fail without error semantics guaranteed for every path; more importantly the inner success path uses g_variant_n_children(monitors) as a loop bound recomputed each iteration. Minor robustness/perf concerns in registration.","fix":"Cache n = g_variant_n_children(monitors) outside the for loop; guard error->message accesses with error != NULL.","locations":[{"ref":"monitor/proxy/gproxyvolumemonitor.c:1486-1512","code":" 1486 |           if (gvfs_dbus_daemon_call_list_monitor_implementations_sync (proxy,\n 1487 |                                                                        &monitors, NULL, &error))\n 1488 |             {\n 1489 |               got_list = TRUE;\n 1490 |               for (i = 0; i < g_variant_n_children (monitors); i++)\n 1491 |                 {\n 1492 |                   child = g_variant_get_child_value (monitors, i);\n 1493 |                   impl = g_vfs_monitor_implementation_from_dbus (child);\n 1494 |                   impls = g_list_prepend (impls, impl);\n 1495 |                   g_variant_unref (child);\n 1496 |                 }\n 1497 |               g_variant_unref (monitors);\n 1498 |             }\n 1499 |           else\n 1500 |             {\n 1501 |               if (!g_error_matches (error, G_DBUS_ERROR, G_DBUS_ERROR_UNKNOWN_METHOD))\n 1502 |                 g_debug (\"Error: %s\\n\", error->message);\n 1503 |               g_error_free (error);\n 1504 |             }\n 1505 | \n 1506 |           g_clear_object (&proxy);\n 1507 |         }\n 1508 |       else\n 1509 |         {\n 1510 |           g_debug (\"Error: %s\\n\", error->message);\n 1511 |           g_error_free (error);\n 1512 |         }","lines":27}]},{"id":"ERR_44","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"child_watch_from_release_cb() is an empty callback used to reap the SIGTERM'd child in spawn_data_free(). The g_warn_if_fail(close(fd) == 0) checks on the stdout/stderr fds will spuriously warn if the fd was already closed/invalid (e.g. when spawn failed before pipe unning on the monitor subthread mutate mount_list under the lock. This is an unsynchronized concurrent read of a GList being mutated on another thread - a data race that can traverse a partially-updated/freed list. vfs_readdir and other readers correctly take the lock.","fix":"Wrap the g_list_length(mount_list) read in vfs_getattr with mount_list_lock()/mount_list_unlock().","locations":[{"ref":"client/gvfsfusedaemon.c:885-896","code":"  885 |   if (path_is_mount_list (path))\n  886 |     {\n  887 |       /* Mount list */\n  888 | \n  889 |       sbuf->st_mode = S_IFDIR | 0500;                   /* mode_t    protection */\n  890 |       sbuf->st_nlink = 2 + g_list_length (mount_list);  /* nlink_t   number of hard links */\n  891 |       sbuf->st_atime = daemon_creation_time;\n  892 |       sbuf->st_mtime = daemon_creation_time;\n  893 |       sbuf->st_ctime = daemon_creation_time;\n  894 |       sbuf->st_uid   = daemon_uid;\n  895 |       sbuf->st_gid   = daemon_gid;\n  896 |     }","lines":12},{"ref":"client/gvfsfusedaemon.c:2317-2345","code":" 2317 |   mount_list_lock ();\n 2318 |   mount_list = g_list_prepend (mount_list, mount_record);\n 2319 |   mount_list_unlock ();\n 2320 | }\n 2321 | \n 2322 | static void\n 2323 | mount_tracker_unmounted_cb (GVolumeMonitor *volume_monitor,\n 2324 |                             GMount         *mount)\n 2325 | {\n 2326 |   GFile *root;\n 2327 |   GList *l;\n 2328 | \n 2329 |   root = g_mount_get_root (mount);\n 2330 | \n 2331 |   mount_list_lock ();\n 2332 | \n 2333 |   for (l = mount_list; l != NULL; l = l->next)\n 2334 |     {\n 2335 |       MountRecord *mount_record = l->data;\n 2336 | \n 2337 |       if (g_file_equal (root, mount_record->root))\n 2338 |         {\n 2339 |           mount_list = g_list_delete_link (mount_list, l);\n 2340 |           mount_record_free (mount_record);\n 2341 |           break;\n 2342 |         }\n 2343 |     }\n 2344 | \n 2345 |   mount_list_unlock ();","lines":29}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"FileHandles are keyed per-path via get_or_create_file_handle_for_path, so two concurrent opens of the same path share one FileHandle while each open adds a reference. vfs_release does two file_handle_unref calls. With a shared handle, the first release can drop the shared handle's lifetime ref while a second fd still references it via global_active_fh_map, so the second fd's subsequent read/write get_file_handle_from_info fails (NULL -> EINVAL). The fd-to-FileHandle mapping is not 1:1 as the release accounting assumes.","fix":"Use per-open reference accounting that does not assume a 1:1 fd-to-FileHandle mapping, or key handles per-open so concurrent opens of the same path are independent.","locations":[{"ref":"client/gvfsfusedaemon.c:1207-1262","code":" 1207 |               FileHandle *fh = get_or_create_file_handle_for_path (path);\n 1208 | \n 1209 |               /* Success */\n 1210 | \n 1211 |               g_mutex_lock (&fh->mutex);\n 1212 | \n 1213 |               SET_FILE_HANDLE (fi, fh);\n 1214 | \n 1215 |               file_handle_close_stream (fh);\n 1216 |               fh->stream = file_output_stream;\n 1217 |               fh->size = 0;\n 1218 |               fh->op = FILE_OP_WRITE;\n 1219 | \n 1220 |               g_mutex_unlock (&fh->mutex);\n 1221 | \n 1222 |               /* The reference added to the file handle is released in vfs_release() */\n 1223 |             }\n 1224 |           else\n 1225 |             {\n 1226 |               result = -errno_from_error (error);\n 1227 |               g_error_free (error);\n 1228 |             }\n 1229 |         }\n 1230 | \n 1231 |       g_object_unref (file);\n 1232 |     }\n 1233 |   else\n 1234 |     {\n 1235 |       result = -ENOENT;\n 1236 |     }\n 1237 | \n 1238 |   g_debug (\"vfs_create: -> %s\\n\", g_strerror (-result));\n 1239 | \n 1240 |   return result;\n 1241 | }\n 1242 | \n 1243 | static gint\n 1244 | vfs_release (const gchar *path, struct fuse_file_info *fi)\n 1245 | {\n 1246 |   FileHandle *fh = get_file_handle_from_info (fi);\n 1247 | \n 1248 |   g_debug (\"vfs_release: %s\\n\", path);\n 1249 | \n 1250 |   if (fh)\n 1251 |     {\n 1252 |       g_mutex_lock (&fh->mutex);\n 1253 |       file_handle_close_stream (fh);\n 1254 |       g_mutex_unlock (&fh->mutex);\n 1255 | \n 1256 |       /* get_file_handle_from_info () adds a \"working ref\", so unref twice. */\n 1257 |       file_handle_unref (fh);\n 1258 |       file_handle_unref (fh);\n 1259 |     }\n 1260 | \n 1261 |   return 0;\n 1262 | }","lines":56}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"TOCTOU / PID-reuse vulnerability in the privileged admin backend. check_permission()\nauthorizes the caller by building a PolkitSubject with polkit_unix_process_new_for_owner(pid, 0, uid),\npassing start_time = 0. A start_time of 0 disables polkit's process-start-time check, so authorization\nis bound only to a numeric PID. Between obtaining the peer PID from the D-Bus connection and the polkit\ncheck (and the subsequent privileged file operation), the original process can exit and its PID be\nreused by an unrelated, unprivileged process, which would then be treated as the authorized subject.\nBecause this backend runs as root and performs arbitrary file operations, this is a real privilege\nboundary weakness. Modern polkit/GLib expose a pidfd-based API (polkit_unix_process_new_for_owner with\na real start time, or polkit_unix_process_new_pidfd) that should be used instead.","fix":"Obtain and pass the real process start time (read from /proc/<pid>/stat) to polkit_unix_process_new_for_owner, or use a pidfd-based PolkitSubject, so authorization is bound to a specific process instance rather than a reusable PID.","locations":[{"ref":"daemon/gvfsbackendadmin.c:108-135","code":"  108 |   pid = g_credentials_get_unix_pid (credentials, &error);\n  109 |   if (error != NULL)\n  110 |     {\n  111 |       g_vfs_job_failed_from_error (job, error);\n  112 |       g_error_free (error);\n  113 |       return FALSE;\n  114 |     }\n  115 | \n  116 |   uid = g_credentials_get_unix_user (credentials, &error);\n  117 |   if (error != NULL)\n  118 |     {\n  119 |       g_vfs_job_failed_from_error (job, error);\n  120 |       g_error_free (error);\n  121 |       return FALSE;\n  122 |     }\n  123 | \n  124 |   /* Only one polkit dialog at a time */\n  125 |   g_mutex_lock (&self->polkit_mutex);\n  126 | \n  127 |   subject = polkit_unix_process_new_for_owner (pid, 0, uid);\n  128 |   result = polkit_authority_check_authorization_sync (self->authority,\n  129 |                                                       subject,\n  130 |                                                       \"org.gtk.vfs.file-operations\",\n  131 |                                                       NULL, POLKIT_CHECK_AUTHORIZATION_FLAGS_ALLOW_USER_INTERACTION,\n  132 |                                                       NULL, &error);\n  133 |   g_object_unref (subject);\n  134 | \n  135 |   g_mutex_unlock (&self->polkit_mutex);","lines":28}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"get_request_id() and get_tickle_id() do a plain non-atomic ++ on priv->request_id / priv->tickle_id. These are called both from the sync open path (g_vfs_afp_connection_open_sync/close path runs on the calling thread) and from the worker thread's send loop (send_request_unlocked), so the counter is mutated from multiple threads without the mutex held, which is a data race and can hand out duplicate request IDs (causing reply mis-routing in request_hash).","fix":"Protect request_id/tickle_id with the existing priv->mutex (the send loop already holds it via send_request_unlocked callers) or use g_atomic_int operations, ensuring close_connection's get_request_id() also synchronizes.","locations":[{"ref":"daemon/gvfsafpconnection.c:852-866","code":"  852 | static guint16\n  853 | get_request_id (GVfsAfpConnection *afp_connection)\n  854 | {\n  855 |   GVfsAfpConnectionPrivate *priv = afp_connection->priv;\n  856 | \n  857 |   return priv->request_id++;\n  858 | }\n  859 | \n  860 | static guint16\n  861 | get_tickle_id (GVfsAfpConnection *afp_connection)\n  862 | {\n  863 |   GVfsAfpConnectionPrivate *priv = afp_connection->priv;\n  864 | \n  865 |   return priv->tickle_id++;\n  866 | }","lines":15},{"ref":"daemon/gvfsafpconnection.c:1372","code":" 1372 |       priv->write_dsi_header.requestID = GUINT16_TO_BE (get_tickle_id (afp_connection));","lines":1},{"ref":"daemon/gvfsafpconnection.c:1401","code":" 1401 |       priv->write_dsi_header.requestID = GUINT16_TO_BE (get_request_id (afp_connection));","lines":1},{"ref":"daemon/gvfsafpconnection.c:1666","code":" 1666 |   req_id = get_request_id (conn);","lines":1}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"handle_login() reads from the prompt stream into 'len' which is gsize (unsigned), then checks 'if (len == -1)'. g_input_stream_read() returns gssize; assigning a -1 error return into an unsigned gsize makes the (len == -1) comparison rely on wraparound to SIZE_MAX, which happens to work on common platforms but is fragile/incorrect. Also buffer[len] = 0 would index with a huge value if the comparison ever failed to catch the error.","fix":"Declare len as gssize and compare to -1 (or < 0) before using it to index buffer.","locations":[{"ref":"daemon/gvfsbackendsftp.c:1023-1081","code":" 1023 |   gsize len;\n 1024 |   gboolean ret_val;\n 1025 |   char *new_password = NULL;\n 1026 |   char *new_user = NULL;\n 1027 |   gboolean password_in_keyring = FALSE;\n 1028 |   const gchar *authtype = NULL;\n 1029 |   gchar *object = NULL;\n 1030 |   char *prompt;\n 1031 |   int attempts = 0;\n 1032 |   static int i = 0;\n 1033 | \n 1034 |   i++;\n 1035 |   g_debug (\"handle_login #%d initial_connection = %d - user: %s, host: %s, port: %d\\n\",\n 1036 |            i, initial_connection, op_backend->user, op_backend->host, op_backend->port);\n 1037 | \n 1038 |   if (op_backend->client_vendor == SFTP_VENDOR_SSH) \n 1039 |     prompt_fd = stderr_fd;\n 1040 |   else\n 1041 |     prompt_fd = tty_fd;\n 1042 | \n 1043 |   prompt_stream = g_unix_input_stream_new (prompt_fd, FALSE);\n 1044 |   reply_stream = g_unix_output_stream_new (tty_fd, FALSE);\n 1045 | \n 1046 |   ret_val = TRUE;\n 1047 |   while (1)\n 1048 |     {\n 1049 |       fds[0].fd = stdout_fd;\n 1050 |       fds[0].events = POLLIN;\n 1051 |       fds[1].fd = prompt_fd;\n 1052 |       fds[1].events = POLLIN;\n 1053 |       \n 1054 |       ret = poll(fds, 2, SFTP_READ_TIMEOUT * 1000);\n 1055 |       \n 1056 |       if (ret <= 0)\n 1057 |         {\n 1058 |           g_set_error_literal (error,\n 1059 | \t                       G_IO_ERROR, G_IO_ERROR_TIMED_OUT,\n 1060 |         \t               _(\"Timed out when logging in\"));\n 1061 |           ret_val = FALSE;\n 1062 |           break;\n 1063 |         }\n 1064 |       \n 1065 |       if (fds[0].revents)\n 1066 |         break; /* Got reply to initial INIT request */\n 1067 |       \n 1068 |       if (!(fds[1].revents & POLLIN))\n 1069 |         continue;\n 1070 |       \n 1071 |       len = g_input_stream_read (prompt_stream,\n 1072 |                                  buffer, sizeof (buffer) - 1,\n 1073 |                                  NULL, error);\n 1074 |       \n 1075 |       if (len == -1)\n 1076 |         {\n 1077 |           ret_val = FALSE;\n 1078 |           break;\n 1079 |         }\n 1080 |       \n 1081 |       buffer[len] = 0;","lines":59}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"got_proxy_cb does not free `proxy`'s error on the success path correctly is fine, but more importantly it calls g_mount_spec_to_dbus(data->monitor->priv->mount_spec) twice and passes the same floating GVariant for both the mount_spec and other_mount_spec arguments. g_mount_spec_to_dbus returns a (typically floating) GVariant; passing it into a generated call that sinks references is okay, but calling it twice creates two separate variants which is wasteful and the second call for `other` is semantically wrong - the 'other file' should arguably carry its own spec. Minor correctness/clarity issue.","fix":"Build the mount-spec dbus variant once and reuse, and confirm the protocol expects the same spec for both file and other-file.","locations":[{"ref":"daemon/gvfsmonitor.c:353-361","code":"  353 |   gvfs_dbus_monitor_client_call_changed (proxy,\n  354 |                                          data->event_type,\n  355 |                                          g_mount_spec_to_dbus (data->monitor->priv->mount_spec),\n  356 |                                          data->file_path,\n  357 |                                          g_mount_spec_to_dbus (data->monitor->priv->mount_spec),\n  358 |                                          data->other_file_path ? data->other_file_path : \"\",\n  359 |                                          NULL,\n  360 |                                          (GAsyncReadyCallback) changed_cb,\n  361 |                                          data);","lines":9}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"g_network_monitor_get_default() returns a singleton with transfer-none ownership (the caller does not own a reference). The service stores it and then g_clear_object()s it in finalize, dropping a reference it never acquired. This over-unrefs the shared default network monitor, corrupting its refcount and potentially freeing it while still in use elsewhere.","fix":"Either g_object_ref() the monitor when storing it, or do not g_clear_object() it in finalize (only disconnect the signal handler).","locations":[{"ref":"daemon/gvfswsddservice.c:661","code":"  661 |   service->network_monitor = g_network_monitor_get_default ();","lines":1},{"ref":"daemon/gvfswsddservice.c:115-119","code":"  115 |   if (service->network_monitor != NULL)\n  116 |     {\n  117 |       g_signal_handlers_disconnect_by_data (service->network_monitor, service);\n  118 |       g_clear_object (&service->network_monitor);\n  119 |     }","lines":5}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"notify_attribute_change is a GSource timeout callback that returns G_SOURCE_REMOVE, so GLib auto-destroys the source after dispatch. Before returning it calls free_bus_notification_info(), which calls g_source_remove(info->timeout_id) on the same currently-dispatching source. Removing the source that is mid-dispatch and about to be auto-removed yields a 'Source ID was not found' GLib critical (the id is being reclaimed). The explicit-cancel paths (emit_attribute_change replacing a pending entry, flush_all) legitimately need g_source_remove; the timeout-callback path does not.","fix":"In the timeout callback, clear info->timeout_id = 0 before freeing and guard 'if (info->timeout_id) g_source_remove(info->timeout_id);' in free_bus_notification_info so only the cancellation paths remove the source.","locations":[{"ref":"metadata/meta-daemon.c:116-139","code":"  116 | static void\n  117 | free_bus_notification_info (BusNotificationInfo *info)\n  118 | {\n  119 |   dbus_notification_list = g_list_remove (dbus_notification_list,\n  120 |                                           info);\n  121 |   g_object_unref (info->object);\n  122 |   g_source_remove (info->timeout_id);\n  123 |   g_free (info->path);\n  124 |   g_free (info->treefile);\n  125 |   g_free (info);\n  126 | }\n  127 | \n  128 | static gboolean\n  129 | notify_attribute_change (gpointer data)\n  130 | {\n  131 |   BusNotificationInfo *info;\n  132 | \n  133 |   info = (BusNotificationInfo *) data;\n  134 |   gvfs_metadata_emit_attribute_changed (info->object,\n  135 |                                         info->treefile,\n  136 |                                         info->path);\n  137 |   free_bus_notification_info (info);\n  138 |   return G_SOURCE_REMOVE;\n  139 | }","lines":24}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"get_seats() (HAVE_LOGIND path) calls g_once_init_leave unconditionally after the if/else chain. In the session-scope branch and the no-multi-seat branch, `seats` is never assigned (stays NULL), but `once` is still marked initialized. That part is fine, however sd_uid_get_seats() return value is ignored: on failure `seats` may be left in an indeterminate/partial state, and the static `seats` is never freed (intentional cache), which is acceptable, but the unchecked return means a failed call could leave a non-NULL but invalid array. Treat the sd_uid_get_seats failure explicitly.","fix":"Check the return value of sd_uid_get_seats(); on error set seats=NULL so callers fall back to the single-seat assumption.","locations":[{"ref":"monitor/udisks2/gvfsudisks2utils.c:509-539","code":"  509 | static const gchar * const *\n  510 | get_seats (void)\n  511 | {\n  512 |   static gsize once = 0;\n  513 |   static gchar **seats = NULL;\n  514 | \n  515 |   if (g_once_init_enter (&once))\n  516 |     {\n  517 |       g_autofree char *session = NULL;\n  518 |       g_autofree char *unit = NULL;\n  519 | \n  520 |       if (sd_pid_get_user_unit (getpid (), &unit) == 0)\n  521 |         {\n  522 |           /* We are in a user unit scope. We take care of any seat we have an\n  523 |            * active session on. */\n  524 |           sd_uid_get_seats (getuid (), TRUE, &seats);\n  525 |         }\n  526 |       else if (sd_pid_get_session (getpid (), &session) == 0)\n  527 |         {\n  528 |           /* We are in a session scope, so we only care about the seat it is on. */\n  529 |         }\n  530 |       else\n  531 |         {\n  532 |           /* Looks like the system has no multi-seat support. */\n  533 |           g_debug (\"Cannot determine seats we take care of. Assuming a single, global seat.\");\n  534 |         }\n  535 | \n  536 |       g_once_init_leave (&once, (gsize) 1);\n  537 |     }\n  538 |   return (const gchar * const *)seats;\n  539 | }","lines":31}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In g_daemon_file_monitor_new, if _g_dbus_connection_get_sync fails with G_VFS_ERROR_RETRY, the guard at lines 185-187 excludes RETRY/CANCELLED so the session-bus fallback is skipped and connection stays NULL. Execution reaches 'if (connection == NULL)' which only logs the error - the monitor is returned with no skeleton exported and no proxy, i.e. a silently non-functional monitor with no retry. Other call sites (e.g. create_proxy_for_icon) retry on RETRY.","fix":"Retry _g_dbus_connection_get_sync on G_VFS_ERROR_RETRY (as other call sites do) before giving up, rather than returning a dead monitor.","locations":[{"ref":"client/gdaemonfilemonitor.c:184-203","code":"  184 |   connection = _g_dbus_connection_get_sync (daemon_monitor->remote_id, NULL, &error);\n  185 |   if (connection == NULL &&\n  186 |       !g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CANCELLED) &&\n  187 |       !g_error_matches (error, G_VFS_ERROR, G_VFS_ERROR_RETRY))\n  188 |     {\n  189 |       g_dbus_error_strip_remote_error (error);\n  190 |       g_warning (\"The peer-to-peer connection failed: %s. Falling back to the \"\n  191 |                  \"session bus. Your application is probably missing \"\n  192 |                  \"--filesystem=xdg-run/gvfsd privileges.\", error->message);\n  193 |       g_clear_error (&error);\n  194 | \n  195 |       connection = g_bus_get_sync (G_BUS_TYPE_SESSION, NULL, &error);\n  196 |     }\n  197 | \n  198 |   if (connection == NULL)\n  199 |     {\n  200 |       g_printerr (\"Error getting
