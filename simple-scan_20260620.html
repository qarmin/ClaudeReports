/\n  835 |         writer.write_string (\"\\n\");\n  836 |         writer.write_string (\"trailer\\n\");\n  837 |         writer.write_string (\"<<\\n\");\n  838 |         writer.write_string (\"/Size %zu\\n\".printf (writer.object_offsets.length + 1));\n  839 |         writer.write_string (\"/Info %u 0 R\\n\".printf (info_number));\n  840 |         writer.write_string (\"/Root %u 0 R\\n\".printf (catalog_number));\n  841 |         writer.write_string (\"/ID [<%s> <%s>]\\n\".printf (id, id));\n  842 |         writer.write_string (\">>\\n\");\n  843 |         writer.write_string (\"startxref\\n\");\n  844 |         writer.write_string (\"%zu\\n\".printf (xref_offset));\n  845 |         writer.write_string (\"%%EOF\\n\");\n  846 | \n  847 |         update_progression ();\n  848 |         finished_saving ();\n  849 |         return null;\n  850 |     }","lines":231,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L620-850"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"write_pdf() only checks write_task.error for tasks freshly popped from write_queue (line 738). Tasks served from the tasks_in_standby reorder buffer (line 730-732) skip the error check entirely, so a PDF page whose encode step failed (error set, possibly null data) can be silently written into the output PDF as if it succeeded, instead of aborting the whole save with the real error.","fix":"Check write_task.error for tasks popped from tasks_in_standby too (the same check used at line 738), not just for tasks freshly read from write_queue.","locations":[{"ref":"src/book.vala:721-748","code":"  721 |         var tasks_in_standby = new Queue<WriteTaskPDF> ();\n  722 |         for (int i = 0; i < n_pages; i++)\n  723 |         {\n  724 |             if (cancellable.is_cancelled ())\n  725 |             {\n  726 |                 finished_saving ();\n  727 |                 return null;\n  728 |             }\n  729 | \n  730 |             var write_task = tasks_in_standby.peek_head ();\n  731 |             if (write_task != null && write_task.number == i)\n  732 |                 tasks_in_standby.pop_head ();\n  733 |             else\n  734 |             {\n  735 |                 while (true)\n  736 |                 {\n  737 |                     write_task = (WriteTaskPDF) write_queue.pop ();\n  738 |                     if (write_task.error != null)\n  739 |                     {\n  740 |                         finished_saving ();\n  741 |                         return write_task.error;\n  742 |                     }\n  743 |                     if (write_task.number == i)\n  744 |                         break;\n  745 | \n  746 |                     tasks_in_standby.insert_sorted (write_task, (a, b) => {return a.number - b.number;});\n  747 |                 }\n  748 |             }","lines":28,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L721-748"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"PDFWriter.write() catches I/O errors and only logs a warning (line 962); it never propagates the failure or stops writing. The offset counter is still incremented at line 964 as if the write succeeded, corrupting all subsequent object offsets recorded in the cross-reference table. write_pdf() then proceeds to finish successfully (returns null at line 849) even though the on-disk PDF is truncated/corrupt and the caller is told the save succeeded.","fix":"Make PDFWriter.write() propagate the Error (e.g. `throws Error` or store first error and have callers check it) so write_pdf() can detect mid-write I/O failures, delete the partial output file, and return the error to save_async instead of falsely reporting success.","locations":[{"ref":"src/book.vala:954-965","code":"  954 |     public void write (uint8[] data)\n  955 |     {\n  956 |         try\n  957 |         {\n  958 |             stream.write_all (data, null, null);\n  959 |         }\n  960 |         catch (Error e)\n  961 |         {\n  962 |             warning (\"Error writing PDF: %s\", e.message);\n  963 |         }\n  964 |         offset += data.length;\n  965 |     }","lines":12,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L954-965"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"process_status from Process.spawn_sync is the raw platform wait-status (as returned by waitpid), not a decoded exit code. The code returns this raw value directly and the caller (Book.postprocess_async in book.vala) only checks `if (return_code != 0)` and logs a generic warning with no exit code or signal information. The raw status is never decoded via GLib.Process.check_exit_status() or similar, so error reporting can't distinguish a normal non-zero exit from a signal-terminated process, and no actual exit code is ever surfaced to the user/log.","fix":"Decode the wait status with Process.check_exit_status(process_status) (catching SpawnError/ProcessError) before returning, or otherwise extract and log the real exit code / termination signal instead of returning the raw status verbatim.","locations":[{"ref":"src/postprocessor.vala:25-43","code":"   25 |         int     process_status;\n   26 | \n   27 |         print (\"Executing script%s\\n\", script);\n   28 |         Process.spawn_sync (null,               // inherit parent's working dir\n   29 | \t\t\t\t\t\tspawn_args,\n   30 | \t\t\t\t\t\tspawn_env,\n   31 | \t\t\t\t\t\tSpawnFlags.SEARCH_PATH,\n   32 | \t\t\t\t\t\tnull,\n   33 | \t\t\t\t\t\tout process_stdout,\n   34 | \t\t\t\t\t\tout process_stderr,\n   35 | \t\t\t\t\t\tout process_status);\n   36 | \t    debug (\"status: %d\\n\", process_status);\n   37 | \t    debug (\"STDOUT: \\n\");\n   38 | \t    debug (process_stdout);\n   39 | \t    debug (\"STDERR: \\n\");\n   40 | \t    debug (process_stderr);\n   41 | \n   42 | \t    return process_status;\n   43 |     }","lines":19,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/postprocessor.vala#L25-43"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Postprocessor.process passes process_stdout and process_stderr from the spawned script directly as the *format string* argument to GLib.debug(), which is a printf-style varargs function (g_debug). If the script's stdout/stderr output contains '%' format specifiers (e.g. error messages with %s, %d, or just stray percent signs), this is a format-string bug: GLib will try to read non-existent varargs, potentially crashing or producing garbage/undefined output in the debug log.","fix":"Use a literal format string and pass the content as an argument, e.g. `debug (\"STDOUT: %s\", process_stdout);` and `debug (\"STDERR: %s\", process_stderr);`.","locations":[{"ref":"src/postprocessor.vala:37-40","code":"   37 | \t    debug (\"STDOUT: \\n\");\n   38 | \t    debug (process_stdout);\n   39 | \t    debug (\"STDERR: \\n\");\n   40 | \t    debug (process_stderr);","lines":4,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/postprocessor.vala#L37-40"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"show_page_cb() (`launcher.launch.begin (this, null);`) and launch_help() (`launcher.launch.begin (this, null);`) invoke the async Gtk.FileLauncher/Gtk.UriLauncher launch without a result callback, so any failure (e.g. no default application registered, broken portal) is silently swallowed with no warning logged and no user feedback. Contrast with open_folder_cb() a few dozen lines below, which correctly supplies a callback that calls launcher.open_containing_folder.end(res) inside a try/catch and logs via warning().","fix":"Pass a callback to launch.begin() that calls launch.end(res) in a try/catch and logs the error via warning(), mirroring open_folder_cb().","locations":[{"ref":"src/app-window.vala:1041-1042","code":" 1041 |         var launcher = new Gtk.FileLauncher(file);\n 1042 |         launcher.launch.begin (this, null);","lines":2,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L1041-1042"},{"ref":"src/app-window.vala:1259-1263","code":" 1259 |     private void launch_help ()\n 1260 |     {\n 1261 |         var launcher = new Gtk.UriLauncher (\"help:simple-scan\");\n 1262 |         launcher.launch.begin (this, null);\n 1263 |     }","lines":5,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L1259-1263"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"update_preview's bounds clamp only corrects R/B when they exceed output_width/output_height (with a FIXME acknowledging an off-by-one somewhere), but the subsequent return_if_fail checks on L/R/T/B silently abort the entire pixel update with no error propagated to the caller if any bound is still violated. The caller (PageToPixbuf.update) has no way to know the preview pixbuf was left stale/partially updated for that frame.","fix":"Replace the return_if_fail guards with an explicit bounds clamp for L/T as well as R/B, or propagate a boolean/Error result so PageViewTexture can know an update was skipped and retry instead of silently keeping stale pixel data.","locations":[{"ref":"src/page-texture.vala:389-399","code":"  389 |         /* FIXME: There's an off by one error in there somewhere... */\n  390 |         if (R >= output_width)\n  391 |             R = output_width - 1;\n  392 |         if (B >= output_height)\n  393 |             B = output_height - 1;\n  394 | \n  395 |         return_if_fail (L >= 0);\n  396 |         return_if_fail (R < output_width);\n  397 |         return_if_fail (T >= 0);\n  398 |         return_if_fail (B < output_height);\n  399 |         return_if_fail (output_image != null);","lines":11,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-texture.vala#L389-399"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"fix_pdf() calls int.parse() on untrusted/possibly-malformed lines extracted from the PDF (xref count, xref offsets, startxref offset) without validating the result. int.parse() returns 0 on unparsable input, so a malformed or adversarial PDF passed to --fix-pdf silently produces a corrupted 'fixed' file (wrong /Size, wrong offsets) instead of failing with a clear error.  This is a CLI maintenance tool, so the impact is contained, but it still produces a wrong output file rather than reporting failure.","fix":"Use int64.try_parse()/int.try_parse() variants (or manually validate the parsed substrings) and throw/abort with a clear message if parsing fails, rather than silently continuing with a 0 fallback.","locations":[{"ref":"src/simple-scan.vala:1927","code":" 1927 |                 fixed_size = int.parse (line.str.substring (2)) + 1;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/simple-scan.vala#L1927"},{"ref":"src/simple-scan.vala:1934","code":" 1934 |                 fixed_file.printf (\"%010d 00000 n \\n\", int.parse (line.str) + xref_offset);","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/simple-scan.vala#L1934"},{"ref":"src/simple-scan.vala:1938","code":" 1938 |                 fixed_file.printf (\"%d\\n\".printf (int.parse (line.str) + xref_offset));","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/simple-scan.vala#L1938"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"email_document_async() builds a shell command line by string concatenation of file paths (`command_line += \" --attach %s\".printf (file.get_path ())`) and passes it to Process.spawn_command_line_async(), which parses the string using shell-style quoting/splitting rules. No Shell.quote() (or equivalent escaping) is applied to the paths. Although paths originate from a randomly-named temp directory today, this is a fragile, easy-to-break-by-future-change pattern: any path containing spaces or shell metacharacters (e.g. if the temp/base directory ever becomes user-influenced, or DirUtils.make_tmp's location contains special characters on some systems) will corrupt the command or behave unexpectedly.","fix":"Wrap each file path with GLib.Shell.quote() before interpolating into command_line, or better, use Process.spawn_async with an explicit argv array instead of a single command-line string.","locations":[{"ref":"src/app-window.vala:1202-1212","code":" 1202 |             var command_line = \"xdg-email\";\n 1203 |             if (mime_type == \"application/pdf\")\n 1204 |                 command_line += \" --attach %s\".printf (file.get_path ());\n 1205 |             else\n 1206 |             {\n 1207 |                 for (var i = 0; i < book.n_pages; i++) {\n 1208 |                     var indexed_file = make_indexed_file (file.get_uri (), i, book.n_pages);\n 1209 |                     command_line += \" --attach %s\".printf (indexed_file.get_path ());\n 1210 |                 }\n 1211 |             }\n 1212 |             Process.spawn_command_line_async (command_line);","lines":11,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L1202-1212"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"toggle_postproc_visibility walks four levels up the widget tree via repeated get_parent() calls (Entry/Switch -> GtkBox -> AdwActionRow -> ... ) to find the row to hide/show, hardcoding libadwaita's internal widget composition for AdwActionRow. This is brittle: any change to how AdwActionRow wraps its children in a future libadwaita version (or any change to the .ui file's nesting) silently breaks visibility toggling with no compile-time or runtime warning, since get_parent() returns null safely but set_visible on null would crash, or wrong widgets get toggled.","fix":"Give the AdwActionRow elements themselves GtkBuilder ids (e.g. postproc_script_row) and reference them directly via [GtkChild] instead of climbing the widget tree at runtime.","locations":[{"ref":"src/preferences-dialog.vala:227-231","code":"  227 |     private void toggle_postproc_visibility(bool enabled) {\n  228 |         postproc_script_entry.get_parent ().get_parent ().get_parent ().get_parent ().set_visible(enabled);\n  229 |         postproc_args_entry.get_parent ().get_parent ().get_parent ().get_parent ().set_visible(enabled);\n  230 |         postproc_keep_original_switch.get_parent ().get_parent ().get_parent ().get_parent ().set_visible(enabled);\n  231 |     }","lines":5,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/preferences-dialog.vala#L227-231"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"WriteTask.data and WriteTaskPDF (via inheritance) declare `data` as a non-nullable `uint8[]` field, yet multiple encode paths can assign it a value derived from a null/uninitialized source on the error path (e.g. encode_pdf's `data = jpeg_data` at line 565 when jpeg_data is null after a caught exception, or encode_webp's `output` out-parameter when mux.assemble fails at line 389-394). Declaring the field non-nullable is misleading since it doesn't reflect actual runtime state on error paths.","fix":"Make WriteTask.data nullable (`uint8[]?`) to honestly reflect that error paths can leave it unset, and ensure all consumers check write_task.error before touching .data (see the related tasks_in_standby finding).","locations":[{"ref":"src/book.vala:928","code":"  928 |     public uint8[] data;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L928"},{"ref":"src/book.vala:565-569","code":"  565 |             data = jpeg_data;\n  566 |         }\n  567 | \n  568 |         write_task.number = encode_task.number;\n  569 |         write_task.data = data;","lines":5,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L565-569"},{"ref":"src/book.vala:389-394","code":"  389 |         mux_error = mux.assemble (out output);\n  390 |         debug (\"mux.assemble: %s\", mux_error.to_string ());\n  391 |         if (mux_error != WebP.MuxError.OK)\n  392 |             write_task.error = new FileError.FAILED (_(\"Unable to encode page %i\").printf (encode_task.number));\n  393 | \n  394 |         write_task.data = (owned) output;","lines":6,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L389-394"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"update_progression() reads the shared `progression` double field at line 862 inside an Idle.add closure, completely outside the progression_mutex lock that protects writes to it at lines 857-859. Since update_progression is invoked concurrently from multiple encoder threads plus the writer thread, this is a data race: the value read by the idle callback may be stale or (in theory, depending on platform) torn relative to the locked increments.","fix":"Capture the current `progression` value while still holding the mutex (e.g. `double snapshot; lock(...) { progression += step; snapshot = progression; } Idle.add(() => { progression_callback(snapshot); ... })`) instead of reading the shared field later, unlocked, from the idle callback.","locations":[{"ref":"src/book.vala:854-865","code":"  854 |     private void update_progression ()\n  855 |     {\n  856 |         double step = 1.0 / (double)(n_pages+1);\n  857 |         progression_mutex.lock ();\n  858 |         progression += step;\n  859 |         progression_mutex.unlock ();\n  860 |         Idle.add (() =>\n  861 |         {\n  862 |             progression_callback (progression);\n  863 |             return false;\n  864 |         });\n  865 |     }","lines":12,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L854-865"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The 8-bit-to-2-bit gray bit-packing loop in do_read() performs per-pixel bounds-checked array indexing (line.data[offset + x] reads and line.data[write_offset] writes) inside a nested loop over every line and every pixel of the scan. For large/high-resolution scans in this mode this is a hot loop that could be meaningfully faster using unsafe pointer access (already used elsewhere in this file, e.g. do_read's 'var b = (uchar *) buffer') instead of bounds-checked array indexing on every iteration.","fix":"If profiling shows this path is hot, rewrite the inner loop using raw uchar* pointers (as already done for the SANE read buffer) to avoid per-element bounds checks, or use Vala's unsafe array access where available.","locations":[{"ref":"src/scanner.vala:1579-1623","code":" 1579 |             {\n 1580 |                 uchar block = 0;\n 1581 |                 var write_offset = 0;\n 1582 |                 var block_shift = 6;\n 1583 |                 for (var i = 0; i < line.n_lines; i++)\n 1584 |                 {\n 1585 |                     var offset = i * line.data_length;\n 1586 |                     for (var x = 0; x < line.width; x++)\n 1587 |                     {\n 1588 |                          var p = line.data[offset + x];\n 1589 | \n 1590 |                          uchar sample;\n 1591 |                          if (p >= 192)\n 1592 |                              sample = 3;\n 1593 |                          else if (p >= 128)\n 1594 |                              sample = 2;\n 1595 |                          else if (p >= 64)\n 1596 |                              sample = 1;\n 1597 |                          else\n 1598 |                              sample = 0;\n 1599 | \n 1600 |                          block |= sample << block_shift;\n 1601 |                          if (block_shift == 0)\n 1602 |                          {\n 1603 |                              line.data[write_offset] = block;\n 1604 |                              write_offset++;\n 1605 |                              block = 0;\n 1606 |                              block_shift = 6;\n 1607 |                          }\n 1608 |                          else\n 1609 |                              block_shift -= 2;\n 1610 |                     }\n 1611 | \n 1612 |                     /* Finish each line on a byte boundary */\n 1613 |                     if (block_shift != 6)\n 1614 |                     {\n 1615 |                         line.data[write_offset] = block;\n 1616 |                         write_offset++;\n 1617 |                         block = 0;\n 1618 |                         block_shift = 6;\n 1619 |                     }\n 1620 |                 }\n 1621 | \n 1622 |                 line.data_length = (line.width * 2 + 7) / 8;\n 1623 |             }","lines":45,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L1579-1623"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In update_scan_status(), the 'device found' branch calls status_secondary_label.set_text (get_selected_device_label ()) and then immediately sets status_secondary_label.visible = false on the next line, so the text update is wasted work performed on every status refresh (called after every device list change) for a label that stays hidden in this branch.","fix":"Remove the unnecessary set_text() call in this branch, or move it only into the branches where the label is actually shown.","locations":[{"ref":"src/app-window.vala:238-239","code":"  238 |             status_secondary_label.set_text (get_selected_device_label ());\n  239 |             status_secondary_label.visible = false;","lines":2,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L238-239"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The field `user_selected_device` is written to (set true) in set_selected_device() and device_drop_down_changed_cb(), but is never read anywhere in the file. It appears intended to suppress automatically overriding a user's manual device choice when set_scan_devices() refreshes the device list, but set_scan_devices() never checks it - it always falls back to settings.get_string(\"selected-device\") or index 0, ignoring whether the user just made an explicit selection in this session.","fix":"Either remove the unused field, or actually use it in set_scan_devices() to preserve the current selection when the user has manually picked a device and a device-list refresh occurs.","locations":[{"ref":"src/app-window.vala:61","code":"   61 |     private bool user_selected_device;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L61"},{"ref":"src/app-window.vala:353","code":"  353 |         user_selected_device = true;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L353"},{"ref":"src/app-window.vala:965","code":"  965 |         user_selected_device = true;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L965"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The `update_image` field in PageView is set to true in five places (width/height setters and three change callbacks) but is never read anywhere in the file. It is a leftover flag from before the background-thread texture pipeline was introduced and has no effect on behavior.","fix":"Remove the unused `update_image` field and all its assignments, since image regeneration is now driven entirely by page_texture.request_update()/request_resize().","locations":[{"ref":"src/page-view.vala:53","code":"   53 |     private bool update_image = true;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-view.vala#L53"},{"ref":"src/page-view.vala:613","code":"  613 |             update_image = true;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-view.vala#L613"},{"ref":"src/page-view.vala:634","code":"  634 |             update_image = true;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-view.vala#L634"},{"ref":"src/page-view.vala:644","code":"  644 |         update_image = true;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-view.vala#L644"},{"ref":"src/page-view.vala:652","code":"  652 |         update_image = true;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-view.vala#L652"},{"ref":"src/page-view.vala:665","code":"  665 |         update_image = true;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-view.vala#L665"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"set_custom_crop contains a large block of commented-out code (centering logic for crop_x/crop_y) that is unused and left in place, making it unclear whether the centering behavior was intentionally removed or just disabled by accident.","fix":"Delete the commented-out block, or restore the centering behavior if it was meant to still apply; either way don't leave dead code in place.","locations":[{"ref":"src/page.vala:408-417","code":"  408 |         /*var pw = width;\n  409 |         var ph = height;\n  410 |         if (crop_width < pw)\n  411 |             crop_x = (pw - crop_width) / 2;\n  412 |         else\n  413 |             crop_x = 0;\n  414 |         if (crop_height < ph)\n  415 |             crop_y = (ph - crop_height) / 2;\n  416 |         else\n  417 |             crop_y = 0;*/","lines":10,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page.vala#L408-417"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"get_sample() is a stub that always returns 0xFF regardless of its arguments, in both copies. It is the fallback used by get_pixel() for any depth/n_channels combination not covered by the three fast paths (8bpp/3ch, 8bpp/1ch, 1bpp/1ch, 2bpp/1ch) - e.g. 4-bit or 16-bit scans, or any 2+ channel image with non-8 depth. Such scans would silently render as solid white instead of real image data, with no warning logged.","fix":"Implement the general bit-depth sample extraction (or at minimum log a warning the first time the slow path is hit) so unsupported scan formats don't silently produce blank white pixels.","locations":[{"ref":"src/page.vala:540-545","code":"  540 |     // FIXME: Copied from page-view, should be shared code\n  541 |     private uchar get_sample (uchar[] pixels, int offset, int x, int depth, int n_channels, int channel)\n  542 |     {\n  543 |         // FIXME\n  544 |         return 0xFF;\n  545 |     }","lines":6,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page.vala#L540-545"},{"ref":"src/page-texture.vala:29-33","code":"   29 |     private static uchar get_sample (uchar[] pixels, int offset, int x, int depth, int sample)\n   30 |     {\n   31 |         // FIXME\n   32 |         return 0xFF;\n   33 |     }","lines":5,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-texture.vala#L29-33"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"RequestRedetect objects are pushed onto request_queue by redetect(), but handle_requests() only pattern-matches RequestStartScan, RequestCancel, and RequestQuit; there is no 'request is RequestRedetect' branch. The popped RequestRedetect is silently discarded every time. The actual redetect trigger is the separate need_redetect bool checked at the top of handle_requests(); the queued request object exists only as a side-channel to wake up the blocking request_queue.pop() call. This works but the RequestRedetect class and its dedicated branch-less round trip through the queue is confusing: a reader naturally expects every Request subtype to be handled in handle_requests()'s if/else chain, and the absence of a RequestRedetect case looks like a missing handler rather than an intentional no-op wakeup.","fix":"Either add an explicit (no-op) 'else if (request is RequestRedetect) { }' branch with a comment explaining it is only a wakeup, or remove the dedicated request class and just push any cheap sentinel / use request_queue's own wakeup semantics, documenting the intent clearly.","locations":[{"ref":"src/scanner.vala:113","code":"  113 | private class RequestRedetect : Request {}","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L113"},{"ref":"src/scanner.vala:846-881","code":"  846 |     private bool handle_requests ()\n  847 |     {\n  848 |         /* Redetect when idle */\n  849 |         if (state == ScanState.IDLE && need_redetect)\n  850 |             state = ScanState.REDETECT;\n  851 | \n  852 |         /* Process all requests */\n  853 |         int request_count = 0;\n  854 |         while (true)\n  855 |         {\n  856 |             Request request;\n  857 |             if ((state == ScanState.IDLE && request_count == 0) ||\n  858 |                 request_queue.length () > 0)\n  859 |                 request = request_queue.pop ();\n  860 |             else\n  861 |                 return true;\n  862 | \n  863 |             debug (\"Processing request\");\n  864 |             request_count++;\n  865 | \n  866 |             if (request is RequestStartScan)\n  867 |             {\n  868 |                 var r = (RequestStartScan) request;\n  869 |                 job_queue.append (r.job);\n  870 |             }\n  871 |             else if (request is RequestCancel)\n  872 |             {\n  873 |                 fail_scan (Sane.Status.CANCELLED, \"Scan cancelled - do not report this error\");\n  874 |             }\n  875 |             else if (request is RequestQuit)\n  876 |             {\n  877 |                 close_device ();\n  878 |                 return false;\n  879 |             }\n  880 |         }\n  881 |     }","lines":36,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L846-881"},{"ref":"src/scanner.vala:1696-1705","code":" 1696 |     public void redetect ()\n 1697 | T_TO_LEFT:\n  564 |             var t = x;\n  565 |             x = y;\n  566 |             y = scan_height - t - 1;\n  567 |             break;\n  568 |         }\n  569 | \n  570 |         var line_offset = rowstride * y;\n  571 | \n  572 |         /* Optimise for 8 bit images */\n  573 |         if (depth == 8 && n_channels == 3)\n  574 |         {\n  575 |             var o = line_offset + x * n_channels;\n  576 |             pixel[offset+0] = pixels[o];\n  577 |             pixel[offset+1] = pixels[o+1];\n  578 |             pixel[offset+2] = pixels[o+2];\n  579 |             return;\n  580 |         }\n  581 |         else if (depth == 8 && n_channels == 1)\n  582 |         {\n  583 |             var p = pixels[line_offset + x];\n  584 |             pixel[offset+0] = pixel[offset+1] = pixel[offset+2] = p;\n  585 |             return;\n  586 |         }\n  587 | \n  588 |         /* Optimise for bitmaps */\n  589 |         else if (depth == 1 && n_channels == 1)\n  590 |         {\n  591 |             var p = pixels[line_offset + (x / 8)];\n  592 |             pixel[offset+0] = pixel[offset+1] = pixel[offset+2] = (p & (0x80 >> (x % 8))) != 0 ? 0x00 : 0xFF;\n  593 |             return;\n  594 |         }\n  595 | \n  596 |         /* Optimise for 2 bit images */\n  597 |         else if (depth == 2 && n_channels == 1)\n  598 |         {\n  599 |             int block_shift[4] = { 6, 4, 2, 0 };\n  600 | \n  601 |             var p = pixels[line_offset + (x / 4)];\n  602 |             var sample = (p >> block_shift[x % 4]) & 0x3;\n  603 |             sample = sample * 255 / 3;\n  604 | \n  605 |             pixel[offset+0] = pixel[offset+1] = pixel[offset+2] = (uchar) sample;\n  606 |             return;\n  607 |         }\n  608 | \n  609 |         /* Use slow method */\n  610 |         pixel[offset+0] = get_sample (pixels, line_offset, x, depth, n_channels, 0);\n  611 |         pixel[offset+1] = get_sample (pixels, line_offset, x, depth, n_channels, 1);\n  612 | e `b != B` / `t != T` / `l != L` / `r != R` guards used in the general-case code (lines 248-321) before the unconditional get_pixel(page, R, B, ...) and get_pixel(page, L-1, B, ...) / get_pixel(page, R, T-1, ...) calls in the stradling branches, or clamp x/y inside get_pixel as defense in depth.","locations":[{"ref":"src/page-texture.vala:186-223","code":"  186 |             if (L > R)\n  187 |             {\n  188 |                 uchar p[3];\n  189 |                 get_pixel (page, R, T-1, p);\n  190 |                 red   += p[0] * (r-l)*(T-t);\n  191 |                 green += p[1] * (r-l)*(T-t);\n  192 |                 blue  += p[2] * (r-l)*(T-t);\n  193 |                 for (var y = T; y < B; y++)\n  194 |                 {\n  195 |                     get_pixel (page, R, y, p);\n  196 |                     red   += p[0] * (r-l);\n  197 |                     green += p[1] * (r-l);\n  198 |                     blue  += p[2] * (r-l);\n  199 |                 }\n  200 |                 get_pixel (page, R, B, p);\n  201 |                 red   += p[0] * (r-l)*(b-B);\n  202 |                 green += p[1] * (r-l)*(b-B);\n  203 |                 blue  += p[2] * (r-l)*(b-B);\n  204 |             }\n  205 |             /* Stradling vertical edge */\n  206 |             else\n  207 |             {\n  208 |                 uchar p[3];\n  209 |                 get_pixel (page, L - 1, B, p);\n  210 |                 red   += p[0] * (b-t)*(L-l);\n  211 |                 green += p[1] * (b-t)*(L-l);\n  212 |                 blue  += p[2] * (b-t)*(L-l);\n  213 |                 for (var x = L; x < R; x++) {\n  214 |                     get_pixel (page, x, B, p);\n  215 |                     red   += p[0] * (b-t);\n  216 |                     green += p[1] * (b-t);\n  217 |                     blue  += p[2] * (b-t);\n  218 |                 }\n  219 |                 get_pixel (page, R, B, p);\n  220 |                 red   += p[0] * (b-t)*(r-R);\n  221 | 45 |     {\n  346 |         unowned Sane.Device[] device_list = null;\n  347 |         var status = Sane.get_devices (out device_list, false);\n  348 |         debug (\"sane_get_devices () -> %s\", Sane.status_to_string (status));\n  349 |         if (status != Sane.Status.GOOD)\n  350 |         {\n  351 |             warning (\"Unable to get SANE devices: %s\", Sane.strstatus(status));\n  352 |             need_redetect = false;\n  353 |             state = ScanState.IDLE;\n  354 |             return;\n  355 |         }\n  356 | \n  357 |         /* Determine the number of each model to additionally display the name if the model names are the same. */\n  358 |         var seen = new HashTable<string, int> (str_hash, str_equal);\n  359 |         for (var i = 0; device_list[i] != null; i++)\n  360 |         {\n  361 |             if (seen.contains(device_list[i].model))\n  362 |                 seen.set(device_list[i].model, seen.get(device_list[i].model) + 1);\n  363 |             else\n  364 |                 seen.set(device_list[i].model, 1);\n  365 |         }\n  366 | \n  367 |         var devices = new List<ScanDevice> ();\n  368 |         for (var i = 0; device_list[i] != null; i++)\n  369 |         {\n  370 |             /* Virtual devices tend to not be scanners. Skip them. */\n  371 |             if (device_list[i].type == \"virtual device\")\n  372 |                 continue;\n  373 | \n  374 |             debug (\"Device: name=\\\"%s\\\" vendor=\\\"%s\\\" model=\\\"%s\\\" type=\\\"%s\\\"\",\n  375 |                    device_list[i].name, device_list[i].vendor, device_list[i].model, device_list[i].type);\n  376 | \n  377 |             var scan_device = new ScanDevice ();\n  378 |             scan_device.name = device_list[i].name;\n  379 | \n  380 |             /* Abbreviate HP as it is a long string and does not match what is on the physical scanner */\n  381 |             var vendor = device_list[i].vendor;\n  382 |             if (vendor == \"Hewlett-P ":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/postprocessor.vala#L28-43"}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"low","easy":false,"description":"The 'scanning' bool field is written exclusively by the worker thread (via set_scanning(), called from close_device(), do_complete_document(), and scan_thread()'s IDLE handling) but read from the main thread through the public is_scanning() accessor (called from simple-scan.vala). There is no synchronization (mutex/atomic) between the writer and reader threads, so the main thread has no guarantee it observes the latest value promptly; this is undefined behavior under the C memory model even though a single bool is unlikely to tear on common architectures.","fix":"Use GLib.AtomicBool (or guard with the same primitives used for need_redetect) for the scanning flag so cross-thread reads are well-defined.","locations":[{"ref":"src/scanner.vala:269","code":"  269 |     private bool scanning;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L269"},{"ref":"src/scanner.vala:308-315","code":"  308 |     private void set_scanning (bool is_scanning)\n  309 |     {\n  310 |         if ((scanning && !is_scanning) || (!scanning && is_scanning))\n  311 |         {\n  312 |             scanning = is_scanning;\n  313 |             notify_event (new NotifyScanningChanged ());\n  314 |         }\n  315 |     }","lines":8,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L308-315"},{"ref":"src/scanner.vala:1707-1710","code":" 1707 |     public bool is_scanning ()\n 1708 |     {\n 1709 |         return scanning;\n 1710 |     }","lines":4,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L1707-1710"}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"negligible","easy":true,"description":"In find_device_by_name(), `item` is cast to the nullable type `(ScanDevice?) device_model.get_item (i)` but is immediately dereferenced via `item.name` with no null check. ListModel.get_item() is documented to return non-null for indices within get_n_items(), so this is not currently reachable, but the nullable cast signals an awareness of possible null that the following line ignores, which is misleading to a reader.","fix":"Either drop the `?` from the cast to assert non-null intent, or add an explicit null guard (`if (item == null) continue;`) if null is genuinely considered possible.","locations":[{"ref":"src/app-window.vala:364-373","code":"  364 |     private ScanDevice? find_device_by_name(string name, out uint position)\n  365 |     {\n  366 |         for (uint i = 0; i < device_model.get_n_items (); i++)\n  367 |         {\n  368 |             var item = (ScanDevice?) device_model.get_item (i);\n  369 |             if (item.name == name) {\n  370 |                 position = i;\n  371 |                 return item;\n  372 |             }\n  373 |         }","lines":10,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L364-373"}]},{"id":"OTHER_7","type":"other","type_label":"Other","severity":"negligible","easy":false,"description":"BookView declares `private new string cursor;` and `private new void set_cursor (string cursor)`, explicitly shadowing Gtk.Widget's own built-in `cursor` property and `set_cursor()`/`get_cursor()` API (GTK4 Gtk.Widget has a Gdk.Cursor-typed cursor concept). The two are semantically different (BookView's is a plain string cursor-name like \"default\", not a Gdk.Cursor), but the identical naming plus the `new` shadowing keyword is easy to misread, especially since drawing_area.set_cursor(c) (the real Gtk API, line 545) is called from inside the shadowing private set_cursor method on `this`/BookView (line 538), one line a <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
