<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"PageView's `selected` property setter assigns through `this.selected = selected;` instead of the backing field `selected_`. Since `selected` is the property being defined, this re-invokes the same setter, causing unbounded recursion and a stack overflow crash. `set_selected_page_view()` in book-view.vala calls `selected_page_view.selected = true/false` on every page-selection change (adding a page, changing focus, deleting pages, etc.), so this is reliably reachable and crashes the app.","fix":"Assign to the backing field instead of the property: change line 43 to `this.selected_ = selected;`.","locations":[{"ref":"src/page-view.vala:36-46","code":"   36 |     public bool selected\n   37 |     {\n   38 |         get { return selected_; }\n   39 |         set\n   40 |         {\n   41 |             if ((this.selected && selected) || (!this.selected && !selected))\n   42 |                 return;\n   43 |             this.selected = selected;\n   44 |             changed ();\n   45 |         }\n   46 |     }","lines":11,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-view.vala#L36-46"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"scanner_failed_cb() calls remove_empty_page() unconditionally before checking whether the book is empty. remove_empty_page() does `book.get_page((int) book.n_pages - 1)`, which returns null when n_pages == 0, and then immediately dereferences it via `page.has_data`. A scan_failed signal can legitimately fire before any page was ever appended (e.g. device open/authorization failure before scanner_page_info_cb ran), making n_pages == 0 a reachable state, so this is a null-pointer crash in a normal error path, not just a theoretical one.","fix":"In remove_empty_page(), check book.n_pages == 0 (or check `page != null`) before dereferencing: `var page = book.get_page ((int) book.n_pages - 1); if (page != null && !page.has_data) book.delete_page (page);`. Alternatively reorder scanner_failed_cb to check `book.n_pages == 0` before calling remove_empty_page().","locations":[{"ref":"src/simple-scan.vala:1747-1752","code":" 1747 |     private void remove_empty_page ()\n 1748 |     {\n 1749 |         var page = book.get_page ((int) book.n_pages - 1);\n 1750 |         if (!page.has_data)\n 1751 |             book.delete_page (page);\n 1752 |     }","lines":6,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/simple-scan.vala#L1747-1752"},{"ref":"src/simple-scan.vala:1759-1764","code":" 1759 |     private void scanner_failed_cb (Scanner scanner, int error_code, string error_string)\n 1760 |     {\n 1761 |         remove_empty_page ();\n 1762 |         scanned_page = null;\n 1763 |         if (book.n_pages == 0)\n 1764 |             app.clear_document ();","lines":6,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/simple-scan.vala#L1759-1764"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"move_left_cb() and move_right_cb() read book_view.selected_page (which can be null, e.g. when the document is empty) and pass it directly to book.get_page_index(page) without a null check, unlike the sibling rotate_left_cb/rotate_right_cb/copy_page_cb which all guard with `if (page != null)`. Book.get_page_index() calls `pages.index(page)` which returns -1 when not found; cast to the unsigned return type uint this becomes 4294967295. move_left_cb then sees `index > 0` as true and calls `book.move_page(null, 4294967294)`, which does `pages.remove(null)` (no-op) followed by `pages.insert(null, (int)4294967294)`, inserting a null Page into the book's page list. Any later code iterating pages and calling a method on that entry will null-dereference/crash. These callbacks are reachable directly via the global accelerators `<` and `>` (app.move_left / app.move_right, set at lines 1397-1398) even when no page is selected.","fix":"Add `if (page == null) return;` at the top of both move_left_cb and move_right_cb before calling book.get_page_index(), matching the pattern used in rotate_left_cb/rotate_right_cb/copy_page_cb.","locations":[{"ref":"src/app-window.vala:874-888","code":"  874 |     private void move_left_cb ()\n  875 |     {\n  876 |         var page = book_view.selected_page;\n  877 |         var index = book.get_page_index (page);\n  878 |         if (index > 0)\n  879 |             book.move_page (page, index - 1);\n  880 |     }\n  881 | \n  882 |     private void move_right_cb ()\n  883 |     {\n  884 |         var page = book_view.selected_page;\n  885 |         var index = book.get_page_index (page);\n  886 |         if (index < book.n_pages - 1)\n  887 |             book.move_page (page, book.get_page_index (page) + 1);\n  888 |     }","lines":15,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L874-888"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"get_next_page and get_prev_page immediately dereference page.page (e.g. `if (p == page.page)`) without checking page for null. selected_page_view becomes null whenever the book is emptied (clear_cb) or the last page is removed (remove_cb). Pressing Left/Right arrow keys (key_cb) or scrolling (cursor_scroll_cb -> select_next_page/select_prev_page) on an empty book calls get_prev_page(null)/get_next_page(null), causing a null-pointer dereference crash.","fix":"Add a null guard at the top of get_next_page/get_prev_page (return page immediately if page == null), or guard the call sites (key_cb, cursor_scroll_cb, select_next_page/select_prev_page) to no-op when selected_page_view is null.","locations":[{"ref":"src/book-view.vala:177-209","code":"  177 |     private PageView get_next_page (PageView page)\n  178 |     {\n  179 |         for (var i = 0; ; i++)\n  180 |         {\n  181 |             var p = book.get_page (i);\n  182 |             if (p == null)\n  183 |                 break;\n  184 |             if (p == page.page)\n  185 |             {\n  186 |                 p = book.get_page (i + 1);\n  187 |                 if (p != null)\n  188 |                     return page_data.lookup (p);\n  189 |             }\n  190 |         }\n  191 | \n  192 |         return page;\n  193 |     }\n  194 | \n  195 |     private PageView get_prev_page (PageView page)\n  196 |     {\n  197 |         var prev_page = page;\n  198 |         for (var i = 0; ; i++)\n  199 |         {\n  200 |             var p = book.get_page (i);\n  201 |             if (p == null)\n  202 |                 break;\n  203 |             if (p == page.page)\n  204 |                 return prev_page;\n  205 |             prev_page = page_data.lookup (p);\n  206 |         }\n  207 | \n  208 |         return page;\n  209 |     }","lines":33,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book-view.vala#L177-209"},{"ref":"src/book-view.vala:587-590","code":"  587 |             select_page_view (get_prev_page (selected_page_view));\n  588 |             return true;\n  589 |         case Gdk.Key.Right:\n  590 |             select_page_view (get_next_page (selected_page_view));","lines":4,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book-view.vala#L587-590"},{"ref":"src/book-view.vala:619-623","code":"  619 |             select_next_page();\n  620 |         }\n  621 |         else if (dy <= 0 && dx <= 0) {\n  622 |             // Up and/or left\n  623 |             select_prev_page();","lines":5,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book-view.vala#L619-623"},{"ref":"src/book-view.vala:633-641","code":"  633 |     public void select_next_page ()\n  634 |     {\n  635 |         select_page_view (get_next_page (selected_page_view));\n  636 |     }\n  637 | \n  638 |     public void select_prev_page ()\n  639 |     {\n  640 |         select_page_view (get_prev_page (selected_page_view));\n  641 |     }","lines":9,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book-view.vala#L633-641"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"fix_pdf() opens the output file with `FileStream.open (filename + \".fixed\", \"w\")` and never checks the result for null before using it via `fixed_file.printf (...)` and `fixed_file.putc (...)`. FileStream.open returns null (not a thrown Error) on failure, e.g. when the directory is not writable or disk is full. The caller in main() wraps fix_pdf() in a try/catch (Error e), which will NOT catch this since no exception is thrown - the process will crash with a null dereference instead of printing the existing 'Error fixing PDF file' message. Contrast with the careful null check applied to log_file at line 2016-2021 in this same file.","fix":"After opening fixed_file, check for null and throw a GLib.Error (e.g. FileError.FAILED) so the existing try/catch in main() reports it cleanly: `if (fixed_file == null) throw new FileError.FAILED (\"Unable to open %s for writing\", filename + \".fixed\");`","locations":[{"ref":"src/simple-scan.vala:1889","code":" 1889 |         var fixed_file = FileStream.open (filename + \".fixed\", \"w\");","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/simple-scan.vala#L1889"},{"ref":"src/simple-scan.vala:1921-1949","code":" 1921 |                 fixed_file.printf (\"%s\", line.str.substring (1));\n 1922 |             }\n 1923 | \n 1924 |             /* Fix xref subsection count */\n 1925 |             else if (line_number == xref_line + 1 && line.str.has_prefix (\"1 \"))\n 1926 |             {\n 1927 |                 fixed_size = int.parse (line.str.substring (2)) + 1;\n 1928 |                 fixed_file.printf (\"0 %d\\n\", fixed_size);\n 1929 |                 fixed_file.printf (\"0000000000 65535 f \\n\");\n 1930 |             }\n 1931 | \n 1932 |             /* Fix xref format */\n 1933 |             else if (line_number > xref_line && line.str.has_suffix (\" 0000 n\\n\"))\n 1934 |                 fixed_file.printf (\"%010d 00000 n \\n\", int.parse (line.str) + xref_offset);\n 1935 | \n 1936 |             /* Fix xref offset */\n 1937 |             else if (startxref_line > 0 && line_number == startxref_line + 1)\n 1938 |                 fixed_file.printf (\"%d\\n\".printf (int.parse (line.str) + xref_offset));\n 1939 | \n 1940 |             else if (fixed_size > 0 && line.str.has_prefix (\"/Size \"))\n 1941 |                 fixed_file.printf (\"/Size %d\\n\".printf (fixed_size));\n 1942 | \n 1943 |             /* Fix EOF marker */\n 1944 |             else if (line_number == startxref_line + 2 && line.str.has_prefix (\"%%%%\"))\n 1945 |                 fixed_file.printf (\"%s\", line.str.substring (2));\n 1946 | \n 1947 |             else\n 1948 |                 for (var i = offset; i < end_offset; i++)\n 1949 |                     fixed_file.putc ((char) data[i]);","lines":29,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/simple-scan.vala#L1921-1949"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"layout_into divides by p.dpi at three places (lines 353, 377, 383). Page.dpi defaults to 0 when AutosaveManager.load() restores a page whose autosave keyfile section is missing the 'dpi' key (get_integer default parameter is 0, autosave-manager.vala:96). If the on-disk autosave file is corrupted/truncated/hand-edited, a page with dpi=0 can be loaded into the book, and subsequently laying out the BookView causes an integer division by zero, crashing the application.","fix":"In AutosaveManager.load(), validate that dpi (and other essential fields) are > 0 before constructing the Page, skipping/discarding malformed page entries; alternatively guard the divisions in layout_into against p.dpi <= 0.","locations":[{"ref":"src/book-view.vala:353","code":"  353 |             w = (int) ((double)w * max_dpi / p.dpi + 0.5);","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book-view.vala#L353"},{"ref":"src/book-view.vala:377","code":"  377 |                 int w = (int) ((double)p.width * max_dpi * width / (p.dpi * max_width));","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book-view.vala#L377"},{"ref":"src/book-view.vala:383","code":"  383 |                 int h = (int) ((double)p.height * max_dpi * height / (p.dpi * max_height));","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book-view.vala#L383"},{"ref":"src/autosave-manager.vala:96","code":"   96 |             var dpi = get_integer (file, page_name, \"dpi\");","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/autosave-manager.vala#L96"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"PageViewTexture's constructor swallows ThreadError when creating resize_pool (comment says 'this should never happen'), leaving resize_pool as null with no fallback or error flag. queue_update() later calls `resize_pool.add (queued)` unconditionally; if the pool ever failed to construct, this is a null dereference crash with no diagnostic about the original ThreadError.","fix":"Store the ThreadError (or a 'pool_available' flag) from the constructor and check it in queue_update(), returning/throwing a clear error instead of calling add() on a null pool.","locations":[{"ref":"src/page-texture.vala:493-504","code":"  493 | \tpublic PageViewTexture (Page page)\n  494 |     {\n  495 |         this.page = page;\n  496 | \n  497 |         try {\n  498 |             resize_pool = new ThreadPool<TextureUpdateTask>.with_owned_data (thread_func, 1, false);\n  499 |         }\n  500 |         catch (ThreadError error)\n  501 |         {\n  502 |             // Pool is non-exclusive so this should never happen\n  503 |         }\n  504 | \t}","lines":12,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-texture.vala#L493-504"},{"ref":"src/page-texture.vala:530-544","code":"  530 |     public void queue_update () throws ThreadError\n  531 |     {\n  532 |         if (in_proggres || queued == null)\n  533 |         {\n  534 |             return;\n  535 |         }\n  536 | \n  537 |         in_proggres = true;\n  538 | \n  539 |         // We copy the page as it will be sent to resize thread\n  540 |         queued.page = page.copy ();\n  541 |         resize_pool.add (queued);\n  542 | \n  543 |         queued = null;\n  544 |     }","lines":15,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-texture.vala#L530-544"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"on_page_removed unlinks the autosaved pixel file using only the bare filename stored in page_filenames (e.g. \"1234.pixels\"), not the full path under AUTOSAVE_DIR. FileUtils.unlink resolves relative to the process's current working directory, not AUTOSAVE_DIR, so the actual autosave pixel file is never deleted when a page is removed -- it leaks on disk indefinitely. Worse, if a file with that exact name happens to exist in the process CWD, unlink would delete that unrelated file instead. Contrast with cleanup() at line 231, which correctly builds the full path via Path.build_filename(AUTOSAVE_DIR, filename) before unlinking.","fix":"Build the full path before unlinking: `var path = Path.build_filename (AUTOSAVE_DIR, filename); FileUtils.unlink (path);` mirroring the pattern already used in cleanup().","locations":[{"ref":"src/autosave-manager.vala:242-251","code":"  242 |     public void on_page_removed (Page page)\n  243 |     {\n  244 |         page.scan_finished.disconnect (on_scan_finished);\n  245 |         page.crop_changed.disconnect (on_changed);\n  246 | \n  247 |         var filename = page_filenames.lookup (page);\n  248 |         if (filename != null)\n  249 |             FileUtils.unlink (filename);\n  250 |         page_filenames.remove (page);\n  251 |     }","lines":10,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/autosave-manager.vala#L242-251"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"progression_callback is declared `unowned`, but when the caller passes a null progress_cb, save_async assigns a freshly-allocated anonymous lambda closure to it. Since the field is unowned, nothing keeps the closure (and its captured state) alive once the local temporary is dropped; later invocation at line 862 from update_progression() risks calling through a dangling/freed delegate. This is a use-after-free risk, not just a leak, anytime a caller omits the progress callback.","fix":"Change the field to a strong-owning delegate type (drop `unowned`), or store the fallback lambda in a separate owned field/member method instead of an inline anonymous closure assigned to an unowned field.","locations":[{"ref":"src/book.vala:187","code":"  187 |     private unowned ProgressionCallback progression_callback;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L187"},{"ref":"src/book.vala:215-221","code":"  215 |         if (progression_callback == null)\n  216 |             this.progression_callback = (fraction) =>\n  217 |             {\n  218 |                 debug (\"Save progression: %f%%\", fraction*100.0);\n  219 |             };\n  220 |         else\n  221 |             this.progression_callback = progression_callback;","lines":7,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L215-221"},{"ref":"src/book.vala:860-864","code":"  860 |         Idle.add (() =>\n  861 |         {\n  862 |             progression_callback (progression);\n  863 |             return false;\n  864 |         });","lines":5,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L860-864"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"Neither write_multifile() (indexed_file.replace stream at line 601) nor write_pdf() (file.replace stream at line 630) ever calls stream.close() even on the success path. The FileOutputStream is simply dropped, relying on finalization to flush/close, which is not guaranteed to happen promptly and can leave data unflushed or file descriptors open longer than necessary.","fix":"Explicitly call stream.close() (with error handling) after the last write in both write_multifile and write_pdf, including in PDFWriter if it owns the stream's lifetime.","locations":[{"ref":"src/book.vala:599-608","code":"  599 |             try\n  600 |             {\n  601 |                 var stream = indexed_file.replace (null, false, FileCreateFlags.NONE);\n  602 |                 stream.write_all (write_task.data, null);\n  603 |             }\n  604 |             catch (Error error)\n  605 |             {\n  606 |                 finished_saving ();\n  607 |                 return error;\n  608 |             }","lines":10,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L599-608"},{"ref":"src/book.vala:627-637","code":"  627 |         FileOutputStream? stream = null;\n  628 |         try\n  629 |         {\n  630 |             stream = file.replace (null, false, FileCreateFlags.NONE, null);\n  631 |         }\n  632 |         catch (Error error)\n  633 |         {\n  634 |             finished_saving ();\n  635 |             return error;\n  636 |         }\n  637 |         var writer = new PDFWriter (stream);","lines":11,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L627-637"},{"ref":"src/book.vala:954-965","code":"  954 |     public void write (uint8[] data)\n  955 |     {\n  956 |         try\n  957 |         {\n  958 |             stream.write_all (data, null, null);\n  959 |         }\n  960 |         catch (Error e)\n  961 |         {\n  962 |             warning (\"Error writing PDF: %s\", e.message);\n  963 |         }\n  964 |         offset += data.length;\n  965 |     }","lines":12,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L954-965"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"update_scan_devices_cb() builds devices_copy via `devices.copy_deep ((CopyFunc) Object.ref)`, which bumps the GObject refcount of every ScanDevice in the list. devices_copy is a local GLib.List that is only read (passed to app.set_scan_devices(), which itself takes its own reference when appending to its device_model) and is never explicitly unreffed/freed with List.free_full or matching List.foreach(unref). When the function returns, the List nodes are discarded but the extra reference taken by copy_deep on each ScanDevice is never released, leaking one ref per device on every redetect event (USB hotplug, manual refresh, etc.).","fix":"Release the extra references before returning, e.g. `devices_copy.foreach ((d) => { d.unref (); });` after app.set_scan_devices() returns, or avoid the deep copy altogether and build the prepend list using `weak`/borrowed semantics so no extra ref is taken in the first place.","locations":[{"ref":"src/simple-scan.vala:113-142","code":"  113 |     private void update_scan_devices_cb (Scanner scanner, List<ScanDevice> devices)\n  114 |     {\n  115 |         var devices_copy = devices.copy_deep ((CopyFunc) Object.ref);\n  116 | \n  117 |         /* If the default device is not detected add it to the list */\n  118 |         if (default_device != null)\n  119 |         {\n  120 |             var default_in_list = false;\n  121 |             foreach (var device in devices_copy)\n  122 |             {\n  123 |                 if (device.name == default_device.name)\n  124 |                 {\n  125 |                     default_in_list = true;\n  126 |                     break;\n  127 |                 }\n  128 |             }\n  129 | \n  130 |             if (!default_in_list)\n  131 |                 devices_copy.prepend (default_device);\n  132 |         }\n  133 | \n  134 |         have_devices = devices_copy.length () > 0;\n  135 | \n  136 |         /* If SANE doesn't see anything, see if we recognise any of the USB devices */\n  137 |         string? missing_driver = null;\n  138 |         if (!have_devices)\n  139 |             missing_driver = suggest_driver ();\n  140 | \n  141 |         app.set_scan_devices (devices_copy, missing_driver);\n  142 |     }","lines":30,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/simple-scan.vala#L113-142"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"The constructor connects four signals on `book` (page_added, reordered, page_removed, changed) at lines 187-190, but the destructor only disconnects three of them - the `book.changed.connect (book_changed_cb)` connection from line 190 has no matching disconnect in ~AppWindow(). This is a copy-paste omission; while low-impact here since `book` is owned by the window and freed alongside it, it is an inconsistency that masks a real bug if this pattern is copied elsewhere or if `book` outlives the window in the future.","fix":"Add `book.changed.disconnect (book_changed_cb);` to the destructor to match the four connect calls in the constructor.","locations":[{"ref":"src/app-window.vala:187-202","code":"  187 |         book.page_added.connect (page_added_cb);\n  188 |         book.reordered.connect (reordered_cb);\n  189 |         book.page_removed.connect (page_removed_cb);\n  190 |         book.changed.connect (book_changed_cb);\n  191 |         \n  192 |         load ();\n  193 | \n  194 |         clear_document ();\n  195 |     }\n  196 | \n  197 |     ~AppWindow ()\n  198 |     {\n  199 |         book.page_added.disconnect (page_added_cb);\n  200 |         book.reordered.disconnect (reordered_cb);\n  201 |         book.page_removed.disconnect (page_removed_cb);\n  202 |     }","lines":16,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L187-202"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"show_page_cb() and email_document_async() each create a fresh temp directory via DirUtils.make_tmp(\"simple-scan-XXXXXX\") to hold a generated preview/export file, but neither the directory nor the file inside it is ever deleted. Every preview click or email-send leaves an orphaned temp directory under /tmp for the lifetime of the system (or until a system tmp-cleaner runs).","fix":"Track the created temp file/dir and delete it after the launcher/email process has consumed it (e.g. on a delayed GLib.Timeout, on launcher 'end' callback, or by registering the dir for cleanup at app exit).","locations":[{"ref":"src/app-window.vala:1024-1043","code":" 1024 |     private void show_page_cb (BookView view, Page page)\n 1025 |     {\n 1026 |         File file;\n 1027 |         try\n 1028 |         {\n 1029 |             var dir = DirUtils.make_tmp (\"simple-scan-XXXXXX\");\n 1030 |             file = File.new_for_path (Path.build_filename (dir, \"scan.png\"));\n 1031 |             page.save_png (file);\n 1032 |         }\n 1033 |         catch (Error e)\n 1034 |         {\n 1035 |             show_error_dialog (/* Error message display when unable to save image for preview */\n 1036 |                                _(\"Unable to save image for preview\"),\n 1037 |                                e.message);\n 1038 |             return;\n 1039 |         }\n 1040 | \n 1041 |         var launcher = new Gtk.FileLauncher(file);\n 1042 |         launcher.launch.begin (this, null);\n 1043 |     }","lines":20,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L1024-1043"},{"ref":"src/app-window.vala:1180-1218","code":" 1180 |     private async void email_document_async ()\n 1181 |     {\n 1182 |         try\n 1183 |         {\n 1184 |             var dir = DirUtils.make_tmp (\"simple-scan-XXXXXX\");\n 1185 |             string mime_type, filename;\n 1186 |             if (document_hint == \"text\")\n 1187 |             {\n 1188 |                 mime_type = \"application/pdf\";\n 1189 |                 filename = \"scan.pdf\";\n 1190 |             }\n 1191 |             else\n 1192 |             {\n 1193 |                 mime_type = \"image/jpeg\";\n 1194 |                 filename = \"scan.jpg\";\n 1195 |             }\n 1196 |             var file = File.new_for_path (Path.build_filename (dir, filename));\n 1197 |             yield book.save_async (mime_type, settings.get_int (\"jpeg-quality\"), file,\n 1198 |                 null, null);\n 1199 |             yield book.postprocess_async (mime_type, file, settings.get_boolean (\"postproc-enabled\"),\n 1200 |                 settings.get_string (\"postproc-script\"), settings.get_string (\"postproc-arguments\"),\n 1201 |                 settings.get_boolean (\"postproc-keep-original\"));\n 1202 |             var command_line = \"xdg-email\";\n 1203 |             if (mime_type == \"application/pdf\")\n 1204 |                 command_line += \" --attach %s\".printf (file.get_path ());\n 1205 |             else\n 1206 |             {\n 1207 |                 for (var i = 0; i < book.n_pages; i++) {\n 1208 |                     var indexed_file = make_indexed_file (file.get_uri (), i, book.n_pages);\n 1209 |                     command_line += \" --attach %s\".printf (indexed_file.get_path ());\n 1210 |                 }\n 1211 |             }\n 1212 |             Process.spawn_command_line_async (command_line);\n 1213 |         }\n 1214 |         catch (Error e)\n 1215 |         {\n 1216 |             warning (\"Unable to email document: %s\", e.message);\n 1217 |         }\n 1218 |     }","lines":39,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L1180-1218"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Page.from_data clamps crop_width/crop_height by setting them to the full scan_width/scan_height when the crop rectangle overflows, instead of clamping to the remaining space (scan_width - crop_x / scan_height - crop_y). E.g. crop_x=100, crop_width=2000, scan_width=1000 yields crop_width=1000, so crop_x+crop_width=1100 still exceeds scan_width. The resulting crop rectangle remains inconsistent (right/bottom edge past the image), which can desync hit-testing and on-screen crop overlay rendering in PageView even though get_image() happens to clamp again defensively.","fix":"Clamp to the remaining space: `this.crop_width = (crop_x + crop_width > scan_width) ? scan_width - crop_x : crop_width;` and similarly `this.crop_height = (crop_y + crop_height > scan_height) ? scan_height - crop_y : crop_height;`.","locations":[{"ref":"src/page.vala:219-220","code":"  219 |         this.crop_width = (crop_x + crop_width > scan_width) ? scan_width : crop_width;\n  220 |         this.crop_height = (crop_y + crop_height > scan_height) ? scan_height : crop_height;","lines":2,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page.vala#L219-220"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In encode_pdf, data_length for the color path is computed as `height * width * 3` using plain `int` arithmetic (line 425), with similar int multiplications for the depth==1/2/8 branches. For very high-resolution scans (e.g. high-DPI large-format originals), width*height*3 can approach or exceed INT_MAX (~2.1 billion), silently overflowing and producing a wrong (possibly negative or truncated) buffer size passed to `new uint8[data_length]`, which would then corrupt or crash during the pixel-copy loop.","fix":"Use 64-bit (size_t/int64) arithmetic for data_length computation, or add an explicit upper bound check on width*height before allocating, to avoid silent int overflow on extreme-resolution scans.","locations":[{"ref":"src/book.vala:425-426","code":"  425 |             var data_length = height * width * 3;\n  426 |             data = new uint8[data_length];","lines":2,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L425-426"},{"ref":"src/book.vala:447-448","code":"  447 |             var data_length = height * ((width * 2 + 7) / 8);\n  448 |             data = new uint8[data_length];","lines":2,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L447-448"},{"ref":"src/book.vala:492-493","code":"  492 |             var data_length = height * ((width + 7) / 8);\n  493 |             data = new uint8[data_length];","lines":2,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L492-493"},{"ref":"src/book.vala:529-530","code":"  529 |             var data_length = height * width;\n  530 |             data = new uint8 [data_length];","lines":2,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L529-530"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"set_page_info computes rowstride and buffer sizes (scan_width * depth * n_channels, scan_height * rowstride) as plain 32-bit int arithmetic with no overflow checking, using depth/n_channels/width/height values that originate from scanner driver-reported ScanPageInfo. For large-format/high-DPI scans these products can in principle overflow a 32-bit int, leading to an undersized allocation in pixels.resize() followed by out-of-bounds writes when scan lines are copied in parse_line().","fix":"Validate info.width/height/depth/n_channels are within sane bounds before computing rowstride, or perform the size arithmetic in 64-bit and check against a maximum buffer size before calling pixels.resize().","locations":[{"ref":"src/page.vala:248-273","code":"  248 |     public void set_page_info (ScanPageInfo info)\n  249 |     {\n  250 |         expected_rows = info.height;\n  251 |         dpi = (int) info.dpi;\n  252 | \n  253 |         /* Create a white page */\n  254 |         scan_width = info.width;\n  255 |         scan_height = info.height;\n  256 |         /* Variable height, try 50% of the width for now */\n  257 |         if (scan_height < 0)\n  258 |             scan_height = scan_width / 2;\n  259 |         depth = info.depth;\n  260 |         n_channels = info.n_channels;\n  261 |         rowstride = (scan_width * depth * n_channels + 7) / 8;\n  262 |         pixels.resize (scan_height * rowstride);\n  263 |         return_if_fail (pixels != null);\n  264 | \n  265 |         /* Fill with white */\n  266 |         if (depth == 1)\n  267 |             Memory.set (pixels, 0x00, scan_height * rowstride);\n  268 |         else\n  269 |             Memory.set (pixels, 0xFF, scan_height * rowstride);\n  270 | \n  271 |         size_changed ();\n  272 |         pixels_changed ();\n  273 |     }","lines":26,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page.vala#L248-273"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"set_selected_device() has fully inverted logic. find_device_by_name() sets `position` to the found index, or to Gtk.INVALID_LIST_POSITION (uint.MAX) if not found. The function then returns early when position != INVALID_LIST_POSITION (i.e. when the device WAS found), and only falls through to `device_drop_down.selected = position` when the device was NOT found - assigning the sentinel uint.MAX (an out-of-range index) to `selected`. The net effect: selecting a known device by name does nothing, and selecting an unknown device assigns garbage. This is the function used to apply the command-line/default scanner selection (see src/simple-scan.vala:91), so that feature is completely broken.","fix":"Invert the condition: `if (position == Gtk.INVALID_LIST_POSITION) return;` then `device_drop_down.selected = position;` afterwards (or simply assign unconditionally since INVALID_LIST_POSITION is itself a valid/safe 'no selection' value for Gtk.DropDown).","locations":[{"ref":"src/app-window.vala:351-362","code":"  351 |     public void set_selected_device (string device)\n  352 |     {\n  353 |         user_selected_device = true;\n  354 | \n  355 |         uint position;\n  356 |         find_device_by_name (device, out position);\n  357 | \n  358 |         if (position != Gtk.INVALID_LIST_POSITION)\n  359 |             return;\n  360 | \n  361 |         device_drop_down.selected = position;\n  362 |     }","lines":12,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/app-window.vala#L351-362"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"set_selected_page_view's comment says 'Deselect existing page if changed' but it sets selected_page_view.selected = true instead of false, inverting the deselect logic. PageView.selected is a plain boolean (true = selected). This means the previously selected page is marked selected (not deselected) when the selection changes, leaving stale selection-highlight/focus-render state on the old page.","fix":"Change line 236 to `selected_page_view.selected = false;` to actually deselect the previous page.","locations":[{"ref":"src/book-view.vala:232-248","code":"  232 |     private void set_selected_page_view (PageView? page)\n  233 |     {\n  234 |         /* Deselect existing page if changed */\n  235 |         if (selected_page_view != null && page != selected_page_view)\n  236 |             selected_page_view.selected = true;\n  237 | \n  238 |         selected_page_view = page;\n  239 |         redraw();\n  240 |         if (selected_page_view == null)\n  241 |             return;\n  242 | \n  243 |         /* Select new page if widget has focus */\n  244 |         if (!drawing_area.has_focus)\n  245 |             selected_page_view.selected = false;\n  246 |         else\n  247 |             selected_page_view.selected = true;\n  248 |     }","lines":17,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book-view.vala#L232-248"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Both ruler-drawing loops in PageView.render increment ruler_tick by `page.dpi/5` (integer division). If page.dpi is between 0 and 4 inclusive, this increment is 0 and the `while (ruler_tick <= page.width)` / `while (ruler_tick <= page.height)` loops never terminate, hanging the GTK main thread (render runs synchronously in the draw callback) and freezing the whole application UI.","fix":"Guard against a zero/near-zero increment, e.g. `var tick_step = int.max (1, page.dpi / 5);` and use that in both loops, or validate dpi > 0 when it is set on Page.","locations":[{"ref":"src/page-view.vala:465-485","code":"  465 |         while (ruler_tick <= page.width)\n  466 |         {\n  467 |             line = page_to_screen_x (ruler_tick) + 0.5;\n  468 |             if (big_ruler_tick == 5)\n  469 |             {\n  470 |                 context.move_to (line, 0);\n  471 |                 context.line_to (line, -ruler_width);\n  472 |                 context.move_to (line, h);\n  473 |                 context.line_to (line, h + ruler_width);\n  474 |                 big_ruler_tick = 0;\n  475 |             }\n  476 |             else\n  477 |             {\n  478 |                 context.move_to (line, -2);\n  479 |                 context.line_to (line, -5);\n  480 |                 context.move_to (line, h + 2);\n  481 |                 context.line_to (line, h + 5);\n  482 |             }\n  483 |             ruler_tick = ruler_tick + page.dpi/5;\n  484 |             big_ruler_tick = big_ruler_tick + 1;\n  485 |         }","lines":21,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-view.vala#L465-485"},{"ref":"src/page-view.vala:492-515","code":"  492 |         while (ruler_tick <= page.height)\n  493 |         {\n  494 |             line = page_to_screen_y (ruler_tick) + 0.5;\n  495 | \n  496 |             if (big_ruler_tick == 5)\n  497 |             {\n  498 |                 context.move_to (0, line);\n  499 |                 context.line_to (-ruler_width, line);\n  500 | \n  501 |                 context.move_to (w, line);\n  502 |                 context.line_to (w + ruler_width, line);\n  503 |                 big_ruler_tick = 0;\n  504 |             }\n  505 |             else\n  506 |             {\n  507 |                 context.move_to (-2, line);\n  508 |                 context.line_to (-5, line);\n  509 | \n  510 |                 context.move_to (w + 2, line);\n  511 |                 context.line_to (w + 5, line);\n  512 |             }\n  513 |             ruler_tick = ruler_tick + page.dpi/5;\n  514 |             big_ruler_tick = big_ruler_tick + 1;\n  515 |         }","lines":24,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-view.vala#L492-515"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In Page's scan_direction setter, the 180-degree rotation case (left_steps == 2) recomputes crop_y using `width` instead of `height`. crop_y is bounded by the page height, not width, so on non-square pages this produces a wrong (and potentially negative or out-of-range) crop_y after a 180-degree rotation. The neighboring 90-degree cases (case 1, case 3) correctly use width/height per axis, making this an inconsistent copy-paste-style slip.","fix":"Use `crop_y = height - (crop_y + crop_height);` to match the other rotation branches and the height-bound nature of crop_y.","locations":[{"ref":"src/page.vala:121-125","code":"  121 |                 /* 180 degrees */\n  122 |                 case 2:\n  123 |                     crop_x = width - (crop_x + crop_width);\n  124 |                     crop_y = width - (crop_y + crop_height);\n  125 |                     break;","lines":5,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page.vala#L121-125"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The 'postproc-arguments' GSettings string (edited as free text in postproc_args_entry) is passed through Book.postprocess_async into Postprocessor.process as a single element of spawn_args (`{script, mime_type, keep_original, source_file, arguments}`). Because Process.spawn_sync with SpawnFlags.SEARCH_PATH does not invoke a shell, the entire arguments string is delivered to the child process as ONE argv element (argv[4]), not split into separate arguments. A user who enters e.g. \"--quality 90 --verbose\" expecting multiple separate script arguments will instead have the whole string passed as a single literal argument, which most scripts won't parse as intended.","fix":"Either document clearly that 'Script arguments' is a single opaque argument, or split the arguments string (e.g. via GLib.Shell.parse_argv) and splice the resulting array into spawn_args so each whitespace-separated token becomes its own argv entry.","locations":[{"ref":"src/postprocessor.vala:19-21","code":"   19 |     public int process(string script, string mime_type, bool keep_original, string source_file, string arguments) throws Error {\n   20 |         // Code copied and adapted from https://valadoc.org/glib-2.0/GLib.Process.spawn_sync.html\n   21 |         string[] spawn_args = {script, mime_type, keep_original ? \"true\" : \"false\", source_file, arguments };","lines":3,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/postprocessor.vala#L19-21"},{"ref":"src/preferences-dialog.vala:217-219","code":"  217 |         var postproc_arguments = settings.get_string(\"postproc-arguments\");\n  218 |         postproc_args_entry.set_text(postproc_arguments);\n  219 |         postproc_args_entry.changed.connect (() => { settings.set_string(\"postproc-arguments\", postproc_args_entry.get_text()); });","lines":3,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/preferences-dialog.vala#L217-219"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In set_int_option, when the option has a RANGE constraint with a nonzero quant, the code does 'v *= option.range.quant' before clamping to [min, max]. Per the SANE API, range.quant is the quantization step that requested values should be rounded to the nearest multiple of (i.e. v should become round(v / quant) * quant), not multiplied by. Multiplying the caller-supplied value by quant produces a wildly different (and almost always out-of-range, then clamped to max) result whenever a backend reports a nonzero quant for an int-typed ranged option.","fix":"Replace 'v *= option.range.quant' with proper quantization, e.g. round v to the nearest multiple of quant relative to range.min: v = option.range.min + (int) Math.round ((double)(v - option.range.min) / option.range.quant) * option.range.quant, then clamp to [min, max].","locations":[{"ref":"src/scanner.vala:485-493","code":"  485 |         if (option.constraint_type == Sane.ConstraintType.RANGE)\n  486 |         {\n  487 |             if (option.range.quant != 0)\n  488 |                 v *= option.range.quant;\n  489 |             if (v < option.range.min)\n  490 |                 v = option.range.min;\n  491 |             if (v > option.range.max)\n  492 |                 v = option.range.max;\n  493 |         }","lines":9,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L485-493"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In AutosaveManager.load(), if the 'pages' key in the keyfile is an empty string (e.g. a previous autosave with zero non-empty pages), `\"\".split(\" \")` returns an array containing a single empty string, not an empty array. The loop body then runs once with page_name == \"\", calling get_value/get_integer with group name \"\", which all fail silently (caught, returning defaults), resulting in a phantom 0x0-dimension Page being constructed and appended to the book.","fix":"Skip the loop entirely when pages == \"\" (e.g. `if (pages != \"\") foreach (...) { ... }`), or filter out empty page_name entries before processing.","locations":[{"ref":"src/autosave-manager.vala:86-168","code":"   86 |         var pages = get_value (file, \"simple-scan\", \"pages\");\n   87 |         foreach (var page_name in pages.split (\" \"))\n   88 |         {\n   89 |             debug (\"Loading automatically saved page %s\", page_name);\n   90 | \n   91 |             var scan_width = get_integer (file, page_name, \"scan-width\");\n   92 |             var scan_height = get_integer (file, page_name, \"scan-height\");\n   93 |             var rowstride = get_integer (file, page_name, \"rowstride\");\n   94 |             var n_channels = get_integer (file, page_name, \"n-channels\");\n   95 |             var depth = get_integer (file, page_name, \"depth\");\n   96 |             var dpi = get_integer (file, page_name, \"dpi\");\n   97 |             var scan_direction_name = get_value (file, page_name, \"scan-direction\");\n   98 |             ScanDirection scan_direction = ScanDirection.TOP_TO_BOTTOM;\n   99 |             switch (scan_direction_name)\n  100 |             {\n  101 |             case \"TOP_TO_BOTTOM\":\n  102 |                 scan_direction = ScanDirection.TOP_TO_BOTTOM;\n  103 |                 break;\n  104 |             case \"LEFT_TO_RIGHT\":\n  105 |                 scan_direction = ScanDirection.LEFT_TO_RIGHT;\n  106 |                 break;\n  107 |             case \"BOTTOM_TO_TOP\":\n  108 |                 scan_direction = ScanDirection.BOTTOM_TO_TOP;\n  109 |                 break;\n  110 |             case \"RIGHT_TO_LEFT\":\n  111 |                 scan_direction = ScanDirection.RIGHT_TO_LEFT;\n  112 |                 break;\n  113 |             }\n  114 |             var color_profile = get_value (file, page_name, \"color-profile\");\n  115 |             if (color_profile == \"\")\n  116 |                 color_profile = null;\n  117 |             var pixels_filename = get_value (file, page_name, \"pixels-filename\");\n  118 |             var has_crop = get_boolean (file, page_name, \"has-crop\");\n  119 |             var crop_name = get_value (file, page_name, \"crop-name\");\n  120 | \n  121 |             if (crop_name == \"\")\n  122 |             {\n  123 |                 // If it has no crop name but has crop it probably means that it is a custom crop\n  124 |                 if (has_crop)\n  125 |                     crop_name = \"custom\";\n  126 |                 else\n  127 |                     crop_name = null;\n  128 |             }\n  129 | \n  130 |             var crop_x = get_integer (file, page_name, \"crop-x\");\n  131 |             var crop_y = get_integer (file, page_name, \"crop-y\");\n  132 |             var crop_width = get_integer (file, page_name, \"crop-width\");\n  133 |             var crop_height = get_integer (file, page_name, \"crop-height\");\n  134 | \n  135 |             uchar[]? pixels = null;\n  136 |             if (pixels_filename != \"\")\n  137 |             {\n  138 |                 var path = Path.build_filename (AUTOSAVE_DIR, pixels_filename);\n  139 |                 var f = File.new_for_path (path);\n  140 |                 try\n  141 |                 {\n  142 |                     f.load_contents (null, out pixels, null);\n  143 |                 }\n  144 |                 catch (Error e)\n  145 |                 {\n  146 |                     warning (\"Failed to load pixel information\");\n  147 |                     continue;\n  148 |                 }\n  149 |             }\n  150 | \n  151 |             var page = new Page.from_data (scan_width,\n  152 |                                            scan_height,\n  153 |                                            rowstride,\n  154 |                                            n_channels,\n  155 |                                            depth,\n  156 |                                            dpi,\n  157 |                                            scan_direction,\n  158 |                                            color_profile,\n  159 |                                            pixels,\n  160 |                                            has_crop,\n  161 |                                            crop_name,\n  162 |                                            crop_x,\n  163 |                                            crop_y,\n  164 |                                            crop_width,\n  165 |                                            crop_height);\n  166 |             page_filenames.insert (page, pixels_filename);\n  167 |             book.append_page (page);\n  168 |         }","lines":83,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/autosave-manager.vala#L86-168"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"get_page() supports negative indices by adding pages.length(), but does not clamp/validate the result. If page_number is more negative than -pages.length(), the computed index stays negative; since pages.nth_data() takes a uint parameter, a negative int silently wraps to a huge unsigned value. GLib's List.nth_data returns null for out-of-range indices rather than crashing, but the function gives no indication that the caller passed an invalid index versus a legitimately empty book.","fix":"Validate page_number range explicitly (e.g. clamp or return null/throw for out-of-range indices) instead of relying on implicit uint wraparound behavior of nth_data.","locations":[{"ref":"src/book.vala:153-158","code":"  153 |     public Page get_page (int page_number)\n  154 |     {\n  155 |         if (page_number < 0)\n  156 |             page_number = (int) pages.length () + page_number;\n  157 |         return pages.nth_data (page_number);\n  158 |     }","lines":6,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L153-158"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"get_page_index() returns `uint` but pages.index(page) (GLib.List.index) returns -1 when the page is not found in the list. Implicitly converting -1 to uint silently wraps to 4294967295 instead of signalling 'not found', which is a latent trap for any future caller that doesn't already guarantee the page exists in the book.","fix":"Return `int` from get_page_index (propagating -1 for not-found) and have callers explicitly check for -1, or assert/throw when the page isn't found.","locations":[{"ref":"src/book.vala:160-163","code":"  160 |     public uint get_page_index (Page page)\n  161 |     {\n  162 |         return pages.index (page);\n  163 |     }","lines":4,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/book.vala#L160-163"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_crop_location computes dw/dh as `page_to_screen_x(crop_width) + border_width + ruler_width` (and similarly for dh), conflating a size with a position offset. Since ix/iy are already offset-relative (ix = x - dx), comparing ix against dw effectively shifts the right/bottom hit-test boundary outward by an extra border_width+ruler_width (10px), making the crop hit-test area larger than the actual drawn crop rectangle on the right/bottom edges.","fix":"Compute dw/dh as pure screen-space sizes (page_to_screen_x(crop_width), page_to_screen_y(crop_height)) without adding border_width+ruler_width, then compare ix against dw directly.","locations":[{"ref":"src/page-view.vala:149-157","code":"  149 |         var dx = page_to_screen_x (cx) + border_width + ruler_width;\n  150 |         var dy = page_to_screen_y (cy) + border_width + ruler_width;\n  151 |         var dw = page_to_screen_x (cw) + border_width + ruler_width;\n  152 |         var dh = page_to_screen_y (ch) + border_width + ruler_width;\n  153 |         var ix = x - dx;\n  154 |         var iy = y - dy;\n  155 | \n  156 |         if (ix < 0 || ix > dw || iy < 0 || iy > dh)\n  157 |             return CropLocation.NONE;","lines":9,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/page-view.vala#L149-157"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"authorization_cb copies credentials into fixed-size SANE-provided buffers with the bounds check on the wrong side of the && : 'credentials.username[i] != '\\0' && i < Sane.MAX_USERNAME_LEN' evaluates the source-string index access before the length check, instead of after. The same pattern is repeated for the password loop. Elsewhere in the same file (set_string_option, line 597) the equivalent loop correctly puts the bound check first: 'i < (option.size - 1) && value[i] != '\\0''. While GLib strings are NUL-terminated so this does not currently cause an actual out-of-bounds read, the order is inconsistent with the established safe pattern in this file and is fragile if the source type ever changes to a non-NUL-terminated buffer.","fix":"Swap the operand order to check the length bound first, matching the pattern used in set_string_option: 'i < Sane.MAX_USERNAME_LEN && credentials.username[i] != '\\0''.","locations":[{"ref":"src/scanner.vala:806","code":"  806 |         for (var i = 0; credentials.username[i] != '\\0' && i < Sane.MAX_USERNAME_LEN; i++)","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L806"},{"ref":"src/scanner.vala:808","code":"  808 |         for (var i = 0; credentials.password[i] != '\\0' && i < Sane.MAX_PASSWORD_LEN; i++)","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L808"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"do_read() computes n_to_read = buffer.length - n_used and passes it to Sane.read without ever validating it is positive. The invariant that keeps it positive (buffer always sized at least one full line larger than n_used) depends on parameters.bytes_per_line being nonzero; if a misbehaving SANE backend reports bytes_per_line == 0 in do_get_parameters(), buffer is allocated with length 1, and the line-feed-out logic at n_used >= parameters.bytes_per_line becomes 'n_used >= 0' which is always true, potentially producing a degenerate ScanLine with data_length 0 and a divide n_used / line.data_length by zero at line 1557.","fix":"In do_get_parameters(), validate parameters.bytes_per_line > 0 (and pixels_per_line > 0) before allocating the buffer and transitioning to ScanState.READ; call fail_scan() with a communication error if the backend reports degenerate parameters.","locations":[{"ref":"src/scanner.vala:1444-1446","code":" 1444 |         var buffer_size = parameters.bytes_per_line + 1; /* Use +1 so buffer is not resized if driver returns one line per read */\n 1445 |         buffer = new uchar[buffer_size];\n 1446 |         n_used = 0;","lines":3,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L1444-1446"},{"ref":"src/scanner.vala:1486","code":" 1486 |         var n_to_read = buffer.length - n_used;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L1486"},{"ref":"src/scanner.vala:1531","code":" 1531 |         if (n_used >= parameters.bytes_per_line)","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L1531"},{"ref":"src/scanner.vala:1557","code":" 1557 |             line.n_lines = n_used / line.data_length;","lines":1,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L1557"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The exact same complex boolean condition for the '8-bit gray to 2-bit gray' bit-depth-reduction hack is duplicated verbatim in two places: once to decide info.depth for the page-info notification, and again to decide whether to actually perform the bit-packing transform on line data. Both are marked with the same FIXME comment. If the condition is ever updated in one place (e.g. to support more depth/mode combinations) it is easy to forget the other, leaving the reported depth and the actual encoded data inconsistent.","fix":"Factor the condition into a single helper method (e.g. should_reduce_depth(job)) and call it from both do_get_parameters() and do_read().","locations":[{"ref":"src/scanner.vala:1429-1432","code":" 1429 |         /* Reduce bit depth if requested lower than received */\n 1430 |         // FIXME: This a hack and only works on 8 bit gray to 2 bit gray\n 1431 |         if (parameters.depth == 8 && parameters.format == Sane.Frame.GRAY && job.depth == 2 && job.scan_mode == ScanMode.GRAY)\n 1432 |             info.depth = job.depth;","lines":4,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L1429-1432"},{"ref":"src/scanner.vala:1575-1579","code":" 1575 |             /* Reduce bit depth if requested lower than received */\n 1576 |             // FIXME: This a hack and only works on 8 bit gray to 2 bit gray\n 1577 |             if (parameters.depth == 8 && parameters.format == Sane.Frame.GRAY &&\n 1578 |                 job.depth == 2 && job.scan_mode == ScanMode.GRAY)\n 1579 |             {","lines":5,"link":"https://gitlab.gnome.org/GNOME/simple-scan/-/blob/ab4ef9f4cffb3106d6bbbc1ab0371d25f6ba32e4/src/scanner.vala#L1575-1579"}]},{"id":"E
