<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`relative_index_file_helper` slices the crate name by byte offsets (`&name[..1]`,\n`&name[0..2]`, `&name[2..4]`) but `match name.len()` is a byte length, not a char\ncount. For a name containing multi-byte UTF-8 characters these byte indices can fall\ninside a character boundary and panic. Example: a 3-byte single-character name like\n`\"€\"` makes the `len() == 3` arm execute `&name[..1]`, which panics; a 4-byte\ntwo-character name (e.g. two 2-byte chars) makes the `_` arm execute `&name[0..2]` /\n`&name[2..4]`, splitting the chars and panicking. This is reachable from the public\n`relative_index_file`, `relative_index_file_for_url`, `read_entry`, `upsert_entry`,\nand `remove_entry` APIs which all accept an arbitrary `&str` crate name. The\n`to_lowercase()` step does not guarantee ASCII output.","fix":"Operate on character boundaries, not byte indices, or restrict the function to\nvalidated ASCII names. For example use `name.chars()` / `char_indices()` to take the\nfirst 1/2/4 characters, or assert the name is ASCII before slicing and return an error\notherwise instead of panicking.","locations":[{"ref":"crates/crates_io_index/src/repo.rs:163-170","code":"  163 |     fn relative_index_file_helper(name: &str) -> Vec<&str> {\n  164 |         match name.len() {\n  165 |             1 => vec![\"1\", name],\n  166 |             2 => vec![\"2\", name],\n  167 |             3 => vec![\"3\", &name[..1], name],\n  168 |             _ => vec![&name[0..2], &name[2..4], name],\n  169 |         }\n  170 |     }","lines":8,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_index/src/repo.rs#L163-L170"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`http_backend` parses the raw stdout of `git http-backend` with several unchecked unwraps that will panic (crashing the worker task) on malformed CGI output: `line.split_once(':').unwrap()` panics on a header line without a colon; `&value[1..]` panics (byte index out of bounds / not on a char boundary) when the header value after the colon is empty; and `key.parse::<HeaderName>().unwrap()` / `HeaderValue::from_str(value).unwrap()` panic on any header name/value that is not valid. While git output is normally well-formed, a panic here is avoidable and turns a parsing edge case into a task crash rather than a 500.","fix":"Replace the unwraps with graceful error handling returning `StatusCode::INTERNAL_SERVER_ERROR`: skip/ignore lines that don't `split_once(':')`, use `value.strip_prefix(' ').unwrap_or(value)` instead of `&value[1..]`, and `?`/`map_err` the header name/value parsing.","locations":[{"ref":"src/controllers/git.rs:61-66","code":"   61 |             let (key, value) = line.split_once(':').unwrap();\n   62 |             let value = &value[1..];\n   63 |             headers.insert(\n   64 |                 key.parse::<HeaderName>().unwrap(),\n   65 |                 HeaderValue::from_str(value).unwrap(),\n   66 |             );","lines":6,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/git.rs#L61-L66"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`process_tarball()` is documented to guarantee a `package` section, but the subsequent `.as_local().unwrap()` calls assume every optional manifest field that is present resolves to a local (non-inherited) value. `process_tarball` is said to reject inheritance, but these unwraps still assume that invariant holds for every field (version, description, license, license_file, homepage, documentation, repository, rust_version, edition, keywords, categories). If the tarball-processing layer ever fails to strip an inherited/workspace value for any of these fields (attacker-controlled upload), the unwrap panics and takes down the worker thread handling the publish request instead of returning a 400. These are attacker-controllable inputs reaching `unwrap()`.","fix":"Replace the chain of `.as_local().unwrap()` calls with proper error handling that maps a non-local/inherited value to `bad_request(...)`, so malformed manifests return 400 instead of panicking.","locations":[{"ref":"src/controllers/krate/publish.rs:265-290","code":"  265 |     let package = tarball_info.manifest.package.unwrap();\n  266 |     if package.name != metadata.name {\n  267 |         let message = format!(\n  268 |             \"metadata name `{}` does not match manifest name `{}`\",\n  269 |             metadata.name, package.name\n  270 |         );\n  271 |         return Err(bad_request(message));\n  272 |     }\n  273 | \n  274 |     let manifest_version = package.version.map(|it| it.as_local().unwrap()).unwrap();\n  275 |     if manifest_version != metadata.vers {\n  276 |         let message = format!(\n  277 |             \"metadata version `{}` does not match manifest version `{manifest_version}`\",\n  278 |             metadata.vers\n  279 |         );\n  280 |         return Err(bad_request(message));\n  281 |     }\n  282 | \n  283 |     let description = package.description.map(|it| it.as_local().unwrap());\n  284 |     let mut license = package.license.map(|it| it.as_local().unwrap());\n  285 |     let license_file = package.license_file.map(|it| it.as_local().unwrap());\n  286 |     let homepage = package.homepage.map(|it| it.as_local().unwrap());\n  287 |     let documentation = package.documentation.map(|it| it.as_local().unwrap());\n  288 |     let repository = package.repository.map(|it| it.as_local().unwrap());\n  289 |     let rust_version = package.rust_version.map(|rv| rv.as_local().unwrap());\n  290 |     let edition = package.edition.map(|rv| rv.as_local().unwrap());","lines":26,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/publish.rs#L265-L290"},{"ref":"src/controllers/krate/publish.rs:344-347","code":"  344 |     let keywords = package\n  345 |         .keywords\n  346 |         .map(|it| it.as_local().unwrap())\n  347 |         .unwrap_or_default();","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/publish.rs#L344-L347"},{"ref":"src/controllers/krate/publish.rs:363-366","code":"  363 |     let categories = package\n  364 |         .categories\n  365 |         .map(|it| it.as_local().unwrap())\n  366 |         .unwrap_or_default();","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/publish.rs#L363-L366"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"EMAIL_ENV is a LazyLock that reads `src/email/templates` from the filesystem with `.expect(...)`/panic on every error (missing directory, unreadable file, invalid UTF-8 filename, template parse error). Because it is lazily initialized on first email send rather than at boot, a packaging/CWD issue where the templates directory is not present surfaces as a panic inside a request/worker task the first time an email is sent, not at startup. Templates are loaded relative to the process CWD (`src/email/templates`), which is fragile in production deployments.","fix":"Embed templates at compile time (include_dir/RustEmbed) or load them eagerly at startup and fail the health check; do not depend on the runtime CWD for a request-path resource.","locations":[{"ref":"src/email.rs:18-82","code":"   18 | static EMAIL_ENV: LazyLock<Environment<'static>> = LazyLock::new(|| {\n   19 |     let mut env = Environment::new();\n   20 | \n   21 |     // Load templates from the templates directory\n   22 |     let entries = std::fs::read_dir(\"src/email/templates\");\n   23 |     let entries = entries.expect(\"Failed to read email templates directory\");\n   24 | \n   25 |     for entry in entries {\n   26 |         let entry = entry.expect(\"Failed to read directory entry\");\n   27 | \n   28 |         let path = entry.path();\n   29 |         let file_type = entry.file_type().expect(\"Failed to get file type\");\n   30 | \n   31 |         // Handle base template files\n   32 |         if file_type.is_file() && path.extension().and_then(|s| s.to_str()) == Some(\"j2\") {\n   33 |             let template_name = entry.file_name();\n   34 |             let template_name = template_name.to_str();\n   35 |             let template_name = template_name.expect(\"Invalid UTF-8 in template filename\");\n   36 | \n   37 |             let template_contents = std::fs::read_to_string(&path)\n   38 |                 .unwrap_or_else(|error| panic!(\"Failed to read template {template_name}: {error}\"));\n   39 | \n   40 |             env.add_template_owned(template_name.to_string(), template_contents)\n   41 |                 .expect(\"Failed to add template\");\n   42 |         }\n   43 | \n   44 |         if !file_type.is_dir() {\n   45 |             continue;\n   46 |         }\n   47 | \n   48 |         // Handle email template directories\n   49 |         let dir_name = entry.file_name();\n   50 |         let email_name = dir_name.to_str();\n   51 |         let email_name = email_name.expect(\"Invalid UTF-8 in email template directory name\");\n   52 | \n   53 |         // Load subject.txt.j2 file\n   54 |         let subject_path = path.join(\"subject.txt.j2\");\n   55 |         let subject_contents = std::fs::read_to_string(&subject_path).unwrap_or_else(|error| {\n   56 |             panic!(\"Failed to read subject template for {email_name}: {error}\")\n   57 |         });\n   58 |         let filename = format!(\"{email_name}/subject.txt.j2\");\n   59 |         env.add_template_owned(filename, subject_contents)\n   60 |             .expect(\"Failed to add subject template\");\n   61 | \n   62 |         // Load body.txt.j2 file\n   63 |         let body_path = path.join(\"body.txt.j2\");\n   64 |         let body_contents = std::fs::read_to_string(&body_path).unwrap_or_else(|error| {\n   65 |             panic!(\"Failed to read body template for {email_name}: {error}\")\n   66 |         });\n   67 |         let filename = format!(\"{email_name}/body.txt.j2\");\n   68 |         env.add_template_owned(filename, body_contents)\n   69 |             .expect(\"Failed to add body template\");\n   70 | \n   71 |         // Load body.html.j2 file\n   72 |         let html_path = path.join(\"body.html.j2\");\n   73 |         let html_contents = std::fs::read_to_string(&html_path).unwrap_or_else(|error| {\n   74 |             panic!(\"Failed to read HTML body template for {email_name}: {error}\")\n   75 |         });\n   76 |         let filename = format!(\"{email_name}/body.html.j2\");\n   77 |         env.add_template_owned(filename, html_contents)\n   78 |             .expect(\"Failed to add HTML body template\");\n   79 |     }\n   80 | \n   81 |     env\n   82 | });","lines":65,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/email.rs#L18-L82"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"families_to_json_events panics via `panic!(\"unsupported metric type\")` on any metric family that is not COUNTER/GAUGE/HISTOGRAM (e.g. SUMMARY/UNTYPED). LogEncoder::encode is the production Heroku metrics path, so a single unexpected metric type crashes the scrape/encoding path. The sibling datadog.rs deliberately logs-and-skips unsupported types, making this inconsistent and riskier.","fix":"Log a warning and skip/continue on unsupported metric types instead of panicking, matching datadog.rs.","locations":[{"ref":"src/metrics/log_encoder.rs:113-115","code":"  113 |                 other => {\n  114 |                     panic!(\"unsupported metric type: {other:?}\")\n  115 |                 }","lines":3,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/metrics/log_encoder.rs#L113-L115"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"normalize_path_inner re-parses the rebuilt path-and-query with `.parse().unwrap()`. The path is attacker-controlled and reconstructed via PathBuf/to_string_lossy, which can introduce characters (e.g. U+FFFD, or sequences invalid in a URI) that fail PathAndQuery parsing, panicking the request task on crafted input. CatchPanicLayer turns this into a 500, but it is needless per-request panic/log noise driven by untrusted input.","fix":"Use `if let Ok(paq) = format!(...).parse()` and skip normalization (leave the original URI) on parse failure instead of unwrapping.","locations":[{"ref":"src/middleware/normalize_path.rs:48-55","code":"   48 |         let new_path_and_query = uri.path_and_query().map(|path_and_query| {\n   49 |             match path_and_query.query() {\n   50 |                 Some(query) => format!(\"{path}?{query}\"),\n   51 |                 None => path,\n   52 |             }\n   53 |             .parse()\n   54 |             .unwrap()\n   55 |         });","lines":8,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/normalize_path.rs#L48-L55"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"check_rate_limit computes `retry_after = bucket.last_refill + chrono::Duration::from_std(rate).unwrap()`. `chrono::Duration::from_std` returns Err if the std Duration exceeds chrono's representable range. The `rate` originates from configuration (RATE_LIMIT_* env vars / config). A misconfigured very large rate duration would panic the request thread on every rate-limited response. Request-time unwrap on config-derived data.","fix":"Use `chrono::Duration::from_std(...).unwrap_or_else( ":"Panic","severity":"low","easy":false,"description":"The HTTP-client constructors build reqwest clients (and a TLS certificate) with `.unwrap()`: `RealDocsRsClient::new`, `Fastly::new`, and `TeamRepoImpl::build_client` (including `Certificate::from_pem(...).unwrap()`). A reqwest/TLS backend initialization failure would panic the process at construction time rather than surfacing a recoverable error.","fix":"Return a `Result` from the constructors and propagate the build error, or document why a startup panic is acceptable here.","locations":[{"ref":"crates/crates_io_docs_rs/src/lib.rs:51-54","code":"   51 |             client: reqwest::Client::builder()\n   52 |                 .user_agent(crates_io_version::user_agent())\n   53 |                 .build()\n   54 |                 .unwrap(),","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_docs_rs/src/lib.rs#L51-L54"},{"ref":"crates/crates_io_fastly/src/lib.rs:35-38","code":"   35 |         let client = ClientBuilder::new()\n   36 |             .user_agent(user_agent())\n   37 |             .build()\n   38 |             .unwrap();","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_fastly/src/lib.rs#L35-L38"},{"ref":"crates/crates_io_team_repo/src/lib.rs:44-52","code":"   44 | fn build_client() -> Client {\n   45 |     let x1_cert = Certificate::from_pem(certs::ISRG_ROOT_X1).unwrap();\n   46 |     let x2_cert = Certificate::from_pem(certs::ISRG_ROOT_X2).unwrap();\n   47 | \n   48 |     Client::builder()\n   49 |         .tls_certs_only([x1_cert, x2_cert])\n   50 |         .build()\n   51 |         .unwrap()\n   52 | }","lines":9,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_team_repo/src/lib.rs#L44-L52"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`RepositoryConfig::from_environment` uses `.expect(...)` when base64-decoding the SSH\nkey and when converting the decoded bytes to UTF-8. A malformed `GIT_SSH_KEY`\nenvironment variable (bad base64 or non-UTF-8 content) will panic the process at\nstartup instead of returning the `anyhow::Result` that the function signature promises.","fix":"Replace both `.expect()` calls with `?` and `.context(...)` so a bad key value returns an error instead of panicking.","locations":[{"ref":"crates/crates_io_index/src/repo.rs:35-39","code":"   35 |                 let key = general_purpose::STANDARD\n   36 |                     .decode(ssh_key.expose_secret())\n   37 |                     .expect(\"failed to base64 decode the ssh key\");\n   38 |                 let key =\n   39 |                     String::from_utf8(key).expect(\"failed to convert the ssh key to a string\");","lines":5,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_index/src/repo.rs#L35-L39"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`get_files_modified_since` calls `file.path().unwrap()` on each diff delta's new file.\n`git2::DiffFile::path()` returns `Option<&Path>` and is `None` when the path is not\nvalid UTF-8 (libgit2 only exposes the path through the UTF-8 accessor). A non-UTF-8\npath in the index tree would therefore panic instead of producing an error. The index\nis trusted, so impact is limited, but it is an avoidable unwrap on data derived from a\nremote git repository.","fix":"Use `filter_map` and skip (or error on) deltas whose `new_file().path()` is `None` instead of unwrapping.","locations":[{"ref":"crates/crates_io_index/src/repo.rs:322-327","code":"  322 |         let files = diff\n  323 |             .deltas()\n  324 |             .map(|delta| delta.new_file())\n  325 |             .filter(|file| file.exists())\n  326 |             .map(|file| file.path().unwrap().to_path_buf())\n  32 get()`, which is `None` for a symbolic HEAD reference.\nIn a bare clone HEAD normally resolves to a commit, so this is unlikely in practice,\nbut a repository whose HEAD is unexpectedly symbolic would panic rather than error.","fix":"Return an error (e.g. `head.target().context(\"HEAD is not a direct reference\")?`) instead of unwrapping.","locations":[{"ref":"crates/crates_io_index/src/repo.rs:281-285","code":"  281 |     pub fn head_oid(&self) -> anyhow::Result<git2::Oid> {\n  282 |         let repo = &self.repository;\n  283 |         let head = repo.head().context(\"Failed to read HEAD reference\")?;\n  284 |         Ok(head.target().unwrap())\n  285 |     }","lines":5,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_index/src/repo.rs#L281-L285"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"create_database_pool ends with `.build().unwrap()` and the ServiceMetrics/InstanceMetrics builder defaults use `.expect(...)`. github_oauth_from_config uses `AuthUrl::new(...).unwrap()`/`TokenUrl::new(...).unwrap()` on constant strings. All are boot-time on constants/validated config, so low risk, but they panic rather than returning a startup error.","fix":"Propagate startup errors via Result where practical; the constant URL unwraps are acceptable but could use expect with context.","locations":[{"ref":"src/app.rs:180-187","code":"  180 |     DeadpoolPool::builder(manager)\n  181 |         .runtime(Runtime::Tokio1)\n  182 |         .max_size(config.pool_size)\n  183 |         .wait_timeout(Some(config.connection_timeout))\n  184 |         .post_create(connection_config)\n  185 |         .build()\n  186 |         .unwrap()\n  187 | }","lines":8,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/app.rs#L180-L187"},{"ref":"src/app.rs:66-71","code":"   66 |     #[builder(default = ServiceMetrics::new().expect(\"could not initialize service metrics\"))]\n   67 |     pub service_metrics: ServiceMetrics,\n   68 | \n   69 |     /// Metrics related to this specific instance of the service\n   70 |     #[builder(default = InstanceMetrics::new().expect(\"could not initialize instance metrics\"))]\n   71 |     pub instance_metrics: InstanceMetrics,","lines":6,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/app.rs#L66-L71"},{"ref":"src/app.rs:87-90","code":"   87 |         let auth_url = \"https://github.com/login/oauth/authorize\";\n   88 |         let auth_url = AuthUrl::new(auth_url.into()).unwrap();\n   89 |         let token_url = \"https://github.com/login/oauth/access_token\";\n   90 |         let token_url = TokenUrl::new(token_url.into()).unwrap();","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/app.rs#L87-L90"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"`RepositoryLock`'s `Deref`/`DerefMut` call `self.repo.as_ref().unwrap()` / `as_mut().unwrap()`. This is sound today because `lock_index()` always sets the `Option` to `Some` before constructing the lock, but the invariant is implicit: any future code path that hands out a `RepositoryLock` wrapping a `None` would panic on every deref.","fix":"Consider storing the lock as a guard over a guaranteed-initialised value, or add a debug_assert/expect with a message documenting the invariant.","locations":[{"ref":"src/worker/environment.rs:139-151","code":"  139 | impl Deref for RepositoryLock<'_> {\n  140 |     type Target = Repository;\n  141 | \n  142 |     fn deref(&self) -> &Self::Target {\n  143 |         self.repo.as_ref().unwrap()\n  144 |     }\n  145 | }\n  146 | \n  147 | impl DerefMut for RepositoryLock<'_> {\n  148 |     fn deref_mut(&mut self) -> &mut Self::Target {\n  149 |         self.repo.as_mut().unwrap()\n  150 |     }\n  151 | }","lines":13,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/environment.rs#L139-L151"},{"ref":"src/worker/environment.rs:52-75","code":"   52 | impl Environment {\n   53 |     #[instrument(skip_all)]\n   54 |     pub fn lock_index(&self) -> anyhow::Result<RepositoryLock<'_>> {\n   55 |         let lock_start = Instant::now();\n   56 |         let mut repo = self.repository.lock();\n   57 |         info!(duration = lock_start.elapsed().as_nanos(), \"Index locked\");\n   58 | \n   59 |         if repo.is_none() {\n   60 |             info!(\"Cloning index\");\n   61 |             let clone_start = Instant::now();\n   62 | \n   63 |             // The worker only ever reads the current tip and commits/pushes on\n   64 |             // top of it, so a shallow clone is sufficient and avoids fetching\n   65 |             // the large index history.\n   66 |             *repo = Some(Repository::open_shallow(&self.repository_config)?);\n   67 | \n   68 |             let clone_duration = clone_start.elapsed();\n   69 |             info!(duration = clone_duration.as_nanos(), \"Index cloned\");\n   70 |         }\n   71 | \n   72 |         let repo_lock = RepositoryLock { repo };\n   73 |         repo_lock.reset_head()?;\n   74 |         Ok(repo_lock)\n   75 |     }","lines":24,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/environment.rs#L52-L75"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"The retry-backoff SQL filter computes `power(2, retries)` where `power` is declared as `fn power(x: Integer, y: Integer) -> Integer` (i32) and `retries` is an Int4 column with no cap. At `retries = 31` the i32 `power` overflows and Postgres raises an \"integer out of range\" error; the interval multiplication `1 minute * 2^retries` overflows far earlier. Once a job in a queue accumulates a large retry count, `find_next_unlocked_job`'s `retriable()` filter raises a runtime SQL error, so the worker can no longer dequeue ANY job whose `job_type` is in that batch - the queue stalls. There is no cap on the retry counter or on the computed backoff interval.","fix":"Cap the exponent before exponentiating, e.g. `power(2, least(background_jobs::retries, 20))`, and/or compute on bigint and clamp the resulting interval. This prevents both the i32 power overflow and the interval-multiplication overflow.","locations":[{"ref":"crates/crates_io_worker/src/storage.rs:16-25","code":"   16 | fn retriable() -> Box<dyn BoxableExpression<background_jobs::table, Pg, SqlType = Bool>> {\n   17 |     use diesel::dsl::*;\n   18 | \n   19 |     define_sql_function!(fn power(x: Integer, y: Integer) -> Integer);\n   20 | \n   21 |     Box::new(\n   22 |         background_jobs::last_retry\n   23 |             .lt(now - 1.minute().into_sql::<Interval>() * power(2, background_jobs::retries)),\n   24 |     )\n   25 | }","lines":10,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_worker/src/storage.rs#L16-L25"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"`save_to_version_downloads` upserts download counts with `version_downloads.downloads + EXCLUDED.downloads`. The `version_downloads.downloads` column is `Int4` (i32, signed 32-bit) in Postgres. For very popular crate/version/date rows the accumulated sum can exceed i32::MAX (~2.1 billion). When that happens Postgres raises `integer out of range`, which fails the whole `ProcessCdnLog` job. Because the log file is only marked processed inside the same transaction that performs this insert, the failure rolls back the `processed_log_files` insert too, so the job is retried forever and that CDN log file can never be processed - blocking all later download accounting that depends on it.","fix":"Widen the `version_downloads.downloads` (and `counted`) columns to BIGINT, or clamp/saturate the summed value. At minimum, handle the overflow error so a single oversized row does not wedge the job permanently.","locations":[{"ref":"src/worker/jobs/downloads/process_log.rs:319-325","code":"  319 |                 INSERT INTO version_downloads (version_id, date, downloads)\n  320 |                 SELECT joined_data.id, joined_data.date, joined_data.downloads\n  321 |                 FROM joined_data\n  322 |                 WHERE joined_data.id IS NOT NULL\n  323 |                 ORDER BY joined_data.id, joined_data.date\n  324 |                 ON CONFLICT (version_id, date)\n  325 |                 DO UPDATE SET downloads = version_downloads.downloads + EXCLUDED.downloads","lines":7,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/downloads/process_log.rs#L319-L325"},{"ref":"crates/crates_io_database/src/schema.rs:1063-1068","code":" 1063 |         /// The `downloads` column of the `version_downloads` table.\n 1064 |         ///\n 1065 |         /// Its SQL type is `Int4`.\n 1066 |         ///\n 1067 |         /// (Automatically generated by Diesel.)\n 1068 |         downloads -> Int4,","lines":6,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/schema.rs#L1063-L1068"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"The aggregate crate counts in the category SQL queries cast `sum(crates_cnt)` to a 4-byte integer (`::int`). `crates_cnt` is `int4` per category, and a top-level category that aggregates many subcategories can in principle sum past `i32::MAX`, which would raise a Postgres `integer out of range` error at runtime rather than returning a result. Summing into `bigint` and only narrowing if needed would be safer.","fix":"Use `sum(c2.crates_cnt)::bigint` (and a corresponding `i64` field) or otherwise avoid the i32 narrowing of an aggregate sum.","locations":[{"ref":"crates/crates_io_database/src/models/toplevel.sql:6","code":"    6 |   sum(c2.crates_cnt)::int as crates_cnt,","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/toplevel.sql#L6"},{"ref":"crates/crates_io_database/src/models/subcategories.sql:3","code":"    3 |     SELECT sum(c2.crates_cnt)::int","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/subcategories.sql#L3"},{"ref":"crates/crates_io_database/src/models/parent_categories.sql:3","code":"    3 |     SELECT sum(c2.crates_cnt)::int from categories c2","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/parent_categories.sql#L3"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"populate.rs accumulates per-day download count `dls` (i32) with random deltas in [-100, 100) and can drift below zero, inserting negative version_downloads. Test-data tool, but produces invalid data.","fix":"Clamp dls to a minimum of 0 after each adjustment.","locations":[{"ref":"src/bin/crates-admin/populate.rs:27-41","code":"   27 |     for id in opts.version_ids {\n   28 |         let mut dls = rand::rng().random_range(5_000i32..10_000);\n   29 | \n   30 |         for day in 0..90 {\n   31 |             dls += rand::rng().random_range(-100..100);\n   32 | \n   33 |             diesel::insert_into(version_downloads::table)\n   34 |                 .values((\n   35 |                     version_downloads::version_id.eq(id),\n   36 |                     version_downloads::downloads.eq(dls),\n   37 |                     version_downloads::date.eq(date(now - day.days())),\n   38 |                 ))\n   39 |                 .execute(conn)\n   40 |                 .await?;\n   41 |         }","lines":15,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/bin/crates-admin/populate.rs#L27-L41"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"invalidate_many sets `.quantity(paths.len() as i32)`. If `paths` ever exceeds i32::MAX entries the cast wraps to a negative/incorrect quantity. In practice the path list is bounded by callers, but the unchecked usize->i32 cast is a latent truncation. CloudFront also caps paths per invalidation, so a large list should be rejected/chunked rather than silently mis-counted.","fix":"Use a checked conversion (e.g. i32::try_from(paths.len())) and chunk/validate against CloudFront's per-invalidation path limit.","locations":[{"ref":"src/cloudfront.rs:121-126","code":"  121 |         let paths = Paths::builder()\n  122 |             // It looks like you have to set quantity even if you provide a full blown Vec, because\n  123 |             // reasons.\n  124 |             .quantity(paths.len() as i32)\n  125 |             .set_items(Some(paths))\n  126 |             .build()?;","lines":6,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/cloudfront.rs#L121-L126"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`next_page_params` computes `(n + 1)` on a `u32` page number that is fully attacker-controlled via `?page=`. For endpoints that use `pages_pagination` without `limit_page_numbers()` (e.g. `list_keywords`, `get_authenticated_user_updates`), `page` can be as large as `u32::MAX`. With `n == u32::MAX` the `n + 1` addition overflows: it panics in debug/test builds and silently wraps to `0` (producing a bogus `page=0` next-page link) in release. The result set must be a full page for this branch to be reached, but the arithmetic is unguarded.","fix":"Use checked/saturating arithmetic (e.g. `n.saturating_add(1)`) or cap the page number for page-based endpoints the same way `limit_page_numbers()` does, and apply that cap to all `pages_pagination` callers.","locations":[{"ref":"src/controllers/helpers/pagination.rs:203-207","code":"  203 |         match self.options.page {\n  204 |             Page::Numeric(n) => opts.insert(\"page\".into(), (n + 1).to_string()),\n  205 |             Page::Unspecified => opts.insert(\"page\".into(), 2.to_string()),\n  206 |             Page::Seek(_) => return None,\n  207 |         };","lines":5,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/helpers/pagination.rs#L203-L207"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`content_length as i32` (a u64 derived from the tarball length) is stored as the version size. The comment claims max upload sizes are always far below i32::MAX, but `publish_limits.upload_size` is a configurable `u32` (up to ~4.2GB) and `max_upload_size()` comes from the per-crate DB column. If either is configured above 2^31-1 the cast silently wraps to a negative size. Not exploitable with default config, but it is a latent truncation that depends on operator configuration rather than a hard invariant.","fix":"Store the size as i64, or explicitly clamp/validate `content_length` against i32::MAX and return an error if exceeded, rather than relying on an unchecked `as i32` cast.","locations":[{"ref":"src/controllers/krate/publish.rs:518-520","code":"  518 |             // Downcast is okay because the file length must be less than the max upload size\n  519 |             // to get here, and max upload sizes are way less than i32 max\n  520 |             .size(content_length as i32)","lines":3,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/publish.rs#L518-L520"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"refresh_pool_stats computes `status.size - status.available` on unsigned pool counters then casts to i64. If `available` momentarily exceeds `size` (deadpool's status fields are not read atomically), the unsigned subtraction underflows: panic in debug, wrap to a huge value in release. Runs on every Prometheus scrape.","fix":"Use saturating subtraction: `status.size.saturating_sub(status.available) as i64`.","locations":[{"ref":"src/metrics/instance.rs:75-77","code":"   75 |         self.database_used_conns\n   76 |             .get_metric_with_label_values(&[name])?\n   77 |             .set((status.size - status.available) as i64);","lines":3,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/metrics/instance.rs#L75-L77"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"take_token computes `refill_rate = (config.rate.as_millis() as i64).milliseconds()`. `Duration::as_millis()` returns u128; casting a very large configured rate to i64 truncates/overflows silently, producing a negative or wrong interval that would corrupt the token-refill SQL arithmetic (negative interval advancing last_refill backwards). Config-derived, so impact is limited, but there is no validation.","fix":"Validate the configured rate fits in i64 milliseconds at config load, or use a checked conversion and clamp.","locations":[{"ref":"src/rate_limiter.rs:114-116","code":"  114 |         let config = self.config_for_action(performed_action);\n  115 |         let refill_rate = (config.rate.as_millis() as i64).milliseconds();\n  116 | ","lines":3,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/rate_limiter.rs#L114-L116"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`NewDownload::from` converts the parsed download count `u64` straight to `i64` with `downloads as i64`, and the value ultimately targets an INTEGER (i32) column. A corrupted/malicious log producing a download count above i32::MAX (or above i64::MAX, wrapping to a negative i64) would either insert a negative number or fail the INSERT. The count comes from parsing untrusted CDN log files, so it is not fully bounded by real traffic.","fix":"Use `u32::try_from(downloads)` (or `i32::try_from`) and clamp/skip on overflow instead of an unchecked `as` cast.","locations":[{"ref":"src/worker/jobs/downloads/process_log.rs:196-205","code":"  196 | impl From<(String, Version, NaiveDate, u64)> for NewDownload {\n  197 |     fn from((name, version, date, downloads): (String, Version, NaiveDate, u64)) -> Self {\n  198 |         Self {\n  199 |             name,\n  200 |             version: version.to_string(),\n  201 |             date,\n  202 |             downloads: downloads as i64,\n  203 |         }\n  204 |     }\n  205 | }","lines":10,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/downloads/process_log.rs#L196-L205"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":true,"description":"`GenerateOgImage` casts `row.crate_size as u32` and `row.num_versions as u32`. Both source columns are i32. They are expected to be non-negative, but an unchecked `as` cast of a (hypothetically) negative i32 would wrap to a huge u32 rather than failing loudly.","fix":"Use `u32::try_from(...).unwrap_or(0)` (or clamp) instead of `as` casts for the size and version-count values.","locations":[{"ref":"src/worker/jobs/generate_og_image.rs:83-86","code":"   83 |             lines_of_code: row.total_code_lines(),\n   84 |             crate_size: row.crate_size as u32,\n   85 |             releases: row.num_versions as u32,\n   86 |         };","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/generate_og_image.rs#L83-L86"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"add_common_headers builds a fresh HeaderMap and returns it as `(headers, response)`. When axum merges a HeaderMap into a Response it APPENDS the headers rather than replacing existing ones. If a downstream handler already set headers such as Access-Control-Allow-Origin, Strict-Transport-Security, X-Frame-Options or Cache-Control, the response ends up with duplicate/conflicting values (e.g. two Access-Control-Allow-Origin), which browsers may reject (breaking CORS) or which weaken the intended security/caching guarantee.","fix":"Set headers on the final response via `response.headers_mut().insert(...)` (overwrite semantics) after `next.run`, instead of returning a separate HeaderMap that axum appends.","locations":[{"ref":"src/middleware/common_headers.rs:14-49","code":"   14 | pub async fn add_common_headers(request: Request, next: Next) -> impl IntoResponse {\n   15 |     let v = HeaderValue::from_static;\n   16 | \n   17 |     let mut headers = HeaderMap::new();\n   18 | \n   19 |     let path = request.uri().path();\n   20 | \n   21 |     const STATIC_FILES: [&str; 6] = [\n   22 |         \"/github-auth-loading.html\",\n   23 |         \"/github-redirect.html\",\n   24 |         \"/favicon.ico\",\n   25 |         \"/robots.txt\",\n   26 |         \"/opensearch.xml\",\n   27 |         \"/.well-known/security.txt\",\n   28 |     ];\n   29 |     if STATIC_FILES.contains(&path) {\n   30 |         expires(&mut headers, ONE_DAY);\n   31 |     }\n   32 | \n   33 |     if path.starts_with(\"/_app/immutable/\") {\n   34 |         expires(&mut headers, 10 * ONE_YEAR);\n   35 |     }\n   36 | \n   37 |     let response = next.run(request).await;\n   38 | \n   39 |     headers.insert(header::ACCESS_CONTROL_ALLOW_ORIGIN, v(\"*\"));\n   40 |     headers.insert(header::STRICT_TRANSPORT_SECURITY, v(\"max-age=31536000\"));\n   41 | \n   42 |     if NGINX_SUCCESS_CODES.contains(&response.status().as_u16()) {\n   43 |         headers.insert(header::X_CONTENT_TYPE_OPTIONS, v(\"nosniff\"));\n   44 |         headers.insert(header::X_FRAME_OPTIONS, v(\"SAMEORIGIN\"));\n   45 |         headers.insert(header::X_XSS_PROTECTION, v(\"0\"));\n   46 |     }\n   47 | \n   48 |     (headers, response)\n   49 | }","lines":36,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/common_headers.rs#L14-L49"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"check_rate_limit treats the rate limit as satisfied when the returned bucket has `tokens >= 1`, but take_token has ALREADY decremented and clamped the token count via `least(burst, greatest(0, tokens - 1) + tokens_to_add)`. The returned value is the count AFTER taking a token. A bucket that had exactly 1 token returns 0 (correctly rejected); a bucket with 2 returns 1 (allowed). This is consistent, but the boundary is subtle: a brand-new bucket is created with `tokens = burst` (NOT burst-1), so the very first request for a user does not consume a token at all (insert sets tokens=burst, and on a fresh insert the `do_update` decrement does not run). This effectively grants `burst + 1` requests in the first window instead of `burst`, a small but real rate-limit over-grant on the first action of every user/action pair.","fix":"On initial insert, set `tokens = burst - 1` (the first request consumes a token) so the total allowance equals `burst`, matching the documented bucket semantics.","locations":[{"ref":"src/rate_limiter.rs:84-97","code":"   84 |         let bucket = self\n   85 |             .take_token(uploader, performed_action, Utc::now(), conn)\n   86 |             .await?;\n   87 |         if bucket.tokens >= 1 {\n   88 |             Ok(())\n   89 |         } else {\n   90 |             Err(Box::new(TooManyRequests {\n   91 |                 action: performed_action,\n   92 |                 retry_after: bucket.last_refill\n   93 |                     + chrono::Duration::from_std(self.config_for_action(performed_action).rate)\n   94 |                         .unwrap(),\n   95 |             }))\n   96 |         }\n   97 |     }","lines":14,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/rate_limiter.rs#L84-L97"},{"ref":"src/rate_limiter.rs:138-160","code":"  138 |         diesel::insert_into(publish_limit_buckets::table)\n  139 |             .values((\n  140 |                 publish_limit_buckets::user_id.eq(uploader),\n  141 |                 publish_limit_buckets::action.eq(performed_action),\n  142 |                 publish_limit_buckets::tokens.eq(burst),\n  143 |                 publish_limit_buckets::last_refill.eq(now),\n  144 |             ))\n  145 |             .on_conflict((\n  146 |                 publish_limit_buckets::user_id,\n  147 |                 publish_limit_buckets::action,\n  148 |             ))\n  149 |             .do_update()\n  150 |             .set((\n  151 |                 publish_limit_buckets::tokens.eq(least(\n  152 |                     burst,\n  153 |                     greatest(0, publish_limit_buckets::tokens - 1) + tokens_to_add,\n  154 |                 )),\n  155 |                 publish_limit_buckets::last_refill.eq(publish_limit_buckets::last_refill\n  156 |                     + refill_rate.into_sql::<Interval>() * tokens_to_add),\n  157 |             ))\n  158 |             .returning(Bucket::as_returning())\n  159 |             .get_result(conn)\n  160 |             .await","lines":23,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/rate_limiter.rs#L138-L160"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Fastly::purge` builds the surrogate-purge URL with `format!(\"https://api.fastly.com/purge/{domain}/{path}\")` after only stripping leading slashes and rejecting `*`. The path is not URL-encoded, so a path containing `?`, `#`, spaces, or other reserved characters produces a malformed or wrong purge URL, invalidating the wrong cache key (or none). The `*` wildcard check does not cover these other problematic characters.","fix":"Percent-encode the path segment before interpolating it, or construct the URL via reqwest's URL/path-segment API rather than raw string formatting.","locations":[{"ref":"crates/crates_io_fastly/src/lib.rs:73-79","code":"   73 |     pub async fn purge(&self, domain: &str, path: &str) -> Result<(), Error> {\n   74 |         if path.contains('*') {\n   75 |             return Err(Error::WildcardNotSupported);\n   76 |         }\n   77 | \n   78 |         let path = path.trim_start_matches('/');\n   79 |         let url = format!(\"https://api.fastly.com/purge/{domain}/{path}\");","lines":7,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_fastly/src/lib.rs#L73-L79"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`PathDetails::from_path` classifies test/example/benchmark files via `path_str.contains(...)` substring matching on the whole lowercased path: `contains(\"test/\")`, `contains(\"tests/\")`, `contains(\"testing/\")`, `contains(\"examples/\")`, `contains(\"benches/\")`, `contains(\"benchmark/\")`. Because these are unanchored substring matches, unrelated directories are misclassified and excluded from line counts: `latest/` and `greatest/` and `contests/` all contain `test/`; a crate or path segment named `testing` matches too. This silently skews per-category line counts.","fix":"Match on path components: split the path on `/` and compare each segment exactly (e. ates/crates_io_validation/src/lib.rs#L197-L199"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"authenticate() tries cookie auth first, then token auth. If a request carries BOTH a valid session cookie AND an `Authorization` header (e.g. a browser/proxy that forwards both), the cookie path wins and the request is treated as a cookie (website) authentication even though the client also sent a token. Endpoints gated with `AuthCheck::only_cookie()` then succeed, and token endpoint/crate scopes are never enforced for that request. While verify_origin() mitigates CSRF, mixing both credential types and silently preferring the cookie is surprising and can let a token-bearing automated client bypass token-scope restrictions if it also happens to carry a session cookie.","fix":"Decide auth method deterministically: if an `Authorization` header is present, authenticate via token (and reject if also cookie-authenticated, or ignore the cookie); only fall back to cookie when no auth header exists.","locations":[{"ref":"src/auth.rs:319-346","code":"  319 | #[instrument(skip_all)]\n  320 | async fn authenticate(parts: &Parts, conn: &mut AsyncPgConnection) -> AppResult<Authentication> {\n  321 |     controllers::util::verify_origin(parts)?;\n  322 | \n  323 |     match authenticate_via_cookie(parts, conn).await {\n  324 |         Ok(None) => {}\n  325 |         Ok(Some(auth)) => {\n  326 |             parts.request_log().add(\"auth_type\", \"cookie\");\n  327 |             return Ok(Authentication::Cookie(auth));\n  328 |         }\n  329 |         Err(err) => return Err(err),\n  330 |     }\n  331 | \n  332 |     match authenticate_via_token(parts, conn).await {\n  333 |         Ok(None) => {}\n  334 |         Ok(Some(auth)) => {\n  335 |             parts.request_log().add(\"auth_type\", \"token\");\n  336 |             return Ok(Authentication::Token(auth));\n  337 |         }\n  338 |         Err(err) => return Err(err),\n  339 |     }\n  340 | \n  341 |     // Unable to authenticate the user\n  342 |     let cause = \"no cookie session or auth header found\";\n  343 |     parts.request_log().add(\"cause\", cause);\n  344 | \n  345 |     return Err(forbidden(\"this action requires authentication\"));\n  346 | }","lines":28,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/auth.rs#L319-L346"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"render_readmes.rs records the readme rendering timestamp (Version::record_readme_rendering) BEFORE the readme is fetched and rendered, and the render runs in a spawned task whose error is only printed, not propagated. If rendering fails, the DB row still shows a fresh `rendered_at`, so the `--older-than` filter skips that version on subsequent runs even though no readme was actually re-rendered.","fix":"Record the rendering time only after the spawned task successfully renders and uploads the readme, or roll it back on failure.","locations":[{"ref":"src/bin/crates-admin/render_readmes.rs:113-140","code":"  113 |         for (version, krate_name) in versions {\n  114 |             Version::record_readme_rendering(version.id, &conn)\n  115 |                 .await\n  116 |                 .context(\"Couldn't record rendering time\")?;\n  117 | \n  118 |             let client = client.clone();\n  119 |             let storage = storage.clone();\n  120 |             let handle = tokio::spawn(async move {\n  121 |                 println!(\"[{}-{}] Rendering README...\", krate_name, version.num);\n  122 |                 let readme = get_readme(&storage, &client, &version, &krate_name).await?;\n  123 |                 if !readme.is_empty() {\n  124 |                     storage\n  125 |                         .upload_readme(&krate_name, &version.num, readme.into())\n  126 |                         .await\n  127 | t-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/cargo_compat.rs#L124"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Cache-Control/Expires headers for static files and /_app/immutable/ are computed before next.run and returned in the prepended HeaderMap, so they are appended to the final response. If the downstream static-file handler (ServeDir) already emits its own Cache-Control, the response carries two Cache-Control headers, producing undefined caching behavior at the CDN/browser.","fix":"Insert caching directives directly onto the final response with overwrite semantics rather than appending a pre-built HeaderMap.","locations":[{"ref":"src/middleware/common_headers.rs:29-37","code":"   29 |     if STATIC_FILES.contains(&path) {\n   30 |         expires(&mut headers, ONE_DAY);\n   31 |     }\n   32 | \n   33 |     if path.starts_with(\"/_app/immutable/\") {\n   34 |         expires(&mut headers, 10 * ONE_YEAR);\n   35 |     }\n   36 | \n   37 |     let response = next.run(request).await;","lines":9,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/common_headers.rs#L29-L37"},{"ref":"src/middleware/common_headers.rs:51-58","code":"   51 | fn expires(headers: &mut HeaderMap, cache_duration: Duration) {\n   52 |     headers.typed_insert(Expires::from(SystemTime::now() + cache_duration));\n   53 |     headers.typed_insert(\n   54 |         CacheControl::new()\n   55 |             .with_public()\n   56 |             .with_max_age(cache_duration),\n   57 |     );\n   58 | }","lines":8,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/common_headers.rs#L51-L58"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"require_user_agent exempts the download endpoint from the user-agent requirement using a `path.ends_with(\"download\")` substring check. This matches more than the intended route (any path ending in the literal `download`, e.g. crafted paths), letting clients bypass the no-user-agent block on unintended routes.","fix":"Match the actual download route via the MatchedPath route template instead of a `path.ends_with(\"download\")` substring check.","locations":[{"ref":"src/middleware/require_user_agent.rs:33","code":"   33 |     let is_download = req.uri().path().ends_with(\"download\");","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/require_user_agent.rs#L33"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The openapi handler caches the rendered document in two global OnceLocks (PUBLIC_BYTES / FULL_BYTES) keyed only on whether `internal` is Some. The `internal` query parameter is accepted from any client with NO authentication check in this handler. That means the full/internal OpenAPI document (including operations marked x-internal) is served to anyone who appends `?internal=anything`. If x-internal endpoints are meant to be hidden from the public, this leaks their existence/shape to unauthenticated callers.","fix":"Require authentication/authorization (e.g. admin or internal network) before serving the internal variant, or remove the public-facing `internal` toggle.","locations":[{"ref":"src/openapi.rs:98-123","code":"   98 | #[derive(Deserialize)]\n   99 | pub struct Params {\n  100 |     #[serde(default)]\n  101 |     internal: Option<String>,\n  102 | }\n  103 | \n  104 | pub async fn handler(\n  105 |     Extension(doc): Extension<Arc<OpenApiDoc>>,\n  106 |     Query(params): Query<Params>,\n  107 | ) -> impl IntoResponse {\n  108 |     static PUBLIC_BYTES: OnceLock<Bytes> = OnceLock::new();\n  109 |     static FULL_BYTES: OnceLock<Bytes> = OnceLock::new();\n  110 | \n  111 |     let cache = match params.internal {\n  112 |         None => &PUBLIC_BYTES,\n  113 |         Some(_) => &FULL_BYTES,\n  114 |     };\n  115 | \n  116 |     let bytes = cache.get_or_init(|| {\n  117 |         let mut doc = (*doc).clone();\n  118 |         apply_visibility(&mut doc, params.internal.is_some());\n  119 |         Bytes::from(serde_json::to_vec(&doc).expect(\"OpenAPI serialization failed\"))\n  120 |     });\n  121 | \n  122 |     (TypedHeader(ContentType::json()), bytes.clone())\n  123 | }","lines":26,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/openapi.rs#L98-L123"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"TopCrates::new orders the top-N typosquat corpus by downloads.desc() with no deterministic secondary sort key. Crates with equal download counts have a non-deterministic top-N cutoff, so the typosquat corpus is unstable between runs (different crates can enter/leave the corpus), causing inconsistent typosquat decisions.","fix":"Add a deterministic secondary ordering (e.g. `.then(crates::id.asc())`) so the top-N corpus is stable.","locations":[{"ref":"src/typosquat/database.rs:42-90","code":"   42 |         let crates = models::Crate::query()\n   43 |             .inner_join(crate_downloads::table)\n   44 |             .order(crate_downloads::downloads.desc())\n   45 |             .limit(num)\n   46 |             .load_stream::<models::Crate>(conn)\n   47 |             .await?\n   48 |             .try_fold(crates, |mut crates, krate| {\n   49 |                 crates.insert(\n   50 |                     krate.id,\n   51 |                     (\n   52 |                         krate.name,\n   53 |                         Crate {\n   54 |                             owners: HashSet::new(),\n   55 |                         },\n   56 |                     ),\n   57 |                 );\n   58 | \n   59 |                 futures_util::future::ready(Ok(crates
