emove this method if unused, or replace it with a paginated/filtered query (e.g. by version id or time range) that bounds the result set.","locations":[{"ref":"crates/crates_io_database/src/models/action.rs:53-55","code":"   53 |     pub async fn all(mut conn: &AsyncPgConnection) -> QueryResult<Vec<Self>> {\n   54 |         Self::query().load(&mut conn).await\n   55 |     }","lines":3,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/action.rs#L53-L55"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`PagerdutyClient::send` rebuilds a fresh `reqwest::Client` (`Client::builder()...build()?`) on every call. A reqwest client owns a connection pool and is meant to be built once and reused; rebuilding per request defeats connection reuse and adds TLS/setup cost on each page. The sibling clients (Fastly, RealDocsRsClient, TeamRepoImpl) all store the client in their struct - PagerdutyClient stores only the service key.","fix":"Build the `reqwest::Client` once in `PagerdutyClient::new`, store it in the struct, and reuse it in `send`.","locations":[{"ref":"crates/crates_io_pagerduty/src/lib.rs:41-53","code":"   41 |     pub async fn send(&self, event: &Event) -> Result<()> {\n   42 |         let service_key = self.service_key.expose_secret();\n   43 | \n   44 |         let client = Client::builder()\n   45 |             .user_agent(crates_io_version::user_agent())\n   46 |             .build()?;\n   47 | \n   48 |         let response = client\n   49 |             .post(\"https://events.pagerduty.com/generic/2010-04-15/create_event.json\")\n   50 |             .header(header::ACCEPT, \"application/vnd.pagerduty+json;version=2\")\n   51 |             .json(&FullEvent { service_key, event })\n   52 |             .send()\n   53 |             .await?;","lines":13,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_pagerduty/src/lib.rs#L41-L53"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"The unfiltered crates listing performs a full `COUNT(*)` over the `crates` table on every request to populate `meta.total` (acknowledged in the in-code comment). For the very common filterless/first-page browse this is a full index scan per request and is a known scalability hot spot. The comment notes it \"could be denormalized\" but nothing caps or caches it, so a high request rate against `/api/v1/crates` forces repeated full counts.","fix":"Denormalize the total crate count (e.g. a maintained counter / materialized value) for the filterless happy path, or cache the count with a short TTL, instead of issuing COUNT(*) on every request.","locations":[{"ref":"src/controllers/krate/search.rs:248-268","code":"  248 |         // This does a full index-only scan over the crates table to gather how many crates were\n  249 |         // published. Unfortunately on PostgreSQL counting the rows in a table requires scanning\n  250 |         // the table, and the `total` field is part of the stable registries API.\n  251 |         //\n  252 |         // If this becomes a problem in the future the crates count could be denormalized, at least\n  253 |         // for the filterless happy path.\n  254 |         let count_query = filter_params.make_query().count();\n  255 |         let query = query.pages_pagination_with_count_query(pagination, count_query);\n  256 |         let span = info_span!(\"db.query\", message = \"SELECT ..., COUNT(*) FROM crates\");\n  257 |         let data = query.load::<Record>(&mut conn).instrument(span).await?;\n  258 |         (\n  259 |             data.total(),\n  260 |             data.next_seek_params(|last| seek.to_payload(last))?\n  261 |                 .map(|p| req.query_with_params(p)),\n  262 |             None,\n  263 |             data.into_iter().collect::<Vec<_>>(),\n  264 |         )\n  265 |     } else {\n  266 |         let count_query = filter_params.make_query().count();\n  267 |         let query = query.pages_pagination_with_count_query(pagination, count_query);\n  268 |         let span = info_span!(\"db.query\", message = \"SELECT ..., COUNT(*) FROM crates\");","lines":21,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/search.rs#L248-L268"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`find_api_token` is a read-only `GET /api/v1/me/tokens/{id}` handler but acquires a write/primary connection via `app.db_write()`. This needlessly routes a pure read to the primary database, increasing primary load and defeating read-replica offloading. (`list_api_tokens` correctly uses `db_read_prefer_primary`.)","fix":"Use `app.db_read()` (or `db_read_prefer_primary()` if read-your-writes consistency is required) instead of `db_write()` for this read-only endpoint.","locations":[{"ref":"src/controllers/token.rs:253-268","code":"  253 | pub async fn find_api_token(\n  254 |     app: AppState,\n  255 |     Path(id): Path<i32>,\n  256 |     req: Parts,\n  257 | ) -> AppResult<(TypedHeader<CacheControl>, Json<GetResponse>)> {\n  258 |     let mut conn = app.db_write().await?;\n  259 |     let auth = AuthCheck::default().check(&req, &mut conn).await?;\n  260 |     let user = auth.user();\n  261 |     let api_token = ApiToken::belonging_to(user)\n  262 |         .find(id)\n  263 |         .select(ApiToken::as_select())\n  264 |         .first(&mut conn)\n  265 |         .await?;\n  266 | \n  267 |     Ok((no_store(), Json(GetResponse { api_token })))\n  268 | }","lines":16,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/token.rs#L253-L268"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`BulkSyncToGitIndex` runs inside `spawn_blocking` and, for every crate name, calls `handle.block_on` to acquire a fresh pooled DB connection and run `get_index_data` one crate at a time (classic N+1: N connection checkouts + N queries). For a large bulk sync this serializes one round trip per crate and repeatedly contends the connection pool while holding the index lock for the entire duration.","fix":"Fetch index data for all crate names up front in a single batched async pass (one connection, batched query), then build the commit synchronously, instead of one block_on + connection checkout per crate.","locations":[{"ref":"src/worker/jobs/index/sync.rs:117-151","code":"  117 |         let handle = Handle::current();\n  118 |         spawn_blocking(move || {\n  119 |             let repo = env.lock_index()?;\n  120 |             let include_pubtime = env.config.features.index_include_pubtime;\n  121 | \n  122 |             let mut builder = repo.commit_builder(commit_message)?;\n  123 |             let mut num_changes = 0;\n  124 | \n  125 |             for crate_name in &crate_names {\n  126 |                 // Fetch index data using async database queries\n  127 |                 let new = handle\n  128 |                     .block_on(async {\n  129 |                         let mut conn = env.deadpool.get().await?;\n  130 |                         get_index_data(crate_name, &mut conn, include_pubtime).await\n  131 |                     })\n  132 |                     .with_context(|| format!(\"Failed to get index data for `{crate_name}`\"))?;\n  133 | \n  134 |                 let old = repo.read_entry(crate_name)?;\n  135 | \n  136 |                 match (old, new) {\n  137 |                     (None, Some(new)) => {\n  138 |                         builder.upsert_entry(crate_name, new.as_bytes())?;\n  139 |                         num_changes += 1;\n  140 |                     }\n  141 |                     (Some(old), Some(new)) if old != new.as_bytes() => {\n  142 |                         builder.upsert_entry(crate_name, new.as_bytes())?;\n  143 |                         num_changes += 1;\n  144 |                     }\n  145 |                     (Some(_old), None) => {\n  146 |                         builder.remove_entry(crate_name)?;\n  147 |                         num_changes += 1;\n  148 |                     }\n  149 |                     _ => debug!(%crate_name, \"Skipping sync because index is up-to-date\"),\n  150 |                 }\n  151 |             }","lines":35,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/index/sync.rs#L117-L151"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`EncodableCategory::from` allocates an entire `Vec` via `category.rsplit(\"::\").collect::<Vec<_>>()[0]` only to read the first element (the segment after the last `::`). This needlessly heap-allocates a vector of all path segments on every conversion.","fix":"Use the iterator directly: `category.rsplit(\"::\").next().unwrap_or(&category).to_string()` (rsplit always yields at least one item).","locations":[{"ref":"crates/crates_io_api_types/src/lib.rs:78","code":"   78 |             category: category.rsplit(\"::\").collect::<Vec<_>>()[0].to_string(),","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_api_types/src/lib.rs#L78"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Crate::owners` issues two separate round-trips (one for user owners, one for team owners) per crate. Combined with `Crate::top_versions`/`find_version` being per-`&self` methods, rendering a list of crates that calls `owners()` on each crate produces an N+1 query pattern (2 queries per crate). For endpoints that operate on a single crate this is fine, but the per-crate shape invites N+1 use at call sites.","fix":"Where multiple crates' owners are needed, provide a batched query using `CrateOwner::belonging_to(&[&Crate])` + `grouped_by` (as `VersionOwnerAction::for_versions` already does) rather than calling the per-crate method in a loop.","locations":[{"ref":"crates/crates_io_database/src/models/krate.rs:207-229","code":"  207 |     pub async fn owners(&self, mut conn: &AsyncPgConnection) -> QueryResult<Vec<Owner>> {\n  208 |         let users = CrateOwner::by_owner_kind(OwnerKind::User)\n  209 |             .filter(crate_owners::crate_id.eq(self.id))\n  210 |             .order((crate_owners::owner_id, crate_owners::owner_kind))\n  211 |             .inner_join(users::table.left_join(oauth_github::table))\n  212 |             .select(User::as_select())\n  213 |             .load(&mut conn)\n  214 |             .await?\n  215 |             .into_iter()\n  216 |             .map(Owner::User);\n  217 | \n  218 |         let teams = CrateOwner::by_owner_kind(OwnerKind::Team)\n  219 |             .filter(crate_owners::crate_id.eq(self.id))\n  220 |             .order((crate_owners::owner_id, crate_owners::owner_kind))\n  221 |             .inner_join(teams::table)\n  222 |             .select(Team::as_select())\n  223 |             .load(&mut conn)\n  224 |             .await?\n  225 |             .into_iter()\n  226 |             .map(Owner::Team);\n  227 | \n  228 |         Ok(users.chain(teams).collect())\n  229 |     }","lines":23,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/krate.rs#L207-L229"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`list_crate_owner_invitations_for_user` resolves each invitation's inviter username with a linear `users.iter().find(...)` inside the per-invitation map. This is O(invitations * users); since `users` is already keyed data it should be an indexed lookup. Low impact given small page sizes, but it is an avoidable nested scan over data already loaded into a map structure upstream.","fix":"Build a `HashMap<i32, &EncodablePublicUser>` (or reuse the existing `IndexMap`) keyed by user id once, then look up `inviter_id` directly.","locations":[{"ref":"src/controllers/crate_owner_invitation.rs:63-81","code":"   63 |     let crate_owner_invitations = invitations\n   64 |         .into_iter()\n   65 |         .map(|private| {\n   66 |             Ok(EncodableCrateOwnerInvitationV1 {\n   67 |                 invited_by_username: users\n   68 |                     .iter()\n   69 |                     .find(|u| u.id == private.inviter_id)\n   70 |                     .ok_or_else(|| internal(format!(\"missing user {}\", private.inviter_id)))?\n   71 |                     .login\n   72 |                     .clone(),\n   73 |                 invitee_id: private.invitee_id,\n   74 |                 inviter_id: private.inviter_id,\n   75 |                 crate_name: private.crate_name,\n   76 |                 crate_id: private.crate_id,\n   77 |                 created_at: private.created_at,\n   78 |                 expires_at: private.expires_at,\n   79 |             })\n   80 |         })\n   81 |         .collect::<AppResult<Vec<EncodableCrateOwnerInvitationV1>>>()?;","lines":19,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/crate_owner_invitation.rs#L63-L81"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Rights::get` decrypts the user's GitHub token and builds a `GitHubAuth` bearer on every call even when no `Owner::Team` entries exist (the common case is all-user owners). For crates owned only by users the GitHub token decryption and auth construction are pure waste, performed before the loop that may never make a GitHub call.","fix":"Defer token decryption / `GitHubAuth` construction until the first `Owner::Team` is encountered (lazily inside the loop), so user-only ownership checks skip it entirely.","locations":[{"ref":"src/controllers/helpers/authorization.rs:31-37","code":"   31 |         let token = encryption\n   32 |             .decrypt(&user.gh_encrypted_token)\n   33 |             .map_err(GitHubError::Other)?;\n   34 | \n   35 |         let auth = GitHubAuth::bearer(token);\n   36 | \n   37 |         let mut best = Self::None;","lines":7,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/helpers/authorization.rs#L31-L37"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`list_owners`, `get_team_owners`, and `get_user_owners` each load the crate and then run a separate owners query, but `Rights`/owner listing endpoints are public and uncached. More notably, the modify-owners flow calls `krate.owners(conn)` and then, in the remove branch, calls `User::owning(&krate, conn)` again to recount individual owners - two separate owner queries within the same transaction when the first result could be reused/filtered.","fix":"Reuse the already-fetched `owners` list (filtering to `OwnerKind::User`) to check whether any individual owners remain, instead of issuing a second `User::owning` query.","locations":[{"ref":"src/controllers/krate/owners.rs:204","code":"  204 |             let owners = krate.owners(conn).await?;","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/owners.rs#L204"},{"ref":"src/controllers/krate/owners.rs:289-298","code":"  289 |                 for login in &logins {\n  290 |                     krate.owner_remove(conn, login).await?;\n  291 |                 }\n  292 |                 if User::owning(&krate, conn).await?.is_empty() {\n  293 |                     return Err(bad_request(\n  294 |                         \"cannot remove all individual owners of a crate. \\\n  295 |                      Team member don't have permission to modify owners, so \\\n  296 |                      at least one individual owner is required.\",\n  297 |                     ));\n  298 |                 }","lines":10,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/owners.rs#L289-L298"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`update_crate` loads the full crate via `path.load_crate` (a `SELECT * FROM crates`), then `update_inner` re-queries the same crate with all its joins (`Crate::by_name(&krate.name) ... .first()`) at the end to build the response. The first full load is only needed for `krate.id`, `krate.name`, and `krate.trustpub_only`; the final reload duplicates work already partially done. This is an extra DB round-trip on every settings update.","fix":"Either select only the needed columns in the initial load, or restructure so a single joined query provides both the permission/setting data and the encodable response data.","locations":[{"ref":"src/controllers/krate/update.rs:64","code":"   64 |     let krate = path.load_crate(&conn).await?;","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/update.rs#L64"},{"ref":"src/controllers/krate/update.rs:148-171","code":"  148 |     let (krate, downloads, recent_downloads, default_version, yanked, num_versions): (\n  149 |         Crate,\n  150 |         i64,\n  151 |         Option<i64>,\n  152 |         Option<String>,\n  153 |         Option<bool>,\n  154 |         Option<i32>,\n  155 |     ) = Crate::by_name(&krate.name)\n  156 |         .inner_join(crate_downloads::table)\n  157 |         .left_join(recent_crate_downloads::table)\n  158 |         .left_join(default_versions::table)\n  159 |         .left_join(versions::table.on(default_versions::version_id.eq(versions::id)))\n  160 |         .select((\n  161 |             Crate::as_select(),\n  162 |             crate_downloads::downloads,\n  163 |             recent_crate_downloads::downloads.nullable(),\n  164 |             versions::num.nullable(),\n  165 |             versions::yanked.nullable(),\n  166 |             default_versions::num_versions.nullable(),\n  167 |         ))\n  168 |         .first(conn)\n  169 |         .await\n  170 |         .optional()?\n  171 |         .ok_or_else(|| crate_not_found(&krate.name))?;","lines":24,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/update.rs#L148-L171"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`update_email_notifications` loads all of the user's `crate_owners` rows and re-upserts every one of them, including rows whose `email_notifications` value is unchanged. The comment claims rows whose value will not change are removed, but the `.map` keeps every row (it only computes the value, never filters), so the upsert touches all owned crates on every call. For a user owning many crates this is a needless large write.","fix":"Filter the loaded rows to those whose `email_notifications` actually differs from the requested update before building `to_insert`, or restrict the query/upsert to the crate ids present in `updates`.","locations":[{"ref":"src/controllers/user/email_notifications.rs:64-90","code":"   64 |         .into_iter()\n   65 |         // Remove records whose `email_notifications` will not change from their current value\n   66 |         .map(\n   67 |             |(c_id, o_id, o_kind, e_notifications): (i32, i32, i32, bool)| {\n   68 |                 let current_e_notifications = *updates.get(&c_id).unwrap_or(&e_notifications);\n   69 |                 (\n   70 |                     crate_owners::crate_id.eq(c_id),\n   71 |                     crate_owners::owner_id.eq(o_id),\n   72 |                     crate_owners::owner_kind.eq(o_kind),\n   73 |                     crate_owners::email_notifications.eq(current_e_notifications),\n   74 |                 )\n   75 |             },\n   76 |         )\n   77 |         .collect::<Vec<_>>();\n   78 | \n   79 |     // Upsert crate owners; this should only actually execute updates\n   80 |     diesel::insert_into(crate_owners::table)\n   81 |         .values(&to_insert)\n   82 |         .on_conflict((\n   83 |             crate_owners::crate_id,\n   84 |             crate_owners::owner_id,\n   85 |             crate_owners::owner_kind,\n   86 |         ))\n   87 |         .do_update()\n   88 |         .set(crate_owners::email_notifications.eq(excluded(crate_owners::email_notifications)))\n   89 |         .execute(&mut conn)\n   90 |         .await?;","lines":27,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/user/email_notifications.rs#L64-L90"}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"On every metrics scrape, LogEncoder::encode deep-clones each metric's VectorMetricData and tags IndexMap into a new HashMap solely to emit an info-level log line, then serializes the events a second time for the actual base64 chunks. Metrics are serialized twice and all per-metric data/tags cloned just for logging.","fix":"Build the log JSON from references (serialize &events / borrow data and tags) or drop/lower the info! log, avoiding the second serialization and the clones.","locations":[{"ref":"src/metrics/log_encoder.rs:46-65","code":"   46 |         let events = families_to_json_events(families);\n   47 | \n   48 |         let metrics = events\n   49 |             .iter()\n   50 |             .map(|event| {\n   51 |                 let value = MapMetric {\n   52 |                     data: event.metric.data.clone(),\n   53 |                     tags: event.metric.tags.clone(),\n   54 |                 };\n   55 |                 (event.metric.name, value)\n   56 |             })\n   57 |             .collect::<HashMap<_, _>>();\n   58 | \n   59 |         match serde_json::to_string(&metrics) {\n   60 |             Ok(json) => info!(target: \"metrics\", \"{{\\\"metrics\\\":{json}}}\"),\n   61 |             Err(error) => warn!(target: \"metrics\", \"Failed to serialize metrics: {error}\"),\n   62 |         }\n   63 | \n   64 |         let chunks = serialize_and_split_list(events.iter(), CHUNKS_MAX_SIZE_BYTES)\n   65 |             .map_err(|e| Error::Msg(e.to_string()))?;","lines":20,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/metrics/log_encoder.rs#L46-L65"}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"log_requests collects per-request custom metadata into a temporary HashMap purely to serialize it, cloning every (key, value) pair out of the underlying Vec under the lock on every request.","fix":"Serialize directly from the locked Vec via a borrowed map view, avoiding the intermediate HashMap and per-entry clone.","locations":[{"ref":"src/middleware/log_request.rs:81-85","code":"   81 |     let custom_metadata = {\n   82 |         let metadata = custom_metadata.lock();\n   83 |         let metadata = metadata.iter().cloned().collect::<HashMap<&str, String>>();\n   84 |         serde_json::to_string(&metadata).unwrap_or_default()\n   85 |     };","lines":5,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/log_request.rs#L81-L85"}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"RequestLog::add calls value.to_string() twice per invocation (once for the Vec push, once for sentry set_extra), allocating the string twice. add is called on multiple per-request code paths.","fix":"Compute the string once (`let value = value.to_string();`) and reuse it for both the Vec push and the sentry extra.","locations":[{"ref":"src/middleware/log_request.rs:113-118","code":"  113 |     pub fn add<V: Display>(&self, key: &'static str, value: V) {\n  114 |         let mut metadata = self.lock();\n  115 |         metadata.push((key, value.to_string()));\n  116 | \n  117 |         sentry::configure_scope(|scope| scope.set_extra(key, value.to_string().into()));\n  118 |     }","lines":6,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/log_request.rs#L113-L118"}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"static_or_continue::serve_static clones the request method, uri and the entire HeaderMap to build a throwaway Request<()> for ServeDir on every static-file candidate request, doing a full header clone on the static-asset hot path.","fix":"Avoid cloning all headers; ServeDir needs only method, uri and a small subset (Range, Accept-Encoding, conditional headers). Reuse the original parts or clone only the needed headers.","locations":[{"ref":"src/middleware/static_or_continue.rs:42-48","code":"   42 |     let mut static_req = Request::new(());\n   43 |     *static_req.method_mut() = request.method().clone();\n   44 |     *static_req.uri_mut() = request.uri().clone();\n   45 |     *static_req.headers_mut() = request.headers().clone();\n   46 | \n   47 |     let serve_dir = ServeDir::new(path).precompressed_br().precompressed_gzip();\n   48 |     let Ok(response) = serve_dir.oneshot(static_req).await;","lines":7,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/static_or_continue.rs#L42-L48"}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"update_metrics produces the responses_by_status_code_total label via `status.to_string()` on every request, allocating a fresh String for a small fixed set of status codes on the hot path.","fix":"Use a precomputed status-code->label map/array or itoa into a stack buffer to avoid a per-request heap allocation.","locations":[{"ref":"src/middleware/update_metrics.rs:33-37","code":"   33 |     let status = response.status().as_u16();\n   34 |     metrics\n   35 |         .responses_by_status_code_total\n   36 |         .with_label_values(&[&status.to_string()])\n   37 |         .inc();","lines":5,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/update_metrics.rs#L33-L37"}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"query_with_params allocates an owned (String, String) for every existing query parameter via `.into_owned()` just to filter and re-serialize, on the request hot path used for pagination link building.","fix":"Build the Serializer directly from the borrowed parsed pairs (filtering keys in new_params), avoiding the intermediate into_owned Vec.","locations":[{"ref":"src/util/request_helpers.rs:53-67","code":"   53 |     fn query_with_params(&self, new_params: IndexMap<String, String>) -> String {\n   54 |         let query_bytes = self.uri().query().unwrap_or(\"\").as_bytes();\n   55 | \n   56 |         let mut params = url::form_urlencoded::parse(query_bytes)\n   57 |             .into_owned()\n   58 |             .filter(|(key, _)| !new_params.contains_key(key))\n   59 |             .collect::<Vec<_>>();\n   60 | \n   61 |         params.extend(new_params);\n   62 | \n   63 |         let query_string = url::form_urlencoded::Serializer::new(String::new())\n   64 |             .extend_pairs(params)\n   65 |             .finish();\n   66 |         format!(\"?{query_string}\")\n   67 |     }","lines":15,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/request_helpers.rs#L53-L67"}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The RSS feed jobs (`SyncCrateFeed`, `SyncCratesFeed`, `SyncUpdatesFeed`) all run a first query filtered by the 'always include' age threshold with no LIMIT, and only when that returns fewer than NUM_ITEMS rows do they run a second query with a LIMIT. In the common steady state (fewer than NUM_ITEMS recent items) this means two queries are executed every run where one would do.","fix":"Use a single query that returns rows newer than the threshold OR the most recent NUM_ITEMS (e.g. UNION / window function), or order+limit with a fallback computed in one round trip.","locations":[{"ref":"src/worker/jobs/rss/sync_crate_feed.rs:100-124","code":"  100 | async fn load_version_updates(\n  101 |     name: &str,\n  102 |     mut conn: &AsyncPgConnection,\n  103 | ) -> QueryResult<Vec<VersionUpdate>> {\n  104 |     let threshold_dt = chrono::Utc::now().naive_utc() - ALWAYS_INCLUDE_AGE;\n  105 | \n  106 |     let updates = VersionUpdate::query()\n  107 |         .filter(crates::name.eq(name))\n  108 |         .filter(versions::created_at.gt(threshold_dt))\n  109 |         .order(versions::created_at.desc())\n  110 |         .load(&mut conn)\n  111 |         .await?;\n  112 | \n  113 |     let num_updates = updates.len();\n  114 |     if num_updates as i64 >= NUM_ITEMS {\n  115 |         return Ok(updates);\n  116 |     }\n  117 | \n  118 |     VersionUpdate::query()\n  119 |         .filter(crates::name.eq(name))\n  120 |         .order(versions::created_at.desc())\n  121 |         .limit(NUM_ITEMS)\n  122 |         .load(&mut conn)\n  123 |         .await\n  124 | }","lines":25,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/rss/sync_crate_feed.rs#L100-L124"},{"ref":"src/worker/jobs/rss/sync_crates_feed.rs:87-106","code":"   87 | async fn load_new_crates(mut conn: &AsyncPgConnection) -> QueryResult<Vec<NewCrate>> {\n   88 |     let threshold_dt = chrono::Utc::now().naive_utc() - ALWAYS_INCLUDE_AGE;\n   89 | \n   90 |     let new_crates = NewCrate::query()\n   91 |         .filter(crates::created_at.gt(threshold_dt))\n   92 |         .order(crates::created_at.desc())\n   93 |         .load(&mut conn)\n   94 |         .await?;\n   95 | \n   96 |     let num_new_crates = new_crates.len();\n   97 |     if num_new_crates as i64 >= NUM_ITEMS {\n   98 |         return Ok(new_crates);\n   99 |     }\n  100 | \n  101 |     NewCrate::query()\n  102 |         .order(crates::created_at.desc())\n  103 |         .limit(NUM_ITEMS)\n  104 |         .load(&mut conn)\n  105 |         .await\n  106 | }","lines":20,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/rss/sync_crates_feed.rs#L87-L106"},{"ref":"src/worker/jobs/rss/sync_updates_feed.rs:87-106","code":"   87 | async fn load_version_updates(mut conn: &AsyncPgConnection) -> QueryResult<Vec<VersionUpdate>> {\n   88 |     let threshold_dt = chrono::Utc::now().naive_utc() - ALWAYS_INCLUDE_AGE;\n   89 | \n   90 |     let updates = VersionUpdate::query()\n   91 |         .filter(versions::created_at.gt(threshold_dt))\n   92 |         .order(versions::created_at.desc())\n   93 |         .load(&mut conn)\n   94 |         .await?;\n   95 | \n   96 |     let num_updates = updates.len();\n   97 |     if num_updates as i64 >= NUM_ITEMS {\n   98 |         return Ok(updates);\n   99 |     }\n  100 | \n  101 |     VersionUpdate::query()\n  102 |         .order(versions::created_at.desc())\n  103 |         .limit(NUM_ITEMS)\n  104 |         .load(&mut conn)\n  105 |         .await\n  106 | }","lines":20,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/rss/sync_updates_feed.rs#L87-L106"}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Crate::top_versions` loads every non-yanked version (created_at + num) of a crate with no limit. For crates with very large version histories this loads the full set into memory just to compute the highest/newest version. Acceptable for typical crates but unbounded by crate.","fix":"If this becomes hot, compute highest/newest in SQL (e.g. via `semver_ord_v2` ordering as `default_versions` already does) instead of loading all rows.","locations":[{"ref":"crates/crates_io_database/src/models/krate.rs:197-205","code":"  197 |     pub async fn top_versions(&self, mut conn: &AsyncPgConnection) -> QueryResult<TopVersions> {\n  198 |         Ok(TopVersions::from_date_version_pairs(\n  199 |             Version::belonging_to(self)\n  200 |                 .filter(versions::yanked.eq(false))\n  201 |                 .select((versions::created_at, versions::num))\n  202 |                 .load(&mut conn)\n  203 |                 .await?,\n  204 |         ))\n  205 |     }","lines":9,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/krate.rs#L197-L205"}]},{"id":"PERF_21","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"render_og_images.rs paginates with OFFSET/LIMIT over `crates ORDER BY name`, incrementing offset by batch_size each loop. OFFSET pagination re-scans and discards `offset` rows on every batch, making the full backfill O(n^2) in rows scanned.","fix":"Use keyset pagination (WHERE name > $last_name ORDER BY name LIMIT batch_size) instead of growing OFFSET.","locations":[{"ref":"src/bin/crates-admin/render_og_images.rs:58-122","code":"   58 |     loop {\n   59 |         // Fetch batch of crate names\n   60 |         let crate_names: Vec<String> = build_query()\n   61 |             .order(crates::name)\n   62 |             .offset(offset)\n   63 |             .limit(opts.batch_size as i64)\n   64 |             .load(&mut conn)\n   65 |             .await\n   66 |             .context(\"Failed to load crate names\")?;\n   67 | \n   68 |         if crate_names.is_empty() {\n   69 |             break;\n   70 |         }\n   71 | \n   72 |         let batch_size = crate_names.len();\n   73 |         info!(\n   74 |             \"Enqueueing batch {}-{} of {total_crates}\",\n   75 |             offset + 1,\n   76 |             offset + batch_size as i64\n   77 |         );\n   78 | \n   79 |         // Create batch of jobs\n   80 |         let jobs = crate_names\n   81 |             .into_iter()\n   82 |             .map(|crate_name| {\n   83 |                 if opts.skip_invalidation {\n   84 |                     GenerateOgImage::without_cdn_invalidation(crate_name)\n   85 |                 } else {\n   86 |                     GenerateOgImage::new(crate_name)\n   87 |                 }\n   88 |             })\n   89 |             .map(|job| {\n   90 |                 Ok((\n   91 |                     background_jobs::job_type.eq(GenerateOgImage::JOB_NAME),\n   92 |                     background_jobs::data.eq(serde_json::to_value(job)?),\n   93 |                     background_jobs::priority.eq(-10),\n   94 |                 ))\n   95 |             })\n   96 |             .collect::<serde_json::Result<Vec<_>>>()\n   97 |             .context(\"Failed to enqueue background jobs\")?;\n   98 | \n   99 |         // Batch insert all jobs\n  100 |         let result = diesel::insert_into(background_jobs::table)\n  101 |             .values(jobs)\n  102 |             .execute(&mut conn)\n  103 |             .await;\n  104 | \n  105 |         match result {\n  106 |             Ok(inserted_count) => {\n  107 |                 enqueued += inserted_count;\n  108 |                 info!(\"Enqueued {enqueued} jobs so far...\");\n  109 |             }\n  110 |             Err(e) => {\n  111 |                 errors += batch_size;\n  112 |                 warn!(\"Failed to enqueue batch of OG image jobs: {e}\");\n  113 |             }\n  114 |         }\n  115 | \n  116 |         // Break if we've processed fewer than batch_size (last batch)\n  117 |         if batch_size < opts.batch_size {\n  118 |             break;\n  119 |         }\n  120 | \n  121 |         offset += opts.batch_size as i64;\n  122 |     }","lines":65,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/bin/crates-admin/render_og_images.rs#L58-L122"}]},{"id":"PERF_22","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`find_crate` clones the full `Crate` (`krate.clone()`) to build the encodable crate while still needing `krate.name` afterwards for encoding versions. The clone copies all crate string fields unnecessarily; only `name` is needed after the encodable crate is constructed.","fix":"Extract `krate.name` (clone just the name) before moving `krate` into `EncodableCrate::from`, avoiding the full struct clone.","locations":[{"ref":"src/controllers/krate/metadata.rs:177-193","code":"  177 |     let encodable_crate = EncodableCrate::from(\n  178 |         krate.clone(),\n  179 |         default_version.as_deref(),\n  180 |         num_versions.unwrap_or_default(),\n  181 |         yanked,\n  182 |         top_versions.as_ref(),\n  183 |         ids,\n  184 |         kws.as_deref(),\n  185 |         cats.as_deref(),\n  186 |         false,\n  187 |         downloads,\n  188 |         recent_downloads,\n  189 |     );\n  190 | \n  191 |     let encodable_versions = versions_publishers_and_audit_actions.map(|vpa| {\n  192 |         vpa.into_iter()\n  193 |             .map(|(v, pb, aas)| EncodableVersion::from(v, &krate.name, pb, aas))","lines":17,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/metadata.rs#L177-L193"}]},{"id":"PERF_23","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`download_version` calls `app.storage.crate_location(&path.name, &path.version)` and `redirect_url` is then formatted into JSON or a redirect. This is fine, but note the broader `wants_json` pattern duplicated across `download_version` and `get_version_readme` (and others) - same VARY/accept handling copy-pasted. Minor maintainability duplication.","fix":"Extract a small helper that, given a URL and `Parts`, returns the `(VARY, json-or-redirect)` response.","locations":[{"ref":"src/controllers/version/downloads.rs:43-62","code":"   43 | pub async fn download_version(\n   44 |     app: AppState,\n   45 |     path: CrateVersionPath,\n   46 |     req: Parts,\n   47 | ) -> AppResult<Response> {\n   48 |     let wants_json = req.wants_json();\n   49 |     let redirect_url = app.storage.crate_location(&path.name, &path.version);\n   50 |     let response = if wants_json {\n   51 |         json!({ \"url\": redirect_url }).into_response()\n   52 |     } else {\n   53 |         redirect(redirect_url)\n   54 |     };\n   55 | \n   56 |     // The response body depends on the `Accept` request header.\n   57 |     Ok((\n   58 |         [(header::VARY, HeaderValue::from_static(\"accept\"))],\n   59 |         response,\n   60 |     )\n   61 |         .into_response())\n   62 | }","lines":20,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/version/downloads.rs#L43-L62"},{"ref":"src/controllers/version/readme.rs:28-42","code":"   28 | pub async fn get_version_readme(app: AppState, path: CrateVersionPath, req: Parts) -> Response {\n   29 |     let url = app.storage.readme_location(&path.name, &path.version);\n   30 |     let response = if req.wants_json() {\n   31 |         Json(UrlResponse { url }).into_response()\n   32 |     } else {\n   33 |         redirect(url)\n   34 |     };\n   35 | \n   36 |     // The response body depends on the `Accept` request header.\n   37 |     (\n   38 |         [(header::VARY, HeaderValue::from_static(\"accept\"))],\n   39 |         response,\n   40 |     )\n   41 |         .into_response()\n   42 | }","lines":15,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/version/readme.rs#L28-L42"}]},{"id":"PERF_24","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"datadog.rs families_to_series clones the rewritten metric name and the entire resources Vec for every individual time-series in every family on every 5-second submission cycle, even though resources are identical across all metrics/families.","fix":"Hoist the resources clone out of the loops (build once) and reuse; avoid per-metric name cloning.","locations":[{"ref":"src/metrics/datadog.rs:199-205","code":"  199 |             series.push(Series {\n  200 |                 metric: metric.clone(),\n  201 |                 kind,\n  202 |                 points: vec![Point { timestamp, value }],\n  203 |                 resources: resources.to_vec(),\n  204 |                 tags,\n  205 |             });","lines":7,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/metrics/datadog.rs#L199-L205"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`admin::list` adds `.left_join(oauth_github::table)` to the users query but never selects any column from `oauth_github`, so the join is dead and only adds query cost. The select tuple uses only `User`, `emails::verified`, and `emails::email`.","fix":"Remove the unused `.left_join(oauth_github::table)` from the query.","locations":[{"ref":"src/controllers/admin.rs:82-92","code":"   82 |     let (user, verified, user_email) = users::table\n   83 |         .left_join(emails::table)\n   84 |         .left_join(oauth_github::table)\n   85 |         .filter(users::gh_login.eq(username))\n   86 |         .select((\n   87 |             User::as_select(),\n   88 |             emails::verified.nullable(),\n   89 |             emails::email.nullable(),\n   90 |         ))\n   91 |         .first::<(User, Option<bool>, Option<String>)>(&mut conn)\n   92 |         .await?;","lines":11,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/admin.rs#L82-L92"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`PublishWarnings` is always constructed with empty vectors (`invalid_categories`, `invalid_badges`, `other` all `vec![]`) and the surrounding comment confirms crates.io currently never returns any warnings. The three fields and the warning-assembly code are effectively dead, serving only API shape compatibility.","fix":"Either keep but document clearly that these are always empty for schema-compat, or remove the unused fields if the API contract allows.","locations":[{"ref":"src/controllers/krate/publish.rs:687-694","code":"  687 |         // The `other` field on `PublishWarnings` was introduced to handle a temporary warning\n  688 |         // that is no longer needed. As such, crates.io currently does not return any `other`\n  689 |         // warnings at this time, but if we need to, the field is available.\n  690 |         let warnings = PublishWarnings {\n  691 |             invalid_categories: vec![],\n  692 |             invalid_badges: vec![],\n  693 |             other: vec![],\n  694 |         };","lines":8,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/publish.rs#L687-L694"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The `InvalidCrateName::Start` error message says \"the first character must be an ASCII character\", but `validate_create_ident` actually requires the first character to be ASCII *alphabetic* (`is_ascii_alphabetic`), having rejected digits separately. ASCII symbols like `_` or `-` are ASCII characters yet are rejected with this misleading message, understating the real requirement.","fix":"Reword the message to \"the first character must be an ASCII letter\" to match `is_ascii_alphabetic`.","locations":[{"ref":"crates/crates_io_validation/src/lib.rs:36-44","code":"   36 |     #[error(\n   37 |         \"invalid character `{first_char}` in {what} name: `{name}`, \\\n   38 |         the first character must be an ASCII character\"\n   39 |     )]\n   40 |     Start {\n   41 |         first_char: char,\n   42 |         what: String,\n   43 |         name: String,\n   44 |     },","lines":9,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_validation/src/lib.rs#L36-L44"},{"ref":"crates/crates_io_validation/src/lib.rs:112-118","code":"  112 |         if !ch.is_ascii_alphabetic() {\n  113 |             return Err(InvalidCrateName::Start {\n  114 |                 first_char: ch,\n  115 |                 what: for_what.into(),\n  116 |                 name: name.into(),\n  117 |             });\n  118 |         }","lines":7,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_validation/src/lib.rs#L112-L118"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"metrics/macros.rs doc comment describes HISTOGRAM_BUCKETS as '0.5ms to 100ms' and '100ms to 5 seconds', but the array is [0.0005 .. 5.0] seconds (0.5ms to 5s) with boundaries jumping 0.1 -> 0.5 -> 1.0 -> 5.0. It also states buckets contain the count 'equal or greater to the bucket value', but Prometheus buckets are cumulative counts LESS THAN OR EQUAL TO the upper bound. Both descriptions are wrong/inverted.","fix":"Correct the comment to describe the actual buckets (0.5ms to 5s) and Prometheus 'le' (cumulative <=) bucket semantics.","locations":[{"ref":"src/metrics/macros.rs:3-16","code":"    3 | /// Prometheus's histograms work by dividing datapoints in buckets, with each bucket containing\n    4 | /// the count of datapoints equal or greater to the bucket value.\n    5 | ///\n    6 | /// The buckets used by crates.io are geared towards measuring the response time of our requests,\n    7 | /// going from 0.5ms to 100ms with a higher resolution and from 100ms to 5 seconds with a slightly\n    8 | /// lower resolution. This allows us to properly measure download requests (which take around 1ms)\n    9 | /// and other requests (our 95h is around 10-20ms).\n   10 | ///\n   11 | /// Histogram buckets are not an exact science, so feel free to tweak the buckets if you see that\n   12 | /// the histograms are not really accurate. Just avoid adding too many buckets as that increases\n   13 | /// the number of exported metric series.\n   14 | const HISTOGRAM_BUCKETS: &[f64] = &[\n   15 |     0.0005, 0.001, 0.0025, 0.005, 0.01, 0.025, 0.05, 0.1, 0.5, 1.0, 5.0,\n   16 | ];","lines":14,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/metrics/macros.rs#L3-L16"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"util/tracing.rs comments state Sentry is configured to 'include all INFO level events', but event_filter maps INFO (and WARN) to EventFilter::Breadcrumb, not Event - INFO events are only recorded as breadcrumbs, never sent to Sentry as events. The comment is misleading about what Sentry captures.","fix":"Reword the comment to state INFO/WARN are attached as breadcrumbs and only ERROR-level events are sent to Sentry as events.","locations":[{"ref":"src/util/tracing.rs:13-14","code":"   13 | /// This function also sets up the Sentry error reporting integration for the\n   14 | /// `tracing` framework, which is hardcoded to include all `INFO` level events.","lines":2,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/tracing.rs#L13-L14"},{"ref":"src/util/tracing.rs:43-59","code":"   43 |     let sentry_layer = sentry::integrations::tracing::layer()\n   44 |         .event_filter(event_filter)\n   45 |         .with_filter(LevelFilter::INFO);\n   46 | \n   47 |     tracing_subscriber::registry()\n   48 |         .with(log_layer)\n   49 |         .with(sentry_layer)\n   50 |         .init();\n   51 | }\n   52 | \n   53 | pub fn event_filter(metadata: &Metadata<'_>) -> EventFilter {\n   54 |     match metadata.level() {\n   55 |         &Level::ERROR if metadata.target() == \"http\" => EventFilter::Breadcrumb,\n   56 |         &Level::ERROR => EventFilter::Event,\n   57 |         &Level::WARN | &Level::INFO => EventFilter::Breadcrumb,\n   58 |         &Level::DEBUG | &Level::TRACE => EventFilter::Ignore,\n   59 |     }","lines":17,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/tracing.rs#L43-L59"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The `insert_or_update` SQL comment explains the conflict target as `WHERE gh_id > 0` to exclude backfilled `-1` rows, but the actual conflict predicate is `(gh_id) WHERE gh_id > 0` while the dedicated lookup `find_by_login` excludes those rows with `gh_id.ne(-1)` (i.e. `<> -1`, which also keeps `0`). The two filters describe slightly different exclusion sets (`> 0` vs `<> -1`); the comment's rationale ('there are multiple records with gh_id of -1') maps to `<> -1`, not `> 0`, making the chosen `> 0` predicate and its justification inconsistent.","fix":"Align the two predicates (use `<> -1` consistently, or `> 0` consistently) and update the comment so the exclusion set it describes matches the SQL.","locations":[{"ref":"crates/crates_io_database/src/models/user.rs:116-124","code":"  116 |             // We need the `WHERE gh_id > 0` condition here because `gh_id` set\n  117 |             // to `-1` indicates that we were unable to find a GitHub ID for\n  118 |             // the associated GitHub login at the time that we backfilled\n  119 |             // GitHub IDs. Therefore, there are multiple records in production\n  120 |             // that have a `gh_id` of `-1` so we need to exclude those when\n  121 |             // considering uniqueness of `gh_id` values. The `> 0` condition isn't\n  122 |             // necessary for most fields in the database to be used as a conflict\n  123 |             // target :)\n  124 |             .on_conflict(sql::<Integer>(\"(gh_id) WHERE gh_id > 0\"))","lines":9,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/user.rs#L116-L124"},{"ref":"crates/crates_io_database/src/models/user.rs:45-52","code":"   45 |     pub async fn find_by_login(mut conn: &AsyncPgConnection, login: &str) -> QueryResult<User> {\n   46 |         User::query()\n   47 |             .filter(lower(users::gh_login).eq(login.to_lowercase()))\n   48 |             .filter(users::gh_id.ne(-1))\n   49 |             .order(users::gh_id.desc())\n   50 |             .first(&mut conn)\n   51 |             .await\n   52 |     }","lines":8,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/user.rs#L45-L52"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on `slug_commit` describes `HEROKU_SLUG_COMMIT` as the variable the crate \"continues to use\" for backward compatibility, but `commit()` actually prefers `build_commit()` (`HEROKU_BUILD_COMMIT`) first and only falls back to `slug_commit()`. The wording is a leftover from before the build_commit preference was added and is now misleading about which variable is primary.","fix":"Update the `slug_commit` doc comment to state it is only the fallback, consistent with `commit()`.","locations":[{"ref":"crates/crates_io_heroku/src/lib.rs:48-51","code":"   48 | /// Note: `HEROKU_SLUG_COMMIT` is deprecated by Heroku in favor of\n   49 | /// `HEROKU_BUILD_COMMIT`, but this function continues to use\n   50 | /// `HEROKU_SLUG_COMMIT` for backward compatibility with existing\n   51 | /// deployments.","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_heroku/src/lib.rs#L48-L51"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on `GitLabClaims::workflow_filepath` (and the field reference) says it extracts from `workflow_ref`, but the GitLab struct has no `workflow_ref` field; it operates on `ci_config_ref_uri`. The `[`workflow_ref`]` intra-doc link in the doc comment is copy-pasted from the GitHub variant and is misleading / will not resolve. Same stale `workflow_ref` naming appears in the parameter name of `extract_workflow_filepath(workflow_ref: &str)`.","fix":"Update the doc comment and parameter name to reference `ci_config_ref_uri` instead of the copy-pasted `workflow_ref`.","locations":[{"ref":"crates/crates_io_trustpub/src/gitlab/claims.rs:47-51","code":"   47 |     /// Extract the workflow filename from the [`workflow_ref`](Self::workflow_ref)\n   48 |     /// field or return `None` if the filename cannot be extracted.\n   49 |     pub fn workflow_filepath(&self) -> Option<&str> {\n   50 |         extract_workflow_filepath(&self.ci_config_ref_uri)\n   51 |     }","lines":5,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_trustpub/src/gitlab/claims.rs#L47-L51"},{"ref":"crates/crates_io_trustpub/src/gitlab/workflows.rs:9","code":"    9 | pub(crate) fn extract_workflow_filepath(workflow_ref: &str) -> Option<&str> {","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_trustpub/src/gitlab/workflows.rs#L9"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"`try_to_extract_panic_info` first attempts to downcast the catch_unwind payload to `PanicHookInfo`. A panic payload from `catch_unwind`/`FutureExt::catch_unwind` (a `Box<dyn Any + Send>`) is never a `PanicHookInfo` - that type is only handed to `set_hook` handlers - so this arm can never match and is effectively dead, and its doc comment is misleading. Behavior is unaffected (it falls through to the &str/String arms).","fix":"Remove the `PanicHookInfo` downcast arm and keep only the `&'static str`, `String`, and fallback arms; fix the comment.","locations":[{"ref":"crates/crates_io_worker/src/util.rs:34-49","code":"   34 | /// Try to figure out what's in the box, and print it if we can.\n   35 | ///\n   36 | /// The actual error type we will get from `panic::catch_unwind` is really poorly documented.\n   37 | /// However, the `panic::set_hook` functions deal with a `PanicHookInfo` type, and its payload is\n   38 | /// documented as \"commonly but not always `&'static str` or `String`\". So we can try all of those,\n   39 | /// and give up if we didn't get one of those three types.\n   40 | pub fn try_to_extract_panic_info(info: &(dyn Any + Send + 'static)) -> anyhow::Error {\n   41 |     if let Some(x) = info.downcast_ref::<PanicHookInfo<'_>>() {\n   42 |         anyhow!(\"job panicked: {x}\")\n   43 |     } else if let Some(x) = info.downcast_ref::<&'static str>() {\n   44 |         anyhow!(\"job panicked: {x}\")\n   45 |     } else if let Some(x) = info.downcast_ref::<String>() {\n   46 |         anyhow!(\"job panicked: {x}\")\n   47 |     } else {\n   48 |         anyhow!(\"job panicked\")\n   49 |     }","lines":16,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_worker/src/util.rs#L34-L49"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"database_pools.rs `full_from_environment` doc claims it \"panics if DB_OFFLINE=leader but READ_ONLY_REPLICA_URL is unset\", and server.rs `from_environment` doc claims it \"panics if the Server configuration is invalid\", but both return errors via Result (no panic). Misleading panic documentation.","fix":"Update the doc comments to state the functions return an error (not panic) on the documented invalid configurations.","locations":[{"ref":"src/config/database_pools.rs:68-107","code":"   68 |     /// # Panics\n   69 |     ///\n   70 |     /// This function panics if `DB_OFFLINE=leader` but `READ_ONLY_REPLICA_URL` is unset.\n   71 |     pub fn full_from_environment(base: &Base) -> anyhow::Result<Self> {\n   72 |         let leader_url = required_var(\"DATABASE_URL\")?.into();\n   73 |         let follower_url = var(\"READ_ONLY_REPLICA_URL\")?.map(Into::into);\n   74 |         let read_only_mode = var(\"READ_ONLY_MODE\")?.is_some();\n   75 | \n   76 |         let primary_async_pool_size =\n   77 |             var_parsed(\"DB_PRIMARY_ASYNC_POOL_SIZE\")?.unwrap_or(DEFAULT_POOL_SIZE);\n   78 |         let replica_async_pool_size =\n   79 |             var_parsed(\"DB_REPLICA_ASYNC_POOL_SIZE\")?.unwrap_or(DEFAULT_POOL_SIZE);\n   80 | \n   81 |         let primary_min_idle = var_parsed(\"DB_PRIMARY_MIN_IDLE\")?;\n   82 |         let replica_min_idle = var_parsed(\"DB_REPLICA_MIN_IDLE\")?;\n   83 | \n   84 |         let tcp_timeout = var_parsed(\"DB_TCP_TIMEOUT_MS\")?\n   85 |             .map(Duration::from_millis)\n   86 |             .unwrap_or(DEFAULT_TCP_TIMEOUT);\n   87 | \n   88 |         let connection_timeout = var_parsed(\"DB_TIMEOUT\")?\n   89 |             .map(Duration::from_secs)\n   90 |             .unwrap_or(DEFAULT_CONNECTION_TIMEOUT);\n   91 | \n   92 |         // `DB_TIMEOUT` currently configures both the connection timeout and\n   93 |         // the statement timeout, so we can copy the parsed connection timeout.\n   94 |         let statement_timeout = connection_timeout;\n   95 | \n   96 |         let helper_threads = var_parsed(\"DB_HELPER_THREADS\")?.unwrap_or(DEFAULT_HELPER_THREADS);\n   97 | \n   98 |         let enforce_tls = base.env == Env::Production;\n   99 | \n  100 |         Ok(match var(\"DB_OFFLINE\")?.as_deref() {\n  101 |             // The actual leader is down, use the follower in read-only mode as the primary and\n  102 |             // don't configure a replica.\n  103 |             Some(\"leader\") => Self {\n  104 |                 primary: DbPoolConfig {\n  105 |                     url: follower_url.ok_or_else(|| {\n  106 |                         anyhow!(\"Must set `READ_ONLY_REPLICA_URL` when using `DB_OFFLINE=leader`.\")\n  107 |                     })?,","lines":40,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/config/database_pools.rs#L68-L107"},{"ref":"src/config/server.rs:105-108","code":"  105 |     /// # Panics\n  106 |     ///\n  107 |     /// This function panics if the Server configuration is invalid.\n  108 |     pub fn from_environment() -> anyhow::Result<Self> {","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/config/server.rs#L105-L108"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment on line 79 of `secret_scanning.rs` says `OkResponse`-style 'OwnerKind::User' restating the filter `crate_owners::owner_kind.eq(OwnerKind::User)` immediately to its left; it adds nothing. More notably, the doc above `send_trustpub_notification_emails` claims it gathers 'verified owner emails' which is correct, but the inline `// OwnerKind::User` is pure restatement of self-documenting code.","fix":"Remove the redundant trailing `// OwnerKind::User` comment.","locations":[{"ref":"src/controllers/github/secret_scanning.rs:271","code":"  271 |         .filter(crate_owners::o ts: &Options,\n   93 |     mut conn: &AsyncPgConnection,\n   94 | ) -> QueryResult<Vec<(i32, bool)>> {\n   95 |     let mut query = versions::table\n   96 |         .inner_join(crates::table)\n   97 |         .left_join(default_versions::table.on(default_versions::version_id.eq(versions::id)))\n   98 |         .select((\n   99 |             versions::id,\n  100 |             default_versions::crate_id.nullable().is_not_null(),\n  101 |         ))\n  102 |         .into_boxed();\n  103 | \n  104 |     if opts.backfill {\n  105 |         query = query.filter(\n  106 |             versions::zip_sha256\n  107 |                 .is_null()\n  108 |                 .or(versions::zip_json_sha256.is_null()),\n  109 |         )\n  110 |     } else {\n  111 |         for crate_spec in &opts.crates {\n  112 |             let (krate, version) = parse_crate_spec(crate_spec);\n  113 | \n  114 |             query = match version {\n  115 |                 Some(ver) => query.or_filter(crates::name.eq(krate).and(versions::num.eq(ver))),\n  116 |                 None => query.or_filter(crates::name.eq(krate)),\n  117 |             };\n  118 |         }\n  119 |     }\n  120 | \n  121 |     query.load(&mut conn).await\n  122 | }\n  123 | \n  124 | /// Parse crate specification in the format \"crate@version\" or just \"crate\"\n  125 | fn parse_crate_spec(spec: &str) -> (&str, Option<&str>) {\n  126 |     if let Some((name, ver)) = spec.split_once('@') {\n  127 |         (name, Some(ver))\n  128 |     } else {\n  129 |         (spec, None)\n  130 |     }\n  131 | }\n  132 | \n  133 | /// Represents a new background job to be inserted into the database\n  134 | #[derive(Debug, diesel::Insertable)]\n  135 | #[diesel(table_name = background_jobs)]\n  136 | struct NewBackgroundJob {\n  137 |     job_type: &'static str,\n  138 |     data: serde_json::Value,\n  139 |     priority: i16,\n  140 | }\n  141 | \n  142 | impl NewBackgroundJob {\n  143 |     /// Create a new [BuildCrateZip] background job with the specified priority\n  144 |     fn new(version_id: i32, priority: i16) -> anyhow::Result<Self> {\n  145 |         let job = BuildCrateZip::new(version_id);\n  146 |         let data = serde_json::to_value(&job).context(\"Failed to serialize job data\")?;\n  147 | \n  148 |         Ok(Self {\n  149 |             job_type: BuildCrateZip::JOB_NAME,\n  150 |             data,\n  151 |             priority,\n  152 |         })\n  153 |     }\n  154 | }","lines":155,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/bin/crates-admin/build_crate_zips.rs#L1-L155"}]},{"id":"DUP_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"negligible","easy":true,"description":"Constants CONTENT_TYPE_CRATE and CONTENT_TYPE_GZIP are both defined as the identical string \"application/gzip\". Having two names for the same value is redundant and risks them silently diverging.","fix":"Use a single constant, or document why two distinct names share the same value.","locations":[{"ref":"src/storage.rs:27-28","code":"   27 | const CONTENT_TYPE_CRATE: &str = \"application/gzip\";\n   28 | const CONTENT_TYPE_GZIP: &str = \"application/gzip\";","lines":2,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/storage.rs#L27-L28"}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"high","easy":false,"description":"GitLab namespace identity is bound lazily and never verified against any GitLab API at config-creation time, unlike GitHub (which resolves `repository_owner_id` through the GitHub API in create.rs before storing). A freshly created GitLab config has `namespace_id = NULL`; the FIRST successful token exchange writes whatever `namespace_id` the presented JWT carries (exchange/mod.rs:295-310) and only SUBSEQUENT exchanges are checked against it. Consequently, between config creation and first use there is a window in which any actor able to obtain a valid GitLab OIDC token for a project whose path matches the configured `namespace/project` (e.g. after a namespace was deleted and re-registered by a different party, \"namespace resurrection\") can claim the config and publish. GitHub avoids this by binding `repository_owner_id` up front. This is a design gap, not a coding mistake, but it materially weakens GitLab trusted publishing relative to GitHub and should be documented and/or hardened.","fix":"Resolve and store the GitLab `namespace_id` at config-creation time via the GitLab API (mirroring the GitHub flow), so the binding is established before any token exchange rather than on first use.","locations":[{"ref":"src/controllers/trustpub/tokens/exchange/mod.rs:295-330","code":"  295 |     // First, handle resurrection protection by lazily storing namespace_id and\n  296 |     // verifying it on subsequent exchanges, before checking workflow/environment.\n  297 |     let configs_to_update: Vec<i32> = repo_configs\n  298 |         .iter()\n  299 |         .filter(|config| config.namespace_id.is_none())\n  300 |         .map(|config| config.id)\n  301 |         .collect();\n  302 | \n  303 |     if !configs_to_update.is_empty() {\n  304 |         diesel::update(trustpub_configs_gitlab::table)\n  305 |             .filter(trustpub_configs_gitlab::id.eq_any(&configs_to_update))\n  306 |             .filter(trustpub_configs_gitlab::namespace_id.is_null())\n  307 |             .set(trustpub_configs_gitlab::namespace_id.eq(&signed_claims.namespace_id))\n  308 |             .execute(conn)\n  309 |             .await?;\n  310 |     }\n  311 | \n  312 |     // Remove configs that have a stored namespace_id which doesn't match\n  313 |     let mismatched_namespace_ids: Vec<String> = repo_configs\n  314 |         .extract_if(.., |config| {\n  315 |             config\n  316 |                 .namespace_id\n  317 |                 .as_ref()\n  318 |                 .is_some_and(|stored| stored != &signed_claims.namespace ublished version. Note that this could potentially write an outdated version\n  577 |         // (although this should not happen regularly), as we might be comparing to an\n  578 |         // outdated value. The initial record will be handled by the trigger function.\n  579 |         //\n  580 |         // Compared to only using a background job, this prevents us from getting into a\n  581 |         // situation where a crate exists in the `crates` table but doesn't have a default\n  582 |         // version in the `default_versions` table.\n  583 |         if let Some((existing_default_version, _)) = &existing_default_version {\n  584 |             let published_default_version = DefaultVersion {\n  585 |                 id: version.id,\n  586 |                 num: semver,\n  587 |                 yanked: false,\n  588 |             };\n  589 | \n  590 |             if existing_default_version < &published_default_version {\n  591 |                 diesel::update(default_versions::table)\n  592 |                     .filter(default_versions::crate_id.eq(krate.id))\n  593 |                     .set(default_versions::version_id.eq(version.id))\n  594 |                     .execute(conn)\n  595 |                     .await?;\n  596 |             } else {\n  597 |                 default_version = Some(existing_default_version.num.to_string());\n  598 |             }\n  599 | \n  600 |             // Update the default version asynchronously in a background job\n  601 |             // to ensure correctness and eventual consistency.\n  602 |             UpdateDefaultVersion::new(krate.id).enqueue(conn).await?;\n  603 |         }\n  604 | \n  605 |         // Update all keywords for this crate\n  606 |         Keyword::update_crate(conn, krate.id, &keywords).await?;\n  607 | \n  608 |         // Update all categories for this crate, collecting any invalid categories\n  609 |         // in order to be able to return an error to the user.\n  610 |         let unknown_cat     query = query.order(Crate::with_name(q_string).desc());\n  144 | \n  145 |         if sort == \"relevance\" {\n  146 |             // Ranking every crate that matches the query is prohibitively\n  147 |             // expensive for short or common terms (see\n  148 |             // `relevance_candidate_ids`), so we restrict the ranking to a\n  149 |             // bounded set of the most promising candidates. Results beyond this\n  150 |             // set are intentionally not reachable when sorting by relevance.\n  151 |             let candidate_ids = filter_params\n  152 |                 .relevance_candidate_ids(&mut conn, RELEVANCE_CANDIDATE_LIMIT)\n  153 |                 .await?;\n  154 |             query = query.filter(crates::id.eq_any(candidate_ids));\n  155 | \n  156 |             let q = plainto_tsquery_with_search_config(TsConfigurationByName(\"english\"), q_string);\n  157 |             let rank = ts_rank_cd(crates::textsearchable_index_col, q);\n  158 |             query = query.select((\n  159 |                 ALL_COLUMNS,\n  160 |                 Crate::with_name(q_string),\n  161 |                 crate_downloads::downloads,\n  162 |                 recent_crate_downloads::downloads.nullable(),\n  163 |                 rank,\n  164 |                 versions::num.nullable(),\n  165 |                 versions::yanked.nullable(),\n  166 |                 default_versions::num_versions.nullable(),\n  167 |             ));\n  168 |             seek = Some(Seek::Relevance);\n  169 |             // Within equal relevance, prefer the more popular crate. Common\n  170 |             // terms produce many ties on `ts_rank_cd`, so without this the top\n  171 |             // results would be ordered alphabetically by name.\n  172 |             query = query\n  173 |                 .then_order_by(rank.desc())\n  174 |                 .then_order_by(recent_crate_downloads::downloads.desc().nulls_last())\n  175 |         } else {\n  176 |             query = query.select((\n  177 |                 ALL_COLUMNS,\n  178 |                 Crate::with_name(q_string),\n  179 |                 crate_downloads::downloads,\n  180 |                 recent_crate_downloads::downloads.nullable(),\n  181 |                 0_f32.into_sql::<Float>(),\n  182 |                 versions::num.nullable(),\n  183 |                 versions::yanked.nullable(),\n  184 |                 default_versions::num_versions.nullable(),\n  185 |             ));\n  186 |             seek = Some(Seek::Query);\n  187 |         }\n  188 |     }\n  189 | \n  190 |     // Any sort other than 'relevance' (default) would ignore exact crate name matches\n  191 |     // Seek-based pagination requires a unique ordering to avoid unexpected row skipping\n  192 |     // during pagination.\n  193 |     // Therefore, when the ordering isn't unique an auxiliary ordering column should be added\n  194 |     // to ensure predictable pagination behavior.\n  195 |     if sort == Some(\"downloads\") {\n  196 |         seek = Some(Seek::Downloads);\n  197 |         query = query.order((crate_downloads::downloads.desc(), crates::id.desc()))\n  198 |     } else if sort == Some(\"recent-downloads\") {\n  199 |         seek = Some(Seek::RecentDownloads);\n  200 |         query = query.order((\n  201 |             recent_crate_downloads::downloads.desc().nulls_last(),\n  202 |             crates::id.desc(),\n  203 |         ))\n  204 |     } else if sort == Some(\"recent-updates\") {\n  205 |         seek = Some(Seek::RecentUpdates);\n  206 |         query = query.order((crates::updated_at.desc(), crates::id.desc()));\n  207 |     } else if sort == Some(\"new\") {\n  208 |         seek = Some(Seek::New);\n  209 |         query = query.order((crates::created_at.desc(), crates::id.desc()));\n  210 |     } else {\n  211 |         seek = seek.or(Some(Seek::Name));\n  212 |         // Since the name is unique value, the inherent ordering becomes naturally unique.\n  213 |         // Therefore, an additional auxiliary ordering column is unnecessary in this case.\n  214 |         query = query.then_order_by(crates::name.asc())\n  215 |     }\n  216 | \n  217 |     let pagination: PaginationOptions = PaginationOptions::builder()\n  218 |         .limit_page_numbers()\n  219 |         .enable_seek(true)\n  220 |         .gather(&req)?;\n  221 | \n  222 |     let explicit_page = matches!(pagination.page, Page::Numeric(_));\n  223 | \n  224 |     // When sorting by relevance only the first `RELEVANCE_CANDIDATE_LIMIT`\n  225 |     // results are reachable, so reject explicit pages that start beyond it\n  226 |     // instead of returning an empty page. Seek pagination needs no equivalent:\n  227 |     // it stops handing out keys once it reaches the boundary.\n  228 |     if matches!(seek, Some(Seek::Relevance))\n  229 |         && let Some(offset) = pagination.offset()\n  230 |         && offset >= RELEVANCE_CANDIDATE_LIMIT\n  231 |     {\n  232 |         return Err(bad_request(format!(\n  233 |             \"Cannot page beyond the first {RELEVANCE_CANDIDATE_LIMIT} results when sorting by relevance. Please take a look at https://crates.io/data-access for alternatives.\"\n  234 |         )));\n  235 |     }\n  236 | \n  237 |     // To avoid breaking existing users, seek-based pagination is only used if an explicit page has\n  238 |     // not been provided. This way clients relying on meta.next_page will use the faster seek-based\n  239 |     // paginations, while client hardcoding pages handling will use the slower offset-based code.\n  240 |     let (total, next_page, prev_page, data) = if !explicit_page && let Some(seek) = seek {\n  241 |         if let Some(condition) = seek\n  242 |             .after(&pagination.page)?\n  243 |             .map(|s| filter_params.seek_after(&s))\n  244 |         {\n  245 |             query = query.filter(condition);\n  246 |         }\n  247 | \n  248 |         // This does a full index-only scan over the crates table to gather how many crates were\n  249 |         // published. Unfortunately on PostgreSQL counting the rows in a table requires scanning\n  250 |         // the table, and the `total` field is part of the stable registries API.\n  251 |         //\n  252 |         // If this becomes a problem in the future the crates count could be denormalized, at least\n  253 |         // for the filterless happy path.\n  254 |         let count_query = filter_params.make_query().count();\n  255 |         let query = query.pages_pagination_with_count_query(pagination, count_query);\n  256 |         let span = info_span!(\"db.query\", message = \"SELECT ..., COUNT(*) FROM crates\");\n  257 |         let data = query.load::<Record>(&mut conn).instrument(span).await?;\n  258 |         (\n  259 |             data.total(),\n  260 |             data.next_seek_params(|last| seek.to_payload(last))?\n  261 |                 .map(|p| req.query_with_params(p)),\n  262 |             None,\n  263 |             data.into_iter().collect::<Vec<_>>(),\n  264 |         )\n  265 |     } else {\n  266 |         let count_query = filter_params.make_query().count();\n  267 |         let query = query.pages_pagination_with_count_query(pagination, count_query);\n  268 |         let span = info_span!(\"db.query\", message = \"SELECT ..., COUNT(*) FROM crates\");\n  269 |         let data = query.load::<Record>(&mut conn).instrument(span).await?;\n  270 |         (\n  271 |             data.total(),\n  272 |             data.next_page_params().map(|p| req.query_with_params(p)),\n  273 |             data.prev_page_params().map(|p| req.query_with_params(p)),\n  274 |             data.into_iter().collect::<Vec<_>>(),\n  275 |         )\n  276 |     };\n  277 | \n  278 |     let crates = data.iter().map(|r| &r.krate).collect::<Vec<_>>();\n  279 | \n  280 |     let span = info_span!(\"db.query\", message = \"SELECT ... FROM versions\");\n  281 |     let versions: Vec<Version> = Version::belonging_to( hout a stripping reverse proxy in front (or a proxy that does not overwrite XFF), a client can spoof X-Forwarded-For to evade IP blocks or impersonate another source IP. Trust must be anchored to known proxy hops.","fix":"Only honor X-Forwarded-For from trusted proxy source addresses (configurable CIDR allowlist), and parse the chain right-to-left skipping trusted hops; otherwise fall back to the socket peer address. Confirm crates_io_real_ip enforces this; if not, gate it here.","locations":[{"ref":"src/middleware/real_ip.rs:12-28","code":"   12 | pub async fn middleware(\n   13 |     ConnectInfo(socket_addr): ConnectInfo<SocketAddr>,\n   14 |     mut req: Request,\n   15 |     next: Next,\n   16 | ) -> impl IntoResponse {\n   17 |     let xff_ip = process_xff_headers(req.headers());\n   18 |     let real_ip = xff_ip\n   19 |         .inspect(|ip| debug!(target: \"real_ip\", \"Using X-Forwarded-For header as real IP: {ip}\"))\n   20 |         .unwrap_or_else(|| {\n   21 |             let ip = socket_addr.ip();\n   22 |             debug!(target: \"real_ip\", \"Using socket address as real IP: {ip}\");\n   23 |             ip\n   24 |         });\n   25 | \n   26 |     req.extensions_mut().insert(RealIp(real_ip));\n   27 | \n   28 |     next.run(req).await","lines":17,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/real_ip.rs#L12-L28"}]},{"id":"ARCH_4","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`prepare_list` is a single ~160-line function mixing authorization (crate-owner rights / invitee-id checks), pagination/seek decoding, three separate DB round-trips (invitations, missing crate names, missing users), response assembly, and stable-sort post-processing. The multiple responsibilities make the auth-bypass-sensitive logic hard to audit in isolation.","fix":"Split into focused helpers: authorize-and-build-filter, load-paginated-invitations, hydrate-related
