n::Error, reqwest::Error, io::Error, etc.) simply Box the error, routing client-caused failures (e.g. malformed-JSON request bodies) through this path as 500 Internal Server Error and spamming Sentry as if they were server bugs, when many should be 4xx.","fix":"Differentiate client errors from server errors before boxing: return 400 for request-parsing failures and skip sentry capture; reserve the 500 blanket path for genuinely internal failures.","locations":[{"ref":"src/util/errors.rs:129-137","code":"  129 | impl<E: Error + Send + 'static> AppError for E {\n  130 |     fn response(&self) -> axum::response::Response {\n  131 |         error!(error = %self, \"Internal Server Error\");\n  132 | \n  133 |         sentry::capture_error(self);\n  134 | \n  135 |         server_error_response(self.to_string())\n  136 |     }\n  137 | }","lines":9,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/errors.rs#L129-L137"},{"ref":"src/util/errors.rs:187-203","code":"  187 | impl From<reqwest::Error> for BoxedAppError {\n  188 |     fn from(err: reqwest::Error) -> BoxedAppError {\n  189 |         Box::new(err)\n  190 |     }\n  191 | }\n  192 | \n  193 | impl From<serde_json::Error> for BoxedAppError {\n  194 |     fn from(err: serde_json::Error) -> BoxedAppError {\n  195 |         Box::new(err)\n  196 |     }\n  197 | }\n  198 | \n  199 | impl From<std::io::Error> for BoxedAppError {\n  200 |     fn from(err: std::io::Error) -> BoxedAppError {\n  201 |         Box::new(err)\n  202 |     }\n  203 | }","lines":17,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/errors.rs#L187-L203"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"for_testing() is compiled in any build with `debug_assertions` (not just `#[cfg(test)]`) and hardcodes a fixed key `b\"test_key_32_bytes_long_for_tests\"`. Debug builds of the production binary therefore ship a trivially known GitHub-token encryption key constructor. If a debug build is ever deployed, or if any code path selects for_testing() outside tests, stored GitHub tokens are encrypted under a publicly-known key, defeating the encryption entirely.","fix":"Gate for_testing() behind `#[cfg(test)]` only (or a dedicated test-only feature), never `debug_assertions`.","locations":[{"ref":"src/util/gh_token_encryption.rs:20-24","code":"   20 |     #[cfg(any(test, debug_assertions))]\n   21 |     pub fn for_testing() -> Self {\n   22 |         let test_key = b\"test_key_32_bytes_long_for_tests\";\n   23 |         Self::new(Aes256Gcm::new(Key::<Aes256Gcm>::from_slice(test_key)))\n   24 |     }","lines":5,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/gh_token_encryption.rs#L20-L24"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`SyncAdmins` joins `users` with `emails` via `left_join(emails::table)`. If an admin user has more than one row in the `emails` table, `UserData::query()` returns one row per email, so that admin is duplicated in `database_user_data`. This double-counts them in the formatted log lines and, more importantly, sends them the admin-change notification email once per email row in the loop at the bottom of `run`.","fix":"Restrict the email join (e.g. only primary/verified email) or de-duplicate users by `id` before iterating, so each admin is processed and emailed at most once.","locations":[{"ref":"src/worker/jobs/sync_admins.rs:45-69","code":"   45 |         #[derive(Debug, HasQuery)]\n   46 |         #[diesel(base_query = users::table.left_join(oauth_github::table).left_join(emails::table))]\n   47 |         struct UserData {\n   48 |             #[diesel(select_expression = users::id)]\n   49 |             id: i32,\n   50 |             #[diesel(select_expression = users::gh_login)]\n   51 |             gh_login: String,\n   52 |             #[diesel(select_expression = users::is_admin)]\n   53 |             is_admin: bool,\n   54 |             #[diesel(select_expression = oauth_github::account_id.nullable())]\n   55 |             account_id: Option<i64>,\n   56 |             #[diesel(select_expression = emails::email.nullable())]\n   57 |             email: Option<String>,\n   58 |         }\n   59 | \n   60 |         // Fetch all database info for all accounts that are either currently marked as admins\n   61 |         // or are admins according to the team repo.\n   62 |         let database_user_data = UserData::query()\n   63 |             .filter(\n   64 |                 users::is_admin\n   65 |                     .eq(true)\n   66 |                     .or(oauth_github::account_id.eq_any(&repo_admin_github_ids)),\n   67 |             )\n   68 |             .get_results(&mut conn)\n   69 |             .await?;","lines":25,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/sync_admins.rs#L45-L69"},{"ref":"src/worker/jobs/sync_admins.rs:178-195","code":"  178 |         for database_admin in database_user_data.iter().filter(|u| u.is_admin) {\n  179 |             let UserData {\n  180 |                 account_id,\n  181 |                 gh_login,\n  182 |                 email,\n  183 |                 ..\n  184 |             } = database_admin;\n  185 |             if let Some(email_address) = email {\n  186 |                 if let Err(error) = send_email(&ctx, email_address, &context).await {\n  187 |                     warn!(\n  188 |                         \"Failed to send email to admin {gh_login} \\\n  189 |                         ({email_address}, github_id: {account_id:?}): {error:?}\"\n  190 |                     );\n  191 |                 }\n  192 |             } else {\n  193 |                 warn!(\"No email address found for admin {gh_login} (github_id: {account_id:?})\",);\n  194 |             }\n  195 |         }","lines":18,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/sync_admins.rs#L178-L195"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Top-level category detection is inconsistent between counting and listing. `count_toplevel` filters on `categories.category NOT LIKE '%::%'`, while `toplevel.sql` (used by `toplevel`) filters on `split_part(c.slug, '::', 1) = c.slug` (i.e. the *slug* has no `::`). When the count and the page are computed by two different definitions of \"top-level\", pagination totals can disagree with the returned rows if a category's `category` and `slug` ever differ in their `::` structure.","fix":"Use the same predicate in both places (either both on `slug` or both on `category`), e.g. make `count_toplevel` filter `split_part(slug, '::', 1) = slug` to match `toplevel.sql`.","locations":[{"ref":"crates/crates_io_database/src/models/category.rs:86-92","code":"   86 |     pub async fn count_toplevel(mut conn: &AsyncPgConnection) -> QueryResult<i64> {\n   87 |         categories::table\n   88 |             .filter(categories::category.not_like(\"%::%\"))\n   89 |             .count()\n   90 |             .get_result(&mut conn)\n   91 |             .await\n   92 |     }","lines":7,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/category.rs#L86-L92"},{"ref":"crates/crates_io_database/src/models/toplevel.sql:10","code":"   10 | WHERE split_part(c.slug, '::', 1) = c.slug","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/toplevel.sql#L10"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Crate::find_version` selects a single version by `(crate, num)` with `.first()` and no explicit ordering. This relies on `(crate_id, num)` being unique; if that invariant ever weakens, the method silently returns an arbitrary matching row. The semantics ('find the version with this number') are only correct because of an external uniqueness constraint that is not expressed here.","fix":"Document/rely on the unique index explicitly, or add a deterministic ordering, so the result is well-defined even if duplicates appear.","locations":[{"ref":"crates/crates_io_database/src/models/krate.rs:181-192","code":"  181 |     pub async fn find_version(\n  182 |         &self,\n  183 |         mut conn: &AsyncPgConnection,\n  184 |         version: &str,\n  185 |     ) -> QueryResult<Option<Version>> {\n  186 |         Version::belonging_to(self)\n  187 |             .filter(versions::num.eq(version))\n  188 |             .select(Version::as_select())\n  189 |             .first(&mut conn)\n  190 |             .await\n  191 |             .optional()\n  192 |     }","lines":12,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/krate.rs#L181-L192"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The X-Forwarded-For client-IP extraction returns the *last* non-CDN IP after filtering out known CloudFront/Fastly ranges. If the genuine client's IP happens to fall inside a CDN range (CDN ranges shift over time and the lists here are auto-generated snapshots), the real client entry appended by the CDN is filtered out, and an attacker-supplied earlier XFF entry becomes the \"last non-CDN\" value that is returned. The approach trusts \"last remaining after CDN filtering\" rather than indexing a fixed number of trusted-proxy hops from the right, so accuracy depends entirely on the CDN range lists being exhaustive and current.","fix":"Prefer indexing a known, fixed number of trusted proxy hops from the right (the documented infra hop count) instead of filter-then-take-last, so a stale/incomplete CDN range list cannot let a spoofed earlier entry win. At minimum, document the trust assumption and keep the CDN range lists tightly in sync.","locations":[{"ref":"crates/crates_io_real_ip/src/lib.rs:21-37","code":"   21 | /// Extracts the client IP address from the `X-Forwarded-For` header.\n   22 | ///\n   23 | /// This function will return the last valid non-CDN IP address in the\n   24 | /// `X-Forwarded-For` header, if any. IP addresses belonging to known\n   25 | /// CDN networks (CloudFront, Fastly) are filtered out.\n   26 | pub fn process_xff_headers(headers: &HeaderMap) -> Option<IpAddr> {\n   27 |     headers\n   28 |         .get_all(X_FORWARDED_FOR)\n   29 |         .iter()\n   30 |         .flat_map(|header| {\n   31 |             parse_xff_header(header)\n   32 |                 .into_iter()\n   33 |                 .filter_map(|r| r.ok())\n   34 |                 .filter(|ip| !is_cdn_ip(ip))\n   35 |         })\n   36 |         .next_back()\n   37 | }","lines":17,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_real_ip/src/lib.rs#L21-L37"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`encode` pads the session byte buffer with `0xff` so base64 output has no `=` padding, but `0xff` is the same byte used as the key/value field separator. `decode` splits on `0xff` and relies on `if key.is_empty() { break; }` to stop at the padding-induced trailing empty segments. This only works because padding bytes happen to land last; it is fragile and undocumented, an empty key can never be stored, and any future reordering/padding change silently corrupts the round-trip.","fix":"Use a padding byte distinct from the 0xff separator (e.g. 0x00), or use standard base64 with `=` padding and drop the manual 0xff padding loop entirely.","locations":[{"ref":"crates/crates_io_session/src/lib.rs:86-117","code":"   86 | pub fn decode(cookie: Cookie<'_>) -> HashMap<String, String> {\n   87 |     let mut ret = HashMap::new();\n   88 |     let bytes = general_purpose::STANDARD\n   89 |         .decode(cookie.value().as_bytes())\n   90 |         .unwrap_or_default();\n   91 |     let mut parts = bytes.split(|&a| a == 0xff);\n   92 |     while let (Some(key), Some(value)) = (parts.next(), parts.next()) {\n   93 |         if key.is_empty() {\n   94 |             break;\n   95 |         }\n   96 |         if let (Ok(key), Ok(value)) = (std::str::from_utf8(key), std::str::from_utf8(value)) {\n   97 |             ret.insert(key.to_string(), value.to_string());\n   98 |         }\n   99 |     }\n  100 |     ret\n  101 | }\n  102 | \n  103 | pub fn encode(h: &HashMap<String, String>) -> String {\n  104 |     let mut ret = Vec::new();\n  105 |     for (i, (k, v)) in h.iter().enumerate() {\n  106 |         if i != 0 {\n  107 |             ret.push(0xff)\n  108 |         }\n  109 |         ret.extend(k.bytes());\n  110 |         ret.push(0xff);\n  111 |         ret.extend(v.bytes());\n  112 |     }\n  113 |     while ret.len() * 8 % 6 != 0 {\n  114 |         ret.push(0xff);\n  115 |     }\n  116 |     general_purpose::STANDARD.encode(&ret[..])\n  117 | }","lines":32,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_session/src/lib.rs#L86-L117"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`AccessToken::from_str` validates the alphanumeric character set and a 1-char checksum, then compares the claimed checksum to the computed one with a plain `!=` (access_token.rs:71). The token revoke path (revoke/mod.rs) and the publish path look the token up by SHA-256 in the DB, so the actual secret comparison is done by the DB on the hash, not here; the checksum is explicitly documented as non-cryptographic. This is acceptable, but note the comparison `claimed_checksum != actual_checksum` and the alphanumeric scan in `from_str` are not constant time. Since they only gate well-formedness (not authentication) the timing leak is not meaningfully exploitable, but it is worth confirming no caller treats a successful `from_str` as proof of authenticity.","fix":"No change required if `from_str` is only a format check; document that it is NOT an authentication step. The authoritative check remains the hashed-token DB lookup.","locations":[{"ref":"crates/crates_io_trustpub/src/access_token.rs:55-79","code":"   55 |     fn from_str(s: &str) -> Result<Self, Self::Err> {\n   56 |         let suffix = s\n   57 |             .strip_prefix(Self::PREFIX)\n   58 |             .ok_or(AccessTokenError::MissingPrefix)?;\n   59 | \n   60 |         if suffix.len() != Self::RAW_LENGTH + 1 {\n   61 |             return Err(AccessTokenError::InvalidLength);\n   62 |         }\n   63 | \n   64 |         if !suffix.chars().all(|c| char::is_ascii_alphanumeric(&c)) {\n   65 |             return Err(AccessTokenError::InvalidCharacter);\n   66 |         }\n   67 | \n   68 |         let raw = suffix.chars().take(Self::RAW_LENGTH).collect::<String>();\n   69 |         let claimed_checksum = suffix.chars().nth(Self::RAW_LENGTH).unwrap();\n   70 |         let actual_checksum = checksum(raw.as_bytes());\n   71 |         if claimed_checksum != actual_checksum {\n   72 |             return Err(AccessTokenError::InvalidChecksum {\n   73 |                 claimed: claimed_checksum,\n   74 |                 actual: actual_checksum,\n   75 |             });\n   76 |         }\n   77 | \n   78 |         Ok(Self(raw.into()))\n   79 |     }","lines":25,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_trustpub/src/access_token.rs#L55-L79"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"db_read falls back to the primary pool when the replica pool `.get()` returns an error, but it does NOT fall back when the replica simply has no free connections within the wait_timeout (that also surfaces as a PoolError, which is fine) — the subtler issue is that db_read_prefer_primary falls back from primary to replica on primary failure, which can route writes-intended-as-reads to a read-only replica and vice-versa. More importantly, neither path distinguishes a transient pool-exhaustion error from a real outage, so a momentarily saturated replica silently shifts all read load onto the primary, potentially cascading the overload to the primary.","fix":"Only fall back on connection/availability errors, not on pool-timeout (backpressure) errors; consider a circuit breaker so a saturated replica does not stampede the primary.","locations":[{"ref":"src/app.rs:204-254","code":"  204 |     #[instrument(skip_all)]\n  205 |     pub async fn db_read(&self) -> DeadpoolResult {\n  206 |         let Some(read_only_pool) = self.replica_database.as_ref() else {\n  207 |             // Replica is disabled, but primary might be available\n  208 |             return self.primary_database.get().await;\n  209 |         };\n  210 | \n  211 |         match read_only_pool.get().await {\n  212 |             // Replica is available\n  213 |             Ok(connection) => Ok(connection),\n  214 | \n  215 |             // Replica is not available, but primary might be available\n  216 |             Err(error) => {\n  217 |                 let _ = self\n  218 |                     .instance_metrics\n  219 |                     .database_fallback_used\n  220 |                     .get_metric_with_label_values(&[\"follower\"])\n  221 |                     .map(|metric| metric.inc());\n  222 | \n  223 |                 warn!(\"Replica is unavailable, falling back to primary ({error})\");\n  224 |                 self.primary_database.get().await\n  225 |             }\n  226 |         }\n  227 |     }\n  228 | \n  229 |     /// Obtain a readonly database connection from the primary pool\n  230 |     ///\n  231 |     /// If the primary pool is unavailable, the replica pool is used instead, if not disabled.\n  232 |     #[instrument(skip_all)]\n  233 |     pub async fn db_read_prefer_primary(&self) -> DeadpoolResult {\n  234 |         let Some(read_only_pool) = self.replica_database.as_ref() else {\n  235 |             return self.primary_database.get().await;\n  236 |         };\n  237 | \n  238 |         match self.primary_database.get().await {\n  239 |             // Primary is available\n  240 |             Ok(connection) => Ok(connection),\n  241 | \n  242 |             // Primary is not available, but replica might be available\n  243 |             Err(error) => {\n  244 |                 let _ = self\n  245 |                     .instance_metrics\n  246 |                     .database_fallback_used\n  247 |                     .get_metric_with_label_values(&[\"primary\"])\n  248 |                     .map(|metric| metric.inc());\n  249 | \n  250 |                 warn!(\"Primary is unavailable, falling back to replica ({error})\");\n  251 |                 read_only_pool.get().await\n  252 |             }\n  253 |         }\n  254 |     }","lines":51,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/app.rs#L204-L254"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"monitor.rs check_failing_background_jobs uses `.for_update().skip_locked()` with a `priority.ge(0)` filter. Many crates-admin tools enqueue jobs with NEGATIVE priorities (e.g. -10, -20, -50). Stuck/failing negative-priority backfill jobs therefore never trip this stall alert.","fix":"Remove/relax the priority filter or document that negative-priority backfill jobs are intentionally excluded from stall alerting.","locations":[{"ref":"src/bin/monitor.rs:54-63","code":"   54 |     let stalled_jobs: Vec<i32> = background_jobs: e, https://b.example` stores ` https://b.example` with a leading space, which never matches an incoming Origin header, silently dropping a configured allowed origin.","fix":"Trim each split entry and drop empties when parsing WEB_ALLOWED_ORIGINS.","locations":[{"ref":"src/config/server.rs:168-179","code":"  168 | impl AllowedOrigins {\n  169 |     pub fn from_str(s: &str) -> Self {\n  170 |         Self(s.split(',').map(ToString::to_string).collect())\n  171 |     }\n  172 | \n  173 |     pub fn from_default_env() -> anyhow::Result<Self> {\n  174 |         Ok(Self::from_str(&required_var(\"WEB_ALLOWED_ORIGINS\")?))\n  175 |     }\n  176 | \n  177 |     pub fn contains(&self, value: &HeaderValue) -> bool {\n  178 |         self.0.iter().any(|it| it == value)\n  179 |     }","lines":12,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/config/server.rs#L168-L179"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ListFilter::try_from` clones `crate_name` into the variant (`ListFilter::CrateName(crate_name.clone())`) even though `params.crate_name` is owned and moved out of by the `if let Some(crate_name) = params.crate_name` binding. The `.clone()` is redundant and allocates an extra `String` on every private invitation listing filtered by crate name.","fix":"Drop the `.clone()` and use `ListFilter::CrateName(crate_name)` directly.","locations":[{"ref":"src/controllers/crate_owner_invitation.rs:138-145","code":"  138 |     fn try_from(params: ListQueryParams) -> Result<Self, Self::Error> {\n  139 |         let filter = if let Some(crate_name) = params.crate_name {\n  140 |             ListFilter::CrateName(crate_name.clone())\n  141 |         } else if let Some(id) = params.invitee_id {\n  142 |             ListFilter::InviteeId(id)\n  143 |         } else {\n  144 |             return Err(bad_request(\"missing or invalid filter\"));\n  145 |         };","lines ich happens to be the desired outcome only because those rows now match. The whole DB transaction rolls back on any later `bad_request`, so nothing persists on rejection; the risk is purely maintainability: any future reordering of the backfill vs. the mismatch filter, or a change making the filter treat `None` differently, could silently bind an attacker-controlled namespace_id to an unbound config.","fix":"Refresh the in-memory configs after the UPDATE (or check namespace_id before backfilling and backfill only the rows that will be used), so correctness does not rely on the implicit 'keep None rows' behavior.","locations":[{"ref":"src/controllers/trustpub/tokens/exchange/mod.rs:295-321","code":"  295 |     // First, handle resurrection protection by lazily storing namespace_id and\n  296 |     // verifying it on subsequent exchanges, before checking workflow/environment.\n  297 |     let configs_to_update: Vec<i32> = repo_configs\n  298 |         .iter()\n  299 |         .filter(|config| config.namespace_id.is_none())\n  300 |         .map(|config| config.id)\n  301 |         .collect();\n  302 | \n  303 |     if !configs_to_update.is_empty() {\n  304 |         diesel::update(trustpub_configs_gitlab::table)\n  305 |             .filter(trustpub_configs_gitlab::id.eq_any(&configs_to_update))\n  306 |             .filter(trustpub_configs_gitlab::namespace_id.is_null())\n  307 |             .set(trustpub_configs_gitlab::namespace_id.eq(&signed_claims.namespace_id))\n  308 |             .execute(conn)\n  309 |             .await?;\n  310 |     }\n  311 | \n  312 |     // Remove configs that have a stored namespace_id which doesn't match\n  313 |     let mismatched_namespace_ids: Vec<String> = repo_configs\n  314 |         .extract_if(.., |config| {\n  315 |             config\n  316 |                 .namespace_id\n  317 |                 .as_ref()\n  318 |                 .is_some_and(|stored| stored != &signed_claims.namespace_id)\n  319 |         })\n  320 |         .filter_map(|config| config.namespace_id)\n  321 |         .collect();","lines":27,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/trustpub/tokens/exchange/mod.rs#L295-L321"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"GitHub environment matching is case-insensitive (`config_env.to_lowercase() != signed_env.to_lowercase()`), but GitHub Actions environment names are themselves case-insensitive while GitLab environment names are case-sensitive per GitLab. The GitLab branch reuses the same `to_lowercase()` comparison (exchange/mod.rs:355-357), which is MORE permissive than GitLab's own semantics: two distinct GitLab environments differing only in case (e.g. `Prod` vs `prod`) would be treated as equal. This could let a job running in a different (lower- privileged) environment satisfy a config that intended a specific cased environment. Impact is limited because environment names rarely differ only by case, but the comparison does not match GitLab's case-sensitive rules.","fix":"Use a case-sensitive comparison for GitLab environments to match GitLab semantics, keeping the case-insensitive comparison only for GitHub.","locations":[{"ref":"src/controllers/trustpub/tokens/exchange/mod.rs:347-361","code":"  347 |     let mismatched_environments: Vec<String> = repo_configs\n  348 |         .extract_if(.., |config| {\n  349 |             match (&config.environment, &signed_claims.environment) {\n  350 |                 // Keep configs with no environment requirement\n  351 |                 (None, _) => false,\n  352 |                 // Remove configs requiring environment when JWT has none\n  353 |                 (Some(_), None) => true,\n  354 |                 // Remove non-matching environments (case-insensitive)\n  355 |                 (Some(config_env), Some(signed_env)) => {\n  356 |                     config_env.to_lowercase() != signed_env.to_lowercase()\n  357 |                 }\n  358 |             }\n  359 |         })\n  360 |         .filter_map(|config| config.environment.map(|env| format!(\"`{env}`\")))\n  361 |         .collect();","lines":15,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/trustpub/tokens/exchange/mod.rs#L347-L361"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`get_user_stats` maps a summed `BigDecimal` download total into `u64` with `d.to_u64().unwrap_or(u64::MAX)`. If the true sum ever exceeds `u64::MAX` (or is negative for any reason), the API silently reports `u64::MAX` rather than an error, which is a misleading saturating result. Practically unreachable today, but the saturation hides data corruption rather than surfacing it.","fix":"Either document the saturation explicitly or return the value as the `BigDecimal`/`i64` it naturally is; at minimum log when saturation occurs.","locations":[{"ref":"src/controllers/user/other.rs:81-84","code":"   81 |         .first::<Option<BigDecimal>>(&mut conn)\n   82 |         .await?\n   83 |         .map(|d| d.to_u64().unwrap_or(u64::MAX))\n   84 |         .unwrap_or(0);","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/user/other.rs#L81-L84"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"build_message sets the From mailbox display name to `self.domain` (e.g. \"crates.io\") via `Mailbox::new(Some(self.domain.clone()), self.from.clone())`. Using the bare domain as the human display name is almost certainly unintended (the display name shown to recipients becomes the literal domain string). It also couples the visible sender name to the configured domain_name.","fix":"Use a deliberate display name (e.g. \"crates.io\" as a constant or None) rather than reusing the domain_name config value.","locations":[{"ref":"src/email.rs:217-217","code":"  217 |         let from = Mailbox::new(Some(self.domain.clone()), self.from.clone());","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/email.rs#L217"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Sentry traces_sampler matches the download endpoint with `ctx.name().starts_with(\"GET /api/v1/crates/\") && ctx.name().ends_with(\"/download\")`. If a raw path with a query string or a differing prefix ever reaches here, the match fails and the highest-traffic endpoint is sampled at the full traces_sample_rate instead of /100, multiplying trace volume/cost.","fix":"Match against the routed path template / a known op+name set rather than substring heuristics so a naming change cannot silently disable the cost-control sampling.","locations":[{"ref":"src/sentry/mod.rs:36-43","code":"   36 |         if op == \"http.server\" {\n   37 |             let is_download_endpoint =\n   38 |                 ctx.name().starts_with(\"GET /api/v1/crates/\") && ctx.name().ends_with(\"/download\");\n   39 | \n   40 |             if is_download_endpoint {\n   41 |                 // Reduce the sample rate for the download endpoint, since we have significantly\n   42 |                 // more traffic on that endpoint compared to the rest\n   43 |                 return config.traces_sample_rate / 100.;","lines":8,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/sentry/mod.rs#L36-L43"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"apply_cdn_prefix builds URLs as `format!(\"{}/{path}\", self.cdn_base)`. Crate/version names are interpolated directly into object-store Paths (crate_file_path etc.) and then into the CDN URL with only `+` -> `%2B` escaping applied afterward in crate_location/ pen Graph image.\n  242 |     ///\n  243 |     /// The function doesn't check for the existence of the file.\n  244 |     pub fn og_image_location(&self, name: &str) -> String {\n  245 |         self.apply_cdn_prefix(&og_image_path(name))\n  246 |     }\n  247 | \n  248 |     /// Returns the URL of an uploaded RSS feed.\n  249 |     pub fn feed_url(&self, feed_id: &FeedId<'_>) -> String {\n  250 |         self.apply_cdn_prefix(&feed_id.into()).replace('+', \"%2B\")\n  251 |     }\n  252 | \n  253 |     /// Returns the base URL that crate files are served from, e.g.\n  254 |     /// `https://static.crates.io`.\n  255 |     pub fn cdn_base(&self) -> &str {\n  256 |         &self.cdn_base\n  257 |     }\n  258 | \n  259 |     fn apply_cdn_prefix(&self, path: &Path) -> String {\n  260 |         format!(\"{}/{path}\", self.cdn_base)\n  261 |     }","lines":50,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/storage.rs#L212-L261"},{"ref":"src/storage.rs:520-538","code":"  520 | fn crate_file_path(name: &str, version: &str) -> Path {\n  521 |     format!(\"{PREFIX_CRATES}/{name}/{name}-{version}.crate\").into()\n  522 | }\n  523 | \n  524 | fn crate_zip_path(name: &str, version: &str) -> Path {\n  525 |     format!(\"{PREFIX_CRATES}/{name}/{name}-{version}.zip\").into()\n  526 | }\n  527 | \n  528 | fn crate_zip_manifest_path(name: &str, version: &str) -> Path {\n  529 |     format!(\"{PREFIX_CRATES}/{name}/{name}-{version}.zip.json\").into()\n  530 | }\n  531 | \n  532 | fn readme_path(name: &str, version: &str) -> Path {\n  533 |     format!(\"{PREFIX_READMES}/{name}/{name}-{version}.html\").into()\n  534 | }\n  535 | \n  536 | fn og_image_path(name: &str) -> Path {\n  537 |     format!(\"{PREFIX_OG_IMAGES}/{name}.png\").into()\n  538 | }","lines":19,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/storage.rs#L520-L538"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"wants_json() returns true if ANY Accept header value merely contains the substring \"json\" anywhere (e.g. `application/notjson+xml`), ignoring media-type structure and q-values, so content negotiation can pick the wrong representation.","fix":"Parse the Accept header into media types and check for an actual application/json (or */*) match, honoring q-values, instead of a raw substring contains.","locations":[{"ref":"src/util/request_helpers.rs:46-51","code":"   46 |     fn wants_json(&self) -> bool {\n   47 |         self.headers()\n   48 |             .get_all(header::ACCEPT)\n   49 |             .iter()\n   50 |             .any(|val| val.to_str().unwrap_or_default().contains(\"json\"))\n   51 |     }","lines":6,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/request_helpers.rs#L46-L51"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ProcessCloudfrontInvalidationQueue::process_batch` deduplicates paths only within a single batch (`HashSet` over the fetched 1000 items). Because batches are processed in a loop and dedup is per-batch, the same path appearing in two consecutive batches is sent to CloudFront twice, consuming AWS invalidation quota and increasing the chance of hitting `TooManyInvalidationsInProgress`.","fix":"Deduplicate at the SQL level (e.g. `SELECT DISTINCT path`) or accumulate seen paths across batches for a run, so the same path is not invalidated multiple times.","locations":[{"ref":"src/worker/jobs/process_cloudfront_invalidation_queue.rs:38-75","code":"   38 |     async fn process_batch(\n   39 |         &self,\n   40 |         conn: &AsyncPgConnection,\n   41 |         cloudfront: &CloudFront,\n   42 |         distribution: CloudFrontDistribution,\n   43 |     ) -> anyhow::Result<usize> {\n   44 |         let items =\n   45 |             CloudFrontInvalidationQueueItem:: ully subsumed by the second and is dead/redundant.","fix":"Drop the first `ends_with(root)` check and return `potential_subdomain.ends_with(&format!(\".{root}\"))` directly.","locations":[{"ref":"crates/crates_io_api_types/src/external_urls.rs:42-49","code":"   42 | fn domain_is_subdomain(potential_subdomain: &str, root: &str) -> bool {\n   43 |     if !potential_subdomain.ends_with(root) {\n   44 |         return false;\n   45 |     }\n   46 | \n   47 |     let root_with_prefix = format!(\".{root}\");\n   48 |     potential_subdomain.ends_with(&root_with_prefix)\n   49 | }","lines":8,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_api_types/src/external_urls.rs#L42-L49"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"`LimitErrorReader` reports \"maximum limit reached\" as soon as the inner `Take`'s\nremaining limit hits 0, which happens on the read that consumes the final allowed byte.\nConsequently a tarball whose decompressed size is exactly `max_unpack` bytes is\nrejected as \"too large\", even though it is within the limit (off-by-one: the limit is\neffectively exclusive). Low impact and matches the existing tests, but the boundary is\narguably wrong relative to the \"max\" naming.","fix":"If an inclusive limit is intended, construct the inner `Take` with `limit + 1` (or only\nerror when a subsequent read still yields data after the limit is reached) so that an\narchive of exactly `max_unpack` bytes is accepted.","locations":[{"ref":"crates/crates_io_tarball/src/limit_reader.rs:27-32","code":"   27 |         match reader.poll_read(cx, buf) {\n   28 |             Poll::Ready(Ok(())) if self.inner.limit() == 0 => {\n   29 |                 Poll::Ready(Err(io::Error::other(\"maximum limit reached when reading\")))\n   30 |             }\n   31 |             e => e,\n   32 |         }","lines":6,"link":"https://github.com/rust-lang/cr from `version_downloads`\");\n  241 |             }\n  242 |             Err(err) => {\n  243 |                 error!(\"Failed to delete rows from `version_downloads`: {err}\");\n  244 |             }\n  245 |         }\n  246 |     }\n  247 | \n  248 |     Ok(())\n  249 | }","lines":20,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/archive_version_downloads.rs#L230-L249"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`run_psql` decides success/failure by scanning psql's stderr for the substring \"ERROR\". This is fragile: a successful run whose data legitimately contains the text \"ERROR\" (e.g. a crate description, readme, or category name printed in a NOTICE/WARNING) would be reported as a failure, and conversely psql warnings/notices that don't contain that exact uppercase token are ignored even on real problems. The actual process exit status is only checked afterwards.","fix":"Rely primarily on the process exit status (run psql with `ON_ERROR_STOP=1` / `-v ON_ERROR_STOP=1`) instead of substring-matching stderr; treat a non-zero exit as the failure signal.","locations":[{"ref":"crates/crates_io_database_dump/src/lib.rs:178-184","code":"  178 |         let stderr = String::from_utf8_lossy(&output.stderr);\n  179 |         if stderr.contains(\"ERROR\") {\n  180 |             return Err(anyhow!(\"Error while executing psql: {stderr}\"));\n  181 |         }\n  182 |         if !output.status.success() {\n  183 |             return Err(anyhow!(\"psql did not finish successfully.\"));\n  184 |         }","lines":7,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database_dump/src/lib.rs#L178-L184"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`RealDocsRsClient::from_environment` returns `None` - silently disabling the docs.rs rebuild integration - when reading `DOCS_RS_API_TOKEN` errors, because `var(\"DOCS_RS_API_TOKEN\").ok()??` collapses both the `Err` case and the `Ok(None)` case to `None`. A transient/misconfigured env-var read error is therefore indistinguishable from an intentionally-absent token, masking production misconfiguration. The neighboring `base_url` branch logs a warning on error, so this one is inconsistent.","fix":"Match on `var(\"DOCS_RS_API_TOKEN\")` explicitly: log a warning on `Err` (like the base_url branch), and only return `None` on `Ok(None)`.","locations":[{"ref":"crates/crates_io_docs_rs/src/lib.rs:60-73","code":"   60 |     pub fn from_environment() -> Option<Self> {\n   61 |         let base_url: Url = match var_parsed(\"DOCS_RS_BASE_URL\") {\n   62 |             Ok(Some(url)) => url,\n   63 |             Ok(None) => Url::parse(DEFAULT_BASE_URL).unwrap(),\n   64 |             Err(err) => {\n   65 |                 warn!(\"Failed to parse DOCS_RS_BASE_URL: {err}\");\n   66 |                 return None;\n   67 |             }\n   68 |         };\n   69 | \n   70 |         let api_token = var(\"DOCS_RS_API_TOKEN\").ok()??;\n   71 | \n   72 |         Some(Self::new(base_url, api_token.into()))\n   73 |     }","lines":14,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_docs_rs/src/lib.rs#L60-L73"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`update_failed_job` runs inside the open transaction in `run_next_job` (`conn.transaction(...)`), where the failed job's row is still locked via `FOR UPDATE`. It swallows any database error (`let _ = ...await;`) and `run_next_job` then returns `Ok(Some(job_id))`, committing the transaction. The doc comment justifies ignoring the error by claiming \"just trying again with a new connection will succeed\", but that reasoning applies to a standalone statement on a fresh connection - here the UPDATE is part of the surrounding transaction. If the UPDATE fails non-fatally the retries increment and last_retry update are lost while the transaction still commits, so the job's backoff/poison accounting is dropped and the job can be retried with no backoff. The comment is also misleading about the execution context.","fix":"Propagate the error from `update_failed_job` with `?` so the transaction aborts and is retried cleanly, or perform the failure-marking UPDATE out of the transaction on a fresh connection to match the comment. Do not commit a transaction whose bookkeeping UPDATE errored, and fix the comment.","locations":[{"ref":"crates/crates_io_worker/src/worker.rs:104-116","code":"  104 |             let _enter = span.enter();\n  105 |             match result {\n  106 |                 Ok(_) => {\n  107 |                     debug!(\"Deleting successful job…\");\n  108 |                     storage::delete_successful_job(conn, job_id).await?\n  109 |                 }\n  110 |                 Err(error) => {\n  111 |                     warn!(\"Failed to run job: {error}\");\n  112 |                     storage::update_failed_job(conn, job_id).await;\n  113 |                 }\n  114 |             }\n  115 | \n  116 |             Ok(Some(job_id))","lines":13,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_worker/src/worker.rs#L104-L116"},{"ref":"crates/crates_io_worker/src/storage.rs:63-75","code":"   63 | /// Marks that we just tried and failed to run a job.\n   64 | ///\n   65 | /// Ignores any database errors that may have occurred. If the DB has gone away,\n   66 | /// we assume that just trying again with a new connection will succeed.\n   67 | pub(super) async fn update_failed_job(conn: &mut AsyncPgConnection, job_id: i64) {\n   68 |     let _ = update(background_jobs::table.find(job_id))\n   69 |         .set((\n   70 |             background_jobs::retries.eq(background_jobs::retries + 1),\n   71 |             background_jobs::last_retry.eq(now),\n   72 |         ))\n   73 |         .execute(conn)\n   74 |         .await;\n   75 | }","lines":13,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_worker/src/storage.rs#L63-L75"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In delete_crate.rs, the background-job enqueue block (SyncToGitIndex, SyncToSparseIndex, DeleteCrateFromStorage) runs unconditionally for every requested name, including names that were NOT found in the database (the `else` branch only logs \"Skipped missing crate\" but control still reaches the enqueue code below). This enqueues index-sync and storage-deletion jobs for non-existent crates, wasting worker capacity and causing confusing index churn.","fix":"Move the enqueue (try_join!) block inside the `if let Some(crate_info) = ...` arm so jobs are only enqueued for crates that actually existed and were deleted.","locations":[{"ref":"src/bin/crates-admin/delete_crate.rs:83-119","code":"   83 |     for name in &crate_names {\n   84 |         if let Some(crate_info) = existing_crates.iter().find(|info| info.name == *name) {\n   85 |             let id = crate_info.id;\n   86 | \n   87 |             let deleted_crate = NewDeletedCrate::builder(name)\n   88 |                 .created_at(&crate_info.created_at)\n   89 |                 .deleted_at(&now)\n   90 |                 .deleted_by(deleted_by.id)\n   91 |                 .maybe_message(opts.message.as_deref())\n   92 |                 .available_at(&available_at)\n   93 |                 .build();\n   94 | \n   95 |             info!(\"{name}: Deleting crate from the database…\");\n   96 |             let result = conn\n   97 |                 .transaction(async |conn| delete_from_database(conn, id, deleted_crate).await)\n   98 |                 .await;\n   99 | \n  100 |             if let Err(error) = result {\n  101 |                 warn!(%id, \"{name}: Failed to delete crate from the database: {error}\");\n  102 |             };\n  103 |         } else {\n  104 |             info!(\"{name}: Skipped missing crate\");\n  105 |         };\n  106 | \n  107 |         info!(\"{name}: Enqueuing background jobs…\");\n  108 |         let git_index_job = jobs::SyncToGitIndex::new(name);\n  109 |         let sparse_index_job = jobs::SyncToSparseIndex::new(name);\n  110 |         let delete_from_storage_job = jobs::DeleteCrateFromStorage::new(name.into());\n  111 | \n  112 |         if let Err(error) = tokio::try_join!(\n  113 |             git_index_job.enqueue(&conn),\n  114 |             sparse_index_job.enqueue(&conn),\n  115 |             delete_from_storage_job.enqueue(&conn),\n  116 |         ) {\n  117 |             warn!(\"{name}: Failed to enqueue background job: {error}\");\n  118 |         }\n  119 |     }","lines":37,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/bin/crates-admin/delete_crate.rs#L83-L119"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"is_read_only_error classifies read-only DB errors by checking whether the Postgres error message ends with the literal \"read-only transaction\". This is locale/version-dependent: a non-English lc_messages locale or a Postgres wording change means read-only-mode errors are no longer recognized and fall through to a generic 500 instead of the intended 503 + status-page message.","fix":"Match on the SQLSTATE code (25006 read_only_sql_transaction) via the DatabaseErrorInfo rather than the human-facing message text.","locations":[{"ref":"src/util/diesel.rs:3-5","code":"    3 | pub fn is_read_only_error(error: &Error) -> bool {\n    4 |     matches!(error, Error::DatabaseError(_, info) if info.message().ends_with(\"read-only transaction\"))\n    5 | }","lines":3,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/diesel.rs#L3-L5"},{"ref":"src/util/errors.rs:149-152","code":"  149 |             e if is_read_only_error(&e) => {\n  150 |                 let detail = \"crates.io is currently in read-only mode. Please check https://status.crates.io/ for details and try again later.\";\n  151 |                 custom(StatusCode::SERVICE_UNAVAILABLE, detail)\n  152 |             }","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/errors.rs#L149-L152"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `DumpDb::run`, the tarball is uploaded and its CDN invalidation is attempted; if invalidation fails it is only `warn!`-logged. The job then continues to upload the ZIP and invalidate it. The two `invalidate_cdns` failures are swallowed, so a dump can be published to S3 while the CDN keeps serving the stale dump, and the job still reports success. There is no retry or alert path for the invalidation failure.","fix":"Decide explicitly whether CDN invalidation failure should fail the job; if it must not, at least surface it as a hard error metric rather than a debug-level warning that is easily missed.","locations":[{"ref":"src/worker/jobs/dump_db.rs:69-87","code":"   69 |         info!(\"Invalidating CDN caches…\");\n   70 |         let conn = env.deadpool.get().await?;\n   71 |         let dist = CloudFrontDistribution::Static;\n   72 | \n   73 |         if let Err(error) = env.invalidate_cdns(&conn, dist, TAR_PATH).await {\n   74 |             warn!(\"Failed to invalidate CDN caches: {error}\");\n   75 |         }\n   76 | \n   77 |         info!(\"Uploading zip file…\");\n   78 |         env.storage\n   79 |             .upload_db_dump(ZIP_PATH, archives.zip.path())\n   80 |             .await?;\n   81 |         info!(\"Database dump zip file uploaded\");\n   82 | \n   83 |         info!(\"Invalidating CDN caches…\");\n   84 |         if let Err(error) = env.invalidate_cdns(&conn, dist, ZIP_PATH).await {\n   85 |             warn!(\"Failed to invalidate CDN caches: {error}\");\n   86 |         }\n   87 | ","lines":19,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/dump_db.rs#L69-L87"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Cache::update` clears the existing key cache (`self.keys.clear()`) and then, if any individual `DecodingKey::from_jwk(key)?` fails, returns early with the error WITHOUT setting `last_update` and while leaving the cache empty. The caller in `get_oidc_key` propagates this as an error, but because `last_update` was never set, `recently_updated()` stays false and every subsequent request will re-fetch the full JWKS and re-attempt parsing. A single malformed key in the upstream JWKS therefore wipes all cached keys and disables caching entirely (a fetch per request) until the upstream set becomes fully parseable, amplifying load and turning a partial upstream problem into a full outage of trusted publishing.","fix":"Build the new key map in a local variable and only swap it into `self.keys` (and set `last_update`) on full success; or skip individual unparseable keys with a warning instead of aborting the whole update.","locations":[{"ref":"crates/crates_io_trustpub/src/keystore/impl.rs:42-56","code":"   42 |     fn update(&mut self, jwks: &JwkSet) -> anyhow::Result<()> {\n   43 |         self.keys.clear();\n   44 |         for key in &jwks.keys {\n   45 |             if let Some(key_id) = &key.common.key_id {\n   46 |                 let decoding_key = DecodingKey::from_jwk(key)?;\n   47 |                 self.keys.insert(key_id.clone(), decoding_key);\n   48 |             } else {\n   49 |                 warn!(\"OIDC key without a key ID found, skipping.\");\n   50 |             }\n   51 |         }\n   52 | \n   53 |         self.last_update = Some(Instant::now());\n   54 | \n   55 |         Ok(())\n   56 |     }","lines":15,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_trustpub/src/keystore/impl.rs#L42-L56"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"authenticate_via_cookie maps any User::find failure to internal() (HTTP 500). A session cookie that references a user id which has since been deleted is a client-side stale-credential condition, not a server fault, yet it produces a 500 and a Sentry error report rather than a 401/403. This can spam error tracking when users are deleted.","fix":"Treat a not-found user from a cookie session as an unauthenticated/forbidden condition (clear session, return forbidden) rather than internal server error; only map genuine DB failures to 500.","locations":[{"ref":"src/auth.rs:273-276","code":"  273 |     let user = User::find(conn, id).await.map_err(|err| {\n  274 |         parts.request_log().add(\"cause\", err);\n  275 |         internal(\"user_id from cookie not found in database\")\n  276 |     })?;","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/auth.rs#L273-L276"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"background-worker.rs spawns a thread to lock_index() and only logs on failure (warn!(\"Failed to clone index\")); the runner starts regardless. Repository/index jobs assume the index has been locked/cloned, so if the clone fails, repository-queue jobs run against an uninitialized index and fail repeatedly while the worker still reports healthy."," :"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the `add` branch of `modify_owners`, the per-login success/already-invited messages are joined with a plain comma (`msgs.join(\",\")`) with no space. The resulting `msg` returned to `cargo` is harder to read when multiple owners are added in one request (e.g. \"user a ...,user b ...\"). Cosmetic but user-facing.","fix":"Join messages with \", \" (comma + space) for readability.","locations":[{"ref":"src/controllers/krate/owners.rs:287","code":"  287 |                 msgs.join(\",\")","lines":1,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/owners.rs#L287"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"During publish, after the tarball is read and validated, the new default-version comparison may write an outdated version (acknowledged in the comment at lines 576-582). The code then unconditionally enqueues `UpdateDefaultVersion` to reconcile - but only inside the `existing_default_version.is_some()` branch. For a brand-new crate (`existing_default_version.is_none()`) the default version is set solely by a trigger function and no reconciliation job is enqueued, relying entirely on the DB trigger being correct. If the trigger is ever skipped/disabled, a new crate could exist without a default-version row, which the comment explicitly says this logic is meant to prevent.","fix":"Enqueue `UpdateDefaultVersion` for the new-crate case as well (or assert the trigger ran), so default-version consistency does not rely solely on the DB trigger.","locations":[{"ref":"src/controllers/krate/publish.rs:565-603","code":"  565 |         let existing_default_version = default_versions::table\n  566 |             .inner_join(versions::table)\n  567 |             .filter(default_versions::crate_id.eq(krate.id))\n  568 |             .select((DefaultVersion::as_select(), default_versions::num_versions))\n  569 |             .first::<(DefaultVersion, Option<i32>)>(conn)\n  570 |             .await\n  571 |             .optional()?;\n  572 | \n  573 |         let num_versions = existing_default_version.as_ref().and_then(|t| t.1).unwrap_or_default();\n  574 |         let mut default_version = None;\n  575 |         // Upsert the `default_value` determined by the existing `default_value` and the\n  576 |         // published version. Note that this could potentially write an outdated version\n  577 |         // (although this should not happen regularly), as we might be comparing to an\n  578 |         // outdated value. The initial record will be handled by the trigger function.\n  579 |         //\n  580 |         // Compared to only using a background job, this prevents us from getting into a\n  581 |         // situation where a crate exists in the `crates` table but doesn't have a default\n  582 |         // version in the `default_versions` table.\n  583 |         if let Some((existing_default_version, _)) = &existing_default_version {\n  584 |             let published_default_version = DefaultVersion {\n  585 |                 id: version.id,\n  586 |                 num: semver,\n  587 |                 yanked: false,\n  588 |             };\n  589 | \n  590 |             if existing_default_version < &published_default_version {\n  591 |                 diesel::update(default_versions::table)\n  592 |                     .filter(default_versions::crate_id.eq(krate.id))\n  593 |                     .set(default_versions::version_id.eq(version.id))\n  594 |                     .execute(conn)\n  595 |                     .await?;\n  596 |             } else {\n  597 |                 default_version = Some(existing_default_version.num.to_string());\n  598 |             }\n  599 | \n  600 |             // Update the default version asynchronously in a background job\n  601 |             // to ensure correctness and eventual consistency.\n  602 |             UpdateDefaultVersion::new(krate.id).enqueue(conn).await?;\n  603 |         }","lines":39,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/krate/publish.rs#L565-L603"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Emails::from_environment parses the `from` address with `login.as_deref().unwrap_or(DEFAULT_FROM).parse().unwrap()`. The MAILGUN_SMTP_LOGIN value is used directly as the From address and `.parse().unwrap()` will panic at startup if the login is not a syntactically valid email address. Likewise `AsyncSmtpTransport::relay(&server).unwrap()` panics on a bad server value. Boot-time, but the panic message is opaque.","fix":"Propagate a clean configuration error (Result) instead of unwrapping the parsed From address and the SMTP relay builder.","locations":[{"ref":"src/email.rs:135-143","code":"  135 |         let from = login.as_deref().unwrap_or(DEFAULT_FROM).parse().unwrap();\n  136 | \n  137 |         let backend = match (login, password, server) {\n  138 |             (Ok(login), Ok(password), Ok(server)) => {\n  139 |                 let transport = AsyncSmtpTransport::<Tokio1Executor>::relay(&server)\n  140 |                     .unwrap()\n  141 |                     .credentials(Credentials::new(login, password))\n  142 |                     .authentication(vec![Mechanism::Plain])\n  143 |                     .build();","lines":9,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/email.rs#L135-L143"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"block_by_ip only blocks when the exact RealIp is contained in config.block.ips (a set). It does no CIDR/range matching, so abusive subnets must be enumerated address-by-address. Combined with the XFF trust issue above, IP-based blocking is brittle. Not a bug per se, but a notable limitation for an abuse-control mechanism in a public service.","fix":"Support CIDR ranges in the IP blocklist (e.g. ipnet) so subnets can be blocked, and document the proxy-trust assumption.","locations":[{"ref":"src/middleware/block_traffic.rs:102-112","code":"  102 | pub fn block_by_ip(\n  103 |     real_ip: &RealIp,\n  104 |     state: &AppState,\n  105 |     headers: &HeaderMap,\n  106 | ) -> Result<(), impl IntoResponse> {\n  107 |     if state.config.block.ips.contains(real_ip) {\n  108 |         return Err(rejection_response_from(state, headers));\n  109 |     }\n  110 | \n  111 |     Ok(())\n  112 | }","lines":11,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/middleware/block_traffic.rs#L102-L112"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"ssh::write_known_hosts_file writes include_bytes!(\"./known_hosts\") to $HOME/.ssh/known_hosts, unconditionally overwriting any existing known_hosts. If the runtime HOME already has a populated known_hosts, this clobbers it instead of appending the GitHub keys, dropping other trusted hosts.","fix":"Append (deduplicating) the GitHub host keys to the existing known_hosts, or write to a dedicated file referenced via SSH config.","locations":[{"ref":"src/ssh/mod.rs:14-18","code":"   14 |     let known_hosts_path = ssh_path.join(\"known_hosts\");\n   15 |     fs::write(known_hosts_path, include_bytes!(\"./known_hosts\"))\n   16 |         .context(\"Failed to write `known_hosts` file\")?;\n   17 | \n   18 |     Ok(())","lines":5,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/ssh/mod.rs#L14-L18"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"get_str_or_default and wants_json swallow invalid-UTF8/non-ASCII header values via to_str().unwrap_or_default(), making a present-but-non-UTF8 header indistinguishable from an absent one. This can mask client bugs or be used to bypass header-based checks that assume 'empty == not sent'.","fix":"Where the distinction matters, surface invalid header values as a 400 rather than coercing to empty string; at minimum document the behavior.","locations":[{"ref":"src/util/request_helpers.rs:19-25","code":"   19 | impl HeaderMapExt for HeaderMap {\n   20 |     fn get_str_or_default<K: AsHeaderName>(&self, key: K) -> &str {\n   21 |         self.get(key)\n   22 |             .map(|value| value.to_str().unwrap_or_default())\n   23 |             .unwrap_or_default()\n   24 |     }\n   25 | }","lines":7,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/request_helpers.rs#L19-L25"},{"ref":"src/util/request_helpers.rs:46-51","code":"   46 |     fn wants_json(&self) -> bool {\n   47 |         self.headers()\n   48 |             .get_all(header::ACCEPT)\n   49 |             .iter()\n   50 |             .any(|val| val.to_str().unwrap_or_default().contains(\"json\"))\n   51 |     }","lines":6,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/util/request_helpers.rs#L46-L51"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `ProcessCdnLogQueue::run`, messages are processed one at a time and each successfully processed message is deleted from SQS immediately. If `process_message` returns `Err` partway through a batch (e.g. a transient DB connection failure while enqueuing jobs), the whole job fails and is retried from scratch, re-receiving and re-processing the messages whose `ProcessCdnLog` jobs were already enqueued (and re-deleting already-deleted handles). Duplicate `ProcessCdnLog` enqueues rely on `ProcessCdnLog` dedup/`already_processed` to stay correct.","fix":"Either treat per-message failures as non-fatal (log and continue, leaving the message for SQS visibility-timeout redelivery) or ensure the enqueue+delete are idempotent end to end; document the reliance on ProcessCdnLog deduplication.","locations":[{"ref":"src/worker/jobs/downloads/queue/job.rs:68-99","code":"   68 | async fn run(\n   69 |     queue: &impl SqsQueue,\n   70 |     max_messages: usize,\n   71 |     connection_pool: &Pool<AsyncPgConnection>,\n   72 | ) -> anyhow::Result<()> {\n   73 |     const MAX_BATCH_SIZE: usize = 10;\n   74 | \n   75 |     let mut num_remaining = max_messages;\n   76 |     while num_remaining > 0 {\n   77 |         let batch_size = num_remaining.min(MAX_BATCH_SIZE);\n   78 |         num_remaining -= batch_size;\n   79 | \n   80 |         debug!(\"Receiving next {batch_size} messages from the CDN log queue…\");\n   81 |         let response = queue.receive_messages(batch_size as i32).await?;\n   82 | \n   83 |         let messages = response.messages();\n   84 |         debug!(\n   85 |             \"Received {num_messages} messages from the CDN log queue\",\n   86 |             num_messages = messages.len()\n   87 |         );\n   88 |         if messages.is_empty() {\n   89 |             info!(\"No more messages to receive from the CDN log queue\");\n   90 |             break;\n   91 |         }\n   92 | \n   93 |         for message in messages {\n   94 |             process_message(message, queue, connection_pool).await?;\n   95 |         }\n   96 |     }\n   97 | \n   98 |     Ok(())\n   99 | }","lines":32,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/downloads/queue/job.rs#L68-L99"},{"ref":"src/worker/jobs/downloads/queue/job.rs:103-129","code":"  103 | async fn process_message(\n  104 |     message: &Message,\n  105 |     queue: &impl SqsQueue,\n  106 |     connection_pool: &Pool<AsyncPgConnection>,\n  107 | ) -> anyhow::Result<()> {\n  108 |     debug!(\"Processing message…\");\n  109 | \n  110 |     let Some(receipt_handle) = message.receipt_handle() else {\n  111 |         warn!(\"Message has no receipt handle; skipping\");\n  112 |         return Ok(());\n  113 |     };\n  114 | \n  115 |     if let Some(body) = message.body() {\n  116 |         process_body(body, connection_pool).await?;\n  117 |         debug!(\"Processed message\");\n  118 |     } else {\n  119 |         warn!(\"Message has no body; skipping\");\n  120 |     };\n  121 | \n  122 |     debug!(\"Deleting message from the CDN log queue…\");\n  123 |     queue\n  124 |         .delete_message(receipt_handle)\n  125 |         .await\n  126 |         .context(\"Failed to delete message from the CDN log queue\")?;\n  127 | \n  128 |     Ok(())\n  129 | }","lines":27,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/downloads/queue/job.rs#L103-L129"}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`GenerateOgImage::run` swallows all CDN invalidation failures with `warn!` only (CloudFront queueing, enqueue of the processing job, and Fastly purge). If invalidation consistently fails, the job still reports success and the CDN keeps serving the old OG image indefinitely with no retry. Same swallowing pattern as the other CDN-invalidation call sites.","fix":"Surface persistent invalidation failures as a job error or dedicated alert metric instead of a warning, so stale OG images are detectable.","locations":[{"ref":"src/worker/jobs/generate_og_image.rs:106-129","code":"  106 |         // Queue CloudFront invalidation for batch processing\n  107 |         if ctx.cloudfront().is_some() {\n  108 |             let distribution = CloudFrontDistribution::Static;\n  109 |             let paths = std::slice::from_ref(&og_image_path);\n  110 |             let result =\n  111 |                 CloudFrontInvalidationQueueItem::queue_paths(&conn, distribution, paths).await;\n  112 |             if let Err(error) = result {\n  113 |                 warn!(\"Failed to queue CloudFront invalidation for {crate_name}: {error}\");\n  114 |             } else if let Err(error) = ProcessCloudfrontInvalidationQueue.enqueue(&conn).await {\n  115 |                 warn!(\n  116 |                     \"Failed to enqueue CloudFront invalidation processing job for {crate_name}: {error}\"\n  117 |                 );\n  118 |             }\n  119 |         }\n  120 | \n  121 |         // Invalidate Fastly CDN\n  122 |         if let Some(fastly) = ctx.fastly()\n  123 |             && let Some(cdn_domain) = &ctx.config.storage.cdn_prefix\n  124 |             && let Err(error) = fastly.purge_both_domains(cdn_domain, &og_image_path).await\n  125 |         {\n  126 |             warn!(\"Failed to invalidate Fastly CDN for {crate_name}: {error}\");\n  127 |         }\n  128 | \n  129 |         info!(\"CDN invalidation completed for crate {crate_name}\");","lines":24,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/generate_og_image.rs#L106-L129"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`crates_io_crate_zip::build_zip` decodes the uploaded `.crate` (a gzipped tarball)\nwith `flate2::read::GzDecoder` wrapped in `tar::Archive` with no decompressed-size\nlimit, unlike `crates_io_tarball::process_tarball` which wraps its decoder in\n`LimitErrorReader`. `read_entry`/`read_to_end` for `Cargo.toml` (line 81-83) and the\nstreaming copy in `write_entry` (line 222-236) also have no cap. A malicious `.crate`\n(decompression bomb, or a huge declared/real Cargo.toml) can drive unbounded\ndecompression and allocation. Since this operates on untrusted uploaded crate files,\nthe missing limit is a denial-of-service vector unless every caller enforces a limit\non the underlying reader first.","fix":"Wrap the gzip decoder (or the entry readers) in a size-limiting reader analogous to\n`crates_io_tarball::LimitErrorReader`, and bound the `Cargo.toml` `read_to_end` and the\nper-entry streaming with a maximum byte count, returning an error when exceeded.","locations":[{"ref":"crates/crates_io_crate_zip/src/lib.rs:169-208","code":"  169 | fn for_each_file<R: Read + Seek>(\n  170 |     tarball: &mut R,\n  171 |     mut callback: impl FnMut(&str, &mut dyn Read) -> anyhow::Result<()>,\n  172 | ) -> anyhow::Result<()> {\n  173 |     tarball.rewind().context(\"Failed to rewind tarball\")?;\n  174 | \n  175 |     let decoder = GzDecoder::new(tarball);\n  176 |     let mut archive = tar::Archive::new(decoder);\n  177 | \n  178 |     let entries = archive\n  179 |         .entries()\n  180 |         .context(\"Failed to read tarball entries\")?;\n  181 | \n  182 |     for entry in entries {\n  183 |         let mut entry = entry.context(\"Failed to read tarball entry\")?;\n  184 |         if !entry.header().entry_type().is_file() {\n  185 |             // Skip directories, symlinks, hardlinks, and other non-file entries.\n  186 |             continue;\n  187 |         }\n  188 | \n  189 |         let path = entry.path().context(\"Failed to read tarball entry path\")?;\n  190 |         let path = path\n  191 |             .to_str()\n  192 |             .context(\"Tarball entry path is not valid UTF-8\")?;\n  193 | \n  194 |         // Strip the leading `{name}-{version}/` component so zip paths are\n  195 |         // crate-root-relative. The prefix is whatever the first component is,\n  196 |         // rather than a hardcoded name. Publish validation guarantees every\n  197 |         // entry sits under that directory, so an entry without one means a\n  198 |         // malformed `.crate`.\n  199 |         let stripped = match path.split_once('/') {\n  200 |             Some((_, rest)) => rest.to_string(),\n  201 |             None => bail!(\"Tarball entry `{path}` is not inside the package directory\"),\n  202 |         };\n  203 | \n  204 |         callback(&stripped, &mut entry)?;\n  205 |     }\n  206 | \n  207 |     Ok(())\n  208 | }","lines":40,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_crate_zip/src/lib.rs#L169-L208"},{"ref":"crates/crates_io_crate_zip/src/lib.rs:80-88","code":"   80 |             let mut contents = Vec::new();\n   81 |             reader\n   82 |                 .read_to_end(&mut contents)\n   83 |                 .with_context(|| format!(\"Failed to read contents of `{path}`\"))?;\n   84 |             cargo_toml = Some((path.to_string(), contents));\n   85 |         }\n   86 | \n   87 |         Ok(())\n   88 |     })?;","lines":9,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_crate_zip/src/lib.rs#L80-L88"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"establish_async_connection sets `danger_accept_invalid_certs(!enforce_tls)`. When enforce_tls is false (local/CI), TLS certificate validation is disabled entirely. The comment justifies this for local/CI, but the flag couples \"do not force sslmode=require\" with \"accept ANY certificate\", so any deployment that runs with enforce_tls=false (e.g. a misconfigured staging) silently accepts MITM'd TLS connections to the database.","fix":"Decouple the two concerns: only disable certificate validation behind an explicit, separate opt-in (e.g. DB_ACCEPT_INVALID_CERTS) rather than inferring it from enforce_tls.","locations":[{"ref":"src/db.rs:62-84","code":"   62 | async fn establish_async_connection(\n   63 |     url: &str,\n   64 |     enforce_tls: bool,\n   65 | ) -> ConnectionResult<AsyncPgConnection> {\n   66 |     use diesel::ConnectionError::BadConnection;\n   67 | \n   68 |     let cert = Certificate::from_pem(CRUNCHY).map_err(|err| BadConnection(err.to_string()))?;\n   69 | \n   70 |     let connector = TlsConnector::builder()\n   71 |         .add_root_certificate(cert)\n   72 |         // On OSX the native TLS stack is complaining about the long validity\n   73 |         // period of the certificate, so if locally we don't enforce TLS\n   74 |         // connections, we also don't enforce the validity of the certificate.\n   75 |         //\n   76 |         // Similarly, on CI the native TLS stack is complaining about the\n   77 |         // certificate being self-signed. On CI we are connecting to a locally\n   78 |         // running database, so we also don't need to enforce the validity of\n   79 |         // the certificate either.\n   80 |         .danger_accept_invalid_certs(!enforce_tls)\n   81 |         .build()\n   82 |         .map_err(|err| BadConnection(err.to_string()))?;\n   83 | \n   84 |     let connector = MakeTlsConnector::new(connector);","lines":23,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/db.rs#L62-L84"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"ConnectionConfig::apply builds `SET statement_timeout = {statement_timeout}` via string formatting from `self.statement_timeout.as_millis()`. The value is u128 and is interpolated directly into SQL. It is config-derived (not user input) so not an injection vector today, but using string-formatted SQL for SET parameters is fragile; an out-of-range/huge u128 produces an invalid SET statement that fails connection setup (HookError) for every pooled connection, taking down DB access.","fix":"Clamp/validate statement_timeout to a sane i32/i64 millisecond range at config load, and prefer a bound parameter or a checked numeric format.","locations":[{"ref":"src/db.rs:102-105","code":"  102 |         let statement_timeout = self.statement_timeout.as_millis();\n  103 |         diesel::sql_query(format!(\"SET statement_timeout = {statement_timeout}\"))\n  104 |             .execute(conn)\n  105 |             .await?;","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/db.rs#L102-L105"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"The temporary table `temp_downloads` is created with `downloads INTEGER NOT NULL` (i32), but the Diesel `table!` definition maps `downloads -> BigInt` and `NewDownload.downloads` is `i64` (filled via `downloads as i64`). The Diesel column type (BigInt/i64) disagrees with the real column type (INTEGER/i32). Any per-row value above i32::MAX will fail the INSERT into `temp_downloads`, and the type mismatch is a latent footgun that masks the overflow issue above.","fix":"Make the temp table column type, the Diesel `table!` mapping, and `NewDownload.downloads` all consistent (BIGINT/i64 if the real table is widened, otherwise INTEGER/i32 with a range check on the u64 -> i32 conversion).","locations":[{"ref":"src/worker/jobs/downloads/process_log.rs:172-205","code":"  172 | table! {\n  173 |     /// Diesel table definition for the temporary `temp_downloads` table that is\n  174 |     /// created by the [`create_temp_downloads_table`] function.\n  175 |     ///\n  176 |     /// The primary key does not actually exist, but specifying one is\n  177 |     /// required by Diesel.\n  178 |     temp_downloads (name, version, date) {\n  179 |         name -> Text,\n  180 |         version -> Text,\n  181 |         date -> Date,\n  182 |         downloads -> BigInt,\n  183 |     }\n  184 | }\n  185 | \n  186 | /// Helper struct for inserting downloads into the `temp_downloads` table.\n  187 | #[derive(Insertable)]\n  188 | #[diesel(table_name = temp_downloads)]\n  189 | struct NewDownload {\n  190 |     name: String,\n  191 |     version: String,\n  192 |     date: NaiveDate,\n  193 |     downloads: i64,\n  194 | }\n  195 | \n  196 | impl From<(String, Version, NaiveDate, u64)> for NewDownload {\n  197 |     fn from((name, version, date, downloads): (String, Version, NaiveDate, u64)) -> Self {\n  198 |         Self {\n  199 |             name,\n  200 |             version: version.to_string(),\n  201 |             date,\n  202 |             downloads: downloads as i64,\n  203 |         }\n  204 |     }\n  205 | }","lines":34,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/downloads/process_log.rs#L172-L205"},{"ref":"src/worker/jobs/downloads/process_log.rs:256-261","code":"  256 |             CREATE TEMPORARY TABLE temp_downloads (\n  257 |                 name VARCHAR NOT NULL,\n  258 |                 version VARCHAR NOT NULL,\n  259 |                 date DATE NOT NULL,\n  260 |                 downloads INTEGER NOT NULL\n  261 |             ) ON COMMIT DROP;","lines":6,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/worker/jobs/downloads/process_log.rs#L256-L261"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`Category::update_crate` and `Keyword::update_crate` always perform `insert_into(...).values(&crate_categories)` (resp. `&crate_keywords`) even when the slice is empty (e.g. when called with no slugs/keywords). An empty `INSERT ... VALUES` is a no-op at best and historically has been a source of diesel runtime errors; the insert should be skipped when there is nothing to insert.","fix":"Guard the insert with `if !crate_categories.is_empty() { ... }` (resp. keywords) to avoid issuing an empty INSERT.","locations":[{"ref":"crates/crates_io_database/src/models/category.rs:76-79","code":"   76 |             diesel::insert_into(crates_categories::table)\n   77 |                 .values(&crate_categories)\n   78 |                 .execute(conn)\n   79 |                 .await?;","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/category.rs#L76-L79"},{"ref":"crates/crates_io_database/src/models/keyword.rs:92-95","code":"   92 |             diesel::insert_into(crates_keywords::table)\n   93 |                 .values(&crate_keywords)\n   94 |                 .execute(conn)\n   95 |                 .await?;","lines":4,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/crates/crates_io_database/src/models/keyword.rs#L92-L95"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"The metrics authorization token is compared with a plain `!=` (`provided_token != Some(expected_token.expose_secret())`). String equality short-circuits on the first differing byte, leaking timing information about the secret. This is an internal metrics endpoint, but it is still a bearer-token check that should be constant-time.","fix":"Compare the provided and expected tokens with a constant-time comparison (e.g. `subtle::ConstantTimeEq` / `constant_time_eq`).","locations":[{"ref":"src/controllers/metrics.rs:26-28","code":"   26 |         if provided_token != Some(expected_token.expose_secret()) {\n   27 |             return Err(forbidden(\"invalid or missing authorization token\"));\n   28 |         }","lines":3,"link":"https://github.com/rust-lang/crates.io/blob/3b1886c87fa86c31ed80933dfff05f0e204b01e2/src/controllers/metrics.rs#L26-L28"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`VersionOwnerAction::all()` loads the entire `version_owner_actions` table into memory with no `LIMIT`, `WHERE`, or pagination. On a production database this table grows with every publish/yank/unyank across all crates and could contain millions of rows. Any caller of this method risks loading the whole table into memory at once.","fix":"R
