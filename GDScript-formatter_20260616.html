<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"Out-of-bounds index access at `self.content.as_bytes()[byte_idx - 1]` in `handle_two_blank_line`.\n`byte_idx` is walked backward until it hits 0 OR finds a newline, so it CAN be 0 when the\nblock to insert before is at the very start of the file.  The condition then reads\n`self.content.as_bytes()[0 - 1]` which is an arithmetic underflow on `usize`,\ncausing a panic at runtime.  Any valid GDScript file whose very first token triggers\none of the two tree-sitter queries (e.g. a file that starts with a function definition\nimmediately followed by a variable) will reproduce the panic.","fix":"Guard against byte_idx == 0 before the subtraction:\n\n    if byte_idx == 0\n        || !(self.content.as_bytes()[byte_idx] == b'\\n'\n            && self.content.as_bytes()[byte_idx - 1] == b'\\n')\n    {","locations":[{"ref":"src/formatter.rs:690-691","code":"  690 |             if !(self.content.as_bytes()[byte_idx] == b'\\n'\n  691 |                 && self.content.as_bytes()[byte_idx - 1] == b'\\n')","lines":2}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`TopiaryQuery::new(...)` on line 97 is `.unwrap()`-ed.  If the bundled `queries/gdscript.scm`\nquery file is malformed (e.g. after an update to the tree-sitter grammar changes node\nnames), the call panics instead of returning a structured error to the caller.\nSimilarly `parser.set_language(...)` on line 65 is `.unwrap()`-ed.","fix":"Propagate through `?` after converting with `.map_err(|e| format!(...))`.\n`Formatter::new` would need to return `Result<Self, ...>`.","locations":[{"ref":"src/formatter.rs:65","code":"   65 |             .unwrap();","lines":1},{"ref":"src/formatter.rs:97","code":"   97 |             query: TopiaryQuery::new(&tree_sitter_gdscript::LANGUAGE.into(), QUERY).unwrap(),","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`parser.parse()` returns `Option<Tree>` and is unwrapped unconditionally in at least six\nplaces: `Formatter::new` (line 66), `postprocess` (line 169), `postprocess_tree_sitter`\n(line 501), `fix_nested_parenthesized_lambda_indentation` (line 459),\n`reorder` (line 131), `ensure_safe_reorder` (line 203), and\n`parse_top_level_token_signatures` (line 769 uses `ok_or` which is fine, but the\nothers use `.unwrap()`).  Tree-sitter's `parse()` returns `None` when the parse is\ncancelled via a timeout/cancellation flag or when the language is not set, even though\nthe language is set. A stale/very large file or an internal tree-sitter error would\ncause an unrecoverable panic instead of a graceful error.","fix":"Replace each `.unwrap()` on `parser.parse(...)` with `.ok_or(\"tree-sitter parse failed\")?`\nand propagate the error up.  Functions that currently return `&mut Self` will need to\nreturn `Result<&mut Self, ...>` or at minimum use `expect` with a descriptive message\nif the intent is that the error is truly impossible.","locations":[{"ref":"src/formatter.rs:66","code":"   66 |         let tree = parser.parse(&content, None).unwrap();","lines":1},{"ref":"src/formatter.rs:131","code":"  131 |         self.tree = self.parser.parse(&self.content, Some(&self.tree)).unwrap();","lines":1},{"ref":"src/formatter.rs:169","code":"  169 |         self.tree = self.parser.parse(&self.content, None).unwrap();","lines":1},{"ref":"src/formatter.rs:203","code":"  203 |         self.tree = self.parser.parse(&self.content, None).unwrap();","lines":1},{"ref":"src/formatter.rs:459","code":"  459 |         self.tree = self.parser.parse(&self.content, Some(&self.tree)).unwrap();","lines":1},{"ref":"src/formatter.rs:501","code":"  501 |         self.tree = self.parser.parse(&self.content, None).unwrap();","lines":1},{"ref":"src/formatter.rs:579","code":"  579 |         self.tree = self.parser.parse(&self.content, Some(&self.tree)).unwrap();","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In `handle_two_blank_line`, after the while loop that walks backward to find a newline, `byte_idx`\ncan be 0 (when the first declaration appears at the very start of the file with no preceding newline).\nThe subsequent condition on lines 690-691 then evaluates `self.content.as_bytes()[byte_idx - 1]` where\n`byte_idx` is 0, causing a usize underflow and an index-out-of-bounds panic in both debug and release builds.","fix":"Add a guard before the condition so the second byte access is only attempted when `byte_idx > 0`:\n\n    if !(byte_idx > 0\n        && self.content.as_bytes()[byte_idx] == b'\\n'\n        && self.content.as_bytes()[byte_idx - 1] == b'\\n')\n    {","locations":[{"ref":"src/formatter.rs:663-691","code":"  663 |                     let mut byte_idx = insert_before.start_byte();\n  664 |                     let mut position = insert_before.start_position();\n  665 |                     position.column = 0;\n  666 |                     while byte_idx > 0 && self.content.as_bytes()[byte_idx] != b'\\n' {\n  667 |                         byte_idx -= 1;\n  668 |                     }\n  669 |                     new_lines_at.push((byte_idx, position));\n  670 |                 }\n  671 |             };\n  672 | \n  673 |         // First we need to find all the places where we should add blank lines.\n  674 |         // We can't modify the content string while tree-sitter is borrowing it, so we\n  675 |         // collect all the positions first, then make changes afterward.\n  676 |         let mut new_lines_at = Vec::new();\n  677 | \n  678 |         for query_str in &queries {\n  679 |             process_query(query_str, &mut new_lines_at);\n  680 |         }\n  681 | \n  682 |         // We sort the positions in reverse order so that when we insert new lines,\n  683 |         // we don't mess up the positions of the other insertions we need to make.\n  684 |         new_lines_at.sort_by(|a, b| b.cmp(a));\n  685 | \n  686 |         for (byte_idx, position) in new_lines_at {\n  687 |             let mut new_end_position = position;\n  688 |             let mut new_end_byte_idx = byte_idx;\n  689 |             // Only add a second blank line if there isn't already one\n  690 |             if !(self.content.as_bytes()[byte_idx] == b'\\n'\n  691 |                 && self.content.as_bytes()[byte_idx - 1] == b'\\n')","lines":29}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In `handle_two_blank_line`, the condition at line 691 reads `self.content.as_bytes()[byte_idx - 1]`. When `byte_idx == 0` (which happens when the first top-level definition starts at byte 0, e.g. a file with no leading blank line or with a leading newline at position 0) AND `content[0] == '\\n'`, the short-circuit for `&&` does not fire (the first condition IS true), so `byte_idx - 1` underflows from 0 to `usize::MAX`, causing an out-of-bounds panic. The while loop on line 666 stops when `byte_idx > 0` is false, leaving `byte_idx == 0`. If the file content starts with `\\n`, the first condition is true and the second is evaluated on `usize::MAX`.","fix":"Guard the second check: `if byte_idx == 0 || !(self.content.as_bytes()[byte_idx] == b'\\n' && self.content.as_bytes()[byte_idx - 1] == b'\\n')`.","locations":[{"ref":"src/formatter.rs:690-691","code":"  690 |             if !(self.content.as_bytes()[byte_idx] == b'\\n'\n  691 |                 && self.content.as_bytes()[byte_idx - 1] == b'\\n')","lines":2}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Direct index `variable_node.children[0]` on line 1038 panics if `variable_statement`\nhas no children in the `GdTree`.  A malformed or partially-parsed source file can\nproduce nodes with zero children.  The same pattern appears for `child.children[0]`\non line 1017 inside `move_annotations` - it is guarded only by `child.grammar_name ==\n\"annotation\"`, not by whether the annotation node actually has children.","fix":"Replace direct index accesses with `.get(0)` and return early / `return None` if the\nresult is `None`:\n    let Some(&first_child_id) = child.children.first() else { return None; };\n    let variable_first_child_id = match variable_node.children.first() {\n        Some(&id) => id,\n        None => continue,\n    };","locations":[{"ref":"src/formatter.rs:1017","code":" 1017 |                             let Some(annotation_name) = &self.nodes[child.children[0]].text else {","lines":1},{"ref":"src/formatter.rs:1038","code":" 1038 |                     let variable_first_child_id = variable_node.children[0];","lines":1}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`regex_replace_all_outside_strings_or_comments` calls `.unwrap()` on\n`descendant_for_byte_range(start_byte, start_byte)` (line 533-535). `descendant_for_byte_range`\nreturns `Option<Node>` and can return `None` when the requested byte offset falls outside the range\nof the root node, for example when the tree-sitter tree is out of sync with the content after\nincremental edits. A `None` result here panics.","fix":"Replace `.unwrap()` with a guard:\n\n    let Some(node) = self.tree.root_node()\n        .descendant_for_byte_range(start_byte, start_byte)\n    else {\n        continue;\n    };","locations":[{"ref":"src/formatter.rs:530-535","code":"  530 |             let old_end_byte = m.end();\n  531 |             let node = self\n  532 |                 .tree\n  533 |                 .root_node()\n  534 |                 .descendant_for_byte_range(start_byte, start_byte)\n  535 |                 .unwrap();","lines":6}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Inside the `process_query` closure in `handle_two_blank_line`, a `Query::new` failure is handled with an unconditional `panic!` rather than propagating an error. If the tree-sitter-gdscript grammar is updated so that any node kind used in the hardcoded query strings no longer exists, this panic will be triggered at runtime for every formatted file. The function signature already returns `&mut Self`, but the enclosing method uses `Result`-returning callers, so the error could be propagated.","fix":"Change the process_query closure to return a `Result`, propagate `Query::new` errors up through `handle_two_blank_line` (change return type to `Result<&mut Self, ...>`), and handle the failure gracefully instead of panicking.","locations":[{"ref":"src/formatter.rs:606-614","code":"  606 |                 let query = match Query::new(\n  607 |                     &tree_sitter::Language::new(tree_sitter_gdscript::LANGUAGE),\n  608 |                     query_str,\n  609 |                 ) {\n  610 |                     Ok(q) => q,\n  611 |                     Err(err) => {\n  612 |                         panic!(\"Failed to create query: {}\", err);\n  613 |                     }\n  614 |                 };","lines":9}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`GdTree::move_annotations` accesses `child.children[0]` without checking whether the annotation node\nhas any children (line 1017). If tree-sitter produces an annotation node with an empty children list\n(possible with malformed or error-recovering input), the index access panics.","fix":"Guard the access: replace `child.children[0]` with `child.children.first()` and handle the `None`\ncase:\n\n    let Some(&first_child_id) = child.children.first() else {\n        return None;\n    };\n    let Some(annotation_name) = &self.nodes[first_child_id].text else {\n        return None;\n    };","locations":[{"ref":"src/formatter.rs:1009-1029","code":" 1009 |                     let annotations_to_move = (0..index)\n 1010 |                         .rev()\n 1011 |                         .map_while(|i| {\n 1012 |                             let child_id = self.nodes[parent_id].children[i];\n 1013 |                             let child = &self.nodes[child_id];\n 1014 |                             if child.grammar_name != \"annotation\" {\n 1015 |                                 return None;\n 1016 |                             }\n 1017 |                             let Some(annotation_name) = &self.nodes[child.children[0]].text else {\n 1018 |                                 return None;\n 1019 |                             };\n 1020 |                             if annotation_name != \"onready\" && annotation_name != \"export\" {\n 1021 |                                 return None;\n 1022 |                             }\n 1023 |                             let parent = &mut self.nodes[parent_id];\n 1024 |                             // When we found one, we remove it from the parent and collect them in a vector\n 1025 |                             let annotation_id = parent.children.remove(i);\n 1026 |                             index -= 1;\n 1027 |                             Some(annotation_id)\n 1028 |                         })\n 1029 |                         .collect::<Vec<_>>();","lines":21}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In `GdTree::move_annotations`, line 1038 performs an unchecked direct index `variable_node.children[0]`. A `variable_statement` node with ERROR recovery in tree-sitter can lack named children, making `.children` empty. `GdTree` only stores named children (line 907 skips anonymous nodes), so any malformed variable statement without a named `name` child causes an index-out-of-bounds panic. The function is called on the input tree (potentially malformed user code) in `validate_formatting`.","fix":"Replace `variable_node.children[0]` with `variable_node.children.first().copied()` and handle the `None` case gracefully (e.g. `continue`).","locations":[{"ref":"src/formatter.rs:1037-1038","code":" 1037 |                     let variable_node = &self.nodes[child_id];\n 1038 |                     let variable_first_child_id = variable_node.children[0];","lines":2}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`io::stdout().flush().unwrap()` in main.rs will panic if stdout flushing fails (e.g., when\nstdout is a broken pipe). This is in the hot path when formatting files.","fix":"Replace with `.map_err(|e| format!(\"Failed to flush stdout: {}\", e))?;` and propagate\nthe error, or at minimum use `.ok()` if flushing is truly best-effort.","locations":[{"ref":"src/main.rs:219","code":"  219 |     io::stdout().flush().unwrap();","lines":1}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In make_release.rs, `io::stdout().flush().expect(\"Failed to flush stdout\")` and\n`io::stdin().read_line(&mut input).expect(\"Failed to read user input\")` will panic\non I/O failure. While this is a dev-only script and panics are somewhat acceptable,\nthe `.expect` calls will produce an abrupt unformatted backtrace rather than the\nclean `print_error_and_exit` path used everywhere else in the same file.","fix":"Use `unwrap_or_else(|e| print_error_and_exit(&format!(\"...\")))` consistently, matching\nthe pattern already used in `run()`.","locations":[{"ref":"src/bin/make_release.rs:13","code":"   13 |     io::stdout().flush().expect(\"Failed to flush stdout\");","lines":1},{"ref":"src/bin/make_release.rs:17","code":"   17 |         .expect(\"Failed to read user input\");","lines":1}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`parser.parse()` returns `Option<Tree>` and can return `None` when parsing times out or fails due\nto resource exhaustion. There are seven `.unwrap()` call sites on this return value across\n`formatter.rs` (lines 66, 131, 169, 187, 203, 459, 501, 579). In practice tree-sitter only returns\n`None` on explicit timeout or cancellation (neither of which is configured here), but the panics are\nunhandled.","fix":"Replace each `.unwrap()` with `ok_or(\"Failed to parse GDScript\")?` and propagate the error, or\nuse `.expect()` with a descriptive message so failures are at least diagnosed clearly instead of\nproducing a bare index-OOB panic.","locations":[{"ref":"src/formatter.rs:65-66","code":"   65 |             .unwrap();\n   66 |         let tree = parser.parse(&content, None).unwrap();","lines":2},{"ref":"src/formatter.rs:131","code":"  131 |         self.tree = self.parser.parse(&self.content, Some(&self.tree)).unwrap();","lines":1},{"ref":"src/formatter.rs:169","code":"  169 |         self.tree = self.parser.parse(&self.content, None).unwrap();","lines":1},{"ref":"src/formatter.rs:187","code":"  187 |         self.tree = self.parser.parse(&self.content, None).unwrap();","lines":1},{"ref":"src/formatter.rs:203","code":"  203 |         self.tree = self.parser.parse(&self.content, None).unwrap();","lines":1},{"ref":"src/formatter.rs:459","code":"  459 |         self.tree = self.parser.parse(&self.content, Some(&self.tree)).unwrap();","lines":1},{"ref":"src/formatter.rs:501","code":"  501 |         self.tree = self.parser.parse(&self.content, None).unwrap();","lines":1},{"ref":"src/formatter.rs:579","code":"  579 |         self.tree = self.parser.parse(&self.content, Some(&self.tree)).unwrap();","lines":1}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"src/main.rs:219 calls `io::stdout().flush().unwrap()`. If stdout is connected to a broken pipe (e.g. the program is started and the receiving process closes stdin before the flush completes), this panics instead of exiting cleanly.","fix":"Replace `.unwrap()` with `.ok()` or handle the error with a graceful exit: `if let Err(e) = io::stdout().flush() { eprintln!(\"...\"); std::process::exit(1); }`","locations":[{"ref":"src/main.rs:219","code":"  219 |     io::stdout().flush().unwrap();","lines":1}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"is_static_method uses unwrap_or(\"\") to silently swallow a UTF-8 decoding error from tree-sitter (line 824). All other callers propagate the error via ?. An encoding error here causes the function to return false (treating the method as non-static), silently misclassifying it rather than surfacing the error.","fix":"Change the signature to return Result<bool, ...>, use ?, and propagate the error. Alternatively accept a pre-extracted &str to avoid re-extraction entirely.","locations":[{"ref":"src/reorder.rs:823-825","code":"  823 | fn is_static_method(node: Node, content: &str) -> bool {\n  824 |     let text = node.utf8_text(content.as_bytes()).unwrap_or(\"\");\n  825 |     text.contains(\"static func\")","lines":3}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"`last_node.start_position().row - 1` on line 633 performs unchecked subtraction on\n`usize`.  `start_position().row` is of type `usize`.  If `last_node` is on row 0\n(i.e., the entire file is a single line and the comment/node is at the very start),\nthis underflows to `usize::MAX`, which means the comparison against\n`last_comment_node.start_position().row` will never match (harmless wrong behaviour)\nbut is still undefined-wrapping-arithmetic under `debug_assertions`.\n\nSimilarly, `m.captures[comment_node_index].node.start_position().row - 1` on line 655\ncan underflow when `comment_node_index` refers to a node on row 0.","fix":"Use saturating_sub(1) or guard with a preceding check:\n    last_node.start_position().row.checked_sub(1).map_or(false, |r| {\n        last_comment_node.start_position().row == r\n    })","locations":[{"ref":"src/formatter.rs:633","code":"  633 |                                 == last_node.start_position().row - 1;","lines":1},{"ref":"src/formatter.rs:655","code":"  655 |                                     == m.captures[comment_node_index].node.start_position().row - 1","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"lint_files_pretty stores per-file issues in a HashMap<String, Vec<_>> and then iterates it for output. HashMap iteration order is non-deterministic, so the file output order changes between runs. lint_files_standard processes files in the deterministic input order (sorted by find_gdscript_files), but the pretty mode does not. This makes --pretty output unreproducible for multi-file linting.","fix":"Replace `HashMap<String, Vec<_>>` with a `Vec<(String, Vec<LintIssue>)>` that preserves the original file iteration order, or sort file_issues.keys() before printing.","locations":[{"ref":"src/linter.rs:186-203","code":"  186 |         let mut file_issues: HashMap<String, Vec<_>> = HashMap::new();\n  187 |         let mut has_issues = false;\n  188 | \n  189 |         for file_path in gdscript_files {\n  190 |             let source_code = fs::read_to_string(file_path).map_err(|error| {\n  191 |                 format!(\"Failed to read file {}: {}\", file_path.display(), error)\n  192 |             })?;\n  193 | \n  194 |             let issues = self.lint(&source_code, &file_path.to_string_lossy())?;\n  195 | \n  196 |             if !issues.is_empty() {\n  197 |                 has_issues = true;\n  198 |                 file_issues.insert(file_path.to_string_lossy().to_string(), issues);\n  199 |             }\n  200 |         }\n  201 | \n  202 |         // Print pretty output grouped by file and line\n  203 |         let mut file_iter = file_issues.iter().peekable();","lines":18}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`parse_ignore_comment` in ignore_patterns.rs searches patterns in order\n[\"gdlint-ignore-next-line\", \"gdlint-ignore-line\", \"gdlint-ignore\"], but the check in\n`parse_ignore_patterns` first tests `comment.contains(\"gdlint-ignore-next-line\")`, then\n`comment.contains(\"gdlint-ignore-line\") || comment.contains(\"gdlint-ignore\")`. The\n`parse_ignore_comment` function returns `Some(rules)` on the first pattern it finds in\nthe comment text, which is correct. However `parse_ignore_patterns` re-checks the raw\ncomment string to decide whether to apply to the current or next line. Because\n\"gdlint-ignore-next-line\" contains \"gdlint-ignore\" as a substring, the `else if`\nbranch for \"gdlint-ignore\" can never fire for a \"gdlint-ignore-next-line\" comment\n(the outer `if` eats it). But critically: a comment containing \"gdlint-ignore-line\"\nalso contains \"gdlint-ignore\" as a substring, so the order of checks matters. The\ncurrent order is correct (more-specific check first), but the dual-parse approach\nis fragile - if someone reorders the conditions the behavior silently breaks.","fix":"Parse the directive kind once (in `parse_ignore_comment` or a shared helper returning\nan enum) and return it alongside the rule set. Eliminates the duplicate substring search\nand the fragile ordering dependency.","locations":[{"ref":"src/linter/ignore_patterns.rs:26-34","code":"   26 |                 if comment.contains(\"gdlint-ignore-next-line\") {\n   27 |                     // Apply to the next line\n   28 |                     let target_line = line_number + 1;\n   29 |                     ignore_map.entry(target_line).or_default().extend(rules);\n   30 |                 } else if comment.contains(\"gdlint-ignore-line\")\n   31 |                     || comment.contains(\"gdlint-ignore\")\n   32 |                 {\n   33 |                     // Apply to the current line\n   34 |                     ignore_map.entry(line_number).or_default().extend(rules);","lines":9},{"ref":"src/linter/ignore_patterns.rs:46-50","code":"   46 |     let patterns = [\n   47 |         \"gdlint-ignore-next-line\",\n   48 |         \"gdlint-ignore-line\",\n   49 |         \"gdlint-ignore\",\n   50 |     ];","lines":5}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"VariableNameRule emits the rule name \"load-variable-name\" (src/linter/rules/variable_name.rs:57) but that name is not registered in ALL_RULES. This means: (1) validate_rule_names rejects --disable load-variable-name as an invalid rule, so users cannot disable the check through the CLI, and (2) get_all_rule_names() / --list-rules never shows it. The rule exists in practice but is invisible to the rule management system.","fix":"Either add a separate RuleDefinition entry for \"load-variable-name\" in ALL_RULES, or merge it into the existing \"variable-name\" entry so it can be disabled through normal means.","locations":[{"ref":"src/linter/rules/variable_name.rs:57","code":"   57 |                         \"load-variable-name\".to_string(),","lines":1},{"ref":"src/linter/rules.rs:77-150","code":"   77 | pub const ALL_RULES: &[RuleDefinition] = &[\n   78 |     RuleDefinition {\n   79 |         name: \"duplicated-load\",\n   80 |         create: |_config| {\n   81 |             Box::new(DuplicatedLoadRule {\n   82 |                 load_paths: std::collections::HashMap::new(),\n   83 |             })\n   84 |         },\n   85 |     },\n   86 |     RuleDefinition {\n   87 |         name: \"standalone-expression\",\n   88 |         create: |_config| Box::new(StandaloneExpressionRule),\n   89 |     },\n   90 |     RuleDefinition {\n   91 |         name: \"unnecessary-pass\",\n   92 |         create: |_config| Box::new(UnnecessaryPassRule),\n   93 |     },\n   94 |     RuleDefinition {\n   95 |         name: \"unused-argument\",\n   96 |         create: |_config| Box::new(UnusedArgumentRule),\n   97 |     },\n   98 |     RuleDefinition {\n   99 |         name: \"comparison-with-itself\",\n  100 |         create: |_config| Box::new(ComparisonWithItselfRule),\n  101 |     },\n  102 |     RuleDefinition {\n  103 |         name: \"private-access\",\n  104 |         create: |_config| Box::new(PrivateAccessRule),\n  105 |     },\n  106 |     RuleDefinition {\n  107 |         name: \"max-line-length\",\n  108 |         create: |config| Box::new(MaxLineLengthRule::new(config)),\n  109 |     },\n  110 |     RuleDefinition {\n  111 |         name: \"no-else-return\",\n  112 |         create: |_config| Box::new(NoElseReturnRule),\n  113 |     },\n  114 |     RuleDefinition {\n  115 |         name: \"function-name\",\n  116 |         create: |_config| Box::new(FunctionNameRule),\n  117 |     },\n  118 |     RuleDefinition {\n  119 |         name: \"class-name\",\n  120 |         create: |_config| Box::new(ClassNameRule),\n  121 |     },\n  122 |     RuleDefinition {\n  123 |         name: \"signal-name\",\n  124 |         create: |_config| Box::new(SignalNameRule),\n  125 |     },\n  126 |     RuleDefinition {\n  127 |         name: \"variable-name\",\n  128 |         create: |_config| Box::new(VariableNameRule),\n  129 |     },\n  130 |     RuleDefinition {\n  131 |         name: \"function-argument-name\",\n  132 |         create: |_config| Box::new(FunctionArgumentNameRule),\n  133 |     },\n  134 |     RuleDefinition {\n  135 |         name: \"loop-variable-name\",\n  136 |         create: |_config| Box::new(LoopVariableNameRule),\n  137 |     },\n  138 |     RuleDefinition {\n  139 |         name: \"enum-name\",\n  140 |         create: |_config| Box::new(EnumNameRule),\n  141 |     },\n  142 |     RuleDefinition {\n  143 |         name: \"enum-member-name\",\n  144 |         create: |_config| Box::new(EnumMemberNameRule),\n  145 |     },\n  146 |     RuleDefinition {\n  147 |         name: \"constant-name\",\n  148 |         create: |_config| Box::new(ConstantNameRule),\n  149 |     },\n  150 | ];","lines":74}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`extract_variable_name` strips the prefix `\"var \"` from the node text. For static variables the node\ntext begins with `\"static var \"`, so `strip_prefix(\"var \")` fails and the function returns `\"unknown_var\"`.\nEvery static variable therefore gets the name `\"unknown_var\"` in its `GDScriptTokenKind::StaticVariable`\nvariant, making all static variables appear identical to the sort and to the safe-mode signature check.","fix":"Strip the `\"static \"` prefix before attempting the `\"var \"` strip:\n\n    let text = text.trim_start_matches(\"static \").trim_start();\n    let Some(name) = text.strip_prefix(\"var \") else {\n        return Ok(\"unknown_var\".to_string());\n    };","locations":[{"ref":"src/reorder.rs:780-792","code":"  780 | fn extract_variable_name(node: Node, content: &str) -> Result<String, Box<dyn std::error::Error>> {\n  781 |     let text = node.utf8_text(content.as_bytes())?;\n  782 | \n  783 |     let Some(name) = text.strip_prefix(\"var \") else {\n  784 |         return Ok(\"unknown_var\".to_string());\n  785 |     };\n  786 | \n  787 |     if let Some((name, _)) = name.split_once(|c: char| c == ':' || c == '=' || c.is_whitespace()) {\n  788 |         return Ok(name.trim().to_string());\n  789 |     }\n  790 | \n  791 |     Ok(name.trim().to_string())\n  792 | }","lines":13}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`extract_function_name` strips the prefix `\"func \"` from the node text. For static functions the\ntree-sitter node text begins with `\"static func \"`, so `strip_prefix(\"func \")` fails and the function\nreturns `\"unknown_func\"`. All static functions end up with the name `\"unknown_func\"` in their\n`GDScriptTokenKind::Method` variant. This breaks deterministic reordering (all static functions compare\nequal by name) and, in safe mode, corrupts the signature comparison so any file with multiple static\nfunctions will always fail the safe-mode check.","fix":"Strip the `\"static \"` prefix first, then strip `\"func \"`:\n\n    let text = text.trim_start_matches(\"static \").trim_start();\n    let Some(name) = text.strip_prefix(\"func \") else {\n        return Ok(\"unknown_func\".to_string());\n    };","locations":[{"ref":"src/reorder.rs:795-806","code":"  795 | fn extract_function_name(node: Node, content: &str) -> Result<String, Box<dyn std::error::Error>> {\n  796 |     let text = node.utf8_text(content.as_bytes())?;\n  797 | \n  798 |     let Some(name) = text.strip_prefix(\"func \") else {\n  799 |         return Ok(\"unknown_func\".to_string());\n  800 |     };\n  801 | \n  802 |     if let Some((name, _)) = name.split_once('(') {\n  803 |         Ok(name.trim().to_string())\n  804 |     } else {\n  805 |         Ok(\"unknown_func\".to_string())\n  806 |     }","lines":12}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The `regex_replace_all_outside_strings_or_comments` function only checks whether the\n*start byte* of a regex match falls inside a string or comment node.  If a regex match\nstarts outside a string but extends into one (e.g. the dangling-comma pattern\n`([^\\n\\r])\\n\\s+,` matching text immediately before a string literal on the same line),\nthe string's content can be modified.  The node lookup is:\n    `descendant_for_byte_range(start_byte, start_byte)` (a zero-length range).\nThis finds the node that contains only the start byte, missing cases where the match\nspans a boundary between non-string and string.","fix":"Check the node for *both* the start byte and end byte of the match, and skip the\nreplacement if either endpoint falls inside a string or comment:\n    let end_node = self.tree.root_node()\n        .descendant_for_byte_range(old_end_byte - 1, old_end_byte - 1)\n        .unwrap();\n    if is_string_or_comment(node) || is_string_or_comment(end_node) { continue; }","locations":[{"ref":"src/formatter.rs:531-545","code":"  531 |             let node = self\n  532 |                 .tree\n  533 |                 .root_node()\n  534 |                 .descendant_for_byte_range(start_byte, start_byte)\n  535 |                 .unwrap();\n  536 |             // String nodes may also contain escape_sequence nodes.  These are\n  537 |             // found when a backslash is present within a string.\n  538 |             // Comment nodes contain docstrings (##) and regular comments (#).\n  539 |             // We skip all of these to avoid modifying content inside strings or comments.\n  540 |             if node.kind() == \"string\"\n  541 |                 || node.kind() == \"escape_sequence\"\n  542 |                 || node.kind() == \"comment\"\n  543 |             {\n  544 |                 continue;\n  545 |             }","lines":15}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`regex_replace_all_outside_strings_or_comments` checks `node.kind() == \"string\"`, `\"escape_sequence\"`, and `\"comment\"` to skip replacements inside string literals and comments (lines 540-543). It does NOT check for `\"string_name\"`, which is GDScript's `&\"...\"` string-name syntax. This means regex replacements (e.g. `fix_trailing_spaces`, `fix_dangling_semicolons`) could modify the content of `string_name` literals. `string_name` is a separate named node type in the tree-sitter-gdscript grammar with the same structure as `string`.","fix":"Add `|| node.kind() == \"string_name\"` to the guard condition on line 540.","locations":[{"ref":"src/formatter.rs:540-544","code":"  540 |             if node.kind() == \"string\"\n  541 |                 || node.kind() == \"escape_sequence\"\n  542 |                 || node.kind() == \"comment\"\n  543 |             {\n  544 |                 continue;","lines":5}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`regex_replace_all_outside_strings_or_comments` only checks whether a matched node is\nof kind `\"string\"`, `\"escape_sequence\"`, or `\"comment\"`, but does NOT walk up the\nancestor chain.  A token whose kind is, say, `\"identifier\"` that lives *inside* a\nmultiline string literal will have the ancestor `\"string\"` but its own kind will be\nsomething else.  As a result, regex replacements can silently corrupt the content of\nmultiline strings.","fix":"After finding the leaf node, walk its ancestors:\n    fn is_inside_string_or_comment(mut node: tree_sitter::Node) -> bool {\n        loop {\n            match node.kind() {\n                \"string\" | \"escape_sequence\" | \"comment\" => return true,\n                _ => {}\n            }\n            match node.parent() {\n                Some(p) => node = p,\n                None => return false,\n            }\n        }\n    }\nUse `is_inside_string_or_comment(node)` as the skip condition.","locations":[{"ref":"src/formatter.rs:540-545","code":"  540 |             if node.kind() == \"string\"\n  541 |                 || node.kind() == \"escape_sequence\"\n  542 |                 || node.kind() == \"comment\"\n  543 |             {\n  544 |                 continue;\n  545 |             }","lines":6}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`extract_inline_extends` uses `original_text.find(\"extends\")` which performs a plain substring search.\nAny `class_name` token whose text contains the letters \"extends\" inside a word -- for example\n`class_name ExtendsManager` or `class_name RendererExtensions` -- would incorrectly match, returning a\nspurious `\"Extends::ExtendsManager\"` (or similar) signature. In safe mode this creates a phantom entry\nin the signature diff and causes `ensure_top_level_tokens_match` to falsely report a mismatch after\nevery formatting pass on such a file.","fix":"Match the `extends` keyword with a word boundary instead. A simple approach is to parse the text\nfor `\" extends \"` (with surrounding whitespace) or use a regex. Alternatively, use the tree-sitter\nnode directly: traverse the children of the `class_name_statement` node to find an `extends_statement`\nchild, which is how the AST already encodes inline extends.","locations":[{"ref":"src/formatter.rs:857-875","code":"  857 | fn inline_extends_signature(token_kind: &GDScriptTokenKind, original_text: &str) -> Option<String> {\n  858 |     match token_kind {\n  859 |         GDScriptTokenKind::ClassName(_) => {\n  860 |             let extends_part = extract_inline_extends(original_text)?;\n  861 |             Some(format!(\"Extends::{extends_part}\"))\n  862 |         }\n  863 |         _ => None,\n  864 |     }\n  865 | }\n  866 | \n  867 | fn extract_inline_extends(original_text: &str) -> Option<String> {\n  868 |     let extends_index = original_text.find(\"extends\")?;\n  869 |     let extends_slice = &original_text[extends_index..];\n  870 |     let trimmed = extends_slice.trim();\n  871 |     if trimmed.is_empty() {\n  872 |         None\n  873 |     } else {\n  874 |         Some(trimmed.to_string())\n  875 |     }","lines":19}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`extract_inline_extends` (line 867-876) returns `Some(trimmed)` where `trimmed` is\n`extends_slice.trim()`.  `extends_slice` starts at the word \"extends\" (not after it),\nso `trimmed` will always start with the string \"extends\" itself - the function never\nextracts just the parent class name.  As a result, the generated signature key is\n`\"Extends::extends SomeClass\"` instead of `\"Extends::SomeClass\"`, which happens to\nbe consistent between original and formatted code (both calls go through the same\nfunction), so safe-mode comparison still passes.  However the key is misleading and\nany future change that extracts the name differently from only one side will silently\nbreak safe-mode detection.","fix":"Slice past the \"extends\" keyword and any following whitespace:\n    let rest = &original_text[extends_index + \"extends\".len()..];\n    let trimmed = rest.trim();\n    if trimmed.is_empty() { return None; }\n    Some(trimmed.to_string())","locations":[{"ref":"src/formatter.rs:867-876","code":"  867 | fn extract_inline_extends(original_text: &str) -> Option<String> {\n  868 |     let extends_index = original_text.find(\"extends\")?;\n  869 |     let extends_slice = &original_text[extends_index..];\n  870 |     let trimmed = extends_slice.trim();\n  871 |     if trimmed.is_empty() {\n  872 |         None\n  873 |     } else {\n  874 |         Some(trimmed.to_string())\n  875 |     }\n  876 | }","lines":10}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`lint_files_pretty` collects file paths into a `HashMap<String, Vec<LintIssue>>` and then iterates\nit with `.iter()`. HashMap iteration order is not guaranteed in Rust (it is randomized per-process).\nThis means the pretty-formatted output lists files in a different, non-deterministic order on every\nrun, which makes automated diffing of lint output unreliable and confuses users comparing two runs.\nThe standard `lint_files_standard` mode processes files in the order they were discovered (already\nsorted), but the pretty mode silently drops that ordering.","fix":"Use a `BTreeMap<String, Vec<LintIssue>>` instead of `HashMap`, or sort the keys before printing:\n\n    let mut file_keys: Vec<&String> = file_issues.keys().collect();\n    file_keys.sort();\n    for file_path in file_keys { ... }","locations":[{"ref":"src/linter.rs:180-253","code":"  180 |     fn lint_files_pretty(\n  181 |         &mut self,\n  182 |         gdscript_files: &[PathBuf],\n  183 |         with_colors: bool,\n  184 |     ) -> Result<bool, Box<dyn std::error::Error>> {\n  185 |         use std::collections::HashMap;\n  186 |         let mut file_issues: HashMap<String, Vec<_>> = HashMap::new();\n  187 |         let mut has_issues = false;\n  188 | \n  189 |         for file_path in gdscript_files {\n  190 |             let source_code = fs::read_to_string(file_path).map_err(|error| {\n  191 |                 format!(\"Failed to read file {}: {}\", file_path.display(), error)\n  192 |             })?;\n  193 | \n  194 |             let issues = self.lint(&source_code, &file_path.to_string_lossy())?;\n  195 | \n  196 |             if !issues.is_empty() {\n  197 |                 has_issues = true;\n  198 |                 file_issues.insert(file_path.to_string_lossy().to_string(), issues);\n  199 |             }\n  200 |         }\n  201 | \n  202 |         // Print pretty output grouped by file and line\n  203 |         let mut file_iter = file_issues.iter().peekable();\n  204 |         while let Some((file_path, issues)) = file_iter.next() {\n  205 |             let bold = if with_colors { \"\\x1b[1m\" } else { \"\" };\n  206 |             let reset = if with_colors { \"\\x1b[0m\" } else { \"\" };\n  207 | \n  208 |             println!(\"{}{}{}\", bold, file_path, reset);\n  209 | \n  210 |             // Group issues by line number\n  211 |             let mut line_issues: HashMap<usize, Vec<_>> = HashMap::new();\n  212 |             for issue in issues {\n  213 |                 line_issues.entry(issue.line).or_default().push(issue);\n  214 |             }\n  215 | \n  216 |             // Sort by line number and print\n  217 |             let mut sorted_lines: Vec<_> = line_issues.keys().collect();\n  218 |             sorted_lines.sort();\n  219 | \n  220 |             for (i, &line_num) in sorted_lines.iter().enumerate() {\n  221 |                 if let Some(line_issues) = line_issues.get(line_num) {\n  222 |                     println!(\"    {}:{}\", file_path, line_num);\n  223 |                     for issue in line_issues {\n  224 |                         let (severity_str, severity_color) = match issue.severity {\n  225 |                             LintSeverity::Error => (\"ERROR\", \"\\x1b[31m\"),  // Red\n  226 |                             LintSeverity::Warning => (\"WARN\", \"\\x1b[33m\"), // Yellow\n  227 |                         };\n  228 | \n  229 |                         if with_colors {\n  230 |                             println!(\n  231 |                                 \"        {}{}\\x1b[0m: `{}`\",\n  232 |                                 severity_color, severity_str, issue.rule\n  233 |                             );\n  234 |                         } else {\n  235 |                             println!(\"        {}: `{}`\", severity_str, issue.rule);\n  236 |                         }\n  237 |                         println!(\"        {}\", issue.message);\n  238 |                     }\n  239 | \n  240 |                     // Add newline between line groups (except for the last line group)\n  241 |                     if i < sorted_lines.len() - 1 {\n  242 |                         println!();\n  243 |                     }\n  244 |                 }\n  245 |             }\n  246 | \n  247 |             // Add separator between files (except for the last file)\n  248 |             if file_iter.peek().is_some() {\n  249 |                 println!(\"\\n{}\", \"-\".repeat(60));\n  250 |                 println!();\n  251 |             }\n  252 |         }\n  253 | ","lines":74}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`parse_ignore_comment` returns `Some(HashSet::new())` (empty set) when no rule names\nfollow the directive keyword. This empty set is documented as \"ignore all\". However,\n`should_ignore_rule` checks `ignored_rules.is_empty()` to mean \"ignore all\". This\nsemantic is invisible to callers: an empty HashSet from a normal HashSet::new() is\nindistinguishable from the \"ignore all\" sentinel. If any code path = node.child(0)\n   24 |         {\n   25 |             let function_name = get_node_text(&function_node, source_code);\n   26 |             return function_name == \"preload\";\n   27 |         }\n   28 | \n   29 |         false\n   30 |     }","lines":10},{"ref":"src/linter/rules/constant_name.rs:52","code":"   52 |                 // For all load/preload constants, check load naming rules","lines":1},{"ref":"src/linter/rules/variable_name.rs:17-25","code":"   17 |     fn is_load_call(&self, node: &Node, source_code: &str) -> bool {\n   18 |         if node.kind() == \"call\"\n   19 |             && let Some(function_node) = node.child(0)\n   20 |         {\n   21 |             let function_name = get_node_text(&function_node, source_code);\n   22 |             return function_name == \"load\" || function_name == \"preload\";\n   23 |         }\n   24 |         false\n   25 |     }","lines":9}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`no_else_return.rs`: The `all_branches_return` flag is only set to `false` when an\n`elif` body does NOT end with a return. But if an `elif` body DOES end with a return,\n`all_branches_return` stays `true`. However, if the first `elif` does not end with\nreturn (`all_branches_return = false`), a subsequent `elif` that does end with return\ncannot set `all_branches_return` back to `true`. So the logic of checking whether all\nbranches return is correct in that direction.\n\nThe real bug: `all_branches_return` starts as `if_body_ends_with_return`. If the `if`\nbody does NOT end with return (`all_branches_return = false`), but a subsequent `elif`\nbody DOES end with return, the `else` after it is NOT flagged, even though all branches\nactually do return. The flag can only go from `true` to `false`, never the reverse.\nThis means the rule under-reports in some multi-elif chains. While conservative (no\nfalse positives), the rule silently misses real `else-after-return` cases.","fix":"Track per-elif whether it ends with return and accumulate the \"all branches return\"\nstatus correctly by checking each branch individually, not just flip to false.","locations":[{"ref":"src/linter/rules/no_else_return.rs:50","code":"   50 |         let mut all_branches_return = if_body_ends_with_return;","lines":1},{"ref":"src/linter/rules/no_else_return.rs:57-71","code":"   57 |                     if if_body_ends_with_return {\n   58 |                         let (line, column) = get_line_column(&child_node);\n   59 |                         issues.push(LintIssue::new(\n   60 |                             line,\n   61 |                             column,\n   62 |                             \"no-else-return\".to_string(),\n   63 |                             LintSeverity::Warning,\n   64 |                             \"Unnecessary 'elif' after 'if' block that ends with 'return'. Use 'if' instead\".to_string(),\n   65 |                         ));\n   66 |                     }\n   67 | \n   68 |                     if let Some(elif_body) = child_node.child_by_field_name(\"body\")\n   69 |                         && !self.body_ends_with_return(&elif_body, source_code)\n   70 |                     {\n   71 |                         all_branches_return = false;","lines":15}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`unused_argument.rs`: `is_identifier_used_in_node` walks the entire function body AST\nlooking for any `identifier` node whose text matches the parameter name. This means if\na parameter is named `x` and the function body contains `var x = 5` (a local variable\nshadowing the parameter), the rule will report the argument as used even though the\nouter `x` (the parameter) is never actually referenced. This produces false negatives.\n\nConversely, if the parameter name matches a string literal content (unlikely via AST\nsince it checks node kind \"identifier\") this ered_code`\nsees an `Unknown` token after an `InnerClass` (different group), it calls the `needs_spacing`\nbranch for a group transition. Since `is_function` is false and `is_inner_class` is false,\nthe else branch (line 947) emits only a single `\\n`. But the preceding inner class token\nalready ends with `\\n`, producing just one blank line - the same as between two variables,\nnot the expected two-newline separation that unknown/unsupported top-level syntax deserves.\nAdditionally, an Unknown token followed by another Unknown token would have `previous_kind\n== current_token_type == TokenKind::Method`, causing the `is_function` check (line 923)\nto fire and emit `\\n\\n`, which is incorrect for non-function unknown nodes.","fix":"Add a `TokenKind::Unknown` variant to the `TokenKind` enum and map\n`GDScriptTokenKind::Unknown` to it. In `build_reordered_code`, handle `Unknown` explicitly\nso consecutive unknown nodes do not receive function-style double spacing.","locations":[{"ref":"src/reorder.rs:225","code":"  225 |         GDScriptTokenKind::Unknown(_) => TokenKind::Method,","lines":1},{"ref":"src/reorder.rs:907-937","code":"  907 |         let current_token_type = get_token_kind(&current_token.token_kind);\n  908 |         let is_function = matches!(current_token.token_kind, GDScriptTokenKind::Method(_, _, _));\n  909 | \n  910 |         let is_inner_class = matches!(\n  911 |             current_token.token_kind,\n  912 |             GDScriptTokenKind::InnerClass(_, _)\n  913 |         );\n  914 |         // If true, we need to add spacing before this element, either single or\n  915 |         // double line breaks depending on the context.\n  916 |         let needs_spacing = if output.is_empty() {\n  917 |             false\n  918 |         } else if let Some(previous_kind) = previous_token_kind {\n  919 |             if previous_kind != current_token_type {\n  920 |                 // We're leaving one group of tokens for another (like previous\n  921 |                 // was variables, now we're seeing a function) -> needs spacing\n  922 |                 true\n  923 |             } else if is_function {\n  924 |                 // Between functions we always want two line breaks\n  925 |                 true\n  926 |             } else if is_inner_class && previous_kind == TokenKind::InnerClass {\n  927 |                 // Between inner classes, same as functions\n  928 |                 true\n  929 |             } else {\n  930 |                 // If we reach here we're seeing the same kind of token as\n  931 |                 // before, like two regular variables in a row or two signals in\n  932 |                 // a row - we don't need extra spacing\n  933 |                 false\n  934 |             }\n  935 |         } else {\n  936 |             false\n  937 |         };","lines":31}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"region_end_comment is a single Option<String> rather than a Vec, so if multiple #endregion nodes appear without a matching function (neither a preceding Method element), the Option is overwritten at line 419 and only the last #endregion survives. Earlier ones are silently dropped.","fix":"Change region_end_comment to Vec<String>, push instead of assigning, and iterate over the vec when attaching to the last element at lines 569-581.","locations":[{"ref":"src/reorder.rs:350","code":"  350 |     let mut region_end_comment = None;","lines":1},{"ref":"src/reorder.rs:416-420","code":"  416 |                 if !attached {\n  417 |                     // We didn't find a function to attach to, so we save this\n  418 |                     // to handle down below\n  419 |                     region_end_comment = Some(text.clone());\n  420 |                 }","lines":5}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Class docstrings are silently dropped when a file has a class_name statement but no extends statement and no other declarations follow. The class_name_statement branch (line 449) intentionally skips emitting the Docstring element, saving it for extends. But if no extends_statement and no subsequent declaration exists (e.g. a file with only 'class_name Foo' and ## comments), class_docstring_attached stays false and class_docstring_comments is never emitted anywhere.","fix":"After the main loop, if !class_docstring_attached and !class_docstring_comments.is_empty(), emit the Docstring element (the same way the _ branch does it at lines 517-527).","locations":[{"ref":"src/reorder.rs:449-476","code":"  449 |             \"class_name_statement\" => {\n  450 |                 if let Some(element) = reorderable_element {\n  451 |                     // Don't attach class docstring to class_name, save it for extends\n  452 |                     let mut attachments: Vec<&PendingAttachment> =\n  453 |                         pending_annotations.iter().collect();\n  454 |                     attachments.extend(pending_comments.iter());\n  455 |                     attachments.sort_by_key(|attachment| attachment.start_byte);\n  456 |                     let non_docstring_comments: Vec<String> = attachments\n  457 |                         .into_iter()\n  458 |                         .filter_map(|attachment| {\n  459 |                             if !class_docstring_comments.contains(&attachment.text) {\n  460 |                                 Some(attachment.text.clone())\n  461 |                             } else {\n  462 |                                 None\n  463 |                             }\n  464 |                         })\n  465 |                         .collect();\n  466 |                     elements.push(GDScriptTokensWithComments {\n  467 |                         token_kind: element,\n  468 |                         attached_comments: non_docstring_comments,\n  469 |                         trailing_comments: Vec::new(),\n  470 |                         original_text: text,\n  471 |                         start_byte: node.start_byte(),\n  472 |                         end_byte: node.end_byte(),\n  473 |                     });\n  474 |                     pending_comments.clear();\n  475 |                     pending_annotations.clear();\n  476 |                 }","lines":28},{"ref":"src/reorder.rs:513-527","code":"  513 |                     if !class_docstring_attached\n  514 |                         && !class_docstring_comments.is_empty()\n  515 |                         && !found_extends_declaration\n  516 |                     {\n  517 |                         let docstring_text = class_docstring_comments.join(\"\\n\");\n  518 |                         elements.push(GDScriptTokensWithComments {\n  519 |                             token_kind: GDScriptTokenKind::Docstring(docstring_text.clone()),\n  520 |                             attached_comments: Vec::new(),\n  521 |                             trailing_comments: Vec::new(),\n  522 |                             original_text: docstring_text,\n  523 |                             start_byte: 0,\n  524 |                             end_byte: 0,\n  525 |                         });\n  526 |                         class_docstring_attached = true;\n  527 |                     }","lines":15}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `classify_element`, the check `text.contains(\"extends\")` on a `class_name_statement`\nnode is too broad. If a class name itself contains the lowercase substring \"extends\"\n(e.g., `class_name PreextendsHelper`), the node text `\"class_name PreextendsHelper\"` would\nmatch the condition and `splitn(2, \"extends\")` would truncate the stored name to `\"class_name Pre\"`.\nThe reconstructed `GDScriptTokenKind::ClassName` would carry a truncated name.\nWhile this does not corrupt the output text (original_text is used for reconstruction),\nit pollutes the internal classification with a wrong name that could affect future\nlogic relying on the stored name.","fix":"Use a word-boundary approach: check for \"extends \" (with trailing space) or check that\n\"extends\" is preceded by whitespace. For example:\n  if text.contains(\" extends \") || text.ends_with(\" extends\") {\nOr parse the node's children via the tree-sitter API instead of text matching.","locations":[{"ref":"src/reorder.rs:628-637","code":"  628 |             if text.contains(\"extends\") {\n  629 |                 let parts: Vec<&str> = text.splitn(2, \"extends\").collect();\n  630 |                 if parts.len() == 2 {\n  631 |                     // We'll handle this case in the extraction logic\n  632 |                     Ok(Some(GDScriptTokenKind::ClassName(\n  633 |                         parts[0].trim().to_string(),\n  634 |                     )))\n  635 |                 } else {\n  636 |                     Ok(Some(GDScriptTokenKind::ClassName(text.to_string())))\n  637 |                 }","lines":10}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`classify_variable_statement` detects annotations with plain string searches\n(`text.contains(\"@export\")`, `text.contains(\"@onready\")`, `text.contains(\"static var\")`).\nThe `text` variable is the full source text of the `variable_statement` node, which includes the\nvariable's initializer. A variable whose default value is a string literal containing one of those\ntokens -- e.g. `var hint = \"@export var x = 1\"` -- would be misclassified as an export variable.\nSimilarly, `text.contains(\"static var\")` would misclassify a variable whose string value contains\nthat phrase.","fix":"Classify variables by inspecting the tree-sitter AST rather than the raw text. Walk the node's\nchildren to look for `annotation` child nodes with specific names, and check for the `static`\nkeyword as a named sibling or child, rather than searching the raw source string.","locations":[{"ref":"src/reorder.rs:696-731","code":"  696 | fn classify_variable_statement(\n  697 |     node: Node,\n  698 |     content: &str,\n  699 | ) -> Result<Option<GDScriptTokenKind>, Box<dyn std::error::Error>> {\n  700 |     let text = node.utf8_text(content.as_bytes())?;\n  701 |     let variable_name = extract_variable_name(node, content)?;\n  702 |     let is_private = variable_name.starts_with('_');\n  703 | \n  704 |     // Look for annotations in the node's text string, which we use to sort the\n  705 |     // variables\n  706 |     let has_export = text.contains(\"@export\");\n  707 |     let has_onready = text.contains(\"@onready\");\n  708 |     let has_static = text.contains(\"static var\");\n  709 | \n  710 |     if has_export {\n  711 |         Ok(Some(GDScriptTokenKind::ExportVariable(\n  712 |             variable_name,\n  713 |             is_private,\n  714 |         )))\n  715 |     } else if has_onready {\n  716 |         Ok(Some(GDScriptTokenKind::OnReadyVariable(\n  717 |             variable_name,\n  718 |             is_private,\n  719 |         )))\n  720 |     } else if has_static {\n  721 |         Ok(Some(GDScriptTokenKind::StaticVariable(\n  722 |             variable_name,\n  723 |             is_private,\n  724 |         )))\n  725 |     } else {\n  726 |         Ok(Some(GDScriptTokenKind::RegularVariable(\n  727 |             variable_name,\n  728 |             is_private,\n  729 |         )))\n  730 |     }\n  731 | }","lines":36}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The benchmark only warms up the short-file path (10 iterations, line 29-31) before measuring short-file performance, but there is no warmup for the long-file path. The first ITERATIONS runs of the long file include cold OS page-cache and any one-time initialisation costs, making long-file timings slightly less accurate than short-file timings.","fix":"Add a warmup loop for the long file (e.g. 5 iterations) immediately before the long-file timing block.","locations":[{"ref":"src/bin/benchmark.rs:28-47","code":"   28 |     println!(\"Running short file warmup (10 iterations)\");\n   29 |     for _ in 0..10 {\n   30 |         let _ = format_gdscript_with_config(&short_content, &config)?;\n   31 |     }\n   32 | \n   33 |     println!(\"Benchmarking short file ({} iterations)\", ITERATIONS);\n   34 |     let mut start = Instant::now();\n   35 |     for _ in 0..ITERATIONS {\n   36 |         let _ = format_gdscript_with_config(&short_content, &config)?;\n   37 |     }\n   38 |     let duration_short_file = start.elapsed();\n   39 | \n   40 |     // Benchmark long file\n   41 |     println!(\"Benchmarking long file ({} iterations)...\", ITERATIONS);\n   42 |     start = Instant::now();\n   43 |     for _ in 0..ITERATIONS {\n   44 |         let _ = format_gdscript_with_config(&long_content, &config)?;\n   45 |     }\n   46 |     let long_time = start.elapsed();\n   47 | ","lines":20}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In make_release.rs, the Cargo.toml version replacement uses a plain string replace on the full file text (line 141-143). It replaces every occurrence of `version = \"<current_version>\"` including any dependency entry that happens to share the same version string as the package itself. While unlikely with the current pinned dependencies, any future coincidental version match would silently corrupt the dependency entry.","fix":"Replace only the first occurrence, or use a regex anchored to the `[package]` section, e.g. replace only a line that starts with `^version = ` at the top of the file.","locations":[{"ref":"src/bin/make_release.rs:141-144","code":"  141 |     let updated_cargo_toml = cargo_toml.replace(\n  142 |         &format!(\"version = \\\"{}\\\"\", current_version),\n  143 |         &format!(\"version = \\\"{}\\\"\", new_version),\n  144 |     );","lines":4}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The `add_newlines_after_extends_statement` regex (line 226) only matches extends names matching `[a-zA-Z0-9]+` or `\".*?\"`. GDScript 4 allows dotted type names in extends (e.g. `extends Node.SubType`), which contain `.` and are therefore not matched by `[a-zA-Z0-9]+`. When a file uses dotted extends, the post-formatting blank line insertion silently does not run, leaving the formatting potentially incomplete (no blank line after the extends statement).","fix":"Expand the `extends_name` capture group to `([a-zA-Z0-9_.]+|\".*?\")` to match dotted names.","locations":[{"ref":"src/formatter.rs:225-230","code":"  225 |         let re = RegexBuilder::new(\n  226 |             r#\"(?P<extends_line>^extends )(?P<extends_name>([a-zA-Z0-9]+|\".*?\"))\\n+((?P<doc>(?:^##.*\\n)+)(?:\\z|\\n))?\\n*(?P<EOF>\\z)?\"#,\n  227 |         )\n  228 |         .multi_line(true)\n  229 |         .build()\n  230 |         .expect(\"regex should compile\");","lines":6}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`extract_inline_extends` (line 868) uses a naive `original_text.find(\"extends\")` to locate the extends clause inside a `class_name_statement`. This substring search can match `\"extends\"` that appears inside an identifier (e.g. a class named `class_name ExtendsHelper`) or inside a trailing comment (`class_name Foo # extends something`). A false match produces a spurious `Extends::extends ...` signature entry in the safe-mode comparison, which could cause safe mode to incorrectly reject a valid formatting.","fix":"Use a word-boundary-aware search (e.g. a regex or a check that `extends` is preceded and followed by whitespace/end-of-string) rather than plain substring search.","locations":[{"ref":"src/formatter.rs:867-875","code":"  867 | fn extract_inline_extends(original_text: &str) -> Option<String> {\n  868 |     let extends_index = original_text.find(\"extends\")?;\n  869 |     let extends_slice = &original_text[extends_index..];\n  870 |     let trimmed = extends_slice.trim();\n  871 |     if trimmed.is_empty() {\n  872 |         None\n  873 |     } else {\n  874 |         Some(trimmed.to_string())\n  875 |     }","lines":9}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `move_annotations`, the `annotations_to_move` iterator uses `map_while` (lines 1011-1029), which stops at the first element that does not match. This means if annotations appear in the order `@export @other_annotation @onready var x`, the backward scan finds `@onready` (moves it), then hits `@other_annotation` which is neither `onready` nor `export`, stops, and never collects `@export`. Only the trailing consecutive run of onready/export annotations is moved; any export annotation preceding a different annotation type is silently left behind, producing a structurally different tree that may cause `validate_formatting` to fail.","fix":"Use `filter_map` instead of `map_while` over the reversed range to collect ALL onready/export annotations regardless of interspersed other annotations, or scan the full range and collect non-consecutively.","locations":[{"ref":"src/formatter.rs:1009-1029","code":" 1009 |                     let annotations_to_move = (0..index)\n 1010 |                         .rev()\n 1011 |                         .map_while(|i| {\n 1012 |                             let child_id = self.nodes[parent_id].children[i];\n 1013 |                             let child = &self.nodes[child_id];\n 1014 |                             if child.grammar_name != \"annotation\" {\n 1015 |                                 return None;\n 1016 |                             }\n 1017 |                             let Some(annotation_name) = &self.nodes[child.children[0]].text else {\n 1018 |                                 return None;\n 1019 |                             };\n 1020 |                             if annotation_name != \"onready\" && annotation_name != \"export\" {\n 1021 |                                 return None;\n 1022 |                             }\n 1023 |                             let parent = &mut self.nodes[parent_id];\n 1024 |                             // When we found one, we remove it from the parent and collect them in a vector\n 1025 |                             let annotation_id = parent.children.remove(i);\n 1026 |                             index -= 1;\n 1027 |                             Some(annotation_id)\n 1028 |                         })\n 1029 |                         .collect::<Vec<_>>();","lines":21}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`calculate_end_position` (lines 1187-1197) counts bytes rather than UTF-8 characters\nfor `column`.  Multi-byte UTF-8 sequences (e.g. emoji in comments or strings) cause\n`column` to be counted in bytes while tree-sitter uses character counts for column\npositions.  The result is a mismatch between the `InputEdit` column value and\ntree-sitter's internal column representation, which can corrupt incremental re-parse\nafter regex replacements on files containing non-ASCII characters.","fix":"Use `str::chars()` or the Unicode scalar value count instead of iterating over bytes:\n\n    fn calculate_end_position(mut start: Point, slice: &str) -> Point {\n        for ch in slice.chars() {\n            if ch == '\\n' {\n                start.row += 1;\n                start.column = 0;\n            } else {\n                start.column += ch.len_utf8();\n            }\n        }\n        start\n    }\n\nNote: tree-sitter's column is byte-based in some versions; verify the exact semantics\nof the tree-sitter version in use before changing.","locations":[{"ref":"src/formatter.rs:1187-1197","code":" 1187 | fn calculate_end_position(mut start: Point, slice: &str) -> Point {\n 1188 |     for b in slice.as_bytes() {\n 1189 |         if *b == b'\\n' {\n 1190 |             start.row += 1;\n 1191 |             start.column = 0;\n 1192 |         } else {\n 1193 |             start.column += 1;\n 1194 |         }\n 1195 |     }\n 1196 |     start\n 1197 | }","lines":11}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`LintIssue::format` builds the output string with the format pattern\n`\"{}:{}:{}:{}: {}\"` using `(file_path, self.line, self.rule, severity_str, self.message)`.\nThe `self.column` field -- which the struct stores and the `LintIssue::new` constructor accepts --\nis silently omitted from the formatted output. Tools and editors that parse standard lint output\n(e.g., `file:line:col:severity:message`) will be unable to navigate to the exact column.","fix":"Include `self.column` in the format string:\n\n    format!(\n        \"{}:{}:{}:{}:{}: {}\",\n        file_path, self.line, self.column, self.rule, severity_str, self.message\n    )","locations":[{"ref":"src/linter.rs:50-59","code":"   50 |     pub fn format(&self, file_path: &str) -> String {\n   51 |         let severity_str = match self.severity {\n   52 |             LintSeverity::Error => \"error\",\n   53 |             LintSeverity::Warning => \"warning\",\n   54 |         };\n   55 |         format!(\n   56 |             \"{}:{}:{}:{}: {}\",\n   57 |             file_path, self.line, self.rule, severity_str, self.message\n   58 |         )\n   59 |     }","lines":10}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In ignore_patterns.rs, the `#` character is searched for using plain string search (line.find('#')). If a GDScript string literal contains the exact substring `# gdlint-ignore-next-line <rule>` (e.g. a help string), parse_ignore_pat
