                    variable_name\n   50 |                     ),\n   51 |                 ));\n   52 |             }","lines":13}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`private_access.rs` checks whether the object in an attribute access is literally the\nstring \"super\" or \"self\" by comparing text. If the variable holding a reference is\nnamed `self_ref` or `super_node`, it would be correctly flagged. However, if GDScript\ncode uses `self` stored in a variable with a different name, the access would be\nflagged even if it is within the same class. The real case is: `get_node_text` returns\nthe raw identifier text \"self\" or \"super\". This is correct for direct `self.` and\n`super.` accesses, but the rule cannot detect indirect self-access through aliases.\nThis is a known limitation (false positives for aliased self), not a crash, but worth\nnoting. More importantly: the rule checks `method_node.kind() == \"attribute_call\"` but\nthe AST uses this path only for `obj.method()` call syntax. Direct property access like\n`obj._field` would use the `identifier` branch. The code handles both branches, which\nis correct.","fix":"Document the known limitation that aliased self-access will produce false positives.\nNo structural fix needed unless the rule is extended to track type information.","locations":[{"ref":"src/linter/rules/private_access.rs:22-54","code":"   22 |                 if method_node.kind() == \"attribute_call\" {\n   23 |                     if let Some(method_name_node) = method_node.child(0) {\n   24 |                         let method_name = get_node_text(&method_name_node, source_code);\n   25 |                         if method_name.starts_with('_')\n   26 |                             && object_name != \"super\"\n   27 |                             && object_name != \"self\"\n   28 |                         {\n   29 |                             let (line, column) = get le via `--disable load-variable-name`.\n2. The rule name in lint output does not match any documented rule.\n3. `validate_rule_names` would reject \"load-variable-name\" if a user tried to ignore it.","fix":"Either register \"load-variable-name\" as a separate entry in ALL_RULES, or reuse the\n\"variable-name\" rule name in the issue emitted for load variables.","locations":[{"ref":"src/linter/rules/variable_name.rs:57-64","code":"   57 |                         \"load-variable-name\".to_string(),\n   58 |                         LintSeverity::Error,\n   59 |                         format!(\n   60 |                             \"Variable name '{}' should be in PascalCase, snake_case or _private_snake_case format\",\n   61 |                             name\n   62 |                         ),\n   63 |                     ));\n   64 |                 }","lines":8},{"ref":"src/linter/rules.rs:127-130","code":"  127 |         name: \"variable-name\",\n  128 |         create: |_config| Box::new(VariableNameRule),\n  129 |     },\n  130 |     RuleDefinition {","lines":4}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Two built-in virtual methods share priority 9: _unhandled_key_input and _gui_input. Since sort_by is stable, their relative order is preserved from the input, but the intent of the priority table (unique explicit ordering) is violated. All other methods have unique priorities.","fix":"Assign _gui_input a distinct priority (e.g. 10) and shift all following priorities up by one, adjusting the u8 values accordingly.","locations":[{"ref":"src/reorder.rs:25-26","code":"   25 |         \"_unhandled_key_input\" => 9,\n   26 |         \"_gui_input\" => 9,","lines":2}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`_unhandled_key_input` and `_gui_input` share the same priority value 9 in\n`get_builtin_virtual_priority` (lines 25-26). When both are present in a file, the sort\nis stable so their relative order is preserved from the source - but this makes the\nordering non-deterministic across different source files that define these methods in\ndifferent orders. It's unclear whether this sharing is intentional (they have equal\nGodot style-guide priority) or an accidental copy-paste. The docstring says \"assigns\npriority values\" implying each method should have a unique one.","fix":"If `_gui_input` intentionally has equal priority to `_unhandled_key_input`, add a comment\nexplaining why. If it should have a distinct priority (e.g. 10, shifting `_draw` to 11, etc.),\nassign the correct value and update the downstream numbers accordingly.","locations":[{"ref":"src/reorder.rs:25-26","code":"   25 |         \"_unhandled_key_input\" => 9,\n   26 |         \"_gui_input\" => 9,","lines":2}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"GDScriptTokenKind::Unknown(_) is mapped to TokenKind::Method in get_token_kind (line 225). Unknown elements therefore receive the same double-newline spacing as functions, which is incorrect: an unknown top-level element such as an unrecognised declaration will always get two blank lines before it even if it appears adjacent to other variables.","fix":"Either add a TokenKind::Unknown variant to preserve original spacing intent, or map Unknown to TokenKind::Header so it at most gets one blank line separator.","locations":[{"ref":"src/reorder.rs:224-226","code":"  224 |         GDScriptTokenKind::InnerClass(_, _) => TokenKind::InnerClass,\n  225 |         GDScriptTokenKind::Unknown(_) => TokenKind::Method,\n  226 |     }","lines":3}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"classify_element text-searches on class_name_statement for the substring \"extends\" to handle a legacy GDScript 3 combined declaration (\"class_name Foo extends Bar\"). The GDScript 4 grammar always produces separate class_name_statement and extends_statement nodes, so the splitn branch at line 629 is dead code in practice. Additionally, contains(\"extends\") would false-match a class named e.g. class_name MyExtends_Helper.","fix":"Remove the text-search branch. For GDScript 4, class_name and extends are always separate nodes. If GDScript 3 compatibility is needed, use tree-sitter child node inspection instead of string searching.","locations":[{"ref":"src/reorder.rs:625-640","code":"  625 |         \"class_name_statement\" => {\n  626 |             // If the class_name statement also has an extends in it, we split\n  627 |             // it into two separate elements on two lines.\n  628 |             if text.contains(\"extends\") {\n  629 |                 let parts: Vec<&str> = text.splitn(2, \"extends\").collect();\n  630 |                 if parts.len() == 2 {\n  631 |                     // We'll handle this case in the extraction logic\n  632 |                     Ok(Some(GDScriptTokenKind::ClassName(\n  633 |                         parts[0].trim().to_string(),\n  634 |                     )))\n  635 |                 } else {\n  636 |                     Ok(Some(GDScriptTokenKind::ClassName(text.to_string())))\n  637 |                 }\n  638 |             } else {\n  639 |                 Ok(Some(GDScriptTokenKind::ClassName(text.to_string())))\n  640 |             }","lines":16}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"_static_init is always flagged as is_private=true because its name starts with '_' (line 665). _static_init is a Godot engine-reserved static initializer, not a user private method. The incorrect flag does not affect sorting order in practice (StaticInit has a unique priority 12) but is semantically wrong for any consumer reading token_kind.is_private().","fix":"Special-case _static_init: set is_private = false when name == \"_static_init\", or document that the is_private flag is intentionally set based on naming convention without exceptions.","locations":[{"ref":"src/reorder.rs:665-668","code":"  665 |             let is_private = name.starts_with('_');\n  666 | \n  667 |             let method_type = if name == \"_static_init\" {\n  668 |                 MethodType::StaticInit","lines":4}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `build_reordered_code`, transitioning from any non-Method, non-InnerClass group to\nan InnerClass only emits a single `\\n` (line 948), not the two newlines (`\\n\\n`) that\nthe style guide requires around class definitions.\n\nThe `needs_spacing` check (line 919) correctly identifies this as a group transition and\nsets it to true. Then the spacing insertion block (lines 939-949) checks `is_function`\n(false) then `is_inner_class && previous == Method` (false) then\n`is_inner_class && previous == InnerClass` (false) and falls through to the `else` at\nline 947 that emits only one `\\n`.\n\nFor example, a file that has only exported variables followed by inner classes (no methods)\nwould produce only a single blank line before the inner class block instead of the\nexpected double-blank-line separation.","fix":"Add a case for `is_inner_class` without the previous-kind restriction:\n  } else if is_inner_class {\n      output.push_str(\"\\n\\n\");\n  } else {\n      output.push('\\n');\n  }\nThe existing two `is_inner_class` sub-cases can be removed as they become redundant.","locations":[{"ref":"src/reorder.rs:939-949","code":"  939 |         if needs_spacing {\n  940 |             #[allow(clippy::if_same_then_else)]\n  941 |             if is_function {\n  942 |                 output.push_str(\"\\n\\n\");\n  943 |             } else if is_inner_class && previous_token_kind == Some(TokenKind::Method) {\n  944 |                 output.push_str(\"\\n\\n\");\n  945 |             } else if is_inner_class && previous_token_kind == Some(TokenKind::InnerClass) {\n  946 |                 output.push_str(\"\\n\\n\");\n  947 |             } else {\n  948 |                 output.push('\\n');\n  949 |             }","lines":11}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`find_gdscript_files` calls `std::process::exit(1)` when no .gd files are found\n(main.rs:394-395). This bypasses Rust's normal error propagation and prevents any\ncleanup (e.g., Drop implementations, deferred writes). The function signature returns\n`Result`, so it should return an `Err` and let `main` decide whether to exit. The\ncaller (`main`) already maps errors to `Box<dyn std::error::Error>`.","fix":"Replace `std::process::exit(1)` with:\n`return Err(\"No GDScript files found...\".into());`\nand let `main`'s error handler print and exit.","locations":[{"ref":"src/main.rs:390-395","code":"  390 |     if gdscript_file_paths.is_empty() {\n  391 |         eprintln!(\n  392 |             \"Error: No GDScript files found in the arguments provided. Please provide at least one .gd file or directory containing .gd files.\"\n  393 |         );\n  394 |         std::process::exit(1);\n  395 |     }","lines":6}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `make_release.rs`, the `cargo_toml.replace(...)` call on line 141 replaces the\nfirst occurrence of `version = \"<current>\"` in Cargo.toml. If any dependency pin in\nthe file happens to use the exact same version string (e.g., a dep pinned to the same\nversion as the package), that line would also be modified, corrupting Cargo.toml.","fix":"Limit the replacement to the `[package]` section only, or use a regex that anchors\nthe match (e.g., ensuring the line starts with `version = ` at the beginning of the\npackage section). Alternatively, use a TOML parser.","locations":[{"ref":"src/bin/make_release.rs:141-144","code":"  141 |     let updated_cargo_toml = cargo_toml.replace(\n  142 |         &format!(\"version = \\\"{}\\\"\", current_version),\n  143 |         &format!(\"version = \\\"{}\\\"\", new_version),\n  144 |     );","lines":4}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`fix_nested_parenthesized_lambda_indentation` (lines 315-462) splits the entire file\ncontent into a `Vec<String>` on line 339-343, where each line is a freshly allocated\n`String` (one allocation per line).  For a 10 000-line file this allocates 10 000\n`String` objects, then joins them back with `lines.join(\"\\n\")` at line 458 creating\nyet another large allocation.  This function is called on every format pass.\nA `Vec<&str>` with targeted in-place replacement of only modified lines would\navoid the bulk of these allocations.","fix":"Use `Vec<&str>` pointing into the original content for unmodified lines, and replace\nmodified lines with `Cow<str>` or a secondary buffer.  Only convert modified lines to\nowned Strings.","locations":[{"ref":"src/formatter.rs:339-343","code":"  339 |         let mut lines: Vec<String> = self\n  340 |             .content\n  341 |             .split('\\n')\n  342 |             .map(|line| line.to_string())\n  343 |             .collect();","lines":5},{"ref":"src/formatter.rs:458","code":"  458 |         self.content = lines.join(\"\\n\");","lines":1}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`handle_two_blank_line` inserts newlines into the content string by calling `String::insert` at\narbitrary byte positions (lines 695, 700). Each `String::insert` call is O(n) in the length of the\nstring because all bytes after the insertion point must be shifted. The function may perform O(k)\nsuch insertions for k function/class pairs, resulting in O(k*n) total work for a file of size n.\nFor large files with many definitions this is noticeably slow.","fix":"Collect all the byte positions that need a newline, sort them in ascending order, then rebuild the\noutput string in a single O(n) pass, copying slices from the original content and inserting the\nnewlines between them. This avoids shifting content repeatedly.","locations":[{"ref":"src/formatter.rs:686-713","code":"  686 |         for (byte_idx, position) in new_lines_at {\n  687 |             let mut new_end_position = position;\n  688 |             let mut new_end_byte_idx = byte_idx;\n  689 |             // Only add a second blank line if there isn't already one\n  690 |             if !(self.content.as_bytes()[byte_idx] == b'\\n'\n  691 |                 && self.content.as_bytes()[byte_idx - 1] == b'\\n')\n  692 |             {\n  693 |                 new_end_position.row += 1;\n  694 |                 new_end_byte_idx += 1;\n  695 |                 self.content.insert(byte_idx, '\\n');\n  696 |             }\n  697 |             // Add the first blank line\n  698 |             new_end_position.row += 1;\n  699 |             new_end_byte_idx += 1;\n  700 |             self.content.insert(byte_idx, '\\n');\n  701 | \n  702 |             // Update the tree sitter parse tree to reflect our changes so that any\n  703 |             // future processing will work with the correct positions\n  704 |             self.tree.edit(&tree_sitter::InputEdit {\n  705 |                 start_byte: byte_idx,\n  706 |                 old_end_byte: byte_idx,\n  707 |                 new_end_byte: new_end_byte_idx,\n  708 |                 start_position: position,\n  709 |                 old_end_position: position,\n  710 |                 new_end_position,\n  711 |             });\n  712 |         }\n  713 |         self","lines":28}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"MaxLineLengthRule clones the entire LinterConfig (which includes a HashSet<String> of disabled rules) just to access a single usize field (max_line_length). The clone is done once per file, but the stored HashSet is never read by this rule.","fix":"Change the struct to `pub struct MaxLineLengthRule { max_line_length: usize }` and update `new` to store only `config.max_line_length`.","locations":[{"ref":"src/linter/rules/max_line_length.rs:4-13","code":"    4 | pub struct MaxLineLengthRule {\n    5 |     config: LinterConfig,\n    6 | }\n    7 | \n    8 | impl MaxLineLengthRule {\n    9 |     pub fn new(config: &LinterConfig) -> Self {\n   10 |         Self {\n   11 |             config: config.clone(),\n   12 |         }\n   13 |     }","lines":10}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"UnusedArgumentRule.is_identifier_used_in_node performs a full recursive tree walk for every function parameter separately. For a function with N parameters this is O(N * tree_size). A single pass collecting all used identifiers first would be O(tree_size + N).","fix":"Collect all identifier texts from the body into a HashSet<&str> in one traversal, then check each parameter name against that set.","locations":[{"ref":"src/linter/rules/unused_argument.rs:12-45","code":"   12 |     fn is_identifier_used_in_node(&self, node: &Node, identifier: &str, source_code: &str) -> bool {\n   13 |         let mut cursor = node.walk();\n   14 | \n   15 |         fn check_usage(\n   16 |             cursor: &mut tree_sitter::TreeCursor,\n   17 |             identifier: &str,\n   18 |             source_code: &str,\n   19 |         ) -> bool {\n   20 |             let node = cursor.node();\n   21 | \n   22 |             if node.kind() == \"identifier\" {\n   23 |                 let node_text = get_node_text(&node, source_code);\n   24 |                 if node_text == identifier {\n   25 |                     return true;\n   26 |                 }\n   27 |             }\n   28 | \n   29 |             if cursor.goto_first_child() {\n   30 |                 loop {\n   31 |                     if check_usage(cursor, identifier, source_code) {\n   32 |                         return true;\n   33 |                     }\n   34 |                     if !cursor.goto_next_sibling() {\n   35 |                         break;\n   36 |                     }\n   37 |                 }\n   38 |                 cursor.goto_parent();\n   39 |             }\n   40 | \n   41 |             false\n   42 |         }\n   43 | \n   44 |         check_usage(&mut cursor, identifier, source_code)\n   45 |     }","lines":34},{"ref":"src/linter/rules/unused_argument.rs:88-101","code":"   88 |         if let Some(body_node) = node.child_by_field_name(\"body\") {\n   89 |             for (param_name, param_node) in parameters {\n   90 |                 if !self.is_identifier_used_in_node(&body_node, &param_name, source_code) {\n   91 |                     let (line, column) = get_line_column(&param_node);\n   92 |                     issues.push(LintIssue::new(\n   93 |                         line,\n   94 |                         column,\n   95 |                         \"unused-argument\".to_string(),\n   96 |                         LintSeverity::Warning,\n   97 |                         format!(\"Function argument '{}' is unused. Consider removing it or prefixing with '_'\", param_name),\n   98 |                     ));\n   99 |                 }\n  100 |             }\n  101 |         }","lines":14}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In benchmark.rs the mutable `start` variable is declared once and reused for all four benchmark phases (lines 34, 42, 58, 68). While not incorrect, reusing a single variable across four unrelated timings makes the code harder to read and more fragile - a future insertion of code between phases might accidentally time the wrong interval.","fix":"Use a fresh `let start = Instant::now()` binding at the start of each benchmark phase instead of reassigning the same `mut start`.","locations":[{"ref":"src/bin/benchmark.rs:34-72","code":"   34 |     let mut start = Instant::now();\n   35 |     for _ in 0..ITERATIONS {\n   36 |         let _ = format_gdscript_with_config(&short_content, &config)?;\n   37 |     }\n   38 |     let duration_short_file = start.elapsed();\n   39 | \n   40 |     // Benchmark long file\n   41 |     println!(\"Benchmarking long file ({} iterations)...\", ITERATIONS);\n   42 |     start = Instant::now();\n   43 |     for _ in 0..ITERATIONS {\n   44 |         let _ = format_gdscript_with_config(&long_content, &config)?;\n   45 |     }\n   46 |     let long_time = start.elapsed();\n   47 | \n   48 |     // Benchmark with safe mode enabled\n   49 |     let safe_config = FormatterConfig {\n   50 |         safe: true,\n   51 |         ..config\n   52 |     };\n   53 | \n   54 |     println!(\n   55 |         \"Benchmarking short file with safe mode ({} iterations)...\",\n   56 |         ITERATIONS\n   57 |     );\n   58 |     start = Instant::now();\n   59 |     for _ in 0..ITERATIONS {\n   60 |         let _ = format_gdscript_with_config(&short_content, &safe_config)?;\n   61 |     }\n   62 |     let duration_short_file_safe = start.elapsed();\n   63 | \n   64 |     println!(\n   65 |         \"Benchmarking long file with safe mode ({} iterations)...\",\n   66 |         ITERATIONS\n   67 |     );\n   68 |     start = Instant::now();\n   69 |     for _ in 0..ITERATIONS {\n   70 |         let _ = format_gdscript_with_config(&long_content, &safe_config)?;\n   71 |     }\n   72 |     let long_time_safe = start.elapsed();","lines":39}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`fix_nested_parenthesized_lambda_indentation` splits the entire content into `Vec<String>` on line\n338-343, operates on the lines, then joins them back on line 458. Each `line.to_string()` call is a\nheap allocation, so for a 1000-line file this creates 1000 small `String` objects and then drops\nthem all. While this runs only when the content contains lambda nodes, on large files with many\nlambdas the allocation count is proportional to the file size.","fix":"Work with byte slices and offsets into the original content string rather than converting each line\nto an owned `String`. Alternatively, collect into `Vec<&str>` (referencing into `self.content`)\nand only allocate for the lines that actually need modification.","locations":[{"ref":"src/formatter.rs:338-343","code":"  338 | \n  339 |         let mut lines: Vec<String> = self\n  340 |             .content\n  341 |             .split('\\n')\n  342 |             .map(|line| line.to_string())\n  343 |             .collect();","lines":6}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`regex_replace_all_outside_strings_or_comments` calls `self.parser.parse(...)` on line\n579 after every single regex substitution, even when no replacements were actually made\n(the early-return on line 516-518 catches the zero-matches case, but not the case\nwhere all matches were skipped because they were inside strings/comments).  An\nincremental re-parse triggered with no real changes wastes cycles.","fix":"Track whether any replacement was actually applied (a boolean flag set inside the loop\nwhen a replacement is accepted) and skip `self.tree.edit` / `self.parser.parse` if the\nflag is false.","locations":[{"ref":"src/formatter.rs:576-579","code":"  576 |         for edit in edits {\n  577 |             self.tree.edit(&edit);\n  578 |         }\n  579 |         self.tree = self.parser.parse(&self.content, Some(&self.tree)).unwrap();","lines":4}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Inside `handle_two_blank_line`, the `process_query` closure calls `Query::new(...)` (lines 606-613) on every invocation, which compiles the query string against the grammar each time. This closure is invoked twice per call to `handle_two_blank_line` (once per query in `queries`), meaning two `Query` objects are compiled on every single format operation. These queries are static strings and could be compiled once.","fix":"Move the `Query::new` calls outside the per-format path, e.g. as `OnceLock<Query>` statics or by passing pre-built `Query` objects into the closure.","locations":[{"ref":"src/formatter.rs:604-614","code":"  604 |         let process_query =\n  605 |             |query_str: &str, new_lines_at: &mut Vec<(usize, tree_sitter::Point)>| {\n  606 |                 let query = match Query::new(\n  607 |                     &tree_sitter::Language::new(tree_sitter_gdscript::LANGUAGE),\n  608 |                     query_str,\n  609 |                 ) {\n  610 |                     Ok(q) => q,\n  611 |                     Err(err) => {\n  612 |                         panic!(\"Failed to create query: {}\", err);\n  613 |                     }\n  614 |                 };","lines":11}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`handle_two_blank_line` calls `String::insert(byte_idx, '\\n')` (lines 695 and 700) in\na loop.  `String::insert` is O(n) because it must shift all bytes after the insertion\npoint.  For a file with many function definitions this loop can run many times, making\nthe total complexity O(k*n) where k is the number of insertion points.  The positions\nare processed in reverse order (sorted descending on line 684), which limits damage,\nbut each individual insert is still O(n).  For very large files this is measurable.","fix":"Collect all insertion points in reverse order (already done), then rebuild the string\nin a single pass: iterate through the original bytes, inserting the required newlines\nat each tracked offset using a pre-allocated output buffer.","locations":[{"ref":"src/formatter.rs:684-712","code":"  684 |         new_lines_at.sort_by(|a, b| b.cmp(a));\n  685 | \n  686 |         for (byte_idx, position) in new_lines_at {\n  687 |             let mut new_end_position = position;\n  688 |             let mut new_end_byte_idx = byte_idx;\n  689 |             // Only add a second blank line if there isn't already one\n  690 |             if !(self.content.as_bytes()[byte_idx] == b'\\n'\n  691 |                 && self.content.as_bytes()[byte_idx - 1] == b'\\n')\n  692 |             {\n  693 |                 new_end_position.row += 1;\n  694 |                 new_end_byte_idx += 1;\n  695 |                 self.content.insert(byte_idx, '\\n');\n  696 |             }\n  697 |             // Add the first blank line\n  698 |             new_end_position.row += 1;\n  699 |             new_end_byte_idx += 1;\n  700 |             self.content.insert(byte_idx, '\\n');\n  701 | \n  702 |             // Update the tree sitter parse tree to reflect our changes so that any\n  703 |             // future processing will work with the correct positions\n  704 |             self.tree.edit(&tree_sitter::InputEdit {\n  705 |                 start_byte: byte_idx,\n  706 |                 old_end_byte: byte_idx,\n  707 |                 new_end_byte: new_end_byte_idx,\n  708 |                 start_position: position,\n  709 |                 old_end_position: position,\n  710 |                 new_end_position,\n  711 |             });\n  712 |         }","lines":29}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `lint_files_pretty` (linter.rs:186), `file_issues` is a `HashMap<String, Vec<_>>`.\nThe file path string is inserted as a key via `.to_string()`. Then later, the map is\niterated and the path is used for both display and as a key for `line_issues.get()`.\nThe iteration order of `HashMap` is random, so the output order of files in pretty mode\nis non-deterministic across runs. This is inconsistent with `lint_files_standard` which\nprocesses files in the order they were passed in.","fix":"Collect into a `Vec<(String, Vec<LintIssue>)>` preserving insertion order, or sort the\nfile_issues before printing. This makes pretty output deterministic.","locations":[{"ref":"src/linter.rs:186-254","code":"  186 |         let mut file_issues: HashMap<String, Vec<_>> = HashMap::new();\n  187 |         let mut has_issues = false;\n  188 | \n  189 |         for file_path in gdscript_files {\n  190 |             let source_code = fs::read_to_string(file_path).map_err(|error| {\n  191 |                 format!(\"Failed to read file {}: {}\", file_path.display(), error)\n  192 |             })?;\n  193 | \n  194 |             let issues = self.lint(&source_code, &file_path.to_string_lossy())?;\n  195 | \n  196 |             if !issues.is_empty() {\n  197 |                 has_issues = true;\n  198 |                 file_issues.insert(file_path.to_string_lossy().to_string(), issues);\n  199 |             }\n  200 |         }\n  201 | \n  202 |         // Print pretty output grouped by file and line\n  203 |         let mut file_iter = file_issues.iter().peekable();\n  204 |         while let Some((file_path, issues)) = file_iter.next() {\n  205 |             let bold = if with_colors { \"\\x1b[1m\" } else { \"\" };\n  206 |             let reset = if with_colors { \"\\x1b[0m\" } else { \"\" };\n  207 | \n  208 |             println!(\"{}{}{}\", bold, file_path, reset);\n  209 | \n  210 |             // Group issues by line number\n  211 |             let mut line_issues: HashMap<usize, Vec<_>> = HashMap::new();\n  212 |             for issue in issues {\n  213 |                 line_issues.entry(issue.line).or_default().push(issue);\n  214 |             }\n  215 | \n  216 |             // Sort by line number and print\n  217 |             let mut sorted_lines: Vec<_> = line_issues.keys().collect();\n  218 |             sorted_lines.sort();\n  219 | \n  220 |             for (i, &line_num) in sorted_lines.iter().enumerate() {\n  221 |                 if let Some(line_issues) = line_issues.get(line_num) {\n  222 |                     println!(\"    {}:{}\", file_path, line_num);\n  223 |                     for issue in line_issues {\n  224 |                         let (severity_str, severity_color) = match issue.severity {\n  225 |                             LintSeverity::Error => (\"ERROR\", \"\\x1b[31m\"),  // Red\n  226 |                             LintSeverity::Warning => (\"WARN\", \"\\x1b[33m\"), // Yellow\n  227 |                         };\n  228 | \n  229 |                         if with_colors {\n  230 |                             println!(\n  231 |                                 \"        {}{}\\x1b[0m: `{}`\",\n  232 |                                 severity_color, severity_str, issue.rule\n  233 |                             );\n  234 |                         } else {\n  235 |                             println!(\"        {}: `{}`\", severity_str, issue.rule);\n  236 |                         }\n  237 |                         println!(\"        {}\", issue.message);\n  238 |                     }\n  239 | \n  240 |                     // Add newline between line groups (except for the last line group)\n  241 |                     if i < sorted_lines.len() - 1 {\n  242 |                         println!();\n  243 |                     }\n  244 |                 }\n  245 |             }\n  246 | \n  247 |             // Add separator between files (except for the last file)\n  248 |             if file_iter.peek().is_some() {\n  249 |                 println!(\"\\n{}\", \"-\".repeat(60));\n  250 |                 println!();\n  251 |             }\n  252 |         }\n  253 | \n  254 |         Ok(has_issues)","lines":69}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`MaxLineLengthRule` stores a full clone of `LinterConfig` just to access\n`max_line_length: usize`. The clone happens once per linting run but copies the entire\n`LinterConfig` struct (including a `HashSet<String>`) unnecessarily.","fix":"Store only the needed field: replace `config: LinterConfig` with\n`max_line_length: usize` and set it from `config.max_line_length` in `new()`.","locations":[{"ref":"src/linter/rules/max_line_length.rs:4-14","code":"    4 | pub struct MaxLineLengthRule {\n    5 |     config: LinterConfig,\n    6 | }\n    7 | \n    8 | impl MaxLineLengthRule {\n    9 |     pub fn new(config: &LinterConfig) -> Self {\n   10 |         Self {\n   11 |             config: config.clone(),\n   12 |         }\n   13 |     }\n   14 | }","lines":11}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Each top-level node's text is stored and cloned multiple times:\n1. Stored as `String` in `nodes_top_level_definitions` (line 263).\n2. Cloned again into `classified_elements` (line 337) via `text.clone()`.\n3. Used as `classified.text` in the main loop and moved into element structs.\nFor large functions (hundreds or thousands of lines), each GDScript top-level function\nbody is fully copied into memory twice before being placed in the output elements.\nWith `rayon` parallel processing in main.rs, multiple large files are processed\nsimultaneously, multiplying peak memory usage.","fix":"Merge the two passes (docstring collection and classification) into a single pass over\n`nodes_top_level_definitions`, or store text only once and reference it via slices\ninto the original `content` string (using byte offsets already available from tree-sitter\nnodes) rather than allocating new Strings for each element.","locations":[{"ref":"src/reorder.rs:260-264","code":"  260 |     let mut nodes_top_level_definitions = Vec::new();\n  261 |     for child in root.children(&mut cursor) {\n  262 |         let text = child.utf8_text(content.as_bytes())?;\n  263 |         nodes_top_level_definitions.push((child, text.to_string()));\n  264 |     }","lines":5},{"ref":"src/reorder.rs:325-338","code":"  325 |     let mut classified_elements = Vec::new();\n  326 |     // Here we associate comments and annotations with the next declaration. We\n  327 |     // loop through the node tree from top to bottom, collecting comments and\n  328 |     // annotations until we hit a declaration, at which point we attach the\n  329 |     // collected comments/annotations to that declaration.\n  330 |     for (node, text) in &nodes_top_level_definitions {\n  331 |         let is_before_class_declaration = node.start_byte() < first_class_declaration_byte;\n  332 |         let reorderable_element =\n  333 |             classify_element(*node, text, content, is_before_class_declaration)?;\n  334 |         classified_elements.push(ClassifiedElement {\n  335 |             node: *node,\n  336 |             text: text.clone(),\n  337 |             reorderable_element,\n  338 |         });","lines":14}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`class_docstring_comments_rows.contains(&node.start_position().row)` (line 360) is an\nO(n) linear scan called for every comment node in the file during the main classification\nloop. For files with many comments and long class docstrings this is O(comments *\ndocstring_rows). While the comment in the code acknowledges this (\"may look inefficient\"),\nthe fix is straightforward.","fix":"Replace the Vec with a HashSet<usize> for `class_docstring_comments_rows`. The set is\npopulated only once (lines 293-294 in the docstring-collection loop) and used only for\nmembership tests, so a HashSet is a direct drop-in that reduces the per-comment cost to O(1).","locations":[{"ref":"src/reorder.rs:360","code":"  360 |                 if class_docstring_comments_rows.contains(&node.start_position().row) {","lines":1}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"For function_definition nodes, extract_function_name (line 663) calls node.utf8_text() internally, then is_static_method (line 664) calls node.utf8_text() a second time. Two identical UTF-8 extractions on the same node per function.","fix":"Extract the text once in classify_element and pass it to both extract_function_name and is_static_method, or inline is_static_method into classify_element using the already-available text variable.","locations":[{"ref":"src/reorder.rs:663-664","code":"  663 |             let name = extract_function_name(node, content)?;\n  664 |             let is_static = is_static_method(node, content);","lines":2},{"ref":"src/reorder.rs:795-796","code":"  795 | fn extract_function_name(node: Node, content: &str) -> Result<String, Box<dyn std::error::Error>> {\n  796 |     let text = node.utf8_text(content.as_bytes())?;","lines":2},{"ref":"src/reorder.rs:823-824","code":"  823 | fn is_static_method(node: Node, content: &str) -> bool {\n  824 |     let text = node.utf8_text(content.as_bytes()).unwrap_or(\"\");","lines":2}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"classify_variable_statement calls node.utf8_text() at line 700 to get the text, then calls extract_variable_name(node, content) at line 701, which calls node.utf8_text() again internally at line 781. Two UTF-8 text extractions on the same tree-sitter node for every variable statement.","fix":"Accept the already-extracted text as a &str parameter in extract_variable_name (and the other extract_* helpers) rather than re-extracting from the node.","locations":[{"ref":"src/reorder.rs:700-701","code":"  700 |     let text = node.utf8_text(content.as_bytes())?;\n  701 |     let variable_name = extract_variable_name(node, content)?;","lines":2},{"ref":"src/reorder.rs:781","code":"  781 |     let text = node.utf8_text(content.as_bytes())?;","lines":1}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`ask_user_input` in `make_release.rs` (line 18) uses an explicit `return` statement as the last\nexpression in the function body. This is not idiomatic Rust (the final expression is automatically\nreturned) and triggers `clippy::needless_return`. Additionally, the extra `return` statement makes\nthe function slightly harder to read as an expression-oriented function.","fix":"Remove the `return` keyword so the last line becomes just `input.trim().to_owned()`.","locations":[{"ref":"src/bin/make_release.rs:17-19","code":"   17 |         .expect(\"Failed to read user input\");\n   18 |     return input.trim().to_owned();\n   19 | }","lines":3}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The `parent_id` field of `GdTreeNode` is written in the constructor and in `move_extends_statement`\n/ `move_annotations`, but is never read anywhere in the codebase. It takes memory in every node and\nadds a branch in the mutation code but provides no observable behavior.","fix":"Remove the `parent_id: Option<usize>` field from `GdTreeNode` and remove all assignments to it.","locations":[{"ref":"src/formatter.rs:1131-1137","code":" 1131 | struct GdTreeNode {\n 1132 |     parent_id: Option<usize>,\n 1133 |     grammar_id: u16,\n 1134 |     grammar_name: &'static str,\n 1135 |     text: Option<String>,\n 1136 |     children: Vec<usize>,\n 1137 | }","lines":7}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The `column` field of LintIssue is captured and stored for every issue, and it is used as a tiebreaker in the sort (linter.rs:161), but it is never included in any user-visible output: not in LintIssue::format, not in lint_files_pretty, not in lint_files_standard, and not in the integration-test format string. Users have no way to see which column a lint issue appears on.","fix":"Either include the column in the output format (e.g. `file:line:col:rule:severity: message` consistent with most linters), or remove the column field if it is genuinely not needed.","locations":[{"ref":"src/linter.rs:27","code":"   27 |     pub column: usize,","lines":1},{"ref":"src/linter.rs:50-59","code":"   50 |     pub fn format(&self, file_path: &str) -> String {\n   51 |         let severity_str = match self.severity {\n   52 |             LintSeverity::Error => \"error\",\n   53 |             LintSeverity::Warning => \"warning\",\n   54 |         };\n   55 |         format!(\n   56 |             \"{}:{}:{}:{}: {}\",\n   57 |             file_path, self.line, self.rule, severity_str, self.message\n   58 |         )\n   59 |     }","lines":10}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`LintIssue::column` is stored and sorted on (linter.rs:161) but never actually\nincluded in the standard output format. `LintIssue::format()` produces\n`file:line:rule:severity: message` - the column field is absent. The column is\nstored, sorted on, and used in pretty output (linter.rs:222), but the standard\nmachine-readable format omits it. This deviates from conventional linter output\nformats (e.g., `file:line:col:severity: message`) and wastes the stored data.","fix":"Include column in the standard format string: `{}:{}:{}:{}:{}: {}` with\n`self.column` added after `self.line`. Or document intentionally omitting it.","locations":[{"ref":"src/linter.rs:50-59","code":"   50 |     pub fn format(&self, file_path: &str) -> String {\n   51 |         let severity_str = match self.severity {\n   52 |             LintSeverity::Error => \"error\",\n   53 |             LintSeverity::Warning => \"warning\",\n   54 |         };\n   55 |         format!(\n   56 |             \"{}:{}:{}:{}: {}\",\n   57 |             file_path, self.line, self.rule, severity_str, self.message\n   58 |         )\n   59 |     }","lines":10},{"ref":"src/linter.rs:161","code":"  161 |         issues.sort_by(|a, b| a.line.cmp(&b.line).then(a.column.cmp(&b.column)));","lines":1}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In `classify_element`, the else branch at lines 635-637 for the `class_name_statement`\nwith `extends` case is unreachable. `splitn(2, \"extends\")` on a string that contains\n\"extends\" always produces exactly 2 parts, so `parts.len() == 2` is always true when\nexecution reaches the if/else. The else branch `Ok(Some(GDScriptTokenKind::ClassName(text.to_string())))`\nis never executed.","fix":"Remove the `if parts.len() == 2` guard and the else branch; directly use `parts[0].trim()`.\nOr simplify the whole block with `text.split_once(\"extends\").map(|(p, _)| p.trim())`.","locations":[{"ref":"src/reorder.rs:629-637","code":"  629 |                 let parts: Vec<&str> = text.splitn(2, \"extends\").collect();\n  630 |                 if parts.len() == 2 {\n  631 |                     // We'll handle this case in the extraction logic\n  632 |                     Ok(Some(GDScriptTokenKind::ClassName(\n  633 |                         parts[0].trim().to_string(),\n  634 |                     )))\n  635 |                 } else {\n  636 |                     Ok(Some(GDScriptTokenKind::ClassName(text.to_string())))\n  637 |                 }","lines":9}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The BuiltinVirtual sub-comparison in sort_gdscript_tokens is unreachable dead code. MethodType derives Ord, so type_a.cmp(type_b) at line 845 already handles BuiltinVirtual(p_a).cmp(BuiltinVirtual(p_b)) by comparing the inner u8 priority. If type_cmp is Equal at line 846 both variants must be identical BuiltinVirtual with the same inner value, so the inner if-let block at lines 851-858 can never return a non-Equal result.","fix":"Remove lines 850-858 entirely. The type_a.cmp(type_b) at line 845 already sorts BuiltinVirtual methods by their inner priority value.","locations":[{"ref":"src/reorder.rs:850-858","code":"  850 |             // For built-in virtual methods, we sort them by our priority list\n  851 |             if let (MethodType::BuiltinVirtual(p_a), MethodType::BuiltinVirtual(p_b)) =\n  852 |                 (type_a, type_b)\n  853 |             {\n  854 |                 let builtin_cmp = p_a.cmp(p_b);\n  855 |                 if builtin_cmp != std::cmp::Ordering::Equal {\n  856 |                     return builtin_cmp;\n  857 |                 }\n  858 |             }","lines":9}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The inner BuiltinVirtual priority comparison block (lines 851-858) is unreachable dead code.\n`MethodType` derives `Ord`, so `type_a.cmp(type_b)` at line 845 already compares\n`BuiltinVirtual(p_a)` vs `BuiltinVirtual(p_b)` by their u8 field correctly via the derived\nimplementation. If `p_a != p_b`, the `return type_cmp` at line 847 fires before reaching\nthe inner block. If `p_a == p_b`, the inner block's comparison also returns `Equal` - the\nsame outcome as skipping it. The inner block can never produce a result different from\nsimply removing it.","fix":"Remove lines 851-858 entirely. The derived Ord on MethodType already handles all orderings\ncorrectly, including comparing the u8 priority inside BuiltinVirtual.","locations":[{"ref":"src/reorder.rs:851-858","code":"  851 |             if let (MethodType::BuiltinVirtual(p_a), MethodType::BuiltinVirtual(p_b)) =\n  852 |                 (type_a, type_b)\n  853 |             {\n  854 |                 let builtin_cmp = p_a.cmp(p_b);\n  855 |                 if builtin_cmp != std::cmp::Ordering::Equal {\n  856 |                     return builtin_cmp;\n  857 |                 }\n  858 |             }","lines":8}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"The `preprocess` method (lines 155-157) contains only `self` and is completely empty. It is called in the main formatting pipeline on line 41. The method serves no purpose in the current code and the surrounding doc-comment describes future intent that has never been implemented.","fix":"Either remove the method and its call site, or add a `// TODO` comment explaining the planned preprocessing steps to make the intent clear.","locations":[{"ref":"src/formatter.rs:151-157","code":"  151 |     /// This function runs over the content before going through topiary.\n  152 |     /// It is used to prepare the content for formatting or save performance by\n  153 |     /// pre-applying rules that could be performance-intensive through topiary.\n  154 |     #[inline(always)]\n  155 |     fn preprocess(&mut self) -> &mut Self {\n  156 |         self\n  157 |     }","lines":7}]},{"id":"DEAD_9","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`GdTreeNode.text` (line 1135) is stored for every leaf node but is never read outside\nof `move_annotations` (where it reads the annotation name).  The `GdTree::from_ts_tree`\nfunction eagerly allocates a `String` for every leaf node in the tree (lines 913-920),\nwhich adds allocation pressure proportional to file size.  For the `safe` validation\npath (`validate_formatting`), the `text` field is only compared indirectly via the\n`PartialEq` implementation which does NOT compare `text` at all (lines 1089-1129).\nSo leaf text is allocated, stored, and compared zero times during `validate_formatting`.","fix":"Remove text allocation from `GdTree::from_ts_tree` and only extract annotation names\nlazily (directly from the source bytes via node byte range) in `move_annotations`.","locations":[{"ref":"src/formatter.rs:913-920","code":"  913 |                 let text = if ts_child.child(0).is_none() {\n  914 |                     let range = ts_child.range();\n  915 |                     Some(\n  916 |                         str::from_utf8(&source[range.start_byte..range.end_byte])\n  917 |                             .unwrap()\n  918 |                             .to_string(),\n  919 |                     )\n  920 |                 } else {","lines":8},{"ref":"src/formatter.rs:1089-1129","code":" 1089 | impl PartialEq for GdTree {\n 1090 |     fn eq(&self, other: &Self) -> bool {\n 1091 |         let mut left_stack = Vec::new();\n 1092 |         let mut right_stack = Vec::new();\n 1093 | \n 1094 |         // Starting from root (0)\n 1095 |         left_stack.push(0);\n 1096 |         right_stack.push(0);\n 1097 | \n 1098 |         while let (Some(left_current_node_id), Some(right_current_node_id)) =\n 1099 |             (left_stack.pop(), right_stack.pop())\n 1100 |         {\n 1101 |             let left_current_node = &self.nodes[left_current_node_id];\n 1102 |             let right_current_node = &other.nodes[right_current_node_id];\n 1103 |             if left_current_node.children.len() != right_current_node.children.len() {\n 1104 |                 // A different number of children means the syntax trees are different, so the code\n 1105 |                 // structure has changed.\n 1106 |                 // NOTE: There's a valid case of change: an annotation above a variable may be wrapped\n 1107 |                 // on the same line as the variable, which turns the annotation into a child of the variable.\n 1108 |                 // We could ignore this specific case, but for now, we consider any change in structure\n 1109 |                 // as a potential issue.\n 1110 |                 return false;\n 1111 |             }\n 1112 | \n 1113 |             for (left_node_id, right_node_id) in left_current_node\n 1114 |                 .children\n 1115 |                 .iter()\n 1116 |                 .zip(right_current_node.children.iter())\n 1117 |             {\n 1118 |                 let left_node = &self.nodes[*left_node_id];\n 1119 |                 let right_node = &other.nodes[*right_node_id];\n 1120 |                 if left_node.grammar_id != right_node.grammar_id {\n 1121 |                     return false;\n 1122 |                 }\n 1123 |                 left_stack.push(*left_node_id);\n 1124 |                 right_stack.push(*right_node_id);\n 1125 |             }\n 1126 |         }\n 1127 |         true\n 1128 |     }\n 1129 | }","lines":41}]},{"id":"DEAD_10","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`IgnoreDirective` struct (ignore_patterns.rs:4-10) is defined with `pub` fields and\n`#[derive(Debug, Clone)]` but is never actually used anywhere. `parse_ignore_patterns`\nreturns a `HashMap<usize, HashSet<String>>` directly. The struct appears to be a leftover\nfrom an earlier design.","fix":"Remove the unused `IgnoreDirective` struct, or use it as the value type in the\n`ignore_map` to make the code more self-documenting.","locations":[{"ref":"src/linter/ignore_patterns.rs:4-10","code":"    4 | #[derive(Debug, Clone)]\n    5 | pub struct IgnoreDirective {\n    6 |     /// The line number this directive applies to\n    7 |     pub target_line: usize,\n    8 |     /// Set of rule names to ignore on this line\n    9 |     pub ignored_rules: HashSet<String>,\n   10 | }","lines":7}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The regex comment on line 219 contains the typo \"wtih\" instead of \"with\": \"must start wtih\n'extends' keyword\".","fix":"Change \"wtih\" to \"with\".","locations":[{"ref":"src/formatter.rs:219","code":"  219 |         // - must start wtih \"extends\" keyword","lines":1}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The FIXME comment in `postprocess_tree_sitter` (lines 491-496) states \"the regex-based steps that run before this ... can remove or reposition tokens, making the AST stale\". However, each call to `regex_replace_all_outside_strings_or_comments` already performs an incremental tree re-parse at line 579 (`self.tree = self.parser.parse(...)`). The AST is therefore not stale due to those steps; the actual reason the full re-parse is needed is uncertainty about whether the accumulated incremental edits are fully reliable. The comment misleads readers about the state of the tree.","fix":"Update the comment to accurately state: \"Each regex step does an incremental re-parse, but accumulated incremental hints may not be fully reliable for complex multi-step edits, so a full re-parse is done here for correctness.\"","locations":[{"ref":"src/formatter.rs:491-501","code":"  491 |         // FIXME: Nathan: A full re-parse is required here for now because the\n  492 |         // regex-based steps that run before this (fix_dangling_semicolons(),\n  493 |         // fix_dangling_commas(), etc.) can remove or reposition tokens, making\n  494 |         // the AST stale. handle_two_blank_line() runs tree-sitter queries\n  495 |         // against this tree, so it must reflect the actual content or it will\n  496 |         // compute wrong insertion points.\n  497 |         //\n  498 |         // If we're going to keep working on this, we should get rid of regexes\n  499 |         // and start moving everything to a visitor pattern that modifies the\n  500 |         // AST incrementally for formatting rules.\n  501 |         self.tree = self.parser.parse(&self.content, None).unwrap();","lines":11}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The comment on line 524 says: \"We first collect tree edits and then apply them,\nbecause regex returns positions from unmodified content.\"  This is misleading.  The\nedits are NOT collected and applied after the loop; instead, `new` (the output string)\nis built inside the loop, and `self.content` is updated on line 574 *before* the edits\nare applied on lines 576-578.  The tree edits are collected in `edits: Vec<...>` and\napplied afterward, but the string is built incrementally inside the loop.","fix":"Update the comment to accurately describe what happens:\n- The output string is built incrementally inside the loop.\n- The InputEdit structs are collected and applied to the tree after the loop (because\n  they use byte offsets into the *original* content that would be invalidated by\n  in-place modification).","locations":[{"ref":"src/formatter.rs:524-525","code":"  524 |         // We first collect tree edits and then apply them, because regex returns positions from unmodified content\n  525 |         let mut edits = Vec::new();","lines":2}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment on constant_name.rs:52 says \"For all load/preload constants, check load naming rules\" but the code only checks for preload (is_preload_call returns false for plain load()). The comment contradicts the actual behaviour.","fix":"Either fix the implementation to match the comment (handle load() too), or correct the comment to say \"For preload constants\" until the implementation is updated.","locations":[{"ref":"src/linter/rules/constant_name.rs:52","code":"   52 |                 // For all load/preload constants, check load naming rules","lines":1}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment at line 308 reads \"count how many rows are belong to the statement docstring\"\nwhich is grammatically incorrect (\"are belong\" should be \"belong\"). Minor but potentially\nconfusing for readers trying to understand the algorithm.","fix":"Change to \"count how many rows belong to the statement docstring\".","locations":[{"ref":"src/reorder.rs:308","code":"  308 |                     // count how many rows are belong to the statement docstring","lines":1}]},{"id":"CMT_6"," ,{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"medium","easy":false,"description":"`handle_two_blank_line` (lines 587-714) is 127 lines long and embeds a large closure\n(`process_query`, lines 604-671) that itself contains complex tree-sitter match\ntraversal, comment classification logic, and byte-offset walking.  The blank-line\ninsertion loop (lines 686-712) is separate but tightly coupled.  The function mixes\nthree distinct concerns: (1) finding where to insert blank lines via tree-sitter\nqueries, (2) classifying whether a comment belongs to the next node or is an inline\ntrailing comment, and (3) mutating the string and incrementally updating the parse\ntree.  This makes it hard to test or reason about each concern in isolation.","fix":"Extract at minimum:\n- A standalone function `find_blank_line_insertion_points(tree, content) -> Vec<(usize, Point)>`\n  that encapsulates both queries and the comment classification.\n- The insertion loop stays in `handle_two_blank_line` but only calls the extractor.","locations":[{"ref":"src/formatter.rs:587-714","code":"  587 |     fn handle_two_blank_line(&mut self) -> &mut Self {\n  588 |         let root = self.tree.root_node();\n  589 |         let queries = [\n  590 |             // We need two queries to catch all cases because variables can be placed above or below functions\n  591 |             // First query: variable, function, class, signal, const, enum followed by function, constructor, class, or variable\n  592 |             //\n  593 |             // NOTE: Nathan (GDQuest): This adds maybe 20-25% runtime to the program.\n  594 |             // I tried 2 other implementations by having a single query that'd find only functions, classes, and constructors and add 2 new lines between them.\n  595 |             // But the costly part is in accounting for comments and annotations between them. This solution ends up being slightly faster and simpler.\n  596 |             // Still, this is probably something that can be made faster in the future.\n  597 |             \"(([(variable_statement) (function_definition) (class_definition) (signal_statement) (const_statement) (enum_definition) (constructor_definition)]) @first \\\n  598 |             . (([(comment) (annotation)])* @comment . ([(function_definition) (constructor_definition) (class_definition)]) @second))\",\n  599 |             // Second query: constructor or function followed by variable, signal, const, or enum\n  600 |             \"(([(constructor_definition) (function_definition) (class_definition)]) @first \\\n  601 |             . ([(variable_statement) (signal_statement) (const_statement) (enum_definition)]) @second)\",\n  602 |         ];\n  603 | \n  604 |         let process_query =\n  605 |             |query_str: &str, new_lines_at: &mut Vec<(usize, tree_sitter::Point)>| {\n  606 |                 let query = match Query::new(\n  607 |                     &tree_sitter::Language::new(tree_sitter_gdscript::LANGUAGE),\n  608 |                     query_str,\n  609 |                 ) {\n  610 |                     Ok(q) => q,\n  611 |                     Err(err) => {\n  612 |                         panic!(\"Failed to create query: {}\", err);\n  613 |                     }\n  614 |                 };\n  615 | \n  616 |                 let mut cursor = QueryCursor::new();\n  617 |                 let mut matches = cursor.matches(&query, root, self.content.as_bytes());\n  618 |                 while let Some(m) = matches.next() {\n  619 |                     let first_node = m.captures[0].node;\n  620 |                     let last_node = m.captures.last().unwrap().node;\n  621 | \n  622 |                     let mut insert_before = last_node;\n  623 | \n  624 |                     let capture_has_comments = m.captures.len() >= 3;\n  625 | \n  626 |                     if capture_has_comments {\n  627 |                         let last_comment_node = m.captures[m.captures.len() - e_comment =\n  641 |                                 first_comment_node.start_position().row\n  642 |                                     == first_node.start_position().row;\n  643 |                             // ignore n first nodes when searching for the first docstring comment node\n  644 |                             // in case if the first comment is an inline comment we ignore\n  645 |                             // two nodes: first statement node and inline comment node\n  646 |                             // otherwise we ignore only the first statement node\n  647 |                             let mut amount_of_nodes_to_ignore = 1;\n  648 |                             if first_comment_is_inline_comment {\n  649 |                                 amount_of_nodes_to_ignore += 1;\n  650 |                             }\n  651 | \n  652 |                             // find first documentation comment node\n  653 |                             while comment_node_index > amount_of_nodes_to_ignore\n  654 |                                 && m.captures[comment_node_index - 1].node.start_position().row\n  655 |                                     == m.captures[comment_node_index].node.start_position().row - 1\n  656 |                             {\n  657 |                                 comment_node_index -= 1;\n  658 |                             }\n  659 |                             insert_before = m.captures[comment_node_index].node;\n  660 |                         }\n  661 |                     }\n  662 | \n  663 |                     let mut byte_idx = insert_before.start_byte();\n  664 |                     let mut position = insert_before.start_position();\n  665 |                     position.column = 0;\n  666 |                     while byte_idx > 0 && self.content.as_bytes()[byte_idx] != b'\\n' {\n  667 |                         byte_idx -= 1;\n  668 |                     }\n  669 |                     new_lines_at.push((byte_idx, position));\n  670 |
