<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"rlib loading in `prepare_lto` uses `expect`/`unwrap` on fallible I/O and parsing: `File::open(path).expect(\"couldn't open rlib\")`, `Mmap::map(...).expect(\"couldn't map rlib\")`, `rmeta_link::read_from_data(...).unwrap()`, `ArchiveFile::parse(...).expect(\"wanted an rlib\")`, and `child.data(...).expect(\"corrupt rlib\")`. These depend on the state of external rlib files on disk during LTO (which can be truncated, corrupted, or unreadable due to permissions / a concurrent build), not on internal compiler invariants. Any such condition aborts the compiler with a panic + backtrace instead of a clean diagnostic. The temporary-directory creation just above (lines 51-56) correctly uses `dcx.fatal`, so these paths are inconsistent with the surrounding error-handling style.","fix":"Convert these to emitted diagnostics via `dcx.fatal(...)` / a dedicated `Diagnostic` (as is already done for `LtoBitcodeFromRlib` in `save_as_file`), e.g. match on the `Result` and call `dcx.fatal(format!(\"failed to open rlib {}: {error}\", path.display()))`.","locations":[{"ref":"src/back/lto.rs:65-92","code":"   65 |     for path in each_linked_rlib_for_lto {\n   66 |         let archive_data = unsafe {\n   67 |             Mmap::map(File::open(path).expect(\"couldn't open rlib\")).expect(\"couldn't map rlib\")\n   68 |         };\n   69 |         let metadata_link = rmeta_link::read_from_data(&archive_data, path).unwrap();\n   70 |         let archive = ArchiveFile::parse(&*archive_data).expect(\"wanted an rlib\");\n   71 |         let obj_files = archive\n   72 |             .members()\n   73 |             .filter_map(|child| {\n   74 |                 child\n   75 |                     .ok()\n   76 |                     .and_then(|c| std::str::from_utf8(c.name()).ok().map(|name| (name.trim(), c)))\n   77 |             })\n   78 |             .filter(|&(name, _)| metadata_link.rust_object_files.iter().any(|f| f == name));\n   79 |         for (name, child) in obj_files {\n   80 |             info!(\"adding bitcode from {}\", name);\n   81 |             let path = tmp_path.path().join(name);\n   82 |             match save_as_file(child.data(&*archive_data).expect(\"corrupt rlib\"), &path) {\n   83 |                 Ok(()) => {\n   84 |                     let buffer = ModuleBuffer::new(path);\n   85 |                     let module = SerializedModule::Local(buffer);\n   86 |                     upstream_modules.push((module, CString::new(name).unwrap()));\n   87 |                 }\n   88 |                 Err(e) => {\n   89 |                     dcx.emit_fatal(e);\n   90 |                 }\n   91 |             }\n   92 |         }","lines":28,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/back/lto.rs#L65-L92"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`remove_dup_assign` iterates `for index in starts..ends` and accesses `file_copy[index + 1]`. When `ends == file.len()` (the initial call from `reduce` passes `ends = file.len()`), `index + 1` equals `file.len()` on the last iteration and panics with an out-of-bounds index. The early-return guard only skips when `ends - starts < 8`, so for files with >=8 lines this is reachable.","fix":"Iterate `for index in starts..ends.saturating_sub(1)` (or `starts..(ends - 1)`), so the `index + 1` access stays in bounds.","locations":[{"ref":"build_system/src/fuzz/reduce.rs:35-70","code":"   35 | fn remove_dup_assign(\n   36 |     file: &mut Vec<String>,\n   37 |     path: &PathBuf,\n   38 |     starts: usize,\n   39 |     ends: usize,\n   40 |     cache: &mut ResultCache,\n   41 | ) {\n   42 |     let mut file_copy = file.clone();\n   43 |     let mut reduction_count = 0;\n   44 |     // Not worth it.\n   45 |     if ends - starts < 8 {\n   46 |         return;\n   47 |     }\n   48 |     for index in starts..ends {\n   49 |         let Some((prefix, _)) = file_copy[index].split_once('=') else {\n   50 |             continue;\n   51 |         };\n   52 |         let Some((prefix2, postifx2)) = file_copy[index + 1].split_once('=') else {\n   53 |             continue;\n   54 |         };\n   55 |         let prefix = prefix.trim();\n   56 |         let prefix2 = prefix2.trim();\n   57 |         // FIXME: Right now, remove_dup_assign cares about assignments to the exact same place.\n   58 |         // However, given an assigemnt like this:\n   59 |         // ```\n   60 |         // A.0 = 1_u32;\n   61 |         // A = (2_u32, 3.0);\n   62 |         // ```\n   63 |         // The first assignment could be safely omitted.\n   64 |         // Additionally, we try to check if the second assignment could depend on the first one.\n   65 |         // In such cases, the result is likely to change, so we bail.\n   66 |         if prefix == prefix2 && !postifx2.contains(prefix) {\n   67 |             file_copy[index] = \"\".into();\n   68 |             reduction_count += 1;\n   69 |         }\n   70 |     }","lines":36,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/fuzz/reduce.rs#L35-L70"},{"ref":"build_system/src/fuzz/reduce.rs:417-419","code":"  417 |     let len = file.len();\n  418 |     println!(\"running `remove_dup_assign` on {path:?}.\");\n  419 |     remove_dup_assign(&mut file, &path, 0, len, &mut cache);","lines":3,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/fuzz/reduce.rs#L417-L419"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`get_rustc_path` calls `String::from_utf8(out.stdout).unwrap()` on the output of `rustup which rustc`. If rustup emits non-UTF8 bytes this panics. As this is in the `prepare` path, a confusing crash results instead of a clear message.","fix":"Use `String::from_utf8_lossy` or propagate a descriptive error (the function returns Option, so map failures to None or change the signature).","locations":[{"ref":"build_system/src/rustc_info.rs:9-12","code":"    9 |     run_command(&[&\"rustup\", &\"which\", &\"rustc\"], None)\n   10 |         .ok()\n   11 |         .map(|out| Path::new(String::from_utf8(out.stdout).unwrap().trim()).to_path_buf())\n   12 | }","lines":4,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/rustc_info.rs#L9-L12"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`maybe_run_command_in_vm` uses several `.unwrap()` calls: `std::env::current_dir().unwrap()` (when CG_GCC_VM_DIR unset), `command.first().unwrap()`, and `exe.file_name().unwrap()`. A command whose first element has no file name component (e.g. ends in `..` or `/`) or a process with no cwd will panic with an opaque message instead of a clear error. Only reachable with `run_in_vm` (m68k cross), so low severity.","fix":"Replace the unwraps with `?`/`ok_or_else` returning descriptive `String` errors.","locations":[{"ref":"build_system/src/test.rs:301-311","code":"  301 |     let vm_parent_dir = match env.get(\"CG_GCC_VM_DIR\") {\n  302 |         Some(dir) if !dir.is_empty() => PathBuf::from(dir.clone()),\n  303 |         _ => std::env::current_dir().unwrap(),\n  304 |     };\n  305 |     let vm_dir = \"vm\";\n  306 |     let exe_to_run = command.first().unwrap();\n  307 |     let exe = Path::new(&exe_to_run);\n  308 |     let exe_filename = exe.file_name().unwrap();\n  309 |     let vm_home_dir = vm_parent_dir.join(vm_dir).join(\"home\");\n  310 |     let vm_exe_path = vm_home_dir.join(exe_filename);\n  311 |     let inside_vm_exe_path = Path::new(\"/home\").join(exe_filename);","lines":11,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/test.rs#L301-L311"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`extended_regex_example_tests` builds the bash pipeline by joining `cargo_command.iter().map(|s| s.as_ref().to_str().unwrap())`. If any cargo arg is non-UTF8 (path-derived), this panics. Also note the resulting command is passed unescaped to `bash -c`, so paths with spaces/special chars would break the pipeline (a correctness latent bug).","fix":"Use `to_string_lossy()` and shell-escape arguments, or follow the existing FIXME and feed input via `child.stdin.write_all`.","locations":[{"ref":"build_system/src/test.rs:840-848","code":"  840 |             let mut command: Vec<&dyn AsRef<OsStr>> = vec![&\"bash\", &\"-c\"];\n  841 |             let cargo_args =\n  842 |                 cargo_command.iter().map(|s| s.as_ref().to_str().unwrap()).collect::<Vec<_>>();\n  843 |             let bash_command = format!(\n  844 |                 \"cat examples/regexdna-input.txt | {} | grep -v 'Spawned thread' > res.txt\",\n  845 |                 cargo_args.join(\" \"),\n  846 |             );\n  847 |             command.push(&bash_command);\n  848 |             run_command_with_output_and_env(&command, cwd, Some(env))?;","lines":9,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/test.rs#L840-L848"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`test_rustc_inner` does `env.get_mut(\"RUSTFLAGS\").unwrap().clear()`. If `RUSTFLAGS` is not present in the env map (it is normally inserted by `config.setup`, but this function is also reachable via callbacks that clone env), this panics. Relying on an env key inserted elsewhere is fragile.","fix":"Use `env.entry(\"RUSTFLAGS\".to_string()).or_default().clear();` or guard with `if let Some(v) = env.get_mut(...)`.","locations":[{"ref":"build_system/src/test.rs:1128","code":" 271-L277"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`CString::new(name).unwrap()` (lto.rs:86 and :215) and `CString::new(...).unwrap()` for serialized module names assume the names contain no interior NUL byte. Module/object-file names ultimately derive from archive member names read off disk (`std::str::from_utf8(c.name())`); a crafted/corrupt rlib member name could contain a NUL and turn this into a panic rather than a diagnostic. Reachable on malformed input rather than an internal invariant.","fix":"Handle the `CString::new` error path with a diagnostic (corrupt rlib / invalid object name) instead of `unwrap()`.","locations":[{"ref":"src/back/lto.rs:86","code":"   86 |                     upstream_modules.push((module, CString::new(name).unwrap()));","lines":1,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/back/lto.rs#L86"},{"ref":"src/back/lto.rs:155","code":"  155 |                     CString::new(name).unwrap(),","lines":1,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/back/lto.rs#L155"},{"ref":"src/back/lto.rs:215","code":"  215 |             let llmod_id = CString::new(&module.name[..]).unwrap();","lines":1,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/back/lto.rs#L215"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`compile_codegen_unit` cost computation: `time_to_codegen.as_secs() * 1_000_000_000 + subsec_nanos() as u64`. `as_secs()` is u64; multiplying by 1e9 overflows u64 only after ~584 years of codegen time, so practically safe, but on a debug build a pathologically long (or clock-adjusted) duration could trigger a multiply overflow panic. Negligible real impact; noted for completeness.","fix":"Prefer `time_to_codegen.as_nanos() as u64` (saturating) which expresses int ch could happen in the case, for example, that\n  183 |     // all our inputs were incrementally reread from the cache and we're just\n  184 |     // re-executing the LTO passes. If that's the case deserialize the first\n  185 |     // module and create a linker with it.\n  186 |     let mut module: ModuleCodegen<GccContext> = match costliest_module {\n  187 |         Some((_cost, i)) => in_memory.remove(i),","lines":18,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/back/lto.rs#L170-L187"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"In `test_failing_rustc`, the run-make-cargo invocation passes the wrong `test_type`. The `retain_files_callback` is correctly built with \"run-make-cargo\", but `test_rustc_inner` is given the literal `\"run-make\"` as its test_type. As a result the `tests/run-make` suite is executed twice and the `tests/run-make-cargo` suite is never run by `--test-failing-rustc`. (Compare with `test_successful_rustc`, which correctly passes \"run-make-cargo\".)","fix":"Change the `test_type` argument on line 1176 from `\"run-make\"` to `\"run-make-cargo\"`.","locations":[{"ref":"build_system/src/test.rs:1171-1178","code":" 1171 |     let run_make_cargo_result = test_rustc_inner(\n 1172 |         env,\n 1173 |         args,\n 1174 |         retain_files_callback(\"tests/failing-run-make-tests.txt\", \"run-make-cargo\"),\n 1175 |         false,\n 1176 |         \"run-make\",\n 1177 |         true,\n 1178 |     );","lines":8,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/test.rs#L1171-L1178"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":false,"description":"The `simd_bswap` closure takes a `vector` parameter and derives `v_type` (and the final bitcast-back type) from it, but at the byte-vector bitcast it ignores `vector` a ":false,"description":"`abi_test::run` uses `std::fs::copy(\"rust-toolchain\", ...).expect(...)` and `std::path::absolute(...).unwrap()`. If `rust-toolchain` is missing or the path cannot be made absolute, the tool panics with a backtrace instead of returning the `Result<(), String>` error it already supports.","fix":"Replace `.expect()`/`.unwrap()` with `.map_err(|e| format!(...))?` to surface a clean error.","locations":[{"ref":"build_system/src/abi_test.rs:37-41","code":"   37 |     std::fs::copy(\"rust-toolchain\", \"clones/abi-cafe/rust-toolchain\")\n   38 |         .expect(\"Could not copy toolchain configs!\");\n   39 |     // Get the backend path.\n   40 |     // We will use the *debug* build of the backend - it has more checks enabled.\n   41 |     let backend_path = std::path::absolute(\"target/debug/librustc_codegen_gcc.so\").unwrap();","lines":5,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/abi_test.rs#L37-L41"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`config.rs::setup` inserts `RUSTC_LOG=warn` at line 430, then later (lines 454-456) checks `if !env.contains_key(\"RUSTC_LOG\")` and inserts it again. Because it was unconditionally inserted at 430, the second check is always false and is dead. The intent (respect a user-provided RUSTC_LOG) is defeated by the earlier unconditional insert, which overwrites any user value.","fix":"Remove the unconditional insert at line 430, or make line 430 respect an existing value (use `entry().or_insert`), so the later guarded insert is meaningful.","locations":[{"ref":"build_system/src/config.rs:429-456","code":"  429 |         // display metadata load errors\n  430 |         env.insert(\"RUSTC_LOG\".to_string(), \"warn\".to_string());\n  431 | \n  432 |         // NOTE: To avoid the -fno-inline errors, use /opt/gcc/bin/gcc instead of cc.\n  433 |         // To do so, add a symlink for cc to /opt/gcc/bin/gcc in our PATH.\n  434 |         // Another option would be to add the following Rust flag: -Clinker=/opt/gcc/bin/gcc\n  435 |         let path = std::env::var(\"PATH\").unwrap_or_default();\n  436 |         env.insert(\n  437 |             \"PATH\".to_string(),\n  438 |             format!(\n  439 |                 \"/opt/gcc/bin:/opt/m68k-unknown-linux-gnu/bin{}{}\",\n  440 |                 if path.is_empty() { \"\" } else { \":\" },\n  441 |                 path\n  442 |             ),\n  443 |         );\n  444 | \n  445 |         self.rustc_command = vec![rustc];\n  446 |         self.rustc_command.extend_from_slice(&rustflags);\n  447 |         self.rustc_command.extend_from_slice(&[\n  448 |             \"-L\".to_string(),\n  449 |             format!(\"crate={}\", self.cargo_target_dir),\n  450 |             \"--out-dir\".to_string(),\n  451 |             self.cargo_target_dir.clone(),\n  452 |         ]);\n  453 | \n  454 |         if !env.contains_key(\"RUSTC_LOG\") {\n  455 |             env.insert(\"RUSTC_LOG\".to_string(), \"warn\".to_string());\n  456 |         }","lines":28,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/config.rs#L429-L456"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`fuzz::run` ignores the exit status of building rustlantis only insofar as it propagates errors, but `git pull origin` is run unconditionally even when the repo was freshly cloned (shallow, depth 1). A shallow clone followed by `git pull origin` with no branch can fail or fetch unexpectedly; the error then aborts fuzzing. Minor robustness concern in the fuzz setup path.","fix":"Skip the `git pull` when the clone just ran, or specify the branch and handle shallow-repo pull semantics.","locations":[{"ref":"build_system/src/fuzz.rs:63-77","code":"   63 |     // Ensure that we have a cloned version of rustlantis on hand.\n   64 |     crate::utils::git_clone(\n   65 |         \"https://github.com/cbeuw/rustlantis.git\",\n   66 |         Some(\"clones/rustlantis\".as_ref()),\n   67 |         true,\n   68 |     )\n   69 |     .map_err(|err| format!(\"Git clone failed with message: {err:?}!\"))?;\n   70 | \n   71 |     // Ensure that we are on the newest rustlantis commit.\n   72 |     let cmd: &[&dyn AsRef<OsStr>] = &[&\"git\", &\"pull\", &\"origin\"];\n   73 |     run_command_with_output(cmd, Some(Path::new(\"clones/rustlantis\")))?;\n   74 | \n   75 |     // Build the release version of rustlantis\n   76 |     let cmd: &[&dyn AsRef<OsStr>] = &[&\"cargo\", &\"build\", &\"--release\"];\n   77 |     run_command_with_output(cmd, Some(Path::new(\"clones/rustlantis\")))?;","lines":15,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/fuzz.rs#L63-L77"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `fuzz_range`, worker threads call `.unwrap()` on `fs::create_dir_all`, `fs::copy`, and the `reduce` flow. A failure (e.g. disk full, permission, or the source file having been removed) panics the worker thread rather than reporting a clear error; the manager loop then keeps running because it only checks `is_finished()`, so a panicked thread looks like a finished one and its work is silently lost.","fix":"Propagate errors out of the worker closure (collect a Result) and join workers, or at least log the path/error before unwrapping; check `JoinHandle::join` results in the manager loop.","locations":[{"ref":"build_system/src/fuzz.rs:108-134","code":"  108 |                         // ... copy that file to the directory `target/fuzz/compiletime_error`...\n  109 |                         let mut out_path: std::path::PathBuf =\n  110 |                             \"target/fuzz/compiletime_error\".into();\n  111 |                         std::fs::create_dir_all(&out_path).unwrap();\n  112 |                         // .. into a file named `fuzz{seed}.rs`.\n  113 |                         out_path.push(format!(\"fuzz{next}.rs\"));\n  114 |                         std::fs::copy(err, out_path).unwrap();\n  115 |                     }\n  116 |                     Ok(Err(err)) => {\n  117 |                         // If the test failed at run-time...\n  118 |                         println!(\"The LLVM and GCC results don't match for {err:?}\");\n  119 |                         // ... generate a new file, which prints temporaries(instead of hashing them)...\n  120 |                         let mut out_path: std::path::PathBuf = \"target/fuzz/runtime_error\".into();\n  121 |                         std::fs::create_dir_all(&out_path).unwrap();\n  122 |                         let Ok(Err(tmp_print_err)) = test(next, true) else {\n  123 |                             // ... if that file does not reproduce the issue...\n  124 |                             // ... save the original sample in a file named `fuzz{seed}.rs`...\n  125 |                             out_path.push(format!(\"fuzz{next}.rs\"));\n  126 |                             std::fs::copy(err, &out_path).unwrap();\n  127 |                             continue;\n  128 |                         };\n  129 |                         // ... if that new file still produces the issue, copy it to `fuzz{seed}.rs`..\n  130 |                         out_path.push(format!(\"fuzz{next}.rs\"));\n  131 |                         std::fs::copy(tmp_print_err, &out_path).unwrap();\n  132 |                         // ... and start reducing it, using some properties of `rustlantis` to speed up the process.\n  133 |                         reduce::reduce(&out_path);\n  134 |                     }","lines":27,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/fuzz.rs#L108-L134"},{"ref":"build_system/src/fuzz.rs:142-159","code":"  142 |     while start.load(Ordering::Relaxed) < end || !workers.iter().all(|t| t.is_finished()) {\n  143 |         // Every 500 ms...\n  144 |         let five_hundred_millis = Duration::from_millis(500);\n  145 |         std::thread::sleep(five_hundred_millis);\n  146 |         // ... calculate the remaining fuzz iters ...\n  147 |         let remaining = end - start.load(Ordering::Relaxed);\n  148 |         // ... fix the count(the start counter counts the cases that\n  149 |         // begun fuzzing, and not only the ones that are done)...\n  150 |         let fuzzed = (total - remaining).saturating_sub(threads as u64);\n  151 |         // ... and the fuzz speed ...\n  152 |         let iter_per_sec = fuzzed as f64 / start_time.elapsed().as_secs_f64();\n  153 |         // .. and use them to display fuzzing stats.\n  154 |         println!(\n  155 |             \"fuzzed {fuzzed} cases({}%), at rate {iter_per_sec} iter/s, remaining ~{}s\",\n  156 |             (100 * fuzzed) as f64 / total as f64,\n  157 |             (remaining as f64) / iter_per_sec\n  158 |         )\n  159 |     }","lines":18,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/fuzz.rs#L142-L159"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`prepare_rand` and `prepare_libcore` apply patches with hard-coded relative parent paths (`Path::new(\"../..\")` / `Path::new(\"../../..\")`) joined to patch paths, relying on the exact cwd-depth of the git command. These magic relative prefixes are brittle: if the sysroot directory depth changes the `git apply` silently targets the wrong path and fails with a confusing git error rather than a clear message.","fix":"Canonicalize patch paths to absolute before passing them to `git apply` instead of computing `../..` prefixes relative to the git cwd.","locations":[{"ref":"build_system/src/prepare.rs:135-145","code":"  135 |     for file_path in patches {\n  136 |         println!(\"[GIT] apply `{}`\", file_path.display());\n  137 |         let path = Path::new(\"../../..\").join(file_path);\n  138 |         run_git_command_with_output(&\"apply\", &[&path], Some(&sysroot_dir))?;\n  139 |         run_git_command_with_output(&\"add\", &[&\"-A\"], Some(&sysroot_dir))?;\n  140 |         run_git_command_with_output(\n  141 |             &\"commit\",\n  142 |             &[&\"-m\", &format!(\"Patch {}\", path.display())],\n  143 |             Some(&sysroot_dir),\n  144 |         )?;\n  145 |     }","lines":11,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/prepare.rs#L135-L145"},{"ref":"build_system/src/prepare.rs:152-165","code":"  152 | fn prepare_rand() -> Result<(), String> {\n  153 |     // Apply patch for the rand crate.\n  154 |     let file_path = \"patches/crates/0001-Remove-deny-warnings.patch\";\n  155 |     let rand_dir = Path::new(\"build/rand\");\n  156 |     println!(\"[GIT] apply `{file_path}`\");\n  157 |     let path = Path::new(\"../..\").join(file_path);\n  158 |     run_git_command_with_output(&\"apply\", &[&path], Some(rand_dir))?;\n  159 |     run_git_command_with_output(&\"add\", &[&\"-A\"], Some(rand_dir))?;\n  160 |     run_git_command_with_output(\n  161 |         &\"commit\",\n  162 |         &[&\"-m\", &format!(\"Patch {}\", path.display())],\n  163 |         Some(rand_dir),\n  164 |     )?;\n  165 | ","lines":14,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/prepare.rs#L152-L165"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`setup_rustc` writes a hard-coded `change-id = 115898` into the generated rust `config.toml`. This bootstrap change-id drifts over time and, when stale, causes `x.py` to print a warning or (in stricter modes) fail. It is a maintenance/foot-gun constant embedded in a format string with no explanation of how it is kept in sync with the checked-out rustc commit.","fix":"Document the source of the change-id and/or derive it, or suppress the warning explicitly; add a FIXME noting it must track the pinned rustc.","locations":[{"ref":"build_system/src/test.rs:576-602","code":"  576 |     std::fs::write(\n  577 |         &file_path,\n  578 |         format!(\n  579 |             r#\"change-id = 115898\n  580 | \n  581 | [rust]\n  582 | codegen-backends = [\"gcc\"]\n  583 | deny-warnings = false\n  584 | verbose-tests = true\n  585 | \n  586 | [build]\n  587 | cargo = \"{cargo}\"\n  588 | local-rebuild = true\n  589 | rustc = \"{rustc}\"\n  590 | \n  591 | [target.x86_64-unknown-linux-gnu]\n  592 | llvm-filecheck = \"{llvm_filecheck}\"\n  593 | \n  594 | [llvm]\n  595 | download-ci-llvm = false\n  596 | \"#,\n  597 |             cargo = cargo,\n  598 |             rustc = rustc,\n  599 |             llvm_filecheck = llvm_filecheck.trim(),\n  600 |         ),\n  601 |     )\n  602 |     .map_err(|error| format!(\"Failed to write into `{}`: {:?}\", file_path.display(), error))?;","lines":27,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/test.rs#L576-L602"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`run()` dispatch for runners does `runners.get(runner.as_str()).unwrap().1(...)`. The runner strings are validated against `runners` at parse time, so this is currently safe, but the `unwrap` couples two separate `get_runners()` constructions; if the parse-time and run-time runner sets ever diverge it becomes a panic. Minor robustness issue.","fix":"Match on `runners.get(...)` and return a descriptive error for the `None` case.","locations":[{"ref":"build_system/src/test.rs:1368-1371","code":" 1368 |         let runners = get_runners();\n 1369 |         for runner in args.runners.iter() {\n 1370 |             runners.get(runner.as_str()).unwrap().1(&env, &args)?;\n 1371 |         }","lines":4,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/test.rs#L1368-L1371"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`get_command_inner` panics (`panic!(\"empty command\")`) on an empty input slice. While all current call sites pass non-empty literals, an empty command is a programmer error that aborts the whole tool with a backtrace rather than a graceful error. Minor.","fix":"Acceptable as an invariant, but consider returning a `Result` so the failure is reported cleanly.","locations":[{"ref":"build_system/src/utils.rs:35-38","code":"   35 |     let (cmd, args) = match input {\n   36 |         [] => panic!(\"empty command\"),\n   37 |         [cmd, args @ ..] => (cmd, args),\n   38 |     };","lines":4,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/build_system/src/utils.rs#L35-L38"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`emit_ir` is handled by writing an empty file (`std::fs::write(out, \"\").expect(\"write file\")`). This both fabricates an empty .ll output silently (a user requesting LLVM IR gets an empty file with no warning that IR emission is unimplemented for the GCC backend) and panics via `expect` on any write error (a disk/permission failure, not an internal invariant).","fix":"Emit a diagnostic that IR output is unsupported by the GCC backend, and if a placeholder file must be written, handle the io::Error with a proper diagnostic instead of `expect`.","locations":[{"ref":"src/back/write.rs:73-77","code":"   73 |         if config.emit_ir {\n   74 |             let out =\n   75 |                 cgcx.output_filenames.temp_path_for_cgu(OutputType::LlvmAssembly, &module.name);\n   76 |             std::fs::write(out, \"\").expect(\"write file\");\n   77 |         }","lines":5,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/back/write.rs#L73-L77"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`CopyBitcode` error in `back/write.rs` emits a diagnostic (`dcx.emit_err`) but then control flow falls through and `module.into_compiled_module(...)` is still called with `config.emit_obj != EmitObj::None` as the `object` flag, implying an object file exists when the copy failed. The compilation may continue with a missing object file. emit_err records an error so the overall compile will fail, but the immediate state is inconsistent.","fix":"On copy failure, treat the object as not produced (or bail), so `into_compiled_module` is not told an object file exists.","locations":[{"ref":"src/back/write.rs:177-187","code":"  177 |             EmitObj::Bitcode => {\n  178 |                 debug!(\"copying bitcode {:?} to obj {:?}\", bc_out, obj_out);\n  179 |                 if let Err(err) = link_or_copy(&bc_out, &obj_out) {\n  180 |                     dcx.emit_err(CopyBitcode { err });\n  181 |                 }\n  182 | \n  183 |                 if !config.emit_bc {\n  184 |                     debug!(\"removing_bitcode {:?}\", bc_out);\n  185 |                     ensure_removed(dcx, &bc_out);\n  186 |                 }\n  187 |             }","lines":11,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/back/write.rs#L177-L187"},{"ref":"src/back/write.rs:193-200","code":"  193 |     module.into_compiled_module(\n  194 |         config.emit_obj != EmitObj::None,\n  195 | pected type {:?}\", value_type);\n 1587 |         };","lines":7,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/builder.rs#L1581-L1587"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`mangle_name` (non-master builds) uses `debug_assert!` with a string literal as the condition: `debug_assert!(\"$.*\".contains(char), ...)`. A non-empty `&str` is not a bool, so this does not even type-check as written for a normal assert; relying on it being `debug_assert!` means it is compiled out in release and its intent (assert that the unsupported char is one of `$ . *`) is never actually checked. If it does compile, the literal is truthy and the assertion can never fail, making it useless.","fix":"Change to `debug_assert!(\"$.*\".contains(char), \"Unsupported char in function name {name}: {char}\")` ensuring the condition is the `contains(...)` bool (it appears the closure body intends exactly this); verify it compiles and actually guards the invariant.","locations":[{"ref":"src/declare.rs:244-261","code":"  244 | #[cfg(not(feature = \"master\"))]\n  245 | fn mangle_name(name: &str) -> String {\n  246 |     name.replace(\n  247 |         |char: char| {\n  248 |             if !char.is_alphanumeric() && char != '_' {\n  249 |                 debug_assert!(\n  250 |                     \"$.*\".contains(char),\n  251 |                     \"Unsupported char in function name {}: {}\",\n  252 |                     name,\n  253 |                     char\n  254 |                 );\n  255 |                 true\n  256 |             } else {\n  257 |                 false\n  258 |             }\n  259 |         },\n  260 |         \"_\",\n  261 |     )","lines":18,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/declare.rs#L244-L261"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Unsupported relocation models are reported with `eprintln!` to stderr and then silently ignored (no PIC/PIE/no-pie option is added at all). This bypasses the compiler's diagnostic machinery (no span, not captured by the error emitter, does not set an error flag) and produces a binary with an unspecified relocation model instead of failing. RelocModel has more variants (e.g. DynamicNoPic, Ropi, Rwpi, RopiRwpi) that fall into this arm.","fix":"Either handle the remaining RelocModel variants explicitly, or pass a `&Session`/`DiagCtxtHandle` in and emit a fatal/error diagnostic instead of `eprintln!` so the unsupported model is a hard, visible failure.","locations":[{"ref":"src/gcc_util.rs:250-269","code":"  250 | pub fn add_pic_option<'gcc>(context: &Context<'gcc>, relocation_model: RelocModel) {\n  251 |     match relocation_model {\n  252 |         rustc_target::spec::RelocModel::Static => {\n  253 |             context.add_command_line_option(\"-fno-pie\");\n  254 |             context.add_driver_option(\"-fno-pie\");\n  255 |         }\n  256 |         rustc_target::spec::RelocModel::Pic => {\n  257 |             context.add_command_line_option(\"-fPIC\");\n  258 |             // NOTE: we use both add_command_line_option and add_driver_option because the usage in\n  259 |             // base (compile_codegen_unit) requires add_command_line_option while the usage\n  260 |             // in the back::write module (codegen) requires add_driver_option.\n  261 |             context.add_driver_option(\"-fPIC\");\n  262 |         }\n  263 |         rustc_target::spec::RelocModel::Pie => {\n  264 |             context.add_command_line_option(\"-fPIE\");\n  265 |             context.add_driver_option(\"-fPIE\");\n  266 |         }\n  267 |         model => eprintln!(\"Unsupported relocation model: {:?}\", model),\n  268 |     }\n  269 | }","lines":20,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/gcc_util.rs#L250-L269"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `codegen_intrinsic_call`, `result_place.unwrap()` is taken unconditionally at the top, before dispatch. Intrinsics whose result is a unit/never type may legitimately be called with `result_place == None`; the early unwrap turns that into an ICE instead of being handled per-arm. Most arms that `return ... WroteIntoPlace`/`Fallback` never touch `result`, so building the `PlaceRef` eagerly is both wasteful and a latent panic source.","fix":"Only unwrap `result_place` in the arms that actually write a result (the fall-through store at the bottom), or use `expect` with a message documenting the invariant that codegen always supplies a place for these intrinsics.","locations":[{"ref":"src/intrinsic/mod.rs:203","code":"  203 |         let result = PlaceRef { val: result_place.unwrap(), layout: result_layout };","lines":1,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/intrinsic/mod.rs#L203"}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`simd_funnel_shift` ends with `unimplemented!(\"funnel shift on {:?}\", elem_type)` for any element type that is not an 8/16/32/64-bit integer (e.g. i128/u128). `unimplemented!` panics the compiler (ICE) rather than emitting a proper InvalidMonomorphization diagnostic, unlike the rest of this file which uses `return_error!`. A 128-bit-element funnel shift would ICE.","fix":"Plumb the span/name through and emit an InvalidMonomorphization::UnsupportedOperation (or similar) diagnostic instead of `unimplemented!`, consistent with the other unsupported-element-type paths.","locations":[{"ref":"src/intrinsic/simd.rs:1708-1710","code":" 1708 |     } else {\n 1709 |         unimplemented!(\"funnel shift on {:?}\", elem_type);\n 1710 |     };","lines":3,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/intrinsic/simd.rs#L1708-L1710"}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`load_libgccjit_if_needed` panics with `panic!(\"Cannot load libgccjit.so: {}\", error)` and `init` panics listing attempted paths. These are user-facing failure modes (wrong sysroot/library path) handled via raw `panic!` rather than a proper session fatal diagnostic, producing an ICE-style backtrace instead of a clean compiler error.","fix":"Emit a fatal session diagnostic (sess.dcx().fatal(...)) for the missing/unloadable libgccjit case so the user sees a clean error rather than a panic/backtrace.","locations":[{"ref":"src/lib.rs:180-193","code":"  180 | fn load_libgccjit_if_needed(libgccjit_target_lib_file: &Path) {\n  181 |     if gccjit::is_loaded() {\n  182 |         // Do not load a libgccjit second time.\n  183 |         return;\n  184 |     }\n  185 | \n  186 |     let path = libgccjit_target_lib_file.to_str().expect(\"libgccjit path\");\n  187 | \n  188 |     let string = CString::new(path).expect(\"string to libgccjit path\");\n  189 | \n  190 |     if let Err(error) = gccjit::load(&string) {\n  191 |         panic!(\"Cannot load libgccjit.so: {}\", error);\n  192 |     }\n  193 | }","lines":14,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/lib.rs#L180-L193"},{"ref":"src/lib.rs:223-231","code":"  223 |         if !gccjit::is_loaded() {\n  224 |             let mut paths = vec![];\n  225 |             for path in sess.opts.sysroot.all_paths() {\n  226 |                 let libgccjit_target_lib_file = file_path(path, sess);\n  227 |                 paths.push(libgccjit_target_lib_file);\n  228 |             }\n  229 | \n  230 |             panic!(\"Could not load libgccjit.so. Attempted paths: {:#?}\", paths);\n  231 |         }","lines":9,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/lib.rs#L223-L231"}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"Debug-dump side effects use `let _ = fs::create_dir(\"/tmp/reproducers\")` / `\"/tmp/gccjit_dumps\"` and hardcode absolute `/tmp` paths. These are non-portable (no $TMPDIR, fails on non-Unix), and discarding the create_dir result means a failure other than already-exists (e.g. /tmp not writable) is masked and the subsequent `dump_*_to_file` will then fail. These are debug-only env-gated paths, so impact is low.","fix":"Use `std::env::temp_dir()` joined with a subdir, and ignore only `AlreadyExists` errors while surfacing others.","locations":[{"ref":"src/back/write.rs:96-108","code":"   96 |                     println!(\"Dumping reproducer {}\", module.name);\n   97 |                     let _ = fs::create_dir(\"/tmp/reproducers\");\n   98 |                     // FIXME(antoyo): segfault in dump_reproducer_to_file() might be caused by\n   99 |                     // transmuting an rvalue to an lvalue.\n  100 |                     // Segfault is actually in gcc::jit::reproducer::get_identifier_as_lvalue\n  101 |                     context.dump_reproducer_to_file(format!(\"/tmp/reproducers/{}.c\", module.name));\n  102 |                     println!(\"Dumped reproducer {}\", module.name);\n  103 |                 }\n  104 |                 if env::var(\"CG_GCCJIT_DUMP_TO_FILE\").as_deref() == Ok(\"1\") {\n  105 |                     let _ = fs::create_dir(\"/tmp/gccjit_dumps\");\n  106 |                     let path = &format!(\"/tmp/gccjit_dumps/{}.c\", module.name);\n  107 |                     context.set_debug_info(true);\n  108 |                     context.dump_to_file(path, true);","lines":13,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/back/write.rs#L96-L108"}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"The catch-all `unimplemented!(\"simd {}\", name)` at the end of `generic_simd_intrinsic` panics (ICE) for any unhandled SIMD intrinsic symbol instead of emitting a user-facing diagnostic. This is an existing convention but means an unrecognized/unsupported simd intrinsic crashes the compiler rather than producing an error.","fix":"Emit InvalidMonomorphization::UnrecognizedIntrinsic (already used by simd_simple_float_intrinsic) instead of `unimplemented!`.","locations":[{"ref":"src/intrinsic/simd.rs:1677","code":" 1677 |     unimplemented!(\"simd {}\", name);","lines":1,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/intrinsic/simd.rs#L1677"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"operation_with_overflow rebuilds the full FnAbi (layout_of, adjust_for_foreign_abi) on EVERY call to determine whether the return is passed indirectly, and re-creates the extern function and three parameters each time. For i128 add/sub/mul-overflow this query+function-creation happens at every use site. layout_of and adjust_for_foreign_abi are non-trivial; this is per-callsite overhead that could be cached by width.","fix":"Cache the (ret_indirect, fn signature) per width on the CodegenCx, or compute the indirect-return decision once.","locations":[{"ref":"src/int.rs:333-410","code":"  333 |     pub fn operation_with_overflow(\n  334 |         &self,\n  335 |         func_name: &str,\n  336 |         lhs: RValue<'gcc>,\n  337 |         rhs: RValue<'gcc>,\n  338 |         width: u64,\n  339 |     ) -> (RValue<'gcc>, RValue<'gcc>) {\n  340 |         let a_type = lhs.get_type();\n  341 |         let b_type = rhs.get_type();\n  342 |         debug_assert!(a_type.dyncast_array().is_some());\n  343 |         debug_assert!(b_type.dyncast_array().is_some());\n  344 |         let overflow_type = self.i32_type;\n  345 |         let overflow_param_type = overflow_type.make_pointer();\n  346 |         let res_type = a_type;\n  347 | \n  348 |         let overflow_value =\n  349 |             self.current_func().new_local(self.location, overflow_type, \"overflow\");\n  350 |         let overflow_addr = overflow_value.get_address(self.location);\n  351 | \n  352 |         let param_a = self.context.new_parameter(self.location, a_type, \"a\");\n  353 |         let param_b = self.context.new_parameter(self.location, b_type, \"b\");\n  354 |         let param_overflow =\n  355 |             self.context.new_parameter(self.location, overflow_param_type, \"overflow\");\n  356 | \n  357 |         let a_elem_type = a_type.dyncast_array().expect(\"non-array a value\");\n  358 |         debug_assert!(a_elem_type.is_integral());\n  359 |         let res_ty = match width {\n  360 |             32 => self.tcx.types.i32,\n  361 |             64 => self.tcx.types.i64,\n  362 |             128 => self.tcx.types.i128,\n  363 |             _ => unreachable!(\"unexpected integer size\"),\n  364 |         };\n  365 |         let layout = self\n  366 |             .tcx\n  367 |             .layout_of(ty::TypingEnv::fully_monomorphized().as_query_input(res_ty))\n  368 |             .unwrap();\n  369 | \n  370 |         let arg_abi = ArgAbi { layout, mode: PassMode::Direct(ArgAttributes::new()) };\n  371 |         let mut fn_abi = FnAbi {\n  372 |             args: vec![arg_abi.clone(), arg_abi.clone(), arg_abi.clone()].into_boxed_slice(),\n  373 |             ret: arg_abi,\n  374 |             c_variadic: false,\n  375 |             fixed_count: 3,\n  376 |             conv: CanonAbi::C,\n  377 |             can_unwind: false,\n  378 |         };\n  379 |         fn_abi.adjust_for_foreign_abi(self.cx, ExternAbi::C { unwind: false });\n  380 | \n  381 |         let ret_indirect = matches!(fn_abi.ret.mode, PassMode::Indirect { .. });\n  382 | \n  383 |         let call = if ret_indirect {\n  384 |             let res_value = self.current_func().new_local(self.location, res_type, \"result_value\");\n  385 |             let res_addr = res_value.get_address(self.location);\n  386 |             let res_param_type = res_type.make_pointer();\n  387 |             let param_res = self.context.new_parameter(self.location, res_param_type, \"result\");\n  388 | \n  389 |             let func = self.context.new_function(\n  390 |                 self.location,\n  391 |                 FunctionType::Extern,\n  392 |                 self.type_void(),\n  393 |                 &[param_res, param_a, param_b, param_overflow],\n  394 |                 func_name,\n  395 |                 false,\n  396 |             );\n  397 |             let _void =\n  398 |                 self.context.new_call(self.location, func, &[res_addr, lhs, rhs, overflow_addr]);\n  399 |             res_value.to_rvalue()\n  400 |         } else {\n  401 |             let func = self.context.new_function(\n  402 |                 self.location,\n  403 |                 FunctionType::Extern,\n  404 |                 res_type,\n  405 |                 &[param_a, param_b, param_overflow],\n  406 |                 func_name,\n  407 |                 false,\n  408 |             );\n  409 |             self.context.new_call(self.location, func, &[lhs, rhs, overflow_addr])\n  410 |         };","lines":78,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/int.rs#L333-L410"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`adjust_function` distinguishes the two LLVM intrinsics that share a GCC builtin by formatting the rounding-mode argument with `format!(\"{:?}\", args[3])` and testing whether the debug string `ends_with(\"255\")`. Matching on the textual debug representation of an RValue is fragile: any change in gccjit's Debug impl, or a constant like 1255 / 4255, would silently select the wrong builtin. It also indexes `args[3]` unconditionally.","fix":"Extract the immediate integer value of `args[3]` through the gccjit API (or thread the rounding mode through from the caller) and compare it numerically to 255 instead of string-matching the Debug output.","locations":[{"ref":"src/intrinsic/llvm.rs:95-115","code":"   95 |     // FIXME: we should not need this hack: this is required because both _mm_fcmadd_sch\n   96 |     // and _mm_mask3_fcmadd_round_sch calls llvm.x86.avx512fp16.mask.vfcmadd.csh and we\n   97 |     // seem to need to map this one LLVM intrinsic to 2 different GCC builtins.\n   98 |     #[cfg(feature = \"master\")]\n   99 |     match func_name {\n  100 |         \"__builtin_ia32_vfcmaddcsh_mask3_round\" => {\n  101 |             if format!(\"{:?}\", args[3]).ends_with(\"255\") {\n  102 |                 return context\n  103 |                     .get_target_builtin_function(\"__builtin_ia32_vfcmaddcsh_mask_round\")\n  104 |                     .get_address(None);\n  105 |             }\n  106 |         }\n  107 |         \"__builtin_ia32_vfmaddcsh_mask3_round\" => {\n  108 |             if format!(\"{:?}\", args[3]).ends_with(\"255\") {\n  109 |                 return context\n  110 |                     .get_target_builtin_function(\"__builtin_ia32_vfmaddcsh_mask_round\")\n  111 |                     .get_address(None);\n  112 |             }\n  113 |         }\n  114 |         _ => (),\n  115 |     }","lines":21,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/intrinsic/llvm.rs#L95-L115"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`ModuleBuffer::data` always returns an empty slice `&[]`, and `ModuleBufferMethods::data` is the trait method cg_llvm uses to read the serialized module bytes. The actual data lives in the file at `ModuleBuffer(PathBuf)`. Any generic ssa code that calls `.data()` on this buffer (e.g. to hash or embed bitcode) will silently operate on zero bytes. This is a latent correctness trap if upstream ssa starts relying on the method.","fix":"Either read and return the file contents (memory-mapped) from `data()`, or document clearly (and assert) that this backend never routes through `data()` and combines object files via file paths instead.","locations":[{"ref":"src/back/lto.rs:266-278","code":"  266 | pub struct ModuleBuffer(PathBuf);\n  267 | \n  268 | impl ModuleBuffer {\n  269 |     pub fn new(path: PathBuf) -> ModuleBuffer {\n  270 |         ModuleBuffer(path)\n  271 |     }\n  272 | }\n  273 | \n  274 | impl ModuleBufferMethods for ModuleBuffer {\n  275 |     fn data(&self) -> &[u8] {\n  276 |         &[]\n  277 |     }\n  278 | }","lines":13,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/back/lto.rs#L266-L278"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"call() transmutes an RValue into a Function via std::mem::transmute and then linearly scans `self.functions.borrow().values()` to decide whether it is a defined function or a function pointer. The transmute relies on the two gccjit handles being layout-identical (a fragile invariant the FIXME notes), and the linear scan over all functions runs on every single call instruction - O(functions) per call site.","fix":"Replace the linear `.values().any()` scan with a set/hashset membership test keyed by the raw handle, and isolate/justify the transmute behind a safe helper once the gccjit API distinguishes function values.","locations":[{"ref":"src/builder.rs:1794-1803","code":" 1794 |         // FIXME(antoyo): remove when having a proper API.\n 1795 |         let gcc_func = unsafe { std::mem::transmute::<RValue<'gcc>, Function<'gcc>>(func) };\n 1796 |         let call = if self.functions.borrow().values().any(|value| *value == gcc_func) {\n 1797 |             // FIXME(antoyo): remove when the API supports a different type for functions.\n 1798 |             let func: Function<'gcc> = self.cx.rvalue_as_function(func);\n 1799 |             self.function_call(func, args, funclet)\n 1800 |         } else {\n 1801 |             // If it's a not function that was defined, it's a function pointer.\n 1802 |             self.function_ptr_call(typ, fn_abi, func, args, funclet)\n 1803 |         };","lines":10,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/builder.rs#L1794-L1803"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`dbg_loc` passes the line and column to `new_location` as `line as i32` / `col as i32`. `line`/`col` are `u32`; for files with more than 2^31 lines/columns this truncates to a negative value. Practically unreachable for real source files, but the cast is an unchecked narrowing of an externally-influenced value (line numbers come from source maps).","fix":"These values are tiny in practice; if defensiveness is desired, clamp to `i32::MAX` rather than casting. Otherwise document the assumption.","locations":[{"ref":"src/debuginfo.rs:298-305","code":"  298 |         let DebugLoc { file, line, col } = self.lookup_debug_loc(pos);\n  299 |         match file.name {\n  300 |             rustc_span::FileName::Real(ref name) => self.context.new_location(\n  301 |                 name.path(rustc_span::RemapPathScopeComponents::DEBUGINFO).to_string_lossy(),\n  302 |                 line as i32,\n  303 |                 col as i32,\n  304 |             ),\n  305 |             _ => Location::null(),","lines":8,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/debuginfo.rs#L298-L305"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`type_ptr_to_ext` / `type_i8p_ext` ignore the `address_space` parameter entirely (FIXME present), so all pointers collapse to the default address space. In `const_alloc_to_gcc_uncached` the per-allocation `address_space` is computed (line 350) and threaded into `type_i8p_ext` and the scalar conversion, but it is then dropped, meaning pointers into non-default address spaces are mistyped. Tracked by FIXME but can produce wrong codegen on targets that use multiple address spaces.","fix":"Honor address_space when libgccjit gains support (TYPE_ADDR_SPACE), or document that only the default address space is currently supported and assert others are unused.","locations":[{"ref":"src/type_.rs:68-79","code":"   68 |     pub fn type_ptr_to_ext(&self, ty: Type<'gcc>, _address_space: AddressSpace) -> Type<'gcc> {\n   69 |         // FIXME(antoyo): use address_space, perhaps with TYPE_ADDR_SPACE?\n   70 |         ty.make_pointer()\n   71 |     }\n   72 | \n   73 |     pub fn type_i8p(&self) -> Type<'gcc> {\n   74 |         self.type_ptr_to(self.type_i8())\n   75 |     }\n   76 | \n   77 |     pub fn type_i8p_ext(&self, address_space: AddressSpace) -> Type<'gcc> {\n   78 |         self.type_ptr_to_ext(self.type_i8(), address_space)\n   79 |     }","lines":12,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/type_.rs#L68-L79"},{"ref":"src/consts.rs:350-362","code":"  350 |         let address_space = cx.tcx.global_alloc(alloc_id).address_space(cx);\n  351 | \n  352 |         llvals.push(cx.scalar_to_backend(\n  353 |             InterpScalar::from_pointer(\n  354 |                 interpret::Pointer::new(prov, Size::from_bytes(ptr_offset)),\n  355 |                 &cx.tcx,\n  356 |             ),\n  357 |             abi::Scalar::Initialized {\n  358 |                 value: Primitive::Pointer(address_space),\n  359 |                 valid_range: WrappingRange::full(dl.pointer_size()),\n  360 |             },\n  361 |             cx.type_i8p_ext(address_space),\n  362 |         ));","lines":13,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/consts.rs#L350-L362"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"Throughout simd.rs many builder calls pass `None` as the source location (e.g. new_cast/new_rvalue_from_vector/new_bitcast), while a few pass `bx.location` (e.g. lines 157, 577, 616, 655). The inconsistency means most generated SIMD code carries no debug-location info even when `bx.location` is available, degrading debuginfo for SIMD intrinsics.","fix":"Prefer passing `bx.location` consistently where available instead of `None`, so emitted SIMD operations retain source locations.","locations":[{"ref":"src/intrinsic/simd.rs:112-119","code":"  112 |         let mut elements = vec![];\n  113 |         let one = bx.context.new_rvalue_one(mask.get_type());\n  114 |         for _ in 0..len {\n  115 |             let element = bx.context.new_cast(None, mask & one, mask_element_type);\n  116 |             elements.push(element);\n  117 |             mask = mask >> one;\n  118 |         }\n  119 |         let vector_mask = bx.context.new_rvalue_from_vector(None, vector_mask_type, &elements);","lines":8,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/intrinsic/simd.rs#L112-L119"},{"ref":"src/intrinsic/simd.rs:280-289","code":"  280 |     let simd_ctpop = |bx: &mut Builder<'a, 'gcc, 'tcx>, vector: RValue<'gcc>| -> RValue<'gcc> {\n  281 |         let mut vector_elements = vec![];\n  282 |         let elem_ty = bx.element_type(llret_ty);\n  283 |         for i in 0..in_len {\n  284 |             let index = bx.context.new_rvalue_from_long(bx.ulong_type, i as i64);\n  285 |             let element = bx.extract_element(vector, index).t mon.rs#L209-L215"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`is_native_int_type` rebuilds an 8-element `[Type; 8]` array and loops with `is_compatible_with` on every call. This is invoked very frequently throughout codegen (it is also called by `is_native_int_type_or_bool` and `is_int_type_or_bool`). The array construction and linear scan are pure overhead on a hot path.","fix":"Hoist the candidate list out of the function (e.g. a method that compares against the cached fields directly via a short-circuiting boolean expression) so no temporary array is allocated/scanned per call, or precompute a set/flag once.","locations":[{"ref":"src/context.rs:322-342","code":"  322 |     pub fn is_native_int_type(&self, typ: Type<'gcc>) -> bool {\n  323 |         let types = [\n  324 |             self.u8_type,\n  325 |             self.u16_type,\n  326 |             self.u32_type,\n  327 |             self.u64_type,\n  328 |             self.i8_type,\n  329 |             self.i16_type,\n  330 |             self.i32_type,\n  331 |             self.i64_type,\n  332 |         ];\n  333 | \n  334 |         for native_type in types {\n  335 |             if native_type.is_compatible_with(typ) {\n  336 |                 return true;\n  337 |             }\n  338 |         }\n  339 | \n  340 |         self.supports_128bit_integers\n  341 |             && (self.u128_type.is_compatible_with(typ) || self.i128_type.is_compatible_with(typ))\n  342 |     }","lines":21,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/context.rs#L322-L342"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"gcc_icmp builds 9 new basic blocks plus a local for EVERY 128-bit integer comparison, even for simple IntEQ/IntNE which only need a low-word and high-word equality compare. The full compiler-rt __cmpti2 three-way ladder (block severity":"low","easy":false,"description":"Comment claims the rotate implementation 'generates efficient code for other platforms' and uses a branchless algorithm, but the lowering ignores the fact that GCC has rotate patterns; more importantly `rotate_left`/`rotate_right` compute `-n & (width-1)` which is only correct when `width` is a power of two. All integer widths here are powers of two so it is correct in practice, but the masking is silently wrong for any non-power-of-two width, which is a latent trap if this helper is ever reused.","fix":"Document the power-of-two precondition on `rotate_left`/`rotate_right`, or compute the counter-rotation as `(width - shift) % width` instead of `-shift & (width-1)` to be correct for arbitrary widths.","locations":[{"ref":"src/intrinsic/mod.rs:1194-1223","code":" 1194 |     fn rotate_left(\n 1195 |         &mut self,\n 1196 |         value: RValue<'gcc>,\n 1197 |         shift: RValue<'gcc>,\n 1198 |         width: u64,\n 1199 |     ) -> RValue<'gcc> {\n 1200 |         let max = self.const_uint(shift.get_type(), width);\n 1201 |         let shift = self.urem(shift, max);\n 1202 |         let lhs = self.shl(value, shift);\n 1203 |         let result_neg = self.neg(shift);\n 1204 |         let result_and = self.and(result_neg, self.const_uint(shift.get_type(), width - 1));\n 1205 |         let rhs = self.lshr(value, result_and);\n 1206 |         self.or(lhs, rhs)\n 1207 |     }\n 1208 | \n 1209 |     // Algorithm from: https://blog.regehr.org/archives/1063\n 1210 |     fn rotate_right(\n 1211 |         &mut self,\n 1212 |         value: RValue<'gcc>,\n 1213 |         shift: RValue<'gcc>,\n 1214 |         width: u64,\n 1215 |     ) -> RValue<'gcc> {\n 1216 |         let max = self.const_uint(shift.get_type(), width);\n 1217 |         let shift = self.urem(shift, max);\n 1218 |         let lhs = self.lshr(value, shift);\n 1219 |         let result_neg = self.neg(shift);\n 1220 |         let result_and = self.and(result_neg, self.const_uint(shift.get_type(), width - 1));\n 1221 |         let rhs = self.shl(value, result_and);\n 1222 |         self.or(lhs, rhs)\n 1223 |     }","lines":30,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/intrinsic/mod.rs#L1194-L1223"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In the `arith_red!` macro, the unordered integer reduction path computes `bx.vector_reduce_op(args[0].immediate(), $vec_op)` into `r` (line 1358) and then, in the `else` (unordered) branch, computes the very same reduction a second time at line 1364 instead of reusing `r`. This emits the reduction twice for every unordered integer reduce (simd_reduce_add_unordered / simd_reduce_mul_unordered).","fix":"Reuse `r` in the unordered branch: `Ok(r)` instead of recomputing `bx.vector_reduce_op(args[0].immediate(), $vec_op)`.","locations":[{"ref":"src/intrinsic/simd.rs:1356-1366","code":" 1356 |                 return match *in_elem.kind() {\n 1357 |                     ty::Int(_) | ty::Uint(_) => {\n 1358 |                         let r = bx.vector_reduce_op(args[0].immediate(), $vec_op);\n 1359 |                         if $ordered {\n 1360 |                             // if overflow occurs, the result is the\n 1361 |                             // mathematical result modulo 2^n:\n 1362 |                             Ok(bx.$op(args[1].immediate(), r))\n 1363 |                         } else {\n 1364 |                             Ok(bx.vector_reduce_op(args[0].immediate(), $vec_op))\n 1365 |                         }\n 1366 |                     }","lines":11,"link":"https://github.com/rust-lang/rustc_codegen_gcc/blob/b7a98d190b6d08a5c3ca42c217790b371cea2e85/src/intrinsic/simd.rs#L1356-L1366"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`show_usage` in test.rs calls `get_runners()` to build the full  each call rather than reusing the cached type fields already on CodegenCx (cx.u64_type etc.). The function-level FIXME already flags the broader inefficiency.","fix":"Reuse the precomputed `cx.u64_type`/`u32_type`/`u8_type` fields instead of `context.new_type::<u64>()` etc., and evaluate the suggested `global_set_initializer` path per the existing FIXME.","locations":[{"ref":"src/common.rs:51-111","code":"   51 | pub fn bytes_in_context<'gcc, 'tcx>(cx: &CodegenCx<'gcc, 'tcx>, bytes: &[u8]) -> RValue<'gcc> {\n   52 |     // Instead of always using an array of bytes, use an array of larger integers of target endianness\n   53 |     // if possible. This reduces the amount of `rvalues` we use, which reduces memory usage significantly.\n   54 |     //\n   55 |     // FIXME(FractalFir): Consider using `global_set_initializer` instead. Before this is done, we need to confirm that\n   56 |     // `global_set_initializer` is more memory efficient than the current solution.\n   57 |     // `global_set_initializer` calls `global_set_initializer_rvalue` under the hood - does it generate an array of rvalues,\n   58 |     // or is it using a more efficient representation?\n   59 |     match bytes.len() % 8 {\n   60 |         0 => {\n   61 |             let context = &cx.context;\n   62 |             let byte_type = context.new_type::<u64>();\n   63 |             let typ = new_array_type(context, None, byte_type, bytes.len() as u64 / 8);\n   64 |             let elements: Vec<_> = bytes\n   65 |                 .chunks_exact(8)\n   66 |                 .map(|arr| {\n   67 |                     let arr: [u8; 8] = arr.try_into().unwrap();\n   68 |                     context.new_rvalue_from_long(\n   69 |                         byte_type,\n   70 |                         // Since we are representing arbitrary byte runs as integers, we need to follow the target\n   71 |                         // endianness.\n   72 |                         match cx.sess().target.options.endian {\n
