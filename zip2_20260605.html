<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"`AesReader::new` computes `data_length` as `compressed_size - (PWD_VERIFY_LENGTH + AUTH_CODE_LENGTH + aes_mode.salt_length())` using plain `u64` subtraction. `compressed_size` comes directly from untrusted archive metadata (`data.compressed_size`, see src/read/readers.rs:220 and src/read/zip_archive.rs:239). For any AES entry whose declared compressed size is smaller than the fixed AES overhead (e.g. salt 8/12/16 + 2 verify + 10 auth = 20/24/28 bytes), this subtraction underflows: in debug builds it panics, and in release builds it wraps to a near-`u64::MAX` value. A wrapped `data_length` then makes `AesReaderValid::read` try to read an essentially unbounded amount of data, turning a malformed entry into a denial-of-service / huge allocation vector instead of a clean error.","fix":"Make `new` fallible (return `ZipResult`) and use `compressed_size.checked_sub(overhead)`, returning an `InvalidArchive`/`InvalidData` error when the declared size is smaller than the required AES overhead instead of subtracting unconditionally.","locations":[{"ref":"src/aes.rs:143-152","code":"  143 |     pub const fn new(reader: R, aes_mode: AesMode, compressed_size: u64) -> AesReader<R> {\n  144 |         let data_length = compressed_size\n  145 |             - (PWD_VERIFY_LENGTH + AUTH_CODE_LENGTH + aes_mode.salt_length()) as u64;\n  146 | \n  147 |         Self {\n  148 |             reader,\n  149 |             aes_mode,\n  150 |             data_length,\n  151 |         }\n  152 |     }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"`sym_idx` is computed as `(offset_first_sym_idx[l] as usize + bits as usize) & 0xFFFF` and then\nused to index `self.syms`, which has only `MAX_HUFFMAN_SYMBOLS == 288` entries. `offset_first_sym_idx`\nis stored via `wrapping_sub` (huffman.rs:86) so it can be any 16-bit value; masking to `0xFFFF`\nkeeps the index in `0..=65535`, far beyond the 288-element array. The original C code had an\n`assert(sym_idx < num_syms)` here but it is commented out (line 164), and `num_syms` is not even\nstored. A crafted-but-\"full\" Huffman table can drive `sym_idx >= 288`, causing an out-of-bounds\nindex panic.","fix":"Store `num_syms` (= n) in the decoder during `init` and return an InvalidData error when `sym_idx >= num_syms` instead of indexing blindly; the `& 0xFFFF` mask hides the bug rather than fixing it.","locations":[{"ref":"src/legacy/huffman.rs:160-168","code":"  160 |         for l in (HUFFMAN_LOOKUP_TABLE_BITS as usize + 1)..=MAX_HUFFMAN_BITS {\n  161 |             if u32::from(bits) < self.sentinel_bits[l] {\n  162 |                 bits >>= MAX_HUFFMAN_BITS - l;\n  163 |                 let sym_idx = (self.offset_first_sym_idx[l] as usize + bits as usize) & 0xFFFF;\n  164 |                 //assert(sym_idx < self.num_syms);\n  165 |                 is.seek_bits(io::SeekFrom::Current(\n  166 |                     -(read_bits1 as i64 + read_bits2 as i64) + l as i64,\n  167 |                 ))?;\n  168 |                 return Ok(self.syms[sym_idx]);"},{"ref":"src/legacy/huffman.rs:28","code":"   28 |     pub syms: [u16; MAX_HUFFMAN_SYMBOLS],"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"In the known-length branch of `output_code`, the table entry's `last_dst_pos`/`len` are trusted\nand used to index `dst` directly: `for i in ct.last_dst_pos..ct.last_dst_pos + ct.len` then\n`dst.push(dst[i])`, followed by `dst[ct.last_dst_pos]`. After a PARTIAL_CLEAR the code table can\nhold stale `last_dst_pos`/`len` pairs that point past the current end of `dst`, so `dst[i]` /\n`dst[ct.last_dst_pos]` can index out of bounds and panic on crafted shrink data.","fix":"Bounds-check `ct.last_dst_pos + ct.len as usize <= dst.len()` before the copy loop and return InvalidData otherwise.","locations":[{"ref":"src/legacy/shrink.rs:170-177","code":"  170 |     if codetab[code as usize].len != UNKNOWN_LEN {\n  171 |         // Output string with known length (the common case).\n  172 |         let ct = &codetab[code as usize];\n  173 |         for i in ct.last_dst_pos..ct.last_dst_pos + ct.len as usize {\n  174 |             dst.push(dst[i]);\n  175 |         }\n  176 |         return Ok(dst[ct.last_dst_pos]);\n  177 |     }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"In the unknown-length branch of `output_code`, `let first = dst[start];` and\n`dst.extend_from_within(start..start + len)` use `start = prefix entry.last_dst_pos` and\n`len = prefix entry.len` taken straight from the (attacker-influenced, possibly partially-cleared)\ncode table without verifying `start < dst.len()` or `start + len <= dst.len()`. Crafted shrink\ndata can make `start`/`len` reference positions beyond `dst`, causing an out-of-bounds panic.","fix":"Validate `start < dst.len()` and `start + len <= dst.len()` before reading/extending; return an InvalidData error on violation.","locations":[{"ref":"src/legacy/shrink.rs:217-223","code":"  217 |     let ct = codetab[prefix_code as usize];\n  218 |     let last_dst_pos = dst.len();\n  219 |     let start = ct.last_dst_pos;\n  220 |     let len = ct.len as usize;\n  221 |     let first = dst[start];\n  222 |     dst.extend_from_within(start..start + len);\n  223 |     dst.push(codetab[code as usize].ext_byte);"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"During extraction, symlink targets are read into a buffer pre-sized with the\nattacker-controlled uncompressed size: `Vec::with_capacity(file.size() as usize)`.\n`file.size()` is the uncompressed_size field straight from the (ZIP64) header and can be\nset to an enormous value (up to u64::MAX) independent of the actual stored data, causing a\nhuge speculative allocation / capacity-overflow panic (memory-exhaustion DoS) from a tiny\ncrafted archive. The same pattern exists in the streaming extractor.","fix":"Do not pre-size from the declared size; use `Vec::new()` (or cap the pre-allocation, e.g. `min(size, reasonable_limit)`) and let `read_to_end` grow it, optionally enforcing a maximum symlink length.","locations":[{"ref":"src/read/mod.rs:400-402","code":"  400 |             if file.is_symlink() {\n  401 |                 let mut target = Vec::with_capacity(file.size() as usize);\n  402 |                 file.read_to_end(&mut target)?;"},{"ref":"src/read/stream.rs:72-74","code":"   72 |                 if file.is_symlink() {\n   73 |                     let mut target = Vec::with_capacity(file.size() as usize);\n   74 |                     file.read_to_end(&mut target)?;"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"set_raw_comment uses comment.split_at(max_comment_len). split_at panics if max_comment_len > comment.len(), but here it is only reached when comment.len() > max_comment_len, so it is safe; however the function still assigns self.comment to the truncated prefix AND returns an Err. Callers that ignore the error see a silently truncated comment, while callers that treat it as failure get an inconsistent state (comment already mutated). This is misleading error handling, not a clean failure.","fix":"Either truncate-and-return-Ok, or return Err WITHOUT mutating self.comment. Do not do both. Document the chosen behavior.","locations":[{"ref":"src/write.rs:1062-1074","code":" 1062 |     pub fn set_raw_comment(&mut self, comment: Box<[u8]>) -> ZipResult<()> {\n 1063 |         let max_comment_len = u16::MAX as usize; // 65,535\n 1064 |         if comment.len() <= max_comment_len {\n 1065 |             self.comment = comment;\n 1066 |             return Ok(());\n 1067 |         }\n 1068 |         let (allowed, rest) = comment.split_at(max_comment_len);\n 1069 |         self.comment = allowed.into();\n 1070 |         Err(ZipError::Io(std::io::Error::new(\n 1071 |             std::io::ErrorKind::InvalidData,\n 1072 |             format!(\"Unexpected data comment - {} bytes too long\", rest.len()),\n 1073 |         )))\n 1074 |     }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","description":"`AesReaderValid::read` advances the HMAC and decrypts based on `read = self.reader.read(...)`, where `read <= bytes_to_read <= data_remaining`, so `data_remaining -= read as u64` cannot underflow given a well-behaved inner reader. However, a misbehaving inner `Read` implementation that returns a `count` larger than the provided buffer length would cause `&buf[0..read]` slicing to panic and `data_remaining` accounting to go wrong. This is a contract-violation edge but, in a security module handling untrusted/streamed data through arbitrary reader stacks, defensively clamping `read` would harden it.","fix":"Clamp/assert `read <= bytes_to_read` before slicing and subtracting, e.g. `let read = read.min(bytes_to_read);` to avoid panics or accounting corruption from a non-conforming inner reader.","locations":[{"ref":"src/aes.rs:253-261","code":"  253 |         let bytes_to_read = self.data_remaining.min(buf.len() as u64) as usize;\n  254 |         let read = self.reader.read(&mut buf[0..bytes_to_read])?;\n  255 |         self.data_remaining -= read as u64;\n  256 | \n  257 |         // Update the hmac with the encrypted data\n  258 |         self.hmac.update(&buf[0..read]);\n  259 | \n  260 |         // decrypt the data\n  261 |         self.cipher.crypt_in_place(&mut buf[0..read]);"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"`from_date_and_time` uses `_ => unreachable!()` in the month-to-max-day match (line 293). It is guarded by `(1..=12).contains(&month)` checked just above, so it is currently unreachable. However it is a latent panic: any future edit that reorders the validation, or that calls this match logic from another path without the 1..=12 guard, turns malformed input into a panic. Defensive code parsing untrusted ZIP fields should avoid unreachable!() on value-derived branches.","fix":"Return Err(DateTimeRangeError) in the fallthrough arm instead of unreachable!(), keeping the function total over all u8 month values.","locations":[{"ref":"src/datetime.rs:288-294","code":"  288 |             let max_day = match month {\n  289 |                 1 | 3 | 5 | 7 | 8 | 10 | 12 => 31,\n  290 |                 4 | 6 | 9 | 11 => 30,\n  291 |                 2 if Self::is_leap_year(year) => 29,\n  292 |                 2 => 28,\n  293 |                 _ => unreachable!(),\n  294 |             };"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"`ReduceDecoder::read` and `ImplodeDecoder::read` compute `available = self.stream.len() - self.read_pos`\nwith plain subtraction. `ShrinkDecoder::read` correctly uses `saturating_sub`. While `read_pos`\nis only advanced by `bytes_to_read <= available`, the inconsistency is fragile; any future change\nthat lets `read_pos` exceed `stream.len()` (or a 0-length buffer edge case) panics here whereas\nshrink does not.","fix":"Use `saturating_sub` consistently as in `ShrinkDecoder::read` (shrink.rs:354).","locations":[{"ref":"src/legacy/reduce.rs:221","code":"  221 |         let available = self.stream.len() - self.read_pos;"},{"ref":"src/legacy/implode.rs:226","code":"  226 |         let available = self.stream.len() - self.read_pos;"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"`safe_prepare_path` computes `i == components_len - 1` inside the iterator map. If\n`components` is empty, `components_len - 1` underflows (panics in debug, wraps to\nusize::MAX in release). The enumerate/map closure is only invoked when there is at least one\nelement, so the immediate body is safe, but the expression is evaluated lazily per element;\nthe real risk is the brittleness of `components_len - 1`. An empty component list can arise\nfrom `simplified_components` of a degenerate name.","fix":"Use `components.len().checked_sub(1)` or compare with `i + 1 == components_len` to avoid the underflow entirely.","locations":[{"ref":"src/read/zipfile.rs:151-157","code":"  151 |         let components_len = components.len();\n  152 | \n  153 |         for (is_last, component) in components\n  154 |             .iter()\n  155 |             .enumerate()\n  156 |             .map(|(i, c)| (i == components_len - 1, c))\n  157 |         {"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"`ZipFile::drop` only drains the reader (to position the underlying stream past the entry)\nwhen `self.data` is `Cow::Owned` (the streaming case). For the seekable `ZipArchive` case\n`data` is `Cow::Borrowed`, so dropping a partially-read `ZipFile` leaves the shared reader at\nan arbitrary position. That is by design (next `by_index` seeks explicitly), but combined\nwith `take_raw_reader` swapping in `NoReader`, any decompression/decryption error mid-read\nleaves no draining and relies entirely on callers re-seeking — worth documenting; a caller\nmixing `by_index_seek`/manual seeks after a dropped partial read can read from the wrong\noffset.","fix":"Document the invariant clearly, or always reset/seek the borrowed reader to a known state on drop in debug builds to catch misuse.","locations":[{"ref":"src/read/zipfile.rs:380-391","code":"  380 | impl<R: Read + ?Sized> Drop for ZipFile<'_, R> {\n  381 |     fn drop(&mut self) {\n  382 |         // self.data is Owned, this reader is constructed by a streaming reader.\n  383 |         // In this case, we want to exhaust the reader so that the next file is accessible.\n  384 |         if let Cow::Owned(_) = self.data {\n  385 |             // Get the inner `Take` reader so all decryption, decompression and CRC calculation is skipped.\n  386 |             if let Ok(mut inner) = self.take_raw_reader() {\n  387 |                 let _ = copy(&mut inner, &mut sink());\n  388 |             }\n  389 |         }\n  390 |     }\n  391 | }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"`length - is.position_in_bits()?` is an unchecked `u64` subtraction. `length` is the total\nbit length of the stream. After the lookup-table branch seeks forward by\n`-(read_bits1) + table[..].len` (line 146-148), the bit position can be advanced *past* the\nend of the stream when fewer than `table.len` bits remained (read_bits1 was clamped to the\nremaining bits, but the codeword length used to advance is not). On the next call to\n`huffman_decode`, `position_in_bits() > length`, so this subtraction underflows and panics\n(debug) / produces a huge `read_var` count (release). Reachable from crafted imploded data\nnear the end of the stream.","fix":"Use `length.saturating_sub(is.position_in_bits()?)` and treat a zero remainder as end-of-stream (return an InvalidData error) instead of continuing to decode.","locations":[{"ref":"src/legacy/huffman.rs:141-148","code":"  141 |         let read_bits1 = u64::from(HUFFMAN_LOOKUP_TABLE_BITS).min(length - is.position_in_bits()?);\n  142 |         let lookup_bits = !is.read_var::<u8>(read_bits1 as u32)? as usize;\n  143 |         debug_assert!(lookup_bits < self.table.len());\n  144 |         if self.table[lookup_bits].len != 0 {\n  145 |             debug_assert!(self.table[lookup_bits].len <= HUFFMAN_LOOKUP_TABLE_BITS);\n  146 |             is.seek_bits(io::SeekFrom::Current(\n  147 |                 -(read_bits1 as i64) + i64::from(self.table[lookup_bits].len),\n  148 |             ))?;"},{"ref":"src/legacy/huffman.rs:153","code":"  153 |         let read_bits2 = u64::from(HUFFMAN_LOOKUP_TABLE_BITS).min(length - is.position_in_bits()?);"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"`has_overlapping_files` computes `let end = start + file.compressed_size;` with a plain\nunchecked addition. Both `start` (the data offset, derived from attacker-controlled\nheader_start / file name / extra-field lengths) and `compressed_size` (attacker-controlled,\nup to u64::MAX via a ZIP64 extra field) come from the archive. In a release build this wraps,\nproducing a bogus (possibly tiny) `end`, which then makes the overlap detection give wrong\nresults; in a debug build it panics. This is reachable from any caller of\n`has_overlapping_files` on a crafted archive.","fix":"Use `start.checked_add(file.compressed_size).ok_or(invalid!(\"overlap offset overflow\"))?` and treat overflow as an invalid archive.","locations":[{"ref":"src/read/zip_archive.rs:367-382","code":"  367 |     pub fn has_overlapping_files(&mut self) -> ZipResult<bool> {\n  368 |         let mut ranges = Vec::<Range<u64>>::with_capacity(self.shared.files.len());\n  369 |         for file in self.shared.files.values() {\n  370 |             if file.compressed_size == 0 {\n  371 |                 continue;\n  372 |             }\n  373 |             let start = file.data_start(&mut self.reader)?;\n  374 |             let end = start + file.compressed_size;\n  375 |             if ranges\n  376 |                 .iter()\n  377 |                 .any(|range| range.start <= end && start <= range.end)\n  378 |             {\n  379 |                 return Ok(true);\n  380 |             }\n  381 |             ranges.push(start..end);\n  382 |         }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`SeekableTake::seek` performs `self.inner_starting_offset + clamped_offset` with an\nunchecked addition. `inner_starting_offset` is the data start within the file and\n`clamped_offset` is a user-supplied seek position clamped only to `self.length` (the\nattacker-controlled compressed_size). For a large compressed_size and large starting\noffset this overflows u64 (panic in debug, wrap in release leading to a seek to the wrong\nabsolute position).","fix":"Use `inner_starting_offset.checked_add(clamped_offset)` and return an `InvalidInput` io::Error on overflow.","locations":[{"ref":"src/read/readers.rs:46-53","code":"   46 |             Some(offset) => {\n   47 |                 let clamped_offset = std::cmp::min(self.length, offset);\n   48 |                 let new_inner_offset = self\n   49 |                     .inner\n   50 |                     .seek(SeekFrom::Start(self.inner_starting_offset + clamped_offset))?;\n   51 |                 self.current_offset = new_inner_offset - self.inner_starting_offset;\n   52 |                 Ok(self.current_offset)\n   53 |             }"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`codetab[prev_code as usize].len + 1` (and the analogous `prev_entry.len + 1`) add 1 to a `u16`\nlength without checking for `u16::MAX`. With `UNKNOWN_LEN == u16::MAX`, a chain that legitimately\nor maliciously builds a string of length `u16::MAX - 1` would wrap to 0 (release) or panic\n(debug). The same unchecked `+1` appears in three places.","fix":"Use `checked_add` / `saturating_add` and reject lengths that reach `UNKNOWN_LEN`, or bound the total output by `uncompressed_size` so such lengths are unreachable.","locations":[{"ref":"src/legacy/shrink.rs:204","code":"  204 |             len: codetab[prev_code as usize].len + 1,"},{"ref":"src/legacy/shrink.rs:280","code":"  280 |                 len: codetab[prev_code as usize].len + 1,"},{"ref":"src/legacy/shrink.rs:299","code":"  299 |                     prev_entry.len + 1"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`SeekableTake::read` computes the remaining length as `self.length - self.current_offset`.\nThis relies on the invariant `current_offset <= length`. `seek` clamps to `length`, but\n`current_offset` is set from `new_inner_offset - self.inner_starting_offset` where\n`new_inner_offset` is whatever the underlying reader returns; a misbehaving/odd inner\nreader (or one seeked before the starting offset) can make this subtraction underflow and\nthen the read length subtraction underflow as well.","fix":"Use saturating/checked subtraction for both `current_offset` computation and the remaining-length calculation, and validate that `new_inner_offset >= inner_starting_offset`.","locations":[{"ref":"src/read/readers.rs:51","code":"   51 |                 self.current_offset = new_inner_offset - self.inner_starting_offset;"},{"ref":"src/read/readers.rs:58-66","code":"   58 | impl<R: Read + ?Sized> Read for SeekableTake<'_, R> {\n   59 |     fn read(&mut self, buf: &mut [u8]) -> io::Result<usize> {\n   60 |         let written = self\n   61 |             .inner\n   62 |             .take(self.length - self.current_offset)\n   63 |             .read(buf)?;\n   64 |         self.current_offset += written as u64;\n   65 |         Ok(written)\n   66 |     }"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`try_read_eocd64` computes `z64.record_size + Zip64CentralDirectoryEnd::RECORD_OVERHEAD` with unchecked addition. record_size is attacker-controlled (parsed from the file). It is bounded earlier in `Zip64CentralDirectoryEnd::parse` by `record_size.saturating_add(RECORD_OVERHEAD) > max_size`, so in practice it cannot reach u64::MAX, making a real overflow unreachable; however the unchecked `+` relies on that distant invariant and would wrap in debug builds if the bound were ever relaxed.","fix":"Use `z64.record_size.checked_add(Zip64CentralDirectoryEnd::RECORD_OVERHEAD)` and treat overflow as an inconsistent-length error, or compare via subtraction against expected_length to avoid the add.","locations":[{"ref":"src/spec.rs:865-883","code":"  865 |         fn try_read_eocd64<R: Read + Seek + ?Sized>(\n  866 |             reader: &mut R,\n  867 |             locator64: &Zip64CentralDirectoryEndLocator,\n  868 |             expected_length: u64,\n  869 |         ) -> ZipResult<Zip64CentralDirectoryEnd> {\n  870 |             let z64 = Zip64CentralDirectoryEnd::parse(reader, expected_length)?;\n  871 | \n  872 |             // Consistency check: EOCD64 locator should agree with the EOCD64\n  873 |             if z64.disk_with_central_directory != locator64.disk_with_central_directory {\n  874 |                 return Err(invalid!(\"Invalid EOCD64: inconsistency with Locator data\"));\n  875 |             }\n  876 | \n  877 |             // Consistency check: the EOCD64 must have the expected length\n  878 |             if z64.record_size + Zip64CentralDirectoryEnd::RECORD_OVERHEAD != expected_length {\n  879 |                 return Err(invalid!(\"Invalid EOCD64: inconsistent length\"));\n  880 |             }\n  881 | \n  882 |             Ok(z64)\n  883 |         }"},{"ref":"src/spec.rs:632-636","code":"  632 |         if record_size < (Self::MIN_SIZE - size_of::<Magic>()) as u64 {\n  633 |             return Err(invalid!(\"Low EOCD64 record size\"));\n  634 |         } else if record_size.saturating_add(Self::RECORD_OVERHEAD) > max_size {\n  635 |             return Err(invalid!(\"EOCD64 extends beyond EOCD64 locator\"));\n  636 |         }"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"add_extra_data_unchecked writes data.len() as u16 without bounds checking. It is pub(crate); callers in this file pass small/bounded buffers, but the only guard for the public add_extra_data path is the combined-size check. A 0-length-after-truncation field would be written if a >u16::MAX slice ever reached here, corrupting the extra-field stream silently.","fix":"Add a debug_assert!(data.len() <= u16::MAX as usize) or return an error if data.len() exceeds u16::MAX instead of truncating.","locations":[{"ref":"src/write.rs:400-410","code":"  400 |     pub(crate) fn add_extra_data_unchecked(\n  401 |         vec: &mut Vec<u8>,\n  402 |         header_id: u16,\n  403 |         data: &[u8],\n  404 |     ) -> Result<(), ZipError> {\n  405 |         vec.reserve_exact(data.len() + size_of::<u16>() + size_of::<u16>());\n  406 |         vec.write_u16_le(header_id)?;\n  407 |         vec.write_u16_le(data.len() as u16)?;\n  408 |         vec.write_all(data)?;\n  409 |         Ok(())\n  410 |     }"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`Crc32Reader::read` only validates the CRC32 when a `read` call returns `count == 0` with a non-empty buffer (`if count == 0 && !buf.is_empty() && !self.check_matches()`). This means integrity is only verified if the consumer keeps calling `read` until it observes a final 0-length return. Many consumers stop reading once they have the expected number of bytes (e.g. reading exactly `uncompressed_size`) and never issue the trailing 0-read, so a corrupted/tampered payload passes with no CRC error. Additionally, an inner reader that legitimately returns 0 mid-stream (allowed by the `Read` contract) would trigger a spurious checksum failure. The CRC enforcement is thus both unreliable (can be bypassed) and fragile.","fix":"Drive verification off a known expected length (compare bytes consumed against the entry's uncompressed size) and verify the CRC when that length is reached, rather than relying on the consumer to observe a terminal 0-length read. Do not treat any mid-stream 0-byte read as EOF.","locations":[{"ref":"src/crc32.rs:46-57","code":"   46 | impl<R: Read> Read for Crc32Reader<R> {\n   47 |     fn read(&mut self, buf: &mut [u8]) -> io::Result<usize> {\n   48 |         let count = self.inner.read(buf)?;\n   49 | \n   50 |         if self.enabled {\n   51 |             if count == 0 && !buf.is_empty() && !self.check_matches() {\n   52 |                 return Err(invalid_checksum!());\n   53 |             }\n   54 |             self.hasher.update(&buf[..count]);\n   55 |         }\n   56 |         Ok(count)\n   57 |     }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`path_to_string` uses `str::contains` with array arguments to try to detect the\nsubstrings \"//\", \"/./\" and \"/../\", but the array pattern `['x','y',...]` matches\nANY of the listed *single chars*, not the sequence. So\n`original.contains([MAIN_SEPARATOR, MAIN_SEPARATOR])` is equivalent to\n`original.contains(MAIN_SEPARATOR)`, and `original.contains([MAIN_SEPARATOR, '.', MAIN_SEPARATOR])`\nis true whenever the string contains a separator OR a dot. Verified with rustc:\n`\"abc/def\".contains(['/', '.', '/'])` returns `true` even though there is no \"/./\".\nThe net effect is that for any path that contains a separator (essentially every\nmulti-component path with a leading separator), the `maybe_original` fast path is\nnever taken and the function always falls back to recreating from components. The\nintended substring checks are dead, and the fast-path optimization is effectively\ndisabled.","fix":"Use real substring checks against the separator string, e.g. build\n`let sep = MAIN_SEPARATOR.to_string();` and test\n`!original.contains(&format!(\"{sep}{sep}\"))`, `!original.contains(&format!(\"{sep}.{sep}\"))`,\n`!original.contains(&format!(\"{sep}..{sep}\"))`. Or normalize once via the component\nloop and drop the brittle fast path entirely.","locations":[{"ref":"src/unstable.rs:117-124","code":"  117 |             } else if (MAIN_SEPARATOR == '/' || !original[1..].contains(MAIN_SEPARATOR))\n  118 |                 && !original.ends_with('.')\n  119 |                 && !original.contains([MAIN_SEPARATOR, MAIN_SEPARATOR])\n  120 |                 && !original.contains([MAIN_SEPARATOR, '.', MAIN_SEPARATOR])\n  121 |                 && !original.contains([MAIN_SEPARATOR, '.', '.', MAIN_SEPARATOR])\n  122 |             {\n  123 |                 maybe_original = Some(&original[1..]);\n  124 |             }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In the Write impl, the large-file threshold check fetches self.files.last() to read large_file. When writing_raw is true (e.g. raw_copy_file, merge_archive, deep_copy_file set writing_to_file=true) the 'last' file may not be the entry currently receiving bytes, or its large_file flag may not reflect the raw entry, so a >4GiB raw copy without large_file can either spuriously abort or skip the check. The check also keys off self.stats.bytes_written which is reset per start_entry, coupling correctness to that bookkeeping.","fix":"Track the index of the currently-open entry explicitly instead of assuming files.last(); skip the large-file abort when writing_raw is set (raw copies carry pre-validated sizes).","locations":[{"ref":"src/write.rs:791-812","code":"  791 |                     // Only perform the expensive large-file check when we first cross the threshold.\n  792 |                     if self.stats.bytes_written > spec::ZIP64_BYTES_THR {\n  793 |                         let is_large_file = self\n  794 |                             .files\n  795 |                             .last()\n  796 |                             .ok_or_else(|| std::io::Error::other(\"Cannot get last file\"))?\n  797 |                             .1\n  798 |                             .large_file;\n  799 |                         if !is_large_file {\n  800 |                             return Err(if let Err(e) = self.abort_file() {\n  801 |                                 let abort_io_err: io::Error = e.into();\n  802 |                                 io::Error::new(\n  803 |                                     abort_io_err.kind(),\n  804 |                                     format!(\n  805 |                                         \"Large file option has not been set and abort_file() failed: {abort_io_err}\"\n  806 |                                     ),\n  807 |                                 )\n  808 |                             } else {\n  809 |                                 io::Error::other(\"Large file option has not been set\")\n  810 |                             });\n  811 |                         }\n  812 |                     }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`Crc32Reader::read` skips both CRC updating and the final check whenever `buf.is_empty()` (the `count == 0 && !buf.is_empty()` guard). More importantly, when `enabled` is true but the consumer reads via plain `read` and finishes exactly at the buffer boundary, the hasher is only `update`d for non-terminal reads and the comparison is gated on a 0-length terminal read. Combined with the streaming `read` path (vs. `read_to_end`/`read_to_string`, which do verify), this means the integrity guarantee depends entirely on read pattern. The `read_to_end`/`read_to_string` overrides verify correctly, but the base `read` is the one used by most generic copy loops only if they hit the terminal 0-read, which is not guaranteed.","fix":"Unify verification so the CRC is checked deterministically once all expected bytes have passed through, independent of whether the caller uses `read`, `read_to_end`, or `read_to_string`, and independent of observing a terminal zero-length read.","locations":[{"ref":"src/crc32.rs:46-86","code":"   46 | impl<R: Read> Read for Crc32Reader<R> {\n   47 |     fn read(&mut self, buf: &mut [u8]) -> io::Result<usize> {\n   48 |         let count = self.inner.read(buf)?;\n   49 | \n   50 |         if self.enabled {\n   51 |             if count == 0 && !buf.is_empty() && !self.check_matches() {\n   52 |                 return Err(invalid_checksum!());\n   53 |             }\n   54 |             self.hasher.update(&buf[..count]);\n   55 |         }\n   56 |         Ok(count)\n   57 |     }\n   58 | \n   59 |     fn read_to_end(&mut self, buf: &mut Vec<u8>) -> io::Result<usize> {\n   60 |         let start = buf.len();\n   61 |         let n = self.inner.read_to_end(buf)?;\n   62 | \n   63 |         if self.enabled {\n   64 |             self.hasher.update(&buf[start..]);\n   65 |             if !self.check_matches() {\n   66 |                 return Err(invalid_checksum!());\n   67 |             }\n   68 |         }\n   69 | \n   70 |         Ok(n)\n   71 |     }\n   72 | \n   73 |     fn read_to_string(&mut self, buf: &mut String) -> io::Result<usize> {\n   74 |         let start = buf.len();\n   75 |         let n = self.inner.read_to_string(buf)?;\n   76 | \n   77 |         if self.enabled {\n   78 |             self.hasher.update(&buf.as_bytes()[start..]);\n   79 |             if !self.check_matches() {\n   80 |                 return Err(invalid_checksum!());\n   81 |             }\n   82 |         }\n   83 | \n   84 |         Ok(n)\n   85 |     }\n   86 | }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`try_from_msdos` cannot round-trip all values produced by `from_date_and_time`/`from_msdos_unchecked` and silently rejects legitimately-stored timestamps. The 5-bit seconds field holds seconds/2 (0..=31), so the decoded `seconds` value at line 246 ranges 0..=62. But `from_date_and_time` (called at the end of `try_from_msdos`) rejects any `second > 60` (line 284). Therefore an MS-DOS timepart whose seconds field is 31 (=> 62 seconds) is rejected as invalid, even though such a value is representable and may appear in real archives. Concretely `is_valid()` returns false and `last_modified_time` becomes `None` for these entries.","fix":"In try_from_msdos, clamp/round the decoded seconds (e.g. `seconds.min(58)`) before calling from_date_and_time, or relax the second<=60 bound so the full 0..=62 decoded range is accepted. The seconds value is internal-format-derived and should not be re-validated with the user-facing 0..=60 rule.","locations":[{"ref":"src/datetime.rs:245-260","code":"  245 |     pub fn try_from_msdos(datepart: u16, timepart: u16) -> Result<DateTime, DateTimeRangeError> {\n  246 |         let seconds = (timepart & 0b0000_0000_0001_1111) << 1;\n  247 |         let minutes = (timepart & 0b0000_0111_1110_0000) >> 5;\n  248 |         let hours = (timepart & 0b1111_1000_0000_0000) >> 11;\n  249 |         let days = datepart & 0b0000_0000_0001_1111;\n  250 |         let months = (datepart & 0b0000_0001_1110_0000) >> 5;\n  251 |         let years = (datepart & 0b1111_1110_0000_0000) >> 9;\n  252 |         Self::from_date_and_time(\n  253 |             years.checked_add(1980).ok_or(DateTimeRangeError)?,\n  254 |             months.try_into()?,\n  255 |             days.try_into()?,\n  256 |             hours.try_into()?,\n  257 |             minutes.try_into()?,\n  258 |             seconds.try_into()?,\n  259 |         )\n  260 |     }"},{"ref":"src/datetime.rs:279-305","code":"  279 |         if (1980..=2107).contains(&year)\n  280 |             && (1..=12).contains(&month)\n  281 |             && (1..=31).contains(&day)\n  282 |             && hour <= 23\n  283 |             && minute <= 59\n  284 |             && second <= 60\n  285 |         {\n  286 |             // DOS/ZIP timestamp stores seconds/2 in 5 bits and cannot represent 59 or 60 seconds (incl. leap seconds)\n  287 |             let second = second.min(58);\n  288 |             let max_day = match month {\n  289 |                 1 | 3 | 5 | 7 | 8 | 10 | 12 => 31,\n  290 |                 4 | 6 | 9 | 11 => 30,\n  291 |                 2 if Self::is_leap_year(year) => 29,\n  292 |                 2 => 28,\n  293 |                 _ => unreachable!(),\n  294 |             };\n  295 |             if day > max_day {\n  296 |                 return Err(DateTimeRangeError);\n  297 |             }\n  298 |             let datepart = u16::from(day) | (u16::from(month) << 5) | ((year - 1980) << 9);\n  299 |             let timepart =\n  300 |                 (u16::from(second) >> 1) | (u16::from(minute) << 5) | (u16::from(hour) << 11);\n  301 |             Ok(DateTime { datepart, timepart })\n  302 |         } else {\n  303 |             Err(DateTimeRangeError)\n  304 |         }\n  305 |     }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The ZIP64 parser decides whether each 64-bit field is present using\n`len >= 24 || base_size == ZIP64_BYTES_THR`. When a local-header ZIP64 field is\nwritten with a forced size block whose base 32-bit fields are NOT the 0xFFFFFFFF\nsentinel (e.g. `Zip64ExtendedInformation::new_local`/`local_header` force-emit the\nblock when `is_large_file` is true even though the file is not actually large), the\nincoming `len` is 16 (two u64s) and neither `uncompressed_size == ZIP64_BYTES_THR`\nnor `compressed_size == ZIP64_BYTES_THR`. Because `len >= 24` is false and neither\nsentinel matches, both 64-bit sizes are skipped as \"leftover\" and silently\ndiscarded instead of being parsed back. This breaks round-tripping of forced\n(non-large) local ZIP64 size blocks.","fix":"Drive field presence off the declared `len` (consume u64s while `len - consumed >= 8`\nin the documented order) rather than mixing `len >= 24` with sentinel comparisons,\nso that any well-formed size block is parsed regardless of whether the base fields\nheld the 0xFFFFFFFF sentinel.","locations":[{"ref":"src/extra_fields/zip64_extended_information.rs:174-214","code":"  174 |         let new_uncompressed_size = if len >= 24 || uncompressed_size == ZIP64_BYTES_THR {\n  175 |             let new_uncompressed_size = match reader.read_u64_le() {\n  176 |                 Ok(v) => v,\n  177 |                 Err(e) if e.kind() == ErrorKind::UnexpectedEof => {\n  178 |                     return Err(invalid!(\"ZIP64 extra field truncated\"));\n  179 |                 }\n  180 |                 Err(e) => return Err(e.into()),\n  181 |             };\n  182 |             consumed_len += mem::size_of::<u64>();\n  183 |             new_uncompressed_size\n  184 |         } else {\n  185 |             uncompressed_size\n  186 |         };\n  187 | \n  188 |         let new_compressed_size = if len >= 24 || compressed_size == ZIP64_BYTES_THR {\n  189 |             let new_compressed_size = match reader.read_u64_le() {\n  190 |                 Ok(v) => v,\n  191 |                 Err(e) if e.kind() == ErrorKind::UnexpectedEof => {\n  192 |                     return Err(invalid!(\"ZIP64 extra field truncated\"));\n  193 |                 }\n  194 |                 Err(e) => return Err(e.into()),\n  195 |             };\n  196 |             consumed_len += mem::size_of::<u64>();\n  197 |             new_compressed_size\n  198 |         } else {\n  199 |             compressed_size\n  200 |         };\n  201 | \n  202 |         let new_header_start = if len >= 24 || header_start == ZIP64_BYTES_THR {\n  203 |             let new_header_start = match reader.read_u64_le() {\n  204 |                 Ok(v) => v,\n  205 |                 Err(e) if e.kind() == ErrorKind::UnexpectedEof => {\n  206 |                     return Err(invalid!(\"ZIP64 extra field truncated\"));\n  207 |                 }\n  208 |                 Err(e) => return Err(e.into()),\n  209 |             };\n  210 |             consumed_len += mem::size_of::<u64>();\n  211 |             new_header_start\n  212 |         } else {\n  213 |             header_start\n  214 |         };"},{"ref":"src/extra_fields/zip64_extended_information.rs:38-72","code":"   38 |     pub(crate) fn new_local(is_large_file: bool) -> Option<Self> {\n   39 |         if is_large_file {\n   40 |             Self::local_header(true, u64::MAX, u64::MAX)\n   41 |         } else {\n   42 |             None\n   43 |         }\n   44 |     }\n   45 | \n   46 |     /// This entry in the Local header MUST include BOTH original and compressed file size fields\n   47 |     /// If the user is using `is_large_file` when the file is not large we force the zip64 extra field\n   48 |     pub(crate) fn local_header(\n   49 |         is_large_file: bool,\n   50 |         uncompressed_size: u64,\n   51 |         compressed_size: u64,\n   52 |     ) -> Option<Self> {\n   53 |         // here - we force if `is_large_file` is `true`\n   54 |         let should_add_size = is_large_file\n   55 |             || uncompressed_size >= ZIP64_BYTES_THR\n   56 |             || compressed_size >= ZIP64_BYTES_THR;\n   57 |         if !should_add_size {\n   58 |             return None;\n   59 |         }\n   60 |         let uncompressed_size = Some(uncompressed_size);\n   61 |         let compressed_size = Some(compressed_size);\n   62 | \n   63 |         // TODO: (unsupported for now)\n   64 |         // Disk Start Number  4 bytes    Number of the disk on which this file starts\n   65 | \n   66 |         Some(Self {\n   67 |             is_local_header: true,\n   68 |             uncompressed_size,\n   69 |             compressed_size,\n   70 |             header_start: None,\n   71 |         })\n   72 |     }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`CodeQueue::new()` populates codes for the range `(CONTROL_CODE+1)..=(MAX_CODE-1)`, i.e. it\nomits `MAX_CODE` (8191) from the free-code queue entirely. The original unshrink algorithm makes\ncodes `257..=MAX_CODE` available. If this exclusion is intentional it is undocumented and\ninconsistent with `unshrink_partial_clear`, which uses `(CONTROL_CODE+1)..MAX_CODE` (also\nexcluding MAX_CODE) — but both differ from the constant `FREE_CODE_QUEUE_SIZE`, leaving two\ntrailing queue slots permanently unused. At minimum this is an off-by-one inconsistency that may\ndrop a usable dictionary code.","fix":"Decide the intended inclusive upper bound for free codes and make `CodeQueue::new`, `unshrink_partial_clear`, and `FREE_CODE_QUEUE_SIZE` consistent; document why MAX_CODE is reserved if it is.","locations":[{"ref":"src/legacy/shrink.rs:29-31","code":"   29 |         for (i, code) in ((CONTROL_CODE as u16 + 1)..=(MAX_CODE as u16 - 1)).enumerate() {\n   30 |             codes[i] = Some(code);\n   31 |         }"},{"ref":"src/legacy/shrink.rs:91-98","code":"   91 |     for i in (CONTROL_CODE + 1)..MAX_CODE {\n   92 |         if !is_prefix[i] {\n   93 |             codetab[i].prefix_code = None;\n   94 |             queue.codes[code_queue_size] = Some(i as u16);\n   95 |             code_queue_size += 1;\n   96 |         }\n   97 |     }\n   98 |     queue.codes[code_queue_size] = None; // End-of-queue marker."},{"ref":"src/legacy/shrink.rs:13-15","code":"   13 | /// Number of codes available for the LZW dictionary (excluding control codes)\n   14 | /// These are the codes from CONTROL_CODE+1 to MAX_CODE\n   15 | const FREE_CODE_QUEUE_SIZE: usize = MAX_CODE - CONTROL_CODE + 1;"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`read_code` recurses on every control code (INC_CODE_SIZE / PARTIAL_CLEAR) via the tail call\n`return read_code(...)` (line 141). A crafted stream consisting of an unbounded run of\nPARTIAL_CLEAR control codes causes unbounded recursion with no tail-call-optimization guarantee\nin Rust, which can exhaust the stack and abort the process (stack overflow is not a catchable\npanic). This is a denial-of-service on untrusted input.","fix":"Convert the recursion into a loop so repeated control codes are processed iteratively without growing the call stack.","locations":[{"ref":"src/legacy/shrink.rs:119-143","code":"  119 |     // Handle control codes.\n  120 |     if let Ok(control_code) = is.read_var::<u16>(u32::from(*code_size)) {\n  121 |         match control_code {\n  122 |             INC_CODE_SIZE => {\n  123 |                 if *code_size >= MAX_CODE_SIZE {\n  124 |                     return Err(io::Error::new(\n  125 |                         io::ErrorKind::InvalidData,\n  126 |                         \"tried to increase code size when already at maximum\",\n  127 |                     ));\n  128 |                 }\n  129 |                 *code_size += 1;\n  130 |             }\n  131 |             PARTIAL_CLEAR => {\n  132 |                 unshrink_partial_clear(codetab, queue);\n  133 |             }\n  134 |             _ => {\n  135 |                 return Err(io::Error::new(\n  136 |                     io::ErrorKind::InvalidData,\n  137 |                     format!(\"Invalid control code {}\", control_code),\n  138 |                 ));\n  139 |             }\n  140 |         }\n  141 |         return read_code(is, code_size, codetab, queue);\n  142 |     }\n  143 |     Ok(None)"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`ZipStreamReader::visit` drains the central directory with\n`while let Ok(metadata) = self.parse_central_directory() { ... }`. Using `while let Ok` means\nthe loop terminates on the *first* error and discards it entirely, including real parse\nerrors (truncated/corrupt central headers) — they are indistinguishable from the normal\n\"reached end of central directory\" termination. A malformed central directory is therefore\nsilently treated as a successful, complete visit.","fix":"Loop until a sentinel/EOF is reached and propagate genuine parse errors instead of treating every `Err` as a clean stop; e.g. detect the end-of-central-directory signature explicitly.","locations":[{"ref":"src/read/stream.rs:52-54","code":"   52 |         while let Ok(metadata) = self.parse_central_directory() {\n   53 |             visitor.visit_additional_metadata(&metadata)?;\n   54 |         }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `read_central_header`, the over-allocation guard compares the declared file count against\n`dir_info.directory_start` (an absolute byte offset that already includes `archive_offset`):\n`if dir_info.number_of_files > dir_info.directory_start as usize { 0 }`. The intent (per the\ntests) is to bound the count by how many central-directory entries could plausibly fit, but\ncomparing a count to a byte offset is a weak/incorrect heuristic: with `archive_offset`\nprepended the offset is inflated, so the guard can be bypassed (allowing a large\n`Vec::with_capacity`) while the real central directory is tiny. The subsequent\n`file_capacity * size_of::<ZipFileData>()` check is the only real backstop.","fix":"Bound the capacity by the actual available bytes between `directory_start` and the EOCD position divided by the minimum central-directory entry size, rather than by the raw byte offset value.","locations":[{"ref":"src/read/zip_archive.rs:184-201","code":"  184 |         // something fishy is going on and we shouldn't trust number_of_files.\n  185 |         let file_capacity = if dir_info.number_of_files > dir_info.directory_start as usize {\n  186 |             0\n  187 |         } else {\n  188 |             dir_info.number_of_files\n  189 |         };\n  190 | \n  191 |         if dir_info.disk_number != dir_info.disk_with_central_directory {\n  192 |             return Err(ZipError::UnsupportedArchive(\n  193 |                 \"Support for multi-disk files is not implemented\",\n  194 |             ));\n  195 |         }\n  196 | \n  197 |         if file_capacity.saturating_mul(size_of::<ZipFileData>()) > isize::MAX as usize {\n  198 |             return Err(ZipError::UnsupportedArchive(\"Oversized central directory\"));\n  199 |         }\n  200 | \n  201 |         let mut files = Vec::with_capacity(file_capacity);"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`read_central_header` allocates `Vec::with_capacity(file_capacity)` where `file_capacity`\nmay be clamped to 0, but then loops `for _ in 0..dir_info.number_of_files` reading the full\ndeclared count of entries regardless of `file_capacity`. So the over-allocation guard only\nprevents the up-front allocation; a crafted archive that claims a huge `number_of_files`\nstill drives an unbounded read loop (each iteration parses a central header and on a\ntruncated file eventually errors, but on a sufficiently large valid-looking region it can\npush many entries and grow the Vec without limit). The capacity clamp and the loop bound are\ninconsistent.","fix":"Iterate at most `file_capacity` (or otherwise bound the loop by the available bytes), and/or break out when the reader passes the EOCD position.","locations":[{"ref":"src/read/zip_archive.rs:201-206","code":"  201 |         let mut files = Vec::with_capacity(file_capacity);\n  202 |         reader.seek(SeekFrom::Start(dir_info.directory_start))?;\n  203 |         for _ in 0..dir_info.number_of_files {\n  204 |             let (file, file_name_raw) = central_header_to_zip_file(reader, dir_info)?;\n  205 |             files.push((file_name_raw, file));\n  206 |         }"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"deep_copy_file silently mutates the SOURCE file's compressed_size when it appears larger than the bytes available on disk. If a caller deep-copies a file while another shallow copy still references the original (or before finalize), this overwrites the legitimate metadata of the source entry, corrupting the central-directory record of the original file in the produced archive.","fix":"Compute a local clamped copy length for the read/copy without writing back into src_data.compressed_size; only adjust new_data.compressed_size on the destination clone.","locations":[{"ref":"src/write.rs:900-904","code":"  900 |         let mut compressed_size = src_data.compressed_size;\n  901 |         if compressed_size > (write_position - src_data_start) {\n  902 |             compressed_size = write_position - src_data_start;\n  903 |             src_data.compressed_size = compressed_size;\n  904 |         }"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The 2-byte password verification value is compared with `!=` (`pwd_verification_value != pwd_verify`), a non-constant-time comparison, unlike the auth-code path which correctly uses `constant_time_eq`. While only a 2-byte / 1-in-65536 check (the real integrity guarantee is the HMAC), comparing it in variable time over a `Vec<u8>` provides a marginal timing side channel on the derived verification bytes. For consistency and defense in depth in a security-sensitive module it should also be constant-time.","fix":"Use `constant_time_eq(&pwd_verification_value, pwd_verify)` (or the fixed-size `constant_time_eq_n`) for the password verification comparison as well.","locations":[{"ref":"src/aes.rs:184-187","code":"  184 |         if pwd_verification_value != pwd_verify {\n  185 |             // wrong password\n  186 |             return Err(ZipError::InvalidPassword);\n  187 |         }"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The `len == Self::MAX_LENGTH` (13) override conditions for reading the modified,\naccessed and created timestamps are effectively unreachable for mismatched flags.\nThe earlier validation `if len != 5 && u32::from(len) != 1 + 4 * flags.count_ones()`\nalready rejects `len == 13` unless `flags.count_ones() == 3`. So by the time control\nreaches the `|| len == Self::MAX_LENGTH` clauses, either all three flag bits are set\n(making the override redundant with the flag check) or len != 13. The override\nclauses therefore add no behavior and obscure the intent.","fix":"Remove the redundant `|| len == Self::MAX_LENGTH` clauses, or restructure the\nlocal-vs-central handling so the special-case is actually exercised and documented.","locations":[{"ref":"src/extra_fields/extended_timestamp.rs:83-134","code":"   83 |         if len != 5 && u32::from(len) != 1 + 4 * flags.count_ones() {\n   84 |             return Err(ZipError::Io(std::io::Error::other(format!(\n   85 |                 \"flags and len don't match in extended timestamp field len={len} flags={flags:08b}\"\n   86 |             ))));\n   87 |         }\n   88 | \n   89 |         let modified =\n   90 |             if (ExtendedTimestampFlags::matching(flags, ExtendedTimestampFlags::Modified)\n   91 |                 && bytes_to_read >= mem::size_of::<u32>())\n   92 |                 || len == Self::MAX_LENGTH\n   93 |             {\n   94 |                 bytes_to_read = bytes_to_read.checked_sub(mem::size_of::<u32>()).ok_or(\n   95 |                     invalid!(\n   96 |                         \"Extended timestamp field too short for mod_time len={} flags={flags:08b}\",\n   97 |                         len\n   98 |                     ),\n   99 |                 )?;\n  100 |                 Some(reader.read_u32_le()?)\n  101 |             } else {\n  102 |                 None\n  103 |             };\n  104 | \n  105 |         let accessed =\n  106 |             if (ExtendedTimestampFlags::matching(flags, ExtendedTimestampFlags::Accessed)\n  107 |                 && bytes_to_read >= mem::size_of::<u32>())\n  108 |                 || len == Self::MAX_LENGTH\n  109 |             {\n  110 |                 bytes_to_read = bytes_to_read.checked_sub(mem::size_of::<u32>()).ok_or(\n  111 |                     invalid!(\n  112 |                         \"Extended timestamp field too short for ac_time len={} flags={flags:08b}\",\n  113 |                         len\n  114 |                     ),\n  115 |                 )?;\n  116 |                 Some(reader.read_u32_le()?)\n  117 |             } else {\n  118 |                 None\n  119 |             };\n  120 | \n  121 |         let created = if (ExtendedTimestampFlags::matching(flags, ExtendedTimestampFlags::Created)\n  122 |             && bytes_to_read >= mem::size_of::<u32>())\n  123 |             || len == Self::MAX_LENGTH\n  124 |         {\n  125 |             bytes_to_read = bytes_to_read\n  126 |                 .checked_sub(mem::size_of::<u32>())\n  127 |                 .ok_or(invalid!(\n  128 |                     \"Extended timestamp field too short for cr_time len={} flags={flags:08b}\",\n  129 |                     len\n  130 |                 ))?;\n  131 |             Some(reader.read_u32_le()?)\n  132 |         } else {\n  133 |             None\n  134 |         };"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `central_header`, the header_start condition is\n`header_start != 0 && header_start >= ZIP64_BYTES_THR`. The `!= 0` term is dead:\n`ZIP64_BYTES_THR == u32::MAX`, so `header_start >= u32::MAX` already implies it is\nnon-zero. The redundant clause suggests confused intent (the surrounding\nuncompressed/compressed conditions do not have it).","fix":"Remove the redundant `header_start != 0 &&` and keep `header_start >= ZIP64_BYTES_THR`\nfor consistency with the other two fields.","locations":[{"ref":"src/extra_fields/zip64_extended_information.rs:93-98","code":"   93 |         let header_start = if header_start != 0 && header_start >= ZIP64_BYTES_THR {\n   94 |             size += mem::size_of::<u64>() as u16;\n   95 |             Some(header_start)\n   96 |         } else {\n   97 |             None\n   98 |         };"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`max_len`/`max_dist` and the `debug_assert!(len <= max_len(...))` / `debug_assert!(dist <= ...)`\nchecks are only active in debug builds. In release builds there is no validation that a decoded\nback-reference `len`/`dist` is within the algorithm's legal range; correctness/robustness relies\nsolely on the `len.min(uncomp_len - dst.len())` clamp and the implicit-zero fill path. The\nasserts therefore document invariants that are not actually enforced against malicious input.","fix":"Either remove the misleading debug_asserts or convert the bounds checks into real validation that returns InvalidData.","locations":[{"ref":"src/legacy/reduce.rs:146-147","code":"  146 |         debug_assert!(len <= max_len(comp_factor));\n  147 |         debug_assert!(dist <= max_dist(comp_factor));"},{"ref":"src/legacy/reduce.rs:79-91","code":"   79 | fn max_len(comp_factor: u8) -> usize {\n   80 |     debug_assert!((1..=4).contains(&comp_factor));\n   81 |     let v_len_bits = (8 - comp_factor) as usize;\n   82 |     // Bits in V + extra len byte + implicit 3.\n   83 |     ((1 << v_len_bits) - 1) + u8::MAX as usize + 3\n   84 | }\n   85 | \n   86 | fn max_dist(comp_factor: u8) -> usize {\n   87 |     debug_assert!((1..=4).contains(&comp_factor));\n   88 |     let v_dist_bits = comp_factor as usize;\n   89 |     // Bits in V * 256 + W byte + implicit 1. */\n   90 |     1 << (v_dist_bits + 8)\n   91 | }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`CentralDirectoryInfo::try_from` validates the ZIP64 case\n(`number_of_files_on_this_disk > number_of_files`) but for the non-ZIP64 fallback it takes\n`number_of_files_on_this_disk` as the authoritative count (line 152) while ignoring the\nEOCD's separate total `number_of_files` field. For a multi-segment-style EOCD where\non-this-disk differs from the total, this silently uses the per-disk count even though the\ndisk-number checks later assume single-disk. Inconsistent with the ZIP64 branch which uses\nthe archive-wide total.","fix":"Use the archive-wide total (or validate that the two counts agree) in the non-ZIP64 branch as well, consistent with the ZIP64 branch.","locations":[{"ref":"src/read/mod.rs:135-156","code":"  135 |         let (relative_cd_offset, number_of_files, disk_number, disk_with_central_directory) =\n  136 |             match &value.eocd64 {\n  137 |                 Some(DataAndPosition { data: eocd64, .. }) => {\n  138 |                     if eocd64.number_of_files_on_this_disk > eocd64.number_of_files {\n  139 |                         return Err(invalid!(\n  140 |                             \"ZIP64 footer indicates more files on this disk than in the whole archive\"\n  141 |                         ));\n  142 |                     }\n  143 |                     (\n  144 |                         eocd64.central_directory_offset,\n  145 |                         eocd64.number_of_files as usize,\n  146 |                         eocd64.disk_number,\n  147 |                         eocd64.disk_with_central_directory,\n  148 |                     )\n  149 |                 }\n  150 |                 _ => (\n  151 |                     u64::from(value.eocd.data.central_directory_offset),\n  152 |                     value.eocd.data.number_of_files_on_this_disk as usize,\n  153 |                     u32::from(value.eocd.data.disk_number),\n  154 |                     u32::from(value.eocd.data.disk_with_central_directory),\n  155 |                 ),\n  156 |             };"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Zip32CentralDirectoryEnd::into_block_and_comment` truncates the comment length with `zip_file_comment.len() as u16` (line 441). The over-length guard in `write` (line 482) is applied to the still-correct `comment` slice afterward and aborts before the truncated block is written, so the bug is currently masked. But `into_block_and_comment` is a standalone method; any future caller that uses the returned block without re-checking comment length would emit a header with a wrong (truncated) `zip_file_comment_length`.","fix":"Validate comment length (<= u16::MAX) inside into_block_and_comment and return a Result, or use try_into() instead of `as u16` so truncation cannot silently happen.","locations":[{"ref":"src/spec.rs:423-445","code":"  423 | impl Zip32CentralDirectoryEnd {\n  424 |     fn into_block_and_comment(self) -> (Zip32CDEBlock, Box<[u8]>) {\n  425 |         let Self {\n  426 |             disk_number,\n  427 |             disk_with_central_directory,\n  428 |             number_of_files_on_this_disk,\n  429 |             number_of_files,\n  430 |             central_directory_size,\n  431 |             central_directory_offset,\n  432 |             zip_file_comment,\n  433 |         } = self;\n  434 |         let block = Zip32CDEBlock {\n  435 |             disk_number,\n  436 |             disk_with_central_directory,\n  437 |             number_of_files_on_this_disk,\n  438 |             number_of_files,\n  439 |             central_directory_size,\n  440 |             central_directory_offset,\n  441 |             zip_file_comment_length: zip_file_comment.len() as u16,\n  442 |         };\n  443 | \n  444 |         (block, zip_file_comment)\n  445 |     }"},{"ref":"src/spec.rs:479-489","code":"  479 |     pub fn write<T: Write>(self, writer: &mut T) -> ZipResult<()> {\n  480 |         let (block, comment) = self.into_block_and_comment();\n  481 | \n  482 |         if comment.len() > u16::MAX as usize {\n  483 |             return Err(invalid!(\"EOCD comment length exceeds u16::MAX\"));\n  484 |         }\n  485 | \n  486 |         block.write(writer)?;\n  487 |         writer.write_all(&comment)?;\n  488 |         Ok(())\n  489 |     }"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The EOCD64 minimum-record-size check is too permissive. Per APPNOTE the `record_size` field counts all bytes after itself (i.e. excluding the 4-byte signature AND the 8-byte size field), so the minimum valid value equals `MIN_SIZE` (44). The check instead compares against `MIN_SIZE - size_of::<Magic>()` (= 40), accepting record_size values of 40..43 that are smaller than the fixed fields that were already parsed. This does not cause a panic (the extensible-data read is gated on `record_size > MIN_SIZE`), but it lets malformed EOCD64 records pass a consistency check they should fail.","fix":"Change the lower-bound check to `if record_size < Self::MIN_SIZE as u64 { return Err(invalid!(\"Low EOCD64 record size\")); }`.","locations":[{"ref":"src/spec.rs:608-636","code":"  608 | impl Zip64CentralDirectoryEnd {\n  609 |     /// Minimum size of the block\n  610 |     /// Block - record_size - extensible_data\n  611 |     const MIN_SIZE: usize = 2 * size_of::<u16>() + 2 * size_of::<u32>() + 4 * size_of::<u64>();\n  612 |     /// Size of ZIP64 EOCD signature + record_size field.\n  613 |     const RECORD_OVERHEAD: u64 = (size_of::<Magic>() + size_of::<u64>()) as u64;\n  614 | \n  615 |     pub(crate) fn parse<T: Read + ?Sized>(\n  616 |         reader: &mut T,\n  617 |         max_size: u64,\n  618 |     ) -> ZipResult<Zip64CentralDirectoryEnd> {\n  619 |         let Zip64CDEBlock {\n  620 |             record_size,\n  621 |             version_made_by,\n  622 |             version_needed_to_extract,\n  623 |             disk_number,\n  624 |             disk_with_central_directory,\n  625 |             number_of_files_on_this_disk,\n  626 |             number_of_files,\n  627 |             central_directory_size,\n  628 |             central_directory_offset,\n  629 |             ..\n  630 |         } = Zip64CDEBlock::parse(reader)?;\n  631 | \n  632 |         if record_size < (Self::MIN_SIZE - size_of::<Magic>()) as u64 {\n  633 |             return Err(invalid!(\"Low EOCD64 record size\"));\n  634 |         } else if record_size.saturating_add(Self::RECORD_OVERHEAD) > max_size {\n  635 |             return Err(invalid!(\"EOCD64 extends beyond EOCD64 locator\"));\n  636 |         }"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"new_append sets writing_raw = true but writing_to_file = false. The comment says this avoids recomputing the last file's header. If a caller then immediately calls a method that inspects writing_raw without an active file (some abort/finish paths), the stale writing_raw=true could cause finish_file to skip size/CRC fixups for a subsequently started entry if writing_raw is not reset; start_file_with_options resets it (line 1507) but start_entry/finish_file ordering means an abort between new_append and the first start_file leaves writing_raw=true.","fix":"Initialize writing_raw=false in new_append (the last-file header is already correct on disk for an appended archive) or explicitly reset writing_raw at the start of finish_file when writing_to_file is false.","locations":[{"ref":"src/write.rs:855-866","code":"  855 |         Ok(ZipWriter {\n  856 |             inner: GenericZipWriter::Storer(MaybeEncrypted::Unencrypted(readwriter)),\n  857 |             files: shared.files,\n  858 |             stats: ZipWriterStats::default(),\n  859 |             writing_to_file: false,\n  860 |             comment: shared.comment,\n  861 |             zip64_extensible_data_sector: shared.zip64_extensible_data_sector,\n  862 |             writing_raw: true, // avoid recomputing the last file's header\n  863 |             flush_on_finish_file: false,\n  864 |             seek_possible: true,\n  865 |             auto_large_file: false,\n  866 |         })"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"switch_to_non_encrypting_writer uses unreachable!() if inner is not a Storer variant (e.g. a Deflater/Bzip2 still active). finish_file calls switch_to(Stored) first so it is normally a Storer, but abort_file and add_directory rely on the same invariant; any future path that calls switch_to_non_encrypting_writer without first reducing to Storer will panic instead of returning a recoverable error.","fix":"Replace the unreachable!() arm with returning a ZipError (e.g. invalid!/io::Error) so a broken invariant degrades to an error rather than a panic in release-reachable code.","locations":[{"ref":"src/write.rs:1417-1436","code":" 1417 |     fn switch_to_non_encrypting_writer(&mut self) -> Result<(), ZipError> {\n 1418 |         self.inner = GenericZipWriter::Storer(\n 1419 |             match mem::replace(&mut self.inner, GenericZipWriter::Closed) {\n 1420 |                 #[cfg(feature = \"aes-crypto\")]\n 1421 |                 GenericZipWriter::Storer(MaybeEncrypted::Aes(writer)) => {\n 1422 |                     MaybeEncrypted::Unencrypted(writer.finish()?)\n 1423 |                 }\n 1424 |                 GenericZipWriter::Storer(MaybeEncrypted::ZipCrypto(writer)) => {\n 1425 |                     MaybeEncrypted::Unencrypted(writer.finish()?)\n 1426 |                 }\n 1427 |                 GenericZipWriter::Storer(MaybeEncrypted::Unencrypted(w)) => {\n 1428 |                     MaybeEncrypted::Unencrypted(w)\n 1429 |                 }\n 1430 |                 _ => unreachable!(\n 1431 |                     \"switch_to_non_encrypting_writer called with incompatible GenericZipWriter variant\"\n 1432 |                 ),\n 1433 |             },\n 1434 |         );\n 1435 |         Ok(())\n 1436 |     }"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`ZipCryptoReader::validate` checks only a single byte of the CRC/time check value (`(crc32_plaintext >> 24) as u8 != header_buf[11]`). This is inherent to the legacy ZipCrypto design (1-byte check, ~1/256 false-accept), but the comparison is also non-constant-time. ZipCrypto is cryptographically broken regardless, so impact is minimal, but the byte comparison leaks via timing and the module does not warn callers that a successful `validate` provides essentially no integrity/authentication guarantee.","fix":"This is a limitation of legacy ZipCrypto; document clearly that ZipCrypto provides no authentication and that validate() is a weak 1-byte check. Optionally use a constant-time byte comparison for consistency.","locations":[{"ref":"src/zipcrypto.rs:151-173","code":"  151 |         match validator {\n  152 |             ZipCryptoValidator::PkzipCrc32(crc32_plaintext) => {\n  153 |                 // PKZIP before 2.0 used 2 byte CRC check.\n  154 |                 // PKZIP 2.0+ used 1 byte CRC check. It's more secure.\n  155 |                 // We also use 1 byte CRC.\n  156 | \n  157 |                 if (crc32_plaintext >> 24) as u8 != header_buf[11] {\n  158 |                     return Err(ZipError::InvalidPassword);\n  159 |                 }\n  160 |             }\n  161 |             ZipCryptoValidator::InfoZipMsdosTime(last_mod_time) => {\n  162 |                 // Info-ZIP modification to ZipCrypto format:\n  163 |                 // If bit 3 of the general purpose bit flag is set\n  164 |                 // (indicates that the file uses a data-descriptor section),\n  165 |                 // it uses high byte of 16-bit File Time.\n  166 |                 // Info-ZIP code probably writes 2 bytes of File Time.\n  167 |                 // We check only 1 byte.\n  168 | \n  169 |                 if (last_mod_time >> 8) as u8 != header_buf[11] {\n  170 |                     return Err(ZipError::InvalidPassword);\n  171 |                 }\n  172 |             }\n  173 |         }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","description":"`AesReaderValid::read` only verifies the HMAC authentication code when `data_remaining` reaches 0. The HMAC verification is therefore skipped in two ways that silently return success on unauthenticated data:\n1. Empty payload: if `data_remaining == 0` on entry (an AES entry whose plaintext length is 0), the function returns `Ok(0)` at the top before reading or checking the 10-byte auth code at all.\n2. Truncated stream: if the underlying `self.reader.read(...)` returns 0 before `data_remaining` hits 0 (truncated/short ciphertext), `data_remaining -= 0` leaves it non-zero forever, so the HMAC block is never entered. The reader yields all decrypted bytes it could read and reports clean EOF, so a truncated/tampered file is accepted without the integrity check ever running.\nIn both cases an attacker can deliver data that decrypts and is accepted without MAC verification, defeating the AE-2 authentication guarantee.","fix":"Track total expected bytes and detect a premature 0-length read from the inner reader as an error (truncated data). For the empty-payload case, still read and verify the auth code on the first `read`/at finalize even when `data_remaining == 0`. Consider a dedicated `finalize`/`Drop`-checked path so the MAC is always verified before EOF is reported.","locations":[{"ref":"src/aes.rs:246-293","code":"  246 |     fn read(&mut self, buf: &mut [u8]) -> io::Result<usize> {\n  247 |         if self.data_remaining == 0 {\n  248 |             return Ok(0);\n  249 |         }\n  250 | \n  251 |         // get the number of bytes to read, compare as u64 to make sure we can read more than\n  252 |         // 2^32 bytes even on 32 bit systems.\n  253 |         let bytes_to_read = self.data_remaining.min(buf.len() as u64) as usize;\n  254 |         let read = self.reader.read(&mut buf[0..bytes_to_read])?;\n  255 |         self.data_remaining -= read as u64;\n  256 | \n  257 |         // Update the hmac with the encrypted data\n  258 |         self.hmac.update(&buf[0..read]);\n  259 | \n  260 |         // decrypt the data\n  261 |         self.cipher.crypt_in_place(&mut buf[0..read]);\n  262 | \n  263 |         // if there is no data left to read, check the integrity of the data\n  264 |         if self.data_remaining == 0 {\n  265 |             debug_assert!(\n  266 |                 !self.finalized,\n  267 |                 \"Tried to use an already finalized HMAC. This is a bug!\"\n  268 |             );\n  269 |             if self.finalized {\n  270 |                 return Err(Error::new(\n  271 |                     ErrorKind::InvalidData,\n  272 |                     \"Tried to use an already finalized HMAC\",\n  273 |                 ));\n  274 |             }\n  275 |             self.finalized = true;\n  276 |
