\n  277 |             // Zip uses HMAC-Sha1-80, which only uses the first half of the hash\n  278 |             // see https://www.winzip.com/win/en/aes_info.html#auth-faq\n  279 |             let mut read_auth_code = [0; AUTH_CODE_LENGTH];\n  280 |             self.reader.read_exact(&mut read_auth_code)?;\n  281 |             let computed_auth_code = &self.hmac.finalize_reset().into_bytes()[0..AUTH_CODE_LENGTH];\n  282 | \n  283 |             // use constant time comparison to mitigate timing attacks\n  284 |             if !constant_time_eq(computed_auth_code, &read_auth_code) {\n  285 |                 return Err(Error::new(\n  286 |                     ErrorKind::InvalidData,\n  287 |                     \"Invalid authentication code, this could be due to an invalid password or errors in the data\",\n  288 |                 ));\n  289 |             }\n  290 |         }\n  291 | \n  292 |         Ok(read)\n  293 |     }"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`AesWriter::write` always reports `Ok(buf.len())` even though it ignores the actual outcome granularity: it buffers `buf`, encrypts in place, updates the HMAC, then calls `self.writer.write_all`. If `write_all` succeeds for part and then the buffer is zeroized/cleared, that is fine, but the cipher keystream and HMAC have already been advanced over `buf`. If `write_all` returns an error after the keystream/HMAC have consumed those bytes, the cipher and HMAC state are now irrecoverably ahead of what was actually written, so any retry or subsequent write produces a corrupt, unverifiable archive. There is no way to roll back the CTR counter or HMAC, and the caller is given no indication that the encrypted stream is now inconsistent.","fix":"Advance the cipher and HMAC only after `write_all` has fully succeeded, or document/guarantee that the writer must be abandoned on any write error (and have higher layers discard the entry). At minimum, return the error before mutating long-lived keystream/HMAC state when possible.","locations":[{"ref":"src/aes.rs:399-421","code":"  399 | impl<W: Write> Write for AesWriter<W> {\n  400 |     fn write(&mut self, buf: &[u8]) -> io::Result<usize> {\n  401 |         self.write_encrypted_file_header()?;\n  402 | \n  403 |         // Fill the internal buffer and encrypt it in-place.\n  404 |         self.buffer.extend_from_slice(buf);\n  405 |         self.cipher.crypt_in_place(&mut self.buffer[..]);\n  406 | \n  407 |         // Update the hmac with the encrypted data.\n  408 |         self.hmac.update(&self.buffer[..]);\n  409 | \n  410 |         // Write the encrypted buffer to the inner writer.  We need to use `write_all` here as if\n  411 |         // we only write parts of the data we can't easily reverse the keystream in the cipher\n  412 |         // implementation.\n  413 |         self.writer.write_all(&self.buffer[..])?;\n  414 | \n  415 |         // Zeroize the backing memory before clearing the buffer to prevent cleartext data from\n  416 |         // being left in memory.\n  417 |         self.buffer.zeroize();\n  418 |         self.buffer.clear();\n  419 | \n  420 |         Ok(buf.len())\n  421 |     }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"After reading the known ZIP64 fields, the parser drains the remaining declared\nbytes with `copy(&mut reader.take(leftover_len), &mut sink())` and then checks for\n`ErrorKind::UnexpectedEof`. `std::io::copy` over a `Take` never returns\n`UnexpectedEof` when the underlying reader ends early; it simply stops and returns\n`Ok(bytes_copied)` (verified with rustc: `copy(take(100), sink)` on a 3-byte reader\nreturns `Ok(3)`). Consequences: (1) the `UnexpectedEof` branch at lines 221-223 is\ndead code, and (2) a ZIP64 extra field whose declared `len` claims more leftover\nbytes than actually exist is silently accepted instead of being rejected as a\ntruncated/invalid archive.","fix":"Read the leftover bytes with a method that detects short reads, e.g.\n`let mut buf = vec![0u8; leftover_len]; reader.read_exact(&mut buf)` and map\n`UnexpectedEof` to the truncation error; or compare the count returned by `copy`\nagainst `leftover_len` and error if it is smaller.","locations":[{"ref":"src/extra_fields/zip64_extended_information.rs:216-225","code":"  216 |         let Some(leftover_len) = (len as usize).checked_sub(consumed_len) else {\n  217 |             return Err(invalid!(\"ZIP64 extra-data field is the wrong length\"));\n  218 |         };\n  219 |         let mut limited = reader.take(leftover_len as u64);\n  220 |         if let Err(e) = copy(&mut limited, &mut sink()) {\n  221 |             if e.kind() == ErrorKind::UnexpectedEof {\n  222 |                 return Err(invalid!(\"ZIP64 extra field truncated\"));\n  223 |             }\n  224 |             return Err(e.into());\n  225 |         }"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"Inside the main decode loop a read error from `read_code` is silently swallowed with\n`Err(_) => break`, deliberately discarding the underlying I/O / InvalidData error and relying on\nthe post-loop length check to report a generic UnexpectedEof. This masks the real cause of\nfailure (e.g. malformed control codes) and the comment even admits it (\"treat read error as\nend-of-stream for now\"). A genuine I/O error on the underlying reader is also turned into a\nmisleading \"unexpected end of compressed stream\".","fix":"Propagate the error with `?` instead of `break`, or only break on EOF (`Ok(None)`) while returning genuine errors.","locations":[{"ref":"src/legacy/shrink.rs:257-260","code":"  257 |         let curr_opt = match read_code(&mut is, &mut code_size, &mut codetab, &mut queue) {\n  258 |             Ok(c) => c,\n  259 |             Err(_) => break, // treat read error as end-of-stream for now; validated after loop\n  260 |         };"},{"ref":"src/legacy/shrink.rs:307-312","code":"  307 |     if dst.len() != uncompressed_size {\n  308 |         return Err(io::Error::new(\n  309 |             io::ErrorKind::UnexpectedEof,\n  310 |             \"unexpected end of compressed stream\",\n  311 |         ));\n  312 |     }"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`read_zipfile_from_stream_with_options` silently swallows I/O errors from\n`parse_extra_field`: `Ok(..) | Err(ZipError::Io(..)) => {}`. A genuine I/O failure while\nparsing the extra field (not just EOF/truncation) is treated identically to success, so\ndownstream parsing continues with partially/incorrectly populated `ZipFileData`\n(e.g. ZIP64 sizes, AES mode, or unicode filename never applied), potentially producing\nwrong sizes/offsets without surfacing the error.","fix":"Only ignore the expected truncation/EOF case; propagate other `ZipError::Io` errors. Distinguish 'extra field ran past the end of stream' from real read errors.","locations":[{"ref":"src/read/stream.rs:288-291","code":"  288 |     match parse_extra_field(&mut data, &mut file_name_raw) {\n  289 |         Ok(..) | Err(ZipError::Io(..)) => {}\n  290 |         Err(e) => return Err(e),\n  291 |     }"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `find_central_directory`, the zip64 locator read swallows all errors via `try_read_eocd64_locator(reader, eocd_offset).ok()` (line 796). A genuine I/O error (not just \"no zip64 here\") is converted to `None`, causing the code to silently fall through to the zip32 path instead of surfacing the I/O failure. For a truncated/erroring stream on a may_be_zip64 EOCD this can produce a misleading \"Invalid CDFH offset\"/\"No CDFH found\" error rather than the real underlying error.","fix":"Distinguish 'locator not found / not zip64' from real I/O errors; propagate io::Error (or seek errors) instead of mapping every Err to None.","locations":[{"ref":"src/spec.rs:777-799","code":"  777 |         let zip64_metadata = if eocd.may_be_zip64() {\n  778 |             fn try_read_eocd64_locator(\n  779 |                 reader: &mut (impl Read + Seek + ?Sized),\n  780 |                 eocd_offset: u64,\n  781 |             ) -> ZipResult<(u64, Zip64CentralDirectoryEndLocator)> {\n  782 |                 if eocd_offset\n  783 |                     < (mem::size_of::<Magic>() + mem::size_of::<Zip64CDELocatorBlock>()) as u64\n  784 |                 {\n  785 |                     return Err(invalid!(\"EOCD64 Locator does not fit in file\"));\n  786 |                 }\n  787 | \n  788 |                 let locator64_offset = eocd_offset\n  789 |                     - (mem::size_of::<Magic>() + mem::size_of::<Zip64CDELocatorBlock>()) as u64;\n  790 | \n  791 |                 reader.seek(io::SeekFrom::Start(locator64_offset))?;\n  792 |                 let locator64 = Zip64CentralDirectoryEndLocator::parse(reader);\n  793 |                 Ok((locator64_offset, locator64?))\n  794 |             }\n  795 | \n  796 |             try_read_eocd64_locator(reader, eocd_offset).ok()\n  797 |         } else {\n  798 |             None\n  799 |         };"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Drop for ZipWriter calls finalize() and only writes the error to stderr, silently dropping I/O failures (e.g. disk full while writing the central directory). This is documented ('may silently fail') but means a dropped, unfinished writer can produce a truncated/corrupt archive with no programmatic signal.","fix":"Cannot return errors from Drop, but consider a debug_assert in tests and ensure docs strongly steer users to call finish()/finalize() explicitly; optionally expose a flag the user can poll after drop is impossible — at minimum keep this caveat prominent.","locations":[{"ref":"src/write.rs:1999-2010","code":" 1999 | impl<W: Write + Seek> Drop for ZipWriter<W> {\n 2000 |     fn drop(&mut self) {\n 2001 |         if !self.inner.is_closed()\n 2002 |             && let Err(e) = self.finalize()\n 2003 |         {\n 2004 |             let _ = write!(\n 2005 |                 io::stderr(),\n 2006 |                 \"ZipWriter::drop: failed to finalize archive: {e:?}\"\n 2007 |             );\n 2008 |         }\n 2009 |     }\n 2010 | }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"`parse_extra_field` re-reads each retained extra field from the cursor a second time: after\nparsing a field it seeks back to `old_position`, zero-fills a buffer of `field_len` bytes,\nand `read_exact`s the same bytes again just to copy them into `processed_extra_field`. The\nbytes are already available in the in-memory slice backing the `Cursor`; this doubles the\nwork and adds a needless `vec![0u8; field_len]` allocation per field. It also re-runs for\nboth extra-field groups even when nothing was modified.","fix":"Copy the already-buffered slice directly (`processed_extra_field.extend_from_slice(&extra_field[old_position..position])`) instead of seeking back and re-reading; skip the work when `!modified`.","locations":[{"ref":"src/read/mod.rs:565-589","code":"  565 |         while position < len as u64 {\n  566 |             let old_position = position;\n  567 |             let remove =\n  568 |                 parse_single_extra_field(file, &mut reader, position, false, file_name_raw)?;\n  569 |             position = reader.position();\n  570 |             if remove {\n  571 |                 modified = true;\n  572 |             } else {\n  573 |                 let field_len = (position - old_position) as usize;\n  574 |                 let write_start = processed_extra_field.len();\n  575 |                 reader.seek(SeekFrom::Start(old_position))?;\n  576 |                 processed_extra_field.extend_from_slice(&vec![0u8; field_len]);\n  577 |                 if let Err(e) = reader\n  578 |                     .read_exact(&mut processed_extra_field[write_start..(write_start + field_len)])\n  579 |                 {\n  580 |                     if e.kind() == io::ErrorKind::UnexpectedEof {\n  581 |                         return Err(invalid!(\"Extra field content exceeds declared length\"));\n  582 |                     }\n  583 |                     return Err(e.into());\n  584 |                 }\n  585 |             }\n  586 |         }\n  587 |         if modified {\n  588 |             *field_group = Some(Arc::from(processed_extra_field.into_boxed_slice()));\n  589 |         }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"Trailing/undocumented bytes are skipped by allocating a throwaway heap buffer\n`vec![0; bytes_to_read]` and reading into it. This allocates on every extended\ntimestamp parse that has leftover bytes; the data is immediately discarded.","fix":"Skip the bytes without allocation, e.g.\n`std::io::copy(&mut reader.take(bytes_to_read as u64), &mut std::io::sink())` (and\nverify the copied count to detect truncation), or read into a small fixed stack\nbuffer in a loop.","locations":[{"ref":"src/extra_fields/extended_timestamp.rs:136-139","code":"  136 |         if bytes_to_read > 0 {\n  137 |             // ignore undocumented bytes\n  138 |             reader.read_exact(&mut vec![0; bytes_to_read])?;\n  139 |         }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"`EXTRA_FIELD_MAPPING` is a 59-element array searched with linear `.contains(&header_id)`\non the write path for every extra field whose id must be validated. Minor, but a\nsorted array (which it already is, per the test asserting `is_sorted()`) could use\n`binary_search`.","fix":"Use `EXTRA_FIELD_MAPPING.binary_search(&header_id).is_ok()` since the array is kept\nsorted (already validated by an existing test).","locations":[{"ref":"src/extra_fields/mod.rs:120-182","code":"  120 | /// Known Extra fields (PKWARE and Third party) mappings, sorted\n  121 | pub const EXTRA_FIELD_MAPPING: [u16; 59] = [\n  122 |     UsedExtraField::Zip64ExtendedInfo.as_u16(),\n  123 |     0x0007, // AV Info\n  124 |     0x0008, // Reserved for extended language encoding data (PFS)\n  125 |     0x0009, // OS/2\n  126 |     UsedExtraField::Ntfs.as_u16(),\n  127 |     0x000c, // OpenVMS\n  128 |     0x000d, // UNIX\n  129 |     0x000e, // Reserved for file stream and fork descriptors\n  130 |     0x000f, // Patch Descriptor\n  131 |     0x0014, // PKCS#7 Store for X.509 Certificates\n  132 |     0x0015, // X.509 Certificate ID and Signature for individual file\n  133 |     0x0016, // X.509 Certificate ID for Central Directory\n  134 |     0x0017, // Strong Encryption Header\n  135 |     0x0018, // Record Management Controls\n  136 |     0x0019, // PKCS#7 Encryption Recipient Certificate List\n  137 |     0x0020, // Reserved for Timestamp record\n  138 |     0x0021, // Policy Decryption Key Record\n  139 |     0x0022, // Smartcrypt Key Provider Record\n  140 |     0x0023, // Smartcrypt Policy Key Data Record\n  141 |     0x0065, // IBM S/390 (Z390), AS/400 (I400) attributes - uncompressed\n  142 |     0x0066, // Reserved for IBM S/390 (Z390), AS/400 (I400) attributes - compressed\n  143 |     // Third party mappings commonly used\n  144 |     0x07c8, // Macintosh\n  145 |     0x1986, // Pixar USD header ID\n  146 |     0x2605, // ZipIt Macintosh\n  147 |     0x2705, // ZipIt Macintosh 1.3.5+\n  148 |     0x2805, // ZipIt Macintosh 1.3.5+\n  149 |     0x334d, // Info-ZIP Macintosh\n  150 |     0x4154, // Tandem\n  151 |     0x4341, // Acorn/SparkFS\n  152 |     0x4453, // Windows NT security descriptor (binary ACL)\n  153 |     0x4690, // POSZIP 4690 (reserved)\n  154 |     0x4704, // VM/CMS\n  155 | ferences this is a hot byte-by-byte loop with a bounds check and\na `dst.len()` recomputation per iteration. The same byte-at-a-time pattern is duplicated in the\nimplicit-zero path. These dominate decompression time for adversarial inputs that maximize overlap.","fix":"Use a chunked copy (e.g. copy `dist` bytes at a time doubling the run) or `Vec` capacity reservation + `copy_within` in segments to amortize bounds checks.","locations":[{"ref":"src/legacy/reduce.rs:158-174","code":"  158 |                 let copy_len = len.min(uncomp_len - dst.len());\n  159 |                 for _ in 0..copy_len {\n  160 |                     let byte = dst[dst.len() - dist];\n  161 |                     dst.push(byte);\n  162 |                 }\n  163 |             }\n  164 |         } else {\n  165 |             // Copy with implicit zeros\n  166 |             let copy_len = len.min(uncomp_len - dst.len());\n  167 |             for _ in 0..copy_len {\n  168 |                 if dist > dst.len() {\n  169 |                     dst.push(0);\n  170 |                 } else {\n  171 |                     let byte = dst[dst.len() - dist];\n  172 |                     dst.push(byte);\n  173 |                 }\n  174 |             }"},{"ref":"src/legacy/implode.rs:153-169","code":"  153 |             } else {\n  154 |                 // Overlapping copy\n  155 |                 for _ in 0..len {\n  156 |                     let byte = dst[dst.len() - dist as usize];\n  157 |                     dst.push(byte);\n  158 |                 }\n  159 |             }\n  160 |         } else {\n  161 |             // Copy with implicit zeros\n  162 |             for _ in 0..len {\n  163 |                 if dist as usize > dst.len() {\n  164 |                     dst.push(0);\n  165 |                 } else {\n  166 |                     let byte = dst[dst.len() - dist as usize];\n  167 |                     dst.push(byte);\n  168 |                 }\n  169 |             }"},{"ref":"src/legacy/shrink.rs:173-175","code":"  173 |         for i in ct.last_dst_pos..ct.last_dst_pos + ct.len as usize {\n  174 |             dst.push(dst[i]);\n  175 |         }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"All three decoders read the entire compressed stream into memory with `read_to_end` and decode\nthe entire output into `self.stream` on the first `read()` call, ignoring `uncompressed_size` as a\nhard cap on allocation. `dst.reserve(uncompressed_size)` / `stream.reserve(uncompressed_size)` is\ncalled with the attacker-supplied `uncompressed_size` (cast from `u64` to `usize`), allowing a\ncrafted header to request a huge up-front allocation (memory-amplification DoS) before any data is\nvalidated.","fix":"Cap the initial reservation to a sane bound (e.g. min(uncompressed_size, compressed_len * factor)) and grow as needed; validate uncompressed_size against the compressed size.","locations":[{"ref":"src/legacy/shrink.rs:233-234","code":"  233 | fn hwunshrink(src: &[u8], uncompressed_size: usize, dst: &mut Vec<u8>) -> io::Result<()> {\n  234 |     dst.reserve(uncompressed_size);"},{"ref":"src/legacy/shrink.rs:346-352","code":"  346 |             self.compressed_reader.read_to_end(&mut compressed_bytes)?;\n  347 |             self.stream.reserve(self.uncompressed_size as usize);\n  348 |             hwunshrink(\n  349 |                 &compressed_bytes,\n  350 |                 self.uncompressed_size as usize,\n  351 |                 &mut self.stream,\n  352 |             )?;"},{"ref":"src/legacy/reduce.rs:106-107","code":"  106 |     // Pre-allocate to avoid reallocations\n  107 |     dst.reserve(uncomp_len);"},{"ref":"src/legacy/implode.rs:96-97","code":"   96 |     // Pre-allocate capacity\n   97 |     dst.reserve(uncomp_len);"},{"ref":"src/legacy/implode.rs:213-214","code":"  213 |             // Pre-allocate stream buffer\n  214 |             self.stream.reserve(self.uncompressed_size as usize);"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"`parse_extra_field` clones both `extra_field` and `central_extra_field` Arcs up front\n(`file.extra_field.clone()`), iterates, and unconditionally writes them back at the end\n(`file.extra_field = extra_field; file.central_extra_field = central_extra_field;`) even when\nnothing was modified. The clone of the Arc is cheap, but the `Cursor::new(&**extra_field)`\nplus the write-back of the (possibly unchanged) field is needless churn done for every entry\nin the archive.","fix":"Only reassign the field group when `modified` is true; avoid taking ownership/clones when no field needs removal.","locations":[{"ref":"src/read/mod.rs:553-592","code":"  553 |     let mut extra_field = file.extra_field.clone();\n  554 |     let mut central_extra_field = file.central_extra_field.clone();\n  555 |     for field_group in [&mut extra_field, &mut central_extra_field] {\n  556 |         let Some(extra_field) = field_group else {\n  557 |             continue;\n  558 |         };\n  559 |         let mut modified = false;\n  560 |         let mut processed_extra_field = vec![];\n  561 |         let len = extra_field.len();\n  562 |         let mut reader = io::Cursor::new(&**extra_field);\n  563 | \n  564 |         let mut position = reader.position();\n  565 |         while position < len as u64 {\n  566 |             let old_position = position;\n  567 |             let remove =\n  568 |                 parse_single_extra_field(file, &mut reader, position, false, file_name_raw)?;\n  569 |             position = reader.position();\n  570 |             if remove {\n  571 |                 modified = true;\n  572 |             } else {\n  573 |                 let field_len = (position - old_position) as usize;\n  574 |                 let write_start = processed_extra_field.len();\n  575 |                 reader.seek(SeekFrom::Start(old_position))?;\n  576 |                 processed_extra_field.extend_from_slice(&vec![0u8; field_len]);\n  577 |                 if let Err(e) = reader\n  578 |                     .read_exact(&mut processed_extra_field[write_start..(write_start + field_len)])\n  579 |                 {\n  580 |                     if e.kind() == io::ErrorKind::UnexpectedEof {\n  581 |                         return Err(invalid!(\"Extra field content exceeds declared length\"));\n  582 |                     }\n  583 |                     return Err(e.into());\n  584 |                 }\n  585 |             }\n  586 |         }\n  587 |         if modified {\n  588 |             *field_group = Some(Arc::from(processed_extra_field.into_boxed_slice()));\n  589 |         }\n  590 |     }\n  591 |     file.extra_field = extra_field;\n  592 |     file.central_extra_field = central_extra_field;"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"The unknown/skipped extra-field path allocates a fresh heap `Vec` of `len` bytes\njust to discard it via `read_exact`. Repeated for every unrecognized extra field.","fix":"Drain with `std::io::copy(&mut reader.take(len as u64), &mut std::io::sink())` (and\ncheck the byte count for truncation) instead of allocating a discardable Vec.","locations":[{"ref":"src/read/mod.rs:686-690","code":"  686 |         _ => {\n  687 |             if let Err(e) = reader.read_exact(&mut vec![0u8; len as usize]) {\n  688 |                 if e.kind() == io::ErrorKind::UnexpectedEof {\n  689 |                     return Err(invalid!(\"Extra field content truncated\"));\n  690 |                 }"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"Several places allocate a throwaway zero-filled `Vec` solely to discard bytes via\n`read_exact(&mut vec![0u8; len as usize])`. For the unknown-extra-field skip path `len` is\nan attacker-controlled u16 (up to 65535) allocated per field, and the pattern is repeated.\nThis is both an unnecessary allocation and lets a crafted archive force many 64 KiB\nallocations.","fix":"Skip with `io::copy(&mut reader.take(len as u64), &mut io::sink())` (no allocation), or reuse a small fixed-size scratch buffer.","locations":[{"ref":"src/read/mod.rs:687-692","code":"  687 |             if let Err(e) = reader.read_exact(&mut vec![0u8; len as usize]) {\n  688 |                 if e.kind() == io::ErrorKind::UnexpectedEof {\n  689 |                     return Err(invalid!(\"Extra field content truncated\"));\n  690 |                 }\n  691 |                 return Err(e.into());\n  692 |             }"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"update_aes_extra_data clones the entire extra_field into a Vec, patches a small fixed-size region, then reallocates a new Arc<[u8]> on every finish_file for AES entries. For archives with many small AES files this is an unnecessary allocation/copy per entry in the write path.","fix":"Use Arc::make_mut on the extra_field (converting storage to Arc<Vec<u8>> or a mutable representation) to patch in place, or store extra_field as a type that allows in-place mutation without a full clone.","locations":[{"ref":"src/write.rs:2403-2412","code":" 2403 |     let aes_extra_data_start = file.aes_extra_data_start as usize;\n 2404 |     let Some(ref mut extra_field) = file.extra_field else {\n 2405 |         return Err(invalid!(\n 2406 |             \"update_aes_extra_data called on a file that has no extra-data field\"\n 2407 |         ));\n 2408 |     };\n 2409 |     let mut vec = extra_field.to_vec();\n 2410 |     vec[aes_extra_data_start..aes_extra_data_start + AexEncryption::FULL_SIZE]\n 2411 |         .copy_from_slice(&buf);\n 2412 |     *extra_field = Arc::from(vec.into_boxed_slice());"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","description":"deep_copy_file allocates a full Vec of compressed_size bytes (copy) to buffer the entire compressed entry in memory before writing it back out. For very large entries this is a large transient allocation; io::copy with a bounded buffer would avoid holding the whole entry in memory.","fix":"Stream the copy with io::copy over a take()-limited reader into the writer using a fixed-size buffer rather than allocating vec![0; compressed_size].","locations":[{"ref":"src/write.rs:905-947","code":"  905 |         let mut reader = BufReader::new(self.inner.try_inner_mut()?);\n  906 |         reader.seek(SeekFrom::Start(src_data_start))?;\n  907 |         let mut copy = vec![0; compressed_size as usize];\n  908 |         reader.take(compressed_size).read_exact(&mut copy)?;\n  909 |         self.inner\n  910 |             .try_inner_mut()?\n  911 |             .seek(SeekFrom::Start(write_position))?;\n  912 |         let mut new_data = src_data.clone();\n  913 |         let dest_name_raw = dest_name.as_bytes();\n  914 |         new_data.header_start = write_position;\n  915 |         let extra_data_start = write_position\n  916 |             + (size_of::<Magic>() + size_of::<ZipLocalEntryBlock>()) as u64\n  917 |             + dest_name_raw.len() as u64;\n  918 |         new_data.extra_data_start = Some(extra_data_start);\n  919 |         if let Some(extra) = &src_data.extra_field {\n  920 |             let stripped = strip_alignment_extra_field(extra, false);\n  921 |             if stripped.is_empty() {\n  922 |                 new_data.extra_field = None;\n  923 |             } else {\n  924 |                 new_data.extra_field = Some(Arc::from(stripped.into_boxed_slice()));\n  925 |             }\n  926 |         }\n  927 | \n  928 |         let mut data_start = extra_data_start;\n  929 |         if let Some(extra) = &new_data.extra_field {\n  930 |             data_start += extra.len() as u64;\n  931 |         }\n  932 |         new_data.data_start.take();\n  933 |         new_data.data_start.get_or_init(|| data_start);\n  934 |         new_data.central_header_start = 0;\n  935 |         let block = new_data.local_block(dest_name_raw)?;\n  936 |         let index = self.insert_file_data(dest_name_raw, new_data)?;\n  937 |         let new_data = &self.files[index];\n  938 |         let result: io::Result<()> = {\n  939 |             let plain_writer = self.inner.try_inner_mut()?;\n  940 |             block.write(plain_writer)?;\n  941 |             plain_writer.write_all(dest_name_raw)?;\n  942 |             if let Some(data) = &new_data.extra_field {\n  943 |                 plain_writer.write_all(data)?;\n  944 |             }\n  945 |             debug_assert_eq!(data_start, plain_writer.stream_position()?);\n  946 |             self.writing_to_file = true;\n  947 |             plain_writer.write_all(&copy)?;"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"negligible","description":"write_central_and_footer clones self.zip64_extensible_data_sector (a Box<[u8]>) and self.comment (Box<[u8]>) on every finalize/footer write. finalize() can call write_central_and_footer twice (aborted-file path), doubling the clones. These are cold-path one-time costs but avoidable.","fix":"Pass references into the footer block types (or take ownership once) instead of cloning the sectors/comment.","locations":[{"ref":"src/write.rs:1890-1935","code":" 1890 |             let zip64_extensible_data_sector = self.zip64_extensible_data_sector.clone();\n 1891 |             let extensible_len = zip64_extensible_data_sector\n 1892 |                 .as_ref()\n 1893 |                 .map(|e| e.len() as u64)\n 1894 |                 .unwrap_or(0);\n 1895 | \n 1896 |             let zip64_footer = spec::Zip64CentralDirectoryEnd {\n 1897 |                 record_size: extensible_len + 44,\n 1898 |                 version_made_by: version_needed,\n 1899 |                 version_needed_to_extract: version_needed,\n 1900 |                 disk_number: 0,\n 1901 |                 disk_with_central_directory: 0,\n 1902 | ION_METHODS` (lines 291-305) omits Lzma and Deflate64 even though decoders exist for them. This makes `SUPPORTED_COMPRESSION_METHODS` an unreliable indicator of which methods can actually be read, which callers may use for capability checks.","fix":"Either document that SUPPORTED_COMPRESSION_METHODS lists only round-trippable (write+read) methods, or add the read-only-supported methods (Lzma, Deflate64) so the list reflects decode capability. Clarify the constant's contract.","locations":[{"ref":"src/compression.rs:291-305","code":"  291 | pub const SUPPORTED_COMPRESSION_METHODS: &[CompressionMethod] = &[\n  292 |     CompressionMethod::Stored,\n  293 |     #[cfg(feature = \"_deflate-any\")]\n  294 |     CompressionMethod::Deflated,\n  295 |     #[cfg(feature = \"deflate64\")]\n  296 |     CompressionMethod::Deflate64,\n  297 |     #[cfg(feature = \"_bzip2_any\")]\n  298 |     CompressionMethod::Bzip2,\n  299 |     #[cfg(feature = \"zstd\")]\n  300 |     CompressionMethod::Zstd,\n  301 |     #[cfg(feature = \"xz\")]\n  302 |     CompressionMethod::Xz,\n  303 |     #[cfg(feature = \"ppmd\")]\n  304 |     CompressionMethod::Ppmd,\n  305 | ];"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In the all-ASCII branch (`!self.iter().any(|c| *c >= 0x80)`), every byte is < 0x80,\nwhich is always valid UTF-8. Therefore `std::str::from_utf8` can never fail here and\nthe `map_err(...)` / `InvalidData` error construction is unreachable. The error\nmessage \"Cannot translate path from cp437\" can never be produced.","fix":"Replace the fallible conversion with the infallible\n`std::str::from_utf8` over guaranteed-ASCII bytes (e.g. via `unsafe`/`from_utf8_unchecked`\nwith a comment, or keep `from_utf8` but drop the unreachable error mapping), or use\n`Cow::Borrowed(std::str::from_utf8(self).expect(\"ascii is valid utf8\"))` style with a\nclear invariant comment.","locations":[{"ref":"src/cp437.rs:17-31","code":"   17 |     fn from_cp437(self) -> Self::Target {\n   18 |         let target = if self.iter().any(|c| *c >= 0x80) {\n   19 |             let s = self.iter().copied().map(to_char).collect::<String>();\n   20 |             std::borrow::Cow::Owned(s)\n   21 |         } else {\n   22 |             let s = std::str::from_utf8(self).map_err(|e| {\n   23 |                 std::io::Error::new(\n   24 |                     std::io::ErrorKind::InvalidData,\n   25 |                     format!(\"Cannot translate path from cp437: {e}\"),\n   26 |                 )\n   27 |             })?;\n   28 |             std::borrow::Cow::Borrowed(s)\n   29 |         };\n   30 |         Ok(target)\n   31 |     }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","description":"Several leftover items: commented-out `HASH_BITS`/`HASHTAB_SIZE` constants (shrink.rs:17-18),\nthe commented `// num_syms:usize` field (huffman.rs:29) and its commented assert (huffman.rs:164)\nwhich were actually load-bearing for bounds safety, and the `pk101_bug_compat` parameter of\n`hwexplode` which is always passed `false` from `ImplodeDecoder` (implode.rs:221) so the\n`min_len`-related branch for it (implode.rs:108) is unreachable in production.","fix":"Remove dead constants/fields, and either wire up `pk101_bug_compat` properly or drop it; restore the `num_syms` bounds check rather than leaving it commented.","locations":[{"ref":"src/legacy/shrink.rs:17-18","code":"   17 | // const HASH_BITS: usize = MAX_CODE_SIZE + 1; /* For a load factor of 0.5. */\n   18 | // const HASHTAB_SIZE: usize = 1 << HASH_BITS;"},{"ref":"src/legacy/huffman.rs:29","code":"   29 |     // num_syms:usize"},{"ref":"src/legacy/huffman.rs:164","code":"  164 |                 //assert(sym_idx < self.num_syms);"},{"ref":"src/legacy/implode.rs:108-112","code":"  108 |     let min_len = if (pk101_bug_compat && large_wnd) || (!pk101_bug_compat && lit_tree) {\n  109 |         3\n  110 |     } else {\n  111 |         2\n  112 |     };"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`UnixFileModes::add_mode` is annotated `#[cfg_attr(not(debug_assertions), allow(unused))]`\nand its only non-debug effect is `self.map.insert(...)` whose return value is solely used by\n`debug_assert_eq!(old_entry, None)`. The comment above the assert says receiving two modes\nfor the same path is \"not remotely out of the ordinary\" and that the later one is taken — yet\nthe debug_assert will panic in debug builds exactly when that ordinary situation occurs\n(two entries with the same extracted path). The comment and the assertion contradict each\nother.","fix":"Remove the contradictory `debug_assert_eq!`, or change the comment; duplicate paths from a crafted archive should not panic even in debug builds.","locations":[{"ref":"src/read/mod.rs:181-187","code":"  181 |     #[cfg_attr(not(debug_assertions), allow(unused))]\n  182 |     pub fn add_mode(&mut self, path: std::path::PathBuf, mode: u32) {\n  183 |         // We don't print a warning or consider it remotely out of the ordinary to receive two\n  184 |         // separate modes for the same path: just take the later one.\n  185 |         let old_entry = self.map.insert(path, mode);\n  186 |         debug_assert_eq!(old_entry, None);\n  187 |     }"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`ZipCryptoKeys::encrypt_byte` is marked `#[allow(dead_code)]` and `ZipCryptoWriter` / `CHUNK_SIZE` are gated behind `#[allow(unused)]`, indicating the ZipCrypto write path may be compiled but unused in some configurations. Dead/optionally-dead crypto code paths are easy to leave untested and can drift from the read path; the `encrypt_byte` correctness is only exercised indirectly. Worth confirming these are actually reachable/tested in the shipping configuration.","fix":"Remove the allow attributes and the dead code if the ZipCrypto writer is unused, or ensure it is compiled and covered by round-trip tests in the relevant feature configuration.","locations":[{"ref":"src/zipcrypto.rs:93-98","code":"   93 |     #[allow(dead_code)]\n   94 |     fn encrypt_byte(&mut self, plain_byte: u8) -> u8 {\n   95 |         let cipher_byte: u8 = self.stream_byte() ^ plain_byte;\n   96 |         self.update(plain_byte);\n   97 |         cipher_byte\n   98 |     }"},{"ref":"src/zipcrypto.rs:183-188","code":"  183 | #[allow(unused)]\n  184 | pub(crate) struct ZipCryptoWriter<W> {\n  185 |     pub(crate) writer: W,\n  186 |     pub(crate) keys: ZipCryptoKeys,\n  187 |     pub(crate) buffer: [u8; CHUNK_SIZE],\n  188 | }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `Display` impl claims to \"duplicate what the Debug format looks like, i.e, the enum key\", but it maps the numeric method to a name via `name_from_u16`. For `CompressionMethod::Unsupported(v)` and `CompressionMethod::Reduce(n)` the Debug output (e.g. `Unsupported(99)`, `Reduce(2)`) differs from Display (`name_from_u16` gives `Aes` for 99, `Reduce(1)` for serialize value 2 of Reduce(1)). The comment is therefore misleading; the unit test `to_display_fmt` only checks SUPPORTED methods so the divergence is untested.","fix":"Correct the comment to note Display uses the canonical method name (not the Rust enum Debug form) and that Unsupported/Reduce variants will differ from Debug. Optionally implement Display to honor Debug for non-named variants.","locations":[{"ref":"src/compression.rs:281-288","code":"  281 | impl fmt::Display for CompressionMethod {\n  282 |     fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {\n  283 |         // Just duplicate what the Debug format looks like, i.e, the enum key:\n  284 |         let method_u16 = self.serialize_to_u16();\n  285 |         let name = Self::name_from_u16(method_u16);\n  286 |         write!(f, \"{name}\")\n  287 |     }\n  288 | }"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comments are inaccurate/leftover from a C port. `CodeQueue::next` says it returns\n\"INVALID_CODE if the queue is empty\" but it returns `Option<u16>` (`None`); there is no\n`INVALID_CODE`. `read_follower_sets`'s comment \"Returns true on success\" (reduce.rs:22) is wrong —\nit returns `io::Result<FollowerSetArray>`. `read_huffman_code`'s comment \"Returns false if the\ninput is invalid\" (implode.rs:19) is likewise wrong — it returns a `Result`.","fix":"Update the comments to describe the actual `Option`/`Result` return types.","locations":[{"ref":"src/legacy/shrink.rs:35-46","code":"   35 |     // Return the next code in the queue, or INVALID_CODE if the queue is empty.\n   36 |     fn next(&self) -> Option<u16> {\n   37 |         //   assert(q->next_idx < sizeof(q->codes) / sizeof(q->codes[0]));\n   38 |         if let Some(Some(next)) = self.codes.get(self.next_idx) {\n   39 |             Some(*next)\n   40 |         } else {\n   41 |             None\n   42 |         }\n   43 |     }\n   44 | \n   45 |     /// Return and remove the next code from the queue, or return INVALID_CODE if\n   46 |     /// the queue is empty."},{"ref":"src/legacy/reduce.rs:22","code":"   22 | /// Read the follower sets from is into fsets. Returns true on success."},{"ref":"src/legacy/implode.rs:18-19","code":"   18 | /// Initialize the Huffman decoder d with num_lens codeword lengths read from is.\n   19 | /// Returns false if the input is invalid."}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comments for `OptimisticMagicFinder` and the inline comment at line 282 state that a\nmandatory initial guess will \"produce an error\" if it does not match. The code instead\nreturns `Ok(None)` in every mandatory-failure branch (lines 269 and 283-285), never an\n`Err`. The comment is misleading about the actual control flow.","fix":"Fix the comments to say it yields `Ok(None)` (no further searching), or change the code to actually return an error when a mandatory guess fails.","locations":[{"ref":"src/read/magic_finder.rs:223-224","code":"  223 | /// The guess can be marked as mandatory to produce an error. This is useful\n  224 | /// if the `ArchiveOffset` is known and auto-detection is not desired."},{"ref":"src/read/magic_finder.rs:282-285","code":"  282 |             // If a match is not found, but the initial guess was mandatory, return an error.\n  283 |             if mandatory {\n  284 |                 return Ok(None);\n  285 |             }"},{"ref":"src/read/magic_finder.rs:268-270","code":"  268 |                         if mandatory {\n  269 |                             return Ok(None);\n  270 |                         }"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `KEYSTREAM_BITMASK` doc comment claims masking the low bits \"corresponding to the step described in the ZipCrypto specification variously as `| 2` or `| 3`\", but the constant is `2` and applied as `| Wrapping(2)`, which sets only bit 1 and never forces bit 0. The justification that `| 2` and `| 3` \"give the same keystream\" is asserted without the masking actually being `| 3`; the standard ZipCrypto computation uses `temp | 2` then `(temp * (temp ^ 1)) >> 8`, which the code does implement correctly, but the comment's `| 3` equivalence claim is misleading and unverified in-code.","fix":"Tighten the comment to state exactly that bit 1 is set (`| 2`) per the standard formula, and drop or rigorously justify the `| 3` equivalence claim.","locations":[{"ref":"src/zipcrypto.rs:51-55","code":"   51 |     /// Bitmask applied to the lower 2 bits of `key_2` when computing the\n   52 |     /// `ZipCrypto` keystream base, corresponding to the step described\n   53 |     /// in the `ZipCrypto` specification variously as `| 2` or `| 3` (both give the same keystream\n   54 |     /// due to the use of `keystream_base * (keystream_base ^ Wrapping(1))` and a quirk of CRC32).\n   55 |     const KEYSTREAM_BITMASK: u16 = 2;"},{"ref":"src/zipcrypto.rs:81-85","code":"   81 |     fn stream_byte(&mut self) -> u8 {\n   82 |         let keystream_base: Wrapping<u16> =\n   83 |             Wrapping((self.key_2.0 & 0xFFFF) as u16) | Wrapping(Self::KEYSTREAM_BITMASK);\n   84 |         ((keystream_base * (keystream_base ^ Wrapping(1))) >> 8).0 as u8\n   85 |     }"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Format specifier '{header_id:#06}' formats the id as zero-padded decimal (the '#' has no effect without a type like x/b), not as the intended hex; the hex form is printed separately right after, so the first number is redundant/misleading in the error message.","fix":"Use a single clear representation, e.g. format!(\"Extra data header ID 0x{header_id:04x} requires crate feature \\\"unreserved\\\"\").","locations":[{"ref":"src/write.rs:441-444","code":"  441 |                     return Err(ZipError::Io(io::Error::other(format!(\n  442 |                         \"Extra data header ID {header_id:#06} (0x{header_id:x}) \\\n  443 |                             requires crate feature \\\"unreserved\\\"\",\n  444 |                     ))));"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The back-reference copy logic (non-overlapping `extend_from_within`, overlapping byte loop, and\nimplicit-zero fill) is duplicated almost verbatim between `reduce.rs` and `implode.rs`, and the\n`Read` impls of all three decoders (`stream_read` one-shot decode + `read_pos` slicing) are\nnear-identical copies. Bug fixes (e.g. the `saturating_sub` issue above) must be applied in\nmultiple places.","fix":"Extract a shared `copy_backref(dst, dist, len, uncomp_len)` helper and a shared decoder `Read` adapter.","locations":[{"ref":"src/legacy/reduce.rs:149-175","code":"  149 |         // Output the back reference.\n  150 |         if dist <= dst.len() {\n  151 |             // Optimize for non-overlapping copies\n  152 |             if dist >= len {\n  153 |                 // No overlap, can use extend_from_within\n  154 |                 let start = dst.len() - dist;\n  155 |                 dst.extend_from_within(start..start + len.min(uncomp_len - dst.len()));\n  156 |             } else {\n  157 |                 // Overlapping copy\n  158 |                 let copy_len = len.min(uncomp_len - dst.len());\n  159 |                 for _ in 0..copy_len {\n  160 |                     let byte = dst[dst.len() - dist];\n  161 |                     dst.push(byte);\n  162 |                 }\n  163 |             }\n  164 |         } else {\n  165 |             // Copy with implicit zeros\n  166 |             let copy_len = len.min(uncomp_len - dst.len());\n  167 |             for _ in 0..copy_len {\n  168 |                 if dist > dst.len() {\n  169 |                     dst.push(0);\n  170 |                 } else {\n  171 |                     let byte = dst[dst.len() - dist];\n  172 |                     dst.push(byte);\n  173 |                 }\n  174 |             }\n  175 |         }"},{"ref":"src/legacy/implode.rs:147-170","code":"  147 |         // Optimize the copy loop using extend_from_within when possible\n  148 |         if dist as usize <= dst.len() {\n  149 |             if dist as usize >= len {\n  150 |                 // No overlap in copy, can use extend_from_within\n  151 |                 let start = dst.len() - dist as usize;\n  152 |                 dst.extend_from_within(start..start + len);\n  153 |             } else {\n  154 |                 // Overlapping copy\n  155 |                 for _ in 0..len {\n  156 |                     let byte = dst[dst.len() - dist as usize];\n  157 |                     dst.push(byte);\n  158 |                 }\n  159 |             }\n  160 |         } else {\n  161 |             // thing from packing.","fix":"Drop `#[repr(packed, C)]` (a plain struct is fine since (de)serialization is done\nfield-by-field in LE), or if a fixed layout is desired keep only `#[repr(C)]`.","locations":[{"ref":"src/extra_fields/aex_encryption.rs:12-18","code":"   12 | #[derive(Copy, Clone)]\n   13 | #[repr(packed, C)]\n   14 | pub(crate) struct AexEncryption {\n   15 |     pub(crate) version: u16,\n   16 |     aes_mode: u8,\n   17 |     compression_method: u16,\n   18 | }"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","description":"`full_size` computes the serialized header size using\n`mem::size_of::<UsedExtraField>()` to represent the 2-byte tag. This only works\nbecause the enum is `#[repr(u16)]` (size 2); it conflates the in-memory size of a\nRust enum with the on-disk field width, which is fragile and misleading.","fix":"Use an explicit constant for the on-disk tag width, e.g.\n`mem::size_of::<u16>()` (tag) `+ mem::size_of::<u16>()` (size field), making the\nserialized layout explicit and independent of the enum's repr.","locations":[{"ref":"src/extra_fields/zip64_extended_information.rs:115-118","code":"  115 |     /// Get the full size of the block\n  116 |     pub(crate) fn full_size(&self) -> usize {\n  117 |         self.size() + mem::size_of::<UsedExtraField>() + mem::size_of::<u16>()\n  118 |     }"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","description":"In `parse_single_extra_field`, when an unknown extra-field's length read fails with a\nnon-EOF error, the code \"consumes remaining bytes to avoid infinite loop in caller\" by\nlooping `reader.read(&mut buf)` until 0. But on a non-EOF *I/O error* this `?` propagates,\nand on a reader that keeps returning errors-then-data this can loop; more importantly the\nfunction then returns `Ok(false)` (field kept) after having consumed/destroyed the remaining\nbytes, so the retained position accounting in `parse_extra_field` (`position - old_position`)\nwil <script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
