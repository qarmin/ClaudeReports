<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","description":"recv_acl_access() does not validate the received access bits when am_root < 0 (fake-super). In that mode arbitrary attacker-controlled bits flow into user_obj/group_obj/mask_obj/other_obj and the per-name access fields and are later serialized via SIVAL into the stored ACL xattr (set_rsync_acl) without range checking, defeating the SMB_ACL_VALID_*_BITS guard that exists for the normal path.","fix":"Apply the SMB_ACL_VALID_NAME_BITS / SMB_ACL_VALID_OBJ_BITS range check regardless of am_root, or explicitly mask the value before storing it.","locations":[{"ref":"acls.c:679-692","code":"  679 | \t\tif (am_root >= 0 && access & ~SMB_ACL_VALID_NAME_BITS)\n  680 | \t\t\tgoto value_error;\n  681 | \t\tif (flags & XFLAG_NAME_FOLLOWS)\n  682 | \t\t\t*name_follows_ptr = 1;\n  683 | \t\telse\n  684 | \t\t\t*name_follows_ptr = 0;\n  685 | \t\tif (flags & XFLAG_NAME_IS_USER)\n  686 | \t\t\taccess |= NAME_IS_USER;\n  687 | \t} else if (am_root >= 0 && access & ~SMB_ACL_VALID_OBJ_BITS) {\n  688 | \t  value_error:\n  689 | \t\trprintf(FERROR_XFER, \"recv_acl_access: value out of range: %x\\n\",\n  690 | \t\t\taccess);\n  691 | \t\texit_cleanup(RERR_STREAMIO);\n  692 | \t}","lines":14}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"idev_find() can return NULL (its hashtable-insert path can fail), but the sender dereferences the result without a NULL check: 'np->data' and 'np->data = ...'. A NULL return causes a crash when transmitting hard-linked files.","fix":"Check 'np' for NULL after idev_find() and handle the out-of-memory/insert-failure case (e.g. call out_of_memory) before dereferencing np->data.","locations":[{"ref":"flist.c:518-522","code":"  518 | \t\t\tstruct ht_int64_node *np = idev_find(tmp_dev, tmp_ino);\n  519 | \t\t\tfirst_hlink_ndx = (int32)(long)np->data; /* is -1 when new */\n  520 | \t\t\tif (first_hlink_ndx < 0) {\n  521 | \t\t\t\tnp->data = (void*)(long)(first_ndx + ndx);\n  522 | \t\t\t\txflags |= XMIT_HLINK_FIRST;","lines":5}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"AIX sys_acl_free_acl() dereferences posix_acl->nextp in the for-loop initializer and the trailing fixups without a NULL guard. For a list with a single node (count produced exactly one link, nextp == NULL) the loop condition `acl_entry_link->nextp != NULL` is checked on `posix_acl->nextp` which is NULL, so the for body is skipped, but then the post-loop code dereferences acl_entry_link->prevp on a node whose prevp may be NULL (head), causing a NULL dereference.","fix":"Handle the single-node / empty list cases explicitly and null-check prevp before dereferencing; walk the list defensively from the head freeing each node once.","locations":[{"ref":"lib/sysacls.c:2584-2599","code":" 2584 | int sys_acl_free_acl(SMB_ACL_T posix_acl)\n 2585 | {\n 2586 | \tstruct acl_entry_link *acl_entry_link;\n 2587 | \n 2588 | \tfor (acl_entry_link = posix_acl->nextp; acl_entry_link->nextp != NULL; acl_entry_link = acl_entry_link->nextp) {\n 2589 | \t\tSAFE_FREE(acl_entry_link->prevp->entryp);\n 2590 | \t\tSAFE_FREE(acl_entry_link->prevp);\n 2591 | \t}\n 2592 | \n 2593 | \tSAFE_FREE(acl_entry_link->prevp->entryp);\n 2594 | \tSAFE_FREE(acl_entry_link->prevp);\n 2595 | \tSAFE_FREE(acl_entry_link->entryp);\n 2596 | \tSAFE_FREE(acl_entry_link);\n 2597 | \n 2598 | \treturn 0;\n 2599 | }","lines":16}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","description":"establish_proxy_connection() builds the CONNECT request with snprintf() into a PROXY_BUF_SIZE buffer and then asserts the result fits: assert(len > 0 && len < PROXY_BUF_SIZE). snprintf returns the would-have-been length, so a long target host name (the host comes from the command-line/daemon spec) makes len >= PROXY_BUF_SIZE and aborts the whole process via assert() instead of failing gracefully. With NDEBUG the assert vanishes and a truncated/garbage request is sent.","fix":"Replace the assert with a real error check: if (len < 0 || len >= PROXY_BUF_SIZE) { rprintf(FERROR, \"proxy CONNECT request too long\\n\"); return -1; }.","locations":[{"ref":"socket.c:79-80","code":"   79 | \tlen = snprintf(buffer, PROXY_BUF_SIZE, \"CONNECT %s:%d HTTP/1.0%s%s\\r\\n\\r\\n\", host, port, authhdr, authbuf);\n   80 | \tassert(len > 0 && len < PROXY_BUF_SIZE);","lines":2}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"usermap/groupmap are assigned directly from poptGetOptArg() (popt-owned) and retained globally, then poptFreeContext(pc) is called at line 2104. server_options() later passes usermap/groupmap to safe_arg(). With popt 1.19 freeing returned option-arg memory on context destruction, these retained pointers can dangle. (The --chown path uses asprintf and is safe; the direct --usermap/--groupmap assignments are not.)","fix":"strdup() the poptGetOptArg() result when assigning usermap/groupmap, matching the asprintf-allocated case used by --chown.","locations":[{"ref":"options.c:1791","code":" 1791 | \t\t\tusermap = (char *)poptGetOptArg(pc);","lines":1},{"ref":"options.c:1807","code":" 1807 | \t\t\tgroupmap = (char *)poptGetOptArg(pc);","lines":1},{"ref":"options.c:2104","code":" 2104 | \tpoptFreeContext(pc);","lines":1},{"ref":"options.c:2912-2916","code":" 2912 | \t\tif (usermap)\n 2913 | \t\t\targs[ac++] = safe_arg(\"--usermap\", usermap);\n 2914 | \n 2915 | \t\tif (groupmap)\n 2916 | \t\t\targs[ac++] = safe_arg(\"--groupmap\", groupmap);","lines":5}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"rsync_panic_handler() is an async-signal handler installed for SIGSEGV/SIGFPE/SIGABRT/SIGBUS (maintainer mode). It calls snprintf() and shell_exec(), which in turn calls getenv(), system() or fork()+execlp()+waitpid()+wait_process(). system() and the malloc/stdio machinery reached through it are not async-signal-safe, so invoking them from a fault handler can deadlock or corrupt state instead of producing the intended debugger. This defeats the very crash-debugging the handler is meant to provide.","fix":"From the fault handler only set a volatile sig_atomic_t flag (or call _exit after a raw write()), or restrict to strictly async-signal-safe primitives. Do the fork/exec of the debugger from outside signal context, or use only direct syscalls (no system()/getenv()).","locations":[{"ref":"main.c:1705-1717","code":" 1705 | static void rsync_panic_handler(UNUSED(int whatsig))\n 1706 | {\n 1707 | \tchar cmd_buf[300];\n 1708 | \tint ret, pid_int = getpid();\n 1709 | \n 1710 | \tsnprintf(cmd_buf, sizeof cmd_buf, get_panic_action(), pid_int, pid_int);\n 1711 | \n 1712 | \t/* Unless we failed to execute gdb, we allow the process to\n 1713 | \t * continue.  I'm not sure if that's right. */\n 1714 | \tret = shell_exec(cmd_buf);\n 1715 | \tif (ret)\n 1716 | \t\t_exit(ret);\n 1717 | }","lines":13},{"ref":"main.c:172-191","code":"  172 | int shell_exec(const char *cmd)\n  173 | {\n  174 | \tchar *shell = getenv(\"RSYNC_SHELL\");\n  175 | \tint status;\n  176 | \tpid_t pid;\n  177 | \n  178 | \tif (!shell)\n  179 | \t\treturn system(cmd);\n  180 | \n  181 | \tif ((pid = fork()) < 0)\n  182 | \t\treturn -1;\n  183 | \n  184 | \tif (pid == 0) {\n  185 | \t\texeclp(shell, shell, \"-c\", cmd, NULL);\n  186 | \t\t_exit(1);\n  187 | \t}\n  188 | \n  189 | \tint ret = wait_process(pid, &status, 0);\n  190 | \treturn ret < 0 ? -1 : status;\n  191 | }","lines":20}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"high","description":"do_open_at() opens the parent dir via secure_relative_open() and then opens the basename with openat(dfd, bname, flags | O_NOFOLLOW | O_BINARY, mode). The function's own header comment says this is intended for O_CREAT|O_EXCL sites, but the wrapper is generic and unconditionally adds O_NOFOLLOW. For a caller that legitimately needs to open an existing file that is a within-tree symlink (the very case secure_relative_open is documented to still permit for parents), the final-component O_NOFOLLOW will fail with ELOOP, silently diverging from do_open()'s follow-symlink semantics. This is an API contract mismatch between do_open() and do_open_at().","fix":"Document loudly that do_open_at() never follows a final-component symlink (unlike do_open), and audit every call site to ensure none rely on opening an existing symlinked final component; or make the O_NOFOLLOW conditional on O_CREAT being requested.","locations":[{"ref":"syscall.c:691-755","code":"  691 | /*\n  692 |   Symlink-race-safe variant of do_open() for receiver-side use. See\n  693 |   the comment on do_chmod_at() for the threat model. open() resolves\n  694 |   parent components, so a parent-symlink swap can redirect the open\n  695 |   to a file outside the module. This wrapper is defence-in-depth for\n  696 |   bare-path do_open() sites that callers know are otherwise\n  697 |   protected by secure parent-syscalls (e.g. generator.c's in-place\n  698 |   backup creation, where robust_unlink() rejects the symlinked\n  699 |   parent before this open is reached): if any of those upstream\n  700 |   protections is later removed or regresses, the open here still\n  701 |   refuses to escape the module.\n  702 | \n  703 |   Defence: open the parent of pathname under secure_relative_open()\n  704 |   and call openat() against the resulting dirfd with O_NOFOLLOW\n  705 |   (so the basename itself isn't followed if it happens to be a\n  706 |   pre-planted symlink, which is what we want for O_CREAT|O_EXCL).\n  707 | */\n  708 | int do_open_at(const char *pathname, int flags, mode_t mode)\n  709 | {\n  710 | #ifdef AT_FDCWD\n  711 | \textern int am_daemon, am_chrooted;\n  712 | \tchar dirpath[MAXPATHLEN];\n  713 | \tconst char *bname;\n  714 | \tconst char *slash;\n  715 | \tint dfd, ret, e;\n  716 | \tsize_t dlen;\n  717 | \n  718 | \tif (flags != O_RDONLY) {\n  719 | \t\tRETURN_ERROR_IF(dry_run, 0);\n  720 | \t\tRETURN_ERROR_IF_RO_OR_LO;\n  721 | \t}\n  722 | \n  723 | \tif (!am_daemon || am_chrooted)\n  724 | \t\treturn do_open(pathname, flags, mode);\n  725 | \n  726 | \tif (!pathname || !*pathname || *pathname == '/')\n  727 | \t\treturn do_open(pathname, flags, mode);\n  728 | \n  729 | \tslash = strrchr(pathname, '/');\n  730 | \tif (!slash)\n  731 | \t\treturn do_open(pathname, flags, mode);\n  732 | \n  733 | \tdlen = slash - pathname;\n  734 | \tif (dlen >= sizeof dirpath) {\n  735 | \t\terrno = ENAMETOOLONG;\n  736 | \t\treturn -1;\n  737 | \t}\n  738 | \tmemcpy(dirpath, pathname, dlen);\n  739 | \tdirpath[dlen] = '\\0';\n  740 | \tbname = slash + 1;\n  741 | \n  742 | \tdfd = secure_relative_open(NULL, dirpath, O_RDONLY | O_DIRECTORY, 0);\n  743 | \tif (dfd < 0)\n  744 | \t\treturn -1;\n  745 | \n  746 | #ifdef O_NOATIME\n  747 | \tif (open_noatime)\n  748 | \t\tflags |= O_NOATIME;\n  749 | #endif\n  750 | \n  751 | \tret = openat(dfd, bname, flags | O_NOFOLLOW | O_BINARY, mode);\n  752 | \te = errno;\n  753 | \tclose(dfd);\n  754 | \terrno = e;\n  755 | \treturn ret;","lines":65}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"wait_process() reads and writes the shared pid_stat_table[] (clearing a matched slot's pid) without blocking SIGCHLD. remember_children() is the SIGCHLD handler and also scans/writes pid_stat_table[]. If SIGCHLD fires while wait_process() is mid-scan, the handler can fill or the main code can clear the same slot concurrently, losing a child's exit status or producing an inconsistent table.","fix":"Block SIGCHLD (sigprocmask/sigaddset) around the pid_stat_table scan in wait_process(), or use sig_atomic_t-safe access discipline, so the handler and main path never touch the table simultaneously.","locations":[{"ref":"main.c:148-170","code":"  148 | pid_t wait_process(pid_t pid, int *status_ptr, int flags)\n  149 | {\n  150 | \tpid_t waited_pid;\n  151 | \n  152 | \tdo {\n  153 | \t\twaited_pid = waitpid(pid, status_ptr, flags);\n  154 | \t} while (waited_pid == -1 && errno == EINTR);\n  155 | \n  156 | \tif (waited_pid == -1 && errno == ECHILD) {\n  157 | \t\t/* Status of requested child no longer available:  check to\n  158 | \t\t * see if it was processed by remember_children(). */\n  159 | \t\tint cnt;\n  160 | \t\tfor (cnt = 0; cnt < MAXCHILDPROCS; cnt++) {\n  161 | \t\t\tif (pid == pid_stat_table[cnt].pid) {\n  162 | \t\t\t\t*status_ptr = pid_stat_table[cnt].status;\n  163 | \t\t\t\tpid_stat_table[cnt].pid = 0;\n  164 | \t\t\t\treturn pid;\n  165 | \t\t\t}\n  166 | \t\t}\n  167 | \t}\n  168 | \n  169 | \treturn waited_pid;\n  170 | }","lines":23},{"ref":"main.c:1648-1672","code":" 1648 | void remember_children(UNUSED(int val))\n 1649 | {\n 1650 | #ifdef WNOHANG\n 1651 | \tint cnt, status;\n 1652 | \tpid_t pid;\n 1653 | \t/* An empty waitpid() loop was put here by Tridge and we could never\n 1654 | \t * get him to explain why he put it in, so rather than taking it\n 1655 | \t * out we're instead saving the child exit statuses for later use.\n 1656 | \t * The waitpid() loop presumably eliminates all possibility of leaving\n 1657 | \t * zombie children, maybe that's why he did it. */\n 1658 | \twhile ((pid = waitpid(-1, &status, WNOHANG)) > 0) {\n 1659 | \t\t/* save the child's exit status */\n 1660 | \t\tfor (cnt = 0; cnt < MAXCHILDPROCS; cnt++) {\n 1661 | \t\t\tif (pid_stat_table[cnt].pid == 0) {\n 1662 | \t\t\t\tpid_stat_table[cnt].pid = pid;\n 1663 | \t\t\t\tpid_stat_table[cnt].status = status;\n 1664 | \t\t\t\tbreak;\n 1665 | \t\t\t}\n 1666 | \t\t}\n 1667 | \t}\n 1668 | #endif\n 1669 | #ifndef HAVE_SIGACTION\n 1670 | \tsignal(SIGCHLD, remember_children);\n 1671 | #endif\n 1672 | }","lines":25}]},{"id":"RACE_4","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"sigusr1_hand "Race Condition","severity":"medium","description":"do_xstat_at() (and thus do_stat_at/do_lstat_at) lacks the dry_run/RO short-circuit, which is correct for read-only stat, but the header comment (lines 1132-1144) claims the wrapper defends against an attacker driving 'delete it' decisions. The fstatat uses at_flags=0 for stat (follows final-component symlink). If the final component is an attacker-planted symlink to an outside file, do_stat_at still follows it (only parents are confined by the dirfd). So the stat can still report attributes of an outside file via a final-component symlink, contrary to the spirit of the comment.","fix":"Clarify in the comment that do_stat_at follows a final-component symlink (parents only are confined). If callers use the stat result to decide on destructive actions, ensure they use do_lstat_at (AT_SYMLINK_NOFOLLOW) for that decision.","locations":[{"ref":"syscall.c:1132-1190","code":" 1132 | /*\n 1133 |   Symlink-race-safe variants of do_stat() / do_lstat() for receiver-\n 1134 |   side use. See the comment on do_chmod_at() for the threat model.\n 1135 |   stat() and lstat() resolve parent components, so a parent-symlink\n 1136 |   swap can make the receiver's stat see attributes of a victim file\n 1137 |   outside the module -- which then drives later behaviour (e.g.\n 1138 |   \"this isn't a directory, delete it\" -> attacker-controlled unlink\n 1139 |   on something outside the module).\n 1140 | \n 1141 |   Defence: open the parent under secure_relative_open() and use\n 1142 |   fstatat() with AT_SYMLINK_NOFOLLOW (lstat) or 0 (stat) against\n 1143 |   that dirfd. Same fall-through gating as the other wrappers.\n 1144 | */\n 1145 | static int do_xstat_at(const char *path, STRUCT_STAT *st, int at_flags, int (*fallback)(const char *, STRUCT_STAT *))\n 1146 | {\n 1147 | #ifdef AT_FDCWD\n 1148 | \textern int am_daemon, am_chrooted;\n 1149 | \tchar dirpath[MAXPATHLEN];\n 1150 | \tconst char *bname;\n 1151 | \tconst char *slash;\n 1152 | \tint dfd, ret, e;\n 1153 | \tsize_t dlen;\n 1154 | \n 1155 | \tif (!am_daemon || am_chrooted)\n 1156 | \t\treturn fallback(path, st);\n 1157 | \n 1158 | \tif (!path || !*path || *path == '/')\n 1159 | \t\treturn fallback(path, st);\n 1160 | \n 1161 | \tslash = strrchr(path, '/');\n 1162 | \tif (!slash)\n 1163 | \t\treturn fallback(path, st);\n 1164 | \n 1165 | \tdlen = slash - path;\n 1166 | \tif (dlen >= sizeof dirpath) {\n 1167 | \t\terrno = ENAMETOOLONG;\n 1168 | \t\treturn -1;\n 1169 | \t}\n 1170 | \tmemcpy(dirpath, path, dlen);\n 1171 | \tdirpath[dlen] = '\\0';\n 1172 | \tbname = slash + 1;\n 1173 | \n 1174 | \tdfd = secure_relative_open(NULL, dirpath, O_RDONLY | O_DIRECTORY, 0);\n 1175 | \tif (dfd < 0)\n 1176 | \t\treturn -1;\n 1177 | \n 1178 | \tret = fstatat(dfd, bname, st, at_flags);\n 1179 | \te = errno;\n 1180 | \tclose(dfd);\n 1181 | \terrno = e;\n 1182 | \treturn ret;\n 1183 | #else\n 1184 | \treturn fallback(path, st);\n 1185 | #endif\n 1186 | }\n 1187 | \n 1188 | int do_stat_at(const char *path, STRUCT_STAT *st)\n 1189 | {\n 1190 | \treturn do_xstat_at(path, st, 0, do_stat);","lines":59}]},{"id":"RACE_7","type":"race_condition","type_label":"Race Condition","severity":"low","description":"sleep_for_bwlimit() uses a `static long total_written` accumulator and casts intermediate products to int64 only for the elapsed-time term (line 2115) but stores the bwlimit-scaled result back into a `long` (line 2133). On 32-bit platforms `long` is 32 bits; `(sleep_usec - elapsed_usec) * bwlimit` and `total_written * (ONE_SEC/1024)` (line 2120) can overflow a 32-bit long for large bwlimit / long sleeps, corrupting the rate limiter (either no throttling or excessive sleeps).","fix":"Use int64 for total_written and for the sleep_usec computation intermediates, or clamp bwlimit-derived products, to avoid 32-bit long overflow in the accumulator math.","locations":[{"ref":"io.c:2100-2134","code":" 2100 | static void sleep_for_bwlimit(int bytes_written)\n 2101 | {\n 2102 | \tstatic struct timeval prior_tv;\n 2103 | \tstatic long total_written = 0;\n 2104 | \tstruct timeval tv, start_tv;\n 2105 | \tlong elapsed_usec, sleep_usec;\n 2106 | \n 2107 | #define ONE_SEC\t1000000L /* # of microseconds in a second */\n 2108 | \n 2109 | \ttotal_written += bytes_written;\n 2110 | \n 2111 | \tgettimeofday(&start_tv, NULL);\n 2112 | \tif (prior_tv.tv_sec) {\n 2113 | \t\telapsed_usec = (start_tv.tv_sec - prior_tv.tv_sec) * ONE_SEC\n 2114 | \t\t\t     + (start_tv.tv_usec - prior_tv.tv_usec);\n 2115 | \t\ttotal_written -= (int64)elapsed_usec * bwlimit / (ONE_SEC/1024);\n 2116 | \t\tif (total_written < 0)\n 2117 | \t\t\ttotal_written = 0;\n 2118 | \t}\n 2119 | \n 2120 | \tsleep_usec = total_written * (ONE_SEC/1024) / bwlimit;\n 2121 | \tif (sleep_usec < ONE_SEC / 10) {\n 2122 | \t\tprior_tv = start_tv;\n 2123 | \t\treturn;\n 2124 | \t}\n 2125 | \n 2126 | \ttv.tv_sec  = sleep_usec / ONE_SEC;\n 2127 | \ttv.tv_usec = sleep_usec % ONE_SEC;\n 2128 | \tselect(0, NULL, NULL, NULL, &tv);\n 2129 | \n 2130 | \tgettimeofday(&prior_tv, NULL);\n 2131 | \telapsed_usec = (prior_tv.tv_sec - start_tv.tv_sec) * ONE_SEC\n 2132 | \t\t     + (prior_tv.tv_usec - start_tv.tv_usec);\n 2133 | \ttotal_written = (sleep_usec - elapsed_usec) * bwlimit / (ONE_SEC/1024);\n 2134 | }","lines":35}]},{"id":"RACE_8","type":"race_condition","type_label":"Race Condition","severity":"low","description":"remember_children() (SIGCHLD handler) writes into the first free pid_stat_table[] slot but silently drops the status if all MAXCHILDPROCS (7) slots are full. With more than 7 transient children, exit statuses are lost and wait_process() will then mis-report success (it returns the requested pid with whatever *status_ptr held) when ECHILD is hit. Combined with the non-atomic table access this can mask child failures.","fix":"When the table is full, at least record an overflow flag, or size the table dynamically; ensure wait_process() distinguishes 'not found' from 'found with success status'.","locations":[{"ref":"main.c:1648-1672","code":" 1648 | void remember_children(UNUSED(int val))\n 1649 | {\n 1650 | #ifdef WNOHANG\n 1651 | \tint cnt, status;\n 1652 | \tpid_t pid;\n 1653 | \t/* An empty waitpid() loop was put here by Tridge and we could never\n 1654 | \t * get him to explain why he put it in, so rather than taking it\n 1655 | \t * out we're instead saving the child exit statuses for later use.\n 1656 | \t * The waitpid() loop presumably eliminates all possibility of leaving\n 1657 | \t * zombie children, maybe that's why he did it. */\n 1658 | \twhile ((pid = waitpid(-1, &status, WNOHANG)) > 0) {\n 1659 | \t\t/* save the child's exit status */\n 1660 | \t\tfor (cnt = 0; cnt < MAXCHILDPROCS; cnt++) {\n 1661 | \t\t\tif (pid_stat_table[cnt].pid == 0) {\n 1662 | \t\t\t\tpid_stat_table[cnt].pid = pid;\n 1663 | \t\t\t\tpid_stat_table[cnt].status = status;\n 1664 | \t\t\t\tbreak;\n 1665 | \t\t\t}\n 1666 | \t\t}\n 1667 | \t}\n 1668 | #endif\n 1669 | #ifndef HAVE_SIGACTION\n 1670 | \tsignal(SIGCHLD, remember_children);\n 1671 | #endif\n 1672 | }","lines":25},{"ref":"main.c:156-167","code":"  156 | \tif (waited_pid == -1 && errno == ECHILD) {\n  157 | \t\t/* Status of requested child no longer available:  check to\n  158 | \t\t * see if it was processed by remember_children(). */\n  159 | \t\tint cnt;\n  160 | \t\tfor (cnt = 0; cnt < MAXCHILDPROCS; cnt++) {\n  161 | \t\t\tif (pid == pid_stat_table[cnt].pid) {\n  162 | \t\t\t\t*status_ptr = pid_stat_table[cnt].status;\n  163 | \t\t\t\tpid_stat_table[cnt].pid = 0;\n  164 | \t\t\t\treturn pid;\n  165 | \t\t\t}\n  166 | \t\t}\n  167 | \t}","lines":12}]},{"id":"RACE_9","type":"race_condition","type_label":"Race Condition","severity":"low","description":"get_tmpname() with make_unique uses a process-global static `counter_limit` seeded\nfrom getpid() and a per-call `counter`. The access() existence test followed by a\nlater create is an inherent TOCTOU, acknowledged in the comment for special files,\nbut for symlink/device creation in a daemon context an attacker who can create files\nin the target directory can force the MAX_UNIQUE_LOOP retries to exhaust and return 0\n(creation failure), a minor DoS on special-file transfers.","fix":"This is acknowledged-best-effort; consider O_EXCL creation where the object type allows it instead of access()+create.","locations":[{"ref":"receiver.c:223-245","code":"  223 | \tif (make_unique) {\n  224 | \t\tstatic unsigned counter_limit;\n  225 | \t\tunsigned counter;\n  226 | \n  227 | \t\tif (!counter_limit) {\n  228 | \t\t\tcounter_limit = (unsigned)getpid() + MAX_UNIQUE_LOOP;\n  229 | \t\t\tif (counter_limit > MAX_UNIQUE_NUMBER || counter_limit < MAX_UNIQUE_LOOP)\n  230 | \t\t\t\tcounter_limit = MAX_UNIQUE_LOOP;\n  231 | \t\t}\n  232 | \t\tcounter = counter_limit - MAX_UNIQUE_LOOP;\n  233 | \n  234 | \t\t/* This doesn't have to be very good because we don't need\n  235 | \t\t * to worry about someone trying to guess the values:  all\n  236 | \t\t * a conflict will do is cause a device, special file, hard\n  237 | \t\t * link, or symlink to fail to be created.  Also: avoid\n  238 | \t\t * using mktemp() due to gcc's annoying warning. */\n  239 | \t\twhile (1) {\n  240 | \t\t\tsnprintf(suf, TMPNAME_SUFFIX_LEN+1, \".%d\", counter);\n  241 | \t\t\tif (access(fnametmp, 0) < 0)\n  242 | \t\t\t\tbreak;\n  243 | \t\t\tif (++counter >= counter_limit)\n  244 | \t\t\t\treturn 0;\n  245 | \t\t}","lines":23}]},{"id":"RACE_10","type":"race_condition","type_label":"Race Condition","severity":"low","description":"is_in_group() caches getgroups() results in static state across calls; this is process-global and not reentrant. In the daemon, group membership is established before fork per-connection so it is effectively constant, but the function is also used during transfers; if our_gid or the process group set changed at runtime the cache would be stale. Not currently exploitable but a latent correctness hazard.","fix":"Document that the cache assumes a fixed group set for the process lifetime, or provide an invalidation hook if group changes are ever possible.","locations":[{"ref":"uidlist.c:195-240","code":"  195 | static int is_in_group(gid_t gid)\n  196 | {\n  197 | #ifdef HAVE_GETGROUPS\n  198 | \tstatic gid_t last_in;\n  199 | \tstatic int ngroups = -2, last_out = -1;\n  200 | \tstatic GETGROUPS_T *gidset;\n  201 | \tint n;\n  202 | \n  203 | \tif (gid == last_in && last_out >= 0)\n  204 | \t\treturn last_out;\n  205 | \tif (ngroups < -1) {\n  206 | \t\tif ((ngroups = getgroups(0, NULL)) < 0)\n  207 | \t\t\tngroups = 0;\n  208 | \t\tgidset = new_array(GETGROUPS_T, ngroups+1);\n  209 | \t\tif (ngroups > 0)\n  210 | \t\t\tngroups = getgroups(ngroups, gidset);\n  211 | \t\t/* The default gid might not be in the list on some systems. */\n  212 | \t\tfor (n = 0; n < ngroups; n++) {\n  213 | \t\t\tif ((gid_t)gidset[n] == our_gid)\n  214 | \t\t\t\tbreak;\n  215 | \t\t}\n  216 | \t\tif (n == ngroups)\n  217 | \t\t\tgidset[ngroups++] = our_gid;\n  218 | \t\tif (DEBUG_GTE(OWN, 2)) {\n  219 | \t\t\tint pos;\n  220 | \t\t\tchar *gidbuf = new_array(char, ngroups*21+32);\n  221 | \t\t\tpos = snprintf(gidbuf, 32, \"process has %d gid%s: \", ngroups, ngroups == 1? \"\" : \"s\");\n  222 | \t\t\tfor (n = 0; n < ngroups; n++) {\n  223 | \t\t\t\tpos += snprintf(gidbuf+pos, 21, \" %d\", (int)gidset[n]);\n  224 | \t\t\t}\n  225 | \t\t\trprintf(FINFO, \"%s\\n\", gidbuf);\n  226 | \t\t\tfree(gidbuf);\n  227 | \t\t}\n  228 | \t}\n  229 | \n  230 | \tlast_in = gid;\n  231 | \tfor (n = 0; n < ngroups; n++) {\n  232 | \t\tif ((gid_t)gidset[n] == gid)\n  233 | \t\t\treturn last_out = 1;\n  234 | \t}\n  235 | \treturn last_out = 0;\n  236 | \n  237 | #else\n  238 | \treturn gid == our_gid;\n  239 | #endif\n  240 | }","lines":46}]},{"id":"RACE_11","type":"race_condition","type_label":"Race Condition","severity":"negligible","description":"idev_find() caches the most-recently-used device node in a function-local `static` (dev_node). This is fine single-threaded but is a hidden global that makes the function non-reentrant and unsafe if the sender ever processes file lists concurrently. It also means the cache is never invalidated if the per-device hashtable is later destroyed.","fix":"Document the single-threaded assumption explicitly, or move the cache into a passed-in context struct so the function is reentrant.","locations":[{"ref":"hlink.c:67-85","code":"   67 | struct ht_int64_node *idev_find(int64 dev, int64 ino)\n   68 | {\n   69 | \tstatic struct ht_int64_node *dev_node = NULL;\n   70 | \n   71 | \t/* Note that some OSes have a dev == 0, so increment to avoid storing a 0. */\n   72 | \tif (!dev_node || dev_node->key != dev+1) {\n   73 | \t\t/* We keep a separate hash table of inodes for every device. */\n   74 | \t\tdev_node = hashtable_find(dev_tbl, dev+1, data_when_new);\n   75 | \t\tif (dev_node->data == data_when_new) {\n   76 | \t\t\tdev_node->data = hashtable_create(512, HT_KEY64);\n   77 | \t\t\tif (DEBUG_GTE(HLINK, 3)) {\n   78 | \t\t\t\trprintf(FINFO, \"[%s] created hashtable for dev %s\\n\",\n   79 | \t\t\t\t\twho_am_i(), big_num(dev));\n   80 | \t\t\t}\n   81 | \t\t}\n   82 | \t}\n   83 | \n   84 | \treturn hashtable_find(dev_node->data, ino, (void*)-1L);\n   85 | }","lines":19}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"On the client path, daemon_auth_choices is set via strdup() in exchange_protocols() every time it is called and is never freed. start_inband_exchange() calls exchange_protocols() once per connection; the duplicated string lives for the process lifetime. Minor, but it is an unreferenced heap allocation with no free and no single-owner contract.","fix":"Free any previous daemon_auth_choices before reassigning, or document that it is intentionally process-lifetime state.","locations":[{"ref":"clientserver.c:199-204","code":"  199 | \tdaemon_auth_choices = strchr(buf + 9, ' ');\n  200 | \tif (daemon_auth_choices) {\n  201 | \t\tchar *cp;\n  202 | \t\tdaemon_auth_choices = strdup(daemon_auth_choices + 1);\n  203 | \t\tif ((cp = strchr(daemon_auth_choices, '\\n')) != NULL)\n  204 | \t\t\t*cp = '\\0';","lines":6}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"change_pathname() does strdup(dir) into 'cpy' and stores it in the static 'pathname'. On the daemon-excluded error path it goto's chdir_error and sets pathname=NULL without freeing 'cpy', leaking the duplicated string. On the success path the previous strdup'd pathname is also overwritten without being freed (though that copy may be referenced by F_PATHNAME and intentionally long-lived).","fix":"free(cpy) on the chdir_error path when dirlen<0 was used. Audit ownership of the strdup'd pathname so it is freed when no longer referenced.","locations":[{"ref":"flist.c:351-358","code":"  351 | \tif (dirlen < 0) {\n  352 | \t\tchar *cpy = strdup(dir);\n  353 | \t\tif (*cpy != '/')\n  354 | \t\t\tchange_dir(orig_dir, CD_SKIP_CHDIR);\n  355 | \t\tif (path_is_daemon_excluded(cpy, 0))\n  356 | \t\t\tgoto chdir_error;\n  357 | \t\tdir = cpy;\n  358 | \t\tdirlen = -dirlen;","lines":8},{"ref":"flist.c:378-387","code":"  378 | \tif (!change_dir(dir, CD_NORMAL)) {\n  379 | \t  chdir_error:\n  380 | \t\tio_error |= IOERR_GENERAL;\n  381 | \t\trsyserr(FERROR_XFER, errno, \"change_dir %s failed\", full_fname(dir));\n  382 | \t\tif (dir != orig_dir)\n  383 | \t\t\tchange_dir(orig_dir, CD_NORMAL);\n  384 | \t\tpathname = NULL;\n  385 | \t\tpathname_len = 0;\n  386 | \t\treturn 0;\n  387 | \t}","lines":10}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"OPT_MAX_SIZE / OPT_MIN_SIZE / OPT_BWLIMIT reassign the *_arg globals with strdup(do_big_num(...)) without freeing the previous value. If the option is specified more than once on the command line, each prior strdup'd string is leaked. Same pattern: max_size_arg, min_size_arg, bwlimit_arg.","fix":"These args initially point at popt-owned memory, so a naive free is unsafe; track ownership with a flag (or always strdup the original popt arg) and free the previously-owned strdup before overwriting on repeated use.","locations":[{"ref":"options.c:1704","code":" 1704 | \t\t\tmax_size_arg = strdup(do_big_num(max_size, 0, NULL));","lines":1},{"ref":"options.c:1710","code":" 1710 | \t\t\tmin_size_arg = strdup(do_big_num(min_size, 0, NULL));","lines":1},{"ref":"options.c:1717","code":" 1717 | \t\t\tbwlimit_arg = strdup(do_big_num(size, 0, NULL));","lines":1}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"negligible","description":"OPT_SERVER re-creates the popt context (poptFreeContext then poptGetContext) to disable aliases, but iconv_opt may have been strdup'd earlier from RSYNC_ICONV (line 1378) and is then simply overwritten with NULL here, leaking that allocation. Negligible (one-time, tiny) but is a leak.","fix":"Free the prior strdup'd iconv_opt before setting it to NULL, or track whether it was heap-allocated.","locations":[{"ref":"options.c:1411-1413","code":" 1411 | #ifdef ICONV_OPTION\n 1412 | \t\t\ticonv_opt = NULL;\n 1413 | #endif","lines":3},{"ref":"options.c:1377-1379","code":" 1377 | \tif (!am_daemon && protect_args <= 0 && (arg = getenv(\"RSYNC_ICONV\")) != NULL && *arg)\n 1378 | \t\ticonv_opt = strdup(arg);\n 1379 | #endif","lines":3}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In start_inband_exchange(), 'modname' is allocated with new_array() and only freed at the very end (line 417). Every early 'return -1' path after the allocation (the early_input_file open/stat/size failures at lines 271-296, and the server-startup-line read failures and @ERROR handling in the read loop at lines 360-386) leaks modname. The exit(0) at line 378 is process-exit so harmless, but the return -1 paths leak on each failed connection attempt of a long-running client.","fix":"Free mo urn -1;` (matching the other error paths in this function).","locations":[{"ref":"syscall.c:2059-2070","code":" 2059 | \tif (template[0] == '/') {\n 2060 | \t\tdirfd = open(\"/\", O_RDONLY | O_DIRECTORY | O_NOFOLLOW);\n 2061 | \t\tif (dirfd < 0)\n 2062 | \t\t\treturn -1;\n 2063 | \t}\n 2064 | \n 2065 | \t/* Find the last slash to separate directory from filename */\n 2066 | \tlastslash = strrchr(template, '/');\n 2067 | \tif (lastslash) {\n 2068 | \t\tchar *path_copy = my_strdup(template, __FILE__, __LINE__);\n 2069 | \t\tif (!path_copy)\n 2070 | \t\t\treturn -1;","lines":12}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"do_fork() writes child pids into the fixed-size array `all_pids[10]` indexed by `num_pids` with no bounds check. If more than 10 children are forked over the process lifetime, num_pids overruns the static array (out-of-bounds write) and kill_all() later iterates past the array as well.","fix":"Bound the write (`if (num_pids < (int)(sizeof all_pids/sizeof all_pids[0]))`) or grow the array dynamically; assert/log if the limit is exceeded.","locations":[{"ref":"util1.c:588-600","code":"  588 | static pid_t all_pids[10];\n  589 | static int num_pids;\n  590 | \n  591 | /** Fork and record the pid of the child. **/\n  592 | pid_t do_fork(void)\n  593 | {\n  594 | \tpid_t newpid = fork();\n  595 | \n  596 | \tif (newpid != 0  &&  newpid != -1) {\n  597 | \t\tall_pids[num_pids++] = newpid;\n  598 | \t}\n  599 | \treturn newpid;\n  600 | }","lines":13},{"ref":"util1.c:612-629","code":"  612 | void kill_all(int sig)\n  613 | {\n  614 | \tint i;\n  615 | \n  616 | \tfor (i = 0; i < num_pids; i++) {\n  617 | \t\t/* Let's just be a little careful where we\n  618 | \t\t * point that gun, hey?  See kill(2) for the\n  619 | \t\t * magic caused by negative values. */\n  620 | \t\tpid_t p = all_pids[i];\n  621 | \n  622 | \t\tif (p == getpid())\n  623 | \t\t\tcontinue;\n  624 | \t\tif (p <= 0)\n  625 | \t\t\tc   994 | \t\t\t\tif (use_secure_symlinks) {\n  995 | #ifdef O_NOFOLLOW\n  996 | \t\t\t\t\tint cfd = secure_relative_open(NULL, fnametmp, O_RDONLY|O_NOFOLLOW, 0);\n  997 | \t\t\t\t\tchmod_ok = cfd != -1 && fchmod(cfd, 0600) == 0;\n  998 | \t\t\t\t\tif (cfd != -1)\n  999 | \t\t\t\t\t\tclose(cfd);\n 1000 | #else\n 1001 | \t\t\t\t\t/* Without O_NOFOLLOW the resolver's oldest fallback would\n 1002 | \t\t\t\t\t * follow a raced symlink, so fail closed rather than\n 1003 | \t\t\t\t\t * chmod through it. */\n 1004 | \t\t\t\t\tchmod_ok = 0;\n 1005 | #endif\n 1006 | \t\t\t\t} else\n 1007 | \t\t\t\t\tchmod_ok = do_chmod_at(fnametmp, 0600) == 0;\n 1008 | \t\t\t\tif (chmod_ok) {\n 1009 | \t\t\t\t\tif (use_secure_symlinks)\n 1010 | \t\t\t\t\t\tfd2 = secure_relative_open(NULL, fnametmp, O_WRONLY, 0600);\n 1011 | \t\t\t\t\telse\n 1012 | \t\t\t\t\t\tfd2 = do_open(fnametmp, O_WRONLY, 0600);\n 1013 | \t\t\t\t} else\n 1014 | \t\t\t\t\terrno = errno_save;\n 1015 | \t\t\t}\n 1016 | \t\t\tif (fd2 == -1) {\n 1017 | \t\t\t\trsyserr(FERROR_XFER, errno, \"open %s failed\",\n 1018 | \t\t\t\t\tfull_fname(fnametmp));\n 1019 | \t\t\t} else if (updating_basis_or_equiv)\n 1020 | \t\t\t\tcleanup_set(NULL, NULL, file, fd1, fd2);\n 1021 | \t\t} else {\n 1022 | \t\t\tfnametmp = fnametmpbuf;\n 1023 | \t\t\tfd2 = open_tmpfile(fnametmp, fname, file);\n 1024 | \t\t\tif (fd2 != -1)\n 1025 | \t\t\t\tcleanup_set(fnametmp, partialptr, file, fd1, fd2);\n 1026 | \t\t}","lines":59}]},{"id":"RES_14","type":"resource_leak","type_label":"Resource Leak","severity":"negligible","description":"istring() (usage.c) allocates with asprintf for each capability string built into the info_flags[] array in print_info_flags(), and these allocations are never freed. Since this runs once at --version/print and the process effectively exits or proceeds, it is a minor one-shot leak, but the strings (e.g. the istring() %d-bit entries) are leaked deterministically every call.","fix":"Free the istring()-allocated entries after building/printing the list, or accept and document the intentional one-shot leak.","locations":[{"ref":"usage.c:29-35","code":"   29 | static char *istring(const char *fmt, int val)\n   30 | {\n   31 | \tchar *str;\n   32 | \tif (asprintf(&str, fmt, val) < 0)\n   33 | \t\tout_of_memory(\"istring\");\n   34 | \treturn str;\n   35 | }","lines":7},{"ref":"usage.c:47-50","code":"   47 | \t\tistring(\"%d-bit files\", (int)(sizeof (OFF_T) * 8)),\n   48 | \t\tistring(\"%d-bit inums\", (int)(sizeof dumstat->st_ino * 8)), /* Don't check ino_t! */\n   49 | \t\tistring(\"%d-bit timestamps\", (int)(sizeof (time_t) * 8)),\n   50 | \t\tistring(\"%d-bit long ints\", (int)(sizeof (int64) * 8)),","lines":4}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"read_a_msg() decodes the multiplexed length as `msg_bytes = tag & 0xFFFFFF` (up to 16MB) from the wire. For MSG_DATA (line 1525-1526) it sets `iobuf.raw_input_ends_before = iobuf.in.pos + msg_bytes` with no check that msg_bytes is sane relative to iobuf.in.size. Downstream, read_buf() computes `iobuf.raw_input_ends_before - iobuf.in.pos` as the available raw length; a hostile peer can send an MSG_DATA header claiming up to 16MB while the input buffer is far smaller, and the wrap arithmetic in perform_io (raw_input_ends_before -= in.size / -= in.pos) plus drain_multiplex_messages() `raw_len = raw_input_ends_before - in.pos` operate on this attacker-controlled span. While the circular-buffer reads are individually clamped, the unvalidated 16MB span feeds size_t subtractions that can transiently underflow in drain_multiplex_messages (raw_len huge) and skew len bookkeeping.","fix":"Validate MSG_DATA msg_bytes against a protocol maximum (it should never exceed the negotiated max raw chunk / iobuf.in.size budget) before storing raw_input_ends_before, aborting with RERR_STREAMIO on an out-of-range length, consistent with the explicit bounds checks added elsewhere (read_int_bounded / read_varint_size).","locations":[{"ref":"io.c:1509-1527","code":" 1509 | \tmsg_bytes = tag & 0xFFFFFF;\n 1510 | \ttag = (tag >> 24) - MPLEX_BASE;\n 1511 | \n 1512 | \tif (msgs2stderr == 1 && DEBUG_GTE(IO, 1)) {\n 1513 | \t\trprintf(FINFO, \"[%s] got msg=%d, len=%\" SIZE_T_FMT_MOD \"d\\n\",\n 1514 | \t\t\twho_am_i(), (int)tag, (SIZE_T_FMT_CAST)msg_bytes);\n 1515 | \t}\n 1516 | \n 1517 | \tswitch (tag) {\n 1518 | \tcase MSG_DATA:\n 1519 | \t\tassert(iobuf.raw_input_ends_before == 0);\n 1520 | \t\t/* Though this does not yet read the data, we do mark where in\n 1521 | \t\t * the buffer the msg data will end once it is read.  It is\n 1522 | \t\t * possible that this points off the end of the buffer, in\n 1523 | \t\t * which case the gradual reading of the input stream will\n 1524 | \t\t * cause this value to wrap around and eventually become real. */\n 1525 | \t\tif (msg_bytes)\n 1526 | \t\t\tiobuf.raw_input_ends_before = iobuf.in.pos + msg_bytes;\n 1527 | \t\tiobuf.in_multiplexed = 1;","lines":19},{"ref":"io.c:1732-1748","code":" 1732 | static void drain_multiplex_messages(void)\n 1733 | {\n 1734 | \twhile (IN_MULTIPLEXED_AND_READY && iobuf.in.len) {\n 1735 | \t\tif (iobuf.raw_input_ends_before) {\n 1736 | \t\t\tsize_t raw_len = iobuf.raw_input_ends_before - iobuf.in.pos;\n 1737 | \t\t\tiobuf.raw_input_ends_before = 0;\n 1738 | \t\t\tif (raw_len >= iobuf.in.len) {\n 1739 | \t\t\t\tiobuf.in.len = 0;\n 1740 | \t\t\t\tbreak;\n 1741 | \t\t\t}\n 1742 | \t\t\tiobuf.in.len -= raw_len;\n 1743 | \t\t\tif ((iobuf.in.pos += raw_len) >= iobuf.in.size)\n 1744 | \t\t\t\tiobuf.in.pos -= iobuf.in.size;\n 1745 | \t\t}\n 1746 | \t\tread_a_msg();\n 1747 | \t}\n 1748 | }","lines":17}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"Solaris sys_lsetxattr() passes the full 'size' as the write length on every iteration instead of the remaining 'size - bufpos'. On a partial write the loop advances bufpos but still tries to write 'size' bytes from value+bufpos, reading past the end of the source buffer and writing more bytes than intended (data corruption / OOB read).","fix":"Change the write to `write(attrfd, (char*)value + bufpos, size - bufpos)`.","locations":[{"ref":"lib/sysxattrs.c:229-238","code":"  229 | \tfor (bufpos = 0; bufpos < size; ) {\n  230 | \t\tssize_t cnt = write(attrfd, (char*)value + bufpos, size);\n  231 | \t\tif (cnt <= 0) {\n  232 | \t\t\tif (cnt < 0 && errno == EINTR)\n  233 | \t\t\t\tcontinue;\n  234 | \t\t\tbufpos = -1;\n  235 | \t\t\tbreak;\n  236 | \t\t}\n  237 | \t\tbufpos += cnt;\n  238 | \t}","lines":10}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"Out-of-bounds write in parse_size_arg() error path. snprintf() returns the number of bytes it WOULD have written, which can exceed the buffer size when the output is truncated. err_buf is only 200 bytes and size_arg/opt_name come from user input (e.g. a very long --max-size=<...> or --bwlimit=<...> argument). If the first snprintf truncates, len can be ~199; the subsequent err_buf[len] = '\\n' and err_buf[len+1] = '\\0' then write 1-2 bytes past the end of err_buf.","fix":"Clamp len to the buffer size before indexing, e.g. `if (len >= (int)sizeof err_buf - 2) len = sizeof err_buf - 3;` before writing err_buf[len]/err_buf[len+1]; or accumulate length using the actual bytes written (min of return value and remaining space).","locations":[{"ref":"options.c:1148-1155","code":" 1148 | \tlen = snprintf(err_buf, sizeof err_buf - 1, \"--%s=%s is %s\", opt_name, size_arg, err);\n 1149 | \tif (min_max && limit >= 0 && len < (int)sizeof err_buf - 10) {\n 1150 | \t\tlen += snprintf(err_buf + len, sizeof err_buf - len - 1, \" (%s: %s%s)\",\n 1151 | \t\t\tmin_max, do_big_num(limit, 3, NULL),\n 1152 | \t\t\tunlimited_0 && min_max[1] == 'i' ? \" or 0 for unlimited\" : \"\");\n 1153 | \t}\n 1154 | \terr_buf[len] = '\\n';\n 1155 | \terr_buf[len+1] = '\\0';","lines":8}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"early_input_len is a global int but is assigned st.st_size, which is off_t (typically 64-bit). A pathologically large early-input file (or one whose size exceeds INT_MAX) truncates on assignment. The very next check 'early_input_len > (int)sizeof line' compares the truncated value, so a file whose size is e.g. 2^31 + small could wrap to a small positive (or negative) int and slip past the size guard, then be used as a length in the fread loop.","fix":"Capture st.st_size into an off_t, validate it against (off_t)sizeof line (and >0) before narrowing, then assign to early_input_len. Reject sizes that don't fit in the buffer/int.","locations":[{"ref":"clientserver.c:275-279","code":"  275 | \t\tearly_input_len = st.st_size;\n  276 | \t\tif (early_input_len > (int)sizeof line) {\n  277 | \t\t\trprintf(FERROR, \"%s is > %d bytes.\\n\", early_input_file, (int)sizeof line);\n  278 | \t\t\treturn -1;\n  279 | \t\t}","lines":5}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In add_rule(), when *pat == '/' the absolute-path prefix length is computed as `pre_len = dirbuf_len - module_dirlen - 1`. dirbuf_len and module_dirlen are unsigned ints; if dirbuf_len <= module_dirlen (e.g. dirbuf not yet set up, or module_dirlen miscomputed) this underflows to a huge unsigned value, which is then used as a memcpy length and new_array size, causing a massive allocation or buffer overrun.","fix":"Guard with an assertion or clamp: only compute pre_len when dirbuf_len > module_dirlen + 1, otherwise treat as 0 and log/skip.","locations":[{"ref":"exclude.c:204-205","code":"  204 | \t\tif (*pat == '/')\n  205 | \t\t\tpre_len = dirbuf_len - module_dirlen - 1;","lines":2},{"ref":"exclude.c:219-221","code":"  219 | \trule->pattern = new_array(char, pre_len + pat_len + suf_len + 1);\n  220 | \tif (pre_len) {\n  221 | \t\tmemcpy(rule->pattern, dirbuf + module_dirlen, pre_len);","lines":3}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"Off-by-one write past the end of the on-stack `data[BIGPATHBUFLEN]` buffer in the MSG_DELETED iconv path. After conversion, msg_bytes is set to outbuf.len (line 1610), which can be exactly outbuf.size (== sizeof data) when conversion fills the buffer completely and the source did not end with a NUL (so add_null stays 0). At line 1616 the trailing byte data[msg_bytes-1] is non-NUL, so the else branch at line 1619 executes `data[msg_bytes] = '\\0';` writing one byte beyond the array. The add_null overflow guard (line 1606) does not cover this case because it only triggers when add_null is set.","fix":"After computing msg_bytes = outbuf.len, ensure room for the terminator: if outbuf.len == outbuf.size goto overflow (or reserve one byte by using outbuf.size = sizeof data - 1). Then the `data[msg_bytes] = '\\0'` at line 1619 is always in bounds.","locations":[{"ref":"io.c:1579-1621","code":" 1579 | #ifdef ICONV_OPTION\n 1580 | \t\tif (ic_recv != (iconv_t)-1) {\n 1581 | \t\t\txbuf outbuf, inbuf;\n 1582 | \t\t\tchar ibuf[512];\n 1583 | \t\t\tint add_null = 0;\n 1584 | \t\t\tint flags = ICB_INCLUDE_BAD | ICB_INIT;\n 1585 | \n 1586 | \t\t\tINIT_CONST_XBUF(outbuf, data);\n 1587 | \t\t\tINIT_XBUF(inbuf, ibuf, 0, (size_t)-1);\n 1588 | \n 1589 | \t\t\twhile (msg_bytes) {\n 1590 | \t\t\t\tsize_t len = msg_bytes > sizeof ibuf - inbuf.len ? sizeof ibuf - inbuf.len : msg_bytes;\n 1591 | \t\t\t\traw_read_buf(ibuf + inbuf.len, len);\n 1592 | \t\t\t\tinbuf.pos = 0;\n 1593 | \t\t\t\tinbuf.len += len;\n 1594 | \t\t\t\tif (!(msg_bytes -= len) && !ibuf[inbuf.len-1])\n 1595 | \t\t\t\t\tinbuf.len--, add_null = 1;\n 1596 | \t\t\t\tif (iconvbufs(ic_send, &inbuf, &outbuf, flags) < 0) {\n 1597 | \t\t\t\t\tif (errno == E2BIG)\n 1598 | \t\t\t\t\t\tgoto overflow;\n 1599 | \t\t\t\t\t/* Buffer ended with an incomplete char, so move the\n 1600 | \t\t\t\t\t * bytes to the start of the buffer and continue. */\n 1601 | \t\t\t\t\tmemmove(ibuf, ibuf + inbuf.pos, inbuf.len);\n 1602 | \t\t\t\t}\n 1603 | \t\t\t\tflags &= ~ICB_INIT;\n 1604 | \t\t\t}\n 1605 | \t\t\tif (add_null) {\n 1606 | \t\t\t\tif (outbuf.len == outbuf.size)\n 1607 | \t\t\t\t\tgoto overflow;\n 1608 | \t\t\t\toutbuf.buf[outbuf.len++] = '\\0';\n 1609 | \t\t\t}\n 1610 | \t\t\tmsg_bytes = outbuf.len;\n 1611 | \t\t} else\n 1612 | #endif\n 1613 | \t\t\traw_read_buf(data, msg_bytes);\n 1614 | \t\tiobuf.in_multiplexed = 1;\n 1615 | \t\t/* A directory name was sent with the trailing null */\n 1616 | \t\tif (msg_bytes > 0 && !data[msg_bytes-1])\n 1617 | \t\t\tlog_delete(data, S_IFDIR);\n 1618 | \t\telse {\n 1619 | \t\t\tdata[msg_bytes] = '\\0';\n 1620 | \t\t\tlog_delete(data, S_IFREG);\n 1621 | \t\t}","lines":43}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"read_buf() clamps a per-iteration copy size to the whole input buffer size instead of size-minus-one. `siz = MIN(len, raw_input_ends_before - in.pos)` then `if (siz >= in.size) siz = in.size;`. raw_read_buf()/perform_io() require the requested length to fit in the circular buffer; requesting exactly in.size leaves no slack and relies on perform_io never needing the buffer non-full. The original upstream code uses `siz = iobuf.in.size - 1` here to preserve the circular-buffer invariant that len < size; using the full size risks a wrap/clamp edge in perform_io's input filling.","fix":"Clamp to `iobuf.in.size - 1` (matching upstream) rather than `iobuf.in.size`, preserving the circular-buffer invariant that a single request is strictly smaller than the buffer.","locations":[{"ref":"io.c:1973-1976","code":" 1973 | \t\tsiz = MIN(len, iobuf.raw_input_ends_before - iobuf.in.pos);\n 1974 | \t\tif (siz >= iobuf.in.size)\n 1975 | \t\t\tsiz = iobuf.in.size;\n 1976 | \t\traw_read_buf(buf, siz);","lines":4}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"Solaris read_xattr() sets `bufpos = -1` (a size_t, becoming SIZE_MAX) on read error, then `ret = bufpos` returns that huge unsigned value cast to ssize_t. On a 64-bit platform ssize_t can represent it as -1, but the intent is fragile; also `sb.st_size > buflen` and `bufpos < sb.st_size` compare signed off_t against size_t, which can misbehave for large/negative st_size.","fix":"Use an ssize_t for the running position/return, set it to -1 explicitly on error, and compare st_size against buflen with matching signedness after validating st_size >= 0.","locations":[{"ref":"lib/sysxattrs.c:177-189","code":"  177 | \t\tsize_t bufpos;\n  178 | \t\tfor (bufpos = 0; bufpos < sb.st_size; ) {\n  179 | \t\t\tssize_t cnt = read(attrfd, (char*)buf + bufpos, sb.st_size - bufpos);\n  180 | \t\t\tif (cnt <= 0) {\n  181 | \t\t\t\tif (cnt < 0 && errno == EINTR)\n  182 | \t\t\t\t\tcontinue;\n  183 | \t\t\t\tbufpos = -1;\n  184 | \t\t\t\tbreak;\n  185 | \t\t\t}\n  186 | \t\t\tbufpos += cnt;\n  187 | \t\t}\n  188 | \t\tret = bufpos;\n  189 | \t}","lines":13}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In hash_search the rolling-checksum update does `s2 -= k * (map[0]+CHAR_OFFSET)`\nwhere k is int32 up to s->blength (max 1<<17 for proto>=30, 1<<29 for older\nprotocols negotiated by a peer). With OLD_MAX_BLOCK_SIZE = 1<<29 and a byte+offset\nvalue up to ~255, k*(map[0]+CHAR_OFFSET) can exceed 2^31 and overflow the int32/uint32\narithmetic. The rolling sum is defined modulo 2^32 so wraparound is mathematically\ntolerated for uint32 s2, but the multiplication is performed in int32 `k` promoted\ncontext; signed overflow there is undefined behavior. Matches still work because the\nsender/receiver agree, but UB is a latent hazard with large pre-30 block sizes.","fix":"Cast to uint32 explicitly: `s2 -= (uint32)k * (uint32)(map[0]+CHAR_OFFSET);` to keep the arithmetic in well-defined unsigned modular form.","locations":[{"ref":"match.c:323-324","code":"  323 | \t\ts1 -= map[0] + CHAR_OFFSET;\n  324 | \t\ts2 -= k * (map[0]+CHAR_OFFSET);","lines":2}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"Signed integer overflow in --stop-after parsing. `atol(arg) * 60` is computed (and its result assigned to `val`) before any range check. For a large user-supplied minute value the multiplication itself overflows long, which is undefined behavior; the subsequent LONG_MAX-based guard runs on an already-overflowed value.","fix":"Parse into a long first, reject if it exceeds LONG_MAX/60 (and is non-positive) before multiplying: `long m = atol(arg); if (m <= 0 || m > LONG_MAX/60) goto bad; val = m * 60;`","locations":[{"ref":"options.c:1890","code":" 1890 | \t\t\tif ((val = atol(arg) * 60) <= 0 || LONG_MAX - val < stop_at_utime || (long)(time_t)val != val) {","lines":1}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"full_write() accumulates the total bytes written into an `int total_written`, while the input length is a `size_t len`. On a single copy_file() the buffer is only 8 KB so this never overflows, but the function is a general utility (also called from generator.c with a map length) and the loop variable `written` plus the accumulator are both `int`. A write of more than INT_MAX bytes would overflow `total_written` (UB / wrong return), and the return type cannot represent large sizes.","fix":"Change `int total_written` (and the return type) to `ssize_t`/`size_t` semantics, or have callers only pass <= INT_MAX. At minimum make `total_written` a size_t and return it, keeping the <0 error convention via a separate flag.","locations":[{"ref":"util1.c:278-295","code":"  278 | int full_write(int desc, const char *ptr, size_t len)\n  279 | {\n  280 | \tint total_written;\n  281 | \n  282 | \ttotal_written = 0;\n  283 | \twhile (len > 0) {\n  284 | \t\tint written = write(desc, ptr, len);\n  285 | \t\tif (written < 0)  {\n  286 | \t\t\tif (errno == EINTR)\n  287 | \t\t\t\tcontinue;\n  288 | \t\t\treturn written;\n  289 | \t\t}\n  290 | \t\ttotal_written += written;\n  291 | \t\tptr += written;\n  292 | \t\tlen -= written;\n  293 | \t}\n  294 | \treturn total_written;\n  295 | }","lines":18}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"get_acl() fake-super path computes `cnt = (len - 4*4) / (4+4)` as a signed int before the bounds check `len < 4*4`. If a corrupt/hostile stored xattr has len < 16, (len - 16) underflows in size_t arithmetic and is divided, producing a large cnt; the subsequent `len != (size_t)cnt*(4+4)+4*4` check is what actually rejects it, but relying on that after computing cnt from an underflowed value is fragile.","fix":"Check `len < 4*4 || (len - 4*4) % (4+4) != 0` first, then compute cnt, so cnt is never derived from an underflowed length.","locations":[{"ref":"acls.c:486-490","code":"  486 | \t\tcnt = (len - 4*4) / (4+4);\n  487 | \t\tif (len < 4*4 || len != (size_t)cnt*(4+4) + 4*4) {\n  488 | \t\t\tfree(buf);\n  489 | \t\t\treturn -1;\n  490 | \t\t}","lines":5}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"base64_encode() computes bytes = (len*8 + 5)/6 with int arithmetic. len is an int byte count; for the auth/proxy callers len is small, but the function is generic and a large len (e.g. >~268M) overflows len*8 as a signed int, producing a wrong/negative byte count and a buffer overrun or under-write. The function has no length guard.","fix":"Use size_t for len and the bytes computation, or document/assert a maximum input length; callers should ensure the output buffer is sized for the computed bytes.","locations":[{"ref":"authenticate.c:33-58","code":"   33 | void base64_encode(const char *buf, int len, char *out, int pad)\n   34 | {\n   35 | \tchar *b64 = \"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/\";\n   36 | \tint bit_offset, byte_offset, idx, i;\n   37 | \tconst uchar *d = (const uchar *)buf;\n   38 | \tint bytes = (len*8 + 5)/6;\n   39 | \n   40 | \tfor (i = 0; i < bytes; i++) {\n   41 | \t\tbyte_offset = (i*6)/8;\n   42 | \t\tbit_offset = (i*6)%8;\n   43 | \t\tif (bit_offset < 3) {\n   44 | \t\t\tidx = (d[byte_offset] >> (2-bit_offset)) & 0x3F;\n   45 | \t\t} else {\n   46 | \t\t\tidx = (d[byte_offset] << (bit_offset-2)) & 0x3F;\n   47 | \t\t\tif (byte_offset+1 < len) {\n   48 | \t\t\t\tidx |= (d[byte_offset+1] >> (8-(bit_offset-2)));\n   49 | \t\t\t}\n   50 | \t\t}\n   51 | \t\tout[i] = b64[idx];\n   52 | \t}\n   53 | \n   54 | \twhile (pad && (i % 4))\n   55 | \t\tout[i++] = '=';\n   56 | \n   57 | \tout[i] = '\\0';\n   58 | }","lines":26}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"parse_chmod() builds masks using signed-int arithmetic with subtraction, e.g. `CHMOD_BITS - (where*7) - (topoct?topbits:0) - (copybits?mode_dest_special_bits(where):0)`. These are bit clears written as subtraction and rely on the subtracted sets being subsets of CHMOD_BITS with no overlap. If a future edit makes topbits and mode_dest_special_bits overlap (both can set 04000/02000 conceptually), the subtraction would underflow into adjacent bits and corrupt the AND mask, unlike a proper `& ~bits`.","fix":"Use bitwise clears `CHMOD_BITS & ~((where*7) | (topoct?topbits:0) | (copybits?mode_dest_special_bits(where):0))` instead of subtraction so overlapping bits are idempotent and cannot underflow.","locations":[{"ref":"chmod.c:105","code":"  105 | \t\t\t\tcurr_mode->ModeAND = CHMOD_BITS - bits - topoct;","lines":1},{"ref":"chmod.c:113-114","code":"  113 | \t\t\t\tcurr_mode->ModeAND = CHMOD_BITS - (where * 7) - (topoct ? topbits : 0)\n  114 | \t\t\t\t\t\t    - (copybits ? mode_dest_special_bits(where) : 0);","lines":2}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"read_proxy_protocol_header() V1 path: port_chk = strtol(p, &endc, 10) and then only checks '*endc || port_chk == 0'. A port value > 65535 or negative is accepted as long as it is non-zero and fully numeric, so the proxy port validation is weaker than the documented 'valid port' intent. Ports are only used for the (ignored) validation, so impact is low, but malformed headers pass validation.","fix":"Validate the parsed port is in 1..65535 before accepting.","locations":[{"ref":"clientname.c:295-304","code":"  295 | \t\tport_chk = strtol(p, &endc, 10);\n  296 | \t\tif (*endc || port_chk == 0)\n  297 | \t\t\treturn 0;\n  298 | \t\t/* Ignore source port. */\n  299 | \n  300 | \t\tp = sp + 1;\n  301 | \t\tport_chk = strtol(p, &endc, 10);\n  302 | \t\tif (*endc || port_chk == 0)\n  303 | \t\t\treturn 0;\n  304 | \t\t/* Ignore destination port. */","lines":10}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"is_backup_file() computes `int k = strlen(fn) - backup_suffix_len`. strlen() returns size_t, so the subtraction is done in unsigned domain; when the filename is shorter than the backup suffix the result is a huge size_t that is then truncated to int. Depending on the value it can pass the `k > 0` test and make strcmp(fn+k, ...) read past the end of the string. In practice fn is a path being deleted and the suffix is short, so it rarely triggers, but it is undefined behavior.","fix":"Compare lengths first: `int fnlen = strlen(fn); int k = fnlen - backup_suffix_len; return k > 0 && ...`, or guard with `if ((size_t)backup_suffix_len >= strlen(fn)) return 0;` before computing the offset.","locations":[{"ref":"delete.c:37-41","code":"   37 | static inline int is_backup_file(char *fn)\n   38 | {\n   39 | \tint k = strlen(fn) - backup_suffix_len;\n   40 | \treturn k > 0 && strcmp(fn+k, backup_suffix) == 0;\n   41 | }","lines":5}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"rule_matches() declares match-length locals as plain `int` (l1, l2 = strlen(...)). For pathological pattern/name lengths > INT_MAX these truncate, but more realistically `name[l1-(l2+1)]` underflows the index if l2 == l1 is not the case but l1 < l2+1; this is guarded by `l2 <= l1` and `(l1==l2 || ...)` so the index is safe. Still, using int for strlen results is a latent truncation.","fix":"Use size_t for l1/l2 to avoid signed truncation on very long strings.","locations":[{"ref":"exclude.c:972-978","code":"  972 | \t\tint l1 = strlen(name);\n  973 | \t\tint l2 = strlen(pattern);\n  974 | \t\tif (l2 <= l1 &&\n  975 | \t\t    strcmp(name+(l1-l2),pattern) == 0 &&\n  976 | \t\t    (l1==l2 || name[l1-(l2+1)] == '/')) {\n  977 | \t\t\treturn ret_match;\n  978 | \t\t}","lines":7}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"stats.flist_buildtime / flist_xfertime are computed as int64 ms from gettimeofday, but the subtraction (end_tv.tv_usec - start_tv.tv_usec) is done in plain int and can be negative; combined with the seconds term it is correct only because tv_sec difference compensates, but if tv_usec wraps and tv_sec are equal-but-clock-went-backwards the result can be a large/negative bogus value. Minor stats-only impact.","fix":"Clamp negative elapsed values to a minimum (the code already forces 1 for buildtime; do the same for xfertime) or compute using a monotonic clock.","locations":[{"ref":"flist.c:2502-2505","code":" 2502 | \tstats.flist_buildtime = (int64)(end_tv.tv_sec - start_tv.tv_sec) * 1000\n 2503 | \t\t\t      + (end_tv.tv_usec - start_tv.tv_usec) / 1000;\n 2504 | \tif (stats.flist_buildtime == 0)\n 2505 | \t\tstats.flist_buildtime = 1;","lines":4},{"ref":"flist.c:2528-2529","code":" 2528 | \tstats.flist_xfertime = (int64)(end_tv.tv_sec - start_tv.tv_sec) * 1000\n 2529 | \t\t\t     + (end_tv.tv_usec - start_tv.tv_usec) / 1000;","lines":2}]},{"id":"OVF_19","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"remember_delete accepts a truncated record: the loop breaks when (deldelay_cnt += len) <= deldelay_size, but snprintf's return len excludes the terminating '\\0'. When deldelay_cnt + len == deldelay_size exactly, snprintf had size deldelay_size - deldelay_cnt and therefore truncated the trailing '\\0' (it needed len+1 bytes). The truncated, unterminated record is then committed to the buffer, which read_delay_line later parses, potentially mis-splitting it with the following record.","fix":"Break only when (deldelay_cnt += len) < deldelay_size (strict), so a record that exactly fills the buffer minus the NUL is flushed and rewritten with room for its terminator.","locations":[{"ref":"generator.c:162-183","code":"  162 | static int remember_delete(struct file_struct *file, const char *fname, int flags)\n  163 | {\n  164 | \tint len;\n  165 | \n  166 | \tif (deldelay_cnt == deldelay_size && !flush_delete_delay())\n  167 | \t\treturn 0;\n  168 | \n  169 | \tif (flags & DEL_NO_UID_WRITE)\n  170 | \t\tdeldelay_buf[deldelay_cnt++] = '!';\n  171 | \n  172 | \twhile (1) {\n  173 | \t\tlen = snprintf(deldelay_buf + deldelay_cnt, deldelay_size - deldelay_cnt,\n  174 | \t\t\t       \"%x %s%c\", (int)file->mode, fname, '\\0');\n  175 | \t\tif ((deldelay_cnt += len) <= deldelay_size)\n  176 | \t\t\tbreak;\n  177 | \t\tdeldelay_cnt -= len;\n  178 | \t\tif (!flush_delete_delay())\n  179 | \t\t\treturn 0;\n  180 | \t}\n  181 | \n  182 | \treturn 1;\n  183 | }","lines":22}]},{"id":"OVF_20","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"create_refuse_error() computes `n = snprintf(...) - 1` then does snprintf(err_buf + n, sizeof err_buf - n, ...). snprintf returns the would-be length; if the option name were long enough to truncate the first write, n could exceed the buffer size, making err_buf + n point out of bounds and sizeof err_buf - n underflow to a huge size_t. Current option longNames are all short so this cannot trigger today, but the arithmetic is unguarded and fragile.","fix":"Bound n to the buffer: compute the real written length as `n = MIN(snprintf(...), (int)sizeof err_buf - 1) - 1;` and guard `if (op->shortName && n >= 0 && n < (int)sizeof err_buf)` before the second snprintf.","locations":[{"ref":"options.c:1313-1315","code":" 1313 | \tint n = snprintf(err_buf, sizeof err_buf, \"%s --%s\\n\", msg, op->longName) - 1;\n 1314 | \tif (op->shortName)\n 1315 | \t\tsnprintf(err_buf + n, sizeof err_buf - n, \" (-%c)\\n\", op->shortName);","lines":3}]},{"id":"OVF_21","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"block_size is parsed as ssize_t then truncated to int32 via `block_size = (int32)size;`. parse_size_arg already bounds it to max_blength (MAX_BLOCK_SIZE), so the cast is currently safe, but the cast silently relies on that invariant; server_options() later does `asprintf(&arg, \"-B%u\", (int)block_size)` using %u with an (int) argument, a format/type mismatch (int passed for unsigned conversion).","fix":"Use a matching format/type in the asprintf (e.g. cast to unsigned: `(unsigned)block_size` with %u, or use %d with (int)). Keep the bounds invariant explicit.","locations":[{"ref":"options.c:1697","code":" 1697 | \t\t\tblock_size = (int32)size;","lines":1},{"ref":"options.c:2788","code":" 2788 | \t\tif (asprintf(&arg, \"-B%u\", (int)block_size) < 0)","lines":1}]},{"id":"OVF_22","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"msdiff() computes `(t2->tv_sec - t1->tv_sec) * 1000L` in a long. On platforms where long is 32 bits, an elapsed time of more than ~24 days overflows, and even a modest multi-hour transfer combined with the +usec term can produce a wrong (possibly negative) result that then feeds rate/ETA math. The function also returns unsigned long while computing a potentially negative intermediate.","fix":"Perform the arithmetic in a 64-bit type (e.g. int64/long long) and clamp negative diffs to 0 before returning.","locations":[{"ref":"progress.c:55-59","code":"   55 | static unsigned long msdiff(struct timeval *t1, struct timeval *t2)\n   56 | {\n   57 | \treturn (t2->tv_sec - t1->tv_sec) * 1000L\n   58 | \t     + (t2->tv_usec - t1->tv_usec) / 1000;\n   59 | }","lines":5}]},{"id":"OVF_23","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"dest_mode() declares new_mode as int and returns it as mode_t. The expression `(new_mode & 0444) >> 2` and the bit operations are fine, but storing the computed value through an int and returning as mode_t relies on implementation-defined narrowing; more importantly the `else` branch `flist_mode & (~CHMOD_BITS | dflt_perms)` ANDs with the complement of CHMOD_BITS ORed with dflt_perms - if dflt_perms ever contains bits outside CHMOD_BITS this preserves unexpected high mode bits. Minor but worth verifying dflt_perms is masked to CHMOD_BITS by callers.","fix":"Use mode_t for new_mode and assert/mask dflt_perms to CHMOD_BITS at entry so the default-permission OR cannot leak unintended bits.","locations":[{"ref":"rsync.c:449-471","code":"  449 | mode_t dest_mode(mode_t flist_mode, mode_t stat_mode, int dflt_perms,\n  450 | \t\t int exists)\n  451 | {\n  452 | \tint new_mode;\n  453 | \t/* If the file already exists, we'll return the local permissions,\n  454 | \t * possibly tweaked by the --executability option. */\n  455 | \tif (exists) {\n  456 | \t\tnew_mode = (flist_mode & ~CHMOD_BITS) | (stat_mode & CHMOD_BITS);\n  457 | \t\tif (preserve_executability && S_ISREG(flist_mode)) {\n  458 | \t\t\t/* If the source file is executable, grant execute\n  459 | \t\t\t * rights to everyone who can read, but ONLY if the\n  460 | \t\t\t * file isn't already executable. */\n  461 | \t\t\tif (!(flist_mode & 0111))\n  462 | \t\t\t\tnew_mode &= ~0111;\n  463 | \t\t\telse if (!(stat_mode & 0111))\n  464 | \t\t\t\tnew_mode |= (new_mode & 0444) >> 2;\n  465 | \t\t}\n  466 | \t} else {\n  467 | \t\t/* Apply destination default permissions and turn\n  468 | \t\t * off special permissions. */\n  469 | \t\tnew_mode = flist_mode & (~CHMOD_BITS | dflt_perms);\n  470 | \t}\n  471 | \treturn new_mode;","lines":23}]},{"id":"OVF_24","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"receive_sums() (sender side) computes `s->flength = (OFF_T)s->count * s->blength`\nfor append_mode. count and blength are read from the network and validated in\nread_sum_head, but the multiplication promotes via the (OFF_T) cast on count only;\nblength stays int32. With count up to INT32_MAX and blength up to 1<<29, the product\nfits OFF_T (64-bit) thanks to the cast, so this specific line is safe -- but the\nidentical pattern in receive_data (`sum.flength = (OFF_T)sum.count * sum.blength`)\nrelies on the same cast. Both are correct only because OFF_T is 64-bit; worth a\nguard comment since a 32-bit OFF_T build would overflow.","fix":"Add a compile-time assertion that OFF_T is 64-bit, or compute the product with explicit 64-bit operands and document the assumption.","locations":[{"ref":"sender.c:89-92","code":"   89 | \tif (append_mode > 0) {\n   90 | \t\ts->flength = (OFF_T)s->count * s->blength;\n   91 | \t\tif (s->remainder)\n   92 | \t\t\ts->flength -= s->blength - s->remainder;","lines":4},{"ref":"receiver.c:354-356","code":"  354 | \t\tsum.flength = (OFF_T)sum.count * sum.blength;\n  355 | \t\tif (sum.remainder)\n  356 | \t\t\tsum.flength -= sum.blength - sum.remainder;","lines":3}]},{"id":"OVF_25","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"do_setattrlist_times()/do_lutimes()/do_utimes() assign stp->st_atime/st_mtime (time_t) into struct timeval/timespec tv_sec and ST_*_NSEC into tv_usec/tv_nsec. The nsec->usec division (ST_ATIME_NSEC / 1000) silently truncates sub-microsecond precision, and on 32-bit time_t platforms the st_*time assignment can overflow for post-2038 timestamps. Low impact but worth noting for the time-preservation path.","fix":"No action needed for nsec truncation (inherent to the API). For 2038 safety, rely on the build's 64-bit time_t; document the assumption.","locations":[{"ref":"syscall.c:1456-1468","code":" 1456 | \tt[0].tv_sec = stp->st_atime;\n 1457 | #ifdef ST_ATIME_NSEC\n 1458 | \tt[0].tv_usec = stp->ST_ATIME_NSEC / 1000;\n 1459 | #else\n 1460 | \tt[0].tv_usec = 0;\n 1461 | #endif\n 1462 | \tt[1].tv_sec = stp->st_mtime;\n 1463 | #ifdef ST_MTIME_NSEC\n 1464 | \tt[1].tv_usec = stp->ST_MTIME_NSEC / 1000;\n 1465 | #else\n 1466 | \tt[1].tv_usec = 0;\n 1467 | #endif\n 1468 | \treturn lutimes(path, t);","lines":13},{"ref":"syscall.c:1480-1492","code":" 1480 | \tt[0].tv_sec = stp->st_atime;\n 1481 | #ifdef ST_ATIME_NSEC\n 1482 | \tt[0].tv_usec = stp->ST_ATIME_NSEC / 1000;\n 1483 | #else\n 1484 | \tt[0].tv_usec = 0;\n 1485 | #endif\n 1486 | \tt[1].tv_sec = stp->st_mtime;\n 1487 | #ifdef ST_MTIME_NSEC\n 1488 | \tt[1].tv_usec = stp->ST_MTIME_NSEC / 1000;\n 1489 | #else\n 1490 | \tt[1].tv_usec = 0;\n 1491 | #endif\n 1492 | \treturn utimes(path, t);","lines":13}]},{"id":"OVF_26","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"safe_read() returns `int n_chars` from read() but accepts a `size_t len`. read() can be asked for up to len bytes; if len > INT_MAX the result is implementation defined and the int return truncates. In copy_file the read size is a fixed 8 KB so this is safe today, but the helper is unsafe for large len values.","fix":"Use `ssize_t n_chars` and return ssize_t, or document/clamp that len must be <= SSIZE_MAX.","locations":[{"ref":"util1.c:308-320","code":"  308 | static int safe_read(int desc, char *ptr, size_t len)\n  309 | {\n  310 | \tint n_chars;\n  311 | \n  312 | \tif (len == 0)\n  313 | \t\treturn len;\n  314 | \n  315 | \tdo {\n  316 | \t\tn_chars = read(desc, ptr, len);\n  317 | \t} while (n_chars < 0 && errno == EINTR);\n  318 | \n  319 | \treturn n_chars;\n  320 | }","lines":13}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"match_address() writes a NUL into the caller's token at the '/' to split address from mask (line 122), and restores it on most exit paths, but the success path through match_binary at lines 235-243 reaches the 'out:' label which does NOT restore the '/'. Trace: when p!=0 and inet_pton/strtol succeed, control flows past the restore... actually the restore is done at line 146 (*p++ = '/') before any of these branches, so the token is restored early. However note inet_pton path at 197 leaves bits=-1 with p already restored - confirm the token mutation is always reverted. The fragile early-restore (line 146 advances p past the slash with p++) means the later 'malformed mask in %s' diagnostics print the token with the slash intact but p now points one char too far for any further use; this is brittle but currently correct.","fix":"Avoid mutating the caller's token in place; copy the token or split into separate buffers so restoration cannot be missed and diagnostics are unambiguous.","locations":[{"ref":"access.c:120-146","code":"  120 | \tp = strchr(tok,'/');\n  121 | \tif (p)\n  122 | \t\t*p = '\\0';\n  123 | \n  124 | \t/* Fail quietly if tok is a hostname, not an address. */\n  125 | \tif (tok[strspn(tok, \".0123456789\")] && strchr(tok, ':') == NULL) {\n  126 | \t\tif (p)\n  127 | \t\t\t*p = '/';\n  128 | \t\treturn 0;\n  129 | \t}\n  130 | \n  131 | \tmemset(&hints, 0, sizeof(hints));\n  132 | \thints.ai_family = PF_UNSPEC;\n  133 | \thints.ai_socktype = SOCK_STREAM;\n  134 | #ifdef AI_NUMERICHOST\n  135 | \thints.ai_flags = AI_NUMERICHOST;\n  136 | #endif\n  137 | \n  138 | \tif (getaddrinfo(addr, NULL, &hints, &r
