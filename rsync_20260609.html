id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"rsync_module(): the per-module reverse-lookup-on-demand at lines 723-724 calls client_name(client_addr(f_in)) when host==undetermined_hostname and the module enables reverse lookup. But start_daemon() already attempts this pre-chroot scan (lines 1326-1335) only when some module wants it; if the GLOBAL reverse lookup is off and only this module wants it, the pre-chroot scan DID run (the loop covers per-module), so by here client_name's static cache is populated. However if a daemon chroot (lp_daemon_chroot) was applied between the pre-chroot scan and here, the cache is fine; but for a 'use chroot' module the chroot happens later (line 983) so this lookup at 723 runs before chroot - OK. The risk: if reverse lookup is enabled per-module but the pre-chroot scan was skipped because need_reverse stayed 0 due to a module index mismatch, a hostname-based allow/deny would silently fail-open. Verify lp_reverse_lookup(j) indexing matches the module 'i' used here.","fix":"Ensure the pre-chroot scan and the per-module check use identical module indexing; add an assertion or always populate the cache before any access check when any reverse-lookup is configured.","locations":[{"ref":"clientserver.c:721-739","code":"  721 | \t/* If reverse lookup is disabled globally but enabled for this module,\n  722 | \t * we need to do it now before the access check. */\n  723 | \tif (host == undetermined_hostname && lp_reverse_lookup(i))\n  724 | \t\thost = client_name(client_addr(f_in));\n  725 | \tset_env_str(\"RSYNC_HOST_NAME\", host);\n  726 | \tset_env_str(\"RSYNC_HOST_ADDR\", addr);\n  727 | \n  728 | \tif (!allow_access(addr, &host, i)) {\n  729 | \t\trprintf(FLOG, \"rsync denied on module %s from %s (%s)\\n\",\n  730 | \t\t\tname, host, addr);\n  731 | \t\tif (!lp_list(i))\n  732 | \t\t\tio_printf(f_out, \"@ERROR: Unknown module '%s'\\n\", name);\n  733 | \t\telse {\n  734 | \t\t\tio_printf(f_out,\n  735 | \t\t\t\t  \"@ERROR: access denied to %s from %s (%s)\\n\",\n  736 | \t\t\t\t  name, host, addr);\n  737 | \t\t}\n  738 | \t\treturn -1;\n  739 | \t}","lines":19},{"ref":"clientserver.c:1326-1335","code":" 1326 | \t{\n 1327 | \t\tint need_reverse = lp_reverse_lookup(-1);\n 1328 | \t\tint j, num_modules = lp_num_modules();\n 1329 | \t\tfor (j = 0; !need_reverse && j < num_modules; j++) {\n 1330 | \t\t\tif (lp_reverse_lookup(j))\n 1331 | \t\t\t\tneed_reverse = 1;\n 1332 | \t\t}\n 1333 | \t\tif (need_reverse)\n 1334 | \t\t\t(void)client_name(client_addr(f_in));\n 1335 | \t}","lines":10}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"parse_merge_name() returns a pointer to a function-local static buffer `buf` (or to `merge_file` itself). It is not reentrant: setup_merge_file() calls parse_merge_name() and stores its result implicitly, and parse_filter_str()'s merge handling calls parse_merge_name() then immediately calls parse_filter_file()/add_rule() which can recurse into parse_filter_str() and call parse_merge_name() again, clobbering the shared static `buf`. Any retained pointer into `buf` across such a nested call is stale.","fix":"Have callers copy the returned string into a local buffer immediately, or pass a caller-provided output buffer instead of using a function-static one.","locations":[{"ref":"exclude.c:599-654","code":"  599 | static char *parse_merge_name(const char *merge_file, unsigned int *len_ptr,\n  600 | \t\t\t      unsigned int prefix_skip)\n  601 | {\n  602 | \tstatic char buf[MAXPATHLEN];\n  603 | \tchar *fn, tmpbuf[MAXPATHLEN];\n  604 | \tunsigned int fn_len;\n  605 | \n  606 | \tif (!parent_dirscan && *merge_file != '/') {\n  607 | \t\t/* Return the name unchanged it doesn't have any slashes. */\n  608 | \t\tif (len_ptr) {\n  609 | \t\t\tconst char *p = merge_file + *len_ptr;\n  610 | \t\t\twhile (--p > merge_file && *p != '/') {}\n  611 | \t\t\tif (p == merge_file) {\n  612 | \ | \t\t}\n  737 | \t\tlp->tail = NULL;\n  738 | \t\tstrlcpy(y, save, copylen);\n  739 | \t\twhile ((*x++ = *y++) != '/') {}\n  740 | \t}\n  741 | \tparent_dirscan = False;\n  742 | \tif (DEBUG_GTE(FILTER, 2)) {\n  743 | \t\trprintf(FINFO, \"[%s] completed parent_dirscan for mergelist #%d%s\\n\",\n  744 | \t\t\twho_am_i(), mergelist_num, lp->debug_type);\n  745 | \t}\n  746 | \tfree(pat);","lines":47}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","description":"write_file() takes `int len` and returns int; receive_data passes int32 token sizes\n(<= CHUNK_SIZE = 32K) so no truncation occurs in practice. However write_sparse()\nalso takes `int len` and computes `len - (l1+l2)` and calls write(2) with that. The\nreturn value of write() is assigned to `int ret` and compared `ret != (int)(len-(l1+l2))`.\nOn a partial write the function returns `l1+ret`, but `sparse_seek` was already\nadvanced to l2 and sparse_past_write set assuming the full write succeeded\n(lines 100-101 run before the write). A short write therefore leaves sparse_seek/\nsparse_past_write describing bytes that were never written, corrupting subsequent\nsparse_end()/punch_hole accounting for the rest of the file.","fix":"Set sparse_seek/sparse_past_write only after a confirmed full write, or reset them correctly on the partial-write return path (it currently only zeroes sparse_seek, leaving sparse_past_write stale).","locations":[{"ref":"fileio.c:100-120","code":"  100 | \tsparse_seek = l2;\n  101 | \tsparse_past_write = offset + len - l2;\n  102 | \n  103 | \tif (use_seek) {\n  104 | \t\t/* The in-place data already matches. */\n  105 | \t\tif (do_lseek(f, len - (l1+l2), SEEK_CUR) < 0)\n  106 | \t\t\treturn -1;\n  107 | \t\treturn len;\n  108 | \t}\n  109 | \n  110 | \twhile ((ret = write(f, buf + l1, len - (l1+l2))) <= 0) {\n  111 | \t\tif (ret < 0 && errno == EINTR)\n  112 | \t\t\tcontinue;\n  113 | \t\tsparse_seek = 0;\n  114 | \t\treturn ret;\n  115 | \t}\n  116 | \n  117 | \tif (ret != (int)(len - (l1+l2))) {\n  118 | \t\tsparse_seek = 0;\n  119 | \t\treturn l1+ret;\n  120 | \t}","lines":21}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","description":"rprintf() handles vsnprintf truncation by overwriting the tail with an ellipsis: memcpy(buf+len-sizeof ellipsis, ellipsis, sizeof ellipsis) where len = sizeof buf - 1 and sizeof ellipsis = 6. It then checks format[strlen(format)-1] to optionally restore a trailing newline. If the *format* string is empty (\"\"), strlen(format)-1 underflows to (size_t)-1 and format[(size_t)-1] reads far out of bounds. Empty format strings are unusual but rprintf is a general API.","fix":"Guard with if (*format && format[strlen(format)-1] == '\\n') before indexing.","locations":[{"ref":"log.c:437-440","code":"  437 | \t\tmemcpy(buf+len-sizeof ellipsis, ellipsis, sizeof ellipsis);\n  438 | \t\tif (format[strlen(format)-1] == '\\n') {\n  439 | \t\t\tbuf[len-1] = '\\n';\n  440 | \t\t}","lines":4}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","description":"getallgroups(): after a first getgrouplist() failure with size > malloced, it expands and retries; if it still fails it sets size=-1 and returns 'getgrouplist failed'. But on the path where the first call fails with size <= malloced (else branch line 596), it sets size=-1 then returns the error - fine. The real bug: when the SECOND getgrouplist succeeds, 'size' holds the real count, gid_list->count = size is set, but if the retry's getgrouplist again reports size larger than the freshly expanded buffer (race or kernel rounding), the code does not re-check and proceeds with gid_list->count = (negative or too-large) size, then dereferences gid_array[0..size). A returned size larger than the buffer leads to out-of-bounds reads in the default-group reordering loop.","fix":"After the retry, clamp size to gid_list->malloced (or treat size > malloced as failure) before assignin r","severity":"medium","description":"check_secret() matches a secrets-file line against the user/group name using strncmp(s, *ptr, len) where len is strlen(name), and then requires s[len]==':'. This means a secrets file entry whose name is a prefix is rejected correctly, but it does NOT guard against the supplied 'user' containing embedded characters that strtok already split. More importantly, for @group lines the code compares against 'group' which is the matched group name derived from getgrouplist; an attacker who can influence group membership resolution controls which secret line is selected. This is by-design but the prefix check uses the *file* token length implicitly via s[len] which is correct only because len==strlen(name); fine. Real issue: the loop sets *ptr=NULL after a password mismatch (line 162) to avoid re-checking, but only for the matched ptr; a later duplicate user line is then skipped, so a correct password on a second matching line is never tried.","fix":"Do not disable the name after a single mismatch if duplicate entries are legitimately supported, or document that only the first matching secrets line is honored.","locations":[{"ref":"authenticate.c:154-163","code":"  154 | \t\tif (!*ptr || strncmp(s, *ptr, len) != 0 || s[len] != ':')\n  155 | \t\t\tcontinue;\n  156 | \t\tgenerate_hash(s+len+1, challenge, pass2);\n  157 | \t\tif (strcmp(pass, pass2) == 0) {\n  158 | \t\t\terr = NULL;\n  159 | \t\t\tbreak;\n  160 | \t\t}\n  161 | \t\terr = \"password mismatch\";\n  162 | \t\t*ptr = NULL; /* Don't look for name again. */\n  163 | \t}","lines":10}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"check_batch_flags() permanently mutates the static flag_ptr[] array based on protocol_version (sets flag_ptr[7] or flag_ptr[9] to NULL). This truncates the flag table for the rest of the process lifetime. write_stream_flags() and a subsequent call iterate flag_ptr until the first NULL, so if check_ba c Error","severity":"medium","description":"negotiate_daemon_auth() permanently mutates the shared global table entry valid_auth_checksums_items[] (negotiated_nni->num and ->flags) to downgrade CSUM_MD4 to CSUM_MD4_OLD when talking to an old peer. Because negotiated_nni points into the global static list (or its main_nni), the change persists in the table after negotiation. In a daemon that handles auth for the same in-process table more than once this leaves the md4 entry stuck as CSUM_MD4_OLD with flags cleared, which would alter a subsequent negotiation. It works today only because each connection re-execs / the entry is not re-evaluated, an implicit and fragile assumption.","fix":"Apply the md4-is-old downgrade to a copy used for this connection, or reset the mutated num/flags after use, rather than editing the shared valid_auth_checksums_items entry in place.","locations":[{"ref":"compat.c:879-882","code":"  879 | \tif (md4_is_old && valid_auth_checksums.negotiated_nni->num == CSUM_MD4) {\n  880 | \t\tvalid_auth_checksums.negotiated_nni->num = CSUM_MD4_OLD;\n  881 | \t\tvalid_auth_checksums.negotiated_nni->flags = 0;\n  882 | \t}","lines":4}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In delete_dir_contents() the code temporarily adds S_IWUSR to a non-writable owned entry via do_chmod_at() so it can be deleted, but if the subsequent delete_item() fails (e.g. non-empty subdir reported as DR_NOT_EMPTY, or an EACCES), the write bit is never restored. A directory that survives deletion is left with permissions silently modified from the user's perspective.","fix":"Only chmod right before the unlink/rmdir attempt and restore the original mode if the delete does not succeed, or scope the chmod into delete_item where the success/failure is known.","locations":[{"ref":"delete.c:99-109","code":"   99 | \t\tstrlcpy(p, fp->basename, remainder);\n  100 | \t\tif (!(fp->mode & S_IWUSR) && !am_root && fp->flags & FLAG_ orce_lower_case is set, also lowercase the class range bounds (and single class chars) before comparing, so [A-Z] behaves consistently under iwildmatch.","locations":[{"ref":"lib/wildmatch.c:83-84","code":"   83 | \tif (force_lower_case && ISUPPER(t_ch))\n   84 | \t    t_ch = tolower(t_ch);","lines":2},{"ref":"lib/wildmatch.c:155-163","code":"  155 | \t\t} else if (p_ch == '-' && prev_ch && p[1] && p[1] != ']') {\n  156 | \t\t    p_ch = *++p;\n  157 | \t\t    if (p_ch == '\\\\') {\n  158 | \t\t\tp_ch = *++p;\n  159 | \t\t\tif (!p_ch)\n  160 | \t\t\t    return ABORT_ALL;\n  161 | \t\t    }\n  162 | \t\t    if (t_ch <= p_ch && t_ch >= prev_ch)\n  163 | \t\t\tmatched = TRUE;","lines":9}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"expand_vars(): when a %VAR% expansion's value does not fit, 'if (len > bufsize) break;' leaves the loop with *f still pointing at unconsumed input, which then triggers the 'Overflowed buf' fatal exit_cleanup(RERR_MALLOC). But strlcpy already wrote up to bufsize chars into t before returning len, partially clobbering buffer state; since we exit_cleanup immediately this is benign, yet the off-by-one between 'len > bufsize' (should arguably be 'len >= bufsize' since one byte is reserved for the trailing NUL written at line 200 after the loop) can let a value that exactly fills bufsize through, leaving no room for the final '*t = 0' beyond the allocated +1. The allocation is bufsize+1 so the trailing NUL fits, making it currently safe but reliant on the +1 slack.","fix":"Use 'if (len >= bufsize)' for clarity and to keep an explicit one-byte margin independent of the allocation's +1 slack.","locations":[{"ref":"loadparm.c:179-205","code":"  179 | \tfor (t = buf, f = str; bufsize && *f; ) {\n  180 | \t\tif (*f == '%' && isUpper(f+1)) {\n  181 | \t\t\tconst char *percent = strchr(f+1, '%');\n  182 | \t\t\tif (percent && percent - f < bufsize) {\n  183 | \t\t\t\tchar *val;\n  184 | \t\t\t\tstrlcpy(t, f+1, percent - f);\n  185 | \t\t\t\tval = getenv(t);\n  186 | \t\t\t\tif (val) {\n  187 | \t\t\t\t\tint len = strlcpy(t, val, bufsize+1);\n  188 | \t\t\t\t\tif (len > bufsize)\n  189 | \t\t\t\t\t\tbreak;\n  190 | \t\t\t\t\tbufsize -= len;\n  191 | \t\t\t\t\tt += len;\n  192 | \t\t\t\t\tf = percent + 1;\n  193 | \t\t\t\t\tcontinue;\n  194 | \t\t\t\t}\n  195 | \t\t\t}\n  196 | \t\t}\n  197 | \t\t*t++ = *f++;\n  198 | \t\tbufsize--;\n  199 | \t}\n  200 | \t*t = '\\0';\n  201 | \n  202 | \tif (*f) {\n  203 | \t\trprintf(FLOG, \"Overflowed buf in expand_vars() trying to expand: %s\\n\", str);\n  204 | \t\texit_cleanup(RERR_MALLOC);\n  205 | \t}","lines":27}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"rwrite() truncates a message into msg[2048] for the daemon/log path with strlcpy(msg, buf, MIN((int)sizeof msg, len + 1)). 'buf' is NOT guaranteed NUL-terminated (rwrite takes an explicit len), and strlcpy reads from buf until it either hits the size limit or a NUL. If len+1 < sizeof msg but buf has no NUL within len bytes (common, since callers pass non-terminated slices), strlcpy still stops at the size bound, so that is safe; however the bound MIN(sizeof msg, len+1) can be len+1 even when buf[len] is not a valid readable byte boundary - strlcpy will read buf[len] looking for NUL. For a buf that is exactly len bytes at the end of an allocation this reads one byte past.","fix":"Use a bounded copy that never reads buf[len]: memcpy(msg, buf, n=MIN(sizeof msg-1, len)); msg[n]='\\0';.","locations":[{"ref":"log.c:301-302","code":"  301 | \t\tstrlcpy(msg, buf, MIN((int)sizeof msg, len + 1));\n  302 | \t\tlogit(priority, msg);","lines":2}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"log_formatted() copies the format into buf with strlcpy then appends '\\n' at buf[total++] and NUL at buf[total]. total is strlcpy's return = length of the *source* format, which on xit_cleanup(RERR_SYNTAX);\n  307 | \t}","lines":8}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"do_recv() unconditionally resets copy_links = copy_dirlinks = copy_unsafe_links = 0 for the receiving side. This is intended per the comment, but it mutates global option state that is also consulted by the generator process which continues running in the SAME function after the fork (am_generator branch). Any later code (or a future generator path) that reads these globals will see them cleared even though the user requested them, a subtle cross-process coupling.","fix":"Confirm the generator never needs copy_links/copy_dirlinks/copy_unsafe_links after this point; if it might, scope the reset to the receiver child (after the fork, pid==0 branch) instead of before the fork.","locations":[{"ref":"main.c:988-996","code":"  988 | static int do_recv(int f_in, int f_out, char *local_name)\n  989 | {\n  990 | \tint pid;\n  991 | \tint exit_code = 0;\n  992 | \tint error_pipe[2];\n  993 | \n  994 | \t/* The receiving side mustn't obey this, or an existing symlink that\n  995 | \t * points to an identical file won't be replaced by the referent. */\n  996 | \tcopy_links = copy_dirlinks = copy_unsafe_links = 0;","lines":9},{"ref":"main.c:1107-1132","code":" 1107 | \tam_generator = 1;\n 1108 | \timplied_filter_list.head = implied_filter_list.tail = NULL;\n 1109 | \tflist_receiving_enabled = True;\n 1110 | \n 1111 | \tio_end_multiplex_in(MPLX_SWITCHING);\n 1112 | \tif (write_batch && !am_server)\n 1113 | \t\tstop_write_batch();\n 1114 | \n 1115 | \tclose(error_pipe[1]);\n 1116 | \tif (f_in != f_out)\n 1117 | \t\tclose(f_in);\n 1118 | \tsock_f_in = -1;\n 1119 | \tf_in = error_pipe[0];\n 1120 | \n 1121 | \tio_start_buffering_out(f_out);\n 1122 | \tio_start_multiplex_in(f_in);\n 1123 | \n 1124 | #ifdef SUPPORT_HARD_LINKS\n 1125 | \tif (preserve_hard_links && inc_recurse) {\n 1126 | \t\tstruct file_list *flist;\n 1127 | \t\tfor (fl e_label":"Logic Error","severity":"medium","description":"params.c Section()/Parameter() grow bufr via realloc_array but never check the result for NULL (realloc_array presumably aborts on OOM internally - verify). More importantly, the buffer-growth guard 'if (i > (bSize - 2))' grows only when i exceeds bSize-2, but in Parameter()'s value loop a run of bytes between growth checks is bounded by one char per iteration so this is fine; the section-name loop similarly. No overflow, but the realloc'd 'bufr' is a file-scope global reused across recursive pm_process() calls (include/merge), and a nested include that grows bufr leaves the outer caller using the (possibly moved) pointer correctly only because bufr is global - the local references in Section()/Parameter() re-read the global each iteration. This global mutable parser buffer shared across recursion is fragile architecture.","fix":"Document the global-bufr recursion contract explicitly, or pass the buffer/size as parameters to make the recursion-safety obvious and not dependent on each access re-reading the globals.","locations":[{"ref":"params.c:95-96","code":"   95 | static char *bufr  = NULL;\n   96 | static int   bSize = 0;","lines":2},{"ref":"params.c:210-215","code":"  210 |     /* Check that the buffer is big enough for the next character. */\n  211 |     if( i > (bSize - 2) )\n  212 |       {\n  213 |       bSize += BUFR_INC;\n  214 |       bufr   = realloc_array( bufr, char, bSize );\n  215 |       }","lines":6},{"ref":"params.c:619-631","code":"  619 |   if( NULL != bufr )                          /* If we already have a buffer */\n  620 |     result = Parse( InFile, sfunc, pfunc );   /* (recursive call), then just */\n  621 |                                               /* use it.                     */\n  622 | \n  623 |   else                                        /* If we don't have a buffer   */\n  624 |     {                                         /* allocate one, then parse,   */\n  625 |     bSize = BUFR_INC;                         /* then free.                  */\n  626 |     bufr = new_array( char, bSize );\n  627 |     result = Parse( InFile, sfunc, pfunc );\n  628 |     free( bufr );\n  629 |     bufr  = NULL;\n  630 |     bSize = 0;\n  631 |     }","lines":13}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In piped_child() (and local_child()), the child branch does dup2/close into STDIN/STDOUT and on dup2/close failure calls exit_cleanup(RERR_IPC) from the forked child. exit_cleanup may run parent-side cleanup handlers (atexit/cleanup of shared state, killing the partner, removing temp files) in the child context, which can corrupt the parent's view or delete files. Forked children should use _exit() after a failed exec/dup, not the full exit_cleanup() path.","fix":"In the child after fork, on dup2/close/exec failure report the error and call _exit(RERR_IPC) (or a child-safe cleanup) rather than exit_cleanup(), to avoid running parent-oriented cleanup in the child.","locations":[{"ref":"pipe.c:68-86","code":"   68 | \tif (pid == 0) {\n   69 | \t\tif (dup2(to_child_pipe[0], STDIN_FILENO) < 0\n   70 | \t\t || close(to_child_pipe[1]) < 0\n   71 | \t\t || close(from_child_pipe[0]) < 0\n   72 | \t\t || dup2(from_child_pipe[1], STDOUT_FILENO) < 0) {\n   73 | \t\t\trsyserr(FERROR, errno, \"Failed to dup/close\");\n   74 | \t\t\texit_cleanup(RERR_IPC);\n   75 | \t\t}\n   76 | \t\tif (to_child_pipe[0] != STDIN_FILENO)\n   77 | \t\t\tclose(to_child_pipe[0]);\n   78 | \t\tif (from_child_pipe[1] != STDOUT_FILENO)\n   79 | \t\t\tclose(from_child_pipe[1]);\n   80 | \t\tset_blocking(STDIN_FILENO);\n   81 | \t\tif (blocking_io > 0)\n   82 | \t\t\tset_blocking(STDOUT_FILENO);\n   83 | \t\texecvp(command[0], command);\n   84 | \t\trsyserr(FERROR, errno, \"Failed to exec %s\", command[0]);\n   85 | \t\texit_cleanup(RERR_IPC);\n   86 | \t}","lines":19},{"ref":"pipe.c:130-167","code":"  130 | \tif (pid == 0) {\ d (line 274-277) before connect, and on the EINTR retry path (line 283 'continue') the alarm is NOT re-checked: a fired timeout sets connect_timeout=-1, but EINTR from a non-timeout signal loops back into connect() with the alarm still pending from the original arm. Subsequent addresses also re-arm alarm without ever calling alarm(0) on the failure path, so a stale alarm can fire during a later address's connect.","fix":"Call alarm(0) on every exit from the connect attempt (including the failure break), and re-arm per attempt; or move the alarm(0) outside the success-only guard.","locations":[{"ref":"socket.c:274-291","code":"  274 | \t\tif (connect_timeout > 0) {\n  275 | \t\t\tSIGACTION(SIGALRM, contimeout_handler);\n  276 | \t\t\talarm(connect_timeout);\n  277 | \t\t}\n  278 | \n  279 | \t\tset_socket_options(s, sockopts);\n  280 | \t\twhile (connect(s, res->ai_addr, res->ai_addrlen) < 0) {\n  281 | \t\t\tif (connect_timeout < 0)\n  282 | \t\t\t\texit_cleanup(RERR_CONTIMEOUT);\n  283 | \t\t\tif (errno == EINTR)\n  284 | \t\t\t\tcontinue;\n  285 | \t\t\tclose(s);\n  286 | \t\t\ts = -1;\n  287 | \t\t\tbreak;\n  288 | \t\t}\n  289 | \n  290 | \t\tif (connect_timeout > 0)\n  291 | \t\t\talarm(0);","lines":18}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"do_fallocate() returns the (mutated) `length` value when do_fstat() fails after a successful fallocate in the opts==0 path. `length` was deliberately altered just above (++/-- to mismatch the desired length), so on fstat failure the caller receives a wrong preallocated_len that does not correspond to the actual on-disk allocation. The real allocated size (st.st_blocks * S_BLKSIZE) is the intended return; a fstat failure silently substitutes a bogus number instead of an error.","fix":"On do_fstat() failure return -1 (an error) rather than the mutated `length`, or at least return the original requested length, not the +/-1 adjusted one. Confirm caller (receiver preallocated_len handling) tolerates the chosen value.","locations":[{"ref":"syscall.c:1541-1560","code":" 1541 | \tif (length & 1) /* make the length not match the desired length */\n 1542 | \t\tlength++;\n 1543 | \telse\n 1544 | \t\tlength--;\n 1545 | #if defined HAVE_FALLOCATE\n 1546 | \tret = fallocate(fd, opts, offset, length);\n 1547 | #elif defined HAVE_SYS_FALLOCATE\n 1548 | \tret = syscall(SYS_fallocate, fd, opts, (loff_t)offset, (loff_t)length);\n 1549 | #elif defined HAVE_EFFICIENT_POSIX_FALLOCATE\n 1550 | \tret = posix_fallocate(fd, offset, length);\n 1551 | #else\n 1552 | #error Coding error in SUPPORT_PREALLOCATION logic.\n 1553 | #endif\n 1554 | \tif (ret < 0)\n 1555 | \t\treturn ret;\n 1556 | \tif (opts == 0) {\n 1557 | \t\tSTRUCT_STAT st;\n 1558 | \t\tif (do_fstat(fd, &st) < 0)\n 1559 | \t\t\treturn length;\n 1560 | \t\treturn st.st_blocks * S_BLKSIZE;","lines":20}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"list_file() in tls.c: storetime() formats into a fixed buffer; for the 't==0' branch it computes len = MIN(20 + 10*has_nsecs, destsize-1) and memsets spaces. But in the t!=0 branch, gmtime_r() can return NULL (e.g. for an out-of-range time_t such as a negative or far-future mtime read from an xattr via stat_xattr) and the code immediately dereferences mt->tm_year etc. without a NULL check, causing a NULL-pointer crash on corrupt/extreme timestamps.","fix":"Check 'if (!mt)' after gmtime_r and emit a placeholder/spaces instead of dereferencing.","locations":[{"ref":"tls.c:126-141","code":"  126 | static void storetime(char *dest, size_t destsize, time_t t, int nsecs)\n  127 | {\n  128 | \tif (t) {\n  129 | \t\tint len;\n  130 | \t\tstruct tm tmp, *mt = gmtime_r(&t, &tmp);\n  131 | \n  132 | \t\tlen = snprintf(dest, destsize,\n  133 | \t\t\t\" %04d-%02d-%02d %02d:%02d:%02d\",\n  134 | \t\t\t(int)mt->tm_year + 1900,\n  135 | \t\t\t(int)mt->tm_mon + 1,\n  136 | \t\t\t(int)mt->tm_mday,\n  137 | \ \n  615 | \t\tgid_array[j] = gid_array[0];\n  616 | \t\tgid_array[0] = pw->pw_gid;\n  617 | \t}","lines":14}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"set_times() permanently sets the global `omit_link_times = 1` the first time it falls through to the generic case (switch_step at line 160), even when the fall-through happened only because an earlier method returned ENOSYS for a non-symlink file. After this, symlink mtimes are silently skipped for the rest of the run regardless of the user's --omit-link-times choice, which is a surprising and order-dependent side effect.","fix":"Only force omit_link_times when the platform genuinely lacks symlink-time support detected for a symlink; do not mutate the user-facing global as a side effect of a generic-path fallback, or gate it behind a separate internal flag.","locations":[{"ref":"util1.c:160-166","code":"  160 | #include \"case_N.h\"\n  161 | \t\tswitch_step++;\n  162 | \t\tif (!omit_link_times) {\n  163 | \t\t\tomit_link_times = 1;\n  164 | \t\t\tif (S_ISLNK(stp->st_mode))\n  165 | \t\t\t\treturn 1;\n  166 | \t\t}","lines":7}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"glob_expand_module() reassigns the local `base` (originally base1) via asprintf to \" base1/\" then uses base_len (incremented by 1) to step the scan: `for (s = arg; *s; s = p + base_len)`. After finding the separator and NUL-terminating, advancing by base_len skips exactly the matched separator; but base_len was incremented only once (line 825) while the asprintf prepended a leading space AND appended a trailing slash, making the actual separator length strlen(base1)+2, not strlen(base1)+1. When base1 is matched mid-string this advances `s` one byte short, potentially re-scanning a stray slash. Worth verifying against the intended token layout.","fix":"Recompute base_len = strlen(base) after the asprintf so the scan step matches the actual separator string length.","locations":[{"ref":"util1.c:804-837","code":"  804 | void glob_expand_module(char *base1, char *arg, char ***argv_p, int *argc_p, int *maxargs_p)\n  805 | {\n  806 | \tchar *p, *s;\n  807 | \tchar *base = base1;\n  808 | \tint base_len = strlen(base);\n  809 | \n  810 | \tif (!arg || !*arg)\n  811 | \t\treturn;\n  812 | \n  813 | \tif (strncmp(arg, base, base_len) == 0)\n  814 | \t\targ += base_len;\n  815 | \n  816 | \tif (protect_args) {\n  817 | \t\tglob_expand(arg, argv_p, argc_p, maxargs_p);\n  818 | \t\treturn;\n  819 | \t}\n  820 | \n  821 | \targ = strdup(arg);\n  822 | \n  823 | \tif (asprintf(&base,\" %s/\", base1) < 0)\n  824 | \t\tout_of_memory(\"glob_expand_module\");\n  825 | \tbase_len++;\n  826 | \n  827 | \tfor (s = arg; *s; s = p + base_len) {\n  828 | \t\tif ((p = strstr(s, base)) != NULL)\n  829 | \t\t\t*p = '\\0'; /* split it at this point */\n  830 | \t\tglob_expand(s, argv_p, argc_p, maxargs_p);\n  831 | \t\tif (!p)\n  832 | \t\t\tbreak;\n  833 | \t}\n  834 | \n  835 | \tfree(arg);\n  836 | \tfree(base);\n  837 | }","lines":34}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"partial_dir_fname() copies the directory prefix with `strncpy(t, fname, len)` where len = fn - fname can be as large as the input path length. partial_fname is a fixed MAXPATHLEN buffer and `sz` is only decremented after the copy. If the directory portion of fname is >= MAXPATHLEN, strncpy overflows the static buffer before the later pathjoin length check (line 1321) can reject it. The comment `/* safe */` is therefore misleading.","fix":"Before the strncpy, verify `len < sz` (return NULL otherwise), then strncpy at most sz-1 bytes and NUL-terminate.","locations":[{"ref":"util1.c:1305-1322","code":" 1305 | char *partial_dir_fname(const char *fname)\n 1306 | {\n 1307 | \tchar *t = partial_fname;\n 1308 | \tint sz = sizeof partial_fname;\n 1309 | \tconst char *fn;\n 1310 | \n 1311 | \tif ((fn = strrchr(fname, '/')) != NULL) {\n 1312 | \t\tfn++;\n 1313 | \t\tif (*partial_dir != '/') {\n 1314 | \t\t\tint len = fn - fname;\n 1315 | \t\t\tstrncpy(t, fname, len); /* safe */\n 1316 | \t\t\tt += len;\n 1317 | \t\t\tsz -= len;\n 1318 | \t\t}\n 1319 | \t} else\n 1320 | \t\tfn = fname;\n 1321 | \tif ((int)pathjoin(t, sz, partial_dir, fn) >= sz)\n 1322 | \t\treturn NULL;","lines":18}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"copy_xattrs() saves errno into save_errno only inside the lsetxattr failure branch, but the rsyserr() call between the read of errno and the restore can itself clobber errno, and the value passed to rsyserr is the raw errno while the restored value is the EINVAL-substituted one - the two can differ, so the diagnostic and the propagated errno are inconsistent.","fix":"Capture errno once at the top of the failure branch into save_errno, pass save_errno to rsyserr(), and restore save_errno before returning.","locations":[{"ref":"xattrs.c:370-376","code":"  370 | \t\tif (sys_lsetxattr(dest, name, ptr, datum_len) < 0) {\n  371 | \t\t\tint save_errno = errno ? errno : EINVAL;\n  372 | \t\t\trsyserr(FERROR_XFER, errno,\n  373 | \t\t\t\t\"copy_xattrs: lsetxattr(%s,\\\"%s\\\") failed\",\n  374 | \t\t\t\tfull_fname(dest), name);\n  375 | \t\t\terrno = save_errno;\n  376 | \t\t\treturn -1;","lines":7}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","description":"auth_client() falls back to getpass(\"Password: \") and if that returns NULL sets pass=\"\". An empty password is then hashed and sent as a valid response. There is no warning that an empty password is being used, which can mask a misconfiguration (no password file, no env var, non-interactive tty) and silently attempt auth with an empty secret.","fix":"Warn (FERROR) when no password source was found and an empty password is being used, or fail the auth attempt.","locations":[{"ref":"authenticate.c:3 return mid_up;\n 2867 | \t\t}\n 2868 | \t\tif (diff < 0)\n 2869 | \t\t\tlow = mid_up + 1;\n 2870 | \t\telse\n 2871 | \t\t\thigh = mid - 1;\n 2872 | \t}","lines":41}]},{"id":"LOGIC_66","type":"logic_error","type_label":"Logic Error","severity":"low","description":"any_time_differs/itemize lazily fill sxp->crtime only when it is currently 0, using 0 as the 'not yet fetched' sentinel. A file whose real create time is exactly epoch 0 (a legitimate value) will be re-fetched on every call (get_create_time re-invoked), and more importantly get_create_time may legitimately return 0, after which the code keeps treating it as unfetched. This is a minor correctness/perf issue at the epoch-0 boundary.","fix":"Use a separate boolean 'crtime fetched' flag in stat_x instead of overloading 0 as the unfetched sentinel.","locations":[{"ref":"generator.c:405-416","code":"  405 | static inline int any_time_differs(stat_x *sxp, struct file_struct *file, UNUSED(const char *fname))\n  406 | {\n  407 | \tint differs = mtime_differs(&sxp->st, file);\n  408 | #ifdef SUPPORT_CRTIMES\n  409 | \tif (!differs && crtimes_ndx) {\n  410 | \t\tif (sxp->crtime == 0)\n  411 | \t\t\tsxp->crtime = get_create_time(fname, &sxp->st);\n  412 | \t\tdiffers = !same_time(sxp->crtime, 0, F_CRTIME(file), 0);\n  413 | \t}\n  414 | #endif\n  415 | \treturn differs;\n  416 | }","lines":12},{"ref":"generator.c:534-541","code":"  534 | #ifdef SUPPORT_CRTIMES\n  535 | \t\tif (crtimes_ndx) {\n  536 | \t\t\tif (sxp->crtime == 0)\n  537 | \t\t\t\tsxp->crtime = get_create_time(fnamecmp, &sxp->st);\n  538 | \t\t\tif (!same_time(sxp->crtime, 0, F_CRTIME(file), 0))\n  539 | \t\t\t\tiflags |= ITEM_REPORT_CRTIME;\n  540 | \t\t}\n  541 | #endif","lines":8}]},{"id":"LOGIC_67","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In recv_generator the parent-directory mkdir for --relative && !implied_dirs ignores whether do_stat_at failed for a reason other than ENOENT. It only checks do_stat_at(dn, &sx. n  166 | \t\t\tfile->flags |= FLAG_HLINK_DONE;\n  167 | \t\t\tcontinue;\n  168 | \t\t}\n  169 | \n  170 | \t\tfile->flags |= FLAG_HLINK_LAST;\n  171 | \t\tF_HL_PREV(file) = prev;\n  172 | \t\tif (inc_recurse && CVAL(node->data, 0) == 0) {\n  173 | \t\t\tif (unsort_ndx)\n  174 | \t\t\t\tprev = F_NDX(file);\n  175 | \t\t\telse\n  176 | \t\t\t\tprev = ndx_list[from] + hlink_flist->ndx_start;\n  177 | \t\t\tSIVAL(node->data, 1, prev);\n  178 | \t\t}\n  179 | \t}","lines":58}]},{"id":"LOGIC_71","type":"logic_error","type_label":"Logic Error","severity":"low","description":"what_fd_is() returns a pointer to a function-local `static char buf[20]` for the default case. It is not reentrant and a second call (e.g. logging two fds in one printf via separate what_fd_is() calls) would corrupt the first result. The buffer is also only 20 bytes - adequate for `fd %d` but the static-return idiom is a latent aliasing bug if the result is used after a subsequent call.","fix":"Document the single-use constraint, or have callers copy the result immediately; for the named-fd cases this is fine since they return string literals.","locations":[{"ref":"io.c:293-307","code":"  293 | static const char *what_fd_is(int fd)\n  294 | {\n  295 | \tstatic char buf[20];\n  296 | \n  297 | \tif (fd == sock_f_out)\n  298 | \t\treturn \"socket\";\n  299 | \telse if (fd == iobuf.out_fd)\n  300 | \t\treturn \"message fd\";\n  301 | \telse if (fd == batch_fd)\n  302 | \t\treturn \"batch file\";\n  303 | \telse {\n  304 | \t\tsnprintf(buf, sizeof buf, \"fd %d\", fd);\n  305 | \t\treturn buf;\n  306 | \t}\n  307 | }","lines":15}]},{"id":"LOGIC_72","type":"logic_error","type_label":"Logic Error","severity":"low","description":"raw_read_int() may use an uninitialized pointer pattern that depends on macro evaluation order. The `else` branch is `raw_read_buf(data = buf, 4);` which assigns data inside the argument; this is correct, but the parallel `if` branch returns `IVAL(data,0)` where data came from perform ter the outer while exhausts, only `if (count == 1)` returns the whole first string; for count >= 2 with insufficient components it returns NULL. wildmatch_array(where>0) then treats NULL text as FALSE. That means a pattern requesting the trailing 2 components against a single-component name silently fails to match rather than matching the available component, which may not be the intended fallback.","fix":"Confirm desired semantics; if a request for N trailing components on a shorter path should match the whole path, return *a (the first element) for count>=1 when no further slash is found instead of only count==1.","locations":[{"ref":"lib/wildmatch.c:260-285","code":"  260 | static const uchar *trailing_N_elements(const uchar*const **a_ptr, int count)\n  261 | {\n  262 |     const uchar*const *a = *a_ptr;\n  263 |     const uchar*const *first_a = a;\n  264 | \n  265 |     while (*a)\n  266 | \t    a++;\n  267 | \n  268 |     while (a != first_a) {\n  269 | \tconst uchar *s = *--a;\n  270 | \ts += strlen((char*)s);\n  271 | \twhile (--s >= *a) {\n  272 | \t    if (*s == '/' && !--count) {\n  273 | \t\t*a_ptr = a+1;\n  274 | \t\treturn s+1;\n  275 | \t    }\n  276 | \t}\n  277 |     }\n  278 | \n  279 |     if (count == 1) {\n  280 | \t*a_ptr = a+1;\n  281 | \treturn *a;\n  282 |     }\n  283 | \n  284 |     return NULL;\n  285 | }","lines":26},{"ref":"lib/wildmatch.c:327-332","code":"  327 |     if (where > 0)\n  328 | \ttext = trailing_N_elements(&a, where);\n  329 |     else\n  330 | \ttext = *a++;\n  331 |     if (!text)\n  332 | \treturn FALSE;","lines":6}]},{"id":"LOGIC_75","type":"logic_error","type_label":"Logic Error","severity":"low","description":"do_parameter() P_CHAR does '*(char*)parm_ptr = *parmvalue;' which reads the first char of parmvalue with no check that parmvalue is non-empty. parmvalue comes from the parser and should be at least an empty NUL-terminated string, so *parmvalue is '\\0' for an empty value (benign), but an empty char-param silent og.c:236-238","code":"  236 | \t\tif ((in_buf < end - 4 && *in_buf == '\\\\' && in_buf[1] == '#'\n  237 | \t\t  && isDigit(in_buf + 2) && isDigit(in_buf + 3) && isDigit(in_buf + 4))\n  238 | \t\t || (*in_buf != '\\t' && ((use_isprint && !isPrint(in_buf)) || *(uchar*)in_buf < ' ')))","lines":3}]},{"id":"LOGIC_78","type":"logic_error","type_label":"Logic Error","severity":"low","description":"read_del_stats() accumulates stats.deleted_files via `stats.deleted_files += stats.deleted_dirs = read_varint_bounded(...)`. Each component is independently bounded by MAX_WIRE_DEL_STAT, but the running sum stats.deleted_files (an int field) is not bounded, so five near-MAX values can overflow a 32-bit int, producing a negative/garbage total that is later printed and used in output_itemized_counts().","fix":"Accumulate into a 64-bit intermediate and bound/clamp the total, or verify the int width of the stats fields is large enough that 5*MAX_WIRE_DEL_STAT cannot overflow; otherwise widen the field.","locations":[{"ref":"main.c:240-247","code":"  240 | void read_del_stats(int f)\n  241 | {\n  242 | \tstats.deleted_files = read_varint_bounded(f, 0, MAX_WIRE_DEL_STAT, \"deleted_files\");\n  243 | \tstats.deleted_files += stats.deleted_dirs = read_varint_bounded(f, 0, MAX_WIRE_DEL_STAT, \"deleted_dirs\");\n  244 | \tstats.deleted_files += stats.deleted_symlinks = read_varint_bounded(f, 0, MAX_WIRE_DEL_STAT, \"deleted_symlinks\");\n  245 | \tstats.deleted_files += stats.deleted_devices = read_varint_bounded(f, 0, MAX_WIRE_DEL_STAT, \"deleted_devices\");\n  246 | \tstats.deleted_files += stats.deleted_specials = read_varint_bounded(f, 0, MAX_WIRE_DEL_STAT, \"deleted_specials\");\n  247 | }","lines":8},{"ref":"main.c:387-416","code":"  387 | static void output_itemized_counts(const char *prefix, int *counts)\n  388 | {\n  389 | \tstatic char *const labels[] = { \"reg\", \"dir\", \"link\", \"dev\", \"special\" };\n  390 | \tchar buf[1024], *pre = \" (\";\n  391 | \tint j, len = 0;\n  392 | \tint total = counts[0];\n  393 | \tif (total) {\n  394 | \t\tcounts[0] -= counts[1] + counts[2] + counts[3] + counts[4];\n  395 | \t\tfor (j = 0; j < 5; j++) {\n  396 | \t\t\tif (counts[j]) {\n  397 | \t\t\t\t/* snprintf can return more than its size arg\n  398 | \t\t\t\t * on truncation; keep len <= sizeof buf - 2 so\n  399 | \t\t\t\t * the closing ')' and trailing NUL always\n  400 | \t\t\t\t * have room and the next iteration's\n  401 | \t\t\t\t * sizeof buf - len - 2 cannot underflow. */\n  402 | \t\t\t\tif (len >= (int)sizeof buf - 2)\n  403 | \t\t\t\t\tbreak;\n  404 | \t\t\t\tlen += snprintf(buf+len, sizeof buf - len - 2,\n  405 | \t\t\t\t\t\"%s%s: %s\",\n  406 | \t\t\t\t\tpre, labels[j], comma_num(counts[j]));\n  407 | \t\t\t\tif (len > (int)sizeof buf - 2)\n  408 | \t\t\t\t\tlen = (int)sizeof buf - 2;\n  409 | \t\t\t\tpre = \", \";\n  410 | \t\t\t}\n  411 | \t\t}\n  412 | \t\tbuf[len++] = ')';\n  413 | \t}\n  414 | \tbuf[len] = '\\0';\n  415 | \trprintf(FINFO, \"%s: %s%s\\n\", prefix, comma_num(total), buf);\n  416 | }","lines":30}]},{"id":"LOGIC_79","type":"logic_error","type_label":"Logic Error","severity":"low","description":"handle_stats() caches total_read/total_written from stats at entry, but in the client-receiver branch it then OVERWRITES total_written and total_read by reading them back from the wire in swapped order. If f is a valid fd but the peer sent fewer values (protocol mismatch / truncation), read_varlong30 will block or error; more subtly, when am_sender && write_batch is false and we are a server non-sender, none of the branches fire and the cached values silently remain the local (wrong-direction) totals used later by output_summary in some code paths.","fix":"Document/verify that every reachable caller state is covered by one of the branches; add an explicit else for the unhandled server-receiver/generator case so totals are never reported with the wrong direction.","locations":[{"ref":"main.c:325-385","code":"  325 | static void handle_stats(int f)\n  326 | {\n  327 | \tendtime = time(NULL);\n  328 | \n  329 | \t/* Cache two stats because the read/write code can change it. */\n  330 | \ttotal_read = stats.total_read;\n  331 | \ttotal_written = stats.total_written;\n  332 | \n  333 | \tif (INFO_GTE(STATS, 3)) {\n  334 | \t\t/* These come out from every process */\n  335 | \t\tshow_malloc_stats();\n  336 | \t\tshow_flist_stats();\n  337 | \t}\n  338 | \n  339 | \tif (am_generator)\n  340 | \t\treturn;\n  341 | \n  342 | \tif (am_daemon) {\n  343 | \t\tif (f == -1 || !am_sender)\n  344 | \t\t\treturn;\n  345 | \t}\n  346 | \n  347 | \tif (am_server) {\n  348 | \t\tif (am_sender) {\n  349 | \t\t\twrite_varlong30(f, total_read, 3);\n  350 | \t\t\twrite_varlong30(f, total_written, 3);\n  351 | \t\t\twrite_varlong30(f, stats.total_size, 3);\n  352 | \t\t\tif (protocol_version >= 29) {\n  353 | \t\t\t\twrite_varlong30(f, stats.flist_buildtime, 3);\n  354 | \t\t\t\twrite_varlong30(f, stats.flist_xfertime, 3);\n  355 | \t\t\t}\n  356 | \t\t}\n  357 | \t\treturn;\n  358 | \t}\n  359 | \n  360 | \t/* this is the client */\n  361 | \n  362 | \tif (f < 0 && !am_sender) /* e.g. when we got an empty file list. */\n  363 | \t\t;\n  364 | \telse if (!am_sender) {\n  365 | \t\t/* Read the first two in opposite order because the meaning of\n  366 | \t\t * read/write swaps when switching from sender to receiver. */\n  367 | \t\ttotal_written = read_varlong30(f, 3);\n  368 | \t\ttotal_read = read_varlong30(f, 3);\n  369 | \t\tstats.total_size = read_varlong30(f, 3);\n  370 | \t\tif (protocol_version >= 29) {\n  371 | \t\t\tstats.flist_buildtime = read_varlong30(f, 3);\n  372 | \t\t\tstats.flist_xfertime = read_varlong30(f, 3);\n  373 | \t\t}\n  374 | \t} else if (write_batch) {\n  375 | \t\t/* The --read-batch process is going to be a client\n  376 | \t\t * receiver, so we need to give it the stats. */\n  377 | \t\twrite_varlong30(batch_fd, total_read, 3);\n  378 | \t\twrite_varlong30(batch_fd, total_written, 3);\n  379 | \t\twrite_varlong30(batch_fd, stats.total_size, 3);\n  380 | \t\tif (protocol_version >= 29) {\n  381 | \t\t\twrite_varlong30(batch_fd, stats.flist_buildtime, 3);\n  382 | \t\t\twrite_varlong30(batch_fd, stats.flist_xfertime, 3);\n  383 | \t\t}\n  384 | \t}\n  385 | }","lines":61}]},{"id":"LOGIC_80","type":"logic_error","type_label":"Logic Error","severity":"low","description":"bytes_per_sec_human_dnum() divides by (0.5 + (endtime - starttime)). endtime and starttime are time_t; if the system clock steps backward between start and end, (endtime - starttime) can be negative enough that the denominator becomes <= 0, producing a negative or +/-inf rate. The 0.5 fudge only guards the exact zero-elapsed case, not backward clock jumps.","fix":"Clamp the elapsed time to a non-negative value, e.g. double elapsed = endtime > starttime ? endtime - starttime : 0; then divide by (0.5 + elapsed).","locations":[{"ref":"main.c:418-423","code":"  418 | static const char *bytes_per_sec_human_dnum(void)\n  419 | {\n  420 | \tif (starttime == (time_t)-1 || endtime == (time_t)-1)\n  421 | \t\treturn \"UNKNOWN\";\n  422 | \treturn human_dnum((total_written + total_read) / (0.5 + (endtime - starttime)), 2);\n  423 | }","lines":6}]},{"id":"LOGIC_81","type":"logic_error","type_label":"Logic Error","severity":"low","description":"output_summary() computes speedup as total_size / (total_written + total_read) via comma_dnum(). When the transfer moves zero bytes (e.g. empty file list or dry-run with nothing to do) total_written + total_read can be 0, yielding a divide-by-zero (inf/nan) in the speedup figure printed at STATS level 1.","fix":"Guard the divisor: print speedup only when (total_written + total_read) > 0, otherwise print a placeholder such as 0.00.","locations":[{"ref":"main.c:466-469","code":"  466 | \t\trprintf(FINFO, \"total size is %s  speedup is %s%s\\n\",\n  467 | \t\t\thuman_num(stats.total_size),\n  468 | \t\t\tcomma_dnum((double)stats.total_size / (total_written+total_read), 2),\n  469 | \t\t\twrite_batch < 0 ? \" (BATCH ONLY)\" : dry_run ? \" (DRY RUN)\" : \"\");","lines":4}]},{"id":"LOGIC_82","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In do_cmd() the remote-shell parsing closes a quote with `if (*f == in_quote && *++f != in_quote)`. The `*++f` advances f even while testing, so an escaped doubled quote ('' or \"\") inside a quoted string is handled, but a single closing quote immediately followed by end-of-string ('\\0') is matched by the != in_quote test and clears in_quote while f now points at the NUL; the outer `while (*f != ' ' || in_quote)` then continues with in_quote=0 and *f=='\\0', falls into the `if (!*f)` branch which does f-- and breaks - correct only by luck. The control flow is fragile and the `continue` after clearing in_quote skips the `*t++ = *f++` so the closing quote is correctly dropped, but a stray quote char at string end is easy to mis-handle. Worth hardening.","fix":"Restructure the quote-handling loop with explicit bounds checks on f so end-of-string while scanning a quote is handled in one place rather than relying on the f-- fixup.","locations":[{"ref":"main.c:537-560","code":"  537 | \t\t\twhile (*f != ' ' || in_quote) {\n  538 | \t\t\t\tif (!*f) {\n  539 | \t\t\t\t\tif (in_quote) {\n  540 | \t\t\t\t\t\trprintf(FERROR,\n  541 | \t\t\t\t\t\t\t\"Missing trailing-%c in remote-shell command.\\n\",\n  542 | \t\t\t\t\t\t\tin_quote);\n  543 | \t\t\t\t\t\texit_cleanup(RERR_SYNTAX);\n  544 | \t\t\t\t\t}\n  545 | \t\t\t\t\tf--;\n  546 | \t\t\t\t\tbreak;\n  547 | \t\t\t\t}\n  548 | \t\t\t\tif (*f == '\\'' || *f == '\"') {\n  549 | \t\t\t\t\tif (!in_quote) {\n  550 | \t\t\t\t\t\tin_quote = *f++;\n  551 | \t\t\t\t\t\tcontinue;\n  552 | \t\t\t\t\t}\n  553 | \t\t\t\t\tif (*f == in_quote && *++f != in_quote) {\n  554 | \t\t\t\t\t\tin_quote = '\\0';\n  555 | \t\t\t\t\t\tcontinue;\n  556 | \t\t\t\t\t}\n  557 | \t\t\t\t}\n  558 | \t\t\t\t*t++ = *f++;\n  559 | \t\t\t}\n  560 | \t\t\t*t++ = '\\0';","lines":24}]},{"id":"LOGIC_83","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In get_local_name(), when mkpath_dest_arg dry-run path at line 835 takes the branch, it calls change_dir(dest_path, CD_SKIP_CHDIR) but ignores its return value, while every other change_dir call in this function checks for failure and exits. An error there is silently swallowed, potentially leaving curr_dir[] inconsistent for the dry-run.","fix":"Check the return of the CD_SKIP_CHDIR change_dir call and handle failure consistently with the other call sites, or comment why a failure is acceptable here.","locations":[{"ref":"main.c:835-849","code":"  835 | \tif (dry_run && mkpath_dest_arg && do_stat(dest_path, &st) < 0) {\n  836 | \t\t/* --mkpath would have created this parent dir, but a dry run did\n  837 | \t\t * not, so don't chdir into it; flag the destination as not yet\n  838 | \t\t * present (as the dir-creation path above does) so the generator\n  839 | \t\t * doesn't try to compare against the missing tree (#880).  Only\n  840 | \t\t * the missing-parent case is touched, so an ordinary file-to-file\n  841 | \t\t * dry run still itemizes against an existing destination. */\n  842 | \t\tdry_run++;\n  843 | \t\tchange_dir(dest_path, CD_SKIP_CHDIR);\n  844 | \t} else if (!change_dir(dest_path, CD_NORMAL)) {\n  845 | \t\trsyserr(FERROR, errno, \"change_dir#3 %s failed\",\n  846 | \t\t\tfull_fname(dest_path));\n  847 | \t\texit_cleanup(RERR_FILESELECT);\n  848 | \t}\n  849 | \t*cp = '/';","lines":15}]},{"id":"LOGIC_84","type":"logic_error","type_label":"Logic Error","severity":"low","description":"parse_size_arg uses `size *= atof(size_arg)` to apply the (possibly fractional) numeric prefix to the unit multiplier already accumulated in `size`. Because `size` is an integer ssize_t and atof returns a double, the product is computed in double then truncated to ssize_t. For very large values (near the ssize_t range) this loses precision and the subsequent `if (size < 0 ...)` overflow check operates on the truncated/rounded integer, so a value that overflowed during the double->ssize_t conversion may slip past as a garbage (possibly negative-wrapped) number depending on platform.","fix":"Validate the double product against (double)max_value / SSIZE_MAX before converting to ssize_t, and reject if it exceeds the representable range, rather than relying on a post-cast `size < 0` test.","locations":[{"ref":"options.c:1126-1133","code":" 1126 | \twhile (reps--)\n 1127 | \t\tsize *= mult;\n 1128 | \tsize *= atof(size_arg);\n 1129 | \tif ((*arg == '+' || *arg == '-') && arg[1] == '1' && arg != size_arg)\n 1130 | \t\tsize += atoi(arg), arg += 2;\n 1131 | \tif (*arg)\n 1132 | \t\tgoto failure;\n 1133 | \tif (size < 0 || (max_value >= 0 && size > max_value)) {","lines":8}]},{"id":"LOGIC_85","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In parse_time(), the leap-year fixup comment/logic at the in_date==1 (year) case assumes the only way tm_mday can decrease after mktime is a Feb-29 -> Mar-1 rollover (mon==1 mday==29). It hard-codes t.tm_mon==2 / old_mday==29 as the only valid case and otherwise returns error. This is fragile: it silently rejects otherwise-valid future-time computations if mktime normalizes differently across libc/timezone DST boundaries.","fix":"Recompute the target fields explicitly each iteration rather than reasoning from mktime's post-normalization mutation of the struct tm; or re-derive mday from the requested values before each mktime call.","locations":[{"ref":"options.c:1274-1283","code":" 1274 | \t\tcase 1:\n 1275 | \t\t\tif (t.tm_mday < old_mday) {\n 1276 | \t\t\t\t/* mon==1 mday==29 got bumped to mon==2 */\n 1277 | \t\t\t\tif (t.tm_mon != 2 || old_mday != 29)\n 1278 | \t\t\t\t\treturn (time_t)-1;\n 1279 | \t\t\t\tt.tm_mon = 1;\n 1280 | \t\t\t\tt.tm_mday = 29;\n 1281 | \t\t\t}\n 1282 | \t\t\tt.tm_year++;\n 1283 | \t\t\tbreak;","lines":10}]},{"id":"LOGIC_86","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Redundant/always-true condition. After `if (!do_compression) do_compression = CPRES_AUTO;`, do_compression is guaranteed nonzero, so the immediately following `if (do_compression && refused_compress)` has a dead `do_compression &&` sub-condition.","fix":"Drop the redundant `do_compression &&` and just test `if (refused_compress)`.","locations":[{"ref":"options.c:2018-2021","code":" 2018 | \tif (do_compression || do_compression_level != CLVL_NOT_SPECIFIED) {\n 2019 | \t\tif (!do_compression)\n 2020 | \t\t\tdo_compression = CPRES_AUTO;\n 2021 | \t\tif (do_compression && refused_compress) {","lines":4}]},{"id":"LOGIC_87","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In server_options(), `if (quiet && msgs2stderr)` sends -q to the server. quiet is the count of -q flags; msgs2stderr is a mode (0/1/2). The intent appears to be 'only forward -q when messages are not going to the client', but the check `&& msgs2stderr` is true for both mode 1 (all-to-stderr) and mode 2 (errors-to-stderr/default), so -q is forwarded in the default case too. If the design intends to suppress forwarding -q only in the client-message mode (0), this is correct; but the coupling between an unrelated count and a mode enum is non-obvious and undocumented.","fix":"Add a comment clarifying why -q is gated on msgs2stderr, or use an explicit named predicate; verify mode 2 (default) really should forward -q.","locations":[{"ref":"options.c:2628-2629","code":" 2628 | \tif (quiet && msgs2stderr)\n 2629 | \t\targstr[x++] = 'q';","lines":2}]},{"id":"LOGIC_88","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rprint_progress() ETA uses `(unsigned int)(remain / 3600.0)` for the hours field formatted as %4u, after already clamping remain <= 9999*3600. The minutes/seconds use `% 60` on a double cast to unsigned int. Casting a large double directly to unsigned int is ). The pre-29 branch's reasoning may be stale relative to the\ninplace_partial feature added later; the comment is at best confusing about which\ncombination is excluded.","fix":"Clarify the comment to state precisely which option combination is mutually exclusive for protocol < 29 versus the inplace_partial mode used for >= 29.","locations":[{"ref":"receiver.c:870-871","code":"  870 | \t\t\t/* Reminder: --inplace && --partial-dir are never\n  871 | \t\t\t * enabled at the same time. */","lines":2}]},{"id":"LOGIC_91","type":"logic_error","type_label":"Logic Error","severity":"low","description":"When proxy_user/proxy_pass are set, stringjoin(buffer, PROXY_BUF_SIZE, user, \":\", pass, NULL) silently truncates the credentials to PROXY_BUF_SIZE before len = strlen(buffer) is taken. The subsequent 'too long' length check at line 66 then operates on the already-truncated length, so over-long credentials are not rejected but are silently mangled, producing a broken Proxy-Authorization header rather than a clear error.","fix":"Compute the required length from the raw proxy_user/proxy_pass strings (strlen(user)+1+strlen(pass)) and reject before joining, or check that stringjoin did not truncate.","locations":[{"ref":"socket.c:61-72","code":"   61 | \tif (proxy_user && proxy_pass) {\n   62 | \t\tstringjoin(buffer, PROXY_BUF_SIZE,\n   63 | \t\t\t proxy_user, \":\", proxy_pass, NULL);\n   64 | \t\tlen = strlen(buffer);\n   65 | \n   66 | \t\tif ((len*8 + 5) / 6 >= PROXY_BUF_SIZE - 3) {\n   67 | \t\t\trprintf(FERROR,\n   68 | \t\t\t\t\"authentication information is too long\\n\");\n   69 | \t\t\treturn -1;\n   70 | \t\t}\n   71 | \n   72 | \t\tbase64_encode(buffer, len, authbuf, 1);","lines":12}]},{"id":"LOGIC_92","type":"logic_error","type_label":"Logic Error","severity":"low","description":"do_open_nofollow() in the no-O_NOFOLLOW fallback opens the file before comparing dev/ino, then on mismatch (a symlink-swap detected) returns EINVAL. This is a TOCTOU-narrowing check but it cannot distinguish a benign hardlink/rename from an attack; more importantly the comment block does not warn that on platforms lacking O_NOFOLLOW this remains racy (the lstat-then-open-then-fstat window). Minor since real systems have O_NOFOLLOW.","fix":"Add a note that the !O_NOFOLLOW path is best-effort and inherently racy; no functional change needed on modern systems.","locations":[{"ref":"syscall.c:1634-1658","code":" 1634 | #ifdef O_NOFOLLOW\n 1635 | \tfd = open(pathname, flags|O_NOFOLLOW);\n 1636 | #else\n 1637 | \tif (do_lstat(pathname, &l_st) < 0)\n 1638 | \t\treturn -1;\n 1639 | \tif (S_ISLNK(l_st.st_mode)) {\n 1640 | \t\terrno = ELOOP;\n 1641 | \t\treturn -1;\n 1642 | \t}\n 1643 | \tif ((fd = open(pathname, flags)) < 0)\n 1644 | \t\treturn fd;\n 1645 | \tif (do_fstat(fd, &f_st) < 0) {\n 1646 | \t  close_and_return_error:\n 1647 | \t\t{\n 1648 | \t\t\tint save_errno = errno;\n 1649 | \t\t\tclose(fd);\n 1650 | \t\t\terrno = save_errno;\n 1651 | \t\t}\n 1652 | \t\treturn -1;\n 1653 | \t}\n 1654 | \tif (l_st.st_dev != f_st.st_dev || l_st.st_ino != f_st.st_ino) {\n 1655 | \t\terrno = EINVAL;\n 1656 | \t\tgoto close_and_return_error;\n 1657 | \t}\n 1658 | #endif","lines":25}]},{"id":"LOGIC_93","type":"logic_error","type_label":"Logic Error","severity":"low","description":"tls.c stat_xattr() reads buf with sys_lgetxattr(..., sizeof buf - 1); if len >= (int)sizeof buf it forces ERANGE. The sscanf format \"%o %d,%d %d:%d\" reads 'mode' as unsigned int via %o but rdev_major/minor/uid/gid as signed %d into int vars; the resulting uid/gid are then assigned to fst->st_uid/st_gid. A malicious xattr with negative numbers (e.g. uid -1) is accepted and stored, which can later be interpreted as a very large uid. Minor since tls is a test tool, but it exits(1) on parse failure which is a hard abort on any malformed xattr.","fix":"Validate the parsed numeric ranges (non-negative, within id_t) before assigning, and consider warning+skip instead of exit(1) on corrupt xattrs.","locations":[{"ref":"tls.c:92-107","code":"   92 | \tif (sscanf(buf, \"%o %d,%d %d:%d\",\n   93 | \t\t   &mode, &rdev_major, &rdev_minor, &uid, &gid) != 5) {\n   94 | \t\tfprintf(stderr, \"Corrupt %s xattr attached to %s: \\\"%s\\\"\\n\",\n   95 | \t\t\tXSTAT_ATTR, fname, buf);\n   96 | \t\texit(1);\n   97 | \t}\n   98 | \n   99 | #if _S_IFLNK != 0120000\n  100 | \tif ((mode & (_S_IFMT)) == 0120000)\n  101 | \t\tmode = (mode & ~(_S_IFMT)) | _S_IFLNK;\n  102 | #endif\n  103 | \tfst->st_mode = mode;\n  104 | \n  105 | \tfst->st_rdev = MAKEDEV(rdev_major, rdev_minor);\n  106 | \tfst->st_uid = uid;\n  107 | \tfst->st_gid = gid;","lines":16}]},{"id":"LOGIC_94","type":"logic_error","type_label":"Logic Error","severity":"low","description":"tls.c storetime(): when t!=0 it does snprintf(dest+len, destsize-len, ...) for nsecs. If the first snprintf truncated (len >= destsize, since snprintf returns would-have-been length), destsize-len underflows to a huge size_t passed to the second snprintf, allowing a write past 'dest'. With the 50-byte buffers used here it won't truncate in practice, but the pattern is unsafe.","fix":"Guard the nsecs append with 'if (nsecs >= 0 && len > 0 && (size_t)len < destsize)'.","locations":[{"ref":"tls.c:132-141","code":"  132 | \t\tlen = snprintf(dest, destsize,\n  133 | \t\t\t\" %04d-%02d-%02d %02d:%02d:%02d\",\n  134 | \t\t\t(int)mt->tm_year + 1900,\n  135 | \t\t\t(int)mt->tm_mon + 1,\n  136 | \t\t\t(int)mt->tm_mday,\n  137 | \t\t\t(int)mt->tm_hour,\n  138 | \t\t\t(int)mt->tm_min,\n  139 | \t\t\t(int)mt->tm_sec);\n  140 | \t\tif (nsecs >= 0 && len >= 0)\n  141 | \t\t\tsnprintf(dest + len, destsize - len, \".%09d\", nsecs);","lines":10}]},{"id":"LOGIC_95","type":"logic_error","type_label":"Logic Error","severity":"low","description":"parse_name_map() validates a numeric mapping entry but for a range 'A-B' it never checks that A <= B. id_parse(cp) and id_parse(dash+1) are stored as id and max_id; recv_add_id() later matches with 'id < node->id || id > node->u.max_id'. If the user writes a reversed range (e.g. 100-50) max_id < id and the rule can never match, silently doing nothing instead of warning.","fix":"After parsing both ends of a range, reject (or warn) when max_id < id1.","locations":[{"ref":"uidlist.c:529-535","code":"  529 | \t\t\tif (dash) {\n  530 | \t\t\t\t*dash = '\\0';\n  531 | \t\t\t\tnoiu.max_id = id_parse(dash+1);\n  532 | \t\t\t} else\n  533 | \t\t\t\tnoiu.max_id = 0;\n  534 | \t\t\tflags = 0;\n  535 | \t\t\tid1 = id_parse(cp);","lines":7}]},{"id":"LOGIC_96","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In print_info_flags() JSON branch, `item_buf[strlen(item)+2-1] = '_';` rewrites a byte at a computed offset into item_buf to turn the 's' of an Nbits label into '_'. This index is derived from strlen(item) with no check that it is within the snprintf-truncated content; for the fixed capability strings it fits, but the write is unguarded against item_buf truncation (item_buf is 32 bytes) and would corrupt adjacent stack on a longer flag name.","fix":"Bound the index against the actual bytes written by snprintf (item_len, clamped to sizeof item_buf) before writing item_buf[...].","locations":[{"ref":"usage.c:182-188","code":"  182 | \t\t\titem_len = snprintf(item_buf, sizeof item_buf,\n  183 | \t\t\t\t\t   \" \\\"%s%s\\\": %s%.*s%s%s\", item, is_bits ? \"bits\" : \"\",\n  184 | \t\t\t\t\t   quot, val_len, val, quot, need_comma ? \",\" : \"\");\n  185 | \t\t\tif (is_bits)\n  186 | \t\t\t\titem_buf[strlen(item)+2-1] = '_'; /* Turn the 's' into a '_' */\n  187 | \t\t\tfor (space = item; (space = strpbrk(space, \" -\")) != NULL; space++)\n  188 | \t\t\t\titem_buf[space - item + 2] = '_';","lines":7}]},{"id":"LOGIC_97","type":"logic_error","type_label":"Logic Error","severity":"low","description":"robust_unlink() casts strlcpy's return into `pos` and then clamps `if ((pos = strlcpy(...)) >= MAXPATHLEN) pos = MAXPATHLEN - 1;`. When truncation occurs, `path` is truncated mid-path and the subsequent backward scan for '/' plus the `.rsyncNNN` suffix operate on a truncated name, so the rename target can collide with or differ from the intended sibling. This is an edge case (paths near MAXPATHLEN) but produces a silently wrong rename target rather than an error.","fix":"On strlcpy truncation, fail with ENAMETOOLONG instead of silently clamping and continuing.","locations":[{"ref":"util1.c:496-541","code":"  496 | int robust_unlink(const char *fname)\n  497 | {\n  498 | #ifndef ETXTBSY\n  499 | \treturn do_unlink_at(fname);\n  500 | #else\n  501 | \tstatic int counter = 1;\n  502 | \tint rc, pos, start;\n  503 | \tchar path[MAXPATHLEN];\n  504 | \n  505 | \trc = do_unlink_at(fname);\n  506 | \tif (rc == 0 || errno != ETXTBSY)\n  507 | \t\treturn rc;\n  508 | \n  509 | \tif ((pos = strlcpy(path, fname, MAXPATHLEN)) >= MAXPATHLEN)\n  510 | \t\tpos = MAXPATHLEN - 1;\n  511 | \n  512 | \twhile (pos > 0 && path[pos-1] != '/')\n  513 | \t\tpos--;\n  514 | \tpos += strlcpy(path+pos, \".rsync\", MAXPATHLEN-pos);\n  515 | \n  516 | \tif (pos > (MAXPATHLEN-MAX_RENAMES_DIGITS-1)) {\n  517 | \t\terrno = ETXTBSY;\n  518 | \t\treturn -1;\n  519 | \t}\n  520 | \n  521 | \t/* start where the last one left off to reduce chance of clashes */\n  522 | \tstart = counter;\n  523 | \tdo {\n  524 | \t\tsnprintf(&path[pos], MAX_RENAMES_DIGITS+1, \"%03d\", counter);\n  525 | \t\tif (++counter >= MAX_RENAMES)\n  526 | \t\t\tcounter = 1;\n  527 | \t} while ((rc = access(path, 0)) == 0 && counter != start);\n  528 | \n  529 | \tif (INFO_GTE(MISC, 1)) {\n  530 | \t\trprintf(FWARNING, \"renaming %s to %s because of text busy\\n\",\n  531 | \t\t\tfname, path);\n  532 | \t}\n  533 | \n  534 | \t/* maybe we should return rename()'s exit status? Nah. */\n  535 | \tif (do_rename_at(fname, path) != 0) {\n  536 | \t\terrno = ETXTBSY;\n  537 | \t\treturn -1;\n  538 | \t}\n  539 | \treturn 0;\n  540 | #endif\n  541 | }","lines":46}]},{"id":"LOGIC_98","type":"logic_error","type_label":"Logic Error","severity":"low","description":"lock_range() takes offset and len as `int`, but assigns them to `lock.l_start`/`lock.l_len` which are off_t. Negative or >2GB offsets/lengths cannot be expressed, silently truncating on large files and on LFS builds where off_t is 64-bit.","fix":"Take OFF_T offset and OFF_T len parameters to match the flock fields.","locations":[{"ref":"util1.c:632-643","code":"  632 | int lock_range(int fd, int offset, int len)\n  633 | {\n  634 | \tstruct flock lock;\n  635 | \n  636 | \tlock.l_type = F_WRLCK;\n  637 | \tlock.l_whence = SEEK_SET;\n  638 | \tlock.l_start = offset;\n  639 | \tlock.l_len = len;\n  640 | \tlock.l_pid = 0;\n  641 | \n  642 | \treturn fcntl(fd,F_SETLK,&lock) == 0;\n  643 | }","lines":12}]},{"id":"LOGIC_99","type":"logic_error","type_label":"Logic Error","severity":"low","description":"pathjoin() computes `destsize - 1` in the `if (len < destsize - 1)` test. The documented contract does not forbid destsize == 0, and strlcpy returns strlen(p1) for destsize 0. If a caller ever passes destsize 0, `destsize - 1` underflows to SIZE_MAX and the `len < SIZE_MAX` branch is taken, writing dest[len]='/' past a zero-size buffer.","fix":"Guard with `if (destsize && len < destsize - 1)` (and similarly the inner test), or assert destsize > 0.","locations":[{"ref":"util1.c:890-906","code":"  890 | size_t pathjoin(char *dest, size_t destsize, const char *p1, const char *p2)\n  891 | {\n  892 | \tsize_t len = strlcpy(dest, p1, destsize);\n  893 | \tif (len < destsize - 1) {\n  894 | \t\tif (!len || dest[len-1] != '/')\n  895 | \t\t\tdest[len++] = '/';\n  896 | \t\tif (len < destsize - 1)\n  897 | \t\t\tlen += strlcpy(dest + len, p2, destsize - len);\n  898 | \t\telse {\n  899 | \t\t\tdest[len] = '\\0';\n  900 | \t\t\tlen += strlen(p2);\n  901 | \t\t}\n  902 | \t}\n  903 | \telse\n  904 | \t\tlen += strlen(p2) + 1; /* Assume we'd insert a '/'. */\n  905 | \treturn len;\n  906 | }","lines":17}]},{"id":"LOGIC_100","type":"logic_error","type_label":"Logic Error","severity":"low","description":"normalize_path() shadows the function-scope `unsigned int len` with a local `int len = strlen(path)` inside the `if (*path != '/')` block. The outer `len` is the one returned via len_ptr (set by clean_fname). The shadowing is harmless here but is a readability trap and risks a future edit using the wrong `len`.","fix":"Rename the inner variable (e.g. plen) to avoid shadowing.","locations":[{"ref":"util1.c:1245-1254","code":" 1245 | char *normalize_path(char *path, BOOL force_newbuf, unsigned int *len_ptr)\n 1246 | {\n 1247 | \tunsigned int len;\n 1248 | \n 1249 | \tif (*path != '/') { /* Make path absolute. */\n 1250 | \t\tint len = strlen(path);\n 1251 | \t\tif (curr_dir_len + 1 + len >= sizeof curr_dir)\n 1252 | \t\t\treturn NULL;\n 1253 | \t\tcurr_dir[curr_dir_len] = '/';\n 1254 | \t\tmemcpy(curr_dir + curr_dir_len + 1, path, len + 1);","lines":10}]},{"id":"LOGIC_101","type":"logic_error","type_label":"Logic Error","severity":"low","description":"unsafe_symlink() rejects a destination ending in \"/..\" only when `dlen > 3` (line 1421). A destination of exactly \"/..\" has dlen == 3 and slips past this specific check; it is still caught as absolute (leading '/') here, but the off-by guard `dlen > 3` would also miss a relative-rooted variant if the leading-slash rule changed. The threshold should be `>= 3` to compare the trailing 3 chars safely.","fix":"Use `if (dlen >= 3 && strcmp(&dest[dlen-3], \"/..\") == 0)` (the strcmp already needs only 3 trailing bytes).","locations":[{"ref":"util1.c:1419-1422","code":" 1419 | \t// reject if the destination ends in /..\n 1420 | \tconst size_t dlen = strlen(dest);\n 1421 | \tif (dlen > 3 && strcmp(&dest[dlen-3], \"/..\") == 0)\n 1422 | \t    return 1;","lines":4}]},{"id":"LOGIC_102","type":"logic_error","type_label":"Logic Error","severity":"low","description":"fuzzy_distance() declares `uint32 a[MAXPATHLEN]` on the stack and indexes it by len2 \t\tabove_inc = above + UNIT + *((uchar*)s2+i2);\n 1628 | \t\t\ta[i2] = above = left < above\n 1629 | \t\t\t      ? (left_inc < diag_inc ? left_inc : diag_inc)\n 1630 | \t\t\t      : (above_inc < diag_inc ? above_inc : diag_inc);\n 1631 | \t\t\tdiag = left;\n 1632 | \t\t}\n 1633 | \t}\n 1634 | \n 1635 | \treturn a[len2-1];","lines":48}]},{"id":"LOGIC_103","type":"logic_error","type_label":"Logic Error","severity":"low","description":"my_alloc() computes the guard `num >= max_alloc/size` and then allocates `num * size`. The integer division floors, so for some (num,size) pairs near the limit the multiplication num*size can still be slightly below max_alloc and pass, which is intended; but the check does not protect against `size == 0` (division by zero). Callers use sizeof(type) so size is non-zero in practice, yet the public-looking helper has no guard.","fix":"Add `if (size == 0) size = 1;` or assert size > 0 before the division.","locations":[{"ref":"util2.c:73-91","code":"   73 | void *my_alloc(void *ptr, size_t num, size_t size, const char *file, int line)\n   74 | {\n   75 | \tif (num >= max_alloc/size) {\n   76 | \t\tif (!file)\n   77 | \t\t\treturn NULL;\n   78 | \t\trprintf(FERROR, \"[%s] exceeded --max-alloc=%s setting (file=%s, line=%d)\\n\",\n   79 | \t\t\twho_am_i(), do_big_num(max_alloc, 0, NULL), src_file(file), line);\n   80 | \t\texit_cleanup(RERR_MALLOC);\n   81 | \t}\n   82 | \tif (!ptr)\n   83 | \t\tptr = malloc(num * size);\n   84 | \telse if (ptr == do_calloc)\n   85 | \t\tptr = calloc(num, size);\n   86 | \telse\n   87 | \t\tptr = realloc(ptr, num * size);\n   88 | \tif (!ptr && file)\n   89 | \t\t_out_of_memory(\"my_alloc caller\", file, line);\n   90 | \treturn ptr;\n   91 | }","lines":19}]},{"id":"LOGIC_104","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In recv_xattr_request()'s receiver-side search, when lst->count == 1 the `for (j = lst->count; j > 1 ...)` loop body never runs, so the code relies entirely on the initial rxa/cnt already pointing at the sole entry. That holds for the first request but after a prior iteration advanced rxa within the same call (multi-request stream), rxa may be left pointing past the single element; the subsequent `rxa->num != num` check catches it with a protocol error rather than wrapping. Edge-case correctness is subtle and undocumented.","fix":"Reset rxa = lst->items / cnt = lst->count at the start of each receiver search iteration, or handle the count==1 case explicitly, so the scan always starts from a known position.","locations":[{"ref":"xattrs.c:730-747","code":"  730 | \t\t} else {\n  731 | \t\t\tint j;\n  732 | \t\t\t/* The receiving side has no known num order, so we just scan\n  733 | \t\t\t * forward (w/wrap) and hope that the next value is near by. */\n  734 | \t\t\tfor (j = lst->count; j > 1 && rxa->num != num; j--) {\n  735 | \t\t\t\tif (--cnt)\n  736 | \t\t\t\t\trxa++;\n  737 | \t\t\t\telse {\n  738 | \t\t\t\t\tcnt = lst->count;\n  739 | \t\t\t\t\trxa = lst->items;\n  740 | \t\t\t\t}\n  741 | \t\t\t}\n  742 | \t\t}\n  743 | \t\tif (!cnt || rxa->num != num) {\n  744 | \t\t\trprintf(FERROR, \"[%s] could not find xattr #%d for %s\\n\",\n  745 | \t\t\t\twho_am_i(), num, f_name(file, NULL));\n  746 | \t\t\texit_cleanup(RERR_PROTOCOL);\n  747 | \t\t}","lines":18}]},{"id":"LOGIC_105","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rsync_xal_set() generator branch: when an abbreviated xattr's fnamecmp value is missing or mismatched, control jumps to still_abbrev which `continue`s for am_generator without error, but for the receiver sets ret=-1 and prints an error. The non-generator memcpy/free path at the bottom (lines 1012-1016) overwrites rxas[i].name/datum with the re-read pointer; if the same rxa is processed again (it is not, single pass) this is fine, but freeing rxas[i].datum here while the original abbreviated datum may still be referenced by the cached rsync_xal_l list creates a dangling
