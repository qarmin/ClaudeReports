 464 | \t\tif (!(*match)--)\n  465 | \t\t\t*match = racl_list->count - 1;\n  466 | \t}","lines":16}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"AVX2 get_checksum1 applies the wrong CHAR_OFFSET correction. This loop consumes 64 bytes per iteration, and the algorithm comment above the function (lines 348-350) says it must add 64*CHAR_OFFSET to s1 and 2080*CHAR_OFFSET to s2. Instead the code adds 32*CHAR_OFFSET and 528*CHAR_OFFSET (the values copied verbatim from the 32-byte SSSE3/SSE2 loops). When rsync is built with a nonzero CHAR_OFFSET, the AVX2 path produces a different checksum1 than the scalar/SSE paths, breaking block matching and corrupting the rolling-checksum negotiation. CHAR_OFFSET is 0 in stock builds so the default build is unaffected, but the code is wrong for any nonzero setting.","fix":"In the AVX2 loop use the 64-byte constants: _mm_set1_epi32(64 * CHAR_OFFSET) for ss1 and _mm_set1_epi32(2080 * CHAR_OFFSET) for ss2, matching the documented per-64-byte formula.","locations":[{"ref":"simd-checksum-x86_64.cpp:431-439","code":"  431 | #if CHAR_OFFSET != 0\n  432 |             // s1 += 32*CHAR_OFFSET\n  433 |             __m128i char_offset_multiplier = _mm_set1_epi32(32 * CHAR_OFFSET);\n  434 |             ss1 = _mm_add_epi32(ss1, char_offset_multiplier);\n  435 | \n  436 |             // s2 += 528*CHAR_OFFSET\n  437 |             char_offset_multiplier = _mm_set1_epi32(528 * CHAR_OFFSET);\n  438 |             ss2 = _mm_add_epi32(ss2, char_offset_multiplier);\n  439 | #endif","lines":9}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"write_opt() drops the error status of the leading space write. Line 196 assigns `int err = write(...) != 1;` (the space), but line 197 immediately *overwrites* err with `err = write(batch_sh_fd, opt, len) != len ? 1 : 0;` using plain `=` instead of `|=`. A failed write of the separating space is therefore never reported, so a truncated/corrupt BATCH.sh file can be produced without the caller noticing an error.","fix":"Change line 197 to OR into the existing err: `err |= write(batch_sh_fd, opt, len) != len ? 1 : 0;` (or `err |= write(...) != len;`).","locations":[{"ref":"batch.c:193-203","code":"  193 | static int write_opt(const char *opt, const char *arg)\n  194 | {\n  195 | \tint len = strlen(opt);\n  196 | \tint err = write(batch_sh_fd, \" \", 1) != 1;\n  197 | \terr = write(batch_sh_fd, opt, len) != len ? 1 : 0;\n  198 | \tif (arg) {\n  199 | \t\terr |= write(batch_sh_fd, \"=\", 1) != 1;\n  200 | \t\terr |= write_arg(arg);\n  201 | \t}\n  202 | \treturn err;\n  203 | }","lines":11}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"access_match() calls strdup(list) and immediately strlower(list2) without checking strdup for NULL. Under memory pressure this is a NULL-pointer dereference in the daemon access-control path. Although rsync usually treats OOM as fatal elsewhere via out_of_memory(), here the unchecked strdup turns OOM into a crash rather than a clean error, and a crash mid-access-check is a security-relevant denial of service.","fix":"Check the strdup() result and call out_of_memory(\"access_match\") (or treat as deny) on NULL.","locations":[{"ref":"access.c:249-251","code":"  249 | \tchar *list2 = strdup(list);\n  250 | \n  251 | \tstrlower(list2);","lines":3}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In make_backup(), when copying a device/special/symlink fails (do_mknod_at or do_symlink_at error), the code only logs via rsyserr but still sets ret = 2 (device case) or ret = 2 (symlink else-branch). For the device branch, ret is set to 2 unconditionally even on mknod failure, so make_backup reports success and the caller (delete_item) will proceed to unlink the original even though no backup was created, losing data.","fix":"On do_mknod_at failure, leave ret as 0 (or set an explicit failure) so the caller does not treat the missing backup as a successful duplication. Only set ret = 2 when the mknod actually succeeded.","locations":[{"ref":"backup.c:277-285","code":"  277 | \t/* Check to see if this is a device file, or link */\n  278 | \tif ((am_root && preserve_devices && IS_DEVICE(file->mode))\n  279 | \t || (preserve_specials && IS_SPECIAL(file->mode))) {\n  280 | \t\tif (do_mknod_at(buf, file->mode, sx.st.st_rdev) < 0)\n  281 | \t\t\trsyserr(FERROR, errno, \"mknod %s failed\", full_fname(buf));\n  282 | \t\telse if (DEBUG_GTE(BACKUP, 1))\n  283 | \t\t\trprintf(FINFO, \"make_backup: DEVICE %s successful.\\n\", fname);\n  284 | \t\tret = 2;\n  285 | \t}","lines":9}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"fread error handling in exchange_protocols() motd loop and in the early_input_file send loop only checks feof/return value loosely. In the motd loop 'while (f && !feof(f))' a hard read error (ferror) that returns 0 without setting EOF would spin forever; more importantly fread short-count vs error is not distinguished. Lower impact but worth hardening since this runs in the daemon.","fix":"Break out of the loop on ferror(f), not just feof(f); check ferror after fread returns 0.","locations":[{"ref":"clientserver.c:162-170","code":"  162 | \t\t\twhile (f && !feof(f)) {\n  163 | \t\t\t\tint len = fread(buf, 1, bufsiz - 1, f);\n  164 | \t\t\t\tif (len > 0)\n  165 | \t\t\t\t\twrite_buf(f_out, buf, len);\n  166 | \t\t\t}\n  167 | \t\t\tif (f)\n  168 | \t\t\t\tfclose(f);\n  169 | \t\t\twrite_sbuf(f_out, \"\\n\");\n  170 | \t\t}","lines":9}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In send_file_list, when iconv conversion of files-from lines or args occurs the read_line/sanitize path silently continues, but more importantly the strlcpy at line 2303 truncates argv entries longer than MAXPATHLEN without any error: an over-long source arg is silently truncated to a different path rather than reported, potentially transferring the wrong file.","fix":"Check the strlcpy return against MAXPATHLEN and emit an overflow/skip error for over-long argument paths, mirroring the handling in make_file().","locations":[{"ref":"flist.c:2300-2306","code":" 2300 | \t\t} else {\n 2301 | \t\t\tif (argc-- == 0)\n 2302 | \t\t\t\tbreak;\n 2303 | \t\t\tstrlcpy(fbuf, *argv++, MAXPATHLEN);\n 2304 | \t\t\tif (sanitize_paths)\n 2305 | \t\t\t\tsanitize_path(fbuf, fbuf, \"\", 0, SP_KEEP_DOT_DIRS);\n 2306 | \t\t}","lines":7}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"forward_filesfrom_data() ignores read() errors other than EINTR by treating them as EOF. When read() returns -1 with any errno != EINTR (e.g. EIO, EBADF), the code at line 376 falls into the `len == 0 || errno != EINTR` branch and silently sends the end-of-file marker as if the files-from source closed cleanly, rather than reporting the I/O error. A truncated/garbled --files-from list would be sent as if complete.","fix":"Distinguish a true read error from EOF: on len < 0 with errno not in {EINTR, EAGAIN, EWOULDBLOCK}, emit an error (rsyserr) and exit_cleanup(RERR_FILEIO) instead of sending a clean EOF marker.","locations":[{"ref":"io.c:370-386","code":"  370 | static void forward_filesfrom_data(void)\n  371 | {\n  372 | \tssize_t len;\n  373 | \n  374 | \tlen = read(ff_forward_fd, ff_xb.buf + ff_xb.len, ff_xb.size - ff_xb.len);\n  375 | \tif (len <= 0) {\n  376 | \t\tif (len == 0 || errno != EINTR) {\n  377 | \t\t\t/* Send end-of-file marker */\n  378 | \t\t\tff_forward_fd = -1;\n  379 | \t\t\twrite_buf(iobuf.out_fd, \"\\0\\0\", ff_lastchar ? 2 : 1);\n  380 | \t\t\tfree_xbuf(&ff_xb);\n  381 | \t\t\tif (ff_reenable_multiplex >= 0)\n  382 | \t\t\t\tio_start_multiplex_out(ff_reenable_multiplex);\n  383 | \t\t\tfree_implied_include_partial_string();\n  384 | \t\t}\n  385 | \t\treturn;\n  386 | \t}","lines":17}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"set_dparams() does 'equal = strchr(params[j], '='); *equal = 0;' with no NULL check, relying on the comment 'options.c verified this'. If that invariant is ever violated (e.g., a --dparam value without '=' reaching here through a different code path), this is a NULL dereference. The defensive cost is trivial.","fix":"Guard: if (!equal) continue; (or log and skip) instead of unconditionally dereferencing.","locations":[{"ref":"loadparm.c:553-555","code":"  553 | \tfor (j = 0; j < dparam_list.count; j++) {\n  554 | \t\tequal = strchr(params[j], '='); /* options.c verified this */\n  555 | \t\t*equal = '\\0';","lines":3}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"free_sums() frees s->sums then s->sum2_array only inside `if (s->sums)`. If a sum_struct is ever allocated with sum2_array set but sums NULL (or sums freed/zeroed independently), sum2_array leaks; conversely the code assumes sum2_array is always allocated together with sums. This coupling is undocumented and brittle.","fix":"Free sums and sum2_array independently (each guarded by its own non-NULL check), or document the invariant that the two are always allocated/freed as a pair.","locations":[{"ref":"rsync.c:438-445","code":"  438 | void free_sums(struct sum_struct *s)\n  439 | {\n  440 | \tif (s->sums) {\n  441 | \t\tfree(s->sums);\n  442 | \t\tfree(s->sum2_array);\n  443 | \t}\n  444 | \tfree(s);\n  445 | }","lines":8}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In send_files, after a successful do_fstat the code maps the file with map_file but\nmap_file/map_ptr report read errors only v ddresses fail at socket()/bind() stage, the user gets the generic message but never sees why each address failed.","fix":"Record errno into errnos[j] in the socket()-failure and try_bind_local()-failure continue branches as well, so every attempted address has a reportable error.","locations":[{"ref":"socket.c:262-296","code":"  262 | \tfor (res = res0, j = 0; res; res = res->ai_next, j++) {\n  263 | \t\ts = socket(res->ai_family, res->ai_socktype, res->ai_protocol);\n  264 | \t\tif (s < 0)\n  265 | \t\t\tcontinue;\n  266 | \n  267 | \t\tif (bind_addr\n  268 | \t\t && try_bind_local(s, res->ai_family, type,\n  269 | \t\t\t\t   bind_addr) == -1) {\n  270 | \t\t\tclose(s);\n  271 | \t\t\ts = -1;\n  272 | \t\t\tcontinue;\n  273 | \t\t}\n  274 | \t\tif (connect_timeout > 0) {\n  275 | \t\t\tSIGACTION(SIGALRM, contimeout_handler);\n  276 | \t\t\talarm(connect_timeout);\n  277 | \t\t}\n  278 | \n  279 | \t\tset_socket_options(s, sockopts);\n  280 | \t\twhile (connect(s, res->ai_addr, res->ai_addrlen) < 0) {\n  281 | \t\t\tif (connect_timeout < 0)\n  282 | \t\t\t\texit_cleanup(RERR_CONTIMEOUT);\n  283 | \t\t\tif (errno == EINTR)\n  284 | \t\t\t\tcontinue;\n  285 | \t\t\tclose(s);\n  286 | \t\t\ts = -1;\n  287 | \t\t\tbreak;\n  288 | \t\t}\n  289 | \n  290 | \t\tif (connect_timeout > 0)\n  291 | \t\t\talarm(0);\n  292 | \n  293 | \t\tif (s < 0) {\n  294 | \t\t\terrnos[j] = errno;\n  295 | \t\t\tcontinue;\n  296 | \t\t}","lines":35},{"ref":"socket.c:314-320","code":"  314 | \t\tfor (res = res0, j = 0; res; res = res->ai_next, j++) {\n  315 | \t\t\tif (errnos[j] == 0)\n  316 | \t\t\t\tcontinue;\n  317 | \t\t\tif ((error = getnameinfo(res->ai_addr, res->ai_addrlen, buf, sizeof buf, NULL, 0, NI_NUMERICHOST)) != 0)\n  318 | \t\t\t\tsnprintf(buf, sizeof buf, \"*getnameinfo failure: %s*\", gai_strerror(error));\n  319 | \t\t\trsyserr(FERROR, errnos[j], \"failed to connect to %s (%s)\", h, buf);\n  320 | \t\t}","lines":7}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In copy_file(), if do_fsync fails (line 459) the code closes ofd and returns -1, but ifd was already closed earlier (line 441) so that is fine; however on the ftruncate failure path (line 452) it logs the error but does NOT return failure and continues to fsync/close, so a truncate failure that the comment says 'must trigger the partial transfer error' is in fact swallowed - copy_file returns 0 (success) despite a wrong-length dest file.","fix":"On do_ftruncate() failure, set an error flag and return -1 (after closing ofd), matching the comment's stated intent of triggering a partial-transfer error.","locations":[{"ref":"util1.c:446-457","code":"  446 | \t/* Source file might have shrunk since we fstatted it.\n  447 | \t * Cut off any extra preallocated zeros from dest file. */\n  448 | \tif (offset < prealloc_len) {\n  449 | #ifdef HAVE_FTRUNCATE\n  450 | \t\t/* If we fail to truncate, the dest file may be wrong, so we\n  451 | \t\t * must trigger the \"partial transfer\" error. */\n  452 | \t\tif (do_ftruncate(ofd, offset) < 0)\n  453 | \t\t\trsyserr(FERROR_XFER, errno, \"ftruncate %s\", full_fname(dest));\n  454 | #else\n  455 | \t\trprintf(FERROR_XFER, \"no ftruncate for over-long pre-alloc: %s\", full_fname(dest));\n  456 | #endif\n  457 | \t}","lines":12}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"get_xattr_data() treats only ENOTSUP as a non-fatal 'attribute absent' condition. If an xattr listed by get_xattr_names() disappears (or its value is removed) before lgetxattr() reads it - a normal TOCTOU race during concurrent modification - lgetxattr returns ENOATTR/ENODATA and rsync_xal_get()/copy_xattrs() abort the whole file transfer with -1 instead of skipping the vanished attribute.","fix":"In get_xattr_data(), also return NULL silently (or have callers skip) when errno == ENOATTR/ENODATA, mirroring the ENOTSUP ha e same getc loop, so the tail of the discarded token is consumed correctly only because the inner loop keeps reading until a delimiter; however the discarded prefix is silently dropped with just a truncated message, which can mask a real configuration error.","fix":"Consider making over-long filter lines a fatal error when XFLG_FATAL_ERRORS is set, mirroring parse_filter_str()'s discard path.","locations":[{"ref":"exclude.c:1503-1512","code":" 1503 | \t\t\tif (s < eob)\n 1504 | \t\t\t\t*s++ = ch;\n 1505 | \t\t\telse\n 1506 | \t\t\t\toverflow = 1;\n 1507 | \t\t}\n 1508 | \t\tif (overflow) {\n 1509 | \t\t\trprintf(FERROR, \"discarding over-long filter: %s...\\n\", line);\n 1510 | \t\t\ts = line;\n 1511 | \t\t}\n 1512 | \t\t*s = '\\0';","lines":10}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"do_delayed_deletions ignores the return value of lseek(deldelay_fd, 0, 0). If the seek fails (e.g. on an unusual fd state), the subsequent reads start from the wrong offset and read_delay_line will report 'invalid data' or silently delete the wrong set of items rather than reporting the seek error.","fix":"Check the lseek return value and bail out with an error (skip the delayed-deletion pass) if it is < 0.","locations":[{"ref":"generator.c:259-272","code":"  259 | static void do_delayed_deletions(char *delbuf)\n  260 | {\n  261 | \tint mode, flags;\n  262 | \n  263 | \tif (deldelay_fd >= 0) {\n  264 | \t\tif (deldelay_cnt && !flush_delete_delay())\n  265 | \t\t\treturn;\n  266 | \t\tlseek(deldelay_fd, 0, 0);\n  267 | \t}\n  268 | \twhile ((mode = read_delay_line(delbuf, &flags)) >= 0)\n  269 | \t\tdelete_item(delbuf, mode, flags | DEL_RECURSE);\n  270 | \tif (deldelay_fd >= 0)\n  271 | \t\tclose(deldelay_fd);\n  272 | }","lines":14}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"finish_hard_link(): in the while loop, when maybe_  seed rand() and uses it for security-sensitive temp-file suffix generation in secure_mkstemp(). If /dev/urandom is unavailable (chroot/container without /dev), suffixes become predictable (rand() default seed), weakening the O_EXCL temp-file unpredictability the function relies on. The comment acknowledges the fallback but understates the security impact.","fix":"Seed rand() (e.g. from time/pid) at least once before the fallback, or better, retry /dev/urandom and treat persistent failure as a hard error in the daemon path. At minimum document that the fallback produces predictable names.","locations":[{"ref":"syscall.c:2010-2029","code":" 2010 | /* Fill buf with len random bytes.  Prefers /dev/urandom for cryptographic\n 2011 |  * quality; falls back to rand() if /dev/urandom cannot be opened or read\n 2012 |  * (e.g. inside a chroot or container without /dev populated). */\n 2013 | static void rand_bytes(unsigned char *buf, size_t len)\n 2014 | {\n 2015 | #ifndef O_CLOEXEC\n 2016 | #define O_CLOEXEC 0\n 2017 | #endif\n 2018 | \tint fd = open(\"/dev/urandom\", O_RDONLY | O_CLOEXEC);\n 2019 | \tif (fd >= 0) {\n 2020 | \t\tssize_t n = read(fd, buf, len);\n 2021 | \t\tclose(fd);\n 2022 | \t\tif (n == (ssize_t)len) {\n 2023 | \t\t\treturn;\n 2024 | \t\t}\n 2025 | \t}\n 2026 | \tfor (size_t i = 0; i < len; i++) {\n 2027 | \t\tbuf[i] = (unsigned char)rand();\n 2028 | \t}\n 2029 | }","lines":20},{"ref":"syscall.c:2113-2128","code":" 2113 | \t/* Try random suffixes until we find one that works */\n 2114 | \tstatic const char letters[] = \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789\";\n 2115 | \tfor (int tries = 0; tries < 100; tries++) {\n 2116 | \t\tunsigned char rbytes[6];\n 2117 | \t\trand_bytes(rbytes, sizeof(rbytes));\n 2118 | \t\tfor (int i = 0; i < 6; i++)\n 2119 | \t\t\tsuffix[i] = letters[rbytes[i] % (sizeof(letters) - 1)];\n 2120 | \n 2121 | \t\tfd = openat(dirfd, filename, O_RDWR | O_CREAT | O_EXCL | O_NOFOLLOW, perms);\n 2122 | \t\tif (fd >= 0)\n 2123 | \t\t\tbreak;\n 2124 | \t\tif (errno != EEXIST) {\n 2125 | \t\t\tif (dirfd != AT_FDCWD) close(dirfd);\n 2126 | \t\t\treturn -1;\n 2127 | \t\t}\n 2128 | \t}","lines":16}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In secure_mkstemp(), if all 100 attempts fail with EEXIST, the loop exits with fd == -1 but errno may be left as EEXIST (or whatever the last openat set). The function then falls through and returns -1 without setting a more descriptive errno, so the caller cannot distinguish exhaustion from a genuine EEXIST collision. Unlike the inner non-EEXIST branch which returns immediately, the exhaustion case is silent.","fix":"After the loop, if fd < 0, set a clear errno (e.g. EEXIST is fine but consider setting errno = EEXIST explicitly, or a comment) before returning so the exhaustion case is unambiguous; at minimum document that errno reflects the last openat attempt.","locations":[{"ref":"syscall.c:2115-2128","code":" 2115 | \tfor (int tries = 0; tries < 100; tries++) {\n 2116 | \t\tunsigned char rbytes[6];\n 2117 | \t\trand_bytes(rbytes, sizeof(rbytes));\n 2118 | \t\tfor (int i = 0; i < 6; i++)\n 2119 | \t\t\tsuffix[i] = letters[rbytes[i] % (sizeof(letters) - 1)];\n 2120 | \n 2121 | \t\tfd = openat(dirfd, filename, O_RDWR | O_CREAT | O_EXCL | O_NOFOLLOW, perms);\n 2122 | \t\tif (fd >= 0)\n 2123 | \t\t\tbreak;\n 2124 | \t\tif (errno != EEXIST) {\n 2125 | \t\t\tif (dirfd != AT_FDCWD) close(dirfd);\n 2126 | \t\t\treturn -1;\n 2127 | \t\t}\n 2128 | \t}","lines":14},{"ref":"syscall.c:2144-2145","code":" 2144 | \tif (dirfd != AT_FDCWD) close(dirfd);\n 2145 | \treturn fd;","lines":2}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"set_stat_xattr() calls do_chmod_at() at line 1230 to change the on-disk mode but ignores its return value; a failure to chmod is silently swallowed, after which the xattr stat record is written assuming the chmod succeeded, leaving file mode and recorded stat inconsistent.","fix":"Check the return of do_chmod_at() and report/propagate a failure (or skip writing the stat xattr) when it fails.","locations":[{"ref":"xattrs.c:1229-1230","code":" 1229 | \tif (fst.st_mode != mode)\n 1230 | \t\tdo_chmod_at(fname, mode);","lines":2}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"AIX sys_acl_set_file()/chacl() return value rc is declared `uint` but chacl() returns int (-1 on error). Assigning -1 to a uint and returning it makes the caller's `< 0` failure test never true, masking ACL-set failures on AIX. Same pattern in the #if 0 sys_acl_set_fd.","fix":"Declare rc as int so negative chacl() return values are preserved and detected by callers.","locations":[{"ref":"lib/sysacls.c:2403","code":" 2403 | \tuint rc;","lines":1},{"ref":"lib/sysacls.c:2479-2484","code":" 2479 | \trc = chacl((char*)name, file_acl, file_acl->acl_len);\n 2480 | \tDEBUG(10, (\"errno is %d\\n\", errno));\n 2481 | \tDEBUG(10, (\"return code is %d\\n\", rc));\n 2482 | \tSAFE_FREE(file_acl);\n 2483 | \tDEBUG(10, (\"Exiting the sys_acl_set_file\\n\"));\n 2484 | \treturn rc;","lines":6}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"change_dir() uses a forward `goto chdir_cleanup;` that jumps into the middle of a block, bypassing the initialization of `dfd`/`basedir`. The label sits after the secure-resolver branch; when reached via the early ENAMETOOLONG goto, chdir_failed is set first so the cleanup is correct, but the control flow (goto into an inner scope) is fragile and a future edit adding cleanup that frees dfd would double-handle an uninitialized fd.","fix":"Restructure to avoid the goto-into-scope, e.g. factor the secure chdir into a helper returning an error code.","locations":[{"ref":"util1.c:1199-1225","code":" 1199 | \t\t\t\tif (skipped_chdir) {\n 1200 | \t\t\t\t\tif (save_dir_len >= sizeof prefix) {\n 1201 | \t\t\t\t\t\terrno = ENAMETOOLONG;\n 1202 | \t\t\t\t\t\tchdir_failed = 1;\n 1203 | \t\t\t\t\t\tgoto chdir_cleanup;\n 1204 | \t\t\t\t\t}\n 1205 | \t\t\t\t\tmemcpy(prefix, curr_dir, save_dir_len);\n 1206 | \t\t\t\t\tprefix[save_dir_len] = '\\0';\n 1207 | \t\t\t\t\tbasedir = prefix;\n 1208 | \t\t\t\t}\n 1209 | \t\t\t\tdfd = secure_relative_open(basedir, dir,\n 1210 | \t\t\t\t\tO_RDONLY | O_DIRECTORY, 0);\n 1211 | \t\t\t\tif (dfd < 0) {\n 1212 | \t\t\t\t\tchdir_failed = 1;\n 1213 | \t\t\t\t} else {\n 1214 | \t\t\t\t\tchdir_failed = fchdir(dfd) != 0;\n 1215 | \t\t\t\t\tclose(dfd);\n 1216 | \t\t\t\t}\n 1217 | \t\t\t} else {\n 1218 | \t\t\t\tchdir_failed = chdir(curr_dir) != 0;\n 1219 | \t\t\t}\n 1220 | \t\tchdir_cleanup:\n 1221 | \t\t\tif (chdir_failed) {\n 1222 | \t\t\t\tcurr_dir_len = save_dir_len;\n 1223 | \t\t\t\tcurr_dir[curr_dir_len] = '\\0';\n 1224 | \t\t\t\treturn 0;\n 1225 | \t\t\t}","lines":27}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"get_checksum2 keeps a per-process static scratch buffer (buf1/len1) for the MD4 paths that is never freed and only ever grows. This is by-design caching, but the buffer is leaked at exit and, because the same static is reused across all MD4-family transfers, it pins the size of the largest block seen for the life of the process. Not a correctness bug, but worth noting for memory-footprint audits.","fix":"Acceptable as-is for a short-lived CLI; if tighter control is wanted, free buf1 when the checksum type changes or document the intentional growth-only cache.","locations":[{"ref":"checksum.c:362-373","code":"  362 | \t\tmd_context m;\n  363 | \t\tint32 i;\n  364 | \t\tstatic char *buf1;\n  365 | \t\tstatic int32 len1;\n  366 | \n  367 | \t\tmdfour_begin(&m);\n  368 | \n  369 | \t\tif (len > len1 || !buf1) {\n  370 | \t\t\tfree(buf1);\n  371 | \t\t\tbuf1 = new_array(char, len+4);\n  372 | \t\t\tlen1 = len;\n  373 | \t\t}","lines":12}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"add_rule()'s per-dir-merge duplicate check (lines 264-279) does a linear scan over all mergelist_parents and a strlen+memcmp for every rule added. For configurations with many per-dir merge rules this is O(n^2). Minor, but the comment claims it merely avoids re-adding; the cost grows with rule count.","fix":"If this ever matters, hash basenames; otherwise document the expected-small cardinality.","locations":[{"ref":"exclude.c:264-279","code":"  264 | \t\tfor (i = 0; i < mergelist_cnt; i++) {\n  265 | \t\t\tfilter_rule *ex = mergelist_parents[i];\n  266 | \t\t\tconst char *s;\n  267 | \t\t\tif (!ex)\n  268 | \t\t\t\tcontinue;\n  269 | \t\t\ts = strrchr(ex->pattern, '/');\n  270 | \t\t\tif (s)\n  271 | \t\t\t\ts++;\n  272 | \t\t\telse\n  273 | \t\t\t\ts = ex->pattern;\n  274 | \t\t\tlen = strlen(s);\n  275 | \t\t\tif (len == pat_len - (cp - rule->pattern) && memcmp(s, cp, len) == 0) {\n  276 | \t\t\t\tfree_filter(rule);\n  277 | \t\t\t\treturn;\n  278 | \t\t\t}\n  279 | \t\t}","lines":16}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"In recv_file_entry() and make_file(), every time the directory component differs from the cached lastdir a fresh new_array(char, len+1) is allocated for lastdir and the previous lastdir buffer is leaked (never freed). For a flist with many distinct parent directories this both leaks steadily and re-allocates on each dir change.","fix":"Reuse a single growable buffer for lastdir (realloc only when len exceeds capacity) instead of allocating a brand-new array and abandoning the old one on each directory change.","locations":[{"ref":"flist.c:777-785","code":"  777 | \tif ((basename = strrchr(thisname, '/')) != NULL) {\n  778 | \t\tint len = basename++ - thisname;\n  779 | \t\tif (len != lastdir_len || memcmp(thisname, lastdir, len) != 0) {\n  780 | \t\t\tlastdir = new_array(char, len + 1);\n  781 | \t\t\tmemcpy(lastdir, thisname, len);\n  782 | \t\t\tlastdir[len] = '\\0';\n  783 | \t\t\tlastdir_len = len;\n  784 | \t\t\tlastdir_depth = count_dir_elements(lastdir);\n  785 | \t\t}","lines":9},{"ref":"flist.c:1401-1408","code":" 1401 | \tif ((basename = strrchr(thisname, '/')) != NULL) {\n 1402 | \t\tint len = basename++ - thisname;\n 1403 | \t\tif (len != lastdir_len || memcmp(thisname, lastdir, len) != 0) {\n 1404 | \t\t\tlastdir = new_array(char, len + 1);\n 1405 | \t\t\tmemcpy(lastdir, thisname, len);\n 1406 | \t\t\tlastdir[len] = '\\0';\n 1407 | \t\t\tlastdir_len = len;\n 1408 | \t\t}","lines":8}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"read_args() grows *request_p with realloc_array on every single arg line when accumulating the request string (one realloc per file/arg up to the 1024 cap). For a request with many short args this is repeated O(n) reallocs/copies. Minor given the 1024-byte cap, but the growth is byte-exact (request_len + len + 1) so every append reallocates.","fix":"Grow the request buffer geometrically (or allocate the 1024-byte cap once up front) instead of reallocating to the exact needed size on each append.","locations":[{"ref":"io.c:1336-1344","code":" 1336 | \t\tif (dot_pos) {\n 1337 | \t\t\tif (request_p && request_len < 1024) {\n 1338 | \t\t\t\tint len = strlen(buf);\n 1339 | \t\t\t\tif (request_len)\n 1340 | \t\t\t\t\trequest_p[0][request_len++] = ' ';\n 1341 | \t\t\t\t*request_p = realloc_array(*request_p, char, request_len + len + 1);\n 1342 | \t\t\t\tmemcpy(*request_p + request_len, buf, len + 1);\n 1343 | \t\t\t\trequest_len += len;\n 1344 | \t\t\t}","lines":9}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"receive_data() calls `time(NULL)` on every single token iteration when allowed_lull\nis set (maybe_send_keepalive(time(NULL), ...)). For a heavily-matched delta with many\nsmall tokens this is a syscall per token. The keepalive logic internally rate-limits,\nso the time() call is the only per-iteration cost, but it is still avoidable overhead\non the hot data path.","fix":"Cache time(NULL) less frequently (e.g. only when progress is shown or every N tokens) and pass the cached value, as other hot loops in rsync do.","locations":[{"ref":"receiver.c:389-390","code":"  389 | \t\tif (allowed_lull)\n  390 | \t\t\tmaybe_send_keepalive(time(NULL), MSK_ALLOW_FLUSH | MSK_ACTIVE_RECEIVER);","lines":2}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"send_zstd_token maps the entire literal length nb in one `map_ptr(buf, offset, nb)`\ncall, forcing map_file to grow/realloc its sliding window to hold all of nb at once,\nwhereas send_deflated_token (zlib) feeds the compressor in CHUNK_SIZE pieces\n(token.c:419-427) and keeps the map window bounded. For large literal runs the zstd\npath can balloon the map window allocation well beyond MAX_MAP_SIZE.","fix":"Feed zstd input through map_ptr in CHUNK_SIZE pieces like the zlib send_deflated_token path to keep the map window bounded.","locations":[{"ref":"token.c:785-787","code":"  785 | \t\tzstd_in_buff.src = map_ptr(buf, offset, nb);\n  786 | \t\tzstd_in_buff.size = nb;\n  787 | \t\tzstd_in_buff.pos = 0;","lines":3}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"print_child_argv() calls strspn() over the full allowed-character set and then strlen() for every argument to decide whether to quote. For long argument vectors this scans each arg twice; it runs on every spawned child but only when the relevant debug/info level is active, so impact is minor.","fix":"Compute strlen once and compare to strspn's return, or scan once with a character classification table.","locations":[{"ref":"util1.c:106-114","code":"  106 | \t\tif (strspn(*cmd, \"abcdefghijklmnopqrstuvwxyz\"\n  107 | \t\t\t   \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\"\n  108 | \t\t\t   \"0123456789\"\n  109 | \t\t\t 211 | \t} else if (!WIFEXITED(status)) {\n  212 | #ifdef WCOREDUMP\n  213 | \t\tif (WCOREDUMP(status))\n  214 | \t\t\t*exit_code_ptr = RERR_CRASHED;\n  215 | \t\telse\n  216 | #endif\n  217 | \t\tif (WIFSIGNALED(status))\n  218 | \t\t\t*exit_code_ptr = RERR_TERMINATED;\n  219 | \t\telse\n  220 | \t\t\t*exit_code_ptr = RERR_WAITCHILD;\n  221 | \t} else\n  222 | \t\t*exit_code_ptr = WEXITSTATUS(status);\n  223 | }","lines":31}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"negligible","description":"do_punch_hole()'s portable fallback declares a 4096-byte zero buffer on the stack and memsets it on every call, then writes 4096-byte chunks. For large holes this is a per-chunk write loop with no buffering benefit beyond 4096; acceptable but the (int)sizeof and `int chunk`/`int wrote` truncate OFF_T len silently (len is capped to 4096 per chunk so no overflow, but mixing int and OFF_T is fragile).","fix":"Use size_t/ssize_t for chunk and wrote to avoid int/OFF_T mixing; the logic is correct today only because chunk is bounded by sizeof zeros.","locations":[{"ref":"syscall.c:1595-1608","code":" 1595 | \t{\n 1596 | \t\tchar zeros[4096];\n 1597 | \t\tmemset(zeros, 0, sizeof zeros);\n 1598 | \t\twhile (len > 0) {\n 1599 | \t\t\tint chunk = len > (int)sizeof zeros ? (int)sizeof zeros : len;\n 1600 | \t\t\tint wrote = write(fd, zeros, chunk);\n 1601 | \t\t\tif (wrote <= 0) {\n 1602 | \t\t\t\tif (wrote < 0 && errno == EINTR)\n 1603 | \t\t\t\t\tcontinue;\n 1604 | \t\t\t\treturn -1;\n 1605 | \t\t\t}\n 1606 | \t\t\tlen -= wrote;\n 1607 | \t\t}\n 1608 | \t}","lines":14}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"negligible","description":"timestring() calls localtime_r and snprintf on every invocation and rotates through 4 static buffers; it is fine functionally, but the `assert(len > 0)` is used solely 'to silence a gcc warning' on an snprintf whose format is fixed and cannot fail - the assert compiles out under NDEB ard lookup to\n   98 |  * make sure nobody is spoofing PTR records.\n   99 |  **/","lines":12},{"ref":"clientname.c:102-110","code":"  102 | \tstatic char name_buf[100];\n  103 | \tchar port_buf[100];\n  104 | \tstruct sockaddr_storage ss;\n  105 | \tsocklen_t ss_len;\n  106 | \tstruct addrinfo hint, *answer;\n  107 | \tint err;\n  108 | \n  109 | \tif (*name_buf)\n  110 | \t\treturn name_buf;","lines":9}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Grammatically broken and misleading comment. It reads 'Return the name unchanged it doesn't have any slashes.' (missing 'if'/'when'), and the code below actually copies the name into a static buffer and returns that buffer (not the original name unchanged) in the len_ptr branch.","fix":"Rewrite as: '/* Return the name (truncated to len_ptr) when it doesn't have any slashes. */' and note that the result may be a copy in the static buf.","locations":[{"ref":"exclude.c:607","code":"  607 | \t\t/* Return the name unchanged it doesn't have any slashes. */","lines":1}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"idev_destroy() iterates dev_tbl (created with HT_KEY64, i.e. ht_int64_node entries) but casts each node to `struct ht_int32_node *`. It only ever reads node->data, which is the first member of both node structs, so it works by accident, but the cast is type-incorrect and misleading to a future reader who may add key access via this pointer and read the wrong/over-running field.","fix":"Cast to `struct ht_int64_node *` to match the HT_KEY64 table that init_hard_links() created, or access only via a void* and HT_NODE without naming a specific node type.","locations":[{"ref":"hlink.c:91-95","code":"   91 | \tfor (i = 0; i < dev_tbl->size; i++) {\n   92 | \t\tstruct ht_int32_node *node = HT_NODE(dev_tbl, dev_tbl->nodes, i);\n   93 | \t\tif (node->data)\n   94 | \t\t\thashtable_destroy(node->data);\n   95 | \t}","lines":5}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Comment says \"unprotected args stop here\" with `if (protect_args && !local_server) args[ac++] = NULL;` - but for a local_server with protect_args set, the NULL terminator is intentionally NOT added, and the remaining (protected) args continue to be appended into the same array. The comment does not explain the local_server exception, making the control flow misleading to a reader who assumes protected args are always split out.","fix":"Expand the comment to note that for a local server the split is skipped so all args go through one array.","locations":[{"ref":"options.c:2744-2745","code":" 2744 | \tif (protect_args && !local_server) /* unprotected args stop here */\n 2745 | \t\targs[ac++] = NULL;","lines":2}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Comment at do_server_sender says 'change_dir#3' but get_local_name already uses 'change_dir#3' and 'change_dir#4' is used in do_server_recv. The #3 label is duplicated between functions, making the numbered debug strings ambiguous when diagnosing which change_dir failed.","fix":"Renumber the change_dir debug messages so each call site has a unique identifier.","locations":[{"ref":"rsync.c:953-955","code":"","lines":3},{"ref":"main.c:844-846","code":"  844 | \t} else if (!change_dir(dest_path, CD_NORMAL)) {\n  845 | \t\trsyserr(FERROR, errno, \"change_dir#3 %s failed\",\n  846 | \t\t\tfull_fname(dest_path));","lines":3},{"ref":"main.c:1178-1180","code":" 1178 | \t\tif (!am_daemon && !change_dir(dir, CD_NORMAL)) {\n 1179 | \t\t\trsyserr(FERROR, errno, \"change_dir#4 %s failed\",\n 1180 | \t\t\t\tfull_fname(dir));","lines":3}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The AVX2 64-byte loop carries comments copied from the 32-byte SSSE3 implementation that no longer match the code. E l_add32_hi = _mm256_extracti128_si256(sum_mul_add32, 0x1);\n  409 |             ss2 = _mm_add_epi32(ss2, _mm256_castsi256_si128(sum_mul_add32));\n  410 |             ss2 = _mm_add_epi32(ss2, sum_mul_add32_hi);\n  411 | \n  412 |             // [t1[0] + t1[1], t1[2] + t1[3] ...] [int16*8]\n  413 |             // We could've combined this with generating sum_add32 above and\n  414 |             // save an instruction but benchmarking shows that as being slower\n  415 |             __m256i add16 = _mm256_hadds_epi16(add16_1, add16_2);\n  416 | \n  417 |             // [t1[0], t1[1], ...] -> [t1[0]*28 + t1[1]*24, ...] [int32*4]\n  418 |             __m256i mul32 = _mm256_madd_epi16(add16, mul_t1);\n  419 | \n  420 |             // [sum(mul32), X, X, X] [int32*4]; faster than multiple _mm_hadd_epi32\n  421 |             mul32 = _mm256_add_epi32(mul32, _mm256_srli_si256(mul32, 4));\n  422 |             mul32 = _mm256_add_epi32(mul32, _mm256_srli_si256(mul32, 8));\n  423 | \t    // prefetch 2 cacheline ahead\n  424 |             _mm_prefetch(&buf[i + 160], _MM_HINT_T0);\n  425 | \n  426 |             // s2 += 28*t1[0] + 24*t1[1] + 20*t1[2] + 16*t1[3] + 12*t1[4] + 8*t1[5] + 4*t1[6]\n  427 | \t    __m128i mul32_hi = _mm256_extracti128_si256(mul32, 0x1);\n  428 |             ss2 = _mm_add_epi32(ss2, _mm256_castsi256_si128(mul32));\n  429 |             ss2 = _mm_add_epi32(ss2, mul32_hi);\n  430 | \n  431 | #if CHAR_OFFSET != 0\n  432 |             // s1 += 32*CHAR_OFFSET\n  433 |             __m128i char_offset_multiplier = _mm_set1_epi32(32 * CHAR_OFFSET);\n  434 |             ss1 = _mm_add_epi32(ss1, char_offset_multiplier);\n  435 | \n  436 |             // s2 += 528*CHAR_OFFSET\n  437 |             char_offset_multiplier = _mm_set1_epi32(528 * CHAR_OFFSET);\n  438 |             ss2 = _mm_add_epi32(ss2, char_offset_multiplier);","lines":49}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The header comment on do_open_at() (lines 691-707) describes the wrapper as purely defence-in-depth for sites 'otherwise protected by secure parent-syscalls' and frames O_NOFOLLOW as desirable specifically 'for O_CREAT|O_EXCL'. But the function is a generic do_open replacement and always sets O_NOFOLLOW regardless of flags, which changes semantics for non-O_CREAT opens. The comment understates that this wrapper is NOT a drop-in semantic equivalent of do_open().","fix":"Update the comment to state plainly that do_open_at() never follows a final-component symlink for any flags, so it is not semantically identical to do_open().","locations":[{"ref":"syscall.c:691-707","code":"  691 | /*\n  692 |   Symlink-race-safe variant of do_open() for receiver-side use. See\n  693 |   the comment on do_chmod_at() for the threat model. open() resolves\n  694 |   parent components, so a parent-symlink swap can redirect the open\n  695 |   to a file outside the module. This wrapper is defence-in-depth for\n  696 |   bare-path do_open() sites that callers know are otherwise\n  697 |   protected by secure parent-syscalls (e.g. generator.c's in-place\n  698 |   backup creation, where robust_unlink() rejects the symlinked\n  699 |   parent before this open is reached): if any of those upstream\n  700 |   protections is later removed or regresses, the open here still\n  701 |   refuses to escape the module.\n  702 | \n  703 |   Defence: open the parent of pathname under secure_relative_open()\n  704 |   and call openat() against the resulting dirfd with O_NOFOLLOW\n  705 |   (so the basename itself isn't followed if it happens to be a\n  706 |   pre-planted symlink, which is what we want for O_CREAT|O_EXCL).\n  707 | */","lines":17},{"ref":"syscall.c:751","code":"  751 | \tret = openat(dfd, bname, flags | O_NOFOLLOW | O_BINARY, mode);","lines":1}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment \"/* File ended, flush */\" sits above `if (token != -2) flush = ZSTD_e_flush;`.\nThe flush is applied for essentially every token except the data-only -2 token, not\nonly at file end (file end is token -1). The comment misdescribes the condition and\nwill mislead a future reader into thinking the flush only happens on EOF.","fix":"Reword to something like '/* Flush the encoder for every non data-only (-2) token so the receiver can decode each block. */'.","locations":[{"ref":"token.c:794-796","code":"  794 | \t\t\t/* File ended, flush */\n  795 | \t\t\tif (token != -2)\n  796 | \t\t\t\tflush = ZSTD_e_flush;","lines":3}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `/* safe */` comment on the strncpy in partial_dir_fname asserts the copy is bounded, but nothing bounds `len` (= fn - fname) against the destination buffer size before the copy. The comment hides the actual overflow risk noted above.","fix":"Remove or correct the comment once a real bounds check is added.","locations":[{"ref":"util1.c:1315","code":" 1315 | \t\t\tstrncpy(t, fname, len); /* safe */","lines":1}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment in cleanup.c claims cleanup_got_literal is 'Set to True once literal data has been sent', followed by a literal '(????)' editorial marker left in the source. The (????) is noise that should not ship, and the description is for the variable that follows, not the close_all/file-doc block it is grouped with.","fix":"Remove the stray '(????)' and tidy the doc comment so it clearly documents cleanup_got_literal.","locations":[{"ref":"cleanup.c:80-88","code":"   80 | /**\n   81 |  * Set to True once literal data has been sent across the link for the\n   82 |  * current file. (????)\n   83 |  *\n   84 |  * Handling the cleanup when a transfer is interrupted is tricky when\n   85 |  * --partial is selected.  We need to ensure that the partial file is\n   86 |  * kept if any real data has been transferred.\n   87 |  **/\n   88 | int cleanup_got_literal = 0;","lines":9}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment in client_addr() block and the 'one lookup per customer' phrasing aside, the comment at clientserver.c:355-356 'Old servers may just drop the connection here, rather than sending a proper EXIT command. Yuck.' is fine, but the adjacent kluge_around_eof logic only sets the kluge for protocol_version < 25 while listing; for >=25 servers send EXIT. This is correct, noting only that the comment does not mention the version gate that the code applies.","fix":"Optionally mention the protocol_version < 25 gate in the comment.","locations":[{"ref":"clientserver.c:355-357","code":"  355 | \t/* Old servers may just drop the connection here,\n  356 | \t rather than sending a proper EXIT command.  Yuck. */\n  357 | \tkluge_around_eof = list_only && protocol_version < 25 ? 1 : 0;","lines":3}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment at the hard-link debug block says first_hlink_ndx 'is -1 when new', but the value stored/compared is '(int32)(long)np->data' where np->data defaults to NULL (0), not -1; a brand-new node yields 0 here, while the documented -1 sentinel is only produced after the explicit cast pattern used elsewhere. The comment is misleading about the new-node sentinel for this code path.","fix":"Clarify the comment to state that a freshly created node has data==NULL (0) and that the -1 wording refers to the receiver's separate ndx convention, or align the sentinel handling.","locations":[{"ref":"flist.c:519-520","code":"  519 | \t\t\tfirst_hlink_ndx = (int32)(long)np->data; /* is -1 when new */\n  520 | \t\t\tif (first_hlink_ndx < 0) {","lines":2}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment on sum_sizes_sqroot says 'blocksum_bits = BLOCKSUM_BIAS + 2*log2(file_len) - log2(block_len)' and references md4, but the strong-sum length is now capped by xfer_sum_len/SUM_LENGTH (max_s2length) which can be a negotiated xxh/MD5 digest, not md4. The historical md4 wording is misleading for readers of the current code.","fix":"Update the comment to refer to the negotiated strong-checksum digest rather than md4, and note the max_s2length cap added for short digests.","locations":[{"ref":"generator.c:687-696","code":"  687 |  * The block size is a rounded square root of file length.\n  688 |  *\n  689 |  * The checksum size is determined according to:\n  690 |  *     blocksum_bits = BLOCKSUM_BIAS + 2*log2(file_len) - log2(block_len)\n  691 |  * provided by Donovan Baarda which gives a probability of rsync\n  692 |  * algorithm corrupting data and falling back using the whole md4\n  693 |  * checksums.\n  694 |  *\n  695 |  * This might be made one of several selectable heuristics.\n  696 |  */","lines":10}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Typo in comment: `Must becombined` (missing space) should read `Must be combined`.","fix":"Fix the comment to `/* Must be combined with PIO_NEED_INPUT. */`.","locations":[{"ref":"io.c:146","code":"  146 | #define PIO_CONSUME_INPUT (1<<4) /* Must becombined with PIO_NEED_INPUT. */","lines":1}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment in sysacls.c AIX block says the access must be 'left shifted by three bites' but the code shifts by 6 (<<= 6), and 'bites' is a typo for 'bits'. The comment is both numerically wrong and misspelled, appearing twice.","fix":"Correct the comment to say 'left shifted by six bits' (matching <<= 6) and fix the spelling.","locations":[{"ref":"lib/sysacls.c:1939-1941","code":" 1939 | \t\t\t/* The access in the acl entries must be left shifted by *\n 1940 | \t\t\t * three bites, because they will ultimately be compared *\n 1941 | \t\t\t * to S_IRUSR, S_IWUSR, and S_IXUSR.                  */","lines":3},{"ref":"lib/sysacls.c:2154-2156","code":" 2154 | \t\t\t/* The access in the acl entries must be left shifted by *\n 2155 | \t\t\t * three bites, because they will ultimately be compared *\n 2156 | \t\t\t * to S_IRUSR, S_IWUSR, and S_IXUSR.                  */","lines":3}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","description":"The parent-directory-extraction + secure_relative_open + at-syscall + errno-preserving-close idiom is copy-pasted nearly verbatim across at least eight wrappers (do_unlink_at, do_symlink_at, do_lchown_at, do_mknod_at, do_rmdir_at, do_open_at, do_chmod_at, do_utimensat_at, do_mkdir_at, do_xstat_at). Each repeats the strrchr/dlen/MAXPATHLEN/memcpy/secure_relative_open/close(e=errno) block (~25-30 lines). This is a large maintenance and correctness hazard: a fix to the idiom (e.g. the final-component O_NOFOLLOW question) must be applied in ~10 places.","fix":"Factor the parent-split + secure_relative_open + dirfd lifecycle into a helper (e.g. `static int open_secure_parent(const char *path, const char **bname_out, char *dirbuf, size_t dirbufsz)`), and have each wrapper call it then issue its specific *at() syscall. Reduces ~250 duplicated lines to one shared routine.","locations":[{"ref":"syscall.c:108-152","code":"  108 | int do_unlink_at(const char *path)\n  109 | {\n  110 | #ifdef AT_FDCWD\n  111 | \textern int am_daemon, am_chrooted;\n  112 | \tchar dirpath[MAXPATHLEN];\n  113 | \tconst char *bname;\n  114 | \tconst char *slash;\n  115 | \tint dfd, ret, e;\n  116 | \tsize_t dlen;\n  117 | \n  118 | \tif (dry_run) return 0;\n  119 | \tRETURN_ERROR_IF_RO_OR_LO;\n  120 | \n  121 | \tif (!am_daemon || am_chrooted)\n  122 | \t\treturn unlink(path);\n  123 | \n  124 | \tif (!path || !*path || *path == '/')\n  125 | \t\treturn unlink(path);\n  126 | \n  127 | \tslash = strrchr(path, '/');\n  128 | \tif (!slash)\n  129 | \t\treturn unlink(path);\n  130 | \n  131 | \tdlen = slash - path;\n  132 | \tif (dlen >= sizeof dirpath) {\n  133 | \t\terrno = ENAMETOOLONG;\n  134 | \t\treturn -1;\n  135 | \t}\n  136 | \tmemcpy(dirpath, path, dlen);\n  137 | \tdirpath[dlen] = '\\0';\n  138 | \tbname = slash + 1;\n  139 | \n  140 | \tdfd = secure_relative_open(NULL, dirpath, O_RDONLY | O_DIRECTORY, 0);\n  141 | \tif (dfd < 0)\n  142 | \t\treturn -1;\n  143 | \n  144 | \tret = unlinkat(dfd, bname, 0);\n  145 | \te = errno;\n  146 | \tclose(dfd);\n  147 | \terrno = e;\n  148 | \treturn ret;\n  149 | #else\n  150 | \treturn do_unlink(path);\n  151 | #endif\n  152 | }","lines":45},{"ref":"syscall.c:191-263","code":"  191 | int do_symlink_at(const char *lnk, const char *path)\n  192 | {\n  193 | #ifdef AT_FDCWD\n  194 | \textern int am_daemon, am_chrooted;\n  195 | \tchar dirpath[MAXPATHLEN];\n  196 | \tconst char *bname;\n  197 | \tconst char *slash;\n  198 | \tint dfd, ret, e;\n  199 | \tsize_t dlen;\n  200 | \n  201 | \tif (dry_run) return 0;\n  202 | \tRETURN_ERROR_IF_RO_OR_LO;\n  203 | \n  204 | \tif (!am_daemon || am_chrooted)\n  205 | \t\treturn do_symlink(lnk, path);\n  206 | \n  207 | \tif (!path || !*path || *path == '/')\n  208 | \t\treturn do_symlink(lnk, path);\n  209 | \n  210 | \tslash = strrchr(path, '/');\n  211 | \tif (!slash)\n  212 | \t\treturn do_symlink(lnk, path);\n  213 | \n  214 | \tdlen = slash - path;\n  215 | \tif (dlen >= sizeof dirpath) {\n  216 | \t\terrno = ENAMETOOLONG;\n  217 | \t\treturn -1;\n  218 | \t}\n  219 | \tmemcpy(dirpath, path, dlen);\n  220 | \tdirpath[dlen] = '\\0';\n  221 | \tbname = slash + 1;\n  222 | \n  223 | \tdfd = secure_relative_open(NULL, dirpath, O_RDONLY | O_DIRECTORY, 0);\n  224 | \tif (dfd < 0)\n  225 | \t\treturn -1;\n  226 | \n  227 | #if defined NO_SYMLINK_XATTRS || defined NO_SYMLINK_USER_XATTRS\n  228 | \t/* For --fake-super, do_symlink writes the link target into a\n  229 | \t * regular <script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
