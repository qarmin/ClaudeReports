rently requires a greater parallelization\n   20 |     /// overhead. An alternative approach is to eagerly discover all tasks and then perform the parallel\n   21 |     /// computation over the flattened input of tasks.\n   22 |     ///\n   23 |     /// The `linearize` approach works in two parallelization phases:\n   24 |     /// * first phase to linearize the inputs in parallel over the non-linear data, and\n   25 |     /// * second phase to perform the computation in parallel over the linear data.\n   26 |     ///\n   27 |     /// See [`into_par_rec`] and [`into_par_rec_exact`] for examples.\n   28 |     ///\n   29 |     /// [`into_par_rec`]: crate::IntoParIterRec::into_par_rec\n   30 |     /// [`into_par_rec_exact`]: crate::IntoParIterRec::into_par_rec_exact\n   31 |     pub fn linearize(self) -> Par<ConIterVec<T>, R> {\n   32 |         let params = self.params();\n   33 |         let orchestrator = self.orchestrator().clone();\n   34 |         let items: Vec<_> = self.collect();\n   35 |         let iter = items.into_con_iter();\n   36 |         Par::new(orchestrator, params, iter)\n   37 |     }","lines":20},{"ref":"src/iter/recursive/rec_par_iter.rs:47-66","code":"   47 |     /// Even with exact length, a recursive parallel iterator is much more dynamic than a flat parallel\n   48 |     /// iterator. This dynamic nature of shrinking and growing concurrently requires a greater parallelization\n   49 |     /// overhead. An alternative approach is to eagerly discover all tasks and then perform the parallel\n   50 |     /// computation over the flattened input of tasks.\n   51 |     ///\n   52 |     /// The `linearize` approach works in two parallelization phases:\n   53 |     /// * first phase to linearize the inputs in parallel over the non-linear data, and\n   54 |     /// * second phase to perform the computation in parallel over the linear data.\n   55 |     ///\n   56 |     /// See [`into_par_rec`] and [`into_par_rec_exact`] for examples.\n   57 |     ///\n   58 |     /// [`into_par_rec`]: crate::IntoParIterRec::into_par_rec\n   59 |     /// [`into_par_rec_exact`]: crate::IntoParIterRec::into_par_rec_exact\n   60 |     pub fn linearize(self) -> ParMap<ConIterVec<T>, O, M1, R> {\n   61 |         let (orchestrator, params, iter, map1) = self.destruct();\n   62 |         let par = Par::new(orchestrator.clone(), params, iter);\n   63 |         let items: Vec<_> = par.collect();\n   64 |         let iter = items.into_con_iter();\n   65 |         ParMap::new(orchestrator, params, iter, map1)\n   66 |     }","lines":20},{"ref":"src/iter/recursive/rec_par_iter.rs:77-96","code":"   77 |     /// Even with exact length, a recursive parallel iterator is much more dynamic than a flat parallel\n   78 |     /// iterator. This dynamic nature of shrinking and growing concurrently requires a greater parallelization\n   79 |     /// overhead. An alternative approach is to eagerly discover all tasks and then perform the parallel\n   80 |     /// computation over the flattened input of tasks.\n   81 |     ///\n   82 |     /// The `linearize` approach works in two parallelization phases:\n   83 |     /// * first phase to linearize the inputs in parallel over the non-linear data, and\n   84 |     /// * second phase to perform the computation in parallel over the linear data.\n   85 |     ///\n   86 |     /// See [`into_par_rec`] and [`into_par_rec_exact`] for examples.\n   87 |     ///\n   88 |     /// [`into_par_rec`]: crate::IntoParIterRec::into_par_rec\n   89 |     /// [`into_par_rec_exact`]: crate::IntoParIterRec::into_par_rec_exact\n   90 |     pub fn linearize(self) -> ParXap<ConIterVec<T>, Vo, X1, R> {\n   91 |         let (orchestrator, params, iter, xap1) = self.destruct();\n   92 |         let par = Par::new(orchestrator.clone(), params, iter);\n   93 |         let items: Vec<_> = par.collect();\n   94 |         let iter = items.into_con_iter();\n   95 |         ParXap::new(orchestrator, params, iter, xap1)\n   96 |     }","lines":20}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","description":"ParMap and ParXap unconditionally assert `Send` and `Sync` via `unsafe impl`, but the captured mapping closures `M1` / `X1` are bounded only by `Sync` (and `Vo`/`I`/`R` carry no auto-trait bounds at all). A closure that is `Sync` but not `Send` (e.g. one capturing a value that is `Sync + !Send`) would make `ParMap`/`ParXap` `Send` anyway, and nothing requires `I`, `Vo`, or `R` to be `Send`/`Sync`. Since these iterators are moved/shared across worker threads, the blanket unsafe impls can construct an unsound `Send`/`Sync` type for user-supplied closures and iterators that are not actually thread-safe.","fix":"Either drop the manual `unsafe impl` and let the auto-derived `Send`/`Sync` apply (preferred), or constrain the impls with the necessary bounds, e.g. `where I: Send + Sync, R: Send + Sync, M1: Send + Sync` (and `Vo: Send` for ParXap), so thread-safety is asserted only when it actually holds.","locations":[{"ref":"src/computational_variants/map.rs:45-59","code":"   45 | unsafe impl<I, O, M1, R> Send for ParMap<I, O, M1, R>\n   46 | where\n   47 |     R: ParallelRunner,\n   48 |     I: ConcurrentIter,\n   49 |     M1: Fn(I::Item) -> O + Sync,\n   50 | {\n   51 | }\n   52 | \n   53 | unsafe impl<I, O, M1, R> Sync for ParMap<I, O, M1, R>\n   54 | where\n   55 |     R: ParallelRunner,\n   56 |     I: ConcurrentIter,\n   57 |     M1: Fn(I::Item) -> O + Sync,\n   58 | {\n   59 | }","lines":15},{"ref":"src/computational_variants/xap.rs:49-65","code":"   49 | unsafe impl<I, Vo, X1, R> Send for ParXap<I, Vo, X1, R>\n   50 | where\n   51 |     R: ParallelRunner,\n   52 |     I: ConcurrentIter,\n   53 |     Vo: TransformableValues<Fallibility = Infallible>,\n   54 |     X1: Fn(I::Item) -> Vo + Sync,\n   55 | {\n   56 | }\n   57 | \n   58 | unsafe impl<I, Vo, X1, R> Sync for ParXap<I, Vo, X1, R>\n   59 | where\n   60 |     R: ParallelRunner,\n   61 |     I: ConcurrentIter,\n   62 |     Vo: TransformableValues<Fallibility = Infallible>,\n   63 |     X1: Fn(I::Item) -> Vo + Sync,\n   64 | {\n   65 | }","lines":17},{"ref":"src/computational_variants/par.rs:48-60","code":"   48 | unsafe impl<I, R> Send for Par<I, R>\n   49 | where\n   50 |     R: ParallelRunner,\n   51 |     I: ConcurrentIter,\n   52 | {\n   53 | }\n   54 | \n   55 | unsafe impl<I, R> Sync for Par<I, R>\n   56 | where\n   57 |     R: ParallelRunner,\n   58 |     I: ConcurrentIter,\n   59 | {\n   60 | }","lines":13}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"high","description":"`SliceDst::from_vec` derives the destination pointer from `vec.as_ptr()` (a `*const T` obtained from a shared/read view of the buffer) and the data structures later cast it to `*mut T` and write through it (e.g. `Slice::copy_from_nonoverlapping` casts `self.raw as *mut T`, and `SliceIterPtrDst::write_one_from`/`write_many_from` write via that pointer). Forming a mutable/write pointer with provenance taken from `as_ptr()` is a provenance/aliasing violation under Stacked/Tree Borrows and is UB. The function also takes `&'a mut Vec<T>` so a mutable pointer is available.","fix":"Use `vec.as_mut_ptr()` in `from_vec` so the write pointer carries mutable provenance; thread a `*mut T` through `SliceDst`/`Slice` for the destination path instead of casting a `*const T` to `*mut T`.","locations":[{"ref":"src/experiment/data_structures/slice_dst.rs:54-59","code":"   54 |     pub fn from_vec(vec: &'a mut Vec<T>) -> Self {\n   55 |         assert!(vec.is_empty());\n   56 | \n   57 |         // SAFETY: constructing with contiguous un-initialized elements\n   58 |         unsafe { Self::new(vec.as_ptr(), vec.capacity()) }\n   59 |     }","lines":6},{"ref":"src/experiment/data_structures/slice.rs:88-94","code":"   88 |     pub unsafe fn copy_from_nonoverlapping(&self, src: &Self) {\n   89 |         debug_assert_eq!(self.len(), src.len());\n   90 | \n   91 |         // SAFETY: (i) within bounds and (ii) slices do not overlap\n   92 |         let dst = self.raw as *mut T;\n   93 |         unsafe { dst.copy_from_nonoverlapping(src.raw as *const T, self.len()) };\n   94 |     }","lines":7}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"medium","description":"`unsafe impl Send for Task` is unconditional in `T` (only the `Slice` raw pointers are wrapped). Task contains `SliceSrc`/`SliceDst` wrapping `*const [T]`. Sending a `Task` across threads transfers the ability to read/write `T` across threads, so soundness requires `T: Send` (and the parallel target writes plus shared reads require care). The impl places no bound on `T`. While `par_merge` happens to require `T: Send + Sync`, the `Send` impl itself is on the bare `Task<'a, T>` and could be relied upon elsewhere without those bounds.","fix":"Constrain the impl: `unsafe impl<'a, T: Send> Send for Task<'a, T> {}` and document the invariant that distinct Tasks address non-overlapping memory regions.","locations":[{"ref":"src/experiment/algorithms/merge_sorted_slices/par.rs:36-42","code":"   36 | struct Task<'a, T> {\n   37 |     left: SliceSrc<'a, T>,\n   38 |     right: SliceSrc<'a, T>,\n   39 |     target: SliceDst<'a, T>,\n   40 | }\n   41 | \n   42 | unsafe impl<'a, T> Send for Task<'a, T> {}","lines":7}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"medium","description":"`SliceIterPtrSrc::values` and `as_slice` return iterators/slices with lifetime `'a` (the slice's full erased lifetime) rather than tying them to `&self`. `values(&self) -> Iter<'a, T>` and `as_slice(&self) -> &'a [T]` hand out `'a`-bound borrows from a `&self` whose contents may be advanced (next_unchecked/next_n_unchecked) afterward. A returned slice/iterator therefore can outlive the iterator state it was derived from and can observe positions that were subsequently consumed, an unsound lifetime erasure. Same pattern in `SliceSrc::values(&'a self)`, whose `&'a self` receiver pins the borrow for all of `'a`.","fix":"Return `&'_ [T]`/`Iter<'_, T>` bound to the `&self` borrow (or to a fresh elided lifetime tied to `&self`) rather than to `'a`, so the borrow checker prevents use after the iterator advances.","locations":[{"ref":"src/experiment/data_structures/slice_iter_ptr_src.rs:75-86","code":"   75 |     pub fn values(&self) -> core::slice::Iter<'a, T> {\n   76 |         self.as_slice().iter()\n   77 |     }\n   78 | \n   79 |     /// Creates a slice over references to values of the remaining elements\n   80 |     /// of this iterator.\n   81 |     pub fn as_slice(&self) -> &'a [T] {\n   82 |         let ptr = self.0.peek();\n   83 |         let n = self.len();\n   84 |         // SAFETY: SliceIterPtrSrc guarantees initialized values\n   85 |         unsafe { from_raw_parts(ptr, n) }\n   86 |     }","lines":12},{"ref":"src/experiment/data_structures/slice_src.rs:92-94","code":"   92 |     pub fn values(&'a self) -> core::slice::Iter<'a, T> {\n   93 |         self.as_slice().iter()\n   94 |     }","lines":3}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"medium","description":"Every unsafe dereference of the per-thread used-state pointer (`let u = unsafe { &mut *u };`) carries only a `// SAFETY: TODO-USING` placeholder instead of a real safety justification. These unsafe blocks are the core soundness argument of the entire `using` subtree (each thread owns a distinct `U::Item` created via `Using::create`, and the `*mut U::Item` is reborrowed non-overlappingly). Leaving the invariant undocumented makes it easy for a future change to introduce aliasing `&mut` (e.g. by holding one reborrow across a nested call that reborrows again) without anyone noticing the contract was broken.","fix":"Replace the `TODO-USING` placeholders with the actual safety argument, e.g.: `// SAFETY: each worker thread owns a distinct U::Item produced by Using::create; this pointer is reborrowed as &mut for the duration of a single call only and never aliased with another live &mut.` Verify the invariant actually holds in u_xap.rs where `u` is used by the outer `x1` closure and then forwarded into `vo.u_map(u, ..)`/`u_filter`/`u_acc_reduce`.","locations":[{"ref":"src/using/computational_variants/u_par.rs:121","code":"  121 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_par.rs:138","code":"  138 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_par.rs:154","code":"  154 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_map.rs:137","code":"  137 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_map.rs:155","code":"  155 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_map.rs:172","code":"  172 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_xap.rs:130","code":"  130 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_xap.rs:150","code":"  150 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_xap.rs:173","code":"  173 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_xap.rs:195","code":"  195 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_xap.rs:232","code":"  232 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_fallible_result/u_map_result.rs:94","code":"   94 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_fallible_result/u_map_result.rs:111","code":"  111 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_fallible_result/u_map_result.rs:132","code":"  132 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_fallible_result/u_par_result.rs:104","code":"  104 |             // SAFETY: TODO-USING","lines":1},{"ref":"src/using/computational_variants/u_fallible_result/u_xap_result.rs:127","code":"  127 |             // SAFETY: TODO-USING","lines":1}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"low","description":"`ParXap::reduce` and `ParXap::first` rely on irrefutable `let (_, Ok(acc)) = ...` / `let (_num_threads, Ok(result)) = ...` bindings that are only valid because `Vo::Fallibility = Infallible` makes the `Err` variant uninhabited. This is sound today but fragile: if the `Fallibility` bound on the impl is ever loosened, these become refutable and either fail to compile or (if changed to a panic-on-Err) silently introduce a reachable panic. The intent (cannot fail) is not documented.","fix":"Add a brief comment noting the binding is infallible because `Vo::Fallibility = Infallible`, or destructure defensively (e.g. `match`/`expect` with an explanatory message) so a future bound change surfaces clearly rather than silently.","locations":[{"ref":"src/computational_variants/xap.rs:225-226","code":"  225 |         let (_, Ok(acc)) = prc::reduce::x(orchestrator, params, iter, x1, reduce);\n  226 |         acc","lines":2},{"ref":"src/computational_variants/xap.rs:238-243","code":"  238 |                 let (_num_threads, Ok(result)) = prc::next::x(orchestrator, params, iter, x1);\n  239 |                 result.map(|x| x.1)\n  240 |             }\n  241 |             IterationOrder::Arbitrary => {\n  242 |                 let (_num_threads, Ok(result)) = prc::next_any::x(orchestrator, params, iter, x1);\n  243 |                 result","lines":6}]},{"id":"OTHER_7","type":"other","type_label":"Other","severity":"low","description":"Setting the env var ORX_PARALLEL_MAX_NUM_THREADS to \"0\" is silently parsed to `None` (NonZeroUsize::new(0) == None), and at the call site in runner/parallel_runner.rs:130 `None` is mapped via `unwrap_or(NonZeroUsize::MAX)` to an effectively unlimited bound. So `=0` means \"no limit\", which is the opposite of what a user might intend (e.g. expecting it to mean sequential/no extra threads). The inline comment says `// None if 0` but does not flag that 0 collapses into the same bucket as 'unset/no bound'. This is surprising and undocumented behavior.","fix":"Document that 0 (and unset/invalid) means 'no upper bound', or treat 0 explicitly (e.g. as an error/ignored with a debug log). At minimum clarify the comment that 0 is treated as 'no bound', not 'zero threads'.","locations":[{"ref":"src/env.rs:9-13","code":"    9 |         Ok(s) => match s.parse::<usize>() {\n   10 |             Ok(x) => NonZeroUsize::new(x), // None if 0; Some(x) if x is set to a positive bound\n   11 |             Err(_e) => None,               // not a number, ignored assuming no bound\n   12 |         },\n   13 |         Err(_e) => None, // not set, no bound","lines":5},{"ref":"src/runner/parallel_runner.rs:130","code":"  130 |         let env = crate::env::max_num_threads_by_env_variable().unwrap_or(NonZeroUsize::MAX);","lines":1}]},{"id":"OTHER_8","type":"other","type_label":"Other","severity":"low","description":"`auto_chunk_size` returns hard-coded `1` for unknown length (`None`) with a `// TODO: is this a good choice?` left in production code. Chunk size 1 for an unbounded/unknown-length iterator maximizes per-pull parallelization overhead, which can be a severe performance regression for unknown-length inputs. The TODO indicates the heuristic was never finalized.","fix":"Choose a sensible default chunk size for unknown-length inputs (e.g. DESIRED_MIN_CHUNK_SIZE) rather than 1, and resolve/remove the TODO.","locations":[{"ref":"src/executor/fixed_chunk_executor/chunk_size.rs:76","code":"   76 |         None => 1, // TODO: is this a good choice?","lines":1}]},{"id":"OTHER_9","type":"other","type_label":"Other","severity":"low","description":"Inconsistent handling of the value returned by ConcurrentBag::push across sibling files. Result::push_to_bag calls `bag.push(x);` (discarding via statement) and WhilstAtom/WhilstOption do the same, while OptionResult, VectorResult, WhilstVectorResult and WhilstVector use `_ = bag.push(x)`. If bag.push is #[must_use], the bare-statement form would warn; the divergence shows the files were edited independently and is a copy-paste smell worth normalizing.","fix":"Pick one form (preferably `_ = bag.push(x);`) and apply it uniformly across all push_to_bag implementations.","locations":[{"ref":"src/generic_values/result.rs:57","code":"   57 |                 bag.push(x);","lines":1},{"ref":"src/generic_values/whilst_atom.rs:65","code":"   65 |                 bag.push(x);","lines":1},{"ref":"src/generic_values/option_result.rs:57","code":"   57 |                 _ = bag.push(x);","lines":1},{"ref":"src/generic_values/vector_result.rs:58","code":"   58 |                 Ok(x) => _ = bag.push(x),","lines":1}]},{"id":"OTHER_10","type":"other","type_label":"Other","severity":"negligible","description":"Inconsistent trait-method `where` clauses across mirror impls: `Par::first` (par.rs) omits the `where Self::Item: Send` bound that the `ParIter::first` trait declares and that both `ParMap::first` and `ParXap::first` repeat. It compiles because the bound is only required at the call site, but the asymmetry between the three near-mirror files is a copy/omission inconsistency that hampers future audits.","fix":"Add the matching `where Self::Item: Send` clause to `Par::first` for parity with the trait declaration and the sibling impls (or remove it from the siblings if intentionally unneeded).","locations":[{"ref":"src/computational_variants/par.rs:201-207","code":"  201 |     fn first(self) -> Option<Self::Item> {\n  202 |         let (orchestrator, params, iter) = self.destruct();\n  203 |         match params.iteration_order {\n  204 |             IterationOrder::Ordered => prc::next::m(orchestrator, params, iter, map_self).1,\n  205 |             IterationOrder::Arbitrary => prc::next_any::m(orchestrator, params, iter, map_self).1,\n  206 |         }\n  207 |     }","lines":7},{"ref":"src/computational_variants/map.rs:210-213","code":"  210 |     fn first(self) -> Option<Self::Item>\n  211 |     where\n  212 |         Self::Item: Send,\n  213 |     {","lines":4},{"ref":"src/computational_variants/xap.rs:231-234","code":"  231 |     fn first(self) -> Option<Self::Item>\n  232 |     where\n  233 |         Self::Item: Send,\n  234 |     {","lines":4}]},{"id":"OTHER_11","type":"other","type_label":"Other","severity":"negligible","description":"`SliceIterPtr::current` is documented '# SAFETY ... the element must be initialized' and is `unsafe`, yet `SliceIterPtrSrc::current` calls it and exposes a fully *safe* `current(&self) -> Option<&'a T>`. The safety obligation (initialized values) is only upheld by the `SliceSrc` construction invariant, which is fine, but the returned reference carries lifetime `'a` independent of `&self`, allowing it to outlive subsequent mutation of the iterator (same class as the `values` finding).","fix":"Bind the returned reference to `&self` (`-> Option<&'_ T>`) so it cannot outlive iterator progression.","locations":[{"ref":"src/experiment/data_structures/slice_iter_ptr_src.rs:38-42","code":"   38 |     #[inline(always)]\n   39 |     pub fn current(&self) -> Option<&'a T> {\n   40 |         // SAFETY: all elements are initialized\n   41 |         unsafe { self.0.current() }\n   42 |     }","lines":5},{"ref":"src/experiment/data_structures/slice_iter_ptr.rs:66-72","code":"   66 |     pub unsafe fn current(&self) -> Option<&'a T> {\n   67 |         match !self.is_finished() {\n   68 |             // SAFETY: the value is initialized.\n   69 |             true => Some(unsafe { &*self.data }),\n   70 |             false => None,\n   71 |         }\n   72 |     }","lines":7}]},{"id":"ARCHIT_1","type":"architecture","type_label":"Architecture","severity":"medium","description":"WhilstAtomFlatMapIter::next yields Some(WhilstAtom::Stop) unconditionally and forever once current_iter is Stop (whilst_atom_flat_map.rs:46), and WhilstOptionFlatMapIter does the same for its Stop arm (whilst_option_flat_map.rs:49). This is an infinite iterator. It only terminates because every Values consumer (push_to_*, acc_reduce, next in whilst_vector.rs) short-circuits and returns on the first WhilstAtom::Stop. When such an iterator is composed inside std::iter::FlatMap (whilst_vector.rs:182-186, 274-277), FlatMap will spin forever on the Stop sub-iterator if a downstream adapter ever advances past the first Stop instead of short-circuiting. The safety relies entirely on an unstated invariant that all consumers stop at the first Stop; nothing enforces it.","fix":"Make the iterator fused/terminating: after emitting one WhilstAtom::Stop, transition current_iter to a drained state (e.g. an extra `done` flag or replacing the Stop with an exhausted marker) so subsequent next() calls return None. Add a debug_assert or comment documenting the 'consumer must short-circuit on first Stop' invariant.","locations":[{"ref":"src/generic_values/whilst_iterators/whilst_atom_flat_map.rs:43-48","code":"   43 |     fn next(&mut self) -> Option<Self::Item> {\n   44 |         match &mut self.current_iter {\n   45 |             WhilstAtom::Continue(x) => x.next().map(WhilstAtom::Continue), // None if flat-map iterator is consumed\n   46 |             WhilstAtom::Stop => Some(WhilstAtom::Stop),                    // input is Stop\n   47 |         }\n   48 |     }","lines":6},{"ref":"src/generic_values/whilst_iterators/whilst_option_flat_map.rs:45-51","code":"   45 |     fn next(&mut self) -> Option<Self::Item> {\n   46 |         match &mut self.current_iter {\n   47 |             WhilstOption::ContinueSome(x) => x.next().map(WhilstAtom::Continue), // None if flat-map iterator is consumed\n   48 |             WhilstOption::ContinueNone => None, // flat-map is created on None => empty iterator\n   49 |             WhilstOption::Stop => Some(WhilstAtom::Stop), // input is Stop\n   50 |         }\n   51 |     }","lines":7}]},{"id":"ARCHIT_2","type":"architecture","type_label":"Architecture","severity":"medium","description":"map_in_pool allocates `ConcurrentBag::with_fixed_capacity(max_num_threads)` and the spawn loop pushes one result per spawned thread, but the spawn bound (executor's do_spawn_new) and the capacity argument are passed independently. In ParallelRunner::map_all both are derived from `max_num_threads_for_computation` with identical arguments, so they currently agree; however this is an implicit, fragile coupling. If any ParallelExecutor implementation spawns more times than the `max_num_threads` value handed to map_in_pool, the fixed-capacity ConcurrentBag overflows (panic or worse). The invariant 'number of times do_spawn returns true <= max_num_threads passed to map_in_pool' is unchecked and undocumented.","fix":"Document the invariant on ParThreadPoolCompute::map_in_pool, and/or assert in the spawn loop that `nt.into_inner() < max_num_threads` before pushing; alternatively derive the capacity from the executor itself so the two cannot diverge.","locations":[{"ref":"src/par_thread_pool.rs:122-154","code":"  122 |     fn map_in_pool<F, S, M, T>(\n  123 |         &mut self,\n  124 |         do_spawn: S,\n  125 |         thread_map: M,\n  126 |         max_num_threads: NonZeroUsize,\n  127 |     ) -> (NumSpawned, Result<Vec<T>, F::Error>)\n  128 |     where\n  129 |         F: Fallibility,\n  130 |         S: Fn(NumSpawned) -> bool + Sync,\n  131 |         M: Fn(NumSpawned) -> Result<T, F::Error> + Sync,\n  132 |         T: Send,\n  133 |         F::Error: Send,\n  134 |     {\n  135 |         let thread_map = &thread_map;\n  136 |         let mut nt = NumSpawned::zero();\n  137 |         let thread_results = ConcurrentBag::with_fixed_capacity(max_num_threads.into());\n  138 |         let bag = &thread_results;\n  139 |         self.scoped_computation(|s| {\n  140 |             while do_spawn(nt) {\n  141 |                 let num_spawned = nt;\n  142 |                 nt.increment();\n  143 |                 let work = move || {\n  144 |                     bag.push(thread_map(num_spawned));\n  145 |                 };\n  146 |                 Self::run_in_scope(&s, work);\n  147 |             }\n  148 |         });\n  149 | \n  150 |         let thread_results: Vec<_> = thread_results.into_inner().into();\n  151 |         let result = F::reduce_results(thread_results);\n  152 | \n  153 |         (nt, result)\n  154 |     }","lines":33},{"ref":"src/runner/parallel_runner.rs:83-101","code":"   83 |         let iter_len = iter.try_get_len();\n   84 |         let executor = self.new_executor(kind, params, iter_len);\n   85 |         let state = executor.new_shared_state();\n   86 |         let do_spawn = |num_spawned| executor.do_spawn_new(num_spawned, &state, &iter);\n   87 |         let work = |num_spawned: NumSpawned| {\n   88 |             let thread_idx = num_spawned.into_inner();\n   89 |             thread_map(\n   90 |                 num_spawned,\n   91 |                 &iter,\n   92 |                 &state,\n   93 |                 executor.new_thread_executor(thread_idx, &state),\n   94 |             )\n   95 |         };\n   96 |         let max_num_threads = self.max_num_threads_for_computation(params, iter_len);\n   97 |         let result =\n   98 |             self.thread_pool_mut()\n   99 |                 .map_in_pool::<F, _, _, _>(do_spawn, work, max_num_threads);\n  100 |         executor.complete_task(state);\n  101 |         result","lines":19}]},{"id":"ARCHIT_3","type":"architecture","type_label":"Architecture","severity":"negligible","description":"The `ParXapResult` struct definition bounds `Vo: TransformableValues` with no `Fallibility` constraint, while the only `ParIterResult` impl (and `new`'s usefulness) requires `Vo: TransformableValues<Fallibility = Infallible>`. The looser struct/inherent-impl bound permits constructing instances (via `new`) that expose no trait functionality, i.e. dead flexibility that diverges from the sibling `ParXap` whose struct already pins `Fallibility = Infallible`.","fix":"Add `Fallibility = Infallible` to the struct and inherent-impl `Vo` bounds to match the trait impl and `ParXap`, eliminating constructible-but-unusable states.","locations":[{"ref":"src/computational_variants/fallible_result/xap_result.rs:13-19","code":"   13 | pub struct ParXapResult<I, T, E, Vo, X1, R = DefaultRunner>\n   14 | where\n   15 |     R: ParallelRunner,\n   16 |     I: ConcurrentIter,\n   17 |     Vo: TransformableValues,\n   18 |     Vo::Item: IntoResult<T, E>,\n   19 |     X1: Fn(I::Item) -> Vo + Sync,","lines":7},{"ref":"src/computational_variants/fallible_result/xap_result.rs:28-34","code":"   28 | impl<I, T, E, Vo, X1, R> ParXapResult<I, T, E, Vo, X1, R>\n   29 | where\n   30 |     R: ParallelRunner,\n   31 |     I: ConcurrentIter,\n   32 |     Vo: TransformableValues,\n   33 |     Vo::Item: IntoResult<T, E>,\n   34 |     X1: Fn(I::Item) -> Vo + Sync,","lines":7},{"ref":"src/computational_variants/fallible_result/xap_result.rs:51-57","code":"   51 | impl<I, T, E, Vo, X1, R> ParIterResult<R> for ParXapResult<I, T, E, Vo, X1, R>\n   52 | where\n   53 |     R: ParallelRunner,\n   54 |     I: ConcurrentIter,\n   55 |     Vo: TransformableValues<Fallibility = Infallible>,\n   56 |     Vo::Item: IntoResult<T, E>,\n   57 |     X1: Fn(I::Item) -> Vo + Sync,","lines":7}]},{"id":"ARCHIT_4","type":"architecture","type_label":"Architecture","severity":"negligible","description":"`NumThreads::is_sequential` (num_threads.rs:67-69) compares against the module-private `ONE` constant via `matches!(self, Self::Max(n) if n == ONE)`. This is correct, but `Params::is_sequential` and `NumThreads::is_sequential` duplicate the same one-line delegation pattern also mirrored across the value_variants fork; the broader concern is that several thin wrapper/forwarding layers (Params helpers `with_num_threads`/`with_chunk_size`/`with_collect_ordering`, GenericIterator's per-method match arms) are pure boilerplate that must be kept in lockstep manually. Low risk, flagged for awareness only.","fix":"No action required; consider a builder-style macro if these forwarding methods proliferate further.","locations":[{"ref":"src/parameters/params.rs:44-66","code":"   44 |     pub(crate) fn with_num_threads(self, num_threads: impl Into<NumThreads>) -> Self {\n   45 |         Self {\n   46 |             num_threads: num_threads.into(),\n   47 |             chunk_size: self.chunk_size,\n   48 |             iteration_order: self.iteration_order,\n   49 |         }\n   50 |     }\n   51 | \n   52 |     pub(crate) fn with_chunk_size(self, chunk_size: impl Into<ChunkSize>) -> Self {\n   53 |         Self {\n   54 |             num_threads: self.num_threads,\n   55 |             chunk_size: chunk_size.into(),\n   56 |             iteration_order: self.iteration_order,\n   57 |         }\n   58 |     }\n   59 | \n   60 |     pub(crate) fn with_collect_ordering(self, iteration_order: IterationOrder) -> Self {\n   61 |         Self {\n   62 |             num_threads: self.num_threads,\n   63 |             chunk_size: self.chunk_size,\n   64 |             iteration_order,\n   65 |         }\n   66 |     }","lines":23},{"ref":"src/parameters/num_threads.rs:67-69","code":"   67 |     pub fn is_sequential(self) -> bool {\n   68 |         matches!(self, Self::Max(n) if n == ONE)\n   69 |     }","lines":3}]}]</script>
<div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-06-07 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
