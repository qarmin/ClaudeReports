<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"PondPool / YastlPool constructors take a plain `usize` and call `NonZeroUsize::new(num_threads).expect(\">0\")`. With the intended `max(1)` clamp this is safe, but they are annotated `#[allow(clippy::missing_panics_doc)]` and expose a public API that panics on a value (0) the type signature appears to accept. Combined with the current `min(1)` bug the expect can never be hit, but once fixed to `max(1)` it is fine; either way the panic path is undocumented in the public API. Note also `Pool::new(0)` / `Pool::new_threads_unbounded(0)` in the underlying crates may themselves panic or hang before reaching the expect.","fix":"Document the panic in a `# Panics` section, or better take `NonZeroUsize` in the public constructor signature so the invariant is enforced by the type system rather than a runtime expect.","locations":[{"ref":"src/runner/implementations/pond.rs:18-23","code":"   18 |     pub fn new_threads_unbounded(num_threads: usize) -> Self {\n   19 |         let num_threads = num_threads.min(1);\n   20 |         let pool = Pool::new_threads_unbounded(num_threads);\n   21 |         #[allow(clippy::missing_panics_doc)]\n   22 |         Self(pool, NonZeroUsize::new(num_threads).expect(\">0\"))\n   23 |     }","lines":6},{"ref":"src/runner/implementations/yastl.rs:19-33","code":"   19 |     pub fn new(num_threads: usize) -> Self {\n   20 |         let num_threads = num_threads.min(1);\n   21 |         let pool = Pool::new(num_threads);\n   22 |         #[allow(clippy::missing_panics_doc)]\n   23 |         Self(pool, NonZeroUsize::new(num_threads).expect(\">0\"))\n   24 |     }\n   25 | \n   26 |     /// Create a new Pool that will execute it's tasks on `num_threads` worker threads and\n   27 |     /// spawn them using the given `config`.\n   28 |     pub fn with_config(num_threads: usize, config: ThreadConfig) -> Self {\n   29 |         let num_threads = num_threads.min(1);\n   30 |         let pool = Pool::with_config(num_threads, config);\n   31 |         #[allow(clippy::missing_panics_doc)]\n   32 |         Self(pool, NonZeroUsize::new(num_threads).expect(\">0\"))\n   33 |     }","lines":15}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"The ordered collect `m` path finalizes with `unsafe { o_bag.into_inner().unwrap_only_if_counts_match() }`, which panics if the number of written elements does not equal max_index + 1 (i.e. if the ConcurrentOrderedBag contains gaps). This relies entirely on the input ConcurrentIter reporting exactly contiguous indices and on `set_value`/`set_values` covering every slot exactly once. A ConcurrentIter implementation that yields a non-contiguous index space (or an arithmetic mismatch via `offset + idx`) turns a logic error into a hard panic at the end of a parallel run rather than a recoverable error.","fix":"Either document the contiguous-index invariant required of the ConcurrentIter and guarantee it at the type level, or handle the gap case (`GreaterLenThanNumPushes`) without panicking when the input is untrusted.","locations":[{"ref":"src/executor/parallel_compute/collect_ordered.rs:32","code":"   32 |     let values = unsafe { o_bag.into_inner().unwrap_only_if_counts_match() };","lines":1},{"ref":"src/executor/thread_compute/collect_ordered.rs:32","code":"   32 |                 Some((idx, value)) => unsafe { o_bag.set_value(offset + idx, map1(value)) },","lines":1},{"ref":"src/executor/thread_compute/collect_ordered.rs:47","code":"   47 |                         unsafe { o_bag.set_values(offset + begin_idx, values) };","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","description":"NumSpawned implements core::ops::Rem returning `self.0 % rhs.0` with no guard against rhs == 0, so `a % NumSpawned::zero()` panics with divide-by-zero. This is a public trait impl; nothing in the reviewed files calls it with a zero rhs, but it is an easy footgun exposed on a public type.","fix":"Document that rhs must be non-zero, or avoid exposing a generic Rem impl; if kept, consider debug_assert!(rhs.0 != 0).","locations":[{"ref":"src/runner/num_spawned.rs:22-28","code":"   22 | impl core::ops::Rem for NumSpawned {\n   23 |     type Output = usize;\n   24 | \n   25 |     fn rem(self, rhs: Self) -> Self::Output {\n   26 |         self.0 % rhs.0\n   27 |     }\n   28 | }","lines":7}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"critical","description":"Reachable UB when `min_split_len` resolves to 0 or 1. Because of the `min(.., 3)` clamp the effective `min_split_len` is at most 3, but a caller passing 0/1/2 yields an effective floor of that small value. The split branch is taken whenever `left.len() >= min_split_len && right.len() >= min_split_len`. With an effective floor <= 1, a slice of length 0 or 1 enters the else branch where `position = left.len()/2` can be 0, making `left_right` empty, and then `left_right.first_unchecked()` dereferences a one-past-the-end / dangling pointer. The comment at line 138 ('since left.len() >= 2, then left_right.len() > 0') only holds when the effective floor is >= 3, which the API does not guarantee.","fix":"Enforce a hard floor of at least 3 (e.g. `max(params.min_split_len, 3)`), or explicitly assert `left.len() >= 2 && right.len() >= 2` before calling `first_unchecked`, falling back to `seq_merge_unchecked` otherwise.","locations":[{"ref":"src/experiment/algorithms/merge_sorted_slices/par.rs:115-139","code":"  115 |     let min_split_len = core::cmp::min(params.min_split_len, 3);\n  116 | \n  117 |     // SAFETY: this method both handles and extends the queue; which will be\n  118 |     // visited only once; hence, the reference `task` will not be used to\n  119 |     // mutate the underlying memory, satisfying condition (i).\n  120 |     let task = unsafe { task.clone() };\n  121 | \n  122 |     let (mut left, mut right, target) = (task.left, task.right, task.target);\n  123 |     match (left.len(), right.len()) {\n  124 |         (x, y) if x < min_split_len || y < min_split_len => {\n  125 |             // SAFETY: req't (i) & (ii) are satisfied by conditions (i) & (ii)\n  126 |             unsafe { seq_merge_unchecked(is_leq, left, right, target, &params.seq_params) };\n  127 |         }\n  128 |         _ => {\n  129 |             let is_large_on_left = left.len() >= right.len();\n  130 |             if is_large_on_left != params.put_large_to_left {\n  131 |                 (left, right) = (right, left);\n  132 |             }\n  133 | \n  134 |             let position = left.len() / 2;\n  135 |             // SAFETY: position <= self.len()\n  136 |             let [left_left, left_right] = unsafe { left.split_at_unchecked(position) };\n  137 | \n  138 |             // SAFETY: since left.len() >= 2, then left_right.len() > 0\n  139 |             let pivot = unsafe { left_right.first_unchecked() };","lines":25}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"`unsafe impl Sync for UsingClone<T>` is implemented for any `T: Clone + 'static` with no `T: Sync` bound. `UsingClone` is used as a `Using` value that is shared by reference (`&self`) across all worker threads; each thread calls `create(&self, thread_idx)` concurrently, which executes `self.0.clone()`. If `T` is `!Sync` (e.g. `Rc<_>`, `Cell<_>`, `RefCell<_>`), multiple threads concurrently read/clone the same `self.0`, causing a data race (e.g. non-atomic `Rc` strong-count increments) - undefined behavior in safe user code, since `using_clone(Rc::new(..))` would compile. The blanket unconditional `unsafe impl Sync` defeats the auto-derived bound.","fix":"Either bound the impl on `T: Sync` (`unsafe impl<T: Clone + Sync + 'static> Sync for UsingClone<T> {}`), or simply remove the manual `unsafe impl` and let the compiler auto-derive `Sync` for `UsingClone<T>` (it already holds exactly when `T: Sync`). The latter is preferable as it is sound by construction.","locations":[{"ref":"src/using/using_variants.rs:37","code":"   37 | unsafe impl<T: Clone + 'static> Sync for UsingClone<T> {}","lines":1},{"ref":"src/using/using_variants.rs:17-35","code":"   17 | pub struct UsingClone<T: Clone + 'static>(T);\n   18 | \n   19 | impl<T: Clone + 'static> UsingClone<T> {\n   20 |     pub(crate) fn new(value: T) -> Self {\n   21 |         Self(value)\n   22 |     }\n   23 | }\n   24 | \n   25 | impl<T: Clone + 'static> Using<'static> for UsingClone<T> {\n   26 |     type Item = T;\n   27 | \n   28 |     fn create(&self, _: usize) -> T {\n   29 |         self.0.clone()\n   30 |     }\n   31 | \n   32 |     fn into_inner(self) -> Self::Item {\n   33 |         self.0\n   34 |     }\n   35 | }","lines":19}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"low","description":"`do_spawn_new` stores into `current_chunk_size` with `Ordering::Relaxed` and `new_thread_executor` loads it with `Ordering::Relaxed`. These two calls are made by the spawning thread before launching the worker, so visibility to the worker thread relies entirely on the happens-before edge established by the underlying thread-spawn/pool mechanism rather than on the atomic ordering. This works only because spawn provides synchronization; the Relaxed pair is fragile and provides no ordering guarantee on its own. If the load and store ever execute on different threads without an intervening spawn barrier, the stored chunk size may not be observed.","fix":"Document the reliance on the spawn happens-before edge, or use Release on the store and Acquire on the load to make the chunk-size publication self-synchronizing and robust to refactors.","locations":[{"ref":"src/executor/fixed_chunk_executor/parallel_executor.rs:117","code":"  117 |                 Some(c) => self.current_chunk_size.store(c, Ordering::Relaxed),","lines":1},{"ref":"src/executor/fixed_chunk_executor/parallel_executor.rs:127","code":"  127 |             chunk_size: self.current_chunk_size.load(Ordering::Relaxed),","lines":1}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","description":"In the ordered/stopped collection path (max_idx_inc = Some), heap_sort_into only moves out (via ptr.add(idx).read().1) the (idx, T) entries whose global index is <= max_idx. Every vector then has set_len(0) applied unconditionally, which does NOT run destructors. As a result, all the un-read trailing entries (those with index > max_idx, i.e. items that were collected by threads but fall beyond the take_while / while-condition cut-off) have their T values leaked. For non-trivial T (String, Vec, Box, anything owning heap/resources) this is a real resource leak triggered by ordinary use of a parallel collect combined with a while/take_while stopping condition.","fix":"Before set_len(0), explicitly drop the not-yet-consumed tail of each vector. Track per-vector how many entries were read (e.g. the final `indices[v]`) and, for each vector, drop the remaining initialized elements from `indices[v]..vec.len()` (e.g. `core::ptr::drop_in_place` over that sub-slice, or `Vec::drain(consumed..)`) before/instead of the bare `set_len(0)`. Note the already-consumed prefix must still NOT be dropped because its T was moved out by `.read()`.","locations":[{"ref":"src/heap_sort.rs:41-61","code":"   41 |         Some(max_idx) => {\n   42 |             while let Some(v) = curr_v {\n   43 |                 let idx = indices[v];\n   44 |                 indices[v] += 1;\n   45 | \n   46 |                 curr_v = match vectors[v].get(indices[v]) {\n   47 |                     Some(x) if x.0 <= max_idx => Some(queue.push_then_pop(v, x.0).0),\n   48 |                     _ => queue.pop_node(),\n   49 |                 };\n   50 | \n   51 |                 let ptr = vectors[v].as_ptr();\n   52 |                 output.push(unsafe { ptr.add(idx).read().1 });\n   53 |             }\n   54 |         }\n   55 |     }\n   56 | \n   57 |     for vec in vectors.iter_mut() {\n   58 |         // SAFETY: this prevents to drop the elements which are already moved to pinned_vec\n   59 |         // allocation within vec.capacity() will still be reclaimed; however, as uninitialized memory\n   60 |         unsafe { vec.set_len(0) };\n   61 |     }","lines":21},{"ref":"src/generic_values/runner_results/collect_ordered.rs:103-130","code":"  103 |     pub fn reduce(results: Vec<ThreadCollect<V>>, mut pinned_vec: P) -> Self {\n  104 |         let mut vectors = Vec::with_capacity(results.len());\n  105 |         let mut min_stopped_idx = None;\n  106 | \n  107 |         for x in results {\n  108 |             match x {\n  109 |                 ThreadCollect::AllCollected { vec } => vectors.push(vec),\n  110 |                 ThreadCollect::StoppedByWhileCondition { vec, stopped_idx } => {\n  111 |                     min_stopped_idx = match min_stopped_idx {\n  112 |                         Some(x) => Some(core::cmp::min(x, stopped_idx)),\n  113 |                         None => Some(stopped_idx),\n  114 |                     };\n  115 |                     vectors.push(vec);\n  116 |                 }\n  117 |                 ThreadCollect::StoppedByError { error } => return Self::StoppedByError { error },\n  118 |             }\n  119 |         }\n  120 | \n  121 |         heap_sort_into(vectors, min_stopped_idx, &mut pinned_vec);\n  122 | \n  123 |         match min_stopped_idx {\n  124 |             Some(stopped_idx) => Self::StoppedByWhileCondition {\n  125 |                 pinned_vec,\n  126 |                 stopped_idx,\n  127 |             },\n  128 |             None => Self::AllCollected { pinned_vec },\n  129 |         }\n  130 |     }","lines":28}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In the auto chunk-size search, `one_round_len = chunk_size * num_threads` is computed with `chunk_size` starting at MAX_CHUNK_SIZE (1<<20). On a 64-bit target this rarely overflows, but `min_required_len` then multiplies it again by 4 or 8 (`one_round_len * 4`, `one_round_len * 8`). With MAX_CHUNK_SIZE = 1<<20 and a large `num_threads`, the product `chunk_size * num_threads * 8` can overflow usize on 32-bit targets and wraps to a small value in debug builds it panics. A wrapped (small) value makes `input_len >= min_required_len(...)` spuriously true, so the loop breaks immediately at the maximum chunk size of 1<<20, defeating the heuristic and over-chunking the work.","fix":"Use saturating_mul for `chunk_size * num_threads` and for the `* 4` / `* 8` multipliers in `min_required_len`, or compare via division (e.g. compare `input_len / num_threads / 4 >= chunk_size`) to avoid forming the large product at all.","locations":[{"ref":"src/executor/fixed_chunk_executor/chunk_size.rs:52","code":"   52 |             let one_round_len = chunk_size * num_threads;","lines":1},{"ref":"src/executor/fixed_chunk_executor/chunk_size.rs:37-39","code":"   37 |         ComputationKind::Collect => one_round_len * 4,\n   38 |         ComputationKind::Reduce => one_round_len * 4,\n   39 |         ComputationKind::EarlyReturn => one_round_len * 8,","lines":3},{"ref":"src/executor/fixed_chunk_executor/chunk_size.rs:55","code":"   55 |             if input_len >= min_required_len(kind, one_round_len) {","lines":1}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`min_chunk_size` computes `one_round_len = max_num_threads * chunk_size` where `chunk_size` is a user-supplied `ChunkSize::Min(NonZeroUsize)` value cast to usize. A large user min chunk size multiplied by `max_num_threads` overflows usize, panicking in debug and wrapping in release. A wrapped-small `one_round_len` makes `one_round_len > len` falsely false, so the user's huge chunk_size is returned unchanged (or vice-versa), silently mis-sizing chunks.","fix":"Use `max_num_threads.saturating_mul(chunk_size)`, or restructure the comparison as `chunk_size > len / max_num_threads` (with care for the div-ceil case) to avoid the multiplication overflow.","locations":[{"ref":"src/executor/fixed_chunk_executor/chunk_size.rs:92-96","code":"   92 |             let one_round_len = max_num_threads * chunk_size;\n   93 |             match one_round_len > len {\n   94 |                 true => div_ceil(len, max_num_threads),\n   95 |                 false => chunk_size,\n   96 |             }","lines":5}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In `next_chunk_size_known_len`, `let done = initial_len - remaining_len;` assumes `remaining_len <= initial_len`. `remaining_len` comes from `iter.try_get_len()` of a live ConcurrentIter and `initial_len` was captured at construction. If the iterator reports a transiently larger remaining length than the stored initial length (or the iterator is a different/grown source), this subtraction underflows and panics in debug builds (wraps to a huge value in release, producing an absurd chunk size). The values are not guaranteed monotonic relative to the cached `initial_len`.","fix":"Use `initial_len.saturating_sub(remaining_len)` so a stale/larger remaining length yields 0 rather than underflowing.","locations":[{"ref":"src/executor/fixed_chunk_executor/parallel_executor.rs:71","code":"   71 |                             let done = initial_len - remaining_len;","lines":1}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`SliceIterPtr::remaining` computes `exclusive_end.offset_from(self.data) as usize`. `offset_from` returns `isize`; if the two pointers were ever in the wrong order (e.g. a corrupted/over-advanced iterator) the result is negative and the `as usize` cast wraps to a huge value that is then used as a length in `size_hint`/`len` and ultimately in `copy_from_nonoverlapping` counts. There is no debug assertion guarding ordering here, unlike the other unsafe methods.","fix":"Use `self.exclusive_end.offset_from(self.data).max(0) as usize` or add `debug_assert!(self.data <= self.exclusive_end)`; consider `usize::try_from` in debug builds.","locations":[{"ref":"src/experiment/data_structures/slice_iter_ptr.rs:44-46","code":"   44 |     fn remaining(&self) -> usize {\n   45 |         unsafe { self.exclusive_end.offset_from(self.data) as usize }\n   46 |     }","lines":3}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`count()` is implemented as `map(map_count).reduce(reduce_sum)`, where `reduce_sum` uses plain `+` on `usize`. In debug builds an extremely large element count could panic on overflow and in release silently wrap. This is the same pattern in all three iterators. Practically unreachable for in-memory collections, but worth noting for unbounded/generator-backed concurrent iterators.","fix":"Acceptable as-is given usize counts of distinct in-memory elements cannot overflow; if generator sources can produce >usize::MAX items, document the limitation or use saturating addition.","locations":[{"ref":"src/par_iter.rs:1203-1205","code":" 1203 |     fn count(self) -> usize {\n 1204 |         self.map(map_count).reduce(reduce_sum).unwrap_or(0)\n 1205 |     }","lines":3},{"ref":"src/par_iter_result.rs:804-812","code":"  804 |     fn count(self) -> Result<usize, Self::Err>\n  805 |     where\n  806 |         Self: Sized,\n  807 |         Self::Err: Send,\n  808 |     {\n  809 |         self.map(map_count)\n  810 |             .reduce(reduce_sum)\n  811 |             .map(|x| x.unwrap_or(0))\n  812 |     }","lines":9},{"ref":"src/par_iter_option.rs:696-703","code":"  696 |     fn count(self) -> Option<usize>\n  697 |     where\n  698 |         Self: Sized,\n  699 |     {\n  700 |         self.map(map_count)\n  701 |             .reduce(reduce_sum)\n  702 |             .map(|x| x.unwrap_or(0))\n  703 |     }","lines":8}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"NumSpawned::increment does `self.0 += 1` with no overflow guard. In practice thread counts never approach usize::MAX so this cannot realistically overflow, but in a debug build a pathological/buggy do_spawn predicate that never returns false would panic on overflow (release: wrap to 0 and loop forever). The type also derives no upper-bound enforcement.","fix":"Either leave as-is and document that callers must bound spawning (the executor's do_spawn_new is responsible), or use `self.0 = self.0.saturating_add(1)` defensively. Primarily worth a comment noting the invariant that spawning is bounded by max_num_threads.","locations":[{"ref":"src/runner/num_spawned.rs:11-14","code":"   11 |     /// Adds one to the spawned thread count.\n   12 |     pub fn increment(&mut self) {\n   13 |         self.0 += 1;\n   14 |     }","lines":4}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"Index arithmetic `offset + idx` (set_value) and `offset + begin_idx` (set_values) in ordered collect, plus `idx + within_chunk_idx` in the ordered/next stop paths, can in principle overflow `usize` when a large pre-existing pinned-vec offset is combined with a large input length. In practice the total element count cannot exceed addressable memory, so this is only a theoretical concern, but the additions are unchecked.","fix":"No action needed for realistic inputs; if defensiveness is desired, use `checked_add` and surface a clear error on overflow.","locations":[{"ref":"src/executor/thread_compute/collect_ordered.rs:32","code":"   32 |                 Some((idx, value)) => unsafe { o_bag.set_value(offset + idx, map1(value)) },","lines":1},{"ref":"src/executor/thread_compute/collect_ordered.rs:47","code":"   47 |                         unsafe { o_bag.set_values(offset + begin_idx, values) };","lines":1},{"ref":"src/executor/thread_compute/collect_ordered.rs:133","code":"  133 |                                             stopped_idx: idx + within_chunk_idx,","lines":1},{"ref":"src/executor/parallel_compute/collect_arbitrary.rs:29","code":"   29 |         Some(iter_len) => bag.reserve_maximum_capacity(offset + iter_len),","lines":1},{"ref":"src/executor/parallel_compute/collect_arbitrary.rs:62","code":"   62 |         Some(iter_len) => bag.reserve_maximum_capacity(offset + iter_len),","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"PondPool::new_threads_unbounded clamps the requested thread count with `num_threads.min(1)`, which means ANY request is reduced to at most 1 thread (e.g. asking for 8 threads yields 1). This is almost certainly meant to be `max(1)` (clamp the lower bound so the count is never 0). As written, every pond-backed pool runs effectively single-threaded, and the stored `max_num_threads` is also 1, silently defeating parallelism. The doc example `PondPool::new_threads_unbounded(8)` would create a 1-thread pool.","fix":"Change `let num_threads = num_threads.min(1);` to `let num_threads = num_threads.max(1);`.","locations":[{"ref":"src/runner/implementations/pond.rs:18-23","code":"   18 |     pub fn new_threads_unbounded(num_threads: usize) -> Self {\n   19 |         let num_threads = num_threads.min(1);\n   20 |         let pool = Pool::new_threads_unbounded(num_threads);\n   21 |         #[allow(clippy::missing_panics_doc)]\n   22 |         Self(pool, NonZeroUsize::new(num_threads).expect(\">0\"))\n   23 |     }","lines":6}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"YastlPool::new and YastlPool::with_config both clamp the requested thread count with `num_threads.min(1)`, reducing any request to at most 1 thread. Same bug as PondPool: `YastlPool::new(8)` builds a 1-thread pool and reports max_num_threads = 1, silently disabling parallelism. Should be `max(1)`.","fix":"In both constructors change `let num_threads = num_threads.min(1);` to `let num_threads = num_threads.max(1);`.","locations":[{"ref":"src/runner/implementations/yastl.rs:19-24","code":"   19 |     pub fn new(num_threads: usize) -> Self {\n   20 |         let num_threads = num_threads.min(1);\n   21 |         let pool = Pool::new(num_threads);\n   22 |         #[allow(clippy::missing_panics_doc)]\n   23 |         Self(pool, NonZeroUsize::new(num_threads).expect(\">0\"))\n   24 |     }","lines":6},{"ref":"src/runner/implementations/yastl.rs:28-33","code":"   28 |     pub fn with_config(num_threads: usize, config: ThreadConfig) -> Self {\n   29 |         let num_threads = num_threads.min(1);\n   30 |         let pool = Pool::with_config(num_threads, config);\n   31 |         #[allow(clippy::missing_panics_doc)]\n   32 |         Self(pool, NonZeroUsize::new(num_threads).expect(\">0\"))\n   33 |     }","lines":6}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"Copy-paste divergence: the `using` thread-compute loops unconditionally `break` when the concurrent iterator returns `None`, whereas the main (non-using) engine was fixed (commit 1c2215ff `all breaks made conditional on the iterator to be completed even if none is returned`) to only break when `iter.is_completed_when_none_returned()` is true. A `ConcurrentIter` may transiently return `None` while not yet exhausted (e.g. another thread currently holds the only available chunk, or the source produces items lazily). In that situation every `using` thread terminates early and silently drops the remaining input elements, producing wrong collect/reduce/count/sum results, missed `find`/`any`/`all` matches, and short collections. This affects every production code path: ordered collect, reduce, next (first ordered), and next_any (first arbitrary). The seq paths are unaffected because they use `into_seq_iter`.","fix":"Replace every `None => break,` arm in src/using/executor/thread_compute/*.rs with `None => { if iter.is_completed_when_none_returned() { break; } }`, matching the corresponding arms in src/executor/thread_compute/*.rs. (The two `m` functions in collect_arbitrary are `#[cfg(test)]`, but should still be fixed for parity.)","locations":[{"ref":"src/using/executor/thread_compute/collect_ordered.rs:35","code":"   35 |                 None => break,","lines":1},{"ref":"src/using/executor/thread_compute/collect_ordered.rs:47","code":"   47 |                     None => break,","lines":1},{"ref":"src/using/executor/thread_compute/collect_ordered.rs:105","code":"  105 |                 None => break,","lines":1},{"ref":"src/using/executor/thread_compute/collect_ordered.rs:135","code":"  135 |                     None => break,","lines":1},{"ref":"src/using/executor/thread_compute/next.rs:38","code":"   38 |                 None => break,","lines":1},{"ref":"src/using/executor/thread_compute/next.rs:55","code":"   55 |                     None => break,","lines":1},{"ref":"src/using/executor/thread_compute/next.rs:116","code":"  116 |                 None => break,","lines":1},{"ref":"src/using/executor/thread_compute/next.rs:151","code":"  151 |                     None => break,","lines":1},{"ref":"src/using/executor/thread_compute/next_any.rs:39","code":"   39 |                 None => break,","lines":1},{"ref":"src/using/executor/thread_compute/next_any.rs:56","code":"   56 |                     None => break,","lines":1},{"ref":"src/using/executor/thread_compute/next_any.rs:118","code":"  118 |                 None => break,","lines":1},{"ref":"src/using/executor/thread_compute/next_any.rs:153","code":"  153 |                     None => break,","lines":1},{"ref":"src/using/executor/thread_compute/reduce.rs:45","code":"   45 |                 None => break,","lines":1},{"ref":"src/using/executor/thread_compute/reduce.rs:70","code":"   70 |                     None => break,","lines":1},{"ref":"src/using/executor/thread_compute/reduce.rs:131","code":"  131 |                 None => break,","lines":1},{"ref":"src/using/executor/thread_compute/reduce.rs:161","code":"  161 |                     None => break,","lines":1},{"ref":"src/using/executor/thread_compute/collect_arbitrary.rs:37","code":"   37 |                 None => break,","lines":1},{"ref":"src/using/executor/thread_compute/collect_arbitrary.rs:46","code":"   46 |                     None => break,","lines":1},{"ref":"src/using/executor/thread_compute/collect_arbitrary.rs:105","code":"  105 |                 None => break,","lines":1},{"ref":"src/using/executor/thread_compute/collect_arbitrary.rs:133","code":"  133 |                     None => break,","lines":1}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In the chunked branch of the ordered-collect thread routine (xap path), every output produced from a chunk is pushed with the same index `chunk_begin_idx` instead of `chunk_begin_idx + within_chunk_idx`, whereas the single-item branch correctly uses the true per-item index and the StoppedByWhileCondition arm just below correctly uses `idx + within_chunk_idx`. For a plain (fully-consumed) ordered collect this happens to still produce correctly ordered output, because `heap_sort_into` k-way-merges the per-thread vecs by this index and chunk-begin indices are globally unique (chunks are disjoint, contiguous ranges) so within-chunk items stay contiguous in their vec and inter-chunk ordering is preserved. The bug DOES corrupt the `take_while`/`map_while`-style early-stop path: `ParallelCollect::reduce` computes a true global `min_stopped_idx`, then `heap_sort_into` retains every element whose stored index `<= max_idx`. Because all items of a stopping chunk carry `chunk_begin_idx <= max_idx`, the elements positioned AFTER the while-stop boundary inside that chunk (and any other chunk whose begin precedes the stop) are wrongly retained, so an ordered `take_while`/`map_while` collect with chunk size > 1 (the default for large inputs) returns extra trailing elements that should have been excluded.","fix":"Pass the absolute index to push: `let done = vo.push_to_vec_with_idx(chunk_begin_idx + within_chunk_idx, out_vec);` so each input item is labeled with its true global position, matching the single-item branch and the stop-index computation; this also lets `heap_sort_into`'s `x.0 <= max_idx` filter drop exactly the post-stop elements.","locations":[{"ref":"src/executor/thread_compute/collect_ordered.rs:120-141","code":"  120 |                 match chunk_puller.pull_with_idx() {\n  121 |                     Some((chunk_begin_idx, chunk)) => {\n  122 |                         for (within_chunk_idx, value) in chunk.enumerate() {\n  123 |                             let vo = xap1(value);\n  124 |                             let done = vo.push_to_vec_with_idx(chunk_begin_idx, out_vec);\n  125 |                             if let Some(stop) = Vo::ordered_push_to_stop(done) {\n  126 |                                 iter.skip_to_end();\n  127 |                                 runner.complete_chunk(shared_state, chunk_size);\n  128 |                                 runner.complete_task(shared_state);\n  129 |                                 match stop {\n  130 |                                     StopWithIdx::DueToWhile { idx } => {\n  131 |                                         return ThreadCollect::StoppedByWhileCondition {\n  132 |                                             vec: collected,\n  133 |                                             stopped_idx: idx + within_chunk_idx,\n  134 |                                         };\n  135 |                                     }\n  136 |                                     StopWithIdx::DueToError { idx: _, error } => {\n  137 |                                         return ThreadCollect::StoppedByError { error };\n  138 |                                     }\n  139 |                                 }\n  140 |                             }\n  141 |                         }","lines":22},{"ref":"src/heap_sort.rs:41-54","code":"   41 |         Some(max_idx) => {\n   42 |             while let Some(v) = curr_v {\n   43 |                 let idx = indices[v];\n   44 |                 indices[v] += 1;\n   45 | \n   46 |                 curr_v = match vectors[v].get(indices[v]) {\n   47 |                     Some(x) if x.0 <= max_idx => Some(queue.push_then_pop(v, x.0).0),\n   48 |                     _ => queue.pop_node(),\n   49 |                 };\n   50 | \n   51 |                 let ptr = vectors[v].as_ptr();\n   52 |                 output.push(unsafe { ptr.add(idx).read().1 });\n   53 |             }\n   54 |         }","lines":14}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`min_split_len` is clamped with `core::cmp::min(params.min_split_len, 3)`, which caps the effective minimum at 3 and silently discards any larger user-provided value. The struct doc says this is the 'Minimum length of a slice to be split into two tasks', so a user passing e.g. 1000 (to force coarse-grained parallelism) gets 3 instead. This is almost certainly meant to be `max(params.min_split_len, 3)` to enforce a floor of 3 while honoring larger requests.","fix":"Use `core::cmp::max(params.min_split_len, 3)` so 3 is a lower bound that guarantees the `len >= 2` invariant while still respecting larger user values.","locations":[{"ref":"src/experiment/algorithms/merge_sorted_slices/par.rs:115","code":"  115 |     let min_split_len = core::cmp::min(params.min_split_len, 3);","lines":1}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The Min growth heuristic divides by `num_spawned` (`done / num_spawned`) but `num_spawned` is the count of already-spawned threads, not necessarily the number that performed `done` work; meanwhile chunk size grows unboundedly as `done` increases (`num_chunks_per_thread * x`). There is no clamp against `remaining_len` or MAX_CHUNK_SIZE, so for long-running computations the chunk size can grow far past the remaining work, causing one thread to grab nearly all remaining elements in a single chunk and destroying load balance at the tail. ResolvedChunkSize::Min is intended as a *minimum*, but unbounded growth is a load-balancing hazard.","fix":"Clamp the computed chunk size to a sane upper bound, e.g. `min(num_chunks_per_thread * x, MAX_CHUNK_SIZE)` and/or to a fraction of `remaining_len / max_num_threads`, so growth cannot starve the tail of the computation.","locations":[{"ref":"src/executor/fixed_chunk_executor/parallel_executor.rs:67-79","code":"   67 |                 ResolvedChunkSize::Min(x) => {\n   68 |                     let chunk_size = match num_spawned {\n   69 |                         0 => x,\n   70 |                         _ => {\n   71 |                             let done = initial_len - remaining_len;\n   72 |                             let done_per_thread = done / num_spawned;\n   73 |                             let num_chunks_per_thread = (done_per_thread / x).max(1);\n   74 |                             let num_chunks_per_thread = num_chunks_per_thread.max(1);\n   75 |                             num_chunks_per_thread * x\n   76 |                         }\n   77 |                     };\n   78 | \n   79 |                     Some(chunk_size)","lines":13}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Inconsistent pivot split between Linear and Binary search in the parallel partition. Linear computes `right.values().position(|r| is_leq(pivot, r))`, putting elements equal to `pivot` into the right (>= pivot) partition. Binary computes the partition point of `is_leq(r, pivot)`, putting elements equal to `pivot` into the left (<= pivot) partition. Both remain globally correct for an unstable sort (no lost/duplicated/misordered elements), but they produce different element placement for equal keys, making the parallel merge non-stable and behavior dependent on an unrelated tuning flag. If a stable merge is intended this is a correctness bug.","fix":"Pick one tie-breaking convention and make Linear and Binary agree (e.g. both partition on the first index where `is_leq(pivot, r)` becomes true, i.e. strictly-less-than-pivot goes left). Document whether the merge is stable.","locations":[{"ref":"src/experiment/algorithms/merge_sorted_slices/par.rs:141-153","code":"  141 |             let pos_right =\n  142 |                 match params.pivot_search {\n  143 |                     PivotSearch::Linear => right\n  144 |                         .values()\n  145 |                         .position(|r| is_leq(pivot, r))\n  146 |                         .unwrap_or(right.len()),\n  147 |                     PivotSearch::Binary => bin_search_idx(right.as_slice().binary_search_by(|r| {\n  148 |                         match is_leq(r, pivot) {\n  149 |                             true => Ordering::Less,\n  150 |                             false => Ordering::Greater,\n  151 |                         }\n  152 |                     })),\n  153 |                 };","lines":13}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The streak boundary convention differs between left-current and right-current branches, making the sequential merge unstable. In the true branch (`is_leq(l, r)`) it copies all left elements with `is_leq(x, r)` (left elements equal to r are emitted before r). In the false branch it copies all right elements with `is_leq(x, l)` (right elements equal to l are emitted before l). This asymmetry, together with the `put_large_to_left` swap, means equal keys from left vs right are ordered inconsistently. Correct for an unstable sort but not stable; flag if stability is required by callers.","fix":"Use a consistent strict/non-strict comparison on both sides (e.g. one side uses `is_leq`/`Less` and the other uses strict `<`) to obtain a stable merge, and document the stability contract.","locations":[{"ref":"src/experiment/algorithms/merge_sorted_slices/seq.rs:186-208","code":"  186 |                         let count = match left.values().position(|x| !is_leq(x, r)) {\n  187 |                             Some(idx_bigger) => idx_bigger,\n  188 |                             None => left.len(),\n  189 |                         };\n  190 |                         // SAFETY: left still has at least `count` elements, so must `dst`\n  191 |                         unsafe { dst.write_many_from(&mut left, count) };\n  192 | \n  193 |                         match left.current() {\n  194 |                             Some(x) => l = x,\n  195 |                             None => {\n  196 |                                 // SAFETY: target (i) and (ii) are satisfied by conditions (i) and (ii)\n  197 |                                 unsafe { dst.write_rest_from(&mut right) };\n  198 |                                 break;\n  199 |                             }\n  200 |                         }\n  201 |                     }\n  202 |                     false => {\n  203 |                         let count = match right.values().position(|x| !is_leq(x, l)) {\n  204 |                             Some(idx_bigger) => idx_bigger,\n  205 |                             None => right.len(),\n  206 |                         };\n  207 |                         // SAFETY: right still has at least `count` elements, so must `dst`\n  208 |                         unsafe { dst.write_many_from(&mut right, count) };","lines":23},{"ref":"src/experiment/algorithms/merge_sorted_slices/seq.rs:260-287","code":"  260 |                         let count =\n  261 |                             bin_search_idx(left.as_slice( nals confused intent; likely one of the two was meant to clamp a different quantity.","fix":"Remove the redundant line 74. If the intent was to clamp something else (e.g. ensure `done_per_thread` is non-zero before division), fix that explicitly.","locations":[{"ref":"src/executor/fixed_chunk_executor/parallel_executor.rs:73-74","code":"   73 |                             let num_chunks_per_thread = (done_per_thread / x).max(1);\n   74 |                             let num_chunks_per_thread = num_chunks_per_thread.max(1);","lines":2}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In the chunked branch of the `next` (find/first) thread routine (xap path), the loop iterates over every item with `for i in chunk` but reuses the chunk's begin index `idx` for all of them when returning `Found`/`StoppedByWhileCondition`, instead of `chunk_begin_idx + k`. This does NOT currently produce wrong find/first results: each thread returns on its first event, chunk-begin indices preserve cross-chunk ordering (disjoint contiguous ranges), and `NextSuccess::reduce` only compares indices pairwise, so its winner selection and the `idx <= idx_bound` while-stop check resolve identically to the true-index version, and `find`/`first` expose only the value, not the index. The reported index is nonetheless incorrect (it is the chunk begin, not the matched item's position), which is a latent correctness hazard if that index is ever surfaced to callers or if a ConcurrentIter with non-contiguous chunk indices is introduced.","fix":"Enumerate the chunk and add the offset: `for (k, i) in chunk.enumerate() { ... let idx = idx + k; ... }` (shadow or use a distinct name) so the reported index reflects the item's absolute position for both Found and StoppedByWhileCondition results, keeping the index meaningful and robust to future index schemes.","locations":[{"ref":"src/executor/thread_compute/next.rs:131-157","code":"  131 |                 match ler from later reading the still-uninitialized capacity, and it hands out a SliceDst for `vec.capacity()` elements. If capacity is 0 the SliceDst has len 0; combined with a merge expecting `left.len()+right.len()` elements the `assert_eq!` in `seq_merge`/`par_merge` will catch a mismatch, but a caller who reserved exactly the wrong capacity gets a panic deep in the algorithm rather than at construction. Minor, but the doc claims this is the safe entry point.","fix":"Document that the caller must `reserve` exactly `left.len()+right.len()` and `set_len` afterwards; consider taking the required length as an argument and asserting `vec.capacity() >= len`.","locations":[{"ref":"src/experiment/data_structures/slice_dst.rs:45-59","code":"   45 |     /// Creates a new slice for the entire capacity of the vector.\n   46 |     ///\n   47 |     /// # Panics\n   48 |     ///\n   49 |     /// - (i) if `vec.len()` is not zero.\n   50 |     ///\n   51 |     /// # SAFETY\n   52 |     ///\n   53 |     /// This slice cannot outlive the `vec` it is created for due to the lifetime relation.\n   54 |     pub fn from_vec(vec: &'a mut Vec<T>) -> Self {\n   55 |         assert!(vec.is_empty());\n   56 | \n   57 |         // SAFETY: constructing with contiguous un-initialized elements\n   58 |         unsafe { Self::new(vec.as_ptr(), vec.capacity()) }\n   59 |     }","lines":15}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ThreadCollect::into_result returns Result<Self, _> (it returns `self` on the Ok path) rather than extracting a payload, which is an unusual signature for an into_result method and differs from every sibling into_result (ParallelCollect, ParallelCollectArbitrary, Reduce) that returns the collected payload or error. This asymmetry is error-prone for callers who expect into_result to unwrap, and the kept-Self variant carries the full vec by value on every call.","fix":"Rename to something like `error_check`/`into_checked` to signal it returns Self, or align it with the other into_result methods to avoid the surprising signature.","locations":[{"ref":"src/generic_values/runner_results/collect_ordered.rs:48-55","code":"   48 | impl<V: Values> ThreadCollect<V> {\n   49 |     pub fn into_result(self) -> Result<Self, <V::Fallibility as Fallibility>::Error> {\n   50 |         match self {\n   51 |             Self::StoppedByError { error } => Err(error),\n   52 |             _ => Ok(self),\n   53 |         }\n   54 |     }\n   55 | }","lines":8}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ConcurrentBag::with_fixed_capacity is sized to `max_num_threads`, but if `do_spawn` returns false immediately (e.g. empty input -> max_num_threads_for_computation yields len.max(1)=1 but executor decides 0 spawns) the bag is allocated with capacity >= 1 and then reduced over zero results. Harmless, but combined with the pond/yastl min(1) bug the capacity is effectively always 1 there, masking any over-spawn detection. Listed to flag the interaction once the min/max bug is fixed: verify capacity still matches actual spawn count for pond/yastl.","fix":"After fixing the min(1) -> max(1) bug, add a test that runs a multi-thread computation on PondPool/YastlPool and asserts the number of pushes equals NumSpawned and does not exceed capacity.","locations":[{"ref":"src/par_thread_pool.rs:137-150","code":"  137 |         let thread_results = ConcurrentBag::with_fixed_capacity(max_num_threads.into());\n  138 |         let bag = &thread_results;\n  139 |         self.scoped_computation(|s| {\n  140 |             while do_spawn(nt) {\n  141 |                 let num_spawned = nt;\n  142 |                 nt.increment();\n  143 |                 let work = move || {\n  144 |                     bag.push(thread_map(num_spawned));\n  145 |                 };\n  146 |                 Self::run_in_scope(&s, work);\n  147 |             }\n  148 |         });\n  149 | \n  150 |         let thread_results: Vec<_> = thread_results.into_inner().into();","lines":14}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"`div_ceil` (chunk_size.rs:101-105) is a hand-rolled ceiling division that is correct for the inputs here, but it duplicates the standard library `usize::div_ceil` (stable since 1.73). Hand-rolled arithmetic risks overflow/edge-case bugs (here `x * divider` cannot overflow since `x*divider <= number`, so it is safe) and is needless. Flag as duplicate/avoidable code.","fix":"Replace the custom `div_ceil` with the standard library `number.div_ceil(divider)`.","locations":[{"ref":"src/executor/fixed_chunk_executor/chunk_size.rs:101-105","code":"  101 | const fn div_ceil(number: usize, divider: usize) -> usize {\n  102 |     let x = number / divider;\n  103 |     let remainder = number - x * divider;\n  104 |     x + if remainder > 0 { 1 } else { 0 }\n  105 | }","lines":5}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"`value_variants` copies use `&mut U` for the using-state parameter while the canonical `generic_values` versions (and the actual `Values`/`TransformableValues` trait signatures in src/generic_values/values.rs:34 and transformable_values.rs:48-73) use `*mut U` raw pointers. Verified via diff: e.g. `u_acc_reduce<U, X>(self, u: *mut U, ...)` and `Fn(*mut U, ...)` in the live code vs `&mut U` / `Fn(&mut U, ...)` in value_variants. Because the trait demands `*mut U`, these copies do not satisfy the trait and would fail to compile if wired in; they are a stale, mismatched fork of the real implementation.","fix":"Remove the divergent copies (see dead_code finding). If retained, regenerate them from src/generic_values/ so the `*mut U` signatures match the traits.","locations":[{"ref":"src/value_variants/whilst_vector.rs:97-99","code":"   97 |     fn u_acc_reduce<U, X>(self, u: &mut U, acc: Option<Self::Item>, reduce: ayon-core's scope, panics also propagate. But pond, yastl, poolite and scoped-pool worker pools generally catch/absorb a panicking job (the worker thread may die or the panic is swallowed) rather than propagating it to the caller of scoped_computation. The result is that the same parallel computation panicking in user code will abort with one backend but silently produce a wrong/partial result (or deadlock waiting for a result that was never pushed) with another. The bag-based map_in_pool is especially affected: a panicking thread_map never pushes its Result, so reduce_results silently sees fewer entries.","fix":"Document the panic-propagation contract of ParThreadPool::scoped_computation and state which backends honor it; ideally wrap worker closures so a panic is captured into the result channel/bag and re-raised by the orchestrator, giving uniform behavior across pools.","locations":[{"ref":"src/par_thread_pool.rs:139-153","code":"  139 |         self.scoped_computation(|s| {\n  140 |             while do_spawn(nt) {\n  141 |                 let num_spawned = nt;\n  142 |                 nt.increment();\n  143 |                 let work = move || {\n  144 |                     bag.push(thread_map(num_spawned));\n  145 |                 };\n  146 |                 Self::run_in_scope(&s, work);\n  147 |             }\n  148 |         });\n  149 | \n  150 |         let thread_results: Vec<_> = thread_results.into_inner().into();\n  151 |         let result = F::reduce_results(thread_results);\n  152 | \n  153 |         (nt, result)","lines":15},{"ref":"src/runner/implementations/pond.rs:48-63","code":"   48 |     fn run_in_scope<'s, 'env, 'scope, W>(s: &Self::ScopeRef<'s, 'env, 'scope>, work: W)\n   49 |     where\n   50 |         'scope: 's,\n   51 |         'env: 'scope + 's,\n   52 |         W: Fn() + Send + 'scope + 'env,\n   53 |     {\n   54 |         s.execute(work);\n   55 |     }\n   56 | \n   57 |     fn scoped_computation<'env, 'scope, F>(&'env mut self,
