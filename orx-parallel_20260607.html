d,\n   25 |     {\n   26 |         self.scoped(f)\n   27 |     }","lines":16}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"max_num_threads_by_env_variable silently swallows a malformed value: a non-numeric or out-of-range string (e.g. \"abc\", \"-1\", or a value larger than usize::MAX) is mapped to `None` (no bound) with the error discarded (`Err(_e) => None`). A user who sets a typo in the limit gets full parallelism instead of the intended cap, with no diagnostic. Given the crate is no_std-by-default this cannot easily log, but the behavior is worth surfacing.","fix":"Under the `std` feature, consider emitting a one-time warning (e.g. eprintln) when the variable is set but unparsable, so misconfiguration is not silent. Otherwise document the fallback explicitly.","locations":[{"ref":"src/env.rs:8-14","code":"    8 |     match std::env::var(MAX_NUM_THREADS_ENV_VARIABLE) {\n    9 |         Ok(s) => match s.parse::<usize>() {\n   10 |             Ok(x) => NonZeroUsize::new(x), // None if 0; Some(x) if x is set to a positive bound\n   11 |             Err(_e) => None,               // not a number, ignored assuming no bound\n   12 |         },\n   13 |         Err(_e) => None, // not set, no bound\n   14 |     }","lines":7}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","description":"The `m` variants of next, next_any and reduce in parallel_compute match an infallible `Result<Vec<T>, Never>` with a single `Ok(results) =>` arm. This compiles because `Never`/`Infallible` makes the `Err` variant uninhabited, but writing it as a `match` with one arm is fragile (if the return type ever becomes fallible the code silently needs a new arm) and obscures intent.","fix":"Use `let Ok(results) = result;` (irrefutable for an uninhabited error) or `.expect(\"infallible\")` to make the infallibility explicit and to fail loudly if the signature later changes.","locations":[{"ref":"src/executor/parallel_compute/next.rs:26-32","code":"   26 |     let next = match result {\n   27 |         Ok(results) => results\n   28 |             .into_iter()\n   29 |             .flatten()\n   30 |             .min_by_key(|x| x.0)\n   31 |             .map(|x| x.1),\n   32 |     };","lines":7},{"ref":"src/executor/parallel_compute/next_any.rs:26-28","code":"   26 |     let next = match result {\n   27 |         Ok(results) => results.into_iter().flatten().next(),\n   28 |     };","lines":3},{"ref":"src/executor/parallel_compute/reduce.rs:28-30","code":"   28 |     let acc = match result {\n   29 |         Ok(results) => results.into_iter().flatten().reduce(reduce),\n   30 |     };","lines":3}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"into_par_rec_exact forwards exact_len straight to ConcurrentRecursiveIter::new_exact. That backing crate computes `remaining = exact_len - popped` in size_hint; if the caller supplies an exact_len smaller than the true number of yielded elements, this underflows (panic in debug, wraparound in release leading to absurd size hints and likely wrong chunking / allocation). The public doc here states exact_len is 'the total of all elements that will be created' but contains no `# Panics`/correctness warning that an underestimate is unsound for the computation.","fix":"Document that exact_len MUST equal the exact total number of yielded elements and that providing too small a value will panic / produce incorrect results; ideally state the consequence explicitly. Consider guarding against the underflow upstream (saturating_sub) but the primary fix here is an explicit `# Panics`/correctness note on the public method.","locations":[{"ref":"src/iter/recursive/into_par_rec_iter.rs:411-446","code":"  411 |     fn into_par_rec_exact<E>(\n  412 |         self,\n  413 |         extend: E,\n  414 |         exact_len: usize,\n  415 |     ) -> Par<ConcurrentRecursiveIter<Self::Item, E>, DefaultRunner>\n  416 |     where\n  417 |         E: Fn(&Self::Item, &Queue<Self::Item>) + Sync;\n  418 | }\n  419 | \n  420 | impl<X> IntoParIterRec for X\n  421 | where\n  422 |     X: IntoIterator,\n  423 |     X::Item: Send,\n  424 | {\n  425 |     fn into_par_rec<E>(\n  426 |         self,\n  427 |         extend: E,\n  428 |     ) -> Par<ConcurrentRecursiveIter<Self::Item, E>, DefaultRunner>\n  429 |     where\n  430 |         E: Fn(&Self::Item, &Queue<Self::Item>) + Sync,\n  431 |     {\n  432 |         let con_rec_iter = ConcurrentRecursiveIter::new(self, extend);\n  433 |         Par::new(DefaultRunner::default(), Params::default(), con_rec_iter)\n  434 |     }\n  435 | \n  436 |     fn into_par_rec_exact<E>(\n  437 |         self,\n  438 |         extend: E,\n  439 |         exact_len: usize,\n  440 |     ) -> Par<ConcurrentRecursiveIter<Self::Item, E>, DefaultRunner>\n  441 |     where\n  442 |         E: Fn(&Self::Item, &Queue<Self::Item>) + Sync,\n  443 |     {\n  444 |         let con_rec_iter = ConcurrentRecursiveIter::new_exact(self, extend, exact_len);\n  445 |         Par::new(DefaultRunner::default(), Params::default(), con_rec_iter)\n  446 |     }","lines":36},{"ref":"src/iter/recursive/into_par_rec_iter.rs:68-75","code":"   68 |     /// ## A. Recursive Iterator with Exact Length\n   69 |     ///\n   70 |     /// If we know, or if it is possible and sufficiently cheap to find out, the exact length of the iterator,\n   71 |     /// it is recommended to work with exact length recursive iterator. Note that the exact length of an\n   72 |     /// iterator is the total of all elements that will be created. This gives the parallel executor\n   73 |     /// opportunity to optimize the chunk sizes.\n   74 |     ///\n   75 |     /// We can use `initial_elements.into_par_rec_exact(extend, count)` to create the iterator with exact length.","lines":8}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"Trait/impl bound mismatch on `IterIntoParIter`. The trait method `iter_into_par` is declared with bound `Self::Item: Send` (line 122), but the only blanket impl requires `I::Item: Send + Sync` (line 128). The effective requirement is therefore `Send + Sync`, which is stricter than the trait's advertised `Send`. The extra `Sync` bound is likely unnecessary (the concurrent iterator synchronizes pulling) and contradicts the documented/declared contract; at minimum the two bounds should match.","fix":"Make the bounds consistent: either drop `Sync` from the impl (`I::Item: Send`) if soundness allows, or add `Sync` to the trait method's where-clause so the public contract matches the actual requirement.","locations":[{"ref":"src/iter_into_par_iter.rs:119-137","code":"  119 |     fn iter_into_par(self) -> Par<ConIterOfIter<Self>, DefaultRunner>\n  120 |     where\n  121 |         Self: Sized,\n  122 |         Self::Item: Send;\n  123 | }\n  124 | \n  125 | impl<I> IterIntoParIter for I\n  126 | where\n  127 |     I: Iterator,\n  128 |     I::Item: Send + Sync,\n  129 | {\n  130 |     fn iter_into_par(self) -> Par<ConIterOfIter<Self>, DefaultRunner> {\n  131 |         Par::new(\n  132 |             Default::default(),\n  133 |             Params::default(),\n  134 |             self.iter_into_con_iter(),\n  135 |         )\n  136 |     }\n  137 | }","lines":19}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"`println!`/stdout output is emitted directly from `complete_task` -> `display()`. The module doc itself states this executor is 'suitable only for test purposes, but not for production', yet nothing prevents its use in production and it unconditionally writes to stdout (via `std::println`), which can corrupt machine-readable program output and is not gated behind any feature flag or logging facade. The crate is otherwise `no_std`-friendly (uses `alloc::vec::Vec`) but this file hard-depends on `std::println`.","fix":"Route diagnostics through a logging facade (e.g. log/tracing) or an injectable writer instead of hard-coded `println!`, and/or feature-gate this executor so it cannot be enabled in production builds.","locations":[{"ref":"src/executor/executor_with_diagnostics/shared_state.rs:3","code":"    3 | use std::println;","lines":1},{"ref":"src/executor/executor_with_diagnostics/shared_state.rs:32-49","code":"   32 |         println!(\"\\n# Parallel Executor Diagnostics\");\n   33 |         println!(\"\\n- Number of threads used = {}\", task_counts.len());\n   34 | \n   35 |         println!(\"\\n- [Thread idx]: num_calls, num_tasks, avg_chunk_size, first_chunk_sizes\");\n   36 | \n   37 |         for (thread_idx, task_counts) in task_counts {\n   38 |             let total: usize = task_counts.iter().sum();\n   39 |             let num_calls = task_counts.len();\n   40 |             let avg_chunk_size = match num_calls {\n   41 |                 0 => 0,\n   42 |                 n => total / n,\n   43 |             };\n   44 |             let first_chunks: Vec<_> = task_counts.iter().copied().take(10).collect();\n   45 | \n   46 |             println!(\n   47 |                 \"  - [{thread_idx}]: {num_calls}, {total}, {avg_chunk_size}, {first_chunks:?}\",\n   48 |             );\n   49 |         }","lines":18},{"ref":"src/executor/executor_with_diagnostics/mod.rs:115-117","code":"","lines":3}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"Every parallel_compute routine passes `ComputationKind::Collect` to the orchestrator regardless of the actual computation. next/next_any are EarlyReturn computations and reduce is a Reduce computation, yet all are tagged Collect. The executor uses ComputationKind (e.g. in fixed_chunk/diagnostics executors) to choose chunking/spawning strategy, so mislabeling EarlyReturn and Reduce as Collect can lead to suboptimal scheduling decisions.","fix":"Pass `ComputationKind::EarlyReturn` for next/next_any and `ComputationKind::Reduce` for reduce so the executor can apply the intended per-kind heuristics.","locations":[{"ref":"src/executor/parallel_compute/next.rs:24","code":"   24 |         orchestrator.map_infallible(params, iter, ComputationKind::Collect, thread_map);","lines":1},{"ref":"src/executor/parallel_compute/next.rs:67","code":"   67 |         ComputationKind::Collect,","lines":1},{"ref":"src/executor/parallel_compute/next_any.rs:24","code":"   24 |         orchestrator.map_infallible(params, iter, ComputationKind::Collect, thread_map);","lines":1},{"ref":"src/executor/parallel_compute/next_any.rs:54","code":"   54 |         ComputationKind::Collect,","lines":1},{"ref":"src/executor/parallel_compute/reduce.rs:26","code":"   26 |         orchestrator.map_infallible(params, iter, ComputationKind::Collect, thread_map);","lines":1},{"ref":"src/executor/parallel_compute/reduce.rs:59","code":"   59 |         ComputationKind::Collect,","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"`complete_task` clones the thread-local `task_counts` vector (`self.task_counts.clone()`) into the shared bag. This runs once per thread at task completion and the thread is finishing, so the original is about to be dropped; the clone is a needless allocation and copy of the entire per-thread chunk-size history.","fix":"Move the vector instead of cloning, e.g. `shared_state.add_task_counts_of_thread(self.thread_idx, core::mem::take(&mut self.task_counts));`.","locations":[{"ref":"src/executor/executor_with_diagnostics/thread_executor.rs:54","code":"   54 |         shared_state.add_task_counts_of_thread(self.thread_idx, self.task_counts.clone());","lines":1}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"`current_chunk_size` is an `AtomicUsize` written by `do_spawn_new` and read by `new_thread_executor` on essentially every spawn decision, while `FixedChunkRunner` is shared across threads. This single hot atomic is a false-sharing / contention point and is also somewhat redundant: the value is only meaningfully recomputed every `LAG_PERIODICITY` (4) spawns, yet it is loaded on every `new_thread_executor` call. For Exact chunk sizes the value never changes, so the atomic round-trip is pure overhead.","fix":"Short-circuit the atomic entirely for `ResolvedChunkSize::Exact` (it is constant). Consider passing the freshly computed chunk size directly to thread creation rather than round-tripping through a shared atomic.","locations":[{"ref":"src/executor/fixed_chunk_executor/parallel_executor.rs:18","code":"   18 |     current_chunk_size: AtomicUsize,","lines":1},{"ref":"src/executor/fixed_chunk_executor/parallel_executor.rs:117","code":"  117 |                 Some(c) => self.current_chunk_size.store(c, Ordering::Relaxed),","lines":1},{"ref":"src/executor/fixed_chunk_executor/parallel_executor.rs:127","code":"  127 |             chunk_size: self.current_chunk_size.load(Ordering::Relaxed),","lines":1}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"An unaddressed optimization TODO notes that for the single-item branch it is possible to query the produced length and use `bag.extend(values.values())` instead of pushing items one at a time; the same applies to the chunk branch. As written, multi-item Values (flat_map) are pushed element-by-element via push_to_bag, incurring repeated atomic reservations on the ConcurrentBag instead of a single bulk reservation per Values batch.","fix":"Where `Vo` exposes a known length, reserve once and bulk-extend the bag rather than pushing each produced item individually, reducing per-item atomic contention.","locations":[{"ref":"src/executor/thread_compute/collect_arbitrary.rs:91","code":"   91 |                     // TODO: possible to try to get len and bag.extend(values_vt.values()) when available, same holds for chunk below","lines":1},{"ref":"src/executor/thread_compute/collect_arbitrary.rs:120-139","code":"  120 |                 match chunk_puller.pull() {\n  121 |                     Some(chunk) => {\n  122 |                         for value in chunk {\n  123 |                             let vo = xap1(value);\n  124 |                             let done = vo.push_to_bag(bag);\n  125 | \n  126 |                             if let Some(stop) = Vo::arbitrary_push_to_stop(done) {\n  127 |                                 iter.skip_to_end();\n  128 |                                 runner.complete_chunk(shared_state, chunk_size);\n  129 |                                 runner.complete_task(shared_state);\n  130 |                                 match stop {\n  131 |                                     Stop::DueToWhile => {\n  132 |                                         return ThreadCollectArbitrary::StoppedByWhileCondition;\n  133 |                                     }\n  134 |                                     Stop::DueToError { error } => {\n  135 |                                         return ThreadCollectArbitrary::StoppedByError { error };\n  136 |                                     }\n  137 |                                 }\n  138 |                             }\n  139 |                         }","lines":20}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"In collect_arbitrary `x`, the chunk-branch reuses the outer `match` discriminant value `c` (the requested chunk size) when calling `runner.complete_chunk(shared_state, chunk_size)` after an early stop, but more notably it calls `complete_chunk` then `complete_task` and returns on the FIRST stopping item while still inside the `for value in chunk` loop, silently discarding the remaining already-pulled items of the chunk. For the arbitrary (unordered) collect this is acceptable, but the requested `chunk_size` passed to begin_chunk/complete_chunk no longer reflects the number of items actually processed, which can mislead adaptive executors that tune future chunk sizes from these hooks.","fix":"Pass the count of items actually processed in the chunk (or document that begin/complete_chunk receive the requested size, not the processed size) so executor heuristics are not skewed by early-stop chunks.","locations":[{"ref":"src/executor/thread_compute/collect_arbitrary.rs:126-138","code":"  126 |                             if let Some(stop) = Vo::arbitrary_push_to_stop(done) {\n  127 |                                 iter.skip_to_end();\n  128 |                                 runner.complete_chunk(shared_state, chunk_size);\n  129 |                                 runner.complete_task(shared_state);\n  130 |                                 match stop {\n  131 |                                     Stop::DueToWhile => {\n  132 |                                         return ThreadCollectArbitrary::StoppedByWhileCondition;\n  133 |                                     }\n  134 |                                     Stop::DueToError { error } => {\n  135 |                                         return ThreadCollectArbitrary::StoppedByError { error };\n  136 |                                     }\n  137 |                                 }\n  138 |                             }","lines":13},{"ref":"src/executor/thread_compute/collect_arbitrary.rs:84-86","code":"   84 |         let chunk_size = runner.next_chunk_size(shared_state, iter);\n   85 | \n   86 |         runner.begin_chunk(chunk_size);","lines":3}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"In `seq_merge_streak_linear`, after a streak is copied via `write_many_from`, the loop re-reads `left.current()`/`right.current()` and continues comparing from the top, but the linear `position` scan over `left.values()`/`right.values()` restarts from the new current each iteration. For adversarial inputs (long alternating runs of length 1) this degrades to the same per-element cost as `StreakSearch::None` plus the overhead of building an `Iter` and calling `position` each step. Not incorrect, but the Linear variant can be slower than None on such inputs.","fix":"Fall back to single-element copy when the previous streak length was 1, or skip rebuilding the iterator; benchmark Linear vs None to confirm it is worth keeping.","locations":[{"ref":"src/experiment/algorithms/merge_sorted_slices/seq.rs:184-219","code":"  184 |                 match is_leq(l, r) {\n  185 |                     true => {\n  186 |                         let count = match left.values().position(|x| !is_leq(x, r)) {\n  187 |                             Some(idx_bigger) => idx_bigger,\n  188 |                             None => left.len(),\n  189 |                         };\n  190 |                         // SAFETY: left still has at least `count` elements, so must `dst`\n  191 |                         unsafe { dst.write_many_from(&mut left, count) };\n  192 | \n  193 |                         match left.current() {\n  194 |                             Some(x) => l = x,\n  195 |                             None => {\n  196 |                                 // SAFETY: target (i) and (ii) are satisfied by conditions (i) and (ii)\n  197 |                                 unsafe { dst.write_rest_from(&mut right) };\n  198 |                                 break;\n  199 |                             }\n  200 |                         }\n  201 |                     }\n  202 |                     false => {\n  203 |                         let count = match right.values().position(|x| !is_leq(x, l)) {\n  204 |                             Some(idx_bigger) => idx_bigger,\n  205 |                             None => right.len(),\n  206 |                         };\n  207 |                         // SAFETY: right still has at least `count` elements, so must `dst`\n  208 |                         unsafe { dst.write_many_from(&mut right, count) };\n  209 | \n  210 |                         match right.current() {\n  211 |                             Some(x) => r = x,\n  212 |                             None => {\n  213 |                                 // SAFETY: target (i) and (ii) are satisfied by conditions (i) and (ii)\n  214 |                                 unsafe { dst.write_rest_from(&mut left) };\n  215 |                                 break;\n  216 |                             }\n  217 |                         }\n  218 |                     }\n  219 |                 }","lines":36}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"Vector::acc_reduce (and u_acc_reduce) first reduce the inner iterator into a single Option, then merge with the incoming acc via a 4-arm match. This is correct, but for the common path where acc is Some it allocates no extra work; the concern is minor. More notably the inner reduce ignores the existing acc as the seed and instead does a second combine, so the user-provided reduce closure is invoked one extra time per chunk versus folding acc in as the initial value. In hot reductions over many small Vector chunks this is an avoidable extra call.","fix":"Fold the incoming acc in as the seed: `self.0.into_iter().fold(acc, |a, x| match a { Some(a) => Some(reduce(a, x)), None => Some(x) })`, avoiding the separate reduce+merge and the redundant final combine.","locations":[{"ref":"src/generic_values/vector.rs:60-91","code":"   60 |     #[inline(always)]\n   61 |     fn acc_reduce<X>(self, acc: Option<Self::Item>, reduce: X) -> Reduce<Self>\n   62 |     where\n   63 |         X: Fn(Self::Item, Self::Item) -> Self::Item,\n   64 |     {\n   65 |         let reduced = self.0.into_iter().reduce(&reduce);\n   66 | \n   67 |         Reduce::Done {\n   68 |             acc: match (acc, reduced) {\n   69 |                 (Some(x), Some(y)) => Some(reduce(x, y)),\n   70 |                 (Some(x), None) => Some(x),\n   71 |                 (None, Some(y)) => Some(y),\n   72 |                 (None, None) => None,\n   73 |             },\n   74 |         }\n   75 |     }\n   76 | \n   77 |     fn u_acc_reduce<U, X>(self, u: *mut U, acc: Option<Self::Item>, reduce: X) -> Reduce<Self>\n   78 |     where\n   79 |         X: Fn(*mut U, Self::Item, Self::Item) -> Self::Item,\n   80 |     {\n   81 |         let reduced = self.0.into_iter().reduce(|a, b| reduce(u, a, b));\n   82 | \n   83 |         Reduce::Done {\n   84 |             acc: match (acc, reduced) {\n   85 |                 (Some(x), Some(y)) => Some(reduce(u, x, y)),\n   86 |                 (Some(x), None) => Some(x),\n   87 |                 (None, Some(y)) => Some(y),\n   88 |                 (None, None) => None,\n   89 |             },\n   90 |         }\n   91 |     }","lines":32}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"ParMap::linearize and ParXap::linearize clone the orchestrator (orchestrator.clone()) even though the original `orchestrator` value is moved out by destruct() and only used to build the intermediate Par and the final ParMap/ParXap. The clone is needed only because the intermediate Par consumes one copy; for runners whose clone is non-trivial this is an avoidable allocation/clone on every linearize call.","fix":"Reuse a single orchestrator: build the intermediate Par with a clone but pass the original through, or restructure so only one orchestrator instance is required (the Par::linearize variant at lines 31-37 already avoids the extra clone by cloning once up front - mirror that or pass by reference where the runner API allows).","locations":[{"ref":"src/iter/recursive/rec_par_iter.rs:60-65","code":"   60 |     pub fn linearize(self) -> ParMap<ConIterVec<T>, O, M1, R> {\n   61 |         let (orchestrator, params, iter, map1) = self.destruct();\n   62 |         let par = Par::new(orchestrator.clone(), params, iter);\n   63 |         let items: Vec<_> = par.collect();\n   64 |         let iter = items.into_con_iter();\n   65 |         ParMap::new(orchestrator, params, iter, map1)","lines":6},{"ref":"src/iter/recursive/rec_par_iter.rs:90-95","code":"   90 |     pub fn linearize(self) -> ParXap<ConIterVec<T>, Vo, X1, R> {\n   91 |         let (orchestrator, params, iter, xap1) = self.destruct();\n   92 |         let par = Par::new(orchestrator.clone(), params, iter);\n   93 |         let items: Vec<_> = par.collect();\n   94 |         let iter = items.into_con_iter();\n   95 |         ParXap::new(orchestrator, params, iter, xap1)","lines":6}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"In ParThreadPoolCompute::map_in_pool and run_in_pool a fresh `work` closure is allocated/moved per spawned thread inside the while loop. This is inherent to per-thread dispatch and the count is small (<= max_num_threads), so impact is negligible, but for backends whose `run_in_scope` boxes the closure (pond/yastl/poolite/scoped-pool execute take `FnOnce`/`Fn` and typically Box internally) this is one heap allocation per worker per computation. Acceptable, noted for completeness.","fix":"No action required for typical workloads; if profiling shows overhead, reuse a single shared closure capturing thread index via an atomic counter instead of constructing one closure per spawn.","locations":[{"ref":"src/par_thread_pool.rs:140-148","code":"  140 |             while do_spawn(nt) {\n  141 |                 let num_spawned = nt;\n  142 |                 nt.increment();\n  143 |                 let work = move || {\n  144 |                     bag.push(thread_map(num_spawned));\n  145 |                 };\n  146 |                 Self::run_in_scope(&s, work);\n  147 |             }\n  148 |         });","lines":9},{"ref":"src/par_thread_pool.rs:163-170","code":"  163 |         self.scoped_computation(|s| {\n  164 |             while do_spawn(nt) {\n  165 |                 let num_spawned = nt;\n  166 |                 nt.increment();\n  167 |                 let work = move || thread_do(num_spawned);\n  168 |                 Self::run_in_scope(&s, work);\n  169 |             }\n  170 |         });","lines":8}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"negligible","description":"extend_vec_from_split reserves then extends from the SplitVec via the generic Extend/IntoIterator path (initial_vec.extend(collected_split_vec)). For multi-fragment split vectors this pushes element-by-element rather than using a bulk per-fragment copy; the reserve avoids reallocation but the per-element move loop is slower than a fragmented memcpy would be. Minor and only on the non-empty-initial-vec path.","fix":"If the SplitVec exposes fragment slices, extend per fragment with extend_from_slice (for Copy/Clone) or a bulk move helper to let the compiler vectorize the copy; otherwise this is acceptable as-is.","locations":[{"ref":"src/collect_into/utils.rs:14-18","code":"   14 |         _ => {\n   15 |             initial_vec.reserve(collected_split_vec.len());\n   16 |             initial_vec.extend(collected_split_vec);\n   17 |             initial_vec\n   18 |         }","lines":5}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","description":"`SharedStateWithDiagnostics::display` calls `self.task_counts.into_inner().to_vec()`, materializing a fresh contiguous Vec from the concurrent bag's backing storage purely to sort and print. This is a diagnostics-only path so cost is acceptable, but `to_vec()` clones every `(usize, Vec<usize>)` tuple (including each inner Vec) rather than consuming the bag's storage in place.","fix":"If the bag exposes an owning iterator/into-vec that moves elements, use it to avoid cloning each inner Vec; otherwise leave as-is given this is test-only.","locations":[{"ref":"src/executor/executor_with_diagnostics/shared_state.rs:29","code":"   29 |         let mut task_counts = self.task_counts.into_inner().to_vec();","lines":1}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"negligible","description":"`GenericIterator::find_any` for the orx variant calls `.iteration_order(IterationOrder::Arbitrary).find(predicate)` while the Sequential variant uses plain `Iterator::find` (which is necessarily ordered/first-match). This is correct but note that the Sequential branch cannot honor 'any' semantics; behavior across variants therefore differs (Sequential and Rayon::find_first return the first match, Rayon::find_any and Orx-arbitrary may return any). For an experiment-comparison helper this cross-variant semantic asymmetry can produce confusing 'mismatched' results between Sequential and the parallel variants.","fix":"Document that find_any is only 'arbitrary' for the parallel variants; the sequential variant always returns the first match. No code change strictly required.","locations":[{"ref":"src/generic_iterator/early_exit.rs:32-41","code":"   32 |     pub fn find_any<Predicate>(self, predicate: Predicate) -> Option<T>\n   33 |     where\n   34 |         Predicate: Fn(&T) -> bool + Send + Sync + Clone,\n   35 |     {\n   36 |         match self {\n   37 |             GenericIterator::Sequential(mut x) => x.find(predicate),\n   38 |             GenericIterator::Rayon(x) => x.find_any(predicate),\n   39 |             GenericIterator::Orx(x) => x.iteration_order(IterationOrder::Arbitrary).find(predicate),\n   40 |         }\n   41 |     }","lines":10}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"negligible","description":"ResultOfIter::next maps with closures `|x| Ok(x)` and `|e| Err(e)` where the tuple-struct constructors Ok and Err can be passed directly. Trivial, but in a hot per-element path the explicit closures are noisier than `.map(Ok)` / `.map(Err)` and rely on inlining to be free.","fix":"Use `iter.next().map(Ok)` and `self.error.take().map(Err)`.","locations":[{"ref":"src/generic_values/fallible_iterators/result_of_iter.rs:37-39","code":"   37 |             Some(iter) => iter.next().map(|x| Ok(x)),\n   38 |             None => self.error.take().map(|e| Err(e)),\n   39 |         }","lines":3}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"high","description":"The entire `src/value_variants/` directory is orphaned, dead, and would not compile if included. lib.rs declares no `mod value_variants` (verified: no reference to `value_variants` anywhere in src/ or Cargo.toml). These files are leftovers from before the `values` module was renamed to `generic_values` (commit 997c5db4). They are still tracked by git but are never built, so any maintenance applied here (or assumed-correct behavior) is silently ignored, and they have already diverged from the live code.","fix":"Delete the `src/value_variants/` directory entirely; it is superseded by `src/generic_values/`. If a parallel copy is genuinely wanted, register it as a module in lib.rs and keep it in sync.","locations":[{"ref":"src/value_variants/whilst_vector.rs:1-294","code":"    1 | use super::transformable_values::TransformableValues;\n    2 | use crate::generic_values::{\n    3 |     Values, WhilstAtom,\n    4 |     runner_results::{\n    5 |         ArbitraryPush, Fallible, Infallible, Next, OrderedPush, Reduce, SequentialPush,\n    6 |     },\n    7 |     whilst_iterators::WhilstAtomFlatMapIter,\n    8 |     whilst_vector_result::WhilstVectorResult,\n    9 | };\n   10 | use orx_concurrent_bag::ConcurrentBag;\n   11 | use orx_fixed_vec::IntoConcurrentPinnedVec;\n   12 | use orx_pinned_vec::PinnedVec;\n   13 | \n   14 | pub struct WhilstVector<I, T>(pub(crate) I)\n   15 | where\n   16 |     I: IntoIterator<Item = WhilstAtom<T>>;\n   17 | \n   18 | impl<I, T> Values for WhilstVector<I, T>\n   19 | where\n   20 |     I: IntoIterator<Item = WhilstAtom<T>>,\n   21 | {\n   22 |     type Item = T;\n   23 | \n   24 |     type Fallibility = Infallible;\n   25 | \n   26 |     fn push bitrary.rs:10-11","code":"   10 | #[cfg(test)]\n   11 | pub fn m<C, I, O, M1, P>(","lines":2}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`min_required_len` and `auto_chunk_size`'s inner `find_chunk_size` contain a branch that can never break in the intended way: line 60 (`input_len >= one_round_len && chunk_size <= DESIRED_MIN_CHUNK_SIZE`) is only reachable after the first condition (line 55) has failed, i.e. when `input_len < min_required_len = one_round_len * 4` (or *8). But to satisfy line 60 we need `input_len >= one_round_len`. So the band where line 60 can fire is `one_round_len <= input_len < 4*one_round_len`. As chunk_size halves, `one_round_len` shrinks, so this is reachable - it is NOT dead. However, note the condition `chunk_size <= DESIRED_MIN_CHUNK_SIZE` (64): once chunk_size has been halved down to <=64 the loop would otherwise keep halving to 1 needlessly; verify this guard actually triggers before chunk_size collapses to 1 for typical inputs. Flagging for review rather than asserting dead code.","fix":"Add unit tests covering the input_len bands around `one_round_len` and `4*one_round_len` to confirm the intended chunk size is selected and the DESIRED_MIN_CHUNK_SIZE guard fires as expected.","locations":[{"ref":"src/executor/fixed_chunk_executor/chunk_size.rs:48-72","code":"   48 |     fn find_chunk_size(kind: ComputationKind, input_len: usize, num_threads: usize) -> usize {\n   49 |         let mut chunk_size = MAX_CHUNK_SIZE;\n   50 | \n   51 |         loop {\n   52 |             let one_round_len = chunk_size * num_threads;\n   53 | \n   54 |             // heterogeneity buffer\n   55 |             if input_len >= min_required_len(kind, one_round_len) {\n   56 |                 break;\n   57 |             }\n   58 | \n   59 |             // len is still greater, we don't want chunk size to be too small\n   60 |             if input_len >= one_round_len && chunk_size <= DESIRED_MIN_CHUNK_SIZE {\n   61 |                 break;\n   62 |             }\n   63 | \n   64 |             // absolute breaking condition\n   65 |             if chunk_size == 1 {\n   66 |                 break;\n   67 |             }\n   68 | \n   69 |             chunk_size >>= 1;\n   70 |         }\n   71 | \n   72 |         chunk_size","lines":25}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"Infallible::reduce_results matches a single-arm `match x { Ok(x) => x }` over Result<T, Never>. Because Never is uninhabited this is correct and exhaustive, but the .map over the whole vec just to unwrap an always-Ok is a no-op clone of structure; combined with the unusual single-arm match it reads as leftover scaffolding rather than intentional code.","fix":"Since Error = Never can never occur, the input Vec already holds only Ok values; consider documenting why the unwrap is infallible, or restructure so Infallible paths never build Result-wrapped vectors at all.","locations":[{"ref":"src/generic_values/runner_results/fallibility.rs:66-73","code":"   66 |     fn reduce_results<T>(results: Vec<Result<T, Self::Error>>) -> Result<Vec<T>, Self::Error> {\n   67 |         Ok(results\n   68 |             .into_iter()\n   69 |             .map(|x| match x {\n   70 |                 Ok(x) => x,\n   71 |             })\n   72 |             .collect())\n   73 |     }","lines":8}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"The `'scope` lifetime parameter on ParThreadPool::ScopeRef and the `'scope: 's` / `'env: 'scope + 's` bounds are carried through every impl, but several backends' scope types do not actually use all three lifetimes (e.g. rayon_core::Scope<'scope> and scoped_pool::Scope<'scope> ignore 'env; the GAT still declares 'env). This produces phantom lifetime parameters that are pure boilerplate in those impls. Not a bug, but it inflates the duplicated surface and obscures which lifetimes matter per backend.","fix":"Consider whether the GAT truly needs three lifetimes for all backends; if not, simplify the trait signature, otherwise leave with a one-line comment explaining why all three are required by the std-scope-based backend.","locations":[{"ref":"src/par_thread_pool.rs:97-107","code":"   97 |     type ScopeRef<'s, 'env, 'scope>\n   98 |     where\n   99 |         'scope: 's,\n  100 |         'env: 'scope + 's;\n  101 | \n  102 |     /// Executes the `work` within scope `s`.\n  103 |     fn run_in_scope<'s, 'env, 'scope, W>(s: &Self::ScopeRef<'s, 'env, 'scope>, work: W)\n  104 |     where\n  105 |         'scope: 's,\n  106 |         'env: 'scope + 's,\n  107 |         W: Fn() + Send + 'scope + 'env;","lines":11},{"ref":"src/runner/implementations/rayon_core.rs:6-10","code":"    6 |     type ScopeRef<'s, 'env, 'scope>\n    7 |         = &'s rayon_core::Scope<'scope>\n    8 |     where\n    9 |         'scope: 's,\n   10 |         'env: 'scope + 's;","lines":5},{"ref":"src/runner/implementations/scoped_pool.rs:6-10","code":"    6 |     type ScopeRef<'s, 'env, 'scope>\n    7 |         = &'s Scope<'scope>\n    8 |     where\n    9 |         'scope: 's,\n   10 |         'env: 'scope + 's;","lines":5}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","description":"The `inspect` doc example presents a deterministic console output block (a fixed ordering of 'about to filter' / 'made it through filter' lines ending with '6') for a `.par()` parallel computation. Because the work runs across threads, this exact print ordering is not guaranteed and the documented output is misleading; readers may believe ordering is deterministic.","fix":"State explicitly that the printed line ordering is non-deterministic under parallel execution, or remove the fixed 'This will print:' block.","locations":[{"ref":"src/par_iter.rs:855-866","code":"  855 |     ///\n  856 |     /// This will print:\n  857 |     ///\n  858 |     /// ```console\n  859 |     /// about to filter: 1\n  860 |     /// about to filter: 4\n  861 |     /// made it through filter: 4\n  862 |     /// about to filter: 2\n  863 |     /// made it through filter: 2\n  864 |     /// about to filter: 3\n  865 |     /// 6\n  866 |     /// ```","lines":12}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","description":"Doc comment on `con_iter_len` is a copy-paste leftover from `ParIter::con_iter`. It says 'Returns a reference to the input concurrent iterator', but the method actually returns `Option<usize>` (the length of the input concurrent iterator, if known). The description is wrong and misleading for users of the public trait.","fix":"Change the doc to something like: 'Returns the number of elements in the input concurrent iterator, if known.'","locations":[{"ref":"src/par_iter_result.rs:148-149","code":"  148 |     /// Returns a reference to the input concurrent iterator.\n  149 |     fn con_iter_len(&self) -> Option<usize>;","lines":2}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment for `ParallelExecutorWithDiagnostics` claims threads that did no work are listed (the example shows `[3]: 0, 0, 0, []` and `[4]: 0, 0, 0, []`, and 'Number of threads used = 5'). In reality `display()` only iterates over entries pushed into `task_counts`, and `complete_task` (which performs the push) is only called by threads that were actually spawned and ran `work`. Threads that were never spawned never push, so they do not appear, and `task_counts.len()` reports the number of threads that ran, not the configured/max thread count. The example output is therefore misleading/unreachable as written.","fix":"Either update the doc example to only show threads that actually executed, or change `display()` to enumerate all `max_num_threads` slots (filling absent threads with zeros) so the printed output matches the documented format.","locations":[{"ref":"src/executor/executor_with_diagnostics/mod.rs:50-58","code":"","lines":9},{"ref":"src/executor/executor_with_diagnostics/shared_state.rs:28-50","code":"   28 |     pub fn display(self) {\n   29 |         let mut task_counts = self.task_counts.into_inner().to_vec();\n   30 |         task_counts.sort_by_key(|x| x.0);\n   31 | \n   32 |         println!(\"\\n# Parallel Executor Diagnostics\");\n   33 |         println!(\"\\n- Number of threads used = {}\", task_counts.len());\n   34 | \n   35 |         println!(\"\\n- [Thread idx]: num_calls, num_tasks, avg_chunk_size, first_chunk_sizes\");\n   36 | \n   37 |         for (thread_idx, task_counts) in task_counts {\n   38 |             let total: usize = task_counts.iter().sum();\n   39 |             let num_calls = task_counts.len();\n   40 |             let avg_chunk_size = match num_calls {\n   41 |                 0 => 0,\n   42 |                 n => total / n,\n   43 |             };\n   44 |             let first_chunks: Vec<_> = task_counts.iter().copied().take(10).collect();\n   45 | \n   46 |             println!(\n   47 |                 \"  - [{thread_idx}]: {num_calls}, {total}, {avg_chunk_size}, {first_chunks:?}\",\n   48 |             );\n   49 |         }\n   50 |     }","lines":23}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Stale debugging artifact left in production code: a commented-out `// println!(\"chunk = {}\", chunk.len());` inside the reduce hot loop. Dead comment with no value.","fix":"Delete the commented-out println line.","locations":[{"ref":"src/executor/thread_compute/reduce.rs:56","code":"   56 |                         // println!(\"chunk = {}\", chunk.len());","lines":1}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The SAFETY comment in `is_non_overlapping` is attached to the wrong line and misleads. Line 91-93 comment '(i) within bounds and (ii) slices do not overlap' is in `copy_from_nonoverlapping`, but more notably the `left`/`right` naming inside `is_non_overlapping` is inverted: `left` is bound to the *end* pointer of one slice and `right` to the *start* of the other, so `left < right` reads as nonsense relative to the names. Future readers can easily mis-edit this overlap check, which is a safety-critical predicate.","fix":"Rename to `higher_start_slice_end`/`lower_start` (or `end_of_lower`, `start_of_higher`) so the comparison `end_of_lower_slice < start_of_higher_slice` is self-evident; add a brief comment stating the predicate.","locations":[{"ref":"src/experiment/data_structures/slice.rs:122-135","code":"  122 | impl<'c, 'a, T: 'a> SliceSafe<'c, 'a, T> {\n  123 |     /// Returns true if slices `self` and `other` are non-overlapping.\n  124 |     pub fn is_non_overlapping(&self, other: &Self) -> bool {\n  125 |         match (self.0.len(), other.0.len()) {\n  126 |             (0, _) | (_, 0) => true,\n  127 |             (n, m) => {\n  128 |                 let (left, right) = match self.0.data() >= other.0.data() {\n  129 |                     true => (unsafe { other.0.data().add(m - 1) }, self.0.data()),\n  130 |                     false => (unsafe { self.0.data().add(n - 1) }, other.0.data()),\n  131 |                 };\n  132 |                 left < right\n  133 |             }\n  134 |         }\n  135 |     }","lines":14}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Copy-paste of a comment from the whilst variants into the fallible (Result) variant. The trailing comment says \"first element is stop, acc is None\", but this arm fires on an Err result, which is an error short-circuit, not a while-condition stop. The wording \"stop\" is misleading here and was clearly copied from whilst_vector(_result).rs where Stop means the while-predicate. It can mislead a reader into thinking acc is preserved on a while-stop here.","fix":"Reword to reflect the error semantics, e.g. \"first element is an error; computed values are irrelevant, acc is discarded\".","locations":[{"ref":"src/generic_values/vector_result.rs:79","code":"   79 |                         Err(error) => return Reduce::StoppedByError { error }, // first element is stop, acc is None","lines":1},{"ref":"src/generic_values/vector_result.rs:109","code":"  109 |                         Err(error) => return Reduce::StoppedByError { error }, // first element is stop, acc is None","lines":1}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `collect` doc comment on the option iterator is a copy-paste from the result iterator. It says 'Transforms an iterator into a collection iff all elements are of Ok variant. Early exits and returns the error if any of the elements is an Err.' But this is `ParIterOption`: elements are Some/None and it early-exits returning None, not an error. Misleading for the public API.","fix":"Rewrite to: 'Transforms an iterator into a collection iff all elements are of Some variant. Early exits and returns None if any of the elements is None.'","locations":[{"ref":"src/par_iter_option.rs:459-460","code":"  459 |     /// Transforms an iterator into a collection iff all elements are of Ok variant.\n  460 |     /// Early exits and returns the error if any of the elements is an Err.","lines":2}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `all` doc comment on the option iterator says 'It applies this closure to each Ok element of the iterator' (copy-paste from result iterator). This is `ParIterOption`, whose elements are Some/None, not Ok/Err.","fix":"Replace 'each Ok element' with 'each Some element'.","locations":[{"ref":"src/par_iter_option.rs:548-549","code":"  548 |     /// It applies this closure to each Ok element of the iterator,\n  549 |     /// and if they all return true, then so does `all`.","lines":2}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `for_each` doc comment on the option iterator says it 'returns `Ok(())` if all elements succeed' (copy-paste from the result iterator). The method actually returns `Option<()>`; on full success it returns `Some(())`, and `None` on failure (the example asserts `Some(())`). The 'Ok(())' wording is wrong for an Option-based iterator.","fix":"Change to: 'Calls a closure on each element of an iterator, and returns `Some(())` if all elements succeed.'","locations":[{"ref":"src/par_iter_option.rs:705-706","code":"  705 |     /// Calls a closure on each element of an iterator, and returns `Ok(())` if all elements succeed.\n  706 |     /// Early exits and returns None if any of the elements is None.","lines":2}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"`max_by_key` doc example for the result iterator asserts `Ok(Some(-3))` for inputs [Ok(-1), Ok(2), Ok(-3)] using key `x.abs()`. Keys are abs(-1)=1, abs(2)=2, abs(-3)=3, so -3 is correct; however the reduce uses `Ordering::Equal => x` (keep first), which combined with parallel chunking is fine here. No bug in logic, but note the sibling `min_by_key` example asserts `Ok(Some(-1))` for the same input which is also correct. Listed for completeness; verify the Equal tie-breaking matches the documented 'returns any' semantics elsewhere.","fix":"No code change required; ensure tie-breaking semantics (Equal keeps accumulator) are documented consistently across max_by/min_by/by_key variants.","locations":[{"ref":"src/par_iter_result.rs:972-985","code":"  972 |     fn max_by_key<Key, GetKey>(self, key: GetKey) -> Result<Option<Self::Item>, Self::Err>\n  973 |     where\n  974 |         Self: Sized,\n  975 |         Self::Item: Send,\n  976 |         Self::Err: Send,\n  977 |         Key: Ord,\n  978 |         GetKey: Fn(&Self::Item) -> Key + Sync,\n  979 |     {\n  980 |         let reduce = |x, y| match key(&x).cmp(&key(&y)) {\n  981 |             Ordering::Greater | Ordering::Equal => x,\n  982 |             Ordering::Less => y,\n  983 |         };\n  984 |         self.reduce(reduce)\n  985 |     }","lines":14},{"ref":"src/par_iter_option.rs:860-872","code":"  860 |     fn max_by_key<Key, GetKey>(self, key: GetKey) -> Option<Option<Self::Item>>\n  861 |     where\n  862 |         Self: Sized,\n  863 |         Self::Item: Send,\n  864 |         Key: Ord,\n  865 |         GetKey: Fn(&Self::Item) -> Key + Sync,\n  866 |     {\n  867 |         let reduce = |x, y| match key(&x).cmp(&key(&y)) {\n  868 |             Ordering::Greater | Ordering::Equal => x,\n  869 |             Ordering::Less => y,\n  870 |         };\n  871 |         self.reduce(reduce)\n  872 |     }","lines":13}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `min_by` doc comment incorrectly says 'Returns the element that gives the maximum value with respect to the specified `compare` function.' This is a copy-paste from `max_by`; the method returns the minimum. The example body correctly tests for the minimum (Ok(Some(1))), so only the prose is wrong.","fix":"Replace 'maximum value' with 'minimum value' in the first doc line of `min_by`.","locations":[{"ref":"src/par_iter_result.rs:1014-1016","code":" 1014 |     /// Returns the element that gives the maximum value with respect to the specified `compare` function.\n 1015 |     /// If the iterator is empty, `Ok(None)` is returned.\n 1016 |     /// Early exits and returns the error if any of the elements is an Err.","lines":3}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Several fallible-iterator doc comments mention 'Note that `find` itself is short-circuiting' inside methods that are not `find` (e.g. `first`). In `first` the prose discusses `find`'s behavior, which is confusing since the method being documented is `first`. Likely a copy-paste from `find` that was not adapted.","fix":"In the `first` doc, refer to `first` (or 'this method') rather than `find`.","locations":[{"ref":"src/par_iter_result.rs:1175-1179","code":" 1175 |     /// Note that `find` itself is short-circuiting in addition to fallible computation.\n 1176 |     /// Therefore, in case the fallible iterator contains both an Err and an Ok element,\n 1177 |     /// the result is **not deterministic**:\n 1178 |     /// * it might be the `Err` if it is observed first;\n 1179 |     /// * or `Ok(element)` if the Ok element is observed first.","lines":5},{"ref":"src/par_iter_option.rs:1051-1055","code":" 1051 |     /// Note that `find` itself is short-circuiting in addition to fallible computation.\n 1052 |     /// Therefore, in case the fallible iterator contains both a None and a Some element,\n 1053 |     /// the result is **not deterministic**:\n 1054 |     /// * it might be the `None` if it is observed first;\n 1055 |     /// * or `Some(element)` if the Some element is observed first.","lines":5}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"PondPool::new_threads_unbounded doc says 'The pool's queue of pending jobs is limited. The backlog is unbounded as in unbounded.' This is self-contradictory (limited vs unbounded) and the trailing 'as in unbounded' is a meaningless restatement. The method name implies an unbounded backlog, so the 'queue ... is limited' sentence appears to be a leftover/incorrect comment.","fix":"Rewrite the doc to accurately describe the backlog (unbounded) and remove the contradictory/placeholder sentence.","locations":[{"ref":"src/runner/implementations/pond.rs:16-18","code":"   16 |     /// Spawn a number of threads. The pool's queue of pending jobs is limited.\n   17 |     /// The backlog is unbounded as in unbounded.\n   18 |     pub fn new_threads_unbounded(num_threads: usize) -> Self {","lines":3}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The DefaultPool doc comment for the `#[cfg(not(feature = \"std\"))]` branch references `StdDefaultPool` without the intra-doc link backticks/link used in the std branch ('`StdDefaultPool` when ...'), and more importantly the cfg(not std) path describes a pool that cannot exist without std. The text is copied from the std variant and only the SequentialPool line is the relevant one for the no-std build, making the StdDefaultPool bullet misleading in that configuration.","fix":"Trim the no-std DefaultPool doc to describe only SequentialPool, or clarify that StdDefaultPool is unavailable without the std feature.","locations":[{"ref":"src/runner/mod.rs:30-35","code":"   30 | /// Default pool used by orx-parallel computations:\n   31 | ///\n   32 | /// * `StdDefaultPool` when \"std\" feature is enabled,\n   33 | /// * [`SequentialPool`] otherwise.\n   34 | #[cfg(not(feature = \"std\"))]\n   35 | pub type DefaultPool = SequentialPool;","lines":6}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Doc comment on `ParIterOptionUsing::collect` describes the Result-based semantics ('iff all elements are of Ok variant. Early exits and returns the error if any of the elements is an Err.') even though this is the Option variant whose semantics are None-based. Copy-paste from the Result trait; misleads users of the option API.","fix":"Reword to match Option semantics, e.g. 'Transforms an iterator into a collection iff all elements are of Some variant. Early exits and returns None if any of the elements is None.'","locations":[{"ref":"src/using/u_par_iter_option.rs:191-192","code":"  191 |     /// Transforms an iterator into a collection iff all elements are of Ok variant.\n  192 |     /// Early exits and returns the error if any of the elements is an Err.","lines":2}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Doc comment for `min_by` is mis-copied from `max_by`: it states 'Returns the element that gives the maximum value with respect to the specified `compare` function.' although the method returns the minimum element. Misleads API users.","fix":"Change the doc line to 'Returns the element that gives the minimum value with respect to the specified `compare` function.'","locations":[{"ref":"src/using/u_par_iter_result.rs:456","code":"  456 |     /// Returns the element that gives the maximum value with respect to the specified `compare` function.","lines":1}]},{"id":"CMT_17","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The `ParXap` doc comment contains a double space ('generalization of  one-to-one map') and the term 'xaps inputs' / 'xap' is used without a definition link to the underlying `Values`/`TransformableValues` abstraction, which is opaque to readers browsing the public type.","fix":"Fix the double space and add a one-line pointer to what 'xap' maps to (e.g. reference `TransformableValues`), or rephrase to state it unifies map / filter / filter_map / flat_map / take_while.","locations":[{"ref":"src/computational_variants/xap.rs:12-14","code":"   12 | /// A parallel iterator that xaps inputs.\n   13 | ///\n   14 | /// *xap* is a generalization of  one-to-one map, filter-map and flat-map operations.","lines":3}]},{"id":"CMT_18","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The `display()` output header advertises columns `num_calls, num_tasks, avg_chunk_size, first_chunk_sizes`, but `num_tasks` is printed as `total` which is the sum of chunk sizes (the number of *elements/tasks* processed), while `num_calls` is the number of chunks pulled. The naming is internally consistent only if 'task' means element; combined with the field comment mismatch this is confusing. Minor, but the `first_chunk_sizes` label is printed from `first_chunks` which is correct.","fix":"Clarify the header/variable naming so 'num_tasks' unambiguously refers to total elements processed; rename `total` to `num_tasks` or adjust the header text.","locations":[{"ref":"src/executor/executor_with_diagnostics/shared_state.rs:35-48","code":"   35 |         println!(\"\\n- [Thread idx]: num_calls, num_tasks, avg_chunk_size, first_chunk_sizes\");\n   36 | \n   37 |         for (thread_idx, task_counts) in task_counts {\n   38 |             let total: usize = task_counts.iter().sum();\n   39 |             let num_calls = task_counts.len();\n   40 |             let avg_chunk_size = match num_calls {\n   41 |                 0 => 0,\n   42 |                 n => total / n,\n   43 |             };\n   44 |             let first_chunks: Vec<_> = task_counts.iter().copied().take(10).collect();\n   45 | \n   46 |             println!(\n   47 |                 \"  - [{thread_idx}]: {num_calls}, {total}, {avg_chunk_size}, {first_chunks:?}\",\n   48 |             );","lines":14}]},{"id":"CMT_19","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment on the `task_counts` field describes it as `// (thread_idx, chunk_size)`, but the field type is `Vec<usize>` holding a sequence of per-chunk sizes for a single thread (the thread_idx is a separate field). The comment describes a tuple shape that does not match the field, copy-pasted from the shared_state bag's element type.","fix":"Correct the comment to e.g. `// chunk sizes pulled by this thread, in order`.","locations":[{"ref":"src/executor/executor_with_diagnostics/thread_executor.rs:13","code":"   13 |     task_counts: Vec<usize>, // (thread_idx, chunk_size)","lines":1}]},{"id":"CMT_20","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The SAFETY comment on the set_len(0) loop claims it 'prevents to drop the elements which are already moved to pinned_vec' and that capacity 'will still be reclaimed; however, as uninitialized memory'. The comment only accounts for the already-moved prefix and does not mention that, in the Some(max_idx) branch, there can be still-initialized trailing elements that this set_len(0) silently leaks (see the memory_leak finding). The comment is thus misleading about the full effect of the operation.","fix":"Update the comment to state that only the consumed prefix was moved out and that any unconsumed tail must be dropped separately (after the leak fix), so the set_len(0) is correct only once the tail has been handled.","locations":[{"ref":"src/heap_sort.rs:57-61","code":"   57 |     for vec in vectors.iter_mut() {\n   58 |         // SAFETY: this prevents to drop the elements which are already moved to pinned_vec\n   59 |         // allocation within vec.capacity() will still be reclaimed; however, as uninitialized memory\n   60 |         unsafe { vec.set_len(0) };\n   61 |     }","lines":5}]},{"id":"CMT_21","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Doc typo 'whilst(is-some)' in the SAFETY comment of `map_while`; should read 'while (is-some)' or 'take_while'. Minor but in a SAFETY comment justifying `unwrap_unchecked`, clarity matters.","fix":"Reword the SAFETY comment, e.g. 'x passed the take_while(is_some) check, so unwrap_unchecked is sound here.'","locations":[{"ref":"src/par_iter.rs:934-937","code":"  934 |         self.map(map_while).take_while(|x| x.is_some()).map(|x| {\n  935 |             // SAFETY: since x passed the whilst(is-some) check, unwrap_unchecked\n  936 |             unsafe { x.unwrap_unchecked() }\n  937 |         })","lines":4}]},{"id":"CMT_22","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment on `From<usize> for ChunkSize` and `From<usize> for NumThreads` says it converts 'the nonnegative integer'. `usize` is always nonnegative, so the qualifier is redundant/misleading (it implies a signed input is being constrained). Minor wording nit but it appears in public rustdoc.","fix":"Reword to 'Converts the integer to ...' since usize cannot be negative.","locations":[{"ref":"src/parameters/chunk_size.rs:63-67","code":"   63 | impl From<usize> for ChunkSize {\n   64 |     /// Converts the nonnegative integer to chunk size as follows:\n   65 |     ///\n   66 |     /// * 0 is converted to `ChunkSize::Auto`,\n   67 |     /// * `n` is converted to `ChunkSize::Exact(n)` where `n > 0`.","lines":5},{"ref":"src/parameters/num_threads.rs:42-46","code":"   42 | impl From<usize> for NumThreads {\n   43 |     /// Converts the nonnegative integer to number of threads as follows:\n   44 |     ///\n   45 |     /// * 0 is converted to `NumThreads::Auto`,\n   46 |     /// * `n` is converted to `NumThreads::Max(n)` where `n > 0`.","lines":5}]},{"id":"CMT_23","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Stray/garbled doc block in `num_threads`: contains a duplicated and out-of-place 'Parameters of the parallel iterator.' line embedded inside the integer-mapping bullet list, the result of a bad copy-paste/merge. Renders as malformed rustdoc.","fix":"Remove the stray '/// /// Parameters of the parallel iterator.' lines so the doc flows from the bullet list directly into the 'See [crate::ParIter::num_threads] for details.' reference.","locations":[{"ref":"src/using/u_par_iter.rs:42-45","code":"   42 |     ///\n   43 |     ///     /// Parameters of the parallel iterator.\n   44 |     ///\n   45 |     /// See [crate::ParIter::num_threads] for details.","lines":4}]},{"id":"CMT_24","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"`for_each` doc on the Option variant claims it 'returns `Ok(())` if all elements succeed', but this is the Option API (returns `Option<()>`, i.e. `Some(())`). Copy-paste from the Result trait doc.","fix":"Reword to 'returns `Some(())` if all elements are Some' to match the Option semantics.","locations":[{"ref":"src/using/u_par_iter_option.rs:276","code":"  276 |     /// Calls a closure on each element of an iterator, and returns `Ok(())` if all elements succeed.","lines":1}]},{"id":"CMT_25","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"`con_iter_len` doc comment says 'Returns a reference to the input concurrent iterator.' but the method returns `Option<usize>` (the iterator's length, not a reference). Comment was copied from `ParIterUsing::con_iter`.","fix":"Update the doc to describe returning the optional length of the input concurrent iterator.","locations":[{"ref":"src/using/u_par_iter_result.rs:36-37","code":"   36 |     /// Returns a reference to the input concurrent iterator.\n   37 |     fn con_iter_len(&self) -> Option<usize>;","lines":2}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","description":"The `first` early-exit method bodies in the three fallible-result variants are byte-for-byte identical (the entire `match params.iteration_order { Ordered => ... Arbitrary => ... }` block), differing only in how `x1` is built earlier. The same is true for the `reduce` and `collect_into` bodies, which differ only in the `destruct()` arity and the one-line `x1` closure. This is ~40 near-identical lines repeated across three files; a bug fixed in one (e.g. the `result.map(|x| x.map(|y| y.1))` index projection) is easy to forget in the siblings.","fix":"Extract the shared `first`/`reduce`/`collect_into` logic into a free helper parameterized by the `x1: Fn(I::Item) -> Vo` closure (and the destructured `orchestrator, params, iter`), then have each variant call it after building its own `x1`. This removes the triplicated match arms entirely.","locations":[{"ref":"src/computational_variants/fallible_result/par_result.rs:105-122","code":"  105 |     fn first(self) -> Result<Option<Self::Item>, Self::Err>\n  106 |     where\n  10 See [`into_par_rec`].`, or factor the shared example into a `#[doc = include_str!(...)]` snippet.","locations":[{"ref":"src/iter/recursive/into_par_rec_iter.rs:6-213","code":"    6 | /// Trait to convert an iterator into a recursive parallel iterator together with the `extend` method.\n    7 | /// Recursive iterators are most useful for defining parallel computations over non-linear data structures\n    8 | /// such as trees or graphs.\n    9 | ///\n   10 | /// Created parallel iterator is a regular parallel iterator; i.e., we have access to all [`ParIter`] features.\n   11 | ///\n   12 | /// It is recursive due to the extension. The recursive parallel iterator will yield\n   13 | /// * all initial elements contained in this iterator,\n   14 | /// * all elements dynamically added to the queue with the `extend` method while processing the elements.\n   15 | ///\n   16 | /// You may read more about the [`ConcurrentRecursiveIter`].\n   17 | ///\n   18 | /// [`ParIter`]: crate::ParIter\n   19 | pub trait IntoParIterRec\n   20 | where\n   21 |     Self: IntoIterator,\n   22 |     Self::Item: Send,\n   23 | {\n   24 |     /// Converts this iterator into a recursive parallel iterator together with the `extend` method.\n   25 |     /// Recursive iterators are most useful for defining parallel computations over non-linear data structures\n   26 |     /// such as trees or graphs.\n   27 |     ///\n   28 |     /// Created parallel iterator is a regular parallel iterator; i.e., we have access to all [`ParIter`] features.\n   29 |     ///\n   30 |     /// It is recursive due to the extension. The recursive parallel iterator will yield\n   31 |     /// * all initial elements contained in this iterator,\n   32 |     /// * all elements dynamically added to the queue with the `extend` method while processing the elements.\n   33 |     ///\n   34 |     /// You may read more about the [`ConcurrentRecursiveIter`].\n   35 |     ///\n   36 |     /// The `extend` function defines the recursive expansion behavior. It takes two arguments:\n   37 |     /// * `element: &Self::Item` is the item being processed.\n   38 |     /// * `queue: Queue<Self::Item, P>` is the queue of remaining elements/tasks which exposes two methods:\n   39 |     ///   * `push(item)` allows us to add one item to the queue,\n   40 |     ///   * `extend(items)` allows us to add all of the items to the queue. Here `items` must have a known\n   41 |     ///     size (`ExactSizeIterator`).\n   42 |     ///\n   43 |     /// Adding children one-by-one with `push` or all together with `extend` might be the extreme options.\n   44 |     /// Actually, any intermediate approach is also possible. For instance, we can choose to `extend` in\n   45 |     /// chunks of say 50 tasks. If the item happens to create 140 children, we can handle this with four\n   46 |     /// `extend` calls.\n   47 |     ///\n   48 |     /// Using either of the methods might be beneficial for different use cases.\n   49 |     ///\n   50 |     /// Pushing children one by one makes the new task available for other threads as fast as possible. Further,\n   51 |     /// when we don't know the exact number of children ahead of time, and we don't want to use heap allocation\n   52 |     /// to store the children in a vec before adding them to the queue just to make it sized, we can add the\n   53 |     /// elements one-by-one with the `queue.push(item)` method. On the other hand, this approach will have more\n   54 |     /// parallelization overhead.\n   55 |     ///\n   56 |     /// When we extending children all at once using `queue.extend(items)`, we minimize the parallelization overhead\n   57 |     /// for adding tasks to the queue. On the other hand, the children will be available only when writing of all\n   58 |     /// children to the queue is complete which might cause idleness when tasks are scarce. Still, the recommendation\n   59 |     /// is to try to `extend` first whenever possible due to the following: (i) if we extend with a lot of children,\n   60 |     /// the tasks will not be scarce; (ii) and if we extend with only a few of items, the delay of making the tasks\n   61 |     /// available for other threads will be short.\n   62 |     ///\n   63 |     /// The decision is use-case specific and best to benchmark for the specific input.\n   64 |     ///\n   65 |     /// This crate makes use of the [`ConcurrentRecursiveIter`] for this computation and provides three ways to execute\n   66 |     /// this computation in parallel.\n   67 |     ///\n   68 |     /// ## A. Recursive Iterator with Exact Length\n   69 |     ///\n   70 |     /// If we know, or if it is possible and sufficiently cheap to find out, the exact length of the iterator,\n   71 |     /// it is recommended to work with exact length recursive iterator. Note that the exact length of an\n   72 |     /// iterator is the total of all elements that will be created. This gives the parallel executor\n   73 |     /// opportunity to optimize the chunk sizes.\n   74 |     ///\n   75 |     /// We can use `initial_elements.into_par_rec_exact(extend, count)` to create the iterator with exact length.\n   76 |     ///\n   77 |     /// ## B. Recursive Iterator with Unknown Length\n   78 |     ///\n   79 |     /// If we cannot know or it is expensive to know the exact length of the iterator ahead of time, we can\n   80 |     /// still create a recursive parallel iterator. In these cases; however, it is recommended to provide\n   81 |     /// chunk size explicitly depending on the number of threads that will be used and any estimate on the exact\n   82 |     /// length.\n   83 |     ///\n   84 |     /// We can use `initial_elements.into_par_rec(extend)` to create the iterator without length information.\n   85 |     ///\n   86 |     /// ## C. Linearization\n   87 |     ///\n   88 |     /// Even with exact length, a recursive parallel iterator is much more dynamic than a flat parallel\n   89 |     /// iterator. This dynamic nature of shrinking and growing concurrently requires a greater parallelization\n   90 |     /// overhead. An alternative approach is to eagerly discover all tasks and then perform the parallel\n   91 |     /// computation over the flattened input of tasks using [`linearize`] transformation.\n   92 |     ///\n   93 |     /// We can use `initial_elements.into_par_rec(extend).linearize()` to create the flattened iterator.\n   94 |     ///\n   95 |     /// [`ParIter`]: crate::ParIter\n   96 |     /// [`ConcurrentRecursiveIter`]: orx_concurrent_recursive_iter::ConcurrentRecursiveIter\n   97 |     /// [`linearize`]: crate::computational_variants::Par::linearize\n   98 |     ///\n   99 |     /// ## Examples\n  100 |     ///\n  101 |     /// In the following example we perform some parallel computations over a tree.\n  102 |     /// It demonstrates that a \"recursive parallel iterator\" is just a parallel iterator with\n  103 |     /// access to all [`ParIter`] methods.\n  104 |     /// Once we create the recursive parallel iterator with the `extend` definition, we can use it as\n  105 |     /// a regular parallel iterator.\n  106 |     ///\n  107 |     /// Unfortunately, the example requires a long set up for completeness. Note that the relevant\n  108 |     /// code blocks begin after line `// parallel reduction`.\n  109 |     ///\n  110 |     /// ```\n  111 |     /// use orx_parallel::*;\n  112 |     /// use rand::{Rng, SeedableRng};\n  113 |     /// use rand_chacha::ChaCha8Rng;\n  114 |     /// use std::{collections::HashSet, ops::Range};\n  115 |     ///\n  116 |     /// pub struct Node<T> {\n  117 |     ///     pub idx: usize,\n  118 |     ///     pub data: T,\n  119 |     ///     pub children: Vec<Node<T>>,\n  120 |     /// }\n  121 |     ///\n  122 |     /// impl<T> Node<T> {\n  123 |     ///     fn create_node(out_edges: &[Vec<usize>], idx: usize, data: fn(usize) -> T) -> Node<T> {\n  124 |     ///         Node {\n  125 |     ///             idx,\n  126 |     ///             data: data(idx),\n  127 |     ///             children: out_edges[idx]\n  128 |     ///                 .iter()\n  129 |     ///                 .map(|child_idx| Self::create_node(out_edges, *child_idx, data))\n  130 |     ///                 .collect(),\n  131 |     ///         }\n  132 |     ///     }\n  133 |     ///\n  134 |     ///     pub fn new_tree(\n  135 |     ///         num_nodes: usize,\n  136 |     ///         degree: Range<usize>,\n  137 |     ///         data: fn(usize) -> T,\n  138 |     ///         rng: &mut impl Rng,\n  139 |     ///     ) -> Node<T> {\n  140 |     ///         assert!(num_nodes >= 2);\n  141 |     ///\n  142 |     ///         let mut leaves = vec![0];\n  143 |     ///         let mut remaining: Vec<_> = (1..num_nodes).collect();\n  144 |     ///         let mut edges = vec![];\n  145 |     ///         let mut out_edges = vec![vec![]; num_nodes];\n  146 |     ///\n  147 |     ///         while !remaining.is_empty() {\n  148 |     ///             let leaf_idx = rng.random_range(0..leaves.len());\n  149 |     ///             let leaf = leaves.remove(leaf_idx);\n  150 |     ///\n  151 |     ///             let degree = rng.random_range(degree.clone());\n  152 |     ///             match degree == 0 {\n  153 |     ///                 true => leaves.push(leaf),\n  154 |     ///                 false => {\n  155 |     ///                     let children_indices: HashSet<_> = (0..degree)\n  156 |     ///                         .map(|_| rng.random_range(0..remaining.len()))\n  157 |     ///                         .collect();\n  158 |     ///\n  159 |     ///                     let mut sorted: Vec<_> = children_indices.iter().copied().collect();\n  160 |     ///                     sorted.sort();\n  161 |     ///\n  162 |     ///                     edges.extend(children_indices.iter().map(|c| (leaf, remaining[*c])));\n  163 |     ///                     out_edges[leaf] = children_indices.iter().map(|c| remaining[*c]).collect();\n  164 |     ///                     leaves.extend(children_indices.iter().map(|c| remaining[*c]));\n  165 |     ///\n  166 |     ///                     for idx in sorted.into_iter().rev() {\n  167 |     ///                         remaining.remove(idx);\n  168 |     ///                     }\n  169 |     ///                 }\n  170 |     ///             }\n  171 |     ///         }\n  172 |     ///\n  173 |     ///         Self::create_node(&out_edges, 0, data)\n  174 |     ///     }\n  175 |     /// }\n  176 |     ///\n  177 |     /// let num_nodes = 1_000;\n  178 |     /// let out_degree = 0..100;\n  179 |     /// let mut rng = ChaCha8Rng::seed_from_u64(42);\n  180 |     /// let data = |idx: usize| idx.to_string();\n  181 |     /// let root = Node::new_tree(num_nodes, out_degree, data, &mut rng);\n  182 |     ///\n  183 |     /// let compute = |node: &Node<String>| node.data.parse::<u64>().unwrap();\n  184 |     ///\n  185 |     /// // parallel reduction\n  186 |     ///\n  187 |     /// fn extend<'a, T: Sync>(node: &&'a Node<T>, queue: &Queue<&'a Node<T>>) {\n  188 |     ///     queue.extend(&node.children);\n  189 |     /// }\n  190 |     ///\n  191 |     /// let sum = [&root].into_par_rec(extend).map(compute).sum();\n  192 |     /// assert_eq!(sum, 499500);\n  193 |     ///\n  194 |     /// // or any parallel computation such as map->filter->collect\n  195 |     ///\n  196 |     /// let result: Vec<_> = [&root]\n  197 |     ///     .into_par_rec(extend)\n  198 |     ///     .map(compute)\n  199 |     ///     .filter(|x| x.is_multiple_of(7))\n  200 |     ///     .collect();\n  201 |     /// assert_eq!(result.len(), 143);\n  202 |     ///\n  203 |     /// // or filter during extension\n  204 |     /// fn extend_filtered<'a>(node: &&'a Node<String>, queue: &Queue<&'a Node<String>>) {\n  205 |     ///     for child in &node.children {\n  206 |     ///         if child.idx != 42 {\n  207 |     ///             queue.push(child);\n  208 |     ///         }\n  209 |     ///     }\n  210 |     /// }\n  211 |     ///\n  212 |     /// let sum = [&root].into_par_rec(extend_filtered).map(compute).sum();\n  213 |     /// ```","lines":208},{"ref":"src/iter/recursive/into_par_rec_iter.rs:221-410","code":"  221 |     /// Converts this iterator into a recursive parallel iterator together with the `extend` method.\n  222 |     /// Recursive iterators are most useful for defining parallel computations over non-linear data structures\n  223 |     /// such as trees or graphs.\n  224 |     ///\n  225 |     /// Created parallel iterator is a regular parallel iterator; i.e., we have access to all [`ParIter`] features.\n  226 |     ///\n  227 |     /// It is recursive due to the extension. The recursive parallel iterator will yield\n  228 |     /// * all initial elements contained in this iterator,\n  229 |     /// * all elements dynamically added to the queue with the `extend` method while processing the elements.\n  230 |     ///\n  231 |     /// You may read more about the [`ConcurrentRecursiveIter`].\n  232 |     ///\n  233 |     /// The `extend` function defines the recursive expansion behavior. It takes two arguments:\n  234 |     /// * `element: &Self::Item` is the item being processed.\n  235 |     /// * `queue: Queue<Self::Item, P>` is the queue of remaining elements/tasks which exposes two methods:\n  236 |     ///   * `push(item)` allows us to add one item to the queue,\n  237 |     ///   * `extend(items)` allows us to add all of the items to the queue. Here `items` must have a known\n  238 |     ///     size (`ExactSizeIterator`).\n  239 |     ///\n  240 |     /// Adding children one-by-one with `push` or all together with `extend` might be the extreme options.\n  241 |     /// Actually, any intermediate approach is also possible. For instance, we can choose to `extend` in\n  242 |     /// chunks of say 50 tasks. If the item happens to create 140 children, we can handle this with four\n  243 |     /// `extend` calls.\n  244 | rator is the total of all elements that will be created. This gives the parallel executor\n  270 |     /// opportunity to optimize the chunk sizes.\n  271 |     ///\n  272 |     /// We can use `initial_elements.into_par_rec_exact(extend, count)` to create the iterator with exact length.\n  273 |     ///\n  274 |     /// ## B. Recursive Iterator with Unknown Length\n  275 |     ///\n  276 |     /// If we cannot know or it is expensive to know the exact length of the iterator ahead of time, we can\n  277 |     /// still create a recursive parallel iterator. In these cases; however, it is recommended to provide\n  278 |     /// chunk size explicitly depending on the number of threads that will be used and any estimate on the exact\n  279 |     /// length.\n  280 |     ///\n  281 |     /// We can use `initial_elements.into_par_rec(extend)` to create the iterator without length information.\n  282 |     ///\n  283 |     /// ## C. Linearization\n  284 |     ///\n  285 |     /// Even with exact length, a recursive parallel iterator is much more dynamic than a flat parallel\n  286 |     /// iterator. This dynamic nature of shrinking and growing concurrently requires a greater parallelization\n  287 |     /// overhead. An alternative approach is to eagerly discover all tasks and then perform the parallel\n  288 |     /// computation over the flattened input of tasks using [`linearize`] transformation.\n  289 |     ///\n  290 |     /// We can use `initial_elements.into_par_rec(extend).linearize()` to create the flattened iterator.\n  291 |     ///\n  292 |     /// [`ParIter`]: crate::ParIter\n  293 |     /// [`ConcurrentRecursiveIter`]: orx_concurrent_recursive_iter::ConcurrentRecursiveIter\n  294 |     /// [`linearize`]: crate::computational_variants::Par::linearize\n  295 |     ///\n  296 |     /// ## Examples\n  297 |     ///\n  298 |     /// In the following example we perform some parallel computations over a tree.\n  299 |     /// It demonstrates that a \"recursive para
