iter can take over establishing the connection instead of failing outright.","locations":[{"ref":"src/async_impl/h3_client/mod.rs:45-55","code":"   45 |         let lock = match self.pool.connecting(&key) {\n   46 |             pool::Connecting::InProgress(waiter) => {\n   47 |                 trace!(\"connecting to {key:?} is already in progress, subscribing...\");\n   48 | \n   49 |                 match waiter.receive().await {\n   50 |                     Some(client) => return Ok(client),\n   51 |                     None => return Err(\"failed to establish connection for HTTP/3 request\".into()),\n   52 |                 }\n   53 |             }\n   54 |             pool::Connecting::Acquired(lock) => lock,\n   55 |         };","lines":11}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`PoolInner::insert` logs 'connection already exists for key' when the key is present but then unconditionally overwrites the existing connection via `idle_conns.insert`. The existing PoolConnection (and its spawned poll_close task / close_rx) is dropped silently. The trace message implies a no-op or merge but the code replaces it; the comment/log is misleading about what happens and the replaced connection's driver task is orphaned.","fix":"Either document that the existing connection is intentionally replaced (and that its driver task will terminate when its SendRequest handles drop), or avoid inserting when a live connection already exists.","locations":[{"ref":"src/async_impl/h3_client/pool.rs:187-195","code":"  187 | impl PoolInner {\n  188 |     fn insert(&mut self, key: Key, conn: PoolConnection) {\n  189 |         if self.idle_conns.contains_key(&key) {\n  190 |             trace!(\"connection already exists for key {key:?}\");\n  191 |         }\n  192 | \n  193 |         self.idle_conns.insert(key, conn);\n  194 |     }\n  195 | }","lines":9}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`RequestBuilder::multipart` adds the `Content-Type: multipart/form-data; boundary=...` header via `self.header(...)`, which *appends* (HeaderMap::append) rather than replacing. If the builder already had a Content-Type set (e.g. via `.header(CONTENT_TYPE, ...)` or default headers), the request will be sent with two Content-Type headers, producing an invalid/ambiguous multipart request. The async impl shares this shape, but it remains a real correctness footgun in blocking.","fix":"Use a header insert/replace (e.g. `req.headers_mut().insert(CONTENT_TYPE, ...)`) so the multipart Content-Type overrides any prior value, or document that prior Content-Type must not be set.","locations":[{"ref":"src/blocking/request.rs:561-573","code":"  561 |     pub fn multipart(self, mut multipart: multipart::Form) -> RequestBuilder {\n  562 |         let mut builder = self.header(\n  563 |             CONTENT_TYPE,\n  564 |             format!(\"multipart/form-data; boundary={}\", multipart.boundary()).as_str(),\n  565 |         );\n  566 |         if let Ok(ref mut req) = builder.request {\n  567 |             *req.body_mut() = Some(match multipart.compute_length() {\n  568 |                 Some(length) => Body::sized(multipart.reader(), length),\n  569 |                 None => Body::new(multipart.reader()),\n  570 |             })\n  571 |         }\n  572 |         builder\n  573 |     }","lines":13}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `connect_socks`, the connection is double-wrapped: `let conn = TokioIo::new(conn); let conn = TokioIo::new(conn);` (lines 553-554 native-tls, 574-575 rustls). The inner `socks::connect` returns a `tokio::net::TcpStream`; wrapping in TokioIo twice is needed to satisfy the TlsInfoFactory impls expecting `TokioIo<TokioIo<TcpStream>>`, but the doubled wrap is non-obvious and undocumented, easy to break during refactors.","fix":"Add a brief comment explaining why the double TokioIo wrap is required (to match the TlsInfoFactory/Connection impls keyed on TokioIo<TokioIo<TcpStream>>).","locations":[{"ref":"src/connect.rs:552-557","code":"  552 |                     let conn = socks::connect(proxy, dst, dns, &self.resolver, http).await?;\n  553 |                     let conn = TokioIo::new(conn);\n  554 |                     let conn = TokioIo::new(conn);\n  555 |                     let tls_connector = tokio_native_tls::TlsConnector::from(tls.clone());\n  556 |                     let io = tls_connector.connect(&host, conn).await?;\n  557 |                     let io = TokioIo::new(io);","lines":6},{"ref":"src/connect.rs:573-582","code":"  573 |                     let conn = socks::connect(proxy, dst, dns, &self.resolver, http).await?;\n  574 |                     let conn = TokioIo::new(conn);\n  575 |                     let conn = TokioIo::new(conn);\n  576 |                     let server_name =\n  577 |                         rustls_pki_types::ServerName::try_from(host.as_str().to_owned())\n  578 |                             .map_err(|_| \"Invalid Server Name\")?;\n  579 |                     let io = RustlsConnector::from(tls)\n  580 |                         .connect(server_name, conn)\n  581 |                         .await?;\n  582 |                     let io = TokioIo::new(io);","lines":10}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`with_timeout` wraps the entire connect future (including TLS handshake) in a single `tokio::time::timeout`. The `simple_timeout` is only applied via `Connector::Simple`; when user layers are present the timeout is applied as an outer `TimeoutLayer` instead. The two paths use different timeout mechanisms (manual future wrap vs tower TimeoutLayer) which can produce different error types on elapse (crate TimedOut vs tower Elapsed mapped through cast_to_internal_error). Behavior/error-type may differ depending on whether custom layers exist.","fix":"Ensure both timeout paths surface the same `crate::error::TimedOut` error type to callers for consistent error handling.","locations":[{"ref":"src/connect.rs:904-917","code":"  904 | async fn with_timeout<T, F>(f: F, timeout: Option<Duration>) -> Result<T, BoxError>\n  905 | where\n  906 |     F: Future<Output = Result<T, BoxError>>,\n  907 | {\n  908 |     if let Some(to) = timeout {\n  909 |         match tokio::time::timeout(to, f).await {\n  910 |             Err(_elapsed) => Err(Box::new(crate::error::TimedOut) as BoxError),\n  911 |             Ok(Ok(try_res)) => Ok(try_res),\n  912 |             Ok(Err(e)) => Err(e),\n  913 |         }\n  914 |     } else {\n  915 |         f.await\n  916 |     }\n  917 | }","lines":14},{"ref":"src/connect.rs:144-167","code":"  144 |         match self.timeout {\n  145 |             Some(timeout) => {\n  146 |                 let service = ServiceBuilder::new()\n  147 |                     .layer(TimeoutLayer::new(timeout))\n  148 |                     .service(service);\n  149 |                 let service = ServiceBuilder::new()\n  150 |                     .map_err(|error: BoxError| cast_to_internal_error(error))\n  151 |                     .service(service);\n  152 |                 let service = BoxCloneSyncService::new(service);\n  153 | \n  154 |                 Connector::WithLayers(service)\n  155 |             }\n  156 |             None => {\n  157 |                 // no timeout, but still map err\n  158 |                 // no named timeout layer but we still map errors since\n  159 |                 // we might have user-provided timeout layer\n  160 |                 let service = ServiceBuilder::new().service(service);\n  161 |                 let service = ServiceBuilder::new()\n  162 |                     .map_err(|error: BoxError| cast_to_internal_error(error))\n  163 |                     .service(service);\n  164 |                 let service = BoxCloneSyncService::new(service);\n  165 |                 Connector::WithLayers(service)\n  166 |             }\n  167 |         }","lines":24}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `ConnectorService::call`, when a local transport (UDS/named pipe) is configured it is used unconditionally and proxies are skipped (also enforced at build time by clearing proxies). However the `dst` scheme is never validated: an `https://` URI over a UDS will still attempt a TLS handshake against the unix socket using the URL host as SNI, while an `http://` URI works plain. This is intended for some setups but there is no guard or documentation in this function that the local transport ignores the network host entirely; combined with proxies being silently cleared, misconfiguration is easy and silent.","fix":"Document that local transports ignore the URL host/proxies; consider a debug log when an https URL is dialed over a local transport so the SNI/host expectation is explicit.","locations":[{"ref":"src/connect.rs:932-939","code":"  932 |         // Local transports (UDS, Windows Named Pipes) skip proxies\n  933 |         #[cfg(any(unix, target_os = \"windows\"))]\n  934 |         if self.should_use_local_transport() {\n  935 |             return Box::pin(with_timeout(\n  936 |                 self.clone().connect_local_transport(dst),\n  937 |                 timeout,\n  938 |             ));\n  939 |         }","lines":8},{"ref":"src/connect.rs:112-121","code":"  112 |         #[cfg(unix)]\n  113 |         if base_service.unix_socket.is_some() && !base_service.proxies.is_empty() {\n  114 |             base_service.proxies = Default::default();\n  115 |             log::trace!(\"unix_socket() set, proxies are ignored\");\n  116 |         }\n  117 |         #[cfg(target_os = \"windows\")]\n  118 |         if base_service.windows_named_pipe.is_some() && !base_service.proxies.is_empty() {\n  119 |             base_service.proxies = Default::default();\n  120 |             log::trace!(\"windows_named_pipe() set, proxies are ignored\");\n  121 |         }","lines":10}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The hickory `Resolve` impl discards port information: `SocketAddrs::next` always returns `SocketAddr::new(ip_addr, 0)` with port 0. This relies on downstream code (hyper-util HttpConnector / DynResolver::http_resolve) to fill in the port. For the SOCKS local-resolve path (`DynResolver::http_resolve`), port 0 is handled, but any direct consumer of the `Resolve` trait that expects a usable port gets 0. The trait docs note port 0 is replaced, so this is consistent, but the GAI resolver returns real ports while hickory returns 0, an inconsistency between resolvers.","fix":"Document the deliberate port-0 behavior on the impl, or align with GAI by preserving any port from the lookup; ensure all internal consumers treat port 0 uniformly.","locations":[{"ref":"src/dns/hickory.rs:43-49","code":"   43 | impl Iterator for SocketAddrs {\n   44 |     type Item = SocketAddr;\n   45 | \n   46 |     fn next(&mut self) -> Option<Self::Item> {\n   47 |         self.iter.next().map(|ip_addr| SocketAddr::new(ip_addr, 0))\n   48 |     }\n   49 | }","lines":7}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Error::is_connect` only downcasts to `hyper_util::client::legacy::Error`. Connect failures that surface as a bare `io::Error` (e.g. from custom connectors or the SOCKS/proxy path) or other wrapped connect errors are not recognized, so `is_connect()` returns false for legitimate connection failures. This is inconsistent with `is_timeout`, which checks multiple error types in the source chain.","fix":"Also inspect `io::Error` with `ErrorKind::ConnectionRefused`/`AddrNotAvailable`/etc. in the source chain, mirroring the breadth of `is_timeout`.","locations":[{"ref":"src/error.rs:151-167","code":"  151 |     #[cfg(not(all(target_arch = \"wasm32\", any(target_os = \"unknown\", target_os = \"none\"))))]\n  152 |     /// Returns true if the error is related to connect\n  153 |     pub fn is_connect(&self) -> bool {\n  154 |         let mut source = self.source();\n  155 | \n  156 |         while let Some(err) = source {\n  157 |             if let Some(hyper_err) = err.downcast_ref::<hyper_util::client::legacy::Error>() {\n  158 |                 if hyper_err.is_connect() {\n  159 |                     return true;\n  160 |                 }\n  161 |             }\n  162 | \n  163 |             source = err.source();\n  164 |         }\n  165 | \n  166 |         false\n  167 |     }","lines":17}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"cache_maybe_has_http_auth uses `url.username().len() > 0` instead of `!url.username().is_empty()`. Clippy's len_zero lint flags this; functionally equivalent but non-idiomatic.","fix":"Use `!url.username().is_empty()`.","locations":[{"ref":"src/proxy.rs:455-458","code":"  455 | fn cache_maybe_has_http_auth(url: &Url, extra: &Option<HeaderValue>) -> bool {\n  456 |     (url.scheme() == \"http\" || url.scheme() == \"https\")\n  457 |         && (url.username().len() > 0 || url.password().is_some() || extra.is_some())\n  458 | }","lines":4}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`remove_sensitive_headers` strips `WWW_AUTHENTICATE` from the *request* headers on a cross-host redirect. `WWW-Authenticate` is a response header and is never legitimately present on an outgoing request, so removing it is a no-op at best and signals confusion about which header was intended (likely a copy/paste from a response-header list). The genuinely sensitive request header `proxy-authorization` is handled, but e.g. `authorization`/`cookie` variants beyond `cookie2` are the real targets.","fix":"Remove the `WWW_AUTHENTICATE` line (it is meaningless on a request) and double-check the intended list of sensitive request headers to strip on cross-origin redirect.","locations":[{"ref":"src/redirect.rs:239-251","code":"  239 | pub(crate) fn remove_sensitive_headers(headers: &mut HeaderMap, next: &Url, previous: &[Url]) {\n  240 |     if let Some(previous) = previous.last() {\n  241 |         let cross_host = next.host_str() != previous.host_str()\n  242 |             || next.port_or_known_default() != previous.port_or_known_default()\n  243 |             || next.scheme() != previous.scheme();\n  244 |         if cross_host {\n  245 |             headers.remove(AUTHORIZATION);\n  246 |             headers.remove(COOKIE);\n  247 |             headers.remove(\"cookie2\");\n  248 |             headers.remove(PROXY_AUTHORIZATION);\n  249 |             headers.remove(WWW_AUTHENTICATE);\n  250 |         }\n  251 |     }","lines":13}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The scope check in `clone_request` is gated on `self.retry_cnt > 0`, so the first clone (taken on the very first `call`, before any retry) is always created even for requests outside the policy scope. While the clone is only used if a later retry is classified as retryable, an out-of-scope classifier path could still retry the first time because the scope is never consulted on the initial clone. The intent (only retry within scope) is only enforced from the second clone onward.","fix":"Apply the scope check unconditionally (drop the `retry_cnt > 0` guard) so out-of-scope requests are never set up for retry, or document why the first clone deliberately ignores scope.","locations":[{"ref":"src/retry.rs:253-260","code":"  253 |     fn clone_request(&mut self, req: &Req) -> Option<Req> {\n  254 |         if self.retry_cnt > 0 && !self.scope.applies_to(req) {\n  255 |             return None;\n  256 |         }\n  257 |         if self.retry_cnt >= self.max_retries_per_request {\n  258 |             log::trace!(\"max_retries_per_request hit\");\n  259 |             return None;\n  260 |         }","lines":8}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In WASM multipart, when a text part has a non-text mime and no filename, the code forces `mime_type = Some(TEXT_PLAIN)` (line 205) and then builds a Blob with that overridden type, discarding the user's requested mime type. A user calling `.mime_str(\"application/json\")` on a text part with no filename will have the part sent as `text/plain`, silently ignoring their mime choice.","fix":"When the user supplied a non-text mime, use the actual requested mime for the Blob rather than overwriting it with TEXT_PLAIN; only fall back to TEXT_PLAIN when no mime was set.","locations":[{"ref":"src/wasm/multipart.rs:199-209","code":"  199 |         if let super::body::Single::Text(text) = single {\n  200 |             if mime_type.is_none() || mime_type == Some(&mime_guess::mime::TEXT_PLAIN) {\n  201 |                 if self.metadata().file_name.is_none() {\n  202 |                     return form.append_with_str(name, text);\n  203 |                 }\n  204 |             } else {\n  205 |                 mime_type = Some(&mime_guess::mime::TEXT_PLAIN);\n  206 |             }\n  207 |         }\n  208 | \n  209 |         let blob = self.blob(mime_type)?;","lines":11}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"`Request::try_clone` in the blocking module does NOT copy the request's extensions, while the async equivalent (`src/async_impl/request.rs:145-156`) does (`*req.extensions_mut() = self.extensions().clone();`). Extensions can carry per-request config such as the request timeout/total-timeout and other state; for the blocking client this means retries/redirects that rely on cloning a Request silently lose all extensions, diverging from async behavior. The blocking `Request` already exposes extensions indirectly via `into_async`/`TryFrom<http::Request>` (which sets them at request.rs:676), so dropping them on clone is a real data-loss bug introduced by the blocking copy not being kept in sync.","fix":"Add `*req.extensions_mut() = self.inner.extensions().clone();` (exposing an extensions accessor on the blocking Request if needed) in `try_clone`, mirroring async_impl::request::Request::try_clone.","locations":[{"ref":"src/blocking/request.rs:122-138","code":"  122 |     pub fn try_clone(&self) -> Option<Request> {\n  123 |         let body = if let Some(ref body) = self.body.as_ref() {\n  124 |             if let Some(body) = body.try_clone() {\n  125 |                 Some(body)\n  126 |             } else {\n  127 |                 return None;\n  128 |             }\n  129 |         } else {\n  130 |             None\n  131 |         };\n  132 |         let mut req = Request::new(self.method().clone(), self.url().clone());\n  133 |         *req.timeout_mut() = self.timeout().copied();\n  134 |         *req.headers_mut() = self.headers().clone();\n  135 |         *req.version_mut() = self.version().clone();\n  136 |         req.body = body;\n  137 |         Some(req)\n  138 |     }","lines":17}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `PendingRequest::poll`, the read-timeout future (`read_timeout_fut`) is created once when the request is dispatched and is never reset. The documented contract for `read_timeout` is \"applies to each read operation, and resets after a successful read.\" During the header/connect phase handled by this future, the timer is a single fixed deadline; it only gets reset semantics later when handed to `Response::new`. If the connect+header phase legitimately takes longer than one read interval (but each individual read is fast), the request is incorrectly failed with a TimedOut error.","fix":"Either document that read_timeout during the pre-body phase behaves as a fixed deadline, or reset `read_timeout_fut` whenever `in_flight` makes progress (returns Pending after producing partial work) to honor the per-read reset semantics.","locations":[{"ref":"src/async_impl/client.rs:3082-3088","code":" 3082 |         if let Some(delay) = self.as_mut().read_timeout().as_mut().as_pin_mut() {\n 3083 |             if let Poll::Ready(()) = delay.poll(cx) {\n 3084 |                 return Poll::Ready(Err(\n 3085 |                     crate::error::request(crate::error::TimedOut).with_url(self.url.clone())\n 3086 |                 ));\n 3087 |             }\n 3088 |         }","lines":7},{"ref":"src/async_impl/client.rs:2661-2666","code":" 2661 |         let read_timeout_fut = self\n 2662 |             .inner\n 2663 |             .read_timeout\n 2664 |             .map(tokio::time::sleep)\n 2665 |             .map(Box::pin);\n 2666 | ","lines":6}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `PoolClient::send_request`, the `tokio::select!` arm `Ok(Err(e)) = &mut rx` only fires when the body-sending task reports an explicit error. If the body task panics or the channel is dropped without sending (so `rx` resolves to `Err(RecvError)`), that arm's pattern does not match and the arm is disabled; the select then relies solely on `recv.recv_response()`. This can mask a body-send failure: the request-send error is swallowed and only the response future drives completion, potentially hanging or returning a confusing error.","fix":"Handle the `Err(RecvError)`/dropped-sender case explicitly rather than using a refutable `Ok(Err(e))` pattern that silently disables the arm; e.g. match on the full `Result<Result<(), BoxError>, RecvError>`.","locations":[{"ref":"src/async_impl/h3_client/pool.rs:267-274","code":"  267 |         tokio::select! {\n  268 |             Ok(Err(e)) = &mut rx => Err(e),\n  269 |             resp = recv.recv_response() => {\n  270 |                 let resp = resp?;\n  271 |                 let resp_body = crate::async_impl::body::boxed(Incoming::new(recv, resp.headers(), rx));\n  272 |                 Ok(resp.map(|_| resp_body))\n  273 |             }\n  274 |         }","lines":8}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`ClientBuilder::connect_timeout` silently discards the timeout configuration when passed `None`. Because it is generic over `T: Into<Option<Duration>>` and only forwards to the inner builder when `Some(dur)`, calling `.connect_timeout(None)` is a no-op rather than clearing/disabling a connect timeout. There is no way to reset a previously set connect timeout via this builder. Worse, the doc comment says \"Default is `None`\" but gives no indication that passing `None` is ignored, so a caller doing `.connect_timeout(maybe_dur)` with a `None` value gets no connect timeout applied without any feedback.","fix":"Either accept only `Duration` (matching the async inner `connect_timeout(Duration)` signature) so the type system forbids `None`, or thread an `Option` through to the inner builder so `None` explicitly clears the setting. Update the doc to describe the `None` behavior.","locations":[{"ref":"src/blocking/client.rs:399-409","code":"  399 |     pub fn connect_timeout<T>(self, timeout: T) -> ClientBuilder\n  400 |     where\n  401 |         T: Into<Option<Duration>>,\n  402 |     {\n  403 |         let timeout = timeout.into();\n  404 |         if let Some(dur) = timeout {\n  405 |             self.with_inner(|inner| inner.connect_timeout(dur))\n  406 |         } else {\n  407 |             self\n  408 |         }\n  409 |     }","lines":11}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Response::chunk loops to skip non-data frames (e.g. trailers) and returns Ok(None) at end of stream. This silently discards trailer frames. While documented as 'ignore unrecognized frames', a user streaming via chunk() has no way to observe trailers, unlike bytes_stream. This is a known limitation but worth flagging as a behavioral gap.","fix":"Document explicitly that trailers are discarded by chunk(), or expose a way to access trailer frames for callers that need them.","locations":[{"ref":"src/async_impl/response.rs:310-325","code":"  310 |     pub async fn chunk(&mut self) -> crate::Result<Option<Bytes>> {\n  311 |         use http_body_util::BodyExt;\n  312 | \n  313 |         // loop to ignore unrecognized frames\n  314 |         loop {\n  315 |             if let Some(res) = self.res.body_mut().frame().await {\n  316 |                 let frame = res.map_err(crate::error::decode)?;\n  317 |                 if let Ok(buf) = frame.into_data() {\n  318 |                     return Ok(Some(buf));\n  319 |                 }\n  320 |                 // else continue\n  321 |             } else {\n  322 |                 return Ok(None);\n  323 |             }\n  324 |         }\n  325 |     }","lines":16}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In `Body::send_future`, when the read side errors, the abort signal is sent with `tx.take().expect(...).clone().try_send(Err(Abort))`. The `.clone()` of the sender right before dropping it is unnecessary, and `try_send`'s result is discarded; if the channel buffer is full (capacity 0 mpsc) the abort may silently fail to be delivered, so the receiver may not learn the body was aborted in all cases.","fix":"Drop the redundant `.clone()` and consider using the (async) sender to reliably deliver the abort, or document that best-effort try_send is intentional.","locations":[{"ref":"src/blocking/body.rs:330-337","code":"  330 |                 Err(e) => {\n  331 |                     let _ = tx\n  332 |                         .take()\n  333 |                         .expect(\"tx only taken on error\")\n  334 |                         .clone()\n  335 |                         .try_send(Err(Abort));\n  336 |                     return Err(crate::error::body(e));\n  337 |                 }","lines":8}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Error::into_io` wraps the reqwest error in `io::Error::new(io::ErrorKind::Other, self)`. `ErrorKind::Other` is deprecated for library use in newer std (the guidance is to avoid it); more importantly it discards timeout/connect classification, so an `io::Error` derived from a reqwest timeout no longer reports `ErrorKind::TimedOut`. Code that round-trips through `into_io` then inspects `io::Error::kind()` loses the original category.","fix":"Map known reqwest error kinds to appropriate `io::ErrorKind` values (e.g. `TimedOut` for timeouts) before falling back to `Other`.","locations":[{"ref":"src/error.rs:200-203","code":"  200 |     #[allow(unused)]\n  201 |     pub(crate) fn into_io(self) -> io::Error {\n  202 |         io::Error::new(io::ErrorKind::Other, self)\n  203 |     }","lines":4}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`read_pem_certs` maps any pem-reader error to a generic 'invalid certificate encoding' builder error, discarding the underlying error detail. For debugging malformed bundles this loses the position/reason. Similarly `from_pem`/CRL parsing collapse errors to fixed strings.","fix":"Include the source error (e.g. via the BoxError path) instead of a static string so callers can diagnose which/why a cert failed to parse.","locations":[{"ref":"src/tls.rs:262-269","code":"  262 |     fn read_pem_certs(reader: &mut impl BufRead) -> crate::Result<Vec<Vec<u8>>> {\n  263 |         rustls_pki_types::CertificateDer::pem_reader_iter(reader)\n  264 |             .map(|result| match result {\n  265 |                 Ok(cert) => Ok(cert.as_ref().to_vec()),\n  266 |                 Err(_) => Err(crate::error::builder(\"invalid certificate encoding\")),\n  267 |             })\n  268 |             .collect()\n  269 |     }","lines":8}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"WASM `fetch` detects a timeout by string-matching the JS abort reason: `error.to_string() == \"JsValue(\\\"reqwest::errors::TimedOut\\\")\"`. This depends on the exact `Debug` formatting of `JsValue` (produced by `crate::error::wasm` via `format!(\"{js_val:?}\")`) and on the abort reason string set in `AbortGuard::timeout`. Any change to wasm-bindgen's `JsValue` Debug format, or to the reason string, silently breaks timeout detection, causing timeouts to be reported as generic request errors.","fix":"Detect the abort reason structurally (inspect the AbortSignal's `reason` JsValue / a sentinel value) rather than matching on the Debug string of a JsValue.","locations":[{"ref":"src/wasm/client.rs:269-278","code":"  269 |     let js_resp = super::promise::<web_sys::Response>(p)\n  270 |         .await\n  271 |         .map_err(|error| {\n  272 |             if error.to_string() == \"JsValue(\\\"reqwest::errors::TimedOut\\\")\" {\n  273 |                 crate::error::TimedOut.into()\n  274 |             } else {\n  275 |                 error\n  276 |             }\n  277 |         })\n  278 |         .map_err(crate::error::request)?;","lines":10},{"ref":"src/wasm/mod.rs:64-71","code":"   64 |     fn timeout(&mut self, timeout: Duration) {\n   65 |         let ctrl = self.ctrl.clone();\n   66 |         let abort =\n   67 |             Closure::once(move || ctrl.abort_with_reason(&\"reqwest::errors::TimedOut\".into()));\n   68 |         let timeout = set_timeout(\n   69 |             abort.as_ref().unchecked_ref::<js_sys::Function>(),\n   70 |             timeout.as_millis().try_into().expect(\"timeout\"),\n   71 |         );","lines":8}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`Identity::from_pem` accepts multiple private keys in the PEM but silently uses only the last one (`sk.pop()`), discarding any earlier keys without error. If a user concatenates two key/cert pairs, the first key is dropped silently and may pair with the wrong cert chain. There is no check that exactly one private key is present.","fix":"Error out (or document) when more than one private key is present rather than silently popping the last; validate sk.len() == 1.","locations":[{"ref":"src/tls.rs:377-409","code":"  377 |         let (key, certs) = {\n  378 |             let mut pem = Cursor::new(buf);\n  379 |             let mut sk = Vec::<rustls_pki_types::PrivateKeyDer>::new();\n  380 |             let mut certs = Vec::<rustls_pki_types::CertificateDer>::new();\n  381 | \n  382 |             while let Some((kind, data)) =\n  383 |                 rustls_pki_types::pem::from_buf(&mut pem).map_err(|_| {\n  384 |                     crate::error::builder(TLSError::General(String::from(\n  385 |                         \"Invalid identity PEM file\",\n  386 |                     )))\n  387 |                 })?\n  388 |             {\n  389 |                 match kind {\n  390 |                     SectionKind::Certificate => certs.push(data.into()),\n  391 |                     SectionKind::PrivateKey => sk.push(PrivateKeyDer::Pkcs8(data.into())),\n  392 |                     SectionKind::RsaPrivateKey => sk.push(PrivateKeyDer::Pkcs1(data.into())),\n  393 |                     SectionKind::EcPrivateKey => sk.push(PrivateKeyDer::Sec1(data.into())),\n  394 |                     _ => {\n  395 |                         return Err(crate::error::builder(TLSError::General(String::from(\n  396 |                             \"No valid certificate was found\",\n  397 |                         ))))\n  398 |                     }\n  399 |                 }\n  400 |             }\n  401 | \n  402 |             if let (Some(sk), false) = (sk.pop(), certs.is_empty()) {\n  403 |                 (sk, certs)\n  404 |             } else {\n  405 |                 return Err(crate::error::builder(TLSError::General(String::from(\n  406 |                     \"private key or certificate not found\",\n  407 |                 ))));\n  408 |             }\n  409 |         };","lines":33}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`default_headers` uses `insert` (overwrite) when merging the passed map into `self.config.headers`, but iterates with `headers.iter()` which yields each value of a multi-valued header separately. For a header key with multiple values, each successive `insert` overwrites the previous one, so only the last value survives - multi-valued default headers are silently collapsed to a single value.","fix":"Iterate so that the first value for a key uses `insert` and subsequent values for the same key use `append`, preserving multi-valued default headers.","locations":[{"ref":"src/async_impl/client.rs:1166-1171","code":" 1166 |     pub fn default_headers(mut self, headers: HeaderMap) -> ClientBuilder {\n 1167 |         for (key, value) in headers.iter() {\n 1168 |             self.config.headers.insert(key, value.clone());\n 1169 |         }\n 1170 |         self\n 1171 |     }","lines":6}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`make_referer` builds the referer with `referer.as_str().parse().ok()`, which silently drops the Referer header on any value that fails to parse as a `HeaderValue` (e.g. URLs containing characters not valid in a header). Combined with `set_username(\"\")`/`set_password(None)` whose results are ignored via `let _ =`, parse/strip failures are swallowed and no referer is sent, with no diagnostic.","fix":"At minimum log when the referer cannot be produced; consider percent-encoding or otherwise sanitizing so a valid referer is generated for the common cases.","locations":[{"ref":"src/redirect.rs:294-304","code":"  294 | fn make_referer(next: &Url, previous: &Url) -> Option<HeaderValue> {\n  295 |     if next.scheme() == \"http\" && previous.scheme() == \"https\" {\n  296 |         return None;\n  297 |     }\n  298 | \n  299 |     let mut referer = previous.clone();\n  300 |     let _ = referer.set_username(\"\");\n  301 |     let _ = referer.set_password(None);\n  302 |     referer.set_fragment(None);\n  303 |     referer.as_str().parse().ok()\n  304 | }","lines":11}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":true,"description":"`error_for_status_ref` is written as `self.inner.error_for_status_ref().and_then(|_| Ok(self))`. The `and_then(|_| Ok(self))` is a `map(|_| self)` written awkwardly (clippy `bind_instead_of_map`) and obscures intent. The async equivalent returns the result more directly.","fix":"Rewrite as `self.inner.error_for_status_ref().map(|_| self)`.","locations":[{"ref":"src/blocking/response.rs:411-413","code":"  411 |     pub fn error_for_status_ref(&self) -> crate::Result<&Self> {\n  412 |         self.inner.error_for_status_ref().and_then(|_| Ok(self))\n  413 |     }","lines":3}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"`try_pool` performs up to three HashMap operations on the same key per call: `get(&key)` (line 117) for validity/timeout checks, then a separate `get_mut(&key)` (line 137) to clone the client. It also uses `.and_then(|conn| Some(conn.pool()))` which is an anti-pattern equivalent to `.map(|conn| conn.pool())`. The key is also passed by `&&Key` (key is already `&Key`).","fix":"Use a single `get_mut(key)` to perform validity/timeout checks and clone the client in one lookup; remove the dead branch and bail out early when invalid/expired. Replace `.and_then(|c| Some(c.pool()))` with `.map(|c| c.pool())`.","locations":[{"ref":"src/async_impl/h3_client/pool.rs:114-139","code":"  114 |     pub fn try_pool(&self, key: &Key) -> Option<PoolClient> {\n  115 |         let mut inner = self.inner.lock().unwrap();\n  116 |         let timeout = inner.timeout;\n  117 |         if let Some(conn) = inner.idle_conns.get(&key) {\n  118 |             // We check first if the connection still valid\n  119 |             // and if not, we remove it from the pool.\n  120 |             if conn.is_invalid() {\n  121 |                 trace!(\"pooled HTTP/3 connection is invalid so removing it...\");\n  122 |                 inner.idle_conns.remove(&key);\n  123 |                 return None;\n  124 |             }\n  125 | \n  126 |             if let Some(duration) = timeout {\n  127 |                 if Instant::now().saturating_duration_since(conn.idle_timeout) > duration {\n  128 |                     trace!(\"pooled connection expired\");\n  129 |                     inner.idle_conns.remove(&key);\n  130 |                     return None;\n  131 |                 }\n  132 |             }\n  133 |         }\n  134 | \n  135 |         inner\n  136 |             .idle_conns\n  137 |             .get_mut(&key)\n  138 |             .and_then(|conn| Some(conn.pool()))\n  139 |     }","lines":26}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"In the async multipart path, compute_length() builds and caches each field's Content-Disposition header into FormParts::computed_headers (multipart.rs:415-417), but part_stream() never consumes that cache - it always recomputes the header via encode_headers() (multipart.rs:194-201). So when a request sets Content-Length (the common case for predictable forms), every header is encoded twice and the cached Vec<Vec<u8>> is allocated and then thrown away. The blocking implementation (src/blocking/multipart.rs:328-329) correctly drains computed_headers; the async one does not.","fix":"Either drain self.inner.computed_headers in part_stream() (pop the front matching the field, like the blocking impl), or remove the caching entirely from compute_length() since the async path never reads it. Keeping unused work allocated is a pure waste.","locations":[{"ref":"src/async_impl/multipart.rs:408-438","code":"  408 |     pub(crate) fn compute_length(&mut self) -> Option<u64> {\n  409 |         let mut length = 0u64;\n  410 |         for &(ref name, ref field) in self.fields.iter() {\n  411 |             match field.value_len() {\n  412 |                 Some(value_length) => {\n  413 |                     // We are constructing the header just to get its length. To not have to\n  414 |                     // construct it again when the request is sent we cache these headers.\n  415 |                     let header = self.percent_encoding.encode_headers(name, field.metadata());\n  416 |                     let header_length = header.len();\n  417 |                     self.computed_headers.push(header);\n  418 |                     // The additions mimic the format string out of which the field is constructed\n  419 |                     // in Reader. Not the cleanest solution because if that format string is\n  420 |                     // ever changed then this formula needs to be changed too which is not an\n  421 |                     // obvious dependency in the code.\n  422 |                     length += 2\n  423 |                         + self.boundary().len() as u64\n  424 |                         + 2\n  425 |                         + header_length as u64\n  426 |                         + 4\n  427 |                         + value_length\n  428 |                         + 2\n  429 |                 }\n  430 |                 _ => return None,\n  431 |             }\n  432 |         }\n  433 |         // If there is at least one field there is a special boundary for the very last field.\n  434 |         if !self.fields.is_empty() {\n  435 |             length += 2 + self.boundary().len() as u64 + 4\n  436 |         }\n  437 |         Some(length)\n  438 |     }","lines":31},{"ref":"src/async_impl/multipart.rs:181-207","code":"  181 |     pub(crate) fn part_stream<T>(\n  182 |         &mut self,\n  183 |         name: T,\n  184 |         part: Part,\n  185 |     ) -> impl Stream<Item = Result<Bytes, crate::Error>>\n  186 |     where\n  187 |         T: Into<Cow<'static, str>>,\n  188 |     {\n  189 |         // start with boundary\n  190 |         let boundary = stream::once(future::ready(Ok(\n  191 |             format!(\"--{}\\r\\n\", self.boundary()).into()\n  192 |         )));\n  193 |         // append headers\n  194 |         let header = stream::once(future::ready(Ok({\n  195 |             let mut h = self\n  196 |                 .inner\n  197 |                 .percent_encoding\n  198 |                 .encode_headers(&name.into(), &part.meta);\n  199 |             h.extend_from_slice(b\"\\r\\n\\r\\n\");\n  200 |             h.into()\n  201 |         })));\n  202 |         // then append form data followed by terminating CRLF\n  203 |         boundary\n  204 |             .chain(header)\n  205 |             .chain(part.value.into_data_stream())\n  206 |             .chain(stream::once(future::ready(Ok(\"\\r\\n\".into()))))\n  207 |     }","lines":27}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"On every native-tls / rustls connection establishment, `tokio_native_tls::TlsConnector::from(tls.clone())` (and rustls `Arc` clones) are constructed per call inside `connect_with_maybe_proxy` and `connect_via_proxy`. For native-tls, `tls.clone()` clones the underlying `TlsConnector` each connection, and `connect_via_proxy` even builds the tls_connector twice (lines 806 and 827). This repeats setup work on the hot connect path.","fix":"Construct the `tokio_native_tls::TlsConnector` once and reuse it; in `connect_via_proxy` reuse the single connector instead of building it twice (the TODO at line 809 acknowledges caching is desirable).","locations":[{"ref":"src/connect.rs:635","code":"  635 |                 let tls_connector = tokio_native_tls::TlsConnector::from(tls.clone());","lines":1},{"ref":"src/connect.rs:806-827","code":"  806 |                     let tls_connector = tokio_native_tls::TlsConnector::from(tls.clone());\n  807 |                     let inner =\n  808 |                         hyper_tls::HttpsConnector::from((http.clone(), tls_connector.clone()));\n  809 |                     // TODO: we could cache constructing this\n  810 |                     let mut tunnel =\n  811 |                         hyper_util::client::legacy::connect::proxy::Tunnel::new(proxy_dst, inner);\n  812 |                     if let Some(auth) = auth {\n  813 |                         tunnel = tunnel.with_auth(auth);\n  814 |                     }\n  815 |                     if let Some(ua) = self.user_agent {\n  816 |                         let mut headers = http::HeaderMap::new();\n  817 |                         headers.insert(http::header::USER_AGENT, ua);\n  818 |                         tunnel = tunnel.with_headers(headers);\n  819 |                     }\n  820 |                     // Note that custom headers may override the user agent header.\n  821 |                     if let Some(custom_headers) = misc {\n  822 |                         tunnel = tunnel.with_headers(custom_headers.clone());\n  823 |                     }\n  824 |                     // We don't wrap this again in an HttpsConnector since that uses Maybe,\n  825 |                     // and we know this is definitely HTTPS.\n  826 |                     let tunneled = tunnel.call(dst.clone()).await?;\n  827 |                     let tls_connector = tokio_native_tls::TlsConnector::from(tls.clone());","lines":22}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`execute_request` clones the full `HeaderMap` twice on every request: once into the hyper/h3 `req` via `*req.headers_mut() = headers.clone()` and then the original `headers` is moved into `PendingRequest`. The clone into the request is required, but the `PendingRequest` keeps a second copy that is only used for redirect bookkeeping/Debug. For requests with many headers this is avoidable per-request allocation on a hot path.","fix":"Build the request body first and move `headers` into it, then store only what `PendingRequest` actually needs (e.g. the method/url) rather than a full second `HeaderMap` clone, or wrap the shared headers in an `Arc`.","locations":[{"ref":"src/async_impl/client.rs:2640-2679","code":" 2640 |                 let mut req = builder.body(body).expect(\"valid request parts\");\n 2641 |                 *req.headers_mut() = headers.clone();\n 2642 |                 let mut h3 = self.inner.h3_client.as_ref().unwrap().clone();\n 2643 |                 ResponseFuture::H3(h3.call(req))\n 2644 |             }\n 2645 |             _ => {\n 2646 |                 let mut req = builder.body(body).expect(\"valid request parts\");\n 2647 |                 *req.headers_mut() = headers.clone();\n 2648 |                 let mut hyper = self.inner.hyper.clone();\n 2649 |                 ResponseFuture::Default(hyper.call(req))\n 2650 |             }\n 2651 |         };\n 2652 | \n 2653 |         let total_timeout = self\n 2654 |             .inner\n 2655 |             .total_timeout\n 2656 |             .fetch(&extensions)\n 2657 |             .copied()\n 2658 |             .map(tokio::time::sleep)\n 2659 |             .map(Box::pin);\n 2660 | \n 2661 |         let read_timeout_fut = self\n 2662 |             .inner\n 2663 |             .read_timeout\n 2664 |             .map(tokio::time::sleep)\n 2665 |             .map(Box::pin);\n 2666 | \n 2667 |         Pending {\n 2668 |             inner: PendingInner::Request(Box::pin(PendingRequest {\n 2669 |                 method,\n 2670 |                 url,\n 2671 |                 headers,\n 2672 | \n 2673 |                 client: self.inner.clone(),\n 2674 | \n 2675 |                 in_flight,\n 2676 |                 total_timeout,\n 2677 |                 read_timeout_fut,\n 2678 |                 read_timeout: self.inner.read_timeout,\n 2679 |             })),","lines":40}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`IpAddr::from_str(host).ok()` is written as `if let Some(addr) = IpAddr::from_str(host).ok()` which clippy flags - `.ok()` on a Result inside `if let Some` should be `if let Ok(addr) = IpAddr::from_str(host)`.","fix":"Use `if let Ok(addr) = IpAddr::from_str(host)` directly.","locations":[{"ref":"src/async_impl/h3_client/connect.rs:106","code":"  106 |         let addrs = if let Some(addr) = IpAddr::from_str(host).ok() {","lines":1}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`extract_domain` clones the entire `Uri` (`uri.clone()`) only to read its scheme and authority, then clones the scheme and authority again into the returned Key. The whole-Uri clone is unnecessary since scheme()/authority() borrow from the original `&mut Uri`.","fix":"Read `uri.scheme()` and `uri.authority()` directly without the leading `let uri_clone = uri.clone();`.","locations":[{"ref":"src/async_impl/h3_client/pool.rs:364-385","code":"  364 | pub(crate) fn extract_domain(uri: &mut Uri) -> Result<Key, Error> {\n  365 |     let uri_clone = uri.clone();\n  366 |     match (uri_clone.scheme(), uri_clone.authority()) {\n  367 |         (Some(scheme), Some(auth)) => {\n  368 |             let scheme_str = scheme.as_str();\n  369 |             if scheme_str != \"https\" && scheme_str != \" part_stream = self.part_stream(name, part);\n  170 |             Box::pin(memo.chain(part_stream))\n  171 |                 as Pin<Box<dyn Stream<Item = crate::Result<Bytes>> + Send + Sync>>\n  172 |         });\n  173 |         // append special ending boundary\n  174 |         let last = stream::once(future::ready(Ok(\n  175 |             format!(\"--{}--\\r\\n\", self.boundary()).into()\n  176 |         )));\n  177 |         Box::pin(stream.chain(last))\n  178 |     }","lines":18}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"error_for_status_ref clones the boxed Url just to deref and move it into status_code(). `*self.url.clone()` clones the entire Url (heap String reallocation) on every error path even though status_code only needs an owned Url that could be produced once.","fix":"Use `(*self.url).clone()` for clarity (same cost) or, better, change crate::error::status_code to accept `&Url` and clone internally only when constructing the Error, avoiding the clone on the success path entirely. Minor either way.","locations":[{"ref":"src/async_impl/response.rs:409-417","code":"  409 |     pub fn error_for_status_ref(&self) -> crate::Result<&Self> {\n  410 |         let status = self.status();\n  411 |         let reason = self.extensions().get::<hyper::ext::ReasonPhrase>().cloned();\n  412 |         if status.is_client_error() || status.is_server_error() {\n  413 |             Err(crate::error::status_code(*self.url.clone(), status, reason))\n  414 |         } else {\n  415 |             Ok(self)\n  416 |         }\n  417 |     }","lines":9}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`multipart::Reader::next_reader` advances through fields with `self.form.inner.fields.remove(0)` and `self.form.inner.computed_headers.remove(0)`. `Vec::remove(0)` is O(n) (shifts all remaining elements), making streaming a form with N parts O(N^2) in field count. For forms with many fields this is a quadratic blow-up purely from the data-structure choice.","fix":"Iterate with an index/drain or a `VecDeque`/`into_iter` instead of repeatedly removing from the front, to get O(N) overall.","locations":[{"ref":"src/blocking/multipart.rs:321-356","code":"  321 |     fn next_reader(&mut self) {\n  322 |         self.active_reader = if !self.form.inner.fields.is_empty() {\n  323 |             // We need to move out of the vector here because we are consuming the field's reader\n  324 |             let (name, field) = self.form.inner.fields.remove(0);\n  325 |             let boundary = Cursor::new(format!(\"--{}\\r\\n\", self.form.boundary()));\n  326 |             let header = Cursor::new({\n  327 |                 // Try to use cached headers created by compute_length\n  328 |                 let mut h = if !self.form.inner.computed_headers.is_empty() {\n  329 |                     self.form.inner.computed_headers.remove(0)\n  330 |                 } else {\n  331 |                     self.form\n  332 |                         .inner\n  333 |                         .percent_encoding\n  334 |                         .encode_headers(&name, field.metadata())\n  335 |                 };\n  336 |                 h.extend_from_slice(b\"\\r\\n\\r\\n\");\n  337 |                 h\n  338 |             });\n  339 |             let reader = boundary\n  340 |                 .chain(header)\n  341 |                 .chain(field.value.into_reader())\n  342 |                 .chain(Cursor::new(\"\\r\\n\"));\n  343 |             // According to https://tools.ietf.org/html/rfc2046#section-5.1.1\n  344 |             // the very last field has a special boundary\n  345 |             if !self.form.inner.fields.is_empty() {\n  346 |                 Some(Box::new(reader))\n  347 |             } else {\n  348 |                 Some(Box::new(reader.chain(Cursor::new(format!(\n  349 |                     \"--{}--\\r\\n\",\n  350 |                     self.form.boundary()\n  351 |                 )))))\n  352 |             }\n  353 |         } else {\n  354 |             None\n  355 |         }\n  356 |     }","lines":36}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`wait::enter()` constructs a brand-new full Tokio current-thread runtime on every single `wait::timeout` call (which happens once per `execute`, and once per `read`/`json`/`bytes`/`text` on a Response) purely to assert that the caller is not already inside a runtime. Although gated behind `#[cfg(debug_assertions)]`, in debug builds this allocates and tears down a runtime for every blocking I/O step, including every `Read::read` call on a `Response`, which can be extremely hot when copying a large body. The cost is paid solely for a panic check.","fix":"Use a cheaper runtime-context check, e.g. `tokio::runtime::Handle::try_current().is_err()` style assertion, instead of building and dropping a runtime on every call.","locations":[{"ref":"src/blocking/wait.rs:73-82","code":"   73 | fn enter() {\n   74 |     // Check we aren't already in a runtime\n   75 |     #[cfg(debug_assertions)]\n   76 |     {\n   77 |         let _enter = tokio::runtime::Builder::new_current_thread()\n   78 |             .build()\n   79 |             .expect(\"build shell runtime\")\n   80 |             .enter();\n   81 |     }\n   82 | }","lines":10},{"ref":"src/blocking/response.rs:435-444","code":"  435 | impl Read for Response {\n  436 |     fn read(&mut self, buf: &mut [u8]) -> io::Result<usize> {\n  437 |         use futures_util::io::AsyncReadExt;\n  438 | \n  439 |         let timeout = self.timeout;\n  440 |         wait::timeout(self.body_mut().read(buf), timeout).map_err(|e| match e {\n  441 |             wait::Waited::TimedOut(e) => crate::error::decode(e).into_io(),\n  442 |             wait::Waited::Inner(e) => e,\n  443 |         })\n  444 |     }","lines":10}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`http.clone()` is redundant. The enclosing `match self.inner` already moves `Inner::NativeTls(http, tls)` by value, so `http` is owned here; cloning the `HttpConnector` just to mutate it duplicates internal state needlessly.","fix":"Use `let mut http = http;` (or bind the pattern as `mut http`) instead of `let mut http = http.clone();`, matching the rustls branch which does `let mut http = http;` at line 665.","locations":[{"ref":"src/connect.rs:625-626","code":"  625 |             Inner::NativeTls(http, tls) => {\n  626 |                 let mut http = http.clone();","lines":2}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In Custom::call, uri.port() is called twice and the port is formatted via p.to_string() into a fresh String for each proxied request, plus a full format!/parse round-trip to rebuild a Url from the Uri. This runs on every request that goes through a custom proxy. The double uri.port() call and the throwaway String allocation are avoidable.","fix":"Compute the port once (e.g. `let port = uri.port_u16();`) and build the authority with a single write!/format! using the optional port, avoiding the separate `.to_string()` allocation.","locations":[{"ref":"src/proxy.rs:779-800","code":"  779 |     fn call(&self, uri: &http::Uri) -> Option<matcher::Intercept> {\n  780 |         let url = format!(\n  781 |             \"{}://{}{}{}\",\n  782 |             uri.scheme()?,\n  783 |             uri.host()?,\n  784 |             uri.port().map_or(\"\", |_| \":\"),\n  785 |             uri.port().map_or(String::new(), |p| p.to_string())\n  786 |         )\n  787 |         .parse()\n  788 |         .expect(\"should be valid Url\");\n  789 | \n  790 |         (self.func)(&url)\n  791 |             .and_then(|result| result.ok())\n  792 |             .and_then(|target| {\n  793 |                 let m = matcher::Matcher::builder()\n  794 |                     .all(String::from(target))\n  795 |                     .build();\n  796 | \n  797 |                 m.intercept(uri)\n  798 |             })\n  799 |         //.map(|scheme| scheme.if_no_auth(&self.auth))\n  800 |     }","lines":22}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`Certificate::from_pem_bundle` collects all parsed DER certs into a Vec, then iterates `.iter()` re-borrowing each `Vec<u8>` and calls `Certificate::from_der(cert_vec)` which does `der.to_owned()` - copying every certificate's bytes a second time. The DERs were just produced as owned `Vec<u8>` and could be moved directly.","fix":"Consume the parsed Vec by value (into_iter) and move each `Vec<u8>` into the `Cert::Der` variant without re-copying via `to_owned`.","locations":[{"ref":"src/tls.rs:217-224","code":"  217 |     pub fn from_pem_bundle(pem_bundle: &[u8]) -> crate::Result<Vec<Certificate>> {\n  218 |         let mut reader = BufReader::new(pem_bundle);\n  219 | \n  220 |         Self::read_pem_certs(&mut reader)?\n  221 |             .iter()\n  222 |             .map(|cert_vec| Certificate::from_der(cert_vec))\n  223 |             .collect::<crate::Result<Vec<Certificate>>>()\n  224 |     }","lines":8}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`HyperService::call` clones the inner hyper client on every single call (`let clone = self.hyper.clone(); let mut inner = std::mem::replace(...)`). While this is the canonical tower clone-before-call idiom needed because the future is `'static`, the hyper legacy client clone is not free and this is on the per-request hot path. Worth confirming the clone is genuinely required versus holding an `Arc`-shared client.","fix":"If the underlying hyper client is already cheaply cloneable (Arc-backed) this is fine; otherwise consider wrapping in `Arc` to make the per-call clone a pointer bump. Document why the replace dance is needed.","locations":[{"ref":"src/async_impl/client.rs:153-157","code":"  153 |     fn call(&mut self, req: hyper::Request<crate::async_impl::body::Body>) -> Self::Future {\n  154 |         let clone = self.hyper.clone();\n  155 |         let mut inner = std::mem::replace(&mut self.hyper, clone);\n  156 |         Box::pin(async move { inner.call(req).await.map_err(crate::error::request) })\n  157 |     }","lines":5}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"compute_length pushes constructed headers into computed_headers even though (per the separate finding) the async part_stream never consumes them. Beyond the recompute waste, this also grows a Vec<Vec<u8>> proportional to field count that is never read in the async path, holding the encoded headers in memory for the lifetime of the Form.","fix":"Same root cause as the computed_headers finding: stop caching in the async path, or consume the cache in part_stream.","locations":[{"ref":"src/async_impl/multipart.rs:413-417","code":"  413 |                     // We are constructing the header just to get its length. To not have to\n  414 |                     // construct it again when the request is sent we cache these headers.\n  415 |                     let header = self.percent_encoding.encode_headers(name, field.metadata());\n  416 |                     let header_length = header.len();\n  417 |                     self.computed_headers.push(header);","lines":5}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"take_fields uses `std::mem::replace(&mut self.fields, Vec::new())` where std::mem::take is the idiomatic, equivalent zero-cost form.","fix":"Replace with `std::mem::take(&mut self.fields)`.","locations":[{"ref":"src/async_impl/multipart.rs:441-443","code":"  441 |     fn take_fields(&mut self) -> Vec<(Cow<'static, str>, P)> {\n  442 |         std::mem::replace(&mut self.fields, Vec::new())\n  443 |     }","lines":3}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`*req.version_mut() = self.version().clone();` calls `.clone()` on `http::Version`, which is `Copy`. This is a needless clone (clippy `clone_on_copy`) and is inconsistent with the async version which writes `*req.version_mut() = self.version();`.","fix":"Replace `self.version().clone()` with `self.version()`.","locations":[{"ref":"src/blocking/request.rs:135","code":"  135 |         *req.version_mut() = self.version().clone();","lines":1}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Jar::cookies` collects all matching name/value pairs into a `Vec<String>` and then `join`s them, allocating an intermediate vector plus a String per cookie. For requests with many stored cookies this is avoidable churn on a hot path.","fix":"Fold the pairs directly into a single `String` with separators instead of collecting into a `Vec` first.","locations":[{"ref":"src/cookie.rs:174-189","code":"  174 |     fn cookies(&self, url: &url::Url) -> Option<HeaderValue> {\n  175 |         let s = self\n  176 |             .0\n  177 |             .read()\n  178 |             .unwrap()\n  179 |             .get_request_values(url)\n  180 |             .map(|(name, value)| format!(\"{name}={value}\"))\n  181 |             .collect::<Vec<_>>()\n  182 |             .join(\"; \");\n  183 | \n  184 |         if s.is_empty() {\n  185 |             return None;\n  186 |         }\n  187 | \n  188 |         HeaderValue::from_maybe_shared(Bytes::from(s)).ok()\n  189 |     }","lines":16}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`Body::into_part` matches both `Inner` variants and reconstructs an identical `Body` in each arm. It is an effective no-op that just returns `self` re-wrapped; the match adds nothing. (Compare the non-wasm body, where `into_part` actually transforms the body.)","fix":"Replace the body with `self`, or remove the method and use the value directly at the call site in multipart `Part::new`.","locations":[{"ref":"src/wasm/body.rs:103-113","code":"  103 |     #[cfg(feature = \"multipart\")]\n  104 |     pub(crate) fn into_part(self) -> Body {\n  105 |         match self.inner {\n  106 |             Inner::Single(single) => Self {\n  107 |                 inner: Inner::Single(single),\n  108 |             },\n  109 |             Inner::MultipartForm(form) => Self {\n  110 |                 inner: Inner::MultipartForm(form),\n  111 |             },\n  112 |         }\n  113 |     }","lines":11}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`build_h3_connector` declares the closure parameter `quic_max_idle_timeout: Option<Duration>` with an explicit type while all other parameters are inferred, and the `#[allow(unused)]` plus `let mut h3_connector = None;` at line 420-422 leans on lint suppression. The `#[allow(unused)]` is broader than needed and can mask genuinely unused variables introduced later in this large build() body.","fix":"Replace the blanket `#[allow(unused)]` with a targeted `#[allow(unused_mut)]`/`#[cfg_attr(...)]` only on the `h3_connector` binding so other accidental unused bindings are still caught.","locations":[{"ref":"src/async_impl/client.rs:420-422","code":"  420 |         #[allow(unused)]\n  421 |         #[cfg(feature = \"http3\")]\n  422 |         let mut h3_connector = None;","lines":3}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`Client`'s `fmt::Debug` impl contains three commented-out `.field(...)` lines referencing fields (`gzip`, `redirect_policy`, `referer`) that do not exist on the blocking `Client` (which only holds an opaque `ClientHandle`
