<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`http3_stream_receive_window`, `http3_conn_receive_window` and `http3_max_field_section_size` call `value.try_into().unwrap()` to build a `VarInt`/field-section value. The doc comments admit \"Panics if the value is over 2^62\", so a user-supplied `u64` larger than the QUIC VarInt max causes a panic inside a builder method that otherwise looks infallible. Builder setters should not panic on user input.","fix":"Convert the error into a stored builder error (set `self.config.error` on failure, like `user_agent` does) instead of unwrapping, or clamp/saturate the value to the VarInt maximum.","locations":[{"ref":"src/async_impl/client.rs:2353-2355","code":" 2353 |     pub fn http3_stream_receive_window(mut self, value: u64) -> ClientBuilder {\n 2354 |         self.config.quic_stream_receive_window = Some(value.try_into().unwrap());\n 2355 |         self","lines":3},{"ref":"src/async_impl/client.rs:2370-2372","code":" 2370 |     pub fn http3_conn_receive_window(mut self, value: u64) -> ClientBuilder {\n 2371 |         self.config.quic_receive_window = Some(value.try_into().unwrap());\n 2372 |         self","lines":3},{"ref":"src/async_impl/client.rs:2412-2414","code":" 2412 |     pub fn http3_max_field_section_size(mut self, value: u64) -> ClientBuilder {\n 2413 |         self.config.h3_max_field_section_size = Some(value.try_into().unwrap());\n 2414 |         self","lines":3}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`execute_request` uses `.expect(\"core thread panicked\")` on the result of `tx.send(...)`. The send can fail not only if the core thread panicked, but in principle whenever the receiver side has been dropped (runtime thread exited). On that path the blocking client panics rather than returning a recoverable `crate::Error`. Combined with `.expect(\"core thread exited early\")` on the `tx` Option just above, any abnormal shutdown of the runtime thread turns into a hard panic in user code calling `execute`/`send`.","fix":"Map send failure to a `crate::Error` (e.g. via `event_loop_panicked()` is already used elsewhere for the canceled oneshot; here a graceful error is preferable) so callers can handle a dead runtime thread instead of panicking.","locations":[{"ref":"src/blocking/client.rs:1489-1494","code":" 1489 |         self.inner\n 1490 |             .tx\n 1491 |             .as_ref()\n 1492 |             .expect(\"core thread exited early\")\n 1493 |             .send((req, tx))\n 1494 |             .expect(\"core thread panicked\");","lines":6}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`CookieService::call` parses the request URI with `Url::parse(...).expect(\"invalid URL\")`. An `http::Uri` is not guaranteed to be parseable by the `url` crate (relative URIs, asterisk-form, authority-form for CONNECT, etc.), so a malformed/unsupported URI panics the service future instead of surfacing an error.","fix":"Gracefully handle the parse error (skip cookie handling and forward the request, or propagate an error) rather than `expect`.","locations":[{"ref":"src/cookie.rs:240","code":"  240 |             let url = Url::parse(req.uri().to_string().as_str()).expect(\"invalid URL\");","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`TowerRedirectPolicy::redirect` parses the previous URL with `.expect(\"Previous URL must be valid\")`. The string comes from `attempt.previous().to_string()` where `previous()` is an `http::Uri`. A `Uri` that round-trips to a string url crate cannot parse (e.g. authority-only or otherwise non-URL URIs) will panic the redirect handling thread instead of producing a recoverable error, unlike `next_url` which is handled gracefully.","fix":"Handle the parse failure like `next_url`: return `Err(crate::error::builder(e))` instead of `.expect(...)`.","locations":[{"ref":"src/redirect.rs:307-314","code":"  307 |     fn redirect(&mut self, attempt: &TowerAttempt<'_>) -> Result<TowerAction, crate::Error> {\n  308 |         let previous_url =\n  309 |             Url::parse(&attempt.previous().to_string()).expect(\"Previous URL must be valid\");\n  310 | \n  311 |         let next_url = match Url::parse(&attempt.location().to_string()) {\n  312 |             Ok(url) => url,\n  313 |             Err(e) => return Err(crate::error::builder(e)),\n  314 |         };","lines":8}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In the WASM fetch path, the response URL is parsed with `Url::parse(&js_resp.url()).expect_throw(\"url parse\")`, and response header names/values are unwrapped with multiple `expect_throw`. `Response.url` can be the empty string for some response types (e.g. certain opaque/`error`/manually-constructed responses), and an empty string fails `Url::parse`, aborting the WASM module instead of returning a `reqwest::Error`.","fix":"Handle a missing/empty/unparseable response URL gracefully (fall back to the request URL or return `crate::error::request`) instead of `expect_throw`.","locations":[{"ref":"src/wasm/client.rs:283-301","code":"  283 |     let url = Url::parse(&js_resp.url()).expect_throw(\"url parse\");\n  284 | \n  285 |     let js_headers = js_resp.headers();\n  286 |     for item in js_headers.entries() {\n  287 |         let item = item.expect_throw(\"headers iterator doesn't throw\");\n  288 |         let item: js_sys::Array = item.dyn_into().expect_throw(\"header item is an array\");\n  289 | \n  290 |         let name = item\n  291 |             .get(0)\n  292 |             .as_string()\n  293 |             .expect_throw(\"header name is a string\");\n  294 | \n  295 |         let value = item\n  296 |             .get(1)\n  297 |             .as_string()\n  298 |             .expect_throw(\"header value is a string\");\n  299 | \n  300 |         resp = resp.header(&name, &value);\n  301 |     }","lines":19}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`InnerClientHandle::drop` calls `.expect(\"thread not dropped yet\")` on the `Option<JoinHandle>`. If `drop` were ever invoked after the handle was taken (or in a partially-constructed state) this panics inside a `Drop` impl, which can abort the process. The expectation is fragile: the only thing guaranteeing `thread` is `Some` is the surrounding construction logic, and a panic during `Drop` is hard to diagnose.","fix":"Compute the id with `if let Some(h) = self.thread.as_ref()` and skip logging if absent, avoiding any panic inside Drop.","locations":[{"ref":"src/blocking/client.rs:1392-1406","code":" 1392 | impl Drop for InnerClientHandle {\n 1393 |     fn drop(&mut self) {\n 1394 |         let id = self\n 1395 |             .thread\n 1396 |             .as_ref()\n 1397 |             .map(|h| h.thread().id())\n 1398 |             .expect(\"thread not dropped yet\");\n 1399 | \n 1400 |         trace!(\"closing runtime thread ({id:?})\");\n 1401 |         self.tx.take();\n 1402 |         trace!(\"signaled close for runtime thread ({id:?})\");\n 1403 |         self.thread.take().map(|h| h.join());\n 1404 |         trace!(\"closed runtime thread ({id:?})\");\n 1405 |     }\n 1406 | }","lines":15}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Cookie::max_age` uses `.expect(\"time::Duration into std::time::Duration\")`. `time::Duration` can be negative (a Max-Age of a negative number is permitted by the cookie crate parser), and `TryInto<std::time::Duration>` fails for negative durations, so a server-sent negative Max-Age would panic the caller.","fix":"Return `None` (or clamp to zero) when the conversion fails instead of panicking: `self.0.max_age().and_then(|d| d.try_into().ok())`.","locations":[{"ref":"src/cookie.rs:85-90","code":"   85 |     pub fn max_age(&self) -> Option<std::time::Duration> {\n   86 |         self.0.max_age().map(|d| {\n   87 |             d.try_into()\n   88 |                 .expect(\"time::Duration into std::time::Duration\")\n   89 |         })\n   90 |     }","lines":6}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`new_resolver` calls `TokioResolver::builder_tokio().unwrap_or_else(...)` which handles the builder-construction error, but the outer `builder.build()` result is returned as `Result`. However `ResolverConfig::udp_and_tcp(&GOOGLE)` and `builder_tokio()` are assumed infallible in the fallback closure. If `builder_with_config` itself ever changes to be fallible this silently breaks; currently fine. The more relevant nit: `.unwrap_or_else` swallows the original error into a debug log only, so a misconfigured system silently downgrades to Google DNS (see related finding).","fix":"No immediate panic risk; consider not swallowing the system-config error. Tracked with the silent-fallback finding.","locations":[{"ref":"src/dns/hickory.rs:56-68","code":"   56 | fn new_resolver() -> Result<TokioResolver, NetError> {\n   57 |     let mut builder = TokioResolver::builder_tokio().unwrap_or_else(|err| {\n   58 |         log::debug!(\n   59 |             \"hickory-dns: failed to load system DNS configuration; falling back to Google DNS: {:?}\",\n   60 |             err\n   61 |         );\n   62 |         TokioResolver::builder_with_config(\n   63 |             ResolverConfig::udp_and_tcp(&GOOGLE),\n   64 |             TokioRuntimeProvider::default(),\n   65 |         )\n   66 |     });\n   67 |     builder.options_mut().ip_strategy = LookupIpStrategy::Ipv4AndIpv6;\n   68 |     builder.build()","lines":13}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Custom::call constructs a proxy-target Url from the request Uri with `.parse().expect(\"should be valid Url\")`. The string is assembled from uri.scheme()/host()/port(). For an IPv6 destination, http::Uri::host() does include brackets, but for schemes/hosts that url::Url considers invalid (or unusual authority forms that are valid Uris but not valid Urls), this expect() will panic on a live request rather than returning a connection error. Turning a request-path error into a panic is a robustness hazard.","fix":"Replace the expect() with graceful handling: on parse failure return None (no proxy) instead of panicking, so a malformed/unsupported destination degrades to a direct connection or a normal error rather than crashing the task.","locations":[{"ref":"src/proxy.rs:779-788","code":"  779 |     fn call(&self, uri: &http::Uri) -> Option<matcher::Intercept> {\n  780 |         let url = format!(\n  781 |             \"{}://{}{}{}\",\n  782 |             uri.scheme()?,\n  783 |             uri.host()?,\n  784 |             uri.port().map_or(\"\", |_| \":\"),\n  785 |             uri.port().map_or(String::new(), |p| p.to_string())\n  786 |         )\n  787 |         .parse()\n  788 |         .expect(\"should be valid Url\");","lines":10}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The native-tls ALPN configuration block is gated on `not(feature = \"http3\")`. When both the `native-tls-alpn` and `http3` features are enabled, the entire ALPN-request block is compiled out, so the native-tls connector never calls `tls.request_alpns(...)`. As a result HTTP/2 (h2) can no longer be negotiated over native-tls connections in that feature combination, silently downgrading clients to HTTP/1.1 even when `HttpVersionPref::All`/`Http2` is requested. http3 should not suppress ALPN for the TCP/native-tls path.","fix":"Remove the `not(feature = \"http3\")` part of the cfg so ALPN is requested whenever `__native-tls-alpn` is enabled, regardless of http3. Keep the http/1.1 + h2 selection logic as-is.","locations":[{"ref":"src/async_impl/client.rs:527-545","code":"  527 |                     #[cfg(all(feature = \"__native-tls-alpn\", not(feature = \"http3\")))]\n  528 |                     {\n  529 |                         match config.http_version_pref {\n  530 |                             HttpVersionPref::Http1 => {\n  531 |                                 tls.request_alpns(&[\"http/1.1\"]);\n  532 |                             }\n  533 |                             #[cfg(feature = \"http2\")]\n  534 |                             HttpVersionPref::Http2 => {\n  535 |                                 tls.request_alpns(&[\"h2\"]);\n  536 |                             }\n  537 |                             HttpVersionPref::All => {\n  538 |                                 tls.request_alpns(&[\n  539 |                                     #[cfg(feature = \"http2\")]\n  540 |                                     \"h2\",\n  541 |                                     \"http/1.1\",\n  542 |                                 ]);\n  543 |                             }\n  544 |                         }\n  545 |                     }","lines":19}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `connect_socks`, the rustls HTTPS-over-socks branch hardcodes `tls_info: false` (line 587), while the native-tls branch correctly uses `self.tls_info` (line 561). Users requesting TLS info on rustls + SOCKS connections never receive it. Inconsistent behavior between the two TLS backends for the same feature.","fix":"Use `tls_info: self.tls_info` in the rustls socks branch to match the native-tls branch.","locations":[{"ref":"src/connect.rs:583-588","code":"  583 |                     return Ok(Conn {\n  584 |                         inner: self.verbose.wrap(RustlsTlsConn { inner: io }),\n  585 |                         is_proxy: false,\n  586 |                         tls_info: false,\n  587 |                     });\n  588 |                 }","lines":6},{"ref":"src/connect.rs:558-562","code":"  558 |                     return Ok(Conn {\n  559 |                         inner: self.verbose.wrap(NativeTlsConn { inner: io }),\n  560 |                         is_proxy: false,\n  561 |                         tls_info: self.tls_info,\n  562 |                     });","lines":5}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"When tunneling HTTPS through an HTTP CONNECT proxy, the resulting TLS connection is always created with `tls_info: false`, regardless of the client's `tls_info` setting. The direct (non-proxy) path correctly uses `self.tls_info` (line 653 for native-tls, 685 for rustls). This means `Response::extensions().get::<TlsInfo>()` silently returns nothing for any request routed through a proxy, even though the user enabled `tls_info(true)`. The native-tls and rustls proxy-tunnel branches are both affected.","fix":"Set `tls_info: self.tls_info` instead of `tls_info: false` in the proxy-tunneled `Conn` constructions, matching the direct connect path.","locations":[{"ref":"src/connect.rs:831-837","code":"  831 |                     return Ok(Conn {\n  832 |                         inner: self.verbose.wrap(NativeTlsConn {\n  833 |                             inner: TokioIo::new(io),\n  834 |                         }),\n  835 |                         is_proxy: false,\n  836 |                         tls_info: false,\n  837 |                     });","lines":7},{"ref":"src/connect.rs:878-884","code":"  878 |                     return Ok(Conn {\n  879 |                         inner: self.verbose.wrap(RustlsTlsConn {\n  880 |                             inner: TokioIo::new(io),\n  881 |                         }),\n  882 |                         is_proxy: false,\n  883 |                         tls_info: false,\n  884 |                     });","lines":7}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`Certificate::from_pem` (and `from_der`) when only the rustls feature is enabled stores the raw bytes (`Cert::Pem`/`Cert::Der`) WITHOUT validating them. Validation is deferred to `add_to_rustls`/`rustls_der`. But `from_pem` is documented and tested (native-tls path) to fail on invalid input; with only rustls enabled, `Certificate::from_pem(b\"not pem\")` succeeds and the error only surfaces much later when building the client. This is an inconsistent validation contract between backends and defers errors away from the call the user expects to fail.","fix":"Validate/parse the PEM/DER eagerly in `from_pem`/`from_der` for the rustls path (e.g. run `read_pem_certs` / DER parse) so invalid input is rejected at construction time, matching native-tls behavior.","locations":[{"ref":"src/tls.rs:166-198","code":"  166 |     pub fn from_der(der: &[u8]) -> crate::Result<Certificate> {\n  167 |         Ok(Certificate {\n  168 |             #[cfg(feature = \"__native-tls\")]\n  169 |             native: native_tls_crate::Certificate::from_der(der).map_err(crate::error::builder)?,\n  170 |             #[cfg(feature = \"__rustls\")]\n  171 |             original: Cert::Der(der.to_owned()),\n  172 |         })\n  173 |     }\n  174 | \n  175 |     /// Create a `Certificate` from a PEM encoded certificate\n  176 |     ///\n  177 |     /// # Examples\n  178 |     ///\n  179 |     /// ```\n  180 |     /// # use std::fs::File;\n  181 |     /// # use std::io::Read;\n  182 |     /// # fn cert() -> Result<(), Box<dyn std::error::Error>> {\n  183 |     /// let mut buf = Vec::new();\n  184 |     /// File::open(\"my_cert.pem\")?\n  185 |     ///     .read_to_end(&mut buf)?;\n  186 |     /// let cert = reqwest::Certificate::from_pem(&buf)?;\n  187 |     /// # drop(cert);\n  188 |     /// # Ok(())\n  189 |     /// # }\n  190 |     /// ```\n  191 |     pub fn from_pem(pem: &[u8]) -> crate::Result<Certificate> {\n  192 |         Ok(Certificate {\n  193 |             #[cfg(feature = \"__native-tls\")]\n  194 |             native: native_tls_crate::Certificate::from_pem(pem).map_err(crate::error::builder)?,\n  195 |             #[cfg(feature = \"__rustls\")]\n  196 |             original: Cert::Pem(pem.to_owned()),\n  197 |         })\n  198 |     }","lines":33},{"ref":"src/tls.rs:238-260","code":"  238 |     #[cfg(feature = \"__rustls\")]\n  239 |     pub(crate) fn add_to_rustls(\n  240 |         self,\n  241 |         root_cert_store: &mut rustls::RootCertStore,\n  242 |     ) -> crate::Result<()> {\n  243 |         use std::io::Cursor;\n  244 | \n  245 |         match self.original {\n  246 |             Cert::Der(buf) => root_cert_store\n  247 |                 .add(buf.into())\n  248 |                 .map_err(crate::error::builder)?,\n  249 |             Cert::Pem(buf) => {\n  250 |                 let mut reader = Cursor::new(buf);\n  251 |                 let certs = Self::read_pem_certs(&mut reader)?;\n  252 |                 for c in certs {\n  253 |                     root_cert_store\n  254 |                         .add(c.into())\n  255 |                         .map_err(crate::error::builder)?;\n  256 |                 }\n  257 |             }\n  258 |         }\n  259 |         Ok(())\n  260 |     }","lines":23}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"When `HttpVersionPref::Http3` is selected with the rustls backend and `build_h3_connector` returns `Ok(None)` (e.g. transport setup that is not a hard error), `h3_connector` stays `None`, so `h3_client` is `None`. Then `execute_request` falls into the `_ =>` arm and dispatches over the regular hyper (TCP) service with `version = HTTP_3`. hyper/h2 cannot speak HTTP/3 over TCP, so the request will fail or misbehave rather than producing a clear \"HTTP/3 unavailable\" error, despite the user explicitly requesting http3_prior_knowledge.","fix":"When `http_version_pref == Http3` but no `h3_client` is available at build/execute time, return a definitive builder/request error instead of silently falling back to the TCP hyper service.","locations":[{"ref":"src/async_impl/client.rs:509-518","code":"  509 |                     match res {\n  510 |                         Ok(connector) => Ok(Some(connector)),\n  511 |                         Err(err) => {\n  512 |                             if let HttpVersionPref::Http3 = http_version_pref {\n  513 |                                 Err(error::builder(err))\n  514 |                             } else {\n  515 |                                 Ok(None)\n  516 |                             }\n  517 |                         }\n  518 |                     }","lines":10},{"ref":"src/async_impl/client.rs:2637-2651","code":" 2637 |         let in_flight = match version {\n 2638 |             #[cfg(feature = \"http3\")]\n 2639 |             http::Version::HTTP_3 if self.inner.h3_client.is_some() => {\n 2640 |                 let mut req = builder.body(body).expect(\"valid request parts\");\n 2641 |                 *req.headers_mut() = headers.clone();\n 2642 |                 let mut h3 = self.inner.h3_client.as_ref().unwrap().clone();\n 2643 |                 ResponseFuture::H3(h3.call(req))\n 2644 |             }\n 2645 |             _ => {\n 2646 |                 let mut req = builder.body(body).expect(\"valid request parts\");\n 2647 |                 *req.headers_mut() = headers.clone();\n 2648 |                 let mut hyper = self.inner.hyper.clone();\n 2649 |                 ResponseFuture::Default(hyper.call(req))\n 2650 |             }\n 2651 |         };","lines":15}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`H3Connector::connect` strips brackets from IPv6 literal hosts with `trim_start_matches('[')`/`trim_end_matches(']')` and then uses that as both the `IpAddr::from_str` input and the `server_name` passed to `endpoint.connect`. For an IPv6 literal URL, the bracket-stripped address is then used as the QUIC server_name (SNI), but an IP address is not a valid SNI/DNS name and rustls may reject it or send it as a literal. The non-h3 path uses ServerName::try_from which handles IP literals; here the raw stripped string is passed directly.","fix":"When the host is an IP literal, pass an IP-based ServerName to `endpoint.connect` (or the configured SNI override) rather than the raw stripped string; ensure quinn/rustls receives a valid ServerName.","locations":[{"ref":"src/async_impl/h3_client/connect.rs:98-118","code":"   98 |     pub async fn connect(&mut self, dest: Uri) -> Result<H3Connection, BoxError> {\n   99 |         let host = dest\n  100 |             .host()\n  101 |             .ok_or(\"destination must have a host\")?\n  102 |             .trim_start_matches('[')\n  103 |             .trim_end_matches(']');\n  104 |         let port = dest.port_u16().unwrap_or(443);\n  105 | \n  106 |         let addrs = if let Some(addr) = IpAddr::from_str(host).ok() {\n  107 |             // If the host is already an IP address, skip resolving.\n  108 |             vec![SocketAddr::new(addr, port)]\n  109 |         } else {\n  110 |             let addrs = resolve(&mut self.resolver, Name::from_str(host)?).await?;\n  111 |             let addrs = addrs.map(|mut addr| {\n  112 |                 addr.set_port(port);\n  113 |                 addr\n  114 |             });\n  115 |             addrs.collect()\n  116 |         };\n  117 | \n  118 |         self.remote_connect(addrs, host).await","lines":21},{"ref":"src/async_impl/h3_client/connect.rs:198-199","code":"  198 |         for addr in addrs {\n  199 |             match endpoint.connect(*addr, server_name) {","lines":2}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Happy-eyeballs for HTTP/3: once the IPv6 attempt is polled past the initial `select!` and the IPv4 attempt also starts, if IPv4 fails first (`wait_for_ipv6 = true`) the code awaits `ipv6_connect` to completion, but if IPv6 then also fails it returns the IPv6 error and never retries/falls back — IPv4 is abandoned even if more IPv4 addresses might have succeeded had they been retried. Conversely if IPv6 fails first the remaining IPv4 future is awaited, which is fine, but the asymmetry means a transient IPv6 failure after IPv4 failure yields a worse error and no further attempts. More importantly, the `try_addresses_static` per-family loop already iterates all addrs, so this is bounded, but the final returned error can be the less informative one.","fix":"After both families are in flight, await whichever is still pending and, on its failure, surface the combined/last error; consider returning the IPv4 error when IPv6 was the one that failed last, or aggregate both errors.","locations":[{"ref":"src/async_impl/h3_client/connect.rs:255-274","code":"  255 |         let wait_for_ipv6 = tokio::select! {\n  256 |             result = &mut ipv6_connect => {\n  257 |                 match result {\n  258 |                     Ok(conn) => return Ok(conn),\n  259 |                     Err(_) => false,\n  260 |                 }\n  261 |             }\n  262 |             result = &mut ipv4_connect => {\n  263 |                 match result {\n  264 |                     Ok(conn) => return Ok(conn),\n  265 |                     Err(_) => true,\n  266 |                 }\n  267 |             }\n  268 |         };\n  269 | \n  270 |         if wait_for_ipv6 {\n  271 |             ipv6_connect.await\n  272 |         } else {\n  273 |             ipv4_connect.await\n  274 |         }","lines":20}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`new_connection` spawns a task polling `driver.poll_close` and sends the result over a `std::sync::mpsc` channel read by `PoolConnection::is_invalid` via `try_recv`. If the driver task is still running (connection alive), `try_recv` returns Empty -> valid. But once the driver task ends and sends, the connection is marked invalid only on the NEXT `try_pool` call; meanwhile `pool()` may have already handed out a clone of the `PoolClient` whose underlying connection is dead. There is a TOCTOU window: a client cloned out of the pool just before the close error arrives will fail at request time. This is somewhat inherent, but `is_invalid` consuming the single mpsc message means after the first `try_recv` returns Ok, subsequent calls return Disconnected (also invalid) - fine - but the connection is not proactively removed until queried.","fix":"Document the inherent race, and/or have the driver task proactively remove the entry from `idle_conns` on close rather than relying on lazy detection in `try_pool`.","locations":[{"ref":"src/async_impl/h3_client/pool.rs:141-178","code":"  141 |     pub fn new_connection(\n  142 |         &mut self,\n  143 |         lock: ConnectingLock,\n  144 |         mut driver: h3::client::Connection<Connection, Bytes>,\n  145 |         tx: SendRequest<OpenStreams, Bytes>,\n  146 |     ) -> PoolClient {\n  147 |         let (close_tx, close_rx) = std::sync::mpsc::channel();\n  148 |         tokio::spawn(async move {\n  149 |             let e = future::poll_fn(|cx| driver.poll_close(cx)).await;\n  150 |             trace!(\"poll_close returned error {e:?}\");\n  151 |             close_tx.send(e).ok();\n  152 |         });\n  153 | \n  154 |         let mut inner = self.inner.lock().unwrap();\n  155 | \n  156 |         // We clean up \"connecting\" here so we don't have to acquire the lock again.\n  157 |         let key = lock.forget();\n  158 |         let Some(notifier) = inner.connecting.remove(&key) else {\n  159 |             unreachable!(\"there should be one connecting lock at a time\");\n  160 |         };\n  161 |         let client = PoolClient::new(tx);\n  162 | \n  163 |         // Send the client to all our awaiters\n  164 |         let pool_client = if let Err(watch::error::SendError(Some(unsent_client))) =\n  165 |             notifier.send(Some(client.clone()))\n  166 |         {\n  167 |             // If there are no awaiters, the client is returned to us. As a\n  168 |             // micro optimisation, let's reuse it and avoid cloning.\n  169 |             unsent_client\n  170 |         } else {\n  171 |             client.clone()\n  172 |         };\n  173 | \n  174 |         let conn = PoolConnection::new(pool_client, close_rx);\n  175 |         inner.insert(key, conn);\n  176 | \n  177 |         client\n  178 |     }","lines":38},{"ref":"src/async_impl/h3_client/pool.rs:299-305","code":"  299 |     pub fn is_invalid(&self) -> bool {\n  300 |         match self.close_rx.try_recv() {\n  301 |             Err(TryRecvError::Empty) => false,\n  302 |             Err(TryRecvError::Disconnected) => true,\n  303 |             Ok(_) => true,\n  304 |         }\n  305 |     }","lines":7}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Body::send_future` only stops reading when the running byte count exactly equals the declared content-length (`Some(written) == con_len`). If a sized `Body` (created via `Body::sized`/file with a stale length) yields MORE bytes than `con_len`, the extra bytes are still read into the buffer and sent in the same iteration before the equality check, so the request body can exceed the advertised `Content-Length`. Conversely, if the reader yields FEWER bytes than `con_len` and hits EOF (`Ok(0)`), the function returns `Ok(())` having sent a body shorter than the advertised `Content-Length`, which produces a malformed/truncated request rather than an error.","fix":"Track remaining bytes and (a) cap each read to the remaining count so the body never exceeds `con_len`, and (b) treat premature EOF (written < con_len at Ok(0)) as an error instead of a silent short body.","locations":[{"ref":"src/blocking/body.rs:288-352","code":"  288 |     loop {\n  289 |         if Some(written) == con_len {\n  290 |             // Written up to content-length, so stop.\n  291 |             return Ok(());\n  292 |         }\n  293 | \n  294 |         // The input stream is read only if the buffer is empty so\n  295 |         // that there is only one read in the buffer at any time.\n  296 |         //\n  297 |         // We need to know whether there is any data to send before\n  298 |         // we check the transmission channel (with poll_ready below)\n  299 |         // because sometimes the receiver disappears as soon as it\n  300 |         // considers the data is completely transmitted, which may\n  301 |         // be true.\n  302 |         //\n  303 |         // The use case is a web server that closes its\n  304 |         // input stream as soon as the data received is valid JSON.\n  305 |         // This behaviour is questionable, but it exists and the\n  306 |         // fact is that there is actually no remaining data to read.\n  307 |         if buf.is_empty() {\n  308 |             if buf.capacity() == buf.len() {\n  309 |                 buf.reserve(8192);\n  310 |                 // zero out the reserved memory\n  311 |                 let uninit = buf.spare_capacity_mut();\n  312 |                 let uninit_len = uninit.len();\n  313 |                 unsafe {\n  314 |                     ptr::write_bytes(uninit.as_mut_ptr().cast::<u8>(), 0, uninit_len);\n  315 |                 }\n  316 |             }\n  317 | \n  318 |             let bytes = unsafe {\n  319 |                 mem::transmute::<&mut [MaybeUninit<u8>], &mut [u8]>(buf.spare_capacity_mut())\n  320 |             };\n  321 |             match body.read(bytes) {\n  322 |                 Ok(0) => {\n  323 |                     // The buffer was empty and nothing's left to\n  324 |                     // read. Return.\n  325 |                     return Ok(());\n  326 ) fn into_async(self) -> (async_impl::Request, Option<body::Sender>) {\n  141 |         use crate::header::CONTENT_LENGTH;\n  142 | \n  143 |         let mut req_async = self.inner;\n  144 |         let body = self.body.and_then(|body| {\n  145 |             let (tx, body, len) = body.into_async();\n  146 |             if let Some(len) = len {\n  147 |                 req_async.headers_mut().insert(CONTENT_LENGTH, len.into());\n  148 |             }\n  149 |             *req_async.body_mut() = Some(body);\n  150 |             tx\n  151 |         });\n  152 |         (req_async, body)\n  153 |     }","lines":14}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"HickoryDnsResolver caches the resolver in an `Arc<OnceCell<TokioResolver>>` via `get_or_try_init(new_resolver)`. If the very first resolution attempt's `new_resolver()` succeeds but transient (e.g., system config momentarily readable), the resolver config is frozen for the process lifetime. More concretely: `new_resolver` returns `Err` only from `builder.build()`; on that error the OnceCell stays empty and every subsequent `resolve` call retries `new_resolver`, but each retry re-runs `builder_tokio()` which on failure logs and silently falls back to GOOGLE DNS — so a temporary failure to read /etc/resolv.conf permanently (until a successful build) routes lookups to Google DNS without the caller's knowledge. This is a surprising privacy/behavior change hidden behind a debug log.","fix":"Surface the resolv.conf read failure more prominently (warn-level) and/or make the Google DNS fallback opt-in; document that lookups may silently go to a public resolver.","locations":[{"ref":"src/dns/hickory.rs:28-69","code":"   28 | impl Resolve for HickoryDnsResolver {\n   29 |     fn resolve(&self, name: Name) -> Resolving {\n   30 |         let resolver = self.clone();\n   31 |         Box::pin(async move {\n   32 |             let resolver = resolver.state.get_or_try_init(new_resolver)?;\n   33 | \n   34 |             let lookup = resolver.lookup_ip(name.as_str()).await?;\n   35 |             let addrs: Addrs = Box::new(SocketAddrs {\n   36 |                 iter: lookup.iter().collect::<Vec<_>>().into_iter(),\n   37 |             });\n   38 |             Ok(addrs)\n   39 |         })\n   40 |     }\n   41 | }\n   42 | \n   43 | impl Iterator for SocketAddrs {\n   44 |     type Item = SocketAddr;\n   45 | \n   46 |     fn next(&mut self) -> Option<Self::Item> {\n   47 |         self.iter.next().map(|ip_addr| SocketAddr::new(ip_addr, 0))\n   48 |     }\n   49 | }\n   50 | \n   51 | /// Create a new resolver with the default configuration,\n   52 | /// which reads from `/etc/resolve.conf`. If reading `/etc/resolv.conf` fails,\n   53 | /// it fallbacks to hickory_resolver's default config.\n   54 | /// The options are overridden to look up for both IPv4 and IPv6 addresses\n   55 | /// to work with \"happy eyeballs\" algorithm.\n   56 | fn new_resolver() -> Result<TokioResolver, NetError> {\n   57 |     let mut builder = TokioResolver::builder_tokio().unwrap_or_else(|err| {\n   58 |         log::debug!(\n   59 |             \"hickory-dns: failed to load system DNS configuration; falling back to Google DNS: {:?}\",\n   60 |             err\n   61 |         );\n   62 |         TokioResolver::builder_with_config(\n   63 |             ResolverConfig::udp_and_tcp(&GOOGLE),\n   64 |             TokioRuntimeProvider::default(),\n   65 |         )\n   66 |     });\n   67 |     builder.options_mut().ip_strategy = LookupIpStrategy::Ipv4AndIpv6;\n   68 |     builder.build()\n   69 | }","lines":42}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`DynResolver::http_resolve` overrides the resolved port whenever `explicit_port` is true OR the resolved address port is 0. But when the resolver returns a real non-zero port (e.g. a custom `Resolve` impl or GAI returning the port it was asked for) and the URL has no explicit port, the resolved port is kept rather than the scheme default. Since GAI's resolve is called with `host.parse()` (host only, no port), the returned port is whatever GAI assigns; for hyper's GaiResolver the Name carries no port so this is effectively 0, but for a user custom resolver returning a meaningful port, the scheme-default substitution silently won't apply. Edge-case behavior that depends on resolver internals.","fix":"Clarify and document the precedence: explicit URL port > resolver-provided non-zero port > scheme default; ensure the condition matches the documented contract on the `Resolve` trait.","locations":[{"ref":"src/dns/resolve.rs:85-108","code":"   85 |     pub(crate) async fn http_resolve(\n   86 |         &self,\n   87 |         target: &http::Uri,\n   88 |     ) -> Result<impl Iterator<Item = std::net::SocketAddr>, BoxError> {\n   89 |         let host = target.host().ok_or(\"missing host\")?;\n   90 |         let port = target\n   91 |             .port_u16()\n   92 |             .unwrap_or_else(|| match target.scheme_str() {\n   93 |                 Some(\"https\") => 443,\n   94 |                 Some(\"socks4\") | Some(\"socks4a\") | Some(\"socks5\") | Some(\"socks5h\") => 1080,\n   95 |                 _ => 80,\n   96 |             });\n   97 | \n   98 |         let explicit_port = target.port().is_some();\n   99 | \n  100 |         let addrs = self.resolver.resolve(host.parse()?).await?;\n  101 | \n  102 |         Ok(addrs.map(move |mut addr| {\n  103 |             if explicit_port || addr.port() == 0 {\n  104 |                 addr.set_port(port);\n  105 |             }\n  106 |             addr\n  107 |         }))\n  108 |     }","lines":24}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"On the final retry decision the policy withdraws a token from the retry budget even though the request will not actually be retried. Tower calls `retry()` (which increments `retry_cnt` and calls `budget.withdraw()`), then transitions to `Retrying` and calls `clone_request()`. When `retry_cnt >= max_retries_per_request`, `clone_request` returns `None`, so the future returns the last result without issuing another request. The budget token consumed by the matching `retry()` call is wasted, making the budget drain faster than the actual extra load it permits, defeating the purpose of the budget accounting.","fix":"Decide retryability and budget withdrawal together with the per-request cap. Check `retry_cnt >= max_retries_per_request` (and scope) inside `retry()` before withdrawing from the budget, returning `None` early so no token is consumed when the request cannot be cloned/retried.","locations":[{"ref":"src/retry.rs:240-249","code":"  240 |             classify::Action::Retryable => {\n  241 |                 log::trace!(\"could retry!\");\n  242 |                 if self.budget.as_ref().map(|b| b.withdraw()).unwrap_or(true) {\n  243 |                     self.retry_cnt += 1;\n  244 |                     Some(std::future::ready(()))\n  245 |                 } else {\n  246 |                     log::debug!(\"retryable but could not withdraw from budget\");\n  247 |                     None\n  248 |                 }\n  249 |             }","lines":10},{"ref":"src/retry.rs:253-270","code":"  253 |     fn clone_request(&mut self, req: &Req) -> Option<Req> {\n  254 |         if self.retry_cnt > 0 && !self.scope.applies_to(req) {\n  255 |             return None;\n  256 |         }\n  257 |         if self.retry_cnt >= self.max_retries_per_request {\n  258 |             log::trace!(\"max_retries_per_request hit\");\n  259 |             return None;\n  260 |         }\n  261 |         let body = req.body().try_clone()?;\n  262 |         let mut new = http::Request::new(body);\n  263 |         *new.method_mut() = req.method().clone();\n  264 |         *new.uri_mut() = req.uri().clone();\n  265 | nector to add it. This cross-module coupling is undocumented and fragile.","fix":"Add a comment cross-referencing where CONNECT-tunnel proxy auth is injected for non-http schemes so a future change here cannot silently drop proxy credentials.","locations":[{"ref":"src/async_impl/client.rs:2691-2693","code":" 2691 |         if dst.scheme() != Some(&Scheme::HTTP) {\n 2692 |             return;\n 2693 |         }","lines":3},{"ref":"src/async_impl/client.rs:2712-2714","code":" 2712 |         if dst.scheme() != Some(&Scheme::HTTP) {\n 2713 |             return;\n 2714 |         }","lines":3}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`H3Connector::remote_connect` clears the opposite address family when a local bind address is set (lines 133-139), so a v6 local bind drops all v4 targets. Then later at lines 163-178 it again branches on `self.local_addr.is_some()` and does a sequential v6-then-v4 fallback - but by that point one of the families has already been cleared and one of the earlier `is_empty()` returns (141-158) would already have fired. The lines 163-178 block is effectively dead: if local_addr is Some, one family was cleared, so either ipv6_addrs or ipv4_addrs is empty and the function returned at 141 or 150 before reaching 163.","fix":"Remove the unreachable `if self.local_addr.is_some()` sequential-fallback block at 163-178 (dead code given the family-clearing at 133-139), or rework the local_addr handling so the fallback is actually reachable.","locations":[{"ref":"src/async_impl/h3_client/connect.rs:133-178","code":"  133 |         if let Some(local_ip) = self.local_addr {\n  134 |             if local_ip.is_ipv6() {\n  135 |                 ipv4_addrs.clear();\n  136 |             } else {\n  137 |                 ipv6_addrs.clear();\n  138 |             }\n  139 |         }\n  140 | \n  141 |         if ipv6_addrs.is_empty() {\n  142 |             return Self::try_addresses_static(\n  1
