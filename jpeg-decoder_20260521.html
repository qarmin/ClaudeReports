<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"In `Decoder::select_worker`, the `height` variable is initialized from `frame.output_size.width` instead of `frame.output_size.height`. This is a clear copy-paste bug: both `width` and `height` are computed from `width.into()`. The parallelism heuristic therefore compares `width * width` against the threshold rather than `width * height`, so tall narrow images (e.g. 100x10000) will be considered 'small' and dispatched to the immediate (single-threaded) worker, while very wide short images may be considered 'big' and dispatched to the multithreaded worker unnecessarily. The bug silently degrades performance on a common image shape.","fix":"Change `let height: u64 = frame.output_size.width.into();` to `let height: u64 = frame.output_size.height.into();` on line 252.","locations":[{"ref":"src/decoder.rs:248-260","code":"  248 |         match worker_preference {\n  249 |             PreferWorkerKind::Immediate => PreferWorkerKind::Immediate,\n  250 |             PreferWorkerKind::Multithreaded => {\n  251 |                 let width: u64 = frame.output_size.width.into();\n  252 |                 let height: u64 = frame.output_size.width.into();\n  253 |                 if width * height > PARALLELISM_THRESHOLD {\n  254 |                     PreferWorkerKind::Multithreaded\n  255 |                 } else {\n  256 |                     PreferWorkerKind::Immediate\n  257 |                 }\n  258 |             }\n  259 |         }\n  260 |     }"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`Decoder::icc_profile` rejects ICC profiles consisting of exactly 255 markers, even though 255 is a valid maximum (`num_markers` and `seq_no` are `u8`). The guard reads `num_markers == 0 || num_markers >= 255`, but should be `> 255`. The `marker_present` table is sized 256 and the later access `marker_present.get(1..=num_markers)` is in-bounds for `num_markers == 255`. The current code drops valid ICC profiles split into 255 chunks.","fix":"Change line 214 from `num_markers == 0 || num_markers >= 255` to `num_markers == 0 || num_markers > 255` so that the boundary case (a profile with exactly 255 chunks) is accepted.","locations":[{"ref":"src/decoder.rs:211-241","code":"  211 |     pub fn icc_profile(&self) -> Option<Vec<u8>> {\n  212 |         let mut marker_present: [Option<&IccChunk>; 256] = [None; 256];\n  213 |         let num_markers = self.icc_markers.len();\n  214 |         if num_markers == 0 || num_markers >= 255 {\n  215 |             return None;\n  216 |         }\n  217 |         // check the validity of the markers\n  218 |         for chunk in &self.icc_markers {\n  219 |             if usize::from(chunk.num_markers) != num_markers {\n  220 |                 // all the lengths must match\n  221 |                 return None;\n  222 |             }\n  223 |             if chunk.seq_no == 0 {\n  224 |                 return None;\n  225 |             }\n  226 |             if marker_present[usize::from(chunk.seq_no)].is_some() {\n  227 |                 // duplicate seq_no\n  228 |                 return None;\n  229 |             } else {\n  230 |                 marker_present[usize::from(chunk.seq_no)] = Some(chunk);\n  231 |             }\n  232 |         }\n  233 | \n  234 |         // assemble them together by seq_no failing if any are missing\n  235 |         let mut data = Vec::new();\n  236 |         // seq_no's start at 1\n  237 |         for &chunk in marker_present.get(1..=num_markers)? {\n  238 |             data.extend_from_slice(&chunk?.data);\n  239 |         }\n  240 |         Some(data)\n  241 |     }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`compute_image_lossless` outputs a 16-bit-per-channel buffer (`convert_to_u8` returns `to_ne_bytes`) when `frame.precision > 8`, but `Decoder::info().pixel_format` always reports `PixelFormat::RGB24` for 3-component images and `PixelFormat::CMYK32` for 4-component images regardless of precision. Consumers using `pixel_format.pixel_bytes()` to walk the pixel buffer will read every other byte and produce a broken image for lossless JPEGs with precision > 8 and more than one component.","fix":"Extend `PixelFormat` to cover 16-bit multi-channel cases (e.g. `RGB48`, `CMYK64`), or restrict multi-component lossless decoding to 8-bit precision by returning `Error::Unsupported(UnsupportedFeature::SamplePrecision(_))`. Make sure `info()` and the data layout agree.","locations":[{"ref":"src/decoder.rs:171-194","code":"  171 |     pub fn info(&self) -> Option<ImageInfo> {\n  172 |         match self.frame {\n  173 |             Some(ref frame) => {\n  174 |                 let pixel_format = match frame.components.len() {\n  175 |                     1 => match frame.precision {\n  176 |                         2..=8 => PixelFormat::L8,\n  177 |                         9..=16 => PixelFormat::L16,\n  178 |                         _ => panic!(),\n  179 |                     },\n  180 |                     3 => PixelFormat::RGB24,\n  181 |                     4 => PixelFormat::CMYK32,\n  182 |                     _ => panic!(),\n  183 |                 };\n  184 | \n  185 |                 Some(ImageInfo {\n  186 |                     width: frame.output_size.width,\n  187 |                     height: frame.output_size.height,\n  188 |                     pixel_format,\n  189 |                     coding_process: frame.coding_process,\n  190 |                 })\n  191 |             }\n  192 |             None => None,\n  193 |         }\n  194 |     }"},{"ref":"src/decoder/lossless.rs:228-260","code":"  228 | pub fn compute_image_lossless(frame: &FrameInfo, mut data: Vec<Vec<u16>>) -> Result<Vec<u8>> {\n  229 |     if data.is_empty() || data.iter().any(Vec::is_empty) {\n  230 |         return Err(Error::Format(\"not all components have data\".to_owned()));\n  231 |     }\n  232 |     let output_size = frame.output_size;\n  233 |     let components = &frame.components;\n  234 |     let ncomp = components.len();\n  235 | \n  236 |     if ncomp == 1 {\n  237 |         let decoded = convert_to_u8(frame, data.remove(0));\n  238 |         Ok(decoded)\n  239 |     } else {\n  240 |         let mut decoded: Vec<u16> =\n  241 |             vec![0u16; ncomp * output_size.width as usize * output_size.height as usize];\n  242 |         for (x, chunk) in decoded.chunks_mut(ncomp).enumerate() {\n  243 |             for (i, (component_data, _)) in data.iter().zip(components.iter()).enumerate() {\n  244 |                 chunk[i] = component_data[x];\n  245 |             }\n  246 |         }\n  247 |         let decoded = convert_to_u8(frame, decoded);\n  248 |         Ok(decoded)\n  249 |     }\n  250 | }\n  251 | \n  252 | fn convert_to_u8(frame: &FrameInfo, data: Vec<u16>) -> Vec<u8> {\n  253 |     if frame.precision == 8 {\n  254 |         data.iter().map(|x| *x as u8).collect()\n  255 |     } else {\n  256 |         // we output native endian, which is the standard for image-rs\n  257 |         let ne_bytes: Vec<_> = data.iter().map(|x| x.to_ne_bytes()).collect();\n  258 |         ne_bytes.concat()\n  259 |     }\n  260 | }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`compute_image_lossless` indexes each `component_data` by the linear pixel index `x` derived from `output_size`, but `component_data` is sized to `image_size.width * image_size.height` (see `decode_scan_lossless` line 17-19). If the caller invokes `Decoder::scale()` on a lossless JPEG, `output_size` is replaced with a downscaled dimension while `image_size` is kept, so the loop reads only the first `output_size.width * output_size.height` raw pixels and produces a nonsense image (it does not actually downscale the lossless data). The result is logically wrong even though it does not OOB.","fix":"Either reject `Decoder::scale()` for lossless coding processes (return an error early), or implement a real downsampling path. Until then, document `update_idct_size`/`scale` as DCT-only and bail out in lossless mode.","locations":[{"ref":"src/decoder/lossless.rs:228-250","code":"  228 | pub fn compute_image_lossless(frame: &FrameInfo, mut data: Vec<Vec<u16>>) -> Result<Vec<u8>> {\n  229 |     if data.is_empty() || data.iter().any(Vec::is_empty) {\n  230 |         return Err(Error::Format(\"not all components have data\".to_owned()));\n  231 |     }\n  232 |     let output_size = frame.output_size;\n  233 |     let components = &frame.components;\n  234 |     let ncomp = components.len();\n  235 | \n  236 |     if ncomp == 1 {\n  237 |         let decoded = convert_to_u8(frame, data.remove(0));\n  238 |         Ok(decoded)\n  239 |     } else {\n  240 |         let mut decoded: Vec<u16> =\n  241 |             vec![0u16; ncomp * output_size.width as usize * output_size.height as usize];\n  242 |         for (x, chunk) in decoded.chunks_mut(ncomp).enumerate() {\n  243 |             for (i, (component_data, _)) in data.iter().zip(components.iter()).enumerate() {\n  244 |                 chunk[i] = component_data[x];\n  245 |             }\n  246 |         }\n  247 |         let decoded = convert_to_u8(frame, decoded);\n  248 |         Ok(decoded)\n  249 |     }\n  250 | }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","description":"On every RST in `decode_scan` (line 933) the DC predictor state is reset for ALL `MAX_COMPONENTS` indices, not only the components that are part of the current scan. The Annex F.2.1.3.1 spec says predictors are reset 'for each component participating in the scan'. In progressive streams a non-participating component's DC predictor is therefore wiped between scans even though it should retain its state. This is currently harmless because the predictor is re-seeded the next time that component is processed at the start of its own scan, but the code violates the spec and would become incorrect under any future refactor that interleaves predictor state across scans.","fix":"Reset only the participating components: `for &i in &scan.component_indices { dc_predictors[i] = 0; }` instead of `dc_predictors = [0i16; MAX_COMPONENTS];` on line 933.","locations":[{"ref":"src/decoder.rs:920-956","code":"  920 |                 if self.restart_interval > 0 {\n  921 |                     if mcus_left_until_restart == 0 {\n  922 |                         match huffman.take_marker(&mut self.reader)? {\n  923 |                             Some(Marker::RST(n)) => {\n  924 |                                 if n != expected_rst_num {\n  925 |                                     return Err(Error::Format(format!(\n  926 |                                         \"found RST{} where RST{} was expected\",\n  927 |                                         n, expected_rst_num\n  928 |                                     )));\n  929 |                                 }\n  930 | \n  931 |                                 huffman.reset();\n  932 |                                 // Section F.2.1.3.1\n  933 |                                 dc_predictors = [0i16; MAX_COMPONENTS];\n  934 |                                 // Section G.1.2.2\n  935 |                                 eob_run = 0;\n  936 | \n  937 |                                 expected_rst_num = (expected_rst_num + 1) % 8;\n  938 |                                 mcus_left_until_restart = self.restart_interval;\n  939 |                             }\n  940 |                             Some(marker) => {\n  941 |                                 return Err(Error::Format(format!(\n  942 |                                     \"found marker {:?} inside scan where RST{} was expected\",\n  943 |                                     marker, expected_rst_num\n  944 |                                 )))\n  945 |                             }\n  946 |                             None => {\n  947 |                                 return Err(Error::Format(format!(\n  948 |                                     \"no marker found where RST{} was expected\",\n  949 |                                     expected_rst_num\n  950 |                                 )))\n  951 |                             }\n  952 |                         }\n  953 |                     }\n  954 | \n  955 |                     mcus_left_until_restart -= 1;\n  956 |                 }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`HuffmanDecoder::read_bits` reads bytes into a 64-bit shift register but, once `self.marker` is set, returns 0 bytes forever. The loop condition `while self.num_bits <= 56` therefore terminates after at most a few iterations, but the consumer subsequently calls `peek_bits`/`consume_bits` on bits that are entirely zeroed-out. For a malformed JPEG where the entropy data ends prematurely (the decoder hits an unexpected marker mid-coefficient), the decoder will keep consuming 'zero' coefficients silently up to the structural end of the block rather than surfacing the truncation. This is a deliberate design choice (zero-fill on EOF), but it can mask malformed input.","fix":"Optional: surface a `Format` error when `read_bits` is called and the marker is set but the caller still demands more bits than are available without the zero-fill. Alternatively, leave the behaviour but document it explicitly above `read_bits`.","locations":[{"ref":"src/huffman.rs:123-160","code":"  123 |     fn read_bits<R: Read>(&mut self, reader: &mut R) -> Result<()> {\n  124 |         while self.num_bits <= 56 {\n  125 |             // Fill with zero bits if we have reached the end.\n  126 |             let byte = match self.marker {\n  127 |                 Some(_) => 0,\n  128 |                 None => read_u8(reader)?,\n  129 |             };\n  130 | \n  131 |             if byte == 0xFF {\n  132 |                 let mut next_byte = read_u8(reader)?;\n  133 | \n  134 |                 // Check for byte stuffing.\n  135 |                 if next_byte != 0x00 {\n  136 |                     // We seem to have reached the end of entropy-coded data and encountered a\n  137 |                     // marker. Since we can't put data back into the reader, we have to continue\n  138 |                     // reading to identify the marker so we can pass it on.\n  139 | \n  140 |                     // Section B.1.1.2\n  141 |                     // \"Any marker may optionally be preceded by any number of fill bytes, which are bytes assigned code X’FF’.\"\n  142 |                     while next_byte == 0xFF {\n  143 |                         next_byte = read_u8(reader)?;\n  144 |                     }\n  145 | \n  146 |                     match next_byte {\n  147 |                         0x00 => return Err(Error::Format(\"FF 00 found where marker was expected\".to_owned())),\n  148 |                         _    => self.marker = Some(Marker::from_u8(next_byte).unwrap()),\n  149 |                     }\n  150 | \n  151 |                     continue;\n  152 |                 }\n  153 |             }\n  154 | \n  155 |             self.bits |= (byte as u64) << (56 - self.num_bits);\n  156 |             self.num_bits += 8;\n  157 |         }\n  158 | \n  159 |         Ok(())\n  160 |     }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `parse_sos`, the duplicate-component check `if component_indices.contains(&component_index)` (line 361) uses a linear scan plus duplicate error, then the next check `if component_index < *component_indices.iter().max().unwrap_or(&0)` enforces monotonic ordering. When the scan declares only one component, the monotonic check is trivially true. But for the case where the very first scan component_index is 0, `unwrap_or(&0)` returns 0 and the strict `<` comparison passes — so the very first component is allowed to have any value, including duplicates. Duplicate is handled by `contains`, but the `unwrap_or(&0)` is misleading because index 0 is a valid component position. Use a sentinel or restructure the check.","fix":"Track the previous component_index explicitly: `let mut prev: Option<usize> = None; ... if let Some(p) = prev { if component_index <= p { return Err(...) } } prev = Some(component_index);` — this avoids both the `unwrap_or(&0)` ambiguity and re-scanning the vec each iteration.","locations":[{"ref":"src/parser.rs:355-385","code":"  355 |         let component_index = match frame.components.iter().position(|c| c.identifier == identifier) {\n  356 |             Some(value) => value,\n  357 |             None => return Err(Error::Format(format!(\"scan component identifier {} does not match any of the component identifiers defined in the frame\", identifier))),\n  358 |         };\n  359 | \n  360 |         // Each of the scan's components must be unique.\n  361 |         if component_indices.contains(&component_index) {\n  362 |             return Err(Error::Format(format!(\"duplicate scan component identifier {}\", identifier)));\n  363 |         }\n  364 | \n  365 |         // \"... the ordering in the scan header shall follow the ordering in the frame header.\"\n  366 |         if component_index < *component_indices.iter().max().unwrap_or(&0) {\n  367 |             return Err(Error::Format(\"the scan component order does not follow the order in the frame header\".to_owned()));\n  368 |         }\n  369 | \n  370 |         let byte = read_u8(reader)?;\n  371 |         let dc_table_index = byte >> 4;\n  372 |         let ac_table_index = byte & 0x0f;\n  373 | \n  374 |         if dc_table_index > 3 || (frame.is_baseline && dc_table_index > 1) {\n  375 |             return Err(Error::Format(format!(\"invalid dc table index {}\", dc_table_index)));\n  376 |         }\n  377 |         if ac_table_index > 3 || (frame.is_baseline && ac_table_index > 1) {\n  378 |             return Err(Error::Format(format!(\"invalid ac table index {}\", ac_table_index)));\n  379 |         }\n  380 | \n  381 |         component_indices.push(component_index);\n  382 |         dc_table_indices.push(dc_table_index as usize);\n  383 |         ac_table_indices.push(ac_table_index as usize);\n  384 |     }\n  385 | "}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Upsampler::new` panics on an image with zero components: `components.iter().map(...).max().unwrap()` (line 21, 22, and 39) all unwrap an `Option`. `parse_sof` already rejects zero-component frames, so this is currently unreachable from the public API, but `Upsampler::new` is `pub` within the crate and the unwrap has no documented precondition.","fix":"Either return `Err(Error::Format(\"empty component list\".to_owned()))` when `components.is_empty()`, or add a `debug_assert!(!components.is_empty())` and a doc comment stating the precondition.","locations":[{"ref":"src/upsampler.rs:19-44","code":"   19 | impl Upsampler {\n   20 |     pub fn new(components: &[Component], output_width: u16, output_height: u16) -> Result<Upsampler> {\n   21 |         let h_max = components.iter().map(|c| c.horizontal_sampling_factor).max().unwrap();\n   22 |         let v_max = components.iter().map(|c| c.vertical_sampling_factor).max().unwrap();\n   23 |         let mut upsampler_components = Vec::with_capacity(components.len());\n   24 | \n   25 |         for component in components {\n   26 |             let upsampler = choose_upsampler((component.horizontal_sampling_factor,\n   27 |                                               component.vertical_sampling_factor),\n   28 |                                              (h_max, v_max),\n   29 |                                              output_width,\n   30 |                                              output_height)?;\n   31 | 5 |         // If row_near's fractional is 0.0 we want row_far to be the previous row and if it's 0.5 we\n  176 |         // want it to be the next row.\n  177 |         let row_far = (row_near + row_near.fract() * 3.0 - 0.25).min((input_height - 1) as f32);\n  178 | \n  179 |         let input_near = &input[row_near as usize * row_stride ..];\n  180 |         let input_far = &input[row_far as usize * row_stride ..];\n  181 | \n  182 |         let output = &mut output[..output_width];\n  183 |         let input_near = &input_near[..output_width];\n  184 |         let input_far = &input_far[..output_width];\n  185 |         for i in 0..output_width {\n  186 |             output[i] = ((3 * input_near[i] as u32 + input_far[i] as u32 + 2) >> 2) as u8;\n  187 |         }\n  188 |     }\n  189 | }\n  190 | \n  191 | impl Upsample for UpsamplerH2V2 {\n  192 |     fn upsample_row(&self,\n  193 |                     input: &[u8],\n  194 |                     input_width: usize,\n  195 |                     input_height: usize,\n  196 |                     row_stride: usize,\n  197 |                     row: usize,\n  198 |                     _output_width: usize,\n  199 |                     output: &mut [u8]) {\n  200 |         let row_near = row as f32 / 2.0;\n  201 |         // If row_near's fractional is 0.0 we want row_far to be the previous row and if it's 0.5 we\n  202 |         // want it to be the next row.\n  203 |         let row_far = (row_near + row_near.fract() * 3.0 - 0.25).min((input_height - 1) as f32);\n  204 | \n  205 |         let input_near = &input[row_near as usize * row_stride ..];\n  206 |         let input_far = &input[row_far as usize * row_stride ..];\n  207 | \n  208 |         if input_width == 1 {\n  209 |             let value = ((3 * input_near[0] as u32 + input_far[0] as u32 + 2) >> 2) as u8;\n  210 |             output[0] = value;\n  211 |             output[1] = value;\n  212 |             return;\n  213 |         }\n  214 | \n  215 |         let mut t1 = 3 * input_near[0] as u32 + input_far[0] as u32;\n  216 |         output[0] = ((t1 + 2) >> 2) as u8;\n  217 | \n  218 |         for i in 1 .. input_width {\n  219 |             let t0 = t1;\n  220 |             t1 = 3 * input_near[i] as u32 + input_far[i] as u32;\n  221 | \n  222 |             output[i * 2 - 1] = ((3 * t0 + t1 + 8) >> 4) as u8;\n  223 |             output[i * 2]     = ((3 * t1 + t0 + 8) >> 4) as u8;\n  224 |         }\n  225 | \n  226 |         output[input_width * 2 - 1] = ((t1 + 2) >> 2) as u8;\n  227 |     }\n  228 | }"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","description":"`decode_scan_lossless` allocates `ncomp * npixel * 2` bytes (where `npixel = image_size.height * image_size.width`) on the very first line, before any buffer-size limit is consulted. For a malicious 65535x65535 file with 4 components, this is `4 * 65535 * 65535 * 2` ≈ 34 GB. The `decoding_buffer_size_limit` check happens later in `decode_planes`, so a `Decoder` configured with a tight limit can still be made to OOM on lossless input. `differences` (line 49) compounds the issue.","fix":"Before allocating `results` and `differences`, validate `ncomp * npixel * size_of::<u16>()` against `self.decoding_buffer_size_limit` (factor it out of `decode_planes` into a helper). Return `Error::Format(\"size of decoded image exceeds maximum allowed size\")` when the limit is exceeded.","locations":[{"ref":"src/decoder/lossless.rs:11-49","code":"   11 |     pub fn decode_scan_lossless(\n   12 |         &mut self,\n   13 |         frame: &FrameInfo,\n   14 |         scan: &ScanInfo,\n   15 |     ) -> Result<(Option<Marker>, Vec<Vec<u16>>)> {\n   16 |         let ncomp = scan.component_indices.len();\n   17 |         let npixel = frame.image_size.height as usize * frame.image_size.width as usize;\n   18 |         assert!(ncomp <= MAX_COMPONENTS);\n   19 |         let mut results = vec![vec![0u16; npixel]; ncomp];\n   20 | \n   21 |         let components: Vec<Component> = scan\n   22 |             .component_indices\n   23 |             .iter()\n   24 |             .map(|&i| frame.components[i].clone())\n   25 |             .collect();\n   26 | \n   27 |         // Verify that all required huffman tables has been set.\n   28 |         if scan\n   29 |             .dc_table_indices\n   30 |             .iter()\n   31 |             .any(|&i| self.dc_huffman_tables[i].is_none())\n   32 |         {\n   33 |             return Err(Error::Format(\n   34 |                 \"scan makes use of unset dc huffman table\".to_owned(),\n   35 |             ));\n   36 |         }\n   37 | \n   38 |         let mut huffman = HuffmanDecoder::new();\n   39 |         let reader = &mut self.reader;\n   40 |         let mut mcus_left_until_restart = self.restart_interval;\n   41 |         let mut expected_rst_num = 0;\n   42 |         let mut ra = [0u16; MAX_COMPONENTS];\n   43 |         let mut rb = [0u16; MAX_COMPONENTS];\n   44 |         let mut rc = [0u16; MAX_COMPONENTS];\n   45 | \n   46 |         let width = frame.image_size.width as usize;\n   47 |         let height = frame.image_size.height as usize;\n   48 | \n   49 |         let mut differences = vec![Vec::with_capacity(npixel); ncomp];"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"At the end of `decode_scan`, `marker = self.read_marker().ok();` silently swallows any I/O or format error returned by `read_marker`. If the input is truncated immediately after a trailing RST marker, the truncation error is converted to `None` and the surrounding `decode_internal` loop continues as if the scan finished cleanly. Real corruption is hidden from the caller.","fix":"Propagate the error: `marker = Some(self.read_marker()?);` and break out of the `while let Some(Marker::RST(_)) = marker` loop on EOF only if EOF after RST is explicitly desired. Otherwise convert EOF after RST to a clearly-typed warning rather than silent success.","locations":[{"ref":"src/decoder.rs:1063-1066","code":" 1063 |         let mut marker = huffman.take_marker(&mut self.reader)?;\n 1064 |         while let Some(Marker::RST(_)) = marker {\n 1065 |             marker = self.read_marker().ok();\n 1066 |         }"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`MpscWorker::start_with`, `append_row`, and `get_result_with` all use `.expect(\"jpeg-decoder worker thread error\")` on the `sender.send(...)` call. If the worker thread has panicked, the channel is broken and `send` returns `Err`; the expect propagates that as a process-killing panic in user code rather than a clean `Error::Format`/`Error::Internal`. A library should not crash its caller when an internal thread fails.","fix":"Replace the `.expect(...)` with `.map_err(|_| Error::Format(\"worker thread died\".to_owned()))?` so the failure is surfaced as a normal `Result::Err` to the caller of `Decoder::decode`.","locations":[{"ref":"src/worker/multithreaded.rs:43-70","code":"   43 |         let sender = self.senders[component].as_mut().unwrap();\n   44 |         sender\n   45 |             .send(WorkerMsg::Start(row_data))\n   46 |             .expect(\"jpeg-decoder worker thread error\");\n   47 |         Ok(())\n   48 |     }\n   49 | \n   50 |     fn append_row(&mut self, row: (usize, Vec<i16>)) -> Result<()> {\n   51 |         let component = row.0;\n   52 |         let sender = self.senders[component].as_mut().unwrap();\n   53 |         sender\n   54 |             .send(WorkerMsg::AppendRow(row.1))\n   55 |             .expect(\"jpeg-decoder worker thread error\");\n   56 |         Ok(())\n   57 |     }\n   58 | \n   59 |     fn get_result_with(\n   60 |         &mut self,\n   61 |         index: usize,\n   62 |         collect: impl FnOnce(Receiver<Vec<u8>>) -> Vec<u8>,\n   63 |     ) -> Result<Vec<u8>> {\n   64 |         let (tx, rx) = mpsc::channel();\n   65 |         let sender = mem::take(&mut self.senders[index]).unwrap();\n   66 |         sender\n   67 |             .send(WorkerMsg::GetResult(tx))\n   68 |             .expect(\"jpeg-decoder worker thread error\");\n   69 |         Ok(collect(rx))\n   70 |     }"}]},{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"low","description":"`Decoder::info` panics on precision outside 2..=16 for single-component images and on component count != 1, 3, 4. Both cases are validated earlier in `decode_internal`, so callers using the standard API path cannot hit them. However, the panics rely on the invariant being maintained across all future code paths; a bare `panic!()` with no message is fragile.","fix":"Replace `_ => panic!()` arms with `_ => unreachable!(\"info() invariants violated: precision={} components={}\", ...)` for better diagnostics if the invariant is ever broken.","locations":[{"ref":"src/decoder.rs:171-194","code":"  171 |     pub fn info(&self) -> Option<ImageInfo> {\n  172 |         match self.frame {\n  173 |             Some(ref frame) => {\n  174 |                 let pixel_format = match frame.components.len() {\n  175 |                     1 => match frame.precision {\n  176 |                         2..=8 => PixelFormat::L8,\n  177 |                         9..=16 => PixelFormat::L16,\n  178 |                         _ => panic!(),\n  179 |                     },\n  180 |                     3 => PixelFormat::RGB24,\n  181 |                     4 => PixelFormat::CMYK32,\n  182 |                     _ => panic!(),\n  183 |                 };\n  184 | \n  185 |                 Some(ImageInfo {\n  186 |                     width: frame.output_size.width,\n  187 |                     height: frame.output_size.height,\n  188 |                     pixel_format,\n  189 |                     coding_process: frame.coding_process,\n  190 |                 })\n  191 |             }\n  192 |             None => None,\n  193 |         }\n  194 |     }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","description":"`choose_color_convert_func` panics for component counts other than 3 and 4. The function is `pub(crate)` and is only invoked from `compute_image_parallel` for multi-component images that have already been gated to 3 or 4 components in `decode_internal`. Still, the bare `panic!()` provides no diagnostic and is a foot-gun if future refactors call it with other counts.","fix":"Convert the catch-all arm to `Err(Error::Unsupported(UnsupportedFeature::ComponentCount(component_count as u8)))` or to `unreachable!(\"choose_color_convert_func called with {} components\", component_count)`.","locations":[{"ref":"src/decoder.rs:1338-1389","code":" 1338 | #[allow(clippy::type_complexity)]\n 1339 | pub(crate) fn choose_color_convert_func(\n 1340 |     component_count: usize,\n 1341 |     color_transform: ColorTransform,\n 1342 | ) -> Result<fn(&[Vec<u8>], &mut [u8])> {\n 1343 |     match component_count {\n 1344 |         3 => match color_transform {\n 1345 |             ColorTransform::None => Ok(color_no_convert),\n 1346 |             ColorTransform::Grayscale => Err(Error::Format(\n 1347 |                 \"Invalid number of channels (3) for Grayscale data\".to_string(),\n 1348 |             )),\n 1349 |             ColorTransform::RGB => Ok(color_convert_line_rgb),\n 1350 |             ColorTransform::YCbCr => Ok(color_convert_line_ycbcr),\n 1351 |             ColorTransform::CMYK => Err(Error::Format(\n 1352 |                 \"Invalid number of channels (3) for CMYK data\".to_string(),\n 1353 |             )),\n 1354 |             ColorTransform::YCCK => Err(Error::Format(\n 1355 |                 \"Invalid number of channels (3) for YCCK data\".to_string(),\n 1356 |             )),\n 1357 |             ColorTransform::JcsBgYcc => Err(Error::Unsupported(\n 1358 |                 UnsupportedFeature::ColorTransform(ColorTransform::JcsBgYcc),\n 1359 |             )),\n 1360 |  0x39, 0x3A, 0x43, 0x44, 0x45, 0x46, 0x47, 0x48,\n  337 |               0x49, 0x4A, 0x53, 0x54, 0x55, 0x56, 0x57, 0x58, 0x59, 0x5A, 0x63, 0x64, 0x65, 0x66, 0x67, 0x68,\n  338 |               0x69, 0x6A, 0x73, 0x74, 0x75, 0x76, 0x77, 0x78, 0x79, 0x7A, 0x82, 0x83, 0x84, 0x85, 0x86, 0x87,\n  339 |               0x88, 0x89, 0x8A, 0x92, 0x93, 0x94, 0x95, 0x96, 0x97, 0x98, 0x99, 0x9A, 0xA2, 0xA3, 0xA4, 0xA5,\n  340 |               0xA6, 0xA7, 0xA8, 0xA9, 0xAA, 0xB2, 0xB3, 0xB4, 0xB5, 0xB6, 0xB7, 0xB8, 0xB9, 0xBA, 0xC2, 0xC3,\n  341 |               0xC4, 0xC5, 0xC6, 0xC7, 0xC8, 0xC9, 0xCA, 0xD2, 0xD3, 0xD4, 0xD5, 0xD6, 0xD7, 0xD8, 0xD9, 0xDA,\n  342 |               0xE2, 0xE3, 0xE4, 0xE5, 0xE6, 0xE7, 0xE8, 0xE9, 0xEA, 0xF2, 0xF3, 0xF4, 0xF5, 0xF6, 0xF7, 0xF8,\n  343 |               0xF9, 0xFA\n  344 |             ], HuffmanTableClass::AC).unwrap());\n  345 |     }\n  346 | }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","description":"`parse_sof` contains three `panic!()` calls in `match marker` arms that handle the SOF subset (lines 172, 178, 183). They are only reachable if the caller passes a `Marker::SOF(n)` where `n` is in {4, 8, 12} or >= 16. `Marker::from_u8` never constructs such values, so the panics are unreachable from the public decoder API, but the bare `panic!()` is fragile to refactors and gives no diagnostic if hit.","fix":"Replace each `_ => panic!(),` with `_ => unreachable!(\"parse_sof called with unsupported SOF marker {:?}\", marker)`, or convert to `return Err(Error::Format(...))` to fail closed.","locations":[{"ref":"src/parser.rs:168-184","code":"  168 |     let is_baseline = marker == SOF(0);\n  169 |     let is_differential = match marker {\n  170 |         SOF(0 ..= 3) | SOF(9 ..= 11)  => false,\n  171 |         SOF(5 ..= 7) | SOF(13 ..= 15) => true,\n  172 |         _ => panic!(),\n  173 |     };\n  174 |     let coding_process = match marker {\n  175 |         SOF(0) | SOF(1) | SOF(5) | SOF(9) | SOF(13) => CodingProcess::DctSequential,\n  176 |         SOF(2) | SOF(6) | SOF(10) | SOF(14)         => CodingProcess::DctProgressive,\n  177 |         SOF(3) | SOF(7) | SOF(11) | SOF(15)         => CodingProcess::Lossless,\n  178 |         _ => panic!(),\n  179 |     };\n  180 |     let entropy_coding = match marker {\n  181 |         SOF(0 ..= 3) | SOF(5 ..= 7)     => EntropyCoding::Huffman,\n  182 |         SOF(9 ..= 11) | SOF(13 ..= 15)  => EntropyCoding::Arithmetic,\n  183 |         _ => panic!(),\n  184 |     };"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`ceil_div` returns `Result<u16>` but truncates the computed quotient with `as u16` rather than checking that it fits. The function is used to compute every `mcu_size`, `component.size`, and `block_size` from arithmetically combined image dimensions and sampling factors. In current call sites the value happens to fit (image dimensions are u16 and sampling factors are at most 4), but the cast silently throws away the high bits if any future caller passes larger inputs (e.g. an expanded `dct_scale`). A bug there would manifest as a tiny image that decodes a fragment of the real one rather than as a clean error.","fix":"Use `u16::try_from(1 + ((x - 1) / y)).map_err(|_| Error::Format(\"image dimension overflow\".to_owned()))` instead of `as u16`. This turns the silent truncation into an explicit format error.","locations":[{"ref":"src/parser.rs:282-310","code":"  282 | /// Returns ceil(x/y), requires x>0\n  283 | fn ceil_div(x: u32, y: u32) -> Result<u16> {\n  284 |     if x == 0 || y == 0 {\n  285 |         // TODO Determine how this error is reached. Can we validate input\n  286 |         // earlier and error out then?\n  287 |         return Err(Error::Format(\"invalid dimensions\".to_owned()));\n  288 |     }\n  289 |     Ok((1 + ((x - 1) / y)) as u16)\n  290 | }\n  291 | \n  292 | fn update_component_sizes(size: Dimensions, components: &mut [Component]) -> Result<Dimensions> {\n  293 |     let h_max = components.iter().map(|c| c.horizontal_sampling_factor).max().unwrap() as u32;\n  294 |     let v_max = components.iter().map(|c| c.vertical_sampling_factor).max().unwrap() as u32;\n  295 | \n  296 |     let mcu_size = Dimensions {\n  297 |         width: ceil_div(size.width as u32, h_max * 8)?,\n  298 |         height: ceil_div(size.height as u32, v_max * 8)?,\n  299 |     };\n  300 | \n  301 |     for component in components {\n  302 |         component.size.width = ceil_div(size.width as u32 * component.horizontal_sampling_factor as u32 * component.dct_scale as u32, h_max * 8)?;\n  303 |         component.size.height = ceil_div(size.height as u32 * component.vertical_sampling_factor as u32 * component.dct_scale as u32, v_max * 8)?;\n  304 | \n  305 |         component.block_size.width = mcu_size.width * component.horizontal_sampling_factor as u16;\n  306 |         component.block_size.height = mcu_size.height * component.vertical_sampling_factor as u16;\n  307 |     }\n  308 | \n  309 |     Ok(mcu_size)\n  310 | }"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`extend(value, count)` does `value as i16 + (-1 << count as i16) + 1`. The shift `-1i16 << count_i16` is only well-defined for `count` strictly less than 16 because `i16` is 16 bits. Today the function is only called with `count` in `1..=15` (DC values are limited to 1..=11 in `decode_block`, AC values to 1..=15, lossless to 1..=15 with the 16 case short-circuited at the call site), but the function does not enforce that itself: a future caller passing `count == 16` would hit a debug-mode panic / release-mode UB shift. The implicit contract should be made explicit.","fix":"Add `debug_assert!((1..=15).contains(&count))` at the top of `extend`, or move the 16-special-case out of the call sites and into this function so the precondition is documented in one place.","locations":[{"ref":"src/huffman.rs:163-173","code":"  163 | // Section F.2.2.1\n  164 | // Figure F.12\n  165 | fn extend(value: u16, count: u8) -> i16 {\n  166 |     let vt = 1 << (count as u16 - 1);\n  167 | \n  168 |     if value < vt {\n  169 |         value as i16 + (-1 << count as i16) + 1\n  170 |     } else {\n  171 |         value as i16\n  172 |     }\n  173 | }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`Error::Internal(Box<dyn StdError + Send + Sync + 'static>)` is documented with `//TODO: not used, can be removed with the next version bump`. It is exposed on the public enum, contributes to `Display`/`source`, but no code path in the crate constructs it. Keeping it forces all consumers' exhaustive matches to handle a variant that will never appear.","fix":"Remove `Error::Internal` (and its handling in `Display`/`source`) at the next semver-breaking release. Until then leave the TODO but consider marking it `#[deprecated(note = \"unused, will be removed\")]`.","locations":[{"ref":"src/error.rs:36-69","code":"   36 | /// Errors that can occur while decoding a JPEG image.\n   37 | #[derive(Debug)]\n   38 | pub enum Error {\n   39 |     /// The image is not formatted properly. The string contains detailed information about the\n   40 |     /// error.\n   41 |     Format(String),\n   42 |     /// The image makes use of a JPEG feature not (currently) supported by this library.\n   43 |     Unsupported(UnsupportedFeature),\n   44 |     /// An I/O error occurred while decoding the image.\n   45 |     Io(IoError),\n   46 |     /// An internal error occurred while decoding the image.\n   47 |     Internal(Box<dyn StdError + Send + Sync + 'static>), //TODO: not used, can be removed with the next version bump\n   48 | }\n   49 | \n   50 | impl fmt::Display for Error {\n   51 |     fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n   52 |         match *self {\n   53 |             Error::Format(ref desc) => write!(f, \"invalid JPEG format: {}\", desc),\n   54 |             Error::Unsupported(ref feat) => write!(f, \"unsupported JPEG feature: {:?}\", feat),\n   55 |             Error::Io(ref err) => err.fmt(f),\n   56 |             Error::Internal(ref err) => err.fmt(f),\n   57 |         }\n   58 |     }\n   59 | }\n   60 | \n   61 | impl StdError for Error {\n   62 |     fn source(&self) -> Option<&(dyn StdError + 'static)> {\n   63 |         match *self {\n   64 |             Error::Io(ref err) => Some(err),\n   65 |             Error::Internal(ref err) => Some(&**err),\n   66 |             _ => None,\n   67 |         }\n   68 |     }\n   69 | }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"Inside the main marker dispatch loop, every SOS marker triggers `let frame = self.frame.clone().unwrap();` which deep-clones the entire `FrameInfo` (including the `components: Vec<Component>`) on every scan. Progressive JPEGs may have dozens of scans, each paying for a full clone. The clone is needed because `decode_scan` borrows `&mut self`, but the borrow checker constraint can be satisfied by taking the frame out and putting it back, or by restructuring `decode_scan` to take the frame as `&FrameInfo` and the rest of `self` separately.","fix":"Either `let frame = self.frame.take().unwrap();` then restore it after `decode_scan` returns, or refactor `decode_scan` to accept components as borrowed slices and split mutable state (huffman/quant tables, etc.) explicitly to avoid the clone.","locations":[{"ref":"src/decoder.rs:392-481","code":"  392 |                 Marker::SOS => {\n  393 |                     if self.frame.is_none() {\n  394 |                         return Err(Error::Format(\"scan encountered before frame\".to_owned()));\n  395 |                     }\n  396 | \n  397 |                     let frame = self.frame.clone().unwrap();\n  398 |                     let scan = parse_sos(&mut self.reader, &frame)?;\n  399 | \n  400 |                     if frame.coding_process == CodingProcess::DctProgressive\n  401 |                         && self.coefficients.is_empty()\n  402 |                     {\n  403 |                         self.coefficients = frame\n  404 |                             .components\n  405 |                             .iter()\n  406 |                             .map(|c| {\n  407 |                                 let block_count =\n  408 |                                     c.block_size.width as usize * c.block_size.height as usize;\n  409 |                                 vec![0; block_count * 64]\n  410 |                             })\n  411 |                             .collect();\n  412 |                     }\n  413 | \n  414 |                     if frame.coding_process == CodingProcess::Lossless {\n  415 |                         let (marker, data) = self.decode_scan_lossless(&frame, &scan)?;\n  416 | \n  417 |                         for (i, plane) in data\n  418 |                             .into_iter()\n  419 |                             .enumerate()\n  420 |                             .filter(|(_, plane)| !plane.is_empty())\n  421 |                         {\n  422 |                             planes_u16[i] = plane;\n  423 |                         }\n  424 |                         pending_marker = marker;\n  425 |                     } else {\n  426 |                         // This was previously buggy, so let's explain the log here a bit. When a\n  427 |                         // progressive frame is encoded then the coefficients (DC, AC) of each\n  428 |                         // component (=color plane) can be split amongst scans. In particular it can\n  429 |                         // happen or at least occurs in the wild that a scan contains coefficient 0 of\n  430 |                         // all components. If now one but not all components had all other coefficients\n  431 |                         // delivered in previous scans then such a scan contains all worker(preference, |worker| {\n  462 |                                 self.decode_scan(&frame, &scan, worker, &finished)\n  463 |                             })?;\n  464 | \n  465 |                         if let Some(data) = data {\n  466 |                             for (i, plane) in data\n  467 |                                 .into_iter()\n  468 |                                 .enumerate()\n  469 |                                 .filter(|(_, plane)| !plane.is_empty())\n  470 |                             {\n  471 |                                 if self.coefficients_finished[i] == !0 {\n  472 |                                     planes[i] = plane;\n  473 |                                 }\n  474 |                             }\n  475 |                         }\n  476 | \n  477 |                         pending_marker = marker;\n  478 |                     }\n  479 | \n  480 |                     scans_processed += 1;\n  481 |                 }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"In `decode_scan`, `dummy_block: [i16; 64]` is allocated once and re-used as the write target for every component flagged 'not finished' in successive-approximation passes. Because the buffer is shared between components and not zeroed between calls, the leftover values from one component's pass become the 'previous coefficients' that the next component's `refine_non_zeroes` walks. Today the data is discarded so this is only a correctness curiosity, but it does mean refinement bits are still consumed from the stream against stale data. Allocating one dummy per component (or zeroing between uses) would isolate the components properly.","fix":"Zero `dummy_block` at the top of the `for v_pos`/`for h_pos` loops in successive-approximation mode, or allocate one dummy block per component (`let mut dummy_blocks = vec![[0i16; 64]; components.len()];`).","locations":[{"ref":"src/decoder.rs:863-1015","code":"  863 |         let is_progressive = frame.coding_process == CodingProcess::DctProgressive;\n  864 |         let is_interleaved = components.len() > 1;\n  865 |         let mut dummy_block = [0i16; 64];\n  866 |         let mut huffman = HuffmanDecoder::new();\n  867 |         let mut dc_predictors = [0i16; MAX_COMPONENTS];\n  868 |         let mut mcus_left_until_restart = self.restart_interval;\n  869 |         let mut expected_rst_num = 0;\n  870 |         let mut eob_run = 0;\n  871 |         let mut mcu_row_coefficients = vec![vec![]; components.len()];\n  872 | \n  873 |         if !is_progressive {\n  874 |             for (i, component) in components.iter().enumerate().filter(|&(i, _)| finished[i]) {\n  875 |                 let coefficients_per_mcu_row = component.block_size.width as usize\n  876 |                     * component.vertical_sampling_factor as usize\n  877 |                     * 64;\n  878 |                 mcu_row_coefficients[i] = vec![0i16; coefficients_per_mcu_row];\n  879 |             }\n  880 |         }\n  881 | \n  882 |         // 4.8.2\n  883 |         // When reading from the stream, if the data is non-interleaved then an MCU consists of\n  884 |         // exactly one block (effectively a 1x1 sample).\n  885 |         let (mcu_horizontal_samples, mcu_vertical_samples) = if is_interleaved {\n  886 |             let horizontal = components\n  887 |                 .iter()\n  888 |                 .map(|component| component.horizontal_sampling_factor as u16)\n  889 |                 .collect::<Vec<_>>();\n  890 |             let vertical = components\n  891 |                 .iter()\n  892 |                 .map(|component| component.vertical_sampling_factor as u16)\n  893 |                 .collect::<Vec<_>>();\n  894 |             (horizontal, vertical)\n  895 |         } else {\n  896 |             (vec![1], vec![1])\n  897 |         };\n  898 | \n  899 |         // This also affects how many MCU values we read from stream. If it's a non-interleaved stream,\n  900 |         // the MCUs will be exactly the block count.\n  901 |         let (max_mcu_x, max_mcu_y) = if is_interleaved {\n  902 |             (frame.mcu_size.width, frame.mcu_size.height)\n  903 |         } else {\n  904 |             (\n  905 |                 components[0].block_size.width,\n  906 |                 components[0].block_size.height,\n  907 |             )\n  908 |         };\n  909 | \n  910 |         for mcu_y in 0..max_mcu_y {\n  911 |             if mcu_y * 8 >= frame.image_size.height {\n  912 |                 break;\n  913 |             }\n  914 | \n  915 |             for mcu_x in 0..max_mcu_x {\n  916 |                 if mcu_x * 8 >= frame.image_size.width {\n  917 |                     break;\n  918 |                 }\n  919 | \n  920 |                 if self.restart_interval > 0 {\n  921 |                     if mcus_left_until_restart == 0 {\n  922 |                         match huffman.take_marker(&mut self.reader)? {\n  923 |                             Some(Marker::RST(n)) => {\n  924 |                                 if n != expected_rst_num {\n  925 |                                     return Err(Error::Format(format!(\n  926 |                                         \"found RST{} where RST{} was expected\",\n  927 |                                         n, expected_rst_num\n  928 |                                     )));\n  929 |                                 }\n  930 | \n  931 |                                 huffman.reset();\n  932 |                                 // Section F.2.1.3.1\n  933 |                                 dc_predictors = [0i16; MAX_COMPONENTS];\n  934 |                                 // Section G.1.2.2\n  935 |                                 eob_run = 0;\n  936 | \n  937 |                                 expected_rst_num = (expected_rst_num + 1) % 8;\n  938 |                                 mcus_left_until_restart = self.restart_interval;\n  939 |                             }\n  940 |                             Some(marker) => {\n  941 |                                 return Err(Error::Format(format!(\n  942 |                                     \"found marker {:?} inside scan where RST{} was expected\",\n  943 |                                     marker, expected_rst_num\n  944 |                                 )))\n  945 |                             }\n  946 |                             None => {\n  947 |                                 return Err(Error::Format(format!(\n  948 |                                     \"no marker found where RST{} was expected\",\n  949 |                                     expected_rst_num\n  950 |                                 )))\n  951 |                             }\n  952 |                         }\n  953 |                     }\n  954 | \n  955 |                     mcus_left_until_restart -= 1;\n  956 |                 }\n  957 | \n  958 |                 for (i, component) in components.iter().enumerate() {\n  959 |                     for v_pos in 0..mcu_vertical_samples[i] {\n  960 |                         for h_pos in 0..mcu_horizontal_samples[i] {\n  961 |                             let coefficients = if is_progressive {\n  962 |                                 let block_y = (mcu_y * mcu_vertical_samples[i] + v_pos) as usize;\n  963 |                                 let block_x = (mcu_x * mcu_horizontal_samples[i] + h_pos) as usize;\n  964 |                                 let block_offset =\n  965 |                                     (block_y * component.block_size.width as usize + block_x) * 64;\n  966 |                                 &mut self.coefficients[scan.component_indices[i]]\n  967 |                                     [block_offset..block_offset + 64]\n  968 |                             } else if finished[i] {\n  969 |                                 // Because the worker thread operates in batches as if we were always interleaved, we\n  970 | f components.len() == 1 {\n 1311 |         let component = &components[0];\n 1312 |         let mut decoded: Vec<u8> = data.remove(0);\n 1313 | \n 1314 |         let width = component.size.width as usize;\n 1315 |         let height = component.size.height as usize;\n 1316 |         let size = width * height;\n 1317 |         let line_stride = component.block_size.width as usize * component.dct_scale;\n 1318 | \n 1319 |         // if the image width is a multiple of the block size,\n 1320 |         // then we don't have to move bytes in the decoded data\n 1321 |         if usize::from(output_size.width) != line_stride {\n 1322 |             // The first line already starts at index 0, so we need to move only lines 1..height\n 1323 |             // We move from the top down because all lines are being moved backwards.\n 1324 |             for y in 1..height {\n 1325 |                 let destination_idx = y * width;\n 1326 |                 let source_idx = y * line_stride;\n 1327 |                 let end = source_idx + width;\n 1328 |                 decoded.copy_within(source_idx..end, destination_idx);\n 1329 |             }\n 1330 |         }\n 1331 |         decoded.resize(size, 0);\n 1332 |         Ok(decoded)"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"`HuffmanTable::new` allocates a fresh `Vec<u8>` (`values.to_vec()`) and stores it on every table even though only `HuffmanDecoder::decode` reads it via `table.values[index]`. The size is at most 256, and the lifetime is tied to the table. Storing as `[u8; 256]` with a `count: u16` would avoid a heap allocation per Huffman table — typically 8 per image, but with progressive scans rebuilding tables this accumulates.","fix":"Store `values` as `[u8; 256]` with a `len: u16` field (or use `SmallVec`), and read with `&self.values[..self.len as usize]`. The construction cost is a `copy_from_slice`, no faster than `to_vec` but with no heap traffic.","locations":[{"ref":"src/huffman.rs:181-253","code":"  181 | pub struct HuffmanTable {\n  182 |     values: Vec<u8>,\n  183 |     delta: [i32; 16],\n  184 |     maxcode: [i32; 16],\n  185 | \n  186 |     lut: [(u8, u8); 1 << LUT_BITS],\n  187 |     ac_lut: Option<[(i16, u8); 1 << LUT_BITS]>,\n  188 | }\n  189 | \n  190 | impl HuffmanTable {\n  191 |     pub fn new(bits: &[u8; 16], values: &[u8], class: HuffmanTableClass) -> Result<HuffmanTable> {\n  192 |         let (huffcode, huffsize) = derive_huffman_codes(bits)?;\n  193 | \n  194 |         // Section F.2.2.3\n  195 |         // Figure F.15\n  196 |         // delta[i] is set to VALPTR(I) - MINCODE(I)\n  197 |         let mut delta = [0i32; 16];\n  198 |         let mut maxcode = [-1i32; 16];\n  199 |         let mut j = 0;\n  200 | \n  201 |         for i in 0 .. 16 {\n  202 |             if bits[i] != 0 {\n  203 |                 delta[i] = j as i32 - huffcode[j] as i32;\n  204 |                 j += bits[i] as usize;\n  205 |                 maxcode[i] = huffcode[j - 1] as i32;\n  206 |             }\n  207 |         }\n  208 | \n  209 |         // Build a lookup table for faster decoding.\n  210 |         let mut lut = [(0u8, 0u8); 1 << LUT_BITS];\n  211 | \n  212 |         for (i, &size) in huffsize.iter().enumerate().filter(|&(_, &size)| size <= LUT_BITS) {\n  213 |             let bits_remaining = LUT_BITS - size;\n  214 |             let start = (huffcode[i] << bits_remaining) as usize;\n  215 | \n  216 |             let val = (values[i], size);\n  217 |             for b in &mut lut[start..][..1 << bits_remaining] {\n  218 |                 *b = val;\n  219 |             }\n  220 |         }\n  221 | \n  222 |         // Build a lookup table for small AC coefficients which both decodes the value and does the\n  223 |         // equivalent of receive_extend.\n  224 |         let ac_lut = match class {\n  225 |             HuffmanTableClass::DC => None,\n  226 |             HuffmanTableClass::AC => {\n  227 |                 let mut table = [(0i16, 0u8); 1 << LUT_BITS];\n  228 | \n  229 |                 for (i, &(value, size)) in lut.iter().enumerate() {\n  230 |                     let run_length = value >> 4;\n  231 |                     let magnitude_category = value & 0x0f;\n  232 | \n  233 |                     if magnitude_category > 0 && size + magnitude_category <= LUT_BITS {\n  234 |                         let unextended_ac_value = (((i << size) & ((1 << LUT_BITS) - 1)) >> (LUT_BITS - magnitude_category)) as u16;\n  235 |                         let ac_value = extend(unextended_ac_value, magnitude_category);\n  236 | \n  237 |                         table[i] = (ac_value, (run_length << 4) | (size + magnitude_category));\n  238 |                     }\n  239 |                 }\n  240 | \n  241 |                 Some(table)\n  242 |             },\n  243 |         };\n  244 | \n  245 |         Ok(HuffmanTable {\n  246 |             values: values.to_vec(),\n  247 |             delta,\n  248 |             maxcode,\n  249 |             lut,\n  250 |             ac_lut,\n  251 |         })\n  252 |     }\n  253 | }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"`derive_huffman_codes` builds `huffsize` with `iter::repeat((i + 1) as u8).take(value as usize)` inside a `fold` that re-allocates via `extend` for every bit-count. For a maximally-sized Huffman table (256 codes) this is a long sequence of small appends. Pre-computing `let total: usize = bits.iter().map(|&b| b as usize).sum();` and `Vec::with_capacity(total)` would eliminate the repeated growth, and a plain `for` loop is clearer than the `fold`.","fix":"Replace the `fold` with: `let total: usize = bits.iter().map(|&b| b as usize).sum(); let mut huffsize = Vec::with_capacity(total); for (i, &count) in bits.iter().enumerate() { huffsize.extend(std::iter::repeat((i + 1) as u8).take(count as usize)); }`.","locations":[{"ref":"src/huffman.rs:256-285","code":"  256 | fn derive_huffman_codes(bits: &[u8; 16]) -> Result<(Vec<u16>, Vec<u8>)> {\n  257 |     // Figure C.1\n  258 |     let huffsize = bits.iter()\n  259 |                        .enumerate()\n  260 |                        .fold(Vec::new(), |mut acc, (i, &value)| {\n  261 |                            acc.extend(iter::repeat((i + 1) as u8).take(value as usize));\n  262 |                            acc\n  263 |                        });\n  264 | \n  265 |     // Figure C.2\n  266 |     let mut huffcode = vec![0u16; huffsize.len()];\n  267 |     let mut code_size = huffsize[0];\n  268 |     let mut code = 0u32;\n  269 | \n  270 |     for (i, &size) in huffsize.iter().enumerate() {\n  271 |         while code_size < size {\n  272 |             code <<= 1;\n  273 |             code_size += 1;\n  274 |         }\n  275 | \n  276 |         if code >= (1u32 << size) {\n  277 |             return Err(Error::Format(\"bad huffman code length\".to_owned()));\n  278 |         }\n  279 | \n  280 |         huffcode[i] = code as u16;\n  281 |         code += 1;\n  282 |     }\n  283 | \n  284 |     Ok((huffcode, huffsize))\n  285 | }"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","description":"`Decoder::new` initializes `dc_huffman_tables: vec![None, None, None, None]` and `ac_huffman_tables: vec![None, None, None, None]` as heap-allocated `Vec`s of fixed length 4. The size is exactly `MAX_COMPONENTS` so a stack-allocated `[Option<HuffmanTable>; 4]` would avoid two pointless heap allocations per `Decoder`. The `mem::take`/zip-based merge in DHT handling would need a minor adjustment but the array type works the same way.","fix":"Change `dc_huffman_tables` and `ac_huffman_tables` to `[Option<HuffmanTable>; 4]` (matching the existing `quantization_tables` field). Update the DHT merging in `decode_internal` accordingly.","locations":[{"ref":"src/decoder.rs:101-154","code":"  101 | pub struct Decoder<R> {\n  102 |     reader: R,\n  103 | \n  104 | \n  153 |         }\n  154 |     }"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","description":"`clamp_fixed_point` uses `.min(255).max(0)` to clamp into 0..=255. The idiomatic and slightly more readable form is `value.clamp(0, 255)`. Functionally equivalent but `clamp` makes the intent obvious and avoids the implicit reasoning about evaluation order between `min` and `max`.","fix":"Replace `(value >> FIXED_POINT_OFFSET).min(255).max(0) as u8` with `(value >> FIXED_POINT_OFFSET).clamp(0, 255) as u8`.","locations":[{"ref":"src/decoder.rs:1506-1508","code":" 1506 | fn clamp_fixed_point(value: i32) -> u8 {\n 1507 |     (value >> FIXED_POINT_OFFSET).min(255).max(0) as u8\n 1508 | }"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","description":"`upsample_and_interleave_row` allocates `line_buffers = vec![vec![0u8; self.line_buffer_size]; component_count]` for every output row. For a tall image with many components this is one allocation per (row * components) call. Reusing buffers across rows (e.g. a `RefCell<Vec<Vec<u8>>>` field on `Upsampler`, or threading the buffer in from the caller) would eliminate millions of small allocations on large images.","fix":"Cache the line buffers as a `Vec<Vec<u8>>` reused across rows (e.g. allocate once in `compute_image_parallel` and pass into `upsample_and_interleave_row`), or use a thread-local reusable buffer.","locations":[{"ref":"src/upsampler.rs:47-63","code":"   47 |     pub fn upsample_and_interleave_row(&self, component_data: &[Vec<u8>], row: usize, output_width: usize, output: &mut [u8], color_convert: fn(&[Vec<u8>], &mut [u8])) {\n   48 |         let component_count = component_data.len();\n   49 |         let mut line_buffers = vec![vec![0u8; self.line_buffer_size]; component_count];\n   50 | \n   51 |         debug_assert_eq!(component_count, self.components.len());\n   52 | \n   53 |         for (i, component) in self.components.iter( // and if that position is in-bounds, so are all other accesses.\n  133 |     assert!(\n  134 |         output.len()\n  135 |             > output_linestride\n  136 |                 .checked_mul(7)\n  137 |                 .unwrap()\n  138 |                 .checked_add(7)\n  139 |                 .unwrap()\n  140 |     );\n  141 | "},{"ref":"src/arch/neon.rs:119-130","code":"  119 |     // The loop below will write to positions [output_linestride * i, output_linestride * i + 8)\n  120 |     // for 0<=i<8. Thus, the last accessed position is at an offset of output_linestrade * 7 + 7,\n  121 |     // and if that position is in-bounds, so are all other accesses.\n  122 |     assert!(\n  123 |         output.len()\n  124 |             > output_linestride\n  125 |                 .checked_mul(7)\n  126 |                 .unwrap()\n  127 |                 .checked_add(7)\n  128 |                 .unwrap()\n  129 |     );\n  130 | "}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"`MpscWorker::append_row` performs `self.senders[component].as_mut().unwrap()` with no checks. If the caller invokes `append_row` for a component without first calling `start` (or after a `get_result` has consumed the sender), the unwrap panics in production. Callers in `decoder.rs::decode_scan` are careful to call `worker.start` first only when `finished[i]` is true, but the same iteration logic later calls `worker.append_row((i, row_coefficients))` for the same components, so the invariant is fragile and not enforced at the type level.","fix":"Return `Err(...)` instead of unwrapping: `let sender = self.senders[component].as_mut().ok_or_else(|| Error::Format(\"append_row called for unstarted component\".to_owned()))?;`. Same for `get_result_with`.","locations":[{"ref":"src/worker/multithreaded.rs:50-57","code":"   50 |     fn append_row(&mut self, row: (usize, Vec<i16>)) -> Result<()> {\n   51 |         let component = row.0;\n   52 |         let
