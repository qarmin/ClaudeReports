<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"hashdb__createtables() calls hashdb_begintransaction(), hashdb_rollbacktransaction(), and hashdb_committransaction() which all call sqlite3_step() on the global prepared-statement pointers (query_begintransaction etc.). These pointers are initialised to 0 (NULL) and are only prepared by hashdb__preparestatements(), which is called AFTER hashdb__createtables() in hashdb_open(). Passing NULL to sqlite3_step() is undefined behaviour and will almost certainly segfault when the database file is new (version == 0 branch at line 331). Additionally, when the first CREATE TABLE fails (line 92-93), the function returns without calling rollback, leaving a transaction open.","fix":"Replace the hashdb_begintransaction/rollback/commit calls inside hashdb__createtables with direct sqlite3_exec() calls: sqlite3_exec(db, \"BEGIN\", 0, 0, 0), sqlite3_exec(db, \"ROLLBACK\", 0, 0, 0), and sqlite3_exec(db, \"COMMIT\", 0, 0, 0). Also add a rollback call on the first CREATE TABLE failure path.","locations":[{"ref":"hashdb.c:77-121","code":"   77 | int hashdb__createtables(sqlite3 *db)\n   78 | {\n   79 |   int result;\n   80 | \n   81 |   hashdb_begintransaction(db);\n   82 | \n   83 |   result = sqlite3_exec(db,\n   84 |     \"CREATE TABLE IF NOT EXISTS directories (\"\n   85 |     \"  id INTEGER PRIMARY KEY,\"\n   86 |     \"  name TEXT,\"\n   87 |     \"  full_path TEXT UNIQUE,\"\n   88 |     \"  parent INTEGER REFERENCES directories(id) ON DELETE CASCADE\"\n   89 |     \")\",\n   90 |     0, 0, 0);\n   91 | \n   92 |   if (result != SQLITE_OK)\n   93 |     return result;\n   94 | \n   95 |   result = sqlite3_exec(db,\n   96 |     \"CREATE TABLE IF NOT EXISTS hashes (\"\n   97 |     \"  directory_id INTEGER REFERENCES directories(id) ON DELETE CASCADE,\"\n   98 |     \"  filename TEXT,\"\n   99 |     \"  inode BLOB,\"\n  100 |     \"  size INTEGER,\"\n  101 |     \"  ctime BLOB,\"\n  102 |     \"  mtime BLOB,\"\n  103 |     \"  ctime_nsec INTEGER,\"\n  104 |     \"  mtime_nsec INTEGER,\"\n  105 |     \"  partial_hash BLOB,\"\n  106 |     \"  partial_hash_bytes INTEGER,\"\n  107 |     \"  hash BLOB,\"\n  108 |     \"  hash_function INTEGER,\"\n  109 |     \"  PRIMARY KEY (directory_id, filename)\"\n  110 |     \")\",\n  111 |     0, 0, 0);\n  112 | \n  113 |   if (result != SQLITE_OK) {\n  114 |     hashdb_rollbacktransaction(db);\n  115 |     return result;\n  116 |   }\n  117 | \n  118 |   hashdb_committransaction(db);\n  119 | \n  120 |   return SQLITE_OK;\n  121 | }","lines":45},{"ref":"hashdb.c:331-343","code":"  331 |   if (version == 0) /* this is a new database */ {\n  332 |     result = hashdb__createtables(db);\n  333 |     if (result != SQLITE_OK) {\n  334 |       sqlite3_close_v2(db);\n  335 |       return 0;\n  336 |     }\n  337 | \n  338 |     result = hashdb__setdatabaseversion(db, DATABASE_VERSION);\n  339 |     if (result != SQLITE_OK) {\n  340 |       sqlite3_close_v2(db);\n  341 |       return 0;\n  342 |     }\n  343 |   }","lines":13},{"ref":"hashdb.c:360-391","code":"  360 | int hashdb_begintransaction(sqlite3 *db)\n  361 | {\n  362 |   int result;\n  363 | \n  364 |   result = sqlite3_step(query_begintransaction);\n  365 | \n  366 |   sqlite3_reset(query_begintransaction);\n  367 | \n  368 |   return result == SQLITE_DONE;\n  369 | }\n  370 | \n  371 | int hashdb_committransaction(sqlite3 *db)\n  372 | {\n  373 |   int result;\n  374 | \n  375 |   result = sqlite3_step(query_committransaction);\n  376 | \n  377 |   sqlite3_reset(query_committransaction);\n  378 | \n  379 |   return result == SQLITE_DONE;\n  380 | }\n  381 | \n  382 | int hashdb_rollbacktransaction(sqlite3 *db)\n  383 | {\n  384 |   int result;\n  385 | \n  386 |   result = sqlite3_step(query_rollbacktransaction);\n  387 | \n  388 |   sqlite3_reset(query_rollbacktransaction);\n  389 | \n  390 |   return result == SQLITE_DONE;\n  391 | }","lines":32}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"purgetree() dereferences checktree unconditionally without a NULL check (line 549: if (checktree->left != NULL)). In main(), purgetree(checktree) is called at line 2003 even when checktree may be NULL - for example if no files were found but the early exit at line 1863 did not trigger (e.g., no directories given but cache-only mode ran). Although in most real paths checktree will be non-NULL before reaching line 2003, if registerfile is never called, checktree remains NULL and purgetree will dereference it.","fix":"Add a NULL guard at the start of purgetree: if (checktree == NULL) return;","locations":[{"ref":"fdupes.c:547-554","code":"  547 | void purgetree(filetree_t *checktree)\n  548 | {\n  549 |   if (checktree->left != NULL) purgetree(checktree->left);\n  550 |     \n  551 |   if (checktree->right != NULL) purgetree(checktree->right);\n  552 |     \n  553 |   free(checktree);\n  554 | }","lines":8},{"ref":"fdupes.c:2003","code":" 2003 |   purgetree(checktree);","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"replacestring() checks 'if (newlength > max) return 0' (line 96-97), but max is passed as the allocated buffer size in bytes. newlength is the length of the resulting string without its null terminator, so the string requires newlength+1 bytes. When newlength == max (allocated), the check passes and execution continues; the subsequent memmove then writes the null terminator at position max, one byte past the end of the buffer, causing a one-byte heap buffer overflow.","fix":"Change the condition to 'if (newlength >= max) return 0;' so that the buffer always has room for the null terminator.","locations":[{"ref":"getrealpath.c:81-103","code":"   81 | int replacestring(char *dest, size_t from, size_t through, size_t max, const char *src)\n   82 | {\n   83 |     size_t srclength;\n   84 |     size_t destlength;\n   85 |     size_t moveto;\n   86 |     size_t newlength;\n   87 | \n   88 |     destlength = strlen(dest);\n   89 | \n   90 |     if (through >= destlength || from > through)\n   91 |         return 0;\n   92 | \n   93 |     srclength = strlen(src);\n   94 | \n   95 |     newlength = destlength + srclength - (through - from + 1);\n   96 |     if (newlength > max)\n   97 |         return 0;\n   98 | \n   99 |     memmove(dest + from + srclength, dest + through + 1, destlength - through);\n  100 | \n  101 |     memcpy(dest + from, src, srclength);\n  102 | \n  103 |     return 1;","lines":23},{"ref":"getrealpath.c:388","code":"  388 |                 replacestring(scratch, 0, tail - 1, allocated, link);","lines":1},{"ref":"getrealpath.c:404","code":"  404 |                 replacestring(scratch, x + 1, tail - 1, allocated, link);","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"log_cwd() passes the return value of getworkingdirectory() directly to fprintf() as a %s argument without checking for NULL. getworkingdirectory() can return NULL on allocation failure or getcwd() failure (errno != ERANGE). Passing NULL to fprintf %s is undefined behaviour and typically causes a crash.","fix":"Check if cwd is NULL before calling fprintf. Return early or print an error placeholder if cwd is NULL.","locations":[{"ref":"log.c:170-177","code":"  170 | void log_cwd(FILE *file)\n  171 | {\n  172 |   char *cwd = getworkingdirectory();\n  173 | \n  174 |   fprintf(file, \"working directory:\\n  %s\\n\\n\", cwd);\n  175 | \n  176 |   free(cwd);\n  177 | }","lines":8}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"KEY_DC (Delete key) at line 1236 calls cmd_prune with the variable 'commandarguments', which is declared at line 391 but is never initialized before the first command is processed. If the user presses Delete before typing any command, commandarguments is an indeterminate pointer. cmd_prune passes it to cmd_clear_all_selections, which ignores it, but passing an indeterminate value is undefined behavior and the code path may change if cmd_prune is ever modified.","fix":"Initialize commandarguments to NULL (or to commandbuffer) at declaration: 'wchar_t *commandarguments = NULL;'","locations":[{"ref":"ncurses-interface.c:391","code":"  391 |   wchar_t *commandarguments;","lines":1},{"ref":"ncurses-interface.c:1236","code":" 1236 |         cmd_prune(groups, totalgroups, commandarguments, &globaldeletiontally, &totalgroups, &cursorgroup, &cursorfile, &topline, logfile, filewin, statuswin, status);","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"When totalgroups is 0 (no duplicates found, or all groups pruned away), the KEY_DOWN and KEY_UP key handlers (and KEY_SRIGHT, KEY_SLEFT, '?', '\\n') unconditionally access groups[cursorgroup].filecount and groups[cursorgroup].files[cursorfile] without guarding on totalgroups > 0. Since cursorgroup is always 0 at this point and no group entry was ever written (or the slot was freed by cmd_prune), this is an access to uninitialized or freed memory, causing undefined behavior / crash.","fix":"Wrap all of the KEY_CODE_YES and OK key handlers that access groups[] with a guard: 'if (totalgroups == 0) break;' at the top of each case that touches group data.","locations":[{"ref":"ncurses-interface.c:1147-1215","code":" 1147 |       case KEY_DOWN:\n 1148 |         if (cursorfile < groups[cursorgroup].filecount - 1)\n 1149 |           move_to_next_file(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1150 |         else if (cursorgroup < totalgroups - 1)\n 1151 |           move_to_next_group(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1152 | \n 1153 |         break;\n 1154 | \n 1155 |       case KEY_UP:\n 1156 |         if (cursorfile > 0)\n 1157 |           move_to_previous_file(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1158 |         else if (cursorgroup > 0)\n 1159 |           move_to_previous_group(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1160 | \n 1161 |         break;\n 1162 | \n 1163 |       case KEY_SF:\n 1164 |         ++topline;\n 1165 |         break;\n 1166 | \n 1167 |       case KEY_SR:\n 1168 |         if (topline > 0)\n 1169 |           --topline;\n 1170 |         break;\n 1171 | \n 1172 |       case KEY_NPAGE:\n 1173 |         topline += getmaxy(filewin);\n 1174 |         break;\n 1175 | \n 1176 |       case KEY_PPAGE:\n 1177 |         topline -= getmaxy(filewin);\n 1178 | \n 1179 |         if (topline < 0)\n 1180 |           topline = 0;\n 1181 | \n 1182 |         break;\n 1183 | \n 1184 |       case KEY_SRIGHT:\n 1185 |         set_file_action(&groups[cursorgroup].files[cursorfile], FILEACTION_KEEP, &globaldeletiontally);\n 1186 | \n 1187 |         format_status_left(status, L\"1 file marked for preservation.\");\n 1188 | \n 1189 |         if (cursorfile < groups[cursorgroup].filecount - 1)\n 1190 |           move_to_next_file(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1191 |         else if (cursorgroup < totalgroups - 1)\n 1192 |           move_to_next_group(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1193 | \n 1194 |         break;\n 1195 | \n 1196 |       case KEY_SLEFT:\n 1197 |         deletecount = 0;\n 1198 | \n 1199 |         set_file_action(&groups[cursorgroup].files[cursorfile], FILEACTION_DELETE, &globaldeletiontally);\n 1200 | \n 1201 |         format_status_left(status, L\"1 file marked for deletion.\");\n 1202 | \n 1203 |         for (x = 0; x < groups[cursorgroup].filecount; ++x)\n 1204 |           if (groups[cursorgroup].files[x].action == FILEACTION_DELETE)\n 1205 |             ++deletecount;\n 1206 | \n 1207 |         if (deletecount < groups[cursorgroup].filecount)\n 1208 |         {\n 1209 |           if (cursorfile < groups[cursorgroup].filecount - 1)\n 1210 |             move_to_next_file(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1211 |           else if (cursorgroup < totalgroups - 1)\n 1212 |             move_to_next_group(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1213 |         }\n 1214 | \n 1215 |         break;","lines":69},{"ref":"ncurses-interface.c:1271-1308","code":" 1271 |       case '?':\n 1272 |         if (groups[cursorgroup].files[cursorfile].action == FILEACTION_UNRESOLVED)\n 1273 |           break;\n 1274 | \n 1275 |         set_file_action(&groups[cursorgroup].files[cursorfile], FILEACTION_UNRESOLVED, &globaldeletiontally);\n 1276 | \n 1277 |         if (cursorfile < groups[cursorgroup].filecount - 1)\n 1278 |           move_to_next_file(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1279 |         else if (cursorgroup < totalgroups - 1)\n 1280 |           move_to_next_group(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1281 | \n 1282 |         break;\n 1283 | \n 1284 |       case '\\n':\n 1285 |         deletecount = 0;\n 1286 |         preservecount = 0;\n 1287 | \n 1288 |         for (x = 0; x < groups[cursorgroup].filecount; ++x)\n 1289 |         {\n 1290 |           if (groups[cursorgroup].files[x].action == FILEACTION_KEEP)\n 1291 |             ++preservecount;\n 1292 |         }\n 1293 | \n 1294 |         if (preservecount == 0)\n 1295 |           break;\n 1296 | \n 1297 |         for (x = 0; x < groups[cursorgroup].filecount; ++x)\n 1298 |         {\n 1299 |           if (groups[cursorgroup].files[x].action == FILEACTION_UNRESOLVED)\n 1300 |             set_file_action(&groups[cursorgroup].files[x], FILEACTION_DELETE, &globaldeletiontally);\n 1301 | \n 1302 |           if (groups[cursorgroup].files[x].action == FILEACTION_DELETE)\n 1303 |             ++deletecount;\n 1304 |         }\n 1305 | \n 1306 |         if (cursorgroup < totalgroups - 1 && deletecount < groups[cursorgroup].filecount)\n 1307 |           move_to_next_group(&topline, &cursorgroup, &cursorfile, groups, filewin);\n 1308 | ","lines":38}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"KEY_BACKSPACE handler (line 1217-1225) calls scroll_to_group(groups, cursorgroup=0, ...) even when totalgroups is 0. scroll_to_group dereferences groups[0].startline and groups[0].endline, which is uninitialized or freed memory when totalgroups == 0.","fix":"Add 'if (totalgroups == 0) break;' at the start of the KEY_BACKSPACE case, or guard the scroll_to_group call.","locations":[{"ref":"ncurses-interface.c:1217-1225","code":" 1217 |       case KEY_BACKSPACE:\n 1218 |         if (cursorgroup > 0)\n 1219 |           --cursorgroup;\n 1220 | \n 1221 |         cursorfile = 0;\n 1222 | \n 1223 |         scroll_to_group(&topline, cursorgroup, 0, groups, filewin);\n 1224 | \n 1225 |         break;","lines":9},{"ref":"ncurses-interface.c:201-219","code":"  201 | void scroll_to_group(int *topline, int group, int tail, struct filegroup *groups, WINDOW *filewin)\n  202 | {\n  203 |   if (*topline < groups[group].startline)\n  204 |   {\n  205 |     if (groups[group].endline >= *topline + getmaxy(filewin))\n  206 |     {\n  207 |       if (groups[group].endline - groups[group].startline < getmaxy(filewin))\n  208 |         *topline = groups[group].endline - getmaxy(filewin) + 1;\n  209 |       else\n  210 |         *topline = groups[group].startline;\n  211 |     }\n  212 |   }\n  213 |   else\n  214 |   {\n  215 |     if (groups[group].endline - groups[group].startline < getmaxy(filewin) || !tail)\n  216 |       *topline = groups[group].startline;\n  217 |     else\n  218 |       *topline = groups[group].endline - getmaxy(filewin);\n  219 |   }","lines":19}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"print_status does not check whether malloc returns NULL. If the allocation fails, the code immediately dereferences the NULL pointer by writing to text[x], causing a crash.","fix":"Add a NULL check after the malloc call and return early (or call endwin + exit, consistent with putline's pattern) when allocation fails.","locations":[{"ref":"ncurses-status.c:138-142","code":"  138 |   text = (wchar_t*)malloc((cols + 1) * sizeof(wchar_t));\n  139 | \n  140 |   l = wcslen(status->left);\n  141 |   for (x = 0; x < l && x < cols; ++x)\n  142 |     text[x] = status->left[x];","lines":5}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In wcsbeginmbcs(), the buffer haystackw is allocated with malloc(size * sizeof(wchar_t)) where size = mbstowcs_escape_invalid(0, haystack, 0). mbstowcs_escape_invalid() returns (size_t)-1 on internal buffer overflow. If it does so on the sizing pass (dest=NULL), size becomes SIZE_MAX, the malloc() call requests an enormous (or wrapping) amount of memory and returns NULL, which is checked and returns -1. However, if the haystack string is empty (size=1), then size without +1 (unlike the other callers) is correct. The real concern is that the return value of mbstowcs_escape_invalid() on the second call (line 83, with the actual buffer) is not checked - if it returns -1 the wide buffer is in an indeterminate state and wcsncmp will read garbage.","fix":"Check the return value of mbstowcs_escape_invalid() on the write pass (line 83). If it returns (size_t)-1, free haystackw and return an error sentinel.","locations":[{"ref":"wcs.c:77-88","code":"   77 |   size = mbstowcs_escape_invalid(0, haystack, 0);\n   78 | \n   79 |   haystackw = (wchar_t*) malloc(size * sizeof(wchar_t));\n   80 |   if (haystackw == 0)\n   81 |     return -1;\n   82 | \n   83 |   mbstowcs_escape_invalid(haystackw, haystack, size);\n   84 | \n   85 |   if (wcsncmp(haystackw, needle, wcslen(needle)) == 0)\n   86 |     result = 1;\n   87 |   else\n   88 |     result = 0;","lines":12}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"In escapefilename(), if realloc() fails and *filename_ptr is set to NULL, the original buffer that was passed in via *filename_ptr is lost (realloc frees the old pointer on failure only on some platforms, but on others - including Linux/glibc - realloc returns NULL without freeing the old block). Either way, the caller's pointer is now NULL and the original allocation is leaked or the pointer is dangling. The caller (printmatches, deletefiles) then has an unusable filename pointer.","fix":"Save the old pointer before calling realloc: char *tmp2 = *filename_ptr; char *p = realloc(tmp2, strlen(tmp) + 1); if (!p) { free(tmp); errormsg(...); exit(1); } *filename_ptr = p; strcpy(*filename_ptr, tmp);","locations":[{"ref":"fdupes.c:115-120","code":"  115 |     *filename_ptr = realloc(*filename_ptr, strlen(tmp) + 1);\n  116 |     if (*filename_ptr == NULL) {\n  117 |       errormsg(\"out of memory!\\n\");\n  118 |       exit(1);\n  119 |     }\n  120 |     strcpy(*filename_ptr, tmp);","lines":6}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"In getrealpath() inside the GETREALPATH_IGNORE_MISSING_BASENAME branch, there are three memory-leak paths: (1) Line 140-142: if malloc for 'basename' fails, 'dirname' is already allocated but not freed before returning 0. (2) Lines 147-148: if stat(dirname) fails, both 'dirname' and 'basename' are allocated but neither is freed before returning 0. (3) Lines 158-163: if malloc for 'scratch' fails, 'link' (returned by the recursive getrealpath call at line 150) is not freed before returning 0.","fix":"Add free(dirname) before the return at line 142. Add free(dirname) and free(basename) before the return at line 148. Add free(link) alongside free(basename) and free(dirname) before the return at lines 161-163.","locations":[{"ref":"getrealpath.c:136-163","code":"  136 |         dirname = malloc(strlen(path) + 1);\n  137 |         if (dirname == 0)\n  138 |             return 0;\n  139 | \n  140 |         basename = malloc(strlen(path) + 1);\n  141 |         if (basename == 0)\n  142 |             return 0;\n  143 | \n  144 |         sdirname(dirname, path);\n  145 |         sbasename(basename, path);\n  146 | \n  147 |         if (stat(dirname, &st0) != 0)\n  148 |             return 0;\n  149 | \n  150 |         link = getrealpath(dirname, options ^ GETREALPATH_IGNORE_MISSING_BASENAME);\n  151 |         if (link == 0)\n  152 |         {\n  153 |             free(basename);\n  154 |             free(dirname);\n  155 |             return 0;\n  156 |         }\n  157 | \n  158 |         scratch = malloc(strlen(link) + strlen(basename) + 2);\n  159 |         if (scratch == 0)\n  160 |         {\n  161 |             free(basename);\n  162 |             free(dirname);\n  163 |             return 0;","lines":28}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"In log_open(), when fmatch() determines the file is not a valid log file (the LOG_ERROR_NOT_A_LOG_FILE error path), info->file was successfully opened by fopen() but is never closed before free(info) returns 0. Every time a caller tries to open a non-log file as a log, one FILE descriptor is permanently leaked.","fix":"Call fclose(info->file) before free(info) on the LOG_ERROR_NOT_A_LOG_FILE error path, mirroring what should happen there.","locations":[{"ref":"log.c:55-63","code":"   55 |   fmatch(info->file, LOG_HEADER, &is_match, &read);\n   56 |   if (!is_match && read > 0)\n   57 |   {\n   58 |     if (error != 0)\n   59 |       *error = LOG_ERROR_NOT_A_LOG_FILE;\n   60 | \n   61 |     free(info);\n   62 |     return 0;\n   63 |   }","lines":9}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"In cmd_select_regex, pcre2_match_data_create succeeds at line 250 and md is used throughout the function, but pcre2_match_data_free is never called before returning. Every invocation of the 'selr' command leaks the match-data block.","fix":"Add pcre2_match_data_free(md) before pcre2_code_free(code) at line 288, and also add it on the early-return error path at line 252 (though md is 0 there, so only the normal-exit path matters).","locations":[{"ref":"ncurses-commands.c:250-290","code":"  250 |   md = pcre2_match_data_create(1, 0);\n  251 |   if (md == 0)\n  252 |     return -1;\n  253 | \n  254 |   for (g = 0; g < groupcount; ++g)\n  255 |   {\n  256 |     groupselected = 0;\n  257 | \n  258 |     for (f = 0; f < groups[g].filecount; ++f)\n  259 |     {\n  260 |       needed = mbstowcs_escape_invalid(0, groups[g].files[f].file->d_name, 0);\n  261 | \n  262 |       wcsfilename = (wchar_t*) malloc(needed * sizeof(wchar_t));\n  263 |       if (wcsfilename == 0)\n  264 |         continue;\n  265 | \n  266 |       mbstowcs_escape_invalid(wcsfilename, groups[g].files[f].file->d_name, needed);\n  267 | \n  268 |       matches = pcre2_match(code, (PCRE2_SPTR)wcsfilename, PCRE2_ZERO_TERMINATED, 0, 0, md, 0);\n  269 | \n  270 |       free(wcsfilename);\n  271 | \n  272 |       if (matches > 0)\n  273 |       {\n  274 |         groups[g].selected = 1;\n  275 |         groups[g].files[f].selected = 1;\n  276 | \n  277 |         groupselected = 1;\n  278 |         ++selectedfilecount;\n  279 |       }\n  280 |     }\n  281 | \n  282 |     if (groupselected)\n  283 |       ++selectedgroupcount;\n  284 |   }\n  285 | \n  286 |   format_status_left(status, L\"Matched %d files in %d groups.\", selectedfilecount, selectedgroupcount);\n  287 | \n  288 |   pcre2_code_free(code);\n  289 | \n  290 |   return 1;","lines":41}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"In cmd_select_regex, when pcre2_match_data_create fails (returns NULL) at line 251, the function returns -1 without freeing 'code' (the compiled regex). This leaks the pcre2_code object.","fix":"Add pcre2_code_free(code) before the return -1 at line 252.","locations":[{"ref":"ncurses-commands.c:250-252","code":"  250 |   md = pcre2_match_data_create(1, 0);\n  251 |   if (md == 0)\n  252 |     return -1;","lines":3}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"In cmd_clear_selections_regex, pcre2_match_data_create at line 519 also leaks md on every call, for the same reason as in cmd_select_regex: pcre2_match_data_free is never called.","fix":"Add pcre2_match_data_free(md) before pcre2_code_free(code) at line 568.","locations":[{"ref":"ncurses-commands.c:519-569","code":"  519 |   md = pcre2_match_data_create(1, 0);\n  520 |   if (md == 0)\n  521 |     return -1;\n  522 | \n  523 |   for (g = 0; g < groupcount; ++g)\n  524 |   {\n  525 |     groupmatched = 0;\n  526 |     filedeselected = 0;\n  527 |     selectionsremaining = 0;\n  528 | \n  529 |     for (f = 0; f < groups[g].filecount; ++f)\n  530 |     {\n  531 |       needed = mbstowcs_escape_invalid(0, groups[g].files[f].file->d_name, 0);\n  532 | \n  533 |       wcsfilename = (wchar_t*) malloc(needed * sizeof(wchar_t));\n  534 |       if (wcsfilename == 0)\n  535 |         continue;\n  536 | \n  537 |       mbstowcs_escape_invalid(wcsfilename, groups[g].files[f].file->d_name, needed);\n  538 | \n  539 |       matches = pcre2_match(code, (PCRE2_SPTR)wcsfilename, PCRE2_ZERO_TERMINATED, 0, 0, md, 0);\n  540 | \n  541 |       free(wcsfilename);\n  542 | \n  543 |       if (matches > 0)\n  544 |       {\n  545 |         if (groups[g].files[f].selected)\n  546 |         {\n  547 |           groups[g].files[f].selected = 0;\n  548 |           filedeselected = 1;\n  549 |         }\n  550 | \n  551 |         groupmatched = 1;\n  552 |         ++matchedfilecount;\n  553 |       }\n  554 | \n  555 |       if (groups[g].files[f].selected)\n  556 |         selectionsremaining = 1;\n  557 |     }\n  558 | \n  559 |     if (filedeselected && !selectionsremaining)\n  560 |       groups[g].selected = 0;\n  561 | \n  562 |     if (groupmatched)\n  563 |       ++matchedgroupcount;\n  564 |   }\n  565 | \n  566 |   format_status_left(status, L\"Matched %d files in %d groups.\", matchedfilecount, matchedgroupcount);\n  567 | \n  568 |   pcre2_code_free(code);\n  569 | ","lines":51}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"In cmd_clear_selections_regex, the same pattern: if pcre2_match_data_create fails at line 519-521, the function returns -1 without calling pcre2_code_free(code).","fix":"Add pcre2_code_free(code) before the return -1 at line 521.","locations":[{"ref":"ncurses-commands.c:519-521","code":"  519 |   md = pcre2_match_data_create(1, 0);\n  520 |   if (md == 0)\n  521 |     return -1;","lines":3}]},{"id":"MEM_8","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"In status_text_alloc, when status is non-NULL and the left realloc succeeds but the right realloc fails, the code calls free(newleft) and returns 0. Because a successful realloc may have freed and moved the original status->left buffer, status->left is now a dangling pointer. Any subsequent use of status->left (e.g., in format_status_left/format_status_right) is a use-after-free.","fix":"When newright realloc fails, do not free newleft. Instead, update status->left = newleft (preserving the successfully grown left buffer) and return 0, leaving the struct in a consistent (if not fully grown) state. Alternatively update status->left before attempting the right realloc.","locations":[{"ref":"ncurses-status.c:64-72","code":"   64 |     newleft = (wchar_t*) realloc(status->left, (width+1) * sizeof(wchar_t));\n   65 |     if (newleft == 0)\n   66 |       return 0;\n   67 | \n   68 |     newright = (wchar_t*) realloc(status->right, (width+1) * sizeof(wchar_t));\n   69 |     if (newright == 0)\n   70 |     {\n   71 |       free(newleft);\n   72 |       return 0;","lines":9}]},{"id":"MEM_9","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In insert_command_identifier_command(), a new child node is allocated with malloc() at line 44. If the subsequent realloc() of tree->children fails (line 53-55), the function returns COMMAND_RECOGNIZER_OUT_OF_MEMORY immediately without freeing the newly allocated child node.","fix":"Add free(child) before the return on the realloc failure path (line 55).","locations":[{"ref":"commandidentifier.c:44-55","code":"   44 |     child = (struct command_identifier_node*) malloc(sizeof(struct command_identifier_node));\n   45 |     if (child == 0)\n   46 |       return COMMAND_RECOGNIZER_OUT_OF_MEMORY;\n   47 | \n   48 |     child->command = COMMAND_UNDEFINED;\n   49 |     child->character = command->command_name[ch];\n   50 |     child->children = 0;\n   51 |     child->num_children = 0;\n   52 | \n   53 |     alloc_children = realloc(tree->children, sizeof(struct command_identifier_node*) * (tree->num_children + 1));\n   54 |     if (alloc_children == 0)\n   55 |       return COMMAND_RECOGNIZER_OUT_OF_MEMORY;","lines":12}]},{"id":"MEM_10","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"errormsg() calls va_start() but never calls va_end() before returning. Omitting va_end() is undefined behaviour on some architectures (e.g. x86-64 ABI where va_list holds heap-allocated overflow areas) and constitutes a resource leak.","fix":"Add va_end(ap) after the vfprintf() call and before the function returns.","locations":[{"ref":"errormsg.c:28-34","code":"   28 |   va_list ap;\n   29 | \n   30 |   va_start(ap, message);\n   31 | \n   32 |   fprintf(stderr, \"\\r%40s\\r%s: \", \"\", program_name);\n   33 |   vfprintf(stderr, message, ap);\n   34 | }","lines":7}]},{"id":"MEM_11","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In cloneargs(), when the malloc for args[x] fails, previously allocated args[0..x-1] strings are not freed before calling free(args) and exiting. Each successfully allocated string in the partially-filled array leaks.","fix":"Before calling free(args) on the allocation-failure path, loop over 0..x-1 and free each args[i] that was already allocated.","locations":[{"ref":"fdupes.c:194-199","code":"  194 |     args[x] = (char*) malloc(strlen(argv[x]) + 1);\n  195 |     if (args[x] == NULL) {\n  196 |       free(args);\n  197 |       errormsg(\"out of memory!\\n\");\n  198 |       exit(1);\n  199 |     }","lines":6}]},{"id":"MEM_12","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"The OOM exit path at lines 988-1003 (inside the file-list parsing default case) frees commandbuffer, commandidentifier, and groups[g].files / groups, but does NOT free confirmationkeywordidentifier, status, or prompt. These leaks occur immediately before exit(1), so they have no practical runtime impact, but the pattern is inconsistent with every other OOM exit in the function.","fix":"Add free_command_identifier_tree(confirmationkeywordidentifier), free_status_text(status), and free_prompt_info(prompt) before the endwin()/exit(1) call.","locations":[{"ref":"ncurses-interface.c:988-1003","code":"  988 |                 }\n  989 |                 else if (intresult == FILE_LIST_ERROR_OUT_OF_MEMORY)\n  990 |                 {\n  991 |                   free(commandbuffer);\n  992 | \n  993 |                   free_command_identifier_tree(commandidentifier);\n  994 | \n  995 |                   for (g = 0; g < totalgroups; ++g)\n  996 |                     free(groups[g].files);\n  997 | \n  998 |                   free(groups);\n  999 | \n 1000 |                   endwin();\n 1001 |                   errormsg(\"out of memory\\n\");\n 1002 |                   exit(1);\n 1003 |                 }","lines":16}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In now64() on Apple (line 165), the expression 'absolute * sTimebaseInfo.numer / sTimebaseInfo.denom' can overflow uint64_t. mach_absolute_time() values grow large (billions on typical systems), and multiplying by numer before dividing by denom risks integer overflow when numer > 1.","fix":"Use __uint128_t for the intermediate product, or restructure as (absolute / denom) * numer + ((absolute % denom) * numer) / denom to reduce overflow risk.","locations":[{"ref":"fdupes.c:165","code":"  165 |     return absolute * sTimebaseInfo.numer / sTimebaseInfo.denom;","lines":1}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In deletefiles(), 'preserve[x] = 1' when 'all' is entered loops x from 0 to counter inclusive (line 1111: for (x = 0; x <= counter; x++)). But the allocation is sizeof(int) * max and max = (largest counter) + 1, so valid indices are 0..max-1. If counter == max-1, then x reaches counter == max-1, which is the last valid slot. This is fine. But the all-branch also writes preserve[0] (line 1111 starts at x=0), while the normal branch only zeroes/sets indices 1..counter (line 1105). preserve[0] is written but never read - it is wasted but not harmful.","fix":"Make the 'all' loop consistent with the rest: start at x=1 instead of x=0.","locations":[{"ref":"fdupes.c:1105","code":" 1105 | \tfor (x = 1; x <= counter; x++) preserve[x] = 0;","lines":1},{"ref":"fdupes.c:1111","code":" 1111 | \t    for (x = 0; x <= counter; x++) preserve[x] = 1;","lines":1}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"get_num_digits negates its argument when it is negative: `value = -value`. When value is INT_MIN this is undefined behaviour because -INT_MIN cannot be represented as a signed int.","fix":"Cast to unsigned before negating: `unsigned int uvalue = (value < 0) ? (unsigned int)(-(value + 1)) + 1u : (unsigned int)value;` and count digits on uvalue. Alternatively use an `unsigned int` parameter or special-case INT_MIN.","locations":[{"ref":"ncurses-print.c:144-157","code":"  144 | int get_num_digits(int value)\n  145 | {\n  146 |   int digits = 0;\n  147 | \n  148 |   if (value < 0)\n  149 |     value = -value;\n  150 | \n  151 |   do {\n  152 |     value /= 10;\n  153 |     ++digits;\n  154 |   } while (value > 0);\n  155 | \n  156 |   return digits;\n  157 | }","lines":14}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In deletefiles(), when malloc for dupelist, preserve, or preservestr fails, all three are freed via the error exit (line 999-1001: errormsg + exit). However, only the ones that succeeded are non-NULL; free(NULL) is defined, so that is safe. The real problem is that the groups/max counting loop (lines 976-993) begins before memory allocation, so if max is 0 (no duplicates found), 'max++' makes it 1 and the allocations are for size 1. dupelist[1] is then written at line 1017, which is an out-of-bounds write on a 1-element array (index 0 is the only valid slot). This happens because max starts at 0 and the loop finds no hasdupes, so max stays 0, then max++ makes it 1, and malloc(sizeof(file_t*) * 1) gives an array of one element, but code indexes from 1.","fix":"The dupelist/preserve arrays are indexed 1..counter (counter can equal max-1 after the increment). The arrays should be allocated with size max+1 to account for 1-based indexing, or the indexing convention should be changed to 0-based.","locations":[{"ref":"fdupes.c:976-1001","code":"  976 |   while (curfile) {\n  977 |     if (curfile->hasdupes) {\n  978 |       counter = 1;\n  979 |       groups++;\n  980 | \n  981 |       tmpfile = curfile->duplicates;\n  982 |       while (tmpfile) {\n  983 | \tcounter++;\n  984 | \ttmpfile = tmpfile->duplicates;\n  985 |       }\n  986 |       \n  987 |       if (counter > max) max = counter;\n  988 |     }\n  989 |     \n  990 |     curfile = curfile->next;\n  991 |   }\n  992 | \n  993 |   max++;\n  994 | \n  995 |   dupelist = (file_t**) malloc(sizeof(file_t*) * max);\n  996 |   preserve = (int*) malloc(sizeof(int) * max);\n  997 |   preservestr = (char*) malloc(INPUT_SIZE);\n  998 | \n  999 |   if (!dupelist || !preserve || !preservestr) {\n 1000 |     errormsg(\"out of memory\\n\");\n 1001 |     exit(1);","lines":26},{"ref":"fdupes.c:1017","code":" 1017 |       dupelist[counter] = files;","lines":1}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In getrealpath(), when a relative symlink occurs mid-path (i.e. the symlink is followed by more path components), the replacement step is silently skipped. After processing a path component that turns out to be a symlink, tail and next both point to the '/' separator that follows it. The code then does 'x = tail; while (scratch[x] != '/') --x;' but scratch[x=tail] is already '/' after the restore on line 381, so the while loop exits immediately with x == tail. The subsequent replacestring call receives from = x+1 = tail+1 and through = tail-1, which violates from <= through and causes replacestring to return 0 without modifying the buffer. The relative symlink is silently left unresolved and the rest of the path continues as if the symlink were a real directory, producing an incorrect canonical path.","fix":"Initialise x to tail - 1 instead of tail so the backward search starts before the trailing '/' separator: 'x = tail - 1; while (scratch[x] != '/') --x;'. This correctly finds the '/' preceding the symlink component.","locations":[{"ref":"getrealpath.c:394-408","code":"  394 |             else\n  395 |             /* link represents a relative path */\n  396 |             {\n  397 |                 memmove(scratch + tail, scratch + next, strlen(scratch + next) + 1);\n  398 | \n  399 |                 x = tail;\n  400 | \n  401 |                 while (scratch[x] != '/')\n  402 |                     --x;\n  403 | \n  404 |                 replacestring(scratch, x + 1, tail - 1, allocated, link);\n  405 | \n  406 |                 tail = x;\n  407 |                 next = x;\n  408 |             }","lines":15}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In get_command_text with append=1 (line 83), prompt->cursor is set to wcswidth(*commandbuffer, wcslen(*commandbuffer)), which is the total display-column width of the existing text. Throughout the function, prompt->cursor is also used as a direct array index into the wchar_t buffer (lines 154, 157, 181, 184, 194, 195, 203, 212, 214). For any string that contains wide characters (e.g., CJK characters with display width 2), the column-based cursor value exceeds the character count, causing out-of-bounds reads and writes into the commandbuffer array.","fix":"Separate the display-column cursor (for screen positioning and scrolling) from the character-index cursor (for buffer operations). In append mode, initialise the character-index cursor to wcslen(*commandbuffer), not wcswidth.","locations":[{"ref":"ncurses-getcommand.c:83","code":"   83 |     prompt->cursor = wcswidth(*commandbuffer, wcslen(*commandbuffer));","lines":1},{"ref":"ncurses-getcommand.c:154-157","code":"  154 |           for (c = length + 1; c >= prompt->cursor + 1; --c)\n  155 |             (*commandbuffer)[c] = (*commandbuffer)[c-1];\n  156 | \n  157 |           (*commandbuffer)[prompt->cursor] = wch;","lines":4},{"ref":"ncurses-getcommand.c:181-185","code":"  181 |           oldch = (*commandbuffer)[prompt->cursor];\n  182 | \n  183 |           if (prompt->cursor > 0)\n  184 |             for (c = prompt->cursor; c <= length; ++c)\n  185 |               (*commandbuffer)[c-1] = (*commandbuffer)[c];","lines":5},{"ref":"ncurses-getcommand.c:194-196","code":"  194 |           if (prompt->cursor < length)\n  195 |             for (c = prompt->cursor; c <= length; ++c)\n  196 |               (*commandbuffer)[c] = (*commandbuffer)[c+1];","lines":3},{"ref":"ncurses-getcommand.c:212-215","code":"  212 |           oldch = (*commandbuffer)[prompt->cursor];\n  213 | \n  214 |           if (prompt->cursor + wcwidth((*commandbuffer)[prompt->cursor]) <= length)\n  215 |             update_prompt(promptwin, prompt, *commandbuffer, wcwidth(oldch));","lines":4}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In get_command_text, the KEY_DC (Delete) handler iterates `for (c = prompt->cursor; c <= length; ++c) (*commandbuffer)[c] = (*commandbuffer)[c+1]`. When c equals length (the index of the null terminator), the loop reads commandbuffer[length+1], which is uninitialized memory. Although the buffer is allocated with enough space that this read is technically in-bounds (commandbuffersize >= length+2 is enforced by the growth check), reading uninitialized memory is undefined behaviour, and the value read gets written to commandbuffer[length], clobbering the null terminator with an indeterminate byte. The string termination at [length-1] from the c=length-1 iteration keeps the string logically correct, but the extra write and read are wrong.","fix":"Change `c <= length` to `c < length`. The step where c = length-1 already copies the null terminator to commandbuffer[length-1], correctly terminating the shortened string.","locations":[{"ref":"ncurses-getcommand.c:191-197","code":"  191 |         case KEY_DC:\n  192 |           length = wcslen(*commandbuffer);\n  193 | \n  194 |           if (prompt->cursor < length)\n  195 |             for (c = prompt->cursor; c <= length; ++c)\n  196 |               (*commandbuffer)[c] = (*commandbuffer)[c+1];\n  197 | ","lines":7}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In is_same_file(), when filename_b's strdup fails (line 629), filename_a is already allocated but not freed before returning -1. This leaks filename_a on every call where the second strdup fails.","fix":"On the filename_b strdup failure path, free filename_a before returning -1.","locations":[{"ref":"fdupes.c:628-630","code":"  628 |   filename_b = strdup(file_b->d_name);\n  629 |   if (filename_b == 0)\n  630 |     return -1;","lines":3}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In is_same_file(), after comparing basenames and finding them equal, the code tries to 'restore paths' by calling strcpy(filename_a, file_a->d_name) (line 648). However, basename() may have modified filename_a in place and may have shortened it, so the buffer still has the original allocation size and the strcpy is safe. But dirname() is then called on the result of that strcpy, and dirname() may return a pointer into the buffer or a pointer to a static string. The problem is that after basename() has returned a pointer into filename_a and been memmove'd, filename_a has been modified. The subsequent strcpy of file_a->d_name back into filename_a relies on filename_a still being large enough - which it is (strdup'd the full path) - so this particular case is safe. However, the same buffer is re-used for dirname() after being overwritten for basename(). On systems where dirname() modifies its argument in place, this is correct, but the code is fragile and relies on undocumented behavior.","fix":"Use separate strdup'd buffers for the basename and dirname computations rather than reusing the same buffer for both steps.","locations":[{"ref":"fdupes.c:647-665","code":"  647 |   /* restore paths */\n  648 |   strcpy(filename_a, file_a->d_name);\n  649 |   strcpy(filename_b, file_b->d_name);\n  650 | \n  651 |   /* get directory names */\n  652 |   dirname_a = dirname(filename_a);\n  653 |   if (stat(dirname_a, &dirstat_a) != 0)\n  654 |   {\n  655 |     free(filename_b);\n  656 |     free(filename_a);\n  657 |     return -1;\n  658 |   }\n  659 | \n  660 |   dirname_b = dirname(filename_b);\n  661 |   if (stat(dirname_b, &dirstat_b) != 0)\n  662 |   {\n  663 |     free(filename_b);\n  664 |     free(filename_a);\n  665 |     return -1;","lines":19}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In checkmatch(), when F_PERMISSIONS is set and permissions differ, cmpresult is set to -1 (line 732) to route the file to the left subtree. This means files with different permissions from the current node are always inserted to the left, regardless of their actual size relationship. Since sizes are equal at this point, an arbitrary left-insertion is used as a tiebreak. This is consistent but means files with different permissions from a node may still be compared against other subtree nodes that could be matches, potentially missing duplicate pairs that have identical content but are separated by a permissions-mismatch insertion.","fix":"The behavior is intentional for permissions-based exclusion, but the code should be clearly documented as an intentional non-match insertion rather than a sort key.","locations":[{"ref":"fdupes.c:730-732","code":"  730 |     if (ISFLAG(flags, F_PERMISSIONS) &&\n  731 |         !same_permissions(file->d_name, checktree->file->d_name))\n  732 |         cmpresult = -1;","lines":3}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In checkmatch(), when F_PERMISSIONS is set and same_permissions() returns -1 (stat failure on one of the files), cmpresult is set to -1 as if permissions differ. A stat failure is an error condition that should be propagated, not silently treated as a permissions mismatch.","fix":"Check the return value of same_permissions() for -1 (error) and handle it separately from 0 (different permissions).","locations":[{"ref":"fdupes.c:730-733","code":"  730 |     if (ISFLAG(flags, F_PERMISSIONS) &&\n  731 |         !same_permissions(file->d_name, checktree->file->d_name))\n  732 |         cmpresult = -1;\n  733 |   else {","lines":4}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"summarizematches() counts duplicate bytes using files->size (the head-of-chain file's size) for each duplicate in the chain, but it does not count the head file itself. So for a set of N identical files, it counts N-1 instances of the wasted space, omitting one copy. The summary therefore under-reports wasted space by exactly one file per set.","fix":"Either count the head file as well (add numbytes += files->size outside the tmpfile loop) or document that the count intentionally excludes the copy to keep.","locations":[{"ref":"fdupes.c:836-843","code":"  836 |       tmpfile = files->duplicates;\n  837 |       while (tmpfile != NULL)\n  838 |       {\n  839 | \tnumfiles++;\n  840 | \tnumbytes += files->size;\n  841 | \ttmpfile = tmpfile->duplicates;\n  842 |       }\n  843 |     }","lines":8}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In deletefiles() at line 1076, the loop 'while (preservestr[i] != newline)' reads more input to handle lines longer than INPUT_SIZE. When fgets fails inside the loop (line 1085-1089), the code resets preservestr[0]='\\n' and breaks - but i still holds the old value from before the realloc, so preservestr+i+1 in the fgets call on the next iteration (or the strlen on line 1091 before the break) may read from an unexpected offset. After the fgets failure break, 'i = strlen(preservestr)-1' is not re-evaluated (the break skips it), so i may be stale after the outer loop re-enters via the fgets at line 1059.","fix":"After resetting preservestr[0]='\\n'/preservestr[1]='\\0' on fgets failure, also reset i=0 before breaking, so that any subsequent iteration of the outer loop starts with a consistent i value.","locations":[{"ref":"fdupes.c:1076-1092","code":" 1076 | \twhile (preservestr[i]!='\\n'){ /* tail of buffer must be a newline */\n 1077 | \t  tstr = (char*)\n 1078 | \t    realloc(preservestr, strlen(preservestr) + 1 + INPUT_SIZE);\n 1079 | \t  if (!tstr) { /* couldn't allocate memory, treat as fatal */\n 1080 | \t    errormsg(\"out of memory!\\n\");\n 1081 | \t    exit(1);\n 1082 | \t  }\n 1083 | \n 1084 | \t  preservestr = tstr;\n 1085 | \t  if (!fgets(preservestr + i + 1, INPUT_SIZE, tty))\n 1086 | \t  {\n 1087 | \t    preservestr[0] = '\\n'; /* treat fgets() failure as if nothing was entered */\n 1088 | \t    preservestr[1] = '\\0';\n 1089 | \t    break;\n 1090 | \t  }\n 1091 | \t  i = strlen(preservestr)-1;\n 1092 | \t}","lines":17}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In getrealpath(), when the path contains a component starting with two or more dots that is NOT '..' (e.g., '..foo' or '...bar'), the inner do-while at lines 317-319 copies only the leading dots until the next non-dot character, then breaks. The lstat call on line 342 is then performed on a path ending in '..' (or '...'), treating '..foo' as the parent directory rather than as the filename it is. If lstat succeeds (the parent exists), execution continues, causing incorrect path traversal for such filenames.","fix":"Replace the do-while at lines 317-319 with a loop that copies characters until '/' or '\\0', matching the regular character handler at lines 333-335: 'do scratch[tail++] = scratch[next++]; while (scratch[next] != '\\0' && scratch[next] != '/');'","locations":[{"ref":"getrealpath.c:314-322","code":"  314 |                     else\n  315 |                     /* process .. of regular filename beginning with .. */\n  316 |                     {\n  317 |                         do\n  318 |                             scratch[tail++] = scratch[next++];\n  319 |                         while (scratch[next] == '.');\n  320 |                     }\n  321 | \n  322 |                     break;","lines":9}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The KEY_BACKSPACE handler reads oldch = (*commandbuffer)[prompt->cursor] (the character AT the cursor position) and then passes -wcwidth(oldch) as the cursor delta to update_prompt. But backspace deletes the character BEFORE the cursor (at index cursor-1), so the cursor should move back by the width of commandbuffer[cursor-1], not commandbuffer[cursor]. For wide characters the wrong width is used, leaving the visual cursor displaced from the actual edit position.","fix":"Save the character being deleted before the shift: `oldch = (*commandbuffer)[prompt->cursor - 1]` (guarded by the existing `prompt->cursor > 0` check), then pass -wcwidth(oldch) to update_prompt.","locations":[{"ref":"ncurses-getcommand.c:181-187","code":"  181 |           oldch = (*commandbuffer)[prompt->cursor];\n  182 | \n  183 |           if (prompt->cursor > 0)\n  184 |             for (c = prompt->cursor; c <= length; ++c)\n  185 |               (*commandbuffer)[c-1] = (*commandbuffer)[c];\n  186 | \n  187 |           update_prompt(promptwin, prompt, *commandbuffer, oldch != 0 ? -wcwidth(oldch) : -1);","lines":7}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"format_prompt sets prompt->allocated to size+1 after reallocating size+3 wchar_t slots (line 74 allocates size+3, line 80 records size+1). The field is used on the next call to decide whether another realloc is needed (line 72: `if (size+3 > prompt->allocated)`). Because allocated is under-reported by 2, the condition triggers reallocs unnecessarily when the new format string length is within 2 characters of the previous one.","fix":"Change line 80 to `prompt->allocated = size + 3;` to accurately track the true allocated size.","locations":[{"ref":"ncurses-prompt.c:72-80","code":"   72 |   if (size + 3 > prompt->allocated)\n   73 |   {\n   74 |     newtext = (wchar_t*)realloc(prompt->text, (size + 3) * sizeof(wchar_t));\n   75 | \n   76 |     if (newtext == 0)\n   77 |       return 0;\n   78 | \n   79 |     prompt->text = newtext;\n   80 |     prompt->allocated = size + 1;","lines":9}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In grokdir(), the size filter at line 409 checks 'info.st_size < minsize' without also checking 'minsize != -1'. When minsize is -1 (the initial value, meaning no minimum), any file with size < LLONG_MAX passes the check correctly because -1 as a long long is a large negative number and st_size >= 0 always, so this works correctly by accident. However, the maxsize check does have an explicit 'maxsize != -1' guard. The asymmetry is confusing and fragile if the sentinel value ever changes.","fix":"Add an explicit 'minsize != -1' guard for the minsize check to match the style of the maxsize check, improving clarity.","locations":[{"ref":"fdupes.c:409","code":"  409 |       if (!S_ISDIR(info.st_mode) && (((info.st_size == 0 && ISFLAG(flags, F_EXCLUDEEMPTY)) || info.st_size < minsize || (info.st_size > maxsize && maxsize != -1)))) {","lines":1}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"sort_pairs_by_arrival() ignores f1 entirely and only inspects whether f2 has duplicates. The comparison is not symmetric and does not reflect 'arrival order' in any well-defined sense. Using it as a comparator in a sort produces unpredictable results. The function also appears to be unused in the active code (no call site passes it).","fix":"Either implement a proper arrival-order comparison (e.g., using list position) or remove the function if it is dead code.","locations":[{"ref":"fdupes.c:1240-1246","code":" 1240 | int sort_pairs_by_arrival(file_t *f1, file_t *f2)\n 1241 | {\n 1242 |   if (f2->duplicates != 0)\n 1243 |     return !ISFLAG(flags, F_REVERSE) ? 1 : -1;\n 1244 | \n 1245 |   return !ISFLAG(flags, F_REVERSE) ? -1 : 1;\n 1246 | }","lines":7}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In registerpair(), when the new match is inserted at the head (back == 0 branch, lines 1300-1303), traverse->hasdupes is set to 0 and newmatch->hasdupes is set to 1. However, if traverse itself had further duplicates chained off it, those duplicates are now chained off traverse (which has hasdupes=0), making them unreachable via the standard hasdupes-first traversal pattern used in summarizematches, printmatches, and deletefiles.","fix":"When inserting newmatch at the head, newmatch should inherit traverse's duplicate chain and hasdupes status correctly. Verify that traverse->duplicates is set to NULL or that newmatch->duplicates properly absorbs the old chain.","locations":[{"ref":"fdupes.c:1298-1308","code":" 1298 |       if (back == 0)\n 1299 |       {\n 1300 | \t*matchlist = newmatch; /* update pointer to head of list */\n 1301 | \n 1302 | \tnewmatch->hasdupes = 1;\n 1303 | \ttraverse->hasdupes = 0; /* flag is only for first file in dupe chain */\n 1304 |       }\n 1305 |       else\n 1306 | \tback->duplicates = newmatch;\n 1307 | \n 1308 |       break;","lines":11}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In main(), the progress counter (line 1919) is only incremented inside the '!F_HIDEPROGRESS' block, but the progress percentage calculation divides progress by filecount. When F_HIDEPROGRESS is set, progress is never incremented, but since the block is skipped entirely this causes no displayed error. However, the initial 'progress' variable is declared as a local int at line 1513 and is shadowed by the static int in grokdir() at line 307, making the intent ambiguous.","fix":"Not a critical bug, but progress should be incremented unconditionally (outside the F_HIDEPROGRESS guard) to keep an accurate count for potential future use.","locations":[{"ref":"fdupes.c:1513","code":" 1513 |   int progress = 0;","lines":1},{"ref":"fdupes.c:1912-1920","code":" 1912 |     if (!ISFLAG(flags, F_HIDEPROGRESS)) {\n 1913 |       now = now64();\n 1914 |       if ( now - last_progress > FDUPES_PROGRESS_REFRESH_MS ) {\n 1915 |         last_progress = now;\n 1916 |         fprintf(stderr, \"\\rProgress [%d/%d] %d%% \", progress, filecount,\n 1917 |          (int)((float) progress / (float) filecount * 100.0));\n 1918 |       }\n 1919 |       progress++;\n 1920 |     }","lines":9}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In validate_file_list (ncurses-interface.c line 339), 'number' is a 'long int' and 'currentgroup->filecount' is 'size_t'. The comparison 'number > currentgroup->filecount' involves a signed-vs-unsigned comparison. On platforms where LONG_MAX < SIZE_MAX (unusual but possible), an extremely large filecount could cause the out-of-bounds check to miss. Additionally, negative values of 'number' are caught by 'number < 1' but the signed/unsigned comparison warning may indicate intent confusion.","fix":"Cast filecount to long explicitly or use an intermediate variable: 'if (number < 1 || (size_t)number > currentgroup->filecount)' or change number to size_t after validating it is non-negative.","locations":[{"ref":"ncurses-interface.c:317-354","code":"  317 |   wchar_t *wcstolcheck;\n  318 |   long int number;\n  319 |   int parts = 0;\n  320 |   int parse_error = 0;\n  321 |   int out_of_bounds_error = 0;\n  322 | \n  323 |   commandbuffer = malloc(sizeof(wchar_t) * (wcslen(commandbuffer_in)+1));\n  324 |   if (commandbuffer == 0)\n  325 |     return FILE_LIST_ERROR_OUT_OF_MEMORY;\n  326 | \n  327 |   wcscpy(commandbuffer, commandbuffer_in);\n  328 | \n  329 |   token = wcstok(commandbuffer, L\",\", &wcsptr);\n  330 | \n  331 |   while (token != NULL)\n  332 |   {\n  333 |     ++parts;\n  334 | \n  335 |     number = wcstol(token, &wcstolcheck, 10);\n  336 |     if (wcstolcheck == token || *wcstolcheck != '\\0')\n  337 |       parse_error = 1;\n  338 | \n  339 |     if (number > currentgroup->filecount || number < 1)\n  340 |       out_of_bounds_error = 1;\n  341 | \n  342 |     token = wcstok(NULL, L\",\", &wcsptr);\n  343 |   }\n  344 | \n  345 |   free(commandbuffer);\n  346 | \n  347 |   if (parts == 1 && parse_error)\n  348 |     return FILE_LIST_ERROR_UNKNOWN_COMMAND;\n  349 |   else if (parse_error)\n  350 |     return FILE_LIST_ERROR_LIST_CONTAINS_INVALID_INDEX;\n  351 |   else if (out_of_bounds_error)\n  352 |     return FILE_LIST_ERROR_INDEX_OUT_OF_RANGE;\n  353 | \n  354 |   return FILE_LIST_OK;","lines":38}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"format_status_left and format_status_right call status_text_alloc to potentially grow the status buffers, but both callers ignore the return value. If status_text_alloc returns 0 (failure), the code still calls vswprintf using the (possibly dangling) status->left or status->right pointer, causing undefined behaviour.","fix":"Capture the return value of status_text_alloc. If it returns 0, return early from format_status_left / format_status_right without calling vswprintf.","locations":[{"ref":"ncurses-status.c:102-104","code":"  102 |   status_text_alloc(status, size);\n  103 | \n  104 |   vswprintf(status->left, status->width + 1, format, ap);","lines":3},{"ref":"ncurses-status.c:121-123","code":"  121 |   status_text_alloc(status, size);\n  122 | \n  123 |   vswprintf(status->right, status->width + 1, format, ap);","lines":3}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"removeifnotchanged() calls stat() at line 36 and ignores the return value. If stat() fails (e.g. the file has already been deleted, returning ENOENT), the struct st is left uninitialised. The subsequent comparisons against st.st_dev, st.st_ino, etc. read uninitialised memory, producing unpredictable results - the check could spuriously pass, leading to remove() being called on a file that no longer exists under the expected path, or a file that has been replaced.","fix":"Check the return value of stat(). On failure, set *errorstring appropriately (e.g. strerror(errno)) and return an error code instead of proceeding.","locations":[{"ref":"removeifnotchanged.c:36-51","code":"   36 |   stat(file->d_name, &st);\n   37 | \n   38 |   if (file->device != st.st_dev ||\n   39 |       file->inode != st.st_ino ||\n   40 |       file->ctime != st.st_ctime ||\n   41 |       file->mtime != st.st_mtime ||\n   42 | #ifdef HAVE_NSEC_TIMES\n   43 |       file->ctime_nsec != st.st_ctim.tv_nsec ||\n   44 |       file->mtime_nsec != st.st_mtim.tv_nsec ||\n   45 | #endif\n   46 |       file->size != st.st_size)\n   47 |   {\n   48 |     if (errorstring != 0)\n   49 |         *errorstring = filechanged;\n   50 | \n   51 |     return -2;","lines":16}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"build_command_identifier_tree() ignores the return value of insert_command_identifier_command(). If insertion fails with COMMAND_RECOGNIZER_OUT_OF_MEMORY due to allocation failures, the function continues building an incomplete tree and returns it as if it were valid. Callers receive a partially built tree with no indication of failure.","fix":"Check the return value of insert_command_identifier_command(). On OOM, free the partially built tree with free_command_identifier_tree() and return NULL to signal failure.","locations":[{"ref":"commandidentifier.c:126-136","code":"  126 |   c = 0;\n  127 |   while (commands[c].command_name != 0)\n  128 |   {\n  129 |     insert_command_identifier_command(root, commands + c, 0);\n  130 |     ++c;\n  131 |   }\n  132 | \n  133 |   sort_command_identifier_nodes(root);\n  134 | \n  135 |   return root;\n  136 | }","lines":11}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In grokdir(), when F_EXCLUDEHIDDEN is set and the hidden-file check allocates fullname (line 385), but the newfile allocation at line 354 already linked newfile into the candidate list via 'newfile->next = *filelistp'. If a subsequent early exit path (e.g., stat failure at line 403) frees newfile and its d_name and continues, *filelistp still points to the freed newfile node (because line 360 set newfile->next = *filelistp but *filelistp was only updated to newfile later at line 445). Actually *filelistp is only updated when the file is successfully added (line 445), so the dangling link is not created. However, the early 'newfile->next = *filelistp' at line 360 means that if the code later frees newfile, the next field contains a pointer to the previous head but the list head is not updated - which is correct because *filelistp was never assigned newfile. This is actually safe but confusing.","fix":"Set newfile->next = NULL at initialization and only set it to *filelistp immediately before the '*filelistp = newfile' assignment to make the code clearer and less fragile.","locations":[{"ref":"fdupes.c:354-360","code":"  354 |       newfile = (file_t*) malloc(sizeof(file_t));\n  355 | \n  356 |       if (!newfile) {\n  357 | \terrormsg(\"out of memory!\\n\");\n  358 | \tclosedir(cd);\n  359 | \texit(1);\n  360 |       } else newfile->next = *filelistp;","lines":7},{"ref":"fdupes.c:445","code":"  445 | \t  *filelistp = newfile;","lines":1}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In the main file-processing loop (lines 1879-1908), when confirmmatch() is called for F_IMMEDIATE mode inside deletesuccessor(), file1 and file2 are passed to confirmmatch() (via deletesuccessor's matchconfirmed argument). After deletesuccessor returns, the code always calls fclose(file1) and fclose(file2) at lines 1906-1907. However, confirmmatch() or internal logic may have already closed these files (depending on the confirmmatch implementation). Double-close of a FILE* is undefined behavior.","fix":"Review confirmmatch() to ensure it does not close the FILE* arguments. If it does, remove the fclose calls after deletesuccessor. Alternatively, always fclose after confirmmatch and do not pass the result through deletesuccessor.","locations":[{"ref":"fdupes.c:1893-1907","code":" 1893 |       if (ISFLAG(flags, F_DELETEFILES) && ISFLAG(flags, F_IMMEDIATE))\n 1894 |       {\n 1895 |           deletesuccessor(match, curfile, confirmmatch(file1, file2),\n 1896 |               ordertype == ORDER_MTIME ? sort_pairs_by_mtime :\n 1897 |               ordertype == ORDER_CTIME ? sort_pairs_by_ctime :\n 1898 |                                          sort_pairs_by_filename, loginfo );\n 1899 |       }\n 1900 |       else if (ISFLAG(flags, F_DEFERCONFIRMATION) || ISFLAG(flags, F_QUICKSUMMARY) || confirmmatch(file1, file2))\n 1901 |         registerpair(match, curfile,\n 1902 |             ordertype == ORDER_MTIME ? sort_pairs_by_mtime :\n 1903 |             ordertype == ORDER_CTIME ? sort_pairs_by_ctime :\n 1904 |                                        sort_pairs_by_filename );\n 1905 | \n 1906 |       fclose(file1);\n 1907 |       fclose(file2);","lines":15}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"The three window-resize handlers in deletefiles_ncurses each call status_text_alloc(status, COLS) but discard the return value. If realloc inside status_text_alloc fails when COLS grew larger, the call returns NULL but 'status' is left with its old (smaller) width. format_status_* calls will then be called with a too-small buffer, resulting in silently truncated status text. Worse, the realloc of status->left may have moved the pointer, but the failure path frees 'newleft' while leaving status->left pointing to the freed old buffer (dangling pointer issue in ncurses-status.c:68-72).","fix":"Check the return value: 'struct status_text *new_status = status_text_alloc(status, COLS); if (new_status) status = new_status;' and handle the error case (at minimum skip the format calls or exit).","locations":[{"ref":"ncurses-interface.c:933","code":"  933 |                     status_text_alloc(status, COLS);","lines":1},{"ref":"ncurses-interface.c:1105","code":" 1105 |           status_text_alloc(status, COLS);","lines":1},{"ref":"ncurses-interface.c:1248","code":" 1248 |         status_text_alloc(status, COLS);","lines":1}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"putline stores the return value of mbstowcs_escape_invalid (which returns size_t) in an int variable. The function returns SIZE_MAX on error (via an implicit cast of -1 to size_t). When stored in int, SIZE_MAX becomes -1. The only early-exit guard checks `inputlength == 0`, so -1 passes through. The subsequent malloc call receives (-1 + 1) * sizeof(wchar_t) = 0, which may return a non-NULL sentinel. The second call to mbstowcs_escape_invalid is then invoked with n = (size_t)(-1) = SIZE_MAX, leading to a buffer overrun and crash.","fix":"Declare inputlength as size_t (matching the return type of mbstowcs_escape_invalid) and add an explicit check for the error sentinel: `if (inputlength == 0 || inputlength == (size_t)-1) return;`.","locations":[{"ref":"ncurses-print.c:33","code":"   33 |   int inputlength;","lines":1},{"ref":"ncurses-print.c:40-53","code":"   40 |   inputlength = mbstowcs_escape_invalid(0, str, 0);\n   41 |   if (inputlength == 0)\n   42 |     return;\n   43 | \n   44 |   dest = (wchar_t *) malloc((inputlength + 1) * sizeof(wchar_t));\n   45 |   if (dest == NULL)\n   46 |   {\n   47 |     endwin();\n   48 |     errormsg(\"out of memory\\n\");\n   49 |     exit(1);\n   50 |   }\n   51 | \n   52 |   mbstowcs_escape_invalid(dest, str, inputlength);\n   53 |   dest[inputlength] = L'\\0';","lines":14}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"confirmmatch() calls fseek() on both files at lines 38-39 without checking the return values. If fseek() fails (e.g. the file descriptor has become invalid between open and comparison), the subsequent fread() calls will read from whatever the current file positions happen to be, potentially producing a false positive or false negative match result.","fix":"Check fseek() return values. Return 0 (no match) if either seek fails, so the caller treats the files as non-matching and avoids acting on a corrupt comparison.","locations":[{"ref":"confirmmatch.c:38-39","code":"   38 |   fseek(file1, 0, SEEK_SET);\n   39 |   fseek(file2, 0, SEEK_SET);","lines":2}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"getdevice() and getinode() both return 0 on stat() failure (lines 129, 137). Device 0 and inode 0 are theoretically valid values on some systems, so returning 0 as an error sentinel is ambiguous. Any caller that checks 'if device == 0' to detect error would produce false positives.","fix":"These functions are only used in relink() (lines 932-933) to verify the linked file has the expected device/inode. The mismatch check already covers the error case indirectly, but the functions should ideally return a sentinel pair or set an error flag to avoid ambiguity.","locations":[{"ref":"fdupes.c:126-132","code":"  126 | dev_t getdevice(char *filename) {\n  127 |   struct stat s;\n  128 | \n  129 |   if (stat(filename, &s) !=
