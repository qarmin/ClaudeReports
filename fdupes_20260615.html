 0) return 0;\n  130 | \n  131 |   return s.st_dev;\n  132 | }","lines":7},{"ref":"fdupes.c:134-140","code":"  134 | ino_t getinode(char *filename) {\n  135 |   struct stat s;\n  136 |    \n  137 |   if (stat(filename, &s) != 0) return 0;\n  138 | \n  139 |   return s.st_ino;   \n  140 | }","lines":7}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In main(), help_text() is followed by exit(1) (line 1636). Printing help is not an error; the exit code should be 0 for '--help'.","fix":"Change exit(1) to exit(0) after help_text().","locations":[{"ref":"fdupes.c:1635-1636","code":" 1635 |       help_text();\n 1636 |       exit(1);","lines":2}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In main() at line 1792, mkdir(cachepath, FDUPES_CACHE_DIRECTORY_PERMISSIONS) is called to create the cache directory, but its return value is not checked. If the directory cannot be created (e.g., due to permissions), the subsequent hashdb_open() call will silently fail or open at a wrong path, and the error reported will be misleading.","fix":"Check the return value of mkdir and, if it fails and errno != EEXIST, report the error and exit.","locations":[{"ref":"fdupes.c:1792","code":" 1792 |     mkdir(cachepath, FDUPES_CACHE_DIRECTORY_PERMISSIONS);","lines":1}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"vwprintflength returns 0 when fopen(\"/dev/null\", \"w\") fails. All callers (format_prompt, format_status_left, format_status_right) use this 0 as the computed string length and pass it to status_text_alloc or check against prompt->allocated. A return value of 0 is indistinguishable from a zero-length format string, so callers silently proceed with a wrong size estimate, potentially truncating vswprintf output.","fix":"Return -1 on fopen failure and have callers treat a negative return as an error, skipping the vswprintf call.","locations":[{"ref":"ncurses-print.c:133-135","code":"  133 |   fp = fopen(\"/dev/null\", \"w\");\n  134 |   if (fp == 0)\n  135 |     return 0;","lines":3}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"register_sigint_handler() in sigint.c calls sigaction() without checking its return value. If signal registration fails, got_sigint will never be set, and the application will not respond gracefully to SIGINT during file operations.","fix":"Check the return value of sigaction() and handle the error (e.g. print a warning via errormsg()).","locations":[{"ref":"sigint.c:29-36","code":"   29 | void register_sigint_handler()\n   30 | {\n   31 |   struct sigaction action;\n   32 | \n   33 |   memset(&action, 0, sizeof(struct sigaction));\n   34 | \n   35 |   action.sa_handler = sigint_handler;\n   36 |   sigaction(SIGINT, &action, 0);\t","lines":8}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In now64() on Apple platforms (line 154), mach_absolute_time() returns nanoseconds, and the code divides by 1,000,000 to convert to milliseconds before applying the timebase. However, mach_absolute_time() returns raw ticks, not nanoseconds - the conversion to nanoseconds requires multiplying by numer/denom first. Dividing by 1,000,000 before scaling gives a wrong result on hardware where numer != denom (e.g., Intel Macs where numer/denom = 1/1 are common but not guaranteed; Apple Silicon can differ). The correct sequence is: nanoseconds = ticks * numer / denom, then divide by 1,000,000 for milliseconds.","fix":"Compute milliseconds as: uint64_t ns = mach_absolute_time() * sTimebaseInfo.numer / sTimebaseInfo.denom; return ns / 1000000; Handle the numer==denom==1 fast path after computing ns.","locations":[{"ref":"fdupes.c:154-165","code":"  154 |     uint64_t absolute = mach_absolute_time() / (1000 * 1000);\n  155 | \n  156 |     static mach_timebase_info_data_t sTimebaseInfo;\n  157 |     if ( sTimebaseInfo.denom == 0 ) {\n  158 |         mach_timebase_info(&sTimebaseInfo);\n  159 |     }\n  160 | \n  161 |     if ( sTimebaseInfo.numer == 1 && sTimebaseInfo.denom == 1 ) {\n  162 |         return absolute;\n  163 |     }\n  164 | \n  165 |     return absolute * sTimebaseInfo.numer / sTimebaseInfo.denom;","lines":12}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"hashdb_foreachdirectory() calls sqlite3_bind_null(query, 1) on query_foreachdirectory when parent is NULL (lines 502-503). The prepared SQL for query_foreachdirectory is 'SELECT ... FROM directories' which has no parameters. Binding to parameter index 1 on a parameterless statement returns SQLITE_RANGE, but the return value is silently discarded. The same mistake occurs in hashdb_foreachhash() at line 690, where sqlite3_bind_null(query, 1) is called on query_foreachhash which also has no parameters.","fix":"Remove the sqlite3_bind_null() calls in the else branches of both functions. No binding is needed when using the 'all rows' query variant.","locations":[{"ref":"hashdb.c:501-503","code":"  501 |   } else {\n  502 |     query = query_foreachdirectory;\n  503 |     sqlite3_bind_null(query, 1);","lines":3},{"ref":"hashdb.c:688-690","code":"  688 |   } else {\n  689 |     query = query_foreachhash;\n  690 |     sqlite3_bind_null(query, 1);","lines":3}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"fmttime() uses a static buffer (line 143: static char buf[64]) and returns a pointer to it. It is called multiple times within a single printf format string in deletefiles() (e.g., printf uses fmttime(files->mtime) and later fmttime(tmpfile->mtime) in different statements). This is safe as long as fmttime is not called twice within a single expression, but the static buffer makes the function non-reentrant and non-thread-safe.","fix":"Have the caller pass a buffer, or use a circular set of static buffers (at least 2) to make back-to-back calls safe.","locations":[{"ref":"fdupes.c:142-148","code":"  142 | char *fmttime(time_t t) {\n  143 |   static char buf[64];\n  144 | \n  145 |   strftime(buf, sizeof(buf), \"%Y-%m-%d %H:%M\", localtime(&t));\n  146 | \n  147 |   return buf;\n  148 | }","lines":7}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"escapefilename() calls strlen(filename) on every iteration of the loop (line 107 loop condition), recomputing the length each iteration. For long filenames this is O(N^2) due to repeated traversal.","fix":"Compute strlen(filename) once before the loop and store it in a variable, then use that in the loop condition.","locations":[{"ref":"fdupes.c:107","code":"  107 |   for (x = 0, tx = 0; x < strlen(filename); x++) {","lines":1}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In the main loop (lines 1868-1921), fopen() is called on both curfile and *match every time a hash match is found to perform a byte-for-byte confirmmatch(). For large duplicate sets this opens the same files repeatedly on each comparison. The files are opened, compared, and immediately closed without caching the comparison result in the file_t struct.","fix":"Cache the confirmmatch result in the file_t or tree node so re-opened files can be skipped if the pair was already confirmed. Alternatively, for --quicksummary mode the fopen/fclose pair is unnecessary since confirmmatch is skipped anyway.","locations":[{"ref":"fdupes.c:1879-1907","code":" 1879 |     if (match != NULL) {\n 1880 |       file1 = fopen(curfile->d_name, \"rb\");\n 1881 |       if (!file1) {\n 1882 | \tcurfile = curfile->next;\n 1883 | \tcontinue;\n 1884 |       }\n 1885 |       \n 1886 |       file2 = fopen((*match)->d_name, \"rb\");\n 1887 |       if (!file2) {\n 1888 | \tfclose(file1);\n 1889 | \tcurfile = curfile->next;\n 1890 | \tcontinue;\n 1891 |       }\n 1892 | \n 1893 |       if (ISFLAG(flags, F_DELETEFILES) && ISFLAG(flags, F_IMMEDIATE))\n 1894 |       {\n 1895 |           deletesuccessor(match, curfile, confirmmatch(file1, file2),\n 1896 |               ordertype == ORDER_MTIME ? sort_pairs_by_mtime :\n 1897 |               ordertype == ORDER_CTIME ? sort_pairs_by_ctime :\n 1898 |                                          sort_pairs_by_filename, loginfo );\n 1899 |       }\n 1900 |       else if (ISFLAG(flags, F_DEFERCONFIRMATION) || ISFLAG(flags, F_QUICKSUMMARY) || confirmmatch(file1, file2))\n 1901 |         registerpair(match, curfile,\n 1902 |             ordertype == ORDER_MTIME ? sort_pairs_by_mtime :\n 1903 |             ordertype == ORDER_CTIME ? sort_pairs_by_ctime :\n 1904 |                                        sort_pairs_by_filename );\n 1905 | \n 1906 |       fclose(file1);\n 1907 |       fclose(file2);","lines":29}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In getrealpath(), the size check before reallocating the scratch buffer (lines 363-378) uses an overly conservative pathlength calculation. At line 363, 'pathlength = strlen(scratch) + strlen(scratch + next)' is computed while scratch[tail] is still '\\0' (set at line 340, not yet restored at line 381). Because tail == next in the common case, strlen(scratch + next) evaluates to 0, so pathlength equals only the processed prefix length (tail). The remaining unprocessed suffix (the portion after next) is not counted. While this makes the check conservative rather than causing an overflow, it can trigger an unnecessary realloc and over-allocates 'allocated' by roughly the length of the already-processed path prefix.","fix":"Restore scratch[tail] = save before computing pathlength, or compute pathlength as strlen(link) + strlen(scratch + next) (after restore) to reflect the actual bytes that will be written.","locations":[{"ref":"getrealpath.c:363-378","code":"  363 |             pathlength = strlen(scratch) + strlen(scratch + next);\n  364 | \n  365 |             linklength = strlen(link);\n  366 | \n  367 |             if (pathlength + linklength + 1 > allocated)\n  368 |             {\n  369 |                 allocated += pathlength + linklength + 1;\n  370 | \n  371 |                 newmem = realloc(scratch, allocated);\n  372 |                 if (newmem == 0)\n  373 |                 {\n  374 |                     free(scratch);\n  375 |                     return 0;\n  376 |                 }\n  377 | \n  378 |                 scratch = newmem;","lines":16}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In the main render loop (ncurses-interface.c lines 607-701), filerowcount is called via getgroupfileindex for every rendered line of every file, which involves a malloc+mbstowcs_escape_invalid+free of the wide-character filename on every call. For large groups with many files and a long display, this causes O(files^2) allocations per screen redraw. The same rowcount computation is also done inside move_to_next_file/move_to_previous_file.","fix":"Cache the row count for each file in the groupfile struct (or a parallel array) when building or recalculating groups, and reuse it in the render loop and navigation functions.","locations":[{"ref":"ncurses-interface.c:607-701","code":"  607 |     for (x = topline; x < topline + getmaxy(filewin); ++x)\n  608 |     {\n  609 |       if (x >= totallines)\n  610 |       {\n  611 |         wclrtoeol(filewin);\n  612 |         continue;\n  613 |       }\n  614 | \n  615 |       groupindex = getgroupindex(groups, totalgroups, groupindex, x);\n  616 | \n  617 |       index_width = get_num_digits(groups[groupindex].filecount);\n  618 | \n  619 |       if (inde }","lines":53}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"vwprintflength opens and closes /dev/null on every invocation via fopen/fclose. It is called at least once per status update and once per format_prompt call (i.e., on every keystroke during interactive use). Repeated file open/close syscalls add measurable latency in a tight interactive input loop.","fix":"Use a wide-character in-memory approach instead: `vswprintf(NULL, 0, format, args)` is not portable, but a fixed large local wchar_t buffer with vswprintf is. Alternatively, cache the /dev/null FILE* as a static variable opened once.","locations":[{"ref":"ncurses-print.c:128-142","code":"  128 | int vwprintflength(const wchar_t *format, va_list args)\n  129 | {\n  130 |   FILE *fp;\n  131 |   int size;\n  132 | \n  133 |   fp = fopen(\"/dev/null\", \"w\");\n  134 |   if (fp == 0)\n  135 |     return 0;\n  136 | \n  137 |   size = vfwprintf(fp, format, args);\n  138 | \n  139 |   fclose(fp);\n  140 | \n  141 |   return size;\n  142 | }","lines":15}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In wcsendsmbcs(), wcsrstr(haystackw, needle) is called twice on line 110: once to check whether the result is non-NULL, and again inside the same conditional to pass to wcscmp(). Each call to wcsrstr() performs a full O(n*m) scan of the wide string. The result should be stored in a variable and reused.","fix":"Store the result of wcsrstr() in a local variable, then use that variable in the wcscmp() call: `wchar_t *last = wcsrstr(haystackw, needle); result = (last != 0 && wcscmp(last, needle) == 0) ? 1 : 0;`","locations":[{"ref":"wcs.c:110-113","code":"  110 |   if (wcsrstr(haystackw, needle) != 0 && wcscmp(wcsrstr(haystackw, needle), needle) == 0)\n  111 |     result = 1;\n  112 |   else\n  113 |     result = 0;","lines":4}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"sort_pairs_by_arrival() is never passed as a comparator anywhere in the codebase; only sort_pairs_by_mtime, sort_pairs_by_ctime, and sort_pairs_by_filename are used at call sites.","fix":"Remove the function or add a code path that selects it.","locations":[{"ref":"fdupes.c:1240-1246","code":" 1240 | int sort_pairs_by_arrival(file_t *f1, file_t *f2)\n 1241 | {\n 1242 |   if (f2->duplicates != 0)\n 1243 |     return !ISFLAG(flags, F_REVERSE) ? 1 : -1;\n 1244 | \n 1245 |   return !ISFLAG(flags, F_REVERSE) ? -1 : 1;\n 1246 | }","lines":7}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"getfileactionchar() in fileaction.c has no case for FILEACTION_DELIST (-2), which is defined in fileaction.h and actively used in ncurses-commands.c. When called with FILEACTION_DELIST the function falls through to the default case and returns '?', which is not a meaningful display character for this action. The missing case means any UI display of a delisted file shows an unexpected '?' character.","fix":"Add a case for FILEACTION_DELIST and return a suitable character (e.g. 'd' or ' ').","locations":[{"ref":"fileaction.c:24-38","code":"   24 | char getfileactionchar(int action)\n   25 | {\n   26 |     switch (action)\n   27 |     {\n   28 |         case FILEACTION_UNRESOLVED:\n   29 |             return ' ';\n   30 |         case FILEACTION_KEEP:\n   31 |             return '+';\n   32 |         case FILEACTION_DELETE:\n   33 |             return '-';\n   34 |         case FILEACTION_ERROR:\n   35 |             return '!';\n   36 |         default:\n   37 |             return '?';\n   38 |     }","lines":15},{"ref":"fileaction.h:28","code":"   28 | #define FILEACTION_DELIST    -2","lines":1}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In the GETREALPATH_IGNORE_MISSING_BASENAME branch of getrealpath(), the inode/device comparison at lines 183-191 is always vacuously true. stat(dirname, &st0) is called at line 147 and stat(dirname, &st) is called again at line 170 - both stat the exact same path (dirname). Unless a TOCTOU race replaces the directory between the two calls, st and st0 will always have identical st_dev and st_ino values, making the check at lines 183-191 dead code that never rejects a path. The comparison should use stat(scratch, ...) or stat(link, ...) to verify the resolved path refers to the same directory as the original dirname.","fix":"Replace the second stat call at line 170 with stat(link, &st) to compare the canonicalized path (stored in 'link') with the original dirname inode, or remove the check entirely if it is intentionally not needed.","locations":[{"ref":"getrealpath.c:147","code":"  147 |         if (stat(dirname, &st0) != 0)","lines":1},{"ref":"getrealpath.c:170-191","code":"  170 |         if (stat(dirname, &st) != 0)\n  171 |         {\n  172 |             free(link);\n  173 |             free(basename);\n  174 |             free(dirname);\n  175 |             free(scratch);\n  176 |             return 0;\n  177 |         }\n  178 | \n  179 |         free(link);\n  180 |         free(basename);\n  181 |         free(dirname);\n  182 | \n  183 |         if\n  184 |         (\n  185 |         st.st_dev != st0.st_dev ||\n  186 |         st.st_ino != st0.st_ino\n  187 |         )\n  188 |         {\n  189 |             free(scratch);\n  190 |             return 0;\n  191 |         }","lines":22}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The variable 'size_t size' is declared but never used in both cmd_select_regex (line 229) and cmd_clear_selections_regex (line 496). It appears to be a leftover from an earlier version.","fix":"Remove the unused 'size_t size' declaration from both functions.","locations":[{"ref":"ncurses-commands.c:229","code":"  229 |   size_t size;","lines":1},{"ref":"ncurses-commands.   try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}

  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}

  clearTimeout(_hashTimer);

    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);

}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
