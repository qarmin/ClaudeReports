fier decides whether a 'database is locked' error is retryable by formatting the error with `{err:?}` and doing a substring match on the resulting string. This is extremely fragile: it depends on the Debug representation of an arbitrary error chain, breaks silently if any underlying library changes its message wording, and can produce false positives if the substring appears for unrelated reasons. It also allocates a full debug string on every error path.","fix":"Match on the concrete error type (e.g. downcast to the rusqlite/diesel error and inspect its error code for SQLITE_BUSY/locked) rather than substring-matching a formatted Debug string.","locations":[{"ref":"src/agent/api.rs:98-107","code":"   98 |                     let retry = if let Some(AgentApiError::ServerUnavailable) = err.downcast_ref() {\n   99 |                         true\n  100 |                     } else if let Some(err) = err.downcast_ref::<::reqwest::Error>() {\n  101 |                         err.is_timeout() || err.is_connect()\n  102 |                     } else {\n  103 |                         // We retry these errors. Ideally it's something the\n  104 |                         // server would handle, but that's (unfortunately) hard\n  105 |                         // in practice.\n  106 |                         format!(\"{err:?}\").contains(\"database is locked\")\n  107 |                     };","lines":10,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/agent/api.rs#L98-L107"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Crate::try_from for the whitespace pkgid branch indexes `parts[..]` via slice patterns and, in the `[_, _, \"git\", repo]` arm, calls parts.pop() etc. The leading branch builds `parts` then matches fixed-arity patterns; a pkgid with unexpected whitespace structure that doesn't match any arm falls through to the catch-all bail (fine), but `parts[..]` patterns assume punctuation trimming of every token. `s.trim_matches(is_ascii_punctuation)` will also strip legitimate trailing/leading punctuation from names/versions/paths (e.g. a path token), silently corrupting the value rather than failing. This is brittle string surgery on an external format.","fix":"Prefer the PackageIdSpec::parse path for all inputs where possible, or at minimum only trim the single wrapping parentheses rather than all ascii punctuation, to avoid mangling tokens that legitimately contain punctuation.","locations":[{"ref":"src/crates/mod.rs:78-123","code":"   78 |         if pkgid.repr.contains(|c: char| c.is_ascii_whitespace()) {\n   79 |             let parts = &pkgid\n   80 |                 .repr\n   81 |                 .split_ascii_whitespace()\n   82 |                 .flat_map(|s| {\n   83 |                     // remove ()\n   84 |                     s.trim_matches(|c: char| c.is_ascii_punctuation())\n   85 |                         // split resource and protocol\n   86 |                         .split('+')\n   87 |                 })\n   88 |                 .collect::<Vec<_>>();\n   89 | \n   90 |             match parts[..] {\n   91 |                 [name, version, \"registry\", _] => Ok(Crate::Registry(RegistryCrate {\n   92 |                     name: name.to_smolstr(),\n   93 |                     version: version.to_smolstr(),\n   94 |                 })),\n   95 |                 [_, _, \"path\", path] => Ok(Crate::Path(path.to_string())),\n   96 |                 [_, _, \"git\", repo] => {\n   97 |                     if repo.starts_with(\"https://github.com\") {\n   98 |                         Ok(Crate::GitHub(repo.replace('#', \"/\").parse()?))\n   99 |                     } else {\n  100 |                         let mut parts = repo.split('#').rev().collect::<Vec<_>>();\n  101 |                         let url = parts.pop();\n  102 |                         let sha = parts.pop();\n  103 | \n  104 |                         match (url, sha) {\n  105 |                             (Some(url), None) => Ok(Crate::Git(GitRepo {\n  106 |                                 url: url.to_string(),\n  107 |                                 sha: None,\n  108 |                             })),\n  109 |                             (Some(url), Some(sha)) => Ok(Crate::Git(GitRepo {\n  110 |                                 // remove additional queries if the sha is present\n  111 |                                 // as the crate version is already uniquely determined\n  112 |                                 url: url.split('?').next().unwrap().to_string(),\n  113 |                                 sha: Some(sha.to_string()),\n  114 |                             })),\n  115 |                             _ => bail!(\"malformed git repo: {}\", repo),\n  116 |                         }\n  117 |                     }\n  118 |                 }\n  119 |                 _ => bail!(\n  120 |                     \"malformed pkgid format: {}\\n maybe the representation has changed?\",\n  121 |                     pkgid.repr\n  122 |                 ),\n  123 |             }","lines":46,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/crates/mod.rs#L78-L123"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"get_crate_version_status errors are silently coerced to Some(MissingFromIndex). `unwrap_or(Some(CrateVersionStatus::MissingFromIndex))` maps ANY error (network failure, HTTP error, parse error, crate version genuinely not in index) to the same 'missing from the index' status. A transient network/index outage during report generation will mislabel every up-to-date crate as missing from the index, with no logged warning.","fix":"Distinguish error kinds: log the error (utils::report_failure) and only use MissingFromIndex for the genuine not-found case; for transient errors return None or propagate.","locations":[{"ref":"src/report/mod.rs:274-275","code":"  274 |                 status: get_crate_version_status(&index, krate)\n  275 |                     .unwrap_or(Some(CrateVersionStatus::MissingFromIndex)),","lines":2,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/report/mod.rs#L274-L275"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"store() ignores the row count returned by mark_crate_as_completed. If zero rows match (e.g. the crate id was never inserted into experiment_crates, or the version-update step changed the id in a way that doesn't match), the crate is silently never marked complete and will be retried indefinitely. The function comment even warns about exactly this 'run this crate many times, effectively never completing it' scenario, yet the UPDATE result is discarded.","fix":"Inspect the returned usize; if 0 rows were updated when a completion was expected, log a warning (or error) so the stuck-crate condition is observable.","locations":[{"ref":"src/results/db.rs:119-119","code":"  119 |         self.mark_crate_as_completed(ex, krate)?;","lines":1,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/results/db.rs#L119"},{"ref":"src/results/db.rs:124-130","code":"  124 |     fn mark_crate_as_completed(&self, ex: &Experiment, krate: &Crate) -> Fallible<usize> {\n  125 |         self.db.execute(\n  126 |             \"UPDATE experiment_crates SET status = ?1 WHERE experiment = ?2 AND crate = ?3 \\\n  127 |              AND ( (SELECT COUNT(*) FROM results WHERE experiment = ?2 AND crate = ?3) > 1 )\",\n  128 |             &[&Status::Completed.to_string(), &ex.name, &krate.id()],\n  129 |         )\n  130 |     }","lines":7,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/results/db.rs#L124-L130"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In test_rustdoc, the `run` closure unconditionally calls remove_dir_all(host_target_dir/doc)? after every cargo invocation. If `cargo doc` fails early (before any doc/ directory is produced, e.g. a metadata or build error), the doc directory may not exist and remove_dir_all returns a NotFound error, which is propagated via `?`. This converts a normal BuildFail result into a hard task error (Err out of test_rustdoc), losing the real failure_reason and counting the crate as an infrastructure Error instead of a documentation build failure.","fix":"Ignore NotFound from remove_dir_all (e.g. match the error kind, or check path.exists() first), and run the cleanup only when the doc directory is expected; ensure the cargo result is returned even if cleanup of a missing dir 'fails'.","locations":[{"ref":"src/runner/test.rs:461-466","code":"  461 |         // Make sure to remove the built documentation\n  462 |         // There is no point in storing it after the build is done\n  463 |         remove_dir_all(build_env.host_target_dir().join(\"doc\"))?;\n  464 | \n  465 |         res\n  466 |     };","lines":6,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/runner/test.rs#L461-L466"},{"ref":"src/runner/test.rs:479-481","code":"  479 |     if let Err(err) = res {\n  480 |         return Ok(TestResult::BuildFail(failure_reason(&err)));\n  481 |     }","lines":3,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/runner/test.rs#L479-L481"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In endpoint_error, after logging, it loads the experiment and returns an error (ok_or_else 'no experiment run by this agent') if the experiment does not exist. This converts a missing-experiment case into an internal error response to the agent for what is just an error report. The agent already logged its failure; failing the error-reporting endpoint because the experiment was concurrently deleted/aborted is the wrong behavior and loses the metrics.record_error call.","fix":"If the experiment is not found, return success (or record a generic error metric) instead of bailing; the agent's error has already been logged.","locations":[{"ref":"src/server/routes/agent.rs:409-412","code":"  409 |     let ex = Experiment::get(&data.db, &error.experiment_name)?\n  410 |         .ok_or_else(|| anyhow!(\"no experiment run by this agent\"))?;\n  411 | \n  412 |     data.metrics.record_error(&auth.name, &ex.name);","lines":4,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/routes/agent.rs#L409-L412"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"EditExperiment uses assert_eq!(changes, 1) after each UPDATE. If a concurrent DeleteExperiment removed the experiment between the initial Experiment::get and these UPDATEs (the edit is not protected against the row disappearing mid-transaction in all engines), the assert would panic the process instead of returning a clean error. Asserts on DB row counts turn data races into panics.","fix":"Replace assert_eq!(changes, 1) with a returned error (e.g. ExperimentError::NotFound) so a missing row doesn't abort the process.","locations":[{"ref":"src/actions/experiments/edit.rs:63-63","code":"   63 |                     assert_eq!(changes, 1);","lines":1,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/actions/experiments/edit.rs#L63"},{"ref":"src/actions/experiments/edit.rs:116-116","code":"  116 |                 assert_eq!(changes, 1);","lines":1,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/actions/experiments/edit.rs#L116"},{"ref":"src/actions/experiments/edit.rs:126-126","code":"  126 |                 assert_eq!(changes, 1);","lines":1,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/actions/experiments/edit.rs#L126"},{"ref":"src/actions/experiments/edit.rs:136-136","code":"  136 |                 assert_eq!(changes, 1);","lines":1,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/actions/experiments/edit.rs#L136"},{"ref":"src/actions/experiments/edit.rs:146-146","code":"  146 |                 assert_eq!(changes, 1);","lines":1,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/actions/experiments/edit.rs#L146"},{"ref":"src/actions/experiments/edit.rs:156-156","code":"  156 |                 assert_eq!(changes, 1);","lines":1,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/actions/experiments/edit.rs#L156"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In RunGraph the uncompleted-crate queue is shared via a Mutex whose guard is unwrapped on every pop (`crates.lock().unwrap()`). If any worker thread panics while holding the lock, the mutex becomes poisoned and every other worker's `unwrap()` panics in turn, turning a single crate-level failure into a cascading crash of the whole run rather than a recoverable error.","fix":"Handle a poisoned lock (e.g. `.lock().unwrap_or_else(|e| e.into_inner())`) or use a queue type designed for concurrent access that does not poison.","locations":[{"ref":"src/cli.rs:435-444","code":"  435 |                     let crates =\n  436 |                         std::sync::Mutex::new(experiment.get_uncompleted_crates(&db, None)?);\n  437 |                     let res = runner::run_ex(\n  438 |                         &experiment,\n  439 |                         &workspace,\n  440 |                         &result_db,\n  441 |                         threads,\n  442 |                         &config,\n  443 |                         &|| Ok(crates.lock().unwrap().pop()),\n  444 |                     );","lines":10,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/cli.rs#L435-L444"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"GitHubList::fetch deserializes the CSV and on a per-row deserialization error returns `line?` which aborts the entire list load. A single malformed row in the upstream rust-repos github.csv fails the whole registry update, whereas malformed *names* are merely warned-and-skipped (line 61). Inconsistent resilience to bad upstream data.","fix":"Decide on a consistent policy; if partial tolerance is desired, log-and-skip rows that fail to deserialize rather than propagating the error.","locations":[{"ref":"src/crates/sources/github.rs:41-62","code":"   41 |         for line in reader.deserialize() {\n   42 |             let line: ListRepo = line?;\n   43 | \n   44 |             // Only import repos with a Cargo.toml or Cargo.lock\n   45 |             if !line.has_cargo_toml || !line.has_cargo_lock {\n   46 |                 continue;\n   47 |             }\n   48 | \n   49 |             let mut name_parts = line.name.split('/');\n   50 |             let org = name_parts.next();\n   51 |             let name = name_parts.next();\n   52 |             let trailing = name_parts.next();\n   53 | \n   54 |             if let (Some(org), Some(name), None) = (org, name, trailing) {\n   55 |                 list.push(Crate::GitHub(GitHubRepo {\n   56 |                     org: org.to_string(),\n   57 |                     name: name.to_string(),\n   58 |                     sha: None,\n   59 |                 }));\n   60 |             } else {\n   61 |                 warn!(\"skipping malformed repo name: {}\", line.name);\n   62 |             }","lines":22,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/crates/sources/github.rs#L41-L62"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"Multiple pragma_update calls in the connection manager and Database::new use .unwrap() (foreign_keys, cache_size, optimize, journal_mode WAL, synchronous NORMAL). A transient failure to set any pragma (e.g. disk/locking error during connect) panics the thread acquiring the connection instead of surfacing a recoverable r2d2 error, and connect() returning via panic rather than Err defeats the pool's retry/error-handling.","fix":"Propagate pragma_update errors (map into the manager Error / Fallible) instead of unwrapping, so the pool's connection_timeout and ErrorHandler can handle them gracefully.","locations":[{"ref":"src/db/mod.rs:26-41","code":"   26 |         connection\n   27 |             .pragma_update(None, \"foreign_keys\", \"ON\")\n   28 |             .unwrap();\n   29 | \n   30 |         // the goal of this is to try to keep `experiment_crates` mostly cached in memory.\n   31 |         // that makes it much faster to scan it for the next crate we want to serve.\n   32 |         connection\n   33 |             .pragma_update(None, \"cache_size\", \"-307200\")\n   34 |             .unwrap();\n   35 | \n   36 |         // per docs, this is recommended for relatively long-lived connections (like what we have\n   37 |         // due to the r2d2 pooling)\n   38 |         // https://www.sqlite.org/pragma.html#pragma_optimize\n   39 |         connection\n   40 |             .pragma_update(None, \"optimize\", \"0x10002\")\n   41 |             .unwrap();","lines":16,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/db/mod.rs#L26-L41"},{"ref":"src/db/mod.rs:137-151","code":"  137 |             connection\n  138 |                 .pragma_update(None, \"journal_mode\", \"WAL\")\n  139 |                 .unwrap();\n  140 |         }\n  141 | \n  142 |         // we're ok losing durability in the event of a crash, and per docs this is still safe from\n  143 |         // corruption under WAL mode.\n  144 |         if connection.pragma_query_value(None, \"synchronous\", |r| {\n  145 |             let current = r.get_ref(0)?.as_i64()?;\n  146 |             Ok(current != 1)\n  147 |         })? {\n  148 |             connection\n  149 |                 .pragma_update(None, \"synchronous\", \"NORMAL\")\n  150 |                 .unwrap();\n  151 |         }","lines":15,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/db/mod.rs#L137-L151"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"DeferredCrateSelect::resolve performs a synchronous blocking HTTP GET (utils::http::get_sync) inside what is otherwise a pure data-transformation path used during experiment creation. Network errors are propagated, but a slow/hanging URL blocks the calling thread (potentially a web request handler) with no timeout visible here. TOCTOU-style: the list is fetched at resolve time, not creation time, so two calls can yield different crate sets.","fix":"Ensure get_sync has a bounded timeout; document that resolution performs network I/O so callers can run it off the request thread.","locations":[{"ref":"src/experiments.rs:147-157","code":"  147 | impl DeferredCrateSelect {\n  148 |     pub fn resolve(self) -> Fallible<CrateSelect> {\n  149 |         let url = match self {\n  150 |             DeferredCrateSelect::Direct(v) => return Ok(v),\n  151 |             DeferredCrateSelect::Indirect(url) => url,\n  152 |         };\n  153 | \n  154 |         let body = utils::http::get_sync(url.as_str())?.text()?;\n  155 |         CrateSelect::from_newline_separated_list(&body)\n  156 |     }\n  157 | }","lines":11,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/experiments.rs#L147-L157"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Inconsistent record_progress error handling within Worker::run. In the skip branch (lines 186-195) and the prepare-failure branch (lines 263-273) a failed record_progress is merely logged via report_failure and execution continues, but in the normal task-result branches (lines 325-343) a failed record_progress is propagated with `?`, killing the entire worker thread. The same failure to talk to the server thus has wildly different consequences depending on which crate state hit it.","fix":"Choose one policy for record_progress failures (most likely: log-and-continue, matching the skip/prepare branches, since one failed report should not tear down a worker) and apply it consistently, or document why the task branch must abort.","locations":[{"ref":"src/runner/worker.rs:186-195","code":"  186 |                     if let Err(e) = self.api.record_progress(\n  187 |                         self.ex,\n  188 |                         &krate,\n  189 |                         tc,\n  190 |                         \"crate skipped\".as_bytes(),\n  191 |                         &TestResult::Skipped,\n  192 |                         None,\n  193 |                     ) {\n  194 |                         crate::utils::report_failure(&e);\n  195 |                     }","lines":10,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/runner/worker.rs#L186-L195"},{"ref":"src/runner/worker.rs:263-273","code":"  263 |                     if let Err(e) = self.api.record_progress(\n  264 |                         self.ex,\n  265 |                         &krate,\n  266 |                         tc,\n  267 |                         for s failure, then attempt to deserialize the body into the Error struct. If GitHub returns an equivalent-but-different success code, the call is reported as an error and the body parse likely fails too, producing a confusing error. Inconsistent with get_commit/get_pr_head_sha which use error_for_status().","fix":"Use response.status().is_success() (or error_for_status) consistently across all GitHub calls instead of hard-coding one exact status code per call.","locations":[{"ref":"src/server/github.rs:75-116","code":"   75 |     fn list_labels(&self, issue_url: &str) -> Fallible<Vec<Label>> {\n   76 |         let response = self\n   77 |             .build_request(Method::GET, &format!(\"{issue_url}/labels\"))\n   78 |             .send()?;\n   79 | \n   80 |         let status = response.status();\n   81 |         if status == StatusCode::OK {\n   82 |             Ok(response.json()?)\n   83 |         } else {\n   84 |             let error: Error = response.json()?;\n   85 |             Err(GitHubError::RequestFailed(status, error.message).into())\n   86 |         }\n   87 |     }\n   88 | \n   89 |     fn add_label(&self, issue_url: &str, label: &str) -> Fallible<()> {\n   90 |         let response = self\n   91 |             .build_request(Method::POST, &format!(\"{issue_url}/labels\"))\n   92 |             .json(&json!([label]))\n   93 |             .send()?;\n   94 | \n   95 |         let status = response.status();\n   96 |         if status == StatusCode::OK {\n   97 |             Ok(())\n   98 |         } else {\n   99 |             let error: Error = response.json()?;\n  100 |             Err(GitHubError::RequestFailed(status, error.message).into())\n  101 |         }\n  102 |     }\n  103 | \n  104 |     fn remove_label(&self, issue_url: &str, label: &str) -> Fallible<()> {\n  105 |         let response = self\n  106 |             .build_request(Method::DELETE, &format!(\"{issue_url}/labels/{label}\"))\n  107 |             .send()?;\n  108 | \n  109 |         let status = response.status();\n  110 |         if status == StatusCode::OK {\n  111 |             Ok(())\n  112 |         } else {\n  113 |             let error: Error = response.json()?;\n  114 |             Err(GitHubError::RequestFailed(status, error.message).into())\n  115 |         }\n  116 |     }","lines":42,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/github.rs#L75-L116"},{"ref":"src/server/github.rs:58-73","code":"   58 |     fn post_comment(&self, issue_url: &str, body: &str) -> Fallible<()> {\n   59 |         let response = self\n   60 |             .build_request(Method::POST, &format!(\"{issue_url}/comments\"))\n   61 |             .json(&json!({\n   62 |                 \"body\": body,\n   63 |             }))\n   64 |             .send()?;\n   65 | \n   66 |         let status = response.status();\n   67 |         if status == StatusCode::CREATED {\n   68 |             Ok(())\n   69 |         } else {\n   70 |             let error: Error = response.json()?;\n   71 |             Err(GitHubError::RequestFailed(status, error.message).into())\n   72 |         }\n   73 |     }","lines":16,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/github.rs#L58-L73"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"ReportsWorker::spawn stores the worker thread handle, but reports_thread runs an infinite loop; if it returns an error the outer closure logs it and immediately loops again with no backoff, which can busy-loop hammering the DB/GitHub on a persistent error (e.g. DB connection failure in Experiment::ready_for_report).","fix":"Add a sleep/backoff before respawning the reports loop after an error to avoid a tight failure loop.","locations":[{"ref":"src/server/reports.rs:163-172","code":"  163 |     pub fn spawn(&self, data: Data, github_data: Option<GithubData>) {\n  164 |         let joiner = thread::spawn(move || loop {\n  165 |             let result = reports_thread(&data.clone(), github_data.as_ref())\n  166 |                 .with_context(|| \"the reports generator thread crashed\");\n  167 |             if let Err(e) = result {\n  168 |                 utils::report_failure(&e);\n  169 |             }\n  170 |         });\n  171 |         *self.0.lock().unwrap_or_else(|e| e.into_inner()) = Some(joiner.thread().clone());\n  172 |     }","lines":10,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/reports.rs#L163-L172"},{"ref":"src/server/reports.rs:53-62","code":"   53 |     loop {\n   54 |         let mut ex = match Experiment::ready_for_report(&data.db)? {\n   55 |             Some(ex) => ex,\n   56 |             None => {\n   57 |                 // This will sleep AUTOMATIC_THREAD_WAKEUP seconds *or* until a wake is received\n   58 |                 std::thread::park_timeout(timeout);\n   59 | \n   60 |                 continue;\n   61 |             }\n   62 |         };","lines":10,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/reports.rs#L53-L62"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The error log message is missing the actual error. error!(\"error while processing metrics\") logs no context; the real error is only sent to report_failure. A reader of the logs alone cannot tell what failed.","fix":"Include the error in the log, e.g. error!(\"error while processing metrics: {err:?}\").","locations":[{"ref":"src/server/routes/metrics.rs:19-20","code":"   19 |                 error!(\"error while processing metrics\");\n   20 |                 crate::utils::report_failure(&err);","lines":2,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/routes/metrics.rs#L19-L20"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"endpoint_assets returns 404 for both a missing asset and a failure to read/decode an existing asset's content (asset.content() Err is folded into the 404 path). A genuine I/O or decode error for a known asset is reported to the client as 'not found', masking server-side problems.","fix":"Distinguish assets::load Err/None (404) from asset.content() Err (500), and report failures for known assets as server errors.","locations":[{"ref":"src/server/routes/ui/mod.rs:69-82","code":"   69 | fn endpoint_assets(path: String) -> Fallible<Response> {\n   70 |     if let Ok(asset) = assets::load(&path) {\n   71 |         if let Ok(content) = asset.content() {\n   72 |             let mut resp = Response::new(content.into_owned().into());\n   73 |             resp.headers_mut().insert(\n   74 |                 CONTENT_TYPE,\n   75 |                 HeaderValue::from_str(asset.mime().as_ref()).unwrap(),\n   76 |             );\n   77 |             return Ok(resp);\n   78 |         }\n   79 |     }\n   80 | \n   81 |     error_404()\n   82 | }","lines":14,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/routes/ui/mod.rs#L69-L82"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In get_uncompleted_crates, the UPDATE query is built with `\"?,\".repeat(params.len() - 2)` then `\"?)\"`. params includes a 1-element header (self.name) plus the chunk of crate names. This relies on every chunk having at least 1 crate so that params.len() >= 2; chunks() never yields an empty slice so it holds, but the arithmetic `params.len() - 2` would underflow-panic (usize subtract) if header length or chunk size assumptions ever change. The placeholder construction is fragile and duplicates logic that QueryUtils could provide.","fix":"Use a helper that generates exactly params.len() placeholders (e.g. join of '?' with ','), avoiding the off-by-constant `- 2` arithmetic and its underflow risk.","locations":[{"ref":"src/experiments.rs:636-654","code":"  636 |             let params_header: &[&dyn rusqlite::types::ToSql] = &[&self.name];\n  637 |             //SQLite cannot handle queries with more than 999 variables\n  638 |             for params in params.chunks(SQL_VARIABLE_LIMIT) {\n  639 |                 let params = [params_header, params].concat();\n  640 |                 let update_query = &[\n  641 |                     \"\n  642 |                     UPDATE experiment_crates\n  643 |                     SET started_at = datetime('now')\n  644 |                     WHERE experiment = ?1\n  645 |                     AND crate IN (\"\n  646 |                         .to_string(),\n  647 |                     \"?,\".repeat(params.len() - 2),\n  648 |                     \"?)\".to_string(),\n  649 |                 ]\n  650 |                 .join(\"\");\n  651 | \n  652 |                 //update the status of the previously selected crates to 'Running'\n  653 |                 transaction.execute(update_query, &params)?;\n  654 |             }","lines":19,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/experiments.rs#L636-L654"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"verify_signature uses HMAC-SHA1, which GitHub deprecated in favor of SHA-256 (X-Hub-Signature-256). The webhook handler only reads X-Hub-Signature (SHA-1) and rejects any non-sha1 algorithm. SHA-1 HMAC is still accepted by GitHub for backwards compatibility, but relying solely on it is a weak/legacy choice for webhook authentication.","fix":"Support and prefer X-Hub-Signature-256 (HMAC-SHA256) for webhook signature verification, keeping SHA-1 only as a fallback if needed.","locations":[{"ref":"src/server/routes/webhooks/mod.rs:154-189","code":"  154 | fn verify_signature(secret: &str, payload: &[u8], raw_signature: &str) -> bool {\n  155 |     type HmacSha1 = Hmac<sha1::Sha1>;\n  156 | \n  157 |     // The signature must have a =\n  158 |     if !raw_signature.contains('=') {\n  159 |         return false;\n  160 |     }\n  161 | \n  162 |     // Split the raw signature to get the algorithm and the signature\n  163 |     let splitted: Vec<&str> = raw_signature.split('=').collect();\n  164 |     let algorithm = &splitted[0];\n  165 |     let hex_signature = splitted\n  166 |         .iter()\n  167 |         .skip(1)\n  168 |         .cloned()\n  169 |         .collect::<Vec<&str>>()\n  170 |         .join(\"=\");\n  171 | \n  172 |     // Convert the signature from hex\n  173 |     let signature = if let Ok(converted) = crate::utils::hex::from_hex(&hex_signature) {\n  174 |         converted\n  175 |     } else {\n  176 |         // This is not hex\n  177 |         return false;\n  178 |     };\n  179 | \n  180 |     // Only SHA-1 is supported\n  181 |     if *algorithm != \"sha1\" {\n  182 |         return false;\n  183 |     }\n  184 | \n  185 |     // Verify the HMAC signature\n  186 |     let mut mac = HmacSha1::new_from_slice(secret.as_bytes()).unwrap();\n  187 |     mac.update(payload);\n  188 |     mac.verify_slice(&signature).is_ok()\n  189 | }","lines":36,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/routes/webhooks/mod.rs#L154-L189"},{"ref":"src/server/routes/webhooks/mod.rs:197-200","code":"  197 |     let signature = headers\n  198 |         .get(\"X-Hub-Signature\")\n  199 |         .and_then(|h| h.to_str().ok())\n  200 |         .ok_or_else(|| anyhow!(\"missing header X-Hub-Signature\\n\"))?;","lines":4,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/routes/webhooks/mod.rs#L197-L200"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"get_crate_version_status builds a reqwest request via `.body(...).unwrap()` and `builder...headers_mut().unwrap()` and `builder.body(...).unwrap()`. These unwraps assume the crates_index request and http::response::Builder never error; a malformed header value from the index server would panic the whole report generation rather than producing a recoverable error.","fix":"Propagate these with `?` (the function already returns Fallible) instead of unwrap().","locations":[{"ref":"src/report/mod.rs:191-205","code":"  191 |         let req: reqwest::blocking::Request = req\n  192 |             .body(reqwest::blocking::Body::from(vec![]))\n  193 |             .unwrap()\n  194 |             .try_into()?;\n  195 | \n  196 |         let resp = crate::utils::http::HTTP_SYNC_CLIENT.execute(req)?;\n  197 |         let mut builder = crates_index::http::Response::builder()\n  198 |             .status(resp.status())\n  199 |             .version(resp.version());\n  200 |         builder\n  201 |             .headers_mut()\n  202 |             .unwrap()\n  203 |             .extend(resp.headers().iter().map(|(k, v)| (k.clone(), v.clone())));\n  204 |         let body = resp.bytes()?;\n  205 |         let res = builder.body(Vec::from(body)).unwrap();","lines":15,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/report/mod.rs#L191-L205"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Multiple `.unwrap()` on path.as_ref().to_str() in S3Writer (and on upload_id()/key()/e_tag() AWS responses). path.to_str() returns None for non-UTF-8 paths and would panic; the AWS response field unwraps assume the service always populates them. These are panics on malformed input / unexpected API responses during upload.","fix":"Use ok_or_else/bail! to convert None into a Fallible error rather than unwrapping; report paths are ASCII so to_str rarely fails, but the AWS-response unwraps ":5,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/runner/mod.rs#L49-L53"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"ACL::allowed() performs a synchronous blocking HTTP GET to the rust-team-data service on EVERY authorization check when rust_teams is enabled. This runs inside process_command for each command line in a webhook, blocking the request thread on network I/O, and there is no caching of the rust-team permission list. A slow or unavailable team-data service stalls (or fails) every bot command. It also means a transient network error makes an authorized user appear unauthorized.","fix":"Cache the team-data permission list (github_ids) like cached_usernames is cached, refreshing it periodically / on the refresh_cache path, instead of fetching synchronously on every allowed() call.","locations":[{"ref":"src/server/auth.rs:170-179","code":"  170 |     pub fn allowed(&self, username: &str, user_id: u64) -> Fallible<bool> {\n  171 |         if self.rust_teams {\n  172 |             let url = format!(\"{}/permissions/crater.json\", team_data::BASE_URL);\n  173 |             let members: team_data::Permission = crate::utils::http::get_sync(&url)?.json()?;\n  174 |             if members.github_ids.contains(&user_id) {\n  175 |                 return Ok(true);\n  176 |             }\n  177 |         }\n  178 |         Ok(self.cached_usernames.read().unwrap().contains(username))\n  179 |     }","lines":10,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/auth.rs#L170-L179"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"ready_for_report() iterates over every unfinished experiment and runs two COUNT(*) queries (raw_progress) per experiment on the (potentially huge) results and experiment_crates tables, even though it returns at the first match. With many unfinished experiments this is O(N) extra round-trips and full-table COUNTs every time the report scheduler polls. The results-count query has no index hint and scans all rows for the experiment.","fix":"Cache per-experiment progress or maintain a running results counter; at minimum break out of the loop is already done, but avoid re-COUNTing every poll (e.g. memoize completed/all per experiment until results change).","locations":[{"ref":"src/experiments.rs:302-327","code":"  302 |     pub fn ready_for_report(db: &Database) -> Fallible<Option<Experiment>> {\n  303 |         let unfinished = Self::unfinished(db)?;\n  304 |         for ex in unfinished {\n  305 |             if ex.status == Status::ReportFailed {\n  306 |                 // Skip experiments whose report failed to generate. This avoids\n  307 |                 // constantly retrying reports (and posting a message each time\n  308 |                 // about the attempt); the retry-report command can override the\n  309 |                 // failure state. In practice we rarely *fail* to generate\n  310 |                 // reports in a clean way (instead OOMing or panicking, in which\n  311 |                 // case it is fine to automatically retry the report, as we've\n  312 |                 // not posted anything on GitHub -- it may be a problem from a\n  313 |                 // performance perspective but no more than that).\n  314 |                 continue;\n  315 |             }\n  316 |             let (completed, all) = ex.raw_progress(db)?;\n  317 |             // FIXME: We often see more results than crates -- presumably, some\n  318 |             // crates are run more than once and marked more than once, but the\n  319 |             // details are not clear. For now, just assume that we're done if we\n  320 |             // have 'more than enough' results too.\n  321 |             if completed >= all {\n  322 |                 return Ok(Some(ex));\n  323 |             }\n  324 |         }\n  325 | \n  326 |         Ok(None)\n  327 |     }","lines":26,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/experiments.rs#L302-L327"},{"ref":"src/experiments.rs:550-569","code":"  550 |     pub fn raw_progress(&self, db: &Database) -> Fallible<(u32, u32)> {\n  551 |         let results_len: u32 = db\n  552 |             .get_row(\n  553 |                 \"SELECT COUNT(*) AS count FROM results WHERE experiment = ?1;\",\n  554 |                 [&self.name.as_str()],\n  555 |                 |r| r.get(\"count\"),\n  556 |             )?\n  557 |             .unwrap();\n  558 | \n  559 |         let crates_len: u32 = db\n  560 |             .get_row(\n  561 |                 \"SELECT COUNT(*) AS count FROM experiment_crates \\\n  562 |                  WHERE experiment = ?1 AND skipped = 0;\",\n  563 |                 [&self.name.as_str()],\n  564 |                 |r| r.get(\"count\"),\n  565 |             )?\n  566 |             .unwrap();\n  567 | \n  568 |         Ok((results_len, crates_len * 2))\n  569 |     }","lines":20,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/experiments.rs#L550-L569"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"analyze_detailed clones CrateResult heavily. Each crate that is a DependsOn build-failure is cloned once per dependency (line 48), and root crates with multiple compiler-error codes are cloned once per code (line 64). CrateResult contains Strings, a Crate, and two BuildTestResults (each with a String log). For large regression sets this is a lot of deep cloning. Also line 58 does `krate.runs[toolchain].clone().unwrap().res` which clones the whole Option<BuildTestResult> just to read res, where `.as_ref().unwrap()` would avoid the clone.","fix":"Use `.as_ref().unwrap()` at line 58 to avoid the needless clone; consider storing Rc/indices instead of cloning full CrateResult per dependency/code.","locations":[{"ref":"src/report/analyzer.rs:42-72","code":"   42 |         if let BuildFail(FailureReason::DependsOn(ref deps)) =\n   43 |             krate.runs[toolchain].as_ref().unwrap().res\n   44 |         {\n   45 |             for dep in deps {\n   46 |                 tree.entry(dep.clone())\n   47 |                     .or_insert_with(Vec::new)\n   48 |                     .push(krate.clone())\n   49 |             }\n   50 |         } else {\n   51 |             root.push(krate);\n   52 |         }\n   53 |     }\n   54 | \n   55 |     for krate in root {\n   56 |         // record results only for root crates\n   57 |         if let BuildFail(FailureReason::CompilerError(codes)) =\n   58 |             krate.runs[toolchain].clone().unwrap().res\n   59 |         {\n   60 |             for code in codes {\n   61 |                 results\n   62 |                     .entry(BuildFail(FailureReason::CompilerError(btreeset![code])))\n   63 |                     .or_insert_with(Vec::new)\n   64 |                     .push(krate.clone())\n   65 |             }\n   66 |         } else {\n   67 |             results\n   68 |                 .entry(krate.runs[toolchain].as_ref().unwrap().res.clone())\n   69 |                 .or_insert_with(Vec::new)\n   70 |                 .push(krate)\n   71 |         }\n   72 |     }","lines":31,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/report/analyzer.rs#L42-L72"},{"ref":"src/report/analyzer.rs:57-59","code":"   57 |         if let BuildFail(FailureReason::CompilerError(codes)) =\n   58 |             krate.runs[toolchain].clone().unwrap().res\n   59 |         {","lines":3,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/report/analyzer.rs#L57-L59"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"write_logs_archives calls ite cedence) to reduce round-trips.","locations":[{"ref":"src/experiments.rs:329-358","code":"  329 |     pub fn find_next(db: &Database, assignee: &Assignee) -> Fallible<Option<Experiment>> {\n  330 |         // Avoid assigning two experiments to the same agent\n  331 |         if let Some(experiment) = Experiment::run_by(db, assignee)? {\n  332 |             return Ok(Some(experiment));\n  333 |         }\n  334 | \n  335 |         // Get an experiment whose requirements are met by this agent, preferring (in order of\n  336 |         // importance):\n  337 |         //    - experiments that were explicitly assigned to us.\n  338 |         //    - distributed experiments.\n  339 |         //    - experiments with a higher priority.\n  340 |         //    - older experiments.\n  341 |         Experiment::next_inner(db, Some(assignee), assignee)\n  342 |             .and_then(|ex| {\n  343 |                 ex.map_or_else(\n  344 |                     || Experiment::next_inner(db, Some(&Assignee::Distributed), assignee),\n  345 |                     |exp| Ok(Some(exp)),\n  346 |                 )\n  347 |             })\n  348 |             .and_then(|ex| {\n  349 |                 ex.map_or_else(\n  350 |                     || Experiment::next_inner(db, None, assignee),\n  351 |                     |exp| Ok(Some(exp)),\n  352 |                 )\n  353 |             })\n  354 |     }\n  355 | \n  356 |     pub fn next(db: &Database, assignee: &Assignee) -> Fallible<Option<(bool, Experiment)>> {\n  357 |         Self::find_next(db, assignee).and_then(|ex| Self::assign_experiment(db, ex, assignee))\n  358 |     }","lines":30,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/experiments.rs#L329-L358"}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"set_status issues up to two separate UPDATE statements (one for status, a second for started_at or completed_at) in two round-trips, not wrapped in a transaction. A crash between them leaves status updated but timestamp unset. Same pattern means each status change is 2 DB calls.","fix":"Combine into a single UPDATE setting status and the relevant timestamp together, or wrap in a transaction.","locations":[{"ref":"src/experiments.rs:496-525","code":"  496 |     pub fn set_status(&mut self, db: &Database, status: Status) -> Fallible<()> {\n  497 |         db.execute(\n  498 |             \"UPDATE experiments SET status = ?1 WHERE name = ?2;\",\n  499 |             &[&status.to_str(), &self.name.as_str()],\n  500 |         )?;\n  501 | \n  502 |         let now = Utc::now();\n  503 | \n  504 |         match (self.status, status) {\n  505 |             // Check if the new status is \"running\" and there is no starting date\n  506 |             (_, Status::Running) if self.started_at.is_none() => {\n  507 |                 db.execute(\n  508 |                     \"UPDATE experiments SET started_at = ?1 WHERE name = ?2;\",\n  509 |                     &[&now, &self.name.as_str()],\n  510 |                 )?;\n  511 |                 self.started_at = Some(now);\n  512 |             }\n  513 |             // Check if the old status was \"running\" and there is no completed date\n  514 |             (Status::Running, _) if self.completed_at.is_none() => {\n  515 |                 db.execute(\n  516 |                     \"UPDATE experiments SET completed_at = ?1 WHERE name = ?2;\",\n  517 |                     &[&now, &self.name.as_str()],\n  518 |                 )?;\n  519 |                 self.completed_at = Some(now);\n  520 |             }\n  521 |             _ => (),\n  522 |         }\n  523 | \n  524 |         self.status = status;\n  525 |         Ok(())","lines":30,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/experiments.rs#L496-L525"}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"get_uncompleted_crates collects selected crate names into a Vec<String>, then pushes &String refs into a params Vec, then for each chunk does `[params_header, params].concat()` allocating a new Vec per chunk, and finally re-parses each crate string into Crate. Several intermediate allocations per call; on the large-experiment path (limit 1000) this runs frequently for every agent request.","fix":"Avoid the per-chunk concat by passing the header as a fixed first bound parameter, and parse crates once.","locations":[{"ref":"src/experiments.rs:617-659","code":"  617 |         db.transaction(true, |transaction| {\n  618 |             //get the first 'limit' queued crates from the experiment crates list\n  619 |             let mut params: Vec<&dyn rusqlite::types::ToSql> = Vec::new();\n  620 |             let crates = transaction\n  621 |                 .query(\n  622 |                     &format!(\n  623 |                         \"SELECT crate FROM experiment_crates WHERE experiment = ?1\n  624 |                             AND skipped = 0\n  625 |                             AND status = 'queued'\n  626 |                             AND (started_at is null or started_at <= datetime('now', '-{RUN_TIMEOUT} minutes'))\n  627 |                         LIMIT ?2;\",\n  628 |                     ),\n  629 |                     rusqlite::params![self.name, limit],\n  630 |                     |r| r.get(\"crate\"),\n  631 |                 )?\n  632 |                 .into_iter()\n  633 |                 .collect::<Vec<String>>();\n  634 | \n  635 |             crates.iter().for_each(|krate| params.push(krate));\n  636 |             let params_header: &[&dyn rusqlite::types::ToSql] = &[&self.name];\n  637 |             //SQLite cannot handle queries with more than 999 variables\n  638 |             for params in params.chunks(SQL_VARIABLE_LIMIT) {\n  639 |                 let params = [params_header, params].concat();\n  640 |                 let update_quer e header.","fix":"Reconcile the comments and decide whether missing/mismatched version IDs should hard-error or merely warn, given the CDN behavior described.","locations":[{"ref":"src/crates/sources/registry.rs:42-54","code":"   42 |         if let Some(version) = res.headers().get(\"x-amz-version-id\") {\n   43 |             if version != self.version {\n   44 |                 return Err(std::io::Error::other(format!(\n   45 |                     \"wrong version returned in ranged GET, found {:?} but expected {:?}\",\n   46 |                     version, self.version\n   47 |                 )));\n   48 |             }\n   49 |         } else {\n   50 |             return Err(std::io::Error::other(format!(\n   51 |                 \"missing version ID in range get ({:?})\",\n   52 |                 res,\n   53 |             )));\n   54 |         }","lines":13,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/crates/sources/registry.rs#L42-L54"},{"ref":"src/crates/sources/registry.rs:121-129","code":"  121 |         // We pin the version we're reading from so we don't end up reading from two different\n  122 |         // files while streaming (partial) contents. Stale versions are retained for at least 24 hours today (per\n  123 |         // S3 lifecycle configuration) so this should work fine.\n  124 |         //\n  125 |         // Note: this actually has no effect today, the version ID is ignored by cloudfront's cache\n  126 |         // (we don't include query strings in the cache). Maybe we could hit S3 directly instead...\n  127 |         let Some(version) = head_response.headers().get(\"x-amz-version-id\") else {\n  128 |             anyhow::bail!(\"missing x-amz-version-id in response: {head_response:?}\");\n  129 |         };","lines":9,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/crates/sources/registry.rs#L121-L129"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Comment at lines 637-638 says 'SQLite cannot handle queries with more than 999 variables', but SQL_VARIABLE_LIMIT is 500, and the comment at line 14 separately notes the actual limit. The 999 figure is the historical SQLite default (SQLITE_MAX_VARIABLE_NUMBER), inconsistent with the 500 actually used, which is misleading to maintainers.","fix":"Make the comment reference SQL_VARIABLE_LIMIT and explain why 500 (margin below the 999 default) was chosen.","locations":[{"ref":"src/experiments.rs:637-638","code":"  637 |             //SQLite cannot handle queries with more than 999 variables\n  638 |             for params in params.chunks(SQL_VARIABLE_LIMIT) {","lines":2,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/experiments.rs#L637-L638"},{"ref":"src/experiments.rs:15-15","code":"   15 | static SQL_VARIABLE_LIMIT: usize = 500;","lines":1,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/experiments.rs#L15"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Comment claims the endpoint-time histogram starts at \"5ms\" but the start bucket is 0.05 seconds = 50ms, and the top bucket is 0.05 * 1.2^24 ~= 4.0s, not 'approximately 5 seconds'. Both figures in the comment are wrong/misleading.","fix":"Correct the comment to '50ms as start, top bucket ending at ~4 seconds', or adjust the bucket parameters to match the intended 5ms/5s range.","locations":[{"ref":"src/server/metrics.rs:51-56","code":"   51 |         let crater_endpoint_time = prometheus::register_histogram_vec!(\n   52 |             prometheus::HistogramOpts::new(ENDPOINT_TIME, \"duration of endpoint requests\")\n   53 |                 // Exponential buckets, with 5ms as start and top bucket ending at\n   54 |                 // approximately 5 seconds.\n   55 |                 .buckets(prometheus::exponential_buckets(0.05, 1.2, 25).unwrap()),\n   56 |             &[\"endpoint\"]","lines":6,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/metrics.rs#L51-L56"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment says cache_size pragma keeps experiment_crates 'mostly cached in memory' with value -307200. -307200 means 307200 KiB = 300 MiB of page cache, which is a fixed budget, not a guarantee the table stays resident; fine, but the adjacent 'optimize 0x10002' pragma is run at connect() time on a fresh connection where there are no query statistics yet to optimize, partially defeating the cited recommendation (PRAGMA optimize is meant to run periodically / before close, not only right after open).","fix":"Run PRAGMA optimize periodically and/or before returning connections to the pool / on shutdown, not solely at connection open; adjust the comment to reflect actual behavior.","locations":[{"ref":"src/db/mod.rs:30-41","code":"   30 |         // the goal of this is to try to keep `experiment_crates` mostly cached in memory.\n   31 |         // that makes it much faster to scan it for the next crate we want to serve.\n   32 |         connection\n   33 |             .pragma_update(None, \"cache_size\", \"-307200\")\n   34 |             .unwrap();\n   35 | \n   36 |         // per docs, this is recommended for relatively long-lived connections (like what we have\n   37 |         // due to the r2d2 pooling)\n   38 |         // https://www.sqlite.org/pragma.html#pragma_optimize\n   39 |         connection\n   40 |             .pragma_update(None, \"optimize\", \"0x10002\")\n   41 |             .unwrap();","lines":12,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/db/mod.rs#L30-L41"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment at line 14 says 'sqlite limit is ignored if the expression evaluates to a negative value', referring to the LIMIT clause; it is placed on SQL_VARIABLE_LIMIT (=500), which is about the max number of bound variables per statement, NOT the SQL LIMIT clause. The comment about negative LIMIT actually pertains to the `limit.unwrap_or(-1)` trick at line 611. The comment is attached to the wrong constant.","fix":"Move the negative-LIMIT comment to line 611 and document SQL_VARIABLE_LIMIT as the SQLite max-bound-variables-per-statement limit.","locations":[{"ref":"src/experiments.rs:14-15","code":"   14 | //sqlite limit is ignored if the expression evaluates to a negative value\n   15 | static SQL_VARIABLE_LIMIT: usize = 500;","lines":2,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/experiments.rs#L14-L15"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The comment on RecordProgressThread.queue says '// String is the worker name', but the field type is Sender<ExperimentData<ProgressData>> and there is no String worker-name involved. The comment is stale/misleading.","fix":"Remove or correct the comment to describe the actual queued type.","locations":[{"ref":"src/server/routes/agent.rs:187-189","code":"  187 | pub struct RecordProgressThread {\n  188 |     // String is the worker name\n  189 |     queue: Sender<ExperimentData<ProgressData>>,","lines":3,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/server/routes/agent.rs#L187-L189"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on FILENAME_ENCODE_SET claims it is the set of characters that cannot be used in a Windows filename, but the set is applied unconditionally (via Toolchain::to_path_component) on all platforms including Unix, where most of these characters (e.g. ':', '\\', '|') are legal. The comment misleads readers into thinking the encoding is Windows-only.","fix":"Reword the comment to state these characters are percent-encoded in path components on all platforms (chosen to be safe on Windows), not that they are merely the Windows-illegal set.","locations":[{"ref":"src/utils/mod.rs:16-28","code":"   16 | /// The set of characters which cannot be used in a [filename on Windows][windows].\n   17 | ///\n   18 | /// [windows]: https://docs.microsoft.com/en-us/windows/desktop/fileio/naming-a-file#naming-conventions\n   19 | pub(crate) const FILENAME_ENCODE_SET: AsciiSet = CONTROLS\n   20 |     .add(b'<')\n   21 |     .add(b'>')\n   22 |     .add(b':')\n   23 |     .add(b'\"')\n   24 |     .add(b'/')\n   25 |     .add(b'\\\\')\n   26 |     .add(b'|')\n   27 |     .add(b'?')\n   28 |     .add(b'*');","lines":13,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/utils/mod.rs#L16-L28"},{"ref":"src/toolchain.rs:45-49","code":"   45 |     pub fn to_path_component(&self) -> String {\n   46 |         use percent_encoding::utf8_percent_encode as encode;\n   47 | \n   48 |         encode(&self.to_string(), &utils::FILENAME_ENCODE_SET).to_string()\n   49 |     }","lines":5,"link":"https://github.com/rust-lang/crater/blob/637f5fbb37daaf0799205cbf10f4a247abeef1c1/src/toolchain.rs#L45-L49"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The crate-insertion loop and skipped-computation `!ignore_blacklist && config.should_skip(krate)` plus the experiment_crates INSERT is duplicated almost verbatim between create.rs (lines 80-86) and edit.rs (lines 96-107). The skipped/INSERT logic should be shared to avoid divergence (e.g. one uses Status::Queued.to_string()) .","fix":"Extract a helper fn insert_experiment_crates(tx, name, crates, ignore_blacklist, config) used by both create and edit.","locations": ect),\n  138 |     Indirect(Url),\n  139 | }\n  140 | \n  141 | impl From<CrateSelect> for DeferredCrateSelect {\n  142 |     fn from(v: CrateSelect) -> Self {\n  143 |         DeferredCrateSelect::Direct(v)\n  144 |     }\n  145 | }\n  146 | \n  147 | impl DeferredCrateSelect {\n  148 |     pub fn resolve(self) -> Fallible<CrateSelect> {\n  149 |         let url = match self {\n  150 |             DeferredCrateSelect::Direct(v) => return Ok(v),\n  151 |             DeferredCrateSelect::Indirect(url) => url,\n  152 |         };\n  153 | \n  154 |         let body = utils::http::get_sync(url.as_str())?.text()?;\n  155 |         CrateSelect::from_newline_separated_list(&body)\n  156 |     }\n  157 | }\n  158 | \n  159 | impl FromStr for DeferredCrateSelect {\n  160 |     type Err = anyhow::Error;\n  161 | \n  162 |     fn from_str(input: &str) -> Fallible<Self> {\n  163 |         if input.starts_with(\"https://\") || input.starts_with(\"http://\") {\n  164 |             Ok(DeferredCrateSelect::Indirect(input.parse()?))\n  165 |         } else {\n  166 |             Ok(DeferredCrateSelect::Direct(input.parse()?))\n  167 |         }\n  168 |     }\n  169 | }\n  170 | \n  171 | #[cfg_attr(test, derive(Debug, PartialEq, Eq))]\n  172 | #[derive(Clone, Serialize, Deserialize)]\n  173 | pub enum Assignee {\n  174 |     Agent(String),\n  175 |     Distributed,\n  176 |     CLI,\n  177 | }\n  178 | \n  179 | impl fmt::Display for Assignee {\n  180 |     fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n  181 |         match self {\n  182 |             Assignee::Agent(ref name) => write!(f, \"agent:{name}\"),\n  183 |             Assignee::Distributed => write!(f, \"distributed\"),\n  184 |             Assignee::CLI => write!(f, \"cli\"),\n  185 |         }\n  186 |     }\n  187 | }\n  188 | \n  189 | #[derive(Debug, thiserror::Error)]\n  190 | #[cfg_attr(test, derive(PartialEq, Eq))]\n  191 | pub enum AssigneeParseError {\n  192 |     #[error(\"the assignee is empty\")]\n  193 |     Empty,\n  194 |     #[error(\"unexpected assignee payload\")]\n  195 |     UnexpectedPayload,\n  196 |     #[error(\"invalid assignee kind: {0}\")]\n  197 |     InvalidKind(String),\n  198 | }\n  199 | \n  200 | impl FromStr for Assignee {\n  201 |     type Err = AssigneeParseError;\n  202 | \n  203 |     fn from_str(input: &str) -> Result<Self, AssigneeParseError> {\n  204 |         if input.trim().is_empty() {\n  205 |             return Err(AssigneeParseError::Empty);\n  206 |         }\n  207 | \n  208 |         let mut split = input.splitn(2, ':');\n  209 |         let kind = split.next().ok_or(AssigneeParseError::Empty)?;\n  210 | \n  211 |         match kind {\n  212 |             \"agent\" => {\n  213 |                 let name = split.next().ok_or(AssigneeParseError::Empty)?;\n  214 |                 if name.trim().is_empty() {\n  215 |                     return Err(AssigneeParseError::Empty);\n  216 |                 }\n  217 | \n  218 |                 Ok(Assignee::Agent(name.to_string()))\n  219 |             }\n  220 |             \"cli\" => {\n  221 |                 if split.next().is_some() {\n  222 |                     return Err(AssigneeParseError::UnexpectedPayload);\n  223 |                 }\n  224 | \n  225 |                 Ok(Assignee::CLI)\n  226 |             }\n  227 |             \"distributed\" => {\n  228 |                 if split.next().is_some() {\n  229 |                     return Err(AssigneeParseError::UnexpectedPayload);\n  230 |                 }\n  231 | \n  232 |                 Ok(Assignee::Distributed)\n  233 |             }\n  234 |             invalid => Err(AssigneeParseError::InvalidKind(invalid.into())),\n  235 |         }\n  236 |     }\n  237 | }\n  238 | \n  239 | #[derive(Serialize, Deserialize, Clone)]\n  240 | pub struct GitHubIssue {\n  241 |     pub api_url: String,\n  242 |     pub html_url: String,\n  243 |     pub number: i32,\n  244 | }\n  245 | \n  246 | #[derive(Serialize, Deserialize, Clone)]\n  247 | pub struct Experiment {\n  248 |     pub name: String,\n  249 |     pub toolchains: [Toolchain; 2],\n  250 |     pub mode: Mode,\n  251 |     pub cap_lints: CapLints,\n  252 |     pub priority: i32,\n  253 |     pub created_at: DateTime<Utc>,\n  254 |     pub started_at: Option<DateTime<Utc>>,\n  255 |     pub completed_at: Option<DateTime<Utc>>,\n  256 |     pub github_issue: Option<GitHubIssue>,\n  257 |     pub status: Status,\n  258 |     pub assigned_to: Option<Assignee>,\n  259 |     pub report_url: Option<String>,\n  260 |     pub ignore_blacklist: bool,\n  261 |     pub requirement: Option<String>,\n  262 | }\n  263 | \n  264 | impl Experiment {\n  265 |     pub fn exists(db: &Database, name: &str) -> Fallible<bool> {\n  266 |         Ok(db.exists(\"SELECT rowid FROM experiments WHERE name = ?1;\", &[&name])?)\n  267 |     }\n  268 | \n  269 |     pub fn unfinished(db: &Database) -> Fallible<Vec<Experiment>> {\n  270 |         let records = db.query(\n  271 |             \"SELECT * FROM experiments WHERE status != ?1 ORDER BY priority DESC, created_at;\",\n  272 |             [&Status::Completed.to_str()],\n  273 |             |r| ExperimentDBRecord::from_row(r),\n  274 |         )?;\n  275 |         records\n  276 |             .into_iter()\n  277 |             .map(|record| record.into_experiment())\n  278 |             .collect::<Fallible<_>>()\n  279 |     }\n  280 | \n  281 |     pub fn run_by(db: &Database, assignee: &Assignee) -> Fallible<Option<Experiment>> {\n  282 |         let record = db.get_row(\n  283 |             \"select * from experiments where name = (\n  284 |                 select latest_work_for from agents where ('agent:' || agents.name) = ?1\n  285 |             ) and status = ?2 \\\n  286 |             limit 1\",\n  287 |             [&assignee.to_string(), Status::Running.to_str()],\n  288 |             |r| ExperimentDBRecord::from_row(r),\n  289 |         )?;\n  290 | \n  291 |         if let Some(record) = record {\n  292 |             Ok(Some(record.into_experiment()?))\n  293 |         } else {\n  294 |             Ok(None)\n  295 |         }\n  296 |     }\n  297 | \n  298 |     // Returns the first experiment which has all results ready (and so can\n  299 |     // produce a complete report). However, the experiment should not be\n  300 |     // *completed* yet. Note that this may return an experiment which has had\n  301 |     // report generation already start.\n  302 |     pub fn ready_for_report(db: &Database) -> Fallible<Option<Experiment>> {\n  303 |         let unfinished = Self::unfinished(db)?;\n  304 |         for ex in unfinished {\n  305 |             if ex.status == Status::ReportFailed {\n  306 |                 // Skip experiments whose report failed to generate. This avoids\n  307 |                 // constantly retrying reports (and posting a message each time\n  308 |                 // about the attempt); the retry-report command can override the\n  309 |                 // failure state. In practice we rarely *fail* to generate\n  310 |                 // reports in a clean way (instead OOMing or panicking, in which\n  311 |                 // case it is fine to automatically retry the report, as we've\n  312 |                 // not posted anything on GitHub -- it may be a problem from a\n  313 |                 // performance perspective but no more than that).\n  314 |                 continue;\n  315 |             }\n  316 |             let (completed, all) = ex.raw_progress(db)?;\n  317 |             // FIXME: We often see more results than crates -- presumably, some\n  318 |             // crates are run more than once and marked more than once, but the\n  319 |             // details are not clear. For now, just assume that we're done if we\n  320 |             // have 'more than enough' results too.\n  321 |             if completed >= all {\n  322 |                 return Ok(Some(ex));\n  323 |             }\n  324 |         }\n  325 | \n  326 |         Ok(None)\n  327 |     }\n  328 | \n  329 |     pub fn find_next(db: &Database, assignee: &Assignee) -> Fallible<Option<Experiment>> {\n  330 |         // Avoid assigning two experiments to the same agent\n  331 |         if let Some(experiment) = Experiment::run_by(db, assignee)? {\n  332 |             return Ok(Some(experiment));\n  333 |         }\n  334 | \n  335 |         // Get an experiment whose requirements are met by this agent, preferring (in order of\n  336 |         // importance):\n  337 |         //    - experiments that were explicitly assigned to us.\n  338 |         //    - distributed experiments.\n  339 |         //    - experiments with a higher priority.\n  340 |         //    - older experiments.\n  341 |         Experiment::next_inner(db, Some(assignee), assignee)\n  342 |             .and_then(|ex| {\n  343 |                 ex.map_or_else(\n  344 |                     || Experiment::next_inner(db, Some(&Assignee::Distributed), assignee),\n  345 |                     |exp| Ok(Some(exp)),\n  346 |                 )\n  347 |             })\n  348 |             .and_then(|ex| {\n  349 |                 ex.map_or_else(\n  350 |                     || Experiment::next_inner(db, None, assignee),\n  351 |                     |exp| Ok(Some(exp)),\n  352 |                 )\n  353 |             })\n  354 |     }\n  355 | \n  356 |     pub fn next(db: &Database, assignee: &Assignee) -> Fallible<Option<(bool, Experiment)>> {\n  357 |         Self::find_next(db, assignee).and_then(|ex| Self::assign_experiment(db, ex, assignee))\n  358 |     }\n  359 |     pub fn has_next(db: &Database, assignee: &Assignee) -> Fallible<bool> {\n  360 |         Ok(Self::find_next(db, assignee)?.is_some())\n  361 |     }\n  362 | \n  363 |     fn assign_experiment(\n  364 |         db: &Database,\n  365 |         ex: Option<Experiment>,\n  366 |         agent: &Assignee,\n  367 |     ) -> Fallible<Option<(bool, Experiment)>> {\n  368 |         if let Some(mut experiment) = ex {\n  369 |             if let Assignee::Agent(name) = agent {\n  370 |                 db.execute(\n  371 |                     \"update agents set latest_work_for = ?2 where agents.name = ?1;\",\n  372 |                     rusqlite::params![&name, &experiment.name],\n  373 |                 )?;\n  374 |             }\n  375 | \n  376 |             let new_ex = experiment.status != Status::Running;\n  377 |             if new_ex {\n  378 |                 experiment.set_status(db, Status::Running)?;\n  379 |                 // If this experiment was not assigned to a specific agent make it distributed\n  380 |                 experiment.set_assigned_to(\n  381 |                     db,\n  382 |                     experiment\n  383 |                         .assigned_to\n  384 |                         .clone()\n  385 |                         .or(Some(Assignee::Distributed))\n  386 |                         .as_ref(),\n  387 |                 )?;\n  388 |             }\n  389 |             return Ok(Some((new_ex, experiment)));\n  390 |         }\n  391 |         Ok(None)\n  392 |     }\n  393 | \n  394 |     //CLI query is only partially implemented and is therefore preceded by \"unimplemented!\"\n  395 |     #[allow(unreachable_code)]\n  396 |     fn next_inner(\n  397 |         db: &Database,\n  398 |         assignee: Option<&Assignee>,\n  399 |         agent: &Assignee,\n  400 |     ) -> Fallible<Option<Experiment>> {\n  401 |         let agent_name = if let Assignee::Agent(agent_name) = agent {\n  402 |             agent_name.to_string()\n  403 |         } else {\n  404 |             unimplemented!(\"experiment requirements are not respected when assigning to CLI\");\n  405 |         };\n  406 | \n  407 |         let (query, params) = if let Some(assignee) = assignee {\n  408 |             match assignee {\n  409 |                 Assignee::Distributed | Assignee::Agent(_) => {\n  410 |                     const AGENT_QUERY: &str = r#\"\n  411 |                         SELECT *\n  412 |                         FROM   experiments ex\n  413 |                         WHERE (ex.status = \"queued\" OR status = \"running\")\n  414 |                                AND ( ex.assigned_to = ?1 )\n  415 |                                AND ( ex.requirement IS NULL\n  416 |                                OR ex.requirement IN (SELECT capability\n  417 |                                                      FROM   agent_capabilities\n  418 |                                                      WHERE  agent_name = ?2) )\n  419 |                         ORDER  BY ex.priority DESC,\n  420 |                                   ex.created_at\n  421 |                         LIMIT  1;\n  422 |                     \"#;\n  423 | \n  424 |                     (AGENT_QUERY, vec![assignee.to_string(), agent_name])\n  425 |                 }\n  426 |                 // FIXME: We don't respect experiment requirements when assigning experiments to the\n  427 |                 // CLI. We need to decide what capabilities the CLI should have first.\n  428 |                 _ => {\n  429 |                     unimplemented!(\n  430 |                         \"experiment requirements are not respected when assigning to CLI\"\n  431 |                     );\n  432 |                     const CLI_QUERY: &str = r#\"\n  433 |                         SELECT     *\n  434 |                         FROM       experiments ex\n  435 |                         WHERE      (ex.status = \"queued\" OR status = \"running\")\n  436 |                                    AND (ex.assigned_to IS NULL OR ex.assigned_to = ?1)\n  437 |                         ORDER BY   ex.assigned_to IS NULL,\n  438 |                                    ex.priority DESC,\n  439 |                                    ex.created_at\n  440 |                         LIMIT 1;\n  441 |                     \"#;\n  442 | \n  443 |                     (CLI_QUERY, vec![assignee.to_string()])\n  444 |                 }\n  445 |             }\n  446 |         } else {\n  447 |             const AGENT_UNASSIGNED_QUERY: &str = r#\"\n  448 |                 SELECT *\n  449 |                 FROM   experiments ex\n  450 |                 WHERE  (ex.status = \"queued\" OR status = \"running\")\n  451 |                         AND ( ex.assigned_to IS NULL )\n  452 |                         AND ( ex.requirement IS NULL\n  453 |                             OR ex.requirement IN (  SELECT capability\n  454 |                                                     FROM   agent_capabilities\n  455 |                                                     WHERE  agent_name = ?1) )\n  456 |                 ORDER  BY ex.priority DESC,\n  457 |                           ex.created_at\n  458 |                 LIMIT  1;\n  459 |             \"#;\n  460 | \n  461 |             (AGENT_UNASSIGNED_QUERY, vec![agent_name])\n  462 |         };\n  463 | \n  464 |         if let Some(record) = db.get_row(query, rusqlite::params_from_iter(params.iter()), |r| {\n  465 |             ExperimentDBRecord::from_row(r)\n  466 |         })? {\n  467 |             let ex = record.into_experiment()?;\n  468 |             let (completed, all) = ex.raw_progress(db)?;\n  469 |             // FIXME: in this case, ideally we'd start running the next\n  470 |             // experiment. In practice, this only happens with artifically short\n  471 |             // experiments (i.e., those that take less time to run than we take\n  472 |             // to generate a report), which is pretty rare. So this fix is\n  473 |             // enough to make sure we're not constantly feeding a finished\n  474 |             // experiment to our agents.\n  475 |             if completed >= all {\n  476 |                 return Ok(None);\n  477 |             }\n  478 |             Ok(Some(ex))\n  479 |         } else {\n  480 |             Ok(None)\n  481 |         }\n  482 |     }\n  483 | \n  484 |     pub fn get(db: &Datab // metrics created.\n  260 |                                 &match &result.data.result.result {\n  261 |                                     TestResult::BrokenCrate(r) => format!(\"broken-crate:{}\", r),\n  262 |                                     TestResult::PrepareFail(r) => {\n  263 |                                         format!(\"prepare-fail:{}\", to_metric(r))\n  264 |                                     }\n  265 |                                     TestResult::BuildFail(r) => {\n  266 |                                         format!(\"build-fail:{}\", to_metric(r))\n  267 |                                     }\n  268 |                                     TestResult::TestFail(r) => {\n  269 |                                         format!(\"test-fail:{}\", to_metric(r))\n  270 |                                     }\n  271 |                                     TestResult::TestSkipped => \"test-skipped\".to_owned(),\n  272 |                                     TestResult::TestPass => \"test-pass\".to_owned(),\n  273 |                                     TestResult::Skipped => \"skipped\".to_owned(),\n  274 |                                     TestResult::Error => \"error\".to_owned(),\n  275 |                                 },\n  276 |                             ])\n  277 |                             .inc();\n  278 |                     }\n  279 |                 }));\n  280 |             })\n  281 |             .unwrap();\n  282 | \n  283 |         ret\n  284 |     }\n  285 | \n  286 |     pub fn block_until_idle(&self) {\n  287 |         // Wait until there are zero in-flight requests.\n  288 |         //\n  289 |         // Note: We do **not** keep the lock here for the subsequent\n  290 |         // computation. That means that if we ever observe zero, then we're\n  291 |         // going to kick off the below computation; obviously requests may keep\n  292 |         // coming in -- we don't want to block those requests.\n  293 |         //\n
