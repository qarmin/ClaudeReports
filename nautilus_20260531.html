ile nautilus_view_model_get_item() returns items from self->sort_model. The two are kept in sync today (sort_model wraps tree_model 1:1), but querying length and items from different models is fragile: a section sorter or any future wrapping that changes item count would desynchronize n-items from get-item and break GListModel consumers.","fix":"Use the same model for both: report g_list_model_get_n_items (G_LIST_MODEL (self->sort_model)) in get_n_items (guarding for NULL), so length and item access come from one source of truth.","locations":[{"ref":"src/nautilus-view-model.c:69-94","code":"   69 | static guint\n   70 | nautilus_view_model_get_n_items (GListModel *list)\n   71 | {\n   72 |     NautilusViewModel *self = NAUTILUS_VIEW_MODEL (list);\n   73 | \n   74 |     if (self->tree_model == NULL)\n   75 |     {\n   76 |         return 0;\n   77 |     }\n   78 | \n   79 |     return g_list_model_get_n_items (G_LIST_MODEL (self->tree_model));\n   80 | }\n   81 | \n   82 | static gpointer\n   83 | nautilus_view_model_get_item (GListModel *list,\n   84 |                               guint       position)\n   85 | {\n   86 |     NautilusViewModel *self = NAUTILUS_VIEW_MODEL (list);\n   87 | \n   88 |     if (self->sort_model == NULL)\n   89 |     {\n   90 |         return NULL;\n   91 |     }\n   92 | \n   93 |     return g_list_model_get_item (G_LIST_MODEL (self->sort_model), position);\n   94 | }"}]},{"id":"LOGIC_81","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_window_slot_get_search_visible() calls g_action_get_state() and g_variant_get_boolean() then g_variant_unref(state) without checking state for NULL. If the 'search-visible' action did not have state (it always does here, so practically safe), g_variant_get_boolean(NULL) would crash. Inconsistent with nautilus_window_slot_get_search_global() which uses g_autoptr. Minor robustness/consistency issue.","fix":"Use g_autoptr(GVariant) for consistency and drop the manual n uses the wrong variable. When the first g_filename_from_uri(uri,...) returns NULL, the code fetches the file's activation URI into `activation_uri` but then calls g_filename_from_uri(uri, ...) again with the SAME `uri` rather than `activation_uri`. The recomputed `path` is therefore guaranteed to be NULL again, `activation_uri` is computed and immediately discarded (dead), and files whose plain URI is non-local but whose activation URI is local are silently dropped from the script $NAUTILUS_SCRIPT_SELECTED_FILE_PATHS string.","fix":"Change the fallback to `path = g_filename_from_uri (activation_uri, NULL, NULL);` so the activation URI is actually used.","locations":[{"ref":"src/nautilus-files-view.c:5042-5049","code":" 5042 |             path = g_filename_from_uri (uri, NULL, NULL);\n 5043 | \n 5044 |             if (path == NULL)\n 5045 |             {\n 5046 |                 g_autofree gchar *activation_uri = nautilus_file_get_activation_uri (file);\n 5047 | \n 5048 |                 path = g_filename_from_uri (uri, NULL, NULL);\n 5049 |             }"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"handle_move_uris2() completes the D-Bus invocation with nautilus_dbus_file_operations2_complete_copy_uris() instead of ...complete_move_uris(). The MoveURIs and CopyURIs methods are distinct (see data/dbus-interfaces2.xml). It currently works only by accident because both methods have an empty '()' reply signature; if MoveURIs ever gains an out argument this becomes a wire-protocol/type mismatch. It is a clear copy-paste error.","fix":"Call nautilus_dbus_file_operations2_complete_move_uris (object, invocation); in handle_move_uris2().","locations":[{"ref":"src/nautilus-dbus-manager.c:245","code":"  245 |     nautilus_dbus_file_operations2_complete_copy_uris (object, invocation);"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"nautilus_file_poll_for_media guards the vfunc call by checking NAUTILUS_FILE_GET_CLASS(file)->stop != NULL but then invokes ->poll_for_media. The wrong slot is tested. It is currently masked because both slots are initialized to default_no_op (never NULL), but the guard is incorrect and would break if either default were removed.","fix":"Test the slot actually being called: `if (NAUTILUS_FILE_GET_CLASS (file)->poll_for_media != NULL)`.","locations":[{"ref":"src/nautilus-file.c:1459-1465","code":" 1459 |     if (file->details->can_poll_for_media)\n 1460 |     {\n 1461 |         if (NAUTILUS_FILE_GET_CLASS (file)->stop != NULL)\n 1462 |         {\n 1463 |             NAUTILUS_FILE_GET_CLASS (file)->poll_for_media (file);\n 1464 |         }\n 1465 |     }"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"Loop iterates over `l` but operates on `selection->data` (always the first file) instead of `l->data`. nautilus_remove_recent_server() is therefore called repeatedly with the first selected file's address and never with the addresses of the other selected files, so removing multiple recent servers at once silently fails for all but the first.","fix":"Use `nautilus_file_get_activation_uri (NAUTILUS_FILE (l->data))` inside the loop.","locations":[{"ref":"src/nautilus-files-view.c:6774-6779","code":" 6774 |     for (GList *l = selection; l != NULL; l = l->next)\n 6775 |     {\n 6776 |         g_autofree char *address = nautilus_file_get_activation_uri (NAUTILUS_FILE (selection->data));\n 6777 | \n 6778 |         nautilus_remove_recent_server (address);\n 6779 |     }"}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"In sort_network_items() the SECTION_PREVIOUS check tests item_a twice instead of item_a and item_b. The intended condition was to apply atime sorting only when *both* items are in the PREVIOUS section. As written, any pair where item_a is PREVIOUS uses atime sort regardless of item_b's section, producing inconsistent/incorrect ordering across section boundaries.","fix":"Change the second condition to compare item_b: `get_section (item_a) == SECTION_PREVIOUS && get_section (item_b) == SECTION_PREVIOUS`.","locations":[{"ref":"src/nautilus-network-view.c:97-98","code":"   97 |     if (get_section (item_a) == SECTION_PREVIOUS &&\n   98 |         get_section (item_a) == SECTION_PREVIOUS)"}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"nautilus_properties_item_new() checks `name != NULL` twice and never validates `value`. The duplicated assertion is a copy-paste error; the second line was presumably meant to check `value`.","fix":"Change the second assertion to `g_return_val_if_fail (value != NULL, NULL);` (or remove it if value is intentionally nullable).","locations":[{"ref":"libnautilus-extension/nautilus-properties-item.c:51-52","code":"   51 |     g_return_val_if_fail (name != NULL, NULL);\n   52 |     g_return_val_if_fail (name != NULL, NULL);"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"pk_proxy_appeared_cb calls g_dbus_proxy_get_name_owner(proxy) immediately after g_dbus_proxy_new_for_bus_finish(res, &error) without first checking whether proxy is NULL. On failure g_dbus_proxy_new_for_bus_finish returns NULL and sets error; calling g_dbus_proxy_get_name_owner(NULL) dereferences a NULL proxy. The subsequent 'if (error != NULL || name_owner == NULL)' check is too late.","fix":"Check 'if (proxy == NULL) { ...show_unhandled_type_error; return; }' before calling g_dbus_proxy_get_name_owner.","locations":[{"ref":"src/nautilus-mime-actions.c:1410-1423","code":" 1410 |     proxy = g_dbus_proxy_new_for_bus_finish (res, &error);\n 1411 |     name_owner = g_dbus_proxy_get_name_owner (proxy);\n 1412 | \n 1413 |     if (error != NULL || name_owner == NULL)\n 1414 |     {\n 1415 |         g_debug (\"Couldn't call Modify on the PackageKit interface: %s\",\n 1416 |                  error != NULL ? error->message : \"no owner for PackageKit\");\n 1417 |         g_clear_error (&error);\n 1418 | \n 1419 |         /* show an unhelpful dialog */\n 1420 |         show_unhandled_type_error (parameters_install);\n 1421 | \n 1422 |         return;\n 1423 |     }"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"is_file_valid_recursive() reads '*error' to detect failure instead of relying on the g_file_query_info() return value. If a future caller passes error == NULL (allowed by the GError convention), this dereferences a NULL pointer. Also, the parent-recursion path passes the same 'error' onward, so a transient parent error aborts validation of an otherwise valid file. The convention is to branch on the function's NULL return, not on whether *error was set.","fix":"Check 'if (file_info == NULL) return FALSE;' instead of 'if (*error != NULL)'. This is robust to a NULL error argument and matches GIO conventions.","locations":[{"ref":"src/nautilus-search-engine-recent.c:75-81","code":"   75 |     file_info = g_file_query_info (file, FILE_ATTRIBS,\n   76 |                                    G_FILE_QUERY_INFO_NONE,\n   77 |                                    nautilus_search_provider_get_cancellable (self), error);\n   78 |     if (*error != NULL)\n   79 |     {\n   80 |         return FALSE;\n   81 |     }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In on_tracker_notifier_events(), when querying whether a single file is starred fails (error, NULL cursor, or no results), the code calls 'return' (line 517), which abandons processing of all remaining events in the GPtrArray for this notification batch. A transient query failure for one URN silently drops valid starred-state updates for every later event. It should skip only the offending event.","fix":"Replace 'return;' with 'continue;' (and g_clear_object the cursor if non-NULL before continuing) so the remaining events are still processed.","locations":[{"ref":"src/nautilus-tag-manager.c:508-518","code":"  508 |         if (cursor)\n  509 |         {\n  510 |             query_has_results = tracker_sparql_cursor_next (cursor, NULL, &error);\n  511 |         }\n  512 | \n  513 |         if (error || !cursor || !query_has_results)\n  514 |         {\n  515 |             g_warning (\"Couldn't query the starred files database: '%s'\", error ? error->message : \"(null error)\");\n  516 |             g_clear_error (&error);\n  517 |             return;\n  518 |         }"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"notify_unmount_show() and notify_unmount_done() split 'message' on \"\\n\" and unconditionally read strings[0] and strings[1]. If message has no newline, strings[1] is NULL and g_notification_set_body(unmount, NULL) is passed a NULL body (tolerated), but if message itself is NULL, g_strsplit(NULL, ...) is undefined / crashes. notify_unmount_show() does not null-check message (unlike notify_unmount_done which does).","fix":"Null-check message and verify strings[0]/strings[1] before use in notify_unmount_show().","locations":[{"ref":"src/nautilus-ui-utilities.c:670-696","code":"  670 | static void\n  671 | notify_unmount_show (GMountOperation *op,\n  672 |                      const gchar     *message,\n  673 |                      gpointer         user_data)\n  674 | {\n  675 |     NautilusApplication *application;\n  676 |     GNotification *unmount;\n  677 |     gchar *notification_id;\n  678 |     GIcon *icon;\n  679 |     gchar **strings;\n  680 | \n  681 |     application = nautilus_application_get_default ();\n  682 |     strings = g_strsplit (message, \"\\n\", 0);\n  683 |     icon = g_mount_get_icon (G_MOUNT (user_data));\n  684 | \n  685 |     unmount = g_notification_new (strings[0]);\n  686 |     g_notification_set_body (unmount, strings[1]);\n  687 |     g_notification_set_icon (unmount, icon);\n  688 |     g_notification_set_priority (unmount, G_NOTIFICATION_PRIORITY_URGENT);\n  689 | \n  690 |     notification_id = g_strdup_printf (\"nautilus-mount-operation-%p\", op);\n  691 |     nautilus_application_send_notification (application, notification_id, unmount);\n  692 |     g_object_unref (unmount);\n  693 |     g_object_unref (icon);\n  694 |     g_strfreev (strings);\n  695 |     g_free (notification_id);\n  696 | }"},{"ref":"src/nautilus-ui-utilities.c:637-668","code":"  637 | static void\n  638 | notify_unmount_done (GMountOperation *op,\n  639 |                      const gchar     *message,\n  640 |                      gpointer         user_data)\n  641 | {\n  642 |     NautilusApplication *application;\n  643 |     gchar *notification_id;\n  644 | \n  645 |     application = nautilus_application_get_default ();\n  646 |     notification_id = g_strdup_printf (\"nautilus-mount-operation-%p\", op);\n  647 |     nautilus_application_withdraw_notification (application, notification_id);\n  648 | \n  649 |     if (message != NULL)\n  650 |     {\n  651 |         GNotification *unplug;\n  652 |         GIcon *icon;\n  653 |         gchar **strings;\n  654 | \n  655 |         strings = g_strsplit (message, \"\\n\", 0);\n  656 |         icon = g_mount_get_symbolic_icon (G_MOUNT (user_data));\n  657 |         unplug = g_notification_new (strings[0]);\n  658 |         g_notification_set_body (unplug, strings[1]);\n  659 |         g_notification_set_icon (unplug, icon);\n  660 | \n  661 |         nautilus_application_send_notification (application, notification_id, unplug);\n  662 |         g_object_unref (unplug);\n  663 |         g_object_unref (icon);\n  664 |         g_strfreev (strings);\n  665 |     }\n  666 | \n  667 |     g_free (notification_id);\n  668 | }"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In totem_properties_view_init, if gst_discoverer_new() fails it logs err->message but the GError is created via gst_discoverer_new only on failure; the code does g_error_free(err) which is correct, but on the success path `err` is leaked only if gst sets it on success (it does not). The real issue: if discoverer creation fails, priv->disco stays NULL and totem_properties_view_new still returns a model that will never be populated, with no user-visible error item appended. Minor robustness gap.","fix":"Optionally append an error NautilusPropertiesItem when the discoverer cannot be created so the user sees feedback.","locations":[{"ref":"extensions/audio-video-properties/totem-properties-view.c:403-409","code":"  403 |     props->priv->disco = gst_discoverer_new (GST_SECOND * 60, &err);\n  404 |     if (props->priv->disco == NULL)\n  405 |     {\n  406 |         g_warning (\"Could not create discoverer object: %s\", err->message);\n  407 |         g_error_free (err);\n  408 |         return;\n  409 |     }"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"These interface wrapper functions call NAUTILUS_*_GET_IFACE(provider) before the g_return_val_if_fail(NAUTILUS_IS_*_PROVIDER(provider)) type check. If `provider` is NULL or not the right type, the GET_IFACE macro dereferences it (or asserts inside the GTypeInstance lookup) before the intended early-return guard runs, defeating the purpose of the assertion.","fix":"Move the g_return_val_if_fail (NAUTILUS_IS_MENU_PROVIDER (provider), NULL) check before the GET_IFACE call (as done in the other provider files).","locations":[{"ref":"libnautilus-extension/nautilus-menu-provider.c:78-80","code":"   78 |     iface = NAUTILUS_MENU_PROVIDER_GET_IFACE (provider);\n   79 | \n   80 |     g_return_val_if_fail (NAUTILUS_IS_MENU_PROVIDER (provider), NULL);"},{"ref":"libnautilus-extension/nautilus-menu-provider.c:104-107","code":"  104 |     iface = NAUTILUS_MENU_PROVIDER_GET_IFACE (provider);\n  105 | \n  106 |     g_return_val_if_fail (NAUTILUS_IS_MENU_PROVIDER (provider), NULL);\n  107 |     g_return_val_if_fail (NAUTILUS_IS_FILE_INFO (current_folder), NULL);"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"nautilus_application_startup() calls init_external_window_display(&error); if the display is NULL it logs error->message. But the condition is `display == NULL || error != NULL`, and on a NULL display with a NULL error (the function could plausibly return NULL without setting error), error->message would be a NULL-pointer dereference. The g_message uses error->message unconditionally inside the branch.","fix":"Guard the message: use error != NULL ? error->message : \"unknown error\", or only dereference error after confirming it is non-NULL.","locations":[{"ref":"src/nautilus-application.c:972-978","code":"  972 |     g_autoptr (GError) error = NULL;\n  973 |     GdkDisplay *display = init_external_window_display (&error);\n  974 |     if (display == NULL || error != NULL)\n  975 |     {\n  976 |         g_message (\"Failed to initialize display server connection: %s\",\n  977 |                    error->message);\n  978 |     }"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"activatable_names_received() calls g_variant_get(names, \"(^as)\", ...) inside the 'error == NULL' branch, but 'names' could still be NULL if g_dbus_proxy_call_finish returned NULL without setting error is not expected; however on the error!=NULL path 'names' is NULL and activatable_names stays NULL which is handled. The dereference of error->message in the warning is fine. The latent issue is that 'names' is assumed non-NULL whenever error==NULL, which holds for GDBus, so this is informational/minor.","fix":"Optionally guard 'names != NULL' before g_variant_get for robustness.","locations":[{"ref":"src/nautilus-dbus-launcher.c:137-141","code":"  137 |     names = g_dbus_proxy_call_finish (G_DBUS_PROXY (object), res, &error);\n  138 |     if (error == NULL)\n  139 |     {\n  140 |         g_variant_get (names, \"(^as)\", &activatable_names);\n  141 |     }"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"nautilus_report_error_renaming_file() dereferences error->domain/error->code with no NULL check on 'error', unlike the sibling functions (loading_directory, setting_group, setting_owner, setting_permissions) which all guard 'if (error == NULL) return;'. A NULL error here crashes.","fix":"Add an 'if (error == NULL) return;' guard at the top, consistent with the other report functions.","locations":[{"ref":"src/nautilus-error-reporting.c:184-193","code":"  184 | nautilus_report_error_renaming_file (NautilusFile *file,\n  185 |                                      const char   *new_name,\n  186 |                                      GError       *error,\n  187 |                                      GtkWidget    *parent)\n  188 | {\n  189 |     g_autofree char *message = NULL;\n  190 | \n  191 |     const char *file_name = nautilus_file_get_display_name (file);\n  192 | \n  193 |     if (error->domain == G_IO_ERROR)"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"delete_trash_file() (used by Empty Trash and by eject-with-empty-trash) ignores all errors: the child enumeration passes NULL for GError and the final g_file_delete() at line 7395 also passes NULL. If deletion of trashed items silently fails (permissions, busy, backend error), the user receives no feedback and Empty Trash appears to succeed while items remain. Other delete paths in this file surface errors via show_skip_dialog; this one does not.","fix":"Capture and report (or at least log) deletion errors so the user is informed when Empty Trash cannot remove some items.","locations":[{"ref":"src/nautilus-file-operations.c:7388-7396","code":" 7388 |             g_file_enumerator_close (enumerator, job->cancellable, NULL);\n 7389 |             g_object_unref (enumerator);\n 7390 |         }\n 7391 |     }\n 7392 | \n 7393 |     if (!job_aborted (job) && del_file)\n 7394 |     {\n 7395 |         g_file_delete (file, job->cancellable, NULL);\n 7396 |     }"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"populate_completions_model() calls g_task_propagate_pointer() and then immediately iterates `completions->len` without checking whether completions is NULL. g_task_had_error() is checked at the top (returns early on error), but propagate_pointer can still theoretically return NULL on a cancelled/edge case while had_error is false is unlikely; still, the error out-param is read into `error` and never used, and a NULL completions would crash.","fix":"Guard `if (completions == NULL) return;` after propagate, or assert; remove the unused error variable or log it.","locations":[{"ref":"src/nautilus-location-entry.c:443-453","code":"  443 |     g_autoptr (GError) error = NULL;\n  444 | \n  445 |     g_autoptr (GPtrArray) completions = g_task_propagate_pointer (task, &error);\n  446 | \n  447 |     for (guint i = 0; i < completions->len; i++)\n  448 |     {\n  449 |         char *completion = g_ptr_array_index (completions, i);\n  450 | \n  451 |         gtk_list_store_append (priv->completions_store, &iter);\n  452 |         gtk_list_store_set (priv->completions_store, &iter, 0, completion, -1);\n  453 |     }"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"vfs_file_unmount_callback (and the structurally identical eject/start/stop/poll callbacks) dereference error->domain and error->code immediately after `!unmounted` without first checking error != NULL. GIO guarantees error is set when the *_finish() call returns FALSE, so this is safe by contract, but it is brittle: any backend returning FALSE without setting error would crash. The pattern is duplicated five times.","fix":"Add an explicit `error != NULL &&` to the conditions, e.g. `if (!unmounted && error != NULL && error->domain == G_IO_ERROR && ...)`.","locations":[{"ref":"src/nautilus-vfs-file.c:307-317","code":"  307 |     unmounted = g_file_unmount_mountable_with_operation_finish (G_FILE (source_object),\n  308 |                                                                 res, &error);\n  309 | \n  310 |     if (!unmounted &&\n  311 |         error->domain == G_IO_ERROR &&\n  312 |         (error->code == G_IO_ERROR_FAILED_HANDLED ||\n  313 |          error->code == G_IO_ERROR_CANCELLED))\n  314 |     {\n  315 |         g_error_free (error);\n  316 |         error = NULL;\n  317 |     }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"on_file_drop() is bound to the GtkDropTarget::drop signal (see nautilus-file-chooser.blp:290 `drop => $on_file_drop()`), whose handler signature returns gboolean indicating whether the drop was accepted. This handler is declared returning void, so the value GTK reads as the drop result is an undefined/garbage stack value. Compare with on_row_drop() in nautilus-column-chooser.c which correctly returns gboolean.","fix":"Change on_file_drop() to return gboolean and `return TRUE;` after handling the drop.","locations":[{"ref":"src/nautilus-file-chooser.c:362-397","code":"  362 | static void\n  363 | on_file_drop (GtkDropTarget *target,\n  364 |               const GValue  *value,\n  365 |               gdouble        x,\n  366 |               gdouble        y,\n  367 |               gpointer       user_data)\n  368 | {\n  369 |     GSList *locations = g_value_get_boxed (value);\n  370 | \n  371 |     g_return_if_fail (locations != NULL);\n  372 | \n  373 |     g_autolist (NautilusFile) selection = NULL;\n  374 |     g_autoptr (GFile) location = NULL;\n  375 |     NautilusFileChooser *self = user_data;\n  376 | \n  377 |     for (GSList *l = locations; l != NULL; l = l->next)\n  378 |     {\n  379 |         selection = g_list_prepend (selection, nautilus_file_get (l->data));\n  380 |     }\n  381 | \n  382 |     selection = g_list_reverse (selection);\n  383 | \n  384 |     if (nautilus_file_opens_in_view (selection->data) &&\n  385 |         self->mode != NAUTILUS_MODE_OPEN_FOLDER &&\n  386 |         self->mode != NAUTILUS_MODE_OPEN_FOLDERS)\n  387 |     {\n  388 |         /* If it's a folder go into the folder unless you want to open that folder */\n  389 |         location = g_object_ref (locations->data);\n  390 |     }\n  391 |     else\n  392 |     {\n  393 |         location = g_file_get_parent (locations->data);\n  394 |     }\n  395 | \n  396 |     nautilus_window_slot_open_location_full (self->slot, location, selection);\n  397 | }"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"NautilusMinimalCell PROP_PAINTABLE is declared READWRITE but its setter stores the value without taking a reference (`self->paintable = g_value_get_object (value);`), while dispose() unrefs it with g_clear_object(). This only happens to balance because the single caller (search popover) leaks its transfer-full reference into the property. Any second set, a g_object_get round-trip, or a caller that owns the paintable would cause an unref of an unowned object (use-after-free) or a leak. The sibling string props use g_set_str() (copy) inconsistently.","fix":"Take a reference in the setter: `g_set_object (&self->paintable, g_value_get_object (value));` (and make the caller use g_autoptr / unref its own reference), so set/unref are balanced regardless of caller behavior.","locations":[{"ref":"src/nautilus-minimal-cell.c:95-99","code":"   95 |         case PROP_PAINTABLE:\n   96 |         {\n   97 |             self->paintable = g_value_get_object (value);\n   98 |         }\n   99 |         break;"},{"ref":"src/nautilus-minimal-cell.c:130","code":"  130 |     g_clear_object (&self->paintable);"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"nautilus_tag_manager_star_files()/unstar_files() build the SPARQL query by directly interpolating file URIs via g_string_append_printf with '<%s>'. URIs are not escaped/validated for SPARQL, so a URI containing '>' or other IRI-breaking characters could corrupt the query or constitute injection. The same pattern is in nautilus_tag_manager_update_moved_uris(). Filenames are user-controlled.","fix":"Use parameterized TrackerSparqlStatement with bound IRI parameters, or properly escape IRIs, instead of string interpolation.","locations":[{"ref":"src/nautilus-tag-manager.c:345-358","code":"  345 |     query = g_string_new (\"DELETE DATA {\");\n  346 | \n  347 |     for (l = selection; l != NULL; l = l->next)\n  348 |     {\n  349 |         g_autofree gchar *uri = NULL;\n  350 | \n  351 |         file = l->data;\n  352 | \n  353 |         uri = nautilus_file_get_uri (file);\n  354 |         g_string_append_printf (query,\n  355 |                                 \"    <%s> a nautilus:File ; \"\n  356 |                                 \"        nautilus:starred true . \",\n  357 |                                 uri);\n  358 |     }"},{"ref":"src/nautilus-tag-manager.c:373-386","code":"  373 |     query = g_string_new (\"INSERT DATA {\");\n  374 | \n  375 |     for (l = selection; l != NULL; l = l->next)\n  376 |     {\n  377 |         g_autofree gchar *uri = NULL;\n  378 | \n  379 |         file = l->data;\n  380 | \n  381 |         uri = nautilus_file_get_uri (file);\n  382 |         g_string_append_printf (query,\n  383 |                                 \"    <%s> a nautilus:File ; \"\n  384 |                                 \"        nautilus:starred true . \",\n  385 |                                 uri);\n  386 |     }"},{"ref":"src/nautilus-tag-manager.c:858-880","code":"  858 |     query = g_string_new (\"DELETE DATA {\");\n  859 | \n  860 |     for (guint i = 0; i < old_uris->len; i++)\n  861 |     {\n  862 |         gchar *old_uri = g_ptr_array_index (old_uris, i);\n  863 |         g_string_append_printf (query,\n  864 |                                 \"    <%s> a nautilus:File ; \"\n  865 |                                 \"        nautilus:starred true . \",\n  866 |                                 old_uri);\n  867 |     }\n  868 | \n  869 |     g_string_append (query, \"} ; INSERT DATA {\");\n  870 | \n  871 |     for (guint i = 0; i < new_uris->len; i++)\n  872 |     {\n  873 |         gchar *new_uri = g_ptr_array_index (new_uris, i);\n  874 |         g_string_append_printf (query,\n  875 |                                 \"    <%s> a nautilus:File ; \"\n  876 |                                 \"        nautilus:starred true . \",\n  877 |                                 new_uri);\n  878 |     }\n  879 | \n  880 |     g_string_append (query, \"}\");"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"setup_database() dereferences '*error' (if (*error)) to detect failure after each tracker call. This is incorrect GError usage: the boolean/return value or a NULL out-pointer should drive control flow, and *error is only valid to read after a call that documents setting it on failure. tracker_sparql_connection_new() etc. set *error on failure, but reading *error when the caller may have passed error pointing at a pre-set value, or relying on it instead of the documented NULL return, is fragile. If 'error' (the GError**) itself were NULL this would crash, though here it is always non-NULL.","fix":"Check the function return values (e.g. self->db == NULL, statement == NULL) rather than '*error', following GLib conventions.","locations":[{"ref":"src/nautilus-tag-manager.c:682-713","code":"  682 |     self->db = tracker_sparql_connection_new (TRACKER_SPARQL_CONNECTION_FLAGS_NONE,\n  683 |                                               store,\n  684 |                                               ontology,\n  685 |                                               cancellable,\n  686 |                                               error);\n  687 | \n  688 |     if (*error)\n  689 |     {\n  690 |         return FALSE;\n  691 |     }\n  692 | \n  693 |     /* Prepare reusable queries. */\n  694 |     self->query_file_is_starred = tracker_sparql_connection_query_statement (self->db,\n  695 |                                                                              QUERY_FILE_IS_STARRED,\n  696 |                                                                              cancellable,\n  697 |                                                                              error);\n  698 | \n  699 |     if (*error)\n  700 |     {\n  701 |         return FALSE;\n  702 |     }\n  703 | \n  704 |     self->query_starred_files = tracker_sparql_connection_query_statement (self->db,\n  705 |                                                                            QUERY_STARRED_FILES,\n  706 |                                                                            cancellable,\n  707 |                                                                            error);\n  708 | \n  709 |     if (*error)\n  710 |     {\n  711 |         return FALSE;\n  712 |     }\n  713 | "}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"get_property for the x-content-types boxed G_TYPE_STRV property passes the address of the field (char***) to g_value_set_boxed() instead of the strv itself. g_value_set_boxed expects a `char **` for G_TYPE_STRV and will copy/treat the pointer as a strv, leading to wrong data or a crash if the property is ever read.","fix":"Pass the strv directly: `g_value_set_boxed (value, bar->x_content_types);`","locations":[{"ref":"src/nautilus-x-content-bar.c:262","code":"  262 |             g_value_set_boxed (value, &bar->x_content_types);"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"update_video() builds the dimensions string with N_(\"%d × %d\"). N_() is only a gettext extraction marker and performs no runtime translation, so this string is never translated (unlike the surrounding _() strings). Either it should be _() or, since it has no translatable words, marking is pointless.","fix":"Use g_strdup_printf (\"%d × %d\", width, height) without the N_() marker, or _() if translation is desired.","locations":[{"ref":"extensions/audio-video-properties/totem-properties-view.c:239","code":"  239 |     string = g_strdup_printf (N_(\"%d × %d\"), width, height);"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"NautilusMenuItem PROP_MENU setter does an unconditional `g_object_ref (g_value_get_object (value))`. If a NULL menu is set (e.g. clearing a submenu), g_object_ref(NULL) emits a critical and stores NULL; the old menu's previous unref already happened so behavior is inconsistent. It also does not use g_set_object, so setting the same menu twice would unref-then-ref unnecessarily.","fix":"Use g_set_object (&priv->menu, g_value_get_object (value)); then notify.","locations":[{"ref":"libnautilus-extension/nautilus-menu-item.c:248-257","code":"  248 |         case PROP_MENU:\n  249 |         {\n  250 |             if (priv->menu)\n  251 |             {\n  252 |                 g_object_unref (priv->menu);\n  253 |             }\n  254 |             priv->menu = g_object_ref (g_value_get_object (value));\n  255 |             g_object_notify (object, \"menu\");\n  256 |         }\n  257 |         break;"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"schedule_dbus_location_update() casts update_dbus_opened_locations (signature: void(NautilusApplication*)) to GSourceOnceFunc (void(gpointer)) for g_timeout_add_once. This relies on the calling-convention compatibility of a single-pointer function being called as gpointer-taking function. It works on common ABIs but is technically an incompatible-function-pointer cast; combined with the timeout firing after the application could be finalizing, the only safeguard is g_clear_handle_id in finalize, which is correct here. Flagged as a fragile cast.","fix":"Provide a small wrapper with GSourceOnceFunc signature that calls update_dbus_opened_locations(self), instead of casting.","locations":[{"ref":"src/nautilus-application.c:1148-1159","code":" 1148 | static void\n 1149 | schedule_dbus_location_update (NautilusApplication *self)\n 1150 | {\n 1151 |     static guint dbus_update_delay_ms = 100;\n 1152 | \n 1153 |     /* Avoid updating too often by bundling multiple signals */\n 1154 |     if (self->dbus_location_update_timeout_id == 0)\n 1155 |     {\n 1156 |         self->dbus_location_update_timeout_id = g_timeout_add_once (\n 1157 |             dbus_update_delay_ms, (GSourceOnceFunc) update_dbus_opened_locations, self);\n 1158 |     }\n 1159 | }"},{"ref":"src/nautilus-application.c:1095-1098","code":" 1095 | static void\n 1096 | update_dbus_opened_locations (NautilusApplication *self)\n 1097 | {\n 1098 |     self->dbus_location_update_timeout_id = 0;"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"nautilus_dbus_launcher_call() and nautilus_dbus_launcher_is_available() index self->data[app] without validating app. data[NAUTILUS_DBUS_APP_0] (index 0) is never allocated (data_init starts at SETTINGS=1), so passing the sentinel/uninitialized enum value would NULL-deref self->data[app]->proxy. All current callers pass valid values, but there is no defensive check.","fix":"Add g_return_if_fail/g_return_val_if_fail validating app is within [SETTINGS, N_APPS) and self->data[app] != NULL.","locations":[{"ref":"src/nautilus-dbus-launcher.c:66","code":"   66 |     if (self->data[app]->proxy != NULL)"},{"ref":"src/nautilus-dbus-launcher.c:124","code":"  124 |     return (self->data[app]->available && self->data[app]->proxy != NULL);"}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"create_callback forwards to file_undo_info_transfer_callback regardless of the new_file result; for create operations the GFile result is discarded. More notably, nautilus_file_undo_info_create_set_data writes self->buffer = g_memdup2(template, length) for CREATE_EMPTY_FILE but the struct uses a union of {char *template; void *buffer}, and create_empty_redo_func passes self->template (same memory) as the contents pointer with self->length. If 'template' (the create-from-template branch) ever coexisted this union would alias; currently safe because op_type is mutually exclusive, but the union plus dual naming is error prone.","fix":"Document that buffer/template are mutually exclusive by op_type, or use distinct fields to avoid aliasing confusion.","locations":[{"ref":"src/nautilus-file-undo-operations.c:802-809","code":"  802 |     union\n  803 |     {\n  804 |         char *template;\n  805 |         void *buffer;\n  806 |     };\n  807 |     GFile *target_file;\n  808 |     gsize length;\n  809 | };"},{"ref":"src/nautilus-file-undo-operations.c:1009-1029","code":" 1009 | void\n 1010 | nautilus_file_undo_info_create_set_data (NautilusFileUndoInfoCreate *self,\n 1011 |                                          GFile                      *file,\n 1012 |                                          const void                 *template,\n 1013 |                                          gsize                       length)\n 1014 | {\n 1015 |     NautilusFileUndoOp op_type = nautilus_file_undo_info_get_op_type (NAUTILUS_FILE_UNDO_INFO (self));\n 1016 | \n 1017 |     self->target_file = g_object_ref (file);\n 1018 |     if (op_type == NAUTILUS_FILE_UNDO_OP_CREATE_EMPTY_FILE)\n 1019 |     {\n 1020 |         /* Operation name is a misnomer, it still can hold data to write to\n 1021 |          * the newly created file. */\n 1022 |         self->buffer = g_memdup2 (template, length);\n 1023 |         self->length = length;\n 1024 |     }\n 1025 |     else if (op_type == NAUTILUS_FILE_UNDO_OP_CREATE_FILE_FROM_TEMPLATE)\n 1026 |     {\n 1027 |         self->template = g_strdup (template);\n 1028 |     }\n 1029 | }"}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"nautilus_filename_shorten_base() declares max_length as size_t (unsigned) but guards with `if (max_length <= 0 ...)`. For an unsigned type this only ever tests max_length == 0, and the `< 0` intent is dead. Callers pass an `int max_length` that may be negative (used elsewhere as 'no limit'); a negative value is converted to a huge size_t and silently treated as 'effectively unlimited', which happens to work but is not what the `<= 0` comparison suggests. The comparison and the comment are misleading.","fix":"Either take an int max_length and explicitly handle the <0 / ==0 'no limit' case, or drop the impossible `<= 0` to `== 0` and document that size_t cannot be negative.","locations":[{"ref":"src/nautilus-filename-utilities.c:399-408","code":"  399 | nautilus_filename_shorten_base (char       **filename,\n  400 |                                 const char  *base,\n  401 |                                 size_t       max_length)\n  402 | {\n  403 |     size_t filename_length = strlen (*filename);\n  404 | \n  405 |     if (max_length <= 0 || filename_length <= max_length)\n  406 |     {\n  407 |         return FALSE;\n  408 |     }"}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"file_mount_callback() and file_unmount_callback() call nautilus_view_model_get_item_for_file() and then unconditionally pass the result to nautilus_view_item_set_loading() / nautilus_file_invalidate_attributes without a NULL check. If the file was removed from the model while the async mount/unmount was in flight, `item` is NULL and nautilus_view_item_set_loading() emits a g_return_if_fail() critical (the file_eject/stop callbacks and subdirectory_done_loading correctly guard against NULL item, so this is an inconsistency).","fix":"Guard the set_loading() call with `if (item != NULL)` as is done in the other *_callback functions.","locations":[{"ref":"src/nautilus-files-view.c:6475-6479","code":" 6475 |     g_autoptr (NautilusFilesView) self = NAUTILUS_FILES_VIEW (callback_data);\n 6476 |     NautilusViewItem *item = nautilus_view_model_get_item_for_file (self->model, file);\n 6477 | \n 6478 |     nautilus_file_invalidate_attributes (file, NAUTILUS_ATTRIBUTE_MOUNT);\n 6479 |     nautilus_view_item_set_loading (item, FALSE);"},{"ref":"src/nautilus-files-view.c:6502-6505","code":" 6502 |     g_autoptr (NautilusFilesView) self = NAUTILUS_FILES_VIEW (callback_data);\n 6503 |     NautilusViewItem *item = nautilus_view_model_get_item_for_file (self->model, file);\n 6504 | \n 6505 |     nautilus_view_item_set_loading (item, FALSE);"}]},{"id":"API_13","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"nautilus_query_get_search_content() and nautilus_query_get_search_type() use g_return_val_if_fail(..., -1) as the failure value for functions whose return types are gboolean and an unsigned-ish enum respectively. Returning -1 as a gboolean yields TRUE (nonzero) on a failed precondition, which is the opposite of a safe default for 'search content enabled'. The -1 sentinel only makes sense for the enum getter, not the boolean one.","fix":"For nautilus_query_get_search_content() return FALSE on precondition failure. The enum getter may keep -1 but callers should be aware it is not a valid NautilusSearchTimeType.","locations":[{"ref":"src/nautilus-query.c:370-376","code":"  370 | gboolean\n  371 | nautilus_query_get_search_content (NautilusQuery *query)\n  372 | {\n  373 |     g_return_val_if_fail (NAUTILUS_IS_QUERY (query), -1);\n  374 | \n  375 |     return query->search_content;\n  376 | }"},{"ref":"src/nautilus-query.c:417-423","code":"  417 | NautilusSearchTimeType\n  418 | nautilus_query_get_search_type (NautilusQuery *query)\n  419 | {\n  420 |     g_return_val_if_fail (NAUTILUS_IS_QUERY (query), -1);\n  421 | \n  422 |     return query->search_type;\n  423 | }"}]},{"id":"API_14","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"g_idle_add_once((GSourceOnceFunc) nautilus_search_provider_finished, self) casts a function taking (NautilusSearchProvider*) and returning void to GSourceOnceFunc. nautilus_search_provider_finished drops the provider's self-reference and emits a signal; scheduling it as a bare idle from the worker thread means it runs on the main loop with no extra ref held for the duration of the idle dispatch. If the engine is torn down between scheduling and dispatch, 'self' may already be at its last ref. Same pattern in the simple engine.","fix":"Schedule a small wrapper that holds its own ref on self for the duration of the idle, or guarantee the worker thread holds a ref until the idle has run.","locations":[{"ref":"src/nautilus-search-engine-recent.c:260","code":"  260 |     g_idle_add_once ((GSourceOnceFunc) nautilus_search_provider_finished, self);"},{"ref":"src/nautilus-search-engine-simple.c:270","code":"  270 |     g_idle_add_once ((GSourceOnceFunc) nautilus_search_provider_finished, self);"}]},{"id":"API_15","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"result_metas_return_from_cache() builds an 'aa{sv}' variant and, for each requested uri, looks up data->self->metas_cache and calls g_variant_builder_add_value(&builder, meta) without checking meta for NULL. If a uri is requested that is neither in the cache nor among the just-fetched files (e.g. a file that failed to become ready), g_hash_table_lookup returns NULL and g_variant_builder_add_value(builder, NULL) aborts. result_list_attributes_ready_cb only inserts metas for files that resolved; uris for unresolved files remain absent from the cache.","fix":"Skip (or insert a placeholder vardict for) uris whose cache lookup returns NULL before calling g_variant_builder_add_value().","locations":[{"ref":"src/nautilus-shell-search-provider.c:501-527","code":"  501 | static void\n  502 | result_metas_return_from_cache (ResultMetasData *data)\n  503 | {\n  504 |     GVariantBuilder builder;\n  505 |     GVariant *meta;\n  506 |     gint64 current_time;\n  507 |     gint idx;\n  508 | \n  509 |     g_variant_builder_init (&builder, G_VARIANT_TYPE (\"aa{sv}\"));\n  510 | \n  511 |     if (data->uris)\n  512 |     {\n  513 |         for (idx = 0; data->uris[idx] != NULL; idx++)\n  514 |         {\n  515 |             meta = g_hash_table_lookup (data->self->metas_cache,\n  516 |                                         data->uris[idx]);\n  517 |             g_variant_builder_add_value (&builder, meta);\n  518 |         }\n  519 |     }\n  520 | \n  521 |     current_time = g_get_monotonic_time ();\n  522 |     g_debug (\"*** GetResultMetas completed - time elapsed %dms\",\n  523 |              (gint) ((current_time - data->start_time) / 1000));\n  524 | \n  525 |     g_dbus_method_invocation_return_value (data->invocation,\n  526 |                                            g_variant_new (\"(aa{sv})\", &builder));\n  527 | }"},{"ref":"src/nautilus-shell-search-provider.c:547-609","code":"  547 | static void\n  548 | result_list_attributes_ready_cb (GList    *file_list,\n  549 |                                  gpointer  user_data)\n  550 | {\n  551 |     ResultMetasData *data = user_data;\n  552 |     NautilusBookmarkList *bookmarks = nautilus_application_get_bookmarks (NAUTILUS_APPLICATION (g_application_get_default ()));\n  553 | \n  554 |     for (GList *l = file_list; l != NULL; l = l->next)\n  555 |     {\n  556 |         NautilusFile *file = l->data;\n  557 |         g_autoptr (GFile) file_location = nautilus_file_get_location (file);\n  558 |         g_auto (GVariantBuilder) meta = G_VARIANT_BUILDER_INIT (G_VARIANT_TYPE_VARDICT);\n  559 | \n  560 |         g_autofree char *uri = nautilus_file_get_uri (file);\n  561 |         NautilusBookmark *bookmark = nautilus_bookmark_list_get_bookmark (bookmarks,\n  562 |                                                                           file_location);\n  563 |         const char *display_name = (bookmark != NULL)\n  564 |                                    ? nautilus_bookmark_get_name (bookmark)\n  565 |                                    : nautilus_file_get_display_name (file);\n  566 | \n  567 |         const gchar *path = g_file_peek_path (file_location);\n  568 |         g_autofree gchar *description = (path != NULL ? g_path_get_dirname (path) : NULL);\n  569 | \n  570 |         g_variant_builder_add (&meta, \"{sv}\",\n  571 |                                \"id\", g_variant_new_string (uri));\n  572 |         g_variant_builder_add (&meta, \"{sv}\",\n  573 |                                \"name\", g_variant_new_string (display_name));\n  574 |         /* Some backends like trash:/// don't have a path, so we show the uri itself. */\n  575 |         g_variant_builder_add (&meta, \"{sv}\",\n  576 |                                \"description\", g_variant_new_string (description ? description : uri));\n  577 | \n  578 |         g_autoptr (GIcon) gicon = NULL;\n  579 |         const char *thumbnail_path = nautilus_file_get_thumbnail_path (file);\n  580 |         if (thumbnail_path != NULL)\n  581 |         {\n  582 |             g_autoptr (GFile) location = g_file_new_for_path (thumbnail_path);\n  583 |             gicon = g_file_icon_new (location);\n  584 |         }\n  585 |         else if (bookmark != NULL)\n  586 |         {\n  587 |             gicon = nautilus_bookmark_get_icon (bookmark);\n  588 |         }\n  589 | \n  590 |         if (gicon == NULL)\n  591 |         {\n  592 |             gicon = nautilus_file_get_gicon (file, 0);\n  593 |         }\n  594 | \n  595 |         g_autoptr (GVariant) icon_variant = g_icon_serialize (gicon);\n  596 |         g_variant_builder_add (&meta, \"{sv}\",\n  597 |                                \"icon\", icon_variant);\n  598 | \n  599 |         GVariant *meta_variant = g_variant_builder_end (&meta);\n  600 |         g_hash_table_insert (data->self->metas_cache,\n  601 |                              g_steal_pointer (&uri), g_variant_ref_sink (meta_variant));\n  602 |     }\n  603 | \n  604 |     data->handle = NULL;\n  605 |     data->self->metas_requests = g_list_remove (data->self->metas_requests, data);\n  606 | \n  607 |     result_metas_return_from_cache (data);\n  608 |     result_metas_data_free (data);\n  609 | }"}]},{"id":"API_16","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"drag_leave_callback() calls update_possible_drop_targets(sidebar, FALSE). The second parameter is a `const GValue *value`, not a gboolean. Passing FALSE happens to evaluate to a NULL pointer (the intended \"no value\" sentinel), so it works by accident, but it is type-confused and misleading.","fix":"Pass NULL instead of FALSE: update_possible_drop_targets (sidebar, NULL);","locations":[{"ref":"src/nautilus-sidebar.c:1676","code":" 1676 |         update_possible_drop_targets (sidebar, FALSE);"}]},{"id":"API_17","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"MAX_THUMBNAILING_THREADS is defined as 'ceil (g_get_num_processors () / 2);' — note the trailing semicolon inside the macro and the integer division. g_get_num_processors() returns guint, so 'g_get_num_processors() / 2' is integer division done before ceil(), making ceil() a no-op (it receives an already-integral double). On a 1-CPU machine this yields 0, so max_threads becomes 0 and the loop guard 'running_threads <= 0' still allows exactly one thread (acceptable) but the ceil() intent (round up odd counts) is silently lost. The trailing ';' in the macro is also a latent footgun.","fix":"Define as 'MAX (1, (guint) ceil (g_get_num_processors () / 2.0))' and drop the trailing semicolon from the macro.","locations":[{"ref":"src/nautilus-thumbnails.c:52","code":"   52 | #define MAX_THUMBNAILING_THREADS ceil (g_get_num_processors () / 2);"},{"ref":"src/nautilus-thumbnails.c:663-666","code":"  663 |     if (G_UNLIKELY (max_threads == 0))\n  664 |     {\n  665 |         max_threads = MAX_THUMBNAILING_THREADS\n  666 |     }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"insert_bookmark_internal() calls bookmark_list_get_node() which is O(n) for every inserted bookmark; load_callback() calls insert_bookmark_internal() per line, making bookmark file loading O(n^2) in the number of bookmarks. Each get_node also calls nautilus_bookmark_get_location() which triggers nautilus_bookmark_connect_file() (potential file I/O / NautilusFile creation) on every comparison.","fix":"Build a transient hash set of seen locations during load to dedup in O(1), avoiding repeated connect_file() side effects in get_node.","locations":[{"ref":"src/nautilus-bookmark-list.c:255-276","code":"  255 | static gboolean\n  256 | insert_bookmark_internal (NautilusBookmarkList *bookmarks,\n  257 |                           NautilusBookmark     *bookmark,\n  258 |                           int                   index)\n  259 | {\n  260 |     GFile *location = nautilus_bookmark_get_location (bookmark);\n  261 | \n  262 |     if (bookmark_list_get_node (bookmarks, location, NULL) != NULL)\n  263 |     {\n  264 |         g_object_unref (bookmark);\n  265 |         return FALSE;\n  266 |     }\n  267 | \n  268 |     bookmarks->list = g_list_insert (bookmarks->list, bookmark, index);\n  269 | \n  270 |     g_signal_connect_object (bookmark, \"contents-changed\",\n  271 |                              G_CALLBACK (bookmark_in_list_changed_callback), bookmarks, 0);\n  272 |     g_signal_connect_object (bookmark, \"notify::name\",\n  273 |                              G_CALLBACK (bookmark_in_list_name_changed), bookmarks, G_CONNECT_SWAPPED);\n  274 | \n  275 |     return TRUE;\n  276 | }"},{"ref":"src/nautilus-bookmark-list.c:450-476","code":"  450 |     char **lines = g_strsplit (contents, \"\\n\", -1);\n  451 |     for (guint i = 0; lines[i]; i++)\n  452 |     {\n  453 |         char *uri = lines[i];\n  454 | \n  455 |         /* Ignore empty or invalid lines that cannot be parsed properly */\n  456 |         if (uri[0] == '\\0' || g_unichar_isspace (uri[0]))\n  457 |         {\n  458 |             continue;\n  459 |         }\n  460 | \n  461 |         /* Split bookmarks file entries into URI and label, which are separated by\n  462 |          * a space. This behavior is used since GTK 2.7's file chooser.\n  463 |          */\n  464 |         char *label = NULL;\n  465 |         char *space = strchr (uri, ' ');\n  466 |         if (space != NULL)\n  467 |         {\n  468 |             *space = '\\0';\n  469 |             label = space + 1;\n  470 |         }\n  471 | \n  472 |         g_autoptr (GFile) location = g_file_new_for_uri (uri);\n  473 |         NautilusBookmark *new_bookmark = nautilus_bookmark_new (location, label);\n  474 | \n  475 |         insert_bookmark_internal (self, new_bookmark, -1);\n  476 |     }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"call_ready_callbacks_at_idle() re-initializes the GHashTable iterator from scratch (g_hash_table_iter_init) on every loop iteration, making the dispatch of N ready-callback file-keys O(N * buckets). The re-init is needed because ready_callback_call() may mutate the ready hash, but for the common case (each key processed once) this scans all buckets repeatedly. With many files becoming ready in one idle pass this is quadratic.","fix":"Snapshot the ready entries once (e.g. g_hash_table_get_values_as_ptr_array, like call_ready_callbacks() does for the unsatisfied hash) and iterate that array, removing/calling each, instead of re-initializing the live iterator each iteration.","locations":[{"ref":"src/nautilus-directory-async.c:1784-1797","code":" 1784 |     while (g_hash_table_iter_next (&hash_iter, NULL, (gpointer *) &node))\n 1785 |     {\n 1786 |         ReadyCallback callback = *(ReadyCallback *) (node->data);\n 1787 | \n 1788 |         /* Callbacks are one-shots, so remove it now. */\n 1789 |         remove_callback_link (directory, node, TRUE);\n 1790 | \n 1791 |         /* Call the callback. */\n 1792 |         ready_callback_call (directory, &callback);\n 1793 | \n 1794 |         /* Need to parse the node from the hash table again because it might\n 1795 |          * have been freed */\n 1796 |         g_hash_table_iter_init (&hash_iter, directory->details->call_when_ready_hash.ready);\n 1797 |     }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"nautilus_files_view_call_set_selection() copies the selection list, then for every model position (n_items) does a g_list_find() over the remaining files-to-find list. This is O(n_items * selection_size) and degrades to O(n^2) when selecting a large fraction of a large directory (e.g. select-all-then-set, restoring a big selection). The list is shrunk via g_list_delete_link as matches are found, which helps best case but not worst case.","fix":"Build a GHashTable (NautilusFile* -> position, or a set of the wanted files) for O(1) membership tests instead of g_list_find() inside the per-item loop.","locations":[{"ref":"src/nautilus-files-view.c:794-814","code":"  794 |     /* Convert file list into set of model indices */\n  795 |     n_items = g_list_model_get_n_items (G_LIST_MODEL (self->model));\n  796 |     for (guint position = 0; position < n_items; position++)\n  797 |     {\n  798 |         g_autoptr (NautilusViewItem) item = get_view_item (G_LIST_MODEL (self->model), position);\n  799 | \n  800 |         GList *link = g_list_find (files_to_find, nautilus_view_item_get_file (item));\n  801 |         if (link != NULL)\n  802 |         {\n  803 |             /* Found item to select */\n  804 |             gtk_bitset_add (new_selection_set, position);\n  805 | \n  806 |             /* Remove found file from the list of files yet to find. */\n  807 |             files_to_find = g_list_delete_link (files_to_find, link);\n  808 |             if (files_to_find == NULL)\n  809 |             {\n  810 |                 /* We've matched everything. */\n  811 |                 break;\n  812 |             }\n  813 |         }\n  814 |     }"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"update_emblems() (both grid and name cell) is called on every file-changed and on starred-changed, and each call rebuilds all emblem widgets from scratch (removes every child, then re-queries gtk_icon_theme_has_gicon and creates new GtkImage widgets). nautilus_file_get_emblem_icons() plus per-icon theme lookups run for every visible cell on each change notification, which can be costly during rapid file updates while scrolling.","fix":"Cache the last set of emblem icons per cell and skip the teardown/rebuild when the icon list is unchanged, or diff against the existing children instead of clearing unconditionally.","locations":[{"ref":"src/nautilus-grid-cell.c:157-199","code":"  157 | static void\n  158 | update_emblems (NautilusGridCell *self)\n  159 | {\n  160 |     g_autoptr (NautilusViewItem) item = NULL;\n  161 |     NautilusFile *file;\n  162 |     GtkWidget *child;\n  163 |     GtkIconTheme *theme;\n  164 |     g_autolist (GIcon) emblems = NULL;\n  165 |     g_autofree gchar *file_uri = NULL;\n  166 | \n  167 |     item = nautilus_view_cell_get_item (NAUTILUS_VIEW_CELL (self));\n  168 |     g_return_if_fail (item != NULL);\n  169 |     file = nautilus_view_item_get_file (item);\n  170 |     file_uri = nautilus_file_get_uri (file);\n  171 | \n  172 |     /* Remove old emblems. */\n  173 |     while ((child = gtk_widget_get_first_child (self->emblems_box)) != NULL)\n  174 |     {\n  175 |         gtk_box_remove (GTK_BOX (self->emblems_box), child);\n  176 |     }\n  177 | \n  178 |     if (nautilus_tag_manager_file_is_starred (nautilus_tag_manager_get (), file_uri))\n  179 |     {\n  180 |         gtk_box_append (GTK_BOX (self->emblems_box),\n  181 |                         gtk_image_new_from_icon_name (\"starred-symbolic\"));\n  182 |     }\n  183 | \n  184 |     theme = gtk_icon_theme_get_for_display (gdk_display_get_default ());\n  185 |     emblems = nautilus_file_get_emblem_icons (file);\n  186 |     for (GList *l = emblems; l != NULL; l = l->next)\n  187 |     {\n  188 |         if (!gtk_icon_theme_has_gicon (theme, l->data))\n  189 |         {\n  190 |             g_autofree gchar *icon_string = g_icon_to_string (l->data);\n  191 |             g_warning (\"Failed to add emblem. “%s” not found in the icon theme\",\n  192 |                        icon_string);\n  193 |             continue;\n  194 |         }\n  195 | \n  196 |         gtk_box_append (GTK_BOX (self->emblems_box),\n  197 |                         gtk_image_new_from_gicon (l->data));\n  198 |     }\n  199 | }"},{"ref":"src/nautilus-name-cell.c:192-226","code":"  192 | static void\n  193 | update_emblems (NautilusNameCell *self)\n  194 | {\n  195 |     g_autoptr (NautilusViewItem) item = NULL;\n  196 |     NautilusFile *file;\n  197 |     GtkWidget *child;\n  198 |     GtkIconTheme *theme;\n  199 |     g_autolist (GIcon) emblems = NULL;\n  200 | \n  201 |     item = nautilus_view_cell_get_item (NAUTILUS_VIEW_CELL (self));\n  202 |     g_return_if_fail (item != NULL);\n  203 |     file = nautilus_view_item_get_file (item);\n  204 | \n  205 |     /* Remove old emblems. */\n  206 |     while ((child = gtk_widget_get_first_child (self->emblems_box)) != NULL)\n  207 |     {\n  208 |         gtk_box_remove (GTK_BOX (self->emblems_box), child);\n  209 |     }\n  210 | \n  211 |     theme = gtk_icon_theme_get_for_display (gdk_display_get_default ());\n  212 |     emblems = nautilus_file_get_emblem_icons (file);\n  213 |     for (GList *l = emblems; l != NULL; l = l->next)\n  214 |     {\n  215 |         if (!gtk_icon_theme_has_gicon (theme, l->data))\n  216 |         {\n  217 |             g_autofree gchar *icon_string = g_icon_to_string (l->data);\n  218 |             g_warning (\"Failed to add emblem. “%s” not found in the icon theme\",\n  219 |                        icon_string);\n  220 |             continue;\n  221 |         }\n  222 | \n  223 |         gtk_box_append (GTK_BOX (self->emblems_box),\n  224 |                         gtk_image_new_from_gicon (l->data));\n  225 |     }\n  226 | }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"nautilus_mime_get_default_application_for_files copies and sorts the file list by mime type to dedup adjacent files, but file_compare_by_parent_uri allocates parent URIs for every comparison via nautilus_file_get_parent_uri (two g_strdup'd URIs per compare) and is called both during the dedup check and indirectly. For large selections this is O(n log n) URI allocations during sort plus per-iteration compares. Not a correctness bug but avoidable allocation churn.","fix":"Cache mime type / parent comparison keys, or compare GFile parents directly without round-tripping through allocated URI strings.","locations":[{"ref":"src/nautilus-mime-actions.c:550-615","code":"  550 | static int\n  551 | file_compare_by_parent_uri (NautilusFile *file_a,\n  552 |                             NautilusFile *file_b)\n  553 | {\n  554 |     char *parent_uri_a, *parent_uri_b;\n  555 |     int ret;\n  556 | \n  557 |     parent_uri_a = nautilus_file_get_parent_uri (file_a);\n  558 |     parent_uri_b = nautilus_file_get_parent_uri (file_b);\n  559 | \n  560 |     ret = strcmp (parent_uri_a, parent_uri_b);\n  561 | \n  562 |     g_free (parent_uri_a);\n  563 |     g_free (parent_uri_b);\n  564 | \n  565 |     return ret;\n  566 | }\n  567 | \n  568 | GAppInfo *\n  569 | nautilus_mime_get_default_application_for_files (GList *files)\n  570 | {\n  571 |     GList *l, *sorted_files;\n  572 |     NautilusFile *file;\n  573 |     GAppInfo *app = NULL;\n  574 | \n  575 |     g_assert (files != NULL);\n  576 | \n  577 |     if (nautilus_application_is_sandboxed ())\n  578 |     {\n  579 |         /* While running as a flatpak, we don't know the default app. The code\n  580 |          * bellow might even get a wrong result because it may find matches\n  581 |          * inside the sandbox which are incorrect. */\n  582 |         return NULL;\n  583 |     }\n  584 | \n  585 |     sorted_files = g_list_sort (g_list_copy (files), (GCompareFunc) file_compare_by_mime_type);\n  586 | \n  587 |     for (l = sorted_files; l != NULL; l = l->next)\n  588 |     {\n  589 |         file = l->data;\n  590 | \n  591 |         if (l->prev &&\n  592 |             file_compare_by_mime_type (file, l->prev->data) == 0 &&\n  593 |             file_compare_by_parent_uri (file, l->prev->data) == 0)\n  594 |         {\n  595 |             continue;\n  596 |         }\n  597 | \n  598 |         g_autoptr (GAppInfo) one_app = nautilus_mime_get_default_application_for_file (file);\n  599 | \n  600 |         if (one_app == NULL || (app != NULL && !g_app_info_equal (app, one_app)))\n  601 |         {\n  602 |             g_clear_object (&app);\n  603 |             break;\n  604 |         }\n  605 | \n  606 |         if (app == NULL)\n  607 |         {\n  608 |             app = g_steal_pointer (&one_app);\n  609 |         }\n  610 |     }\n  611 | \n  612 |     g_list_free (sorted_files);\n  613 | \n  614 |     return app;\n  615 | }"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"on_address_entry_text_changed() and populate_available_protocols_grid() each call g_vfs_get_supported_uri_schemes(g_vfs_get_default()) on every keystroke / setup. While the returned list is owned by the GVfs and cheap to fetch, on_address_entry_text_changed runs g_strv_contains twice per keystroke over the supported list; acceptable but worth noting it re-walks the strv on each change.","fix":"Optional: cache the supported schemes or precompute a set; low priority given list size.","locations":[{"ref":"src/nautilus-network-address-bar.c:236-246","code":"  236 |     const char * const *supported_protocols = g_vfs_get_supported_uri_schemes (g_vfs_get_default ());\n  237 |     const char *address = gtk_editable_get_text (GTK_EDITABLE (self->address_entry));\n  238 |     g_autofree char *scheme = g_uri_parse_scheme (address);\n  239 |     gboolean is_empty = (address == NULL || *address == '\\0');\n  240 |     gboolean supported = FALSE;\n  241 | \n  242 |     if (supported_protocols != NULL && scheme != NULL)\n  243 |     {\n  244 |         supported = g_strv_contains (supported_protocols, scheme) &&\n  245 |                     !g_strv_contains (unsupported_protocols, scheme);\n  246 |     }"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"on_progress_info_started_timeout() calls nautilus_progress_info_manager_get_all_infos() and get_filtered_progress_infos() and compares g_list_length() of both every timeout tick while operations are starting; get_filtered_progress_infos rebuilds a filtered list (allocating) on each call. For many concurrent operations this is O(n) allocation per tick. Minor.","fix":"Cache counts or compare without building a full filtered list when only the length is needed.","locations":[{"ref":"src/nautilus-progress-indicator.c:286-312","code":"  286 | static gboolean\n  287 | on_progress_info_started_timeout (NautilusProgressIndicator *self)\n  288 | {\n  289 |     GList *progress_infos;\n  290 |     GList *filtered_progress_infos;\n  291 | \n  292 |     update_operations (self);\n  293 | \n  294 |     /* In case we didn't show the operations button because the operation total\n  295 |      * time stimation is not good enough, update again to make sure we don't miss\n  296 |      * a long time operation because of that */\n  297 | \n  298 |     progress_infos = nautilus_progress_info_manager_get_all_infos (self->progress_manager);\n  299 |     filtered_progress_infos = get_filtered_progress_infos (self);\n  300 |     if (!nautilus_progress_manager_are_all_infos_finished_or_cancelled (self->progress_manager) &&\n  301 |         g_list_length (progress_infos) != g_list_length (filtered_progress_infos))\n  302 |     {\n  303 |         g_list_free (filtered_progress_infos);\n  304 |         return G_SOURCE_CONTINUE;\n  305 |     }\n  306 |     else\n  307 |     {\n  308 |         g_list_free (filtered_progress_infos);\n  309 |         self->start_operations_timeout_id = 0;\n  310 |         return G_SOURCE_REMOVE;\n  311 |     }\n  312 | }"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"is_multi_file_window() is called extremely frequently throughout properties setup/update (in nearly every should_show_* predicate, update_*_row, etc.), and each call walks the whole self->files list calling nautilus_file_is_gone() per element. During setup_basic_page/properties_widget_update this results in many redundant O(n) scans of the file list.","fix":"Cache the multi-file determination (and/or the live-file count) once per update cycle and reuse it, or short-circuit via the already-computed PermissionsInfo.is_multi_file_window where available.","locations":[{"ref":"src/nautilus-properties.c:463-484","code":"  463 | static gboolean\n  464 | is_multi_file_window (NautilusPropertiesWidget *self)\n  465 | {\n  466 |     GList *l;\n  467 |     int count;\n  468 | \n  469 |     count = 0;\n  470 | \n  471 |     for (l = self->files; l != NULL; l = l->next)\n  472 |     {\n  473 |         if (!nautilus_file_is_gone (NAUTILUS_FILE (l->data)))\n  474 |         {\n  475 |             count++;\n  476 |             if (count > 1)\n  477 |             {\n  478 |                 return TRUE;\n  479 |             }\n  480 |         }\n  481 |     }\n  482 | \n  483 |     return FALSE;\n  484 | }"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"search_get_file_list() refs every file in files_hash via g_hash_table_foreach(nautilus_file_ref) and then returns g_hash_table_get_keys(), building the key list a second time internally. For large search results this iterates the table twice. Minor, but avoidable.","fix":"Build the GList once (g_hash_table_get_keys) and ref while iterating that list, instead of a separate foreach pass.","locations":[{"ref":"src/nautilus-search-directory.c:659-667","code":"  659 | static GList *\n  660 | search_get_file_list (NautilusDirectory *directory)\n  661 | {\n  662 |     NautilusSearchDirectory *self = NAUTILUS_SEARCH_DIRECTORY (directory);\n  663 | \n  664 |     g_hash_table_foreach (self->files_hash, (GHFunc) nautilus_file_ref, NULL);\n  665 | \n  666 |     return g_hash_table_get_keys (self->files_hash);\n  667 | }"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","description":"nautilus_query_get_date_range() returns a transfer-full reference (it g_ptr_array_ref's the array). In model_directory_ready_cb() it is called once per file inside the loop and only unref'd inside the 'if (found && date_range != NULL)' block. Because the early 'continue' paths (name mismatch, mime mismatch) occur before the date_range fetch, the ref is always balanced, so there is no leak — but acquiring/releasing a ref on every iteration is needless churn. The other engines (simple, recent) correctly fetch the date range once before the loop.","fix":"Hoist the nautilus_query_get_date_range() call out of the per-file loop (fetch once with g_autoptr before the loop), matching nautilus-search-engine-simple.c and nautilus-search-engine-recent.c.","locations":[{"ref":"src/nautilus-search-engine-model.c:137-177","code":"  137 |         date_range = nautilus_query_get_date_range (query);\n  138 |         if (found && date_range != NULL)\n  139 |         {\n  140 |             NautilusSearchTimeType type;\n  141 |             GDateTime *target_date;\n  142 | \n  143 |             type = nautilus_query_get_search_type (query);\n  144 |             initial_date = g_ptr_array_index (date_range, 0);\n  145 |             end_date = g_ptr_array_index (date_range, 1);\n  146 | \n  147 |             switch (type)\n  148 |             {\n  149 |                 case NAUTILUS_SEARCH_TIME_TYPE_LAST_ACCESS:\n  150 |                 {\n  151 |                     target_date = atime;\n  152 |                 }\n  153 |                 break;\n  154 | \n  155 |                 case NAUTILUS_SEARCH_TIME_TYPE_LAST_MODIFIED:\n  156 |                 {\n  157 |                     target_date = mtime;\n  158 |                 }\n  159 |                 break;\n  160 | \n  161 |                 case NAUTILUS_SEARCH_TIME_TYPE_CREATED:\n  162 |                 {\n  163 |                     target_date = ctime;\n  164 |                 }\n  165 |                 break;\n  166 | \n  167 |                 default:\n  168 |                 {\n  169 |                     target_date = NULL;\n  170 |                 }\n  171 |             }\n  172 | \n  173 |             found = nautilus_date_time_is_between_dates (target_date,\n  174 |                                                          initial_date,\n  175 |                                                          end_date);\n  176 |             g_ptr_array_unref (date_range);\n  177 |         }"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","description":"get_thumbnail_scale() caches via 'static gint max_scale' guarded by G_UNLIKELY(max_scale == 0). The monitor scale factors are only sampled once at first call; if the user later connects/disconnects a higher-DPI monitor, the thumbnail size never updates for the session. This is a stale-cache correctness/perf tradeoff that may produce blurry or oversized thumbnails after display changes.","fix":"Recompute on monitor-list 'items-changed', or document that a restart is required after display changes.","locations":[{"ref":"src/nautilus-thumbnails.c:130-164","code":"  130 | static GnomeDesktopThumbnailSize\n  131 | get_thumbnail_scale (void)\n  132 | {\n  133 |     static gint max_scale = 0;\n  134 |     static GnomeDesktopThumbnailSize size;\n  135 | \n  136 |     if (G_UNLIKELY (max_scale == 0))\n  137 |     {\n  138 |         GdkDisplay *display = gdk_display_get_default ();\n  139 |         GListModel *monitors = gdk_display_get_monitors (display);\n  140 |         max_scale = 1;\n  141 | \n  142 |         for (guint i = 0; i < g_list_model_get_n_items (monitors); i++)\n  143 |         {\n  144 |             g_autoptr (GdkMonitor) monitor = g_list_model_get_item (monitors, i);\n  145 | \n  146 |             max_scale = MAX (max_scale, gdk_monitor_get_scale_factor (monitor));\n  147 |         }\n  148 | \n  149 |         if (max_scale <= 1)\n  150 |         {\n  151 |             size = GNOME_DESKTOP_THUMBNAIL_SIZE_LARGE;\n  152 |         }\n  153 |         else if (max_scale <= 2)\n  154 |         {\n  155 |             size = GNOME_DESKTOP_THUMBNAIL_SIZE_XLARGE;\n  156 |         }\n  157 |         else\n  158 |         {\n  159 |             size = GNOME_DESKTOP_THUMBNAIL_SIZE_XXLARGE;\n  160 |         }\n  161 |     }\n  162 | \n  163 |     return size;\n  164 | }"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"negligible","description":"compare_by_starred is invoked O(n log n) times during a starred sort and calls nautilus_file_get_uri() (which allocates a GFile and a URI string) twice per comparison, then queries the tag manager. For large directories this allocates and frees two URIs per comparison pair, which is a notable per-comparison cost in a hot sort path.","fix":"Cache the starred boolean (or URI) per file before sorting, or have the sort gather starred status once per file rather than recomputing inside the comparator.","locations":[{"ref":"src/nautilus-file.c:3457-3486","code":" 3457 | static int\n 3458 | compare_by_starred (NautilusFile *file_1,\n 3459 |                     NautilusFile *file_2)\n 3460 | {\n 3461 |     NautilusTagManager *tag_manager = nautilus_tag_manager_get ();\n 3462 |     g_autofree gchar *uri_1 = NULL;\n 3463 |     g_autofree gchar *uri_2 = NULL;\n 3464 |     gboolean file_1_is_starred;\n 3465 |     gboolean file_2_is_starred;\n 3466 | \n 3467 |     uri_1 = nautilus_file_get_uri (file_1);\n 3468 |     uri_2 = nautilus_file_get_uri (file_2);\n 3469 | \n 3470 |     file_1_is_starred = nautilus_tag_manager_file_is_starred (tag_manager,\n 3471 |                                                               uri_1);\n 3472 |     file_2_is_starred = nautilus_tag_manager_file_is_starred (tag_manager,\n 3473 |                                                               uri_2);\n 3474 |     if (!!file_1_is_starred == !!file_2_is_starred)\n 3475 |     {\n 3476 |         return 0;\n 3477 |     }\n 3478 |     else if (file_1_is_starred && !file_2_is_starred)\n 3479 |     {\n 3480 |         return -1;\n 3481 |     }\n 3482 |     else\n 3483 |     {\n 3484 |         return 1;\n 3485 |     }\n 3486 | }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"medium","description":"get_window_with_location() computes `searched_location` (the parent folder when the target is a non-directory file) but never uses it. Both the active-window check and the loop test `nautilus_window_has_open_location (window, location)` against the original `location`, not `searched_location`. As a result the parent-folder computation and the g_return_val_if_fail on searched_location are pointless, and the intended behavior (reuse a window already showing the parent folder when selecting a file) does not happen.","fix":"Either use `searched_location` in the has-open-location checks instead of `location`, or remove the unused searched_location computation entirely.","locations":[{"ref":"src/nautilus-application.c:231-269","code":"  231 | static NautilusWindow *\n  232 | get_window_with_location (NautilusApplication *self,\n  233 |                           GFile               *location)\n  234 | {\n  235 |     g_autoptr (NautilusFile) file = nautilus_file_get_existing (location);\n  236 |     g_autoptr (GFile) searched_location = NULL;\n  237 | \n  238 |     if (file != NULL &&\n  239 |         !nautilus_file_is_directory (file) &&\n  240 |         g_file_has_parent (location, NULL))\n  241 |     {\n  242 |         searched_location = g_file_get_parent (location);\n  243 |     }\n  244 |     else\n  245 |     {\n  246 |         searched_location = g_object_ref (location);\n  247 |     }\n  248 | \n  249 |     g_return_val_if_fail (searched_location != NULL, NULL);\n  250 | \n  251 |     /* Check active window as a first priority */\n  252 |     NautilusWindow *active_window = NAUTILUS_WINDOW (\n  253 |         gtk_application_get_active_window (GTK_APPLICATION (self)));\n  254 |     if (active_window != NULL && nautilus_window_has_open_location (active_window, location))\n  255 |     {\n  256 |         return active_window;\n  257 |     }\n  258 | \n  259 |     for (GList *l = self->windows; l != NULL; l = l->next)\n  260 |     {\n  261 |         NautilusWindow *window = l->data;\n  262 | \n  263 |         if (nautilus_window_has_open_location (window, location))\n  264 |         {\n  265 |             return window;\n  266 |         }\n  267 |     }\n  268 | \n  269 |     return NULL;"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"action_help() declares `GError *error = NULL` and passes NULL as the callback/user_data and crucially NULL as the GError** to gtk_uri_launcher_launch() (the call is fire-and-forget with no finish callback). Therefore `error` is never written, and the entire `if (error)` error-reporting block (creating an AdwAlertDialog, etc.) is unreachable dead code. The launch is also async, so no synchronous error could ever be reported here anyway.","fix":"Remove the dead `error` variable and the if(error) block, or implement a proper GAsyncReadyCallback that calls gtk_uri_launcher_launch_finish() and reports errors there.","locations":[{"ref":"src/nautilus-application.c:542-563","code":"  542 | action_help (GSimpleAction *action,\n  543 |              GVariant      *parameter,\n  544 |              gpointer       user_data)\n  545 | {\n  546 |     AdwDialog *dialog;\n  547 |     GtkApplication *application = user_data;\n  548 |     GError *error = NULL;\n  549 |     GtkWindow *window = gtk_application_get_active_window (application);\n  550 |     g_autoptr (GtkUriLauncher) launcher = gtk_uri_launcher_new (\"help:gnome-help/files\");\n  551 | \n  552 |     gtk_uri_launcher_launch (launcher, window, NULL, NULL, NULL);\n  553 | \n  554 |     if (error)\n  555 |     {\n  556 |         dialog = adw_alert_dialog_new (_(\"There was an error displaying help\"), error->message);\n  557 |         adw_alert_dialog_add_response (ADW_ALERT_DIALOG (dialog), \"ok\", _(\"_OK\"));\n  558 |         adw_alert_dialog_set_default_response (ADW_ALERT_DIALOG (dialog), \"ok\");\n  559 | \n  560 |         adw_dialog_present (dialog, GTK_WIDGET (window));\n  561 |         g_error_free (error);\n  562 |     }\n  563 | }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","description":"AutorunSoftwareDialogData stores a `dialog` field and connects autorun_software_dialog_destroy on the mount's \"unmounted\" signal, but after a normal \"cancel\"/\"run\" dialog response the data struct and the still-connected
