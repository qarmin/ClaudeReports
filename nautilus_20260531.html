 first. */\n   92 |     if (dir_count != 0 || query_location == NULL)"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"NautilusSidebarRow nautilus_sidebar_row_set_property PROP_SIDEBAR stores the sidebar pointer with a plain assignment (self->sidebar = g_value_get_object(value)) without taking a reference, while it is a CONSTRUCT_ONLY object property. If the sidebar is destroyed before the row, self->sidebar dangles. Other object props (drive/volume/mount) correctly use g_set_object. The cloud_provider_account uses dup_object. The sidebar is likely the owner of the row so this is usually safe, but it is an inconsistent non-owning store of an object property.","fix":"Either document the parent-owns-child invariant, or use a weak pointer / g_set_object consistently; at minimum avoid leaving a raw non-reffed object pointer that is never cleared.","locations":[{"ref":"src/nautilus-sidebar-row.c:299-303","code":"  299 |         case PROP_SIDEBAR:\n  300 |         {\n  301 |             self->sidebar = g_value_get_object (value);\n  302 |             break;\n  303 |         }"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_date_time_is_between_dates() treats any GDateTime whose Unix timestamp equals exactly 0 (1970-01-01T00:00:00Z) as invalid and returns FALSE ('Silently ignore errors'). Real files with an epoch timestamp (common for some archives, fakeroot builds, or reset metadata) are silently excluded from every date-range filtered search across all three engines that call this helper. The check conflates 'unset/error' with the legitimate value 0.","fix":"Detect invalid dates explicitly (e.g. pass/keep NULL for genuinely unknown timestamps and only NULL-check) instead of using g_date_time_to_unix(date) == 0 as the sentinel for 'no date'.","locations":[{"ref":"src/nautilus-ui-utilities.c:318-339","code":"  318 | gboolean\n  319 | nautilus_date_time_is_between_dates (GDateTime *date,\n  320 |                                      GDateTime *initial_date,\n  321 |                                      GDateTime *end_date)\n  322 | {\n  323 |     gboolean in_between;\n  324 | \n  325 |     /* Silently ignore errors */\n  326 |     if (date == NULL || g_date_time_to_unix (date) == 0)\n  327 |     {\n  328 |         return FALSE;\n  329 |     }\n  330 | \n  331 |     /* For the end date, we want to make end_date inclusive,\n  332 |      * for that the difference between the start of the day and the in_between\n  333 |      * has to be more than -1 day\n  334 |      */\n  335 |     in_between = g_date_time_difference (date, initial_date) > 0 &&\n  336 |                  g_date_time_difference (end_date, date) / G_TIME_SPAN_DAY > -1;\n  337 | \n  338 |     return in_between;\n  339 | }"},{"ref":"src/nautilus-search-engine-simple.c:187-189","code":"  187 |             found = nautilus_date_time_is_between_dates (target_date,\n  188 |                                                          initial_date,\n  189 |                                                          end_date);"},{"ref":"src/nautilus-search-engine-recent.c:242-244","code":"  242 |                 if (!nautilus_date_time_is_between_dates (target_date,\n  243 |                                                           initial_date,\n  244 |                                                           end_date))"},{"ref":"src/nautilus-search-engine-model.c:173-175","code":"  173 |             found = nautilus_date_time_is_between_dates (target_date,\n  174 |                                                          initial_date,\n  175 |                                                          end_date);"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_window_new_tab() reads `location` from the current slot (borrowed pointer). In the SCHEME_SEARCH branch it reassigns `location` to a newly-created home GFile (owned), but it does NOT ref the borrowed pointer in that branch — yet at the end it unconditionally calls g_object_unref(location). For the search branch this is correct (home was created). For the non-search branch it explicitly g_object_ref(location). So far balanced. However, if location is the search scheme, the original borrowed slot location is correctly left untouched. The subtle bug: there is no else for `location == NULL`; the whole body is guarded by `if (location != NULL)`, so that is fine. Re-examined: the ref/unref is actually balanced. Downgrade — but note the reuse of the `location` variable to mean two different ownerships is error-prone and a future edit could easily unbalance it.","fix":"Use a separate g_autoptr(GFile) target_location for the owned value to make ownership explicit and avoid aliasing the borrowed slot location.","locations":[{"ref":"src/nautilus-window.c:507-534","code":"  507 | void\n  508 | nautilus_window_new_tab (NautilusWindow *window)\n  509 | {\n  510 |     NautilusWindowSlot *current_slot;\n  511 |     AdwTabPage *page;\n  512 |     GFile *location;\n  513 | \n  514 |     page = get_current_page (window);\n  515 |     current_slot = NAUTILUS_WINDOW_SLOT (adw_tab_page_get_child (page));\n  516 |     location = nautilus_window_slot_get_location (current_slot);\n  517 | \n  518 |     if (location != NULL)\n  519 |     {\n  520 |         if (g_file_has_uri_scheme (location, SCHEME_SEARCH))\n  521 |         {\n  522 |             location = g_file_new_for_path (g_get_home_dir ());\n  523 |         }\n  524 |         else\n  525 |         {\n  526 |             g_object_ref (location);\n  527 |         }\n  528 | \n  529 |         nautilus_window_open_location_full (window, location,\n  530 |                                             NAUTILUS_OPEN_FLAG_NEW_TAB,\n  531 |                                             NULL);\n  532 |         g_object_unref (location);\n  533 |     }\n  534 | }"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","description":"get_models() calls g_str_equal(generic_icon, \"image-x-generic\") where generic_icon comes from g_content_type_get_generic_icon_name(mime_type). That function can return NULL (e.g. for an unknown/NULL mime type), and g_str_equal() dereferences both arguments, causing a NULL dereference crash.","fix":"Guard with g_strcmp0 (generic_icon, \"image-x-generic\") == 0, which is NULL-safe.","locations":[{"ref":"extensions/image-properties/nautilus-image-properties-model-provider.c:52-59","code":"   52 |     NautilusFileInfo *file_info = NAUTILUS_FILE_INFO (files->data);\n   53 |     g_autofree char *mime_type = nautilus_file_info_get_mime_type (file_info);\n   54 |     g_autofree char *generic_icon = g_content_type_get_generic_icon_name (mime_type);\n   55 | \n   56 |     if (g_str_equal (generic_icon, \"image-x-generic\"))\n   57 |     {\n   58 |         return g_list_prepend (NULL, nautilus_image_properties_model_new (file_info));\n   59 |     }"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_image_properties_model_load_from_file_info() comments \"Handle locations like recent://\" and falls back to the activation URI, but then unconditionally `g_return_if_fail (path != NULL)`. For locations that still have no local path it silently returns, leaving an empty model with no error item appended (unlike the gexiv2/glycin failure path which appends an \"Oops!\" item).","fix":"Replace the g_return_if_fail with an explicit branch that appends the \"Failed to load image information\" item when path is NULL.","locations":[{"ref":"extensions/image-properties/nautilus-image-properties-model.c:266-281","code":"  266 |     g_autoptr (GFile) file = g_file_new_for_uri (uri);\n  267 |     const char *path = g_file_peek_path (file);\n  268 | \n  269 |     if (path == NULL)\n  270 |     {\n  271 |         /* Handle locations like recent:// */\n  272 |         g_clear_pointer (&uri, g_free);\n  273 |         g_clear_object (&file);\n  274 | \n  275 |         uri = nautilus_file_info_get_activation_uri (file_info);\n  276 |         file = g_file_new_for_uri (uri);\n  277 |         path = g_file_peek_path (file);\n  278 |     }\n  279 | \n  280 |     g_return_if_fail (path != NULL);\n  281 | "}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","description":"have_unallowed_character() in FORMAT mode only flags the literal entry text being exactly \".\" or \"..\" (checking dialog->name_entry text), but in FORMAT mode the actual produced names come from batch_rename_format() applied per file and may individually evaluate to \".\", \"..\", or empty (e.g. a format that strips everything). Unlike REPLACE mode (which iterates dialog->new_names), FORMAT mode never inspects the generated new_names for \".\"/\"..\"/empty, so a format yielding those reserved names is not caught here and is only rejected later by the rename operation.","fix":"In FORMAT mode also iterate dialog->new_names for \"\", \".\" and \"..\" as is already done for REPLACE mode, rather than only testing the raw entry_text.","locations":[{"ref":"src/nautilus-batch-rename-dialog.c:921-961","code":"  921 |     if (dialog->mode == NAUTILUS_BATCH_RENAME_DIALOG_FORMAT && g_strcmp0 (entry_text, \".\") == 0)\n  922 |     {\n  923 |         have_unallowed_character_dot = TRUE;\n  924 |     }\n  925 |     else if (dialog->mode == NAUTILUS_BATCH_RENAME_DIALOG_REPLACE)\n  926 |     {\n  927 |         for (names = dialog->new_names; names != NULL; names = names->next)\n  928 |         {\n  929 |             new_name = names->data;\n  930 | \n  931 |             if (g_strcmp0 (new_name->str, \".\") == 0)\n  932 |             {\n  933 |                 have_unallowed_character_dot = TRUE;\n  934 |                 break;\n  935 |             }\n  936 |         }\n  937 |     }\n  938 | \n  939 |     if (dialog->mode == NAUTILUS_BATCH_RENAME_DIALOG_FORMAT && g_strcmp0 (entry_text, \"..\") == 0)\n  940 |     {\n  941 |         have_unallowed_character_dotdot = TRUE;\n  942 |     }\n  943 |     else if (dialog->mode == NAUTILUS_BATCH_RENAME_DIALOG_REPLACE)\n  944 |     {\n  945 |         for (names = dialog->new_names; names != NULL; names = names->next)\n  946 |         {\n  947 |             new_name = names->data;\n  948 | \n  949 |             if (g_strcmp0 (new_name->str, \"\") == 0)\n  950 |             {\n  951 |                 have_empty_name = TRUE;\n  952 |                 break;\n  953 |             }\n  954 | \n  955 |             if (g_strcmp0 (new_name->str, \"..\") == 0)\n  956 |             {\n  957 |                 have_unallowed_character_dotdot = TRUE;\n  958 |                 break;\n  959 |             }\n  960 |         }\n  961 |     }"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","description":"markup_hightlight_text() wraps the replacement in <span ...>%s<\/span> using escaped_replacement. In batch-rename REPLACE preview, when the Replace field is empty the replacement text is the empty string, producing an empty <span><\/span> that highlights nothing — the matched substring visually disappears with no indication it is being deleted. Purely cosmetic preview glitch.","fix":"When replacement_text is empty, render a visible marker (e.g. a thin highlighted gap) or skip highlighting and show strike-through on the original substring instead.","locations":[{"ref":"src/nautilus-batch-rename-utilities.c:139-145","code":"  139 |     g_autofree gchar *escaped_substring = g_markup_escape_text (substring, -1);\n  140 |     g_autofree gchar *escaped_replacement = g_markup_escape_text (replacement_text, -1);\n  141 |     g_autofree gchar *highlighted_string = g_strdup_printf (\"<span background='%s' color='%s'>%s<\/span>\",\n  142 |                                                             background_color, text_color,\n  143 |                                                             escaped_replacement);\n  144 | \n  145 |     g_string_replace (new_label, escaped_substring, highlighted_string, -1);"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","description":"batch_rename_dialog_get_new_names_list() in REPLACE mode calls g_string_replace(new_name, entry_text, replace_text, -1) without guarding against an empty find string. With GLib >= 2.74, g_string_replace() with an empty search string inserts the replacement between every character (and at the ends), so an empty Find field with a non-empty Replace field corrupts all names instead of leaving them unchanged. On older GLib it is a no-op, so behavior is version-dependent.","fix":"Skip the replace (or return names unchanged) when entry_text is NULL or empty, e.g. if (entry_text != NULL && *entry_text != '\\0') g_string_replace(...).","locations":[{"ref":"src/nautilus-batch-rename-utilities.c:348-355","code":"  348 |         if (mode == NAUTILUS_BATCH_RENAME_DIALOG_REPLACE)\n  349 |         {\n  350 |             new_name = g_string_new (nautilus_file_get_name (file));\n  351 | \n  352 |             g_string_replace (new_name, entry_text, replace_text, -1);\n  353 | \n  354 |             result = g_list_prepend (result, new_name);\n  355 |         }"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","description":"bookmark_monitor_changed_cb() reloads the file on G_FILE_MONITOR_EVENT_CHANGED or CREATED but not on G_FILE_MONITOR_EVENT_DELETED or CHANGES_DONE_HINT. If the bookmarks file is deleted (e.g. by another app or replace that emits delete+create with rate limiting collapsing events), the in-memory list may go stale. Also load_file_async() asserts save_cancellable == NULL (line 514), but a monitor-triggered load can race with an in-flight save where save_cancellable was just cleared in save_callback; the comment claims the monitor is disabled during save, but re-enable happens in save_callback on the main loop, leaving a window.","fix":"Handle DELETED by clearing the list, and replace the g_return_if_fail assertion on save_cancellable with graceful handling/cancellation of the pending save.","locations":[{"ref":"src/nautilus-bookmark-list.c:183-195","code":"  183 | bookmark_monitor_changed_cb (GFileMonitor      *monitor,\n  184 |                              GFile             *child,\n  185 |                              GFile             *other_file,\n  186 |                              GFileMonitorEvent  eflags,\n  187 |                              gpointer           user_data)\n  188 | {\n  189 |     if (eflags == G_FILE_MONITOR_EVENT_CHANGED ||\n  190 |         eflags == G_FILE_MONITOR_EVENT_CREATED)\n  191 |     {\n  192 |         g_return_if_fail (NAUTILUS_IS_BOOKMARK_LIST (NAUTILUS_BOOKMARK_LIST (user_data)));\n  193 |         nautilus_bookmark_list_load_file (NAUTILUS_BOOKMARK_LIST (user_data));\n  194 |     }\n  195 | }"},{"ref":"src/nautilus-bookmark-list.c:508-514","code":"  508 | static void\n  509 | load_file_async (NautilusBookmarkList *self)\n  510 | {\n  511 |     /* This didn't come from a monitor since it would be temperorarly disabled.\n  512 |      * The only other source of load is the initialization, which would never\n  513 |      * occur after another operation */\n  514 |     g_return_if_fail (self->save_cancellable == NULL);"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_bookmark_list_move_item() computes link_at_destination = g_list_nth(list, destination) BEFORE removing link_to_move, then inserts before that node link. Because it uses the link pointer (not a re-evaluated index), the moved item is placed before whatever element currently occupies 'destination'. For a move-down this means the item lands one slot earlier than a caller passing the post-removal index would expect. Whether this is correct depends on the caller's index convention (pre- vs post-removal). Lower-confidence; verify against the DnD reorder caller's expected destination semantics.","fix":"Document/normalize the destination index convention; if callers pass a post-removal index, adjust by -1 when destination > index.","locations":[{"ref":"src/nautilus-bookmark-list.c:368-383","code":"  368 |     if (index == destination)\n  369 |     {\n  370 |         return;\n  371 |     }\n  372 | \n  373 |     GList *link_at_destination = g_list_nth (bookmarks->list, destination);\n  374 | \n  375 |     bookmarks->list = g_list_remove_link (bookmarks->list,\n  376 |                                           link_to_move);\n  377 | \n  378 |     /* NULL link at destination means end of the list */\n  379 |     bookmarks->list = g_list_insert_before_link (bookmarks->list,\n  380 |                                                  link_at_destination,\n  381 |                                                  link_to_move);\n  382 | \n  383 |     nautilus_bookmark_list_save_file (bookmarks);"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","description":"save_file_async() writes each bookmark as 'printf(\"%s %s\\n\", uri, label)' (line 644). When a bookmark has no custom name, nautilus_bookmark_get_name() returns the computed display name, so this is fine; but if label is NULL (name not yet computed) the '%s' prints '(null)' into the file, corrupting it. Also a trailing space is always written even when label is empty, and load_callback() splits on the first space, so a label-less line round-trips with an empty label.","fix":"Guard against NULL label (skip the space+label when label is NULL/empty) before writing.","locations":[{"ref":"src/nautilus-bookmark-list.c:636-645","code":"  636 |     for (GList *l = self->list; l != NULL; l = l->next)\n  637 |     {\n  638 |         NautilusBookmark *bookmark = NAUTILUS_BOOKMARK (l->data);\n  639 | \n  640 |         /* Store bookmark URI followed by label */\n  641 |         g_autofree char *uri = nautilus_bookmark_get_uri (bookmark);\n  642 |         const char *label = nautilus_bookmark_get_name (bookmark);\n  643 | \n  644 |         g_string_append_printf (bookmark_string, \"%s %s\\n\", uri, label);\n  645 |     }"},{"ref":"src/nautilus-bookmark-list.c:461-470","code":"  461 |         /* Split bookmarks file entries into URI and label, which are separated by\n  462 |          * a space. This behavior is used since GTK 2.7's file chooser.\n  463 |          */\n  464 |         char *label = NULL;\n  465 |         char *space = strchr (uri, ' ');\n  466 |         if (space != NULL)\n  467 |         {\n  468 |             *space = '\\0';\n  469 |             label = space + 1;\n  470 |         }"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In bookmark_set_name_from_ready_file(), the early-return guards on 'self->name != NULL', so by the time the else-if at line 101 runs self->name is always NULL; the condition 'g_strcmp0 (self->name, display_name) != 0' is therefore always true (NULL vs name). The comparison is dead/misleading and the g_debug logs the just-changed name as if it were the old one.","fix":"Drop the redundant g_strcmp0 guard (it can only ever be true here) and just call nautilus_bookmark_set_name() unconditionally for the non-home case.","locations":[{"ref":"src/nautilus-bookmark.c:90-105","code":"   90 |     if (self->name != NULL)\n   91 |     {\n   92 |         return;\n   93 |     }\n   94 | \n   95 |     const char *display_name = nautilus_file_get_display_name (self->file);\n   96 | \n   97 |     if (nautilus_file_is_home (self->file))\n   98 |     {\n   99 |         nautilus_bookmark_set_name (self, _(\"Home\"));\n  100 |     }\n  101 |     else if (g_strcmp0 (self->name, display_name) != 0)\n  102 |     {\n  103 |         nautilus_bookmark_set_name (self, display_name);\n  104 |         g_debug (\"%s: name changed to %s\", nautilus_bookmark_get_name (self), display_name);\n  105 |     }"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_clipboard_from_string() writes to *error in the early-return branches (string==NULL, bad prefix, empty line) without first checking that the caller passed a non-NULL error location. The only in-tree caller passes &error, but the function is otherwise general; g_uri_is_valid() is used safely with the same 'error' arg, so the convention is inconsistent.","fix":"Use g_set_error()/g_propagate-style with a NULL-tolerant pattern, or document that error must be non-NULL; minimally guard 'if (error != NULL)' before assignment.","locations":[{"ref":"src/nautilus-clipboard.c:77-99","code":"   77 |     if (string == NULL)\n   78 |     {\n   79 |         *error = g_error_new (G_IO_ERROR, G_IO_ERROR_INVALID_DATA, _(\"Clipboard string cannot be NULL.\"));\n   80 |         return NULL;\n   81 |     }\n   82 | \n   83 |     lines = g_strsplit (string, \"\\n\", 0);\n   84 | \n   85 |     if (g_strcmp0 (lines[0], \"cut\") != 0 && g_strcmp0 (lines[0], \"copy\") != 0)\n   86 |     {\n   87 |         /* Translators: Do not translate 'cut' and 'copy'. These are literal keywords. */\n   88 |         *error = g_error_new (G_IO_ERROR, G_IO_ERROR_INVALID_DATA, _(\"Nautilus Clipboard must begin with “cut” or “copy”.\"));\n   89 |         return NULL;\n   90 |     }\n   91 | \n   92 |     /* Line 0 is \"cut\" or \"copy\", so uris start at line 1. */\n   93 |     for (int i = 1; lines[i] != NULL; i++)\n   94 |     {\n   95 |         if (g_strcmp0 (lines[i], \"\") == 0)\n   96 |         {\n   97 |             *error = g_error_new (G_IO_ERROR, G_IO_ERROR_INVALID_DATA, _(\"Nautilus Clipboard must not have empty lines.\"));\n   98 |             return NULL;\n   99 |         }"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","description":"move_row()'s lower bound when moving down is off by one: the guard is `i >= n_items` but the last valid index is n_items-1. When the bottom row is moved down, the guard passes and the code removes index i and re-inserts at i+1, which g_list_store clamps to the end — a silent no-op rather than being rejected. The intended guard is `i >= n_items - 1`.","fix":"Use `(!up && i >= n_items - 1)` in the early-return condition.","locations":[{"ref":"src/nautilus-column-chooser.c:109-127","code":"  109 | static void\n  110 | move_row (NautilusColumnChooser *chooser,\n  111 |           GtkListBoxRow         *row,\n  112 |           gboolean               up)\n  113 | {\n  114 |     guint i = gtk_list_box_row_get_index (row);\n  115 |     g_autoptr (NautilusColumn) column = g_list_model_get_item (chooser->model, i);\n  116 |     guint n_items = g_list_model_get_n_items (chooser->model);\n  117 | \n  118 |     if ((up && i <= 0) || (!up && i >= n_items))\n  119 |     {\n  120 |         return;\n  121 |     }\n  122 | \n  123 |     g_list_store_remove (G_LIST_STORE (chooser->model), i);\n  124 |     g_list_store_insert (G_LIST_STORE (chooser->model), i + (up ? -1 : 1), column);\n  125 | \n  126 |     list_changed (chooser);\n  127 | }"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_column_get_default_column_order() returns default_columns_for_trash / default_columns_for_recent (the VISIBLE column name lists) as the column ORDER for trash/recent. These arrays are the visible-columns presets, not necessarily the intended ordering source, and reusing the same arrays for both 'visible columns' and 'column order' in get_default_visible_columns and get_default_column_order is a likely copy-paste; for recent/trash it happens to coincide, but conflates two distinct concepts.","fix":"Confirm intent; if order should follow default_column_order filtered to the visible set, compute it explicitly instead of reusing the visible-columns arrays.","locations":[{"ref":"src/nautilus-column-utilities.c:455-470","code":"  455 | GStrv\n  456 ce.","locations":[{"ref":"src/nautilus-date-utilities.c:459-463","code":"  459 |     gint days = g_date_time_difference (end_date, start_date) / G_TIME_SPAN_DAY;\n  460 |     if (days < 1)\n  461 |     {\n  462 |         return date_to_str (start_date, use_short_format, FALSE, FALSE);\n  463 |     }"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_file_changes_consume_changes: when a CHANGE_FILE_UNMOUNTED is queued, change->from is added to 'deletions' (ownership transferred) AND a separate g_object_ref(change->from) is added to 'unmounts'. On flush, unmounts is freed with g_object_unref and deletions with g_object_unref — balanced. However 'unmounts' is only freed inside the 'if (deletions != NULL)' block; if a flush is triggered with unmounts non-empty but deletions somehow NULL, unmounts would leak. In practice unmounts is only populated alongside deletions, so they are always non-NULL together, but the cleanup coupling is implicit and fragile.","fix":"Free 'unmounts' unconditionally (e.g. with g_clear_list) at flush time independent of the deletions branch, to decouple the lifetimes.","locations":[{"ref":"src/nautilus-file-changes-queue.c:214-225","code":"  214 |             if (deletions != NULL)\n  215 |             {\n  216 |                 /* Mark unmounted files before notifying their removal, for\n  217 |                  * clients to know this is why the file is gone. */\n  218 |                 nautilus_directory_mark_files_unmounted (unmounts);\n  219 |                 g_clear_list (&unmounts, g_object_unref);\n  220 | \n  221 |                 deletions = g_list_reverse (deletions);\n  222 |                 nautilus_directory_notify_files_removed (deletions);\n  223 |                 g_list_free_full (deletions, g_object_unref);\n  224 |                 deletions = NULL;\n  225 |             }"},{"ref":"src/nautilus-file-changes-queue.c:270-275","code":"  270 |             case CHANGE_FILE_UNMOUNTED:\n  271 |             {\n  272 |                 deletions = g_list_prepend (deletions, change->from);\n  273 |                 unmounts = g_list_prepend (unmounts, g_object_ref (change->from));\n  274 |             }\n  275 |             break;"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In nautilus_file_operations_move(), the early-return fast path (no copy+delete fallbacks needed) builds a synthetic SourceInfo/TransferInfo with only num_files set (num_bytes left 0) and calls report_copy_progress(). report_copy_progress() computes total_size = MAX(num_bytes, transfer num_bytes) = 0 and finally calls nautilus_progress_info_set_progress(progress, 0, 0). A 0 total may yield a 0/0 progress fraction in the progress info. Functionally the move already succeeded so this is cosmetic, but the all-moved case reports progress differently (by file count vs bytes) and with a zero total.","fix":"Populate source_info.num_bytes (or pass a flag) so report_copy_progress reports a sensible 100% completion, or special-case the all-moved path to report completion explicitly.","locations":[{"ref":"src/nautilus-file-operations.c:5826-5839","code":" 5826 |     if (fallbacks == NULL)\n 5827 |     {\n 5828 |         gint total;\n 5829 | \n 5830 |         total = g_list_length (job->files);\n 5831 | \n 5832 |         memset (&source_info, 0, sizeof (source_info));\n 5833 |         source_info.num_files = total;\n 5834 |         memset (&transfer_info, 0, sizeof (transfer_info));\n 5835 |         transfer_info.num_files = total;\n 5836 |         report_copy_progress (job, &source_info, &transfer_info);\n 5837 | \n 5838 |         return;\n 5839 |     }"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_file_operations_copy_move() dereferences `dest` (calls g_file_has_uri_scheme (dest, SCHEME_STARRED) at line 6483) without first checking that `dest` is non-NULL. `dest` is only assigned when `target_dir != NULL` (lines 6450-6457); it stays NULL otherwise. g_file_has_uri_scheme(NULL, ...) is invalid. The COPY branch later guards `target_dir == NULL`, and the original callers may always pass a target, but the STARRED check at 6483 has no such guard and runs unconditionally for every code path.","fix":"Guard the STARRED check with `dest != NULL`, e.g. `if (dest != NULL && g_file_has_uri_scheme (dest, SCHEME_STARRED))`.","locations":[{"ref":"src/nautilus-file-operations.c:6483","code":" 6483 |     if (g_file_has_uri_scheme (dest, SCHEME_STARRED))"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In activate_files the test 'if (parameters->open_in_app_uris != NULL)' checks the GQueue pointer, which is always non-NULL after g_queue_new(). The intent is to check whether any URIs were queued; it should use !g_queue_is_empty(). As written the make_activation_parameters path (non-sandboxed) and num_windows accounting always run even when no app URIs exist. Effect is benign (empty queue yields empty list) but the condition is misleading and inconsistent with the !g_queue_is_empty() checks used later.","fix":"Replace 'parameters->open_in_app_uris != NULL' with '!g_queue_is_empty (parameters->open_in_app_uris)'. Remove the stale undo-operations location.","locations":[{"ref":"src/nautilus-file-undo-operations.c:0-0","code":""},{"ref":"src/nautilus-mime-actions.c:1609-1622","code":" 1609 |     if (parameters->open_in_app_uris != NULL)\n 1610 |     {\n 1611 |         if (nautilus_application_is_sandboxed ())\n 1612 |         {\n 1613 |             num_windows += g_queue_get_length (parameters->open_in_app_uris);\n 1614 |         }\n 1615 |         else\n 1616 |         {\n 1617 |             parameters->open_in_app_parameters = make_activation_parameters (g_queue_peek_head_link (parameters->open_in_app_uris),\n 1618 |                                                                              &parameters->unhandled_open_in_app_uris);\n 1619 |             num_windows += g_list_length (parameters->open_in_app_parameters);\n 1620 |             num_windows += g_list_length (parameters->unhandled_open_in_app_uris);\n 1621 |         }\n 1622 |     }"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ext_strings_func's CREATE_LINK plural branch (count > 1) sets *undo_description and *redo_description but never sets *undo_label / *redo_label, unlike the MOVE/COPY/DUPLICATE plural branches which set all four. For multiple links the undo/redo labels are left unset (NULL), whereas the single-link branch sets them. Callers that use the label (e.g. menu item text) get NULL for the multi-link case.","fix":"Add *undo_label/*redo_label assignments (\"_Undo Create Link\" / \"_Redo Create Link\") in the count > 1 branch, matching the single-item branch.","locations":[{"ref":"src/nautilus-file-undo-operations.c:549-568","code":"  549 |     else if (op_type == NAUTILUS_FILE_UNDO_OP_CREATE_LINK)\n  550 |     {\n  551 |         if (count > 1)\n  552 |         {\n  553 |             *undo_description = g_strdup_printf (ngettext (\"Delete links to %d item\",\n  554 |                                                            \"Delete links to %d items\", count),\n  555 |                                                  count);\n  556 |             *redo_description = g_strdup_printf (ngettext (\"Create links to %d item\",\n  557 |                                                            \"Create links to %d items\", count),\n  558 |                                                  count);\n  559 |         }\n  560 |         else\n  561 |         {\n  562 |             *undo_description = g_strdup_printf (_(\"Delete link to “%s”\"), name);\n  563 |             *redo_description = g_strdup_printf (_(\"Create link to “%s”\"), name);\n  564 | \n  565 |             *undo_label = g_strdup (_(\"_Undo Create Link\"));\n  566 |             *redo_label = g_strdup (_(\"_Redo Create Link\"));\n  567 |         }\n  568 |     }"}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","description":"trash_retrieve_files_ready passes '(error == NULL)' as the success flag to file_undo_info_transfer_callback, but inside this branch error is already known to be NULL (the branch condition was 'error == NULL && size > 0'), so success is always TRUE regardless of whether the individual g_file_move() calls in the loop succeeded. Failed restores (g_file_move with NULL GError) are silently ignored and the undo is reported as fully successful.","fix":"Track move failures (pass a GError to g_file_move and accumulate) and report aggregate success accordingly, or at least not hardcode an always-true expression.","locations":[{"ref":"src/nautilus-file-undo-operations.c:1798-1818","code":" 1798 |     if (error == NULL && g_hash_table_size (files_to_restore) > 0)\n 1799 |     {\n 1800 |         GList *gfiles_in_trash, *l;\n 1801 |         GFile *item;\n 1802 |         GFile *dest;\n 1803 | \n 1804 |         gfiles_in_trash = g_hash_table_get_keys (files_to_restore);\n 1805 | \n 1806 |         for (l = gfiles_in_trash; l != NULL; l = l->next)\n 1807 |         {\n 1808 |             item = l->data;\n 1809 |             dest = g_hash_table_lookup (files_to_restore, item);\n 1810 | \n 1811 |             g_file_move (item, dest, G_FILE_COPY_NOFOLLOW_SYMLINKS, NULL, NULL, NULL, NULL);\n 1812 |         }\n 1813 | \n 1814 |         g_list_free (gfiles_in_trash);\n 1815 | \n 1816 |         /* Here we must do what's necessary for the callback */\n 1817 |         file_undo_info_transfer_callback (NULL, (error == NULL), self);\n 1818 |     }"}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","description":"trim_whitespace() loops 'while (space_count <= length)' and on each iteration does g_utf8_prev_char(offset). When the entire string is whitespace, after consuming all 'length' chars offset reaches the start of the string and a further g_utf8_prev_char(offset) on the first call past the buffer start is undefined behavior (reads before the string). The loop bound should stop before exceeding the start.","fix":"Use 'while (space_count < length)' so g_utf8_prev_char is never called when offset is already at the string start.","locations":[{"ref":"src/nautilus-file-utilities.c:867-899","code":"  867 | static char *\n  868 | trim_whitespace (const gchar *string)\n  869 | {\n  870 |     glong space_count;\n  871 |     glong length;\n  872 |     gchar *offset;\n  873 | \n  874 |     space_count = 0;\n  875 |     length = g_utf8_strlen (string, -1);\n  876 |     offset = g_utf8_offset_to_pointer (string, length);\n  877 | \n  878 |     while (space_count <= length)\n  879 |     {\n  880 |         gunichar character;\n  881 | \n  882 |         offset = g_utf8_prev_char (offset);\n  883 |         character = g_utf8_get_char (offset);\n  884 | \n  885 |         if (!g_unichar_isspace (character))\n  886 |         {\n  887 |             break;\n  888 |         }\n  889 | \n  890 |         space_count++;\n  891 |     }\n  892 | \n  893 |     if (space_count == 0)\n  894 |     {\n  895 |         return g_strdup (string);\n  896 |     }\n  897 | \n  898 |     return g_utf8_substring (string, 0, length - space_count);\n  899 | }"}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","description":"real_batch_rename only reports an error to the caller when op->skipped_files > 1, so a batch rename in which exactly one file was skipped completes as success with no error and no indication to the user that the file was not renamed. The cutoff appears arbitrary given the message text says 'Skipped %d file(s)'.","fix":"Use `if (op->skipped_files > 0)` so any skipped file is surfaced, or document why a single skip is intentionally silent.","locations":[{"ref":"src/nautilus-file.c:2256-2262","code":" 2256 |     if (op->skipped_files > 1)\n 2257 |     {\n 2258 |         skip_error = g_error_new (G_IO_ERROR, G_IO_ERROR_FAILED,\n 2259 |                                   \"Skipped %d file(s)\", op->skipped_files);\n 2260 |     }\n 2261 | \n 2262 |     nautilus_file_operation_complete (op, NULL, skip_error);"}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_file_can_get_size returns (size == -1), i.e. it returns TRUE when the size is UNKNOWN and FALSE when the size is known. This is the opposite of what the name implies ('can get size'). The sole caller in nautilus-files-view.c compensates by negating it (`if (!nautilus_file_can_get_size (file))`), so behavior is correct but the inverted naming is a trap for future callers.","fix":"Rename to nautilus_file_size_is_unknown (and adjust the caller), or invert the return value to `return file->details->size != -1;` and update the caller accordingly.","locations":[{"ref":"src/nautilus-file.c:5133-5137","code":" 5133 | gboolean\n 5134 | nautilus_file_can_get_size (NautilusFile *file)\n 5135 | {\n 5136 |     return file->details->size == -1;\n 5137 | }"}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_filename_get_common_prefix() compares the loop counter `pos` (guint) against `common_len` (glong) in `for (guint pos = 0; pos < common_len; pos++)`. The comparison promotes pos to glong so it is functionally correct, but common_len can be reduced inside the loop body (`common_len = pos`) while pos keeps incrementing only up to the old bound; this is fine, yet mixing signed glong and unsigned guint in the condition is fragile and will warn under -Wsign-compare. No overflow in practice given filename lengths.","fix":"Use a signed loop variable (glong pos) to match common_len and avoid signed/unsigned comparison.","locations":[{"ref":"src/nautilus-filename-utilities.c:297-307","code":"  297 |         for (guint pos = 0; pos < common_len; pos++)\n  298 |         {\n  299 |             if (g_utf8_get_char (character_a) != g_utf8_get_char (character_b))\n  300 |             {\n  301 |                 common_len = pos;\n  302 |                 break;\n  303 |             }\n  304 | \n  305 |             character_a = g_utf8_next_char (character_a);\n  306 |             character_b = g_utf8_next_char (character_b);\n  307 |         }"}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_filename_get_extension() rejects any extension containing a whitespace character by scanning from the dot to end of string and returning 'no extension' if any unichar isspace. This means a legitimately-dotted name with a trailing space inside the extension region (e.g. 'file.tar gz') is treated as having no extension at all, and the .tar special-casing below is then unreachable for such names. Likely intended, but the whitespace rejection is broader than the comment ('no whitespaces in found extension') implies because it also covers the .tar lookback region indirectly.","fix":"If only the final extension token should be whitespace-free, scan only up to the next path/extension boundary rather than to the end of the whole string; otherwise clarify the comment.","locations":[{"ref":"src/nautilus-filename-utilities.c:346-363","code":"  346 |     /** Make sure there are no whitespaces in found extension */\n  347 |     for (const char *c = extension; *c != '\\0'; c = g_utf8_next_char (c))\n  348 |     {\n  349 |         if (g_unichar_isspace (g_utf8_get_char (c)))\n  350 |         {\n  351 |             return start + search_length;\n  352 |         }\n  353 |     }\n  354 | \n  355 |     /* Special case .tar extensions.\n  356 |      * This will also catch .tar.jpg, but such cases seem contrived and this\n  357 |      * is better than maintaing a list of all possible .tar extensions. */\n  358 |     size_t tar_extension_length = strlen (\".tar\");\n  359 |     if (filename + tar_extension_length < extension &&\n  360 |         strncmp (extension - tar_extension_length, \".tar\", tar_extension_length) == 0)\n  361 |     {\n  362 |         return extension - tar_extension_length;\n  363 |     }"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_filename_validator_name_is_valid() measures name length with strlen() (bytes) and compares against nautilus_get_max_child_name_length_for_location() in nautilus_filename_validator_is_name_too_long(). The max is a byte limit (e.g. NAME_MAX) so byte length is correct for the filesystem limit, but the user-facing 'too long' threshold is thus measured in bytes while names are entered/displayed in UTF-8 characters; multibyte names may be rejected at fewer visible characters than expected. This matches kernel semantics but can surprise users with non-ASCII names.","fix":"No code change needed for correctness; consider documenting that the limit is in bytes, or surfacing a byte-aware message.","locations":[{"ref":"src/nautilus-filename-validator.c:87-104","code":"   87 | static gboolean\n   88 | nautilus_filename_validator_is_name_too_long (NautilusFilenameValidator *self,\n   89 |                                               gchar                     *name)\n   90 | {\n   91 |     size_t name_length = strlen (name);\n   92 |     g_autoptr (GFile) location = nautilus_directory_get_location (self->containing_directory);\n   93 |     glong max_name_length = nautilus_get_max_child_name_length_for_location (location);\n   94 | \n   95 |     if (max_name_length == -1)\n   96 |     {\n   97 |         /* We don't know, so let's give it a chance */\n   98 |         return FALSE;\n   99 |     }\n  100 |     else\n  101 |     {\n  102 |         return name_length > (gulong) max_name_length;\n  103 |     }\n  104 | }"},{"ref":"src/nautilus-filename-validator.c:127-150","code":"  127 | \n  128 |     is_valid = TRUE;\n  129 |     if (name == NULL || strlen (name) == 0)\n  130 |     {\n  131 |         is_valid = FALSE;\n  132 |     }\n  133 |     else if (strchr (name, '/') != NULL)\n  134 |     {\n  135 |         is_valid = FALSE;\n  136 |         *error_message = is_folder ? _(\"Folder names cannot contain “/”\") :\n  137 |                                      _(\"File names cannot contain “/”\");\n  138 |     }\n  139 |     else if (strcmp (name, \".\") == 0 || strcmp (name, \"..\") == 0)\n  140 |     {\n  141 |         is_valid = FALSE;\n  142 |         *error_message = is_folder ? _(\"A folder cannot be called “.” or “..”\") :\n  143 |                                      _(\"A file cannot be called “.” or “..”\");\n  144 |     }\n  145 |     else if (nautilus_filename_validator_is_name_too_long (self, name))\n  146 |     {\n  147 |         is_valid = FALSE;\n  148 |         *error_message = is_folder ? _(\"Folder name is too long\") :\n  149 |                                      _(\"File name is too long\");\n  150 |     }"}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","description":"get_file_paths_or_uris_as_newline_delimited_string(): when get_paths is requested and any file lacks a local path, the function frees the accumulated string and returns g_strdup(\"\"), discarding paths already collected for earlier files. The corresponding URI branch has no such early-abort. As a result, set_script_environment_variables() can export an empty NAUTILUS_SCRIPT_SELECTED_FILE_PATHS for a mixed selection (some local, some not), even though some files do have valid local paths.","fix":"Skip non-local files individually (continue) instead of aborting the whole string, matching the behavior of get_file_names_as_parameter_array's intent, or document that mixed selections intentionally yield an empty path list.","locations":[{"ref":"src/nautilus-files-view.c:5036-5040","code":" 5036 |             if (!nautilus_file_has_local_path (file))\n 5037 |             {\n 5038 |                 g_string_free (expanding_string, TRUE);\n 5039 |                 return g_strdup (\"\");\n 5040 |             }"}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","description":"skeleton_handle_show_item_properties_cb() connects g_application_release to the window's 'destroyed' signal, but nautilus_properties_present_window() may return an existing/NULL window when called repeatedly for the same files; if it returns NULL, g_signal_connect_swapped on NULL and the held g_application_hold is never released. No NULL check on 'window'.","fix":"Check window for NULL; if NULL, release the application hold immediately instead of connecting the signal.","locations":[{"ref":"src/nautilus-freedesktop-dbus.c:120-124","code":"  120 |     GtkWindow *window = nautilus_properties_present_window (files, startup_id);\n  121 | \n  122 |     g_application_hold (application);\n  123 |     g_signal_connect_swapped (window, \"destroyed\",\n  124 |                               G_CALLBACK (g_application_release), application);"}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_image thumbnail_pixbuf_ready_callback() sets self->error then checks 'if (pixbuf != NULL)' to decide success, unlike the sibling callbacks (thumbnailing_done_cb, thumbnail_file_read_callback, file_info_ready_callback) which check 'pixbuf != NULL && self->error == NULL'. Functionally equivalent (pixbuf non-NULL implies no error from g_task_propagate_pointer), but the inconsistency could hide a future bug where both are set.","fix":"Make the condition consistent: 'if (pixbuf != NULL && self->error == NULL)'.","locations":[{"ref":"src/nautilus-image.c:323-332","code":"  323 |     self->error = g_steal_pointer (&error);\n  324 | \n  325 |     if (pixbuf != NULL)\n  326 |     {\n  327 |         setup_texture_for_image (self, pixbuf);\n  328 |     }\n  329 |     else\n  330 |     {\n  331 |         handle_loading_error (self);\n  332 |     }"}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_location_entry_set_text() blocks insert/delete handlers on the editable *delegate*, but the completion machinery (after_text_change) is also driven indirectly. When set_special_text() is used and then text is programmatically set, completions for the special text are intentionally suppressed — however set_text() does not reset priv->idle_insert_completion, so a previously scheduled idle (completion_id) from real typing can still fire after a programmatic set_text and insert a stale completion prefix into the just-set text.","fix":"Cancel any pending completion idle (g_clear_handle_id (&priv->completion_id, g_source_remove)) inside nautilus_location_entry_set_text() before setting the text, so programmatic text changes don't get clobbered by a stale completion.","locations":[{"ref":"src/nautilus-location-entry.c:107-121","code":"  107 | static void\n  108 | nautilus_location_entry_set_text (NautilusLocationEntry *entry,\n  109 |                                   const char            *new_text)\n  110 | {\n  111 |     GtkEditable *delegate;\n  112 | \n  113 |     delegate = gtk_editable_get_delegate (GTK_EDITABLE (entry));\n  114 |     g_signal_handlers_block_by_func (delegate, G_CALLBACK (on_after_insert_text), entry);\n  115 |     g_signal_handlers_block_by_func (delegate, G_CALLBACK (on_after_delete_text), entry);\n  116 | \n  117 |     gtk_editable_set_text (GTK_EDITABLE (entry), new_text);\n  118 | \n  119 |     g_signal_handlers_unblock_by_func (delegate, G_CALLBACK (on_after_insert_text), entry);\n  120 |     g_signal_handlers_unblock_by_func (delegate, G_CALLBACK (on_after_delete_text), entry);\n  121 | }"},{"ref":"src/nautilus-location-entry.c:670-687","code":"  670 | static void\n  671 | after_text_change (NautilusLocationEntry *self,\n  672 |                    gboolean               insert)\n  673 | {\n  674 |     NautilusLocationEntryPrivate *priv = nautilus_location_entry_get_instance_private (self);\n  675 | \n  676 |     /* Only insert a completion if a character was typed. Otherwise,\n  677 |      * update the completions store (i.e. in case backspace was pressed)\n  678 |      * but don't insert the completion into the entry. */\n  679 |     priv->idle_insert_completion = insert;\n  680 | \n  681 |     /* Do the expand at idle time to avoid slowing down typing when the\n  682 |      * directory is large. */\n  683 |     if (priv->completion_id == 0)\n  684 |     {\n  685 |         priv->completion_id = g_idle_add (update_completions_store, self);\n  686 |     }\n  687 | }"}]},{"id":"LOGIC_62","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_location_entry_set_location() formats current_location via g_file_get_parse_name for display, but only updates priv->current_location in the non-internal-scheme branch. For internal schemes it sets special text and leaves priv->current_location pointing at the previous location. Subsequent relative-path completion/activation (completer_data_new uses priv->current_location) then resolves against a stale base location.","fix":"Update (or clear) priv->current_location consistently for internal schemes too, or document that completion is intentionally based on the last non-internal location.","locations":[{"ref":"src/nautilus-location-entry.c:202-242","code":"  202 | void\n  203 | nautilus_location_entry_set_location (NautilusLocationEntry *entry,\n  204 |                                       GFile                 *location)\n  205 | {\n  206 |     g_autofree char *scheme = g_file_get_uri_scheme (location);\n  207 |     NautilusLocationEntryPrivate *priv;\n  208 | \n  209 |     g_assert (location != NULL);\n  210 | \n  211 |     priv = nautilus_location_entry_get_instance_private (entry);\n  212 | \n  213 |     /* Note: This is called in reaction to external changes, and\n  214 |      * thus should not emit the LOCATION_CHANGED signal. */\n  215 | \n  216 |     if (nautilus_scheme_is_internal (scheme))\n  217 |     {\n  218 |         nautilus_location_entry_set_special_text (entry, \"\");\n  219 |     }\n  220 |     else\n  221 |     {\n  222 |         g_set_object (&priv->current_location, location);\n  223 | \n  224 |         g_autofree gchar *formatted_uri = g_file_get_parse_name (location);\n  225 | \n  226 |         nautilus_location_entry_set_text (entry, formatted_uri);\n  227 |         set_position_and_selection_to_end (GTK_EDITABLE (entry));\n  228 |     }\n  229 | \n  230 |     /* remember the original location for later comparison */\n  231 |     if (!priv->last_location ||\n  232 |         !g_file_equal (priv->last_location, location))\n  233 |     {\n  234 |         g_clear_object (&priv->last_location);\n  235 |         priv->last_location = g_object_ref (location);\n  236 |     }\n  237 | \n  238 |     nautilus_location_entry_update_action (entry);\n  239 | \n  240 |     /* invalidate the completions list */\n  241 |     gtk_list_store_clear (priv->completions_store);\n  242 | }"}]},{"id":"LOGIC_63","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ACTIVATION_ACTION_LAUNCH_IN_TERMINAL is handled in activate_files (queues into launch_in_terminal_files) but get_activation_action() never returns it; for executable text files it returns get_default_executable_text_file_action() which unconditionally returns ACTIVATION_ACTION_OPEN_IN_APPLICATION. The terminal-launch queue and its processing loop are therefore dead code paths that can never be exercised.","fix":"Either remove the unreachable LAUNCH_IN_TERMINAL handling and the get_default_executable_text_file_action indirection, or restore logic that can actually return ACTIVATION_ACTION_LAUNCH_IN_TERMINAL if terminal launching is intended to be supported.","locations":[{"ref":"src/nautilus-mime-actions.c:716-720","code":"  716 | static ActivationAction\n  717 | get_default_executable_text_file_action (void)\n  718 | {\n  719 |     return ACTIVATION_ACTION_OPEN_IN_APPLICATION;\n  720 | }"},{"ref":"src/nautilus-mime-actions.c:1562-1566","code":" 1562 |             case ACTIVATION_ACTION_LAUNCH_IN_TERMINAL:\n 1563 |             {\n 1564 |                 g_queue_push_tail (parameters->launch_in_terminal_files, file);\n 1565 |             }\n 1566 |             break;"}]},{"id":"LOGIC_64","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_progress_indicator dispose() calls gtk_widget_dispose_template() and adw_bin_set_child(NULL) but template children (operations_popover etc.) had signal handlers connected with plain g_signal_connect in constructed() ('show'/'closed' on operations_popover). These are not disconnected; while dispose tearing down the template typically destroys them, the handlers reference 'self' and gtk_widget_grab_focus — relying on template teardown ordering. Low risk but the connections are not symmetric with their setup.","fix":"Prefer g_signal_connect_object or disconnect explicitly in dispose for symmetry/safety.","locations":[{"ref":"src/nautilus-progress-indicator.c:507-511","code":"  507 |     g_signal_connect (self->operations_popover, \"show\",\n  508 |                       (GCallback) gtk_widget_grab_focus, NULL);\n  509 |     g_signal_connect_swapped (self->operations_popover, \"closed\",\n  510 |                               (GCallback) gtk_widget_grab_focus, self);\n  511 | }"},{"ref":"src/nautilus-progress-indicator.c:513-522","code":"  513 | static void\n  514 | nautilus_progress_indicator_dispose (GObject *obj)\n  515 | {\n  516 |     NautilusProgressIndicator *self = NAUTILUS_PROGRESS_INDICATOR (obj);\n  517 | \n  518 |     adw_bin_set_child (ADW_BIN (self), NULL);\n  519 |     gtk_widget_dispose_template (GTK_WIDGET (self), NAUTILUS_TYPE_PROGRESS_INDICATOR);\n  520 | \n  521 |     G_OBJECT_CLASS (nautilus_progress_indicator_parent_class)->dispose (obj);\n  522 | }"}]},{"id":"LOGIC_65","type":"logic_error","type_label":"Logic Error","severity":"low","description":"directory_contents_value_field_update() declares unreadable_directory_count as a guint but initializes it to FALSE and uses it as a boolean flag (`unreadable_directory_count = TRUE;` / `if (unreadable_directory_count == 0)` / `!= 0`). The name implies a count but it is only ever a 0/1 flag, and the initializer mixes boolean and integer semantics. Functionally correct but type-confused and misleading.","fix":"Declare it as gboolean named e.g. has_unreadable_directory, or actually accumulate the count if a count is intended.","locations":[{"ref":"src/nautilus-properties.c:1990-2002","code":" 1990 |     guint unreadable_directory_count;\n 1991 |     goffset total_size;\n 1992 |     NautilusFile *file;\n 1993 |     GList *l;\n 1994 |     guint file_unreadable;\n 1995 |     goffset file_size;\n 1996 |     gboolean deep_count_active;\n 1997 | \n 1998 |     g_assert (NAUTILUS_IS_PROPERTIES_WIDGET (self));\n 1999 | \n 2000 |     total_count = 0;\n 2001 |     total_size = 0;\n 2002 |     unreadable_directory_count = FALSE;"},{"ref":"src/nautilus-properties.c:2036-2039","code":" 2036 |             if (file_unreadable)\n 2037 |             {\n 2038 |                 unreadable_directory_count = TRUE;\n 2039 |             }"}]},{"id":"LOGIC_66","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_query_is_empty() considers a query empty when it has no date_range, no text and no mime_types, but ignores the search_content / FTS flag, whereas nautilus_query_has_active_filter() treats '!search_content' as an active filter. As a result a query that only toggles content/filename search is reported as 'empty' by is_empty() while simultaneously reported as having an active filter, an inconsistency that can lead callers (which gate behaviour on is_empty) to treat a meaningfully-configured query as empty.","fix":"Decide on one definition of 'meaningful query' and make is_empty() and has_active_filter() consistent (e.g. is_empty should also be false when search_content differs from the default).","locations":[{"ref":"src/nautilus-query.c:490-514","code":"  490 | gboolean\n  491 | nautilus_query_has_active_filter (NautilusQuery *self)\n  492 | {\n  493 |     return self->date_range != NULL ||\n  494 |            self->mime_types->len > 0 ||\n  495 |            !self->search_content;\n  496 | }\n  497 | \n  498 | gboolean\n  499 | nautilus_query_is_empty (NautilusQuery *query)\n  500 | {\n  501 |     if (!query)\n  502 |     {\n  503 |         return TRUE;\n  504 |     }\n  505 | \n  506 |     if (!query->date_range &&\n  507 |         query->text == NULL &&\n  508 |         query->mime_types->len == 0)\n  509 |     {\n  510 |         return TRUE;\n  511 |     }\n  512 | \n  513 |     return FALSE;\n  514 | }"}]},{"id":"LOGIC_67","type":"logic_error","type_label":"Logic Error","severity":"low","description":"search_finished() in the model engine sets model->finished_id = 0 directly but does not remove any pending idle source. model_directory_ready_cb() calls search_finished() synchronously at its end. If an idle finish was previously scheduled via search_finished_idle() (from a stop) and then the ready callback still fires, finished_id is zeroed here while the idle source remains queued, so search_finished() (and thus nautilus_search_provider_finished()) can run twice — an unbalanced extra provider-finished emission and an extra g_object_unref of the provider. In normal flow stop() cancels the directory callback first, making this hard to hit, but the bookkeeping is fragile.","fix":"Have the synchronous completion path go through search_finished_idle()/g_clear_handle_id, or guard nautilus_search_provider_finished() so it cannot be invoked twice; ensure any pending finished_id source is removed before calling provider_finished directly.","locations":[{"ref":"src/nautilus-search-engine-model.c:69-88","code":"   69 | static gboolean\n   70 | search_finished (NautilusSearchEngineModel *model)\n   71 | {\n   72 |     model->finished_id = 0;\n   73 | \n   74 |     nautilus_search_provider_finished (NAUTILUS_SEARCH_PROVIDER (model));\n   75 | \n   76 |     return FALSE;\n   77 | }\n   78 | \n   79 | static void\n   80 | search_finished_idle (NautilusSearchEngineModel *model)\n   81 | {\n   82 |     if (model->finished_id != 0)\n   83 |     {\n   84 |         return;\n   85 |     }\n   86 | \n   87 |     model->finished_id = g_idle_add ((GSourceFunc) search_finished, model);\n   88 | }"},{"ref":"src/nautilus-search-engine-model.c:196","code":"  196 |     search_finished (model);"}]},{"id":"LOGIC_68","type":"logic_error","type_label":"Logic Error","severity":"low","description":"recent_thread_func() filters out errors with g_error_matches(error, G_IO_ERROR, G_IO_ERROR_EXISTS) when deciding whether to log a debug message. G_IO_ERROR_EXISTS is never returned by g_file_query_info() (it indicates a target already exists during create/move). This is almost certainly a copy/paste leftover; the intent was likely G_IO_ERROR_NOT_FOUND (a recent entry whose file was deleted), which is the common, expected case that should be suppressed from the log. As written, NOT_FOUND errors are logged as debug noise and EXISTS is dead filtering.","fix":"Replace G_IO_ERROR_EXISTS with G_IO_ERROR_NOT_FOUND (and consider also suppressing G_IO_ERROR_PERMISSION_DENIED) when deciding whether to emit the debug log.","locations":[{"ref":"src/nautilus-search-engine-recent.c:188-193","code":"  188 |                 if (error != NULL &&\n  189 |                     !g_error_matches (error, G_IO_ERROR, G_IO_ERROR_EXISTS))\n  190 |                 {\n  191 |                     g_debug (\"Impossible to read recent file info: %s\",\n  192 |                              error->message);\n  193 |                 }"}]},{"id":"LOGIC_69","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_search_hit_compute_scores() initializes m_diff and a_diff to G_MAXINT64 and, when a file has no modification_time but has an access_time (or vice versa), divides the G_MAXINT64 sentinel by G_TIME_SPAN_DAY and feeds it into MIN(m_diff, a_diff). The non-present component stays astronomically large so MIN picks the present one — correct in practice — but if BOTH are absent, t_diff stays huge and recent_bonus becomes 0, which is fine. No crash, but relying on G_MAXINT64/G_TIME_SPAN_DAY arithmetic as an 'infinity' sentinel is brittle and the t_diff variable is also initialized to G_MAXINT64 yet always overwritten.","fix":"Guard the MIN computation on whether each timestamp was actually present rather than depending on sentinel arithmetic.","locations":[{"ref":"src/nautilus-search-hit.c:62-104","code":"   62 |     guint dir_count = 0;\n   63 |     GTimeSpan m_diff = G_MAXINT64;\n   64 |     GTimeSpan a_diff = G_MAXINT64;\n   65 |     GTimeSpan t_diff = G_MAXINT64;\n   66 |     gdouble recent_bonus = 0.0;\n   67 |     gdouble proximity_bonus = 0.0;\n   68 |     gdouble match_bonus = 0.0;\n   69 | \n   70 |     if (query_location != NULL)\n   71 |     {\n   72 |         g_autoptr (GFile) hit_location = g_file_new_for_uri (hit->uri);\n   73 |         g_autofree gchar *relative_path = g_file_get_relative_path (query_location, hit_location);\n   74 | \n   75 |         for (gchar *c = relative_path; c != NULL && *c != '\\0'; c++)\n   76 |         {\n   77 |             if (*c == G_DIR_SEPARATOR)\n   78 |             {\n   79 |                 dir_count++;\n   80 |             }\n   81 |         }\n   82 | \n   83 |         if (dir_count < 10)\n   84 |         {\n   85 |             proximity_bonus = 10000.0 - 1000.0 * dir_count;\n   86 |         }\n   87 |     }\n   88 | \n   89 |     /* Recency bonus is useful for recursive search, but unwanted for results\n   90 |      * from the current folder, which should always sort by filename match,\n   91 |      * which makes prefix matches sort first. */\n   92 |     if (dir_count != 0 || query_location == NULL)\n   93 |     {\n   94 |         if (hit->modification_time != NULL)\n   95 |         {\n   96 |             m_diff = g_date_time_difference (now, hit->modification_time);\n   97 |         }\n   98 |         if (hit->access_time != NULL)\n   99 |         {\n  100 |             a_diff = g_date_time_difference (now, hit->access_time);\n  101 |         }\n  102 |         m_diff /= G_TIME_SPAN_DAY;\n  103 |         a_diff /= G_TIME_SPAN_DAY;\n  104 |         t_diff = MIN (m_diff, a_diff);"}]},{"id":"LOGIC_70","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_sidebar_row_set_end_icon() has an oddly-formatted else/if: the `else` and `if (self->end_icon_widget != NULL)` are split such that when end_icon is NULL but end_icon_widget is NULL the image is simply not cleared (fine), but the asymmetry with set_start_icon (which has no such NULL guard) and the formatting (`else\n if (...)`) is misleading and easy to misread as `else if`. Functionally the widget is template-bound and never NULL, so the guard is dead.","fix":"Drop the redundant `if (self->end_icon_widget != NULL)` guard (the widget is always set from the template) and use a normal else block for clarity.","locations":[{"ref":"src/nautilus-sidebar-row.c:531-536","code":"  531 |         }\n  532 |         else\n  533 |         if (self->end_icon_widget != NULL)\n  534 |         {\n  535 |             gtk_image_clear (GTK_IMAGE (self->end_icon_widget));\n  536 |         }"}]},{"id":"LOGIC_71","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In drive_start_from_bookmark_cb(), drive_stop_cb, drive_eject_cb, volume_eject_cb, drive_poll_for_media_cb and drive_start_cb, the GError is dereferenced as error->code without first checking error != NULL. g_*_finish() returning FALSE is documented to always set error when a non-NULL error location is supplied, so this is normally safe, but the pattern is brittle and a misbehaving backend returning FALSE without setting error would crash on error->code.","fix":"Check `if (error != NULL && error->code != G_IO_ERROR_FAILED_HANDLED)` (or use g_error_matches) before dereferencing error.","locations":[{"ref":"src/nautilus-sidebar.c:1725-1736","code":" 1725 |     if (!g_drive_poll_for_media_finish (G_DRIVE (source_object), res, &error))\n 1726 |     {\n 1727 |         if (error->code != G_IO_ERROR_FAILED_HANDLED)\n 1728 |         {\n 1729 |             name = g_drive_get_name (G_DRIVE (source_object));\n 1730 |             primary = g_strdup_printf (_(\"Unable to start “%s”\"), name);\n 1731 |             g_free (name);\n 1732 |             show_error_message (sidebar, primary, error->message);\n 1733 |             g_free (primary);\n 1734 |         }\n 1735 |         g_error_free (error);\n 1736 |     }"},{"ref":"src/nautilus-sidebar.c:2330-2341","code":" 2330 |     if (!g_drive_stop_finish (G_DRIVE (source_object), res, &error))\n 2331 |     {\n 2332 |         if (error->code != G_IO_ERROR_FAILED_HANDLED)\n 2333 |         {\n 2334 |             name = g_drive_get_name (G_DRIVE (source_object));\n 2335 |             primary = g_strdup_printf (_(\"Unable to stop “%s”\"), name);\n 2336 |             g_free (name);\n 2337 |             show_error_message (sidebar, primary, error->message);\n 2338 |             g_free (primary);\n 2339 |         }\n 2340 |         g_error_free (error);\n 2341 |     }"}]},{"id":"LOGIC_72","type":"logic_error","type_label":"Logic Error","severity":"low","description":"compare_volume() requests identifiers using G_DRIVE_IDENTIFIER_KIND_UNIX_DEVICE on GVolume objects via g_volume_get_identifier(). The correct constant for volumes is G_VOLUME_IDENTIFIER_KIND_UNIX_DEVICE. The two macros currently expand to the same string (\"unix-device\"), so it works, but using the GDrive constant on a GVolume API is incorrect and could break if the constants ever diverge.","fix":"Use G_VOLUME_IDENTIFIER_KIND_UNIX_DEVICE for g_volume_get_identifier().","locations":[{"ref":"src/nautilus-sidebar.c:3352-3353","code":" 3352 |     g_autofree gchar *volume_id_1 = g_volume_get_identifier (a, G_DRIVE_IDENTIFIER_KIND_UNIX_DEVICE);\n 3353 |     g_autofree gchar *volume_id_2 = g_volume_get_identifier (b, G_DRIVE_IDENTIFIER_KIND_UNIX_DEVICE);"}]},{"id":"LOGIC_73","type":"logic_error","type_label":"Logic Error","severity":"low","description":"hostname_proxy_new_cb() sets sidebar->hostnamed_proxy = proxy and clears the cancellable BEFORE checking `if (error != NULL)`. On the non-cancelled error path, proxy is NULL (g_dbus_proxy_new_for_bus_finish failed), so hostnamed_proxy is correctly NULL, but the code stores the (NULL) proxy and clears the cancellable, then returns without connecting signals — the ordering is confusing and relies on proxy being NULL on error. If finish ever returned non-NULL with a set error this would leak/mis-handle.","fix":"Check and handle the error first, then assign the proxy and clear the cancellable only on success.","locations":[{"ref":"src/nautilus-sidebar.c:3483-3498","code":" 3483 |     proxy = g_dbus_proxy_new_for_bus_finish (res, &error);\n 3484 |     if (g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CANCELLED))\n 3485 |     {\n 3486 |         g_error_free (error);\n 3487 |         return;\n 3488 |     }\n 3489 | \n 3490 |     sidebar->hostnamed_proxy = proxy;\n 3491 |     g_clear_object (&sidebar->hostnamed_cancellable);\n 3492 | \n 3493 |     if (error != NULL)\n 3494 |     {\n 3495 |         g_debug (\"Failed to create D-Bus proxy: %s\", error->message);\n 3496 |         g_error_free (error);\n 3497 |         return;\n 3498 |     }"}]},{"id":"LOGIC_74","type":"logic_error","type_label":"Logic Error","severity":"low","description":"thumbnail_starter_cb() initializes backoff_time_min = THUMBNAIL_CREATION_DELAY_SECS + 1 but only assigns backoff_time within the 'skip recently-modified' branch. The reschedule at the end uses g_timeout_add_seconds(backoff_time_min, ...). If ignored_thumbnails > 0 was set but the MIN never lowered below the initial (cannot happen since the branch always sets backoff_time), this is fine; however 'backoff_time' is declared uninitialized and only used right after assignment, and 'current_orig_mtime'/'current_time' are file-scope-ish locals — the logic is correct but fragile. Also the skip condition 'current_time >= current_orig_mtime' silently treats future mtimes (clock skew) as 'thumbnail now', which may thrash.","fix":"Initialize backoff_time = 0; handle future mtime (current_time < current_orig_mtime) explicitly instead of falling through to immediate thumbnailing.","locations":[{"ref":"src/nautilus-thumbnails.c:652-702","code":"  652 |     guint ignored_thumbnails = 0;\n  653 |     time_t current_orig_mtime = 0;\n  654 |     time_t current_time;\n  655 |     guint backoff_time;\n  656 |     guint backoff_time_min = THUMBNAIL_CREATION_DELAY_SECS + 1;\n  657 | \n  658 |     g_debug (\"(Main Thread) Creating thumbnails thread\");\n  659 | \n  660 |     thumbnail_factory = get_thumbnail_factory ();\n  661 |     thumbnail_thread_starter_id = 0;\n  662 | \n  663 |     if (G_UNLIKELY (max_threads == 0))\n  664 |     {\n  665 |         max_threads = MAX_THUMBNAILING_THREADS\n  666 |     }\n  667 | \n  668 |     /* We loop until the queue is empty, or we reach the thread limit. */\n  669 |     while (ignored_thumbnails < nautilus_hash_queue_get_length (thumbnails_to_make) &&\n  670 |            running_threads <= max_threads)\n  671 |     {\n  672 |         info = nautilus_hash_queue_peek_head (thumbnails_to_make);\n  673 |         nautilus_hash_queue_remove (thumbnails_to_make, info->image_uri);\n  674 | \n  675 |         handle_cancelled_callbacks (info);\n  676 | \n  677 |         if (info->callbacks->len == 0)\n  678 |         {\n  679 |             free_thumbnail_info (info);\n  680 | \n  681 |             continue;\n  682 |         }\n  683 | \n  684 |         current_orig_mtime = info->updated_file_mtime;\n  685 |         time (&current_time);\n  686 | \n  687 |         /* Don't try to create a thumbnail if the file was modified recently.\n  688 |          *  This prevents constant re-thumbnailing of changing files. */\n  689 |         if (current_time < current_orig_mtime + THUMBNAIL_CREATION_DELAY_SECS &&\n  690 |             current_time >= current_orig_mtime)\n  691 |         {\n  692 |             g_debug (\"(Thumbnail Thread) Skipping: %s\",\n  693 |                      info->image_uri);\n  694 | \n  695 |             /* Only retain the smallest backoff time */\n  696 |             backoff_time = THUMBNAIL_CREATION_DELAY_SECS - (current_time - current_orig_mtime);\n  697 |             backoff_time_min = MIN (backoff_time, backoff_time_min);\n  698 | \n  699 |             nautilus_hash_queue_enqueue (thumbnails_to_make, info->image_uri, info);\n  700 |             ignored_thumbnails += 1;\n  701 |             continue;\n  702 |         }"},{"ref":"src/nautilus-thumbnails.c:719-725","code":"  719 |     /* Reschedule thumbnailing via a change notification */\n  720 |     if (thumbnail_thread_starter_id == 0 &&\n  721 |         ignored_thumbnails > 0)\n  722 |     {\n  723 |         thumbnail_thread_starter_id = g_timeout_add_seconds (backoff_time_min,\n  724 |                                                              thumbnail_starter_cb, NULL);\n  725 |     }"}]},{"id":"LOGIC_75","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_capitalize_str() uppercases only the first Unicode codepoint via g_unichar_toupper. For codepoints whose uppercase mapping expands to multiple characters (e.g. German sharp-s), g_unichar_toupper cannot represent the result and returns the original char, silently failing to capitalize. Minor i18n correctness issue.","fix":"Consider g_utf8_strup on the first grapheme, or document the single-codepoint limitation.","locations":[{"ref":"src/nautilus-ui-utilities.c:36-63","code":"   36 | char *\n   37 | nautilus_capitalize_str (const char *string)\n   38 | {\n   39 |     char *capitalized = NULL;\n   40 | \n   41 |     if (string == NULL)\n   42 |     {\n   43 |         return NULL;\n   44 |     }\n   45 | \n   46 |     if (g_utf8_validate (string, -1, NULL))\n   47 |     {\n   48 |         g_autofree gunichar *ucs4 = NULL;\n   49 |         ucs4 = g_utf8_to_ucs4 (string, -1, NULL, NULL, NULL);\n   50 |         if (ucs4 != NULL)\n   51 |         {\n   52 |             ucs4[0] = g_unichar_toupper (ucs4[0]);\n   53 |             capitalized = g_ucs4_to_utf8 (ucs4, -1, NULL, NULL, NULL);\n   54 |         }\n   55 |     }\n   56 | \n   57 |     if (capitalized == NULL)\n   58 |     {\n   59 |         return g_strdup (string);\n   60 |     }\n   61 | \n   62 |     return capitalized;\n   63 | }"}]},{"id":"LOGIC_76","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_g_menu_model_set_for_view()/filter_menu_model recurses into section links and removes items whose filter attribute does not contain the value. After g_menu_remove at index i it 'continue's without re-examining the (now shifted) item, which is correct because iteration is descending (i--). However the section retrieved via g_menu_model_get_item_link is only inspected when the item was NOT removed; an item that both fails the filter AND has a subsection is removed wholesale (subsection never filtered) — acceptable, but note removed sections are not recursively filtered, so a kept parent with a filtered-out subsection child relationship could leave stale entries if model nesting differs. Low-confidence; verify menu nesting expectations.","fix":"Confirm that removed items never need their subsections filtered; document the descending-iteration invariant.","locations":[{"ref":"src/nautilus-ui-utilities.c:168-204","code":"  168 | static void\n  169 | filter_menu_model (GMenuModel *model,\n  170 |                    const char *filter_key,\n  171 |                    const char *filter_value)\n  172 | {\n  173 |     for (gint i = g_menu_model_get_n_items (model) - 1; i >= 0; i--)\n  174 |     {\n  175 |         g_autoptr (GMenuModel) section = NULL;\n  176 |         g_autofree char *value = NULL;\n  177 | \n  178 |         if (g_menu_model_get_item_attribute (model, i, filter_key, \"s\", &value))\n  179 |         {\n  180 |             g_auto (GStrv) tokens = g_strsplit (value, \",\", 0);\n  181 | \n  182 |             if (!g_strv_contains ((const gchar * const *) tokens, filter_value))\n  183 |             {\n  184 |                 g_menu_remove (G_MENU (model), i);\n  185 |                 continue;\n  186 |             }\n  187 |         }\n  188 | \n  189 |         section = g_menu_model_get_item_link (model, i, G_MENU_LINK_SECTION);\n  190 | \n  191 |         if (section != NULL)\n  192 |         {\n  193 |             filter_menu_model (section, filter_key, filter_value);\n  194 |         }\n  195 |     }\n  196 | }\n  197 | \n  198 | void\n  199 | nautilus_g_menu_model_set_for_mode (GMenuModel   *model,\n  200 |                                     NautilusMode  mode)\n  201 | {\n  202 |     const char *mode_name = get_name_for_mode (mode);\n  203 |     filter_menu_model (model, \"show-in-mode\", mode_name);\n  204 | }"}]},{"id":"LOGIC_77","type":"logic_error","type_label":"Logic Error","severity":"low","description":"nautilus_date_time_is_between_dates() treats 'g_date_time_to_unix(date) == 0' (i.e. exactly the Unix epoch 1970-01-01T00:00:00Z) as an error/ignore case and returns FALSE. A legitimately epoch-dated file is silently excluded from date-range filtering. The comment 'Silently ignore errors' is misleading because epoch is a valid date, not an error.","fix":"Distinguish the genuine 'no date' sentinel from the valid epoch timestamp, or document why epoch is excluded.","locations":[{"ref":"src/nautilus-ui-utilities.c:318-339","code":"  318 | gboolean\n  319 | nautilus_date_time_is_between_dates (GDateTime *date,\n  320 |                                      GDateTime *initial_date,\n  321 |                                      GDateTime *end_date)\n  322 | {\n  323 |     gboolean in_between;\n  324 | \n  325 |     /* Silently ignore errors */\n  326 |     if (date == NULL || g_date_time_to_unix (date) == 0)\n  327 |     {\n  328 |         return FALSE;\n  329 |     }\n  330 | \n  331 |     /* For the end date, we want to make end_date inclusive,\n  332 |      * for that the difference between the start of the day and the in_between\n  333 |      * has to be more than -1 day\n  334 |      */\n  335 |     in_between = g_date_time_difference (date, initial_date) > 0 &&\n  336 |                  g_date_time_difference (end_date, date) / G_TIME_SPAN_DAY > -1;\n  337 | \n  338 |     return in_between;\n  339 | }"}]},{"id":"LOGIC_78","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Off-by-interpretation in the inclusive end-date check. nautilus_date_time_is_between_dates() requires g_date_time_difference(date, initial_date) > 0 (strictly greater), so a file whose timestamp is exactly equal to initial_date (the start-of-range instant) is excluded. Combined with the localsearch engine which builds an inclusive range using '?atime >= ~startTime', the model/simple/recent engines and the localsearch engine disagree on whether the lower bound is inclusive, yielding inconsistent results for the same query across providers.","fix":"Make the lower bound inclusive ('>= 0', or compare against the start of initial_date's day) to match the localsearch SPARQL '>=' semantics, so all engines agree.","locations":[{"ref":"src/nautilus-ui-utilities.c:335-336","code":"  335 |     in_between = g_date_time_difference (date, initial_date) > 0 &&\n  336 |                  g_date_time_difference (end_date, date) / G_TIME_SPAN_DAY > -1;"},{"ref":"src/nautilus-search-engine-localsearch.c:346-360","code":"  346 |         if (features & SEARCH_FEATURE_ATIME)\n  347 |         {\n  348 |             g_string_append (sparql, \"?atime >= ~startTime^^xsd:dateTime\");\n  349 |             g_string_append (sparql, \" && ?atime <= ~endTime^^xsd:dateTime\");\n  350 |         }\n  351 |         else if (features & SEARCH_FEATURE_MTIME)\n  352 |         {\n  353 |             g_string_append (sparql, \"?mtime >= ~startTime^^xsd:dateTime\");\n  354 |             g_string_append (sparql, \" && ?mtime <= ~endTime^^xsd:dateTime\");\n  355 |         }\n  356 |         else if (features & SEARCH_FEATURE_CTIME)\n  357 |         {\n  358 |             g_string_append (sparql, \"?ctime >= ~startTime^^xsd:dateTime\");\n  359 |             g_string_append (sparql, \" && ?ctime <= ~endTime^^xsd:dateTime\");\n  360 |         }"}]},{"id":"LOGIC_79","type":"logic_error","type_label":"Logic Error","severity":"low","description":"draw_drag_count_badge() takes ownership of stacked_icons and g_object_unref's it (line 962) only after the early-return-for-n<=1 path returns it WITHOUT taking a ref. nautilus_ui_draw_stacked_icons() passes gtk_snapshot_to_paintable() (transfer full) into draw_drag_count_badge; when n_items <= 1 the badge function returns that same paintable unmodified (transfer full preserved) — correct. When n_items > 1 it unrefs the input and returns a new paintable. Ownership is consistent. Flag only the asymmetry as fragile/non-obvious. Low-confidence (appears correct).","fix":"Document the transfer-full in/out contract of draw_drag_count_badge to prevent future double-unref.","locations":[{"ref":"src/nautilus-ui-utilities.c:946-1021","code":"  946 | static GdkPaintable *\n  947 | draw_drag_count_badge (GdkPaintable *stacked_icons,\n  948 |                        GtkWidget    *widget,\n  949 |                        guint         n_items)\n  950 | {\n  951 |     if (n_items <= 1)\n  952 |     {\n  953 |         return stacked_icons;\n  954 |     }\n  955 | \n  956 |     int width = gdk_paintable_get_intrinsic_width (stacked_icons);\n
