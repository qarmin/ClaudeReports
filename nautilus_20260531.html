signal handler are never freed/disconnected (only mount-unmount triggers cleanup). In this short-lived helper process it is harmless, but the cleanup path for the common case is missing/dead.","fix":"Also tear down `data` on the dialog \"response\"/\"closed\" signal, or document that the process exits immediately so cleanup is unnecessary.","locations":[{"ref":"src/nautilus-autorun-software.c:44-54","code":"   44 | static void\n   45 | autorun_software_dialog_destroy (AutorunSoftwareDialogData *data)\n   46 | {\n   47 |     g_signal_handlers_disconnect_by_func (G_OBJECT (data->mount),\n   48 |                                           G_CALLBACK (autorun_software_dialog_mount_unmounted),\n   49 |                                           data);\n   50 | \n   51 |     gtk_window_destroy (GTK_WINDOW (data->dialog));\n   52 |     g_object_unref (data->mount);\n   53 |     g_free (data);\n   54 | }"},{"ref":"src/nautilus-autorun-software.c:209-229","code":"  209 |     data = g_new0 (AutorunSoftwareDialogData, 1);\n  210 |     data->dialog = dialog;\n  211 |     data->mount = g_object_ref (mount);\n  212 | \n  213 |     g_signal_connect (G_OBJECT (mount),\n  214 |                       \"unmounted\",\n  215 |                       G_CALLBACK (autorun_software_dialog_mount_unmounted),\n  216 |                       data);\n  217 | \n  218 |     adw_alert_dialog_add_responses (ADW_ALERT_DIALOG (dialog),\n  219 |                                     \"cancel\", _(\"_Cancel\"),\n  220 |                                     \"run\", _(\"_Run\"),\n  221 |                                     NULL);\n  222 |     adw_alert_dialog_set_default_response (ADW_ALERT_DIALOG (dialog), \"cancel\");\n  223 | \n  224 |     g_signal_connect (dialog,\n  225 |                       \"response\",\n  226 |                       G_CALLBACK (autorun_software_dialog_response),\n  227 |                       mount);\n  228 | \n  229 |     adw_dialog_present (dialog, NULL);"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","description":"nautilus_compress_dialog_finalize() is an empty override that only chains up to the parent finalize. It adds no behavior; the class could simply not override finalize. Minor noise (the dialog has no owned non-template fields needing freeing, so this is genuinely dead).","fix":"Remove the empty finalize override and the corresponding object_class->finalize assignment, or leave a comment explaining why it is intentionally present.","locations":[{"ref":"src/nautilus-compress-dialog.c:414-418","code":"  414 | static void\n  415 | nautilus_compress_dialog_finalize (GObject *object)\n  416 | {\n  417 |     G_OBJECT_CLASS (nautilus_compress_dialog_parent_class)->finalize (object);\n  418 | }"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In insert_new_monitor(), the `if (list == NULL)` branch calls `g_list_append (list, monitor)` with list known to be NULL, then inserts into the table; the `else` branch also calls g_list_append. The two branches differ only by the g_hash_table_insert. Since g_list_append on a non-empty list returns the unchanged head, the else branch relies on that to keep the stored head valid (it works, but is subtle). The split-branch structure is unnecessary and the NULL-branch's g_list_append(NULL, ...) is an obfuscated g_list_prepend(NULL, ...).","fix":"Simplify: `list = g_list_append (g_hash_table_lookup (table, monitor->file), monitor); g_hash_table_insert (table, monitor->file, list);` — but note g_list_append is O(n); g_list_prepend with an explicit head update would be cheaper if order does not matter.","locations":[{"ref":"src/nautilus-directory-async.c:581-592","code":"  581 |     list = g_hash_table_lookup (directory->details->monitor_table, monitor->file);\n  582 |     if (list == NULL)\n  583 |     {\n  584 |         list = g_list_append (list, monitor);\n  585 |         g_hash_table_insert (directory->details->monitor_table,\n  586 |                              monitor->file,\n  587 |                              list);\n  588 |     }\n  589 |     else\n  590 |     {\n  591 |         list = g_list_append (list, monitor);\n  592 |     }"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"low","description":"NautilusGridView dispose() and finalize() do nothing except chain up to the parent class, so installing them adds no behavior. Same for NautilusListView finalize(). These empty overrides are dead code.","fix":"Remove the empty dispose/finalize overrides and the corresponding object_class assignments; the parent implementations are used automatically.","locations":[{"ref":"src/nautilus-grid-view.c:399-409","code":"  399 | static void\n  400 | dispose (GObject *object)\n  401 | {\n  402 |     G_OBJECT_CLASS (nautilus_grid_view_parent_class)->dispose (object);\n  403 | }\n  404 | \n  405 | static void\n  406 | finalize (GObject *object)\n  407 | {\n  408 |     G_OBJECT_CLASS (nautilus_grid_view_parent_class)->finalize (object);\n  409 | }"},{"ref":"src/nautilus-list-view.c:1181-1185","code":" 1181 | static void\n 1182 | nautilus_list_view_finalize (GObject *object)\n 1183 | {\n 1184 |     G_OBJECT_CLASS (nautilus_list_view_parent_class)->finalize (object);\n 1185 | }"}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In set_mode(), the NAUTILUS_LOCATION_BANNER_NONE case executes `return;` and is then followed by an unreachable `break;`. The break is dead code.","fix":"Remove the unreachable break after return (cosmetic).","locations":[{"ref":"src/nautilus-location-banner.c:217-222","code":"  217 |         case NAUTILUS_LOCATION_BANNER_NONE:\n  218 |         {\n  219 |             adw_banner_set_revealed (banner, FALSE);\n  220 |             return;\n  221 |         }\n  222 |         break;"}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In activate_files, when more than one file opens in a view and NEW_WINDOW is already set, the code does 'parameters->flags |= NAUTILUS_OPEN_FLAG_NEW_WINDOW' which is a no-op since the flag is already present (the branch is entered precisely because the flag is set). The else branch is effectively dead/redundant for the flag assignment; only the num_windows accounting matters.","fix":"Drop the redundant flag OR-assignment; keep only 'num_windows += count'.","locations":[{"ref":"src/nautilus-mime-actions.c:1602-1606","code":" 1602 |         else\n 1603 |         {\n 1604 |             parameters->flags |= NAUTILUS_OPEN_FLAG_NEW_WINDOW;\n 1605 |             num_windows += count;\n 1606 |         }"}]},{"id":"DEAD_9","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In nautilus_progress_paintable_snapshot_symbolic(), the first branch (check_progress < 1) does gtk_snapshot_save/translate/scale/translate/restore but draws nothing between save and restore, so the entire block is a no-op. It looks like a copy of the second branch with the actual paintable snapshot call dropped; either it is dead code or a missing draw call (intended fade-out of the spinner arc).","fix":"Remove the dead save/restore block, or add the intended drawing (e.g. snapshot of the progress arc/icon) between save and restore.","locations":[{"ref":"src/nautilus-progress-paintable.c:251-258","code":"  251 |     if (self->check_progress < 1)\n  252 |     {\n  253 |         gtk_snapshot_save (snapshot);\n  254 |         gtk_snapshot_translate (snapshot, &GRAPHENE_POINT_INIT (width / 2.0f, height / 2.0f));\n  255 |         gtk_snapshot_scale (snapshot, 1.0f - self->check_progress, 1.0f - self->check_progress);\n  256 |         gtk_snapshot_translate (snapshot, &GRAPHENE_POINT_INIT (-width / 2.0f, -height / 2.0f));\n  257 |         gtk_snapshot_restore (snapshot);\n  258 |     }"}]},{"id":"DEAD_10","type":"dead_code","type_label":"Dead Code","severity":"low","description":"update_permissions() checks nautilus_file_can_get_permissions(file) twice in a row. The first `if (!can_get_permissions) continue;` is immediately followed by `if (!can_get_permissions || !file_matches_filter_type(...)) continue;`. The first check is fully redundant (subset of the second).","fix":"Remove the first redundant `if (!nautilus_file_can_get_permissions (file)) continue;` block, keeping the combined check.","locations":[{"ref":"src/nautilus-properties.c:2855-2863","code":" 2855 |         if (!nautilus_file_can_get_permissions (file))\n 2856 |         {\n 2857 |             continue;\n 2858 |         }\n 2859 | \n 2860 |         if (!nautilus_file_can_get_permissions (file) || !file_matches_filter_type (file, filter_type))\n 2861 |         {\n 2862 |             continue;\n 2863 |         }"}]},{"id":"DEAD_11","type":"dead_code","type_label":"Dead Code","severity":"low","description":"nautilus_search_engine_recent_finalize() only chains up to the parent finalize and does nothing else (recent_manager is the default singleton and is intentionally not unref'd). The override adds no behaviour over the default GObject finalize.","fix":"Remove the empty finalize override (and the object_class->finalize assignment) unless it is kept as a documented placeholder.","locations":[{"ref":"src/nautilus-search-engine-recent.c:58-62","code":"   58 | static void\n   59 | nautilus_search_engine_recent_finalize (GObject *object)\n   60 | {\n   61 |     G_OBJECT_CLASS (nautilus_search_engine_recent_parent_class)->finalize (object);\n   62 | }"}]},{"id":"DEAD_12","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In the GDK_TYPE_FILE_LIST branch of drag_motion_callback(), a GFile *dest_file is created with g_file_new_for_uri(drop_target_uri) and then unreffed a few lines later, but it is never used. The action is computed from `file` (the NautilusFile), not dest_file. The dest_file allocation/free pair is pointless.","fix":"Remove the unused dest_file creation and its g_object_unref.","locations":[{"ref":"src/nautilus-sidebar.c:1459-1463","code":" 1459 |                 GFile *dest_file = g_file_new_for_uri (drop_target_uri);\n 1460 | \n 1461 |                 action = emit_drag_action_requested (sidebar, file, file_list);\n 1462 | \n 1463 |                 g_object_unref (dest_file);"}]},{"id":"DEAD_13","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In nautilus_window_slot_stop_loading() a NautilusDirectory is fetched with nautilus_directory_get(self->location) and immediately unreffed (nautilus_directory_unref) without ever being used. The `directory` local serves no purpose. (Minor side note: passing self->location which could be NULL relies on nautilus_directory_get tolerating NULL.)","fix":"Remove the unused `directory` variable and its get/unref pair.","locations":[{"ref":"src/nautilus-window-slot.c:3007-3017","code":" 3007 |     GFile *location;\n 3008 |     NautilusDirectory *directory;\n 3009 |     location = nautilus_window_slot_get_location (self);\n 3010 |     directory = nautilus_directory_get (self->location);\n 3011 | \n 3012 |     if (self->content_view != NULL)\n 3013 |     {\n 3014 |         nautilus_files_view_stop_loading (self->content_view);\n 3015 |     }\n 3016 | \n 3017 |     nautilus_directory_unref (directory);"}]},{"id":"DEAD_14","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In can_run_in_terminal() the locally computed executable_path is only used to test for NULL; the result is discarded (g_autofree). This is harmless but the variable name and the autofree suggest it was meant to be used. Mild duplication with action_run_in_terminal() which recomputes the same value.","fix":"Either inline the NULL test or share the computed path with the caller; no behavioral change required.","locations":[{"ref":"src/nautilus-files-view.c:6334-6344","code":" 6334 |         g_autofree gchar *activation_uri = NULL;\n 6335 |         g_autofree gchar *executable_path = NULL;\n 6336 | \n 6337 |         activation_uri = nautilus_file_get_activation_uri (file);\n 6338 |         executable_path = g_filename_from_uri (activation_uri, NULL, NULL);\n 6339 | \n 6340 |         if (executable_path != NULL)\n 6341 |         {\n 6342 |             return TRUE;\n 6343 |         }\n 6344 |     }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Comment in file_name_conflicts_with_results() says 'the file has a conflict' when the searched-for case is not found, but the function returns FALSE in that branch (i.e. 'no conflict reported here'). The comment's wording (\"so the file has a conlfict\") contradicts the FALSE return and also contains a typo (conlfict).","fix":"Reword the comment to match the FALSE return (no conflict detected by this matching path) and fix the typo.","locations":[{"ref":"src/nautilus-batch-rename-utilities.c:407-409","code":"  407 |     /* the case this function searched for doesn't exist, so the file\n  408 |      * has a conlfict */\n  409 |     return FALSE;"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment above nautilus_get_group_names_for_user describes a function that takes a username argument and filters/returns all groups when NULL. The actual function takes no arguments and simply returns the supplementary groups of the current process via getgroups(). The doc comment is stale and misleading.","fix":"Update the comment to: 'Get a list of group names for the groups the current process belongs to.'","locations":[{"ref":"src/nautilus-file.c:5921-5926","code":" 5921 | /* Get a list of group names, filtered to only the ones\n 5922 |  * that contain the given username. If the username is\n 5923 |  * NULL, returns a list of all group names.\n 5924 |  */\n 5925 | static GList *\n 5926 | nautilus_get_group_names_for_user (void)"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Comment in nautilus_location_entry_init() says: 'In GTK3, the Tab key binding (for focus change) happens in the bubble phase ... After porting to GTK4 we need to check whether this is still correct.' This is a stale TODO-style comment referencing the GTK3->GTK4 port that has long since completed; it no longer reflects an actionable verification.","fix":"Re-verify the propagation phase requirement and update/remove the outdated GTK3 reference in the comment.","locations":[{"ref":"src/nautilus-location-entry.c:889-891","code":"  889 |     /* In GTK3, the Tab key binding (for focus change) happens in the bubble\n  890 |      * phase, and we want to stop that from happening. After porting to GTK4\n  891 |      * we need to check whether this is still correct. */"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"make_activation_parameters has a doc comment describing parameters '@files' and '@unhandled_files' (NautilusFiles), but the function actually takes 'uris' (a GList of char* URIs) and 'unhandled_uris'. The comment also says files 'are put into the unhandled_files list' — the parameter is named unhandled_uris and holds URIs. The doc is stale relative to the URI-based implementation.","fix":"Update the doc comment to reflect the URI-based signature (uris / unhandled_uris) and that it returns ApplicationLaunchParameters keyed by default app.","locations":[{"ref":"src/nautilus-mime-actions.c:877-892","code":"  877 | /**\n  878 |  * make_activation_parameters\n  879 |  *\n  880 |  * Construct a list of ApplicationLaunchParameters from a list of NautilusFiles,\n  881 |  * where files that have the same default application are put into the same\n  882 |  * launch parameter, and others are put into the unhandled_files list.\n  883 |  *\n  884 |  * @files: Files to use for construction.\n  885 |  * @unhandled_files: Files without any default application will be put here.\n  886 |  *\n  887 |  * Return value: Newly allocated list of ApplicationLaunchParameters.\n  888 |  **/\n  889 | static GList *\n  890 | make_activation_parameters (GList  *uris,\n  891 |                             GList **unhandled_uris)\n  892 | {"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"nautilus_progress_info_get_property() PROP_PROGRESS comment claims it differs from nautilus_progress_info_get_progress() by never returning -1 in activity mode, but it simply returns self->progress directly. In pulse/activity mode self->progress is set to 0.0 (see pulse_progress), so the comment's framing is misleading: there is no -1 to avoid here because the stored field is already 0, and the getter's special-casing lives entirely in the other function.","fix":"Reword the comment to state it returns the raw stored progress (0.0 in activity mode), not that it avoids returning -1.","locations":[{"ref":"src/nautilus-progress-info.c:156-163","code":"  156 |         {\n  157 |             G_LOCK (progress_info);\n  158 |             /* This is a little different than nautilus_progress_info_get_progress ()\n  159 |              * in that we don't want to ever return -1, which would be the case when\n  160 |              * activity mode is true\n  161 |              */\n  162 |             g_value_set_double (value, self->progress);\n  163 |             G_UNLOCK (progress_info);"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The class-init doc comment for NautilusSidebar references a NautilusSidebar::open-location signal in nautilus_sidebar_new() and in the header docs, but no such signal exists; the widget uses notify::location / window-slot and the drag/mount signals instead. The comment is outdated and misleading to API consumers.","fix":"Update the doc comments to refer to the actually-emitted mechanism (location property / drag-perform-drop etc.) instead of the nonexistent open-location signal.","locations":[{"ref":"src/nautilus-sidebar.c:4063-4065","code":" 4063 |  * The application should connect to at least the\n 4064 |  * NautilusSidebar::open-location signal to be notified\n 4065 |  * when the user makes a selection in the sidebar."},{"ref":"src/nautilus-sidebar.c:68-72","code":"   68 |  * To make use of the places sidebar, an application at least needs to connect\n   69 |  * to the NautilusSidebar::open-location signal.  This is emitted when the\n   70 |  * user selects in the sidebar a location to open.  The application should also\n   71 |  * call nautilus_sidebar_set_location() when it changes the currently-viewed\n   72 |  * location."}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Comment at the macro MAX_THUMBNAILING_THREADS says 'This specific number of processors seems to work ok' but the macro computes nproc/2 with integer division and a no-op ceil; the comment implies a tuned heuristic while the implementation silently truncates and can yield 0 on single-core systems. Comment is misleading relative to behavior.","fix":"Update the comment to reflect the actual computation, and fix the computation (see related finding).","locations":[{"ref":"src/nautilus-thumbnails.c:49-52","code":"   49 | /* This specific number of processors seems to work ok even on relatively slow\n   50 |  * computers. However, this might not be the effective number of processors\n   51 |  * used simultaneously because of main thread load and I/O bounds. */\n   52 | #define MAX_THUMBNAILING_THREADS ceil (g_get_num_processors () / 2);"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment in nautilus_date_time_is_between_dates() says the end-date inclusivity is achieved because 'the difference between the start of the day and the in_between has to be more than -1 day'. The code actually computes g_date_time_difference(end_date, date) / G_TIME_SPAN_DAY > -1 on the raw end_date passed in (the simple/recent/model engines do NOT pre-shift end_date by a day, unlike the localsearch engine which explicitly adds one day). The comment describes a 'start of the day' shift that does not happen here, making the inclusivity reasoning misleading and inconsistent with how localsearch handles it.","fix":"Update the comment to describe the actual computation, and align the inclusive-end-date handling between the helper and the localsearch '+1 day' approach.","locations":[{"ref":"src/nautilus-ui-utilities.c:331-336","code":"  331 |     /* For the end date, we want to make end_date inclusive,\n  332 |      * for that the difference between the start of the day and the in_between\n  333 |      * has to be more than -1 day\n  334 |      */\n  335 |     in_between = g_date_time_difference (date, initial_date) > 0 &&\n  336 |                  g_date_time_difference (end_date, date) / G_TIME_SPAN_DAY > -1;"},{"ref":"src/nautilus-search-engine-localsearch.c:487-492","code":"  487 |         /* As we do for other searches, we want to make the end date inclusive.\n  488 |          * For that, add a day to it */\n  489 |         shifted_end_date = g_date_time_add_days (end_date, 1);\n  490 | \n  491 |         initial_date_format = g_date_time_format_iso8601 (initial_date);\n  492 |         end_date_format = g_date_time_format_iso8601 (shifted_end_date);"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The structure documentation comment at the top of nautilus-view-model.c labels sort_model as `GtkSectionModel<...>` but sort_model is a GtkSortListModel (it merely also implements the section-model interface). It is misleading: it suggests a distinct GtkSectionModel layer that does not exist in the chain.","fix":"Relabel the line to `sort_model : GtkSortListModel<GtkTreeListRow<NautilusViewItem>>` to match the actual type created in constructed().","locations":[{"ref":"src/nautilus-view-model.c:15","code":"   15 |  *  +-- sort_model : GtkSectionModel<GtkTreeListRow<NautilusViewItem>>"}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"begin_location_change()'s doc comment documents parameters @window, @scroll_pos that do not exist in the function signature (the first parameter is `self`, a NautilusWindowSlot, not a NautilusWindow, and there is no scroll_pos parameter). The comment is stale relative to the current signature.","fix":"Update the doc comment to match the actual parameters (self, location, previous_location, new_selection, type, distance).","locations":[{"ref":"src/nautilus-window-slot.c:1539-1562","code":" 1539 | /*\n 1540 |  * begin_location_change\n 1541 |  *\n 1542 |  * Change a window slot's location.\n 1543 |  * @window: The NautilusWindow whose location should be changed.\n 1544 |  * @location: A url specifying the location to load\n 1545 |  * @previous_location: The url that was previously shown in the window that initialized the change, if any\n 1546 |  * @new_selection: The initial selection to present after loading the location\n 1547 |  * @type: Which type of location change is this? Standard, back, forward, or reload?\n 1548 |  * @distance: If type is back or forward, the index into the back or forward chain. If\n 1549 |  * type is standard or reload, this is ignored, and must be 0.\n 1550 |  * @scroll_pos: The file to scroll to when the location is loaded.\n 1551 |  *\n 1552 |  * This is the core function for changing the location of a window. Every change to the\n 1553 |  * location begins here.\n 1554 |  */\n 1555 | static void\n 1556 | begin_location_change (NautilusWindowSlot         *self,\n 1557 |                        GFile                      *location,\n 1558 |                        GFile                      *previous_location,\n 1559 |                        NautilusFileList           *new_selection,\n 1560 |                        NautilusLocationChangeType  type,\n 1561 |                        guint                       distance)\n 1562 | {"}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Comment in nautilus_window_slot_force_reload() refers to `peek_slot_field (window, location)` which is a function/macro that does not exist anywhere in the codebase — it is leftover from an old API. The surrounding code uses nautilus_window_slot_get_location(self).","fix":"Reword the comment to reference the actual code (the location returned by nautilus_window_slot_get_location can be freed during begin_location_change, so it is reffed).","locations":[{"ref":"src/nautilus-window-slot.c:2262-2264","code":" 2262 |     /* peek_slot_field (window, location) can be free'd during the processing\n 2263 |      * of begin_location_change, so make a copy\n 2264 |      */"}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"create_task_thread_func() reuses a single secondary message for both file and directory creation errors. The `primary` text correctly distinguishes 'Error while creating directory' vs 'Error while creating file' (lines 6886-6895), but the `secondary` is hard-coded to 'There was an error creating the directory in %s.' even for the non-directory (file) case. This produces a misleading message ('directory') when creating a plain file or template document fails.","fix":"Select the secondary string based on job->make_dir, mirroring the primary string (use 'file' wording when !job->make_dir).","locations":[{"ref":"src/nautilus-file-operations.c:6896-6898","code":" 6896 |                 parse_name = get_truncated_parse_name (job->dest_dir);\n 6897 |                 secondary = g_strdup_printf (_(\"There was an error creating the directory in %s.\"),\n 6898 |                                              parse_name);"}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Typo/style: in extract_job_on_error() the statement `heading = g_strdup_printf (...)` is terminated with a comma instead of a semicolon (line 7706), turning the heading assignment and the following show_skip_dialog() call into a single comma-operator expression. It compiles and behaves correctly here, but it is fragile and clearly an accidental ',' for ';'.","fix":"Replace the trailing comma after the g_strdup_printf(...) assignment with a semicolon.","locations":[{"ref":"src/nautilus-file-operations.c:7705-7708","code":" 7705 |     heading = g_strdup_printf (_(\"There was an error while extracting “%s”.\"),\n 7706 |                                basename),\n 7707 | \n 7708 |     show_skip_dialog ((CommonJob *) extract_job,"}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment says 'we can't want to do sync I/O' — a typo/garbled sentence that should read 'we don't want to do sync I/O'. Minor but misleading wording in an otherwise load-bearing comment about why unknown file types are treated as writable.","fix":"Reword to 'and we don't want to do sync I/O, so treat the unknown case as can-write'.","locations":[{"ref":"src/nautilus-files-view.c:6884-6886","code":" 6884 |         /* The target location might not have data for it read yet,\n 6885 |          *  and we can't want to do sync I/O, so treat the unknown\n 6886 |          *  case as can-write */"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"nautilus_directory_finalize() asserts `g_warn_if_fail (directory->details->count_in_progress == NULL)` twice (once right after nautilus_directory_cancel, and again later in the same function). The duplicated check is harmless but is dead/redundant.","fix":"Remove one of the two identical g_warn_if_fail (count_in_progress == NULL) checks.","locations":[{"ref":"src/nautilus-directory.c:138","code":"  138 |     g_warn_if_fail (directory->details->count_in_progress == NULL);"},{"ref":"src/nautilus-directory.c:187","code":"  187 |     g_warn_if_fail (directory->details->count_in_progress == NULL);"}]},{"id":"DUPLIC_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"update_sort_directories_first() is duplicated almost verbatim between the grid view and the list view (same search/recent special-casing, same gtk_filechooser_preferences lookup, same nautilus_view_model_sort() call). Divergence between the two copies could silently introduce inconsistent sorting behavior across views.","fix":"Factor the shared logic into a helper in nautilus-list-base.c (e.g. nautilus_list_base_should_sort_directories_first()) and have both subclasses call it.","locations":[{"ref":"src/nautilus-grid-view.c:72-95","code":"   72 | static void\n   73 | update_sort_directories_first (NautilusGridView *self)\n   74 | {\n   75 |     NautilusFile *directory_as_file = nautilus_list_base_get_directory_as_file (NAUTILUS_LIST_BASE (self));\n   76 |     NautilusViewModel *model = nautilus_list_base_get_model (NAUTILUS_LIST_BASE (self));\n   77 | \n   78 |     /* Always treat directories as normal items in search and recent. Recent\n   79 |      * can accidentally contain directories when they were picked via file chooser. */\n   80 |     if (nautilus_file_is_in_search (directory_as_file) ||\n   81 |         nautilus_file_is_in_recent (directory_as_file))\n   82 |     {\n   83 |         self->directories_first = FALSE;\n   84 |     }\n   85 |     else\n   86 |     {\n   87 |         self->directories_first = g_settings_get_boolean (gtk_filechooser_preferences,\n   88 |                                                           NAUTILUS_PREFERENCES_SORT_DIRECTORIES_FIRST);\n   89 |     }\n   90 | \n   91 |     if (model != NULL)\n   92 |     {\n   93 |         nautilus_view_model_sort (model);\n   94 |     }\n   95 | }"},{"ref":"src/nautilus-list-view.c:541-564","code":"  541 | static void\n  542 | update_sort_directories_first (NautilusListView *self)\n  543 | {\n  544 |     NautilusFile *directory_as_file = nautilus_list_base_get_directory_as_file (NAUTILUS_LIST_BASE (self));\n  545 |     NautilusViewModel *model = nautilus_list_base_get_model (NAUTILUS_LIST_BASE (self));\n  546 | \n  547 |     /* Always treat directories as normal items in search and recent. Recent\n  548 |      * can accidentally contain directories when they were picked via file chooser. */\n  549 |     if (nautilus_file_is_in_search (directory_as_file) ||\n  550 |         nautilus_file_is_in_recent (directory_as_file))\n  551 |     {\n  552 |         self->directories_first = FALSE;\n  553 |     }\n  554 |     else\n  555 |     {\n  556 |         self->directories_first = g_settings_get_boolean (gtk_filechooser_preferences,\n  557 |                                                           NAUTILUS_PREFERENCES_SORT_DIRECTORIES_FIRST);\n  558 |     }\n  559 | \n  560 |     if (model != NULL)\n  561 |     {\n  562 |         nautilus_view_model_sort (model);\n  563 |     }\n  564 | }"}]},{"id":"DUPLIC_3","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"nautilus_tag_manager_delete_tag() and nautilus_tag_manager_insert_tag() are identical except for the leading 'DELETE DATA {' vs 'INSERT DATA {' literal and produce the same triple body. Copy-paste duplication that should be a single helper parameterized by the operation keyword.","fix":"Extract a helper build_starred_triples(selection, const char *op) used by both.","locations":[{"ref":"src/nautilus-tag-manager.c:337-391","code":"  337 | static GString *\n  338 | nautilus_tag_manager_delete_tag (NautilusTagManager *self,\n  339 |                                  GList              *selection)\n  340 | {\n  341 |     GString *query;\n  342 |     NautilusFile *file;\n  343 |     GList *l;\n  344 | \n  345 |     query = g_string_new (\"DELETE DATA {\");\n  346 | \n  347 |     for (l = selection; l != NULL; l = l->next)\n  348 |     {\n  349 |         g_autofree gchar *uri = NULL;\n  350 | \n  351 |         file = l->data;\n  352 | \n  353 |         uri = nautilus_file_get_uri (file);\n  354 |         g_string_append_printf (query,\n  355 |                                 \"    <%s> a nautilus:File ; \"\n  356 |                                 \"        nautilus:starred true . \",\n  357 |                                 uri);\n  358 |     }\n  359 | \n  360 |     g_string_append (query, \"}\");\n  361 | \n  362 |     return query;\n  363 | }\n  364 | \n  365 | static GString *\n  366 | nautilus_tag_manager_insert_tag (NautilusTagManager *self,\n  367 |                                  GList              *selection)\n  368 | {\n  369 |     GString *query;\n  370 |     NautilusFile *file;\n  371 |     GList *l;\n  372 | \n  373 |     query = g_string_new (\"INSERT DATA {\");\n  374 | \n  375 |     for (l = selection; l != NULL; l = l->next)\n  376 |     {\n  377 |         g_autofree gchar *uri = NULL;\n  378 | \n  379 |         file = l->data;\n  380 | \n  381 |         uri = nautilus_file_get_uri (file);\n  382 |         g_string_append_printf (query,\n  383 |                                 \"    <%s> a nautilus:File ; \"\n  384 |                                 \"        nautilus:starred true . \",\n  385 |                                 uri);\n  386 |     }\n  387 | \n  388 |     g_string_append (query, \"}\");\n  389 | \n  390 |     return query;\n  391 | }"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","description":"In on_cursor_callback(), current_metadata for CREATION_DATE is assigned the GDateTime pointer (creation_datetime) only to serve as a non-NULL probe; the actual value branch then re-reads creation_datetime to format it. This dual use of current_metadata as both a gconstpointer truthiness probe and (for string metadata types) the real value is fragile: any future metadata type that returns a non-string pointer must remember the same trick. No current bug.","fix":"Handle CREATION_DATE entirely within its own branch (probe and format from creation_datetime directly) instead of routing it through the shared current_metadata pointer.","locations":[{"ref":"src/nautilus-batch-rename-utilities.c:671-674","code":"  671 |             case CREATION_DATE:\n  672 |             {\n  673 |                 current_metadata = creation_datetime;\n  674 |             }"},{"ref":"src/nautilus-batch-rename-utilities.c:739-748","code":"  739 |             if (metadata_type == CREATION_DATE)\n  740 |             {\n  741 |                 /* Add the sort order to the order hash table */\n  742 |                 g_hash_table_insert (query_data->date_order_hash_table,\n  743 |                                      g_strdup (file_uri),\n  744 |                                      GINT_TO_POINTER (g_hash_table_size (query_data->date_order_hash_table)));\n  745 | \n  746 |                 file_metadata->metadata[metadata_type] =\n  747 |                     g_string_new_take (g_date_time_format (creation_datetime, \"%F\"));\n  748 |             }"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","description":"Pattern repeated across new_folder_done(), compress_done() and extract_done(): a NautilusFile obtained via nautilus_file_get() (held by a local g_autoptr, or explicitly unref'd as in compress_done) is inserted into the pending_reveal/awaiting_acknowledge hash tables, which are created with g_hash_table_new(NULL, NULL) and thus take no reference. After the function returns, the hash table holds a pointer whose only strong reference has been dropped. This relies entirely on the NautilusFile staying alive via the global file registry / directory model until files_view_end_file_changes() consumes pending_reveal; if the file is finalized first (e.g. operation completed but the add-files signal never arrives), the stale pointer is later used as a hash key and dereferenced.","fix":"Make pending_reveal/awaiting_acknowledge own a reference (g_hash_table_new_full(NULL, NULL, (GDestroyNotify) nautilus_file_unref, NULL)) and g_object_ref/nautilus_file_ref before inserting, or document and guarantee the lifetime invariant explicitly.","locations":[{"ref":"src/nautilus-files-view.c:2112-2129","code":" 2112 |     file = nautilus_file_get (new_file);\n 2113 | \n 2114 |     if (g_hash_table_contains (data->added_locations, new_file))\n 2115 |     {\n 2116 |         /* The file was already added */\n 2117 |         nautilus_files_view_call_set_selection (view,\n 2118 |                                                 &(NautilusFileList){ .data = file },\n 2119 |                                                 TRUE);\n 2120 |     }\n 2121 |     else\n 2122 |     {\n 2123 |         g_hash_table_add (view->pending_reveal, file);\n 2124 |     }\n 2125 | \n 2126 |     uri = nautilus_file_get_uri (file);\n 2127 |     gtk_recent_manager_add_item (gtk_recent_manager_get_default (), uri);\n 2128 | \n 2129 |     nautilus_file_unref (file);"},{"ref":"src/nautilus-files-view.c:6015-6031","code":" 6015 |         for (l = outputs; l != NULL; l = l->next)\n 6016 |         {\n 6017 |             gboolean acknowledged;\n 6018 |             g_autoptr (NautilusFile) file = nautilus_file_get (l->data);\n 6019 | \n 6020 |             acknowledged = g_hash_table_contains (data->added_locations,\n 6021 |                                                   l->data);\n 6022 | \n 6023 |             if (acknowledged)\n 6024 |             {\n 6025 |                 g_hash_table_add (self->pending_reveal, file);\n 6026 |             }\n 6027 |             else\n 6028 |             {\n 6029 |                 g_hash_table_add (self->awaiting_acknowledge, file);\n 6030 |             }\n 6031 |         }"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","description":"Type mismatch: call_consume_changes_idle_id is declared 'static gboolean' but stores a GSource id returned by g_idle_add() (a guint). A gboolean is normatively an int and currently holds the value fine, but the declared type is semantically wrong and could mask a >255/truncation expectation; should be guint.","fix":"Declare it as 'static guint call_consume_changes_idle_id = 0;'.","locations":[{"ref":"src/nautilus-monitor.c:40","code":"   40 | static gboolean call_consume_changes_idle_id = 0;"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","description":"nautilus_progress_info_get_remaining_time() and nautilus_progress_info_get_elapsed_time() store gdouble fields into local 'gint' variables before returning as gdouble, truncating any fractional/sub-second part of the remaining/elapsed time. The function returns gdouble so the intermediate gint truncation is almost certainly unintended.","fix":"Use gdouble local variables (or return info->remaining_time / info->elapsed_time directly under the lock).","locations":[{"ref":"src/nautilus-progress-info.c:805-815","code":"  805 | gdouble\n  806 | nautilus_progress_info_get_remaining_time (NautilusProgressInfo *info)\n  807 | {\n  808 |     gint remaining_time;\n  809 | \n  810 |     G_LOCK (progress_info);\n  811 |     remaining_time = info->remaining_time;\n  812 |     G_UNLOCK (progress_info);\n  813 | \n  814 |     return remaining_time;\n  815 | }"},{"ref":"src/nautilus-progress-info.c:826-836","code":"  826 | gdouble\n  827 | nautilus_progress_info_get_elapsed_time (NautilusProgressInfo *info)\n  828 | {\n  829 |     gint elapsed_time;\n  830 | \n  831 |     G_LOCK (progress_info);\n  832 |     elapsed_time = info->elapsed_time;\n  833 |     G_UNLOCK (progress_info);\n  834 | \n  835 |     return elapsed_time;\n  836 | }"}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"low","description":"Comma operator used instead of a statement terminator. The g_signal_connect() call ends with a comma ',' rather than a semicolon, so it is sequenced (via the comma operator) with the following file_list = g_list_prepend(...) statement. It compiles and currently behaves correctly, but it is an accidental typo that silently merges two statements into one expression; any future edit (e.g. inserting a line between them) will break compilation or behaviour confusingly.","fix":"Replace the trailing comma after g_signal_connect (hit_file, \"changed\", G_CALLBACK (file_changed), self) with a semicolon.","locations":[{"ref":"src/nautilus-search-directory.c:585","code":"  585 |         g_signal_connect (hit_file, \"changed\", G_CALLBACK (file_changed), self),"}]}]</script>

    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-31 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
