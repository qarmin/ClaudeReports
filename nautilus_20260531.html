","code":" 2909 |     g_object_get (row,\n 2910 |                   \"place-type\", &type,\n 2911 |                   \"drive\", &drive,\n 2912 |                   \"volume\", &volume,\n 2913 |                   \"mount\", &mount,\n 2914 |                   \"uri\", &uri,\n 2915 |                   NULL);"},{"ref":"src/nautilus-sidebar.c:2927-2934","code":" 2927 | #ifdef HAVE_CLOUDPROVIDERS\n 2928 |     g_object_get (row, \"cloud-provider-account\", &cloud_provider_account, NULL);\n 2929 | \n 2930 |     if (cloud_provider_account)\n 2931 |     {\n 2932 |         build_popup_menu_using_gmenu (row);\n 2933 |         return;\n 2934 |     }"},{"ref":"src/nautilus-sidebar.c:3126-3134","code":" 3126 |     sidebar->popover = gtk_popover_menu_new_from_model (G_MENU_MODEL (menu));\n 3127 |     g_object_unref (menu);\n 3128 |     gtk_widget_set_parent (sidebar->popover, GTK_WIDGET (sidebar));\n 3129 |     gtk_widget_set_halign (sidebar->popover, GTK_ALIGN_START);\n 3130 |     gtk_popover_set_has_arrow (GTK_POPOVER (sidebar->popover), FALSE);\n 3131 |     g_signal_connect (sidebar->popover, \"destroy\", G_CALLBACK (on_row_popover_destroy), sidebar);\n 3132 | \n 3133 |     setup_popover_shadowing (sidebar->popover, sidebar);\n 3134 | }"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"server_has_persistence() can call g_dbus_connection_call_sync() with conn == NULL when the default GApplication has no D-Bus connection. More importantly, on the result==NULL error path it returns FALSE but leaves the static 'initialized' flag TRUE, so a transient failure permanently disables persistent notifications for the process lifetime (the cached retval stays FALSE forever).","fix":"Reset initialized=FALSE (or do not set it) on the failure path so the capability query can be retried; also null-check conn before calling.","locations":[{"ref":"src/nautilus-progress-persistence-handler.c:327-341","code":"  327 |     conn = g_application_get_dbus_connection (g_application_get_default ());\n  328 |     result = g_dbus_connection_call_sync (conn,\n  329 |                                           \"org.freedesktop.Notifications\",\n  330 |                                           \"/org/freedesktop/Notifications\",\n  331 |                                           \"org.freedesktop.Notifications\",\n  332 |                                           \"GetCapabilities\",\n  333 |                                           g_variant_new (\"()\"),\n  334 |                                           G_VARIANT_TYPE (\"(as)\"),\n  335 |                                           G_DBUS_CALL_FLAGS_NONE,\n  336 |                                           -1, NULL, NULL);\n  337 | \n  338 |     if (result == NULL)\n  339 |     {\n  340 |         return FALSE;\n  341 |     }"}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In on_tracker_notifier_events(), when the per-event query yields a cursor but the error/!query_has_results branch is taken, the cursor is never unreferenced (the 'return' at line 517 bypasses the g_object_unref(cursor) at line 561). Each failing event with a non-NULL cursor leaks a TrackerSparqlCursor.","fix":"Before bailing out, g_clear_object(&cursor); and prefer continuing the loop rather than returning.","locations":[{"ref":"src/nautilus-tag-manager.c:508-518","code":"  508 |         if (cursor)\n  509 |         {\n  510 |             query_has_results = tracker_sparql_cursor_next (cursor, NULL, &error);\n  511 |         }\n  512 | \n  513 |         if (error || !cursor || !query_has_results)\n  514 |         {\n  515 |             g_warning (\"Couldn't query the starred files database: '%s'\", error ? error->message : \"(null error)\");\n  516 |             g_clear_error (&error);\n  517 |             return;\n  518 |         }"},{"ref":"src/nautilus-tag-manager.c:561","code":"  561 |         g_object_unref (cursor);"}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"found_mount_cb() leaks the FindMountData when g_file_find_enclosing_mount_finish() fails. On the failure path, `data` is still owned by the g_autoptr (FindMountData), so it is freed by clear_find_mount_data() — that part is fine. However note self->find_mount_cancellable is set to NULL but the cancellable object itself is owned by data and freed by the autoptr, which is correct. The real issue: on the success path g_steal_pointer(&data) transfers ownership to nautilus_get_x_content_types_for_mount_async()'s user_data, and found_content_type_cb() frees it via its own g_autoptr — but if that async call never invokes its callback (e.g. cancelled before dispatch in a way that skips the callback), the data leaks. This is a latent ownership-fragility rather than a guaranteed leak.","fix":"Document/verify that nautilus_get_x_content_types_for_mount_async always invokes its callback exactly once (even on cancellation) so the stolen FindMountData is always freed; otherwise attach the cancellable cleanup to a single owner.","locations":[{"ref":"src/nautilus-window-slot.c:2554-2583","code":" 2554 | static void\n 2555 | found_mount_cb (GObject      *source_object,\n 2556 |                 GAsyncResult *res,\n 2557 |                 gpointer      user_data)\n 2558 | {\n 2559 |     g_autoptr (FindMountData) data = user_data;\n 2560 | \n 2561 |     if (g_cancellable_is_cancelled (data->cancellable))\n 2562 |     {\n 2563 |         return;\n 2564 |     }\n 2565 | \n 2566 |     data->mount = g_file_find_enclosing_mount_finish (G_FILE (source_object),\n 2567 |                                                       res,\n 2568 |                                                       NULL);\n 2569 |     if (data->mount != NULL)\n 2570 |     {\n 2571 |         FindMountData *passed_on = g_steal_pointer (&data);\n 2572 |         nautilus_get_x_content_types_for_mount_async (passed_on->mount,\n 2573 |                                                       found_content_type_cb,\n 2574 |                                                       passed_on->cancellable,\n 2575 |                                                       passed_on);\n 2576 |     }\n 2577 |     else\n 2578 |     {\n 2579 |         NautilusWindowSlot *self = NAUTILUS_WINDOW_SLOT (data->slot);\n 2580 | \n 2581 |         self->find_mount_cancellable = NULL;\n 2582 |     }\n 2583 | }"}]},{"id":"RES_6","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In save_image_thread_func(), the conflict loop sets `job->location = g_file_get_child (...)` before calling g_file_create(). On the EXISTS branch job->location is cleared and the loop retries, but on the generic-error branch (the final `else { return; }`) the function returns with job->location still pointing at a file that was NOT successfully created. save_image_task_done() then inserts that location into debuting_files and reports it, and on failure attempts to g_file_delete() a file that this job never created (could delete a pre-existing unrelated file the create call collided with, though create only fails non-EXISTS for real errors). At minimum it reports a bogus debuting file.","fix":"On the non-EXISTS error path, clear job->location (g_clear_object (&job->location)) before returning so the failed/untouched path is not reported or deleted.","locations":[{"ref":"src/nautilus-file-operations.c:6962-6982","code":" 6962 |     for (size_t i = 1; stream == NULL; i += 1)\n 6963 |     {\n 6964 |         g_autoptr (GError) stream_error = NULL;\n 6965 |         g_autofree gchar *filename = i == 1 ?\n 6966 |                                      g_strdup (basename) :\n 6967 |                                      nautilus_filename_for_conflict (basename, i, -1, FALSE);\n 6968 | \n 6969 |         job->location = g_file_get_child (job->dest_dir, filename);\n 6970 |         stream = g_file_create (job->location, 0, job->common.cancellable, &stream_error);\n 6971 |         if (stream_error == NULL)\n 6972 |         {\n 6973 |             break;\n 6974 |         }\n 6975 |         else if (IS_IO_ERROR (stream_error, EXISTS))\n 6976 |         {\n 6977 |             g_clear_object (&job->location);\n 6978 |         }\n 6979 |         else\n 6980 |         {\n 6981 |             return;\n 6982 |         }"}]},{"id":"RES_7","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"nautilus_find_existing_uri_in_hierarchy() takes a ref on the input location (line 372) and walks up parents. If no ancestor exists (loop ends with location == NULL), it returns NULL but that is fine; however the function is documented/used as returning a transfer-full GFile. The real issue: when g_file_query_info succeeds it returns 'location' which holds the extra ref taken at line 372 — correct — but the parameter shadowing reassigns the caller-visible 'location' pointer, which is confusing and the originally-passed-in GFile is never the one returned. Verify callers expect transfer-full; the ref accounting is correct but the in-place reassignment of the parameter is error-prone.","fix":"Use a separate local variable instead of reassigning the 'location' parameter to make the transfer-full contract explicit.","locations":[{"ref":"src/nautilus-file-utilities.c:365-390","code":"  365 | GFile *\n  366 | nautilus_find_existing_uri_in_hierarchy (GFile *location)\n  367 | {\n  368 |     GFile *tmp;\n  369 | \n  370 |     g_assert (location != NULL);\n  371 | \n  372 |     location = g_object_ref (location);\n  373 |     while (location != NULL)\n  374 |     {\n  375 |         g_autoptr (GFileInfo) info = NULL;\n  376 | \n  377 |         info = g_file_query_info (location,\n  378 |                                   G_FILE_ATTRIBUTE_STANDARD_NAME,\n  379 |                                   0, NULL, NULL);\n  380 |         if (info != NULL)\n  381 |         {\n  382 |             return location;\n  383 |         }\n  384 |         tmp = location;\n  385 |         location = g_file_get_parent (location);\n  386 |         g_object_unref (tmp);\n  387 |     }\n  388 | \n  389 |     return location;\n  390 | }"}]},{"id":"RES_8","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In bind_name_cell(), when expand_as_a_tree is TRUE the row's notify::expanded and notify::children handlers are connected with g_signal_connect_object(row, ...). unbind_name_cell() disconnects them by func, but only inside `if (self->expand_as_a_tree)`. If expand_as_a_tree is toggled from TRUE to FALSE (e.g. tree preference change triggers reload) between bind and unbind, the disconnect branch is skipped and the handlers remain connected to the (recycled) row. g_signal_connect_object limits the lifetime to `self`, so it is bounded, but stale handlers can fire on recycled rows until then.","fix":"Disconnect the row handlers in unbind unconditionally (the disconnect-by-func is a no-op if nothing is connected), or track per-binding whether the handlers were connected rather than re-reading self->expand_as_a_tree.","locations":[{"ref":"src/nautilus-list-view.c:904-917","code":"  904 |     if (self->expand_as_a_tree)\n  905 |     {\n  906 |         GtkTreeListRow *row = GTK_TREE_LIST_ROW (gtk_column_view_cell_get_item (listitem));\n  907 | \n  908 |         gtk_tree_expander_set_list_row (expander, row);\n  909 |         g_signal_connect_object (row,\n  910 |                                  \"notify::expanded\",\n  911 |                                  G_CALLBACK (on_row_expanded_changed),\n  912 |                                  self, 0);\n  913 |         g_signal_connect_object (row,\n  914 |                                  \"notify::children\",\n  915 |                                  G_CALLBACK (on_row_children_changed),\n  916 |                                  expander, 0);\n  917 |     }"},{"ref":"src/nautilus-list-view.c:942-950","code":"  942 |     if (self->expand_as_a_tree)\n  943 |     {\n  944 |         g_signal_handlers_disconnect_by_func (gtk_column_view_cell_get_item (listitem),\n  945 |                                               on_row_expanded_changed,\n  946 |                                               self);\n  947 |         g_signal_handlers_disconnect_by_func (gtk_column_view_cell_get_item (listitem),\n  948 |                                               on_row_children_changed,\n  949 |                                               self);\n  950 |     }"}]},{"id":"RES_9","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In open_with_response_cb, gtk_app_chooser_get_app_info() can return NULL (e.g. if no app is selected), after which 'info' is passed to nautilus_launch_application and then g_object_unref(info) is called unconditionally. A NULL info would be unreffed (g_object_unref(NULL) warns) and launched. While GTK_RESPONSE_OK usually implies a valid selection, there is no NULL guard before use/unref.","fix":"Check 'info != NULL' before launching and unreffing; bail out gracefully otherwise.","locations":[{"ref":"src/nautilus-mime-actions.c:1210-1218","code":" 1210 |     info = gtk_app_chooser_get_app_info (GTK_APP_CHOOSER (dialog));\n 1211 | \n 1212 |     gtk_window_destroy (GTK_WINDOW (dialog));\n 1213 | \n 1214 |     g_signal_emit_by_name (nautilus_signaller_get_current (), \"mime-data-changed\");\n 1215 | \n 1216 |     nautilus_launch_application (info, &(NautilusFileList){ .data = file }, parent_window);\n 1217 | \n 1218 |     g_object_unref (info);"}]},{"id":"RES_10","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"nautilus_path_bar_init() aborts via g_error() if the context-menu UI resource fails to load, but more relevantly: bind_current_view_menu_model_to_popover is invoked directly at init AND can be scheduled as an idle in set_templates_menu. The idle id is cleared in dispose, which is correct; however the direct call path is fine. No leak here on the idle, but note current_view_menu_popover is the only popover with g_object_ref_sink while button_menu_popover is parented via gtk_widget_set_parent and is NOT unparented in dispose/finalize, relying on widget teardown of the GtkBox — verify it is freed. button_menu_popover has gtk_widget_set_parent(self) but no gtk_widget_unparent in dispose.","fix":"In nautilus_path_bar_dispose(), explicitly g_clear_pointer (&self->button_menu_popover, gtk_widget_unparent) to mirror the history-controls pattern and avoid leaking the manually-parented popover.","locations":[{"ref":"src/nautilus-pathbar.c:327-330","code":"  327 |     self->button_menu_popover = gtk_popover_menu_new_from_model (G_MENU_MODEL (self->button_menu));\n  328 |     gtk_widget_set_parent (self->button_menu_popover, GTK_WIDGET (self));\n  329 |     gtk_popover_set_has_arrow (GTK_POPOVER (self->button_menu_popover), FALSE);\n  330 |     gtk_widget_set_halign (self->button_menu_popover, GTK_ALIGN_START);"},{"ref":"src/nautilus-pathbar.c:380-390","code":"  380 | static void\n  381 | nautilus_path_bar_dispose (GObject *object)\n  382 | {\n  383 |     NautilusPathBar *self = NAUTILUS_PATH_BAR (object);\n  384 | \n  385 |     g_clear_handle_id (&self->bind_menu_model_to_popover_id, g_source_remove);\n  386 | \n  387 |     nautilus_path_bar_clear_buttons (self);\n  388 | \n  389 |     G_OBJECT_CLASS (nautilus_path_bar_parent_class)->dispose (object);\n  390 | }"}]},{"id":"RES_11","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"tab_view_create_window_cb() creates a new NautilusWindow and returns new_window->tab_view, but reaches into the struct directly. More relevant: action_tab_move_new_window() calls tab_view_create_window_cb() (creating+presenting a new window) and then adw_tab_view_transfer_page(). If transfer fails or the source page is the only page, no cleanup of the freshly-created empty window occurs, potentially leaving an empty window. Not a memory leak per se but a resource/UX leak of an empty window.","fix":"After transferring, verify the new window has at least one page; if it is left empty, close it. Or restructure to create the window only after confirming the page can be moved.","locations":[{"ref":"src/nautilus-window.c:991-1018","code":"  991 | static AdwTabView *\n  992 | tab_view_create_window_cb (AdwTabView     *tab_view,\n  993 |                            NautilusWindow *window)\n  994 | {\n  995 |     NautilusApplication *app;\n  996 |     NautilusWindow *new_window;\n  997 | \n  998 |     app = NAUTILUS_APPLICATION (g_application_get_default ());\n  999 |     new_window = nautilus_application_create_window (app, NULL);\n 1000 |     gtk_window_set_display (GTK_WINDOW (new_window),\n 1001 |                             gtk_widget_get_display (GTK_WIDGET (tab_view)));\n 1002 | \n 1003 |     gtk_window_present (GTK_WINDOW (new_window));\n 1004 | \n 1005 |     return new_window->tab_view;\n 1006 | }\n 1007 | \n 1008 | static void\n 1009 | action_tab_move_new_window (GSimpleAction *action,\n 1010 |                             GVariant      *parameter,\n 1011 |                             gpointer       user_data)\n 1012 | {\n 1013 |     NautilusWindow *window = user_data;\n 1014 |     AdwTabPage *page = get_current_page (window);\n 1015 |     AdwTabView *new_view = tab_view_create_window_cb (window->tab_view, window);\n 1016 | \n 1017 |     adw_tab_view_transfer_page (window->tab_view, page, new_view, 0);\n 1018 | }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In extract_task_thread_func()'s per-archive failure branch, base_progress is rescaled by total_compressed_size, then total_compressed_size has the failed archive's size subtracted, then base_progress is divided by the new total_compressed_size. If the failed archive was the only/last contributor (or all remaining archives have size 0), total_compressed_size becomes 0 and the division at line 7944 is a divide-by-zero on a gdouble, producing NaN/Inf which is then fed into nautilus_progress_info_set_progress for subsequent archives. Also note archive_decompress_progress at lines 7576-7577 divides by archive_total_decompressed_size with no zero guard (empty archive).","fix":"Guard the rescale: only divide when the new total_compressed_size > 0, otherwise set base_progress to 0 (or 1). Similarly guard archive_total_decompressed_size != 0 in extract_job_on_progress().","locations":[{"ref":"src/nautilus-file-operations.c:7941-7945","code":" 7941 |             extract_job->total_files--;\n 7942 |             extract_job->base_progress *= extract_job->total_compressed_size;\n 7943 |             extract_job->total_compressed_size -= extract_job->archive_compressed_size;\n 7944 |             extract_job->base_progress /= extract_job->total_compressed_size;\n 7945 |         }"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"In real_batch_rename's rollback loop, the while condition tests g_async_queue_length(rollback_files) but the body pops from changed_files. changed_files was already fully drained by the preceding loop (lines 2193-2199), so g_async_queue_pop(changed_files) blocks indefinitely on an empty queue, hanging the UI thread whenever a rename cycle requires rollback. The intended queue (rollback_files) is also never consumed, so its TwoLists entries leak.","fix":"Pop from rollback_files instead of changed_files: `g_autofree TwoLists *rollback_file_lists = g_async_queue_pop (rollback_files);`.","locations":[{"ref":"src/nautilus-file.c:2203-2223","code":" 2203 |     while (g_async_queue_length (rollback_files) > 0)\n 2204 |     {\n 2205 |         g_autofree TwoLists *rollback_file_lists = g_async_queue_pop (changed_files);\n 2206 |         g_autoptr (GList) old_file_list = rollback_file_lists->old_files;\n 2207 |         g_autoptr (GList) new_file_list = rollback_file_lists->new_files;\n 2208 | \n 2209 |         g_file_move (new_file_list->data, old_file_list->data,\n 2210 |                      G_FILE_COPY_NONE, NULL, NULL, NULL, NULL);\n 2211 | \n 2212 |         NautilusFile *old_file = nautilus_file_get_existing (old_file_list->data);\n 2213 |         NautilusFile *new_file = nautilus_file_get_existing (new_file_list->data);\n 2214 | \n 2215 |         if (old_file != NULL)\n 2216 |         {\n 2217 |             nautilus_file_invalidate_attributes (old_file, NAUTILUS_ATTRIBUTE_INFO);\n 2218 |         }\n 2219 |         if (new_file != NULL)\n 2220 |         {\n 2221 |             nautilus_file_invalidate_attributes (new_file, NAUTILUS_ATTRIBUTE_INFO);\n 2222 |         }\n 2223 |     }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In the single-day (non-range) modes, the date-range dialog reads the date from the wrong widget. has_valid_date_range() validates `single_date_row` when not in range mode, but try_confirm() takes the `center` value from `from_entry_row` (which is hidden in single-day modes). The user-edited single date is therefore ignored and the hidden from_entry_row's value (defaults to \"now\") is used to compute the span. The .blp template confirms single_date_row is the visible row for single-day modes.","fix":"In try_confirm(), in the else branch use `self->single_date_row` as the center, matching has_valid_date_range().","locations":[{"ref":"src/nautilus-date-range-dialog.c:120-144","code":"  120 | try_confirm (NautilusDateRangeDialog *self)\n  121 | {\n  122 |     /* Verify that range is actually valid */\n  123 |     if (!has_valid_date_range (self))\n  124 |     {\n  125 |         gtk_widget_set_sensitive (GTK_WIDGET (self->select_button), FALSE);\n  126 |         return;\n  127 |     }\n  128 | \n  129 |     GDateTime *start, *end;\n  130 | \n  131 |     guint selected_pos = adw_combo_row_get_selected (self->date_range_row);\n  132 |     if (selected_pos == SPECIFY_RANGE_POS)\n  133 |     {\n  134 |         start = nautilus_date_entry_row_get_date_time (self->from_entry_row);\n  135 |         end = nautilus_date_entry_row_get_date_time (self->to_entry_row);\n  136 |     }\n  137 |     else\n  138 |     {\n  139 |         g_autoptr (GDateTime) center = nautilus_date_entry_row_get_date_time (self->from_entry_row);\n  140 | \n  141 |         guint span = get_selected_span (selected_pos);\n  142 |         start = g_date_time_add_days (center, -span);\n  143 |         end = g_date_time_add_days (center, span);\n  144 |     }"},{"ref":"src/nautilus-date-range-dialog.c:87-104","code":"   87 | static gboolean\n   88 | has_valid_date_range (NautilusDateRangeDialog *self)\n   89 | {\n   90 |     if (in_date_range_mode (self))\n   91 |     {\n   92 |         g_autoptr (GDateTime) from = nautilus_date_entry_row_get_date_time (self->from_entry_row);\n   93 |         g_autoptr (GDateTime) to = nautilus_date_entry_row_get_date_time (self->to_entry_row);\n   94 | \n   95 |         return from != NULL && to != NULL &&\n   96 |                /* \"from\" needs to be earlier than \"to\" */\n   97 |                g_date_time_compare (from, to) < 1;\n   98 |     }\n   99 |     else\n  100 |     {\n  101 |         g_autoptr (GDateTime) date = nautilus_date_entry_row_get_date_time (self->single_date_row);\n  102 |         return date != NULL;\n  103 |     }\n  104 | }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"extract_job_on_error() computes `remaining_files` incorrectly. It calls `g_list_length (g_list_find_custom (extract_job->source_files, source_file, g_file_equal)) - 1`. g_list_find_custom() returns the *node* at which source_file matches; g_list_length() of that node returns the number of elements from that node to the end of the list, not the number of files matching source_file. So `remaining_files` is really 'number of source files positioned at-or-after the failing one, minus one'. This value is then used as `remaining_files > 1` to decide whether to offer Skip-All in the error dialog. The effect is that whether the user is offered 'Skip All' depends on the failing archive's *position* in the list rather than on how many archives remain to process, which is misleading and can hide the Skip-All option.","fix":"Track the number of remaining archives explicitly (e.g. an index/counter decremented in extract_task_thread_func and passed in), or compute remaining as total_files minus the count already processed. Do not derive a count from g_list_length of a g_list_find_custom result.","locations":[{"ref":"src/nautilus-file-operations.c:7701-7713","code":" 7701 |     remaining_files = g_list_length (g_list_find_custom (extract_job->source_files,\n 7702 |                                                          source_file,\n 7703 |                                                          (GCompareFunc) g_file_equal)) - 1;\n 7704 | \n 7705 |     heading = g_strdup_printf (_(\"There was an error while extracting “%s”.\"),\n 7706 |                                basename),\n 7707 | \n 7708 |     show_skip_dialog ((CommonJob *) extract_job,\n 7709 |                       heading,\n 7710 |                       error->message,\n 7711 |                       NULL,\n 7712 |                       extract_job->total_files,\n 7713 |                       remaining_files > 1);"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Loop iterates over `l` but reads `selection->data` instead of `l->data`, so only the first selected file is ever tested with nautilus_file_opens_in_view(). For a multi-file selection where the first file opens in the view but a later one does not, item_opens_in_view stays TRUE incorrectly, enabling 'Open in New Tab'/'Open in New Window' for selections that should not allow it.","fix":"Use `file = NAUTILUS_FILE (l->data);` inside the loop body.","locations":[{"ref":"src/nautilus-files-view.c:7332-7347","code":" 7332 |     for (l = selection; l != NULL; l = l->next)\n 7333 |     {\n 7334 |         NautilusFile *file;\n 7335 | \n 7336 |         file = NAUTILUS_FILE (selection->data);\n 7337 | \n 7338 |         if (!nautilus_file_opens_in_view (file))\n 7339 |         {\n 7340 |             item_opens_in_view = FALSE;\n 7341 |         }\n 7342 | \n 7343 |         if (!item_opens_in_view)\n 7344 |         {\n 7345 |             break;\n 7346 |         }\n 7347 |     }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"real_dispose() chains up to the parent dispose FIRST (G_OBJECT_CLASS(...)->dispose(object)) and only afterwards performs its own teardown (unscheduling owner/group changes, removing file monitors, clearing lists, disposing the template). The parent GtkWidget dispose unparents/destroys child widgets, so subsequent gtk_widget_dispose_template() and timeout/source cleanup run against an already partially-destroyed instance, and on a second dispose invocation the self-cleanup runs again. Chain-up should normally happen last.","fix":"Perform all instance-specific cleanup first and call G_OBJECT_CLASS(nautilus_properties_widget_parent_class)->dispose(object) at the end of real_dispose().","locations":[{"ref":"src/nautilus-properties.c:3835-3878","code":" 3835 | real_dispose (GObject *object)\n 3836 | {\n 3837 |     G_OBJECT_CLASS (nautilus_properties_widget_parent_class)->dispose (object);\n 3838 | \n 3839 |     NautilusPropertiesWidget *self;\n 3840 | \n 3841 |     self = NAUTILUS_PROPERTIES_WIDGET (object);\n 3842 | \n 3843 |     unschedule_or_cancel_group_change (self);\n 3844 |     unschedule_or_cancel_owner_change (self);\n 3845 | \n 3846 |     g_clear_object (&self->icon_cancellable);\n 3847 |     g_clear_object (&self->icon_pending_location);\n 3848 |     g_clear_pointer (&self->custom_icon_for_undo, g_free);\n 3849 |     g_clear_pointer (&self->handle, nautilus_file_list_cancel_call_when_ready);\n 3850 | \n 3851 |     g_list_foreach (self->files,\n 3852 |                     (GFunc) nautilus_file_monitor_remove,\n 3853 |                     &self->files);\n 3854 |     g_clear_list (&self->files, (GDestroyNotify) nautilus_file_unref);\n 3855 | \n 3856 |     g_clear_list (&self->changed_files, (GDestroyNotify) nautilus_file_unref);\n 3857 | \n 3858 |     g_clear_handle_id (&self->deep_count_spinner_timeout_id, g_source_remove);\n 3859 | \n 3860 |     while (self->deep_count_files)\n 3861 |     {\n 3862 |         stop_deep_count_for_file (self, self->deep_count_files->data);\n 3863 |     }\n 3864 | \n 3865 |     g_clear_list (&self->permission_rows, NULL);\n 3866 | \n 3867 |     g_clear_list (&self->change_permission_combo_rows, NULL);\n 3868 | \n 3869 |     g_clear_pointer (&self->initial_permissions, g_hash_table_destroy);\n 3870 | \n 3871 |     g_clear_list (&self->value_labels, NULL);\n 3872 |     g_clear_list (&self->value_rows, NULL);\n 3873 | \n 3874 |     g_clear_handle_id (&self->update_directory_contents_timeout_id, g_source_remove);\n 3875 |     g_clear_handle_id (&self->update_files_timeout_id, g_source_remove);\n 3876 | \n 3877 |     gtk_widget_dispose_template (GTK_WIDGET (self), NAUTILUS_TYPE_PROPERTIES_WIDGET);\n 3878 | }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"update_no_applications_label() can call g_strdup_printf(_(\"No apps found for “%s”.\"), desc) with desc==NULL when self->content_type is NULL (desc is only assigned inside the `if (self->content_type)` guard). Passing NULL for a %s is technically undefined; glib prints \"(null)\" in practice but the user-visible message becomes nonsensical (\"No apps found for “(null)”.\").","fix":"When content_type/desc is NULL, use a generic message such as _(\"No apps found.\") instead of formatting a NULL into the string.","locations":[{"ref":"src/nautilus-app-chooser-widget.c:262-271","code":"  262 |     if (self->default_text == NULL)\n  263 |     {\n  264 |         if (self->content_type)\n  265 |         {\n  266 |             desc = g_content_type_get_description (self->content_type);\n  267 |         }\n  268 | \n  269 |         string = text = g_strdup_printf (_(\"No apps found for “%s”.\"), desc);\n  270 |         g_free (desc);\n  271 |     }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"open_cb() only sets a new default and emits mime-data-changed inside the single_content_type branch, but the error dialog for a failed g_app_info_set_as_default_for_type() is also nested in that branch — which is fine — yet `error` is checked even when set_new_default is FALSE (error is always NULL then). More importantly, if set_new_default is FALSE the function silently does nothing for the default; that's intended, but the `if (error != NULL)` block sits at the same nesting and will never fire unless set_as_default ran. Not a crash, but the error handling reads as if it covers more than it does.","fix":"Move the `if (error != NULL)` handling immediately inside the `if (set_new_default)` block so the control flow clearly ties the error to the only call that can set it.","locations":[{"ref":"src/nautilus-app-chooser.c:62-89","code":"   62 |     if (self->single_content_type)\n   63 |     {\n   64 |         /* The switch is insensitive if the selected app is already default */\n   65 |         if (gtk_widget_get_sensitive (self->set_default_row))\n   66 |         {\n   67 |             set_new_default = adw_switch_row_get_active (ADW_SWITCH_ROW (self->set_default_row));\n   68 |         }\n   69 | \n   70 |         if (set_new_default)\n   71 |         {\n   72 |             g_app_info_set_as_default_for_type (info, self->content_type,\n   73 |                                                 &error);\n   74 |             g_signal_emit_by_name (nautilus_signaller_get_current (), \"mime-data-changed\");\n   75 |         }\n   76 | \n   77 |         if (error != NULL)\n   78 |         {\n   79 |             AdwAlertDialog *dialog;\n   80 | \n   81 |             dialog = ADW_ALERT_DIALOG (adw_alert_dialog_new (_(\"Could not set as default\"), NULL));\n   82 |             adw_alert_dialog_format_body (dialog,\n   83 |                                           _(\"Error while setting “%s” as default app: %s\"),\n   84 |                                           g_app_info_get_display_name (info), error->message);\n   85 |             adw_alert_dialog_add_response (dialog, \"close\", _(\"_OK\"));\n   86 | \n   87 |             adw_dialog_present (ADW_DIALOG (dialog), GTK_WIDGET (self));\n   88 |         }\n   89 |     }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_window_get_active_location() asserts self->active_slot != NULL via g_return_val_if_fail, but action_clone_window() (application.c:490) calls it directly on the result of gtk_application_get_active_window() cast to NautilusWindow without verifying the window is non-NULL or is actually a NautilusWindow. If the active window is NULL (e.g. running as a gapplication-service with no window) or not a NautilusWindow, NAUTILUS_WINDOW() cast yields NULL/garbage and nautilus_window_get_active_location() dereferences self in NAUTILUS_IS_WINDOW. action_about/action_preferences have similar unchecked active-window casts.","fix":"In the action handlers, check that gtk_application_get_active_window() returns a non-NULL NautilusWindow before using it (these app actions can be activated via DBus when no window exists).","locations":[{"ref":"src/nautilus-application.c:483-504","code":"  483 | static void\n  484 | action_clone_window (GSimpleAction *action,\n  485 |                      GVariant      *parameter,\n  486 |                      gpointer       user_data)\n  487 | {\n  488 |     GtkApplication *application = user_data;\n  489 |     NautilusWindow *active_window = NAUTILUS_WINDOW (gtk_application_get_active_window (application));\n  490 |     GFile *window_location = nautilus_window_get_active_location (active_window);\n  491 |     g_autoptr (GFile) cloned_location = NULL;\n  492 | \n  493 |     if (window_location == NULL || g_file_has_uri_scheme (window_location, SCHEME_SEARCH))\n  494 |     {\n  495 |         cloned_location = g_file_new_for_path (g_get_home_dir ());\n  496 |     }\n  497 |     else\n  498 |     {\n  499 |         cloned_location = g_object_ref (window_location);\n  500 |     }\n  501 | \n  502 |     nautilus_application_open_location_full (NAUTILUS_APPLICATION (application), cloned_location,\n  503 |                                              NAUTILUS_OPEN_FLAG_NEW_WINDOW, NULL, NULL);\n  504 | }"},{"ref":"src/nautilus-window.c:1396-1410","code":" 1396 | GFile *\n 1397 | nautilus_window_get_active_location (NautilusWindow *self)\n 1398 | {\n 1399 |     g_return_val_if_fail (NAUTILUS_IS_WINDOW (self), NULL);\n 1400 |     g_return_val_if_fail (self->active_slot != NULL, NULL);\n 1401 | \n 1402 |     GFile *location = nautilus_window_slot_get_location (self->active_slot);\n 1403 | \n 1404 |     if (location == NULL)\n 1405 |     {\n 1406 |         location = nautilus_window_slot_get_pending_location (self->active_slot);\n 1407 |     }\n 1408 | \n 1409 |     return location;\n 1410 | }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_application_handle_file_args() leaks `cwd` in the case where g_variant_dict_lookup(options, \"cwd\", \"s\", &cwd) succeeds but the branch g_file_new_for_commandline_arg() is taken. cwd is only freed inside the `else` branch (line 675). When cwd is NULL the first branch runs and there is nothing to free, but g_variant_dict_lookup with format \"s\" duplicates the string, so on every iteration where cwd is non-NULL AND the file has no extra handling it is freed; however the `cwd` lookup is performed inside the loop on every iteration, re-allocating each time. More importantly, when the SCHEME_SEARCH branch is taken (line 678), `file` is created but never added to file_array and never unreffed, leaking the GFile.","fix":"Unref `file` in the SCHEME_SEARCH branch (e.g. g_object_unref(file) after printing the error). Hoist the cwd lookup out of the loop to avoid repeated allocation, and free it once after the loop.","locations":[{"ref":"src/nautilus-application.c:661-691","code":"  661 |     if (remaining)\n  662 |     {\n  663 |         for (idx = 0; remaining[idx] != NULL; idx++)\n  664 |         {\n  665 |             gchar *cwd;\n  666 | \n  667 |             g_variant_dict_lookup (options, \"cwd\", \"s\", &cwd);\n  668 |             if (cwd == NULL)\n  669 |             {\n  670 |                 file = g_file_new_for_commandline_arg (remaining[idx]);\n  671 |             }\n  672 |             else\n  673 |             {\n  674 |                 file = g_file_new_for_commandline_arg_and_cwd (remaining[idx], cwd);\n  675 |                 g_free (cwd);\n  676 |             }\n  677 | \n  678 |             if (g_file_has_uri_scheme (file, SCHEME_SEARCH))\n  679 |             {\n  680 |                 g_autofree char *error_string = NULL;\n  681 |                 error_string = g_strdup_printf (_(\"“%s” is an internal protocol. \"\n  682 |                                                   \"Opening this location directly is not supported.\"),\n  683 |                                                 SCHEME_SEARCH \":\");\n  684 | \n  685 |                 g_printerr (\"%s\\n\", error_string);\n  686 |             }\n  687 |             else\n  688 |             {\n  689 |                 g_ptr_array_add (file_array, file);\n  690 |             }\n  691 |         }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_batch_rename_dialog_query_finished() indexes has_metadata[] and file_metadata->metadata[] by the MetadataType enum value (tag_data->tag_constants.metadata_type), while on_cursor_callback() populates query_data->has_metadata[] by the position index `i` into metadata_tags_constants[]. This only works because the enum declaration order in nautilus-batch-rename-dialog.h happens to exactly match the array order of metadata_tags_constants[]. Any future reordering of either the enum or the array (without keeping them in lock-step) silently mixes up per-metadata availability flags with no compile-time check.","fix":"Index both arrays consistently (always by metadata_type, or always by array position) and add a build-time assertion that metadata_tags_constants[i].metadata_type == i, or store has_metadata keyed by metadata_type.","locations":[{"ref":"src/nautilus-batch-rename-dialog.c:1155-1162","code":" 1155 |         metadata_type = tag_data->tag_constants.metadata_type;\n 1156 |         if (has_metadata[metadata_type] == FALSE ||\n 1157 |             file_metadata->metadata[metadata_type] == NULL ||\n 1158 |             file_metadata->metadata[metadata_type]->len <= 0)\n 1159 |         {\n 1160 |             disable_action (dialog, tag_data->tag_constants.action_name);\n 1161 |             tag_data->available = FALSE;\n 1162 |         }"},{"ref":"src/nautilus-batch-rename-utilities.c:654-661","code":"  654 |     for (i = 0; i < G_N_ELEMENTS (metadata_tags_constants); i++)\n  655 |     {\n  656 |         if (!query_data->has_metadata[i])\n  657 |         {\n  658 |             continue;\n  659 |         }\n  660 | \n  661 |         metadata_type = metadata_tags_constants[i].metadata_type;"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_bookmark_list_remove() calls g_list_free_full(link_to_remove, g_object_unref) on a single link previously detached with g_list_remove_link (line 414). g_list_remove_link leaves link_to_remove->next/prev nulled so freeing the single node is correct, but stop_monitoring_bookmark() is called on bookmark BEFORE the unref while the bookmark is already removed from the list — fine. The subtle bug: g_list_free_full on a remove_link'd node frees the node and unrefs the data, but the node's ->next was set to NULL by remove_link, so only one element is freed — correct. No action if verified; flag is the non-obvious reliance on remove_link nulling pointers. Lower-confidence.","fix":"For clarity use g_object_unref(bookmark); g_list_free_1(link_to_remove); instead of g_list_free_full on a single link.","locations":[{"ref":"src/nautilus-bookmark-list.c:409-414","code":"  409 |     bookmarks->list = g_list_remove_link (bookmarks->list,\n  410 |                                           link_to_remove);\n  411 | \n  412 |     NautilusBookmark *bookmark = link_to_remove->data;\n  413 |     stop_monitoring_bookmark (bookmark, bookmarks);\n  414 |     g_list_free_full (link_to_remove, g_object_unref);"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In exists_query_info_ready_cb(), bookmark->cancellable is only cleared (g_clear_object) when info is non-NULL (file exists, line 359). When the query fails for a non-cancellation reason (info == NULL, error not CANCELLED), the cancellable is left set. nautilus_bookmark_update_exists() then early-returns forever because 'bookmark->cancellable != NULL', so the bookmark's existence is never re-queried.","fix":"Clear bookmark->cancellable in all non-cancelled completion paths (move g_clear_object(&bookmark->cancellable) before the 'if (info)' branch).","locations":[{"ref":"src/nautilus-bookmark.c:347-363","code":"  347 |     info = g_file_query_info_finish (G_FILE (source), res, &error);\n  348 |     if (!info && g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CANCELLED))\n  349 |     {\n  350 |         return;\n  351 |     }\n  352 | \n  353 |     bookmark = user_data;\n  354 | \n  355 |     if (info)\n  356 |     {\n  357 |         exists = TRUE;\n  358 | \n  359 |         g_clear_object (&bookmark->cancellable);\n  360 |     }\n  361 | \n  362 |     nautilus_bookmark_set_exists (bookmark, exists);\n  363 | }"},{"ref":"src/nautilus-bookmark.c:377-380","code":"  377 |     if (bookmark->cancellable != NULL)\n  378 |     {\n  379 |         return;\n  380 |     }"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"column_compare(): when index_a == index_b (both columns equally ranked in user column_order, including both == -1 meaning neither is listed) it falls into comparing default_column_order positions; but when index_a == index_b and both are valid equal indices the 'ret = index_a - index_b' at line 375 returns 0 for the pos_a/pos_b not-equal-and-not-(-1) case — wait, it returns index_a-index_b which is 0, not the intended default-order tiebreak. So two distinct columns sharing the same user-order index but different default-order positions compare as equal (ret 0) instead of being ordered by default position. The pos_a/pos_b ordering only applies in the -1 sub-cases; the final else uses index difference (always 0 here).","fix":"In the index_a==index_b block, the final else should return 'pos_a - pos_b' (default order tiebreak), not 'index_a - index_b' which is identically zero.","locations":[{"ref":"src/nautilus-column-utilities.c:346-377","code":"  346 |     if (index_a == index_b)\n  347 |     {\n  348 |         int pos_a;\n  349 |         int pos_b;\n  350 | \n  351 |         pos_a = strv_index ((char **) default_column_order, name_a);\n  352 |         pos_b = strv_index ((char **) default_column_order, name_b);\n  353 | \n  354 |         if (pos_a == pos_b)\n  355 |         {\n  356 |             char *label_a;\n  357 |             char *label_b;\n  358 | \n  359 |             g_object_get (G_OBJECT (a), \"label\", &label_a, NULL);\n  360 |             g_object_get (G_OBJECT (b), \"label\", &label_b, NULL);\n  361 |             ret = strcmp (label_a, label_b);\n  362 |             g_free (label_a);\n  363 |             g_free (label_b);\n  364 |         }\n  365 |         else if (pos_a == -1)\n  366 |         {\n  367 |             ret = 1;\n  368 |         }\n  369 |         else if (pos_b == -1)\n  370 |         {\n  371 |             ret = -1;\n  372 |         }\n  373 |         else\n  374 |         {\n  375 |             ret = index_a - index_b;\n  376 |         }\n  377 |     }"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In date_to_str(), the relative-month divisor is 30.4 and the relative-week branch upper bound is 31 days. For a timespan of e.g. 30 days the unit is WEEK with value 30/7 ~= 4.3 weeks, but for 31-364 days it is MONTH with value/30.4. A span of exactly 31 days yields 31/30.4 ~= 1.0 months while 30 days yields ~4 weeks, an abrupt and inconsistent jump (4 weeks then 1 month). The 30.4 average-month length also makes 365/30.4 reachable as ~12 months only just under the year cutoff, producing '12 months ago' edge cases right before the year boundary.","fix":"Use consistent thresholds aligned with the divisors (e.g. weeks up to 4, months computed so the boundary maps cleanly to '1 month'), or round relative_value and clamp boundary cases.","locations":[{"ref":"src/nautilus-date-utilities.c:268-286","code":"  268 |     if (relative_value < 7.0)\n  269 |     {\n  270 |         unit = UDAT_REL_UNIT_DAY;\n  271 |     }\n  272 |     else if (relative_value < 31)\n  273 |     {\n  274 |         unit = UDAT_REL_UNIT_WEEK;\n  275 |         relative_value /= 7.0;\n  276 |     }\n  277 |     else if (relative_value < 365)\n  278 |     {\n  279 |         unit = UDAT_REL_UNIT_MONTH;\n  280 |         relative_value /= 30.4;\n  281 |     }\n  282 |     else\n  283 |     {\n  284 |         unit = UDAT_REL_UNIT_YEAR;\n  285 |         relative_value /= 365.25;\n  286 |     }"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In nautilus_directory_notify_files_changed(), when a CHANGE event arrives for a location that has no existing NautilusFile yet, the code computes `parent = g_file_get_parent (location)` but then looks up the wrong directory with `lookup_existing (location)` instead of `lookup_existing (parent)`. The intent (per NautilusDirectoryPrivate comment) is to defer CHANGE events for files that arrive while their containing folder is still adding new files, so it must consult the parent folder's new_files_in_progress. Because `location` is a file (not a directory), the lookup almost always returns NULL and the files_changed_while_adding deferral mechanism never fires, reintroducing the race from Bug 703179 / issue #1576. Regression: commit dbaf97c9 changed the original `nautilus_directory_get_existing (parent)` to `lookup_existing (location)`; `parent` is now computed but unused.","fix":"Look up the parent directory: `NautilusDirectory *dir = lookup_existing (parent);`.","locations":[{"ref":"src/nautilus-directory.c:1115-1124","code":" 1115 |             g_autoptr (GFile) parent = g_file_get_parent (location);\n 1116 |             NautilusDirectory *dir = lookup_existing (location);\n 1117 | \n 1118 |             if (dir != NULL && dir->details->new_files_in_progress != NULL &&\n 1119 |                 files != dir->details->files_changed_while_adding)\n 1120 |             {\n 1121 |                 dir->details->files_changed_while_adding =\n 1122 |                     g_list_prepend (dir->details->files_changed_while_adding,\n 1123 |                                     g_object_ref (location));\n 1124 |             }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In report_trash_progress(), the files-per-second value is passed to a printf-family format with a wrong cast. The format string `files_per_second_message` is `\"(%d file/s)\"` (a `%d` integer conversion), but the argument supplied is `(int) transfer_rate + 0.5`, which parses as `((int) transfer_rate) + 0.5` — a `double`. Passing a double to a `%d` conversion is undefined behavior and prints garbage / wrong rate. Note the message string itself was correctly built with `(int) (transfer_rate + 0.5)` at line 1591, so only the g_strdup_printf argument at line 1599 is wrong. Compare the analogous report_delete_progress() which passes a plain int.","fix":"Change the argument to `(int) (transfer_rate + 0.5)` (matching line 1591), i.e. round first, then cast to int.","locations":[{"ref":"src/nautilus-file-operations.c:1595-1599","code":" 1595 |             details = g_strdup_printf (concat_detail,\n 1596 |                                        transfer_info->num_files + 1,\n 1597 |                                        source_info->num_files,\n 1598 |                                        formatted_time,\n 1599 |                                        (int) transfer_rate + 0.5);"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"trash_state_changed_cb clears the undo manager only when state == STATE_UNDO and info is a trash op. But after a trash op has been redone (or while in REDO state), a now-empty trash still references trashed files that no longer exist, yet the manager is not cleared. More importantly, the comment says 'A trash operation cannot be undone if the trash is empty', but the guard misses the case where the trash op is the current REDO action; the stale info can later be applied against an empty trash.","fix":"Re-evaluate whether the clear should also occur in REDO state for trash ops, or document why only the UNDO state is relevant.","locations":[{"ref":"src/nautilus-file-undo-manager.c:86-101","code":"   86 | static void\n   87 | trash_state_changed_cb (NautilusTrashMonitor *monitor,\n   88 |                         gboolean              is_empty,\n   89 |                         gpointer              user_data)\n   90 | {\n   91 |     NautilusFileUndoManager *self = user_data;\n   92 | \n   93 |     /* A trash operation cannot be undone if the trash is empty */\n   94 |     if (is_empty &&\n   95 |         self->state == NAUTILUS_FILE_UNDO_MANAGER_STATE_UNDO &&\n   96 |         NAUTILUS_IS_FILE_UNDO_INFO_TRASH (self->info))\n   97 |     {\n   98 |         file_undo_manager_clear (self);\n   99 |         g_signal_emit (self, signals[SIGNAL_UNDO_CHANGED], 0);\n  100 |     }\n  101 | }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"trash_strings_func computes the single-file branch using count != 1, but for count == 0 (empty trashed set) it takes the single-file branch and dereferences keys->data, where g_hash_table_get_keys() returns NULL, causing a NULL dereference. The plural branch is meant for any count other than exactly 1, but the single-item branch assumes at least one key exists.","fix":"Guard the single-item branch on count == 1 explicitly (e.g. handle count <= 1 by checking keys != NULL), or ensure the strings_func is never called with an empty trashed table.","locations":[{"ref":"src/nautilus-file-undo-operations.c:1605-1626","code":" 1605 |     gint count = g_hash_table_size (self->trashed);\n 1606 | \n 1607 |     if (count != 1)\n 1608 |     {\n 1609 |         *undo_description = g_strdup_printf (ngettext (\"Restore %d item from trash\",\n 1610 |                                                        \"Restore %d items from trash\", count),\n 1611 |                                              count);\n 1612 |         *redo_description = g_strdup_printf (ngettext (\"Move %d item to trash\",\n 1613 |                                                        \"Move %d items to trash\", count),\n 1614 |                                              count);\n 1615 |     }\n 1616 |     else\n 1617 |     {\n 1618 |         g_autoptr (GList) keys = g_hash_table_get_keys (self->trashed);\n 1619 |         GFile *file = keys->data;\n 1620 |         g_autofree char *basename = g_file_get_basename (file);\n 1621 |         const gchar *orig_path = g_file_peek_path (file);\n 1622 |         g_autofree char *parse_name = g_file_get_parse_name (file);\n 1623 | \n 1624 |         *undo_description = g_strdup_printf (_(\"Restore “%s” to “%s”\"), basename, orig_path);\n 1625 |         *redo_description = g_strdup_printf (_(\"Move “%s” to trash\"), parse_name);\n 1626 |     }"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Ownership undo/redo description strings are swapped between operation types. Under NAUTILUS_FILE_UNDO_OP_CHANGE_OWNER the strings say \"Restore group of\"/\"Set group of\"/\"Change Group\", while under NAUTILUS_FILE_UNDO_OP_CHANGE_GROUP they say \"Restore owner of\"/\"Set owner of\"/\"Change Owner\". The two branches have their wording transposed, so the menu/undo text always describes the opposite of the actual operation.","fix":"Swap the bodies of the two branches so CHANGE_OWNER uses the owner wording and CHANGE_GROUP uses the group wording.","locations":[{"ref":"src/nautilus-file-undo-operations.c:2184-2203","code":" 2184 |     if (op_type == NAUTILUS_FILE_UNDO_OP_CHANGE_OWNER)\n 2185 |     {\n 2186 |         *undo_description = g_strdup_printf (_(\"Restore group of “%s” to “%s”\"),\n 2187 |                                              name, self->original_ownership);\n 2188 |         *redo_description = g_strdup_printf (_(\"Set group of “%s” to “%s”\"),\n 2189 |                                              name, self->new_ownership);\n 2190 | \n 2191 |         *undo_label = g_strdup (_(\"_Undo Change Group\"));\n 2192 |         *redo_label = g_strdup (_(\"_Redo Change Group\"));\n 2193 |     }\n 2194 |     else if (op_type == NAUTILUS_FILE_UNDO_OP_CHANGE_GROUP)\n 2195 |     {\n 2196 |         *undo_description = g_strdup_printf (_(\"Restore owner of “%s” to “%s”\"),\n 2197 |                                              name, self->original_ownership);\n 2198 |         *redo_description = g_strdup_printf (_(\"Set owner of “%s” to “%s”\"),\n 2199 |                                              name, self->new_ownership);\n 2200 | \n 2201 |         *undo_label = g_strdup (_(\"_Undo Change Owner\"));\n 2202 |         *redo_label = g_strdup (_(\"_Redo Change Owner\"));\n 2203 |     }"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_get_max_child_name_length_for_location() gates on g_file_has_uri_scheme(location, \"file\") then uses g_file_peek_path(). For a 'file://' location peek_path returns the path; fine. But pathconf() is called on a path that may not exist yet (e.g. a directory about to be created), in which case pathconf returns -1 with errno set, and the code interprets -1 as 'unknown' and may fall through to returning name_max from a nonexistent path's filesystem. More importantly, errno from pathconf is not distinguished from the documented 'no limit' (-1 with errno unchanged) case, so a real error and 'unlimited' are conflated.","fix":"Clear errno before pathconf and distinguish errno != 0 (error) from the -1/no-limit case per POSIX.","locations":[{"ref":"src/nautilus-file-utilities.c:1008-1056","code":" 1008 | glong\n 1009 | nautilus_get_max_child_name_length_for_location (GFile *location)\n 1010 | {\n 1011 |     glong name_max;\n 1012 |     glong path_max;\n 1013 |     glong max_child_name_length;\n 1014 | \n 1015 |     g_return_val_if_fail (G_IS_FILE (location), -1);\n 1016 | \n 1017 |     if (!g_file_has_uri_scheme (location, \"file\"))\n 1018 |     {\n 1019 |         /* FIXME: Can we query length limits for non-\"file://\" locations? */\n 1020 |         return -1;\n 1021 |     }\n 1022 | \n 1023 |     const gchar *path = g_file_peek_path (location);\n 1024 | \n 1025 |     g_return_val_if_fail (path != NULL, -1);\n 1026 | \n 1027 |     name_max = pathconf (path, _PC_NAME_MAX);\n 1028 |     path_max = pathconf (path, _PC_PATH_MAX);\n 1029 |     max_child_name_length = -1;\n 1030 | \n 1031 |     if (name_max == -1)\n 1032 |     {\n 1033 |         if (path_max != -1)\n 1034 |         {\n 1035 |             /* We don't know the name max, but we know the name can't make the\n 1036 |              * path longer than this.\n 1037 |              * Subtracting 1 because PATH_MAX includes the terminating null\n 1038 |              * character, as per limits.h(0P). */\n 1039 |             max_child_name_length = MAX ((path_max - 1) - strlen (path), 0);\n 1040 |         }\n 1041 |     }\n 1042 |     else\n 1043 |     {\n 1044 |         /* No need to subtract 1, because NAME_MAX excludes the terminating null\n 1045 |          * character, as per limits.h(0P) */\n 1046 |         max_child_name_length = name_max;\n 1047 |         if (path_max != -1)\n 1048 |         {\n 1049 |             max_child_name_length = CLAMP ((path_max - 1) - (glong) strlen (path),\n 1050 |                                            0,\n 1051 |                                            max_child_name_length);\n 1052 |         }\n 1053 |     }\n 1054 | \n 1055 |     return max_child_name_length;\n 1056 | }"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_file_is_public_share_folder's second check has an inverted condition. The comment states ~/Public should be treated as the public share folder when XDG_PUBLICSHARE_DIR is set to the home folder (i.e. when the two paths are equal, where g_strcmp0 returns 0). But the guard `if (g_strcmp0 (home, publicshare))` is true precisely when they DIFFER, so the special-case logic runs in the wrong scenario and is skipped in the one the comment describes.","fix":"Invert the test: `if (g_strcmp0 (g_get_home_dir (), g_get_user_special_dir (G_USER_DIRECTORY_PUBLIC_SHARE)) == 0)`.","locations":[{"ref":"src/nautilus-file.c:7275-7284","code":" 7275 |     if (g_strcmp0 (g_get_home_dir (), g_get_user_special_dir (G_USER_DIRECTORY_PUBLIC_SHARE)))\n 7276 |     {\n 7277 |         /* In order to match the behavior of gnome-user-share the ~/Public folder\n 7278 |          * is considered to be the public sharing folder when XDG_PUBLICSHARE_DIR\n 7279 |          * is set to the home folder. */\n 7280 |         g_autoptr (GFile) public_folder = g_file_new_build_filename (g_get_home_dir (), \"Public\", NULL);\n 7281 |         g_autoptr (GFile) location = nautilus_file_get_location (file);\n 7282 | \n 7283 |         return g_file_equal (public_folder, location);\n 7284 |     }"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"parse_previous_copy_name() detects the untranslated first-copy appendix with strncmp(appendix, \"Copy\", appendix_len), passing the *appendix* length as the comparison length instead of the length of the \"Copy\" literal. When appendix_len is shorter than \"Copy\", this matches a prefix. E.g. a file named \"foo (Co).txt\" has appendix \"Co\" (appendix_len 2); strncmp(\"Co\", \"Copy\", 2) == 0, so it is wrongly treated as the first copy of \"foo\", and the base is truncated to \"foo\". Any 1-3 char bracketed token that is a prefix of the localized \"Copy\" word is misparsed.","fix":"Require the appendix to equal the full literal: compare with strlen(COPY_APPENDIX_FIRST_COPY) and also require appendix_len == strlen(COPY_APPENDIX_FIRST_COPY), mirroring the appendix_check==appendix_len verification already done for the n-th copy case.","locations":[{"ref":"src/nautilus-filename-utilities.c:174-178","code":"  174 |     if (strncmp (appendix, COPY_APPENDIX_FIRST_COPY, appendix_len) == 0)\n  175 |     {\n  176 |         /* File is a (first) copy */\n  177 |         *count = 1;\n  178 |         return TRUE;"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"real_floating_bar_set_short_status() returns early when self->loading is TRUE without ever consuming/queueing the status, but set_floating_bar_status() always allocates a FloatingBarSetStatusData and schedules a timeout. The deferred callback runs ~half a double-click-time later and discards the status if loading is (still) TRUE. Not a leak (data is freed by the GDestroyNotify), but the passthrough timeout and the status timeout are scheduled unconditionally even while loading, which is wasted work on every status update during a load.","fix":"Skip scheduling (or short-circuit) in set_floating_bar_status()/display_selection_info when self->loading is TRUE, mirroring the guard already present in real_floating_bar_set_short_status().","locations":[{"ref":"src/nautilus-files-view.c:411-436","code":"  411 | static void\n  412 | real_floating_bar_set_short_status (NautilusFilesView *self,\n  413 |                                     const gchar       *primary_status,\n  414 |                                     const gchar       *detail_status)\n  415 | {\n  416 |     if (self->loading)\n  417 |     {\n  418 |         return;\n  419 |     }\n  420 | \n  421 |     nautilus_floating_bar_set_show_stop (NAUTILUS_FLOATING_BAR (self->floating_bar),\n  422 |                                          FALSE);\n  423 | \n  424 |     if (primary_status == NULL && detail_status == NULL)\n  425 |     {\n  426 |         gtk_widget_set_visible (self->floating_bar, FALSE);\n  427 |         nautilus_floating_bar_remove_hover_timeout (NAUTILUS_FLOATING_BAR (self->floating_bar));\n  428 |         return;\n  429 |     }\n  430 | \n  431 |     nautilus_floating_bar_set_labels (NAUTILUS_FLOATING_BAR (self->floating_bar),\n  432 |                                       primary_status,\n  433 |                                       detail_status);\n  434 | \n  435 |     gtk_widget_set_visible (self->floating_bar, TRUE);\n  436 | }"},{"ref":"src/nautilus-files-view.c:480-527","code":"  480 | static void\n  481 | set_floating_bar_status (NautilusFilesView *self,\n  482 |                          const gchar       *primary_status,\n  483 |                          const gchar       *detail_status)\n  484 | {\n  485 |     GtkSettings *settings;\n  486 |     gint double_click_time;\n  487 |     FloatingBarSetStatusData *status_data;\n  488 | \n  489 |     if (self->floating_bar_set_status_timeout_id != 0)\n  490 |     {\n  491 |         g_source_remove (self->floating_bar_set_status_timeout_id);\n  492 |         self->floating_bar_set_status_timeout_id = 0;\n  493 |     }\n  494 | \n  495 |     settings = gtk_settings_get_for_display (gtk_widget_get_display (GTK_WIDGET (self)));\n  496 |     g_object_get (settings,\n  497 |                   \"gtk-double-click-time\", &double_click_time,\n  498 |                   NULL);\n  499 | \n  500 |     status_data = g_slice_new0 (FloatingBarSetStatusData);\n  501 |     status_data->primary_status = g_strdup (primary_status);\n  502 |     status_data->detail_status = g_strdup (detail_status);\n  503 |     status_data->view = self;\n  504 | \n  505 |     if (self->floating_bar_set_passthrough_timeout_id != 0)\n  506 |     {\n  507 |         g_source_remove (self->floating_bar_set_passthrough_timeout_id);\n  508 |         self->floating_bar_set_passthrough_timeout_id = 0;\n  509 |     }\n  510 |     /* Activate passthrough on the floating bar just long enough for a\n  511 |      * potential double click to happen, so to not interfere with it */\n  512 |     gtk_widget_set_can_target (self->floating_bar, FALSE);\n  513 |     self->floating_bar_set_passthrough_timeout_id = g_timeout_add ((guint) double_click_time,\n  514 |                                                                    remove_floating_bar_passthrough,\n  515 |                                                                    self);\n  516 | \n  517 |     /* waiting for half of the double-click-time before setting\n  518 |      * the status seems to be a good approximation of not setting it\n  519 |      * too often and not delaying the statusbar too much.\n  520 |      */\n  521 |     self->floating_bar_set_status_timeout_id =\n  522 |         g_timeout_add_full (G_PRIORITY_DEFAULT,\n  523 |                             (guint) (double_click_time / 2),\n  524 |                             floating_bar_set_status_timeout_cb,\n  525 |                             status_data,\n  526 |                             floating_bar_set_status_data_free);\n  527 | }"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"completer_data_new(): when a URI scheme is present but there is no separator (uri_scheme != NULL && last_separator == NULL), none of the branches assign data->location, leaving it NULL. completer_get_completions_thread() then calls g_file_enumerate_children(NULL, ...) which will fail/crash. Typing e.g. \"sftp:\" (scheme, no slash) reaches this state.","fix":"Add a fallback that assigns data->location (e.g. to the passed-in location or by parsing the scheme root) when uri_scheme != NULL but typed_path is NULL, and/or have the thread bail out gracefully when data->location is NULL.","locations":[{"ref":"src/nautilus-location-entry.c:292-337","code":"  292 | static CompleterData *\n  293 | completer_data_new (const char *typed,\n  294 |                     GFile      *location)\n  295 | {\n  296 |     CompleterData *data = g_new0 (CompleterData, 1);\n  297 |     const char *last_separator = strrchr (typed, G_DIR_SEPARATOR);\n  298 |     const char *post_separator = (last_separator != NULL) ? last_separator + 1 : typed;\n  299 |     g_autofree gchar *uri_scheme = g_uri_parse_scheme (typed);\n  300 | \n  301 |     if (last_separator != NULL)\n  302 |     {\n  303 |         data->typed_path = g_strndup (typed, post_separator - typed);\n  304 |     }\n  305 |     data->prefix = g_utf8_casefold (post_separator, -1);\n  306 | \n  307 |     if (uri_scheme != NULL && last_separator != NULL)\n  308 |     {\n  309 |         /* Parse scheme with GFile */\n  310 |         data->location = g_file_parse_name (data->typed_path);\n  311 |     }\n  312 |     else if (data->typed_path == NULL)\n  313 |     {\n  314 |         data->location = g_object_ref (location);\n  315 |     }\n  316 |     else if (typed[0] == '~' && typed[1] == '/')\n  317 |     {\n  318 |         /* \"~/\" is not handled by g_file_resolve_relative_path */\n  319 | \n  320 |         if (typed + 1 == last_separator)\n  321 |         {\n  322 |             data->location = g_file_new_for_path (g_get_home_dir ());\n  323 |         }\n  324 |         else\n  325 |         {\n  326 |             const char *subdir_path = typed + 2;\n  327 |             g_autofree char *concat_path = g_strndup (subdir_path, post_separator - subdir_path);\n  328 | \n  329 |             data->location = g_file_new_build_filename (g_get_home_dir (), concat_path, NULL);\n  330 |         }\n  331 |     }\n  332 |     else\n  333 |     {\n  334 |         data->location = g_file_resolve_relative_path (location, data->typed_path);\n  335 |     }\n  336 | \n  337 |     return data;"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_path_bar_set_path() calls update_path() then sets current_path AFTER, but button_data_file_changed() (which can be triggered re-entrantly during make_button_data via file monitor/changed) asserts self->current_path != NULL and self->current_button_data != NULL. During the very first set_path or during update_path's rebuild, current_button_data still points at a freed ButtonData (clear_buttons frees old button_data before the list is rebuilt), so a 'changed' signal arriving mid-rebuild dereferences a dangling current_button_data.","fix":"Clear self->current_button_data (and ideally current_path) before nautilus_path_bar_clear_buttons() frees the old ButtonData, and set them only after the new button list is built, to avoid a dangling pointer window.","locations":[{"ref":"src/nautilus-pathbar.c:1405-1419","code":" 1405 | void\n 1406 | nautilus_path_bar_set_path (NautilusPathBar *self,\n 1407 |                             GFile           *file_path)\n 1408 | {\n 1409 |     ButtonData *button_data;\n 1410 | \n 1411 |     g_return_if_fail (NAUTILUS_IS_PATH_BAR (self));\n 1412 |     g_return_if_fail (file_path != NULL);\n 1413 | \n 1414 |     nautilus_path_bar_update_path (self, file_path);\n 1415 |     button_data = g_list_nth_data (self->button_list, 0);\n 1416 | \n 1417 |     g_set_object (&self->current_path, file_path);\n 1418 |     self->current_button_data = button_data;\n 1419 | }"},{"ref":"src/nautilus-pathbar.c:1122-1125","code":" 1122 |     g_return_if_fail (self->current_path != NULL);\n 1123 |     g_return_if_fail (self->current_button_data != NULL);\n 1124 | \n 1125 |     current_button_data = self->current_button_data;"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"permission_value_to_string() returns the literal \"---\" for the PERMISSION_INCONSISTENT case. Every real caller either g_strdup()s the result (list_store_append_nautilus_permission_entry) or passes it to gtk_label_set_text (update_permissions_navigation_row), so the mixing of a non-translated, non-allocated string literal with _()-wrapped translatable returns is fragile and produces a non-localized, visually odd \"---\" label for indeterminate multi-file permissions. The other branches return translated strings; this one is neither translated nor a meaningful word.","fix":"Return a translated placeholder such as _(\"—\") / _(\"Indeterminate\") for the inconsistent case, consistent with the other branches.","locations":[{"ref":"src/nautilus-properties.c:345-352","code":"  345 | static gchar *\n  346 | permission_value_to_string (PermissionValue permission_value,\n  347 |                             gboolean        describes_folder)\n  348 | {\n  349 |     if (permission_value & PERMISSION_INCONSISTENT)\n  350 |     {\n  351 |         return \"---\";\n  352 |     }"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"update_owner_row() never calls gtk_widget_set_sensitive() on the owner row, unlike update_group_row() which sets sensitivity from provide_dropdown. update_owner_row uses `had_dropdown = gtk_widget_is_sensitive(row)` to decide whether to connect the changed signal, but since nothing ever toggles the owner row's sensitivity, had_dropdown is effectively always the initial (sensitive) state, so the `if (!had_dropdown)` guard for connecting changed_owner_callback is unreliable. The group row sets sensitivity (line 1909) so its had_dropdown logic works; the owner row path is inconsistent and can connect/avoid connecting the handler incorrectly.","fix":"Mirror update_group_row(): call gtk_widget_set_sensitive(GTK_WIDGET(row), provide_dropdown) before branching, so had_dropdown reflects the previous provide_dropdown state.","locations":[{"ref":"src/nautilus-properties.c:1855-1897","code":" 1855 | update_owner_row (AdwComboRow     *row,\n 1856 |                   PermissionsInfo *permissions_info)\n 1857 | {\n 1858 |     NautilusPropertiesWidget *self = permissions_info->widget;\n 1859 |     gboolean provide_dropdown = (!permissions_info->is_multi_file_window\n 1860 |                                  && nautilus_file_can_set_owner (get_file (self)));\n 1861 |     gboolean had_dropdown = gtk_widget_is_sensitive (GTK_WIDGET (row));\n 1862 | \n 1863 |     /* check if should provide dropdown */\n 1864 |     if (provide_dropdown)\n 1865 |     {\n 1866 |         NautilusFile *file = get_file (self);\n 1867 |         g_autofree char *owner_name = nautilus_file_get_owner_name (file);\n 1868 |         GList *users = nautilus_get_user_names ();\n 1869 | \n 1870 |         update_combo_row_dropdown (row, users);\n 1871 |         g_list_free_full (users, g_free);\n 1872 | \n 1873 |         /* display current owner */\n 1874 |         select_ownership_row_entry (row, owner_name, string_list_item_starts_with_word);\n 1875 | \n 1876 |         if (!had_dropdown)\n 1877 |         {\n 1878 |             /* Update file when selection changes. */\n 1879 |             g_signal_connect (row, \"notify::selected\",\n 1880 |                               G_CALLBACK (changed_owner_callback),\n 1881 |                               self);\n 1882 |         }\n 1883 |     }\n 1884 |     else\n 1885 |     {\n 1886 |         g_autofree char *owner_name = file_list_get_string_attribute (self->files,\n 1887 |                                                                       \"owner\");\n 1888 |         if (owner_name == NULL)\n 1889 |         {\n 1890 |             owner_name = g_strdup (_(\"Multiple\"));\n 1891 |         }\n 1892 | \n 1893 |         g_signal_handlers_disconnect_by_func (row, G_CALLBACK (changed_owner_callback), self);\n 1894 | \n 1895 |         ownership_row_set_single_entry (row, owner_name, string_list_item_starts_with_word);\n 1896 |     }\n 1897 | }"},{"ref":"src/nautilus-properties.c:1901-1909","code":" 1901 | update_group_row (AdwComboRow     *row,\n 1902 |                   PermissionsInfo *permissions_info)\n 1903 | {\n 1904 |     NautilusPropertiesWidget *self = permissions_info->widget;\n 1905 |     gboolean provide_dropdown = (!permissions_info->is_multi_file_window\n 1906 |                                  && nautilus_file_can_set_group (get_file (self)));\n 1907 |     gboolean had_dropdown = gtk_widget_is_sensitive (GTK_WIDGET (row));\n 1908 | \n 1909 |     gtk_widget_set_sensitive (GTK_WIDGET (row), provide_dropdown);"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_query_copy() shares query->prepared_words by ref (g_set_ptr_array) and copies text via nautilus_query_get_text (a fresh g_strdup). The prepared_words array is built only in nautilus_query_set_text(). Because the engine receives a copy made in nautilus_search_engine_start(), and nautilus_query_matches_string() iterates copy->prepared_words while reading copy->text only for the NULL check, the copy is internally consistent. However prepared_words is shared (not deep-copied) between the original and the copy; if the original query's text is later changed on the main thread while a worker thread (simple/recent engine) iterates the shared GString elements of prepared_words, the GStrings can be freed underneath the worker (set_text replaces the array via g_set_ptr_array, dropping the old array's ref). This is a cross-thread use-after-free of the prepared word strings.","fix":"Deep-copy prepared_words (and text) in nautilus_query_copy() so the engine's private copy is fully independent of later mutations to the original query, or document/enforce that a query is immutable once handed to an engine.","locations":[{"ref":"src/nautilus-query.c:186-202","code":"  186 | NautilusQuery *\n  187 | nautilus_query_copy (NautilusQuery *query)\n  188 | {\n  189 |     NautilusQuery *copy = g_object_new (NAUTILUS_TYPE_QUERY, NULL);\n  190 | \n  191 |     copy->text = nautilus_query_get_text (query);\n  192 |     copy->location = nautilus_query_get_location (query);\n  193 |     g_set_ptr_array (&copy->mime_types, query->mime_types);\n  194 |     copy->show_hidden = query->show_hidden;\n  195 |     copy->date_range = nautilus_query_get_date_range (query);\n  196 |     copy->recursion_tradeoff = query->recursion_tradeoff;\n  197 |     copy->search_type = query->search_type;\n  198 |     copy->search_content = query->search_content;\n  199 |     g_set_ptr_array (&copy->prepared_words, query->prepared_words);\n  200 | \n  201 |     return copy;\n  202 | }"},{"ref":"src/nautilus-query.c:212-247","code":"  212 | gboolean\n  213 | nautilus_query_set_text (NautilusQuery *query,\n  214 |                          const char    *text)\n  215 | {\n  216 |     g_return_val_if_fail (NAUTILUS_IS_QUERY (query), FALSE);\n  217 | \n  218 |     /* This is the only place that sets a query text.\n  219 |      * Treat empty strings as setting NULL. */\n  220 |     g_autofree gchar *stripped_text = g_strstrip (g_strdup (text));\n  221 |     const char *settable_text = (stripped_text == NULL || stripped_text[0] == '\\0')\n  222 |                                 ? NULL : stripped_text;\n  223 | \n  224 |     if (!g_set_str (&query->text, settable_text))\n  225 |     {\n  226 |         return FALSE;\n  227 |     }\n  228 | \n  229 |     g_autoptr (GPtrArray) prepared_words = NULL;\n  230 |     if (query->text != NULL)\n  231 |     {\n  232 |         g_autofree gchar *prepared_query = prepare_string_for_compare (query->text);\n  233 |         g_auto (GStrv) split_query = g_strsplit (prepared_query, \" \", -1);\n  234 |         guint split_num = g_strv_length (split_query);\n  235 | \n  236 |         prepared_words = g_ptr_array_new_full (split_num, (GDestroyNotify) prepared_word_free);\n  237 |         for (guint i = 0; i < split_num; i += 1)\n  238 |         {\n  239 |             GString *word = g_string_new (split_query[i]);\n  240 |             g_ptr_array_add (prepared_words, word);\n  241 |         }\n  242 |     }\n  243 | \n  244 |     g_set_ptr_array (&query->prepared_words, prepared_words);\n  245 | \n  246 |     return TRUE;\n  247 | }"},{"ref":"src/nautilus-search-engine.c:102-126","code":"  102 | void\n  103 | nautilus_search_engine_start (NautilusSearchEngine *self,\n  104 |                               NautilusQuery        *query)\n  105 | {\n  106 |     g_return_if_fail (query != NULL);\n  107 | \n  108 |     g_autoptr (NautilusQuery) query_to_copy = g_object_ref (query);\n  109 | \n  110 |     g_clear_object (&self->query);\n  111 |     self->query = nautilus_query_copy (query_to_copy);\n  112 | \n  113 |     if (self->running)\n  114 |     {\n  115 |         self->restart = TRUE;\n  116 |         return;\n  117 |     }\n  118 | \n  119 |     /* Keep reference on self while running */\n  120 |     g_object_ref (self);\n  121 |     self->running = TRUE;\n  122 |     g_object_notify (G_OBJECT (self), \"running\");\n  123 | \n  124 |     g_debug (\"Search engine start\");\n  125 |     search_engine_start_real (self);\n  126 | }"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"nautilus_search_hit_compute_scores() skips the recency bonus when query_location != NULL and dir_count == 0 (a direct child of the search root). The comment says recency is 'unwanted for results from the current folder, which should always sort by filename match'. But dir_count is also 0 when g_file_get_relative_path() returns NULL (e.g. the hit is not under query_location at all, which can happen for recent/global results), causing those hits to silently lose any recency-based ranking. The relative_path NULL case is conflated with the 'top-level child' case.","fix":"Distinguish 'relative_path == NULL' (not under query_location) from 'dir_count == 0' (direct child). Only suppress the recency bonus for genuine direct children, e.g. track a separate boolean for whether a valid relative path was computed.","locations":[{"ref":"src/nautilus-search-hit.c:70-92","code":"   70 |     if (query_location != NULL)\n   71 |     {\n   72 |         g_autoptr (GFile) hit_location = g_file_new_for_uri (hit->uri);\n   73 |         g_autofree gchar *relative_path = g_file_get_relative_path (query_location, hit_location);\n   74 | \n   75 |         for (gchar *c = relative_path; c != NULL && *c != '\\0'; c++)\n   76 |         {\n   77 |             if (*c == G_DIR_SEPARATOR)\n   78 |             {\n   79 |                 dir_count++;\n   80 |             }\n   81 |         }\n   82 | \n   83 |         if (dir_count < 10)\n   84 |         {\n   85 |             proximity_bonus = 10000.0 - 1000.0 * dir_count;\n   86 |         }\n   87 |     }\n   88 | \n   89 |     /* Recency bonus is useful for recursive search, but unwanted for results\n   90 |      * from the current folder, which should always sort by filename match,\n   91 |      * which makes prefix matches sort
