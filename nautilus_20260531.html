<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"update_info_internal reads icon = g_file_info_get_icon(info), which may legitimately return NULL. When the new icon is NULL but the cached file->details->icon is non-NULL, g_icon_equal returns FALSE and the code executes file->details->icon = g_object_ref(icon) with icon == NULL, triggering a g_object_ref(NULL) critical and storing garbage/NULL inconsistently.","fix":"Guard the ref: `file->details->icon = (icon != NULL) ? g_object_ref (icon) : NULL;` (or use g_set_object).","locations":[{"ref":"src/nautilus-file.c:2787-2797","code":" 2787 |     icon = g_file_info_get_icon (info);\n 2788 |     if (!g_icon_equal (icon, file->details->icon))\n 2789 |     {\n 2790 |         changed = TRUE;\n 2791 | \n 2792 |         if (file->details->icon)\n 2793 |         {\n 2794 |             g_object_unref (file->details->icon);\n 2795 |         }\n 2796 |         file->details->icon = g_object_ref (icon);\n 2797 |     }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"nautilus_add_recent_server() does not check the result of g_file_query_info(). If the query fails (offline server, permission, etc.) info is NULL and error is set, but the code immediately calls g_file_info_get_attribute_as_string(info, ...), dereferencing NULL. The error variable is declared but never checked and leaks.","fix":"Check info/error after g_file_query_info(); if info is NULL, skip the title query (use a fallback title or NULL) and clear the error. Free the error in all paths.","locations":[{"ref":"src/nautilus-recent-servers.c:144-160","code":"  144 |     info = g_file_query_info (file,\n  145 |                               G_FILE_ATTRIBUTE_STANDARD_DISPLAY_NAME,\n  146 |                               G_FILE_QUERY_INFO_NONE,\n  147 |                               NULL,\n  148 |                               &error);\n  149 |     title = g_file_info_get_attribute_as_string (info, G_FILE_ATTRIBUTE_STANDARD_DISPLAY_NAME);\n  150 | \n  151 |     g_bookmark_file_set_title (bookmarks, uri, title);\n  152 |     now = g_date_time_new_now_utc ();\n  153 |     g_bookmark_file_set_visited_date_time (bookmarks, uri, now);\n  154 |     g_date_time_unref (now);\n  155 |     g_bookmark_file_add_application (bookmarks, uri, NULL, NULL);\n  156 | \n  157 |     server_list_save (bookmarks);\n  158 | \n  159 |     g_bookmark_file_free (bookmarks);\n  160 |     g_clear_object (&info);"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"nautilus_window_back_or_forward_in_new_tab() dereferences the navigation state without any NULL/empty checks. nautilus_window_slot_get_navigation_state() returns NULL when the active slot has no location (self->location == NULL), and `state` is then dereferenced unconditionally (state->forward_list etc.), causing a NULL pointer dereference. Additionally, even with a valid state, the BACK branch does `state->current_location_bookmark = state->back_list->data` and `state->back_list = state->back_list->next` (and the FORWARD branch the same with forward_list) without checking that the list is non-empty, so an empty history dereferences a NULL GList. The caller is a middle-click handler on the back/forward buttons (nautilus-history-controls.c:139); although the buttons are normally disabled when there is no history, the gesture can still be triggered (e.g. via the button while history is empty), so this is reachable.","fix":"Return early if `state == NULL`. In the BACK case, only proceed if state->back_list != NULL; in the FORWARD case, only if state->forward_list != NULL (otherwise free_navigation_state(state) and return).","locations":[{"ref":"src/nautilus-window.c:1466-1510","code":" 1466 | void\n 1467 | nautilus_window_back_or_forward_in_new_tab (NautilusWindow              *window,\n 1468 |                                             NautilusNavigationDirection  direction)\n 1469 | {\n 1470 |     NautilusNavigationState *state;\n 1471 | \n 1472 |     state = nautilus_window_slot_get_navigation_state (window->active_slot);\n 1473 | \n 1474 |     /* Manually fix up the back / forward lists and location.\n 1475 |      * This way we don't have to unnecessary load the current location\n 1476 |      * and then load back / forward */\n 1477 |     switch (direction)\n 1478 |     {\n 1479 |         case NAUTILUS_NAVIGATION_DIRECTION_BACK:\n 1480 |         {\n 1481 |             state->forward_list = g_list_prepend (state->forward_list, state->current_location_bookmark);\n 1482 |             state->current_location_bookmark = state->back_list->data;\n 1483 |             state->back_list = state->back_list->next;\n 1484 |             g_clear_object (&state->current_search_query);\n 1485 |         }\n 1486 |         break;\n 1487 | \n 1488 |         case NAUTILUS_NAVIGATION_DIRECTION_FORWARD:\n 1489 |         {\n 1490 |             state->back_list = g_list_prepend (state->back_list, state->current_location_bookmark);\n 1491 |             state->current_location_bookmark = state->forward_list->data;\n 1492 |             state->forward_list = state->forward_list->next;\n 1493 |             g_clear_object (&state->current_search_query);\n 1494 |         }\n 1495 |         break;\n 1496 | \n 1497 |         default:\n 1498 |         {\n 1499 |             g_assert_not_reached ();\n 1500 |         }\n 1501 |     }\n 1502 | \n 1503 |     NautilusWindowSlot *new_slot = nautilus_window_create_and_init_slot (window);\n 1504 | \n 1505 |     GFile *location = nautilus_bookmark_get_location (state->current_location_bookmark);\n 1506 |     nautilus_window_slot_open_location_full (new_slot, location, NULL);\n 1507 |     nautilus_window_slot_restore_navigation_state (new_slot, state);\n 1508 | \n 1509 |     free_navigation_state (state);\n 1510 | }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"content_bar_response_cb dereferences default_app obtained from g_app_info_get_default_for_type(), which can return NULL (no default app for that content type). In the button-building loop the corresponding apps array entry can also be NULL, and g_app_info_equal()/g_app_info_get_icon()/g_app_info_get_name() are called on it without NULL checks. A content type with a registered button but no resolvable default app would crash.","fix":"Skip content types whose default_app is NULL when building buttons (don't add them to types/apps), and guard content_bar_response_cb against a NULL default_app before dereferencing.","locations":[{"ref":"src/nautilus-x-content-bar.c:77-83","code":"   77 |     default_app = g_app_info_get_default_for_type (bar->x_content_types[response_id], FALSE);\n   78 |     if (default_app != NULL)\n   79 |     {\n   80 |         nautilus_launch_application_for_mount (default_app, bar->mount,\n   81 |                                                GTK_WINDOW (gtk_widget_get_root (GTK_WIDGET (bar))));\n   82 |         g_object_unref (default_app);\n   83 |     }"},{"ref":"src/nautilus-x-content-bar.c:161-189","code":"  161 |         default_app = g_ptr_array_index (apps, n);\n  162 |         has_app = FALSE;\n  163 | \n  164 |         for (i = 0; i < n; i++)\n  165 |         {\n  166 |             app = g_ptr_array_index (apps, i);\n  167 |             if (g_app_info_equal (app, default_app))\n  168 |             {\n  169 |                 has_app = TRUE;\n  170 |                 break;\n  171 |             }\n  172 |         }\n  173 | \n  174 |         if (has_app)\n  175 |         {\n  176 |             continue;\n  177 |         }\n  178 | \n  179 |         icon = g_app_info_get_icon (default_app);\n  180 |         if (icon != NULL)\n  181 |         {\n  182 |             image = gtk_image_new_from_gicon (icon);\n  183 |         }\n  184 |         else\n  185 |         {\n  186 |             image = NULL;\n  187 |         }\n  188 | \n  189 |         name = g_app_info_get_name (default_app);"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"extract_job_on_scanned() calls g_file_query_filesystem_info() and then unconditionally dereferences the result: `free_size = g_file_info_get_attribute_uint64 (fsinfo, ...)`. g_file_query_filesystem_info() can return NULL (e.g. backend doesn't support FILESYSTEM_FREE, transient error, or cancellation), and the code passes NULL error so it cannot tell. Passing a NULL GFileInfo to g_file_info_get_attribute_uint64() will crash. The fsinfo pointer is g_autoptr so the only guard missing is a NULL check.","fix":"After querying, check `if (fsinfo == NULL) return;` before reading attributes (or skip the free-space check when fsinfo/the attribute is unavailable, as verify_destination() already does for the copy path).","locations":[{"ref":"src/nautilus-file-operations.c:7765-7776","code":" 7765 |     fsinfo = g_file_query_filesystem_info (output_file,\n 7766 |                                            G_FILE_ATTRIBUTE_FILESYSTEM_FREE \",\"\n 7767 |                                            G_FILE_ATTRIBUTE_FILESYSTEM_READONLY,\n 7768 |                                            extract_job->common.cancellable,\n 7769 |                                            NULL);\n 7770 |     free_size = g_file_info_get_attribute_uint64 (fsinfo,\n 7771 |                                                   G_FILE_ATTRIBUTE_FILESYSTEM_FREE);\n 7772 | \n 7773 |     /* FIXME: G_MAXUINT64 is the value used by autoar when the file size cannot\n 7774 |      * be determined. Ideally an API should be used instead.\n 7775 |      */\n 7776 |     if (total_size != G_MAXUINT64 && total_size > free_size)"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"nautilus_files_view_drop_proxy_received_uris() unconditionally calls g_file_new_for_uri(target_uri) at the top, before the 'if (target_uri == NULL)' fallback that computes container_uri. If target_uri is NULL (documented as possible: backing-uri fallback exists), g_file_new_for_uri(NULL) triggers a g_return/assert and the computed container_uri is never used for the location check. The two code paths are inconsistent.","fix":"Compute container_uri first, then build target_location from (target_uri != NULL ? target_uri : container_uri); guard the g_file_new_for_uri call against NULL.","locations":[{"ref":"src/nautilus-files-view-dnd.c:161-169","code":"  161 |     g_autofree char *container_uri = NULL;\n  162 |     g_autoptr (GFile) source_location = g_file_new_for_uri (source_uri_list->data);\n  163 |     g_autoptr (GFile) target_location = g_file_new_for_uri (target_uri);\n  164 | \n  165 |     if (target_uri == NULL)\n  166 |     {\n  167 |         container_uri = nautilus_files_view_get_backing_uri (view);\n  168 |         g_assert (container_uri != NULL);\n  169 |     }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"nautilus_sidebar_get_location() reads \"uri\" from the selected row and calls g_file_new_for_uri(uri) without a NULL check. Unmounted volume / drive rows are inserted with uri == NULL (see add_place calls passing NULL for uri) and are selectable, so a selected row can have uri == NULL, making g_file_new_for_uri(NULL) crash.","fix":"Guard with `if (uri != NULL)` before calling g_file_new_for_uri(), leaving file as NULL otherwise.","locations":[{"ref":"src/nautilus-sidebar.c:4209-4216","code":" 4209 |     if (selected)\n 4210 |     {\n 4211 |         char *uri;\n 4212 | \n 4213 |         g_object_get (selected, \"uri\", &uri, NULL);\n 4214 |         file = g_file_new_for_uri (uri);\n 4215 |         g_free (uri);\n 4216 |     }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"select_nth_conflict() does l = g_list_nth(dialog->duplicates, nth_conflict); conflict_data = l->data; with no NULL check on l. dialog->selected_conflict is bounded by the navigation handlers, but if update_listbox()/select_nth_conflict() were ever entered with selected_conflict out of range relative to the current duplicates list (e.g. duplicates rebuilt asynchronously between navigation and selection), g_list_nth() returns NULL and l->data dereferences NULL.","fix":"Guard against l == NULL (return early) before dereferencing conflict_data, or clamp selected_conflict to [0, conflicts_number-1].","locations":[{"ref":"src/nautilus-batch-rename-dialog.c:495-497","code":"  495 |     nth_conflict = dialog->selected_conflict;\n  496 |     l = g_list_nth (dialog->duplicates, nth_conflict);\n  497 |     conflict_data = l->data;"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"The grid-cell and name-cell snapshot() handlers fetch the bound item with nautilus_view_cell_get_item() and immediately call g_object_get (item, \"is-cut\", ...) without checking for NULL, unlike every other handler in these files which guards with g_return_if_fail(item != NULL). If snapshot runs while the cell is unbound (item == NULL), g_object_get(NULL, ...) triggers a GLib critical / NULL deref.","fix":"Guard against an unbound cell: if item is NULL, just chain up to the parent snapshot and return, e.g. `if (item != NULL) { g_object_get (item, \"is-cut\", &is_cut, NULL); ... }` before drawing the cut overlay.","locations":[{"ref":"src/nautilus-grid-cell.c:428-431","code":"  428 |     g_autoptr (NautilusViewItem) item = nautilus_view_cell_get_item (NAUTILUS_VIEW_CELL (self));\n  429 |     gboolean is_cut;\n  430 | \n  431 |     g_object_get (item, \"is-cut\", &is_cut, NULL);"},{"ref":"src/nautilus-name-cell.c:399-402","code":"  399 |     g_autoptr (NautilusViewItem) item = nautilus_view_cell_get_item (NAUTILUS_VIEW_CELL (self));\n  400 |     gboolean is_cut;\n  401 | \n  402 |     g_object_get (item, \"is-cut\", &is_cut, NULL);"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"properties_cb() reads the context row \"uri\" and calls nautilus_file_get_by_uri(uri) without checking uri for NULL. For sidebar rows without a uri (e.g. an unmounted volume row) this passes NULL into the file lookup, which is unexpected for the Properties action. Properties is only shown for native/trash/mount rows so this is unlikely in practice, but unguarded.","fix":"Return early if uri is NULL before building the file list and presenting the dialog.","locations":[{"ref":"src/nautilus-sidebar.c:2169-2174","code":" 2169 |     g_autofree gchar *uri = NULL;\n 2170 | \n 2171 |     g_object_get (sidebar->context_row, \"uri\", &uri, NULL);\n 2172 |     file = nautilus_file_get_by_uri (uri);\n 2173 |     list = g_list_append (NULL, file);\n 2174 |     nautilus_properties_present_dialog (list, GTK_WIDGET (sidebar));"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"Deep-count inode dedup stores a pointer to a stack-local variable in a GHashTable. mark_inode_as_seen() does `g_hash_table_add (state->seen_deep_count_inodes, &inode)` where `inode` is a local guint64. The table was created with `g_hash_table_new (g_int64_hash, g_int64_equal)` (no key-copy, no key-destroy), so it keeps the dangling stack address. As soon as mark_inode_as_seen() returns, the stored key dangles; subsequent seen_inode()/g_hash_table_lookup() and later inserts dereference freed stack memory via g_int64_hash/g_int64_equal. This is undefined behavior and the hardlink/bind-mount loop-prevention (counting an inode only once) is effectively broken. Regression introduced in commit 56f742d9d which replaced a value-copying GArray with this hash set.","fix":"Store owned copies of the key. Create the table with `g_hash_table_new_full (g_int64_hash, g_int64_equal, g_free, NULL)` and in mark_inode_as_seen() insert a heap copy: `guint64 *key = g_memdup2 (&inode, sizeof inode); g_hash_table_add (state->seen_deep_count_inodes, key);`.","locations":[{"ref":"src/nautilus-directory-async.c:2604-2615","code":" 2604 | static inline void\n 2605 | mark_inode_as_seen (DeepCountState *state,\n 2606 |                     GFileInfo      *info)\n 2607 | {\n 2608 |     guint64 inode;\n 2609 | \n 2610 |     inode = g_file_info_get_attribute_uint64 (info, G_FILE_ATTRIBUTE_UNIX_INODE);\n 2611 |     if (inode != 0)\n 2612 |     {\n 2613 |         g_hash_table_add (state->seen_deep_count_inodes, &inode);\n 2614 |     }\n 2615 | }"},{"ref":"src/nautilus-directory-async.c:2588-2602","code":" 2588 | static inline gboolean\n 2589 | seen_inode (DeepCountState *state,\n 2590 |             GFileInfo      *info)\n 2591 | {\n 2592 |     guint64 inode;\n 2593 | \n 2594 |     inode = g_file_info_get_attribute_uint64 (info, G_FILE_ATTRIBUTE_UNIX_INODE);\n 2595 | \n 2596 |     if (inode != 0)\n 2597 |     {\n 2598 |         return g_hash_table_lookup (state->seen_deep_count_inodes, &inode) != NULL;\n 2599 |     }\n 2600 | \n 2601 |     return FALSE;\n 2602 | }"},{"ref":"src/nautilus-directory-async.c:2940","code":" 2940 |     state->seen_deep_count_inodes = g_hash_table_new (g_int64_hash, g_int64_equal);"}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"In nautilus_icon_info_lookup(), the G_IS_LOADABLE_ICON branch declares 'GdkPaintable *paintable;' uninitialized (line 326). It is only assigned inside the nested 'if (stream)' / 'if (image != NULL)' / 'if (frame != NULL)' blocks. If g_loadable_icon_load() returns NULL (stream NULL), or gly_loader_load()/gly_image_get_specific_frame() returns NULL, control reaches 'if (paintable == NULL)' (line 389) while paintable still holds garbage. This is an uninitialized-read leading to either skipping the fallback or returning/refcounting a garbage pointer (effectively use-after-free / invalid deref).","fix":"Initialize 'GdkPaintable *paintable = NULL;' at declaration (line 326), as is already relied upon by the 'if (paintable == NULL)' check.","locations":[{"ref":"src/nautilus-icon-info.c:326-398","code":"  326 |     GdkPaintable *paintable;\n  327 | \n  328 |     if (G_IS_EMBLEMED_ICON (icon))\n  329 |     {\n  330 |         icon = g_emblemed_icon_get_icon (G_EMBLEMED_ICON (icon));\n  331 |     }\n  332 |     else if (G_IS_EMBLEM (icon))\n  333 |     {\n  334 |         icon = g_emblem_get_icon (G_EMBLEM (icon));\n  335 |     }\n  336 | \n  337 |     if (G_IS_LOADABLE_ICON (icon))\n  338 |     {\n  339 |         LoadableIconKey lookup_key;\n  340 |         LoadableIconKey *key;\n  341 | \n  342 |         lookup_key.icon = icon;\n  343 |         lookup_key.scale = scale;\n  344 |         lookup_key.size = size;\n  345 | \n  346 |         paintable = loadable_icon_cache_get (&lookup_key);\n  347 |         if (paintable != NULL)\n  348 |         {\n  349 |             return g_object_ref (paintable);\n  350 |         }\n  351 | \n  352 |         g_autoptr (GInputStream) stream = g_loadable_icon_load (G_LOADABLE_ICON (icon),\n  353 |                                                                 size * scale,\n  354 |                                                                 NULL, NULL, NULL);\n  355 |         if (stream)\n  356 |         {\n  357 |             g_autoptr (GlyLoader) loader = gly_loader_new_for_stream (stream);\n  358 |             g_autoptr (GlyImage) image = gly_loader_load (loader, NULL);\n  359 | \n  360 |             if (image != NULL)\n  361 |             {\n  362 |                 g_autoptr (GlyFrameRequest) frame_request = gly_frame_request_new ();\n  363 |                 g_autoptr (GlyFrame) frame = NULL;\n  364 | \n  365 |                 gly_frame_request_set_scale (frame_request, size * scale, size * scale);\n  366 |                 frame = gly_image_get_specific_frame (image, frame_request, NULL);\n  367 | \n  368 |                 if (frame != NULL)\n  369 |                 {\n  370 |                     double iw = gly_frame_get_width (frame);\n  371 |                     double ih = gly_frame_get_height (frame);\n  372 | \n  373 |                     double scale_factor = MIN ((double) size / iw, (double) size / ih);\n  374 | \n  375 |                     double width = iw * scale_factor;\n  376 |                     double height = ih * scale_factor;\n  377 | \n  378 |                     g_autoptr (GdkTexture) texture = gly_gtk_frame_get_texture (frame);\n  379 |                     g_autoptr (GtkSnapshot) snapshot = gtk_snapshot_new ();\n  380 | \n  381 |                     gdk_paintable_snapshot (GDK_PAINTABLE (texture),\n  382 |                                             GDK_SNAPSHOT (snapshot),\n  383 |                                             width, height);\n  384 |                     paintable = gtk_snapshot_to_paintable (snapshot, NULL);\n  385 |                 }\n  386 |             }\n  387 |         }\n  388 | \n  389 |         if (paintable == NULL)\n  390 |         {\n  391 |             return nautilus_icon_info_get_fallback (size, scale);\n  392 |         }\n  393 | \n  394 |         key = loadable_icon_key_new (icon, scale, size);\n  395 |         loadable_icon_cache_add (key, g_object_ref (paintable));\n  396 | \n  397 |         return paintable;\n  398 |     }"}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"NautilusViewControls never takes a reference to window_slot (set_window_slot just assigns the pointer, matching the non-owning pattern used by NautilusHistoryControls), but finalize() calls g_clear_object(&self->window_slot). This unrefs an object the widget does not own, causing a reference-count underflow and potential premature destruction / use-after-free of the window slot.","fix":"Remove g_clear_object (&self->window_slot) from finalize (set the pointer to NULL without unref), or take a reference in set_window_slot to match the unref. The non-owning approach (like history-controls) is the simplest correct fix.","locations":[{"ref":"src/nautilus-view-controls.c:141","code":"  141 |     self->window_slot = window_slot;"},{"ref":"src/nautilus-view-controls.c:219","code":"  219 |     g_clear_object (&self->window_slot);"}]},{"id":"UAF_4","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"NautilusColumnChooser stores the construct-only `file` property via g_value_get_object() without taking a reference (and never unrefs it). The NautilusFile is used throughout the dialog's lifetime (constructed, save-on-close, use-default callback). If the caller drops its reference while the dialog is open, this is a dangling pointer / use-after-free.","fix":"Use g_value_dup_object() in set_property and g_clear_object(&chooser->file) in finalize/dispose.","locations":[{"ref":"src/nautilus-column-chooser.c:177-181","code":"  177 |         case PROP_FILE:\n  178 |         {\n  179 |             chooser->file = g_value_get_object (value);\n  180 |         }\n  181 |         break;"},{"ref":"src/nautilus-column-chooser.c:579-587","code":"  579 | static void\n  580 | nautilus_column_chooser_finalize (GObject *object)\n  581 | {\n  582 |     NautilusColumnChooser *chooser = NAUTILUS_COLUMN_CHOOSER (object);\n  583 | \n  584 |     g_clear_object (&chooser->model);\n  585 | \n  586 |     G_OBJECT_CLASS (nautilus_column_chooser_parent_class)->finalize (object);\n  587 | }"}]},{"id":"UAF_5","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"Potential NULL-deref in mount and filesystem-info completion callbacks after the target file is destroyed. nautilus_async_destroying_file() sets directory->details->mount_state->file = NULL (and filesystem_info_state->file = NULL) but does NOT cancel the corresponding cancellable and does NOT clear state->directory. The in-flight g_file_find_enclosing_mount_async / g_file_query_filesystem_info_async therefore still completes; find_enclosing_mount_callback()/query_filesystem_info_callback() only guard on `state->directory == NULL`, not `state->file == NULL`, so got_mount()/got_filesystem_info() run with state->file == NULL and dereference it (e.g. nautilus_file_get_location(NULL) in find_enclosing_mount_callback, and file->details->... after nautilus_file_ref(NULL)). The work-queue ref normally keeps the file alive, but the NULLing in nautilus_async_destroying_file shows this path is considered reachable, and if reached it crashes.","fix":"Either cancel the cancellable in nautilus_async_destroying_file() for mount_state/filesystem_info_state (as is done for other states), or have got_mount()/got_filesystem_info() and their callbacks bail out / skip file work when state->file == NULL.","locations":[{"ref":"src/nautilus-directory-async.c:3546-3570","code":" 3546 |     state = user_data;\n 3547 |     if (state->directory == NULL)\n 3548 |     {\n 3549 |         /* Operation was cancelled. Bail out */\n 3550 |         mount_state_free (state);\n 3551 |         return;\n 3552 |     }\n 3553 | \n 3554 |     mount = g_file_find_enclosing_mount_finish (G_FILE (source_object),\n 3555 |                                                 res, NULL);\n 3556 | \n 3557 |     if (mount)\n 3558 |     {\n 3559 |         root = g_mount_get_root (mount);\n 3560 |         location = nautilus_file_get_location (state->file);\n 3561 |         if (!g_file_equal (location, root))\n 3562 |         {\n 3563 |             g_object_unref (mount);\n 3564 |             mount = NULL;\n 3565 |         }\n 3566 |         g_object_unref (root);\n 3567 |         g_object_unref (location);\n 3568 |     }\n 3569 | \n 3570 |     got_mount (state, mount);"},{"ref":"src/nautilus-directory-async.c:3510-3535","code":" 3510 | static void\n 3511 | got_mount (MountState *state,\n 3512 |            GMount     *mount)\n 3513 | {\n 3514 |     NautilusDirectory *directory;\n 3515 |     NautilusFile *file;\n 3516 | \n 3517 |     directory = nautilus_directory_ref (state->directory);\n 3518 | \n 3519 |     state->directory->details->mount_state = NULL;\n 3520 |     async_job_end (state->directory, \"mount\");\n 3521 | \n 3522 |     file = nautilus_file_ref (state->file);\n 3523 | \n 3524 |     file->details->mount_is_up_to_date = TRUE;\n 3525 |     nautilus_file_set_mount (file, mount);\n 3526 | \n 3527 |     nautilus_directory_async_state_changed (directory);\n 3528 |     nautilus_file_changed (file);\n 3529 | \n 3530 |     nautilus_file_unref (file);\n 3531 | \n 3532 |     nautilus_directory_unref (directory);\n 3533 | \n 3534 |     mount_state_free (state);\n 3535 | }"},{"ref":"src/nautilus-directory-async.c:3735-3744","code":" 3735 |     if (state->directory == NULL)\n 3736 |     {\n 3737 |         /* Operation was cancelled. Bail out */\n 3738 |         filesystem_info_state_free (state);\n 3739 |         return;\n 3740 |     }\n 3741 | \n 3742 |     info = g_file_query_filesystem_info_finish (G_FILE (source_object), res, NULL);\n 3743 | \n 3744 |     got_filesystem_info (state, info);"},{"ref":"src/nautilus-directory-async.c:1577-1589","code":" 1577 |     if (directory->details->mount_state != NULL &&\n 1578 |         directory->details->mount_state->file == file)\n 1579 |     {\n 1580 |         directory->details->mount_state->file = NULL;\n 1581 |         changed = TRUE;\n 1582 |     }\n 1583 | \n 1584 |     if (directory->details->filesystem_info_state != NULL &&\n 1585 |         directory->details->filesystem_info_state->file == file)\n 1586 |     {\n 1587 |         directory->details->filesystem_info_state->file = NULL;\n 1588 |         changed = TRUE;\n 1589 |     }"}]},{"id":"UAF_6","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"previewer_selection_event() dereferences current_slot (a weak pointer) via nautilus_window_slot_get_current_view() after only checking current_slot != NULL. Because current_slot is only a weak ref cleared on finalize, this is generally safe, but g_variant_get(parameters, \"(u)\", &direction) writes a guint32 into a GtkDirectionType variable; on a big-endian platform where enum width differs this is technically type-punning. Lower priority but worth a cast to a guint32 temporary.","fix":"Read into a guint32 temporary then assign to the GtkDirectionType, and confirm current_slot lifetime assumptions.","locations":[{"ref":"src/nautilus-previewer.c:373-382","code":"  373 |     NautilusFilesView *view = nautilus_window_slot_get_current_view (current_slot);\n  374 |     GtkDirectionType direction;\n  375 | \n  376 |     if (view == NULL)\n  377 |     {\n  378 |         return;\n  379 |     }\n  380 | \n  381 |     g_variant_get (parameters, \"(u)\", &direction);\n  382 |     nautilus_files_view_preview_selection_event (view, direction);"}]},{"id":"UAF_7","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"handle_activate_result() stores the raw 'skeleton' and 'invocation' pointers into ShowURIData without taking references, then passes them to an async callback (show_uri_callback) that uses them after gtk_file_launcher_launch completes. 'invocation' ownership in the generated GDBus handler is typically transferred/consumed by completing the call, but here it is stashed for later use in the async completion without a ref; if the skeleton is unexported/finalized (provider dispose) before the launch finishes, show_uri_callback dereferences a freed skeleton when calling nautilus_shell_search_provider2_complete_activate_result().","fix":"Take g_object_ref on data->skeleton (and treat invocation per GDBus ownership rules) when building ShowURIData, and g_object_unref it in show_uri_callback / result_metas_data_free-style cleanup.","locations":[{"ref":"src/nautilus-shell-search-provider.c:684-704","code":"  684 | static gboolean\n  685 | handle_activate_result (NautilusShellSearchProvider2  *skeleton,\n  686 |                         GDBusMethodInvocation         *invocation,\n  687 |                         gchar                         *result,\n  688 |                         gchar                        **terms,\n  689 |                         guint32                        timestamp,\n  690 |                         gpointer                       user_data)\n  691 | {\n  692 |     g_autoptr (GFile) file = g_file_new_for_uri (result);\n  693 |     g_autoptr (GtkFileLauncher) launcher = gtk_file_launcher_new (file);\n  694 |     ShowURIData *data;\n  695 | \n  696 |     data = g_new (ShowURIData, 1);\n  697 |     data->file = g_steal_pointer (&file);\n  698 |     data->skeleton = skeleton;\n  699 |     data->invocation = invocation;\n  700 | \n  701 |     gtk_file_launcher_launch (launcher, NULL, NULL, show_uri_callback, data);\n  702 | \n  703 |     return TRUE;\n  704 | }"},{"ref":"src/nautilus-shell-search-provider.c:665-682","code":"  665 | static void\n  666 | show_uri_callback (GObject      *source_object,\n  667 |                    GAsyncResult *result,\n  668 |                    gpointer      user_data)\n  669 | {\n  670 |     GtkFileLauncher *launcher = GTK_FILE_LAUNCHER (source_object);\n  671 |     ShowURIData *data = user_data;\n  672 | \n  673 |     if (!gtk_file_launcher_launch_finish (launcher, result, NULL))\n  674 |     {\n  675 |         g_application_open (g_application_get_default (), &data->file, 1, \"\");\n  676 |     }\n  677 | \n  678 |     nautilus_shell_search_provider2_complete_activate_result (data->skeleton, data->invocation);\n  679 | \n  680 |     g_object_unref (data->file);\n  681 |     g_free (data);\n  682 | }"}]},{"id":"UAF_8","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"handle_go_direction() in the BACK/FORWARD history manipulation: `other_list = g_list_prepend (other_list, self->last_location_bookmark); g_object_ref (other_list->data);` adds the current bookmark to the opposite list. Then it moves `location_change_distance` links and finally removes the head link and unrefs link->data. If self->last_location_bookmark is NULL (which can happen — it is only set in nautilus_window_slot_update_bookmark when locations change), prepending NULL and then g_object_ref(NULL) on other_list->data dereferences/refs NULL. check_last_bookmark_location_matches_slot() also dereferences self->last_location_bookmark via check_bookmark_location_matches without a NULL check (unless the location is a search scheme).","fix":"Guard against self->last_location_bookmark == NULL before referencing/prepending it and before calling check_bookmark_location_matches() on it.","locations":[{"ref":"src/nautilus-window-slot.c:2385-2427","code":" 2385 | static void\n 2386 | handle_go_direction (NautilusWindowSlot *self,\n 2387 |                      GFile              *location,\n 2388 |                      gboolean            forward)\n 2389 | {\n 2390 |     GList **list_ptr, **other_list_ptr;\n 2391 |     GList *list, *other_list, *link;\n 2392 |     NautilusBookmark *bookmark;\n 2393 |     list_ptr = (forward) ? (&self->forward_list) : (&self->back_list);\n 2394 |     other_list_ptr = (forward) ? (&self->back_list) : (&self->forward_list);\n 2395 |     list = *list_ptr;\n 2396 |     other_list = *other_list_ptr;\n 2397 | \n 2398 |     /* Move items from the list to the other list. */\n 2399 |     g_assert (g_list_length (list) > self->location_change_distance);\n 2400 |     check_bookmark_location_matches (g_list_nth_data (list, self->location_change_distance),\n 2401 |                                      location);\n 2402 |     g_assert (nautilus_window_slot_get_location (self) != NULL);\n 2403 | \n 2404 |     /* Move current location to list */\n 2405 |     check_last_bookmark_location_matches_slot (self);\n 2406 | \n 2407 |     /* Use the first bookmark in the history list rather than creating a new one. */\n 2408 |     other_list = g_list_prepend (other_list, self->last_location_bookmark);\n 2409 |     g_object_ref (other_list->data);\n 2410 | \n 2411 |     /* Move extra links from the list to the other list */\n 2412 |     for (guint i = 0; i < self->location_change_distance; ++i)\n 2413 |     {\n 2414 |         bookmark = NAUTILUS_BOOKMARK (list->data);\n 2415 |         list = g_list_remove (list, bookmark);\n 2416 |         other_list = g_list_prepend (other_list, bookmark);\n 2417 |     }\n 2418 | \n 2419 |     /* One bookmark falls out of back/forward lists and becomes viewed location */\n 2420 |     link = list;\n 2421 |     list = g_list_remove_link (list, link);\n 2422 |     g_object_unref (link->data);\n 2423 |     g_list_free_1 (link);\n 2424 | \n 2425 |     *list_ptr = list;\n 2426 |     *other_list_ptr = other_list;\n 2427 | }"},{"ref":"src/nautilus-window-slot.c:2369-2383","code":" 2369 | static void\n 2370 | check_last_bookmark_location_matches_slot (NautilusWindowSlot *self)\n 2371 | {\n 2372 |     GFile *slot_location = nautilus_window_slot_get_location (self);\n 2373 | \n 2374 |     if (g_file_has_uri_scheme (slot_location, SCHEME_SEARCH))\n 2375 |     {\n 2376 |         /* In this case, it's expected not to match, because search is not\n 2377 |          * saved into the history stack. */\n 2378 |         return;\n 2379 |     }\n 2380 | \n 2381 |     check_bookmark_location_matches (self->last_location_bookmark,\n 2382 |                                      slot_location);\n 2383 | }"}]},{"id":"UAF_9","type":"use_after_free","type_label":"Use After Free","severity":"low","description":"proxy_ready() calls g_dbus_proxy_new_for_bus_finish(res, NULL) discarding errors, then immediately uses self->proxy in get_activatable_names() and g_dbus_proxy_get_connection(self->proxy) without a NULL check. If proxy creation fails (or was cancelled, in which case self may be finalized), self->proxy is NULL and g_dbus_proxy_get_connection(NULL) dereferences NULL.","fix":"Capture and check the GError/NULL proxy in proxy_ready(); return early if self->proxy is NULL (and handle cancellation like the other callbacks).","locations":[{"ref":"src/nautilus-dbus-launcher.c:184-201","code":"  184 | proxy_ready (GObject      *object,\n  185 |              GAsyncResult *res,\n  186 |              gpointer      user_data)\n  187 | {\n  188 |     NautilusDBusLauncher *self = user_data;\n  189 |     GDBusConnection *connection;\n  190 | \n  191 |     self->proxy = g_dbus_proxy_new_for_bus_finish (res, NULL);\n  192 |     get_activatable_names (self);\n  193 |     connection = g_dbus_proxy_get_connection (self->proxy);\n  194 |     g_dbus_connection_signal_subscribe (connection,\n  195 |                                         \"org.freedesktop.DBus\",\n  196 |                                         \"org.freedesktop.DBus\",\n  197 |                                         \"ActivatableServicesChanged\",\n  198 |                                         \"/org/freedesktop/DBus\",\n  199 |                                         NULL, G_DBUS_SIGNAL_FLAGS_NONE,\n  200 |                                         activatable_services_changed, self, NULL);\n  201 | }"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"nautilus_search_engine_recent start_search() spawns a detached GThread (recent_thread_func) and immediately drops the GThread handle (g_autoptr). The thread captures 'self' without taking a reference. The provider's self-reference taken in actual_start() (search-provider.c) is only dropped in nautilus_search_provider_finished(), which the thread schedules via g_idle_add_once at the end. This keeps self alive, but the thread also calls nautilus_search_provider_should_stop()/get_query()/add_hit() on 'self' throughout its run, relying entirely on that single ref staying valid. If stop() runs and the cancellable causes provider_finished to be scheduled/invoked on the main thread before the worker thread observes should_stop, the self-ref can be dropped while the worker still touches self. The engine-simple variant has the same pattern.","fix":"Take an explicit g_object_ref(self) before spawning the worker thread and unref it at the end of the thread function (or join), so the worker holds its own reference independent of the provider's start/finish bookkeeping.","locations":[{"ref":"src/nautilus-search-engine-recent.c:279-286","code":"  279 | static void\n  280 | start_search (NautilusSearchProvider *provider)\n  281 | {\n  282 |     NautilusSearchEngineRecent *self = NAUTILUS_SEARCH_ENGINE_RECENT (provider);\n  283 |     g_autoptr (GThread) thread = NULL;\n  284 | \n  285 |     thread = g_thread_new (\"nautilus-search-recent\", (GThreadFunc) recent_thread_func, self);\n  286 | }"},{"ref":"src/nautilus-search-engine-simple.c:275-282","code":"  275 | static void\n  276 | create_thread (gpointer user_data)\n  277 | {\n  278 |     NautilusSearchEngineSimple *simple = user_data;\n  279 |     g_autoptr (GThread) thread = NULL;\n  280 | \n  281 |     thread = g_thread_new (\"nautilus-search-simple\", (GThreadFunc) search_thread_func, simple);\n  282 | }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"Thumbnailing concurrency limit uses 'running_threads <= max_threads' (line 670). With max_threads == N this admits N+1 simultaneous generate-thumbnail operations (loop runs while running_threads is 0..N, incrementing to N+1). The intended cap is N. Combined with MAX_THUMBNAILING_THREADS = ceil(nproc/2) this is an off-by-one over-subscription of worker slots.","fix":"Use 'running_threads < max_threads' for the loop guard.","locations":[{"ref":"src/nautilus-thumbnails.c:669-670","code":"  669 |     while (ignored_thumbnails < nautilus_hash_queue_get_length (thumbnails_to_make) &&\n  670 |            running_threads <= max_threads)"},{"ref":"src/nautilus-thumbnails.c:52","code":"   52 | #define MAX_THUMBNAILING_THREADS ceil (g_get_num_processors () / 2);"}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"low","description":"verify_destination() does a free-space pre-check (TOCTOU): it queries FILESYSTEM_FREE and compares against source_info->num_bytes, but the actual copy happens much later. This is an inherent race and the code does proceed with RESPONSE_COPY_FORCE, so it is informational only. More notable: the free-space comparison uses source_info->num_bytes which for a cross-device move only reflects the scanned fallback files, and the check is skipped entirely for symlink destinations (documented). No data-loss, but the 'not enough space' guard can both false-positive and false-negative.","fix":"No change strictly required; if tightening is desired, re-validate space closer to the actual transfer or rely on the operation's own ENOSPC handling rather than the pre-check.","locations":[{"ref":"src/nautilus-file-operations.c:3072-3117","code":" 3072 |         if (required_size > 0 &&\n 3073 |             g_strcmp0 (fs_type, \"ramfs\") != 0 &&\n 3074 |             g_file_info_has_attribute (fsinfo, G_FILE_ATTRIBUTE_FILESYSTEM_FREE))\n 3075 |         {\n 3076 |             free_size = g_file_info_get_attribute_uint64 (fsinfo,\n 3077 |                                                           G_FILE_ATTRIBUTE_FILESYSTEM_FREE);\n 3078 | \n 3079 |             if (free_size < (guint64) required_size)\n 3080 |             {\n 3081 |                 g_autofree gchar *basename = get_basename (dest);\n 3082 |                 g_autofree gchar *formatted_size = NULL;\n 3083 |                 g_autofree gchar *primary = g_strdup_printf (_(\"Error while copying to “%s”.\"), basename);\n 3084 |                 const char *secondary;\n 3085 |                 g_autofree char *details = NULL;\n 3086 | \n 3087 |                 size_difference = required_size - free_size;\n 3088 |                 secondary = _(\"There is not enough space on the destination. Try to remove files to make space.\");\n 3089 | \n 3090 |                 formatted_size = g_format_size (size_difference);\n 3091 |                 details = g_strdup_printf (_(\"%s more space is required to copy to the destination.\"),\n 3092 |                                            formatted_size);\n 3093 | \n 3094 |                 response = run_dialog (job,\n 3095 |                                        primary,\n 3096 |                                        secondary,\n 3097 |                                        details,\n 3098 |                                        RESPONSE_COPY_FORCE | RESPONSE_RETRY);\n 3099 | \n 3100 |                 if (response == RESPONSE_CANCEL)\n 3101 |                 {\n 3102 |                     abort_job (job);\n 3103 |                 }\n 3104 |                 else if (response == RESPONSE_RETRY)\n 3105 |                 {\n 3106 |                     continue;\n 3107 |                 }\n 3108 |                 else if (response == RESPONSE_COPY_FORCE)\n 3109 |                 {\n 3110 |                     /* We are forced to copy - just fall through ... */\n 3111 |                 }\n 3112 |                 else\n 3113 |                 {\n 3114 |                     g_assert_not_reached ();\n 3115 |                 }\n 3116 |             }\n 3117 |         }"}]},{"id":"RACE_4","type":"race_condition","type_label":"Race Condition","severity":"low","description":"undo_info_apply_ready sets self->info = g_object_ref(info) on success/cancel after do_undo_redo() already called file_undo_manager_clear(self) which set self->info = NULL and self->state = NONE. If a new action was set via nautilus_file_undo_manager_set_action between dispatch and completion, the guard 'self->info != NULL && self->info != info' returns early, which is correct; but on the success path it then overwrites self->state based on last_state and re-refs the old info even though the manager may already represent a different conceptual state. The interplay of is_operating, info and state across the async boundary is fragile and relies on no re-entrancy other than set_action.","fix":"Document the invariants, or track the in-flight info explicitly (separate field) rather than reusing self->info which is also cleared by do_undo_redo.","locations":[{"ref":"src/nautilus-file-undo-manager.c:136-199","code":"  136 | static void\n  137 | undo_info_apply_ready (GObject      *source,\n  138 |                        GAsyncResult *res,\n  139 |                        gpointer      user_data)\n  140 | {\n  141 |     NautilusFileUndoManager *self = user_data;\n  142 |     NautilusFileUndoInfo *info = NAUTILUS_FILE_UNDO_INFO (source);\n  143 |     gboolean success, user_cancel;\n  144 | \n  145 |     success = nautilus_file_undo_info_apply_finish (info, res, &user_cancel, NULL);\n  146 | \n  147 |     self->is_operating = FALSE;\n  148 | \n  149 |     /* just return in case we got another another operation set */\n  150 |     if ((self->info != NULL) &&\n  151 |         (self->info != info))\n  152 |     {\n  153 |         return;\n  154 |     }\n  155 | \n  156 |     if (success)\n  157 |     {\n  158 |         if (self->last_state == NAUTILUS_FILE_UNDO_MANAGER_STATE_UNDO)\n  159 |         {\n  160 |             self->state = NAUTILUS_FILE_UNDO_MANAGER_STATE_REDO;\n  161 |         }\n  162 |         else if (self->last_state == NAUTILUS_FILE_UNDO_MANAGER_STATE_REDO)\n  163 |         {\n  164 |             self->state = NAUTILUS_FILE_UNDO_MANAGER_STATE_UNDO;\n  165 |         }\n  166 | \n  167 |         self->info = g_object_ref (info);\n  168 |     }\n  169 |     else if (user_cancel)\n  170 |     {\n  171 |         self->state = self->last_state;\n  172 |         self->info = g_object_ref (info);\n  173 |     }\n  174 |     else\n  175 |     {\n  176 |         file_undo_manager_clear (self);\n  177 |     }\n  178 | \n  179 |     g_signal_emit (self, signals[SIGNAL_UNDO_CHANGED], 0);\n  180 | }\n  181 | \n  182 | static void\n  183 | do_undo_redo (NautilusFileUndoManager        *self,\n  184 |               GtkWindow                      *parent_window,\n  185 |               NautilusFileOperationsDBusData *dbus_data)\n  186 | {\n  187 |     gboolean undo = self->state == NAUTILUS_FILE_UNDO_MANAGER_STATE_UNDO;\n  188 | \n  189 |     self->last_state = self->state;\n  190 | \n  191 |     self->is_operating = TRUE;\n  192 |     nautilus_file_undo_info_apply_async (self->info, undo, parent_window,\n  193 |                                          dbus_data,\n  194 |                                          undo_info_apply_ready, self);\n  195 | \n  196 |     /* clear actions while undoing */\n  197 |     file_undo_manager_clear (self);\n  198 |     g_signal_emit (self, signals[SIGNAL_UNDO_CHANGED], 0);\n  199 | }"}]},{"id":"RACE_5","type":"race_condition","type_label":"Race Condition","severity":"low","description":"on_get_starred_files_cursor_callback() accumulates self->pending_changed_files and emits 'starred-changed' only on cursor completion. If nautilus_tag_manager_query_starred_files() is somehow invoked again (or the notifier fires) before the initial cursor walk finishes, two concurrent cursor iterations share self->pending_changed_files and self->starred_file_uris without synchronization, risking list corruption / double-add. The single cancellable does not prevent a second query started after the first completes mid-flight.","fix":"Guard against overlapping starred-file queries (e.g. an in-progress flag) or carry per-query state instead of using shared self->pending_changed_files.","locations":[{"ref":"src/nautilus-tag-manager.c:232-286","code":"  232 | static void\n  233 | on_get_starred_files_cursor_callback (GObject      *object,\n  234 |                                       GAsyncResult *result,\n  235 |                                       gpointer      user_data)\n  236 | {\n  237 |     TrackerSparqlCursor *cursor;\n  238 |     g_autoptr (GError) error = NULL;\n  239 |     const gchar *url;\n  240 |     gboolean success;\n  241 |     NautilusTagManager *self;\n  242 |     NautilusFile *file;\n  243 | \n  244 |     cursor = TRACKER_SPARQL_CURSOR (object);\n  245 | \n  246 |     self = NAUTILUS_TAG_MANAGER (user_data);\n  247 | \n  248 |     success = tracker_sparql_cursor_next_finish (cursor, result, &error);\n  249 | \n  250 |     if (!success)\n  251 |     {\n  252 |         if (error != NULL)\n  253 |         {\n  254 |             g_warning (\"Error on getting all tags cursor callback: %s\", error->message);\n  255 |         }\n  256 | \n  257 |         if (self->pending_changed_files != NULL)\n  258 |         {\n  259 |             g_signal_emit_by_name (self, \"starred-changed\", self->pending_changed_files);\n  260 |             g_clear_pointer (&self->pending_changed_files, nautilus_file_list_free);\n  261 |         }\n  262 | \n  263 |         g_clear_object (&cursor);\n  264 |         return;\n  265 |     }\n  266 | \n  267 |     url = tracker_sparql_cursor_get_string (cursor, 0, NULL);\n  268 | \n  269 |     g_hash_table_add (self->starred_file_uris, g_strdup (url));\n  270 | \n  271 |     file = nautilus_file_get_by_uri (url);\n  272 | \n  273 |     if (file)\n  274 |     {\n  275 |         self->pending_changed_files = g_list_prepend (self->pending_changed_files, file);\n  276 |     }\n  277 |     else\n  278 |     {\n  279 |         g_debug (\"File %s is starred but not found\", url);\n  280 |     }\n  281 | \n  282 |     tracker_sparql_cursor_next_async (cursor,\n  283 |                                       self->cancellable,\n  284 |                                       on_get_starred_files_cursor_callback,\n  285 |                                       self);\n  286 | }"}]},{"id":"RACE_6","type":"race_condition","type_label":"Race Condition","severity":"low","description":"NautilusTrashMonitor.timeout_id is declared 'gint' and compared with '> 0', but g_timeout_add_seconds() returns guint and source ids are positive guints; using a signed gint and '> 0' is inconsistent with the '!= 0' clearing convention used elsewhere and would misbehave for the (practically impossible) id > G_MAXINT. Minor type/convention issue.","fix":"Use guint for dow-slot.c:2554-2583","code":" 2554 | static void\n 2555 | found_mount_cb (GObject      *source_object,\n 2556 |                 GAsyncResult *res,\n 2557 |                 gpointer      user_data)\n 2558 | {\n 2559 |     g_autoptr (FindMountData) data = user_data;\n 2560 | \n 2561 |     if (g_cancellable_is_cancelled (data->cancellable))\n 2562 |     {\n 2563 |         return;\n 2564 |     }\n 2565 | \n 2566 |     data->mount = g_file_find_enclosing_mount_finish (G_FILE (source_object),\n 2567 |                                                       res,\n 2568 |                                                       NULL);\n 2569 |     if (data->mount != NULL)\n 2570 |     {\n 2571 |         FindMountData *passed_on = g_steal_pointer (&data);\n 2572 |         nautilus_get_x_content_types_for_mount_async (passed_on->mount,\n 2573 |                                                       found_content_type_cb,\n 2574 |                                                       passed_on->cancellable,\n 2575 |                                                       passed_on);\n 2576 |     }\n 2577 |     else\n 2578 |     {\n 2579 |         NautilusWindowSlot *self = NAUTILUS_WINDOW_SLOT (data->slot);\n 2580 | \n 2581 |         self->find_mount_cancellable = NULL;\n 2582 |     }\n 2583 | }"}]},{"id":"RACE_8","type":"race_condition","type_label":"Race Condition","severity":"low","description":"malloc_trim idle (HAVE_MALLOC_TRIM) uses a single static guint malloc_trim_idle_id shared across all windows, scheduled from window_slot_close(). The idle callback sets malloc_trim_idle_id = 0 but does not hold any reference; this is benign for the static int but the pattern means if the module/app is torn down the idle source is not removed (no g_source_remove on shutdown), so the idle could fire after teardown. Low impact since malloc_trim has no nautilus-state dependency.","fix":"Optionally remove the pending idle source on application shutdown, or accept as benign and document.","locations":[{"ref":"src/nautilus-window.c:156-167","code":"  156 | #ifdef HAVE_MALLOC_TRIM\n  157 | static guint malloc_trim_idle_id = 0;\n  158 | \n  159 | static gboolean\n  160 | malloc_trim_idle_cb (gpointer user_data)\n  161 | {\n  162 |     malloc_trim (8 * 1024 * 1024);\n  163 |     malloc_trim_idle_id = 0;\n  164 | \n  165 |     return FALSE;\n  166 | }\n  167 | #endif"},{"ref":"src/nautilus-window.c:701-706","code":"  701 | #ifdef HAVE_MALLOC_TRIM\n  702 |     if (malloc_trim_idle_id == 0)\n  703 |     {\n  704 |         malloc_trim_idle_id = g_idle_add (malloc_trim_idle_cb, NULL);\n  705 |     }\n  706 | #endif"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"NautilusMenu owns a reference on each appended item (nautilus_menu_append_item does g_object_ref), but the finalizer only frees the list nodes with g_list_free and never unrefs the held items, leaking every NautilusMenuItem still in the menu at destruction.","fix":"Use g_clear_pointer with a full-free, e.g. `g_list_free_full (menu->item_list, g_object_unref)` (and set item_list to NULL).","locations":[{"ref":"libnautilus-extension/nautilus-menu.c:113-121","code":"  113 | static void\n  114 | nautilus_menu_finalize (GObject *object)\n  115 | {\n  116 |     NautilusMenu *menu = NAUTILUS_MENU (object);\n  117 | \n  118 |     g_clear_pointer (&menu->item_list, g_list_free);\n  119 | \n  120 |     G_OBJECT_CLASS (nautilus_menu_parent_class)->finalize (object);\n  121 | }"},{"ref":"libnautilus-extension/nautilus-menu.c:67-75","code":"   67 | void\n   68 | nautilus_menu_append_item (NautilusMenu     *self,\n   69 |                            NautilusMenuItem *menu_item)\n   70 | {\n   71 |     g_return_if_fail (NAUTILUS_IS_MENU (self));\n   72 |     g_return_if_fail (NAUTILUS_IS_MENU_ITEM (menu_item));\n   73 | \n   74 |     self->item_list = g_list_append (self->item_list, g_object_ref (menu_item));\n   75 | }"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"g_mount_get_icon() returns a new reference (transfer full) to a GIcon, but `icon` is never unreffed in present_autorun_for_software_dialog(), leaking the icon each time the dialog is shown.","fix":"Declare icon with g_autoptr(GIcon) or g_object_unref(icon) after use.","locations":[{"ref":"src/nautilus-autorun-software.c:196-207","code":"  196 |     icon = g_mount_get_icon (mount);\n  197 |     if (G_IS_THEMED_ICON (icon))\n  198 |     {\n  199 |         const gchar * const *names;\n  200 | \n  201 |         names = g_themed_icon_get_names (G_THEMED_ICON (icon));\n  202 | \n  203 |         if (names != NULL)\n  204 |         {\n  205 |             gtk_window_set_icon_name (GTK_WINDOW (dialog), names[0]);\n  206 |         }\n  207 |     }"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"nautilus_file_get_emblem_icons builds a `keywords` GList (concatenation of get_automatic_emblem_keywords and get_extension_emblem_keywords) and iterates it to build the icon list, but never frees the list nodes. The string data is borrowed (so must not be freed), but the GList node chain itself leaks on every call.","fix":"Add `g_list_free (keywords);` before returning (free only the nodes, not the borrowed string data).","locations":[{"ref":"src/nautilus-file.c:4635-4653","code":" 4635 |     GList *keywords = g_list_concat (get_automatic_emblem_keywords (file),\n 4636 |                                      get_extension_emblem_keywords (file));\n 4637 | \n 4638 |     for (GList *l = keywords; l != NULL; l = l->next)\n 4639 |     {\n 4640 |         char *keyword = l->data;\n 4641 |         g_autofree char *prefixed = g_strconcat (\"emblem-\", keyword, NULL);\n 4642 |         char *icon_names[2] = { prefixed, keyword };\n 4643 | \n 4644 |         icons = g_list_prepend (icons, g_themed_icon_new_from_names (icon_names, 2));\n 4645 |     }\n 4646 | \n 4647 |     if (mount_icon != NULL)\n 4648 |     {\n 4649 |         icons = g_list_prepend (icons, mount_icon);\n 4650 |     }\n 4651 | \n 4652 |     return icons;\n 4653 | }"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"In nautilus_keyfile_metadata_update_from_keyfile(), gio_key is allocated with g_strconcat() at line 287, but when values_length < 1 the code does 'continue' at line 291 before reaching the g_free(gio_key) at line 332, leaking gio_key on every key whose list is empty. Additionally, the 'values' array from g_key_file_get_string_list() is also leaked on that same continue path.","fix":"Move the 'if (values_length < 1) continue;' check above the g_strconcat (or free gio_key and values before continue). Better: build gio_key after the length check.","locations":[{"ref":"src/nautilus-keyfile-metadata.c:281-292","code":"  281 |         values = g_key_file_get_string_list (keyfile,\n  282 |                                              name,\n  283 |                                              key,\n  284 |                                              &values_length,\n  285 |                                              NULL);\n  286 | \n  287 |         gio_key = g_strconcat (\"metadata::\", key, NULL);\n  288 | \n  289 |         if (values_length < 1)\n  290 |         {\n  291 |             continue;\n  292 |         }"},{"ref":"src/nautilus-keyfile-metadata.c:332-333","code":"  332 |         g_free (gio_key);\n  333 |         g_strfreev (values);"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"In button_data_file_changed(), when a button's file is detected as renamed, button_data->path is overwritten with g_object_ref(location) without unreffing the previous GFile that was stored there (set in make_button_data). This leaks one GFile reference on every rename of a path-bar button.","fix":"Use g_set_object (&button_data->path, location); (or g_object_unref the old path before assigning).","locations":[{"ref":"src/nautilus-pathbar.c:1145-1148","code":" 1145 |         if (renamed)\n 1146 |         {\n 1147 |             button_data->path = g_object_ref (location);\n 1148 |         }"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"nautilus_view_model_get_sorted_items_for_files() builds a GList `items` with g_list_prepend(), then sorts a *copy* of it via g_list_sort_with_data(g_list_copy(items), ...) and returns that copy. The original `items` list (its GList link nodes) is never freed, leaking one GList node per matched file on every call.","fix":"Sort the list in place and return it, e.g. `return g_list_sort_with_data (items, compare_data_func, self);` (drop the g_list_copy), or free `items` after copying with g_list_free().","locations":[{"ref":"src/nautilus-view-model.c:525-543","code":"  525 | GList *\n  526 | nautilus_view_model_get_sorted_items_for_files (NautilusViewModel *self,\n  527 |                                                 GList             *files)\n  528 | {\n  529 |     GList *items = NULL;\n  530 | \n  531 |     for (GList *l = files; l != NULL; l = l->next)\n  532 |     {\n  533 |         NautilusViewItem *item;\n  534 | \n  535 |         item = nautilus_view_model_get_item_for_file (self, l->data);\n  536 |         if (item != NULL)\n  537 |         {\n  538 |             items = g_list_prepend (items, item);\n  539 |         }\n  540 |     }\n  541 | \n  542 |     return g_list_sort_with_data (g_list_copy (items), compare_data_func, self);\n  543 | }"}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"nautilus_file_conflict_dialog_set_conflict_name() and nautilus_file_conflict_dialog_set_suggested_name() do g_strdup() into fcd->conflict_name / fcd->suggested_name without freeing any previous value. They are each called exactly once per dialog today, so no leak occurs in practice, but the setters are public API and unsafe if called more than once.","fix":"Use g_set_str()/g_free() before assigning, e.g. g_set_str(&fcd->conflict_name, conflict_name).","locations":[{"ref":"src/nautilus-file-conflict-dialog.c:89-102","code":"   89 | void\n   90 | nautilus_file_conflict_dialog_set_conflict_name (NautilusFileConflictDialog *fcd,\n   91 |                                                  const char                 *conflict_name)\n   92 | {\n   93 |     fcd->conflict_name = g_strdup (conflict_name);\n   94 | }\n   95 | \n   96 | void\n   97 | nautilus_file_conflict_dialog_set_suggested_name (NautilusFileConflictDialog *fcd,\n   98 |                                                   gchar                      *suggested_name)\n   99 | {\n  100 |     fcd->suggested_name = g_strdup (suggested_name);\n  101 |     gtk_editable_set_text (GTK_EDITABLE (fcd->entry), suggested_name);\n  102 | }"}]},{"id":"MEM_8","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"nautilus_file_undo_info_batch_rename_finalize iterates new_files/old_files with 'file = l->data; g_clear_object(&file);' — g_clear_object operates on the local variable copy, so it unrefs the object but the list element is not nulled (irrelevant) and this works, but the pattern is fragile. The real concern: g_clear_object on a local does unref correctly, so no leak; however if any entry is shared/owned elsewhere this double-frees. Verify ownership: set_data_pre/post take the lists verbatim (self->old_files = old_files) and the GFiles are owned, so unref is correct. No leak — flag only as a confusing pattern.","fix":"Replace the manual loops with g_list_free_full(self->new_files, g_object_unref) etc. for clarity (the GString lists need g_string_free).","locations":[{"ref":"src/nautilus-file-undo-operations.c:1254-1266","code":" 1254 |     for (l = self->new_files; l != NULL; l = l->next)\n 1255 |     {\n 1256 |         file = l->data;\n 1257 | \n 1258 |         g_clear_object (&file);\n 1259 |     }\n 1260 | \n 1261 |     for (l = self->old_files; l != NULL; l = l->next)\n 1262 |     {\n 1263 |         file = l->data;\n 1264 | \n 1265 |         g_clear_object (&file);\n 1266 |     }"}]},{"id":"MEM_9","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"g_file_get_path() returns a newly-allocated string, but g_strv_builder_add() copies its argument and does not take ownership. The two g_file_get_path() results passed directly to g_strv_builder_add() are therefore leaked on every send-email invocation.","fix":"Capture the path in a temporary (g_autofree) and pass it, or use g_strv_builder_take() which assumes ownership of the allocated string.","locations":[{"ref":"src/nautilus-files-view.c:6260","code":" 6260 |         g_strv_builder_add (strv_builder, g_file_get_path (new_file));"},{"ref":"src/nautilus-files-view.c:6285","code":" 6285 |             g_strv_builder_add (strv_builder, g_file_get_path (location));"}]},{"id":"MEM_10","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"In nautilus_keyfile_metadata_update_from_keyfile(), g_key_file_get_string_list() can return NULL on error while length was reported >0 by g_key_file_get_keys(); 'values' is dereferenced (values_length used, values[0]) without a NULL check. If a key exists but its value cannot be parsed as a string list, values is NULL and values_length is left uninitialized, risking a NULL deref / use of indeterminate length.","fix":"Check 'if (values == NULL) { g_free (gio_key); continue; }' immediately after the g_key_file_get_string_list() call.","locations":[{"ref":"src/nautilus-keyfile-metadata.c:281-330","code":"  281 |         values = g_key_file_get_string_list (keyfile,\n  282 |                                              name,\n  283 |                                              key,\n  284 |                                              &values_length,\n  285 |                                              NULL);\n  286 | \n  287 |         gio_key = g_strconcat (\"metadata::\", key, NULL);\n  288 | \n  289 |         if (values_length < 1)\n  290 |         {\n  291 |             continue;\n  292 |         }\n  293 |         else if (values_length == 1)\n  294 |         {\n  295 |             g_file_info_set_attribute_string (info,\n  296 |                                               gio_key,\n  297 |                                               values[0]);\n  298 |         }\n  299 |         else if (values_length == 2)\n  300 |         {\n  301 |             /* deal with the fact that single-length strv are stored\n  302 |              * with an additional terminator in the keyfile string, to differentiate\n  303 |              * them from the regular string case.\n  304 |              */\n  305 |             value = values[1];\n  306 | \n  307 |             if (g_strcmp0 (value, STRV_TERMINATOR) == 0)\n  308 |             {\n  309 |                 /* if the 2nd value is the terminator, remove it */\n  310 |                 actual_values[0] = values[0];\n  311 |                 actual_values[1] = NULL;\n  312 | \n  313 |                 g_file_info_set_attribute_stringv (info,\n  314 |                                                    gio_key,\n  315 |                                                    (gchar **) actual_values);\n  316 |             }\n  317 |             else\n  318 |             {\n  319 |                 /* otherwise, set it as a regular strv */\n  320 |                 g_file_info_set_attribute_stringv (info,\n  321 |                                                    gio_key,\n  322 |                                                    values);\n  323 |             }\n  324 |         }\n  325 |         else\n  326 |         {\n  327 |             g_file_info_set_attribute_stringv (info,\n  328 |                                                gio_key,\n  329 |                                                values);\n  330 |         }"}]},{"id":"MEM_11","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"In choose_program the GAppChooserDialog is created and connected to open_with_response_cb with 'parameters' as user_data, but open_with_response_cb only frees parameters on the GTK_RESPONSE_OK path. On any non-OK response it does 'gtk_window_destroy; return;' without calling activate_parameters_install_free(parameters), leaking the ActivateParametersInstall (and its reffed file/files/proxy) every time the app-chooser dialog is cancelled.","fix":"Call activate_parameters_install_free(parameters) on the non-OK branch before returning (after destroying the dialog).","locations":[{"ref":"src/nautilus-mime-actions.c:1192-1221","code":" 1192 | static void\n 1193 | open_with_response_cb (GtkDialog *dialog,\n 1194 |                        gint       response_id,\n 1195 |                        gpointer   user_data)\n 1196 | {\n 1197 |     GtkWindow *parent_window;\n 1198 |     NautilusFile *file;\n 1199 |     GAppInfo *info;\n 1200 |     ActivateParametersInstall *parameters = user_data;\n 1201 | \n 1202 |     if (response_id != GTK_RESPONSE_OK)\n 1203 |     {\n 1204 |         gtk_window_destroy (GTK_WINDOW (dialog));\n 1205 |         return;\n 1206 |     }\n 1207 | \n 1208 |     parent_window = parameters->parent_window;\n 1209 |     file = g_object_get_data (G_OBJECT (dialog), \"mime-action:file\");\n 1210 |     info = gtk_app_chooser_get_app_info (GTK_APP_CHOOSER (dialog));\n 1211 | \n 1212 |     gtk_window_destroy (GTK_WINDOW (dialog));\n 1213 | \n 1214 |     g_signal_emit_by_name (nautilus_signaller_get_current (), \"mime-data-changed\");\n 1215 | \n 1216 |     nautilus_launch_application (info, &(NautilusFileList){ .data = file }, parent_window);\n 1217 | \n 1218 |     g_object_unref (info);\n 1219 | \n 1220 |     activate_parameters_install_free (parameters);\n 1221 | }"}]},{"id":"MEM_12","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"get_types_table() in nautilus-thumbnails.c inserts types[i] (individual strings from gdk_pixbuf_format_get_mime_types) into the hash as keys with g_free as key-destroy, then g_free(types) frees only the array, not the strings — correct. But the hash table is a permanent static cache never freed; that is intentional. No leak of the strings. However gdk_pixbuf_format_get_mime_types returns a g_strdupv-style array whose elements are owned; transferring element ownership to the hash while g_free-ing the container is correct only if the array container is separately allocated from elements (it is). Low-confidence; flag for verification that elements are not double-owned.","fix":"Verify ownership; if uncertain use g_strfreev on a copy and g_strdup keys. Current code appears correct.","locations":[{"ref":"src/nautilus-thumbnails.c:225-258","code":"  225 | static GHashTable *\n  226 | get_types_table (void)\n  227 | {\n  228 |     static GHashTable *image_mime_types = NULL;\n  229 |     GSList *format_list, *l;\n  230 |     char **types;\n  231 |     int i;\n  232 | \n  233 |     if (image_mime_types == NULL)\n  234 |     {\n  235 |         image_mime_types =\n  236 |             g_hash_table_new_full (g_str_hash, g_str_equal,\n  237 |                                    g_free, NULL);\n  238 | \n  239 |         format_list = gdk_pixbuf_get_formats ();\n  240 |         for (l = format_list; l; l = l->next)\n  241 |         {\n  242 |             types = gdk_pixbuf_format_get_mime_types (l->data);\n  243 | \n  244 |             for (i = 0; types[i] != NULL; i++)\n  245 |             {\n  246 |                 g_hash_table_insert (image_mime_types,\n  247 |                                      types [i],\n  248 |                                      GUINT_TO_POINTER (1));\n  249 |             }\n  250 | \n  251 |             g_free (types);\n  252 |         }\n  253 | \n  254 |         g_slist_free (format_list);\n  255 |     }\n  256 | \n  257 |     return image_mime_types;\n  258 | }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"real_batch_rename calls nautilus_file_get_existing() (which returns a new reference via nautilus_file_ref) for old_file/new_file in both the rollback loop and the invalidate loop, but never unrefs the returned NautilusFile objects. Every renamed file leaks two NautilusFile references per batch rename.","fix":"Wrap the results in g_autoptr (NautilusFile) or call nautilus_file_unref() on old_file/new_file after use in both loops (the rollback loop at 2212-2213 has the same leak).","locations":[{"ref":"src/nautilus-file.c:2226-2239","code":" 2226 |     for (l1 = old_files, l2 = new_files; l1 != NULL; l1 = l1->next, l2 = l2->next)\n 2227 |     {\n 2228 |         NautilusFile *old_file = nautilus_file_get_existing (l1->data);\n 2229 |         NautilusFile *new_file = nautilus_file_get_existing (l2->data);\n 2230 | \n 2231 |         if (old_file != NULL)\n 2232 |         {\n 2233 |             nautilus_file_invalidate_attributes (old_file, NAUTILUS_ATTRIBUTE_INFO);\n 2234 |         }\n 2235 |         if (new_file != NULL)\n 2236 |         {\n 2237 |             nautilus_file_invalidate_attributes (new_file, NAUTILUS_ATTRIBUTE_INFO);\n 2238 |         }\n 2239 |     }"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"create_row_popover() acquires GDrive, GVolume and GMount via g_object_get() with \"drive\", \"volume\", \"mount\" (all transfer-full), but never unrefs any of them in either code path. This leaks a reference to the drive/volume/mount on every right-click context menu in the sidebar. The HAVE_CLOUDPROVIDERS early return (return after build_popup_menu_using_gmenu) makes the leak unconditional even for cloud rows.","fix":"Unref drive, volume and mount before every return from create_row_popover() (e.g. with g_autoptr declarations, or explicit g_clear_object at the end and before the cloud-provider early return).","locations":[{"ref":"src/nautilus-sidebar.c:2909-2915
