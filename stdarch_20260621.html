<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`format_code` in stdarch-gen-arm calls `proc.stdin.as_ref().unwrap()` after\nspawning rustfmt. If rustfmt exits immediately (e.g. not found, or the pipe is\nbroken), the stdin handle is already closed and `as_ref()` returns None,\ncausing a panic instead of a proper error. The subsequent\n`proc.wait_with_output()` also drops the stdin pipe before waiting, which can\ncause rustfmt to receive SIGPIPE and exit with an error that is not checked\n(only the stdout bytes are returned, the exit status is silently ignored).\nA malformed YAML spec that produces syntactically invalid Rust will therefore\nsilently write garbage into the generated.rs output file.","fix":"Replace the stdin write with a checked write, drop stdin before waiting, and\ncheck the exit status:\n\n    let mut proc = Command::new(\"rustfmt\")\n        .stdin(Stdio::piped()).stdout(Stdio::piped()).spawn()?;\n    write!(proc.stdin.take().unwrap(), \"{input}\")?;  // take() drops the pipe\n    let out = proc.wait_with_output()?;\n    if !out.status.success() {\n        return Err(std::io::Error::other(\"rustfmt failed\"));\n    }\n    output.write_all(&out.stdout)","locations":[{"ref":"crates/stdarch-gen-arm/src/main.rs:183-189","code":"  183 |     let proc = Command::new(\"rustfmt\")\n  184 |         .stdin(Stdio::piped())\n  185 |         .stdout(Stdio::piped())\n  186 |         .spawn()?;\n  187 |     write!(proc.stdin.as_ref().unwrap(), \"{input}\")?;\n  188 |     output.write_all(proc.wait_with_output()?.stdout.as_slice())\n  189 | }","lines":7,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-arm/src/main.rs#L183-L189"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"TARGET env var is read with unwrap() in the proc-macro expansion context. If the macro is invoked in a build environment that does not set TARGET (e.g. in an IDE's proc-macro expansion), the macro panics instead of emitting a compile error.","fix":"Use std::env::var(\"TARGET\").unwrap_or_else(|_| \"x86_64-unknown-linux-gnu\".to_string()) or emit a compile_error! via syn::Error instead of panicking.","locations":[{"ref":"crates/assert-instr-macro/src/lib.rs:155","code":"  155 |         let target = std::env::var(\"TARGET\").unwrap();","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/assert-instr-macro/src/lib.rs#L155"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In stdarch-gen-loongarch `gen_bind` (line 195), `asm_fmts` is parsed as\n`line[10..].split(',')...`. The offset `10` assumes the prefix `\"asm-fmts = \"`\nis exactly 10 characters, but the actual prefix at that point is `\"asm-fmts = \"`\n(11 characters with the space), so the slice starts one character too early\n(the leading space of the value is included). The correct offset should be\n`11`. This results in every `asm_fmts[0]` having a leading space, which can\ncause the subsequent `asm_fmts[2].starts_with(\"ui\")` / `starts_with(\"si\")`\nchecks to fail silently or match incorrectly.","fix":"Change `line[10..]` to `line[11..]` to correctly skip the `\"asm-fmts = \"`\nprefix (11 characters). Alternatively, use\n`line.strip_prefix(\"asm-fmts = \").unwrap()` for clarity and correctness.","locations":[{"ref":"crates/stdarch-gen-loongarch/src/main.rs:194-197","code":"  194 |         } else if line.starts_with(\"asm-fmts = \") {\n  195 |             asm_fmts = line[10..]\n  196 |                 .split(',')\n  197 |                 .map(|v| v.trim().to_string())","lines":4,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-loongarch/src/main.rs#L194-L197"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In stdarch-gen-loongarch `gen_bind` (line 226), when `data_types.len()` is\nnot 2, 3, 4, or 5, the code calls `panic!(\"DEBUG: line: {0} len: {1}\", ...)`.\nThe debug-prefixed message and the `panic!` (rather than returning an error)\nmeans that processing a spec file with an unexpected data-type count terminates\nthe entire generator process immediately, without attempting to process\nremaining intrinsics or spec files. The same panic exists in `gen_test` (line\n852). Both panics have a leftover \"DEBUG:\" prefix indicating they were not\nintended to remain in production code.","fix":"Return an `io::Error` (or use `eprintln!` + `continue`) instead of panicking.\nRemove the \"DEBUG:\" prefix from the message. Change the `gen_bind` and\n`gen_test` functions to return `io::Result<()>` and propagate the error to\n`main`.","locations":[{"ref":"crates/stdarch-gen-loongarch/src/main.rs:226-227","code":"  226 |                 panic!(\"DEBUG: line: {0} len: {1}\", line, data_types.len());\n  227 |             }","lines":2,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-loongarch/src/main.rs#L226-L227"},{"ref":"crates/stdarch-gen-loongarch/src/main.rs:851-852","code":"  851 |             } else {\n  852 |                 panic!(\"DEBUG: line: {0} len: {1}\", line, data_types.len());","lines":2,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-loongarch/src/main.rs#L851-L852"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"Vec::leak is used to keep the disassembly output alive for the lifetime of the parse, preventing the buffer from being freed. This intentionally leaks memory on every test run. While not a runtime crash, each test run permanently leaks the entire disassembly output (potentially tens of MB for large test binaries) with no way to reclaim it.","fix":"Store the owned Vec<u8> in a local variable, convert to a String (with from_utf8_lossy creating a Cow), and pass a reference to parse(). Alternatively, change parse() to take a &[u8] and do the lossy conversion inside.","locations":[{"ref":"crates/stdarch-test/src/disassembly.rs:71","code":"   71 |     parse(&String::from_utf8_lossy(Vec::leak(output.stdout)))","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-test/src/disassembly.rs#L71"},{"ref":"crates/stdarch-test/src/disassembly.rs:101","code":"  101 |     let disassembly = String::from_utf8_lossy(Vec::leak(output.stdout));","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-test/src/disassembly.rs#L101"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"STDARCH_ASSERT_INSTR_LIMIT env var is parsed with a bare unwrap(). If the variable is set to a non-integer value (e.g. accidentally set to a path or a typo), the test harness panics with a confusing 'called unwrap() on an Err' message rather than a descriptive error.","fix":"Replace .parse().unwrap() with .parse().unwrap_or_else(|e| panic!(\"STDARCH_ASSERT_INSTR_LIMIT is not a valid integer: {e}\")) or use expect() with a message.","locations":[{"ref":"crates/stdarch-test/src/lib.rs:192","code":"  192 |             |v| v.parse().unwrap(),","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-test/src/lib.rs#L192"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"The assert_eq!(parts.len(), 4) inside the AArch64 shll-to-xtl normalization in disassembly.rs will abort the entire test run (not just skip the problematic function) if any future objdump version outputs these instructions with a different number of tokens. This is inside a per-instruction loop, so it would break all tests on that platform.","fix":"Replace the assert with a conditional: if parts.len() != 4 { continue; } (or log a warning), so malformed instructions are skipped rather than aborting.","locations":[{"ref":"crates/stdarch-test/src/disassembly.rs:185","code":"  185 |                         assert_eq!(parts.len(), 4);","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-test/src/disassembly.rs#L185"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"assert!(functions.insert(function)) in disassembly.rs panics if the same stdarch_test_shim function symbol appears twice in the disassembly. This can happen with certain LTO or debug builds where a symbol is emitted more than once. The assert gives no information about which function name was duplicated.","fix":"Replace the assert with a check: if !functions.insert(function) { eprintln!(\"warning: duplicate symbol ...\"); } and keep the last one, or at minimum print the function name in the panic message.","locations":[{"ref":"crates/stdarch-test/src/disassembly.rs:211","code":"  211 |         assert!(functions.insert(function));","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-test/src/disassembly.rs#L211"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In wasm.rs disassembly, every line starting with '(func ' is split on whitespace and the second token is immediately unwrapped. A malformed wasm text line that starts with '(func' but has no second whitespace-delimited token (e.g. '(func)') would panic.","fix":"Use .nth(1).unwrap_or_else(|| panic!(\"malformed wasm func line: {line}\")) or handle the None case gracefully by continuing to the next line.","locations":[{"ref":"crates/stdarch-test/src/wasm.rs:43","code":"   43 |         function.name = line.split_whitespace().nth(1).unwrap().to_string();","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-test/src/wasm.rs#L43"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In stdarch-verify/src/lib.rs, the walk() function panics on any filesystem error (read_dir().unwrap(), file.unwrap(), file_type().unwrap()) and also panics if a source file cannot be parsed as valid Rust syntax (syn::parse_str().expect(\"failed to parse\")). The proc-macro runs at compile time, so a parse failure for any .rs file in core_arch/src/x86* or arm* directories aborts the entire compile with a bare panic message and no file path.","fix":"Propagate errors up through Result and emit them as compile errors via syn::Error::new_spanned, and include the file path in any parse-failure message.","locations":[{"ref":"crates/stdarch-verify/src/lib.rs:456-480","code":"  456 |     for file in root.read_dir().unwrap() {\n  457 |         let file = file.unwrap();\n  458 |         if file.file_type().unwrap().is_dir() {\n  459 |             walk(&file.path(), files);\n  460 |             continue;\n  461 |         }\n  462 |         let path = file.path();\n  463 |         if path.extension().and_then(std::ffi::OsStr::to_str) != Some(\"rs\") {\n  464 |             continue;\n  465 |         }\n  466 | \n  467 |         if path.file_name().and_then(std::ffi::OsStr::to_str) == Some(\"test.rs\") {\n  468 |             continue;\n  469 |         }\n  470 | \n  471 |         let mut contents = String::new();\n  472 |         File::open(&path)\n  473 |             .unwrap_or_else(|_| panic!(\"can't open file at path: {}\", path.display()))\n  474 |             .read_to_string(&mut contents)\n  475 |             .expect(\"failed to read file to string\");\n  476 | \n  477 |         files.push((\n  478 |             syn::parse_str::<syn::File>(&contents).expect(\"failed to parse\"),\n  479 |             path.display().to_string(),\n  480 |         ));","lines":25,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-verify/src/lib.rs#L456-L480"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In stdarch-verify/src/lib.rs inside find_instrs(), both parse calls use .unwrap() on the inner syn parsers (lines 495-496: input.parse::<syn::Meta>().unwrap() and input.parse::<Token![,]>().unwrap()). Any attribute with an unexpected token stream would panic the proc-macro rather than returning a parse error through the syn::Result machinery.","fix":"Use the ? operator to propagate errors: input.parse::<syn::Meta>()?; input.parse::<Token![,]>()?;","locations":[{"ref":"crates/stdarch-verify/src/lib.rs:495-496","code":"  495 |             let _ = input.parse::<syn::Meta>().unwrap();\n  496 |             let _ = input.parse::<Token![,]>().unwrap();","lines":2,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-verify/src/lib.rs#L495-L496"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In examples/connect5.rs, 'count' is initialized to 0 at line 1209 and is only set inside the 'if pos_is_end(&test1)' branch. If the loop over all 225 squares (FILE_SIZE * RANK_SIZE) completes without pos_is_end ever returning true, count remains 0 and the subsequent 'duration / count as u32' at line 1232 panics with a division-by-zero. In normal gameplay this cannot occur on a 15x15 board, but it can happen if pos_is_end has a bug or if board constants are changed.","fix":"Guard the division: if count == 0 { println!(\"No moves counted\"); } else { println!(\"Average time per move: {:?}\", duration / count as u32); }. Alternatively, set count = FILE_SIZE * RANK_SIZE as i32 when the loop completes without breaking.","locations":[{"ref":"examples/connect5.rs:1209","code":" 1209 |         let mut count: i32 = 0;","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/examples/connect5.rs#L1209"},{"ref":"examples/connect5.rs:1232","code":" 1232 |             duration / count as u32","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/examples/connect5.rs#L1232"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In the AArch64 shll-to-xtl normalization code, parts[2] (the destination register with a trailing comma) is sliced as parts[2][0..parts[2].len() - 1]. If parts[2] is somehow an empty string, the subtraction underflows usize and panics. The assert_eq!(parts.len(), 4) just above guards the length but does not guard the content of each part.","fix":"Use parts[2].strip_suffix(',').unwrap_or(&parts[2]).to_owned() instead of the manual length subtraction.","locations":[{"ref":"crates/stdarch-test/src/disassembly.rs:185-190","code":"  185 |                         assert_eq!(parts.len(), 4);\n  186 |                         let mut new_parts = Vec::with_capacity(3);\n  187 |                         let new_instr = format!(\"{}{}{}\", &instr[..1], \"xtl\", &instr[5..]);\n  188 |                         new_parts.push(new_instr);\n  189 |                         new_parts.push(parts[1].clone());\n  190 |                         new_parts.push(parts[2][0..parts[2].len() - 1].to_owned()); // strip trailing comma","lines":6,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-test/src/disassembly.rs#L185-L190"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In ci/intrinsic-test.sh line 46, the --sysroot flag value is '{AARCH64_BE_TOOLCHAIN}/...' without the leading '$'. The shell expands this as the literal string '{AARCH64_BE_TOOLCHAIN}' rather than the variable value. Consequently, the aarch64_be cross-compiler will not find system headers when CFLAGS is used, causing compilation failures for all aarch64_be intrinsic tests.","fix":"Change '--sysroot={AARCH64_BE_TOOLCHAIN}/aarch64_be-none-linux-gnu/libc' to '--sysroot=${AARCH64_BE_TOOLCHAIN}/aarch64_be-none-linux-gnu/libc'.","locations":[{"ref":"ci/intrinsic-test.sh:46","code":"   46 |         export CFLAGS=\"-I${AARCH64_BE_TOOLCHAIN}/aarch64_be-none-linux-gnu/libc/usr/include --sysroot={AARCH64_BE_TOOLCHAIN}/aarch64_be-none-linux-gnu/libc -Wno-nonportable-vector-initialization\"","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/ci/intrinsic-test.sh#L46"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`__rndr` and `__rndrrs` in `aarch64/rand.rs` return `status as i32` where `status` is the\nsuccess-indicator bit from LLVM's `llvm.aarch64.rndr` intrinsic (1 = success, 0 = failure).\nThe ACLE specification for `__rndr` says the function shall return 0 on success and a non-zero\nvalue on failure. The current implementation returns 1 on success and 0 on failure - exactly\ninverted. Callers checking `if __rndr(p) != 0 { /* failure */ }` will treat every successful\ncall as failure and vice versa.","fix":"Change `status as i32` to `(!status) as i32` in both `__rndr` and `__rndrrs`.","locations":[{"ref":"crates/core_arch/src/aarch64/rand.rs:30-34","code":"   30 | pub unsafe fn __rndr(value: *mut u64) -> i32 {\n   31 |     let Tuple { bits, status } = rndr_();\n   32 |     unsafe { *value = bits };\n   33 |     status as i32\n   34 | }","lines":5,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/aarch64/rand.rs#L30-L34"},{"ref":"crates/core_arch/src/aarch64/rand.rs:44-48","code":"   44 | pub unsafe fn __rndrrs(value: *mut u64) -> i32 {\n   45 |     let Tuple { bits, status } = rndrrs_();\n   46 |     unsafe { *value = bits };\n   47 |     status as i32\n   48 | }","lines":5,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/aarch64/rand.rs#L44-L48"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`static_assert_simm_bits!` uses an off-by-one lower bound. The valid range for an N-bit signed\ninteger is [-(1 << (N-1)), (1 << (N-1)) - 1], i.e. [-2^(N-1), 2^(N-1)-1]. The macro computes\nthe lower bound as `(-1 << ($bits - 1)) - 1`, which equals `-(2^(N-1)) - 1` - one too small.\nFor example, with bits=8 the allowed range becomes [-129, 127] instead of the correct [-128, 127].\nThis means the compile-time guard silently passes a value that is out-of-range for the instruction,\npotentially generating undefined behavior at the LLVM IR level.","fix":"Change the lower-bound expression from `(-1 << ($bits - 1)) - 1` to `-(1 << ($bits - 1))`, giving: `static_assert!(-(1 << ($bits - 1)) <= $imm && $imm < (1 << ($bits - 1)), ...)`","locations":[{"ref":"crates/core_arch/src/macros.rs:53-65","code":"   53 | macro_rules! static_assert_simm_bits {\n   54 |     ($imm:ident, $bits:expr) => {\n   55 |         static_assert!(\n   56 |             (-1 << ($bits - 1)) - 1 <= $imm && $imm < (1 << ($bits - 1)),\n   57 |             concat!(\n   58 |                 stringify!($imm),\n   59 |                 \" doesn't fit in \",\n   60 |                 stringify!($bits),\n   61 |                 \" bits (signed)\",\n   62 |             )\n   63 |         )\n   64 |     };\n   65 | }","lines":13,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/macros.rs#L53-L65"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In nvptx/packed.rs, the assert_instr test attribute for f16x2_add specifies the instruction name 'add.rn.f16x22' (with an extra trailing '2'). The correct PTX instruction is 'add.rn.f16x2'. Because the test assertion will never match the actual emitted instruction, the test silently passes without actually verifying the correct instruction is generated.","fix":"Change '#[cfg_attr(test, assert_instr(add.rn.f16x22))]' to '#[cfg_attr(test, assert_instr(add.rn.f16x2))]'.","locations":[{"ref":"crates/core_arch/src/nvptx/packed.rs:33","code":"   33 | #[cfg_attr(test, assert_instr(add.rn.f16x22))]","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/nvptx/packed.rs#L33"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"idx_in_vec uses bitwise AND instead of modulo. For i8 elements the expression `IDX & 16` yields either 0 or 16, not a lane index in 0..15. For i16 elements `IDX & 8` yields 0 or 8 instead of 0..7. Only i32/u32 with 4 lanes (16/4=4, power of two) accidentally works. vec_insert and vec_extract silently access wrong lanes for every other element width.","fix":"Change `IDX & (16 / crate::mem::size_of::<T>() as u32)` to `IDX % (16 / crate::mem::size_of::<T>() as u32)`. The divisor is the lane count, and % gives the correct wrapping index.","locations":[{"ref":"crates/core_arch/src/powerpc/altivec.rs:459","code":"  459 |     const fn idx_in_vec<T, const IDX: u32>() -> u32 {","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/powerpc/altivec.rs#L459"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"validate_block_boundary encodes block boundaries >= 512 incorrectly. The LLVM s390.vlbb and s390.lcbb intrinsics expect a mode value in 0..5 (sequential: 64->0, 128->1, 256->2, 512->3, 2048->4, 4096->5). The current implementation `block_boundary as u32 >> 7` gives 0, 1, 2 for 64/128/256 but then 4 for 512, 16 for 2048, and 32 for 4096 - all out of range. This causes the LLVM intrinsic to receive an invalid mode value for any boundary above 256.","fix":"Replace `block_boundary as u32 >> 7` with a match or a lookup that produces the sequential encoding: 64->0, 128->1, 256->2, 512->3, 2048->4, 4096->5. For example: `(block_boundary as u32).trailing_zeros() - 6` gives the correct values (64.trailing_zeros()-6=0, 128-6=1, ..., 512-6=3, 2048-6=5... wait - 2048 is not contiguous). Use an explicit match: match block_boundary { 64=>0, 128=>1, 256=>2, 512=>3, 2048=>4, 4096=>5, _=>unreachable!() }.","locations":[{"ref":"crates/core_arch/src/s390x/vector.rs:480","code":"  480 | const fn validate_block_boundary(block_boundary: u16) -> u32 {","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/s390x/vector.rs#L480"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The compare_bytes helper in the relaxed SIMD test module never panics. When the actual result does not match any of the expected outputs it only prints to stderr via eprintln!, then returns normally. Every test that calls compare_bytes always passes, even if the intrinsic produces completely wrong output. This makes the entire relaxed_simd test suite a no-op for correctness.","fix":"Add `panic!(\"output did not match any expected value\")` (or equivalent) after the eprintln! loop, so test failures are actually reported. Since relaxed SIMD results are implementation-defined, the correct fix is to retain the multiple-valid-outputs design but make it actually fail when none matches.","locations":[{"ref":"crates/core_arch/src/wasm32/relaxed_simd.rs:368","code":"  368 |     fn compare_bytes(a: v128, b: &[v128]) {","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/wasm32/relaxed_simd.rs#L368"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`test_mm256_mulhrs_epi16` calls `_mm256_mullo_epi16` instead of `_mm256_mulhrs_epi16`. The function under test is never invoked. Additionally, the expected value `8` is wrong for `mulhrs`: `mulhrs(2, 4) = round((2 * 4) >> 15) = 0`, not `8`. The expected value is correct only for `mullo` (2 * 4 = 8).","fix":"Change `_mm256_mullo_epi16(a, b)` to `_mm256_mulhrs_epi16(a, b)` and update the expected value `e` to `_mm256_set1_epi16(0)` (since `round((2 * 4) >> 15) = 0`). Consider using larger operands that produce a non-zero result, e.g. `a = 0x4000, b = 0x4000` gives `mulhrs = 0x4000`.","locations":[{"ref":"crates/core_arch/src/x86/avx2.rs:5053-5060","code":" 5053 |     #[simd_test(enable = \"avx2\")]\n 5054 |     fn test_mm256_mulhrs_epi16() {\n 5055 |         let a = _mm256_set1_epi16(2);\n 5056 |         let b = _mm256_set1_epi16(4);\n 5057 |         let r = _mm256_mullo_epi16(a, b);\n 5058 |         let e = _mm256_set1_epi16(8);\n 5059 |         assert_eq_m256i(r, e);\n 5060 |     }","lines":8,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/avx2.rs#L5053-L5060"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In stdarch-gen-hexagon `parse_compound_expr`, the \"simple parameter name\"\nheuristic (lines 183-188) matches any identifier of 3 characters or fewer that\nis all alphanumeric or underscore. This means short builtin names like `vu`,\n`vv`, `qt`, `qs` are misclassified as parameter references. However, the C\nmacros in the header may use these exact short identifiers as both parameter\nnames and as partial builtin names in the same expression. If a parameter and a\nbuiltin share a 1-3 character name, the parser silently emits a\n`CompoundExpr::Param` instead of recognising a nested `BuiltinCall`, producing\na generated function body that calls a Rust variable as if it were a function\n(causing a compile error in the generated code, but only discovered at build\ntime, not at generator runtime).","fix":"Instead of a length heuristic, compare candidates against the known parameter\nnames derived from the parsed prototype. Pass the list of parameter names as a\n`&[&str]` argument to `parse_compound_expr` and only classify the token as a\n`Param` if it is actually a member of that list.","locations":[{"ref":"crates/stdarch-gen-hexagon/src/main.rs:183-189","code":"  183 |     if expr.len() <= 3\n  184 |         && expr.chars().all(|c| c.is_ascii_alphanumeric() || c == '_')\n  185 |         && !expr.contains(\"__\")\n  186 |     {\n  187 |         return Some(CompoundExpr::Param(expr.to_lowercase()));\n  188 |     }\n  189 | ","lines":7,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-hexagon/src/main.rs#L183-L189"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In stdarch-gen-hexagon `generate_extern_block`, the link name transformation\napplies the `.128B` suffix to every builtin whose name starts with `V6_` when\nin V128 mode (line 1277). Compound-helper builtins are also named with a `V6_`\nprefix (they are stored in `seen_builtins` as `\"V6_vandvrt\"`, etc.), so they\nalso get the `.128B` suffix. That is correct for the HVX vector builtins but\nmay be wrong for any helper that does not follow the `V6_xxx.128B` naming\npattern in LLVM (e.g. predicate-only operations). More critically, the simple\n`base_link` conversion `builtin_name.replace('_', \".\")` turns `V6_vaddb` into\n`V6.vaddb` (period after V6, not a dot-separated namespace), and then the\ncode prepends `llvm.hexagon.` to produce `llvm.hexagon.V6.vaddb`. LLVM\nactually expects `llvm.hexagon.V6_vaddb` (underscore preserved) - the HVX\nbuiltins keep the `V6_` prefix verbatim in their LLVM names. The `replace`\nconverts ALL underscores, corrupting the `V6_` prefix in the link name.","fix":"The link name should preserve `V6_` and only replace the suffix underscores:\n    let link_name = if builtin_name.starts_with(\"V6_\") {\n        let suffix = &builtin_name[3..]; // after \"V6_\"\n        let base = format!(\"V6_{}\", suffix.replace('_', \".\"));\n        if mode == VectorMode::V128 {\n            format!(\"llvm.hexagon.{}.128B\", base)\n        } else {\n            format!(\"llvm.hexagon.{}\", base)\n        }\n    } else {\n        format!(\"llvm.hexagon.{}\", builtin_name.replace('_', \".\"))\n    };","locations":[{"ref":"crates/stdarch-gen-hexagon/src/main.rs:1275-1281","code":" 1275 |         let base_link = builtin_name.replace('_', \".\");\n 1276 |         // 128-byte mode uses .128B suffix, 64-byte mode doesn't\n 1277 |         let link_name = if builtin_name.starts_with(\"V6_\") && mode == VectorMode::V128 {\n 1278 |             format!(\"llvm.hexagon.{}.128B\", base_link)\n 1279 |         } else {\n 1280 |             format!(\"llvm.hexagon.{}\", base_link)\n 1281 |         };","lines":7,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-hexagon/src/main.rs#L1275-L1281"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In ci/run.sh line 140, '$NOSTD' is compared against unquoted '1' while '$NORUN' uses a quoted '\"1\"'. In POSIX sh this specific comparison works because the unquoted '1' is a bare word, but the inconsistency violates the defensive quoting convention used everywhere else in the same condition. If '$NOSTD' were ever set to an empty string the comparison is still correct, but the inconsistency can mislead future editors into thinking one side is intentionally different.","fix":"Quote the value: change '[ \"$NOSTD\" != 1 ]' to '[ \"$NOSTD\" != \"1\" ]'.","locations":[{"ref":"ci/run.sh:140","code":"  140 | if [ \"$NORUN\" != \"1\" ] && [ \"$NOSTD\" != 1 ]; then","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/ci/run.sh#L140"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`__arm_mte_increment_tag<const OFFSET: i64, T>` in `aarch64/mte.rs` has no compile-time range\ncheck on `OFFSET`. The doc comment states `OFFSET` must be in [0, 15], which maps to the 4-bit\nunsigned field in the AArch64 `ADDG` instruction. Without a `static_assert_range!` or\n`static_assert_uimm_bits!` guard, negative or out-of-range values (e.g., OFFSET=-1, OFFSET=16)\nare silently forwarded to `llvm.aarch64.addg`. Behavior for out-of-range values is undefined\nat the hardware/LLVM level.","fix":"Add a compile-time range assertion before the intrinsic call: `static_assert!(OFFSET >= 0 && OFFSET <= 15, \"OFFSET must be in [0, 15]\");`","locations":[{"ref":"crates/core_arch/src/aarch64/mte.rs:53-55","code":"   53 | pub unsafe fn __arm_mte_increment_tag<const OFFSET: i64, T>(src: *const T) -> *const T {\n   54 |     addg_(src as *const (), OFFSET) as *const T\n   55 | }","lines":3,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/aarch64/mte.rs#L53-L55"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Eight `test_mm256_sub*` and `test_mm256_subs*` functions assert `r == b` using the `b` variable directly. With `a = 4` and `b = 2` the correct result `a - b = 2` coincidentally equals `b`. A function that returned its second argument unchanged would pass all eight tests. The assertion provides no discrimination between correct subtraction and an identity function on `b`.","fix":"Replace `assert_eq_m256i(r, b)` with a comparison against an explicitly constructed expected constant, e.g. `let e = _mm256_set1_epi16(2); assert_eq_m256i(r, e);`. Choose `a` and `b` values where `a - b != b`, for example `a = 5, b = 2` yields `3`, which is unambiguous.","locations":[{"ref":"crates/core_arch/src/x86/avx2.rs:5447","cod r","type_label":"Logic Error","severity":"low","easy":false,"description":"In avx512vnni.rs, the maskz variants of the VNNI accumulate-and-zero intrinsics (e.g. _mm512_maskz_dpwssd_epi32) call the unmasked accumulate first with the full src operand, then zero the non-selected lanes. This means the accumulation src+a*b is computed for all 16 lanes even for the zeroed-out lanes, performing unnecessary work. More importantly, for the zeroed lanes the Intel spec says the result is 0 (not src+a*b zeroed): the current implementation is semantically correct (zero-masking zeroes the non-selected lane outputs), but the intermediate computation uses src as the accumulator input for lanes that will be zeroed. This is correct per spec but wasteful. No functional bug.","fix":"No fix needed for correctness. A minor optimization would be to use a zero vector as the src for the inner call when computing maskz variants, saving the accumulation for the zeroed lanes. LLVM may already optimize this away.","locations":[{"ref":"crates/core_arch/src/x86/avx512vnni.rs:39-44","code":"   39 | pub fn _mm512_maskz_dpwssd_epi32(k: __mmask16, src: __m512i, a: __m512i, b: __m512i) -> __m512i {\n   40 |     unsafe {\n   41 |         let r = _mm512_dpwssd_epi32(src, a, b).as_i32x16();\n   42 |         transmute(simd_select_bitmask(k, r, i32x16::ZERO))\n   43 |     }\n   44 | }","lines":6,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/avx512vnni.rs#L39-L44"},{"ref":"crates/core_arch/src/x86/avx512vnni.rs:139-144","code":"  139 | pub fn _mm_maskz_dpwssd_epi32(k: __mmask8, src: __m128i, a: __m128i, b: __m128i) -> __m128i {\n  140 |     unsafe {\n  141 |         let r = _mm_dpwssd_epi32(src, a, b).as_i32x4();\n  142 |         transmute(simd_select_bitmask(k, r, i32x4::ZERO))\n  143 |     }\n  144 | }","lines":6,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/avx512vnni.rs#L139-L144"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"test_mm_rsqrt_ss iterates `for i in 0..4` and uses `assert_approx_eq!` for every lane. Lanes 1-3 are supposed to be pass-through copies of the input (scalar-only operation), so they should be identical to the input and warrant an exact `assert_eq!`, not an approximate one. The analogous test `test_mm_rcp_ss` (same file, lines 2171-2180) correctly uses `assert_approx_eq!` only for lane 0 and exact `assert_eq!` for lanes 1-3. The approx test for lanes 1-3 can hide a regression where those lanes are accidentally modified.","fix":"Mirror the structure of test_mm_rcp_ss: apply assert_approx_eq! only to lane 0, and use `assert_eq!(get_m128(r, i), get_m128(e, i))` for i in 1..4.","locations":[{"ref":"crates/core_arch/src/x86/sse.rs:2199-2201","code":" 2199 |         for i in 0..4 {\n 2200 |             assert_approx_eq!(get_m128(r, i), get_m128(e, i), 2. * rel_err);\n 2201 |         }","lines":3,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/sse.rs#L2199-L2201"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"_mm_shuffle_pd is a 2-lane shuffle: it selects one lane from `a` (bit 0 of MASK) and one from `b` (bit 1 of MASK). Only 2 bits are ever read. The guard `static_assert_uimm_bits!(MASK, 8)` allows values 0-255, so passing e.g. MASK=4 is silently accepted even though bits 2-7 are unused. The analogous 4-lane intrinsic `_mm_shuffle_ps` correctly uses 8 bits (2 bits per lane x 4 lanes). The correct bound for _mm_shuffle_pd is 2 bits.","fix":"Change `static_assert_uimm_bits!(MASK, 8)` to `static_assert_uimm_bits!(MASK, 2)`.","locations":[{"ref":"crates/core_arch/src/x86/sse2.rs:3094","code":" 3094 |     static_assert_uimm_bits!(MASK, 8);","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/sse2.rs#L3094"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In amx.rs _init_amx() on Linux, the match on '0b11 & (xfeatures >> 17)' handles values 0, 1, and 3 but uses unreachable!() for value 2. Value 2 means XFEATURE_XTILEDATA (bit 18) is permitted but XFEATURE_XTILECFG (bit 17) is not, which the kernel should prevent. However, if any future kernel version or unusual kernel configuration permits this state, the call silently panics with the unhelpful message 'internal error: entered unreachable code' rather than providing a diagnostic. The match arm for 2 is also missing from the documented contract.","fix":"Replace '_ => unreachable!()' with '2 => panic!(\"Unexpected XFEATURE state: XTILEDATA enabled without XTILECFG\")' followed by '_ => unreachable!()' to make the panic diagnostic rather than opaque, while still guarding against truly impossible values.","locations":[{"ref":"crates/core_arch/src/x86_64/amx.rs:1155-1168","code":" 1155 |             match 0b11 & (xfeatures >> 17) {\n 1156 |                 0 => panic!(\"AMX is not available\"),\n 1157 |                 1 => {\n 1158 |                     ret = unsafe {\n 1159 |                         syscall!(Sysno::arch_prctl, 0x1023, 18)\n 1160 |                             .expect(\"arch_prctl ARCH_REQ_XCOMP_PERM syscall failed\")\n 1161 |                     };\n 1162 |                     if ret != 0 {\n 1163 |                         panic!(\"Failed to enable AMX\");\n 1164 |                     }\n 1165 |                 }\n 1166 |                 3 => {}\n 1167 |                 _ => unreachable!(),\n 1168 |             }","lines":14,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86_64/amx.rs#L1155-L1168"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In fxsr.rs test_fxsave64, a second FxsaveArea 'b' is allocated and written by _fxsave64 but never read or compared against 'a'. The test follows the same save -> restore -> save pattern as the xsave tests but makes no assertion about the second saved state, so the test cannot detect incorrect restore behavior.","fix":"Either remove 'b' and its save call (the test already confirms no crash), or add a comparison of 'a.data' and 'b.data' after the second _fxsave64 call to verify idempotency.","locations":[{"ref":"crates/core_arch/src/x86_64/fxsr.rs:80-89","code":"   80 |     fn test_fxsave64() {\n   81 |         let mut a = FxsaveArea::new();\n   82 |         let mut b = FxsaveArea::new();\n   83 | \n   84 |         unsafe {\n   85 |             fxsr::_fxsave64(a.ptr());\n   86 |             fxsr::_fxrstor64(a.ptr());\n   87 |             fxsr::_fxsave64(b.ptr());\n   88 |         }\n   89 |     }","lines":10,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86_64/fxsr.rs#L80-L89"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In xsave.rs tests (test_xsave64, test_xsaveopt64, test_xsavec64) a second XsaveArea 'b' is allocated and written via a second _xsave*/save call but never read or compared against 'a'. The intent appears to be verifying that save -> restore -> save produces the same state (idempotency), but no assertion is made. As written, 'b' is a dead variable and the tests only verify that the three operations do not crash, not that they are correct.","fix":"After the second _xsave64/opt/c call, add an assertion comparing the relevant portions of 'a' and 'b' (e.g. the XSTATE_BV header bytes), or remove 'b' entirely if the idempotency check is intentionally not performed.","locations":[{"ref":"crates/core_arch/src/x86_64/xsave.rs:135-145","code":"  135 |     fn test_xsave64() {\n  136 |         let m = 0xFFFFFFFFFFFFFFFF_u64; //< all registers\n  13 ile parser for intrinsic-test's CLI, lines are filtered by !line.contains('#'). This drops any line that contains '#' anywhere, not just lines where '#' begins a comment. An intrinsic name like '_mm_foo#bar' (unlikely but possible in future entries) would be silently dropped. A line like 'intrinsic # comment' is also entirely dropped rather than having the comment portion stripped.","fix":"Strip from the first '#' to end-of-line before filtering empty lines, e.g. let line = line.split('#').next().unwrap().trim(); and then filter empty lines.","locations":[{"ref":"crates/intrinsic-test/src/common/cli.rs:59","code":"   59 |                     .filter(|line| !line.contains('#'))","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/intrinsic-test/src/common/cli.rs#L59"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In stdarch-gen-arm `intrinsic.rs` `generate_big_endian` (lines 1111-1118),\nthe loop walks `variant.compose` looking for the boundary between static\nasserts/LLVM links and regular expressions. If `variant.compose` is empty,\nthe initial access `expression = &variant.compose[0]` panics. The guard at\nline 1102 checks `!big_endian_expressions.is_empty()` before entering the\nbranch, and the caller only reaches this code if\n`big_endian_inverse.unwrap_or(false)` is true (line 1063), but an intrinsic\nwith `big_endian_inverse: true` and an empty `compose` list is not explicitly\nrejected earlier, so this is a reachable panic path for malformed spec input.","fix":"Add an early check: if `variant.compose.is_empty()` return without modifying\n`big_endian_compose`, or return an error so the caller can report the\nmalformed intrinsic definition.","locations":[{"ref":"crates/stdarch-gen-arm/src/intrinsic.rs:1106-1107","code":" 1106 |             let mut expression = &variant.compose[0];\n 1107 |             let needs_reordering = expression.is_static_assert() || expression.is_llvm_link();","lines":2,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-arm/src/intrinsic.rs#L1106-L1107"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In stdarch-gen-arm `load_store_tests.rs` `generate_load_store_tests`\n(lines 86-90), the code accesses `load_intrinsics[0].target_features[..]`\nwithout checking that `load_intrinsics` is non-empty. If no load intrinsics\nwere collected (e.g. a spec file with no load intrinsics but\n`generate_load_store_tests: true`), this panics with an index out-of-bounds\nerror rather than returning a clear error message.","fix":"Guard the access with an early return or check:\n    let manual_tests = if let Some(first) = load_intrinsics.first() {\n        match &first.target_features[..] { ... }\n    } else {\n        quote!()\n    };","locations":[{"ref":"crates/stdarch-gen-arm/src/load_store_tests.rs:87-91","code":"   87 |     let manual_tests = match &load_intrinsics[0].target_features[..] {\n   88 |         [s] if s == \"sve\" => TokenStream::from_str(MANUAL_TESTS)\n   89 |             .map_err(|e| format!(\"Manual tests are invalid: {e}\"))?,\n   90 |         _ => quote!(),\n   91 |     };","lines":5,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-arm/src/load_store_tests.rs#L87-L91"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In stdarch-gen-arm `main.rs`, `parse_args` uses a hard-coded relative path\n`\"../../crates/core_arch/src/\"` (line 132) appended to the directory of the\ncurrent executable to infer the output directory when none is given. This path\nrelies on the specific layout of the Cargo build output directory\n(`target/debug/` or `target/release/`) being exactly two levels deep relative\nto the workspace root. If the binary is run 2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/avx512fp16.rs#L2337"}]},{"id":"CPY_32","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In _mm_mask_div_sh and _mm_maskz_div_sh, the local variable holding the division result is named `add` - copy-pasted from _mm_mask_add_sh without renaming. The operation itself (extracta / extractb) is correct.","fix":"Rename `let mut add: f16` to `let mut div: f16` in both functions.","locations":[{"ref":"crates/core_arch/src/x86/avx512fp16.rs:2656","code":" 2656 |         let mut add: f16 = extractsrc;","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/avx512fp16.rs#L2656"},{"ref":"crates/core_arch/src/x86/avx512fp16.rs:2678","code":" 2678 |         let mut add: f16 = 0.;","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/avx512fp16.rs#L2678"}]},{"id":"CPY_33","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"_mm_cmpord_ps and _mm_cmpunord_ps call `cmpps(b, a, imm)` with arguments swapped relative to every other packed-compare wrapper in the same file (and relative to the SSE2 counterparts _mm_cmpord_pd / _mm_cmpunord_pd which correctly use `cmppd(a, b, imm)`). The ORDERED and UNORDERED predicates are symmetric so the result is numerically correct, but the inconsistency is a clear copy-paste artifact and makes the code misleading.","fix":"Change both calls to `cmpps(a, b, 7)` and `cmpps(a, b, 3)` respectively, matching the argument order used by all sibling wrappers in sse.rs and sse2.rs.","locations":[{"ref":"crates/core_arch/src/x86/sse.rs:641","code":"  641 |     unsafe { cmpps(b, a, 7) }","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/sse.rs#L641"},{"ref":"crates/core_arch/src/x86/sse.rs:655","code":"  655 |     unsafe { cmpps(b, a, 3) }","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/sse.rs#L655"}]},{"id":"CPY_34","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In the vpclmulqdq.rs test, the unroll! macro's [4] assignment arm (line 107) calls unroll! {$target[2] = $op::<2>($source);} after explicitly writing $target[2] = $op::<2>($source); at line 106. This means index 2 is assigned twice - the explicit assignment is immediately overwritten by the recursive macro expansion. In the assert arm (lines 113-117) the same pattern repeats: index 2 is asserted twice (explicit at line 115 and then again via the recursive [2] arm). This is a latent copy-paste artifact that doesn't affect correctness but wastes a write (assignment) or an assertion (test).","fix":"Remove the explicit $target[2] and assert_eq_m128i($op::<2>(...), ...) lines from the [4] arm, since the recursive unroll!{[2]} call already handles indices 1 and 0. The [4] arm should only emit indices 3 and then delegate 2..0 to unroll!{[3]}, not hardcode 2 twice.","locations":[{"ref":"crates/core_arch/src/x86/vpclmulqdq.rs:104-116","code":"  104 |         ($target:ident[4] = $op:ident::<4>($source:ident);) => {\n  105 |             $target[3] = $op::<3>($source);\n  106 |             $target[2] = $op::<2>($source);\n  107 |             unroll! {$target[2] = $op::<2>($source);}\n  108 |         };\n  109 |         ($target:ident[2] = $op:ident::<2>($source:ident);) => {\n  110 |             $target[1] = $op::<1>($source);\n  111 |             $target[0] = $op::<0>($source);\n  112 |         };\n  113 |         (assert_eq_m128i($op:ident::<4>($vec_res:ident),$lin_res:ident[4]);) => {\n  114 |             assert_eq_m128i($op::<3>($vec_res), $lin_res[3]);\n  115 |             assert_eq_m128i($op::<2>($vec_res), $lin_res[2]);\n  116 |             unroll! {assert_eq_m128i($op::<2>($vec_res),$lin_res[2]);}","lines":13,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/vpclmulqdq.rs#L104-L116"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"_mm_loadiwkey returns () and gives the caller no way to check whether the LOADIWKEY instruction succeeded. The doc comment at line 118-119 explicitly states 'software must check ZF to ensure that the key was loaded successfully' when KeySource=1, but the LLVM intrinsic (llvm.x86.loadiwkey) is void and the ZF flag is never surfaced. A caller using KeySource=1 cannot detect a failed key load, so a subsequent AES encrypt/decrypt operation silently uses an uninitialized or random IWKey.","fix":"Return a u8 status code (matching the ZF flag) from _mm_loadiwkey when KeySource=1, or at minimum document that ZF cannot be checked through this binding and that callers must use inline assembly or a CPUID check if they rely on KeySource=1 success detection. The LLVM intrinsic may need a new variant that returns the ZF.","locations":[{"ref":"crates/core_arch/src/x86/kl.rs:128-139","code":"  128 | #[inline]\n  129 | #[target_feature(enable = \"kl\")]\n  130 | #[stable(feature = \"keylocker_x86\", since = \"1.89.0\")]\n  131 | #[cfg_attr(test, assert_instr(loadiwkey))]\n  132 | pub unsafe fn _mm_loadiwkey(\n  133 |     control: u32,\n  134 |     integrity_key: __m128i,\n  135 |     key_lo: __m128i,\n  136 |     key_hi: __m128i,\n  137 | ) {\n  138 |     loadiwkey(integrity_key, key_lo, key_hi, control);\n  139 | }","lines":12,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/kl.rs#L128-L139"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In stdarch-gen-hexagon-scalar `parse_header` (lines 321-329), when a\n`#if __HEXAGON_ARCH__ >= N` guard is encountered the version is parsed with\n`caps[1].parse().unwrap_or(0)`. An unrecognised or malformed version number\nsilently resets the guard to `ArchGuard::None` (version 0 matches the\n`ArchGuard::Arch(0)` arm, which becomes `None` only if explicitly compared -\nactually it sets `current_guard = ArchGuard::Arch(0)`), causing all subsequent\nintrinsics to be emitted without any architecture guard. This means a\ncorrupted header file would silently generate intrinsics that are incorrectly\navailable on all Hexagon versions.","fix":"Replace `unwrap_or(0)` with a proper error: either return an error from\n`parse_header` (make it `Result`) or emit a warning and skip the block. At\nminimum, `unwrap_or_else(|_| { eprintln!(\"Warning: ...\"); 0 })` is better\nthan silent failure.","locations":[{"ref":"crates/stdarch-gen-hexagon-scalar/src/main.rs:307-330","code":"  307 |     let arch_guard_re = Regex::new(r\"#if __HEXAGON_ARCH__ >= (\\d+)(.*)\").unwrap();\n  308 |     let q6_define_re = Regex::new(r\"#define\\s+(Q6_\\w+)\\s+__builtin_HEXAGON_(\\w+)\").unwrap();\n  309 |     let proto_re = Regex::new(r\"(\\w+)\\s+Q6_\\w+\\(([^)]*)\\)\").unwrap();\n  310 |     let param_re = Regex::new(r\"(\\w+\\*{0,2})\\s+(\\w+)\").unwrap();\n  311 |     let imm_re = Regex::new(r\"^I([uUsS])(\\d+)\").unwrap();\n  312 | \n  313 |     let lines: Vec<&str> = content.lines().collect();\n  314 |     let mut current_guard = ArchGuard::None;\n  315 |     let mut i = 0;\n  316 | \n  317 |     while i < lines.len() {\n  318 |         let line = lines[i].trim();\n  319 | \n  320 |         // Track #if guards\n  321 |         if let Some(caps) = arch_guard_re.captures(line) {\n  322 |             let arch_ver: u32 = caps[1].parse().unwrap_or(0);\n  323 |             let rest = &caps[2];\n  324 |             if rest.contains(\"__HEXAGON_AUDIO__\") {\n  325 |                 current_guard = ArchGuard::ArchAudio(arch_ver);\n  326 |             } else {\n  327 |                 current_guard = ArchGuard::Arch(arch_ver);\n  328 |             }\n  329 |             i += 1;\n  330 |             continue;","lines":24,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-hexagon-scalar/src/main.rs#L307-L330"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In disassembly.rs, the parse() function counts lines twice: once with lines.clone().count() (which iterates the entire output string) and once in the actual parsing loop. For large binaries this counts potentially millions of lines just to print a diagnostic number.","fix":"Either remove the line count from the diagnostic message, or compute it lazily only when actually printing the header.","locations":[{"ref":"crates/stdarch-test/src/disassembly.rs:109-115","code":"  109 |     println!(\n  110 |         \"First 100 lines of the disassembly input containing {} lines:\",\n  111 |         lines.clone().count()\n  112 |     );\n  113 |     for line in output.lines().take(100) {\n  114 |         println!(\"{line}\");\n  115 |     }","lines":7,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-test/src/disassembly.rs#L109-L115"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In stdarch-gen-hexagon `VectorMode`, the method `lanes()` (line 64-66) always\nreturns `self.bytes() / 4` (32-bit lanes), hardcoded regardless of the actual\nelement type of any given intrinsic. It is only used in `generate_module_doc`\n(line 533) and `generate_types` (line 580) to populate documentation strings\nand type definitions. `HvxVectorPred` is documented and defined with the same\nlane count as `HvxVector`, even though predicate vectors have a conceptually\ndifferent lane structure. The `to_extern_str` method on `RustType` (lines\n160-170) is identical to `to_rust_str` (lines 149-158) - both produce the\nexact same output for every variant, making one of them dead code.","fix":"Either remove `to_extern_str` and use `to_rust_str` everywhere, or document\nwhy they are separate (e.g. for future divergence). The `lanes()` method\nshould either accept an element size parameter or be removed and the call\nsites updated to use `bytes() / element_size_bytes`.","locations":[{"ref":"crates/stdarch-gen-hexagon/src/main.rs:64-66","code":"   64 |     fn lanes(&self) -> u32 {\n   65 |         self.bytes() / 4 // 32-bit lanes\n   66 |     }","lines":3,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-hexagon/src/main.rs#L64-L66"},{"ref":"crates/stdarch-gen-hexagon/src/main.rs:149-170","code":"  149 |     fn to_rust_str(&self) -> &'static str {\n  150 |         match self {\n  151 |             RustType::HvxVector => \"HvxVector\",\n  152 |             RustType::HvxVectorPair => \"HvxVectorPair\",\n  153 |             RustType::HvxVectorPred => \"HvxVectorPred\",\n  154 |             RustType::I32 => \"i32\",\n  155 |             RustType::MutPtrHvxVector => \"*mut HvxVector\",\n  156 |             RustType::Unit => \"()\",\n  157 |         }\n  158 |     }\n  159 | \n  160 |     fn to_extern_str(&self) -> &'static str {\n  161 |         match self {\n  162 |             RustType::HvxVector => \"HvxVector\",\n  163 |             RustType::HvxVectorPair => \"HvxVectorPair\",\n  164 |             RustType::HvxVectorPred => \"HvxVectorPred\",\n  165 |             RustType::I32 => \"i32\",\n  166 |             RustType::MutPtrHvxVector => \"*mut HvxVector\",\n  167 |             RustType::Unit => \"()\",\n  168 |         }\n  169 |     }\n  170 | }","lines":22,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/stdarch-gen-hexagon/src/main.rs#L149-L170"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`HINT_NOP` is defined as a private constant in `arm_shared/hints.rs` (value 0) but is never\nused. The corresponding `__nop()` function uses an inline asm `\"nop\"` instruction instead of\ncalling the `hint()` LLVM intrinsic, so HINT_NOP exists only to mirror the LLVM encoding table\nbut is otherwise dead.","fix":"Remove the unused `HINT_NOP` constant, or add a `#[allow(dead_code)]` attribute if it is retained for documentation purposes.","locations":[{"ref":"crates/core_arch/src/arm_shared/hints.rs:123","code":"  123 | const HINT_NOP: i32 = 0;","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/arm_shared/hints.rs#L123"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"Two commented-out lines '// let c = 5 as i32;' appear in test_msa_sld_h (line 16846) and test_msa_sldi_h (line 16921). These are stale lines from an earlier draft where a third argument was apparently planned. The actual function calls only take two vector args plus an encoded shift constant. These lines are inert but misleading.","fix":"Remove both comment lines '// let c = 5 as i32;'.","locations":[{"ref":"crates/core_arch/src/mips/msa.rs:16846","code":"16846 |         // let c = 5 as i32;","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/mips/msa.rs#L16846"},{"ref":"crates/core_arch/src/mips/msa.rs:16921","code":"16921 |         // let c = 5 as i32;","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/mips/msa.rs#L16921"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"high","easy":true,"description":"sm4ks entire '# Details' doc block is copy-pasted from sm4ed. The Details section says 'Accelerates the round function F in the SM4 block cipher algorithm', but sm4ks implements the Key Schedule, not the round func :"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/avx512fp16.rs#L10696"},{"ref":"crates/core_arch/src/x86/avx512fp16.rs:10709","code":"10709 | /// Scale the packed single-precision (32-bit) floating-point elements in a using values from b, store","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/avx512fp16.rs#L10709"},{"ref":"crates/core_arch/src/x86/avx512fp16.rs:10732","code":"10732 | /// Scale the packed single-precision (32-bit) floating-point elements in a using values from b, store","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/avx512fp16.rs#L10732"},{"ref":"crates/core_arch/src/x86/avx512fp16.rs:10762","code":"10762 | /// Scale the packed single-precision (32-bit) floating-point elements in a using values from b, store","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/avx512fp16.rs#L10762"}]},{"id":"CMT_38","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The _mm_loadiwkey doc comment says 'control[1:4]: KeySource bits' (line 118) but Intel's ISA manual specifies the KeySource field as bits [4:1] (i.e., bits 1, 2, 3, 4 - a 4-bit field). The notation 'control[1:4]' is ambiguous: in Intel notation [hi:lo] this would be 4 bits (bits 4 down to 1), but in Rust/array notation it looks like a 4-element range starting at index 1. A related inconsistency: the description says 'The only allowed values are 0 and 1', which contradicts a 4-bit field - only bit 1 is the KeySource toggle bit; bits 2-4 are reserved. The comment is correct that only 0 or 1 are valid, but the bit-range notation is misleading.","fix":"Clarify the comment: 'control[1]: KeySource. Set to 0 for AES-GCM-SIV wrapping with the specified key; set to 1 for hardware-enforced random keys (caller must check ZF after the instruction). Bits 2-4 are reserved and must be 0.'","locations":[{"ref":"crates/core_arch/src/x86/kl.rs:116-119","code":"  116 | ///  - `control[1:4]`: KeySource bits. These bits specify the encoding method of the IWKey. The only\n  117 | ///    allowed values are `0` (AES GCM SIV wrapping algorithm with the specified key) and `1` (AES GCM\n  118 | ///    SIV wrapping algorithm with random keys enforced by hardware). After calling `_mm_loadiwkey` with\n  119 | ///    KeySource set to `1`, software must check `ZF` to ensure that the key was loaded successfully.","lines":4,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/kl.rs#L116-L119"}]},{"id":"CMT_39","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"_mm_div_ss doc comment says 'Divides the first component of `b` by `a`' but the implementation computes `_mm_cvtss_f32(a) / _mm_cvtss_f32(b)`, i.e. `a` divided by `b`. The doc is backwards.","fix":"Change the doc to 'Divides the first component of `a` by the corresponding element of `b`, copying the remaining components from `a`.' (matching the actual `a / b` computation and the Intel spec).","locations":[{"ref":"crates/core_arch/src/x86/sse.rs:91-92","code":"   91 | /// Divides the first component of `b` by `a`, the other components are\n   92 | /// copied from `a`.","lines":2,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86/sse.rs#L91-L92"}]},{"id":"CMT_40","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"_mm_cvti64_sh and _mm_cvt_roundi64_sh doc strings say 'copy the upper 3 packed elements from a to the upper elements of dst'. __m128h holds 8 half-precision (16-bit) elements; converting one 64-bit integer replaces element 0, so 7 elements are copied from a, not 3. The text appears to have been copy-pasted from a 32-bit element intrinsic without adjustment.","fix":"Change 'upper 3 packed elements' to 'upper 7 packed elements' in both doc comments.","locations":[{"ref":"crates/core_arch/src/x86_64/avx512fp16.rs:5-7","code":"    5 | /// Convert the signed 64-bit integer b to a half-precision (16-bit) floating-point element, store the\n    6 | /// result in the lower element of dst, and copy the upper 3 packed elements from a to the upper elements\n    7 | /// of dst.","lines":3,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86_64/avx512fp16.rs#L5-L7"},{"ref":"crates/core_arch/src/x86_64/avx512fp16.rs:18-20","code":"   18 | /// Convert the signed 64-bit integer b to a half-precision (16-bit) floating-point element, store the\n   19 | /// result in the lower element of dst, and copy the upper 3 packed elements from a to the upper elements\n   20 | /// of dst.","lines":3,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86_64/avx512fp16.rs#L18-L20"}]},{"id":"CMT_41","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"_mm_cvtu64_sh and _mm_cvt_roundu64_sh doc strings say 'copy the upper 1 packed elements from a to the upper elements of dst'. __m128h holds 8 half-precision (16-bit) elements; converting one 64-bit integer replaces element 0, so 7 elements are copied from a, not 1. Likely another copy-paste artifact from a different intrinsic family.","fix":"Change 'upper 1 packed elements' to 'upper 7 packed elements' in both doc comments.","locations":[{"ref":"crates/core_arch/src/x86_64/avx512fp16.rs:43-45","code":"   43 | /// Convert the unsigned 64-bit integer b to a half-precision (16-bit) floating-point element, store the\n   44 | /// result in the lower element of dst, and copy the upper 1 packed elements from a to the upper elements\n   45 | /// of dst.","lines":3,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86_64/avx512fp16.rs#L43-L45"},{"ref":"crates/core_arch/src/x86_64/avx512fp16.rs:56-58","code":"   56 | /// Convert the unsigned 64-bit integer b to a half-precision (16-bit) floating-point element, store the\n   57 | /// result in the lower element of dst, and copy the upper 1 packed elements from a to the upper elements\n   58 | /// of dst.","lines":3,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86_64/avx512fp16.rs#L56-L58"}]},{"id":"CMT_42","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The module-level doc comment in sse41.rs reads '`i686`'s Streaming SIMD Extensions 4.1 (SSE4.1)', but this file is under crates/core_arch/src/x86_64/ and contains only 64-bit-specific intrinsics (_mm_extract_epi64, _mm_insert_epi64). The i686 label is incorrect.","fix":"Change the first line from '//! `i686`'s Streaming SIMD Extensions 4.1 (SSE4.1)' to '//! `x86_64`'s Streaming SIMD Extensions 4.1 (SSE4.1)'.","locations":[{"ref":"crates/core_arch/src/x86_64/sse41.rs:1","code":"    1 | //! `i686`'s Streaming SIMD Extensions 4.1 (SSE4.1)","lines":1,"link":"https://github.com/rust-lang/stdarch/blob/5e2c15019ac18cf3cb46a7ad939736b52b30323c/crates/core_arch/src/x86_64/sse41.rs#L1"}]},{"id":"CMT_43","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"A triple-slash doc comment (///) is used as a regular inline comment inside a match arm in the equate() function. This is syntactically valid (a doc comment on an expression is accepted by the compiler but warns), but it is misleading - it will produce a 'unused doc comment' warning and does not document any item.","fix":"Change '///' to '//' for the comment on that line.","locations":[{"ref":"crates/stdarch-verify/tests/x86-intel.rs:883","code":"  883 |         /// I
