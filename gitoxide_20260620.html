tor from scratch with\n`p = pattern[p_idx..].iter().map(possibly_lowercase).enumerate().peekable();` and accumulates `p_idx_ofs`.\nRe-creating the iterator (rather than continuing from the current position) is an unusual control-flow that\nre-walks already-consumed bytes for offset bookkeeping. It is correct (verified by extensive fuzzing with no\npanics or OOB), but it is a subtle and costly construct for malformed/adversarial class patterns.","fix":"Consider restructuring the class parser to advance the existing iterator instead of rebuilding it, removing the need for `p_idx_ofs` offset accounting.","locations":[{"ref":"gix-glob/src/wildmatch.rs:280-300","code":"  280 |                             BRACKET_OPEN if matches!(p.peek(), Some((_, COLON))) => {\n  281 |                                 p.next();\n  282 |                                 while p.peek().is_some_and(|t| t.1 != BRACKET_CLOSE) {\n  283 |                                     p.next();\n  284 |                                 }\n  285 |                                 let closing_bracket_idx = match p.next() {\n  286 |                                     Some((idx, _)) => idx,\n  287 |                                     None => return AbortAll,\n  288 |                                 };\n  289 |                                 const BRACKET__COLON__BRACKET: usize = 3;\n  290 |                                 if closing_bracket_idx.saturating_sub(p_idx) < BRACKET__COLON__BRACKET\n  291 |                                     || pattern[closing_bracket_idx - 1] != COLON\n  292 |                                 {\n  293 |                                     if t_ch == BRACKET_OPEN {\n  294 |                                         matched = true;\n  295 |                                     }\n  296 |                                     if p_idx > pattern.len() {\n  297 |                                         return AbortAll;\n  298 |                                     }\n  299 |                                     p = pattern[p_idx..].iter().map(possibly_lowercase).enumerate().peekable();\n  300 |                                     p_idx_ofs += p_idx;","lines":21,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-glob/src/wildmatch.rs#L280-L300"}]},{"id":"PERF_25","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`icase_hash` recomputes the FNV hash of a path byte-by-byte (lowercasing each byte) and is\ncalled repeatedly for the same entry during `prepare_icase_backing` (once for the entry, and\nagain inside each `insert_unique`/`find` closure for every directory-prefix iteration). For\ndeep paths this rehashes overlapping prefixes many times. For very large indexes this is\nmeasurable. Minor / by-design tradeoff.","fix":"Consider caching the per-entry hash, or computing directory-prefix hashes incrementally.","locations":[{"ref":"gix-index/src/access/mod.rs:164-189","code":"  164 |             let mut last_pos = entry_path.len();\n  165 |             while let Some(slash_idx) = entry_path[..last_pos].rfind_byte(b'/') {\n  166 |                 let dir = entry_path[..slash_idx].as_bstr();\n  167 |                 last_pos = slash_idx;\n  168 |                 let dir_range = entry.path.start..(entry.path.start + dir.len());\n  169 | \n  170 |                 let hash = AccelerateLookup::icase_hash(dir);\n  171 |                 if out\n  172 |                     .icase_dirs\n  173 |                     .find(hash, |dir| {\n  174 |                         dir.path(self) == self.path_backing[dir_range.clone()].as_bstr()\n  175 |                     })\n  176 |                     .is_none()\n  177 |                 {\n  178 |                     out.icase_dirs.insert_unique(\n  179 |                         hash,\n  180 |                         crate::DirEntry {\n  181 |                             entry,\n  182 |                             dir_end: dir_range.end,\n  183 |                         },\n  184 |                         |dir| AccelerateLookup::icase_hash(dir.path(self)),\n  185 |                     );\n  186 |                 } else {\n  187 |                     break;\n  188 |                 }\n  189 |             }","lines":26,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/access/mod.rs#L164-L189"},{"ref":"gix-index/src/access/mod.rs:473-480","code":"  473 |     fn icase_hash(data: &BStr) -> u64 {\n  474 |         use std::hash::Hasher;\n  475 |         let mut hasher = fnv::FnvHasher::default();\n  476 |         for b in data.as_bytes() {\n  477 |             hasher.write_u8(b.to_ascii_lowercase());\n  478 |         }\n  479 |         hasher.finish()\n  480 |     }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/access/mod.rs#L473-L480"}]},{"id":"PERF_26","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`Tree`/`TreeRef` `WriteTo::size()` and `write_to()` both clone the entire `entries` vector just to run a `debug_assert_eq!` that they are sorted. In debug builds this is an O(n log n) allocation plus sort on every serialization; in release the clone is compiled out, but the readability cost remains. More importantly `size()` recomputes `mode.as_bytes(&mut buf)` per entry only to take its length, which is also done in `write_to`, duplicating work whenever both are called.","fix":"Replace the clone-and-sort `debug_assert_eq!` with an in-place `debug_assert!(entries.is_sorted())` (or windows()-based ordering check) to avoid the allocation even in debug builds.","locations":[{"ref":"gix-object/src/tree/write.rs:29-37","code":"   29 |         debug_assert_eq!(\n   30 |             &self.entries,\n   31 |             &{\n   32 |                 let mut entries_sorted = self.entries.clone();\n   33 |                 entries_sorted.sort();\n   34 |                 entries_sorted\n   35 |             },\n   36 |             \"entries for serialization must be sorted by filename\"\n   37 |         );","lines":9,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-object/src/tree/write.rs#L29-L37"},{"ref":"gix-object/src/tree/write.rs:76-84","code":"   76 |         debug_assert_eq!(\n   77 |             &{\n   78 |                 let mut entries_sorted = self.entries.clone();\n   79 |                 entries_sorted.sort();\n   80 |                 entries_sorted\n   81 |             },\n   82 |             &self.entries,\n   83 |             \"entries for serialization must be sorted by filename\"\n   84 |         );","lines":9,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-object/src/tree/write.rs#L76-L84"}]},{"id":"PERF_27","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`Arguments::is_empty` calls `self.args.iter().rev().any(|arg| arg.starts_with_str(\"want \"))`. The\n`.rev()` has no effect on `any()` (it still scans until the first match) and only adds a needless\nreverse-iterator wrapper. It is harmless but misleading - it suggests an intent (find the last/most\nrecent want) that `any` does not honor.","fix":"Drop the `.rev()`: `!self.args.iter().any(|arg| arg.starts_with_str(\"want \"))`.","locations":[{"ref":"gix-protocol/src/fetch/arguments/mod.rs:36-38","code":"   36 |     pub fn is_empty(&self) -> bool {\n   37 |         self.haves.is_empty() && !self.args.iter().rev().any(|arg| arg.starts_with_str(\"want \"))\n   38 |     }","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-protocol/src/fetch/arguments/mod.rs#L36-L38"}]},{"id":"PERF_28","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`PriorityQueue::from_iter` builds a `BinaryHeap` by repeated `insert` (push) calls rather than using\n`BinaryHeap::from`/`from_iter`, which can build the heap in O(n) instead of O(n log n). For the small\nseed queues used here (often 1-2 items) the impact is negligible, but the implementation is\nneedlessly suboptimal and the lib.rs comment already notes the queue is ~6% slower than alternatives.","fix":"Collect into a Vec and use `BinaryHeap::from(vec)` for O(n) heap construction.","locations":[{"ref":"gix-revwalk/src/queue.rs:116-124","code":"  116 | impl<K: Ord, T> FromIterator<(K, T)> for PriorityQueue<K, T> {\n  117 |     fn from_iter<I: IntoIterator<Item = (K, T)>>(iter: I) -> Self {\n  118 |         let mut q = PriorityQueue(BinaryHeap::new());\n  119 |         for (k, v) in iter {\n  120 |             q.insert(k, v);\n  121 |         }\n  122 |         q\n  123 |     }\n  124 | }","lines":9,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revwalk/src/queue.rs#L116-L124"}]},{"id":"PERF_29","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`check_content_type` collects all header lines into a `Vec` via `headers.lines().collect::<Result<Vec<_>, _>>()?` before scanning for the content-type, instead of iterating lazily and short-circuiting on the first match. For responses with many headers this materializes the entire header set unnecessarily.","fix":"Iterate `headers.lines()` lazily with `.any(...)` over `Result` items (e.g. using `try_fold` / a manual loop) and stop at the first matching content-type line.","locations":[{"ref":"gix-transport/src/client/blocking_io/http/mod.rs:273-288","code":"  273 |     fn check_content_type(service: Service, kind: &str, headers: <H as Http>::Headers) -> Result<(), client::Error> {\n  274 |         let wanted_content_type = format!(\"application/x-{}-{}\", service.as_str(), kind);\n  275 |         if !headers.lines().collect::<Result<Vec<_>, _>>()?.iter().any(|l| {\n  276 |             let mut tokens = l.split(':');\n  277 |             tokens.next().zip(tokens.next()).is_some_and(|(name, value)| {\n  278 |                 name.eq_ignore_ascii_case(\"content-type\") && value.trim() == wanted_content_type\n  279 |             })\n  280 |         }) {\n  281 |             return Err(client::Error::Http(Error::Detail {\n  282 |                 description: format!(\n  283 |                     \"Didn't find '{wanted_content_type}' header to indicate 'smart' protocol, and 'dumb' protocol is not supported.\"\n  284 |                 ),\n  285 |             }));\n  286 |         }\n  287 |         Ok(())\n  288 |     }","lines":16,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/mod.rs#L273-L288"}]},{"id":"PERF_30","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`host_matches` (credential helper section matching) calls `.clone().count()` on both split iterators just to compare field counts, then re-splits and zips. For each credential section this walks both strings an extra time. Minor, but on configs with many `credential.<url>` sections it is avoidable work.","fix":"Collect once or compare via a single zip that also detects length mismatch, avoiding the redundant count-walk of both iterators.","locations":[{"ref":"gix/src/config/snapshot/credential_helpers.rs:224-239","code":"  224 |     fn host_matches(pattern: Option<&str>, host: Option<&str>) -> bool {\n  225 |         match (pattern, host) {\n  226 |             (Some(pattern), Some(host)) => {\n  227 |                 let lfields = pattern.split('.');\n  228 |                 let rfields = host.split('.');\n  229 |                 if lfields.clone().count() != rfields.clone().count() {\n  230 |                     return false;\n  231 |                 }\n  232 |                 lfields.zip(rfields).all(|(pat, value)| {\n  233 | ew();\n   85 |     while let Some((commit_id, commit_info)) = walk_start.pop().filter(|_| count_still_independent > 1) {\n   86 |         stack.clear();\n   87 |         graph.get_mut(&commit_id).expect(\"added\").data |= Flags::STALE;\n   88 |         stack.push((commit_id, commit_info));\n   89 | \n   90 |         while let Some((commit_id, commit_info)) = stack.last().copied() {\n   91 |             let commit = graph.get_mut(&commit_id).expect(\"all commits have been added\");\n   92 |             let commit_parents = commit.parents.clone();\n   93 |             if commit.data.contains(Flags::RESULT) {\n   94 |                 commit.data.remove(Flags::RESULT);\n   95 |                 count_still_independent -= 1;\n   96 |                 if count_still_independent <= 1 {\n   97 |                     break;\n   98 |                 }\n   99 |                 if *commit_id == *sorted_commits[min_gen_pos].0 {\n  100 |                     while min_gen_pos < commits.len() - 1\n  101 |                         && graph\n  102 |                             .get(&sorted_commits[min_gen_pos].0)\n  103 |                             .expect(\"already added\")\n  104 |                             .data\n  105 |                             .contains(Flags::STALE)\n  106 |                     {\n  107 |                         min_gen_pos += 1;\n  108 |                     }\n  109 |                     min_gen = sorted_commits[min_gen_pos].1.generation;\n  110 |                 }","lines":53,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revision/src/merge_base/function.rs#L58-L110"}]},{"id":"DEAD_11","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"The `Error` enum for `receive()` carries a `// TODO: remove unused variants` marker, indicating the author\nbelieves some variants are no longer constructed. For example `Client(gix_protocol::transport::client::Error)`\nis declared but `receive()` never directly produces a `transport::client::Error` (transport errors arrive via\n`Fetch`). Unused error variants enlarge the (already `result_large_err`-suppressed) error type.","fix":"Audit which variants are still constructed and remove the dead ones (as the TODO suggests).","locations":[{"ref":"gix/src/remote/connection/fetch/error.rs:4-39","code":"    4 | // TODO: remove unused variants\n    5 | #[derive(Debug, thiserror::Error)]\n    6 | #[allow(missing_docs)]\n    7 | pub enum Error {\n    8 |     #[error(transparent)]\n    9 |     Fetch(#[from] gix_protocol::fetch::Error),\n   10 |     #[error(\"The value to configure pack threads should be 0 to auto-configure or the amount of threads to use\")]\n   11 |     PackThreads(#[from] config::unsigned_integer::Error),\n   12 |     #[error(\"The value to configure the pack index version should be 1 or 2\")]\n   13 |     PackIndexVersion(#[from] config::key::GenericError),\n   14 |     #[error(\"Cannot fetch from a remote that uses {remote} while local repository uses {local} for object hashes\")]\n   15 |     IncompatibleObjectHash {\n   16 |         local: gix_hash::Kind,\n   17 |         remote: gix_hash::Kind,\n   18 |     },\n   19 |     #[error(transparent)]\n   20 |     LoadAlternates(#[from] gix_odb::store::load_index::Error),\n   21 |     #[error(transparent)]\n   22 |     Client(#[from] gix_protocol::transport::client::Error),\n   23 |     #[error(transparent)]\n   24 |     UpdateRefs(#[from] super::refs::update::Error),\n   25 |     #[error(\"Failed to remove .keep file at \\\"{}\\\"\", path.display())]\n   26 |     RemovePackKeepFile {\n   27 |         path: std::path::PathBuf,\n   28 |         source: std::io::Error,\n   29 |     },\n   30 |     #[error(\"None of the refspec(s) {} matched any of the {num_remote_refs} refs on the remote\", refspecs.iter().map(|r| r.to_ref().instruction().to_bstring().to_string()).collect::<Vec<_>>().join(\", \"))]\n   31 |     NoMapping {\n   32 | ix":"Rename to `\"loose_object_stores\"`.","locations":[{"ref":"gitoxide-core/src/repository/verify.rs:57","code":"   57 |                     \"loose_object-stores\" : outcome.loose_object_stores","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/verify.rs#L57"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Error variant doc/message claims section names may only be \"ascii, '-'\" but `validated_name` actually\naccepts ASCII alphanumeric OR `-`. The message omits the alphanumeric part and is grammatically broken\n(\"can only be ascii, '-'\"), which is misleading for users diagnosing a rejected section name.","fix":"Reword to e.g. \"section names can only contain ASCII alphanumeric characters and '-'\" to match the\n`validated_name` predicate.","locations":[{"ref":"gix-config/src/parse/section/header.rs:14","code":"   14 |     #[error(\"section names can only be ascii, '-'\")]","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config/src/parse/section/header.rs#L14"},{"ref":"gix-config/src/parse/section/header.rs:55-60","code":"   55 | fn validated_name(name: Cow<'_, BStr>) -> Result<Cow<'_, BStr>, Error> {\n   56 |     name.iter()\n   57 |         .all(|b| b.is_ascii_alphanumeric() || *b == b'-')\n   58 |         .then_some(name)\n   59 |         .ok_or(Error::InvalidName)\n   60 | }","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config/src/parse/section/header.rs#L55-L60"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `Connectivity::check_commit` states \"Missing commits or trees will cause an error to be returned.\" This is only true for commits (the missing commit propagates a `Result` error). Missing *trees* do NOT return an error: `check_tree` invokes `missing_cb(oid, Kind::Tree)` and returns normally. The documented behavior contradicts the implementation.","fix":"Correct the comment to state that missing trees trigger `missing_cb` (only missing commits return an error), or change the code to match the documented behavior.","locations":[{"ref":"gix-fsck/src/lib.rs:48","code":"   48 |     /// Missing commits or trees will cause an error to be returned.","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fsck/src/lib.rs#L48"},{"ref":"gix-fsck/src/lib.rs:73-77","code":"   73 |     fn check_tree(&mut self, oid: &ObjectId, tree_ids: &mut VecDeque<ObjectId>) {\n   74 |         let Ok(tree) = self.db.find_tree(oid, &mut self.buf) else {\n   75 |             (self.missing_cb)(oid, Kind::Tree);\n   76 |             return;\n   77 |         };","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fsck/src/lib.rs#L73-L77"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `ListHandle::push`, the `len == 1` arm carries the comment \"This is an empty list. Allocate a block and set\nlength=1.\" but the list is not empty (it already holds one inline element in `self.index`), and the code in fact\nsets the length to 2 after moving the previously-inline element plus the new one into a freshly allocated block.\nThe comment is a left-over from the `len == 0` case and is misleading for a future reader of this subtle\npool-allocation code.","fix":"Replace with something like: \"List had a single inline element; allocate a 2-slot block and store both.\"","locations":[{"ref":"gix-imara-diff/src/histogram/list_pool.rs:230-237","code":"  230 |             1 => {\n  231 |                 // This is an empty list. Allocate a block and set length=1.\n  232 |                 let block = pool.alloc(0);\n  233 |                 pool.data[block] = self.index;\n  234 |                 pool.data[block + 1] = element;\n  235 |                 self.index = block as u32;\n  236 |                 self.len = 2;\n  237 |             }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-imara-diff/src/histogram/list_pool.rs#L230-L237"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Assert message reads 'reference splits should ever happen' - it is missing the word 'never'. On failure this panic message is misleading/nonsensical (compare the correct phrasing elsewhere in the codebase).","fix":"Change the message to 'reference splits should never happen'.","locations":[{"ref":"gix/src/repository/reference.rs:31","code":"   31 |         assert_eq!(edits.len(), 1, \"reference splits should ever happen\");","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/repository/reference.rs#L31"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Doc comment for `Worktree::id()` is self-contradictory: \"...if it is a linked worktree, or `None` if it's\na linked worktree.\" Both branches say \"linked worktree\". The `None` case is the main worktree (see the\nimplementation `id()` which returns `None` when there is no common dir).","fix":"Change the second clause to \"...or `None` if it is the main worktree\".","locations":[{"ref":"gix/src/worktree/mod.rs:89-92","code":"   89 |     /// Return the ID of the repository worktree, if it is a linked worktree, or `None` if it's a linked worktree.\n   90 |     pub fn id(&self) -> Option<&BStr> {\n   91 |         id(self.parent.git_dir(), self.parent.common_dir.is_some())\n   92 |     }","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/worktree/mod.rs#L89-L92"}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Contradictory doc on `Proxy::into_repo()`: the summary says it \"will fail if the `base()` cannot be read or\nif the worktree doesn't exist\", but the following `# Note` says \"it won't fail if the worktree doesn't exist.\"\nThe code does return `Error::MissingWorktree` when `base` is not a directory, so the summary is correct and the\nNote is wrong/misleading.","fix":"Remove or correct the contradictory `# Note` line.","locations":[{"ref":"gix/src/worktree/proxy.rs:98-109","code":"   98 |     /// Like `into_repo_with_possibly_inaccessible_worktree()` but will fail if the `base()` cannot be read or\n   99 |     /// if the worktree doesn't exist.\n  100 |     ///\n  101 |     /// Note that it won't fail if the worktree doesn't exist.\n  102 |     pub fn into_repo(self) -> Result<Repository, into_repo::Error> {\n  103 |         let base = self.base()?;\n  104 |         if !base.is_dir() {\n  105 |             return Err(into_repo::Error::MissingWorktree { base });\n  106 |         }\n  107 |         let repo = ThreadSafeRepository::open_from_paths(self.git_dir, base.into(), self.parent.options.clone())?;\n  108 |         Ok(repo.into())\n  109 |     }","lines":12,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/worktree/proxy.rs#L98-L109"}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `process_change`'s helper says \"The first line that is `range_with_end.end - 1`.\" which is an\nincomplete/garbled sentence (likely meant \"The last line is `range_with_end.end - 1`.\"). Minor but misleading for a\nfunction whose off-by-one semantics are central to correctness.","fix":"Reword to: \"The last included line is `range_with_end.end - 1`.\"","locations":[{"ref":"gix-blame/src/file/mod.rs:25-30","code":"   25 |     /// Since `range_with_end` is a range that is not inclusive at the end,\n   26 |     /// `range_with_end.end` is not part of `range_with_end`.\n   27 |     /// The first line that is `range_with_end.end - 1`.\n   28 |     fn actual_end_in_range(test: &Range<u32>, containing_range: &Range<u32>) -> bool {\n   29 |         (test.end - 1) >= containing_range.start && test.end <= containing_range.end\n   30 |     }","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-blame/src/file/mod.rs#L25-L30"}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment for `File::commit_at` and `File::id_at` states the position 'must range from 0 to `self.num_commits()`' / 'ranges from 0 to `self.num_commits()`', but the actual valid range is `0..num_commits()` (exclusive of `num_commits()`), as the `assert!(pos.0 < self.num_commits())` checks confirm. The inclusive phrasing is off-by-one and could mislead a caller into passing `num_commits()` and hitting the panic.","fix":"Reword the docs to 'from 0 to `num_commits() - 1`' or 'in range `0..num_commits()`', consistent with the `Position`/`num_commits()` docs elsewhere in the crate.","locations":[{"ref":"gix-commitgraph/src/file/access.rs:18-27","code":"   18 |     /// Returns the commit data for the commit located at the given lexicographical position.\n   19 |     ///\n   20 |     /// `pos` must range from 0 to `self.num_commits()`.\n   21 |     ///\n   22 |     /// # Panics\n   23 |     ///\n   24 |     /// Panics if `pos` is out of bounds.\n   25 |     pub fn commit_at(&self, pos: file::Position) -> Commit<'_> {\n   26 |         Commit::new(self, pos)\n   27 |     }","lines":10,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-commitgraph/src/file/access.rs#L18-L27"},{"ref":"gix-commitgraph/src/file/access.rs:36-52","code":"   36 |     /// Returns an object id at the given index in our list of (sorted) hashes.\n   37 |     /// The position ranges from 0 to `self.num_commits()`\n   38 |     // copied from gix-odb/src/pack/index/ext\n   39 |     pub fn id_at(&self, pos: file::Position) -> &gix_hash::oid {\n   40 |         assert!(\n   41 |             pos.0 < self.num_commits(),\n   42 |             \"expected lexicographical position less than {}, got {}\",\n   43 |             self.num_commits(),\n   44 |             pos.0\n   45 |         );\n   46 |         let pos: usize = pos\n   47 |             .0\n   48 |             .try_into()\n   49 |             .expect(\"an architecture able to hold 32 bits of integer\");\n   50 |         let start = self.oid_lookup_offset + (pos * self.hash_len);\n   51 |         gix_hash::oid::from_bytes_unchecked(&self.data[start..][..self.hash_len])\n   52 |     }","lines":17,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-commitgraph/src/file/access.rs#L36-L52"}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment grammar error: \"NUL byte are explicitly allowed.\" (should be \"NUL bytes are\"). The function\n`quoted_sub_section` indeed allows NUL, but the sentence is malformed and sits in public-facing parser docs.","fix":"Fix to 'NUL bytes are explicitly allowed.'","locations":[{"ref":"gix-config/src/parse/from_bytes/mod.rs:192","code":"  192 | /// NUL byte are explicitly allowed.","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config/src/parse/from_bytes/mod.rs#L192"}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment for `path()` states it 'Returns (status, file_kind, pathspec_matches_how)',\na 3-tuple, but the function actually returns an `Outcome` struct with five fields (status,\nproperty, disk_kind, index_kind, pathspec_match). The documented return shape is stale.","fix":"Update the doc comment to describe the `Outcome` struct and its fields.","locations":[{"ref":"gix-dir/src/walk/classify.rs:128-129","code":"  128 | /// Returns `(status, file_kind, pathspec_matches_how)` to identify the `status` on disk, along with a classification `file_kind`,\n  129 | /// and if `file_kind` is not a directory, the way the pathspec matched with `pathspec_matches_how`.","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-dir/src/walk/classify.rs#L128-L129"}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment typo/garbled text: 'A function that writes a buffer like `fn(&mut buf)` with by tes of an\nobject...' - 'by tes' should be 'bytes'. Minor but it is in a public-facing type alias doc.","fix":"Fix 'by tes' -> 'bytes'.","locations":[{"ref":"gix-filter/src/eol/convert_to_git.rs:41","code":"   41 | /// A function that writes a buffer like `fn(&mut buf)` with by tes of an object in the index that is the one that should be converted.","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-filter/src/eol/convert_to_git.rs#L41"}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Stale/garbled doc comments: `lib.rs` field `current` is \"the most recent known cached that we know is valid\" (broken phrasing), and `current_relative` is \"The relative portion of `valid`\" but there is no field named `valid` (renamed to `current`). Other typos: create.rs:91 / remove.rs:6 \"once or more success\", lib.rs \"most be set\", symlink.rs \"symlnk\".","fix":"Fix the wording and stale field reference.","locations":[{"ref":"gix-fs/src/lib.rs:124-128","code":"  124 |     /// the most recent known cached that we know is valid.\n  125 |     current: PathBuf,\n  126 |     /// The relative portion of `valid` that was added previously.\n  127 |     current_relative: PathBuf,\n  128 |     /// The amount of path components of 'current' beyond the roots components.","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fs/src/lib.rs#L124-L128"},{"ref":"gix-fs/src/dir/create.rs:91","code":"   91 | /// * `Some(Ok(created_directory))` is yielded once or more success, followed by `None`","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fs/src/dir/create.rs#L91"},{"ref":"gix-fs/src/symlink.rs:86","code":"   86 |             || err.raw_os_error() == Some(62) // no-follow on symlnk on mac-os","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fs/src/symlink.rs#L86"}]},{"id":"CMT_17","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment for `nsecs` says it ranges 'from 0 to 999.999.999' but the field is a plain\n`u32` with no enforcement, and `system_time_from_secs_nanos`/decode paths accept any u32.\nThe comment overstates a guarantee the type does not provide. Minor doc inaccuracy.","fix":"Reword to 'typically 0..1_000_000_000' or note the value is not validated.","locations":[{"ref":"gix-index/src/entry/stat.rs:146-147","code":"  146 |     /// The amount of nanoseconds elapsed in the current second, ranging from 0 to 999.999.999 .\n  147 |     pub nsecs: u32,","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/entry/stat.rs#L146-L147"}]},{"id":"CMT_18","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"A stray doc comment `/// An object database equivalent to `/dev/null`, dropping all objects stored into it.`\nis attached to the `mod traits;` declaration, but `traits` contains the `Header`/`HeaderExt` traits, not the\nsink/`/dev/null` database. The `/dev/null`-like database is the `Sink` type defined elsewhere. The comment is\nmisplaced and misleading.","fix":"Remove or correct the comment on `mod traits;`; the `/dev/null`-style description belongs to `Sink`.","locations":[{"ref":"gix-odb/src/lib.rs:111-112","code":"  111 | /// An object database equivalent to `/dev/null`, dropping all objects stored into it.\n  112 | mod traits;","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/lib.rs#L111-L112"}]},{"id":"CMT_19","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `load_one_index` reads \"If `None` is returned, there is new indices and the caller should\ngive up.\" This is grammatically broken and semantically inverted: `Ok(None)` means there are *no* new indices\n(nothing more to load), which is exactly when the caller should give up. The comment as written says the\nopposite of the intent.","fix":"Reword to: \"If `Ok(None)` is returned, there are no new indices and the caller should give up.\"","locations":[{"ref":"gix-odb/src/store_impls/dynamic/load_index.rs:74-75","code":"   74 |     /// If `None` is returned, there is new indices and the caller should give up. This is a possibility even if it's allowed to refresh\n   75 |     /// as here might be no change to pick up.","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/store_impls/dynamic/load_index.rs#L74-L75"}]},{"id":"CMT_20","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`into_bstr` (line 80) and `from_bstr` (line 120) both use the copy-pasted `expect` message \"prefix path doesn't contain ill-formed UTF-8\", but neither is about a prefix path. The sibling `from_bstring`/`from_byte_slice` use the accurate \"well-formed UTF-8 on windows\". The misleading messages would confuse anyone reading a panic backtrace.","fix":"Replace with an accurate message matching the sibling functions, e.g. \"well-formed UTF-8 on windows\".","locations":[{"ref":"gix-path/src/convert.rs:80","code":"   80 |     try_into_bstr(path).expect(\"prefix path doesn't contain ill-formed UTF-8\")","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/convert.rs#L80"},{"ref":"gix-path/src/convert.rs:120","code":"  120 |     try_from_bstr(input).expect(\"prefix path doesn't contain ill-formed UTF-8\")","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/convert.rs#L120"}]},{"id":"CMT_21","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Several doc comments are truncated/incomplete, ending mid-sentence with 'Note that the' or 'Note that':\n`gix-pathspec` `Pattern::to_bstring` ('Note that the'), and `gix-glob::parse` top-level fn ('Note that').\nThese look like unfinished documentation.","fix":"Complete or remove the dangling sentences.","locations":[{"ref":"gix-pathspec/src/pattern.rs:154","code":"  154 |     /// Note that the","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pathspec/src/pattern.rs#L154"},{"ref":"gix-glob/src/lib.rs:62","code":"   62 | /// Note that","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-glob/src/lib.rs#L62"}]},{"id":"CMT_22","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The SAFETY comment on the mmap reads \"Git never writes into the same file\",\nused to justify `map_copy_read_only`. The justification is about git's\nbehavior, but the buffer is opened for arbitrary repositories possibly written\nby non-git tools; the comment overstates the safety guarantee (see related\nmmap finding).","fix":"Reword to acknowledge that external mutation can cause SIGBUS, and that\ncopy-on-write mapping only protects against our own writes, not file\ntruncation by others.","locations":[{"ref":"gix-ref/src/store/packed/buffer.rs:87-92","code":"   87 |                     // SAFETY: we have to take the risk of somebody changing the file underneath. Git never writes into the same file.\n   88 |                     #[allow(unsafe_code)]\n   89 |                     unsafe {\n   90 |                         memmap2::MmapOptions::new().map_copy_read_only(&std::fs::File::open(&path)?)?\n   91 |                     },\n   92 |                 )","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-ref/src/store/packed/buffer.rs#L87-L92"}]},{"id":"CMT_23","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment on `Options::max_candidates` says \"If the number is exceeded, it will be capped at 32 and\ndefaults to 10.\" This is misleading/contradictory: the code caps it at `MAX_CANDIDATES` (32) via\n`max_candidates.min(MAX_CANDIDATES)` but there is no \"defaults to 10\" behavior when the value is\nexceeded - the 10 default only applies via `Options::default()`. The phrase conflates capping with\ndefaulting.","fix":"Reword to: \"Values above 32 are capped to 32. The default (via Options::default) is 10.\"","locations":[{"ref":"gix-revision/src/describe.rs:108-110","code":"  108 |     ///\n  109 |     /// If the number is exceeded, it will be capped at 32 and defaults to 10.\n  110 |     pub max_candidates: usize,","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revision/src/describe.rs#L108-L110"},{"ref":"gix-revision/src/describe.rs:168","code":"  168 |         max_candidates = max_candidates.min(MAX_CANDIDATES);","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revision/src/describe.rs#L168"}]},{"id":"CMT_24","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment for `ProgramKind::Putty` says \"The `putty.exe` binary\", duplicating the description style but the field above (`Plink`) already says \"The `(plink|putty).exe` binaries\". More importantly, `restore_thread_after_failure` in the reqwest backend has an error message that mentions curl: `.expect_err(\"something should have gone wrong with curl (we join on error only)\")` - this is a copy-paste from the curl backend and is misleading in the reqwest module.","fix":"Update the reqwest `expect_err` message to refer to reqwest rather than curl.","locations":[{"ref":"gix-transport/src/client/blocking_io/http/reqwest/remote.rs:214-226","code":"  214 |     fn restore_thread_after_failure(&mut self) -> http::Error {\n  215 |         let err_that_brought_thread_down = self\n  216 |             .handle\n  217 |             .take()\n  218 |             .expect(\"thread handle present\")\n  219 |             .join()\n  220 |             .expect(\"handler thread should never panic\")\n  221 |             .expect_err(\"something should have gone wrong with curl (we join on error only)\");\n  222 |         *self = Remote::default();\n  223 |         http::Error::InitHttpClient {\n  224 |             source: Box::new(err_that_brought_thread_down),\n  225 |         }\n  226 |     }","lines":13,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/reqwest/remote.rs#L214-L226"},{"ref":"gix-transport/src/client/blocking_io/http/curl/mod.rs:68-81","code":"   68 |     fn restore_thread_after_failure(&mut self) -> http::Error {\n   69 |         let err_that_brought_thread_down = self\n   70 |             .handle\n   71 |             .take()\n   72 |             .expect(\"thread handle present\")\n   73 |             .join()\n   74 |             .expect(\"handler thread should never panic\")\n   75 |             .expect_err(\"something should have gone wrong with curl (we join on error only)\");\n   76 |         let (handle, req, res) = remote::new();\n   77 |         self.handle = Some(handle);\n   78 |         self.req = req;\n   79 |         self.res = res;\n   80 |         err_that_brought_thread_down.into()\n   81 |     }","lines":14,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/curl/mod.rs#L68-L81"}]},{"id":"CMT_25","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment for `ProgramKind::Simple` reads \"A minimal ssh client that supports on options.\" - this is a typo; it should read \"supports no options\" (the variant explicitly errors when a port is requested and provides no exe name).","fix":"Fix the typo: \"A minimal ssh client that supports no options.\"","locations":[{"ref":"gix-transport/src/client/blocking_io/ssh/mod.rs:35-36","code":"   35 |     /// A minimal ssh client that supports on options.\n   36 |     Simple,","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/ssh/mod.rs#L35-L36"}]},{"id":"CMT_26","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`path_argument_safe`'s doc says the path \"always begins with a slash, which is ignored for this comparison\", and the impl does `self.path.get(1..)` before checking `looks_like_command_line_option`. But the struct doc itself notes paths may be normalized to `~repo` (no leading slash) for SSH/Git, in which case `get(1..)` skips the first real character and checks the wrong substring. The \"always begins with a slash\" assumption is false for `~`-paths.","fix":"Only skip the leading byte when the path actually starts with `/`, and correct the comment.","locations":[{"ref":"gix-url/src/lib.rs:322-331","code":"  322 |     /// Return the path of this URL *if* it can't be mistaken for a command-line argument.\n  323 |     /// Note that it always begins with a slash, which is ignored for this comparison.\n  324 |     ///\n  325 |     /// Use this method instead of accessing [Self::path] directly if the path is going to be passed to a\n  326 |     /// command-line application, unless it is certain that the leading `/` will always be included.\n  327 |     pub fn path_argument_safe(&self) -> Option<&BStr> {\n  328 |         self.path\n  329 |             .get(1..)\n  330 |             .and_then(|truncated| (!looks_like_command_line_option(truncated)).then_some(self.path.as_ref()))\n  331 |     }","lines":10,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-url/src/lib.rs#L322-L331"}]},{"id":"CMT_27","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Misleading variable name in attributes::push_directory: `let no_follow_symlinks = false;` with the comment \"Git does\nnot follow symbolic links as per documentation.\" A value named `no_follow_symlinks` set to `false` reads as \"do\nfollow symlinks\", contradicting both the comment and the intent. The value is passed as the `follow_symlinks`\nparameter of add_patterns_file, so `false` means \"do not follow\" - correct behavior, wrong name. This is confusing\nand error-prone for maintainers.","fix":"Rename to `let follow_symlinks = false;` to match the parameter it feeds and the documented behavior.","locations":[{"ref":"gix-worktree/src/stack/state/attributes.rs:99-100","code":"   99 |         // Git does not follow symbolic links as per documentation.\n  100 |         let no_follow_symlinks = false;","lines":2,"link" (function(){

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
