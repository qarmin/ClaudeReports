      None,\n   45 |                 gix_object::CommitRefIter::from_bytes(buf, self.object_hash)\n   46 |                     .committer()?\n   47 |                     .seconds(),\n   48 |             ),\n   49 |             Either::Right((cache, pos)) => {\n   50 |                 let commit = cache.commit_at(*pos);\n   51 |                 (\n   52 |                     commit.generation().into(),\n   53 |                     // a cast as we cannot represent the error and trying seems overkill\n   54 |                     cache.commit_at(*pos).committer_timestamp() as SecondsSinceUnixEpoch,\n   55 |                 )\n   56 |             }\n   57 |         })\n   58 |     }","lines":21,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revwalk/src/graph/commit.rs#L38-L58"},{"ref":"gix-revwalk/src/graph/commit.rs:100-106","code":"  100 |                 Commit {\n  101 |                     parents,\n  102 |                     commit_time: commit.committer_timestamp().try_into().map_err(|_| {\n  103 |                         to_owned::Error::CommitGraphTime {\n  104 |                             actual: commit.committer_timestamp(),\n  105 |                         }\n  106 |                     })?,","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revwalk/src/graph/commit.rs#L100-L106"}]},{"id":"ERR_31","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`restore_thread_after_failure` (both curl and reqwest) joins the worker thread and calls `.expect(\"handler thread should never panic\")` followed by `.expect_err(\"...we join on error only\")`. If the worker thread ever panics (e.g. an unexpected panic in reqwest/curl callbacks or in the `pipe` machinery), this turns a recoverable channel-disconnect into a hard abort of the calling thread, and the second `expect_err` will also panic if the thread happened to return `Ok(())` (a benign shutdown) rather than an error.","fix":"Handle `Err(_)` from `join()` and the `Ok(())` case from the thread result by converting them into `http::Error` values instead of `expect`/`expect_err`.","locations":[{"ref":"gix-transport/src/client/blocking_io/http/curl/mod.rs:68-81","code":"   68 |     fn restore_thread_after_failure(&mut self) -> http::Error {\n   69 |         let err_that_brought_thread_down = self\n   70 |             .handle\n   71 |             .take()\n   72 |             .expect(\"thread handle present\")\n   73 |             .join()\n   74 |             .expect(\"handler thread should never panic\")\n   75 |             .expect_err(\"something should have gone wrong with curl (we join on error only)\");\n   76 |         let (handle, req, res) = remote::new();\n   77 |         self.handle = Some(handle);\n   78 |         self.req = req;\n   79 |         self.res = res;\n   80 |         err_that_brought_thread_down.into()\n   81 |     }","lines":14,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/curl/mod.rs#L68-L81"},{"ref":"gix-transport/src/client/blocking_io/http/reqwest/remote.rs:214-226","code":"  214 |     fn restore_thread_after_failure(&mut self) -> http::Error {\n  215 |         let err_that_brought_thread_down = self\n  216 |             .handle\n  217 |             .take()\n  218 |             .expect(\"thread handle present\")\n  219 |             .join()\n  220 |             .expect(\"handler thread should never panic\")\n  221 |             .expect_err(\"something should have gone wrong with curl (we join on error only)\");\n  222 |         *self = Remote::default();\n  223 |         http::Error::InitHttpClient {\n  224 |             source: Box::new(err_that_brought_thread_down),\n  225 |         }\n  226 |     }","lines":13,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/reqwest/remote.rs#L214-L226"}]},{"id":"ERR_32","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`parse_status` returns error kind 500 for any failure of `parse_status_inner` (e.g. a header line that isn't the status line, or a non-UTF8 / non-numeric status). The header callback is invoked for the very first header line which is expected to be the status line, but if curl's first delivered header is not parseable as `HTTP/<ver> <status>`, the code fabricates a synthetic '500' status and an error, masking the real cause. Combined with `checked_status` being flipped on the first header unconditionally, a single unexpected first header poisons the whole request.","fix":"Distinguish 'not a status line' from 'bad status': only treat the line as the status line if it starts with `HTTP/`, otherwise forward it as a normal header rather than synthesizing a 500.","locations":[{"ref":"gix-transport/src/client/blocking_io/http/curl/remote.rs:42-62","code":"   42 |     fn parse_status_inner(data: &[u8]) -> Result<usize, Box<dyn std::error::Error + Send + Sync>> {\n   43 |         let code = data\n   44 |             .split(|b| *b == b' ')\n   45 |             .nth(1)\n   46 |             .ok_or(\"Expected HTTP/<VERSION> STATUS\")?;\n   47 |         let code = std::str::from_utf8(code)?;\n   48 |         code.parse().map_err(Into::into)\n   49 |     }\n   50 |     fn parse_status(data: &[u8], follow: FollowRedirects) -> Option<(usize, Box<dyn std::error::Error + Send + Sync>)> {\n   51 |         let valid_end = match follow {\n   52 |             FollowRedirects::Initial | FollowRedirects::All => 308,\n   53 |             FollowRedirects::None => 299,\n   54 |         };\n   55 |         match Self::parse_status_inner(data) {\n   56 |             Ok(status) if !(200..=valid_end).contains(&status) => {\n   57 |                 Some((status, format!(\"Received HTTP status {status}\").into()))\n   58 |             }\n   59 |             Ok(_) => None,\n   60 |             Err(err) => Some((500, err)),\n   61 |         }\n   62 |     }","lines":21,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/curl/remote.rs#L42-L62"},{"ref":"gix-transport/src/client/blocking_io/http/curl/remote.rs:81-107","code":"   81 |     fn header(&mut self, data: &[u8]) -> bool {\n   82 |         if let Some(writer) = self.send_header.as_mut() {\n   83 |             if self.checked_status {\n   84 |                 writer.write_all(data).ok();\n   85 |             } else {\n   86 |                 self.checked_status = true;\n   87 |                 self.last_status = 200;\n   88 |                 if let Some((status, err)) = Handler::parse_status(data, self.follow) {\n   89 |                     self.last_status = status;\n   90 |                     writer\n   91 |                         .channel\n   92 |                         .send(Err(io::Error::new(\n   93 |                             if status == 401 {\n   94 |                                 io::ErrorKind::PermissionDenied\n   95 |                             } else if (500..600).contains(&status) {\n   96 |                                 io::ErrorKind::ConnectionAborted\n   97 |                             } else {\n   98 |                                 io::ErrorKind::Other\n   99 |                             },\n  100 |                             err,\n  101 |                         )))\n  102 |                         .ok();\n  103 |                 }\n  104 |             }\n  105 |         }\n  106 |         true\n  107 |     }","lines":27,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/curl/remote.rs#L81-L107"}]},{"id":"ERR_33","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"The error message for Error::FilterPathsUnprocessed ends with a colon but never interpolates the offending paths:\n\"The following paths were delayed and apparently forgotten to be processed by the filter driver: \". The\n`rela_paths` field is carried in the variant but not shown, so users get a truncated, uninformative message.","fix":"Include the paths in the message, e.g.\n#[error(\"The following paths were delayed and apparently forgotten to be processed by the filter driver: {rela_paths:?}\")]\nFilterPathsUnprocessed { rela_paths: Vec<BString> },","locations":[{"ref":"gix-worktree-state/src/checkout/mod.rs:101-102","code":"  101 |     #[error(\"The following paths were delayed and apparently forgotten to be processed by the filter driver: \")]\n  102 |     FilterPathsUnprocessed { rela_paths: Vec<BString> },","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-worktree-state/src/checkout/mod.rs#L101-L102"}]},{"id":"ERR_34","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In `create::into`, `fs::File::create(config_path)?` relies on the `#[from] std::io::Error` impl which maps to\n`Error::CurrentDir` (\"Could not obtain the current directory\"). A failure to create the repository's\n`config` file will thus be reported as a current-directory error, which is misleading.","fix":"Map the error explicitly to `Error::IoOpen { source, path: config_path }` instead of using `?` with the `From` impl.","locations":[{"ref":"gix/src/create.rs:248-252","code":"  248 |         let (mut config_file, config_path) = {\n  249 |             let mut cursor = PathCursor(&mut dot_git);\n  250 |             let config_path = cursor.at(\"config\");\n  251 |             (fs::File::create(config_path)?, config_path.to_owned())\n  252 |         };","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/create.rs#L248-L252"},{"ref":"gix/src/create.rs:13-15","code":"   13 | pub enum Error {\n   14 |     #[error(\"Could not obtain the current directory\")]\n   15 |     CurrentDir(#[from] std::io::Error),","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/create.rs#L13-L15"}]},{"id":"ERR_35","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `ref_map_by_ref`, when no custom `authenticate` callback is set, the transport URL is parsed with\n`gix_url::parse(url.as_ref()).expect(\"valid URL to be provided by transport\")`. This relies on the transport\nalways returning a parseable URL; a custom/third-party `Transport` implementation returning a malformed URL\nstring would panic here rather than surfacing a configuration error.","fix":"Propagate a parse error (e.g. via the existing Error enum) instead of `expect` on transport-provided URL text.","locations":[{"ref":"gix/src/remote/connection/ref_map.rs:125-129","code":"  125 |                 let url = self.remote.url(Direction::Fetch).map_or_else(\n  126 |                     || gix_url::parse(url.as_ref()).expect(\"valid URL to be provided by transport\"),\n  127 |                     ToOwned::to_owned,\n  128 |                 );\n  129 |                 credentials_storage = self.configured_credentials(url)?;","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/remote/connection/ref_map.rs#L125-L129"}]},{"id":"ERR_36","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the parallel status iterator, when the tree-index producer thread returns an error, the code does\n`break Some(Err(err.into()))` after having already taken `rx_and_join`, so the index-worktree producer\nthread handle is dropped without being joined and without `should_interrupt` being set. The worktree\nscan thread may keep running unnecessarily until it finishes on its own.","fix":"Set the interrupt flag (or otherwise signal/join the worktree handle) before returning the tree-index error.","locations":[{"ref":"gix/src/status/iter/mod.rs:259-277","code":"  259 |                 Err(std::sync::mpsc::RecvTimeoutError::Disconnected) => {\n  260 |                     let (_rx, worktree_handle, tree_handle) = self.rx_and_join.take()?;\n  261 |                     let tree_index = if let Some(handle) = tree_handle {\n  262 |                         match handle.join().expect(\"no panic\") {\n  263 |                             Ok(out) => Some(out),\n  264 |                             Err(err) => break Some(Err(err.into())),\n  265 |                         }\n  266 |                     } else {\n  267 |                         None\n  268 |                     };\n  269 |                     break match worktree_handle.join().expect(\"no panic\") {\n  270 |                         Ok(mut out) => {\n  271 |                             out.changes = Some(std::mem::take(&mut self.index_changes));\n  272 |                             out.tree_index = tree_index;\n  273 |                             self.out = Some(out);\n  274 |                             None\n  275 |                         }\n  276 |                         Err(err) => Some(Err(err.into())),\n  277 |                     };","lines":19,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/status/iter/mod.rs#L259-L277"}]},{"id":"ERR_37","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":true,"description":"`decode::loose_header` parses the object size with `gix_utils::btoi::to_signed::<u64>` even though size is unsigned and the function returns it as a `u64`. Using the signed parser means a leading `+`/`-` is accepted at the byte-parsing layer; a value like `+5` would parse where git only writes plain digits, and the intent (an unsigned, non-negative size) is obscured. The returned size then feeds directly into a `data[offset..][..size]` slice in `ObjectRef::from_loose`.","fix":"Use an unsigned byte-to-integer parser (e.g. `to_unsigned`/`to_decimal` equivalent) so only plain digit sequences are accepted for the object size, matching git's serialization.","locations":[{"ref":"gix-object/src/lib.rs:354-370","code":"  354 |     pub fn loose_header(input: &[u8]) -> Result<(super::Kind, u64, usize), LooseHeaderDecodeError> {\n  355 |         use LooseHeaderDecodeError::*;\n  356 |         let kind_end = input.find_byte(0x20).ok_or(InvalidHeader {\n  357 |             message: \"Expected '<type> <size>'\",\n  358 |         })?;\n  359 |         let kind = super::Kind::from_bytes(&input[..kind_end])?;\n  360 |         let size_end = input.find_byte(0x0).ok_or(InvalidHeader {\n  361 |             message: \"Did not find 0 byte in header\",\n  362 |         })?;\n  363 |         let size_bytes = &input[kind_end + 1..size_end];\n  364 |         let size = gix_utils::btoi::to_signed(size_bytes).map_err(|source| ParseIntegerError {\n  365 |             source,\n  366 |             message: \"Object size in header could not be parsed\",\n  367 |             number: size_bytes.into(),\n  368 |         })?;\n  369 |         Ok((kind, size, size_end + 1))\n  370 |     }","lines":17,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-object/src/lib.rs#L354-L370"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"Inside the spawned excludes worker thread, a parse failure is reported via `eprintln!` directly to\nprocess stderr, bypassing the `err` writer threaded through the rest of the function (used for all\nother diagnostics). This breaks output redirection/capture consistency.","fix":"Route the message through a shared/cloned error sink rather than direct stderr.","locations":[{"ref":"gitoxide-core/src/repository/attributes/validate_baseline.rs:163","code":"  163 |                             eprintln!(\"Failed to parse line {line:?} - ignored\");","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/attributes/validate_baseline.rs#L163"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`SignatureRef::seconds()` parses the timestamp with `self.time.trim().split(' ').next()` and `unwrap_or_default()` (0 on failure). Because the `time` field is parsed leniently (it may contain arbitrary bytes that passed `is_time_byte`, e.g. `--700`, multiple spaces, or a lone `-`), `seconds()` will silently return 0 for many malformed-but-accepted signatures while `time()` would have produced a different (or error) result. This divergence between the fast `seconds()` and the full `time()` parse is documented but is an easy source of subtle bugs where two code paths disagree about a commit's time.","fix":"Where exactness matters, prefer `time()`; consider having `seconds()` reject a leading sign-only or empty first token rather than defaulting to 0 so the two parsers agree on validity.","locations":[{"ref":"gix-actor/src/signature/mod.rs:57-70","code":"   57 |         pub fn seconds(&self) -> gix_date::SecondsSinceUnixEpoch {\n   58 |             self.time\n   59 |                 .trim()\n   60 |                 .split(' ')\n   61 |                 .next()\n   62 |                 .and_then(|i| i.parse().ok())\n   63 |                 .unwrap_or_default()\n   64 |         }\n   65 | \n   66 |         /// Parse the `time` field for access to the passed time since unix epoch, and the time offset.\n   67 |         /// The format is expected to be [raw](gix_date::parse_header()).\n   68 |         pub fn time(&self) -> Result<gix_date::Time, gix_date::Error> {\n   69 |             self.time.parse()\n   70 |         }","lines":14,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-actor/src/signature/mod.rs#L57-L70"},{"ref":"gix-actor/src/signature/decode.rs:14-25","code":"   14 |         let time_len = i.iter().position(|b| !is_time_byte(*b)).unwrap_or(i.len());\n   15 |         let (time, rest) = i.split_at(time_len);\n   16 |         *i = rest;\n   17 |         // SAFETY: The parser validated that there are only ASCII characters with `is_time_byte()`.\n   18 |         #[allow(unsafe_code)]\n   19 |         let time = unsafe { std::str::from_utf8_unchecked(time) };\n   20 | \n   21 |         Ok(SignatureRef {\n   22 |             name: identity.name,\n   23 |             email: identity.email,\n   24 |             time,\n   25 |         })","lines":12,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-actor/src/signature/decode.rs#L14-L25"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`RefMap` (used by attributes `Outcome` to deduplicate matched patterns/assignments/paths) keys entries\nsolely by the 64-bit output of `DefaultHasher`, with no collision handling: `insert` treats any\n`Entry::Occupied` as 'already the same value' and returns the existing key without comparing the actual\nvalues. The module doc acknowledges hash collisions are 'designed to be less likely' than pointer aliasing,\nbut a genuine 64-bit collision between two *different* patterns/assignments would cause `resolve()` to\nsilently return the wrong value, yielding an incorrect attribute/assignment in a search result rather than\na panic. There is no equality check to detect or avoid this.","fix":"On `Entry::Occupied`, compare the stored value against the new one (require `T: PartialEq`) and fall back to probing/a secondary key on mismatch, or store a `Vec<T>` per bucket, to make collisions correct rather than silently wrong.","locations":[{"ref":"gix-attributes/src/search/refmap.rs:27-51","code":"   27 |     pub(crate) fn insert(&mut self, value: &T) -> RefMapKey {\n   28 |         let mut s = DefaultHasher::new();\n   29 |         value.hash(&mut s);\n   30 |         let key = s.finish();\n   31 |         match self.0.entry(key) {\n   32 |             Entry::Vacant(e) => {\n   33 |                 e.insert(value.clone());\n   34 |                 key\n   35 |             }\n   36 |             Entry::Occupied(_) => key,\n   37 |         }\n   38 |     }\n   39 | \n   40 |     pub(crate) fn insert_owned(&mut self, value: T) -> RefMapKey {\n   41 |         let mut s = DefaultHasher::new();\n   42 |         value.hash(&mut s);\n   43 |         let key = s.finish();\n   44 |         match self.0.entry(key) {\n   45 |             Entry::Vacant(e) => {\n   46 |                 e.insert(value);\n   47 |                 key\n   48 |             }\n   49 |             Entry::Occupied(_) => key,\n   50 |         }\n   51 |     }","lines":25,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-attributes/src/search/refmap.rs#L27-L51"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`Sink::write_stream` (and `write_stream_with_known_id`) call `from.read_exact` for `size` bytes but never\nverify there is no trailing data, and more importantly trust the caller-provided `size`. If `size` is larger\nthan the stream, `read_exact` errors (fine); but if `size` is smaller than the real object, the extra bytes\nare silently ignored and a hash is produced over truncated content. While `write_stream` is inherently\nsize-driven, there is no guard that `size` is consistent with the declared object, so a wrong `size` yields a\nplausible-but-wrong object id with no error.","fix":"Document the invariant that `size` must exactly match the stream length, or read one extra byte after `size` to assert the stream is exhausted, returning an error on mismatch.","locations":[{"ref":"gix-odb/src/sink.rs:32-66","code":"   32 |     fn write_stream(\n   33 |         &self,\n   34 |         kind: gix_object::Kind,\n   35 |         mut size: u64,\n   36 |         from: &mut dyn io::Read,\n   37 |     ) -> Result<gix_hash::ObjectId, gix_object::write::Error> {\n   38 |         let mut buf = [0u8; u16::MAX as usize];\n   39 |         let header = gix_object::encode::loose_header(kind, size);\n   40 | \n   41 |         let possibly_compress = |buf: &[u8]| -> io::Result<()> {\n   42 |             if let Some(compressor) = self.compressor.as_ref() {\n   43 |                 compressor.try_borrow_mut().expect(\"no recursion\").write_all(buf)?;\n   44 |             }\n   45 |             Ok(())\n   46 |         };\n   47 | \n   48 |         let mut hasher = gix_hash::hasher(self.object_hash);\n   49 |         hasher.update(&header);\n   50 |         possibly_compress(&header).map_err(Box::new)?;\n   51 | \n   52 |         while size != 0 {\n   53 |             let bytes = (size as usize).min(buf.len());\n   54 |             from.read_exact(&mut buf[..bytes]).map_err(Box::new)?;\n   55 |             hasher.update(&buf[..bytes]);\n   56 |             possibly_compress(&buf[..bytes]).map_err(Box::new)?;\n   57 |             size -= bytes as u64;\n   58 |         }\n   59 |         if let Some(compressor) = self.compressor.as_ref() {\n   60 |             let mut c = compressor.borrow_mut();\n   61 |             c.flush().map_err(Box::new)?;\n   62 |             c.reset();\n   63 |         }\n   64 | \n   65 |         Ok(hasher.try_finalize()?)\n   66 |     }","lines":35,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/sink.rs#L32-L66"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`File::entry()` rejects offsets with `if pack_offset > self.data.len()` (strictly greater), while the closely related `decompress_entry_from_data_offset_unchecked` uses `>= self.data.len()`. The `>` form allows `pack_offset == data.len()`, producing an empty slice that then fails one layer deeper in `from_bytes`. The behavior is safe but the inconsistent boundary condition is a latent trap for future edits and is harder to reason about than a uniform `>=` check.","fix":"Make both checks use `>=` (rejecting an offset equal to the data length) for consistency, since no valid entry can start at exactly `data.len()`.","locations":[{"ref":"gix-pack/src/data/file/decode/entry.rs:107-111","code":"  107 |         if pack_offset > self.data.len() {\n  108 |             return Err(data::entry::decode::Error::Corrupt {\n  109 |                 message: \"an entry offset pointing beyond pack data\",\n  110 |             });\n  111 |         }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/data/file/decode/entry.rs#L107-L111"},{"ref":"gix-pack/src/data/file/decode/entry.rs:168-173","code":"  168 |         if offset >= self.data.len() {\n  169 |             return Err(data::entry::decode::Error::Corrupt {\n  170 |                 message: \"an entry data offset pointing beyond pack data\",\n  171 |             }\n  172 |             .into());\n  173 |         }","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/data/file/decode/entry.rs#L168-L173"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`Arguments::shallow`, `deepen`, `deepen_since`, `deepen_relative`, `deepen_not`, `filter`,\n`use_include_tag` all `debug_assert!(self.<feature>, ...)` and then silently no-op in release builds\nwhen the feature is not enabled (`if self.<feature> { ... }`). This means a caller invoking, e.g.,\n`args.shallow(id)` without server support gets a panic in debug but a silent drop in e\".into());\n  147 |         }\n  148 |     }\n  149 |     /// Do not include commits reachable by the given `ref_path` when deepening the history.\n  150 |     pub fn deepen_not(&mut self, ref_path: &BStr) {\n  151 |         debug_assert!(self.deepen_not, \"'deepen-not' feature required\");\n  152 |         if self.deepen_not {\n  153 |             let mut line = BString::from(\"deepen-not \");\n  154 |             line.extend_from_slice(ref_path);\n  155 |             self.args.push(line);\n  156 |         }\n  157 |     }\n  158 |     /// Set the given filter `spec` when listing references.\n  159 |     pub fn filter(&mut self, spec: &str) {\n  160 |         debug_assert!(self.filter, \"'filter' feature required\");\n  161 |         if self.filter {\n  162 |             self.prefixed(\"filter \", spec);\n  163 |         }\n  164 |     }","lines":43,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-protocol/src/fetch/arguments/mod.rs#L122-L164"},{"ref":"gix-protocol/src/fetch/arguments/mod.rs:168-174","code":"  168 |     #[cfg(any(feature = \"async-client\", feature = \"blocking-client\"))]\n  169 |     pub fn use_include_tag(&mut self) {\n  170 |         debug_assert!(self.supports_include_tag, \"'include-tag' feature required\");\n  171 |         if self.supports_include_tag {\n  172 |             self.add_feature(\"include-tag\");\n  173 |         }\n  174 |     }","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-protocol/src/fetch/arguments/mod.rs#L168-L174"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`packed::Buffer::open` maps the file copy-on-write via mmap and the SAFETY\ncomment claims \"Git never writes into the same file\". That is true for git's\nown ref backend, but this is a general-purpose library: any non-git writer\n(another tool, an editor, NFS) truncating or shrinking the packed-refs file\nwhile it is mapped can cause SIGBUS on access. The unsafe block trusts an\nassumption about external processes it cannot enforce.","fix":"Document the SIGBUS risk on the public `open`/`from_bytes` API, and/or prefer\nreading into memory unless the caller explicitly opts into mmap with awareness\nof the hazard. The threshold knob already exists; make the default safer or the\nrisk explicit.","locations":[{"ref":"gix-ref/src/store/packed/buffer.rs:83-93","code":"   83 |             let backing = if std::fs::metadata(&path)?.len() <= use_memory_map_if_larger_than_bytes {\n   84 |                 packed::Backing::InMemory(std::fs::read(&path)?)\n   85 |             } else {\n   86 |                 packed::Backing::Mapped(\n   87 |                     // SAFETY: we have to take the risk of somebody changing the file underneath. Git never writes into the same file.\n   88 |                     #[allow(unsafe_code)]\n   89 |                     unsafe {\n   90 |                         memmap2::MmapOptions::new().map_copy_read_only(&std::fs::File::open(&path)?)?\n   91 |                     },\n   92 |                 )\n   93 |             };","lines":11,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-ref/src/store/packed/buffer.rs#L83-L93"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`collect_parents` in simple.rs calls `cache.as_ref().expect(\"parents iter is available, backed by\n`cache`\")`. This couples the function's correctness to the caller always passing a Some cache when\nthe parents iterator was obtained from the cache. The caller (next_by_commit_date / next_by_topology)\nsets `self.cache = None` on corruption and retries, but if any future caller passes a\ncache-backed `Parents` iter together with a None cache, this panics. The invariant is enforced only\nby an expect rather than the type system.","fix":"Pass the &Graph cache reference directly into collect_parents as a non-Option parameter so the invariant is encoded in the signature.","locations":[{"ref":"gix-traverse/src/commit/simple.rs:699-719","code":"  699 | fn collect_parents(\n  700 |     dest: &mut SmallVec<[(gix_hash::ObjectId, gix_date::SecondsSinceUnixEpoch); 2]>,\n  701 |     cache: Option<&gix_commitgraph::Graph>,\n  702 |     parents: gix_commitgraph::file::commit::Parents<'_>,\n  703 | ) -> bool {\n  704 |     dest.clear();\n  705 |     let cache = cache.as_ref().expect(\"parents iter is available, backed by `cache`\");\n  706 |     for parent_id in parents {\n  707 |         match parent_id {\n  708 |             Ok(pos) => dest.push({\n  709 |                 let parent = cache.commit_at(pos);\n  710 |                 (\n  711 |                     parent.id().to_owned(),\n  712 |                     parent.committer_timestamp() as gix_date::SecondsSinceUnixEpoch,\n  713 |                 )\n  714 |             }),\n  715 |             Err(_err) => return false,\n  716 |         }\n  717 |     }\n  718 |     true\n  719 | }","lines":21,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-traverse/src/commit/simple.rs#L699-L719"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"add_entry() unwraps both the Option (extra_entries) and the channel send() with expect(). The send() expect message\nclaims \"Failure is impossible as thread blocks on the receiving end\", but the receiver lives on the background thread\nspawned in from_tree::run(); if that thread has already returned/panicked (e.g. due to a tree traversal error stored\nin the error slot), the receiver is dropped and send() returns Err, turning a recoverable producer error into a hard\npanic in caller code. add_entry_from_path() forwards to add_entry() and inherits this.","fix":"Handle a closed channel gracefully: ignore the send error (the consumer will observe the stored error / EOF) instead\nof expect(), or surface it as a returned Result so callers can react.","locations":[{"ref":"gix-worktree-stream/src/lib.rs:115-122","code":"  115 |     pub fn add_entry(&mut self, entry: AdditionalEntry) -> &mut Self {\n  116 |         self.extra_entries\n  117 |             .as_ref()\n  118 |             .expect(\"BUG: must not add entries after the start of entries traversal\")\n  119 |             .send(entry)\n  120 |             .expect(\"Failure is impossible as thread blocks on the receiving end\");\n  121 |         self\n  122 |     }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-worktree-stream/src/lib.rs#L115-L122"}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"`prepare_external_driver` builds the command by string-splitting on `%` and concatenating quoted/raw substituted paths\ninto a single `BString`, then runs it via `command_may_be_shell_script()`. Paths are inserted with `gix_path::into_bstr`\nwithout shell quoting for `%O`/`%A`/`%B` (only `%P/%S/%X/%Y` use `gix_quote::single`). Tempfile paths are derived from the\nworktree dir, so the practical risk is low, but unquoted path interpolation into a shell-evaluated command line is a\nfragile pattern (spaces or special characters in the tempfile directory path could break the command).","fix":"Shell-quote the substituted `%O`/`%A`/`%B` paths as well, consistent with the other placeholders.","locations":[{"ref":"gix-merge/src/blob/platform/merge.rs:170-224","code":"  170 |                 let mut cmd = BString::from(Vec::with_capacity(merge_command.len()));\n  171 |                 let mut count = 0;\n  172 |                 for token in merge_command.split(|b| *b == b'%') {\n  173 |                     count += 1;\n  174 |                     let token = if count > 1 {\n  175 |                         match token.first() {\n  176 |                             Some(&b'O') => {\n  177 |                                 cmd.push_str(gix_path::into_bstr(&base_path).as_ref());\n  178 |                                 &token[1..]\n  179 |                             }\n  180 |                             Some(&b'A') => {\n  181 |                                 cmd.push_str(gix_path::into_bstr(&ours_path).as_ref());\n  182 |                                 &token[1..]\n  183 |                             }\n  184 |                             Some(&b'B') => {\n  185 |                                 cmd.push_str(gix_path::into_bstr(&theirs_path).as_ref());\n  186 |                                 &token[1..]\n  187 |                             }\n  188 |                             Some(&b'L') => {\n  189 |                                 let marker_size = self\n  190 |                                     .options\n  191 |                                     .text\n  192 |                                     .conflict\n  193 |                                     .marker_size()\n  194 |                                     .unwrap_or(Conflict::DEFAULT_MARKER_SIZE);\n  195 |                                 cmd.push_str(format!(\"{marker_size}\"));\n  196 |                                 &token[1..]\n  197 |                             }\n  198 |                             Some(&b'P') => {\n  199 |                                 cmd.push_str(gix_quote::single(self.current.rela_path));\n  200 |                                 &token[1..]\n  201 |                             }\n  202 |                             Some(&b'S') => {\n  203 |                                 cmd.push_str(gix_quote::single(ancestor.unwrap_or_default()));\n  204 |                                 &token[1..]\n  205 |                             }\n  206 |                             Some(&b'X') => {\n  207 |                                 cmd.push_str(gix_quote::single(current.unwrap_or_default()));\n  208 |                                 &token[1..]\n  209 |                             }\n  210 |                             Some(&b'Y') => {\n  211 |                                 cmd.push_str(gix_quote::single(other.unwrap_or_default()));\n  212 |                                 &token[1..]\n  213 |                             }\n  214 |                             Some(_other) => {\n  215 |                                 cmd.push(b'%');\n  216 |                                 token\n  217 |                             }\n  218 |                             None => b\"%\",\n  219 |                         }\n  220 |                     } else {\n  221 |                         token\n  222 |                     };\n  223 |                     cmd.extend_from_slice(token);\n  224 |                 }","lines":55,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-merge/src/blob/platform/merge.rs#L170-L224"}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"`from_data` (output entry) and `compress_data` (input entry) match `std::io::ErrorKind::Other` to detect zlib errors and `unreachable!()` on any other error kind. This couples correctness to the exact error kind produced by the deflate writer; if the underlying zlib stream implementation ever surfaces a different `ErrorKind`, these become reachable panics. Since the writes are to in-memory `Vec`s this is unlikely, but the `unreachable!` is more brittle than necessary.","fix":"Treat any error from the in-memory deflate copy as a zlib/deflate error and return it, instead of asserting the error kind is `Other`.","locations":[{"ref":"gix-pack/src/data/output/entry/mod.rs:142-147","code":"  142 |                 if let Err(err) = std::io::copy(&mut &*obj.data, &mut out) {\n  143 |                     match err.kind() {\n  144 |                         std::io::ErrorKind::Other => return Err(Error::ZlibDeflate(err)),\n  145 |                         err => unreachable!(\"Should never see other errors than zlib, but got {:?}\", err),\n  146 |                     }\n  147 |                 }","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/data/output/entry/mod.rs#L142-L147"},{"ref":"gix-pack/src/data/input/entry.rs:55-62","code":"   55 |     if let Err(err) = std::io::copy(&mut &*obj.data, &mut out) {\n   56 |         match err.kind() {\n   57 |             std::io::ErrorKind::Other => return Err(input::Error::Io(err.into())),\n   58 |             err => {\n   59 |                 unreachable!(\"Should never see other errors than zlib, but got {:?}\", err)\n   60 |             }\n   61 |         }\n   62 |     }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/data/input/entry.rs#L55-L62"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"In the streaming pack-entry iterator, when compressed bytes are kept, the decompression destination is pre-allocated as `Vec::with_capacity(entry.decompressed_size as usize)` directly from the attacker-controlled entry header. A crafted pack entry can declare a huge `decompressed_size` and cause a large eager allocation (memory-exhaustion DoS) before any data is actually read. Unlike the random-access decode path (`data/file/decode/entry.rs`), this streaming path enforces no alloc limit.","fix":"Cap the pre-reserved capacity (e.g. clamp to a configurable alloc limit or a fixed small ceiling) and grow the buffer as bytes are decompressed, rather than trusting the declared decompressed size up front.","locations":[{"ref":"gix-pack/src/data/input/bytes_to_entries.rs:103-115","code":"  103 |         let compressed_buf = self.compressed_buf.take().unwrap_or_else(|| Vec::with_capacity(4096));\n  104 |         self.decompressor.reset();\n  105 |         let mut decompressed_reader = DecompressRead {\n  106 |             inner: read_and_pass_to(\n  107 |                 &mut self.read,\n  108 |                 if self.compressed.keep() {\n  109 |                     Vec::with_capacity(entry.decompressed_size as usize)\n  110 |                 } else {\n  111 |                     compressed_buf\n  112 |                 },\n  113 |             ),\n  114 |             decompressor: &mut self.decompressor,\n  115 |         };","lines":13,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/data/input/bytes_to_entries.rs#L103-L115"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`gix::mailmap::parse(&buf)` is invoked three separate times over the same buffer: once to collect\nerrors, once to detect overwrites, and once more solely to `.count()` lines for the \"N lines OK\"\nmessage. The whole mailmap is re-parsed up to three times when a single pass with counters would\nsuffice.","fix":"Parse once (collect into a Vec) and reuse it for error counting, overwrite detection, and the line count.","locations":[{"ref":"gitoxide-core/src/mailmap.rs:16","code":"   16 |     for err in gix::mailmap::parse(&buf).filter_map(Result::err) {","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/mailmap.rs#L16"},{"ref":"gitoxide-core/src/mailmap.rs:22","code":"   22 |     for entry in gix::mailmap::parse(&buf).filter_map(Result::ok) {","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/mailmap.rs#L22"},{"ref":"gitoxide-core/src/mailmap.rs:36","code":"   36 |         writeln!(out, \"{} lines OK\", gix::mailmap::parse(&buf).count())?;","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/mailmap.rs#L36"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"When no index entries match, `exclude` rebuilds the entire pathspec a second time purely to iterate\nthe literal patterns; the code's own comment flags this as a borrow-checker workaround rather than an\nintentional design. Redundant allocation/setup on the no-match fallback path.","fix":"Fix the lifetime of `index_entries_with_paths()` so the first pathspec can be reused.","locations":[{"ref":"gitoxide-core/src/repository/exclude.rs:82-108","code":"   82 |             if !pathspec_matched_something {\n   83 |                 // TODO(borrowchk): this shouldn't be necessary at all, but `pathspec` stays borrowed mutably for some reason.\n   84 |                 //                  It's probably due to the strange lifetimes of `index_entries_with_paths()`.\n   85 |                 let pathspec = repo.pathspec(\n   86 |                     true,\n   87 |                     patterns.iter(),\n   88 |                     repo.workdir().is_some(),\n   89 |                     &index,\n   90 |                     gix::worktree::stack::state::attributes::Source::WorktreeThenIdMapping\n   91 |                         .adjust_for_bare(repo.is_bare()),\n   92 |                 )?;\n   93 |                 let workdir = repo.workdir();\n   94 |                 for pattern in pathspec.search().patterns() {\n   95 |                     let path = pattern.path();\n   96 |                     let entry = cache.at_entry(\n   97 |                         path,\n   98 |                         Some(is_dir_to_mode(\n   99 |                             workdir.is_some_and(|wd| wd.join(gix::path::from_bstr(path)).is_dir())\n  100 |                                 || pattern.signature.contains(gix::pathspec::MagicSignature::MUST_BE_DIR),\n  101 |                         )),\n  102 |                     )?;\n  103 |                     let match_ = entry\n  104 |                         .matching_exclude_pattern()\n  105 |                         .and_then(|m| (show_ignore_patterns || !m.pattern.is_negative()).then_some(m));\n  106 |                     print_match(match_, path, &mut out)?;\n  107 |                 }\n  108 |             }","lines":27,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/exclude.rs#L82-L108"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Commit` (file::Commit) eagerly parses `root_tree_id`, `parent1`, `parent2`, `generation`, and `commit_timestamp` in `Commit::new`, despite the field comment stating 'We can parse the below fields lazily if needed.' Every `iter_commits()`/`commit_at()` constructs and fully decodes a commit even when the caller only wants, e.g., the id. For full-graph traversals (verify, traverse) this is fine, but for point lookups that only need a subset it does redundant work. The comment also misleads readers into thinking parsing is lazy when it is not.","fix":"Either implement the lazy parsing the comment promises (store the raw `&[u8]` slice and decode on demand) or update the comment to reflect that parsing is eager.","locations":[{"ref":"gix-commitgraph/src/file/commit.rs:16-46","code":"   16 |     pos: file::Position,\n   17 |     // We can parse the below fields lazily if needed.\n   18 |     commit_timestamp: u64,\n   19 |     generation: u32,\n   20 |     parent1: ParentEdge,\n   21 |     parent2: ParentEdge,\n   22 |     root_tree_id: &'a gix_hash::oid,\n   23 | }\n   24 | \n   25 | #[inline]\n   26 | fn read_u32(b: &[u8]) -> u32 {\n   27 |     u32::from_be_bytes(b.try_into().unwrap())\n   28 | }\n   29 | \n   30 | impl<'a> Commit<'a> {\n   31 |     pub(crate) fn new(file: &'a File, pos: file::Position) -> Self {\n   32 |         let bytes = file.commit_data_bytes(pos);\n   33 |         Commit {\n   34 |             file,\n   35 |             pos,\n   36 |             root_tree_id: gix_hash::oid::from_bytes_unchecked(&bytes[..file.hash_len]),\n   37 |             parent1: ParentEdge::from_raw(read_u32(&bytes[file.hash_len..][..4])),\n   38 |             parent2: ParentEdge::from_raw(read_u32(&bytes[file.hash_len + 4..][..4])),\n   39 |             // TODO: Add support for corrected commit date offset overflow.\n   40 |             //      See https://github.com/git/git/commit/e8b63005c48696a26f976f5f9b0ccaf1983e439d and\n   41 |             //          https://github.com/git/git/commit/f90fca638e99a031dce8e3aca72427b2f9b4bb38 for more details and hints at a test.\n   42 |             generation: read_u32(&bytes[file.hash_len + 8..][..4]) >> 2,\n   43 |             commit_timestamp: u64::from_be_bytes(bytes[file.hash_len + 8..][..8].try_into().unwrap())\n   44 |                 & 0x0003_ffff_ffff,\n   45 |         }\n   46 |     }","lines":31,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-commitgraph/src/file/commit.rs#L16-L46"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`resolve_includes_recursive` clones the entire `section_order` deque on every recursion level\n(`target_config.section_order.clone().into_iter()`) just to iterate it while the body may mutate\n`target_config`. For configs with many sections and includes this allocates a fresh Vec/deque at each\nnesting level. The clone is only needed to avoid borrow conflicts; an index-based loop over a snapshot\nof ids, or collecting ids into a reused buffer, would avoid repeated full clones.","fix":"Snapshot the section ids once into a reusable `Vec<SectionId>` (or iterate by index against a stable\nlength captured up front) instead of cloning the whole `section_order` collection on every recursive call.","locations":[{"ref":"gix-config/src/file/includes/mod.rs:66","code":"   66 |     for id in target_config.section_order.clone().into_iter() {","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config/src/file/includes/mod.rs#L66"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`section_ids_by_name` builds a `lut` Vec and then filters `section_order` with `lut.contains(a)`, which is\na linear scan of `lut` for every element of `section_order`, giving O(n*m) behavior. For configs with many\nsections under the same name this is quadratic. A `HashSet`/`BTreeSet` lookup (or preserving order via the\nalready-ordered ids) would make it linear.","fix":"Collect the ids into a `HashSet<SectionId>` (or sort + binary_search) before filtering `section_order`,\nturning the `lut.contains` membership test into O(1)/O(log n).","locations":[{"ref":"gix-config/src/file/util.rs:152-161","code":"  152 |             Some(lookup) => {\n  153 |                 let mut lut = Vec::with_capacity(self.section_order.len());\n  154 |                 for node in lookup {\n  155 |                     match node {\n  156 |                         SectionBodyIdsLut::Terminal(v) => lut.extend(v.iter().copied()),\n  157 |                         SectionBodyIdsLut::NonTerminal(v) => lut.extend(v.values().flatten().copied()),\n  158 |                     }\n  159 |                 }\n  160 | \n  161 |                 Ok(self.section_order.iter().filter(move |a| lut.contains(a)).copied())","lines":10,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config/src/file/util.rs#L152-L161"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`find_match`'s blob-similarity path sets the destination resource (`NewOrDestination`) lazily inside the loop\nguarded by `has_new`, but re-sets the source resource (`OldOrSource`) and calls `prepare_diff()` for every\ncandidate even when the candidate is immediately rejected as binary\n(`Operation::SourceOrDestinationIsBinary`). More importantly, the whole NxM similarity scan is linear over the\n*entire* `items` slice for every addition (it does not restrict to the partition of compatible\nkinds/modes/ids), so copy/rename detection on large change sets does redundant work that the identity fast-path\nalready narrowed. The `max_checks` guard only triggers above 100k items.","fix":"Skip candidates whose mode is incompatible before calling `set_resource`/`prepare_diff`, and consider\npartitioning candidates the way the identity path does (`partition_point` by id) before the fuzzy scan.","locations":[{"ref":"gix-diff/src/rewrites/tracker.rs:723-784","code":"  723 |     } else if item_mode.is_blob() {\n  724 |         let mut has_new = false;\n  725 |         let percentage = percentage.expect(\"it's set to something below 1.0 and we assured this\");\n  726 | \n  727 |         for (can_idx, src) in items\n  728 |             .iter()\n  729 |             .enumerate()\n  730 |             .filter(|(src_idx, src)| *src_idx != item_idx && src.is_source_for_destination_of(kind, item_mode))\n  731 |         {\n  732 |             if !has_new {\n  733 |                 diff_cache.set_resource(\n  734 |                     item_id.to_owned(),\n  735 |                     item_mode.kind(),\n  736 |                     item.location(path_backing),\n  737 |                     ResourceKind::NewOrDestination,\n  738 |                     objects,\n  739 |                 )?;\n  740 |                 has_new = true;\n  741 |             }\n  742 |             let (src_id, src_mode) = src.change.id_and_entry_mode();\n  743 |             diff_cache.set_resource(\n  744 |                 src_id.to_owned(),\n  745 |                 src_mode.kind(),\n  746 |                 src.location(path_backing),\n  747 |                 ResourceKind::OldOrSource,\n  748 |                 objects,\n  749 |             )?;\n  750 |             let prep = diff_cache.prepare_diff()?;\n  751 |             stats.num_similarity_checks += 1;\n  752 |             *num_checks += 1;\n  753 |             match prep.operation {\n  754 |                 Operation::InternalDiff { algorithm } => {\n  755 |                     let tokens = crate::blob::InternedInput::new(prep.old.intern_source(), prep.new.intern_source());\n  756 |                     let diff = crate::blob::Diff::compute(algorithm, &tokens);\n  757 |                     let removed_bytes = diff::removed_bytes(&diff, &tokens);\n  758 |                     let old_data_len = prep.old.data.as_slice().unwrap_or_default().len();\n  759 |                     let new_data_len = prep.new.data.as_slice().unwrap_or_default().len();\n  760 |                     let similarity = (old_data_len - removed_bytes) as f32 / old_data_len.max(new_data_len) as f32;\n  761 |                     if similarity >= percentage {\n  762 |                         return Ok(Some((\n  763 |                             can_idx,\n  764 |                             src,\n  765 |                             DiffLineStats {\n  766 |                                 removals: diff.count_removals(),\n  767 |                                 insertions: diff.count_additions(),\n  768 |                                 before: tokens.before.len(),\n  769 |                                 after: tokens.after.len(),\n  770 |                                 similarity,\n  771 |                             }\n  772 |                             .into(),\n  773 |                         )));\n  774 |                     }\n  775 |                 }\n  776 |                 Operation::ExternalCommand { .. } => {\n  777 |                     unreachable!(\"we have disabled this possibility with an option\")\n  778 |                 }\n  779 |                 Operation::SourceOrDestinationIsBinary => {\n  780 |                     // TODO: figure out if git does more here\n  781 |                 }\n  782 |             }\n  783 |         }\n  784 |     }","lines":62,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-diff/src/rewrites/tracker.rs#L723-L784"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"On every call to `Pipeline::convert_to_git`, an EOL-conversion probe is run unconditionally against the\n2-byte literal `b\"\\r\\n\"` purely to decide `would_convert_eol`, before it is even known whether a driver,\nencoding, or ident filter is involved. This recomputes `Stats::from_bytes` and the full digest/eol decision\nlogic for every single file even when the result is never needed (e.g. a path with no relevant attributes\nand no driver). The cost is small per call but it is on the hot path of converting every file to git.","fix":"Compute `would_convert_eol` lazily, only when the driver/encoding/ident branch actually needs it, or derive it directly from `digest`/config without running a conversion probe.","locations":[{"ref":"gix-filter/src/pipeline/convert.rs:96-107","code":"   96 |         let mut in_src_buffer = false;\n   97 |         // this is just an approximation, but it's as good as it gets without reading the actual input.\n   98 |         let would_convert_eol = eol::convert_to_git(\n   99 |             b\"\\r\\n\",\n  100 |             digest,\n  101 |             &mut self.bufs.dest,\n  102 |             &mut |_| Ok(None),\n  103 |             eol::convert_to_git::Options {\n  104 |                 round_trip_check: None,\n  105 |                 config: self.options.eol_config,\n  106 |             },\n  107 |         )?;","lines":12,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-filter/src/pipeline/convert.rs#L96-L107"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`empty_depth_first` re-reads directories repeatedly: when a directory has subdir entries it pushes the dir back on the stack and appends children on top; when the parent is popped again it re-runs `read_dir` to recount, reopening the directory handle. For deep/wide trees each directory is re-scanned once per level beneath it, giving near-quadratic I/O.","fix":"Push a sentinel/marker after children so the parent is finalized once without re-reading, or collect entries once and delete bottom-up.","locations":[{"ref":"gix-fs/src/dir/remove.rs:95-111","code":"   95 |     while let Some(dir_to_delete) = stack.pop() {\n   96 |         let mut num_entries = 0;\n   97 |         for entry in std::fs::read_dir(&dir_to_delete)? {\n   98 |             num_entries += 1;\n   99 |             let entry = entry?;\n  100 |             if entry.file_type()?.is_dir() {\n  101 |                 next_to_push.push(entry.path());\n  102 |             } else {\n  103 |                 return Err(std::io::Error::other(\"Directory not empty\"));\n  104 |             }\n  105 |         }\n  106 |         if num_entries == 0 {\n  107 |             std::fs::remove_dir(&dir_to_delete)?;\n  108 |         } else {\n  109 |             stack.push(dir_to_delete);\n  110 |             stack.append(&mut next_to_push);\n  111 |         }","lines":17,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fs/src/dir/remove.rs#L95-L111"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`prev_path = entries.last().map(|e| (e.path.clone(), &mut delta_buf))` is recomputed every\niteration by re-reading `entries.last()`, even though `entry.path` is already known before\nit is pushed (it is the just-built `path_range`). Re-borrowing `entries.last()` each loop is\nslightly wasteful in the per-entry hot loop. Minor.","fix":"Carry the just-decoded path range forward directly instead of re-reading `entries.last()`.","locations":[{"ref":"gix-index/src/decode/entries.rs:122","code":"  122 |         prev_path = entries.last().map(|e| (e.path.clone(), &mut delta_buf));","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/decode/entries.rs#L122"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In the V4 delta-path decode, `load_one` reconstructs the shared prefix via a temporary\n`buf`: it resizes `buf`, copies the prefix from `path_backing` into `buf`, then appends\n`buf` back into `path_backing`. This double copy (path_backing -> buf -> path_backing) is\nunnecessary; the prefix bytes already live in `path_backing` and could be copied within it\n(e.g. `extend_from_within(prev_path.start..end)`), avoiding the intermediate buffer and an\nextra memcpy per V4 entry on the hot decode path.","fix":"Use `path_backing.extend_from_within(prev_path.start..end)` instead of round-tripping through `buf`.","locations":[{"ref":"gix-index/src/decode/entries.rs:162-169","code":"  162 |         if let Some((prev_path, buf)) = prev_path_and_buf {\n  163 |             let end = prev_path.end.checked_sub(strip_len.try_into().ok()?)?;\n  164 |             let copy_len = end.checked_sub(prev_path.start)?;\n  165 |             if copy_len > 0 {\n  166 |                 buf.resize(copy_len, 0);\n  167 |                 buf.copy_from_slice(&path_backing[prev_path.start..end]);\n  168 |                 path_backing.extend_from_slice(buf);\n  169 |             }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/decode/entries.rs#L162-L169"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`match merge_bases.clone()` clones the entire `Option<NonEmpty<ObjectId>>` only to read `.len()`/`.first()` in the\nread-only arms; `merge_bases` is still owned and later returned in the `Outcome`. The clone is avoidable by matching on\na reference and only taking ownership in the branch that actually needs it.","fix":"Match on `merge_bases.as_ref()`/`&merge_bases` for the read-only arms; convert to owned only in the multi-base branch.","locations":[{"ref":"gix-merge/src/commit/function.rs:62","code":"   62 |     let (merge_base_tree_id, ancestor_name): (_, Cow<'_, str>) = match merge_bases.clone() {","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-merge/src/commit/function.rs#L62"}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`Sink::write_stream` and `write_stream_with_known_id` allocate a fixed 64 KiB (`[0u8; u16::MAX as usize]`)\nbuffer on the stack on every call. This enlarges the stack frame considerably for every object written to the\nsink (used during integrity verification of every loose object) and is zero-initialized each time. A smaller\nbuffer (e.g. 8-16 KiB) or a reused heap buffer would be friendlier to the stack and to cache.","fix":"Use a smaller fixed buffer (e.g. `[0u8; 8 * 1024]`) or a reusable heap-allocated buffer instead of a 64 KiB stack array zero-initialized per call.","locations":[{"ref":"gix-odb/src/sink.rs:38","code":"   38 |         let mut buf = [0u8; u16::MAX as usize];","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/sink.rs#L38"},{"ref":"gix-odb/src/sink.rs:75","code":"   75 |         let mut buf = [0u8; u16::MAX as usize];","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/sink.rs#L75"}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`collect_snapshot` and the `Err(_nothing_more_to_load)` arm of `load_next_index` spin with bare\n`std::thread::yield_now()` loops while waiting for `num_indices_currently_being_loaded` to reach zero. Under\ncontention (many threads opening a repo at once) this is a busy-wait that burns CPU rather than parking the\nthread. The code itself flags this with `TODO: potentially hot loop - could this be a condition variable?`.","fix":"Replace the yield-spin loops with a condition variable / parking primitive that is notified when the in-flight index load count is decremented, to avoid burning a core while waiting.","locations":[{"ref":"gix-odb/src/store_impls/dynamic/load_index.rs:150-164","code":"  150 |                     Err(_nothing_more_to_load) => {\n  151 |                         // There can be contention as many threads start working at the same time and take all the\n  152 |                         // slots to load indices for. Some threads might just be left-over and have to wait for something\n  153 |                         // to change.\n  154 |                         // TODO: potentially hot loop - could this be a condition variable?\n  155 |                         // This is a timing-based fix for the case that the `num_indices_being_loaded` isn't yet incremented,\n  156 |                         // and we might break out here without actually waiting for the loading operation. Then we'd fail to\n  157 |                         // observe a change and the underlying handler would not have all the indices it needs at its disposal.\n  158 |                         // Yielding means we will definitely loose enough time to observe the ongoing operation,\n  159 |                         // or its effects.\n  160 |                         std::thread::yield_now();\n  161 |                         while index.num_indices_currently_being_loaded.load(Ordering::SeqCst) != 0 {\n  162 |                             std::thread::yield_now();\n  163 |                         }\n  164 |                         break 'retry_with_next_slot_index;","lines":15,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/store_impls/dynamic/load_index.rs#L150-L164"},{"ref":"gix-odb/src/store_impls/dynamic/load_index.rs:654-658","code":"  654 |         loop {\n  655 |             if index.num_indices_currently_being_loaded.deref().load(Ordering::SeqCst) != 0 {\n  656 |                 std::thread::yield_now();\n  657 |                 continue;\n  658 |             }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/store_impls/dynamic/load_index.rs#L654-L658"}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`MatchGroup::match_lhs` / `match_rhs` deduplicate output by hashing each\n`Mapping` with the default SipHash hasher and storing only the 64-bit hash in a\n`BTreeSet<u64>`. This relies on hash collisions never occurring to avoid\ndropping distinct mappings (a correctness hazard, not just performance), and\nre-hashes every mapping. For large remote ref lists this is both a silent\ncollision risk and slower than necessary.","fix":"Deduplicate on the actual `Mapping` value (e.g. a `HashSet<Mapping>` or sort +\ndedup) so collisions cannot silently discard distinct results; if memory is the\nconcern, store a stronger digest. Either way avoid relying on truncated\nSipHash equality for correctness.","locations":[{"ref":"gix-refspec/src/match_group/mod.rs:44-49","code":"   44 |         let mut seen = BTreeSet::default();\n   45 |         let mut push_unique = |mapping| {\n   46 |             if seen.insert(calculate_hash(&mapping)) {\n   47 |                 out.push(mapping);\n   48 |             }\n   49 |         };","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-refspec/src/match_group/mod.rs#L44-L49"},{"ref":"gix-refspec/src/match_group/mod.rs:130-134","code":"  130 |         let mut push_unique = |mapping| {\n  131 |             if seen.insert(calculate_hash(&mapping)) {\n  132 |                 out.push(mapping);\n  133 |             }\n  134 |         };","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-refspec/src/match_group/mod.rs#L130-L134"},{"ref":"gix-refspec/src/match_group/mod.rs:184-189","code":"  184 | fn calculate_hash<T: std::hash::Hash>(t: &T) -> u64 {\n  185 |     use std::hash::Hasher;\n  186 |     let mut s = std::collections::hash_map::DefaultHasher::new();\n  187 |     t.hash(&mut s);\n  188 |     s.finish()\n  189 | }","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-refspec/src/match_group/mod.rs#L184-L189"}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`paint_down_to_common` (merge-base) checks its loop condition with\n`queue.iter_unordered().any(|id| graph.get(id)...)` on every iteration. This is an O(n) scan of the\nwhole priority queue per popped commit, making the merge-base painting O(n^2) in the number of queued\ncommits. The same O(n) full-queue scan per step appears in `compute_hidden_frontier`\n(simple.rs:200-204) and in `finish_depth_computation` for describe (describe.rs:328-331). For wide\nhistories this dominates runtime. Git tracks a counter of non-stale queued entries to make this O(1).","fix":"Maintain a running count of non-stale (or not-yet-common) queued commits and test that counter instead of rescanning the entire queue each iteration.","locations":[{"ref":"gix-revision/src/merge_base/function.rs:174-177","code":"  174 |     while queue\n  175 |         .iter_unordered()\n  176 |         .any(|id| graph.get(id).is_some_and(|commit| !commit.data.contains(Flags::STALE)))\n  177 |     {","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revision/src/merge_base/function.rs#L174-L177"},{"ref":"gix-traverse/src/commit/simple.rs:200-204","code":"  200 |     while queue.iter_unordered().any(|id| {\n  201 |         graph\n  202 |             .get(id)\n  203 |             .is_some_and(|commit| !commit.data.contains(PaintFlags::STALE))\n  204 |     }) {","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-traverse/src/commit/simple.rs#L200-L204"},{"ref":"gix-revision/src/describe.rs:328-331","code":"  328 |                 if queue\n  329 |                     .iter_unordered()\n  330 |                     .all(|id| (graph[id] & best_candidate.identity_bit) == best_candidate.identity_bit)\n  331 |                 {","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revision/src/describe.rs#L328-L331"}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Stream::from_read() and Stream::new() always allocate a u16::MAX (65535-byte) zero-filled buffer via\n`std::iter::repeat_n(0, u16::MAX as usize).collect()` for every Stream, even when the stream will be consumed via\nas_read_mut()/into_read() (raw byte access) and the per-entry buffered reader is never used. For workloads that\ncreate many short-lived streams this is wasteful. The buffer could be lazily allocated on first fill_buf() use.","fix":"Allocate `buf` lazily (e.g. keep it empty and grow/resize to u16::MAX on first fill_buf), or use\n`vec![0u8; u16::MAX as usize]` which is clearer and may compile to a faster zero-fill than repeat_n().collect().","locations":[{"ref":"gix-worktree-stream/src/lib.rs:101","code":"  101 |             buf: std::iter::repeat_n(0, u16::MAX as usize).collect(),","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-worktree-stream/src/lib.rs#L101"},{"ref":"gix-worktree-stream/src/lib.rs:191","code":"  191 |                 buf: std::iter::repeat_n(0, u16::MAX as usize).collect(),","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-worktree-stream/src/lib.rs#L191"}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`from_env()` constructs an `EnvironmentOverrides` and returns `Result<Self, ...>` but never actually returns an error - it reads env vars infallibly and always returns Ok. The `Result` wrapper and the `?` at the call site are dead error-handling, and the doc/signature implies a fallibility that doesn't exist.","fix":"Change the return type to `Self` (non-fallible) and drop the `?` at the call site, or actually perform the permission check that the Result type suggests.","locations":[{"ref":"gix/src/open/repository.rs:38-50","code":"   38 | impl EnvironmentOverrides {\n   39 |     fn from_env() -> Result<Self, gix_sec::permission::Error<std::path::PathBuf>> {\n   40 |         let mut worktree_dir = None;\n   41 |         if let Some(path) = std::env::var_os(Core::WORKTREE.the_environment_override()) {\n   42 |             worktree_dir = PathBuf::from(path).into();\n   43 |         }\n   44 |         let mut git_dir = None;\n   45 |         if let Some(path) = std::env::var_os(\"GIT_DIR\") {\n   46 |             git_dir = PathBuf::from(path).into();\n   47 |         }\n   48 |         Ok(EnvironmentOverrides { worktree_dir, git_dir })\n   49 |     }\n   50 | }","lines":13,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/open/repository.rs#L38-L50"}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`PartialEq for Repository` calls `Path::canonicalize()` (a syncing filesystem syscall, up to 4 times) on every equality comparison. Equality checks can be surprisingly expensive and can fail/behave oddly if the paths no longer exist on disk, since `canonicalize().ok()` maps both errors to None making two distinct non-existent repos compare equal.","fix":"Consider comparing already-normalized stored paths instead of canonicalizing on each comparison, and beware that two non-existent paths both canonicalizing to None compare equal.","locations":[{"ref":"gix/src/repository/impls.rs:40-46","code":"   40 | impl PartialEq<crate::Repository> for crate::Repository {\n   41 |     fn eq(&self, other: &crate::Repository) -> bool {\n   42 |         self.git_dir().canonicalize().ok() == other.git_dir().canonicalize().ok()\n   43 |             && self.work_tree.as_deref().and_then(|wt| wt.canonicalize().ok())\n   44 |                 == other.work_tree.as_deref().and_then(|wt| wt.canonicalize().ok())\n   45 |     }\n   46 | }","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/repository/impls.rs#L40-L46"}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`NthAncestor` out-of-range error construction re-runs the entire first-parent ancestor walk a second time\n(`id.ancestors().first_parent_only().all()....skip(1).count()`) just to report how many ancestors exist.\nFor deep histories this doubles the traversal cost on the error path. Same pattern (re-walking to count)\nappears for the reflog/checkout out-of-range messages.","fix":"Count ancestors once during the first walk, or accept an approximate/omitted count in the error message.","locations":[{"ref":"gix/src/revision/spec/parse/delegate/navigate.rs:75-85","code":"   75 |                                 message!(\"Commit {oid} has {available} ancestors along the first parent and ancestor number {num} is out of range\",\n   76 |                                     oid = id.shorten_or_id(),\n   77 |                                     available = id\n   78 |                                         .ancestors()\n   79 |                                         .first_parent_only()\n   80 |                                         .all()\n   81 |                                         .expect(\"cannot fail without sorting\")\n   82 |                                         .skip(1)\n   83 |                                         .count()\n   84 |                                 ).raise_erased()\n   85 |                         )),","lines":11,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/revision/spec/parse/delegate/navigate.rs#L75-L85"}]},{"id":"PERF_21","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`gather_paths` materializes a `Vec` via `.values(\"path\").into_iter().map(...).collect()`. `values()`\nitself already allocates a `Vec<Cow<BStr>>` and normalizes each value, so include-path gathering does two\nallocations per include section. Minor, but it is on the include-resolution path.","fix":"Iterate the body events directly for `path` values instead of going through `values()` if avoiding the\nintermediate Vec matters; otherwise leave as-is (paths-per-section is small).","locations":[{"ref":"gix-config/src/file/includes/mod.rs:144-151","code":"  144 | fn gather_paths(section: &file::Section<'_>, id: SectionId) -> Vec<(SectionId, crate::Path<'static>)> {\n  145 |     section\n  146 |         .body\n  147 |         .values(\"path\")\n  148 |         .into_iter()\n  149 |         .map(|path| (id, crate::Path::from(Cow::Owned(path.into_owned()))))\n  150 |         .collect()\n  151 | }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config/src/file/includes/mod.rs#L144-L151"}]},{"id":"PERF_22","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`normalize` strips enclosing quotes in a loop, and for the `Cow::Owned` case calls `input.remove(0)` each\niteration, which is O(n) (shifts all remaining bytes). With many nested leading quotes on an owned value this\nbecomes O(n^2). The borrowed fast-path is fine; only the owned branch is affected.","fix":"Compute the number of leading/trailing
