unt` from `optimize_chunk_size_and_thread_limit` is used as a divisor for cache sizes. If it\nwere ever 0, this is an integer division-by-zero panic. The helper is documented to return >= 1, so\nlow likelihood, but the code does not defend against it.","fix":"Use `thread_count.max(1)` as the divisor or assert `thread_count > 0`.","locations":[{"ref":"gitoxide-core/src/pack/create.rs:174","code":"  174 |         let (_, _, thread_count) = gix::parallel::optimize_chunk_size_and_thread_limit(50, None, thread_limit, None);","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/create.rs#L174"},{"ref":"gitoxide-core/src/pack/create.rs:178","code":"  178 |             let per_thread_object_pack_size = pack_cache_size_in_bytes / thread_count;","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/create.rs#L178"},{"ref":"gitoxide-core/src/pack/create.rs:186","code":"  186 |                     let per_thread_object_cache_size = object_cache_size_in_bytes / thread_count;","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/create.rs#L186"}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Info::write_to` indexes the `path_by_id` HashMap with `path_by_id[&source_id]` and\n`path_by_id[&self.file_id]`. The map (`seen`) is only populated for the start file id and for\nsource ids encountered during traversal; a row whose `file_id` was never inserted panics via `Index`.\nThe coupling between which ids get inserted into `seen` and which are indexed here is fragile.","fix":"Use `.get(&id)` with a `<unknown>` fallback, or guarantee insertion before indexing.","locations":[{"ref":"gitoxide-core/src/query/engine/command.rs:189","code":"  189 |                         path_by_id[&source_id],","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/engine/command.rs#L189"},{"ref":"gitoxide-core/src/query/engine/command.rs:190","code":"  190 |                         path_by_id[&self.file_id],","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/engine/command.rs#L190"},{"ref":"gitoxide-core/src/query/engine/command.rs:201","code":"  201 |                         path_by_id[&self.file_id]","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/engine/command.rs#L201"}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`map.remote_refs.len() - map.mappings.len()` is computed as a raw subtraction in both the `if` guard\nand the printed value. If mappings ever exceeds remote_refs (extra/implicit refspecs, object-id\nsources), this underflows and panics in debug. The analogous code in fetch.rs uses `saturating_sub`\nfor the printed value (line 323) but a raw subtraction in the guard (line 318), so the codebase is\ninternally inconsistent about this risk.","fix":"Compute `let filtered = remote_refs.len().saturating_sub(mappings.len());` once and use it for both the guard and the message.","locations":[{"ref":"gitoxide-core/src/repository/remote.rs:203","code":"  203 |         if map.remote_refs.len() - map.mappings.len() != 0 {","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/remote.rs#L203"},{"ref":"gitoxide-core/src/repository/remote.rs:208","code":"  208 |                 map.remote_refs.len() - map.mappings.len(),","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/remote.rs#L208"},{"ref":"gitoxide-core/src/repository/fetch.rs:318","code":"  318 |         if map.remote_refs.len() - map.mappings.len() != 0 {","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/fetch.rs#L318"}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The debug-only invariant block indexes `source_lines_as_tokens[i as usize]` and `blamed_lines_as_tokens[i as usize]`\ndirectly from `range_in_suspect`/`range_in_blamed_file`. If blame bookkeeping ever lets a range exceed the actual token\ncount of the source or blamed blob (which is exactly the kind of corruption finding #1 can cause), this panics with an\nout-of-bounds index in debug builds. It is debug-only, but it means a logic error elsewhere surfaces as an opaque index\npanic instead of a descriptive assertion.","fix":"Bounds-check the indices (use `.get()`), or assert the ranges fit within the token vectors before indexing, with a descriptive message.","locations":[{"ref":"gix-blame/src/file/function.rs:223-232","code":"  223 |                     let source_lines = range_in_suspect\n  224 |                         .clone()\n  225 |                         .map(|i| BString::new(source_interner[source_lines_as_tokens[i as usize]].into()))\n  226 |                         .collect::<Vec<_>>();\n  227 |                     let blamed_lines = range_in_blamed_file\n  228 |                         .clone()\n  229 |                         .map(|i| BString::new(blamed_interner[blamed_lines_as_tokens[i as usize]].into()))\n  230 |                         .collect::<Vec<_>>();\n  231 | \n  232 |                     assert_eq!(source_lines, blamed_lines);","lines":10,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-blame/src/file/function.rs#L223-L232"}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`AsRef<str>` for the case-insensitive `Name`/`ValueName` wrappers calls\n`std::str::from_utf8(...).expect(\"only valid UTF8 makes it through our validation\")`. This holds for values\nconstructed via the validating `TryFrom`, but `from_str_unchecked` (used internally for lookups) bypasses\nvalidation. If a `from_str_unchecked`-constructed name (or any future non-UTF8 path) is ever passed through\n`AsRef<str>`, this panics. The invariant is real but implicit and easy to break with the `_unchecked` ctor.","fix":"Either document the UTF-8 invariant on `from_str_unchecked` explicitly (it currently only takes `&str`, so\nit is safe there), or make `AsRef<str>` return a lossy/`Result` form. At minimum ensure no `_unchecked`\nconstruction can introduce non-UTF8 bytes that later reach this `expect`.","locations":[{"ref":"gix-config/src/parse/section/mod.rs:143-147","code":"  143 |             impl<'a> std::convert::AsRef<str> for $name<'a> {\n  144 |                 fn as_ref(&self) -> &str {\n  145 |                     std::str::from_utf8(self.0.as_ref()).expect(\"only valid UTF8 makes it through our validation\")\n  146 |                 }\n  147 |             }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config/src/parse/section/mod.rs#L143-L147"},{"ref":"gix-config/src/parse/section/mod.rs:62-65","code":"   62 |             impl<'a> $name<'a> {\n   63 |                 pub(crate) fn from_str_unchecked(s: &'a str) -> Self {\n   64 |                     $name(std::borrow::Cow::Borrowed(s.into()))\n   65 |                 }","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config/src/parse/section/mod.rs#L62-L65"}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`prepare_diff` and `find_match` rely on `unreachable!(\"we have disabled this possibility with an option\")`\nfor the `Operation::ExternalCommand` case, the safety of which depends on `emit()` having set\n`skip_internal_diff_if_external_is_configured = false` (tracker.rs:231). This coupling is implicit: any future\ncaller that constructs the similarity path without going through `emit()` (or a refactor that reorders the\noption reset) would turn a configuration mismatch into a hard panic instead of an error. The invariant is real\nbut undocumented at the `unreachable!` site.","fix":"Document the cross-module invariant at the `unreachable!` and/or replace it with a returned\n`emit::Error`/`debug_assert!` so a broken invariant degrades gracefully rather than aborting.","locations":[{"ref":"gix-diff/src/rewrites/tracker.rs:776-778","code":"  776 |                 Operation::ExternalCommand { .. } => {\n  777 |                     unreachable!(\"we have disabled this possibility with an option\")\n  778 |                 }","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-diff/src/rewrites/tracker.rs#L776-L778"}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`path.rfind_byte(b'/').expect(\"dir\")` assumes the index entry path returned by\n`entry_closest_to_directory_or_directory_icase` always contains a `/`. If that invariant is\never violated (a top-level directory entry without a trailing-component slash, e.g. a\nsubmodule/sparse entry at the repo root), this panics during a directory walk on\nattacker-influenceable index contents.","fix":"Use `unwrap_or(path.len())` or treat the no-slash case as 'no exact match' instead of panicking.","locations":[{"ref":"gix-dir/src/walk/classify.rs:411","code":"  411 |                         let slash_idx = path.rfind_byte(b'/').expect(\"dir\");","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-dir/src/walk/classify.rs#L411"}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Several release-build invariant assertions run on the directory-walk hot path\n(`assert_eq!` on `state.on_hold` emptiness, `assert_ne!` that an empty dir isn't a\nRepository, and `unreachable!` for pruned-held entries). These encode internal invariants\nwith 'BUG:' messages; if any classification edge case violates them they convert a logic\nerror into a hard panic mid-walk rather than a recoverable result.","fix":"Consider `debug_assert!` for those that are pure internal invariants, or return an error for cases reachable from filesystem state.","locations":[{"ref":"gix-dir/src/walk/function.rs:122","code":"  122 |         assert_eq!(state.on_hold.len(), 0, \"BUG: after emission, on hold must be empty\");","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-dir/src/walk/function.rs#L122"},{"ref":"gix-dir/src/walk/readdir.rs:235-239","code":"  235 |                     assert_ne!(\n  236 |                         dir_info.disk_kind,\n  237 |                         Some(entry::Kind::Repository),\n  238 |                         \"BUG: it shouldn't be possible to classify an empty dir as repository\"\n  239 |                     );","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-dir/src/walk/readdir.rs#L235-L239"},{"ref":"gix-dir/src/walk/readdir.rs:318-319","code":"  318 |                 Status::Pruned => {\n  319 |                     unreachable!(\"BUG: pruned aren't ever held, check `should_hold()`\")","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-dir/src/walk/readdir.rs#L318-L319"}]},{"id":"PANIC_34","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`encode_to_git` constructs a `&str` from the decoder output via `std::str::from_utf8_unchecked` and only\nafterward, for `RoundTripCheck::Fail`, re-encodes and compares. The unsafe is justified by trusting\n`encoding_rs` to emit valid UTF-8. However the two debug/`assert!` invariants in the `InputEmpty` arm\n(`buf_len >= written` and `read == src.len()`) are compiled in release too (they are `assert!`, not\n`debug_assert!`) and would `panic` rather than return an error if `encoding_rs` ever violated the\ndocumented contract; combined with the `unreachable!` on `OutputFull`. This is defensive but means a\nlibrary consumer can be panicked by encoder-behavior assumptions instead of receiving a recoverable error.\nSame pattern in `encode_to_worktree`.","fix":"Consider converting the `assert!`/`unreachable!` contract checks into returned errors (or `debug_assert!`) so malformed/edge encoder behavior cannot abort the process.","locations":[{"ref":"gix-filter/src/worktree/encode_to_git.rs:44-56","code":"   44 |         let (res, read, written) = decoder.decode_to_utf8_without_replacement(src, buf, true);\n   45 |         match res {\n   46 |             DecoderResult::InputEmpty => {\n   47 |                 assert!(\n   48 |                     buf_len >= written,\n   49 |                     \"encoding_rs estimates the maximum amount of bytes written correctly\"\n   50 |                 );\n   51 |                 assert_eq!(read, src.len(), \"input buffer should be fully consumed\");\n   52 |                 buf.truncate(written);\n   53 |             }\n   54 |             DecoderResult::OutputFull => {\n   55 |                 unreachable!(\"we assure that the output buffer is big enough as per the encoder's estimate\")\n   56 |             }","lines":13,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-filter/src/worktree/encode_to_git.rs#L44-L56"},{"ref":"gix-filter/src/worktree/encode_to_worktree.rs:38-50","code":"   38 |         let (res, read, written) = encoder.encode_from_utf8_without_replacement(src, buf, true);\n   39 |         match res {\n   40 |             EncoderResult::InputEmpty => {\n   41 |                 assert!(\n   42 |                     buf_len >= written,\n   43 |                     \"encoding_rs estimates the maximum amount of bytes written correctly\"\n   44 |                 );\n   45 |                 assert_eq!(read, src_utf8.len(), \"input buffer should be fully consumed\");\n   46 |                 buf.truncate(written);\n   47 |             }\n   48 |             EncoderResult::OutputFull => {\n   49 |                 unreachable!(\"we assure that the output buffer is big enough as per the encoder's estimate\")\n   50 |             }","lines":13,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-filter/src/worktree/encode_to_worktree.rs#L38-L50"}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`State::take_path_backing` asserts `self.entries.is_empty() == self.path_backing.is_empty()`.\nThis invariant can legitimately be violated by a decoded index that has entries which all\nhave empty paths (e.g. a split-index whose entries are replacement placeholders with empty\npaths, as handled in link.rs where split entries deliberately have empty paths), or after\n`remove_entries` removed all entries while leaving the append-only path backing populated.\nIn such states this public method aborts with an assertion failure.","fix":"Relax the assertion or replace it with a graceful no-op/return when the invariant does not strictly hold.","locations":[{"ref":"gix-index/src/access/mod.rs:523-529","code":"  523 |     pub fn take_path_backing(&mut self) -> PathStorage {\n  524 |         assert_eq!(\n  525 |             self.entries.is_empty(),\n  526 |             self.path_backing.is_empty(),\n  527 |             \"BUG: cannot take out backing multiple times\"\n  528 |         );\n  529 |         std::mem::take(&mut self.path_backing)","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/access/mod.rs#L523-L529"}]},{"id":"PANIC_36","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`From<FileTime> for Time` uses `value.unix_seconds().try_into().expect(\"can't represent\nnon-unix times\")`. `unix_seconds()` is an `i64`; converting to `u32` panics for any\ntimestamp before 1970 or after 2106. `Time` from filesystem metadata is built defensively\nelsewhere (`try_into().unwrap_or_default()` in stat.rs), but this `From` impl will panic on\nout-of-range times, which can occur with unusual mtimes on disk.","fix":"Use a saturating/truncating conversion (e.g. `as u32`, matching the documented 'only compare low bits' behavior) instead of `expect`.","locations":[{"ref":"gix-index/src/entry/stat.rs:150-156","code":"  150 | impl From<FileTime> for Time {\n  151 |     fn from(value: FileTime) -> Self {\n  152 |         Time {\n  153 |             secs: value.unix_seconds().try_into().expect(\"can't represent non-unix times\"),\n  154 |             nsecs: value.nanoseconds(),\n  155 |         }\n  156 |     }","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/entry/stat.rs#L150-L156"}]},{"id":"PANIC_37","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`TreeRefIter::offset_to_next_entry` computes `after as usize - before as usize` from raw pointers, where `before` is `buf.as_ptr()` and `after` is `self.data.as_ptr()`. The required invariant `before <= after` is only checked with `debug_assert!`. In release builds, if the function is called with a `buf` that is not the original backing buffer this iterator was created from (the documented but unenforced contract), the unsigned subtraction underflows and yields a nonsensical, huge offset that callers will likely use for slicing, leading to a panic or logic error far from the cause.","fix":"Use `usize::checked_sub` on the pointer addresses and return a `Result`/`Option`, or at least `saturating_sub`, instead of relying on a `debug_assert!` that is compiled out in release.","locations":[{"ref":"gix-object/src/tree/ref_iter.rs:169-178","code":"  169 |     pub fn offset_to_next_entry(&self, buf: &[u8]) -> usize {\n  170 |         let before = (*buf).as_ptr();\n  171 |         let after = (*self.data).as_ptr();\n  172 | \n  173 |         debug_assert!(\n  174 |             before <= after,\n  175 |             \"`TreeRefIter::offset_to_next_entry(): {after:?} <= {before:?}) violated\"\n  176 |         );\n  177 |         (after as usize - before as usize) / std::mem::size_of::<u8>()\n  178 |     }","lines":10,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-object/src/tree/ref_iter.rs#L169-L178"}]},{"id":"PANIC_38","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"After resolving a ref-delta base object for a thin pack, the code re-looks-up the original object id in all\nsnapshot indices and `panic!`s if it can no longer be found. While the comment argues this shouldn't happen\nbecause the object was just found in this snapshot, the lookup loop reborrows `snapshot.indices` and relies\non the snapshot remaining consistent across a recursive `try_find_cached_inner`/`try_header_inner` call that\nitself may replace `*snapshot` (e.g. via `load_one_index` on a missing pack). If the snapshot was swapped out\nduring the recursive base lookup, the original id may genuinely be absent from the new snapshot, turning a\nrecoverable miss into a process-aborting panic when decoding crafted/thin pack data.","fix":"Return a recoverable error (e.g. `Error::DeltaBaseMissing` or a dedicated variant) instead of `panic!` when the original id cannot be re-located after the recursive base lookup.","locations":[{"ref":"gix-odb/src/store_impls/dynamic/find.rs:219-233","code":"  219 |                                 } = match snapshot.indices[idx].lookup(id) {\n  220 |                                     Some(res) => res,\n  221 |                                     None => {\n  222 |                                         let mut out = None;\n  223 |                                         for index in &mut snapshot.indices {\n  224 |                                             out = index.lookup(id);\n  225 |                                             if out.is_some() {\n  226 |                                                 break;\n  227 |                                             }\n  228 |                                         }\n  229 | \n  230 |                                         out.unwrap_or_else(|| {\n  231 |                                            panic!(\"could not find object {id} in any index after looking up one of its base objects {base_id}\" )\n  232 |                                        })\n  233 |                                     }","lines":15,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/store_impls/dynamic/find.rs#L219-L233"},{"ref":"gix-odb/src/store_impls/dynamic/header.rs:115-129","code":"  115 |                                 } = match snapshot.indices[idx].lookup(id) {\n  116 |                                     Some(res) => res,\n  117 |                                     None => {\n  118 |                                         let mut out = None;\n  119 |                                         for index in &mut snapshot.indices {\n  120 |                                             out = index.lookup(id);\n  121 |                                             if out.is_some() {\n  122 |                                                 break;\n  123 |                                             }\n  124 |                                         }\n  125 | \n  126 |                                         out.unwrap_or_else(|| {\n  127 |                                             panic!(\"could not find object {id} in any index after looking up one of its base objects {base_id}\")\n  128 |                                         })\n  129 |                                     }","lines":15,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/store_impls/dynamic/header.rs#L115-L129"}]},{"id":"PANIC_39","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`entry_crc32` indexes `self.data[pack_offset..pack_offset + size]` with no bounds check (only documented as panicking). It is called during traversal with `entry_len`/sizes derived from decode results. While current callers pass verified ranges, an off-by-one in any future caller (or a size computed from a corrupt entry header before validation) would index out of bounds and panic, whereas the sibling `entry_slice` safely returns `Option` via `.get()`.","fix":"Use `self.data.get(pack_offset..pack_offset + size)` and return a `Result`/`Option`, or at minimum assert the range against `self.data.len()` with a clear corruption error at the call sites that handle untrusted sizes.","locations":[{"ref":"gix-pack/src/data/mod.rs:144-147","code":"  144 |     pub fn entry_crc32(&self, pack_offset: Offset, size: usize) -> u32 {\n  145 |         let pack_offset: usize = pack_offset.try_into().expect(\"pack_size fits into usize\");\n  146 |         gix_features::hash::crc32(&self.data[pack_offset..pack_offset + size])\n  147 |     }","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/data/mod.rs#L144-L147"}]},{"id":"PANIC_40","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`iter_v1`/`iter_v2` and `decode_header_size`-adjacent code aside, several public index accessors (`oid_at_index`, `pack_offset_at_index`, `crc32_at_index`) index `self.data` directly using an `EntryIndex` argument with only a doc-comment `# Panics` contract and no internal bounds check. If a caller passes an out-of-range index (e.g. derived from a separate, mismatched index/multi-index), these panic via slice indexing rather than returning an error. This is by-contract but fragile given the crate parses untrusted data.","fix":"Consider debug_assert!-ing the index against `self.num_objects` (as `multi_index/access.rs::oid_at_index` already does), and/or providing checked variants for callers handling untrusted indices.","locations":[{"ref":"gix-pack/src/index/access.rs:80-106","code":"   80 |     pub fn oid_at_index(&self, index: EntryIndex) -> &gix_hash::oid {\n   81 |         let index = index as usize;\n   82 |         let start = match self.version {\n   83 |             index::Version::V2 => V2_HEADER_SIZE + index * self.hash_len,\n   84 |             index::Version::V1 => V1_HEADER_SIZE + index * (N32_SIZE + self.hash_len) + N32_SIZE,\n   85 |         };\n   86 |         gix_hash::oid::from_bytes_unchecked(&self.data[start..][..self.hash_len])\n   87 |     }\n   88 | \n   89 |     /// Returns the offset into our pack data file at which to start reading the object at `index`.\n   90 |     ///\n   91 |     /// # Panics\n   92 |     ///\n   93 |     /// If `index` is out of bounds.\n   94 |     pub fn pack_offset_at_index(&self, index: EntryIndex) -> data::Offset {\n   95 |         let index = index as usize;\n   96 |         match self.version {\n   97 |             index::Version::V2 => {\n   98 |                 let start = self.offset_pack_offset_v2() + index * N32_SIZE;\n   99 |                 self.pack_offset_from_offset_v2(&self.data[start..][..N32_SIZE], self.offset_pack_offset64_v2())\n  100 |             }\n  101 |             index::Version::V1 => {\n  102 |                 let start = V1_HEADER_SIZE + index * (N32_SIZE + self.hash_len);\n  103 |                 u64::from(crate::read_u32(&self.data[start..][..N32_SIZE]))\n  104 |             }\n  105 |         }\n  106 |     }","lines":27,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/index/access.rs#L80-L106"}]},{"id":"PANIC_41","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`peek_buffer_replace_and_truncate` indexes `self.peek_buf` directly (`self.peek_buf[position]` and\n`self.peek_buf[..4]`) after adding `U16_HEX_BYTES` to `position`. This is a public method with no\nbounds checking, so a caller passing a `position` beyond the current peeked line length (or calling it\nwhen `peek_buf` is shorter than 4 bytes) triggers an out-of-bounds index panic. Internal callers in\ngix-transport compute `position` from a found delimiter so they are safe in practice, but the public\ncontract offers no protection.","fix":"Validate `position + U16_HEX_BYTES < self.peek_buf.len()` (and that `peek_buf.len() >= 4`) before\nindexing, returning a `Result`/`Option` or documenting/asserting the precondition with a clear message\nrather than panicking via raw indexing.","locations":[{"ref":"gix-packetline/src/read.rs:79-86","code":"   79 |     pub fn peek_buffer_replace_and_truncate(&mut self, position: usize, replace_with: u8) {\n   80 |         let position = position + U16_HEX_BYTES;\n   81 |         self.peek_buf[position] = replace_with;\n   82 | \n   83 |         let new_len = position + 1;\n   84 |         self.peek_buf.truncate(new_len);\n   85 |         self.peek_buf[..4].copy_from_slice(&crate::encode::u16_to_hex((new_len) as u16));\n   86 |     }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-packetline/src/read.rs#L79-L86"}]},{"id":"PANIC_42","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`config_to_base_path` does `config_path.parent().expect(\"config file paths always have a file name to pop\")`. `Path::parent()` returns `None` for a root-only path (e.g. `/`). The value originates from `first_file_from_config_with_origin`, which extracts everything between `file:` and the first NUL with no validation that the path has a file-name component. Degenerate git output such as `file:/\\0` yields path `/`, whose `.parent()` is None, panicking inside `installation_config_prefix()`.","fix":"Return `Option`/`Result` and propagate `None` instead of `expect`, and reject empty/root extracted paths.","locations":[{"ref":"gix-path/src/env/git/mod.rs:209-213","code":"  209 | pub(super) fn config_to_base_path(config_path: &Path) -> &Path {\n  210 |     config_path\n  211 |         .parent()\n  212 |         .expect(\"config file paths always have a file name to pop\")\n  213 | }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/env/git/mod.rs#L209-L213"},{"ref":"gix-path/src/env/git/mod.rs:181-185","code":"  181 | fn first_file_from_config_with_origin(source: &BStr) -> Option<&BStr> {\n  182 |     let file = source.strip_prefix(b\"file:\")?;\n  183 |     let end_pos = file.find_byte(b'\\0')?;\n  184 |     file[..end_pos].as_bstr().into()\n  185 | }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/env/git/mod.rs#L181-L185"}]},{"id":"PANIC_43","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`LineRef::previous_oid()` / `new_oid()` call `ObjectId::from_hex(...).expect(\"parse validation\")`.\nThe reflog parser validates hashes with `hex_hash_any`, which accepts any\nlength matching a supported hash kind, but `ObjectId::from_hex` is the\nauthority on what is parseable. These accessors are public API; if a caller\nconstructs a `LineRef` directly (the struct fields are reachable within the\ncrate, and `from_bytes` is the only guard) or a future hash kind diverges, the\n`expect` panics. The invariant is real today but fragile and relies on two\nindependent validators agreeing.","fix":"Return `Result` from these accessors, or make `from_bytes` the sole\nconstructor and assert the hash parses there once, storing the parsed\n`ObjectId` instead of re-parsing on each accessor call.","locations":[{"ref":"gix-ref/src/store/file/log/line.rs:54-60","code":"   54 |     pub fn previous_oid(&self) -> ObjectId {\n   55 |         ObjectId::from_hex(self.previous_oid).expect(\"parse validation\")\n   56 |     }\n   57 |     /// The new object id of the ref, or a null hash if it is removed.\n   58 |     pub fn new_oid(&self) -> ObjectId {\n   59 |         ObjectId::from_hex(self.new_oid).expect(\"parse validation\")\n   60 |     }","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-ref/src/store/file/log/line.rs#L54-L60"}]},{"id":"PANIC_44","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`long_describe_prefix` uses `unsafe { token.as_ptr().offset_from(first_token_ptr) }` and then\n`.try_into().expect(\"positive value\")` to recover the byte length of the prefix part of a describe\nstring. This relies on `first_token_ptr` always being <= `token.as_ptr()` (i.e. the tokens come from\nthe same allocation in forward order). The split iterator is consumed via `rsplit` and then\n`next_back`, and the safety/order reasoning is subtle; if the assumption is ever violated the\n`offset_from` is UB and the `expect` panics. Given the crate is `#![forbid(unsafe_code)]` elsewhere,\nthis lone `#[allow(unsafe_code)]` pointer-arithmetic block is an unnecessary risk for what is a pure\nstring-offset computation derivable safely from the original `name` slice indices.","fix":"Compute the offsets using safe slice index arithmetic against the original `name` buffer (e.g. track byte ranges from `name.split`/`rsplit` positions) instead of raw pointer `offset_from`.","locations":[{"ref":"gix-revision/src/spec/parse/function.rs:241-278","code":"  241 | fn long_describe_prefix(name: &BStr) -> Option<(&BStr, delegate::PrefixHint<'_>)> {\n  242 |     let mut iter = name.rsplit(|b| *b == b'-');\n  243 |     let candidate = iter.by_ref().find_map(|substr| {\n  244 |         if substr.first()? != &b'g' {\n  245 |             return None;\n  246 |         }\n  247 |         let rest = substr.get(1..)?;\n  248 |         rest.iter().all(u8::is_ascii_hexdigit).then(|| rest.as_bstr())\n  249 |     })?;\n  250 | \n  251 |     let candidate = iter.clone().any(|token| !token.is_empty()).then_some(candidate);\n  252 |     let hint = iter\n  253 |         .next()\n  254 |         .and_then(|generation| {\n  255 |             generation\n  256 |                 .to_str()\n  257 |                 .ok()\n  258 |                 .and_then(|generation| usize::from_str(generation).ok())\n  259 |         })\n  260 |         .and_then(|generation| {\n  261 |             iter.next().map(|token| {\n  262 |                 let last_token_len = token.len();\n  263 |                 let first_token_ptr = iter.next_back().map_or(token.as_ptr(), <[_]>::as_ptr);\n  264 |                 // SAFETY: both pointers are definitely part of the same object\n  265 |                 #[allow(unsafe_code)]\n  266 |                 let prior_tokens_len: usize = unsafe { token.as_ptr().offset_from(first_token_ptr) }\n  267 |                     .try_into()\n  268 |                     .expect(\"positive value\");\n  269 |                 delegate::PrefixHint::DescribeAnchor {\n  270 |                     ref_name: name[..prior_tokens_len + last_token_len].as_bstr(),\n  271 |                     generation,\n  272 |                 }\n  273 |             })\n  274 |         })\n  275 |         .unwrap_or(delegate::PrefixHint::MustBeCommit);\n  276 | \n  277 |     candidate.map(|c| (c, hint))\n  278 | }","lines":38,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revision/src/spec/parse/function.rs#L241-L278"}]},{"id":"PANIC_45","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`base_url` uses `url.strip_prefix(base_url).expect(\"BUG: caller assures base_url is subset of url\")`, and `swap_tails` uses `url.replace_range(..base_url.len(), effective_base)`. Both rely on the invariant that `base_url` is a byte-prefix of `url`. `swap_tails` in particular runs before any validation and will panic (out-of-range index) if that invariant is ever violated by a future caller, e.g. if `base_url.len() > url.len()`. These are caller-trusted invariants with no defensive check.","fix":"Guard with `if let Some(tail) = url.strip_prefix(base_url)` / check `base_url.len() <= url.len()` and return the `redirect::Error` (or pass through unchanged) instead of relying on `expect`/`replace_range` panicking.","locations":[{"ref":"gix-transport/src/client/blocking_io/http/redirect.rs:36-39","code":"   36 | pub(crate) fn base_url(redirect_url: &str, base_url: &str, url: String) -> Result<String, Error> {\n   37 |     let tail = url\n   38 |         .strip_prefix(base_url)\n   39 |         .expect(\"BUG: caller assures `base_url` is subset of `url`\");","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/redirect.rs#L36-L39"},{"ref":"gix-transport/src/client/blocking_io/http/redirect.rs:55-63","code":"   55 | pub(crate) fn swap_tails(effective_base_url: Option<&str>, base_url: &str, mut url: String) -> String {\n   56 |     match effective_base_url {\n   57 |         Some(effective_base) => {\n   58 |             url.replace_range(..base_url.len(), effective_base);\n   59 |             url\n   60 |         }\n   61 |         None => url,\n   62 |     }\n   63 | }","lines":9,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/redirect.rs#L55-L63"}]},{"id":"PANIC_46","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Recorder::pop_front_tracked_path_and_set_current` calls `self.path_deque.pop_front().expect(...)`.\nThis is reachable from the breadth-first tree traversal: it is invoked once per dequeued sub-tree\n(breadthfirst.rs:95). The matching `push_back_tracked_path_component` only pushes when the location\nis `Location::Path`. If a custom `Visit` implementation (or a future change) pushes a tree onto\n`state.next` without a corresponding tracked-path push, this `expect` panics. It is a fragile\nexpect on state shared across two methods rather than a guaranteed-by-construction invariant.","fix":"Use `unwrap_or_default()` (as the back variant already does) to avoid panicking on an empty deque.","locations":[{"ref":"gix-traverse/src/tree/recorder.rs:104-111","code":"  104 |     fn pop_front_tracked_path_and_set_current(&mut self) {\n  105 |         if let Some(Location::Path) = self.location {\n  106 |             self.path = self\n  107 |                 .path_deque\n  108 |                 .pop_front()\n  109 |                 .expect(\"every call is matched with push_tracked_path_component\");\n  110 |         }\n  111 |     }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-traverse/src/tree/recorder.rs#L104-L111"},{"ref":"gix-traverse/src/tree/breadthfirst.rs:93-99","code":"   93 |             match state.next.pop_front() {\n   94 |                 Some(oid) => {\n   95 |                     delegate.pop_front_tracked_path_and_set_current();\n   96 |                     tree = objects.find_tree_iter(&oid, &mut state.buf)?;\n   97 |                 }\n   98 |                 None => break Ok(()),\n   99 |             }","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-traverse/src/tree/breadthfirst.rs#L93-L99"}]},{"id":"PANIC_47","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Url::from_parts` builds a `Url`, serializes via `to_bstring`, and re-parses. `to_bstring` does `.expect(\"io cannot fail in memory\")`, but the underlying `write_canonical_form_to` returns an `io::Error` for the structurally invalid `(Some(user), None)` (user without host) case. So calling `from_parts` with a user but no host PANICS instead of returning the `Err` its `Result` signature promises.","fix":"Validate the user/host invariant in `from_parts` and return a parse error, or make `to_bstring` propagate the structural error instead of `expect`.","locations":[{"ref":"gix-url/src/lib.rs:177-199","code":"  177 |     pub fn from_parts(\n  178 |         scheme: Scheme,\n  179 |         user: Option<String>,\n  180 |         password: Option<String>,\n  181 |         host: Option<String>,\n  182 |         port: Option<u16>,\n  183 |         path: BString,\n  184 |         serialize_alternative_form: bool,\n  185 |     ) -> Result<Self, parse::Error> {\n  186 |         parse(\n  187 |             Url {\n  188 |                 scheme,\n  189 |                 user,\n  190 |                 password,\n  191 |                 host,\n  192 |                 port,\n  193 |                 path,\n  194 |                 serialize_alternative_form,\n  195 |             }\n  196 |             .to_bstring()\n  197 |             .as_ref(),\n  198 |         )\n  199 |     }","lines":23,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-url/src/lib.rs#L177-L199"},{"ref":"gix-url/src/lib.rs:450-454","code":"  450 |             (Some(_user), None) => {\n  451 |                 return Err(std::io::Error::other(\n  452 |                     \"Invalid URL structure: user specified without host\",\n  453 |                 ));\n  454 |             }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-url/src/lib.rs#L450-L454"},{"ref":"gix-url/src/lib.rs:542","code":"  542 |         self.write_to(&mut buf).expect(\"io cannot fail in memory\");","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-url/src/lib.rs#L542"}]},{"id":"PANIC_48","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"from_tree run() spawns a background thread (from_tree/mod.rs:50) whose panic is never observed by the consumer.\nMore directly, next_entry() and the Read impl rely on a fixed-size buffer (`buf` sized u16::MAX) in protocol /\nentry.rs. In entry::fill_buf (entry.rs:113-114) the length prefix `nb` read from the stream is used directly to\nindex `self.parent.buf[..nb]`. Although the writer (write_stream) never emits chunks larger than u16::MAX, the\ndecoder trusts the on-wire length completely; if `from_read()` is fed a stream not produced by this crate (the\npublic Stream::from_read accepts arbitrary `impl Read`), a crafted/truncated `nb` cannot exceed buf len (it is a\nu16), so OOB is not reachable, but read_exact on a short stream will surface as an io error rather than a clean\n\"corrupt stream\" diagnostic. The bigger risk is the several `expect()`/`assert!` calls (e.g. next_entry assert at\nentry.rs:17, path_buf expects) that turn protocol misuse into panics rather than errors.","fix":"For untrusted input via from_read(), consider validating chunk lengths and returning an Error instead of relying on\nread_exact panics being impossible; and document that from_read must only consume streams produced by into_read().\nLower priority since the wire `nb` is a u16 and cannot exceed the buffer.","locations":[{"ref":"gix-worktree-stream/src/entry.rs:17-20","code":"   17 |         assert!(\n   18 |             self.path_buf.is_some(),\n   19 |             \"BUG: must consume and drop entry before getting the next one\"\n   20 |         );","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-worktree-stream/src/entry.rs#L17-L20"},{"ref":"gix-worktree-stream/src/entry.rs:107-120","code":"  107 |     fn fill_buf(&mut self) -> std::io::Result<&[u8]> {\n  108 |         if self.parent.pos >= self.parent.filled {\n  109 |             let mut u16_buf = [0; 2];\n  110 |             self.parent.read.read_exact(&mut u16_buf)?;\n  111 |             let nb = u16::from_le_bytes(u16_buf) as usize;\n  112 | \n  113 |             if nb != 0 {\n  114 |                 self.parent.read.read_exact(&mut self.parent.buf[..nb])?;\n  115 |             }\n  116 |             self.parent.filled = nb;\n  117 |             self.parent.pos = 0;\n  118 |         }\n  119 |         Ok(&self.parent.buf[self.parent.pos..self.parent.filled])\n  120 |     }","lines":14,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-worktree-stream/src/entry.rs#L107-L120"},{"ref":"gix-worktree-stream/src/lib.rs:95-105","code":"   95 |     pub fn from_read(read: impl std::io::Read + 'static) -> Self {\n   96 |         Self {\n   97 |             read: utils::Read::Unknown(Box::new(read)),\n   98 |             extra_entries: None,\n   99 |             path_buf: Some(Vec::with_capacity(1024).into()),\n  100 |             err: Default::default(),\n  101 |             buf: std::iter::repeat_n(0, u16::MAX as usize).collect(),\n  102 |             pos: 0,\n  103 |             filled: 0,\n  104 |         }\n  105 |     }","lines":11,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-worktree-stream/src/lib.rs#L95-L105"}]},{"id":"PANIC_49","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In the ambiguity error formatter, `obj.to_tag_ref()` and `obj.to_commit_ref()` are called after only\nchecking `obj.kind`. Both internally `.expect(\"BUG: ...\")` on decode. A present-but-corrupt tag/commit\nobject that has the right kind byte but fails to decode will panic while merely formatting an\n\"ambiguous short id\" error message, turning a diagnostic into a crash.","fix":"Use the fallible `try_to_tag_ref()` / `try_to_commit_ref()` and fall back to `CandidateInfo::Object { kind }` on error.","locations":[{"ref":"gix/src/revision/spec/parse/error.rs:87-93","code":"   87 |                     gix_object::Kind::Tag => {\n   88 |                         let tag = obj.to_tag_ref();\n   89 |                         CandidateInfo::Tag { name: tag.name.into() }\n   90 |                     }\n   91 |                     gix_object::Kind::Commit => {\n   92 |                         use bstr::ByteSlice;\n   93 |                         let commit = obj.to_commit_ref();","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/revision/spec/parse/error.rs#L87-L93"}]},{"id":"PANIC_50","type":"panic","type_label":"Panic","severity":"negligible","easy":true,"description":"`hash::Hasher::write` does `bytes[..8].try_into().unwrap()`, which panics if it is ever fed fewer than 8 bytes. It is documented as only-for-verified-types and in practice only sees object ids (>= 20 bytes), but it is a latent panic if misused via the public `BuildHasher`.","fix":"Guard the length or document the precondition as a debug assertion; not a correctness issue under current usage.","locations":[{"ref":"gix-hashtable/src/lib.rs:74-76","code":"   74 |         fn write(&mut self, bytes: &[u8]) {\n   75 |             self.0 = u64::from_ne_bytes(bytes[..8].try_into().unwrap());\n   76 |         }","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-hashtable/src/lib.rs#L74-L76"}]},{"id":"PANIC_51","type":"panic","type_label":"Panic","severity":"negligible","easy":true,"description":"`Object::into_blob/into_commit/into_tree/into_tag` panic with `panic!(\"BUG: not a ...\")` when the variant does not match. These are public API entry points; while documented as panicking, the existing `try_into_*` variants are the safe form. Callers that pass attacker-influenced object kinds (e.g. after a `find` whose object turned out to be a different kind than expected) can trigger a process abort. Listed for completeness as the panics are intentional but easy to misuse.","fix":"No code change strictly required; ensure call sites use `try_into_*`/`as_*` when the kind is not guaranteed. Optionally document the panic precondition more prominently.","locations":[{"ref":"gix-object/src/object/mod.rs:69-96","code":"   69 |     /// Turns this instance into a [`Blob`], panic otherwise.\n   70 |     pub fn into_blob(self) -> Blob {\n   71 |         match self {\n   72 |             Object::Blob(v) => v,\n   73 |             _ => panic!(\"BUG: not a blob\"),\n   74 |         }\n   75 |     }\n   76 |     /// Turns this instance into a [`Commit`] panic otherwise.\n   77 |     pub fn into_commit(self) -> Commit {\n   78 |         match self {\n   79 |             Object::Commit(v) => v,\n   80 |             _ => panic!(\"BUG: not a commit\"),\n   81 |         }\n   82 |     }\n   83 |     /// Turns this instance into a [`Tree`] panic otherwise.\n   84 |     pub fn into_tree(self) -> Tree {\n   85 |         match self {\n   86 |             Object::Tree(v) => v,\n   87 |             _ => panic!(\"BUG: not a tree\"),\n   88 |         }\n   89 |     }\n   90 |     /// Turns this instance into a [`Tag`] panic otherwise.\n   91 |     pub fn into_tag(self) -> Tag {\n   92 |         match self {\n   93 |             Object::Tag(v) => v,\n   94 |             _ => panic!(\"BUG: not a tag\"),\n   95 |         }\n   96 |     }","lines":28,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-object/src/object/mod.rs#L69-L96"}]},{"id":"PANIC_52","type":"panic","type_label":"Panic","severity":"negligible","easy":true,"description":"The Windows `persist_inner` retry loops end with `unreachable!(\"loop always returns\")` after `for attempt in 0..MAX_ATTEMPTS`. This is only sound because `MAX_ATTEMPTS` is a nonzero const; if it were ever set to 0 the loop body would never run and the `unreachable!` would panic. A latent fragility, not a current bug.","fix":"Add `const _: () = assert!(MAX_ATTEMPTS > 0);`, or restructure so the loop returns a definite value without `unreachable!`.","locations":[{"ref":"gix-tempfile/src/forksafe.rs:74-108","code":"   74 |                 for attempt in 0..MAX_ATTEMPTS {\n   75 |                     match current_file.persist(path) {\n   76 |                         Ok(file) => return Ok(Some(file)),\n   77 |                         Err(err) if attempt + 1 < MAX_ATTEMPTS && should_retry(&err.error) => {\n   78 |                             std::thread::sleep(std::time::Duration::from_millis(RETRY_DELAY_MS));\n   79 |                             current_file = err.file;\n   80 |                         }\n   81 |                         Err(err) => {\n   82 |                             return Err((err.error, {\n   83 |                                 self.inner = TempfileOrTemppath::Tempfile(err.file);\n   84 |                                 self\n   85 |                             }));\n   86 |                         }\n   87 |                     }\n   88 |                 }\n   89 |                 unreachable!(\"loop always returns\")\n   90 |             }\n   91 |             TempfileOrTemppath::Temppath(temppath) => {\n   92 |                 let mut current_path = temppath;\n   93 |                 for attempt in 0..MAX_ATTEMPTS {\n   94 |                     match current_path.persist(path) {\n   95 |                         Ok(_) => return Ok(None),\n   96 |                         Err(err) if attempt + 1 < MAX_ATTEMPTS && should_retry(&err.error) => {\n   97 |                             std::thread::sleep(std::time::Duration::from_millis(RETRY_DELAY_MS));\n   98 |                             current_path = err.path;\n   99 |                         }\n  100 |                         Err(err) => {\n  101 |                             return Err((err.error, {\n  102 |                                 self.inner = TempfileOrTemppath::Temppath(err.path);\n  103 |                                 self\n  104 |                             }));\n  105 |                         }\n  106 |                     }\n  107 |                 }\n  108 |                 unreachable!(\"loop always returns\")","lines":35,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-tempfile/src/forksafe.rs#L74-L108"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"critical","easy":true,"description":"`RelativePath::new_unchecked` transmutes `&BStr` into `&RelativePath`:\n`unsafe { std::mem::transmute(value) }`, with a SAFETY comment claiming the type is \"transparent and equivalent to a `&BStr`\". However the struct is declared with an empty `#[derive()]` and NO `#[repr(transparent)]`. Without `#[repr(transparent)]`, a struct wrapping the unsized `BStr` field has no layout guarantee matching `&BStr`, so transmuting the fat pointer (and its length metadata) is undefined behavior. The safety comment asserts a property the code does not enforce.","fix":"Add `#[repr(transparent)]` to the `RelativePath` struct so the newtype-over-unsized transmute is sound.","locations":[{"ref":"gix-path/src/relative_path.rs:15-18","code":"   15 |     #[derive()]\n   16 |     pub struct RelativePath {\n   17 |         inner: BStr,\n   18 |     }","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/relative_path.rs#L15-L18"},{"ref":"gix-path/src/relative_path.rs:30-36","code":"   30 |     fn new_unchecked(value: &BStr) -> Result<&RelativePath, Error> {\n   31 |         // SAFETY: `RelativePath` is transparent and equivalent to a `&BStr` if provided as reference.\n   32 |         #[allow(unsafe_code)]\n   33 |         unsafe {\n   34 |             std::mem::transmute(value)\n   35 |         }\n   36 |     }","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/relative_path.rs#L30-L36"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`num_objects` (a usize from `counts.len()`) is cast to `u32` for the pack header. A count exceeding\nu32::MAX silently truncates, producing a corrupt pack header rather than a hard error. Git packs are\nlimited to a u32 object count by format, so an over-large count should be rejected explicitly.","fix":"Use `u32::try_from(num_objects)?` and return an error if it does not fit.","locations":[{"ref":"gitoxide-core/src/pack/create.rs:266","code":"  266 |             num_objects as u32,","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/create.rs#L266"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`Offset::shifted_range` for the `Added` case computes `range.start - added` and `range.end - added` on `u32`.\nThis is only guarded by a `debug_assert!(range.start >= *added)`. In release builds (assertions stripped), if the\naccumulated `Added` offset exceeds a hunk's start line, this subtraction underflows and produces a garbage range\n(huge u32), corrupting subsequent blame line mapping and very likely causing OOB token indexing / panics downstream\n(e.g. in `Outcome::entries_with_lines` / the debug source-vs-blamed assertion). `shift_by` is invoked throughout\n`process_change` with offsets accumulated from prior added/deleted changes, so a hunk close to the start of the file\nwith a large preceding net-addition offset can trigger it.","fix":"Use checked/saturating subtraction and treat underflow as a real error rather than relying on a debug_assert; e.g. `range.start.checked_sub(*added)` and propagate/clamp instead of wrapping.","locations":[{"ref":"gix-blame/src/types.rs:262-276","code":"  262 |     pub fn shifted_range(&self, range: &Range<u32>) -> Range<u32> {\n  263 |         match self {\n  264 |             Offset::Added(added) => {\n  265 |                 debug_assert!(range.start >= *added, \"{self:?} {range:?}\");\n  266 |                 Range {\n  267 |                     start: range.start - added,\n  268 |                     end: range.end - added,\n  269 |                 }\n  270 |             }\n  271 |             Offset::Deleted(deleted) => Range {\n  272 |                 start: range.start + deleted,\n  273 |                 end: range.end + deleted,\n  274 |             },\n  275 |         }\n  276 |     }","lines":15,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-blame/src/types.rs#L262-L276"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`serde::Serialize for Integer` shifts the raw value left by the suffix bit-offset (10/20/30) with an\nunchecked `<<`. For large user-supplied integers with a `k`/`m`/`g` suffix (e.g. a value near `i64::MAX`\nfollowed by `g`), this overflows: panic in debug builds, silently wrong/truncated number in release.\nThis is inconsistent with the normal access path `Integer::to_decimal()`, which uses `checked_mul` and\nreports an overflow error. Serializing a parsed-but-overflowing config integer should not panic.","fix":"Use the checked path: `self.to_decimal().ok_or_else(|| serde::ser::Error::custom(\"integer overflow\"))?`\nand serialize that, or at minimum `self.value.checked_shl(suffix.bitwise_offset() as u32)` with error\nhandling. Do not use a raw `<<`.","locations":[{"ref":"gix-config-value/src/integer.rs:42-46","code":"   42 |         if let Some(suffix) = self.suffix {\n   43 |             serializer.serialize_i64(self.value << suffix.bitwise_offset())\n   44 |         } else {\n   45 |             serializer.serialize_i64(self.value)\n   46 |         }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config-value/src/integer.rs#L42-L46"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"The directory-create retry loop subtracts from public `usize` retry fields without guarding against zero: `self.retries.on_create_directory_failure -= 1;` (line 157), `self.retries.to_create_entire_directory -= 1;` (line 160), `self.retries.on_interrupt -= 1;` (line 178). `Iter::new_with_retries` accepts an arbitrary `Retries` struct with public fields, so a caller passing any field as 0 triggers an arithmetic underflow panic in debug builds, and in release wraps to `usize::MAX`, defeating the retry limit entirely (a release-mode logic error / effectively unbounded retries).","fix":"Use `checked_sub` and treat `None` as permanent failure, or validate/clamp `Retries` at construction.","locations":[{"ref":"gix-fs/src/dir/create.rs:156-181","code":"  156 |                     NotFound => {\n  157 |                         self.retries.on_create_directory_failure -= 1;\n  158 |                         if let State::CurrentlyCreatingDirectories = self.state {\n  159 |                             self.state = State::SearchingUpwardsForExistingDirectory;\n  160 |                             self.retries.to_create_entire_directory -= 1;\n  161 |                             if self.retries.to_create_entire_directory < 1 {\n  162 |                                 return self.permanent_failure(dir, NotFound);\n  163 |                             }\n  164 |                             self.retries.on_create_directory_failure =\n  165 |                                 self.original_retries.on_create_directory_failure;\n  166 |                         }\n  167 |                         if self.retries.on_create_directory_failure < 1 {\n  168 |                             return self.permanent_failure(dir, NotFound);\n  169 |                         }\n  170 |                         self.cursors.push(dir);\n  171 |                         self.cursors.push(match dir.parent() {\n  172 |                             None => return self.permanent_failure(dir, InvalidInput),\n  173 |                             Some(parent) => parent,\n  174 |                         });\n  175 |                         self.intermediate_failure(dir, err)\n  176 |                     }\n  177 |                     Interrupted => {\n  178 |                         self.retries.on_interrupt -= 1;\n  179 |                         if self.retries.on_interrupt <= 1 {\n  180 |                             return self.permanent_failure(dir, Interrupted);\n  181 |                         }","lines":26,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fs/src/dir/create.rs#L156-L181"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`non_common_revs` is a `usize` that is decremented in several places without a guarantee that it is\nnon-zero. In `mark_common` the seed commit is first marked COMMON (line 56-58 decrements once if it\nwas SEEN && !POPPED), and then the same id is pushed into the local queue and popped in the loop;\nparents are decremented again at line 77-79. The various `self.non_common_revs -= 1` operations\nrely on subtle invariants (SEEN set, POPPED unset, etc.). If any of those invariants is broken by\nout-of-order or duplicated input (e.g. the same id supplied both as known_common and as a tip, or\nACKs for commits in unexpected states), the `usize` underflows, panicking in debug and wrapping to a\nhuge value in release, which then makes `next_have` loop far longer than intended (it stops only when\n`non_common_revs == 0`). The same decrement-without-floor pattern exists in `skipping.rs`.","fix":"Use saturating_sub or assert the invariant before decrementing, e.g. `self.non_common_revs = self.non_common_revs.saturating_sub(1);` to avoid wrap/panic on unexpected input.","locations":[{"ref":"gix-negotiate/src/consecutive.rs:56-58","code":"   56 |                 if commit.data.flags.contains(Flags::SEEN) && !commit.data.flags.contains(Flags::POPPED) {\n   57 |                     self.non_common_revs -= 1;\n   58 |                 }","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-negotiate/src/consecutive.rs#L56-L58"},{"ref":"gix-negotiate/src/consecutive.rs:77-79","code":"   77 |                                 if prev_flags.contains(Flags::SEEN) && !prev_flags.contains(Flags::POPPED) {\n   78 |                                     self.non_common_revs -= 1;\n   79 |                                 }","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-negotiate/src/consecutive.rs#L77-L79"},{"ref":"gix-negotiate/src/skipping.rs:46-49","code":"   46 |                 if let Some(commit) = graph.get_or_insert_commit(id, |entry| {\n   47 |                     if !entry.flags.contains(Flags::POPPED) {\n   48 |                         self.non_common_revs -= 1;\n   49 |                     }","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-negotiate/src/skipping.rs#L46-L49"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In the `skipping` negotiation algorithm, the TTL (time-to-live) of a commit grows multiplicatively\nas `entry.original_ttl * 3 / 2 + 1` on every generation that is not COMMON/ADVERTISED. `original_ttl`\nand `ttl` are `u16` (see `Metadata` in lib.rs). For a sufficiently deep, single-line history the\nrepeated `* 3 / 2 + 1` growth overflows `u16` (it crosses 65535 after roughly 27 hops because each\nstep multiplies by ~1.5). On overflow this panics in debug builds and wraps to a small/garbage value\nin release builds, corrupting the skip schedule. The multiplication `entry.original_ttl * 3` itself\ncan also overflow `u16` before the division. Git uses `int` here, so it never hits this limit in\npractice. A saturating/widening computation (e.g. compute in `u32`/`usize` and clamp) is needed.","fix":"Compute the new TTL in a wider integer type and saturate into u16, e.g. `let nt = (entry.original_ttl as u32 * 3 / 2 + 1).min(u16::MAX as u32) as u16;`.","locations":[{"ref":"gix-negotiate/src/skipping.rs:98-103","code":"   98 |             let new_original_ttl = if entry.ttl > 0 {\n   99 |                 entry.original_ttl\n  100 |             } else {\n  101 |                 entry.original_ttl * 3 / 2 + 1\n  102 |             };\n  103 |             let new_ttl = if entry.ttl > 0 { entry.ttl - 1 } else { new_original_ttl };","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-negotiate/src/skipping.rs#L98-L103"},{"ref":"gix-negotiate/src/lib.rs:50-58","code":"   50 | pub struct Metadata {\n   51 |     /// Used by `skipping`.\n   52 |     /// Only used if commit is not COMMON\n   53 |     pub original_ttl: u16,\n   54 |     /// Used by `skipping`.\n   55 |     pub ttl: u16,\n   56 |     /// Additional information about each commit\n   57 |     pub flags: Flags,\n   58 | }","lines":9,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-negotiate/src/lib.rs#L50-L58"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"Pack statistics divide by `total_compressed_entries_size` and `pack_size` (compression_ratio,\ndelta_compression_ratio, delta gain, pack overhead). For an empty/degenerate pack these denominators\ncan be 0, yielding NaN/inf in the printed statistics. Float division so no panic, but the output is\nmisleading.","fix":"Guard against zero denominators and print 0 / n/a when no data is present.","locations":[{"ref":"gitoxide-core/src/pack/verify.rs:265-266","code":"  265 |     let compression_ratio = stats.total_decompressed_entries_size as f64 / stats.total_compressed_entries_size as f64;\n  266 |     let delta_compression_ratio = stats.total_object_size as f64 / stats.total_compressed_entries_size as f64;","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/verify.rs#L265-L266"},{"ref":"gitoxide-core/src/pack/verify.rs:273-274","code":"  273 |         \"delta gain\", delta_compression_ratio / compression_ratio,\n  274 |         \"pack overhead\", (1.0 - (stats.total_compressed_entries_size as f64 / stats.pack_size as f64)) * 100.0,","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/verify.rs#L273-L274"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"The gzip header mtime is written as `mtime as u32` where `mtime` is an `i64` (`SecondsSinceUnixEpoch`). For timestamps after 2106-02-07 (or negative pre-1970 values) this silently truncates/wraps, embedding a wrong modification time into the produced `.tar.gz` archive.","fix":"Clamp/validate the value into `u32` range (e.g. `mtime.clamp(0, u32::MAX as i64) as u32`) or surface an error for out-of-range timestamps.","locations":[{"ref":"gix-archive/src/write.rs:70","code":"   70 |                                     let gz = flate2::GzBuilder::new().mtime(mtime as u32).write(","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-archive/src/write.rs#L70"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`header.set_mtime(mtime_seconds_since_epoch as u64)` casts an `i64` to `u64`. A negative modification time (pre-1970) becomes an enormous positive u64 in the tar header rather than being clamped or rejected, producing a corrupt/nonsensical mtime field.","fix":"Clamp negative values to 0 (`mtime_seconds_since_epoch.max(0) as u64`) or validate the range.","locations":[{"ref":"gix-archive/src/write.rs:298","code":"  298 |     header.set_mtime(mtime_seconds_since_epoch as u64);","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-archive/src/write.rs#L298"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`out.seen_entries` (a `u32`, defined in walk/mod.rs Outcome) is incremented with\n`removed_without_emitting as u32`, where `removed_without_emitting` is a `usize`. For a\ndirectory with more than u32::MAX collapsed-but-not-emitted entries this silently wraps.\nThis is inconsistent with the rest of the counting (`seen_entries += 1` elsewhere) and is a\nlossy cast on a filesystem-derived count. 4 billion entries in one directory is unrealistic,\nhence low severity.","fix":"Make `seen_entries` a usize, or use saturating add / `u32::try_from(...).unwrap_or(u32::MAX)`.","locations":[{"ref":"gix-dir/src/walk/readdir.rs:390","code":"  390 |         out.seen_entries += removed_without_emitting as u32;","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-dir/src/walk/readdir.rs#L390"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`strip_base_handle_recompute_basename_pos` computes `let pos = pos - base.len();` without a checked\nsubtraction. It relies on the invariant that, once the base has been confirmed to be a prefix of\n`relative_path` (the `strip_prefix`/`eq_ignore_ascii_case` checks just above), any provided `basename_pos`\n(the position just after the last `/`) is `>= base.len()` because `base` always ends in `/`. The invariant\nholds for all current callers, but the raw subtraction will silently wrap in release builds (and panic in\ndebug) if a caller ever passes a `basename_pos` that points inside the base, e.g. via the public\n`gix_glob::search::pattern::strip_base_handle_recompute_basename_pos` free function which performs no such\nvalidation of the caller-supplied `basename_pos`.","fix":"Use `pos.checked_sub(base.len())` and handle/`debug_assert!` the under-base case explicitly.","locations":[{"ref":"gix-glob/src/search/pattern.rs:172-175","code":"  172 |         basename_pos.and_then(|pos| {\n  173 |             let pos = pos - base.len();\n  174 |             (pos != 0).then_some(pos)\n  175 |         }),","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-glob/src/search/pattern.rs#L172-L175"}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`IndentHeuristic::best_slider_end` computes `hunk.start - 1` on a `u32` without guarding against\n`hunk.start == 0`. If a pure-insertion hunk can ever reach this code path with `start == 0`, the subtraction\nunderflows (panic in debug builds, wrap to `u32::MAX` in release, which then makes `top_slider_end` huge and\ncorrupts the subsequent `top_slider_end - group_size` / range computations). The surrounding postprocessor\ncurrently appears to avoid passing `start == 0` here (a `continue` guards the equal-earliest-end case), but the\narithmetic itself is unguarded and the `// TODO: why is this needed` comment shows the invariant is not\nunderstood by the maintainers. This is vendored algorithm code but the modification removed the original safety\ncontext.","fix":"Use saturating arithmetic, e.g. `top_slider_end = top_slider_end.max(hunk.start.saturating_sub(1))`, and add a\ndebug assertion documenting that `hunk.start > 0` is expected here.","locations":[{"ref":"gix-imara-diff/src/slider_heuristic.rs:79-84","code":"   79 |         if top_slider_end < hunk.start - 1 {\n   80 |             top_slider_end = hunk.start - 1;\n   81 |         }\n   82 |         if hunk.end > top_slider_end + MAX_SLIDING {\n   83 |             top_slider_end = hunk.end - MAX_SLIDING;\n   84 |         }","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-imara-diff/src/slider_heuristic.rs#L79-L84"}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`marker_size_multiplier` is a `u8` and is incremented with `options.marker_size_multiplier += 1` once per merge-base\nprocessed in the `while let Some(next_commit_id) = others.pop()` loop (and the routine recurses via `crate::commit`).\nWith more than 255 merge-bases (attacker-influenceable via crafted history) this overflows: debug builds panic, release\nbuilds wrap to 0, silently changing conflict-marker sizing.","fix":"Use `options.marker_size_multiplier = options.marker_size_multiplier.saturating_add(1);`.","locations":[{"ref":"gix-merge/src/commit/virtual_merge_base.rs:77","code":"   77 |             options.marker_size_multiplier += 1;","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-merge/src/commit/virtual_merge_base.rs#L77"}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`EntryMode::extract_from_bytes` slow path accumulates octal digits into a `u16` with `mode = (mode << 3) + b` and only bails with `if idx > 6 { return None; }` *after* the shift for index 6 has already executed. This allows up to 7 octal digits (indices 0..=6) to be folded into `mode` before the 8th digit triggers the error. Seven octal digits need 21 bits, so `mode << 3` silently truncates the high bits in a `u16`, producing a wrong mode instead of rejecting the input. The happy path correctly takes exactly 6 digits, so the two paths disagree on what is a valid mode length.","fix":"Reject when more than 6 octal digits are seen before the shift, i.e. move/adjust the `if idx >= 6` (not `> 6`) check to run before `mode = (mode << 3) + b`, mirroring the 6-digit limit enforced by the happy path.","locations":[{"ref":"gix-object/src/tree/mod.rs:133-151","code":"  133 |             while idx < i.len() {\n  134 |                 let b = i[idx].wrapping_sub(b'0') as u16;\n  135 |                 // Delimiter, return what we got\n  136 |                 if b == b' '.wrapping_sub(b'0') as u16 {\n  137 |                     space_pos = idx;\n  138 |                     break;\n  139 |                 }\n  140 |                 // Not a pure octal input.\n  141 |                 // Performance matters here, so `!(b'0'..=b'7').contains(&b)` won't do.\n  142 |                 if b > 7 {\n  143 |                     return None;\n  144 |                 }\n  145 |                 // More than 6 octal digits we must have hit the delimiter or the input was malformed.\n  146 |                 if idx > 6 {\n  147 |                     return None;\n  148 |                 }\n  149 |                 mode = (mode << 3) + b;\n  150 |                 idx += 1;\n  151 |             }","lines":19,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-object/src/tree/mod.rs#L133-L151"}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`describe()` casts the committer timestamp to `u32` for use as the priority-queue key\n(`parent_commit_date as u32` and `CommitTime = u32`). `committer_timestamp` is a signed seconds\nvalue (`SecondsSinceUnixEpoch`, i64). Commits with timestamps before the unix epoch (negative) or\nbeyond year 2106 (> u32::MAX) silently wrap to a wrong u32 key, reordering the date-priority queue\nand producing an incorrect `depth`/candidate selection. The `as u32` cast is lossy and unchecked.","fix":"Use the native i64 commit time for the queue key (as the merge_base and simple traversals do) instead of truncating to u32.","locations":[{"ref":"gix-revision/src/describe.rs:296-315","code":"  296 |     fn parents_by_date_onto_queue_and_track_names(\n  297 |         graph: &mut Graph<'_, '_, Flags>,\n  298 |         queue: &mut PriorityQueue<CommitTime, gix_hash::ObjectId>,\n  299 |         commit: gix_hash::ObjectId,\n  300 |         commit_flags: Flags,\n  301 |         first_parent: bool,\n  302 |     ) -> Result<(), Exn<Error>> {\n  303 |         graph\n  304 |             .insert_parents(\n  305 |                 &commit,\n  306 |                 &mut |parent_id, parent_commit_date| {\n  307 |                     queue.insert(parent_commit_date as u32, parent_id);\n  308 |                     commit_flags\n  309 |                 },\n  310 |                 &mut |_parent_id, flags| *flags |= commit_flags,\n  311 |                 first_parent,\n  312 |             )\n  313 |             .or_raise(|| message!(\"could not insert parents of commit {} into graph\", commit.to_hex()))?;\n  314 |         Ok(())\n  315 |     }","lines":20,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revision/src/describe.rs#L296-L315"},{"ref":"gix-revision/src/describe.rs:354-355","code":"  354 | /// The timestamp for the creation date of a commit in seconds since unix epoch.\n  355 | type CommitTime = u32;","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revision/src/describe.rs#L354-L355"}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`compute_indegrees_to_depth`/`expand_topo_walk` decrement the indegree with `*i -= 1` where `i: i32`.\nThe indegree is initialized to 1 for tips/ends and to 2 in `indegree_walk_step` (or_insert(2)), then\ndecremented in `expand_topo_walk`. If the topological state is inconsistent (e.g. a commit reached\nmore times via expand than its computed indegree, which can happen with corrupt
