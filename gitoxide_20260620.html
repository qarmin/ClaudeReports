gible","easy":true,"description":"`d.as_secs()` (u64) is cast to `SecondsSinceUnixEpoch` (i64) with `as`, which wraps for absurdly large\ntimestamps. Practically unreachable, but it is a lossy cast masking the conversion.","fix":"Use `i64::try_from(d.as_secs()).unwrap_or_default()`.","locations":[{"ref":"gitoxide-core/src/repository/archive.rs:70","code":"   70 |                     .unwrap_or_default() as gix::date::SecondsSinceUnixEpoch","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/archive.rs#L70"}]},{"id":"OVF_19","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":true,"description":"`estimate_tokens` for byte/bstr/str line sources computes `self.0.len() * 20` in `usize` before dividing by the\nsampled line length. For very large inputs (>~922 PB on 64-bit, but already >107 MB on 32-bit targets) this\nmultiplication overflows. The result is only an allocation-size estimate, so the impact is a bad pre-allocation\n(panic on overflow in debug, wrap in release), not a correctness bug, but it is unnecessarily fragile.","fix":"Use `self.0.len().saturating_mul(20)` or compute the ratio with `u64`/`saturating_*` arithmetic.","locations":[{"ref":"gix-imara-diff/src/sources.rs:194-196","code":"  194 |         let len: usize = self.take(20).map(|line| line.len()).sum();\n  195 |         (self.0.len() * 20).checked_div(len).unwrap_or(100) as u32\n  196 |     }","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-imara-diff/src/sources.rs#L194-L196"},{"ref":"gix-imara-diff/src/sources.rs:229-231","code":"  229 |         let len: usize = self.take(20).map(|line| line.len()).sum();\n  230 |         (self.0.len() * 20).checked_div(len).unwrap_or(100) as u32\n  231 |     }","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-imara-diff/src/sources.rs#L229-L231"},{"ref":"gix-diff/src/blob/platform.rs:149-152","code":"  149 |         fn estimate_tokens(&self) -> u32 {\n  150 |             let len: usize = self.take(20).map(<[u8]>::len).sum();\n  151 |             (self.0.len() * 20).checked_div(len).unwrap_or(100) as u32\n  152 |         }","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-diff/src/blob/platform.rs#L149-L152"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Chunk send logic drops one commit's tree-delta work per chunk. When `chunk.len() == CHUNK_SIZE`,\nthe code sends the full chunk but does NOT push the current `(commit_idx, first_parent, commit)`\ninto the (now-empty) replacement chunk, so that commit's file/line statistics are silently lost.\nThe `else` branch only pushes when the chunk is not yet full. The result is that roughly 1 in every\nCHUNK_SIZE (50) commits is omitted from `gix hours --file-stats/--line-stats`, undercounting stats.","fix":"Always push the current item; flush first when full:\n```\nif let Some((tx_tree, first_parent, commit)) = tree_delta_info {\n    chunk.push((commit_idx, first_parent, commit));\n    if chunk.len() == CHUNK_SIZE {\n        tx_tree.send(std::mem::replace(&mut chunk, Vec::with_capacity(CHUNK_SIZE))).ok();\n    }\n}\n```","locations":[{"ref":"gitoxide-core/src/hours/mod.rs:246-254","code":"  246 |                         if let Some((tx_tree, first_parent, commit)) = tree_delta_info {\n  247 |                             if chunk.len() == CHUNK_SIZE {\n  248 |                                 tx_tree\n  249 |                                     .send(std::mem::replace(&mut chunk, Vec::with_capacity(CHUNK_SIZE)))\n  250 |                                     .ok();\n  251 |                             } else {\n  252 |                                 chunk.push((commit_idx, first_parent, commit));\n  253 |                             }\n  254 |                         }","lines":9,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/hours/mod.rs#L246-L254"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"SKIP_WORKTREE filter only ever matches COMMIT (gitlink) entries, never DIR or SYMLINK entries, so the\nprogress message \"Skipping N DIR/SYMLINK/COMMIT entries\" is wrong and the intended skipping does not\nhappen. `gix::index::entry::Mode` is a bitflags over octal file modes (DIR=0o040000, SYMLINK=0o120000,\nCOMMIT=0o160000), not independent single-bit flags. `maybe_symlink_mode | DIR | COMMIT` collapses to\n0o160000, and `Mode::contains` requires ALL those bits, so only entries whose mode is exactly COMMIT\n(0o160000) match - DIR and SYMLINK entries lack the required bits.","fix":"Compare each mode explicitly rather than OR-ing modes into one `contains` mask, e.g.\n`let m = e.mode; m == maybe_symlink_mode || m == Mode::DIR || m == Mode::COMMIT` (include SYMLINK\nas needed), and update the progress message to match what is actually skipped.","locations":[{"ref":"gitoxide-core/src/index/checkout.rs:42-56","code":"   42 |     let maybe_symlink_mode = if !empty_files && repo.is_some() {\n   43 |         gix::index::entry::Mode::DIR\n   44 |     } else {\n   45 |         gix::index::entry::Mode::SYMLINK\n   46 |     };\n   47 |     for entry in index.entries_mut().iter_mut().filter(|e| {\n   48 |         e.mode\n   49 |             .contains(maybe_symlink_mode | gix::index::entry::Mode::DIR | gix::index::entry::Mode::COMMIT)\n   50 |     }) {\n   51 |         entry.flags.insert(gix::index::entry::Flags::SKIP_WORKTREE);\n   52 |         num_skipped += 1;\n   53 |     }\n   54 |     if num_skipped > 0 {\n   55 |         progress.info(format!(\"Skipping {num_skipped} DIR/SYMLINK/COMMIT entries\"));\n   56 |     }","lines":15,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/index/checkout.rs#L42-L56"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Infinite loop in the lock-acquire error path of `prepare_inner`. When a lock\nfails for an edit that was split from a symbolic ref (i.e. has a `parent_index`\nchain), the code walks the parent chain to recover the original ref name. The\nloop never advances `cursor` to `None` once it reaches the root edit: when\n`parent.parent_index.is_none()` it only assigns `ref_name = parent.name()` and\nleaves `cursor` unchanged, so `while let Some(parent_idx) = cursor` spins\nforever. Any real lock contention on a deref'd symbolic ref turns into a hang\n(DoS). The `else` branch advances the cursor, but the terminating branch does\nnot.","fix":"In the `is_none()` branch, also terminate the walk, e.g. set `cursor = None`\nafter assigning `ref_name`, or restructure as:\n`while let Some(idx) = cursor { let p = &updates[idx]; cursor = p.parent_index; if cursor.is_none() { ref_name = p.name(); } }`.","locations":[{"ref":"gix-ref/src/store/file/transaction/prepare.rs:371-382","code":"  371 |                             let mut cursor = change.parent_index;\n  372 |                             let mut ref_name = change.name();\n  373 |                             while let Some(parent_idx) = cursor {\n  374 |                                 let parent = &updates[parent_idx];\n  375 |                                 if parent.parent_index.is_none() {\n  376 |                                     ref_name = parent.name();\n  377 |                                 } else {\n  378 |                                     cursor = parent.parent_index;\n  379 |                                 }\n  380 |                             }\n  381 |                             ref_name\n  382 |                         },","lines":12,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-ref/src/store/file/transaction/prepare.rs#L371-L382"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Conflict::try_from_entry() computes the number of consumed entries as `num_consumed_entries = stage as usize - 1`,\nwhich assumes every conflict's entries start at stage 1 and are dense. This is wrong for conflicts that have no\nstage-1 entry, like `BothAdded` (stages 2 and 3 only, mask 0b110). For such a conflict consisting of 2 adjacent\nentries, the function returns offset=2 (3-1) instead of 1, telling the caller to skip one entry too many.\n\nIn index_as_worktree::function.rs, that offset is added to the outer loop index (`*outer_entry_index += offset` at\nline 301, and `idx += entries_to_skip_as_conflict_originates_in_previous_chunk + 1` at line 181). The result is that\nthe entry immediately following a stage-2/3-only conflict is skipped, and the next conflict is mis-detected starting\nat the wrong stage entry (its summary and per-stage entries become wrong, and one index entry is silently dropped\nfrom the status output).\n\nThis was verified empirically: forcing a single chunk (so a `BothAdded` conflict is followed by another conflict in\nthe same chunk) makes the existing test `conflict_both_added_and_deleted_by_them` FAIL. The bug is masked in normal\nruns only because chunk boundaries happen to fall between the two conflicts. With debug instrumentation, the\nboth-added conflict at index 0 returns offset=2, advancing past index 2 to index 3.\n\nThe returned value should be the count of *extra* matched entries (i.e. number of matched entries minus 1), not\n`max_stage - 1`. For example track a counter that increments once per matched conflict entry.","fix":"Track a real count of matched entries instead of deriving it from the stage number. E.g.:\n\n    let mut num_matched = 0usize;\n    for (stage, entry) in ... {\n        *mask.get_or_insert(0) |= match stage { 1 => 0b001, 2 => 0b010, 3 => 0b100, _ => 0 };\n        seen[stage as usize - 1] = Some(entry);\n        num_matched += 1;\n    }\n    // return num_matched - 1 as the offset/extra count\n    mask.map(|mask| (..., num_matched - 1, seen))\n\nThis keeps `seen[stage-1]` indexing correct while making the consumed/extra count accurate for sparse stage sets.","locations":[{"ref":"gix-status/src/index_as_worktree/function.rs:658-691","code":"  658 |         let mut num_consumed_entries = 0_usize;\n  659 |         for (stage, entry) in (start_index..(start_index + 3).min(entries.len())).filter_map(|idx| {\n  660 |             let entry = &entries[idx];\n  661 |             let stage = entry.stage_raw();\n  662 |             (stage > 0 && entry.path_in(path_backing) == entry_path).then_some((stage, entry))\n  663 |         }) {\n  664 |             // This could be `1 << (stage - 1)` but let's be specific.\n  665 |             *mask.get_or_insert(0) |= match stage {\n  666 |                 1 => 0b001,\n  667 |                 2 => 0b010,\n  668 |                 3 => 0b100,\n  669 |                 _ => 0,\n  670 |             };\n  671 |             num_consumed_entries = stage as usize - 1;\n  672 |             seen[num_consumed_entries] = Some(entry);\n  673 |         }\n  674 | \n  675 |         mask.map(|mask| {\n  676 |             (\n  677 |                 match mask {\n  678 |                     0b001 => BothDeleted,\n  679 |                     0b010 => AddedByUs,\n  680 |                     0b011 => DeletedByThem,\n  681 |                     0b100 => AddedByThem,\n  682 |                     0b101 => DeletedByUs,\n  683 |                     0b110 => BothAdded,\n  684 |                     0b111 => BothModified,\n  685 |                     _ => unreachable!(\"BUG: bitshifts and typical entry layout doesn't allow for more\"),\n  686 |                 },\n  687 |                 num_consumed_entries,\n  688 |                 seen,\n  689 |             )\n  690 |         })\n  691 |     }","lines":34,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-status/src/index_as_worktree/function.rs#L658-L691"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"SCP-like URL parsing splits at the colon found by `find_scheme`, but `find_scheme` only skips a bracketed IPv6 host when the input STARTS with `[`. For `user@[::1]:path`, the input does not start with `[`, so `find_scheme` returns the first `:` inside the IPv6 literal, and `scp()` then splits host/path at the wrong colon, mis-parsing the URL. The code itself flags this: \"// TODO: this incorrectly splits at IPv6 addresses, check for `[]` before splitting\".","fix":"In `find_scheme`, when `@` precedes `[`, locate the `[` and skip to its matching `]` before searching for the SCP colon.","locations":[{"ref":"gix-url/src/parse.rs:73-86","code":"   73 |     let colon = if input.starts_with(b\"[\") {\n   74 |         // IPv6 address, find the closing bracket first\n   75 |         if let Some(bracket_end) = input.find_byte(b']') {\n   76 |             // Look for colon after the bracket\n   77 |             input[bracket_end + 1..]\n   78 |                 .find_byte(b':')\n   79 |                 .map(|pos| bracket_end + 1 + pos)\n   80 |         } else {\n   81 |             // No closing bracket, treat as regular search\n   82 |             input.find_byte(b':')\n   83 |         }\n   84 |     } else {\n   85 |         input.find_byte(b':')\n   86 |     };","lines":14,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-url/src/parse.rs#L73-L86"},{"ref":"gix-url/src/parse.rs:185-186","code":"  185 |     // TODO: this incorrectly splits at IPv6 addresses, check for `[]` before splitting\n  186 |     let (host, path) = input.split_at(colon);","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-url/src/parse.rs#L185-L186"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`write_to_local_config` opens the local config file for `WriteMode::Overwrite` with `.write(true)`\nbut never sets `.truncate(true)`. The function then writes the entire local config from offset 0\n(`write_to_filter` rewrites all local sections). If the new serialized config is shorter than the\nfile already on disk, the trailing bytes of the previous content are left in place, producing a\ncorrupt config file (stale duplicate/partial sections). This path is reached from\n`setup_branch_config` (the `Overwrite` caller) which rewrites the whole `[branch ...]`/local config\nafter committing in-memory changes, so any shrink in size corrupts `.git/config`.","fix":"Add `.truncate(true)` to the OpenOptions when in `WriteMode::Overwrite`, or open with create/truncate semantics for full rewrites.","locations":[{"ref":"gix/src/clone/fetch/util.rs:47-53","code":"   47 |     let mut local_config = std::fs::OpenOptions::new()\n   48 |         .create(false)\n   49 |         .write(matches!(mode, WriteMode::Overwrite))\n   50 |         .append(matches!(mode, WriteMode::Append))\n   51 |         .open(config.meta().path.as_deref().expect(\"local config with path set\"))?;\n   52 |     local_config.write_all(config.detect_newline_style())?;\n   53 |     config.write_to_filter(&mut local_config, |s| s.meta().source == gix_config::Source::Local)","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/clone/fetch/util.rs#L47-L53"},{"ref":"gix/src/clone/fetch/util.rs:290","code":"  290 |         write_to_local_config(&config, WriteMode::Overwrite)?;","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/clone/fetch/util.rs#L290"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The `gitoxide.objects.noReplace` key is defined (Objects::NO_REPLACE) but is NOT included in the section's `keys()` list, while `ALLOC_LIMIT_IF_REDUCED_TRUST` IS in `keys()` but is the wrong intent vs a defined-but-unlisted key. The `keys()` array omits `NO_REPLACE` entirely, so this key is not part of the documented config tree and won't be found by tree-based validation/lookup, while it is still referenced as a real key elsewhere. This is an inconsistency between the defined constant and the section's declared key set.","fix":"Add `&Self::NO_REPLACE` to the `Objects::keys()` array so the defined key is part of the section's key set (consistent with all other defined keys).","locations":[{"ref":"gix/src/config/tree/sections/gitoxide.rs:453-472","code":"  453 |         /// The `gitoxide.objects.noReplace` key.\n  454 |         pub const NO_REPLACE: keys::Boolean = keys::Boolean::new_boolean(\"noReplace\", &Gitoxide::OBJECTS);\n  455 |         /// The `gitoxide.objects.replaceRefBase` key.\n  456 |         pub const REPLACE_REF_BASE: keys::Any =\n  457 |             keys::Any::new(\"replaceRefBase\", &Gitoxide::OBJECTS).with_environment_override(\"GIT_REPLACE_REF_BASE\");\n  458 |     }\n  459 | \n  460 |     impl Section for Objects {\n  461 |         fn name(&self) -> &str {\n  462 |             \"objects\"\n  463 |         }\n  464 | \n  465 |         fn keys(&self) -> &[&dyn Key] {\n  466 |             &[\n  467 |                 &Self::CACHE_LIMIT,\n  468 |                 &Self::ALLOC_LIMIT,\n  469 |                 &Self::ALLOC_LIMIT_IF_REDUCED_TRUST,\n  470 |                 &Self::REPLACE_REF_BASE,\n  471 |             ]\n  472 |         }","lines":20,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/config/tree/sections/gitoxide.rs#L453-L472"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `transport_options`, the `gitoxide.http.sslVersionMin`/`sslVersionMax` override logic only applies when BOTH min and max are configured (the inner `ssl_version(...).and_then(|min| ssl_version(...).map(|max| min.zip(max)))` produces `Some((min,max))` only if both are Some). If only one of min/max is set, it is silently ignored. The doc note says 'Min and Max must be set to become effective', so this matches intent - but when only `http.sslVersion` (the single value) is also set, the partial min/max are dropped without any warning, which can silently leave SSL at an unintended version. Lower confidence: this is the documented behavior, flagged as a usability/footgun.","fix":"Consider warning (gix_trace) when exactly one of sslVersionMin/sslVersionMax is set but ignored, so users aren't silently surprised that their single bound had no effect.","locations":[{"ref":"gix/src/repository/config/transport.rs:376-401","code":"  376 |                         let min_max = ssl_version(\n  377 |                             config,\n  378 |                             \"gitoxide.http.sslVersionMin\",\n  379 |                             &gitoxide::Http::SSL_VERSION_MIN,\n  380 |                             trusted_only,\n  381 |                             lenient,\n  382 |                         )\n  383 |                         .and_then(|min| {\n  384 |                             ssl_version(\n  385 |                                 config,\n  386 |                                 \"gitoxide.http.sslVersionMax\",\n  387 |                                 &gitoxide::Http::SSL_VERSION_MAX,\n  388 |                                 trusted_only,\n  389 |                                 lenient,\n  390 |                             )\n  391 |                             .map(|max| min.zip(max))\n  392 |                         })?;\n  393 |                         if let Some((min, max)) = min_max {\n  394 |                             let v = opts.ssl_version.get_or_insert(SslVersionRangeInclusive {\n  395 |                                 min: SslVersion::TlsV1_3,\n  396 |                                 max: SslVersion::TlsV1_3,\n  397 |                             });\n  398 |                             v.min = min;\n  399 |                             v.max = max;\n  400 |                         }\n  401 |                     }","lines":26,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/repository/config/transport.rs#L376-L401"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`found_bare_repo` is overwritten on each sibling repository instead of accumulated, so after the loop\nit reflects only the bareness of the LAST repo found among siblings, not whether ANY sibling is bare.\nThe guard `if found_any_repo && !found_bare_repo` is meant to avoid pruning siblings when a bare repo\nexists, but if a bare repo is found and then a non-bare repo follows, `found_bare_repo` ends up false\nand the prune/retain runs anyway - contradicting the adjacent comment \"Don't let bare repositories\ncause siblings to be pruned.\"","fix":"Accumulate with OR: `found_bare_repo |= is_bare;` instead of `found_bare_repo = is_bare;`.","locations":[{"ref":"gitoxide-core/src/organize.rs:88-105","code":"   88 |         let mut found_any_repo = false;\n   89 |         let mut found_bare_repo = false;\n   90 |         for entry in siblings.iter_mut().flatten() {\n   91 |             let path = entry.path();\n   92 |             if let Some(info) = is_repository(&path) {\n   93 |                 let is_bare = info.is_bare;\n   94 |                 entry.client_state = State { info: info.into() };\n   95 |                 entry.read_children_path = None;\n   96 | \n   97 |                 found_any_repo = true;\n   98 |                 found_bare_repo = is_bare;\n   99 |             }\n  100 |         }\n  101 |         // Only return paths which are repositories are further participating in the traversal\n  102 |         // Don't let bare repositories cause siblings to be pruned.\n  103 |         if found_any_repo && !found_bare_repo {\n  104 |             siblings.retain(|e| e.as_ref().is_ok_and(|e| e.client_state.info.is_some()));\n  105 |         }","lines":18,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/organize.rs#L88-L105"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`hasconfig` conditional include matching only supports the exact key glob `remote.*.url`; any other\n`hasconfig:<key>:<value>` condition silently returns `false` (no error, no warning). This is acknowledged in\nthe module deviation note, but the silent `Ok(false)` for unsupported `hasconfig` keys means configs that\nrely on other hasconfig conditions will quietly not apply their includes, which can produce subtly wrong\neffective configuration with no diagnostic.","fix":"At minimum document this limitation at the public `resolve_includes` API, and consider surfacing unsupported\n`hasconfig` keys via a tracing/log warning so silent divergence from git is observable.","locations":[{"ref":"gix-config/src/file/includes/mod.rs:179-204","code":"  179 |         b\"hasconfig\" => {\n  180 |             let mut tokens = condition.splitn(2, |b| *b == b':');\n  181 |             let (key_glob, value_glob) = match (tokens.next(), tokens.next()) {\n  182 |                 (Some(a), Some(b)) => (a, b),\n  183 |                 _ => return Ok(false),\n  184 |             };\n  185 |             if key_glob.as_bstr() != \"remote.*.url\" {\n  186 |                 return Ok(false);\n  187 |             }\n  188 |             let Some(sections) = search_config.sections_by_name(\"remote\") else {\n  189 |                 return Ok(false);\n  190 |             };\n  191 |             for remote in sections {\n  192 |                 for url in remo 1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fs/src/symlink.rs#L50-L60"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"POSIX character classes `[:space:]` and `[:blank:]` are implemented incorrectly and effectively swapped.\nGit's wildmatch.c uses `isspace()` for `[:space:]` (matches space, tab, \\n, \\v, \\f, \\r) and `isblank()`\nfor `[:blank:]` (matches only space and tab). Here, `[:blank:]` uses `t_ch.is_ascii_whitespace()` which\nmatches space/tab/\\n/\\f/\\r (too broad, behaves like isspace), while `[:space:]` only checks `t_ch == b' '`\n(too narrow, missing tab and the other whitespace). As a result `[:blank:]` wrongly matches newlines/CR/FF\nand `[:space:]` wrongly fails to match a tab, diverging from Git and from POSIX semantics.","fix":"Use `matches!(t_ch, b' ' | b'\\t')` for `[:blank:]`, and use `t_ch.is_ascii_whitespace()` (or the explicit\nset space/tab/\\n/\\v/\\f/\\r) for `[:space:]`. Note that Rust's `is_ascii_whitespace` excludes vertical tab\n(0x0B), so to fully match Git/`isspace` you may want `matches!(t_ch, b' ' | b'\\t' | b'\\n' | 0x0B | 0x0C | b'\\r')`.","locations":[{"ref":"gix-glob/src/wildmatch.rs:314-318","code":"  314 |                                         b\"blank\" => {\n  315 |                                             if t_ch.is_ascii_whitespace() {\n  316 |                                                 matched = true;\n  317 |                                             }\n  318 |                                         }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-glob/src/wildmatch.rs#L314-L318"},{"ref":"gix-glob/src/wildmatch.rs:350-354","code":"  350 |                                         b\"space\" => {\n  351 |                                             if t_ch == b' ' {\n  352 |                                                 matched = true;\n  353 |                                             }\n  354 |                                         }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-glob/src/wildmatch.rs#L350-L354"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Known/documented `from_tree` correctness hole: tree shape is trusted beyond per-component\nvalidation. Malicious trees with file/directory conflicts (e.g. `a` and `a/x`, or\n`a`,`a.`,`a/x` where `cmp_filepaths` orders an unrelated entry between a file and its\nconflicting child) can produce an index `State` with inconsistent paths that may panic or\nconfuse downstream checkout/index consumers. This is acknowledged in the doc comment but\nremains an unfixed exploitable inconsistency reachable from untrusted tree objects.","fix":"Add a post-traversal global consistency pass that rejects any path which is both a file and a\ndirectory prefix of another entry (not just adjacent-entry checks), or reject the tree during\ntraversal when a name collides with an existing directory/file prefix.","locations":[{"ref":"gix-index/src/init.rs:52-62","code":"   52 |         /// # Security\n   53 |         ///\n   54 |         /// This currently trusts tree shape beyond individual path-component validation, and is exploitable with\n   55 |         /// malicious trees that contain file/directory conflicts like `a` and `a/x`. Such trees can produce an\n   56 |         /// index [`State`] with inconsistent paths, which may panic or confuse downstream checkout/index consumers.\n   57 |         ///\n   58 |         /// A previous normalization pass tried to remove these conflicts after traversal, but only checked adjacent\n   59 |         /// entries. That was incomplete because [`Entry::cmp_filepaths()`] can order unrelated paths between a file\n   60 |         /// and its conflicting child, for example `a`, `a.`, `a t_hash: tree.kind(),\n  100 |                 timestamp: filetime::FileTime::now(),\n  101 |                 version: Version::V2,\n  102 |                 entries,\n  103 |                 path_backing,\n  104 |                 is_sparse: false,\n  105 |                 tree: None,\n  106 |                 link: None,\n  107 |                 resolve_undo: None,\n  108 |                 untracked: None,\n  109 |                 fs_monitor: None,\n  110 |                 offset_table_at_decode_time: false,\n  111 |                 end_of_index_at_decode_time: false,\n  112 |             })\n  113 |         }\n  114 |     }","lines":52,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/init.rs#L63-L114"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the `consecutive` algorithm, `mark_common` decrements `non_common_revs` for the seed commit when\n`mode == ThisCommitAndAncestors` (line 56-58), but it does so under the guard `flags.contains(SEEN)\n&& !flags.contains(POPPED)`. Then it unconditionally seeds the local traversal queue with `(id, 0)`\nand in the loop, when the commit is already SEEN, walks its parents and decrements again for each\nnewly-common parent (line 77-79). Because the seed id itself is re-processed by the loop (it is\nalready SEEN, so it falls into the `else if` branch), there is a risk of inconsistent accounting\nbetween the initial decrement and the per-parent decrements. While it mirrors git's structure, the\ngix port splits state between a HashMap and the `non_common_revs` counter, making the invariant\nfragile; any divergence directly corrupts the `next_have` termination condition.","fix":"Add debug assertions documenting the invariant on each decrement path, and consider deriving non_common_revs from the graph rather than maintaining a parallel counter.","locations":[{"ref":"gix-negotiate/src/consecutive.rs:41-88","code":"   41 |     fn mark_common(\n   42 |         &mut self,\n   43 |         id: ObjectId,\n   44 |         mode: Mark,\n   45 |         ancestors: Ancestors,\n   46 |         graph: &mut crate::Graph<'_, '_>,\n   47 |     ) -> Result<(), Error> {\n   48 |         let mut is_common = false;\n   49 |         if let Some(commit) = graph\n   50 |             .get_or_insert_commit(id, |data| is_common = data.flags.contains(Flags::COMMON))?\n   51 |             .filter(|_| !is_common)\n   52 |         {\n   53 |             let mut queue = gix_revwalk::PriorityQueue::from_iter(Some((commit.commit_time, (id, 0_usize))));\n   54 |             if let Mark::ThisCommitAndAncestors = mode {\n   55 |                 commit.data.flags |= Flags::COMMON;\n   56 |                 if commit.data.flags.contains(Flags::SEEN) && !commit.data.flags.contains(Flags::POPPED) {\n   57 |                     self.non_common_revs -= 1;\n   58 |                 }\n   59 |             }\n   60 |             while let Some((id, generation)) = queue.pop_value() {\n   61 |                 if graph\n   62 |                     .get(&id)\n   63 |                     .is_none_or(|commit| !commit.data.flags.contains(Flags::SEEN))\n   64 |                 {\n   65 |                     self.add_to_queue(id, Flags::SEEN, graph)?;\n   66 |                 } else if matches!(ancestors, Ancestors::AllUnseen) || generation < 2 {\n   67 |                     if let Some(commit) = graph.get_or_insert_commit(id, |_| {})? {\n   68 |                         for parent_id in commit.parents.clone() {\n   69 |                             let mut prev_flags = Flags::default();\n   70 |                             if let Some(parent) = graph\n   71 |                                 .get_or_insert_commit(parent_id, |data| {\n   72 |                                     prev_flags = data.flags;\n   73 |                                     data.flags |= Flags::COMMON;\n   74 |                                 })?\n   75 |                                 .filter(|_| !prev_flags.contains(Flags::COMMON))\n   76 |                             {\n   77 |                                 if prev_flags.contains(Flags::SEEN) && !prev_flags.contains(Flags::POPPED) {\n   78 |                                     self.non_common_revs -= 1;\n   79 |                                 }\n   80 |                                 queue.insert(parent.commit_time, (parent_id, generation + 1));\n   81 |                             }\n   82 |                         }\n   83 |                     }\n   84 |                 }\n   85 |             }\n   86 |         }\n   87 |         Ok(())\n   88 |     }","lines":48,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-negotiate/src/consecutive.rs#L41-L88"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Relative alternate object-directory paths are resolved against the *root* objects directory rather than\nagainst the directory that actually contains the `info/alternates` file being processed. In `resolve()`,\nthe worklist pops `(depth, dir)` entries, but a relative `path` read from `dir/info/alternates` is joined\nwith `objects_directory` (the original root) instead of `dir`. The module's own doc comment states \"relative\npaths resolve relative to the parent git repository\", and git resolves relative alternates relative to the\nobjects directory containing the alternates file. As a result, chained/nested alternates that use relative\npaths (A -> B -> ../C, where the `../C` is relative to B) resolve to the wrong location and either fail to\nfind the alternate or, worse, resolve to an unintended directory. The existing test only covers the case\nwhere the two repos are siblings of the root, which masks the bug.","fix":"Join the relative alternate path with the current `dir` (the directory whose `info/alternates` is being read), e.g. `let path = dir.join(path);` so nested relative alternates resolve relative to their containing objects directory, matching git semantics and the documented behavior.","locations":[{"ref":"gix-odb/src/alternate/mod.rs:49-60","code":"   49 |     while let Some((depth, dir)) = dirs.pop() {\n   50 |         match fs::read(dir.join(\"info\").join(\"alternates\")) {\n   51 |             Ok(input) => {\n   52 |                 for path in parse::content(&input)?.into_iter() {\n   53 |                     let path = objects_directory.join(path);\n   54 |                     let path_canonicalized = gix_path::realpath_opts(&path, current_dir, MAX_SYMLINKS)?;\n   55 |                     if seen.contains(&path_canonicalized) {\n   56 |                         return Err(Error::Cycle(seen));\n   57 |                     }\n   58 |                     seen.push(path_canonicalized);\n   59 |                     dirs.push((depth + 1, path));\n   60 |                 }","lines":12,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/alternate/mod.rs#L49-L60"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Same off-by-one as the blocking writer, in the async `Writer::poll_write`. It chunks the input at\n`MAX_DATA_LEN` (line 75), but the inner `LineWriter` has `suffix = b\"\\n\"` in text mode and rejects any\nchunk whose `prefix.len()+data.len()+suffix.len() > MAX_DATA_LEN`. So a full `MAX_DATA_LEN` text-mode\nchunk fails with `DataLengthLimitExceeded`. The chunk size must account for the newline suffix length.","fix":"Reduce the per-chunk limit by `self.inner.suffix.len()`, i.e. chunk at\n`(buf.len() - *written).min(MAX_DATA_LEN - self.inner.suffix.len())`.","locations":[{"ref":"gix-packetline/src/async_io/write.rs:73-82","code":"   73 |                 State::WriteData(written) => {\n   74 |                     while *written != buf.len() {\n   75 |                         let data = &buf[*written..*written + (buf.len() - *written).min(MAX_DATA_LEN)];\n   76 |                         let n = ready!(this.inner.as_mut().poll_write(cx, data))?;\n   77 |                         if n == 0 {\n   78 |                             return Poll::Ready(Err(io::ErrorKind::WriteZero.into()));\n   79 |                         }\n   80 |                         *written += n;\n   81 |                         *written -= U16_HEX_BYTES + this.inner.suffix.len();\n   82 |                     }","lines":10,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-packetline/src/async_io/write.rs#L73-L82"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Text-mode chunking in the blocking `Writer::write` is off-by-one: it splits the input into chunks of\n`MAX_DATA_LEN` bytes, but in text mode `encode::text_to_write` appends a trailing newline, so the\neffective data length becomes `MAX_DATA_LEN + 1`. `prefixed_and_suffixed_data_to_write` then computes\n`data_len = 0 + MAX_DATA_LEN + 1 (suffix) > MAX_DATA_LEN` and returns\n`Error::DataLengthLimitExceeded`. As a result, writing a chunk of exactly `MAX_DATA_LEN` (or any larger\ninput that produces a full final/whole chunk) in text mode always fails. Only binary mode is tested\n(`huge_writes_are_split_into_lines`), so this is uncovered. In text mode the chunk size must be\n`MAX_DATA_LEN - 1` to leave room for the newline.","fix":"When in text mode, limit each chunk to `MAX_DATA_LEN - 1` so the appended newline keeps the encoded\nline within `MAX_DATA_LEN`, e.g. `let max = if self.binary { MAX_DATA_LEN } else { MAX_DATA_LEN - 1 };`\nthen split at `buf.len().min(max)`.","locations":[{"ref":"gix-packetline/src/blocking_io/write.rs:53-63","code":"   53 |         while !buf.is_empty() {\n   54 |             let (data, rest) = buf.split_at(buf.len().min(MAX_DATA_LEN));\n   55 |             written += if self.binary {\n   56 |                 encode::data_to_write(data, &mut self.inner)\n   57 |             } else {\n   58 |                 encode::text_to_write(data, &mut self.inner)\n   59 |             }?;\n   60 |             // subtract header (and trailing NL) because write-all can't handle writing more than it passes in\n   61 |             written -= U16_HEX_BYTES + usize::from(!self.binary);\n   62 |             buf = rest;\n   63 |         }","lines":11,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-packetline/src/blocking_io/write.rs#L53-L63"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `normalize`, `was_relative` is captured once from the original input (convert.rs:269). When a relative path with leading `..` consumes `current_dir` (via `path.push(current_dir_opt.take()?)`), the resulting `path` becomes absolute. The final check `if (path.as_os_str().is_empty() || path == current_dir) && was_relative` then returns `Cow::Borrowed(Path::new(\".\"))` even though the resolved path is an absolute path equal to current_dir. E.g. input \"../cwd\" with current_dir \"/cwd\" normalizes to \"/cwd\" but is rewritten to \".\", which downstream resolves against a different cwd - a path-confusion correctness bug.","fix":"Only collapse to \".\" when the produced path is still relative (i.e. current_dir was never consumed). Track whether `current_dir_opt` was taken and require `path.is_relative()` before returning \".\".","locations":[{"ref":"gix-path/src/convert.rs:269","code":"  269 |     let was_relative = path.is_relative();","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/convert.rs#L269"},{"ref":"gix-path/src/convert.rs:286-291","code":"  286 |     if (path.as_os_str().is_empty() || path == current_dir) && was_relative {\n  287 |         Cow::Borrowed(Path::new(\".\"))\n  288 e) -> T) -> std::io::Result<T> {\n  210 |         match REGISTRY.remove(&self.id) {\n  211 |             Some((id, Some(mut t))) => {\n  212 |                 let res = once(t.as_mut_tempfile().expect(\"correct runtime typing\"));\n  213 |                 expect_none(REGISTRY.insert(id, Some(t)));\n  214 |                 Ok(res)\n  215 |             }\n  216 |             None | Some((_, None)) => Err(std::io::Error::new(\n  217 |                 std::io::ErrorKind::NotFound,\n  218 |                 format!(\"The tempfile with id {} wasn't available anymore\", self.id),\n  219 |             )),\n  220 |         }\n  221 |     }","lines":13,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-tempfile/src/handle.rs#L209-L221"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`cleanup_tempfiles_signal_safe()` is documented as signal-safe (\"allocation or deallocation of memory is not allowed\"), but its cleanup path can heap-allocate inside the signal handler. For the `TempfileAndEmptyParentDirectoriesUntil` variant, it reaches `remove::Iter::new`, which on a boundary mismatch builds an error via `format!(\"Removal target '{target}' must be contained in boundary '{boundary}'\", ...)` - a heap allocation. The `std::mem::forget` in `drop_without_deallocation` only avoids DEallocation of the returned value; the `format!` allocation has already happened. Allocating in an async-signal handler can deadlock if the interrupted thread held the allocator lock.","fix":"In the signal-safe path, only unlink the file (skip directory removal), or make the boundary-mismatch error allocation-free.","locations":[{"ref":"gix-tempfile/src/registry.rs:6-43","code":"    6 | /// # Safety\n    7 | /// Note that Mutexes of any kind are not allowed, and so aren't allocation or deallocation of memory.\n    8 | /// We are using lock-free datastructures and sprinkle in `std::mem::forg (an empty marker plus the subtree filename) only when *descending* (lines 89-90), so the\nnumber of `push_back_tracked_path_component` calls and `pop_back` calls must stay perfectly balanced.\nIf `track_location` is set to `FileName` or `None`, the Recorder's pop/push are no-ops, but the\nbreadthfirst path uses `pop_front` with an `expect(...)` that will panic on imbalance. The coupling\nbetween the state machine's push/pop discipline and the delegate is implicit and easy to break.","fix":"Document and assert the push/pop balance invariant, or have the traversal own the path stack rather than depending on the delegate keeping a perfectly mirrored deque.","locations":[{"ref":"gix-traverse/src/tree/depthfirst.rs:71-98","code":"   71 |                 Machine::Iterate {\n   72 |                     tree_buf: buf,\n   73 |                     byte_offset_to_next_entry,\n   74 |                 } => {\n   75 |                     let mut iter = TreeRefIter::from_bytes(&buf[byte_offset_to_next_entry..], root.kind());\n   76 |                     delegate.pop_back_tracked_path_and_set_current();\n   77 |                     while let Some(entry) = iter.next() {\n   78 |                         let entry = entry?;\n   79 |                         if entry.mode.is_tree() {\n   80 |                             delegate.push_path_component(entry.filename);\n   81 |                             let res = delegate.visit_tree(&entry);\n   82 |                             delegate.pop_path_component();\n   83 |                             match res {\n   84 |                                 std::ops::ControlFlow::Continue(true) => {}\n   85 |                                 std::ops::ControlFlow::Break(()) => break 'outer,\n   86 |                                 std::ops::ControlFlow::Continue(false) => continue,\n   87 |                             }\n   88 | \n   89 |                             delegate.push_back_tracked_path_component(\"\".into());\n   90 | verity":"medium","easy":false,"description":"`bytes_to_path`'s host length-limit computation mixes units. The iterator chain filters out all ASCII whitespace, then `skip_while` leading slashes, then `position(|b| *b == b'/')`; `position` returns an index within the post-filter iterator, which does not correspond to byte offsets in `input`, while the `.unwrap_or(input.len() - protocol_end)` fallback is in a different unit (total remaining bytes). The resulting `TooLong` guard triggers inconsistently and does not reliably measure the host portion the error claims.","fix":"Compute the authority span as an explicit byte range (first `/` after `://`, or end) and compare `authority.len()` against the limit; drop whitespace filtering from the length measurement.","locations":[{"ref":"gix-url/src/parse.rs:104-115","code":"  104 |     let bytes_to_path = input[protocol_end + \"://\".len()..]\n  105 |         .iter()\n  106 |         .filter(|b| !b.is_ascii_whitespace())\n  107 |         .skip_while(|b| **b == b'/' || **b == b'\\\\')\n  108 |         .position(|b| *b == b'/')\n  109 |         .unwrap_or(input.len() - protocol_end);\n  110 |     if bytes_to_path > MAX_LEN || protocol_end > MAX_LEN {\n  111 |         return Err(Error::TooLong {\n  112 |             truncated_url: input[..(protocol_end + \"://\".len() + MAX_LEN).min(input.len())].into(),\n  113 |             len: input.len(),\n  114 |         });\n  115 |     }","lines":12,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-url/src/parse.rs#L104-L115"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In matching_exclude_pattern() the directory-match short-circuit is knowingly incorrect per the inline comment: if a\npositive directory pattern is found in matched_directory_patterns_stack, it is returned immediately (line 123),\nignoring the possibility that a preceding negative pattern that didn't match affinity is wrong/misleading and breaks any strict-mode use; likely a\ncopy-paste from a text column.","fix":"Change the column type to `file_id integer`.","locations":[{"ref":"gitoxide-core/src/query/db.rs:56","code":"   56 |             file_id text,","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/db.rs#L56"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`Diff::format` scales `num_plus` with `.ceil()` and `num_minus` with truncation, each up to NUM_CHARS\n(10). Their sum can exceed 10 (e.g. ceil contributes up to 10 plus another near-10), so the trailing\npad loop `(buf.len()..NUM_CHARS)` becomes an empty range and the column is wider than the intended\nfixed 10 chars, misaligning output. No panic, but the fixed-width invariant is not met.","fix":"Clamp `num_plus + num_minus <= NUM_CHARS` (scale both together against the combined total).","locations":[{"ref":"gitoxide-core/src/query/engine/command.rs:147-157","code":"  147 |         fn format(&self, max_diff_lines: usize) -> String {\n  148 |             const NUM_CHARS: f32 = 10.0;\n  149 |             let mut buf = String::with_capacity(NUM_CHARS as usize);\n  150 |             if max_diff_lines != 0 {\n  151 |                 let num_plus = ((self.lines_added as f32 / max_diff_lines as f32) * NUM_CHARS).ceil() as usize;\n  152 |                 let num_minus = ((self.lines_removed as f32 / max_diff_lines as f32) * NUM_CHARS) as usize;\n  153 |                 buf.extend((0..num_plus).map(|_| '+'));\n  154 |                 buf.extend((0..num_minus).map(|_| '-'));\n  155 |             }\n  156 |             buf.extend((buf.len()..NUM_CHARS as usize).map(|_| ' '));\n  157 |             buf","lines":11,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/engine/command.rs#L147-L157"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `status::show`, TreeIndex change rows use field width 2 (`{status: >2}`) while IndexWorktree rows\nand `print_index_entry_status` use width 3 (`{status: >3}`). Output columns from the two status sources\ndo not line up; the two-char conflict codes (e.g. \"UU\"/\"DD\") rely on the width-3 path, making the\nwidth-2 TreeIndex rows the inconsistent ones.","fix":"Use a single consistent width (3) for all status columns, or a shared width constant.","locations":[{"ref":"gitoxide-core/src/repository/status.rs:133","code":"  133 |                             \"{status: >2}  {source_rela_path} → {dest_rela_path}\",","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/status.rs#L133"},{"ref":"gitoxide-core/src/repository/status.rs:144","code":"  144 |                     \"{status: >2}  {rela_path}\",","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/status.rs#L144"},{"ref":"gitoxide-core/src/repository/status.rs:161","code":"  161 |                         \"{status: >3} {rela_path}{slash}\",","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/status.rs#L161"},{"ref":"gitoxide-core/src/repository/status.rs:182","code":"  182 |                     \"{status: >3} {source_rela_path} → {dest_rela_path}\",","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/status.rs#L182"},{"ref":"gitoxide-core/src/repository/status.rs:236","code":"  236 |     writeln!(out, \"{status: >3} {}\", display_path.display())","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/status.rs#L236"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`merge_zero_based_exclusive_range` partitions ranges as overlapping when `!(new_range.end < range.start || range.end < new_range.start)`.\nBecause these are end-exclusive ranges, two strictly adjacent ranges (e.g. `0..5` and `5..10`, which share no lines) are\ntreated as overlapping and merged into `0..10`. This silently coalesces user-specified disjoint blame ranges that merely\ntouch. Depending on intent this may surprise callers passing adjacent 1-based inclusive ranges that map to touching\nexclusive ranges.","fix":"If only true overlaps should merge, use strict comparison that excludes adjacency (e.g. `new_range.end <= range.start || range.end <= new_range.start` as the non-overlap predicate).","locations":[{"ref":"gix-blame/src/types.rs:107-126","code":"  107 |     fn merge_zero_based_exclusive_range(&mut self, new_range: Range<u32>) {\n  108 |         match self {\n  109 |             Self::PartialFile(ranges) => {\n  110 |                 // Partition ranges into those that don't overlap and those that do.\n  111 |                 let (mut non_overlapping, overlapping): (Vec<_>, Vec<_>) = ranges\n  112 |                     .drain(..)\n  113 |                     .partition(|range| new_range.end < range.start || range.end < new_range.start);\n  114 | \n  115 |                 let merged_range = overlapping.into_iter().fold(new_range, |acc, range| {\n  116 |                     acc.start.min(range.start)..acc.end.max(range.end)\n  117 |                 });\n  118 | \n  119 |                 non_overlapping.push(merged_range);\n  120 | \n  121 |                 *ranges = non_overlapping;\n  122 |                 ranges.sort_by_key(|a| a.start);\n  123 |             }\n  124 |             Self::WholeFile => *self = Self::PartialFile(vec![new_range]),\n  125 |         }\n  126 |     }","lines":20,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-blame/src/types.rs#L107-L126"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Attribute::from_str` strips the negation prefix with `s.strip_prefix(\"no-\").or_else(|| s.strip_prefix(\"no\"))`.\nThe bare `no` arm means inputs like `nobold` parse as inverted `bold` (intended), but it also means a\nhypothetical attribute name starting with `no` could be misparsed, and more concretely the ordering makes\n`no-` and `no` both viable so `no-bold` and `nobold` are accepted (matching git), but `noreset`/`no-reset`\nsilently map to \"reset if inverted -> Err\" rather than an unknown-attribute error path that distinguishes\nthem. Behavior matches git closely; flag is that the prefix stripping is order-dependent and fragile if new\nattributes are added whose names begin with `no`.","fix":"Consider matching full tokens (including their `no`/`no-` forms) explicitly, or guard that no attribute name\nbegins with `no`, so the prefix-stripping heuristic cannot collide with a real attribute name.","locations":[{"ref":"gix-config-value/src/color.rs:311-316","code":"  311 |         let inverted = if let Some(rest) = s.strip_prefix(\"no-\").or_else(|| s.strip_prefix(\"no\")) {\n  312 |             s = rest;\n  313 |             true\n  314 |         } else {\n  315 |             false\n  316 |         };","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config-value/src/color.rs#L311-L316"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`key_and_value_range_by` uses `value_range.end == 0` as a sentinel meaning \"end not yet set\" while scanning\nevents in reverse for `ValueNotDone`/`ValueDone`. Index 0 is also a legal event index. A `ValueDone`/\n`ValueNotDone` can never legitimately be at index 0 (a `SectionValueName` must precede it), so this is\ncurrently safe, but  Err(std::io::Error::other(\"Cannot represent offsets larger than +-9900\"));\n   27 |         }\n   28 | \n   29 |         let mut itoa = itoa::Buffer::new();\n   30 |         out.write_all(itoa.format(self.seconds).as_bytes())?;\n   31 |         out.write_all(b\" \")?;\n   32 |         out.write_all(if self.offset < 0 { b\"-\" } else { b\"+\" })?;\n   33 | \n   34 |         const ZERO: &[u8; 1] = b\"0\";\n   35 | \n   36 |         if hours < 10 {\n   37 |             out.write_all(ZERO)?;\n   38 |         }\n   39 |         out.write_all(itoa.format(hours).as_bytes())?;\n   40 | \n   41 |         if minutes < 10 {\n   42 |             out.write_all(ZERO)?;\n   43 |         }\n   44 |         out.write_all(itoa.format(minutes).as_bytes()).map(|_| ())","lines":25,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-date/src/time/write.rs#L20-L44"},{"ref":"gix-date/src/time/write.rs:88-98","code":"   88 |     /// The numerically largest possible time instance.\n   89 |     pub const MAX: Time = Time {\n   90 |         seconds: SecondsSinceUnixEpoch::MAX,\n   91 |         offset: 99 * 60 * 60 + 59 * 60 + 59,\n   92 |     };\n   93 | \n   94 |     /// The numerically smallest possible time instance.\n   95 |     pub const MIN: Time = Time {\n   96 |         seconds: SecondsSinceUnixEpoch::MIN,\n   97 |         offset: -(99 * 60 * 60 + 59 * 60 + 59),\n   98 |     };","lines":11,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-date/src/time/write.rs#L88-L98"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is::bare()` reports a directory as bare unless it contains an `index` file or\nis named `.git`. A freshly `git init`ed non-bare worktree before any add/commit\nhas no `index` and (when probed as the git_dir itself rather than `.git`) will\nbe misclassified as bare. The doc comment notes \"repositories without a L107"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The Interrupted branch in the create retry loop does `self.retries.on_interrupt -= 1;` then `if self.retries.on_interrupt <= 1 { return self.permanent_failure(...) }`. The `<= 1` (instead of `< 1`/`== 0` used by the two sibling branches) gives up one retry early: with the default `on_interrupt: 10` only ~8 actual retries happen, contradicting the documented retry count and the sibling branches' behavior.","fix":"Change `<= 1` to `< 1` to match the other branches and the documented retry count.","locations":[{"ref":"gix-fs/src/dir/create.rs:177-181","code":"  177 |                     Interrupted => {\n  178 |                         self.retries.on_interrupt -= 1;\n  179 |                         if self.retries.on_interrupt <= 1 {\n  180 |                             return self.permanent_failure(dir, Interrupted);\n  181 |                         }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fs/src/dir/create.rs#L177-L181"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`recent_snapshot` uses double-checked locking, but in the `(Some(snapshot), Some(modified_time))` arm, after acquiring the write lock it re-reads `current_modification_time()` and reloads without re-comparing against the existing snapshot's `modified`. If another thread already reloaded to a newer mtime between read-lock release and write-lock acquire, this thread reloads again (redundant `open()`), and can overwrite a fresher snapshot with one stamped at a possibly older time. The `(None, Some)` arm does the correct re-check.","fix":"After acquiring the write lock, re-check `snapshot.modified < modified_time` before reopening.","locations":[{"ref":"gix-fs/src/snapshot.rs:124-138","code":"  124 |             (Some(snapshot), Some(modified_time)) => {\n earch, the final loop that advances `occurrences_iter` past the occurrences contained in\nthe just-matched run compares a *before*-sequence index against an *after*-sequence index:\n`next_token_idx` is yielded from `histogram.token_occurrences(token)` (positions in `before`/file1), while\n`end2` is an index into `after`/file2. The matched run spans `start1..end1` in `before`, so the guard should be\nexpressed in terms of `end1` (a before-index). Because `end1` and `end2` are not generally equal (they share a\nlength but have different bases), this can skip too few or too many candidate occurrences, leading to a\nsub-optimal LCS choice. This is vendored algorithm code and the effect is on diff quality rather than safety, so\nconfidence is moderate.","fix":"Verify against upstream imara-diff: the candidate-skipping guard should compare the next occurrence (a before\nindex) against `end1` rather than `end2`.","locations":[{"ref":"gix-imara-diff/src/histogram/lcs.rs:95-134","code":"   95 |             let mut end1 = token_idx1 + 1;\n   96 |             let mut end2 = after_pos + 1;\n   97 |             loop {\n   98 |                 let token1 = before.get(end1 as usize);\n   99 |                 let token2 = after.get(end2 as usize);\n  100 |                 if matches!((token1, token2), (Some(token1), Some(token2)) if token1 == token2) {\n  101 |                     let new_occurrences = histogram.num_token_occurrences(before[end1 as usize]);\n  102 |                     occurrences = occurrences.min(new_occurrences);\n  103 |                     end1 += 1;\n  104 |                     end2 += 1;\n  105 |                 } else {\n  106 |                     break;\n  107 |                 }\n  108 |             }\n  109 | \n  110 |             if next_token_idx2 < end2 {\n  111 |                 next_token_idx2 = end2;\n  112 |             }\n  113 | \n  114 |             let len = end2 - start2;\n  115 |             debug_assert_eq!(len, end1 - start1);\n  116 | rements at the top of each backoff loop iteration, but the final post-loop `try_lock` (after the backoff iterator is exhausted) does not increment `attempts`. If that last attempt fails with AlreadyExists, the `Error::PermanentlyLocked { attempts }` reports one fewer attempt than were actually made.","fix":"Increment `attempts` immediately before the post-loop `try_lock`, or share a single increment site.","locations":[{"ref":"gix-lock/src/acquire.rs:178-208","code":"  178 |     let mut attempts = 1;\n  179 |     match mode {\n  180 |         Fail::Immediately => try_lock(&lock_path, directory, cleanup),\n  181 |         Fail::AfterDurationWithBackoff(time) => {\n  182 |             for wait in backoff::Quadratic::default_with_random().until_no_remaining(time) {\n  183 |                 attempts += 1;\n  184 |                 match try_lock(&lock_path, directory, cleanup.clone()) {\n  185 |                     Ok(v) => return Ok((lock_path, v)),\n  186 |                     #[cfg(windows)]\n  187 |                     Err(err) if err.kind() == AlreadyExists || err.kind() == PermissionDenied => {\n  188 |                         std::thread::sleep(wait);\n  189 |                         continue;\n  190 |                     }\n  191 |                     #[cfg(not(windows))]\n  192 |                     Err(err) if err.kind() == AlreadyExists => {\n  193 |                         std::thread::sleep(wait);\n  194 |                         continue;\n  195 |                     }\n  196 |                     Err(err) => return Err(Error::from(err)),\n  197 |                 }\n  198 |             }\n  199 |             try_lock(&lock_path, directory, cleanup)\n  200 |         }\n  201 |     }\n  202 |     .map(|v| (lock_path, v))\n  203 |     .map_err(|err| match err.kind() {\n  204 |         AlreadyExists => Error::PermanentlyLocked {\n  205 |             resource_path: resource.into(),\n  206 |             mode,\n  207 |             attempts,\n  208 |         },","l issed merges (duplicate entries) or failed lookups. Practically rare since emails are usually ASCII, but it is a latent correctness bug.","fix":"Define `cmp_ref` as a single consistent ordering (e.g. always compare ASCII-case-folded bytes regardless of UTF-8 validity) so the binary-search ordering is total and stable.","locations":[{"ref":"gix-mailmap/src/snapshot/mod.rs:41-49","code":"   41 |             match self\n   42 |                 .entries_by_old_email\n   43 |                 .binary_search_by(|e| e.old_email.cmp_ref(old_email))\n   44 |             {\n   45 |                 Ok(pos) => self.entries_by_old_email[pos].merge(entry),\n   46 |                 Err(insert_pos) => {\n   47 |                     self.entries_by_old_email.insert(insert_pos, entry.into());\n   48 |                 }\n   49 |             }","lines":9,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-mailmap/src/snapshot/mod.rs#L41-L49"},{"ref":"gix-mailmap/src/snapshot/util.rs:18-29","code":"   18 |     pub fn cmp_ref(&self, other: EncodedStringRef<'_>) -> Ordering {\n   19 |         match (self, other) {\n   20 |             (EncodedString::Utf8(a), EncodedStringRef::Utf8(b)) => {\n   21 |                 let a = a.chars().map(|c| c.to_ascii_lowercase());\n   22 |                 let b = b.chars().map(|c| c.to_ascii_lowercase());\n   23 |                 a.cmp(b)\n   24 |             }\n   25 |             (EncodedString::Unknown(a), EncodedStringRef::Unknown(b)) => a.deref().as_bstr().cmp(b),\n   26 |             (EncodedString::Utf8(a), EncodedStringRef::Unknown(b)) => a.as_bytes().cmp(b.as_ref()),\n   27 |             (EncodedString::Unknown(a), EncodedStringRef::Utf8(b)) => a.deref().as_bytes().cmp(b.as_bytes()),\n   28 |         }\n   29 |     }","lines":12,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-mailmap/src/snapshot/util.rs#L18-L29"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`add_to_queue` in the skipping algorithm inserts into the queue and increments `non_common_revs`\nwhenever `get_or_insert_commit` returns Some, with no SEEN check. The closure unconditionally sets\n`mark | SEEN` (line 23-25). But `add_to_queue` is also called from `push_parent` (line 93) for a\nparent that the surrounding code already verified is not SEEN, and from `known_common`/`add_tip`\nwhich guard on SEEN. Because the closure runs even for an already-present (already-SEEN) commit when\ncalled directly, calling `add_to_queue` twice for the same id (e.g. if a commit is both a tip and a\nknown_common in different rounds) double-counts `non_common_revs` and double-inserts into the queue,\nsince there is no `was_already_seen` short-circuit inside `add_to_queue` itself (unlike the\nconsecutive version which checks `has_mark`).","fix":"Mirror the consecutive algorithm: detect whether SEEN was already set inside the closure and skip the queue insertion / counter increment if so.","locations":[{"ref":"gix-negotiate/src/skipping.rs:20-33","code":"   20 | impl Algorithm {\n   21 |     /// Add `id` to our priority queue and *add* `flags` to it.\n   22 |     fn add_to_queue(&mut self, id: ObjectId, mark: Flags, graph: &mut crate::Graph<'_, '_>) -> Result<(), Error> {\n   23 |         let commit = graph.get_or_insert_commit(id, |entry| {\n   24 |             entry.flags |= mark | Flags::SEEN;\n   25 |         })?;\n   26 |         if let Some(timestamp) = commit.map(|c| c.commit_time) {\n   27 |             self.revs.insert(timestamp, id);\n   28 |             if !mark.contains(Flags::COMMON) {\n   29 |                 self.non_common_revs += 1;\n   30 |             }\n   31 |         }\n   32 |         Ok(())\n   33 |     }","lines":14,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-negotiate/src/skipping.rs#L20-L33"},{"ref":"gix-negotiate/src/consecutive.rs:20-39","code":"   20 | impl Algorithm {\n   21 |     /// Add `id` to our priority queue and *add* `flags` to it.\n   22 |     fn add_to_queue(&mut self, id: ObjectId, mark: Flags, graph: &mut crate::Graph<'_, '_>) -> Result<(), Error> {\n   23 |         let mut is_common = false;\n   24 |         let mut has_mark = false;\n   25 |         if let Some(commit) = graph\n   26 |             .get_or_insert_commit(id, |data| {\n   27 |                 has_mark = data.flags.intersects(mark);\n   28 |                 data.flags |= mark;\n   29 |                 is_common = data.flags.contains(Flags::COMMON);\n   30 |             })?\n   31 |             .filter(|_| !has_mark)\n   32 |         {\n   33 |             self.revs.insert(commit.commit_time, id);\n   34 |             if !is_common {\n   35 |                 self.non_common_revs += 1;\n   36 |             }\n   37 |         }\n   38 |         Ok(())\n   39 |     }","lines":20,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-negotiate/src/consecutive.rs#L20-L39"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`EntryMode::extract_from_bytes` slow path (when the space delimiter is not at index 6) does not handle the case where no space byte is found at all. If the loop walks the whole input without encountering a space (e.g. malformed mode bytes that are pure octal and shorter than the input, with no following space), `space_pos` keeps its initial value of `0`. The function then returns `&i[(space_pos + 1)..]` == `&i[1..]`, i.e. it silently treats index 0 as the delimiter and returns a bogus remainder slice plus a mode parsed from the entire input. A correct parser should fail (return `None`) when no delimiter exists. In practice tree parsing always has a trailing space before the filename so this is only reachable with already-malformed data, but the parser is documented as the place that detects malformed modes.","fix":"Track whether a space was actually found in the slow path and return `None` if the loop completes without finding one, e.g. use `Option<usize>` for `space_pos` and `?` it before computing the remainder slice.","locations":[{"ref":"gix-object/src/tree/mod.rs:128-160","code":"  128 |         else {\n  129 |             let mut idx = 0;\n  130 |             let mut space_pos = 0;\n  131 | \n  132 |             // const fn, this is why we can't have nice things (like `.iter().any()`).\n  133 |             while idx < i.len() {\n  134 |                 let b = i[idx].wrapping_sub(b'0') as u16;\n  135 |                 // Delimiter, return what we got\n  136 |                 if b == b' '.wrapping_sub(b'0') as u16 {\n  137 |                     space_pos = idx;\n  138 |                     break;\n  139 |                 }\n  140 |                 // Not a pure octal input.\n  141 |                 // Performance matters here, so `!(b'0'..=b'7').contains(&b)` won't do.\n  142 |                 if b > 7 {\n  143 |                     return None;\n  144 |                 }\n  145 |                 // More than 6 octal digits we must have hit the delimiter or the input was malformed.\n  146 |                 if idx > 6 {\n  147 |                     return None;\n  148 |                 }\n  149 |                 mode = (mode << 3) + b;\n  150 |                 idx += 1;\n  151 |             }\n  152 | \n  153 |             space_pos\n  154 |         };\n  155 | \n  156 |         // Hack: `0o140000` represents `\"040000\"`, `0o40000` represents `\"40000\"`.\n  157 |         if mode == 0o040000 && i[0] == b'0' {\n  158 |             mode += 0o100000;\n  159 |         }\n  160 |         Some((Self { internal: mode }, &i[(space_pos + 1)..]))","lines":33,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-object/src/tree/mod.rs#L128-L160"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`OnDiskFile::load_strict` treats a previously-`Missing` file as reloadable (it matches `Unloaded | Missing`\nand attempts the load again), but on failure it stores the original `err` without distinguishing the\nnot-found case, whereas the sibling `load_with_recovery` carefully maps `NotFound` to `Ok(None)` and only\npropagates other errors. The asymmetry means `load_strict` reports a hard error for a file that merely went\nmissing, while `load_with_recovery` treats the same situation as recoverable. The strict variant is used by\n`load_index`, so a pack index that disappeared between directory scan and load surfaces as a fatal error\ninstead of triggering a clean reload, even though the surrounding machinery is designed to tolerate\ndisappearing files.","fix":"Consider whether `load_strict` should also special-case `ErrorKind::NotFound` (or document why strict callers must treat a vanished index as fatal); align behavior with `load_with_recovery` where a clean reload is expected.","locations":[{"ref":"gix-odb/src/store_impls/dynamic/types.rs:168-184","code":"  168 |     pub(crate) fn load_strict(&mut self, load: impl FnOnce(&Path) -> std::io::Result<T>) -> std::io::Result<()> {\n  169 |         use OnDiskFileState::*;\n  170 |         match self.state {\n  171 |             Unloaded | Missing => match load(&self.path) {\n  172 |                 Ok(v) => {\n  173 |                     self.state = Loaded(v);\n  174 |                     Ok(())\n  175 |                 }\n  176 |                 Err(err) => {\n  177 |                     // TODO: Should be provide more information? We don't even know what exactly failed right now, degenerating information.\n  178 |                     self.state = Missing;\n  179 |                     Err(err)\n  180 |                 }\n  181 |             },\n  182 |             Loaded(_) | Garbage(_) => Ok(()),\n  183 |         }\n  184 |     }","lines":17,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/store_impls/dynamic/types.rs#L168-L184"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the static LRU cache `put`, memory bookkeeping tracks `Vec::capacity()` (see `mem_used += v.capacity()`), but when freeing the free-list it subtracts `free_list_cap = self.last_evicted.len()` instead of its capacity. Since `len() <= capacity()`, `mem_used` is under-decremented, so the tracked memory usage drifts upward over time and the cache can evict/clear more aggressively than the configured limit requires. Not a safety issue (no underflow), but it degrades cache effectiveness.","fix":"Use `self.last_evicted.capacity()` for `free_list_cap` so the accounting matches how memory is added.","locations":[{"ref":"gix-pack/src/cache/lru.rs:142-150","code":"  142 |                 let free_list_cap = self.last_evicted.len();\n  143 |                 self.last_evicted = Vec::new();\n  144 |                 // still not enough? clear everything\n  145 |                 if data.len() > mem_free + free_list_cap {\n  146 |                     self.inner.clear();\n  147 |                     self.mem_used = 0;\n  148 |                 } else {\n  149 |                     self.mem_used -= free_list_cap;\n  150 |                 }","lines":9,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/cache/lru.rs#L142-L150"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`realpath_opts` increments and checks the `MAX_SYMLINK_CHECKS = 2048` guard (`symlink_checks += 1`) only inside the `Component::Normal` arm. A crafted symlink chain whose expansions consist mostly of `ParentDir`/`CurDir`/`RootDir` components (which re-enter the loop via `link_destination.extend(components)`) advances the loop without incrementing `symlink_checks`. The actual `read_link` count is still bounded by `max_symlinks`, but the component-iteration bound that `ExcessiveComponentCount` claims to enforce (\"takes too long\") does not actually bound total iterations.","fix":"Increment and check `symlink_checks` once per loop iteration for every component, not only `Normal`.","locations":[{"ref":"gix-path/src/realpath.rs:62-63","code":"   62 |         const MAX_SYMLINK_CHECKS: usize = 2048;\n   63 |         let mut symlink_checks = 0;","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/realpath.rs#L62-L63"},{"ref":"gix-path/src/realpath.rs:73-95","code":"   73 |                 Normal(part) => {\n   74 |                     real_path.push(part);\n   75 |                     symlink_checks += 1;\n   76 |                     if real_path.is_symlink() {\n   77 |                         num_symlinks += 1;\n   78 |                         if num_symlinks > max_symlinks {\n   79 |                             return Err(Error::MaxSymlinksExceeded { max_symlinks });\n   80 |                         }\n   81 |                         let mut link_destination = std::fs::read_link(real_path.as_path()).map_err(Error::ReadLink)?;\n   82 |                         if link_destination.is_absolute() {\n   83 |                             // pushing absolute path to real_path resets it to the pushed absolute path\n   84 |                         } else {\n   85 |                             assert!(real_path.pop(), \"we just pushed a component\");\n   86 |                         }\n   87 |                         link_destination.extend(components);\n   88 |                         path_backing = link_destination;\n   89 |                         components = path_backing.components();\n   90 |                     }\n   91 |                     if symlink_checks > MAX_SYMLINK_CHECKS {\n   92 |                         return Err(Error::ExcessiveComponentCount {\n   93 | rror","severity":"low","easy":true,"description":"`single` claims in its doc to escape `!` as `'\\!'`, and the lib.rs example asserts `\"'hello it'\\''s git'\\!''\"`. For `!` it emits `'\\!'` (close-quote, backslash, bang). Inside single quotes a backslash is literal in POSIX sh, so this is specifically a workaround for interactive bash history expansion, not general Bourne-shell quoting; in a plain POSIX sh the produced `\\!` is two literal characters. This is git-compatible behavior but the doc framing (\"suitable for use as an argument for Bourne shells\") is misleading for the `!` case, and the escaping differs from the standard single-quote rule applied to `'`.","fix":"Clarify in the doc that `!` escaping targets bash history expansion (matching git's `sq_quote_buf`), not POSIX sh, so callers understand the non-standard handling.","locations":[{"ref":"gix-quote/src/single.rs:3-22","code":"    3 | /// Transforms the given `value` to be suitable for use as an argument for Bourne shells by wrapping it into single quotes.\n    4 | ///\n    5 | /// Every single-quote `'` is escaped as `'\\''`, every exclamation mark `!` is escaped as `'\\!'`,\n    6 | /// and the entire string is enclosed in single quotes.\n    7 | pub fn single(mut value: &BStr) -> BString {\n    8 |     let mut quoted = BString::new(b\"'\".to_vec());\n    9 | \n   10 |     while let Some(pos) = value.find_byteset(b\"'!\") {\n   11 |         quoted.extend_from_slice(&value[..pos]);\n   12 |         quoted.push_str(br\"'\\\");\n   13 |         quoted.push(value[pos]);\n   14 |         quoted.push(b'\\'');\n   15 | \n   16 |         value = &value[pos + 1..];\n   17 |     }\n   18 | \n   19 |     quoted.extend_from_slice(value);\n   20 |     quoted.push(b'\\'');\n   21 |     quoted\n   22 | }","lines":20,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-quote/src/single.rs#L3-L22"}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`remove_redundant` updates `min_gen` from `sorted_commits[min_gen_pos].1.generation` as it advances\n`min_gen_pos`, but `min_gen` is read at line 113 (`commit_info.generation < min_gen`) to prune the\nwalk. When no commit-graph is available, `generation` is set to `GENERATION_NUMBER_INFINITY` for all\ncommits (see GenThenTime::from), so `min_gen` is always INFINITY and the `< min_gen` pruning never\nfires - the optimization silently degrades to a full walk. Worse, `min_gen` is assigned at line 109\nbut its prior value at line 59 is the smallest generation; the variable is only meaningful with a\ncommit-graph. This isn't a correctness bug but the pruning is dead/ineffective without a graph and the\nreliance on INFINITY as a sentinel is undocumented at the comparison site.","fix":"Document that generation-based pruning only applies with a commit-graph, and consider skipping the min_gen bookkeeping entirely when generations are INFINITY.","locations":[{"ref":"gix-revision/src/merge_base/function.rs:58-116","code":"   58 |     let mut min_gen_pos = 0;\n   59 |     let mut min_gen = sorted_commits[min_gen_pos].1.generation;\n   60 | \n   61 |     let mut walk_start = Vec::with_capacity(commits.len());\n   62 |     for (id, _) in commits {\n   63 |         let commit = graph.get_mut(id).expect(\"previously added\");\n   64 |         commit.data |= Flags::RESULT;\n   65 |         for parent_id in commit.parents.clone() {\n   66 |             graph\n   67 |                 .get_or_insert_full_commit(parent_id, |parent| {\n   68 |                     // prevent double-addition\n   69 |                     if !parent.data.contains(Flags::STALE) {\n   70 |                         parent.data |= Flags::STALE;\n   71 |                         walk_start.push((parent_id, GenThenTime::from(&*parent)));\n   72 |                     }\n   73 |                 })\n   74 |                 .map_err(|_| Simple(\"could not insert parent commit int
