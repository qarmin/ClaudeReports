<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`file::Index::from_bytes` is a public API that slices the input with `&data[toc_offset..]` without first validating that `toc_offset <= data.len()`. If a caller passes (or computes from untrusted chunk-file header data) a `toc_offset` past the end of the mapped buffer, this panics with an out-of-bounds index instead of returning the `ValidationError` the function is designed to produce. The `data_len` value is read on the line just above but never used to guard this slice.","fix":"Bounds-check before slicing, e.g.:\n`let toc_entry = data.get(toc_offset..).ok_or_else(|| ValidationError::new(\"toc_offset is past the end of the chunk file\"))?;`","locations":[{"ref":"gix-chunk/src/file/decode.rs:17-19","code":"   17 |         let data_len: u64 = data.len() as u64;\n   18 |         let mut chunks = Vec::with_capacity(num_chunks as usize);\n   19 |         let mut toc_entry = &data[toc_offset..];","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-chunk/src/file/decode.rs#L17-L19"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Unbounded recursion in the TREE extension decoder. `one_recursive` calls itself once per\ndeclared subtree (`subtree_count`) with no depth limit. Each nesting level consumes only a\nfew bytes (a NUL-terminated path needs >=2 bytes plus two separators), so a crafted TREE\nextension whose every block declares exactly one child reaches a recursion depth roughly\nproportional to extension_size / few-bytes. The extension size field is a u32, so depth can\nreach hundreds of thousands, overflowing the stack and aborting the process. The\n`alloc_limit_bytes` guard only bounds the per-node `Vec<Tree>` reservation (line 19), not\nrecursion depth. Reachable from untrusted `.git/index` data.","fix":"Thread an explicit depth counter through `one_recursive` and return `None` past a sane cap,\nor rewrite the parse iteratively with an explicit work stack.","locations":[{"ref":"gix-index/src/extension/tree/decode.rs:11","code":"   11 | fn one_recursive(data: &[u8], hash_len: usize, alloc_limit_bytes: Option<usize>) -> Option<(Tree, &[u8])> {","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/extension/tree/decode.rs#L11"},{"ref":"gix-index/src/extension/tree/decode.rs:35-39","code":"   35 |     for _ in 0..subtree_count {\n   36 |         let (tree, rest) = one_recursive(data, hash_len, alloc_limit_bytes)?;\n   37 |         subtrees.push(tree);\n   38 |         data = rest;\n   39 |     }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/extension/tree/decode.rs#L35-L39"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Unbounded recursion in the UNTR (untracked cache) extension decoder.\n`decode_directory_block` recurses once per declared subdirectory (`num_dirs`) with no depth\nlimit. While `num_directory_blocks > data.len()` (line 165) and the per-block\n`max_entries_from_remaining_data` checks bound total node count and per-node allocations,\nneither bounds nesting depth. A chain of blocks each declaring exactly one subdirectory\nyields recursion depth proportional to the byte count and can overflow the stack / abort.\nSame root cause as the TREE recursion. Reachable from untrusted `.git/index` data.","fix":"Pass and enforce a maximum recursion depth in `decode_directory_block`, or rewrite iteratively.","locations":[{"ref":"gix-index/src/extension/untracked_cache.rs:218","code":"  218 | fn decode_directory_block<'a>(","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/extension/untracked_cache.rs#L218"},{"ref":"gix-index/src/extension/untracked_cache.rs:263-268","code":"  263 |     for _ in 0..num_dirs {\n  264 |         let subdir_index = directories.len();\n  265 |         let rest = decode_directory_block(data, directories, alloc_limit_bytes)?;\n  266 |         data = rest;\n  267 |         directories[index].sub_directories.push(subdir_index);\n  268 |     }","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/extension/untracked_cache.rs#L263-L268"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In `File::at`, when `skip_hash` is false the trailing checksum is read with\n`&data[data.len() - object_hash.len_in_bytes()..]` BEFORE any size validation of the\nmmapped file (header decode happens later in `State::from_bytes`). `data` is an\nmmap of an attacker-controlled file. If the file is smaller than the hash length\n(e.g. an empty `.git/index`, or a 1-39 byte truncated file with SHA-1), the usize\nsubtraction underflows and the slice index panics. Likewise `meta.len() -\nobject_hash.len_in_bytes() as u64` on line 77 underflows for a too-small file.\nA truncated/corrupt index thus aborts the process instead of producing a decode error.","fix":"Guard the length first, e.g. `if data.len() < object_hash.len_in_bytes() { return\nErr(...) }` (or `data.len().checked_sub(hash_len)`), and only then read the trailing\nhash. Same for `meta.len()`.","locations":[{"ref":"gix-index/src/file/init.rs:73","code":"   73 |                     gix_hash::ObjectId::from_bytes_or_panic(&data[data.len() - object_hash.len_in_bytes()..]);","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/file/init.rs#L73"},{"ref":"gix-index/src/file/init.rs:77","code":"   77 |                     let num_bytes_to_hash = meta.len() - object_hash.len_in_bytes() as u64;","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/file/init.rs#L77"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"During delta-tree traversal of pack data, the recorded base object size taken from the delta header of untrusted pack data is compared against the actual decompressed base length with `assert_eq!`. A pack whose delta header declares a base size different from the real base object size triggers a panic instead of a recoverable error. This is on the pack-traversal / index-from-pack / verify path that processes untrusted pack data, and it exists in both the single-threaded and multi-threaded resolvers.","fix":"Replace the `assert_eq!` with a check that returns a `traverse::Error` (e.g. a new `DeltaBaseSizeMismatch` variant) when the declared base size does not match `base_bytes.len()`.","locations":[{"ref":"gix-pack/src/cache/delta/traverse/resolve.rs:182-186","code":"  182 |             assert_eq!(\n  183 |                 base_bytes.len(),\n  184 |                 base_size as usize,\n  185 |                 \"recorded base size in delta does match the actual one\"\n  186 |             );","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/cache/delta/traverse/resolve.rs#L182-L186"},{"ref":"gix-pack/src/cache/delta/traverse/resolve.rs:356-360","code":"  356 |                                     assert_eq!(\n  357 |                                         base_bytes.len(),\n  358 |                                         base_size as usize,\n  359 |                                         \"recorded base size in delta does match the actual one\"\n  360 |                                     );","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/cache/delta/traverse/resolve.rs#L356-L360"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`pack_id_and_pack_offset_at_index()` reads a large 64-bit offset from the large-offsets chunk using an index taken directly from untrusted on-disk data (`(ofs32 ^ HIGH_BIT)`), without any bounds check that the index lies within the large-offsets table. `multi_index::chunk::large_offsets::is_valid` only checks that the chunk size is a multiple of 8, not that it is large enough for the referenced indices. A corrupt multi-index can therefore make `read_u64(&self.data[from..][..8])` index out of bounds and panic. The single-pack index does validate this (`index/init.rs` lines 156-181: `max_large_offset_index >= large_offsets`), but the multi-index path does not.","fix":"During `multi_index::File::from_data()`, scan the offsets chunk for the maximum referenced large-offset index and reject the file if it is >= the number of entries in the large-offsets chunk, mirroring the validation done in `index/init.rs::validate_size`. Alternatively use `data.get(from..from+8)` and return a corruption error.","locations":[{"ref":"gix-pack/src/multi_index/access.rs:123-134","code":"  123 |         let pack_offset = if (ofs32 & HIGH_BIT) == HIGH_BIT {\n  124 |             // We determine if large offsets are actually larger than 4GB and if not, we don't use the high-bit to signal anything\n  125 |             // but allow the presence of the large-offset chunk to signal what's happening.\n  126 |             if let Some(offsets_64) = self.large_offsets_ofs {\n  127 |                 let from = offsets_64 + (ofs32 ^ HIGH_BIT) as usize * 8;\n  128 |                 crate::read_u64(&self.data[from..][..8])\n  129 |             } else {\n  130 |                 u64::from(ofs32)\n  131 |             }\n  132 |         } else {\n  133 |             u64::from(ofs32)\n  134 |         };","lines":12,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/multi_index/access.rs#L123-L134"},{"ref":"gix-pack/src/multi_index/chunk.rs:286-288","code":"  286 |     pub fn is_valid(offset: &Range<usize>) -> bool {\n  287 |         (offset.end - offset.start) % 8 == 0\n  288 |     }","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/multi_index/chunk.rs#L286-L288"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`name_partial_or_sanitize` is documented as infallible (\"instead of failing, alters `path` and returns it to be a valid partial name\") and the doc even states \"an empty `path` is replaced with a `-`\". But for slash-only inputs it panics with index out of bounds. In Sanitize mode `out` is Some; after the main loop, lines 170-177 strip all leading/trailing `/`, which can leave `out` EMPTY. Line 178 then does `out.as_ref().map_or(input, |b| b.as_bstr())[0]` which indexes `[0]` on the now-empty buffer and panics. Confirmed by running `reference::name_partial_or_sanitize` on inputs \"/\", \"//\", \"///\" -> panic at tag.rs:178:51 \"index out of bounds: the len is 0 but the index is 0\". This is reachable from the public, supposedly-infallible sanitization API.","fix":"After stripping leading/trailing slashes (lines 170-177), in Sanitize mode handle the now-empty buffer before the `[0]`/`[last]` indexing: if `out` is Some and empty, push b'-' and return early (mirroring the empty-input handling at lines 72-79). Alternatively guard both the StartsWithDot (line 178) and EndsWithDot (line 185) checks with an emptiness test in Sanitize mode.","locations":[{"ref":"gix-validate/src/tag.rs:170-194","code":"  170 |     if let Some(out) = out.as_mut() {\n  171 |         while out.last() == Some(&b'/') {\n  172 |             out.pop();\n  173 |         }\n  174 |         while out.first() == Some(&b'/') {\n  175 |             out.remove(0);\n  176 |         }\n  177 |     }\n  178 |     if out.as_ref().map_or(input, |b| b.as_bstr())[0] == b'.' {\n  179 |         if let Some(out) = out.as_mut() {\n  180 |             out[0] = b'-';\n  181 |         } else {\n  182 |             return Err(name::Error::StartsWithDot);\n  183 |         }\n  184 |     }\n  185 |     let last = out.as_ref().map_or(input, |b| b.as_bstr()).len() - 1;\n  186 |     if out.as_ref().map_or(input, |b| b.as_bstr())[last] == b'.' {\n  187 |         if let Some(out) = out.as_mut() {\n  188 |             let last = out.len() - 1;\n  189 |             out[last] = b'-';\n  190 |         } else {\n  191 |             return Err(name::Error::EndsWithDot);\n  192 |         }\n  193 |     }\n  194 |     Ok(out)","lines":25,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-validate/src/tag.rs#L170-L194"},{"ref":"gix-validate/src/reference.rs:112-116","code":"  112 | pub fn name_partial_or_sanitize(path: &BStr) -> BString {\n  113 |     validate(path, Mode::PartialSanitize)\n  114 |         .expect(\"BUG: errors cannot happen as any issue is fixed instantly\")\n  115 |         .expect(\"we always rebuild the path\")\n  116 | }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-validate/src/reference.rs#L112-L116"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`write_raw_refs` asserts `assert!(!path.starts_with_str(\"/\"), ...)` and `path.parent().expect(...)`\non ref names that come from the remote server over the network. A malformed or malicious remote could\nsend a ref name starting with `/` or with a single path component and crash the client with a panic\nrather than a clean error.","fix":"Replace the assert!/expect with a proper `io::Error` return so malformed remote refs are rejected gracefully.","locations":[{"ref":"gitoxide-core/src/pack/receive.rs:245-248","code":"  245 |         assert!(!path.starts_with_str(\"/\"), \"no ref start with a /, they are relative\");\n  246 |         let path = directory.join(gix::path::from_byte_slice(path));\n  247 |         std::fs::create_dir_all(path.parent().expect(\"multi-component path\")).map(|_| path)\n  248 |     };","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/receive.rs#L245-L248"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`.search().patterns().next().expect(\"exactly one\")` assumes the pathspec built from a single\nuser-supplied path always yields exactly one pattern. For degenerate/empty specs that normalize away,\n`next()` is `None` and the process panics on user input - instead of the \"Invalid pathspec\" error that\nexists a few lines below. The adjacent TODO explicitly notes that `Search` reorders/filters patterns,\nundermining the invariant. Same pattern appears for the blame and merge-file paths.","fix":"Replace each `.expect(...)`/`.unwrap()` with `.ok_or_else(|| anyhow!(\"invalid/empty pathspec\"))?`.","locations":[{"ref":"gitoxide-core/src/query/engine/command.rs:34-37","code":"   34 |                     .patterns()\n   35 |                     .next()\n   36 |                     .expect(\"exactly one\")\n   37 |                     .path()","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/engine/command.rs#L34-L37"},{"ref":"gitoxide-core/src/repository/blame.rs:31-36","code":"   31 |     let file = specs\n   32 |         .search()\n   33 |         .patterns()\n   34 |         .map(|p| p.path().to_owned())\n   35 |         .next()\n   36 |         .expect(\"exactly one pattern\");","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/blame.rs#L31-L36"},{"ref":"gitoxide-core/src/repository/merge/file.rs:40-42","code":"   40 |     let base = patterns.next().unwrap();\n   41 |     let ours = patterns.next().unwrap();\n   42 |     let theirs = patterns.next().unwrap();","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/merge/file.rs#L40-L42"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"The fsck `on_missing` callback does `writeln!(out, \"{oid}: {kind}\").expect(\"failed to write output\")`.\nIf stdout is a closed pipe (e.g. output piped to `head`, which exits early - a very common CLI case),\nthe write fails with BrokenPipe and the process panics instead of exiting cleanly.","fix":"Capture the IO error in a cell/Option checked after traversal (the closure signature is fixed by\n`gix_fsck::Connectivity`), or otherwise propagate it instead of `.expect()`.","locations":[{"ref":"gitoxide-core/src/repository/fsck.rs:22-24","code":"   22 |     let on_missing = |oid: &ObjectId, kind: Kind| {\n   23 |         writeln!(out, \"{oid}: {kind}\").expect(\"failed to write output\");\n   24 |     };","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/fsck.rs#L22-L24"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`let commit = repo.find_commit(info.id).unwrap();` panics if the commit cannot be found/decoded\n(corrupt or partially-pruned ODB, or a race where the object is removed during the walk). `write_info`\ncould propagate the error instead, so the unwrap is gratuitous.","fix":"Make `write_info` return a Result and use `repo.find_commit(info.id)?`.","locations":[{"ref":"gitoxide-core/src/repository/log.rs:37","code":"   37 |     let commit = repo.find_commit(info.id).unwrap();","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/log.rs#L37"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`zlib::stream::inflate::read` contains `unreachable!(\"Definitely a bug somewhere\")` on a code path that is reachable with crafted/corrupt input. When the decompressor returns `Status::Ok` or `Status::BufError` while neither at EOF nor with a full output buffer, and zlib made no progress (consumed == 0 && written == 0), none of the preceding match arms apply and this arm panics. A `BufError` with no progress on a non-final, non-empty stream is exactly the state a malformed zlib stream can produce, turning a decode error into a process abort.","fix":"Replace the `unreachable!` arm with a returned error, e.g.\n`Ok(Status::Ok | Status::BufError) => return Err(io::Error::new(io::ErrorKind::InvalidInput, \"zlib made no progress on a corrupt deflate stream\")),`","locations":[{"ref":"gix-features/src/zlib/stream/inflate.rs:32-37","code":"   32 |             Ok(Status::Ok | Status::BufError) if eof || dst.is_empty() => return Ok(total_written),\n   33 |             // Some progress was made in both the input and the output, it must continue to reach the end.\n   34 |             Ok(Status::Ok | Status::BufError) if consumed != 0 || written != 0 => continue,\n   35 |             // A strange state, where zlib makes no progress but isn't done either. Call it out.\n   36 |             Ok(Status::Ok | Status::BufError) => unreachable!(\"Definitely a bug somewhere\"),\n   37 |             Err(..) => return Err(io::Error::new(io::ErrorKind::InvalidInput, \"corrupt deflate stream\")),","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-features/src/zlib/stream/inflate.rs#L32-L37"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`verify_integrity` computes `self.path.metadata().len() - checksum.as_bytes().len() as u64`\nwithout checking that the on-disk file is at least as large as the hash. If the index\nfile was truncated/replaced on disk to be smaller than the checksum length after it was\nloaded, this u64 subtraction underflows (panic in debug; in release it wraps to a huge\n`num_bytes_to_hash` passed to the hasher).","fix":"Use `checked_sub` and return a descriptive error if the file is too small.","locations":[{"ref":"gix-index/src/file/verify.rs:23-24","code":"   23 |             let num_bytes_to_hash =\n   24 |                 self.path.metadata().map_err(gix_hash::io::Error::from)?.len() - checksum.as_bytes().len() as u64;","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/file/verify.rs#L23-L24"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`in_common_with_remote` in the skipping algorithm asserts `was_seen` and panics with\n`Cannot receive ACK for commit we didn't send a HAVE for: {id}` if the commit isn't already SEEN.\nThis makes the algorithm panic in response to remote-controlled input: a malicious or buggy server\ncan ACK a commit id we never sent a HAVE for, taking down the client process. Negotiation responses\ncome from the network and should be handled as recoverable errors, not assertions.","fix":"Return a recoverable error (extend the Error type) instead of `assert!` when an ACK arrives for an unseen commit.","locations":[{"ref":"gix-negotiate/src/skipping.rs:168-177","code":"  168 |     fn in_common_with_remote(&mut self, id: ObjectId, graph: &mut crate::Graph<'_, '_>) -> Result<bool, Error> {\n  169 |         let mut was_seen = false;\n  170 |         let known_to_be_common = graph.get(&id).is_some_and(|commit| {\n  171 |             was_seen = commit.data.flags.contains(Flags::SEEN);\n  172 |             commit.data.flags.contains(Flags::COMMON)\n  173 |         });\n  174 |         assert!(\n  175 |             was_seen,\n  176 |             \"Cannot receive ACK for commit we didn't send a HAVE for: {id}\"\n  177 |         );","lines":10,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-negotiate/src/skipping.rs#L168-L177"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"While building the delta-tree directly from pack offsets, an OFS_DELTA entry's `base_distance` is subtracted from the current `pack_offset` with `.expect(\"in bound distance for deltas\")`. The distance comes from the entry header in untrusted pack data; a malformed OFS_DELTA whose distance exceeds its own pack offset causes a panic instead of a clean error. (The other in-pack delta path in `data/file/decode/entry.rs` correctly uses `checked_base_pack_offset(...).ok_or(Corrupt)`.)","fix":"Use `pack_offset.checked_sub(base_distance).ok_or(Error::...)` and surface a corruption error rather than panicking.","locations":[{"ref":"gix-pack/src/cache/delta/from_offsets.rs:107-112","code":"  107 |                 OfsDelta { base_distance } => {\n  108 |                     let base_pack_offset = pack_offset\n  109 |                         .checked_sub(base_distance)\n  110 |                         .expect(\"in bound distance for deltas\");\n  111 |                     tree.add_child(base_pack_offset, pack_offset, data)?;\n  112 |                 }","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/cache/delta/from_offsets.rs#L107-L112"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`digest_statistics` divides the accumulated averages by `num_nodes = roots.len() + children.len()` without guarding against zero. For a pack with zero objects (an empty but otherwise valid pack/index), the traverse outcome yields empty roots and children, so all four divisions (`/= num_nodes as u64`, `/= num_nodes`, etc.) divide by zero and panic.","fix":"Return `Statistics::default()` (or otherwise skip the average computation) when `num_nodes == 0` before performing the divisions.","locations":[{"ref":"gix-pack/src/index/traverse/with_index.rs:224-228","code":"  224 |     let num_nodes = roots.len() + children.len();\n  225 |     average.decompressed_size /= num_nodes as u64;\n  226 |     average.compressed_size /= num_nodes;\n  227 |     average.object_size /= num_nodes as u64;\n  228 |     average.num_deltas /= num_nodes as u32;","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/index/traverse/with_index.rs#L224-L228"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`to_native_path_on_windows` calls `crate::from_bstr(...)` (the panicking variant) on its result. `from_bstr` does `try_from_bstr(input).expect(\"prefix path doesn't contain ill-formed UTF-8\")`. On Windows, input bytes that are not valid UTF-8 (unpaired surrogates) panic rather than returning an error. While the function's own doc mentions a possible panic, the `expect` message is copy-pasted from a prefix-path context and is misleading here. No fallible variant is offered for this commonly used conversion.","fix":"Provide a `try_` variant for native-path conversion, and fix the misleading copy-pasted `expect` message.","locations":[{"ref":"gix-path/src/convert.rs:189-198","code":"  189 | pub fn to_native_path_on_windows<'a>(path: impl Into<Cow<'a, BStr>>) -> Cow<'a, std::path::Path> {\n  190 |     #[cfg(not(windows))]\n  191 |     {\n  192 |         crate::from_bstr(path)\n  193 |     }\n  194 |     #[cfg(windows)]\n  195 |     {\n  196 |         crate::from_bstr(to_windows_separators(path))\n  197 |     }\n  198 | }","lines":10,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/convert.rs#L189-L198"},{"ref":"gix-path/src/convert.rs:119-121","code":"  119 | pub fn from_bstr<'a>(input: impl Into<Cow<'a, BStr>>) -> Cow<'a, Path> {\n  120 |     try_from_bstr(input).expect(\"prefix path doesn't contain ill-formed UTF-8\")\n  121 | }","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/convert.rs#L119-L121"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Needle::Glob` matching computes the matched range as\n`asterisk_pos..(full_ref_name.len() - tail.len())`. The head is verified via\n`get(..asterisk_pos)` and the tail via `ends_with(tail)`, but there is no check\nthat the head and tail regions do not overlap when `full_ref_name` is shorter\nthan `asterisk_pos + tail.len()`. For a needle like `aaaa*aaaa` matching item\n`aaaa` (len 4, asterisk_pos 4, tail `aaaa`): head `get(..4)`=\"aaaa\" matches,\n`ends_with(\"aaaa\")` is true, `end = 4 - 4 = 0`, producing range `4..0`. A\nreversed `Range` later used to slice `item.full_ref_name[range]` in\n`to_bstr_replace` panics (\"slice index starts at 4 but ends at 0\").","fix":"After computing `end`, guard with `if end < *asterisk_pos { return Match::None; }`\n(equivalently require `full_ref_name.len() >= asterisk_pos + tail.len()`) so\nhead and tail cannot overlap before constructing the `GlobRange`.","locations":[{"ref":"gix-refspec/src/match_group/util.rs:92-106","code":"   92 |             Needle::Glob { name, asterisk_pos } => {\n   93 |                 match item.full_ref_name.get(..*asterisk_pos) {\n   94 |                     Some(full_name_portion) if full_name_portion != name[..*asterisk_pos] => {\n   95 |                         return Match::None;\n   96 |                     }\n   97 |                     None => return Match::None,\n   98 |                     _ => {}\n   99 |                 }\n  100 |                 let tail = &name[*asterisk_pos + 1..];\n  101 |                 if !item.full_ref_name.ends_with(tail) {\n  102 |                     return Match::None;\n  103 |                 }\n  104 |                 let end = item.full_ref_name.len() - tail.len();\n  105 |                 Match::GlobRange(*asterisk_pos..end)\n  106 |             }","lines":15,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-refspec/src/match_group/util.rs#L92-L106"},{"ref":"gix-refspec/src/match_group/util.rs:141-146","code":"  141 |             (Needle::Glob { name, asterisk_pos }, Some((range, item))) => {\n  142 |                 let mut buf = Vec::with_capacity(name.len() + range.len() - 1);\n  143 |                 buf.push_str(&name[..asterisk_pos]);\n  144 |                 buf.push_str(&item.full_ref_name[range]);\n  145 |                 buf.push_str(&name[asterisk_pos + 1..]);\n  146 |                 Cow::Owned(buf.into())","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-refspec/src/match_group/util.rs#L141-L146"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`make_request` unwraps the position of the `:` separator in every header line with `.expect(\"header line must contain a colon to separate key and value\")`. The `Http` trait documents that headers are passed \"verbatim\", and any caller (or future code path) that hands a header without a colon will crash the process instead of returning an error. Unlike the curl backend (which uses `curl::easy::List::append` and cannot panic on this), reqwest panics. A malformed `http.extraHeader` value reaching this code, or any internal header constructed without a colon, is an unrecoverable abort.","fix":"Skip (or error out gracefully on) header lines without a colon: `let Some(colon_pos) = header_line.find(':') else { continue };` instead of `.expect(...)`.","locations":[{"ref":"gix-transport/src/client/blocking_io/http/reqwest/remote.rs:238-242","code":"  238 |             let colon_pos = header_line\n  239 |                 .find(':')\n  240 |                 .expect(\"header line must contain a colon to separate key and value\");\n  241 |             let header_name = &header_line[..colon_pos];\n  242 |             let value = &header_line[colon_pos + 1..];","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/reqwest/remote.rs#L238-L242"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"The git-daemon connector resolves the host with `to_socket_addrs()` and then calls `.next().expect(\"after successful resolution there is an IP address\")`. `ToSocketAddrs` is allowed to return an empty iterator even when name resolution itself \"succeeds\" (e.g. a hostname that resolves to zero usable addresses, or platform-specific resolver behavior). When that happens this panics instead of returning a connection error, taking down the caller.","fix":"Replace the `.expect(...)` with a proper error, e.g. map an empty iterator to `Error::Io(io::Error::new(ErrorKind::NotFound, \"name resolved to no addresses\"))`.","locations":[{"ref":"gix-transport/src/client/git/blocking_io.rs:223-229","code":"  223 |         let read = TcpStream::connect_timeout(\n  224 |             &(host, port.unwrap_or(9418))\n  225 |                 .to_socket_addrs()?\n  226 |                 .next()\n  227 |                 .expect(\"after successful resolution there is an IP address\"),\n  228 |             std::time::Duration::from_secs(5),\n  229 |         )?;","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/git/blocking_io.rs#L223-L229"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"A non-branch valid refspec passed to `with_ref_name` (e.g. an object-id hex hash) makes subsequent\n`fetch_only`/`fetch_then_checkout` panic. The documented panic flows through `find_custom_refname`, where\n`res.mappings[0].item_index.expect(\"we map by name only and have no object-id in refspec\")` is unwrapped, and\nthrough `setup_branch_config`'s assumptions. The behavior is documented as a known panic in `with_ref_name`'s\ndoc-comment, but it is still a user-reachable panic in a high-level API rather than a returned error.","fix":"Return a typed error (e.g. extend the clone fetch Error) when the requested ref-name resolves to an object id rather than a named ref, instead of unwrapping/panicking.","locations":[{"ref":"gix/src/clone/access.rs:52-62","code":"   52 |     /// # Panics\n   53 |     ///\n   54 |     /// Calling this method with a valid refspec that is not a branch name, like an object-id as hex-hash,\n   55 |     /// currently causes subsequent calls to [`PrepareFetch::fetch_only`] or [`PrepareFetch::fetch_then_checkout`] to panic.\n   56 |     pub fn with_ref_name<'a, Name, E>(mut self, name: Option<Name>) -> Result<Self, E>\n   57 |     where\n   58 |         Name: TryInto<&'a gix_ref::PartialNameRef, Error = E>,\n   59 |     {\n   60 |         self.ref_name = name.map(TryInto::try_into).transpose()?.map(ToOwned::to_owned);\n   61 |         Ok(self)\n   62 |     }","lines":11,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/clone/access.rs#L52-L62"},{"ref":"gix/src/clone/fetch/util.rs:230-236","code":"  230 |         }),\n  231 |         1 => {\n  232 |             let item = filtered_items[res.mappings[0]\n  233 |                 .item_index\n  234 |                 .expect(\"we map by name only and have no object-id in refspec\")];\n  235 |             Ok((item.target, item.full_ref_name))\n  236 |         }","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/clone/fetch/util.rs#L230-L236"}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Object::peel_to_kind()` and `peel_tags_to_end()` use `.expect(\"valid commit\")` / `.expect(\"valid tag\")`\non `tree_id     self = repo.find_object(target_id)?;\n   98 |                 }\n   99 |             }\n  100 |         }\n  101 |     }","lines":13,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/object/peel.rs#L89-L101"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`impl From<BString> for Name<'static>` calls `Self::try_from(Cow::Owned(name)).expect(\"String is never illformed\")`.\nHowever `try_from` returns `Err` for an owned, non-UTF-8 `BString` that does not contain `/` and is not `\".\"`:\nit routes to the `Cow::Owned(n)` arm which calls `Vec::from(n).into_string()`, which fails on invalid UTF-8 and\nyields `Err`. A remote name read from configuration that is invalid UTF-8 without a slash will therefore panic\nthrough this `expect`, contradicting the message \"String is never illformed\".","fix":"Make `From<BString>` fall back to `Name::Url` (or `Name::Symbol` via lossy conversion) instead of `expect`, or change the bound to `TryFrom` so the failure is propagated.","locations":[{"ref":"gix/src/remote/name.rs:82-86","code":"   82 | impl From<BString> for Name<'static> {\n   83 |     fn from(name: BString) -> Self {\n   84 |         Self::try_from(Cow::Owned(name)).expect(\"String is never illformed\")\n   85 |     }\n   86 | }","lines":5,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/remote/name.rs#L82-L86"},{"ref":"gix/src/remote/name.rs:63-80","code":"   63 | impl<'a> TryFrom<Cow<'a, BStr>> for Name<'a> {\n   64 |     type Error = Cow<'a, BStr>;\n   65 | \n   66 |     fn try_from(name: Cow<'a, BStr>) -> Result<Self, Self::Error> {\n   67 |         if name.contains(&b'/') || name.as_ref() == \".\" {\n   68 |             Ok(Name::Url(name))\n   69 |         } else {\n   70 |             match name {\n   71 |                 Cow::Borrowed(n) => n.to_str().ok().map(Cow::Borrowed).ok_or(name),\n   72 |
