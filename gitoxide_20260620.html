:"gix-shallow/src/lib.rs:99-104","code":"   99 |             shallow_commits.sort();\n  100 |             let mut buf = Vec::<u8>::new();\n  101 |             for commit in shallow_commits {\n  102 |                 commit.write_hex_to(&mut buf).map_err(Error::Io)?;\n  103 |                 buf.push(b'\\n');\n  104 |             }","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-shallow/src/lib.rs#L99-L104"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the non-`hp-hashmap` build, `cleanup_tempfiles()` (the NON-signal variant) routes through `Concurrent::for_each`, which uses `self.inner.try_lock()` and silently does nothing on contention. So a normal shutdown call to `cleanup_tempfiles()` can leave tempfiles behind purely due to transient lock contention with no retry, whereas the `hp-hashmap` variant uses blocking iteration. Behavior diverges between feature configs.","fix":"Give the non-signal cleanup a blocking `lock()` path so it is not subject to spurious `try_lock` failures.","locations":[{"ref":"gix-tempfile/src/lib.rs:103-112","code":"  103 |         pub fn for_each<F>(&self, cb: F)\n  104 |         where\n  105 |             Self: Sized,\n  106 |             F: FnMut(&mut V),\n  107 |         {\n  108 |             if let Some(mut guard) = self.inner.try_lock() {\n  109 |                 guard.values_mut().for_each(cb);\n  110 |             }\n  111 |         }\n  112 |     }","lines":10,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-tempfile/src/lib.rs#L103-L112"},{"ref":"gix-tempfile/src/registry.rs:51-65","code":"   51 | pub fn cleanup_tempfiles() {\n   52 |     let current_pid = std::process::id();\n   53 |     #[cfg(feature = \"hp-hashmap\")]\n   54 |     REGISTRY.iter_mut().for_each(|mut tf| {\n   55 |         if tf.as_ref().is_some_and(|tf| tf.owning_process_id == curren },{"ref":"gix-transport/src/client/blocking_io/http/reqwest/remote.rs:53-84","code":"   53 |                 .redirect(reqwest::redirect::Policy::custom({\n   54 |                     let allow_redirects = allow_redirects.clone();\n   55 |                     move |attempt| {\n   56 |                         if allow_redirects.load(atomic::Ordering::Relaxed) {\n   57 |                             let curr_url = attempt.url();\n   58 |                             let prev_urls = attempt.previous();\n   59 | \n   60 |                             match prev_urls.first() {\n   61 |                                 Some(prev_url)\n   62 |                                     if !redirect::shares_authority_or_upgrades_scheme(\n   63 |                                         curr_url.as_str(),\n   64 |                                         prev_url.as_str(),\n   65 |                                     ) =>\n   66 |                                 {\n   67 |                                     // git does not want to be redirected to a different host.\n   68 |                                     attempt.stop()\n   69 |                                 }\n   70 |                                 _ => {\n   71 |                                     // emulate default git behaviour which relies on curl default behaviour apparently.\n   72 |                                     const CURL_DEFAULT_REDIRS: usize = 50;\n   73 |                                     if prev_urls.len() >= CURL_DEFAULT_REDIRS {\n   74 |                                         attempt.error(\"too many redirects\")\n   75 |                                     } else {\n   76 |                                         attempt.follow()\n   77 |                                     }\n   78 |                                 }\n   79 |                             }\n   80 |                         } else {\n   81 |                             attempt.stop()\n   82 |                         }\n   83 | itoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/mod.rs#L273-L288"}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`add_basic_auth_if_present` decides whether to refuse sending Basic credentials by checking `self.url.starts_with(\"http://\")`. `self.url` is the original configured URL only; after a redirect has been recorded the effective request URL can differ (the redirect machinery rewrites the base via `redirected_base_url`). The plaintext-http guard is thus evaluated against the pre-redirect URL, not the URL the credentials will actually be sent to. The redirect validator forbids https->http downgrades, which mitigates the worst case, but the guard is nominally checking the wrong URL.","fix":"Evaluate the cleartext check against the effective (post-redirect) URL the request will actually target, or document that the https->http downgrade prohibition in `shares_authority_or_upgrades_scheme` is the real guarantee being relied on.","locations":[{"ref":"gix-transport/src/client/blocking_io/http/mod.rs:291-310","code":"  291 |     fn add_basic_auth_if_present(&self, headers: &mut Vec<Cow<'_, str>>) -> Result<(), client::Error> {\n  292 |         if let Some(gix_sec::identity::Account {\n  293 |             username,\n  294 |             password,\n  295 |             oauth_refresh_token: _,\n  296 |         }) = &self.identity\n  297 |         {\n  298 |             #[cfg(not(feature = \"http-client-insecure-credentials\"))]\n  299 |             if self.url.starts_with(\"http://\") {\n  300 |                 return Err(client::Error::AuthenticationRefused(\n  301 |                     \"Will not send credentials in clear text over http\",\n  302 |                 ));\n  303 |             }\n  304 |             headers.push(Cow::Owned(format!(\n  305 |                 \"Authorization: Basic {}\",\n  306 |                 base64::engine::general racket_end]` like the others and drop the corresponding strip special-case in `url()`.","locations":[{"ref":"gix-url/src/simple_url.rs:137-154","code":"  137 |                 if remaining.is_empty() {\n  138 |                     // IPv6 addresses are case-insensitive, normalize to lowercase\n  139 |                     let host = Some(host_port[..=bracket_end].to_ascii_lowercase());\n  140 |                     return Ok((host, None));\n  141 |                 } else if let Some(port_str) = remaining.strip_prefix(':') {\n  142 |                     if port_str.is_empty() {\n  143 |                         // Empty port like \"[::1]:\" - preserve the trailing colon for Git compatibility\n  144 |                         let host = Some(host_port.to_ascii_lowercase());\n  145 |                         return Ok((host, None));\n  146 |                     }\n  147 |                     let port = port_str.parse::<u16>().map_err(|_| UrlParseError::InvalidPort)?;\n  148 |                     // Validate port is in valid range (1-65535, port 0 is invalid)\n  149 |                     if port == 0 {\n  150 |                         return Err(UrlParseError::InvalidPort);\n  151 |                     }\n  152 |                     // IPv6 addresses are case-insensitive, normalize to lowercase\n  153 |                     let host = Some(host_port[..=bracket_end].to_ascii_lowercase());\n  154 |                     return Ok((host, Some(port)));","lines":18,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-url/src/simple_url.rs#L137-L154"}]},{"id":"LOGIC_64","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `name_inner` the trailing `.lock` check at the loop's last byte uses `input[component_end + 1..]` where `component_end` is only updated when a `/` is seen (line 137). For a name with no slash at all, `component_end` stays 0, so the check examines `input[1..]` rather than the who },{"id":"LOGIC_67","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`reread_values_and_clear_caches_replacing_config` (Cache) restores the previous config on error, but the sibling Repository-level `reread_values_and_clear_caches_replacing_config` calls `apply_changed_values()` and `setup_objects()` AFTER the Cache reread succeeds - if `setup_objects` had any failure mode it isn't rolled back. More concretely: `apply_changed_values` mutates `self.refs` (write_reflog, namespace) unconditionally after a successful cache reread; should the object-cache comparison/setup later misbehave, the refs state is already mutated with no rollback. Lower confidence as setup_objects is infallible today.","fix":"Document the ordering/rollback guarantees, or ensure ref/state mutations only happen once all derived setup is known to succeed.","locations":[{"ref":"gix/src/config/cache/init.rs:285-311","code":"  285 | impl crate::Repository {\n  286 |     /// Replace our own configuration with `config` and re-read all cached values, and apply them to select in-memory instances.\n  287 |     pub(crate) fn reread_values_and_clear_caches_replacing_config(\n  288 |         &mut self,\n  289 |         config: crate::Config,\n  290 |     ) -> Result<(), Error> {\n  291 |         let (a, b, c) = (\n  292 |             self.config.static_pack_cache_limit_bytes,\n  293 |             self.config.pack_cache_bytes,\n  294 |             self.config.object_cache_bytes,\n  295 |         );\n  296 |         self.config.reread_values_and_clear_caches_replacing_config(config)?;\n  297 |         self.apply_changed_values();\n  298 |         if a != self.config.static_pack_cache_limit_bytes\n  299 |             || b != self.config.pack_cache_bytes\n  300 |             || c != self.config.object_cache_bytes\n  301 |         {\n  302 |             setup_objects(&mut self.objects, &self.config);\n  303 |         }\n  304 |         Ok(())\n  305 |     }\n  306 | \n  3 t second: u32 = parts.get(2).unwrap_or(&\"0\").parse().ok()?;\n  212 |         Some((hour, minute, second))","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-date/src/parse/git.rs#L206-L212"}]},{"id":"LOGIC_76","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`is_binary` uses `(self.printable >> 7) < self.non_printable`. Note that `Stats::from_bytes` classifies a\nlone form-feed (0x0C) and ESC (0x1B) and BS (0x08) and TAB as 'printable'. This matches Git's\n`convert.c` heuristic, so it is not itself a bug; however the `printable >> 7` integer right-shift silently\ntruncates the threshold (floor of printable/128). For inputs whose printable count is not a multiple of 128\nthis is intentionally equal to Git, but worth noting that the comparison is asymmetric vs. a naive\n`non_printable * 128 > printable` and any future refactor that 'simplifies' it could change behavior.","fix":"No change required; if refactoring, keep the exact `(printable >> 7) < non_printable` equivalence to Git to avoid behavioral drift, and add a comment citing convert.c.","locations":[{"ref":"gix-filter/src/eol/utils.rs:94-96","code":"   94 |     pub fn is_binary(&self) -> bool {\n   95 |         self.lone_cr > 0 || self.null > 0 || (self.printable >> 7) < self.non_printable\n   96 |     }","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-filter/src/eol/utils.rs#L94-L96"}]},{"id":"LOGIC_77","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`compute_with` asserts `before.len() < i32::MAX` / `after.len() < i32::MAX`, but the Myers k-vector allocation\nin `Myers::new` computes `ndiags = len1 + len2 + 3` and `2 * ndiags + 2` as `usize`, then later casts file\nlengths to `i32` throughout the snake search. Two inputs that each individually satisfy `< i32::MAX` can sum to\nmore than `i  object a spec refers to will receive `id` itself, not its parents, which can be surprising for an\nexclude-parents spec. `Include` and `ExcludeParents` are grouped together here.","fix":"Consider only returning `Some` for `Include`, or document precisely that ExcludeParents yields the anchor id.","locations":[{"ref":"gix/src/revision/spec/mod.rs:87-97","code":"   87 |     pub fn single(&self) -> Option<Id<'repo>> {\n   88 |         match self.inner {\n   89 |             gix_revision::Spec::Include(id) | gix_revision::Spec::ExcludeParents(id) => {\n   90 |                 Id::from_id(id, self.repo).into()\n   91 |             }\n   92 |             gix_revision::Spec::Exclude(_)\n   93 |             | gix_revision::Spec::Range { .. }\n   94 |             | gix_revision::Spec::Merge { .. }\n   95 |             | gix_revision::Spec::IncludeOnlyParents { .. } => None,\n   96 |         }\n   97 |     }","lines":11,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/revision/spec/mod.rs#L87-L97"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In the exhaustive copy-detection callback (`CopySource::FromSetOfModifiedFilesAndAllSources`), the closure\niterates over the *left-hand-side* (`lhs`) index entries but resolves each entry's path against the\n*right-hand-side* state (`rhs`). `Entry::path(state)` indexes `state.path_backing[self.path.clone()]`, so an\n`lhs` entry's path range is used to index `rhs.path_backing`. Since `lhs` and `rhs` are distinct\n`gix_index::State`s with independent path-backing buffers, this returns a wrong path at best and panics with an\nout-of-bounds slice when `rhs.path_backing` is shorter than the `lhs` entry's path range. Both the `location`\nfield and the `push(...)` location argument use the wrong state.","fix":"Resolve the path against the state the entries belong to, i.e. `entry.path(lhs)` instead of `entry.path(rhs)`\non both line 195 and the `push(..., path)` argument.","locations":[{"ref":"gix-diff/src/index/function.rs:194-207","code":"  194 |                 for (index, entry) in lhs.entries().iter().enumerate() {\n  195 |                     let path = entry.path(rhs);\n  196 |                     push(\n  197 |                         ChangeRef::Modification {\n  198 |                             location: Cow::Borrowed(path),\n  199 |                             previous_index: 0, /* does not matter */\n  200 |                             previous_entry_mode: entry.mode,\n  201 |                             previous_id: Cow::Owned(entry.id.kind().null()),\n  202 |                             index,\n  203 |                             entry_mode: entry.mode,\n  204 |                             id: Cow::Borrowed(entry.id.as_ref()),\n  205 |                         },\n  206 |                         path,\n  207 |                     );","lines":14,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-diff/src/index/function.rs#L194-L207"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"`has_conflicts` is assigned `res.conflicts.is_empty()` - true when there are NO conflicts, the inverse\nof its name and the inverse of the sibling implementation in merge/tree.rs (`!res.conflicts.is_empty()`).\nThe current output happens to be correct because line 77 double-inverts with `if !has_conflicts`, but\nthe variable is semantically wrong and any future reader trusting the name will introduce a bug.","fix":"Set `let has_conflicts = !res.conflicts.is_empty();` and change the guard at line 77 to `if has_conflicts`.","locations":[{"ref":"gitoxide-core/src/repository/merge/commit.rs:58","code":"   58 |     let has_conflicts = res.conflicts.is_empty();","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/merge/commit.rs#L58"},{"ref":"gitoxide-core/src/repository/merge/commit.rs:77","code":"   77 |     if !has_conflicts {","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/merge/commit.rs#L77"},{"ref":"gitoxide-core/src/repository/merge/tree.rs:84","code":"   84 |         let has_conflicts = !res.conflicts.is_empty();","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/merge/tree.rs#L84"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"`Object::try_into_tag()` sets `expected: gix_object::Kind::Commit` in the returned `try_into::Error`,\nbut it is converting to a Tag. This is a copy-paste error from `try_into_commit()` just above it.\nA caller inspecting the error to learn what kind was expected will be told `Commit` instead of `Tag`.\nThe doc comment is also wrong (\"...if it is no commit\") for a tag conversion.","fix":"Change `expected: gix_object::Kind::Commit` to `gix_object::Kind::Tag` in `try_into_tag`.","locations":[{"ref":"gix/src/object/mod.rs:117-124","code":"  117 |     /// Transform this object into a tag, or return it as part of the `Err` if it is no commit.\n  118 |     pub fn try_into_tag(self) -> Result<Tag<'repo>, try_into::Error> {\n  119 |         self.try_into().map_err(|this: Self| try_into::Error {\n  120 |             id: this.id,\n  121 |             actual: this.kind,\n  122 |             expected: gix_object::Kind::Commit,\n  123 |         })\n  124 |     }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/object/mod.rs#L117-L124"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"Two distinct child progress bars are both created with the name \"find changes\"; the second one actually\ntracks \"diff lines\". The label was copy-pasted and not updated, producing two identically-named bars.","fix":"Rename the second child to e.g. \"count diff lines\".","locations":[{"ref":"gitoxide-core/src/query/engine/update.rs:51","code":"   51 |         let mut p = progress.add_child(\"find changes\");","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/engine/update.rs#L51"},{"ref":"gitoxide-core/src/query/engine/update.rs:58","code":"   58 |         let mut p = progress.add_child(\"find changes\");","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/engine/update.rs#L58"}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The `unimplemented_chars` byte literal for short pathspec magic contains a duplicated single-quote (`'`)\nand the sequence `'-'` embedded mid-string: `b\"\\\"#%&'-',;<=>@_`~\"`. Decoded this is the bytes\n`\" # % & ' - ' , ; < = > @ _ ` ~`, i.e. the `'` byte appears twice. Because this is only used in a\n`contains()` membership test the duplicate is harmless functionally, but it is a clear copy-paste/typo\n(most likely a stray quote, or a `,` was intended) and obscures the intended set of unimplemented magic\ncharacters.","fix":"Remove the duplicate quote / correct the literal to the intended distinct set of characters.","locations":[{"ref":"gix-pathspec/src/parse.rs:97","code":"   97 |     let unimplemented_chars = b\"\\\"#%&'-',;<=>@_`~\";","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pathspec/src/parse.rs#L97"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"`decompress_all_at_once_with` ignores the returned zlib `Status` and the number of bytes actually produced. Unlike `decompress_complete_entry_from_data_offset` (in `data/file/decode/entry.rs`), which rejects streams that do not end exactly at `out.len()`, this helper accepts truncated or oversized compressed streams from untrusted pack data and leaves the output buffer zero-padded. The base object then silently contains wrong (zero-filled) bytes, leading to incorrect delta application and corrupt decoded objects during traversal/verification.","fix":"Capture the `(status, consumed_out)` from `inflate.once` and return an error unless `status == Status::StreamEnd` and `consumed_out == decompressed_len`, matching the strictness applied elsewhere in the crate.","locations":[{"ref":"gix-pack/src/cache/delta/traverse/resolve.rs:455-468","code":"  455 | fn decompress_all_at_once_with(\n  456 |     inflate: &mut zlib::Inflate,\n  457 |     b: &[u8],\n  458 |     decompressed_len: usize,\n  459 |     out: &mut Vec<u8>,\n  460 | ) -> Result<(), Error> {\n  461 |     out.resize(decompressed_len, 0);\n  462 |     inflate.reset();\n  463 |     inflate.once(b, out).map_err(|err| Error::ZlibInflate {\n  464 |         source: err,\n  465 |         message: \"Failed to decompress entry\",\n  466 |     })?;\n  467 |     Ok(())\n  468 | }","lines":14,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-pack/src/cache/delta/traverse/resolve.rs#L455-L468"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"`Repository::is_dirty()` computes the worktree part as\n`.into_index_worktree_iter(...)?.take_while(Result::is_ok).next().is_some()`.\nIf the very first produced item is an `Err`, `take_while(Result::is_ok)` stops immediately and `next()`\nyields `None`, so `is_some()` is `false`. A status error is therefore silently reported as \"not dirty\",\nand the iterator's error is discarded entirely. Errors during the status scan should surface, not be\nswallowed into a clean result.","fix":"Inspect the first item without `take_while`, propagating `Err` as an error and only mapping `Ok(Some(_))` to dirty.","locations":[{"ref":"gix/src/status/mod.rs:188-199","code":"  188 |             let is_dirty = self\n  189 |                 .status(gix_features::progress::Discard)?\n  190 |                 .index_worktree_rewrites(None)\n  191 |                 .index_worktree_submodules(crate::status::Submodule::AsConfigured { check_dirty: true })\n  192 |                 .index_worktree_options_mut(|opts| {\n  193 |                     opts.dirwalk_options = None;\n  194 |                 })\n  195 |                 .into_index_worktree_iter(Vec::new())?\n  196 |                 .take_while(Result::is_ok)\n  197 |                 .next()\n  198 |                 .is_some();\n  199 |             Ok(is_dirty)","lines":12,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/status/mod.rs#L188-L199"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`find_repos_or_insert` calls `refresh_repos(...)` and binds the result to `res` without `?`. When\n`sql_suffix.is_some()`, it ignores `res` entirely (including a possible `Err`) and re-runs\n`find_repos`, so a refresh failure is swallowed and the subsequent query runs against a DB that may\nnot have been populated.","fix":"Use `self.refresh_repos(...)?;` then branch on whether to re-query with the suffix.","locations":[{"ref":"gitoxide-core/src/corpus/engine.rs:353-359","code":"  353 |         if repos.is_empty() {\n  354 |             let res = self.refresh_repos(corpus_path, corpus_id);\n  355 |             if sql_suffix.is_some() {\n  356 |                 self.find_repos(corpus_path, corpus_id, sql_suffix.as_deref())\n  357 |             } else {\n  358 |                 res\n  359 |             }","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/corpus/engine.rs#L353-L359"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`find_parent_repo` does `std::fs::read_dir(parent).ok()?`, which returns `None` from the whole\nfunction whenever ANY ancestor directory cannot be read (e.g. permission denied). This aborts the\nupward nesting scan and reports \"no parent repo found\", so a repository actually nested inside a parent\nrepo (behind an unreadable intermediate directory) is wrongly treated as un-nested and then becomes a\ncandidate for the destructive `std::fs::rename` in Execute mode.","fix":"On a read_dir error, continue scanning the next parent instead of bailing out of the function:\n`let Ok(rd) = std::fs::read_dir(parent) else { git_workdir = parent; continue; };`","locations":[{"ref":"gitoxide-core/src/organize.rs:148","code":"  148 |             let has_contained_git_folder_or_file = std::fs::read_dir(parent).ok()?.any(|e| {","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/organize.rs#L148"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"When loading existing commit hashes from the corpus/query DB, a hash that fails `ObjectId::try_from`\nis silently replaced with `ObjectId::null(Sha1)` via `unwrap_or_else`. This corrupts `all_commits`/\n`known_commits`: a single bad/truncated blob in the `commits` table produces a null OID that then\nparticipates in `binary_search` and is extended into the returned \"known commits\" list, yielding wrong\nincremental-update logic instead of a surfaced error.","fix":"Propagate the error (`item?`) instead of substituting `ObjectId::null`.","locations":[{"ref":"gitoxide-core/src/query/engine/update.rs:81-82","code":"   81 |                 Ok(gix::ObjectId::try_from(r.get_ref(0)?.as_bytes()?)\n   82 |                     .unwrap_or_else(|_| gix::ObjectId::null(gix::hash::Kind::Sha1)))","lines":2,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/engine/update.rs#L81-L82"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`.send(...).ok()` silently discards channel-send failures when flushing stat chunks to the DB writer.\nIf the receiver (a stat worker / DB thread) has died, queued commits are silently lost and never\nwritten, yet traversal completes \"successfully\" with an incomplete database and no error surfaced.","fix":"Detect the dropped receiver (set a shared error flag / bail) instead of swallowing with `.ok()`.","locations":[{"ref":"gitoxide-core/src/query/engine/update.rs:380","code":"  380 |                 self.tx.send((self.chunk_id.into_inner(), self.chunk.into_inner())).ok();","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/engine/update.rs#L380"},{"ref":"gitoxide-core/src/query/engine/update.rs:419-424","code":"  419 |                         self.tx\n  420 |                             .send((\n  421 |                                 *self.chunk_id.borrow(),\n  422 |                                 std::mem::replace(&mut self.chunk.borrow_mut(), Vec::with_capacity(self.chunk_size)),\n  423 |                             ))\n  424 |                             .ok();","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/query/engine/update.rs#L419-L424"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In the credential helper, `outcome.and_then(|outcome| (&outcome.next).try_into().ok())` discards a\nconversion failure with `.ok()`, turning it into `None`. The credential protocol treats `None` as\n\"no credentials found\", so a malformed context (genuine error) becomes indistinguishable from a\nlegitimate cache miss, hiding why authentication produced nothing.","fix":"Map the conversion error into the function's error type and propagate it instead of `.ok()`.","locations":[{"ref":"gitoxide-core/src/repository/credential.rs:52","code":"   52 |                 .map(|outcome| outcome.and_then(|outcome| (&outcome.next).try_into().ok()))","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/credential.rs#L52"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In the parallel entry-loading path, per-thread results are joined with\n`thread.join().unwrap()` (lines 176 and 215). A panic inside any spawned entry/extension\nworker thread (for example a future bug in `load_one`, or `from_bytes_or_panic`) is\nre-raised by `unwrap()` and propagates out of `State::from_bytes`, turning what should be a\nrecoverable decode error into a process-level panic. The single-threaded path returns\nerrors gracefully; the threaded path does not for thread panics.","fix":"Handle the `Result` from `join()` and convert a thread panic into a decode error\n(e.g. map the `Box<dyn Any>` to `Error::Entry`/a dedicated variant) rather than `unwrap()`.","locations":[{"ref":"gix-index/src/decode/mod.rs:176","code":"  176 |                                 InOrderIter::from(threads.into_iter().map(|thread| thread.join().unwrap()));","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/decode/mod.rs#L176"},{"ref":"gix-index/src/decode/mod.rs:215","code":"  215 |                         |thread| thread.join().unwrap(),","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/decode/mod.rs#L215"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"TOCTOU window between committing the packed-refs transaction and deleting loose\nreferences. In `commit_inner`, the packed transaction is committed first\n(line 146-151), then `force_refresh_packed_buffer().ok()` discards any refresh\nerror, and only afterwards are loose refs removed (lines 153-175). If the\nprocess is interrupted, or `force_refresh` fails, between the packed commit and\nthe loose deletion in `DeletionsAndNonSymbolicUpdatesRemoveLooseSourceReference`\nmode, both the packed copy and the loose ref exist transiently, and a concurrent\nreader prefers the (now stale) loose ref over the freshly packed value. The doc\ncomment acknowledges non-atomicity, but the silently-ignored refresh error\nmakes the stale-read window depend on filesystem timestamp granularity.","fix":"At minimum, do not ignore the `force_refresh_packed_buffer` result on this\npath, or document that callers must re-open the store. Consider deleting the\nloose ref under its still-held lock immediately after the packed commit before\nreleasing, narrowing the window.","locations":[{"ref":"gix-ref/src/store/file/transaction/commit.rs:146-175","code":"  146 |         if let Some(t) = self.packed_transaction {\n  147 |             t.commit().map_err(Error::PackedTransactionCommit)?;\n  148 |             // Always refresh ourselves right away to avoid races. We ignore errors as there may be many reasons this fails, and it's not\n  149 |             // critical to be done here. In other words, the pack may be refreshed at a later time and then it might work.\n  150 |             self.store.force_refresh_packed_buffer().ok();\n  151 |         }\n  152 | \n  153 |         for change in &mut updates {\n  154 |             let take_lock_and_delete = match &change.update.change {\n  155 |                 Change::Update {\n  156 |                     log: LogChange { mode, .. },\n  157 |                     new,\n  158 |                     ..\n  159 |                 } => delete_loose_refs && *mode == RefLog::AndReference && matches!(new, Target::Object(_)),\n  160 |                 Change::Delete { log: mode, .. } => *mode == RefLog::AndReference,\n  161 |             };\n  162 |             if take_lock_and_delete {\n  163 |                 let lock = change.lock.take();\n  164 |                 let reference_path = self.store.reference_path(change.update.name.as_ref());\n  165 |                 if let Err(err) = std::fs::remove_file(reference_path) {\n  166 |                     if err.kind() != std::io::ErrorKind::NotFound {\n  167 |                         return Err(Error::DeleteReference {\n  168 |                             err,\n  169 |                             full_name: change.name(),\n  170 |                         });\n  171 |                     }\n  172 |                 }\n  173 |                 drop(lock);\n  174 |             }\n  175 |         }","lines":30,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-ref/src/store/file/transaction/commit.rs#L146-L175"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"The packed-refs binary-search comparator returns an empty name slice (`&[]`)\non a record that fails to parse and merely sets a side-channel\n`encountered_parse_failure` flag. Because `&[]` sorts before every real name,\na single malformed record in a file declared `sorted` violates the\nmonotonic-key invariant `binary_search_by_key` requires, so the search can\nconverge to the wrong half and miss an existing, well-formed reference even\nthough only an unrelated line was corrupt. The flag is only meaningful when the\nprobed record happens to be the malformed one; corruption elsewhere silently\nyields `Ok(None)` (ref not found) rather than a parse error. git, by contrast,\ntreats a corrupt packed-refs file as a hard error.","fix":"Treat any parse failure encountered during the search as a definite error\nregardless of which probe hit it (the flag already exists; surface it on every\nnon-Ok outcome), or validate the buffer's sortedness/record shape once at open\ntime so the comparator can rely on well-formed records.","locations":[{"ref":"gix-ref/src/store/packed/find.rs:72-97","code":"   72 |     pub(in crate::store_impl::packed) fn binary_search_by(&self, full_name: &BStr) -> Result<usize, (bool, usize)> {\n   73 |         let a = self.as_ref();\n   74 |         let mut encountered_parse_failure = false;\n   75 |         a.binary_search_by_key(&full_name.as_ref(), |b: &u8| {\n   76 |             let ofs = std::ptr::from_ref::<u8>(b) as usize - a.as_ptr() as usize;\n   77 |             let line = packed::decode::record_at_offset(a, ofs);\n   78 |             // The binary search only needs the name bytes for ordered\n   79 |             // comparison; skip ref-name and hex-hash validation here and let\n   80 |             // the final match site re-parse the record via `decode::reference`\n   81 |             // (which validates fully). This saves the `log₂(n)` per-query.\n   82 |             match packed::decode::name_at_record_start(line, self.object_hash) {\n   83 |                 Some(name) => name,\n   84 |                 None => {\n   85 |                     encountered_parse_failure = true;\n   86 |                     &[]\n   87 |                 }\n   88 |             }\n   89 |         })\n   90 |         .map(|pos| packed::decode::record_start_at_offset(a, pos))\n   91 |         .map_err(|pos| {\n   92 |             (\n   93 |                 encountered_parse_failure,\n   94 |                 packed::decode::record_start_at_offset(a, pos),\n   95 |             )\n   96 |         })\n   97 |     }","lines":26,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-ref/src/store/packed/find.rs#L72-L97"},{"ref":"gix-ref/src/store/packed/decode/mod.rs:109-123","code":"  109 | pub(crate) fn name_at_record_start(input: &[u8], object_hash: gix_hash::Kind) -> Option<&[u8]> {\n  110 |     let hex_len = object_hash.len_in_hex();\n  111 |     if input.get(hex_len) != Some(&b' ') {\n  112 |         return None;\n  113 |     }\n  114 |     let after = &input[hex_len + 1..];\n  115 |     let end = after.iter().position(|&b| b == b'\\r' || b == b'\\n')?;\n  116 |     if end == 0 {\n  117 |         return None;\n  118 |     }\n  119 |     if after[end] == b'\\r' && after.get(end + 1) != Some(&b'\\n') {\n  120 |         return None;\n  121 |     }\n  122 |     Some(&after[..end])\n  123 | }","lines":15,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-ref/src/store/packed/decode/mod.rs#L109-L123"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"The reqwest backend silently ignores almost all shared `http::Options`: `extra_headers`, `proxy`, `no_proxy`, `proxy_auth_method`, `user_agent`, `connect_timeout` (hard-coded to 20s), `low_speed_*`, `ssl_ca_info`, `ssl_version`, `ssl_verify`, and `http_version` are all unused (only `follow_redirects`, `backend`, and the header map are honored). While the module doc notes it \"doesn't support any of the shared http options yet\", dropping `extra_headers` is particularly impactful: `http.extraHeader` is commonly used to carry authentication tokens, so a user configuring auth via that mechanism will silently send unauthenticated requests when the reqwest backend is selected. `ssl_verify`/`ssl_ca_info` being ignored is also a security-relevant surprise.","fix":"At minimum apply `extra_headers` (append them to the header map) and honor `ssl_verify`/`ssl_ca_info`/`user_agent`/`connect_timeout`; or return an explicit error when an unsupported, security-relevant option is set rather than silently ignoring it.","locations":[{"ref":"gix-transport/src/client/blocking_io/http/reqwest/remote.rs:87-133","code":"   87 |             for Request {\n   88 |                 url,\n   89 |                 base_url,\n   90 |                 headers,\n   91 |                 upload_body_kind,\n   92 |                 config,\n   93 |             } in req_recv\n   94 |             {\n   95 |                 let effective_url = redirect::swap_tails(redirected_base_url.as_deref(), &base_url, url.clone());\n   96 |                 let mut req_builder = if upload_body_kind.is_some() {\n   97 |                     client.post(&effective_url)\n   98 |                 } else {\n   99 |                     client.get(&effective_url)\n  100 |                 }\n  101 |                 .headers(headers);\n  102 |                 let (post_body_tx, mut post_body_rx) = pipe::unidirectional(0);\n  103 |                 let (mut response_body_tx, response_body_rx) = pipe::unidirectional(0);\n  104 |                 let (mut headers_tx, headers_rx) = pipe::unidirectional(0);\n  105 |                 if res_send\n  106 |                     .send(Response {\n  107 |                         headers: headers_rx,\n  108 |                         body: response_body_rx,\n  109 |                         upload_body: post_body_tx,\n  110 |                     })\n  111 |                     .is_err()\n  112 |                 {\n  113 |                     // This means our internal protocol is violated as the one who sent the request isn't listening anymore.\n  114 |                     // Shut down as something is off.\n  115 |                     break;\n  116 |                 }\n  117 |                 req_builder = match upload_body_kind {\n  118 |                     Some(PostBodyDataKind::BoundedAndFitsIntoMemory) => {\n  119 |                         let mut buf = Vec::<u8>::with_capacity(512);\n  120 |                         post_body_rx.read_to_end(&mut buf)?;\n  121 |                         req_builder.body(buf)\n  122 |                     }\n  123 |                     Some(PostBodyDataKind::Unbounded) => req_builder.body(reqwest::blocking::Body::new(post_body_rx)),\n  124 |                     None => req_builder,\n  125 |                 };\n  126 |                 let mut req = req_builder.build()?;\n  127 |                 if let Some(ref mut request_options) = config.backend.as_ref().and_then(|backend| backend.lock().ok()) {\n  128 |                     if let Some(options) = request_options.downcast_mut::<super::Options>() {\n  129 |                         if let Some(configure_request) = &mut options.configure_request {\n  130 |                             configure_request(&mut req)?;\n  131 |                         }\n  132 |                     }\n  133 |                 }","lines":47,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/reqwest/remote.rs#L87-L133"},{"ref":"gix-transport/src/client/blocking_io/http/mod.rs:124-189","code":"  124 |     /// Headers to be added to every request.\n  125 |     /// They are applied unconditionally and are expected to be valid as they occur in an HTTP request, like `header: value`, without newlines.\n  126 |     ///\n  127 |     /// Refers to `http.extraHeader` multi-var.\n  128 |     pub extra_headers: Vec<String>,\n  129 |     /// How to handle redirects.\n  130 |     ///\n  131 |     /// Refers to `http.followRedirects`.\n  132 |     pub follow_redirects: options::FollowRedirects,\n  133 |     /// Used in conjunction with `low_speed_time_seconds`, any non-0 value signals the amount of bytes per second at least to avoid\n  134 |     /// aborting the connection.\n  135 |     ///\n  136 |     /// Refers to `http.lowSpeedLimit`.\n  137 |     pub low_speed_limit_bytes_per_second: u32,\n  138 |     /// Used in conjunction with `low_speed_bytes_per_second`, any non-0 value signals the amount seconds the minimal amount\n  139 |     /// of bytes per second isn't reached.\n  140 |     ///\n  141 |     /// Refers to `http.lowSpeedTime`.\n  142 |     pub low_speed_time_seconds: u64,\n  143 |     /// A curl-style proxy declaration of the form `[protocol://][user[:password]@]proxyhost[:port]`.\n  144 |     ///\n  145 |     /// Note that an empty string means the proxy is disabled entirely.\n  146 |     /// Refers to `http.proxy`.\n  147 |     pub proxy: Option<String>,\n  148 |     /// The comma-separated list of hosts to not send through the `proxy`, or `*` to entirely disable all proxying.\n  149 |     pub no_proxy: Option<String>,\n  150 |     /// The way to authenticate against the proxy if the `proxy` field contains a username.\n  151 |     ///\n  152 |     /// Refers to `http.proxyAuthMethod`.\n  153 |     pub proxy_auth_method: options::ProxyAuthMethod,\n  154 |     /// If authentication is needed for the proxy as its URL contains a username, this method must be set to provide a password\n  155 |     /// for it before making the request, and to store it if the connection succeeds.\n  156 |     pub proxy_authenticate: Option<(\n  157 |         gix_credentials::helper::Action,\n  158 |         Arc<std::sync::Mutex<options::AuthenticateFn>>,\n  159 |     )>,\n  160 |     /// The `HTTP` `USER_AGENT` string presented to an `HTTP` server, notably not the user agent present to the `git` server.\n  161 |     ///\n  162 |     /// If not overridden, it defaults to the user agent provided by `curl`, which is a deviation from how `git` handles this.\n  163 |     /// Thus it's expected from the callers to set it to their application, or use higher-level crates which make it easy to do this\n  164 |     /// more correctly.\n  165 |     ///\n  166 |     /// Using the correct user-agent might affect how the server treats the request.\n  167 |     ///\n  168 |     /// Refers to `http.userAgent`.\n  169 |     pub user_agent: Option<String>,\n  170 |     /// The amount of time we wait until aborting a connection attempt.\n  171 |     ///\n  172 |     /// If `None`, this typically defaults to 2 minutes to 5 minutes.\n  173 |     /// Refers to `gitoxide.http.connectTimeout`.\n  174 |     pub connect_timeout: Option<std::time::Duration>,\n  175 |     /// If enabled, emit additional information about connections and possibly the data received or written.\n  176 |     pub verbose: bool,\n  177 |     /// If set, use this path to point to a file with CA certificates to verify peers.\n  178 |     pub ssl_ca_info: Option<PathBuf>,\n  179 |     /// The SSL version or version range to use, or `None` to let the TLS backend determine which versions are acceptable.\n  180 |     pub ssl_version: Option<SslVersionRangeInclusive>,\n  181 |     /// Controls whether to perform SSL identity verification or not. Turning this off is not recommended and can lead to\n  182 |     /// various security risks. An example where this may be needed is when an internal git server uses a self-signed\n  183 |     /// certificate and the user accepts the associated security risks.\n  184 |     pub ssl_verify: bool,\n  185 |     /// The HTTP version to enforce. If unset, it is implementation defined.\n  186 |     pub http_version: Option<HttpVersion>,\n  187 |     /// Backend specific options, if available.\n  188 |     pub backend: Option<Arc<Mutex<dyn Any + Send + Sync + 'static>>>,\n  189 | }","lines":66,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-transport/src/client/blocking_io/http/mod.rs#L124-L189"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`Platform::stats()` silently swallows per-file errors: `change.diff(...).ok().and_then(|p| p.line_counts().ok()).flatten()`.\nA blob-diff or line-count failure (e.g. missing object after a `--filter=blob:none` clone, or a decode error)\nresults in the file simply not being counted, producing silently wrong `files_changed`/`lines_added`/`lines_removed`\nstatistics with no indication that anything went wrong.","fix":"Propagate the diff/line-count errors via the function's `stats::Error` instead of discarding them with `.ok()`.","locations":[{"ref":"gix/src/object/tree/diff/mod.rs:191-217","code":"  191 |     pub fn stats(&mut self, other: &Tree<'_>) -> Result<Stats, stats::Error> {\n  192 |         // let (mut number_of_files, mut lines_added, mut lines_removed) = (0, 0, 0);\n  193 |         let mut resource_cache = self.lhs.repo.diff_resource_cache_for_tree_diff()?;\n  194 | \n  195 |         let (mut files_changed, mut lines_added, mut lines_removed) = (0, 0, 0);\n  196 |         self.for_each_to_obtain_tree(other, |change| {\n  197 |             if let Some(counts) = change\n  198 |                 .diff(&mut resource_cache)\n  199 |                 .ok()\n  200 |                 .and_then(|mut platform| platform.line_counts().ok())\n  201 |                 .flatten()\n  202 |             {\n  203 |                 files_changed += 1;\n  204 |                 lines_added += u64::from(counts.insertions);\n  205 |                 lines_removed += u64::from(counts.removals);\n  206 |             }\n  207 | \n  208 |             resource_cache.clear_resource_cache_keep_allocation();\n  209 |             Ok::<_, std::convert::Infallible>(std::ops::ControlFlow::Continue(()))\n  210 |         })?;\n  211 | \n  212 |         Ok(Stats {\n  213 |             files_changed,\n  214 |             lines_added,\n  215 |             lines_removed,\n  216 |         })\n  217 |     }","lines":27,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/object/tree/diff/mod.rs#L191-L217"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`worktree_branches` -> `insert_head` obtains the current HEAD via `repo.head().ok()` (and per-worktree\n`repo.head().ok()`), silently discarding any error. If reading HEAD fails for a transient/odd reason, the\nbranch is treated as not checked out, so the `RejectedCurrentlyCheckedOut` safeguard is silently bypassed and\na fetch could overwrite a checked-out branch. The surrounding code is explicitly a safety mechanism\n('the local ref is currently checked out' rejection), so swallowing the error weakens the guarantee.","fix":"Distinguish 'unborn/absent HEAD' from real errors; propagate genuine read errors instead of mapping every error to None via `.ok()`.","locations":[{"ref":"gix/src/remote/connection/fetch/update_refs/mod.rs:466-469","code":"  466 |     insert_head(repo.head().ok(), &mut map)?;\n  467 |     for proxy in repo.worktrees()? {\n  468 |         let repo = proxy.into_repo_with_possibly_inaccessible_worktree()?;\n  469 |         insert_head(repo.head().ok(), &mut map)?;","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/remote/connection/fetch/update_refs/mod.rs#L466-L469"},{"ref":"gix/src/remote/connection/fetch/update_refs/mod.rs:447","code":"  447 |     if let Some((head, wd)) = head.and_then(|head| head.repo.workdir().map(|wd| (head, wd))) {","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/remote/connection/fetch/update_refs/mod.rs#L447"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`branch_remote` uses `.or_else(...)` to fall back to URL parsing when `try_find_remote` returns None, but `try_find_remote(...).map(...)` returning `Some(Err(..))` (a found-but-invalid remote) short-circuits the `or_else` and surfaces a find error - however when the symbolic name is NOT found AND it is a `Name::Symbol`, the function returns None (no error), masking the case where a branch references a remote name that doesn't exist. A misconfigured `branch.<x>.remote = nonexistent` yields a silent None instead of signalling the missing remote.","fix":"Consider returning an explicit error (or documenting clearly) when a symbolic remote name is configured for a branch but no such remote exists, instead of silently returning None.","locations":[{"ref":"gix/src/repository/config/branch.rs:246-264","code":"  246 |     pub fn branch_remote<'a>(\n  247 |         &self,\n  248 |         short_branch_name: impl Into<&'a BStr>,\n  249 |         direction: remote::Direction,\n  250 |     ) -> Option<Result<crate::Remote<'_>, remote::find::existing::Error>> {\n  251 |         let name = self.branch_remote_name(short_branch_name, direction)?;\n  252 |         self.try_find_remote(name.as_bstr())\n  253 |             .map(|res| res.map_err(Into::into))\n  254 |             .or_else(|| match name {\n  255 |                 remote::Name::Url(url) => gix_url::parse(url.as_ref())\n  256 |                     .map_err(Into::into)\n  257 |                     .and_then(|url| {\n  258 |                         self.remote_at(url)\n  259 |                             .map_err(|err| remote::find::existing::Error::Find(remote::find::Error::Init(err)))\n  260 |                     })\n  261 |                     .into(),\n  262 |                 remote::Name::Symbol(_) => None,\n  263 |             })\n  264 |     }","lines":19,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/repository/config/branch.rs#L246-L264"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`parse_date` silently swallows date parse failures: when a user-controlled `GIT_COMMITTER_DATE`/`gitoxide.commit.committerDate` (or author equivalents) is invalid, the `.to_str().ok().and_then(|d| gix_date::parse(...).ok())` chain yields None, then `.or_else(|| Some(gix_date::Time::now_local_or_utc()))` substitutes the current time. The resulting commit is stamped with a silently-wrong 'now' timestamp. This contradicts the `committer()`/`author()` doc ('Some(Err(...)) if the committer date could not be parsed') and the `Result<_, config::time::Error>` return type, which thus never reports a parse error.","fix":"Propagate the parse error instead of defaulting to `now` on malformed input, so `committer()`/`author()` can return `Some(Err(..))` as documented.","locations":[{"ref":"gix/src/repository/identity.rs:127-144","code":"  127 |         let parse_date = |key: &str, date: &keys::Any| -> Option<String> {\n  128 |             debug_assert_eq!(\n  129 |                 key,\n  130 |                 date.logical_name(),\n  131 |                 \"BUG: drift of expected name and actual name of the key (we hardcode it to save an allocation)\"\n  132 |             );\n  133 |             config\n  134 |                 .string(key)\n  135 |                 .map(std::borrow::Cow::into_owned)\n  136 |                 .and_then(|config_date| {\n  137 |                     config_date\n  138 |                         .to_str()\n  139 |                         .ok()\n  140 |                         .and_then(|date| gix_date::parse(date, Some(SystemTime::now())).ok())\n  141 |                 })\n  142 |                 .or_else(|| Some(gix_date::Time::now_local_or_utc()))\n  143 |                 .map(|time| time.format_or_unix(gix_date::time::Format::Raw))\n  144 |         };","lines":18,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/repository/identity.rs#L127-L144"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`find_fetch_remote(Some(name))` uses `self.try_find_remote(name).and_then(Result::ok)`, which discards a configuration error. If `name` matches a configured remote whose config is invalid (e.g. malformed `remote.<name>.url` or refspec), the real error is silently dropped and the code falls through to treating `name` as a URL via `remote_at(gix_url::parse(name)?)`. The user gets a confusing URL-parse error (or unexpected remote) instead of the real remote-config error.","fix":"Distinguish `None` (not found) from `Some(Err)` (found but invalid): on `Some(Err(e))` propagate `e` rather than falling through to URL parsing.","locations":[{"ref":"gix/src/repository/remote.rs:140-154","code":"  140 |     pub fn find_fetch_remote(&self, name_or_url: Option<&BStr>) -> Result<Remote<'_>, find::for_fetch::Error> {\n  141 |         Ok(match name_or_url {\n  142 |             Some(name) => match self.try_find_remote(name).and_then(Result::ok) {\n  143 |                 Some(remote) => remote,\n  144 |                 None => self.remote_at(gix_url::parse(name)?)?,\n  145 |             },\n  146 |             None => self\n  147 |                 .head()?\n  148 |                 .into_remote(remote::Direction::Fetch)\n  149 |                 .transpose()?\n  150 |                 .map(Ok)\n  151 |                 .or_else(|| self.find_default_remote(remote::Direction::Fetch))\n  152 |                 .ok_or(find::for_fetch::Error::ExactlyOneRemoteNotAvailable)??,\n  153 |         })\n  154 |     }","lines":15,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix/src/repository/remote.rs#L140-L154"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"Human-readable output writers discard their `io::Result` via `drop(...)`/`.ok()`, while the JSON\nbranches in the same `match` arms propagate errors with `?`. Genuine write failures (e.g. disk full\nwhen redirected to a file) are silently lost for the human path, and the inconsistency within one\ncommand is a maintenance hazard.","fix":"Propagate the io::Result with `?` for the human-output writers, consistent with the JSON branch.","locations":[{"ref":"gitoxide-core/src/pack/index.rs:114","code":"  114 |         OutputFormat::Human => drop(human_output(out, res)),","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/index.rs#L114"},{"ref":"gitoxide-core/src/pack/receive.rs:308","code":"  308 |         OutputFormat::Human => drop(print(&mut out, outcome, refs)),","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/receive.rs#L308"},{"ref":"gitoxide-core/src/pack/verify.rs:176","code":"  176 |                             drop(print_statistics(&mut out, &stats));","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/verify.rs#L176"},{"ref":"gitoxide-core/src/pack/verify.rs:204","code":"  204 |             Some(OutputFormat::Human) => drop(print_statistics(&mut out, stats)),","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/verify.rs#L204"},{"ref":"gitoxide-core/src/pack/multi_index.rs:64","code":"   64 |         writeln!(err, \"Defaulting to JSON as human format isn't implemented\").ok();","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/pack/multi_index.rs#L64"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`platform.local_branches()?.flatten()` and `remote_branches()?.flatten()` use `.flatten()` on an\niterator of `Result`, silently discarding any per-reference error (e.g. a malformed/unparseable ref).\nThe user sees a truncated branch list with no indication that some refs failed to be read.","fix":"Collect with `.collect::<Result<Vec<_>, _>>()?`, or log skipped errors to stderr.","locations":[{"ref":"gitoxide-core/src/repository/branch.rs:33-36","code":"   33 |             .local_branches()?\n   34 |             .flatten()\n   35 |             .map(|branch| branch.name().shorten().to_string())\n   36 |             .collect();","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/branch.rs#L33-L36"},{"ref":"gitoxide-core/src/repository/branch.rs:47-50","code":"   47 |             .remote_branches()?\n   48 |             .flatten()\n   49 |             .map(|branch| branch.name().shorten().to_string())\n   50 |             .collect();","lines":4,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gitoxide-core/src/repository/branch.rs#L47-L50"}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`collect_parents` for the `CommitRefIter` path swallows errors: `odb.find_commit_iter(...).ok()` and\n`committer().ok()` discard failures and fall back to `committer_timestamp = 0` via `unwrap_or_default()`. A parent whose\ncommit object fails to load (or has an undecodable committer) is silently inserted into the priority queue with timestamp\n0, which both hides real DB/decoding errors and skews the date-priority traversal order, potentially affecting blame\nresults. Note the `CachedCommit` path (just above) does propagate the error via `parent_pos?`, so behavior is inconsistent\nbetween the two paths.","fix":"Propagate the find/decode error (as in the cached path) instead of defaulting the timestamp to 0, or at least trace it.","locations":[{"ref":"gix-blame/src/file/function.rs:864-872","code":"  864 |         gix_traverse::commit::Either::CommitRefIter(commit_ref_iter) => {\n  865 |             for id in commit_ref_iter.parent_ids() {\n  866 |                 let parent = odb.find_commit_iter(id.as_ref(), buf).ok();\n  867 |                 let parent_commit_time = parent\n  868 |                     .and_then(|parent| parent.committer().ok().map(|committer| committer.seconds()))\n  869 |                     .unwrap_or_default();\n  870 |                 parent_ids.push((id, parent_commit_time));\n  871 |             }\n  872 |         }","lines":9,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-blame/src/file/function.rs#L864-L872"}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Graph::lookup_by_id` accumulates `current_file_start += file.num_commits()` as a `u32`. The sum across all files is bounded to `MAX_COMMITS` only inside `Graph::new`. Any code path that constructs a `Graph` while bypassing `new` (none exist publicly today, but the field is reachable within the crate) could overflow this `u32` in debug or wrap in release, producing wrong global positions. The safety here relies entirely on the `new` invariant rather than on a local check.","fix":"Use `checked_add` for `current_file_start` (and `lookup_by_pos`'s implicit cumulative position) or keep the running offset as `u64`, so a malformed/oversized graph cannot silently produce wrong positions even if the `MAX_COMMITS` invariant is ever violated.","locations":[{"ref":"gix-commitgraph/src/access.rs:59-72","code":"   59 |     fn lookup_by_id(&self, id: &gix_hash::oid) -> Option<LookupByIdResult<'_>> {\n   60 |         let mut current_file_start = 0;\n   61 |         for file in &self.files {\n   62 |             if let Some(lex_pos) = file.lookup(id) {\n   63 |                 return Some(LookupByIdResult {\n   64 |                     file,\n   65 |                     file_pos: lex_pos,\n   66 |                     graph_pos: Position(current_file_start + lex_pos.0),\n   67 |                 });\n   68 |             }\n   69 |             current_file_start += file.num_commits();\n   70 |         }\n   71 |         None\n   72 |     }","lines":14,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-commitgraph/src/access.rs#L59-L72"},{"ref":"gix-commitgraph/src/init.rs:56-81","code":"   56 |     pub fn new(files: Vec<File>) -> Result<Self, Message> {\n   57 |         let files = nonempty::NonEmpty::from_vec(files)\n   58 |             .ok_or_else(|| message!(\"Commit-graph must contain at least one file\"))?;\n   59 |         let num_commits: u64 = files.iter().map(|f| u64::from(f.num_commits())).sum();\n   60 |         if num_commits > u64::from(MAX_COMMITS) {\n   61 |             return Err(message!(\n   62 |                 \"Commit-graph files contain {num_commits} commits altogether, but only {MAX_COMMITS} commits are allowed\"\n   63 |             ));\n   64 |         }\n   65 | \n   66 |         let mut f1 = files.first();\n   67 |         for f2 in files.tail() {\n   68 |             if f1.object_hash() != f2.object_hash() {\n   69 |                 return Err(message!(\n   70 |                     \"Commit-graph files mismatch: '{path1}' uses hash {hash1:?}, but '{path2}' uses hash {hash2:?}\",\n   71 |                     path1 = f1.path().display(),\n   72 |                     hash1 = f1.object_hash(),\n   73 |                     path2 = f2.path().display(),\n   74 |                     hash2 = f2.object_hash(),\n   75 |                 ));\n   76 |             }\n   77 |             f1 = f2;\n   78 |         }\n   79 | \n   80 |         Ok(Self { files })\n   81 |     }","lines":26,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-commitgraph/src/init.rs#L56-L81"}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`AsKey::as_key` (and its blanket/impl forms) panics via `panic!(\"'{self}' is not a valid configuration\nkey\")` when the key cannot be parsed. Comfort accessors correctly use `try_as_key`, but the raw value API\n(`raw_value`, `raw_value_filter`, `raw_value_mut`, etc.) call `key.as_key()` directly, so passing a\nmalformed key string (e.g. one without a `.`) panics instead of returning a lookup error. For an API parsing\nuser-influenced keys this is an avoidable panic surface.","fix":"Document the panic clearly on the raw API, or provide/route through fallible `try_*` variants for the raw\nvalue lookups so callers with dynamic keys don't have to risk a panic.","locations":[{"ref":"gix-config/src/key.rs:25-67","code":"   25 |     impl AsKey for &String {\n   26 |         fn as_key(&self) -> KeyRef<'_> {\n   27 |             self.try_as_key()\n   28 |                 .unwrap_or_else(|| panic!(\"'{self}' is not a valid configuration key\"))\n   29 |         }\n   30 | \n   31 |         fn try_as_key(&self) -> Option<KeyRef<'_>> {\n   32 |             KeyRef::parse_unvalidated(self.as_str().into())\n   33 |         }\n   34 |     }\n   35 | \n   36 |     impl AsKey for &str {\n   37 |         fn as_key(&self) -> KeyRef<'_> {\n   38 |             self.try_as_key()\n   39 |                 .unwrap_or_else(|| panic!(\"'{self}' is not a valid configuration key\"))\n   40 |         }\n   41 | \n   42 |         fn try_as_key(&self) -> Option<KeyRef<'_>> {\n   43 |             KeyRef::parse_unvalidated((*self).into())\n   44 |         }\n   45 |     }\n   46 | \n   47 |     impl AsKey for &BString {\n   48 |         fn as_key(&self) -> KeyRef<'_> {\n   49 |             self.try_as_key()\n   50 |                 .unwrap_or_else(|| panic!(\"'{self}' is not a valid configuration key\"))\n   51 |         }\n   52 | \n   53 |         fn try_as_key(&self) -> Option<KeyRef<'_>> {\n   54 |             KeyRef::parse_unvalidated(self.as_bstr())\n   55 |         }\n   56 |     }\n   57 | \n   58 |     impl AsKey for &BStr {\n   59 |         fn as_key(&self) -> KeyRef<'_> {\n   60 |             self.try_as_key()\n   61 |                 .unwrap_or_else(|| panic!(\"'{self}' is not a valid configuration key\"))\n   62 |         }\n   63 | \n   64 |         fn try_as_key(&self) -> Option<KeyRef<'_>> {\n   65 |             KeyRef::parse_unvalidated(self)\n   66 |         }\n   67 |     }","lines":43,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config/src/key.rs#L25-L67"},{"ref":"gix-config/src/file/access/raw.rs:21-23","code":"   21 |     pub fn raw_value(&self, key: impl AsKey) -> Result<Cow<'_, BStr>, lookup::existing::Error> {\n   22 |         let key = key.as_key();\n   23 |         self.raw_value_filter_by(key.section_name, key.subsection_name, key.value_name, |_| true)","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-config/src/file/access/raw.rs#L21-L23"}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`parse_header` does `parse_offset(offset).unwrap_or_default()`, turning any malformed offset into 0 instead of signaling it, and falls back on only the leading ASCII digits of a malformed seconds token. Callers that do not re-serialize to detect \"wonky\" results will silently get a wrong `Time` (e.g. offset defaulted to 0). Documented as intentional leniency, but a foot-gun worth flagging.","fix":"If stricter behavior is desired, return None when `parse_offset` fails rather than defaulting to 0.","locations":[{"ref":"gix-date/src/parse/function.rs:144-165","code":"  144 |     let mut split = input.split_whitespace();\n  145 |     let seconds = split.next()?;\n  146 |     let seconds = match seconds.parse::<SecondsSinceUnixEpoch>() {\n  147 |         Ok(s) => s,\n  148 |         Err(_err) => {\n  149 |             // Inefficient, but it's not the common case.\n  150 |             let first_digits: String = seconds.chars().take_while(char::is_ascii_digit).collect();\n  151 |             first_digits.parse().ok()?\n  152 |         }\n  153 |     };\n  154 |     let offset = match split.next() {\n  155 |         None => 0,\n  156 |         Some(offset) => {\n  157 |             if split.next().is_some() {\n  158 |                 0\n  159 |             } else {\n  160 |                 parse_offset(offset).unwrap_or_default()\n  161 |             }\n  162 |         }\n  163 |     };\n  164 |     let time = Time { seconds, offset };\n  165 |     Some(time)","lines":22,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-date/src/parse/function.rs#L144-L165"}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`probe_file_mode` computes the meaningful probe result `res`, then does `std::fs::remove_file(test_path)?;` and only afterwards returns `res`. The `?` propagates a cleanup error and discards the actual probe outcome. If the file removal fails (e.g. permissions), the real answer is lost; if the earlier open failed, it still tries to remove a nonexistent file and returns that NotFound error instead of the original. The sibling `probe_ignore_case` uses best-effort `.ok()` cleanup.","fix":"Use `let _ = std::fs::remove_file(test_path);` (best-effort) then return `res`.","locations":[{"ref":"gix-fs/src/capabilities.rs:104-106","code":"  104 |             });\n  105 |         std::fs::remove_file(test_path)?;\n  106 |         res","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fs/src/capabilities.rs#L104-L106"}]},{"id":"ERR_24","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"Same pattern as the file-mode probe: `probe_precompose_unicode` computes the meaningful result `res`, then `std::fs::remove_file(precomposed)?;` propagates a cleanup failure and discards `res`, so a successful probe with a failed cleanup loses the real answer.","fix":"Make cleanup best-effort (`let _ = std::fs::remove_file(...);`) and return `res`.","locations":[{"ref":"gix-fs/src/capabilities.rs:176-178","code":"  176 |         let res = root.join(decomposed).symlink_metadata().map(|_| true);\n  177 |         std::fs::remove_file(precomposed)?;\n  178 |         res","lines":3,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-fs/src/capabilities.rs#L176-L178"}]},{"id":"ERR_25","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`detect_required_version` only ever returns V2 or V3 (it never returns V4). As a result\n`State::write_to` can never serialize a V4 index even if the in-memory state was decoded\nfrom a V4 file, silently downgrading the on-disk format and discarding the path\ndelta-compression. This is a (documented-by-omission) loss of information on write and means\nthe V4 write/padding code path is effectively unreachable.","fix":"Either preserve `self.version` (write V4 when the state is V4 and V4 writing is implemented),\nor document explicitly that writing always downgrades to V2/V3.","locations":[{"ref":"gix-index/src/write.rs:141-146","code":"  141 |     fn detect_required_version(&self) -> Version {\n  142 |         self.entries\n  143 |             .iter()\n  144 |             .find_map(|e| e.flags.contains(entry::Flags::EXTENDED).then_some(Version::V3))\n  145 |             .unwrap_or(Version::V2)\n  146 |     }","lines":6,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-index/src/write.rs#L141-L146"}]},{"id":"ERR_26","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`gix_pack::Find::contains` swallows all errors from `load_one_index` and returns `false` (`Err(_) => return false`).\nA transient I/O error while refreshing the index is therefore reported as \"object does not exist\", which can\ncause callers to incorrectly conclude an object is missing and, for example, attempt to re-fetch or fail a\nreachability check. The code's own comment acknowledges this limitation (\"something went wrong, nothing we can\ncommunicate here with this trait\").","fix":"Either change the trait to return a fallible result, or at minimum trace/log the swallowed error so silent index-refresh failures are observable rather than masquerading as a definitive non-existence answer.","locations":[{"ref":"gix-odb/src/store_impls/dynamic/find.rs:339-346","code":"  339 |             match self.store.load_one_index(self.refresh, snapshot.marker) {\n  340 |                 Ok(Some(new_snapshot)) => {\n  341 |                     *snapshot = new_snapshot;\n  342 |                     self.clear_cache();\n  343 |                 }\n  344 |                 Ok(None) => return false, // nothing more to load, or our refresh mode doesn't allow disk refreshes\n  345 |                 Err(_) => return false, // something went wrong, nothing we can communicate here with this trait. TODO: Maybe that should change?\n  346 |             }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-odb/src/store_impls/dynamic/find.rs#L339-L346"}]},{"id":"ERR_27","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`RelativePath::new_unchecked` has signature `-> Result<&RelativePath, Error>` but always returns Ok (the body only transmutes; nothing is fallible). The `Result` wrapper is vestigial and forces callers (relative_path.rs:63) into needless `?`/Ok handling while obscuring that the function is infallible.","fix":"Change the signature to `-> &RelativePath` and wrap at the single call site if a Result is needed there.","locations":[{"ref":"gix-path/src/relative_path.rs:30-36","code":"   30 |     fn new_unchecked(value: &BStr) -> Result<&RelativePath, Error> {\n   31 |         // SAFETY: `RelativePath` is transparent and equivalent to a `&BStr` if provided as reference.\n   32 |         #[allow(unsafe_code)]\n   33 |         unsafe {\n   34 |             std::mem::transmute(value)\n   35 |         }\n   36 |     }","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/relative_path.rs#L30-L36"},{"ref":"gix-path/src/relative_path.rs:63","code":"   63 |     RelativePath::new_unchecked(BStr::new(path_bstr.as_bytes()))","lines":1,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-path/src/relative_path.rs#L63"}]},{"id":"ERR_28","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Response::from` (the `From<std::io::Error>` impl) matches on `err.kind() == ErrorKind::Other` and, in\nthe `None` inner-error case, discards the original error entirely, reconstructing a bare\n`std::io::ErrorKind::Other.into()`. Any message/context attached to an `Other` error with no boxed inner\nerror is silently lost. While `io::Error::other(..)` always carries an inner error in practice, an\n`ErrorKind::Other` produced via `ErrorKind::Other.into()` elsewhere would be flattened to a generic,\nmessage-less error here, harming diagnosability of fetch-response failures.","fix":"In the `None` branch, preserve the original error (e.g. `Error::Io(err)` using the moved value via\nmatching before `into_inner`, or reconstruct from `err.to_string()`), rather than fabricating a fresh\n`ErrorKind::Other` with no payload.","locations":[{"ref":"gix-protocol/src/fetch/response/mod.rs:24-38","code":"   24 | impl From<std::io::Error> for Error {\n   25 |     fn from(err: std::io::Error) -> Self {\n   26 |         if err.kind() == std::io::ErrorKind::Other {\n   27 |             match err.into_inner() {\n   28 |                 Some(err) => match err.downcast::<gix_transport::packetline::read::Error>() {\n   29 |                     Ok(err) => Error::UploadPack(*err),\n   30 |                     Err(err) => Error::Io(std::io::Error::other(err)),\n   31 |                 },\n   32 |                 None => Error::Io(std::io::ErrorKind::Other.into()),\n   33 |             }\n   34 |         } else {\n   35 |             Error::Io(err)\n   36 |         }\n   37 |     }\n   38 | }","lines":15,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-protocol/src/fetch/response/mod.rs#L24-L38"}]},{"id":"ERR_29","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`ref_contents` returns `Ok(None)` (treated as \"ref does not exist\") when\n`File::open` succeeds but `read_to_end` fails and the path turns out to be a\ndirectory (line 298-299). A transient read error on a regular file is correctly\npropagated, but the `is_dir()` recovery races: a path that was a file at open\ntime but is reported as a dir at the error check (or vice-versa) collapses a\ngenuine I/O error into \"not found\", masking real failures.","fix":"Capture the file type from the already-open file handle (`file.metadata()`)\nrather than re-stat'ing the path, so the error/none decision is based on the\nsame inode that was opened.","locations":[{"ref":"gix-ref/src/store/file/find.rs:295-301","code":"  295 |         match std::fs::File::open(&ref_path) {\n  296 |             Ok(mut file) => {\n  297 |                 let mut buf = Vec::with_capacity(128);\n  298 |                 if let Err(err) = file.read_to_end(&mut buf) {\n  299 |                     return if ref_path.is_dir() { Ok(None) } else { Err(err) };\n  300 |                 }\n  301 |                 Ok(buf.into())","lines":7,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-ref/src/store/file/find.rs#L295-L301"}]},{"id":"ERR_30","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`LazyCommit::committer_timestamp` and `generation_and_timestamp` cast the commit-graph timestamp with\n`cache.commit_at(*pos).committer_timestamp() as SecondsSinceUnixEpoch` (u64 -> i64), with a comment\n\"a cast as we cannot represent the error and trying seems overkill\". This silently produces a\nnegative/garbage timestamp for u64 values > i64::MAX, in contrast to `to_owned()` which properly\nreturns `to_owned::Error::CommitGraphTime` via `try_into()` for the same conversion. The two code\npaths disagree on how to handle an out-of-range commit-graph time.","fix":"Be consistent: either use try_into() and surface an error in both places, or document why truncation is acceptable for the timestamp accessors.","locations":[{"ref":"gix-revwalk/src/graph/commit.rs:21-28","code":"   21 |     pub fn committer_timestamp(&self) -> Result<SecondsSinceUnixEpoch, gix_object::decode::Error> {\n   22 |         Ok(match &self.backing {\n   23 |             Either::Left(buf) => gix_object::CommitRefIter::from_bytes(buf, self.object_hash)\n   24 |                 .committer()?\n   25 |                 .seconds(),\n   26 |             Either::Right((cache, pos)) => cache.commit_at(*pos).committer_timestamp() as SecondsSinceUnixEpoch, // a cast as we cannot represent the error and trying seems overkill\n   27 |         })\n   28 |     }","lines":8,"link":"https://github.com/GitoxideLabs/gitoxide/blob/66f70f3063724b4145b21c6691c4f57892c7a74e/gix-revwalk/src/graph/commit.rs#L21-L28"},{"ref":"gix-revwalk/src/graph/commit.rs:38-58","code":"   38 |     /// Returns the generation of the commit and its commit-time, either from cache if available, or parsed from the object buffer.\n   39 |     pub fn generation_and_timestamp(\n   40 |         &self,\n   41 |     ) -> Result<(Option<Generation>, SecondsSinceUnixEpoch), gix_object::decode::Error> {\n   42 |         Ok(match &self.backing {\n   43 |             Either::Left(buf) => (\n   44 |
