<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":false,"description":"Gaussian blur with decimation panics (index out of bounds) on images whose dimensions are not divisible by 2^n_decimations. In `apply_blur`, the upscale loop calls `upscale(pixmap, w, h, ...)` with the *current logical* dimensions, and `upscale` internally computes the physical write extent as `dst_width = src_width * 2` (gaussian_blur.rs:334-335), writing pixels at columns/rows up to `2*w-1`. But the physical `Pixmap` is only the *original* size. For odd dimensions the upsampled logical size (clamped in `DecimationSizer::upscale`) is smaller than `2*w` (e.g. width 5 -> 3 after one downscale, then upscale writes column index 5 into a 5-wide buffer). `Pixmap::set_pixel` indexes `width*y + x` with the physical width and panics on the OOB index. Verified by adding a test (Pixmap::new(5,5), plan_decimated_blur(5.0) => n_decimations>=1): panics with 'index out of bounds: the len is 25 but the index is 25' at pixmap.rs:343. Any blur with std_deviation roughly >= 2.2 on an image with an odd width or height (or any size not a clean power-of-two multiple) triggers this.","fix":"Do not let `upscale` write `2*src_width` pixels unconditionally. Pass the target (parent) logical dimensions into the upscale step and clamp the physical write extent to them, mirroring `DecimationSizer::upscale`'s clamp. Concretely: have `upscale`/`upscale_x`/`upscale_y` take a `dst_width`/`dst_height` (the pre-downscale logical size popped from the sizer) and only write `dst_x`/`dst_y` indices that are `< dst_width`/`< dst_height`. Drive the loop off `sizer.upscale()`'s returned target dims rather than the current dims.","locations":[{"ref":"sparse_strips/vello_cpu/src/filter/gaussian_blur.rs:93-98","code":"   93 |     // Upsample back to original resolution (each step doubles resolution by 2×)\n   94 |     for _ in 0..n_decimations {\n   95 |         let (w, h) = sizer.current();\n   96 |         upscale(pixmap, w, h, edge_mode);\n   97 |         sizer.upscale();\n   98 |     }","lines":6},{"ref":"sparse_strips/vello_cpu/src/filter/gaussian_blur.rs:328-339","code":"  328 | pub(crate) fn upscale(\n  329 |     src: &mut Pixmap,\n  330 |     src_width: u16,\n  331 |     src_height: u16,\n  332 |     edge_mode: EdgeMode,\n  333 | ) -> (u16, u16) {\n  334 |     let dst_width = src_width * 2;\n  335 |     let dst_height = src_height * 2;\n  336 |     upscale_x(src, src_width, src_height, edge_mode);\n  337 |     upscale_y(src, dst_width, src_height, edge_mode);\n  338 |     (dst_width, dst_height)\n  339 | }","lines":12}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`palette_index_to_color` indexes the CPAL color-records array with `palette_index as usize` without any bounds check. A malformed or hostile COLR/CPAL font can specify a palette index that is >= the array length, producing an index-out-of-bounds panic while painting a COLR glyph. Font data is untrusted input, so this is a denial-of-service panic on bad fonts.","fix":"Use `.get(palette_index as usize)` and return `None` (or fall back to context color / black) when the index is out of range, instead of indexing directly.","locations":[{"ref":"glifo/src/colr.rs:109-117","code":"  109 |     fn palette_index_to_color(&self, palette_index: u16, alpha: f32) -> Option<AlphaColor<Srgb>> {\n  110 |         if palette_index != u16::MAX {\n  111 |             let color = self\n  112 |                 .colr_glyph\n  113 |                 .font_ref\n  114 |                 .cpal()\n  115 |                 .ok()?\n  116 |                 .color_records_array()?\n  117 |                 .ok()?[palette_index as usize];","lines":9}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`convert_stops` assumes the color-stop slice is non-empty: it reads `stops[0]` and `stops.last().unwrap()` after collecting. For a malformed font whose gradient brush carries zero color stops, `stops` will be empty and both accesses panic. (`fill` only guards `stops.len() == 1`, never the empty case before calling/using the result.)","fix":"Early-return a sane default (e.g. a single black stop, or skip the fill) when `stops.is_empty()` before indexing.","locations":[{"ref":"glifo/src/colr.rs:145-146","code":"  145 |         let first_stop = stops[0];\n  146 |         let last_stop = *stops.last().unwrap();","lines":2}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"PicoSvg::load parses the viewBox attribute with `f64::from_str(s).unwrap()`. Any malformed viewBox token (non-numeric, empty from double spaces, etc.) panics instead of being handled. Since pico_svg parses untrusted external SVG input, a single bad viewBox crashes the parser. Note the empty-token issue is also triggered by perfectly valid SVG that separates viewBox values with commas or multiple spaces, since the split is on a single ' ' only.","fix":"Replace `.map(|s| f64::from_str(s).unwrap())` with a fallible collect into `Result<Vec<f64>, _>` (or `.filter_map`) and return None/propagate the error on failure, matching how translate/scale are parsed below.","locations":[{"ref":"sparse_strips/vello_common/src/pico_svg.rs:89-102","code":"   89 |         let (origin, viewbox_size) = root\n   90 |             .attribute(\"viewBox\")\n   91 |             .and_then(|vb_attr| {\n   92 |                 let vs: Vec<f64> = vb_attr\n   93 |                     .split(' ')\n   94 |                     .map(|s| f64::from_str(s).unwrap())\n   95 |                     .collect();\n   96 |                 if let &[x, y, width, height] = vs.as_slice() {\n   97 |                     Some((Point { x, y }, Size { width, height }))\n   98 |                 } else {\n   99 |                     None\n  100 |                 }\n  101 |             })\n  102 |             .unzip();","lines":14}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"parse_transform uses `.expect(...)` twice when handling the `matrix(...)` transform: once when parsing the six values as floats and once when converting the Vec into a [f64; 6] array. Malformed SVG transform attributes (e.g. `matrix(1,2,3)` or `matrix(a,b,c,d,e,f)`) panic the parser on external input, unlike translate/scale which gracefully fall back to IDENTITY.","fix":"Mirror the translate/scale branches: parse into `Result<Vec<f64>, _>`, and on `Ok([a,b,c,d,e,f])` build the Affine, otherwise fall back to `Affine::IDENTITY` (optionally logging via eprintln).","locations":[{"ref":"sparse_strips/vello_common/src/pico_svg.rs:237-246","code":"  237 |         nt *= if let Some(s) = ts.strip_prefix(\"matrix(\") {\n  238 |             let vals = s\n  239 |                 .split([',', ' '])\n  240 |                 .map(str::parse)\n  241 |                 .collect::<Result<Vec<f64>, _>>()\n  242 |                 .expect(\"Could parse all values of 'matrix' as floats\");\n  243 |             Affine::new(\n  244 |                 vals.try_into()\n  245 |                     .expect(\"Should be six arguments to `matrix`\"),\n  246 |             )","lines":10}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"After `flush()` sets `task_sender = None` and `coarse_task_receiver = None`, calling `push_clip_path` or `pop_clip_path` (the latter is explicitly documented in render.rs as permissible while operations are still pending) triggers `flush_tasks` -> `send_pending_tasks`, which does `self.task_sender.as_mut().unwrap()` on a `None` value and panics. `run_coarse` would also unwrap a `None` receiver. Unlike `register_task` (which re-inits when `task_sender.is_none()`), the clip-path methods never re-initialize, so the documented usage pattern (push/pop clip after flush) crashes in multi-threaded mode.","fix":"Have `push_clip_path`/`pop_clip_path` re-initialize the channel when `task_sender.is_none()` (mirroring `register_task`), or make `send_pending_tasks`/`run_coarse` no-op when the sender/receiver are absent.","locations":[{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:636-656","code":"  636 |     fn push_clip_path(\n  637 |         &mut self,\n  638 |         path: &BezPath,\n  639 |         fill_rule: Fill,\n  640 |         transform: Affine,\n  641 |         aliasing_threshold: Option<u8>,\n  642 |     ) {\n  643 |         self.flush_tasks();\n  644 |         self.clip_context.push_clip(\n  645 |             path,\n  646 |             &mut self.strip_generator,\n  647 |             fill_rule,\n  648 |             transform,\n  649 |             aliasing_threshold,\n  650 |         );\n  651 |     }\n  652 | \n  653 |     fn pop_clip_path(&mut self) {\n  654 |         self.flush_tasks();\n  655 |         self.clip_context.pop_clip();\n  656 |     }","lines":21},{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:257-278","code":"  257 |     fn send_pending_tasks(&mut self) {\n  258 |         let task_idx = self.bump_task_idx();\n  259 |         let allocation_group =\n  260 |             std::mem::replace(&mut self.allocation_group, self.allocations.get());\n  261 |         let task_sender = self.task_sender.as_mut().unwrap();\n  262 |         let clip_path = self.clip_context.get().map(|c| OwnedClip {\n  263 |             strips: c.strips.into(),\n  264 |             alphas: c.alphas.into(),\n  265 |             bbox: c.bbox,\n  266 |         });\n  267 |         let task = RenderTask {\n  268 |             idx: task_idx,\n  269 |             clip_path,\n  270 |             allocation_group,\n  271 |         };\n  272 |         task_sender.send(task).unwrap();\n  273 |         // TODO: Pass encoded_paints here to enable overdraw elimination for opaque indexed\n  274 |         // paints. Currently we pass an empty slice, so indexed paints render correctly but miss\n  275 |         // the FillHint::OpaqueImage optimization. The challenge is that encoded_paints is a\n  276 |         // borrowed reference that may not be valid by the time coarse processing runs asynchronously.\n  277 |         self.run_coarse(true, &[]);\n  278 |     }","lines":22},{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:292-293","code":"  292 |     fn run_coarse(&mut self, abort_empty: bool, encoded_paints: &[EncodedPaint]) {\n  293 |         let result_receiver = self.coarse_task_receiver.as_mut().unwrap();","lines":2}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`FontDataExt::as_skrifa` calls `FontRef::from_index(...).unwrap()`, and `prepare_glyph_run` calls `.head()...unwrap()` for units_per_em. These run on caller-supplied font data; a font that parsed earlier in the pipeline but fails re-parse here (or lacks a `head` table) will panic instead of being handled gracefully. `as_skrifa` is called on every glyph run.","fix":"Propagate the error (return an empty/no-op run) or document that the font is validated before reaching this point; avoid `unwrap` on untrusted font parsing.","locations":[{"ref":"glifo/src/glyph.rs:1336-1338","code":" 1336 |     fn as_skrifa(&self) -> FontRef<'_> {\n 1337 |         FontRef::from_index(self.data.data(), self.index).unwrap()\n 1338 |     }","lines":3},{"ref":"glifo/src/glyph.rs:1538-1544","code":" 1538 |     let upem = run\n 1539 |         .font\n 1540 |         .as_skrifa()\n 1541 |         .head()\n 1542 |         .map(|h| h.units_per_em())\n 1543 |         .unwrap()\n 1544 |         .into();","lines":7}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`RowIterator::new` advances `*cur_idx` with `while input.strips[*cur_idx].strip_y() < strip_y { *cur_idx += 1; }` with no bound check. If `strip_y` is greater than every strip's `strip_y` in the slice (e.g. due to inconsistent state between the two paths in `intersect`), this walks off the end of the `strips` slice and panics with an index-out-of-bounds. The loop relies entirely on the invariant that a sentinel strip with a large enough y always exists at the tail.","fix":"Bound the loop on `*cur_idx < input.strips.len()` (or assert the sentinel invariant explicitly) so malformed input cannot cause an OOB read.","locations":[{"ref":"sparse_strips/vello_common/src/clip.rs:473-486","code":"  473 | impl<'a> RowIterator<'a> {\n  474 |     fn new(input: PathDataRef<'a>, cur_idx: &'a mut usize, strip_y: u16) -> Self {\n  475 |         // Forward the index until we have found the right strip.\n  476 |         while input.strips[*cur_idx].strip_y() < strip_y {\n  477 |             *cur_idx += 1;\n  478 |         }\n  479 | \n  480 |         Self {\n  481 |             input,\n  482 |             cur_idx,\n  483 |             strip_y,\n  484 |             on_strip: true,\n  485 |         }\n  486 |     }","lines":14}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"PreparedFilter::new panics via `unimplemented!` both when a filter graph has more than one primitive and when the single primitive is any unsupported variant (ColorMatrix, Composite, Blend, etc.). These enum variants are publicly constructible and a Filter can be built from them via FilterGraph::add, so a caller assembling a valid-looking filter and handing it to the renderer triggers a panic rather than a recoverable error.","fix":"Change PreparedFilter::new to return a Result with a descriptive error variant for unsupported/multi-primitive filters, so the renderer can skip or report instead of panicking.","locations":[{"ref":"sparse_strips/vello_common/src/filter/mod.rs:36-82","code":"   36 |     /// Build a new prepared filter for the given transform.\n   37 |     pub fn new(filter: &Filter, transform: &Affine) -> Self {\n   38 |         // Multi-primitive filter graphs are not yet implemented.\n   39 |         if filter.graph.primitives.len() != 1 {\n   40 |             unimplemented!(\"Multi-primitive filter graphs are not yet supported\");\n   41 |         }\n   42 | \n   43 |         match &filter.graph.primitives[0] {\n   44 |             FilterPrimitive::Flood { color } => {\n   45 |                 let flood = Flood::new(*color);\n   46 |                 Self::Flood(flood)\n   47 |             }\n   48 |             FilterPrimitive::GaussianBlur {\n   49 |                 std_deviation,\n   50 |                 edge_mode,\n   51 |             } => {\n   52 |                 let scaled_std_dev = transform_blur_params(*std_deviation, transform);\n   53 |                 let blur = GaussianBlur::new(scaled_std_dev, *edge_mode);\n   54 |                 Self::GaussianBlur(blur)\n   55 |             }\n   56 |             FilterPrimitive::DropShadow {\n   57 |                 dx,\n   58 |                 dy,\n   59 |                 std_deviation,\n   60 |                 color,\n   61 |                 edge_mode,\n   62 |             } => {\n   63 |                 let (scaled_dx, scaled_dy, scaled_std_dev) =\n   64 |                     transform_shadow_params(*dx, *dy, *std_deviation, transform);\n   65 |                 let drop_shadow =\n   66 |                     DropShadow::new(scaled_dx, scaled_dy, scaled_std_dev, *edge_mode, *color);\n   67 | \n   68 |                 Self::DropShadow(drop_shadow)\n   69 |             }\n   70 |             FilterPrimitive::Offset { dx, dy } => {\n   71 |                 let (scaled_dx, scaled_dy) = transform_offset_params(*dx, *dy, transform);\n   72 |                 let offset = Offset::new(scaled_dx, scaled_dy);\n   73 | \n   74 |                 Self::Offset(offset)\n   75 |             }\n   76 |             _ => {\n   77 |                 // Other primitives like Blend, ColorMatrix, ComponentTransfer, etc.\n   78 |                 // are not yet implemented\n   79 |                 unimplemented!(\"Other filter primitives not yet implemented\");\n   80 |             }\n   81 |         }\n   82 |     }","lines":47}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`RenderSettings::default()` calls `std::thread::available_parallelism().unwrap()`. `available_parallelism` returns an `Err` on platforms/sandboxes where the parallelism cannot be determined, so constructing default render settings (and therefore `RenderContext::new`) panics there. The `level` field right above correctly uses `unwrap_or`, showing the intended fallback style.","fix":"Use `available_parallelism().map(|p| p.get()).unwrap_or(1).saturating_sub(1)` or similar so a failure falls back to a sensible thread count instead of panicking.","locations":[{"ref":"sparse_strips/vello_cpu/src/render.rs:137-142","code":"  137 |             #[cfg(feature = \"multithreading\")]\n  138 |             num_threads: (std::thread::available_parallelism()\n  139 |                 .unwrap()\n  140 |                 .get()\n  141 |                 .saturating_sub(1) as u16)\n  142 |                 .min(8),","lines":6}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`process_paint` for `Paint::Indexed` does `paint_idxs.get(paint_id).copied().unwrap()` and then `encoded_paints.get(paint_id)` with `None => unimplemented!(\"Unsupported paint type\")`. Similarly `is_paint_opaque` ends with `None => unreachable!(\"Paint must be in encoded paints\")`. These are reachable panics (not debug-only) if a `Paint::Indexed` index is ever out of range relative to the renderer's `paint_idxs`/`encoded_paints` arrays. Since indices flow from scene encoding to the renderer, any desynchronization (e.g. a partially-filled `encoded_paints` slot, as happens for unbound images/external textures in `prepare_gpu_encoded_paints`) turns into a hard panic in release builds.","fix":"Convert these into returned `RenderError`s (the codebase already has a TODO to expand `RenderError`), or guarantee via type invariants that every indexed paint always has a valid encoded entry.","locations":[{"ref":"sparse_strips/vello_hybrid/src/schedule.rs:1834-1843","code":" 1834 |             Paint::Indexed(indexed_paint) => {\n 1835 |                 let paint_id = indexed_paint.index();\n 1836 |                 let paint_idx = paint_idxs.get(paint_id).copied().unwrap();\n 1837 | \n 1838 |                 match encoded_paints.get(paint_id) {\n 1839 |                     Some(e) => {\n 1840 |                         Self::process_encoded_paint(e, paint_idx, scene_strip_x, scene_strip_y)\n 1841 |                     }\n 1842 |                     None => unimplemented!(\"Unsupported paint type\"),\n 1843 |                 }","lines":10},{"ref":"sparse_strips/vello_hybrid/src/schedule.rs:1684","code":" 1684 |                     None => unreachable!(\"Paint must be in encoded paints\"),","lines":1}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Image::encode_into` calls `unimplemented!(\"Applying opacity to image commands\")` when `sampler.alpha != 1.0`. This is reachable from user-supplied paint data (an image sampler with non-unit alpha) and aborts the whole render with a panic rather than degrading gracefully. Encoding paints is on the path that processes external scene input.","fix":"Either implement alpha handling, or fall back to a defined behavior (e.g. ignore alpha / return a transparent or fallback paint) instead of `unimplemented!`, so malformed/unsupported input cannot crash the renderer.","locations":[{"ref":"sparse_strips/vello_common/src/encode.rs:495-498","code":"  495 |         if sampler.alpha != 1.0 {\n  496 |             // If the sampler alpha is not 1.0, we need to force alpha compositing.\n  497 |             unimplemented!(\"Applying opacity to image commands\");\n  498 |         }","lines":4}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"MultiAtlasManager::new calls create_atlas().expect(\"Failed to create initial atlas\") in a loop over config.initial_atlas_count. If a caller supplies a config where initial_atlas_count > max_atlases, create_atlas returns AtlasError::AtlasLimitReached and the constructor panics. This is reachable purely from public configuration values (e.g. ImageCache::new_with_config) rather than an internal invariant.","fix":"Validate that initial_atlas_count <= max_atlases (clamp or return a constructor error), instead of panicking deep inside the loop.","locations":[{"ref":"sparse_strips/vello_common/src/multi_atlas.rs:118-132","code":"  118 |     pub fn new(config: AtlasConfig) -> Self {\n  119 |         let mut manager = Self {\n  120 |             atlases: Vec::new(),\n  121 |             config,\n  122 |             round_robin_counter: 0,\n  123 |         };\n  124 | \n  125 |         for _ in 0..config.initial_atlas_count {\n  126 |             manager\n  127 |                 .create_atlas()\n  128 |                 .expect(\"Failed to create initial atlas\");\n  129 |         }\n  130 | \n  131 |         manager\n  132 |     }","lines":15}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"modify_opacity parses opacity values with `parse().unwrap_or(...)`, which is safe, but the percentage branch parses the substring before the '%' as f32 with unwrap_or(100.0); a value like `fill-opacity=\"abc%\"` silently becomes 100% (full opacity) rather than being treated as invalid. Combined with parse_color falling back to fuchsia, malformed input is silently mis-rendered rather than reported. This is a correctness/robustness issue for untrusted SVG, not a crash.","fix":"Consider treating unparyable opacity as 1.0 (no change) consistently, and document that malformed values are ignored; optionally emit an eprintln to aid debugging.","locations":[{"ref":"sparse_strips/vello_common/src/pico_svg.rs:305-321","code":"  305 | fn modify_opacity(\n  306 |     color: AlphaColor<Srgb>,\n  307 |     attr_name: &str,\n  308 |     node: Node<'_, '_>,\n  309 | ) -> AlphaColor<Srgb> {\n  310 |     if let Some(opacity) = node.attribute(attr_name) {\n  311 |         let alpha: f32 = if let Some(o) = opacity.strip_suffix('%') {\n  312 |             let pctg = o.parse().unwrap_or(100.0);\n  313 |             pctg * 0.01\n  314 |         } else {\n  315 |             opacity.parse().unwrap_or(1.0)\n  316 |         };\n  317 |         color.with_alpha(alpha.clamp(0., 1.))\n  318 |     } else {\n  319 |         color\n  320 |     }\n  321 | }","lines":17}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`render_impl` in rect.rs has a loop `while col + Tile::WIDTH <= x_end`. The TODO at line 99 asks whether `x_end == u16::MAX` can cause an infinite loop. If `x_end` were `u16::MAX`, `col + Tile::WIDTH` overflows u16 (panic in debug, wrap to a small value in release -> infinite loop). `x_end` is `right_tile_x.saturating_add(Tile::WIDTH)`, and `right_tile_x` derives from `rect_x1 as u16` which the caller is supposed to clamp to the viewport, so it is not currently reachable, but it is an unbounded-input hazard if the clamp invariant is ever violated.","fix":"Iterate using `u32` for `col`/`x_end`, or compute the column count up front and use a bounded `for` loop, eliminating the overflow/wrap risk entirely.","locations":[{"ref":"sparse_strips/vello_common/src/rect.rs:99-107","code":"   99 |             // TODO: Can this result in an infinite loop in case x_end == u16::MAX?\n  100 |             while col + Tile::WIDTH <= x_end {\n  101 |                 // TODO: We could optimize this so this is only computed for the left-most and right-most\n  102 |                 // tile of the edge, all intermediate tiles have full horizontal coverage.\n  103 |                 let x_cov = coverage(col, rect_x0, rect_x1);\n  104 |                 let combined = combined_tile_alpha(s, &x_cov, &y_cov);\n  105 |                 alpha_buf.extend_from_slice(combined.as_slice());\n  106 |                 col += Tile::WIDTH;\n  107 |             }","lines":9}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`DimensionConstraints::convert_dimension` computes `value.ceil() as i32` then `try_into::<u16>().expect(...)`. The `as i32` cast saturates, so a value above `i32::MAX` saturates to `i32::MAX` (still rejected by `try_into`), but a NaN input casts to 0 (silently accepted as dimension 0) and a negative input panics with a message (\"Dimensions are clamped into a reasonable range\") that is misleading when the caller passed a custom/raw value rather than the output of `calculate_dimensions`. The doc only promises infallibility for default-constraint outputs, but NaN passing through as 0 is a silent correctness hole.","fix":"Explicitly handle NaN/negative (e.g. `if !value.is_finite() || value < 0.0 { panic or clamp }`) before the cast, and consider returning a `Result` for the custom-constraint case rather than panicking.","locations":[{"ref":"sparse_strips/vello_hybrid/src/util.rs:81-85","code":"   81 |     pub fn convert_dimension(value: f64) -> u16 {\n   82 |         (value.ceil() as i32)\n   83 |             .try_into()\n   84 |             .expect(\"Dimensions are clamped into a reasonable range\")\n   85 |     }","lines":5}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`try_draw_colr` calls `.unwrap()` on multiple font table accessors (`font.head()` at line 672, `font.cpal()` at line 870, and `colr.paint(...).unwrap()` at line 879). These are reached only after `font.colr().is_ok() && font.cpal().is_ok()` succeeded, but `font.head()` is independent of that check: a malformed color font that has a valid `colr`+`cpal` but a missing/invalid `head` table will panic the whole renderer instead of being skipped. Untrusted font input can thus trigger a panic.","fix":"Handle the `head()`/`cpal()`/`paint()` error cases gracefully (log and skip the run, as is already done for other malformed-font cases in this function) rather than unwrapping.","locations":[{"ref":"vello/src/scene.rs:672","code":"  672 |         let upem: f32 = font.head().map(|h| h.units_per_em()).unwrap().into();","lines":1},{"ref":"vello/src/scene.rs:870","code":"  870 |                             cpal: &font.cpal().unwrap(),","lines":1},{"ref":"vello/src/scene.rs:879","code":"  879 |                     .unwrap();","lines":1}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"`Encoding::swap_last_path_tags` does `self.path_tags.swap(len - 1, len - 2)` with no length check; if called when fewer than two path tags have been encoded it underflows the index computation and panics with an out-of-bounds slice swap. All current callers (e.g. `Scene::fill`/`stroke` after `encode_shape` returned true, `draw_blurred_rounded_rect_in`) guarantee at least two tags, but the public `pub` method has no documented precondition guarding against misuse.","fix":"Document the precondition and/or debug_assert that `self.path_tags.len() >= 2` before the swap.","locations":[{"ref":"vello_encoding/src/encoding.rs:514-517","code":"  514 |     pub fn swap_last_path_tags(&mut self) {\n  515 |         let len = self.path_tags.len();\n  516 |         self.path_tags.swap(len - 1, len - 2);\n  517 |     }","lines":4}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"`insert_entry` unconditionally does `entries.insert(key, entry)` and `self.entry_count += 1`. If a key that already exists is re-inserted, `HashMap::insert` overwrites the old entry whose `image_id` is then never `deallocate`d in the ImageCache (atlas-space leak), and `entry_count` is incremented past the true number of map entries (it counts inserts, not live entries). Callers normally probe `get` first so this is an edge case (e.g. duplicate inserts within a frame, or a logic change upstream), but the function offers no protection.","fix":"Check for an existing entry before inserting; if present, deallocate the old `image_id` first, or skip the `entry_count += 1`. Alternatively assert the key is absent.","locations":[{"ref":"glifo/src/atlas/cache.rs:245-261","code":"  245 |         let entries = if key.var_coords.is_empty() {\n  246 |             &mut self.static_entries\n  247 |         } else {\n  248 |             match self\n  249 |                 .variable_entries\n  250 |                 .raw_entry_mut()\n  251 |                 .from_key(&VarLookupKey(&key.var_coords))\n  252 |             {\n  253 |                 RawEntryMut::Occupied(e) => e.into_mut(),\n  254 |                 RawEntryMut::Vacant(e) => e.insert(key.var_coords.clone(), EMPTY_GLYPH_MAP).1,\n  255 |             }\n  256 |         };\n  257 | \n  258 |         entries.insert(key, entry);\n  259 |         self.entry_count += 1;\n  260 | \n  261 |         Some(atlas_slot)","lines":17}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In `FilterContext::prepare`, each filter-layer node allocates up to four atlas images (`initial_image_id`, `dest_image_id`, and two scratch buffers) before the corresponding `FilterLayerData` is inserted into `self.filter_textures` (line 842). The allocations use `?`, so if a later allocation in the same node fails (e.g. `dest_cache.allocate` or the second `allocate_excluding`), the already-allocated images from earlier in that node are never recorded anywhere. `deallocate_all_and_clear_context` only iterates `filter_textures`, so these orphaned atlas slots are never reclaimed and persist for the lifetime of the image caches - a resource leak on the (rare) AtlasError path.","fix":"Allocate all images for a node into local variables, and on any error within the node deallocate the ones already allocated before propagating, or accumulate allocated IDs and free them in a cleanup path. Alternatively insert into `filter_textures` incrementally so the existing teardown can reclaim them.","locations":[{"ref":"sparse_strips/vello_hybrid/src/filter.rs:786-851","code":"  786 |                 let initial_image_id =\n  787 |                     self.image_cache\n  788 |                         .allocate(width, height, FILTER_ATLAS_PADDING)?;\n  789 |                 let initial_atlas_id = self.image_cache.get(initial_image_id).unwrap().atlas_id;\n  790 |                 // This represents the destination where the final _filtered_ version lives. We store this\n  791 |                 // in the same image atlas where normal images live, allowing us to treat them like normal\n  792 |                 // image fills.\n  793 |                 let dest_image_id = dest_cache.allocate(width, height, IMAGE_PADDING)?;\n  794 |                 // For multi-pass filters we need two intermediate scratch buffers for ping-pong\n  795 |                 // rendering. Each scratch must live on a different atlas texture than the other\n  796 |                 // and then the initial texture, because we cannot read and write the same texture.\n  797 |                 let scratch_image_ids = if is_multi_pass {\n  798 |                     // First scratch buffer needs to live on a different texture than the initial image.\n  799 |                     let scratch_1 = self.image_cache.allocate_excluding(\n  800 |                         width,\n  801 |                         height,\n  802 |                         FILTER_ATLAS_PADDING,\n  803 |                         Some(AtlasId(initial_atlas_id.as_u32())),\n  804 |                     )?;\n  805 |                     let scratch_1_atlas_id = self.image_cache.get(scratch_1).unwrap().atlas_id;\n  806 | \n  807 |                     // Second scratch buffer needs to live on a different texture than first scratch buffer.\n  808 |                     // Note: The second scratch buffer is allowed to live on the same atlas\n  809 |                     // as the initial image texture. See the comment in `emit_composite_to_dest`.\n  810 |                     let scratch_2 = self.image_cache.allocate_excluding(\n  811 |                         width,\n  812 |                         height,\n  813 |                         FILTER_ATLAS_PADDING,\n  814 |                         Some(AtlasId(scratch_1_atlas_id.as_u32())),\n  815 |                     )?;\n  816 |                     Some([scratch_1, scratch_2])\n  817 |                 } else {\n  818 |                     None\n  819 |                 };\n  820 | \n  821 |                 let encoded_paint = EncodedPaint::Image(EncodedImage {\n  822 |                     source: ImageSource::OpaqueId {\n  823 |                         id: dest_image_id,\n  824 |                         may_have_transparency: true,\n  825 |                     },\n  826 |                     sampler: ImageSampler::new().with_quality(ImageQuality::Low),\n  827 |                     may_have_transparency: true,\n  828 |                     // Since filter layers are always shifted to start at (0, 0) relative to\n  829 |                     // their bounding box, we need to \"unshift\" them when sampling.\n  830 |                     transform: Affine::translate((\n  831 |                         -(wtile_bbox.x0() as f64) * WideTile::WIDTH as f64,\n  832 |                         -(wtile_bbox.y0() as f64) * Tile::HEIGHT as f64,\n  833 |                     )),\n  834 |                     x_advance: Vec2::new(1.0, 0.0),\n  835 |                     y_advance: Vec2::new(0.0, 1.0),\n  836 |                     tint: None,\n  837 |                 });\n  838 | \n  839 |                 let idx = encoded_paints.len();\n  840 |                 encoded_paints.push(encoded_paint);\n  841 | \n  842 |                 self.filter_textures.insert(\n  843 |                     *layer_id,\n  844 |                     FilterLayerData {\n  845 |                         initial_image_id,\n  846 |                         dest_image_id,\n  847 |                         scratch_image_ids,\n  848 |                         paint_idx: idx as u32,\n  849 |                         bbox: *wtile_bbox,\n  850 |                     },\n  851 |                 );","lines":66},{"ref":"sparse_strips/vello_hybrid/src/filter.rs:721-736","code":"  721 |     pub(crate) fn deallocate_all_and_clear_context(&mut self, image_atlas_cache: &mut ImageCache) {\n  722 |         for filter_textures in self.filter_textures.values() {\n  723 |             self.image_cache\n  724 |                 .deallocate(filter_textures.initial_image_id);\n  725 |             image_atlas_cache.deallocate(filter_textures.dest_image_id);\n  726 |             if let Some(scratch_ids) = filter_textures.scratch_image_ids {\n  727 |                 self.image_cache.deallocate(scratch_ids[0]);\n  728 |                 self.image_cache.deallocate(scratch_ids[1]);\n  729 |             }\n  730 |         }\n  731 | \n  732 |         // Now clear everything (except for `image_cache`, where there is nothing to clear).\n  733 |         self.filters.clear();\n  734 |         self.offsets.clear();\n  735 |         self.filter_textures.clear();\n  736 |     }","lines":16}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"`should_create_new_strip` computes `strip_end < overlap_start - 1` where `overlap_start` is a `u16`. When `overlap_start == 0` (a region/overlap that starts at x=0, which is common for paths touching the left edge), `overlap_start - 1` underflows: panic in debug builds, wrap to 65535 in release builds. A wrap to 65535 makes the comparison `strip_end < 65535` almost always true, forcing creation of a new strip incorrectly and corrupting clip output near x=0.","fix":"Use a saturating/widened comparison, e.g. `(strip_end as u32) + 1 < overlap_start as u32` or `strip_end + 1 < overlap_start` after widening, avoiding the `- 1` on a u16.","locations":[{"ref":"sparse_strips/vello_common/src/clip.rs:600-611","code":"  600 | fn should_create_new_strip(\n  601 |     strip_state: &Option<StripState>,\n  602 |     alphas: &[u8],\n  603 |     overlap_start: u16,\n  604 | ) -> bool {\n  605 |     // Returns false in case we can append to the currently built strip.\n  606 |     strip_state.as_ref().is_none_or(|state| {\n  607 |         let width = ((alphas.len() as u32 - state.alpha_idx) / Tile::HEIGHT as u32) as u16;\n  608 |         let strip_end = state.x + width;\n  609 | \n  610 |         strip_end < overlap_start - 1\n  611 |     })","lines":12}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`calculate_raster_metrics` computes `width`/`height` as `i32` and casts to `u16` with `as`. For very large glyphs (large ppem or large scale factor) the dimension can exceed 65535 and silently truncate, producing a tiny/garbage atlas allocation that does not match the glyph. There is no clamp or rejection of oversized glyphs. Likewise a degenerate bbox where `x1 < x0` would make `max_x - min_x` negative and wrap to a huge u16.","fix":"Clamp/validate the i32 dimensions before casting (e.g. reject or skip caching when width/height exceed the atlas page size or u16::MAX, and guard against negative extents).","locations":[{"ref":"glifo/src/renderer.rs:546-569","code":"  546 | pub(crate) fn calculate_raster_metrics(bounds: &Rect) -> RasterMetrics {\n  547 |     // Floor/ceil round outward from the fractional bounding box. Width gets an\n  548 |     // extra pixel to accommodate the horizontal subpixel offset (up to 0.75 px)\n  549 |     // applied when rasterising into the atlas; the Y axis has no subpixel shift\n  550 |     // so floor/ceil alone is sufficient. GLYPH_PADDING in the atlas allocator\n  551 |     // provides the guard band needed by the hybrid renderer's Extend::Pad sampling.\n  552 |     let min_x = bounds.x0.floor() as i32;\n  553 |     let max_x = bounds.x1.ceil() as i32 + 1;\n  554 | \n  555 |     // For Y, we flip the coordinate system: font Y up -> screen Y down\n  556 |     // After flipping Y, min_y becomes -max_y and max_y becomes -min_y\n  557 |     let flipped_min_y = (-bounds.y1).floor() as i32;\n  558 |     let flipped_max_y = (-bounds.y0).ceil() as i32;\n  559 | \n  560 |     let width = (max_x - min_x) as u16;\n  561 |     let height = (flipped_max_y - flipped_min_y) as u16;\n  562 | \n  563 |     RasterMetrics {\n  564 |         width,\n  565 |         height,\n  566 |         bearing_x: min_x as i16,\n  567 |         bearing_y: flipped_min_y as i16,\n  568 |     }\n  569 | }","lines":24}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `Wide::generate`, `strip_width` is computed as `next_col.saturating_sub(col) as u16` from u32 alpha indices, and `x1 = x0.saturating_add(strip_width)`. The cast to u16 truncates if the strip's pixel width exceeds u16::MAX. While individual strips are normally tile-bounded, the value comes from alpha-buffer index differences (external/derived data) and the truncating cast is silent. A corrupted or unusually large alpha index difference would silently wrap the width producing wrong fills rather than a detectable error.","fix":"Add a debug_assert that `next_col - col <= u16::MAX` (and/or that it is within wide-tile bounds), or clamp explicitly with documentation instead of a bare `as u16`.","locations":[{"ref":"sparse_strips/vello_common/src/coarse.rs:557-561","code":"  557 |             let mut col = strip.alpha_idx() / u32::from(Tile::HEIGHT);\n  558 |             let next_col = next_strip.alpha_idx() / u32::from(Tile::HEIGHT);\n  559 |             // Can potentially be 0 if strip only changes winding without covering pixels\n  560 |             let strip_width = next_col.saturating_sub(col) as u16;\n  561 |             let x1 = x0.saturating_add(strip_width);","lines":5}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"DecimationSizer::upscale computes `self.width * 2` and `self.height * 2` on u16 values. While decimation depth is normally small, width/height come from layer/atlas sizes that can approach u16::MAX; `width * 2` overflows and panics in debug or wraps in release. The downscale path uses div_ceil so the stored value can be up to the original dimension, so doubling a value > 32767 overflows.","fix":"Use checked/saturating arithmetic or widen to u32 before multiplying: `((self.width as u32 * 2).min(target_w as u32)) as u16`.","locations":[{"ref":"sparse_strips/vello_common/src/filter/gaussian_blur.rs:207-213","code":"  207 |     pub fn upscale(&mut self) -> (u16, u16) {\n  208 |         let (target_w, target_h) = self.dim_stack.pop().unwrap();\n  209 |         // Clamp because upscale can exceed target on odd dimensions (e.g., 5→3→6 > 5)\n  210 |         self.width = (self.width * 2).min(target_w);\n  211 |         self.height = (self.height * 2).min(target_h);\n  212 |         (self.width, self.height)\n  213 |     }","lines":7}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In rect.rs `right_tile_x` is computed as `(rect_x1 as u16 / Tile::WIDTH) * Tile::WIDTH`. `rect_x1` is an `f64` cast directly to `u16`; if the rect was not clamped to the viewport (the doc only says it 'should' be), a large or negative `rect_x1` saturates/truncates in surprising ways. A negative `rect_x1` casts to 0; a value > 65535 saturates to 65535. The function trusts the caller's clamp invariant with no debug assertion, so a mis-clamped rect silently produces wrong geometry rather than failing loudly.","fix":"Add a debug_assert that the rect is within `[0, u16::MAX]` bounds, or clamp explicitly inside `render_impl` so the function is robust to its inputs.","locations":[{"ref":"sparse_strips/vello_common/src/rect.rs:54-67","code":"   54 |     let px_x0 = rect_x0.floor() as u16;\n   55 |     let px_y0 = rect_y0.floor() as u16;\n   56 |     let px_y1 = rect_y1.ceil() as u16;\n   57 | \n   58 |     let left_tile_x = (px_x0 / Tile::WIDTH) * Tile::WIDTH;\n   59 |     // Inclusive, so don't use `ceil` here but just `rect_x1` directly.\n   60 |     let right_tile_x = (rect_x1 as u16 / Tile::WIDTH) * Tile::WIDTH;\n   61 | \n   62 |     let y0 = (px_y0 / Tile::HEIGHT) * Tile::HEIGHT;\n   63 |     // Note: y1 is exclusive, but it's gonna break for the very last tile if we have a height of u16::MAX.\n   64 |     let y1 = (px_y1.saturating_add(Tile::HEIGHT - 1) / Tile::HEIGHT) * Tile::HEIGHT;\n   65 |     // Include one tile past the right edge so the right-edge tile column is\n   66 |     // covered by the edge-row wide-strip loop.\n   67 |     let x_end = right_tile_x.saturating_add(Tile::WIDTH);","lines":14}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`push_clear_rect_for_slot` does u16 arithmetic: `slot.x - GLYPH_PADDING`, `slot.y - GLYPH_PADDING`, `slot.width + 2*GLYPH_PADDING`, `slot.height + 2*GLYPH_PADDING`. The subtractions assume `slot.x >= GLYPH_PADDING` (true for normally-allocated slots), and the additions assume width/height + padding fit in u16. Both hold for valid slots, but in debug builds a malformed/oversized slot would panic, and in release would wrap silently. No defensive bound.","fix":"Use `saturating_sub`/`saturating_add` (or compute in u32 then clamp) so a malformed slot cannot underflow/overflow the clear rect.","locations":[{"ref":"glifo/src/atlas/cache.rs:439-447","code":"  439 | fn push_clear_rect_for_slot(pending: &mut Vec<PendingClearRect>, slot: &AtlasSlot) {\n  440 |     pending.push(PendingClearRect {\n  441 |         page_index: slot.page_index,\n  442 |         x: slot.x - GLYPH_PADDING,\n  443 |         y: slot.y - GLYPH_PADDING,\n  444 |         width: slot.width + 2 * GLYPH_PADDING,\n  445 |         height: slot.height + 2 * GLYPH_PADDING,\n  446 |     });\n  447 | }","lines":9}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`Tile::prev_loc` computes `self.x + 1` which overflows (panics in debug builds) when `self.x == u16::MAX`. In practice regular tiles are clamped by `new_clamped` to `u16::MAX/WIDTH`, and the `same_row` short-circuit guards most sentinel cases, so this is not currently reachable, but it is a latent footgun if a non-clamped tile with x near u16::MAX is ever constructed via `Tile::new`.","fix":"Use `self.x.checked_add(1) == Some(other.x)` or `self.same_row(other) && other.x > self.x && other.x - self.x == 1`.","locations":[{"ref":"sparse_strips/vello_common/src/tile.rs:303-305","code":"  303 |     pub const fn prev_loc(&self, other: &Self) -> bool {\n  304 |         self.same_row(other) && self.x + 1 == other.x\n  305 |     }","lines":3}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `make_tiles_analytic_aa_impl`, `push_row_extents` computes `x_end = (row_right_x as u16).min(tile_columns - 1)` using `tile_columns - 1` (plain subtraction), whereas the MSAA path and the culled branch use `tile_columns.saturating_sub(1)`. If `tile_columns == 0` this underflows. `tile_columns` is `width.div_ceil(Tile::WIDTH)` and the function early-returns when `width == 0`, so `tile_columns >= 1` here and it is not currently reachable, but it is inconsistent with the saturating form used elsewhere and is fragile.","fix":"Use `tile_columns.saturating_sub(1)` for consistency and defense in depth.","locations":[{"ref":"sparse_strips/vello_common/src/tile.rs:715-716","code":"  715 |                             let x_start = row_left_x as u16;\n  716 |                             let x_end = (row_right_x as u16).min(tile_columns - 1);","lines":2}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`task_idx` (u32) is incremented on every `send_pending_tasks` via `bump_task_idx` with no wraparound handling, and it is cast `as usize` when used as the ordered-channel sequence number in the worker (`result_sender.send(task_idx as usize, task)`). For an extremely long-lived, never-reset context this wraps at 2^32, breaking the ordered-channel sequencing (out-of-order/duplicate sequence) and silently corrupting draw order. On a 32-bit target the `as usize` is also a no-widening cast so wrap happens at exactly the same point.","fix":"Document/assert the 2^32 task limit, or use a u64 sequence for the ordered channel, or reset/checkpoint `task_idx` periodically.","locations":[{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:251-255","code":"  251 |     fn bump_task_idx(&mut self) -> u32 {\n  252 |         let idx = self.task_idx;\n  253 |         self.task_idx += 1;\n  254 |         idx\n  255 |     }","lines":5},{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded/worker.rs:198","code":"  198 |         result_sender.send(task_idx as usize, task).unwrap();","lines":1}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `process_layer_tile`, the zero-clip branch computes `cmd_idx = filtered_ranges.full_range.end - 1`. If `full_range.end` were ever 0 this would underflow (panic in debug, wrap in release, leading to an out-of-bounds slice/loop). In practice `full_range` is constructed with `end = cmds.len()+1` so it is always >= 1, but the subtraction relies on an invariant that is not asserted here and is fragile to future changes in `coarse.rs`.","fix":"Use `filtered_ranges.full_range.end.saturating_sub(1)` or add a debug assertion documenting that `full_range.end >= 1`.","locations":[{"ref":"sparse_strips/vello_cpu/src/dispatch/single_threaded.rs:342-348","code":"  342 |                     Some(Cmd::PushZeroClip(id)) if *id == *child_layer_id => {\n  343 |                         // If we have a zero-clip, it means that the whole layer should not be drawn.\n  344 |                         // Therefore, we want to skip to the very end so that only `PopBuf` will\n  345 |                         // be run. Therefore, we jump to `filtered_ranges.full_range.end - 1`.\n  346 |                         cmd_idx = filtered_ranges.full_range.end - 1;\n  347 |                         continue;\n  348 |                     }","lines":7}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"When packing image dimensions, `(brush.image.width << 16) | (brush.image.height & 0xFFFF)` left-shifts the full 32-bit `width` by 16. If `width` exceeds 65535 the high bits are shifted out / overlap nothing useful and the packed value is corrupted, while `height` is correctly masked to 16 bits. Image widths above 65535 will therefore encode wrong dimensions into `DrawImage.width_height`. There is no validation that image dimensions fit in 16 bits.","fix":"Mask width as well, e.g. `((brush.image.width & 0xFFFF) << 16) | (brush.image.height & 0xFFFF)`, and/or assert/clamp that width and height are <= 0xFFFF when encoding an image brush.","locations":[{"ref":"vello_encoding/src/encoding.rs:453","code":"  453 |                 width_height: (brush.image.width << 16) | (brush.image.height & 0xFFFF),","lines":1}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`cached_count` is a `usize` decremented with `self.cached_count -= 1` inside the `retain` closures during pruning. The increment (in `get_or_insert`) and decrements (in `maintain`) are spread across two methods and rely on every map entry being counted exactly once. If that invariant is ever broken (e.g. an entry is overwritten/inserted twice, or a future change adds another removal path) this subtraction underflows and panics in debug or wraps in release, corrupting the prune heuristic. A saturating/derived count (e.g. `self.map.len() + sum(var_map lengths)`) would be more robust.","fix":"Derive `cached_count` from the map sizes when needed instead of maintaining it manually, or use `saturating_sub(1)` and reconcile it during `maintain`.","locations":[{"ref":"vello_encoding/src/glyph_cache.rs:118","code":"  118 |                 self.cached_count -= 1;","lines":1},{"ref":"vello_encoding/src/glyph_cache.rs:130","code":"  130 |                     self.cached_count -= 1;","lines":1},{"ref":"vello_encoding/src/glyph_cache.rs:237","code":"  237 |         *self.cached_count += 1;","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Filter::from_function maps `FilterFunction::Blur { radius }` directly to `GaussianBlur { std_deviation: radius }`. The doc comments repeatedly stress that the CSS `radius` is actually the standard deviation, so this is intentional, but `bounds_expansion`/`expansion_rect` then treat std_deviation as 3*sigma extent. Any caller that interprets the CSS `blur(r)` radius as a visual radius (the conventional CSS meaning is also sigma, so this is correct) - the real risk is the unimplemented `_ => unimplemented!()` arm: calling from_function with any non-Blur variant panics. This is a hard panic reachable from a public constructor.","fix":"Return a Result or clearly document that from_function panics for unimplemented functions; avoid `unimplemented!` in a public API that takes a runtime-chosen enum.","locations":[{"ref":"sparse_strips/vello_common/src/filter_effects.rs:76-87","code":"   76 |     pub fn from_function(function: FilterFunction) -> Self {\n   77 |         // Convert function to primitive\n   78 |         let primitive = match function {\n   79 |             FilterFunction::Blur { radius } => FilterPrimitive::GaussianBlur {\n   80 |                 std_deviation: radius,\n   81 |                 edge_mode: EdgeMode::default(),\n   82 |             },\n   83 |             _ => unimplemented!(\"Filter function {:?} not supported\", function),\n   84 |         };\n   85 | \n   86 |         Self::from_primitive(primitive)\n   87 |     }","lines":12}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the quadratic Bézier culling, the early-out branches are mutually exclusive `if / else if / else`, but the first branch (`MoveTo(p2)`) only emits a MoveTo without updating `last_pt` inside the branch (it is updated after). That is fine, but the bigger issue is the structure: when a curve is fully right/top/bottom (first branch) it emits a `MoveTo(p2)` which breaks the subpath, yet a curve that is fully left (second branch) emits a `LineTo`. These two conditions are checked in separate branches with `else if`, so a curve that is BOTH fully-left AND tolerance-collapsible is handled, but a curve fully to the right is short-circuited before the left/tolerance check. This matches the cubic logic, so the structure is intentional; however note the comment block at lines 132-151 describes the cubic derivation (3/4, 16/9) inside the QUADRATIC branch is correct (1/2, 4*TOL_2) - verify the quad branch comment is not copy-pasted incorrectly. The numbers used (4.*TOL_2) are correct for the quad case.","fix":"Confirm the quad-branch derivation comment matches the quad math; no code change if intentional. Consider documenting that the right/top/bottom branch deliberately discards exact shape via MoveTo.","locations":[{"ref":"sparse_strips/vello_common/src/flatten_simd.rs:119-170","code":"  119 |             PathEl::QuadTo(p1, p2) => {\n  120 |                 let p0 = last_pt;\n  121 |                 let line = Line::new(p0, p2);\n  122 |                 // If the quadratic Bézier is fully to the right, top, or bottom of the culling\n  123 |                 // bbox, it does not impact pixel coverage or winding. We can ignore it. The\n  124 |                 // following checks that conservatively by checking whether the bounding box of the\n  125 |                 // Bézier's control points is fully outside the culling bbox.\n  126 |                 if [p0, p1, p2].into_iter().all(|p| p.x > right)\n  127 |                     || [p0, p1, p2].into_iter().all(|p| p.y < top)\n  128 |                     || [p0, p1, p2].into_iter().all(|p| p.y > bottom)\n  129 |                 {\n  130 |                     callback.callback(LinePathEl::MoveTo(p2));\n  131 |                 }\n  132 |                 // The following checks two things. First, if the quadratic Bézier is fully to the\n  133 |                 // left of the culling bbox, it may affect pixel coverage and winding, but its\n  134 |                 // exact shape does not matter. It can be emitted as a line segment [p0, p2].\n  135 |                 //\n  136 |                 // Second, an upper bound on the shortest distance of any point on the quadratic\n  137 |                 // Bézier curve to the line segment [p0, p2] is 1/2 of the control-point-to-line-segment\n  138 |                 // distance.\n  139 |                 //\n  140 |                 // The derivation is similar to that for the cubic Bézier (see below). In\n  141 |                 // short:\n  142 |                 //\n  143 |                 // q(t) = B0(t) p0 + B1(t) p1 + B2(t) p2\n  144 |                 // dist(q(t), [p0, p1]) <= B1(t) dist(p1, [p0, p1])\n  145 |                 //                       = 2 (1-t)t dist(p1, [p0, p1]).\n  146 |                 //\n  147 |                 // The maximum occurs at t=1/2, hence\n  148 |                 // max(dist(q(t), [p0, p1] <= 1/2 dist(p1, [p0, p1])).\n  149 |                 //\n  150 |                 // The following takes the square to elide the square root of the Euclidean\n  151 |                 // distance.\n  152 |                 else if [p0, p1, p2].into_iter().all(|p| p.x < left)\n  153 |                     || line.nearest(p1, 0.).distance_sq <= 4. * TOL_2\n  154 |                 {\n  155 |                     callback.callback(LinePathEl::LineTo(p2));\n  156 |                 } else {\n  157 |                     let q = QuadBez::new(p0, p1, p2);\n  158 |                     let params = q.estimate_subdiv(SQRT_TOL);\n  159 |                     let n = ((0.5 / SQRT_TOL * params.val).ceil() as usize).max(1);\n  160 |                     let step = 1.0 / (n as f64);\n  161 |                     for i in 1..n {\n  162 |                         let u = (i as f64) * step;\n  163 |                         let t = q.determine_subdiv_t(&params, u);\n  164 |                         let p = q.eval(t);\n  165 |                         callback.callback(LinePathEl::LineTo(p));\n  166 |                     }\n  167 |                     callback.callback(LinePathEl::LineTo(p2));\n  168 |                 }\n  169 |                 last_pt = p2;\n  170 |             }","lines":52}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The NaN handling in `fill_impl` detects NaN only at MoveTo/LineTo callback points (FlattenerCallback sets `is_nan` from the post-affine endpoints). Curve control points that are NaN but get culled, or intermediate flattened points produced from NaN inputs, may already have caused `flatten_cubic_simd`/`estimate_num_quads` to compute `n` from NaN/inf (e.g. `(0.5 * sum / sqrt_tol).ceil() as usize`), where `NaN as usize == 0` and `inf as usize == usize::MAX`. A huge `n` triggers a `Vec::resize` of `n + 4` Point32 (potential OOM / very large allocation) before the NaN is ever observed by the callback. So NaN in curve coordinates can cause an enormous allocation prior to the post-hoc NaN check.","fix":"Guard `n` against non-finite values before resizing (e.g. clamp/bail if `!sum.is_finite()`), or check the cubic control points for NaN/inf before flattening, instead of relying only on the endpoint check after flattening.","locations":[{"ref":"sparse_strips/vello_common/src/flatten_simd.rs:587-598","code":"  587 | fn flatten_cubic_simd<S: Simd>(simd: S, c: CubicBez, ctx: &mut FlattenCtx) -> usize {\n  588 |     let n_quads = estimate_num_quads(c, TOL as f32);\n  589 |     eval_cubics_simd(simd, &c, n_quads, ctx);\n  590 |     let tol = (TOL as f32) * (1.0 - TO_QUAD_TOL);\n  591 |     let sqrt_tol = tol.sqrt();\n  592 |     estimate_subdiv_simd(simd, sqrt_tol, ctx);\n  593 |     let sum: f32 = ctx.val[..n_quads].iter().sum();\n  594 |     let n = ((0.5 * sum / sqrt_tol).ceil() as usize).max(1);\n  595 |     let target_len = n + 4;\n  596 |     if target_len > ctx.flattened_cubics.len() {\n  597 |         ctx.flattened_cubics.resize(target_len, Point32::default());\n  598 |     }","lines":12},{"ref":"sparse_strips/vello_common/src/flatten.rs:211-216","code":"  211 |     // A path that contains NaN is ill-defined, so ignore it.\n  212 |     if lb.is_nan {\n  213 |         warn!(\"A path contains NaN, ignoring it.\");\n  214 | \n  215 |         line_buf.clear();\n  216 |     }","lines":6}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In strip.rs `render_impl`, the debug_assert at lines 309-313 computes `(prev_tile.x as u32 + 1) * Tile::WIDTH as u32 - strip.x as u32`. If `prev_tile` is somehow the SENTINEL (x = u16::MAX) this is a huge multiply that can overflow u32 (panic in debug). The loop chains `[Tile::SENTINEL]` so the final iteration sets `tile` to the sentinel, but `prev_tile` at that point is the last real tile, so this is normally safe. However the assertion is only validating the non-sentinel path and silently relies on prev_tile never being the sentinel; combined with the captive/culled paths that set `prev_tile = Tile::SENTINEL` (line 197) when the tile buffer is empty, the empty-but-culled case must `return` before reaching this assert (it does at line 222-224), which is a non-obvious coupling.","fix":"Add a debug_assert!(!prev_tile.is_sentinel()) before the arithmetic, or perform the width check using the actual column count rather than reconstructing it from prev_tile.x, to make the invariant explicit.","locations":[{"ref":"sparse_strips/vello_common/src/strip.rs:308-314","code":"  308 |         if !prev_tile.same_loc(&tile) && !prev_tile.prev_loc(&tile) {\n  309 |             debug_assert_eq!(\n  310 |                 (prev_tile.x as u32 + 1) * Tile::WIDTH as u32 - strip.x as u32,\n  311 |                 ((alpha_buf.len() - strip.alpha_idx() as usize) / usize::from(Tile::HEIGHT)) as u32,\n  312 |                 \"The number of columns written to the alpha buffer should equal the number of columns spanned by this strip.\"\n  313 |             );\n  314 |             strip_buf.push(strip);","lines":7}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the single-tile fast paths, x is clamped with `(line_left_x as u16).min(tile_columns + 1)`, allowing a tile x of `tile_columns` or `tile_columns + 1`, i.e. one or two columns PAST the last valid column index (`tile_columns - 1`). Everywhere else in this function the clamp is `tile_columns.saturating_sub(1)`. A line fully contained in a single tile at the far right could thus emit a tile at an out-of-range column, which downstream code multiplies by `Tile::WIDTH` for the strip x. `tile_columns + 1` can also overflow u16 if width is near u16::MAX. Both the analytic-AA and MSAA paths share this bug.","fix":"Replace `.min(tile_columns + 1)` with `.min(tile_columns.saturating_sub(1))` to match the rest of the function and avoid emitting out-of-range / overflowing column indices.","locations":[{"ref":"sparse_strips/vello_common/src/tile.rs:904-909","code":"  904 |                 let tile = Tile::new_clamped(\n  905 |                     (line_left_x as u16).min(tile_columns + 1),\n  906 |                     y_top_tiles,\n  907 |                     line_idx,\n  908 |                     ((f32::from(y_top_tiles) >= line_top_y) as u32) << WINDING_SHIFT,\n  909 |                 );","lines":6},{"ref":"sparse_strips/vello_common/src/tile.rs:1265-1270","code":" 1265 |                 let tile = Tile::new_clamped(\n 1266 |                     (line_left_x as u16).min(tile_columns + 1),\n 1267 |                     y_top_tiles,\n 1268 |                     line_idx,\n 1269 |                     ((f32::from(y_top_tiles) >= line_top_y) as u32) << WINDING_SHIFT,\n 1270 |                 );","lines":6}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`estimate_path_cost` applies the path-length contribution with `cost += cost * (path_length / 1024.0)` (line 77), where `cost` already includes the curve-multiplied term. Because the multiplier is applied to the running `cost` rather than a fixed base, longer paths scale the *entire* cost (including the 2.5x curve weighting) multiplicatively. The doc comment claims path length should only apply 'a very small fractional value' that grows slower than render time, but for a path with length ~1024px the cost is effectively doubled, and it grows without bound for long paths - contradicting the stated intent and skewing batch sizing for large geometry.","fix":"Clamp or saturate the length factor (e.g. `cost += base_cost * (path_length / SCALE).min(K)`), and/or apply it to a fixed base rather than the running total, so length cannot unboundedly dominate the estimate.","locations":[{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded/cost.rs:75-79","code":"   75 |     let mut cost = cost_data.num_line_segments as f32;\n   76 |     cost += cost_data.num_curve_segments as f32 * CURVE_MULTIPLIER;\n   77 |     cost += cost * (cost_data.path_length as f32 / 1024.0);\n   78 | \n   79 |     cost *= if is_stroke { STROKE_MULTIPLIER } else { 1.0 };","lines":5}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Out-of-bounds mask sampling defaults are inconsistent between the layer-mask command path and the blend-mode mask path. In `Cmd::Mask` (mod.rs), samples outside the mask bounds default to `0` (fully transparent). In both the lowp and highp `blend()` mask iterators, out-of-bounds samples default to `255` (fully opaque). A region larger than the mask therefore behaves opposite ways depending on whether the mask is applied as a standalone Mask command or as part of a non-default blend. At least one of these is likely wrong; the divergence should be made deliberate and documented, since it silently changes coverage at mask edges.","fix":"Decide on the correct out-of-bounds behavior (transparent vs opaque) for samples beyond the mask extent and use the same default in all three code paths; add a comment explaining the chosen convention.","locations":[{"ref":"sparse_strips/vello_cpu/src/fine/mod.rs:615-637","code":"  615 |                     macro_rules! sample {\n  616 |                         ($idx:expr) => {\n  617 |                             if x_in_range && (y[$idx] as u16) < m.height() {\n  618 |                                 m.sample(x, y[$idx] as u16)\n  619 |                             } else {\n  620 |                                 0\n  621 |                             }\n  622 |                         };\n  623 |                     }\n  624 | \n  625 |                     let s1 = sample!(0);\n  626 |                     let s2 = sample!(1);\n  627 |                     let s3 = sample!(2);\n  628 |                     let s4 = sample!(3);\n  629 | \n  630 |                     let samples = u8x16::from_slice(\n  631 |                         self.simd,\n  632 |                         &[\n  633 |                             s1, s1, s1, s1, s2, s2, s2, s2, s3, s3, s3, s3, s4, s4, s4, s4,\n  634 |                         ],\n  635 |                     );\n  636 |                     T::NumericVec::from_u8(self.simd, samples)\n  637 |                 });","lines":23},{"ref":"sparse_strips/vello_cpu/src/fine/lowp/mod.rs:296-319","code":"  296 |                 let sample = |x: u16, y: u16| {\n  297 |                     if x < m.width() && y < m.height() {\n  298 |                         m.sample(x, y)\n  299 |                     } else {\n  300 |                         255\n  301 |                     }\n  302 |                 };\n  303 | \n  304 |                 let samples = [\n  305 |                     sample(start_x, start_y),\n  306 |                     sample(start_x, start_y + 1),\n  307 |                     sample(start_x, start_y + 2),\n  308 |                     sample(start_x, start_y + 3),\n  309 |                     sample(start_x + 1, start_y),\n  310 |                     sample(start_x + 1, start_y + 1),\n  311 |                     sample(start_x + 1, start_y + 2),\n  312 |                     sample(start_x + 1, start_y + 3),\n  313 |                 ];\n  314 | \n  315 |                 start_x += 2;\n  316 | \n  317 |                 Some(samples)\n  318 |             })\n  319 |         });","lines":24},{"ref":"sparse_strips/vello_cpu/src/fine/highp/mod.rs:259-302","code":"  259 |         let mask_iter = mask.map(|m| {\n  260 |             let width = m.width();\n  261 |             let height = m.height();\n  262 | \n  263 |             core::iter::from_fn(move || {\n  264 |                 let samples = if start_x < width && start_y + 3 < height {\n  265 |                     // All in bounds, sample directly\n  266 |                     [\n  267 |                         m.sample(start_x, start_y),\n  268 |                         m.sample(start_x, start_y + 1),\n  269 |                         m.sample(start_x, start_y + 2),\n  270 |                         m.sample(start_x, start_y + 3),\n  271 |                     ]\n  272 |                 } else {\n  273 |                     // Fallback: check each individually\n  274 |                     [\n  275 |                         if start_x < width && start_y < height {\n  276 |                             m.sample(start_x, start_y)\n  277 |                         } else {\n  278 |                             255\n  279 |                         },\n  280 |                         if start_x < width && start_y + 1 < height {\n  281 |                             m.sample(start_x, start_y + 1)\n  282 |                         } else {\n  283 |                             255\n  284 |                         },\n  285 |                         if start_x < width && start_y + 2 < height {\n  286 |                             m.sample(start_x, start_y + 2)\n  287 |                         } else {\n  288 |                             255\n  289 |                         },\n  290 |                         if start_x < width && start_y + 3 < height {\n  291 |                             m.sample(start_x, start_y + 3)\n  292 |                         } else {\n  293 |                             255\n  294 |                         },\n  295 |                     ]\n  296 |                 };\n  297 | \n  298 |                 start_x += 1;\n  299 | \n  300 |                 Some(samples)\n  301 |             })\n  302 |         });","lines":44}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`render_to_buffer` takes `width`/`height` parameters and asserts only that `buffer.len() == width*height*4`. It does NOT verify that the passed `width`/`height` match `self.width`/`self.height` (the dimensions the `Wide` grid and all queued commands were built for). The dispatcher's `rasteri
