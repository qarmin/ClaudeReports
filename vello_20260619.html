ze` then iterates regions based on these passed dimensions while reading from `self.wide` sized for `self.width`/`self.height`. Passing a mismatched width/height (e.g. via `render_to_pixmap` with a pixmap of a different size) produces wrong output or out-of-bounds tile lookups rather than a clear error. `render_to_pixmap` simply forwards the pixmap's own dimensions with no check against the context size.","fix":"Assert `width == self.width && height == self.height` in `render_to_buffer` (or remove the redundant parameters entirely and use `self.width`/`self.height`).","locations":[{"ref":"sparse_strips/vello_cpu/src/render.rs:626-662","code":"  626 |     pub fn render_to_buffer(\n  627 |         &self,\n  628 |         resources: &mut Resources,\n  629 |         buffer: &mut [u8],\n  630 |         width: u16,\n  631 |         height: u16,\n  632 |         render_mode: RenderMode,\n  633 |     ) {\n  634 |         // TODO: Maybe we should move those checks into the dispatcher.\n  635 |         let wide = self.dispatcher.wide();\n  636 |         assert!(!wide.has_layers(), \"some layers haven't been popped yet\");\n  637 |         assert_eq!(\n  638 |             buffer.len(),\n  639 |             (width as usize) * (height as usize) * 4,\n  640 |             \"provided width ({}) and height ({}) do not match buffer size ({})\",\n  641 |             width,\n  642 |             height,\n  643 |             buffer.len(),\n  644 |         );\n  645 | \n  646 |         resources.before_render();\n  647 | \n  648 |         self.dispatcher.rasterize(\n  649 |             buffer,\n  650 |             render_mode,\n  651 |             width,\n  652 |             height,\n  653 |             &self.encoded_paints,\n  654 |             &resources.image_registry,\n  655 |         );\n  656 |         // TODO: We need to figure something out here API-wise. At the moment, the user can\n  657 |         // theoretically rasterize the same `RenderContext` multiple times without resetting in-between.\n  658 |         // However, if glyph caching is enabled, this method call could now evict that were previously\n  659 |         // assumed to exist in `RenderContext`, meaning that if the user rasterizes the same `RenderContext`\n  660 |         // again without resetting it, some of the cached glyphs might be stale and not exist anymore.\n  661 |         resources.after_render();\n  662 |     }","lines":37},{"ref":"sparse_strips/vello_cpu/src/render.rs:664-675","code":"  664 |     /// Render the current context into a pixmap.\n  665 |     pub fn render_to_pixmap(&self, resources: &mut Resources, pixmap: &mut Pixmap) {\n  666 |         let width = pixmap.width();\n  667 |         let height = pixmap.height();\n  668 |         self.render_to_buffer(\n  669 |             resources,\n  670 |             pixmap.data_as_u8_slice_mut(),\n  671 |             width,\n  672 |             height,\n  673 |             self.render_settings.render_mode,\n  674 |         );\n  675 |     }","lines":12}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`FilterInstanceData::scissor_rect` computes `x1 = (x + width + padding).min(target_size[0])` and returns width `x1 - x`. This is correct only while `x <= target_size[0]`. If a destination offset `x` (or `y`) ever equals or exceeds the target dimension (possible if an atlas/target is smaller than an offset due to a sizing mismatch), `x1` saturates to `target_size[0] < x`, and `x1 - x` underflows, panicking in debug or producing a huge `u32` width in release that drives an invalid scissor rect. There is no clamp on `x`/`y` themselves.","fix":"Clamp `x`/`y` to `target_size` first (e.g. `let x = self.dest.offset.0[0].min(target_size[0]);`) so the subtraction can never underflow, or use `saturating_sub` for the width/height.","locations":[{"ref":"sparse_strips/vello_hybrid/src/filter.rs:428-441","code":"  428 |         let x = self.dest.offset.0[0];\n  429 |         let y = self.dest.offset.0[1];\n  430 |         let width = self.dest.size.0[0];\n  431 |         let height = self.dest.size.0[1];\n  432 |         let padding = u32::from(FILTER_ATLAS_PADDING);\n  433 |         let x1 = x\n  434 |             .saturating_add(width)\n  435 |             .saturating_add(padding)\n  436 |             .min(target_size[0]);\n  437 |         let y1 = y\n  438 |             .saturating_add(height)\n  439 |             .saturating_add(padding)\n  440 |             .min(target_size[1]);\n  441 |         [x, y, x1 - x, y1 - y]","lines":14}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`do_alpha_fill` computes `el.get_draw_texture(depth)` where `depth = stack.len()`, but `get_draw_texture(buffer_depth)` treats `buffer_depth > 1` as 'render to a slot' and `buffer_depth <= 1` as 'render to surface (texture 2)'. Meanwhile the GPU-strip builder uses a separate condition `if depth == 1 { at_surface } else { at_slot }`. These two conditions (`> 1` in `get_draw_texture` vs `== 1` in the builder) must always agree; they do today because `depth` is identical, but the duplicated/non-shared branch logic between `get_draw_texture` and the inline builder choice in both `do_alpha_fill` and `do_fill_with` is fragile and an easy place to introduce an off-by-one (slot index 2 vs a real slot) that would corrupt rendering or write into the wrong texture.","fix":"Derive both the draw target texture and the strip builder placement from a single helper to guarantee the surface-vs-slot decision can never diverge.","locations":[{"ref":"sparse_strips/vello_hybrid/src/schedule.rs:1550-1576","code":" 1550 |         let depth = state.tile_state.stack.len();\n 1551 |         let depth_index = self.depth.next(false);\n 1552 | \n 1553 |         let el = state.tile_state.stack.last_mut().unwrap();\n 1554 |         let draw = self.draw_mut(el.round, el.get_draw_texture(depth));\n 1555 | \n 1556 |         let fill_attrs = &attrs.fill[cmd.attrs_idx as usize];\n 1557 |         let alpha_idx = fill_attrs.alpha_idx(cmd.alpha_offset);\n 1558 |         let col_idx = alpha_idx / u32::from(Tile::HEIGHT);\n 1559 |         let (scene_strip_x, scene_strip_y) = (wide_tile_x + cmd.x, wide_tile_y);\n 1560 |         let processed = Self::process_paint(\n 1561 |             &fill_attrs.paint,\n 1562 |             encoded_paints,\n 1563 |             (scene_strip_x, scene_strip_y),\n 1564 |             paint_idxs,\n 1565 |         );\n 1566 | \n 1567 |         let gpu_strip_builder = if depth == 1 {\n 1568 |             GpuStripBuilder::at_surface(scene_strip_x, scene_strip_y, cmd.width)\n 1569 |         } else {\n 1570 |             let slot_idx = if let TemporarySlot::Valid(temp_slot) = el.temporary_slot {\n 1571 |                 temp_slot.get_idx()\n 1572 |             } else {\n 1573 |                 el.dest_slot.get_idx()\n 1574 |             };\n 1575 |             GpuStripBuilder::at_slot(slot_idx, cmd.x, cmd.width)\n 1576 |         };","lines":27},{"ref":"sparse_strips/vello_hybrid/src/schedule.rs:1638-1652","code":" 1638 |         let depth = state.tile_state.stack.len();\n 1639 | \n 1640 |         let el = state.tile_state.stack.last_mut().unwrap();\n 1641 |         let draw = self.draw_mut(el.round, el.get_draw_texture(depth));\n 1642 | \n 1643 |         let gpu_strip_builder = if depth == 1 {\n 1644 |             GpuStripBuilder::at_surface(scene_strip_x, scene_strip_y, cmd.width)\n 1645 |         } else {\n 1646 |             let slot_idx = if let TemporarySlot::Valid(temp_slot) = el.temporary_slot {\n 1647 |                 temp_slot.get_idx()\n 1648 |             } else {\n 1649 |                 el.dest_slot.get_idx()\n 1650 |             };\n 1651 |             GpuStripBuilder::at_slot(slot_idx, cmd.x, cmd.width)\n 1652 |         };","lines":15},{"ref":"sparse_strips/vello_hybrid/src/schedule.rs:484-496","code":"  484 |     fn get_draw_texture(&self, buffer_depth: usize) -> usize {\n  485 |         if buffer_depth > 1 {\n  486 |             if let TemporarySlot::Valid(temp_slot) = self.temporary_slot {\n  487 |                 temp_slot.get_texture()\n  488 |             } else {\n  489 |                 self.dest_slot.get_texture()\n  490 |             }\n  491 |         } else {\n  492 |             // Surface texture identifier\n  493 |             2\n  494 |         }\n  495 |     }\n  496 | }","lines":13}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`draw_monoid_buf` is freed via `recording.free_resource` at line 419 (right after the `binning` dispatch), but it is then still used by the `coarse` dispatch at line 476 and freed a second time at line 506. This only happens to work because `WgpuEngine::run_recording` defers all `FreeBuffer` commands into a `HashSet` that is processed after the whole command buffer is submitted, so the premature free is a no-op and the double-free is deduplicated. It is a latent footgun: the recording describes a use-after-free, and any change to make freeing eager (or any reordering/streaming execution) would break rendering. The first free is also simply misplaced.","fix":"Remove the premature `recording.free_resource(draw_monoid_buf)` at line 419 and keep only the free at line 506 (after the `coarse` dispatch that consumes it).","locations":[{"ref":"vello/src/render.rs:419","code":"  419 |         recording.free_resource(draw_monoid_buf);","lines":1},{"ref":"vello/src/render.rs:476","code":"  476 |                 draw_monoid_buf,","lines":1},{"ref":"vello/src/render.rs:506","code":"  506 |         recording.free_resource(draw_monoid_buf);","lines":1}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`convert_stops` removes superfluous trailing stops at offset 1.0 via `stops.get(stops.len() - 2)`. When `stops.len()` is 1, `stops.len() - 2` underflows usize; `.get` is used so it returns None rather than panicking, so it is safe today only because `get` tolerates the wrapped index. This relies on `slice::get` saturating on an absurd index and is fragile/unclear. (After padding, len is normally >= 2, but the single-stop padding branches may not both fire.)","fix":"Guard with `while stops.len() >= 2` and index `stops.len() - 2` only then, making the intent explicit and avoiding reliance on usize-wrap + `get` returning None.","locations":[{"ref":"glifo/src/colr.rs:163-169","code":"  163 |         while let Some(stop) = stops.get(stops.len() - 2).map(|s| s.offset) {\n  164 |             if (stop - 1.0).is_nearly_zero() {\n  165 |                 stops.remove(stops.len() - 2);\n  166 |             } else {\n  167 |                 break;\n  168 |             }\n  169 |         }","lines":7}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`GlyphCacheKey` for bitmap glyphs keys on `bitmap_ppem` (the strike's ppem) rather than the requested draw `font_size`, and stores `size_bits = bitmap_ppem.to_bits()`. Two different requested font sizes that both select the same bitmap strike share one cache entry (correct for the bitmap pixels), but the cached `AtlasSlot` is rendered via the per-glyph `transform` which does encode the requested size — so this is fine for the bitmap itself. However the COLR/bitmap branches are only reached after the speculative outline-cache probe; for a font where the same glyph id is both an outline-cached entry and a bitmap, the speculative outline key (size_bits = font_size) and the bitmap key (size_bits = ppem, subpixel = SUBPIXEL_BITMAP) differ, so no collision. Verify intent: caching bitmaps by ppem means re-rasterisation is skipped across sizes, which is the goal, so confirm this is desired rather than keying by requested size.","fix":"Confirm and document that bitmap entries are intentionally keyed by strike ppem (shared across requested sizes). If per-size atlas entries are ever needed (e.g. to bake scale into the bitmap), key on the requested font size instead.","locations":[{"ref":"glifo/src/glyph.rs:519-534","code":"  519 |                 let cache_key = colr_bitmap_cache_enabled.then(|| GlyphCacheKey {\n  520 |                     font_id,\n  521 |                     font_index,\n  522 |                     glyph_id: glyph.id,\n  523 |                     size_bits: bitmap_ppem.to_bits(),\n  524 |                     hinted: false,\n  525 |                     subpixel_x: SUBPIXEL_BITMAP,\n  526 |                     context_color: BLACK,\n  527 |                     context_color_packed: BLACK_PACKED,\n  528 |                     embolden_x_bits: 0,\n  529 |                     embolden_y_bits: 0,\n  530 |                     embolden_join_bits: join_bits(Join::Miter),\n  531 |                     embolden_miter_limit_bits: 4.0_f32.to_bits(),\n  532 |                     embolden_tolerance_bits: 0.1_f32.to_bits(),\n  533 |                     var_coords: SmallVec::new(),\n  534 |                 });","lines":16}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`OutlineCache::maintain` decrements `cached_count` with `-= 1` (not saturating) inside the retain closures. `cached_count` is a plain usize incremented only on insert. The accounting looks balanced today, but unlike `GlyphAtlas` (which uses `saturating_sub`), any future divergence (double prune, count desync) would underflow to a huge usize in release or panic in debug, then force pruning every frame via the `CACHED_COUNT_THRESHOLD` check.","fix":"Use `cached_count = cached_count.saturating_sub(1)` for consistency and robustness, matching `GlyphAtlas::evict_old_entries`.","locations":[{"ref":"glifo/src/glyph.rs:1786","code":" 1786 |                 self.cached_count -= 1;","lines":1},{"ref":"glifo/src/glyph.rs:1800","code":" 1800 |                     self.cached_count -= 1;","lines":1}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`quality_for_scale` inspects only the diagonal coefficients `a` and `d` of the transform to decide downscale quality. For a transform with rotation/skew (off-diagonal terms), the effective scale is not captured by `a`/`d` alone, so a rotated downscaled glyph may be judged as not needing High quality and alias. Cached glyphs reject skewed transforms upstream, but the uncached bitmap path (`render_uncached_bitmap_glyph`) and direct draws can still pass skewed transforms here.","fix":"Derive the per-axis scale from the full linear part (e.g. column lengths via `x_y_advances`) rather than `a`/`d` directly when deciding sampling quality.","locations":[{"ref":"glifo/src/renderer.rs:576-583","code":"  576 | pub fn quality_for_scale(transform: &Affine) -> ImageQuality {\n  577 |     let [a, _, _, d, _, _] = transform.as_coeffs();\n  578 |     if a < 0.5 || d < 0.5 {\n  579 |         ImageQuality::High\n  580 |     } else {\n  581 |         ImageQuality::Medium\n  582 |     }\n  583 | }","lines":8}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Sweep gradient validation has a redundant/overlapping pair of checks: `degenerate_val(start_angle, end_angle)` (returns fallback if nearly equal) followed by `end_angle <= start_angle` (returns fallback if not strictly increasing). The first check is fully subsumed by/redundant with the second for the equal case, and the `degenerate_val` threshold (1e-6) can reject valid very-narrow sweeps that the `<=` check would accept. The two checks express slightly different intents which is confusing.","fix":"Keep a single clear condition: reject only when `end_angle <= start_angle` (and optionally a documented minimum delta), removing the overlapping `degenerate_val` check or merging them with a comment explaining the threshold.","locations":[{"ref":"sparse_strips/vello_common/src/encode.rs:316-329","code":"  316 |         GradientKind::Sweep(SweepGradientPosition {\n  317 |             start_angle,\n  318 |             end_angle,\n  319 |             ..\n  320 |         }) => {\n  321 |             // The end angle must be larger than the start angle.\n  322 |             if degenerate_val(*start_angle, *end_angle) {\n  323 |                 return first;\n  324 |             }\n  325 | \n  326 |             if end_angle <= start_angle {\n  327 |                 return first;\n  328 |             }\n  329 |         }","lines":14}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`u8::from_f32` converts premultiplied f32 color to u8 via `color * 255.0 + 0.5` then `as u8`. The `as u8` is a saturating-free truncating cast: a value slightly above 255.0 (e.g. from accumulated float error before the `.min(1.0)` clamp upstream is bypassed for any path) truncates by wrapping the float-to-int conversion. In Rust `f32 as u8` actually saturates for out-of-range floats, so this is safe, but values are silently floored rather than rounded for negatives. Low impact; the upstream clamp to [0,1] normally guards this.","fix":"No functional fix required given upstream clamping; consider a debug_assert that inputs are in [0,1] to document the invariant, or use a rounding helper for clarity.","locations":[{"ref":"sparse_strips/vello_common/src/encode.rs:996-1006","code":"  996 |     fn from_f32<S: Simd>(mut color: f32x4<S>) -> [Self; 4] {\n  997 |         let simd = color.simd;\n  998 |         color = color.mul_add(f32x4::splat(simd, 255.0), f32x4::splat(simd, 0.5));\n  999 | \n 1000 |         [\n 1001 |             color[0] as Self,\n 1002 |             color[1] as Self,\n 1003 |             color[2] as Self,\n 1004 |             color[3] as Self,\n 1005 |         ]\n 1006 |     }","lines":11}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"plan_decimated_blur's loop `while remaining_variance > 4.0 { remaining_variance = (remaining_variance - 3.0) * 0.25; ... }`. For variance just above 4.0 (e.g. 4.0001), one step yields (1.0001)*0.25 = 0.25, dropping sigma far below the 2.0 boundary the comment targets, so the effective applied blur after the kernel can undershoot. More importantly there is no guard that `remaining_variance - 3.0` stays positive for inputs in (3.0, 4.0]; it does here because the loop only runs for variance>4, but the magic constants (3.0 added variance, 0.25 scale) are tightly coupled to the [1,3,3,1] kernel assumption and undocumented as an invariant that MAX_KERNEL_SIZE depends on.","fix":"Add a debug_assert after the loop that `remaining_variance.sqrt()` yields a kernel size <= MAX_KERNEL_SIZE, documenting the coupling between the 3.0/0.25 constants and MAX_KERNEL_SIZE so a future tweak cannot silently overflow the fixed-size kernel array.","locations":[{"ref":"sparse_strips/vello_common/src/filter/gaussian_blur.rs:107-126","code":"  107 |     let variance = std_deviation * std_deviation;\n  108 |     let mut n_decimations = 0;\n  109 |     let mut remaining_variance = variance;\n  110 | \n  111 |     // Each decimation step:\n  112 |     // 1. Applies [1,3,3,1] blur which adds variance = 0.75 per axis\n  113 |     // 2. Downsamples by 2× per axis, adding variance = 0.75 × 4 = 3.0 total\n  114 |     // 3. The 2× downsampling scales the remaining variance by 0.25 (= 1/2²)\n  115 |     // Stop when remaining variance ≤ 4.0 (σ ≈ 2), as further decimation isn't beneficial.\n  116 |     while remaining_variance > 4.0 {\n  117 |         remaining_variance = (remaining_variance - 3.0) * 0.25;\n  118 |         n_decimations += 1;\n  119 |     }\n  120 |     // Compute the reduced standard deviation to apply at the decimated resolution\n  121 |     let remaining_sigma = remaining_variance.sqrt();\n  122 |     // Compute Gaussian kernel for the reduced blur\n  123 |     let (kernel, kernel_size) = compute_gaussian_kernel(remaining_sigma);\n  124 | \n  125 |     (n_decimations, kernel, kernel_size)\n  126 | }","lines":20}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"compute_gaussian_kernel computes `radius = ceil(3*std_deviation)` then `kernel_size = (1 + radius*2).min(MAX_KERNEL_SIZE)`. When called with a large sigma (the function is `pub`), the size is silently clamped to 13 while the Gaussian weights are still computed for the true (wider) distribution, yielding a truncated, re-normalized kernel that does not match the requested blur. The internal decimation path keeps sigma <= 2 so it is safe, but a direct caller gets a silently wrong result with no error.","fix":"Either document that callers must pass sigma <= 2.0, debug_assert that the unclamped size fits, or clamp sigma itself so the produced kernel remains a faithful (if capped) Gaussian.","locations":[{"ref":"sparse_strips/vello_common/src/filter/gaussian_blur.rs:133-161","code":"  133 | pub fn compute_gaussian_kernel(std_deviation: f32) -> ([f32; MAX_KERNEL_SIZE], u8) {\n  134 |     // Use radius = 3σ to capture 99.7% of the Gaussian distribution.\n  135 |     // Beyond ±3σ, the Gaussian values are negligible (<0.3%).\n  136 |     let radius = (3.0 * std_deviation).ceil() as usize;\n  137 |     let kernel_size = (1 + radius * 2).min(MAX_KERNEL_SIZE) as u8;\n  138 | \n  139 |     let mut kernel = [0.0; MAX_KERNEL_SIZE];\n  140 |     // Compute Gaussian weights using the formula: G(x) = exp(-x² / (2σ²))\n  141 |     // This creates a symmetric bell curve centered at the middle of the kernel.\n  142 |     let gaussian_denominator = 2.0 * std_deviation * std_deviation;\n  143 |     let mut sum = 0.0;\n  144 |     let kernel_center = (kernel_size / 2) as f32;\n  145 |     for (i, weight) in kernel.iter_mut().enumerate().take(usize::from(kernel_size)) {\n  146 |         // Compute distance from center (0 at center, increases outward)\n  147 |         let x = (i as f32) - kernel_center;\n  148 |         // Apply Gaussian formula: weight decreases exponentially with squared distance\n  149 |         *weight = E.powf(-x * x / gaussian_denominator);\n  150 |         sum += *weight;\n  151 |     }\n  152 | \n  153 |     // Normalize weights to sum to 1.0, ensuring the blur doesn't change overall brightness.\n  154 |     // Without normalization, blurring a uniform gray area could make it brighter/darker.\n  155 |     let scale = 1.0 / sum;\n  156 |     for weight in kernel.iter_mut().take(usize::from(kernel_size)) {\n  157 |         *weight *= scale;\n  158 |     }\n  159 | \n  160 |     (kernel, kernel_size)\n  161 | }","lines":29}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`RectU16::union` is documented (lines 88-90) such that 'The union of `self` with a [`Self::INVERTED`] returns `self`', but `union` takes `&mut self` and returns `()`, so it does not 'return' anything. The doc wording is misleading about the API shape. More importantly, union of an arbitrary `self` with `INVERTED` only yields `self` when `self` is non-empty/normalized; for `self == ZERO`, the result min(0, MAX)=0, max(0,0)=0 stays ZERO, which is fine, but the prose 'returns self' for a mutating method is confusing.","fix":"Reword the doc comment to describe the in-place mutation, e.g. 'Unioning with `INVERTED` leaves `self` unchanged.'","locations":[{"ref":"sparse_strips/vello_common/src/geometry.rs:88-97","code":"   88 |     /// Expand this rectangle to also cover `other` (union in place).\n   89 |     ///\n   90 |     /// The union of `self` with a [`Self::INVERTED`] returns `self`.\n   91 |     #[inline(always)]\n   92 |     pub const fn union(&mut self, other: Self) {\n   93 |         self.x0 = const_min(self.x0, other.x0);\n   94 |         self.y0 = const_min(self.y0, other.y0);\n   95 |         self.x1 = const_max(self.x1, other.x1);\n   96 |         self.y1 = const_max(self.y1, other.y1);\n   97 |     }","lines":10}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"allocate_best_fit selects atlases by comparing free *area* (`total_area - allocated_area`) against `width*height`. Because the backend is a guillotine allocator, sufficient total free area does not imply a single free rectangle of the requested size, and area is a poor proxy for 'best fit'. It happens to be saved by the first-fit fallback, but the strategy can repeatedly pick an atlas that then fails to allocate, doing wasted work, and 'best fit' does not actually minimize wasted rectangle space.","fix":"Query the allocator for an actual fitting free rectangle (or attempt the allocation and keep the best successful one), rather than ranking by free area.","locations":[{"ref":"sparse_strips/vello_common/src/multi_atlas.rs:228-264","code":"  228 |     fn allocate_best_fit(\n  229 |         &mut self,\n  230 |         width: u32,\n  231 |         height: u32,\n  232 |         exclude_atlas_id: Option<AtlasId>,\n  233 |     ) -> Result<AtlasAllocation, AtlasError> {\n  234 |         let mut best_atlas_idx = None;\n  235 |         let mut best_remaining_space = u32::MAX;\n  236 | \n  237 |         // Find the atlas with the least remaining space that can fit the image\n  238 |         for (idx, atlas) in self.atlases.iter().enumerate() {\n  239 |             if Some(atlas.id) == exclude_atlas_id {\n  240 |                 continue;\n  241 |             }\n  242 | \n  243 |             let stats = atlas.stats();\n  244 |             let remaining_space = stats.total_area - stats.allocated_area;\n  245 | \n  246 |             if remaining_space >= width * height && remaining_space < best_remaining_space {\n  247 |                 best_remaining_space = remaining_space;\n  248 |                 best_atlas_idx = Some(idx);\n  249 |             }\n  250 |         }\n  251 | \n  252 |         if let Some(idx) = best_atlas_idx {\n  253 |             let atlas = &mut self.atlases[idx];\n  254 |             if let Some(allocation) = atlas.allocate(width, height) {\n  255 |                 return Ok(AtlasAllocation {\n  256 |                     atlas_id: atlas.id,\n  257 |                     allocation,\n  258 |                 });\n  259 |             }\n  260 |         }\n  261 | \n  262 |         // Fallback to first-fit if best-fit didn't work\n  263 |         self.allocate_first_fit(width, height, exclude_atlas_id)\n  264 |     }","lines":37}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In allocate_round_robin's auto-grow branch, after creating a new atlas and allocating into it, the round-robin counter is set to `self.atlases.len() - 1` (the index of the just-used new atlas) instead of `self.atlases.len() % self.atlases.len()` (the next atlas). This makes the next allocation start again at the atlas that was just (partially) filled, breaking the round-robin distribution invariant right after growth.","fix":"Set `self.round_robin_counter = self.atlases.len() % self.atlases.len()` (i.e. 0, wrapping past the new last atlas) to advance past the newly used atlas, consistent with the non-grow branch which stores `(idx + 1) % len`.","locations":[{"ref":"sparse_strips/vello_common/src/multi_atlas.rs:334-345","code":"  334 |         // Try creating a new atlas if auto-grow is enabled\n  335 |         if self.config.auto_grow {\n  336 |             let atlas_id = self.create_atlas()?;\n  337 |             let atlas = self.atlases.last_mut().unwrap();\n  338 |             if let Some(allocation) = atlas.allocate(width, height) {\n  339 |                 self.round_robin_counter = self.atlases.len() - 1;\n  340 |                 return Ok(AtlasAllocation {\n  341 |                     atlas_id,\n  342 |                     allocation,\n  343 |                 });\n  344 |             }\n  345 |         }","lines":12}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `paint.rs::from_peniko_image_data`, alpha premultiplication uses `(alpha * component) / 255` with integer truncation (round-toward-zero) rather than rounding (`+ 127` or `* 257 >> 16`). This produces a consistent downward bias of up to ~1/255 in premultiplied channels for every non-opaque pixel, slightly darkening images compared to a rounded multiply. Other places in this codebase (e.g. luminance mask, u8::from_f32) explicitly add 0.5 for rounding, so this is inconsistent.","fix":"Use a rounding premultiply, e.g. `((alpha * component + 127) / 255) as u8` or the `(x * 257 + 257) >> 16` trick, for consistency and accuracy.","locations":[{"ref":"sparse_strips/vello_common/src/paint.rs:151-159","code":"  151 |                 let alpha = u16::from(rgba[3]);\n  152 |                 let multiply = |component| ((alpha * u16::from(component)) / 255) as u8;\n  153 |                 if do_alpha_multiply {\n  154 |                     PremulRgba8 {\n  155 |                         r: multiply(rgba[0]),\n  156 |                         g: multiply(rgba[1]),\n  157 |                         b: multiply(rgba[2]),\n  158 |                         a: rgba[3],\n  159 |                     }","lines":9}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Pixmap::resize only sets `may_have_transparency = true` when the buffer grows (new_len > buf.len()). When shrinking, the flag is left unchanged, which is conservative (true stays true). But growing from a buffer that previously was fully opaque correctly flips it to true; the subtle issue is that when new_len == buf.len() (same total pixel count, different w/h) the flag is left as-is, which is correct only because no new pixels are added. This is acceptable, but the width/height are updated before potential truncation semantics and the doc says reserved capacity is unchanged on shrink - consistent. No fix strictly required; flagged as a place where the staleness contract is subtle.","fix":"Optionally document that resize never clears may_have_transparency (only sets it), so callers know shrinking does not re-tighten the flag.","locations":[{"ref":"sparse_strips/vello_common/src/pixmap.rs:100-109","code":"  100 |     pub fn resize(&mut self, width: u16, height: u16) {\n  101 |         let new_len = usize::from(width) * usize::from(height);\n  102 |         // If we're growing, new pixels are transparent black\n  103 |         if new_len > self.buf.len() {\n  104 |             self.may_have_transparency = true;\n  105 |         }\n  106 |         self.width = width;\n  107 |         self.height = height;\n  108 |         self.buf.resize(new_len, PremulRgba8::from_u32(0));\n  109 |     }","lines":10}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`MaybePresent::take` asserts `present == true`, sets `present = false`, and takes the value. `rasterize_with` calls `self.alpha_storage.take()` then `self.alpha_storage.init(...)` to restore it. If `rasterize` panics between `take` and `init` (e.g. inside the rayon `install`/`update_regions_par` closure), `alpha_storage` is left permanently in the not-present state, so every subsequent `take`/`with_inner` panics with 'Tried to access MaybePresent before initialization' - the dispatcher becomes permanently unusable rather than recovering. There is no RAII guard ensuring the value is put back on unwind.","fix":"Restore `alpha_storage` via a drop guard (RAII) so an unwind during rasterization still returns the slots, keeping the dispatcher recoverable.","locations":[{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:361-408","code":"  361 |     fn rasterize_with<S: Simd, F: FineKernel<S>>(\n  362 |         &self,\n  363 |         simd: S,\n  364 |         buffer: md, alphas, encoded_paints, image_resolver, &wide.attrs);","lines":10}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`compose_shadow_direct` clamps the shadow's *alpha* to <= 1.0 via `.min(1.0)`, but the shadow RGB components (`color.components[0..2] * 255.0`) are not clamped before `round() as u8`. For wide-gamut / extended-range colors with components > 1.0 this silently saturates to 255 via the float->int cast rather than being handled deliberately, and the premultiply uses plain integer `/ 255` (truncating) instead of rounded division, introducing a small bias.","fix":"Clamp color components to [0,1] before converting to u8, and consider using the project's rounded div-by-255 (see util::scalar::div_255) for premultiplication to avoid truncation bias.","locations":[{"ref":"sparse_strips/vello_cpu/src/filter/drop_shadow.rs:99-114","code":"   99 |     let shadow_r = (color.components[0] * 255.0).round() as u8;\n  100 |     let shadow_g = (color.components[1] * 255.0).round() as u8;\n  101 |     let shadow_b = (color.components[2] * 255.0).round() as u8;\n  102 | \n  103 |     for y in 0..height {\n  104 |         for x in 0..width {\n  105 |             // Sample alpha directly (shadow is already offset)\n  106 |             let alpha = shadow.sample(x, y).a;\n  107 | \n  108 |             // Apply shadow color to alpha\n  109 |             let shadow_alpha = (u8_to_norm(alpha) * color.components[3]).min(1.0);\n  110 |             let final_alpha = norm_to_u8(shadow_alpha);\n  111 | \n  112 |             // Premultiply RGB by alpha as required by PremulRgba8\n  113 |             let alpha_u16 = u16::from(final_alpha);\n  114 |             let premultiply = |channel: u8| ((u16::from(channel) * alpha_u16) / 255) as u8;","lines":16}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`composite_to_pixmap_at_offset` is documented to clip when the region extends beyond the pixmap bounds, but it passes `dst_x`/`dst_y` straight into `Regions::new_at_offset` with no validation that `dst_x < dst_buffer_width` / `dst_y < dst_buffer_height`. If the offset is fully outside the destination, correctness depends entirely on `Regions::new_at_offset` handling it; there is no guard or documented contract here, and an offset >= buffer size silently produces no output rather than an error.","fix":"Validate or document the offset bounds (assert offsets are within the destination, or explicitly note that out-of-bounds offsets are clamped to no-op).","locations":[{"ref":"sparse_strips/vello_cpu/src/render.rs:694-715","code":"  694 |     pub fn composite_to_pixmap_at_offset(\n  695 |         &self,\n  696 |         resources: &Resources,\n  697 |         pixmap: &mut Pixmap,\n  698 |         dst_x: u16,\n  699 |         dst_y: u16,\n  700 |     ) {\n  701 |         let dst_buffer_width = pixmap.width();\n  702 |         let dst_buffer_height = pixmap.height();\n  703 |         self.dispatcher.composite_at_offset(\n  704 |             pixmap.data_as_u8_slice_mut(),\n  705 |             self.width,\n  706 |             self.height,\n  707 |             dst_x,\n  708 |             dst_y,\n  709 |             dst_buffer_width,\n  710 |             dst_buffer_height,\n  711 |             self.render_settings.render_mode,\n  712 |             &self.encoded_paints,\n  713 |             &resources.image_registry,\n  714 |         );\n  715 |     }","lines":22}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `GradientRampCache::compact_luts`, LUT offset adjustment relies on `partition_point(|(_, r)| r.lut_start < ramp.lut_start)`. When width-zero ramps exist (an empty gradient LUT), multiple removed ramps can share the same `lut_start`, and a kept ramp can share a `lut_start` with a removed one. The strict `<` comparison then counts only the removed ramps strictly befo te the gradient texture size if needed.\n 2265 |     fn maybe_resize_gradient_tex(\n 2266 |         &mut self,\n 2267 |         device: &Device,\n 2268 |         max_texture_dimension_2d: u32,\n 2269 |         gradient_cache: &GradientRampCache,\n 2270 |     ) {\n 2271 |         let gradient_pixels = (gradient_cache.luts_size() / 4) as u32; // 4 bytes per RGBA8 pixel\n 2272 |         let required_gradient_height = gradient_pixels.div_ceil(max_texture_dimension_2d);\n 2273 |         debug_assert!(\n 2274 |             self.resources.gradient_texture.width() == max_texture_dimension_2d,\n 2275 |             \"Gradient texture width must match max texture dimensions\"\n 2276 |         );\n 2277 |         let current_gradient_height = self.resources.gradient_texture.height();\n 2278 |         if required_gradient_height > current_gradient_height {\n 2279 |             assert!(\n 2280 |                 required_gradient_height <= max_texture_dimension_2d,\n 2281 |                 \"Gradient texture height exceeds max texture dimensions\"\n 2282 |             );\n 2283 |             let gradient_texture = Self::create_gradient_texture(\n 2284 |                 device,\n 2285 |                 max_texture_dimension_2d,\n 2286 |                 required_gradient_height,\n 2287 |             );\n 2288 |             self.resources.gradient_texture = gradient_texture;\n 2289 | \n 2290 |             // Since the gradient texture has changed, we need to update the gradient bind group.\n 2291 |             self.resources.gradient_bind_group = Self::create_gradient_bind_group(\n 2292 |                 device,\n 2293 |                 &self.gradient_bind_group_layout,\n 2294 |                 &self\n 2295 |                     .resources\n 2296 |                     .gradient_texture\n 2297 |                     .create_view(&TextureViewDescriptor::default()),\n 2298 |             );\n 2299 |         }\n 2300 |     }","lines":37},{"ref":"sparse_strips/vello_hybrid/src/render/webgl. ies on `paint_bg = start_offset == 0` to avoid double-painting; the interaction is subtle and worth a regression test.","fix":"Add a test asserting tiles are not re-processed after their final BatchEnd, and consider storing `end + 1` without clamping (using the `>` guard) to make the terminal condition unambiguous.","locations":[{"ref":"sparse_strips/vello_hybrid/src/schedule.rs:924-975","code":"  924 |         for row in 0..rows {\n  925 |             for col in 0..cols {\n  926 |                 let idx = (row * cols + col) as usize;\n  927 |                 let tile = wide.get(col, row);\n  928 |                 let start_offset = cmd_offsets[idx];\n  929 | \n  930 |                 // Note that we are explicitly checking > instead of >=.\n  931 |                 // The reason is that it can happen the tile has no commands but still has a background,\n  932 |                 // in which case we still need to do the painting of the background\n  933 |                 if start_offset > tile.cmds.len() {\n  934 |                     continue;\n  935 |                 }\n  936 | \n  937 |                 let tile_x = col * WideTile::WIDTH;\n  938 |                 let tile_y = row * Tile::HEIGHT;\n  939 | \n  940 |                 // We only must paint the background if we are processing the wide tile for the\n  941 |                 // first time (i.e. the start offset is 0).\n  942 |                 let paint_bg = start_offset == 0;\n  943 | \n  944 |                 state.tile_state.clear();\n  945 | \n  946 |                 // This will also paint the background, if necessary.\n  947 |                 self.initialize_tile_state(\n  948 |                     &mut state.tile_state,\n  949 |                     tile,\n  950 |                     tile_x,\n  951 |                     tile_y,\n  952 |                     state.max_round,\n  953 |                     encoded_paints,\n  954 |                     paint_idxs,\n  955 |                     paint_bg,\n  956 |                 );\n  957 |                 let end = self.do_tile(\n  958 |                     state,\n  959 |                     renderer,\n  960 |                     encoded_paints,\n  961 |                     tile_x,\n  962 |                     tile_y,\n  963 |                     tile,\n  964 |                     start_offset..tile.cmds.len(),\n  965 |                     tile.surface_is_blend_target(),\n  966 |                     paint_idxs,\n  967 |                     &wide.attrs,\n  968 |                     filter_context,\n  969 |                 )?;\n  970 | \n  971 |                 // Advance past the `BatchEnd` marker (if present).\n  972 |                 cmd_offsets[idx] = (end + 1).min(tile.cmds.len());\n  973 | \n  974 |                 state.max_round = state.max_round.max(state.tile_state.stack[0].round);\n  975 |             }","lines":52}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`RampCache::add` reuses a slot only when `*epoch + 2 < self.epoch`. `maintain` increments `epoch` by 1 per resolve and `add` stamps entries with the current epoch. When the cache is full (RETAINED_COUNT entries) and no entry is older than 2 epochs, the else-branch falls through to allocating a brand new slot via `self.data.extend(...)`, growing `data` unboundedly past `RETAINED_COUNT * N_SAMPLES` until the next `maintain` truncation. Between maintains, a frame that introduces many (>RETAINED_COUNT) distinct gradients all freshly used can grow `data` without bound, and `ramps()` reports `height = data.len()/N_SAMPLES` which can exceed RETAINED_COUNT, uploading an oversized gradient texture.","fix":"Bound growth in the full-cache fallback (e.g. evict the least-recently-used entry unconditionally rather than only when older than 2 epochs), or document and cap the gradient texture height.","locations":[{"ref":"vello_encoding/src/ramp_cache.rs:81-107","code":"   81 |         } else {\n   82 |             let mut reuse = None;\n   83 |             for (stops, (id, epoch)) in &self.map {\n   84 |                 if *epoch + 2 < self.epoch {\n   85 |                     reuse = Some((stops.to_owned(), *id));\n   86 |                     break;\n   87 |                 }\n   88 |             }\n   89 |             if let Some((old_stops, id)) = reuse {\n   90 |                 self.map.remove(&old_stops);\n   91 |                 let start = id as usize * N_SAMPLES;\n   92 |                 for (dst, src) in self.data[start..start + N_SAMPLES]\n   93 |                     .iter_mut()\n   94 |                     .zip(make_ramp(stops, interpolation_alpha_space))\n   95 |                 {\n   96 |                     *dst = src;\n   97 |                 }\n   98 |                 self.map.insert(key, (id, self.epoch));\n   99 |                 id\n  100 |             } else {\n  101 |                 let id = (self.data.len() / N_SAMPLES) as u32;\n  102 |                 self.data\n  103 |                     .extend(make_ramp(stops, interpolation_alpha_space));\n  104 |                 self.map.insert(key, (id, self.epoch));\n  105 |                 id\n  106 |             }\n  107 |         }","lines":27}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `Resolver::resolve`, the image-allocation-failure branch writes 8 zero bytes (`[0_u8; 8]`) and advances `pos = *draw_data_offset + 2`, i.e. it overwrites both the `xy` and `width_height` u32 words of the encoded `DrawImage`. The success branch writes only the `xy` word and advances by 1. The comment says it zeroes 'the dimensions so we don't attempt to render anything', but the encoded layout of `DrawImage` is `{xy, width_height, sample_alpha}` - this zeroes `xy` and `width_height` (correct) yet the asymmetry between advancing by 1 vs 2 is subtle and entirely dependent on the in-memory field order matching this assumption. A reorder of `DrawImage` fields would silently corrupt the draw stream.","fix":"Add a comment/assert tying the `+2` advance and 8-byte zero to `DrawImage`'s `xy`+`width_height` layout, or zero by explicitly constructing a `DrawImage` with zero dimensions to make the dependency explicit.","locations":[{"ref":"vello_encoding/src/resolve.rs:301-312","code":"  301 |                         if let Some((x, y)) = self.pending_images[*index].xy {\n  302 |                             let xy = (x << 16) | y;\n  303 |                             data.extend_from_slice(bytemuck::bytes_of(&xy));\n  304 |                             pos = *draw_data_offset + 1;\n  305 |                         } else {\n  306 |                             // If we get here, we failed to allocate a slot for this image in the atlas.\n  307 |                             // In this case, let's zero out the dimensions so we don't attempt to render\n  308 |                             // anything.\n  309 |                             // TODO: a better strategy: texture array? downsample large images?\n  310 |                             data.extend_from_slice(&[0_u8; 8]);\n  311 |                             pos = *draw_data_offset + 2;\n  312 |                         }","lines":12}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"`test_interpolation_symmetry` asserts `(a - b).abs() <= 0`, which is equivalent to `== 0` but written in a misleading way that suggests a tolerance is intended. The `<= 0` reads as a no-op tolerance and obscures that an exact-equality check is wanted.","fix":"Replace the four `assert!((... ).abs() <= 0)` with `assert_eq!(r1.r, r2.r)` etc. for clarity.","locations":[{"ref":"sparse_strips/vello_cpu/src/filter/gaussian_blur.rs:730-733","code":"  730 |         assert!((r1.r as i32 - r2.r as i32).abs() <= 0);\n  731 |         assert!((r1.g as i32 - r2.g as i32).abs() <= 0);\n  732 |         assert!((r1.b as i32 - r2.b as i32).abs() <= 0);\n  733 |         assert!((r1.a as i32 - r2.a as i32).abs() <= 0);","lines":4}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In the filtered (bilinear/bicubic) image painter, the `extend_x!` macro extends x sample positions using `self.data.image.sampler.y_extend` instead of `x_extend`. It correctly passes the x bounds (`width`, `width_inv`) but the wrong extend MODE, so when an image's horizontal extend differs from its vertical extend (e.g. Repeat horizontally, Pad vertically), horizontal wrapping/reflection is computed with the vertical mode. This produces visibly wrong image edges for the entire high-precision (f32) filtered image path. The low-precision `BilinearImagePainter` in lowp/image.rs gets this right (uses `x_extend`), confirming the highp macro is a copy-paste mistake. No panic results because every `extend` mode still clamps the final result to `width-1`.","fix":"Change the extend mode argument in the `extend_x!` macro from `self.data.image.sampler.y_extend` to `self.data.image.sampler.x_extend`.","locations":[{"ref":"sparse_strips/vello_cpu/src/fine/common/image.rs:212-222","code":"  212 |         macro_rules! extend_x {\n  213 |             ($idx:expr,$offsets:expr) => {\n  214 |                 extend(\n  215 |                     self.simd,\n  216 |                     x_positions + $offsets[$idx],\n  217 |                     self.data.image.sampler.y_extend,\n  218 |                     self.data.width,\n  219 |                     self.data.width_inv,\n  220 |                 )\n  221 |             };\n  222 |         }","lines":11}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"ImageCache::deallocate calls `self.atlas_manager.deallocate(...).unwrap()`. If the stored atlas_id no longer maps to an existing atlas (AtlasError::AtlasNotFound), this panics. Although atlases currently only grow, this couples a public API's panic-safety to an internal invariant; any future change allowing atlas removal, or a corrupted/stale ImageResource, turns a recoverable error into a crash.","fix":"Handle the Result instead of unwrapping: log/ignore the error, or change deallocate to propagate it. At minimum use `.expect` with a message documenting the invariant.","locations":[{"ref":"sparse_strips/vello_common/src/image_cache.rs:151-171","code":"  151 |     pub fn deallocate(&mut self, id: ImageId) -> Option<ImageResource> {\n  152 |         let index = id.as_u32() as usize;\n  153 |         if let Some(image_resource) = self.slots.get_mut(index).and_then(Option::take) {\n  154 |             // Deallocate from the appropriate atlas\n  155 |             let padded_width = image_resource.width as u32 + u32::from(image_resource.padding) * 2;\n  156 |             let padded_height =\n  157 |                 image_resource.height as u32 + u32::from(image_resource.padding) * 2;\n  158 |             self.atlas_manager\n  159 |                 .deallocate(\n  160 |                     image_resource.atlas_id,\n  161 |                     image_resource.atlas_alloc_id,\n  162 |                     padded_width,\n  163 |                     padded_height,\n  164 |                 )\n  165 |                 .unwrap();\n  166 |             self.free_idxs.push(index);\n  167 |             Some(image_resource)\n  168 |         } else {\n  169 |             None\n  170 |         }\n  171 |     }","lines":21}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Worker threads run inside `thread_pool.spawn_broadcast`. If `worker.run_render_task` panics (e.g. a slice index out of range from a corrupted `path_range`, or `result_sender.send(...).unwrap()` failing because the main thread's receiver was dropped early), the panic is confined to the rayon worker thread and the broadcast closure terminates. The main thread's `run_coarse` then blocks/spins on `coarse_task_receiver` expecting tasks that will never come, or only sees `Disconnected` after the worker exits - there is no propagation of the worker panic to the caller, so failures manifest as a hang or silent missing output rather than a clear error. `task_sender.send(task).unwrap()` and `result_sender.send(...).unwrap()` likewise panic on a disconnected peer instead of being handled.","fix":"Capture worker panics (e.g. via a panic flag / catch_unwind or a result channel) and re-raise them on the main thread during flush, and handle `Disconnected` send errors gracefully so a dead worker surfaces as an explicit error rather than a hang.","locations":[{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:199-227","code":"  199 |         self.thread_pool.spawn_broadcast(move |_| {\n  200 |             let render_task_receiver = render_task_receiver.clone();\n  201 |             let mut coarse_task_sender = coarse_task_sender.clone();\n  202 |             let worker = workers.get().unwrap();\n  203 |             let mut worker = worker.borrow_mut();\n  204 |             let thread_id = worker.thread_id();\n  205 | \n  206 |             // Take out the allocation for alphas and store it in the worker.\n  207 |             alpha_storage\n  208 |                 .with_inner(|alphas| worker.init(std::mem::take(&mut alphas[thread_id as usize])));\n  209 | \n  210 |             while let Ok(task) = render_task_receiver.recv() {\n  211 |                 worker.run_render_task(task, &mut coarse_task_sender);\n  212 |             }\n  213 | \n  214 |             // If we reach this point, it means the `task_sender` has been dropped by the main thread\n  215 |             // and no more tasks are available (since we flushed).\n  216 |             // So we are done, and just need to place the alphas of the worker thread back into the\n  217 |             // vector.\n  218 | \n  219 |             alpha_storage.with_inner(|alphas| {\n  220 |                 alphas[thread_id as usize] = worker.finalize();\n  221 |             });\n  222 | \n  223 |             // Then, we drop the `coarse_task_sender`. Once all worker threads have\n  224 |             // dropped their `coarse_task_sender`, the main thread knows that all workers are done\n  225 |             // and all alphas have been placed, so it's safe to proceed.\n  226 |             drop(coarse_task_sender);\n  227 |         });","lines":29},{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded/worker.rs:198","code":"  198 |         result_sender.send(task_idx as usize, task).unwrap();","lines":1},{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:272","code":"  272 |         task_sender.send(task).unwrap();","lines":1}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"The WebGL backend silently drops external textures instead of reporting an error. `render_strips` ignores `_external_texture_runs`, and `prepare_gpu_encoded_paints` for `EncodedPaint::ExternalTexture` only logs a warning and still advances `current_idx` by `GPU_ENCODED_IMAGE_SIZE_TEXELS` without writing valid paint data, leaving a placeholder gradient paint in that slot. The wgpu backend, by contrast, returns `RenderError::MissingTextureBinding`. A scene using `draw_texture_rects` on WebGL will render garbage/transparent pixels with no error returned to the caller.","fix":"Either return a `RenderError` (e.g. a new `ExternalTexturesUnsupported` variant) when an `ExternalTexture` paint is encountered in the WebGL backend, or fully bind the external texture run. At minimum, avoid leaving an invalid placeholder paint in the encoded-paints buffer.","locations":[{"ref":"sparse_strips/vello_hybrid/src/render/webgl.rs:755-759","code":"  755 |                 EncodedPaint::ExternalTexture(_external_texture) => {\n  756 |                     // TODO: External textures are not yet supported.\n  757 |                     log::warn!(\"External textures are not yet supported in the WebGL backend\");\n  758 |                     current_idx += GPU_ENCODED_IMAGE_SIZE_TEXELS;\n  759 |                 }","lines":5},{"ref":"sparse_strips/vello_hybrid/src/render/webgl.rs:2756-2765","code":" 2756 |     fn render_strips(\n 2757 |         &mut self,\n 2758 |         opaque_strips: &[GpuStrip],\n 2759 |         alpha_strips: &[GpuStrip],\n 2760 |         _external_texture_runs: &[crate::schedule::ExternalTextureRun],\n 2761 |         target: StripPassRenderTarget,\n 2762 |         load_op: LoadOp,\n 2763 |     ) {\n 2764 |         self.do_strip_render_pass(opaque_strips, alpha_strips, target, load_op);\n 2765 |     }","lines":10}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `OutlineCacheSession::get_or_insert`, `outline_glyph.draw(draw_settings, &mut drawing_buf).unwrap()` will panic if skrifa fails to draw the outline (e.g. corrupt glyf data). Unlike the COLR path which uses `let _ = ...paint(...)` to ignore errors, this outline path unwraps, so a single bad outline glyph panics the whole render.","fix":"Handle the draw error gracefully (skip/cache an empty path) instead of `unwrap()`, consistent with the error-tolerant COLR handling.","locations":[{"ref":"glifo/src/glyph.rs:1894","code":" 1894 |                 outline_glyph.draw(draw_settings, &mut drawing_buf).unwrap();","lines":1}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`copy_pixmap_to_atlas` computes source row offsets using the destination-provided `width` parameter (`copy_width = width`) against the source's own stride. If `width` (the atlas slot width) ever exceeds `src.width()`, `src_row_end = src_row_start + copy_width*4` runs past the source row and panics on slice indexing. Similarly the destination indexing assumes `dst_x + width <= dst.width()` and `dst_y + height <= dst.height()` with no validation. These rely entirely on the atlas allocator always producing slots that fit; a mismatch is an unchecked panic rather than a handled error.","fix":"Assert (debug_assert! at minimum) that width <= src.width(), height <= src.height(), dst_x+width <= dst.width(), dst_y+height <= dst.height() at the top of copy_pixmap_to_atlas/clear_pixmap_region, or clamp the copy region to the available source/destination extents.","locations":[{"ref":"sparse_strips/vello_cpu/src/text.rs:313-338","code":"  313 | /// Copy bitmap glyph pixels into a rectangular region of an atlas page.\n  314 | fn copy_pixmap_to_atlas(\n  315 |     src: &Pixmap,\n  316 |     dst: &mut Pixmap,\n  317 |     dst_x: u16,\n  318 |     dst_y: u16,\n  319 |     width: u16,\n  320 |     height: u16,\n  321 | ) {\n  322 |     let copy_width = width as usize;\n  323 |     let copy_height = height as usize;\n  324 |     let src_stride = src.width() as usize;\n  325 |     let dst_stride = dst.width() as usize;\n  326 | \n  327 |     let src_data = src.data_as_u8_slice();\n  328 |     let dst_data = dst.data_as_u8_slice_mut();\n  329 | \n  330 |     for y in 0..copy_height {\n  331 |         let src_row_start = y * src_stride * 4;\n  332 |         let src_row_end = src_row_start + copy_width * 4;\n  333 |         let dst_row_start = ((dst_y as usize + y) * dst_stride + dst_x as usize) * 4;\n  334 |         let dst_row_end = dst_row_start + copy_width * 4;\n  335 | \n  336 |         dst_data[dst_row_start..dst_row_end].copy_from_slice(&src_data[src_row_start..src_row_end]);\n  337 |     }\n  338 | }","lines":26},{"ref":"sparse_strips/vello_cpu/src/text.rs:300-311","code":"  300 | fn clear_pixmap_region(dst: &mut Pixmap, rect: PendingClearRect) {\n  301 |     let dst_stride = dst.width() as usize;\n  302 |     let dst_data = dst.data_as_u8_slice_mut();\n  303 |     let clear_width = rect.width as usize;\n  304 |     let clear_height = rect.height as usize;\n  305 | \n  306 |     for y in 0..clear_height {\n  307 |         let row_start = ((rect.y as usize + y) * dst_stride + rect.x as usize) * 4;\n  308 |         let row_end = row_start + clear_width * 4;\n  309 |         dst_data[row_start..row_end].fill(0);\n  310 |     }\n  311 | }","lines":12}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Image/atlas allocation uses `.unwrap()` on `image_cache.allocate(...)` in `upload_image_with` for both backends, turning an atlas-full / allocation-failure condition into a panic rather than a recoverable error. `RenderError` already has an `AtlasError` variant, so allocation failures could be surfaced instead of aborting the process.","fix":"Return `Result<ImageId, RenderError>` from the upload methods and propagate `AtlasError` instead of unwrapping.","locations":[{"ref":"sparse_strips/vello_hybrid/src/render/wgpu.rs:594-598","code":"  594 |         let width = writer.width();\n  595 |         let height = writer.height();\n  596 |         let image_id = image_cache.allocate(width, height, padding).unwrap();\n  597 |         self.write_to_atlas(image_cache, device, queue, encoder, image_id, writer, None);\n  598 |         image_id","lines":5},{"ref":"sparse_strips/vello_hybrid/src/render/webgl.rs:612-616","code":"  612 |         let width = writer.width();\n  613 |         let height = writer.height();\n  614 |         let image_id = image_cache.allocate(width, height, padding).unwrap();\n  615 |         self.write_to_atlas(image_cache, image_id, writer, None);\n  616 |         image_id","lines":5}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Resources::atlas_count` does `u32::try_from(self.image_cache.atlas_count()).unwrap()`. While atlas counts are realistically tiny, this is an unguarded panic point reachable from the public render path. The surrounding code already uses `#[expect(cast_possible_truncation)]` elsewhere; an `as u32` (or a documented invariant) would be more consistent and panic-free.","fix":"Use a checked-but-non-panicking conversion or document/justify the unwrap; given atlas counts are bounded, `as u32` with an `#[expect]` is consistent with the rest of the file.","locations":[{"ref":"sparse_strips/vello_hybrid/src/text.rs:78-80","code":"   78 |     fn atlas_count(&self) -> u32 {\n   79 |         u32::try_from(self.image_cache.atlas_count()).unwrap()\n   80 |     }","lines":3}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`conv_extend` and `push_layer` (CompositeMode) silently map unknown skrifa enum variants to `Extend::Pad` / `Compose::SrcOver` with only a `// TODO` comment, so malformed or future color-font data is rendered incorrectly with no warning. Several adjacent cases in this file do log warnings for analogous fallbacks, making this inconsistent.","fix":"Log a warning (once) when an unknown extend/composite variant is encountered, matching the logging done elsewhere in this module.","locations":[{"ref":"vello/src/scene.rs:1218-1226","code":" 1218 | fn conv_extend(extend: skrifa::color::Extend) -> Extend {\n 1219 |     match extend {\n 1220 |         skrifa::color::Extend::Pad => Extend::Pad,\n 1221 |         skrifa::color::Extend::Repeat => Extend::Repeat,\n 1222 |         skrifa::color::Extend::Reflect => Extend::Reflect,\n 1223 |         // TODO: Error reporting on unknown variant?\n 1224 |         _ => Extend::Pad,\n 1225 |     }\n 1226 | }","lines":9},{"ref":"vello/src/scene.rs:1046-1047","code":" 1046 |             // TODO:\n 1047 |             _ => Compose::SrcOver,","lines":2}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`fill_blurred_rounded_rect` builds the inflated rect path and then calls `self.dispatcher.fill_path` directly, bypassing `with_optional_filter`. Every other primitive (`fill_path`, `stroke_path`, `fill_rect`, `stroke_rect`) wraps its draw in `with_optional_filter` so a set `self.filter` is honored. As a result, a filter set via `set_filter_effect` is silently ignored for blurred rounded rects, an inconsistency that is undocumented.","fix":"Wrap the body of `fill_blurred_rounded_rect` in `with_optional_filter`, or document explicitly that filter effects do not apply to blurred rounded rects.","locations":[{"ref":"sparse_strips/vello_cpu/src/render.rs:315-351","code":"  315 |     pub fn fill_blurred_rounded_rect(&mut self, rect: &Rect, radius: f32, std_dev: f32) {\n  316 |         let rect = rect.abs();\n  317 |         let color = match self.state.paint {\n  318 |             PaintType::Solid(s) => s,\n  319 |             // Fallback to black when attempting to blur a rectangle with an image/gradient paint\n  320 |             _ => BLACK,\n  321 |         };\n  322 | \n  323 |         let blurred_rect = BlurredRoundedRectangle {\n  324 |             rect,\n  325 |             color,\n  326 |             radius,\n  327 |             std_dev,\n  328 |         };\n  329 | \n  330 |         // The actual rectangle we paint needs to be larger so that the blurring effect\n  331 |         // is not cut off.\n  332 |         // The impulse response of a gaussian filter is infinite.\n  333 |         // For performance reason we cut off the filter at some extent where the response is close to zero.\n  334 |         let kernel_size = 2.5 * std_dev;\n  335 |         let inflated_rect = rect.inflate(f64::from(kernel_size), f64::from(kernel_size));\n  336 |         let transform = self.state.transform * self.state.paint_transform;\n  337 | \n  338 |         self.rect_to_temp_path(&inflated_rect);\n  339 | \n  340 |         let paint = blurred_rect.encode_into(&mut self.encoded_paints, transform, None);\n  341 |         self.dispatcher.fill_path(\n  342 |             &self.temp_path,\n  343 |             Fill::NonZero,\n  344 |             self.state.transform,\n  345 |             paint,\n  346 |             self.state.blend_mode,\n  347 |             self.aliasing_threshold,\n  348 |             self.mask.clone(),\n  349 |             &self.encoded_paints,\n  350 |         );\n  351 |     }","lines":37},{"ref":"sparse_strips/vello_cpu/src/render.rs:732-744","code":"  732 |     /// Execute a drawing operation, optionally wrapping it in a filter layer.\n  733 |     fn with_optional_filter<F>(&mut self, mut f: F)\n  734 |     where\n  735 |         F: FnMut(&mut Self),\n  736 |     {\n  737 |         if let Some(filter) = self.filter.clone() {\n  738 |             self.push_filter_layer(filter);\n  739 |             f(self);\n  740 |             self.pop_layer();\n  741 |         } else {\n  742 |             f(self);\n  743 |         }\n  744 |     }","lines":13}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"In `process_paint`, the `Paint::Solid` branch packs `paint_and_rect_flag` with the wrong bit shifts: `(COLOR_SOURCE_PAYLOAD << 30) | (PAINT_TYPE_SOLID << 27)`. Every other paint case, and the shader (`render_strips.wgsl`: `color_source = (paint_and_rect_flag >> 29u)`, `paint_type = (... >> 26u)`), uses bit 29 for `color_source` and bits 26-28 for `paint_type`. The solid case is the only place that uses `<< 30` / `<< 27`. It currently happens to be harmless only because both `COLOR_SOURCE_PAYLOAD` and `PAINT_TYPE_SOLID` are `0`, so the result is `0` regardless of the shift. It is a latent bug: if either constant ever becomes non-zero, solid paints will be packed incorrectly, and it is misleading to anyone reading the code.","fix":"Change to `(COLOR_SOURCE_PAYLOAD << 29) | (PAINT_TYPE_SOLID << 26)` to match the shader's bit layout and the other branches of `process_encoded_paint`.","locations":[{"ref":"sparse_strips/vello_hybrid/src/schedule.rs:1827","code":" 1827 |                 let paint_packed = (COLOR_SOURCE_PAYLOAD << 30) | (PAINT_TYPE_SOLID << 27);","lines":1}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`split_rect` computes `width = (sx1 - sx0) as u16` and `height = (sy1 - sy0) as u16` from `f32` rect bounds, then for large rects does `inner_width = width - left_inset - right_inset`. The comment claims the cast is safe because rects are clamped, but the clamping to surface dimensions happens in `fast_rect_bounds`/`draw_texture_rects` for the user-facing paths, while `pack_rectangle_into_gpu`/`split_rect` operate on `FastPathRect` values which are populated from already-clamped coordinates - so the invariant is maintained only by convention spread across multiple call sites. If a future caller pushes an unclamped `FastPathRect`, the `as u16` cast silently truncates and the subsequent `width - left_inset - right_inset` can underflow-panic in debug.","fix":"Assert the rect bounds are within `[0, u16::MAX]` at the top of `split_rect`, or clamp inside `split_rect` so the safety invariant is local rather than relying on every caller.","locations":[{"ref":"sparse_strips/vello_hybrid/src/schedule.rs:2135-2193","code":" 2135 | fn split_rect(rect: &FastPathRect) -> SplitRect {\n 2136 |     let sx0 = rect.x0.floor();\n 2137 |     let sy0 = rect.y0.floor();\n 2138 |     let sx1 = rect.x1.ceil();\n 2139 |     let sy1 = rect.y1.ceil();\n 2140 | \n 2141 |     let x = sx0 as u16;\n 2142 |     let y = sy0 as u16;\n 2143 |     // Are guaranteed to be > 0 since we rejected negative rectangles.\n 2144 |     let width = (sx1 - sx0) as u16;\n 2145 |     let height = (sy1 - sy0) as u16;\n 2146 | \n 2147 |     // Note that `top_frac` and `left_fract` store the actual coverage, while\n 2148 |     // `right_frac` and `bottom_fract` store one minus the coverage. This is on purpose\n 2149 |     // and handled that way in the shader.\n 2150 |     let left_frac = rect.x0 - sx0;\n 2151 |     let top_frac = rect.y0 - sy0;\n 2152 |     let right_frac = sx1 - rect.x1;\n 2153 |     let bottom_frac = sy1 - rect.y1;\n 2154 | \n 2155 |     // There's a balance to strike between reducing work in the fragment shader by splitting\n 2156 |     // out the inner part of the rectangle without anti-aliasing, and additional overhead\n 2157 |     // that arises from rendering 5 rectangles instead of just one. While the exact threshold\n 2158 |     // will obviously depend on the device, some experiments on a low-tier tablet showed that\n 2159 |     // `LARGE_RECT_SPLIT_THRESHOLD` seems to be a a reasonable value.\n 2160 |     if rect.x1 - rect.x0 < f32::from(LARGE_RECT_SPLIT_THRESHOLD)\n 2161 |         || rect.y1 - rect.y0 < f32::from(LARGE_RECT_SPLIT_THRESHOLD)\n 2162 |     {\n 2163 |         return SplitRect {\n 2164 |             main: RectPart {\n 2165 |                 x,\n 2166 |                 y,\n 2167 |                 width,\n 2168 |                 height,\n 2169 |                 frac: pack_unorm4x8([left_frac, top_frac, right_frac, bottom_frac]),\n 2170 |             },\n 2171 |             top: None,\n 2172 |             bottom: None,\n 2173 |             left: None,\n 2174 |             right: None,\n 2175 |         };\n 2176 |     }\n 2177 | \n 2178 |     let has_left_aa = left_frac > 0.0;\n 2179 |     let has_top_aa = top_frac > 0.0;\n 2180 |     let has_right_aa = right_frac > 0.0;\n 2181 |     let has_bottom_aa = bottom_frac > 0.0;\n 2182 |     let has_top_strip = has_top_aa || has_left_aa || has_right_aa;\n 2183 |     let has_bottom_strip = has_bottom_aa || has_left_aa || has_right_aa;\n 2184 |     let left_inset = u16::from(has_left_aa);\n 2185 |     let right_inset = u16::from(has_right_aa);\n 2186 |     let top_inset = u16::from(has_top_strip);\n 2187 |     let bottom_inset = u16::from(has_bottom_strip);\n 2188 |     let inner_x = x + left_inset;\n 2189 |     let inner_y = y + top_inset;\n 2190 |     // Can't underflow because rectangles have at least `LARGE_RECT_SPLIT_THRESHOLD` in each\n 2191 |     // direction, which is larger than 2.\n 2192 |     let inner_width = width - left_inset - right_inset;\n 2193 |     let inner_height = height - top_inset - bottom_inset;","lines":59}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Every strip render pass allocates a brand-new GPU vertex buffer via `create_strips_buffer`/`create_buffer` and stages the data, instead of reusing or sub-allocating from a persistent buffer. With the scheduler issuing many passes per frame (one per round per target), this causes a large number of per-frame buffer allocations. The code itself flags this with TODOs but it is a real per-frame performance/GC cost on both backends. The same pattern applies to `clear_slot_indices_buffer` and `filter_instance_buffer`.","fix":"Use a staging belt or a persistent, growable ring buffer and write strip/instance data at offsets, recreating the buffer only when capacity must grow.","locations":[{"ref":"sparse_strips/vello_hybrid/src/render/wgpu.rs:2567-2589","code":" 2567 |     /// Uploads two strip slices (opaque then alpha) into a single GPU buffer.\n 2568 |     fn upload_strip_pair(\n 2569 |         &mut self,\n 2570 |         device: &Device,\n 2571 |         queue: &Queue,\n 2572 |         opaque_strips: &[GpuStrip],\n 2573 |         alpha_strips: &[GpuStrip],\n 2574 |     ) {\n 2575 |         let opaque_bytes = size_of_val(opaque_strips) as u64;\n 2576 |         let alpha_bytes = size_of_val(alpha_strips) as u64;\n 2577 |         let total = opaque_bytes + alpha_bytes;\n 2578 |         self.resources.strips_buffer = Self::create_strips_buffer(device, total);\n 2579 |         // TODO: Consider using a staging belt to avoid an extra staging buffer allocation.\n 2580 |         let mut buffer_view = queue\n 2581 |             .write_buffer_with(&self.resources.strips_buffer, 0, total.try_into().unwrap())\n 2582 |             .expect(\"Capacity handled in creation\");\n 2583 |         buffer_view\n 2584 |             .slice(..opaque_bytes as usize)\n 2585 |             .copy_from_slice(bytemuck::cast_slice(opaque_strips));\n 2586 |         buffer_view\n 2587 |             .slice(opaque_bytes as usize..)\n 2588 |             .copy_from_slice(bytemuck::cast_slice(alpha_strips));\n 2589 |     }","lines":23},{"ref":"sparse_strips/vello_hybrid/src/render/wgpu.rs:2877-2898","code":" 2877 |     /// Clear specific slots from a slot texture.\n 2878 |     fn do_clear_slots_render_pass(&mut self, ix: usize, slot_indices: &[u32]) {\n 2879 |         if slot_indices.is_empty() {\n 2880 |             return;\n 2881 |         }\n 2882 | \n 2883 |         let resources = &mut self.programs.resources;\n 2884 |         let size = size_of_val(slot_indices) as u64;\n 2885 |         // TODO: We currently allocate a new strips buffer for each render pass. A more efficient\n 2886 |         // approach would be to re-use buffers or slices of a larger buffer.\n 2887 |         resources.clear_slot_indices_buffer =\n 2888 |             Programs::create_clear_slot_indices_buffer(self.device, size);\n 2889 |         // TODO: Consider using a staging belt to avoid an extra staging buffer allocation.\n 2890 |         let mut buffer = self\n 2891 |             .queue\n 2892 |             .write_buffer_with(\n 2893 |                 &resources.clear_slot_indices_buffer,\n 2894 |                 0,\n 2895 |                 size.try_into().unwrap(),\n 2896 |             )\n 2897 |             .expect(\"Capacity handled in creation\");\n 2898 |         buffer.copy_from_slice(bytemuck::cast_slice(slot_indices));","lines":22},{"ref":"sparse_strips/vello_hybrid/src/render/wgpu.rs:2979-2986","code":" 2979 |         // TODO: Reuse buffer (https://github.com/linebender/vello/pull/1494#discussion_r2937890819)\n 2980 |         self.programs.resources.filter_instance_buffer =\n 2981 |             Programs::create_filter_instance_buffer(self.device, total_size);\n 2982 |         self.queue.write_buffer(\n 2983 |             &self.programs.resources.filter_instance_buffer,\n 2984 |             0,\n 2985 |             bytemuck::cast_slice(instances),\n 2986 |         );","lines":8}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`get_colr_info` is recomputed every frame for every COLR glyph cache miss (it walks the entire COLR paint graph to compute a conservative bbox and blend flag). The code itself flags this with `// TODO: Cache this across frames.` For text-heavy color-emoji content this repeated graph traversal is a measurable cost on cache misses.","fix":"Cache `ColrGlyphInfo` keyed by (font_id, font_index, glyph_id, var_coords) across frames, as the TODO suggests.","locations":[{"ref":"glifo/src/glyph.rs:1221-1222","code":" 1221 |     // TODO: Cache this across frames.\n 1222 |     let colr_info = get_colr_info(font_ref, color_glyph, location);","lines":2},{"ref":"glifo/src/colr.rs:208-216","code":"  208 | pub(crate) fn get_colr_info<'a>(\n  209 |     font_ref: &'a FontRef<'a>,\n  210 |     color_glyph: &skrifa::color::ColorGlyph<'a>,\n  211 |     location: LocationRef<'a>,\n  212 | ) -> ColrGlyphInfo {\n  213 |     let mut extractor = GlyphInfoExtractor::new(font_ref, location);\n  214 |     let _ = color_glyph.paint(location, &mut extractor);\n  215 |     extractor.finish()\n  216 | }","lines":9}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Wide::generate` recomputes `fill_hint` (matching on paint type, looking up `encoded_paints`, checking transparency/tint) once per fill gap between strips, even though `fill_attrs.paint` and `enable_bg_optimization` are constant for the whole call. For paths with many strips this redundant match runs on every gap in the hot coarse-rasterization loop.","fix":"Compute the base `fill_hint` once before the strip loop (it depends only on the paint and config) and reuse it for each fill region.","locations":[{"ref":"sparse_strips/vello_common/src/coarse.rs:624-650","code":"  624 |                 // Compute fill hint based on paint type\n  625 |                 let fill_attrs = &self.attrs.fill[attrs_idx as usize];\n  626 |                 let fill_hint = if fill_attrs.mask.is_none() && self.enable_bg_optimization {\n  627 |                     match &fill_attrs.paint {\n  628 |                         Paint::Solid(s) if s.is_opaque() => FillHint::OpaqueSolid(*s),\n  629 |                         Paint::Indexed(idx) => match encoded_paints.get(idx.index()) {\n  630 |                             Some(EncodedPaint::Image(img))\n  631 |                                 if !img.may_have_transparency\n  632 |                                     && img.sampler.alpha == 1.0\n  633 |                                     && img.tint.is_none_or(|t| t.color.components[3] >= 1.0) =>\n  634 |                             {\n  635 |                                 FillHint::OpaqueImage\n  636 |                             }\n  637 |                             Some(EncodedPaint::ExternalTexture(img))\n  638 |                                 if !img.may_have_transparency\n  639 |                                     && img.sampler.alpha == 1.0\n  640 |                                     && img.tint.is_none_or(|t| t.color.components[3] >= 1.0) =>\n  641 |                             {\n  642 |                                 FillHint::OpaqueImage\n  643 |                             }\n  644 |                             _ => FillHint::None,\n  645 |                         },\n  646 |                         _ => FillHint::None,\n  647 |                     }\n  648 |                 } else {\n  649 |                     FillHint::None\n  650 |                 };","lines":27}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `pop_layer`, the mask is cloned for every occupied tile via `layer.mask.clone()` inside the per-tile loop. `Mask` is an `Arc` wrapper so the clone is cheap, but the `if let Some(mask) = layer.mask.clone()` clones unconditionally on each iteration even when many tiles have no draw commands. Cloning the Arc per tile in a hot loop is avoidable.","fix":"Hoist `let mask = layer.mask.clone();` (or borrow) out of the loop, and clone only when actually applying it to a tile, or pass `&Mask` to `tile.mask` and clone once inside.","locations":[{"ref":"sparse_strips/vello_common/src/coarse.rs:929-935","code":"  929 |                 let has_draw_commands = !matches!(tile.cmds.last().unwrap(), &Cmd::PushBuf(..));\n  930 |                 if has_draw_commands {\n  931 |                     if let Some(mask) = layer.mask.clone() {\n  932 |                         tile.mask(mask);\n  933 |                     }\n  934 |                     tile.opacity(layer.opacity);\n  935 |                 }","lines":7}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`combined_tile_alpha` recomputes the x-coverage for every tile column in an edge row, including the fully-interior columns whose horizontal coverage is always 1.0. The TODO at lines 100-102 already acknowledges this: intermediate tiles have full horizontal coverage and only the left-most and right-most tiles need per-column x-coverage. For wide rectangles spanning many tile columns this multiplies the per-pixel work in the edge-row loop unnecessarily.","fix":"Precompute a full-coverage mask (x_cov all 1.0) reused for interior columns; only call `coverage`/`combined_tile_alpha` with real x-coverage for the first and last tile columns of the edge row.","locations":[{"ref":"sparse_strips/vello_common/src/rect.rs:99-107","code":"   99 |             // TODO: Can this result in an infinite loop in case x_end == u16::MAX?\n  100 |             while col + Tile::WIDTH <= x
