_end {\n  101 |                 // TODO: We could optimize this so this is only computed for the left-most and right-most\n  102 |                 // tile of the edge, all intermediate tiles have full horizontal coverage.\n  103 |                 let x_cov = coverage(col, rect_x0, rect_x1);\n  104 |                 let combined = combined_tile_alpha(s, &x_cov, &y_cov);\n  105 |                 alpha_buf.extend_from_slice(combined.as_slice());\n  106 |                 col += Tile::WIDTH;\n  107 |             }","lines":9},{"ref":"sparse_strips/vello_common/src/rect.rs:166-180","code":"  166 | #[inline(always)]\n  167 | fn combined_tile_alpha<S: Simd>(\n  168 |     s: S,\n  169 |     x_cov: &[f32; Tile::WIDTH as usize],\n  170 |     y_cov: &[f32; Tile::HEIGHT as usize],\n  171 | ) -> u8x16<S> {\n  172 |     let mut buf = [0_u8; 16];\n  173 |     for (col, xc) in x_cov.iter().copied().enumerate() {\n  174 |         for (row, yc) in y_cov.iter().copied().enumerate() {\n  175 |             buf[col * Tile::HEIGHT as usize + row] = (xc * yc * 255.0 + 0.5) as u8;\n  176 |         }\n  177 |     }\n  178 | \n  179 |     u8x16::from_slice(s, &buf)\n  180 | }","lines":15}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Tiles::sort_tiles` calls `self.level.dispatch(|_| self.tile_buf.sort_unstable())`. `sort_unstable` on `Tile` uses `Ord` which compares `to_bits()` (a u64). This is fine, but the dispatch closure ignores the SIMD token (`|_|`) and the comment 'To enable auto-vectorization' is optimistic: `sort_unstable` is a comparison sort that the dispatch level cannot vectorize. The dispatch wrapper adds indirection without a clear vectorization benefit for a comparison-based sort.","fix":"Either document concretely what the dispatch achieves (codegen for the target feature set) or drop the dispatch wrapper if it provides no measurable benefit; consider a radix sort on `to_bits()` if sort time is hot.","locations":[{"ref":"sparse_strips/vello_common/src/tile.rs:455-459","code":"  455 |     pub fn sort_tiles(&mut self) {\n  456 |         self.sorted = true;\n  457 |         // To enable auto-vectorization.\n  458 |         self.level.dispatch(|_| self.tile_buf.sort_unstable());\n  459 |     }","lines":5}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`push_clip_path` and `pop_clip_path` unconditionally call `flush_tasks()`, which always calls `send_pending_tasks()`. `send_pending_tasks` bumps `task_idx`, replaces the allocation group, and sends a `RenderTask` to the workers even when no draw commands have accumulated (empty `render_tasks`). This forces an empty round-trip through the worker channel and an extra coarse pass for every clip push/pop, which can be significant for clip-heavy scenes (the crate docs already warn that heavy clip usage gives diminishing returns with many threads).","fix":"Skip sending when `self.allocation_group.render_tasks.is_empty()` (but still flush the clip-context state ordering as needed), or guard `send_pending_tasks` to return early when there are no pending render tasks.","locations":[{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:636-656","code":"  636 |     fn push_clip_path(\n  637 |         &mut self,\n  638 |         path: &BezPath,\n  639 |         fill_rule: Fill,\n  640 |         transform: Affine,\n  641 |         aliasing_threshold: Option<u8>,\n  642 |     ) {\n  643 |         self.flush_tasks();\n  644 |         self.clip_context.push_clip(\n  645 |             path,\n  646 |             &mut self.strip_generator,\n  647 |             fill_rule,\n  648 |             transform,\n  649 |             aliasing_threshold,\n  650 |         );\n  651 |     }\n  652 | \n  653 |     fn pop_clip_path(&mut self) {\n  654 |         self.flush_tasks();\n  655 |         self.clip_context.pop_clip();\n  656 |     }","lines":21},{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:257-278","code":"  257 |     fn send_pending_tasks(&mut self) {\n  258 |         let task_idx = self.bump_task_idx();\n  259 |         let allocation_group =\n  260 |             std::mem::replace(&mut self.allocation_group, self.allocations.get());\n  261 |         let task_sender = self.task_sender.as_mut().unwrap();\n  262 |         let clip_path = self.clip_context.get().map(|c| OwnedClip {\n  263 |             strips: c.strips.into(),\n  264 |             alphas: c.alphas.into(),\n  265 |             bbox: c.bbox,\n  266 |         });\n  267 |         let task = RenderTask {\n  268 |             idx: task_idx,\n  269 |             clip_path,\n  270 |             allocation_group,\n  271 |         };\n  272 |         task_sender.send(task).unwrap();\n  273 |         // TODO: Pass encoded_paints here to enable overdraw elimination for opaque indexed\n  274 |         // paints. Currently we pass an empty slice, so indexed paints render correctly but miss\n  275 |         // the FillHint::OpaqueImage optimization. The challenge is that encoded_paints is a\n  276 |         // borrowed reference that may not be valid by the time coarse processing runs asynchronously.\n  277 |         self.run_coarse(true, &[]);\n  278 |     }","lines":22}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"Drop shadow clones the entire source pixmap (RGB+A) and blurs all four channels, but `compose_shadow_direct` only ever reads the alpha channel of the blurred shadow (`shadow.sample(x, y).a`). Blurring R, G, B is wasted work; per the documented algorithm only the alpha channel is needed to build the shadow.","fix":"Extract/operate on just the alpha channel (e.g. an alpha-only scratch buffer) for offset+blur, or document that the RGB blur is intentionally unused. At minimum, this halves-to-quarters the convolution cost for the drop-shadow path.","locations":[{"ref":"sparse_strips/vello_cpu/src/filter/drop_shadow.rs:67-87","code":"   67 |     // Clone pixmap to create shadow buffer\n   68 |     let mut shadow_pixmap = pixmap.clone();\n   69 | \n   70 |     // Step 1: Offset the shadow pixels\n   71 |     offset_pixels(&mut shadow_pixmap, dx, dy);\n   72 | \n   73 |     // Step 2: Blur the already-offset shadow\n   74 |     if std_deviation > 0.0 {\n   75 |         let scratch =\n   76 |             layer_manager.get_scratch_buffer(shadow_pixmap.width(), shadow_pixmap.height());\n   77 |         apply_blur(\n   78 |             &mut shadow_pixmap,\n   79 |             scratch,\n   80 |             n_decimations,\n   81 |             kernel,\n   82 |             edge_mode,\n   83 |         );\n   84 |     }\n   85 | \n   86 |     // Step 3: Apply shadow color and composite with original\n   87 |     compose_shadow_direct(&shadow_pixmap, pixmap, color);","lines":21},{"ref":"sparse_strips/vello_cpu/src/filter/drop_shadow.rs:103-110","code":"  103 |     for y in 0..height {\n  104 |         for x in 0..width {\n  105 |             // Sample alpha directly (shadow is already offset)\n  106 |             let alpha = shadow.sample(x, y).a;\n  107 | \n  108 |             // Apply shadow color to alpha\n  109 |             let shadow_alpha = (u8_to_norm(alpha) * color.components[3]).min(1.0);\n  110 |             let final_alpha = norm_to_u8(shadow_alpha);","lines":8}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The f32 `mix` (blend) routine performs two full `store_interleaved_128_f32x16` + `from_slice` round-trips through a stack `[f32; 16]` buffer per call (once to deinterleave into planar channels at the start, once to reinterleave at the end), in addition to the per-channel splits. This is in the per-pixel blend hot path for every non-Normal blend mode. The author already flags blending as 'extremely slow' in a TODO. The interleave/deinterleave via memory is a likely contributor and could be replaced with register shuffles.","fix":"Replace the memory store/load interleave round-trips with SIMD shuffle/zip-based transpose between interleaved RGBA and planar channel layout.","locations":[{"ref":"sparse_strips/vello_cpu/src/fine/highp/blend.rs:35-45","code":"   35 |     let split = |input: f32x16<S>| {\n   36 |         let mut storage = [0.0; 16];\n   37 |         simd.store_interleaved_128_f32x16(input, &mut storage);\n   38 |         let input_v = f32x16::from_slice(simd, &storage);\n   39 | \n   40 |         let p1 = simd.split_f32x16(input_v);\n   41 |         let (r, g) = simd.split_f32x8(p1.0);\n   42 |         let (b, a) = simd.split_f32x8(p1.1);\n   43 | \n   44 |         (Channels { r, g, b }, a)\n   45 |     };","lines":11},{"ref":"sparse_strips/vello_cpu/src/fine/highp/blend.rs:69-76","code":"   69 |     let combined = simd.combine_f32x8(\n   70 |         simd.combine_f32x4(res_bg.r, res_bg.g),\n   71 |         simd.combine_f32x4(res_bg.b, src_a),\n   72 |     );\n   73 | \n   74 |     let mut storage = [0.0; 16];\n   75 |     simd.store_interleaved_128_f32x16(combined, &mut storage);\n   76 |     f32x16::from_slice(simd, &storage)","lines":8}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`GradientRampCache::get_or_create_ramp` increments `self.epoch` on every call including pure cache hits, and the cache is only ever bounded in `maintain()` (called once per frame). This is fine for correctness, but the cache grows without bound within a single frame: a frame referencing far more than `retained_count` unique gradients will inflate both `cache` and `luts` until the end-of-frame `maintain`, and the eviction work (a full `select_nth` + LUT compaction copy of the entire `luts` buffer) is O(luts size). For pathological scenes this is a notable per-frame cost with no intra-frame backpressure.","fix":"Consider an optional soft cap that triggers compaction mid-frame, or document the unbounded intra-frame growth explicitly. At minimum, avoid bumping `epoch` semantics in a way that complicates reasoning; the current behavior is acceptable but the cost characteristics should be noted.","locations":[{"ref":"sparse_strips/vello_hybrid/src/gradient_cache.rs:75-94","code":"   75 |     pub(crate) fn get_or_create_ramp(&mut self, gradient: &EncodedGradient) -> (u32, u32) {\n   76 |         self.epoch += 1;\n   77 | \n   78 |         // Check if we already have this gradient cached.\n   79 |         if let Some((cached_ramp, last_used)) = self.cache.get_mut(&gradient.cache_key) {\n   80 |             *last_used = self.epoch;\n   81 |             return (cached_ramp.lut_start, cached_ramp.width);\n   82 |         }\n   83 | \n   84 |         // Generate new gradient LUT.\n   85 |         let lut_start = self.luts.len() as u32 / BYTES_PER_TEXEL;\n   86 |         let width = dispatch!(self.level, simd => generate_gradient_lut_impl(simd, gradient, &mut self.luts))\n   87 |             as u32;\n   88 |         let cached_ramp = CachedRamp { width, lut_start };\n   89 |         self.has_changed = true;\n   90 |         self.cache\n   91 |             .insert(gradient.cache_key.clone(), (cached_ramp, self.epoch));\n   92 | \n   93 |         (lut_start, width)\n   94 |     }","lines":20},{"ref":"sparse_strips/vello_hybrid/src/gradient_cache.rs:96-103","code":"   96 |     /// Maintain the gradient cache by evicting old entries.\n   97 |     pub(crate) fn maintain(&mut self) {\n   98 |         let entries_to_remove_count = self\n   99 |             .cache\n  100 |             .len()\n  101 |             .saturating_sub(self.retained_count as usize);\n  102 |         self.evict(entries_to_remove_count);\n  103 |     }","lines":8}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`do_strip_render_pass` for `StripPassRenderTarget::FilterLayer` creates a fresh `Config` uniform buffer (`Filter Strip Config Buffer`) on every pass via `create_buffer_init`, and creates a fresh `Filter Strip Bind Group` and an ad-hoc alphas texture view each time. Filter-heavy scenes will allocate these per round per filter layer. The code has a TODO acknowledging this. Repeated `create_view`/`create_buffer`/`create_bind_group` inside the hot render loop is a notable per-pass cost.","fix":"Cache the filter strip config buffer and bind group keyed by layer/atlas, and reuse a persistent alphas texture view rather than creating one per pass.","locations":[{"ref":"sparse_strips/vello_hybrid/src/render/wgpu.rs:2698-2753","code":" 2698 |                 // TODO: Cache this and bind group? See https://github.com/linebender/vello/pull/1494#discussion_r2937895891.\n 2699 |                 let atlas_config_buffer =\n 2700 |                     self.device\n 2701 |                         .create_buffer_init(&wgpu::util::BufferInitDescriptor {\n 2702 |                             label: Some(\"Filter Strip Config Buffer\"),\n 2703 |                             contents: bytemuck::bytes_of(&Config {\n 2704 |                                 width: atlas_size.width,\n 2705 |                                 height: atlas_size.height,\n 2706 |                                 strip_height: Tile::HEIGHT.into(),\n 2707 |                                 alphas_tex_width_bits: self\n 2708 |                                     .programs\n 2709 |                                     .resources\n 2710 |                                     .alphas_texture\n 2711 |                                     .size()\n 2712 |                                     .width\n 2713 |                                     .trailing_zeros(),\n 2714 |                                 encoded_paints_tex_width_bits: self\n 2715 |                                     .programs\n 2716 |                                     .resources\n 2717 |                                     .alphas_texture\n 2718 |                                     .size()\n 2719 |                                     .width\n 2720 |                                     .trailing_zeros(),\n 2721 |                                 strip_offset_x,\n 2722 |                                 strip_offset_y,\n 2723 |                                 negate_ndc: 0,\n 2724 |                             }),\n 2725 |                             usage: wgpu::BufferUsages::UNIFORM,\n 2726 |                         });\n 2727 | \n 2728 |                 let bind_group = self.device.create_bind_group(&wgpu::BindGroupDescriptor {\n 2729 |                     label: Some(\"Filter Strip Bind Group\"),\n 2730 |                     layout: &self.programs.strip_bind_group_layout,\n 2731 |                     entries: &[\n 2732 |                         wgpu::BindGroupEntry {\n 2733 |                             binding: 0,\n 2734 |                             resource: wgpu::BindingResource::TextureView(\n 2735 |                                 &self\n 2736 |                                     .programs\n 2737 |                                     .resources\n 2738 |                                     .alphas_texture\n 2739 |                                     .create_view(&TextureViewDescriptor::default()),\n 2740 |                             ),\n 2741 |                         },\n 2742 |                         wgpu::BindGroupEntry {\n 2743 |                             binding: 1,\n 2744 |                             resource: atlas_config_buffer.as_entire_binding(),\n 2745 |                         },\n 2746 |                         wgpu::BindGroupEntry {\n 2747 |                             binding: 2,\n 2748 |                             resource: wgpu::BindingResource::TextureView(\n 2749 |                                 &self.programs.resources.slot_texture_views[1],\n 2750 |                             ),\n 2751 |                         },\n 2752 |                     ],\n 2753 |                 });","lines":56}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`do_scene` runs an O(total_slots^2) consistency check after every scene under `debug_assertions`: for each of `total_slots` indices it calls `self.free[0].contains(&i)` and `self.free[1].contains(&i)`, each a linear scan of a `Vec` of length up to `total_slots`. On a typical desktop `total_slots = max_texture_dimension_2d / 4` can be ~2048-4096, making this ~tens of millions of comparisons per scene in debug builds, noticeably slowing debug/test runs.","fix":"Sort the two free vectors and compare against `0..total_slots`, or collect into a `BTreeSet`/bitset for an O(n log n)/O(n) check instead of O(n^2).","locations":[{"ref":"sparse_strips/vello_hybrid/src/schedule.rs:662-668","code":"  662 |         #[cfg(debug_assertions)]\n  663 |         {\n  664 |             for i in 0..self.total_slots {\n  665 |                 debug_assert!(self.free[0].contains(&i), \"free[0] is missing slot {i}\");\n  666 |                 debug_assert!(self.free[1].contains(&i), \"free[1] is missing slot {i}\");\n  667 |             }\n  668 |         }","lines":7}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`GlyphCache::session` performs up to three hashmap operations on the variable-font path: `var_map.contains_key(coords)` followed by `var_map.get_mut(coords)` (two lookups) when the key exists, or `entry(coords.into())` when it doesn't. The comment acknowledges this is a deliberately chosen 'bad option'. For variable-font-heavy text this is an avoidable extra hash+probe per glyph run.","fix":"Use the raw-entry API or a single `entry` with a borrowed-key abstraction once available, or restructure so only one lookup is performed in the hot (key-present) case.","locations":[{"ref":"vello_encoding/src/glyph_cache.rs:41-54","code":"   41 |         let map = if !coords.is_empty() {\n   42 |             // This is still ugly in rust. Choices are:\n   43 |             // 1. multiple lookups in the hashmap (implemented here)\n   44 |             // 2. always allocate and copy the key\n   45 |             // 3. use unsafe\n   46 |             // Pick 1 bad option :(\n   47 |             if self.var_map.contains_key(coords) {\n   48 |                 self.var_map.get_mut(coords).unwrap()\n   49 |             } else {\n   50 |                 self.var_map.entry(coords.into()).or_default()\n   51 |             }\n   52 |         } else {\n   53 |             &mut self.map\n   54 |         };","lines":14}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`make_mask_lut_16` builds a `Vec<u16>` and then calls `bytemuck::cast_slice(&v16).into()` to produce a `Vec<u8>`, which copies the entire buffer a second time. The code even acknowledges this in a comment. For an MSAA16 mask LUT (64*64 u16 = 8 KiB) this is a redundant allocation+copy on the first MSAA16 render.","fix":"Build the `Vec<u8>` directly by pushing the two bytes of each `u16` per iteration (as the comment suggests), avoiding the intermediate `Vec<u16>` and the extra copy.","locations":[{"ref":"vello_encoding/src/mask.rs:83-98","code":"   83 | pub fn make_mask_lut_16() -> Vec<u8> {\n   84 |     let v16 = (0..MASK16_WIDTH * MASK16_HEIGHT)\n   85 |         .map(|i| {\n   86 |             const HALF_HEIGHT: usize = MASK16_HEIGHT / 2;\n   87 |             let u = i % MASK16_WIDTH;\n   88 |             let v = i / MASK16_WIDTH;\n   89 |             let is_pos = v >= HALF_HEIGHT;\n   90 |             let y = ((v % HALF_HEIGHT) as f64 + 0.5) * (1.0 / HALF_HEIGHT as f64);\n   91 |             let x = (u as f64 + 0.5) * (1.0 / MASK16_WIDTH as f64);\n   92 |             one_mask_16(y, x, is_pos)\n   93 |         })\n   94 |         .collect::<Vec<_>>();\n   95 |     // This annoyingly makes another copy. We can avoid that by pushing two\n   96 |     // bytes per iteration of the above loop.\n   97 |     bytemuck::cast_slice(&v16).into()\n   98 | }","lines":16}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In flatten_simd `flatten`, each Bézier culling test constructs three/four temporary arrays via `[p0, p1, p2].into_iter().all(...)` repeatedly (up to three times for the right/top/bottom tests, plus once for the left test). These build small arrays and iterators per element in the hot flattening loop. For paths with many curves this adds avoidable per-element overhead vs. inlined boolean comparisons.","fix":"Replace the `[..].into_iter().all(|p| ...)` patterns with explicit `&&` chains on the individual point coordinates to avoid array/iterator construction per curve.","locations":[{"ref":"sparse_strips/vello_common/src/flatten_simd.rs:126-128","code":"  126 |                 if [p0, p1, p2].into_iter().all(|p| p.x > right)\n  127 |                     || [p0, p1, p2].into_iter().all(|p| p.y < top)\n  128 |                     || [p0, p1, p2].into_iter().all(|p| p.y > bottom)","lines":3},{"ref":"sparse_strips/vello_common/src/flatten_simd.rs:178-180","code":"  178 |                 if [p0, p1, p2, p3].into_iter().all(|p| p.x > right)\n  179 |                     || [p0, p1, p2, p3].into_iter().all(|p| p.y < top)\n  180 |                     || [p0, p1, p2, p3].into_iter().all(|p| p.y > bottom)","lines":3}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"Pixmap::take_unpremultiplied computes `let alpha = 255.0 / f32::from(a);` for every pixel before checking `if a != 0`. For fully-transparent pixels this performs a division (producing inf) that is then discarded. Minor, but the division is unconditional in the hot per-pixel closure.","fix":"Move the `let alpha = ...` binding inside the `if a != 0` branch so the reciprocal is only computed when used.","locations":[{"ref":"sparse_strips/vello_common/src/pixmap.rs:358-377","code":"  358 |     pub fn take_unpremultiplied(self) -> Vec<Rgba8> {\n  359 |         self.buf\n  360 |             .into_iter()\n  361 |             .map(|PremulRgba8 { r, g, b, a }| {\n  362 |                 let alpha = 255.0 / f32::from(a);\n  363 |                 if a != 0 {\n  364 |                     #[expect(clippy::cast_possible_truncation, reason = \"deliberate quantization\")]\n  365 |                     let unpremultiply = |component| (f32::from(component) * alpha + 0.5) as u8;\n  366 |                     Rgba8 {\n  367 |                         r: unpremultiply(r),\n  368 |                         g: unpremultiply(g),\n  369 |                         b: unpremultiply(b),\n  370 |                         a,\n  371 |                     }\n  372 |                 } else {\n  373 |                     Rgba8 { r, g, b, a }\n  374 |                 }\n  375 |             })\n  376 |             .collect()\n  377 |     }","lines":20}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Splat4thExt for u8x16` and `element_wise_splat` build temporary `[T; N]` arrays and call `simd_into`, with TODOs noting they should be SIMDified ('TODO: SIMDify'). These run per-pixel-group in color/alpha splatting paths; the scalar array round-trip defeats vectorization for those lanes.","fix":"Implement the u8x16 4th-element splat using SIMD shuffle/zip intrinsics analogous to the f32 implementations, removing the scalar array materialization.","locations":[{"ref":"sparse_strips/vello_common/src/simd.rs:46-56","code":"   46 | impl<S: Simd> Splat4thExt<S> for u8x16<S> {\n   47 |     #[inline(always)]\n   48 |     fn splat_4th(self) -> Self {\n   49 |         // TODO: SIMDify\n   50 |         [\n   51 |             self[3], self[3], self[3], self[3], self[7], self[7], self[7], self[7], self[11],\n   52 |             self[11], self[11], self[11], self[15], self[15], self[15], self[15],\n   53 |         ]\n   54 |         .simd_into(self.simd)\n   55 |     }\n   56 | }","lines":11},{"ref":"sparse_strips/vello_common/src/simd.rs:69-76","code":"   69 | /// Splat each single element in the vector to 4 lanes.\n   70 | #[inline(always)]\n   71 | pub fn element_wise_splat<S: Simd>(simd: S, input: f32x4<S>) -> f32x16<S> {\n   72 |     simd.combine_f32x8(\n   73 |         simd.combine_f32x4(f32x4::splat(simd, input[0]), f32x4::splat(simd, input[1])),\n   74 |         simd.combine_f32x4(f32x4::splat(simd, input[2]), f32x4::splat(simd, input[3])),\n   75 |     )\n   76 | }","lines":8}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`apply_extend` for `Extend::Repeat` computes `(val - val.floor()).fract()`. The result of `val - val.floor()` is already in [0, 1), so the trailing `.fract()` is a redundant no-op that adds an extra instruction in the gradient hot path. Present identically in lowp/gradient.rs and the shared common gradient module.","fix":"Drop the redundant `.fract()`: use `val - val.floor()`.","locations":[{"ref":"sparse_strips/vello_cpu/src/fine/lowp/gradient.rs:77","code":"   77 |         peniko::Extend::Repeat => (val - val.floor()).fract(),","lines":1}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`fill_path`, `stroke_path`, `fill_rect`, `stroke_rect`, and `fill_blurred_rounded_rect` all call `ctx.mask.clone()` on every draw. `Mask` wraps pixel buffers; cloning it per primitive (rather than passing by reference or `Arc`) is wasteful when a mask is set and many primitives are drawn under it.","fix":"Pass the mask by reference through the dispatcher trait, or store the mask as an `Arc<Mask>` so cloning is cheap.","locations":[{"ref":"sparse_strips/vello_cpu/src/render.rs:222","code":"  222 |                 ctx.mask.clone(),","lines":1},{"ref":"sparse_strips/vello_cpu/src/render.rs:239","code":"  239 |                 ctx.mask.clone(),","lines":1},{"ref":"sparse_strips/vello_cpu/src/render.rs:260","code":"  260 |                     ctx.mask.clone(),","lines":1},{"ref":"sparse_strips/vello_cpu/src/render.rs:291","code":"  291 |                 ctx.aliasing_threshold,","lines":1},{"ref":"sparse_strips/vello_cpu/src/render.rs:348","code":"  348 |             self.mask.clone(),","lines":1}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`render_encoding_coarse` allocates a fresh `let mut packed = vec![];` on every call (every frame). The `Resolver::resolve` clears and re-fills this buffer, so the allocation cannot be reused across frames and the scene byte buffer is reallocated and grown from scratch each render.","fix":"Retain the packed scene buffer (e.g. on `Render` or `Renderer`) and reuse it across frames so its backing allocation is amortized.","locations":[{"ref":"vello/src/render.rs:146","code":"  146 |         let mut packed = vec![];","lines":1}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`SingleThreadedDispatcher::reset` assigns `self.layer_id_next = 0` twice: once at line 683 and again at line 693 (with the comment 'Reset layer ID counter.'). The second assignment is redundant; the value is not modified between the two statements.","fix":"Remove the duplicate `self.layer_id_next = 0;` (and its comment) at the end of `reset`.","locations":[{"ref":"sparse_strips/vello_cpu/src/dispatch/single_threaded.rs:683","code":"  683 |         self.layer_id_next = 0;","lines":1},{"ref":"sparse_strips/vello_cpu/src/dispatch/single_threaded.rs:692-693","code":"  692 |         // Reset layer ID counter.\n  693 |         self.layer_id_next = 0;","lines":2}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`Compose::PlusLighter` silently falls back to `Plus` in both the u8 and f32 compose implementations. PlusLighter (lighter/additive without clamping difference) is mathematically distinct from Plus for non-premultiplied semantics; rendering it as Plus will produce subtly wrong results for content that requests PlusLighter, with no warning. This is consistent between lowp and highp, so at least it is not divergent, but it is an unimplemented blend mode masquerading as implemented.","fix":"Either implement the correct PlusLighter formula or document explicitly (and ideally surface at encode time) that PlusLighter is approximated by Plus.","locations":[{"ref":"sparse_strips/vello_cpu/src/fine/lowp/compose.rs:42-43","code":"   42 |             // Have not been able to find a formula for this, so just fallback to Plus.\n   43 |             Compose::PlusLighter => Plus::compose(simd, src_c, bg_c),","lines":2},{"ref":"sparse_strips/vello_cpu/src/fine/highp/compose.rs:57-58","code":"   57 |             // Have not been able to find a formula for this, so just fallback to Plus.\n   58 |             Compose::PlusLighter => Plus::compose(simd, src_c, bg_c),","lines":2}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`WebGlResources::filter_config_buffer` and the corresponding `filter_config_buffer` created in `create_webgl_resources` are allocated but never bound or written after creation; the filter strip config for filter layers uses `filter_config_buffer` only in `do_strip_render_pass` while filter passes themselves (`apply_filter`) never reference it. Verify whether `filter_config_buffer` is actually used; if not it is a leaked/unused GPU buffer. (Also `WebGlResources` holds `clear_config_buffer` written every `prepare` though it is config-invariant, noted by an existing TODO.)","fix":"Remove `filter_config_buffer` if it is genuinely unused, or wire it up where intended. Hoist the one-time `clear_config_buffer` upload out of `maybe_update_config_buffer`.","locations":[{"ref":"sparse_strips/vello_hybrid/src/render/webgl.rs:1039-1040","code":" 1039 |     /// Config buffer for rendering filter layers.\n 1040 |     filter_config_buffer: WebGlBuffer,","lines":2},{"ref":"sparse_strips/vello_hybrid/src/render/webgl.rs:2195","code":" 2195 |     let filter_config_buffer = gl.create_buffer().unwrap();","lines":1}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"RenderGraph::topological_sort is annotated `#[allow(dead_code)]` with a 'will use in future' reason and is only exercised by tests. It duplicates the dependency-ordering logic that execution_order already provides incrementally, so it is unused production code that must be kept correct in parallel with the real path.","fix":"Either remove until needed, or gate behind cfg(test) if it only serves to validate the incremental ordering in tests.","locations":[{"ref":"sparse_strips/vello_common/src/render_graph.rs:210-272","code":"  210 |     /// Topologically sort nodes based on their dependencies using Kahn's algorithm.\n  211 |     ///\n  212 |     /// Returns nodes in execution order, ensuring all dependencies are satisfied before\n  213 |     /// each node is processed. This implements a standard topological sort with cycle detection.\n  214 |     ///\n  215 |     /// # Performance\n  216 |     ///\n  217 |     /// This is primarily used for validation and debugging. For normal rendering,\n  218 |     /// prefer [`execution_order`](Self::execution_order) which is pre-computed during\n  219 |     /// scene encoding and avoids the O(V+E) sorting overhead.\n  220 |     ///\n  221 |     /// # Panics\n  222 |     ///\n  223 |     /// Panics if the graph contains a cycle, which should never happen in a valid render graph.\n  224 |     #[allow(\n  225 |         dead_code,\n  226 |         reason = \"we don't use currently topological sort but will in the future\"\n  227 |     )]\n  228 |     pub fn topological_sort(&self) -> Vec<NodeId> {\n  229 |         // Track how many incoming edges each node has (dependencies it's waiting for)\n  230 |         let mut in_degree = vec![0; self.nodes.len()];\n  231 | \n  232 |         // Map each node to its dependents (nodes that depend on it)\n  233 |         let mut adj_list: HashMap<NodeId, Vec<NodeId>> = HashMap::new();\n  234 | \n  235 |         // Build adjacency list and count incoming edges for each node\n  236 |         for edge in &self.edges {\n  237 |             adj_list.entry(edge.from).or_default().push(edge.to);\n  238 |             in_degree[edge.to] += 1;\n  239 |         }\n  240 | \n  241 |         // Start with nodes that have no dependencies (in-degree = 0)\n  242 |         // These are safe to execute immediately\n  243 |         let mut queue: Vec<NodeId> = (0..self.nodes.len())\n  244 |             .filter(|&i| in_degree[i] == 0)\n  245 |             .collect();\n  246 | \n  247 |         let mut result = Vec::new();\n  248 | \n  249 |         // Process nodes in dependency order (Kahn's algorithm)\n  250 |         while let Some(node_id) = queue.pop() {\n  251 |             result.push(node_id);\n  252 | \n  253 |             // For each node that depends on this one, mark this dependency as satisfied\n  254 |             if let Some(neighbors) = adj_list.get(&node_id) {\n  255 |                 for &neighbor in neighbors {\n  256 |                     in_degree[neighbor] -= 1;\n  257 |                     // If all dependencies are now satisfied, this node is ready to execute\n  258 |                     if in_degree[neighbor] == 0 {\n  259 |                         queue.push(neighbor);\n  260 |                     }\n  261 |                 }\n  262 |             }\n  263 |         }\n  264 | \n  265 |         // If we didn't process all nodes, there's a cycle (which should never happen)\n  266 |         assert_eq!(\n  267 |             result.len(),\n  268 |             self.nodes.len(),\n  269 |             \"Cycle detected in render graph\"\n  270 |         );\n  271 |         result\n  272 |     }","lines":63}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`pass_kind::COPY` is defined with `#[expect(dead_code, reason = \"Useful in the future\")]`. It is genuinely unused; the `#[expect]` documents intent so this is acceptable, but it is dead code that should be tracked so it does not silently rot if the planned use never materializes.","fix":"Either wire up the COPY pass or remove it; if kept, leave the `#[expect]` as-is (it is correctly annotated).","locations":[{"ref":"sparse_strips/vello_hybrid/src/filter.rs:102-104","code":"  102 | pub(crate) mod pass_kind {\n  103 |     #[expect(dead_code, reason = \"Useful in the future\")]\n  104 |     pub(crate) const COPY: u32 = 0;","lines":3}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment on `Wide::get_idx` says only the panic behavior, but the doc comments on `get`/`get_mut` are copy-pasted to say 'Get the index of the wide tile' even though they return a reference / mutable reference to the tile, not an index. Misleading documentation.","fix":"Fix the `get` and `get_mut` doc comments to describe returning a (mutable) reference to the wide tile, not 'the index'.","locations":[{"ref":"sparse_strips/vello_common/src/coarse.rs:449-463","code":"  449 |     /// Get the index of the wide tile at the given coordinates.\n  450 |     ///\n  451 |     /// Panics if the coordinates are out-of-range.\n  452 |     pub fn get(&self, x: u16, y: u16) -> &WideTile<MODE> {\n  453 |         let idx = self.get_idx(x, y);\n  454 |         &self.tiles[idx]\n  455 |     }\n  456 | \n  457 |     /// Get mutable access to the wide tile at the given coordinates.\n  458 |     ///\n  459 |     /// Panics if the coordinates are out-of-range.\n  460 |     fn get_mut(&mut self, x: u16, y: u16) -> &mut WideTile<MODE> {\n  461 |         let idx = self.get_idx(x, y);\n  462 |         &mut self.tiles[idx]\n  463 |     }","lines":15}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"filter_effects.rs module docs and FilterFunction docs claim only single-primitive filters are supported and FilterGraph execution is 'Not Yet Implemented'. FilterGraph::add accepts an `_inputs: Option<FilterInputs>` argument that is entirely ignored (underscore-prefixed and unused), so building any multi-input graph silently drops the connections. Callers passing inputs get no error and a graph that cannot represent their intent. This is an API footgun masked as a stub.","fix":"Either remove the `_inputs` parameter until graph execution exists, or store the inputs and have PreparedFilter/execution reject multi-primitive graphs explicitly (PreparedFilter::new already does via unimplemented!), and update the docs to state inputs are currently discarded.","locations":[{"ref":"sparse_strips/vello_common/src/filter_effects.rs:163-178","code":"  163 |     /// Add a filter primitive with optional inputs.\n  164 |     ///\n  165 |     /// Returns a `FilterId` that can be referenced by other primitives.\n  166 |     /// Automatically updates the accumulated bounds expansion based on the primitive's requirements.\n  167 |     pub fn add(&mut self, primitive: FilterPrimitive, _inputs: Option<FilterInputs>) -> FilterId {\n  168 |         let id = FilterId(self.next_id);\n  169 |         self.next_id += 1;\n  170 | \n  171 |         // Update accumulated expansion by taking the union of rects\n  172 |         let primitive_rect = primitive.expansion_rect();\n  173 |         self.expansion_rect = self.expansion_rect.union(primitive_rect);\n  174 | \n  175 |         self.primitives.push(primitive);\n  176 | \n  177 |         id\n  178 |     }","lines":16}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `set_alpha_idx` states 'the largest value that can be stored in the alpha index is `u32::MAX << 1`'. That is wrong: bit 31 is reserved for `fill_gap`, so the largest storable alpha index is `u32::MAX >> 1` (i.e. `0x7FFF_FFFF`), not `u32::MAX << 1` (which equals `0xFFFF_FFFE` and would actually set the reserved high bit, failing the assert).","fix":"Change the comment to `u32::MAX >> 1` (`0x7FFF_FFFF`).","locations":[{"ref":"sparse_strips/vello_common/src/strip.rs:65-66","code":"   65 |     /// Note that the largest value that can be stored in the alpha index is `u32::MAX << 1`, as the\n   66 |     /// highest bit is reserved for `fill_gap`.","lines":2}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `COST_THRESHOLD` is an incomplete sentence: 'finding a constant that seems to strike a reasonable trade-off between not causing too big batch sizes' - the clause is cut off ('...and not causing too small batches' or similar was clearly intended). It dangles and never states the second half of the trade-off.","fix":"Complete the sentence to describe both ends of the trade-off (large batches reduce parallelism / small batches add per-task overhead).","locations":[{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded/cost.rs:4-7","code":"    4 | /// There is not much science behind this constant. It was instead determined by doing profiling\n    5 | /// and finding a constant that seems to strike a reasonable trade-off between not causing too\n    6 | /// big batch sizes\n    7 | pub(crate) const COST_THRESHOLD: f32 = 250.0;","lines":4}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Comment says \"image cache used for used-uploaded images\" - \"used-uploaded\" is a typo for \"user-uploaded\".","fix":"Change \"used-uploaded\" to \"user-uploaded\".","locations":[{"ref":"sparse_strips/vello_hybrid/src/filter.rs:476","code":"  476 |     // Note that this image cache is separate from the image cache used for used-uploaded images.","lines":1}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Doc comment references a non-existent function `build_filer_passes` (typo for `build_filter_passes`).","fix":"Fix the typo: `build_filter_passes`.","locations":[{"ref":"sparse_strips/vello_hybrid/src/filter.rs:926","code":"  926 |         // However, in `do_scene`, we skip empty nodes as well, and thus `build_filer_passes` is never","lines":1}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Doc comment for `SUBPIXEL_BUCKETS` states 'valid range: 1-253', but `SUBPIXEL_COLR = SUBPIXEL_BUCKETS` and `SUBPIXEL_BITMAP = SUBPIXEL_BUCKETS + 1` are derived as sentinels. If `SUBPIXEL_BUCKETS` were set to 254, `SUBPIXEL_BITMAP` (255) is still representable, but at 255 it overflows u8. The stated upper bound 253 is correct but the reasoning (two sentinels above the range) is not spelled out where the constant is defined, making the magic 253 easy to break.","fix":"Add a const assertion (e.g. `const _: () = assert!(SUBPIXEL_BUCKETS <= 253);`) tying the documented bound to the two-sentinel requirement.","locations":[{"ref":"glifo/src/atlas/key.rs:20-36","code":"   20 | /// Number of horizontal subpixel quantization buckets (valid range: 1–253).\n   21 | ///\n   22 | /// Higher values improve rendering quality at the cost of more atlas entries\n   23 | /// per glyph. Common values: 1 (disabled), 2, 4 (default), 8.\n   24 | pub(crate) const SUBPIXEL_BUCKETS: u8 = 4;\n   25 | \n   26 | /// Sentinel `subpixel_x` for COLR glyph cache entries.\n   27 | ///\n   28 | /// `quantize_subpixel` returns values in `0..SUBPIXEL_BUCKETS`, so values\n   29 | /// above that range can never appear in an outline key. Using distinct\n   30 | /// sentinels for COLR and bitmap entries prevents cache collisions between\n   31 | /// glyph types that would otherwise produce identical keys (same font, glyph\n   32 | /// id, size, and color).\n   33 | pub(crate) const SUBPIXEL_COLR: u8 = SUBPIXEL_BUCKETS;\n   34 | \n   35 | /// Sentinel `subpixel_x` for bitmap glyph cache entries. See [`SUBPIXEL_COLR`].\n   36 | pub(crate) const SUBPIXEL_BITMAP: u8 = SUBPIXEL_BUCKETS + 1;","lines":17}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The debug_assert message in `is_nearly_zero_within_tolerance` says 'tolerance must be positive' but the check is `tolerance >= 0.0`, which permits zero. The message should say 'non-negative' to match the assertion.","fix":"Reword the message to 'tolerance must be non-negative'.","locations":[{"ref":"sparse_strips/vello_common/src/math.rs:44","code":"   44 |         debug_assert!(tolerance >= 0.0, \"tolerance must be positive\");","lines":1},{"ref":"sparse_strips/vello_common/src/math.rs:56","code":"   56 |         debug_assert!(tolerance >= 0.0, \"tolerance must be positive\");","lines":1}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The `render_graph` field is documented as 'unused in multi-threaded, only needed for API compatibility with Wide', but it is in fact mutated: `run_coarse` passes `&mut self.render_graph` to `self.wide.push_layer(...)` and `self.wide.pop_layer(...)`. Calling it 'unused' is misleading; it is a required, actively-written argument even if its contents are never consumed for output.","fix":"Reword the comment to 'written but its output is not consumed in multi-threaded mode' or note that it is a throwaway required by the `Wide` API.","locations":[{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:108-109","code":"  108 |     /// Render graph (unused in multi-threaded, only needed for API compatibility with Wide).\n  109 |     render_graph: RenderGraph,","lines":2},{"ref":"sparse_strips/vello_cpu/src/dispatch/multi_threaded.rs:329-342","code":"  329 |                                 self.wide.push_layer(\n  330 |                                     0,\n  331 |                                     clip_path,\n  332 |                                     blend_mode,\n  333 |                                     mask,\n  334 |                                     opacity,\n  335 |                                     None,\n  336 |                                     // Transform can be IDENTITY because filters aren't supported in multi-threaded mode\n  337 |                                     Affine::IDENTITY,\n  338 |                                     &mut self.render_graph,\n  339 |                                     thread_id,\n  340 |                                 );\n  341 |                             }\n  342 |                             CoarseTaskType::PopLayer => self.wide.pop_layer(&mut self.render_graph),","lines":14}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`convolve`'s doc comment refers to a buffer named `temp` (\"The `temp` buffer is provided by the caller\"), but the actual parameter is named `scratch`. Stale name in the documentation.","fix":"Rename `temp` to `scratch` in the doc comment to match the parameter.","locations":[{"ref":"sparse_strips/vello_cpu/src/filter/gaussian_blur.rs:107-123","code":"  107 | /// Apply separable Gaussian convolution with logical dimensions.\n  108 | ///\n  109 | /// Performs horizontal blur followed by vertical blur. Works with a logical view\n  110 | /// of the pixmap, using only the top-left region defined by width × height.\n  111 | /// The `temp` buffer is provided by the caller to avoid allocations.\n  112 | pub(crate) fn convolve(\n  113 |     src: &mut Pixmap,\n  114 |     scratch: &mut Pixmap,\n  115 |     width: u16,\n  116 |     height: u16,\n  117 |     kernel: &[f32],\n  118 |     radius: u8,\n  119 |     edge_mode: EdgeMode,\n  120 | ) {\n  121 |     convolve_x(src, scratch, width, height, kernel, radius, edge_mode);\n  122 |     convolve_y(scratch, src, width, height, kernel, radius, edge_mode);\n  123 | }","lines":17}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The `extend` function's `Reflect` branch comment claims 'This would yield NaN if `m` is 0 and `bias_in_ulps` > 0, but ... m_bits must be 0', explaining the wrapping bit subtraction. The reasoning relies on `max` always being an integer; this invariant is real but is asserted only in prose. If a non-integer `max` (image dimension) were ever passed, the bit-level subtraction could silently produce garbage floats rather than failing. Worth a debug_assert documenting the invariant rather than relying solely on a comment.","fix":"Add a `debug_assert!(max.fract() == 0.0)`-style guard (on the scalar dimension) so the integer-max invariant the comment depends on is enforced, not merely documented.","locations":[{"ref":"sparse_strips/vello_cpu/src/fine/common/image.rs:444-455","code":"  444 |             let bias_in_ulps = s.trunc();\n  445 | \n  446 |             let m_bits = u32x4::from_bytes(m.to_bytes());\n  447 |             // This would yield NaN if `m` is 0 and `bias_in_ulps` > 0, but since\n  448 |             // our `max` is always an integer number, u and s must also be an integer number\n  449 |             // and thus `m_bits` must be 0.\n  450 |             // Note that this is a wrapping sub!\n  451 |             let biased_bits = m_bits - bias_in_ulps.to_int::<u32x4<S>>();\n  452 |             f32x4::from_bytes(biased_bits.to_bytes())\n  453 |                 // In certain edge cases, we might still end up with a higher number.\n  454 |                 .min(max - 1.0)\n  455 |         }","lines":12}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc ar index; the invariant that ramps may cross rows is implicit and undocumented in this file, making it easy to introduce an off-by-row sampling bug. Same implicit contract applies to the filter-data texture (`required_filter_data_height`).","fix":"Document the linear-texel-index / row-straddling contract at the cache definition and in `required_filter_data_height`, and ensure the shaders' index reconstruction is referenced from here so the coupling is discoverable.","locations":[{"ref":"sparse_strips/vello_hybrid/src/gradient_cache.rs:84-93","code":"   84 |         // Generate new gradient LUT.\n   85 |         let lut_start = self.luts.len() as u32 / BYTES_PER_TEXEL;\n   86 |         let width = dispatch!(self.level, simd => generate_gradient_lut_impl(simd, gradient, &mut self.luts))\n   87 |             as u32;\n   88 |         let cached_ramp = CachedRamp { width, lut_start };\n   89 |         self.has_changed = true;\n   90 |         self.cache\n   91 |             .insert(gradient.cache_key.clone(), (cached_ramp, self.epoch));\n   92 | \n   93 |         (lut_start, width)","lines":10},{"ref":"sparse_strips/vello_hybrid/src/filter.rs:892-907","code":"  892 |     /// Calculate the required height for the filter data texture.\n  893 |     /// Returns `None` if no filters are present.\n  894 |     pub(crate) fn required_filter_data_height(&self, max_texture_dimension_2d: u32) -> Option<u32> {\n  895 |         let required_texels = self.total_texels();\n  896 | \n  897 |         if required_texels == 0 {\n  898 |             return None;\n  899 |         }\n  900 |         let height = required_texels.div_ceil(max_texture_dimension_2d);\n  901 |         debug_assert!(\n  902 |             height <= max_texture_dimension_2d,\n  903 |             \"Filter texture height exceeds max texture dimensions\"\n  904 |         );\n  905 | \n  906 |         Some(height)\n  907 |     }","lines":16}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`generate_gradient_lut_impl` calls `output.reserve(bytes.len())` immediately before `output.extend_from_slice(bytes)`. `extend_from_slice` already reserves exactly via the `TrustedLen`/`ExactSizeIterator` path, so the explicit `reserve` is redundant (a no-op that just duplicates capacity computation). Harmless but dead/redundant.","fix":"Drop the redundant `output.reserve(bytes.len());` line; `extend_from_slice` reserves on its own.","locations":[{"ref":"sparse_strips/vello_hybrid/src/gradient_cache.rs:283-284","code":"  283 |     output.reserve(bytes.len());\n  284 |     output.extend_from_slice(bytes);","lines":2}]}]</script>

const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
