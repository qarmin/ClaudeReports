<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `src/function/execute.rs` line 224-226, the code panics with no recovery if a query has\nnon-empty cycle heads, does NOT depend on itself, yet has no outer cycle:\n\n```\npanic!(\"cycle participant with non-empty cycle heads and that doesn't depend on itself must have\nan outer cycle responsible to finalize the query later...\")\n```\n\nThis is reachable through subtle multi-threaded scenarios where cycle topology changes between\niterations (for instance, if a conditional dependency causes a query to drop out of a cycle\nbetween two iterations). Although the cycle algorithm is designed to prevent this, any regression\nin the cycle-head tracking (e.g., a missing `collect_recursive` case) would surface here as a\nhard panic rather than a graceful error, with no information about what specific inputs or\nconfiguration triggered the situation.","fix":"Add more context to the panic message, including the specific cycle_heads contents and the current query's iteration state, to simplify debugging when this invariant is violated.","locations":[{"ref":"src/function/execute.rs:222-227","code":"  222 |             if !depends_on_self {\n  223 |                 let Some(outer_cycle) = outer_cycle else {\n  224 |                     panic!(\n  225 |                         \"cycle participant with non-empty cycle heads and that doesn't depend on itself must have an outer cycle responsible to finalize the query later (query: {database_key_index:?}, cycle heads: {cycle_heads:?}).\"\n  226 |                     );\n  227 |                 };","lines":6}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `src/function/execute.rs`, `collect_all_cycle_heads` -> `collect_recursive` at line 546 contains:\n`assert!(provisional_status.is_provisional());`\nThis panics with no user-facing message if a cycle head that was expected to still be provisional\nhas already been finalized (e.g., because another thread finalized it while the current thread\nwas in the middle of fixpoint iteration). The error message would be just the default assertion\nfailure with no explanation of which head became final unexpectedly. Although the comment at\nline 543-545 explains the invariant, the assertion carries no diagnostic message, making failures\nvery hard to debug.","fix":"Replace `assert!(provisional_status.is_provisional())` with `assert!(provisional_status.is_provisional(), \"expected cycle head {current_head:?} to still be provisional but it is {:?}\", provisional_status)` or similar to include the relevant key and status in the panic message.","locations":[{"ref":"src/function/execute.rs:543-546","code":"  543 |         // A query should only ever depend on other heads that are provisional.\n  544 |         // If this invariant is violated, it means that this query participates in a cycle,\n  545 |         // but it wasn't executed in the last iteration of said cycle.\n  546 |         assert!(provisional_status.is_provisional());","lines":4}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"During persistence deserialization, DeserializeIngredients::visit_map temporarily removes each ingredient with zalsa.take_ingredient(index) (which is Vec::remove), passes &mut zalsa to the ingredient's deserialize method, then restores it with zalsa.replace_ingredient(index, ingredient) (which is Vec::insert). If the ingredient's deserialize implementation panics or returns an error after take_ingredient, the ingredient is dropped permanently and ingredients_vec is left shorter by one, corrupting all subsequent index lookups for ingredients at positions > index. Error paths from access.next_value_seed return Err without restoring the ingredient.","fix":"Use a scopeguard or manually catch-and-restore: store the ingredient in a local, and ensure it is reinserted into ingredients_vec regardless of whether deserialize succeeds or fails (e.g., use std::panic::catch_unwind around the call, or restructure the borrow to avoid needing take/replace at all).","locations":[{"ref":"src/database.rs:343-363","code":"  343 |         fn visit_map<M>(self, mut access: M) -> Result<Self::Value, M::Error>\n  344 |         where\n  345 |             M: serde::de::MapAccess<'de>,\n  346 |         {\n  347 |             let DeserializeIngredients(zalsa) = self;\n  348 | \n  349 |             while let Some(index) = access.next_key::<u32>()? {\n  350 |                 let index = IngredientIndex::new(index);\n  351 | \n  352 |                 // Remove the ingredient temporarily, to avoid holding an overlapping mutable borrow\n  353 |                 // to the ingredient as well as the database.\n  354 |                 let mut ingredient = zalsa.take_ingredient(index);\n  355 | \n  356 |                 // Deserialize the ingredient.\n  357 |                 access.next_value_seed(DeserializeIngredient(&mut *ingredient, zalsa))?;\n  358 | \n  359 |                 zalsa.replace_ingredient(index, ingredient);\n  360 |             }\n  361 | \n  362 |             Ok(())\n  363 |         }","lines":21},{"ref":"src/zalsa.rs:409-418","code":"  409 |     pub fn take_ingredient(&mut self, index: IngredientIndex) -> Box<dyn Ingredient> {\n  410 |         self.ingredients_vec.remove(index.as_u32() as usize)\n  411 |     }\n  412 | \n  413 |     /// **NOT SEMVER STABLE**\n  414 |     #[doc(hidden)]\n  415 |     pub fn replace_ingredient(&mut self, index: IngredientIndex, ingredient: Box<dyn Ingredient>) {\n  416 |         self.ingredients_vec\n  417 |             .insert(index.as_u32() as usize, ingredient);\n  418 |     }","lines":10}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Multiple `.unwrap()` calls in `dependency_graph.rs` assume the invariant that every entry in\n`transferred` has a matching entry in `transferred_dependents` and vice versa. Specifically:\n- Line 179: `self.transferred_dependents.get_mut(&owner).unwrap()`\n- Line 190: `self.transferred_dependents.get_mut(&owner).unwrap()`\n- Lines 274, 305, 317: similar patterns inside `transfer_lock`\nIf this invariant is violated due to a race, a bug in the complex cycle-detection code, or\nany future maintenance change, these will panic with \"None\" inside code that holds the\n`dependency_graph` mutex, which may stall other threads indefinitely (the mutex will be\npoisoned or never unlocked cleanly depending on the sync backend).","fix":"Replace each `.unwrap()` with `.expect(\"invariant violated: transferred entry missing from transferred_dependents\")` to provide a clearer panic message, or use `if let Some(...)` guards and log/return an error if a missing entry can be tolerated.","locations":[{"ref":"src/runtime/dependency_graph.rs:177-180","code":"  177 |             self.transferred_dependents\n  178 |                 .get_mut(&owner)\n  179 |                 .unwrap()\n  180 |                 .remove(&database_key);","lines":4},{"ref":"src/runtime/dependency_graph.rs:187-191","code":"  187 |         if let Some((_, owner)) = self.transferred.remove(&database_key) {\n  188 |             self.transferred_dependents\n  189 |                 .get_mut(&owner)\n  190 |                 .unwrap()\n  191 |                 .remove(&database_key);","lines":5},{"ref":"src/runtime/dependency_graph.rs:272-275","code":"  272 |                 dg.transferred_dependents\n  273 |                     .get_mut(&old_owner)\n  274 |                     .unwrap()\n  275 |                     .remove(&query);","lines":4},{"ref":"src/runtime/dependency_graph.rs:303-306","code":"  303 |                         dg.transferred_dependents\n  304 |                             .get_mut(&query)\n  305 |                             .unwrap()\n  306 |                             .remove(&source);","lines":4},{"ref":"src/runtime/dependency_graph.rs:315-318","code":"  315 |                             dg.transferred_dependents\n  316 |                                 .get_mut(&old_owner)\n  317 |                                 .unwrap()\n  318 |                                 .push(source);","lines":4}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"PageIndex::new and SlotIndex::new use debug_assert for their bounds checks, so the checks are compiled out in release builds. make_id then casts PageIndex.0 (a usize) to u32 with as u32, which silently truncates on 64-bit systems if the page count ever exceeds u32::MAX (impossible with MAX_PAGES = 4M, but the truncation cast is present). More importantly, if the debug_assert for MAX_PAGES is the only guard, the Id encoding would be silently wrong in release if page count logic drifts. The Id::from_index call itself also uses a debug_assert.","fix":"Replace debug_assert with assert in PageIndex::new and SlotIndex::new, or add a release-mode check in make_id before the cast.","locations":[{"ref":"src/table.rs:133-138","code":"  133 | impl PageIndex {\n  134 |     #[inline]\n  135 |     fn new(idx: usize) -> Self {\n  136 |         debug_assert!(idx < MAX_PAGES);\n  137 |         Self(idx)\n  138 |     }","lines":6},{"ref":"src/table.rs:149-155","code":"  149 | impl SlotIndex {\n  150 |     #[inline]\n  151 |     fn new(idx: usize) -> Self {\n  152 |         debug_assert!(idx < PAGE_LEN);\n  153 |         Self(idx)\n  154 |     }\n  155 | }","lines":7},{"ref":"src/table.rs:538-543","code":"  538 | fn make_id(page: PageIndex, slot: SlotIndex) -> Id {\n  539 |     let page = page.0 as u32;\n  540 |     let slot = slot.0 as u32;\n  541 |     // SAFETY: `slot` is guaranteed to be small enough that the resulting Id won't be bigger than `Id::MAX_U32`\n  542 |     unsafe { Id::from_index((page << PAGE_LEN_BITS) | slot) }\n  543 | }","lines":6}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`pop_active_query` in `QueryStack` (src/active_query.rs line 421) decrements `self.len`\nprotected only by a `debug_assert_ne!(self.len, 0, ...)` which is stripped in release\nbuilds. A mismatched push/pop would cause `self.len` (a `usize`) to wrap to `usize::MAX`,\nfollowed by an out-of-bounds index `self.stack[usize::MAX]` which panics with a different,\nharder-to-diagnose message than the original intent.","fix":"Replace `debug_assert_ne!` with a release-mode `assert_ne!`, or use `self.len.checked_sub(1).expect(\"too many pops\")` to catch the underflow clearly.","locations":[{"ref":"src/active_query.rs:418-425","code":"  418 |         #[cfg(debug_assertions)]\n  419 |         assert_eq!(push_len, self.len(), \"unbalanced push/pop\");\n  420 |         debug_assert_ne!(self.len, 0, \"too many pops\");\n  421 |         self.len -= 1;\n  422 |         let active_query = &mut self.stack[self.len];\n  423 |         debug_assert_eq!(active_query.database_key_index, key, \"unbalanced push/pop\");\n  424 |         active_query\n  425 |     }","lines":8}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Revision::next()` in `src/revision.rs` (line 49) computes `self.generation.get() + 1`\nusing a plain addition. In debug builds this panics on overflow at `usize::MAX` revisions.\nIn release builds the addition wraps to 0 and then `Self::from(0)` immediately panics\nbecause `NonZeroUsize::new(0).unwrap()` fails. While `usize::MAX` revisions is\nunreachable in practice, the addition is not guarded. `new_revision` (runtime.rs:286)\ncalls `r_old.next()` without checking for overflow.","fix":"Add an overflow check in `new_revision` or in `Revision::next`, for example: `Self::from(self.generation.get().checked_add(1).expect(\"revision counter overflow\"))`.","locations":[{"ref":"src/runtime.rs:285-290","code":"  285 |         let r_old = self.current_revision();\n  286 |         let r_new = r_old.next();\n  287 |         self.revisions[0] = r_new;\n  288 |         *self.cancellation_count.get_mut() = 0;\n  289 |         crate::tracing::info!(\"new_revision: {r_old:?} -> {r_new:?}\");\n  290 |         r_new","lines":6}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"Update::maybe_update for fixed-size arrays [T; N] takes the address of element 0 via addr_of_mut!((*old_pointer)[0]) before the iteration loop. For N=0 this evaluates an out-of-bounds array index, which panics even inside an unsafe block because Rust array indexing always bounds-checks. Any tracked struct that contains a [SomeType; 0] field would trigger this panic when the tracked function recomputes.","fix":"Guard the address computation: if N == 0 { return false; }. Or use old_pointer.cast::<T>() directly since the pointer arithmetic is already correct for arrays.","locations":[{"ref":"src/update.rs:432-444","code":"  432 | unsafe impl<T, const N: usize> Update for [T; N]\n  433 | where\n  434 |     T: Update,\n  435 | {\n  436 |     unsafe fn maybe_update(old_pointer: *mut Self, new_vec: Self) -> bool {\n  437 |         let old_pointer: *mut T = unsafe { std::ptr::addr_of_mut!((*old_pointer)[0]) };\n  438 |         let mut changed = false;\n  439 |         for (new_element, i) in new_vec.into_iter().zip(0..) {\n  440 |             changed |= unsafe { T::maybe_update(old_pointer.add(i), new_element) };\n  441 |         }\n  442 |         changed\n  443 |     }\n  444 | }","lines":13}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"Zalsa::ingredient_index_for_memo performs two unchecked slice indexing operations. If called with a struct_ingredient_index that has no entry in memo_ingredient_indices, or with a memo_ingredient_index that is out of bounds for that entry, it panics. These panics are reachable if an ingredient is queried with a mismatched memo index, which can happen during deserialization or when a tracked function from one database is applied to an id from another.","fix":"Return an Option<IngredientIndex> and let callers handle the missing-index case, or add an explicit bounds check with a descriptive panic message.","locations":[{"ref":"src/zalsa.rs:272-279","code":"  272 |     pub(crate) fn ingredient_index_for_memo(\n  273 |         &self,\n  274 |         struct_ingredient_index: IngredientIndex,\n  275 |         memo_ingredient_index: MemoIngredientIndex,\n  276 |     ) -> IngredientIndex {\n  277 |         self.memo_ingredient_indices[struct_ingredient_index.as_u32() as usize]\n  278 |             [memo_ingredient_index.as_usize()]\n  279 |     }","lines":8}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`DisambiguatorMap::disambiguate` (tracked_struct.rs line 459) increments the `Disambiguator(u32)`\ncounter with `disambiguator.0 += 1`. In release mode this wraps silently on overflow. If a single\nquery creates more than 2^32 tracked structs with the same `IdentityHash`, the disambiguator wraps\nto 0, producing an `Identity` that collides with a previously created struct. The colliding struct\nwould be silently reused rather than having a fresh slot allocated, yielding incorrect field values\nfrom the stale struct. In debug mode the overflow panics instead. The value 2^32 is unrealistic in\npractice but the absence of a check makes the silent corruption unbounded.","fix":"Use `disambiguator.0 = disambiguator.0.wrapping_add(1)` with an explicit note, or `checked_add` with a panic/error on overflow.","locations":[{"ref":"src/tracked_struct.rs:459","code":"  459 |         disambiguator.0 += 1;","lines":1}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"IngredientIndex::successor does no bounds checking. It computes self.0 + 1 + index as u32 with unchecked arithmetic. In release builds this wraps silently on overflow. The cast of the usize argument to u32 also silently truncates on 64-bit targets when index > u32::MAX. Any code path that adds many field-successor ingredients to a struct approaching MAX_INDEX will produce a corrupted ingredient index that silently aliases an existing ingredient.","fix":"Add bounds checking: assert that self.0.checked_add(1 + index as u32).unwrap() <= Self::MAX_INDEX, or use saturating/checked arithmetic and return Result.","locations":[{"ref":"src/zalsa.rs:102-104","code":"  102 |     pub fn successor(self, index: usize) -> Self {\n  103 |         IngredientIndex(self.0 + 1 + index as u32)\n  104 |     }","lines":3}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`seed_iteration` in `ActiveQuery` calls `self.disambiguator_map.seed(...)` twice with the\nsame `active_tracked_ids` iterator (lines 87-88 and 93-94). `DisambiguatorMap::seed` calls\n`disambiguate` for each identity, which increments the counter for that hash. Calling seed\ntwice on the same data doubles every counter so the first real disambiguator returned during\nthe iteration will be `n` instead of 0 (where `n` is the number of identities with the same\nhash seen in the previous iteration). This causes newly created tracked structs to receive\nwrong disambiguators, breaking identity-based struct reuse across cycle iterations.","fix":"Remove the second call to `self.disambiguator_map.seed(...)` at lines 93-94. The first call (lines 87-88) is sufficient and was inserted before `mark_all_active` by mistake when the two blocks were refactored.","locations":[{"ref":"src/active_query.rs:87-94","code":"   87 |         self.disambiguator_map\n   88 |             .seed(active_tracked_ids.iter().map(|(id, _)| id));\n   89 | \n   90 |         // Mark all tracked structs from the previous iteration as active.\n   91 |         self.tracked_struct_ids\n   92 |             .mark_all_active(active_tracked_ids.iter().copied());\n   93 |         self.disambiguator_map\n   94 |             .seed(active_tracked_ids.iter().map(|(id, _)| id));","lines":8}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`RevisionQueue::record_cold` has a TOCTOU race. The fast-path in `record` checks\n`self.revisions[0].load() >= revision` without holding the lock, then calls `record_cold`\nwhich acquires the lock but does NOT re-check the condition. When two threads concurrently\nenter a new revision they can both pass the fast-path and both call `record_cold`. The second\ncaller shifts the queue again, duplicating the current revision: e.g. the queue becomes\n[R3, R3, R0] instead of [R3, R0, R1]. The comment on line 1128 says \"this should only happen\nonce per revision\" - but that is aspirational, not enforced. The corrupted queue makes `is_stale`\nreturn true too early, allowing the LRU garbage collector to evict interned values that are only\none revision old, violating the `REVISIONS` contract and producing use-after-free IDs.","fix":"Add a re-check of the condition after acquiring the lock: if self.revisions[0].load() >= revision { return; }","locations":[{"ref":"src/interned.rs:1122-1134","code":" 1122 |     #[cold]\n 1123 |     fn record_cold(&self, revision: Revision) {\n 1124 |         let _lock = self.lock.lock();\n 1125 | \n 1126 |         // Otherwise, update the queue, maintaining sorted order.\n 1127 |         //\n 1128 |         // Note that this should only happen once per revision.\n 1129 |         for i in (1..C::REVISIONS.get()).rev() {\n 1130 |             self.revisions[i].store(self.revisions[i - 1].load());\n 1131 |         }\n 1132 | \n 1133 |         self.revisions[0].store(revision);\n 1134 |     }","lines":13}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `components/salsa-macros/src/debug.rs`, the `dump_tokens` function (lines 19-43)\nspawns `rustfmt` with a piped stdin, writes the token string to stdin, then calls\n`wait_with_output()` - but the stdin `Write` handle is still alive inside the closure\nat the point `wait_with_output()` is called. `rustfmt` may block waiting for EOF on\nstdin while this process blocks in `wait_with_output()`. This creates a potential\ndeadlock or hang during macro expansion when `SALSA_DEBUG_MACRO` is set. The issue\noccurs because the `take()`-returned stdin value is not explicitly dropped before\n`wait_with_output`.","fix":"Drop stdin explicitly before waiting:\n  let mut stdin_handle = rustfmt.stdin.take().unwrap();\n  stdin_handle.write_all(token_string.as_bytes())?;\n  drop(stdin_handle);\n  rustfmt.wait_with_output()","locations":[{"ref":"components/salsa-macros/src/debug.rs:27-34","code":"   27 |             .and_then(|mut rustfmt| {\n   28 |                 rustfmt\n   29 |                     .stdin\n   30 |                     .take()\n   31 |                     .unwrap()\n   32 |                     .write_all(token_string.as_bytes())?;\n   33 |                 rustfmt.wait_with_output()\n   34 |             })","lines":8}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `tracked_fn.rs`, the cycle_recovery match arm `(_, _, Some(_))` calls\n`self.args.cycle_initial.as_ref().unwrap()` to get the span for the error message,\nbut `cycle_initial` can be `None` when the pattern is `(Some(cycle_fn), None, Some(cycle_result))`.\nIn that case, `.unwrap()` panics inside the proc-macro at compile time instead of\nemitting a proper diagnostic. The user sees a proc-macro panic rather than a friendly error.","fix":"Use `self.args.cycle_fn.as_ref().or(self.args.cycle_initial.as_ref()).unwrap()` or attach the error to `self.args.cycle_result.as_ref().unwrap()` (which is always `Some` in this arm) instead.","locations":[{"ref":"components/salsa-macros/src/tracked_fn.rs:298-301","code":"  298 |             (_, _, Some(_)) => Err(syn::Error::new_spanned(\n  299 |                 self.args.cycle_initial.as_ref().unwrap(),\n  300 |                 \"must provide either `cycle_result` or `cycle_fn` & `cycle_initial`, not both\",\n  301 |             )),","lines":4}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`add_untracked_read` in `ActiveQuery` (line 141) assigns `self.changed_at = changed_at`\nunconditionally instead of using `self.changed_at = self.changed_at.max(changed_at)`.\nIf a tracked read with a high revision was already recorded and then an untracked read is\nreported, the `changed_at` could be lowered to `current_revision` of an earlier point in the\nsame query. In practice every caller passes `zalsa.current_revision()` which is always\nmonotonically increasing, so the assignment never lowers the value today. However the\nfunction's contract does not document this assumption, making the behavior fragile if a\ncaller ever passes a non-current revision.","fix":"Change the assignment to `self.changed_at = self.changed_at.max(changed_at);` to match the pattern used in `add_read` and `add_read_simple`.","locations":[{"ref":"src/active_query.rs:138-142","code":"  138 |     pub(super) fn add_untracked_read(&mut self, changed_at: Revision) {\n  139 |         self.untracked_read = true;\n  140 |         self.durability = Durability::MIN;\n  141 |         self.changed_at = changed_at;\n  142 |     }","lines":5}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`backdate_if_appropriate` in `src/function/backdate.rs` contains an acknowledged bandaid with\nan unresolved TODO. The comment (lines 22-26) says the function skips backdating for cycle\nparticipants because \"we're close to a release and don't have the time to prove right now whether\nbackdating could be made safe.\" The TODO asks for either a test showing it is unsafe OR tests\nproving it safe. This means backdating is simply disabled for all cycle-touching queries, even\nwhen it would be safe to do so, causing unnecessary incremental recomputation (stale-green queries\nare not backdated and their dependents re-execute unnecessarily). The root cause is never diagnosed.","fix":"Investigate whether backdating is safe when (a) the new memo's cycle_heads are empty (the query\nis now outside any cycle) and (b) the old memo was also not provisional. Write targeted tests for\nconditional cycle membership, then either restore backdating under those conditions or document\nprecisely why it cannot be done.","locations":[{"ref":"src/function/backdate.rs:22-29","code":"   22 |         // We've seen issues where queries weren't re-validated when backdating provisional values\n   23 |         // in ty. This is more of a bandaid because we're close to a release and don't have the time to prove\n   24 |         // right now whether backdating could be made safe for queries participating in queries.\n   25 |         // TODO: Write a test that demonstrates that backdating queries participating in a cycle isn't safe\n   26 |         // OR write many tests showing that it is (and fixing the case where it didn't correctly account for today).\n   27 |         if !revisions.cycle_heads().is_empty() || old_memo.may_be_provisional() {\n   28 |             return;\n   29 |         }","lines":8}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `src/function/fetch.rs`, `fetch_cold` at lines 130-155, when `deep_verify_memo` returns\n`Unchanged`, the memo is returned without notifying the eviction policy (`self.eviction.record_use`).\nThe `record_use` call is in `fetch` (line 34) after `refresh_memo` returns, so evictions ARE\nrecorded for the final returned memo. However, `fetch_cold` returns the memo via `refresh_memo`,\nand `record_use` fires correctly in `fetch`. This flow is safe.\n\nBUT: in `maybe_changed_after_cold` (src/function/maybe_changed_after.rs lines 126-241), when the\nmethod validates and returns a memo result, `record_use` is never called at all. This means that\nmemos verified via `maybe_changed_after` do not update the eviction LRU, so frequently-read\nintermediate nodes (read only through dependency edges, not fetched directly) are more likely to\nbe evicted than their access frequency warrants.","fix":"Consider calling `self.eviction.record_use(key_index)` after successfully verifying a memo in\n`maybe_changed_after_cold` (both in the shallow and deep verify paths). This ensures that\nmemos which are valid via dependency traversal still benefit from LRU promotion.","locations":[{"ref":"src/function/maybe_changed_after.rs:126-241","code":"  126 |     #[inline(never)]\n  127 |     fn maybe_changed_after_cold<'db>(\n  128 |         &'db self,\n  129 |         zalsa: &Zalsa,\n  130 |         zalsa_local: &ZalsaLocal,\n  131 |         db: &'db C::DbView,\n  132 |         key_index: Id,\n  133 |         revision: Revision,\n  134 |         memo_ingredient_index: MemoIngredientIndex,\n  135 |     ) -> Option<VerifyResult> {\n  136 |         let database_key_index = self.database_key_index(key_index);\n  137 | \n  138 |         let claim_guard =\n  139 |             match self\n  140 |                 .sync_table\n  141 |                 .try_claim(zalsa, zalsa_local, key_index, Reentrancy::Deny)\n  142 |             {\n  143 |                 ClaimResult::Claimed(guard) => guard,\n  144 |                 ClaimResult::Running(blocked_on) => {\n  145 |                     let _ = blocked_on.block_on(zalsa);\n  146 |                     return None;\n  147 |                 }\n  148 |                 ClaimResult::Cycle { .. } => {\n  149 |                     return Some(maybe_changed_after_cold_cycle(\n  150 |                         zalsa_local,\n  151 |                         database_key_index,\n  152 |                         C::CYCLE_STRATEGY,\n  153 |                     ));\n  154 |                 }\n  155 |             };\n  156 |         // Load the current memo, if any.\n  157 |         let Some(old_memo) = self.get_memo_from_table_for(zalsa, key_index, memo_ingredient_index)\n  158 |         else {\n  159 |             return Some(VerifyResult::changed());\n  160 |         };\n  161 | \n  162 |         crate::tracing::debug!(\n  163 |             \"{database_key_index:?}: maybe_changed_after_cold, successful claim, \\\n  164 |                 revision = {revision:?}, old_memo = {old_memo:#?}\",\n  165 |             old_memo = old_memo.tracing_debug()\n  166 |         );\n  167 | \n  168 |         let can_shallow_update = self.shallow_verify_memo(zalsa, database_key_index, old_memo);\n  169 |         if can_shallow_update.yes()\n  170 |             && self.validate_may_be_provisional(zalsa, zalsa_local, database_key_index, old_memo)\n  171 |         {\n  172 |             self.update_shallow(zalsa, database_key_index, old_memo, can_shallow_update);\n  173 | \n  174 |             return Some(if old_memo.revisions.changed_at > revision {\n  175 |                 VerifyResult::changed()\n  176 |             } else {\n  177 |                 VerifyResult::unchanged_with_accumulated(\n  178 |                     #[cfg(feature = \"accumulator\")]\n  179 |                     {\n  180 |                         old_memo.revisions.accumulated_inputs.load()\n  181 |                     },\n  182 |                 )\n  183 |             });\n  184 |         }\n  185 | \n  186 |         let deep_verify = self.deep_verify_memo(db, zalsa, old_memo, database_key_index);\n  187 | \n  188 |         if let VerifyResult::Unchanged {\n  189 |             #[cfg(feature = \"accumulator\")]\n  190 |             accumulated,\n  191 |         } = deep_verify\n  192 |         {\n  193 |             // Check if the inputs are still valid. We can just compare `changed_at`.\n  194 |             return Some(if old_memo.revisions.changed_at > revision {\n  195 |                 VerifyResult::changed()\n  196 |             } else {\n  197 |                 // Propagate accumulated values from inputs *and* from this memo itself.\n  198 |                 // Without the own-accumulated check, a caller querying accumulated values\n  199 |                 // would see `Empty` and skip traversing into this subtree even though\n  200 |                 // this memo directly pushed accumulated values.\n  201 |                 VerifyResult::unchanged_with_accumulated(\n  202 |                     #[cfg(feature = \"accumulator\")]\n  203 |                     {\n  204 |                         if old_memo.revisions.accumulated().is_some() {\n  205 |                             InputAccumulatedValues::Any\n  206 |                         } else {\n  207 |                             accumulated\n  208 |                         }\n  209 |                     },\n  210 |                 )\n  211 |             });\n  212 |         }\n  213 | \n  214 |         // If inputs have changed, but we have an old value, we can re-execute.\n  215 |         // It is possible the result will be equal to the old value and hence\n  216 |         // backdated. In that case, although we will have computed a new memo,\n  217 |         // the value has not logically changed.\n  218 |         if old_memo.value.is_some() && !old_memo.may_be_provisional() {\n  219 |             let memo = self.execute(db, claim_guard, Some(old_memo))?;\n  220 |             let changed_at = memo.revisions.changed_at;\n  221 | \n  222 |             // Always assume that a provisional value has changed.\n  223 |             //\n  224 |             // We don't know if a provisional value has actually changed. To determine whether a provisional\n  225 |             // value has changed, we need to iterate the outer cycle, which cannot be done here.\n  226 |             return Some(if changed_at > revision || memo.may_be_provisional() {\n  227 |                 VerifyResult::changed()\n  228 |             } else {\n  229 |                 VerifyResult::unchanged_with_accumulated(\n  230 |                     #[cfg(feature = \"accumulator\")]\n  231 |                     match memo.revisions.accumulated() {\n  232 |                         Some(_) => InputAccumulatedValues::Any,\n  233 |                         None => memo.revisions.accumulated_inputs.load(),\n  234 |                     },\n  235 |                 )\n  236 |             });\n  237 |         }\n  238 | \n  239 |         // Otherwise, nothing for it: have to consider the value to have changed.\n  240 |         Some(VerifyResult::changed())\n  241 |     }","lines":116}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"MemoTableTypes::set calls Vec::insert(index, value) instead of Vec::push(value). Because next_memo_ingredient_index always hands out indices equal to the current length of the vector, using Vec::insert is functionally identical to push when called in order. However, if called out of order (index > len), Vec::insert panics. Using push would be both clearer and avoids a latent panic when the calling order assumption is violated. The method is named 'set' implying idempotent slot assignment, but Vec::insert shifts existing elements rather than overwriting a slot.","fix":"Replace self.types.insert(memo_ingredient_index.as_usize(), memo_type) with self.types.push(memo_type) and add a debug_assert that memo_ingredient_index.as_usize() == self.types.len() before the push.","locations":[{"ref":"src/table/memo.rs:144-151","code":"  144 |     pub(crate) fn set(\n  145 |         &mut self,\n  146 |         memo_ingredient_index: MemoIngredientIndex,\n  147 |         memo_type: MemoEntryType,\n  148 |     ) {\n  149 |         self.types\n  150 |             .insert(memo_ingredient_index.as_usize(), memo_type);\n  151 |     }","lines":8}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`IngredientImpl<C>::memory_usage` in `src/tracked_struct.rs` (lines 1043-1052) iterates\n`self.entries(db.zalsa())` and calls `entry.value.memory_usage(...)` on each entry without\nacquiring the per-value read lock (`acquire_read_lock` / `lock_fields`). Reading `value.fields`\nand `value.memos` while another thread could be inside `update()` (which swaps `updated_at` to\n`None` and writes to `fields`) is unsound even with field-level atomics, because `C::Fields<'_>`\nis not necessarily composed of atomics. The analogous `memory_usage` in `src/interned.rs`\ncorrectly acquires all shard locks before iterating (lines 982-999). This inconsistency is a data\nrace in the salsa_unstable feature that can produce garbage reads or memory-safety violations when\nthe database is used concurrently.","fix":"Either restrict memory_usage to single-threaded contexts (take &mut self or require &mut Zalsa), or call `acquire_read_lock` for each entry before accessing its fields.","locations":[{"ref":"src/tracked_struct.rs:1043-1052","code":" 1043 |     fn memory_usage(&self, db: &dyn crate::Database) -> Option<Vec<crate::database::SlotInfo>> {\n 1044 |         let memory_usage = self\n 1045 |             .entries(db.zalsa())\n 1046 |             // SAFETY: The memo table belongs to a value that we allocated, so it\n 1047 |             // has the correct type.\n 1048 |             .map(|entry| unsafe { entry.value.memory_usage(&self.memo_table_types) })\n 1049 |             .collect();\n 1050 | \n 1051 |         Some(memory_usage)\n 1052 |     }","lines":10}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In Zalsa::evict_lru, reset_for_new_revision is called on every ingredient that requires reset, but the method name implies a new revision has started when one has not. The actual eviction code in IngredientImpl::reset_for_new_revision calls eviction.for_each_evicted and clears deleted_entries. Calling this without a preceding new_revision() means evicted entries are dropped in the current revision, which can cause memos to disappear mid-revision if trigger_lru_eviction is called between query accesses. The Database::trigger_lru_eviction doc says it 'triggers cancellation' like an ordinary write, but it does not bump the revision counter, so stale memos from the evicted entries may be re-computed with a revision number that predates the eviction.","fix":"Either (a) call self.runtime.new_revision() inside evict_lru before running resets so the revision is advanced and caches are properly invalidated, or (b) document explicitly that LRU eviction is safe mid-revision and verify the eviction logic handles this case.","locations":[{"ref":"src/zalsa.rs:451-457","code":"  451 |     pub fn evict_lru(&mut self) {\n  452 |         let _span = crate::tracing::debug_span!(\"evict_lru\").entered();\n  453 |         for ingredient in &self.ingredients_requiring_reset {\n  454 |             self.ingredients_vec[ingredient.as_u32() as usize]\n  455 |                 .reset_for_new_revision(self.runtime.table_mut());\n  456 |         }\n  457 |     }","lines":7},{"ref":"src/database.rs:44-47","code":"   44 |     fn trigger_lru_eviction(&mut self) {\n   45 |         let zalsa_mut = self.zalsa_mut();\n   46 |         zalsa_mut.evict_lru();\n   47 |     }","lines":4}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `components/salsa-macro-rules/src/setup_tracked_fn.rs` (lines 158-160), the\ngenerated `SalsaStructInDb::lookup_ingredient_index` implementation for `InternedData`\nreturns `IngredientIndices::empty()`. This is used when `needs_interner` is true,\ni.e. for tracked functions with multiple arguments that intern their inputs. The\n`IngredientIndices::empty()` result is never used in `create_ingredients` (that branch\nuses `first_index.successor(0).into()` directly), but the `SalsaStructInDb` contract\nimplies `lookup_ingredient_index` should return the ingredient indices that correspond\nto this struct type. Returning `empty()` breaks any external code that relies on\n`SalsaStructInDb::lookup_ingredient_index` for `InternedData` (e.g., supertype enum\nmerging). Since `InternedData` is private and only used internally this is low risk,\nbut the contract violation is still present.","fix":"Return the actual intern ingredient index: `$zalsa::IngredientIndices::from(zalsa.lookup_jar_by_type::<$fn_name>().successor(0))`, or add a comment explaining why `empty()` is intentional and safe for this specific internal use.","locations":[{"ref":"components/salsa-macro-rules/src/setup_tracked_fn.rs:158-160","code":"  158 |                         fn lookup_ingredient_index(aux: &$zalsa::Zalsa) -> $zalsa::IngredientIndices {\n  159 |                             $zalsa::IngredientIndices::empty()\n  160 |                         }","lines":3}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `options.rs`, the `id` option parser (line 482) silently overwrites a previously\nset value with `options.id = Some(path)` rather than returning a duplicate-option error.\nEvery other option in the same parser uses `replace(...)` and returns an error when\na duplicate is found (e.g. `returns`, `no_eq`, `cycle_fn`, etc.). The `id` option is the\nonly one that silently accepts a second specification without complaint, making user typos\nharder to detect.","fix":"Replace `options.id = Some(path)` with `if let Some(old) = options.id.replace(path) { return Err(syn::Error::new(old.span(), \"option `id` provided twice\")); }` to match all other options.","locations":[{"ref":"components/salsa-macros/src/options.rs:478-488","code":"  478 |             } else if ident == \"id\" {\n  479 |                 if A::ID {\n  480 |                     let _eq = Equals::parse(input)?;\n  481 |                     let path = syn::Path::parse(input)?;\n  482 |                     options.id = Some(path);\n  483 |                 } else {\n  484 |                     return Err(syn::Error::new(\n  485 |                         ident.span(),\n  486 |                         \"`id` option not allowed here\",\n  487 |                     ));\n  488 |                 }","lines":11}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`IngredientImpl::from_zalsa` in `src/accumulator.rs` is declared to return\n`Option<&Self>` but never actually returns `None`. Internally it calls\n`zalsa.lookup_jar_by_type::<JarImpl<A>>()` which panics if the accumulator is not\nregistered, and then `assert_type::<Self>()` which panics on type mismatch. The only\npossible return value is `Some(ingredient)`. The misleading signature causes the call\nsite in `function/accumulated.rs:34` to handle a dead `None` branch with `return vec![]`.","fix":"Change the return type to `&Self` and remove the `Some()` wrapping, or add an actual `None` path by using a fallible lookup. Update the call site accordingly.","locations":[{"ref":"src/accumulator.rs:66-70","code":"   66 |     pub fn from_zalsa(zalsa: &Zalsa) -> Option<&Self> {\n   67 |         let index = zalsa.lookup_jar_by_type::<JarImpl<A>>();\n   68 |         let ingredient = zalsa.lookup_ingredient(index).assert_type::<Self>();\n   69 |         Some(ingredient)\n   70 |     }","lines":5}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `attach.rs`, the `None` branch of `attach_allow_change`'s inner `DbGuard::new`\nperforms a redundant double-write to the cell. `Cell::replace(Some(db))` on line 111\nalready sets the cell to `Some(db)` and returns the old value. When the old value is\n`None`, line 130 then calls `attached.database.set(Some(db))` again, re-writing the\nsame value that `replace` already stored. This is harmless but confusing.","fix":"Remove line 130 (`attached.database.set(Some(db));`). The `replace` call on line 111 already set the value correctly.","locations":[{"ref":"src/attach.rs:128-135","code":"  128 |                     // No database is attached, attach the new one.\n  129 |                     None => {\n  130 |                         attached.database.set(Some(db));\n  131 |                         Self {\n  132 |                             state: Some(attached),\n  133 |                             prev: None,\n  134 |                         }\n  135 |                     }","lines":8}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `src/function/execute.rs`, `try_complete_cycle_head` at lines 656-660, the `metadata_converged`\ncheck compares `durability`, `changed_at`, and `is_derived_untracked`. However, it does NOT\naccount for changes in the `tracked_struct_ids` set. If a cycle head produces different tracked\nstructs in two consecutive iterations (same values, same durability, same changed_at, but different\ntracked struct id assignments), `metadata_converged` would be `true` and convergence would be\ndeclared even though the tracked struct identity has changed. In practice, tracked struct ids are\nseeded across iterations (see `execute_query` line 376) to preserve identity, so the ids should\nbe stable. But if the seeding fails to cover a struct that is conditionally created, the cycle\ncould terminate with an incorrect id assignment. This is a potential correctness concern rather\nthan a confirmed bug.","fix":"Document why `tracked_struct_ids` differences do not need to be part of the convergence check, or add a `debug_assert` that tracked struct ids are stable after convergence is declared.","locations":[{"ref":"src/function/execute.rs:656-660","code":"  656 |     let metadata_converged = last_provisional_revisions.durability\n  657 |         == completed_query.revisions.durability\n  658 |         && last_provisional_revisions.changed_at == completed_query.revisions.changed_at\n  659 |         && last_provisional_revisions.is_derived_untracked()\n  660 |             == completed_query.revisions.is_derived_untracked();","lines":5}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`report_tracked_write` (runtime.rs line 229) fills `self.revisions[1..=durability.index()]`.\nWhen `durability` is `Durability::LOW` (index 0), this range `1..=0` is empty and nothing\nis updated. This works correctly because `revisions[0]` is the current revision and\n`last_changed_revision(Durability::LOW)` returns `revisions[0]`, which always reflects the\nlatest revision after `new_revision()`. However, the comment at line 224-226 says \"update\nthe 'last changed at' values for every durability less than or equal to `durability`\" which\nis misleading: `revisions[0]` (for LOW) is never explicitly written by this function.","fix":"Clarify the comment to explain that `revisions[0]` (the current revision) is implicitly the 'last changed at' for LOW durability and is maintained by `new_revision()`, so no explicit fill is needed for LOW durability inputs.","locations":[{"ref":"src/runtime.rs:224-229","code":"  224 |     /// Reports that an input with durability `durability` changed.\n  225 |     /// This will update the 'last changed at' values for every durability\n  226 |     /// less than or equal to `durability` to the current revision.\n  227 |     pub(crate) fn report_tracked_write(&mut self, durability: Durability) {\n  228 |         let new_revision = self.current_revision();\n  229 |         self.revisions[1..=durability.index()].fill(new_revision);","lines":6}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The maybe_update_set macro used for HashSet, BTreeSet, indexmap::IndexSet, hashbrown::HashSet, and ordermap::OrderSet requires K: Update in the trait bounds, but never calls Update::maybe_update on any element. The comparison goes through Eq on the whole set; if sets differ, they are cleared and rebuilt. K: Update is therefore an unnecessary constraint that needlessly restricts which types can be used as set keys in tracked structs.","fix":"Remove the K: Update bound from all set implementations. Retain K: Eq + Hash (or K: Eq + Ord for BTree variants). This is a breaking change to the public trait surface only if users are relying on the bound, which is unlikely.","locations":[{"ref":"src/update.rs:217-232","code":"  217 | macro_rules! maybe_update_set {\n  218 |     ($old_pointer: expr, $new_set: expr) => {{\n  219 |         let old_pointer = $old_pointer;\n  220 |         let new_set = $new_set;\n  221 | \n  222 |         let old_set: &mut Self = unsafe { &mut *old_pointer };\n  223 | \n  224 |         if *old_set == new_set {\n  225 |             false\n  226 |         } else {\n  227 |             old_set.clear();\n  228 |             old_set.extend(new_set);\n  229 |             return true;\n  230 |         }\n  231 |     }};\n  232 | }","lines":16},{"ref":"src/update.rs:234-242","code":"  234 | unsafe impl<K, S> Update for HashSet<K, S>\n  235 | where\n  236 |     K: Update + Eq + Hash,\n  237 |     S: BuildHasher,\n  238 | {\n  239 |     unsafe fn maybe_update(old_pointer: *mut Self, new_set: Self) -> bool {\n  240 |         maybe_update_set!(old_pointer, new_set)\n  241 |     }\n  242 | }","lines":9},{"ref":"src/update.rs:244-251","code":"  244 | unsafe impl<K> Update for BTreeSet<K>\n  245 | where\n  246 |     K: Update + Eq + Ord,\n  247 | {\n  248 |     unsafe fn maybe_update(old_pointer: *mut Self, new_set: Self) -> bool {\n  249 |         maybe_update_set!(old_pointer, new_set)\n  250 |     }\n  251 | }","lines":8},{"ref":"src/update.rs:310-319","code":"  310 | unsafe impl<K, S> Update for hashbrown::HashSet<K, S>\n  311 | where\n  312  assert `value != u32::MAX` to catch the final valid nonce before wrapping. The current assertion never fires when it's needed because the `.unwrap()` panics first.","locations":[{"ref":"src/nonce.rs:26-32","code":"   26 |     pub(crate) fn nonce(&self) -> Nonce<T> {\n   27 |         let value = self.value.fetch_add(1, Ordering::Relaxed);\n   28 | \n   29 |         assert!(value != 0, \"nonce rolled over\");\n   30 | \n   31 |         Nonce(NonZeroU32::new(value).unwrap(), self.phantom)\n   32 |     }","lines":7}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":false,"description":"`IngredientImpl::clear_memos` is copied verbatim (42-43 lines) between\n`src/interned.rs` (lines 686-728) and `src/tracked_struct.rs` (lines 814-855).\nThe two implementations are functionally identical: they attach the memo-table types,\ncreate a drop-guard struct, take each memo, fire a `DidDiscard` event, call\n`remove_outputs`, forget the guard, and reset the table. Any future bug fix or\nbehaviour change must be applied twice. The only structural difference is that the\n`mem::` qualifier is used in tracked_struct.rs while `std::mem::` is used in interned.rs.","fix":"Extract the shared logic into a free function or a trait method in a shared internal module.","locations":[{"ref":"src/interned.rs:686-728","code":"  686 |     /// Clears the given memo table.\n  687 |     ///\n  688 |     /// # Safety\n  689 |     ///\n  690 |     /// The `MemoTable` must belong to a `Value` of the correct type.\n  691 |     pub(crate) unsafe fn clear_memos(&self, zalsa: &Zalsa, memo_table: &mut MemoTable, id: Id) {\n  692 |         // SAFETY: The caller guarantees this is the correct types table.\n  693 |         let table = unsafe { self.memo_table_types.attach_memos_mut(memo_table) };\n  694 | \n  695 |         // `Database::salsa_event` is a user supplied callback which may panic\n  696 |         // in that case we need a drop guard to free the memo table\n  697 |         struct TableDropGuard<'a>(MemoTableWithTypesMut<'a>);\n  698 | \n  699 |         impl Drop for TableDropGuard<'_> {\n  700 |             fn drop(&mut self) {\n  701 |                 // SAFETY: We have `&mut MemoTable`, so no more references to these memos exist and we are good\n  702 |                 // to drop them.\n  703 |                 unsafe { self.0.drop() };\n  704 |             }\n  705 |         }\n  706 | \n  707 |         let mut table_guard = TableDropGuard(table);\n  708 | \n  709 |         // SAFETY: We have `&mut MemoTable`, so no more references to these memos exist and we are good\n  710 |         // to drop them.\n  711 |         unsafe {\n  712 |             table_guard.0.take_memos(|memo_ingredient_index, memo| {\n  713 |                 let ingredient_index =\n  714 |                     zalsa.ingredient_index_for_memo(self.ingredient_index, memo_ingredient_index);\n  715 | \n  716 |                 let executor = DatabaseKeyIndex::new(ingredient_index, id);\n  717 | \n  718 |                 zalsa.event(&|| Event::new(EventKind::DidDiscard { key: executor }));\n  719 | \n  720 |                 memo.remove_outputs(zalsa, executor);\n  721 |             })\n  722 |         };\n  723 | \n  724 |         std::mem::forget(table_guard);\n  725 | \n  726 |         // Reset the table after having dropped any memos.\n  727 |         memo_table.reset();\n  728 |     }","lines":43},{"ref":"src/tracked_struct.rs:814-855","code":"  814 |     /// Clears the given memo table.\n  815 |     ///\n  816 |     /// # Safety\n  817 |     ///\n  818 |     /// The `MemoTable` must belong to a `Value` of the correct type.\n  819 |     pub(crate) unsafe fn clear_memos(&self, zalsa: &Zalsa, memo_table: &mut MemoTable, id: Id) {\n  820 |         // SAFETY: The caller guarantees this is the correct types table.\n  821 |         let table = unsafe { self.memo_table_types.attach_memos_mut(memo_table) };\n  822 | \n  823 |         // `Database::salsa_event` is a user supplied callback which may panic\n  824 |         // in that case we need a drop guard to free the memo table\n  825 |         struct TableDropGuard<'a>(MemoTableWithTypesMut<'a>);\n  826 |         impl Drop for TableDropGuard<'_> {\n  827 |             fn drop(&mut self) {\n  828 |                 // SAFETY: We have `&mut MemoTable`, so no more references to these memos exist and we are good\n  829 |                 // to drop them.\n  830 |                 unsafe { self.0.drop() };\n  831 |             }\n  832 |         }\n  833 | \n  834 |         let mut table_guard = TableDropGuard(table);\n  835 | \n  836 |         // SAFETY: We have `&mut MemoTable`, so no more references to these memos exist and we are good\n  837 |         // to drop them.\n  838 |         unsafe {\n  839 |             table_guard.0.take_memos(|memo_ingredient_index, memo| {\n  840 |                 let ingredient_index =\n  841 |                     zalsa.ingredient_index_for_memo(self.ingredient_index, memo_ingredient_index);\n  842 | \n  843 |                 let executor = DatabaseKeyIndex::new(ingredient_index, id);\n  844 | \n  845 |                 zalsa.event(&|| Event::new(EventKind::DidDiscard { key: executor }));\n  846 | \n  847 |                 memo.remove_outputs(zalsa, executor);\n  848 |             })\n  849 |         };\n  850 | \n  851 |         mem::forget(table_guard);\n  852 | \n  853 |         // Reset the table after having dropped any memos.\n  854 |         memo_table.reset();\n  855 |     }","lines":42}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"The `persistence` sub-modules in `src/interned.rs` and `src/tracked_struct.rs` contain\nnear-identical boilerplate for `SerializeIngredient`, `DeserializeIngredient`, `SerializeFields`,\nand `DeserializeFields`. The visitor implementations (`visit_map`) are structurally the same\npattern - deserialize a map of (u64 key, value struct) pairs, split the id, determine a page,\nforce-initialize the page, and allocate the slot. Differences exist but the skeleton exceeds\n25 lines of duplicated logic, making both copies harder to maintain.","fix":"Consider a shared deserialization helper that accepts closures for the type-specific parts.","locations":[{"ref":"src/interned.rs:1473-1700","code":" 1473 | #[cfg(feature = \"persistence\")]\n 1474 | mod persistence {\n 1475 |     use std::cell::UnsafeCell;\n 1476 |     use std::fmt;\n 1477 |     use std::hash::BuildHasher;\n 1478 | \n 1479 |     use intrusive_collections::LinkedListLink;\n 1480 |     use serde::ser::{SerializeMap, SerializeStruct};\n 1481 |     use serde::{Deserialize, de};\n 1482 | \n 1483 |     use super::{Configuration, IngredientImpl, Value, ValueShared};\n 1484 |     use crate::plumbing::Ingredient;\n 1485 |     use crate::table::memo::MemoTable;\n 1486 |     use crate::zalsa::Zalsa;\n 1487 |     use crate::{Durability, Id, Revision};\n 1488 | \n 1489 |     pub struct SerializeIngredient<'db, C>\n 1490 |     where\n 1491 |         C: Configuration,\n 1492 |     {\n 1493 |         pub zalsa: &'db Zalsa,\n 1494 |         pub ingredient: &'db IngredientImpl<C>,\n 1495 |     }\n 1496 | \n 1497 |     impl<C> serde::Serialize for SerializeIngredient<'_, C>\n 1498 |     where\n 1499 |         C: Configuration,\n 1500 |     {\n 1501 |         fn serialize<S>(&self, serializer: S) -> Result<S::Ok, S::Error>\n 1502 |         where\n 1503 |             S: serde::Serializer,\n 1504 |         {\n 1505 |             let Self { zalsa, ingredient } = *self;\n 1506 | \n 1507 |             let count = ingredient\n 1508 |                 .shards\n 1509 |                 .iter()\n 1510 |                 .map(|shard| shard.lock().key_map.len())\n 1511 |                 .sum();\n 1512 | \n 1513 |             let mut map = serializer.serialize_map(Some(count))?;\n 1514 | \n 1515 |             for (_, value) in zalsa.table().slots_of::<Value<C>>() {\n 1516 |
