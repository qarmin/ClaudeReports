cations":[{"ref":"src/revision.rs:100-109","code":"  100 | impl<'de> serde::Deserialize<'de> for AtomicRevision {\n  101 |     fn deserialize<D>(deserializer: D) -> Result<Self, D::Error>\n  102 |     where\n  103 |         D: serde::Deserializer<'de>,\n  104 |     {\n  105 |         serde::Deserialize::deserialize(deserializer).map(|data| Self {\n  106 |             data: AtomicUsize::new(data),\n  107 |         })\n  108 |     }\n  109 | }","lines":10},{"ref":"src/revision.rs:133-138","code":"  133 |         Revision {\n  134 |             // SAFETY: We know that the value is non-zero because we only ever store `START` which 1, or a\n  135 |             // Revision which is guaranteed to be non-zero.\n  136 |             generation: unsafe { NonZeroUsize::new_unchecked(self.data.load(Ordering::Acquire)) },\n  137 |         }\n  138 |     }","lines":6}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`IdentityMap::is_active` (tracked_struct.rs lines 314-322) performs a full O(n) linear scan\nover all tracked-struct entries to find one by `(id, ingredient_index)`. The hash table is\nkeyed on `Identity` (ingredient_index + hash + disambiguator), not on `Id`, so the lookup\ncannot use the hash index. This is called from `is_tracked_struct_of_active_query` (zalsa_local.rs:296)\non every read of a tracked struct that was created in the current query. For queries that create\nmany tracked structs the cost is O(n) per tracked-struct field access, making the overall cost O(n^2).","fix":"Maintain a secondary `HashMap<(IngredientIndex, Id), bool>` inside `IdentityMap` or store the active flag in a `HashSet<DatabaseKeyIndex>` to allow O(1) lookup.","locations":[{"ref":"src/tracked_struct.rs:314-322","code":"  314 |     pub(crate) fn is_active(&self, key: DatabaseKeyIndex) -> bool {\n  315 |         self.table\n  316 |             .iter()\n  317 |             .find(|entry| {\n  318 |                 entry.id == key.key_index()\n  319 |                     && entry.identity.ingredient_index() == key.ingredient_index()\n  320 |             })\n  321 |             .is_some_and(|entry| entry.active)\n  322 |     }","lines":9}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `src/function/execute.rs`, `complete_cycle_query` (lines 784-817) takes the `FLATTEN_MAPS`\nthread-local pool on entry and returns it on successful exit (line 815). If `flatten_cycle_dependencies`\npanics (e.g., due to an unexpected internal error or OOM during `reserve`), the `flattened` and\n`seen` sets are dropped without being returned to the pool. The `seen` set is explicitly cleared\nat line 803 before `pop_completion`, but `flattened` is in the middle of being populated when a\npanic could occur. After a `catch_unwind`, the thread-local pool slot is permanently empty for\nthat thread. For threads that participate in many cycles, this causes repeated heap allocations\nfor these maps instead of reusing the pooled allocations.","fix":"Use a guard struct (similar to `PoisonProvisionalIfPanicking`) that clears and returns both maps\nto the pool in its `Drop` implementation, even on panic:\n\n```rust\nstruct FlattenMapsGuard {\n    maps: Option<(FxIndexSet<QueryEdge>, FxHashSet<DatabaseKeyIndex>)>,\n}\nimpl Drop for FlattenMapsGuard {\n    fn drop(&mut self) {\n        if let Some((mut f, mut s)) = self.maps.take() {\n            f.clear(); s.clear();\n            FLATTEN_MAPS.set(Some((f, s)));\n        }\n    }\n}\n```","locations":[{"ref":"src/function/execute.rs:784-817","code":"  784 | fn complete_cycle_query(\n  785 |     zalsa: &Zalsa,\n  786 |     active_query: ActiveQueryGuard<'_>,\n  787 |     iteration: IterationStamp,\n  788 | ) -> CompletedQuery {\n  789 |     let (mut flattened, mut seen) = FLATTEN_MAPS.take().unwrap_or_default();\n  790 | \n  791 |     debug_assert!(flattened.is_empty());\n  792 |     debug_assert!(seen.is_empty());\n  793 | \n  794 |     let detached_query = active_query.detach();\n  795 |     flattened.reserve(detached_query.input_outputs().len());\n  796 |     flatten_cycle_dependencies(\n  797 |         zalsa,\n  798 |         detached_query.input_outputs(),\n  799 |         &mut flattened,\n  800 |         &mut seen,\n  801 |     );\n  802 | \n  803 |     seen.clear();\n  804 |     let completion = detached_query.pop_completion(iteration, true);\n  805 |     let completed_query = completion.finish(flattened.drain(..));\n  806 |     #[cfg(feature = \"accumulator\")]\n  807 |     assert!(\n  808 |         completed_query\n  809 |             .revisions\n  810 |             .accumulated_inputs\n  811 |             .load()\n  812 |             .is_empty(),\n  813 |         \"Fixpoint iteration doesn't support accumulated values because it doesn't preserve the original query dependency tree.\"\n  814 |     );\n  815 |     FLATTEN_MAPS.set(Some((flattened, seen)));\n  816 |     completed_query\n  817 | }","lines":34}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`IngredientImpl::entries_inner` in `src/interned.rs` (lines 825-847) acquires and immediately\nreleases the shard lock once per entry inside the iterator `map` closure (the `_shard` guard is\ndropped at the end of each closure call). This means the iterator is not atomic: between yielding\ntwo consecutive entries, another thread can reuse a slot in the next shard. The returned\n`StructEntry` holds a `&'db Value<C>` reference to a value whose shard lock is no longer held.\nFor callers that require a consistent snapshot (e.g., serialization via `should_serialize`) this\ncreates a TOCTOU window. The TODO comment on line 830 (\"Grab all locks eagerly\") acknowledges the\nissue but it remains unresolved.","fix":"Collect all shard locks into a `Vec<MutexGuard>` before beginning the iteration, or use a callback-based API that holds all locks for the duration of the traversal.","locations":[{"ref":"src/interned.rs:825-847","code":"  825 |     unsafe fn entries_inner<'db>(\n  826 |         &'db self,\n  827 |         should_lock: bool,\n  828 |         zalsa: &'db Zalsa,\n  829 |     ) -> impl Iterator<Item = StructEntry<'db, C>> {\n  830 |         // TODO: Grab all locks eagerly.\n  831 |         zalsa.table().slots_of::<Value<C>>().map(move |(_, value)| {\n  832 |             if should_lock {\n  833 |                 // SAFETY: `value.shard` is guaranteed to be in-bounds for `self.shards`.\n  834 |                 let _shard = unsafe { self.shards.get_unchecked(value.shard as usize) }.lock();\n  835 |             }\n  836 | \n  837 |             // SAFETY: The caller guarantees we hold the lock for the shard containing the value.\n  838 |             //\n  839 |             // Note that this ID includes the generation, unlike the ID provided by the table.\n  840 |             let id = unsafe { (*value.shared.get()).id };\n  841 | \n  842 |             StructEntry {\n  843 |                 value,\n  844 |                 key: self.database_key_index(id),\n  845 |             }\n  846 |         })\n  847 |     }","lines":23}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Edges::depends_on` (src/runtime/dependency_graph.rs lines 457-467) walks the edge chain\nas a singly-linked list. Each call is O(depth) and the function is called in several hot\npaths (cycle detection, transfer-lock logic). Under deep blocking chains this becomes O(n)\nper check. Additionally, the function has no cycle guard - if the invariant that edges form\na DAG is ever violated, it will loop forever while holding the `dependency_graph` mutex,\ndeadlocking all other threads.","fix":"Consider adding a visited-set or depth limit as a safety guard to avoid a potential infinite loop if the DAG invariant is violated. For the performance concern, the current design is inherent to the lock-based blocking structure.","locations":[{"ref":"src/runtime/dependency_graph.rs:457-467","code":"  457 |     fn depends_on(&self, from_id: ThreadId, to_id: ThreadId) -> bool {\n  458 |         let mut p = from_id;\n  459 |         while let Some(q) = self.0.get(&p).map(|edge| edge.blocked_on_id) {\n  460 |             if q == to_id {\n  461 |                 return true;\n  462 |             }\n  463 | \n  464 |             p = q;\n  465 |         }\n  466 |         p == to_id\n  467 |     }","lines":11}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `src/views.rs`, `add()` (lines 107-137) performs a linear scan of `self.view_casters`\non every call to check whether a downcaster for `DbView` already exists. Similarly,\n`downcaster_for()` (lines 144-160) also scans linearly. These are called during DB\nview registration, which can occur per-query when registering view casters for\ntrait impls. With many database view traits the cost grows as O(n) per registration.","fix":"Replace the `boxcar::Vec<ViewCaster>` with a concurrent `HashMap<TypeId, ViewCaster>` (or similar) to make lookups O(1). The existing linear scan is tolerable with few view traits but scales poorly.","locations":[{"ref":"src/views.rs:107-137","code":"  107 |     pub fn add<Concrete: 'static, DbView: ?Sized + Any>(\n  108 |         &self,\n  109 |         func: fn(NonNull<Concrete>) -> NonNull<DbView>,\n  110 |     ) -> &DatabaseDownCaster<DbView> {\n  111 |         assert_eq!(\n  112 |             self.source_type_id,\n  113 |             TypeId::of::<Concrete>(),\n  114 |             \"mismatched source type\"\n  115 |         );\n  116 |         let target_type_id = TypeId::of::<DbView>();\n  117 |         if let Some((_, caster)) = self\n  118 |             .view_casters\n  119 |             .iter()\n  120 |             .find(|(_, u)| u.target_type_id == target_type_id)\n  121 |         {\n  122 |             // SAFETY: The type-erased function pointer is guaranteed to be valid for `DbView`\n  123 |             return unsafe { &*(&raw const *caster).cast::<DatabaseDownCaster<DbView>>() };\n  124 |         }\n  125 | \n  126 |         // SAFETY: We are type erasing the function pointer for storage, and we will unerase it\n  127 |         // before we call it.\n  128 |         let caster = unsafe {\n  129 |             mem::transmute::<fn(NonNull<Concrete>) -> NonNull<DbView>, DatabaseDownCasterSig<DbView>>(\n  130 |                 func,\n  131 |             )\n  132 |         };\n  133 |         let caster = ViewCaster::new::<DbView>(caster);\n  134 |         let idx = self.view_casters.push(caster);\n  135 |         // SAFETY: The type-erased function pointer is guaranteed to be valid for `DbView`\n  136 |         unsafe { &*(&raw const self.view_casters[idx]).cast::<DatabaseDownCaster<DbView>>() }\n  137 |     }","lines":31},{"ref":"src/views.rs:144-160","code":"  144 |     pub fn downcaster_for<DbView: ?Sized + Any>(&self) -> &DatabaseDownCaster<DbView> {\n  145 |         let view_type_id = TypeId::of::<DbView>();\n  146 |         for (_, view) in self.view_casters.iter() {\n  147 |             if view.target_type_id == view_type_id {\n  148 |                 // SAFETY: We are unerasing the type erased function pointer having made sure the\n  149 |                 // TypeId matches.\n  150 |                 return unsafe {\n  151 |                     &*((view as *const ViewCaster).cast::<DatabaseDownCaster<DbView>>())\n  152 |                 };\n  153 |             }\n  154 |         }\n  155 | \n  156 |         panic!(\n  157 |             \"No downcaster registered for type `{}` in `Views`\",\n  158 |             std::any::type_name::<DbView>(),\n  159 |         );\n  160 |     }","lines":17}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`IngredientImpl::<C>::reset` in `src/interned.rs` (lines 804-811) is a `pub` method\nthat is never called. The `Ingredient` trait has a `reset_for_new_revision` hook but the\n`Ingredient` impl for `IngredientImpl<C>` does not override `requires_reset_for_new_revision`\nto return `true`, so the hook is never triggered. No other caller exists in the codebase.\nAdditionally, the implementation is incorrect: it clears `key_map` but not the `lru` linked list,\nleaving `UnsafeRef<Value<C>>` pointers in the LRU that refer to slots still tracked by the table -\nif anyone were to call `reset` and then trigger GC, the LRU would yield values whose `key_map`\nentries have been removed, causing `find_entry(...).expect(...)` on line 543 to panic.","fix":"Remove the method, or implement it correctly by also draining `shard.lru` and then hook it into the `Ingredient` trait via `requires_reset_for_new_revision`.","locations":[{"ref":"src/interned.rs:804-811","code":"  804 |     pub fn reset(&mut self, zalsa_mut: &mut Zalsa) {\n  805 |         _ = zalsa_mut;\n  806 | \n  807 |         for shard in self.shards.iter_mut() {\n  808 |             // We can clear the key maps now that we have cancelled all other handles.\n  809 |             shard.get_mut().key_map.clear();\n  810 |         }\n  811 |     }","lines":8}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"Inside the `Serialize` impl for `CycleHeads` (feature `persistence`), the loop `for e in self` iterates using `CycleHeadsIterator`, which already skips entries where `removed == true`. The explicit guard `if e.removed.load(Ordering::Relaxed) { continue; }` on line 370 can never be true and is therefore unreachable dead code.","fix":"Remove the `if e.removed ... { continue; }` block inside the serialize loop.","locations":[{"ref":"src/cycle.rs:369-372","code":"  369 |         for e in self {\n  370 |             if e.removed.load(Ordering::Relaxed) {\n  371 |                 continue;\n  372 |             }","lines":4}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In `src/tracing.rs`, the `info_span!` macro is defined (lines 35-39) with an\n`#[expect(unused_macros)]` attribute, indicating it is never used anywhere in the\ncodebase. It is exported via `pub(crate) use` at line 68. The macro exists but\nproduces no value to the codebase.","fix":"Either remove `info_span!` if it is truly not needed, or remove the `#[expect(unused_macros)]` suppress once it is actually used somewhere.","locations":[{"ref":"src/tracing.rs:35-39","code":"   35 | macro_rules! info_span {\n   36 |     ($($x:tt)*) => {\n   37 |         crate::tracing::span!(INFO, $($x)*)\n   38 |     };\n   39 | }","lines":5}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `src/cancelled.rs` lines 5-9, the doc comment for the `Cancelled` enum has three\nempty bullet points:\n    /// *\n    /// *\n    /// *\nThe intended reasons for cancellation are never filled in, leaving users with an\nuninformative API doc.","fix":"Fill in the bullet points with the actual cancellation reasons, e.g.: local cancellation via CancellationToken, pending write to a new revision, and propagated panic from another thread.","locations":[{"ref":"src/cancelled.rs:5-9","code":"    5 | ///\n    6 | /// This can occur for a few reasons:\n    7 | /// *\n    8 | /// *\n    9 | /// *","lines":5}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `src/function/backdate.rs` lines 22-26, the inline comment uses an informal first-person voice\n(\"we're close to a release\", \"we don't have the time\") that reads as a personal note left in\npermanently rather than actionable documentation. The TODO asks for tests but does not capture the\nactual conditions under which backdating may be unsafe, making it hard for a future contributor to\nresolve the issue.","fix":"Replace the personal-note style comment with a precise description of the known or suspected\nsafety condition, e.g.:\n\"Backdating is skipped for any query that currently or previously participated in a cycle\nbecause the convergence check may not have finished, so the old `changed_at` timestamp could\nincorrectly suppress re-validation of cycle participants. See <issue link> for a reproducer.\"","locations":[{"ref":"src/function/backdate.rs:22-29","code":"   22 |         // We've seen issues where queries weren't re-validated when backdating provisional values\n   23 |         // in ty. This is more of a bandaid because we're close to a release and don't have the time to prove\n   24 |         // right now whether backdating could be made safe for queries participating in queries.\n   25 |         // TODO: Write a test that demonstrates that backdating queries participating in a cycle isn't safe\n   26 |         // OR write many tests showing that it is (and fixing the case where it didn't correctly account for today).\n   27 |         if !revisions.cycle_heads().is_empty() || old_memo.may_be_provisional() {\n   28 |             return;\n   29 |         }","lines":8}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `src/function/execute.rs` line 512, the doc comment for `collect_all_cycle_heads` says\n\"It doesn't know that it's part of the outer cycle `X`.\" but `X` is NOT the outer cycle in the\nexample - `E` is (the example shows `E -> C -> D -> E (cycle)`). The sentence should read\n\"It doesn't know that it's part of the outer cycle `E`.\"\nAdditionally, line 516 ends with an unclosed backtick: the string \"`[B, C, D, E]\" is missing the\nclosing backtick, leaving the doc comment malformed.","fix":"Change 'outer cycle `X`' to 'outer cycle `E`' on line 512. Add the missing closing backtick on line 516: \"`[B, C, D, E]`\".","locations":[{"ref":"src/function/execute.rs:512-516","code":"  512 | /// Note how `X` only depends on `A`. It doesn't know that it's part of the outer cycle `X`.\n  513 | /// An old implementation resolved the cycle heads 1-level deep but that's not enough, because\n  514 | /// `X` then completes with `[B, C, D]` as it's heads. But `B`, `C`, and `D` are no longer on the stack\n  515 | /// when `X` completes (which is the real outermost cycle). That's why we need to resolve all cycle heads\n  516 | /// recursively, so that `X` completes with `[B, C, D, E]","lines":5}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The debug_assert in `Memo::new` fires when `verified_final == true` AND `cycle_heads` is non-empty, i.e. 'a finalized memo still has cycle heads'. The assertion message reads 'Memo must be finalized if it has no cycle heads', which describes the logically opposite condition (empty heads => must be finalized). Anyone reading this message after a failure will be led in the wrong direction.","fix":"Change the message to: \"Memo must have no cycle heads if it is finalized\".","locations":[{"ref":"src/function/memo.rs:104-108","code":"  104 |         debug_assert!(\n  105 |             !revisions.verified_final.load(Ordering::Relaxed) || revisions.cycle_heads().is_empty(),\n  106 |             \"Memo must be finalized if it has no cycle heads\"\n  107 |         );\n  108 |         Memo {","lines":5}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment on lines 99-104 (and duplicated verbatim on lines 158-163) inside `try_claim` and `peek_claim` says 'NB: Ordering::Relaxed is sufficient here ...' and goes on to explain atomic memory-order semantics. The field being set (`anyone_waiting`) is a plain `bool` inside a `Mutex`-protected `FxHashMap`, not an atomic. Atomic ordering is irrelevant here. The comment appears to have been copied from an earlier version of the code where the field was atomic.","fix":"Remove or replace the comment with one that simply explains why setting `anyone_waiting = true` under the mutex is sufficient to coordinate with `ClaimGuard::release`.","locations":[{"ref":"src/function/sync.rs:99-104","code":"   99 |                 // NB: `Ordering::Relaxed` is sufficient here,\n  100 |                 // as there are no loads that are \"gated\" on this\n  101 |                 // value. Everything that is written is also protected\n  102 |                 // by a lock that must be acquired. The role of this\n  103 |                 // boolean is to decide *whether* to acquire the lock,\n  104 |                 // not to gate future atomic reads.","lines":6},{"ref":"src/function/sync.rs:158-163","code":"  158 |                 // NB: `Ordering::Relaxed` is sufficient here,\n  159 |                 // as there are no loads that are \"gated\" on this\n  160 |                 // value. Everything that is written is also protected\n  161 |                 // by a lock that must be acquired. The role of this\n  162 |                 // boolean is to decide *whether* to acquire the lock,\n  163 |                 // not to gate future atomic reads.","lines":6}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The `.expect(\"key claimed twice?\")` in `release_panicking` fires when `syncs.remove(&self.key_index)` returns `None`, meaning the key is absent from the sync table. The error message 'key claimed twice?' implies the key was inserted twice, which is the opposite of the actual situation (the key is missing). This message is misleading when debugging a double-release or unexpected removal.","fix":"Change to `.expect(\"key not found in sync table during panic release\")`.","locations":[{"ref":"src/function/sync.rs:333","code":"  333 |         let state = syncs.remove(&self.key_index).expect(\"key claimed twice?\");","lines":1}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `ClaimGuard::transfer`, the `panic!` message on line 411 reads `\"new owner to be a locked query\"`, which is a grammatically incomplete sentence. The intended meaning is clearly `\"expected new owner to be a locked query\"`.","fix":"Change to `panic!(\"expected new owner to be a locked query\")`.","locations":[{"ref":"src/function/sync.rs:411","code":"  411 |             panic!(\"new owner to be a locked query\")","lines":1}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment in `src/hash.rs` lines 12-13 states that `TypeId` is a \"128-bit hash\ninternally, and it's `Hash` implementation writes the lower 64-bits.\" Both claims are\nimplementation details of the Rust standard library that are not guaranteed by any\npublic contract. The internal representation and hash behavior of `TypeId` could\nchange across Rust versions. If `TypeId::Hash` ever switches to calling `write`\n(byte slice) or `write_u128`, the `unreachable!()` on line 19 would panic at runtime.","fix":"Either remove the inaccurate comment about internals, or add a defensive implementation for `write` and `write_u128` that falls back to re-hashing, to avoid a hard runtime panic if the TypeId hashing changes.","locations":[{"ref":"src/hash.rs:12-19","code":"   12 | // `TypeId` is a 128-bit hash internally, and it's `Hash` implementation\n   13 | // writes the lower 64-bits. Hashing it again would be unnecessary.\n   14 | #[derive(Default)]\n   15 | pub(crate) struct TypeIdHasher(u64);\n   16 | \n   17 | impl Hasher for TypeIdHasher {\n   18 |     fn write(&mut self, _: &[u8]) {\n   19 |         unreachable!(\"`TypeId` calls `write_u64`\");","lines":8}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In the persistence `impl serde::Serialize for Value<C>` in `src/interned.rs`, line 1535,\nthe struct name passed to `serializer.serialize_struct` is `\"Value,\"` (with a trailing\ncomma) instead of `\"Value\"`. The corresponding `DeserializeValue` struct at line 1677 is\nannotated `#[serde(rename = \"Value\")]`. Self-describing serde formats that verify struct\nnames (e.g. RON, some custom JSON visitors) will fail to round-trip because the serialized\nname and the expected deserialized name differ. Binary formats (bincode) ignore the name, so\nthis is currently latent in most practical uses.","fix":"Change `\"Value,\"` to `\"Value\"` to match the rename attribute on `DeserializeValue`.","locations":[{"ref":"src/interned.rs:1535","code":" 1535 |             let mut value = serializer.serialize_struct(\"Value,\", 3)?;","lines":1}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Two `tracing::trace!` log strings contain an opening parenthesis that is never closed:\n- Line 171: `\"unblock_runtimes_blocked_on_transferred_queries_owned_by({database_key:?}\"`\n- Line 412: `\"update_transferred_edges({query:?}\"`\nBoth strings are missing the closing `)` that should terminate the function-call-style\nformat. The log output will be visually malformed.","fix":"Add the missing `)` to both format strings: `\"unblock_runtimes_blocked_on_transferred_queries_owned_by({database_key:?})\"` and `\"update_transferred_edges({query:?})\"`.","locations":[{"ref":"src/runtime/dependency_graph.rs:171","code":"  171 |             \"unblock_runtimes_blocked_on_transferred_queries_owned_by({database_key:?}\"","lines":1},{"ref":"src/runtime/dependency_graph.rs:412","code":"  412 |             tracing::trace!(\"update_transferred_edges({query:?}\");","lines":1}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Table::get_raw has a doc comment that says 'See Page::get_raw[]' but no method named get_raw exists on the Page struct. The intended reference is to Page::get.","fix":"Change the link to Page::get or remove it.","locations":[{"ref":"src/table.rs:192-193","code":"  192 |     ///\n  193 |     /// See [`Page::get_raw`][].","lines":2}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Table::memos_mut has a safety comment that says 'the caller is required to pass the current_revision', but the function signature does not accept a current_revision parameter. This is a copy-paste leftover from the adjacent dyn_memos function.","fix":"Remove or replace the stale comment. A correct comment would note that the slot pointer must be valid and the page must have been initialized.","locations":[{"ref":"src/table.rs:337","code":"  337 |         // SAFETY: We supply a proper slot pointer and the caller is required to pass the `current_revision`.","lines":1}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"In `src/function.rs` line 122, the doc comment for `Configuration::recover_from_cycle` says\n\"The iteration count can be non-contigious for cycle heads\" - 'non-contigious' is a typo for\n'non-contiguous'.","fix":"Change 'non-contigious' to 'non-contiguous'.","locations":[{"ref":"src/function.rs:122","code":"  122 |     /// * **Non-contiguous values**: The iteration count can be non-contigious for cycle heads","lines":1}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"In `src/function/maybe_changed_after.rs` line 374, the comment says \"cycle heads flatten their\ndependecies\" - 'dependecies' is a typo for 'dependencies'.","fix":"Change 'dependecies' to 'dependencies'.","locations":[{"ref":"src/function/maybe_changed_after.rs:374","code":"  374 |                 // * cycle heads flatten their dependecies. Therefore, no query with cycle handling","lines":1}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment at line 328 contains a typo: \"chaine\" should be \"chain\".","fix":"Change \"chaine\" to \"chain\".","locations":[{"ref":"src/runtime/dependency_graph.rs:328","code":"  328 |                 // transferred chaine of `old_owner` to know if the thread has changed. This won't save us much","lines":1}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The `Occupied`+`Thread` branch inside `try_claim` (lines 97-113) and the identical branch inside `peek_claim` (lines 156-172) are byte-for-byte duplicates: both lock the entry, destructure `anyone_waiting`, set it to `true`, and call `zalsa.runtime().block(...)` with identical arms. That is ~17 lines of near-identical logic in two places. The same structural duplication appears between `try_claim_transferred` and `peek_claim_transferred`, which share the `ImTheOwner+Deny` and `OwnedBy` arms (roughly 10 more lines). Total duplicated logic exceeds 25 lines across the two method pairs.","fix":"Extract the block-on-occupied-thread logic into a private helper that takes the `OccupiedEntry`, the `SyncGuard`, and the `Zalsa` reference, returning a `ClaimResult<()>` or `BlockResult`. Both `try_claim` and `peek_claim` can then call this helper and handle only the `Vacant` arm separately.","locations":[{"ref":"src/function/sync.rs:97-113","code":"   97 |                 let SyncState { anyone_waiting, .. } = occupied_entry.into_mut();\n   98 | \n   99 |                 // NB: `Ordering::Relaxed` is sufficient here,\n  100 |                 // as there are no loads that are \"gated\" on this\n  101 |                 // value. Everything that is written is also protected\n  102 |                 // by a lock that must be acquired. The role of this\n  103 |                 // boolean is to decide *whether* to acquire the lock,\n  104 |                 // not to gate future atomic reads.\n  105 |                 *anyone_waiting = true;\n  106 |                 match zalsa.runtime().block(\n  107 |                     DatabaseKeyIndex::new(self.ingredient, key_index),\n  108 |                     id,\n  109 |                     write,\n  110 |                 ) {\n  111 |                     BlockResult::Running(blocked_on) => ClaimResult::Running(blocked_on),\n  112 |                     BlockResult::Cycle => ClaimResult::Cycle { inner: false },\n  113 |                 }","lines":17},{"ref":"src/function/sync.rs:156-172","code":"  156 |                 let SyncState { anyone_waiting, .. } = occupied_entry.into_mut();\n  157 | \n  158 |                 // NB: `Ordering::Relaxed` is sufficient here,\n  159 |                 // as there are no loads that are \"gated\" on this\n  160 |                 // value. Everything that is written is also protected\n  161 |                 // by a lock that must be acquired. The role of this\n  162 |                 // boolean is to decide *whether* to acquire the lock,\n  163 |                 // not to gate future atomic reads.\n  164 |                 *anyone_waiting = true;\n  165 |                 match zalsa.runtime().block(\n  166 |                     DatabaseKeyIndex::new(self.ingredient, key_index),\n  167 |                     id,\n  168 |                     write,\n  169 |                 ) {\n  170 |                     BlockResult::Running(blocked_on) => ClaimResult::Running(blocked_on),\n  171 |                     BlockResult::Cycle => ClaimResult::Cycle { inner: false },\n  172 |                 }","lines":17},{"ref":"src/function/sync.rs:211-215","code":"  211 |             }\n  212 |             BlockTransferredResult::ImTheOwner => Ok(ClaimResult::Cycle { inner: true }),\n  213 |             BlockTransferredResult::OwnedBy(other_thread) => {\n  214 |                 entry.get_mut().anyone_waiting = true;\n  215 |                 Err(other_thread)","lines":5},{"ref":"src/function/sync.rs:254-257","code":"  254 |             BlockTransferredResult::ImTheOwner => Ok(ClaimResult::Cycle { inner: true }),\n  255 |             BlockTransferredResult::OwnedBy(other_thread) => {\n  256 |                 entry.get_mut().anyone_waiting = true;\n  257 |                 Err(other_thread)","lines":4}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`src/accumulator.rs` exports `IngredientImpl::from_zalsa` with `pub` visibility even\nthough it is only ever called from one place (`src/function/accumulated.rs`). Combined\nwith the misleading `Option` return type (the function never returns `None`, see\nseparate finding), this creates an API surface that is confusing to external consumers\nand allows misuse. The function should either be `pub(crate)` or replaced with a direct\nfield/method access pattern that clearly communicates its panic-on-not-found semantics.","fix":"Change `pub fn from_zalsa` to `pub(crate) fn from_zalsa` and update the return type to `&Self`. Callers that expect a fallible lookup should handle the panic contract via `lookup_jar_by_type`.","locations":[{"ref":"src/accumulator.rs:66-70","code":"   66 |     pub fn from_zalsa(zalsa: &Zalsa) -> Option<&Self> {\n   67 |         let index = zalsa.lookup_jar_by_type::<JarImpl<A>>();\n   68 |         let ingredient = zalsa.lookup_ingredient(index).assert_type::<Self>();\n   69 |         Some(ingredient)\n   70 |     }","lines":5}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`src/function/execute.rs` defines `collect_all_cycle_heads` (lines 517-599), which contains\na nested recursive function `collect_recursive`. The inner function uses `missing_heads.contains`\n(line 558) which is an O(n) linear scan on a `SmallVec`. For deep cycle graphs with many distinct\nheads, the deduplication of newly discovered transitive heads becomes O(n^2). While `SmallVec`\nwith inline storage is fast for the common small-cycle case, extremely large nested cycles (which\nare already bounded by MAX_ITERATIONS=200) could still cause noticeable slowdown.","fix":"If large nested cycles become a concern, replace the `SmallVec` linear-scan deduplication with a `FxHashSet` for the `missing_heads` seen-set, similar to the pattern already used in `flatten_cycle_dependencies` with its `seen: &mut FxHashSet<DatabaseKeyIndex>`.","locations":[{"ref":"src/function/execute.rs:517-599","code":"  517 | fn collect_all_cycle_heads(\n  518 |     zalsa: &Zalsa,\n  519 |     cycle_heads: &mut CycleHeads,\n  520 |     database_key_index: DatabaseKeyIndex,\n  521 |     iteration: IterationStamp,\n  522 | ) -> (IterationStamp, bool) {\n  523 |     fn collect_recursive(\n  524 |         zalsa: &Zalsa,\n  525 |         current_head: DatabaseKeyIndex,\n  526 |         me: DatabaseKeyIndex,\n  527 |         query_heads: &CycleHeads,\n  528 |         missing_heads: &mut SmallVec<[(DatabaseKeyIndex, IterationStamp); 4]>,\n  529 |     ) -> (IterationStamp, bool) {\n  530 |         if current_head == me {\n  531 |             return (IterationStamp::default(), true);\n  532 |         }\n  533 | \n  534 |         let mut max_iteration = IterationStamp::default();\n  535 |         let mut depends_on_self = false;\n  536 | \n  537 |         let ingredient = zalsa.lookup_ingredient(current_head.ingredient_index());\n  538 | \n  539 |         let provisional_status = ingredient\n  540 |             .provisional_status(zalsa, current_head.key_index())\n  541 |             .expect(\"cycle head memo must have been created during the execution\");\n  542 | \n  543 |         // A query should only ever depend on other heads that are provisional.\n  544 |         // If this invariant is violated, it means that this query participates in a cycle,\n  545 |         // but it wasn't executed in the last iteration of said cycle.\n  546 |         assert!(provisional_status.is_provisional());\n  547 | \n  548 |         for head in provisional_sta   597 |     }\n  598 | \n  599 |     (max_iteration, depends_on_self)","lines":83}]},{"id":"ARCH_3","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"Zalsa is a god object that combines ingredient registry, memo-ingredient index mapping, jar mapping, ingredient-to-type-id mapping, runtime state (revisions, table, cancellation), event callback, and LRU eviction. All these responsibilities sit in a single struct behind a single Arc, making it impossible to split locking granularity or test any subsystem in isolation. For example, the Table (stored inside Runtime) could be a separate top-level component with its own access control.","fix":"Extract ingredient-registry logic into a separate IngredientRegistry struct. Keep the Runtime (which owns the Table and revision counters) separate. This reduces the blast radius of any future mutation.","locations":[{"ref":"src/zalsa.rs:139-169","code":"  139 | pub struct Zalsa {\n  140 |     views_of: Views,\n  141 | \n  142 |     #[cfg(not(feature = \"inventory\"))]\n  143 |     nonce: crate::nonce::Nonce<StorageNonce>,\n  144 | \n  145 |     /// Map from the [`IngredientIndex::as_usize`][] of a salsa struct to a list of\n  146 |     /// [ingredient-indices](`IngredientIndex`) for tracked functions that have this salsa struct\n  147 |     /// as input.\n  148 |     memo_ingredient_indices: Vec<Vec<IngredientIndex>>,\n  149 | \n  150 |     /// Map from the type-id of an `impl Jar` to the index of its first ingredient.\n  151 |     jar_map: HashMap<TypeId, IngredientIndex, BuildHasherDefault<TypeIdHasher>>,\n  152 | \n  153 |     /// A map from the `IngredientIndex` to the `TypeId` of its ID struct.\n  154 |     ///\n  155 |     /// Notably this is not the reverse mapping of `jar_map`.\n  156 |     ingredient_to_id_struct_type_id_map: FxHashMap<IngredientIndex, TypeId>,\n  157 | \n  158 |     /// Vector of ingredients.\n  159 |     ingredients_vec: Vec<Box<dyn Ingredient>>,\n  160 | \n  1 <script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: 'text/markdown'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
