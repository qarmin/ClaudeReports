<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In the Repeater's `onCountChanged` handler the focus/active-focus/press-and-hold indices are reset using a bare truthiness test (`if (d.focusIndex)`, `if (d.activeFocusIndex)`, `if (d.pressAndHoldIndex)`) instead of a `>= 0` check. These are sentinel-`-1` integer indices: value `0` (a legitimately focused/selected first viewport) is falsy, so its branch is skipped and a stale index `0` survives a layout resize; value `-1` (nothing focused) is truthy, so the branch needlessly runs. The intent is clearly to reset when an index is set (`>= 0`).","fix":"Use explicit comparisons: `if (d.focusIndex >= 0)`, `if (d.activeFocusIndex >= 0)`, `if (d.pressAndHoldIndex >= 0)`. Also guard the leading `if (d.fullScreenIndex >= count)` consistently.","locations":[{"ref":"src/ViewportsLayout.qml:145-162","code":"  145 |             onCountChanged: {\n  146 |                 if (d.fullScreenIndex >= count) {\n  147 |                     d.fullScreenIndex = -1;\n  148 |                 }\n  149 |                 if (d.focusIndex) {\n  150 |                     if (count == 1) {\n  151 |                         d.focusIndex = 0;\n  152 |                     } else {\n  153 |                         d.focusIndex = -1;\n  154 |                     }\n  155 |                 }\n  156 |                 if (d.activeFocusIndex) {\n  157 |                     d.activeFocusIndex = -1;\n  158 |                 }\n  159 |                 if (d.pressAndHoldIndex) {\n  160 |                     d.pressAndHoldIndex = -1;\n  161 |                 }\n  162 |             }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`Button.highlighted` for the window-division presets is assigned a block that computes the comparison but never returns it: `highlighted: { Utils.currentModel().size === str2size(size); }`. A statement-block binding with no `return` evaluates to `undefined` (falsy), so the button matching the current grid size is never highlighted.","fix":"Return the expression (or drop the braces): `highlighted: Utils.currentModel().size === str2size(size)`.","locations":[{"ref":"src/SideBar.qml:308-313","code":"  308 |                                             Button {\n  309 |                                                 text: size\n  310 |                                                 highlighted: {\n  311 |                                                     Utils.currentModel().size === str2size(size);\n  312 |                                                 }\n  313 |                                                 anchors.fill: parent"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`Number.prototype.inRange(min, max)` is broken: the body is `return (this >= min && val <= this) ? true : false;`. `val` is never declared (ReferenceError if it weren't for `this` shadowing — there is no `val` in scope, so this throws or is always wrong), and the `max` parameter is never used, so the upper bound is never checked. The function currently cannot return a correct result.","fix":"Implement it correctly, e.g. `return this >= min && this <= max;`. (It is also currently unused — see the dead-code finding — so either fix or remove it.)","locations":[{"ref":"src/imports/CCTV_Viewer/Utils/utils.js:110-112","code":"  110 | Number.prototype.inRange = function(min, max) {\n  111 |     return (this >= min && val <= this) ? true : false;\n  112 | }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`mergeCells` validates the computed `topLeftIndex` with `if (topLeftIndex < 0 || topLeftIndex >= model.count)`, but `model` is a `ViewportsLayoutModel` (a `QAbstractListModel` subclass) which exposes no `count` property to QML — only `size` and the implicit `rowCount`. `model.count` is therefore `undefined`, so `topLeftIndex >= undefined` is always false and the upper-bound guard is dead; only the negative check is effective.","fix":"Compare against the real element count, e.g. `model.size.width * model.size.height` (or add a `count` Q_PROPERTY to the model): `if (topLeftIndex < 0 || topLeftIndex >= model.size.width * model.size.height) return false;`.","locations":[{"ref":"src/ViewportsLayout.qml:647-651","code":"  647 |     function mergeCells(testMode) {\n  648 |         var topLeftIndex = d.indexFromAddress(d.selectionLeft(), d.selectionTop());\n  649 |         if (topLeftIndex < 0 || topLeftIndex >= model.count) {\n  650 |             return false;\n  651 |         }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Config::LogLevel` defines `LogCritical = LogBeginRange = 0` and then `LogWarning = LogCritical`, making Critical and Warning the *same* numeric value (0). `reconfigureLoggingFilterRules()` compares `m_logLevel >= LogCritical` and `m_logLevel >= LogWarning` as if they were distinct thresholds, but they are identical, so there is no log level that enables critical messages while suppressing warnings. The four-level scheme effectively collapses to three.","fix":"Give each level a distinct value: `LogCritical = LogBeginRange, LogWarning, LogInfo, LogDebug, LogEndRange = LogDebug` (drop the `LogWarning = LogCritical` aliasing).","locations":[{"ref":"src/config.h:13-20","code":"   13 |     enum LogLevel {\n   14 |         LogBeginRange = 0,\n   15 |         LogCritical = LogBeginRange,\n   16 |         LogWarning = LogCritical,\n   17 |         LogInfo,\n   18 |         LogDebug,\n   19 |         LogEndRange = LogDebug\n   20 |     };"},{"ref":"src/config.cpp:21-32","code":"   21 | void Config::reconfigureLoggingFilterRules()\n   22 | {\n   23 |     QLoggingCategory::setFilterRules(QString(\"%1.critical=%2\\n\"\n   24 |                                              \"%1.warning=%3\\n\"\n   25 |                                              \"%1.info=%4\\n\"\n   26 |                                              \"%1.debug=%5\")\n   27 |                                              .arg(\"qmlav\")\n   28 |                                              .arg(m_logLevel >= Config::LogCritical ? \"true\" : \"false\",\n   29 |                                                   m_logLevel >= Config::LogWarning ? \"true\" : \"false\",\n   30 |                                                   m_logLevel >= Config::LogInfo ? \"true\" : \"false\",\n   31 |                                                   m_logLevel >= Config::LogDebug ? \"true\" : \"false\"));\n   32 | }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `fromJSValue`, `val` is reused across the size/aspectRatio/items blocks. The `items` value is only assigned inside `if (model.contains(\"items\"))`, but the subsequent `if (val.canConvert(QMetaType::QVariantList))` is *outside* that guard. When the model has no `items` key, `val` still holds the previously-read `aspectRatio` (or `size`) map, and the items-population loop runs against stale data. It happens to be harmless today only because a QVariantMap does not convert to QVariantList, but the control flow is incorrect and fragile.","fix":"Move the list handling inside the `if (model.contains(\"items\"))` block, or reset/declare `val` locally per block so a missing `items` key cannot fall through with another field's value.","locations":[{"ref":"src/viewportslayoutmodel.cpp:182-222","code":"  182 | void ViewportsLayoutModel::fromJSValue(const QVariantMap &model)\n  183 | {\n  184 |     QVariant val;\n  185 | \n  186 |     if (model.contains(\"size\")) {\n  187 |         val = model.value(\"size\");\n  188 |         if (val.canConvert(QMetaType::QVariantMap)) {\n  189 |             int width = val.toMap().value(\"width\").toInt();\n  190 |             int height = val.toMap().value(\"height\").toInt();\n  191 |             setSize(QSize(width, height));\n  192 |         }\n  193 |     }\n  194 | \n  195 |     if (model.contains(\"aspectRatio\")) {\n  196 |         val = model.value(\"aspectRatio\");\n  197 |         if (val.canConvert(QMetaType::QVariantMap)) {\n  198 |             int width = val.toMap().value(\"width\").toInt();\n  199 |             int height = val.toMap().value(\"height\").toInt();\n  200 |             setAspectRatio(QSize(width, height));\n  201 |         }\n  202 |     }\n  203 | \n  204 |     if (model.contains(\"items\")) {\n  205 |         val = model.value(\"items\");\n  206 |     }\n  207 |     if (val.canConvert(QMetaType::QVariantList)) {\n  208 |         QVariantList items = val.toList();\n  209 |         for (int i = 0; i < std::min(m_items.size(), items.size()); ++i) {\n  210 |             QHashIterator<int, QByteArray> role(m_roleNames);\n  211 |             while (role.hasNext()) {\n  212 |                 role.next();\n  213 | \n  214 |                 const char *name = role.value();\n  215 |                 QVariantMap item = items.at(i).toMap();\n  216 |                 m_items.at(i)->setProperty(name, item.value(name));\n  217 |             }\n  218 |         }\n  219 |     }\n  220 | \n  221 |     normalize();\n  222 | }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"`normalize()` emits `dataChanged(QModelIndex(), QModelIndex())` with two *invalid* model indexes, and does so inside the per-item loop (once per element). Qt's contract for `dataChanged` requires valid top-left/bottom-right indexes in the same parent; passing invalid indexes is undefined and can trip assertions in debug builds, while emitting it N times per normalize is wasteful and forces views to re-evaluate repeatedly.","fix":"Emit a single `dataChanged(index(0,0), index(rowCount()-1,0), roles)` once after the loop when `rowCount() > 0`, or emit per-item with the correct `createIndex(index, 0)` for the specific row that changed.","locations":[{"ref":"src/viewportslayoutmodel.cpp:150-179","code":"  150 |     for (int index = 0; index < m_items.size(); ++index) {\n  151 |         auto item = get(index);\n  152 | \n  153 |         if (item->property(\"visible\").toInt() == static_cast<int>(ViewportsLayoutItem::Visible::Visible)) {\n  154 |             int columnSpan = item->property(\"columnSpan\").toInt();\n  155 |             int rowSpan = item->property(\"rowSpan\").toInt();\n  156 | \n  157 |             // Iterate hidden elements\n  158 |             for (int r = 0; r < rowSpan; ++r) {\n  159 |                 for (int c = 0; c < columnSpan; ++c) {\n  160 |                     int hiddenIndex = dataIndex(column(index) + c, row(index) + r);\n  161 |                     if (hiddenIndex != index) {\n  162 |                         auto hiddenItem = get(hiddenIndex);\n  163 |                         if (hiddenItem->property(\"visible\").toInt() == static_cast<int>(ViewportsLayoutItem::Visible::Visible)) {\n  164 |                             hiddenItem->setProperty(\"columnSpan\", -c);\n  165 |                             hiddenItem->setProperty(\"rowSpan\", -r);\n  166 |                             hiddenItem->setProperty(\"visible\", static_cast<int>(ViewportsLayoutItem::Visible::Hidden));\n  167 |                         } else {\n  168 |                             // Span collision\n  169 |                             item->setProperty(\"columnSpan\", 1);\n  170 |                             item->setProperty(\"rowSpan\", 1);\n  171 |                             goto normalize;\n  172 |                         }\n  173 |                     }\n  174 |                 }\n  175 |             }\n  176 |         }\n  177 | \n  178 |         emit dataChanged(QModelIndex(), QModelIndex());\n  179 |     }"}]},{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","description":"`ViewportsLayoutsCollectionModel::remove(int index, int count = 1)` is `Q_INVOKABLE` (callable from QML, e.g. the preset-delete dialog) but performs no bounds validation before `beginRemoveRows(QModelIndex(), index, index + count - 1)` and `m_models.remove(index, count)`. An out-of-range index or count (e.g. a stale `presetDeleteDialog.index`) drives `QVector::remove` out of bounds and trips a Qt assertion / undefined behavior.","fix":"Clamp/validate before mutating: `if (index < 0 || count <= 0 || index + count > m_models.size()) return;` then proceed with the begin/remove/end sequence.","locations":[{"ref":"src/viewportslayoutscollectionmodel.cpp:83-90","code":"   83 | void ViewportsLayoutsCollectionModel::remove(int index, int count)\n   84 | {\n   85 |     beginRemoveRows(QModelIndex(), index, index + count - 1);\n   86 |     m_models.remove(index, count);\n   87 |     endRemoveRows();\n   88 | \n   89 |     emit countChanged(m_models.size());\n   90 | }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","description":"The `Delete` key handler iterates `0 .. size.width*size.height` and dereferences `root.get(i).selected` without checking for `undefined`. `root.get(i)` returns `undefined` when the repeater item is null or the child is missing (it explicitly `return undefined`/bare `return` in those cases), so `.selected` on `undefined` throws a TypeError that aborts the loop and leaves the deletion half-applied.","fix":"Guard each access: `var vp = root.get(i); if (vp && vp.selected) { ... }`.","locations":[{"ref":"src/ViewportsLayout.qml:608-616","code":"  608 |         case Qt.Key_Delete:\n  609 |             for (var i = 0; i < root.size.width * root.size.height; ++i) {\n  610 |                 if (root.get(i).selected) {\n  611 |                     model.get(i).url = \"\";\n  612 |                     model.get(i).volume = 0;\n  613 |                     model.get(i).avFormatOptions = layoutsCollectionSettings.toJSValue(\"defaultAVFormatOptions\");\n  614 |                 }\n  615 |             }\n  616 |             break;"},{"ref":"src/ViewportsLayout.qml:621-632","code":"  621 |     function get(index) {\n  622 |         if (index >= 0 && index < repeater.count) {\n  623 |             var item = repeater.itemAt(index);\n  624 |             if (item === null) {\n  625 |                 return undefined;\n  626 |             }\n  627 | \n  628 |             return item.children[0];\n  629 |         }\n  630 | \n  631 |         return;\n  632 |     }"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","description":"`ViewportsLayoutModel::data()` guards only the row via `hasIndex()` but then unconditionally dereferences `get(index.row())->property(...)`. `get()` is `m_items.value(index)`, which returns a null pointer for an unset slot. If `data()` is queried for a row whose slot has not yet been populated by `normalize()` (e.g. mid-reset), this is a null-pointer dereference.","fix":"Null-check: `auto *item = get(index.row()); return item ? item->property(m_roleNames.value(role)) : QVariant();`.","locations":[{"ref":"src/viewportslayoutmodel.cpp:39-46","code":"   39 | QVariant ViewportsLayoutModel::data(const QModelIndex &index, int role) const\n   40 | {\n   41 |     if (!hasIndex(index.row(), index.column())) {\n   42 |         return {};\n   43 |     }\n   44 | \n   45 |     return get(index.row())->property(m_roleNames.value(role));\n   46 | }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","description":"`toJSValue()` calls `qobject_cast<ViewportsLayoutModel*>(get(i))->toJSValue()` directly on the result. `get(i)` (`m_models.value(i)`) can be null for an unset slot, and if a non-`ViewportsLayoutModel` were ever stored the `qobject_cast` would return null — either way the immediate `->toJSValue()` dereferences null. The `qobject_cast` is also redundant since `get(i)` already returns `ViewportsLayoutModel*`.","fix":"Drop the redundant cast and null-check: `if (auto *m = get(i)) collection.append(m->toJSValue());`.","locations":[{"ref":"src/viewportslayoutscollectionmodel.cpp:116-126","code":"  116 | QVariantList ViewportsLayoutsCollectionModel::toJSValue() const\n  117 | {\n  118 |     QVariantList collection;\n  119 | \n  120 |     for (int i = 0; i < m_models.size(); ++i) {\n  121 |          QVariantMap model = qobject_cast<ViewportsLayoutModel*>(get(i))->toJSValue();\n  122 |          collection.append(model);\n  123 |     }\n  124 | \n  125 |     return collection;\n  126 | }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`EventFilter::prepareEvents` clears `m_events`, then iterates the requested event-type names; on the first unrecognized name (`keyToValue` returns < 0) it `return`s, silently discarding every remaining valid name in the list and leaving a partially-populated filter. One typo in the QML `eventTypes` list quietly drops all subsequent event types with no diagnostic.","fix":"Skip the bad entry instead of aborting (`continue;`), and/or emit a warning so the misconfiguration is visible: log the offending key and keep processing the rest.","locations":[{"ref":"src/eventfilter.cpp:48-59","code":"   48 | void EventFilter::prepareEvents(QStringList events)\n   49 | {\n   50 |     m_events.clear();\n   51 | \n   52 |     for (const auto &i : events) {\n   53 |         auto type = m_metaEnum.keyToValue(i.toUtf8());\n   54 |         if (type < 0) {\n   55 |             return;\n   56 |         }\n   57 |         m_events.push_back(static_cast<QEvent::Type>(type));\n   58 |     }\n   59 | }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`Number.prototype.inRange` (utils.js) is defined but never called anywhere in the QML/JS sources. Combined with its broken implementation, it is dead, defective code that will mislead anyone who tries to use it.","fix":"Remove the function, or fix it (see the logic_error finding) if it is intended to be part of the public Utils API.","locations":[{"ref":"src/imports/CCTV_Viewer/Utils/utils.js:110-112","code":"  110 | Number.prototype.inRange = function(min, max) {\n  111 |     return (this >= min && val <= this) ? true : false;\n  112 | }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"Inside the per-item `changed` lambda, the signal is emitted as `emit reinterpret_cast<ViewportsLayoutModel *>(this)->dataChanged(index, index)`. `this` is already a `ViewportsLayoutModel*` in this member function, so the `reinterpret_cast` is a no-op that only obscures intent (and would silently mask a type error if the surrounding code were refactored).","fix":"Remove the cast: `emit dataChanged(index, index);`.","locations":[{"ref":"src/viewportslayoutmodel.cpp:124-131","code":"  124 |             connect(item, &ViewportsLayoutItem::changed, this, [=] {\n  125 |                 for (int i = 0; i < m_items.size(); ++i) {\n  126 |                     if (item == m_items.at(i)) {\n  127 |                         QModelIndex index = createIndex(i, 0);\n  128 |                         emit reinterpret_cast<ViewportsLayoutModel *>(this)->dataChanged(index, index);\n  129 |                     }\n  130 |                 }\n  131 |             });"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","description":"Player volume is computed as `Math.max(viewport.volume, root.fullScreenIndex === index && viewportSettings.unmuteWhenFullScreen)`. The second argument is a boolean that JS coerces to 0/1 inside `Math.max`, so 'unmute when full screen' forces volume to exactly `1.0`, discarding the viewport's stored volume, and the expression relies on implicit bool→number coercion that is hard to read and easy to break.","fix":"Make the intent explicit, e.g. `volume: (root.fullScreenIndex === index && viewportSettings.unmuteWhenFullScreen) ? Math.max(viewport.volume, 1.0) : viewport.volume` (or preserve the stored volume rather than clamping to 1).","locations":[{"ref":"src/ViewportsLayout.qml:434","code":"  434 |                             volume: Math.max(viewport.volume, root.fullScreenIndex === index && viewportSettings.unmuteWhenFullScreen)"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The label and comment in `normalize()` are misspelled: the goto target is `normalize:` and the comment reads `// Mormalize properties` (should be 'Normalize'). Minor, but the label-based control flow here is already subtle, so accurate naming/spelling matters for the next reader.","fix":"Fix the typo (`// Normalize properties`) and consider replacing the `goto normalize` retry with a bounded loop for readability.","locations":[{"ref":"src/viewportslayoutmodel.cpp:111-112","code":"  111 | normalize:\n  112 |     // Mormalize properties"}]}]</script>
<div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-06-03 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
