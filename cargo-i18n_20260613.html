"pot\");\n   87 | \n   88 |         util::create_dir_all_if_not_exists(pot_file_path.parent().with_context(|| {\n   89 |             format!(\n   90 |                 \"Expected that pot file path \\\"{0}\\\" would be inside a directory (have a parent)\",\n   91 |                 &pot_file_path.to_string_lossy()\n   92 |             )\n   93 |         })?)?;\n   94 | \n   95 |         // ======= Run the `xtr` command to extract translatable strings =======\n   96 |         let xtr_command_name = \"xtr\";\n   97 |         let mut xtr = Command::new(xtr_command_name);\n   98 | \n   99 |         if let Some(copyright_holder) = &gettext_config.copyright_holder {\n  100 |             xtr.args([\"--copyright-holder\", copyright_holder.as_str()]);\n  101 |         }\n  102 | \n  103 |         if let Some(msgid_bugs_address) = &gettext_config.msgid_bugs_address {\n  104 |             xtr.args([\"--msgid-bugs-address\", msgid_bugs_address.as_str()]);\n  105 |         }\n  106 | \n  107 |         xtr.args([\n  108 |             \"--package-name\",\n  109 |             crt.name.as_str(),\n  110 |             \"--package-version\",\n  111 |             crt.version.as_str(),\n  112 |             \"--default-domain\",\n  113 |             crt.module_name().as_str(),\n  114 |             \"--add-location\",\n  115 |             gettext_config.add_location.to_str(),\n  116 |             \"-o\",\n  117 |             pot_file_path.to_str().ok_or_else(|| {\n  118 |                 PathError::not_valid_utf8(pot_file_path.clone(), \"pot\", PathType::File)\n  119 |             })?,\n  120 |             rs_file_path.to_str().ok_or_else(|| {\n  121 |                 PathError::not_valid_utf8(rs_file_path.clone(), \"rs\", PathType::File)\n  122 |             })?,\n  123 |         ]);\n  124 | \n  125 |         util::run_command_and_check_success(xtr_command_name, xtr)?;\n  126 | \n  127 |         pot_paths.push(pot_file_path.to_owned());\n  128 |     }","lines":59}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"In `check_message_args`/`check_attribute_args`, the `available_args` string (joining all available argument names) is rebuilt from scratch inside the per-argument closure on every missing argument. If multiple specified args are invalid, the same available-args list is recomputed repeatedly. Minor compile-time-only cost.","fix":"Compute the `available_args` joined string once before the iteration and reuse it.","locations":[{"ref":"i18n-embed-fl/src/lib.rs:748-753","code":"  748 |                 if !args_set.contains(arg.as_str()) {\n  749 |                     let available_args: String = args_set\n  750 |                         .iter()\n  751 |                         .map(|arg| format!(\"`{arg}`\"))\n  752 |                         .collect::<Vec<String>>()\n  753 |                         .join(\", \");","lines":6},{"ref":"i18n-embed-fl/src/lib.rs:818-823","code":"  818 |             if !args_set.contains(arg.as_str()) {\n  819 |                 let available_args: String = args_set\n  820 |                     .iter()\n  821 |                     .map(|arg| format!(\"`{arg}`\"))\n  822 |                     .collect::<Vec<String>>()\n  823 |                     .join(\", \");","lines":6}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"In gettext load_languages, `language_ids.iter().next()` is an over-verbose way to obtain the first element; `language_ids.first()` is clearer and idiomatic. Purely a readability/idiom nit, no behavioral impact.","fix":"Replace `.iter().next()` with `.first()`.","locations":[{"ref":"i18n-embed/src/gettext.rs:90-93","code":"   90 |         let language_id = language_ids\n   91 |             .iter()\n   92 |             .next()\n   93 |             .ok_or(I18nEmbedError::RequestedLanguagesEmpty)?;","lines":4}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"available_languages collects path components into a Vec<Component> only to read components.first() and components.get(1). Collecting the whole component list allocates a Vec per filename even though only the first two are needed.","fix":"Use the components iterator directly: `let mut it = path.components(); let locale = it.next(); let file = it.next();` avoiding the Vec allocation.","locations":[{"ref":"i18n-embed/src/lib.rs:679-694","code":"  679 |                 let components: Vec<Component<'_>> = path.components().collect();\n  680 | \n  681 |                 let locale: Option<String> = match components.first() {\n  682 |                     Some(Component::Normal(s)) => {\n  683 |                         Some(s.to_str().expect(\"path should be valid utf-8\").to_string())\n  684 |                     }\n  685 |                     _ => None,\n  686 |                 };\n  687 | \n  688 |                 let language_file_name: Option<String> =\n  689 |                     components.get(1).and_then(|component| match component {\n  690 |                         Component::Normal(s) => {\n  691 |                             Some(s.to_str().expect(\"path should be valid utf-8\").to_string())\n  692 |                         }\n  693 |                         _ => None,\n  694 |                     });","lines":16}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In `run_xtr`, a `msgcat_args: Vec<Box<OsStr>>` is built from `pot_paths` and pushed into, but it is never read afterwards: `run_msgcat(&pot_paths, ...)` is called with `pot_paths` directly. This is leftover/duplicated logic (the same Vec construction is repeated inside `run_msgcat` itself) that allocates needlessly and confuses readers.","fix":"Delete the unused `msgcat_args` block (lines 130-134).","locations":[{"ref":"i18n-build/src/gettext_impl/mod.rs:130-138","code":"  130 |     let mut msgcat_args: Vec<Box<OsStr>> = Vec::new();\n  131 | \n  132 |     for path in &pot_paths {\n  133 |         msgcat_args.push(Box::from(path.as_os_str()));\n  134 |     }\n  135 | \n  136 |     let combined_pot_file_path = crate_module_pot_file_path(crt, pot_dir);\n  137 | \n  138 |     run_msgcat(&pot_paths, &combined_pot_file_path)","lines":9}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`pot_dir()` contains a large commented-out match block, including a `panic!(\"panic\")` placeholder, left over from development. It is noise that obscures the actual one-line implementation below it.","fix":"Delete the commented-out block (lines 69-74).","locations":[{"ref":"i18n-config/src/gettext.rs:68-78","code":"   68 |     pub fn pot_dir(&self) -> PathBuf {\n   69 |         // match self.pot_dir {\n   70 |         //     Some(pot_dir) => pot_dir,\n   71 |         //     None => {\n   72 |         //         panic!(\"panic\");\n   73 |         //     },\n   74 |         // }\n   75 |         self.pot_dir\n   76 |             .clone()\n   77 |             .unwrap_or_else(|| self.output_dir.join(\"pot\"))\n   78 |     }","lines":11}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The `CannotParseCargoToml(PathBuf, String)` and `CannotPaseI18nToml(PathBuf, String)` error variants are defined but never constructed anywhere in the crate (cargo-toml parse errors go through `CannotDeserializeToml`; i18n parse errors likewise). They are unused public API surface.","fix":"Remove the two unused variants, or actually use them where toml parsing currently funnels into `CannotDeserializeToml`.","locations":[{"ref":"i18n-config/src/lib.rs:39-44","code":"   39 |     #[error(\"Cannot parse Cargo configuration file {0:?} because {1}.\")]\n   40 |     CannotParseCargoToml(PathBuf, String),\n   41 |     #[error(\"Cannot deserialize toml file {0:?} because {1}.\")]\n   42 |     CannotDeserializeToml(PathBuf, basic_toml::Error),\n   43 |     #[error(\"Cannot parse i18n configuration file {0:?} because {1}.\")]\n   44 |     CannotPaseI18nToml(PathBuf, String),","lines":6}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"DefaultLocalizer stores `watchers: Vec<Box<dyn Watcher>>` but the field is never read anywhere - watchers are only kept alive so their Drop unsubscribes. There is no accessor and no use beyond storage. This is fine as an RAII guard, but it is only ever populated by with_autoreload which is restricted to DefaultLocalizer<'static>; for the common non-static localizer the field is permanently empty dead storage.","fix":"Acceptable as an RAII guard; consider a brief comment that the field exists solely to keep Watchers alive, mirroring the comment on assets.rs Watchers struct.","locations":[{"ref":"i18n-embed/src/lib.rs:535","code":"  535 |     watchers: Vec<Box<dyn Watcher + Send + Sync + 'static>>,","lines":1},{"ref":"i18n-embed/src/lib.rs:567","code":"  567 |             watchers: Vec::new(),","lines":1},{"ref":"i18n-embed/src/lib.rs:572-587","code":"  572 | impl DefaultLocalizer<'static> {\n  573 |     /// Create a new [DefaultLocalizer](DefaultLocalizer).\n  574 |     pub fn with_autoreload(mut self) -> Result<Self, I18nEmbedError> {\n  575 |         let assets = self.i18n_assets;\n  576 |         let loader = self.language_loader;\n  577 |         let watcher = self\n  578 |             .i18n_assets\n  579 |             .subscribe_changed(std::sync::Arc::new(move || {\n  580 |                 if let Err(error) = loader.reload(assets) {\n  581 |                     log::error!(\"Error autoreloading assets: {error:?}\")\n  582 |                 }\n  583 |             }))?;\n  584 |         self.watchers.push(watcher);\n  585 |         Ok(self)\n  586 |     }\n  587 | }","lines":16}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The error walking message is hardcoded to \"error walking directory gui/: {}\" inside the generic `cargo_rerun_if_dir_changed`, which walks an arbitrary `path` argument, not a `gui/` directory. The message is copied from a specific caller and is misleading for any other directory.","fix":"Interpolate the actual `path` into the message, e.g. `anyhow!(\"error walking directory {}: {}\", path.display(), err)`.","locations":[{"ref":"i18n-build/src/watch.rs:31-37","code":"   31 |     for result in WalkDir::new(path) {\n   32 |         match result {\n   33 |             Ok(entry) => {\n   34 |                 cargo_rerun_if_changed(entry.path())?;\n   35 |             }\n   36 |             Err(err) => return Err(anyhow!(\"error walking directory gui/: {}\", err)),\n   37 |         }","lines":7}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment for `I18nConfigError::CannotReadFile` says the file is read \"in the current working directory\", but the variant is also used to report failures reading `Cargo.toml` (lib.rs:110-112) and the i18n toml at an absolute/relative path (lib.rs:357-363) that are not necessarily in the CWD. The second field `io::Result<PathBuf>` stores the CWD only for context, so the message is misleading about where the unreadable file actually lives.","fix":"Reword the message to clarify the first path is the file that could not be read and the second is merely the current working directory for context, e.g. \"Cannot read file {0:?} (current working directory: {1:?}) because {2}.\"","locations":[{"ref":"i18n-config/src/lib.rs:37-38","code":"   37 |     #[error(\"Cannot read file {0:?} in the current working directory {1:?} because {2}.\")]\n   38 |     CannotReadFile(PathBuf, io::Result<PathBuf>, #[source] io::Error),","lines":2}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for select() (the `fn select` method on the Localizer trait) reads \"Automatically the language currently requested by the system by the the [LanguageRequester]\" - it is missing a verb (e.g. \"selects\") and contains a doubled \"the the\" and an unbalanced parenthesis, making it ungrammatical and unclear.","fix":"Rewrite, e.g.: \"Automatically selects the language currently requested by the system (via the LanguageRequester), loading it using the provided LanguageLoader.\"","locations":[{"ref":"i18n-embed/src/lib.rs:514-516","code":"  514 |     /// Automatically the language currently requested by the system\n  515 |     /// by the the [LanguageRequester](LanguageRequester)), and load\n  516 |     /// it using the provided [LanguageLoader](LanguageLoader).","lines":3}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The NotifyError doc comment claims the type \"requires the following crate features to be activated: filesystem-assets\", but the type is gated on `#[cfg(feature = \"autoreload\")]`, not filesystem-assets. The comment text and the cfg gate disagree.","fix":"Change the doc to reference the `autoreload` feature to match the cfg gate.","locations":[{"ref":"i18n-embed/src/assets.rs:150-155","code":"  150 | /// An error that occurs during notification of changes when the `autoreload feature is enabled.`\n  151 | ///\n  152 | /// ⚠️ *This type requires the following crate features to be activated: `filesystem-assets`.*\n  153 | #[cfg(feature = \"autoreload\")]\n  154 | #[derive(Debug)]\n  155 | pub struct NotifyError(notify::Error);","lines":6}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Typo / stray backtick in NotifyError doc: \"when the `autoreload feature is enabled.`\" - the backtick spans the words and the trailing period, producing malformed inline code in rendered docs.","fix":"Wrap only the feature <script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
