<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In load_languages, when a non-fallback language has no language files, the code logs a debug message but does NOT return early (the early return only happens for the fallback language). Execution falls through to `files.into_iter().map(...).collect()` which produces an empty inner Vec for that language. Later, line 591 calls `language_bundles.first().expect(...)` on every per-language group, which panics for the empty group. Thus loading any requested language whose .ftl file is missing (while the fallback exists) crashes the application instead of degrading gracefully.","fix":"Filter out empty per-language bundle groups before building `language_map`/`language_bundles`, or skip pushing a group when its files are empty. For example, collect into the outer Vec only when the inner Vec is non-empty, and adjust the `indices` computation accordingly so it does not assume `language_bundles.len() == load_language_ids.len()`.","locations":[{"ref":"i18n-embed/src/fluent.rs:551-556","code":"  551 |             if files.is_empty() {\n  552 |                 log::debug!(target:\"i18n_embed::fluent\", \"Unable to find language file: \\\"{0}\\\" for language: \\\"{1}\\\"\", path, language);\n  553 |                 if language == &self.fallback_language {\n  554 |                     return Err(I18nEmbedError::LanguageNotAvailable(path, language.clone()));\n  555 |                 }\n  556 |             }","lines":6},{"ref":"i18n-embed/src/fluent.rs:586-595","code":"  586 |                 language_map: language_bundles\n  587 |                     .iter()\n  588 |                     .enumerate()\n  589 |                     .map(|(i, language_bundles)| {\n  590 |                         (\n  591 |                             language_bundles.first().expect(\"Expect there to be at least bundle in a set of bundles per language\").language.clone(),\n  592 |                             i\n  593 |                         )\n  594 |                     })\n  595 |                     .collect(),","lines":10}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"The `path` argument is defined without any `value_parser`, so clap stores it as the default type `String`. At line 161 it is then read with `get_one::<PathBuf>(\"path\")`. In clap v4, `get_one::<T>` panics (\"Mismatch between definition and access\") when the requested type does not match the type produced by the value parser. As a result, whenever a user actually passes `--path <dir>`, the program panics instead of localizing that crate. The bug is masked when `--path` is omitted because `get_one` returns `None` without attempting a downcast, so the `.unwrap_or_else(|| \".\")` fallback hides it in the common case and in tests.","fix":"Add `.value_parser(clap::value_parser!(std::path::PathBuf))` to the `path` arg definition, or read it as `get_one::<String>(\"path\")` and convert to `PathBuf` afterwards.","locations":[{"ref":"src/main.rs:112-119","code":"  112 |             .arg(Arg::new(\"path\")\n  113 |                 .help(\n  114 |                     // The help message for the `--path` command line argument.\n  115 |                     tr!(\"Path to the crate you want to localize (if not the current directory). The crate needs to contain \\\"i18n.toml\\\" in its root.\")\n  116 |                     )\n  117 |                 .long(\"path\")\n  118 |                 .num_args(1)\n  119 |             )","lines":8},{"ref":"src/main.rs:160-163","code":"  160 |         let path = i18n_matches\n  161 |             .get_one::<PathBuf>(\"path\")\n  162 |             .map(ToOwned::to_owned)\n  163 |             .unwrap_or_else(|| PathBuf::from(\".\"));","lines":4}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`run_msgfmt` uses `.expect(\"mo file path is not valid utf-8\")` and `.expect(\"po file path is not valid utf-8\")` to convert paths to `&str`, whereas every other command builder in this module gracefully returns a `PathError::not_valid_utf8`. On systems with non-UTF-8 paths this panics instead of producing the intended translated error.","fix":"Replace the `.expect(...)` calls with `.ok_or_else(|| PathError::not_valid_utf8(...))?` matching the other functions.","locations":[{"ref":"i18n-build/src/gettext_impl/mod.rs:355-366","code":"  355 |         let msgfmt_arg_output_file = format!(\n  356 |             \"--output-file={}\",\n  357 |             mo_file_path\n  358 |                 .to_str()\n  359 |                 .expect(\"mo file path is not valid utf-8\")\n  360 |         );\n  361 |         let mut msgfmt_args = vec![\n  362 |             msgfmt_arg_output_file.as_str(),\n  363 |             po_file_path\n  364 |                 .to_str()\n  365 |                 .expect(\"po file path is not valid utf-8\"),\n  366 |         ];","lines":12}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In `run`, `crt.path.canonicalize().unwrap()` and `config_crate.path.canonicalize().unwrap()` will panic if either path does not exist or is inaccessible (e.g. a misconfigured subcrate path, permission error, or broken symlink). Since these are user/config-supplied paths, this turns a recoverable filesystem error into a hard panic with no context.","fix":"Propagate the error with `?` and a context message (map canonicalize errors into a PathError) instead of unwrapping.","locations":[{"ref":"i18n-build/src/gettext_impl/mod.rs:441-442","code":"  441 |         let prepend_crate_path =\n  442 |             crt.path.canonicalize().unwrap() != config_crate.path.canonicalize().unwrap();","lines":2}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"load_languages for gettext calls `Catalog::parse(...).expect(\"could not parse the catalog\")`. A corrupt or malformed .mo file (which can be supplied by embedded/external assets) will panic the whole program instead of producing a recoverable I18nEmbedError. The fluent loader, by contrast, handles parse errors gracefully by logging.","fix":"Map the parse error into an I18nEmbedError (or log and fall back to the source language) instead of using `.expect`.","locations":[{"ref":"i18n-embed/src/gettext.rs:119-120","code":"  119 |         let catalog = gettext_system::Catalog::parse(&**file).expect(\"could not parse the catalog\");\n  120 |         tr::internal::set_translator(self.module, catalog);","lines":2}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"available_languages calls .expect(\"path should be valid utf-8\") on path components obtained from filenames produced by an I18nAssets implementation. A custom or filesystem-backed asset source can legitimately produce a path whose component is not valid UTF-8 (the FileSystemAssets impl walks the real file system), which will panic the whole language-discovery path instead of skipping the file.","fix":"Replace `.expect(...)` with a graceful skip: use `s.to_str().map(str::to_string)` and treat None as a non-matching entry (return None) rather than panicking.","locations":[{"ref":"i18n-embed/src/lib.rs:681-694","code":"  681 |                 let locale: Option<String> = match components.first() {\n  682 |                     Some(Component::Normal(s)) => {\n  683 |                         Some(s.to_str().expect(\"path should be valid utf-8\").to_string())\n  684 |                     }\n  685 |                     _ => None,\n  686 |                 };\n  687 | \n  688 |                 let language_file_name: Option<String> =\n  689 |                     components.get(1).and_then(|component| match component {\n  690 |                         Component::Normal(s) => {\n  691 |                             Some(s.to_str().expect(\"path should be valid utf-8\").to_string())\n  692 |                         }\n  693 |                         _ => None,\n  694 |                     });","lines":14}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"`String::leak` is used three times (fallback locale and every available-language string) to obtain `'static str` for clap. These allocations are intentionally leaked and never freed. For a one-shot CLI this is harmless, but it is an unusual pattern: the leak scales with the number of available translations and would matter if this bootstrap code were ever reused in a long-running context.","fix":"Prefer building the clap Command without `'static` leaks - e.g. keep the owned `Vec<String>` alive in a local and use clap APIs that accept owned values, or accept the leak but document why it is safe here with a one-line comment.","locations":[{"ref":"src/main.rs:89-95","code":"   89 |     let fallback_locale: &'static str =\n   90 |         String::leak(language_loader().fallback_language().to_string());\n   91 |     let available_languages = available_languages(&*cargo_i18n_localizer_rc)?;\n   92 |     let available_languages_slice: Vec<&'static str> = available_languages\n   93 |         .into_iter()\n   94 |         .map(|l| String::leak(l) as &str)\n   95 |         .collect();","lines":7}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`WhyNotCrate::Workspace` is never constructed anywhere. `Crate::from` only ever returns `WhyNotCrate::NoCargoToml`, and parses the Cargo.toml into `RawCrate` which requires `package.name`/`package.version`. When pointed at a workspace-root Cargo.toml (which has a `[workspace]` table but no `[package]`), `Crate::from` fails with `CannotDeserializeToml` instead of the intended `NotACrate(_, WhyNotCrate::Workspace)`. As a result `find_parent` never recognises a workspace parent, so the `NotACrate(path, WhyNotCrate::Workspace)` match arm in `find_parent` is dead and parent resolution emits a misleading error log for the common case of a crate living directly under a workspace root.","fix":"In `Crate::from`, before deserializing into `RawCrate`, detect a workspace root (e.g. a parsed `[workspace]` table with no `[package]`) and return `NotACrate(path_into, WhyNotCrate::Workspace)`. Then the existing `find_parent` arm becomes reachable and the workspace parent is handled gracefully.","locations":[{"ref":"i18n-config/src/lib.rs:101-122","code":"  101 |         let cargo_path = path_into.join(\"Cargo.toml\");\n  102 | \n  103 |         if !cargo_path.exists() {\n  104 |             return Err(I18nConfigError::NotACrate(\n  105 |                 path_into,\n  106 |                 WhyNotCrate::NoCargoToml,\n  107 |             ));\n  108 |         }\n  109 | \n  110 |         let toml_str = read_to_string(cargo_path.clone()).map_err(|err| {\n  111 |             I18nConfigError::CannotReadFile(cargo_path.clone(), std::env::current_dir(), err)\n  112 |         })?;\n  113 | \n  114 |         let cargo_toml: RawCrate = basic_toml::from_str(&toml_str)\n  115 |             .map_err(|err| I18nConfigError::CannotDeserializeToml(cargo_path.clone(), err))?;\n  116 | \n  117 |         let full_config_file_path = path_into.join(&config_file_path_into);\n  118 |         let i18n_config = if full_config_file_path.exists() {\n  119 |             Some(I18nConfig::from_file(&full_config_file_path)?)\n  120 |         } else {\n  121 |             None\n  122 |         };","lines":22},{"ref":"i18n-config/src/lib.rs:255-267","code":"  255 |                         I18nConfigError::NotACrate(path, WhyNotCrate::Workspace) => {\n  256 |                             debug!(\"The parent of {0} at path {1:?} is a workspace\", self, path);\n  257 |                         }\n  258 |                         I18nConfigError::NotACrate(path, WhyNotCrate::NoCargoToml) => {\n  259 |                             debug!(\"The parent of {0} at path {1:?} is not a valid crate with a Cargo.toml\", self, path);\n  260 |                         }\n  261 |                         _ => {\n  262 |                             error!(\n  263 |                                 \"Error occurred while attempting to resolve parent of {0}: {1}\",\n  264 |                                 self, err\n  265 |                             );\n  266 |                         }\n  267 |                     }","lines":13}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"FileSystemAssets::filenames_iter yields only the bare final path component (DirEntry::file_name returns e.g. \"domain.ftl\"), discarding the locale directory. LanguageLoader::available_languages in lib.rs relies on the filename having at least two path components ({locale}/{file}) to extract the locale from components.first() and the file name from components.get(1). With only a single component, components.get(1) is always None, so no language file is ever matched and no available languages are discovered from a FileSystemAssets source (only the manually-inserted fallback remains). This breaks language discovery for the filesystem-assets feature.","fix":"Yield the path relative to base_dir instead of just the file name, e.g. `f.path().strip_prefix(&self.base_dir).ok()?.to_str()` (with the same UTF-8 handling), so the returned string preserves the {locale}/{domain} structure that available_languages parses.","locations":[{"ref":"i18n-embed/src/assets.rs:239-268","code":"  239 |     fn filenames_iter(&self) -> Box<dyn Iterator<Item = String>> {\n  240 |         Box::new(\n  241 |             walkdir::WalkDir::new(&self.base_dir)\n  242 |                 .into_iter()\n  243 |                 .filter_map(|f| match f {\n  244 |                     Ok(f) => {\n  245 |                         if f.file_type().is_file() {\n  246 |                             match f.file_name().to_str() {\n  247 |                                 Some(filename) => Some(filename.to_string()),\n  248 |                                 None => {\n  249 |                                     log::error!(\n  250 |                                 target: \"i18n_embed::assets\", \n  251 |                                 \"Filename {:?} is not valid UTF-8.\", \n  252 |                                 f.file_name());\n  253 |                                     None\n  254 |                                 }\n  255 |                             }\n  256 |                         } else {\n  257 |                             None\n  258 |                         }\n  259 |                     }\n  260 |                     Err(err) => {\n  261 |                         log::error!(\n  262 |                     target: \"i18n_embed::assets\", \n  263 |                     \"Unexpected error while gathering localization asset filenames: {}\", \n  264 |                     err);\n  265 |                         None\n  266 |                     }\n  267 |                 }),\n  268 |         )","lines":30},{"ref":"i18n-embed/src/lib.rs:674-711","code":"  674 |         let mut language_strings: Vec<String> = i18n_assets\n  675 |             .filenames_iter()\n  676 |             .filter_map(|filename| {\n  677 |                 let path: &Path = Path::new(&filename);\n  678 | \n  679 |                 let components: Vec<Component<'_>> = path.components().collect();\n  680 | \n  681 |                 let locale: Option<String> = match components.first() {\n  682 |                     Some(Component::Normal(s)) => {\n  683 |                         Some(s.to_str().expect(\"path should be valid utf-8\").to_string())\n  684 |                     }\n  685 |                     _ => None,\n  686 |                 };\n  687 | \n  688 |                 let language_file_name: Option<String> =\n  689 |                     components.get(1).and_then(|component| match component ted uniformly.","locations":[{"ref":"i18n-embed/src/fluent.rs:156-161","code":"  156 |         inner\n  157 |             .current_languages\n  158 |             .indices\n  159 |             .iter()\n  160 |             .map(|&idx| &language_config.language_bundles[idx])\n  161 |             .flat_map(|language_bundles| language_bundles.iter())","lines":6},{"ref":"i18n-embed/src/fluent.rs:231-232","code":"  231 |         language_config.language_bundles.iter()\n  232 |             .flat_map(|language_bundles| language_bundles.iter())","lines":2},{"ref":"i18n-embed/src/fluent.rs:294-297","code":"  294 |             .language_bundles\n  295 |             .iter()\n  296 |             .flat_map(|language_bundles| language_bundles.iter())\n  297 |             .any(|language_bundle| language_bundle.bundle.has_message(message_id))","lines":4},{"ref":"i18n-embed/src/fluent.rs:313-316","code":"  313 |             .language_bundles\n  314 |             .iter()\n  315 |             .flat_map(|bundles| bundles.iter())\n  316 |             .find_map(|bundle| {","lines":4},{"ref":"i18n-embed/src/fluent.rs:338-341","code":"  338 |             .language_bundles\n  339 |             .iter()\n  340 |             .flat_map(|language_bundles| language_bundles.iter())\n  341 |             .find_map(|language_bundle| language_bundle.bundle.get_message(message_id))","lines":4},{"ref":"i18n-embed/src/fluent.rs:367-370","code":"  367 |             .language_bundles\n  368 |             .iter()\n  369 |             .flat_map(|language_bundles| language_bundles.iter())\n  370 |             .find_map(|language_bundle| {","lines":4}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"has_attr uses `find_map` which returns on the FIRST bundle whose `get_message` returns Some, mapping to whether that single bundle also has the attribute. If an earlier-priority language contains the message but lacks the attribute while a later language has both the message and the attribute, the function incorrectly returns false. This directly contradicts the documented contract ('Returns true if at least one available instance was found').","fix":"Use `.any(|bundle| bundle.bundle.get_message(message_id).map_or(false, |m| m.get_attribute(attribute_id).is_some()))` so all bundles are scanned and the first that has both message and attribute returns true.","locations":[{"ref":"i18n-embed/src/fluent.rs:308-323","code":"  308 |     pub fn has_attr(&self, message_id: &str, attribute_id: &str) -> bool {\n  309 |         self.inner\n  310 |             .load()\n  311 |             .language_config\n  312 |             .read()\n  313 |             .language_bundles\n  314 |             .iter()\n  315 |             .flat_map(|bundles| bundles.iter())\n  316 |             .find_map(|bundle| {\n  317 |                 bundle\n  318 |                     .bundle\n  319 |                     .get_message(message_id)\n  320 |                     .map(|message| message.get_attribute(attribute_id).is_some())\n  321 |             })\n  322 |             .unwrap_or(false)\n  323 |     }","lines":16}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`run_msgcat` detects when the output path is also an input (`output_in_input`) and writes to an interim `.pot.tmp` to avoid msgcat reading and truncating the same file. But when `output_in_input` is false it writes straight to `output_pot_path`; the temp-file safety only triggers on exact `PathBuf` equality (`input_path_ref == output_pot_path.as_ref()`). Differing-but-equivalent paths (relative vs absolute, trailing components, symlinks) bypass the guard and msgcat can read a file it is simultaneously truncating, producing a corrupted/empty pot file.","fix":"Compare canonicalized paths, or always write to an interim temp file then rename, regardless of detected overlap.","locations":[{"ref":"i18n-build/src/gettext_impl/mod.r 1 |             crt.path.to_string_lossy()\n  392 |         )\n  393 |     });\n  394 | \n  395 |     let gettext_config = config_crate\n  396 |         .gettext_config_or_err()\n  397 |         .expect(\"expected gettext config to be present\");\n  398 | \n  399 |     let do_xtr = config_crate.gettext_config_or_err()?.xtr.unwrap_or(true);","lines":13}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The blanket `impl<T: RustEmbed> I18nAssets for T` overrides subscribe_changed (lines 47-53) to silently ignore the `changed` callback and return a no-op Watcher, identical to the trait default. This means DefaultLocalizer::with_autoreload and any autoreload wiring appears to succeed for a RustEmbed source but never fires a reload. While documented as optional, overriding the method to a no-op (instead of relying on the default) is dead and misleading: it suggests deliberate behavior while doing nothing useful, and the `#[allow(unused_variables)]` masks that `changed` is dropped.","fix":"Remove the redundant override and rely on the trait default, or document explicitly at the impl that RustEmbed embeds are static and cannot be watched.","locations":[{"ref":"i18n-embed/src/assets.rs:47-53","code":"   47 |     #[allow(unused_variables)]\n   48 |     fn subscribe_changed(\n   49 |         &self,\n   50 |         changed: std::sync::Arc<dyn Fn() + Send + Sync + 'static>,\n   51 |     ) -> Result<Box<dyn Watcher + Send + Sync + 'static>, I18nEmbedError> {\n   52 |         Ok(Box::new(()))\n   53 |     }","lines":7}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"select_languages builds `current_languages.languages` from exactly the requested `languages` (line 473) but builds `indices` from the requested languages PLUS the appended fallback (lines 463-468). The two collections are therefore not 1:1 in length and ordering when the fallback is not among the requested languages. Any future code (or the existing logging that indexes `languages.first()`) that assumes `languages[i]` corresponds to `indices[i]` will be wrong; the fallback bundle is searchable via indices but invisible in `languages`.","fix":"Keep `languages` and `indices` aligned: either also append the fallback language to `current_languages.languages`, or track the fallback separately, so the invariant 'languages[i] is the language loaded at indices[i]' holds.","locations":[{"ref":"i18n-embed/src/fluent.rs:463-475","code":"  463 |         let indices = languages\n  464 |             .iter()\n  465 |             .map(|lang| lang.as_ref())\n  466 |             .chain(fallback_language)\n  467 |             .filter_map(|lang| config_lock.language_map.get(lang.as_ref()))\n  468 |             .cloned()\n  469 |             .collect();\n  470 |         FluentLanguageLoader {\n  471 |             inner: ArcSwap::new(Arc::new(FluentLanguageLoaderInner {\n  472 |                 current_languages: CurrentLanguages {\n  473 |                     languages: languages.iter().map(|lang| lang.as_ref().clone()).collect(),\n  474 |                     indices,\n  475 |                 },","lines":13}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`run_msgcat` builds the interim path with `with_extension(\"pot.tmp\")`. `with_extension` replaces the existing extension, so `module.pot` becomes `module.pot.tmp` as intended, but a path like `dir.v2/module` (no extension on the file but a dot earlier) is unaffected; more importantly the literal extension \"pot.tmp\" contains a dot which Path treats as a single extension - harmless here but fragile. The bigger issue: the temp file is created in the same directory and is not cleaned up if `msgcat.join()` fails (early return leaves the `.pot.tmp` behind).","fix":"Use a uniquely named temp file and ensure it is removed on the error path (e.g. via a guard) befo 14 |     println!(\n   15 |         \"cargo:rerun-if-changed={}\",\n   16 |         path.to_str().ok_or_else(|| PathError::not_valid_utf8(\n   17 |             path,\n   18 |             \"rerun build script if file changed\",\n   19 |             PathType::Directory,\n   20 |         ))?\n   21 |     );\n   22 |     Ok(())","lines":10}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`active_config` resolves the parent's active config when `extract_to_parent` is true, but does not verify that the parent actually lists this crate as a subcrate (the check done by `find_parent`). A crate can therefore extract into an unrelated parent that happens to be wired up as `parent`, with no validation that the relationship is declared in the parent's i18n config.","fix":"When `extract_to_parent` is active, validate the parent/subcrate relationship (e.g. via the same canonicalized-path check used in `find_parent`) before delegating to the parent's active config, and error out otherwise.","locations":[{"ref":"i18n-config/src/lib.rs:155-189","code":"  155 |     pub fn active_config(&self) -> Result<Option<(&'_ Crate, &'_ I18nConfig)>, I18nConfigError> {\n  156 |         debug!(\"Resolving active config for {0}\", self);\n  157 |         match &self.i18n_config {\n  158 |             Some(config) => {\n  159 |                 if let Some(gettext_config) = &config.gettext {\n  160 |                     if gettext_config.extract_to_parent {\n  161 |                         debug!(\"Resolving active config for {0}, extract_to_parent is true, so attempting to obtain parent config.\", self);\n  162 | \n  163 |                         if self.parent.is_none() {\n  164 |                             return Err(I18nConfigError::NoParentCrate(\n  165 |                                 self.to_string(),\n  166 |                                 \"the gettext extract_to_parent option is active\".to_string(),\n  167 | dent.span());\n  118 |                     return Err(syn::Error::new(\n  119 |                         argument_name_lit_str.span(),\n  120 |                         format!(\n  121 |                             \"fl!() macro contains a duplicate argument `{}`\",\n  122 |                             argument_name_lit_str.value()\n  123 |                         ),\n  124 |                     ));\n  125 |                 }\n  126 |                 args.push((argument_name_lit_str, argument_value));\n  127 | \n  128 |                 // parse the next comma if there is one\n  129 |                 let _result = input.parse::<syn::Token![,]>();\n  130 |             }\n  131 | \n  132 |             if args.is_empty() {\n  133 |                 let span = match input.fork().parse::<syn::Expr>() {\n  134 |                     Ok(expr) => expr.span(),\n  135 |                     Err(_) => input.span(),\n  136 |                 };\n  137 |                 Err(syn::Error::new(span, \"fl!() unable to parse args input\"))\n  138 |             } else {\n  139 |                 args.sort_by_key(|(s, _)| s.value());\n  140 |                 Ok(FlArgs::KeyValuePairs {\n  141 |                     specified_args: args,\n  142 |                 })\n  143 |             }\n  144 |         } else {\n  145 |             Ok(FlArgs::None)\n  146 |         }\n  147 |     }","lines":71}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In FileSystemAssets::get_files the guard `full_path.is_file() && full_path.exists()` is redundant: Path::is_file already returns false when the path does not exist, so the `&& exists()` check is dead and adds a second stat syscall (a TOCTOU race window also exists between this check and the subsequent std::fs::read, which already handles errors).","fix":"Drop the redundant exists() check (and ideally the pre-check entirely, since std::fs::read already returns an error for missing/non-file paths which is handled below).","locations":[{"ref":"i18n-embed/src/assets.rs:223-225","code":"  223 |         if !(full_path.is_file() && full_path.exists()) {\n  224 |             return Vec::new();\n  225 |         }","lines":3}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The `--language` arg sets `default_value(fallback_locale)` while also using `PossibleValuesParser::new(available_languages_slice)`. If the loader's fallback language is ever not among the embedded available languages, clap will reject its own default value and the binary fails on startup with a confusing 'invalid value' error for an argument the user never supplied.","fix":"Ensure the fallback locale is always included in `available_languages_slice` (push it if missing) before wiring it as the default, or skip the default and fall back to the system/fallback language inside the subcommand handler.","locations":[{"ref":"src/main.rs:131-143","code":"  131 |             .arg(Arg::new(\"language\")\n  132 |                 .help(\n  133 |                     tr!(\n  134 |                         // The help message for the `-l`, `--language` command line argument.\n  135 |                         \"Set the language to use for this application. Overrides the language selected automatically by your operating system.\"\n  136 |                     )\n  137 |                 )\n  138 |                 .long(\"language\")\n  139 |                 .short('l')\n  140 |                 .num_args(1)\n  141 |                 .default_value(fallback_locale)\n  142 |                 .value_parser(PossibleValuesParser::new(available_languages_slice))\n  143 |             )","lines":13}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"`cannot_delete_file` constructs a `PathErrorKind::CannotCreate(PathType::Directory, ...)` instead of `PathErrorKind::CannotDelete(PathType::File, ...)`. This is a copy-paste bug from `cannot_create_dir`. Any failure to delete a file (used by `remove_file_if_exists` / `remove_file_or_error` in util.rs) is reported to the user as \"Cannot create the directory ...\", giving completely misleading error messages.","fix":"Change the kind to `PathErrorKind::CannotDelete(PathType::File, source)`.","locations":[{"ref":"i18n-build/src/error.rs:78-83","code":"   78 |     pub fn cannot_delete_file<P: Into<PathBuf>>(path: P, source: io::Error) -> PathError {\n   79 |         PathError {\n   80 |             path: path.into(),\n   81 |             kind: PathErrorKind::CannotCreate(PathType::Directory, source),\n   82 |         }\n   83 |     }","lines":6}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"When the optional attribute id is not a string literal, the emitted compile error says `fl!() \"message_id\" should be a literal rust string`, but this branch validates the attribute id, not the message id. The message refers to the wrong argument and will confuse users.","fix":"Change the error text to refer to `attribute_id` (e.g. \"fl!() `attribute_id` should be a literal rust string\").","locations":[{"ref":"i18n-embed-fl/src/lib.rs:508-514","code":"  508 |             unexpected_lit => {\n  509 |                 attr_str = None;\n  510 |                 emit_error! {\n  511 |                     unexpected_lit,\n  512 |                     \"fl!() `message_id` should be a literal rust string\"\n  513 |                 };\n  514 |                 None","lines":7}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"negligible","easy":true,"description":"Several `not_valid_utf8` calls pass an incorrect `for_item` label: in `run_msgmerge` the po file path is labeled \"pot\" (line 309) instead of \"po\". These mislabel the item in the produced error message.","fix":"Use the correct label \"po\" for the po file path.","locations":[{"ref":"i18n-build/src/gettext_impl/mod.rs:308-310","code":"  308 |             po_file_path.to_str().ok_or_else(|| {\n  309 |                 PathError::not_valid_utf8(po_file_path.clone(), \"pot\", PathType::File)\n  310 |             })?,","lines":3}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`run_command_and_check_success` only checks `output.status.success()`; it captures stdout/stderr via `wait_with_output()` but discards them. When xtr/msginit/msgmerge/msgfmt/msgcat fail, the user gets only \"The \\\"x\\\" command reported that it was unsuccessful.\" with none of the tool's actual error output, making failures very hard to diagnose. Additionally, because stdout is not redirected, child process output is inherited and interleaves with the build.","fix":"Include `String::from_utf8_lossy(&output.stderr)` (and exit code) in the ensure! error message so the underlying tool's diagnostics are surfaced.","locations":[{"ref":"i18n-build/src/util.rs:13-34","code":"   13 | pub fn run_command_and_check_success(command_name: &str, mut command: Command) -> Result<()> {\n   14 |     debug!(\"Running command: {0:?}\", &command);\n   15 |     let output = command\n   16 |         .spawn()\n   17 |         .with_context(|| tr!(\"The \\\"{0}\\\" command was unable to start.\", command_name))?\n   18 |         .wait_with_output()\n   19 |         .with_context(|| {\n   20 |             tr!(\n   21 |                 \"The \\\"{0}\\\" command had a problem waiting for output.\",\n   22 |                 command_name\n   23 |             )\n   24 |         })?;\n   25 | \n   26 |     ensure!(\n   27 |         output.status.success(),\n   28 |         tr!(\n   29 |             \"The \\\"{0}\\\" command reported that it was unsuccessful.\",\n   30 |             command_name\n   31 |         )\n   32 |     );\n   33 |     Ok(())\n   34 | }","lines":22}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`collated_subcrate` swallows real errors as `false`. `gettext_config_or_err()` returning an error (e.g. config present but missing the `gettext` section) is mapped via `.unwrap_or(false)` to mean \"not collated\", indistinguishable from a legitimately-disabled flag. A misconfigured crate silently behaves as if collation is off rather than surfacing the configuration error to the caller.","fix":"Return a `Result<bool, I18nConfigError>` (or at least distinguish the missing-gettext-section error from the flag being false), so callers can detect and report misconfiguration instead of silently disabling collation.","locations":[{"ref":"i18n-config/src/lib.rs:219-236","code":"  219 |     pub fn collated_subcrate(&self) -> bool {\n  220 |         let parent_extract_to_subcrate = self\n  221 |             .parent\n  222 |             .map(|parent_crate| {\n  223 |                 parent_crate\n  224 |                     .gettext_config_or_err()\n  225 |                     .map(|parent_gettext_config| parent_gettext_config.collate_extracted_subcrates)\n  226 |                     .unwrap_or(false)\n  227 |             })\n  228 |             .unwrap_or(false);\n  229 | \n  230 |         let extract_to_parent = self\n  231 |             .gettext_config_or_err()\n  232 |             .map(|gettext_config| gettext_config.extract_to_parent)\n  233 |             .unwrap_or(false);\n  234 | \n  235 |         parent_extract_to_subcrate && extract_to_parent\n  236 |     }","lines":18}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`FileSystemAssets::try_new(assets_dir).unwrap()` panics with a generic unwrap message if the configured assets directory does not exist or is inaccessible. Every other config/loading failure in this function uses `abort!` to emit a clean compile error with a helpful hint; this one produces an ugly internal-error-style panic instead.","fix":"Replace `.unwrap()` with `.unwrap_or_else(|err| abort!{...})` emitting a clear message that the fluent assets_dir could not be opened, including the path and a help hint.","locations":[{"ref":"i18n-embed-fl/src/lib.rs:442-443","code":"  442 |         let assets_dir = Path::new(&crate_paths.crate_dir).join(fluent_config.assets_dir);\n  443 |         let assets = FileSystemAssets::try_new(assets_dir).unwrap();","lines":2}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`config_file_name` and `language` are retrieved with `.expect(...)` justified by the presence of `default_value`. That holds today, but it couples a panic to the arg definitions in a different part of the function; if a default is ever removed the binary panics on user input instead of producing a clean error. For a CLI driven entirely by user-supplied arguments, `.expect` on argument access is fragile error handling.","fix":"Handle the `None` case with a proper anyhow error (e.g. `.context(...)?` after `ok_or_else`) rather than `.expect`, so a missing/removed default degrades to a clean error message and non-zero exit code instead of a panic.","locations":[{"ref":"src/main.rs:148-154","code":"  148 |         let config_file_name: &String = i18n_matches\n  149 |             .get_one(\"config-file-name\")\n  150 |             .expect(\"expected a default config file name to be present\");\n  151 | \n  152 |         let language: &String = i18n_matches\n  153 |             .get_one(\"language\")\n  154 |             .expect(\"expected a default language to be present\");","lines":7}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In `run`, the `assert!(crt.gettext_config_or_err()?.collate_extracted_subcrates)` (line 464) will abort the process via panic if the invariant is violated by an unexpected config combination, rather than returning a descriptive error. Assertions on config-derived state are inappropriate for a user-facing build tool.","fix":"Replace the assert! with an explicit error return (ensure!/bail!) carrying a clear message.","locations":[{"ref":"i18n-build/src/gettext_impl/mod.rs:463-465","code":"  463 |     if !concatenate_crates.is_empty() {\n  464 |         assert!(crt.gettext_config_or_err()?.collate_extracted_subcrates);\n  465 |         concatenate_crates.insert(0, crt);","lines":3}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"The doc comment on `remove_file_if_exists` states it returns a `PathError#CannotDelete` \"otherwise\" (i.e. when the file does not exist), but the function returns `Ok(())` when the file does not exist and only errors on an actual delete failure. The comment is misleading about the contract.","fix":"Correct the doc comment to say it succeeds silently when the file is absent and only errors if deletion of an existing file fails.","locations":[{"ref":"i18n-build/src/util.rs:56-64","code":"   56 | /// Remove a file if it exists, otherwise return a [PathError#CannotDelete](PathError#CannotDelete).\n   57 | pub fn remove_file_if_exists<P: AsRef<Path>>(file_path: P) -> Result<(), PathError> {\n   58 |     if file_path.as_ref().exists() {\n   59 |         remove_file(file_path.as_ref())\n   60 |             .map_err(|e| PathError::cannot_delete_file(file_path.as_ref(), e))?;\n   61 |     }\n   62 | \n   63 |     Ok(())\n   64 | }","lines":9}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Several recoverable, user-facing failures in `fl!()` use `panic!`/`expect` instead of `abort!`/`emit_error!`. Reading Cargo.toml (line 403), CARGO_PKG_NAME (line 405), locating crate paths (line 413), and the load_languages catch-all (line 471) all panic. Panics surface as opaque 'proc macro panicked' messages without spans or help hints, whereas the rest of the function uses proc_macro_error2 for clean diagnostics. The load-language LanguageNotAvailable mismatch panic (lines 453-459) is similarly user-reachable if config is inconsistent.","fix":"Convert these recoverable failures to `abort!`/`emit_error!` with call_site spans and help hints for consistent, user-friendly compile errors.","locations":[{"ref":"i18n-embed-fl/src/lib.rs:403-405","code":"  403 |         let manifest = find_crate::Manifest::new().expect(\"Error reading Cargo.toml\");\n  404 |         manifest.crate_package().map(|pkg| pkg.name).unwrap_or(\n  405 |             std::env::var(\"CARGO_PKG_NAME\").expect(\"Error fetching `CARGO_PKG_NAME` env\"),","lines":3},{"ref":"i18n-embed-fl/src/lib.rs:412-413","code":"  412 |         let crate_paths = i18n_config::locate_crate_paths()\n  413 |             .unwrap_or_else(|error| panic!(\"fl!() is unable to locate crate paths: {}\", error));","lines":2},{"ref":"i18n-embed-fl/src/lib.rs:453-475","code":"  453 |                     if fallback_language != language_id {\n  454 |                         panic!(\n  455 |                             \"fl!() encountered an unexpected problem, \\\n  456 |                             the language being loaded (\\\"{0}\\\") is not the \\\n  457 |                             `fallback_language` (\\\"{1}\\\")\",\n  458 |                             language_id, fallback_language\n  459 |                         )\n  460 |                     }\n  461 |                     abort! {\n  462 |                         proc_macro2::Span::call_site(),\n  463 |                         format!(\n  464 |                             \"fl!() was unable to load the localization \\\n  465 |                             file for the `fallback_language` \\\n  466 |                             (\\\"{fallback_language}\\\"): {file}\"\n  467 |                         );\n  468 |                         help = \"Try creating the required fluent localization file.\";\n  469 |                     }\n  470 |                 }\n  471 |                 _ => panic!(\n  472 |                     \"fl!() had an unexpected problem while \\\n  473 |                         loading language \\\"{0}\\\": {1}\",\n  474 |                     fallback_language, err\n  475 |                 ),","lines":23}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Both `gettext_language_loader!` and `fluent_language_loader!` report all errors via `panic!`/`expect` (manifest read, CARGO_PKG_NAME, missing i18n-embed dependency, locate crate paths, config read, missing section). These produce opaque 'proc macro panicked' diagnostics with no source span. The sibling `fl!` macro uses proc_macro_error2 for clean errors, so the user experience here is inconsistent and worse.","fix":"Adopt proc_macro_error2 (`abort_call_site!`) for these macros as well, emitting spanned compile errors with help hints instead of panicking.","locations":[{"ref":"i18n-embed/i18n-embed-impl/src/lib.rs:16-58","code":"   16 |     let manifest = find_crate::Manifest::new().expect(\"Error reading Cargo.toml\");\n   17 |     let current_crate_package_name = {\n   18 |         manifest.crate_package().map(|pkg| pkg.name).unwrap_or(\n   19 |             std::env::var(\"CARGO_PKG_NAME\").expect(\"Error fetching `CARGO_PKG_NAME` env\"),\n   20 |         )\n   21 |     };\n   22 | \n   23 |     // Special case for when this macro is invoked in i18n-embed tests/docs\n   24 |     let i18n_embed_crate_name = if current_crate_package_name == \"i18n_embed\" {\n   25 |         \"i18n_embed\".to_string()\n   26 |     } else {\n   27 |         manifest\n   28 |             .find(|s| s == \"i18n-embed\")\n   29 |             .expect(\"i18n-embed should be an active dependency in your Cargo.toml\")\n   30 |             .name\n   31 |     };\n   32 | \n   33 |     let i18n_embed_crate_ident =\n   34 |         syn::Ident::new(&i18n_embed_crate_name, proc_macro2::Span::call_site());\n   35 | \n   36 |     let config_file_path = i18n_config::locate_crate_paths()\n   37 |         .unwrap_or_else(|error| {\n   38 |             panic!(\n   39 |                 \"gettext_language_loader!() is unable to locate i18n config file: {}\",\n   40 |                 error\n   41 |             )\n   42 |         })\n   43 |         .i18n_config_file;\n   44 | \n   45 |     let config = i18n_config::I18nConfig::from_file(&config_file_path).unwrap_or_else(|err| {\n   46 |         panic!(\n   47 |             \"gettext_language_loader!() had a problem reading i18n config file {0:?}: {1}\",\n   48 |             std::fs::canonicalize(&config_file_path).unwrap_or_else(|_| config_file_path.clone()),\n   49 |             err\n   50 |         )\n   51 |     });\n   52 | \n   53 |     if config.gettext.is_none() {\n   54 |         panic!(\n   55 |             \"gettext_language_loader!() had a problem parsing i18n config file {0:?}: there is no `[gettext]` section\",\n   56 |             std::fs::canonicalize(&config_file_path).unwrap_or(config_file_path)\n   57 |         )\n   58 |     }","lines":43},{"ref":"i18n-embed/i18n-embed-impl/src/lib.rs:90-131","code":"   90 |     let manifest = find_crate::Manifest::new().expect(\"Error reading Cargo.toml\");\n   91 |     let current_crate_package_name = manifest\n   92 |         .crate_package()\n   93 |         .map(|pkg| pkg.name)\n   94 |         .unwrap_or(std::env::var(\"CARGO_PKG_NAME\").expect(\"Error fetching `CARGO_PKG_NAME` env\"));\n   95 | \n   96 |     // Special case for when this macro is invoked in i18n-embed tests/docs\n   97 |     let i18n_embed_crate_name = if current_crate_package_name == \"i18n_embed\" {\n   98 |         \"i18n_embed\".to_string()\n   99 |     } else {\n  100 |         manifest\n  101 |             .find(|s| s == \"i18n-embed\")\n  102 |             .expect(\"i18n-embed should be an active dependency in your Cargo.toml\")\n  103 |             .name\n  104 |     };\n  105 | \n  106 |     let i18n_embed_crate_ident =\n  107 |         syn::Ident::new(&i18n_embed_crate_name, proc_macro2::Span::call_site());\n  108 | \n  109 |     let config_file_path = i18n_config::locate_crate_paths()\n  110 |         .unwrap_or_else(|error| {\n  111 |             panic!(\n  112 |                 \"fluent_language_loader!() is unable to locate i18n config file: {}\",\n  113 |                 error\n  114 |             )\n  115 |         })\n  116 |         .i18n_config_file;\n  117 | \n  118 |     let config = i18n_config::I18nConfig::from_file(&config_file_path).unwrap_or_else(|err| {\n  119 |         panic!(\n  120 |             \"fluent_language_loader!() had a problem reading i18n config file {0:?}: {1}\",\n  121 |             std::fs::canonicalize(&config_file_path).unwrap_or_else(|_| config_file_path.clone()),\n  122 |             err\n  123 |         )\n  124 |     });\n  125 | \n  126 |     if config.fluent.is_none() {\n  127 |         panic!(\n  128 |             \"fluent_language_loader!() had a problem parsing i18n config file {0:?}: there is no `[fluent]` section\",\n  129 |             std::fs::canonicalize(&config_file_path).unwrap_or(config_file_path)\n  130 |         )\n  131 |     }","lines":42}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"AssetsMultiplexor::subscribe_changed registers the same `changed` callback against every underlying asset source via subscribe_changed. If multiple sources watch overlapping or related directories, a single file change can invoke the reload callback multiple times. There is also no deduplication or debouncing, so a noisy filesystem source can trigger repeated full reloads.","fix":"Document the multi-fire behavior, or debounce/coalesce callback invocations (e.g. wrap `changed` so rapid successive calls collapse into one reload).","locations":[{"ref":"i18n-embed/src/assets.rs:336-346","code":"  336 |     fn subscribe_changed(\n  337 |         &self,\n  338 |         changed: std::sync::Arc<dyn Fn() + Send + Sync + 'static>,\n  339 |     ) -> Result<Box<dyn Watcher + Send + Sync + 'static>, I18nEmbedError> {\n  340 |         let watchers: Vec<_> = self\n  341 |             .assets\n  342 |             .iter()\n  343 |             .map(|assets| assets.subscribe_changed(changed.clone()))\n  344 |             .collect::<Result<_, _>>()?;\n  345 |         Ok(Box::new(Watchers(watchers)))\n  346 |     }","lines":11}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The fluent loader logs formatting errors but discards them and returns the partially-formatted string, while completely missing messages produce a placeholder string ('No localization for id: ...') rather than an error or empty value. Callers cannot distinguish a real translation from the placeholder, so missing-translation bugs silently ship to end users with the placeholder text rendered in the UI. This is a deliberate design choice but worth flagging as it provides no programmatic signal.","fix":"Consider offering a fallible variant (returning Option/Result) so callers can detect missing localizations, while keeping the current infallible convenience method.","locations":[{"ref":"i18n-embed/src/fluent.rs:179-187","code":"  179 |             .unwrap_or_else(|| {\n  180 |                 log::error!(\n  181 |                     target:\"i18n_embed::fluent\",\n  182 |                     \"Unable to find localization for language \\\"{}\\\" and id \\\"{}\\\".\",\n  183 |                     inner.current_languages.languages.first().unwrap_or(&self.fallback_language),\n  184 |                     message_id\n  185 |                 );\n  186 |                 format!(\"No localization for id: \\\"{}\\\"\", message_id)\n  187 |             })","lines":9}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"`RawCrate` declares `#[serde(alias = \"workspace\")]` on the `package` field, intending to also accept a `[workspace]` table where `[package]` is expected. This does not work as intended: a workspace-root `Cargo.toml`'s `[workspace]` table has no `name`/`version` keys, so deserialization into `RawPackage` still fails. The alias gives a false impression that workspace manifests are supported, while in practice they cause a `CannotDeserializeToml` error.","fix":"Remove the misleading `#[serde(alias = \"workspace\")]`, and instead explicitly detect/handle workspace manifests (see the `WhyNotCrate::Workspace` finding) rather than relying on a field alias that cannot supply the required fields.","locations":[{"ref":"i18n-config/src/lib.rs:59-69","code":"   59 | #[derive(Deserialize)]\n   60 | struct RawCrate {\n   61 |     #[serde(alias = \"workspace\")]\n   62 |     package: RawPackage,\n   63 | }\n   64 | \n   65 | #[derive(Deserialize)]\n   66 | struct RawPackage {\n   67 |     name: String,\n   68 |     version: String,\n   69 | }","lines":11}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`run_msgcat` passes the file paths to `Exec::cmd(\"msgcat\").args(...)` as raw OsStr args. If any pot file path begins with a hyphen, msgcat will interpret it as an option rather than an input file. None of the gettext command invocations use a `--` separator before file path arguments (also affects xtr, msgmerge, msgfmt), so paths starting with `-` are misparsed by the external tools.","fix":"Insert a `--` argument before positional path arguments, or otherwise guard against leading-hyphen paths.","locations":[{"ref":"i18n-build/src/gettext_impl/mod.rs:193-196","code":"  193 |     let msgcat_command_name = \"msgcat\";\n  194 |     let msgcat = Exec::cmd(msgcat_command_name)\n  195 |         .args(msgcat_args.as_slice())\n  196 |         .stdout(output_pot_file);","lines":4},{"ref":"i18n-build/src/gettext_impl/mod.rs:107-123","code":"  107 |         xtr.args([\n  108 |             \"--package-name\",\n  109 |             crt.name.as_str(),\n  110 |             \"--package-version\",\n  111 |             crt.version.as_str(),\n  112 |             \"--default-domain\",\n  113 |             crt.module_name().as_str(),\n  114 |             \"--add-location\",\n  115 |             gettext_config.add_location.to_str(),\n  116 |             \"-o\",\n  117 |             pot_file_path.to_str().ok_or_else(|| {\n  118 |                 PathError::not_valid_utf8(pot_file_path.clone(), \"pot\", PathType::File)\n  119 |             })?,\n  120 |             rs_file_path.to_str().ok_or_else(|| {\n  121 |                 PathError::not_valid_utf8(rs_file_path.clone(), \"rs\", PathType::File)\n  122 |             })?,\n  123 |         ]);","lines":17}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`with_fluent_message(...).unwrap()` assumes the message exists. It is only reached in the `else if` branch where the message was confirmed present, so it is currently safe, but the safety is implicit and coupled to the preceding `!checked_loader_has_message && !loader.has(...)` condition. A future refactor of that condition could turn this into a compile-time-only panic with a useless message.","fix":"Use `unwrap_or_default()` or handle `None` explicitly (empty suggestions) instead of `.unwrap()`, so the suggestion lookup degrades gracefully rather than panicking.","locations":[{"ref":"i18n-embed-fl/src/lib.rs:645-650","code":"  645 |                 let suggestions = &domain_data\n  646 |                     .loader\n  647 |                     .with_fluent_message(message_id_str, |message| {\n  648 |                         fuzzy_attribute_suggestions(&message, attr_id_str, 5).join(\"\\n\")\n  649 |                     })\n  650 |                     .unwrap();","lines":6}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"The generated code `#fallback_language.parse().unwrap()` parses the fallback language string into a LanguageIdentifier at the call site at runtime and unwraps it. The string is already validated at macro-expansion time (it came from a parsed `LanguageIdentifier` via `config.fallback_language.to_string()`), so this runtime parse+unwrap is redundant work in user code and an unwrap that, while practically safe, leaks into downstream binaries.","fix":"Construct the LanguageIdentifier directly in generated tokens (e.g. emit its components) or document why a runtime re-parse is required; at minimum avoid `.unwrap()` in emitted user code.","locations":[{"ref":"i18n-embed/i18n-embed-impl/src/lib.rs:60-69","code":"   60 |     let fallback_language = syn::LitStr::new(\n   61 |         &config.fallback_language.to_string(),\n   62 |         proc_macro2::Span::call_site(),\n   63 |     );\n   64 | \n   65 |     let gen = quote::quote! {\n   66 |         #i18n_embed_crate_ident::gettext::GettextLanguageLoader::new(\n   67 |             module_path!(),\n   68 |             #fallback_language.parse().unwrap(),\n   69 |         )","lines":10},{"ref":"i18n-embed/i18n-embed-impl/src/lib.rs:133-148","code":"  133 |     let fallback_language = syn::LitStr::new(\n  134 |         &config.fallback_language.to_string(),\n  135 |         proc_macro2::Span::call_site(),\n  136 |     );\n  137 | \n  138 |     let domain_str = config\n  139 |         .fluent\n  140 |         .and_then(|f| f.domain)\n  141 |         .unwrap_or(current_crate_package_name);\n  142 |     let domain = syn::LitStr::new(&domain_str, proc_macro2::Span::call_site());\n  143 | \n  144 |     let gen = quote::quote! {\n  145 |         #i18n_embed_crate_ident::fluent::FluentLanguageLoader::new(\n  146 |             #domain,\n  147 |             #fallback_language.parse().unwrap(),\n  148 |         )","lines":16}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"WebLanguageRequester::requested_languages uses .expect(\"language value should be a string.\") on each JsValue returned by navigator.languages(). If the browser ever returns a non-string entry (or the array contains a hole), this panics inside a library API rather than skipping the bad entry. Same pattern with window().expect(\"no global window exists\") which panics in non-window WASM contexts (e.g. workers).","fix":"Use filter_map with as_string() returning None for non-string entries, and return an empty Vec (or Result) when no window is available instead of panicking.","locations":[{"ref":"i18n-embed/src/requester.rs:326-335","code":"  326 |         let window = web_sys::window().expect(\"no global `window` exists\");\n  327 |         let navigator = window.navigator();\n  328 |         let languages = navigator.languages();\n  329 | \n  330 |         let requested_languages =\n  331 |             convert_vec_str_to_langids_lossy(languages.iter().map(|js_value| {\n  332 |                 js_value\n  333 |                     .as_string()\n  334 |                     .expect(\"language value should be a string.\")\n  335 |             }));","lines":10}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"The domain cache is keyed inconsistently. The lookup at line 409 uses `domain` derived from the crate package name, but when `[fluent].domain` is overridden in i18n.toml, the insert at line 483 uses the shadowed `domain` from line 440 (the override). Whenever a domain override is configured and differs from the crate name, the cache lookup always misses, so every single `fl!()` invocation re-reads the config file, re-instantiates FileSystemAssets, and reloads the fallback language from disk during compilation - defeating the entire purpose of the static DOMAINS cache.","fix":"Key the cache by the final (possibly overridden) domain consistently, or look up/insert using the same key. E.g. resolve the override before the `domains().get()` call, or store under the original crate-name key as well.","locations":[{"ref":"i18n-embed-fl/src/lib.rs:402-440","code":"  402 |     let domain = {\n  403 |         let manifest = find_crate::Manifest::new().expect(\"Error reading Cargo.toml\");\n  404 |         manifest.crate_package().map(|pkg| pkg.name).unwrap_or(\n  405 |             std::env::var(\"CARGO_PKG_NAME\").expect(\"Error fetching `CARGO_PKG_NAME` env\"),\n  406 |         )\n  407 |     };\n  408 | \n  409 |     let domain_data = if let Some(domain_data) = domains().get(&domain) {\n  410 |         domain_data\n  411 |     } else {\n  412 |         let crate_paths = i18n_config::locate_crate_paths()\n  413 |             .unwrap_or_else(|error| panic!(\"fl!() is unable to locate crate paths: {}\", error));\n  414 | \n  415 |         let config_file_path = &crate_paths.i18n_config_file;\n  416 | \n  417 |         let config = i18n_config::I18nConfig::from_file(config_file_path).unwrap_or_else(|err| {\n  418 |             abort! {\n  419 |                 proc_macro2::Span::call_site(),\n  420 |                 format!(\n  421 |                     \"fl!() had a problem reading i18n config file {config_file_path:?}: {err}\"\n  422 |                 );\n  423 |                 help = \"Try creating the `i18n.toml` configuration file.\";\n  424 |             }\n  425 |         });\n  426 | \n  427 |         let fluent_config = config.fluent.unwrap_or_else(|| {\n  428 |             abort! {\n  429 |                 proc_macro2::Span::call_site(),\n  430 |                 format!(\n  431 |                     \"fl!() had a problem parsing i18n config file {config_file_path:?}: \\\n  432 |                     there is no `[fluent]` subsection.\"\n  433 |                 );\n  434 |                 help = \"Add the `[fluent]` subsection to `i18n.toml`, \\\n  435 |                         along with its required `assets_dir`.\";\n  436 |             }\n  437 |         });\n  438 | \n  439 |         // Use the domain override in the configuration.\n  440 |         let domain = fluent_config.domain.unwrap_or(domain);","lines":39},{"ref":"i18n-embed-fl/src/lib.rs:483","code":"  483 |         domains().entry_or_insert(&domain, data)","lines":1}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`find_parent` canonicalizes `self.path` once per subcrate iteration inside the `any` closure (lib.rs:290-296), even though it is constant across iterations. For a parent with many subcrates this performs redundant filesystem syscalls; it also canonicalizes the subcrate path per entry which is necessary, but the self path should be hoisted out of the loop.","fix":"Canonicalize `self.path` once before the `.any(...)` call, bail/return early on its error, and compare each canonicalized subcrate path against the precomputed value.","locations":[{"ref":"i18n-config/src/lib.rs:278-299","code":"  278 |                     let this_is_subcrate = config\n  279 |                         .subcrates\n  280 |                         .iter()\n  281 |                         .any(|subcrate_path| {\n  282 |                             let subcrate_path_canon = match crt.path.join(subcrate_path).canonicalize() {\n  283 |                                 Ok(canon) => canon,\n  284 |                                 Err(err) => {\n  285 |                                     error!(\"Error: unable to canonicalize the subcrate path: {0:?} because {1}\", subcrate_path, err);\n  286 |                                     return false;\n  287 |                                 }\n  288 |                             };\n  289 | \n  290 |                             let self_path_canon = match self.path.canonicalize() {\n  291 |
