<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"Wrong slice index when consuming the second part of a split frame. After `frame_size -= first_part_size` (line 358), `frame_size` holds only the leftover (second-part) sample count. The slice end is then computed as `frame_size * reader.channel_count`, but it should be `(first_part_size + frame_size) * channel_count`. Whenever `frame_size < first_part_size` (i.e. the first part is larger than the remainder), start > end and Rust panics with an index-out-of-range. Even when the subtraction doesn't panic, the wrong byte range causes silent data corruption - too few samples are fed to the fingerprinter for the second chunk.","fix":"Change the slice end to `(first_part_size + frame_size) * reader.channel_count` so that both bounds are absolute offsets into frame_data: `&frame_data[(first_part_size * reader.channel_count)..((first_part_size + frame_size) * reader.channel_count)]`.","locations":[{"ref":"fpcalc/src/main.rs:358-364","code":"  358 |             frame_size -= first_part_size;\n  359 |             if frame_size > 0 {\n  360 |                 printer.consume(\n  361 |                     &frame_data[(first_part_size * reader.channel_count)\n  362 |                         ..(frame_size * reader.channel_count)],\n  363 |                 );\n  364 |             }","lines":7}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"AudioConsumer::reset() is implemented as todo!() on AudioProcessor. If any caller invokes reset() on an AudioProcessor (e.g. when it is boxed behind a trait object as the inner consumer of another AudioProcessor), the process will panic unconditionally at runtime. The Fingerprinter pipeline never calls this path directly today, but the trait implementation exists and is reachable.","fix":"Implement reset() properly: clear buffer_offset, clear the input Vec, reset the resampler if present, and delegate to self.consumer.reset(). Remove the todo!() macro.","locations":[{"ref":"chromaprint/src/audio_processor.rs:175-177","code":"  175 |     fn reset(&mut self) {\n  176 |         todo!();\n  177 |     }","lines":3}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"FingerprintCalculator::new() calls .max().unwrap() on the classifiers iterator without guarding against an empty slice. Passing an empty classifiers vec panics immediately with 'called Option::unwrap() on a None value'. Configuration allows arbitrary classifiers via with_classifiers([]).","fix":"Return a Result or propagate the error; alternatively assert/return early with a clear message: 'classifiers must not be empty'.","locations":[{"ref":"chromaprint/src/fingerprint_calculator.rs:14-18","code":"   14 |         let max_width = classifiers\n   15 |             .iter()\n   16 |             .map(|c| c.filter().width())\n   17 |             .max()\n   18 |             .unwrap();","lines":5}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"gray_code() indexes a 4-element array literal with an unchecked u32 cast to usize. If classify() ever returns a value > 3 (which cannot happen with the current Quantizer, but has no type-level guarantee), the index panics out of bounds. There is no debug assertion and the function is fully public within the crate.","fix":"Use a match expression instead of an array index, or add a debug_assert!(i < 4) before the indexing.","locations":[{"ref":"chromaprint/src/fingerprint_calculator.rs:62-64","code":"   62 | fn gray_code(i: u32) -> u32 {\n   63 |     [0, 1, 3, 2][i as usize]\n   64 | }","lines":3}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"RollingIntegralImage::area() asserts `r1 > self.rows - self.max_rows` when rolling is active (rows > max_rows). The image is created with new(255) making max_rows=256. FingerprintCalculator::new() allows max_filter_width up to 256 (assert!(max_width <= 256)). When max_filter_width == 256 and filters have y=0 (e.g. CLASSIFIER_TEST1 entries 0,1,3 use y=0), the area() r1 argument equals rows - 256 = rows - max_rows, making the strict-greater assertion false and panicking.","fix":"Either change the FingerprintCalculator assert to max_width < 256 (strictly less), or create the RollingIntegralImage with new(max_width) instead of new(255), or weaken the area() assertion to >=.","locations":[{"ref":"chromaprint/src/rolling_image.rs:92-109","code":"   92 |     fn area(&self, r1: usize, c1: usize, r2: usize, c2: usize) -> f64 {\n   93 |         assert!(r1 <= self.rows);\n   94 |         assert!(r2 <= self.rows);\n   95 | \n   96 |         if self.rows > self.max_rows {\n   97 |             assert!(r1 > self.rows - self.max_rows);\n   98 |             assert!(r2 > self.rows - self.max_rows);\n   99 |         }\n  100 | \n  101 |         assert!(c1 <= self.columns);\n  102 |         assert!(c2 <= self.columns);\n  103 | \n  104 |         if r1 == r2 || c1 == c2 {\n  105 |             return 0.0;\n  106 |         }\n  107 | \n  108 |         assert!(r2 > r1);\n  109 |         assert!(c2 > c1);","lines":18},{"ref":"chromaprint/src/fingerprint_calculator.rs:19-20","code":"   19 |         assert!(max_width > 0);\n   20 |         assert!(max_width <= 256);","lines":2}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In the example test.rs, `std::fs::read(path).unwrap()` panics if the data file is missing (e.g. when running `cargo run --example test` from a directory other than the crate root). There is no helpful error message.","fix":"Replace `.unwrap()` with `.expect(\"failed to read test_stereo_44100.raw - run from the chromaprint/ directory\")` to give a clear diagnostic.","locations":[{"ref":"chromaprint/examples/test.rs:6-7","code":"    6 |     std::fs::read(path)\n    7 |         .unwrap()","lines":2}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"subtract_log() contains a hard assert!(!r.is_nan()). The assertion fires when both `a` and `b` are -1.0 (producing 0/0 = NaN). While chroma features are normally non-negative, there is no upstream type-level or documented invariant preventing negative values from reaching this function. A sufficiently extreme filter response can produce negative area sums.","fix":"Replace the assert with a return of 0.0 or f64::NEG_INFINITY on NaN/invalid input, or document the invariant that feature values must be >= -1 and enforce it at the boundary.","locations":[{"ref":"chromaprint/src/filter.rs:46-49","code":"   46 | fn subtract_log(a: f64, b: f64) -> f64 {\n   47 |     let r = f64::ln((1.0 + a) / (1.0 + b));\n   48 |     assert!(!r.is_nan());\n   49 |     r","lines":4}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In audio_processor.rs load(), for the general multi-channel case the per-channel sum is computed as i32 but each i16 sample can be -32768. With up to ~65535 channels (channels is u32 cast to usize) the sum could overflow i32. In practice channels is small, but the .try_into().unwrap() on line 59 will panic if the averaged i32 value is outside i16 range. Because the sum is divided by sample.len() first and then cast, the average will always fit in i16, BUT if overflow occurs in the sum before the divide the result is wrong.","fix":"Use i64 for the accumulator to avoid overflow: `let sum: i64 = sample.iter().copied().map(i64::from).sum();` and divide by `sample.len() as i64`.","locations":[{"ref":"chromaprint/src/audio_processor.rs:54-61","code":"   54 |             _ => {\n   55 |                 for sample in input.chunks_exact(channels) {\n   56 |                     let sum: i32 = sample.iter().copied().map(i32::from).sum();\n   57 |                     let samples: i32 = sample.len().try_into().unwrap();\n   58 |                     let average: i32 = sum / samples;\n   59 |                     self.push_sample(average.try_into().unwrap());\n   60 |                 }\n   61 |             }","lines":8}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In audio_processor.rs reset(), when sample_rate == target_sample_rate the resampler field is NOT cleared. If the object was previously configured with a different sample_rate (i.e. resampler is Some), and then reset() is called with a sample_rate that now matches target_sample_rate, the old resampler remains active. Subsequent calls to resample() will use the stale resampler instead of bypassing it, producing incorrect output.","fix":"Add `else { self.resampler = None; self.output_buffer.clear(); }` in the branch where target_sample_rate == sample_rate so any old resampler is dropped.","locations":[{"ref":"chromaprint/src/audio_processor.rs:123-156","code":"  123 |     pub(crate) fn reset(&mut self, sample_rate: u32, channels: u32) -> Result<(), ResetError> {\n  124 |         if channels == 0 {\n  125 |             return Err(ResetError::NoChannels);\n  126 |         }\n  127 | \n  128 |         if sample_rate <= MIN_SAMPLE_RATE {\n  129 |             return Err(ResetError::SampleRateTooLow);\n  130 |         }\n  131 | \n  132 |         self.channels = channels;\n  133 |         self.buffer_offset = 0;\n  134 |         self.consumer.reset();\n  135 | \n  136 |         if self.target_sample_rate != sample_rate {\n  137 |             let resampler = rubato::SincFixedIn::new(\n  138 |                 self.target_sample_rate as f64 / sample_rate as f64,\n  139 |                 1.0,\n  140 |                 rubato::SincInterpolationParameters {\n  141 |                     sinc_len: 16,\n  142 |                     f_cutoff: 0.8,\n  143 |                     oversampling_factor: 128,\n  144 |                     interpolation: rubato::SincInterpolationType::Nearest,\n  145 |                     window: rubato::WindowFunction::Blackman,\n  146 |                 },\n  147 |                 MAX_BUFFER_SIZE,\n  148 |                 1,\n  149 |             )?;\n  150 |             self.output_buffer\n  151 |                 .resize(resampler.output_frames_max(), 0.0);\n  152 |             self.resampler = Some(resampler);\n  153 |         }\n  154 | \n  155 |         Ok(())\n  156 |     }","lines":34}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In chroma.rs consume(), self.notes[i] is cast to usize and used directly as an index into self.features (size 12). The value stored is computed as `note.floor() as u8`. If freq_to_octave returns a negative value (which it does for frequencies below 27.5 Hz because log2 of a value < 1 is negative), note.floor() is negative and casting to u8 wraps (e.g., -0.5_f64 as u8 == 0 in Rust due to saturating cast semantics). However a truly negative floor value like -1.0 cast to u8 saturates to 0 in Rust. The subtler risk: notes_frac[i] = note - note.floor() can be wrong when note is negative because floor(-0.7) = -1.0 and -0.7 - (-1.0) = 0.3, but if note is e.g. -12.3 the expression `(note + NUM_BANDS - 1) % NUM_BANDS` in the interpolation path uses usize arithmetic and can underflow.","fix":"Guard prepare_notes to only store valid notes for frequencies that produce a non-negative octave value, or clamp/wrap the note value to [0, NUM_BANDS) explicitly using modular arithmetic on the integer before storing.","locations":[{"ref":"chromaprint/src/chroma.rs:36-46","code":"   36 |     fn prepare_notes(&mut self, min_freq: u32, max_freq: u32, frame_size: usize, sample_rate: u32) {\n   37 |         self.min_index = freq_to_index(min_freq, frame_size, sample_rate).max(1);\n   38 |         self.max_index = freq_to_index(max_freq, frame_size, sample_rate).min(frame_size / 2);\n   39 |         for i in self.min_index..self.max_index {\n   40 |             let freq = index_to_freq(i, frame_size, sample_rate);\n   41 |             let octave = freq_to_octave(freq);\n   42 |             let note = NUM_BANDS as f64 * (octave - octave.floor());\n   43 |             self.notes[i] = note.floor() as u8;\n   44 |             self.notes_frac[i] = note - note.floor();\n   45 |         }\n   46 |     }","lines":11},{"ref":"chromaprint/src/chroma.rs:66-82","code":"   66 |             let note = self.notes[i] as usize;\n   67 |             if self.interpolate {\n   68 |                 let mut note2 = note;\n   69 |                 let mut a = 1.0;\n   70 |                 if self.notes_frac[i] < 0.5 {\n   71 |                     note2 = (note + NUM_BANDS - 1) % NUM_BANDS;\n   72 |                     a = 0.5 + self.notes_frac[i];\n   73 |                 }\n   74 |                 if self.notes_frac[i] > 0.5 {\n   75 |                     note2 = (note + 1) % NUM_BANDS;\n   76 |                     a = 1.5 - self.notes_frac[i];\n   77 |                 }\n   78 |                 self.features[note] += energy * a;\n   79 |                 self.features[note2] += energy * (1.0 - a);\n   80 |             } else {\n   81 |                 self.features[note] += energy;\n   82 |             }","lines":17}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In compression.rs compress_subfingerprint(), the exceptional value stored is `value - MAX_NORMAL_VALUE` where value is the gap between consecutive set bit positions. MAX_NORMAL_VALUE is 7 (u8). The gap `bit_index - *last_bit_index` is computed as u8 subtraction. Since bit_index comes from u8::try_from(bit_index + 1) where bit_index can be up to 31 (for a u32), bit_index+1 can be 32. When the gap between two set bits exceeds 254, adding 1 on line 29 causes u8 overflow (32 fits, but conceptually if two bits are 32 apart, bit_index is 32 -> try_from panics since 33 > u8::MAX is false but 33 fits). Actually the real issue: `bit_index - *last_bit_index` on line 32 is u8 subtraction. If the previous bit was 0 (represented as 0 after adjustment) and the current is at position 31+1=32, value=32. If value >= MAX_NORMAL_VALUE (7), exceptional = value - 7 = 25 which fits u8. This path seems fine. However the scan state `*last_bit_index` stores the actual bit_index (1..=32), so on the SECOND call after the chain appends (0, None) sentinel, last_bit_index is NOT reset. Since compress_subfingerprint is called freshly per subfingerprint via flat_map, last_bit_index resets to 0 each time, so this is fine. The real bug: on line 29, `u8::try_from(bit_index + 1).unwrap()` will PANIC if bit_index == 255 (impossible for u32 which has 32 bits, so 0..32). Safe.","fix":"No fix needed for the panic risk. However, document that bit_index is in 0..32 so try_from always succeeds, or use a cast instead of unwrap to make intent clear.","locations":[{"ref":"chromaprint/src/compression.rs:24-43","code":"   24 |     fn compress_subfingerprint(subfingerprint: u32) -> impl Iterator<Item = (u8, Option<u8>)> {\n   25 |         subfingerprint\n   26 |             .into_bit_iter()\n   27 |             .enumerate()\n   28 |             .filter_map(|(bit_index, is_bit_set)| {\n   29 |                 is_bit_set.then_some(u8::try_from(bit_index + 1).unwrap())\n   30 |             })\n   31 |             .scan(0, |last_bit_index, bit_index| {\n   32 |                 let value = bit_index - *last_bit_index;\n   33 |                 let result = if value >= MAX_NORMAL_VALUE {\n   34 |                     (MAX_NORMAL_VALUE, Some(value - MAX_NORMAL_VALUE))\n   35 |                 } else {\n   36 |                     (value, None)\n   37 |                 };\n   38 | \n   39 |                 *last_bit_index = bit_index;\n   40 |                 Some(result)\n   41 |             })\n   42 |             .chain(std::iter::once((0, None)))\n   43 |     }","lines":20}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In compression.rs compress(), the fingerprint length is stored in only 3 bytes of the header (bytes 1-3), supporting a maximum of 16,777,215 items. While this is unlikely to overflow in practice, there is no validation or assertion that fingerprint.len() fits in 24 bits. A very long audio file could produce a fingerprint that silently truncates its size in the header, causing decoders to read the wrong number of sub-fingerprints.","fix":"Add a check: `assert!(size <= 0xFF_FFFF, \"fingerprint too long\");` or return an error before writing the header.","locations":[{"ref":"chromaprint/src/compression.rs:76-81","code":"   76 |         let output = [\n   77 |             self.0.id(),\n   78 |             ((size >> 16) & 0xFF) as u8,\n   79 |             ((size >> 8) & 0xFF) as u8,\n   80 |             (size & 0xFF) as u8,\n   81 |         ];","lines":6}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Overlap duration is divided by 1000 extra, making it ~1000x too small. `config.delay()` returns a count of samples. Converting to seconds requires only `delay / sample_rate`, but the code computes `delay / sample_rate / 1000.0`. As a result `overlap` is off by three orders of magnitude, causing incorrect chunk timestamps and durations when `--overlap` is passed.","fix":"Remove the trailing `/ 1000.0`: `overlap = (config.delay() as f64) / (sample_rate as f64);`","locations":[{"ref":"fpcalc/src/main.rs:277","code":"  277 |         overlap = (config.delay() as f64) * 1.0 / (sample_rate as f64) / 1000.0;","lines":1}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In the example test.rs, `printer.start(11025, 2)` is called but the input file is `test_stereo_44100.raw`, which contains samples at 44100 Hz (352800 bytes = 88200 stereo sample frames at 44100 Hz, equating to 2 seconds). Passing 11025 as the sample rate tells the fingerprinter not to resample, so it processes 44100 Hz audio as if it were 11025 Hz - producing a fingerprint that corresponds to audio running 4x slower than it actually is. The hardcoded expected fingerprint in the assert hides the bug, but any user reading the example to understand correct API usage will be misled.","fix":"Either change the sample rate argument to `printer.start(44100, 2)` (and update the expected fingerprint accordingly), or rename the data file to `test_stereo_11025.raw` and document that it is pre-downsampled.","locations":[{"ref":"chromaprint/examples/test.rs:13-16","code":"   13 | fn main() {\n   14 |     let mut printer = Fingerprinter::new(&Configuration::preset_test1());\n   15 |     printer.start(11025, 2).unwrap();\n   16 |     printer.consume(&read_s16le(\"data/test_stereo_44100.raw\"));","lines":4}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In audio_processor.rs reset(), self.input is never cleared. If flush() or consume() was called before reset(), stale data remains in self.input and will be processed together with new audio in the next session, corrupting the fingerprint.","fix":"Add `self.input.clear();` inside reset().","locations":[{"ref":"chromaprint/src/audio_processor.rs:123-156","code":"  123 |     pub(crate) fn reset(&mut self, sample_rate: u32, channels: u32) -> Result<(), ResetError> {\n  124 |         if channels == 0 {\n  125 |             return Err(ResetError::NoChannels);\n  126 |         }\n  127 | \n  128 |         if sample_rate <= MIN_SAMPLE_RATE {\n  129 |             return Err(ResetError::SampleRateTooLow);\n  130 |         }\n  131 | \n  132 |         self.channels = channels;\n  133 |         self.buffer_offset = 0;\n  134 |         self.consumer.reset();\n  135 | \n  136 |         if self.target_sample_rate != sample_rate {\n  137 |             let resampler = rubato::SincFixedIn::new(\n  138 |                 self.target_sample_rate as f64 / sample_rate as f64,\n  139 |                 1.0,\n  140 |                 rubato::SincInterpolationParameters {\n  141 |                     sinc_len: 16,\n  142 |                     f_cutoff: 0.8,\n  143 |                     oversampling_factor: 128,\n  144 |                     interpolation: rubato::SincInterpolationType::Nearest,\n  145 |                     window: rubato::WindowFunction::Blackman,\n  146 |                 },\n  147 |                 MAX_BUFFER_SIZE,\n  148 |                 1,\n  149 |             )?;\n  150 |             self.output_buffer\n  151 |                 .resize(resampler.output_frames_max(), 0.0);\n  152 |             self.resampler = Some(resampler);\n  153 |         }\n  154 | \n  155 |         Ok(())\n  156 |     }","lines":34}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"AudioConsumer<i16>::flush() on AudioProcessor is a no-op (empty body). The trait contract implies that flush should propagate downstream. However the public API Fingerprinter::finish() calls processor.flush() which calls AudioProcessor::flush() (the inherent method on line 158) - this is correct. But the trait-impl flush() at line 192 is the one exposed when AudioProcessor is used as a generic AudioConsumer<i16>, and it silently discards the flush signal instead of delegating it.","fix":"Delegate to self.flush() (the inherent method) so that the remaining buffer is resampled and the downstream consumer is flushed.","locations":[{"ref":"chromaprint/src/audio_processor.rs:192-193","code":"  192 |     fn flush(&mut self) {}\n  193 | }","lines":2}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In chroma.rs consume(), the interpolation branch for notes_frac[i] == 0.5 is silently unhandled. When notes_frac[i] is exactly 0.5, neither the `< 0.5` nor the `> 0.5` branch executes, so note2 stays equal to note and a is 1.0. This means 100% energy goes to note and 0% to note2, while the intent of interpolation (splitting energy between adjacent notes) is not applied for this exact boundary value. The reference C++ implementation has the same gap, but it is still a logic defect.","fix":"Add an `else` branch for notes_frac[i] == 0.5 (or use >= 0.5 for one side) to handle the midpoint consistently, matching the intended interpolation behavior.","locations":[{"ref":"chromaprint/src/chroma.rs:67-82","code":"   67 |             if self.interpolate {\n   68 |                 let mut note2 = note;\n   69 |                 let mut a = 1.0;\n   70 |                 if self.notes_frac[i] < 0.5 {\n   71 |                     note2 = (note + NUM_BANDS - 1) % NUM_BANDS;\n   72 |                     a = 0.5 + self.notes_frac[i];\n   73 |                 }\n   74 |                 if self.notes_frac[i] > 0.5 {\n   75 |                     note2 = (note + 1) % NUM_BANDS;\n   76 |                     a = 1.5 - self.notes_frac[i];\n   77 |                 }\n   78 |                 self.features[note] += energy * a;\n   79 |                 self.features[note2] += energy * (1.0 - a);\n   80 |             } else {\n   81 |                 self.features[note] += energy;\n   82 |             }","lines":16}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In chroma_filter.rs, the buffer is a fixed-size array of 8 entries (`[[f64; 12]; 8]`) but coefficients can have any length up to 8 (no validation). If coefficients.len() > 8 (buffer.len()), the consume() path computes an offset that wraps modulo buffer.len() == 8 while iterating up to coefficients.len() elements, causing repeated reads of the same buffer slots and producing silently incorrect filter output. There is no panic but correctness is violated.","fix":"Assert or return an error in new() if coefficients.len() > buffer.len(). Or make the buffer length dynamic (Vec) to match the coefficients length.","locations":[{"ref":"chromaprint/src/chroma_filter.rs:6","code":"    6 |     buffer: [[f64; 12]; 8],","lines":1},{"ref":"chromaprint/src/chroma_filter.rs:37-48","code":"   37 |         if self.buffer_size >= self.coefficients.len() {\n   38 |             let offset = (self.buffer_offset + self.buffer.len() - self.coefficients.len())\n   39 |                 % self.buffer.len();\n   40 |             self.result.fill(0.0);\n   41 |             for i in 0..self.result.len() {\n   42 |                 for j in 0..self.coefficients.len() {\n   43 |                     self.result[i] +=\n   44 |                         self.buffer[(offset + j) % self.buffer.len()][i] * self.coefficients[j];\n   45 |                 }\n   46 |             }\n   47 | \n   48 |             self.consumer.consume(&self.result);","lines":12}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In chroma_filter.rs reset(), buffer_size is reset to 1 but buffer_offset is reset to 0 and the buffer data is NOT zeroed. After a reset, the old audio data remains in the ring buffer. The first coefficients.len()-1 calls to consume() after reset() will skip output (correct), but when the output resumes, the convolution reaches back into the un-zeroed slots and mixes old audio with new audio.","fix":"Zero the buffer in reset(): `self.buffer = std::array::from_fn(|_| [0.0; 12]);`","locations":[{"ref":"chromaprint/src/chroma_filter.rs:54-57","code":"   54 |     fn reset(&mut self) {\n   55 |         self.buffer_size = 1;\n   56 |         self.buffer_offset = 0;\n   57 |     }","lines":4}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In compression.rs iter_packed_intn_array(), the fold accumulates into `[0u8; N]` and tracks `size` (actually left_byte+1). However, when a chunk has fewer than 8 elements (the final chunk of the input array), size is computed correctly per the fold, and result.into_iter().take(size) emits only size bytes. But the initial `size` value from the fold tuple is 0 (not initialized), so if the chunk is empty (which cannot happen with chunks() since it skips empties) the result would be wrong. More critically: the variable named `size` in the fold is actually the accumulated count of bytes *written so far in this chunk*. In the outermost fold the initial value is `(0, [0u8; N])` where `0` is used as the running `size` output. The first iteration sets `(_, mut result)` to the initial `(0, [0u8; N])` but then immediately shadows `_` with the accumulated result of enumerate, so the initial size=0 is discarded after the first element. The `size` in `.take(size)` is actually `left_byte + 1` from the last iteration, which is the maximum byte index touched. This correctly skips unwritten trailing bytes. However if the input slice has elements at the end that all land in byte 0 of result, left_byte=0 and size=1, which is correct. This logic appears to work but is extremely hard to follow and not obviously correct.","fix":"Refactor iter_packed_intn_array to use a simpler bit-packing loop that is easier to audit: iterate with a bit cursor, shifting into a u8 accumulator and emitting when full.","locations":[{"ref":"chromaprint/src/compression.rs:105-127","code":"  105 | fn iter_packed_intn_array<const N: usize>(array: &[u8]) -> impl Iterator<Item = u8> + '_ {\n  106 |     let mask = (0xFF << (8 - N)) >> (8 - N);\n  107 |     array.chunks(8).flat_map(move |slice| {\n  108 |         let (size, result) = slice.iter().map(|s| s & mask).enumerate().fold(\n  109 |             (0, [0u8; N]),\n  110 |             |(_, mut result), (i, bits)| {\n  111 |                 let rightmost_bit_index = i * N;\n  112 |                 let leftmost_bit_index = rightmost_bit_index + N - 1;\n  113 | \n  114 |                 let right_byte = rightmost_bit_index / 8;\n  115 |                 let left_byte = leftmost_bit_index / 8;\n  116 | \n  117 |                 result[right_byte] |= bits << (rightmost_bit_index % 8);\n  118 |                 if left_byte != right_byte {\n  119 |                     result[left_byte] |= bits >> ((8 - (rightmost_bit_index % 8)) % 8);\n  120 |                 }\n  121 | \n  122 |                 (left_byte + 1, result)\n  123 |             },\n  124 |         );\n  125 |         result.into_iter().take(size)\n  126 |     })\n  127 | }","lines":23}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In fft.rs consume(), fft_frame is filled for indices 0..frame_size/2 using norm_sqr() of the FFT output. But fft_frame has length 1 + frame_size/2 (line 34). The last element (index frame_size/2) is always left at its previous value (0.0 on first call but stale on subsequent calls if the FFT output ever wrote there - it does not because the loop stops at frame_size/2). Actually the last slot is never updated, so fft_frame always has a spurious trailing zero that is passed downstream. This inflates the chroma feature array's effective frequency range by one extra bin.","fix":"Change fft_frame length to `frame_size / 2` (remove the `+ 1`), and adjust the consumer call accordingly. Or fill the last element explicitly with `self.fft_buffer_complex[frame_size/2].norm_sqr()` if the Nyquist bin is intentionally included.","locations":[{"ref":"chromaprint/src/fft.rs:34","code":"   34 |             fft_frame: vec![0.0; 1 + frame_size / 2].into_boxed_slice(),","lines":1},{"ref":"chromaprint/src/fft.rs:72-74","code":"   72 |             for i in 0..self.frame_size / 2 {\n   73 |                 self.fft_frame[i] = self.fft_buffer_complex[i].norm_sqr();\n   74 |             }","lines":3}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"fingerprint_matcher::match_fingerprints only processes the single best histogram alignment (best_alignments.into_iter().next()), discarding all other candidate alignments. All collected peaks are sorted but then only the first one is consumed. While this matches the C++ reference for common cases, fingerprints with multiple repeated musical sections will only report one match region instead of all matching segments.","fix":"Iterate over all best_alignments entries (or at least a configurable top-N) and accumulate segments from each, deduplicating overlapping ones.","locations":[{"ref":"chromaprint/src/fingerprint_matcher.rs:106-109","code":"  106 |     best_alignments.sort_unstable_by_key(|it| Reverse(*it));\n  107 | \n  108 |     let mut segments: Vec<Segment> = Vec::new();\n  109 |     if let Some((_count, offset)) = best_alignments.into_iter().next() {","lines":4}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Configuration::delay() performs usize subtraction on potentially zero values: `self.filter_coefficients.len() - 1` and `self.max_filter_width - 1`. When called on a Configuration constructed with new() (which sets filter_coefficients to empty and max_filter_width to 0), both subtractions underflow usize and panic in debug builds or produce wrong large values in release builds. Similarly, samples_in_item() subtracts frame_overlap from frame_size; if frame_overlap > frame_size the subtraction underflows.","fix":"Add precondition checks (returning an error or using checked_sub) or restrict delay() to configurations that have been properly initialised with preset methods. Document the invariants.","locations":[{"ref":"chromaprint/src/fingerprinter.rs:138-139","code":"  138 |     fn samples_in_item(&self) -> usize {\n  139 |         self.frame_size - self.frame_overlap","lines":2},{"ref":"chromaprint/src/fingerprinter.rs:153-157","code":"  153 |     pub fn delay(&self) -> usize {\n  154 |         ((self.filter_coefficients.len() - 1) + (self.max_filter_width - 1))\n  155 |             * self.samples_in_item()\n  156 |             + self.frame_overlap\n  157 |     }","lines":5}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gaussian_filter() does not guard against n == 0. When n=0, the computation `12.0 * sigma * sigma / n as f64` produces +infinity, `sqrt(inf+1)` is infinity, and `floor(inf) as usize` is saturating (produces usize::MAX on modern Rust targets). The subsequent arithmetic for wu = wl + 2 overflows usize and panics in debug mode. Even in release mode the subsequent m calculation is meaningless.","fix":"Add an early return when n == 0, or assert!(n > 0) with a clear message. Document that the function is undefined for n=0.","locations":[{"ref":"chromaprint/src/gaussian.rs:1-32","code":"    1 | pub fn gaussian_filter<'a>(\n    2 |     mut input: &'a mut [f64],\n    3 |     mut output: &'a mut [f64],\n    4 |     sigma: f64,\n    5 |     n: usize,\n    6 | ) {\n    7 |     let w = f64::sqrt(12.0 * sigma * sigma / n as f64 + 1.0).floor() as usize;\n    8 |     let wl = w - (w % 2 == 0) as usize;\n    9 |     let wu = wl + 2;\n   10 | \n   11 |     let fwl = wl as f64;\n   12 |     let m = ((12.0 * sigma * sigma - n as f64 * fwl * fwl - 4.0 * n as f64 * fwl - 3.0 * n as f64)\n   13 |         / (-4.0 * fwl - 4.0))\n   14 |         .round() as usize;\n   15 | \n   16 |     let mut data1 = &mut input;\n   17 |     let mut data2 = &mut output;\n   18 | \n   19 |     for _ in 0..m {\n   20 |         box_filter(data1, data2, wl);\n   21 |         std::mem::swap(&mut data1, &mut data2);\n   22 |     }\n   23 | \n   24 |     for _ in m..n {\n   25 |         box_filter(data1, data2, wu);\n   26 |         std::mem::swap(&mut data1, &mut data2);\n   27 |     }\n   28 | \n   29 |     if data1.as_ptr() != output.as_ptr() {\n   30 |         output.copy_from_slice(input);\n   31 |     }\n   32 | }","lines":32}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"RollingIntegralImage::from_data (test-only) sets max_rows = data.len() / columns without the +1 that new(max_rows) applies (new stores max_rows + 1). This means the internal circular buffer for from_data is one slot smaller than what new() would create for the same row count, causing different rolling-eviction behaviour. Tests using from_data do not roll past capacity so the bug is latent, but comparisons between from_data and new() instances for the same data may behave differently.","fix":"Change the from_data initialiser to set max_rows: data.len() / columns + 1, mirroring the +1 in new().","locations":[{"ref":"chromaprint/src/rolling_image.rs:21-37","code":"   21 |     pub fn from_data<D>(columns: usize, data: &[D]) -> Self\n   22 |     where\n   23 |         D: Copy + Into<f64>,\n   24 |     {\n   25 |         let mut image = Self {\n   26 |             max_rows: data.len() / columns,\n   27 |             columns: 0,\n   28 |             rows: 0,\n   29 |             data: Vec::with_capacity(data.len()),\n   30 |         };\n   31 | \n   32 |         for row in data.chunks_exact(columns) {\n   33 |             image.add_row(row);\n   34 |         }\n   35 | \n   36 |         image\n   37 |     }","lines":17}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"When `--overlap` is active and a chunk is completed, the code creates a new `Fingerprinter::new(config)` (line 342) but never calls `.start()` on it. The next `printer.consume()` call will feed samples into an un-initialised fingerprinter. Without a prior `start(sample_rate, channels)` the processor's channel count and resampler are never set up, so subsequent samples are silently mis-processed or the internal assert `data.len() % channels == 0` fires with channels = 0, causing a division-by-zero or panic.","fix":"After `printer = Fingerprinter::new(config)`, call `printer.start(reader.sample_rate, channel_count).context(\"reinitializing fingerprinter\")?;`.","locations":[{"ref":"fpcalc/src/main.rs:341-343","code":"  341 |                 if args.overlap {\n  342 |                     printer = Fingerprinter::new(config);\n  343 |                     ts -= overlap;","lines":3}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In audio_processor.rs, MIN_SAMPLE_RATE is checked with `sample_rate <= MIN_SAMPLE_RATE` (strictly less-than-or-equal), meaning a sample rate of exactly 1000 Hz is rejected. The constant name and the comparison suggest the intent is to require sample_rate > MIN_SAMPLE_RATE (i.e., at least 1001 Hz). This is an off-by-one in the guard: a 1000 Hz sample rate is a valid rate and is unnecessarily rejected.","fix":"Change the condition to `sample_rate < MIN_SAMPLE_RATE` so that exactly MIN_SAMPLE_RATE is accepted, or rename the constant to MIN_SAMPLE_RATE_EXCLUSIVE to document the intent.","locations":[{"ref":"chromaprint/src/audio_processor.rs:7","code":"    7 | const MIN_SAMPLE_RATE: u32 = 1000;","lines":1},{"ref":"chromaprint/src/audio_processor.rs:128-130","code":"  128 |         if sample_rate <= MIN_SAMPLE_RATE {\n  129 |             return Err(ResetError::SampleRateTooLow);\n  130 |         }","lines":3}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In chroma.rs prepare_notes(), notes and notes_frac are allocated with frame_size entries but only indices min_index..max_index are ever written. Indices 0..min_index and max_index..frame_size contain stale zero-initialized values. The consume() loop correctly skips those ranges using skip/take, so there is no current bug, but the allocation is wasteful and could mislead future readers into thinking all entries are valid.","fix":"Either document the partial initialization explicitly, or use a HashMap/offset so only the valid range is stored.","locations":[{"ref":"chromaprint/src/chroma.rs:24-46","code":"   24 |             interpolate: false,\n   25 |             notes: vec![0; frame_size].into_boxed_slice(),\n   26 |             notes_frac: vec![0.0; frame_size].into_boxed_slice(),\n   27 |             min_index: 0,\n   28 |             max_index: 0,\n   29 |             features: [0.0; NUM_BANDS],\n   30 |             consumer,\n   31 |         };\n   32 |         chroma.prepare_notes(min_freq, max_freq, frame_size, sample_rate);\n   33 |         chroma\n   34 |     }\n   35 | \n   36 |     fn prepare_notes(&mut self, min_freq: u32, max_freq: u32, frame_size: usize, sample_rate: u32) {\n   37 |         self.min_index = freq_to_index(min_freq, frame_size, sample_rate).max(1);\n   38 |         self.max_index = freq_to_index(max_freq, frame_size, sample_rate).min(frame_size / 2);\n   39 |         for i in self.min_index..self.max_index {\n   40 |             let freq = index_to_freq(i, frame_size, sample_rate);\n   41 |             let octave = freq_to_octave(freq);\n   42 |             let note = NUM_BANDS as f64 * (octave - octave.floor());\n   43 |             self.notes[i] = note.floor() as u8;\n   44 |             self.notes_frac[i] = note - note.floor();\n   45 |         }\n   46 |     }","lines":23}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In fingerprint_matcher.rs line 135, `grad.iter_mut().take(size)` is redundant: `gradient()` is guaranteed to produce exactly `size` elements from `smoothed_bit_counts` (which has exactly `size` elements), so the `.take(size)` call does nothing and obscures the reader's understanding of why it's needed.","fix":"Remove the redundant .take(size) call: `for item in grad.iter_mut() { *item = item.abs(); }`.","locations":[{"ref":"chromaprint/src/fingerprint_matcher.rs:132-137","code":"  132 |         let mut grad = Vec::with_capacity(size);\n  133 |         gradient(smoothed_bit_counts.iter().copied(), &mut grad);\n  134 | \n  135 |         for item in grad.iter_mut().take(size) {\n  136 |             *item = item.abs();\n  137 |         }","lines":6}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In fingerprint_matcher the score variable is computed as orig_bit_counts[begin..end].iter().sum() / duration as f64. When size == 0 (both fingerprints run out at the same edge offset), gradient_peaks = [0], the loop body runs once with begin=0 and end=0, making duration=0 and producing NaN via 0.0/0.0. NaN < match_threshold is false so no segment is pushed, but the NaN propagation is unintentional silent incorrect behavior.","fix":"Guard the inner loop with `if size == 0 { return Ok(segments); }` before entering the segment detection phase, or check `duration == 0` before the division.","locations":[{"ref":"chromaprint/src/fingerprint_matcher.rs:152-184","code":"  152 |         gradient_peaks.push(size);\n  153 | \n  154 |         let match_threshold = 10.0;\n  155 |         let max_score_difference = 0.7;\n  156 | \n  157 |         let mut begin = 0;\n  158 |         for end in gradient_peaks {\n  159 |             let duration = end - begin;\n  160 |             let score: f64 = orig_bit_counts[begin..end].iter().sum::<f64>() / (duration as f64);\n  161 |             if score < match_threshold {\n  162 |                 let new_segment = Segment {\n  163 |                     offset1: offset1 + begin,\n  164 |                     offset2: offset2 + begin,\n  165 |                     items_count: duration,\n  166 |                     score,\n  167 |                 };\n  168 | \n  169 |                 let mut added = false;\n  170 |                 if let Some(s1) = segments.last_mut() {\n  171 |                     if (s1.score - score).abs() < max_score_difference {\n  172 |                         if let Some(merged) = s1.try_merge(&new_segment) {\n  173 |                             *s1 = merged;\n  174 |                             added = true;\n  175 |                         }\n  176 |                     }\n  177 |                 }\n  178 | \n  179 |                 if !added {\n  180 |                     segments.push(new_segment);\n  181 |                 }\n  182 |             }\n  183 |             begin = end;\n  184 |         }","lines":33}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Quantizer::new() has a commented-out invariant check `// assert!(t0 <= t1 && t1 <= t2)`. The comment is the only documentation that thresholds must be ordered. If a caller passes out-of-order thresholds, quantize() silently produces wrong bin assignments without any error. The assert is commented out because Quantizer::new is a const fn (const panics require nightly), but no equivalent runtime check exists.","fix":"Add a non-const constructor or a debug_assert! in quantize() that checks the ordering, or provide a checked constructor that returns Option/Result.","locations":[{"ref":"chromaprint/src/quantize.rs:9-11","code":"    9 |     pub const fn new(t0: f64, t1: f64, t2: f64) -> Self {\n   10 |         // assert!(t0 <= t1 && t1 <= t2);\n   11 |         Self { t0, t1, t2 }","lines":3}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In utils.rs, `DurationDisplay` stores hundredths of a second as u64. For negative or NaN f32 inputs the cast `(self * 100.0).round() as u64` produces 0 (saturating cast since Rust 1.45) rather than signalling an error, silently displaying 0:00:00.00. The `start1`, `end1`, `start2`, `end2`, and `duration` values from `SegmentMatch` are f32 and can be negative if the matcher returns unexpected data.","fix":"Guard against negative values: use `(self.max(0.0) * 100.0).round() as u64` or convert to u64 via a checked path and return an error display string for invalid inputs.","locations":[{"ref":"compare/src/utils.rs:10-12","code":"   10 |     fn display_duration(&self) -> DurationDisplay {\n   11 |         DurationDisplay((self * 100.0).round() as _)\n   12 |     }","lines":3}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"fpcalc treats symphonia DecodeError as a fatal error and aborts the entire fingerprinting run, while compare correctly ignores it and continues. Symphonia documents that DecodeError is recoverable (bad packets occur in real streams), so fpcalc will fail on files that compare handles cleanly. The asymmetry also violates user expectations: the same audio file may succeed with compare but fail with fpcalc.","fix":"Match compare's behavior: replace `Err(Error::DecodeError(err)) => Err(Error::DecodeError(err))?` with `Err(Error::DecodeError(_)) => continue` (or simply fall through to the wildcard break arm after logging).","locations":[{"ref":"fpcalc/src/main.rs:285","code":"  285 |             Err(Error::DecodeError(err)) => Err(Error::DecodeError(err))?,","lines":1},{"ref":"compare/src/main.rs:92","code":"   92 |             Err(Error::DecodeError(_)) => (),","lines":1}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"compare/main.rs returns Ok(()) (exit code 0) when the wrong number of arguments is provided, instead of returning an error. CLI tools must exit with a non-zero code on usage errors so that scripts and shell pipelines can detect failure. The error message also says \"missing paths\" even when too many arguments are given.","fix":"Return `Err(anyhow::anyhow!(\"usage: compare <file1> <file2>\"))` or call `eprintln!` then `std::process::exit(1)` to signal failure to the caller.","locations":[{"ref":"compare/src/main.rs:103-106","code":"  103 |     if args.len() != 3 {\n  104 |         eprintln!(\"missing paths to audio files\");\n  105 |         return Ok(());\n  106 |     }","lines":4}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"The assert_eq_float! and assert_eq_float_slice! macros are marked #[doc(hidden)] but also #[macro_export], which elevates them to the crate root's public API. Any downstream crate can use these test-only assertion helpers. This leaks internal test infrastructure into the public interface and prevents them from being removed without a semver break.","fix":"Either move these macros inside a #[cfg(test)] block (only available in test builds) or use pub(crate) scoping via a re-export within a test module. If they are truly needed by integration tests, move them to a separate test-helper crate.","locations":[{"ref":"chromaprint/src/utils.rs:3-29","code":"    3 | #[doc(hidden)]\n    4 | #[macro_export]\n    5 | macro_rules! assert_eq_float {\n    6 |     ($a:expr, $b:expr) => {\n    7 |         assert_eq_float!($a, $b, 0.00001);\n    8 |     };\n    9 |     ($a:expr, $b:expr, $eps:expr) => {\n   10 |         assert!(($a - $b).abs() < $eps);\n   11 |     };\n   12 | }\n   13 | \n   14 | #[doc(hidden)]\n   15 | #[macro_export]\n   16 | macro_rules! assert_eq_float_slice {\n   17 |     ($a:expr, $b:expr) => {\n   18 |         $crate::assert_eq_float_slice!($a, $b, 0.00001);\n   19 |     };\n   20 |     ($a:expr, $b:expr, $eps:expr) => {\n   21 |         let a = $a;\n   22 |         let b = $b;\n   23 | \n   24 |         assert_eq!(a.len(), b.len());\n   25 |         for (a, b) in std::iter::zip(a, b) {\n   26 |             $crate::assert_eq_float!(a, b, $eps);\n   27 |         }\n   28 |     };\n   29 | }","lines":27}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In chroma_normalizer.rs consume(), the input slice is unconditionally heap-allocated via to_vec() on every frame (line 23), then normalized in-place, then consumed. This allocation occurs once per FFT frame (thousands of times per second) and is unnecessary because the normalized values can be written to a small stack array or a pre-allocated member buffer.","fix":"Add a `buffer: [f64; 12]` field to ChromaNormalizer, copy features into it, normalize, then consume. Eliminates the per-frame heap allocation.","locations":[{"ref":"chromaprint/src/chroma_normalizer.rs:22-25","code":"   22 |     fn consume(&mut self, features: &[f64]) {\n   23 |         let mut features = features.to_vec();\n   24 |         normalize(&mut features, 0.01);\n   25 |         self.consumer.consume(&features);","lines":4}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In fft.rs consume(), ring_buf is a VecDeque<f64>. The hot loop converts the deque window to FFT input via an iterator zip (line 64). Because VecDeque storage may be split across two slices, iteration is non-contiguous and prevents auto-vectorization. For a frame_size of 4096 this is the innermost hot loop of the entire fingerprinting pipeline.","fix":"Use ring_buf.make_contiguous() before the inner loop, or maintain a plain Vec with manual rotation, so the copy into fft_buffer_complex is a single memcpy-able slice.","locations":[{"ref":"chromaprint/src/fft.rs:55-78","code":"   55 |     fn consume(&mut self, data: &[f64]) {\n   56 |         self.ring_buf.extend(data.iter().copied());\n   57 | \n   58 |         while self.ring_buf.len() >= self.frame_size {\n   59 |             let window = self.ring_buf.iter().copied().take(self.frame_size);\n   60 | \n   61 |             assert_eq!(self.fft_buffer_complex.len(), self.frame_size);\n   62 |             assert_eq!(self.window.len(), self.frame_size);\n   63 | \n   64 |             for (i, (output, input)) in self.fft_buffer_complex.iter_mut().zip(window).enumerate() {\n   65 |                 output.re = input * self.window[i];\n   66 |                 output.im = 0.0;\n   67 |             }\n   68 | \n   69 |             self.fft_plan\n   70 |                 .process_with_scratch(&mut self.fft_buffer_complex, &mut self.fft_scratch);\n   71 | \n   72 |             for i in 0..self.frame_size / 2 {\n   73 |                 self.fft_frame[i] = self.fft_buffer_complex[i].norm_sqr();\n   74 |             }\n   75 | \n   76 |             self.consumer.consume(&self.fft_frame);\n   77 |             self.ring_buf.drain(..self.frame_size - self.frame_overlap);\n   78 |         }","lines":24}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In fingerprint_matcher::match_fingerprints the `histogram` vector is allocated as Vec<u32> with capacity fp1.len()+fp2.len() but then immediately grown to that exact size with vec![0u32; ...]. This is two allocations when one suffices (vec! already heap-allocates). More critically, the entire histogram is iterated twice: once to find peaks and once implicitly via best_alignments.sort_unstable_by_key. For large fingerprints (up to ~524 K elements) this is avoidable.","fix":"Minor: this is acceptable. If optimizing, replace the full histogram scan with a priority-queue / incremental max-tracking during construction to avoid the peak-scan pass.","locations":[{"ref":"chromaprint/src/fingerprint_matcher.rs:59-83","code":"   59 |     let mut histogram = vec![0u32; fp1.len() + fp2.len()];\n   60 |     for (offset_idx, item1) in offsets.iter().enumerate() {\n   61 |         let hash1 = item1 & HASH_MASK;\n   62 |         let offset1 = item1 & OFFSET_MASK;\n   63 |         let source1 = item1 & SOURCE_MASK;\n   64 |         if source1 != 0 {\n   65 |             // if we got hash from fp2, it means there is no hash from fp1,\n   66 |             // because if there was, it would be first\n   67 |             continue;\n   68 |         }\n   69 | \n   70 |         for item2 in offsets.iter().skip(offset_idx + 1) {\n   71 |             let hash2 = item2 & HASH_MASK;\n   72 |             if hash1 != hash2 {\n   73 |                 break;\n   74 |             }\n   75 | \n   76 |             let offset2 = item2 & OFFSET_MASK;\n   77 |             let source2 = item2 & SOURCE_MASK;\n   78 |             if source2 != 0 {\n   79 |                 let offset_diff = offset1 as usize + fp2.len() - offset2 as usize;\n   80 |                 histogram[offset_diff] += 1;\n   81 |             }\n   82 |         }\n   83 |     }","lines":25}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In fft.rs, the flush() method body contains a large commented-out block of code (lines 83-88) that pads remaining samples with zeros. This was intentionally disabled to match the reference implementation, but the comment says so. The dead code is harmless but adds noise.","fix":"Remove the commented-out block entirely if it is not planned to be re-enabled, or add a TODO comment referencing the specific behavior difference.","locations":[{"ref":"chromaprint/src/fft.rs:81-88","code":"   81 |     fn flush(&mut self) {\n   82 |         // It makes sense to pad the remaining samples with zeros and process the last frame,\n   83 |         // but the reference implementation doesn't do it.\n   84 |         // if !self.ring_buf.is_empty() && self.ring_buf.len() < self.frame_size {\n   85 |         //     self.ring_buf.resize(self.frame_size, 0.0);\n   86 |         //     self.consume(&[]);\n   87 |         // }\n   88 |     }","lines":8}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"read_s16le() in utils.rs is marked #[allow(unused)] and pub(crate), signalling it is sometimes unused. It also duplicates the identical function defined in chromaprint/examples/test.rs. The function calls .unwrap() on fs::read which panics if the file is missing - acceptable in tests but the duplication increases maintenance burden.","fix":"Remove the duplicate from examples/test.rs and keep only the utils.rs version (or vice versa). Consider gating it with #[cfg(test)] since it is only used in tests.","locations":[{"ref":"chromaprint/src/utils.rs:31-38","code":"   31 | #[allow(unused)]\n   32 | pub(crate) fn read_s16le(path: impl AsRef<Path>) -> Vec<i16> {\n   33 |     std::fs::read(path)\n   34 |         .unwrap()\n   35 |         .chunks_exact(2)\n   36 |         .map(|chunk| i16::from_le_bytes([chunk[0], chunk[1]]))\n   37 |         .collect::<Vec<_>>()\n   38 | }","lines":8}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Wrong error context string: the `try_into()` converts `channel_count` (a usize) to u32, but the `.context()` message says \"converting sample rate\". This misleads anyone diagnosing the error.","fix":"Change the context string to \"converting channel count to u32\" or similar.","locations":[{"ref":"fpcalc/src/main.rs:249-252","code":"  249 |     let channel_count: u32 = reader\n  250 |         .channel_count\n  251 |         .try_into()\n  252 |         .context(\"converting sample rate\")?;","lines":4}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The FIXME comment refers to `u32.case_signed()` which is misspelled (should be `cast_signed`) and also incorrect - the method does not exist in stable Rust under that name. The `as i32` transmuting cast used on the next line is already the idiomatic Rust approach; the FIXME is misleading noise.","fix":"Remove the FIXME comment. The `*x as i32` cast is correct and idiomatic for reinterpreting the bit pattern.","locations":[{"ref":"fpcalc/src/main.rs:399","code":"  399 |                 // FIXME: Use `u32.case_signed()` once it becomes stable.","lines":1}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"In fft.rs flush(), the comment says 'It makes sense to pad the remaining samples with zeros and process the last frame, but the reference implementation doesn't do it.' This is a design comment but the code it describes is commented out, making the intent ambiguous to future readers.","fix":"Either remove the commented code and keep a one-line explanation, or add a link to the specific reference implementation function to make the rationale verifiable.","locations":[{"ref":"chromaprint/src/fft.rs:82-83","code":"   82 |         // It makes sense to pad the remaining samples with zeros and process the last frame,\n   83 |         // but the reference implementation doesn't do it.","lines":2}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","easy":false,"description":"The audio-decoding setup in compare/src/main.rs (lines 17-99) duplicates roughly 60 lines of identical Symphonia boilerplate that fpcalc encapsulates in its AudioReader struct (fpcalc/src/main.rs lines 154-232). Both binaries open a file, probe the format, pick a non-null track, create a decoder, read sample_rate and channel_count, and enter a decode loop with the same SampleBuffer pattern. Any bug fix or behaviour change must be applied twice.","fix":"Extract the shared symphonia setup into a small shared crate (e.g. a `common` workspace member) exposing AudioReader, or at minimum move it into compare/src/audio.rs and reuse the same struct that fpcalc uses.","locations":[{"ref":"compare/src/main.rs:17-99","code":"   17 | fn calc_fingerprint(path: impl AsRef<Path>, config: &Configuration) -> anyhow::Result<Vec<u32>> {\n   18 |     let path = path.as_ref();\n   19 |     let src = std::fs::File::open(path).context(\"failed to open file\")?;\n   20 |     let mss = MediaSourceStream::new(Box::new(src), Default::default());\n   21 | \n   22 |     let mut hint = Hint::new();\n   23 |     if let Some(ext) = path.extension().and_then(|e| e.to_str()) {\n   24 |         hint.with_extension(ext);\n   25 |     }\n   26 | \n   27 |     let meta_opts: MetadataOptions = Default // Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;

  const m = String(text).match(/\.(\s|$)/);
