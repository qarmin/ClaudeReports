<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"gz_error formats the error message by calling `CStr::from_ptr(path).to_str().unwrap()` on the caller-supplied file path. On Unix, file paths are arbitrary byte strings and are frequently not valid UTF-8. Opening a file with a non-UTF-8 path and then triggering any error that calls gz_error (e.g. a read/write error during gzread/gzwrite/gzclose) makes `to_str()` return Err, so `.unwrap()` panics. This panic originates inside an `extern \"C\"` function and unwinds across the FFI boundary, which is undefined behavior (the cdylib forces panic=abort, but the rlib/staticlib that real C consumers link does not necessarily). zlib itself never fails on non-UTF-8 paths.","fix":"Do not assume the path is UTF-8. Use `CStr::to_bytes()` / a lossy conversion, or build the message from raw bytes, so a non-UTF-8 path produces a (possibly lossy) error string instead of panicking. The fd branch (line 505) is always ASCII and is fine, but the Path branch (line 502) must be made panic-free.","locations":[{"ref":"libz-rs-sys/src/gz.rs:500-507","code":"  500 |             state.msg = match state.source {\n  501 |                 Source::Path(path) => unsafe {\n  502 |                     gz_strcat(&[CStr::from_ptr(path).to_str().unwrap(), sep, msg])\n  503 |                 },\n  504 |                 Source::Fd(fd) => unsafe {\n  505 |                     gz_strcat(&[fd_path(buf, fd).to_str().unwrap(), sep, msg])\n  506 |                 },\n  507 |             };","lines":8,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/gz.rs#L500-L507"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"When the SANE flag is cleared (via `inflateUndermine`) and the compressed stream references a distance that points further back than the window actually contains, the decoder hits an unconditional `panic!(\"INFLATE_ALLOW_INVALID_DISTANCE_TOOFAR_ARRR\")` instead of handling the case. This is reachable from public API on untrusted input: stock zlib instead copies zero bytes / clamps the copy. The same panic exists in the slow path (Mode::Match in both `len_and_friends` and `dispatch`) and in both fast paths (`inflate_fast_help_impl`, `inflate_fast_back`). A decompressor must never panic on attacker-controlled input.","fix":"Implement the INFLATE_ALLOW_INVALID_DISTANCE_TOOFAR behavior (copy zeros / clamp) as zlib does, or at minimum convert these into `Mode::Bad` + `DataError` returns rather than panics.","locations":[{"ref":"zlib-rs/src/inflate.rs:855-857","code":"  855 |                                 // TODO INFLATE_ALLOW_INVALID_DISTANCE_TOOFAR_ARRR\n  856 |                                 panic!(\"INFLATE_ALLOW_INVALID_DISTANCE_TOOFAR_ARRR\")\n  857 |                             }","lines":3,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate.rs#L855-L857"},{"ref":"zlib-rs/src/inflate.rs:1571-1572","code":" 1571 |                                     // TODO INFLATE_ALLOW_INVALID_DISTANCE_TOOFAR_ARRR\n 1572 |                                     panic!(\"INFLATE_ALLOW_INVALID_DISTANCE_TOOFAR_ARRR\")","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate.rs#L1571-L1572"},{"ref":"zlib-rs/src/inflate.rs:2055-2056","code":" 2055 | \n 2056 |                                 panic!(\"INFLATE_ALLOW_INVALID_DISTANCE_TOOFAR_ARRR\")","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate.rs#L2055-L2056"},{"ref":"zlib-rs/src/inflate/infback.rs:868-869","code":"  868 | \n  869 |                                 panic!(\"INFLATE_ALLOW_INVALID_DISTANCE_TOOFAR_ARRR\")","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate/infback.rs#L868-L869"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"multmodp() infinite-loops when its first argument `a` is zero. The loop only breaks inside `if (a & m) != 0`, and once `m` shifts down to 0 the condition `a & m` is never true again, so the loop spins forever (and `m >>= 1` keeps m == 0). The comment documents 'this requires that a not be zero', but `crc32_combine_op` is a public function that forwards a caller-supplied `op` straight into multmodp via `multmodp(op, crc1)`. A caller passing op == 0 (e.g. an externally-generated combine operator, or crc32_combine_gen for a degenerate length) hangs the thread. This is a reachable hang from the public API, not just an internal invariant.","fix":"Either guard multmodp with `if a == 0 { return 0; }` at the top, or validate/document the precondition at the public crc32_combine_op boundary (e.g. debug_assert!(op != 0) plus a fast return).","locations":[{"ref":"zlib-rs/src/crc32/combine.rs:26-46","code":"   26 | pub(crate) const fn multmodp(a: u32, mut b: u32) -> u32 {\n   27 |     let mut m = 1 << 31;\n   28 |     let mut p = 0;\n   29 | \n   30 |     loop {\n   31 |         if (a & m) != 0 {\n   32 |             p ^= b;\n   33 |             if (a & (m - 1)) == 0 {\n   34 |                 break;\n   35 |             }\n   36 |         }\n   37 |         m >>= 1;\n   38 |         b = if (b & 1) != 0 {\n   39 |             (b >> 1) ^ CRC32_LSB_POLY as u32\n   40 |         } else {\n   41 |             b >> 1\n   42 |         };\n   43 |     }\n   44 | \n   45 |     p\n   46 | }","lines":21,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/crc32/combine.rs#L26-L46"},{"ref":"zlib-rs/src/crc32/combine.rs:13-15","code":"   13 | pub const fn crc32_combine_op(crc1: u32, crc2: u32, op: u32) -> u32 {\n   14 |     multmodp(op, crc1) ^ crc2\n   15 | }","lines":3,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/crc32/combine.rs#L13-L15"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`From<i32> for ReturnCode` panics ('invalid return code') on any value outside -6..=1. This is a panicking conversion on the public type surface; if any internal i32 (e.g. from a future code path or FFI) is out of range it aborts/unwinds across an FFI boundary instead of returning an error.","fix":"Prefer using `try_from_c_int` at call sites and handle None explicitly, or restrict the panic to debug builds. At minimum ensure no FFI-reachable path can pass an out-of-range value.","locations":[{"ref":"zlib-rs/src/lib.rs:226-233","code":"  226 | impl From<i32> for ReturnCode {\n  227 |     fn from(value: i32) -> Self {\n  228 |         match Self::try_from_c_int(value) {\n  229 |             Some(value) => value,\n  230 |             None => panic!(\"invalid return code {value}\"),\n  231 |         }\n  232 |     }\n  233 | }","lines":8,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/lib.rs#L226-L233"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"gzungetc calls gz_look to lazily allocate buffers, but does not verify that allocation succeeded before using the output buffer. If gz_look fails (e.g. out-of-memory), free_buffers resets `state.output = null` and `state.out_size = 0`. Execution then falls through to the `state.have == 0` branch which computes `state.output.add(state.out_size - 1)` = `null.add(0usize.wrapping_sub(1))` and writes a byte through it: in release this is a wild write through (effectively) a near-null pointer (UB); in debug the `state.out_size - 1` subtraction panics on overflow. Stock/zlib-ng guards this with a `state->size == 0` check after gz_look.","fix":"After the gz_look call (and before touching state.output), return -1 if the buffers were not allocated, e.g. `if state.output.is_null() || state.out_size == 0 { return -1; }`, mirroring stock zlib's `state->size == 0` check.","locations":[{"ref":"libz-rs-sys/src/gz.rs:2262-2289","code":" 2262 |     // In case this was just opened, set up the input buffer.\n 2263 |     if state.how == How::Look && state.have == 0 {\n 2264 |         // We have verified that `state` is valid.\n 2265 |         let _ = unsafe { gz_look(state) };\n 2266 |     }\n 2267 | \n 2268 |     // Process a skip request.\n 2269 |     if state.seek {\n 2270 |         state.seek = false;\n 2271 |         if gz_skip(state, state.skip).is_err() {\n 2272 |             return -1;\n 2273 |         }\n 2274 |     }\n 2275 | \n 2276 |     // If output buffer empty, put byte at end (allows more pushing).\n 2277 |     if state.have == 0 {\n 2278 |         state.have = 1;\n 2279 |         // Safety: because `state.have` is nonzero, the `state.output` buffer has been\n 2280 |         // allocated. And because the buffer's size is `state.out_size`, a pointer to\n 2281 |         // `output + out_size - 1` points within the buffer.\n 2282 |         state.next = unsafe { state.output.add(state.out_size - 1) };\n 2283 |         // Safety: from the addition above, `state.next` currently points within the\n 2284 |         // `state.output` buffer.\n 2285 |         unsafe { *(state.next as *mut u8) = c as u8 };\n 2286 |         state.pos -= 1;\n 2287 |         state.past = false;\n 2288 |         return c;\n 2289 |     }","lines":28,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/gz.rs#L2262-L2289"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"gzclose dispatches a GZ_NONE-mode handle to gzclose_w, which immediately returns Z_STREAM_ERROR because `state.mode != GZ_WRITE`, without calling free_state. The same is true if gzclose_r/gzclose_w are called on a handle whose mode does not match: the allocation (and its input/output buffers and msg string) is leaked rather than freed. A handle returned from gzopen/gzdopen is always GZ_READ or GZ_WRITE, so this is not reachable through the normal public API, but the close functions are public and documented to accept any handle obtained from the library, and the early Z_STREAM_ERROR returns silently leak.","fix":"On the mode-mismatch error paths in gzclose_r/gzclose_w, free the state before returning (or have gzclose free it), so no allocation is leaked regardless of how the handle reached an unexpected mode.","locations":[{"ref":"libz-rs-sys/src/gz.rs:633-635","code":"  633 |     if state.mode != GzMode::GZ_READ {\n  634 |         return Z_STREAM_ERROR;\n  635 |     }","lines":3,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/gz.rs#L633-L635"},{"ref":"libz-rs-sys/src/gz.rs:684-686","code":"  684 |     if state.mode != GzMode::GZ_WRITE {\n  685 |         return Z_STREAM_ERROR;\n  686 |     }","lines":3,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/gz.rs#L684-L686"},{"ref":"libz-rs-sys/src/gz.rs:605-608","code":"  605 |     match state.mode {\n  606 |         GzMode::GZ_READ => unsafe { gzclose_r(file) },\n  607 |         GzMode::GZ_WRITE | GzMode::GZ_APPEND | GzMode::GZ_NONE => unsafe { gzclose_w(file) },\n  608 |     }","lines":4,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/gz.rs#L605-L608"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"On 32-bit targets (where usize/size_t is 32 bits), `items as size_t * size as size_t` multiplies two c_uint (32-bit) values in 32-bit arithmetic, which can silently wrap. A wrapped, too-small allocation is then handed back to the caller as if it held `items * size` bytes, leading to a heap buffer overflow when the caller writes the full requested amount. zlib's contract is that zalloc(opaque, n, m) returns n*m bytes. The C `posix_memalign`/`malloc` path here does not benefit from calloc's built-in overflow check. The same unchecked multiply appears in the non-unix malloc path.","fix":"Use checked multiplication: `let Some(size) = (items as size_t).checked_mul(size as size_t) else { return core::ptr::null_mut(); };` and return null on overflow.","locations":[{"ref":"zlib-rs/src/allocate.rs:33","code":"   33 |     let size = items as size_t * size as size_t;","lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/allocate.rs#L33"},{"ref":"zlib-rs/src/allocate.rs:53","code":"   53 |     let size = items as size_t * size as size_t;","lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/allocate.rs#L53"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Same 32-bit overflow as the C allocator: `count as usize * size as usize` multiplies two 32-bit c_uint values in usize arithmetic, which wraps on 32-bit targets. The wrapped size is passed to `Layout::from_size_align` and `std::alloc::alloc`/`alloc_zeroed`, producing an under-sized allocation that the caller treats as `count * size` bytes -> heap buffer overflow.","fix":"Use `count.checked_mul(size)` (in usize) and return null on overflow before constructing the layout.","locations":[{"ref":"zlib-rs/src/allocate.rs:113","code":"  113 |     let size = count as usize * size as usize;","lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/allocate.rs#L113"},{"ref":"zlib-rs/src/allocate.rs:137","code":"  137 |     let size = count as usize * size as usize;","lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/allocate.rs#L137"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"gzfwrite computes `len = size * nitems` (a size_t that can exceed i32::MAX) and passes it straight to gz_write without checking it fits in a c_int. gz_write then does `let put = len as c_int`, truncating the value. The actual bytes are written correctly (gz_write loops on usize internally), but the returned count is wrong: gzfwrite divides this truncated `put` by `size`, so for a single write larger than 2 GiB it reports a wrong (possibly negative-derived) item count. gzwrite, by contrast, explicitly rejects len that does not fit in c_int (line 1548); gzfwrite is missing the equivalent guard.","fix":"Either reject len > c_int::MAX in gzfwrite (set Z_STREAM_ERROR and return 0, matching the gzwrite path), or change gz_write to track and return the written count as a usize rather than truncating to c_int via `len as c_int`.","locations":[{"ref":"libz-rs-sys/src/gz.rs:1605-1618","code":" 1605 |     // Compute the number of bytes to write, and make sure it fits in a size_t.\n 1606 |     let Some(len) = size.checked_mul(nitems) else {\n 1607 |         const MSG: &str = \"request does not fit in a size_t\";\n 1608 |         unsafe { gz_error(state, Some((Z_STREAM_ERROR, MSG))) };\n 1609 |         return 0;\n 1610 |     };\n 1611 | \n 1612 |     if len == 0 {\n 1613 |         len\n 1614 |     } else {\n 1615 |         // Safety: The caller is responsible for ensuring that `buf` points to at least\n 1616 |         // `len = size * nitems` readable bytes.\n 1617 |         (unsafe { gz_write(state, buf, len) }) as size_t / size\n 1618 |     }","lines":14,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/gz.rs#L1605-L1618"},{"ref":"libz-rs-sys/src/gz.rs:1649","code":" 1649 |     let put = len as c_int;","lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/gz.rs#L1649"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`(ptr as usize).next_multiple_of(layout.align())` panics on overflow if the allocator returns a pointer so high that rounding up to the alignment exceeds usize::MAX. A conforming allocator will not return such a pointer for a real allocation, so impact is low, but it is an unguarded panic in otherwise infallible allocation code. The same pattern is repeated at the call sites in deflate.rs/inflate.rs.","fix":"Compute the alignment offset with wrapping/masking arithmetic, e.g. `align_diff = ptr.align_offset(layout.align())` or `(align - (ptr as usize & (align - 1))) & (align - 1)`, which cannot overflow for power-of-two alignments.","locations":[{"ref":"zlib-rs/src/allocate.rs:290","code":"  290 |         let align_diff = (ptr as usize).next_multiple_of(layout.align()) - (ptr as usize);","lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/allocate.rs#L290"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`stored_len` is a u16, so `stored_len << 3` is evaluated as a u16 shift and silently drops the high bits whenever stored_len > 8191 (stored blocks can be up to MAX_STORED = 65535 bytes). The shifted value is only consumed by cmpr_bits_add/sent_bits_add, which are no-ops unless the ZLIB_DEBUG feature is enabled, so the practical impact is a wrong debug bit-counter; but the truncating shift is misleading and would produce incorrect ZLIB_DEBUG accounting for any stored block larger than 8 KiB.","fix":"Cast to usize before shifting: `((stored_len as usize) << 3)`.","locations":[{"ref":"zlib-rs/src/deflate.rs:1739-1743","code":" 1739 |     if stored_len > 0 {\n 1740 |         state.bit_writer.pending.extend(input_block);\n 1741 |         state.bit_writer.cmpr_bits_add((stored_len << 3) as usize);\n 1742 |         state.bit_writer.sent_bits_add((stored_len << 3) as usize);\n 1743 |     }","lines":5,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/deflate.rs#L1739-L1743"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`undermine` uses Rust's bitwise-NOT operator `!subvert` where stock zlib uses logical negation (`state->sane = !subvert`). In C `!subvert` is 0 or 1; here `(!subvert) != 0` is the bitwise complement, which is non-zero for every input except `subvert == -1`. As a result `SANE` is set to `true` for essentially all calls (e.g. `undermine(stream, 1)`, which is the documented way to disable the sanity check, leaves SANE set), and SANE can only be cleared by the single magic value `subvert == -1`. The behavior of `inflateUndermine` is therefore inverted/broken relative to zlib.","fix":"Mirror zlib's logical negation: `stream.state.flags.update(Flags::SANE, subvert == 0);` (sane = !subvert in the C boolean sense).","locations":[{"ref":"zlib-rs/src/inflate.rs:2594-2598","code":" 2594 | pub fn undermine(stream: &mut InflateStream, subvert: i32) -> ReturnCode {\n 2595 |     stream.state.flags.update(Flags::SANE, (!subvert) != 0);\n 2596 | \n 2597 |     ReturnCode::Ok\n 2598 | }","lines":5,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate.rs#L2594-L2598"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the direct-write fast path of gz_write, `state.pos += n as i64` is performed before gz_comp actually writes the chunk. If gz_comp fails (write error), the function returns 0 but state.pos has already been advanced by the not-yet-written chunk(s), leaving the reported uncompressed position (gztell) larger than the amount actually written. The buffered path has the same ordering. This desynchronizes gztell after a write error.","fix":"Advance state.pos only after gz_comp succeeds for the chunk, or roll pos back on the error return, so gztell reflects only data that was actually accepted/written.","locations":[{"ref":"libz-rs-sys/src/gz.rs:1686-1698","code":" 1686 |         loop {\n 1687 |             let n = Ord::min(len, c_uint::MAX as usize) as c_uint;\n 1688 |             state.stream.avail_in = n;\n 1689 |             state.pos += n as i64;\n 1690 |             if gz_comp(state, Z_NO_FLUSH).is_err() {\n 1691 |                 return 0;\n 1692 |             }\n 1693 |             len -= n as usize;\n 1694 |             if len == 0 {\n 1695 |                 break;\n 1696 |             }\n 1697 |         }\n 1698 |         state.stream.next_in = save_next_in;","lines":13,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/gz.rs#L1686-L1698"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Status transition handling is inconsistent across the gzip-header states. For Status::Extra the `status = Status::Name` transition is performed unconditionally (outside the `if let Some(gzhead)` block, line 2629), whereas for Status::Name, Status::Comment the transition is performed *inside* the `if let Some(gzhead)` block (lines 2642, 2656). If gzhead were ever None while in Status::Name/Comment, the state machine would get stuck on that status. In practice these statuses are only reached when gzhead is Some, so it is not currently reachable, but the asymmetry is a latent bug and a maintenance hazard.","fix":"Make the Name/Comment status transitions unconditional (move them outside the `if let Some(gzhead)` blocks) to match the Extra handling, or document why the asymmetry is safe.","locations":[{"ref":"zlib-rs/src/deflate.rs:2629-2658","code":" 2629 |         stream.state.status = Status::Name;\n 2630 |     }\n 2631 | \n 2632 |     if stream.state.status == Status::Name {\n 2633 |         if let Some(gzhead) = stream.state.gzhead.as_ref() {\n 2634 |             if !gzhead.name.is_null() {\n 2635 |                 // SAFETY: user satisfies precondition that gzhead.name is a C string.\n 2636 |                 let gzhead_name = unsafe { CStr::from_ptr(gzhead.name.cast()) };\n 2637 |                 let bytes = gzhead_name.to_bytes_with_nul();\n 2638 |                 if let ControlFlow::Break(err) = flush_bytes(stream, bytes) {\n 2639 |                     return err;\n 2640 |                 }\n 2641 |             }\n 2642 |             stream.state.status = Status::Comment;\n 2643 |         }\n 2644 |     }\n 2645 | \n 2646 |     if stream.state.status == Status::Comment {\n 2647 |         if let Some(gzhead) = stream.state.gzhead.as_ref() {\n 2648 |             if !gzhead.comment.is_null() {\n 2649 |                 // SAFETY: user satisfies precondition that gzhead.name is a C string.\n 2650 |                 let gzhead_comment = unsafe { CStr::from_ptr(gzhead.comment.cast()) };\n 2651 |                 let bytes = gzhead_comment.to_bytes_with_nul();\n 2652 |                 if let ControlFlow::Break(err) = flush_bytes(stream, bytes) {\n 2653 |                     return err;\n 2654 |                 }\n 2655 |             }\n 2656 |             stream.state.status = Status::Hcrc;\n 2657 |         }\n 2658 |     }","lines":30,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/deflate.rs#L2629-L2658"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"is_enabled_pclmulqdq only gates on `target_arch = \"x86_64\"`, whereas the other x86 feature checks (sse, sse42, avx2) also enable on 32-bit `target_arch = \"x86\"`. pclmulqdq/sse4.1 are available on 32-bit x86 too, so the crc32 PCLMULQDQ fast path is silently disabled on 32-bit x86. Likely an oversight rather than intentional; minor performance-only impact.","fix":"Add `target_arch = \"x86\"` to the cfg (matching the other detection functions) if the PCLMULQDQ path supports 32-bit x86, or add a comment explaining the deliberate exclusion.","locations":[{"ref":"zlib-rs/src/cpu_features.rs:73-79","code":"   73 | pub fn is_enabled_pclmulqdq() -> bool {\n   74 |     #[cfg(target_arch = \"x86_64\")]\n   75 |     #[cfg(feature = \"std\")]\n   76 |     return std::is_x86_feature_detected!(\"pclmulqdq\") && std::is_x86_feature_detected!(\"sse4.1\");\n   77 | \n   78 |     false\n   79 | }","lines":7,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/cpu_features.rs#L73-L79"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Mode::Name` and `Mode::Comment` use `.expect(\"name out of bounds\")` / `.expect(\"comm out of bounds\")` on `head.name_max.checked_sub(self.length)` / `head.comm_max.checked_sub(self.length)`. `head.name_max`/`comm_max` are caller-supplied (`gz_header` fields) and `self.length` is driven by the compressed stream. If a caller supplies a `name_max`/`comm_max` smaller than the number of name/comment bytes already consumed, this panics. While get_header documents buffer-size requirements, a too-small max is a plausible misuse that should not be a panic in a decompressor.","fix":"Use `saturating_sub` (as the gzip `extra` field handling at line 1095 already does) and clamp the copy length, rather than `expect`-panicking.","locations":[{"ref":"zlib-rs/src/inflate.rs:1159-1162","code":" 1159 |                                     let remaining_name_bytes = (head.name_max as usize)\n 1160 |                                         .checked_sub(self.length)\n 1161 |                                         .expect(\"name out of bounds\");\n 1162 |                                     let copy = Ord::min(name_slice.len(), remaining_name_bytes);","lines":4,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate.rs#L1159-L1162"},{"ref":"zlib-rs/src/inflate.rs:1216-1219","code":" 1216 |                                     let remaining_comm_bytes = (head.comm_max as usize)\n 1217 |                                         .checked_sub(self.length)\n 1218 |                                         .expect(\"comm out of bounds\");\n 1219 |                                     let copy = Ord::min(comment_slice.len(), remaining_comm_bytes);","lines":4,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate.rs#L1216-L1219"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"In `Mode::Check`, when `wrap == 0` (or the fuzz checksum-disable feature is on) the branch is skipped entirely, so `self.total += self.writer.len()` and `self.out_available = ...` are not updated before falling through to `Mode::Length`. For raw streams (wrap == 0) `gzip_flags` is 0 so `Mode::Length` does nothing, so this is currently benign, but the asymmetric bookkeeping (total/out_available only updated when a checksum is validated) is a latent inconsistency.","fix":"Update `self.total`/`out_available` unconditionally on leaving the Check state, independent of whether the checksum is verified.","locations":[{"ref":"zlib-rs/src/inflate.rs:1401-1432","code":" 1401 |                     Mode::Check => {\n 1402 |                         if !cfg!(feature = \"__internal-fuzz-disable-checksum\") && self.wrap != 0 {\n 1403 |                             need_bits!(self, 32);\n 1404 | \n 1405 |                             self.total += self.writer.len();\n 1406 | \n 1407 |                             if self.wrap & 4 != 0 {\n 1408 |                                 if self.gzip_flags != 0 {\n 1409 |                                     self.crc_fold.fold(self.writer.filled(), self.checksum);\n 1410 |                                     self.checksum = self.crc_fold.finish();\n 1411 |                                 } else {\n 1412 |                                     self.checksum = adler32(self.checksum, self.writer.filled());\n 1413 |                                 }\n 1414 |                             }\n 1415 | \n 1416 |                             let given_checksum = if self.gzip_flags != 0 {\n 1417 |                                 self.bit_reader.hold() as u32\n 1418 |                             } else {\n 1419 |                                 zswap32(self.bit_reader.hold() as u32)\n 1420 |                             };\n 1421 | \n 1422 |                             self.out_available = self.writer.capacity() - self.writer.len();\n 1423 | \n 1424 |                             if self.wrap & 4 != 0 && given_checksum != self.checksum {\n 1425 |                                 mode = Mode::Bad;\n 1426 |                                 break 'label self.bad(\"incorrect data check\\0\");\n 1427 |                             }\n 1428 | \n 1429 |                             self.bit_reader.init_bits();\n 1430 |                         }\n 1431 | \n 1432 |                         break 'blk Mode::Length;","lines":32,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate.rs#L1401-L1432"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In the zeroed C-allocator path, a temporary Allocator is built with `opaque: null` and used to perform the allocation via `zalloc_c_calloc`. The resulting user pointer is later freed by `deallocate` using `self.zfree` with `self.opaque` (the original allocator's opaque), not the null opaque used at allocation time. This is harmless only because the C zalloc/zfree functions ignore opaque, but it silently breaks the zlib contract that the same opaque be threaded through alloc and free. If the C path ever grew an opaque-sensitive allocator, this would be a latent bug.","fix":"Construct the temporary allocator with `opaque: self.opaque` (and free via the same), or document explicitly that the C calloc/free pair is opaque-agnostic and assert opaque is null.","locations":[{"ref":"zlib-rs/src/allocate.rs:335-345","code":"  335 |         #[cfg(feature = \"c-allocator\")]\n  336 |         if self.zalloc == C.zalloc {\n  337 |             let alloc = Allocator {\n  338 |                 zalloc: zalloc_c_calloc,\n  339 |                 zfree: zfree_c,\n  340 |                 opaque: core::ptr::null_mut(),\n  341 |                 _marker: PhantomData,\n  342 |             };\n  343 | \n  344 |             return alloc.allocate_layout(layout);\n  345 |         }","lines":11,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/allocate.rs#L335-L345"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`tune()` accepts `usize` parameters and unconditionally truncates them to u16 via `as u16` casts with no validation. A caller passing good_length/max_lazy/nice_length/max_chain >= 65536 silently gets a wrapped-around value, which can later violate assumptions elsewhere (e.g. max_chain feeds hash_calc_variant selection and the longest_match chain length). zlib's deflateTune takes ints but the values are bounded by usage; here there is no guard.","fix":"Validate the inputs (reject or clamp values that do not fit in u16) before casting, or document the truncation as an explicit precondition.","locations":[{"ref":"zlib-rs/src/deflate.rs:811-824","code":"  811 | pub fn tune(\n  812 |     stream: &mut DeflateStream,\n  813 |     good_length: usize,\n  814 |     max_lazy: usize,\n  815 |     nice_length: usize,\n  816 |     max_chain: usize,\n  817 | ) -> ReturnCode {\n  818 |     stream.state.good_match = good_length as u16;\n  819 |     stream.state.max_lazy_match = max_lazy as u16;\n  820 |     stream.state.nice_match = nice_length as u16;\n  821 |     stream.state.max_chain_length = max_chain as u16;\n  822 | \n  823 |     ReturnCode::Ok\n  824 | }","lines":14,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/deflate.rs#L811-L824"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"adler32 dispatch selects the AVX-512 path purely on compile-time `cfg!(target_feature = \"avx512f\"/\"avx512bw\")`, with no runtime detection, while the AVX2 and NEON paths use runtime feature detection (is_enabled_*). Consequently a generic x86_64 build (no -C target-feature=+avx512f) never uses the AVX-512 implementation even on a CPU that supports it, falling back to AVX2. This is a deliberate trade-off (avx512vl misoptimization concerns are noted elsewhere in the crate), but it means the avx512 modules are effectively dead in default builds and the fastest path is left on the table for runtime-detected CPUs.","fix":"If a runtime avx512 detection path is intended, add an is_enabled_avx512 check analogous to is_enabled_avx2_and_bmi2; otherwise document that avx512 is opt-in via target-feature so the gating is not mistaken for a bug.","locations":[{"ref":"zlib-rs/src/adler32.rs:18-27","code":"   18 |     #[cfg(feature = \"avx512\")]\n   19 |     #[cfg(target_arch = \"x86_64\")]\n   20 |     if cfg!(all(target_feature = \"avx512f\", target_feature = \"avx512bw\")) {\n   21 |         return avx512::adler32_avx512(start_checksum, data);\n   22 |     }\n   23 |         self.sym_buf.clear();\n 1629 |         self.matches = 0;\n 1630 |     }","lines":25,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/deflate.rs#L1606-L1630"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`extra_safe` is a hard-coded `let extra_safe = false;` in both fast paths, leaving a `todo!()` arm that is dead but also means the 'extra safe' window-copy variant that stock zlib uses when input/output are close was never ported. Combined with the `// TODO verify if this is relevant for us` comment, this is unfinished work that should be either implemented or explicitly removed.","fix":"Either implement the extra_safe path or delete the dead variable and `todo!()` branch and document why it is unnecessary.","locations":[{"ref":"zlib-rs/src/inflate.rs:1938-1939","code":" 1938 |     // TODO verify if this is relevant for us\n 1939 |     let extra_safe = false;","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate.rs#L1938-L1939"},{"ref":"zlib-rs/src/inflate.rs:2110-2111","code":" 2110 |                         } else if extra_safe {\n 2111 |                             todo!()","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate.rs#L2110-L2111"},{"ref":"zlib-rs/src/inflate/infback.rs:751-752","code":"  751 |     // TODO verify if this is relevant for us\n  752 |     let extra_safe = false;","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/inflate/infback.rs#L751-L752"},{"ref":"zlib-rs/src/inflate/infback.rs:914-915","code":"  914 |                         } else if extra_safe {\n  915 |                             todo!()","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-r nstead.","locations":[{"ref":"zlib-rs/src/deflate.rs:2392","code":" 2392 |     // cmpr_bits_add(s, s.static_len);","lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/deflate.rs#L2392"},{"ref":"zlib-rs/src/deflate.rs:2405-2407","code":" 2405 |     // TODO\n 2406 |     // This check is made mod 2^32, for files larger than 512 MB and unsigned long implemented on 32 bits.\n 2407 |     // assert_eq!(state.compressed_len, state.bits_sent, \"bad compressed size\");","lines":3,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/deflate.rs#L2405-L2407"},{"ref":"zlib-rs/src/deflate.rs:3319","code":" 3319 |         // let alloc_size = size_of::<DeflateAlloc>();","lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/deflate.rs#L3319"},{"ref":"zlib-rs/src/deflate/longest_match.rs:283-284","code":"  283 |                 // uint32_t i, hash;\n  284 |                 // unsigned char *scan_endstr;","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/deflate/longest_match.rs#L283-L284"},{"ref":"zlib-rs/src/deflate/slow.rs:84","code":null,"lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/deflate/slow.rs#L84"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The gzprintf/gzvprintf doc comments state the number of uncompressed bytes written is limited to 8191 (or one less than the gzbuffer size). In this implementation the limit is `state.in_size`, which equals `state.want` and defaults to GZBUFSIZE = 128 KiB, not 8191. The literal 8191 is copied from stock zlib's much smaller default and does not describe this code, so callers will misjudge the real truncation threshold.","fix":"Reword the limit description in terms of the actual buffer size (`state.want`, default 128 KiB), or drop the specific 8191 figure, so the documentation matches the in_size-based check at line 2790.","locations":[{"ref":"libz-rs-sys/src/gz.rs:2694-2695","code":" 2694 | /// The number of uncompressed bytes written is limited to 8191, or one less than the buffer size given to [`gzbuffer`].\n 2695 | /// The caller should assure that this limit is not exceeded. If it is exceeded, then [`gzprintf`] will return `0` with nothing written.","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/gz.rs#L2694-L2695"},{"ref":"libz-rs-sys/src/gz.rs:2716-2717","code":" 2716 | /// The number of uncompressed bytes written is limited to 8191, or one less than the buffer size given to [`gzbuffer`].\n 2717 | /// The caller should assure that this limit is not exceeded. If it is exceeded, then [`gzvprintf`] will return `0` with nothing written.","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/gz.rs#L2716-L2717"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The safety comment claims 'offset is smaller than 64, and we allocated 64 extra bytes in the allocation', but the code does not allocate a fixed 64 extra bytes. `extra_space = size_of::<*mut c_void>() + layout.align()` (line 276), and ALIGN (64) is unrelated to the per-allocation extra space when the layout alignment is smaller. The justification is misleading; a future reader could wrongly assume a fixed 64-byte slack exists.","fix":"Reword the comment to reference the actual reserved slack: `align_diff < layout.align()`, and `extra_space = size_of::<*mut c_void>() + layout.align()` guarantees enough room after the bump.","locations":[{"ref":"zlib-rs/src/allocate.rs:292","code":"  292 |         // Safety: offset is smaller than 64, and we allocated 64 extra bytes in the allocation","lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/allocate.rs#L292"},{"ref":"zlib-rs/src/allocate.rs:276","code":"  276 |         let extra_space = core::mem::size_of::<*mut c_void>() + layout.align();","lines":1,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/allocate.rs#L276"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment claims gzindex 'is always less than extra_len', but after a full flush of the extra field gzindex can equal (gzhead.extra_len & 0xffff). In that case the computed length `(gzhead.extra_len & 0xffff) - gzindex` is 0 (a valid empty slice), so the code is correct, but the SAFETY comment's invariant is stated too strongly and is technically false at the boundary.","fix":"Reword to 'gzindex is always <= (extra_len & 0xffff)' to match the actual invariant.","locations":[{"ref":"zlib-rs/src/deflate.rs:2617-2621","code":" 2617 |                         // SAFETY: gzindex is always less than extra_len, and the user\n 2618 |                         // guarantees the pointer is valid for extra_len.\n 2619 |                         gzhead_extra.add(stream.state.gzindex),\n 2620 |                         (gzhead.extra_len & 0xffff) as usize - stream.state.gzindex,\n 2621 |                     )","lines":5,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/deflate.rs#L2617-L2621"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The `# Safety` doc-comment block on inflateCodesUsed is copied from the checksum functions and talks about a `buf`/`len` pair satisfying `core::slice::from_raw_parts`. inflateCodesUsed takes only a `strm: *mut z_stream` and has no buf/len parameters; the relevant safety contract is the usual `strm` is NULL or a valid initialized stream. The comment is misleading copy-paste.","fix":"Replace the safety comment with the standard `strm` contract used by the other inflate* wrappers (NULL or `&mut *strm` initialized with inflateInit_).","locations":[{"ref":"libz-rs-sys/src/lib.rs:1186-1201","code":" 1186 | #[doc(hidden)]\n 1187 | /// Returns the number of codes used\n 1188 | ///\n 1189 | /// # Safety\n 1190 | ///\n 1191 | /// The caller must guarantee that either:\n 1192 | ///\n 1193 | /// - `buf` is `NULL`\n 1194 | /// - `buf` and `len` satisfy the requirements of [`core::slice::from_raw_parts`]\n 1195 | #[cfg_attr(feature = \"export-symbols\", export_name = prefix!(inflateCodesUsed))]\n 1196 | pub unsafe extern \"C\" fn inflateCodesUsed(strm: *mut z_stream) -> c_ulong {\n 1197 |     match InflateStream::from_stream_mut(strm) {\n 1198 |         Some(stream) => zlib_rs::inflate::codes_used(stream) as c_ulong,\n 1199 |         None => c_ulong::MAX,\n 1200 |     }\n 1201 | }","lines":16,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/libz-rs-sys/src/lib.rs#L1186-L1201"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment for partial_fold's PSHUFB_SHF_TABLE labels the second entry as 'shl 14 (16 - 3)/shr2'. The (16 - n) annotation is inconsistent: the first entry uses (16 - 1) for shl 15 and the third uses (16 - 4) for shl 13, but shl 14 would correspond to (16 - 2), not (16 - 3). The shuffle bytes themselves are correct; only the human-readable annotation is off, which can mislead a future maintainer auditing the table.","fix":"Correct the annotation on the shl 14 row to (16 - 2), and re-verify the (16 - n) labels on the remaining rows for consistency.","locations":[{"ref":"zlib-rs/src/crc32/pclmulqdq.rs:152-155","code":"  152 |             reg([0x84838281, 0x88878685, 0x8c8b8a89, 0x008f8e8d]), /* shl 15 (16 - 1)/shr1 */\n  153 |             reg([0x85848382, 0x89888786, 0x8d8c8b8a, 0x01008f8e]), /* shl 14 (16 - 3)/shr2 */\n  154 |             reg([0x86858483, 0x8a898887, 0x8e8d8c8b, 0x0201008f]), /* shl 13 (16 - 4)/shr3 */\n  155 |             reg([0x87868584, 0x8b8a8988, 0x8f8e8d8c, 0x03020100]), /* shl 12 (16 - 4)/shr4 */","lines":4,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/crc32/pclmulqdq.rs#L152-L155"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment block (lines 305-309) describes trying the hash head at position 'len-(STD_MIN_MATCH-1)', but the code uses `len - (STD_MIN_MATCH + 1)` at lines 310 and 321. The code matches zlib-ng's scan_endstr = scan + len - (STD_MIN_MATCH+1), so the code is correct and the comment text is the misleading part (it paraphrases the rationale rather than the actual offset).","fix":"Update the comment to reference `len - (STD_MIN_MATCH + 1)` to match the implementation.","locations":[{"ref":"zlib-rs/src/deflate/longest_match.rs:305-321","code":"  305 |                 /* Try hash head at len-(STD_MIN_MATCH-1) position to see if we could get\n  306 |                  * a better cur_match at the end of string. Using (STD_MIN_MATCH-1) lets\n  307 |                  * us include one more byte into hash - the byte which will be checked\n  308 |                  * in main loop now, and which allows to grow match by 1.\n  309 |                  */\n  310 |                 let [scan0, scan1, scan2, ..] = scan[len - (STD_MIN_MATCH + 1)..] else {\n  311 |                     panic!(\"index out of bounds\");\n  312 |                 };\n  313 | \n  314 |                 let mut hash = 0;\n  315 |                 hash = state.update_hash(hash, scan0 as u32);\n  316 |                 hash = state.updat 6/zlib-rs/src/inflate.rs#L1604-L1605"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":true,"description":"adler32/wasm.rs redefines `MOD = 65521` and `NMAX = 5552` locally even though the parent adler32 module already exports `BASE = 65521` and `NMAX = 5552`. The avx2/avx512/neon variants all import `BASE, NMAX` from the parent; only wasm forks its own copies, creating a maintenance hazard (if NMAX/BASE is ever tuned, wasm silently diverges).","fix":"Import BASE and NMAX from the parent module (use crate::adler32::{BASE, NMAX};) and drop the local MOD/NMAX constants, matching the other SIMD variants.","locations":[{"ref":"zlib-rs/src/adler32/wasm.rs:3-4","code":"    3 | const MOD: u32 = 65521;\n    4 | const NMAX: usize = 5552;","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/adler32/wasm.rs#L3-L4"},{"ref":"zlib-rs/src/adler32.rs:98-99","code":"   98 | const BASE: u32 = 65521; /* largest prime smaller than 65536 */\n   99 | const NMAX: u32 = 5552;","lines":2,"link":"https://github.com/trifectatechfoundation/zlib-rs/blob/b8dfae53b3ed79d07a6259e3fc7e5e47e3f2ef56/zlib-rs/src/adler32.rs#L98-L99"}]},{"id":"DUP_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"`inflate_fast_help_impl` (inflate.rs) and `inflate_fast_back` (infback.rs) are near-identical ~230-line functions (the `outer`/`dolen`/`dodist` decode loops, window-wrap handling, error handling). They differ only in window sizing (`window.size()` vs `window.buffer_size()`) and the window-copy helper used. Keeping two hand-synced copies of the most safety-critical hot loop invites divergence bugs.","fix":"Unify into a single generic fast-path function parameterized over the window-copy strategy and window-size accessor.","locations":[{"ref":"zlib-rs/src/inflate.rs:1922-2163","code":" 1922 | #[inline(always)]\n 1923 | unsafe fn inflate_fast_he   bit_reader.drop_bits(here.bits);\n 1998 |                 here = lcode[(bit_reader.hold() & lmask) as usize];\n 1999 |             }\n 2000 |         }\n 2001 | \n 2002 |         'dolen: loop {\n 2003 |             bit_reader.drop_bits(here.bits);\n 2004 |             let op = here.op;\n 2005 | \n 2006 |             if op == 0 {\n 2007 |                 writer.push(here.val as u8);\n 2008 |             } else if op & 16 != 0 {\n 2009 |                 let op = op & MAX_BITS;\n 2010 |                 let mut len = here.val + bit_reader.bits(op as usize) as u16;\n 2011 |                 bit_reader.drop_bits(op);\n 2012 | \n 2013 |                 here = dcode[(bit_reader.hold() & dmask) as usize];\n 2014 | \n 2015 |                 // we have two fast-path loads: 10+10 + 15+5 = 40,\n 2016 |                 // but we may need to refill here in the worst case\n 2017 |                 if bit_reader.bits_in_buffer() < MAX_BITS + MAX_DIST_EXTRA_BITS {\n 2018 |                     debug_assert!(bit_reader.bytes_remaining() >= 8);\n 2019 |                     // Safety: On the first iteration of the `dolen` loop, we can rely on the\n 2020 |                     // invariant documented for the previous `refill` call above: after that\n 2021 |                     // operation, `bit_reader.bytes_remining >= 8`, which satisfies the safety\n 2022 |                     // precondition for this call. For subsequent iterations, this invariant\n 2023 |                     // remains true because nothing else within the `dolen` loop consumes data\n 2024 |                     // from the slice.\n 2025 |                     unsafe { bit_reader.refill() };\n 2026 |                 }\n 2027 | \n 2028 |                 'dodist: loop {\n 2029 |                     bit_reader.drop_bits(here.bits);\n 2030 |                     let op = here.op;\n 2031 | \n 2032 |                     if op & 16 != 0 {\n 2033 |                         let op = op & MAX_BITS;\n 2034 |                         le // Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
