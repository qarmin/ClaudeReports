e-borrows ssl.ex_data(idx) to get stored. This is valid, but if between the two calls OpenSSL re-enters the add callback for the same extension on the same SSL object (e.g. in a TLS 1.3 scenario with multiple certificate messages), the second call would overwrite state.0 while the first call's *out pointer still points into the now-replaced data. This is a potential use-after-free of the extension data buffer.","fix":"Document that OpenSSL guarantees this callback is not re-entered concurrently for the same extension type and SSL object, or restructure to store one buffer per (extension, chainidx) pair.","locations":[{"ref":"openssl/src/ssl/callbacks.rs:546-565","code":"  546 |             Ok(Some(buf)) => {\n  547 |                 let idx = Ssl::cached_ex_index::<CustomExtAddState<T>>();\n  548 |                 let mut buf = Some(buf);\n  549 |                 let new = match ssl.ex_data_mut(idx) {\n  550 |                     Some(state) => {\n  551 |                         state.0 = buf.take();\n  552 |                         false\n  553 |                     }\n  554 |                     None => true,\n  555 |                 };\n  556 |                 if new {\n  557 |                     ssl.set_ex_data(idx, CustomExtAddState(buf));\n  558 |                 }\n  559 | \n  560 |                 // Capture the out pointer AFTER buf has been moved into ex_data.\n  561 |                 // The move invalidates any previous pointer into buf.\n  562 |                 let stored = ssl.ex_data(idx).unwrap();\n  563 |                 let data = stored.0.as_ref().unwrap().as_ref();\n  564 |                 *outlen = data.len();\n  565 |                 *out = data.as_ptr();","lines":20}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In try_get_session_ctx_index (mod.rs lines 587-595), there is a TOCTOU race: if SESSION_CTX_INDEX is unset, Ssl::new_ex_index() is called. If two threads reach this path simultaneously, both allocate a new ex_data index. OnceLock::get_or_init will discard one of the two indices. The discarded index is leaked and will never be freed, and any data registered at that index will also be leaked. Over the lifetime of a server with many worker threads this is a bounded (one-slot) leak, but it is still a real resource leak.","fix":"Use OnceLock::get_or_try_init once stable (tracked in the FIXME comment already present), or use a Mutex to serialize the initialization.","locations":[{"ref":"openssl/src/ssl/mod.rs:587-595","code":"  587 | fn try_get_session_ctx_index() -> Result<&'static Index<Ssl, SslContext>, ErrorStack> {\n  588 |     // Once `OnceLock::get_or_try_init` (rust-lang/rust#109737) is stable, this\n  589 |     // can collapse to `SESSION_CTX_INDEX.get_or_try_init(Ssl::new_ex_index)`.\n  590 |     if let Some(idx) = SESSION_CTX_INDEX.get() {\n  591 |         return Ok(idx);\n  592 |     }\n  593 |     let new = Ssl::new_ex_index::<SslContext>()?;\n  594 |     Ok(SESSION_CTX_INDEX.get_or_init(|| new))\n  595 | }","lines":9}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In SslContextBuilder::load_verify_locations (mod.rs lines 937-952), paths are converted via to_str().unwrap(). On Windows or any OS where file paths may contain non-UTF-8 sequences (which is a valid Rust OsStr), this will panic rather than returning an error. The same issue exists in set_certificate_file (line 1005), set_certificate_chain_file (line 1026), set_private_key_file (line 1064), and their SslRef counterparts (lines 3248, 3289).","fix":"Return an appropriate error (e.g. ErrorStack wrapping an io::Error with InvalidInput kind) instead of panicking when the path is not valid UTF-8.","locations":[{"ref":"openssl/src/ssl/mod.rs:942-943","code":"  942 |         let ca_file = ca_file.map(|p| CString::new(p.as_os_str().to_str().unwrap()).unwrap());\n  943 |         let ca_path = ca_path.map(|p| CString::new(p.as_os_str().to_str().unwrap()).unwrap());","lines":2},{"ref":"openssl/src/ssl/mod.rs:1005","code":" 1005 |         let file = CString::new(file.as_ref().as_os_str().to_str().unwrap()).unwrap();","lines":1},{"ref":"openssl/src/ssl/mod.rs:1026","code":" 1026 |         let file = CString::new(file.as_ref().as_os_str().to_str().unwrap()).unwrap();","lines":1},{"ref":"openssl/src/ssl/mod.rs:1064","code":" 1064 |         let file = CString::new(file.as_ref().as_os_str().to_str().unwrap()).unwrap();","lines":1},{"ref":"openssl/src/ssl/mod.rs:3248","code":" 3248 |         let p = path.as_ref().as_os_str().to_str().unwrap();","lines":1},{"ref":"openssl/src/ssl/mod.rs:3289","code":" 3289 |         let p = path.as_ref().as_os_str().to_str().unwrap();","lines":1}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The SslContextBuilder::set_ex_data_inner method (mod.rs lines 1594-1606) takes ownership of 'data: T' and either replaces an existing slot (via pointer dereference) or allocates a new Box. In the 'replace existing' path (lines 1596-1599), it writes the new T by dereferencing a *mut T obtained from SSL_CTX_get_ex_data. However, the old value of *v is overwritten with a plain assignment; Rust will drop the old T in place. This drop runs while the raw pointer (which was obtained from a Box previously pinned by Box::into_raw) is still the stored pointer in OpenSSL's ex_data. If the Drop impl of T reads or writes any state visible to other threads, or if OpenSSL's free callback (free_data_box) races with this assignment, the behavior is unsound. In practice single-threaded setup prevents this, but the invariant is fragile.","fix":"Document the invariant that set_ex_data_inner must only be called from the builder (not from concurrent code). Consider making the replace path do a Box::from_raw / Box::new / Box::into_raw cycle to keep ownership clear and prevent OpenSSL's free callback from racing.","locations":[{"ref":"openssl/src/ssl/mod.rs:1594-1606","code":" 1594 |     fn set_ex_data_inner<T>(&mut self, index: Index<SslContext, T>, data: T) -> *mut c_void {\n 1595 |         match self.ex_data_mut(index) {\n 1596 |             Some(v) => {\n 1597 |                 *v = data;\n 1598 |                 (v as *mut T).cast()\n 1599 |             }\n 1600 |             _ => unsafe {\n 1601 |                 let data = Box::into_raw(Box::new(data)) as *mut c_void;\n 1602 |                 ffi::SSL_CTX_set_ex_data(self.as_ptr(), index.as_raw(), data);\n 1603 |                 data\n 1604 |             },\n 1605 |         }\n 1606 |     }","lines":13}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In SslContextBuilder::set_client_hello_callback (mod.rs lines 1700-1708), the callback pointer passed to SSL_CTX_set_client_hello_cb as 'arg' is the raw pointer returned by set_ex_data_inner. However, set_ex_data_inner can return a pointer to an already-existing value if the slot was previously populated (the 'Some(v)' branch, lines 1595-1599), which points into the existing Box<F>. If set_client_hello_callback is called a second time with a different F type (or even the same), the previously returned pointer is stale because the Box has been replaced. Additionally, if the closure F is replaced, the arg pointer stored in OpenSSL still points to the old (now-dropped) Box, causing use-after-free when OpenSSL later invokes the callback with that arg.","fix":"After calling set_ex_data_inner, always re-fetch the current pointer via SSL_CTX_get_ex_data rather than using the pointer returned from the 'existing slot' branch of set_ex_data_inner. Or guarantee that set_client_hello_callback can only be called once.","locations":[{"ref":"openssl/src/ssl/mod.rs:1694-1708","code":" 1694 |     where\n 1695 |         F: Fn(&mut SslRef, &mut SslAlert) -> Result<ClientHelloResponse, ErrorStack>\n 1696 |             + 'static\n 1697 |             + Sync\n 1698 |             + Send,\n 1699 |     {\n 1700 |         unsafe {\n 1701 |             let ptr = self.set_ex_data_inner(SslContext::cached_ex_index::<F>(), callback);\n 1702 |             ffi::SSL_CTX_set_client_hello_cb(\n 1703 |                 self.as_ptr(),\n 1704 |                 Some(callbacks::raw_client_hello::<F>),\n 1705 |                 ptr,\n 1706 |             );\n 1707 |         }\n 1708 |     }","lines":15},{"ref":"openssl/src/ssl/mod.rs:1594-1606","code":" 1594 |     fn set_ex_data_inner<T>(&mut self, index: Index<SslContext, T>, data: T) -> *mut c_void {\n 1595 |         match self.ex_data_mut(index) {\n 1596 |             Some(v) => {\n 1597 |                 *v = data;\n 1598 |                 (v as *mut T).cast()\n 1599 |             }\n 1600 |             _ => unsafe {\n 1601 |                 let data = Box::into_raw(Box::new(data)) as *mut c_void;\n 1602 |                 ffi::SSL_CTX_set_ex_data(self.as_ptr(), index.as_raw(), data);\n 1603 |                 data\n 1604 |             },\n 1605 |         }\n 1606 |     }","lines":13}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In SslStream::read_uninit (mod.rs lines 3720-3734), the WANT_READ error with no io_error (line 3728) causes the loop to retry immediately without yielding. On a truly non-blocking stream that returns WouldBlock from the BIO, this branch stores the WouldBlock error in state.error and returns -1 to OpenSSL, which then returns WANT_READ. Without a non-None io_error, the loop spins indefinitely at 100% CPU. This is a busy-wait loop for the non-blocking WANT_READ case where the BIO returned no error.","fix":"The loop is intentional for AUTO_RETRY emulation during TLS renegotiation. Document that this branch only fires for internal TLS-level retries (not for socket-level WouldBlock). Alternatively, distinguish the two cases and return WouldBlock to the caller when appropriate.","locations":[{"ref":"openssl/src/ssl/mod.rs:3720-3734","code":" 3720 |     pub fn read_uninit(&mut self, buf: &mut [MaybeUninit<u8>]) -> io::Result<usize> {\n 3721 |         loop {\n 3722 |             match self.ssl_read_uninit(buf) {\n 3723 |                 Ok(n) => return Ok(n),\n 3724 |                 Err(ref e) if e.code() == ErrorCode::ZERO_RETURN => return Ok(0),\n 3725 |                 Err(ref e) if e.code() == ErrorCode::SYSCALL && e.io_error().is_none() => {\n 3726 |                     return Ok(0);\n 3727 |                 }\n 3728 |                 Err(ref e) if e.code() == ErrorCode::WANT_READ && e.io_error().is_none() => {}\n 3729 |                 Err(e) => {\n 3730 |                     return Err(e.into_io_error().unwrap_or_else(io::Error::other));\n 3731 |                 }\n 3732 |             }\n 3733 |         }\n 3734 |     }","lines":15}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In main.rs, the validate_headers function's libressl version match arm for (3, 5, _) matches any LibreSSL 3.5.x patch version and maps it to ('3', '5', 'x'). However, the check-cfg declarations include specific libressl350 but cfgs.rs pushes libressl350 unconditionally (without version check). This means even a LibreSSL 3.4.x library would get libressl350 pushed, since the unconditional block always includes it. A user with LibreSSL 3.4.0 that somehow passes the minimum version check would get an incorrect cfg.","fix":"The unconditional push of libressl350 (and all earlier flags) in cfgs.rs assumes all supported LibreSSL versions are at least 3.5.0. This is enforced by version_error() in main.rs. Add a comment to cfgs.rs stating this invariant, or guard the unconditional block with an assertion.","locations":[{"ref":"openssl-sys/build/cfgs.rs:6-22","code":"    6 |         cfgs.push(\"libressl\");\n    7 | \n    8 |         cfgs.push(\"libressl251\");\n    9 |         cfgs.push(\"libress argo:rustc-check-cfg in main.rs (line 140) but is never pushed in cfgs.rs. Any code conditioned on libressl250 will be dead on all LibreSSL versions because the build script never emits this flag. The cfgs.rs unconditional block starts at libressl251.","fix":"Either add 'cfgs.push(\"libressl250\");' to the unconditional block in cfgs.rs (all supported LibreSSL versions are >= 2.5), or remove the check-cfg declaration from main.rs if the flag is intentionally retired.","locations":[{"ref":"openssl-sys/build/cfgs.rs:6-22","code":"    6 |         cfgs.push(\"libressl\");\n    7 | \n    8 |         cfgs.push(\"libressl251\");\n    9 |         cfgs.push(\"libressl252\");\n   10 |         cfgs.push(\"libressl261\");\n   11 |         cfgs.push(\"libressl270\");\n   12 |         cfgs.push(\"libressl271\");\n   13 |         cfgs.push(\"libressl273\");\n   14 |         cfgs.push(\"libressl280\");\n   15 |         cfgs.push(\"libressl281\");\n   16 |         cfgs.push(\"libressl291\");\n   17 |         cfgs.push(\"libressl310\");\n   18 |         cfgs.push(\"libressl321\");\n   19 |         cfgs.push(\"libressl332\");\n   20 |         cfgs.push(\"libressl340\");\n   21 |         cfgs.push(\"libressl350\");\n   22 | ","lines":17},{"ref":"openssl-sys/build/main.rs:140","code":"  140 |     println!(\"cargo:rustc-check-cfg=cfg(libressl250)\");","lines":1}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In find_normal.rs, try_pkg_config() calls super::postprocess(&lib.include_paths) and then immediately calls process::exit(0). postprocess() in turn calls validate_headers() and possibly run_bindgen::run(). This means the pkg-config path runs two separate postprocess() calls: one inside try_pkg_config() and the linked-path also triggers one via the normal flow, depending on whether try_pkg_config exits first. In the current code, try_pkg_config exits with 0 after calling postprocess, so the main flow's postprocess is never reached - but a future refactor could easily double-process headers.","fix":"Low risk in current code. Document that try_pkg_config exits early after postprocess so the main flow's postprocess is bypassed.","locations":[{"ref":"openssl-sys/build/find_normal.rs:233-239","code":"  233 |     super::postprocess(&lib.include_paths);\n  234 | \n  235 |     for include in lib.include_paths.iter() {\n  236 |         println!(\"cargo:include={}\", include.display());\n  237 |     }\n  238 | \n  239 |     process::exit(0);","lines":7}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In openssl-sys/build/main.rs the version range check for openssl_version emits no cargo:version=... metadata for OpenSSL 3.x or 4.x (lines 446-449). The 1.1.x branches emit 'cargo:version=111' or 'cargo:version=110', but the 3.x and 4.x branches only set the Version enum return value. Downstream crates consuming DEP_OPENSSL_VERSION may behave incorrectly if they expect a version string for all supported versions.","fix":"Add cargo:version=300 (or similar) for the Openssl3xx and Openssl4xx arms, consistent with the 1.1.x metadata.","locations":[{"ref":"openssl-sys/build/main.rs:444-449","code":"  444 |         if openssl_version >= 0x5_00_00_00_0 {\n  445 |             version_error()\n  446 |         } else if openssl_version >= 0x4_00_00_00_0 {\n  447 |             Version::Openssl4xx\n  448 |         } else if openssl_version >= 0x3_00_00_00_0 {\n  449 |             Version::Openssl3xx","lines":6}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In openssl-sys/build/main.rs, determine_mode reads directory entries via read_dir().unwrap() (line 519). If the library directory exists but is not readable (permission error), this will panic the build script with an unhelpful message instead of a user-friendly error.","fix":"Replace .unwrap() with .unwrap_or_else(|e| panic!(\"Cannot read lib dir {dir:?}: {e}\")) to produce a diagnostic that names the directory.","locations":[{"ref":"openssl-sys/build/main.rs:518-526","code":"  518 |             .read_dir()\n  519 |             .unwrap()\n  520 |             .map(|e| e.unwrap())\n  521 |             .map(|e| e.file_name())\n  522 |             .filter_map(|e| e.into_string().ok())\n  523 |         {\n  524 |             files.insert(path);\n  525 |         }\n  526 |     }","lines":9}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Asn1StringRef::to_string` (asn1.rs:472-512) has a fast path for Latin-1 types\n(`V_ASN1_NUMERICSTRING`, `V_ASN1_PRINTABLESTRING`, `V_ASN1_T61STRING`, `V_ASN1_IA5STRING`,\n`V_ASN1_VISIBLESTRING`) that returns early only when `slice.is_ascii()`. The comment says these\nare \"Latin-1 types, whose UTF-8 conversion is the identity on ASCII\". However `T61String` (Teletex)\nis not Latin-1; it uses ISO 6937 encoding which is incompatible with UTF-8 for bytes > 0x7F. The\nfast path correctly falls through to `ASN1_STRING_to_UTF8` when `!is_ascii()`, but the comment\nis inaccurate. Additionally `VISIBLESTRING` only allows 0x20-0x7E, so the is_ascii check there\nis correct, but `T61STRING` non-ASCII bytes can represent code points outside the UTF-8\nidentity range.","fix":"Remove `V_ASN1_T61STRING` from the ASCII fast path, or correct the comment to note that T61String uses ISO 6937 encoding (not Latin-1), and the code is correct because the non-ASCII branch falls through to the full conversion.","locations":[{"ref":"openssl/src/asn1.rs:483-494","code":"  483 |             ffi::V_ASN1_NUMERICSTRING\n  484 |             | ffi::V_ASN1_PRINTABLESTRING\n  485 |             | ffi::V_ASN1_T61STRING\n  486 |             | ffi::V_ASN1_IA5STRING\n  487 |             | ffi::V_ASN1_VISIBLESTRING => {\n  488 |                 let slice = self.as_slice();\n  489 |                 if slice.is_ascii() {\n  490 |                     // SAFETY: ASCII is valid UTF-8.\n  491 |                     return Ok(unsafe { str::from_utf8_unchecked(slice) }.to_owned());\n  492 |                 }\n  493 |             }\n  494 |             _ => {}","lines":12}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`decode_block` in base64.rs (lines 65-70) strips trailing padding bytes by calling `out.pop()`\nbased on whether the input ends with `'='` or `\"==\"`. This logic only checks the trimmed input\n(after `src.trim()`), which is correct. However, if the base64 string ends with whitespace after\nthe padding (e.g. `\"Zg== \"`) the whitespace is stripped first by `.trim()`, and then the padding\ncheck fires on the resulting string `\"Zg==\"`. This is the intended behavior but worth noting that\nthe implementation is order-sensitive. More importantly, `EVP_DecodeBlock` itself may strip one or\ntwo padding bytes internally and return the correct count, meaning the manual `pop()` calls could\ndouble-remove padding in some OpenSSL versions. The implementation relies on undocumented behavior\nof `EVP_DecodeBlock`.","fix":"Validate the behavior against the OpenSSL documentation for `EVP_DecodeBlock` regarding how it handles `=` padding; add a comment explaining why the manual pop is needed despite EVP_DecodeBlock reporting the count.","locations":[{"ref":"openssl/src/base64.rs:56-72","code":"   56 |     unsafe {\n   57 |         let out_len = cvt_n(ffi::EVP_DecodeBlock(\n   58 |             out.as_mut_ptr(),\n   59 |             src.as_ptr(),\n   60 |             src_len,\n   61 |         ))?;\n   62 |         out.set_len(out_len as usize);\n   63 |     }\n   64 | \n   65 |     if src.ends_with('=') {\n   66 |         out.pop();\n   67 |         if src.ends_with(\"==\") {\n   68 |             out.pop();\n   69 |         }\n   70 |     }\n   71 | \n   72 |     Ok(out)","lines":17}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`EcKeyRef::to_owned` (ec.rs:949-959) asserts `EC_KEY_up_ref` returns exactly 1, panicking otherwise.\n`EC_KEY_up_ref` returns 1 on success and 0 on failure (memory allocation failure). The assert means\nthat a failed `EC_KEY_up_ref` (out-of-memory) is a panic rather than a propagated error. While\npanicking on OOM is a common Rust behavior, the assertion `r == 1` is strictly correct, but it\ncould be replaced with `assert!(r >= 1)` or `assert!(r != 0)` since BoringSSL has historically\nreturned values > 1 for reference counts in some configurations.","fix":"Change `assert!(r == 1)` to `assert!(r != 0)` for forward compatibility with reference count reporting differences across backends.","locations":[{"ref":"openssl/src/ec.rs:949-959","code":"  949 | impl<T> ToOwned for EcKeyRef<T> {\n  950 |     type Owned = EcKey<T>;\n  951 | \n  952 |     fn to_owned(&self) -> EcKey<T> {\n  953 |         unsafe {\n  954 |             let r = ffi::EC_KEY_up_ref(self.as_ptr());\n  955 |             assert!(r == 1);\n  956 |             EcKey::from_ptr(self.as_ptr())\n  957 |         }\n  958 |     }\n  959 | }","lines":11}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In Hasher::drop(), when state is Squeeze (possible after squeeze_xof() on OpenSSL 3.3+ / AWSLC), the drop implementation calls finish() -> EVP_DigestFinal_ex. This will fail for XOF contexts in squeeze mode, pushing error(s) onto the OpenSSL error stack. The errors are silently dropped via drop(self.finish()), but they remain in the OpenSSL error stack and will be seen by the next call to ErrorStack::get() in the caller's code, potentially causing spurious error reporting.","fix":"In the drop handler, check state == Squeeze and skip the finish() call (or call EVP_MD_CTX_reset instead of EVP_DigestFinal_ex) to avoid polluting the error stack.","locations":[{"ref":"openssl/src/hash.rs:393-401","code":"  393 | impl Drop for Hasher {\n  394 |     fn drop(&mut self) {\n  395 |         unsafe {\n  396 |             if self.state != Finalized {\n  397 |                 drop(self.finish());\n  398 |             }\n  399 |             EVP_MD_CTX_free(self.ctx);\n  400 |         }\n  401 |     }","lines":9}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the connector.rs ctx() function (lines 28-58), the version check `version::number() >= 0x1_00_01_08_0` uses the literal value 0x1_00_01_08_0. The grouping is inconsistent with OpenSSL's conventional format 0xMNNFFPPS (major, minor, fix, patch, status). The literal 0x1_00_01_08_0 equals 0x100010800, which corresponds to OpenSSL 1.0.1h (fix=8, patch=0, status=0). The comment says 'pre-1.0.1h', which matches, but the digit grouping `0x1_00_01_08_0` is confusing (5 groups, last group is '0' for the status byte). This matches the actual intent but may mislead future maintainers changing the threshold.","fix":"Rewrite as `0x1_00_01_08_f` (release) or add a comment explaining the exact OpenSSL version number encoding so the intent is unambiguous.","locations":[{"ref":"openssl/src/ssl/connector.rs:51","code":"   51 |     if version::number() >= 0x1_00_01_08_0 {","lines":1}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In NameType, the from_raw constructor (mod.rs lines 570-573) is documented as constructing a NameType but its return type is StatusType. This is a copy-paste error from the StatusType struct above it. The method is dead code for NameType since it returns the wrong type.","fix":"Change the return type and returned value from StatusType to NameType: `pub fn from_raw(raw: c_int) -> NameType { NameType(raw) }`.","locations":[{"ref":"openssl/src/ssl/mod.rs:569-579","code":"  569 |     /// Constructs a `StatusType` from a raw OpenSSL value.\n  570 |     pub fn from_raw(raw: c_int) -> StatusType {\n  571 |         StatusType(raw)\n  572 |     }\n  573 | \n  574 |     /// Returns the raw OpenSSL value represented by this type.\n  575 |     #[allow(clippy::trivially_copy_pass_by_ref)]\n  576 |     pub fn as_raw(&self) -> c_int {\n  577 |         self.0\n  578 |     }\n  579 | }","lines":11}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In SslContextRef::extra_chain_certs (mod.rs lines 1886-1892), the result of SSL_CTX_get_extra_chain_certs is passed to StackRef::from_const_ptr_opt and then .expect(). If the SSL_CTX has no extra chain (a normal state before any certs are added), OpenSSL may return a null pointer, causing the expect to panic. The method is documented to return &StackRef<X509> but does not handle the null case gracefully.","fix":"Return Option<&StackRef<X509>> instead, or lazily initialize the chain within OpenSSL if it is always guaranteed non-null after context creation (verify the OpenSSL docs).","locations":[{"ref":"openssl/src/ssl/mod.rs:1886-1892","code":" 1886 |     pub fn extra_chain_certs(&self) -> &StackRef<X509> {\n 1887 |         unsafe {\n 1888 |             let mut chain = ptr::null_mut();\n 1889 |             ffi::SSL_CTX_get_extra_chain_certs(self.as_ptr(), &mut chain);\n 1890 |             StackRef::from_const_ptr_opt(chain).expect(\"extra chain certs must not be null\")\n 1891 |         }\n 1892 |     }","lines":7}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"SslStream::ssl_peek (mod.rs lines 3837-3871) does not guard against an empty buf in the ossl111/libressl path (lines 3838-3854), while the older path does check (line 3856-3858). Calling ssl_peek with an empty buffer on OpenSSL >= 1.1.1 calls SSL_peek_ex with len=0. OpenSSL may return 0 bytes read with a success code, which this code would misinterpret as success rather than returning Ok(0) consistently.","fix":"Add `if buf.is_empty() { return Ok(0); }` at the top of ssl_peek, mirroring ssl_read_uninit.","locations":[{"ref":"openssl/src/ssl/mod.rs:3837-3871","code":" 3837 |     pub fn ssl_peek(&mut self, buf: &mut [u8]) -> Result<usize, Error> {\n 3838 |         cfg_if! {\n 3839 |             if #[cfg(any(ossl111, libressl))] {\n 3840 |                 let mut readbytes = 0;\n 3841 |                 let ret = unsafe {\n 3842 |                     ffi::SSL_peek_ex(\n 3843 |                         self.ssl().as_ptr(),\n 3844 |                         buf.as_mut_ptr().cast(),\n 3845 |                         buf.len(),\n 3846 |                         &mut readbytes,\n 3847 |                     )\n 3848 |                 };\n 3849 | \n 3850 |                 if ret > 0 {\n 3851 |                     Ok(readbytes)\n 3852 |                 } else {\n 3853 |                     Err(self.make_error(ret))\n 3854 |                 }\n 3855 |             } else {\n 3856 |                 if buf.is_empty() {\n 3857 |                     return Ok(0);\n 3858 |                 }\n 3859 | \n 3860 |                 let len = usize::min(c_int::MAX as usize, buf.len()) as c_int;\n 3861 |                 let ret = unsafe {\n 3862 |                     ffi::SSL_peek(self.ssl().as_ptr(), buf.as_mut_ptr().cast(), len)\n 3863 |                 };\n 3864 |                 if ret > 0 {\n 3865 |                     Ok(ret as usize)\n 3866 |                 } else {\n 3867 |                     Err(self.make_error(ret))\n 3868 |                 }\n 3869 |             }\n 3870 |         }\n 3871 |     }","lines":35}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the server test helper (test/server.rs lines 85-97), the spawned server thread calls accept().unwrap() and ssl.accept(socket), with panics on failure. If the test client sends malformed data or the OS rejects the connection, the thread panics and the Server::drop() will join() the panicking thread and call unwrap() on the JoinHandle, re-panicking in the test thread. While this is test code and panics-on-failure is acceptable, the pattern means any server-side failure is indistinguishable from a test assertion failure, making diagnosis of test failures harder.","fix":"Use should_error=true to opt out of the unwrap on r, or propagate server-side errors to the test via a channel instead of panicking in the thread.","locations":[{"ref":"openssl/src/ssl/test/server.rs:85-97","code":"   85 |         let handle = thread::spawn(move || {\n   86 |             let socket = socket.accept().unwrap().0;\n   87 |             let mut ssl = Ssl::new(&ctx).unwrap();\n   88 |             ssl_cb(&mut ssl);\n   89 |             let r = ssl.accept(socket);\n   90 |             if should_error {\n   91 |                 r.unwrap_err();\n   92 |             } else {\n   93 |                 let mut socket = r.unwrap();\n   94 |                 socket.write_all(&[0]).unwrap();\n   95 |                 io_cb(socket);\n   96 |             }\n   97 |         });","lines":13}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"DSA_get0_pqg and DSA_set0_pqg both name the third parameter 'q' instead of 'g'. This is a copy-paste error: the generator parameter is declared with the same name as the modulus-order parameter. This does not affect the ABI (names are irrelevant in extern declarations) but it is misleading and will cause confusion when callers read the binding, potentially leading to wrong usage of the out-parameters.","fix":"Rename both occurrences of the third parameter named 'q' in DSA_get0_pqg and DSA_set0_pqg to 'g'.","locations":[{"ref":"openssl-sys/src/handwritten/dsa.rs:53-59","code":"   53 |     pub fn DSA_get0_pqg(\n   54 |         d: *const DSA,\n   55 |         p: *mut *const BIGNUM,\n   56 |         q: *mut *const BIGNUM,\n   57 |         q: *mut *const BIGNUM,\n   58 |     );\n   59 |     pub fn DSA_set0_pqg(d: *mut DSA, p: *mut BIGNUM, q: *mut BIGNUM, q: *mut BIGNUM) -> c_int;","lines":7}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In Hasher::update(), when the state is Squeeze, the function returns Err(ErrorStack::get()) but no error has been pushed onto the OpenSSL error stack at that point. ErrorStack::get() drains an empty stack, producing an error value whose Display output is just the generic message \"OpenSSL error\" with zero useful information. This makes the error undiagnosable to callers.","fix":"Replace ErrorStack::get() with ErrorStack::internal_error(\"cannot call update after squeeze\") to provide a meaningful error message.","locations":[{"ref":"openssl/src/hash.rs:291-292","code":"  291 |             let errors = ErrorStack::get();\n  292 |             return Err(errors);","lines":2}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"util::invoke_passwd_cb suppresses all errors from the user callback: when the callback returns Err(_), the function returns 0 and discards the ErrorStack with a FIXME comment (line 61). OpenSSL sees a zero-length password and either fails with a generic error or proceeds with an empty password, making the root cause invisible to the caller.","fix":"Push the ErrorStack from the Err case onto OpenSSL's thread-local error queue before returning 0, so the original error propagates through OpenSSL back to the Rust caller.","locations":[{"ref":"openssl/src/util.rs:60-62","code":"   60 |         Ok(Err(_)) => {\n   61 |             // FIXME restore error stack\n   62 |             0","lines":3}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"In rsa.rs, the return values of RSA_set0_key(), RSA_set0_factors(), and RSA_set0_crt_params() are silently ignored. These functions can fail (e.g. if n or e is NULL when required), and failure means the RSA key is left in an inconsistent state. The owned BigNum arguments are consumed by the call regardless, so ignoring failure causes both a silently invalid key and a memory ownership issue.","fix":"Wrap each RSA_set0_* call with cvt() and propagate the error. The BigNum arguments must be mem::forget()-ted before the call to transfer ownership to OpenSSL, but only after confirming success.","locations":[{"ref":"openssl/src/rsa.rs:383-384","code":"  383 |             RSA_set0_key(rsa, n.as_ptr(), e.as_ptr(), ptr::null_mut());\n  384 |             mem::forget((n, e));","lines":2},{"ref":"openssl/src/rsa.rs:443-444","code":"  443 |             RSA_set0_key(rsa, n.as_ptr(), e.as_ptr(), d.as_ptr());\n  444 |             mem::forget((n, e, d));","lines":2},{"ref":"openssl/src/rsa.rs:458-459","code":"  458 |             RSA_set0_factors(self.rsa.as_ptr(), p.as_ptr(), q.as_ptr());\n  459 |             mem::forget((p, q));","lines":2},{"ref":"openssl/src/rsa.rs:477-483","code":"  477 |             RSA_set0_crt_params(\n  478 |                 self.rsa.as_ptr(),\n  479 |                 dmp1.as_ptr(),\n  480 |                 dmq1.as_ptr(),\n  481 |                 iqmp.as_ptr(),\n  482 |             );\n  483 |             mem::forget((dmp1, dmq1, iqmp));","lines":7}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"string::OpensslStringRef::deref() calls str::from_utf8_unchecked() on bytes from an OpenSSL C string (lines 51-54). OpenSSL does not guarantee that OPENSSL_STRING values are valid UTF-8 - they may be arbitrary byte strings or locale-encoded text. Returning a &str backed by non-UTF-8 bytes is instant undefined behaviour in Rust. In practice OCSP URLs and certificate fields may contain non-ASCII bytes.","fix":"Either return &[u8] / CStr instead of &str, or call str::from_utf8() and convert the Deref target to an error type. Alternatively, validate UTF-8 on construction and only store strings that pass validation.","locations":[{"ref":"openssl/src/string.rs:51-54","code":"   51 |         unsafe {\n   52 |             let slice = CStr::from_ptr(self.as_ptr()).to_bytes();\n   53 |             str::from_utf8_unchecked(slice)\n   54 |         }","lines":4}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In openssl-errors/src/lib.rs, the Cow::Borrowed branch (line 175) casts a &str pointer to *mut c_char and passes it to ERR_set_error_data without the ERR_TXT_MALLOCED flag. ERR_set_error_data stores this pointer; on some OpenSSL builds (pre-3.0) it may attempt to free the data when the error is cleared if it incorrectly infers ownership, though the flag is supposed to prevent this. More concretely, the cast to *mut c_char creates a mutable pointer into static read-only memory (string literals). If OpenSSL ever modifies the buffer through this pointer (e.g., to NUL-terminate at a different offset), this is undefined behaviour. The Owned branch correctly allocates via CRYPTO_malloc, but the Borrowed branch bypasses that.","fix":"For the Borrowed case, also copy the string into CRYPTO_malloc-allocated memory and set ERR_TXT_MALLOCED, the same as the Owned branch. This avoids the mutable-pointer-to-read-only-memory UB and the ownership ambiguity.","locations":[{"ref":"openssl-errors/src/lib.rs:174-176","code":"  174 |     let data = match message {\n  175 |         Some(Cow::Borrowed(s)) => Some((s.as_ptr() as *const c_char as *mut c_char, 0)),\n  176 |         Some(Cow::Owned(s)) => {","lines":3}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In openssl-errors/src/lib.rs, the CRYPTO_malloc call (line 177) passes s.len() bytes, which includes the NUL terminator appended by the put_error! macro (concat!($message, \"\\0\")). However, ptr::copy_nonoverlapping then copies s.len() bytes (line 185), which also copies the NUL. This is correct for the NUL-terminated string OpenSSL expects, but the allocation size does not leave room for any extra OpenSSL-internal NUL-padding. If CRYPTO_malloc returns exactly s.len() bytes and OpenSSL internally tries to NUL-terminate past the end, it would write one byte out-of-bounds. In practice OpenSSL relies on the caller providing a NUL-terminated buffer already, so this is safe today, but the relationship between the allocated size and the string length (including the appended NUL) should be documented.","fix":"This is low-risk given current OpenSSL behaviour, but add a comment explaining that s already contains the NUL terminator and the allocation is sized accordingly.","locations":[{"ref":"openssl-errors/src/lib.rs:177-186","code":"  177 |             let ptr = openssl_sys::CRYPTO_malloc(\n  178 |                 s.len() as _,\n  179 |                 concat!(file!(), \"\\0\").as_ptr() as *const c_char,\n  180 |                 line!() as c_int,\n  181 |             ) as *mut c_char;\n  182 |             if ptr.is_null() {\n  183 |                 None\n  184 |             } else {\n  185 |                 ptr::copy_nonoverlapping(s.as_ptr(), ptr as *mut u8, s.len());\n  186 |                 Some((ptr, openssl_sys::ERR_TXT_MALLOCED))","lines":10}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In openssl-errors/src/lib.rs, the static mut STRINGS array (in both the ossl300 and pre-ossl300 macro branches) is accessed inside a Once::call_once closure, which provides exclusion only for the first initialisation. After INIT.call_once completes, subsequent calls to Library::id() read LIB_NUM from a static mut without any synchronisation. In Rust, reads of static mut are unsafe and the compiler does not guarantee visibility across threads without proper synchronisation. If two threads call Library::id() after it has been initialised, both threads read LIB_NUM without a happens-before guarantee established by the Once.","fix":"Use an AtomicI32 for LIB_NUM instead of a plain static mut c_int. Once::call_once already provides the write barrier for the first initialisation; subsequent loads need a relaxed or acquire atomic load.","locations":[{"ref":"openssl-errors/src/lib.rs:278-286","code":"  278 |                 unsafe {\n  279 |                     INIT.call_once(|| {\n  280 |                         $crate::export::init();\n  281 |                         LIB_NUM = $crate::export::ERR_get_next_error_library();\n  282 |                         STRINGS[0].error = $crate::export::ERR_PACK(LIB_NUM, 0, 0);\n  283 |                         $crate::export::ERR_load_strings(LIB_NUM, STRINGS.as_mut_ptr());\n  284 |                     });\n  285 | \n  286 |                     LIB_NUM","lines":9}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In openssl-errors/src/lib.rs, the @strings macro helper initialises STRINGS[0].error to 0 inside call_once, then immediately calls ERR_load_strings. The ERR_STRING_DATA sentinel entry (error=0, string=null) is the last element of the array - this is correct. However, STRINGS[0].error is set to ERR_PACK(LIB_NUM, 0, 0) inside call_once, overwriting the compile-time zero initialiser. For the pre-3.0 branch, the zeroth entry describes the library name. This is correct per the OpenSSL ERR_load_strings API. No bug, but the compile-time initialization to 0 for STRINGS[0].error is misleading - the actual library error code is patched at runtime.","fix":"No code change required; add a comment explaining that STRINGS[0].error is intentionally zero at compile time and is patched to ERR_PACK(LIB_NUM,0,0) during the first call to id().","locations":[{"ref":"openssl-errors/src/lib.rs:279-283","code":"  279 |                     INIT.call_once(|| {\n  280 |                         $crate::export::init();\n  281 |                         LIB_NUM = $crate::export::ERR_get_next_error_library();\n  282 |                         STRINGS[0].error = $crate::export::ERR_PACK(LIB_NUM, 0, 0);\n  283 |                         $crate::export::ERR_load_strings(LIB_NUM, STRINGS.as_mut_ptr());","lines":5}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In find_normal.rs line 216, env::set_var(\"PKG_CONFIG_ALLOW_CROSS\", \"1\") is called inside the build script. Mutating the environment with set_var is unsound in a multi-threaded context (Rust's standard library is not guaranteed to be safe here) and is deprecated in Rust 1.81+. This is a build script, which is single-threaded by default, so in practice it is safe, but using set_var on a process-global variable is fragile.","fix":"Pass the environment variable to the pkg-config Command directly via .env(\"PKG_CONFIG_ALLOW_CROSS\", \"1\") instead of setting the process-wide environment.","locations":[{"ref":"openssl-sys/build/find_normal.rs:215-216","code":"  215 |     if target.contains(\"windows-gnu\") && host.contains(\"windows\") {\n  216 |         env::set_var(\"PKG_CONFIG_ALLOW_CROSS\", \"1\");","lines":2}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"The EVP_MAC_get_params binding (handwritten/evp.rs line 859) takes 'mac: *mut EVP_MAC' but the OpenSSL prototype takes 'const EVP_MAC *mac' - it is a read-only inspector. This forces callers to cast away const unnecessarily.","fix":"Change 'mac: *mut EVP_MAC' to 'mac: *const EVP_MAC'.","locations":[{"ref":"openssl-sys/src/handwritten/evp.rs:859","code":"  859 |             pub fn EVP_MAC_get_params(mac: *mut EVP_MAC, params: *mut OSSL_PARAM) -> c_int;","lines":1}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"The EVP_MAC_CTX_get0_mac binding (handwritten/evp.rs line 864) takes ctx as *mut EVP_MAC_CTX, but the actual OpenSSL 3.0 prototype uses 'const EVP_MAC_CTX *ctx'. The function is a read-only getter; forcing a mutable pointer is incorrect and prevents passing a const context.","fix":"Change 'ctx: *mut EVP_MAC_CTX' to 'ctx: *const EVP_MAC_CTX' to match the OpenSSL prototype.","locations":[{"ref":"openssl-sys/src/handwritten/evp.rs:864","code":"  864 |             pub fn EVP_MAC_CTX_get0_mac(ctx: *mut EVP_MAC_CTX) -> *mut EVP_MAC;","lines":1}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Several EVP_MAC_CTX query functions (EVP_MAC_CTX_get_mac_size, EVP_MAC_CTX_get_block_size, EVP_MAC_CTX_get_params, EVP_MAC_CTX_set_params, EVP_MAC_CTX_gettable_params, EVP_MAC_CTX_settable_params) take *mut EVP_MAC_CTX where the OpenSSL 3.0 API actually takes *mut for the mutating ones and *const for the read-only accessors. Specifically EVP_MAC_CTX_get_mac_size, EVP_MAC_CTX_get_block_size, EVP_MAC_CTX_gettable_params, and EVP_MAC_CTX_settable_params all use const ctx in OpenSSL headers.","fix":"Change the ctx parameter of the read-only getters (get_mac_size, get_block_size, gettable_params, settable_params) to *const EVP_MAC_CTX.","locations":[{"ref":"openssl-sys/src/handwritten/evp.rs:868-880","code":"  868 |             pub fn EVP_MAC_CTX_get_mac_size(ctx: *mut EVP_MAC_CTX) -> size_t;\n  869 |             pub fn EVP_MAC_CTX_get_block_size(ctx: *mut EVP_MAC_CTX) -> size_t;\n  870 | \n  871 |             pub fn EVP_MAC_init(ctx: *mut EVP_MAC_CTX, key: *const c_uchar, keylen: size_t, params: *const OSSL_PARAM) -> c_int;\n  872 |             pub fn EVP_MAC_update(ctx: *mut EVP_MAC_CTX, data: *const c_uchar, datalen: size_t) -> c_int;\n  873 |             pub fn EVP_MAC_final(ctx: *mut EVP_MAC_CTX, out: *mut c_uchar, outl: *mut size_t, outsize: size_t) -> c_int;\n  874 |             pub fn EVP_MAC_finalXOF(ctx: *mut EVP_MAC_CTX, out: *mut c_uchar, outsize: size_t) -> c_int;\n  875 | \n  876 |             pub fn EVP_MAC_gettable_params(mac: *const EVP_MAC) -> *const OSSL_PARAM;\n  877 |             pub fn EVP_MAC_gettable_ctx_params(mac: *const EVP_MAC) -> *const OSSL_PARAM;\n  878 |             pub fn EVP_MAC_settable_ctx_params(mac: *const EVP_MAC) -> *const OSSL_PARAM;\n  879 |             pub fn EVP_MAC_CTX_gettable_params(ctx: *mut EVP_MAC_CTX) -> *const OSSL_PARAM;\n  880 |             pub fn EVP_MAC_CTX_settable_params(ctx: *mut EVP_MAC_CTX) -> *const OSSL_PARAM;","lines":13}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"The HMAC_CTX_copy binding (handwritten/hmac.rs line 23) takes src as *mut HMAC_CTX. The actual OpenSSL prototype for HMAC_CTX_copy is 'int HMAC_CTX_copy(HMAC_CTX *dctx, const HMAC_CTX *sctx)', where the source context is const. Passing a *mut when a *const would be correct is overly permissive and forces callers to drop const incorrectly.","fix":"Change 'src: *mut HMAC_CTX' to 'src: *const HMAC_CTX' to match the actual C signature.","locations":[{"ref":"openssl-sys/src/handwritten/hmac.rs:23","code":"   23 |     pub fn HMAC_CTX_copy(dst: *mut HMAC_CTX, src: *mut HMAC_CTX) -> c_int;","lines":1}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In openssl-sys/src/lib.rs, the openssl::init() function for ossl110 calls OPENSSL_init_ssl which returns c_int indicating success or failure, but the return value is silently ignored (line 183). A failure from OPENSSL_init_ssl means OpenSSL is not initialised; all subsequent operations will fail in unpredictable ways. The return value should be checked and the function should panic or propagate an error.","fix":"Check the return value: assert!(OPENSSL_init_ssl(init_options, ptr::null_mut()) == 1, \"OPENSSL_init_ssl failed\");","locations":[{"ref":"openssl-sys/src/lib.rs:182-184","code":"  182 |         INIT.call_once(|| unsafe {\n  183 |             OPENSSL_init_ssl(init_options, ptr::null_mut());\n  184 |         })","lines":3}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Asn1ObjectRef::fmt` (asn1.rs:795-825) builds a fixed 80-byte stack buffer for `OBJ_obj2txt`,\nthen on overflow constructs a truncated `String` by calling `s.to_owned() + \"...\"` which creates\na temporary owned String and concatenates. This is a minor but unnecessary allocation in the\nDisplay path. The `clamped` path (lines 815-818) could instead use `write!(f, \"{}...\", s)`.","fix":"Replace `fmt.write_str(&(s.to_owned() + \"...\"))` with `write!(f, \"{}...\", s)?`.","locations":[{"ref":"openssl/src/asn1.rs:795-825","code":"  795 |     fn fmt(&self, fmt: &mut fmt::Formatter<'_>) -> fmt::Result {\n  796 |         unsafe {\n  797 |             let mut buf = [0; 80];\n  798 |             let mut clamped = false;\n  799 |             let mut len = ffi::OBJ_obj2txt(\n  800 |                 buf.as_mut_ptr() as *mut _,\n  801 |                 buf.len() as c_int,\n  802 |                 self.as_ptr(),\n  803 |                 0,\n  804 |             );\n  805 |             if len <= 0 {\n  806 |                 return fmt.write_str(\"OBJ_obj2txt error\");\n  807 |             }\n  808 |             if len > buf.len() as i32 {\n  809 |                 // omit trailing NUL\n  810 |                 len = (buf.len() - 1) as i32;\n  811 |                 clamped = true;\n  812 |             }\n  813 |             match str::from_utf8(&buf[..len as usize]) {\n  814 |                 Err(_) => fmt.write_str(\"error\"),\n  815 |                 Ok(s) => {\n  816 |                     if clamped {\n  817 |                         fmt.write_str(&(s.to_owned() + \"...\"))\n  818 |                     } else {\n  819 |                         fmt.write_str(s)\n  820 |                     }\n  821 |                 }\n  822 |             }\n  823 |         }\n  824 |     }\n  825 | }","lines":31}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`BigNum` arithmetic operators (`Add`, `Sub`, `Mul`, `Div`, `Rem` - bn.rs lines 1280-1341)\neach allocate a fresh `BigNumContext` via `BigNumContext::new().unwrap()` on every single\narithmetic operation (for Mul, Div, Rem). The context is a temporary storage pool meant to be\nreused across operations. Allocating a new context for every `*`, `/`, or `%` operation on\nBigNums (especially in hot loops) results in significant unnecessary heap allocation churn.","fix":"Document the performance implication and suggest users prefer the `checked_mul`/`checked_div`/`checked_rem` methods with a shared `BigNumContext`. Alternatively, use a thread-local `BigNumContext` in the operator implementations.","locations":[{"ref":"openssl/src/bn.rs:1304-1341","code":" 1304 | impl Mul<&BigNumRef> for &BigNumRef {\n 1305 |     type Output = BigNum;\n 1306 | \n 1307 |     fn mul(self, oth: &BigNumRef) -> BigNum {\n 1308 |         let mut ctx = BigNumContext::new().unwrap();\n 1309 |         let mut r = BigNum::new().unwrap();\n 1310 |         r.checked_mul(self, oth, &mut ctx).unwrap();\n 1311 |         r\n 1312 |     }\n 1313 | }\n 1314 | \n 1315 | delegate!(Mul, mul);\n 1316 | \n 1317 | impl<'b> Div<&'b BigNumRef> for &BigNumRef {\n 1318 |     type Output = BigNum;\n 1319 | \n 1320 |     fn div(self, oth: &'b BigNumRef) -> BigNum {\n 1321 |         let mut ctx = BigNumContext::new().unwrap();\n 1322 |         let mut r = BigNum::new().unwrap();\n 1323 |         r.checked_div(self, oth, &mut ctx).unwrap();\n 1324 |         r\n 1325 |     }\n 1326 | }\n 1327 | \n 1328 | delegate!(Div, div);\n 1329 | \n 1330 | impl<'b> Rem<&'b BigNumRef> for &BigNumRef {\n 1331 |     type Output = BigNum;\n 1332 | \n 1333 |     fn rem(self, oth: &'b BigNumRef) -> BigNum {\n 1334 |         let mut ctx = BigNumContext::new().unwrap();\n 1335 |         let mut r = BigNum::new().unwrap();\n 1336 |         r.checked_rem(self, oth, &mut ctx).unwrap();\n 1337 |         r\n 1338 |     }\n 1339 | }\n 1340 | \n 1341 | delegate!(Rem, rem);","lines":38}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The INDEXES and SSL_INDEXES global hashmaps (mod.rs lines 581-584) use a Mutex<HashMap<TypeId, c_int>>. Each call to SslContext::cached_ex_index or Ssl::cached_ex_index acquires this lock, even after the index has been allocated. In high-throughput server scenarios where many SSL objects are created per second, this lock becomes a contention point. The index per type is set once and never changes, making it a natural fit for a lock-free structure.","fix":"Consider using a DashMap or a per-type OnceLock via type-indexed storage to avoid global mutex contention on the hot SSL creation path.","locations":[{"ref":"openssl/src/ssl/mod.rs:581-584","code":"  581 | static INDEXES: LazyLock<Mutex<HashMap<TypeId, c_int>>> =\n  582 |     LazyLock::new(|| Mutex::new(HashMap::new()));\n  583 | static SSL_INDEXES: LazyLock<Mutex<HashMap<TypeId, c_int>>> =\n  584 |     LazyLock::new(|| Mutex::new(HashMap::new()));","lines":4},{"ref":"openssl/src/ssl/mod.rs:1838-1850","code":" 1838 |     fn cached_ex_index<T>() -> Index<SslContext, T>\n 1839 |     where\n 1840 |         T: 'static + Sync + Send,\n 1841 |     {\n 1842 |         unsafe {\n 1843 |             let idx = *INDEXES\n 1844 |                 .lock()\n 1845 |                 .unwrap_or_else(|e| e.into_inner())\n 1846 |                 .entry(TypeId::of::<T>())\n 1847 |                 .or_insert_with(|| SslContext::new_ex_index::<T>().unwrap().as_raw());\n 1848 |             Index::from_raw(idx)\n 1849 |         }\n 1850 |     }","lines":13},{"ref":"openssl/src/ssl/mod.rs:2311-2323","code":" 2311 |     fn cached_ex_index<T>() -> Index<Ssl, T>\n 2312 |     where\n 2313 |         T: 'static + Sync + Send,\n 2314 |     {\n 2315 |         unsafe {\n 2316 |             let idx = *SSL_INDEXES\n 2317 |                 .lock()\n 2318 |                 .unwrap_or_else(|e| e.into_inner())\n 2319 | FIXME comment.","locations":[{"ref":"openssl-sys/src/handwritten/types.rs:29","code":"   29 | pub enum bio_st {} // FIXME remove","lines":1}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The `#[corresponds]` attribute on `BigNumRef::checked_rem` (bn.rs:492-509) says\n`#[corresponds(BN_div)]`. While `BN_div` is the underlying function, the #[corresponds] convention\nin this codebase is to reference the most semantically appropriate function. More critically the\ndoc comment says \"Places the result of `a % b` in `self`\" and the `#[corresponds(BN_div)]` tag is\nshared with `checked_div` (which also has `#[corresponds(BN_div)]`) and `div_rem`, creating\nconfusion. There is no `BN_mod` function but `BN_nnmod` is the dedicated modulus function; or at\nminimum `BN_div` should not be repeated for three different functions.","fix":"Use `#[corresponds(BN_div)]` on `div_rem` only and note in comments for `checked_div`/`checked_rem` that they are derived from `BN_div`.","locations":[{"ref":"openssl/src/bn.rs:492-509","code":"  492 |     #[corresponds(BN_div)]\n  493 |     pub fn checked_rem(\n  494 |         &mut self,\n  495 |         a: &BigNumRef,\n  496 |         b: &BigNumRef,\n  497 |         ctx: &mut BigNumContextRef,\n  498 |     ) -> Result<(), ErrorStack> {\n  499 |         unsafe {\n  500 |             cvt(ffi::BN_div(\n  501 |                 ptr::null_mut(),\n  502 |                 self.as_ptr(),\n  503 |                 a.as_ptr(),\n  504 |                 b.as_ptr(),\n  505 |                 ctx.as_ptr(),\n  506 |             ))\n  507 |             .map(|_| ())\n  508 |         }\n  509 |     }","lines":18}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `BigNum::get_rfc3526_prime_6144` (bn.rs:1055-1062) has `#[corresponds(BN_get_rfc3526_prime_6114)]` -\nnote the typo \"6114\" instead of \"6144\" in the   <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
  <button class="action-btn" data-action="download-md">&#11015; MD</button>
  <button class="action-btn" data-action="download-md-short">&#11015; MD Short</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: 'text/markdown'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
