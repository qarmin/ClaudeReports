<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In onBackPressedCompat the else-if branch force-casts currentFragment with `(currentFragment as ItemsFragment)`. currentFragment comes from getCurrentFragment() which returns a nullable MyViewPagerFragment<*>? (it can be null when fragments are not yet attached or the page index is out of range). If it is null this throws NullPointerException; if it is some other non-Items/non-Recents/non-Storage fragment it throws ClassCastException. The earlier branches only rule out Recents/Storage, not null.","fix":"Guard for null first (e.g. `val currentFragment = getCurrentFragment() ?: return false`) and use a safe cast `(currentFragment as? ItemsFragment)?.let { ... }` before calling getBreadcrumbs().","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/activities/MainActivity.kt:164-189","code":"  164 |     override fun onBackPressedCompat(): Boolean {\n  165 |         val currentFragment = getCurrentFragment()\n  166 |         if (binding.mainMenu.isSearchOpen) {\n  167 |             binding.mainMenu.closeSearch()\n  168 |             return true\n  169 |         } else if (currentFragment is RecentsFragment || currentFragment is StorageFragment) {\n  170 |             return false\n  171 |         } else if ((currentFragment as ItemsFragment).getBreadcrumbs().getItemCount() <= 1) {\n  172 |             if (!wasBackJustPressed && config.pressBackTwice) {\n  173 |                 wasBackJustPressed = true\n  174 |                 toast(R.string.press_back_again)\n  175 |                 Handler().postDelayed({\n  176 |                     wasBackJustPressed = false\n  177 |                 }, BACK_PRESS_TIMEOUT.toLong())\n  178 |                 return true\n  179 |             } else {\n  180 |                 appLockManager.lock()\n  181 |                 finish()\n  182 |                 return true\n  183 |             }\n  184 |         } else {\n  185 |             currentFragment.getBreadcrumbs().removeBreadcrumb()\n  186 |             openPath(currentFragment.getBreadcrumbs().getLastItem().path)\n  187 |             return true\n  188 |         }\n  189 |     }","lines":26}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"tryDecompressingPaths calls fileDirItems.first() to compute destinationPath. If the zip stream yields no entries (empty or unreadable archive whose nextEntry is null on first call), fileDirItems is empty and first() throws NoSuchElementException, which is not caught by the ZipException/Exception handlers because it occurs after they would apply only to stream reads (actually it is inside the try, but it still aborts that archive silently).","fix":"Guard for empty fileDirItems (return/continue or use firstOrNull) before calling first()/getParentPath().","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/ItemsAdapter.kt:677-694","code":"  677 |                     var entry = zipInputStream.nextEntry\n  678 |                     while (entry != null) {\n  679 |                         val currPath = if (entry.isDirectory) {\n  680 |                             path\n  681 |                         } else {\n  682 |                             \"${path.getParentPath().trimEnd('/')}/${entry.fileName}\"\n  683 |                         }\n  684 |                         val fileDirItem = FileDirItem(\n  685 |                             path = currPath,\n  686 |                             name = entry.fileName,\n  687 |                             isDirectory = entry.isDirectory,\n  688 |                             children = 0,\n  689 |                             size = entry.uncompressedSize\n  690 |                         )\n  691 |                         fileDirItems.add(fileDirItem)\n  692 |                         entry = zipInputStream.nextEntry\n  693 |                     }\n  694 |                     val destinationPath = fileDirItems.first().getParentPath().trimEnd('/')","lines":18}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"compressPaths iterates 'for (file in mainFile.listFiles())' without null-checking. File.listFiles() returns null if the path is not a directory or an I/O error / permission denial occurs, causing a NullPointerException during compression of an otherwise-valid selection.","fix":"Use mainFile.listFiles().orEmpty() (or null-check) before iterating.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/ItemsAdapter.kt:872-873","code":"  872 |                             val mainFile = File(mainFilePath)\n  873 |                             for (file in mainFile.listFiles()) {","lines":2}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"RecentsFragment.setupLayoutManager casts a possibly-null value to a non-null ArrayList. When binding.recentsList.adapter is null (no adapter yet), the safe-call chain yields null, and 'null as ArrayList<ListItem>' throws a NullPointerException (kotlin.TypeCastException). setupLayoutManager is reachable from refreshFragment before any adapter is attached.","fix":"Use a null-safe default: val oldItems = (binding.recentsList.adapter as? ItemsAdapter)?.listItems?.let { ArrayList(it) } ?: ArrayList().","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/RecentsFragment.kt:113","code":"  113 |         val oldItems = (binding.recentsList.adapter as? ItemsAdapter)?.listItems?.toMutableList() as ArrayList<ListItem>","lines":1}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"StorageFragment.refreshFragment loads allDeviceListItems on a background thread but immediately (synchronously, on the same UI thread call) invokes setupLayoutManager() -> addItems(), which builds the adapter with an empty ArrayList. The background result is never pushed into the adapter, so the search list is effectively always empty until a search filters allDeviceListItems. The load and the adapter setup are not ordered, making the displayed data stale/empty.","fix":"Move setupLayoutManager()/adapter population inside the ensureBackgroundThread completion via runOnUiThread after allDeviceListItems is assigned, e.g. update the adapter with allDeviceListItems once loaded.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/StorageFragment.kt:486-492","code":"  486 |     override fun refreshFragment() {\n  487 |         ensureBackgroundThread {\n  488 |             val fileDirItems = volumes.keys.map { getAllFiles(it) }.flatten()\n  489 |             allDeviceListItems = getListItemsFromFileDirItems(ArrayList(fileDirItems))\n  490 |         }\n  491 |         setupLayoutManager()\n  492 |     }","lines":7}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"getChildrenCount and getFileSizes correlate command output to files purely by index (lines[index]). The number of output lines is not guaranteed to equal the number of directories/files: `wc -l` errors, empty stat output, multi-line stat output, or any path that broke the command shift the lines, and `lines[index]` then throws IndexOutOfBoundsException (crash). The whole `cmd` is also one giant concatenated command, so a single failing entry desynchronizes all subsequent indices.","fix":"Guard with lines.getOrNull(index), or run/parse per-file commands with a stable key (echo a separator and the path with each result) instead of relying on positional alignment.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/helpers/RootHelpers.kt:102-108","code":"  102 |             override fun commandCompleted(id: Int, exitcode: Int) {\n  103 |                 files.filter { it.isDirectory }.forEachIndexed { index, fileDirItem ->\n  104 |                     val childrenCount = lines[index]\n  105 |                     if (childrenCount.areDigitsOnly()) {\n  106 |                         fileDirItem.children = childrenCount.toInt()\n  107 |                     }\n  108 |                 }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/filemanager/helpers/RootHelpers.kt:135-147","code":"  135 |             override fun commandCompleted(id: Int, exitcode: Int) {\n  136 |                 files.filter { !it.isDirectory }.forEachIndexed { index, fileDirItem ->\n  137 |                     var line = lines[index]\n  138 |                     if (line.isNotEmpty() && line != \"0\") {\n  139 |                         if (line.length >= fileDirItem.path.length) {\n  140 |                             line = line.substring(fileDirItem.path.length).trim()\n  141 |                             val size = line.split(\" \")[0]\n  142 |                             if (size.areDigitsOnly()) {\n  143 |                                 fileDirItem.size = size.toLong()\n  144 |                             }\n  145 |                         }\n  146 |                     }\n  147 |                 }","lines":13}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"tryMountAsRW parses `mount` output via line.split(\" \") and unconditionally accesses words[2] and words[5]. Real mount output format varies by device/kernel and uses multiple spaces / tabs; a line with fewer than 6 tokens throws IndexOutOfBoundsException, crashing any root create/delete/copy operation.","fix":"Use a whitespace regex split and bounds-check token count (skip lines with size < 6) before indexing.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/helpers/RootHelpers.kt:209-218","code":"  209 |                 for (line in mountPoints) {\n  210 |                     val words = line.split(\" \").filter { it.isNotEmpty() }\n  211 | \n  212 |                     if (path.contains(words[2])) {\n  213 |                         if (words[2].length > mountPoint.length) {\n  214 |                             mountPoint = words[2]\n  215 |                             types = words[5]\n  216 |                         }\n  217 |                     }\n  218 |                 }","lines":10}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"openPath assigns `newPath = file.parent` where File.parent is a platform (nullable) String. For a path whose parent is null (e.g. a filesystem root), newPath becomes null and is later passed to getItemsFragment()?.openPath(newPath, ...), risking a NullPointerException at the use site since newPath is declared as non-null String.","fix":"Use `newPath = file.parent ?: internalStoragePath` (or fall back to the original path) so newPath can never be null.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/activities/MainActivity.kt:459-471","code":"  459 |     private fun openPath(path: String, forceRefresh: Boolean = false) {\n  460 |         var newPath = path\n  461 |         val file = File(path)\n  462 |         if (config.OTGPath.isNotEmpty() && config.OTGPath == path.trimEnd('/')) {\n  463 |             newPath = path\n  464 |         } else if (file.exists() && !file.isDirectory) {\n  465 |             newPath = file.parent\n  466 |         } else if (!file.exists() && !isPathOnOTG(newPath)) {\n  467 |             newPath = internalStoragePath\n  468 |         }\n  469 | \n  470 |         getItemsFragment()?.openPath(newPath, forceRefresh)\n  471 |     }","lines":13}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"copyMoveTo does 'val firstFile = files[0]' with no emptiness check. If getSelectedFileDirItems() returns an empty list (e.g. selection keys reference items no longer in listItems after a refresh), this throws IndexOutOfBoundsException. Other call sites use getFirstSelectedItemPath()/first() with the same risk, but here it is a direct index access.","fix":"Return early if files.isEmpty(), or use files.firstOrNull() and bail out.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/ItemsAdapter.kt:509-512","code":"  509 |     private fun copyMoveTo(isCopyOperation: Boolean) {\n  510 |         val files = getSelectedFileDirItems()\n  511 |         val firstFile = files[0]\n  512 |         val source = firstFile.getParentPath()","lines":4}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ItemsFragment.openPath calls getScrollState()!! which force-unwraps RecyclerView.LayoutManager.onSaveInstanceState(). That can return null, and the cast in getRecyclerLayoutManager() also assumes the layoutManager is a MyGridLayoutManager. If onSaveInstanceState returns null (e.g. before layout), this NPEs and crashes navigation.","fix":"Only store the scroll state when non-null: getScrollState()?.let { scrollStates[currentPath] = it }.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/ItemsFragment.kt:112","code":"  112 |         scrollStates[currentPath] = getScrollState()!!","lines":1}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"StorageFragment.getSizes force-unwraps every map lookup result (filesSize[IMAGES]!! etc.) and volumes[volumeName]!!. getSizes runs on a background thread for a volumeName that came from MediaStore volume enumeration; if that volumeName is not present in the 'volumes' UI map (volume set built from getAllVolumeNames can differ from MediaStore volume names), volumes[volumeName]!! throws NPE on the main thread inside post{}.","fix":"Use volumes[volumeName]?.apply { ... } and getOrDefault(key, 0L) for the size map lookups.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/StorageFragment.kt:208-216","code":"  208 |             val fileSizeImages = filesSize[IMAGES]!!\n  209 | rent\n  354 |                             }\n  355 | \n  356 |                             if (!it.isDirectory) {\n  357 |                                 listItems.add(it)\n  358 |                             }\n  359 |                         }","lines":20}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Mount-point matching uses `path.contains(words[2])`, a plain substring test, instead of a prefix/ancestor check. A mount point like \"/data\" would also match an unrelated path \"/system/data-x\" via contains semantics, potentially selecting the wrong mount point to remount rw.","fix":"Match by path ancestry, e.g. path == mountPoint || path.startsWith(\"$mountPoint/\"), and pick the longest matching prefix.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/helpers/RootHelpers.kt:209-218","code":"  209 |                 for (line in mountPoints) {\n  210 |                     val words = line.split(\" \").filter { it.isNotEmpty() }\n  211 | \n  212 |                     if (path.contains(words[2])) {\n  213 |                         if (words[2].length > mountPoint.length) {\n  214 |                             mountPoint = words[2]\n  215 |                             types = words[5]\n  216 |                         }\n  217 |                     }\n  218 |                 }","lines":10}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"currentColumnCount is captured but RadioGroupDialog is initialized with config.fileColumnCnt re-read, and the comparison uses the captured currentColumnCount. This is fine, but increaseColumnCount/reduceColumnCount never clamp: reduceColumnCount can drive config.fileColumnCnt to 0 or negative when called outside the zoom guard, and increaseColumnCount can exceed MAX_COLUMN_COUNT. Only the zoom-listener callers guard the bounds; the public functions themselves do not, so any other caller c uestCode = if (shouldExitAfterSaving) {\n  189 |                         SELECT_SAVE_FILE_AND_EXIT_INTENT\n  190 |                     } else {\n  191 |                         SELECT_SAVE_FILE_INTENT\n  192 |                     }\n  193 |                     @Suppress(\"DEPRECATION\")\n  194 |                     startActivityForResult(this, requestCode)\n  195 |                 }\n  196 |             }\n  197 |         } else {\n  198 |             SaveAsDialog(this, filePath, false) { path, _ ->\n  199 |                 if (hasStoragePermission()) {\n  200 |                     val file = File(path)\n  201 |                     getFileOutputStream(file.toFileDirItem(this), true) {\n  202 |                         val shouldOverwriteOriginalText = path == filePath\n  203 |                         saveTextContent(it, shouldExitAfterSaving, shouldOverwriteOriginalText)\n  204 |                     }\n  205 |                 } else {\n  206 |                     toast(R.string.no_storage_permissions)\n  207 |                 }\n  208 |             }\n  209 |         }","lines":32}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"getConflictResolution treats a single mapping with an empty-string key as 'apply to all'. If conflictResolutions legitimately contains more than one entry but also an empty-string key, the 'apply to all' shortcut is skipped and only exact-path matches are honored; the special-case relies on size==1 which is brittle if the conflict dialog ever stores both a global choice and per-file choices.","fix":"Prefer checking for the empty-string 'apply to all' key first regardless of map size, then fall back to per-path lookup.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/ItemsAdapter.kt:800-811","code":"  800 |     private fun getConflictResolution(\n  801 |         conflictResolutions: LinkedHashMap<String, Int>,\n  802 |         path: String\n  803 |     ): utePath, file.isDirectory) }) {\n  230 |                     items.add(listItem)\n  231 |                 }\n  232 |             }\n  233 |         }","lines":10}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ItemsFragment.columnCountChanged and RecentsFragment.columnCountChanged call notifyItemRangeChanged(0, listItems.size) directly. After a span-count change the visual layout changes but item count is unchanged; notifyItemRangeChanged does not relayout spans for a grid reliably and is the wrong notification for a layout/span change, potentially leaving stale item sizing.","fix":"Call requestLayout()/notifyDataSetChanged() after changing spanCount, or rebind via the adapter's intended refresh path.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/ItemsFragment.kt:505-511","code":"  505 |     override fun columnCountChanged() {\n  506 |         (binding.itemsList.layoutManager as MyGridLayoutManager).spanCount = context!!.config.fileColumnCnt\n  507 |         (activity as? MainActivity)?.refreshMenuItems()\n  508 |         getRecyclerAdapter()?.apply {\n  509 |             notifyItemRangeChanged(0, listItems.size)\n  510 |         }\n  511 |     }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/RecentsFragment.kt:223-229","code":"  223 |     override fun columnCountChanged() {\n  224 |         (binding.recentsList.layoutManager as MyGridLayoutManager).spanCount = context!!.config.fileColumnCnt\n  225 |         (activity as? MainActivity)?.refreshMenuItems()\n  226 |         getRecyclerAdapter()?.apply {\n  227 |             notifyItemRangeChanged(0, listItems.size)\n  228 |         }\n  229 |     }","lines":7}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"StorageFragment.refreshFragment iterates volumes.keys (UI volume names from getAllVolumeNames, e.g. 'primary'/uuid) and passes them to getAllFiles which calls MediaStore.Files.getContentUri(volumeName). MediaStore expects volume names like 'external'/'external_primary'/lowercased-uuid; PRIMARY_VOLUME_NAME may not be a valid MediaStore volume name, so getAllFiles can silently return nothing for the primary volume.","fix":"Map the internal volume name to MediaStore's expected volume identifier (e.g. 'external_primary') before calling getContentUri.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/StorageFragment.kt:486-492","code":"  486 |     override fun refreshFragment() {\n  487 |         ensureBackgroundThread {\n  488 |             val fileDirItems = volumes.keys.map { getAllFiles(it) }.flatten()\n  489 |             allDeviceListItems = getListItemsFromFileDirItems(ArrayList(fileDirItems))\n  490 |         }\n  491 |         setupLayoutManager()\n  492 |     }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/StorageFragment.kt:430-433","code":"  430 |     private fun getAllFiles(volumeName: String): ArrayList<FileDirItem> {\n  431 |         val fileDirItems = ArrayList<FileDirItem>()\n  432 |         val showHidden = context?.config?.shouldShowHidden() ?: return fileDirItems\n  433 |         val uri = MediaStore.Files.getContentUri(volumeName)","lines":4}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"askRootIfNeeded invokes callback(true) inside commandOutput, which fires once per output line of `ls -lA`. The success callback is therefore called multiple times (once per directory entry) instead of once, which can re-run downstream success handling repeatedly.","fix":"Signal success once in commandCompleted (exitcode == 0), not in commandOutput.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/helpers/RootHelpers.kt:17-32","code":"   17 |     fun askRootIfNeeded(callback: (success: Boolean) -> Unit) {\n   18 |         val cmd = \"ls -lA\"\n   19 |         val command = object : Command(0, cmd) {\n   20 |             override fun commandOutput(id: Int, line: String) {\n   21 |                 callback(true)\n   22 |                 super.commandOutput(id, line)\n   23 |             }\n   24 |         }\n   25 | \n   26 |         try {\n   27 |             RootTools.getShell(true).add(command)\n   28 |         } catch (exception: Exception) {\n   29 |             activity.showErrorToast(exception)\n   30 |             callback(false)\n   31 |         }\n   32 |     }","lines":16}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"GestureEditText.applyState writes context.config.editorTextZoom = state.zoom on every zoom state change (every frame of a pinch gesture). This persists to SharedPreferences via apply() repeatedly during the gesture, causing many disk writes; it also stores the raw gesture zoom rather than only the final committed value.","fix":"Persist editorTextZoom only when the gesture settles (e.g. onStateReset / debounce), not on every intermediate state change.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/views/GestureEditText.kt:79-90","code":"   79 |     private fun applyState(state: State) {\n   80 |         var size = origSize * state.zoom\n   81 |         val maxSize = origSize * controller.stateController.getMaxZoom(state)\n   82 |         size = Math.max(origSize, Math.min(size, maxSize))\n   83 | \n   84 |         size = Math.round(size).toFloat()\n   85 |         if (!State.equals(this.size, size)) {\n   86 |             this.size = size\n   87 |             super.setTextSize(TypedValue.COMPLEX_UNIT_PX, size)\n   88 |             context.config.editorTextZoom = state.zoom\n   89 |         }\n   90 |     }","lines":12}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"MySwipeRefreshLayout.onStartNestedScroll has a redundant/confusing double return: `return if (isEnabled) { return false } else { super... }`. The inner `return false` is inside the if-expression branch, so the outer `return` is never used for that branch. It works but the dead outer `return` keyword indicates copy-paste/refactor residue and obscures intent.","fix":"Drop the inner return: `return if (isEnabled) false else super.onStartNestedScroll(child, target, nestedScrollAxes)`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/views/MySwipeRefreshLayout.kt:29-33","code":"   29 |         return if (isEnabled) {\n   30 |             return false\n   31 |         } else {\n   32 |             super.onStartNestedScroll(child, target, nestedScrollAxes)\n   33 |         }","lines":5}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"Zip Slip path-traversal guard is unreliable. The canonical path of the output file is compared against the raw, non-canonical 'parent' string via startsWith. (1) 'parent' is built by string concatenation and is never canonicalized, so any '.', '..', or symlink in 'destination' makes a legitimate canonical path fail to match (false rejection) while a crafted entry could still slip through on systems where the prefix happens to match. (2) The prefix check has no trailing separator, so an entry resolving to a sibling like '<parent>evil' would also pass startsWith('<parent>'). Use canonical parent and a separator-terminated prefix.","fix":"Compute 'val parentCanonical = File(parent).canonicalPath' and check '!outputFile.canonicalPath.startsWith(parentCanonical + File.separator)' (and allow equality with parentCanonical).","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/activities/DecompressActivity.kt:164-179","code":"  164 |                     val parent = \"$destination/$filename\"\n  165 |                     val newPath = \"$parent/${entry.fileName.trimEnd('/')}\"\n  166 | \n  167 | \n  168 | _label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In CreateNewItemDialog.createDirectory and createFile, the non-SAF local-storage branches call File(path).mkdirs()/createNewFile() but only handle the success case. When mkdirs()/createNewFile() returns false (creation failed), neither success() nor callback(false) is invoked, so the dialog stays open with no feedback and the caller never learns of the failure.","fix":"Add an else branch invoking showErrorToast and callback(false) when the File operation returns false.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/dialogs/CreateNewItemDialog.kt:85-90","code":"   85 |                 } else {\n   86 |                     if (File(path).mkdirs()) {\n   87 |                         success(alertDialog)\n   88 |                     }\n   89 |                 }\n   90 |             }","lines":6},{"ref":"app/src/main/kotlin/org/fossify/filemanager/dialogs/CreateNewItemDialog.kt:141-145","code":"  141 |                 isRPlus() || path.startsWith(activity.internalStoragePath, true) -> {\n  142 |                     if (File(path).createNewFile()) {\n  143 |                         success(alertDialog)\n  144 |                     }\n  145 |                 }","lines":5}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"StorageFragment.getSizesByMimeType swallows all exceptions in two empty catch blocks (per-row and outer). Failures (cursor read errors, provider crashes) are silently ignored, so storage sizes can be silently wrong with no diagnostic. The inner catch is per-row so an exception aborts processing of that row silently.","fix":"At minimum log the exceptions (e.g. via a logging util) instead of empty catch blocks, so failures are observable.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/StorageFragment.kt:283-287","code":"  283 | iaStore.Files.FileColumns.DISPLAY_NAME)\n  291 |                     val path = cursor.getStringValue(MediaStore.Files.FileColumns.DATA)\n  292 |                     \n  293 |                     val isHiddenFile = name.startsWith(\".\")\n  294 |                     if (!showHidden && (isHiddenFile || path.isPathInHiddenFolder())) {\n  295 |                         return@queryCursor\n  296 |                     }\n  297 | \n  298 |                     val size = cursor.getLongValue(MediaStore.Files.FileColumns.SIZE)\n  299 |                     if (size == 0L) {\n  300 |                         return@queryCursor\n  301 |                     }\n  302 | \n  303 |                     val lastModified = cursor.getLongValue(MediaStore.Files.FileColumns.DATE_MODIFIED) * 1000\n  304 | \n  305 |                     val mimetype = fullMimetype.substringBefore(\"/\")\n  306 |                     when (currentMimeType) {\n  307 |                         IMAGES -> {\n  308 |                             if (mimetype == \"image\") {\n  309 |                                 fileDirItems.add(FileDirItem(path, name, false, 0, size, lastModified))\n  310 |                             }\n  311 |                         }\n  312 | \n  313 |                         VIDEOS -> {\n  314 |                             if (mimetype == \"video\") {\n  315 |                                 fileDirItems.add(FileDirItem(path, name, false, 0, size, lastModified))\n  316 |                             }\n  317 |                         }\n  318 | \n  319 |                         AUDIO -> {\n  320 |                             if (mimetype == \"audio\" || extraAudioMimeTypes.contains(fullMimetype)) {\n  321 |                                 fileDirItems.add(FileDirItem(path, name, false, 0, size, lastModified))\n  322 |                             }\n  323 |                         }\n  324 | \n  325 |                         DOCUMENTS -> {\n  326 |                             if (mimetype == \"text\" || extraDocumentMimeTypes.contains(fullMimetype)) {\n  327 |                                 fileDirItems.add(FileDirItem(path, name, false, 0, size, lastModified))\n  328 |                             }\n  329 |                         }\n  330 | \n  331 |                         ARCHIVES -> {\n  332 |                             if (archiveMimeTypes.contains(fullMimetype)) {\n  333 |                                 fileDirItems.add(FileDirItem(path, name, false, 0, size, lastModified))\n  334 |                             }\n  335 |                         }\n  336 | \n  337 |                         OTHERS -> {\n  338 |                             if (mimetype != \"image\" && mimetype != \"video\" && mimetype != \"audio\" && mimetype != \"text\" &&\n  339 |                                 !extraAudioMimeTypes.contains(fullMimetype) && !extraDocumentMimeTypes.contains(fullMimetype) &&\n  340 |                                 !archiveMimeTypes.contains(fullMimetype)\n  341 |                             ) {\n  342 |                                 fileDirItems.add(FileDirItem(path, name, false, 0, size, lastModified))\n  343 |                             }\n  344 |                         }\n  345 |                     }\n  346 |                 } catch (e: Exception) {\n  347 |                 }","lines":59}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In SaveAsActivity the catch(Exception) block shows an error toast then calls finish(). Because finish() also runs on the success path (line 66), and the whole block is on a background thread, partial writes are not cleaned up (a half-copied destination file may be left behind) and the user only sees a generic error toast with no retry. The partially written output stream/file is never deleted.","fix":"On failure delete the partially written destinationPath (and close streams in a finally) before finishing, so a failed copy does not leave a corrupt file.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/activities/SaveAsActivity.kt:59-70","code":"   59 |                             val inputStream = contentResolver.openInputStream(source)\n   60 | \n   61 |                             val destinationPath = getAvailablePath(\"$destination/$filename\")\n   62 |                             val outputStream = getFileOutputStreamSync(destinationPath, mimeType, null)!!\n   63 |                             inputStream!!.copyTo(outputStream)\n   64 |                             rescanPaths(arrayListOf(destinationPath))\n   65 |                             toast(R.string.file_saved)\n   66 |                             finish()\n   67 |                         } catch (e: Exception) {\n   68 |                             showErrorToast(e)\n   69 |                             finish()\n   70 |                         }","lines":12}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"StorageFragment.getAllFiles swallows per-row exceptions silently in an empty catch block inside the cursor loop. A malformed row (e.g. null DISPLAY_NAME causing name.startsWith to NPE) is silently dropped with no record.","fix":"Log the swallowed exception, and guard name nullability explicitly rather than relying on the catch.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/StorageFragment.kt:464-465","code":"  464 |                         } catch (e: Exception) {\n  465 |                         }","lines":2}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"initFileManager handles ACTION_VIEW intents but treats a non-file (e.g. content://) URI as a filesystem path. After resolving the path via getRealPathFromURI for non-file schemes, the code unconditionally does `File(data.path!!).isDirectory` using data.path (the URI path, not a y wrapped in runOnUiThread, highlighting the inconsistency.","fix":"Wrap the toast and passwordDialog?.clearPassword() calls in runOnUiThread { } like the askForPassword branch.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/activities/DecompressActivity.kt:241-251","code":"  241 |             } catch (passwordException: ZipException) {\n  242 |                 if (passwordException.type == Type.WRONG_PASSWORD) {\n  243 |                     if (password != null) {\n  244 |                         toast(getString(R.string.invalid_password))\n  245 |                         passwordDialog?.clearPassword()\n  246 |                     } else {\n  247 |                         runOnUiThread {\n  248 |                             askForPassword()\n  249 |                         }\n  250 |                     }\n  251 |                     return@ensureBackgroundThread","lines":11}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"onResume calls System.exit(0) to restart the app when the visible-tabs setting changed. Abruptly killing the process from a lifecycle callback is a hostile pattern: it skips orderly teardown, can lose unsaved state, and is flagged by lint. It also runs on every resume where mStoredShowTabs differs, even transiently.","fix":"Restart cleanly by recreating the activity (recreate()) or relaunching via a fresh Intent with CLEAR_TASK/NEW_TASK instead of System.exit(0).","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/activities/MainActivity.kt:127-131","code":"  127 |         if (mStoredShowTabs != config.showTabs) {\n  128 |             config.lastUsedViewPagerPage = 0\n  129 |             System.exit(0)\n  130 |             return\n  131 |         }","lines":5}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"Multiple fragments dereference context!! / context!!.config on background threads (ensureBackgroundThread) where the view may have been detached, making context null. E.g. ItemsFragment.getItems uses context!! after the isDestroyed check, and RecentsFragment/StorageFragment use context!! in column logic. context on a detached View becomes null, so context!!.config can NPE.","fix":"Capture a local non-null context/activity reference once at the start of the background block and use it consistently, bailing out if null.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/ItemsFragment.kt:185-208","code":"  185 |         ensureBackgroundThread {\n  186 |             if (activity?.isDestroyed == false && activity?.isFinishing == false) {\n  187 |                 val config = context!!.config\n  188 |                 if (context.isRestrictedSAFOnlyRoot(path)) {\n  189 |                     activity?.runOnUiThread { hideProgressBar() }\n  190 |                     activity?.handleAndroidSAFDialog(path, openInSystemAppAllowed = true) {\n  191 |                         if (!it) {\n  192 |                             activity?.toast(R.string.no_storage_permissions)\n  193 |                             return@handleAndroidSAFDialog\n  194 |                         }\n  195 |                         val getProperChildCount = context!!.config.getFolderViewType(currentPath) == VIEW_TYPE_LIST\n  196 |                         context.getAndroidSAFFileItems(path, context.config.shouldShowHidden(), getProperChildCount) { fileItems ->\n  197 |                             callback(path, getListItemsFromFileDirItems(fileItems))\n  198 |                         }\n  199 |                     }\n  200 |                 } else if (context!!.isPathOnOTG(path) && config.OTGTreeUri.isNotEmpty()) {\n  201 |                     val getProperFileSize = context!!.config.getFolderSorting(currentPath) and SORT_BY_SIZE != 0\n  202 |                     context!!.getOTGItems(path, config.shouldShowHidden(), getProperFileSize) {\n  203 | ype":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Uses the deprecated Resources.getDrawable(int) overload (no Theme) in two places. On modern API levels this is deprecated and may not apply the activity theme; the project targets recent APIs.","fix":"Use ResourcesCompat.getDrawable(resources, id, theme) or the commons helper that already wraps it.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/ItemsAdapter.kt:376-376","code":"  376 |             val drawable = resources.getDrawable(R.drawable.shortcut_folder).mutate()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/ItemsAdapter.kt:1152-1152","code":" 1152 |         fileDrawable = resources.getDrawable(R.drawable.ic_file_generic)","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Entire file is loaded into memory and rendered in an EditText. file.readText()/readText() buffers the whole file as a String, then setText() puts it in an editable TextView. For large text files this causes large allocations and can OOM. The code only catches OutOfMemoryError on the content-URI branch (line 305), not on the file:// branch (readText at 293 only catches Exception, which does not cover OutOfMemoryError), so a large local file crashes the app.","fix":"Add an OutOfMemoryError catch around the file:// readText path too, and/or impose a size limit / streaming view for large files.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/activities/ReadTextActivity.kt:287-313","code":"  287 |     private fun checkIntent(uri: Uri, savedInstanceState: Bundle?) {\n  288 |         originalText = if (uri.scheme == \"file\") {\n  289 |             filePath = uri.path!!\n  290 |             val file = File(filePath)\n  291 |             if (file.exists()) {\n  292 |                 try {\n  293 |                     file.readText()\n  294 |                 } catch (e: Exception) {\n  295 |                     showErrorToast(e)\n  296 |                     \"\"\n  297 |                 }\n  298 |             } else {\n  299 |                 toast(R.string.unknown_error_occurred)\n  300 |                 \"\"\n  301 |             }\n  302 |         } else {\n  303 |             try {\n  304 |                 contentResolver.openInputStream(uri)!!.bufferedReader().use { it.readText() }\n  305 |             } catch (e: OutOfMemoryError) {\n  306 |                 showErrorToast(e.toString())\n  307 |                 return\n  308 |             } catch (e: Exception) {\n  309 |                 showErrorToast(e)\n  310 |                 finish()\n  311 |                 return\n  312 |             }\n  313 |         }","lines":27}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Multiple public update methods call notifyDataSetChanged() unconditionally (updateFontSizes, updateDateTimeFormat, updateDisplayFilenamesInGrid, and updateItems). notifyDataSetChanged forces a full rebind/relayout of all rows and defeats item animations; called frequently (e.g. font/date config changes) this is wasteful for large directories.","fix":"Use notifyItemRangeChanged with a payload, or DiffUtil in updateItems, to rebind only what changed.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/ItemsAdapter.kt:988-1003","code":"  988 |     fun updateFontSizes() {\n  989 |         fontSize = activity.getTextSize()\n  990 |         smallerFontSize = fontSize * 0.8f\n  991 |         notifyDataSetChanged()\n  992 |     }\n  993 | \n  994 |     fun updateDateTimeFormat() {\n  995 |         dateFormat = config.dateFormat\n  996 |         timeFormat = activity.getTimeFormat()\n  997 |         notifyDataSetChanged()\n  998 |     }\n  999 | \n 1000 |     fun updateDisplayFilenamesInGrid() {\n 1001 |         displayFilenamesInGrid = config.displayFilenames\n 1002 |         notifyDataSetChanged()\n 1003 |     }","lines":16}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"ItemsFragment.searchFiles recurses into every subdirectory synchronously, calling File.listFiles() and File.isHidden/isDirectory on each, with no depth limit and no cancellation check inside the recursion (the lastSearchedText check only happens after the full traversal returns). On a large tree this does heavy unbounded I/O and cannot be cancelled mid-traversal even if the user changes the query.","fix":"Check lastSearchedText/cancellation inside the recursion loop and bail out early; consider a depth/result cap.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/fragments/ItemsFragment.kt:384-407","code":"  384 |         File(path).listFiles()?.sortedBy { it.isDirectory }?.forEach {\n  385 |             if (!showHidden && it.isHidden) {\n  386 |                 return@forEach\n  387 |             }\n  388 | \n  389 |             if (it.isDirectory) {\n  390 |                 if (it.name.normalizeString().contains(normalizedText, true)) {\n  391 |                     val fileDirItem = getListItemFromFile(it, isSortingBySize, HashMap(), false)\n  392 |                     if (fileDirItem != null) {\n  393 |                         files.add(fileDirItem)\n  394 |                     }\n  395 |                 }\n  396 | \n  397 |                 files.addAll(searchFiles(text, it.absolutePath))\n  398 |             } else {\n  399 |                 if (it.name.normalizeString().contains(normalizedText, true)) {\n  400 |                     val fileDirItem = getListItemFromFile(it, isSortingBySize, HashMap(), false)\n  401 |                     if (fileDirItem != null) {\n  402 |                         files.add(fileDirItem)\n  403 |                     }\n  404 |                 }\n  405 |             }\n  406 |         }\n  407 |         return files","lines":24}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"getCurrentFragment() rebuilds an ArrayList and calls three findViewById lookups every invocation, and it is called repeatedly (refreshMenuItems, menu click handler, onBackPressedCompat, several option handlers). Likewise getAllFragments() runs three findViewById calls each time and is invoked in onResume loops. Repeated findViewById on the hot menu/refresh path is wasteful.","fix":"Cache the fragment references once they are attached (or memoize the findViewById results) instead of re-looking them up and reallocating lists on every call.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/activities/MainActivity.kt:724-746","code":"  724 |     private fun getRecentsFragment() = findViewById<RecentsFragment>(R.id.recents_fragment)\n  725 |     private fun getItemsFragment() = findViewById<ItemsFragment>(R.id.items_fragment)\n  726 |     private fun getStorageFragment() = findViewById<StorageFragment>(R.id.storage_fragment)\n  727 |     private fun getAllFragments(): ArrayList<MyViewPagerFragment<*>?> =\n  728 |         arrayListOf(getItemsFragment(), getRecentsFragment(), getStorageFragment())\n  729 | \n  730 |     private fun getCurrentFragment(): MyViewPagerFragment<*>? {\n  731 |         val showTabs = config.showTabs\n  732 |         val fragments = arrayListOf<MyViewPagerFragment<*>>()\n  733 |         if (showTabs and TAB_FILES != 0) {\n  734 |             fragments.add(getItemsFragment())\n  735 |         }\n  736 | \n  737 |         if (showTabs and TAB_RECENT_FILES != 0) {\n  738 |             fragments.add(getRecentsFragment())\n  739 |         }\n  740 | \n  741 |         if (showTabs and TAB_STORAGE_ANALYSIS != 0) {\n  742 |             fragments.add(getStorageFragment())\n  743 |         }\n  744 | \n  745 |         return fragments.getOrNull(binding.mainViewPager.currentItem)\n  746 |     }","lines":23}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"getPackageArchiveInfo is invoked on the main thread during view binding. getImagePathToLoad, called from setupView (onBindViewHolder), parses the full APK archive via packageManager.getPackageArchiveInfo and loadIcon for every .apk row as it scrolls into view, on the UI thread. This is expensive disk/parse work in the bind path and can cause scroll jank for archives containing APKs.","fix":"Move APK icon resolution off the bind path (e.g. let Glide load it via a background model loader) instead of resolving synchronously in onBindViewHolder.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/DecompressItemsAdapter.kt:117-131","code":"  117 |     private fun getImagePathToLoad(path: String): Any {\n  118 |         return if (path.endsWith(\".apk\", true)) {\n  119 |             val packageInfo = activity.packageManager.getPackageArchiveInfo(path, PackageManager.GET_ACTIVITIES)\n  120 |             val appInfo = packageInfo?.applicationInfo\n  121 |             if (appInfo != null) {\n  122 |                 appInfo.sourceDir = path\n  123 |                 appInfo.publicSourceDir = path\n  124 |                 appInfo.loadIcon(activity.packageManager)\n  125 |             } else {\n  126 |                 path\n  127 |             }\n  128 |         } else {\n  129 |             path\n  130 |         }\n  131 |     }","lines":15}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"getSelectedFileDirItems() rebuilds the full filtered list from listItems on every call, and it is invoked repeatedly within single operations (prepareActionMode calls it twice via getSelectedFileDirItems().map and checkHideBtnVisibility, plus getFirstSelectedItemPath calls it again). For large directories this is repeated O(n) scanning.","fix":"Compute the selected items once per operation and pass them down, or cache while a selection is active.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/ItemsAdapter.kt:969-973","code":"  969 |     private fun getSelectedFileDirItems(): ArrayList<FileDirItem> {\n  970 |         return listItems.filter {\n  971 |             selectedKeys.contains(it.path.hashCode())\n  972 |         } as ArrayList<FileDirItem>\n  973 |     }","lines":5}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"onViewRecycled and onBindViewHolder both re-create a Binding adapter wrapper via Binding.getByItemViewType(...).bind(itemView) on every recycle/bind. This allocates a new wrapper object (e.g. ItemFileGridBindingAdapter) plus runs ViewBinding.bind (findViewById traversal) for every item, instead of caching the binding on the ViewHolder.","fix":"Store the bound ItemViewBinding on the ViewHolder at creation time and reuse it instead of re-binding on each recycle/bind.","locations":[{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/ItemsAdapter.kt:1016-1025","code":" 1016 |     override fun onViewRecycled(holder: ViewHolder) {\n 1017 |         super.onViewRecycled(holder)\n 1018 |         if (!activity.isDestroyed && !activity.isFinishing) {\n 1019 |             val icon = Binding.getByItemViewType(holder.itemViewType, isListViewType)\n 1020 |                 .bind(holder.itemView).itemIcon\n 1021 |             if (icon != null) {\n 1022 |                 Glide.with(activity).clear(icon)\n 1023 |             }\n 1024 |         }\n 1025 |     }","lines":10},{"ref":"app/src/main/kotlin/org/fossify/filemanager/adapters/ItemsAdapter.kt:262-266","code":"  262 |             val viewType = getItemViewType(position)\n  263 |             setupView(\n  264 |                 binding = Binding.getByItemViewType(viewType, isListViewType).bind(itemView),\n  265 |                 listItem = fileDirItem\n  266 |             )","lines":5}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy
