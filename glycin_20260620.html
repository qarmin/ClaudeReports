<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In icc::transform, `row_length` is computed from `width` while each `row` slice is produced by chunking `buf` with `stride` as the chunk size. The expression `row[0..row_length]` panics if `row_length > row.len()`, i.e. whenever `width * bytes_per_pixel > stride`. The frame's width/stride/texture values originate from the (possibly malicious or buggy) image-loader sandbox process and are not validated against each other before reaching this function, so a crafted or buggy loader response can directly trigger a panic/abort in the ICC color-transform path while applying ICC profiles, which is reachable for any image carrying an ICC profile.","fix":"Validate that stride >= row_length (i.e. width * bytes_per_pixel <= stride) before starting the transform, and return an error (propagated as lcms2::Error or a new Error variant) instead of indexing unconditionally. Alternatively, clamp the slice with row.get_mut(0..row_length) and return an error on None.","locations":[{"ref":"glycin-core/src/icc.rs:59-68","code":"   59 |     let chunk_size = (buf.len() / stride as usize).div_ceil(multiple) * stride as usize;\n   60 |     let row_length = width as usize * memory_format.n_bytes().usize();\n   61 | \n   62 |     std::thread::scope(|s| {\n   63 |         for chunk in buf.chunks_mut(chunk_size) {\n   64 |             s.spawn(move || {\n   65 |                 let transform = transformation(icc_profile, memory_format)?;\n   66 |                 for row in chunk.chunks_mut(stride as usize) {\n   67 |                     transform.transform_in_place(&mut row[0..row_length]);\n   68 |                 }","lines":10,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/icc.rs#L59-68"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"The HEIF animated-sequence worker (animated_worker, used for HEIF image bursts/motion-photos) is far less defensive than the equivalent static-image decode() function a few dozen lines below: it uses `.unwrap()` for `image.planes().interleaved.unwrap()`, `plane.stride.try_u64().unwrap()`, `SharedMemory::new(...).unwrap()`, `read_exact(...).unwrap()`, `Frame::new(...).unwrap()`, `frame.stride = plane.stride.try_u32().unwrap()`, and `.transpose().unwrap()` for the ICC profile, whereas decode() (lines 308-356) correctly propagates all the equivalent failures with `?`/`.expected_error()?`. Any HEIF sequence frame that triggers one of these failure modes (e.g. an interleaved-plane-less chroma configuration, or a stride that legitimately fails the safe conversion) panics the worker thread instead of returning a ProcessError, unlike the single-image path which handles the same failure gracefully.","fix":"Mirror the error handling used in decode() (lines 308-356): replace each `.unwrap()` with `.expected_error()?`/`.internal_error()?` and send the resulting `Err` over the channel via `send.send(Err(...))` instead of panicking the thread.","locations":[{"ref":"glycin-loaders/glycin-heif/src/main.rs:165-181","code":"  165 |                     let plane = image.planes().interleaved.unwrap();\n  166 | \n  167 |                     let mut memory = SharedMemory::new(\n  168 |                         plane.stride.try_u64().unwrap() * u64::from(plane.height),\n  169 |                     )\n  170 |                     .unwrap();\n  171 | \n  172 |                     Cursor::new(plane.data).read_exact(&mut memory).unwrap();\n  173 |                     let texture = memory;\n  174 | \n  175 |                     let mut frame =\n  176 |                         Frame::new(plane.width, plane.height, memory_format, texture).unwrap();\n  177 |                     frame.stride = plane.stride.try_u32().unwrap();\n  178 |                     frame.details.color_icc_profile = icc_profile\n  179 |                         .map(SharedMemory::try_from_vec)\n  180 |                         .transpose()\n  181 |                         .unwrap();","lines":17,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-heif/src/main.rs#L165-181"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"animated_worker() for HEIF image sequences computes `let duration_ms = (image.duration() as u64) * 1000 / (track.timescale() as u64);` with no check that `track.timescale()` is non-zero. `timescale` is read directly from the HEIF track header (an attacker-controlled box value, libheif_rs::Track::timescale() -> u32) and libheif does not guarantee it is non-zero for malformed files. A crafted HEIF image-sequence (e.g. a 'moov'-style track with timescale 0) causes an integer division-by-zero panic in the per-frame decode worker thread on every single frame request.","fix":"Guard the division: if `track.timescale() == 0`, fall back to a default duration (e.g. 100ms, as the image-rs loader does for malformed delay values) instead of dividing.","locations":[{"ref":"glycin-loaders/glycin-heif/src/main.rs:189","code":"  189 |                     let duration_ms = (image.duration() as u64) * 1000 / (track.timescale() as u64);","lines":1,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-heif/src/main.rs#L189"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"animated_get_frame() is called once per decoded animation frame for GIF/APNG/WebP and chains four `.unwrap()` calls: `B::new(...).expected_error().unwrap()` (allocation of the frame buffer), `read_exact(&mut texture).unwrap()`, and `Frame::new(...).unwrap()`. Since the decoder limits were explicitly disabled via `set_no_limits()` in lib.rs, a crafted animated image with huge but otherwise valid per-frame dimensions can drive `B::new` to fail (huge `vec![0; size]` allocation failure aborts the process rather than returning an `Err`) or can hit any other failure path, turning what should be a graceful decode error into a hard panic of the per-format worker thread on every single frame, not just at image-open time.","fix":"Propagate errors instead of unwrapping: use `.expected_error()?` for the `B::new` and `Frame::new` results, and map `read_exact`'s `io::Result` to `ProcessError` with `.internal_error()?` instead of `.unwrap()`.","locations":[{"ref":"glycin-loaders/glycin-image-rs/src/animated.rs:112-119","code":"  112 |     let mut texture = B::new(u64::from(width) * u64::from(height) * memory_format.n_bytes().u64())\n  113 |         .expected_error()\n  114 |         .unwrap();\n  115 |     Cursor::new(buffer.into_raw())\n  116 |         .read_exact(&mut texture)\n  117 |         .unwrap();\n  118 | \n  119 |     let mut out_frame = Frame::new(width, height, memory_format, texture).unwrap();","lines":8,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-image-rs/src/animated.rs#L112-119"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"ImageRsDecoder::into_frames() and is_animated() both call `.unwrap()` on `d.apng()` for PNG decoders (`Self::Png(d) => Some(d.apng().unwrap().into_frames())` and `d.is_apng().unwrap()`). `image::codecs::png::PngDecoder::apng()`/`is_apng()` return `ImageResult`, which can fail for a PNG with a malformed/truncated acTL or fcTL chunk after the decoder has already accepted the file as APNG-capable. A crafted PNG can therefore panic the animated-decode worker thread instead of yielding a decode error.","fix":"Change `into_frames()` to return a `Result`/`Option` derived from the fallible call (e.g. propagate the error to the caller as ProcessError) instead of unwrapping; same for `is_animated()`, or fall back to treating the image as non-animated when `is_apng()` errors.","locations":[{"ref":"glycin-loaders/glycin-image-rs/src/lib.rs:399","code":"  399 |             Self::Png(d) => Some(d.apng().unwrap().into_frames()),","lines":1,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-image-rs/src/lib.rs#L399"},{"ref":"glycin-loaders/glycin-image-rs/src/lib.rs:409","code":"  409 |             Self::Png(d) => d.is_apng().unwrap(),","lines":1,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-image-rs/src/lib.rs#L409"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"JpegXL decode maps `(num_color_channels, has_alpha_channel)` to a MemoryFormat for each pixel-type branch, but the Float and Float16 branches only handle `(3, false)` and `(3, true)` and fall through to `unimplemented!()` for any other combination, while the Uint8/Uint16 branches additionally handle `(1, false)`/`(1, true)`. A valid JPEG XL file with a grayscale (1-channel) image encoded with 32-bit float or float16 samples (a legal JXL configuration, e.g. HDR grayscale) reaches `unimplemented!()` and panics the loader process on file open. This is also a copy-paste inconsistency between the four near-identical match arms (Uint8/Uint16 support grayscale, Float/Float16 don't).","fix":"Add `(1, false)`/`(1, true)` arms for the Float and Float16 branches (e.g. MemoryFormat::G32Float / G16Float equivalents if they exist), or replace `unimplemented!()` with a graceful `ProcessError::UnsupportedImageFormat`/`expected_error` so unsupported-but-valid channel layouts produce a normal decode error instead of a crash.","locations":[{"ref":"glycin-loaders/glycin-jxl/src/main.rs:80-84","code":"   80 |                 memory_format = match (metadata.num_color_channels, metadata.has_alpha_channel) {\n   81 |                     (3, false) => MemoryFormat::R32g32b32Float,\n   82 |                     (3, true) => MemoryFormat::R32g32b32a32Float,\n   83 |                     _ => unimplemented!(),\n   84 |                 };","lines":5,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-jxl/src/main.rs#L80-84"},{"ref":"glycin-loaders/glycin-jxl/src/main.rs:95-99","code":"   95 |                 memory_format = match (metadata.num_color_channels, metadata.has_alpha_channel) {\n   96 |                     (3, false) => MemoryFormat::R16g16b16Float,\n   97 |                     (3, true) => MemoryFormat::R16g16b16a16Float,\n   98 |                     _ => unimplemented!(),\n   99 |                 };","lines":5,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-jxl/src/main.rs#L95-99"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"ImgBuf::resize's MMap branch is `todo!()`, which unconditionally panics if ever reached. ImgBuf wraps SharedMemory (mmap-backed buffer originating from untrusted/IPC data) specifically to allow later resizing, so calling resize on a MMap-backed buffer is squarely within the type's intended use - yet it panics every time. Additionally, the whole `img_buf.rs` file is not declared as a module in lib.rs (no `mod img_buf;`), so it is currently dead code that does not even compile as part of the crate; `into_vec()`'s `Self::MMap { .. } => self.to_vec()` arm also re-references `self` after it was already moved into the `match self` scrutinee, which would be a compile error if this file were wired in. Flagging both the panic body and the fact this module is silently bit-rotted/unreachable.","fix":"Either finish the MMap resize implementation (the commented-out ftruncate + remap code already sketches the approach) and add `mod img_buf;`/wire it into lib.rs with a passing compile, or delete the file entirely if it has been superseded by the memory/ module's ByteData abstractions.","locations":[{"ref":"glycin-utils/src/img_buf.rs:34-65","code":"   34 |     pub fn resize(self, new_len: i64) -> Result<Self, editing::Error> {\n   35 |         if self.len() == new_len as usize {\n   36 |             return Ok(self);\n   37 |         }\n   38 | \n   39 |         match self {\n   40 |             ImgBuf::MMap(shared_memory) => {\n   41 |                 /*\n   42 |                 let borrowed_fd = unsafe { std::os::fd::BorrowedFd::borrow_raw(raw_fd) };\n   43 | \n   44 |                 // This mmap would have the wrong size after ftruncate\n   45 |                 drop(mmap);\n   46 | \n   47 |                 nix::unistd::ftruncate(\n   48 |                     borrowed_fd,\n   49 |                     libc::off_t::try_from(new_len).map_err(|_| DimensionTooLargerError)?,\n   50 |                 )\n   51 |                 .map_err(std::io::Error::from)?;\n   52 | \n   53 |                 // Need a new mmap with correct size\n   54 |                 let mmap = unsafe { memmap::MmapMut::map_mut(raw_fd) }?;\n   55 | \n   56 |                 Ok(ImgBuf::MMap { mmap, raw_fd })\n   57 |                  */\n   58 |                 todo!()\n   59 |             }\n   60 |             Self::Vec(mut vec) => {\n   61 |                 vec.resize(new_len as usize, 0);\n   62 |                 Ok(Self::Vec(vec))\n   63 |             }\n   64 |         }\n   65 |     }","lines":32,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/img_buf.rs#L34-65"},{"ref":"glycin-utils/src/img_buf.rs:27-32","code":"   27 |     pub fn into_vec(self) -> Vec<u8> {\n   28 |         match self {\n   29 |             Self::Vec(vec) => vec,\n   30 |             Self::MMap { .. } => self.to_vec(),\n   31 |         }\n   32 |     }","lines":6,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/img_buf.rs#L27-32"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"gly_creator_new and gly_creator_add_metadata_key_value call `glib::GStr::from_ptr_checked(...).unwrap()` on caller-supplied `*const c_char` parameters (mime_type, key, value) without checking for null or invalid UTF-8 first. A null or non-UTF8 C string passed by the caller causes an immediate panic/abort across the FFI boundary instead of a recoverable GError.","fix":"Validate the c_char pointers are non-null and valid UTF-8 before unwrapping, returning a GError (gly_creator_new already has a g_error out-parameter available) or FALSE (gly_creator_add_metadata_key_value already returns gboolean) on failure instead of panicking.","locations":[{"ref":"libglycin/src/creator.rs:18-36","code":"   18 | #[unsafe(no_mangle)]\n   19 | pub unsafe extern \"C\" fn gly_creator_new(\n   20 |     mime_type: *const c_char,\n   21 |     g_error: *mut *mut GError,\n   22 | ) -> *mut GlyCreator {\n   23 |     unsafe {\n   24 |         let mime_type = glib::GStr::from_ptr_checked(mime_type).unwrap().to_string();\n   25 | \n   26 |         let creator = async_global_executor::block_on(gobject::GlyCreator::new(mime_type));\n   27 | \n   28 |         match creator {\n   29 |             Ok(creator) => creator.into_glib_ptr(),\n   30 |             Err(err) => {\n   31 |                 set_error(g_error, &err);\n   32 |                 ptr::null_mut()\n   33 |             }\n   34 |         }\n   35 |     }\n   36 | }","lines":19,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin/src/creator.rs#L18-36"},{"ref":"libglycin/src/creator.rs:190-206","code":"  190 | #[unsafe(no_mangle)]\n  191 | pub unsafe extern \"C\" fn gly_creator_add_metadata_key_value(\n  192 |     creator: *mut GlyCreator,\n  193 |     key: *const c_char,\n  194 |     value: *const c_char,\n  195 | ) -> glib::ffi::gboolean {\n  196 |     unsafe {\n  197 |         let key = glib::GStr::from_ptr_checked(key).unwrap().as_str();\n  198 |         let value = glib::GStr::from_ptr_checked(value).unwrap().as_str();\n  199 |         let creator = gobject::GlyCreator::from_glib_ptr_borrow(&creator);\n  200 | \n  201 |         creator\n  202 |             .metadata_add_key_value(key.to_string(), value.to_string())\n  203 |             .is_ok()\n  204 |             .into_glib()\n  205 |     }\n  206 | }","lines":17,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin/src/creator.rs#L190-206"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"gly_creator_add_frame and gly_creator_add_frame_with_stride both call `glycin::MemoryFormat::try_from(memory_format).unwrap()` on a raw i32 parameter supplied directly by the C caller. An out-of-range memory_format value panics and aborts the process, the same pattern as the memory_format.rs bug above but on the image-creation entry points which are very likely to be called with arbitrary/attacker-influenced format values from bindings.","fix":"Validate the memory_format value before use and propagate a GError through g_error (consistent with how other failures in these functions are already surfaced) instead of panicking; e.g. `let Ok(memory_format) = glycin::MemoryFormat::try_from(memory_format) else { set_error(...); return ptr::null_mut(); };`.","locations":[{"ref":"libglycin/src/creator.rs:72-96","code":"   72 | pub unsafe extern \"C\" fn gly_creator_add_frame(\n   73 |     creator: *mut GlyCreator,\n   74 |     width: u32,\n   75 |     height: u32,\n   76 |     memory_format: i32,\n   77 |     data: *mut GBytes,\n   78 |     g_error: *mut *mut GError,\n   79 | ) -> *mut GlyNewFrame {\n   80 |     unsafe {\n   81 |         let obj = gobject::GlyCreator::from_glib_ptr_borrow(&creator);\n   82 |         let memory_format = glycin::MemoryFormat::try_from(memory_format).unwrap();\n   83 |         let data = glib::Bytes::from_glib_ptr_borrow(&data).clone();\n   84 | \n   85 |         let new_frame: Result<gobject::GlyNewFrame, glycin::Error> =\n   86 |             glib::MainContext::new().block_on(obj.add_frame(width, height, memory_format, data));\n   87 | \n   88 |         match new_frame {\n   89 |             Ok(new_frame) => new_frame.into_glib_ptr(),\n   90 |             Err(err) => {\n   91 |                 set_error(g_error, &err);\n   92 |                 ptr::null_mut()\n   93 |             }\n   94 |         }\n   95 |     }\n   96 | }","lines":25,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin/src/creator.rs#L72-96"},{"ref":"libglycin/src/creator.rs:98-124","code":"   98 | #[unsafe(no_mangle)]\n   99 | pub unsafe extern \"C\" fn gly_creator_add_frame_with_stride(\n  100 |     creator: *mut GlyCreator,\n  101 |     width: u32,\n  102 |     height: u32,\n  103 |     stride: u32,\n  104 |     memory_format: i32,\n  105 |     data: *mut GBytes,\n  106 |     g_error: *mut *mut GError,\n  107 | ) -> *mut GlyNewFrame {\n  108 |     unsafe {\n  109 |         let obj = gobject::GlyCreator::from_glib_ptr_borrow(&creator);\n  110 |         let memory_format = glycin::MemoryFormat::try_from(memory_format).unwrap();\n  111 |         let data = glib::Bytes::from_glib_ptr_borrow(&data).clone();\n  112 | \n  113 |         let new_frame: Result<gobject::GlyNewFrame, glycin::Error> = glib::MainContext::new()\n  114 |             .block_on(obj.add_frame_with_stride(width, height, stride, memory_format, data));\n  115 | \n  116 |         match new_frame {\n  117 |             Ok(new_frame) => new_frame.into_glib_ptr(),\n  118 |             Err(err) => {\n  119 |                 set_error(g_error, &err);\n  120 |                 ptr::null_mut()\n  121 |             }\n  122 |         }\n  123 |     }\n  124 | }","lines":27,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin/src/creator.rs#L98-124"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"gly_image_get_metadata_key_value calls `glib::GStr::from_ptr_checked(key).unwrap()` on a `*const c_char` parameter supplied by the C caller. If key is a null pointer or not valid UTF-8 (both are realistic C-caller mistakes, e.g. forgetting to check a lookup before passing it on), from_ptr_checked returns None and unwrap() panics, aborting the process. Other functions in the same file (e.g. gly_image_get_mime_type) correctly avoid this by not requiring caller-supplied strings, but this one has no null/UTF-8 guard at all.","fix":"Check for a null pointer explicitly (matching the pattern used in gly_new_frame_set_color_icc_profile) and return null/empty on a null or invalid key instead of unwrapping; e.g. `let Some(key) = (unsafe { !key.is_null() }).then(|| glib::GStr::from_ptr_checked(key)).flatten() else { return ptr::null_mut(); };`.","locations":[{"ref":"libglycin/src/image.rs:172-188","code":"  172 | pub unsafe extern \"C\" fn gly_image_get_metadata_key_value(\n  173 |     image: *mut GlyImage,\n  174 |     key: *const c_char,\n  175 | ) -> *mut c_char {\n  176 |     unsafe {\n  177 |         let image = gobject::GlyImage::from_glib_ptr_borrow(&image);\n  178 |         let key = glib::GStr::from_ptr_checked(key).unwrap().as_str();\n  179 | \n  180 |         let image_info = image.image_info();\n  181 |         let value = image_info\n  182 |             .metadata_key_value()\n  183 |             .as_ref()\n  184 |             .and_then(|x| x.get(key));\n  185 | \n  186 |         value.to_glib_full()\n  187 |     }\n  188 | }","lines":17,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin/src/image.rs#L172-188"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"gly_memory_format_has_alpha and gly_memory_format_is_premultiplied take a raw i32 directly from C and call `glycin::MemoryFormat::try_from(memory_format).unwrap()`. Any C caller passing a value outside the 0..=22 valid enum range (e.g. -1, 999, or a value from a different enum) causes try_from to return Err, and unwrap() panics, aborting the whole process across the FFI boundary -- C code has no way to prevent or recover from this since the function signature gives no indication a panic is possible.","fix":"Match on the try_from result and return a sentinel/clamped value (e.g. FALSE) or use the GValue/glib enum error-quark pattern instead of unwrap(), or use a saturating/checked glib `from_glib` conversion that cannot fail.","locations":[{"ref":"libglycin/src/memory_format.rs:11-23","code":"   11 | #[unsafe(no_mangle)]\n   12 | pub unsafe extern \"C\" fn gly_memory_format_has_alpha(memory_format: i32) -> glib::ffi::gboolean {\n   13 |     let format = glycin::MemoryFormat::try_from(memory_format).unwrap();\n   14 |     format.has_alpha().into_glib()\n   15 | }\n   16 | \n   17 | #[unsafe(no_mangle)]\n   18 | pub unsafe extern \"C\" fn gly_memory_format_is_premultiplied(\n   19 |     memory_format: i32,\n   20 | ) -> glib::ffi::gboolean {\n   21 |     let format = glycin::MemoryFormat::try_from(memory_format).unwrap();\n   22 |     format.is_premultiplied().into_glib()\n   23 | }","lines":13,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin/src/memory_format.rs#L11-23"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"MemoryFormat::to_f32 calls `FromBytes::ref_from_bytes(src).unwrap()` for U8, U16 and F32 channel types. zerocopy's ref_from_bytes returns Err if the byte slice length is not an exact multiple of the target element size (and fails alignment checks for non-u8 types), so any caller passing a src buffer whose length doesn't exactly match the expected channel layout for src_format causes a panic instead of a propagated error. transform/to_f32 are public functions used by glycin-utils to convert decoded pixel buffers, so a buffer-size mismatch anywhere upstream (e.g. a loader reporting an incorrect stride/format) turns into a hard panic deep in shared format-conversion code rather than a recoverable error.","fix":"Return a Result from to_f32/transform and propagate a conversion error instead of unwrapping, or at minimum validate `src.len()` against the expected size for src_format up front and return a sensible zeroed/error value on mismatch.","locations":[{"ref":"glycin-common/src/memory_format.rs:268-289","code":"  268 |     #[inline]\n  269 |     pub fn to_f32(src_format: Self, mut src: &[u8]) -> [f32; 4] {\n  270 |         match src_format.channel_type() {\n  271 |             ChannelType::U8 => {\n  272 |                 Self::to_f32_internal::<u8>(FromBytes::ref_from_bytes(src).unwrap(), src_format)\n  273 |             }\n  274 |             ChannelType::U16 => {\n  275 |                 Self::to_f32_internal::<u16>(FromBytes::ref_from_bytes(src).unwrap(), src_format)\n  276 |             }\n  277 |             ChannelType::F16 => {\n  278 |                 let bytes = &mut [0; 2];\n  279 |                 let mut f16_data = Vec::new();\n  280 |                 while let Ok(()) = src.read_exact(bytes) {\n  281 |                     f16_data.push(half::f16::from_ne_bytes(*bytes));\n  282 |                 }\n  283 |                 Self::to_f32_internal::<half::f16>(&f16_data, src_format)\n  284 |             }\n  285 |             ChannelType::F32 => {\n  286 |                 Self::to_f32_internal::<f32>(FromBytes::ref_from_bytes(src).unwrap(), src_format)\n  287 |             }\n  288 |         }\n  289 |     }","lines":22,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-common/src/memory_format.rs#L268-289"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"GlyCreator exposes cancellable(), metadata_add_key_value(), set_encoding_quality(), and set_encoding_compression(), all of which call `.unwrap()` on the inner `Option<Creator>` obtained via self.creator()/self.imp().creator.lock_blocking(). However, GlyCreator::create() (lines 151-163) calls `std::mem::take(...)` on that same Option, leaving it `None` after a successful create() call, and explicitly handles the 'already used' case there with `ErrorKind::LoaderUsedTwice`. The other four methods have no equivalent guard: if a caller (including C/GTK consumers via the FFI bindings in libglycin/src/creator.rs, e.g. gly_creator_set_encoding_quality, gly_creator_set_encoding_compression, gly_creator_add_metadata, and the cancel-button cancellable() call) invokes them after create() has already consumed the Creator, the process panics instead of returning an error, which is especially dangerous across the C FFI boundary.","fix":"Make cancellable(), metadata_add_key_value(), set_encoding_quality(), and set_encoding_compression() return a Result and produce ErrorKind::LoaderUsedTwice (or similar) when the Option is None, mirroring the handling already done in create(), instead of unwrapping.","locations":[{"ref":"glycin-core/src/gobject/creator.rs:79-119","code":"   79 |     pub fn cancellable(&self) -> gio::Cancellable {\n   80 |         self.imp()\n   81 |             .creator\n   82 |             .lock_blocking()\n   83 |             .as_ref()\n   84 |             .unwrap()\n   85 |             .cancellable\n   86 |             .clone()\n   87 |     }\n   88 | \n   89 |     pub fn creator(&self) -> MutexGuard<'_, Option<Creator>> {\n   90 |         self.imp().creator.lock_blocking()\n   91 |     }\n   92 | \n   93 |     pub fn metadata_add_key_value(\n   94 |         &self,\n   95 |         key: String,\n   96 |         value: String,\n   97 |     ) -> Result<(), crate::FeatureNotSupported> {\n   98 |         self.creator()\n   99 |             .as_mut()\n  100 |             .unwrap()\n  101 |             .add_metadata_key_value(key, value)\n  102 |     }\n  103 | \n  104 |     pub fn set_encoding_quality(&self, quality: u8) -> Result<(), crate::FeatureNotSupported> {\n  105 |         self.creator()\n  106 |             .as_mut()\n  107 |             .unwrap()\n  108 |             .set_encoding_quality(quality)\n  109 |     }\n  110 | \n  111 |     pub fn set_encoding_compression(\n  112 |         &self,\n  113 |         compression: u8,\n  114 |     ) -> Result<(), crate::FeatureNotSupported> {\n  115 |         self.creator()\n  116 |             .as_mut()\n  117 |             .unwrap()\n  118 |             .set_encoding_compression(compression)\n  119 |     }","lines":41,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/gobject/creator.rs#L79-119"},{"ref":"glycin-core/src/gobject/creator.rs:151-163","code":"  151 |     pub async fn create(&self) -> Result<gobject::GlyEncodedImage, crate::Error> {\n  152 |         if let Some(mut creator) = std::mem::take(&mut *self.imp().creator.lock_blocking()) {\n  153 |             for frame in &*self.imp().frames.lock().await {\n  154 |                 frame.build(&mut creator).await?;\n  155 |             }\n  156 | \n  157 |             creator.sandbox_selector(self.sandbox_selector());\n  158 |             let encoded_image: crate::EncodedImage = creator.create().await?;\n  159 |             Ok(gobject::GlyEncodedImage::new(encoded_image))\n  160 |         } else {\n  161 |             Err(ErrorKind::LoaderUsedTwice.err())\n  162 |         }\n  163 |     }","lines":13,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/gobject/creator.rs#L151-163"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In icc::transform, `chunk_size` is computed as `(buf.len() / stride as usize).div_ceil(multiple) * stride as usize`. If `stride` is 0 (division by zero panics) or `stride > buf.len()` (integer division truncates to 0, making chunk_size 0), the call `buf.chunks_mut(chunk_size)` on line 63 panics with 'chunk size must be non-zero'. Both stride and buf length come from the image-loader process and are not validated before this call, so malformed loader output (stride=0, or stride larger than the actual buffer) crashes the process instead of returning a recoverable error.","fix":"Validate stride != 0 and stride <= buf.len() before computing chunk_size, returning an lcms2::Error/ColorState error on invalid input rather than panicking.","locations":[{"ref":"glycin-core/src/icc.rs:59-63","code":"   59 |     let chunk_size = (buf.len() / stride as usize).div_ceil(multiple) * stride as usize;\n   60 |     let row_length = width as usize * memory_format.n_bytes().usize();\n   61 | \n   62 |     std::thread::scope(|s| {\n   63 |         for chunk in buf.chunks_mut(chunk_size) {","lines":5,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/icc.rs#L59-63"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"SourceTransmission::spawn_with_channel calls `channel.send(...).await.unwrap()` twice (once for the first chunk, once in the read loop). This channel feeds the BuiltinSourceReader that is read from inside a `gio::spawn_blocking` decoder thread, driven concurrently via `join_abort_on_error` (see loader.rs:290-305 and editor.rs:145-171). If the builtin decoder returns early - which is a routine occurrence for malformed/truncated image data, or any decoder that only needs a header - the receiving end of the mpsc channel is dropped while spawn_with_channel may still be sending. `Sender::send` then returns Err, and `.unwrap()` panics the source-transmission task. This is reachable with attacker-supplied malformed image bytes via the builtin (image-rs) loader path.","fix":"Replace `.unwrap()` with proper error propagation, e.g. map a SendError into Ok(()) (treat receiver-closed as a normal stop signal) or into an Error that is then ignored/logged via join_abort_on_error's error path, instead of panicking the task.","locations":[{"ref":"glycin-core/src/source.rs:105","code":"  105 |         channel.send(self.first_bytes.to_vec()).await.unwrap();","lines":1,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/source.rs#L105"},{"ref":"glycin-core/src/source.rs:126","code":"  126 |             channel.send(buf[..n].to_vec()).await.unwrap();","lines":1,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/source.rs#L126"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"The SVG loader's background thread (`thread()`) communicates results back to `load()`/`specific_frame()` purely via unwrapped channel operations: `info_send.send(...).unwrap()`, `frame_send.send(frame).unwrap()` in the worker, paired with `info_recv.recv().unwrap()?` and `thread.frame_recv.recv().unwrap()` on the caller side, plus `source.read_to_end(&mut data).unwrap()` and `unix_stream.as_fd().try_clone_to_owned().unwrap()` inside the worker itself. If the worker thread panics for any reason before sending (e.g. the read_to_end unwrap fails on a broken pipe, or `rsvg::Handle::from_data`/`from_stream_sync` panics internally on some malformed SVG it doesn't expect), the channel disconnects and the caller's `.recv().unwrap()` immediately panics too, propagating the failure into a second panic on the main thread instead of a normal decode error.","fix":"Replace `source.read_to_end(&mut data).unwrap()` with proper error propagation that still sends an `Err` over `info_send` before returning, and on the receiving side treat a disconnected/empty `recv()` as a normal `ProcessError::internal_error` (e.g. 'decoder thread terminated unexpectedly') instead of unwrapping, so a worker-thread  serializing a SharedMemory for D-Bus transmission. fd duplication can fail under resource pressure (process fd-limit exhaustion, which is realistic in a seccomp-sandboxed loader/editor process that may have tight rlimits), turning a recoverable I/O condition into a hard panic that aborts the IPC call instead of returning a serialization error.","fix":"Propagate the try_clone() error through serde's serializer error type (S::Error::custom(...)) instead of unwrapping.","locations":[{"ref":"glycin-utils/src/memory/shared.rs:48-55","code":"   48 | impl Serialize for SharedMemory {\n   49 |     fn serialize<S>(&self, serializer: S) -> Result<S::Ok, S::Error>\n   50 |     where\n   51 |         S: Serializer,\n   52 |     {\n   53 |         zvariant::OwnedFd::from(self.memfd.try_clone().unwrap()).serialize(serializer)\n   54 |     }\n   55 | }","lines":8,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/memory/shared.rs#L48-55"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"SharedMemory::new_memfd does `nix::unistd::ftruncate(&memfd, size.try_into().expect(\"Required memory too large\"))`, panicking if `size: u64` does not fit in `libc::off_t`. `size` ultimately derives from image dimensions/decoder output (e.g. ByteData::new(decoder.total_bytes()) in image_rs.rs), which is attacker-influenced. On 32-bit platforms or any platform where off_t is narrower than u64, a crafted image whose decoded total_bytes exceeds the off_t range turns into a process panic instead of a graceful OutOfMemory/ConversionTooLargerError.","fix":"Replace `.expect(...)` with a `?`-propagated error (map the TryFromIntError into the existing std::io::Error/MemoryAllocationError return path of new_memfd).","locations":[{"ref":"glycin-utils/src/memory/shared.rs:181-193","code":"  181 |     fn new_memfd(size: u64) -> std::io::Result<(OwnedFd, memmap::MmapMut)> {\n  182 |         let memfd = nix::sys::memfd::memfd_create(\n  183 |             c\"glycin-frame\",\n  184 |             nix::sys::memfd::MFdFlags::MFD_CLOEXEC | nix::sys::memfd::MFdFlags::MFD_ALLOW_SEALING,\n  185 |         )?;\n  186 | \n  187 |         nix::unistd::ftruncate(&memfd, size.try_into().expect(\"Required memory too large\"))?;\n  188 | \n  189 |         let raw_fd = memfd.as_raw_fd();\n  190 |         let mmap = unsafe { memmap::MmapMut::map_mut(raw_fd) }?;\n  191 | \n  192 |         Ok((memfd, mmap))\n  193 |     }","lines":13,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/memory/shared.rs#L181-193"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"MemoryFormat::from_f32_internal writes into `target[n * target_channel_size + i]` for each channel without first asserting that `target.len()` is at least `target_definition().len() * target_channel_size`. If a caller passes a target buffer that is too small for target_format, this indexes out of bounds and panics instead of failing gracefully.","fix":"Add a debug_assert!/explicit length check at the top of from_f32_internal verifying target.len() matches the expected byte size for target_format before writing, to turn silent OOB indexing into an actionable assertion message.","locations":[{"ref":"glycin-common/src/memory_format.rs:328-359","code":"  328 |     #[inline]\n  329 |     fn from_f32_internal<T: ChannelValue>(\n  330 |         channels_f32: [f32; 4],\n  331 |         target_format: Self,\n  332 |         target: &mut [u8],\n  333 |     ) {\n  334 |         let target_channel_size = target_format.channel_type().size() as usize;\n  335 | \n  336 |         let premultiply = if target_format.is_premultiplied() {\n  337 |             channels_f32[3]\n  338 |         } else {\n  339 |             1.\n  340 |         };\n  341 | \n  342 |         for (n, def) in target_format.target_definition().iter().enumerate() {\n  343 |             let new_channel = match def {\n  344 |                 Target::R => T::from_f32_normed(channels_f32[0] * premultiply),\n  345 |                 Target::G => T::from_f32_normed(channels_f32[1] * premultiply),\n  346 |                 Target::B => T::from_f32_normed(channels_f32[2] * premultiply),\n  347 |                 Target::A => T::from_f32_normed(channels_f32[3]),\n  348 |                 Target::RgbAvg => {\n  349 |                     T::from_f32_normed((channels_f32[0] + channels_f32[1] + channels_f32[2]) / 3.)\n  350 |                 }\n  351 |             };\n  352 | \n  353 |             let bytes = new_channel.as_bytes_wrapper();\n  354 | \n  355 |             for i in 0..target_channel_size {\n  356 |                 target[n * target_channel_size + i] = bytes[i];\n  357 |             }\n  358 |         }\n  359 |     }","lines":32,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-common/src/memory_format.rs#L328-359"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In the thumbnailer's command-line handler, thumbnail_size (parsed as i32 from the --size option) is converted with `.try_into().unwrap()` to u32. A negative --size value (e.g. a caller bug or malformed thumbnailer invocation by a file manager) causes the TryFromIntError to be unwrapped, panicking the process instead of printing the same kind of usage error already used for missing arguments just above.","fix":"Replace the unwrap() with a checked conversion that prints an error and returns ExitCode::from(2) on negative/invalid size, consistent with the handling of the other missing/invalid arguments in the same function.","locations":[{"ref":"glycin-thumbnailer/src/lib.rs:53-59","code":"   53 |         let Some(thumbnail_size) = args_dict.lookup::<i32>(\"size\").unwrap() else {\n   54 |             eprintln!(\"Error: Size not supplied.\");\n   55 |             return glib::ExitCode::from(2);\n   56 |         };\n   57 | \n   58 |         if let Err(err) = x(&input_uri, &output_path, thumbnail_size.try_into().unwrap()) {\n   59 |             eprintln!(\"Glycin Thumbnailer: {err}\");","lines":7,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-thumbnailer/src/lib.rs#L53-59"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"Frame::desc() computes `self.width * self.memory_format.n_bytes().u32()` with a plain unchecked u32 multiplication. This method is specifically invoked from glycin-core's validate_frame error paths (TextureWrongSize, StrideTooSmall, TextureTooLarge) to describe a Frame that has already been identified as having anomalous/untrusted dimensions - so in a debug build (overflow-checks enabled) the diagnostic-formatting call itself can panic on the very data it is trying to report as invalid.","fix":"Use checked_mul / saturating_mul (e.g. `self.width.checked_mul(self.memory_format.n_bytes().u32()).map_or(\"overflow\".to_string(), |v| v.to_string())`) so the description function can never panic regardless of input.","locations":[{"ref":"glycin-utils/src/api/loader.rs:398-406","code":"  398 |     pub fn desc(&self) -> String {\n  399 |         format!(\n  400 |             \"{}x{} stride: {}, natural_stride: {}\",\n  401 |             self.width,\n  402 |             self.height,\n  403 |             self.stride,\n  404 |             self.width * self.memory_format.n_bytes().u32()\n  405 |         )\n  406 |     }","lines":9,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/api/loader.rs#L398-406"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":false,"description":"Nearly every FFI entry point across loader.rs, creator.rs, image.rs, frame.rs, frame_request.rs, new_frame.rs and encoded_image.rs dereferences a raw C-supplied pointer via `gobject::GlyXxx::from_glib_ptr_borrow(&ptr)` with no null check. glib's from_glib_ptr_borrow only does a `debug_assert!(!ptr.is_null())` (compiled out in release builds) before directly dereferencing the pointer as a GObject and reading its ref_count. A C caller passing NULL (e.g. after a previous call failed and returned NULL, or due to a caller bug) causes a null-pointer dereference / undefined behavior in release builds instead of a controlled error. This is systemic across the whole C ABI surface, not an isolated case.","fix":"Add explicit `if ptr.is_null() { return <safe default / set g_error>; }` guards at the top of every exported FFI function before calling from_glib_ptr_borrow, or centralize this check in a small helper macro/function used consistently across all FFI entry points.","locations":[{"ref":"libglycin/src/loader.rs:46-103","code":"   46 | #[unsafe(no_mangle)]\n   47 | pub unsafe extern \"C\" fn gly_loader_set_sandbox_selector(\n   48 |     loader: *mut GlyLoader,\n   49 |     sandbox_selector: i32,\n   50 | ) {\n   51 |     unsafe {\n   52 |         let sandbox_selector = GlySandboxSelector::from_glib(sandbox_selector);\n   53 |         let obj = gobject::GlyLoader::from_glib_ptr_borrow(&loader);\n   54 | \n   55 |         obj.set_sandbox_selector(sandbox_selector);\n   56 |     }\n   57 | }\n   58 | \n   59 | #[unsafe(no_mangle)]\n   60 | pub unsafe extern \"C\" fn gly_loader_set_accepted_memory_formats(\n   61 |     loader: *mut GlyLoader,\n   62 |     memory_format_selection: u32,\n   63 | ) {\n   64 |     unsafe {\n   65 |         let memory_format_selection =\n   66 |             glycin::MemoryFormatSelection::from_bits_truncate(memory_format_selection);\n   67 |         let obj = gobject::GlyLoader::from_glib_ptr_borrow(&loader);\n   68 | \n   69 |         obj.set_accepted_memory_formats(memory_format_selection);\n   70 |     }\n   71 | }\n   72 | \n   73 | #[unsafe(no_mangle)]\n   74 | pub unsafe extern \"C\" fn gly_l 5c73e8e10c1fefdc21732201/libglycin/src/new_frame.rs#L14-34"},{"ref":"libglycin/src/encoded_image.rs:15-23","code":"   15 | #[unsafe(no_mangle)]\n   16 | pub unsafe extern \"C\" fn gly_encoded_image_get_data(\n   17 |     encoded_image: *mut GlyEncodedImage,\n   18 | ) -> *mut GBytes {\n   19 |     unsafe {\n   20 |         let encoded_image = gobject::GlyEncodedImage::from_glib_ptr_borrow(&encoded_image);\n   21 |         encoded_image.data().into_glib_ptr()\n   22 |     }\n   23 | }","lines":9,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin/src/encoded_image.rs#L15-23"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":false,"description":"UsageTracker::drop unconditionally calls pool.clean_loaders(), which only prunes the `self.loaders` map. UsageTracker is shared by both PooledProcess<LoaderProxy> and PooledProcess<EditorProxy> (constructed generically in Pool::get_process), but `self.editors` is never iterated or pruned anywhere in the file. As a result idle sandboxed editor processes are never removed from the pool: every Arc<RemoteProcess<EditorProxy>> created via get_editor stays referenced in `editors` forever, keeping the sandboxed child process, its D-Bus connection, and its stdio reader threads alive for the lifetime of the application. This is an unbounded resource/process leak for all editor (saving/encoding) workloads.","fix":"Add a clean_editors() method mirroring clean_loaders() that prunes `self.editors`, and call both from UsageTracker::drop (or make UsageTracker generic/aware of which map it belongs to so it cleans the correct one).","locations":[{"ref":"glycin-core/src/pool.rs:38-49","code":"   38 | impl Drop for UsageTracker {\n   39 |     fn drop(&mut self) {\n   40 |         tracing::trace!(\"One process occupation dropped\");\n   41 |         let pool = self.pool.clone();\n   42 | \n   43 |         *self.timeout.lock().unwrap() = Some(spawn_timeout(\n   44 |             self.pool.config.loader_retention_time,\n   45 |             async {\n   46 |                 pool.clean_loaders().await;\n   47 |             },\n   48 |         ));\n   49 |     }","lines":12,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/pool.rs#L38-49"},{"ref":"glycin-core/src/pool.rs:251-278","code":"  251 |     pub(crate) async fn clean_loaders(self: Arc<Self>) {\n  252 |         tracing::debug!(\"Cleaning up loaders\");\n  253 |         let mut loader_map = self.loaders.lock().await;\n  254 | \n  255 |         for (cfg, loaders) in loader_map.iter_mut() {\n  256 |             loaders.retain(|loader| {\n  257 |                 let n_users = loader.n_users();\n  258 |                 let idle = loader.last_use.lock().unwrap().elapsed();\n  259 |                 let drop = n_users == 0 && idle > self.config.loader_retention_time;\n  260 | \n  261 |                 tracing::debug!(\n  262 |                     \"Loader {:?}: drop {drop} users {n_users} (max {}), idle {idle:?} (max {:?})\",\n  263 |                     cfg.exec(),\n  264 |                     self.config.max_parallel_operations,\n  265 |                     self.config.loader_retention_time\n  266 |                 );\n  267 | \n  268 |                 if drop {\n  269 |                     tracing::debug!(\n  270 |                         \"Dropping loader {:?} {}\",\n  271 |                         cfg.exec(),\n  272 |                         Arc::strong_count(&loader.process)\n  273 |                     )\n  274 |                 }\n  275 |                 !drop\n  276 |             });\n  277 |         }\n  278 |     }","lines":28,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/pool.rs#L251-278"},{"ref":"glycin-core/src/pool.rs:64-73","code":"   64 | #[derive(Debug, Default)]\n   65 | pub struct Pool {\n   66 |     loaders: AsyncMutex<\n   67 |         BTreeMap<config::ConfigEntryHash, Vec<Arc<PooledProcess<dbus::LoaderProxy<'static>>>>>,\n   68 |     >,\n   69 |     editors: AsyncMutex<\n   70 |         BTreeMap<config::ConfigEntryHash, Vec<Arc<PooledProcess<dbus::EditorProxy<'static>>>>>,\n   71 |     >,\n   72 |     config: PoolConfig,\n   73 | }","lines":10,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/pool.rs#L64-73"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In Pool::get_process, cancellable.disconnect_cancelled(process_cancellable_tie) (line 233) is only reached on the success path. If dbus::RemoteProcess::new(...).await? (line 230) returns an error, the function returns early via `?` and the signal handler connected at line 215 is never disconnected from the caller-supplied `cancellable`. Although the closure only holds a weak reference to process_cancellable so it won't keep the dead process alive, the signal connection itself stays attached to `cancellable` for its entire lifetime, so on a long-lived shared Cancellable repeated failed loads/edits accumulate dangling signal handlers.","fix":"Disconnect process_cancellable_tie in all return paths, e.g. by wrapping the RemoteProcess::new call so disconnect happens regardless of success or failure (a small drop-guard, or matching on the Result before propagating).","locations":[{"ref":"glycin-core/src/pool.rs:214-233","code":"  214 |         let process_cancellable = gio::Cancellable::new();\n  215 |         let Some(process_cancellable_tie) = cancellable.connect_cancelled(glib::clone!(\n  216 |             #[weak]\n  217 |             process_cancellable,\n  218 |             move |_| process_cancellable.cancel()\n  219 |         )) else {\n  220 |             return Err(ErrorKind::Canceled(None).err());\n  221 |         };\n  222 | \n  223 |         let process = Arc::new(\n  224 |             dbus::RemoteProcess::new(\n  225 |                 config.clone(),\n  226 |                 sandbox_mechanism,\n  227 |                 base_dir,\n  228 |                 &process_cancellable,\n  229 |             )\n  230 |             .await?,\n  231 |         );\n  232 | \n  233 |         cancellable.disconnect_cancelled(process_cancellable_tie);","lines":20,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/pool.rs#L214-233"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Creator::add_frame_with_stride computes `(height - 1) as usize` on a raw u32 with no prior check that height >= 1. If a caller passes height = 0 (e.g. a re-encoding/editing pipeline that forwards width/height derived from another decoded image, or simply a caller bug), this subtraction underflows. In a debug build this panics immediately; in a release build it wraps to u32::MAX, making the subsequent bounds check `texture.len() < stride as usize * (height - 1) as usize + smallest_stride as usize` evaluate against a huge number, which will almost always reject valid input, but on platforms/sizes where the multiplication itself wraps further it can corrupt the safety check this line exists to enforce. The rest of the codebase consistently uses the `glycin_utils::safe_math` helpers (smul/checked_mul) for exactly this kind of arithmetic (see loader.rs validate_frame), but this function uses raw subtraction/multiplication instead.","fix":"Validate `height >= 1` (and `width >= 1`) at the top of add_frame_with_stride and return ErrorKind::WidgthOrHeightZero (already used elsewhere) before doing any arithmetic on height. Replace the raw `height - 1` / `stride as usize * ...` arithmetic with checked_sub/checked_mul or the existing safe_math helpers (smul) used elsewhere in the crate.","locations":[{"ref":"glycin-core/src/api/creator.rs:80-128","code":"   80 |     pub fn add_frame_with_stride(\n   81 new_row_end].copy_from_slice(&source);\n  125 |             }\n  126 | \n  127 |             texture.resize(new_stride * height_, 0);\n  128 |         };","lines":49,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/api/creator.rs#L80-128"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"change_orientation computes `let n_bytes = width * height * pixel_size;` as plain unchecked usize arithmetic, with the enclosing function explicitly tagged `#[allow(clippy::arithmetic_side_effects, clippy::cast_possible_truncation)]` to silence the lint that would normally flag this. width/height/pixel_size ultimately originate from decoded/untrusted image data (via EditingFrame produced in image_rs.rs's Handler::editing_frame, which itself has no upper bound on width*height beyond a checked_mul on stride alone). In a release build (no overflow-checks = true anywhere in the workspace Cargo.toml), a crafted width/height combination causes `width * height * pixel_size` to wrap silently to a small value, so `vec![0; n_bytes]` allocates an undersized buffer. The subsequent rotation loops then index into that undersized `target` buffer using p1 values computed from the *original*, non-wrapped width/height (e.g. `x * height * pixel_size + (height - 1 - y) * pixel_size + i` for Rotation::_270/_90), causing an out-of-bounds index that panics (best case, DoS) or, combined with further wrapping in the index expressions themselves, can produce inconsistent/corrupted writes. This is the only place in the editing pipeline that fully opts out of overflow checking via the allow-lint.","fix":"Remove the `#[allow(clippy::arithmetic_side_effects)]` opt-out and compute n_bytes / row-major indices (p0, p1) with checked arithmetic (e.g. gufo_common::math::Checked / checked! as used in clip.rs), returning an Error on overflow instead of silently wrapping. At minimum, validate width*height*pixel_size against texture.len() before entering the rotation loops.","locations":[{"ref":"glycin-utils/src/editing/orientation.rs:104-199","code":"  104 | #[allow(clippy::arithmetic_side_effects, clippy::cast_possible_truncation)]\n  105 | pub fn change_orientation<F: BasicFrame<FungibleMemory>>(\n  106 |     mut frame: F,\n  107 |     transformation: Orientation,\n  108 | ) -> F {\n  109 |     let stride = frame.stride() as usize;\n  110 |     let width = frame.width() as usize;\n  111 |     let height = frame.height() as usize;\n  112 |     let pixel_size = frame.memory_format().n_bytes().usize();\n  113 | \n  114 |     let n_bytes = width * height * pixel_size;\n  115 | \n  116 |     if transformation.mirror() {\n  117 |         for x in 0..width / 2 {\n  118 |             for y in 0..height {\n  119 |                 for i in 0..pixel_size {\n  120 |                     let p0 = x * pixel_size + y * stride + i;\n  121 |                     let p1 = (width - 1 - x) * pixel_size + y * stride + i;\n  122 |                     frame.texture_mut().swap(p0, p1);\n  123 |                 }\n  124 |             }\n  125 |         }\n  126 |     }\n  127 | \n  128 |     match transformation.rotate() {\n  129 |         Rotation::_0 => frame,\n  130 |         Rotation::_270 => {\n  131 |             let mut target = vec![0; n_bytes];\n  132 |             frame.set_width(height as u32);\n  133 |             frame.set_height(width as u32);\n  134 |             frame.set_stride((height * pixel_size) as u32);\n  135 | \n  136 |             let src = frame.texture_mut();\n  137 | \n  138 |             for x in 0..width {\n  139 |                 for y in 0..height {\n  140 |                     for i in 0..pixel_size {\n  141 |                         let p0 = x * pixel_size + y * stride + i;\n  142 |                         let p1 = x * height * pixel_size + (height - 1 - y) * pixel_size + i;\n  143 |                         target[p1] = src[p0];\n  144 |                     }\n  145 |                 }\n  146 |             }\n  147 | \n  148 |             frame.set_texture(FungibleMemory::from_vec(target));\n  149 | \n  150 |             frame\n  151 |         }\n  152 |         Rotation::_90 => {\n  153 |             let mut target = vec![0; n_bytes];\n  154 |             frame.set_width(height as u32);\n  155 |             frame.set_height(width as u32);\n  156 |             frame.set_stride((height * pixel_size) as u32);\n  157 | \n  158 |             let src = frame.texture_mut();\n  159 | \n  160 |             for x in 0..width {\n  161 |                 for y in 0..height {\n  162 |                     for i in 0..pixel_size {\n  163 |                         let p0 = x * pixel_size + y * stride + i;\n  164 |                         let p1 = (width - 1 - x) * height * pixel_size + y * pixel_size + i;\n  165 |                         target[p1] = src[p0];\n  166 |                     }\n  167 |                 }\n  168 |             }\n  169 | \n  170 |             frame.set_texture(FungibleMemory::from_vec(target));\n  171 | \n  172 |             frame\n  173 |         }\n  174 |         Rotation::_180 => {\n  175 |             let mid_col = width / 2;\n  176 |             let uneven_cols = width % 2 == 1;\n  177 | \n  178 |             let src = frame.texture_mut();\n  179 | \n  180 |             for x in 0..width.div_ceil(2) {\n  181 |                 let y_max = if uneven_cols && mid_col == x {\n  182 |                     height / 2\n  183 |                 } else {\n  184 |                     height\n  185 |                 };\n  186 |                 for y in 0..y_max {\n  187 |                     for i in 0..pixel_size {\n  188 |                         let p0 = x * pixel_size + y * stride + i;\n  189 |                         let p1 = (width - 1 - x) * pixel_size + (height - 1 - y) * stride + i;\n  190 | \n  191 |                         src.swap(p0, p1);\n  192 |                     }\n  193 |                 }\n  194 |             }\n  195 | \n  196 |             frame\n  197 |         }\n  198 |     }\n  199 | }","lines":96,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/editing/orientation.rs#L104-199"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"scale_image_to_16bit() computes `*pixel <<= 16 - plane.bits_per_pixel` where `plane.bits_per_pixel: u8` comes directly from libheif's `heif_image_get_bits_per_pixel_range`, which reflects values parsed from the (attacker-controlled) HEIF/AVIF bitstream. If a malformed or unusual codestream causes libheif to report `bits_per_pixel > 16` (the function is only meant to be called when `is_rgb_chroma_hdr` is true, implying values like 10/12, but there is no explicit clamp/validation before the subtraction), `16 - plane.bits_per_pixel` underflows (panics in debug builds) and the subsequent shift amount would be invalid for a u16 shift in any build.","fix":"Validate `plane.bits_per_pixel` is in `1..=16` before computing the shift, and skip/scale safely (or return an error) otherwise instead of relying on the HDR-chroma branch alone to guarantee the range.","locations":[{"ref":"glycin-loaders/glycin-heif/src/main.rs:95-104","code":"   95 | fn scale_image_to_16bit(image: &mut libheif_rs::Image) {\n   96 |     let plane = image.planes_mut().interleaved.unwrap();\n   97 |     if let Ok(transmuted) = safe_transmute::transmute_many_pedantic_mut::<u16>(plane.data) {\n   98 |         for pixel in transmuted.iter_mut() {\n   99 |             *pixel <<= 16 - plane.bits_per_pixel;\n  100 |         }\n  101 |     } else {\n  102 |         eprintln!(\"Could not transform HDR (16bit) data to u16\");\n  103 |     }\n  104 | }","lines":10,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-heif/src/main.rs#L95-104"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"rotate_sparse() computes `let pos = exif_segment_data_pos + entry.value_offset_position() as usize + gufo::jpeg::EXIF_IDENTIFIER_STRING.len();` using plain `usize` addition with no overflow checking, where `entry.value_offset_position()` is derived from attacker-controlled EXIF/TIFF binary data parsed by gufo_exif. While practically unreachable on 64-bit targets with realistic file sizes, this bypasses the project's own `safe_math::SafeMath`/`SafeConversion` helpers (used elsewhere in this same codebase, e.g. `try_u32()`/`try_u64()`) that exist specifically to avoid raw arithmetic on file-derived offsets.","fix":"Use checked addition (`.checked_add()` or the existing `SafeMath::sadd` helper) for the offset computation and return an error on overflow, consistent with how other dimension/offset arithmetic in this codebase is handled.","locations":[{"ref":"glycin-loaders/glycin-image-rs/src/editor/jpeg.rs:171-174","code":"  171 |         if let Some(entry) = exif.lookup_entry(gufo_common::field::Orientation) {\n  172 |             let pos = exif_segment_data_pos\n  173 |                 + entry.value_offset_position() as usize\n  174 |                 + gufo::jpeg::EXIF_IDENTIFIER_STRING.len();","lines":4,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-image-rs/src/editor/jpeg.rs#L171-174"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Config::guess_mime_type builds the `config` iterator over `self.image_editor` when `editor == true` (to compute candidate identifier complexities), but the actual matching loop on line 163 always searches `self.image_loader`, never `self.image_editor`. This means mime-type guessing for the editor path (called from the editor's `guess_mime_type` trait impl in api/common.rs) computes its complexity ranking from editor identifiers but then looks up matches only among loader identifiers. If a mime type is registered as an editor but has different (or no) identifiers as a loader, the function will either return the wrong mime type or silently fail to detect a valid editor format.","fix":"Use the same map for both the complexity computation and the match lookup. E.g. store the iterator source (image_loader or image_editor) in a variable and reuse it for both the complexities collection and the `find` call, instead of hardcoding `self.image_loader.iter()` in the search loop.","locations":[{"ref":"glycin-core/src/config.rs:131-175","code":"  131 |     pub(crate) fn guess_mime_type(\n  132 |         &self,\n  133 |         path: Option<&Path>,\n  134 |         head: &[u8],\n  135 |         editor: bool,\n  136 |     ) -> Option<MimeType> {\n  137 |         let config: Box<dyn Iterator<Item = (&MimeType, ConfigEntry)>> = if editor {\n  138 |             Box::new(\n  139 |                 self.image_editor\n  140 |                     .iter()\n  141 |                     .map(|(k, v)| (k, ConfigEntry::Editor(v.clone()))),\n  142 |             )\n  143 |         } else {\n  144 |             Box::new(\n  145 |                 self.image_loader\n  146 |                     .iter()\n  147 |                     .map(|(k, v)| (k, ConfigEntry::Loader(v.clone()))),\n  148 |             )\n  149 |         };\n  150 | \n  151 |         let mut complexities = config\n  152 |             .flat_map(|(_, x)| {\n  153 |                 x.identifiers()\n  154 |                     .iter()\n  155 |                     .map(|x| x.complexity())\n  156 |                     .collect::<Vec<_>>()\n  157 |             })\n  158 |             .collect::<Vec<_>>();\n  159 | \n  160 |         complexities.sort();\n  161 | \n  162 |         for complexity in complexities.into_iter().rev() {\n  163 |             let find = self.image_loader.iter().find(|(_, x)| {\n  164 |                 x.identifiers\n     };","lines":8,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/tests/utils.rs#L134-141"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Operations::prepend swaps self with the passed-in operations and then appends `operations.operations` (the original self's ops, now held by the local `operations` var after the swap) but never merges `operations.unknown_operations` into `self.unknown_operations`. The original instance's unknown_operations are silently discarded whenever prepend() is called, even though the doc comment describes prepend as combining the two operation lists.","fix":"Also append `operations.unknown_operations` into `self.unknown_operations` after the operations.append call, e.g. `self.unknown_operations.append(&mut operations.unknown_operations);`.","locations":[{"ref":"glycin-common/src/operations.rs:78-81","code":"   78 |     pub fn prepend(&mut self, mut operations: Operations) {\n   79 |         std::mem::swap(self, &mut operations);\n   80 |         self.operations.append(&mut operations.operations);\n   81 |     }","lines":4,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-common/src/operations.rs#L78-81"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"image_memory_format() exhaustively lists 8 specific MemoryFormat variants accepted from `best_format_for()`'s hardcoded bitflag selection, and falls back to `unreachable!()` for anything else. This is only safe as long as the `MemoryFormatSelection` bitflags passed into `best_format_for()` in `create()` (lines 61-69) are kept in exact sync with the match arms here; if a future change adds a flag to the selection without adding the corresponding arm (or vice versa), this becomes a reachable panic on attacker-supplied edit/create requests rather than a compile error, since the
