or.rs#L169-181"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"The `mount` closure's symlink branch (lines 359-380) does not short-circuit: after handling a symlink with --symlink, execution falls through to the unconditional canonicalize+--ro-bind block below (lines 382-395), which adds a second bwrap argument for the same canonicalized target. This looks intentional (symlink the original path location, and separately bind its resolved target so both are visible inside the sandbox), but the lack of any comment explaining why both branches always run for symlinks makes it easy for a future change to assume only one mount is added.","fix":"Add a one-line comment noting that both the symlink and its resolved target are intentionally mounted, or restructure with an explicit early continue if only one was meant to apply.","locations":[{"ref":"glycin-core/src/sandbox.rs:358-396","code":"  358 |         let mut mount = |command: &mut Command, way: &str, path: &Path| {\n  359 |             if path.is_symlink() {\n  360 |                 if !mounted_paths.iter().any(|x| path.starts_with(x)) {\n  361 |                     match canonicalize(path) {\n  362 |                         Ok(target) => {\n  363 |                             if !mounted_paths.iter().any(|x| path.starts_with(x)) {\n  364 |                                 command.arg(\"--symlink\");\n  365 |                                 command.arg(&target);\n  366 |                                 command.arg(path);\n  367 |                                 tracing::trace!(\"Symlink {path:?} -> {target:?}\");\n  368 |                                 mounted_paths.push(path.to_owned());\n  369 |                             } else {\n  370 |                                 tracing::trace!(\n  371 |                                     \"Parent of symlink path {path:?} already mounted. Skipping.\"\n  372 |                                 );\n  373 |                             }\n  374 |                         }\n  375 |                         Err(err) => tracing::debug!(\"Couldn't canonicalize path {path:?}: {err}\"),\n  376 |                     }\n  377 |                 } else {\n  378 |                     tracing::trace!(\"Parent of symlink {path:?} already mounted. Skipping.\");\n  379 |                 }\n  380 |             }\n  381 | \n  382 |             match canonicalize(path) {\n  383 |                 Ok(path) => {\n  384 |                     if !mounted_paths.iter().any(|x| path.starts_with(x)) {\n  385 |                         command.arg(way);\n  386 |                         command.arg(&path);\n  387 |                         command.arg(&path);\n  388 |                         tracing::trace!(\"Mounting {path:?}\");\n  389 |                         mounted_paths.push(path);\n  390 |                     } else {\n  391 |                         tracing::trace!(\"Parent of mount path {path:?} already mounted. Skipping.\");\n  392 |                     }\n  393 |                 }\n  394 |                 Err(err) => tracing::debug!(\"Couldn't canonicalize path {path:?}: {err}\"),\n  395 |             }\n  396 |         };","lines":39,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/sandbox.rs#L358-396"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"SafeMath::srem for both u32 and u64 calls `self.checked_add(rhs)` instead of `self.checked_rem(rhs)` - an evident copy-paste from the sadd implementation directly above it. Only the usize implementation correctly uses checked_rem. Any future caller of `.srem()` on a u32 or u64 (the trait is part of the crate's public safe-arithmetic API specifically meant to prevent this class of bug) will silently get addition instead of remainder, producing wrong results or wrong overflow errors instead of a correct modulo computation.","fix":"Change both bodies to `self.checked_rem(rhs).ok_or(DimensionTooLargerError)`, matching the usize impl at safe_math.rs:47-49.","locations":[{"ref":"glycin-utils/src/safe_math.rs:61-63","code":"   61 |     fn srem(self, rhs: Self) -> Result<Self, DimensionTooLargerError> {\n   62 |         self.checked_add(rhs).ok_or(DimensionTooLargerError)\n   63 |     }","lines":3,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/safe_math.rs#L61-63"},{"ref":"glycin-utils/src/safe_math.rs:75-77","code":"   75 |     fn srem(self, rhs: Self) -> Result<Self, DimensionTooLargerError> {\n   76 |         self.checked_add(rhs).ok_or(DimensionTooLargerError)\n   77 |     }","lines":3,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/safe_math.rs#L75-77"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"reset_exif_orientation() attempts to rewrite the legacy (non-eXIf-chunk) EXIF orientation tag back to Id after an edit, but the rewritten bytes are only obtained via `Arc::into_inner(exif.raw.buffer)`, which returns `None` whenever any other strong reference to the Arc still exists. If that happens, the whole `if let Some(exif_data) = ...` block is skipped silently (no error logged, no `break`), so the function falls through and the stale orientation tag in the legacy EXIF data is left untouched in the output PNG -- after a rotate/flip edit, the saved file can end up with EXIF metadata claiming an orientation that no longer matches the actual (already-rotated) pixel data, with no diagnostic indicating the reset failed.","fix":"Treat `Arc::into_inner` returning `None` as an explicit failure path: log a warning (similar to the other `if let Err(err) = ...` branches in this function) so silently-stale orientation metadata is at least visible in logs, or restructure to avoid relying on `Arc` uniqueness (e.g. clone the underlying bytes instead of requiring sole ownership).","locations":[{"ref":"glycin-loaders/glycin-image-rs/src/editor/png.rs:110-135","code":"  110 |             if let Some(orientation_entry) = exif.lookup_entry(gufo_common::field::Orientation)\n  111 |                 && orientation_entry.u32() != Some(gufo_common::orientation::Orientation::Id as u32)\n  112 |             {\n  113 |                 if let Err(err) = exif.set_existing(\n  114 |                     gufo_common::field::Orientation,\n  115 |                     gufo_common::orientation::Orientation::Id as u32,\n  116 |                 ) {\n  117 |                     log::info!(\"Failed to update Exif orientation tag {err}\");\n  118 |                 }\n  119 |                 if let Some(exif_data) =\n  120 |                     Arc::into_inner(exif.raw.buffer).and_then(|x| x.into_inner().ok())\n  121 |                 {\n  122 |                     drop(chunks);\n  123 |                     if let Err(err) = gufo::png::remove_chunk!(png, chunk) {\n  124 |                         log::info!(\"Failed to remove chunk: {err}\");\n  125 |                     }\n  126 |                     let new_chunk = gufo::png::NewChunk::new(\n  127 |                         gufo::png::ChunkType::eXIf,\n  128 |                         exif_data.into_inner(),\n  129 |                     );\n  130 |                     if let Err(err) = png.insert_chunk(new_chunk) {\n  131 |                         log::info!(\"Failed to insert eXIf chunk: {err}\");\n  132 |                     }\n  133 |                     break;\n  134 |                 }\n  135 |             }","lines":26,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-image-rs/src/editor/png.rs#L110-135"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"MagicBytes::parse's hex-escape state machine (states Backslash, Hex1, Hex2) does not check the final state after the character loop. If the identifier string in a .conf file ends mid-escape sequence (e.g. '0:\\x4' with only one hex digit, or a trailing lone backslash), the loop simply exits and the incomplete/dangling escape is silently dropped instead of returning a parse error, producing a MagicBytes rule with fewer bytes than the admin intended.","fix":"After the for loop, match on the final `state` and return an Err for any non-State::None terminal state (Backslash, Hex1, Hex2) so malformed escape sequences are reported instead of silently truncated.","locations":[{"ref":"glycin-core/src/config/indentifier.rs:93-148","code":"   93 | impl MagicBytes {\n   94 |     fn parse(pos: &str, sbytes: &str) -> Result<Self, String> {\n   95 |         enum State {\n   96 |             None,\n   97 |             Backslash,\n   98 |             Hex1,\n   99 |             Hex2(char),\n  100 |         }\n  101 | \n  102 |         let pos = pos\n  103 |             .parse()\n  104 |             .map_err(|err| format!(\"Failed to parse position: {err}\"))?;\n  105 | \n  106 |         let mut state = State::None;\n  107 |         let mut bytes = Vec::new();\n  108 | \n  109 |         for char in sbytes.chars() {\n  110 |             state = match state {\n  111 |                 State::None => match char {\n  112 |                     '\\\\' => State::Backslash,\n  113 |                     c => {\n  114 |                         if !c.is_ascii() {\n  115 |                             return Err(format!(\"Not an ascii char: {c}\"));\n  116 |                         }\n  117 |                         bytes.push(c as u8);\n  118 |                         State::None\n  119 |                     }\n  120 |                 },\n  121 |                 State::Backslash => match char {\n  122 |                     '\\\\' => {\n  123 |                         bytes.push(b'\\\\');\n  124 |                         State::None\n  125 |                     }\n  126 |                     c => {\n  127 |                         if c == 'x' {\n  128 |                             State::Hex1\n  129 |                         } else {\n  130 |                             return Err(format!(\"Escape sequence \\\\{c} not supported\"));\n  131 |                         }\n  132 |                     }\n  133 |                 },\n  134 |                 State::Hex1 => State::Hex2(char),\n  135 |                 State::Hex2(c1) => {\n  136 |                     let s = format!(\"{c1}{char}\");\n  137 |                     bytes.push(\n  138 |                         u8::from_str_radix(&s, 16)\n  139 |                             .map_err(|err| format!(\"Invalid hex number '{s}': {err}\"))?,\n  140 |                     );\n  141 |                     State::None\n  142 |                 }\n  143 |             }\n  144 |         }\n  145 | \n  146 |         Ok(Self { pos, bytes })\n  147 |     }\n  148 | }","lines":56,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/config/indentifier.rs#L93-148"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"done_background spawns the done() RPC to the sandboxed editor process via spawn_detached and discards the Result entirely. If the sandboxed process returns a RemoteError (or the D-Bus call fails), there is no log message and no way for callers to know the editable image's cleanup/finalization call failed.","fix":"Log the error inside the spawned future, e.g. wrap arc.done(edit_request_path) with an async block that matches on the Result and tracing::warn!()s on Err before discarding it.","locations":[{"ref":"glycin-core/src/dbus.rs:363-368","code":"  363 |     pub fn done_background(self: Arc<Self>, image: &EditableImage) {\n  364 |         let edit_request_path = image.edit_request_path();\n  365 |         let arc = self.clone();\n  366 | \n  367 |         util::spawn_detached(arc.done(edit_request_path));\n  368 |     }","lines":6,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/dbus.rs#L363-368"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"SharedMemory's Deref/DerefMut impls call `.expect(\"SharedMemory haven't been sealed before use.\")` if `mmap` is None, and MMapOptions::DerefMut panics if the memory is sealed read-only (\"Shared memory has been sealed and can't be written to anymore.\"). These are internal-invariant guards (acceptable as last-resort assertions), but because SharedMemory implements plain Deref/DerefMut rather than exposing a fallible accessor, every consumer of the type (including generic code in editing/* operating through the ByteData trait) can trigger a panic from a simple `&*shared_memory` if the seal-state invariant is ever violated by a future code change, with no compiler-enforced safeguard.","fix":"Consider a fallible `try_as_slice()`/`try_as_mut_slice()` API surfaced through ByteData for call sites that can reasonably encounter an unsealed/sealed-readonly buffer, reserving the panicking Deref for call sites that have already established the invariant by construction.","locations":[{"ref":"glycin-utils/src/memory/shared.rs:240-258","code":"  240 | impl Deref for SharedMemory {\n  241 |     type Target = [u8];\n  242 | \n  243 |     #[inline]\n  244 |     fn deref(&self) -> &[u8] {\n  245 |         self.mmap\n  246 |             .as_ref()\n  247 |             .expect(\"SharedMemory haven't been sealed before use.\")\n  248 |     }\n  249 | }\n  250 | \n  251 | impl DerefMut for SharedMemory {\n  252 |     #[inline]\n  253 |     fn deref_mut(&mut self) -> &mut [u8] {\n  254 |         self.mmap\n  255 |             .as_mut()\n  256 |             .expect(\"SharedMemory haven't been sealed before use.\")\n  257 |     }\n  258 | }","lines":19,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/memory/shared.rs#L240-258"},{"ref":"glycin-utils/src/memory/shared.rs:33-42","code":"   33 | impl DerefMut for MMapOptions {\n   34 |     fn deref_mut(&mut self) -> &mut Self::Target {\n   35 |         match self {\n   36 |             Self::Mutable(x) => x.deref_mut(),\n   37 |             Self::ReadOnly(_) => {\n   38 |                 panic!(\"Shared memory has been sealed and can't be written to anymore.\")\n   39 |             }\n   40 |         }\n   41 |     }\n   42 | }","lines":10,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/memory/shared.rs#L33-42"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"debug_file() is invoked from compare_images() only when a texture comparison already failed, to save a diagnostic PNG under a relative 'failures' directory. If that directory does not exist (it is never created anywhere in the test suite), texture.save_to_png(new_path).unwrap() panics with an unrelated 'No such file or directory' I/O error, which replaces/obscures the actual texture-deviation assertion failure the test was trying to report, making CI failures harder to diagnose.","fix":"Create the 'failures' directory if missing (std::fs::create_dir_all) before writing, or use CARGO_TARGET_TMPDIR like write_tmp() does elsewhere in the test suite so the path is guaranteed to exist.","locations":[{"ref":"tests/utils.rs:78-86","code":"   78 | async fn debug_file(path: impl AsRef<Path>) {\n   79 |     let texture = get_texture(&path).await;\n   80 |     let mut new_path = PathBuf::from(\"failures\");\n   81 |     new_path.push(path.as_ref().file_name().unwrap());\n   82 |     let mut extension = new_path.extension().unwrap().to_os_string();\n   83 |     extension.push(\".png\");\n   84 |     new_path.set_extension(extension);\n   85 |     texture.save_to_png(new_path).unwrap();\n   86 | }","lines":9,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/tests/utils.rs#L78-86"},{"ref":"tests/utils.rs:125-127","code":"  125 |     if !texture_eq {\n  126 |         debug_file(&path).await;\n  127 |     }","lines":3,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/tests/utils.rs#L125-127"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"critical","easy":false,"description":"gly_creator_set_sandbox_selector is declared in the public C header (glycin.h) and the gir-generated sys bindings as `gboolean gly_creator_set_sandbox_selector(GlyCreator *creator, GlySandboxSelector sandbox_selector)`, but the actual #[no_mangle] Rust implementation in creator.rs is a verbatim copy-paste of gly_loader_set_sandbox_selector: it takes `loader: *mut GlyLoader`, calls `gobject::GlyLoader::from_glib_ptr_borrow(&loader)` (reinterpreting the GlyCreator* pointer the C caller actually passes as a GlyLoader), and returns `()` instead of `gboolean`. Any C/Rust caller using the documented API (including the auto-generated libglycin-rebind safe wrapper at libglycin-rebind/libglycin-rebind/src/auto/creator.rs:209-215, which calls ffi::gly_creator_set_sandbox_selector and reads back a bool from the return value) triggers type confusion by treating GlyCreator object memory as GlyLoader, plus an ABI mismatch since the real function never writes a gboolean return value that the caller's calling convention expects to read. This is undefined behavior and a real, easily triggered bug in shipped code (the rebind crate dogfoods this exact path).","fix":"Rewrite gly_creator_set_sandbox_selector in creator.rs to take `creator: *mut GlyCreator`, borrow it via `gobject::GlyCreator::from_glib_ptr_borrow(&creator)`, call the creator's own set_sandbox_selector, and return a `glib::ffi::gboolean` matching the header's declared `gboolean` return type (mirroring the pattern used by gly_creator_set_encoding_quality/gly_creator_set_encoding_compression in the same file).","locations":[{"ref":"libglycin/src/creator.rs:38-49","code":"   38 | #[unsafe(no_mangle)]\n   39 | pub unsafe extern \"C\" fn gly_creator_set_sandbox_selector(\n   40 |     loader: *mut GlyLoader,\n   41 |     sandbox_selector: i32,\n   42 | ) {\n   43 |     unsafe {\n   44 |         let sandbox_selector = GlySandboxSelector::from_glib(sandbox_selector);\n   45 |         let obj = gobject::GlyLoader::from_glib_ptr_borrow(&loader);\n   46 | \n   47 |         obj.set_sandbox_selector(sandbox_selector);\n   48 |     }\n   49 | }","lines":12,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin/src/creator.rs#L38-49"},{"ref":"libglycin/include/glycin.h:1067-1076","code":" 1067 |  * gly_creator_set_sandbox_selector:\n 1068 |  * @creator:\n 1069 |  * @sandbox_selector: Method by which the sandbox mechanism is selected\n 1070 |  *\n 1071 |  * Selects which sandbox mechanism should be used. The default without calling this function is [enum@SandboxSelector]`.AUTO`.\n 1072 |  *\n 1073 |  * Since: 2.0\n 1074 |  */\n 1075 | gboolean gly_creator_set_sandbox_selector(GlyCreator *creator,\n 1076 |                                           GlySandboxSelector sandbox_selector);","lines":10,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin/include/glycin.h#L1067-1076"},{"ref":"libglycin-rebind/libglycin-rebind/sys/src/lib.rs:390-393","code":"  390 |     pub fn gly_creator_set_sandbox_selector(\n  391 |         creator: *mut GlyCreator,\n  392 |         sandbox_selector: GlySandboxSelector,\n  393 |     ) -> gboolean;","lines":4,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin-rebind/libglycin-rebind/sys/src/lib.rs#L390-393"},{"ref":"libglycin-rebind/libglycin-rebind/src/auto/creator.rs:209-215","code":"  209 |     #[doc(alias = \"gly_creator_set_sandbox_selector\")]\n  210 |     #[doc(alias = \"sandbox-selector\")]\n  211 |     pub fn set_sandbox_selector(&self, sandbox_selector: SandboxSelector) -> bool {\n  212 |         unsafe {\n  213 |             from_glib(ffi::gly_creator_set_sandbox_selector(\n  214 |                 self.to_glib_none().0,\n  215 |                 sandbox_selector.into_glib(),","lines":7,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin-rebind/libglycin-rebind/src/auto/creator.rs#L209-215"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"gly_cicp_copy and gly_cicp_free call GlyCicp::from_glib_none(cicp) / GlyCicp::from_glib_full(cicp) directly on a caller-supplied `*mut GlyCicp` without checking for null, unlike gly_new_frame_set_color_icc_profile in the same crate which explicitly checks icc_profile.is_null() before dereferencing. Since GlyCicp is a plain boxed struct (not a GObject with a debug_assert guard), passing NULL here is more likely to immediately segfault with no diagnostic.","fix":"Add a null check at the start of both functions: return null_mut() from gly_cicp_copy and return early (no-op) from gly_cicp_free when the pointer is null, matching glib's usual g_free/g_boxed_copy null-tolerant conventions.","locations":[{"ref":"libglycin/src/frame.rs:84-94","code":"   84 | #[unsafe(no_mangle)]\n   85 | pub unsafe extern \"C\" fn gly_cicp_copy(cicp: *mut GlyCicp) -> *mut GlyCicp {\n   86 |     unsafe { GlyCicp::from_glib_none(cicp).clone().into_glib_ptr() }\n   87 | }\n   88 | \n   89 | #[unsafe(no_mangle)]\n   90 | pub unsafe extern \"C\" fn gly_cicp_free(cicp: *mut GlyCicp) {\n   91 |     unsafe {\n   92 |         drop(GlyCicp::from_glib_full(cicp));\n   93 |     }\n   94 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/libglycin/src/frame.rs#L84-94"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Creator::add_frame_with_stride is a public API that performs row-copy logic (texture[old_row_begin..old_row_end] / texture[new_row_begin..new_row_end]) using plain slice indexing derived from caller-supplied width/height/stride. While the smallest_stride > stride and texture.len() bounds checks guard the common cases, the height==0 underflow described separately bypasses these guards; more generally the function has no overflow protection on `row * old_stride` / `row * new_stride` for very large height/stride combinations on 32-bit targets (usize is 32-bit there), where the multiplication could wrap and lead to out-of-bounds slice indexing panics instead of the intended graceful error.","fix":"Use checked arithmetic (checked_mul/checked_add) for old_row_begin/old_row_end/new_row_begin/new_row_end and return ErrorKind::ConversionTooLargerError (or similar) on overflow instead of relying on usize wraparound being unreachable in practice.","locations":[{"ref":"glycin-core/src/api/creator.rs:110-128","code":"  110 |         if smallest_stride != stride {\n  111 |             let old_stride = stride as usize;\n  112 |             let new_stride = smallest_stride as usize;\n  113 | \n  114 |             let height_ = height as usize;\n  115 |             let mut source = vec![0; new_stride];\n  116 | \n  117 |             for row in 0..height_ {\n  118 |                 let old_row_begin = row * old_stride;\n  119 |                 let old_row_end = old_row_begin + new_stride;\n  120 |                 source.copy_from_slice(&texture[old_row_begin..old_row_end]);\n  121 | \n  122 |                 let new_row_begin = row * new_stride;\n  123 |                 let new_row_end = new_row_begin + new_stride;\n  124 |                 texture[new_row_begin..new_row_end].copy_from_slice(&source);\n  125 |             }\n  126 | \n  127 |             texture.resize(new_stride * height_, 0);\n  128 |         };","lines":19,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/api/creator.rs#L110-128"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"glycin-raw's render() builds the output Frame with a hardcoded `MemoryFormat::R16g16b16` regardless of the actual length of the `data16`/`data8` buffer returned by libopenraw, and `Frame::new()` does not itself validate that `texture.len()` matches `width * height * bytes_per_pixel(memory_format)`. If `rendered_image()` ever returns a buffer whose channel count or sample size doesn't match the assumed 3x16-bit-per-pixel layout (e.g. a monochrome RAW or a codec path that yields 8-bit data routed through the data16 branch), the resulting Frame silently carries a mismatched length, which downstream consumers reading `width*height*6` bytes from a shorter buffer would read out of bounds.","fix":"Validate `data8.len() == width * height * 6` (for the assumed R16g16b16 layout) before constructing the Frame, returning a ProcessError if it doesn't match, rather than trusting the hardcoded MemoryFormat to always be correct for whatever libopenraw produced.","locations":[{"ref":"glycin-loaders/glycin-raw/src/bin/glycin-raw.rs:16-40","code":"   16 | pub fn render<B: ByteData>(rawdata: &libopenraw::RawImage) -> Result<Frame<B>, ProcessError> {\n   17 |     let rawimage = rawdata\n   18 |         .rendered_image(&libopenraw::RenderingOptions::default())\n   19 |         .expected_error()?;\n   20 |     let width = rawimage.width();\n   21 |     let height = rawimage.height();\n   22 | \n   23 |     let data8 = if let Some(data16) = rawimage.data16() {\n   24 |         unsafe {\n   25 |             std::slice::from_raw_parts(data16.as_ptr().cast::<u8>(), std::mem::size_of_val(data16))\n   26 |         }\n   27 |     } else {\n   28 |         rawimage.data8().expected_error()?\n   29 |     };\n   30 | \n   31 |     let texture = B::try_from_slice(data8).internal_error()?;\n   32 | \n   33 |     Frame::new(\n   34 |         width.try_u32()?,\n   35 |         height.try_u32()?,\n   36 |         MemoryFormat::R16g16b16,\n   37 |         texture,\n   38 |     )\n   39 |     .internal_error()\n   40 | }","lines":25,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-raw/src/bin/glycin-raw.rs#L16-40"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Pool::get_process holds the AsyncMutex lock for the entire pooled_processes map (all loaders, or all editors, sharing one config-keyed BTreeMap) across the full RemoteProcess::new(...).await call when no idle process is found. RemoteProcess::new spawns a thread, runs bwrap/seccomp setup, waits for the child to start, and performs a D-Bus handshake -- all while the lock is held. Concurrent calls to load/edit images with different configs (or the same config needing a second process) are serialized behind this single lock for the duration of an entire sandbox spawn, even though they operate on logically independent map entries.","fix":"Narrow the critical section: release the outer map lock (or use a per-config-hash lock) before awaiting RemoteProcess::new, and only re-acquire it briefly to insert the newly spawned process into the Vec.","locations":[{"ref":"glycin-core/src/pool.rs:191-248","code":"  191 |         let mut pooled_processes = pooled_processes.lock().await;\n  192 |         let pooled_processes = pooled_processes.entry(config_hash).or_default();\n  193 | \n  194 |         for process in pooled_processes.iter() {\n  195 |             if process.process.process_disconnected.load(Ordering::Relaxed) {\n  196 |                 tracing::debug!(\"Existing loader/editor in pool is disconnected. Trying next.\");\n  197 |             } else if process.n_users() >= self.config.max_parallel_operations {\n  198 |                 tracing::debug!(\n  199 |                     \"Existing loader/editor in pool is at 'max_parallel_operations'. Trying next.\"\n  200 |                 );\n  201 |             } else {\n  202 |                 tracing::debug!(\"Using existing loader from pool.\");\n  203 |                 let mut current_usage_tracker = process.useage_tracker.lock().unwrap();\n  204 |                 let usage_tracker = current_usage_tracker.upgrade().unwrap_or_else(|| {\n  205 |                     Arc::new(UsageTracker::new(self.clone(), process._timeout.clone()))\n  206 |                 });\n  207 |                 *current_usage_tracker = Arc::downgrade(&usage_tracker);\n  208 |                 return Ok((process.clone(), usage_tracker));\n  209 |             }\n  210 |         }\n  211 | \n  212 |         tracing::debug!(\"No existing loader/editor in pool. Spawning new one.\");\n  213 | \n  214 |         let process_cancellable = gio::Cancellable::new();\n  215 |         let Some(process_cancellable_tie) = cancellable.connect_cancelled(glib::clone!(\n  216 |             #[weak]\n  217 |             process_cancellable,\n  218 |             move |_| process_cancellable.cancel()\n  219 |         )) else {\n  220 |             return Err(ErrorKind::Canceled(None).err());\n  221 |         };\n  222 | \n  223 |         let process = Arc::new(\n  224 |             dbus::RemoteProcess::new(\n  225 |                 config.clone(),\n  226 |                 sandbox_mechanism,\n  227 |                 base_dir,\n  228 |                 &process_cancellable,\n  229 |             )\n  230 |             .await?,\n  231 |         );\n  232 | \n  233 |         cancellable.disconnect_cancelled(process_cancellable_tie);\n  234 | \n  235 |         let _timeout = Arc::new(Mutex::new(None));\n  236 | \n  237 |         let usage_tracker = Arc::new(UsageTracker::new(self.clone(), _timeout.clone()));\n  238 | \n  239 |         let pp = Arc::new(PooledProcess {\n  240 |             last_use: Mutex::new(Instant::now()),\n  241 |             _timeout,\n  242 |             process: process.clone(),\n  243 |             useage_tracker: Mutex::new(Arc::downgrade(&usage_tracker)),\n  244 |         });\n  245 | \n  246 |         pooled_processes.push(pp.clone());\n  247 | \n  248 |         Ok((pp, usage_tracker))","lines":58,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-core/src/pool.rs#L191-248"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"In the animated GIF/APNG/WebP replay loop, every time the animation finishes and starts over (`format.is_none()` after a full loop), `ImageRsFormat::create(data.clone(), &mime_type)` clones the entire underlying `Vec<u8>` file buffer (`data: Cursor<Vec<u8>>`). For a large animated image played on a loop (the common case for GIF/WebP viewers), this means the full source file bytes are cloned on every single loop iteration indefinitely, not just once at startup, which is wasted allocation/copy work proportional to file size times number of loops.","fix":"Wrap the underlying buffer in an `Arc<Vec<u8>>` (or similar cheaply-cloneable handle) and have `ImageRsFormat::create` accept a `Cursor` over the shared reference, so re-creating the decoder for a loop replay doesn't re-copy the whole file each time.","locations":[{"ref":"glycin-loaders/glycin-image-rs/src/animated.rs:19-21","code":"   19 |         if format.is_none() {\n   20 |             format = ImageRsFormat::create(data.clone(), &mime_type).ok();\n   21 |         }","lines":3,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-image-rs/src/animated.rs#L19-21"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The image-rs loader explicitly clones the whole input buffer (`data.clone()` where data is `Cursor<Vec<u8>>`) just to pass a second independent copy into `gufo::RawMetadata::for_guessed`, with a TODO comment acknowledging this is unnecessary. For every single still or animated image opened, this duplicates the full file contents in memory at load time, on top of the one-time-per-loop clone already happening in animated.rs.","fix":"Restructure so the metadata extraction consumes/borrows the same buffer used for `ImageRsFormat::create` rather than requiring an independent owned clone, e.g. by extracting metadata first and handing the (possibly-modified) buffer to `ImageRsFormat::create` afterward.","locations":[{"ref":"glycin-loaders/glycin-image-rs/src/lib.rs:54-61","code":"   54 |         let mut format = ImageRsFormat::create(data.clone(), &mime_type)?;\n   55 |         if let Err(err) = format.set_no_limits() {\n   56 |             eprint!(\"Failed to unset decoder limits: {err}\");\n   57 |         }\n   58 |         let mut image_info = format.info();\n   59 | \n   60 |         // TODO: Unnecessary clone of data\n   61 |         let metadata = gufo::RawMetadata::for_guessed(data.into_inner());","lines":8,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-image-rs/src/lib.rs#L54-61"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"SharedMemory::seal busy-polls fcntl(F_ADD_SEALS) in a tight loop with only a 1ms async delay between retries, for up to 10 seconds, while waiting for the loader process to drop its mmap. Under contention (e.g. many concurrent frame requests sealing buffers), this results in up to 1000 syscalls/sec per in-flight seal operation purely spinning on EBUSY, rather than using a more efficient blocking/notification mechanism.","fix":"If achievable, reduce polling overhead with an exponential backoff (e.g. start at 1ms, double up to some cap) instead of a fixed 1ms retry interval, to reduce syscall churn during high contention while still sealing promptly in the common case.","locations":[{"ref":"glycin-utils/src/memory/shared.rs:213-237","code":"  213 |     async fn seal(&self, seals: fcntl::SealFlag) -> Result<(), MemoryAllocationError> {\n  214 |         let start = std::time::Instant::now();\n  215 | \n  216 |         // Sealing returns a ResourceBusy for SealWrite until no readable maps exist\n  217 |         // anymore. Practically, we are waiting for the loader to close it's\n  218 |         // mmap to the memfd.\n  219 |         loop {\n  220 |             // 🦭\n  221 |             let seal = fcntl::fcntl(&self.memfd, fcntl::FcntlArg::F_ADD_SEALS(seals));\n  222 | \n  223 |             match seal {\n  224 |                 Ok(_) => break,\n  225 |                 Err(err) if start.elapsed() > std::time::Duration::from_secs(10) => {\n  226 |                     // Give up after some time and return the error\n  227 |                     return Err(MemoryAllocationError(err.to_string()));\n  228 |                 }\n  229 |                 Err(_) => {\n  230 |                     // Try again after short waiting time\n  231 |                     futures_timer::Delay::new(std::time::Duration::from_millis(1)).await\n  232 |                 }\n  233 |             }\n  234 |         }\n  235 | \n  236 |         Ok(())\n  237 |     }","lines":25,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/memory/shared.rs#L213-237"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`impl Default for SharedMemory` has a body of `todo!()` (always panics if called) and is not required by any trait bound (ByteData does not require Default) and has zero call sites anywhere in the repository. It exists purely as an unused panic landmine that would trip up any future code relying on `SharedMemory::default()`/`Default::default()` type inference picking this impl.","fix":"Remove the unused Default impl, or implement it properly (e.g. an empty/zero-length memfd) if some future use case genuinely needs it.","locations":[{"ref":"glycin-utils/src/memory/shared.rs:68-72","code":"   68 | impl Default for SharedMemory {\n   69 |     fn default() -> Self {\n   70 |         todo!()\n   71 |     }\n   72 | }","lines":5,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-utils/src/memory/shared.rs#L68-72"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`eprint!` (no trailing newline) is used to log a decoder-limits failure, inconsistent with the `eprintln!`/`log::*` macros used everywhere else in this file and sibling loaders for similar non-fatal warnings; subsequent stderr output will run together with this message on the same line.","fix":"Use `eprintln!` (or the `log` crate, consistent with most other warnings in this codebase) instead of `eprint!`.","locations":[{"ref":"glycin-loaders/glycin-image-rs/src/lib.rs:56","code":"   56 |             eprint!(\"Failed to unset decoder limits: {err}\");","lines":1,"link":"https://gitlab.gnome.org/GNOME/glycin/-/blob/eef3468358ee56b65c73e8e10c1fefdc21732201/glycin-loaders/glycin-image-rs/src/lib.rs#L56"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"negligible","easy":true,"description":"The ALLOWED_SYSCALLS list contains duplicate entries for \"fcntl\" and \"set_mempolicy\", each listed twice. This is harmless (the loop just calls add_rule twice for the same syscall) but indicates a copy-paste mistake in a security-sensitive allowlist that should be exact and reviewable.","fix":"Remove the duplicate \"fcntl\" entry at line 64 and the duplicate \"set_mempolicy\" entry at line 128.","locations":[{"ref":"glycin-core/src/sandbox.rs:63-64","code":"   63 |     \"fcntl\",\n <script>
(function(){

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {

}

function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history

  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();

    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));

}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);

  const lines = [
    '# Project metadata for the code audit report (all fields optional).',

    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
