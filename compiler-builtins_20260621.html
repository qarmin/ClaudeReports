<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`build_musl_math` shells out to `sed` and `nm` and unwraps the spawn result (`.output().unwrap()` / `.status().unwrap()`). On a host lacking these tools (e.g. a minimal CI image or Windows path that slipped past the earlier `cfg!(windows)`/msvc guard) the build script panics with a raw `No such file or directory` rather than a actionable message. `validate_archive_symbols` runs `nm` unconditionally on non-Windows.","fix":"Wrap the `Command::output()/status()` calls with `.unwrap_or_else(|e| panic!(\"failed to run `sed`/`nm`: {e}; install binutils\"))` so the missing-tool case is diagnosable.","locations":[{"ref":"crates/musl-math-sys/build.rs:136-148","code":"  136 |     let sed_stat = Command::new(\"sed\")\n  137 |         .arg(\"-f\")\n  138 |         .arg(musl_dir.join(\"tools/mkalltypes.sed\"))\n  139 |         .arg(arch_dir.join(\"bits/alltypes.h.in\"))\n  140 |         .arg(musl_dir.join(\"include/alltypes.h.in\"))\n  141 |         .stderr(Stdio::inherit())\n  142 |         .output()\n  143 |         .unwrap();\n  144 |     assert!(\n  145 |         sed_stat.status.success(),\n  146 |         \"sed command failed: {:?}\",\n  147 |         sed_stat.status\n  148 |     );","lines":13,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/musl-math-sys/build.rs#L136-L148"},{"ref":"crates/musl-math-sys/build.rs:315-320","code":"  315 |     let out = Command::new(\"nm\")\n  316 |         .arg(\"-guj\")\n  317 |         .arg(out_path)\n  318 |         .stderr(Stdio::inherit())\n  319 |         .output()\n  320 |         .unwrap();","lines":6,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/musl-math-sys/build.rs#L315-L320"},{"ref":"crates/musl-math-sys/build.rs:337-342","code":"  337 |     let out = Command::new(\"nm\")\n  338 |         .arg(\"-gUj\")\n  339 |         .arg(out_path)\n  340 |         .stderr(Stdio::inherit())\n  341 |         .output()\n  342 |         .unwrap();","lines":6,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/musl-math-sys/build.rs#L337-L342"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"At the final accumulation, remquof uses plain `q += 1` (line 88) where its f64 twin remquo uses `q = q.wrapping_add(1)` (line 90). The f64 version was deliberately changed to wrapping_add to avoid an arithmetic overflow at exactly this site, documented by the comment `// TODO: this matches musl behavior, but it is incorrect` and guarded by the `test_q_overflow` regression test. The f32 path has the identical `q <<= 1` accumulation in the mod loop, so `q` can likewise overflow u32 when `ex - ey` is large; with the non-wrapping `+= 1` this panics on overflow in debug/overflow-checked builds instead of wrapping like the f64 twin. The f32 twin was never given the same fix or a regression test. (The earlier in-loop `q += 1` sites at lines 54/63 are non-wrapping in both twins, so those match; only the final site diverges.)","fix":"Change `q += 1;` at remquof.rs:88 to `q = q.wrapping_add(1);` to match the f64 twin, and add an overflow regression test mirroring `test_q_overflow`.","locations":[{"ref":"libm/src/math/remquof.rs:88","code":"   88 |         q += 1;","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm/src/math/remquof.rs#L88"},{"ref":"libm/src/math/remquo.rs:89-90","code":"   89 |         // TODO: this matches musl behavior, but it is incorrect\n   90 |         q = q.wrapping_add(1);","lines":2,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm/src/math/remquo.rs#L89-L90"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`find_math_source` unwraps `path.extension().unwrap()` for every entry in the arch-specific directory (line 262), assuming all files have an extension. A file without an extension (or a subdirectory, which is not filtered here unlike the top-level loop) would panic. The top-level loop guards directories and missing stems, but the arch loop does neither consistently.","fix":"Use `path.extension().is_some_and(|e| e == \"s\")` and skip directories / extensionless files instead of unwrapping.","locations":[{"ref":"crates/musl-math-sys/build.rs:257-268","code":"  257 |     if let Some(arch_dir) = arch_dir {\n  258 |         for item in fs::read_dir(arch_dir).unwrap() {\n  259 |             let path = item.unwrap().path();\n  260 |             let sym_name = path.file_stem().unwrap();\n  261 | \n  262 |             if path.extension().unwrap() == \"s\" {\n  263 |                 // FIXME: we never build assembly versions since we have no good way to\n  264 |                 // rename the symbol (our options are probably preprocessor or objcopy).\n  265 |                 continue;\n  266 |             }\n  267 |             map.insert(sym_name.to_str().unwrap().to_owned(), path);\n  268 |         }","lines":12,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/musl-math-sys/build.rs#L257-L268"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`for_each_object` parses the file as an archive first; if archive parsing *succeeds* but a member or its object data fails to parse, it `.expect()`s and aborts. More importantly, if archive parse fails it falls back to object parse, and only then panics with both errors - but the panic message at the bottom is unreachable when the archive parsed successfully yet contained a bad member (that path panics earlier with `failed to access member`). Edge-case robustness only; inputs are CI-controlled.","fix":"Propagate member/object parse errors as part of the same fallback diagnostic, or document that members are assumed valid once the archive header parses.","locations":[{"ref":"crates/symbol-check/src/main.rs:567-595","code":"  567 |     fn for_each_object(&self, mut f: impl FnMut(ObjFile, &str)) {\n  568 |         // Try as an archive first.\n  569 |         let as_archive = self.as_archive_file();\n  570 |         if let Ok(archive) = as_archive {\n  571 |             for member in archive.members() {\n  572 |                 let member = member.expect(\"failed to access member\");\n  573 |                 let obj_data = member\n  574 |                     .data(self.data.as_slice())\n  575 |                     .expect(\"failed to access object\");\n  576 |                 let obj = ObjFile::parse(obj_data).expect(\"failed to parse object\");\n  577 |                 f(obj, &String::from_utf8_lossy(member.name()));\n  578 |             }\n  579 | \n  580 |             return;\n  581 |         }\n  582 | \n  583 |         // Fall back to parsing as an object file.\n  584 |         let as_obj = self.as_obj_file();\n  585 |         if let Ok(obj) = as_obj {\n  586 |             f(obj, &self.path.to_string_lossy());\n  587 |             return;\n  588 |         }\n  589 | \n  590 |         panic!(\n  591 |             \"failed to parse as either archive or object file: {:?}, {:?}\",\n  592 |             as_archive.unwrap_err(),\n  593 |             as_obj.unwrap_err(),\n  594 |         );\n  595 |     }","lines":29,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/symbol-check/src/main.rs#L567-L595"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`parse` accepts a leading `-0x` hex prefix (checks `s.starts_with(\"-0x\")`), but `strip_radix_prefix` only strips a leading `0x` and then calls `.unwrap()`. Passing a negative hex bit pattern that does not contain `p` (e.g. `eval libm <int_op> -0x10`, or a float-bits arg like `-0xff`) therefore makes `strip_prefix(\"0x\")` return `None` and panics with an unhelpful message instead of the intended `invalid ... input` diagnostic. The `0x`/`-0x` branch in `parse` and the strip logic disagree.","fix":"Strip an optional leading `-` before/along with the `0x`/`0b` prefix in `strip_radix_prefix` (or return the original string when the prefix is absent rather than unwrapping), so negative hex/binary inputs parse or fail gracefully.","locations":[{"ref":"crates/util/src/main.rs:367-375","code":"  367 |     if s.starts_with(\"0x\") || s.starts_with(\"-0x\") {\n  368 |         return T::from_str_radix(s, 16).unwrap_or_else(|_| panic!(\"{}\", msg()));\n  369 |     }\n  370 | \n  371 |     if s.starts_with(\"0b\") {\n  372 |         return T::from_str_radix(s, 2).unwrap_or_else(|_| panic!(\"{}\", msg()));\n  373 |     }\n  374 | \n  375 |     s.parse().unwrap_or_else(|_| panic!(\"{}\", msg()))","lines":9,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/util/src/main.rs#L367-L375"},{"ref":"crates/util/src/main.rs:453-461","code":"  453 | fn strip_radix_prefix(s: &str, radix: u32) -> &str {\n  454 |     if radix == 16 {\n  455 |         s.strip_prefix(\"0x\").unwrap()\n  456 |     } else if radix == 2 {\n  457 |         s.strip_prefix(\"0b\").unwrap()\n  458 |     } else {\n  459 |         s\n  460 |     }\n  461 | }","lines":9,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/util/src/main.rs#L453-L461"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `parse_hex`, once the significand fills up (`sig >> 124 != 0`), the binary exponent is accumulated with plain `exp += 4` (and `exp -= 4` after the point) on an `i32`. These are non-saturating unlike the decimal-exponent path which uses `saturating_mul`/`saturating_add_unsigned`. A pathological input with hundreds of millions of hex digits would overflow `exp`, panicking in debug builds or wrapping to a wrong result in release. The code comments acknowledge this as a FIXME.","fix":"Use saturating arithmetic for the `exp += 4` / `exp -= 4` updates (e.g. `exp = exp.saturating_add(4)` and `saturating_sub`), consistent with the decimal-exponent handling, so absurdly long inputs saturate instead of overflowing.","locations":[{"ref":"libm/src/math/support/hex_float.rs:252-265","code":"  252 |                 if (sig >> 124) == 0 {\n  253 |                     sig <<= 4;\n  254 |                     sig |= digit as u128;\n  255 |                 } else {\n  256 |                     // FIXME: it is technically possible for exp to overflow if parsing a string with >500M digits\n  257 |                     exp += 4;\n  258 |                     inexact |= digit != 0;\n  259 |                 }\n  260 |                 // Up until the fractional point, the value grows\n  261 |                 // with more digits, but after it the exponent is\n  262 |                 // compensated to match.\n  263 |                 if seen_point {\n  264 |                     exp -= 4;\n  265 |                 }","lines":14,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm/src/math/support/hex_float.rs#L252-L265"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The `lgamma`/`lgamma_r` near-zero XFAIL allowance differs between f32 and f64 in a way that looks copy-paste-derived rather than measured. For f32 the suppressed range is `input.0 > -13.0625 && input.0 < -2.0`; for f64 it is `input.0 > -32.0 && input.0 < -2.0`. The f64 range is much wider (down to -32 vs -13.0625) yet f64 has *more* precision available, so one would expect the suppressed region to be similar or narrower, not 2.5x wider. Because this branch returns `XFAIL_NOCHECK` (Skip), it silently drops all checking for `lgamma`/`lgamma_r` over that entire interval; if the f64 bound is too generous, real regressions in that band will never fail a test. Worth confirming both bounds were independently derived from observed worst cases.","fix":"Re-derive the suppressed intervals from measured inaccuracy for each type and document why f64's is wider, or narrow the f64 range to the actually-failing region.","locations":[{"ref":"libm-test/src/precision.rs:271-278","code":"  271 |         // FIXME(correctness): lgammaf has high relative inaccuracy near its zeroes\n  272 |         if matches!(ctx.base_name, BaseName::Lgamma | BaseName::LgammaR)\n  273 |             && input.0 > -13.0625\n  274 |             && input.0 < -2.0\n  275 |             && (expected.abs() < F::ONE || (input.0 - input.0.round()).abs() < 0.02)\n  276 |         {\n  277 |             return XFAIL_NOCHECK;\n  278 |         }","lines":8,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/precision.rs#L271-L278"},{"ref":"libm-test/src/precision.rs:314-321","code":"  314 |         // FIXME(correctness): lgamma has high relative inaccuracy near its zeroes\n  315 |         if matches!(ctx.base_name, BaseName::Lgamma | BaseName::LgammaR)\n  316 |             && input.0 > -32.0\n  317 |             && input.0 < -2.0\n  318 |             && (expected.abs() < F::ONE || (input.0 - input.0.round()).abs() < 0.02)\n  319 |         {\n  320 |             return XFAIL_NOCHECK;\n  321 |         }","lines":8,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/precision.rs#L314-L321"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`unop_common` only enforces bit-exact NaN propagation for `Fabs`. The same requirement applies to `Copysign` (the function comment on lines 367-368 even turn CheckAction::Custom(Err(anyhow::anyhow!(\"NaNs have different bitpatterns\")));\n  372 |         }\n  373 |     }","lines":22,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/precision.rs#L352-L373"},{"ref":"libm-test/src/precision.rs:431-435","code":"  431 |     // MPFR only has one NaN bitpattern; skip tests in cases where the first argument would take\n  432 |     // the sign of a NaN second argument. The default NaN checks cover other cases.\n  433 |     if ctx.base_name == BaseName::Copysign && ctx.basis == CheckBasis::Mpfr && input.1.is_nan() {\n  434 |         return SKIP;\n  435 |     }","lines":5,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/precision.rs#L431-L435"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`base_name` strips suffixes in a loop over `strip`, applying `strip_suffix` for every suffix in the list and stripping each one that matches in sequence. Because it iterates the whole list and strips each matching suffix once (not repeatedly), a name like `narrow_f128_f64` strips `_f64` (leaving `narrow_f128`) then `_f128` is checked later in the list against `narrow_f128` and also strips, yielding `narrow` - this happens to be the intended result, but it relies on the suffix list being ordered so the inner-most suffix appears later than the outer one. The comment claims it is `repeated` (implying a loop until stable) but it is a single pass; adding a triple-suffix name or reordering `strip` could silently produce wrong base names.","fix":"Either loop until no suffix strips (a fixpoint) as the comment implies, or document that exactly two passes are assumed and assert the suffix ordering invariant.","locations":[{"ref":"crates/libm-macros/src/lib.rs:498-513","code":"  498 |     // Attempt to strip unambiguous suffixes first. This is repeated so e.g.\n  499 |     // `extend_f32_f64` turns into `extend`.\n  500 |     let strip = [\n  501 |         \"_f16\", \"_f32\", \"_f64\", \"_f128\", \"_i32\", \"_i64\", \"_i128\", \"_u32\", \"_u64\", \"_u128\", \"f16\",\n  502 |         \"f32\", \"f64\", \"f128\",\n  503 |     ];\n  504 | \n  505 |     let mut any_found = false;\n  506 |     let mut ret = name;\n  507 | \n  508 |     for sfx in strip {\n  509 |         if let Some(stripped) = ret.strip_suffix(sfx) {\n  510 |             ret = stripped;\n  511 |             any_found = true;\n  512 |         }\n  513 |     }","lines":16,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/libm-macros/src/lib.rs#L498-L513"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `do_classify`, the f16 suffix branch is a standalone `if let ... { continue } else { panic! }`. When the input does NOT end in `f16`, the `else` arm only runs if the suffix matched; but the structure means the f16 branch's `else` is taken only inside the matched block, so it is fine. The real issue is the mixed control flow: f16 uses standalone `if`, f32/f64 use `if/else if`, and f128 uses a standalone `if`. Because f32/f64 are chained but f16 and f128 are not, a value like `1.0f64` is handled, but the inconsistent structure makes it easy to introduce a fall-through bug when adding new suffixes (e.g. a future `bf16` suffix added after the f32/f64 chain would not be reachable from the chain). Cosmetic/maintainability rather than an active bug.","fix":"Use a single uniform `if let ... else if let ...` chain for all four suffixes, with one final `panic!` for the no-suffix case.","locations":[{"ref":"crates/util/src/main.rs:128-166","code":"  128 |     for s in inputs {\n  129 |         if let Some(s) = s.strip_suffix(\"f16\") {\n  130 |             cfg_if! {\n  131 |                 if #[cfg(f16_enabled)] {\n  132 |                     let s = s.trim_end_matches(\"_\");\n  133 |                     let x: f16 = parse(&[s], 0);\n  134 |                     classify_print(x);\n  135 |                     continue;\n  136 |                 } else {\n  137 |                     panic!(\"parsing this type requires f16 support: `{s}`\");\n  138 |                 }\n  139 |             }\n  140 |         };\n  141 |         if let Some(s) = s.strip_suffix(\"f32\") {\n  142 |             let s = s.trim_end_matches(\"_\");\n  143 |             let x: f32 = parse(&[s], 0);\n  144 |             classify_print(x);\n  145 |             continue;\n  146 |         } else if let Some(s) = s.strip_suffix(\"f64\") {\n  147 |             let s = s.trim_end_matches(\"_\");\n  148 |             let x: f64 = parse(&[s], 0);\n  149 |             classify_print(x);\n  150 |             continue;\n  151 |         }\n  152 |         if let Some(s) = s.strip_suffix(\"f128\") {\n  153 |             cfg_if! {\n  154 |                 if #[cfg(all(f128_enabled, feature = \"build-mpfr\"))] {\n  155 |                     let s = s.trim_end_matches(\"_\");\n  156 |                     let x: f128 = parse_rug(&[s], 0);\n  157 |                     classify_print(x);\n  158 |                     continue;\n  159 |                 } else {\n  160 |                     panic!(\"parsing this type requires f128 support and \\\n  161 |                             the `build-mpfr` feature: `{s}`\");\n  162 |                 }\n  163 |             }\n  164 |         };\n  165 |         panic!(\"float type must be specified with a `f*` suffix: `{s}`\");\n  166 |     }","lines":39,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/util/src/main.rs#L128-L166"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The edge-case subnormal sweep `for shift in (0..F::SIG_BITS).step_by(F::SIG_BITS as usize / 5)` divides the significand-bit width by 5 to choose a step. For f16 `SIG_BITS == 10`, giving step 2 (ok); for f32 `SIG_BITS == 23`, step `23/5 == 4`; for f64 `SIG_BITS == 52`, step 10; for f128 `SIG_BITS == 112`, step 22. This is integer division, so the number and placement of sampled subnormal magnitudes varies non-uniformly by type and the top bits of the significand are not always sampled (e.g. f32 samples shifts 0,4,8,12,16,20 - missing bit 22). For the f8 test type `SIG_BITS == 3`, `3/5 == 0`, which makes `step_by(0)` panic; f8 is not run through this generator today, but the construct is fragile. Coverage of near-subnormal edge values is thus uneven and the rationale for `/5` is undocumented.","fix":"Use `.max(1)` on the step and document the intended number of sample points, or iterate a fixed set of shifts (including `SIG_BITS-1`) independent of the `/5` heuristic.","locations":[{"ref":"libm-test/src/generate/edge_cases.rs:61-67","code":"   61 |     for shift in (0..F::SIG_BITS).step_by(F::SIG_BITS as usize / 5) {\n   62 |         let v = F::from_bits(one << shift);\n   63 |         count_up(v, 2, values);\n   64 |         count_down(v, 2, values);\n   65 |         count_up(-v, 2, values);\n   66 |         count_down(-v, 2, values);\n   67 |     }","lines":7,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/generate/edge_cases.rs#L61-L67"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `iteration_count`, when `ctx.override_iterations` is set the override is applied to `total_iterations` *before* the per-argument root is taken (lines 309-323): the code then still computes `ntests = sqrt/cbrt(total_iterations)` for 2-/3-arg functions. So an explicit override of N for a binary function yields `sqrt(N)` per arg and `N` total cases - i.e. the override is interpreted as a total, not as the requested count, which is plausibly the intent but is undocumented and surprising given the field doc on `CheckCtx::override_iterations` says \"override the value returned by iteration_count\" (and `iteration_count` returns the *per-arg* `ntests`, not the total). A caller setting the override expecting per-arg count gets `sqrt` of it.","fix":"Clarify in the doc comment whether `override_iterations` is a total or per-argument count, and apply it consistently (e.g. skip the root reduction when overridden if it is meant to be per-arg).","locations":[{"ref":"libm-test/src/run_cfg.rs:309-323","code":"  309 |     let mut overridden = false;\n  310 |     if let Some(count) = ctx.override_iterations {\n  311 |         total_iterations = count;\n  312 |         overridden = true;\n  313 |     }\n  314 | \n  315 |     // Adjust for the number of inputs\n  316 |     let ntests = match t_env.input_count {\n  317 |         1 => total_iterations,\n  318 |         2 => (total_iterations as f64).sqrt().ceil() as u64,\n  319 |         3 => (total_iterations as f64).cbrt().ceil() as u64,\n  320 |         _ => panic!(\"test has more than three arguments\"),\n  321 |     };\n  322 | \n  323 |     let total = ntests.pow(t_env.input_count.try_into().unwrap());","lines":15,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/run_cfg.rs#L309-L323"},{"ref":"libm-test/src/run_cfg.rs:83-84","code":"   83 |     /// If specified, this value will override the value returned by [`iteration_count`].\n   84 |     pub override_iterations: Option<u64>,","lines":2,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/run_cfg.rs#L83-L84"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`check_near_count` returns 100 surrounding points per point of interest when optimizations are enabled, but `count_up`/`count_down` stop early at infinity/their saturation bound and the per-constant fan-out is added unconditionally for *every* interesting point and every float constant. Combined with `float_edge_cases` calling `count_up`+`count_down` around ~14 anchor points plus all `F::consts()`, the generated edge-case vector is O(near_points * anchors) and is then fully materialized into a `Vec`, sorted, and deduped on every test. For binary/ternary functions this is squared/cubed via `product2`/ `product3`. This is acceptable but the 100x default is large and undocumented; nothing caps the f128 case where each `count_up` of 100 ULPs is cheap but the cartesian product is not. Not a correctness bug, but a performance/scaling cliff worth a comment or cap.","fix":"Document the chosen counts and consider capping the total edge-case product (as `iteration_count` does for spaced tests) so multi-arg edge-case generation can't blow up.","locations":[{"ref":"libm-test/src/run_cfg.rs:434-450","code":"  434 | pub fn check_near_count(ctx: &CheckCtx) -> u64 {\n  435 |     assert_eq!(\n  436 |         ctx.gen_kind,\n  437 |         GeneratorKind::EdgeCases,\n  438 |         \"check_near_count is intended for edge case tests\"\n  439 |     );\n  440 |     if cfg!(optimizations_enabled) {\n  441 |         // Taper based on the number of inputs.\n  442 |         match ctx.input_count() {\n  443 |             1 | 2 => 100,\n  444 |             3 => 50,\n  445 |             x => panic!(\"unexpected argument count {x}\"),\n  446 |         }\n  447 |     } else {\n  448 |         8\n  449 |     }\n  450 | }","lines":17,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/run_cfg.rs#L434-L450"},{"ref":"libm-test/src/generate/edge_cases.rs:31-67","code":"   31 |     count_up(F::ONE, near_points, values);\n   32 |     count_up(F::ZERO, near_points, values);\n   33 |     count_up(F::NEG_ONE, near_points, values);\n   34 |     count_down(F::ONE, near_points, values);\n   35 |     count_down(F::ZERO, near_points, values);\n   36 |     count_down(F::NEG_ONE, near_points, values);\n   37 |     values.push(F::NEG_ZERO);\n   38 | \n   39 |     // Check values near the extremes\n   40 |     count_up(F::NEG_INFINITY, near_points, values);\n   41 |     count_down(F::INFINITY, near_points, values);\n   42 |     count_down(domain_end, near_points, values);\n   43 |     count_up(domain_start, near_points, values);\n   44 |     count_down(domain_start, near_points, values);\n   45 |     count_up(domain_end, near_points, values);\n   46 |     count_down(domain_end, near_points, values);\n   47 | \n   48 |     // Check some special values that aren't included in the above ranges\n   49 |     values.push(F::NAN);\n   50 |     values.push(F::NEG_NAN);\n   51 |     values.extend(F::consts().iter());\n   52 | \n   53 |     // Check around the maximum subnormal value\n   54 |     let sub_max = F::from_bits(F::SIG_MASK);\n   55 |     count_up(sub_max, near_points, values);\n   56 |     count_down(sub_max, near_points, values);\n   57 |     count_up(-sub_max, near_points, values);\n   58 |     count_down(-sub_max, near_points, values);\n   59 | \n   60 |     // Check a few values around the subnormal range\n   61 |     for shift in (0..F::SIG_BITS).step_by(F::SIG_BITS as usize / 5) {\n   62 |         let v = F::from_bits(one << shift);\n   63 |         count_up(v, 2, values);\n   64 |         count_down(v, 2, values);\n   65 |         count_up(-v, 2, values);\n   66 |         count_down(-v, 2, values);\n   67 |     }","lines":37,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/generate/edge_cases.rs#L31-L67"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`validate_int` evaluates `SpecialCase::check_int(...)` and then, when `gen_kind == GeneratorKind::List`, discards the result entirely (the `_ if ctx.gen_kind == List` arm comes first in the match and forces a plain `actual == expected`). renced in a comment in scalbn.rs), so impact is limited, but it is a latent trap if anyone starts using it.","fix":"Return `(self.to_bits() & Self::EXP_MASK) == Self::Int::ZERO && (self.to_bits() & Self::SIG_MASK) != Self::Int::ZERO`, i.e. also require a non-zero fraction so that zero is excluded.","locations":[{"ref":"libm/src/math/support/float_traits.rs:165-168","code":"  165 |     #[allow(dead_code)]\n  166 |     fn is_subnormal(self) -> bool {\n  167 |         (self.to_bits() & Self::EXP_MASK) == Self::Int::ZERO\n  168 |     }","lines":4,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm/src/math/support/float_traits.rs#L165-L168"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In the spaced-input generators for two-argument tuples, the step count for the *second* argument (`max_steps1`) is computed using `iteration_count(ctx, 0)` instead of `iteration_count(ctx, 1)`. The argument index `argnum` is the only thing that differs between the two calls (it selects the per-argument range / domain). For the `($ity, $ity)` and `($ity, u32)` integer generators this means both arguments are sized as if they were argument 0. While `iteration_count` currently returns a value that is mostly symmetric across args, this is a latent copy-paste bug: any future per-argument iteration tuning (or the `argnum`-based logging inside `iteration_count`, which now reports the wrong arg) is silently wrong, and the exhaustive-vs-nonexhaustive decision for arg 1 uses the wrong budget. It also mislabels the log line (\"arg 1/2\" emitted twice).","fix":"Change the two `let max_steps1 = iteration_count(ctx, 0);` lines to `iteration_count(ctx, 1)`.","locations":[{"ref":"libm-test/src/generate/spaced.rs:300-301","code":"  300 |                 let max_steps0 = iteration_count(ctx, 0);\n  301 |                 let max_steps1 = iteration_count(ctx, 0);","lines":2,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/generate/spaced.rs#L300-L301"},{"ref":"libm-test/src/generate/spaced.rs:334-335","code":"  334 |                 let max_steps0 = iteration_count(ctx, 0);\n  335 |                 let max_steps1 = iteration_count(ctx, 0);","lines":2,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/generate/spaced.rs#L334-L335"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`exec_cargo_with_args` parses Cargo's JSON output and unwraps many fields that may legitimately be absent. `j[\"message\"][\"rendered\"].as_str().unwrap()` (line 143) panics if a `compiler-message` has no rendered text (possible for some diagnostics), and `fpath.as_str().unwrap()` / `path.extension().map(|ex| ex.to_str().unwrap())` assume valid UTF-8 paths. A non-UTF-8 artifact path or a rendered-less message would crash the CI tool rather than producing a clear error.","fix":"Use `as_str().unwrap_or_default()` / pattern-match the optional fields, and skip artifacts with non-UTF-8 paths with a warning rather than unwrapping.","locations":[{"ref":"crates/symbol-check/src/main.rs:142-143","code":"  142 |         if reason == \"compiler-message\" {\n  143 |             println!(\"{}\", j[\"message\"][\"rendered\"].as_str().unwrap());","lines":2,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/symbol-check/src/main.rs#L142-L143"},{"ref":"crates/symbol-check/src/main.rs:158-163","code":"  158 |         for fpath in j[\"filenames\"].as_array().expect(\"filenames not an array\") {\n  159 |             let path = fpath.as_str().expect(\"file name not a string\");\n  160 |             let path = PathBuf::from(path);\n  161 | \n  162 |             if CHECK_EXTENSIONS.contains(&path.extension().map(|ex| ex.to_str().unwrap())) {\n  163 |                 let fname = path.file_name().unwrap().to_str().unwrap();","lines":6,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/symbol-check/src/main.rs#L158-L163"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`validate_float` computes `ulp_diff = act_bits.checked_sub(exp_bits).unwrap().abs()`. The signed bit representations come from `to_bits().signed()`; for opposite-sign finite values whose signed-bit subtraction overflows `SignedInt`, `checked_sub` returns `None` and this `.unwrap()` panics rather than producing a test failure message. The earlier `signum` check (line 322-325) guards most opposite-sign cases, but only after the NaN/infinity short-circuits, and `signum` treats +0/-0 and equal-sign-but-huge-magnitude differently than the bit subtraction; a mismatched pair that passes the sign check but still overflows on subtraction turns a should-be-failure into a harness panic. A panic aborts the whole test binary instead of reporting the specific failing input cleanly.","fix":"Replace the `.unwrap()` with a `bail!`/`ensure!` that reports the offending input, or compute the ULP distance via the unsigned `ulp_between` helper which cannot overflow.","locations":[{"ref":"libm-test/src/test_traits.rs:331-334","code":"  331 |         let act_bits = actual.to_bits().signed();\n  332 |         let exp_bits = expected.to_bits().signed();\n  333 | \n  334 |         let ulp_diff = act_bits.checked_sub(exp_bits).unwrap().abs();","lines":4,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/test_traits.rs#L331-L334"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`logspace` asserts `steps >= 2` via `steps.checked_sub(F::Int::ONE).expect(\"`steps` must be at least 2\")`, and `linear_ints` similarly does `steps.checked_sub(1).unwrap()`. These step counts ultimately come from `iteration_count`, which for 2-/3-arg functions returns `ceil(sqrt/cbrt(total))`; with the non-optimized path forcing `total_iterations = 800` and the `*= arg_multiplier`/slow-platform reductions, the per-arg `ntests` is always >= 2 in practice, but nothing structurally guarantees the generators never receive `steps == 1` (e.g. a future `override_iterations(1)` on a unary spaced test). If that happens the test harness panics instead of degrading. Defensive only.","fix":"Saturate `steps` to a minimum of 2 inside the generators (or validate the override) rather than panicking.","locations":[{"ref":"libm-test/src/num.rs:242-247","code":"  242 |     let steps = steps\n  243 |         .checked_sub(F::Int::ONE)\n  244 |         .expect(\"`steps` must be at least 2\");\n  245 |     let between = ulp_between(start, end).expect(\"`start` or `end` is NaN\");\n  246 |     let spacing = (between / steps).max(F::Int::ONE);\n  247 |     let steps = steps.min(between); // At maximum, one step per ULP","lines":6,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/num.rs#L242-L247"},{"ref":"libm-test/src/num.rs:269","code":"  269 |     let spaces: u128 = steps.checked_sub(1).unwrap().into();","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/num.rs#L269"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `div`, `get_iterations::<F>()` and `reciprocal_precision::<F>()` are both `const fn` but are called as ordinary runtime calls, and `get_iterations` is additionally re-invoked inside `reciprocal_precision`. They depend only on the monomorphized type `F`, so the results are compile-time constants. Forcing const evaluation (e.g. via a `const { }` block) would guarantee they fold away and would let the `panic!`s in `reciprocal_precision` become compile-time errors for invalid configurations instead of relying on optimization.","fix":"Evaluate these in `const { get_iterations::<F>() }` / `const { reciprocal_precision::<F>() }` blocks so they are guaranteed to be computed at compile time and validity panics fire at compile time.","locations":[{"ref":"compiler-builtins/src/float/div.rs:120-121","code":"  120 |     let (mut half_iterations, full_iterations) = get_iterations::<F>();\n  121 |     let recip_precision = reciprocal_precision::<F>();","lines":2,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/div.rs#L120-L121"},{"ref":"compiler-builtins/src/float/div.rs:553-572","code":"  553 | const fn reciprocal_precision<F: Float>() -> u16 {\n  554 |     let (half_iterations, full_iterations) = get_iterations::<F>();\n  555 | \n  556 |     if full_iterations < 1 {\n  557 |         panic!(\"Must have at least one full iteration\");\n  558 |     }\n  559 | \n  560 |     // FIXME(tgross35): calculate this programmatically\n  561 |     if F::BITS == 32 && half_iterations == 2 && full_iterations == 1 {\n  562 |         74u16\n  563 |     } else if F::BITS == 32 && half_iterations == 0 && full_iterations == 3 {\n  564 |         10\n  565 |     } else if F::BITS == 64 && half_iterations == 3 && full_iterations == 1 {\n  566 |         220\n  567 |     } else if F::BITS == 128 && half_iterations == 4 && full_iterations == 1 {\n  568 |         13922\n  569 |     } else {\n  570 |         panic!(\"Invalid number of iterations\")\n  571 |     }\n  572 | }","lines":20,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/div.rs#L553-L572"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"In the x86_64 memcmp byte fallback closure, when two bytes differ the result expression reads each pointer a second time (`a.read()`/`b.read()` after already reading them for the comparison). The compiler very likely CSEs these volatile-free reads, but the source reads the same locations up to twice unnecessarily.","fix":"Bind the read values once: `let (av, bv) = (a.read(), b.read()); if av != bv { return i32::from(av) - i32::from(bv); }`.","locations":[{"ref":"compiler-builtins/src/mem/x86_64.rs:154-162","code":"  154 |     let c1 = |mut a: *const u8, mut b: *const u8, n| {\n  155 |         for _ in 0..n {\n  156 |             if a.read() != b.read() {\n  157 |                 return i32::from(a.read()) - i32::from(b.read());\n  158 |             }\n  159 |             a = a.add(1);\n  160 |             b = b.add(1);\n  161 |         }\n  162 |         0","lines":9,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/mem/x86_64.rs#L154-L162"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`validate` (in `for_each_function`) repeatedly scans the whole `ALL_OPERATIONS` slice with `.iter().any(...)` once per mentioned function name (skip/only/attributes/fn_extra), giving O(mentions * total_ops). With the function count here this is trivial, but the same O(n*m) pattern recurs in the `fn_extra` coverage check (`map.keys().any(...)` per op). Not a real-world problem given input sizes; noted for completeness.","fix":"If op counts grow, build a `HashSet<&str>` of valid names once and look up mentions against it.","locations":[{"ref":"crates/libm-macros/src/lib.rs:196-204","code":"  196 |     for mentioned in all_mentioned_fns {\n  197 |         if !ALL_OPERATIONS.iter().any(|func| mentioned == func.name) {\n  198 |             let e = syn::Error::new(\n  199 |                 mentioned.span(),\n  200 |                 format!(\"unrecognized function name `{mentioned}`\"),\n  201 |             );\n  202 |             return Err(e);\n  203 |         }\n  204 |     }","lines":9,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/libm-macros/src/lib.rs#L196-L204"},{"ref":"crates/libm-macros/src/lib.rs:298-304","code":"  298 |         let mut fns_not_covered = Vec::new();\n  299 |         for func in &fn_list {\n  300 |             if !map.keys().any(|key| key == func.name) {\n  301 |                 // `name` was not mentioned in the `match` statement\n  302 |                 fns_not_covered.push(func);\n  303 |             }\n  304 |         }","lines":7,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/libm-macros/src/lib.rs#L298-L304"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`Consts::<F>::new()` and the whole `Consts` struct are recomputed and the constant array re-materialized on every call to `F::consts()`, which `float_edge_cases` calls once per argument per test via `values.extend(F::consts().iter())`. The computation is trivial (a handful of bit ops) so impact is negligible, but since these are pure functions of the type they could be `const` or cached. Noted only for completeness.","fix":"Optionally make the constants `const` per type or memoize; low priority.","locations":[{"ref":"libm-test/src/num.rs:146-196","code":"  146 | impl<F: FloatExt> Consts<F> {\n  147 |     fn new() -> Self {\n  148 |         let top_sigbit_mask = F::Int::ONE << (F::SIG_BITS - 1);\n  149 |         let pos_nan = F::EXP_MASK | top_sigbit_mask;\n  150 |         let max_qnan = F::EXP_MASK | F::SIG_MASK;\n  151 |         let min_snan = F::EXP_MASK | F::Int::ONE;\n  152 |         let max_snan = (F::EXP_MASK | F::SIG_MASK) ^ top_sigbit_mask;\n  153 | \n  154 |         let neg_nan = pos_nan | F::SIGN_MASK;\n  155 |         let neg_max_qnan = max_qnan | F::SIGN_MASK;\n  156 |         let neg_min_snan = min_snan | F::SIGN_MASK;\n  157 |         let neg_max_snan = max_snan | F::SIGN_MASK;\n  158 | \n  159 |         Self {\n  160 |             pos_nan: F::from_bits(pos_nan),\n  161 |             neg_nan: F::from_bits(neg_nan),\n  162 |             max_qnan: F::from_bits(max_qnan),\n  163 |             min_snan: F::from_bits(min_snan),\n  164 |             max_snan: F::from_bits(max_snan),\n  165 |             neg_max_qnan: F::from_bits(neg_max_qnan),\n  166 |             neg_min_snan: F::from_bits(neg_min_snan),\n  167 |             neg_max_snan: F::from_bits(neg_max_snan),\n  168 |         }\n  169 |     }\n  170 | \n  171 |     pub fn iter(self) -> impl Iterator<Item = F> {\n  172 |         // Destructure so we get unused warnings if we forget a list entry.\n  173 |         let Self {\n  174 |             pos_nan,\n  175 |             neg_nan,\n  176 |             max_qnan,\n  177 |             min_snan,\n  178 |             max_snan,\n  179 |             neg_max_qnan,\n  180 |             neg_min_snan,\n  181 |             neg_max_snan,\n  182 |         } = self;\n  183 | \n  184 |         [\n  185 |             pos_nan,\n  186 |             neg_nan,\n  187 |             max_qnan,\n  188 |             min_snan,\n  189 |             max_snan,\n  190 |             neg_max_qnan,\n  191 |             neg_min_snan,\n  192 |             neg_max_snan,\n  193 |         ]\n  194 |         .into_iter()\n  195 |     }\n  196 | }","lines":51,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/num.rs#L146-L196"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"medium","easy":true,"description":"libm/src/math/approx/hypot.rs defines a `sq` helper and a `hypot` function, but it is never declared as a module: approx/mod.rs only declares `mod cbrtf64;`. Commit 543ab4e4 git-moved hypot.rs into the approx/ directory (\"Move the existing implementation to the `approx` module\") but did not add a `mod hypot;` declaration or re-export, so the entire file is uncompiled dead code. The intended `approx::hypot` is unreachable; only the unrelated top-level `math::hypot` is built.","fix":"Add `mod hypot;` (and `pub use hypot::hypot;` if it is meant to be exposed) to libm/src/math/approx/mod.rs; otherwise delete libm/src/math/approx/hypot.rs.","locations":[{"ref":"libm/src/math/approx/mod.rs:6-8","code":"    6 | mod cbrtf64;\n    7 | \n    8 | pub use cbrtf64::cbrtf64;","lines":3,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm/src/math/approx/mod.rs#L6-L8"},{"ref":"libm/src/math/approx/hypot.rs:1-72","code":"    1 | use super::sqrt;\n    2 | \n    3 | const SPLIT: f64 = 134217728. + 1.; // 0x1p27 + 1 === (2 ^ 27) + 1\n    4 | \n    5 | fn sq(x: f64) -> (f64, f64) {\n    6 |     let xh: f64;\n    7 |     let xl: f64;\n    8 |     let xc: f64;\n    9 | \n   10 |     xc = x * SPLIT;\n   11 |     xh = x - xc + xc;\n   12 |     xl = x - xh;\n   13 |     let hi = x * x;\n   14 |     let lo = xh * xh - hi + 2. * xh * xl + xl * xl;\n   15 |     (hi, lo)\n   16 | }\n   17 | \n   18 | #[cfg_attr(assert_no_panic, no_panic::no_panic)]\n   19 | pub fn hypot(mut x: f64, mut y: f64) -> f64 {\n   20 |     let x1p700 = f64::from_bits(0x6bb0000000000000); // 0x1p700 === 2 ^ 700\n   21 |     let x1p_700 = f64::from_bits(0x1430000000000000); // 0x1p-700 === 2 ^ -700\n   22 | \n   23 |     let mut uxi = x.to_bits();\n   24 |     let mut uyi = y.to_bits();\n   25 |     let uti;\n   26 |     let ex: i64;\n   27 |     let ey: i64;\n   28 |     let mut z: f64;\n   29 | \n   30 |     /* arrange |x| >= |y| */\n   31 |     uxi &= -1i64 as u64 >> 1;\n   32 |     uyi &= -1i64 as u64 >> 1;\n   33 |     if uxi < uyi {\n   34 |         uti = uxi;\n   35 |         uxi = uyi;\n   36 |         uyi = uti;\n   37 |     }\n   38 | \n   39 |     /* special cases */\n   40 |     ex = (uxi >> 52) as i64;\n   41 |     ey = (uyi >> 52) as i64;\n   42 |     x = f64::from_bits(uxi);\n   43 |     y = f64::from_bits(uyi);\n   44 |     /* note: hypot(inf,nan) == inf */\n   45 |     if ey == 0x7ff {\n   46 |         return y;\n   47 |     }\n   48 |     if ex == 0x7ff || uyi == 0 {\n   49 |         return x;\n   50 |     }\n   51 |     /* note: hypot(x,y) ~= x + y*y/x/2 with inexact for small y/x */\n   52 |     /* 64 difference is enough for ld80 double_t */\n   53 |     if ex - ey > 64 {\n   54 |         return x + y;\n   55 |     }\n   56 | \n   57 |     /* precise sqrt argument in nearest rounding mode without overflow */\n   58 |     /* xh*xh must not overflow and xl*xl must not underflow in sq */\n   59 |     z = 1.;\n   60 |     if ex > 0x3ff + 510 {\n   61 |         z = x1p700;\n   62 |         x *= x1p_700;\n   63 |         y *= x1p_700;\n   64 |     } else if ey < 0x3ff - 450 {\n   65 |         z = x1p_700;\n   66 |         x *= x1p700;\n   67 |         y *= x1p700;\n   68 |     }\n   69 |     let (hx, lx) = sq(x);\n   70 |     let (hy, ly) = sq(y);\n   71 |     z * sqrt(ly + lx + hy + hx)\n   72 | }","lines":72,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm/src/math/approx/hypot.rs#L1-L72"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"cmp.rs starts with `#![allow(unreachable_code)]` at module scope, but no function in the file contains unreachable code (the `cfg_if!` selecting `CmpResult` is compile-time, not unreachable code). The allow appears to be a stale leftover and silently suppresses a useful lint for the whole module.","fix":"Remove the `#![allow(unreachable_code)]` attribute if it is no longer needed, or narrow it to the specific item that requires it.","locations":[{"ref":"compiler-builtins/src/float/cmp.rs:1","code":"    1 | #![allow(unreachable_code)]","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/cmp.rs#L1"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In the `sdivmod!` macro, `*rem` is read to initialize `r` before calling the unsigned divmod function, but `$unsigned_fn(..., Some(&mut r))` unconditionally overwrites `r` (the unsigned divmod intrinsics always write through the `Some` reference). The initial read of the output parameter `*rem` is dead and misleading - it suggests `*rem` is an input when it is purely an output.","fix":"Replace `let mut r = *rem as $uX; let t = $unsigned_fn(a as $uX, b as $uX, Some(&mut r)) as $iX;` with `let mut r: $uX = 0; let t = $unsigned_fn(a as $uX, b as $uX, Some(&mut r)) as $iX;` so it is clear `*rem` is write-only.","locations":[{"ref":"compiler-builtins/src/int/sdiv.rs:29-30","code":"   29 |                 let mut r = *rem as $uX;\n   30 |                 let t = $unsigned_fn(a as $uX, b as $uX, Some(&mut r)) as $iX;","lines":2,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/int/sdiv.rs#L29-L30"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`int_edge_cases` calls `int_count_around(I::ZERO, near_points, &mut values)` twice in a row. The second call adds exactly the same values around zero; they are removed later by `values.sort(); values.dedup();`, so the duplicate is pure dead work and is misleading (a reader may think two distinct points are covered). This is almost certainly a copy-paste of the line above it; one of them was likely intended to be a different point.","fix":"Remove the duplicate `int_count_around(I::ZERO, ...)` line (or replace it with the point that was actually intended).","locations":[{"ref":"libm-test/src/generate/edge_cases.rs:136-137","code":"  136 |     int_count_around(I::ZERO, near_points, &mut values);\n  137 |     int_count_around(I::ZERO, near_points, &mut values);","lines":2,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm-test/src/generate/edge_cases.rs#L136-L137"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"The underflow/inexact fix-up block in fma_wide_round is unreachable. `status` is initialized to `Status::OK` immediately before the guard `(min_inexact_exp..max_inexact_exp).contains(&re) && status.inexact()`, and is never mutated in between, so `status.inexact()` is always false and the whole `if` body never runs. The code even self-documents this with the comment `// This branch is never hit; requires previous operations to set a status`. Consequence: the underflow status flag is never reported for narrow-result fma even though the returned value is correct.","fix":"Either remove the dead block, or detect inexactness before the guard (e.g. determine whether narrowing the wide result loses precision and seed `status` accordingly) so underflow is actually flagged in the subnormal-result exponent range.","locations":[{"ref":"libm/src/math/generic/fma_wide.rs:40-52","code":"   40 |         let mut status = Status::OK;\n   41 | \n   42 |         if (min_inexact_exp..max_inexact_exp).contains(&re) && status.inexact() {\n   43 |             // This branch is never hit; requires previous operations to set a status\n   44 |             status.set_inexact(false);\n   45 | \n   46 |             result = xy + z.widen();\n   47 |             if status.inexact() {\n   48 |                 status.set_underflow(true);\n   49 |             } else {\n   50 |                 status.set_inexact(true);\n   51 |             }\n   52 |         }","lines":13,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm/src/math/generic/fma_wide.rs#L40-L52"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`set_have_lse_atomics` is declared `unsafe fn` but its body contains no unsafe operations (only an atomic store, which is safe). The needless `unsafe` is misleading about the function's contract. It is gated behind the test-only `unstable-public-internals` feature.","fix":"Drop the `unsafe` qualifier: `pub fn set_have_lse_atomics(has_lse: bool)`. Callers in the test harness can be updated accordingly.","locations":[{"ref":"compiler-builtins/src/aarch64_outline_atomics.rs:39-42","code":"   39 | pub unsafe fn set_have_lse_atomics(has_lse: bool) {\n   40 |     let lse_flag = if has_lse { 1 } else { 0 };\n   41 |     HAVE_LSE_ATOMICS.store(lse_flag, Ordering::Relaxed);\n   42 | }","lines":4,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/aarch64_outline_atomics.rs#L39-L42"}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`Ty::MutI32` and `Ty::MutF128` are defined and handled everywhere (`effective_bits`, `group`, `is_float`, `Display`, `ty_to_tokens`) but are never used by any entry in `ALL_OPERATIONS_NESTED` (only `MutF32`, `MutF64`, `MutCInt` appear in C signatures). They are dead enum variants carrying maintenance cost.","fix":"Remove the unused `MutI32`/`MutF128` variants, or add the operations that justify them; if intentionally reserved, add a comment noting they are placeholders.","locations":[{"ref":"crates/api-list-common/src/lib.rs:1375-1377","code":" 1375 |     MutF128,\n 1376 |     MutI32,\n 1377 |     MutCInt,","lines":3,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/api-list-common/src/lib.rs#L1375-L1377"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Several comments in the `Result` impl doc misspell 'NaN' as 'YaN' and 'floating-point' as 'fp_ting-point'. This is misleading documentation describing the GCC comparison-function semantics, which are subtle and important to get right; garbled words make the contract harder to understand.","fix":"Fix typos: 'YaN' -> 'NaN' (lines 41, 42, 43) and 'fp_ting-point' -> 'floating-point' (line 97).","locations":[{"ref":"compiler-builtins/src/float/cmp.rs:41-43","code":"   41 | /// * `eq`, `ne`: 0 if a == b and both YaN, nonzero otherwise\n   42 | /// * `ge`, `gt`, `lt`, `le`: return an int result that provides the same comparison to 0 if both\n   43 | ///   YaN and the comparison matches. E.g. if a >= b, `ge` returns an `x >= 0`.","lines":3,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/cmp.rs#L41-L43"},{"ref":"compiler-builtins/src/float/cmp.rs:97","code":"   97 |     // a and b as signed integers as we would with a fp_ting-point compare.","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/cmp.rs#L97"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Doc comment for `float_to_int_inner` describes the `fbits` parameter as '`abg(f)` bitcasted to an integer'. `abg` is a typo for `abs` (absolute value), and in the unsigned case the value is actually `f.to_bits()` (no abs applied), so the comment is both misspelled and imprecise.","fix":"Reword to 'the float bits to convert (for signed conversions, the sign bit has already been cleared)'.","locations":[{"ref":"compiler-builtins/src/float/conv.rs:345","code":"  345 | /// - `map_inbounds`: apply this transformation to integers that are within range (add the sign back).","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/conv.rs#L345"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The libm intrinsic table declares `atan2(x: f64, y: f64)` and `atan2f(a: f32, b: f32)` with parameter names that are reversed relative to the C/libm convention `atan2(y, x)`. The macro forwards arguments positionally so behavior is correct (the C caller's first arg still maps to libm's first param), but the names are misleading: a maintainer who later references these names (e.g. to reorder, add validation, or implement the body) could easily introduce an argument-swap bug. atan2f also uses generic `a`/`b` names that obscure the y/x roles.","fix":"Name the parameters to match libm semantics: `fn atan2(y: f64, x: f64) -> f64;` and `fn atan2f(y: f32, x: f32) -> f32;`.","locations":[{"ref":"compiler-builtins/src/math/mod.rs:154-155","code":"  154 |         fn atan2(x: f64, y: f64) -> f64;\n  155 |         fn atan2f(a: f32, b: f32) -> f32;","lines":2,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/math/mod.rs#L154-L155"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment explaining WORD_COPY_THRESHOLD is garbled. The third bullet point (lines 30-31) is a malformed sentence: it begins mid-thought with \"ensures that even on 32-bit platforms...\" with no subject, having lost the start of the clause, so the rationale is hard to follow.","fix":"Rewrite the bullet to a complete sentence, e.g. \"The 16-byte floor ensures that even on 32-bit platforms we copy at least 8 bytes word-wise, so the savings outweigh the fixed overhead.\" Also fix \"opt in word-wise copy\" -> \"opt into word-wise copy\".","locations":[{"ref":"compiler-builtins/src/mem/impls.rs:25-31","code":"   25 | // If the number of bytes involved exceed this threshold we will opt in word-wise copy.\n   26 | // The value here selected is max(2 * WORD_SIZE, 16):\n   27 | // * We need at least 2 * WORD_SIZE bytes to guarantee that at least 1 word will be copied through\n   28 | //   word-wise copy.\n   29 | // * The word-wise copy logic needs to perform some checks so it has some small overhead.\n   30 | //   ensures that even on 32-bit platforms we have copied at least 8 bytes through\n   31 | //   word-wise copy so the saving of word-wise copy outweighs the fixed overhead.","lines":7,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/mem/impls.rs#L25-L31"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Doc comments for load_aligned_partial and load_aligned_end_partial say \"`load_sz` be strictly less than `WORD_SIZE`.\" - the word \"must\" is missing, leaving an ungrammatical/ambiguous precondition statement.","fix":"Change to \"`load_sz` must be strictly less than `WORD_SIZE`.\" in both doc comments.","locations":[{"ref":"compiler-builtins/src/mem/impls.rs:68","code":"   68 | /// `load_sz` be strictly less than `WORD_SIZE`.","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/mem/impls.rs#L68"},{"ref":"compiler-builtins/src/mem/impls.rs:90","code":"   90 | /// `load_sz` be strictly less than `WORD_SIZE`.","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/mem/impls.rs#L90"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `coshf` (the f32 hyperbolic cosine) says \"Hyperbolic cosine (f64)\". This is a copy-paste leftover from `cosh.rs`; the function operates on f32, not f64. Misleading rustdoc.","fix":"Change the doc comment to \"Hyperbolic cosine (f32)\".","locations":[{"ref":"libm/src/math/coshf.rs:3","code":"    3 | /// Hyperbolic cosine (f64)","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm/src/math/coshf.rs#L3"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Module doc title says `minimum` but this file implements `minimumNumber` (the NaN-suppressing IEEE 754-2019 variant). The sibling file fmaximum_num.rs correctly says `maximumNumber`. Misleading because fminimum.rs already exists for the true `minimum` operation, so the title duplicates that file's purpose.","fix":"Change the module doc title to reference `minimumNumber`.","locations":[{"ref":"libm/src/math/generic/fminimum_num.rs:2","code":"    2 | //! IEEE 754-2019 `minimum`.","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/libm/src/math/generic/fminimum_num.rs#L2"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Module doc for division contains typos in the Newton's-method explanation: 'previous gues' (gues -> guess), 'it increses' / 'it decreses' (increases/decreases), and 'handware' (hardware). Minor but in a heavily-commented explanatory block.","fix":"Correct the spelling of 'guess', 'increases', 'decreases', and 'hardware'.","locations":[{"ref":"compiler-builtins/src/float/div.rs:44","code":"   44 | //! The result approaches a zero of `f(x)` by applying a correction to the previous gues.","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/div.rs#L44"},{"ref":"compiler-builtins/src/float/div.rs:283-284","code":"  283 |         // then it increses until  f(1/b) = 1 / b, maximum on (0, 1),\n  284 |         // then it decreses to     f(1)   = 2 - b","lines":2,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/div.rs#L283-L284"},{"ref":"compiler-builtins/src/float/div.rs:246","code":"  246 |     // variant depending on the handware and whether single/double/quad precision","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/div.rs#L246"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comments in the addition early-exit block say 'NaN + anything = qNaN' / 'anything + NaN = qNaN', but the multiplication routine copy-pasted these comments verbatim and they read 'NaN + anything' / 'anything + NaN' for a multiply operation (should be '*'). Misleading in mul.rs.","fix":"Change the '+' to '*' in the two NaN comments in mul.rs to match the operation.","locations":[{"ref":"compiler-builtins/src/float/mul.rs:48","code":"   48 |         // NaN + anything = qNaN","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/mul.rs#L48"},{"ref":"compiler-builtins/src/float/mul.rs:52","code":"   52 |         // anything + NaN = qNaN","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/compiler-builtins/src/float/mul.rs#L52"}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment on `MacroReplace::norm_name` is truncated: `/// Remove the trailing `f` or `f128` to make` ends mid-sentence. Also the `for_each_object` doc comment reads `/// D something with each symbol` (typo for `Do`), and `exec_cargo_with_args` prints `build finshed` (typo for `finished`).","fix":"Complete the truncated comment and fix the `D`/`finshed` typos.","locations":[{"ref":"crates/libm-macros/src/lib.rs:435","code":"  435 |     /// Remove the trailing `f` or `f128` to make","lines":1,"link":"https://github.com/rust-lang/compiler-builtins/blob/fb48f81544cf29e6ff7fb4468c8b2e1dacd42b79/crates/libm-macros/src/lib.rs#L435"},{"ref":"crates/symbol-check/src/main.rs:597","code":"  597 | rue\n   55 |                         // since `duo_hi < div_lo`.\n   56 |                         let norm_shift = $half_normalization_shift(div_lo, duo_hi, false);\n   57 |                         let shl = if norm_shift == 0 {\n   58 |                             // Consider what happens if the msbs of `duo_hi` and `div_lo` align with\n   59 |                             // no shifting. The normalization shift will always return\n   60 |                             // `norm_shift == 0` regardless of whether it is fully normalized,\n   61 |                             // because `duo_hi < div_lo`. In that edge case, `n - norm_shift` would\n   62 |                             // result in shift overflow down the line. For the edge case, because\n   63 |                             // both `duo_hi < div_lo` and we are comparing all the significant bits\n   64 |                             // of `duo_hi` and `div`, we can make `shl = n - 1`.\n   65 |                             n - 1\n   66 |                         } else {\n   67 |                             // We also cannot just use `shl = n - norm_shift - 1` in the general\n   68 |                             // case, because when we are not in the edge case comparing all the\n   69 |                             // significant bits, then the full `duo < div` may not be true and thus\n   70 |                             // breaks the division algorithm.\n   71 |                             n - norm_shift\n   72 |                         };\n   73 | \n   74 |                         // The 3 variable restoring division algorithm (see binary_long.rs) is ideal\n   75 |                         // for this task, since `pow` and `quo` can be `$uX` and the delegation\n   76 |                         // check is simple.\n   77 |                         let mut div: $uD = div << shl;\n   78 |                         let mut pow_lo: $uX = 1 << shl;\n   79 |                         let mut quo_lo: $uX = 0;\n   80 |                         let mut duo = duo;\n   81 |                         loop {\n   82 |                             let sub = duo.wrapping_sub(div);\n   83 |                             if 0 <= (sub as $iD) {\n   84 |                                 duo = sub;\n   85 |                                 quo_lo |= pow_lo;\n   86 |                                 let duo_hi = (duo >> n) as $uX;\n   87 |                                 if duo_hi == 0 {\n   88 |                                     // Delegate to get the rest of the quotient. Note that the\n   89 |                                     // `div_lo` here is the original unshifted `div`.\n   90 |                                     let tmp = $half_division(duo as $uX, div_lo);\n   91 |                                     return ((quo_lo | tmp.0) as $uD, tmp.1 as $uD);\n   92 |                                 }\n   93 |                             }\n   94 |                             div >>= 1;\n   95 |                             pow_lo >>= 1;\n   96 |                         }\n   97 |                     } else if duo_hi == div_lo {\n   98 |                         // `quo_hi == 1`. This branch is cheap and helps with edge cases.\n   99 |                         let tmp = $half_division(duo as $uX, div as $uX);\n  100 |                         return ((1 << n) | (tmp.0 as $uD), tmp.1 as $uD);\n  101 |                     } else {\n  102 |                         // `div_lo < duo_hi`\n  103 |                         // `rem_hi == 0`\n  104 |                         if (div_lo >> $n_h) == 0 {\n  105 |                             // Short division of $uD by a $uH, using $uX by $uX division\n  106 |                             let div_0 = div_lo as $uH as $uX;\n  107 |                             let (quo_hi, rem_3) = $half_division(duo_hi, div_0);\n  108 | \n  109 |                             let duo_mid = ((duo >> $n_h) as $uH as $uX) | (rem_3 << $n_h);\n  110 |                             let (quo_1, rem_2) = $h itecture","severity":"low","easy":false,"description":"`mpfloat.rs` is a ~1350-line file consisting of a very large flat `skip: [...]` list inside one `for_each_function!` invocation plus ~15 macros that each expand to many trait impls. The `skip` list (lines 135-354) duplicates, by name, almost every routine that gets a manual impl further down, with no compiler-enforced link between the two; it is hand-maintained and already shows formatting damage from this (e.g. `fabsf16,floor` on one line, `powf,remquo`, `sincos,sincosf`, `truncf16,yn` - entries got concatenated). A missing skip entry silently produces a duplicate/conflicting impl error, and a stale skip entry silently drops MPFR coverage for a function. This is the highest-risk maintainability hotspot in the slice.","fix":"Split mpfloat.rs into submodules (generic, per-type, int ops) and/or generate the skip list from the set of manually-implemented routines so the two cannot drift.","locations":[{"ref":"libm-test/src/mpfloat.rs:132-370","code":"  132 | libm_macros::for_each_function! {\n  133 |     callback: impl_mp_op,\n  134 |     emit_types: [RustFn],\n  135 |     skip: [\n  136 |         // Most of these need a manual implementation\n  137 |         // verify-sorted-start\n  138 |         addf128,\n  139 |         addf16,\n  140 |         addf32,\n  141 |         addf64,\n  142 |         ashl_u128,\n  143 |         ashl_u32,\n  144 |         ashl_u64,\n  145 |         ashr_i128,\n  146 |         ashr_i32,\n  147 |         ashr_i64,\n  148 |         ceil,\n  149 |         ceilf,\n  150 |         ceilf128,\n  151 |         ceilf16,\n  152 |         copysign,\n  153 |         copysignf,\n  154 |         copysignf128,\n  155 |         copysignf16,\n  156 |         divf128,\n  157 |         divf32,\n  158 |         divf64,\n  159 |         eqf128,\n  160 |         eqf16,\n  161 |         eqf32,\n  162 |         eqf64,\n  163 |         extend_f16_f128,\n  164 |         extend_f16_f32,\n  165 |         extend_f1
