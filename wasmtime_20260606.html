<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","description":"`datetime_from` unconditionally `.unwrap()`s the result of `Datetime::try_from(SystemTime)`. `Datetime::try_from` (clocks.rs `TryFrom<SystemTime>`) returns `Err(DatetimeError)` whenever the duration's seconds do not fit in `i64` (via the `?` on `duration.as_secs().try_into()`). `datetime_from` is called by `impl From<cap_std::fs::Metadata> for DescriptorStat` for the accessed/modified/created timestamps. That conversion is reached by the guest-callable `stat`/`stat-at`/`fstat` operations (Descriptor::stat -> meta.into()). A file whose on-disk timestamp is far enough in the future/past that the second count overflows `i64` (possible on filesystems that store wide or corrupt timestamps, or via crafted images / NFS / FUSE) makes the host panic instead of returning an error. The `.ok()` applied later in `DescriptorStat::from` does NOT protect against this because the panic happens inside `datetime_from` before the `Result` is produced. This is a host-side denial of service triggerable from sandboxed guest code that has a preopen.","fix":"Make `datetime_from` fallible (return `Option<Datetime>`/`Result`) and propagate the error, e.g. `data_access_timestamp: meta.accessed().ok().and_then(|t| Datetime::try_from(cap_std::time::SystemTime::from_std(t.into_std())).ok())`, so an out-of-range timestamp yields `None` rather than panicking.","locations":[{"ref":"crates/wasi/src/filesystem.rs:245-248","code":"  245 | fn datetime_from(t: std::time::SystemTime) -> Datetime {\n  246 |     // FIXME make this infallible or handle errors properly\n  247 |     Datetime::try_from(cap_std::time::SystemTime::from_std(t)).unwrap()\n  248 | }"},{"ref":"crates/wasi/src/filesystem.rs:321-323","code":"  321 |             data_access_timestamp: meta.accessed().map(|t| datetime_from(t.into_std())).ok(),\n  322 |             data_modification_timestamp: meta.modified().map(|t| datetime_from(t.into_std())).ok(),\n  323 |             status_change_timestamp: meta.created().map(|t| datetime_from(t.into_std())).ok(),"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","description":"`Memory::bump` accumulates a static linear-memory offset with an unchecked add `offset: self.offset + offset`. This offset is baked into `MemArg.offset` for loads/stores in generated FACT adapter code. The accumulated value derives from canonical ABI `size`/`align` fields of untrusted component types (via `next_field_offset`). If those sizes are large (see types.rs / fixed-length-list findings), `self.offset + offset` can overflow `u32`, panicking in debug builds (DoS during translation of a malicious component) or wrapping in release builds (producing a wrong static MemArg offset). This is downstream of, and compounded by, the unchecked canonical-ABI size accumulation.","fix":"Use `checked_add` in `Memory::bump`/`next_field_offset` and surface the overflow as a translation error; alternatively rely on a guaranteed upper bound on canonical-ABI offsets that is validated before trampoline generation.","locations":[{"ref":"crates/environ/src/fact/trampoline.rs:4383-4389","code":" 4383 |     fn bump(&self, offset: u32) -> Memory<'a> {\n 4384 |         Memory {\n 4385 |             opts: self.opts,\n 4386 |             addr: TempLocal::new(self.addr.idx, self.addr.ty),\n 4387 |             offset: self.offset + offset,\n 4388 |         }\n 4389 |     }"},{"ref":"crates/environ/src/fact/trampoline.rs:4359-4372","code":" 4359 | fn next_field_offset<'a>(\n 4360 |     offset: &mut u32,\n 4361 |     types: &ComponentTypesBuilder,\n 4362 |     field: &InterfaceType,\n 4363 |     mem: &Memory<'a>,\n 4364 | ) -> Memory<'a> {\n 4365 |     let abi = types.canonical_abi(field);\n 4366 |     let offset = if mem.mem_opts().memory64() {\n 4367 |         abi.next_field64(offset)\n 4368 |     } else {\n 4369 |         abi.next_field32(offset)\n 4370 |     };\n 4371 |     mem.bump(offset)\n 4372 | }"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","description":"In the append write path `append_cursor_unspecified` restores the original file-description flags with `fcntl_setfl(&file, old_flags).unwrap()`. This runs on a `spawn_blocking` worker thread (or directly when `allow_blocking_current_thread` is set). If the `F_SETFL` syscall fails for any reason after the data write already succeeded, the `.unwrap()` panics the worker thread instead of surfacing an error. While unlikely, it is host-controlled-input-independent and converts a recoverable syscall error into an abort of the blocking task; the file description is also left in `O_APPEND` mode.","fix":"Propagate the restore error instead of unwrapping, e.g. perform the write, then `fcntl_setfl(&file, old_flags)?;` returning the write result afterward, or log/return the restore failure rather than `.unwrap()`.","locations":[{"ref":"crates/wasi/src/filesystem/unix.rs:79-83","code":"   79 |     let old_flags = fcntl_getfl(&file)?;\n   80 |     fcntl_setfl(&file, old_flags | OFlags::APPEND)?;\n   81 |     let result = write(&file, data);\n   82 |     fcntl_setfl(&file, old_flags).unwrap();\n   83 |     Ok(result?)"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","description":"`ComponentTaskState::current_call_context_scope_id` computes the current scope\nid as `state.scopes.len() - 1` on the `NotConcurrent` path. If the `scopes`\nstack is ever empty (`len() == 0`) this is an unchecked `usize` subtraction:\nin debug builds (with overflow checks) it panics with \"attempt to subtract\nwith overflow\", and in release builds it wraps to `usize::MAX` and is then\nfunneled through `u32::try_from(...)?` which only happens to convert the bug\ninto a returned error rather than UB. This is reached by every borrow\nlift/lower path (`resource_lift_borrow`, `resource_lower_borrow`,\n`validate_scope_exit` in vm/component/resources.rs:276,295,309). In the normal\nguest-call path a scope is always pushed by `enter_guest_sync_call` before any\nlowering happens (component/func.rs:450), so it is not reachable there, but the\ncode relies entirely on every caller having pushed a scope first and provides\nno defensive handling for the empty-stack case. A cleaner formulation would use\n`scopes.len().checked_sub(1)` and return a descriptive error.","fix":"Use `state.scopes.len().checked_sub(1).ok_or_else(|| ...)?` and convert that to a u32, returning a real error instead of relying on `usize` wraparound being caught by the later `u32::try_from`.","locations":[{"ref":"crates/wasmtime/src/runtime/component/store.rs:511-516","code":"  511 |     pub fn current_call_context_scope_id(&self) -> Result<u32> {\n  512 |         match self {\n  513 |             ComponentTaskState::NotConcurrent(state) => Ok(u32::try_from(state.scopes.len() - 1)?),\n  514 |             ComponentTaskState::Concurrent(state) => state.current_call_context_scope_id(),\n  515 |         }\n  516 |     }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","description":"`Global::get` (its inner `_get`) reaches `unimplemented!()` for globals whose\ncontent type is a continuation reference (`HeapType::Cont`,\n`HeapType::ConcreteCont(_)`, `HeapType::NoCont`). With the stack-switching\nproposal enabled (`Config::wasm_stack_switching(true)`), a Wasm module can\ndefine and export a global of a continuation reference type. An embedder that\nobtains that global via `Instance::get_global` and calls `Global::get` will hit\nthe `unimplemented!()` and panic the host instead of getting a graceful error.\n\nUnlike the value-setting path (`Global::set`/`set_unchecked` and\n`generate_global_export`), which returns `Err(...)` for unsupported\ncontinuation references, the read path panics. API misuse / use of an\nincomplete feature should return `Err`, not abort the embedder. Continuation\nsupport is experimental (#10248), so severity is low.","fix":"Return a `Result`/error (matching the `set` path) for continuation-reference globals instead of `unimplemented!()`, or document and guard the panic so it is unreachable through the embedder API.","locations":[{"ref":"crates/wasmtime/src/runtime/externals/global.rs:172-175","code":"  172 |                         HeapType::NoCont | HeapType::ConcreteCont(_) | HeapType::Cont => {\n  173 |                             // TODO(#10248) Required to support stack switching in the embedder API.\n  174 |                             unimplemented!()\n  175 |                         }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","description":"`Table::get` reaches `panic!(\"unimplemented table for cont\")` for tables whose\nelement type is a continuation reference (`TableElementType::Cont`). With\nstack-switching enabled a Wasm module can define and export such a table; an\nembedder calling `Table::get` on it panics the host. The sibling `Table::set_`\npath uses `bail!(\"unimplemented table for cont\")` (a graceful error), so the\nread path is inconsistent and aborts instead of returning `Err`. Experimental\nfeature, hence low severity.","fix":"Return an error from `Table::get` for continuation-element tables (mirroring `set_`) rather than panicking.","locations":[{"ref":"crates/wasmtime/src/runtime/externals/table.rs:230","code":"  230 |             TableElementType::Cont => panic!(\"unimplemented table for cont\"),"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","description":"`sys::pkey_alloc` does `result.try_into().expect(\"only pkey IDs between 0 and 15 are expected\")` on the raw syscall return value, and `keys()` additionally `debug_assert!(key_id < 16)`. Both assume the kernel can only ever return a pkey id in 0..=15. If a future/extended kernel (or an unusual configuration) returns a larger key id, the `expect` panics in release builds and the `debug_assert` panics in debug builds. This is host-configuration-only code (MPK pooling allocator) and not reachable by untrusted guest wasm, hence low severity, but the truncating assumption is fragile.","fix":"Treat an out-of-range key id as an error (return `Err`) rather than panicking, e.g. `let id = u32::try_from(result).ok().filter(|id| *id < 16).ok_or_else(|| ...)?;` so an unexpected kernel response disables MPK instead of aborting the process.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/mpk/sys.rs:31-38","code":"   31 |     if result >= 0 {\n   32 |         Ok(result\n   33 |             .try_into()\n   34 |             .expect(\"only pkey IDs between 0 and 15 are expected\"))\n   35 |     } else {\n   36 |         debug_assert_eq!(result, -1); // only this error result is expected.\n   37 |         Err(Error::last_os_error().into())\n   38 |     }"},{"ref":"crates/wasmtime/src/runtime/vm/mpk/enabled.rs:29-36","code":"   29 |                 if let Ok(key_id) = sys::pkey_alloc(0, 0) {\n   30 |                     debug_assert!(key_id < 16);\n   31 |                     // UNSAFETY: here we unsafely assume that the\n   32 |                     // system-allocated pkey will exist forever.\n   33 |                     allocated.push(ProtectionKey {\n   34 |                         id: key_id,\n   35 |                         stripe: allocated.len().try_into().unwrap(),\n   36 |                     });"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"`vshuffle` indexes the second source vector with `b[m as usize - 16]` for any mask\nbyte `m >= 16`. `b` is a `[u8; 16]`, so the bounds-checked index is only valid for\n`m` in `16..=31`; mask bytes in `32..=255` produce indices `16..=239` and panic at\nruntime (the `mask: u128` is decoded straight from the bytecode immediate, so every\nbyte is fully controllable). The sibling `vswizzlei8x16` handler just below\ndefensively guards out-of-range indices (`if (idx as usize) < 16 { .. } else { 0 }`),\nso this is an inconsistency: shuffle lacks the analogous guard. Valid Cranelift output\nonly ever uses lane indices `0..=31`, so it is unreachable with well-formed bytecode,\nbut it is a reachable panic on crafted input that diverges from the swizzle handler's\nhardened behavior.","fix":"Mirror `vswizzlei8x16`: mask the index (`b[(m as usize - 16) & 0xf]`) or guard with `if (m as usize - 16) < 16` and produce 0 otherwise, so an out-of-range mask byte cannot index out of bounds / panic.","locations":[{"ref":"pulley/src/interp.rs:5376-5388","code":" 5376 |     fn vshuffle(&mut self, dst: VReg, src1: VReg, src2: VReg, mask: u128) -> ControlFlow<Done> {\n 5377 |         let a = self.state[src1].get_u8x16();\n 5378 |         let b = self.state[src2].get_u8x16();\n 5379 |         let result = mask.to_le_bytes().map(|m| {\n 5380 |             if m < 16 {\n 5381 |                 a[m as usize]\n 5382 |             } else {\n 5383 |                 b[m as usize - 16]\n 5384 |             }\n 5385 |         });\n 5386 |         self.state[dst].set_u8x16(result);\n 5387 |         ControlFlow::Continue(())\n 5388 |     }"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"negligible","description":"`CustomOutputStreamInner::raw_write` converts a negative return value from the embedder callback into an errno via `io::Error::from_raw_os_error(wrote.abs() as _)`. If the callback returns `isize::MIN`, `isize::abs()` overflows and panics in debug builds (and is a wrapping/UB-adjacent operation in release). This is host/embedder-supplied data rather than guest-controlled, so impact is limited, but it is a reachable panic on a pathological return value.","fix":"Use `wrote.unsigned_abs()` (which is panic-free) or clamp/saturate the value before passing it to `from_raw_os_error`.","locations":[{"ref":"crates/c-api/src/wasi.rs:176-184","code":"  176 |     pub fn raw_write(&self, buf: &[u8]) -> io::Result<usize> {\n  177 |         let wrote = (self.callback)(self.foreign_data.data, buf.as_ptr(), buf.len());\n  178 | \n  179 |         if wrote >= 0 {\n  180 |             Ok(wrote as _)\n  181 |         } else {\n  182 |             Err(io::Error::from_raw_os_error(wrote.abs() as _))\n  183 |         }\n  184 |     }"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"negligible","description":"`cast_to_u32` on a 64-bit target uses `u32::try_from(sz).expect(\"overflow in cast from usize to u32\")` and on 32-bit uses `.unwrap()` while constructing `VMOffsets` from module counts (`num_imported_funcs`, `globals.len()`, etc). For a module whose entity counts exceed `u32::MAX` this panics during `VMOffsets::new`. Such counts are not reachable through normal wasm validation (each index space is u32-indexed), so impact is a clean panic on a pathological/oversized module rather than memory unsafety; noting for completeness as a reachable-via-input panic surface.","fix":"These are effectively asserts of an already-guaranteed invariant; acceptable as-is, but could return a `Result` to convert the panic into a translation error for extra robustness.","locations":[{"ref":"crates/environ/src/vmoffsets.rs:50-57","code":"   50 | #[cfg(target_pointer_width = \"32\")]\n   51 | fn cast_to_u32(sz: usize) -> u32 {\n   52 |     u32::try_from(sz).unwrap()\n   53 | }\n   54 | #[cfg(target_pointer_width = \"64\")]\n   55 | fn cast_to_u32(sz: usize) -> u32 {\n   56 |     u32::try_from(sz).expect(\"overflow in cast from usize to u32\")\n   57 | }"},{"ref":"crates/environ/src/vmoffsets.rs:620-647","code":"  620 | impl<P: PtrSize> VMOffsets<P> {\n  621 |     /// Return a new `VMOffsets` instance, for a given pointer size.\n  622 |     pub fn new(ptr: P, module: &Module) -> Self {\n  623 |         let num_owned_memories = module\n  624 |             .memories\n  625 |             .iter()\n  626 |             .skip(module.num_imported_memories)\n  627 |             .filter(|p| !p.1.shared)\n  628 |             .count()\n  629 |             .try_into()\n  630 |             .unwrap();\n  631 |         VMOffsets::from(VMOffsetsFields {\n  632 |             ptr,\n  633 |             num_imported_functions: cast_to_u32(module.num_imported_funcs),\n  634 |             num_imported_tables: cast_to_u32(module.num_imported_tables),\n  635 |             num_imported_memories: cast_to_u32(module.num_imported_memories),\n  636 |             num_imported_globals: cast_to_u32(module.num_imported_globals),\n  637 |             num_imported_tags: cast_to_u32(module.num_imported_tags),\n  638 |             num_defined_tables: cast_to_u32(module.num_defined_tables()),\n  639 |             num_defined_memories: cast_to_u32(module.num_defined_memories()),\n  640 |             num_owned_memories,\n  641 |             num_defined_globals: cast_to_u32(module.globals.len() - module.num_imported_globals),\n  642 |             num_defined_tags: cast_to_u32(module.tags.len() - module.num_imported_tags),\n  643 |             num_escaped_funcs: cast_to_u32(module.num_escaped_funcs),\n  644 |             num_runtime_data: cast_to_u32(module.runtime_data.len()),\n  645 |             has_startup_func: !module.startup.is_none(),\n  646 |         })\n  647 |     }"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"negligible","description":"`LowerContext::realloc` validates the alignment of the pointer returned by the\nguest `realloc` with `if result % old_align != 0`. `old_align` is the requested\nallocation alignment passed by callers (`lower_list`, `lower_map`,\n`lower_string`, `lower_heap_args`). All current callers pass a canonical-ABI\nalignment which is always >= 1, so this is safe today, but the routine performs\na `%`/division by a caller-supplied value with no guard. If any future caller\never passes `old_align == 0` this becomes a divide-by-zero panic. It is also\nslightly surprising that the *requested* alignment (`old_align`) is used to\nvalidate the *new* allocation rather than a dedicated `align` parameter.","fix":"Guard against a zero alignment (e.g. `debug_assert!(old_align != 0)` plus `if old_align != 0 && result % old_align != 0`), or document/enforce that the alignment argument is always non-zero.","locations":[{"ref":"crates/wasmtime/src/runtime/component/func/options.rs:169-171","code":"  169 |         if result % old_align != 0 {\n  170 |             bail!(\"realloc return: result not aligned\");\n  171 |         }"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"negligible","description":"When constructing an `Instance` with the `wmemcheck` feature enabled, the initial wmemcheck region size is computed as `memory.limits.min * 64 * 1024` (all `u64`) and then `size.try_into().unwrap()` is used to convert to `usize`. For a `memory64` definition with a large declared minimum, the `u64` multiply can overflow (debug panic) and/or the `try_into::<usize>().unwrap()` can panic on a 32-bit host. The declared minimum is attacker-influenced module metadata. Reachable only with the off-by-default `wmemcheck` feature so impact is negligible, but it is a guest-influenced unwrap/overflow.","fix":"Use checked `u64` arithmetic for the byte computation and a fallible/saturating conversion to `usize`, returning an allocation error instead of panicking.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/instance.rs:174-182","code":"  174 |         let wmemcheck_state = if req.store.engine().config().wmemcheck {\n  175 |             let size = memory_tys\n  176 |                 .iter()\n  177 |                 .next()\n  178 |                 .map(|memory| memory.1.limits.min)\n  179 |                 .unwrap_or(0)\n  180 |                 * 64\n  181 |                 * 1024;\n  182 |             Some(Wmemcheck::new(size.try_into().unwrap()))"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"negligible","description":"`Drop for PreviousAsyncWasmCallState` unconditionally panics with \"must be consumed with `restore`\". This is intentional as a misuse guard, but because `restore` itself takes `self` by value and the only construction site is `AsyncWasmCallState::push`, any code path that creates a `PreviousAsyncWasmCallState` and then unwinds (e.g. a panic between `push` and `restore`) will trigger this panic-in-Drop, which while unwinding aborts the process. Given fibers + `panic=unwind`, a host panic occurring after `push` but before `restore` will turn a recoverable panic into an abort. This is a defensive-design tradeoff rather than a clear bug, but worth flagging since the window exists during fiber resume/suspend bookkeeping.","fix":"Consider whether a double-panic abort here is acceptable, or whether the guard should be a debug_assert in Drop so that unwind-through is permitted (with the linked-list state already restored by `set`/`with` scope guards).","locations":[{"ref":"crates/wasmtime/src/runtime/vm/traphandlers.rs:1352-1357","code":" 1352 |     #[cfg(feature = \"async\")]\n 1353 |     impl Drop for PreviousAsyncWasmCallState {\n 1354 |         fn drop(&mut self) {\n 1355 |             panic!(\"must be consumed with `restore`\");\n 1356 |         }\n 1357 |     }"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"negligible","description":"`Bounds::as_typed_reg`/`Bounds::as_u64` and `Index`/`ImmOffset` accessors `panic!()`/`unreachable!()` when called on the wrong enum variant. These are internal invariants of the bounds-check emission code (a `Static` bounds is never asked for its `TypedReg` and vice versa), and I could not construct crafted wasm that reaches them, so impact is negligible. Still, an unadorned `panic!()` with no message in safety-critical bounds-check code is a latent footgun if a future refactor of `emit_compute_heap_address` swaps a branch.","fix":"Return `Result` (e.g. `bail!(CodeGenError::...)`) from these accessors instead of `panic!()`, or add explicit `debug_assert!`/messages documenting the upheld invariant, so an accidental misuse during refactoring surfaces as a compile error rather than a release-build panic.","locations":[{"ref":"winch/codegen/src/codegen/bounds.rs:52-65","code":"   52 |     pub fn as_typed_reg(&self) -> TypedReg {\n   53 |         match self {\n   54 |             Self::Dynamic(tr) => *tr,\n   55 |             _ => panic!(),\n   56 |         }\n   57 |     }\n   58 | \n   59 |     /// Return the underlying u64 value.\n   60 |     pub fn as_u64(&self) -> u64 {\n   61 |         match self {\n   62 |             Self::Static(v) => *v,\n   63 |             _ => panic!(),\n   64 |         }\n   65 |     }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`CanonicalAbiInfo::record` / `variant` / `next_field32` / `next_field64` accumulate the canonical-ABI `size32`/`size64` of component types using *unchecked* `+` (e.g. `ret.size32 = align_to(ret.size32, field.align32) + field.size32;`). The helper `align_to(a, b) = (a + (b - 1)) & !(b - 1)` is itself an unchecked add. These functions run on UNTRUSTED component-model type definitions during translation. In a debug build an oversized aggregate type causes a panic (DoS); in a release build the additions wrap silently, producing an incorrect (too small) `size32`/`size64`. Those sizes are subsequently consumed by FACT trampoline generation (e.g. `next_field_offset` -> `Memory::bump` -> `MemArg.offset`, and `malloc_abi`/`memory_operand_abi`) to bake static linear-memory offsets and allocation sizes into generated adapter code. A wrapped size therefore becomes a wrong, attacker-influenced static offset, which is a memory-safety primitive if the wasmparser validator does not independently reject the type first. Wasmtime computes these sizes itself rather than relying solely on the validator, so this is at minimum a missing defense-in-depth check.","fix":"Use checked arithmetic when accumulating canonical ABI sizes and propagate a translation error (bail!) when a type's size overflows `u32`, rather than wrapping (release) or panicking (debug). E.g. make `align_to` return `Option<u32>`/`Result` and have `record`/`variant`/`next_field*` thread the error out so that oversized component types are rejected deterministically on all build profiles.","locations":[{"ref":"crates/environ/src/component/types.rs:668-671","code":"  668 | const fn align_to(a: u32, b: u32) -> u32 {\n  669 |     assert!(b.is_power_of_two());\n  670 |     (a + (b - 1)) & !(b - 1)\n  671 | }"},{"ref":"crates/environ/src/component/types.rs:716-731","code":"  716 |     pub fn record<'a>(fields: impl Iterator<Item = &'a CanonicalAbiInfo>) -> CanonicalAbiInfo {\n  717 |         // NB: this is basically a duplicate copy of\n  718 |         // `CanonicalAbiInfo::record_static` and the two should be kept in sync.\n  719 | \n  720 |         let mut ret = CanonicalAbiInfo::default();\n  721 |         for field in fields {\n  722 |             ret.size32 = align_to(ret.size32, field.align32) + field.size32;\n  723 |             ret.align32 = ret.align32.max(field.align32);\n  724 |             ret.size64 = align_to(ret.size64, field.align64) + field.size64;\n  725 |             ret.align64 = ret.align64.max(field.align64);\n  726 |             ret.flat_count = add_flat(ret.flat_count, field.flat_count);\n  727 |         }\n  728 |         ret.size32 = align_to(ret.size32, ret.align32);\n  729 |         ret.size64 = align_to(ret.size64, ret.align64);\n  730 |         return ret;\n  731 |     }"},{"ref":"crates/environ/src/component/types.rs:756-782","code":"  756 |     pub fn next_field32(&self, offset: &mut u32) -> u32 {\n  757 |         *offset = align_to(*offset, self.align32) + self.size32;\n  758 |         *offset - self.size32\n  759 |     }\n  760 | \n  761 |     /// Same as `next_field32`, but bumps a usize pointer\n  762 |     pub fn next_field32_size(&self, offset: &mut usize) -> usize {\n  763 |         let cur = u32::try_from(*offset).unwrap();\n  764 |         let cur = align_to(cur, self.align32) + self.size32;\n  765 |         *offset = usize::try_from(cur).unwrap();\n  766 |         usize::try_from(cur - self.size32).unwrap()\n  767 |     }\n  768 | \n  769 |     /// Returns the delta from the current value of `offset` to align properly\n  770 |     /// and read the next record field of type `abi` for 64-bit memories.\n  771 |     pub fn next_field64(&self, offset: &mut u32) -> u32 {\n  772 |         *offset = align_to(*offset, self.align64) + self.size64;\n  773 |         *offset - self.size64\n  774 |     }\n  775 | \n  776 |     /// Same as `next_field64`, but bumps a usize pointer\n  777 |     pub fn next_field64_size(&self, offset: &mut usize) -> usize {\n  778 |         let cur = u32::try_from(*offset).unwrap();\n  779 |         let cur = align_to(cur, self.align64) + self.size64;\n  780 |         *offset = usize::try_from(cur).unwrap();\n  781 |         usize::try_from(cur - self.size64).unwrap()\n  782 |     }"},{"ref":"crates/environ/src/component/types.rs:801-879","code":"  801 |     fn variant<'a, I>(cases: I) -> CanonicalAbiInfo\n  802 |     where\n  803 |         I: IntoIterator<Item = Option<&'a CanonicalAbiInfo>>,\n  804 |         I::IntoIter: ExactSizeIterator,\n  805 |     {\n  806 |         // NB: this is basically a duplicate definition of\n  807 |         // `CanonicalAbiInfo::variant_static`, these should be kept in sync.\n  808 | \n  809 |         let cases = cases.into_iter();\n  810 |         let discrim_size = u32::from(DiscriminantSize::from_count(cases.len()).unwrap());\n  811 |         let mut max_size32 = 0;\n  812 |         let mut max_align32 = discrim_size;\n  813 |         let mut max_size64 = 0;\n  814 |         let mut max_align64 = discrim_size;\n  815 |         let mut max_case_count = Some(0);\n  816 |         for case in cases {\n  817 |             if let Some(case) = case {\n  818 |                 max_size32 = max_size32.max(case.size32);\n  819 |                 max_align32 = max_align32.max(case.align32);\n  820 |                 max_size64 = max_size64.max(case.size64);\n  821 |                 max_align64 = max_align64.max(case.align64);\n  822 |                 max_case_count = max_flat(max_case_count, case.flat_count);\n  823 |             }\n  824 |         }\n  825 |         CanonicalAbiInfo {\n  826 |             size32: align_to(\n  827 |                 align_to(discrim_size, max_align32) + max_size32,\n  828 |                 max_align32,\n  829 |             ),\n  830 |             align32: max_align32,\n  831 |             size64: align_to(\n  832 |                 align_to(discrim_size, max_align64) + max_size64,\n  833 |                 max_align64,\n  834 |             ),\n  835 |             align64: max_align64,\n  836 |             flat_count: add_flat(max_case_count, Some(1)),\n  837 |         }\n  838 |     }\n  839 | \n  840 |     /// Same as `CanonicalAbiInfo::variant` but `const`-safe\n  841 |     pub const fn variant_static(cases: &[Option<CanonicalAbiInfo>]) -> CanonicalAbiInfo {\n  842 |         // NB: this is basically a duplicate definition of\n  843 |         // `CanonicalAbiInfo::variant`, these should be kept in sync.\n  844 | \n  845 |         let discrim_size = match DiscriminantSize::from_count(cases.len()) {\n  846 |             Some(size) => size.byte_size(),\n  847 |             None => unreachable!(),\n  848 |         };\n  849 |         let mut max_size32 = 0;\n  850 |         let mut max_align32 = discrim_size;\n  851 |         let mut max_size64 = 0;\n  852 |         let mut max_align64 = discrim_size;\n  853 |         let mut max_case_count = Some(0);\n  854 |         let mut i = 0;\n  855 |         while i < cases.len() {\n  856 |             let case = &cases[i];\n  857 |             if let Some(case) = case {\n  858 |                 max_size32 = max(max_size32, case.size32);\n  859 |                 max_align32 = max(max_align32, case.align32);\n  860 |                 max_size64 = max(max_size64, case.size64);\n  861 |                 max_align64 = max(max_align64, case.align64);\n  862 |                 max_case_count = max_flat(max_case_count, case.flat_count);\n  863 |             }\n  864 |             i += 1;\n  865 |         }\n  866 |         CanonicalAbiInfo {\n  867 |             size32: align_to(\n  868 |                 align_to(discrim_size, max_align32) + max_size32,\n  869 |                 max_align32,\n  870 |             ),\n  871 |             align32: max_align32,\n  872 |             size64: align_to(\n  873 |                 align_to(discrim_size, max_align64) + max_size64,\n  874 |                 max_align64,\n  875 |             ),\n  876 |             align64: max_align64,\n  877 |             flat_count: add_flat(max_case_count, Some(1)),\n  878 |         }\n  879 |     }"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`new_fixed_length_list_type` computes the canonical ABI size of a fixed-length list with `abi.size32 = element_abi.size32.saturating_mul(size)` (and likewise size64). Using `saturating_mul` *clamps* an overflowing list size to `u32::MAX` instead of rejecting it. A clamped `size32 == u32::MAX` then flows into `CanonicalAbiInfo::record`/`variant` (when the list is a field/case of an aggregate) where `align_to(u32::MAX, align) + field.size32` overflows (see the related types.rs finding). It is also a soundness hazard on its own: a clamped size silently disagrees with the true element_size*count product, so any static offset/size derived from it in FACT trampolines (bump/MemArg/realloc sizing) is wrong. The clamp masks the error condition rather than turning it into a deterministic `bail!`.","fix":"Return a `Result` from `new_fixed_length_list_type` and use `checked_mul`, bailing with a translation error when `element_size * size` overflows `u32` for either the 32-bit or 64-bit ABI, instead of `saturating_mul` clamping to `u32::MAX`.","locations":[{"ref":"crates/environ/src/component/types_builder.rs:581-596","code":"  581 |     pub(crate) fn new_fixed_length_list_type(\n  582 |         &mut self,\n  583 |         element: InterfaceType,\n  584 |         size: u32,\n  585 |     ) -> TypeFixedLengthListIndex {\n  586 |         let element_abi = self.component_types.canonical_abi(&element);\n  587 |         let mut abi = element_abi.clone();\n  588 |         // this assumes that size32 is already rounded up to alignment\n  589 |         abi.size32 = element_abi.size32.saturating_mul(size);\n  590 |         abi.size64 = element_abi.size64.saturating_mul(size);\n  591 |         abi.flat_count = element_abi\n  592 |             .flat_count\n  593 |             .zip(u8::try_from(size).ok())\n  594 |             .and_then(|(flat_count, size)| flat_count.checked_mul(size));\n  595 |         self.add_fixed_length_list_type(TypeFixedLengthList { element, size, abi })\n  596 |     }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`br_table32` computes the clamp bound as `amt - 1` where `amt: u32` is the\nimmediate count of table entries decoded directly from the bytecode. If a crafted\n(or buggy) instruction encodes `amt == 0`, this subtraction underflows. In a debug\nbuild it panics; in a release build it wraps to `u32::MAX`, so the `.min(amt - 1)`\nno longer clamps the attacker-controlled `idx` at all. The unclamped `idx` is then\nused as `self.pc.offset(idx * 4)`, performing essentially arbitrary out-of-bounds\npointer arithmetic on the bytecode stream followed by a read of a `PcRelOffset` and\na further jump. This is a hard invariant of the instruction (Cranelift never emits a\n0-entry br_table) but it is not validated, and the release-mode failure mode is OOB\nmemory access rather than a clean trap, unlike most other handlers which clamp/guard\ndefensively.","fix":"Treat `amt == 0` explicitly (e.g. `let max = amt.checked_sub(1)` and on `None` skip the table / fall through to the default arm), or assert `amt > 0`. At minimum clamp with `idx.min(amt.saturating_sub(1))` so a zero count cannot turn into an unbounded index.","locations":[{"ref":"pulley/src/interp.rs:2080-2092","code":" 2080 |     fn br_table32(&mut self, idx: XReg, amt: u32) -> ControlFlow<Done> {\n 2081 |         let idx = self.state[idx].get_u32().min(amt - 1) as isize;\n 2082 |         // SAFETY: part of the contract of the interpreter is only dealing with\n 2083 |         // valid bytecode, so this offset should be safe.\n 2084 |         self.pc = unsafe { self.pc.offset(idx * 4) };\n 2085 | \n 2086 |         // Decode the `PcRelOffset` without tampering with `self.pc` as the\n 2087 |         // jump is relative to `self.pc`.\n 2088 |         let mut tmp = self.pc;\n 2089 |         let Ok(rel) = PcRelOffset::decode(&mut tmp);\n 2090 |         let offset = isize::try_from(i32::from(rel)).unwrap();\n 2091 |         self.pc = unsafe { self.pc.offset(offset) };\n 2092 |         ControlFlow::Continue(())"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"The `align(offset, width)` helper used to lay out the `VMContext` field offsets computes `(offset + (width - 1)) / width * width` with an unchecked add. It is called via the `fields!{ align(16), ... }` steps and the `PtrSize` offset helpers while accumulating `next_field_offset`. Although the size/offset accumulation around it uses checked `cadd`/`cmul` (which panic on true overflow rather than producing a wrong layout), the `align()` add itself is unchecked: if `next_field_offset` is legitimately close to `u32::MAX` after a successful `cadd`, the subsequent `align(next_field_offset, 16)` can wrap to a small value silently, and that wrapped value is then fed into the next `cadd` (which would not detect the wrap as wrong). VMContext offsets are trusted by JIT code, so a wrapped layout offset is a serious primitive; reachability requires an extremely large module (counts near the u32 ceiling) but the counts are guest-controlled `u32`s and the function provides no overflow protection itself.","fix":"Make `align` perform a checked add (`offset.checked_add(width - 1)`) and propagate/assert overflow, consistent with the `cadd`/`cmul` helpers used for the rest of the `VMOffsets` layout, so that an oversized layout cannot silently wrap a field offset.","locations":[{"ref":"crates/environ/src/vmoffsets.rs:59-63","code":"   59 | /// Align an offset used in this module to a specific byte-width by rounding up\n   60 | #[inline]\n   61 | fn align(offset: u32, width: u32) -> u32 {\n   62 |     (offset + (width - 1)) / width * width\n   63 | }"},{"ref":"crates/environ/src/vmoffsets.rs:781-784","code":"  781 |             (align($align:expr), $($rest:tt)*) => {\n  782 |                 next_field_offset = align(next_field_offset, $align);\n  783 |                 fields!($($rest)*);\n  784 |             };"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In the `wmemcheck` load/store validation libcalls, the effective access address is computed as `addr as usize + offset as usize` where both `addr` and `offset` are 32-bit values taken directly from guest wasm. On 32-bit hosts `usize` is 32 bits, so this addition can overflow: in debug builds it panics (a guest-reachable panic when the `wmemcheck` feature is enabled), and in release builds it silently wraps, producing a bogus address that defeats the very out-of-bounds detection this code is meant to perform. The guest fully controls `addr` and `offset` (they are the wasm dynamic address and static offset of a load/store), so e.g. `addr=0xFFFF_FFFF, offset=1` triggers it. This only matters when the `wmemcheck` diagnostic feature is compiled in (off by default), hence low severity, but it makes the checker both crash-prone and unsound on 32-bit targets.","fix":"Compute the address with checked/saturating arithmetic on `u64` (e.g. `(addr as u64) + (offset as u64)`) and treat any value exceeding the memory size as out-of-bounds, rather than adding two `usize`s that can overflow on 32-bit hosts.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/libcalls.rs:808","code":"  808 |         let result = wmemcheck_state.read(addr as usize + offset as usize, num_bytes as usize);"},{"ref":"crates/wasmtime/src/runtime/vm/libcalls.rs:836","code":"  836 |         let result = wmemcheck_state.write(addr as usize + offset as usize, num_bytes as usize);"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"`update_mem_size` (wmemcheck libcall) computes `num_pages as usize * 64 * KIB` where `num_pages` is a 32-bit value derived from a guest `memory.grow`. On a 32-bit host this multiplication can overflow `usize` and panic in debug builds / wrap in release builds, corrupting wmemcheck's tracked memory size. Reachable only with the off-by-default `wmemcheck` feature, so impact is negligible, but the byte computation should be widened/saturated like the rest of the size math.","fix":"Perform the page-to-byte conversion in `u64` with checked arithmetic before converting to `usize`, mirroring how byte sizes are handled elsewhere.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/libcalls.rs:887-889","code":"  887 |         const KIB: usize = 1024;\n  888 |         let num_bytes = num_pages as usize * 64 * KIB;\n  889 |         wmemcheck_state.update_mem_size(num_bytes);"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Datetime::try_from(SystemTime)` produces an inconsistent representation for pre-UNIX-epoch times. For times before the epoch it sets `seconds = -duration.as_secs()` but `nanoseconds = duration.subsec_nanos()` (a positive 0..1e9 value measured backward from the time toward the epoch). The WASI `datetime` contract is that the instant equals `seconds + nanoseconds*1e-9` with `nanoseconds` always a positive fraction added on top of `seconds`. With the current code, e.g. an instant 0.5s before the epoch becomes `seconds = 0, nanoseconds = 500_000_000`, which decodes as +0.5s (off by one whole second and on the wrong side of the epoch). Sub-second negative timestamps reported via `stat` are therefore wrong.","fix":"For the pre-epoch branch, normalize like POSIX `timespec`: when `subsec_nanos != 0`, use `seconds = -(secs as i64) - 1` and `nanoseconds = 1_000_000_000 - subsec_nanos`; when `subsec_nanos == 0`, keep `seconds = -(secs as i64)` and `nanoseconds = 0`.","locations":[{"ref":"crates/wasi/src/clocks.rs:216-222","code":"  216 |         } else {\n  217 |             let duration = epoch.duration_since(time)?;\n  218 |             Ok(Self {\n  219 |                 seconds: -duration.as_secs().try_into()?,\n  220 |                 nanoseconds: duration.subsec_nanos(),\n  221 |             })\n  222 |         }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`HostResourceTables::validate_host_index` only ever bumps the *global*\n`cur_generation` counter on removal; it never updates the stored\n`generation` of the slot being removed. Correctness of the ABA / use-after-free\nprotection for host resource handles therefore depends on a second, implicit\ninvariant: that the underlying `HandleTable` slot is simultaneously freed (so\nre-access of a stale `HostResourceIndex` is rejected by the handle table's\nfree-slot check, see handle_table.rs:179-187) for the not-yet-reused case, and\nthat any subsequent `new_host_index` for the reused slot writes the *new*\n`cur_generation` for the mismatch case. Both invariants do hold in the current\ncode, so this is not exploitable, but the two-counter scheme where the slot's\nstored generation is intentionally left stale after a removal is fragile and\nunder-documented: a future change that reuses a `table_slot_metadata` slot\nwithout going through `new_host_index`, or that returns a handle-table index to\nthe host without freeing the slot, would silently defeat the generation check\nand reintroduce a host-side use-after-free. Recommend documenting the\ndependency explicitly and/or bumping the slot's stored generation at removal\ntime so the metadata is self-consistent.","fix":"On removal, also write the (post-increment) generation into the slot's stored `generation` field so the metadata alone is sufficient to reject stale indices, and document the invariant relating `table_slot_metadata` to the host `HandleTable`.","locations":[{"ref":"crates/wasmtime/src/runtime/component/resources/host_tables.rs:159-192","code":"  159 |     /// Validates that `idx` is still valid for the host tables, notably\n  160 |     /// ensuring that the generation listed in `idx` is the same as the\n  161 |     /// last recorded generation of the slot itself.\n  162 |     ///\n  163 |     /// The `is_removal` option indicates whether or not this table access will\n  164 |     /// end up removing the element from the host table. In such a situation the\n  165 |     /// current generation number is incremented.\n  166 |     fn validate_host_index(\n  167 |         &mut self,\n  168 |         idx: HostResourceIndex,\n  169 |         is_removal: bool,\n  170 |     ) -> Result<(u32, Option<TableSlot>)> {\n  171 |         let actual = usize::try_from(idx.index())\n  172 |             .ok()\n  173 |             .and_then(|i| self.host_resource_data.table_slot_metadata.get(i).copied());\n  174 | \n  175 |         // If `idx` is out-of-bounds then skip returning an error. In such a\n  176 |         // situation the operation that this is guarding will return a more\n  177 |         // precise error, such as a lift operation.\n  178 |         if let Some(actual) = actual {\n  179 |             if actual.generation != idx.generation() {\n  180 |                 bail!(\"host-owned resource was already de-allocated\");\n  181 |             }\n  182 |         }\n  183 | \n  184 |         // Bump the current generation of this is a removal to ensure any\n  185 |         // future item placed in this slot can't be pointed to by the `idx`\n  186 |         // provided above.\n  187 |         if is_removal {\n  188 |             self.host_resource_data.cur_generation += 1;\n  189 |         }\n  190 | \n  191 |         Ok((idx.index(), actual))\n  192 |     }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Table::fill_gc_ref` validates the full `dst..dst+len` range up front and then writes GC refs in a loop (`for slot in &mut self.gc_refs_mut()[range]`). If `GcStore::write_gc_ref_optional_store` returns `Err` partway through the loop, the function returns `Err` after having already overwritten a prefix of the requested range, so `table.fill` is observably non-atomic on error (some slots updated, some not). This is not a memory-safety problem (all slots always hold valid `Option<VMGcRef>` values), but it deviates from the all-or-nothing semantics implied by the up-front bounds validation and from the funcref/cont fill paths which cannot partially fail.","fix":"Document the partial-write-on-error behavior explicitly, or restructure so that the GC write cannot fail mid-range (e.g. validate/prepare all writes before mutating), to keep `table.fill` consistent across element types.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/table.rs:565-580","code":"  565 |     pub fn fill_gc_ref(\n  566 |         &mut self,\n  567 |         mut gc_store: Option<&mut GcStore>,\n  568 |         dst: u64,\n  569 |         val: Option<&VMGcRef>,\n  570 |         len: u64,\n  571 |     ) -> Result<()> {\n  572 |         let range = self.validate_fill(dst, len)?;\n  573 | \n  574 |         // Clone the init GC reference into each table slot.\n  575 |         for slot in &mut self.gc_refs_mut()[range] {\n  576 |             GcStore::write_gc_ref_optional_store(gc_store.as_deref_mut(), slot, val)?;\n  577 |         }\n  578 | \n  579 |         Ok(())\n  580 |     }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `emit_compute_table_elem_addr` the bounds comparison and the index->element multiplication both use `bound_size` (the width of the table's `current_elements` count field) as the operand size for the index register, rather than the table's index type width. For a 64-bit table whose element-count field is stored as a 32-bit value, `cmp(index, bound, bound_size=S32)` would compare only the low 32 bits of a 64-bit index, and `mov(scratch, index, S32)` would truncate the index before the `index * element_size` multiply. This is currently masked because table64 element counts and the index register width line up in supported configurations and the trap-on-OOB path plus the spectre cmov use the same `bound_size`, but the coupling of \"comparison width\" to \"count-field storage width\" rather than to \"index type width\" is fragile and should be made explicit and independently sized.","fix":"Derive the operand size for the index comparison and the index->byte-offset multiplication from the table's index type (`table_data.index_type()`), zero-extending the loaded bound to that width, instead of reusing `current_elements_size` for the index-side operands.","locations":[{"ref":"winch/codegen/src/codegen/mod.rs:1446-1463","code":" 1446 |         let bound_size = table_data.current_elements_size;\n 1447 |         self.masm.load(bound_addr, writable!(bound), bound_size)?;\n 1448 |         self.masm.cmp(index, bound.into(), bound_size)?;\n 1449 |         self.masm\n 1450 |             .trapif(IntCmpKind::GeU, TRAP_TABLE_OUT_OF_BOUNDS)?;\n 1451 | \n 1452 |         // Move the index into the scratch register to calculate the table\n 1453 |         // element address.\n 1454 |         // Moving the value of the index register to the scratch register\n 1455 |         // also avoids overwriting the context of the index register.\n 1456 |         self.masm.with_scratch::<IntScratch, _>(|masm, scratch| {\n 1457 |             masm.mov(scratch.writable(), index.into(), bound_size)?;\n 1458 |             masm.mul(\n 1459 |                 scratch.writable(),\n 1460 |                 scratch.inner(),\n 1461 |                 RegImm::i32(table_data.element_size.bytes() as i32),\n 1462 |                 table_data.element_size,\n 1463 |             )?;"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"`StoreId::allocate` uses `if id > OVERFLOW_THRESHOLD` to guard against counter\noverflow, but the comparison is strictly greater-than. When `id` exactly equals\n`OVERFLOW_THRESHOLD` (1<<63) the guard does not fire and the id is accepted;\nthe panic only triggers on the *next* allocation. This is an off-by-one in the\nthreshold check. In practice it is unreachable (2^63 stores), so severity is\nnegligible, but the intended invariant (\"at most OVERFLOW_THRESHOLD stores\")\nis technically violated by one and the non-atomic `store(OVERFLOW_THRESHOLD)`\nreset in the panicking branch races with concurrent `fetch_add`s.","fix":"Use `>=` for the threshold comparison (and note the reset store is best-effort).","locations":[{"ref":"crates/wasmtime/src/runtime/store/data.rs:164-167","code":"  164 |             if id > OVERFLOW_THRESHOLD {\n  165 |                 NEXT_ID.store(OVERFLOW_THRESHOLD, Relaxed);\n  166 |                 panic!(\"store id allocator overflow\");\n  167 |             }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"`NopHasher::write(&mut self, bytes)` copies up to 8 bytes from the input into the existing hash state's byte representation, leaving the remaining bytes of the prior state intact (`hash[..n].copy_from_slice(bytes)`), rather than fully replacing or mixing the state. For the only current use (a `HashMap<VMSharedTypeIndex, TraceInfo>` keyed by a `u32`, which hashes via `write_u32` -> `write_u64`), this path is not taken, so it is harmless today. But if any key type ever hashes via the byte-slice `write` (e.g. a longer or composite key), keys that differ only beyond the first 8 bytes, or that share a prefix with prior state, would collide far more than intended, degrading the trace-info map to near-linear lookups. Since type indices are engine-internal (not directly attacker-chosen), this is not a DoS vector today.","fix":"Either restrict `TraceInfos` to integer keys and `debug_assert!` that only `write_u*` is used, or make `NopHasher::write` actually fold all input bytes into the state (e.g. a simple wrapping multiply-add) so it cannot silently collide on long keys.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/gc/enabled/trace_info.rs:54-60","code":"   54 |     #[inline]\n   55 |     fn write(&mut self, bytes: &[u8]) {\n   56 |         let mut hash = self.0.to_ne_bytes();\n   57 |         let n = hash.len().min(bytes.len());\n   58 |         hash[..n].copy_from_slice(bytes);\n   59 |         self.0 = u64::from_ne_bytes(hash);\n   60 |     }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"`Val::load_ty` reports the wrong type for a null `externref`. The arm\n`Val::ExternRef(None) => ValType::NULLFUNCREF` returns the bottom type of the\n*function* reference hierarchy (`nullfuncref`) for a value that is actually a\nnull *external* reference. The correct type is `ValType::NULLEXTERNREF` (which\nexists and is used elsewhere). This is a copy/paste of the adjacent\n`Val::FuncRef(None) => ValType::NULLFUNCREF` arm.\n\nImpact: this is the implementation behind the public `Val::ty()` API, so an\nembedder calling `Val::ExternRef(None).ty(&store)` receives `nullfuncref`\ninstead of `nullexternref` — a value claimed to be in the wrong type hierarchy\nentirely. It also produces a misleading \"found <ty>\" message in\n`Val::ensure_matches_ty`'s error path. It is not a memory-safety hole because\nthe actual subtype matching in `Val::_matches_ty` routes through\n`Ref::from(*e)` and handles `Ref::Extern(None)` correctly and independently of\n`load_ty`. Still a real correctness bug in a stable public API.\n\nReproduction (wasmtime crate API):\n    let v = Val::ExternRef(None);\n    let t = v.ty(&store).unwrap();        // returns ValType::NULLFUNCREF\n    assert_eq!(t, ValType::NULLEXTERNREF); // FAILS today","fix":"Change the arm to `Val::ExternRef(None) => ValType::NULLEXTERNREF`.","locations":[{"ref":"crates/wasmtime/src/runtime/values.rs:172","code":"  172 |             Val::ExternRef(None) => ValType::NULLFUNCREF,"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In `Table::grow`, the dynamic-table allocation-failure path uses `?` on `elements.resize_with(new_size, || None)` which propagates the allocation error directly to the caller WITHOUT calling `limiter.table_grow_failed(..)`. This is inconsistent with `LocalMemory::grow` (memory.rs:715-724) which correctly routes allocation failures through `memory_grow_failed`. The `ResourceLimiter::table_grow_failed` contract states it is the hook called when a growth previously permitted by `table_growing` fails; embedders use it for accounting/rollback. Two concrete consequences: (1) a custom stateful limiter that pre-accounts growth in `table_growing` is never told the growth failed, leaving its accounting permanently inflated; (2) the built-in `StoreLimits` with `trap_on_grow_failure(true)` returns a raw OOM error instead of the contextualized 'forcing a table growth failure to be a trap' error that `table_grow_failed` produces, so behavior differs from the equivalent memory case. The other failure paths in `grow` (overflow at table.rs:640-645, max-exceeded at table.rs:660-667) DO call `table_grow_failed`, making this path the odd one out.","fix":"Wrap the dynamic `resize_with` calls in a closure returning `Result<()>` (mirroring `LocalMemory::grow`'s `result` block) and, on `Err`, call `limiter.table_grow_failed(e)?` then `return Ok(None)` instead of propagating the error directly.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/table.rs:697-705","code":"  697 |             Table::Dynamic(DynamicTable::Func(DynamicFuncTable { elements, .. })) => {\n  698 |                 elements.resize_with(new_size, || None)?;\n  699 |             }\n  700 |             Table::Dynamic(DynamicTable::GcRef(DynamicGcRefTable { elements, .. })) => {\n  701 |                 elements.resize_with(new_size, || None)?;\n  702 |             }\n  703 |             Table::Dynamic(DynamicTable::Cont(DynamicContTable { elements, .. })) => {\n  704 |                 elements.resize_with(new_size, || None)?;\n  705 |             }"},{"ref":"crates/wasmtime/src/runtime/vm/limits.rs:113-126","code":null}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"In the DRC trace fast path, the debug-assertion block reads the DRC header three separate times via `index`/`index_mut` for the same `gc_ref` (once to assert `is_in_over_approximated_stack_roots`, once via `index_mut(...).ref_count` to assert nonzero ref count, then again in `set_marked` through `index_mut`). Each `index`/`index_mut` recomputes the heap index, bounds-checks, and re-derives the typed pointer. While these are debug-only asserts, `index_mut` is used purely to read `ref_count` (line 562), which is needlessly taking a mutable borrow and recomputing the pointer. Only relevant in debug builds, hence low.","fix":"Read the DRC header once into a local reference and reuse it for all three debug assertions, and use `index` (shared) rather than `index_mut` when only reading `ref_count`.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/gc/enabled/drc.rs:549-569","code":"  549 |             debug_assert!(\n  550 |                 over_approx_set.contains(&gc_ref),\n  551 |                 \"every on-stack gc ref inside a Wasm frame should \\\n  552 |                  have be in our over-approximated stack roots set, \\\n  553 |                  but {gc_ref:#p} is not in the set\",\n  554 |             );\n  555 |             debug_assert!(\n  556 |                 self.index(drc_ref(&gc_ref))?\n  557 |                     .is_in_over_approximated_stack_roots(),\n  558 |                 \"every on-stack gc ref inside a Wasm frame should have \\\n  559 |                  its in-the-over-approximated-stack-roots-list bit set\",\n  560 |             );\n  561 |             debug_assert_ne!(\n  562 |                 self.index_mut(drc_ref(&gc_ref))?.ref_count,\n  563 |                 0,\n  564 |                 \"{gc_ref:#p} is on the Wasm stack and therefore should be held \\\n  565 |                  alive by the over-approximated-stack-roots set; should have \\\n  566 |                  nonzero ref count\",\n  567 |             );\n  568 | \n  569 |             self.index_mut(drc_ref(&gc_ref))?.set_marked();"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"`VMDrcHeader::set_marked` has a doc comment stating \"Returns `true` if this object was newly marked (i.e. `is_marked()` would have returned `false` before this call was made).\" but the function returns `()` (unit) and unconditionally sets the mark bit. The doc was likely copy-pasted from `clear_marked`, which does return a bool. This is misleading for anyone relying on the documented return value.","fix":"Remove the bogus \"Returns `true` ...\" sentence from `set_marked`'s doc comment (it has no return value), or make it actually return whether it was newly marked if a caller needs that.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/gc/enabled/drc.rs:782-791","code":"  782 |     /// Mark this object.\n  783 |     ///\n  784 |     /// Returns `true` if this object was newly marked (i.e. `is_marked()` would\n  785 |     /// have returned `false` before this call was made).\n  786 |     #[inline]\n  787 |     fn set_marked(&mut self) {\n  788 |         let reserved = self.header.reserved_u26();\n  789 |         self.header\n  790 |             .set_reserved_u26(reserved | wasmtime_environ::drc::HEADER_MARK_BIT);\n  791 |     }"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `VMGcHeader` struct-level doc comment describes the bit-packed layout as `kind: VMGcKind` in the highest 5 bits plus `reserved: u27` (\"27 bits available for the GcRuntime\"). This contradicts the actual implementation, which exposes the reserved field via `reserved_u26()` / `set_reserved_u26()` and `VMGcKind::UNUSED_MASK` covering 26 bits (VMGcKind occupies the high 5 bits, plus a 1-bit gap, leaving 26 usable reserved bits). The `set_reserved_u26` doc panics text and the `reserved_u26` doc (\"Get the reserved 26 bits\") are correct; only the type-level comment is wrong. Misleading documentation about how many reserved bits are available risks a future collector packing 27 bits of state and silently corrupting the kind field.","fix":"Update the struct doc comment to say `reserved: u26` and \"26 bits available\" so it matches `reserved_u26`/`UNUSED_MASK`.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/gc/gc_ref.rs:19-33","code":"   19 | /// This is a bit-packed structure that logically has the following fields:\n   20 | ///\n   21 | /// ```ignore\n   22 | /// struct VMGcHeader {\n   23 | ///     // Highest 5 bits.\n   24 | ///     kind: VMGcKind,\n   25 | ///\n   26 | ///     // 27 bits available for the `GcRuntime` to make use of however it sees fit.\n   27 | ///     reserved: u27,\n   28 | ///\n   29 | ///     // The `VMSharedTypeIndex` for this GC object, if it isn't an\n   30 | ///     // `externref` (or an `externref` re-wrapped as an `anyref`). `None` is\n   31 | ///     // represented with `VMSharedTypeIndex::reserved_value()`.\n   32 | ///     ty: Option<VMSharedTypeIndex>,\n   33 | /// }"},{"ref":"crates/wasmtime/src/runtime/vm/gc/gc_ref.rs:79-85","code":"   79 |     /// Get the reserved 26 bits in this header.\n   80 |     ///\n   81 |     /// These are bits are reserved for `GcRuntime` implementations to make use\n   82 |     /// of however they see fit.\n   83 |     pub fn reserved_u26(&self) -> u32 {\n   84 |         self.kind & VMGcKind::UNUSED_MASK\n   85 |     }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Doc comment for `VMOffsets::size_of_vmfunction_body_ptr` reads \"The size of the `current_elements` field.\" but the method returns the size of a `*const VMFunctionBody` pointer (one pointer width). The comment is copy-pasted from `vmtable_definition_current_elements` and is misleading about what the method represents.","fix":"Update the doc comment to describe the size of a `*const VMFunctionBody` (a single pointer), not `current_elements`.","locations":[{"ref":"crates/environ/src/vmoffsets.rs:862-866","code":"  862 | impl<P: PtrSize> VMOffsets<P> {\n  863 |     /// The size of the `current_elements` field.\n  864 |     pub fn size_of_vmfunction_body_ptr(&self) -> u8 {\n  865 |         1 * self.pointer_size()\n  866 |     }"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In `HostResourceTables::validate_host_index` the comment reads \"Bump the\ncurrent generation of this is a removal ...\" which is a typo for \"Bump the\ncurrent generation if this is a removal ...\". Minor, but it obscures the\nalready-subtle generation/ABA-protection logic in this security-critical\nfunction.","fix":"Fix the comment to read \"Bump the current generation if this is a removal\".","locations":[{"ref":"crates/wasmtime/src/runtime/component/resources/host_tables.rs:184-189","code":"  184 |         // Bump the current generation of this is a removal to ensure any\n  185 |         // future item placed in this slot can't be pointed to by the `idx`\n  186 |         // provided above.\n  187 |         if is_removal {\n  188 |             self.host_resource_data.cur_generation += 1;\n  189 |         }"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment on `WaiterInner.thread` claims the field \"may be read concurrently, but is only written under the lock of a `ParkingSpot`\". In practice every read of `thread` (only in `ParkingSpot::notify`, via `head.thread.unpark()`) is also performed while holding the `ParkingSpot` mutex, and every write (`waiter.thread = thread::current()` in `wait`) is under the same lock. There is no concurrent (lock-free) read of this field anywhere, so the comment describing a concurrent-read scenario is misleading and could lead a future maintainer to believe a lock-free read path exists (and to preserve a non-existent invariant or, worse, add an unsynchronized read believing it is already supported).","fix":"Update the comment to state that `thread` is only accessed (read and written) while holding the `ParkingSpot` lock.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/parking_spot.rs:42-43","code":"   42 |     // lock of a `ParkingSpot`.\n   43 |     thread: Thread,"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment on `StoreKind` reads \"Kinds of behavior supported by Wasm loads.\" but the enum describes Wasm *stores*. Copy/paste from the `LoadKind` doc comment immediately above. Purely cosmetic but mildly misleading when auditing store lowering.","fix":"Change the doc comment to \"Kinds of behavior supported by Wasm stores.\"","locations":[{"ref":"winch/codegen/src/masm.rs:618-627","code":"  618 | /// Kinds of behavior supported by Wasm loads.\n  619 | #[derive(Copy, Clone)]\n  620 | pub enum StoreKind {\n  621 |     /// Store the entire bytes of the operand size without any modifications.\n  622 |     Operand(OperandSize),\n  623 |     /// Store the entire bytes of the operand size without any modifications, atomically.\n  624 |     Atomic(OperandSize),\n  625 |     /// Store the content of selected lane.\n  626 |     VectorLane(LaneSelector),\n  627 | }"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"Copy-paste duplication in the debug-event computation of `CallThreadState::unwind`. The block that downcasts the host error to a `Trap` and assigns `event = crate::DebugEvent::Trap(*trap)` is written twice, back-to-back and verbatim. The second `if let Some(trap) = err.downcast_ref() { ... }` is dead: it recomputes the exact same downcast and assignment that the first block already performed, so it has no effect other than wasted work. This is almost certainly an editing mistake (one of the two blocks was likely intended to do something else or should not exist). It is harmless functionally but is confusing and signals the surrounding logic was not reviewed carefully.","fix":"Delete the second, identical `if let Some(trap) = err.downcast_ref() { event = crate::DebugEvent::Trap(*trap); }` block (lines 773-775).","locations":[{"ref":"crates/wasmtime/src/runtime/vm/traphandlers.rs:769-775","code":"  769 |                     if let Some(trap) = err.downcast_ref() {\n  770 |                         event = crate::DebugEvent::Trap(*trap);\n  771 |                     }\n  772 | \n  773 |                     if let Some(trap) = err.downcast_ref() {\n  774 |                         event = crate::DebugEvent::Trap(*trap);\n  775 |                     }"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","description":"On Unix, `delegate_signal_to_previous_handler` handles the case where the previous disposition for a non-wasm fault is `SIG_DFL`/`SIG_IGN` by reinstalling that disposition via `sigaction` and returning. Because our handler is installed with `SA_NODEFER` and we return from the signal handler, the faulting instruction is re-executed. For `SIG_DFL` this is the intended behavior (the process crashes \"normally\"). For `SIG_IGN`, however, re-executing a faulting load/store that originally raised e.g. SIGSEGV will fault again, deliver the signal again, and (since the disposition is now SIG_IGN and the kernel re-delivers a synchronous fault that cannot be ignored as SIG_IGN for SIGSEGV) either loops or has platform-defined behavior. In short, if an embedder set a faulting signal to SIG_IGN before `init_traps`, a non-wasm fault on that thread can spin indefinitely re-entering the handler rather than terminating. This is an edge case requiring an unusual prior disposition, hence low severity, but it is a real liveness hazard distinct from a clean crash.","fix":"When the previous disposition is SIG_IGN for a synchronous fault, prefer resetting to SIG_DFL (or abort) instead of reinstalling SIG_IGN, to guarantee forward progress / termination.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/sys/unix/signals.rs:213-225","code":"  213 |     unsafe {\n  214 |         let previous = *previous;\n  215 |         if previous.sa_flags & libc::SA_SIGINFO != 0 {\n  216 |             mem::transmute::<\n  217 |                 usize,\n  218 |                 extern \"C\" fn(libc::c_int, *mut libc::siginfo_t, *mut libc::c_void),\n  219 |             >(previous.sa_sigaction)(signum, siginfo, context)\n  220 |         } else if previous.sa_sigaction == libc::SIG_DFL || previous.sa_sigaction == libc::SIG_IGN {\n  221 |             libc::sigaction(signum, &previous as *const _, ptr::null_mut());\n  222 |         } else {\n  223 |             mem::transmute::<usize, extern \"C\" fn(libc::c_int)>(previous.sa_sigaction)(signum)\n  224 |         }\n  225 |     }"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"negligible","description":"In `impl From<&'a [u8]> for &'a VMGcObjectData`, the body is `&VMGcObjectData::from_slice(data)`. `from_slice` already returns `&'a VMGcObjectData`, so the leading `&` produces a `&&VMGcObjectData` that only type-checks because of an implicit deref coercion back to `&VMGcObjectData` at the return site. The extra `&` is redundant and confusing (the sibling `&'a mut [u8]` impl correctly returns `from_slice_mut(data)` with no extra `&`).","fix":"Change the body to `VMGcObjectData::from_slice(data)` (drop the leading `&`) to mirror the `from_slice_mut` impl.","locations":[{"ref":"crates/wasmtime/src/runtime/vm/gc/data.rs:97-102","code":"   97 | impl<'a> From<&'a [u8]> for &'a VMGcObjectData {\n   98 |     #[inline]\n   99 |     fn from(data: &'a [u8]) -> Self {\n  100 |         &VMGcObjectData::from_slice(data)\n  101 |     }\n  102 | }"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"negligible","description":"The `AddrG32` / `AddrG32Bne` bounds check computes `bound - offset - size_of::<T>()`\nwith unchecked `usize` subtractions, relying on the documented instruction contract\nthat `bound >= offset + size_of::<T>()`. If that invariant is ever violated (e.g. a\nbackend bug that emits an access whose static `offset + access size` exceeds the\nheap bound register, or a bound register left smaller than the static offset), the\nsubtraction underflows to a huge `usize`, the `wasm_addr > ...` comparison then\n(almost) always passes, the bounds check is silently skipped, and the subsequent\n`byte_add(wasm_addr).byte_add(offset)` performs an out-of-bounds host access. This is\nby-design per the trusted-bytecode model and is not reachable from Cranelift today,\nbut it is the single load-bearing arithmetic step guarding every g32 heap access and\nhas no debug assertion to catch a violated invariant during fuzzing/testing.","fix":"Add a `debug_assert!(bound >= offset + size_of::<T>())` (and for g32bne after loading `bound`) so violations of the documented no-underflow invariant are caught in debug/fuzz builds instead of silently disabling the bounds check.","locations":[{"ref":"pulley/src/interp.rs:1244-1288","code":" 1244 | impl AddressingMode for AddrG32 {\n 1245 |     unsafe fn addr<T, I: Encode>(self, i: &mut Interpreter<'_>) -> ControlFlow<Done, *mut T> {\n 1246 |         // Test if `bound - offset - T` is less than the wasm address to\n 1247 |         // generate a trap. It's a guarantee of this instruction that these\n 1248 |         // subtractions don't overflow.\n 1249 |         let bound = i.state[self.host_heap_bound].get_u64() as usize;\n 1250 |         let offset = usize::from(self.offset);\n 1251 |         let wasm_addr = i.state[self.wasm_addr].get_u32() as usize;\n 1252 |         if wasm_addr > bound - offset - size_of::<T>() {\n 1253 |             i.done_trap_kind::<I>(Some(TrapKind::MemoryOutOfBounds))?;\n 1254 |             unreachable!();\n 1255 |         }\n 1256 |         unsafe {\n 1257 |             let addr = i.state[self.host_heap_base]\n 1258 |                 .get_ptr::<T>()\n 1259 |                 .byte_add(wasm_addr)\n 1260 |                 .byte_add(offset);\n 1261 |             ControlFlow::Continue(addr)\n 1262 |         }\n 1263 |     }\n 1264 | }\n 1265 | \n 1266 | impl AddressingMode for AddrG32Bne {\n 1267 |     unsafe fn addr<T, I: Encode>(self, i: &mut Interpreter<'_>) -> ControlFlow<Done, *mut T> {\n 1268 |         // Same as `AddrG32` above except that the bound is loaded from memory.\n 1269 |         let bound = unsafe {\n 1270 |             *i.state[self.host_heap_bound_addr]\n 1271 |                 .get_ptr::<usize>()\n 1272 |                 .byte_add(usize::from(self.host_heap_bound_offset))\n 1273 |         };\n 1274 |         let wasm_addr = i.state[self.wasm_addr].get_u32() as usize;\n 1275 |         let offset = usize::from(self.offset);\n 1276 |         if wasm_addr > bound - offset - size_of::<T>() {\n 1277 |             i.done_trap_kind::<I>(Some(TrapKind::MemoryOutOfBounds))?;\n 1278 |             unreachable!();\n 1279 |         }\n 1280 |         unsafe {\n 1281 |             let
