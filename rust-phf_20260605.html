<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"OrderedMap::get_internal (non-ptrhash) computes idx_index by modulo over self.idxs.len() (via get_index's `len` parameter), then does `let idx = self.idxs[idx_index as usize];` followed by `let entry = &self.entries[idx];`. The value read from `idxs` is used as a direct, unchecked index into `entries`. For a maliciously- or incorrectly-constructed OrderedMap (the fields are public and constructed by codegen), any `idxs` element >= entries.len() causes an out-of-bounds panic. Unlike Map::get_entry, which modulos by entries.len() and is therefore always in-bounds, the ordered variant has no such guarantee on the second-level lookup.","fix":"Use checked indexing for the entries access, e.g. `let entry = self.entries.get(idx)?;` (or `self.idxs.get(idx_index).and_then(|&idx| self.entries.get(idx))`), so a corrupt idxs table returns None instead of panicking.","locations":[{"ref":"phf/src/ordered_map.rs:188-189","code":"  188 |             let idx = self.idxs[idx_index as usize];\n  189 |             let entry = &self.entries[idx];"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"OrderedMap::get_internal (ptrhash path) has the same unchecked two-level indirection: `let idx = self.idxs[idx_index as usize];` then `let entry = &self.entries[idx];`. `idx` comes from the idxs table and is used as a raw index into entries with no bounds check, so a corrupt/maliciously-built idxs table panics on out-of-bounds access.","fix":"Index defensively: `let &idx = self.idxs.get(idx_index as usize)?; let entry = self.entries.get(idx)?;` returning None on inconsistency rather than panicking.","locations":[{"ref":"phf/src/ordered_map.rs:212-213","code":"  212 |             let idx = self.idxs[idx_index as usize];\n  213 |             let entry = &self.entries[idx];"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"`get_index` panics with a divide-by-zero / modulo-by-zero if `disps` is empty: `hashes.g % (disps.len() as u32)` computes `% 0` when `disps.len() == 0`. This is a runtime lookup path. While a well-formed generated PHF should never hand an empty `disps` to a non-empty map, a corrupted or hand-constructed `phf` struct (these fields are technically reachable) would panic instead of returning a safe value. The indexing `disps[...]` cannot itself go out of bounds because the index is reduced modulo `disps.len()`, but only because `disps` is non-empty.","fix":"Document the non-empty precondition explicitly, and/or guard: if `disps.is_empty()` return 0 (or handle len==0). At minimum add a debug_assert!(!disps.is_empty() && len > 0).","locations":[{"ref":"phf_shared/src/lib.rs:63-66","code":"   63 | pub fn get_index(hashes: &Hashes, disps: &[(u32, u32)], len: usize) -> u32 {\n   64 |     let (d1, d2) = disps[(hashes.g % (disps.len() as u32)) as usize];\n   65 |     displace(hashes.f1, hashes.f2, d1, d2) % (len as u32)\n   66 | }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"`ptrhash::get_index` indexes `pilots[bucket]` and `remap[index - len]` in the runtime lookup path. `bucket` is bounded by `fast_reduct32(_, pilots_len)` which yields a value in `[0, pilots_len)` ONLY when `pilots_len > 0`; if `pilots` is empty, `fast_reduct32` returns 0 and `pilots[0]` panics. Likewise `remap[index - len]` relies on the invariant that `index < slots_len = len + remap.len()`; this holds because `fast_reduct32(_, slots_len)` bounds index < slots_len, but only when `slots_len > 0`. With an empty/degenerate state these indexings panic.","fix":"Document and/or debug_assert the invariants !pilots.is_empty() and slots_len > 0; consider .get(...) with a defined fallback if degenerate states must be tolerated.","locations":[{"ref":"phf_shared/src/ptrhash.rs:33-42","code":"   33 |     let bucket = fast_reduct32(low(hash), pilots_len) as usize;\n   34 |     let pilot_hash = hash_pilot(seed, pilots[bucket]);\n   35 |     let index = fast_reduct32(high(hash) ^ high(pilot_hash) ^ low(pilot_hash), slots_len);\n   36 |     let index = index as usize;\n   37 | \n   38 |     if index < len {\n   39 |         index as u32\n   40 |     } else {\n   41 |         remap[index - len]\n   42 |     }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"OrderedMap::get_internal (non-ptrhash) guards emptiness with `if self.disps.is_empty()` but then passes `self.idxs.len()` as the modulo `len` to phf_shared::get_index, where the final operation is `displace(...) % (len as u32)`. If disps is non-empty while idxs is empty (an inconsistent but constructible state, since all fields are public), this divides/modulos by zero and panics. The empty check should be on the slice that actually feeds the modulo.","fix":"Guard on the table used for the modulo as well, e.g. `if self.idxs.is_empty() { return None; }` (or check both disps and idxs), keeping it consistent with the value passed as `len`.","locations":[{"ref":"phf/src/ordered_map.rs:182-187","code":"  182 |             if self.disps.is_empty() {\n  183 |                 return None;\n  184 |             }\n  185 | \n  186 |             let hashes = phf_shared::hash(key, &self.key);\n  187 |             let idx_index = phf_shared::get_index(&hashes, self.disps, self.idxs.len());"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"OrderedMap::get_internal (ptrhash path) guards on `self.entries.is_empty()` but passes `self.idxs.len()` as `len` into ptrhash::get_index, which computes `slots_len = (len + remap.len())` and uses it in fast_reduct32 / remap indexing. If entries is non-empty but idxs is empty (inconsistent public-field state), bucket/index math operates on a zero-sized logical table and `self.idxs[idx_index]` then panics. The emptiness guard is checked against the wrong slice relative to the `len` argument.","fix":"Check `self.idxs.is_empty()` (the slice whose length is passed as `len`) in addition to / instead of entries, and use checked indexing for the subsequent idxs/entries access.","locations":[{"ref":"phf/src/ordered_map.rs:200-212","code":"  200 |             if self.entries.is_empty() {\n  201 |                 return None;\n  202 |             }\n  203 | \n  204 |             let hash = phf_shared::ptrhash::hash(key, &self.key);\n  205 |             let idx_index = phf_shared::ptrhash::get_index(\n  206 |                 self.key,\n  207 |                 hash,\n  208 |                 self.pilots,\n  209 |                 self.remap,\n  210 |                 self.idxs.len(),\n  211 |             );\n  212 |             let idx = self.idxs[idx_index as usize];"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"Out-of-range integer literals cause the proc macro to panic instead of emitting a clean spanned compile error. Every `s.base10_parse::<uN>().unwrap()` (and the signed variants which parse as the unsigned type) calls `unwrap()`; `syn::LitInt::base10_parse` returns `Err` when the literal does not fit the target type. So a key like `300u8`, `99999999999u8`, etc. makes the proc macro panic, producing a confusing `proc macro panicked` build error pointing at the macro invocation site rather than a helpful `Error::new_spanned(s, ...)` message at the offending literal. These literals come directly from user token streams, so user input drives the panic.","fix":"Replace `.base10_parse::<T>().unwrap()` with `?` propagation (e.g. `s.base10_parse::<u8>()?`) so the parse error is reported as a proper spanned `syn::Error`. Update each match arm to return `syn::Result` accordingly (they already do).","locations":[{"ref":"phf_macros/src/lib.rs:127-142","code":"  127 |             Some(ParsedKey::I8(_)) => Ok(ParsedKey::I8(s.base10_parse::<u8>().unwrap() as i8)),\n  128 |             Some(ParsedKey::I16(_)) => Ok(ParsedKey::I16(s.base10_parse::<u16>().unwrap() as i16)),\n  129 |             Some(ParsedKey::I32(_)) => Ok(ParsedKey::I32(s.base10_parse::<u32>().unwrap() as i32)),\n  130 |             Some(ParsedKey::I64(_)) => Ok(ParsedKey::I64(s.base10_parse::<u64>().unwrap() as i64)),\n  131 |             Some(ParsedKey::I128(_)) => {\n  132 |                 Ok(ParsedKey::I128(s.base10_parse::<u128>().unwrap() as i128))\n  133 |             }\n  134 |             Some(ParsedKey::Isize(_)) => {\n  135 |                 Ok(ParsedKey::Isize(s.base10_parse::<usize>().unwrap() as isize))\n  136 |             }\n  137 |             Some(ParsedKey::U8(_)) => Ok(ParsedKey::U8(s.base10_parse::<u8>().unwrap())),\n  138 |             Some(ParsedKey::U16(_)) => Ok(ParsedKey::U16(s.base10_parse::<u16>().unwrap())),\n  139 |             Some(ParsedKey::U32(_)) => Ok(ParsedKey::U32(s.base10_parse::<u32>().unwrap())),\n  140 |             Some(ParsedKey::U64(_)) => Ok(ParsedKey::U64(s.base10_parse::<u64>().unwrap())),\n  141 |             Some(ParsedKey::U128(_)) => Ok(ParsedKey::U128(s.base10_parse::<u128>().unwrap())),\n  142 |             Some(ParsedKey::Usize(_)) => Ok(ParsedKey::Usize(s.base10_parse::<usize>().unwrap())),"},{"ref":"phf_macros/src/lib.rs:165-176","code":"  165 |                     \"i8\" => Ok(ParsedKey::I8(s.base10_parse::<u8>().unwrap() as i8)),\n  166 |                     \"i16\" => Ok(ParsedKey::I16(s.base10_parse::<u16>().unwrap() as i16)),\n  167 |                     \"i32\" => Ok(ParsedKey::I32(s.base10_parse::<u32>().unwrap() as i32)),\n  168 |                     \"i64\" => Ok(ParsedKey::I64(s.base10_parse::<u64>().unwrap() as i64)),\n  169 |                     \"i128\" => Ok(ParsedKey::I128(s.base10_parse::<u128>().unwrap() as i128)),\n  170 |                     \"isize\" => Ok(ParsedKey::Isize(s.base10_parse::<usize>().unwrap() as isize)),\n  171 |                     \"u8\" => Ok(ParsedKey::U8(s.base10_parse::<u8>().unwrap())),\n  172 |                     \"u16\" => Ok(ParsedKey::U16(s.base10_parse::<u16>().unwrap())),\n  173 |                     \"u32\" => Ok(ParsedKey::U32(s.base10_parse::<u32>().unwrap())),\n  174 |                     \"u64\" => Ok(ParsedKey::U64(s.base10_parse::<u64>().unwrap())),\n  175 |                     \"u128\" => Ok(ParsedKey::U128(s.base10_parse::<u128>().unwrap())),\n  176 |                     \"usize\" => Ok(ParsedKey::Usize(s.base10_parse::<usize>().unwrap())),"},{"ref":"phf_macros/src/lib.rs:190-193","code":"  190 |                                 \"u8\" => buf.push(s.base10_parse::<u8>().unwrap()),\n  191 |                                 \"\" => {\n  192 |                                     if can_infer_u8 || !buf.is_empty() {\n  193 |                                         buf.push(s.base10_parse::<u8>().unwrap());"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"`write_tokens` (quote feature) calls `.expect(\"phf_codegen generated invalid Rust tokens\")` when re-parsing the Display output into a TokenStream. If a user passes a `value` string that is not valid Rust tokens (values are written verbatim via `entry`), `ToTokens::to_tokens` will panic during macro/build expansion instead of surfacing a normal compile error. Values are user-controlled, so malformed value source triggers this panic.","fix":"`ToTokens` cannot return an error, but the panic message could include the offending generated source to aid debugging; alternatively document clearly that the `quote` integration requires syntactically valid value expressions.","locations":[{"ref":"phf_codegen/src/lib.rs:165-173","code":"  165 | #[cfg(feature = \"quote\")]\n  166 | fn write_tokens(tokens: &mut proc_macro2::TokenStream, value: impl fmt::Display) {\n  167 |     tokens.extend(\n  168 |         value\n  169 |             .to_string()\n  170 |             .parse::<proc_macro2::TokenStream>()\n  171 |             .expect(\"phf_codegen generated invalid Rust tokens\"),\n  172 |     );\n  173 | }"},{"ref":"phf_codegen/src/lib.rs:374-379","code":"  374 | #[cfg(feature = \"quote\")]\n  375 | impl<'a, K: FmtConst + 'a> quote::ToTokens for DisplayMap<'a, K> {\n  376 |     fn to_tokens(&self, tokens: &mut proc_macro2::TokenStream) {\n  377 |         write_tokens(tokens, self);\n  378 |     }\n  379 | }"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"phf_codegen `build()` panics with `panic!(\"duplicate key ...\")` on duplicate keys. In a build script a panic aborts the build with a backtrace-style message rather than a clean `cargo:warning`/error; while duplicate keys must fail, a panic is a blunt mechanism. More importantly the panic message uses `Delegate(key)` which calls `FmtConst::fmt_const` (intended to emit Rust source), so the diagnostic may render the key as a Rust literal rather than human-readable text.","fix":"This is the documented contract (the doc comment says it panics), so keep panicking but ensure the message is clear; consider `Display`-formatting the key for readability, or returning a `Result` in a future API revision.","locations":[{"ref":"phf_codegen/src/lib.rs:238-244","code":"  238 |     pub fn build(&self) -> DisplayMap<'_, K> {\n  239 |         let mut set = HashSet::new();\n  240 |         for key in &self.keys {\n  241 |             if !set.insert(key) {\n  242 |                 panic!(\"duplicate key `{}`\", Delegate(key));\n  243 |             }\n  244 |         }"},{"ref":"phf_codegen/src/lib.rs:493-499","code":"  493 |     pub fn build(&self) -> DisplayOrderedMap<'_, K> {\n  494 |         let mut set = HashSet::new();\n  495 |         for key in &self.keys {\n  496 |             if !set.insert(key) {\n  497 |                 panic!(\"duplicate key `{}`\", Delegate(key));\n  498 |             }\n  499 |         }"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"table_len.try_into().unwrap() (usize -> u32) panics if the number of keys exceeds u32::MAX, and remapped.try_into().unwrap() (usize -> u32) panics if a remapped slot index exceeds u32::MAX. This is a compile-time codegen path so impact is limited, but the failure is an opaque unwrap panic rather than a clear diagnostic, and slot indices can in principle exceed table_len.","fix":"Replace the unwraps with an explicit error/message (e.g. expect(\"phf: more than u32::MAX keys are not supported\")) so oversized inputs produce a clear diagnostic instead of a bare panic.","locations":[{"ref":"phf_generator/src/ptrhash.rs:64","code":"   64 |     let table_len_u32 = table_len.try_into().unwrap();"},{"ref":"phf_generator/src/ptrhash.rs:193","code":"  193 |                 remap[slot - table_len] = remapped.try_into().unwrap();"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"negligible","description":"When try_generate_hash returns None (best? on line 159 yields None because no pilot could be assigned, or the outer search keeps failing), generate_hash_with_hash_fn (ptrhash) loops forever trying new seeds rather than ever terminating with an error. The CHD generate_hash_with_hash_fn instead relies on a finite iterator and ultimately .expect(\"failed to solve PHF\"); but iter::repeat_with is infinite so that expect is effectively unreachable and the failure mode is also an infinite loop. Neither path can terminate cleanly on an unsolvable input.","fix":"Bound the seed-retry loop to a maximum number of attempts and return a real error / panic with a descriptive message after exhausting them, so an unsolvable input fails fast instead of hanging.","locations":[{"ref":"phf_generator/src/ptrhash.rs:39-48","code":"   39 |     loop {\n   40 |         let seed = rng.u64(..);\n   41 |         for (hash, entry) in hashes.iter_mut().zip(entries) {\n   42 |             *hash = hash_fn(entry, &seed);\n   43 |         }\n   44 | \n   45 |         if let Some(state) = try_generate_hash(seed, &hashes) {\n   46 |             return state;\n   47 |         }\n   48 |     }"},{"ref":"phf_generator/src/lib.rs:36-48","code":"   36 |     iter::repeat_with(|| rng.u64(..))\n   37 |         .find(|key| {\n   38 |             let hashes = entries.iter().map(|entry| hash_fn(entry, key));\n   39 |             generator.reset(hashes);\n   40 | \n   41 |             generator.try_generate_hash()\n   42 |         })\n   43 |         .map(|key| HashState {\n   44 |             key,\n   45 |             disps: generator.disps,\n   46 |             map: generator.map,\n   47 |         })\n   48 |         .expect(\"failed to solve PHF\")"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`get_index` truncates `disps.len() as u32` and `len as u32` on 64-bit targets. If `len` (the map length) or `disps.len()` ever exceeds `u32::MAX`, the cast silently truncates, producing wrong indices (and potentially an index that is in-range for the truncated value but maps to the wrong slot). The `hash()` fields are u32 so the whole scheme is implicitly limited to <= 2^32 entries, but there is no assertion documenting/enforcing this.","fix":"Add a debug_assert that `disps.len() <= u32::MAX as usize` and `len <= u32::MAX as usize`, or document the 2^32-entry limit on the function. Same applies to ptrhash::get_index casts.","locations":[{"ref":"phf_shared/src/lib.rs:64-65","code":"   64 |     let (d1, d2) = disps[(hashes.g % (disps.len() as u32)) as usize];\n   65 |     displace(hashes.f1, hashes.f2, d1, d2) % (len as u32)"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`ptrhash::get_index` casts `pilots.len() as u32` and `(len + remap.len()) as u32`. The `len + remap.len()` addition can overflow usize in theory and is truncated to u32, and `fast_reduct32` only operates on u32 limits, silently capping the scheme at 2^32 slots. No assertion documents/enforces this limit.","fix":"Add debug_assert!(len + remap.len() <= u32::MAX as usize) and debug_assert!(pilots.len() <= u32::MAX as usize), or document the limit.","locations":[{"ref":"phf_shared/src/ptrhash.rs:30-31","code":"   30 |     let pilots_len = pilots.len() as u32;\n   31 |     let slots_len = (len + remap.len()) as u32;"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"Unsuffixed `isize`/`usize` keys, and suffixed `isize`/`usize` keys, are parsed with `base10_parse::<usize>()`/`<isize>()` which uses the HOST pointer width (proc macros always run on the build host) rather than the target pointer width. On a 64-bit host cross-compiling for a 32-bit target, an `isize`/`usize` key that is valid on the host but out of range on the target (or vice-versa) will be accepted/rejected based on the host width, and the hashed value can differ from what the runtime `phf` code computes on the target, yielding a silently wrong lookup table. The same host/target mismatch applies to the `as isize`/`as usize` casts.","fix":"Avoid `isize`/`usize` keys hashing on host width: hash isize/usize keys through a fixed-width type, or document that pointer-sized integer keys are unsupported for cross-compilation, or reject them with a clear error.","locations":[{"ref":"phf_macros/src/lib.rs:134-136","code":"  134 |             Some(ParsedKey::Isize(_)) => {\n  135 |                 Ok(ParsedKey::Isize(s.base10_parse::<usize>().unwrap() as isize))\n  136 |             }"},{"ref":"phf_macros/src/lib.rs:142","code":"  142 |             Some(ParsedKey::Usize(_)) => Ok(ParsedKey::Usize(s.base10_parse::<usize>().unwrap())),"},{"ref":"phf_macros/src/lib.rs:170","code":"  170 |                     \"isize\" => Ok(ParsedKey::Isize(s.base10_parse::<usize>().unwrap() as isize)),"},{"ref":"phf_macros/src/lib.rs:176","code":"  176 |                     \"usize\" => Ok(ParsedKey::Usize(s.base10_parse::<usize>().unwrap())),"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"slots.len() - table_len on line 184 would underflow (panic in debug) if slots_len < table_len. In practice adjusted_slots_len returns ceil(keys/0.99)+maybe1 which is always >= keys, so this cannot underflow given the current DEFAULT_ALPHA < 1.0. The invariant is implicit and undocumented, so a future change to DEFAULT_ALPHA >= 1.0 would silently break it.","fix":"Add a debug_assert!(slots.len() >= table_len) (or a comment documenting that DEFAULT_ALPHA must be < 1.0) so the dependency between alpha and the no-underflow invariant is explicit.","locations":[{"ref":"phf_generator/src/ptrhash.rs:184","code":"  184 |     let mut remap = vec![0; slots.len() - table_len];"},{"ref":"phf_generator/src/ptrhash.rs:208-211","code":"  208 | fn adjusted_slots_len(keys_len: u32) -> u32 {\n  209 |     let len = (f64::from(keys_len) / DEFAULT_ALPHA).ceil() as u32;\n  210 |     len + u32::from(len.is_power_of_two())\n  211 | }"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Endianness consistency: integer types hashed via `integer_impl` call `self.hash(state)` which dispatches to `write_u16/u32/...` on PortableSipHasher, and PortableSipHasher applies `.to_le()` to make encoding architecture-independent. However `char::phf_hash` hashes `(*self as u32).phf_hash(state)` -> `write_u32` -> also `.to_le()`, so char is consistent. The concern in the brief is unfounded for char itself. BUT note `phf_hash_slice` default (lib.rs:82) writes `data.len() as u64` via `write_u64` (gets `.to_le()` correction, fine), while `single_byte_impl::phf_hash_slice` (lib.rs:415) also writes len via `write_u64` and then raw bytes via `write` (no endianness issue for bytes). These are consistent. Recording: the comment at integer_impl line 388 ('phf_hash_slice cannot use write due to endianness') is correct in intent — a slice of multi-byte integers must hash each element through the endianness-correcting write_uN, not a raw byte `write`.","fix":"No code change required; consider a cross-endian determinism test (hash a u32 array and compare to a hard-coded expected 128-bit value) to lock in the contract.","locations":[{"ref":"phf_shared/src/lib.rs:388","code":"  388 |             // `phf_hash_slice` cannot use `write` due to possible differences in endianness."},{"ref":"phf_shared/src/lib.rs:428-433","code":"  428 | impl PhfHash for char {\n  429 |     #[inline]\n  430 |     fn phf_hash<H: Hasher>(&self, state: &mut H) {\n  431 |         (*self as u32).phf_hash(state)\n  432 |     }\n  433 | }"},{"ref":"phf_shared/src/hasher.rs:27-44","code":"   27 |     // `SipHasher` invokes `to_le` on integers before encoding them, treating them as byte arrays\n   28 |     // rather than values, which is not the right interpretation for us; fix that by flipping\n   29 |     // endianness twice.\n   30 |     fn write_u16(&mut self, i: u16) {\n   31 |         self.inner.write_u16(i.to_le());\n   32 |     }\n   33 |     fn write_u32(&mut self, i: u32) {\n   34 |         self.inner.write_u32(i.to_le());\n   35 |     }\n   36 |     fn write_u64(&mut self, i: u64) {\n   37 |         self.inner.write_u64(i.to_le());\n   38 |     }\n   39 |     fn write_u128(&mut self, i: u128) {\n   40 |         self.inner.write_u128(i.to_le());\n   41 |     }\n   42 | \n   43 |     fn write_usize(&mut self, i: usize) {\n   44 |         self.inner.write_u64((i as u64).to_le());"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In the `Expr::Array` branch the error message for an unsuffixed element with no inference context is \"integer key literals in the first key must have an explicit type suffix\". But `can_infer_u8 || !buf.is_empty()` lets a later element infer `u8` from an earlier element even within the *first* key array, and conversely the message is emitted for any array (not necessarily the first key) whose hint is not `Binary` and whose first element is unsuffixed. The message can therefore appear for non-first keys and misstates the actual rule, giving a misleading diagnostic location/text.","fix":"Make the message describe the real condition (e.g. \"the first `u8` array element must have an explicit `u8` suffix so the key type can be inferred\") and base inference on the established key_hint rather than partly on `!buf.is_empty()`.","locations":[{"ref":"phf_macros/src/lib.rs:185-200","code":"  185 |                 let can_infer_u8 = matches!(hint, Some(ParsedKey::Binary(_)));\n  186 |                 for expr in &array.elems {\n  187 |                     match expr {\n  188 |                         Expr::Lit(lit) => match &lit.lit {\n  189 |                             Lit::Int(s) => match s.suffix() {\n  190 |                                 \"u8\" => buf.push(s.base10_parse::<u8>().unwrap()),\n  191 |                                 \"\" => {\n  192 |                                     if can_infer_u8 || !buf.is_empty() {\n  193 |                                         buf.push(s.base10_parse::<u8>().unwrap());\n  194 |                                     } else {\n  195 |                                         return Err(Error::new_spanned(\n  196 |                                             s,\n  197 |                                             \"integer key literals in the first key must have an explicit type suffix\",\n  198 |                                         ));\n  199 |                                     }\n  200 |                                 }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","description":"The CHD displacement search is O(table_len^2) per bucket: for each bucket it tries every (d1, d2) pair where both d1 and d2 range over 0..table_len. For a large input (e.g. the 1,000,000-key gen_hash_test binary, or the gen_hash_xlarge bench up to 1,000,000) this is up to table_len^2 = 10^12 displacement evaluations per bucket in the worst case, and the number of buckets is ~table_len/3. Even when a placement is found early, the nested ranges make worst-case generation effectively unbounded for big tables. Classic CHD uses small fixed displacement ranges (e.g. bucket-size-derived) rather than the full table length.","fix":"Bound the d1/d2 search to a small constant (or a value derived from bucket size / a configurable limit) instead of 0..table_len, matching standard CHD behavior, and/or fall back to a fresh seed sooner.","locations":[{"ref":"phf_generator/src/lib.rs:167-190","code":"  167 |             for d1 in 0..(table_len as u32) {\n  168 |                 'disps: for d2 in 0..(table_len as u32) {\n  169 |                     values_to_add.clear();\n  170 |                     generation += 1;\n  171 | \n  172 |                     for &key in keys {\n  173 |                         let idx =\n  174 |                             (phf_shared::displace(self.hashes[key].f1, self.hashes[key].f2, d1, d2)\n  175 |                                 % (table_len as u32)) as usize;\n  176 |                         if self.map[idx] != EMPTY_SLOT || self.try_map[idx] == generation {\n  177 |                             continue 'disps;\n  178 |                         }\n  179 |                         self.try_map[idx] = generation;\n  180 |                         values_to_add.push((idx, key));\n  181 |                     }\n  182 | \n  183 |                     // We've picked a good set of disps\n  184 |                     self.disps[bucket.idx] = (d1, d2);\n  185 |                     for &(idx, key) in &values_to_add {\n  186 |                         self.map[idx] = key;\n  187 |                     }\n  188 |                     continue 'buckets;\n  189 |                 }\n  190 |             }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","description":"Inside the ptrhash eviction loop, the work stack is fully re-sorted on every single pop via stack.sort_unstable_by_key(...). This turns each pop into an O(n log n) operation, making the whole eviction phase O(n^2 log n) in the number of stacked buckets. Sorting on each pop is redundant since at most one element is pushed between pops.","fix":"Use a priority queue (BinaryHeap keyed by bucket key-count) for the stack, or sort once and insert in order, instead of re-sorting the entire Vec on every pop.","locations":[{"ref":"phf_generator/src/ptrhash.rs:95-98","code":"   95 |         'bucket: while let Some(bucket) = {\n   96 |             stack.sort_unstable_by_key(|&bucket| buckets[bucket].keys.len());\n   97 |             stack.pop()\n   98 |         } {"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"values_to_add membership is checked with a linear scan values_to_add.iter().any(|&(seen, _)| seen == slot) inside the per-key loops, giving O(k^2) behavior per bucket where k is the bucket size. In normal operation buckets are tiny (lambda ~ 3), so impact is small, but the same pattern appears in both try_place_bucket and the scoring loop of try_generate_hash and would degrade badly for pathologically large buckets.","fix":"For larger buckets, track occupied slots with a small hash set or a generation-marked scratch array (as lib.rs already does with try_map) instead of a linear scan.","locations":[{"ref":"phf_generator/src/ptrhash.rs:128","code":"  128 |                     if values_to_add.iter().any(|&(seen, _)| seen == slot) {"},{"ref":"phf_generator/src/ptrhash.rs:233","code":"  233 |         if slots[slot as usize].is_some() || values_to_add.iter().any(|&(seen, _)| seen == slot) {"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","description":"phf_codegen's Display impls emit each entry/displacement with an individual `write!` call to the formatter. For very large generated maps this performs one formatter dispatch per entry; the `write!` calls also embed multi-line literals. This is acceptable for build scripts but is the main allocation/dispatch hot path when generating large tables and could be batched.","fix":"If large-map codegen speed matters, build into a `String` with `write!`/`push_str` once, or use `f.write_str` for the static separators; otherwise document that performance is intentionally not optimized.","locations":[{"ref":"phf_codegen/src/lib.rs:278-303","code":"  278 |         for &(d1, d2) in &self.state.disps {\n  279 |             write!(\n  280 |                 f,\n  281 |                 \"\n  282 |         ({}, {}),\",\n  283 |                 d1, d2\n  284 |             )?;\n  285 |         }\n  286 | \n  287 |         write!(\n  288 |             f,\n  289 |             \"\n  290 |     ],\n  291 |     entries: &[\",\n  292 |         )?;\n  293 | \n  294 |         // write map entries\n  295 |         for &idx in &self.state.map {\n  296 |             write!(\n  297 |                 f,\n  298 |                 \"\n  299 |         ({}, {}),\",\n  300 |                 Delegate(&self.keys[idx]),\n  301 |                 &self.values[idx]\n  302 |             )?;\n  303 |         }"},{"ref":"phf_codegen/src/lib.rs:530-566","code":"  530 |         for &(d1, d2) in &self.state.disps {\n  531 |             write!(\n  532 |                 f,\n  533 |                 \"\n  534 |         ({}, {}),\",\n  535 |                 d1, d2\n  536 |             )?;\n  537 |         }\n  538 |         write!(\n  539 |             f,\n  540 |             \"\n  541 |     ],\n  542 |     idxs: &[\",\n  543 |         )?;\n  544 |         for &idx in &self.state.map {\n  545 |             write!(\n  546 |                 f,\n  547 |                 \"\n  548 |         {},\",\n  549 |                 idx\n  550 |             )?;\n  551 |         }\n  552 |         write!(\n  553 |             f,\n  554 |             \"\n  555 |     ],\n  556 |     entries: &[\",\n  557 |         )?;\n  558 |         for (key, value) in self.keys.iter().zip(self.values.iter()) {\n  559 |             write!(\n  560 |                 f,\n  561 |                 \"\n  562 |         ({}, {}),\",\n  563 |                 Delegate(key),\n  564 |                 value\n  565 |             )?;\n  566 |         }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","description":"values_to_add in lib.rs try_generate_hash is allocated with vec![] on every call. Since try_generate_hash is invoked once per candidate seed in the retry loop, this reallocates a temporary on each retry. The Generator struct already caches reusable scratch buffers (try_map, map, etc.), so this one stands out as inconsistent.","fix":"Promote values_to_add to a reusable field on Generator and clear() it in reset(), matching the handling of the other scratch buffers.","locations":[{"ref":"phf_generator/src/lib.rs:161","code":"  161 |         let mut values_to_add = vec![];"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"Bucket::idx is always equal to the bucket's own index (set to i in Generator::new and never changed), so self.disps[bucket.idx] = (d1, d2) on line 184 is equivalent to self.disps[bucket_idx]. The idx field is redundant state that must be kept consistent for no benefit.","fix":"Remove the Bucket::idx field and index disps with the loop variable bucket_idx directly.","locations":[{"ref":"phf_generator/src/lib.rs:52-56","code":"   52 |     idx: usize,\n   53 |     start: usize,\n   54 |     len: usize,\n   55 |     cursor: usize,\n   56 | }"},{"ref":"phf_generator/src/lib.rs:75-80","code":"   75 |             .map(|i| Bucket {\n   76 |                 idx: i,\n   77 |                 start: 0,\n   78 |                 len: 0,\n   79 |                 cursor: 0,\n   80 |             })"},{"ref":"phf_generator/src/lib.rs:184","code":"  184 |                     self.disps[bucket.idx] = (d1, d2);"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`Hashes` is `#[non_exhaustive]` but is constructed within this same crate (lib.rs hash()) and its fields are public; `#[non_exhaustive]` only restricts construction by OTHER crates. Downstream code (phf, phf_macros) constructs Hashes via get_index taking `&Hashes`, so this is fine, but the attribute combined with all-public-fields and an in-crate constructor means external code can read but not build a Hashes — confirm that is intended (it prevents external direct construction, which is reasonable). Minor: no Default/constructor is exposed, so the type is read-only externally.","fix":"No change required if intentional; otherwise document why Hashes is non_exhaustive.","locations":[{"ref":"phf_shared/src/lib.rs:22-27","code":"   22 | #[non_exhaustive]\n   23 | pub struct Hashes {\n   24 |     pub g: u32,\n   25 |     pub f1: u32,\n   26 |     pub f2: u32,\n   27 | }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"phf_shared::get_index's doc comment says it returns 'an index into phf_generator::HashState::map' and that `len` is 'the length of HashState::map'. In OrderedMap::get_internal the result is used as an index into `self.idxs` (then idxs maps to entries), and `len` is passed as `self.idxs.len()`. The semantics are correct for the ordered case only because idxs.len()==map.len(), but readers auditing the ordered path may be misled about what the returned index addresses. Worth a clarifying comment at the OrderedMap call site explaining the two-level indirection.","fix":"Add a comment at the OrderedMap get_internal call site noting that get_index returns an index into idxs (not entries), and that idxs then maps to the entry slot.","locations":[{"ref":"phf/src/ordered_map.rs:187-189","code":"  187 |             let idx_index = phf_shared::get_index(&hashes, self.disps, self.idxs.len());\n  188 |             let idx = self.idxs[idx_index as usize];\n  189 |             let entry = &self.entries[idx];"},{"ref":"phf_shared/src/lib.rs:57-66","code":"   57 | /// Return an index into `phf_generator::HashState::map`.\n   58 | ///\n   59 | /// * `hash` is from `hash()` in this crate.\n   60 | /// * `disps` is from `phf_generator::HashState::disps`.\n   61 | /// * `len` is the length of `phf_generator::HashState::map`.\n   62 | #[inline]\n   63 | pub fn get_index(hashes: &Hashes, disps: &[(u32, u32)], len: usize) -> u32 {\n   64 |     let (d1, d2) = disps[(hashes.g % (disps.len() as u32)) as usize];\n   65 |     displace(hashes.f1, hashes.f2, d1, d2) % (len as u32)\n   66 | }"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment block at hasher.rs:46-53 is confusing/misleading. It is captioned as explaining why a custom `write_isize` is needed, but the worked example ('32-bit: -1 -> 2^32-1 -> 2^32-1, 64-bit: -1 -> 2^64-1 -> 2^64-1') describes the DEFAULT std behavior that the override exists to avoid, without clearly stating that the override fixes it. The actual override uses `(i as u64).to_le()`, where `i as u64` sign-extends an isize so -1 becomes 2^64-1 on BOTH 32-bit and 64-bit, yielding architecture-independent results. The comment should state that explicitly rather than presenting the divergent values as if they were the chosen behavior.","fix":"Reword: 'The default write_isize casts `i as usize as u64`, which sign-extends differently on 32- vs 64-bit (yielding 2^32-1 vs 2^64-1 for -1). We instead use `i as u64` which sign-extends to the full 64 bits identically on all targets.'","locations":[{"ref":"phf_shared/src/hasher.rs:46-53","code":"   46 |     // The default `write_isize` implementation casts to `usize` first, so we end up with\n   47 |     // `i as usize as u64`, which is different on 32-bit and 64-bit architectures:\n   48 |     //\n   49 |     // 32-bit: `-1` -> `2^32 - 1` -> `2^32 - 1`\n   50 |     // 64-bit: `-1` -> `2^64 - 1` -> `2^64 - 1`\n   51 |     fn write_isize(&mut self, i: isize) {\n   52 |         self.inner.write_u64((i as u64).to_le());\n   53 |     }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment on line 76 'Vec::with_capacity((DEFAULT_LAMBDA as usize) * 2)' reserves capacity 6 for values_to_add, but in the scoring loop the buffer can grow to the full bucket key-count (a heavily loaded bucket can exceed 6 keys), and in try_place_bucket it likewise holds one entry per key in the bucket. The chosen capacity is a heuristic, not a bound, which the surrounding code does not make clear.","fix":"Drop the magic *2 capacity or add a comment clarifying it is only a heuristic initial capacity, not an upper bound on bucket size.","locations":[{"ref":"phf_generator/src/ptrhash.rs:76","code":"   76 |     let mut values_to_add = Vec::with_capacity((DEFAULT_LAMBDA as usize) * 2);"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment says signed-int handling is done \"below, by `Unary`\", but the `Expr::Unary` negation branch is *above* this code in source order (lines 217-253 vs 161-179). The directional word \"below\" is misleading when navigating the file.","fix":"Reword to \"handled by the `Expr::Unary` branch\" without the misleading \"below\".","locations":[{"ref":"phf_macros/src/lib.rs:161-164","code":"  161 |                 Lit::Int(s) => match s.suffix() {\n  162 |                     // we've lost the sign at this point, so `-128i8` looks like `128i8`,\n  163 |                     // which doesn't fit in an `i8`; parse it as a `u8` and cast (to `0i8`),\n  164 |                     // which is handled below, by `Unary`"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","description":"The Entries / Keys / Values iterator types and all their trait impls (Clone, Debug, Iterator, DoubleEndedIterator, ExactSizeIt return Self {\n  114 |             key: 0,\n  115 |             pilots: &[],\n  116 |             remap: &[],\n  117 |             entries: &[],\n  118 |         };\n  119 |     }"},{"ref":"phf/src/ordered_map.rs:107-118","code":"  107 | impl<K, V> OrderedMap<K, V> {\n  108 |     /// Returns the number of entries in the `OrderedMap`.\n  109 |     #[inline]\n  110 |     pub const fn len(&self) -> usize {\n  111 |         self.entries.len()\n  112 |     }\n  113 | \n  114 |     /// Returns true if the `OrderedMap` is empty.\n  115 |     #[inline]\n  116 |     pub const fn is_empty(&self) -> bool {\n  117 |         self.len() == 0\n  118 |     }"}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"negligible","description":"Inconsistent iterator next() implementations between the two map modules: Map::Entries::next uses `.map(|(k, v)| (k, v))` while OrderedMap::Entries::next uses `.map(|e| (&e.0, &e.1))`. Both are correct and produce the same `(&K, &V)`, but the stylistic divergence is a small readability/consistency wart that also signals the copy-paste drift between the two files.","fix":"Pick one form for both (preferably after deduplicating the iterators per the duplicate_code finding).","locations":[{"ref":"phf/src/map.rs:274-276","code":"  274 |     fn next(&mut self) -> Option<(&'a K, &'a V)> {\n  275 |         self.iter.next().map(|(k, v)| (k, v))\n  276 |     }"},{"ref":"phf/src/ordered_map.rs:287-289","code":"  287 |     fn next(&mut self) -> Option<(&'a K, &'a V)> {\n  288 |         self.iter.next().map(|e| (&e.0, &e.1))\n  289 |     }"}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"negligible","description":"Doc-comment typos in phf_codegen: \"Constructs a enw `phf::OrderedMap` builder\" (should be \"new\"), and in the lib doc the FIXME comment says \"the linker ends up throwing a way a bunch of static symbols\" (should be \"throwing away\").","fix":"Fix the typos: \"enw\" -> \"new\", \"throwing a way\" -> \"throwing away\".","locations":[{"ref":"phf_codegen/src/lib.rs:460","code":"  460 |     /// Constructs a enw `phf::OrderedMap` builder."},{"ref":"phf_codegen/src/lib.rs:200-201","code":"  200 |         // Here, because downstream build scripts only invoke generics from phf_codegen,\n  201 |         // the linker ends up throwing a way a bunch of static symbols we actually need."}]},{"id":"OTHER_7","type":"other","type_label":"Other","severity":"negligible","description":"`displace` uses Wrapping arithmetic `(Wrapping(d2) + Wrapping(f1)*Wrapping(d1) + Wrapping(f2)).0`, which deliberately wraps on overflow and matches the generator side. Verified correct (no panic in release or debug). Recorded for completeness.","fix":"No change required.","locations":[{"ref":"phf_shared/src/lib.rs:35-37","code":"   35 | pub fn displace(f1: u32, f2: u32, d1: u32, d2: u32) -> u32 {\n   36 |     (Wrapping(d2) + Wrapping(f1) * Wrapping(d1) + Wrapping(f2)).0\n   37 | }"}]},{"id":"OTHER_8","type":"other","type_label":"Other","severity":"negligible","description":"`hash_pilot` uses `C.wrapping_mul(seed ^ u64::from(pilot))`, which correctly wraps; no overflow panic. The multiplicative constant 0x517cc1b727220a95 is a standard mixing constant. Verified correct; recorded for completeness.","fix":"No change required.","locations":[{"ref":"phf_shared/src/ptrhash.rs:14-19","code":"   14 | #[inline]\n   15 | pub fn hash_pilot(seed: u64, pilot: u8) -> u64 {\n   16 |     const C: u64 = 0x517cc1b727220a95;\n   17 | \n   18 |     C.wrapping_mul(seed ^ u64::from(pilot))\n   19 | }"}]},{"id":"OTHER_9","type":"other","type_label":"Other","severity":"negligible","description":"`fast_reduct32` multiplication `(x as u64) * (limit as u64)` cannot overflow: both operands are zero-extended u32 so the product is at most (2^32-1)^2 < 2^64. The `>> 32` reduction is the correct Lemire fast-range mapping producing a value in [0, limit). Verified correct; recorded for completeness.","fix":"No change required.","locations":[{"ref" <script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
