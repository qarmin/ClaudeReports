<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Enum discriminant parsing calls `lit_int.base10_parse::<isize>().unwrap()` and computes `last_discriminant + 1`. A discriminant literal that does not fit in isize panics via unwrap, and an explicit discriminant of isize::MAX causes `last_discriminant + 1` to overflow (panic in debug, silent wrap to isize::MIN in release, producing a wrong discriminant in generated bindings). Reachable from user enum definitions.","fix":"Map the parse error to a clear diagnostic instead of unwrap, and use checked_add for the auto-increment, erroring on overflow.","locations":[{"ref":"core/src/ast/enums.rs:48-63","code":"   48 |                     let new_discriminant = v\n   49 |                         .discriminant\n   50 |                         .as_ref()\n   51 |                         .map(|d| {\n   52 |                             // Reparsing, signed literals are represented\n   53 |                             // as a negation expression\n   54 |                             let lit: Result<syn::Lit, _> = syn::parse2(d.1.to_token_stream());\n   55 |                             if let Ok(syn::Lit::Int(ref lit_int)) = lit {\n   56 |                                 lit_int.base10_parse::<isize>().unwrap()\n   57 |                             } else {\n   58 |                                 panic!(\"Expected a discriminant to be a constant integer\");\n   59 |                             }\n   60 |                         })\n   61 |                         .unwrap_or_else(|| last_discriminant + 1);\n   62 | \n   63 |                     last_discriminant = new_discriminant;","lines":16}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Glob imports inside a `#[diplomat::bridge]` module trigger `todo!(\"Glob imports are not yet supported\")`, panicking the macro/codegen on otherwise valid user Rust (`use foo::*;`). This is reachable from ordinary user input rather than internal invariants.","fix":"Return a proper diagnostic/compile error (or silently ignore glob imports in bridge modules) instead of `todo!`, so user code produces a clear error instead of an internal panic.","locations":[{"ref":"core/src/ast/modules.rs:525-525","code":"  525 |         UseTree::Glob(_) => todo!(\"Glob imports are not yet supported\"),","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In the demo-attr parsing, malformed user input triggers panics instead of pushing a LoweringError. `#[diplomat::demo(input)]` (no parens) makes `require_list().expect(...)` panic (line 668); a malformed `input(...)` body makes `.expect(\"Could not read input(...)\")` panic (line 702); and `#[diplomat::demo(custom_func)]` without `=value` makes `require_name_value().unwrap()` panic (line 704). All other attribute-parsing paths in this file gracefully push errors, so these are inconsistent and abort the whole codegen with an opaque panic message rather than a clean diagnostic.","fix":"Replace the `.expect`/`.unwrap` calls with `match`/`map_err` that push `LoweringError::Other` onto `errors` (mirroring the `custom_func` Lit handling already done a few lines below), so malformed demo attributes produce a normal lowering error instead of a panic.","locations":[{"ref":"core/src/hir/attrs.rs:665-669","code":"  665 |                     let meta_list = attr\n  666 |                         .meta\n  667 |                         .require_list()\n  668 |                         .expect(\"Could not get MetaList, expected #[diplomat::demo(input(...))]\");\n  669 | ","lines":5},{"ref":"core/src/hir/attrs.rs:700-705","code":"  700 |                             }\n  701 |                         })\n  702 |                         .expect(\"Could not read input(...)\");\n  703 |                 } else if path_ident == \"custom_func\" {\n  704 |                     let v = &attr.meta.require_name_value().unwrap().value;\n  705 | ","lines":6}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In BorrowingFieldVisitor::visit_slice, for a `Slice::Strs` (i.e. a `&[&str]` / `&[&DiplomatStr]` parameter or struct field), `slice.lifetime()` returns the sentinel `MaybeStatic::NonStatic(Lifetime::new(usize::MAX))` (see core/src/hir/types.rs:232-235). `visit_slice` then calls `lifetime.flat_map_nonstatic(|lt| lt.as_method_lifetime(method_lifetimes))`, and `Lifetime::as_method_lifetime` does `method_lifetimes.indices[self.0]` (core/src/hir/lifetimes.rs:271), i.e. `indices[usize::MAX]`, which panics with index-out-of-bounds. This is latent today because `borrowing_field_visitor` currently has no backend callers (only the in-crate test, which uses `Str`/opaque slices, not `Strs`), but it will panic the moment a backend uses the field visitor on a method containing a `&[&str]` slice.","fix":"Treat the `Strs` sentinel lifetime explicitly: in `visit_slice` (or in `Lifetime::as_method_lifetime`) skip / short-circuit when the lifetime index equals the `Strs` sentinel (usize::MAX), mirroring how `add_slices_to_used_lifetimes` is safe because it routes through `get_bounds` (which uses `.get`). E.g. guard `if lt.0 == usize::MAX { return; }` before indexing, or have `Slice::Strs` carry a real/None lifetime instead of a MAX sentinel.","locations":[{"ref":"core/src/hir/methods/borrowing_field.rs:232-243","code":"  232 |     fn visit_slice<P: TyPosition>(\n  233 |         slice: &Slice<P>,\n  234 |         parent: ParentId,\n  235 |         method_lifetimes: &Lifetimes,\n  236 |         leaves: &mut SmallVec<[BorrowingFieldVisitorLeaf; 8]>,\n  237 |     ) {\n  238 |         if let Some(lifetime) = slice.lifetime() {\n  239 |             let method_lifetime =\n  240 |                 lifetime.flat_map_nonstatic(|lt| lt.as_method_lifetime(method_lifetimes));\n  241 |             leaves.push(BorrowingFieldVisitorLeaf::Slice(parent, method_lifetime));\n  242 |         }\n  243 |     }","lines":12},{"ref":"core/src/hir/lifetimes.rs:270-272","code":"  270 |     pub fn as_method_lifetime(self, method_lifetimes: &Lifetimes) -> MaybeStatic<Lifetime> {\n  271 |         method_lifetimes.indices[self.0]\n  272 |     }","lines":3}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"gen_enum_def selects a default enum variant with `found_default.or(found_zero).unwrap_or(ty.variants.first().unwrap())`. The inner `ty.variants.first().unwrap()` panics if the enum has zero variants. Rust allows empty enums (`enum E {}`); if such an enum reaches the C++ backend this aborts codegen with an opaque panic rather than a diagnostic. Low severity because an empty FFI enum is a degenerate, rarely-used input and the result is an abort rather than wrong code.","fix":"Guard against empty enums earlier (push a clear ErrorStore diagnostic in lowering or here), or handle the empty case by skipping default-ctor generation instead of unwrapping.","locations":[{"ref":"tool/src/cpp/gen.rs:224-226","code":"  224 |         let default_variant = found_default\n  225 |             .or(found_zero)\n  226 |             .unwrap_or(ty.variants.first().unwrap());","lines":3}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`file_path.file_name().unwrap().to_str().unwrap()` panics if a user-supplied custom_func path has no file name component (e.g. ends in '/' or '..') or contains non-UTF-8 bytes. This is user config so impact is limited, but it aborts with an opaque unwrap panic rather than a pushed error.","fix":"Handle the None/Err cases and push a descriptive error (the file is later read with proper error handling, so the filename derivation should be too).","locations":[{"ref":"tool/src/demo_gen/mod.rs:142-143","code":"  142 |                 let file_name: String =\n  143 |                     String::from(file_path.file_name().unwrap().to_str().unwrap());","lines":2}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`append_out_param` panics with `panic!(\"Type {type_info:?} not recognized.\")` when it encounters a parameter/field type with no resolvable id (e.g. an unsupported type reaching this branch). All sibling branches in evaluate_param report problems via errors.push_error and continue, so this hard panic is inconsistent and aborts the whole demo_gen run on unsupported user input instead of emitting a diagnostic.","fix":"Replace the panic with self.errors.push_error(...) and return a placeholder param name, matching the error-handling style used elsewhere in this file.","locations":[{"ref":"tool/src/demo_gen/terminus.rs:226-232","code":"  226 |             _ => {\n  227 |                 if let Some(i) = type_info.id() {\n  228 |                     self.formatter.fmt_type_name(i).to_string()\n  229 |                 } else {\n  230 |                     panic!(\"Type {type_info:?} not recognized.\");\n  231 |                 }\n  232 |             }","lines":7}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In gen_c_to_js_for_return_type, for any `ReturnType::Fallible(_, Some(e))` the code unconditionally calls `self.formatter.fmt_type_name(e.id().unwrap())` (and again later). `Type::id()` returns `None` for `Type::Primitive`, so a `Result<T, primitive>` (e.g. `Result<(), i32>`) would panic via the `.unwrap()` before ever reaching the message-building `match` that explicitly handles `Type::Primitive(..)` at line 482. The primitive-error message arm is therefore currently dead/contradictory. This is only unreachable today because the JS backend sets `custom_errors = false` (mod.rs:71), which gates the only feature test (`new_failing_int`). If custom errors are enabled or a primitive error reaches this path, codegen panics instead of producing the intended primitive-error handling.","fix":"Guard the id-based logic: only call `e.id()`/`add_import`/`fmt_type_name` when `e.id()` is `Some` (i.e. opaque/enum/struct error types). For `Type::Primitive` skip the import and produce the message directly (the `cause.toString()` branch already exists). Use `if let Some(id) = e.id()` instead of `.unwrap()`.","locations":[{"ref":"tool/src/js/converter.rs:444-485","code":"  444 |                 let (requires_buf, error_ret) = match return_type {\n  445 |                     ReturnType::Fallible(s, Some(e)) => {\n  446 |                         let type_name = self.formatter.fmt_type_name(e.id().unwrap());\n  447 |                         self.add_import(type_name, None, super::gen::ImportUsage::Both);\n  448 | \n  449 |                         let fields_empty = matches!(e, Type::Struct(s) if match s.resolve(self.tcx) {\n  450 |                                 ReturnableStructDef::Struct(s) => s.fields.is_empty(),\n  451 |                                 ReturnableStructDef::OutStruct(s) => s.fields.is_empty(),\n  452 |                                 _ => unreachable!(),\n  453 |                         });\n  454 | \n  455 |                         let is_out = matches!(s, SuccessType::OutType(..));\n  456 | \n  457 |                         let success_empty = matches!(s, SuccessType::OutType(Type::Struct(s)) if match s.resolve(self.tcx) {\n  458 |                             ReturnableStructDef::Struct(s) => s.fields.is_empty(),\n  459 |                             ReturnableStructDef::OutStruct(s) => s.fields.is_empty(),\n  460 |                             _ => unreachable!(),\n  461 |                         });\n  462 | \n  463 |                         let receive_deref = self.gen_c_to_js_deref_for_type(\n  464 |                             e,\n  465 |                             match fields_empty {\n  466 |                                 true => \"result\",\n  467 |                                 false => \"diplomatReceive.buffer\",\n  468 |                             }\n  469 |                             .into(),\n  470 |                             0,\n  471 |                         );\n  472 | \n  473 |                         let type_name = self.formatter.fmt_type_name(e.id().unwrap());\n  474 |                         let cause =\n  475 |                             self.gen_c_to_js_for_type(e, receive_deref, &method.lifetime_env);\n  476 |                         // We still require an out buffer even if our error types is empty\n  477 |                         (!fields_empty || (is_out && !success_empty), format!(\n  478 |                         \"const cause = {cause};\\n    throw new globalThis.Error({message}, {{ cause }})\", \n  479 |                         message = match e {\n  480 |                             Type::Enum(..) => format!(\"'{type_name}.' + cause.value\"),\n  481 |                             Type::Struct(..) if fields_empty => format!(\"'{type_name}'\"),\n  482 |                             Type::Primitive(..) => \"cause.toString()\".into(),\n  483 |                             _ => format!(\"'{type_name}: ' + cause.toString()\"),\n  484 |                         },\n  485 |                         ))","lines":42}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"NamedLifetime::Deserialize panics with `panic!(\"cannot be static\")` if a serialized value of \"static\" is encountered, rather than returning a Deserializer error. Only reachable when deserializing an externally-produced/invalid HIR, so a panic instead of a serde error is a minor robustness issue.","fix":"Return `Err(serde::de::Error::custom(\"lifetime cannot be 'static\"))` instead of panicking.","locations":[{"ref":"core/src/ast/lifetimes.rs:28-39","code":"   28 | impl<'de> Deserialize<'de> for NamedLifetime {\n   29 |     fn deserialize<D>(deserializer: D) -> Result<Self, D::Error>\n   30 |     where\n   31 |         D: serde::Deserializer<'de>,\n   32 |     {\n   33 |         // Special `Deserialize` impl to ensure invariants.\n   34 |         let named = Ident::deserialize(deserializer)?;\n   35 |         if named.as_str() == \"static\" {\n   36 |             panic!(\"cannot be static\");\n   37 |         }\n   38 |         Ok(NamedLifetime(named))\n   39 |     }","lines":12}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"diplomat_simple_write computes `cap: buf_size - 1` to reserve a byte for the null terminator. If a caller (FFI/generated bindings) passes buf_size == 0, this underflows to usize::MAX in release builds, producing a DiplomatWrite whose cap is enormous. Subsequent writes via fmt::Write will pass the `needed_len > self.cap` check (cap is huge) and copy bytes into a 0-length buffer, causing an out-of-bounds write / memory corruption. Even a flush() with len==0 writes a null terminator at buf.add(0) which is OOB for a true 0-size buffer.","fix":"Guard against buf_size == 0, e.g. compute `cap: buf_size.saturating_sub(1)` and additionally require buf_size >= 1 in the safety contract, or return early/assert when buf_size == 0 so cap can never wrap.","locations":[{"ref":"runtime/src/write.rs:159-181","code":"  159 | #[no_mangle]\n  160 | pub unsafe extern \"C\" fn diplomat_simple_write(buf: *mut u8, buf_size: usize) -> DiplomatWrite {\n  161 |     extern \"C\" fn grow(_this: *mut DiplomatWrite, _cap: usize) -> bool {\n  162 |         false\n  163 |     }\n  164 |     extern \"C\" fn flush(this: *mut DiplomatWrite) {\n  165 |         unsafe {\n  166 |             debug_assert!((*this).len <= (*this).cap);\n  167 |             let buf = (*this).buf;\n  168 |             ptr::write(buf.add((*this).len), 0)\n  169 |         }\n  170 |     }\n  171 |     DiplomatWrite {\n  172 |         context: ptr::null_mut(),\n  173 |         buf,\n  174 |         len: 0,\n  175 |         grow_failed: false,\n  176 |         // keep an extra byte in our pocket for the null terminator\n  177 |         cap: buf_size - 1,\n  178 |         flush,\n  179 |         grow,\n  180 |     }\n  181 | }","lines":23}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In gen_cpp_to_c_for_field, the branch handling an optional borrowed opaque field inside a mutable struct (is_in_mutable_struct && !op.is_owned() && op.is_optional()) emits the expression `{field_getter}->AsFFI() : nullptr`. This is syntactically broken C++ - it is missing the ternary condition prefix (`{field_getter} ? ...`), so the struct's AsFFI() member function generated into struct_impl.h.jinja produces `/* .field = */ x->AsFFI() : nullptr,` which does not compile. It also unconditionally dereferences the optional via `->AsFFI()` even when empty. The non-field path for the same type (gen_cpp_to_c_for_type, line 1073) correctly emits `{cpp_name} ? {cpp_name}->AsFFI() : nullptr`. This is reachable: `Option<&Opaque>` is represented as Type::Opaque with is_optional()==true, and a struct annotated `mut_struct_ref` (or with cpp_config.structs_always_mut_ref) containing such a field hits this branch, producing uncompilable bindings. The combination is simply not covered by the feature_tests snapshots, so it has gone unnoticed.","fix":"Mirror the correct ternary used at line 1073: emit `format!(\"{field_getter} ? {field_getter}->AsFFI() : nullptr\")` for the optional case (and keep `format!(\"{field_getter}->AsFFI()\")` for the non-optional case). Add a feature test with a mut_struct_ref struct containing an `Option<&Opaque>` field to lock this in.","locations":[{"ref":"tool/src/cpp/gen.rs:1042-1048","code":" 1042 |             Type::Opaque(op) if is_in_mutable_struct && !op.is_owned() => {\n 1043 |                 if op.is_optional() {\n 1044 |                     format!(\"{field_getter}->AsFFI() : nullptr\").into()\n 1045 |                 } else {\n 1046 |                     format!(\"{field_getter}->AsFFI()\").into()\n 1047 |                 }\n 1048 |             }","lines":7}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"features_enabled set in config.toml or via --config is silently wiped out by the CLI. After read_file() and read_cli_settings() populate config.shared_config.features_enabled, line 62 unconditionally overwrites it with the (possibly empty) --features-enabled CLI vector. If a user enables features only in their config.toml (or via `--config features_enabled=[...]`) and does NOT also pass --features-enabled, the features are silently discarded, producing wrong codegen (feature-gated items dropped/included incorrectly).","fix":"Only override when the CLI list is non-empty (e.g. `if !opt.features_enabled.is_empty() { config.shared_config.features_enabled = ... }`), or merge/extend the existing set rather than replacing it.","locations":[{"ref":"tool/src/main.rs:62","code":"   62 |     config.shared_config.features_enabled = opt.features_enabled.iter().cloned().collect();","lines":1}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In TypeName::from_syn, the Option/DiplomatOption branch indexes `p.path.segments[0].arguments` to read the angle-bracketed type argument. But `is_runtime_type(p, \"DiplomatOption\")` also matches the fully-qualified form `diplomat_runtime::DiplomatOption<T>`, where `segments[0]` is `diplomat_runtime` (which has no angle brackets) and the real type lives in the last segment. For that fully-qualified spelling the code falls into the else arm and panics with `Expected angle brackets for Option type`, even though it is valid input. The analogous Result branch correctly uses `p.path.segments.last().unwrap()`.","fix":"Use `p.path.segments.last().unwrap().arguments` (and the same last segment for the `== \"Option\"` stdlib check) instead of `segments[0]`, mirroring the Result branch.","locations":[{"ref":"core/src/ast/types.rs:910-931","code":"  910 |                 } else if p_len == 1 && p.path.segments[0].ident == \"Option\"\n  911 |                     || is_runtime_type(p, \"DiplomatOption\")\n  912 |                 {\n  913 |                     if let syn::PathArguments::AngleBracketed(type_args) =\n  914 |                         &p.path.segments[0].arguments\n  915 |                     {\n  916 |                         if let syn::GenericArgument::Type(tpe) = &type_args.args[0] {\n  917 |                             let stdlib = if p.path.segments[0].ident == \"Option\" {\n  918 |                                 StdlibOrDiplomat::Stdlib\n  919 |                             } else {\n  920 |                                 StdlibOrDiplomat::Diplomat\n  921 |                             };\n  922 |                             TypeName::Option(\n  923 |                                 Box::new(TypeName::from_syn(tpe, self_path_type, module_location)),\n  924 |                                 stdlib,\n  925 |                             )\n  926 |                         } else {\n  927 |                             panic!(\"Expected first type argument for Option to be a type\")\n  928 |                         }\n  929 |                     } else {\n  930 |                         panic!(\"Expected angle brackets for Option type\")\n  931 |                     }","lines":22}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In lower_callback_return_type, the pre-check that detects misuse of `DiplomatOption<&T>`/`DiplomatOption<Box<T>>` where T is opaque resolves the inner named type with `t.resolve(&t.path, self.env)`. The first argument to `PathType::resolve` is the *module context* (`in_path`), not the type's own path. Passing `&t.path` resolves the symbol relative to itself, so `env.get` will almost always return `None`, and `resolve_with_path` panics with \"Could not resolve symbol ... in ...\" (core/src/ast/types.rs:216). For a callback returning `Option<&Foo>` / `Option<Box<Foo>>` this is reachable user input. At best (if resolution happens to find a submodule chain) it resolves the wrong type and silently skips the DiplomatOption misuse diagnostic. Every other resolve call site in this file passes the surrounding `in_path`.","fix":"Pass the function's module context: replace `let ty = t.resolve(&t.path, self.env);` with `let ty = t.resolve(in_path, self.env);` (the `in_path` parameter is already in scope).","locations":[{"ref":"core/src/hir/lowering.rs:2058-2072","code":" 2058 |             ty @ ast::TypeName::Option(value_ty, stdlib) => match &**value_ty {\n 2059 |                 ast::TypeName::Box(t) | ast::TypeName::Reference(_, _, t) => {\n 2060 |                     match &**t {\n 2061 |                         ast::TypeName::Named(t) | ast::TypeName::SelfType(t) => {\n 2062 |                             let ty = t.resolve(&t.path, self.env);\n 2063 |                             if let ast::CustomType::Opaque(..) = ty {\n 2064 |                                 if *stdlib == ast::StdlibOrDiplomat::Diplomat {\n 2065 |                                     self.errors.push(LoweringError::Other(\"found DiplomatOption<T>, where T is opaque. Please use Option<&T> (DiplomatOption is for primitives, structs, and enums)\".to_string()));\n 2066 |                                     return Err(());\n 2067 |                                 }\n 2068 |                             }\n 2069 |                         }\n 2070 |                         _ => {}\n 2071 |                     }\n 2072 |                     self.lower_type(ty, ltl, TypeLoweringContext::Callback, in_path)","lines":15}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In gen_slice's `from_dart` builder, owned u64 slices passed by value generate `slice._data[i] = this[i].clamp(0, 18446744073709551615);`. Dart's native `int` is 64-bit *signed*, and the literal 18446744073709551615 (u64::MAX) exceeds its max value (9223372036854775807). On the Dart VM this integer literal does not fit in a signed 64-bit int, producing either a compile error or a wrapped value (-1), making `clamp(0, -1)` invalid (min > max). This yields broken/non-compiling generated Dart whenever a `&[u64]` owned slice argument is used. U8/U16/U32 (lines 1262-1264) are fine because their maxima fit; only the U64 case overflows.","fix":"Do not emit a raw u64::MAX literal. Either route u64 slices through a Uint64List typed-list path (Dart has Uint64List) like the signed ints on line 1247, or generate a clamp using a BigInt/unsigned-safe expression (e.g. clamp lower bound only, or `this[i] < 0 ? 0 : this[i]`) instead of an out-of-range literal upper bound.","locations":[{"ref":"tool/src/dart/mod.rs:1265","code":" 1265 |                         hir::Slice::Primitive(_, hir::PrimitiveType::Int(hir::IntType::U64)) => format!(\"this[i].clamp(0, {})\", u64::MAX).into(),","lines":1}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"For `Result<Ok, Err>`/`Option`, the DiplomatReceiveBuf size correctly uses `max(ok_size, err_size) + 1`, but `align` is taken only from the OK type's layout (`let align = layout.align();`). The receive buffer is a union that may hold the error value, and the error deref reads from offset 0 of that buffer. If the error type has a larger alignment than the OK type (e.g. `Result<u8, u64>`, or an OK struct of align 4 with an err struct of align 8), the buffer is allocated under-aligned for the error, which can produce silently incorrect reads on the WASM side. Severity limited because most current error types (enum/opaque/struct) tend to have alignment <= the OK type, but it is a latent wrong-codegen bug.","fix":"Compute `align` as the max of the OK type alignment and the error type alignment (mirroring how `size` already takes the max), e.g. for `Fallible(_, Some(e))` use `std::cmp::max(layout.align(), type_size_alignment(e, tcx).align())`.","locations":[{"ref":"tool/src/js/converter.rs:493-521","code":"  493 |                 let layout = match ok {\n  494 |                     SuccessType::Unit => crate::js::layout::unit_size_alignment(),\n  495 |                     SuccessType::OutType(ref o) => {\n  496 |                         crate::js::layout::type_size_alignment(o, self.tcx)\n  497 |                     }\n  498 |                     SuccessType::Write => match return_type {\n  499 |                         ReturnType::Fallible(_, ref err) if err.is_some() => {\n  500 |                             crate::js::layout::type_size_alignment(&err.clone().unwrap(), self.tcx)\n  501 |                         }\n  502 |                         ReturnType::Fallible(_, None) | ReturnType::Nullable(_) => {\n  503 |                             crate::js::layout::unit_size_alignment()\n  504 |                         }\n  505 |                         _ => unreachable!(\"AST/HIR variant {:?} unknown.\", return_type),\n  506 |                     },\n  507 |                     _ => unreachable!(\"AST/HIR variant {:?} unknown.\", return_type),\n  508 |                 };\n  509 |                 // Add size for checking whether or not we're a pass/fail result. And we make sure to see if our error type is bigger, so if we need to add extra width based on that:\n  510 |                 let size = std::cmp::max(\n  511 |                     layout.size(),\n  512 |                     match return_type {\n  513 |                         // We already account for an error in the Write match up above:\n  514 |                         ReturnType::Fallible(_, e) if e.is_some() => {\n  515 |                             crate::js::layout::type_size_alignment(&e.clone().unwrap(), self.tcx)\n  516 |                                 .size()\n  517 |                         }\n  518 |                         _ => 0,\n  519 |                     },\n  520 |                 ) + 1;\n  521 |                 let align = layout.align();","lines":29}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`fmt_primitive_list_view` maps `PrimitiveType::Char` to \"u16\", but a Rust `char` is 4 bytes (see `primitive_size_alignment` using `Layout::new::<char>()`, and `fmt_primitive_slice` mapping Char to \"Uint32Array\", and the Dart backend treating char slices as Uint32/4-byte). This list_view string is used as the element width for marshalling `&[char]` slices in both directions (converter.rs DiplomatSlicePrimitive and DiplomatBuf.slice), and the runtime treats \"u16\" as a 2-byte Uint16Array element. A char slice would therefore be (de)serialized with 2-byte elements instead of 4, corrupting the data. Likely unreachable in current tests (no char-slice feature test) but it is wrong codegen for a type the formatter otherwise claims to support.","fix":"Change the `PrimitiveType::Char => \"u16\"` arm to `\"u32\"`, matching the 4-byte char size used everywhere else (fmt_primitive_slice -> Uint32Array, primitive_size_alignment -> Layout::new::<char>()).","locations":[{"ref":"tool/src/js/formatter.rs:232-235","code":"  232 |     pub fn fmt_primitive_list_view(&self, primitive: hir::PrimitiveType) -> &'static str {\n  233 |         match primitive {\n  234 |             hir::PrimitiveType::Bool => \"boolean\",\n  235 |             hir::PrimitiveType::Char => \"u16\",","lines":4}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"KotlinConfig::set parses use_finalizers_not_cleaners and scaffold via value.as_str().map(|val| val == \"true\"). These options are booleans, and the config pipeline (tool/src/config.rs read_file passes the raw toml::Value, and read_cli_settings runs toml_value_from_str which parses `true` into Value::Boolean). For a real TOML/CLI boolean, value.as_str() returns None, so the field stays None and the setting is silently ignored. Only a string-quoted \"true\" would work, which is unintuitive and inconsistent with the `domain` handling that uses value.is_str(). Result: users who set use_finalizers_not_cleaners=true get the default (cleaners) silently.","fix":"Parse these as booleans, e.g. `self.use_finalizers_not_cleaners = value.as_bool();` and `self.scaffold = value.as_bool();` (optionally also accepting the string forms for backwards compatibility).","locations":[{"ref":"tool/src/kotlin/mod.rs:74-79","code":"   74 |             \"use_finalizers_not_cleaners\" => {\n   75 |                 self.use_finalizers_not_cleaners = value.as_str().map(|val| val == \"true\");\n   76 |             }\n   77 |             \"scaffold\" => {\n   78 |                 self.scaffold = value.as_str().map(|val| val == \"true\");\n   79 |             }","lines":6}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"gen_nullable_return_conversion passes \".?\" as the return_type_modifier for the Opaque case. The OpaqueReturn.kt.jinja template renders `return returnOpaque{{return_type_modifier}}`, so this produces `return returnOpaque.?`, which is not valid Kotlin (`.?` is not an operator). The intended token is presumably nothing/`?` since the template already handles optionality with `?: return null`. This path (a Nullable<OutType=Opaque> that is not itself an Option-typed opaque) is not covered by any fixture, so it is a latent wrong-codegen bug that would fail to compile when hit.","fix":"Pass an empty modifier (\"\") like the struct/enum/slice nullable arms do, since the template already emits the `?: return null` guard for optional opaques.","locations":[{"ref":"tool/src/kotlin/mod.rs:828-834","code":"  828 |             Type::Opaque(opaque_path) => self.gen_opaque_return_conversion(\n  829 |                 opaque_path,\n  830 |                 method_lifetimes_map,\n  831 |                 &method.lifetime_env,\n  832 |                 val_name,\n  833 |                 \".?\",\n  834 |             ),","lines":7}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Constructor overload ordering is incorrect for 3+ overloads. Nanobind requires constructor overloads with fewer parameters to be registered before those with more. The code at gen_all_method_infos only swaps the primary entry `e` when a strictly-smaller overload arrives and otherwise appends; it never reorders previously-appended overloads. For an arrival order like 3,1,2 params the final emitted order becomes 1,3,2 instead of ascending 1,2,3, so nanobind may resolve overloads to the wrong constructor and produce incorrect bindings.","fix":"Collect all constructor overloads into a list, then sort by param count ascending (e.g. sort the OverloadInfo vec plus the primary by params.len()) before rendering, rather than the incremental pairwise swap heuristic.","locations":[{"ref":"tool/src/nanobind/gen.rs:356-371","code":"  356 |                                 if matches!(e.method.attrs.special_method, Some(hir::SpecialMethod::Constructor)) {\n  357 |                                     // Nanobind requires lower param definitions to be first when overriding new_:\n  358 |                                     if info.param_decls.params.len() < e.param_decls.params.len() {\n  359 |                                         let cpy = OverloadInfo {\n  360 |                                             parameters: e.param_decls.clone(),\n  361 |                                             method_name: Some(e.cpp_method_name.to_string()),\n  362 |                                         };\n  363 |                                         e.cpp_method_name = info.cpp_method_name.clone();\n  364 |                                         e.param_decls = info.param_decls.clone();\n  365 |                                         e.overloads.push(cpy);\n  366 |                                     } else {\n  367 |                                         e.overloads.push(OverloadInfo { parameters: info.param_decls.clone(), method_name: Some(info.cpp_method_name.to_string()) });\n  368 |                                     }\n  369 |                                 } else {\n  370 |                                     e.overloads.push(OverloadInfo { parameters: info.param_decls.clone(), method_name: Some(info.cpp_method_name.to_string()) });\n  371 |                                 }","lines":16}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Trait Send/Sync supertrait detection only recognizes the fully-qualified `std::marker::Send` / `std::marker::Sync` spelling (first path segment must equal \"std\"). Common spellings such as bare `Send`/`Sync` or `core::marker::Send` are silently skipped, leaving is_send/is_sync false and producing bindings that omit the intended thread-safety markers.","fix":"Match on the last path segment ident being `Send`/`Sync` (optionally validating an intermediate `marker` and a `std`-or-`core` root), instead of requiring the first segment to be `std`.","locations":[{"ref":"core/src/ast/traits.rs:115-141","code":"  115 |         let (mut is_sync, mut is_send) = (false, false);\n  116 |         for supertrait in &trt.supertraits {\n  117 |             if let syn::TypeParamBound::Trait(syn::TraitBound {\n  118 |                 path: syn::Path { segments, .. },\n  119 |                 ..\n  120 |             }) = supertrait\n  121 |             {\n  122 |                 let mut seg_iter = segments.iter();\n  123 |                 if let Some(syn::PathSegment { ident, .. }) = seg_iter.next() {\n  124 |                     if *ident != \"std\" {\n  125 |                         continue;\n  126 |                     }\n  127 |                 }\n  128 |                 if let Some(syn::PathSegment { ident, .. }) = seg_iter.next() {\n  129 |                     if *ident != \"marker\" {\n  130 |                         continue;\n  131 |                     }\n  132 |                 }\n  133 |                 if let Some(syn::PathSegment { ident, .. }) = seg_iter.next() {\n  134 |                     if *ident == \"Send\" {\n  135 |                         is_send = true;\n  136 |                     } else if *ident == \"Sync\" {\n  137 |                         is_sync = true;\n  138 |                     }\n  139 |                 }\n  140 |             }\n  141 |         }","lines":27}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"TypeName::Display for the StrSlice variants uses the wrong encoding-name helper relative to what StrReference uses, producing type strings inconsistent with TypeName::to_syn. For `StrSlice(_, Stdlib)` it calls `get_stdlib_slice_type_str()` (which actually returns diplomat-runtime names like `DiplomatStrSlice`), yielding e.g. `&[&DiplomatStrSlice]`, while to_syn emits `&[&str]`. For `StrSlice(_, Diplomat)` it calls `get_diplomat_slice_type_str()` (which returns stdlib names like `str`), yielding `DiplomatSlice<str>`, while to_syn emits `DiplomatSlice<DiplomatStrSlice>`. The StrReference arms use the opposite (correct) pairing. This produces misleading diagnostics/output for slice-of-string types.","fix":"Swap the helpers: use `get_diplomat_slice_type_str()` for the Stdlib StrSlice arm and `get_stdlib_slice_type_str()` for the Diplomat StrSlice arm (matching how StrReference selects them), so Display agrees with to_syn.","locations":[{"ref":"core/src/ast/types.rs:1343-1351","code":" 1343 |             TypeName::StrSlice(encoding, StdlibOrDiplomat::Stdlib) => {\n 1344 |                 let inner = encoding.get_stdlib_slice_type_str();\n 1345 | \n 1346 |                 write!(f, \"&[&{inner}]\")\n 1347 |             }\n 1348 |             TypeName::StrSlice(encoding, StdlibOrDiplomat::Diplomat) => {\n 1349 |                 let inner = encoding.get_diplomat_slice_type_str();\n 1350 |                 write!(f, \"DiplomatSlice<{inner}>\")\n 1351 |             }","lines":9}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`BackendAttrSupport::check_string` (used at line 481 to reject attributes the backend doesn't support) is missing several support fields that exist in the struct and are handled by the `supports=` cfg matcher (`is_name_value`): notably `static_accessors`, `option`, `generate_mocking_interface`, `default_args`, and `opaque_slices`. Because `check_string` returns `None` for unknown keys and line 481 only acts on `Some(false)`, a `#[diplomat::attr(cfg, default_args)]`-style gating that relied on `check_string` would silently not gate. The two functions enumerate the same struct but have drifted, which is a maintenance hazard (the `is_name_value` match exhaustively destructures the struct to force updates; `check_string` does not).","fix":"Make `check_string` exhaustively destructure `BackendAttrSupport` (like `is_name_value` does at lines 1551-1590) so missing keys cause a compile error, and add the missing entries, or document explicitly why certain support flags intentionally have no corresponding gating key.","locations":[{"ref":"core/src/hir/attrs.rs:1402-1439","code":" 1402 |     pub fn check_string(&self, v: &str) -> Option<bool> {\n 1403 |         match v {\n 1404 |             \"namespacing\" => Some(self.namespacing),\n 1405 |             \"memory_sharing\" => Some(self.memory_sharing),\n 1406 |             \"non_exhaustive_structs\" => Some(self.non_exhaustive_structs),\n 1407 |             \"method_overloading\" => Some(self.method_overloading),\n 1408 |             \"utf8_strings\" => Some(self.utf8_strings),\n 1409 |             \"utf16_strings\" => Some(self.utf16_strings),\n 1410 | correct bounds-check debug_assert. `visited` is sized to `nodes.len()` (named lifetimes only, line 163), so any anonymous lifetime (where `nodes.len() <= idx < num_lifetimes`) falls into the else branch. The assert there is `method_lifetime.0 > self.lifetime_env.num_lifetimes`, which is false for a valid anonymous lifetime (idx < num_lifetimes), so the debug_assert fires for legitimate anonymous lifetimes. Additionally the comparison is off-by-one: a truly out-of-range index is `idx >= num_lifetimes`, not `idx > num_lifetimes` (idx == num_lifetimes is already out of range). The method is currently dead code (no callers, guarded by crate `#![allow(dead_code)]`), so impact is limited, but if reused it will panic in debug builds on valid input.","fix":"Make `visited` track all lifetimes (size `num_lifetimes`) or change the else-branch assert to only fire when truly out of range, e.g. `debug_assert!(method_lifetime.0 >= self.lifetime_env.num_lifetimes, ...)`, and ensure anonymous-lifetime indices in range don't trip it.","locations":[{"ref":"core/src/hir/lifetimes.rs:160-185","code":"  160 |     fn new(lifetime_env: &'lt LifetimeEnv, visit_fn: F) -> Self {\n  161 |         Self {\n  162 |             lifetime_env,\n  163 |             visited: smallvec![false; lifetime_env.nodes.len()],\n  164 |             visit_fn,\n  165 |         }\n  166 |     }\n  167 | \n  168 |     /// Visit more sublifetimes. This method tracks which lifetimes have already\n  169 |     /// been visited, and uses this to not visit the same lifetime twice.\n  170 |     pub fn visit_subtypes(&mut self, method_lifetime: Lifetime) {\n  171 |         if let Some(visited @ false) = self.visited.get_mut(method_lifetime.0) {\n  172 |             *visited = true;\n  173 | \n  174 |             (self.visit_fn)(method_lifetime);\n  175 | \n  176 |             for longer in self.lifetime_env.nodes[method_lifetime.0].longer.iter() {\n  177 |                 self.visit_subtypes(*longer)\n  178 |             }\n  179 |         } else {\n  180 |             debug_assert!(\n  181 |                 method_lifetime.0 > self.lifetime_env.num_lifetimes,\n  182 |                 \"method lifetime has an internal index that's not in range of the lifetime env\"\n  183 |             );\n  184 |         }\n  185 |     }","lines":26}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In fmt_optional_type_name, the handling of validated `Utf8` string encoding is inconsistent between the `Strs` and `Str` slice arms. For `Slice::Strs` (line 90-98) the catch-all `_` triggers `unimplemented!(\"Utf8 StringEncoding unsupported\")`, which fires for the validated `StringEncoding::Utf8` variant. For `Slice::Str` (line 99-106) the catch-all `_` silently maps the same validated `Utf8` variant to `OptionStringView`. So `Option<&[&str]>` of validated Utf8 panics the codegen while `Option<&str>` of validated Utf8 generates code. Either both should be supported or both should error.","fix":"Decide on one behavior for the validated `StringEncoding::Utf8` variant and apply it to both the `Strs` and `Str` arms (e.g. explicitly match `UnvalidatedUtf8`/`Utf8` and route them to the appropriate Option view name, or error in both).","locations":[{"ref":"tool/src/c/formatter.rs:90-106","code":"   90 |             hir::Type::Slice(hir::Slice::Strs(encoding)) => {\n   91 |                 self.diplomat_namespace(\n   92 |                 match encoding {\n   93 |                     StringEncoding::UnvalidatedUtf8 => \"OptionStringsView\".into(),\n   94 |                     StringEncoding::UnvalidatedUtf16 => \"OptionStrings16View\".into(),\n   95 |                     _ => unimplemented!(\"Utf8 StringEncoding unsupported\")\n   96 |                     }\n   97 |                 ).to_string()\n   98 |             },\n   99 |             hir::Type::Slice(hir::Slice::Str(_lifetime, encoding )) => {\n  100 |                 self.diplomat_namespace(\n  101 |                 match encoding {\n  102 |                     StringEncoding::UnvalidatedUtf16 => \"OptionString16View\".into(),\n  103 |                     _ => \"OptionStringView\".into(),\n  104 |                     }\n  105 |                 ).to_string()\n  106 |             }","lines":17}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"When parsing --docs-base-urls, only the FIRST `*:<url>` entry is used as the default URL (.next() after filter_map of strip_prefix(\"*:\")); any subsequent `*:` entries are silently ignored. Additionally, an entry beginning with `*` but not matching `*:` (e.g. `*foo:url`) is excluded from the per-crate map (starts_with('*')) and also fails the `*:` strip, so it is silently dropped with no warning.","fix":"Either document/enforce a single default entry, or warn when multiple `*:` entries or malformed `*`-prefixed entries are supplied instead of silently dropping them.","locations":[{"ref":"tool/src/main.rs:70-89","code":"   70 |         &diplomat_core::hir::DocsUrlGenerator::with_base_urls(\n   71 |             opt.docs_base_urls\n   72 |                 .iter()\n   73 |                 .filter_map(|entry| entry.strip_prefix(\"*:\").map(ToString::to_string))\n   74 |                 .next(),\n   75 |             opt.docs_base_urls\n   76 |                 .iter()\n   77 |                 .filter(|entry| !entry.starts_with('*'))\n   78 |                 .map(|entry| {\n   79 |                     let mut parts = entry.splitn(2, ':');\n   80 |                     (\n   81 |                         parts.next().unwrap().to_string(),\n   82 |                         parts\n   83 |                             .next()\n   84 |                             .expect(\"Expected syntax <crate>|*:<url>\")\n   85 |                             .to_string(),\n   86 |                     )\n   87 |                 })\n   88 |                 .collect(),\n   89 |         ),","lines":20}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"`Type::is_mutably_borrowed` and `SelfType::is_mutably_borrowed` check the Struct case with `st.owner().mutability().is_immutable()`, which is identical to the `is_immutably_borrowed` implementations. This is an inverted/copy-paste bug: for a struct it returns true when the struct is *immutably* borrowed and false when mutably borrowed - the exact opposite of what the method name promises. The opaque arm correctly uses `Mutability::Mutable`. Impact: callers that rely on this to classify mutability produce wrong results. E.g. tool/src/demo_gen/terminus.rs:153-158 uses `is_mutably_borrowed` to decide whether a method is `is_pure` (safe to call repeatedly in a demo); a struct-self method that mutably borrows will be wrongly considered pure, and an immutably-borrowing one wrongly considered impure - i.e. wrong generated demo code. type_context.rs:670 ORs the two together so it is masked there, but the method is independently wrong.","fix":"In both `is_mutably_borrowed` implementations change the struct arm from `st.owner().mutability().is_immutable()` to `st.owner().mutability().is_mutable()`.","locations":[{"ref":"core/src/hir/types.rs:191-194","code":"  191 |     pub fn is_mutably_borrowed(&self) -> bool {\n  192 |         matches!(self, Self::Opaque(opaque_path) if opaque_path.owner.mutability() == Some(Mutability::Mutable))\n  193 |             || matches!(self, Self::Struct(st) if st.owner().mutability().is_immutable())\n  194 |     }","lines":4},{"ref":"core/src/hir/types.rs:208-211","code":"  208 |     pub fn is_mutably_borrowed(&self) -> bool {\n  209 |         matches!(self, SelfType::Opaque(opaque_path) if opaque_path.owner.mutability == Mutability::Mutable)\n  210 |             || matches!(self, SelfType::Struct(st) if st.owner().mutability().is_immutable())\n  211 |     }","lines":4}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"fmt_struct_field_native_to_kt generates the wrong decoder for struct fields whose type is a slice-of-strings (&[&str]/&[&DiplomatStr16]). The UnvalidatedUtf16 arm emits PrimitiveArrayTools.getUt16s(...) and the catch-all `_` arm (covering Utf8 and UnvalidatedUtf8) ALSO emits getUt16s(...). Two distinct problems: (1) getUt16s is a typo - the runtime/init.kt.jinja only defines getUtf16s and getUtf8s, so the generated code references a non-existent method and will not compile; (2) the UTF8 arm should call a UTF8 decoder (getUtf8s) but instead decodes UTF8 string slices as UTF16, producing silently corrupt strings. No struct fixture exercises this, so it is untested.","fix":"Use the correct method names: UnvalidatedUtf16 -> PrimitiveArrayTools.getUtf16s({field_val}); the Utf8/UnvalidatedUtf8 arm -> PrimitiveArrayTools.getUtf8s({field_val}). Mirror the encoding split already done correctly for the single-Str arms above (lines 410-415).","locations":[{"ref":"tool/src/kotlin/formatter.rs:416-421","code":"  416 |             Type::Slice(Slice::Strs(StringEncoding::UnvalidatedUtf16)) => {\n  417 |                 format!(\"PrimitiveArrayTools.getUt16s({field_val})\").into()\n  418 |             }\n  419 |             Type::Slice(Slice::Strs(_)) => {\n  420 |                 format!(\"PrimitiveArrayTools.getUt16s({field_val})\").into()\n  421 |             }","lines":6}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"Copy-paste bug in the Stringifier validation branch: when a stringifier has parameters the emitted error reads \"Getter cannot have parameters\" instead of referring to the stringifier. Misleading diagnostic for users.","fix":"Change the message at line 847 to \"Stringifier cannot have parameters\".","locations":[{"ref":"core/src/hir/attrs.rs:844-848","code":"  844 |                     SpecialMethod::Stringifier => {\n  845 |                         if !method.params.is_empty() {\n  846 |                             errors\n  847 |                                 .push(LoweringError::Other(\"Getter cannot have parameters\".into()));\n  848 |                         }","lines":5}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"Copy-paste bug in the Iterable validation branch: the parameter-count check is labeled \"Iterator\" (`check_param_count(\"Iterator\", 0, errors)`) inside `SpecialMethod::Iterable`, so an iterable with parameters produces an error message about \"Iterator\" rather than \"Iterable\".","fix":"Change the label at line 989 to \"Iterable\" to match the surrounding Iterable validation (the self-param check just below already uses \"Iterables\").","locations":[{"ref":"core/src/hir/attrs.rs:983-990","code":"  983 |                     SpecialMethod::Iterable => {\n  984 |                         if special_method_presence.iterable.is_some() {\n  985 |                             errors.push(LoweringError::Other(\n  986 |                                 \"Cannot mark type as iterable twice\".into(),\n  987 |                             ));\n  988 |                         }\n  989 |                         check_param_count(\"Iterator\", 0, errors);\n  990 |                         check_self_param(\"Iterables\", true, errors);","lines":8}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The error message for the `is_sync` / `traits_are_sync` check is a copy-paste of the `is_send` message and incorrectly says \"Send\" instead of \"Sync\". A user hitting the unsupported-Sync case gets a misleading diagnostic referring to Send.","fix":"Change the message at line 437 to \"Traits are not safe to std::marker::Sync in this backend\".","locations":[{"ref":"core/src/hir/lowering.rs:435-439","code":"  435 |         if ast_trait.is_sync && !self.attr_validator.attrs_supported().traits_are_sync {\n  436 |             self.errors.push(LoweringError::Other(\n  437 |                 \"Traits are not safe to std::marker::Send in this backend\".into(),\n  438 |             ));\n  439 |         }","lines":5}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The `#[deprecated]` parser only handles the list form `#[deprecated(note = \"...\")]` via `require_list()`. The valid NameValue form `#[deprecated = \"msg\"]` causes `require_list()` to fail, so the user-supplied message is silently dropped and replaced with the generic string \"deprecated\". The deprecation note (which propagates into generated bindings) is lost.","fix":"Also handle `Meta::NameValue` on the outer attribute: if `a.meta` is a NameValue with a string literal, use that value before falling back to \"deprecated\".","locations":[{"ref":"core/src/ast/attrs.rs:166-182","code":"  166 |         } else if a.path() == &deprecated {\n  167 |             if let Some(Meta::NameValue(MetaNameValue {\n  168 |                 value:\n  169 |                     syn::Expr::Lit(syn::ExprLit {\n  170 |                         lit: Lit::Str(s), ..\n  171 |                     }),\n  172 |                 ..\n  173 |             })) = a\n  174 |                 .meta\n  175 |                 .require_list()\n  176 |                 .ok()\n  177 |                 .and_then(|m| syn::parse2::<Meta>(m.tokens.clone()).ok())\n  178 |             {\n  179 |                 Some(Attr::Deprecated(s.value()))\n  180 |             } else {\n  181 |                 Some(Attr::Deprecated(\"deprecated\".into()))\n  182 |             }","lines":17}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Macros::add_item_macro silently discards a `#[diplomat::macro_rules]` definition whose body fails to parse as MacroDef (the `if let Ok(mac) = m` has no else branch). The malformed macro is dropped, and a later use of that macro panics with the misleading message 'Could not find definition for X. Have you tried creating a #[diplomat::macro_rules] macro_rules! X definition?' even though the user did define it (just with a parse error). This hides the real (parse) error.","fix":"On parse error, surface the syn::Error (panic/emit compile error referencing the actual parse failure) instead of silently ignoring it, so the eventual 'not found' message is not produced for a macro that was actually defined.","locations":[{"ref":"core/src/ast/macros.rs:28-38","code":"   28 |     pub fn add_item_macro(&mut self, input: &ItemMacro) {\n   29 |         assert!(\n   30 |             input.ident.is_some(),\n   31 |             \"Expected macro_rules! def. Got {input:?}\"\n   32 |         );\n   33 |         let m = input.mac.parse_body::<MacroDef>();\n   34 |         if let Ok(mac) = m {\n   35 |             let ident = input.ident.clone().unwrap();\n   36 |             self.defs.insert(ident, mac);\n   37 |         }\n   38 |     }","lines":11}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"gen_trait_def's Fallible/Nullable return arm (lines 165-185) only matches `SuccessType::Unit` and `SuccessType::OutType`, falling through to `unreachable!(\"unknown AST/HIR variant\")` for `SuccessType::Write`. The infallible method-return path (gen_method) and several other backends explicitly handle `SuccessType::Write`. If a trait/callback method with a fallible Write return ever reaches HIR lowering without being rejected earlier, codegen panics instead of emitting a clear diagnostic. gen_cb_param_wrapper_struct (lines 497-501) has the same gap.","fix":"If Write returns in trait/callback methods are truly impossible, leave a more descriptive unreachable message clarifying the invariant (and ideally assert it at HIR validation). If they can occur, handle SuccessType::Write explicitly as the other return paths do.","locations":[{"ref":"tool/src/c/gen.rs:172-176","code":"  172 |                     let ok_ty = match ok {\n  173 |                         SuccessType::Unit => None,\n  174 |                         SuccessType::OutType(o) => Some(o),\n  175 |                         _ => unreachable!(\"unknown AST/HIR variant\"),\n  176 |                     };","lines":5},{"ref":"tool/src/c/gen.rs:497-501","code":"  497 |                 let ok_ty = match ok {\n  498 |                     SuccessType::Unit => None,\n  499 |                     SuccessType::OutType(o) => Some(o),\n  500 |                     _ => unreachable!(\"unknown AST/HIR variant\"),\n  501 |                 };","lines":5}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"read_file discards the underlying TOML/UTF8 parse error, mapping it to a fixed generic string ('Config file is not valid TOML' / 'Config file is not UTF8'). The actual toml::de::Error (which includes line/column and reason) is thrown away, making malformed config files hard to debug.","fix":"Include the original error in the message, e.g. `.map_err(|e| format!(\"Config file is not valid TOML: {e}\"))`.","locations":[{"ref":"tool/src/config.rs:181-182","code":"  181 |             let s = str::from_utf8(&file_buf).map_err(|_| \"Config file is not UTF8\".to_string())?;\n  182 |             toml::from_str(s).map_err(|_| \"Config file is not valid TOML\".to_string())?","lines":2}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"String::replace replaces ALL occurrences of the prefix, not just the leading one, when stripping the language prefix from config keys. For keys whose remainder also contains the prefix substring (e.g. a hypothetical `js.js_x`-style key), this could corrupt the key. The same pattern appears for the `kotlin.`/`demo_gen.`/`js.`/`cpp.` set() call );\n  485 | \n  486 |             if matches!(param_self.ty, hir::SelfType::Struct(..)) {\n  487 |                 method_info.needs_cleanup = true;\n  488 |             }","lines":17}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"fmt_docs does .replace('\\n', \"\\n*\") and then .replace(\" \\n\", \"\\n\"). The second replacement is intended to strip a space that precedes a newline, but it runs AFTER all '\\n' have already been turned into '\\n*', so the pattern \" \\n\" no longer exists (it is now \" \\n*\"). The second replace is therefore a no-op and trailing spaces before line breaks survive into the generated KDoc.","fix":"Apply the trailing-space cleanup before mangling newlines, e.g. .replace(\" \\n\", \"\\n\") first, then .replace('\\n', \"\\n*\"); or trim trailing whitespace per line.","locations":[{"ref":"tool/src/kotlin/formatter.rs:108-113","code":"  108 |     pub fn fmt_docs(&self, docs: &Docs) -> String {\n  109 |         docs.to_markdown(DocsTypeReferenceSyntax::SquareBrackets, self.docs_url_gen)\n  110 |             .trim()\n  111 |             .replace('\\n', \"\\n*\")\n  112 |             .replace(\" \\n\", \"\\n\")\n  113 |     }","lines":6}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"Leftover debug `println!`/`eprintln!`-style stdout output runs on every module and type during code generation, polluting the tool's stdout. `gen_modules` prints 'Adding {module} to parent {parent}' for every namespace of every type, and `run` prints 'Adding module with path: ...' for every module path. Other backends (cpp) do not print such debug noise outside test code.","fix":"Remove the println! statements, or route them through the existing logging facility gated behind a verbose flag.","locations":[{"ref":"tool/src/nanobind/gen.rs:87-87","code":"   87 |             println!(\"Adding {module} to parent {parent}\");","lines":1},{"ref":"tool/src/ abel":"Dead Code","severity":"negligible","easy":false,"description":"In `run`, `errors.set_context_ty` is called twice in immediate succession: first with `ty.name()` (line 109) and again with `type_def.name()` (line 117), both bound to `_guard`. `ty` and `type_def` refer to the same type, so the first guard is redundant work; both guards live until end of scope.","fix":"Drop the first `set_context_ty(ty.name()...)` guard and keep only the one using the resolved `type_def`, or vice versa.","locations":[{"ref":"tool/src/js/mod.rs:108-118","code":"  108 |     for (id, ty) in tcx.all_types() {\n  109 |         let _guard = errors.set_context_ty(ty.name().as_str().into());\n  110 | \n  111 |         if ty.attrs().disable {\n  112 |             continue;\n  113 |         }\n  114 | \n  115 |         let type_def = tcx.resolve_type(id);\n  116 | \n  117 |         let _guard = errors.set_context_ty(type_def.name().as_str().into());\n  118 | ","lines":11}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"In validate_struct, the fallthrough arm for abi_compatible struct fields produces the error message 'Cannot construct a slice of {struct} with non-primitive, non-struct field {field}'. This message is misleading because abi_compatible is not only used for slice construction - it is also required for returned struct slices and general ABI compatibility (e.g. test_return_struct_slice). A struct marked abi_compatible purely for ABI reasons (not for slicing) that has an enum or other unsupported field type will get an error wrongly claiming the user is trying to construct a slice. The diagnostic misdirects the user.","fix":"Reword the error to not mention slices specifically, e.g. 'Struct {st.name} field {f.name} has type that is not allowed in a struct marked `#[diplomat::attr(auto, abi_compatible)]`; only primitive and abi_compatible struct fields are permitted.'","locations":[{"ref":"core/src/hir/type_contex  |             }\n  566 |         }\n  567 | \n  568 |         stream\n  569 |     }\n  570 | \n  571 |     fn evaluate_buf(&self, matched: MacroUse) -> TokenStream {\n  572 |         let mut stream = TokenStream::new();\n  573 | \n  574 |         let buf = TokenBuffer::new2(self.body.clone());\n  575 |         let mut c = buf.begin();\n  576 |         // Search until we find a token to replace:\n  577 |         while let Some((tt, next)) = c.token_tree() {\n  578 |             match &tt {\n  579 |                 TokenTree::Punct(punct) if punct.as_char() == '$' => {\n  580 |                     if let Some((tt, next)) = next.token_tree() {\n  581 |                         if let TokenTree::Ident(i) = tt {\n  582 |                             matched.args[&i].to_tokens(&mut stream);\n  583 |                             c = next;\n  584 |                         } else {\n  585 |                             panic!(\"Expected ident next to $, got {tt:?}\");\n  586 |                         }\n  587 |                     } else {\n  588 |                         panic!(\"Expected token tree.\");\n  589 |                     }\n  590 |                 }\n  591 |                 TokenTree::Group(g) => {\n  592 |                     let (inner, _, next) = c.group(g.delimiter()).unwrap();\n  593 |                     // We need to read inside of any groups to find and replace `$` idents.\n  594 |                     let group =\n  595 |                         proc_macro2::Group::new(g.delimiter(), Self::parse_group(&matched, inner));\n  596 |                     stream.append(group);\n  597 |                     c = next;\n  598 |                 }\n  599 |                 _ => {\n  600 |                     stream.append(tt);\n  601 |                     c = next\n  602 |                 }\n  603 |             }\n  604 |         }\n  605 | \n  606 |         stream\n  607 |     }","lines":73}]},{"id":"DUP_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"DiplomatStructAttribute::parse and DiplomatTypeAttribute::parse are near-identical (~24 lines each): same buffer setup, same per-attr write!/match, same Ok(None)/Ok(Some)/Err accumulation logic. Only the match arms differ. This is duplicated parsing/error-accumulation boilerplate that must be kept in sync (e.g., if the conflict-error semantics change, both must change).","fix":"Extract a generic helper that takes a closure mapping `&str -> Option<T>` and performs the buffer write + accumulation, then have both parse impls call it with their own match closure.","locations":[{"ref":"core/src/ast/modules.rs:42-99","code":"   42 | impl DiplomatStructAttribute {\n   43 |     /// Parses a [`DiplomatStructAttribute`] from an array of [`syn::Attribute`]s.\n   44 |     /// If more than one kind is found, an error is returned containing all the\n   45 |     /// ones encountered, since all the current attributes are disjoint.\n   46 |     fn parse(attrs: &[syn::Attribute]) -> Result<Option<Self>, Vec<Self>> {\n   47 |         let mut buf = String::with_capacity(32);\n   48 |         let mut res = Ok(None);\n   49 |         for attr in attrs {\n   50 |             buf.clear();\n   51 |             write!(&mut buf, \"{}\", attr.path().to_token_stream()).unwrap();\n   52 |             let parsed = match buf.as_str() {\n   53 |                 \"diplomat :: out\" => Some(Self::Out),\n   54 |                 \"diplomat :: opaque\" => Some(Self::TypeAttr(DiplomatTypeAttribute::Opaque)),\n   55 |                 \"diplomat :: opaque_mut\" => Some(Self::TypeAttr(DiplomatTypeAttribute::OpaqueMut)),\n   56 |                 _ => None,\n   57 |             };\n   58 | \n   59 |             if let Some(parsed) = parsed {\n   60 |                 match res {\n   61 |                     Ok(None) => res = Ok(Some(parsed)),\n   62 |                     Ok(Some(first)) => res = Err(vec![first, parsed]),\n   63 |                     Err(ref mut errors) => er
