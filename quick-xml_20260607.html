<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"`Attributes::new(buf, pos)` / `Attributes::html(buf, pos)` panic with an out-of-range\nslice index when `pos > buf.len()`, even though the documentation of both constructors\nexplicitly states: \"If it will be more than the buf length, then the iterator will\nreturn None immediately.\" The first call to `next()` reaches `IterState::next`, which\ndoes `(offset..).zip(slice[offset..].iter())`; with `offset == pos > slice.len()` the\nexpression `slice[offset..]` panics (\"range start index N out of range for slice of\nlength M\"). This was verified to panic at runtime via the public API:\n`Attributes::new(\"ab\", 100).next()` panics at attributes.rs:1115. The same out-of-range\nposition flows in through the public `Attributes::wrap`/`new`/`html` and any code that\nconstructs `BytesStart::from_content(content, name_len)` with `name_len > content.len()`\nand then calls `.attributes()`. Reader-produced events are not affected because the\nreader always supplies a valid `name_len`, but the documented public contract is violated.","fix":"Clamp the starting offset to the slice length (or return `None`) before slicing in\n`IterState::next` / `IterState::recover`, e.g. at the top of `next()`:\n`let offset = self.recover(slice)?; if offset > slice.len() { self.state = State::Done; return None; }`\nand use `slice.get(offset..)` instead of `slice[offset..]`. This restores the documented\n\"return None immediately\" behavior instead of panicking.","locations":[{"ref":"src/events/attributes.rs:1113-1117","code":" 1113 |     pub fn next(&mut self, slice: &[u8]) -> Option<AttrResult> {\n 1114 |         let mut iter = match self.recover(slice) {\n 1115 |             Some(offset) => (offset..).zip(slice[offset..].iter()),\n 1116 |             None => return None,\n 1117 |         };","lines":5},{"ref":"src/events/attributes.rs:549-551","code":"  549 |     pub const fn new(buf: &'a str, pos: usize) -> Self {\n  550 |         Self::wrap(buf.as_bytes(), pos, false, Decoder::utf8())\n  551 |     }","lines":3},{"ref":"src/events/attributes.rs:574-576","code":"  574 |     pub const fn html(buf: &'a str, pos: usize) -> Self {\n  575 |         Self::wrap(buf.as_bytes(), pos, true, Decoder::utf8())\n  576 |     }","lines":3}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"`Fountain::read` calls `buf.copy_from_slice(portion)` where `portion` has length\n`len = buf.len().min(available.len())`. When `buf.len() > available.len()` (the caller's buffer is\nlarger than the remaining unconsumed chunk), `portion` is shorter than `buf` and `copy_from_slice`\npanics because it requires source and destination slices to have equal length. Fountain is a public\ntest/integration helper (utils is `#[doc(hidden)] pub mod utils`) and is documented as a producer of\nan infinite stream, so a caller using a buffer larger than the configured chunk will hit a panic.","fix":"Copy only into the matching prefix of the destination buffer:\n`buf[..len].copy_from_slice(portion);` (and the `split_at`/`portion` binding can be replaced with\n`&available[..len]`).","locations":[{"ref":"src/utils.rs:262-270","code":"  262 | impl<'a> io::Read for Fountain<'a> {\n  263 |     fn read(&mut self, buf: &mut [u8]) -> io::Result<usize> {\n  264 |         let available = &self.chunk[self.consumed..];\n  265 |         let len = buf.len().min(available.len());\n  266 |         let (portion, _) = available.split_at(len);\n  267 | \n  268 |         buf.copy_from_slice(portion);\n  269 |         Ok(len)\n  270 |     }","lines":9}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","description":"Numerous `unreachable!()` calls guard reader/state invariants across these modules. They are\ndocumented as guaranteed by the reader, and most appear genuinely unreachable. However they are a\ncorrectness cliff: any future change to event production (or a reader bug) turns a recoverable\nparse error into a hard panic on untrusted input. The recently fixed DOCTYPE-between-text bug\n(see `current_event_is_last_text`/`drain_text` comments referencing the `read_text`\n`unreachable!()`) is direct evidence that one of these `unreachable!()`s was in fact reachable\nfrom crafted input. The remaining ones in `read_text` (two consecutive Text -> `unreachable!()`),\n`MapValueDeserializer`/`var`/`map` variant-access arms, and `ListIter`/seq arms rely on the same\nclass of invariants.","fix":"For the parser-facing invariants that depend on event sequencing (especially the\ntwo-consecutive-Text `unreachable!()` in `read_text`), prefer returning a structured\n`DeError`/`Error::missed_end`-style error instead of `unreachable!()`, so malformed or\nadversarial input degrades to an error rather than a panic. Keep `unreachable!()` only for\ninvariants fully controlled within the same function.","locations":[{"ref":"src/de/mod.rs:2924-2947","code":" 2924 |     fn read_text(&mut self, name: QName) -> Result<Cow<'de, str>, DeError> {\n 2925 |         match self.next()? {\n 2926 |             DeEvent::Text(e) => match self.next()? {\n 2927 |                 // The matching tag name is guaranteed by the reader\n 2928 |                 // Reached by trivial::{...}::{field, wrapped}\n 2929 |                 DeEvent::End(_) => Ok(e.text),\n 2930 |                 // SAFETY: Cannot be two consequent Text events, they would be merged into one\n 2931 |                 DeEvent::Text(_) => unreachable!(),\n 2932 |                 // Reached by trivial::{...}::{field_tag_after, tag_after}\n 2933 |                 DeEvent::Start(e) => Err(DeError::UnexpectedStart(e.name().as_ref().to_owned())),\n 2934 |                 // Reached by struct_::non_closed::elements_child\n 2935 |                 DeEvent::Eof => Err(Error::missed_end(name, self.reader.decoder()).into()),\n 2936 |             },\n 2937 |             // We can get End event in case of `<tag><\/tag>` or `<tag/>` input\n 2938 |             // Return empty text in that case\n 2939 |             // The matching tag name is guaranteed by the reader\n 2940 |             // Reached by {...}::xs_list::empty\n 2941 |             DeEvent::End(_) => Ok(\"\".into()),\n 2942 |             // Reached by trivial::{...}::{field_nested, field_tag_before, nested, tag_before}\n 2943 |             DeEvent::Start(s) => Err(DeError::UnexpectedStart(s.name().as_ref().to_owned())),\n 2944 |             // Reached by struct_::non_closed::elements_child\n 2945 |             DeEvent::Eof => Err(Error::missed_end(name, self.reader.decoder()).into()),\n 2946 |         }\n 2947 |     }","lines":24},{"ref":"src/de/map.rs:359-363","code":"  359 |             ValueSource::Text => match self.de.next()? {\n  360 |                 DeEvent::Text(e) => seed.deserialize(SimpleTypeDeserializer::from_text_content(e)),\n  361 |                 // SAFETY: We set `Text` only when we seen `Text`\n  362 |                 _ => unreachable!(),\n  363 |             },","lines":5},{"ref":"src/de/map.rs:991-1005","code":"  991 |                 DeEvent::Text(_) => match self.map.de.next()? {\n  992 |                     DeEvent::Text(e) => seed.deserialize(TextDeserializer(e)).map(Some),\n  993 |                     // SAFETY: we just checked that the next event is Text\n  994 |                     _ => unreachable!(),\n  995 |                 },\n  996 |                 DeEvent::Start(_) => match self.map.de.next()? {\n  997 |                     DeEvent::Start(start) => seed\n  998 |                         .deserialize(ElementDeserializer {\n  999 |                             start,\n 1000 |                             de: self.map.de,\n 1001 |                         })\n 1002 |                         .map(Some),\n 1003 |                     // SAFETY: we just checked that the next event is Start\n 1004 |                     _ => unreachable!(),\n 1005 |                 },","lines":15},{"ref":"src/de/var.rs:82-142","code":"   82 |     fn unit_variant(self) -> Result<(), Self::Error> {\n   83 |         match self.de.next()? {\n   84 |             // Consume subtree\n   85 |             DeEvent::Start(e) => self.de.read_to_end(e.name()),\n   86 |             // Does not needed to deserialize using SimpleTypeDeserializer, because\n   87 |             // it returns `()` when `deserialize_unit()` is requested\n   88 |             DeEvent::Text(_) => Ok(()),\n   89 |             // SAFETY: the other events are filtered in `variant_seed()`\n   90 |             _ => unreachable!(\"Only `Start` or `Text` events are possible here\"),\n   91 |         }\n   92 |     }\n   93 | \n   94 |     fn newtype_variant_seed<T>(self, seed: T) -> Result<T::Value, Self::Error>\n   95 |     where\n   96 |         T: DeserializeSeed<'de>,\n   97 |     {\n   98 |         if self.is_text {\n   99 |             match self.de.next()? {\n  100 |                 DeEvent::Text(e) => seed.deserialize(SimpleTypeDeserializer::from_text_content(e)),\n  101 |                 // SAFETY: the other events are filtered in `variant_seed()`\n  102 |                 _ => unreachable!(\"Only `Text` events are possible here\"),\n  103 |             }\n  104 |         } else {\n  105 |             seed.deserialize(self.de)\n  106 |         }\n  107 |     }\n  108 | \n  109 |     fn tuple_variant<V>(self, len: usize, visitor: V) -> Result<V::Value, Self::Error>\n  110 |     where\n  111 |         V: Visitor<'de>,\n  112 |     {\n  113 |         if self.is_text {\n  114 |             match self.de.next()? {\n  115 |                 DeEvent::Text(e) => {\n  116 |                     SimpleTypeDeserializer::from_text_content(e).deserialize_tuple(len, visitor)\n  117 |                 }\n  118 |                 // SAFETY: the other events are filtered in `variant_seed()`\n  119 |                 _ => unreachable!(\"Only `Text` events are possible here\"),\n  120 |             }\n  121 |         } else {\n  122 |             self.de.deserialize_tuple(len, visitor)\n  123 |         }\n  124 |     }\n  125 | \n  126 |     fn struct_variant<V>(\n  127 |         self,\n  128 |         fields: &'static [&'static str],\n  129 |         visitor: V,\n  130 |     ) -> Result<V::Value, Self::Error>\n  131 |     where\n  132 |         V: Visitor<'de>,\n  133 |     {\n  134 |         match self.de.next()? {\n  135 |             DeEvent::Start(e) => visitor.visit_map(ElementMapAccess::new(self.de, e, fields)),\n  136 |             DeEvent::Text(e) => {\n  137 |                 SimpleTypeDeserializer::from_text_content(e).deserialize_struct(\"\", fields, visitor)\n  138 |             }\n  139 |             // SAFETY: the other events are filtered in `variant_seed()`\n  140 |             _ => unreachable!(\"Only `Start` or `Text` events are possible here\"),\n  141 |         }\n  142 |     }","lines":61}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","description":"`DecodingReader::set_encoding` panics (via `assert!`) if called after the prefix buffer has been drained. Because the prefix is only `PREFIX_CAP` (64) bytes, an XML declaration longer than 64 bytes (e.g. with extra whitespace or a long `version`/`standalone` spelling) can be consumed past the prefix before the caller has a chance to parse the declaration and call `set_encoding`, turning a legitimate \"switch to declared encoding\" call into a panic. This is reachable from the documented usage pattern (parse `<?xml ... encoding=...?>`, then call `set_encoding`).","fix":"Avoid panicking on untrusted input. Either return a `Result`/error from `set_encoding` instead of asserting, or grow the prefix buffer so it is guaranteed to cover any legal XML declaration, or keep the prefix alive until the first non-declaration event. At minimum, the 64-byte cap should be documented as a hard limit on declaration length and the panic converted to a recoverable error.","locations":[{"ref":"src/encoding.rs:470-484","code":"  470 |     pub fn set_encoding(&mut self, encoding: &'static encoding_rs::Encoding) {\n  471 |         // No-op when the encoding matches - replacing the decoder would discard\n  472 |         // its internal state (e.g. a partial multi-byte sequence), corrupting output.\n  473 |         // This check is safe regardless of prefix state since nothing changes.\n  474 |         if self.decoder.encoding() == encoding {\n  475 |             return;\n  476 |         }\n  477 |         assert!(\n  478 |             self.prefix.is_some(),\n  479 |             \"set_encoding() called after prefix buffer was drained; \\\n  480 |              encoding can only be changed while the prefix is still active\"\n  481 |         );\n  482 |         self.decoder = encoding.new_decoder_without_bom_handling();\n  483 |         self.decoder_finished = false;\n  484 |     }","lines":15},{"ref":"src/encoding.rs:314-315","code":"  314 | #[cfg(feature = \"encoding\")]\n  315 | const PREFIX_CAP: usize = 64;","lines":2}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","description":"Several public `BytesStart`/`BytesPI` accessors slice by `name_len` without bounds\nchecking, so a user-constructed event whose `name_len` exceeds the buffer length panics.\n`BytesStart::from_content(content, name_len)` and `BytesStart::wrap` accept an arbitrary\n`name_len`; subsequently `name()` (`&self.buf[..self.name_len]`) and `attributes_raw()`\n(`&self.buf[self.name_len..]`) index out of range and panic. This is guarded only by a\n`# Warning` doc note rather than a check. It does not affect reader-produced events\n(reader always passes a valid `name_len`), so impact is limited to misuse of the public\nconstructors, but the failure mode is a panic rather than a graceful error.","fix":"Either clamp `name_len` to `buf.len()` in `from_content`/`wrap`, or have `name()` and\n`attributes_raw()` use `self.buf.get(..self.name_len)` / `self.buf.get(self.name_len..)`\nwith a sensible fallback (empty slice) so that misuse yields empty results instead of a\npanic.","locations":[{"ref":"src/events/mod.rs:135-142","code":"  135 |     #[inline]\n  136 |     pub fn from_content<C: Into<Cow<'a, str>>>(content: C, name_len: usize) -> Self {\n  137 |         BytesStart {\n  138 |             buf: str_cow_to_bytes(content),\n  139 |             name_len,\n  140 |             decoder: Decoder::utf8(),\n  141 |         }\n  142 |     }","lines":8},{"ref":"src/events/mod.rs:216-219","code":"  216 |     #[inline]\n  217 |     pub fn name(&self) -> QName<'_> {\n  218 |         QName(&self.buf[..self.name_len])\n  219 |     }","lines":4},{"ref":"src/events/mod.rs:298-301","code":"  298 |     #[inline]\n  299 |     pub fn attributes_raw(&self) -> &[u8] {\n  300 |         &self.buf[self.name_len..]\n  301 |     }","lines":4}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The `InsideText` arm of `read_event_impl` can emit an empty `Event::Text` when `trim_text_end` is enabled (and `trim_text_start` is disabled) and the text run consists only of whitespace terminated by `<` or `&`. The `UpToMarkup` and `UpToRef` branches unconditionally wrap the (possibly fully trimmed away) bytes in `Event::Text(self.state.emit_text(bytes))` without the emptiness check that the `UpToEof` branch performs. This is acknowledged by the in-code FIXME but left unaddressed; it produces spurious empty Text events that downstream consumers must filter, contradicting the `trim_text_*` documentation which says empty events \"will not be pushed\".","fix":"After computing `let event = self.state.emit_text(bytes);` in the `UpToMarkup` and `UpToRef` branches, skip emitting (continue the loop) if `event.is_empty()`, mirroring the `UpToEof` branch. Note the state transition (to `InsideMarkup` / `InsideRef`) must still be performed before continuing.","locations":[{"ref":"src/reader/mod.rs:342-354","code":"  342 |                         ReadTextResult::UpToMarkup(bytes) => {\n  343 |                             $self.state.state = ParseState::InsideMarkup;\n  344 |                             // FIXME: Can produce an empty event if:\n  345 |                             // - event contains only spaces\n  346 |                             // - trim_text_start = false\n  347 |                             // - trim_text_end = true\n  348 |                             Ok(Event::Text($self.state.emit_text(bytes)))\n  349 |                         }\n  350 |                         ReadTextResult::UpToRef(bytes) => {\n  351 |                             $self.state.state = ParseState::InsideRef;\n  352 |                             // Return Text event with `bytes` content or Eof if bytes is empty\n  353 |                             Ok(Event::Text($self.state.emit_text(bytes)))\n  354 |                         }","lines":13}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Writer::write_serializable` calls `self.write_indent()` (emitting a newline + current indent)\nbefore serializing, but does not update `indent.should_line_break`. After this call returns, the\nindent state's `should_line_break` retains whatever value the previous `write_event` left it at, so\na subsequent `write_event` (e.g. the closing `End`) may emit an additional, possibly unexpected\nnewline/indent relative to content written directly via events. The documented example happens to\nproduce the intended output, but mixing `write_serializable` with manual events can yield\ninconsistent indentation because the line-break heuristic state is not synchronized.","fix":"After writing the serializable content, set `self.indent`'s `should_line_break` consistently with\nhow a normal element write would leave it (typically `true`), so following events indent predictably.","locations":[{"ref":"src/writer.rs:393-412","code":"  393 |     #[cfg(feature = \"serialize\")]\n  394 |     pub fn write_serializable<T: Serialize>(\n  395 |         &mut self,\n  396 |         tag_name: &str,\n  397 |         content: &T,\n  398 |     ) -> Result<(), SeError> {\n  399 |         use crate::se::{Indent, Serializer};\n  400 | \n  401 |         self.write_indent()?;\n  402 |         let mut fmt = ToFmtWrite(&mut self.writer);\n  403 |         let mut serializer = Serializer::with_root(&mut fmt, Some(tag_name))?;\n  404 | \n  405 |         if let Some(indent) = &mut self.indent {\n  406 |             serializer.set_indent(Indent::Borrow(indent));\n  407 |         }\n  408 | \n  409 |         content.serialize(serializer)?;\n  410 | \n  411 |         Ok(())\n  412 |     }","lines":20}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"The HTML5 entity lookup table (`resolve_html5_entity`, behind the `escape-html` feature) contains ~133 corrupted entries spanning the Mathematical Alphanumeric Symbols block. Every `\\u{...}` value in this run has had its final hex digit truncated, turning 5-digit codepoints (U+1D4xx / U+1D5xx) into 4-digit ones. For example `Ascr` maps to `\\u{1D49}` (U+1D49 'ᵉ' MODIFIER LETTER SMALL E) instead of the correct `\\u{1D49C}` ('𝒜' MATHEMATICAL SCRIPT CAPITAL A); `Aopf` maps to `\\u{1D53}` instead of `\\u{1D538}` ('𝔸'); `Afr` maps to `\\u{1D50}` instead of `\\u{1D504}` ('𝔄'). Because the last digit was dropped, many distinct entities now collapse onto the same wrong codepoint (e.g. `Ascr`, `Cscr`, `Dscr` all -> `\\u{1D49}`), so the script/fraktur/double-struck math entities silently decode to completely wrong characters. This is a real correctness bug for any consumer that unescapes HTML5 entities. The values are wrong, not merely large data.","fix":"Regenerate this block from the authoritative source (https://html.spec.whatwg.org/entities.json). Each entry needs its missing trailing hex digit restored, e.g. `b\"Ascr\" => \"\\u{1D49C}\"`, `b\"Aopf\" => \"\\u{1D538}\"`, `b\"Afr\" => \"\\u{1D504}\"`, and so on across the whole U+1D49x..U+1D56x range. The collapsing of multiple distinct keys onto one value confirms the data is corrupt and must be rebuilt rather than hand-patched. Add a test that decodes a handful of these entities and asserts the exact expected character to prevent regressions.","locations":[{"ref":"src/escape.rs:2211-2343","code":" 2211 |         b\"Ascr\" => \"\\u{1D49}\",\n 2212 |         b\"Cscr\" => \"\\u{1D49}\",\n 2213 |         b\"Dscr\" => \"\\u{1D49}\",\n 2214 |         b\"Gscr\" => \"\\u{1D4A}\",\n 2215 |         b\"Jscr\" => \"\\u{1D4A}\",\n 2216 |         b\"Kscr\" => \"\\u{1D4A}\",\n 2217 |         b\"Nscr\" => \"\\u{1D4A}\",\n 2218 |         b\"Oscr\" => \"\\u{1D4A}\",\n 2219 |         b\"Pscr\" => \"\\u{1D4A}\",\n 2220 |         b\"Qscr\" => \"\\u{1D4A}\",\n 2221 |         b\"Sscr\" => \"\\u{1D4A}\",\n 2222 |         b\"Tscr\" => \"\\u{1D4A}\",\n 2223 |         b\"Uscr\" => \"\\u{1D4B}\",\n 2224 |         b\"Vscr\" => \"\\u{1D4B}\",\n 2225 |         b\"Wscr\" => \"\\u{1D4B}\",\n 2226 |         b\"Xscr\" => \"\\u{1D4B}\",\n 2227 |         b\"Yscr\" => \"\\u{1D4B}\",\n 2228 |         b\"Zscr\" => \"\\u{1D4B}\",\n 2229 |         b\"ascr\" => \"\\u{1D4B}\",\n 2230 |         b\"bscr\" => \"\\u{1D4B}\",\n 2231 |         b\"cscr\" => \"\\u{1D4B}\",\n 2232 |         b\"dscr\" => \"\\u{1D4B}\",\n 2233 |         b\"fscr\" => \"\\u{1D4B}\",\n 2234 |         b\"hscr\" => \"\\u{1D4B}\",\n 2235 |         b\"iscr\" => \"\\u{1D4B}\",\n 2236 |         b\"jscr\" => \"\\u{1D4B}\",\n 2237 |         b\"kscr\" => \"\\u{1D4C}\",\n 2238 |         b\"lscr\" => \"\\u{1D4C}\",\n 2239 |         b\"mscr\" => \"\\u{1D4C}\",\n 2240 |         b\"nscr\" => \"\\u{1D4C}\",\n 2241 |         b\"pscr\" => \"\\u{1D4C}\",\n 2242 |         b\"qscr\" => \"\\u{1D4C}\",\n 2243 |         b\"rscr\" => \"\\u{1D4C}\",\n 2244 |         b\"sscr\" => \"\\u{1D4C}\",\n 2245 |         b\"tscr\" => \"\\u{1D4C}\",\n 2246 |         b\"uscr\" => \"\\u{1D4C}\",\n 2247 |         b\"vscr opf\" => \"\\u{1D56}\",\n 2338 |         b\"uopf\" => \"\\u{1D56}\",\n 2339 |         b\"vopf\" => \"\\u{1D56}\",\n 2340 |         b\"wopf\" => \"\\u{1D56}\",\n 2341 |         b\"xopf\" => \"\\u{1D56}\",\n 2342 |         b\"yopf\" => \"\\u{1D56}\",\n 2343 |         b\"zopf\" => \"\\u{1D56}\",","lines":133}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"The async writer ignores the `add_space_before_slash_in_empty_elements` config option for empty\nelements. The synchronous `write_event` (writer.rs) selects `b\" />\"` or `b\"/>\"` based on\n`self.config.add_space_before_slash_in_empty_elements`, but the async `write_event_async` hardcodes\n`b\"/>\"`. This is a divergence where the sync path honors the config and the async path does not, so\nthe same `Writer` configured with `add_space_before_slash_in_empty_elements = true` produces\ndifferent output depending on whether events are written via the sync or async API.","fix":"Mirror the sync logic in the async branch:\n`Event::Empty(e) => self.write_wrapped_async(b\"<\", &e, if self.config.add_space_before_slash_in_empty_elements { b\" />\" } else { b\"/>\" }).await,`","locations":[{"ref":"src/writer.rs:277-285","code":"  277 |             Event::Empty(e) => self.write_wrapped(\n  278 |                 b\"<\",\n  279 |                 &e,\n  280 |                 if self.config.add_space_before_slash_in_empty_elements {\n  281 |                     b\" />\"\n  282 |                 } else {\n  283 |                     b\"/>\"\n  284 |                 },\n  285 |             ),","lines":9},{"ref":"src/writer/async_tokio.rs:28","code":"   28 |             Event::Empty(e) => self.write_wrapped_async(b\"<\", &e, b\"/>\").await,","lines":1}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"The four byte-scanning parsers disagree on what the returned index means, and the DTD\nparser compensates inconsistently. `CommentParser::feed` returns the position AFTER the\n`-->` terminator, while `ElementParser::feed` and `PiParser::feed` return the index OF\nthe `>` byte. In `DtdParser::feed` this is handled with two different advance idioms in\notherwise identical-looking arms: the `InComment` arm does `cur = &cur[i..]` (correct,\nbecause the comment parser already points past `-->`), but the `InPi` and\n`InQuoteSensitive` arms also do `cur = &cur[i..]` even though those parsers return the\nindex of the (still unconsumed) `>`. As a result a `>` byte is left in `cur` and\nre-scanned by the following `InsideOfInternalSubset` state. It is currently harmless\nbecause a stray `>` is not significant inside the internal subset, but the asymmetric\n\"+0 vs +1\" handling of structurally-identical arms is a copy-paste hazard: a future\nchange to comment-parser semantics, or treating `>` as significant, would silently break\none arm but not the others.","fix":"Make all `Parser::feed` implementations agree on a single convention for the returned\nindex (preferably \"position of the byte that ends the construct\", matching\n`ElementParser`/`PiParser`), and adjust `DtdParser`'s arms to consume consistently (e.g.\n`cur = &cur[i + 1..]` for parsers that return the index of `>`). Document the chosen\nconvention on the `Parser` trait so the arms can no longer drift apart.","locations":[{"ref":"src/parser/dtd.rs:165-203","code":"  165 |                 Self::InComment(ref mut parser) => {\n  166 |                     // If comment is ended, return to the main state, otherwise keep in the current state\n  167 |                     if let Some(i) = parser.feed(cur) {\n  168 |                         *self = Self::InsideOfInternalSubset;\n  169 |                         cur = &cur[i..];\n  170 |                         continue;\n  171 |                     }\n  172 |                     break;\n  173 |                 }\n  174 |                 Self::InPi(ref mut parser) => {\n  175 |                     // If processing instruction is ended, return to the main state,\n  176 |                     // otherwise keep in the current state\n  177 |                     if let Some(i) = parser.feed(cur) {\n  178 |                         *self = Self::InsideOfInternalSubset;\n  179 |                         cur = &cur[i..];\n  180 |                         continue;\n  181 |                     }\n  182 |                     break;\n  183 |                 }\n  184 |                 Self::InElementDecl => {\n  185 |                     // `<!ELEMENT >` does not have places where `>` could be escaped\n  186 |                     // so the first occurrence ends that state\n  187 |                     if let Some(i) = memchr::memchr(b'>', cur) {\n  188 |                         *self = Self::InsideOfInternalSubset;\n  189 |                         cur = &cur[i + 1..]; // +1 for `>`\n  190 |                         continue;\n  191 |                     }\n  192 |                     break;\n  193 |                 }\n  194 |                 Self::InQuoteSensitive(ref mut parser) => {\n  195 |                     // If ATTLIST, ENTITY or NOTATION is ended, return to the main state,\n  196 |                     // otherwise keep in the current state\n  197 |                     if let Some(i) = parser.feed(cur) {\n  198 |                         *self = Self::InsideOfInternalSubset;\n  199 |                         cur = &cur[i..];\n  200 |                         continue;\n  201 |                     }\n  202 |                     break;\n  203 |                 }","lines":39},{"ref":"src/parser/comment.rs:106-115","code":"  106 | #[inline]\n  107 | fn seen0(bytes: &[u8]) -> Option<usize> {\n  108 |     for i in memchr::memchr_iter(b'>', bytes) {\n  109 |         if bytes[..i].ends_with(b\"--\") {\n  110 |             // +1 for `>` which should be included in event\n  111 |             return Some(i + 1);\n  112 |         }\n  113 |     }\n  114 |     None\n  115 | }","lines":10},{"ref":"src/parser/element.rs:54-73","code":"   54 | impl Parser for ElementParser {\n   55 |     /// Returns number of consumed bytes or `None` if `>` was not found in `bytes`.\n   56 |     #[inline]\n   57 |     fn feed(&mut self, bytes: &[u8]) -> Option<usize> {\n   58 |         for i in memchr::memchr3_iter(b'>', b'\\'', b'\"', bytes) {\n   59 |             *self = match (*self, bytes[i]) {\n   60 |                 // only allowed to match `>` while we are in state `Outside`\n   61 |                 (Self::Outside, b'>') => return Some(i),\n   62 |                 (Self::Outside, b'\\'') => Self::SingleQ,\n   63 |                 (Self::Outside, b'\\\"') => Self::DoubleQ,\n   64 | \n   65 |                 // the only end_byte that gets us out if the same character\n   66 |                 (Self::SingleQ, b'\\'') | (Self::DoubleQ, b'\"') => Self::Outside,\n   67 | \n   68 |                 // all other bytes: no state change\n   69 |                 _ => continue,\n   70 |             };\n   71 |         }\n   72 |         None\n   73 |     }","lines":20},{"ref":"src/parser/pi.rs:62-73","code":"   62 |     fn feed(&mut self, bytes: &[u8]) -> Option<usize> {\n   63 |         for i in memchr::memchr_iter(b'>', bytes) {\n   64 |             match i {\n   65 |                 0 if self.0 => return Some(0),\n   66 |                 // If the previous byte is `?`, then we found `?>`\n   67 |                 i if i > 0 && bytes[i - 1] == b'?' => return Some(i),\n   68 |                 _ => {}\n   69 |             }\n   70 |         }\n   71 |         self.0 = bytes.last().copied() == Some(b'?');\n   72 |         None\n   73 |     }","lines":12}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`BytesStart::push_attr` (used by the public `push_attribute` / `extend_attributes` /\n`with_attributes`) always wraps the attribute value in double quotes (`b\"=\\\"\"` ... `b'\"'`)\nbut never escapes the value, and never escapes the key. The code carries a `FIXME: need\nto escape attribute content`. When an `Attribute` is built from raw bytes\n(`From<(&[u8], &[u8])>`) or from an `Attr` (`From<Attr<&[u8]>>`), the value is stored\nverbatim, so a value that contains a `\"` character (or `&`/`<`) produces malformed XML\noutput, e.g. `push_attribute((\"k\", b\"a\\\"b\".as_slice()))` emits `k=\"a\"b\"`. The crate's own\ntest `bytestart_clear_attributes` pushes a value containing `\"`. Only the `(&str, &str)`\nand `(&str, Cow<str>)` `From` impls escape the value, so the hazard depends on which\nconstructor the caller used, which is surprising.","fix":"Escape the attribute value (at minimum `&`, `<`, and the chosen quote character) before\nwriting it in `push_attr`, or choose the quote character based on the value's contents\nand reject/escape values containing both quote types. Document clearly which input paths\nperform escaping so callers using the raw-bytes `From` impls are not surprised.","locations":[{"ref":"src/events/mod.rs:318-325","code":"  318 |     pub(crate) fn push_attr<'b>(&mut self, attr: Attribute<'b>) {\n  319 |         let bytes = self.buf.to_mut();\n  320 |         bytes.extend_from_slice(attr.key.as_ref());\n  321 |         bytes.extend_from_slice(b\"=\\\"\");\n  322 |         // FIXME: need to escape attribute content\n  323 |         bytes.extend_from_slice(attr.value.as_ref());\n  324 |         bytes.push(b'\"');\n  325 |     }","lines":8},{"ref":"src/events/mod.rs:271-278","code":"  271 |     /// Adds an attribute to this element.\n  272 |     pub fn push_attribute<'b, A>(&mut self, attr: A)\n  273 |     where\n  274 |         A: Into<Attribute<'b>>,\n  275 |     {\n  276 |         self.buf.to_mut().push(b' ');\n  277 |         self.push_attr(attr.into());\n  278 |     }","lines":8}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`NamespaceResolver::push` iterates the element's attributes and, on the first attribute that fails to parse (`Err`), silently `break`s out of the loop, ignoring the error and any subsequent `xmlns` declarations on the same element. A malformed attribute earlier in the tag thus causes later namespace bindings to be silently dropped, which can lead to a valid prefix later resolving to `Unknown`. The parse error is neither propagated nor logged. Note `push` itself is also called with `.with_checks(false)`, so attribute well-formedness is not validated here either.","fix":"Decide and document the intended contract. Either propagate the attribute parse error (return it as a `NamespaceError`/dedicated error) instead of silently breaking, or continue scanning the remaining attributes for `xmlns` bindings rather than aborting at the first bad attribute, so a single malformed attribute does not drop unrelated namespace declarations.","locations":[{"ref":"src/name.rs:674-688","code":"  674 |     pub fn push(&mut self, start: &BytesStart) -> Result<(), NamespaceError> {\n  675 |         self.nesting_level += 1;\n  676 |         // adds new namespaces for attributes starting with 'xmlns:' and for the 'xmlns'\n  677 |         // (default namespace) attribute.\n  678 |         for a in start.attributes().with_checks(false) {\n  679 |             if let Ok(Attribute { key: k, value: v }) = a {\n  680 |                 if let Some(prefix) = k.as_namespace_binding() {\n  681 |                     self.add(prefix, Namespace(&v))?;\n  682 |                 }\n  683 |             } else {\n  684 |                 break;\n  685 |             }\n  686 |         }\n  687 |         Ok(())\n  688 |     }","lines":15}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `XmlReader::resolve_reference`, when an entity cannot be resolved the error is built as\n`EscapeError::UnrecognizedEntity(0..len, reference.to_string())` where `len = event.len()` is the\nbyte length of the entity reference itself. The first field of `UnrecognizedEntity` is a byte\nrange that the `Display` impl prints as `at {:?}:` (see escape.rs). Here it is always `0..len`,\nwhich is neither the position of the reference in the document nor a meaningful offset - it is\njust the length of the entity name expressed as a range starting at 0. The resulting message,\ne.g. `at 0..8: unrecognized entity \\`whatever\\``, gives the user a bogus position that does not\nhelp locate the problem.","fix":"Either pass a real document offset for the reference (if available from the reader/event) or, if\nno meaningful position is available, drop the range from the error / use a variant without a\nposition so the message does not advertise a misleading `0..len` location.","locations":[{"ref":"src/de/mod.rs:2457-2471","code":" 2457 |     fn resolve_reference(&mut self, result: &mut String, event: BytesRef) -> Result<(), DeError> {\n 2458 |         let len = event.len();\n 2459 |         let reference = self.decoder().decode(&event)?;\n 2460 | \n 2461 |         if let Some(num) = reference.strip_prefix('#') {\n 2462 |             let codepoint = parse_number(num).map_err(EscapeError::InvalidCharRef)?;\n 2463 |             result.push_str(codepoint.encode_utf8(&mut [0u8; 4]));\n 2464 |             return Ok(());\n 2465 |         }\n 2466 |         if let Some(value) = self.entity_resolver.resolve(reference.as_ref()) {\n 2467 |             result.push_str(value);\n 2468 |             return Ok(());\n 2469 |         }\n 2470 |         Err(EscapeError::UnrecognizedEntity(0..len, reference.to_string()).into())\n 2471 |     }","lines":15}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"Attribute duplicate checking is O(n^2) in the number of attributes and is enabled by\ndefault (`check_duplicates = true`). For every attribute, `check_for_duplicates`\nlinearly scans the `keys` vector of all previously seen keys and performs a full\nbyte-slice comparison (`slice[r] == slice[key]`) for each. On untrusted input a single\nstart tag with N attributes therefore costs O(N^2) time and O(N) memory with no upper\nbound, which is a denial-of-service amplification vector (e.g. a tag with tens of\nthousands of distinct attributes). The library exposes a way to disable the check\n(`with_checks(false)`), but the default path is quadratic.","fix":"Use a hash-based set for duplicate detection (e.g. hash the key bytes into a\n`HashMap<u64, Vec<Range<usize>>>` or `HashSet`) to make the common case O(N) instead of\nO(N^2), keeping the ranges only for reporting the previous position on a collision.\nAlternatively, document the quadratic cost and recommend `with_checks(false)` for\nuntrusted documents with many attributes.","locations":[{"ref":"src/events/attributes.rs:1066-1083","code":" 1066 |     #[inline]\n 1067 |     fn check_for_duplicates(\n 1068 |         &mut self,\n 1069 |         slice: &[u8],\n 1070 |         key: Range<usize>,\n 1071 |     ) -> Result<Range<usize>, AttrError> {\n 1072 |         if self.check_duplicates {\n 1073 |             if let Some(prev) = self\n 1074 |                 .keys\n 1075 |                 .iter()\n 1076 |                 .find(|r| slice[(*r).clone()] == slice[key.clone()])\n 1077 |             {\n 1078 |                 return Err(AttrError::Duplicated(key.start, prev.start));\n 1079 |             }\n 1080 |             self.keys.push(key.clone());\n 1081 |         }\n 1082 |         Ok(key)\n 1083 |     }","lines":18},{"ref":"src/events/attributes.rs:967-982","code":"  967 | /// External iterator over spans of attribute key and value\n  968 | #[derive(Clone, Debug)]\n  969 | pub(crate) struct IterState {\n  970 |     /// Iteration state that determines what actions should be done before the\n  971 |     /// actual parsing of the next attribute\n  972 |     state: State,\n  973 |     /// If `true`, enables ability to parse unquoted values and key-only (empty)\n  974 |     /// attributes\n  975 |     html: bool,\n  976 |     /// If `true`, checks for duplicate names\n  977 |     check_duplicates: bool,\n  978 |     /// If `check_duplicates` is set, contains the ranges of already parsed attribute\n  979 |     /// names. We store a ranges instead of slices to able to report a previous\n  980 |     /// attribute position\n  981 |     keys: Vec<Range<usize>>,\n  982 | }","lines":16}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"`MapValueSeqAccess::next_element_seed` (and `ElementMapAccess::next_key_seed` via `not_in`) calls\n`TagFilter::is_suitable` -> `not_in` for every peeked Start event, and `not_in` re-decodes the\ntag's local name (`start.decoder().decode(...)`) and then does a linear `fields.iter().all(...)`\nscan on each call. For sequences with many elements and structs with several fields this repeats\na decode + O(fields) scan per element. The decode in particular can allocate when the name is not\nborrowable (non-UTF8-compatible encoding).","fix":"Decode the local name once and compare against `fields` using a pre-built set, or at least avoid\nre-decoding when the name is ASCII/borrowed. For long field lists, consider a small `HashSet`/\nsorted lookup built once per `ElementMapAccess` instead of an O(n) scan per element.","locations":[{"ref":"src/de/map.rs:819-823","code":"  819 | fn not_in(fields: &'static [&'static str], start: &BytesStart) -> Result<bool, DeError> {\n  820 |     let tag = start.decoder().decode(start.local_name().into_inner())?;\n  821 | \n  822 |     Ok(fields.iter().all(|&field| field != tag.as_ref()))\n  823 | }","lines":5},{"ref":"src/de/map.rs:870-885","code":"  870 | impl<'de> TagFilter<'de> {\n  871 |     fn is_suitable(&self, start: &BytesStart) -> Result<bool, DeError> {\n  872 |         match self {\n  873 |             Self::Include(n) => Ok(n.name() == start.name()),\n  874 |             Self::Exclude(fields, _) => not_in(fields, start),\n  875 |         }\n  876 |     }\n  877 |     const fn need_skip_text(&self) -> bool {\n  878 |         match self {\n  879 |             // If we look only for tags, we should skip any $text keys\n  880 |             Self::Include(_) => true,\n  881 |             // If we look fo any data, we should exclude $text keys if it in the list\n  882 |             Self::Exclude(_, has_text_field) => *has_text_field,\n  883 |         }\n  884 |     }\n  885 | }","lines":16},{"ref":"src/de/map.rs:954-1008","code":"  954 |     fn next_element_seed<T>(&mut self, seed: T) -> Result<Option<T::Value>, DeError>\n  955 |     where\n  956 |         T: DeserializeSeed<'de>,\n  957 |     {\n  958 |         loop {\n  959 |             self.map.skip_whitespaces()?;\n  960 |             break match self.map.de.peek()? {\n  961 |                 // If we see a tag that we not interested, skip it\n  962 |                 #[cfg(feature = \"overlapped-lists\")]\n  963 |                 DeEvent::Start(e) if !self.filter.is_suitable(e)? => {\n  964 |                     self.map.de.skip()?;\n  965 |                     continue;\n  966 |                 }\n  967 |                 // Skip any text events if sequence expects only specific tag names\n  968 |                 #[cfg(feature = \"overlapped-lists\")]\n  969 |                 DeEvent::Text(_) if self.filter.need_skip_text() => {\n  970 |                     self.map.de.skip()?;\n  971 |                     continue;\n  972 |                 }\n  973 |                 // Stop iteration when list elements ends\n  974 |                 #[cfg(not(feature = \"overlapped-lists\"))]\n  975 |                 DeEvent::Start(e) if !self.filter.is_suitable(e)? => Ok(None),\n  976 |                 #[cfg(not(feature = \"overlapped-lists\"))]\n  977 |                 DeEvent::Text(_) if self.filter.need_skip_text() => Ok(None),\n  978 | \n  979 |                 // Stop iteration after reaching a closing tag\n  980 |                 // The matching tag name is guaranteed by the reader\n  981 |                 DeEvent::End(e) => {\n  982 |                     debug_assert_eq!(self.map.start.name(), e.name());\n  983 |                     Ok(None)\n  984 |                 }\n  985 |                 // We cannot get `Eof` legally, because we always inside of the\n  986 |                 // opened tag `self.map.start`\n  987 |                 DeEvent::Eof => {\n  988 |                     Err(Error::missed_end(self.map.start.name(), self.map.start.decoder()).into())\n  989 |                 }\n  990 | \n  991 |                 DeEvent::Text(_) => match self.map.de.next()? {\n  992 |                     DeEvent::Text(e) => seed.deserialize(TextDeserializer(e)).map(Some),\n  993 |                     // SAFETY: we just checked that the next event is Text\n  994 |                     _ => unreachable!(),\n  995 |                 },\n  996 |                 DeEvent::Start(_) => match self.map.de.next()? {\n  997 |                     DeEvent::Start(start) => seed\n  998 |                         .deserialize(ElementDeserializer {\n  999 |                             start,\n 1000 |                             de: self.map.de,\n 1001 |                         })\n 1002 |                         .map(Some),\n 1003 |                     // SAFETY: we just checked that the next event is Start\n 1004 |                     _ => unreachable!(),\n 1005 |                 },\n 1006 |             };\n 1007 |         }\n 1008 |     }","lines":55}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"`TagFilter::Include` stores an entire cloned `BytesStart` (with all its attribute bytes) just to\nlater compare names via `n.name() == start.name()`. The code itself flags this with\n`//TODO: Need to store only name instead of a whole tag`. For sequences of elements with many/long\nattributes this clones and retains far more data than necessary for the lifetime of the seq\ndeserialization. When the event is owned (IoReader path) the clone is a full heap copy of the tag\nbuffer per sequence.","fix":"Store only the tag name needed for comparison (e.g. a `Cow<'de, [u8]>` of `e.name()` or an owned\n`Vec<u8>`/`Box<[u8]>`), not the whole `BytesStart`, in `TagFilter::Include`.","locations":[{"ref":"src/de/map.rs:845-868","code":"  845 | enum TagFilter<'de> {\n  846 |     /// A `SeqAccess` interested only in tags with specified name to deserialize\n  847 |     /// an XML like this:\n  848 |     ///\n  849 |     /// ```xml\n  850 |     /// <...>\n  851 |     ///   <tag/>\n  852 |     ///   <tag/>\n  853 |     ///   <tag/>\n  854 |     ///   ...\n  855 |     /// <\/...>\n  856 |     /// ```\n  857 |     ///\n  858 |     /// The tag name is stored inside (`b\"tag\"` for that example)\n  859 |     Include(BytesStart<'de>), //TODO: Need to store only name instead of a whole tag\n  860 |     /// A `SeqAccess` interested in tags with any name, except explicitly listed.\n  861 |     /// Excluded tags are used as struct field names and therefore should not\n  862 |     /// fall into a `$value` category.\n  863 |     ///\n  864 |     /// The `bool` represents the having of a `$text` special field in fields array.\n  865 |     /// It is used to exclude text events when `$text` fields is defined together with\n  866 |     /// `$value` fieldб and `$value` accepts sequence.\n  867 |     Exclude(&'static [&'static str], bool),\n  868 | }","lines":24},{"ref":"src/de/map.rs:611-619","code":"  611 |         let filter = if self.fixed_name {\n  612 |             match self.map.de.peek()? {\n  613 |                 // Clone is cheap if event borrows from the input\n  614 |                 DeEvent::Start(e) => TagFilter::Include(e.clone()),\n  615 |                 // SAFETY: we use that deserializer with `fixed_name == true`\n  616 |                 // only from the `ElementMapAccess::next_value_seed` and only when we\n  617 |                 // peeked `Start` event\n  618 |                 _ => unreachable!(),\n  619 |             }","lines":9}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"`trim_cow` for the `Cow::Owned` case computes the trimmed sub-slice and then reallocates\nwith `trimmed.to_vec()` instead of trimming the owned `Vec` in place. For\n`inplace_trim_start`/`inplace_trim_end` on owned (e.g. decoded/normalized) text this\nallocates a fresh buffer and copies every time trimming removes any bytes, defeating the\n\"inplace\" intent of the callers.","fix":"For the owned case, compute the start/end offsets of the trimmed region relative to the\nbuffer and mutate the `Vec` in place (`bytes.truncate(end); bytes.drain(..start);`)\ninstead of allocating a new `Vec` via `to_vec()`. Keep the borrowed fast path as-is.","locations":[{"ref":"src/events/mod.rs:1896-1909","code":" 1896 | fn trim_cow<'a, F>(value: Cow<'a, [u8]>, trim: F) -> Cow<'a, [u8]>\n 1897 | where\n 1898 |     F: FnOnce(&[u8]) -> &[u8],\n 1899 | {\n 1900 |     match value {\n 1901 |         Cow::Borrowed(bytes) => Cow::Borrowed(trim(bytes)),\n 1902 |         Cow::Owned(mut bytes) => {\n 1903 |             let trimmed = trim(&bytes);\n 1904 |             if trimmed.len() != bytes.len() {\n 1905 |                 bytes = trimmed.to_vec();\n 1906 |             }\n 1907 |             Cow::Owned(bytes)\n 1908 |         }\n 1909 |     }","lines":14},{"ref":"src/events/mod.rs:683-700","code":"  683 |     /// Removes leading XML whitespace bytes from text content.\n  684 |     ///\n  685 |     /// Returns `true` if content is empty after that\n  686 |     pub fn inplace_trim_start(&mut self) -> bool {\n  687 |         self.content = trim_cow(\n  688 |             replace(&mut self.content, Cow::Borrowed(b\"\")),\n  689 |             trim_xml_start,\n  690 |         );\n  691 |         self.content.is_empty()\n  692 |     }\n  693 | \n  694 |     /// Removes trailing XML whitespace bytes from text content.\n  695 |     ///\n  696 |     /// Return {\n  296 |                     Ok(n) => {\n  297 |                         let count = n.iter().position(|b| !is_whitespace(*b)).unwrap_or(n.len());\n  298 |                         if count > 0 {\n  299 |                             self $(.$reader)? .consume(count);\n  300 |                             *position += count as u64;\n  301 |                             continue;\n  302 |                         } else {\n  303 |                             Ok(())\n  304 |                         }\n  305 |                     }\n  306 |                     Err(ref e) if e.kind() == io::ErrorKind::Interrupted => continue,\n  307 |                     Err(e) => Err(e),\n  308 |                 };\n  309 |             }\n  310 |         }","lines":19},{"ref":"src/reader/slice_reader.rs:380-388","code":"  380 |     fn skip_whitespace(&mut self, position: &mut u64) -> io::Result<()> {\n  381 |         let whitespaces = self\n  382 |             .iter()\n  383 |             .position(|b| !is_whitespace(*b))\n  384 |             .unwrap_or(self.len());\n  385 |         *position += whitespaces as u64;\n  386 |         *self = &self[whitespaces..];\n  387 |         Ok(())\n  388 |     }","lines":9}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"`ContentSerializer::serialize_str` checks `if !value.is_empty()` before delegating to\n`SimpleTypeSerializer::serialize_str`, but `SimpleTypeSerializer::serialize_str` (simple_type.rs:488)\nalready performs the exact same `if !value.is_empty()` guard before calling `escape_list`. The outer\ncheck is redundant: for an empty string it skips constructing the `SimpleTypeSerializer`, but the\ndelegate would do nothing anyway. The duplicated guard is dead/confusing - it suggests the empty case\nis special here when it is not.","fix":"Drop the redundant `if !value.is_empty()` in `ContentSerializer::serialize_str` and unconditionally\ndelegate: `self.into_simple_type_serializer()?.serialize_str(value)?; Ok(WriteResult::SensitiveText)`.","locations":[{"ref":"src/se/content.rs:230-235","code":"  230 |     fn serialize_str(self, value: &str) -> Result<Self::Ok, Self::Error> {\n  231 |         if !value.is_empty() {\n  232 |             self.into_simple_type_serializer()?.serialize_str(value)?;\n  233 |         }\n  234 |         Ok(WriteResult::SensitiveText)\n  235 |     }","lines":6},{"ref":"src/se/simple_type.rs:488-493","code":"  488 |     fn serialize_str(mut self, value: &str) -> Result<Self::Ok, Self::Error> {\n  489 |         if !value.is_empty() {\n  490 |             escape_list(&mut self.writer, value, self.target, self.level)?;\n  491 |         }\n  492 |         Ok(self.writer)\n  493 |     }","lines":6}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"`Struct` always buffers all child elements into an owned `String` (`children: String::new()`) and\nonly writes them to the real writer in `end()`. For deeply nested structures this means the same\ntext is copied at every nesting level: a leaf's bytes are copied into its parent's `children`\nbuffer, then that whole buffer is copied into the grandparent's `children`, and so on, giving roughly\nO(depth) re-copies of the content and O(depth) intermediate heap allocations. The buffering exists\nonly to allow attributes (written directly to the outer writer) to precede element children. The\ncode itself acknowledges this is a workaround (see the TODO at element.rs:376-378). This is a real\nperformance cost for large/deep documents.","fix":"Implement the customization point described in the existing TODO: write elements directly to the\nunderlying writer and require attributes to be serialized first (erroring if an attribute follows an\nelement), avoiding the per-level `children` buffer and its repeated copies/allocations.","locations":[{"ref":"src/se/element.rs:373-382","code":"  373 | pub struct Struct<'w, 'k, W: Write> {\n  374 |     ser: ElementSerializer<'w, 'k, W>,\n  375 |     /// Buffer to store serialized elements\n  376 |     // TODO: Customization point: allow direct writing of elements, but all\n  377 |     // attributes should be listed first. Fail, if attribute encountered after\n  378 |     // element. Use feature to configure\n  379 |     children: String,\n  380 |     /// Whether need to write indent after the last written field\n  381 |     write_indent: bool,\n  382 | }","lines":10},{"ref":"src/se/element.rs:433-464","code":"  433 |     fn write_element<T>(&mut self, key: &str, value: &T) -> Result<(), SeError>\n  434 |     where\n  435 |         T: ?Sized + Serialize,\n  436 |     {\n  437 |         let ser = ContentSerializer {\n  438 |             writer: &mut self.children,\n  439 |             level: self.ser.ser.level,\n  440 |             indent: self.ser.ser.indent.borrow(),\n  441 |             // If previous field does not require indent, do not write it\n  442 |             write_indent: self.write_indent,\n  443 |             text_format: self.ser.ser.text_format,\n  444 |             allow_primitive: true,\n  445 |             empty_element_handling: self.ser.ser.empty_element_handling,\n  446 |         };\n  447 | \n  448 |         if key == TEXT_KEY {\n  449 |             value.serialize(TextSerializer(ser.into_simple_type_serializer()?))?;\n  450 |             // Text was written so we don't need to indent next field\n  451 |             self.write_indent = false;\n  452 |         } else if key == VALUE_KEY {\n  453 |             // If element was written then we need to indent next field unless it is a text field\n  454 |             self.write_indent = value.serialize(ser)?.allow_indent();\n  455 |         } else {\n  456 |             value.serialize(ElementSerializer {\n  457 |                 key: XmlName::try_from(key)?,\n  458 |                 ser,\n  459 |             })?;\n  460 |             // Element was written so we need to indent next field unless it is a text field\n  461 |             self.write_indent = true;\n  462 |         }\n  463 |         Ok(())\n  464 |     }","lines":32},{"ref":"src/se/element.rs:478-508","code":"  478 |     fn end(mut self) -> Result<Self::Ok, Self::Error> {\n  479 |         self.ser.ser.indent.decrease();\n  480 | \n  481 |         if self.children.is_empty() {\n  482 |             match self.ser.ser.empty_element_handling {\n  483 |                 EmptyElementHandling::SelfClosed => {\n  484 |                     self.ser.ser.writer.write_str(\"/>\")?;\n  485 |                 }\n  486 |                 EmptyElementHandling::SelfClosedWithSpace => {\n  487 |                     self.ser.ser.writer.write_str(\" />\")?;\n  488 |                 }\n  489 |                 EmptyElementHandling::Expanded => {\n  490 |                     self.ser.ser.writer.write_str(\"><\/\")?;\n  491 |                     self.ser.ser.writer.write_str(self.ser.key.0)?;\n  492 |                     self.ser.ser.writer.write_char('>')?;\n  493 |                 }\n  494 |             }\n  495 |         } else {\n  496 |             self.ser.ser.writer.write_char('>')?;\n  497 |             self.ser.ser.writer.write_str(&self.children)?;\n  498 | \n  499 |             if self.write_indent {\n  500 |                 self.ser.ser.indent.write_indent(&mut self.ser.ser.writer)?;\n  501 |             }\n  502 | \n  503 |             self.ser.ser.writer.write_str(\"<\/\")?;\n  504 |             self.ser.ser.writer.write_str(self.ser.key.0)?;\n  505 |             self.ser.ser.writer.write_char('>')?;\n  506 |         }\n  507 |         Ok(WriteResult::Element)\n  508 |     }","lines":31}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","description":"`ElementMapAccess::should_skip_subtree` always evaluates both `has_nil_attr(&self.start)` and\n`has_nil_attr(start)`, and each `has_nil_attr` call re-parses the element's attribute list\n(`start.attributes().has_nil(...)`). It is called from
