Combined with the per-element `is_suitable` calls in `MapValueSeqAccess`, this is redundant work\nin the hot sequence path.","fix":"Cache the decoded local name within the loop where both the key check and the filter check need\nit, and reuse it instead of decoding twice; or compare against `fields` using raw bytes where the\nfield names are known ASCII to skip decoding entirely.","locations":[{"ref":"src/de/map.rs:310-321","code":"  310 |                 DeEvent::Start(e) if self.has_value_field && not_in(self.fields, e)? => {\n  311 |                     self.source = ValueSource::Content;\n  312 | \n  313 |                     let de = BorrowedStrDeserializer::<DeError>::new(VALUE_KEY);\n  314 |                     seed.deserialize(de).map(Some)\n  315 |                 }\n  316 |                 DeEvent::Start(e) => {\n  317 |                     self.source = ValueSource::Nested;\n  318 | \n  319 |                     let de = QNameDeserializer::from_elem(e)?;\n  320 |                     seed.deserialize(de).map(Some)\n  321 |                 }","lines":12},{"ref":"src/de/map.rs:819-823","code":"  819 | fn not_in(fields: &'static [&'static str], start: &BytesStart) -> Result<bool, DeError> {\n  820 |     let tag = start.decoder().decode(start.local_name().into_inner())?;\n  821 | \n  822 |     Ok(fields.iter().all(|&field| field != tag.as_ref()))\n  823 | }","lines":5}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","description":"`Decoder::decode_cow` and `Decoder::content` force an owned allocation for the `Cow::Owned(bytes)` arm by calling `.into_owned()` even when the underlying decode produced a borrowed `&str` that merely needed its lifetime re-bound. This is necessary for soundness (the borrowed str borrows the locally-owned `bytes`), but for UTF-8 input it means an extra `String` allocation/copy on every owned-buffer decode. Noting as a known cost, not a defect.","fix":"No correctness fix required. If this path is hot, consider returning the decoded `String` together with ownership of the byte buffer (or decoding directly into a reusable output buffer) to avoid the intermediate copy.","locations":[{"ref":"src/encoding.rs:145-178","code":"  145 |     pub(crate) fn decode_cow<'b>(\n  146 |         &self,\n  147 |         bytes: &Cow<'b, [u8]>,\n  148 |     ) -> Result<Cow<'b, str>, EncodingError> {\n  149 |         match bytes {\n  150 |             Cow::Borrowed(bytes) => self.decode(bytes),\n  151 |             // Convert to owned, because otherwise Cow will be bound with wrong lifetime\n  152 |             Cow::Owned(bytes) => Ok(self.decode(bytes)?.into_owned().into()),\n  153 |         }\n  154 |     }\n  155 | \n  156 |     /// Decodes the `Cow` buffer, normalizes XML EOLs, preserves the lifetime\n  157 |     pub(crate) fn content<'b>(\n  158 |         &self,\n  159 |         bytes: &Cow<'b, [u8]>,\n  160 |         normalize_eol: impl Fn(&str) -> Cow<str>,\n  161 |     ) -> Result<Cow<'b, str>, EncodingError> {\n  162 |         match bytes {\n  163 |             Cow::Borrowed(bytes) => {\n  164 |                 let text = self.decode(bytes)?;\n  165 |                 match normalize_eol(&text) {\n  166 |                     // If text borrowed after normalization that means that it's not changed\n  167 |                     Cow::Borrowed(_) => Ok(text),\n  168 |                     Cow::Owned(s) => Ok(Cow::Owned(s)),\n  169 |                 }\n  170 |             }\n  171 |             Cow::Owned(bytes) => {\n  172 |                 let text = self.decode(bytes)?;\n  173 |                 let text = normalize_eol(&text);\n  174 |                 // Convert to owned, because otherwise Cow will be bound with wrong lifetime\n  175 |                 Ok(text.into_owned().into())\n  176 |             }\n  177 |         }\n  178 |     }","lines":34}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"negligible","description":"`Indentation::new` eagerly allocates a 128-byte `Vec` for the indent cache even when the indent\nsize is large or indentation is never deeply nested, and `Writer::new_with_indent` always creates\nthis. Minor: for the common case the 128-byte preallocation is harmless, but the magic number is\nundocumented and unrelated to `indent_size`, so a single level deeper than 128/indent_size triggers\na reallocation via `ensure`. Not a correctness issue.","fix":"Consider sizing the initial cache relative to `indent_size` (e.g. a few levels) or documenting why\n128 was chosen; alternatively start empty and rely on `ensure` to grow on demand.","locations":[{"ref":"src/writer.rs:684-693","code":"  684 | impl Indentation {\n  685 |     pub fn new(indent_char: u8, indent_size: usize) -> Self {\n  686 |         Self {\n  687 |             should_line_break: false,\n  688 |             indent_char,\n  689 |             indent_size,\n  690 |             indents: vec![indent_char; 128],\n  691 |             current_indent_len: 0, // invariant - needs to remain less than indents.len()\n  692 |         }\n  693 |     }","lines":10}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`Map::make_key` takes `&mut self` but never reads or mutates `self`; it only serializes the supplied\n`key` into a fresh `QNameSerializer { writer: String::new() }`. The `&mut self` receiver is\nmisleading (it implies the method depends on map state) and unnecessarily constrains the borrow.","fix":"Make `make_key` an associated function or take `&self` (or no receiver at all), e.g.\n`fn make_key<T: ?Sized + Serialize>(key: &T) -> Result<String, SeError>`, and update the two call\nsites in `serialize_key`/`serialize_entry`.","locations":[{"ref":"src/se/element.rs:538-547","code":"  538 | impl<'w, 'k, W: Write> Map<'w, 'k, W> {\n  539 |     fn make_key<T>(&mut self, key: &T) -> Result<String, SeError>\n  540 |     where\n  541 |         T: ?Sized + Serialize,\n  542 |     {\n  543 |         key.serialize(QNameSerializer {\n  544 |             writer: String::new(),\n  545 |         })\n  546 |     }\n  547 | }","lines":10}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`Content::as_str` matches `Content::Owned(s, offset)` with `s.split_at(*offset).1`, but inspection\nof `ListIter::next_element_seed` shows that when a `Content::Owned` is consumed it is always\nre-borrowed into a `CowRef::Slice`/`CowRef::Owned` via explicit match arms, and the offset is only\never advanced by `skip + start`/`skip + end`. The `as_str` helper is only used at the top of the\nloop to test emptiness and to find the next delimiter. This is fine, but the `Owned` deserializer\nstorage path (a `String` plus a `usize` offset that is never actually shrunk/reallocated) is only\nexercised by the `encoding` feature; without it, the `Owned` variant of `Content` and the\ncorresponding `AtomicDeserializer` owned arm are effectively unreachable from real input (slice\ninput is always borrowed/UTF-8). Worth confirming the owned path is covered or gating it.","fix":"Confirm via coverage that the `Content::Owned`/`CowRef::Owned` list path is reachable in a\nnon-`encoding` build; if it is only reachable under `feature = \"encoding\"`, consider documenting\nthat or gating the owned arms to avoid carrying logic that cannot be hit in the default build.","locations":[{"ref":"src/de/simple_type.rs:90-99","code":"   90 | impl<'de, 'a> Content<'de, 'a> {\n   91 |     /// Returns string representation of the content\n   92 |     fn as_str(&self) -> &str {\n   93 |         match self {\n   94 |             Content::Input(s) => s,\n   95 |             Content::Slice(s) => s,\n   96 |             Content::Owned(s, offset) => s.split_at(*offset).1,\n   97 |         }\n   98 |     }\n   99 | }","lines":10},{"ref":"src/de/simple_type.rs:380-385","code":"  380 |                         Content::Owned(s, 0) => seed.deserialize(AtomicDeserializer {\n  381 |                             content: CowRef::Owned(s),\n  382 |                         }),\n  383 |                         Content::Owned(s, offset) => seed.deserialize(AtomicDeserializer {\n  384 |                             content: CowRef::Slice(s.split_at(offset).1),\n  385 |                         }),","lines":6}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In `ElementWriter::new_line`, the match arms for `AttributeIndent::WriteSpaces(_)` and\n`AttributeIndent::WriteConfigured(_)` are empty no-ops, and the accompanying state diagram in the\ndoc comment on `AttributeIndent` lists transitions (e.g. `WriteSpaces --> WriteSpaces : .new_line()`)\nthat are effectively unreachable in practice because `write_attr` always converts a `Write*` state\ninto its non-`Write*` counterpart before another `new_line` can be observed. The empty arms and the\ndiagram transitions describe states that the public API flow does not actually reach between calls,\nwhich is confusing for maintainers.","fix":"Add a short comment explaining why these arms are no-ops (consecutive `new_line()` calls without an\nintervening `with_attribute()`), or restructure the state machine so the unreachable transitions are\nnot implied by the diagram.","locations":[{"ref":"src/writer.rs:535-543","code":"  535 |                 AttributeIndent::WriteSpaces(_) => {}\n  536 |                 // .new_line() called when .with_attribute() was called at least once.\n  537 |                 // The spaces should be used to indent\n  538 |                 // Plan saved indent\n  539 |                 AttributeIndent::Spaces(indent) => {\n  540 |                     self.state = AttributeIndent::WriteSpaces(indent)\n  541 |                 }\n  542 | \n  543 |                 AttributeIndent::WriteConfigured(_) => {}","lines":9},{"ref":"src/writer.rs:415-447","code":"  415 | /// Track indent inside elements state\n  416 | ///\n  417 | /// ```mermaid\n  418 | /// stateDiagram-v2\n  419 | ///     [*] --> NoneAttributesWritten\n  420 | ///     NoneAttributesWritten --> Spaces : .with_attribute()\n  421 | ///     NoneAttributesWritten --> WriteConfigured : .new_line()\n  422 | ///\n  423 | ///     Spaces --> Spaces : .with_attribute()\n  424 | ///     Spaces --> WriteSpaces : .new_line()\n  425 | ///\n  426 | ///     WriteSpaces --> Spaces : .with_attribute()\n  427 | ///     WriteSpaces --> WriteSpaces : .new_line()\n  428 | ///\n  429 | ///     Configured --> Configured : .with_attribute()\n  430 | ///     Configured --> WriteConfigured : .new_line()\n  431 | ///\n  432 | ///     WriteConfigured --> Configured : .with_attribute()\n  433 | ///     WriteConfigured --> WriteConfigured : .new_line()\n  434 | /// ```\n  435 | #[derive(Debug)]\n  436 | enum AttributeIndent {\n  437 |     /// Initial state. `ElementWriter` was just created and no attributes written yet\n  438 |     NoneAttributesWritten,\n  439 |     /// Write specified count of spaces to indent before writing attribute in `with_attribute()`\n  440 |     WriteSpaces(usize),\n  441 |     /// Keep space indent that should be used if `new_line()` would be called\n  442 |     Spaces(usize),\n  443 |     /// Write specified count of indent characters before writing attribute in `with_attribute()`\n  444 |     WriteConfigured(usize),\n  445 |     /// Keep indent that should be used if `new_line()` would be called\n  446 |     Configured(usize),\n  447 | }","lines":33}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Several comments in `read_string_impl` and `read_text` claim precise test coverage facts that\nare brittle and almost certainly drift out of date, e.g. `// Reached by doc tests only: this\nfile, lines 979 and 996` (those line numbers do not correspond to anything meaningful in the\ncurrent file), `// TODO: not reached by any tests` on the `UnexpectedStart` arm, and\n`// Reached by trivial::{...}::{field, wrapped}`. Hard-coding line numbers and exact test names\ninto source comments is misleading once the file changes (the referenced lines 979/996 are inside\nunrelated code/tests now).","fix":"Remove the line-number and per-test references from these comments. Keep only the semantic\nexplanation of each arm (what XML shape triggers it and why the result is correct). Coverage\nshould be tracked by the test suite / coverage tooling, not by source comments.","locations":[{"ref":"src/de/mod.rs:2902-2917","code":" 2902 |     fn read_string_impl(&mut self, allow_start: bool) -> Result<Cow<'de, str>, DeError> {\n 2903 |         match self.next()? {\n 2904 |             // Reached by doc tests only: this file, lines 979 and 996\n 2905 |             DeEvent::Text(e) => Ok(e.text),\n 2906 |             // allow one nested level\n 2907 |             // Reached by trivial::{...}::{field, field_nested, field_tag_after, field_tag_before, nested, tag_after, tag_before, wrapped}\n 2908 |             DeEvent::Start(e) if allow_start => self.read_text(e.name()),\n 2909 |             // TODO: not reached by any tests\n 2910 |             DeEvent::Start(e) => Err(DeError::UnexpectedStart(e.name().as_ref().to_owned())),\n 2911 |             // SAFETY: The reader is guaranteed that we don't have unmatched tags\n 2912 |             // If we here, then our deserializer has a bug\n 2913 |             DeEvent::End(e) => unreachable!(\"{:?}\", e),\n 2914 |             // Reached by trivial::{empty_doc, only_comment}\n 2915 |             DeEvent::Eof => Err(DeError::UnexpectedEof),\n 2916 |         }\n 2917 |     }","lines":16},{"ref":"src/de/mod.rs:2924-2946","code":" 2924 |     fn read_text(&mut self, name: QName) -> Result<Cow<'de, str>, DeError> {\n 2925 |         match self.next()? {\n 2926 |             DeEvent::Text(e) => match self.next()? {\n 2927 |                 // The matching tag name is guaranteed by the reader\n 2928 |                 // Reached by trivial::{...}::{field, wrapped}\n 2929 |                 DeEvent::End(_) => Ok(e.text),\n 2930 |                 // SAFETY: Cannot be two consequent Text events, they would be merged into one\n 2931 |                 DeEvent::Text(_) => unreachable!(),\n 2932 |                 // Reached by trivial::{...}::{field_tag_after, tag_after}\n 2933 |                 DeEvent::Start(e) => Err(DeError::UnexpectedStart(e.name().as_ref().to_owned())),\n 2934 |                 // Reached by struct_::non_closed::elements_child\n 2935 |                 DeEvent::Eof => Err(Error::missed_end(name, self.reader.decoder()).into()),\n 2936 |             },\n 2937 |             // We can get End event in case of `<tag><\/tag>` or `<tag/>` input\n 2938 |             // Return empty text in that case\n 2939 |             // The matching tag name is guaranteed by the reader\n 2940 |             // Reached by {...}::xs_list::empty\n 2941 |             DeEvent::End(_) => Ok(\"\".into()),\n 2942 |             // Reached by trivial::{...}::{field_nested, field_tag_before, nested, tag_before}\n 2943 |             DeEvent::Start(s) => Err(DeError::UnexpectedStart(s.name().as_ref().to_owned())),\n 2944 |             // Reached by struct_::non_closed::elements_child\n 2945 |             DeEvent::Eof => Err(Error::missed_end(name, self.reader.decoder()).into()),\n 2946 |         }","lines":23}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Typo in the user-facing error message for `IllFormedError::MissingDeclVersion(Some(..))`:\n\"an XML declaration must start with `version` attribute, but in starts with `{}`\". The word\n\"in\" should be \"it\" (\"but it starts with\").","fix":"Change `but in starts with` to `but it starts with`.","locations":[{"ref":"src/errors.rs:154-156","code":"  154 |             Self::MissingDeclVersion(Some(attr)) => {\n  155 |                 write!(f, \"an XML declaration must start with `version` attribute, but in starts with `{}`\", attr)\n  156 |             }","lines":3}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment for `escape` repeats the identical \"This function performs following replacements\" table twice in a row (lines 96-104 and 106-114). It is an accidental duplication, not two different tables.","fix":"Delete the second copy of the table (lines 106-114), keeping a single table.","locations":[{"ref":"src/escape.rs:96-114","code":"   96 | /// This function performs following replacements:\n   97 | ///\n   98 | /// | Character | Replacement\n   99 | /// |-----------|------------\n  100 | /// | `<`       | `&lt;`\n  101 | /// | `>`       | `&gt;`\n  102 | /// | `&`       | `&amp;`\n  103 | /// | `'`       | `&apos;`\n  104 | /// | `\"`       | `&quot;`\n  105 | ///\n  106 | /// This function performs following replacements:\n  107 | ///\n  108 | /// | Character | Replacement\n  109 | /// |-----------|------------\n  110 | /// | `<`       | `&lt;`\n  111 | /// | `>`       | `&gt;`\n  112 | /// | `&`       | `&amp;`\n  113 | /// | `'`       | `&apos;`\n  114 | /// | `\"`       | `&quot;`","lines":19}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment for `partial_escape` repeats the identical replacement table twice (lines 125-131 and 133-139). Accidental copy-paste duplication.","fix":"Delete the duplicated table (lines 133-139), keeping a single table.","locations":[{"ref":"src/escape.rs:125-139","code":"  125 | /// This function performs following replacements:\n  126 | ///\n  127 | /// | Character | Replacement\n  128 | /// |-----------|------------\n  129 | /// | `<`       | `&lt;`\n  130 | /// | `>`       | `&gt;`\n  131 | /// | `&`       | `&amp;`\n  132 | ///\n  133 | /// This function performs following replacements:\n  134 | ///\n  135 | /// | Character | Replacement\n  136 | /// |-----------|------------\n  137 | /// | `<`       | `&lt;`\n  138 | /// | `>`       | `&gt;`\n  139 | /// | `&`       | `&amp;`","lines":15}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `PiParser` documentation states that `feed` returns \"the position after `?>`\"\n(module/struct doc and the `feed` method doc), but the implementation returns the index\nOF the `>` byte (i.e. one position before the end of `?>`), not the position after it.\nFor input chunk `' inside?>...` the `>` is at index 9 and the function returns `Some(9)`,\nwhich the doctest itself labels as `9` while the prose claims \"position after `?>`\".\nCompare with `CommentParser::feed`, which genuinely returns the position AFTER `-->`\n(`i + 1`), and `ElementParser::feed`, whose doc correctly says it returns \"position of\nfound symbol\". The PI doc wording is therefore inconsistent with both the code and the\nsibling parsers and is misleading to anyone implementing a new `Parser`.","fix":"Change the PI doc text to say it returns the position OF the closing `>` (the index where\nthe instruction's `?>` terminator's `>` is located), matching `ElementParser`'s wording,\nor explicitly note that the caller is expected to add 1 to consume the `>` (as\n`read_with` does). Do not claim \"position after `?>`\".","locations":[{"ref":"src/parser/pi.rs:9-13","code":"    9 | /// To use a parser create an instance of parser and [`feed`] data into it.\n   10 | /// After successful search the parser will return [`Some`] with position where\n   11 | /// processing instruction is ended (the position after `?>`). If search was\n   12 | /// unsuccessful, a [`None`] will be returned. You typically would expect positive\n   13 | /// result of search, so that you should feed new data until you get it.","lines":5},{"ref":"src/parser/pi.rs:47-51","code":"   47 |     /// Determines the end position of a processing instruction in the provided slice.\n   48 |     /// Processing instruction ends on the first occurrence of `?>` which cannot be\n   49 |     /// escaped.\n   50 |     ///\n   51 |     /// Returns position after the `?>` or `None` if such sequence was not found.","lines":5},{"ref":"src/parser/pi.rs:62-73","code":"   62 |     fn feed(&mut self, bytes: &[u8]) -> Option<usize> {\n   63 |         for i in memchr::memchr_iter(b'>', bytes) {\n   64 |             match i {\n   65 |                 0 if self.0 => return Some(0),\n   66 |                 // If the previous byte is `?`, then we found `?>`\n   67 |                 i if i > 0 && bytes[i - 1] == b'?' => return Some(i),\n   68 |                 _ => {}\n   69 |             }\n   70 |         }\n   71 |         self.0 = bytes.last().copied() == Some(b'?');\n   72 |         None\n   73 |     }","lines":12}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment for `ReadRefResult::Ref` states \"Result includes start `&`, but not end `;`.\" Both implementations of `read_ref` (slice and buffered) actually include the trailing `;` in the returned slice. In `slice_reader.rs` the `Ref` arm computes `end = i + 2` and `split_at(end)`, so the returned slice contains both `&` and `;`. In `buffered_reader.rs` it uses `used = i + 1` and `extend_from_slice(&available[..used])`, also including `;`. The consuming macro in `read_event_impl` (`&bytes[1..bytes.len() - 1]`) strips both the leading `&` and the trailing `;`, which only works correctly because `;` IS present. The test `read_ref::empty_ref` confirms `Ref(b\"&;\")` includes the `;`. The comment is therefore wrong and misleading for anyone modifying this slicing logic.","fix":"Correct the comment to: \"Result includes both the start `&` and the end `;`.\" This keeps the invariant relied on by `read_event_impl` (`&bytes[1..bytes.len()-1]`) explicit and prevents a future editor from breaking the `;`-stripping logic.","locations":[{"ref":"src/reader/mod.rs:1024-1026","code":" 1024 |     /// Contains text block up to end of reference (`;` character).\n 1025 |     /// Result includes start `&`, but not end `;`.\n 1026 |     Ref(&'r [u8]),","lines":3},{"ref":"src/reader/slice_reader.rs:304-312","code":"  304 |             Some(i) if self[i + 1] == b';' => {\n  305 |                 // +1 for the start `&`\n  306 |                 // +1 for the end `;`\n  307 |                 let end = i + 2;\n  308 |                 let (bytes, rest) = self.split_at(end);\n  309 |                 *self = rest;\n  310 |                 *position += end as u64;\n  311 | \n  312 |                 ReadRefResult::Ref(bytes)","lines":9},{"ref":"src/reader/buffered_reader.rs:147-157","code":"  147 |                     Some(i) if available[i] == b';' => {\n  148 |                         // +1 -- skip the end `;`\n  149 |                         let used = i + 1;\n  150 | \n  151 |                         buf.extend_from_slice(&available[..used]);\n  152 |                         self $(.$reader)? .consume(used);\n  153 |                         read += used as u64;\n  154 | \n  155 |                         *position += read;\n  156 | \n  157 |                         return ReadRefResult::Ref(&buf[start..]);","lines":11}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"`Serializer::set_quote_level` doc comment states `Default: [\\`QuoteLevel::Minimal\\`]`, but both\nconstructors (`Serializer::new` at mod.rs:588 and `Serializer::with_root` at mod.rs:653) initialize\n`level: QuoteLevel::Partial`. The documented default contradicts the actual default, which can\nmislead users about which characters are escaped when they do not call `set_quote_level`.","fix":"Change the doc comment to `Default: [\\`QuoteLevel::Partial\\`]` to match the value used in\n`Serializer::new` and `Serializer::with_root`.","locations":[{"ref":"src/se/mod.rs:799-805","code":"  799 |     /// Set the level of quoting used when writing texts\n  800 |     ///\n  801 |     /// Default: [`QuoteLevel::Minimal`]\n  802 |     pub fn set_quote_level(&mut self, level: QuoteLevel) -> &mut Self {\n  803 |         self.ser.level = level;\n  804 |         self\n  805 |     }","lines":7},{"ref":"src/se/mod.rs:586-594","code":"  586 |                 level: QuoteLevel::Partial,\n  587 |                 indent: Indent::None,\n  588 |                 write_indent: false,\n  589 |                 text_format: TextFormat::Text,\n  590 |                 allow_primitive: true,\n  591 |                 empty_element_handling: EmptyElementHandling::SelfClosed,\n  592 |             },\n  593 |             root_tag: None,\n  594 |         }","lines":9},{"ref":"src/se/mod.rs:651-659","code":"  651 |             ser: ContentSerializer {\n  652 |                 writer,\n  653 |                 level: QuoteLevel::Partial,\n  654 |                 indent: Indent::None,\n  655 |                 write_indent: false,\n  656 |                 text_format: TextFormat::Text,\n  657 |                 allow_primitive: true,\n  658 |                 empty_element_handling: EmptyElementHandling::SelfClosed,\n  659 |             },","lines":9}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The `// SAFETY:` comment prefix is used throughout these modules on `unreachable!()` arms in\nordinary safe code (no `unsafe` blocks involved). `SAFETY:` has a specific, established meaning in\nRust (it documents the invariants that make an adjacent `unsafe` operation sound). Using it for\nplain logic invariants is misleading - a reader auditing `unsafe` usage will get false hits, and\nit dilutes the convention. Examples include map.rs (`SAFETY: We set \\`Text\\` only when we seen\n\\`Text\\``) and var.rs.","fix":"Rename these comments from `SAFETY:` to something like `INVARIANT:` or `NOTE:`, reserving\n`SAFETY:` strictly for documenting genuine `unsafe` preconditions.","locations":[{"ref":"src/de/map.rs:361-362","code":"  361 |                 // SAFETY: We set `Text` only when we seen `Text`\n  362 |                 _ => unreachable!(),","lines":2},{"ref":"src/de/map.rs:616-619","code":"  616 |                 // only from the `ElementMapAccess::next_value_seed` and only when we\n  617 |                 // peeked `Start` event\n  618 |                 _ => unreachable!(),\n  619 |             }","lines":4},{"ref":"src/de/var.rs:89-90","code":"   89 |             // SAFETY: the other events are filtered in `variant_seed()`\n   90 |             _ => unreachable!(\"Only `Start` or `Text` events are possible here\"),","lines":2},{"ref":"src/de/mod.rs:2422-2425","code":" 2422 |                 // SAFETY: current_event_is_last_text checks that event is Text, CData, GeneralRef, or DocType\n 2423 |                 _ => unreachable!(\n 2424 |                     \"Only `Text`, `CData`, `GeneralRef` or `DocType` events can come here\"\n 2425 |                 ),","lines":4}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Doc comment in `MapValueDeserializer` shows the example XML as `<tag>42<tag>` and `<tag>...<tag>`\n(opening tag used as the closing tag) instead of `<tag>42<\/tag>` / `<tag>...<\/tag>`. The same\nmalformed-closing-tag typo appears in the `deserialize_seq`-related doc block. Misleading for\nreaders trying to understand the supported shapes.","fix":"Correct the example closing tags to `<\/tag>`.","locations":[{"ref":"src/de/map.rs:474-487","code":"  474 |     /// ```xml\n  475 |     /// <tag>42<tag>\n  476 |     /// ```\n  477 |     ///\n  478 |     /// could be deserialized into `42usize` without problems, and at the same time\n  479 |     ///\n  480 |     /// ```xml\n  481 |     /// <tag>\n  482 |     ///   <key1/>\n  483 |     ///   <key2/>\n  484 |     ///   <!--...-->\n  485 |     /// <tag>\n  486 |     /// ```\n  487 |     /// could be deserialized to a struct.","lines":14}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment on the `InsideRef` parse state says \"After generating one event the reader moves to the `ClosedTag` state.\" There is no `ClosedTag` variant in `ParseState` (the variants are `Init`, `InsideRef`, `InsideMarkup`, `InsideText`, `InsideEmpty`, `Done`). The `InsideRef` arm in `read_event_impl` actually transitions to `ParseState::InsideText`. The comment references a renamed/removed state name and is stale.","fix":"Replace \"moves to the `ClosedTag` state\" with \"moves to the `InsideText` state\" to match the actual transition performed in the `InsideRef` arm of `read_event_impl`.","locations":[{"ref":"src/reader/mod.rs:577-581","code":"  577 |     /// State after seeing the `&` symbol in textual content. Depending on the next symbol all other\n  578 |     /// events could be generated.\n  579 |     ///\n  580 |     /// After generating one event the reader moves to the `ClosedTag` state.\n  581 |     InsideRef,","lines":5}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Typos in doc comments: `expand_empty_elements` says \"historycally\" (should be \"historically\"),\nand several comments throughout the module say \"do not known\" / \"we do not known\" (should be\n\"do not know\"), e.g. in `serialize_none`. These are user-facing rustdoc strings.","fix":"Fix spelling: \"historycally\" -> \"historically\"; \"do not known\" -> \"do not know\".","locations":[{"ref":"src/se/mod.rs:722-723","code":"  722 |     /// This is the historycally first way to configure empty element handling. You can use\n  723 |     /// [`empty_element_handling`](Self::empty_element_handling) for more control.","lines":2},{"ref":"src/se/mod.rs:874-878","code":"  874 |         // Do not write indent after `Option` field with `None` value, because\n  875 |         // this can be `Option<String>`. Unfortunately, we do not known what the\n  876 |         // type \n  342 | }","lines":18}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","description":"`escape_item` and `escape_list` are almost identical functions. Each contains 7 nearly-identical\n`match (target, level)` arms with hand-written closures. The only structural difference between the\ntwo functions is that `escape_item` additionally treats the whitespace bytes (` `, `\\r`, `\\n`, `\\t`)\nas characters to escape (because they are `xs:list` item delimiters) and emits a different CDATA\nframing. Everything else (the `&`, `<`, `>`, `'`, `\"` handling per `QuoteTarget`/`QuoteLevel`) is\ncopy-pasted between the two. That is ~150 lines of duplicated escape tables. A change to escaping\nrules (e.g. a new QuoteLevel or a fix to one arm) must be made in 14 places and it is easy to update\none function but forget the other. This should be refactored so the per-character escape predicate is\nbuilt from a shared table plus an `escape_whitespace: bool` flag, with CDATA framing handled\nseparately.","fix":"Extract a single helper that takes the `target`, `level`, and a boolean `escape_whitespace`, and\nbuilds one predicate closure (combining a shared `is_required(ch, target, level)` test with the\noptional whitespace test). Implement `escape_item` and `escape_list` as thin wrappers that pass\n`true`/`false` for `escape_whitespace` and supply the appropriate CDATA framing.","locations":[{"ref":"src/se/simple_type.rs:48-196","code":"   48 | /// Escapes atomic value that could be part of a `xs:list`. All whitespace characters\n   49 | /// additionally escaped\n   50 | fn escape_item<W>(mut writer: W, value: &str, target: QuoteTarget, level: QuoteLevel) -> fmt::Result\n   51 | where\n   52 |     W: Write,\n   53 | {\n   54 |     use QuoteLevel::*;\n   55 |     use QuoteTarget::*;\n   56 | \n   57 |     match (target, level) {\n   58 |         (CData, _) => {\n   59 |             let mut it = CDataIterator::new(value);\n   60 |             if let Some(part) = it.next() {\n   61 |                 writer.write_str(part)?;\n   62 |             }\n   63 |             for part in it {\n   64 |                 writer.write_str(\"]]><![CDATA[\")?;\n   65 |                 writer.write_str(part)?;\n   66 |             }\n   67 |             Ok(())\n   68 |         }\n   69 |         (_, Full) => escape_into(writer, value, |ch| match ch {\n   70 |             // Spaces used as delimiters of list items, cannot be used in the item\n   71 |             b' ' | b'\\r' | b'\\n' | b'\\t' => true,\n   72 |             // Required characters to escape\n   73 |             b'&' | b'<' | b'>' | b'\\'' | b'\\\"' => true,\n   74 |             _ => false,\n   75 |         }),\n   76 |         //----------------------------------------------------------------------\n   77 |         (Text, Partial) => escape_into(writer, value, |ch| match ch {\n   78 |             // Spaces used as delimiters of list items, cannot be used in the item\n   79 |             b' ' | b'\\r' | b'\\n' | b'\\t' => true,\n   80 |             // Required characters to escape\n   81 |             b'&' | b'<' | b'>' => true,\n   82 |             _ => false,\n   83 |         }),\n   84 |         (Text, Minimal) => escape_into(writer, value, |ch| match ch {\n   85 |             // Spaces used as delimiters of list items, cannot be used in the item\n   86 |             b' ' | b'\\r' | b'\\n' | b'\\t' => true,\n   87 |             // Required characters to escape\n   88 |             b'&' | b'<' => true,\n   89 |             _ => false,\n   90 |         }),\n   91 |         //----------------------------------------------------------------------\n   92 |         (DoubleQAttr, Partial) => escape_into(writer, value, |ch| match ch {\n   93 |             // Spaces used as delimiters of list items, cannot be used in the item\n   94 |             b' ' | b'\\r' | b'\\n' | b'\\t' => true,\n   95 |             // Required characters to escape\n   96 |             b'&' | b'<' | b'>' => true,\n   97 |             // Double quoted attribute should escape quote\n   98 |             b'\"' => true,\n   99 |             _ => false,\n  100 |         }),\n  101 |         (DoubleQAttr, Minimal) => escape_into(writer, value, |ch| match ch {\n  102 |             // Spaces used as delimiters of list items, cannot be used in the item\n  103 |             b' ' | b'\\r' | b'\\n' | b'\\t' => true,\n  104 |             // Required characters to escape\n  105 |             b'&' | b'<' => true,\n  106 |             // Double quoted attribute should escape quote\n  107 |             b'\"' => true,\n  108 |             _ => false,\n  109 |         }),\n  110 |         //----------------------------------------------------------------------\n  111 |         (SingleQAttr, Partial) => escape_into(writer, value, |ch| match ch {\n  112 |             // Spaces used as delimiters of list items\n  113 |             b' ' | b'\\r' | b'\\n' | b'\\t' => true,\n  114 |             // Required characters to escape\n  115 |             b'&' | b'<' | b'>' => true,\n  116 |             // Single quoted attribute should escape quote\n  117 |             b'\\'' => true,\n  118 |             _ => false,\n  119 |         }),\n  120 |         (SingleQAttr, Minimal) => escape_into(writer, value, |ch| match ch {\n  121 |             // Spaces used as delimiters of list items\n  122 |             b' ' | b'\\r' | b'\\n' | b'\\t' => true,\n  123 |             // Required characters to escape\n  124 |             b'&' | b'<' => true,\n  125 |             // Single quoted attribute should escape quote\n  126 |             b'\\'' => true,\n  127 |             _ => false,\n  128 |         }),\n  129 |     }\n  130 | }\n  131 | \n  132 | /// Escapes XSD simple type value\n  133 | fn escape_list<W>(mut writer: W, value: &str, target: QuoteTarget, level: QuoteLevel) -> fmt::Result\n  134 | where\n  135 |     W: Write,\n  136 | {\n  137 |     use QuoteLevel::*;\n  138 |     use QuoteTarget::*;\n  139 | \n  140 |     match (target, level) {\n  141 |         (CData, _) => {\n  142 |             for part in CDataIterator::new(value) {\n  143 |                 writer.write_str(\"<![CDATA[\")?;\n  144 |                 writer.write_str(part)?;\n  145 |                 writer.write_str(\"]]>\")?;\n  146 |             }\n  147 |             Ok(())\n  148 |         }\n  149 |         (_, Full) => escape_into(writer, value, |ch| match ch {\n  150 |             // Required characters to escape\n  151 |             b'&' | b'<' | b'>' | b'\\'' | b'\\\"' => true,\n  152 |             _ => false,\n  153 |         }),\n  154 |         //----------------------------------------------------------------------\n  155 |         (Text, Partial) => escape_into(writer, value, |ch| match ch {\n  156 |             // Required characters to escape\n  157 |             b'&' | b'<' | b'>' => true,\n  158 |             _ => false,\n  159 |         }),\n  160 |         (Text, Minimal) => escape_into(writer, value, |ch| match ch {\n  161 |             // Required characters to escape\n  162 |             b'&' | b'<' => true,\n  163 |             _ => false,\n  164 |         }),\n  165 |         //----------------------------------------------------------------------\n  166 |         (DoubleQAttr, Partial) => escape_into(writer, value, |ch| match ch {\n  167 |             // Required characters to escape\n  168 |             b'&' | b'<' | b'>' => true,\n  169 |             // Double quoted attribute should escape quote\n  170 |             b'\"' => true,\n  171 |             _ => false,\n  172 |         }),\n  173 |         (DoubleQAttr, Minimal) => escape_into(writer, value, |ch| match ch {\n  174 |             // Required characters to escape\n  175 |             b'&' | b'<' => true,\n  176 |             // Double quoted attribute should escape quote\n  177 |             b'\"' => true,\n  178 |             _ => false,\n  179 |         }),\n  180 |         //-----------------     // usize (because otherwise we panic at appending to the buffer before that point)\n  271 |         let end = start + len as usize;\n  272 | \n  273 |         Ok(BytesText::wrap(&buf[start..end], self.decoder()))\n  274 |     }","lines":17},{"ref":"src/reader/ns_reader.rs:347-435","code":"  347 |     pub fn read_to_end_into(&mut self, end: QName, buf: &mut Vec<u8>) -> Result<Span> {\n  348 |         // According to the https://www.w3.org/TR/xml11/#dt-etag, end name should\n  349 |         // match literally the start name. See `Config::check_end_names` documentation\n  350 |         let result = self.reader.read_to_end_into(end, buf)?;\n  351 |         // read_to_end_into will consume closing tag. Because nobody can access to its\n  352 |         // content anymore, we directly pop namespace of the opening tag\n  353 |         self.ns_resolver.pop();\n  354 |         Ok(result)\n  355 |     }\n  356 | \n  357 |     /// Reads content between start and end tags, including any markup using\n  358 |     /// provided buffer as intermediate storage for events content. This function\n  359 |     /// is supposed to be called after you already read a [`Start`] event.\n  360 |     ///\n  361 |     /// Manages nested cases where parent and child elements have the _literally_\n  362 |     /// same name.\n  363 |     ///\n  364 |     /// This method does not unescape read data, instead it returns content\n  365 |     /// \"as is\" of the XML document. This is because it has no idea what text\n  366 |     /// it reads, and if, for example, it contains CDATA section, attempt to\n  367 |     /// unescape it content will spoil data.\n  368 |     ///\n  369 |     /// If your reader created from a string slice or byte array slice, it is\n  370 |     /// better to use [`read_text()`] method, because it will not copy bytes\n  371 |     /// into intermediate buffer.\n  372 |     ///\n  373 |     /// # Examples\n  374 |     ///\n  375 |     /// This example shows, how you can read a HTML content from your XML document.\n  376 |     ///\n  377 |     /// ```\n  378 |     /// # use pretty_assertions::assert_eq;\n  379 |     /// # use std::borrow::Cow;\n  380 |     /// use quick_xml::events::{BytesStart, Event};\n  381 |     /// use quick_xml::reader::NsReader;\n  382 |     ///\n  383 |     /// let mut reader = NsReader::from_reader(\"\n  384 |     ///     <html>\n  385 |     ///         <title>This is a HTML text<\/title>\n  386 |     ///         <p>Usual XML rules does not apply inside it\n  387 |     ///         <p>For example, elements not needed to be &quot;closed&quot;\n  388 |     ///     <\/html>\n  389 |     /// \".as_bytes());\n  390 |     /// reader.config_mut().trim_text(true);\n  391 |     ///\n  392 |     /// let start = BytesStart::new(\"html\");\n  393 |     /// let end   = start.to_end().into_owned();\n  394 |     ///\n  395 |     /// let mut buf = Vec::new();\n  396 |     ///\n  397 |     /// // First, we read a start event...\n  398 |     /// assert_eq!(reader.read_event_into(&mut buf).unwrap(), Event::Start(start));\n  399 |     /// // ...and disable checking of end names because we expect HTML further...\n  400 |     /// reader.config_mut().check_end_names = false;\n  401 |     ///\n  402 |     /// // ...then, we could read text content until close tag.\n  403 |     /// // This call will correctly handle nested <html> elements.\n  404 |     /// let text = reader.read_text_into(end.name(), &mut buf).unwrap();\n  405 |     /// let text = text.decode().unwrap();\n  406 |     /// assert_eq!(text, r#\"\n  407 |     ///         <title>This is a HTML text<\/title>\n  408 |     ///         <p>Usual XML rules does not apply inside it\n  409 |     ///         <p>For example, elements not needed to be &quot;closed&quot;\n  410 |     ///     \"#);\n  411 |     /// assert!(matches!(text, Cow::Borrowed(_)));\n  412 |     ///\n  413 |     /// // Now we can enable checks again\n  414 |     /// reader.config_mut().check_end_names = true;\n  415 |     ///\n  416 |     /// // At the end we should get an Eof event, because we ate the whole XML\n  417 |     /// assert_eq!(reader.read_event_into(&mut buf).unwrap(), Event::Eof);\n  418 |     /// ```\n  419 |     ///\n  420 |     /// [`Start`]: Event::Start\n  421 |     /// [`read_text()`]: Self::read_text()\n  422 |     #[inline]\n  423 |     pub fn read_text_into<'b>(\n  424 |         &mut self,\n  425 |         end: QName,\n  426 |         buf: &'b mut Vec<u8>,\n  427 |     ) -> Result<BytesText<'b>> {\n  428 |         // According to the https://www.w3.org/TR/xml11/#dt-etag, end name should\n  429 |         // match literally the start name. See `Self::check_end_names` documentation\n  430 |         let result = self.reader.read_text_into(end, buf)?;\n  431 |         // read_text_into will consume closing tag. Because nobody can access to its\n  432 |         // content anymore, we directly pop namespace of the opening tag\n  433 |         self.ns_resolver.pop();\n  434 |         Ok(result)\n  435 |     }","lines":89}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","description":"`SimpleTypeDeserializer::content` (used for attribute values) hardcodes\n`resolve_predefined_entity` when calling `normalize_attribute_value`, ignoring any custom\n`EntityResolver` configured on the `Deserializer`. The same applies to\n`attributes::AttributesDeserializer::next_value_seed` which builds a `SimpleTypeDeserializer` with\nno resolver hook at all. Consequence: custom DTD-declared entities that resolve fine inside\nelement text content (via `XmlReader::resolve_reference` / `entity_resolver`) are NOT resolved\ninside attribute values and will produce an `UnrecognizedEntity` error. This asymmetry between\ntext and attribute entity handling is undocumented at these call sites and is surprising given the\ncrate supports custom entity resolvers.","fix":"Either thread the configured `EntityResolver` through to attribute-value normalization so custom\nentities resolve consistently in attributes and text, or explicitly document (at the\n`SimpleTypeDeserializer::from_attr` / `into_map_access` API and in the resolver docs) that custom\nentities are only honored in text content, not in attribute values.","locations":[{"ref":"src/de/simple_type.rs:583-595","code":"  583 |     fn content<'b>(&'b self) -> Result<CowRef<'de, 'b, str>, DeError> {\n  584 |         let content = self.decode()?;\n  585 |         if self.is_attr {\n  586 |             let value =\n  587 |                 self.version\n  588 |                     .normalize_attribute_value(&content, 128, resolve_predefined_entity)?;\n  589 |             return Ok(match value {\n  590 |                 Cow::Borrowed(_) => content,\n  591 |                 Cow::Owned(value) => CowRef::Owned(value),\n  592 |             });\n  593 |         }\n  594 |         Ok(content)\n  595 |     }","lines":13},{"ref":"src/de/attributes.rs:150-166","code":"  150 |     fn next_value_seed<V>(&mut self, seed: V) -> Result<V::Value, Self::Error>\n  151 |     where\n  152 |         V: DeserializeSeed<'de>,\n  153 |     {\n  154 |         match self.value.take() {\n  155 |             Some(value) => {\n  156 |                 let de = SimpleTypeDeserializer::from_attr(\n  157 |                     &value,\n  158 |                     0..value.len(),\n  159 |                     self.version,\n  160 |                     self.iter.decoder(),\n  161 |                 );\n  162 |                 seed.deserialize(de)\n  163 |             }\n  164 |             None => Err(DeError::KeyNotRead),\n  165 |         }\n  166 |     }","lines":17}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","description":"`parse_number` only rejects the NUL codepoint (`0x0`) as an illegal XML character; every other codepoint accepted by `char::from_u32` is allowed. XML 1.0/1.1 forbid most C0 control characters in content (only #x9, #xA, #xD are legal in XML 1.0; XML 1.1 additionally restricts the C1 range), so character references such as `&#x1;`, `&#xB;`, `&#xC;`, `&#x1F;` are accepted and expanded even though they are not permitted XML characters. The doc on `ParseCharRefError::IllegalCharacter` already admits \"Currently, only 0x0 character produces this error\", so this is a known gap rather than an oversight, but it means the unescaper can emit characters that are not valid in well-formed XML.","fix":"Extend the illegal-character check in `parse_number` to reject codepoints that are not Char productions for the targeted XML version (e.g. control chars below 0x20 other than 0x9/0xA/0xD, plus the noncharacters/surrogate ranges already handled by char::from_u32). If version-specific behavior is needed, thread the XML version into the function. At minimum document the accepted set.","locations":[{"ref":"src/escape.rs:2349-2362","code":" 2349 | pub(crate) fn parse_number(num: &str) -> Result<char, ParseCharRefError> {\n 2350 |     let code = if let Some(hex) = num.strip_prefix('x') {\n 2351 |         from_str_radix(hex, 16)?\n 2352 |     } else {\n 2353 |         from_str_radix(num, 10)?\n 2354 |     };\n 2355 |     if code == 0 {\n 2356 |         return Err(ParseCharRefError::IllegalCharacter(code));\n 2357 |     }\n 2358 |     match std::char::from_u32(code) {\n 2359 |         Some(c) => Ok(c),\n 2360 |         None => Err(ParseCharRefError::InvalidCodepoint(code)),\n 2361 |     }\n 2362 | }","lines":14}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"negligible","description":"Asymmetry in end-sequence detection between `BangType::Comment` and `BangType::CData` in `feed`. The `Comment` branch guards every candidate `>` with `buf.len() + i > 5` to require a minimally sized comment, but the `CData` branch has no analogous minimum-length guard and relies solely on the `]]` suffix check. While analysis shows the `]]` check makes a too-short match impossible in practice (so this is not a bug), the inconsistency is easy to misread when auditing the hot bang-element loop and would benefit from a clarifying comment.","fix":"Add a brief comment to the `CData` arm explaining why no explicit minimum-length guard is needed (the `]]` / split-`]` checks already require at least `<![CDATA[]]>` worth of preceding bytes), mirroring the documented reasoning in the `Comment` arm.","locations":[{"ref":"src/reader/mod.rs:1172-1216","code":" 1172 |     fn feed(&mut self, buf: &[u8], chunk: &[u8]) -> Option<usize> {\n 1173 |         match self {\n 1174 |             Self::Comment => {\n 1175 |                 for i in memchr::memchr_iter(b'>', chunk) {\n 1176 |                     // Need to read at least 6 symbols (`!---->`) for properly finished comment\n 1177 |                     // <!----> - XML comment\n 1178 |                     // 0123456 - i\n 1179 |                     if buf.len() + i > 5 {\n 1180 |                         if chunk[..i].ends_with(b\"--\") {\n 1181 |                             // We cannot strip last `--` from the buffer because we need it in case of\n 1182 |                             // check_comments enabled option. XML standard requires that comment\n 1183 |                             // will not end with `--->` sequence because this is a special case of\n 1184 |                             // `--` in the comment (https://www.w3.org/TR/xml11/#sec-comments)\n 1185 |                             return Some(i);\n 1186 |                         }\n 1187 |                         // End sequence `-|->` was splitted at |\n 1188 |                         //        buf --/   \\-- chunk\n 1189 |                         if i == 1 && buf.ends_with(b\"-\") && chunk[0] == b'-' {\n 1190 |                             return Some(i);\n 1191 |                         }\n 1192 |                         // End sequence `--|>` was splitted at |\n 1193 |                         //         buf --/   \\-- chunk\n 1194 |                         if i == 0 && buf.ends_with(b\"--\") {\n 1195 |                             return Some(i);\n 1196 |                         }\n 1197 |                     }\n 1198 |                 }\n 1199 |             }\n 1200 |             Self::CData => {\n 1201 |                 for i in memchr::memchr_iter(b'>', chunk) {\n 1202 |                     if chunk[..i].ends_with(b\"]]\") {\n 1203 |                         return Some(i);\n 1204 |                     }\n 1205 |                     // End sequence `]|]>` was splitted at |\n 1206 |                     //        buf --/   \\-- chunk\n 1207 |                     if i == 1 && buf.ends_with(b\"]\") && chunk[0] == b']' {\n 1208 |                         return Some(i);\n 1209 |                     }\n 1210 |                     // End sequence `]]|>` was splitted at |\n 1211 |                     //         buf --/   \\-- chunk\n 1212 |                     if i == 0 && buf.ends_with(b\"]]\") {\n 1213 |                         return Some(i);\n 1214 |                     }\n 1215 |                 }\n 1216 |             }","lines":45}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"negligible","description":"`AtomicSerializer::serialize_str` calls `self.write_delimiter()?` and then `escape_item(...)` directly,\nduplicating the delimiter-then-write pattern that the `write_str` helper (simple_type.rs:246-249)\nalready provides, but it cannot reuse `write_str` because that helper does not escape. The result is\nthat the delimiter-writing logic exists in two slightly different forms within the same impl\n(`write_str`/`write_fmt` vs. the inline path in `serialize_str`). Not a bug, but a small consistency\nwart that makes it easy to forget the delimiter in a future code path.","fix":"Consider routing the escaped-string path through a single place that always emits the delimiter first\n(e.g. have `serialize_str` call `self.write_delimiter()?` only via a shared helper), to keep the\ndelimiter invariant in one location.","locations":[{"ref":"src/se/simple_type.rs:293-299","code":"  293 |     fn serialize_str(mut self, value: &str) -> Result<Self::Ok, Self::Error> {\n  294 |         if !value.is_empty() {\n  295 |             self.write_delimiter()?;\n  296 |             escape_item(self.writer, value, self.target, self.level)?;\n  297 |         }\n  298 |         Ok(!value.is_empty())\n  299 |     }","lines":7},{"ref":"src/se/simple_type.rs:238-253","code":"  238 | impl<W: Write> AtomicSerializer<W> {\n  239 |     fn write_delimiter(&mut self) -> fmt::Result {\n  240 |         if self.write_delimiter {\n  241 |             // TODO: Customization point -- possible non-XML compatible extension to specify delimiter char\n  242 |             return self.writer.write_char(' ');\n  243 |         }\n  244 |         Ok(())\n  245 |     }\n  246 |     fn write_str(&mut self, value: &str) -> Result<(), SeError> {\n  247 |         self.write_delimiter()?;\n  248 |         Ok(self.writer.write_str(value)?)\n  249 |     }\n  250 |     fn write_fmt(&mut self, args: fmt::Arguments<'_>) -> Result<(), SeError> {\n  251 |         self.write_delimiter()?;\n  252 |         Ok(self.writer.write_fmt(args)?)\n  253 |     }","lines":16}]},{"id":"ARCHIT_1","type":"architecture","type_label":"Architecture","severity":"high","description":"`src/de/mod.rs` is 5067 lines and mixes many distinct responsibilities in a single file:\n(1) ~1970 lines of crate-level rustdoc documentation (the entire XML<->Rust mapping guide),\n(2) the `deserialize_primitives!`/`forward_to_simple_type!` macros,\n(3) the `Text` type and its trimming logic,\n(4) the `DeEvent`/`PayloadEvent` event model,\n(5) the `XmlReader` intermediate text-draining/entity-resolving layer,\n(6) the public `Deserializer` type with the overlapped-lists skip/replay machinery,\n(7) the `serde::Deserializer`/`SeqAccess` impls,\n(8) the `XmlRead` trait plus the `IoReader` and `SliceReader` source implementations,\n(9) the public `from_str`/`from_reader` entry points.\nThe remaining sibling modules (`map.rs`
