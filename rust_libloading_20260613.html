<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"os::unix::Library::this() uses .expect() internally, which will panic if dlopen(NULL, ...) ever returns an error. While POSIX guarantees this call succeeds, non-conformant implementations exist (e.g. musl under certain configurations), and panicking in library code is generally wrong - callers have no way to handle it. The Windows equivalent (os::windows::Library::this) correctly returns Result<Library, Error>.","fix":"Change the signature to pub fn this() -> Result<Library, crate::Error> and return the Result directly, mirroring the Windows implementation. Update call sites (only internal) accordingly.","locations":[{"ref":"src/os/unix/mod.rs:148-153","code":"  148 |         unsafe {\n  149 |             // SAFE: this does not load any new shared library images, no danger in it executing\n  150 |             // initialiser routines.\n  151 |             Library::open_char_ptr(null(), RTLD_LAZY | RTLD_LOCAL).expect(\"this should never fail\")\n  152 |         }\n  153 |     }","lines":6}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"Library::pin() calls GetModuleHandleExW with GET_MODULE_HANDLE_EX_FLAG_PIN but without GET_MODULE_HANDLE_EX_FLAG_UNCHANGED_REFCOUNT (which cannot be combined with PIN per MSDN). This means every successful call increments the module reference count by 1, and the returned handle stored in the local `handle` variable is never passed to FreeLibrary. The refcount is thus permanently inflated by one per call. Practical impact is low because the pinned module cannot be unloaded anyway, but it violates the API contract.","fix":"After the with_get_last_error call succeeds, call FreeLibrary(handle) to balance the reference count acquired by GetModuleHandleExW. Alternatively, restructure so the handle is stored in a guard that calls FreeLibrary on drop.","locations":[{"ref":"src/os/windows/mod.rs:189-217","code":"  189 |     pub fn pin(&self) -> Result<(), crate::Error> {\n  190 |         const GET_MODULE_HANDLE_EX_FLAG_PIN: u32 = 0x1;\n  191 |         const GET_MODULE_HANDLE_EX_FLAG_FROM_ADDRESS: u32 = 0x4;\n  192 |         unsafe {\n  193 |             let mut handle: HMODULE = 0;\n  194 |             with_get_last_error(\n  195 |                 |source| crate::Error::GetModuleHandleExW { source },\n  196 |                 || {\n  197 |                     // Make sure no winapi calls as a result of drop happen inside this closure, because\n  198 |                     // otherwise that might change the return value of the GetLastError.\n  199 | \n  200 |                     // We use our cached module handle of this `Library` instead of the module name. This works\n  201 |                     // if we also pass the flag `GET_MODULE_HANDLE_EX_FLAG_FROM_ADDRESS` because on Windows, module handles\n  202 |                     // are the loaded base address of the module.\n  203 |                     let result = GetModuleHandleExW(\n  204 |                         GET_MODULE_HANDLE_EX_FLAG_PIN | GET_MODULE_HANDLE_EX_FLAG_FROM_ADDRESS,\n  205 |                         self.0 as *const u16,\n  206 |                         &mut handle,\n  207 |                     );\n  208 |                     if result == 0 {\n  209 |                         None\n  210 |                     } else {\n  211 |                         Some(())\n  212 |                     }\n  213 |                 },\n  214 |             )\n  215 |             .map_err(|e| e.unwrap_or(crate::Error::GetModuleHandleExWUnknown))\n  216 |         }\n  217 |     }","lines":29}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the Debug impl for the Windows Library, GetModuleFileNameW is called with a fixed buffer of 1024 u16 units. MSDN documents that when the buffer is too small the function returns exactly nSize (1024 here) rather than 0. The code only checks for 0 (failure), so a path longer than 1023 UTF-16 code units is silently truncated and the truncated string is used in the Debug output without any indication of truncation. Windows paths can be up to 32767 characters when long-path support is enabled.","fix":"After the GetModuleFileNameW call, also check if len == 1024 and emit a fallback format (e.g. Library@{:#x} from <path truncated>) or use a dynamically sized buffer that grows until the returned length is less than the buffer size.","locations":[{"ref":"src/os/windows/mod.rs:330-343","code":"  330 |     fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n  331 |         unsafe {\n  332 |             // FIXME: use Maybeuninit::uninit_array when stable\n  333 |             let mut buf = mem::MaybeUninit::<[mem::MaybeUninit<u16>; 1024]>::uninit().assume_init();\n  334 |             let len = GetModuleFileNameW(self.0, buf[..].as_mut_ptr().cast(), 1024) as usize;\n  335 |             if len == 0 {\n  336 |                 f.write_fmt(format_args!(\"Library@{:#x}\", self.0))\n  337 |             } else {\n  338 |                 let string: std::ffi::OsString = std::os::windows::ffi::OsStringExt::from_wide(\n  339 |                     // FIXME: use Maybeuninit::slice_get_ref when stable\n  340 |                     &*(&buf[..len] as *const [_] as *const [u16]),\n  341 |                 );\n  342 |                 f.write_fmt(format_args!(\"Library@{:#x} from {:?}\", self.0, string))\n  343 |             }","lines":14}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In the Debug impl for the Windows Library, the buffer length 1024 appears as a magic number in two separate places: once as the generic const in the MaybeUninit array type and once as the explicit argument to GetModuleFileNameW. If the array size is ever changed, the API argument must also be updated manually; forgetting to do so would cause GetModuleFileNameW to write past the actual buffer.","fix":"Replace the hardcoded 1024 in the GetModuleFileNameW call with buf.len() as DWORD so the size is derived from the array at compile time.","locations":[{"ref":"src/os/windows/mod.rs:333-334","code":"  333 |             let mut buf = mem::MaybeUninit::<[mem::MaybeUninit<u16>; 1024]>::uninit().assume_init();\n  334 |             let len = GetModuleFileNameW(self.0, buf[..].as_mut_ptr().cast(), 1024) as usize;","lines":2}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The Display message for Error::GetModuleHandleExWUnknown reads \"GetModuleHandleExWUnknown failed, but system did not report the error\". The word \"Unknown\" is part of the Rust variant name, not part of the Windows API name. Every other *Unknown variant correctly names just the API (e.g. \"LoadLibraryExW failed, ...\", \"FreeLibrary failed, ...\"), making this one inconsistent and confusing to users reading the error message.","fix":"Change the message to \"GetModuleHandleExW failed, but system did not report the error\" to match the naming pattern used by all other *Unknown variants.","locations":[{"ref":"src/error.rs:148-151","code":"  148 |             GetModuleHandleExWUnknown => write!(\n  149 |                 f,\n  150 |                 \"GetModuleHandleExWUnknown failed, but system did not report the error\"\n  151 |             ),","lines":4}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Two FIXME comments in the Windows Library Debug impl say MaybeUninit::uninit_array and MaybeUninit::slice_get_ref are not yet stable. Both are now stable: MaybeUninit::uninit_array since Rust 1.82.0 and MaybeUninit::slice_assume_init_ref (the replacement for slice_get_ref) since Rust 1.84.0. The crate MSRV is 1.88.0, so both APIs are available unconditionally. The code continues to use the workaround pattern unnecessarily.","fix":"Replace line 333 with: let mut buf = mem::MaybeUninit::<u16>::uninit_array::<1024>(); and replace the unsafe pointer cast in lines 339-340 with: mem::MaybeUninit::slice_assume_init_ref(&buf[..len]). Remove both FIXME comments.","locations":[{"ref":"src/os/windows/mod.rs:332-333","code":"  332 |             // FIXME: use Maybeuninit::uninit_array when stable\n  333 |             let mut buf = mem::MaybeUninit::<[mem::MaybeUninit<u16>; 1024]>::uninit().assume_init();","lines":2},{"ref":"src/os/windows/mod.rs:339-340","code":"  339 |                     // FIXME: use Maybeuninit::slice_get_ref when stable\n  340 |                     &*(&buf[..len] as *const [_] as *const [u16]),","lines":2}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Changelog entry for release 0.8.8 contains a typo: 'os::window::Library::pin' is missing the trailing 's' - the correct module path is os::windows::Library::pin.","fix":"Change 'os::window::Library::pin' to 'os::windows::Library::pin'.","locations":[{"ref":"src/changelog.rs:47","code":"   47 | ///","lines":1}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"In the changelog entry for release 0.7.0, the link definition for the text [os::unix::Library::open] points to crate::os::unix::Library::new instead of crate::os::unix::Library::open. The function actually exists as Library::open (line 172 of src/os/unix/mod.rs), so the link target is simply wrong.","fix":"Change the link target from crate::os::unix::Library::new to crate::os::unix::Library::open.","locations":[{"ref":"src/changelog.rs:247","code":"  247 | /// [`os::unix::Library::open`]: crate::os::unix::Library::new","lines":1}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment on line 198 of src/os/unix/mod.rs inside open_char_ptr says \"ensure filename lives until dlopen completes\". However, `filename` is a *const c_char - a raw pointer with Copy semantics. Capturing it via `move ||` only copies the pointer value; it does not extend the lifetime of the data it points to. The actual lifetime guarantee comes from the posix_filename callback pattern in AsFilename impls, not from this move closure.","fix":"Remove the misleading comment. If documentation is desired, note that the data lifetime is guaranteed by the caller through the posix_filename callback convention.","locations":[{"ref":"src/os/unix/mod.rs:195-199","code":"  195 |                 // ensure filename lives until dlopen completes\n  196 |                 if result.is_null() {\n  197 |                     None\n  198 |                 } else {\n  199 |                     Some(Library { handle: result })","lines":5}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment for Symbol::try_as_raw_ptr in safe.rs says \"Success depends on the platform\" in the first sentence, but then immediately contradicts this with \"Currently, this fn always succeeds and returns some.\" The implementation unconditionally wraps into_raw() in Some(), so it always succeeds on all platforms. The misleading first sentence may cause callers to add unnecessary None handling.","fix":"Remove or correct the first sentence. A simple accurate doc would be: \"Convert the symbol into a raw pointer. The returned pointer is always non-null if the symbol was obtained via Library::get.\"","locations":[{"ref":"src/safe.rs:253-270","code":"  253 | \n  254 |     /// Try to convert the symbol into a raw pointer.\n  255 |     /// Success depends on the platform. Currently, this fn always succeeds and returns some.\n  256 |     ///\n  257 |     /// # Safety\n  258 |     ///\n  259 |     /// Using this function relinquishes all the lifetime guarantees. It is up to the developer to\n  260 |     /// ensure the resulting `Symbol` is not used past the lifetime of the `Library` this symbol\n  261 |     /// was loaded from.\n  262 |     pub unsafe fn try_as_raw_ptr(self) -> Option<*mut core::ffi::c_void> {\n  263 |         Some(\n  264 |             unsafe {\n  265 |                 // SAFE: the calling function has the same soundness invariants as this callee.\n  266 |                 self.into_raw()\n  267 |             }\n  268 |             .as_raw_ptr(),\n  269 |         )\n  270 |     }","lines":18}]}]</script>

<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: 'text/markdown'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
