ent to describe the actual return value (x = first.x, y = first.y, height = 1).","locations":[{"ref":"ratatui-widgets/src/table.rs:956-959","code":"  956 |     /// Returns `None` when there are no more columns for the [`Cell`] to occupy.\n  957 |     ///\n  958 |     /// Otherwise, returns `Some(Rect{x, y = 0, width, height = 0})`, representing the start\n  959 |     /// x-coordinate and width of the [`Cell`]."},{"ref":"ratatui-widgets/src/table.rs:985","code":"  985 |         Some(Rect::new(first.x, first.y, width, 1))"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The inline comment on the `--ignore-private` cargo-hack flag claims it excludes \"packages that are libraries\". `--ignore-private` actually skips packages marked `publish = false` (private packages), which has nothing to do with whether a package is a library vs a binary. The comment is misleading.","fix":"Reword the comment to: `// skip packages marked publish = false`.","locations":[{"ref":"xtask/src/commands.rs:166","code":"  166 |         \"--ignore-private\", // exclude packages that are libraries"}]},{"id":"ARCHIT_1","type":"architecture","type_label":"Architecture","severity":"low","description":"`layout.rs` is ~2926 lines and mixes many distinct responsibilities in one file:\nthe public `Layout` builder API, the `Spacing` enum and its conversions, the\nkasuari solver wiring (`configure_*` free functions), the `Element` helper type,\nrounding helpers, the strength constants module, and a very large test module.\nThis makes the core solver logic hard to navigate and review. `buffer.rs`\n(~1582 lines) similarly mixes the Buffer API, indexing, Debug formatting, and\nextensive tests.","fix":"Split the solver wiring (`configure_*`, `Element`, `changes_to_rects`,\n`strengths`) into a `layout/solver.rs` submodule, and move `Spacing` to its own\nmodule. Keep `layout.rs` focused on the public `Layout` type. Consider moving\nthe large Debug impl out of `buffer.rs`.","locations":[{"ref":"ratatui-core/src/layout/layout.rs:1-900","code":"    1 | use alloc::rc::Rc;\n    2 | use alloc::vec::Vec;\n    3 | use core::array::TryFromSliceError;\n    4 | use core::iter;\n    5 | #[cfg(feature = \"layout-cache\")]\n    6 | use core::num::NonZeroUsize;\n    7 | \n    8 | use hashbrown::HashMap;\n    9 | use itertools::Itertools;\n   10 | use kasuari::WeightedRelation::{EQ, GE, LE};\n   11 | use kasuari::{AddConstraintError, Expression, Solver, Strength, Variable};\n   12 | #[cfg(feature = \"layout-cache\")]\n   13 | use lru::LruCache;\n   14 | \n   15 | use self::strengths::{\n   16 |     ALL_SEGMENT_GROW, FILL_GROW, GROW, LENGTH_SIZE_EQ, MAX_SIZE_EQ, MAX_SIZE_LE, MIN_SIZE_EQ,\n   17 |     MIN_SIZE_GE, PERCENTAGE_SIZE_EQ, RATIO_SIZE_EQ, SPACE_GROW, SPACER_SIZE_EQ,\n   18 | };\n   19 | use crate::layout::{Constraint, Direction, Flex, Margin, Rect};\n   20 | \n   21 | type Rects = Rc<[Rect]>;\n   22 | type Segments = Rects;\n   23 | type Spacers = Rects;\n   24 | // The solution to a Layout solve contains two `Rects`, where `Rects` is effectively a `[Rect]`.\n   25 | //\n   26 | // 1. `[Rect]` that contains positions for the segments corresponding to user provided constraints\n   27 | // 2. `[Rect]` that contains spacers around the user provided constraints\n   28 | //\n   29 | // <------------------------------------80 px------------------------------------->\n   30 | // ┌   ┐┌──────────────────┐┌   ┐┌──────────────────┐┌   ┐┌──────────────────┐┌   ┐\n   31 | //   1  │        a         │  2  │         b        │  3  │         c        │  4\n   32 | // └   ┘└──────────────────┘└   ┘└──────────────────┘└   ┘└──────────────────┘└   ┘\n   33 | //\n   34 | // Number of spacers will always be one more than number of segments.\n   35 | // With std: cache can store Rc directly (no Send needed thanks to thread_local)\n   36 | #[cfg(all(feature = \"layout-cache\", feature = \"std\"))]\n   37 | type Cache = LruCache<(Rect, Layout), (Segments, Spacers)>;\n   38 | \n   39 | // Without std: cache stores Vec instead (Send-safe for critical_section::Mutex)\n   40 | #[cfg(all(feature = \"layout-cache\", not(feature = \"std\")))]\n   41 | type Cache = LruCache<(Rect, Layout), (Vec<Rect>, Vec<Rect>)>;\n   42 | \n   43 | // Multiplier that decides floating point precision when rounding.\n   44 | // The number of zeros in this number is the precision for the rounding of f64 to u16 in layout\n   45 | // calculations.\n   46 | const FLOAT_PRECISION_MULTIPLIER: f64 = 100.0;\n   47 | \n   48 | #[cfg(all(feature = \"layout-cache\", feature = \"std\"))]\n   49 | std::thread_local! {\n   50 |     static LAYOUT_CACHE: core::cell::RefCell<Cache> = core::cell::RefCell::new(Cache::new(\n   51 |         NonZeroUsize::new(Layout::DEFAULT_CACHE_SIZE).unwrap(),\n   52 |     ));\n   53 | }\n   54 | \n   55 | #[cfg(all(feature = \"layout-cache\", not(feature = \"std\")))]\n   56 | static LAYOUT_CACHE: critical_section::Mutex<core::cell::RefCell<Option<Cache>>> =\n   57 |     critical_section::Mutex::new(core::cell::RefCell::new(None));\n   58 | \n   59 | /// Represents the spacing between segments in a layout.\n   60 | ///\n   61 | /// The `Spacing` enum is used to define the spacing between segments in a layout. It can represent\n   62 | /// either positive spacing (space between segments) or negative spacing (overlap between segments).\n   63 | ///\n   64 | /// # Variants\n   65 | ///\n   66 | /// - `Space(u16)`: Represents positive spacing between segments. The value indicates the number of\n   67 | ///   cells.\n   68 | /// - `Overlap(u16)`: Represents negative spacing, causing overlap between segments. The value\n   69 | ///   indicates the number of overlapping cells.\n   70 | ///\n   71 | /// # Default\n   72 | ///\n   73 | /// The default value for `Spacing` is `Space(0)`, which means no spacing or no overlap between\n   74 | /// segments.\n   75 | ///\n   76 | /// # Conversions\n   77 | ///\n   78 | /// The `Spacing` enum can be created from different integer types:\n   79 | ///\n   80 | /// - From `u16`: Directly converts the value to `Spacing::Space`.\n   81 | /// - From `i16`: Converts negative values to `Spacing::Overlap` and non-negative values to\n   82 | ///   `Spacing::Space`.\n   83 | /// - From `i32`: Clamps the value to the range of `i16` and converts negative values to\n   84 | ///   `Spacing::Overlap` and non-negative values to `Spacing::Space`.\n   85 | ///\n   86 | /// See the [`Layout::spacing`] method for details on how to use this enum.\n   87 | #[derive(Debug, Clone, Eq, PartialEq, Hash)]\n   88 | #[cfg_attr(feature = \"serde\", derive(serde::Serialize, serde::Deserialize))]\n   89 | pub enum Spacing {\n   90 |     Space(u16),\n   91 |     Overlap(u16),\n   92 | }\n   93 | \n   94 | impl Default for Spacing {\n   95 |     fn default() -> Self {\n   96 |         Self::Space(0)\n   97 |     }\n   98 | }\n   99 | \n  100 | impl From<i32> for Spacing {\n  101 |     fn from(value: i32) -> Self {\n  102 |         Self::from(value.clamp(i32::from(i16::MIN), i32::from(i16::MAX)) as i16)\n  103 |     }\n  104 | }\n  105 | \n  106 | impl From<u16> for Spacing {\n  107 |     fn from(value: u16) -> Self {\n  108 |         Self::Space(value)\n  109 |     }\n  110 | }\n  111 | \n  112 | impl From<i16> for Spacing {\n  113 |     fn from(value: i16) -> Self {\n  114 |         if value < 0 {\n  115 |             Self::Overlap(value.unsigned_abs())\n  116 |         } else {\n  117 |             Self::Space(value.unsigned_abs())\n  118 |         }\n  119 |     }\n  120 | }\n  121 | \n  122 | /// The primary layout engine for dividing terminal space using constraints and direction.\n  123 | ///\n  124 | /// A layout is a set of constraints that can be applied to a given area to split it into smaller\n  125 | /// rectangular areas. This is the core building block for creating structured user interfaces in\n  126 | /// terminal applications.\n  127 | ///\n  128 | /// A layout is composed of:\n  129 | /// - a direction (horizontal or vertical)\n  130 | /// - a set of constraints (length, ratio, percentage, fill, min, max)\n  131 | /// - a margin (horizontal and vertical), the space between the edge of the main area and the split\n  132 | ///   areas\n  133 | /// - a flex option that controls space distribution\n  134 | /// - a spacing option that controls gaps between segments\n  135 | ///\n  136 | /// The algorithm used to compute the layout is based on the [`kasuari`] solver, a linear constraint\n  137 | /// solver that computes positions and sizes to satisfy as many constraints as possible in order of\n  138 | /// their priorities.\n  139 | ///\n  140 | /// When the layout is computed, the result is cached in a thread-local cache, so that subsequent\n  141 | /// calls with the same parameters are faster. The cache is a `LruCache`, and the size of the cache\n  142 | /// can be configured using [`Layout::init_cache()`] when the `layout-cache` feature is enabled.\n  143 | ///\n  144 | /// # Construction\n  145 | ///\n  146 | /// - [`default`](Default::default) - Create a layout with default values (vertical direction, no\n  147 | ///   constraints, no margin)\n  148 | /// - [`new`](Self::new) - Create a new layout with a given direction and constraints\n  149 | /// - [`vertical`](Self::vertical) - Create a new vertical layout with the given constraints\n  150 | /// - [`horizontal`](Self::horizontal) - Create a new horizontal layout with the given constraints\n  151 | ///\n  152 | /// # Configuration\n  153 | ///\n  154 | /// - [`direction`](Self::direction) - Set the direction of the layout\n  155 | /// - [`constraints`](Self::constraints) - Set the constraints of the layout\n  156 | /// - [`margin`](Self::margin) - Set uniform margin on all sides\n  157 | /// - [`horizontal_margin`](Self::horizontal_margin) - Set the horizontal margin of the layout\n  158 | /// - [`vertical_margin`](Self::vertical_margin) - Set the vertical margin of the layout\n  159 | /// - [`flex`](Self::flex) - Set the way space is distributed when constraints are satisfied\n  160 | /// - [`spacing`](Self::spacing) - Set the gap between the constraints of the layout\n  161 | ///\n  162 | /// # Layout Operations\n  163 | ///\n  164 | /// - [`areas`](Self::areas) - Split area into fixed number of rectangles (compile-time known)\n  165 | /// - [`spacers`](Self::spacers) - Get spacer rectangles between layout areas\n  166 | /// - [`split`](Self::split) - Split area into rectangles (runtime determined count)\n  167 | /// - [`split_with_spacers`](Self::split_with_spacers) - Split area and return both areas and\n  168 | ///   spacers\n  169 | ///\n  170 | /// # Cache Management\n  171 | ///\n  172 | /// - [`init_cache`](Self::init_cache) - Initialize layout cache with custom size\n  173 | ///\n  174 | /// # Example\n  175 | ///\n  176 | /// ```rust\n  177 | /// use ratatui_core::buffer::Buffer;\n  178 | /// use ratatui_core::layout::{Constraint, Direction, Layout, Rect};\n  179 | /// use ratatui_core::text::Text;\n  180 | /// use ratatui_core::widgets::Widget;\n  181 | ///\n  182 | /// fn render(area: Rect, buf: &mut Buffer) {\n  183 | ///     let layout = Layout::vertical([Constraint::Length(5), Constraint::Fill(1)]);\n  184 | ///     let [top, bottom] = layout.areas(area);\n  185 | ///     Text::from(\"foo\").render(top, buf);\n  186 | ///     Text::from(\"bar\").render(bottom, buf);\n  187 | /// }\n  188 | /// ```\n  189 | ///\n  190 | /// See the `layout`, `flex`, and `constraints` examples in the [Examples] folder for more details\n  191 | /// about how to use layouts.\n  192 | ///\n  193 | /// For comprehensive layout documentation and examples, see the [`layout`](crate::layout) module.\n  194 | ///\n  195 | /// ![layout\n  196 | /// example](https://camo.githubusercontent.com/77d22f3313b782a81e5e033ef82814bb48d786d2598699c27f8e757ccee62021/68747470733a2f2f7668732e636861726d2e73682f7668732d315a4e6f4e4c4e6c4c746b4a58706767396e435635652e676966)\n  197 | ///\n  198 | /// [`kasuari`]: https://crates.io/crates/kasuari\n  199 | /// [Examples]: https://github.com/ratatui/ratatui/blob/main/examples/README.md\n  200 | #[derive(Debug, Default, Clone, Eq, PartialEq, Hash)]\n  201 | #[cfg_attr(feature = \"serde\", derive(serde::Serialize, serde::Deserialize))]\n  202 | pub struct Layout {\n  203 |     direction: Direction,\n  204 |     constraints: Vec<Constraint>,\n  205 |     margin: Margin,\n  206 |     flex: Flex,\n  207 |     spacing: Spacing,\n  208 | }\n  209 | \n  210 | impl Layout {\n  211 |     /// This is a somewhat arbitrary size for the layout cache based on adding the columns and rows\n  212 |     /// on my laptop's terminal (171+51 = 222) and doubling it for good measure and then adding a\n  213 |     /// bit more to make it a round number. This gives enough entries to store a layout for every\n  214 |     /// row and every column, twice over, which should be enough for most apps. For those that need\n  215 |     /// more, the cache size can be set with `Layout::init_cache()` (requires the `layout-cache`\n  216 |     /// feature).\n  217 |     #[cfg(feature = \"layout-cache\")]\n  218 |     pub const DEFAULT_CACHE_SIZE: usize = 500;\n  219 | \n  220 |     /// Creates a new layout with default values.\n  221 |     ///\n  222 |     /// The `constraints` parameter accepts any type that implements `IntoIterator<Item =\n  223 |     /// Into<Constraint>>`. This includes arrays, slices, vectors, iterators. `Into<Constraint>` is\n  224 |     /// implemented on `u16`, so you can pass an array, `Vec`, etc. of `u16` to this function to\n  225 |     /// create a layout with fixed size chunks.\n  226 |     ///\n  227 |     /// Default values for the other fields are:\n  228 |     ///\n  229 |     /// - `margin`: 0, 0\n  230 |     /// - `flex`: [`Flex::Start`]\n  231 |     /// - `spacing`: 0\n  232 |     ///\n  233 |     /// # Examples\n  234 |     ///\n  235 |     /// ```rust\n  236 |     /// use ratatui_core::layout::{Constraint, Direction, Layout};\n  237 |     ///\n  238 |     /// Layout::new(\n  239 |     ///     Direction::Horizontal,\n  240 |     ///     [Constraint::Length(5), Constraint::Fill(1)],\n  241 |     /// );\n  242 |     ///\n  243 |     /// Layout::new(\n  244 |     ///     Direction::Vertical,\n  245 |     ///     [1, 2, 3].iter().map(|&c| Constraint::Length(c)),\n  246 |     /// );\n  247 |     ///\n  248 |     /// Layout::new(Direction::Horizontal, vec![1, 2]);\n  249 |     /// ```\n  250 |     pub fn new<I>(direction: Direction, constraints: I) -> Self\n  251 |     where\n  252 |         I: IntoIterator,\n  253 |         I::Item: Into<Constraint>,\n  254 |     {\n  255 |         Self {\n  256 |             direction,\n  257 |             constraints: constraints.into_iter().map(Into::into).collect(),\n  258 |             ..Self::default()\n  259 |         }\n  260 |     }\n  261 | \n  262 |     /// Creates a new vertical layout with default values.\n  263 |     ///\n  264 |     /// The `constraints` parameter accepts any type that implements `IntoIterator<Item =\n  265 |     /// Into<Constraint>>`. This includes arrays, slices, vectors, iterators, etc.\n  266 |     ///\n  267 |     /// # Examples\n  268 |     ///\n  269 |     /// ```rust\n  270 |     /// use ratatui_core::layout::{Constraint, Layout};\n  271 |     ///\n  272 |     /// let layout = Layout::vertical([Constraint::Length(5), Constraint::Fill(1)]);\n  273 |     /// ```\n  274 |     pub fn vertical<I>(constraints: I) -> Self\n  275 |     where\n  276 |         I: IntoIterator,\n  277 |         I::Item: Into<Constraint>,\n  278 |     {\n  279 |         Self::new(Direction::Vertical, constraints.into_iter().map(Into::into))\n  280 |     }\n  281 | \n  282 |     /// Creates a new horizontal layout with default values.\n  283 |     ///\n  284 |     /// The `constraints` parameter accepts any type that implements `IntoIterator<Item =\n  285 |     /// Into<Constraint>>`. This includes arrays, slices, vectors, iterators, etc.\n  286 |     ///\n  287 |     /// # Examples\n  288 |     ///\n  289 |     /// ```rust\n  290 |     /// use ratatui_core::layout::{Constraint, Layout};\n  291 |     ///\n  292 |     /// let layout = Layout::horizontal([Constraint::Length(5), Constraint::Fill(1)]);\n  293 |     /// ```\n  294 |     pub fn horizontal<I>(constraints: I) -> Self\n  295 |     where\n  296 |         I: IntoIterator,\n  297 |         I::Item: Into<Constraint>,\n  298 |     {\n  299 |         Self::new(\n  300 |             Direction::Horizontal,\n  301 |             constraints.into_iter().map(Into::into),\n  302 |         )\n  303 |     }\n  304 | \n  305 |     /// Initialize an empty cache with a custom size. The cache is keyed on the layout and area, so\n  306 |     /// that subsequent calls with the same parameters are faster. The cache is a `LruCache`, and\n  307 |     /// grows until `cache_size` is reached.\n  308 |     ///\n  309 |     /// By default, the cache size is [`Self::DEFAULT_CACHE_SIZE`].\n  310 |     #[cfg(feature = \"layout-cache\")]\n  311 |     pub fn init_cache(cache_size: NonZeroUsize) {\n  312 |         Self::resize_cache(cache_size);\n  313 |     }\n  314 | \n  315 |     #[cfg(all(feature = \"layout-cache\", feature = \"std\"))]\n  316 |     fn resize_cache(cache_size: NonZeroUsize) {\n  317 |         LAYOUT_CACHE.with_borrow_mut(|cache| cache.resize(cache_size));\n  318 |     }\n  319 | \n  320 |     #[cfg(all(feature = \"layout-cache\", not(feature = \"std\")))]\n  321 |     fn resize_cache(cache_size: NonZeroUsize) {\n  322 |         critical_section::with(|cs| {\n  323 |             let mut cache = LAYOUT_CACHE.borrow(cs).borrow_mut();\n  324 |             match cache.as_mut() {\n  325 |                 Some(c) => c.resize(cache_size),\n  326 |                 None => *cache = Some(Cache::new(cache_size)),\n  327 |             }\n  328 |         });\n  329 |     }\n  330 | \n  331 |     /// Set the direction of the layout.\n  332 |     ///\n  333 |     /// # Examples\n  334 |     ///\n  335 |     /// ```rust\n  336 |     /// use ratatui_core::layout::{Constraint, Direction, Layout, Rect};\n  337 |     ///\n  338 |     /// let layout = Layout::default()\n  339 |     ///     .direction(Direction::Horizontal)\n  340 |     ///     .constraints([Constraint::Length(5), Constraint::Fill(1)])\n  341 |     ///     .split(Rect::new(0, 0, 10, 10));\n  342 |     /// assert_eq!(layout[..], [Rect::new(0, 0, 5, 10), Rect::new(5, 0, 5, 10)]);\n  343 |     ///\n  344 |     /// let layout = Layout::default()\n  345 |     ///     .direction(Direction::Vertical)\n  346 |     ///     .constraints([Constraint::Length(5), Constraint::Fill(1)])\n  347 |     ///     .split(Rect::new(0, 0, 10, 10));\n  348 |     /// assert_eq!(layout[..], [Rect::new(0, 0, 10, 5), Rect::new(0, 5, 10, 5)]);\n  349 |     /// ```\n  350 |     #[must_use = \"method moves the value of self and returns the modified value\"]\n  351 |     pub const fn direction(mut self, direction: Direction) -> Self {\n  352 |         self.direction = direction;\n  353 |         self\n  354 |     }\n  355 | \n  356 |     /// Sets the constraints of the layout.\n  357 |     ///\n  358 |     /// The `constraints` parameter accepts any type that implements `IntoIterator<Item =\n  359 |     /// Into<Constraint>>`. This includes arrays, slices, vectors, iterators. `Into<Constraint>` is\n  360 |     /// implemented on u16, so you can pass an array or vec of u16 to this function to create a\n  361 |     /// layout with fixed size chunks.\n  362 |     ///\n  363 |     /// Note that the constraints are applied to the whole area that is to be split, so using\n  364 |     /// percentages and ratios with the other constraints may not have the desired effect of\n  365 |     /// splitting the area up. (e.g. splitting 100 into [min 20, 50%, 50%], may not result in [20,\n  366 |     /// 40, 40] but rather an indeterminate result between [20, 50, 30] and [20, 30, 50]).\n  367 |     ///\n  368 |     /// # Examples\n  369 |     ///\n  370 |     /// ```rust\n  371 |     /// use ratatui_core::layout::{Constraint, Layout, Rect};\n  372 |     ///\n  373 |     /// let layout = Layout::default()\n  374 |     ///     .constraints([\n  375 |     ///         Constraint::Percentage(20),\n  376 |     ///         Constraint::Ratio(1, 5),\n  377 |     ///         Constraint::Length(2),\n  378 |     ///         Constraint::Min(2),\n  379 |     ///         Constraint::Max(2),\n  380 |     ///     ])\n  381 |     ///     .split(Rect::new(0, 0, 10, 10));\n  382 |     /// assert_eq!(\n  383 |     ///     layout[..],\n  384 |     ///     [\n  385 |     ///         Rect::new(0, 0, 10, 2),\n  386 |     ///         Rect::new(0, 2, 10, 2),\n  387 |     ///         Rect::new(0, 4, 10, 2),\n  388 |     ///         Rect::new(0, 6, 10, 2),\n  389 |     ///         Rect::new(0, 8, 10, 2),\n  390 |     ///     ]\n  391 |     /// );\n  392 |     ///\n  393 |     /// Layout::default().constraints([Constraint::Fill(1)]);\n  394 |     /// Layout::default().constraints(&[Constraint::Fill(1)]);\n  395 |     /// Layout::default().constraints(vec![Constraint::Fill(1)]);\n  396 |     /// Layout::default().constraints([Constraint::Fill(1)].iter().filter(|_| true));\n  397 |     /// Layout::default().constraints([1, 2, 3].iter().map(|&c| Constraint::Length(c)));\n  398 |     /// Layout::default().constraints([1, 2, 3]);\n  399 |     /// Layout::default().constraints(vec![1, 2, 3]);\n  400 |     /// ```\n  401 |     #[must_use = \"method moves the value of self and returns the modified value\"]\n  402 |     pub fn constraints<I>(mut self, constraints: I) -> Self\n  403 |     where\n  404 |         I: IntoIterator,\n  405 |         I::Item: Into<Constraint>,\n  406 |     {\n  407 |         self.constraints = constraints.into_iter().map(Into::into).collect();\n  408 |         self\n  409 |     }\n  410 | \n  411 |     /// Set the margin of the layout.\n  412 |     ///\n  413 |     /// # Examples\n  414 |     ///\n  415 |     /// ```rust\n  416 |     /// use ratatui_core::layout::{Constraint, Layout, Rect};\n  417 |     ///\n  418 |     /// let layout = Layout::default()\n  419 |     ///     .constraints([Constraint::Fill(1)])\n  420 |     ///     .margin(2)\n  421 |     ///     .split(Rect::new(0, 0, 10, 10));\n  422 |     /// assert_eq!(layout[..], [Rect::new(2, 2, 6, 6)]);\n  423 |     /// ```\n  424 |     #[must_use = \"method moves the value of self and returns the modified value\"]\n  425 |     pub const fn margin(mut self, margin: u16) -> Self {\n  426 |         self.margin = Margin {\n  427 |             horizontal: margin,\n  428 |             vertical: margin,\n  429 |         };\n  430 |         self\n  431 |     }\n  432 | \n  433 |     /// Set the horizontal margin of the layout.\n  434 |     ///\n  435 |     /// # Examples\n  436 |     ///\n  437 |     /// ```rust\n  438 |     /// use ratatui_core::layout::{Constraint, Layout, Rect};\n  439 |     ///\n  440 |     /// let layout = Layout::default()\n  441 |     ///     .constraints([Constraint::Fill(1)])\n  442 |     ///     .horizontal_margin(2)\n  443 |     ///     .split(Rect::new(0, 0, 10, 10));\n  444 |     /// assert_eq!(layout[..], [Rect::new(2, 0, 6, 10)]);\n  445 |     /// ```\n  446 |     #[must_use = \"method moves the value of self and returns the modified value\"]\n  447 |     pub const fn horizontal_margin(mut self, horizontal: u16) -> Self {\n  448 |         self.margin.horizontal = horizontal;\n  449 |         self\n  450 |     }\n  451 | \n  452 |     /// Set the vertical margin of the layout.\n  453 |     ///\n  454 |     /// # Examples\n  455 |     ///\n  456 |     /// ```rust\n  457 |     /// use ratatui_core::layout::{Constraint, Layout, Rect};\n  458 |     ///\n  459 |     /// let layout = Layout::default()\n  460 |     ///     .constraints([Constraint::Fill(1)])\n  461 |     ///     .vertical_margin(2)\n  462 |     ///     .split(Rect::new(0, 0, 10, 10));\n  463 |     /// assert_eq!(layout[..], [Rect::new(0, 2, 10, 6)]);\n  464 |     /// ```\n  465 |     #[must_use = \"method moves the value of self and returns the modified value\"]\n  466 |     pub const fn vertical_margin(mut self, vertical: u16) -> Self {\n  467 |         self.margin.vertical = vertical;\n  468 |         self\n  469 |     }\n  470 | \n  471 |     /// The `flex` method  allows you to specify the flex behavior of the layout.\n  472 |     ///\n  473 |     /// # Arguments\n  474 |     ///\n  475 |     /// * `flex`: A [`Flex`] enum value that represents the flex behavior of the layout. It can be\n  476 |     ///   one of the following:\n  477 |     ///   - [`Flex::Legacy`]: The last item is stretched to fill the excess space.\n  478 |     ///   - [`Flex::Start`]: The items are aligned to the start of the layout.\n  479 |     ///   - [`Flex::Center`]: The items are aligned to the center of the layout.\n  480 |     ///   - [`Flex::End`]: The items are aligned to the end of the layout.\n  481 |     ///   - [`Flex::SpaceBetween`]: The items are evenly distributed with equal space between them.\n  482 |     ///   - [`Flex::SpaceAround`]: The items are evenly distributed with equal space around them,\n  483 |     ///     except the first and last items, which have half the space on their sides.\n  484 |     ///   - [`Flex::SpaceEvenly`]: The items are evenly distributed with equal space around them.\n  485 |     ///\n  486 |     /// # Examples\n  487 |     ///\n  488 |     /// In this example, the items in the layout will be aligned to the start.\n  489 |     ///\n  490 |     /// ```rust\n  491 |     /// use ratatui_core::layout::Constraint::*;\n  492 |     /// use ratatui_core::layout::{Flex, Layout};\n  493 |     ///\n  494 |     /// let layout = Layout::horizontal([Length(20), Length(20), Length(20)]).flex(Flex::Start);\n  495 |     /// ```\n  496 |     ///\n  497 |     /// In this example, the items in the layout will be stretched equally to fill the available\n  498 |     /// space.\n  499 |     ///\n  500 |     /// ```rust\n  501 |     /// use ratatui_core::layout::Constraint::*;\n  502 |     /// use ratatui_core::layout::{Flex, Layout};\n  503 |     ///\n  504 |     /// let layout = Layout::horizontal([Length(20), Length(20), Length(20)]).flex(Flex::Legacy);\n  505 |     /// ```\n  506 |     #[must_use = \"method moves the value of self and returns the modified value\"]\n  507 |     pub const fn flex(mut self, flex: Flex) -> Self {\n  508 |         self.flex = flex;\n  509 |         self\n  510 |     }\n  511 | \n  512 |     /// Sets the spacing between items in the layout.\n  513 |     ///\n  514 |     /// The `spacing` method sets the spacing between items in the layout. The spacing is applied\n  515 |     /// evenly between all segments. The spacing value represents the number of cells between each\n  516 |     /// item.\n  517 |     ///\n  518 |     /// Spacing can be positive integers, representing gaps between segments; or negative integers\n  519 |     /// representing overlaps. Additionally, one of the variants of the [`Spacing`] enum can be\n  520 |     /// passed to this function. See the documentation of the [`Spacing`] enum for more information.\n  521 |     ///\n  522 |     /// Note that if the layout has only one segment, the spacing will not be applied.\n  523 |     /// Also, spacing will not be applied for [`Flex::SpaceAround`], [`Flex::SpaceEvenly`] and\n  524 |     /// [`Flex::SpaceBetween`]\n  525 |     ///\n  526 |     /// # Examples\n  527 |     ///\n  528 |     /// In this example, the spacing between each item in the layout is set to 2 cells.\n  529 |     ///\n  530 |     /// ```rust\n  531 |     /// use ratatui_core::layout::Constraint::*;\n  532 |     /// use ratatui_core::layout::Layout;\n  533 |     ///\n  534 |     /// let layout = Layout::horizontal([Length(20), Length(20), Length(20)]).spacing(2);\n  535 |     /// ```\n  536 |     ///\n  537 |     /// In this example, the spacing between each item in the layout is set to -1 cells, i.e. the\n  538 |     /// three segments will have an overlapping border.\n  539 |     ///\n  540 |     /// ```rust\n  541 |     /// use ratatui_core::layout::Constraint::*;\n  542 |     /// use ratatui_core::layout::Layout;\n  543 |     /// let layout = Layout::horizontal([Length(20), Length(20), Length(20)]).spacing(-1);\n  544 |     /// ```\n  545 |     #[must_use = \"method moves the value of self and returns the modified value\"]\n  546 |     pub fn spacing<T>(mut self, spacing: T) -> Self\n  547 |     where\n  548 |         T: Into<Spacing>,\n  549 |     {\n  550 |         self.spacing = spacing.into();\n  551 |         self\n  552 |     }\n  553 | \n  554 |     /// Split the rect into a number of sub-rects according to the given [`Layout`].\n  555 |     ///\n  556 |     /// An ergonomic wrapper around [`Layout::split`] that returns an array of `Rect`s instead of\n  557 |     /// `Rc<[Rect]>`.\n  558 |     ///\n  559 |     /// This method requires the number of constraints to be known at compile time. If you don't\n  560 |     /// know the number of constraints at compile time, use [`Layout::split`] instead.\n  561 |     ///\n  562 |     /// # Panics\n  563 |     ///\n  564 |     /// Panics if the number of constraints is not equal to the length of the returned array.\n  565 |     ///\n  566 |     /// # Examples\n  567 |     ///\n  568 |     /// ```rust\n  569 |     /// use ratatui_core::layout::{Constraint, Layout, Rect};\n  570 |     ///\n  571 |     /// let area = Rect::new(0, 0, 10, 10);\n  572 |     /// let layout = Layout::vertical([Constraint::Length(1), Constraint::Fill(1)]);\n  573 |     /// let [top, main] = layout.areas(area);\n  574 |     ///\n  575 |     /// // or explicitly specify the number of constraints:\n  576 |     /// let areas = layout.areas::<2>(area);\n  577 |     /// ```\n  578 |     pub fn areas<const N: usize>(&self, area: Rect) -> [Rect; N] {\n  579 |         let areas e::layout::{Position, Rect};\n   10 | use crate::style::Style;\n   11 | use crate::text::{Line, Span};\n   12 | \n   13 | /// A buffer that maps to the desired content of the terminal after the draw call\n   14 | ///\n   15 | /// No widget in the library interacts directly with the terminal. Instead each of them is required\n   16 | /// to draw their state to an intermediate buffer. It is basically a grid where each cell contains\n   17 | /// a grapheme, a foreground color and a background color. This grid will then be used to output\n   18 | /// the appropriate escape sequences and characters to draw the UI as the user has defined it.\n   19 | ///\n   20 | /// # Examples:\n   21 | ///\n   22 | /// ```\n   23 | /// use ratatui_core::buffer::{Buffer, Cell};\n   24 | /// use ratatui_core::layout::{Position, Rect};\n   25 | /// use ratatui_core::style::{Color, Style};\n   26 | ///\n   27 | /// # fn main() -> Result<(), Box<dyn std::error::Error>> {\n   28 | /// let mut buf = Buffer::empty(Rect {\n   29 | ///     x: 0,\n   30 | ///     y: 0,\n   31 | ///     width: 10,\n   32 | ///     height: 5,\n   33 | /// });\n   34 | ///\n   35 | /// // indexing using Position\n   36 | /// buf[Position { x: 0, y: 0 }].set_symbol(\"A\");\n   37 | /// assert_eq!(buf[Position { x: 0, y: 0 }].symbol(), \"A\");\n   38 | ///\n   39 | /// // indexing using (x, y) tuple (which is converted to Position)\n   40 | /// buf[(0, 1)].set_symbol(\"B\");\n   41 | /// assert_eq!(buf[(0, 1)].symbol(), \"B\");\n   42 | ///\n   43 | /// // getting an Option instead of panicking if the position is outside the buffer\n   44 | /// let cell = buf\n   45 | ///     .cell_mut(Position { x: 0, y: 2 })\n   46 | ///     .ok_or(\"cell not found\")?;\n   47 | /// cell.set_symbol(\"C\");\n   48 | ///\n   49 | /// let cell = buf.cell(Position { x: 0, y: 2 }).ok_or(\"cell not found\")?;\n   50 | /// assert_eq!(cell.symbol(), \"C\");\n   51 | ///\n   52 | /// buf.set_string(\n   53 | ///     3,\n   54 | ///     0,\n dth of the [`Cell`].\n  960 |     ///\n  961 |     /// This function consumes `cell_column_span` `Rect`s from `column_widths_iterator` (or all the\n  962 |     /// `Rects` if the iterator is less than `cell_column_span` `Rect`s long). This function adds\n  963 |     /// the width of each `Rect` plus `column_spacing` to a running total of the final width.  The\n  964 |     /// return value is the original x coordinate and the final width, or `None` if\n  965 |     /// `column_widths_iterator` is empty or `cell_column_span` is `0`.\n  966 |     fn get_cell_area<'a, T>(\n  967 |         column_widths_iterator: &mut T,\n  968 |         cell_column_span: u16,\n  969 |         column_spacing: u16,\n  970 |     ) -> Option<Rect>\n  971 |     where\n  972 |         T: Iterator<Item = &'a Rect>,\n  973 |     {\n  974 |         if cell_column_span == 0 {\n  975 |             return None;\n  976 |         }\n  977 |         let first = column_widths_iterator.next()?;\n  978 |         let (n_columns_taken, all_columns_width) = column_widths_iterator\n  979 |             .take((cell_column_span - 1).into())\n  980 |             .map(|rect| (1, rect.width))\n  981 |             .fold((1, first.width), |so_far, next_column| {\n  982 |                 (next_column.0 + so_far.0, next_column.1 + so_far.1)\n  983 |             });\n  984 |         let width = all_columns_width + (n_columns_taken - 1) * column_spacing;\n  985 |         Some(Rect::new(first.x, first.y, width, 1))\n  986 |     }\n  987 | \n  988 |     /// Return the indexes of the visible rows.\n  989 |     ///\n  990 |     /// The algorithm works as follows:\n  991 |     /// - start at the offset and calculate the height of the rows that can be displayed within the\n  992 |     ///   area.\n  993 |     /// - if the selected row is not visible, scroll the table to ensure it is visible.\n  994 |     /// - if there is still space to fill then there's a partial row at the end which should be\n  995 |     ///   included in the view.\n  996 |     fn visible_rows(&self, state: &TableState, area: Rect) -> (usize, usize) {\n  997 |         let last_row = self.rows.len().saturating_sub(1);\n  998 |         let mut start = state.offset.min(last_row);\n  999 | \n 1000 |         if let Some(selected) = state.selected {\n 1001 |             start = start.min(selected);\n 1002 |         }\n 1003 | \n 1004 |         let mut end = start;\n 1005 |         let mut height = 0;\n 1006 | \n 1007 |         for item in self.rows.iter().skip(start) {\n 1008 |             if height + item.height > area.height {\n 1009 |                 break;\n 1010 |             }\n 1011 |             height += item.height_with_margin();\n 1012 |             end += 1;\n 1013 |         }\n 1014 | \n 1015 |         if let Some(selected) = state.selected {\n 1016 |             let selected = selected.min(last_row);\n 1017 | \n 1018 |             // scroll down until the selected row is visible\n 1019 |             while selected >= end {\n 1020 |                 height = height.saturating_add(self.rows[end].height_with_margin());\n 1021 |                 end += 1;\n 1022 |                 while height > area.height {\n 1023 |                     height = height.saturating_sub(self.rows[start].height_with_margin());\n 1024 |                     start += 1;\n 1025 |                 }\n 1026 |             }\n 1027 |         }\n 1028 | \n 1029 |         // Include a partial row if there is space\n 1030 |         if height < area.height && end < self.rows.len() {\n 1031 |             end += 1;\n 1032 |         }\n 1033 | \n 1034 |         (start, end)\n 1035 |     }\n 1036 | \n 1037 |     /// Get all offsets and widths of all user specified columns.\n 1038 |     ///\n 1039 |     /// Returns (x, width). When self.widths is empty, it is assumed `.widths()` has not been called\n 1040 |     /// and a default of equal widths is returned.\n 1041 |     fn get_column_widths(\n 1042 |         &self,\n 1043 |         max_width: u16,\n 1044 description":"`chart.rs` (1705 lines) and `barchart.rs` (1562 lines) each combine multiple public types and\nall rendering logic in a single file. `chart.rs` holds `Axis`, `GraphType`, `LegendPosition`,\n`Dataset`, `ChartLayout`, and `Chart` with a single `render` method annotated\n`#[expect(clippy::too_many_lines)]` (line 1001); `barchart.rs` holds `BarChart` plus separate\nhorizontal/vertical render paths with near-duplicate bar/label/value placement math\n(`render_horizontal` vs `render_vertical`/`render_vertical_bars`/`render_labels_and_values`).\nThis concentration makes the data-to-pixel scaling and axis/legend placement logic hard to test\nand audit in isolation and is the root cause of the off-by-one / unit-mismatch bugs reported\nabove.","fix":"Split the layout/scaling math (tick scaling, axis placement, legend layout) into separate, unit-tested helper modules, and factor the shared horizontal/vertical bar placement into a single direction-parameterized routine.","locations":[{"ref":"ratatui-widgets/src/chart.rs:1000-1158","code":" 1000 | impl Widget for &Chart<'_> {\n 1001 |     #[expect(clippy::too_many_lines)]\n 1002 |     fn render(self, area: Rect, buf: &mut Buffer) {\n 1003 |         buf.set_style(area, self.style);\n 1004 | \n 1005 |         self.block.as_ref().render(area, buf);\n 1006 |         let chart_area = self.block.inner_if_some(area);\n 1007 |         let Some(layout) = self.layout(chart_area) else {\n 1008 |             return;\n 1009 |         };\n 1010 |         let graph_area = layout.graph_area;\n 1011 | \n 1012 |         // Sample the style of the entire widget. This sample will be used to reset the style of\n 1013 |         // the cells that are part of the components put on top of the grah area (i.e legend and\n 1014 |         // axis names).\n 1015 |         let original_style = buf[(area.left(), area.top())].style();\n 1016 | \n 1017 |         self.render_x_labels(buf, &layout, chart_area, graph_area);\n 1018 |         self.render <div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-06-05 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>

<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
