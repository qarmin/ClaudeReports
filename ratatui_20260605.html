<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"`HalfBlockGrid::paint` indexes the pixel buffer directly with `self.pixels[y][x]`, unlike every other `Grid` implementation (`PatternGrid::paint`, `CharGrid::paint`) which deliberately use `get_mut` and carry a comment stating \"we want to make sure we don't panic if the index is out of bounds\". `Painter::paint` is a public API and `Shape::draw` implementations call it with arbitrary `(x, y)` values. When the canvas marker is `Marker::HalfBlock`, any out-of-range point (e.g. a custom `Shape` that paints near the resolution edge, or any direct `painter.paint(x, y, ..)` call as shown in the doc example for `Painter::paint`) will panic with an out-of-bounds index. The overflow regression tests (`check_canvas_paint_overflow`) only cover `PatternGrid` and `CharGrid`, so this gap is untested.","fix":"Bounds-check like the other grids, e.g.:\n`if let Some(row) = self.pixels.get_mut(y) { if let Some(cell) = row.get_mut(x) { *cell = Some(color); } }`","locations":[{"ref":"ratatui-widgets/src/canvas.rs:393-395","code":"  393 |     fn paint(&mut self, x: usize, y: usize, color: Color) {\n  394 |         self.pixels[y][x] = Some(color);\n  395 |     }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"In the render loop, the number of items to draw is computed as\n`.take(last_visible_index - first_visible_index)` using plain (non-saturating) subtraction. This\nrelies on the invariant `last_visible_index >= first_visible_index` always holding after\n`get_items_bounds`. Because `get_items_bounds` can produce `last_visible_index < first_visible_index`\nin the oversized-item edge case described in the related finding (the inner loops decrement\n`last_visible_index` independently), this subtraction can underflow to a huge `usize` and attempt to\ntake far more items than exist, leading to incorrect rendering or a panic when combined with the\nindexing in `get_items_bounds`.","fix":"Use `last_visible_index.saturating_sub(first_visible_index)`, and ensure `get_items_bounds` always returns `last >= first`.","locations":[{"ref":"ratatui-widgets/src/list/rendering.rs:72-78","code":"   72 |         for (i, item) in self\n   73 |             .items\n   74 |             .iter()\n   75 |             .enumerate()\n   76 |             .skip(state.offset)\n   77 |             .take(last_visible_index - first_visible_index)\n   78 |         {"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"`List::get_items_bounds` performs non-saturating index arithmetic in the \"scroll up\" branch that\ncan index out of bounds and/or underflow when an item is taller than the available viewport.\n\nWhen `index_to_display < first_visible_index` (selected item is above the current visible range),\nthe outer loop decrements `first_visible_index` and adds that item's height. If a single item's\nheight exceeds `max_height`, the inner `while height_from_offset > max_height` loop never brings the\nheight back under the limit, so it keeps executing `last_visible_index -= 1` (line 199, NOT\nsaturating) and then indexes `self.items[last_visible_index]` (line 202). With enough oversized\nitems this drives `last_visible_index` to 0 and then to `usize::MAX` (underflow), causing a panic\nor out-of-bounds index. The symmetric forward loop at 180-186 increments `first_visible_index`\nwithout an upper-bound guard for the same oversized-item case.","fix":"Guard the inner loops so indices cannot cross: only decrement `last_visible_index` while\n`last_visible_index > first_visible_index` (and `first_visible_index` while\n`first_visible_index < last_visible_index`), and stop subtracting once the range is empty even if\nthe single remaining oversized item still exceeds `max_height`. Use `saturating_sub` for the index\ndecrements as defense in depth.","locations":[{"ref":"ratatui-widgets/src/list/rendering.rs:191-204","code":"  191 |         while index_to_display < first_visible_index {\n  192 |             first_visible_index -= 1;\n  193 | \n  194 |             height_from_offset =\n  195 |                 height_from_offset.saturating_add(self.items[first_visible_index].height());\n  196 | \n  197 |             // Don't show an item if it is beyond our viewable height\n  198 |             while height_from_offset > max_height {\n  199 |                 last_visible_index -= 1;\n  200 | \n  201 |                 height_from_offset =\n  202 |                     height_from_offset.saturating_sub(self.items[last_visible_index].height());\n  203 |             }\n  204 |         }"},{"ref":"ratatui-widgets/src/list/rendering.rs:180-186","code":"  180 |             while height_from_offset > max_height {\n  181 |                 height_from_offset =\n  182 |                     height_from_offset.saturating_sub(self.items[first_visible_index].height());\n  183 | \n  184 |                 // Remove this item to view by starting at the next item index\n  185 |                 first_visible_index += 1;\n  186 |             }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","description":"`From<Color> for anstyle::Color` panics on `Color::Reset` (documented). Because this conversion is invoked unconditionally inside `From<Style> for anstyle::Style` for any `fg`, `bg`, or `underline_color` that is `Some`, converting an otherwise-valid `Style` whose color is set to `Color::Reset` will panic rather than returning an error or skipping the color. A `Style` with `fg: Some(Color::Reset)` is a perfectly normal value (it is exactly what `Style::reset()` produces), so this is an easy-to-hit panic when interoperating with anstyle.","fix":"Make the `Style -> anstyle::Style` conversion treat `Color::Reset` as \"no color\" (skip setting it) instead of unconditionally converting, or provide a `TryFrom`-based path so a Reset color cannot trigger a panic.","locations":[{"ref":"ratatui-core/src/style/anstyle.rs:118-126","code":"  118 |     fn from(color: Color) -> Self {\n  119 |         match color {\n  120 |             Color::Reset => panic!(\"Color::Reset has no equivalent in anstyle\"),\n  121 |             Color::Rgb(_, _, _) => Self::Rgb(RgbColor::try_from(color).unwrap()),\n  122 |             Color::Indexed(_) => Self::Ansi256(Ansi256Color::try_from(color).unwrap()),\n  123 |             _ => Self::Ansi(AnsiColor::try_from(color).unwrap()),\n  124 |         }\n  125 |     }\n  126 | }"},{"ref":"ratatui-core/src/style/anstyle.rs:208-227","code":"  208 | impl From<Style> for anstyle::Style {\n  209 |     fn from(style: Style) -> Self {\n  210 |         let mut anstyle_style = Self::new();\n  211 |         if let Some(fg) = style.fg {\n  212 |             let fg = anstyle::Color::from(fg);\n  213 |             anstyle_style = anstyle_style.fg_color(Some(fg));\n  214 |         }\n  215 |         if let Some(bg) = style.bg {\n  216 |             let bg = anstyle::Color::from(bg);\n  217 |             anstyle_style = anstyle_style.bg_color(Some(bg));\n  218 |         }\n  219 |         #[cfg(feature = \"underline-color\")]\n  220 |         if let Some(underline) = style.underline_color {\n  221 |             let underline = anstyle::Color::from(underline);\n  222 |             anstyle_style = anstyle_style.underline_color(Some(underline));\n  223 |         }\n  224 |         anstyle_style = anstyle_style.effects(style.add_modifier.into());\n  225 |         anstyle_style\n  226 |     }\n  227 | }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"`Terminal::drop` attempts to restore cursor visibility by calling `self.show_cursor()` (which calls\n`backend.show_cursor()`), but never calls `backend.flush()` afterwards. For backends that buffer\ntheir output (e.g. a buffered stdout writer), the show-cursor escape sequence may sit unflushed in\nthe backend's buffer; whether it actually reaches the terminal then depends entirely on the\nbackend's own `Drop` flushing. If the backend does not flush on drop, the user can be left with a\nhidden cursor after the program exits.","fix":"After `show_cursor()` succeeds in `Drop`, also call `self.backend.flush()` (ignoring/logging the\nerror) so the cursor-restore sequence is actually emitted before the backend is dropped.","locations":[{"ref":"ratatui-core/src/terminal.rs:477-486","code":"  477 |     fn drop(&mut self) {\n  478 |         // Attempt to restore the cursor state\n  479 |         if self.hidden_cursor {\n  480 |             #[allow(unused_variables)]\n  481 |             if let Err(err) = self.show_cursor() {\n  482 |                 #[cfg(feature = \"std\")]\n  483 |                 std::eprintln!(\"Failed to show the cursor: {err}\");\n  484 |             }\n  485 |         }\n  486 |     }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"`Buffer::merge` computes the destination index `k` entirely in `u16` arithmetic:\n`((y - area.y) * area.width + x - area.x) as usize`. For a merged area whose\nwidth*height exceeds 65535 (e.g. merging buffers that span a 256x256 region),\n`(y - area.y) * area.width` overflows `u16`. In debug builds this panics\n('attempt to multiply with overflow'); in release builds it silently wraps,\nproducing a wrong index that either corrupts cell data or causes an\nout-of-bounds panic on `self.content[k]`. This is the same class of bug that was\nfixed for `pos_of` in issue #1441, but it was not fixed here.","fix":"Perform the index math in `usize`, e.g.\n`let k = (y as usize - area.y as usize) * area.width as usize + (x as usize - area.x as usize);`\nfor both the relocation loop and the other-buffer copy loop.","locations":[{"ref":"ratatui-core/src/buffer/buffer.rs:441-459","code":"  441 |         for i in (0..size).rev() {\n  442 |             let (x, y) = self.pos_of(i);\n  443 |             // New index in content\n  444 |             let k = ((y - area.y) * area.width + x - area.x) as usize;\n  445 |             if i != k {\n  446 |                 self.content[k] = self.content[i].clone();\n  447 |                 self.content[i].reset();\n  448 |             }\n  449 |         }\n  450 | \n  451 |         // Push content of the other buffer into this one (may erase previous\n  452 |         // data)\n  453 |         let size = other.area.area() as usize;\n  454 |         for i in 0..size {\n  455 |             let (x, y) = other.pos_of(i);\n  456 |             // New index in content\n  457 |             let k = ((y - area.y) * area.width + x - area.x) as usize;\n  458 |             self.content[k] = other.content[i].clone();\n  459 |         }"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"`BarChart::group_ticks` computes the group width with unchecked `u16` arithmetic:\n`let n_bars = group.bars.len() as u16;` and\n`let group_width = n_bars * self.bar_width + n_bars.saturating_sub(1) * self.bar_gap;`.\n\nTwo problems:\n1. `group.bars.len() as u16` truncates the bar count when a group has more than 65535 bars,\n   producing a wrong `n_bars` and silently dropping/duplicating layout.\n2. `n_bars * self.bar_width` and `... * self.bar_gap` are plain `u16` multiplications. With a\n   large bar count and/or a large `bar_width`/`bar_gap` these overflow, which panics in debug\n   builds and wraps to a tiny `group_width` in release builds (corrupting the bar layout). All\n   other width math here uses saturating ops, so this is inconsistent and unsafe.","fix":"Do the width computation in a wider type and saturate back to `u16`, e.g.\n`let n_bars = u32::try_from(group.bars.len()).unwrap_or(u32::MAX);`\nthen compute `group_width` as a `u32` with `saturating_mul`/`saturating_add` and\n`u16::try_from(group_width).unwrap_or(u16::MAX)`, or clamp `n_bars` to `available_space`\nbefore multiplying.","locations":[{"ref":"ratatui-widgets/src/barchart.rs:443-444","code":"  443 |                 let n_bars = group.bars.len() as u16;\n  444 |                 let group_width = n_bars * self.bar_width + n_bars.saturating_sub(1) * self.bar_gap;"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`TestBackend::scroll_region_up` / `scroll_region_down` compute\n`cell_region_len = cell_region_end - cell_region_start` after independently clamping\n`region.start` and `region.end` to the buffer height. If a caller passes a reversed range\n(`region.end < region.start`), this is an unchecked `usize` subtraction that panics (debug) or\nwraps to a huge value and then panics on the subsequent slice index (release). The `Backend` trait\ndocuments these as half-open ranges but does not require `start <= end`, so a misbehaving caller of\nthe public trait method can trigger a panic. This is test-backend logic, but it is real\n(non-test-cfg) code reachable through the public `Backend` API.","fix":"Guard against reversed/empty ranges, e.g. compute\n`let cell_region_len = cell_region_end.saturating_sub(cell_region_start);` and early-return when it\nis zero, or clamp `cell_region_end` to be `>= cell_region_start`.","locations":[{"ref":"ratatui-core/src/backend/test.rs:386-388","code":"  386 |         let cell_region_start = width * region.start.min(self.buffer.area.height) as usize;\n  387 |         let cell_region_end = width * region.end.min(self.buffer.area.height) as usize;\n  388 |         let cell_region_len = cell_region_end - cell_region_start;"},{"ref":"ratatui-core/src/backend/test.rs:432-434","code":"  432 |         let cell_region_start = width * region.start.min(self.buffer.area.height) as usize;\n  433 |         let cell_region_end = width * region.end.min(self.buffer.area.height) as usize;\n  434 |         let cell_region_len = cell_region_end - cell_region_start;"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"The cursor-adjacency optimization computes `p.x + 1` on a `u16` without overflow protection. If the previously written cell was at `x == u16::MAX` (65535), `p.x + 1` overflows and panics in debug builds (wraps to 0 in release, which would then incorrectly skip a `MoveTo`/`Goto`). The same pattern exists in both the crossterm and termion backends (parallel copy-paste code).","fix":"Use a checked/saturating comparison, e.g. `matches!(last_pos, Some(p) if y == p.y && p.x.checked_add(1) == Some(x))`.","locations":[{"ref":"ratatui-crossterm/src/lib.rs:244","code":"  244 |             if !matches!(last_pos, Some(p) if x == p.x + 1 && y == p.y) {"},{"ref":"ratatui-termion/src/lib.rs:224","code":"  224 |             if !matches!(last_pos, Some(p) if x == p.x + 1 && y == p.y) {"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`TermwizBackend::get_cursor_position` casts the terminal's `usize` cursor coordinates with a raw `as u16` (`Position::new(x as u16, y as u16)`), which silently truncates values above 65535. Every other place in this file that narrows a `usize` terminal dimension to `u16` uses the dedicated `u16_max` saturating helper (see `size`, line 265, and `window_size`, lines 281-287). This is an inconsistency that drops the saturating behavior for cursor position.","fix":"Use `Ok(Position::new(u16_max(x), u16_max(y)))` to match the rest of the backend.","locations":[{"ref":"ratatui-termwiz/src/lib.rs:230-233","code":"  230 |     fn get_cursor_position(&mut self) -> io::Result<Position> {\n  231 |         let (x, y) = self.buffered_terminal.cursor_position();\n  232 |         Ok(Position::new(x as u16, y as u16))\n  233 |     }"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`apply_scroll_padding_to_selected_index` returns `selected + scroll_padding` and `selected + scroll_padding`\nwith plain (non-saturating) addition before clamping with `.min(last_valid_index)`. `scroll_padding`\nis a user-supplied `usize` (`List::scroll_padding`), so a large padding value combined with a large\nselected index can overflow `usize` in a debug build and panic before the `.min` clamp is applied.","fix":"Use `selected.saturating_add(scroll_padding)` in both the condition and the returned value.","locations":[{"ref":"ratatui-widgets/src/list/rendering.rs:243-252","code":"  243 |         Some(\n  244 |             if (selected + scroll_padding).min(last_valid_index) >= last_visible_index {\n  245 |                 selected + scroll_padding\n  246 |             } else if selected.saturating_sub(scroll_padding) < first_visible_index {\n  247 |                 selected.saturating_sub(scroll_padding)\n  248 |             } else {\n  249 |                 selected\n  250 |             }\n  251 |             .min(last_valid_index),\n  252 |         )"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In `get_column_widths`, the equal-width fallback computes\n`Constraint::Length(max_width / col_count.max(1) as u16)`. `col_count` is a `usize` derived from the\nmaximum number of cells in any row/header/footer; casting it to `u16` truncates when a row has more\nthan 65535 cells, which would yield a wrong (possibly zero) divisor-derived width. Practically rare,\nbut it is a silent truncating cast on user-controlled data.","fix":"Clamp before casting, e.g. `col_count.clamp(1, u16::MAX as usize) as u16`, or do the division in usize and clamp the result to u16.","locations":[{"ref":"ratatui-widgets/src/table.rs:1047-1049","code":" 1047 |         let widths = if self.widths.is_empty() {\n 1048 |             // Divide the space between each column equally\n 1049 |             vec![Constraint::Length(max_width / col_count.max(1) as u16); col_count]"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`selection_width` returns `self.highlight_symbol.width() as u16`, a truncating cast from `usize`.\nA highlight symbol whose total text width exceeds u16::MAX would wrap to a small value, producing a\nwrong selection column width. Edge case, but an unchecked truncating cast feeding rendering layout.","fix":"Saturate the cast: `u16::try_from(self.highlight_symbol.width()).unwrap_or(u16::MAX)`.","locations":[{"ref":"ratatui-widgets/src/table.rs:1079-1086","code":" 1079 |     fn selection_width(&self, state: &TableState) -> u16 {\n 1080 |         let has_selection = state.selected.is_some();\n 1081 |         if self.highlight_spacing.should_add(has_selection) {\n 1082 |             self.highlight_symbol.width() as u16\n 1083 |         } else {\n 1084 |             0\n 1085 |         }\n 1086 |     }"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`Style::from_crossterm` does not handle the `NormalIntensity` crossterm attribute, so the DIM-removal round-trip is broken and asymmetric with `Style::into_crossterm`.\n\n`into_crossterm` (line 471) maps `sub_modifier` containing `DIM` to `CrosstermAttribute::NormalIntensity` (SGR 22), and `sub_modifier` containing `BOLD` to `NoBold` (SGR 21). These are distinct crossterm discriminants (verified: `NoBold = 21`, `NormalIntensity = 22`).\n\n`from_crossterm` for `Style` (lines 662-695) only inspects `NoBold`, `NoItalic`, `NotCrossedOut`, `NoUnderline`, `NoHidden`, `NoBlink`, and `NoReverse`. It never checks `NormalIntensity`, so a `ContentStyle` produced from `Style::default().remove_modifier(Modifier::DIM)` converts back to a `Style` with an empty `sub_modifier` — the DIM removal is silently lost. `NormalIntensity` (which a terminal/crossterm uses to reset both bold and dim) is also not surfaced into `sub_modifier` at all.","fix":"In `FromCrossterm<ContentStyle> for Style`, also test `value.attributes.has(CrosstermAttribute::NormalIntensity)` and set `sub_modifier |= Modifier::DIM` (and arguably `Modifier::BOLD` as well, since NormalIntensity resets both intensities). This restores symmetry with `into_crossterm`.","locations":[{"ref":"ratatui-crossterm/src/lib.rs:662-685","code":"  662 | impl FromCrossterm<ContentStyle> for Style {\n  663 |     fn from_crossterm(value: ContentStyle) -> Self {\n  664 |         let mut sub_modifier = Modifier::empty();\n  665 |         if value.attributes.has(CrosstermAttribute::NoBold) {\n  666 |             sub_modifier |= Modifier::BOLD;\n  667 |         }\n  668 |         if value.attributes.has(CrosstermAttribute::NoItalic) {\n  669 |             sub_modifier |= Modifier::ITALIC;\n  670 |         }\n  671 |         if value.attributes.has(CrosstermAttribute::NotCrossedOut) {\n  672 |             sub_modifier |= Modifier::CROSSED_OUT;\n  673 |         }\n  674 |         if value.attributes.has(CrosstermAttribute::NoUnderline) {\n  675 |             sub_modifier |= Modifier::UNDERLINED;\n  676 |         }\n  677 |         if value.attributes.has(CrosstermAttribute::NoHidden) {\n  678 |             sub_modifier |= Modifier::HIDDEN;\n  679 |         }\n  680 |         if value.attributes.has(CrosstermAttribute::NoBlink) {\n  681 |             sub_modifier |= Modifier::RAPID_BLINK | Modifier::SLOW_BLINK;\n  682 |         }\n  683 |         if value.attributes.has(CrosstermAttribute::NoReverse) {\n  684 |             sub_modifier |= Modifier::REVERSED;\n  685 |         }"},{"ref":"ratatui-crossterm/src/lib.rs:470-472","code":"  470 |         if self.sub_modifier.contains(Modifier::DIM) {\n  471 |             attributes.set(CrosstermAttribute::NormalIntensity);\n  472 |         }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`Bar::render_value_with_different_styles` compares and slices byte counts against a cell-based\nbar length, and then subtracts a byte length from a cell-based width.\n\n- Line 218 `if text.len() > bar_length` compares UTF-8 byte count (`text.len()`) against\n  `bar_length`, which is the bar length in cells. For multi-byte text this is the wrong test.\n- Line 234 `area.width as usize - first.len()` subtracts a byte count (`first.len()`) from the\n  cell width `area.width`. If `first` contains multi-byte characters, `first.len()` can exceed\n  `area.width`, causing an integer underflow panic (`usize` subtraction) in this render path.","fix":"Work consistently in display cells: split the text by display width (not byte index) and use\n`saturating_sub` for the remaining width, e.g.\n`area.width as usize - first part's display width`, computed with `unicode_width`, and guard the\nsecond-part render so the width never underflows.","locations":[{"ref":"ratatui-widgets/src/barchart/bar.rs:216-235","code":"  216 |             buf.set_stringn(area.x, area.y, text, bar_length, style);\n  217 |             // render the second part with the bar_style\n  218 |             if text.len() > bar_length {\n  219 |                 // Find the last character boundary at or before bar_length\n  220 |                 let bar_length = text\n  221 |                     .char_indices()\n  222 |                     .take_while(|(i, _)| *i < bar_length)\n  223 |                     .last()\n  224 |                     .map_or(0, |(i, c)| i + c.len_utf8());\n  225 | \n  226 |                 let (first, second) = text.split_at(bar_length);\n  227 | \n  228 |                 let style = bar_style.patch(self.style);\n  229 |                 buf.set_stringn(\n  230 |                     area.x + first.len() as u16,\n  231 |                     area.y,\n  232 |                     second,\n  233 |                     area.width as usize - first.len(),\n  234 |                     style,\n  235 |                 );"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`Bar::render_value` mixes display width and byte length when centering the value text.\n`width` is computed from `value_label.width()` (display cells, line 253) and used to decide\nwhether the value fits, but the horizontal centering offset on line 258 uses\n`value_label.len()` (UTF-8 byte count) instead of the display width:\n`x + (max_width.saturating_sub(value_label.len() as u16) >> 1)`.\n\nFor any multi-byte `text_value` (e.g. accented characters, CJK), `len()` (bytes) differs from\n`width()` (cells), so the value is mis-centered, and for a value whose byte length exceeds\n`max_width` the centering offset collapses to 0 even though it visually fits.","fix":"Use the display width for centering: `x + (max_width.saturating_sub(width) >> 1)` (reuse the `width` already computed on line 253).","locations":[{"ref":"ratatui-widgets/src/barchart/bar.rs:253-258","code":"  253 |             let width = value_label.width() as u16;\n  254 |             // if we have enough space or the ticks are greater equal than 1 cell (8)\n  255 |             // then print the value\n  256 |             if width < max_width || (width == max_width && ticks >= TICKS_PER_LINE) {\n  257 |                 buf.set_string(\n  258 |                     x + (max_width.saturating_sub(value_label.len() as u16) >> 1),"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `Table::visible_rows`, the loop that fills the initial visible window breaks based on\n`height + item.height > area.height` (raw row height, excluding margins), but then accumulates\n`height += item.height_with_margin()` (height + top_margin + bottom_margin). The break test and the\naccumulator use two different quantities for the same row. When rows have non-zero top/bottom\nmargins this makes the visible-row computation inconsistent: a row whose content height fits but\nwhose total height-with-margin overflows the area is still counted as visible, and `height` can be\ndriven past `area.height` while the loop keeps thinking there is room. This produces wrong\nstart/end indices (rows partially clipped or an extra/missing row) when margins are used.","fix":"Use a single consistent metric. Either test `height + item.height_with_margin() > area.height`\nbefore adding, or compute `next = height.saturating_add(item.height_with_margin())` and break when\n`next > area.height`, then assign `height = next`. Match this against how `render_rows` advances\n`y_offset` by `height_with_margin()`.","locations":[{"ref":"ratatui-widgets/src/table.rs:1007-1013","code":" 1007 |         for item in self.rows.iter().skip(start) {\n 1008 |             if height + item.height > area.height {\n 1009 |                 break;\n 1010 |             }\n 1011 |             height += item.height_with_margin();\n 1012 |             end += 1;\n 1013 |         }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Buffer::with_lines` casts `lines.len() as u16` and the max line width\n`... as u16` without saturation. A buffer built from more than 65535 lines (or\nlines wider than 65535 cells) silently truncates the height/width, producing a\nbuffer that does not contain all the supplied content, and later iteration over\n`lines` writes to rows beyond `height` via `set_line` (which is clamped, so the\nextra lines are silently dropped). This is an edge case but the truncation is\nsilent.","fix":"Use saturating conversions (e.g. `u16::try_from(lines.len()).unwrap_or(u16::MAX)`)\nand document the limit, or debug_assert that the dimensions fit in u16.","locations":[{"ref":"ratatui-core/src/buffer/buffer.rs:97-104","code":"   97 |         let lines = lines.into_iter().map(Into::into).collect::<Vec<_>>();\n   98 |         let height = lines.len() as u16;\n   99 |         let width = lines.iter().map(Line::width).max().unwrap_or_default() as u16;\n  100 |         let mut buffer = Self::empty(Rect::new(0, 0, width, height));\n  101 |         for (y, line) in lines.iter().enumerate() {\n  102 |             buffer.set_line(0, y as u16, line, width);\n  103 |         }\n  104 |         buffer"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`str::cell_width` treats any single-byte string as width 1 via the fast ASCII\npath (`if self.len() == 1`), guarded only by a `debug_assert!` against control\ncharacters. In release builds a single-byte control character (e.g. a stray\n\"\\n\" or \"\\t\" that bypassed filtering through the low-level `Cell::set_symbol`/\n`set_char`) is silently reported as width 1 instead of 0, which can desynchronize\ncursor/cell accounting in diffing. The doc acknowledges this but it is a real\ncorrectness gap for callers using the low-level cell APIs.","fix":"Either keep the debug_assert and document clearly that control chars are UB for\nwidth, or handle control characters in release too (return 0) to be robust\nagainst callers of the low-level Cell APIs.","locations":[{"ref":"ratatui-core/src/buffer/cell_width.rs:34-45","code":"   34 |     fn cell_width(&self) -> u16 {\n   35 |         if self.len() == 1 {\n   36 |             debug_assert!(\n   37 |                 !self.as_bytes()[0].is_ascii_control(),\n   38 |                 \"control character passed to cell_width without filtering\"\n   39 |             );\n   40 |             1\n   41 |         } else {\n   42 |             let width = self.width() as u16;\n   43 |             width.saturating_add(count_halfwidth_sound_marks(self))\n   44 |         }\n   45 |     }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `draw_lines_over_cleared`, the temporary `Rect` is built with an incorrect `height`:\n`Rect::new(0, y_offset, width as u16, y_offset + lines_to_draw)`. The 4th argument to\n`Rect::new` is the height, but `y_offset + lines_to_draw` is passed, which is the bottom row,\nnot the number of rows. This makes `old = Buffer::empty(area)` over-allocate `width * y_offset`\nempty cells, while the `new` Buffer is given the SAME (wrong) area but only `width * lines_to_draw`\ncells of content, so `new.content.len()` is inconsistent with `new.area`. It happens to still\nproduce correct draw positions only because `BufferDiff` caps iteration at the shorter content\nlength and `pos_of` adds `area.y` (= `y_offset`). The height should be `lines_to_draw`. As written\nit is fragile (relies on a content/area mismatch) and wastes an allocation proportional to\n`y_offset` on every inserted chunk when the viewport is not at the top of the screen.","fix":"Build the rect with the correct height and matching content, e.g.\n`let area = Rect::new(0, y_offset, width as u16, lines_to_draw);` so that both `old` and `new`\nhave `width * lines_to_draw` cells and the Rect height matches the content.","locations":[{"ref":"ratatui-core/src/terminal/inline.rs:334-339","code":"  334 |             let area = Rect::new(0, y_offset, width as u16, y_offset + lines_to_draw);\n  335 |             let old = Buffer::empty(area);\n  336 |             let new = Buffer {\n  337 |                 area,\n  338 |                 content: to_draw.to_vec(),\n  339 |             };"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Line`'s `Debug` impl writes the span content unescaped for the common single-span/default-style case. It uses `f.write_str(&self.spans[0].content)` wrapped in literal quotes instead of debug formatting (`{:?}`). This means content containing quotes, backslashes, or newlines produces invalid/misleading debug output, and is inconsistent with both the single-styled-span branch (which calls `Span::fmt`, using `{:?}`) and the `Span` Debug impl itself.","fix":"Format the content with debug escaping, e.g. `write!(f, \"Line::from({:?})\", self.spans[0].content)?;` instead of writing the raw string between literal quote characters.","locations":[{"ref":"ratatui-core/src/text/line.rs:199-202","code":"  199 |         } else if self.spans.len() == 1 && self.spans[0].style == Style::default() {\n  200 |             f.write_str(r#\"Line::from(\"\"#)?;\n  201 |             f.write_str(&self.spans[0].content)?;\n  202 |             f.write_str(r#\"\")\"#)?;"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The `render_right_titles` doc comment documents a known bug: when the block is too small to fit all\nright-aligned titles, the right side of the leftmost title is cut off instead of the left side, due\nto incorrect line truncation (references issue 932). This is a real rendering correctness issue in\nthe audited slice, left unfixed.","fix":"Truncate the left side (not the right) of the leftmost right-aligned title when space is insufficient, mirroring the offset-based left truncation used for centered titles in `render_centered_titles_with_truncation`.","locations":[{"ref":"ratatui-widgets/src/block.rs:932-966","code":"  932 |     /// Render titles aligned to the right of the block\n  933 |     ///\n  934 |     /// Currently (due to the way lines are truncated), the right side of the leftmost title will\n  935 |     /// be cut off if the block is too small to fit all titles. This is not ideal and should be\n  936 |     /// the left side of that leftmost that is cut off. This is due to the line being truncated\n  937 |     /// incorrectly. See <https://github.com/ratatui/ratatui/issues/932>\n  938 |     #[expect(clippy::similar_names)]\n  939 |     fn render_right_titles(&self, position: TitlePosition, area: Rect, buf: &mut Buffer) {\n  940 |         let titles = self.filtered_titles(position, Alignment::Right);\n  941 |         let mut titles_area = self.titles_area(area, position);\n  942 | \n  943 |         // render titles in reverse order to align them to the right\n  944 |         for title in titles.rev() {\n  945 |             if titles_area.is_empty() {\n  946 |                 break;\n  947 |             }\n  948 |             let title_width = Self::line_width_u16(title);\n  949 |             let title_area = Rect {\n  950 |                 x: titles_area\n  951 |                     .right()\n  952 |                     .saturating_sub(title_width)\n  953 |                     .max(titles_area.left()),\n  954 |                 width: title_width.min(titles_area.width),\n  955 |                 ..titles_area\n  956 |             };\n  957 |             buf.set_style(title_area, self.titles_style);\n  958 |             title.render(title_area, buf);\n  959 | \n  960 |             // bump the width of the titles area to the left\n  961 |             titles_area.width = titles_area\n  962 |                 .width\n  963 |                 .saturating_sub(title_width)\n  964 |                 .saturating_sub(1); // space between titles\n  965 |         }\n  966 |     }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The vertical bounds guard before writing a calendar week row compares the absolute row coordinate `y` against `buf.area.height` rather than against `buf.area.bottom()`. `y` starts at `days_area.y`, which is an absolute buffer coordinate that includes the buffer's `area.y` origin, while `buf.area.height` is just the height (origin-independent). For a buffer whose area has a non-zero `y` origin this comparison is wrong: it can reject rows that are actually in bounds (when the origin is large) or, more generally, mismatch the valid range `[area.y, area.y+height)`. It happens not to panic only because `set_stringn` clamps `x` (but not `y`); the guard is the only thing standing between this code and an out-of-bounds `y`, and it is computed incorrectly.","fix":"Compare against `buf.area.bottom()` instead of `buf.area.height` (and ideally also check `y >= buf.area.top()`).","locations":[{"ref":"ratatui-widgets/src/calendar.rs:225","code":"  225 |             if buf.area.height > y {"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Painter::get_point` rejects out-of-bounds points by testing `x < left || x > right || y < bottom || y > top`. NaN coordinates fail all four comparisons (every comparison with NaN is false), so a NaN `x` or `y` passes the bounds check. It then reaches `((x - left) * (self.resolution.0 - 1.0) / width).round() as usize`, where `NaN as usize` saturates to 0, silently producing the grid point `(0, 0)` instead of being treated as off-grid. A `Shape` that computes a NaN/Inf coordinate (e.g. from user data) will therefore paint a stray dot in the top-left corner rather than being skipped.","fix":"Add an explicit finiteness check, e.g. return `None` early if `!x.is_finite() || !y.is_finite()`.","locations":[{"ref":"ratatui-widgets/src/canvas.rs:449-462","code":"  449 |     pub fn get_point(&self, x: f64, y: f64) -> Option<(usize, usize)> {\n  450 |         let [left, right] = self.context.x_bounds;\n  451 |         let [bottom, top] = self.context.y_bounds;\n  452 |         if x < left || x > right || y < bottom || y > top {\n  453 |             return None;\n  454 |         }\n  455 |         let width = right - left;\n  456 |         let height = top - bottom;\n  457 |         if width <= 0.0 || height <= 0.0 {\n  458 |             return None;\n  459 |         }\n  460 |         let x = ((x - left) * (self.resolution.0 - 1.0) / width).round() as usize;\n  461 |         let y = ((top - y) * (self.resolution.1 - 1.0) / height).round() as usize;\n  462 |         Some((x, y))"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"When rendering canvas labels, the horizontal and vertical scale factors are computed as `(label.x - left) * resolution.0 / width` and `(top - label.y) * resolution.1 / height`, where `width = (x_bounds[1] - x_bounds[0]).abs()` and `height = (y_bounds[1] - y_bounds[0]).abs()`. If the x or y bounds are equal (a zero-width or zero-height viewport, which is the default `[0.0, 0.0]`), these divisions are by `0.0`, yielding `NaN`/`Inf`, which `as u16` then converts to 0. The label is placed at the canvas origin instead of being skipped. The label filter on the preceding lines does not exclude this degenerate case.","fix":"Guard against `width <= 0.0` / `height <= 0.0` (skip label rendering or the whole label loop) before dividing.","locations":[{"ref":"ratatui-widgets/src/canvas.rs:917-931","code":"  917 |         let width = (self.x_bounds[1] - self.x_bounds[0]).abs();\n  918 |         let height = (self.y_bounds[1] - self.y_bounds[0]).abs();\n  919 |         let resolution = {\n  920 |             let width = f64::from(canvas_area.width - 1);\n  921 |             let height = f64::from(canvas_area.height - 1);\n  922 |             (width, height)\n  923 |         };\n  924 |         for label in ctx\n  925 |             .labels\n  926 |             .iter()\n  927 |             .filter(|l| l.x >= left && l.x <= right && l.y <= top && l.y >= bottom)\n  928 |         {\n  929 |             let x = ((label.x - left) * resolution.0 / width) as u16 + canvas_area.left();\n  930 |             let y = ((top - label.y) * resolution.1 / height) as u16 + canvas_area.top();\n  931 |             buf.set_line(x, y, &label.line, canvas_area.right() - x);"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `Chart::render_y_labels` the visibility guard `if dy < graph_area.bottom()` compares a\nrelative vertical offset (`dy`, range `0..=graph_area.height-1`) against an absolute buffer\ncoordinate (`graph_area.bottom()`). The intent appears to be ensuring the label stays inside the\ngraph, but mixing a relative offset with an absolute coordinate is meaningless: when the graph\narea does not start at y=0 the test never excludes anything (it is always true because\n`dy <= height-1 < bottom`), and the real clamping is silently done by `saturating_sub` on the\nnext line. The guard is effectively dead/incorrect.","fix":"Compare against the relative height instead, e.g. `if dy < graph_area.height`, or remove the redundant check since the y position is already computed safely.","locations":[{"ref":"ratatui-widgets/src/chart.rs:980-981","code":"  980 |             let dy = i as u16 * (graph_area.height - 1) / (labels_len - 1);\n  981 |             if dy < graph_area.bottom() {"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Off-by-one in `Gauge::render_gauge` when masking the cell columns covered by the centered label.\nThe label occupies columns `[label_col, label_col + clamped_label_width)`. The condition that\nselects the \"covered by label\" (color-swapped) branch is the negation of\n`x < label_col || x > label_col + clamped_label_width`, i.e. it treats\n`label_col <= x <= label_col + clamped_label_width` as label cells. This includes the extra\ncolumn `x == label_col + clamped_label_width`, one cell past the actual label. When the gauge is\nfilled past the label, that one extra cell to the right of the label is rendered with inverted\nfg/bg colors.","fix":"Use a half-open range: `if x < label_col || x >= label_col + clamped_label_width || y != label_row`.","locations":[{"ref":"ratatui-widgets/src/gauge.rs:198","code":"  198 |                 if x < label_col || x > label_col + clamped_label_width || y != label_row {"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`restore`/`try_restore` unconditionally executes `LeaveAlternateScreen`, but `init_with_options` / `try_init_with_options` intentionally never enter the alternate screen (only raw mode is enabled). After an inline-viewport app initialized via `init_with_options`, calling `restore()` emits a `LeaveAlternateScreen` sequence that was never matched by an `EnterAlternateScreen`. On most terminals this is a harmless no-op, but it is an asymmetry between init and restore and can produce spurious escape sequences / unexpected screen-buffer switches on some terminals.","fix":"Either track whether the alternate screen was entered (so restore only leaves it when it was entered), or document that `restore` is intended for the full-screen `init` path and inline apps should restore manually. At minimum the asymmetry should be made explicit.","locations":[{"ref":"ratatui/src/init.rs:554-560","code":"  554 | pub fn try_restore() -> io::Result<()> {\n  555 |     // disabling raw mode first is important as it has more side effects than leaving the alternate\n  556 |     // screen buffer\n  557 |     disable_raw_mode()?;\n  558 |     execute!(stdout(), LeaveAlternateScreen)?;\n  559 |     Ok(())\n  560 | }"},{"ref":"ratatui/src/init.rs:492-497","code":"  492 | pub fn try_init_with_options(options: TerminalOptions) -> io::Result<DefaultTerminal> {\n  493 |     set_panic_hook();\n  494 |     enable_raw_mode()?;\n  495 |     let backend = CrosstermBackend::new(stdout());\n  496 |     Terminal::with_options(backend, options)\n  497 | }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"`Buffer::set_stringn` resets trailing cells of a multi-width grapheme by writing\ndefault cells, but does not copy the style onto them, while the diff logic in\n`diff.rs` deliberately ignores style-only changes in trailing cells. This is\nconsistent today, but the reset trailing cells get `Cell::EMPTY` styling rather\nthan the grapheme's style; if a future change makes trailing-cell style visible\nthis will produce inconsistent backgrounds under wide graphemes. Noting as a\nlatent coupling between `set_stringn` and `diff` rather than an active bug.","fix":"Document the invariant that trailing cells of wide graphemes are reset and their\nstyle is not considered visible, in both `set_stringn` and the diff iterator, to\nkeep the two in sync.","locations":[{"ref":"ratatui-core/src/buffer/buffer.rs:359-368","code":"  359 |         for (symbol, width) in graphemes {\n  360 |             self[(x, y)].set_symbol(symbol).set_style(style);\n  361 |             let next_symbol = x + width;\n  362 |             x += 1;\n  363 |             // Reset following cells if multi-width (they would be hidden by the grapheme),\n  364 |             while x < next_symbol {\n  365 |                 self[(x, y)].reset();\n  366 |                 x += 1;\n  367 |             }\n  368 |         }"},{"ref":"ratatui-core/src/buffer/diff.rs:121-156","code":"  121 |                 CellDiffOption::None | CellDiffOption::AlwaysUpdate => {\n  122 |                     // If the current cell is multi-width, ensure the trailing cells are\n  123 |                     // explicitly cleared when they previously contained non-blank content.\n  124 |                     // Some terminals do not reliably clear the trailing cell(s) when printing\n  125 |                     // a wide grapheme, which can result in visual artifacts (e.g., leftover\n  126 |                     // characters). Emitting an explicit update for the trailing cells avoids\n  127 |                     // this.\n  128 |                     let cell_width = current.cell_width() as usize;\n  129 |                     if matches!(current.diff_option, CellDiffOption::None) && current == previous {\n  130 |                         // Equal cells still need to account for multi-width skip.\n  131 |                         self.pos += cell_width.saturating_sub(1);\n  132 |                         continue;\n  133 |                     }\n  134 | \n  135 |                     // Work around terminals that fail to clear the trailing cell of certain\n  136 |                     // emoji presentation sequences (those containing VS16 / U+FE0F).\n  137 |                     // Only emit explicit clears for such sequences to avoid bloating diffs\n  138 |                     // for standard wide characters (e.g., CJK), which terminals handle well.\n  139 |                     let contains_vs16 =\n  140 |                         cell_width > 1 && current.symbol().chars().any(|c| c == '\\u{FE0F}');\n  141 | \n  142 |                     if contains_vs16 {\n  143 |                         let trailing_end = (i + cell_width).min(len);\n  144 |                         self.trailing = Some(TrailingState {\n  145 |                             next_index: i + 1,\n  146 |                             end: trailing_end,\n  147 |                         });\n  148 |                     } else if cell_width > 1 {\n  149 |                         self.pos += cell_width.saturating_sub(1);\n  150 |                     } else {\n  151 |                         // single-width character, no position adjustment needed\n  152 |                     }\n  153 | \n  154 |                     let (x, y) = self.pos_of(i);\n  155 |                     return Some((x, y, &self.next[i]));\n  156 |                 }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"`Layout::spacers` uses `.expect(\"invalid number of rects\")` while the sibling\n`Layout::areas` produces a richer panic message including expected vs found\ncounts. The terse message makes debugging a wrong const-generic length harder\nfor `spacers`, which is an easy off-by-one to hit (spacers count = segments + 1).","fix":"Mirror the `areas` implementation: use `unwrap_or_else` with a panic message\nthat reports the expected `N` and the actual `spacers.len()`.","locations":[{"ref":"ratatui-core/src/layout/layout.rs:646-652","code":"  646 |     pub fn spacers<const N: usize>(&self, area: Rect) -> [Rect; N] {\n  647 |         let (_, spacers) = self.split_with_spacers(area);\n  648 |         spacers\n  649 |             .as_ref()\n  650 |             .try_into()\n  651 |             .expect(\"invalid number of rects\")\n  652 |     }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"`cached_split` builds the cache key as `(area, self.clone())` on every call,\nwhich clones the entire `Layout` (including its `Vec<Constraint>`) even on a\ncache hit. `split`/`areas` are called on every widget render, so this is a\nheap allocation per layout lookup in the hot render path, defeating part of the\nbenefit of caching. The no_std variant clones twice (once for the lookup, once\nfor insertion).","fix":"Use a borrowed/hashable key for lookup (e.g. implement a Borrow-based key or\nhash the (area, layout) without owning a clone), and only clone the Layout when\nactually inserting a new entry on a cache miss.","locations":[{"ref":"ratatui-core/src/layout/layout.rs:751-791","code":"  751 |     #[cfg(all(feature = \"layout-cache\", feature = \"std\"))]\n  752 |     fn cached_split(&self, area: Rect) -> (Segments, Spacers) {\n  753 |         LAYOUT_CACHE.with_borrow_mut(|cache| {\n  754 |             let key = (area, self.clone());\n  755 |             cache.get_or_insert(key, || self.split_layout(area)).clone()\n  756 |         })\n  757 |     }\n  758 | \n  759 |     // no_std builds: use a critical-section cache and compute layouts outside locks.\n  760 |     #[cfg(all(feature = \"layout-cache\", not(feature = \"std\")))]\n  761 |     fn cached_split(&self, area: Rect) -> (Segments, Spacers) {\n  762 |         // Check cache inside critical section, but compute outside to avoid\n  763 |         // blocking interrupts during the (expensive) constraint solver.\n  764 |         let cached = critical_section::with(|cs| {\n  765 |             let mut cache = LAYOUT_CACHE.borrow(cs).borrow_mut();\n  766 |             let cache = cache.get_or_insert_with(|| {\n  767 |                 Cache::new(NonZeroUsize::new(Self::DEFAULT_CACHE_SIZE).unwrap())\n  768 |             });\n  769 |             let key = (area, self.clone());\n  770 |             cache\n  771 |                 .get(&key)\n  772 |                 .map(|(s, sp)| (Rc::from(s.as_slice()), Rc::from(sp.as_slice())))\n  773 |         });\n  774 | \n  775 |         match cached {\n  776 |             Some(result) => result,\n  777 |             None => {\n  778 |                 let result = self.split_layout(area);\n  779 | \n  780 |                 critical_section::with(|cs| {\n  781 |                     let mut cache = LAYOUT_CACHE.borrow(cs).borrow_mut();\n  782 |                     if let Some(cache) = cache.as_mut() {\n  783 |                         let key = (area, self.clone());\n  784 |                         cache.put(key, (result.0.to_vec(), result.1.to_vec()));\n  785 |                     }\n  786 |                 });\n  787 | \n  788 |                 result\n  789 |             }\n  790 |         }\n  791 |     }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"`Buffer::merge` relocates existing content cell-by-cell using `pos_of` (which\nperforms a div and mod per cell) and clones each `Cell` individually, then does\nthe same for the other buffer. For large buffers this is O(n) div/mod plus n\nclones with per-cell `reset`. When the area does not actually change\n(`self.area == area` and offsets align), the entire relocation loop still runs\nand clones cells onto themselves-only the `if i != k` guard avoids the copy.","fix":"Short-circuit when `self.area == area` (no relocation needed). Consider\nrow-wise copying using slice operations instead of per-cell `pos_of`/clone.","locations":[{"ref":"ratatui-core/src/buffer/buffer.rs:435-461","code":"  435 |     pub fn merge(&mut self, other: &Self) {\n  436 |         let area = self.area.union(other.area);\n  437 |         self.content.resize(area.area() as usize, Cell::EMPTY);\n  438 | \n  439 |         // Move original content to the appropriate space\n  440 |         let size = self.area.area() as usize;\n  441 |         for i in (0..size).rev() {\n  442 |             let (x, y) = self.pos_of(i);\n  443 |             // New index in content\n  444 |             let k = ((y - area.y) * area.width + x - area.x) as usize;\n  445 |             if i != k {\n  446 |                 self.content[k] = self.content[i].clone();\n  447 |                 self.content[i].reset();\n  448 |             }\n  449 |         }\n  450 | \n  451 |         // Push content of the other buffer into this one (may erase previous\n  452 |         // data)\n  453 |         let size = other.area.area() as usize;\n  454 |         for i in 0..size {\n  455 |             let (x, y) = other.pos_of(i);\n  456 |             // New index in content\n  457 |             let k = ((y - area.y) * area.width + x - area.x) as usize;\n  458 |             self.content[k] = other.content[i].clone();\n  459 |         }\n  460 |         self.area = area;\n  461 |     }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"`Color::from_str` performs `to_lowercase()` followed by seven chained `String::replace` calls. Each of these allocates a new `String`, so parsing any color string allocates roughly eight intermediate heap strings even for the trivial cases (e.g. \"red\"). While color parsing is not usually a hot path, this is wasteful for code that parses many colors (e.g. loading large themes).","fix":"Normalize once into a single buffer (e.g. build a lowercased, separator-stripped string in one pass) and match on the small set of known names, applying the bright/grey/silver aliasing without repeated full-string `replace` allocations.","locations":[{"ref":"ratatui-core/src/style/color.rs:293-303","code":"  293 |             match s\n  294 |                 .to_lowercase()\n  295 |                 .replace([' ', '-', '_'], \"\")\n  296 |                 .replace(\"bright\", \"light\")\n  297 |                 .replace(\"grey\", \"gray\")\n  298 |                 .replace(\"silver\", \"gray\")\n  299 |                 .replace(\"lightblack\", \"darkgray\")\n  300 |                 .replace(\"lightwhite\", \"white\")\n  301 |                 .replace(\"lightgray\", \"white\")\n  302 |                 .as_ref()\n  303 |             {"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"`List` rendering allocates a fresh highlight/empty-symbol buffer on every render: `\" \".repeat(width)`\nbuilds a new `String` and `.to_line()` builds a new `Line` each frame, even when no item is selected\nand `selection_spacing` would be false. This allocation is done unconditionally before the spacing\ndecision and runs on every render call.","fix":"Compute `empty_symbol` lazily only when `selection_spacing` is true, and avoid the intermediate `String`/`Line` allocation (e.g. render spaces directly).","locations":[{"ref":"ratatui-widgets/src/list/rendering.rs:66-71","code":"   66 |         let highlight_symbol_width = highlight_symbol.width() as u16;\n   67 |         let empty_symbol = \" \".repeat(highlight_symbol_width as usize);\n   68 |         let empty_symbol = empty_symbol.to_line();\n   69 | \n   70 |         let mut current_height = 0;\n   71 |         let selection_spacing = self.highlight_spacing.should_add(state.selected.is_some());"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"In the hot `WordWrapper::next_line` path, every emitted wrapped line recomputes its display width by\niterating all of its graphemes and summing `symbol.cell_width()`. The width of each line is already\nfully known inside `process_input` (it is tracked in the `line_width` accumulator) but is discarded\nwhen the line is pushed into `wrapped_lines`. For large/wrapped paragraphs this doubles the\nper-grapheme width computation work on the rendering hot path.","fix":"Store the computed width alongside each line (e.g. push `(Vec<StyledGrapheme>, u16)` into `wrapped_lines`) so `next_line` can return it directly instead of recomputing.","locations":[{"ref":"ratatui-widgets/src/reflow.rs:214-219","code":"  214 |             if let Some(line) = self.wrapped_lines.pop_front() {\n  215 |                 let line_width = line\n  216 |                     .iter()\n  217 |                     .map(|grapheme| grapheme.symbol.cell_width())\n  218 |                     .sum();\n  219 | "}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"`render_rows` calls `columns_widths.iter().collect()` to build a fresh `Vec<&Rect>` for every\nvisible row before passing it to `render_row_cells`, which immediately turns it back into an\niterator. This allocates one temporary Vec per rendered row on every frame, in the hot render loop,\nfor no functional reason.","fix":"Change `render_row_cells` to accept `&[Rect]` (or an `impl Iterator<Item = &Rect>`) instead of\n`Vec<&Rect>`, and pass `columns_widths` directly (`columns_widths.iter()`), avoiding the per-row\nallocation.","locations":[{"ref":"ratatui-widgets/src/table.rs:877","code":"  877 |             self.render_row_cells(buf, columns_widths.iter().collect(), &row.cells, row_area);"},{"ref":"ratatui-widgets/src/table.rs:916-923","code":"  916 |     fn render_row_cells(\n  917 |         &self,\n  918 |         buf: &mut Buffer,\n  919 |         column_widths: Vec<&Rect>,\n  920 |         cells: &Vec<Cell>,\n  921 |         row_area: Rect,\n  922 |     ) {\n  923 |         let mut column_widths_iterator = column_widths.into_iter();"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","description":"The `Layout::spacing` doc states: \"spacing will not be applied for\n[`Flex::SpaceAround`], [`Flex::SpaceEvenly`] and [`Flex::SpaceBetween`]\". This\ncontradicts `configure_flex_constraints`, which for exactly those three flex\nmodes adds `spacer.has_min_size(spacing, SPACER_SIZE_EQ)` constraints, so the\nuser-provided spacing IS applied as a minimum gap between segments. Either the\ndocumentation is wrong or the constraint application is. The behavior (spacing\napplied) appears intended, so the comment is misleading.","fix":"Update the `spacing` doc comment to describe the actual behavior (spacing acts\nas a minimum spacer size for SpaceAround/SpaceEvenly/SpaceBetween), or remove\nthe `has_min_size(spacing, ...)` calls if no spacing is truly desired there.","locations":[{"ref":"ratatui-core/src/layout/layout.rs:522-524","code":"  522 |     /// Note that if the layout has only one segment, the spacing will not be applied.\n  523 |     /// Also, spacing will not be applied for [`Flex::SpaceAround`], [`Flex::SpaceEvenly`] and\n  524 |     /// [`Flex::SpaceBetween`]"},{"ref":"ratatui-core/src/layout/layout.rs:1012-1073","code":" 1012 |         Flex::SpaceAround => {\n 1013 |             if spacers.len() <= 2 {\n 1014 |                 // If there are two or less spacers, fallback to Flex::SpaceEvenly\n 1015 |                 for (left, right) in spacers.iter().tuple_combinations() {\n 1016 |                     solver.add_constraint(left.has_size(right, SPACER_SIZE_EQ))?;\n 1017 |                 }\n 1018 |                 for spacer in spacers {\n 1019 |                     solver.add_constraint(spacer.has_min_size(spacing, SPACER_SIZE_EQ))?;\n 1020 |                     solver.add_constraint(spacer.has_size(area, SPACE_GROW))?;\n 1021 |                 }\n 1022 |             } else {\n 1023 |                 // Separate the first and last spacer from the middle ones\n 1024 |                 let (first, rest) = spacers.split_first().unwrap();\n 1025 |                 let (last, middle) = rest.split_last().unwrap();\n 1026 | \n 1027 |                 // All middle spacers should be equal in size\n 1028 |                 for (left, right) in middle.iter().tuple_combinations() {\n 1029 |                     solver.add_constraint(left.has_size(right, SPACER_SIZE_EQ))?;\n 1030 |                 }\n 1031 | \n 1032 |                 // First and last spacers should be half the size of any middle spacer\n 1033 |                 if let Some(first_middle) = middle.first() {\n 1034 |                     solver.add_constraint(first_middle.has_double_size(first, SPACER_SIZE_EQ))?;\n 1035 |                     solver.add_constraint(first_middle.has_double_size(last, SPACER_SIZE_EQ))?;\n 1036 |                 }\n 1037 | \n 1038 |                 // Apply minimum size and growth constraints\n 1039 |                 for spacer in spacers {\n 1040 |                     solver.add_constraint(spacer.has_min_size(spacing, SPACER_SIZE_EQ))?;\n 1041 |                     solver.add_constraint(spacer.has_size(area, SPACE_GROW))?;\n 1042 |                 }\n 1043 |             }\n 1044 |         }\n 1045 | \n 1046 |         // All spacers are the same size and will grow to fill any remaining space after the\n 1047 |         // constraints are satisfied\n 1048 |         Flex::SpaceEvenly => {\n 1049 |             for (left, right) in spacers.iter().tuple_combinations() {\n 1050 |                 solver.add_constraint(left.has_size(right, SPACER_SIZE_EQ))?;\n 1051 |             }\n 1052 |             for spacer in spacers {\n 1053 |                 solver.add_constraint(spacer.has_min_size(spacing, SPACER_SIZE_EQ))?;\n 1054 |                 solver.add_constraint(spacer.has_size(area, SPACE_GROW))?;\n 1055 |             }\n 1056 |         }\n 1057 | \n 1058 |         // All spacers excluding first and last are the same size and will grow to fill\n 1059 |         // any remaining space after the constraints are satisfied.\n 1060 |         // The first and last spacers are zero size.\n 1061 |         Flex::SpaceBetween => {\n 1062 |             for (left, right) in spacers_except_first_and_last.iter().tuple_combinations() {\n 1063 |                 solver.add_constraint(left.has_size(right.size(), SPACER_SIZE_EQ))?;\n 1064 |             }\n 1065 |             for spacer in spacers_except_first_and_last {\n 1066 |                 solver.add_constraint(spacer.has_min_size(spacing, SPACER_SIZE_EQ))?;\n 1067 |                 solver.add_constraint(spacer.has_size(area, SPACE_GROW))?;\n 1068 |             }\n 1069 |             if let (Some(first), Some(last)) = (spacers.first(), spacers.last()) {\n 1070 |                 solver.add_constraint(first.is_empty())?;\n 1071 |                 solver.add_constraint(last.is_empty())?;\n 1072 |             }\n 1073 |         }"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","description":"The per-constant rustfmt::skip doc comment for the Tailwind `TEAL` palette contains the wrong hex values. The HTML swatches on that doc line list `#f5fdf4 #e7f9e7 #c6f6d5 #9ae6b4 #68d391 #48bb78 #38a169 #2f855a #276749 #22543d #0d3321` (these are a green/Chakra-style ramp), whereas the actual `TEAL` constant (and the module-level doc table at lines 157-163) correctly use the teal ramp (`#f0fdfa` ... `#042f2e`). The rendered rustdoc swatch for TEAL is therefore completely wrong.","fix":"Replace the hex values in the doc comment on line 496 with the correct teal ramp matching the constant: f0fdfa, ccfbf1, 99f6e4, 5eead4, 2dd4bf, 14b8a6, 0d9488, 0f766e, 115e59, 134e4a, 042f2e.","locations":[{"ref":"ratatui-core/src/style/palette/tailwind.rs:495-496","code":"  495 | #[rustfmt::skip]\n  496 | /// <style>.palette div{width:2rem;height:2rem}<\/style><div class=\"palette\" style=\"display:flex;flex-direction:row\"><div style=\"background-color: #f5fdf4\"><\/div><div style=\"background-color: #e7f9e7\"><\/div><div style=\"background-color: #c6f6d5\"><\/div><div style=\"background-color: #9ae6b4\"><\/div><div style=\"background-color: #68d391\"><\/div><div style=\"background-color: #48bb78\"><\/div><div style=\"background-color: #38a169\"><\/div><div style=\"background-color: #2f855a\"><\/div><div style=\"background-color: #276749\"><\/div><div style=\"background-color: #22543d\"><\/div><div style=\"background-color: #0d3321\"><\/div><\/div>"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment for `Backend::scroll_region_down` tells the reader to \"See the documentation for\n[`Self::scroll_region_down`] for more information\" — it references itself instead of\n`scroll_region_up`. The intent is clearly to point at the up-scroll variant (which carries the\ndetailed ANSI explanation); the self-reference is a copy/paste mistake.","fix":"Change the cross-reference to `[`Self::scroll_region_up`]`.","locations":[{"ref":"ratatui-core/src/backend.rs:375-377","code":"  375 |     /// See the documentation for [`Self::scroll_region_down`] for more information about how this\n  376 |     /// is expected to be implemented for ANSI terminals. All of that applies, except the ANSI\n  377 |     /// sequence to scroll down is \"^[[NT\"."}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The Tailwind module doc says \"There are 22 palettes\" (line 5) but the documentation table only lists 21 palettes (SLATE through PINK). The `ROSE` palette is exported as a constant (line 641) but is entirely missing from the doc table, so the count and the table are inconsistent.","fix":"Add a ROSE row to the module-level doc table so it matches the 22-palette count and the exported constants.","locations":[{"ref":"ratatui-core/src/style/palette/tailwind.rs:5-7","code":"    5 | //! There are 22 palettes. Each palette has 11 colors, with variants from 50 to 950. Black and White\n    6 | //! are also included for completeness and to avoid being affected by any terminal theme that might\n    7 | //! be in use."},{"ref":"ratatui-core/src/style/palette/tailwind.rs:639-653","code":"  639 | #[rustfmt::skip]\n  640 | /// <style>.palette div{width:22rem;height:2rem}<\/style><div class=\"palette\" style=\"display:flex;flex-direction:row\"><div style=\"background-color: #fff1f2\"><\/div><div style=\"background-color: #ffe4e6\"><\/div><div style=\"background-color: #fecdd3\"><\/div><div style=\"background-color: #fda4af\"><\/div><div style=\"background-color: #fb7185\"><\/div><div style=\"background-color: #f43f5e\"><\/div><div style=\"background-color: #e11d48\"><\/div><div style=\"background-color: #be123c\"><\/div><div style=\"background-color: #9f1239\"><\/div><div style=\"background-color: #881337\"><\/div><div style=\"background-color: #4c0519\"><\/div><\/div>\n  641 | pub const ROSE: Palette = Palette {\n  642 |     c50: Color::from_u32(0xfff1f2),\n  643 |     c100: Color::from_u32(0xffe4e6),\n  644 |     c200: Color::from_u32(0xfecdd3),\n  645 |     c300: Color::from_u32(0xfda4af),\n  646 |     c400: Color::from_u32(0xfb7185),\n  647 |     c500: Color::from_u32(0xf43f5e),\n  648 |     c600: Color::from_u32(0xe11d48),\n  649 |     c700: Color::from_u32(0xbe123c),\n  650 |     c800: Color::from_u32(0x9f1239),\n  651 |     c900: Color::from_u32(0x881337),\n  652 |     c950: Color::from_u32(0x4c0519),\n  653 | };"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The module-level Tailwind color table contains several transcription errors where the documented swatch hex values disagree with the actual exported constants (the constants are correct):\n- `GRAY` c950: table shows `#0a0a0a` (line 42) but the constant is `0x030712`.\n- `ZINC` row (lines 48-53): the table reproduces the NEUTRAL ramp (`#f5f5f5 #e5e5e5 #d4d4d4 ... #404040 #262626 #171717 #0a0a0a`) instead of zinc's actual values (`f4f4f5 e4e4e7 d4d4d8 ... 3f3f46 27272a 18181b 09090b`).\n- `PURPLE` c950: table shows `#4c136e` (line 229) but constant is `0x3b0764`.\n- `FUCHSIA` c950: table shows `#4e145b` (line 240) but constant is `0x4a044e`.\n- `PINK` c950: table shows `#5f0b37` (line 251) but constant is `0x500724`.\nThese produce misleading rustdoc swatches.","fix":"Correct the documented swatch hex values to match the exported constants (and the official Tailwind palette).","locations":[{"ref":"ratatui-core/src/style/palette/tailwind.rs:42","code":"   42 | //!     <div style=\"background-color: #0a0a0a\"><\/div>"},{"ref":"ratatui-core/src/style/palette/tailwind.rs:48-53","code":"   48 | //!     <div style=\"background-color: #fafafa\"><\/div> <div style=\"background-color: #f5f5f5\"><\/div>\n   49 | //!     <div style=\"background-color: #e5e5e5\"><\/div> <div style=\"background-color: #d4d4d4\"><\/div>\n   50 | //!     <div style=\"background-color: #a1a1aa\"><\/div> <div style=\"background-color: #71717a\"><\/div>\n   51 | //!     <div style=\"background-color: #52525b\"><\/div> <div style=\"background-color: #404040\"><\/div>\n   52 | //!     <div style=\"background-color: #262626\"><\/div> <div style=\"background-color: #171717\"><\/div>\n   53 | //!     <div style=\"background-color: #0a0a0a\"><\/div>"},{"ref":"ratatui-core/src/style/palette/tailwind.rs:229","code":"  229 | //!     <div style=\"background-color: #4c136e\"><\/div>"},{"ref":"ratatui-core/src/style/palette/tailwind.rs:240","code":"  240 | //!     <div style=\"background-color: #4e145b\"><\/div>"},{"ref":"ratatui-core/src/style/palette/tailwind.rs:251","code":"  251 | //!     <div style=\"background-color: #5f0b37\"><\/div>"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"`try_draw`'s doc states: \"If the render callback returns an error, Ratatui leaves the backend,\nbuffers, cursor state, and frame count unchanged.\" This is not strictly true: `autoresize()` runs\nBEFORE the render callback, and on a size change it resizes both buffers, clears the affected\nregion of the backend, and updates `last_known_area`/`viewport_area`. If the callback then returns\nan error, those resize/clear side effects on the backend and buffers persist. The more accurate\ndescription in `terminal.rs` (\"Ratatui may have already resized internal buffers, written part of\nthe diff, or left cursor state unapplied\") contradicts this claim.","fix":"Reword to clarify that buffers/backend may already have been resized/cleared by the pre-render\nautoresize step, and only the render diff, cursor application, buffer swap, and frame-count\nincrement are skipped on a callback error.","locations":[{"ref":"ratatui-core/src/terminal/render.rs:124-125","code":"  124 |     /// If the render callback returns an error, Ratatui leaves the backend, buffers, cursor state,\n  125 |     /// and frame count unchanged."}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `part_lengths` doc comment states the method \"returns the length of the start, thumb, and end as\na tuple\", and the returned tuple is `(thumb_start, thumb_length, track_end)`. The first element is\nbound at the call site as `track_start_len` (the track length before the thumb), but the local\nvariable is named `thumb_start`, which describes a position, not a length. The naming is misleading\nrelative to both the doc and the semantic meaning (track-start length), making the math harder to\naudit.","fix":"Rename `thumb_start` to `track_start_len` (it is the number of track cells before the thumb), matching the call-site binding and the doc comment.","locations":[{"ref":"ratatui-widgets/src/scrollbar.rs:588-595","code":"  588 |         let thumb_start = rounding_divide(\n  589 |             start_position.saturating_mul(track_length),\n  590 |             max_viewport_position,\n  591 |         )\n  592 |         .clamp(0, track_length.saturating_sub(1));\n  593 | \n  594 |         let track_end = track_length.saturating_sub(thumb_start + thumb_length);\n  595 |         (thumb_start, thumb_length, track_end)"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment for `get_cell_area` states it returns `Some(Rect{x, y = 0, width, height = 0})`,\nbut the implementation returns `Rect::new(first.x, first.y, width, 1)` — `y` is `first.y` (not 0)\nand `height` is `1` (not 0). The documented contract does not match the code.","fix":"Update the doc comm
