<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"timeSet() recovers from any exception by recursively retrying with hours + 1. If the underlying problem is not a DST/illegal-instant gap (e.g. a genuine bug or a date where every hour is somehow rejected) this recurses unbounded and overflows the stack (StackOverflowError -> crash). Even in the intended DST case, hours can exceed 23 (e.g. 23 -> 24) which is then passed to DateTime.withHourOfDay(24) and throws again, and the recursion keeps incrementing hours far past any valid value. There is no upper bound check.","fix":"Bound the retry: only retry on the specific DST/illegal-instant exception and use ((hours + 1) % 24), with a guard (e.g. a retry counter or a single retry) so it cannot recurse indefinitely. Prefer DateTime.withTime that handles gaps, or catch IllegalInstantException specifically.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/EventActivity.kt:2002-2021","code":" 2002 |     private fun timeSet(hours: Int, minutes: Int, isStart: Boolean) {\n 2003 |         try {\n 2004 |             if (isStart) {\n 2005 |                 val diff = mEventEndDateTime.seconds() - mEventStartDateTime.seconds()\n 2006 | \n 2007 |                 mEventStartDateTime =\n 2008 |                     mEventStartDateTime.withHourOfDay(hours).withMinuteOfHour(minutes)\n 2009 |                 updateStartTimeText()\n 2010 | \n 2011 |                 mEventEndDateTime = mEventStartDateTime.plusSeconds(diff.toInt())\n 2012 |                 updateEndTexts()\n 2013 |             } else {\n 2014 |                 mEventEndDateTime = mEventEndDateTime.withHourOfDay(hours).withMinuteOfHour(minutes)\n 2015 |                 updateEndTimeText()\n 2016 |             }\n 2017 |         } catch (e: Exception) {\n 2018 |             timeSet(hours + 1, minutes, isStart)\n 2019 |             return\n 2020 |         }\n 2021 |     }","lines":20}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"updateDays dereferences mDays!! (line 202 and inside the loop). mDays is null until updateMonthlyCalendar runs on the UI thread. updateTextColor() (called from initVariables before the calendar callback completes) calls updateLabels only, but pickTextColor -> updateDays and pickBackgroundColor flows assume mDays is populated. If the asynchronous MonthlyCalendarImpl callback has not yet delivered days when a color is picked very early, mDays!! throws NPE.","fix":"Guard updateDays with `val days = mDays ?: return` instead of using the !! operator.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/WidgetMonthlyConfigureActivity.kt:202","code":"  202 |         val daysLength = mDays!!.size","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/WidgetMonthlyConfigureActivity.kt:225-237","code":"  225 |             for (i in 0 until daysLength) {\n  226 |                 val day = mDays!![i]\n  227 |                 val dayTextColor = if (config.highlightWeekends && day.isWeekend) {\n  228 |                     config.highlightWeekendsColor\n  229 |                 } else {\n  230 |                     mTextColor\n  231 |                 }\n  232 | \n  233 |                 dayViews[i].apply {\n  234 |                     removeAllViews()\n  235 |                     addDayNumber(dayTextColor, day, this)\n  236 |                     context.addDayEvents(day, this, resources, dividerMargin)\n  237 |                 }","lines":13},{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/WidgetMonthlyConfigureActivity.kt:93","code":"   93 |         MonthlyCalendarImpl(this, this).updateMonthlyCalendar(DateTime().withDayOfMonth(1))","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Several pager adapters dereference SparseArray entries with the Kotlin `[]` operator without a\nnull check in their \"current view\" helpers, while sibling helpers in the same files correctly use\n`?.`. MyDayPagerAdapter.printCurrentView does `mFragments[pos].printCurrentView()`,\nMyMonthPagerAdapter.printCurrentView / MyMonthDayPagerAdapter.printCurrentView+getNewEventDayCode /\nMyYearPagerAdapter.printCurrentView / MyWeekPagerAdapter.togglePrintMode all do the same. SparseArray.get\nreturns null if the fragment at `pos` was destroyed/not yet instantiated (FragmentStatePagerAdapter\ndestroys offscreen fragments), so `mFragments[pos]` can be null and the subsequent method call throws\nNullPointerException. The updateCalendars helpers in the same classes correctly guard with `?.`.","fix":"Use safe calls: `mFragments[pos]?.printCurrentView()` / `?.togglePrintMode()` etc., consistent with the updateCalendars/updateScrollY helpers.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/adapters/MyDayPagerAdapter.kt:50-52","code":"   50 |     fun printCurrentView(pos: Int) {\n   51 |         mFragments[pos].printCurrentView()\n   52 |     }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/calendar/adapters/MyMonthPagerAdapter.kt:49-51","code":"   49 |     fun printCurrentView(pos: Int) {\n   50 |         mFragments[pos].printCurrentView()\n   51 |     }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/calendar/adapters/MyMonthDayPagerAdapter.kt:49-53","code":"   49 |     fun printCurrentView(pos: Int) {\n   50 |         mFragments[pos].printCurrentView()\n   51 |     }\n   52 | \n   53 |     fun getNewEventDayCode(pos: Int): String? = mFragments[pos].getNewEventDayCode()","lines":5},{"ref":"app/src/main/kotlin/org/fossify/calendar/adapters/MyYearPagerAdapter.kt:49-51","code":"   49 |     fun printCurrentView(pos: Int) {\n   50 |         mFragments[pos].printCurrentView()\n   51 |     }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/calendar/adapters/MyWeekPagerAdapter.kt:60-62","code":"   60 |     fun togglePrintMode(pos: Int) {\n   61 |         mFragments[pos].togglePrintMode()\n   62 |     }","lines":3}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Unvalidated numeric input parsed with Integer.valueOf into an Int multiplication. The EditText accepts user-typed digits; entering a value with more than ~10 digits (e.g. 99999999999) makes Integer.valueOf throw NumberFormatException and crashes the dialog. Even within Int range, large day counts multiplied by the period multiplier (DAY/WEEK/MONTH/YEAR seconds) silently overflow Int (`days * multiplier`), producing a wrong/negative repeat interval. ifEmpty(\"0\") only guards the empty case, not large or otherwise out-of-range input.","fix":"Parse defensively: val days = value.ifEmpty { \"0\" }.toIntOrNull() ?: 0, and compute the interval in Long (or clamp days to a sane maximum) before passing to the callback to avoid overflow.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/dialogs/CustomEventRepeatIntervalDialog.kt:31-38","code":"   31 |     private fun confirmRepeatInterval() {\n   32 |         val value = binding.dialogCustomRepeatIntervalValue.value\n   33 |         val multiplier = getMultiplier(binding.dialogRadioView.checkedRadioButtonId)\n   34 |         val days = Integer.valueOf(value.ifEmpty { \"0\" })\n   35 |         callback(days * multiplier)\n   36 |         activity.hideKeyboard()\n   37 |         dialog?.dismiss()\n   38 |     }","lines":8}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Same unvalidated-input class as CustomEventRepeatIntervalDialog. Integer.valueOf(periodValue) throws NumberFormatException for input that does not fit in an Int (large digit strings), crashing the dialog. The subsequent `selectedPeriodValue * DAY_SECONDS/WEEK_SECONDS/MONTH_SECONDS` is Int arithmetic that overflows for large but in-range values, yielding a wrong reminder period.","fix":"Use periodValue.toIntOrNull() ?: 0 and perform the seconds multiplication using Long math (or clamp the value) to prevent both the parse crash and the overflow.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/dialogs/CustomPeriodPickerDialog.kt:30-44","code":"   30 |     private fun calculatePeriod(selectedPeriodValue: Int, selectedPeriodValueType: Int) = when (selectedPeriodValueType) {\n   31 |         R.id.dialog_radio_days -> selectedPeriodValue * DAY_SECONDS\n   32 |         R.id.dialog_radio_weeks -> selectedPeriodValue * WEEK_SECONDS\n   33 |         else -> selectedPeriodValue * MONTH_SECONDS\n   34 |     }\n   35 | \n   36 |     private fun confirmReminder() {\n   37 |         val value = binding.dialogCustomPeriodValue.value\n   38 |         val type = binding.dialogRadioView.checkedRadioButtonId\n   39 |         val periodValue = value.ifEmpty { \"0\" }\n   40 |         val period = calculatePeriod(Integer.valueOf(periodValue), type)\n   41 |         callback(period)\n   42 |         activity.hideKeyboard()\n   43 |         dialog?.dismiss()\n   44 |     }","lines":15}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"updateCalendar dereferences the DB lookup result with `calendar!!`. getCalendarWithId(currCalendarId) can return null (e.g. the chosen calendar was deleted/synced away between selection and this background lookup), and the !! then throws NPE on the UI thread, crashing the import flow. currCalendarId is also reassigned from SelectCalendarDialog results, so it is not guaranteed to still exist.","fix":"Null-check the result: `val calendar = activity.calendarsDB.getCalendarWithId(currCalendarId) ?: return@ensureBackgroundThread` (or fall back to the local calendar) before touching the UI.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/dialogs/ImportEventsDialog.kt:119-130","code":"  119 |     private fun updateCalendar(binding: DialogImportEventsBinding) {\n  120 |         ensureBackgroundThread {\n  121 |             val calendar = activity.calendarsDB.getCalendarWithId(currCalendarId)\n  122 |             activity.runOnUiThread {\n  123 |                 binding.importCalendarTitle.setText(calendar!!.getDisplayTitle())\n  124 |                 binding.importCalendarColor.setFillWithStroke(\n  125 |                     calendar.color,\n  126 |                     activity.getProperBackgroundColor()\n  127 |                 )\n  128 |             }\n  129 |         }\n  130 |     }","lines":12}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"NPE crash potential via `event.id!!` in many extension and receiver code paths. Several functions force-unwrap `event.id` (e.g. `getNotificationIntent`, `getPendingIntent`, `getSnoozePendingIntent`, `getMarkCompletedPendingIntent`, `rescheduleReminder`, `scheduleNextEventReminder`, `updateTaskCompletion`, `getEventListItems`). For events not yet persisted (id == null), or partially built Event copies, these throw KotlinNullPointerException. `notifyEvent` even copies the original event (`originalEvent.copy()`) before later calling `getPendingIntent(applicationContext, event)` which does `event.id!!.toInt()`.","fix":"Guard against null id before scheduling/cancelling notifications, or make the contract explicit (only call with persisted events) and document it. At minimum, early-return when id is null instead of force-unwrapping.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/extensions/Context.kt:263-273","code":"  263 | fun Context.getNotificationIntent(event: Event): PendingIntent {\n  264 |     val intent = Intent(this, NotificationReceiver::class.java)\n  265 |     intent.putExtra(EVENT_ID, event.id)\n  266 |     intent.putExtra(EVENT_OCCURRENCE_TS, event.startTS)\n  267 |     return PendingIntent.getBroadcast(\n  268 |         this,\n  269 |         event.id!!.toInt(),\n  270 |         intent,\n  271 |         PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE\n  272 |     )\n  273 | }","lines":11},{"ref":"app/src/main/kotlin/org/fossify/calendar/extensions/Context.kt:618-629","code":"  618 | private fun getPendingIntent(context: Context, event: Event): PendingIntent {\n  619 |     val activityClass = getActivityToOpen(event.isTask())\n  620 |     val intent = Intent(context, activityClass)\n  621 |     intent.putExtra(EVENT_ID, event.id)\n  622 |     intent.putExtra(EVENT_OCCURRENCE_TS, event.startTS)\n  623 |     return PendingIntent.getActivity(\n  624 |         context,\n  625 |         event.id!!.toInt(),\n  626 |         intent,\n  627 |         PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE\n  628 |     )\n  629 | }","lines":12},{"ref":"app/src/main/kotlin/org/fossify/calendar/extensions/Context.kt:631-663","code":"  631 | private fun getSnoozePendingIntent(context: Context, event: Event): PendingIntent {\n  632 |     val snoozeClass =\n  633 |         if (context.config.useSameSnooze) SnoozeService::class.java else SnoozeReminderActivity::class.java\n  634 |     val intent = Intent(context, snoozeClass).setAction(\"Snooze\")\n  635 |     intent.putExtra(EVENT_ID, event.id)\n  636 |     return if (context.config.useSameSnooze) {\n  637 |         PendingIntent.getService(\n  638 |             context,\n  639 |             event.id!!.toInt(),\n  640 |             intent,\n  641 |             PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE\n  642 |         )\n  643 |     } else {\n  644 |         PendingIntent.getActivity(\n  645 |             context,\n  646 |             event.id!!.toInt(),\n  647 |             intent,\n  648 |             PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE\n  649 |         )\n  650 |     }\n  651 | }\n  652 | \n  653 | private fun getMarkCompletedPendingIntent(context: Context, task: Event): PendingIntent {\n  654 |     val intent = Intent(context, MarkCompletedService::class.java).setAction(ACTION rusting a fixed 42-element layout.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/MyWidgetMonthlyProvider.kt:109-117","code":"  109 |         for (i in 0..5) {\n  110 |             val id = res.getIdentifier(\"week_num_$i\", \"id\", packageName)\n  111 |             views.apply {\n  112 |                 setText(id, \"${days[i * 7 + 3].weekOfYear}:\")    // fourth day of the week matters at determining week of the year\n  113 |                 setTextColor(id, textColor)\n  114 |                 setTextSize(id, smallerFontSize)\n  115 |                 setViewVisibility(id, if (displayWeekNumbers) View.VISIBLE else View.GONE)\n  116 |             }\n  117 |         }","lines":9}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"parseRepeatInterval calls value.toInt()/value.toLong() on raw RRULE values without validation. COUNT (line 53), INTERVAL (line 57), and BYMONTHDAY (line 65) parse the value directly. A malformed ICS file (e.g. COUNT=abc, INTERVAL=, or BYMONTHDAY=x) throws NumberFormatException. In IcsImporter this is caught by the outer try/catch (importEvents) and aborts the whole import; in CalDAVHelper.fetchCalDAVCalendarEvents the parse happens inside the cursor lambda with no per-row guard, so one bad RRULE can abort the calendar sync.","fix":"Use toIntOrNull()/toLongOrNull() with sensible fallbacks for COUNT/INTERVAL/BYMONTHDAY, and skip the part if parsing fails instead of throwing.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/Parser.kt:52-67","code":"   52 |             } else if (key == COUNT) {\n   53 |                 repeatLimit = -value.toLong()\n   54 |             } else if (key == UNTIL) {\n   55 |                 repeatLimit = parseDateTimeValue(value)\n   56 |             } else if (key == INTERVAL) {\n   57 |                 repeatInterval *= value.toInt()\n   58 |             } else if (key == BYDAY) {\n   59 |                 if (repeatI :[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/IcsImporter.kt:516-522","code":"  516 |     private fun getTitle(title: String): String {\n  517 |         return if (title.startsWith(\";\") && title.contains(\":\")) {\n  518 |             title.substring(title.lastIndexOf(':') + 1)\n  519 |         } else {\n  520 |             title.substring(1, min(title.length, 180))\n  521 |         }\n  522 |     }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/IcsImporter.kt:136-138","code":"  136 |                     } else if (line.startsWith(SUMMARY) && !isNotificationDescription) {\n  137 |                         curTitle = line.substring(SUMMARY.length)\n  138 |                         curTitle = cleanupString(getTitle(curTitle))","lines":3}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"MyWidgetMonthlyProvider.setupDayOpenIntent uses Integer.parseInt(dayCode) as the PendingIntent request code, and setupAppOpenIntent uses Integer.parseInt(dayCode.substring(0, 6)). A full 8-digit day code like 20991231 exceeds Int.MAX_VALUE? No (20991231 < 2.1e9), but it is parsed as a plain Int and is fine; however if dayCode is ever malformed/non-numeric (e.g. the \"0\" fallback or a corrupted code) parseInt throws NumberFormatException, crashing widget setup. No validation precedes the parse.","fix":"Validate dayCode is the expected numeric format (or use dayCode.toIntOrNull() with a fallback request code) before passing to PendingIntent.getActivity.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/MyWidgetMonthlyProvider.kt:52-67","code":"   52 |     private fun setupAppOpenIntent(context: Context, views: RemoteViews, id: Int, dayCode: String) {\n   53 |         (context.getLaunchIntent() ?: Intent(context, SplashActivity::class.java)).apply {\n   54 |             putExtra(DAY_CODE, dayCode)\n   55 |             putExtra(VIEW_TO_OPEN, MONTHLY_VIEW)\n   56 |             val pend dler.removeCallbacksAndMessages(null)\n  487 |                     fadeOutHandler.postDelayed({\n  488 |                         animate().alpha(0f).withEndAction {\n  489 |                             beGone()\n  490 |                         }\n  491 |                     }, PLUS_FADEOUT_DELAY)\n  492 |                 }","lines":8},{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/WeekFragment.kt:224-227","code":"  224 |     override fun onDestroyView() {\n  225 |         super.onDestroyView()\n  226 |         mWasDestroyed = true\n  227 |     }","lines":4}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"`NotificationReceiver` and `AutomaticBackupReceiver` acquire a PARTIAL_WAKE_LOCK with `wakelock.acquire(3000)` but never release it and never use `goAsync()`. The wakelock is only auto-released by its 3000ms timeout. Worse, the actual work runs on a background thread via `ensureBackgroundThread` (NotificationReceiver) / synchronously calling `backupEventsAndTasks` which itself dispatches to a background thread (AutomaticBackupReceiver); `onReceive` returns immediately, so the process can be killed before the background work finishes and the wakelock is held with no work tracked against it. Compare `RescheduleEventsReceiver`, which correctly uses `goAsync()`/`result.finish()`.","fix":"Use `goAsync()` to keep the receiver alive across the background work and call `result.finish()` when done; explicitly `wakelock.release()` in a finally (the timed acquire is a fragile substitute for proper release).","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/receivers/NotificationReceiver.kt:17-25","code":"   17 |     override fun onReceive(context: Context, intent: Intent) {\n   18 |         val powerManager = context.getSystemService(Context.POWER_SERVICE) as PowerManager\n   19 |         val wakelock = powerManager.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, \"simplecalendar:notificationreceiver\")\n   20 |         wakelock.acquire(3000)\n   21 | \n   22 |         ensureBackgroundThread {\n   23 |             handleIntent(context, intent)\n   24 |         }\n   25 |     }","lines":9},{"ref":"app/src/main/kotlin/org/fossify/calendar/receivers/AutomaticBackupReceiver.kt:11-16","code":"   11 |     override fun onReceive(context: Context, intent: Intent) {\n   12 |         val powerManager = context.getSystemService(Context.POWER_SERVICE) as PowerManager\n   13 |         val wakelock = powerManager.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, \"simplecalendar:automaticbackupreceiver\")\n   14 |         wakelock.acquire(3000)\n   15 |         context.backupEventsAndTasks()\n   16 |     }","lines":6}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"SimpleActivity creates a Handler() with the default (main) looper for calDAVRefreshHandler and another inside the ContentObserver. The deprecated no-arg Handler() constructor implicitly captures the current thread's Looper and is a documented source of leaks/wrong-thread bugs. calDAVRefreshHandler holds posted callbacks that capture the activity; they are only cleared via removeCallbacksAndMessages on the next onChange, not in onDestroy.","fix":"Use Handler(Looper.getMainLooper()) and call calDAVRefreshHandler.removeCallbacksAndMessages(null) in onDestroy/onStop to avoid leaking the activity through delayed callbacks.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/SimpleActivity.kt:24","code":"   24 |     val calDAVRefreshHandler = Handler()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/SimpleActivity.kt:64","code":"   64 |     private val calDAVSyncObserver = object : ContentObserver(Handler()) {","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/SimpleActivity.kt:67-76","code":"   67 |             if (!selfChange) {\n   68 |                 calDAVRefreshHandler.removeCallbacksAndMessages(null)\n   69 |                 calDAVRefreshHandler.postDelayed({\n   70 |                     ensureBackgroundThread {\n   71 |                         unregisterObserver()\n   72 |                         calDAVRefreshCallback?.invoke()\n   73 |                         calDAVRefreshCallback = null\n   74 |                     }\n   75 |                 }, CALDAV_REFRESH_DELAY)\n   76 |             }","lines":10}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"EditRepeatingEventDialog installs setOnDismissListener { sendResult(null) } which invokes the callback whenever the dialog is dismissed for any reason, including programmatic dismiss() inside sendResult(non-null). So picking an option calls callback(option) then dialog.dismiss() then the dismiss listener fires callback(null). Callers must therefore tolerate a trailing null callback after a real result; if any caller treats null as 'cancelled' and reverts state, the just-applied choice is undone. This double-callback is fragile coupling.","fix":"Guard against the post-result dismiss, e.g. clear the dismiss listener before calling dismiss(), or track a `resultSent` flag and only emit callback(null) from onDismiss when no result was sent.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/dialogs/EditRepeatingEventDialog.kt:34-47","code":"   34 |                 activity.setupDialogStuff(binding.root, this) { alertDialog ->\n   35 |                     dialog = alertDialog\n   36 |                     alertDialog.hideKeyboard()\n   37 |                     alertDialog.setOnDismissListener { sendResult(null) }\n   38 |                 }\n   39 |             }\n   40 |     }\n   41 | \n   42 |     private fun sendResult(allOccurrences: Int?) {\n   43 |         callback(allOccurrences)\n   44 |         if (allOccurrences != null) {\n   45 |             dialog?.dismiss()\n   46 |         }\n   47 |     }","lines":14}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"All page-view fragments hold their ViewBinding in a non-nullable 'lateinit var binding' that is never cleared in onDestroyView. With ViewPager keeping fragments and detaching/re-attaching views, the binding (and thus the entire destroyed view tree) is retained on the fragment instance for the fragment's whole lifetime, and async event callbacks (runOnUiThread blocks) can still touch the stale binding after the view is destroyed.","fix":"Use a nullable binding cleared in onDestroyView (the standard _binding/binding pattern) and guard async callbacks with isAdded/view != null.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/DayFragment.kt:31-32","code":"   31 |     private lateinit var binding: FragmentDayBinding\n   32 |     private lateinit var topNavigationBinding: TopNavigationBinding","lines":2},{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/MonthFragment.kt:42-43","code":"   42 |     private lateinit var binding: FragmentMonthBinding\n   43 |     private lateinit var topNavigationBinding: TopNavigationBinding","lines":2},{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/MonthDayFragment.kt:43","code":"   43 |     private lateinit var binding: FragmentMonthDayBinding","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/EventListFragment.kt:61","code":"   61 |     private lateinit var binding: FragmentEventListBinding","lines":1}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`rescheduleReminder` computes `System.currentTimeMillis() + minutes * 60000`. `minutes * 60000` is Int arithmetic; for `minutes` above ~35791 it overflows Int before being widened to the Long sum, producing a wrong (possibly negative) trigger time. Snooze times are normally small, but a large custom snooze value would silently misbehave.","fix":"Force Long math: `S \n  683 |                     }\n  684 |                 }\n  685 |                 event.repeatLimit++\n  686 |             }\n  687 |             event.addIntervalTime(original)\n  688 |         }\n  689 |         return events","lines":37},{"ref":"app/src/main/kotlin/org/fossify/calendar/models/Event.kt:96-99","code":"   96 |                     repeatInterval % WEEK == 0 -> {\n   97 |                         // step through weekly repetition by days too, as events can trigger multiple times a week\n   98 |                         oldStart.plusDays(1)\n   99 |                     }","lines":4}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"MonthView.allEvents is never cleared before groupAllEvents() repopulates it. The field\nis initialized once to an empty ArrayList and groupAllEvents() only ever calls allEvents.add(...).\nupdateDays() (called on every calendar refresh / data change while the same MonthView instance\nis alive) re-runs groupAllEvents(), so previously grouped events stay in the list and new copies\nare appended. The result is duplicated event rectangles drawn on the month grid and an\never-growing list (also a slow memory leak). The lastEvent lookup in the loop\n(allEvents.lastOrNull { it.id == event.id }) is also corrupted by stale entries from prior runs,\nchanging which events get added. allEvents must be cleared at the start of groupAllEvents().","fix":"At the top of groupAllEvents() add `allEvents.clear()` before the days.forEach loop, or\nreassign `allEvents = ArrayList()` at the start. This ensures each updateDays() produces a fresh\ngrouping instead of accumulating duplicates across refreshes.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/views/MonthView.kt:60","code":"   60 |     private var allEvents = ArrayList<MonthViewEvent>()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/views/MonthView.kt:133-174","code":"  133 |     private fun groupAll ivate fun getStartEndTimes(): Pair<Long, Long> {\n  609 |         if (mIsAllDayEvent) {\n  610 |             val newStartTS = mEventStartDateTime.withTimeAtStartOfDay().seconds()\n  611 |             val newEndTS = mEventEndDateTime.withTimeAtStartOfDay().withHourOfDay(12).seconds()\n  612 |             return Pair(newStartTS, newEndTS)\n  613 |         } else {\n  614 |             val offset = if (\n  615 |                 !config.allowChangingTimeZones\n  616 |                 || mEvent.getTimeZoneString().equals(mOriginalTimeZone, true)\n  617 |             ) {\n  618 |                 0\n  619 |             } else {\n  620 |                 val original = mOriginalTimeZone.ifEmpty { DateTimeZone.getDefault().id }\n  621 |                 val millis = System.currentTimeMillis()\n  622 |                 val newOffset = DateTimeZone.forID(mEvent.getTimeZoneString()).getOffset(millis)\n  623 |                 val oldOffset = DateTimeZone.forID(original).getOffset(millis)\n  624 |                 (newOffset - oldOffset) / 1000L\n  625 |             }\n  626 | \n  627 |             val newStartTS = mEventStartDateTime.seconds() - offset\n  628 |             val newEndTS = mEventEndDateTime.seconds() - offset\n  629 |             return Pair(newStartTS, newEndTS)\n  630 |         }\n  631 |     }","lines":24}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"fetchNextPeriod() fetches the next (later) time period but inserts every fetched event with searchResultEvents.add(0, event) - i.e. at the FRONT of the list, identical to fetchPreviousPeriod(). It then calls showSearchResultEvents(..., UPDATE_BOTTOM). showSearchResultEvents re-sorts implicitly only via getEventListItems, so the front/back insertion may be benign, but the two fetch directions use the exact same insertion index, which is suspicious copy-paste: \"next period\" results logically belong appended, not prepended.","fix":"Verify ordering: app rElse(1) { REMINDER_OFF }\n  266 |         config.defaultReminder3 = reminders.getOrElse(2) { REMINDER_OFF }\n  267 |     }","lines":11}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In TaskActivity.saveTask(), the completed-task migration block runs inside mTask.apply{} and reads/writes mTask.flags, but it captures copy(startTS = mOriginalStartTS) and schedules updateTaskCompletion on a background thread while the surrounding code continues to mutate mTask (importId, flags, reminders, etc.) and then calls storeTask. This creates a race between the migration write and the main task store, and the flag removal (removeBit(FLAG_TASK_COMPLETED)) is applied before flags is overwritten two lines later by addBitIf(...FLAG_ALL_DAY), so the FLAG_TASK_COMPLETED removal can be partly redundant/confusing.","fix":"Perform the completion migration deterministically (sequence it before the final store, off the apply block) and base the final flags value explicitly on the intended bits rather than relying on intermediate mutations.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/TaskActivity.kt:536-566","code":"  536 |         mTask.apply {\n  537 |             startTS = mTaskDateTime.withSecondOfMinute(0).withMillisOfSecond(0).seconds()\n  538 |             endTS = startTS\n  539 |             title = newTitle\n  540 |             description = binding.taskDescription.value\n  541 | \n  542 |             // migrate completed task to the new completed tasks db\n  543 |             if (!wasRepeatable && mTask.isTaskCompleted()) {\n  544 |                 mTask.flags = mTask.flags.removeBit(FLAG_TASK_COMPLETED)\n  545 |                 ensureBackgroundThread {\n  546 |                     updateTaskCompletion(copy(startTS = mOriginalStartTS), true)\n  547 |                 }\n  548 |             }\n  549 |             importId = newImportId\n  550 |             flags = mTask.flags.addBitIf(b \n   81 |             val endText = Formatter.getTimeFromTS(context, item.endTS)\n   82 |             if (item.startTS != item.endTS) {\n   83 |                 if (!item.isAllDay) {\n   84 |                     timeText += \" - $endText\"\n   85 |                 }\n   86 | \n   87 |                 val startCode = Formatter.getDayCodeFromTS(item.startTS)\n   88 |                 val endCode = Formatter.getDayCodeFromTS(item.endTS)\n   89 |                 if (startCode != endCode) {\n   90 |                     timeText += \" (${Formatter.getDateDayTitle(endCode)})\"\n   91 |                 }\n   92 |             }\n   93 | \n   94 |             setText(R.id.event_item_time, timeText)","lines":15}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ManageCalendarsAdapter.deleteCalendars: when a selected calendar is the default\n(LOCAL_CALENDAR_ID), it toasts, removes it from calendarsToDelete and calls toggleItemSelection(false,...)\nthen `break`. The break stops the loop after the FIRST default calendar found, but more importantly\nit mutates `calendarsToDelete` (removes the default) and deselects it, yet then proceeds to call\nlistener?.deleteCalendars(calendarsToDelete, deleteEvents). Because of the break, if multiple\nprotected entries existed only one would be handled (there is only one default so currently benign),\nbut the deselect happens via toggleItemSelection while still iterating selectedKeys conceptually -\nand the subsequent removeSelectedItems(positions) uses positions captured AFTER the deselect,\npotentially removing the wrong rows. The interaction between mutating selection mid-flow and the\nlater getSelectedItemPositions() is fragile.","fix":"Compute calendarsToDelete excluding the default up front, deselect the default before capturing positions, and capture getSelectedItemPositions() consistently relative to what is actually removed.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/adapters/ManageCalendarsAdapter.kt:185-203","code":"  185 |     private fun deleteCalendars(deleteEvents: Boolean) {\n  186 |         val calendarsToDelete = getSelectedItems()\n  187 | \n  188 |         for (key in selectedKeys) {\n  189 |             val type = getItemWithKey(key) ?: continue\n  190 |             if (type.id == LOCAL_CALENDAR_ID) {\n  191 |                 activity.toast(R.string.cannot_delete_default_type)\n  192 |                 calendarsToDelete.remove(type)\n  193 |                 toggleItemSelection(false, getItemKeyPosition(type.id!!.toInt()))\n  194 |                 break\n  195 |             }\n  196 |         }\n  197 | \n  198 |         if (listener?.deleteCalendars(calendarsToDelete, deleteEvents) == true) {\n  199 |             val positions = getSelectedItemPositions()\n  200 |             calendars.removeAll(calendarsToDelete)\n  201 |             removeSelectedItems(positions)\n  202 |         }\n  203 |     }","lines":19}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"QuickFilterCalendarAdapter.onCreateViewHolder divides parentWidth by numberOfItems\n(quickFilterCalendars.size). If quickFilterCalendars is empty, getItemCount returns 0 so\nonCreateViewHolder is normally not called - but the long-click handler iterates allCalendars and\ncalls viewClicked for every calendar including ones not in quickFilterCalendars, and\nnotifyItemRangeChanged(0, itemCount). The selection state is persisted to\nactivity.config.displayCalendars inside viewClicked for ALL calendars during a long press,\nmutating filter state for calendars the user never sees in the quick filter bar. A long-press on\none quick-filter chip thus rewrites displayCalendars based on lastActiveKeys for the entire calendar\nset, which can hide/show calendars absent from the quick bar. This is a surprising side effect.","fix":"Restrict the long-click iteration to quickFilterCalendars (the chips actually shown) rather than allCalendars, so a quick-filter gesture only affects the visible chips.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/adapters/QuickFilterCalendarAdapter.kt:112-133","code":"  112 |                 quickFilterCalendar.setOnLongClickListener {\n  113 |                     if (lastLongClickedType != calendar) {\n  114 |                         lastActiveKeys.clear()\n  115 |                     }\n  116 |                     val activeKeysCopy = HashSet(activeKeys)\n  117 |                     allCalendars.forEach {\n  118 |                         viewClicked(select = lastActiveKeys.contains(it.id!!), calendar = it)\n  119 |                     }\n  120 | \n  121 |                     val shouldSelectCurrent = if (lastLongClickedType != calendar) {\n  122 |                         true\n  123 |                     } else {\n  124 |                         lastActiveKeys.contains(calendar.id!!)\n  125 |                     }\n  126 | \n  127 |                     viewClicked(shouldSelectCurrent, calendar)\n  128 |                     notifyItemRangeChanged(0, itemCount)\n  129 |                     callback()\n  130 |                     lastLongClickedType = calendar\n  131 |                     lastActiveKeys = activeKeysCopy\n  132 |                     true\n  133 |                 }","lines":22},{"ref":"app/src/main/kotlin/org/fossify/calendar/adapters/QuickFilterCalendarAdapter.kt:137-145","code":"  137 |         private fun viewClicked(select: Boolean, calendar: CalendarEntity) {\n  138 |             activity.config.displayCalendars = if (select) {\n  139 |                 activity.config.displayCalendars.plus(calendar.id.toString())\n  140 |             } else {\n  141 |                 activity.config.displayCalendars.minus(calendar.id.toString())\n  142 |             }\n  143 | \n  144 |             toggleItemSelection(select, calendar, adapterPosition)\n  145 |         }","lines":9}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Off-by-one loop bound. childCount children are indexed 0..childCount-1, but the loop runs `for (i in 0..childCount)` (inclusive), so the last iteration calls getChildAt(childCount), which returns null. It does not crash because the null fails the `is RelativeLayout` check, but the loop does one wasted iteration and the inclusive range signals a real misunderstanding of the bound. It should be `0 until childCount` (compare with the correctly-written RepeatRuleWeeklyDialog which uses `0 until cnt`).","fix":"Change `for (i in 0..childCnt)` to `for (i in 0 until childCnt)`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/dialogs/ManageSyncedCalendarsDialog.kt:82-91","code":"   82 |         val childCnt = binding.dialogSelectCalendarsHolder.childCount\n   83 |         for (i in 0..childCnt) {\n   84 |             val child = binding.dialogSelectCalendarsHolder.getChildAt(i)\n   85 |             if (child is RelativeLayout) {\n   86 |                 val check = child.getChildAt(0)\n   87 |                 if (check is MyAppCompatCheckbox && check.isChecked) {\n   88 |                     calendarIds.add(check.tag as Int)\n   89 |                 }\n   90 |             }\n   91 |         }","lines":10}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`updateTaskCompletion` always clears FLAG_TASK_COMPLETED in the main events table at the end (`eventsDB.updateTaskCompletion(event.id!!, event.flags.removeBit(FLAG_TASK_COMPLETED))`), even when `completed == true`. The completion state for the specific occurrence is stored in the `tasks` table, but the comment \"mark event as 'incomplete' in the main events db\" runs unconditionally. For a non-repeating task this means the events-table flag never reflects completion; correctness then depends entirely on the tasks-table lookup in `isTaskCompleted`. This split-source-of-truth is easy to get out of sync and the unconditional clear is surprising.","fix":"Make the events-table flag consistent with the action (set or clear FLAG_TASK_COMPLETED based on `completed`), or document why the main table is always forced to incomplete and rely solely on the tasks table.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/extensions/Context.kt:1079-1096","code":" 1079 | fun Context.updateTaskCompletion(event: Event, completed: Boolean) {\n 1080 |     if (completed) {\n 1081 |         event.flags = event.flags or FLAG_TASK_COMPLETED\n 1082 |         val task = Task(null, event.id!!, event.startTS, event.flags)\n 1083 |         completedTasksDB.insertOrUpdate(task)\n 1084 |     } else {\n 1085 |         event.flags = event.flags.removeBit(FLAG_TASK_COMPLETED)\n 1086 |         completedTasksDB.deleteTaskWithIdAndTs(event.id!!, event.startTS)\n 1087 |     }\n 1088 | \n 1089 |     // remove existing notification (if any) and schedule a new one if needed\n 1090 |     cancelPendingIntent(event.id!!)\n 1091 |     cancelNotification(event.id!!)\n 1092 |     scheduleNextEventReminder(event, showToasts = false)\n 1093 | \n 1094 |     // mark event as \"incomplete\" in the main events db\n 1095 |     eventsDB.updateTaskCompletion(event.id!!, event.flags.removeBit(FLAG_TASK_COMPLETED))\n 1096 | }","lines":18}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"All-day event shift round-trip is asymmetric. `toLocalAllDayEvent` subtracts TWELVE_HOURS from endTS only when `endTS > startTS` (strictly greater), while `toUtcAllDayEvent` adds TWELVE_HOURS when `endTS >= startTS` (greater-or-equal). For a single-day all-day event where endTS == startTS, the UTC conversion adds 12h but the local conversion does not subtract it, so repeated round-trips are not inverse operations and the end time drifts.","fix":"Use consistent comparison operators in both directions (both `>=` or both `>`), matching the intended single-day semantics.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/extensions/Event.kt:9-31","code":"    9 | fun Event.toLocalAllDayEvent() {\n   10 |     require(this.getIsAllDay()) { \"Must be an all day event!\" }\n   11 | \n   12 |     timeZone = DateTimeZone.getDefault().id\n   13 |     startTS = Formatter.getShiftedLocalTS(startTS)\n   14 |     endTS = Formatter.getShiftedLocalTS(endTS)\n   15 |     if (endTS > startTS) {\n   16 |         endTS -= TWELVE_HOURS\n   17 |     }\n   18 | }\n   19 | \n   20 | // shifts all-day events to UTC such that the event starts on the same time in UTC too\n   21 | fun Event.toUtcAllDayEvent() {\n   22 |     require(getIsAllDay()) { \"Must be an all day event!\" }\n   23 | \n   24 |     if (endTS >= startTS) {\n   25 |         endTS += TWELVE_HOURS\n   26 |     }\n   27 | \n   28 |     timeZone = DateTimeZone.UTC.id\n   29 |     startTS = Formatter.getShiftedUtcTS(startTS)\n   30 |     endTS = Formatter.getShiftedUtcTS(endTS)\n   31 | }","lines":23}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`String.getMonthCode()` returns the first 6 chars only when the input is exactly length 8 (a yyyyMMdd day code), otherwise returns \"\". A month code (yyyyMM) passed in directly, or any code of unexpected length, silently yields an empty string with no error, which downstream date parsing can misinterpret. This is a fragile magic-length check that produces a silent wrong/empty result rather than failing or handling the 6-length case.","fix":"Handle both yyyyMM (6) and yyyyMMdd (8) inputs explicitly, or document/validate the expected format and fail loudly on unexpected lengths.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/extensions/String.kt:3","code":"    3 | fun String.getMonthCode() = if (length == 8) substring(0, 6) else \"\"","lines":1}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"isStartTimeDay is computed by comparing maxTS (the event's end timestamp clamped to the week) against its own start-of-day, i.e. getDateTimeFromTS(maxTS) == getDateTimeFromTS(maxTS).withTimeAtStartOfDay(). The variable name and surrounding logic ('start time day') strongly imply this should test the start timestamp (minTS / startDateTime), not maxTS. As written it tests whether the END falls exactly on midnight, which then drives daysCnt = if (numDays == 1 && isStartTimeDay) 0 else numDays and thus the rendered width/duration of all-day / multi-day markers. This is almost certainly a copy/typo using maxTS twice.","fix":"Decide the intended timestamp and use it consistently, e.g. val isStartTimeDay = Formatter.getDateTimeFromTS(minTS) == Formatter.getDateTimeFromTS(minTS).withTimeAtStartOfDay() (or the end equivalent), so both sides do not reference maxTS by accident.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/WeekFragment.kt:972-979","code":"  972 |             val isStartTimeDay =\n  973 |                 Formatter.getDateTimeFromTS(maxTS) == Formatter.getDateTimeFromTS(maxTS)\n  974 |                     .withTimeAtStartOfDay()\n  975 |             val numDays = Days.daysBetween(\n  976 |                 Formatter.getDateTimeFromTS(minTS).toLocalDate(),\n  977 |                 Formatter.getDateTimeFromTS(maxTS).toLocalDate()\n  978 |             ).days\n  979 |             val daysCnt = if (numDays == 1 && isStartTimeDay) 0 else numDays","lines":8}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In fetchCalDAVCalendarEvents the early-return on errorFetchingLocalEvents uses a plain `return` inside the queryCursorInlined lambda (line 233) instead of `return@queryCursorInlined`. Depending on whether the lambda is inlined, `return` may attempt a non-local return from fetchCalDAVCalendarEvents. More importantly the intent is muddled: when local events failed to load, importIdsMap is empty, so every fetched event would be treated as new and re-inserted, and the deletion pass at the end would run against an empty map. The error handling here only toasts per-event and continues partially.","fix":"When errorFetchingLocalEvents is true, abort the whole fetch for this calendar once (return from fetchCalDAVCalendarEvents before the cursor loop) instead of toasting per row and continuing with an empty importIdsMap that causes spurious inserts.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/CalDAVHelper.kt:227-233","code":"  227 |             if (errorFetchingLocalEvents) {\n  228 |                 context.toast(\n  229 |                     context.getString(R.string.fetching_event_failed, \"\\\"$title\\\"\"),\n  230 |                     Toast.LENGTH_LONG\n  231 |                 )\n  232 |                 return\n  233 |             }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/CalDAVHelper.kt:182-188","code":"  182 |         var errorFetchingLocalEvents = false\n  183 |         val existingEvents = try {\n  184 |             context.eventsDB.getEventsFromCalDAVCalendar(\"$CALDAV-$calendarId\")\n  185 |         } catch (e: Exception) {\n  186 |             errorFetchingLocalEvents = true\n  187 |             ArrayList()\n  188 |         }","lines":7}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"EXDATE handling in CalDAV uses the device's current UTC offset to shift a historical EXDATE timestamp. getOffset(System.currentTimeMillis()) returns the offset for *now*, not for the date in the exdate, so DST differences between now and the excluded date produce an off-by-one-hour (and possibly off-by-one-day) error in the computed dayCode, dropping/keeping the wrong occurrence. The accompanying comment ('in a weird way') even admits the hack.","fix":"Parse the exdate as UTC and convert to local using the offset at that instant (DateTimeZone.getDefault().getOffset(dt-in-millis)) or simply parse to a DateTime in the correct zone and take its day code, rather than adding the current offset.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/CalDAVHelper.kt:355-362","code":"  355 |                         if (it.endsWith(\"Z\")) {\n  356 |                             // convert for example \"20190216T230000Z\" to \"20190217000000\" in Slovakia in a weird way\n  357 |                             val formatter = DateTimeFormat.forPattern(\"yyyyMMdd'T'HHmmss'Z'\")\n  358 |                             val offset =\n  359 |                                 DateTimeZone.getDefault().getOffset(System.currentTimeMillis())\n  360 |                             val dt = formatter.parseDateTime(it).plusMillis(offset)\n  361 |                             val dayCode = Formatter.getDayCodeFromDateTime(dt)\n  362 |                             event.addRepetitionException(dayCode)","lines":8}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Existing-event change detection compares hashCode() of two Event objects to decide whether to update (existingEvent.hashCode() != event.hashCode()). Hash collisions are possible (two distinct events with equal hashCode), which would skip a needed update; conversely Event.hashCode must include every synced field or real changes are missed. Using hashCode for equality of content is fragile and a classic source of silent sync bugs. The existing event is also mutated in place (id/lastUpdated/repetitionExceptions zeroed) purely to compute the hash, which is a surprising side effect on a cached object.","fix":"Compare the relevant fields explicitly (or use a dedicated content-equality method / data class equals on a normalized copy) instead of hashCode, and avoid mutating the cached existingEvent; operate on a copy.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/CalDAVHelper.kt:373-392","code":"  373 |             if (importIdsMap.containsKey(event.importId)) {\n  374 |                 val existingEvent = importIdsMap[importId]\n  375 |                 val originalEventId = existingEvent!!.id\n  376 | \n  377 |                 existingEvent.apply {\n  378 |                     this.id = null\n  379 |                     lastUpdated = 0L\n  380 |                     repetitionExceptions = ArrayList()\n  381 |                 }\n  382 | \n  383 |                 if (existingEvent.hashCode() != event.hashCode() && title.isNotEmpty()) {\n  384 |                     event.id = originalEventId\n  385 |                     eventsHelper.updateEvent(\n  386 |                         event = event,\n  387 |                         updateAtCalDAV = false,\n  388 |                         showToasts = false,\n  389 |                         enableCalendar = false,\n  390 |                         updateWidgets = false\n  391 |                     )\n  392 |                 }","lines":20}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Config.lastUsedCaldavCalendarId getter computes its default via getSyncedCalendarIdsAsList().firstOrNull() on every read, and getSyncedCalendarIdsAsList calls Integer.parseInt on each comma-split token. If caldavSyncedCalendarIds ever contains a non-integer token (corrupted prefs, manual edit, or a future format change), parseInt throws NumberFormatException and every read of lastUsedCaldavCalendarId (and getSyncedCalendarIdsAsList) crashes. There is no try/catch or toIntOrNull fallback.","fix":"Use mapNotNull { it.trim().toIntOrNull() } instead of map { Integer.parseInt(it) } so malformed tokens are skipped rather than crashing.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/Config.kt:127-132","code":"  127 |     var lastUsedCaldavCalendarId: Int\n  128 |         get() = prefs.getInt(\n  129 |             LAST_USED_CALDAV_CALENDAR,\n  130 |             getSyncedCalendarIdsAsList().firstOrNull() ?: STORED_LOCALLY_ONLY\n  131 |         )\n  132 |         set(calendarId) = prefs.edit().putInt(LAST_USED_CALDAV_CALENDAR, calendarId).apply()","lines":6},{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/Config.kt:176-178","code":"  176 |     fun getSyncedCalendarIdsAsList() =\n  177 |         caldavSyncedCalendarIds.split(\",\").filter { it.trim().isNotEmpty() }\n  178 |             .map { Integer.parseInt(it) }.toMutableList() as ArrayList<Int>","lines":3}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"getEventsSync calls eventsDB.getEventWithId(it.id!!) for every event in the result set just to read originalEvent.startTS for the birthday/anniversary year suffix, even though that branch only applies to two specific calendar ids. This is an N+1 query per displayed event (every view refresh) and also re-reads the event that is already in hand. For non-birthday calendars the originalEvent fetch is pure waste.","fix":"Only fetch originalEvent inside the birthday/anniversary branch (after the calendarId check), or carry the original startTS on the repeated copies, avoiding a DB hit per event.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/EventsHelper.kt:522-541","code":"  522 |         events.forEach {\n  523 |             if (it.isTask()) {\n  524 |                 updateIsTaskCompleted(it)\n  525 |             }\n  526 | \n  527 |             it.updateIsPastEvent()\n  528 |             val originalEvent = eventsDB.getEventWithId(it.id!!)\n  529 |             if (originalEvent != null &&\n  530 |                 (birthDayEventId != -1L && it.calendarId == birthDayEventId) or\n  531 |                 (anniversaryEventId != -1L && it.calendarId == anniversaryEventId)\n  532 |             ) {\n  533 |                 val eventStartDate = Formatter.getDateFromTS(it.startTS)\n  534 |                 val originalEventStartDate = Formatter.getDateFromTS(originalEvent.startTS)\n  535 |                 if (it.hasMissingYear().not()) {\n  536 |                     val years = (eventStartDate.year - originalEventStartDate.year).coerceAtLeast(0)\n  537 |                     if (years > 0) {\n  538 |                         it.title = \"${it.title} ($years)\"\n  539 |                     }\n  540 |                 }\n  541 |             }","lines":20}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Formatter date-code patterns use 'YYYY' (week-based year, Joda weekyear) instead of 'yyyy' (calendar year) for DAYCODE_PATTERN and YEAR_PATTERN. For dates in the last/first days of a year that fall in a different ISO week-year (e.g. 2024-12-30 is in weekyear 2025, 2021-01-01 is in weekyear 2020), formatting a day code with 'YYYYMMdd' yields the wrong year and an off-by-one-year day code. getYearFromDayCode and getLongMonthYear inherit the same bug. This is a classic Joda 'YYYY vs yyyy' trap that produces wrong day codes around New Year.","fix":"Use lowercase 'yyyy' for the calendar year in DAYCODE_PATTERN and YEAR_PATTERN unless ISO week-year semantics are explicitly intended (they are not for a yyyymmdd day code).","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/Formatter.kt:12-13","code":"   12 |     const val DAYCODE_PATTERN = \"YYYYMMdd\"\n   13 |     const val YEAR_PATTERN = \"YYYY\"","lines":2},{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/Formatter.kt:101","code":"  101 |     fun getDayCodeFromDateTime(dateTime: DateTime) = dateTime.toString(DAYCODE_PATTERN)","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/Formatter.kt:123-134","code":"  123 |     fun getDayCodeFromTS(ts: Long, tz: DateTimeZone = DateTimeZone.getDefault()): String {\n  124 |         val daycode = getDateTimeFromTS(ts, tz).toString(DAYCODE_P ationValue(duration, \"W\")\n  222 |         val days = getDurationValue(duration, \"D\")\n  223 |         val hours = getDurationValue(duration, \"H\")\n  224 |         val minutes = getDurationValue(duration, \"M\")\n  225 |         val seconds = getDurationValue(duration, \"S\")\n  226 | \n  227 |         val minSecs = 60\n  228 |         val hourSecs = minSecs * 60\n  229 |         val daySecs = hourSecs * 24\n  230 |         val weekSecs = daySecs * 7\n  231 | \n  232 |         return seconds + (minutes * minSecs) + (hours * hourSecs) + (days * daySecs) + (weeks * weekSecs)\n  233 |     }\n  234 | \n  235 |     private fun getDurationValue(duration: String, char: String) = Regex(\"[0-9]+(?=$char)\").find(duration)?.value?.toInt() ?: 0","lines":16}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Per-entry fields leak across consecutive ICS entries. curStatus, curAvailability, curAccessLevel, curColor reset partially: resetValues clears curColor but NOT curStatus/curAvailability/curAccessLevel. So if entry A sets STATUS:CANCELLED or CLASS:PRIVATE and entry B omits them, entry B inherits A's values. This silently mislabels imported events' status/availability/access level.","fix":"Add curStatus = Events.STATUS_CONFIRMED, curAvailability = Events.AVAILABILITY_BUSY, curAccessLevel = Events.ACCESS_DEFAULT to resetValues().","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/IcsImporter.kt:531-558","code":"  531 |     private fun resetValues() {\n  532 |         curStart = -1L\n  533 |         curEnd = -1L\n  534 |         curTitle = \"\"\n  535 |         curLocation = \"\"\n  536 |         curDescription = \"\"\n  537 |         curImportId = \"\"\n  538 |         curRecurrenceDayCode = \"\"\n  539 |         curRrule = \"\"\n  540 |         curFlags = 0\n  541 |         curReminderMinutes = ArrayList()\n  542 |         curReminderActions = ArrayList()\n  543 |         curRepeatExceptions = ArrayList()\n  544 |         curRepeatInterval = 0\n  545 |         curRepeatLimit = 0L\n  546 |         curRepeatRule = 0\n  547 |         curCalendarId = LOCAL_CALENDAR_ID\n  548 |         curLastModified = 0L\n  549 |         curCategoryColor = -2\n  550 |         isNotificationDescription = false\n  551 |         isProperReminderAction = false\n  552 |         isSequence = false\n  553 |         isParsingEvent = false\n  554 |         curReminderTriggerMinutes = REMINDER_OFF\n  555 |         curReminderTriggerAction = REMINDER_NOTIFICATION\n  556 |         curType = TYPE_EVENT\n  557 |         curColor = 0\n  558 |     }","lines":28},{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/IcsImporter.kt:204-218","code":"  204 |                         curAccessLevel = when (value) {\n  205 |                             PRIVATE -> Events.ACCESS_PRIVATE\n  206 |                             CONFIDENTIAL -> Events.ACCESS_CONFIDENTIAL\n  207 |                             else -> Events.ACCESS_PUBLIC\n  208 |                         }\n  209 |                     } else if (line.startsWith(STATUS)) {\n  210 |                         if (isParsingTask && line.substring(STATUS.length) == COMPLETED) {\n  211 |                             curFlags = curFlags or FLAG_TASK_COMPLETED\n  212 |                         } else {\n  213 |                             curStatus = when (line.substring(STATUS.length)) {\n  214 |                                 CONFIRMED -> Events.STATUS_CONFIRMED\n  215 |                                 CANCELLED -> Events.STATUS_CANCELED\n  216 |                                 else -> Events.STATUS_TENTATIVE\n  217 |                             }\n  218 |                         }","lines":15},{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/IcsImporter.kt:258-262","code":"  258 |                     } else if (line.startsWith(TRANSP)) {\n  259 |                         line.substring(TRANSP.length).let {\n  260 |                             curAvailability =\n  261 |                                 if (it == TRANSPARENT) Events.AVAILABILITY_FREE else Events.AVAILABILITY_BUSY\n  262 |                         }","lines":5}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"MyWidgetMonthlyProvider keeps targetDate in a companion object (static, process-wide singleton). All instances of the monthly widget therefore share a single navigation state: paging one widget to the next month, or having multiple monthly widgets, makes them all jump to the same month. The PendingIntent broadcasts (PREV/NEXT) also use requestCode 0 for every widget, so they cannot be distinguished per appWidgetId. State should be per-widget-id, not a static field.","fix":"Store the target month per appWidgetId (e.g. in widgetsDB or prefs keyed by widget id) and use distinct PendingIntent request codes per widget, rather than a shared companion-object DateTime and request code 0.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/MyWidgetMonthlyProvider.kt:30-32","code":"   30 |     companion object {\n   31 |         private var targetDate = DateTime.now().withDayOfMonth(1)\n   32 |     }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/MyWidgetMonthlyProvider.kt:44-50","code":"   44 |     private fun setupIntent(context: Context, views: RemoteViews, action: String, id: Int) {\n   45 |         Intent(context, MyWidgetMonthlyProvider::class.java).apply {\n   46 |             this.action = action\n   47 |             val pendingIntent = PendingIntent.getBroadcast(context, 0, this, PendingIntent.FLAG_IMMUTABLE)\n   48 |             views.setOnClickPendingIntent(id, pendingIntent)\n   49 |         }\n   50 |     }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/MyWidgetMonthlyProvider.kt:80-93","code":"   80 |     private fun getPrevMonth(context: Context) {\n   81 |         targetDate = targetDate!!.minus tion as dead code.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/views/MonthView.kt:52","code":"   52 |     private var maxEventsPerDay = 0","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/views/MonthView.kt:330-335","code":"  330 |     private fun measureDaySize(canvas: Canvas) {\n  331 |         dayWidth = (canvas.width - horizontalOffset) / 7f\n  332 |         dayHeight = (canvas.height - weekDaysLetterHeight) / ROW_COUNT.toFloat()\n  333 |         val availableHeightForEvents = dayHeight.toInt() - weekDaysLetterHeight\n  334 |         maxEventsPerDay = availableHeightForEvents / eventTitleHeight\n  335 |     }","lines":6},{"ref":"app/src/main/kotlin/org/fossify/calendar/views/MonthView.kt:346-351","code":"  346 |         if (verticalOffset - eventTitleHeight * 2 > dayHeight) {\n  347 |             val paint = getTextPaint(days[event.startDayIndex])\n  348 |             paint.color = textColor\n  349 |             canvas.drawText(\"...\", xPosCenter, yPos + verticalOffset - eventTitleHeight / 2, paint)\n  350 |             return\n  351 |         }","lines":6}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In MonthView.groupAllEvents the condition gating event insertion is `shouldAddEvent && !validDayEvent`.\nvalidDayEvent is the result of isDayValid(event, day.code), which returns true when the event ends\nexactly at the start of `day` (a midnight-ending multi-day event on its trailing day). The naming is\ninverted/confusing: the event is added only when it is NOT a \"valid day event\". Combined with the\ncanOverlap branch (`canOverlap && (lastEvent.startTS < event.startTS)`) which dereferences lastEvent\nright after the code path where lastEvent may be null, the boolean logic is fragile. Note lastEvent\nis only safe here because `notYetAddedOrIsRepeatingEvent` short-circuits the `||`, but the second\noperand `canOverlap && (lastEvent.startTS < ...)` relies on lastEvent being non-null exactly when\nnotYetAddedOrIsRepeatingEvent is false (lastEvent != null). That coupling is correct today but\nextremely easy to break; the variable naming actively misleads a future maintainer.","fix":"Rename validDayEvent to something like endsAtThisDayMidnight and invert the comment, and restructure\nthe shouldAddEvent expression so the lastEvent null-safety is explicit (e.g. compute\n`val isOverlapAdd = lastEvent != null && canOverlap && lastEvent.startTS < event.startTS`).","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/views/MonthView.kt:137-167","code":"  137 |             day.dayEvents.forEach { event ->\n  138 |                 // make sure we properly handle events lasting multiple days and repeating ones\n  139 |                 val validDayEvent = isDayValid(event, day.code)\n  140 |                 val lastEvent = allEvents.lastOrNull { it.id == event.id }\n  141 |                 val notYetAddedOrIsRepeatingEvent = lastEvent == null || lastEvent.endTS <= event.startTS\n  142 | \n  143 |                 // handle overlapping repeating events e.g. an event that lasts 3 days, but repeats every 2 days has a one day overlap\n  144 |                 val canOverlap = event.endTS - event.startTS > event.repeatInterval\n  145 |                 val shouldAddEvent = notYetAddedOrIsRepeatingEvent || canOverlap && (lastEvent.startTS < event.startTS)\n  146 | \n  147 |                 if (shouldAddEvent && !validDayEvent) {\n  148 |                     val daysCnt = getEventLastingDaysCount(event)\n  149 | \n  150 |                     val monthViewEvent = MonthViewEvent(\n  151 |                         id = event.id!!,\n  152 |                         title = event.title,\n  153 |                         startTS = event.startTS,\n  154 |                         endTS = event.endTS,\n  155 |                         color = event.color,\n  156 |                         startDayIndex = dayIndexOnMonthView,\n  157 | 4}]},{"id":"LOGIC_67","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"STATUS parsing: when isParsingTask, the COMPLETED status is matched by checking line.substring(STATUS.length) == COMPLETED, but COMPLETED is also a standalone property prefix handled later (line 219). Since STATUS is checked first and STATUS.length differs from COMPLETED.length, the equality compares the value after 'STATUS' prefix against the COMPLETED constant which itself likely includes its own 'COMPLETED' prefix text - mixing a property name constant with a status value. This is a likely copy/paste of constants leading to never-true or wrong matches for completed tasks via STATUS:COMPLETED.","fix":"Compare the STATUS value against the literal status token ('COMPLETED' text), not the COMPLETED property-prefix constant; verify the constant values and add a test for 'STATUS:COMPLETED' on a VTODO.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/IcsImporter.kt:209-222","code":"  209 |                     } else if (line.startsWith(STATUS)) {\n  210 |                         if (isParsingTask && line.substring(STATUS.length) == COMPLETED) {\n  211 |                             curFlags = curFlags or FLAG_TASK_COMPLETED\n  212 |                         } else {\n  213 |                             curStatus = when (line.substring(STATUS.length)) {\n  214 |                                 CONFIRMED -> Events.STATUS_CONFIRMED\n  215 |                                 CANCELLED -> Events.STATUS_CANCELED\n  216 |                                 else -> Events.STATUS_TENTATIVE\n  217 |                             }\n  218 |                         }\n  219 |                     } else if (line.startsWith(COMPLETED)) {\n  220 |                         if (isParsingTask && line.substring(COMPLETED.length).trim().isNotEmpty()) {\n  221 |                             curFlags = curFlags or FLAG_TASK_COMPLETED\n  222 |                         }","lines":14}]},{"id":"LOGIC_68","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"MonthlyCalendarImpl.updateMonthlyCalendar fetches events for mTargetDate.minusDays(7) .. mTargetDate.plusDays(43), but mTargetDate is the user-selected day, not necessarily day 1 of the month. getDays builds the grid relative to withDayOfMonth(1). If mTargetDate is e.g. the 28th, the fetch window (21st .. +43d) does not symmetrically cover the displayed 42-day grid that starts before day 1 of the month, so leading days of the grid (previous month) can fall outside the fetched range and show no events.","fix":"Compute the fetch window relative to firstDayOfMonth (withDayOfMonth(1)) and the actual 42-day grid bounds, not relative to the arbitrary mTargetDate day-of-month.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/MonthlyCalendarImpl.kt:23-30","code":"   23 |     fun updateMonthlyCalendar(targetDate: DateTime) {\n   24 |         mTargetDate = targetDate\n   25 |         val startTS = mTargetDate.minusDays(7).seconds()\n   26 |         val endTS = mTargetDate.plusDays(43).seconds()\n   27 |         context.eventsHelper.getEvents(startTS, endTS) {\n   28 |             gotEvents(it)\n   29 |         }\n   30 |     }","lines":8},{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/MonthlyCalendarImpl.kt:36-39","code":"   36 |     fun getDays(markDaysWithEvents: Boolean) {\n   37 |         val days = ArrayList<DayMonthly>(DAYS_CNT)\n   38 |         val firstDayOfMonth = mTargetDate.withDayOfMonth(1)\n   39 |         val firstDayIndex = context.getProperDayIndexInWeek(firstDayOfMonth)","lines":4}]},{"id":"LOGIC_69","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"MonthlyCalendarImpl carries the comment '// it works more often than not, don't touch' on markDaysWithEvents. The day-spanning loop compares formatted day codes (Formatter.getDayCodeFromDateTime) which use the YYYY (
