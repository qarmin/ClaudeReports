d as a 'hacky solution for reseting the events list': it temporarily swaps in an empty RemoteAdapter (WidgetServiceEmpty) and immediately calls performUpdate(context) on the same background thread. The empty-then-real update is racy - updateAppWidget with the empty adapter and the subsequent full performUpdate are not ordered with respect to the widget host's async data fetch, so the 'reset' may flicker or not reliably scroll to today. The comment itself flags the fragility.","fix":"Use a deterministic scroll-to-position / notifyAppWidgetViewDataChanged sequence rather than swapping to an empty adapter and immediately re-updating.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/helpers/MyWidgetListProvider.kt:126-153","code":"  126 |     // hacky solution for reseting the events list\n  127 |     private fun goToToday(context: Context) {\n  128 |         val appWidgetManager = AppWidgetManager.getInstance(context) ?: return\n  129 |         ensureBackgroundThread {\n  130 |             appWidgetManager.getAppWidgetIds(getComponentName(context)).forEach {\n  131 |                 val widget = context.widgetsDB.getWidgetWithWidgetId(it)\n  132 |                 val headerVisibility = if (widget?.header == true) {\n  133 |                     View.VISIBLE\n  134 |                 } else {\n  135 |                     View.GONE\n  136 |                 }\n  137 | \n  138 |                 val views = RemoteViews(context.packageName, R.layout.widget_event_list).apply {\n  139 |                     setViewVisibility(R.id.widget_event_list_today, headerVisibility)\n  140 |                     setViewVisibility(R.id.widget_event_go_to_today, headerVisibility)\n  141 |                     setViewVisibility(R.id.widget_event_new_event, headerVisibility)\n  142 |                 }\n  143 |                 Intent(context, WidgetServiceEmpty::class.java).apply {\n  144 |                     data = Uri.parse(this.toUri(Intent.URI_INTENT_SCHEME))\n  145 |              width / 7f\n   85 |             }\n   86 |         }","lines":10}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"fetchNextPeriod() inserts newly fetched future events at the top of the list with mEvents.add(0, event), exactly like fetchPreviousPeriod(). When scrolling to the bottom to load the next time period, the new (later) events are prepended instead of appended, so the chronological order of the list is broken and the new events appear at the top instead of at the bottom where the user scrolled. The two functions were copy-pasted and the index was not changed (should be mEvents.add(event) for the next period).","fix":"In fetchNextPeriod() append events to the end: replace mEvents.add(0, event) with mEvents.add(event) (or mEvents += event). Only fetchPreviousPeriod() should prepend.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/EventListFragment.kt:242-254","code":"  242 |     private fun fetchNextPeriod() {\n  243 |         val oldMaxFetchedTS = maxFetchedTS + 1\n  244 |         maxFetchedTS += FETCH_INTERVAL\n  245 |         requireContext().eventsHelper.getEvents(oldMaxFetchedTS, maxFetchedTS) {\n  246 |             it.forEach { event ->\n  247 |                 if (mEvents.firstOrNull { it.id == event.id && it.startTS == event.startTS } == null) {\n  248 |                     mEvents.add(0, event)\n  249 |                 }\n  250 |             }\n  251 | \n  252 |             receivedEvents(mEvents, UPDATE_BOTTOM)\n  253 |         }\n  254 |     }","lines":13},{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/EventListFragment.kt:223-240","code":"  223 |     private fun fetchPreviousPeriod() {\n  224 |         val lastPosition =\n  225 |             (binding.calendarEventsList.layoutManager as MyLinearLayoutManager).findLastVisibleItemPosition()\n  226 |         bottomItemAtRefresh =\n  227 |             (binding.calendarEventsList.adapter as EventL ch (catch (e: Exception) {}). A genuine failure (e.g. an unexpected provider value or an insertEvent error) is silently lost, and because it is inside the per-format loop a real error also prevents the 'break', so it just tries the next format and may silently skip the contact.","fix":"Catch only the expected ParseException around formatter.parse; let unexpected exceptions surface (log or showErrorToast).","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/MainActivity.kt:984-985","code":"  984 |                 } catch (e: Exception) {\n  985 |                 }","lines":2}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"parseFile catches exceptions inside the per-line read loop and shows an error toast, but does NOT break out of the while(true) loop on a genuine IO failure. If readLine() throws repeatedly (e.g. stream error) it will loop forever showing toasts, since only a null return breaks the loop. Per-line try/catch also swallows malformed-input issues silently for the rest of the parse.","fix":"Wrap the whole read loop in a single try/catch, or break out of the loop in the catch block; do not retry the same failing readLine indefinitely.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/SettingsActivity.kt:1206-1219","code":" 1206 |         inputStream.bufferedReader().use {\n 1207 |             while (true) {\n 1208 |                 try {\n 1209 |                     val line = it.readLine() ?: break\n 1210 |                     val split = line.split(\"=\".toRegex(), 2)\n 1211 |                     if (split.size == 2) {\n 1212 |                         configValues[split[0]] = split[1]\n 1213 |                     }\n 1214 |                     importedItems++\n 1215 |                 } catch (e: Exception) {\n 1216 |                     showErrorToast(e)\n 1217 |                 }\n 1218 |             }\n 1219 | 2 |             try {\n   43 |                 calendars = calendarsDB.getCalendars().toMutableList() as ArrayList<CalendarEntity>\n   44 |             } catch (ignored: Exception) {\n   45 |             }","lines":4}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"addPrivateEvents() calls formatter.parse(birthdayAnniversary) and uses date.time without a null check. SimpleDateFormat.parse can return null (and throws ParseException on bad input), so date.time can NPE. It is inside a broad try that only shows a toast, so a single malformed contact date aborts the entire import of all remaining contacts.","fix":"Null-check the parse result and wrap the per-contact parse in its own try/continue so one bad date does not abort the whole batch.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/MainActivity.kt:1037-1040","code":" 1037 |                     val formatter = SimpleDateFormat(format, Locale.getDefault())\n 1038 |                     val date = formatter.parse(birthdayAnniversary)\n 1039 | \n 1040 |                     val timestamp = date.time / 1000L","lines":4}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The search-merge loops wrap each add in try/catch(ConcurrentModificationException) and ignore it. searchResultEvents is mutated from background callbacks (eventsHelper.getEvents) and also reassigned/read on the UI thread in showSearchResultEvents, so the CME is a real symptom of unsynchronized cross-thread access; swallowing it can drop events nondeterministically rather than fixing the race.","fix":"Confine all mutations of searchResultEvents to a single thread (or use a synchronized/immutable snapshot) instead of catching CME.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/MainActivity.kt:1422-1428","code":" 1422 | ile IO via bufferedReader on the caller thread) - reading a file on the UI thread can cause ANRs for large imports. Note parseFile lacks a switch to a background thread in this path (unlike the pre-Q path which wraps it in ensureBackgroundThread).","fix":"Wrap the openInputStream + parseFile call in ensureBackgroundThread, and handle the IOException from openInputStream/openOutputStream.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/SettingsActivity.kt:274-282","code":"  274 |         } else if (requestCode == PICK_SETTINGS_IMPORT_SOURCE_INTENT && resultCode == RESULT_OK && resultData != null && resultData.data != null) {\n  275 |             val inputStream = contentResolver.openInputStream(resultData.data!!)\n  276 |             parseFile(inputStream)\n  277 |         } else if (requestCode == PICK_EVENTS_IMPORT_SOURCE_INTENT && resultCode == RESULT_OK && resultData != null && resultData.data != null) {\n  278 |             tryImportEventsFromFile(resultData.data!!)\n  279 |         } else if (requestCode == PICK_EVENTS_EXPORT_FILE_INTENT && resultCode == RESULT_OK && resultData != null && resultData.data != null) {\n  280 |             val outputStream = contentResolver.openOutputStream(resultData.data!!)\n  281 |             exportEventsTo(calendarsToExport, outputStream)\n  282 |         }","lines":9},{"ref":"app/src/main/kotlin/org/fossify/calendar/activities/SettingsActivity.kt:1198-1219","code":" 1198 |     private fun parseFile(inputStream: InputStream?) {\n 1199 |         if (inputStream == null) {\n 1200 |             toast(org.fossify.commons.R.string.unknown_error_occurred)\n 1201 |             return\n 1202 |         }\n 1203 | \n 1204 |         var importedItems = 0\n 1205 |         val configValues = LinkedHashMap<String, Any>()\n 1206 |         inputStream.bufferedReader().use {\n 1207 |             while (true) {\n 1208 |                 try {\n 1209 |                     val line = it.readLine() ?: break\n 1210 |                     val split = line.split(\"=\".toRegex(), 2)\n 1211 |                     if (split.size == 2) {\n 1212 |                         configValues[split[0]] = split[1]\n 1213 |                     }\n 1214 |                     importedItems++\n 1215 |                 } catch (e: Exception) {\n 1216 |                     showErrorToast(e)\n 1217 |                 }\n 1218 |             }\n 1219 |         }","lines":22}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"Inconsistent nullable handling of caldavCalendarId. CalendarEntity.caldavCalendarId is a non-null Int. Here the click handler uses the safe call `calendar?.caldavCalendarId == 0` while every other reference in the same class (and CalendarEntity itself) uses `calendar!!`/non-null access. The safe call makes the branch silently take the `else` (CalDAV color picker) path when calendar happens to be null, which is the opposite of the intended local-color path; given calendar is always non-null by this point it is dead defensiveness that is inconsistent and misleading. Line 112 of the same file correctly uses `calendar!!.caldavCalendarId != 0`.","fix":"Use the non-null receiver consistently: `if (calendar!!.caldavCalendarId == 0)`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/dialogs/EditCalendarDialog.kt:41-63","code":"   41 |                 if (calendar?.caldavCalendarId == 0) {\n   42 |                     ColorPickerDialog(\n   43 |                         activity = activity,\n   44 |                         color = calendar!!.color\n   45 |                     ) { wasPositivePressed, color ->\n   46 |                         if (wasPositivePressed) {\n   47 |                             calendar!!.color = color\n   48 |                             setupColor(typeColor)\n   49 |                         }\n   50 |                     }\n   51 |                 } else {\n   52 |                     val currentColor = calendar!!.color\n   53 |                     val colors =\n   54 |                         activity.calDAVHelper.getAvailableCalDAVCalendarColors(calendar!!).keys.toIntArray()\n   55 |                     SelectCalendarColorDialog(\n   56 |                         activity = activity,\n   57 |                         colors = colors,\n   58 |                         currentColor = currentColor\n   59 |                     ) {\n   60 |                         calendar!!.color = it\n   61 |                         setupColor(typeColor)\n   62 |                     }\n   63 |                 }","lines":23},{"ref":"app/src/main/kotlin/org/fossify/calendar/dialogs/EditCalendarDialog.kt:112","code":"  112 |         if (calendar!!.caldavCalendarId != 0) {","lines":1}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`TextView.addResizedBackgroundDrawable` and `Context.addDayEvents` use the deprecated, theme-less `res.getDrawable(id)` / `res.getDrawable(drawableId)` overload. On API < 21 semantics differ and the call is deprecated everywhere; it also ignores the theme. Drawables loaded this way may render incorrectly under themed contexts.","fix":"Use AppCompatResources.getDrawable(context, id) or ResourcesCompat.getDrawable(res, id, theme).","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/extensions/TextView.kt:13","code":"   13 |     val baseDrawable = res.getDrawable(drawableId).toBitmap(drawableHeight, drawableHeight)","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/extensions/Context.kt:804","code":"  804 |         val backgroundDrawable = res.getDrawable(R.drawable.day_monthly_event_background)","lines":1}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"viewPager.id is assigned (System.currentTimeMillis() % 100000).toInt() in every ...FragmentsHolder. Using a time-derived id to avoid FragmentManager state-restore collisions is fragile: two holders created within the same millisecond window (or after wrap-around) can collide, and the id is not stable across recreation, which can break ViewPager fragment state restoration. This pattern is duplicated across all holders.","fix":"Use View.generateViewId() (guaranteed unique within the process) instead of a timestamp-modulo id, or a stable XML id per holder.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/DayFragmentsHolder.kt:44","code":"   44 |         viewPager.id = (System.currentTimeMillis() % 100000).toInt()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/MonthFragmentsHolder.kt:47","code":"   47 |         viewPager.id = (System.currentTimeMillis() % 100000).toInt()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/MonthDayFragmentsHolder.kt:47","code":"   47 |         viewPager.id = (System.currentTimeMillis() % 100000).toInt()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/YearFragmentsHolder.kt:47","code":"   47 |         viewPager.id = (System.currentTimeMillis() % 100000).toInt()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/WeekFragmentsHolder.kt:61","code":"   61 |         viewPager.id = (System.currentTimeMillis() % 100000).toInt()","lines":1}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"getDatePickerView() chooses the dark vs light DatePicker based on getContrastColor() == Color.WHITE: when the contrast color of the background is WHITE (i.e. a dark background) it inflates DatePickerDarkBinding, else DatePickerLightBinding. This double-inversion logic is easy to get backwards and is the kind of subtle theming branch that warrants verification; if the binding names are swapped the date picker is unreadable on one theme.","fix":"Verify the mapping against both themes; consider deriving the picker theme from a single isDarkTheme/getProperTextColor source rath me` hardcodes a literal en-dash via unicode escape (\\u2013). Per project convention only plain hyphen-minus should be used in user-facing separators unless intentional. Flag for review (cosmetic).","fix":"If a hyphen is acceptable, replace \\u2013 with '-'; otherwise leave as intentional typographic dash.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/extensions/Context.kt:615-616","code":"  615 | private fun getFormattedEventTime(startTime: String, endTime: String) =\n  616 |     if (startTime == endTime) startTime else \"$startTime \\u2013 $endTime\"","lines":2}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"getVisibleHeight() computes val visibleRatio = scrollView.height / fullContentHeight and then returns fullContentHeight * visibleRatio, which algebraically reduces to scrollView.height (the fullContentHeight factors cancel). The intermediate fullContentHeight = rowHeight * 24 computation is pointless; the method just returns scrollView.height as a Float. Callers (onScale / onScaleBegin) effectively use scrollView.height.","fix":"Replace the body with return scrollView.height.toFloat() (or remove the helper and use scrollView.height directly), unless a different formula was actually intended here.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/fragments/WeekFragment.kt:575-579","code":"  575 |     private fun getVisibleHeight(): Float {\n  576 |         val fullContentHeight = rowHeight * 24\n  577 |         val visibleRatio = scrollView.height / fullContentHeight\n  578 |         return fullContentHeight * visibleRatio\n  579 |     }","lines":5}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"Constants defines TWELVE_HOURS, DAY, WEEK, MONTH, YEAR as raw second counts with a comment that MONTH's exact value is 'not taken into account, Joda is used'. MONTH = 2592001 is 30 days + 1 second (30*86400 = 2592000), an app ","type_label":"Architecture","severity":"low","easy":false,"description":"Every dialog in this package captures the Activity in a field (val activity / private val activity) and several also retain the AlertDialog plus a viewBinding bound to the activity. Dialogs are constructed and left to manage their own lifecycle (no reference held by the caller after construction). For long-lived async work (ensureBackgroundThread blocks in ImportEventsDialog/ExportEventsDialog/ManageAutomaticBackupsDialog/EditCalendarDialog) that call back into `activity.runOnUiThread` after the dialog/activity may be gone, there is no isFinishing/isDestroyed guard, so background completion can touch a destroyed activity. This is a systemic leak/use-after-destroy pattern rather than a single line.","fix":"Guard UI-thread continuations with activity.isFinishing/isDestroyed checks (or use a lifecycle-aware scope) before touching views/binding from background completions.","locations":[{"ref":"app/src/main/kotlin/org/fossify/calendar/dialogs/ImportEventsDialog.kt:119-130","code":"  119 |     private fun updateCalendar(binding: DialogImportEventsBinding) {\n  120 |         ensureBackgroundThread {\n  121 |             val calendar = activity.calendarsDB.getCalendarWithId(currCalendarId)\n  122 |             activity.runOnUiThread {\n  123 |                 binding.importCalendarTitle.setText(calendar!!.getDisplayTitle())\n  124 |                 binding.importCalendarColor.setFillWithStroke(\n  125 |                     calendar.color,\n  126 |                     activity.getProperBackgroundColor()\n  127 |                 )\n  128 |             }\n  129 |         }\n  130 |     }","lines":12},{"ref":"app/src/main/kotlin/org/fossify/calendar/dialogs/EditCalendarDialog.kt:77-126","code":"   77 |                     alertDialog.getButton(AlertDialog.BUTTON_POSITIVE).setOnClickListener {\n   78 |                         ensureBackgroundThread {\n   79 |                             calendarConfirmed !slotEvent.isTask())\n  166 |                     if (shouldDim) {\n  167 |                         eventTextColor = eventTextColor.adjustAlpha(MEDIUM_ALPHA)\n  168 |                     }\n  169 |                     val dayIndices = eventDayIndices[key]!!\n  170 |                     val prevInRun = i > 0 && i % 7 != 0 && dayIndices.contains(i - 1)\n  171 |                     val nextInRun = i < days.size - 1 && (i + 1) % 7 != 0 && dayIndices.contains(i + 1)\n  172 |                     val eventLayout = when {\n  173 |                         prevInRun && nextInRun -> R.layout.day_monthly_event_view_widget_event_middle\n  174 |                         prevInRun             -> R.layout.day_monthly_event_view_widget_event_end\n  175 |                         nextInRun             -> R.layout.day_monthly_event_view_widget_event_start\n  176 |                         else                  -> R.layout.day_monthly_event_view_widget\n  177 |                     }\n  178 |                     val newRemoteView = RemoteViews(packageName, eventLayout).apply {\n  179 |                         setTextColor(R.id.day_monthly_event_id, eventTextColor)\n  180 |                         setTextSize(R.id.day_monthly_event_id, smallerFontSize - 3f)\n  181 |                         setInt(R.id.day_monthly_event_background, \"setColorFilter\", slotEvent.color)\n  182 |                         if (showTitle) {\n  183 |                             setText(R.id.day_monthly_event_id, slotEvent.title.replace(\" \", \"\\u00A0\"))\n  184 |                             setVisibleIf(R.id.day_monthly_task_image, slotEvent.isTask())\n  185 |                             applyColorFilter(R.id.day_monthly_task_image, eventTextColor)\n  186 |                             if (slotEvent.shouldStrikeThrough()) {\n  187 |                                 setInt(R.id.day_monthly_event_id, \"setPaintFlags\", Paint.ANTI_ALIAS_FLAG or Paint.STRIKE_THRU_TEXT_FLAG)\n  188 |                             } else {\   }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
