ove {\n   55 |                 if i > 0 {\n   56 |                     _ = smol::Timer::after(interval).await;\n   57 |                 }\n   58 | \n   59 |                 Some((f().await, i + 1))\n   60 |             })","lines":7}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Image `load` for the `Rgba` handle path trusts the caller-supplied `width`/`height` and `pixels` without checking that `width * height * 4 == pixels.len()`. `ImageBuffer::from_raw` does validate length and returns `None` on mismatch (which is mapped to a DimensionError here), so it does not panic, but `width * height * 4` is computed inside `image` as a `u64`/checked path; the failure mode here is a silent generic DimensionError that loses the real cause (length mismatch vs. true dimension overflow). The actual integer-overflow protection depends entirely on the `image` crate version.","fix":"Optionally pre-validate `(width as usize).checked_mul(height as usize).and_then(|n| n.checked_mul(4)) == Some(pixels.len())` and emit a clearer error, so corrupt Rgba handles are diagnosed precisely rather than via a generic DimensionError.","locations":[{"ref":"graphics/src/image.rs:138-152","code":"  138 |         image::Handle::Rgba {\n  139 |             width,\n  140 |             height,\n  141 |             pixels,\n  142 |             ..\n  143 |         } => (*width, *height, pixels.clone()),\n  144 |     };\n  145 | \n  146 |     if let Some(image) = ::image::ImageBuffer::from_raw(width, height, pixels) {\n  147 |         Ok(image)\n  148 |     } else {\n  149 |         Err(to_error(::image::error::ImageError::Limits(\n  150 |             ::image::error::LimitError::from_kind(::image::error::LimitErrorKind::DimensionError),\n  151 |         )))\n  152 |     }","lines":15}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`attribute_count_of` accumulates vertex/index counts into `usize` fields by summing `buffers.vertices.len()` and `buffers.indices.len()` across all meshes with no overflow check. These totals are typically used to size GPU buffers; on a 32-bit target (usize = 32 bits) a pathological set of meshes could overflow the running total and wrap, yielding an undersized allocation and subsequent OOB writes. Even on 64-bit, downstream casts of these counts to `u32`/`u64` for buffer descriptors can truncate.","fix":"Use `checked_add`/`saturating_add` when accumulating, or document and assert that the totals fit the buffer index type (u32) before they are used to size GPU resources.","locations":[{"ref":"graphics/src/mesh.rs:127-146","code":"  127 | pub fn attribute_count_of(meshes: &[Mesh]) -> AttributeCount {\n  128 |     meshes\n  129 |         .iter()\n  130 |         .fold(AttributeCount::default(), |mut count, mesh| {\n  131 |             match mesh {\n  132 |                 Mesh::Solid { buffers, .. } => {\n  133 |                     count.solids += 1;\n  134 |                     count.solid_vertices += buffers.vertices.len();\n  135 |                     count.indices += buffers.indices.len();\n  136 |                 }\n  137 |                 Mesh::Gradient { buffers, .. } => {\n  138 |                     count.gradients += 1;\n  139 |                     count.gradient_vertices += buffers.vertices.len();\n  140 |                     count.indices += buffers.indices.len();\n  141 |                 }\n  142 |             }\n  143 | \n  144 |             count\n  145 |         })\n  146 | }","lines":20}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `selection()` the caret branch indexes `layout[i - 1]` and reads `layout[i - 1].w` when the\ncursor is judged to be before the start of visual line `i`. The safety relies entirely on the\nnarrative comment \"i is guaranteed to be > 0\". This invariant is plausible but not enforced in\ncode; any future change to glyph `start` handling (or an empty first visual line whose first\nglyph `start` is > 0) would make `i == 0` and panic with an out-of-bounds / underflow on\n`i - 1`. There is no `saturating_sub` or guard.","fix":"Guard explicitly: `if is_cursor_before_start && i > 0 { Some((i - 1, layout[i - 1].w)) } else\n{ None }`, or use `i.checked_sub(1)` and fall through to the `unwrap_or` default when it is 0.","locations":[{"ref":"graphics/src/text/editor.rs:218-227","code":"  218 |                         if is_cursor_before_start {\n  219 |                             // Sometimes, the glyph we are looking for is right\n  220 |                             // between lines. This can happen when a line wraps\n  221 |                             // on a space.\n  222 |                             // In that case, we can assume the cursor is at the\n  223 |                             // end of the previous line.\n  224 |                             // i is guaranteed to be > 0 because `start` is always\n  225 |                             // 0 for the first line, so there is no way for the\n  226 |                             // cursor to be before it.\n  227 |                             Some((i - 1, layout[i - 1].w))","lines":10}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`Transformation::orthographic(size.width, size.height)` is built from the physical size with no zero check. A zero-width or zero-height viewport (minimized window, transient 0-size surface) produces a degenerate/divide-by-zero orthographic projection (inf entries) that then feeds rendering. The compositor trait (`configure_surface`/`create_surface`) also takes raw `width`/`height: u32` with no documented handling of 0, so a 0-size surface is not defended anywhere in this layer.","fix":"Clamp width/height to at least 1 when constructing the projection, or document and enforce a nonzero precondition. Backends commonly already do `.max(1)`; centralizing it in `Viewport`/`Compositor` would avoid per-backend divergence.","locations":[{"ref":"graphics/src/viewport.rs:23-23","code":"   23 |             projection: Transformation::orthographic(size.width, size.height),","lines":1},{"ref":"graphics/src/compositor.rs:38-48","code":"   38 |     fn create_surface(\n   39 |         &mut self,\n   40 |         window: impl Window + Clone,\n   41 |         width: u32,\n   42 |         height: u32,\n   43 |     ) -> Self::Surface;\n   44 | \n   45 |     /// Configures a new [`Surface`] with the given dimensions.\n   46 |     ///\n   47 |     /// [`Surface`]: Self::Surface\n   48 |     fn configure_surface(&mut self, surface: &mut Self::Surface, width: u32, height: u32);","lines":11}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Image blit origin is computed as `(bounds.x / width_scale) as i32` and `(bounds.y / height_scale) as i32`. width_scale/height_scale are bounds.width/image.width() (resp. height); if bounds.width or bounds.height is 0 the scale is 0 and the division yields +/-inf or NaN, and `as i32` saturates to i32::MAX/0. A zero-sized destination bounds therefore produces a bogus origin instead of being skipped.","fix":"Early-return when bounds.width <= 0.0 || bounds.height <= 0.0 (image not visible) before computing the scales and origin.","locations":[{"ref":"tiny_skia/src/raster.rs:52-64","code":"   52 |         let width_scale = bounds.width / image.width() as f32;\n   53 |         let height_scale = bounds.height / image.height() as f32;\n   54 | \n   55 |         let transform = transform.pre_scale(width_scale, height_scale);\n   56 | \n   57 |         let quality = match filter_method {\n   58 |             raster::FilterMethod::Linear => tiny_skia::FilterQuality::Bilinear,\n   59 |             raster::FilterMethod::Nearest => tiny_skia::FilterQuality::Nearest,\n   60 |         };\n   61 | \n   62 |         pixels.draw_pixmap(\n   63 |             (bounds.x / width_scale) as i32,\n   64 |             (bounds.y / height_scale) as i32,","lines":13}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `add_instances` the fragmented scaling divides by `size.width as f32` / `size.height as f32`. `size` here is the `Entry::Fragmented { size }`, i.e. the original image dimensions; it cannot normally be zero because zero-area images are filtered earlier, but there is no local guard. If a fragmented entry ever has a zero dimension the scaling produces inf/NaN tile coordinates that propagate into the GPU instance buffer. Defensive, low severity.","fix":"Guard against zero size (e.g. early-continue or use .max(1)) before computing scaling factors.","locations":[{"ref":"wgpu/src/image/mod.rs:617-635","code":"  617 |         atlas::Entry::Fragmented { fragments, size } => {\n  618 |             let scaling_x = bounds.width / size.width as f32;\n  619 |             let scaling_y = bounds.height / size.height as f32;\n  620 | \n  621 |             for fragment in fragments {\n  622 |                 let allocation = &fragment.allocation;\n  623 |                 let (fragment_x, fragment_y) = fragment.position;\n  624 | \n  625 |                 let Size {\n  626 |                     width: fragment_width,\n  627 |                     height: fragment_height,\n  628 |                 } = allocation.size();\n  629 | \n  630 |                 let tile = [\n  631 |                     bounds.x + fragment_x as f32 * scaling_x,\n  632 |                     bounds.y + fragment_y as f32 * scaling_y,\n  633 |                     fragment_width as f32 * scaling_x,\n  634 |                     fragment_height as f32 * scaling_y,\n  635 |                 ];","lines":19}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"List::layout computes intrinsic height as `(line_height + padding.y()) * self.options.len() as f32`. For very large option lists `len() as f32` loses precision and the multiplication can exceed `f32` range / lose per-row accuracy, and the same `option_height`-based integer division in draw/update (`(cursor_position.y / option_height) as usize`) inherits that imprecision. Not a crash, but hit-testing and selected-row math drift for large lists because all positions are derived from float multiplication of an index rather than exact accumulation.","fix":"Acceptable for typical list sizes; if large lists are expected, accumulate row offsets or use f64 for the index math to avoid drift.","locations":[{"ref":"widget/src/overlay/menu.rs:385-392","code":"  385 |         let size = {\n  386 |             let intrinsic = Size::new(\n  387 |                 0.0,\n  388 |                 (f32::from(text_line_height) + self.padding.y()) * self.options.len() as f32,\n  389 |             );\n  390 | \n  391 |             limits.resolve(Length::Fill, Length::Shrink, intrinsic)\n  392 |         };","lines":8},{"ref":"widget/src/overlay/menu.rs:421-446","code":"  421 |                     let option_height =\n  422 |                         f32::from(self.line_height.to_absolute(text_size)) + self.padding.y();\n  423 | \n  424 |                     let new_hovered_option = (cursor_position.y / option_height) as usize;\n  425 | \n  426 |                     if *self.hovered_option != Some(new_hovered_option)\n  427 |                         && let Some(option) = self.options.get(new_hovered_option)\n  428 |                     {\n  429 |                         if let Some(on_option_hovered) = self.on_option_hovered {\n  430 |                             shell.publish(on_option_hovered(option.clone()));\n  431 |                         }\n  432 | \n  433 |                         shell.request_redraw();\n  434 |                     }\n  435 | \n  436 |                     *self.hovered_option = Some(new_hovered_option);\n  437 |                 }\n  438 |             }\n  439 |             Event::Touch(touch::Event::FingerPressed { .. }) => {\n  440 |                 if let Some(cursor_position) = cursor.position_in(layout.bounds()) {\n  441 |                     let text_size = self.text_size.unwrap_or_else(|| renderer.default_size());\n  442 | \n  443 |                     let option_height =\n  444 |                         f32::from(self.line_height.to_absolute(text_size)) + self.padding.y();\n  445 | \n  446 |                     *self.hovered_option = Some((cursor_position.y / option_height) as usize);","lines":26}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`Pin::layout` computes `limits.max() - Size::new(self.position.x, self.position.y)` with plain f32 subtraction (Size's Sub does not clamp). If the pinned position exceeds the available space, `available` becomes negative and is passed to `layout::Limits::new(Size::ZERO, available)`, yielding a max smaller than the min (inverted limits) which can produce nonsensical child layouts.","fix":"Clamp the subtraction to zero, e.g. `Size::new((limits.max().width - self.position.x).max(0.0), (limits.max().height - self.position.y).max(0.0))`.","locations":[{"ref":"widget/src/pin.rs:141-146","code":"  141 |         let available = limits.max() - Size::new(self.position.x, self.position.y);\n  142 | \n  143 |         let node = self\n  144 |             .content\n  145 |             .as_widget_mut()\n  146 |             .layout(tree, renderer, &layout::Limits::new(Size::ZERO, available))","lines":6}]},{"id":"OVF_19","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":true,"description":"In `ordered_list`, the displayed item numbers are `i as u64 + start` for `i in 0..bullets.len()`, so the maximum number is `start + bullets.len() - 1`, but the digit-width calculation uses `start + bullets.len()` (one too high). At a power-of-ten boundary this over-allocates the number column width by one digit (e.g. start=1, 9 bullets: last number 9 needs 1 digit, but ilog10(10)=1 gives width for 2 digits). Cosmetic only.","fix":"Use `(start + bullets.len() as u64).saturating_sub(1).max(1).ilog10() + 1` to base width on the actual maximum displayed number.","locations":[{"ref":"widget/src/markdown.rs:1343-1350","code":" 1343 |     let digits = (start + bullets.len() as u64).max(1).ilog10() + 1;\n 1344 | \n 1345 |     column(bullets.iter().enumerate().map(|(i, bullet)| {\n 1346 |         row![\n 1347 |             text!(\"{}.\", i as u64 + start)\n 1348 |                 .size(settings.text_size)\n 1349 |                 .align_x(alignment::Horizontal::Right)\n 1350 |                 .width(settings.text_size * ((digits as f32 / 2.0).ceil() + 1.0)),","lines":8}]},{"id":"OVF_20","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"Clipboard image dimensions are cast from `usize` to `u32` on read (`image.width as u32`) and from `u32` to `usize` on write without checks. On read, an image wider/taller than `u32::MAX` would truncate; on 32-bit targets the write cast is identity. In practice clipboard images never approach these bounds, so impact is negligible, but the casts are unguarded truncations.","fix":"Use `u32::try_from(...)` / `usize::try_from(...)` and surface a `ConversionFailure` error on overflow, or document the assumption that clipboard image dimensions fit in the target type.","locations":[{"ref":"winit/src/clipboard.rs:75-77","code":"   75 |                             width: image.width as u32,\n   76 |                             height: image.height as u32,\n   77 |                         };","lines":3},{"ref":"winit/src/clipboard.rs:121-122","code":"  121 |                         width: image.size.width as usize,\n  122 |                         height: image.size.height as usize,","lines":2}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`receive` deserializes the entire `buffer` Vec instead of only the `&buffer[..size]` bytes that were just read. The buffer is reused across calls and only grown (`resize` only when `buffer.len() < size`), never shrunk. As soon as a message smaller than a previously received one arrives, `buffer.len() > size`, so `bincode::deserialize(buffer)` sees stale trailing bytes from the older, larger message. bincode 1.3's `deserialize` rejects trailing bytes, so every shrinking message fails with `DecodingFailed`, and even when it does not error it parses against stale data. The fix is to deserialize the exact slice.","fix":"Deserialize the exact slice: `Ok(bincode::deserialize(&buffer[..size])?)`.","locations":[{"ref":"beacon/src/client.rs:248-261","code":"  248 | async fn receive(\n  249 |     stream: &mut net::tcp::OwnedReadHalf,\n  250 |     buffer: &mut Vec<u8>,\n  251 | ) -> Result<Command, Error> {\n  252 |     let size = stream.read_u64().await? as usize;\n  253 | \n  254 |     if buffer.len() < size {\n  255 |         buffer.resize(size, 0);\n  256 |     }\n  257 | \n  258 |     let _n = stream.read_exact(&mut buffer[..size]).await?;\n  259 | \n  260 |     Ok(bincode::deserialize(buffer)?)\n  261 | }","lines":14}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Same bug as in the client: the server-side `receive` deserializes the whole reused `buffer` (`bincode::deserialize(buffer)`) rather than `&buffer[..size]`. Because the buffer only ever grows, any message smaller than a prior one leaves stale trailing bytes, and bincode 1.3 rejects trailing data, producing spurious `DecodingFailed` warnings and dropping legitimate messages.","fix":"Deserialize the exact slice: `Ok(bincode::deserialize(&buffer[..size])?)`.","locations":[{"ref":"beacon/src/lib.rs:282-295","code":"  282 | async fn receive(\n  283 |     stream: &mut net::tcp::OwnedReadHalf,\n  284 |     buffer: &mut Vec<u8>,\n  285 | ) -> Result<client::Message, Error> {\n  286 |     let size = stream.read_u64().await? as usize;\n  287 | \n  288 |     if buffer.len() < size {\n  289 |         buffer.resize(size, 0);\n  290 |     }\n  291 | \n  292 |     let _n = stream.read_exact(&mut buffer[..size]).await?;\n  293 | \n  294 |     Ok(bincode::deserialize(buffer)?)\n  295 | }","lines":14}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`Rectangle::union` produces a wrong result when one or both rectangles have been constructed\nwith negative width/height, but more importantly it does NOT guard for empty/degenerate\nrectangles the way `intersection` does. The bigger concern: `union` is documented as the\nbounding rectangle of both, but if one rectangle is \"empty\" in a meaningful sense the union\nstill treats it as a real rect. This is minor; the genuine issue is the asymmetry of behavior\nvs `intersection`. Lower-confidence; verify against intended semantics.","fix":"Document that union assumes non-negative extents, or special-case zero-area inputs to return the other rectangle.","locations":[{"ref":"core/src/rectangle.rs:222-239","code":"  222 |     /// Computes the union with the given [`Rectangle`].\n  223 |     pub fn union(&self, other: &Self) -> Self {\n  224 |         let x = self.x.min(other.x);\n  225 |         let y = self.y.min(other.y);\n  226 | \n  227 |         let lower_right_x = (self.x + self.width).max(other.x + other.width);\n  228 |         let lower_right_y = (self.y + self.height).max(other.y + other.height);\n  229 | \n  230 |         let width = lower_right_x - x;\n  231 |         let height = lower_right_y - y;\n  232 | \n  233 |         Rectangle {\n  234 |             x,\n  235 |             y,\n  236 |             width,\n  237 |             height,\n  238 |         }\n  239 |     }","lines":18}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`Linear::add_stop` inserts a new stop at the index returned by `binary_search_by`, but it *overwrites* whatever is already at that index instead of shifting the rest of the array. The `None` arm of the comparator returns `Ordering::Greater`, so empty slots sort to the end and the search returns the first slot whose existing offset is >= the new offset. When stops are added out of order (or when an offset lands between two existing stops), the new stop clobbers an existing stop rather than being inserted before it. This silently loses color stops and corrupts gradient ordering. The doc comment promises ordered insertion semantics (\"Adds a new ColorStop\"), but the implementation only behaves correctly when stops happen to be appended in ascending offset order into still-empty slots.","fix":"Shift the tail of the array right before writing, e.g. when `index < 8` and `self.stops[index].is_some()`, move `self.stops[index..7]` one slot to the right (dropping the overflow) and then assign `self.stops[index]`. Alternatively collect into a Vec, insert, sort, and re-pack into the fixed array.","locations":[{"ref":"graphics/src/gradient.rs:65-80","code":"   65 |     pub fn add_stop(mut self, offset: f32, color: Color) -> Self {\n   66 |         if offset.is_finite() && (0.0..=1.0).contains(&offset) {\n   67 |             let (Ok(index) | Err(index)) = self.stops.binary_search_by(|stop| match stop {\n   68 |                 None => Ordering::Greater,\n   69 |                 Some(stop) => stop.offset.partial_cmp(&offset).unwrap(),\n   70 |             });\n   71 | \n   72 |             if index < 8 {\n   73 |                 self.stops[index] = Some(ColorStop { offset, color });\n   74 |             }\n   75 |         } else {\n   76 |             log::warn!(\"Gradient: ColorStop must be within 0.0..=1.0 range.\");\n   77 |         };\n   78 | \n   79 |         self\n   80 |     }","lines":16}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`Stack::merge` scans for a mergeable block then merges with `for middle in &mut tail[0..left - target_index - 1]`. `tail` is `layers[target_index+1..]`, so this iterates the layers strictly between the target and `left`, merging each into the target. However after the inner downward scan, the block of layers from `target_index+1` up to `left-1` may contain layers that were *not* part of the contiguous mergeable run (the scan can break early at `current`, but `target_index` may be below `current`). When a break occurs at `current > 0`, layers in `[current, target_index)` ... and the subsequent `left = current` skips re-examining everything from `current` upward, meaning layers between the merged target and the break point are neither merged nor re-processed. This risks dropping/skipping non-empty intermediate layers (lost primitives) or merging layers whose sublayers actually overlap. The control flow (target_index vs current vs left) is subtle and not obviously correct; merge correctness directly affects rendered output.","fix":"Add unit tests with mixed empty/non-empty layers and overlapping sublayer ranges to confirm no layer is skipped or double-merged. Re-derive the indices: after merging into `target_index`, processing should continue at `target_index` (or `current` only if everything from `current..left` was consumed), not unconditionally jump `left = current`.","locations":[{"ref":"graphics/src/layer.rs:143-198","code":"  143 |     pub fn merge(&mut self) {\n  144 |         self.flush();\n  145 | \n  146 |         // These are the layers left to process\n  147 |         let mut left = self.active_count;\n  148 | \n  149 |         // There must be at least 2 or more layers to merge\n  150 |         while left > 1 {\n  151 |             // We set our target as the topmost layer left to process\n  152 |             let mut current = left - 1;\n  153 |             let mut target = &self.layers[current];\n  154 |             let mut target_start = target.start();\n  155 |             let mut target_index = current;\n  156 | \n  157 |             // We scan downwards for a contiguous block of mergeable layer candidates\n  158 |             while current > 0 {\n  159 |                 current -= 1;\n  160 | \n  161 |                 let candidate = &self.layers[current];\n  162 |                 let start = candidate.start();\n  163 |                 let end = candidate.end();\n  164 | \n  165 |                 // We skip empty layers\n  166 |                 if end == 0 {\n  167 |                     continue;\n  168 |                 }\n  169 | \n  170 |                 // Candidate can be merged if primitive sublayers do not overlap with\n  171 |                 // previous targets and the clipping bounds match\n  172 |                 if end > target_start || candidate.bounds() != target.bounds() {\n  173 |                     break;\n  174 |                 }\n  175 | \n  176 |                 // Candidate is not empty and can be merged into\n  177 |                 target = candidate;\n  178 |                 target_start = start;\n  179 |                 target_index = current;\n  180 |             }\n  181 | \n  182 |             // We merge all the layers scanned into the target\n  183 |             //\n  184 |             // Since we use `target_index` instead of `current`, we\n  185 |             // deliberately avoid merging into empty layers.\n  186 |             //\n  187 |             // If no candidates were mergeable, this is a no-op.\n  188 |             let (head, tail) = self.layers.split_at_mut(target_index + 1);\n  189 |             let layer = &mut head[target_index];\n  190 | \n  191 |             for middle in &mut tail[0..left - target_index - 1] {\n  192 |                 layer.merge(middle);\n  193 |             }\n  194 | \n  195 |             // Empty layers found after the target can be skipped\n  196 |             left = current;\n  197 |         }\n  198 |     }","lines":56}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`mesh::Indexed` carries `vertices: Vec<T>` and `indices: Vec<u32>` with no validation that every index is < `vertices.len()`, nor that `indices.len()` is a multiple of 3 (the doc comment on `indices` even states it \"should always have a length that is a multiple of 3\", but nothing enforces it). These buffers are handed straight to GPU draw calls; an out-of-range index becomes an out-of-bounds vertex fetch on the GPU (undefined behavior / device loss / potential information disclosure), and a non- multiple-of-3 index count drops or misrenders the final triangle. Since meshes can be produced from user geometry, this is an unvalidated GPU-OOB surface.","fix":"Add a validation/constructor path (or a debug_assert plus a checked builder) that verifies `indices.iter().all(|&i| (i as usize) < vertices.len())` and `indices.len() % 3 == 0` before the buffers are uploaded, returning an error or clamping instead of forwarding invalid buffers to the GPU.","locations":[{"ref":"graphics/src/mesh.rs:73-83","code":"   73 | /// A set of vertices and indices representing a list of triangles.\n   74 | #[derive(Clone, Debug, PartialEq, Eq)]\n   75 | pub struct Indexed<T> {\n   76 |     /// The vertices of the mesh\n   77 |     pub vertices: Vec<T>,\n   78 | \n   79 |     /// The list of vertex indices that defines the triangles of the mesh.\n   80 |     ///\n   81 |     /// Therefore, this list should always have a length that is a multiple of 3.\n   82 |     pub indices: Vec<u32>,\n   83 | }","lines":11}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The cache `Key::hash` does not hash the `wrapping` or `ellipsis` fields, even though both\nmaterially change the shaped/laid-out buffer that is cached in the `Entry`. Two `Key`s that\ndiffer ONLY in `wrapping` (e.g. `Wrapping::None` vs `Wrapping::Word`) or in `ellipsis`\n(e.g. `Ellipsis::None` vs `Ellipsis::End`) produce identical `KeyHash` values, so `allocate`\nreturns a stale buffer that was laid out with the wrong wrapping/ellipsis strategy. The result\nis text that is wrapped (or truncated with an ellipsis) incorrectly depending on which variant\nhappened to be cached first. Note `align_x` IS hashed but `wrapping`/`ellipsis` are silently\ndropped, which strongly suggests an accidental omission rather than an intentional decision.","fix":"Add `self.wrapping.hash(&mut hasher);` and `self.ellipsis.hash(&mut hasher);` to `Key::hash`\n(requiring `Wrapping`/`Ellipsis` to derive `Hash`). This makes the cache key fully reflect\neverything that affects the cached buffer's layout.","locations":[{"ref":"graphics/src/text/cache.rs:127-138","code":"  127 |     fn hash<H: Hasher>(self, mut hasher: H) -> KeyHash {\n  128 |         self.content.hash(&mut hasher);\n  129 |         self.size.to_bits().hash(&mut hasher);\n  130 |         self.line_height.to_bits().hash(&mut hasher);\n  131 |         self.font.hash(&mut hasher);\n  132 |         self.bounds.width.to_bits().hash(&mut hasher);\n  133 |         self.bounds.height.to_bits().hash(&mut hasher);\n  134 |         self.shaping.hash(&mut hasher);\n  135 |         self.align_x.hash(&mut hasher);\n  136 | \n  137 |         hasher.finish()\n  138 |     }","lines":12}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In the overlay event loop, when a layout invalidation closes the overlay mid-stream the loop `break`s (after pushing fewer statuses than there are events). `event_statuses` then has fewer entries than `events`. Later, `events.iter().zip(overlay_statuses)` truncates to the shorter length, so every event that arrived after the overlay closed is NEVER dispatched to the base widget tree, and the returned status Vec is shorter than the input `events` slice. Callers that assume `event_statuses.len() == events.len()` (a documented invariant of `update`) get a desynced/short vector and the dropped events are silently lost (e.g. a click that closes a menu plus a follow-up event in the same batch).","fix":"Do not `break` out of the overlay loop on overlay close; instead mark the overlay gone and continue pushing `event::Status::Ignored` for the remaining events so `event_statuses.len()` always equals `events.len()`. Alternatively, after the loop pad `event_statuses` with `Ignored` up to `events.len()` before the zip, and ensure the remaining events still get routed to the base widget in the second pass.","locations":[{"ref":"runtime/src/user_interface.rs:265-267","code":"  265 |                     if maybe_overlay.is_none() {\n  266 |                         break;\n  267 |                     }","lines":3},{"ref":"runtime/src/user_interface.rs:319-321","code":"  319 |         let event_statuses = events\n  320 |             .iter()\n  321 |             .zip(overlay_statuses)","lines":3}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Ice metadata/instructions are split with `content.split_once(\"-\")`, which splits at the FIRST\nhyphen anywhere in the file, not at the documented `-----` separator. Any hyphen appearing in the\nmetadata section corrupts parsing. For example a `preset:` value containing a hyphen (widget ids\nexplicitly allow `-`, see instruction.rs `id` parser accepting `tag(\"-\")`, and presets are\nfree-form text) like `preset: my-preset` splits into metadata `...\npreset: my` and rest\n`preset\n-----\n...`, dropping the rest of the preset name and shifting everything. This produces\nsilently wrong tests (wrong/absent preset, misparsed instructions) rather than an error.","fix":"Split on the actual separator line, e.g. `content.split_once(\"-----\")` (or split on a line that is all dashes / a blank-line + dashes), instead of a single `-`.","locations":[{"ref":"test/src/ice.rs:58-60","code":"   58 |         let Some((metadata, rest)) = content.split_once(\"-\") else {\n   59 |             return Err(ParseError::NoMetadata);\n   60 |         };","lines":3}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Animation::<bool>::remaining` interpolates from `self.duration.as_secs_f32()` down to `0.0` and wraps the result in `Duration::from_secs_f32`. `Duration::from_secs_f32` panics if the argument is negative or non-finite. The interpolation value comes from `lilt`'s `animate_bool`; with certain easing functions (e.g. easings that overshoot, like elastic/back) the interpolated value can transiently exceed the `[0, duration]` range or go negative, which would panic in `from_secs_f32`. Even without overshoot, floating-point error near the endpoints can yield a tiny negative value, panicking. This is a release-mode panic, not just debug.","fix":"Clamp the interpolated seconds to a non-negative finite value before constructing the Duration: `Duration::from_secs_f32(self.interpolate(self.duration.as_secs_f32(), 0.0, at).max(0.0))`, or use `Duration::try_from_secs_f32(...).unwrap_or(Duration::ZERO)`.","locations":[{"ref":"core/src/animation.rs:149-152","code":"  149 |     /// Returns the remaining [`Duration`] of the [`Animation`].\n  150 |     pub fn remaining(&self, at: Instant) -> Duration {\n  151 |         Duration::from_secs_f32(self.interpolate(self.duration.as_secs_f32(), 0.0, at))\n  152 |     }","lines":4}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Backend::default() reads the `ICED_BACKEND` env var and unconditionally wraps any value in `Backend::Custom(name)`. The documented values `wgpu`, `tiny-skia`, and the `Hardware`/`Software` variants are never produced from the env var, so setting `ICED_BACKEND=tiny-skia` yields `Custom(\"tiny-skia\")` rather than `Software`, and `Backend::matches`/`is_software`/`hardware` will not recognize it as the software backend. The mapping from env string to the typed variants is missing.","fix":"Parse known env values into the proper variants (e.g. match on `wgpu`/`vulkan`/`metal`/`dx12`/`opengl`/`webgpu` -> Hardware(...), `tiny-skia`/`software` -> Software, `best` -> Best) and fall back to `Custom` only for unknown names; or document that `matches`/`is_software` are intentionally only consulted against `Custom` names.","locations":[{"ref":"core/src/backend.rs:100-108","code":"  100 | impl Default for Backend {\n  101 |     fn default() -> Self {\n  102 |         let Ok(backend) = env::var(\"ICED_BACKEND\") else {\n  103 |             return Self::Best;\n  104 |         };\n  105 | \n  106 |         Self::Custom(backend.to_owned())\n  107 |     }\n  108 | }","lines":9},{"ref":"core/src/backend.rs:44-57","code":"   44 |     /// Returns true if the [`Backend`] is [`Backend::Software`].\n   45 |     pub fn is_software(&self) -> bool {\n   46 |         matches!(self, Self::Software)\n   47 |     }\n   48 | \n   49 |     /// Returns true if the [`Backend`] is [`Backend::Best`] or matches the given name.\n   50 |     pub fn matches(&self, target: &str) -> bool {\n   51 |         match self {\n   52 |             Backend::Best => true,\n   53 |             Backend::Custom(name) => name == target || name == &target.replace(\"-\", \"_\"),\n   54 |             _ => false,\n   55 |         }\n   56 |     }\n   57 | }","lines":14}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Color::from_str` indexes the hex string with byte ranges `&hex[from..=to]` (e.g.\n`&hex[0..=1]`). If the user passes a 3/4/6/8-length string that contains multibyte UTF-8\ncharacters whose byte length happens to equal 3,4,6, or 8 but whose char boundaries don't\nline up with the byte indices, the slice will panic (\"byte index N is not a char boundary\").\n`hex.len()` is a byte length, so a string like \"é0f\" (where 'é' is 2 bytes) has len 4 and\nwill hit the 4-branch, then `&hex[0..=0]` slices into the middle of 'é' and panics instead\nof returning a clean ParseError.","fix":"Operate on bytes (`hex.as_bytes()`) or first verify `hex.is_ascii()` and return `ParseError::InvalidLength`/a dedicated error otherwise, before slicing.","locations":[{"ref":"core/src/color.rs:324-358","code":"  324 |     fn from_str(s: &str) -> Result<Self, Self::Err> {\n  325 |         let hex = s.strip_prefix('#').unwrap_or(s);\n  326 | \n  327 |         let parse_channel = |from: usize, to: usize| -> Result<f32, std::num::ParseIntError> {\n  328 |             let num = usize::from_str_radix(&hex[from..=to], 16)? as f32 / 255.0;\n  329 | \n  330 |             // If we only got half a byte (one letter), expand it into a full byte (two letters)\n  331 |             Ok(if from == to { num + num * 16.0 } else { num })\n  332 |         };\n  333 | \n  334 |         let val = match hex.len() {\n  335 |             3 => Color::from_rgb(\n  336 |                 parse_channel(0, 0)?,\n  337 |                 parse_channel(1, 1)?,\n  338 |                 parse_channel(2, 2)?,\n  339 |             ),\n  340 |             4 => Color::from_rgba(\n  341 |                 parse_channel(0, 0)?,\n  342 |                 parse_channel(1, 1)?,\n  343 |                 parse_channel(2, 2)?,\n  344 |                 parse_channel(3, 3)?,\n  345 |             ),\n  346 |             6 => Color::from_rgb(\n  347 |                 parse_channel(0, 1)?,\n  348 |                 parse_channel(2, 3)?,\n  349 |                 parse_channel(4, 5)?,\n  350 |             ),\n  351 |             8 => Color::from_rgba(\n  352 |                 parse_channel(0, 1)?,\n  353 |                 parse_channel(2, 3)?,\n  354 |                 parse_channel(4, 5)?,\n  355 |                 parse_channel(6, 7)?,\n  356 |             ),\n  357 |             _ => return Err(ParseError::InvalidLength(hex.len())),\n  358 |         };","lines":35}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`ContentFit::fit` divides `content.width / content.height` and `bounds.width / bounds.height`\nwith no guard against zero dimensions. A zero-height content or bounds yields `inf` or `NaN`\naspect ratios, and the subsequent branches propagate `NaN`/`inf` into the returned `Size`\n(e.g. `content.width * bounds.height / content.height` with `content.height == 0`). Image and\nlayout code calling this with a not-yet-loaded (0x0) image size will get NaN sizes rather than\na sane fallback.","fix":"Short-circuit when any dimension is zero (return `bounds`, `content`, or `Size::ZERO` as appropriate) before computing the aspect ratios.","locations":[{"ref":"core/src/content_fit.rs:72-121","code":"   72 |     pub fn fit(&self, content: Size, bounds: Size) -> Size {\n   73 |         let content_ar = content.width / content.height;\n   74 |         let bounds_ar = bounds.width / bounds.height;\n   75 | \n   76 |         match self {\n   77 |             Self::Contain => {\n   78 |                 if bounds_ar > content_ar {\n   79 |                     Size {\n   80 |                         width: content.width * bounds.height / content.height,\n   81 |                         ..bounds\n   82 |                     }\n   83 |                 } else {\n   84 |                     Size {\n   85 |                         height: content.height * bounds.width / content.width,\n   86 |                         ..bounds\n   87 |                     }\n   88 |                 }\n   89 |             }\n   90 |             Self::Cover => {\n   91 |                 if bounds_ar < content_ar {\n   92 |                     Size {\n   93 |                         width: content.width * bounds.height / content.height,\n   94 |                         ..bounds\n   95 |                     }\n   96 |                 } else {\n   97 |                     Size {\n   98 |                         height: content.height * bounds.width / content.width,\n   99 |                         ..bounds\n  100 |                     }\n  101 |                 }\n  102 |             }\n  103 |             Self::Fill => bounds,\n  104 |             Self::None => content,\n  105 |             Self::ScaleDown => {\n  106 |                 if bounds_ar > content_ar && bounds.height < content.height {\n  107 |                     Size {\n  108 |                         width: content.width * bounds.height / content.height,\n  109 |                         ..bounds\n  110 |                     }\n  111 |                 } else if bounds.width < content.width {\n  112 |                     Size {\n  113 |                         height: content.height * bounds.width / content.width,\n  114 |                         ..bounds\n  115 |                     }\n  116 |                 } else {\n  117 |                     content\n  118 |                 }\n  119 |             }\n  120 |         }\n  121 |     }","lines":50}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In Layout::children (and Layout::child), the offset passed to child nodes is `Vector::new(self.position.x, self.position.y)`, i.e. the parent's absolute position is used as the offset. `with_offset` then sets child position to `child.bounds.{x,y} + offset`. This is correct ONLY because child node bounds are stored relative to the parent. It silently breaks if a Node's child bounds are ever stored absolutely. Not a bug today, but the coupling between Node's relative-coordinate invariant and this accumulation is undocumented and easy to break - flagging as an architecture/invariant risk given the audit scope on accumulation logic.","fix":"Add a comment documenting that child Node bounds are relative to their parent and that Layout accumulates absolute position by adding the parent's absolute position as the offset.","locations":[{"ref":"core/src/layout.rs:56-74","code":"   56 |     /// Returns an iterator over the children of this [`Layout`].\n   57 |     pub fn children(self) -> impl DoubleEndedIterator<Item = Layout<'a>> + ExactSizeIterator {\n   58 |         self.node.children().iter().map(move |node| {\n   59 |             Layout::with_offset(Vector::new(self.position.x, self.position.y), node)\n   60 |         })\n   61 |     }\n   62 | \n   63 |     /// Returns the [`Layout`] of the child at the given index.\n   64 |     ///\n   65 |     /// This can be useful if you ever need to access children out of order\n   66 |     /// for layering purposes.\n   67 |     ///\n   68 |     /// # Panics\n   69 |     /// Panics if index is out of bounds.\n   70 |     pub fn child(self, index: usize) -> Layout<'a> {\n   71 |         let node = &self.node.children()[index];\n   72 | \n   73 |         Layout::with_offset(Vector::new(self.position.x, self.position.y), node)\n   74 |     }","lines":19}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Size::ratio` is marked `const fn` but its body calls `f32::min`, which is not a const fn\non stable, and more importantly the semantics look wrong/misleading: it independently clamps\nwidth to `self.width` and height to `self.height`, producing a Size whose width and height\nno longer share the requested `aspect_ratio` in general (each axis is clamped separately, so\nthe resulting width/height ratio is not `aspect_ratio`). The doc says \"Applies an aspect\nratio ... without exceeding its bounds\" but the two components are computed and clamped\nindependently, so the output is not guaranteed to actually have the given aspect ratio.","fix":"Decide on one driving axis: compute candidate `width = height * aspect_ratio`; if it exceeds `self.width`, derive height from width instead, then return a Size that genuinely has `aspect_ratio`. Also re-evaluate the `const` qualifier.","locations":[{"ref":"core/src/size.rs:66-73","code":"   66 |     /// Applies an aspect ratio to this [`Size`] without\n   67 |     /// exceeding its bounds.\n   68 |     pub const fn ratio(self, aspect_ratio: f32) -> Size {\n   69 |         Size {\n   70 |             width: (self.height * aspect_ratio).min(self.width),\n   71 |             height: (self.width / aspect_ratio).min(self.height),\n   72 |         }\n   73 |     }","lines":8}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Span`'s manual `PartialEq` only compares `text`, `size`, `line_height`, `font`, and `color`. It ignores `highlight`, `padding`, `underline`, and `strikethrough` (it also ignores `link`, which may be intentional since `Link` is not bounded by `PartialEq`). Because span-based widgets (e.g. rich text) use this `PartialEq` to detect whether a re-layout/re-draw is needed, changing only a span's highlight, padding, underline, or strikethrough will compare as `Eq` and the visual change will silently be dropped (stale rendering). At minimum `underline`, `strikethrough`, `highlight`, and `padding` affect appearance and should participate in equality.","fix":"Extend the `eq` implementation to also compare `highlight`, `padding`, `underline`, and `strikethrough` (all of which are `PartialEq`). If `link` cannot be compared due to the missing bound, document explicitly why it is excluded; otherwise add a `Link: PartialEq` bound and compare it too.","locations":[{"ref":"core/src/text.rs:615-623","code":"  615 | impl<Link, Font: PartialEq> PartialEq for Span<'_, Link, Font> {\n  616 |     fn eq(&self, other: &Self) -> bool {\n  617 |         self.text == other.text\n  618 |             && self.size == other.size\n  619 |             && self.line_height == other.line_height\n  620 |             && self.font == other.font\n  621 |             && self.color == other.color\n  622 |     }\n  623 | }","lines":9}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`palette::lighten` divides by `oklch.l.max(0.05)` to bump chroma, but unlike `darken` it does\nNOT guard `oklch.c > 0` or any upper bound on the chroma growth. For a near-black color\n(l close to 0) and a sizable `amount`, `oklch.c *= 1.0 + 2.0*amount/0.05` multiplies chroma by\nup to `1 + 40*amount`, which can blow chroma far past the gamut and produce a wildly saturated\ncolor after `from_oklch` clamps the linear RGB. The asymmetry with `darken` (which caps with\n`.min(100.0)` and guards `c > 0`) looks unintended.","fix":"Mirror darken's guards: only bump chroma when `oklch.c > 0`, and cap the multiplier (e.g. `.min(...)`) to avoid runaway saturation for very dark colors.","locations":[{"ref":"core/src/theme/palette.rs:528-542","code":"  528 | pub fn lighten(color: Color, amount: f32) -> Color {\n  529 |     let mut oklch = color.into_oklch();\n  530 | \n  531 |     // We try to bump the chroma a bit for more colorful palettes\n  532 |     // Formula empirically and cluelessly derived\n  533 |     oklch.c *= 1.0 + 2.0 * amount / oklch.l.max(0.05);\n  534 | \n  535 |     oklch.l = if oklch.l + amount > 1.0 {\n  536 |         1.0\n  537 |     } else {\n  538 |         oklch.l + amount\n  539 |     };\n  540 | \n  541 |     Color::from_oklch(oklch)\n  542 | }","lines":15},{"ref":"core/src/theme/palette.rs:509-525","code":"  509 | pub fn darken(color: Color, amount: f32) -> Color {\n  510 |     let mut oklch = color.into_oklch();\n  511 | \n  512 |     // We try to bump the chroma a bit for more colorful palettes\n  513 |     if oklch.c > 0.0 && oklch.c < (1.0 - oklch.l) / 2.0 {\n  514 |         // Formula empirically and cluelessly derived\n  515 |         oklch.c *= 1.0 + (0.2 / oklch.c).min(100.0) * amount;\n  516 |     }\n  517 | \n  518 |     oklch.l = if oklch.l - amount < 0.0 {\n  519 |         0.0\n  520 |     } else {\n  521 |         oklch.l - amount\n  522 |     };\n  523 | \n  524 |     Color::from_oklch(oklch)\n  525 | }","lines":17}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`focus_previous` mishandles the case where the focused widget is at a non-zero index and the predecessor should be focused. The arms only cover `Some(0)` specially and `Some(focused) if focused - 1 == self.current`. When `focused` is some index `k > 0`, the widget at `current == k` must be unfocused (handled by `focused == self.current`) and the widget at `current == k-1` focused (handled by `focused - 1 == self.current`). However, because widgets are visited in forward order and `current` increments after each visit, the widget at index `k-1` is visited BEFORE the widget at index `k`. At the time index `k-1` is visited, `focus()` is called correctly, but the still-focused widget at index `k` has not yet been unfocused; then when index `k` is visited it is unfocused. The net result leaves two widgets transiently focused during traversal and relies on call ordering. While it converges to the right end state for a single `Focusable` backend, any operation that reads focus state mid-traversal (or short-circuits) observes an inconsistent state. The asymmetry with `focus_next` (which has no `Some(0)` special-case and unfocuses the current then focuses next) indicates a copy/paste-style divergence worth auditing.","fix":"Mirror the structure of `focus_next`: unfocus the currently focused index and focus its neighbor without the ad-hoc `Some(0)` arms. For previous: `None if current == total-1 => focus`, `Some(0) if current == 0 => unfocus` is subsumed by wrap handling; restructure so exactly one widget ends focused and intermediate state is not relied upon, e.g. compute the target index up front.","locations":[{"ref":"core/src/widget/operation/focusable.rs:113-129","code":"  113 |     impl<T> Operation<T> for FocusPrevious {\n  114 |         fn focusable(&mut self, _id: Option<&Id>, _bounds: Rectangle, state: &mut dyn Focusable) {\n  115 |             if self.count.total == 0 {\n  116 |                 return;\n  117 |             }\n  118 | \n  119 |             match self.count.focused {\n  120 |                 None if self.current == self.count.total - 1 => state.focus(),\n  121 |                 Some(0) if self.current == 0 => state.unfocus(),\n  122 |                 Some(0) => {}\n  123 |                 Some(focused) if focused == self.current => state.unfocus(),\n  124 |                 Some(focused) if focused - 1 == self.current => state.focus(),\n  125 |                 _ => {}\n  126 |             }\n  127 | \n  128 |             self.current += 1;\n  129 |         }","lines":17}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`diff_children_custom_with_search` recomputes `first_maybe_changed`/`last_maybe_changed` inside the grow branch (lines 158-159) using `current_children.len() - 1`, but this branch is only reachable when `current_children.len() < new_children.len()`, which after the preceding shrink block is mutually exclusive anyway. The shadowed recomputation on line 158-159 is redundant with the values computed at lines 135-136 (the shrink block never runs when growing, so `current_children` is unchanged), making the code confusing and the second `last_maybe_changed` query an unnecessary extra `maybe_changed` call. More importantly, the heuristic that selects `difference_index` for insertion/removal does not guarantee structural correctness: elements can be diffed against mismatched widget state when an insertion/removal happens in the middle and the `maybe_changed` predicate does not pinpoint the exact boundary, leading to stale widget state being paired with the wrong child after a structural change.","fix":"Drop the redundant recomputation in the grow branch and unify the search. Document the invariant that `maybe_changed` must precisely identify changed indices, or fall back to a positional diff when it cannot.","locations":[{"ref":"core/src/widget/tree.rs:157-180","code":"  157 |     if current_children.len() < new_children.len() {\n  158 |         let first_maybe_changed = maybe_changed(0);\n  159 |         let last_maybe_changed = maybe_changed(current_children.len() - 1);\n  160 | \n  161 |         if !first_maybe_changed && last_maybe_changed {\n  162 |             current_children.extend(new_children[current_children.len()..].iter().map(new_state));\n  163 |         } else {\n  164 |             let difference_index = if first_maybe_changed {\n  165 |                 0\n  166 |             } else {\n  167 |                 (1..current_children.len())\n  168 |                     .find(|&i| maybe_changed(i))\n  169 |                     .unwrap_or(0)\n  170 |             };\n  171 | \n  172 |             let _ = current_children.splice(\n  173 |                 difference_index..difference_index,\n  174 |                 new_children[difference_index\n  175 |                     ..difference_index + (new_children.len() - current_children.len())]\n  176 |                     .iter()\n  177 |                     .map(new_state),\n  178 |             );\n  179 |         }\n  180 |     }","lines":24}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`rewind` replays messages `0..message` only when `message < self.messages.len()`. When `message >= len` (e.g. the UI requests the latest index inclusively, or an out-of-range index arrives over the network via `Command::RewindTo { message }`), the entire `if` is skipped and `self.state` is set to a freshly-booted state with NO messages replayed, silently snapping the program back to its initial state instead of replaying everything up to the present. Given `message` originates from untrusted network input in beacon, an out-of-range value produces a confusing full reset rather than being clamped.","fix":"Clamp the cursor: `let end = message.min(self.messages.len());` and always replay `&self.messages[0..end]`, removing the conditional that skips replay entirely on out-of-range input.","locations":[{"ref":"devtools/src/time_machine.rs:33-45","code":"   33 |     pub fn rewind(&mut self, program: &P, message: usize) {\n   34 |         crate::debug::disable();\n   35 |         let (mut state, _) = program.boot();\n   36 | \n   37 |         if message < self.messages.len() {\n   38 |             // TODO: Run concurrently (?)\n   39 |             for message in &self.messages[0..message] {\n   40 |                 let _ = program.update(&mut state, message.clone());\n   41 |             }\n   42 |         }\n   43 | \n   44 |         self.state = Some(state);\n   45 |     }","lines":13}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `Tracker::update`, when a recipe's hash id already exists in `self.subscriptions`, the code `continue`s without rebuilding the stream. The recipe's hash is computed from its `data`/`TypeId` only (see `Runner::hash` and `With`/`Map` hashers), NOT from the closure-captured runtime state, so two semantically different subscriptions that share the same id collapse into one: the first stream keeps running and the new recipe is silently dropped. More importantly, `recipe.stream(...)` is never called for a colliding id, so a NEW recipe instance that produces a different stream but hashes the same is never started. This is the classic 'stale stream on hash collision' hazard the diff relies on hash uniqueness to avoid. Documenting/strengthening that recipes must hash all inputs would help, but the silent drop on collision is a correctness footgun.","fix":"Document loudly that a `Recipe::hash` MUST incorporate every input that affects its stream (the default `Runner` only hashes `TypeId<I>` + `data`). Consider detecting collisions defensively, e.g. storing a small fingerprint and logging when two distinct recipes map to the same id, so stale-stream bugs surface instead of silently reusing the old stream.","locations":[{"ref":"futures/src/subscription/tracker.rs:79-81","code":"   79 |             if self.subscriptions.contains_key(&id) {\n   80 |                 continue;\n   81 |             }","lines":3},{"ref":"futures/src/subscription.rs:492-495","code":"  492 |     fn hash(&self, state: &mut Hasher) {\n  493 |         std::any::TypeId::of::<I>().hash(state);\n  494 |         self.data.hash(state);\n  495 |     }","lines":4}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The subscription diff cancels removed subscriptions via `self.subscriptions.retain(|id, _| alive.contains(id))`. Cancellation relies on dropping `Execution`, which drops the `_cancel` oneshot::Sender; the spawned `future` observes the canceled oneshot and breaks. However, this only works if the future is actually being polled by the executor. With the `null` backend (futures are dropped, not spawned) or any executor where the returned futures are not driven, removing a subscription drops the channel but the stream/future was never running anyway - acceptable - yet the inverse failure (executor that ignores the returned futures while `update` still records the subscription as alive in the map) leaves a permanently-registered id whose stream never runs but which is broadcast to. The map state and the actually-running tasks can desynchronize because `update` inserts into `self.subscriptions` BEFORE the caller spawns the returned future, and nothing verifies the spawn happened.","fix":"The registration and the spawn should be coupled. Either have `Tracker::update` spawn via an injected executor, or document the strict contract that every returned future MUST be spawned, and assert it in debug. Currently a caller that drops a returned future leaves a phantom subscription in the map.","locations":[{"ref":"futures/src/subscription/tracker.rs:105-122","code":"  105 |             let _ = self.subscriptions.insert(\n  106 |                 id,\n  107 |                 Execution {\n  108 |                     _cancel: cancel,\n  109 |                     listener: if event_sender.is_closed() {\n  110 |                         None\n  111 |                     } else {\n  112 |                         Some(event_sender)\n  113 |                     },\n  114 |                 },\n  115 |             );\n  116 | \n  117 |             futures.push(Box::pin(future));\n  118 |         }\n  119 | \n  120 |         self.subscriptions.retain(|id, _| alive.contains(id));\n  121 | \n  122 |         futures","lines":18},{"ref":"futures/src/runtime.rs:102-107","code":"  102 |         let futures = executor.enter(|| subscriptions.update(recipes.into_iter(), sender.clone()));\n  103 | \n  104 |         for future in futures {\n  105 |             executor.spawn(future);\n  106 |         }\n  107 |     }","lines":6}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `damage::group`, the merge heuristic is `union.area() - current.area() - region.area() <= AREA_THRESHOLD`. For overlapping rectangles this quantity is negative (union <= a+b), so overlapping regions always merge - fine. But the expression ignores the overlap when regions are disjoint, and more importantly the running `current` accumulates: after merging it becomes a large bounding box, so the wasted-area metric measured against the next region is computed relative to the already-inflated box, not the original primitives. This biases toward producing a few very large damage rectangles (over-damage), hurting the perf benefit damage tracking is supposed to provide. The threshold is also a hard-coded constant independent of viewport size/scale.","fix":"Reconsider the grouping metric so it bounds the extra wasted area introduced per merge rather than comparing against an ever-growing accumulator, and/or scale AREA_THRESHOLD by viewport resolution. Add tests covering many small disjoint regions to confirm they are not collapsed into one huge rect.","locations":[{"ref":"graphics/src/damage.rs:62-75","code":"   62 |     if let Some(mut current) = scaled.next() {\n   63 |         for region in scaled {\n   64 |             let union = current.union(&region);\n   65 | \n   66 |             if union.area() - current.area() - region.area() <= AREA_THRESHOLD {\n   67 |                 current = union;\n   68 |             } else {\n   69 |                 output.push(current);\n   70 |                 current = region;\n   71 |             }\n   72 |         }\n   73 | \n   74 |         output.push(current);\n   75 |     }","lines":14}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`geometry::cache::Cache::draw_with_bounds` keys cache validity solely on `current.bounds == bounds` (exact `Rectangle` equality). The `draw_fn` closure can capture and depend on arbitrary external state (colors, data, time) that changes without the bounds changing; in that case the stale cached geometry is returned and `Cached::load` replays old content. The doc comment does state the closure only runs when size changes or the cache is cleared, so this is \"by design\", but it is a sharp edge: there is no content hashing despite the audit-level expectation, so any caller that forgets to call `clear()` silently renders stale geometry. Also `Rectangle` equality is float equality, so sub-pixel bounds jitter forces needless full redraws.","fix":"Document the staleness contract prominently on `draw`/`draw_with_bounds`, and/or add an optional content-key / version parameter so callers can invalidate on data change without manual `clear()`. Consider comparing bounds with an epsilon to avoid jitter redraws.","locations":[{"ref":"graphics/src/geometry/cache.rs:84-108","code":"   84 |         let state = self.raw.state();\n   85 | \n   86 |         let previous = match state.borrow().deref() {\n   87 |             cache::State::Empty { previous } => previous.as_ref().map(|data| data.geometry.clone()),\n   88 |             cache::State::Filled { current } => {\n   89 |                 if current.bounds == bounds {\n   90 |                     return Cached::load(&current.geometry);\n   91 |                 }\n   92 | \n   93 |                 Some(current.geometry.clone())\n   94 |             }\n   95 |         };\n   96 | \n   97 |         let mut frame = Frame::with_bounds(renderer, bounds);\n   98 |         draw_fn(&mut frame);\n   99 | \n  100 |         let geometry = frame.into_geometry().cache(self.raw.group(), previous);\n  101 |         let result = Cached::load(&geometry);\n  102 | \n  103 |         *state.borrow_mut() = cache::State::Filled {\n  104 |             current: Data { bounds, geometry },\n  105 |         };\n  106 | \n  107 |         result\n  108 |     }","lines":25}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`rounded_rectangle` computes `min_size = (size.height / 2.0).min(size.width / 2.0)` and clamps each corner radius with `min_size.min(corner)`, but does not guard against negative or NaN `size`/`radius` inputs. A negative width/height makes `min_size` negative, so `min_size.min(corner)` becomes negative and is fed into `arc_to` as a negative `radius`; `arc_to` only short-circuits on `radius == 0.0`, so a negative radius flows into the tangent/arc math and produces inverted/degenerate geometry rather than an empty or clamped shape. NaN corner radii propagate similarly.","fix":"Clamp `min_size` and each corner radius to be non-negative (e.g. `.max(0.0)`) before use, and early-return / treat as a plain rectangle when `size` has non-positive dimensions.","locations":[{"ref":"graphics/src/geometry/path int::new(\n  203 |                 top_left.x,\n  204 |                 top_left.y + size.height - min_size.min(bottom_left_corner),\n  205 |             ),\n  206 |             min_size.min(bottom_left_corner),\n  207 |         );\n  208 |         self.line_to(Point::new(\n  209 |             top_left.x,\n  210 |             top_left.y + min_size.min(top_left_corner),\n  211 |         ));\n  212 |         self.arc_to(\n  213 |             Point::new(top_left.x, top_left.y),\n  214 |             Point::new(top_left.x + min_size.min(top_left_corner), top_left.y),\n  215 |             min_size.min(top_left_corner),\n  216 |         );\n  217 |         self.close();","lines":59}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Paragraph::with_spans` (rich text) never calls `buffer.set_ellipsize(...)`, while the plain\n`Paragraph::with_text` path does (graphics/src/text/paragraph.rs:94-97). As a result, rich\nparagraphs ignore the requested `Ellipsis` strategy entirely - long multi-span text that should\nbe truncated with an ellipsis is instead clipped or overflowed. The `ellipsis` field is still\nstored in `Internal` and compared in `compare`, so the value round-trips but is never applied\nto the buffer for spans.","fix":"After `buffer.set_wrap(...)` in `with_spans`, add the same ellipsize call used in `with_text`:\n`buffer.set_ellipsize(text::to_ellipsize(text.ellipsis, text.bounds.height * hint_factor));`.","locations":[{"ref":"graphics/src/text/paragraph.rs:152-153","code":"  152 |         buffer.set_wrap(text::to_wrap(text.wrapping));\n  153 | ","lines":2}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`with_physical_size` divides by `scale_factor` with no validation. A `scale_factor` of 0.0 yields infinite logical width/height (f32 inf), and a negative scale factor yields negative logical sizes; both then propagate into layout/projection math producing NaN/garbage rather than a clear error. Scale factor is sometimes derived from external/window-system values.","fix":"Validate `scale_factor > 0.0` (debug_assert and/or clamp to a small positive epsilon) before computing logical_size, or document the precondition explicitly and ensure callers guarantee it.","locations":[{"ref":"graphics/src/viewport.rs:15-25","code":"   15 |     pub fn with_physical_size(size: Size<u32>, scale_factor: f32) -> Viewport {\n   16 |         Viewport {\n   17 |             physical_size: size,\n   18 |             logical_size: Size::new(\n   19 |                 size.width as f32 / scale_factor,\n   20 |                 size.height as f32 / scale_factor,\n   21 |             ),\n   22 |             scale_factor,\n   23 |             projection: Transformation::orthographic(size.width, size.height),\n   24 |         }\n   25 |     }","lines":11}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"None of the `with_*` program decorators forward the `presets()` method. The `Program` trait declares `presets()` with a default implementation that returns an empty slice (`&[]`). `with_title`, `with_subscription`, `with_theme`, `with_style`, `with_scale_factor`, and `with_executor` each define a new `Program` impl that overrides one method and forwards all the others to the inner program - except `presets()`, which silently falls back to the empty default. So any program that defines boot presets loses them the moment it is wrapped by one of these decorators. The top-level `Application`/`Daemon` builders happen to keep presets in their own struct field and re-implement `presets()`, so this is masked there, but `program::with_*` used directly (a public API) drops presets.","fix":"Add a forwarding `presets()` to every `with_*` decorator impl, e.g.`fn presets(&self) -> &[Preset<Self::State, Self::Message>] { self.program.presets() }`.","locations":[{"ref":"program/ type_label":"Logic Error","severity":"medium","easy":false,"description":"Renderer::draw recreates the background and re-renders ALL layers fully inside the per-damage-rectangle loop. Each damage rect repaints the entire layer set clipped to that rect. With N damage rectangles this is O(N * total_primitives), and adjust_clip_mask (a full mask clear + path fill over the whole mask buffer) is invoked once per layer per damage rect. For many small damage regions this is a large redundant cost; the typical software-renderer approach clips once per damage union or batches primitives by damage.","fix":"Either group damage into fewer rectangles before the loop (damage::group is only applied at the compositor level, not here for the screenshot path), or restructure so primitives are iterated once and tested against all damage rects, rather than iterating all primitives per damage rect.","locations":[{"ref":"tiny_skia/src/lib.rs:72-183","code":"   72 |         for &damage_bounds in damage {\n   73 |             let damage_bounds = damage_bounds * scale_factor;\n   74 | \n   75 |             let path = tiny_skia::PathBuilder::from_rect(\n   76 |                 tiny_skia::Rect::from_xywh(\n   77 |                     damage_bounds.x,\n   78 |                     damage_bounds.y,\n   79 |                     damage_bounds.width,\n   80 |                     damage_bounds.height,\n   81 |                 )\n   82 |                 .expect(\"Create damage rectangle\"),\n   83 |             );\n   84 | \n   85 |             pixels.fill_path(\n   86 |                 &path,\n   87 |                 &tiny_skia::Paint {\n   88 |                     shader: tiny_skia::Shader::SolidColor(engine::into_color(background_color)),\n   89 |                     anti_alias: false,\n   90 |                     blend_mode: tiny_skia::BlendMode::Source,\n   91 |                     ..Default::default()\n   92 |                 },\n   93 |                 tiny_skia::FillRule::default(),\n   94 |
