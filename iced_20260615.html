dow/icon.rs:47-54","code":"   47 | impl std::fmt::Debug for Icon {\n   48 |     fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n   49 |         f.debug_struct(\"Icon\")\n   50 |             .field(\"rgba\", &format!(\"{} pixels\", self.rgba.len() / 4))\n   51 |             .field(\"size\", &self.size)\n   52 |             .finish()\n   53 |     }\n   54 | }","lines":8},{"ref":"core/src/window/icon.rs:8","code":"    8 |     const PIXEL_SIZE: usize = mem::size_of::<u8>() * 4;","lines":1}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `install`, the stderr read loop is `while let Ok(n) = stderr.read_line(&mut log)`. If `read_line` returns an `Err` (e.g. invalid UTF-8 in the child's stderr), the loop exits silently without calling `install.wait()` or checking the exit status, then unconditionally sends `install::Event::Finished` and returns `Ok(())`. A failed or still-running install would be reported as a successful finish.","fix":"Handle the `Err` branch explicitly (propagate or log and then `wait()` to check status); only send `Finished` after confirming the process exited successfully.","locations":[{"ref":"devtools/src/comet.rs:71-89","code":"   71 |         while let Ok(n) = stderr.read_line(&mut log) {\n   72 |             if n == 0 {\n   73 |                 let status = install.wait()?;\n   74 | \n   75 |                 if status.success() {\n   76 |                     break;\n   77 |                 } else {\n   78 |                     return Err(install::Error::ProcessFailed(status));\n   79 |                 }\n   80 |             }\n   81 | \n   82 |             let _ = sender.try_send(install::Event::Logged(log.trim_end().to_owned()));\n   83 | \n   84 |             log.clear();\n   85 |         }\n   86 | \n   87 |         let _ = sender.try_send(install::Event::Finished);\n   88 | \n   89 |         Ok(())","lines":19}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Compositor::create_surface` returns `Self::Surface` directly (not a `Result`), so a backend that fails to create a surface (e.g. unsupported window handle, out-of-memory) has no way to report it except panicking inside the implementation. By contrast `present` returns `Result<_, SurfaceError>`. This asymmetry forces backends to panic on surface-creation failure.","fix":"Consider returning `Result<Self::Surface, SurfaceError>` (or a dedicated error) from `create_surface`/`configure_surface` so creation failures are recoverable rather than panic-only.","locations":[{"ref":"graphics/src/compositor.rs:38-43","code":"   38 |     fn create_surface(\n   39 |         &mut self,\n   40 |         window: impl Window + Clone,\n   41 |         width: u32,\n   42 |         height: u32,\n   43 |     ) -> Self::Surface;","lines":6}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The default `load_font` implementation always returns `Ok(())` even though `font_system().write().load_font(font)` can encounter problems; the `// TODO: Error handling` comment acknowledges that real errors are swallowed. Callers cannot distinguish a successfully loaded font from a silently failed one.","fix":"Propagate the result of `load_font` (and any parse failure) into the returned `Result<(), font::Error>` instead of unconditionally returning `Ok(())`.","locations":[{"ref":"graphics/src/compositor.rs:54-62","code":"   54 |     fn load_font(&mut self, font: Cow<'static, [u8]>) -> Result<(), font::Error> {\n   55 |         crate::text::font_system()\n   56 |             .write()\n   57 |             .expect(\"Write to font system\")\n   58 |             .load_font(font);\n   59 | \n   60 |         // TODO: Error handling\n   61 |         Ok(())\n   62 |     }","lines":9}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Every `Builder` path-construction method discards lyon's returned result with `let _ = self.raw.move_to(...)` / `line_to(...)` etc. lyon's SVG builder can flag errors (e.g. operations issued in an invalid order such as `line_to` before any `move_to`, which lyon turns into a move). Swallowing all of these means a malformed build sequence silently produces an empty or unexpected path with no diagnostic, making caller bugs hard to find.","fix":"At minimum `debug_assert!` or `log::warn!` when lyon reports a builder error, rather than discarding it unconditionally, so invalid path-construction order is observable in debug builds.","locations":[{"ref":"graphics/src/geometry/path/builder.rs:27-36","code":"   27 |     pub fn move_to(&mut self, point: Point) {\n   28 |         let _ = self.raw.move_to(math::Point::new(point.x, point.y));\n   29 |     }\n   30 | \n   31 |     /// Connects the last point in the [`Path`] to the given `Point` with a\n   32 |     /// straight line.\n   33 |     #[inline]\n   34 |     pub fn line_to(&mut self, point: Point) {\n   35 |         let _ = self.raw.line_to(math::Point::new(point.x, point.y));\n   36 |     }","lines":10},{"ref":"graphics/src/geometry/path/builder.rs:90-100","code":"   90 |         let _ = self.raw.line_to(arc_start);\n   91 | \n   92 |         self.raw.arc_to(\n   93 |             math::Vector::new(radius, radius),\n   94 |             math::Angle::radians(0.0),\n   95 |             lyon_path::ArcFlags {\n   96 |                 large_arc: false,\n   97 |                 sweep,\n   98 |             },\n   99 |             arc_end,\n  100 |         );","lines":11},{"ref":"graphics/src/geometry/path/builder.rs:113-140","code":"  113 |         let _ = self.raw.move_to(arc.sample(0.0));\n  114 | \n  115 |         arc.cast::<f64>().for_each_quadratic_bezier(&mut |curve| {\n  116 |             let curve = curve.cast::<f32>();\n  117 |             let _ = self.raw.quadratic_bezier_to(curve.ctrl, curve.to);\n  118 |         });\n  119 |     }\n  120 | \n  121 |     /// Adds a cubic Bézier curve to the [`Path`] given its two control points\n  122 |     /// and its end point.\n  123 |     #[inline]\n  124 |     pub fn bezier_curve_to(&mut self, control_a: Point, control_b: Point, to: Point) {\n  125 |         let _ = self.raw.cubic_bezier_to(\n  126 |             math::Point::new(control_a.x, control_a.y),\n  127 |             math::Point::new(control_b.x, control_b.y),\n  128 |             math::Point::new(to.x, to.y),\n  129 |         );\n  130 |     }\n  131 | \n  132 |     /// Adds a quadratic Bézier curve to the [`Path`] given its control point\n  133 |     /// and its end point.\n  134 |     #[inline]\n  135 |     pub fn quadratic_curve_to(&mut self, control: Point, to: Point) {\n  136 |         let _ = self.raw.quadratic_bezier_to(\n  137 |             math::Point::new(control.x, control.y),\n  138 |             math::Point::new(to.x, to.y),\n  139 |         );\n  140 |     }","lines":28}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`buffer_mut_from_editor` calls `unreachable!()` for the `BufferRef::Arc` arm, while the\nread-only `buffer_from_editor` handles that same arm normally. If an `Editor` is ever\nconstructed over an `Arc`-backed buffer (cosmic-text supports it), any mutable access\n(`update`, `highlight`, `perform`) panics via `unreachable!`. The asymmetry is a latent trap:\nthe immutable accessor implies Arc buffers are valid, but the mutable one forbids them with a\npanic rather than a graceful path or a `BufferRef`-to-owned conversion.","fix":"Either document/enforce at construction that the editor never uses an Arc-backed buffer, or\nreturn a proper error / convert instead of `unreachable!()`.","locations":[{"ref":"graphics/src/text/editor.rs:848-852","code":"  848 |     match editor.buffer_ref_mut() {\n  849 |         cosmic_text::BufferRef::Owned(buffer) => buffer,\n  850 |         cosmic_text::BufferRef::Borrowed(buffer) => buffer,\n  851 |         cosmic_text::BufferRef::Arc(_buffer) => unreachable!(),\n  852 |     }","lines":5}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`from_file` ignores the `image` crate's `ImageError` variant when it could have used it. Decode/open errors from `ImageReader::open(...)?.decode()?` are converted through the `?` operator: `open(...)?` yields `io::Error` (mapped to `Error::OsError`) but `.decode()?` yields `image::error::ImageError`, mapped via `#[from]` to `Error::ImageError`. This is correct, but note that an I/O failure while opening the file surfaces as `OsError` rather than `ImageError`, which is inconsistent with the `from_file_data` path where all failures are `ImageError`. Two file-loading helpers report the same class of failure under different error variants, complicating downstream matching.","fix":"Either document the differing error variants, or normalize both helpers to map decode/open failures consistently (e.g. wrap the open I/O error into a single file-loading variant).","locations":[{"ref":"src/window/icon.rs:15-19","code":"   15 | pub fn from_file<P: AsRef<Path>>(icon_path: P) -> Result<Icon, Error> {\n   16 |     let icon = image::ImageReader::open(icon_path)?.decode()?.to_rgba8();\n   17 | \n   18 |     Ok(icon::from_rgba(icon.to_vec(), icon.width(), icon.height())?)\n   19 | }","lines":5},{"ref":"src/window/icon.rs:26-47","code":"   26 | pub fn from_file_data(\n   27 |     data: &[u8],\n   28 |     explicit_format: Option<image::ImageFormat>,\n   29 | ) -> Result<Icon, Error> {\n   30 |     let mut icon = image::ImageReader::new(std::io::Cursor::new(data));\n   31 | \n   32 |     let icon_with_format = match explicit_format {\n   33 |         Some(format) => {\n   34 |             icon.set_format(format);\n   35 |             icon\n   36 |         }\n   37 |         None => icon.with_guessed_format()?,\n   38 |     };\n   39 | \n   40 |     let pixels = icon_with_format.decode()?.to_rgba8();\n   41 | \n   42 |     Ok(icon::from_rgba(\n   43 |         pixels.to_vec(),\n   44 |         pixels.width(),\n   45 |         pixels.height(),\n   46 |     )?)\n   47 | }","lines":22}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Snapshot::matches_image` compares the in-memory rgba bytes against the decoded PNG bytes but never\nverifies that the stored image dimensions match the current screenshot dimensions. Two images with\ndifferent width/height but identical total byte counts (e.g. a transposed 100x200 vs 200x100, or any\nWxH vs HxW with equal area) would compare equal, yielding a false snapshot pass.","fix":"Read `info.width`/`info.height` from the decoded PNG and compare them to `self.screenshot.size` before (or together with) the byte comparison; return false on mismatch.","locations":[{"ref":"test/src/simulator.rs:247-258","code":"  247 |         if path.exists() {\n  248 |             let file = fs::File::open(&path)?;\n  249 |             let decoder = png::Decoder::new(io::BufReader::new(file));\n  250 | \n  251 |             let mut reader = decoder.read_info()?;\n  252 |             let n = reader\n  253 |                 .output_buffer_size()\n  254 |                 .expect(\"snapshot should fit in memory\");\n  255 |             let mut bytes = vec![0; n];\n  256 |             let info = reader.next_frame(&mut bytes)?;\n  257 | \n  258 |             Ok(self.screenshot.rgba == bytes[..info.buffer_size()])","lines":12}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"On import, file read errors are silently swallowed: `fs::read_to_string(file.path()).unwrap_or_default()`\nturns any IO failure into an empty string, which is then fed to `Ice::parse`. The resulting\n`ParseError::NoMetadata` masks the real cause (file unreadable / permissions / not found) and is\nlogged as a parse error instead of an IO error, confusing the user.","fix":"Propagate the IO error into the `Imported` result (e.g. map it to a dedicated error variant) instead of `unwrap_or_default()`, so the user sees why the import failed.","locations":[{"ref":"tester/src/lib.rs:301-306","code":"  301 |                         task::blocking(move |mut sender| {\n  302 |                             let _ = sender.try_send(Ice::parse(\n  303 |                                 &fs::read_to_string(file.path()).unwrap_or_default(),\n  304 |                             ));\n  305 |                         })\n  306 |                     })","lines":6}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"draw_image's Raster branch calls adjust_clip_mask(_clip_mask, clip_bounds) and then unconditionally passes Some(_clip_mask) to the raster pipeline, even when the image fully lies within clip_bounds (no clipping needed). The Vector branch and all text/quad paths skip the mask via is_within() in that case. This forces a full mask rebuild and per-pixel mask test for every raster image regardless of whether clipping is required, and the comment notes border radius is also unhandled.","fix":"Mirror the other paths: only build/pass the clip mask when !physical_bounds.is_within(&clip_bounds); otherwise pass None to draw_pixmap.","locations":[{"ref":"tiny_skia/src/engine.rs:526-552","code":"  526 |                 let physical_bounds = *local_clip_bounds * _transformation;\n  527 | \n  528 |                 let Some(clip_bounds) = physical_bounds.intersection(&_clip_bounds) else {\n  529 |                     return;\n  530 |                 };\n  531 | \n  532 |                 // TODO: Border radius\n  533 |                 adjust_clip_mask(_clip_mask, clip_bounds);\n  534 | \n  535 |                 let center = bounds.center();\n  536 |                 let radians = f32::from(image.rotation);\n  537 | \n  538 |                 let transform = into_transform(_transformation).pre_rotate_at(\n  539 |                     radians.to_degrees(),\n  540 |                     center.x,\n  541 |                     center.y,\n  542 |                 );\n  543 | \n  544 |                 self.raster_pipeline.draw(\n  545 |                     &image.handle,\n  546 |                     image.filter_method,\n  547 |                     *bounds,\n  548 |                     image.opacity,\n  549 |                     _pixels,\n  550 |                     transform,\n  551 |                     Some(_clip_mask),\n  552 |                 );","lines":27}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Pipeline::targets` (MSAA) takes the write lock and may rebuild the targets, while `render_pass` and\n`State::render` independently re-acquire the read lock and call `.as_ref().unwrap()` on the stored `Option`.\nThis relies on `prepare`/`targets` having been called first to populate the `Option`; if `render_pass` or\n`State::render` is ever reached without a prior successful `targets()` call (e.g. an early-out path or future\nrefactor), the `unwrap()` panics. The invariant \"targets is always Some by render time\" is implicit and\nunchecked across three methods.","fix":"Make the dependency explicit, e.g. have `render`/`render_pass` accept the `Targets` produced by `prepare`\n(thread it through `State`), or return a `Result`/`Option` instead of `unwrap`ing the shared lock contents.","locations":[{"ref":"wgpu/src/triangle/msaa.rs:141-143","code":"  141 |     pub fn render_pass<'a>(&self, encoder: &'a mut wgpu::CommandEncoder) -> wgpu::RenderPass<'a> {\n  142 |         let targets = self.targets.read().expect(\"Read MSAA targets\");\n  143 |         let targets = targets.as_ref().unwrap();","lines":3},{"ref":"wgpu/src/triangle/msaa.rs:333-342","code":"  333 |         render_pass.set_bind_group(\n  334 |             1,\n  335 |             &pipeline\n  336 |                 .targets\n  337 |                 .read()\n  338 |                 .expect(\"Read MSAA targets\")\n  339 |                 .as_ref()\n  340 |                 .unwrap()\n  341 |                 .bind_group,\n  342 |             &[],","lines":10}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Inside the redraw loop, after `update()` runs and the compositor may have been torn down,\nthe code does `compositor.as_mut()` and on `None` executes `continue 'next_event` (lib.rs:872-874).\nThis abandons the current redraw mid-flight but leaves `window.surface_version` already\nadvanced (if it was bumped earlier in this block) and the user interface already removed/reinserted,\nwithout finishing `interact_span`/scheduling a redraw. The window can be left without a present\nfor this cycle and without a follow-up redraw request, potentially showing a stale frame until\nsome other event triggers a redraw. The compositor only becomes `None` when the last window is\nremoved, but a window action run during this loop can close *other* windows; defensive handling\nis warranted.","fix":"Before `continue 'next_event`, finish the open debug span and request a redraw of remaining windows (or break the inner loop and fall through), so no window is left in an un-presented state without a scheduled redraw.","locations":[{"ref":"winit/src/lib.rs:872-874","code":"  872 |                                 let Some(next_compositor) = compositor.as_mut() else {\n  873 |                                     continue 'next_event;\n  874 |                                 };","lines":3}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`send` / `send_action` (and the worker's `proxy.send_event(message)`) discard the result of `EventLoopProxy::send_event` with `let _ =`. If the event loop has exited, output events, ticks, and redraw/relayout requests are silently dropped with no log or signal. The doc comment warns these bypass backpressure but says nothing about the events vanishing if the loop is gone, which can make shutdown-ordering bugs very hard to diagnose.","fix":"Log at debug/warn level when `send_event` returns `Err` (event loop closed), or document explicitly that these calls are best-effort and silently no-op after loop shutdown.","locations":[{"ref":"winit/src/proxy.rs:48-48","code":"   48 |                             let _ = proxy.send_event(message);","lines":1},{"ref":"winit/src/proxy.rs:94-96","code":"   94 |     pub fn send_action(&self, action: Action<T>) {\n   95 |         let _ = self.raw.send_event(action);\n   96 |     }","lines":3}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`free_slots` uses `self.notifier.start_send(amount)` with the result discarded (`let _ =`). `notifier` is a bounded `mpsc::Sender<usize>` (capacity MAX_SIZE = 100). `start_send` fails if the channel is full or the worker has not yet polled `processed`. A dropped notification permanently loses that slot-credit: the worker's `count` never gets decremented by `amount`, so the backpressure window shrinks and can eventually wedge the proxy into the always-full branch, stalling all message delivery through the `Sink`. Because each call sends a single aggregated `usize` this is unlikely in practice, but the failure mode is silent and unrecoverable.","fix":"Aggregate pending free-slot credits locally and retry on send failure, or use an unbounded channel for the notifier (the values are tiny `usize` counts), or at minimum log when `start_send` returns an error so a stuck proxy is diagnosable.","locations":[{"ref":"winit/src/proxy.rs:100-102","code":"  100 |     pub fn free_slots(&mut self, amount: usize) {\n  101 |         let _ = self.notifier.start_send(amount);\n  102 |     }","lines":3}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"The null/`()` renderer's `allocate_image`, `image::Renderer::load_image` and `measure_image` always report a fixed size of 100x100 (and `svg::measure_svg` returns `Size::default()` = 0x0). Code that lays out based on `measure_image` while using the null renderer (used in tests and headless flows guarded by `#[cfg(debug_assertions)]`) will size every image to 100x100 regardless of the real image, which can mask layout bugs in tests.","fix":"Document clearly that these are placeholder dimensions, or return `None` from `measure_image` so callers fall back to intrinsic-size handling rather than trusting a fabricated 100x100.","locations":[{"ref":"core/src/renderer/null.rs:19-26","code":"   19 |     fn allocate_image(\n   20 |         &mut self,\n   21 |         handle: &image::Handle,\n   22 |         callback: impl FnOnce(Result<image::Allocation, image::Error>) + Send + 'static,\n   23 |     ) {\n   24 |         #[allow(unsafe_code)]\n   25 |         callback(Ok(unsafe { image::allocate(handle, Size::new(100, 100)) }));\n   26 |     }","lines":8},{"ref":"core/src/renderer/null.rs:230-243","code":"  230 | impl image::Renderer for () {\n  231 |     type Handle = image::Handle;\n  232 | \n  233 |     fn load_image(&self, handle: &Self::Handle) -> Result<image::Allocation, image::Error> {\n  234 |         #[allow(unsafe_code)]\n  235 |         Ok(unsafe { image::allocate(handle, Size::new(100, 100)) })\n  236 |     }\n  237 | \n  238 |     fn measure_image(&self, _handle: &Self::Handle) -> Option<Size<u32>> {\n  239 |         Some(Size::new(100, 100))\n  240 |     }\n  241 | \n  242 |     fn draw_image(&mut self, _image: Image, _bounds: Rectangle, _clip_bounds: Rectangle) {}\n  243 | }","lines":14},{"ref":"core/src/renderer/null.rs:245-248","code":"  245 | impl svg::Renderer for () {\n  246 |     fn measure_svg(&self, _handle: &svg::Handle) -> Size<u32> {\n  247 |         Size::default()\n  248 |     }","lines":4}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"configure_surface unwraps NonZeroU32::new(width)/new(height) with .expect(\"Non-zero width\"/\"height\"). create_surface guards configure_surface behind `width > 0 && height > 0`, but configure_surface is also a public trait method that can be called directly by the windowing layer on a resize-to-zero (minimized window), which would panic instead of being handled gracefully.","fix":"Make configure_surface a no-op (or skip the softbuffer resize) when width == 0 || height == 0, matching the guard already used in create_surface.","locations":[{"ref":"tiny_skia/src/window/compositor.rs:78-89","code":"   78 |     fn configure_surface(&mut self, surface: &mut Self::Surface, width: u32, height: u32) {\n   79 |         surface\n   80 |             .window\n   81 |             .resize(\n   82 |                 NonZeroU32::new(width).expect(\"Non-zero width\"),\n   83 |                 NonZeroU32::new(height).expect(\"Non-zero height\"),\n   84 |             )\n   85 |             .expect(\"Resize surface\");\n   86 | \n   87 |         surface.clip_mask = tiny_skia::Mask::new(width, height).expect(\"Create clip mask\");\n   88 |         surface.frames.clear();\n   89 |     }","lines":12}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`Atlas::with_size` clamps the requested size to `MAX_SIZE` (2048) and `DEFAULT_SIZE` equals `MAX_SIZE`, so the atlas can never grow its per-layer dimension. Images wider or taller than 2048 are always fragmented across layers/regions. This is intentional, but the async worker creates a *dedicated* atlas per large image via `with_size(width.max(height))`, which is then immediately clamped back to 2048 - so the `width.max(height)` argument is effectively dead/misleading: the worker never actually sizes the atlas to the image. It still works (fragmentation handles it) but the intent expressed by the code is not what happens.","fix":"Either raise MAX_SIZE so the per-image atlas can actually fit large images, or drop the misleading `width.max(height)` sizing argument and document that large images are always fragmented.","locations":[{"ref":"wgpu/src/image/cache.rs:566-571","code":"  566 |             let mut atlas = Atlas::with_size(\n  567 |                 &self.device,\n  568 |                 self.backend,\n  569 |                 self.texture_layout.clone(),\n  570 |                 width.max(height),\n  571 |             );","lines":6},{"ref":"wgpu/src/image/atlas.rs:13-14","code":"   13 | pub const DEFAULT_SIZE: u32 = 2048;\n   14 | pub const MAX_SIZE: u32 = 2048;","lines":2},{"ref":"wgpu/src/image/atlas.rs:47-47","code":"   47 |         let size = size.min(MAX_SIZE);","lines":1}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"The `Default` impls for Column/Row/Stack/Grid/keyed::Column are written as `impl<Message, Renderer> Default for X<'_, Message, Renderer>`, but the type has the parameter order `<Message, Theme, Renderer>`. The impl's second type variable (named `Renderer`) actually binds the `Theme` position, leaving the real `Renderer` slot to its default `crate::Renderer`. As a result `X::default()` is only available when the theme equals `crate::Renderer`-defaulted layout, and is effectively unusable for custom `Theme`/`Renderer` combinations. The bound `Renderer: crate::core::Renderer` is also being applied to the Theme position.","fix":"Add the missing `Theme` generic: `impl<Message, Theme, Renderer> Default for X<'_, Message, Theme, Renderer> where Renderer: crate::core::Renderer`.","locations":[{"ref":"widget/src/column.rs:161-168","code":"  161 | impl<Message, Renderer> Default for Column<'_, Message, Renderer>\n  162 | where\n  163 |     Renderer: crate::core::Renderer,\n  164 | {\n  165 |     fn default() -> Self {\n  166 |         Self::new()\n  167 |     }\n  168 | }","lines":8},{"ref":"widget/src/row.rs:159-166","code":"  159 | impl<Message, Renderer> Default for Row<'_, Message, Renderer>\n  160 | where\n  161 |     Renderer: crate::core::Renderer,\n  162 | {\n  163 |     fn default() -> Self {\n  164 |         Self::new()\n  165 |     }\n  166 | }","lines":8},{"ref":"widget/src/stack.rs:112-119","code":"  112 | impl<Message, Renderer> Default for Stack<'_, Message, Renderer>\n  113 | where\n  114 |     Renderer: crate::core::Renderer,\n  115 | {\n  116 |     fn default() -> Self {\n  117 |         Self::new()\n  118 |     }\n  119 | }","lines":8},{"ref":"widget/src/grid.rs:121-128","code":"  121 | impl<Message, Renderer> Default for Grid<'_, Message, Renderer>\n  122 | where\n  123 |     Renderer: crate::core::Renderer,\n  124 | {\n  125 |     fn default() -> Self {\n  126 |         Self::new()\n  127 |     }\n  128 | }","lines":8},{"ref":"widget/src/keyed/column.rs:170-178","code":"  170 | impl<Key, Message, Renderer> Default for Column<'_, Key, Message, Renderer>\n  171 | where\n  172 |     Key: Copy + PartialEq,\n  173 |     Renderer: crate::core::Renderer,\n  174 | {\n  175 |     fn default() -> Self {\n  176 |         Self::new()\n  177 |     }\n  178 | }","lines":9}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"The step-related API diverges between the two near-identical sliders without justification. `Slider` stores `step: f64` / `shift_step: Option<f64>` and its setters take `impl num_traits::AsPrimitive<f64>`, while `VerticalSlider` stores `step: T` / `shift_step: Option<T>` and its setters take `T` / `impl Into<T>`. As a result `VerticalSlider` additionally requires `T: From<u8>` (to build the default step `T::from(1)`) and rejects fractional default steps for integer `T`, whereas `Slider` does not. The two widgets should expose the same stepping API; this divergence is a maintenance hazard and a surprising inconsistency for users switching orientation.","fix":"Unify the step representation. Prefer `Slider`'s `f64`-based approach for `VerticalSlider` as well (store `step: f64`, drop the `T: From<u8>` bound), so both widgets share identical stepping semantics.","locations":[{"ref":"widget/src/slider.rs:92-93","code":"   92 |     step: f64,\n   93 |     shift_step: Option<f64>,","lines":2},{"ref":"widget/src/slider.rs:184-194","code":"  184 |     pub fn step(mut self, step: impl num_traits::AsPrimitive<f64>) -> Self {\n  185 |         self.step = step.as_();\n  186 |         self\n  187 |     }\n  188 | \n  189 |     /// Sets the optional \"shift\" step for the [`Slider`].\n  190 |     ///\n  191 |     /// If set, this value is used as the step while the shift key is pressed.\n  192 |     pub fn shift_step(mut self, shift_step: impl num_traits::AsPrimitive<f64>) -> Self {\n  193 |         self.shift_step = Some(shift_step.as_());\n  194 |         self","lines":11},{"ref":"widget/src/vertical_slider.rs:91-92","code":"   91 |     step: T,\n   92 |     shift_step: Option<T>,","lines":2},{"ref":"widget/src/vertical_slider.rs:140-140","code":"  140 |             step: T::from(1),","lines":1},{"ref":"widget/src/vertical_slider.rs:182-194","code":"  182 |     /// Sets the step size of the [`VerticalSlider`].\n  183 |     pub fn step(mut self, step: T) -> Self {\n  184 |         self.step = step;\n  185 |         self\n  186 |     }\n  187 | \n  188 |     /// Sets the optional \"shift\" step for the [`VerticalSlider`].\n  189 |     ///\n  190 |     /// If set, this value is used as the step while the shift key is pressed.\n  191 |     pub fn shift_step(mut self, shift_step: impl Into<T>) -> Self {\n  192 |         self.shift_step = Some(shift_step.into());\n  193 |         self\n  194 |     }","lines":13}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`Sink::poll_flush` returns the result of `self.sender.poll_ready(cx)` rather than actually flushing buffered items. `poll_ready` reports whether there is capacity to send another item, not whether previously-queued items have been delivered to the worker/event loop. A caller that relies on `flush()` completing to mean \"all sent actions have been forwarded\" will get a false positive as soon as there is free capacity, even with messages still buffered in the channel.","fix":"Document that flushing is best-effort/capacity-based, or implement a real flush by tracking outstanding items and only returning `Ready(Ok)` once the worker has drained them.","locations":[{"ref":"winit/src/proxy.rs:116-124","code":"  116 |     fn poll_flush(mut self: Pin<&mut Self>, cx: &mut Context<'_>) -> Poll<Result<(), Self::Error>> {\n  117 |         match self.sender.poll_ready(cx) {\n  118 |             Poll::Ready(Err(ref e)) if e.is_disconnected() => {\n  119 |                 // If the receiver disconnected, we consider the sink to be flushed.\n  120 |                 Poll::Ready(Ok(()))\n  121 |             }\n  122 |             x => x,\n  123 |         }\n  124 |     }","lines":9}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"`effect` relies on `Action::output::<Infallible>(...).expect_err(\"no output\")` to extract the action. This is sound only because `Action<Infallible>` can never be `Action::Output` (Infallible is uninhabited). The invariant is implicit; if `Action` ever gains another inhabited-output-like variant or the type parameter changes, this `expect_err` becomes a latent panic. The reliance on uninhabitedness is non-obvious at the call site.","fix":"Add a comment noting the Infallible-uninhabited invariant that makes `expect_err` infallible, or restructure to avoid extracting via the error path (e.g. a dedicated `Action::into_non_output` helper).","locations":[{"ref":"runtime/src/task.rs:454-463","code":"  454 | pub fn effect<T>(action: impl Into<Action<Infallible>>) -> Task<T> {\n  455 |     let action = action.into();\n  456 | \n  457 |     Task {\n  458 |         stream: Some(boxed_stream(stream::once(async move {\n  459 |             action.output().expect_err(\"no output\")\n  460 |         }))),\n  461 |         units: 1,\n  462 |     }\n  463 | }","lines":10}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Nested::draw calls `overlay.overlay(layout, renderer)` up to three times for the same element on every draw: once inside the `is_over` closure (line 82), and again at line 107 to recurse. `overlay()` re-constructs the nested overlay Element (allocating Boxes, sorting Groups, etc.) each call. Drawing happens every frame, so this is a repeated allocation/sort on the hot path. The result of the first call is discarded.","fix":"Call `overlay.overlay(layout, renderer)` once, bind the resulting Option, and reuse it both for the `is_over` computation and the recursive draw.","locations":[{"ref":"core/src/overlay/nested.rs:78-110","code":"   78 |                 let is_over = cursor\n   79 |                     .position()\n   80 |                     .zip(nested_layout)\n   81 |                     .and_then(|(cursor_position, nested_layout)| {\n   82 |                         overlay.overlay(layout, renderer).map(|nested| {\n   83 |                             nested.as_overlay().mouse_interaction(\n   84 |                                 nested_layout.children().next().unwrap(),\n   85 |                                 mouse::Cursor::Available(cursor_position),\n   86 |                                 renderer,\n   87 |                             ) != mouse::Interaction::None\n   88 |                         })\n   89 |                     })\n   90 |                     .unwrap_or_default();\n   91 | \n   92 |                 renderer.with_layer(layout.bounds(), |renderer| {\n   93 |                     overlay.draw(\n   94 |                         renderer,\n   95 |                         theme,\n   96 |                         style,\n   97 |                         layout,\n   98 |                         if is_over {\n   99 |                             mouse::Cursor::Unavailable\n  100 |                         } else {\n  101 |                             cursor\n  102 |                         },\n  103 |                     );\n  104 |                 });\n  105 | \n  106 |                 if let Some((mut nested, nested_layout)) =\n  107 |                     overlay.overlay(layout, renderer).zip(nested_layout)\n  108 |                 {\n  109 |                     recurse(&mut nested, nested_layout, renderer, theme, style, cursor);\n  110 |                 }","lines":33}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Screenshot::crop accumulates the cropped pixels with `fold(vec![], |mut acc, ...| { acc.extend(...) })` starting from an empty Vec, so the output buffer is grown by repeated reallocations as each row is appended. The final size (`region.width * region.height * 4`) is known up front. It also iterates over and allocates nothing for every row even outside `row_range` but still walks the whole image via chunks.","fix":"Preallocate `Vec::with_capacity(region.width as usize * region.height as usize * PIXEL_SIZE)` and iterate only the relevant rows (e.g. slice `self.rgba` by `row_range` byte offsets) instead of `chunks(...).enumerate()` over the entire image.","locations":[{"ref":"core/src/window/screenshot.rs:57-72","code":"   57 |         let bytes_per_row = self.size.width as usize * PIXEL_SIZE;\n   58 |         let row_range = region.y as usize..(region.y + region.height) as usize;\n   59 |         let column_range =\n   60 |             region.x as usize * PIXEL_SIZE..(region.x + region.width) as usize * PIXEL_SIZE;\n   61 | \n   62 |         let chopped =\n   63 |             self.rgba\n   64 |                 .chunks(bytes_per_row)\n   65 |                 .enumerate()\n   66 |                 .fold(vec![], |mut acc, (row, bytes)| {\n   67 |                     if row_range.contains(&row) {\n   68 |                         acc.extend(&bytes[column_range.clone()]);\n   69 |                     }\n   70 | \n   71 |                     acc\n   72 |                 });","lines":16}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`geometry::text::Text::draw_with` rebuilds the entire `Paragraph` (full shaping + layout +\nalignment relayout via `text::align`) from the raw content on every call. There is no caching\nof the shaped paragraph between draws, so each canvas redraw re-shapes all the text from\nscratch. Combined with the per-call `SwashCache` allocation this makes canvas text drawing\nre-do all expensive text work every frame.","fix":"Cache the shaped `Paragraph` keyed by the text properties (as the `text::Cache` already does for\nwidget text) and only reshape when the content/metrics/bounds change.","locations":[{"ref":"graphics/src/geometry/text.rs:52-65","code":"   52 |     pub fn draw_with(&self, mut f: impl FnMut(Path, Color)) {\n   53 |         let paragraph = text::Paragraph::with_text(core::text::Text {\n   54 |             content: &self.content,\n   55 |             bounds: Size::new(self.max_width, f32::INFINITY),\n   56 |             size: self.size,\n   57 |             line_height: self.line_height,\n   58 |             font: self.font,\n   59 |             align_x: self.align_x,\n   60 |             align_y: self.align_y,\n   61 |             shaping: self.shaping,\n   62 |             wrapping: Wrapping::default(),\n   63 |             ellipsis: Ellipsis::default(),\n   64 |             hint_factor: None,\n   65 |         });","lines":14}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`geometry::text::Text::draw_with` constructs a brand-new `cosmic_text::SwashCache` on every\ncall (line 82) and acquires a write lock on the global font system. The swash cache is meant to\nbe reused across draws to amortize glyph-outline/rasterization work; allocating a fresh one per\n`draw_with` defeats caching and re-extracts every glyph outline on each canvas redraw. For a\ncanvas that re-draws text each frame this is a per-frame re-rasterization cost.","fix":"Hold a persistent `SwashCache` (e.g. thread-local or stored alongside the renderer/font system)\nand reuse it across `draw_with` calls instead of `SwashCache::new()` each time.","locations":[{"ref":"graphics/src/geometry/text.rs:82-84","code":"   82 |         let mut swash_cache = cosmic_text::SwashCache::new();\n   83 | \n   84 |         let mut font_system = text::font_system().write().expect(\"Write font system\");","lines":3}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`Update::from_event` recomputes link hover on every event by calling `state.paragraph.hit_span(position)` and mutating `self.hovered_link`. More notably, `hovered_link` lives on the widget struct (not in tree state) and is initialized to `None` in `new()`; because the widget is rebuilt every view, the hover highlight is only ever correct within a single update->draw cycle and forces a `request_redraw()` whenever the transient value flips, but the stored value is discarded on rebuild. This means the redraw-on-hover-change comparison (`was_hovered != self.hovered_link.is_some()`) compares against a freshly-defaulted `None` each frame, potentially triggering redundant redraws.","fix":"Store `hovered_link`/`span_pressed` together in the persisted `State` (tree state) rather than on the widget, so hover comparisons persist across rebuilds and avoid spurious redraws.","locations":[{"ref":"widget/src/text/rich.rs:33-34","code":"   33 |     hovered_link: Option<usize>,\n   34 |     on_link_click: Option<Box<dyn Fn(Link) -> Message + 'a>>,","lines":2},{"ref":"widget/src/text/rich.rs:364-384","code":"  364 |         let was_hovered = self.hovered_link.is_some();\n  365 | \n  366 |         if let Some(position) = cursor.position_in(layout.bounds()) {\n  367 |             let state = tree\n  368 |                 .state\n  369 |                 .downcast_ref::<State<Link, Renderer::Paragraph>>();\n  370 | \n  371 |             self.hovered_link = state.paragraph.hit_span(position).and_then(|span| {\n  372 |                 if self.spans.as_ref().as_ref().get(span)?.link.is_some() {\n  373 |                     Some(span)\n  374 |                 } else {\n  375 |                     None\n  376 |                 }\n  377 |             });\n  378 |         } else {\n  379 |             self.hovered_link = None;\n  380 |         }\n  381 | \n  382 |         if was_hovered != self.hovered_link.is_some() {\n  383 |             shell.request_redraw();\n  384 |         }","lines":21}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`Value::insert` re-segments the ENTIRE string into graphemes on every single character insertion: after `self.graphemes.insert(index, c)` it does `self.graphemes = graphemes(&self.to_string(), true).collect()`, which allocates a full String (concat of all graphemes) and re-runs Unicode grapheme segmentation over the whole buffer. This runs on every keystroke (`Editor::insert` -> hot `update` path), making typing into a large field O(n) per character / O(n^2) overall. The re-segmentation only matters when the new char combines with a neighbor (e.g. combining mark); the common ASCII case pays the full cost needlessly.","fix":"Only re-segment the local neighborhood around `index` (the inserted grapheme plus its immediate neighbors) instead of the whole string, or skip re-segmentation entirely when the inserted char cannot combine (e.g. it and its neighbors are simple). The `TODO: Reduce allocations, cache results` at the top of the file already acknowledges this.","locations":[{"ref":"widget/src/text_input/value.rs:84-91","code":"   84 |     /// Inserts a new `char` at the given grapheme `index`.\n   85 |     pub fn insert(&mut self, index: usize, c: char) {\n   86 |         self.graphemes.insert(index, c.to_string());\n   87 | \n   88 |         self.graphemes = UnicodeSegmentation::graphemes(&self.to_string() as &str, true)\n   89 |             .map(String::from)\n   90 |             .collect();\n   91 |     }","lines":8}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`is_running` probes server liveness by binding a fresh `std::net::TcpListener` on the server address and treating bind failure as 'running'. This is a blocking syscall and races with the actual server bind in `run`; it also cannot distinguish 'address in use by our server' from 'address in use by an unrelated process' or 'permission denied'. As a liveness check it is coarse and can give false positives/negatives.","fix":"Prefer an explicit connect-and-handshake probe, or share connection state, rather than inferring liveness from a bind error that conflates multiple failure modes.","locations":[{"ref":"beacon/src/lib.rs:90-92","code":"   90 | pub fn is_running() -> bool {\n   91 |     std::net::TcpListener::bind(client::server_address_from_env()).is_err()\n   92 | }","lines":3}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In flex::resolve, the child `size()` (which calls `as_widget().size()`) is recomputed in every pass (first, second, third, fourth) for every item, and `axis.pack(...)` is recomputed each time. For widgets with non-trivial size() this is redundant work across up to four passes over all items.","fix":"Precompute each child's (fill_main_factor, fill_cross_factor) / Length pair once into a small Vec and index into it in subsequent passes.","locations":[{"ref":"core/src/layout/flex.rs:103-108","code":"  103 |     for (i, (child, tree)) in items.iter_mut().zip(trees.iter_mut()).enumerate() {\n  104 |         let (fill_main_factor, fill_cross_factor) = {\n  105 |             let size = child.as_widget().size();\n  106 | \n  107 |             axis.pack(size.width.fill_factor(), size.height.fill_factor())\n  108 |         };","lines":6},{"ref":"core/src/layout/flex.rs:147-152","code":"  147 |         for (i, (child, tree)) in items.iter_mut().zip(trees.iter_mut()).enumerate() {\n  148 |             let (main_size, cross_size) = {\n  149 |                 let size = child.as_widget().size();\n  150 | \n  151 |                 axis.pack(size.width, size.height)\n  152 |             };","lines":6},{"ref":"core/src/layout/flex.rs:185-190","code":"  185 |         for (i, (child, tree)) in items.iter_mut().zip(trees.iter_mut()).enumerate() {\n  186 |             let (fill_main_factor, fill_cross_factor) = {\n  187 |                 let size = child.as_widget().size();\n  188 | \n  189 |                 axis.pack(size.width.fill_factor(), size.height.fill_factor())\n  190 |             };","lines":6},{"ref":"core/src/layout/flex.rs:236-241","code":"  236 |         for (i, (child, tree)) in items.iter_mut().zip(trees).enumerate() {\n  237 |             let (main_size, cross_size) = {\n  238 |                 let size = child.as_widget().size();\n  239 | \n  240 |                 axis.pack(size.width, size.height)\n  241 |             };","lines":6}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`diff_children_custom_with_search` calls `maybe_changed(i)` repeatedly in linear scans (`(1..current_children.len()).find(|&i| maybe_changed(i))`) on both the shrink and grow paths, in addition to the upfront `maybe_changed(0)` / `maybe_changed(len-1)` calls. For widgets that implement `maybe_changed` as a non-trivial comparison (e.g. comparing widget contents), this re-scans potentially the whole children list on every structural change, turning diffing into O(n) predicate evaluations even when the change is a single tail insertion. The duplicated recomputation in the grow branch (lines 158-159) adds further redundant calls.","fix":"Compute the change boundary once (single forward scan caching results) and reuse it for both the index search and the truncate decision; avoid recomputing `first_maybe_changed`/`last_maybe_changed` in the grow branch.","locations":[{"ref":"core/src/widget/tree.rs:142-179","code":"  142 |             let difference_index = if first_maybe_changed {\n  143 |                 0\n  144 |             } else {\n  145 |                 (1..current_children.len())\n  146 |                     .find(|&i| maybe_changed(i))\n  147 |                     .unwrap_or(0)\n  148 |             };\n  149 | \n  150 |             let _ = current_children.splice(\n  151 |                 difference_index..difference_index + (current_children.len() - new_children.len()),\n  152 |                 std::iter::empty(),\n  153 |             );\n  154 |         }\n  155 |     }\n  156 | \n  157 |     if current_children.len() < new_children.len() {\n  158 |         let first_maybe_changed = maybe_changed(0);\n  159 |         let last_maybe_changed = maybe_changed(current_children.len() - 1);\n  160 | \n  161 |         if !first_maybe_changed && last_maybe_changed {\n  162 |             current_children.extend(new_children[current_children.len()..].iter().map(new_state));\n  163 |         } else {\n  164 |             let difference_index = if first_maybe_changed {\n  165 |                 0\n  166 |             } else {\n  167 |                 (1..current_children.len())\n  168 |                     .find(|&i| maybe_changed(i))\n  169 |                     .unwrap_or(0)\n  170 |             };\n  171 | \n  172 |             let _ = current_children.splice(\n  173 |                 difference_index..difference_index,\n  174 |                 new_children[difference_index\n  175 |                     ..difference_index + (new_children.len() - current_children.len())]\n  176 |                     .iter()\n  177 |                     .map(new_state),\n  178 |             );\n  179 |         }","lines":38}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Tracker::update` allocates a fresh `std::collections::HashSet` (default SipHash) for `alive` every call, and computes each recipe's id by allocating a new `FxHasher`. The `alive` set uses the slow default hasher while the subscription map uses `FxHashMap`; using `FxHashSet` for `alive` (ids are already `u64` hashes) would be consistent and faster. `update` runs every application update cycle, so this is on a hot path.","fix":"Use `rustc_hash::FxHashSet<u64>` (or `FxHashSet::with_capacity_and_hasher`) for `alive` to match the map's hasher and avoid SipHash overhead on the per-frame diff.","locations":[{"ref":"futures/src/subscription/tracker.rs:67-67","code":"   67 |         let mut alive = std::collections::HashSet::new();","lines":1},{"ref":"futures/src/subscription/tracker.rs:120-120","code":"  120 |         self.subscriptions.retain(|id, _| alive.contains(id));","lines":1}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`damage::diff`/`list` and the `bounds`/`diff` closures return `Vec<Rectangle>` per primitive, allocating a heap Vec for every primitive comparison every frame. For scenes with many primitives this is a large amount of churn on the hot per-frame damage path.","fix":"Return `SmallVec`/`ArrayVec` or accept an output buffer/callback to avoid per-primitive heap allocations on the per-frame diff path.","locations":[{"ref":"graphics/src/damage.rs:5-43","code":"    5 | pub fn diff<T>(\n    6 |     previous: &[T],\n    7 |     current: &[T],\n    8 |     bounds: impl Fn(&T) -> Vec<Rectangle>,\n    9 |     diff: impl Fn(&T, &T) -> Vec<Rectangle>,\n   10 | ) -> Vec<Rectangle> {\n   11 |     let damage = previous.iter().zip(current).flat_map(|(a, b)| diff(a, b));\n   12 | \n   13 |     if previous.len() == current.len() {\n   14 |         damage.collect()\n   15 |     } else {\n   16 |         let (smaller, bigger) = if previous.len() < current.len() {\n   17 |             (previous, current)\n   18 |         } else {\n   19 |             (current, previous)\n   20 |         };\n   21 | \n   22 |         // Extend damage by the added/removed primitives\n   23 |         damage\n   24 |             .chain(bigger[smaller.len()..].iter().flat_map(bounds))\n   25 |             .collect()\n   26 |     }\n   27 | }\n   28 | \n   29 | /// Computes the damage regions given some previous and current primitives.\n   30 | pub fn list<T>(\n   31 |     previous: &[T],\n   32 |     current: &[T],\n   33 |     bounds: impl Fn(&T) -> Vec<Rectangle>,\n   34 |     are_equal: impl Fn(&T, &T) -> bool,\n   35 | ) -> Vec<Rectangle> {\n   36 |     diff(previous, current, &bounds, |a, b| {\n   37 |         if are_equal(a, b) {\n   38 |             vec![]\n   39 |         } else {\n   40 |             bounds(a).into_iter().chain(bounds(b)).collect()\n   41 |         }\n   42 |     })\n   43 | }","lines":39}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Path::transform` clones the entire underlying `lyon_path::Path` and then transforms the clone (`self.raw.clone().transformed(transform)`). For a large path applied per frame this doubles the allocation/copy cost of the whole point/verb buffer. If a non-owning transformed iterator is available in lyon it would avoid the clone for consumers that only iterate.","fix":"Where the caller only needs to iterate the transformed path, expose a transformed iterator (lyon supports applying a transform during iteration) instead of materializing a full cloned-and-transformed `Path`.","locations":[{"ref":"graphics/src/geometry/path.rs:73-78","code":"   73 |     #[inline]\n   74 |     pub fn transform(&self, transform: &lyon_path::math::Transform) -> Path {\n   75 |         Path {\n   76 |             raw: self.raw.clone().transformed(transform),\n   77 |         }\n   78 |     }","lines":6}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In the base (non-overlay) event loop, `revalidate_layout` recomputes the overlay's `mouse_interaction` using `cursor` (the raw input cursor) at line 377, whereas elsewhere the code carefully distinguishes `base_cursor` vs `cursor` and uses `Unavailable` when an overlay is active. This inconsistency can yield a mouse-interaction value that disagrees with the interaction computed in the overlay branch, producing a transient wrong cursor icon on the frame where layout is revalidated.","fix":"Use the same cursor-selection logic as the overlay branch (cursor masked to Unavailable when the overlay captures), or recompute `base_cursor`/`overlay_interaction` consistently after revalidation.","locations":[{"ref":"runtime/src/user_interface.rs:376-377","code":"  376 |                         let interaction =\n  377 |                             overlay.mouse_interaction(Layout::new(&layout), cursor, renderer);","lines":2}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"A fresh cosmic_text::SwashCache is created on every draw() call for text and discarded immediately after the loop. SwashCache is meant to be reused across frames to amortize glyph rasterization; allocating it per draw defeats its purpose. (The pipeline already keeps a persistent GlyphCache, so only the swash scratch cache is wasted, but it is recreated for every paragraph/editor/raw draw.)","fix":"Store the SwashCache as a field of Pipeline (or thread it through draw) so it persists across frames instead of being recreated on each draw call.","locations":[{"ref":"tiny_skia/src/text.rs:197","code":"  197 |     let mut swash = cosmic_text::SwashCache::new();","lines":1}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Color (emoji) glyphs are keyed in the GlyphCache by (cache_key, [r,g,b]) just like mask glyphs, but the SwashContent::Color path ignores the requested color entirely (it copies the bitmap's own RGBA). The same emoji drawn with different text colors thus stores a duplicate identical bitmap per color, wasting memory and cache slots.","fix":"For color glyphs, key only on cache_key (or a sentinel color) so identical color bitmaps are shared regardless of the surrounding text color.","locations":[{"ref":"tiny_skia/src/text.rs:262-263","code":"  262 |         let [r, g, b, _a] = color.into_rgba8();\n  263 |         let key = (cache_key, [r, g, b]);","lines":2},{"ref":"tiny_skia/src/text.rs:293-312","code":"  293 |                 cosmic_text::SwashContent::Color => {\n  294 |                     let mut i = 0;\n  295 | \n  296 |                     for _y in 0..image.placement.height {\n  297 |                         for _x in 0..image.placement.width {\n  298 |                             // TODO: Blend alpha\n  299 |                             buffer[i >> 2] = bytemuck::cast(\n  300 |                                 tiny_skia::ColorU8::from_rgba(\n  301 |                                     image.data[i + 2],\n  302 |                                     image.data[i + 1],\n  303 |                                     image.data[i],\n  304 |                                     image.data[i + 3],\n  305 |                                 )\n  306 |                                 .premultiply(),\n  307 |                             );\n  308 | \n  309 |                             i += 4;\n  310 |                         }\n  311 |                     }\n  312 |                 }","lines":20}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Atlas::grow` allocates a whole new array texture and copies every existing non-empty layer with `copy_texture_to_texture` whenever even a single new layer is added. For UIs that incrementally add many distinct images, the atlas is reallocated and fully recopied O(layers) times, giving O(layers^2) total copy bandwidth. Growth could be amortized by over-allocating layer capacity (geometric growth) instead of growing exactly to the needed count.","fix":"Grow the layer count geometrically (e.g. double, or add a slack of N layers) so reallocation/copy happens O(log n) times instead of on every single new layer.","locations":[{"ref":"wgpu/src/image/atlas.rs:437-531","code":"  437 |     fn grow(\n  438 |         &mut self,\n  439 |         amount: usize,\n  440 |         device: &wgpu::Device,\n  441 |         encoder: &mut wgpu::CommandEncoder,\n  442 |         backend: wgpu::Backend,\n  443 |     ) {\n  444 |         if amount == 0 {\n  445 |             return;\n  446 |         }\n  447 | \n  448 |         // On the GL backend if layers.len() is a multiple of 6 we need to help wgpu figure out that this texture\n  449 |         // is still a `GL_TEXTURE_2D_ARRAY` rather than `GL_TEXTURE_CUBE_MAP` or `GL_TEXTURE_CUBE_ARRAY`.\n  450 |         // This will over-allocate some unused memory on GL, but it's better than not being able to\n  451 |         // grow the atlas past multiples of 6!\n  452 |         // https://github.com/gfx-rs/wgpu/blob/004e3efe84a320d9331371ed31fa50baa2414911/wgpu-hal/src/gles/mod.rs#L371\n  453 |         let depth_or_array_layers = match backend {\n  454 |             wgpu::Backend::Gl if self.layers.len().is_multiple_of(6) => {\n  455 |                 self.layers.len() as ,"code":"   49 |     pub fn load(&mut self, handle: &svg::Handle) -> &Svg {\n   50 |         if self.svgs.contains_key(&handle.id()) {\n   51 |             return self.svgs.get(&handle.id()).unwrap();\n   52 |         }","lines":4},{"ref":"wgpu/src/image/vector.rs:85-86","code":"   85 |         let _ = self.svgs.insert(handle.id(), svg);\n   86 |         self.svgs.get(&handle.id()).unwrap()","lines":2}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Renderer::screenshot` reassembles the unpadded image by `fold`ing over rows and `extend`ing a fresh `Vec`\nthat starts empty, forcing repeated reallocations as it grows row by row. For large screenshots this causes\nmany reallocations and copies.","fix":"Pre-allocate: `let mut acc = Vec::with_capacity(dimensions.unpadded_bytes_per_row * dimensions.height as usize);`\nthen push rows into it (or use a plain `for` loop), avoiding the growth reallocations.","locations":[{"ref":"wgpu/src/lib.rs:275-279","code":"  275 |             .chunks(dimensions.padded_bytes_per_row)\n  276 |             .fold(vec![], |mut acc, row| {\n  277 |                 acc.extend(&row[..dimensions.unpadded_bytes_per_row]);\n  278 |                 acc\n  279 |             })","lines":5}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`prepare` (text) constructs a brand-new `cryoglyph::SwashCache::new()` on every call (every layer, every frame). The swash cache exists precisely to cache rasterized glyph outlines across calls; recreating it each time defeats that purpose and forces re-rasterization of glyphs each frame, which is a measurable cost for text-heavy UIs.","fix":"Store a long-lived `SwashCache` in `State`/`Storage` and pass `&mut` it into `prepare`, instead of allocating a fresh one per call.","locations":[{"ref":"wgpu/src/text.rs:647-647","code":"  647 |         &mut cryoglyph::SwashCache::new(),","lines":1}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Canvas::update` recomputes `mouse_interaction` (which calls the user's `program.mouse_interaction`) on every event whenever a redraw is not already scheduled for the next frame, including for events that cannot change interaction (e.g. keyboard, window focus). For canvases with an expensive `mouse_interaction` this is needless work each event.","fix":"Only recompute and compare mouse interaction on cursor-affecting events (mouse move/button) or on redraw requests, rather than on every non-NextFrame event.","locations":[{"ref":"widget/src/canvas.rs:245-257","code":"  245 |         if shell.redraw_request() != window::RedrawRequest::NextFrame {\n  246 |             let mouse_interaction =\n  247 |                 self.mouse_interaction(tree, layout, cursor, viewport, renderer);\n  248 | \n  249 |             if is_redraw_request {\n  250 |                 self.last_mouse_interaction = Some(mouse_interaction);\n  251 |             } else if self\n  252 |                 .last_mouse_interaction\n  253 |                 .is_some_and(|last_mouse_interaction| last_mouse_interaction != mouse_interaction)\n  254 |             {\n  255 |                 shell.request_redraw();\n  256 |             }\n  257 |         }","lines":13}]},{"id":"PERF_21","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"On every option selection through the overlay closure and on every text change, `state.filtered_options.update(self.state.options.clone())` clones the entire options Vec to reset the filtered list. For large option lists this is an avoidable full clone on each interaction. The same full re-clone also happens in `State::push`. A reset-to-all-options could share the data or recompute lazily instead of eagerly cloning every element.","fix":"Avoid cloning the full options vector to represent the unfiltered state; e.g. store filtered results as indices into `state.options`, or special-case the empty-query reset to avoid the clone.","locations":[{"ref":"widget/src/combo_box.rs:706-708","code":"  706 |                 // Clear the value and reset the options and menu\n  707 |                 state.value = String::new();\n  708 |                 state.filtered_options.update(self.state.options.clone());","lines":3},{"ref":"widget/src/combo_box.rs:839-842","code":"  839 |                         self.state.with_inner_mut(|state| {\n  840 |                             state.value = String::new();\n  841 |                             state.filtered_options.update(self.state.options.clone());\n  842 |                         });","lines":4}]},{"id":"PERF_22","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"split_regions / pane_regions allocate a fresh Count tree (Box-heavy recursive enum) and a BTreeMap on every call. These are called multiple times per event/frame: grid_interaction, update (mouse press and cursor moved), and draw each independently call node.split_regions(...) with identical arguments, recomputing the whole split-region map and Count tree several times within a single update+draw cycle for the same layout. For large grids this is wasted work each frame.","fix":"Compute the split-region map once per update/draw pass and reuse it, or cache it keyed on (layout bounds, spacing, min_size, layout hash). The Count tree could also be computed inline during the region walk to avoid the second allocation.","locations":[{"ref":"widget/src/pane_grid.rs:317-317","code":"  317 |                 let splits = node.split_regions(self.spacing, self.min_size, bounds.size());","lines":1},{"ref":"widget/src/pane_grid.rs:517-517","code":"  517 |                                 node.split_regions(self.spacing, self.min_size, bounds.size());","lines":1},{"ref":"widget/src/pane_grid.rs:605-605","code":"  605 |                         let splits = node.split_regions(self.spacing, self.min_size, bounds.size());","lines":1},{"ref":"widget/src/pane_grid.rs:727-727","code":"  727 |                 let splits = node.split_regions(self.spacing, self.min_size, bounds.size());","lines":1},{"ref":"widget/src/pane_grid.rs:743-743","code":"  743 |                     let splits = node.split_regions(self.spacing, self.min_size, bounds.size());","lines":1}]},{"id":"PERF_23","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Svg::draw` (and `Svg::layout`) call `renderer.measure_svg(&self.handle)` on every draw to recover the intrinsic image size, recomputing `rotated_size`, `adjusted_fit`, `scale` and `final_size` each frame. The same intrinsic size was already computed during `layout`. For complex SVGs `measure_svg` can be non-trivial, and this is on the hot draw path. `image.rs` has the analogous pattern (`measure_image` in both `layout` and `drawing_bounds`).","fix":"Cache the measured intrinsic size in the widget's tree `State` during `layout` and reuse it in `draw`, or confirm the renderer memoizes `measure_svg`/`measure_image` cheaply (in which case this is a non-issue).","locations":[{"ref":"widget/src/svg.rs:232-243","code":"  232 |         let Size { width, height } = renderer.measure_svg(&self.handle);\n  233 |         let image_size = Size::new(width as f32, height as f32);\n  234 |         let rotated_size = self.rotation.apply(image_size);\n  235 | \n  236 |         let bounds = layout.bounds();\n  237 |         let adjusted_fit = self.content_fit.fit(rotated_size, bounds.size());\n  238 |         let scale = Vector::new(\n  239 |             adjusted_fit.width / rotated_size.width,\n  240 |             adjusted_fit.height / rotated_size.height,\n  241 |         );\n  242 | \n  243 |         let final_size = image_size * scale;","lines":12},{"ref":"widget/src/image.rs:238-248","code":"  238 |     let original_size = renderer.measure_image(handle).unwrap_or_default();\n  239 |     let image_size = crop(original_size, region);\n  240 |     let rotated_size = rotation.apply(image_size);\n  241 |     let adjusted_fit = content_fit.fit(rotated_size, bounds.size());\n  242 | \n  243 |     let fit_scale = Vector::new(\n  244 |         adjusted_fit.width / rotated_size.width,\n  245 |         adjusted_fit.height / rotated_size.height,\n  246 |     );\n  247 | \n  248 |     let final_size = image_size * fit_scale * scale;","lines":11}]},{"id":"PERF_24","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`input_method` calls `self.content.0.borrow_mut()` but only reads from the editor (selection). Taking a mutable borrow is unnecessary and, combined with the `borrow_mut` taken in `draw`/`layout`, risks a RefCell double-borrow panic if these ever overlap; a shared `borrow()` is both correct and safer.","fix":"Use `self.content.0.borrow()` since only `editor.selection()` is read.","locations":[{"ref":"widget/src/text_editor.rs:329-337","code":"  329 |         let internal = self.content.0.borrow_mut();\n  330 | \n  331 |         let text_bounds = bounds.shrink(self.padding);\n  332 |         let translation = text_bounds.position() - Point::ORIGIN;\n  333 | \n  334 |         let cursor = match internal.editor.selection() {\n  335 |             Selection::Caret(position) => position,\n  336 |             Selection::Range(ranges) => ranges.first().cloned().unwrap_or_default().position(),\n  337 |         };","lines":9}]},{"id":"PERF_25","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Content::text()` is built by iterating `lines()`, which calls `Content::line(index)` for each line; each `line()` borrows the editor and does `line.text.into_owned()` (a fresh allocation and copy per line). For a large document this is O(lines) allocations every time `text()` is called, and `text()` is also invoked by `Clone for Content` (line 465). Cloning a large editor thus allocates one String per Performance","severity":"negligible","easy":false,"description":"In `Compositor::new`, the fallback (`B::new`) branch clones `display`, `compatible_window`, and `shell` for the call, but these clones are the last use of those values (the primary branch already consumed its own clones). The trailing `.clone()` calls on `display`/`compatible_window`/`shell` in the second match arm are unnecessary - the owned values could be moved instead, avoiding a needless clone of the display/window/shell handles on the fallback path.","fix":"Move the values into `B::new` instead of cloning: pass `display`, `compatible_window`, `shell` directly (drop the `.clone()` calls) since they are not used afterwards.","locations":[{"ref":"renderer/src/fallback.rs:277-289","code":"  277 |         match B::new(\n  278 |             settings,\n  279 |             display.clone(),\n  280 |             compatible_window.clone(),\n  281 |             shell.clone(),\n  282 |         )\n  283 |         .await\n  284 |         {\n  285 |             Ok(compositor) => return Ok(Self::Secondary(compositor)),\n  286 |             Err(error) => {\n  287 |                 errors.push(error);\n  288 |             }\n  289 |         }","lines":13}]},{"id":"PERF_32","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`typewrite` allocates a heap String per character via `c.to_string()` before constructing an inline\nSmolStr, and additionally clones the SmolStr. For single chars this defeats the purpose of\n`SmolStr::new_inline` and adds an allocation per typed character. Test-only and small, but trivially\navoidable.","fix":"Build the SmolStr directly from the char using a small stack buffer (e.g. `c.encode_utf8(&mut [0u8; 4])` then `SmolStr::new_inline`) to avoid the per-char String allocation and the clone.","locations":[{"ref":"test/src/simulator.rs:391-395","code":"  391 | pub fn typewrite(text: &str) -> impl Iterator<Item = Event> + '_ {\n  392 |     text.
