every frame.","fix":"Remove the `instance_count` field and its assignments from both solid::Layer and gradient::Layer.","locations":[{"ref":"wgpu/src/quad/solid.rs:22-22","code":"   22 |     instance_count: usize,","lines":1},{"ref":"wgpu/src/quad/solid.rs:50-50","code":"   50 |         self.instance_count = instances.len();","lines":1},{"ref":"wgpu/src/quad/gradient.rs:28-28","code":"   28 |     instance_count: usize,","lines":1},{"ref":"wgpu/src/quad/gradient.rs:56-56","code":"   56 |         self.instance_count = instances.len();","lines":1}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In the ComboBox ArrowDown/Tab navigation branch, the else arm increments the index with `index.saturating_add(1).min(state.filtered_options.options.len().saturating_sub(1))`. This branch is only reached when `*index < len - 1` (the `if *index >= len-1` arm already handled the wrap-to-0 case), so `index + 1` is always `<= len - 1` and the `.min(...)` clamp can never change the value. The clamp is dead code and obscures the intent.","fix":"Replace the else branch body with `*index += 1;` (the preceding `if` already guarantees `*index < len - 1`).","locations":[{"ref":"widget/src/combo_box.rs:671-679","code":"  671 |                             if let Some(index) = &mut menu.hovered_option {\n  672 |                                 if *index >= state.filtered_options.options.len().saturating_sub(1)\n  673 |                                 {\n  674 |                                     *index = 0;\n  675 |                                 } else {\n  676 |                                     *index = index.saturating_add(1).min(\n  677 |                                         state.filtered_options.options.len().saturating_sub(1),\n  678 |                                     );\n  679 |                                 }","lines":9}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`self.parser.commit()` at line 481 is unreachable. Its guard `self.current + 1 < self.lines.len()` is identical to the guard at line 466; when line 466's branch executes it calls `self.lines.truncate(self.current)`, making `self.lines.len() == self.current`, so by line 480 the same condition is necessarily false. When line 466's branch does not execute, the condition was already false. Either way the commit never runs.","fix":"Remove the dead block, or fix the surrounding refeed logic (see the related logic_error finding) so state is committed where it is actually needed.","locations":[{"ref":"widget/src/markdown.rs:480-482","code":"  480 |                 if self.current + 1 < self.lines.len() {\n  481 |                     self.parser.commit();\n  482 |                 }","lines":3}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`Error::WindowCreationFailed(winit::error::OsError)` is declared but never constructed\nanywhere in the crate (window creation panics via `.expect(\"Create window\")` instead, see\nlib.rs:342). The variant is dead - no code path can ever produce it - which is misleading to\nAPI consumers who match on `Error` expecting to handle window-creation failures.","fix":"Either wire it up at the `create_window` call site (preferred, see the create_window finding) or remove the variant if window creation is intended to be infallible/panicking.","locations":[{"ref":"winit/src/error.rs:11-13","code":"   11 |     /// The application window could not be created.\n   12 |     #[error(\"the application window could not be created\")]\n   13 |     WindowCreationFailed(winit::error::OsError),","lines":3}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"modifiers.rs carries several blocks of commented-out LSHIFT/RSHIFT/LCTRL/... constants interleaved with the live flags. They are stale, never compiled, and the `<< 0` shifts in the comments are misleading clutter. The `NONE = 0` constant is also redundant since bitflags already provides `Modifiers::empty()` and `Default`.","fix":"Remove the commented-out per-side modifier constants. Consider dropping `NONE` in favor of `Modifiers::empty()` / `default()` unless it is part of the public API surface that must be kept.","locations":[{"ref":"core/src/keyboard/modifiers.rs:8-28","code":"    8 |         const SHIFT = 0b100;\n    9 |         // const LSHIFT = 0b010 << 0;\n   10 |         // const RSHIFT = 0b001 << 0;\n   11 |         //\n   12 |         /// The \"control\" key.\n   13 |         const CTRL = 0b100 << 3;\n   14 |         // const LCTRL = 0b010 << 3;\n   15 |         // const RCTRL = 0b001 << 3;\n   16 |         //\n   17 |         /// The \"alt\" key.\n   18 |         const ALT = 0b100 << 6;\n   19 |         // const LALT = 0b010 << 6;\n   20 |         // const RALT = 0b001 << 6;\n   21 |         //\n   22 |         /// The \"windows\" key on Windows, \"command\" key on Mac, and\n   23 |         /// \"super\" key on Linux.\n   24 |         const LOGO = 0b100 << 9;\n   25 |         // const LLOGO = 0b010 << 9;\n   26 |         // const RLOGO = 0b001 << 9;\n   27 |         /// No modifiers\n   28 |         const NONE = 0;","lines":21}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In flex::resolve fifth pass, the variable `i` from `nodes.iter_mut().enumerate()` is only used for the `if i > 0` spacing guard. This is correct but the enumerate could be avoided; more notably the `match axis` block inside the loop branches every iteration on an axis that is constant for the whole call - a minor avoidable per-iteration branch.","fix":"Hoist the axis branch out of the loop, or compute the per-axis alignment arguments once before the loop.","locations":[{"ref":"core/src/layout/flex.rs:267-288","code":"  267 |     for (i, node) in nodes.iter_mut().enumerate() {\n  268 |         if i > 0 {\n  269 |             main += spacing;\n  270 |         }\n  271 | \n  272 |         let (x, y) = axis.pack(main, pad.1);\n  273 | \n  274 |         node.move_to_mut(Point::new(x, y));\n  275 | \n  276 |         match axis {\n  277 |             Axis::Horizontal => {\n  278 |                 node.align_mut(Alignment::Start, align_items, Size::new(0.0, cross));\n  279 |             }\n  280 |             Axis::Vertical => {\n  281 |                 node.align_mut(align_items, Alignment::Start, Size::new(cross, 0.0));\n  282 |             }\n  283 |         }\n  284 | \n  285 |         let size = node.size();\n  286 | \n  287 |         main += axis.main(size);\n  288 |     }","lines":22}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In `Rectangle::with_vertices`, the local `rotation` used to compute `position` is\n`-rotation - std::f32::consts::PI * 2.0`. Subtracting a full turn (2π) from an angle has no\neffect on cos/sin, so the `- PI * 2.0` term is dead/no-op arithmetic. It is harmless but\nmisleading and suggests the author intended something else.","fix":"Remove the `- std::f32::consts::PI * 2.0` term (it cancels under cos/sin) or document why it is there.","locations":[{"ref":"core/src/rectangle.rs:91-99","code":"   91 |             let rotation = -rotation - std::f32::consts::PI * 2.0;\n   92 | \n   93 |             Point::new(\n   94 |                 center.x + (top_left.x - center.x) * rotation.cos()\n   95 |                     - (top_left.y - center.y) * rotation.sin(),\n   96 |                 center.y\n   97 |                     + (top_left.x - center.x) * rotation.sin()\n   98 |                     + (top_left.y - center.y) * rotation.cos(),\n   99 |             )","lines":9}]},{"id":"DEAD_9","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`black_box`'s inner `BlackBox::traverse` declares a `where Self: Sized` bound on the method (lines 141-144). Since `traverse` is dispatched through `&mut dyn Operation`, a `where Self: Sized` bound on a trait method makes that method effectively uncallable via the trait object - meaning the overridden `traverse` here may never be invoked through dynamic dispatch, and the default (if any) or the concrete-type path is used instead. The trait declares `traverse` WITHOUT `Self: Sized`, so this impl signature does not match the trait method shape in a way that is at best confusing and at worst means this `traverse` override is silently ignored for `dyn` usage.","fix":"Remove the `where Self: Sized` clause from the `BlackBox` `traverse` impl so it matches the trait method and is actually used through dynamic dispatch.","locations":[{"ref":"core/src/widget/operation.rs:140-148","code":"  140 |     impl<T, O> Operation<O> for BlackBox<'_, T> {\n  141 |         fn traverse(&mut self, operate: &mut dyn FnMut(&mut dyn Operation<O>))\n  142 |         where\n  143 |             Self: Sized,\n  144 |         {\n  145 |             self.operation.traverse(&mut |operation| {\n  146 |                 operate(&mut BlackBox { operation });\n  147 |             });\n  148 |         }","lines":9}]},{"id":"DEAD_10","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`color::pack` accepts `impl Into<Color>` but immediately calls `.into()`; combined with `Packed::components` this is fine, however the per-feature `internal` modules duplicate the `GAMMA_CORRECTION` constant and `pack` signature. Minor duplication that must be kept in sync manually between the two cfg branches.","fix":"Low priority. Could unify by selecting the constant/function via cfg on single definitions to reduce the duplicated surface, but current form is acceptable.","locations":[{"ref":"graphics/src/color.rs:26-46","code":"   26 | #[cfg(not(feature = \"web-colors\"))]\n   27 | mod internal {\n   28 |     use crate::core::Color;\n   29 | \n   30 |     pub const GAMMA_CORRECTION: bool = true;\n   31 | \n   32 |     pub fn pack(color: Color) -> [f32; 4] {\n   33 |         color.into_linear()\n   34 |     }\n   35 | }\n   36 | \n   37 | #[cfg(feature = \"web-colors\")]\n   38 | mod internal {\n   39 |     use crate::core::Color;\n   40 | \n   41 |     pub const GAMMA_CORRECTION: bool = false;\n   42 | \n   43 |     pub fn pack(color: Color) -> [f32; 4] {\n   44 |         [color.r, color.g, color.b, color.a]\n   45 |     }\n   46 | }","lines":21}]},{"id":"DEAD_11","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`Mesh::clip_bounds` binds `transformation` in both match arms but the comment/field intent is just to return `*clip_bounds * *transformation`. That is fine, but the `Stroke::with_color` family and `Style`/`Fill` `From` impls aside, note `Frame` exposes `stroke_text` only on the `Backend` trait (line 213) and never on the public `Frame` wrapper - there is no `Frame::fill`-style forwarding method for `stroke_text`, so the trait method is effectively unreachable through the public `Frame` API even though `fill_text` is exposed.","fix":"Either add a public `Frame::stroke_text` wrapper forwarding to `self.raw.stroke_text` (matching `fill_text`), or remove `stroke_text` from the `Backend` trait if it is genuinely unused.","locations":[{"ref":"graphics/src/geometry/frame.rs:213-216","code":"  213 |     fn stroke_text<'a>(&mut self, text: impl Into<Text>, stroke: impl Into<Stroke<'a>>);\n  214 | \n  215 |     fn fill(&mut self, path: &Path, fill: impl Into<Fill>);\n  216 |     fn fill_text(&mut self, text: impl Into<Text>);","lines":4},{"ref":"graphics/src/geometry/frame.rs:87-89","code":"   87 |     pub fn fill_text(&mut self, text: impl Into<Text>) {\n   88 |         self.raw.fill_text(text);\n   89 |     }","lines":3}]},{"id":"DEAD_12","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"The `else` branch in `change_line` (`self.caches.truncate(1); self.current_line = 0;`) is effectively unreachable for normal usage: `snapshot` is derived from a line index that should never exceed the number of already-highlighted snapshots plus one, and the `<=` test admits everything up to `caches.len()`. The branch only triggers if a change is reported for a line far beyond what has been highlighted, which the editor contract does not produce. It is defensive but untested dead-ish code that masks the off-by-one in the main branch.","fix":"Either document the invariant that makes this branch unreachable, or fold it into a single clamped computation so there is one code path.","locations":[{"ref":"highlighter/src/lib.rs:72-75","code":"   72 |         } else {\n   73 |             self.caches.truncate(1);\n   74 |             self.current_line = 0;\n   75 |         }","lines":4}]},{"id":"DEAD_13","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"Pipeline::load_font is marked #[allow(dead_code)] and is never called (the TODO 'Shared engine' notes it). It rebuilds the entire text cache on call. It is dead code carried as a stub.","fix":"Remove until shared-engine font loading is implemented, or wire it into the public renderer font-loading path.","locations":[{"ref":"tiny_skia/src/text.rs:28-37","code":"   28 |     // TODO: Shared engine\n   29 |     #[allow(dead_code)]\n   30 |     pub fn load_font(&mut self, bytes: Cow<'static, [u8]>) {\n   31 |         font_system()\n   32 |             .write()\n   33 |             .expect(\"Write font system\")\n   34 |             .load_font(bytes);\n   35 | \n   36 |         self.cache = RefCell::new(Cache::new());\n   37 |     }","lines":10}]},{"id":"DEAD_14","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`DEFAULT_SIZE` and `MAX_SIZE` are both 2048, so the `size.min(MAX_SIZE)` clamp in `with_size` and the distinction between the two constants is currently meaningless. Either the atlas was intended to support a larger MAX_SIZE than the default starting size, or one constant is redundant.","fix":"If a larger max is intended, raise MAX_SIZE; otherwise collapse to a single constant to avoid implying a configurability that does not exist.","locations":[{"ref":"wgpu/src/image/atlas.rs:13-14","code":"   13 | pub const DEFAULT_SIZE: u32 = 2048;\n   14 | pub const MAX_SIZE: u32 = 2048;","lines":2}]},{"id":"DEAD_15","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`Renderer::present` takes a `_format: wgpu::TextureFormat` parameter that is completely unused; the render\npass always uses pipelines built for `self.engine.format`. The compositor's `present` passes\n`frame.texture.format()` into it. The parameter is dead and silently hides a potential format mismatch\n(if the surface were ever configured with a format different from `engine.format`, nothing would catch it).","fix":"Either remove the unused `_format` parameter, or assert it equals `self.engine.format` to surface mismatches.","locations":[{"ref":"wgpu/src/lib.rs:160-173","code":"  160 |     pub fn present(\n  161 |         &mut self,\n  162 |         clear_color: Option<Color>,\n  163 |         _format: wgpu::TextureFormat,\n  164 |         frame: &wgpu::TextureView,\n  165 |         viewport: &Viewport,\n  166 |     ) -> wgpu::SubmissionIndex {\n  167 |         let encoder = self.draw(clear_color, frame, viewport);\n  168 | \n  169 |         self.staging_belt.finish();\n  170 |         let submission = self.engine.queue.submit([encoder.finish()]);\n  171 |         self.staging_belt.recall();\n  172 |         submission\n  173 |     }","lines":14},{"ref":"wgpu/src/window/compositor.rs:237-242","code":"  237 |             let _submission = renderer.present(\n  238 |                 Some(background_color),\n  239 |                 frame.texture.format(),\n  240 |                 view,\n  241 |                 viewport,\n  242 |             );","lines":6}]},{"id":"DEAD_16","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`lazy/cache.rs` is annotated `#![allow(dead_code)]` and defines a `Cache` self-referential struct that is not referenced by `lazy.rs` or `component.rs` (both build their own ouroboros `Inner`/`Cache`). It appears to be a leftover/unused abstraction kept alive only by the blanket allow.","fix":"Remove the module if genuinely unused, or wire `lazy`/`component` to use it and drop the `#![allow(dead_code)]`.","locations":[{"ref":"widget/src/lazy/cache.rs:1-14","code":"    1 | #![allow(dead_code)]\n    2 | use crate::core::Element;\n    3 | use crate::core::overlay;\n    4 | \n    5 | use ouroboros::self_referencing;\n    6 | \n    7 | #[self_referencing(pub_extras)]\n    8 | pub struct Cache<'a, Message: 'a, Theme: 'a, Renderer: 'a> {\n    9 |     pub element: Element<'a, Message, Theme, Renderer>,\n   10 | \n   11 |     #[borrows(mut element)]\n   12 |     #[covariant]\n   13 |     overlay: Option<overlay::Element<'this, Message, Theme, Renderer>>,\n   14 | }","lines":14}]},{"id":"DEAD_17","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"Internal exposes two accessors for maximized: the private `maximized()` method (state.rs:391-393) returning Option<Pane>, while State also has a public `maximized()` (state.rs:319-321). The Internal::maximized is used by PaneGrid, but State::maximized duplicates it; both are fine, however `drag_enabled` returns `Default::default()` (a bool, i.e. false) via the type rather than a literal `false`, which is needlessly obscure.","fix":"Replace `Default::default()` with the explicit literal `false` in drag_enabled for readability; no functional change.","locations":[{"ref":"widget/src/pane_grid.rs:291-297","code":"  291 |     fn drag_enabled(&self) -> bool {\n  292 |         if self.internal.maximized().is_none() {\n  293 |             self.on_drag.is_some()\n  294 |         } else {\n  295 |             Default::default()\n  296 |         }\n  297 |     }","lines":7}]},{"id":"DEAD_18","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`QRCode::State` holds `last_style: RefCell<Option<Style>>` used only to detect style changes and clear the geometry cache. This works, but `State` is stored per-widget-tree-node while the cache it clears (`self.data.cache`) lives on the shared `&Data` passed by reference. If the same `Data` is displayed by two `QRCode` widgets with different styles, each node's `last_style` will fight over the single shared cache, clearing it every frame (cache thrash) and defeating the \"reuse cache if possible\" optimization. Not a crash, but a performance pitfall hidden behind a per-node state tracking a shared resource.","fix":"Either move `last_style` tracking into `Data` alongside the cache it guards, or key the canvas cache by style so multiple consumers do not thrash a single shared cache.","locations":[{"ref":"widget/src/qr_code.rs:162-168","code":"  162 |         let mut last_style = state.last_style.borrow_mut();\n  163 | \n  164 |         if Some(style) != *last_style {\n  165 |             self.data.cache.clear();\n  166 | \n  167 |             *last_style = Some(style);\n  168 |         }","lines":7},{"ref":"widget/src/qr_code.rs:224-228","code":"  224 | pub struct Data {\n  225 |     contents: Vec<qrcode::Color>,\n  226 |     width: usize,\n  227 |     cache: canvas::Cache<Renderer>,\n  228 | }","lines":5}]},{"id":"DEAD_19","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In Table::layout the third positioning pass accumulates `x` across all cells, but on every new row (`column == 0`) `x` is reset to `self.padding_x`, so the value of `x` carried over from the previous row's final `x += metrics.columns[column] + spacing_x` is discarded. The final-size computation then uses `x - spacing_x + self.padding_x` which only reflects the LAST row's width. For tables where the last row is not the widest (it always has the full column count, so usually fine, but partial last rows are impossible here) this is benign, yet the per-iteration `x +=` on the last column before the loop ends is the only contributor — the intent (intrinsic width = sum of column widths) would be clearer computed directly from `metrics.columns`.","fix":"Compute the intrinsic width directly as `self.padding_x*2 + sum(metrics.columns) + spacing_x*(columns-1)` instead of relying on the trailing `x` accumulator, removing the reset/accumulate dance.","locations":[{"ref":"widget/src/table.rs:395-428","code":"  395 |         let mut x = self.padding_x;\n  396 |         let mut y = self.padding_y;\n  397 | \n  398 |         for (i, cell) in cells.iter_mut().enumerate() {\n  399 |             let row = i / columns;\n  400 |             let column = i % columns;\n  401 | \n  402 |             if column == 0 {\n  403 |                 x = self.padding_x;\n  404 | \n  405 |                 if row > 0 {\n  406 |                     y += metrics.rows[row - 1] + spacing_y;\n  407 |                 }\n  408 |             }\n  409 | \n  410 |             let Column_ {\n  411 |                 align_x, align_y, ..\n  412 |             } = &self.columns[column];\n  413 | \n  414 |             cell.move_to_mut((x, y));\n  415 |             cell.align_mut(\n  416 |                 Alignment::from(*align_x),\n  417 |                 Alignment::from(*align_y),\n  418 |                 Size::new(metrics.columns[column], metrics.rows[row]),\n  419 |             );\n  420 | \n  421 |             x += metrics.columns[column] + spacing_x;\n  422 |         }\n  423 | \n  424 |         let intrinsic = limits.resolve(\n  425 |             self.width,\n  426 |             self.height,\n  427 |             Size::new(\n  428 |                 x - spacing_x + self.padding_x,","lines":34}]},{"id":"DEAD_20","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`WindowEvent::HoveredFile(path)` and `DroppedFile(path)` call `path.clone()` even though `path` is an owned `PathBuf` taken by value out of the matched event. The clone allocates a redundant copy; the original `path` is moved nowhere else.","fix":"Pass `path` directly instead of `path.clone()` in both `FileHovered(path)` and `FileDropped(path)`.","locations":[{"ref":"winit/src/conversion.rs:292-297","code":"  292 |         WindowEvent::HoveredFile(path) => {\n  293 |             Some(Event::Window(window::Event::FileHovered(path.clone())))\n  294 |         }\n  295 |         WindowEvent::DroppedFile(path) => {\n  296 |             Some(Event::Window(window::Event::FileDropped(path.clone())))\n  297 |         }","lines":6}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment on `Radians::to_distance` says \"Calculates the line in which the angle\nintercepts the `bounds`\", but `distance_to_rect` uses `f32::max` of the two half-extent\nprojections rather than properly intersecting the ray with the rectangle border. This yields\nthe larger of the two axis projections, which for a non-square rect or off-axis angle does\nNOT generally land on the rectangle's edge - it over/undershoots. This is used for gradient\ndirection so the visual gradient endpoints may not align with the bounds as the comment\nimplies.","fix":"Either fix the math to compute the true ray-rectangle intersection, or correct the comment to describe the actual (approximate) behavior.","locations":[{"ref":"core/src/angle.rs:97-111","code":"   97 |     /// Calculates the line in which the angle intercepts the `bounds`.\n   98 |     pub fn to_distance(&self, bounds: &Rectangle) -> (Point, Point) {\n   99 |         let angle = self.0 - FRAC_PI_2;\n  100 |         let r = Vector::new(f32::cos(angle), f32::sin(angle));\n  101 | \n  102 |         let distance_to_rect = f32::max(\n  103 |             f32::abs(r.x * bounds.width / 2.0),\n  104 |             f32::abs(r.y * bounds.height / 2.0),\n  105 |         );\n  106 | \n  107 |         let start = bounds.center() - r * distance_to_rect;\n  108 |         let end = bounds.center() + r * distance_to_rect;\n  109 | \n  110 |         (start, end)\n  111 |     }","lines":15}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"`Color::is_readable_on` is documented as returning whether the color is readable on the\nbackground, and the WCAG-referenced `relative_contrast` is a ratio where the AA threshold for\nnormal text is 4.5 and AAA is 7.0. The hard-coded threshold here is `>= 6.0`, which matches\nno standard WCAG level and is undocumented. Not a bug per se, but the magic constant is\nmisleading given the WCAG doc links on the surrounding methods.","fix":"Document why 6.0 was chosen, or use a named constant tied to a WCAG level (4.5 / 7.0).","locations":[{"ref":"core/src/color.rs:219-222","code":"  219 |     #[must_use]\n  220 |     pub fn is_readable_on(self, background: Self) -> bool {\n  221 |         background.relative_contrast(self) >= 6.0\n  222 |     }","lines":4}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The `to_latin` doc/test claims it returns the latin character, and the early-return path `chars.next().is_none() && c < '\\u{370}'` returns the single character as-is for any codepoint below U+0370. That includes Latin-1 supplement and other non-ASCII letters (e.g. 'é' U+00E9, 'ñ' U+00F1), which are returned unchanged even though they are not in the latin a-z/0-9 set the rest of the function maps to. The function name and doc (`its latin character`) overstate the guarantee.","fix":"Either tighten the early return to ASCII (`c.is_ascii()` / `c < '\\u{80}'`) so only true ASCII passes through, or update the doc to state it returns the first character verbatim when it is below U+0370 (the Greek block) regardless of being a-z.","locations":[{"ref":"core/src/keyboard/key.rs:60-71","code":"   60 |     pub fn to_latin(&self, physical_key: Physical) -> Option<char> {\n   61 |         let Self::Character(s) = self else {\n   62 |             return None;\n   63 |         };\n   64 | \n   65 |         let mut chars = s.chars();\n   66 |         let c = chars.next()?;\n   67 | \n   68 |         if chars.next().is_none() && c < '\\u{370}' {\n   69 |             return Some(c);\n   70 |         }\n   71 | ","lines":12}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"`LineEnding::LfCr` is documented as `\\n\\r` for \"some legacy systems\". No real-world platform uses a `\\n\\r` line ending; the legacy Mac/Acorn convention is `\\r` (Cr) and Windows is `\\r\\n` (CrLf). This variant and its doc comment are misleading and could cause incorrect line-ending detection / normalization to be written against a non-existent format.","fix":"Remove the `LfCr` variant (and its `as_str` arm) unless there is a concrete documented source requiring it; if it must stay for parsing robustness, fix the doc comment to state that `\\n\\r` is not a standard line ending and is only handled defensively.","locations":[{"ref":"core/src/text/editor.rs:241-242","code":"  241 |     /// Use `\\n\\r` for line ending (some legacy systems)\n  242 |     LfCr,","lines":2}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment on `from_file` claims callers \"may prefer `from_file_data` instead\" to avoid a runtime error when the file is missing, but `from_file_data` takes raw `&[u8]` and performs no file access at all - it cannot be a drop-in alternative for reading a path at runtime. The cross-reference is misleading: `from_file_data` is for embedded/compile-time data, not for safer runtime file loading. A reader following the advice will not find an equivalent file-reading API.","fix":"Reword the doc to clarify that `from_file_data` is for already-loaded bytes (e.g. via `include_bytes!`), not a safer way to read a path; or remove the misleading suggestion.","locations":[{"ref":"src/window/icon.rs:11-15","code":"   11 | /// Creates an icon from an image file.\n   12 | ///\n   13 | /// This will return an error in case the file is missing at run-time. You may prefer [`from_file_data`] instead.\n   14 | #[cfg(feature = \"image\")]\n   15 | pub fn from_file<P: AsRef<Path>>(icon_path: P) -> Result<Icon, Error> {","lines":5}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment \"There will always be some bytes left, since the previous loop guarantees\n`bytes_written < bytes.len()`\" is misleading/incorrect. The loop guarantees `bytes_written < bytes.len()`\nonly when `bytes.len() > 0`; for an empty slice `bytes_written == bytes.len() == 0` and there are zero bytes\nleft, contradicting the comment and triggering the `expect` panic described above.","fix":"Reword to state the invariant holds only for non-empty input, and handle the empty case explicitly.","locations":[{"ref":"wgpu/src/buffer.rs:87-91","code":"   87 |         // There will always be some bytes left, since the previous\n   88 |         // loop guarantees `bytes_written < bytes.len()`\n   89 |         let bytes_left = ((bytes.len() - bytes_written) as u64)\n   90 |             .try_into()\n   91 |             .expect(\"non-empty write\");","lines":5}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc example for `right_center` constructs `container(\"Bottom Center!\")` while the function aligns to the right-center. The label text is a copy-paste leftover from `bottom_center` and misleads readers about what the helper does.","fix":"Change the example string to e.g. `container(\"Right Center!\")` to match the helper's behavior.","locations":[{"ref":"widget/src/helpers.rs:343","code":"  343 | /// let right_center = container(\"Bottom Center!\").align_right(Fill).center_y(Fill);","lines":1}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Off-by-one in the warning text vs. the loop guard. The loop breaks when\n`redraw_count >= 2`, and `redraw_count` is incremented only after a layout-invalidating\niteration. So the warning fires after the 3rd update produces invalidation (iterations with\nredraw_count 0, 1, then the guard trips when it reaches 2), i.e. \"more than 2\" relayout\nattempts - but the message claims \"More than 3 consecutive RedrawRequested events\". The\nnumber in the message does not match the actual threshold and will mislead anyone debugging a\nlayout-thrashing widget.","fix":"Make the message match the guard, e.g. \"More than 2 consecutive RedrawRequested events produced layout invalidation\", or change the guard to `>= 3` if 3 retries were intended.","locations":[{"ref":"winit/src/lib.rs:810-814","code":"  810 |                             if redraw_count >= 2 {\n  811 |                                 log::warn!(\n  812 |                                     \"More than 3 consecutive RedrawRequested events \\\n  813 |                                     produced layout invalidation\"\n  814 |                                 );","lines":5}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `Animation::very_quick` says \"Sets the duration of the [`Animation`] to 100ms.\" which is correct, but the function `quick` is documented as 200ms, `slow` 400ms, `very_slow` 500ms - the ratios are inconsistent (slow is 2x quick, but very_slow is only 1.25x slow). Not a bug, but more notably `very_quick` duplicates the default duration already set in `new` (100ms), so calling `.very_quick()` is a no-op relative to the default. Worth a doc note. (Low-value; flagged for completeness.)","fix":"Optionally document that `very_quick` matches the default, or remove the redundant preset.","locations":[{"ref":"core/src/animation.rs:40-58","code":"   40 |     /// Sets the duration of the [`Animation`] to 100ms.\n   41 |     pub fn very_quick(self) -> Self {\n   42 |         self.duration(Duration::from_millis(100))\n   43 |     }\n   44 | \n   45 |     /// Sets the duration of the [`Animation`] to 200ms.\n   46 |     pub fn quick(self) -> Self {\n   47 |         self.duration(Duration::from_millis(200))\n   48 |     }\n   49 | \n   50 |     /// Sets the duration of the [`Animation`] to 400ms.\n   51 |     pub fn slow(self) -> Self {\n   52 |         self.duration(Duration::from_millis(400))\n   53 |     }\n   54 | \n   55 |     /// Sets the duration of the [`Animation`] to 500ms.\n   56 |     pub fn very_slow(self) -> Self {\n   57 |         self.duration(Duration::from_millis(500))\n   58 |     }","lines":19}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on Overlay::index says \"By default, it returns `1.0`.\" which matches the code, but the surrounding wording (\"The index of the overlay.\") plus Group::index defaulting to `1.0` for an empty group is undocumented. Minor: the Group::index unwrap_or(1.0) for an empty group is an undocumented magic default that duplicates the trait default without explanation.","fix":"Document that an empty Group falls back to the default index of 1.0, or factor the default into a named constant shared with the trait default.","locations":[{"ref":"core/src/overlay.rs:83-91","code":"   83 |     /// The index of the overlay.\n   84 |     ///\n   85 |     /// Overlays with a higher index will be rendered on top of overlays with\n   86 |     /// a lower index.\n   87 |     ///\n   88 |     /// By default, it returns `1.0`.\n   89 |     fn index(&self) -> f32 {\n   90 |         1.0\n   91 |     }","lines":9},{"ref":"core/src/overlay/group.rs:152-157","code":"  152 |     fn index(&self) -> f32 {\n  153 |         self.children\n  154 |             .first()\n  155 |             .map(|child| child.as_overlay().index())\n  156 |             .unwrap_or(1.0)\n  157 |     }","lines":6}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `MaybeSend`/`MaybeSync` in the wasm32 module still reads 'enforces `Send` only on native platforms' even though this is the wasm branch where the trait is empty and enforces nothing. The comment is copy-pasted from the native branch and is misleading in context.","fix":"Reword the wasm-branch doc comments to state that on wasm these traits impose no bound (the 'Useful for writing cross-platform async code' line is fine; the 'enforces Send only on native' line is confusing when read inside the wasm cfg block).","locations":[{"ref":"futures/src/maybe.rs:18-32","code":"   18 | #[cfg(target_arch = \"wasm32\")]\n   19 | mod platform {\n   20 |     /// An extension trait that enforces `Send` only on native platforms.\n   21 |     ///\n   22 |     /// Useful for writing cross-platform async code!\n   23 |     pub trait MaybeSend {}\n   24 | \n   25 |     impl<T> MaybeSend for T {}\n   26 | \n   27 |     /// An extension trait that enforces `Sync` only on native platforms.\n   28 |     ///\n   29 |     /// Useful for writing cross-platform async code!\n   30 |     pub trait MaybeSync {}\n   31 | \n   32 |     impl<T> MaybeSync for T {}","lines":15}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment on `create_surface` reads 'Crates a new [`Surface`]' - typo for 'Creates'.","fix":"Fix typo: 'Crates' -> 'Creates'.","locations":[{"ref":"graphics/src/compositor.rs:35-36","code":"   35 |     /// Crates a new [`Surface`] for the given window.\n   36 |     ///","lines":2}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on `Frame::paste` reads \"Draws the contents of the given Frame with origin at the given Point\", but `paste` takes no `Point` argument - it only takes `frame: Self`. The origin/offset is baked into the drafted frame's clip bounds. The comment is a leftover from an older signature and misleads readers about the API.","fix":"Update the comment to remove the nonexistent `Point` parameter reference.","locations":[{"ref":"graphics/src/geometry/frame.rs:156-159","code":"  156 |     /// Draws the contents of the given [`Frame`] with origin at the given [`Point`].\n  157 |     fn paste(&mut self, frame: Self) {\n  158 |         self.raw.paste(frame.raw);\n  159 |     }","lines":4}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `Cache` calls it \"A store of recently used sections of text\" and `trim` is\ndocumented as an LRU-style eviction, but the implementation is a single-generation\nmark-and-sweep (everything not touched since the previous `trim` is dropped), not an LRU. There\nis no recency ordering or capacity bound. The \"recently used\" naming overstates the policy and\ncan mislead callers into expecting LRU semantics.","fix":"Reword the docs to describe the actual policy: entries survive one trim cycle if used since the\nlast trim; otherwise they are evicted. Remove the LRU implication.","locations":[{"ref":"graphics/src/text/cache.rs:9-15","code":"    9 | /// A store of recently used sections of text.\n   10 | #[derive(Debug, Default)]\n   11 | pub struct Cache {\n   12 |     entries: FxHashMap<KeyHash, Entry>,\n   13 |     aliases: FxHashMap<KeyHash, KeyHash>,\n   14 |     recently_used: FxHashSet<KeyHash>,\n   15 | }","lines":7},{"ref":"graphics/src/text/cache.rs:89-100","code":"   89 |     /// Trims the [`Cache`].\n   90 |     ///\n   91 |     /// This will clear the sections of text that have not been used since the last `trim`.\n   92 |     pub fn trim(&mut self) {\n   93 |         self.entries\n   94 |             .retain(|key, _| self.recently_used.contains(key));\n   95 | \n   96 |         self.aliases\n   97 |             .retain(|_, value| self.recently_used.contains(value));\n   98 | \n   99 |         self.recently_used.clear();\n  100 |     }","lines":12}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"`Task::stream` is documented as the primitive that 'runs the given Stream and produces each of its items', but it silently injects a leading `yield_now()` tick (filtered out) before the user stream. This behavioral detail (an extra executor yield on first poll) is undocumented; a reader auditing scheduling/latency would not expect the inserted yield from the doc comment.","fix":"Add a one-line comment explaining that the leading `yield_now()` is intentional (forces the task onto the executor / avoids running synchronously before the runtime is ready), so future readers don't remove it as dead code.","locations":[{"ref":"runtime/src/task.rs:252-266","code":"  252 |     /// Creates a new [`Task`] that runs the given [`Stream`] and produces\n  253 |     /// each of its items.\n  254 |     pub fn stream(stream: impl Stream<Item = T> + MaybeSend + 'static) -> Self\n  255 |     where\n  256 |         T: 'static,\n  257 |     {\n  258 |         Self {\n  259 |             stream: Some(boxed_stream(\n  260 |                 stream::once(yield_now())\n  261 |                     .filter_map(|_| async { None })\n  262 |                     .chain(stream.map(Action::Output)),\n  263 |             )),\n  264 |             units: 1,\n  265 |         }\n  266 |     }","lines":15}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`Simulator::tap_key` is documented as 'Simulates a key press, followed by a release' and returns the\nevent::Status, but it returns only the status of the press (`.first()`), discarding the release\nstatus. A caller relying on the returned status to know whether the key tap was handled may get a\nmisleading result when only the release is captured. The doc implies a combined outcome.","fix":"Either fold press+release statuses with `event::Status::merge` (as `typewrite` does) or update the doc/comment to state that only the press status is returned.","locations":[{"ref":"test/src/simulator.rs:151-157","code":"  151 |     /// Simulates a key press, followed by a release, in the [`Simulator`].\n  152 |     pub fn tap_key(&mut self, key: impl Into<keyboard::Key>) -> event::Status {\n  153 |         self.simulate(tap_key(key, None))\n  154 |             .first()\n  155 |             .copied()\n  156 |             .unwrap_or(event::Status::Ignored)\n  157 |     }","lines":7}]},{"id":"CMT_17","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment says \"Border path is offset by half the border width\" but the following code offsets the border_bounds origin by +border_width/2 AND shrinks width/height by the full border_width, which is the correct stroke-inset, not merely an offset. The comment understates/mislabels the operation; minor but misleading to a future reader adjusting the math.","fix":"Reword to e.g. \"Inset the stroked rect by half the border width so the centered stroke lands inside the quad\".","locations":[{"ref":"tiny_skia/src/engine.rs:185-191","code":"  185 |             // Border path is offset by half the border width\n  186 |             let border_bounds = Rectangle {\n  187 |                 x: quad.bounds.x + border_width / 2.0,\n  188 |                 y: quad.bounds.y + border_width / 2.0,\n  189 |                 width: quad.bounds.width - border_width,\n  190 |                 height: quad.bounds.height - border_width,\n  191 |             };","lines":7}]},{"id":"CMT_18","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The comment on the `bytes_per_row` calculation says it rounds 'width up to the next multiple of COPY_BYTES_PER_ROW_ALIGNMENT', but the code rounds `4 * (width + padding*2)` (the byte count including padding), not the width. The comment understates what is being rounded and omits the padding contribution, which is the non-obvious part.","fix":"Reword the comment to state that the padded row byte count (4 * padded width) is rounded up to the alignment.","locations":[{"ref":"wgpu/src/image/atlas.rs:319-325","code":"  319 |         // It is a webgpu requirement that:\n  320 |         //   BufferCopyView.layout.bytes_per_row % wgpu::COPY_BYTES_PER_ROW_ALIGNMENT == 0\n  321 |         // So we calculate bytes_per_row by rounding width up to the next\n  322 |         // multiple of wgpu::COPY_BYTES_PER_ROW_ALIGNMENT.\n  323 |         let bytes_per_row = (4 * (width + padding.width * 2))\n  324 |             .next_multiple_of(wgpu::COPY_BYTES_PER_ROW_ALIGNMENT)\n  325 |             as usize;","lines":7}]},{"id":"CMT_19","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment typo: `Sets the text sixe of the [`ComboBox`].` should read `size`.","fix":"Fix typo: `Sets the text size of the [`ComboBox`].`","locations":[{"ref":"widget/src/combo_box.rs:242-242","code":"  242 |     /// Sets the text sixe of the [`ComboBox`].","lines":1}]},{"id":"CMT_20","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Grid::layout comment says `// width = n * (cell + spacing) - spacing, given n > 0` to justify the MaxWidth formula, but the code actually solves for `n` as `(available.width + spacing) / (max_width + spacing)` rounded up, i.e. it treats `pixels.0` (the max cell width) as the cell size. The comment describes the inverse relation and omits that `pixels.0` is a maximum, not the actual cell width, making it misleading about what is being computed.","fix":"Update the comment to state it derives the column count from the desired max cell width, e.g. `// n = ceil((available + spacing) / (max_cell_width + spacing))`.","locations":[{"ref":"widget/src/grid.rs:175-178","code":"  175 |             // width = n * (cell + spacing) - spacing, given n > 0\n  176 |             Constraint::MaxWidth(pixels) => {\n  177 |                 ((available.width + self.spacing) / (pixels.0 + self.spacing)).ceil() as usize\n  178 |             }","lines":4}]},{"id":"CMT_21","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Joke comments `// - You may not like it, but this is what peak performance looks like` / `// - TODO: Get rid of ouroboros, for good` / `// - What?!` are duplicated verbatim in both `lazy.rs` and `component.rs` overlay paths. They convey no actionable information beyond the (legitimate) TODO and clutter two critical unsafe-adjacent code paths.","fix":"Replace with a single terse comment explaining the ouroboros round-trip invariant (why the element/tree is taken out and put back), keeping the TODO once.","locations":[{"ref":"widget/src/lazy.rs:267-269","code":"  267 |             // - You may not like it, but this is what peak performance looks like\n  268 |             // - TODO: Get rid of ouroboros, for good\n  269 |             // - What?!","lines":3},{"ref":"widget/src/lazy/component.rs:462-464","code":"  462 |             // - You may not like it, but this is what peak performance looks like\n  463 |             // - TODO: Get rid of ouroboros, for good\n  464 |             // - What?!","lines":3}]},{"id":"CMT_22","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The log message `\"Refeeding {n} lines\"` is emitted once per loop iteration with `n = self.lines.len()`, so it logs the same total count on every iteration instead of progress. Misleading debug output.","fix":"Move the log outside the loop, or log the per-line index instead of the total count each iteration.","locations":[{"ref":"widget/src/markdown.rs:471-475","code":"  471 |                     for line in &self.lines {\n  472 |                         log::debug!(\"Refeeding {n} lines\", n = self.lines.len());\n  473 | \n  474 |                         let _ = self.parser.highlight_line(&line.0);\n  475 |                     }","lines":5}]},{"id":"CMT_23","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on Axis variants is misleading/garbled as rendered. `Horizontal` is documented as '—' (a horizontal line) and `Vertical` as '|'. While arguably matching the divider line orientation, a 'Horizontal axis' in coordinate terms is the x-axis (vertical split line), which is the opposite of what a reader expects; the single-character glyphs do not clarify and one uses a non-ASCII em-dash contrary to the surrounding ASCII style.","fix":"Clarify the comments to describe what each axis splits (e.g. 'Horizontal: splits a region into top/bottom with a horizontal divider line') and replace the em-dash with a plain description.","locations":[{"ref":"widget/src/pane_grid/axis.rs:6-9","code":"    6 |     /// The horizontal axis: —\n    7 |     Horizontal,\n    8 |     /// The vertical axis: |\n    9 |     Vertical,","lines":4}]},{"id":"CMT_24","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment for `ProgressBar`'s `StyleFn` type alias claims it is \"just a boxed closure: `Fn(&Theme, Status) -> Style`\", but `ProgressBar` styling has no `Status` and the actual type is `Box<dyn Fn(&Theme) -> Style>`. The `Status` parameter is copy-pasted from a status-bearing widget (e.g. slider/button) and is misleading.","fix":"Fix the doc comment to read `Fn(&Theme) -> Style`.","locations":[{"ref":"widget/src/progress_bar.rs:266-268","code":"  266 | ///\n  267 | /// This is just a boxed closure: `Fn(&Theme, Status) -> Style`.\n  268 | pub type StyleFn<'a, Theme> = Box<dyn Fn(&Theme) -> Style + 'a>;","lines":3}]},{"id":"CMT_25","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Same misleading doc comment as in `progress_bar.rs`: `rule::StyleFn` is documented as \"`Fn(&Theme, Status) -> Style`\" but `Rule` has no `Status` and the real type is `Box<dyn Fn(&Theme) -> Style>`.","fix":"Fix the doc comment to read `Fn(&Theme) -> Style`.","locations":[{"ref":"widget/src/rule.rs:290-292","code":"  290 | ///\n  291 | /// This is just a boxed closure: `Fn(&Theme, Status) -> Style`.\n  292 | pub type StyleFn<'a, Theme> = Box<dyn Fn(&Theme) -> Style + 'a>;","lines":3}]},{"id":"CMT_26","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Doc comment on `Offset::translation`/`Anchor::End` math aside: the `AutoScroll` struct field doc has a typo \"Thje [`Shadow`]\" instead of \"The\". Minor, but it is a public doc comment.","fix":"Fix typo: \"The [`Shadow`] of the [`AutoScroll`] overlay.\"","locations":[{"ref":"widget/src/scrollable.rs:2097-2098","code":" 2097 |     /// Thje [`Shadow`] of the [`AutoScroll`] overlay.\n 2098 |     pub shadow: Shadow,","lines":2}]},{"id":"CMT_27","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment on the synthetic-keyboard arm says \"Ignore keyboard presses/releases during window focus/unfocus\", but the guard `if is_synthetic` ignores ALL synthetic key events, not only focus/unfocus-related ones. Synthetic events are also generated by winit in other situations (e.g. modifiers restored on focus, IME, platform quirks). The comment understates what is being t the call boundary: the trait doc for `current_line` says it \"will normally be the least index that changed\", with no mention that an implementation may return `usize::MAX` to signal \"never\". Consumers that use `current_line()` as a loop bound or array index (e.g. iterating lines from `current_line()` onward) could allocate/iterate up to `usize::MAX` or panic on indexing if they do not special-case the sentinel.","fix":"Document on the trait that `current_line` may return `usize::MAX` (or `>= line_count`) to indicate \"no pending changes\", and require callers to clamp/skip when `current_line() >= line_count`. Alternatively change the contract to return `Option<usize>`.","locations":[{"ref":"core/src/text/highlighter.rs:67-69","code":"   67 |     fn current_line(&self) -> usize {\n   68 |         usize::MAX\n   69 |     }","lines":3},{"ref":"core/src/text/highlighter.rs:38-42","code":"   38 |     /// Returns the current line of the [`Highlighter`].\n   39 |     ///\n   40 |     /// If `change_line` has been called, this will normally be the least index\n   41 |     /// that changed.\n   42 |     fn current_line(&self) -> usize;","lines":5}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`relative_offset` divides by `(content_bounds.width - bounds.width)` and `(content_bounds.height - bounds.height)` with no guard. When content equals or is smaller than bounds the denominator is 0 (or negative), yielding NaN/inf in the returned `RelativeOffset`. Internal use in `notify_viewport` is protected by an early return when content <= bounds, but `relative_offset` is a public method on the public `Viewport`, so external callers can get NaN.","fix":"Guard the denominators: if `content - bounds <= 0.0` return `0.0` for that axis, e.g. `let dx = content_bounds.width - bounds.width; let x = if dx > 0.0 { x / dx } else { 0.0 };`.","locations":[{"ref":"widget/src/scrollable.rs:1605-1612","code":" 1605 |     pub fn relative_offset(&self) -> RelativeOffset {\n 1606 |         let AbsoluteOffset { x, y } = self.absolute_offset();\n 1607 | \n 1608 |         let x = x / (self.content_bounds.width - self.bounds.width);\n 1609 |         let y = y / (self.content_bounds.height - self.bounds.height);\n 1610 | \n 1611 |         RelativeOffset { x, y }\n 1612 |     }","lines":8}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`State::move_cursor_to_end` calls `self.cursor.move_to(usize::MAX)` and `select_all` calls `select_range(0, usize::MAX)`, relying on `Cursor::state`/`start`/`end` to clamp `usize::MAX` to `value.len()` at read time. This works only because every read path clamps; the stored cursor state holds a sentinel `usize::MAX` that is meaningless without the value. It is fragile: any code reading `self.state` directly (e.g. `Cursor::start`/`end` already match on raw `self.state` and clamp, but a future accessor that forgets to clamp) sees `usize::MAX`.","fix":"Acceptable as-is given consistent clamping, but consider clamping at write time when the value is available, or documenting the `usize::MAX` sentinel convention on `Cursor`.","locations":[{"ref":"widget/src/text_input.rs:1440-1452","code":" 1440 |     pub fn move_cursor_to_end(&mut self) {\n 1441 |         self.cursor.move_to(usize::MAX);\n 1442 |     }\n 1443 | \n 1444 |     /// Moves the [`Cursor`] of the [`TextInput`] to an arbitrary location.\n 1445 |     pub fn move_cursor_to(&mut self, position: usize) {\n 1446 |         self.cursor.move_to(position);\n 1447 |     }\n 1448 | \n 1449 |     /// Selects all the content of the [`TextInput`].\n 1450 |     pub fn select_all(&mut self) {\n 1451 |         self.cursor.select_range(0, usize::MAX);\n 1452 |     }","lines":13}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"negligible","easy":true,"description":"Several user-facing strings contain typos: backend.rs `Sofware` (line 17), `usted to configure` (line 123); settings.rs docs are fine but window/settings closeable doc `Whether the title bar has Close button or not` reads awkwardly. These are doc/string-only but appear in public docs and Display output is unaffected.","fix":"Fix typos: `Software`, `used to configure`.","locations":[{"ref":"core/src/backend.rs:17","code":"   17 |     /// Sofware graphics backend; quite slower than hardware-based backends, but more compatible.","lines":1},{"ref":"core/src/backend.rs:123","code":"  123 | /// The settings usted to configure a [`Backend`].","lines":1}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"negligible","easy":true,"description":"Inconsistent and misleading generic parameter names across the window task helpers: `raw_id<Message>`, `enable_mouse_passthrough<Message>`, `disable_mouse_passthrough<Message>` name the unused type parameter `Message`, while the rest of the module uses `<T>`. `raw_id`'s closure also does not use the `id` by move (`task::oneshot(|channel| ...)` captures `id` by reference-into-move) unlike the other oneshot helpers that use `move`. Purely cosmetic but inconsistent with the surrounding API.","fix":"Rename the unused type parameters to `<T>` for consistency and use `move` closures uniformly in the oneshot helpers.","locations":[{"ref":"runtime/src/window.rs:420-422","code":"  420 | pub fn raw_id<Message>(id: Id) -> Task<u64> {\n  421 |     task::oneshot(|channel| crate::Action::Window(Action::GetRawId(id, channel)))\n  422 | }","lines":3},{"ref":"runtime/src/window.rs:455-456","code":"  455 | pub fn enable_mouse_passthrough<Message>(id: Id) -> Task<Message> {\n  456 |     task::effect(crate::Action::Window(Action::EnableMousePassthrough(id)))","lines":2},{"ref":"runtime/src/window.rs:463-464","code":"  463 | pub fn disable_mouse_passthrough<Message>(id: Id) -> Task<Message> {\n  464 |     task::effect(crate::Action::Window(Action::DisableMousePassthrough(id)))","lines":2}]}]</script>
