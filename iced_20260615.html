 \n  180 |                     render_span.finish();\n  181 |                 }\n  182 |             }\n  183 |         }","lines":112}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Cache::trim` for SVG entries only runs when `self.should_trim` is true, and `should_trim` is set to true both by `load` and by `upload`, but it is reset to false at the end of trim. The `*_hits` sets are populated only inside `upload`/`load`. If a frame renders no SVGs at all (so neither upload nor load is called), `should_trim` stays false and the previous frame's atlas entries are never freed, even though their hit sets were cleared on the last trim. Conversely, on the trim that does run, an SVG that was loaded (svg_hits) but not rasterized this frame keeps its parsed tree but its rasterized atlas entry is correctly dropped. The net effect: rasterized atlas memory for SVGs that stop being drawn is only reclaimed if at least one SVG is drawn in the trimming frame, leaking atlas space in UIs that toggle all SVGs off.","fix":"Either always run the retain/remove pass in trim (cheap when maps are small) or set should_trim=true whenever any rasterized entry exists so a no-SVG frame still reclaims stale entries.","locations":[{"ref":"wgpu/src/image/vector.rs:183-204","code":"  183 |     pub fn trim(&mut self, atlas: &mut Atlas) {\n  184 |         if !self.should_trim {\n  185 |             return;\n  186 |         }\n  187 | \n  188 |         let svg_hits = &self.svg_hits;\n  189 |         let rasterized_hits = &self.rasterized_hits;\n  190 | \n  191 |         self.svgs.retain(|k, _| svg_hits.contains(k));\n  192 |         self.rasterized.retain(|k, entry| {\n  193 |             let retain = rasterized_hits.contains(k);\n  194 | \n  195 |             if !retain {\n  196 |                 atlas.remove(entry);\n  197 |             }\n  198 | \n  199 |             retain\n  200 |         });\n  201 |         self.svg_hits.clear();\n  202 |         self.rasterized_hits.clear();\n  203 |         self.should_trim = false;\n  204 |     }","lines":22},{"ref":"wgpu/src/image/vector.rs:83-86","code":"   83 |         self.should_trim = true;\n   84 | \n   85 |         let _ = self.svgs.insert(handle.id(), svg);\n   86 |         self.svgs.get(&handle.id()).unwrap()","lines":4}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In ComboBox::update, when the input becomes focused (`!started_focused`), an `on_option_hovered` message is published for the currently hovered option read from `state.filtered_options`, and `published_message_to_shell` is set true. Later (lines 739-751) the focus-changed branch suppresses `on_open` whenever `published_message_to_shell` is true. So if `on_option_hovered` is set, opening the combo box never fires `on_open`, even though the open and the hover are distinct events the user subscribed to separately. The two notifications are conflated.","fix":"Track open/close notification independently of option-hover notification, or do not gate `on_open`/`on_close` on `published_message_to_shell` set by the hover path. Publish `on_open` on the focus transition regardless of whether a hover message was also published.","locations":[{"ref":"widget/src/combo_box.rs:616-624","code":"  616 |             self.state.with_inner(|state| {\n  617 |                 if !started_focused && let Some(on_option_hovered) = &mut self.on_option_hovered {\n  618 |                     let hovered_option = menu.hovered_option.unwrap_or(0);\n  619 | \n  620 |                     if let Some(option) = state.filtered_options.options.get(hovered_option) {\n  621 |                         shell.publish(on_option_hovered(option.clone()));\n  622 |                         published_message_to_shell = true;\n  623 |                     }\n  624 |                 }","lines":9},{"ref":"widget/src/combo_box.rs:743-751","code":"  743 |             if !published_message_to_shell {\n  744 |                 if is_focused {\n  745 |                     if let Some(on_open) = self.on_open.take() {\n  746 |                         shell.publish(on_open);\n  747 |                     }\n  748 |                 } else if let Some(on_close) = self.on_close.take() {\n  749 |                     shell.publish(on_close);\n  750 |                 }\n  751 |             }","lines":9}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`hover`'s `mouse_interaction` iterates children in reverse and returns the first interaction that is not `Interaction::None`, but it never checks whether the `top` layer is actually visible (hovered/focused/overlay-active). When the top layer is hidden it is not drawn (see `draw`), yet its widget can still report a non-None mouse interaction here, causing the wrong cursor to be shown over an invisible layer.","fix":"Skip the top layer in `mouse_interaction` when `!(is_hovered || self.is_top_focused || self.is_top_overlay_active)`, mirroring the visibility condition used in `draw`/`update`.","locations":[{"ref":"widget/src/helpers.rs:908-927","code":"  908 |         fn mouse_interaction(\n  909 |             &self,\n  910 |             tree: &Tree,\n  911 |             layout: Layout<'_>,\n  912 |             cursor: mouse::Cursor,\n  913 |             viewport: &Rectangle,\n  914 |             renderer: &Renderer,\n  915 |         ) -> mouse::Interaction {\n  916 |             [&self.base, &self.top]\n  917 |                 .into_iter()\n  918 |                 .rev()\n  919 |                 .zip(layout.children().rev().zip(tree.children.iter().rev()))\n  920 |                 .map(|(child, (layout, tree))| {\n  921 |                     child\n  922 |                         .as_widget()\n  923 |                         .mouse_interaction(tree, layout, cursor, viewport, renderer)\n  924 |                 })\n  925 |                 .find(|&interaction| interaction != mouse::Interaction::None)\n  926 |                 .unwrap_or_default()\n  927 |         }","lines":20},{"ref":"widget/src/helpers.rs:805-816","code":"  805 |                 if cursor.is_over(layout.bounds())\n  806 |                     || self.is_top_focused\n  807 |                     || self.is_top_overlay_active\n  808 |                 {\n  809 |                     let (top_layout, top_tree) = children.next().unwrap();\n  810 | \n  811 |                     renderer.with_layer(bounds, |renderer| {\n  812 |                         self.top.as_widget().draw(\n  813 |                             top_tree, renderer, theme, style, top_layout, cursor, viewport,\n  814 |                         );\n  815 |                     });\n  816 |                 }","lines":12}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Viewer::update` can divide by zero / produce NaN when computing the zoom adjustment. `let factor = state.scale / previous_scale - 1.0;` and the wheel handler scales via `state.scale / (1.0 + self.scale_step)`. `previous_scale` is taken from `state.scale` which is clamped to `[min_scale, max_scale]`, but `min_scale` is fully user-controlled (`Viewer::min_scale(0.0)` is allowed) and `scale_step` is user-controlled too (`scale_step(-1.0)` makes `1.0 + scale_step == 0.0`). Either makes the division blow up to `inf`/`NaN`, which then propagates into `state.current_offset`, permanently corrupting the pan offset. There is no validation on these setters.","fix":"Validate setters: clamp `min_scale` to a small positive value (e.g. `> 0.0`) and require `scale_step > -1.0` (or clamp `1.0 + scale_step` away from zero). Guard the `factor` computation against `previous_scale == 0.0`.","locations":[{"ref":"widget/src/image/viewer.rs:176-196","code":"  176 |                             state.scale = (if y > 0.0 {\n  177 |                                 state.scale * (1.0 + self.scale_step)\n  178 |                             } else {\n  179 |                                 state.scale / (1.0 + self.scale_step)\n  180 |                             })\n  181 |                             .clamp(self.min_scale, self.max_scale);\n  182 | \n  183 |                             let scaled_size = scaled_image_size(\n  184 |                                 renderer,\n  185 |                                 &self.handle,\n  186 |                                 state,\n  187 |                                 bounds.size(),\n  188 |                                 self.content_fit,\n  189 |                             );\n  190 | \n  191 |                             let factor = state.scale / previous_scale - 1.0;\n  192 | \n  193 |                             let cursor_to_center = cursor_position - bounds.center();\n  194 | \n  195 |                             let adjustment =\n  196 |                                 cursor_to_center * factor + state.current_offset * factor;","lines":21},{"ref":"widget/src/image/viewer.rs:75-95","code":"   75 |     pub fn max_scale(mut self, max_scale: f32) -> Self {\n   76 |         self.max_scale = max_scale;\n   77 |         self\n   78 |     }\n   79 | \n   80 |     /// Sets the min scale applied to the image of the [`Viewer`].\n   81 |     ///\n   82 |     /// Default is `0.25`\n   83 |     pub fn min_scale(mut self, min_scale: f32) -> Self {\n   84 |         self.min_scale = min_scale;\n   85 |         self\n   86 |     }\n   87 | \n   88 |     /// Sets the percentage the image of the [`Viewer`] will be scaled by\n   89 |     /// when zoomed in / out.\n   90 |     ///\n   91 |     /// Default is `0.10`\n   92 |     pub fn scale_step(mut self, scale_step: f32) -> Self {\n   93 |         self.scale_step = scale_step;\n   94 |         self\n   95 |     }","lines":21}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the syntax highlighter's incremental cache, after a cache miss that requires resetting (`self.current + 1 < self.lines.len()`), the code resets the parser, truncates `self.lines` to `self.current`, and refeeds all kept lines via `parser.highlight_line`. But `iced_highlighter::Stream::highlight_line` resets its working state to the last commit on every call (see highlighter/src/lib.rs:172-173), so the refeed loop never accumulates multi-line context unless `commit()` is called between lines. The only `commit()` call (line 481) is guarded by `self.current + 1 < self.lines.len()`, which is always false immediately after `truncate(self.current)` set `lines.len() == current`. Therefore the commit is dead code and the refeed produces no accumulated state: multi-line constructs (block comments, multi-line strings) lose their carry-over context after any edit that triggers a reset, yielding incorrect highlighting.","fix":"Commit after each refed line inside the loop: `for line in &self.lines { let _ = self.parser.highlight_line(&line.0); self.parser.commit(); }` and remove the unreachable commit at line 480-482. Verify the truncate/refeed restores parser state equivalent to having highlighted lines 0..current.","locations":[{"ref":"widget/src/markdown.rs:466-496","code":"  466 |                 if self.current + 1 < self.lines.len() {\n  467 |                     log::debug!(\"Resetting highlighter...\");\n  468 |                     self.parser.reset();\n  469 |                     self.lines.truncate(self.current);\n  470 | \n  471 |                     for line in &self.lines {\n  472 |                         log::debug!(\"Refeeding {n} lines\", n = self.lines.len());\n  473 | \n  474 |                         let _ = self.parser.highlight_line(&line.0);\n  475 |                     }\n  476 |                 }\n  477 | \n  478 |                 log::trace!(\"Parsing: {text}\", text = text.trim_end());\n  479 | \n  480 |                 if self.current + 1 < self.lines.len() {\n  481 |                     self.parser.commit();\n  482 |                 }\n  483 | \n  484 |                 let mut spans = Vec::new();\n  485 | \n  486 |                 for (range, highlight) in self.parser.highlight_line(text) {\n  487 |                     spans.push(Span::Highlight {\n  488 |                         text: text[range].to_owned(),\n  489 |                         color: highlight.color(),\n  490 |                         font: highlight.font(),\n  491 |                     });\n  492 |                 }\n  493 | \n  494 |                 if self.current + 1 == self.lines.len() {\n  495 |                     let _ = self.lines.pop();\n  496 |                 }","lines":31}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`MouseArea` only fires `on_release`/`on_right_release`/`on_middle_release` when the cursor is currently over the area, because of the early `if !cursor.is_over(layout.bounds()) { return; }` guard before the event match. A common interaction is press-inside then drag-outside then release: the press sets no \"pressed\" state here, and the release outside the bounds is dropped entirely, so `on_release` never fires. This makes `on_press`/`on_release` pairs unbalanced (a press can have no matching release), which breaks drag-style consumers. (Contrast with `button.rs`, which tracks `is_pressed` and always handles `ButtonReleased`.)","fix":"Track a pressed state like `button.rs` does, and process release events regardless of cursor position when a press was previously registered, so every `on_press` has a matching `on_release`.","locations":[{"ref":"widget/src/mouse_area.rs:343-377","code":"  343 |     if !cursor.is_over(layout.bounds()) {\n  344 |         return;\n  345 |     }\n  346 | \n  347 |     match event {\n  348 |         Event::Mouse(mouse::Event::ButtonPressed(mouse::Button::Left))\n  349 |         | Event::Touch(touch::Event::FingerPressed { .. }) => {\n  350 |             if let Some(message) = widget.on_press.as_ref() {\n  351 |                 shell.publish(message.clone());\n  352 |                 shell.capture_event();\n  353 |             }\n  354 | \n  355 |             if let Some(position) = cursor_position\n  356 |                 && let Some(message) = widget.on_double_click.as_ref()\n  357 |             {\n  358 |                 let new_click =\n  359 |                     mouse::Click::new(position, mouse::Button::Left, state.previous_click);\n  360 | \n  361 |                 if new_click.kind() == mouse::click::Kind::Double {\n  362 |                     shell.publish(message.clone());\n  363 |                 }\n  364 | \n  365 |                 state.previous_click = Some(new_click);\n  366 | \n  367 |                 // Even if this is not a double click, but the press is nevertheless\n  368 |                 // processed by us and should not be popup to parent widgets.\n  369 |                 shell.capture_event();\n  370 |             }\n  371 |         }\n  372 |         Event::Mouse(mouse::Event::ButtonReleased(mouse::Button::Left))\n  373 |         | Event::Touch(touch::Event::FingerLifted { .. }) => {\n  374 |             if let Some(message) = widget.on_release.as_ref() {\n  375 |                 shell.publish(message.clone());\n  376 |             }\n  377 |         }","lines":35}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Menu overlay positioning chooses below vs above using `space_below > space_above` and gives the menu the larger of the two as its max height, but it never accounts for the menu actually fitting. When placed above (`space_above` larger), the node is moved to `self.position - Vector::new(0.0, size.height)`. If `size.height` exceeds `space_above` (possible when `menu_height` is an explicit `Length` larger than the computed limit, or when limits are not perfectly enforced), the menu's top y becomes negative and the dropdown renders partially off the top of the viewport with no clamping. There is no clamp of the final position into the viewport.","fix":"After computing the moved node, clamp its y into `[0, bounds.height - size.height]` (or at least `>= 0`) so the menu never renders off-screen above the viewport.","locations":[{"ref":"widget/src/overlay/menu.rs:249-274","code":"  249 |     fn layout(&mut self, renderer: &Renderer, bounds: Size) -> layout::Node {\n  250 |         let space_below = bounds.height - (self.position.y + self.target_height);\n  251 |         let space_above = self.position.y;\n  252 | \n  253 |         let limits = layout::Limits::new(\n  254 |             Size::ZERO,\n  255 |             Size::new(\n  256 |                 bounds.width - self.position.x,\n  257 |                 if space_below > space_above {\n  258 |                     space_below\n  259 |                 } else {\n  260 |                     space_above\n  261 |                 },\n  262 |             ),\n  263 |         )\n  264 |         .width(self.width);\n  265 | \n  266 |         let node = self.list.layout(self.tree, renderer, &limits);\n  267 |         let size = node.size();\n  268 | \n  269 |         node.move_to(if space_below > space_above {\n  270 |             self.position + Vector::new(0.0, self.target_height)\n  271 |         } else {\n  272 |             self.position - Vector::new(0.0, size.height)\n  273 |         })\n  274 |     }","lines":26}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"State::adjacent does not exclude the queried pane from the collision search. `colliding_regions` filters all regions whose rectangle contains the probe point, then returns the first one. The probe point is offset only 1px outside the current region (e.g. `current_region.x - 1.0`). When the current region starts at the grid edge (x == 0) the Left probe is at x = -1, which is contained by no region, so `next()` returns None correctly; but for adjacency the first matching region in BTreeMap order could in principle be the pane itself if regions overlap at boundaries with spacing == 0 and rounding. More importantly, the function should explicitly skip `pane` to be robust; relying on the 1px offset and ordering is fragile.","fix":"Add `.filter(|(p, _)| **p != pane)` to the `colliding_regions` iterator so the queried pane can never be returned as its own neighbor.","locations":[{"ref":"widget/src/pane_grid/state.rs:117-121","code":"  117 |         let mut colliding_regions = regions.iter().filter(|(_, region)| region.contains(target));\n  118 | \n  119 |         let (pane, _) = colliding_regions.next()?;\n  120 | \n  121 |         Some(*pane)","lines":5}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"State::resize forwards the ratio to Node::resize without clamping to [0, 1]. The public doc for resize and for ResizeEvent.ratio states the ratio is 'a value in [0, 1]', but nothing enforces it. A caller invoking state.resize(split, 5.0) or a negative value stores an out-of-range ratio in the Node. Axis::split partially absorbs this via min/max clamping, but the value also flows into Node's Hash impl (`(ratio * 100_000.0) as u32`) and split_line_bounds, and is persisted across frames. The internal CursorMoved handler clamps, but the public API does not, so programmatic callers get inconsistent behavior.","fix":"Clamp in State::resize: `let _ = self.internal.layout.resize(split, ratio.clamp(0.0, 1.0));`","locations":[{"ref":"widget/src/pane_grid/state.rs:282-284","code":"  282 |     pub fn resize(&mut self, split: Split, ratio: f32) {\n  283 |         let _ = self.internal.layout.resize(split, ratio);\n  284 |     }","lines":3},{"ref":"widget/src/pane_grid/node.rs:203-220","code":"  203 |     pub(crate) fn resize(&mut self, split: Split, percentage: f32) -> bool {\n  204 |         match self {\n  205 |             Node::Split {\n  206 |                 id, ratio, a, b, ..\n  207 |             } => {\n  208 |                 if *id == split {\n  209 |                     *ratio = percentage;\n  210 | \n  211 |                     true\n  212 |                 } else if a.resize(split, percentage) {\n  213 |                     true\n  214 |                 } else {\n  215 |                     b.resize(split, percentage)\n  216 |                 }\n  217 |             }\n  218 |             Node::Pane(_) => false,\n  219 |         }\n  220 |     }","lines":18}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"PickList mouse-wheel selection ignores list bounds at the ends. `find_next` advances the iterator past the currently selected option and returns `options.next()`; when the selected option is the last (scrolling down) or first (scrolling up, via the reversed iterator) it returns `None` and no message is published, which is correct. However when `selected` is `Some` but not present in `options` (a selected value that is not part of the current option list - a legal state since `selected` and `options` are independent), `find_next` consumes the entire iterator looking for it, finds nothing, and `options.next()` returns `None`, so the wheel does nothing instead of selecting the first/last option. The no-selection branch handles `None` but the stale-selection case silently dead-ends.","fix":"After `find_next` returns `None` because the selected value was not found, fall back to `options.first()`/`options.last()` as in the unselected case, or detect membership explicitly before deciding.","locations":[{"ref":"widget/src/pick_list.rs:483-509","code":"  483 |                     fn find_next<'a, T: PartialEq>(\n  484 |                         selected: &'a T,\n  485 |                         mut options: impl Iterator<Item = &'a T>,\n  486 |                     ) -> Option<&'a T> {\n  487 | s:156-181","code":"  156 |         let base = self.children[self.base_layer].as_widget_mut().layout(\n  157 |             &mut tree.children[self.base_layer],\n  158 |             renderer,\n  159 |             &limits,\n  160 |         );\n  161 | \n  162 |         let size = limits.resolve(self.width, self.height, base.size());\n  163 |         let limits = layout::Limits::new(Size::ZERO, size);\n  164 | \n  165 |         let (under, above) = self.children.split_at_mut(self.base_layer);\n  166 |         let (tree_under, tree_above) = tree.children.split_at_mut(self.base_layer);\n  167 | \n  168 |         let nodes = under\n  169 |             .iter_mut()\n  170 |             .zip(tree_under)\n  171 |             .map(|(layer, tree)| layer.as_widget_mut().layout(tree, renderer, &limits))\n  172 |             .chain(std::iter::once(base))\n  173 |             .chain(\n  174 |                 above[1..]\n  175 |                     .iter_mut()\n  176 |                     .zip(&mut tree_above[1..])\n  177 |                     .map(|(layer, tree)| layer.as_widget_mut().layout(tree, renderer, &limits)),\n  178 |             )\n  179 |             .collect();\n  180 | \n  181 |         layout::Node::with_children(size, nodes)","lines":26}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Table::layout computes `width_unit`/`height_unit` by dividing by `column_factors.iter().sum()` and `total_row_factors`. When no column has a fill factor (all fixed/shrink) the divisor is 0 and `width_unit` becomes `inf`/`NaN`; same for `height_unit` when `total_row_factors == 0`. These values are only consumed inside `if width_factor != 0`/`if height_factor != 0` branches, so they are usually masked, but `height_unit` is also reachable whenever any cell has a fill height even if `total_row_factors` ended up 0, propagating NaN into cell limits and produced sizes.","fix":"Only compute the units when the corresponding factor handed the tree matches the element the tree was diffed for.","locations":[{"ref":"widget/src/transition.rs:246-287","code":"  246 |                 if is_animating || just_finished {\n  247 |                     let size = *size;\n  248 | \n  249 |                     let mut new = (self.view)(animation, *instant);\n  250 |                     tree.diff_children(&mut [new.as_widget_mut()]);\n  251 | \n  252 |                     let new_size = new.as_widget().size();\n  253 | \n  254 |                     if size != Some(new_size) {\n  255 |                         self.next_element = Some(new);\n  256 |                         shell.invalidate_layout_with(shell::Diff::Perform);\n  257 | \n  258 |                         let state = tree.state.downcast_mut::<State<P>>();\n  259 |                         state.size = Some(new_size);\n  260 |                     } else {\n  261 |                         self.element = new;\n  262 |                         self.new_layout = Some(self.element.as_widget_mut().layout(\n  263 |                             &mut tree.children[0],\n  264 |                             renderer,\n  265 |                             &self.last_limits,\n  266 |                         ));\n  267 |                     }\n  268 | \n  269 |                     shell.request_redraw();\n  270 |                 }\n  271 | \n  272 |                 if just_finished && let Some(on_finish) = &self.on_finish {\n  273 |                     shell.publish(on_finish());\n  274 |                 }\n  275 |             }\n  276 |         }\n  277 | \n  278 |         self.element.as_widget_mut().update(\n  279 |             &mut tree.children[0],\n  280 |             event,\n  281 |             self::layout(layout, &self.new_layout),\n  282 |             cursor,\n  283 |             renderer,\n  284 |             shell,\n  285 |             viewport,\n  286 |         );\n  287 |     }","lines":42}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `window_attributes`, the initial inner size is multiplied by the application `scale_factor` (`settings.size.width * scale_factor`), but the `min_size` and `max_size` constraints are passed through as plain `LogicalSize` with no `scale_factor` multiplication. The `scale_factor` argument here is the app-level scale (`program.scale_factor(id)`), and winit additionally divides logical sizes by the OS DPI. So the initial size ends up at `size * app_scale * os_dpi` physical pixels, while min/max end up at only `min * os_dpi` physical pixels. With any non-1.0 app scale factor the min/max window constraints are wrong relative to the actual content size, e.g. a window can be resized smaller than its intended minimum, or the initial size can violate the (unscaled) max. This is also inconsistent with the `SetMinSize`/`SetMaxSize`/`Resize` window actions in lib.rs, which all treat the iced `Size` as a plain logical size.","fix":"Apply the same `scale_factor` multiplication to `min_size` and `max_size` as is applied to `size` (multiply width/height by `scale_factor`), or remove the multiplication from `size` so all three are consistent with how `Resize`/`SetMinSize`/`SetMaxSize` handle sizes in lib.rs. Decide on one convention for whether the app scale factor is baked into window-attribute sizes and apply it uniformly.","locations":[{"ref":"winit/src/conversion.rs:39-74","code":"   39 |         .with_inner_size(winit::dpi::LogicalSize {\n   40 |             width: settings.size.width * scale_factor,\n   41 |             height: settings.size.height * scale_factor,\n   42 |         })\n   43 |         .with_maximized(settings.maximized)\n   44 |         .with_fullscreen(\n   45 |             settings\n   46 |                 .fullscreen\n   47 |                 .then_some(winit::window::Fullscreen::Borderless(None)),\n   48 |         )\n   49 |         .with_resizable(settings.resizable)\n   50 |         .with_enabled_buttons(buttons)\n   51 |         .with_decorations(settings.decorations)\n   52 |         .with_transparent(settings.transparent)\n   53 |         .with_blur(settings.blur)\n   54 |         .with_window_icon(settings.icon.and_then(icon))\n   55 |         .with_window_level(window_level(settings.level))\n   56 |         .with_visible(settings.visible);\n   57 | \n   58 |     if let Some(position) = position(primary_monitor.as_ref(), settings.size, settings.position) {\n   59 |         attributes = attributes.with_position(position);\n   60 |     }\n   61 | \n   62 |     if let Some(min_size) = settings.min_size {\n   63 |         attributes = attributes.with_min_inner_size(winit::dpi::LogicalSize {\n   64 |             width: min_size.width,\n   65 |             height: min_size.height,\n   66 |         });\n   67 |     }\n   68 | \n   69 |     if let Some(max_size) = settings.max_size {\n   70 |         attributes = attributes.with_max_inner_size(winit::dpi::LogicalSize {\n   71 |             width: max_size.width,\n   72 |             height: max_size.height,\n   73 |         });\n   74 |     }","lines":36}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Daemon-exit detection on `Destroyed` is gated on `window_manager.is_empty()`, but the window\nis removed from the manager during `window::Action::Close` (run_action -> `window_manager.remove`),\nwhich happens *before* winit emits the `Destroyed` event. By the time `Destroyed` arrives the\nmanager may already be empty for the last window, so the branch can fire correctly - but if a\nnew window opened in between (is_window_opening toggling), or if the platform delivers\n`Destroyed` for a window that was never registered, `get_mut_alias` below returns `None` and the\nevent is silently dropped. More importantly, the only path that sends `Control::Exit` here is\nthis narrow condition; if `Destroyed` is coalesced/dropped by the platform the app can hang with\nno windows and never exit. Relying on the OS `Destroyed` event (rather than the post-close\nempty-manager check) for the final exit is fragile.","fix":"Trigger the daemon-exit check from the place that actually removes the last window (the `window::Action::Close` handler already detects `window_manager.is_empty()`), rather than depending on the OS `Destroyed` event, so exit is deterministic regardless of platform event delivery.","locations":[{"ref":"winit/src/lib.rs:998-1008","code":"  998 |                         if !is_daemon\n  999 |                             && matches!(window_event, winit::event::WindowEvent::Destroyed)\n 1000 |                             && !is_window_opening\n 1001 |                             && window_manager.is_empty()\n 1002 |                         {\n 1003 |                             control_sender\n 1004 |                                 .start_send(Control::Exit)\n 1005 |                                 .expect(\"Send control action\");\n 1006 | \n 1007 |                             continue;\n 1008 |                         }","lines":11}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Scale-factor math composes the OS scale factor with the program-provided scale factor by\nmultiplication, but never guards against a zero (or non-finite) program scale factor.\n`State::new` and `State::update`/`synchronize` all compute the viewport scale as\n`window.scale_factor() * scale_factor`. If `program.scale_factor(id)` returns 0.0 (a value a\nprogram is free to return), the viewport scale becomes 0, and downstream\n`logical_size = physical_size / scale_factor` produces infinities/NaN, and\n`conversion::cursor_position` divides by zero. There is no clamp on the user-supplied factor.","fix":"Clamp the program scale factor to a sane strictly-positive range (e.g. `scale_factor.max(f32::MIN_POSITIVE)` or a documented minimum) before multiplying it into the viewport scale, in all three sites (new/update/synchronize).","locations":[{"ref":"winit/src/window/state.rs:62-68","code":"   62 |         let viewport = {\n   63 |             let physical_size = window.inner_size();\n   64 | \n   65 |             Viewport::with_physical_size(\n   66 |                 Size::new(physical_size.width, physical_size.height),\n   67 |                 window.scale_factor() as f32 * scale_factor,\n   68 |             )","lines":7},{"ref":"winit/src/window/state.rs:139-154","code":"  139 |                 self.viewport = Viewport::with_physical_size(\n  140 |                     size,\n  141 |                     window.scale_factor() as f32 * self.scale_factor,\n  142 |                 );\n  143 |                 self.surface_version += 1;\n  144 |             }\n  145 |             WindowEvent::ScaleFactorChanged {\n  146 |                 scale_factor: new_scale_factor,\n  147 |                 ..\n  148 |             } => {\n  149 |                 let size = self.viewport.physical_size();\n  150 | \n  151 |                 self.viewport = Viewport::with_physical_size(\n  152 |                     size,\n  153 |                     *new_scale_factor as f32 * self.scale_factor,\n  154 |                 );","lines":16},{"ref":"winit/src/window/state.rs:199-206","code":"  199 |         if self.scale_factor != new_scale_factor {\n  200 |             self.viewport = Viewport::with_physical_size(\n  201 |                 self.viewport.physical_size(),\n  202 |                 window.scale_factor() as f32 * new_scale_factor,\n  203 |             );\n  204 | \n  205 |             self.scale_factor = new_scale_factor;\n  206 |         }","lines":8}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"On `ScaleFactorChanged`, the new viewport is rebuilt from the *old* physical size\n(`self.viewport.physical_size()`) combined with the new scale factor. winit delivers\n`ScaleFactorChanged` with a writer that lets you request a new physical size, and normally a\n`Resized` follows, but the ordering and whether a Resized always arrives is platform\ndependent. Reusing the stale physical size here can leave the viewport's logical size wrong\n(physical kept constant while scale changed) until/unless a `Resized` event arrives, causing a\ntransient mislayout on monitor/DPI changes. The handler also ignores the new inner size winit\nprovides alongside the event.","fix":"Read the window's current `inner_size()` (or the size winit provides with the ScaleFactorChanged callback) when rebuilding the viewport, rather than reusing `self.viewport.physical_size()`, so logical and physical sizes stay consistent across the DPI change.","locations":[{"ref":"winit/src/window/state.rs:145-156","code":"  145 |             WindowEvent::ScaleFactorChanged {\n  146 |                 scale_factor: new_scale_factor,\n  147 |                 ..\n  148 |             } => {\n  149 |                 let size = self.viewport.physical_size();\n  150 | \n  151 |                 self.viewport = Viewport::with_physical_size(\n  152 |                     size,\n  153 |                     *new_scale_factor as f32 * self.scale_factor,\n  154 |                 );\n  155 |                 self.surface_version += 1;\n  156 |             }","lines":12}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the client receive task, a `Command::RewindTo`/`GoLive` received while `!metadata.can_time_travel` is dropped with `continue`. However `metadata` is moved into the spawned task and `can_time_travel` is fixed at connection time; if the application's time-travel capability could ever change at runtime this stale copy would be wrong. More importantly, on the server side `RewindTo`/`GoLive` are forwarded regardless of capability (no symmetric guard), so the guard exists only on the client. The asymmetry means capability filtering relies entirely on the client, which is fine today but is an undocumented coupling.","fix":"Document that capability filtering is client-side only, or filter on the server where capability is authoritative, to avoid divergence.","locations":[{"ref":"beacon/src/client.rs:159-166","code":"  159 |                                     match command {\n  160 |                                         Command::RewindTo { .. } | Command::GoLive\n  161 |                                             if !metadata.can_time_travel =>\n  162 |                                         {\n  163 |                                             continue;\n  164 |                                         }\n  165 |                                         _ => {}\n  166 |                                     }","lines":8}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Radians::Mul for Radians` multiplies two angles producing `Radians(a*b)`. Multiplying two\nangles together is dimensionally meaningless (radians*radians is not radians) and is a likely\ncopy-paste from the scalar Mul impls. If any caller relies on it they almost certainly have a\nbug; at minimum it is a surprising operator to expose.","fix":"Remove the `Mul<Radians> for Radians` impl (keep only scalar multiplication), or rename the operation if a real use exists.","locations":[{"ref":"core/src/angle.rs:206-212","code":"  206 | impl Mul for Radians {\n  207 |     type Output = Self;\n  208 | \n  209 |     fn mul(self, rhs: Radians) -> Self::Output {\n  210 |         Radians(self.0 * rhs.0)\n  211 |     }\n  212 | }","lines":7}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Clipboard::merge` resolves the single `write` slot with `self.write = other.write.take().or(self.write.take());`. This gives precedence to the OTHER clipboard's write over self's. In `Shell::merge`, the merge is used for composing child shells into a parent; preferring the child's (other's) clipboard write may silently discard a write already requested by the parent before merging in child results. Whether parent-wins or child-wins is intended is undocumented; the asymmetry can cause a parent's clipboard write to be dropped when a child also writes. At minimum this last-writer-wins-by-side behavior should be documented, as only one write can survive a merge.","fix":"Document the precedence explicitly, or make it deterministic/intentional (e.g. keep self's write if present: `self.write = self.write.take().or(other.write.take());`). Confirm which side should win for nested shells.","locations":[{"ref":"core/src/clipboard.rs:25-28","code":"   25 |     pub fn merge(&mut self, other: &mut Self) {\n   26 |         self.reads.append(&mut other.reads);\n   27 |         self.write = other.write.take().or(self.write.take());\n   28 |     }","lines":4}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Color::from_linear_rgba` does not clamp the gamma-encoded result, and the public constructor\n`new` only `debug_assert!`s the range (no runtime clamp in release). Callers like `mix` feed\nsums that can slightly exceed 1.0 due to float error, and `from_oklch` clamps its *linear*\ninputs but `from_linear_rgba`'s gamma curve `1.055*u^(1/2.4) - 0.055` can still produce values\nmarginally outside [0,1]. Combined with `into_rgba8`'s unclamped cast (separate finding), out\n-of-range colors propagate silently.","fix":"Clamp the gamma_component output to [0,1], or clamp in `into_rgba8`.","locations":[{"ref":"core/src/color.rs:113-130","code":"  113 |     pub fn from_linear_rgba(r: f32, g: f32, b: f32, a: f32) -> Self {\n  114 |         // As described in:\n  115 |         // https://en.wikipedia.org/wiki/SRGB\n  116 |         fn gamma_component(u: f32) -> f32 {\n  117 |             if u < 0.0031308 {\n  118 |                 12.92 * u\n  119 |             } else {\n  120 |                 1.055 * u.powf(1.0 / 2.4) - 0.055\n  121 |             }\n  122 |         }\n  123 | \n  124 |         Self::new(\n  125 |             gamma_component(r),\n  126 |             gamma_component(g),\n  127 |             gamma_component(b),\n  128 |             a,\n  129 |         )\n  130 |     }","lines":18},{"ref":"core/src/color.rs:60-75","code":"   60 |     const fn new(r: f32, g: f32, b: f32, a: f32) -> Color {\n   61 |         debug_assert!(\n   62 |             r >= 0.0 && r <= 1.0,\n   63 |             \"Red component must be in [0, 1] range.\"\n   64 |         );\n   65 |         debug_assert!(\n   66 |             g >= 0.0 && g <= 1.0,\n   67 |             \"Green component must be in [0, 1] range.\"\n   68 |         );\n   69 |         debug_assert!(\n   70 |             b >= 0.0 && b <= 1.0,\n   71 |             \"Blue component must be in [0, 1] range.\"\n   72 |         );\n   73 | \n   74 |         Self { r, g, b, a }\n   75 |     }","lines":16}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Color::mix` blends straight (non-premultiplied) alpha: it linearizes the RGB channels and\nmultiplies them by `a_amount`/`b_amount`, but the alpha channel itself is also multiplied and\nsummed as if it were a color component, and RGB are NOT premultiplied by their own alpha\nbefore mixing. The result is that mixing a fully transparent color with an opaque one bleeds\nthe transparent color's RGB into the result proportionally, which is the classic\nnon-premultiplied-alpha artifact. For pure interpolation this may be acceptable, but it is a\nsubtle correctness issue for compositing-like uses (and `Interpolable for Color` routes here).","fix":"If compositing semantics are intended, premultiply RGB by alpha before mixing and un-premultiply after; otherwise document that `mix` is a straight per-channel lerp in linear space.","locations":[{"ref":"core/src/color.rs:182-196","code":"  182 |     /// Mixes the current [`Color`] with another one by the given factor.\n  183 |     pub fn mix(self, b: Color, factor: f32) -> Color {\n  184 |         let b_amount = factor.clamp(0.0, 1.0);\n  185 |         let a_amount = 1.0 - b_amount;\n  186 | \n  187 |         let a_linear = self.into_linear().map(|c| c * a_amount);\n  188 |         let b_linear = b.into_linear().map(|c| c * b_amount);\n  189 | \n  190 |         Color::from_linear_rgba(\n  191 |             a_linear[0] + b_linear[0],\n  192 |             a_linear[1] + b_linear[1],\n  193 |             a_linear[2] + b_linear[2],\n  194 |             a_linear[3] + b_linear[3],\n  195 |         )\n  196 |     }","lines":15}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In flex::resolve third pass, when `max_main` is finite the min main is set equal to max main (lines 201-205), forcing the child to be exactly that size in the main axis with `min == max`. If `remaining` is 0 (e.g. fully consumed by fixed/compressed children) but `main_compress` is false, fill children get `max_main = 0` and `min_main = 0`, collapsing them to zero main size. This is arguably intended, but combined with `remaining = available.max(0.0)` it means an over-subscribed layout silently collapses fill children to 0 rather than overflowing - worth confirming this is the desired clamp behavior.","fix":"Confirm intended behavior of zero-remaining fill children; if overflow should be allowed, do not clamp `available` to 0 before distributing, or document the collapse.","locations":[{"ref":"core/src/layout/flex.rs:179-205","code":"  179 |     let remaining = available.max(0.0);\n  180 | \n  181 |     // THIRD PASS (conditional)\n  182 |     // We lay out the elements that are fluid in the main axis.\n  183 |     // We use the remaining space to evenly allocate space based on fill factors.\n  184 |     if !main_compress {\n  185 |         for (i, (child, tree)) in items.iter_mut().zip(trees.iter_mut()).enumerate() {\n  186 |             let (fill_main_factor, fill_cross_factor) = {\n  187 |                 let size = child.as_widget().size();\n  188 | \n  189 |                 axis.pack(size.width.fill_factor(), size.height.fill_factor())\n  190 |             };\n  191 | \n  192 |             if fill_main_factor != 0 {\n  193 |                 let max_main = remaining * fill_main_factor as f32 / fill_main_sum as f32;\n  194 | \n  195 |                 let max_main = if max_main.is_nan() {\n  196 |                     f32::INFINITY\n  197 |                 } else {\n  198 |                     max_main\n  199 |                 };\n  200 | \n  201 |                 let min_main = if max_main.is_infinite() {\n  202 |                     0.0\n  203 |                 } else {\n  204 |                     max_main\n  205 |                 };","lines":27}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Limits::shrink subtracts the shrink size from BOTH min and max but clamps each independently to 0. If `min` originally exceeded the post-shrink `max` (possible when shrinking by an amount between max and min, which cannot happen normally since min<=max, but min/max can both be clamped to 0), the resulting Limits can momentarily have min > max only in pathological cases. More concretely: shrink does not re-establish the `min <= max` invariant that the `width()/height()/min_*/max_*` builders carefully maintain via `.min()/.max()` chaining. Inconsistent invariant maintenance across the API.","fix":"After computing min/max in shrink, clamp `min = min.min(max)` per axis to preserve the min <= max invariant maintained elsewhere.","locations":[{"ref":"core/src/layout/limits.rs:116-135","code":"  116 |     /// Shrinks the current [`Limits`] by the given [`Size`].\n  117 |     pub fn shrink(&self, size: impl Into<Size>) -> Limits {\n  118 |         let size = size.into();\n  119 | \n  120 |         let min = Size::new(\n  121 |             (self.min().width - size.width).max(0.0),\n  122 |             (self.min().height - size.height).max(0.0),\n  123 |         );\n  124 | \n  125 |         let max = Size::new(\n  126 |             (self.max().width - size.width).max(0.0),\n  127 |             (self.max().height - size.height).max(0.0),\n  128 |         );\n  129 | \n  130 |         Limits {\n  131 |             min,\n  132 |             max,\n  133 |             compression: self.compression,\n  134 |         }\n  135 |     }","lines":20}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Kind::next maps `Triple => Double`, so a sustained sequence of fast clicks cycles Single, Double, Triple, Double, Triple, ... A 4th consecutive click is reported as Double again. Widgets like text_input/text_editor map Double => select-word and Triple => select-line, so holding-and-clicking repeatedly toggles between word- and line-selection rather than behaving predictably. Whether this cycling is intended is undocumented and surprising.","fix":"Decide and document the intended behavior. If clicks beyond triple should clamp, map `Triple => Triple`; if they should restart, map `Triple => Single`. Add a comment explaining the chosen semantics.","locations":[{"ref":"core/src/mouse/click.rs:30-38","code":"   30 | impl Kind {\n   31 |     fn next(self) -> Kind {\n   32 |         match self {\n   33 |             Kind::Single => Kind::Double,\n   34 |             Kind::Double => Kind::Triple,\n   35 |             Kind::Triple => Kind::Double,\n   36 |         }\n   37 |     }\n   38 | }","lines":9}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Click::is_consecutive returns `false` whenever `time <= self.time` (the `duration` is `None` and `.unwrap_or(false)` is used). web_time::Instant is monotonic but two events processed in the same tick can yield equal instants; an equal timestamp is clearly within the double-click window yet is treated as non-consecutive, occasionally dropping a legitimate double/triple click. The branch exists only to avoid a panic on `time - self.time` when `time < self.time`, which is essentially impossible for a monotonic clock obtained after `self.time`.","fix":"Use `time.saturating_duration_since(self.time)` (or `time.duration_since(self.time).unwrap_or_default()`) and compare `<= 300`ms directly, so equal timestamps count as consecutive.","locations":[{"ref":"core/src/mouse/click.rs:74-85","code":"   74 |     fn is_consecutive(&self, new_position: Point, time: Instant) -> bool {\n   75 |         let duration = if time > self.time {\n   76 |             Some(time - self.time)\n   77 |         } else {\n   78 |             None\n   79 |         };\n   80 | \n   81 |         self.position.distance(new_position) < 6.0\n   82 |             && duration\n   83 |                 .map(|duration| duration.as_millis() <= 300)\n   84 |                 .unwrap_or(false)\n   85 |     }","lines":12}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Group::index returns only the index of the FIRST child after sorting. Since children are sorted ascending by index in `with_children`, `first()` yields the LOWEST index. The doc on Overlay::index says higher index renders on top; a Group reporting its minimum child index means a Group is ordered relative to sibling overlays by its least-significant member, which can cause a Group containing a high-index overlay to be placed below an unrelated overlay that should be beneath it. Using the max (or last) child index would better reflect the group's top-most layer.","fix":"Return `self.children.last()` index (the maximum after the ascending sort) if the intent is for the group to sort by its top-most member, or document explicitly why the minimum is used.","locations":[{"ref":"core/src/overlay/group.rs:152-157","code":"  152 |     fn index(&self) -> f32 {\n  153 |         self.children\n  154 |             .first()\n  155 |             .map(|child| child.as_overlay().index())\n  156 |             .unwrap_or(1.0)\n  157 |     }","lines":6}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In Nested::mouse_interaction recurse, when an element HAS a nested overlay (overlay() returns Some) and a corresponding layout child exists, the parent overlay's own `mouse_interaction` is NOT consulted at all - the result is solely the nested recursion (`and_then(recurse)`). If the nested recursion returns a layout child but the inner overlay reports `Interaction::None` while the parent (the surface under the nested popup) would report something meaningful, the parent's interaction is lost. This differs from draw/update which still draw/update the parent. Likely intentional (topmost wins) but inconsistent with update's `nested_is_over` fallback that still updates the parent.","fix":"Confirm intended precedence; if the parent should contribute when the nested overlay reports None, fall back to `overlay.mouse_interaction(layout, ...)` instead of returning the nested result unconditionally.","locations":[{"ref":"core/src/overlay/nested.rs:241-249","code":"  241 |             Some(\n  242 |                 overlay\n  243 |                     .overlay(layout, renderer)\n  244 |                     .zip(layouts.next())\n  245 |                     .and_then(|(mut overlay, layout)| {\n  246 |                         recurse(&mut overlay, layout, cursor, renderer)\n  247 |                     })\n  248 |                     .unwrap_or_else(|| overlay.mouse_interaction(layout, cursor, renderer)),\n  249 |             )","lines":9}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`From<text::Alignment> for alignment::Horizontal` collapses `Alignment::Justified` to `Horizontal::Left`. Round-tripping (`Horizontal -> Alignment -> Horizontal`) is fine, but converting a justified paragraph alignment into a horizontal alignment silently loses the justification intent and treats it as left-aligned. Any code path that downgrades `Alignment` to `Horizontal` for layout purposes will render justified text as left-aligned with no warning.","fix":"This may be acceptable as a lossy conversion, but it should be documented on the `From` impl that `Justified` degrades to `Left`. If possible, avoid converting `Alignment` to `Horizontal` in layout paths that need to honor justification.","locations":[{"ref":"core/src/text.rs:133-143","code":"  133 | impl From<Alignment> for alignment::Horizontal {\n  134 |     fn from(alignment: Alignment) -> Self {\n  135 |         match alignment {\n  136 |             Alignment::Default | Alignment::Left | Alignment::Justified => {\n  137 |                 alignment::Horizontal::Left\n  138 |             }\n  139 |             Alignment::Center => alignment::Horizontal::Center,\n  140 |             Alignment::Right => alignment::Horizontal::Right,\n  141 |         }\n  142 |     }\n  143 | }","lines":11}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Plain::update` rebuilds the raw paragraph and copies content whenever `self.content != text.content`, but it returns `true` (changed) only after also handling `Difference`. When content is equal it still calls `compare`; the `Difference::Bounds` branch resizes and returns true, which is correct. However the content-equality fast path uses string comparison on every layout pass even when nothing changed - for large editor/label contents this is an O(n) `String` comparison in a layout hot path on every frame where layout runs. Not incorrect, but a recurring cost.","fix":"Consider caching a cheap content hash/length alongside `content` and comparing that first, falling back to full string comparison only on hash collision, to avoid full-length `String` comparison on every layout pass for unchanged large content.","locations":[{"ref":"core/src/text/paragraph.rs:106-124","code":"  106 |     pub fn update(&mut self, text: Text<&str, P::Font>) -> bool {\n  107 |         if self.content != text.content {\n  108 |             text.content.clone_into(&mut self.content);\n  109 |             self.raw = P::with_text(text);\n  110 |             return true;\n  111 |         }\n  112 | \n  113 |         match self.raw.compare(text.with_content(())) {\n  114 |             Difference::None => false,\n  115 |             Difference::Bounds => {\n  116 |                 self.raw.resize(text.bounds);\n  117 |                 true\n  118 |             }\n  119 |             Difference::Shape => {\n  120 |                 self.raw = P::with_text(text);\n  121 |                 true\n  122 |             }\n  123 |         }\n  124 |     }","lines":19}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Outcome::Chain` produced by `black_box`'s `finish` always returns `Outcome::None` (line 182-184), discarding any chained or some outcome from the wrapped operation. While `black_box` is intended to erase the return type `T` into `O` (which it cannot meaningfully convert), silently dropping a `Chain` means a chained follow-up operation set up inside a black-boxed operation will never run. This can cause multi-step operations to silently stop after being black-boxed (e.g. via `then`/`Chain::traverse` at line 347-351 which wraps children in `black_box`).","fix":"Document that black-boxing erases and drops outcomes/chains, and ensure `then`/chained operations do not rely on nested chained outcomes surviving a black-box. If chains must survive, thread them through instead of returning `Outcome::None`.","locations":[{"ref":"core/src/widget/operation.rs:182-184","code":"  182 |         fn finish(&self) -> Outcome<O> {\n  183 |             Outcome::None\n  184 |         }","lines":3},{"ref":"core/src/widget/operation.rs:347-351","code":"  347 |         fn traverse(&mut self, operate: &mut dyn FnMut(&mut dyn Operation<B>)) {\n  348 |             self.operation.traverse(&mut |operation| {\n  349 |                 operate(&mut black_box(operation));\n  350 |             });\n  351 |         }","lines":5}]},{"id":"LOGIC_62","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ScopedOperation::traverse` resets `self.current = None` after handling traversal, and `container` sets `self.current = id.cloned()`. The scoping relies on `container` being invoked immediately before `traverse` for the same widget. If a container widget reports its id via `container` but then does NOT call back into `traverse` for that frame (or the order of `container`/`traverse` calls differs across widget implementations), the scope target match at line 412 silently fails and the operation never reaches the scoped children. This couples correctness to an implicit call-ordering contract between `container` and `traverse` that is not documented on the `Operation` trait.","fix":"Document the required `container`-then-`traverse` ordering on the `Operation` trait, or make `scope` robust to ordering by matching on the id passed through traversal rather than relying on mutable `current` state.","locations":[{"ref":"core/src/widget/operation.rs:410-423","code":"  410 |     impl<Message: 'static> Operation<Message> for ScopedOperation<Message> {\n  411 |         fn traverse(&mut self, operate: &mut dyn FnMut(&mut dyn Operation<Message>)) {\n  412 |             if self.current.as_ref() == Some(&self.target) {\n  413 |                 self.operation.as_mut().traverse(operate);\n  414 |             } else {\n  415 |                 operate(self);\n  416 |             }\n  417 | \n  418 |             self.current = None;\n  419 |         }\n  420 | \n  421 |         fn container(&mut self, id: Option<&Id>, _bounds: Rectangle) {\n  422 |             self.current = id.cloned();\n  423 |         }","lines":14}]},{"id":"LOGIC_63","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`focus_next` does not guard against an empty focusable set or handle the wrap-around explicitly, unlike `focus_previous` which has an explicit `if self.count.total == 0 { return; }` guard. While `focusable` is only called per focusable widget (so `total == 0` means it is never called), the inconsistency between the two functions is a latent maintenance hazard: a future change that calls `focusable` with derived counts could underflow or misbehave in `focus_next` where the guard is absent.","fix":"Add the same `if self.count.total == 0 { return; }` guard to `focus_next` for symmetry and safety.","locations":[{"ref":"core/src/widget/operation/focusable.rs:151-161","code":"  151 |     impl<T> Operation<T> for FocusNext {\n  152 |         fn focusable(&mut self, _id: Option<&Id>, _bounds: Rectangle, state: &mut dyn Focusable) {\n  153 |             match self.count.focused {\n  154 |                 None if self.current == 0 => state.focus(),\n  155 |                 Some(focused) if focused == self.current => state.unfocus(),\n  156 |                 Some(focused) if focused + 1 == self.current => state.focus(),\n  157 |                 _ => {}\n  158 |             }\n  159 | \n  160 |             self.current += 1;\n  161 |         }","lines":11}]},{"id":"LOGIC_64","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`update` truncation mixes byte length with char count: the guard is `message.len() > 49` (byte length) but truncation uses `message.chars().take(49)` (49 chars). For multi-byte UTF-8 messages whose byte length exceeds 49 but whose char count is <= 49, the whole string is kept while the guard claims it was too long; conversely the appended \"...\" is added based on a byte-length test. Not a panic (chars() is UTF-8-safe), but the truncation length is inconsistent and can produce surprising results for non-ASCII messages.","fix":"Decide on one unit. Use char count consistently, e.g. `if message.chars().count() > 49`, or truncate on a char boundary computed from a byte budget.","locations":[{"ref":"debug/src/lib.rs:208-216","code":"  208 |         let message = if message.len() > 49 {\n  209 |             message\n  210 |                 .chars()\n  211 |                 .take(49)\n  212 |                 .chain(\"...\".chars())\n  213 |                 .collect::<String>()\n  214 |         } else {\n  215 |             message\n  216 |         };","lines":9}]},{"id":"LOGIC_65","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`crate::Cache::state()` performs a global-version check and, on mismatch, resets the state to `Empty { previous: None }` - discarding the previously cached value that `clear()` is careful to preserve in `previous`. After a global `invalidate_all()`, the next `state()` call drops the prior geometry entirely (no `previous` retained), so backends that rely on diffing against the previous cache (the whole point of `Cached::cache(.., previous)`) lose their reuse base and must fully reallocate. `clear()` keeps `previous`; the version-reset path does not, an inconsistency.","fix":"On version mismatch, preserve the current value as `previous` the same way `clear()` does (move `Filled.current` into `Empty.previous`) instead of unconditionally setting `previous: None`.","locations":[{"ref":"graphics/src/cache.rs:62-71","code":"   62 |     pub fn state(&self) -> &RefCell<State<T>> {\n   63 |         let version = VERSION.load(atomic::Ordering::Relaxed);\n   64 | \n   65 |         if *self.version.borrow() != version {\n   66 |             *self.state.borrow_mut() = State::Empty { previous: None };\n   67 |             let _ = self.version.replace(version);\n   68 |         }\n   69 | \n   70 |         &self.state\n   71 |     }","lines":10}]},{"id":"LOGIC_66","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Path::circle` builds the circle via `p.circle(center, radius)` and then calls `p.close()`. But `Builder::circle` already emits a full 2*PI ellipse via `arc`, which returns to the start point; the extra `close()` (and the fact that `ellipse` issues its own `move_to`) can create a degenerate zero-length closing segment / extra sub-path boundary. `Builder::circle` itself does not close, while `Path::circle` does, so the two \"circle\" entry points produce subtly different paths.","fix":"Make the two paths consistent: either have `Builder::circle` close the sub-path and drop the redundant `close()` in `Path::circle`, or document why `Path::circle` adds it. Verify no zero-length degenerate segment is produced.","locations":[{"ref":"graphics/src/geometry/path.rs:59-64","code":"   59 |     pub fn circle(center: Point, radius: f32) -> Self {\n   60 |         Self::new(|p| {\n   61 |             p.circle(center, radius);\n   62 |             p.close();\n   63 |         })\n   64 |     }","lines":6},{"ref":"graphics/src/geometry/path/builder.rs:222-230","code":"  222 |     #[inline]\n  223 |     pub fn circle(&mut self, center: Point, radius: f32) {\n  224 |         self.arc(Arc {\n  225 |             center,\n  226 |             radius,\n  227 |             start_angle: Radians(0.0),\n  228 |             end_angle: Radians(2.0 * std::f32::consts::PI),\n  229 |         });\n  230 |     }","lines":9}]},{"id":"LOGIC_67","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`stroke::LineDash::offset` is typed `usize`, but a dash offset conceptually selects a position (distance) along the dash pattern and is fractional/length-based in every canvas/SVG dash model. As a `usize` it can only be a whole index, which both mismatches the SVG/HTML5 `dashOffset` semantics and silently truncates any length-based offset a backend tries to map onto it. At minimum it is a misleading type for the documented \"offset of segments to start the pattern\".","fix":"Either change the field to `f32` (a length offset, matching SVG `stroke-dashoffset`) or tighten the doc to state it is an index into `segments`, whichever matches the backend's actual interpretation.","locations":[{"ref":"graphics/src/geometry/stroke.rs:96-97","code":"   96 |     /// The offset of [`LineDash::segments`] to start the pattern.\n   97 |     pub offset: usize,","lines":2}]},{"id":"LOGIC_68","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `gradient::pack` (and `Linear::pack`) empty stop slots are encoded with offset sentinel `f16::from_f32(2.0)` but their *color* is packed as `Color::default()` (transparent black) at offset 2.0. If a shader ever fails to treat the 2.0 sentinel as \"absent\" and instead interpolates toward it, an unused trailing slot injects a phantom transparent-black stop just past the end of the gradient. This couples the CPU packing to an undocumented shader-side convention; nothing in this file asserts or documents that 2.0 means \"ignore\".","fix":"Document the >1.0 offset sentinel contract here (a terse comment) and/or also zero the color for empty slots so a mis-handling shader degrades gracefully.","locations":[{"ref":"graphics/src/gradient.rs:99-107","code":"   99 |             let [r, g, b, a] = color::pack(stop.map_or(Color::default(), |s| s.color)).components();\n  100 | \n  101 |             colors[index] = [\n  102 |                 pack_f16s([f16::from_f32(r), f16::from_f32(g)]),\n  103 |                 pack_f16s([f16::from_f32(b), f16::from_f32(a)]),\n  104 |             ];\n  105 | \n  106 |             offsets[index] = stop.map_or(f16::from_f32(2.0), |s| f16::from_f32(s.offset));\n  107 |         }","lines":9},{"ref":"graphics/src/gradient.rs:145-153","code":"  145 |                 let [r, g, b, a] =\n  146 |                     color::pack(stop.map_or(Color::default(), |s| s.color)).components();\n  147 | \n  148 |                 colors[index] = [\n  149 |                     pack_f16s([f16::from_f32(r), f16::from_f32(g)]),\n  150 |                     pack_f16s([f16::from_f32(b), f16::from_f32(a)]),\n  151 |                 ];\n  152 | \n  153 |                 offsets[index] = stop.map_or(f16::from_f32(2.0), |s| f16::from_f32(s.offset));","lines":9}]},{"id":"LOGIC_69","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"EXIF orientation handling builds the `Operation` bitflags from EXIF value 5 and 7 as combinations (`ROTATE_90 | FLIP_HORIZONTALLY`, etc.) but `perform` applies the component operations in a fixed order (rotate90, rotate180, rotate270, flip_vertical, flip_horizontal). For the combined orientations (values 5 and 7) the standard transform is a transpose/transverse, which is rotate-then-flip; applying flip after rotate in this fixed sequence can yield the wrong final orientation for those two EXIF cases. Only affects images with EXIF orientation 5 or 7 (relatively rare).","fix":"Verify orientations 5 and 7 against reference images; if wrong, encode transpose/transverse explicitly (rotate90 + horizontal flip in the documented order) rather than relying on the generic apply-order in `perform`.","locations":[{"ref":"graphics/src/image.rs:72-110","code":"   72 |                 .map(|value| match value {\n   73 |                     1 => Operation::empty(),\n   74 |                     2 => Operation::FLIP_HORIZONTALLY,\n   75 |                     3 => Operation::ROTATE_180,\n   76 |                     4 => Operation::FLIP_VERTICALLY,\n   77 |                     5 => Operation::ROTATE_90 | Operation::FLIP_HORIZONTALLY,\n   78 |                     6 => Operation::ROTATE_90,\n   79 |                     7 => Operation::ROTATE_90 | Operation::FLIP_VERTICALLY,\n   80 |                     8 => Operation::ROTATE_270,\n   81 |                     _ => Operation::empty(),\n   82 |                 })\n   83 |                 .unwrap_or_else(Self::empty))\n   84 |         }\n   85 | \n   86 |         fn perform(self, mut image: ::image::DynamicImage) -> ::image::DynamicImage {\n   87 |             use ::image::imageops;\n   88 | \n   89 |             if self.contains(Operation::ROTATE_90) {\n   90 |                 image = imageops::rotate90(&image).into();\n   91 |             }\n   92 | \n   93 |             if self.contains(Self::ROTATE_180) {\n   94 |                 imageops::rotate180_in_place(&mut image);\n   95 |             }\n   96 | \n   97 |             if self.contains(Operation::ROTATE_270) {\n   98 |                 image = imageops::rotate270(&image).into();\n   99 |             }\n  100 | \n  101 |             if self.contains(Self::FLIP_VERTICALLY) {\n  102 |                 imageops::flip_vertical_in_place(&mut image);\n  103 |             }\n  104 | \n  105 |             if self.contains(Self::FLIP_HORIZONTALLY) {\n  106 |                 imageops::flip_horizontal_in_place(&mut image);\n  107 |             }\n  108 | \n  109 |             image\n  110 |         }","lines":39}]},{"id":"LOGIC_70","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Stack::reset` resets `self.previous` but does not reset `self.transformations`. If a draw pass ends with unbalanced transformation pushes (more pushes than pops), the leftover transformations persist across `reset` into the next frame, applying a stale transform to subsequent drawing. `previous` and `current`/`active_count` are reset, but the transformation stack is left untouched.","fix":"In `reset`, also restore the transformation stack to its base, e.g. `self.transformations.truncate(1);` (keeping the IDENTITY base) so stale transforms cannot leak between frames.","locations":[{"ref":"graphics/src/layer.rs:205-214","code":"  205 |     pub fn reset(&mut self, new_bounds: Rectangle) {\n  206 |         for layer in self.layers[..self.active_count].iter_mut() {\n  207 |             layer.reset();\n  208 |         }\n  209 | \n  210 |         self.layers[0].resize(new_bounds);\n  211 |         self.current = 0;\n  212 |         self.active_count = 1;\n  213 |         self.previous.clear();\n  214 |     }","lines":10}]},{"id":"LOGIC_71","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`FontSystem::load_font` only dedups fonts loaded from `Cow::Borrowed` slices (by pointer\naddress). Owned byte buffers (`Cow::Owned`) skip the `loaded_fonts` check entirely, so loading\nthe same owned font bytes repeatedly re-registers the face in the fontdb each time and bumps the\nversion on every call, forcing a full reshape of every paragraph/editor (they compare against\n`font_system.version()`). Repeatedly loading the same owned font therefore causes unbounded\nfontdb growth and spurious global reshapes.","fix":"Dedup owned bytes too (e.g. hash the contents, or store loaded font face ids) so re-loading\nidentical bytes is a no-op and does not bump the version.","locations":[{"ref":"graphics/src/text.rs:175-192","code":"  175 |     pub fn load_font(&mut self, bytes: Cow<'static, [u8]>) {\n  176 |         if let Cow::Borrowed(bytes) = bytes {\n  177 |             let address = bytes.as_ptr() as usize;\n  178 | \n  179 |             if !self.loaded_fonts.insert(address) {\n  180 |                 return;\n  181 |             }\n  182 |         }\n  183 | \n  184 |         let _ = self\n  185 |             .raw\n  186 |             .db_mut()\n  187 |             .load_font_source(cosmic_text::fontdb::Source::Binary(Arc::new(\n  188 |                 bytes.into_owned(),\n  189 |             )));\n  190 | \n  191 |         self.version = Version(self.version.0 + 1);\n  192 |     }","lines":18}]},{"id":"LOGIC_72","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `text::measure`, `width` is
