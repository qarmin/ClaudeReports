<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`diff_children_custom_with_search` can panic with an out-of-bounds range when shrinking the children list. On the shrink path, `difference_index` is computed by searching `(1..current_children.len())` for the first index where `maybe_changed(i)` is true. The splice range is then `difference_index..difference_index + (current_children.len() - new_children.len())`. If the first changed index is found late in the list, `difference_index + delta` can exceed `current_children.len()`, and `Vec::splice` panics because the range end is past the vector length. Example: current len = 5, new len = 2 (delta = 3), and `maybe_changed` first true at index 4 gives range `4..7` over a vec of length 5 -> panic. The grow path has the analogous problem indexing into `new_children[difference_index..difference_index + (new_children.len() - current_children.len())]`, which slices past `new_children.len()` and panics.","fix":"Clamp the splice/slice ranges to the available length, or anchor the removal/insertion at the end when the change is near the tail. For removal use `let end = (difference_index + delta).min(current_children.len()); current_children.splice(difference_index..end, std::iter::empty());` and adjust `difference_index` so exactly `delta` elements are removed. For the grow path similarly clamp the slice end to `new_children.len()`. Ideally rework this heuristic to guarantee the removed/inserted count always equals the length delta.","locations":[{"ref":"core/src/widget/tree.rs:138-180","code":"  138 |     if current_children.len() > new_children.len() {\n  139 |         if !first_maybe_changed && last_maybe_changed {\n  140 |             current_children.truncate(new_children.len());\n  141 |         } else {\n  142 |             let difference_index = if first_maybe_changed {\n  143 |                 0\n  144 |             } else {\n  145 |                 (1..current_children.len())\n  146 |                     .find(|&i| maybe_changed(i))\n  147 |                     .unwrap_or(0)\n  148 |             };\n  149 | \n  150 |             let _ = current_children.splice(\n  151 |                 difference_index..difference_index + (current_children.len() - new_children.len()),\n  152 |                 std::iter::empty(),\n  153 |             );\n  154 |         }\n  155 |     }\n  156 | \n  157 |     if current_children.len() < new_children.len() {\n  158 |         let first_maybe_changed = maybe_changed(0);\n  159 |         let last_maybe_changed = maybe_changed(current_children.len() - 1);\n  160 | \n  161 |         if !first_maybe_changed && last_maybe_changed {\n  162 |             current_children.extend(new_children[current_children.len()..].iter().map(new_state));\n  163 |         } else {\n  164 |             let difference_index = if first_maybe_changed {\n  165 |                 0\n  166 |             } else {\n  167 |                 (1..current_children.len())\n  168 |                     .find(|&i| maybe_changed(i))\n  169 |                     .unwrap_or(0)\n  170 |             };\n  171 | \n  172 |             let _ = current_children.splice(\n  173 |                 difference_index..difference_index,\n  174 |                 new_children[difference_index\n  175 |                     ..difference_index + (new_children.len() - current_children.len())]\n  176 |                     .iter()\n  177 |                     .map(new_state),\n  178 |             );\n  179 |         }\n  180 |     }","lines":43}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Cache::allocate panics on a previously-failed image. When graphics::image::load fails, the entry is cached as Some(None) (Option<Entry> = None). On a later call the `if let Vacant` branch is skipped, so no Err is returned; execution falls through to `.expect(\"Image should be allocated\")`, which panics because the cached Entry is None. Any image that fails to decode once and is then requested again (via Renderer::load_image / measure_image / allocate_image) crashes the whole renderer. Note draw() avoids this only because it discards the error with `let Ok(..) else { return }` before reaching the panic, but the panic still happens inside allocate() itself before it can return Err.","fix":"After the Vacant check, look up the entry and if it is None return Err(raster::Error::* ) instead of unwrapping. e.g. `match self.entries.get(&id).unwrap() { Some(entry) => Ok(PixmapRef::from_bytes(...)), None => Err(raster::Error::Empty) }`. Do not use .expect on the cached Option.","locations":[{"ref":"tiny_skia/src/raster.rs:88-139","code":"   88 |     pub fn allocate(\n   89 |         &mut self,\n   90 |         handle: &raster::Handle,\n   91 |     ) -> Result<tiny_skia::PixmapRef<'_>, raster::Error> {\n   92 |         let id = handle.id();\n   93 | \n   94 |         if let hash_map::Entry::Vacant(entry) = self.entries.entry(id) {\n   95 |             let image = match graphics::image::load(handle) {\n   96 |                 Ok(image) => image,\n   97 |                 Err(error) => {\n   98 |                     let _ = entry.insert(None);\n   99 | \n  100 |                     return Err(error);\n  101 |                 }\n  102 |             };\n  103 | \n  104 |             if image.width() == 0 || image.height() == 0 {\n  105 |                 return Err(raster::Error::Empty);\n  106 |             }\n  107 | \n  108 |             let mut buffer = vec![0u32; image.width() as usize * image.height() as usize];\n  109 | \n  110 |             for (i, pixel) in image.pixels().enumerate() {\n  111 |                 let [r, g, b, a] = pixel.0;\n  112 | \n  113 |                 buffer[i] = bytemuck::cast(tiny_skia::ColorU8::from_rgba(b, g, r, a).premultiply());\n  114 |             }\n  115 | \n  116 |             let _ = entry.insert(Some(Entry {\n  117 |                 width: image.width(),\n  118 |                 height: image.height(),\n  119 |                 pixels: buffer,\n  120 |             }));\n  121 |         }\n  122 | \n  123 |         let _ = self.hits.insert(id);\n  124 | \n  125 |         Ok(self\n  126 |             .entries\n  127 |             .get(&id)\n  128 |             .unwrap()\n  129 |             .as_ref()\n  130 |             .map(|entry| {\n  131 |                 tiny_skia::PixmapRef::from_bytes(\n  132 |                     bytemuck::cast_slice(&entry.pixels),\n  133 |                     entry.width,\n  134 |                     entry.height,\n  135 |                 )\n  136 |                 .expect(\"Build pixmap from image bytes\")\n  137 |             })\n  138 |             .expect(\"Image should be allocated\"))\n  139 |     }","lines":52}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`Frame::pop_transform` unwraps the result of `self.transforms.previous.pop()`. If a canvas program calls `pop_transform` (or its public wrapper) more times than `push_transform`, this panics and takes down the whole application. Public-facing geometry APIs should not panic on caller misuse of push/pop balance; user-authored canvas code can trivially trigger this.","fix":"Use `if let Some(previous) = self.transforms.previous.pop() { self.transforms.current = previous; }` and ignore an unbalanced pop, or log a warning, instead of unwrap().","locations":[{"ref":"wgpu/src/geometry.rs:358-360","code":"  358 |     fn pop_transform(&mut self) {\n  359 |         self.transforms.current = self.transforms.previous.pop().unwrap();\n  360 |     }","lines":3}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"Table::layout divides the total cell count by the number of columns with `let rows = self.cells.len() / columns;` where `columns = self.columns.len()`. If a `Table` is created with an empty column iterator, `columns` is 0 and this is an integer division by zero, panicking at layout time. A table with no columns is a degenerate but reachable input (e.g. columns produced by a `filter`/`map` that yields nothing).","fix":"Guard against zero columns early: if `self.columns.is_empty()` return `layout::Node::new(limits.resolve(self.width, self.height, Size::ZERO))` before computing `rows`.","locations":[{"ref":"widget/src/table.rs:228-229","code":"  228 |         let columns = self.columns.len();\n  229 |         let rows = self.cells.len() / columns;","lines":2}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`process_event` unconditionally unwraps every event send with `.expect(\"Send event\")`.\nThe receiving end is the `run_instance` future. When that future completes (e.g. the\nprogram returns `Task::none`/exits, hits `Poll::Ready`, or its receiver is dropped), the\nunbounded channel becomes disconnected. Any subsequent OS event (winit can and does deliver\nevents after the app future resolves but before `event_loop.exit()` fully unwinds, or during\nshutdown on some platforms) will make `start_send` return `SendError`, and the `.expect`\nturns a benign shutdown race into a hard panic that aborts the process instead of exiting\ncleanly. A dropped receiver should be treated as \"we are shutting down, ignore the event\".","fix":"Replace `self.sender.start_send(event).expect(\"Send event\")` with a tolerant send, e.g. `if self.sender.start_send(event).is_err() { return; }`, so a closed channel during shutdown is ignored rather than panicking.","locations":[{"ref":"winit/src/lib.rs:274","code":"  274 |             self.sender.start_send(event).expect(\"Send event\");","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In Nested::draw, the `is_over` computation calls `nested_layout.children().next().unwrap()`. This assumes the nested layout always has at least one child. While the layout-building `recurse` currently always produces a node with children, this is a non-local invariant: the layout tree passed to `draw` is produced by `Nested::layout` and any divergence (e.g. an overlay whose `overlay()` returns Some during layout but the layout tree is reused/stale, or a future refactor) makes this panic. The unwrap is on a layout subtree, not the just-built node, so it is genuinely reachable if layout and draw disagree.","fix":"Replace `.unwrap()` with a graceful fallback: use `if let Some(child) = nested_layout.children().next()` and treat absence as `is_over = false`, or use `.next().map(...).unwrap_or(false)`.","locations":[{"ref":"core/src/overlay/nested.rs:82-89","code":"   82 |                         overlay.overlay(layout, renderer).map(|nested| {\n   83 |                             nested.as_overlay().mouse_interaction(\n   84 |                                 nested_layout.children().next().unwrap(),\n   85 |                                 mouse::Cursor::Available(cursor_position),\n   86 |                                 renderer,\n   87 |                             ) != mouse::Interaction::None\n   88 |                         })\n   89 |                     })","lines":8}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`arc_to` computes `inner_angle = to_start.dot(to_end).acos()`. `to_start` and `to_end` are normalized vectors, so the dot product is mathematically in [-1, 1], but floating point rounding can push it slightly outside that range (e.g. 1.0000001) for nearly-collinear input, making `acos` return NaN. The NaN then propagates through `origin_angle`, `origin_adjacent`, `arc_start`/`arc_end` and is fed into lyon as NaN coordinates, producing degenerate/garbage geometry (and `rounded_rectangle`, which is built on `arc_to`, is exposed to this). The collinear case is only partly guarded by the `double_area == 0.0` exact-zero check, which does not catch near-collinear inputs.","fix":"Clamp the dot product before `acos`: `let cos = to_start.dot(to_end).clamp(-1.0, 1.0); let inner_angle = cos.acos();`. Optionally also guard against `origin_angle.tan()` being ~0 (very small inner angle) which yields an enormous `origin_adjacent`.","locations":[{"ref":"graphics/src/geometry/path/builder.rs:76-86","code":"   76 |         let to_start = (start - mid).normalize();\n   77 |         let to_end = (end - mid).normalize();\n   78 | \n   79 |         let inner_angle = to_start.dot(to_end).acos();\n   80 | \n   81 |         let origin_angle = inner_angle / 2.0;\n   82 | \n   83 |         let origin_adjacent = radius / origin_angle.tan();\n   84 | \n   85 |         let arc_start = mid + to_start * origin_adjacent;\n   86 |         let arc_end = mid + to_end * origin_adjacent;","lines":11}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`add_stop`'s comparator calls `stop.offset.partial_cmp(&offset).unwrap()`. The new `offset` is guarded to be finite, but the *existing* `ColorStop.offset` values are not validated here: `stops` is a public field and `ColorStop` can be constructed with a NaN offset directly (e.g. building a `Linear` by hand and then calling `add_stop`). A NaN existing offset makes `partial_cmp` return `None`, and the `.unwrap()` panics. A library coloring routine should not panic on caller-provided data.","fix":"Replace `.unwrap()` with a total fallback, e.g. `.partial_cmp(&offset).unwrap_or(Ordering::Greater)`, so NaN existing offsets are treated as sorting last rather than panicking.","locations":[{"ref":"graphics/src/gradient.rs:67-70","code":"   67 |             let (Ok(index) | Err(index)) = self.stops.binary_search_by(|stop| match stop {\n   68 |                 None => Ordering::Greater,\n   69 |                 Some(stop) => stop.offset.partial_cmp(&offset).unwrap(),\n   70 |             });","lines":4}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`pop_clip` unwraps `self.previous.pop()`. If `pop_clip` is called more times than `push_clip` (an unbalanced push/pop sequence by a renderer/widget), this panics instead of producing a recoverable error. There is no debug assertion or guard. Because the clip stack is driven by external draw code, an imbalance is a plausible client bug that should not crash the whole UI.","fix":"Guard the pop, e.g. `if let Some(previous) = self.previous.pop() { self.current = previous; }` or add a `debug_assert!` documenting the push/pop invariant so misuse is caught in debug builds rather than panicking in release.","locations":[{"ref":"graphics/src/layer.rs:103-107","code":"  103 |     pub fn pop_clip(&mut self) {\n  104 |         self.flush();\n  105 | \n  106 |         self.current = self.previous.pop().unwrap();\n  107 |     }","lines":5}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`with_internal_mut` and `highlight` call `Arc::try_unwrap(editor).expect(\"Editor cannot have\nmultiple strong references\")`. Any outstanding strong reference to the inner `Internal` (created\nby upgrading an `editor::Weak` returned from `downgrade`, e.g. one captured in a render tree and\nupgraded while a mutating call is in flight) makes `try_unwrap` return `Err`, so every editing\naction / `update` / `highlight` panics. The TODO at line 65 (\"Handle multiple strong references\nsomehow\") acknowledges this is unhandled. A `Weak::upgrade` that outlives a frame is a realistic\ntrigger.","fix":"Avoid the hard `expect`. Use `Arc::make_mut` (clone-on-write, as `Paragraph::resize` already\ndoes via `Arc::make_mut`) so the mutation is always possible, or fall back to cloning the\n`Internal` when `try_unwrap` fails instead of panicking.","locations":[{"ref":"graphics/src/text/editor.rs:62-67","code":"   62 |     fn with_internal_mut<T>(&mut self, f: impl FnOnce(&mut Internal) -> T) -> T {\n   63 |         let editor = self.0.take().expect(\"Editor should always be initialized\");\n   64 | \n   65 |         // TODO: Handle multiple strong references somehow\n   66 |         let mut internal =\n   67 |             Arc::try_unwrap(editor).expect(\"Editor cannot have multiple strong references\");","lines":6},{"ref":"graphics/src/text/editor.rs:644-647","code":"  644 |         let editor = self.0.take().expect(\"Editor should always be initialized\");\n  645 | \n  646 |         let mut internal =\n  647 |             Arc::try_unwrap(editor).expect(\"Editor cannot have multiple strong references\");","lines":4}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"tiny_skia::Pixmap::new and Mask::new are unwrapped with quad dimensions cast to u32. For a quad with zero width or height (or negative, which saturates to 0 on `as u32`) that has a non-simple border (is_simple_border == false), Pixmap::new(0, h) / Mask::new(0, h) return None and the unwrap panics. A zero-sized bordered quad therefore crashes the renderer.","fix":"Guard the non-simple-border branch with a check that width and height are >= 1 (e.g. `let (Some(w), Some(h)) = (NonZeroU32::new(..), ..)` or early-return), or use Pixmap::new(...).map(...) and bail out gracefully instead of unwrap().","locations":[{"ref":"tiny_skia/src/engine.rs:232-238","code":"  232 |                 let mut temp_pixmap =\n  233 |                     tiny_skia::Pixmap::new(quad.bounds.width as u32, quad.bounds.height as u32)\n  234 |                         .unwrap();\n  235 | \n  236 |                 let mut quad_mask =\n  237 |                     tiny_skia::Mask::new(quad.bounds.width as u32, quad.bounds.height as u32)\n  238 |                         .unwrap();","lines":7}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`Buffer::write` always assumes there is at least one byte left to write. When `contents` is empty\n(`bytes.len() == 0`), the chunk loop never runs, `bytes_left = ((0 - 0) as u64).try_into()` is `0`, and the\n`NonZeroU64::try_into` fails with `expect(\"non-empty write\")`, panicking. The comment on lines 87-88\n(\"There will always be some bytes left\") is only true if the caller guarantees a non-empty slice. The quad\nlayer guards this, but `triangle::Layer::prepare` calls `self.solid.vertices.write(.., &buffers.vertices)`\nand `gradient.vertices.write(..)` unconditionally per mesh; a mesh with indices but an empty vertex buffer\n(possible for degenerate/cached geometry) would panic.","fix":"Early-return when `contents` is empty: `if contents.is_empty() { return 0; }` at the top of `write`,\nor skip the final `belt.write_buffer` call when `bytes_left == 0`.","locations":[{"ref":"wgpu/src/buffer.rs:64-103","code":"   64 |     pub fn write(\n   65 |         &mut self,\n   66 |         encoder: &mut wgpu::CommandEncoder,\n   67 |         belt: &mut wgpu::util::StagingBelt,\n   68 |         offset: usize,\n   69 |         contents: &[T],\n   70 |     ) -> usize {\n   71 |         let bytes: &[u8] = bytemuck::cast_slice(contents);\n   72 |         let mut bytes_written = 0;\n   73 | \n   74 |         // Split write into multiple chunks if necessary\n   75 |         while bytes_written + MAX_WRITE_SIZE < bytes.len() {\n   76 |             belt.write_buffer(\n   77 |                 encoder,\n   78 |                 &self.raw,\n   79 |                 (offset + bytes_written) as u64,\n   80 |                 MAX_WRITE_SIZE_U64,\n   81 |             )\n   82 |             .copy_from_slice(&bytes[bytes_written..bytes_written + MAX_WRITE_SIZE]);\n   83 | \n   84 |             bytes_written += MAX_WRITE_SIZE;\n   85 |         }\n   86 | \n   87 |         // There will always be some bytes left, since the previous\n   88 |         // loop guarantees `bytes_written < bytes.len()`\n   89 |         let bytes_left = ((bytes.len() - bytes_written) as u64)\n   90 |             .try_into()\n   91 |             .expect(\"non-empty write\");\n   92 | \n   93 |         // Write them\n   94 |         belt.write_buffer(\n   95 |             encoder,\n   96 |             &self.raw,\n   97 |             (offset + bytes_written) as u64,\n   98 |             bytes_left,\n   99 |         )\n  100 |         .copy_from_slice(&bytes[bytes_written..]);\n  101 | \n  102 |         bytes.len()\n  103 |     }","lines":40}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Tessellation results are propagated with `.expect(\"Tessellate path.\")` / `.expect(\"Fill rectangle\")` / `.expect(\"Stroke path\")` / `.expect(\"Stroke rectangle\")`. lyon can return `Err(TessellationError)` for degenerate or pathological input (e.g. non-finite coordinates produced by a user transform/path). Any such input from user canvas code aborts the whole process instead of dropping the offending geometry.","fix":"Replace the `.expect(...)` calls with error handling that logs and skips the geometry (e.g. `if let Err(e) = ... { log::warn!(...) }`), so malformed user paths cannot crash the renderer.","locations":[{"ref":"wgpu/src/geometry.rs:167-167","code":"  167 |         .expect(\"Tessellate path.\");","lines":1},{"ref":"wgpu/src/geometry.rs:197-197","code":"  197 |             .expect(\"Fill rectangle\");","lines":1},{"ref":"wgpu/src/geometry.rs:228-228","code":"  228 |         .expect(\"Stroke path\");","lines":1},{"ref":"wgpu/src/geometry.rs:262-262","code":"  262 |             .expect(\"Stroke rectangle\");","lines":1}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`prepare` calls `buffer_cache.get(key).expect(\"Get cached buffer\")` for `Text::Cached` sections. The key was just allocated a few lines earlier via `buffer_cache.allocate`, but this couples two separate operations on the cache by an invariant (the key must still be present and not have been trimmed) that is not enforced locally. If allocation returns a key whose entry is later missing (cache trimming / capacity logic), this panics during a render-prepare pass. Lower priority than the geometry panics because the invariant is usually held, but it is a latent crash.","fix":"Handle the `None` case gracefully (e.g. `let Some(entry) = buffer_cache.get(key) else { return None; };`) rather than expect().","locations":[{"ref":"wgpu/src/text.rs:557-557","code":"  557 |                     let entry = buffer_cache.get(key).expect(\"Get cached buffer\");","lines":1}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Lazy::with_element` / `with_element_mut` unwrap a chain of `RefCell` borrows and `Option`s (`self.element.borrow().as_ref().unwrap().borrow().as_ref().unwrap()`). These are called from `size`, `layout`, `draw`, etc. If any of these widget methods is invoked before `state()`/`diff()` has populated `self.element` (e.g. `size()` is documented as callable during construction by some containers), the `.unwrap()` on the outer `None` panics. The inner element is also `take()`n during `overlay`; if another method runs while the overlay holds the element taken out (re-entrancy), the inner `as_ref().unwrap()` panics on `None`.","fix":"Guard the accessors against an empty cell (return a sensible default for `size`, or ensure `state`/`diff` always run first), and document/verify the invariant that `overlay` is the only place the inner element is taken and is always restored before any other method runs.","locations":[{"ref":"widget/src/lazy.rs:50-73","code":"   50 |     fn with_element<T>(&self, f: impl FnOnce(&Element<'_, Message, Theme, Renderer>) -> T) -> T {\n   51 |         f(self\n   52 |             .element\n   53 |             .borrow()\n   54 |             .as_ref()\n   55 |             .unwrap()\n   56 |             .borrow()\n   57 |             .as_ref()\n   58 |             .unwrap())\n   59 |     }\n   60 | \n   61 |     fn with_element_mut<T>(\n   62 |         &self,\n   63 |         f: impl FnOnce(&mut Element<'_, Message, Theme, Renderer>) -> T,\n   64 |     ) -> T {\n   65 |         f(self\n   66 |             .element\n   67 |             .borrow()\n   68 |             .as_ref()\n   69 |             .unwrap()\n   70 |             .borrow_mut()\n   71 |             .as_mut()\n   72 |             .unwrap())\n   73 |     }","lines":24},{"ref":"widget/src/lazy.rs:240-270","code":"  240 |         let overlay = InnerBuilder {\n  241 |             cell: self.element.borrow().as_ref().unwrap().clone(),\n  242 |             element: self\n  243 |                 .element\n  244 |                 .borrow()\n  245 |                 .as_ref()\n  246 |                 .unwrap()\n  247 |                 .borrow_mut()\n  248 |                 .take()\n  249 |                 .unwrap(),\n  250 |             tree: &mut tree.children[0],\n  251 |             layout,\n  252 |             overlay_builder: |element, tree, layout| {\n  253 |                 element\n  254 |                     .as_widget_mut()\n  255 |                     .overlay(tree, *layout, renderer, viewport, translation)\n  256 |                     .map(|overlay| RefCell::new(overlay::Nested::new(overlay)))\n  257 |             },\n  258 |         }\n  259 |         .build();\n  260 | \n  261 |         #[allow(clippy::redundant_closure_for_method_calls)]\n  262 |         if overlay.with_overlay(|overlay| overlay.is_some()) {\n  263 |             Some(overlay::Element::new(Box::new(Overlay(Some(overlay)))))\n  264 |         } else {\n  265 |             let heads = overlay.into_heads();\n  266 | \n  267 |             // - You may not like it, but this is what peak performance looks like\n  268 |             // - TODO: Get rid of ouroboros, for good\n  269 |             // - What?!\n  270 |             *self.element.borrow().as_ref().unwrap().borrow_mut() = Some(heads.element);","lines":31}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Responsive`, `Transition`, `Pin`, and `hover` all call `layout.children().next().unwrap()` (or index `tree.children[0]`) on the assumption that `layout` was produced by their own `layout()`. If a caller passes a layout whose node has no children (e.g. a default/empty `layout::Node` after a panicking or short-circuited layout pass), these unwraps/indexes panic. `Responsive` in particular builds its content lazily during `layout`, so any path that reaches `update`/`draw` without a prior successful `layout` will panic.","fix":"These are framework invariants, but consider defensively handling a missing child layout (skip the call) rather than unwrapping, to avoid hard panics on malformed trees.","locations":[{"ref":"widget/src/responsive.rs:107","code":"  107 |             layout.children().next().unwrap(),","lines":1},{"ref":"widget/src/transition.rs:280-281","code":"  280 |             event,\n  281 |             self::layout(layout, &self.new_layout),","lines":2},{"ref":"widget/src/pin.rs:163-164","code":"  163 |             renderer,\n  164 |             operation,","lines":2}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Value::select(start, end)` slices `self.graphemes[start.min(len)..end.min(len)]`. The two operands are clamped independently, so if `start > end` the resulting range has start > end and the slice indexing panics (\"slice index starts at X but ends at Y\"). The doc comment and most callers pass normalized `(start, end)` via `Cursor::selection` (which guarantees start <= end), but `select` is a public method with no such guarantee, and nothing in the type enforces ordering. A reversed selection reaching this path panics.","fix":"Normalize first: `let (start, end) = (start.min(end), start.max(end));` then clamp each to `self.len()` before slicing, e.g. `let start = start.min(self.len()); let end = end.min(self.len()).max(start);`.","locations":[{"ref":"widget/src/text_input/value.rs:70-74","code":"   70 |     pub fn select(&self, start: usize, end: usize) -> Self {\n   71 |         let graphemes = self.graphemes[start.min(self.len())..end.min(self.len())].to_vec();\n   72 | \n   73 |         Self { graphemes }\n   74 |     }","lines":5}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Window creation uses `event_loop.create_window(window_attributes).expect(\"Create window\")`.\nWindow creation legitimately fails at runtime (display server disconnect, out of GPU/X\nresources, hitting an OS window limit when opening many windows). Per `error.rs` there is a\ndedicated `Error::WindowCreationFailed(winit::error::OsError)` variant intended exactly for\nthis, yet it is never constructed - the code panics instead. A second/third window failing to\nopen should not abort the process.","fix":"Match on the `create_window` result; on `Err`, send `Control::Crash(Error::WindowCreationFailed(err))` (or report via `on_open`) instead of `expect`. This also makes the existing `Error::WindowCreationFailed` variant actually reachable.","locations":[{"ref":"winit/src/lib.rs:340-342","code":"  340 |                                 let window = event_loop\n  341 |                                     .create_window(window_attributes)\n  342 |                                     .expect(\"Create window\");","lines":3}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"The compositor present error handler treats `SurfaceError::OutOfMemory` as unrecoverable and\ncalls `panic!(\"{error:?}\")`. A transient GPU/driver out-of-memory during a single present\nwill crash the whole application with no chance for the program to save state or recover. On\nmany platforms OOM on present is not fatal to the process. Panicking here is a poor failure\nmode for a GUI shell.","fix":"Instead of panicking, log the error and signal a clean shutdown via `control_sender.start_send(Control::Crash(...))` (or skip the frame), letting the run loop terminate gracefully and surface the error through `Runner::error`.","locations":[{"ref":"winit/src/lib.rs:949-952","code":"  949 |                                 compositor::SurfaceError::OutOfMemory => {\n  950 |                                     // This is an unrecoverable error.\n  951 |                                     panic!(\"{error:?}\");\n  952 |                                 }","lines":4}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`send` uses `bincode::serialize(&message).expect(\"Encode input message\")` on the client. Serialization of these well-formed enums should not fail in practice, but an `expect` on the hot send path will abort the whole client thread if it ever does (e.g. due to a future non-serializable field). Same pattern in the server `send`. Low severity because current types are always serializable.","fix":"Map the serialization error into the function's error type and propagate it instead of `expect`, or log and skip the message.","locations":[{"ref":"beacon/src/client.rs:237-246","code":"  237 | async fn send(stream: &mut net::tcp::OwnedWriteHalf, message: Message) -> Result<(), io::Error> {\n  238 |     let bytes = bincode::serialize(&message).expect(\"Encode input message\");\n  239 |     let size = bytes.len() as u64;\n  240 | \n  241 |     stream.write_all(&size.to_be_bytes()).await?;\n  242 |     stream.write_all(&bytes).await?;\n  243 |     stream.flush().await?;\n  244 | \n  245 |     Ok(())\n  246 | }","lines":10},{"ref":"beacon/src/lib.rs:297-309","code":"  297 | async fn send(\n  298 |     stream: &mut net::tcp::OwnedWriteHalf,\n  299 |     command: client::Command,\n  300 | ) -> Result<(), io::Error> {\n  301 |     let bytes = bincode::serialize(&command).expect(\"Encode input message\");\n  302 |     let size = bytes.len() as u64;\n  303 | \n  304 |     stream.write_all(&size.to_be_bytes()).await?;\n  305 |     stream.write_all(&bytes).await?;\n  306 |     stream.flush().await?;\n  307 | \n  308 |     Ok(())\n  309 | }","lines":13}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`State::downcast_ref`/`downcast_mut` call `.expect(\"Downcast widget state\")` and `panic!` on `State::None`. This is by-design (documented as panicking), but the panic on type mismatch is reachable in the tree-diffing path: if `Tree::diff` reuses a tree whose `tag` matches but whose stored `State` type differs from what the widget expects (possible when two distinct widget types share a stateless `()` tag yet one stores `Some` state, or when `Widget::diff` is overridden without recreating state), the downcast will panic at runtime rather than degrade gracefully. The reliance on `tag` (a `TypeId` of the STATE type, not the widget type) to guarantee state-type compatibility is fragile.","fix":"Consider returning `Option`/`Result` from a fallible downcast variant for callers that can recover, and document the invariant that a matching `Tag` implies a matching state type. Audit widgets that override `diff` without resetting state.","locations":[{"ref":"core/src/widget/tree.rs:229-251","code":"  229 |     pub fn downcast_ref<T>(&self) -> &T\n  230 |     where\n  231 |         T: 'static,\n  232 |     {\n  233 |         match self {\n  234 |             State::None => panic!(\"Downcast on stateless state\"),\n  235 |             State::Some(state) => state.downcast_ref().expect(\"Downcast widget state\"),\n  236 |         }\n  237 |     }\n  238 | \n  239 |     /// Downcasts the [`State`] to `T` and returns a mutable reference to it.\n  240 |     ///\n  241 |     /// # Panics\n  242 |     /// This method will panic if the downcast fails or the [`State`] is [`State::None`].\n  243 |     pub fn downcast_mut<T>(&mut self) -> &mut T\n  244 |     where\n  245 |         T: 'static,\n  246 |     {\n  247 |         match self {\n  248 |             State::None => panic!(\"Downcast on stateless state\"),\n  249 |             State::Some(state) => state.downcast_mut().expect(\"Downcast widget state\"),\n  250 |         }\n  251 |     }","lines":23},{"ref":"core/src/widget/tree.rs:63-68","code":"   63 |         if self.tag != new.borrow().tag() {\n   64 |             *self = Self::new(new.borrow());\n   65 |         }\n   66 | \n   67 |         new.borrow_mut().diff(self);\n   68 |     }","lines":6}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`backend::null::Executor::block_on` calls `unimplemented!()`, which panics. Any code path that selects the null backend (no `tokio`/`smol`/`thread-pool` feature on native) and calls `block_on` (e.g. via `Runtime::block_on`) will panic at runtime rather than failing gracefully or being a compile error.","fix":"Document clearly that the null backend cannot block, or return a sentinel/never-resolving behavior. At minimum the panic message should explain that no async backend feature is enabled, instead of the bare `unimplemented!()`.","locations":[{"ref":"futures/src/backend/null.rs:15-18","code":"   15 |     #[cfg(not(target_arch = \"wasm32\"))]\n   16 |     fn block_on<T>(&self, _future: impl Future<Output = T>) -> T {\n   17 |         unimplemented!()\n   18 |     }","lines":4}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`transformation()` does `self.transformations.last().copied().unwrap()`. If `pop_transformation` is ever called more often than `push_transformation`, the transformations vec becomes empty and every subsequent draw call panics via this unwrap. `pop_transformation` itself silently allows over-popping (`let _ = self.transformations.pop();`), so the imbalance is not caught at the pop site and instead surfaces as a panic later, far from the cause.","fix":"Either keep an invariant guard (debug_assert the stack never underflows in `pop_transformation`), or make `transformation()` fall back to `Transformation::IDENTITY` when empty. At minimum document that the base IDENTITY must never be popped.","locations":[{"ref":"graphics/src/layer.rs:78-81","code":"   78 |     #[inline]\n   79 |     pub fn transformation(&self) -> Transformation {\n   80 |         self.transformations.last().copied().unwrap()\n   81 |     }","lines":4},{"ref":"graphics/src/layer.rs:121-123","code":"  121 |     pub fn pop_transformation(&mut self) {\n  122 |         let _ = self.transformations.pop();\n  123 |     }","lines":3}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`highlight` relies on `line.layout_opt()...expect(\"Line layout should be cached\")` for every\nline at/after the scroll position. If `highlight` is ever called before the buffer has been\nshaped (no cached layout, e.g. a freshly built editor whose `update` reshape has not run), this\nexpect panics. The neighbouring `selection()` path (lines 202, 626) and `highlight_line` use\nthe same fragile assumption; `highlight_line` correctly falls back to an empty slice, but the\nhot paths here hard-panic.","fix":"Use `line.layout_opt().map(|l| l.len() as i32).unwrap_or(0)` (treat un-shaped lines as zero\nvisible lines) instead of `expect`, matching the defensive handling in `highlight_line`.","locations":[{"ref":"graphics/src/text/editor.rs:623-627","code":"  623 |                 let visible_lines = line\n  624 |                     .layout_opt()\n  625 |                     .as_ref()\n  626 |                     .expect(\"Line layout should be cached\")\n  627 |                     .len() as i32;","lines":5}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Renderer::screenshot` creates a texture and an output buffer directly from `viewport.physical_size()`\nwithout guarding against a zero width or height. `wgpu::Device::create_texture` with a 0-sized extent (or a\n0-byte output buffer) will trigger wgpu validation errors / panics. The normal present path guards zero size\nin `create_surface`, but the offscreen screenshot path has no such guard.","fix":"Return an empty `Vec` early when `viewport.physical_size()` has a zero width or height.","locations":[{"ref":"wgpu/src/lib.rs:204-245","code":"  204 |         let dimensions = BufferDimensions::new(viewport.physical_size());\n  205 | \n  206 |         let texture_extent = wgpu::Extent3d {\n  207 |             width: dimensions.width,\n  208 |             height: dimensions.height,\n  209 |             depth_or_array_layers: 1,\n  210 |         };\n  211 | \n  212 |         let texture = self.engine.device.create_texture(&wgpu::TextureDescriptor {\n  213 |             label: Some(\"iced_wgpu.offscreen.source_texture\"),\n  214 |             size: texture_extent,\n  215 |             mip_level_count: 1,\n  216 |             sample_count: 1,\n  217 |             dimension: wgpu::TextureDimension::D2,\n  218 |             format: self.engine.format,\n  219 |             usage: wgpu::TextureUsages::RENDER_ATTACHMENT\n  220 |                 | wgpu::TextureUsages::COPY_SRC\n  221 |                 | wgpu::TextureUsages::TEXTURE_BINDING,\n  222 |             view_formats: &[],\n  223 |         });\n  224 | \n  225 |         let view = texture.create_view(&wgpu::TextureViewDescriptor::default());\n  226 | \n  227 |         let mut encoder = self.draw(Some(background_color), &view, viewport);\n  228 | \n  229 |         let texture = crate::color::convert(\n  230 |             &self.engine.device,\n  231 |             &mut encoder,\n  232 |             texture,\n  233 |             if graphics::color::GAMMA_CORRECTION {\n  234 |                 wgpu::TextureFormat::Rgba8UnormSrgb\n  235 |             } else {\n  236 |                 wgpu::TextureFormat::Rgba8Unorm\n  237 |             },\n  238 |         );\n  239 | \n  240 |         let output_buffer = self.engine.device.create_buffer(&wgpu::BufferDescriptor {\n  241 |             label: Some(\"iced_wgpu.offscreen.output_texture_buffer\"),\n  242 |             size: (dimensions.padded_bytes_per_row * dimensions.height as usize) as u64,\n  243 |             usage: wgpu::BufferUsages::MAP_READ | wgpu::BufferUsages::COPY_DST,\n  244 |             mapped_at_creation: false,\n  245 |         });","lines":42}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Checkbox::draw and Radio::draw call `children.next().unwrap()` to obtain the icon/dot layout and the label layout, relying on the layout produced by `layout::next_to_each_other` always having two children. This holds for the matching layout function, but the unwraps are unguarded; any mismatch between layout and draw children counts (e.g. a future layout change) panics rather than degrading. Radio always lays out a label child even when the label is empty, so the second `unwrap` is currently safe; Checkbox guards the label draw with `if self.label.is_none() return;` yet still produced a ZERO label node in layout, so counts stay aligned. Low risk but the unchecked unwraps are fragile.","fix":"Use `if let Some(layout) = children.next()` or document the invariant; at minimum keep layout and draw child counts provably in sync.","locations":[{"ref":"widget/src/checkbox.rs:394-394","code":"  394 |             let layout = children.next().unwrap();","lines":1},{"ref":"widget/src/checkbox.rs:442-442","code":"  442 |             let label_layout = children.next().unwrap();","lines":1},{"ref":"widget/src/radio.rs:397-397","code":"  397 |             let layout = children.next().unwrap();","lines":1},{"ref":"widget/src/radio.rs:434-434","code":"  434 |             let label_layout = children.next().unwrap();","lines":1}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`highlight_line` ends with `.expect(\"Line must be parsed\")` on `self.lines.get(self.current - 1)`. If the cache-hit arm (line 464) is taken but `self.current` was somehow advanced past the cached entry, or if a future refactor lets `lines` be shorter than `current`, this panics. It relies on the invariant that the cache always holds an entry at `current-1` after the match block; the invariant is non-local and fragile given the surrounding off-by-one logic around `current` and `lines.len()`.","fix":"Return `&[]` (or a cached empty slice) on `None` instead of panicking, since malformed/edge input should degrade gracefully rather than crash the UI thread.","locations":[{"ref":"widget/src/markdown.rs:502-508","code":"  502 |         self.current += 1;\n  503 | \n  504 |         &self\n  505 |             .lines\n  506 |             .get(self.current - 1)\n  507 |             .expect(\"Line must be parsed\")\n  508 |             .1","lines":7}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In the menu list draw, `start` is computed from the scroll offset as `(offset / option_height) as usize` and is used directly as the lower bound of the slice `&self.options[start..end.min(self.options.len())]`. Only `end` is clamped to `len`, not `start`. If `start` ever exceeds `self.options.len()` (e.g. a transient layout/viewport mismatch where `viewport.y - bounds.y` is larger than the content height, such as during animated scrolling, fractional rounding, or a stale viewport), the range has `start > end`, which panics with `slice index starts at N but ends at M`. The lower bound should be clamped the same way the upper bound is.","fix":"Clamp start as well, e.g. `let start = ((offset / option_height) as usize).min(self.options.len()); let end = (((offset + viewport.height) / option_height).ceil() as usize).min(self.options.len()); let visible_options = &self.options[start..end];`","locations":[{"ref":"widget/src/overlay/menu.rs:504-508","code":"  504 |         let offset = viewport.y - bounds.y;\n  505 |         let start = (offset / option_height) as usize;\n  506 |         let end = ((offset + viewport.height) / option_height).ceil() as usize;\n  507 | \n  508 |         let visible_options = &self.options[start..end.min(self.options.len())];","lines":5}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"compute_regions/compute_splits end with an `unreachable!` for any (Node, Count) mismatch. The Count tree is rebuilt from the same Node immediately before the recursive walk (pane_regions/split_regions call self.count()), so the structures should always match. However, this couples two independent recursions: if the Node is mutated between count() and compute_* (not currently the case) or if a future refactor passes a stale Count, this panics in the render/layout path rather than degrading gracefully. The invariant is implicit and undocumented.","fix":"Either fold the count into the Node walk (compute counts inline during recursion, removing the separate Count tree and the possibility of mismatch), or document the invariant clearly at the call sites. Avoid an unreachable!() panic on a data-shape mismatch in a hot path.","locations":[{"ref":"widget/src/pane_grid/node.rs:291-293","code":"  291 |             _ => {\n  292 |                 unreachable!(\"Node configuration and count do not match\")\n  293 |             }","lines":3},{"ref":"widget/src/pane_grid/node.rs:339-341","code":"  339 |             _ => {\n  340 |                 unreachable!(\"Node configuration and split count do not match\")\n  341 |             }","lines":3}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Row/Column wrapping layout indexes `tree.children[i]` directly while iterating `self.children`/`self.row.children`. This relies on `diff` having produced exactly as many tree children as elements. It is consistent with the rest of iced, but unlike the flex path it does not use zip, so any future desync (or a child whose `size().is_void()` filtering in `push` differs between build and diff) becomes an index-out-of-bounds panic rather than a silently-truncated iteration.","fix":"Iterate with `self.children.iter_mut().zip(&mut tree.children)` instead of indexing by `i`, matching the non-wrapping paths, so a length mismatch truncates instead of panicking.","locations":[{"ref":"widget/src/row.rs:427-430","code":"  427 |         for (i, child) in self.row.children.iter_mut().enumerate() {\n  428 |             let node = child\n  429 |                 .as_widget_mut()\n  430 |                 .layout(&mut tree.children[i], renderer, &child_limits);","lines":4},{"ref":"widget/src/column.rs:432-435","code":"  432 |         for (i, child) in self.column.children.iter_mut().enumerate() {\n  433 |             let node = child\n  434 |                 .as_widget_mut()\n  435 |                 .layout(&mut tree.children[i], renderer, &child_limits);","lines":4}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`find_cursor_position` slices `&value[..char_offset.min(value.len())]` where `char_offset` is the BYTE offset returned by `Hit::cursor()` (`text::Hit::CharOffset`), and `value` is the String form. Clamping to `value.len()` (byte length) prevents an out-of-range panic, but if `char_offset` ever lands on a non-UTF-8 char boundary (mid-multibyte sequence) the slice panics (\"byte index N is not a char boundary\"). Relies entirely on the renderer's hit_test always returning grapheme/char boundaries.","fix":"Avoid byte slicing: count graphemes up to the byte offset safely, e.g. `value.grapheme_indices(true).take_while(|(i, _)| *i < char_offset).count()`, or use `floor_char_boundary` before slicing to harden against off-boundary hits.","locations":[{"ref":"widget/src/text_input.rs:1545-1559","code":" 1545 |     let value = value.to_string();\n 1546 | \n 1547 |     let char_offset = state\n 1548 |         .value\n 1549 |         .raw()\n 1550 |         .hit_test(Point::new(x + offset, text_bounds.height / 2.0))\n 1551 |         .map(text::Hit::cursor)?;\n 1552 | \n 1553 |     Some(\n 1554 |         unicode_segmentation::UnicodeSegmentation::graphemes(\n 1555 |             &value[..char_offset.min(value.len())],\n 1556 |             true,\n 1557 |         )\n 1558 |         .count(),\n 1559 |     )","lines":15}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Value::remove(index)` and `remove_many(start, end)` call `Vec::remove` / `Vec::splice` with no bounds clamping, unlike sibling methods (`select`, `until`, `insert` is also unclamped). `Vec::remove` panics if `index >= len`; `splice` panics if `start > end` or `end > len`. Current internal callers stay in range, but these are `pub` methods with doc comments and no documented precondition, so external use or a future cursor-state desync panics rather than clamping like the rest of the API.","fix":"Clamp indices defensively: in `remove`, guard `if index < self.len()`; in `remove_many`, clamp `start`/`end` to `self.len()` and ensure `start <= end` before `splice`, mirroring `select`/`until`.","locations":[{"ref":"widget/src/text_input/value.rs:100-108","code":"  100 |     /// Removes the grapheme at the given `index`.\n  101 |     pub fn remove(&mut self, index: usize) {\n  102 |         let _ = self.graphemes.remove(index);\n  103 |     }\n  104 | \n  105 |     /// Removes the graphemes from `start` to `end`.\n  106 |     pub fn remove_many(&mut self, start: usize, end: usize) {\n  107 |         let _ = self.graphemes.splice(start..end, std::iter::empty());\n  108 |     }","lines":9}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Several `start_send(...).expect(\"Send control action\")` calls (Open, SetAllowAutomaticTabbing,\nExit) will panic if the control channel's receiver (the `Runner`) has been dropped. During the\nexit/teardown sequence the `Runner` and its `control_receiver` can be gone while a late action\nis still processed, turning shutdown into a panic instead of a no-op.","fix":"Use `let _ = control_sender.start_send(...)` for these control sends (as is already done for the ChangeFlow sends), so a closed channel during shutdown is ignored.","locations":[{"ref":"winit/src/lib.rs:1330-1339","code":" 1330 |                 control_sender\n 1331 |                     .start_send(Control::CreateWindow {\n 1332 |                         id,\n 1333 |                         settings,\n 1334 |                         title: program.title(id),\n 1335 |                         scale_factor: program.scale_factor(id),\n 1336 |                         monitor,\n 1337 |                         on_open: channel,\n 1338 |                     })\n 1339 |                     .expect(\"Send control action\");","lines":10},{"ref":"winit/src/lib.rs:1592-1596","code":" 1592 |             window::Action::SetAllowAutomaticTabbing(enabled) => {\n 1593 |                 control_sender\n 1594 |                     .start_send(Control::SetAutomaticWindowTabbing(enabled))\n 1595 |                     .expect(\"Send control action\");\n 1596 |             }","lines":5},{"ref":"winit/src/lib.rs:1793-1797","code":" 1793 |         Action::Exit => {\n 1794 |             control_sender\n 1795 |                 .start_send(Control::Exit)\n 1796 |                 .expect(\"Send control action\");\n 1797 |         }","lines":5}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"`Family::name` interns every distinct family name by leaking it (`name.to_owned().leak()`) into a process-global `FxHashSet<&'static str>`. This is documented (\"interned in a global cache and never freed\"), but if `Family::name` is ever called with attacker- or user-controlled, unbounded-cardinality strings (e.g. font names parsed from arbitrary documents), memory grows without bound for the life of the process. Worth flagging as an intentional-but-unbounded leak.","fix":"Keep interning for the legitimate bounded use case, but ensure callers never feed unbounded/untrusted strings through `Family::name`. If untrusted input is possible, switch to an `Arc<str>`-backed family representation instead of leaking `&'static str`.","locations":[{"ref":"core/src/font.rs:118-134","code":"  118 |     pub fn name(name: &str) -> Self {\n  119 |         use rustc_hash::FxHashSet;\n  120 |         use std::sync::{LazyLock, Mutex};\n  121 | \n  122 |         static NAMES: LazyLock<Mutex<FxHashSet<&'static str>>> = LazyLock::new(Mutex::default);\n  123 | \n  124 |         let mut names = NAMES.lock().expect(\"lock font name cache\");\n  125 | \n  126 |         let Some(name) = names.get(name) else {\n  127 |             let name: &'static str = name.to_owned().leak();\n  128 |             let _ = names.insert(name);\n  129 | \n  130 |             return Self::Name(name);\n  131 |         };\n  132 | \n  133 |         Self::Name(name)\n  134 |     }","lines":17}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"The mpsc event channel created for every subscription has a fixed buffer of 100 (`mpsc::channel(100)`). In `broadcast`, events are pushed with `try_send`; when a slow/non-consuming subscription fills its buffer, every subsequent event is dropped and only logged as a warning. For a subscription that never reads its input stream, the 100 buffered `Event` clones are retained for the lifetime of the subscription (held until cancel). Combined with the dead `is_closed` optimization above, every subscription - even ones that ignore events - gets a live 100-slot listener that is broadcast to and retains cloned events. Not a classic leak, but unbounded-in-aggregate retention proportional to the number of live subscriptions.","fix":"Only create/register a listener for recipes that actually consume the event stream, or reduce the buffer and document the back-pressure/drop behavior. Avoid broadcasting to subscriptions that never read their input.","locations":[{"ref":"futures/src/subscription/tracker.rs:86-86","code":"   86 |             let (event_sender, event_receiver) = futures::channel::mpsc::channel(100);","lines":1},{"ref":"futures/src/subscription/tracker.rs:135-144","code":"  135 |     pub fn broadcast(&mut self, event: Event) {\n  136 |         self.subscriptions\n  137 |             .values_mut()\n  138 |             .filter_map(|connection| connection.listener.as_mut())\n  139 |             .for_each(|listener| {\n  140 |                 if let Err(error) = listener.try_send(event.clone()) {\n  141 |                     log::warn!(\"Error sending event to subscription: {error:?}\");\n  142 |                 }\n  143 |             });\n  144 |     }","lines":10}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"Cache `aliases` entries are inserted in `allocate` (lines 76-81) but are only ever removed in\n`trim` when their target value is no longer recently used. Because an alias key is never itself\nre-validated or its hit recorded (only the target hash is inserted into `recently_used` on an\nalias hit, line 37), aliases for bounds combinations that stop being requested but whose target\nentry stays alive (because some other bounds variant keeps the same content alive) accumulate\nand are never pruned while that content remains in use. For long-lived content drawn at many\ntransient bounds this is slow unbounded growth of the `aliases` map.","fix":"Track recency per alias key (record the alias key in `recently_used` on a hit) and retain\naliases by their own key, or cap/expire the aliases map, so unused bounds aliases are pruned.","locations":[{"ref":"graphics/src/text/cache.rs:69-81","code":"   69 |             for bounds in [\n   70 |                 bounds,\n   71 |                 Size {\n   72 |                     width: key.bounds.width,\n   73 |                     ..bounds\n   74 |                 },\n   75 |             ] {\n   76 |                 if key.bounds != bounds {\n   77 |                     let _ = self\n   78 |                         .aliases\n   79 |                         .insert(Key { bounds, ..key }.hash(FxHasher::default()), hash);\n   80 |                 }\n   81 |             }","lines":13},{"ref":"graphics/src/text/cache.rs:92-100","code":"   92 |     pub fn trim(&mut self) {\n   93 |         self.entries\n   94 |             .retain(|key, _| self.recently_used.contains(key));\n   95 | \n   96 |         self.aliases\n   97 |             .retain(|_, value| self.recently_used.contains(value));\n   98 | \n   99 |         self.recently_used.clear();\n  100 |     }","lines":9}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"from_rgba computes `width * height` as a plain u32 multiplication (twice: in the comparison and in the error struct). For large but legitimate dimensions (e.g. 70000 x 70000, or any width*height >= 2^32) this overflows. In debug builds it panics; in release builds it wraps, so the pixel-count validation can pass for a buffer whose real pixel count does not match the dimensions, silently producing an Icon with mismatched size that downstream code may trust for indexing.","fix":"Compute the product with overflow checking, e.g. `let expected = (width as usize).checked_mul(height as usize)` and compare against `pixel_count`, returning the dimension-mismatch error (or a dedicated overflow error) when `None`. Avoid `(width * height) as usize`.","locations":[{"ref":"core/src/window/icon.rs:18-24","code":"   18 |     if pixel_count != (width * height) as usize {\n   19 |         return Err(Error::DimensionsVsPixelCount {\n   20 |             width,\n   21 |             height,\n   22 |             width_x_height: (width * height) as usize,\n   23 |             pixel_count,\n   24 |         });","lines":7}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Screenshot::crop validates bounds with `region.x + region.width > self.size.width` and `region.y + region.height > self.size.height` using u32 addition. If `region.x + region.width` overflows u32, the addition wraps to a small value, the bounds check passes, and the subsequent slicing `column_range = region.x*4 .. (region.x+region.width)*4` (also overflow-prone) produces an invalid/inverted range that panics on slice indexing or reads wrong data. An attacker-controlled or buggy region can thus bypass the OutOfBounds guard.","fix":"Use checked arithmetic: `region.x.checked_add(region.width)` / `region.y.checked_add(region.height)` and treat `None` as OutOfBounds. Likewise compute the column byte range with checked/usize math before slicing.","locations":[{"ref":"core/src/window/screenshot.rs:49-60","code":"   49 |         if region.x + region.width > self.size.width || region.y + region.height > self.size.height\n   50 |         {\n   51 |             return Err(CropError::OutOfBounds);\n   52 |         }\n   53 | \n   54 |         // Image is always RGBA8 = 4 bytes per pixel\n   55 |         const PIXEL_SIZE: usize = 4;\n   56 | \n   57 |         let bytes_per_row = self.size.width as usize * PIXEL_SIZE;\n   58 |         let row_range = region.y as usize..(region.y + region.height) as usize;\n   59 |         let column_range =\n   60 |             region.x as usize * PIXEL_SIZE..(region.x + region.width) as usize * PIXEL_SIZE;","lines":12}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In the fragmented-upload path the per-fragment source offset into the host pixel buffer is computed as `4 * (y * width + x)` using u32 arithmetic, where `width` is the full image width and `x`/`y` are fragment origins. For a large image (e.g. a 4096x4096 RGBA image, or larger) `y * width` and the final `* 4` can exceed `u32::MAX` and overflow. In release builds this wraps to a small/wrong value, producing a wrong `offset` that is then fed to `upload_allocation`, which slices `pixels[src..src+stride]` - causing either a wrong copy (corrupted atlas) or an out-of-bounds slice panic. The fragmented path is exactly the path taken for images larger than the atlas (>2048), so this is reachable with realistic large images. The cast should be done in usize.","fix":"Compute the offset in usize: `let offset = 4 * (y as usize * width as usize + x as usize);` (and generally perform pixel-index math in usize throughout upload_allocation).","locations":[{"ref":"wgpu/src/image/atlas.rs:136-148","code":"  136 |                 for fragment in fragments {\n  137 |                     let (x, y) = fragment.position;\n  138 |                     let offset = 4 * (y * width + x) as usize;\n  139 | \n  140 |                     self.upload_allocation(\n  141 |                         pixels,\n  142 |                         width,\n  143 |                         offset,\n  144 |                         &fragment.allocation,\n  145 |                         encoder,\n  146 |                         belt,\n  147 |                     );\n  148 |                 }","lines":13}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`Rectangle::snap` casts `f32` coordinates to `u32` with `as u32`. After `round()`, `x`/`y`\ncan be negative (e.g. a rectangle partly off-screen to the top-left). `negative_f32 as u32`\nsaturates to 0 in Rust, silently moving the rectangle's origin to (0,0) and producing a\nwrong snapped rectangle rather than an error or clamped intersection. Width/height are\nguarded (`< 1.0` returns None) but x/y are not checked for being negative.","fix":"Check `rounded.x < 0.0 || rounded.y < 0.0` and either return None or clamp explicitly with documented behavior before the `as u32` casts.","locations":[{"ref":"core/src/rectangle.rs:254-268","code":"  254 |     /// Snaps the [`Rectangle`] to __unsigned__ integer coordinates.\n  255 |     pub fn snap(self) -> Option<Rectangle<u32>> {\n  256 |         let rounded = self.round();\n  257 | \n  258 |         if rounded.width < 1.0 || rounded.height < 1.0 {\n  259 |             return None;\n  260 |         }\n  261 | \n  262 |         Some(Rectangle {\n  263 |             x: rounded.x as u32,\n  264 |             y: rounded.y as u32,\n  265 |             width: rounded.width as u32,\n  266 |             height: rounded.height as u32,\n  267 |         })\n  268 |     }","lines":15}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`next_copy_size` computes the buffer byte size as `(size_of::<T>() * amount).next_power_of_two()`.\nThe multiplication `size_of::<T>() * amount` is a plain `usize` multiply with no overflow check, and\n`next_power_of_two()` panics (in debug) / wraps to 0 (in release) when the argument exceeds the largest\nrepresentable power of two. A very large element count (e.g. an enormous mesh vertex/index batch, or a\npathological quad batch) therefore either panics or silently produces a tiny/zero buffer size, after which\n`write` will copy far past the buffer's capacity. Because every Buffer allocation routes through this\nfunction, the whole rendering path inherits the overflow.","fix":"Use checked arithmetic, e.g. `let bytes = (size_of::<T>() as u64).checked_mul(amount as u64)`, then\n`bytes.checked_next_power_of_two()`, clamping to a sane maximum (or `wgpu::Limits::max_buffer_size`) and\nreturning an error/saturating instead of overflowing. At minimum compute in `u64` rather than `usize`.","locations":[{"ref":"wgpu/src/buffer.rs:117-122","code":"  117 | fn next_copy_size<T>(amount: usize) -> u64 {\n  118 |     let align_mask = wgpu::COPY_BUFFER_ALIGNMENT - 1;\n  119 | \n  120 |     (((std::mem::size_of::<T>() * amount).next_power_of_two() as u64 + align_mask) & !align_mask)\n  121 |         .max(wgpu::COPY_BUFFER_ALIGNMENT)\n  122 | }","lines":6}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In Table::layout the fluid width unit is computed as `... / column_factors.iter().sum::<u16>() as f32`. `column_factors` holds `u16` fill factors and their sum is computed in `u16` BEFORE the cast to `f32`, so several `FillPortion` columns (or many `Fill` columns) can overflow the u16 accumulator and panic in debug / wrap in release, yielding a wrong divisor. The sum should be widened before adding.","fix":"Cast each factor to a wider type before summing, e.g. `column_factors.iter().map(|f| *f as u32).sum::<u32>() as f32`. Apply the same to any other u16 sums.","locations":[{"ref":"widget/src/table.rs:317-320","code":"  317 |         let width_unit = (left.width\n  318 |             - spacing_x * self.columns.len().saturating_sub(1) as f32\n  319 |             - self.padding_x * 2.0)\n  320 |             / column_factors.iter().sum::<u16>() as f32;","lines":4}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`fill_main_sum` is inferred as `u16` (it is initialized to 0 and accumulates `fill_main_factor: u16` values via `+=`). With many Fill/FillPortion children, or FillPortion values that sum above 65535, this silently overflows in debug (panic) / wraps in release, producing wrong per-child main-axis allocation `remaining * factor / fill_main_sum`. A row/column with e.g. 5 children of FillPortion(20000) overflows.","fix":"Accumulate into a wider type, e.g. `let mut fill_main_sum: u32 = 0;` and add `fill_main_factor as u32`, then cast to f32 in the division.","locations":[{"ref":"core/src/layout/flex.rs:91-91","code":"   91 |     let mut fill_main_sum = 0;","lines":1},{"ref":"core/src/layout/flex.rs:131-131","code":"  131 |             fill_main_sum += fill_main_factor;","lines":1},{"ref":"core/src/layout/flex.rs:193-193","code":"  193 |                 let max_main = remaining * fill_main_factor as f32 / fill_main_sum as f32;","lines":1}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`Point::snap` and `Color::into_rgba8` both round-then-cast f32 to integer with `as`. For\n`Point::snap`, a negative coordinate saturates to 0 silently. For `into_rgba8`, an\nout-of-range channel (the public `Color` fields are plain `pub f32` and can be set outside\n0..=1 without the `new` debug_assert running, e.g. via struct literal or arithmetic) would\nsaturate, but values like NaN cast to 0. These are silent rather than diagnosed.","fix":"Clamp channels to [0,1] before scaling in `into_rgba8` (e.g. `(self.r.clamp(0.0,1.0) * 255.0).round() as u8`), and document/clamp negative coordinates in `Point::snap`.","locations":[{"ref":"core/src/point.rs:141-146","code":"  141 |     pub fn snap(self) -> Point<u32> {\n  142 |         Point {\n  143 |             x: self.x.round() as u32,\n  144 |             y: self.y.round() as u32,\n  145 |         }\n  146 |     }","lines":6},{"ref":"core/src/color.rs:226-233","code":"  226 |     pub const fn into_rgba8(self) -> [u8; 4] {\n  227 |         [\n  228 |             (self.r * 255.0).round() as u8,\n  229 |             (self.g * 255.0).round() as u8,\n  230 |             (self.b * 255.0).round() as u8,\n  231 |             (self.a * 255.0).round() as u8,\n  232 |         ]\n  233 |     }","lines":8}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"time.rs helper functions `minutes`, `hours`, `days` multiply u64 inputs (`minutes * 60`, `hours * 60`, `days * 24`) with no overflow protection. For very large inputs this panics in debug and wraps in release, producing a Duration far shorter than requested. These are public API.","fix":"Use `Duration::from_secs(minutes.saturating_mul(60))` etc., or `checked_mul`, to avoid silent wraparound; document the saturating behavior.","locations":[{"ref":"core/src/time.rs:18-30","code":"   18 | pub fn minutes(minutes: u64) -> Duration {\n   19 |     seconds(minutes * 60)\n   20 | }\n   21 | \n   22 | /// Creates a [`Duration`] representing the given amount of hours.\n   23 | pub fn hours(hours: u64) -> Duration {\n   24 |     minutes(hours * 60)\n   25 | }\n   26 | \n   27 | /// Creates a [`Duration`] representing the given amount of days.\n   28 | pub fn days(days: u64) -> Duration {\n   29 |     hours(days * 24)\n   30 | }","lines":13}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`time::repeat` drives `stream::unfold(0, move |i| ... Some((f().await, i + 1)))`. The accumulator `i` is an unconstrained integer literal that defaults to `i32`. After `i32::MAX` iterations `i + 1` overflows: panic in debug builds, wraparound to a negative value in release (which then makes the `if i > 0` sleep guard behave incorrectly, busy-running `f()` without delay once it wraps to a non-positive value). Same bug in both the tokio and smol backends.","fix":"The counter only needs to distinguish 'first tick' from 'later ticks'. Use a bool accumulator (`unfold(false, ...)`) or `usize` with `saturating_add(1)`, eliminating the overflow entirely.","locations":[{"ref":"futures/src/backend/native/tokio.rs:68-75","code":"   68 |             stream::unfold(0, move |i| async move {\n   69 |                 if i > 0 {\n   70 |                     tokio::time::sleep(interval).await;\n   71 |                 }\n   72 | \n   73 |                 Some((f().await, i + 1))\n   74 |             })\n   75 |         })","lines":8},{"ref":"futures/src/backend/native/smol.rs:54-60","code":"   54 |             stream::unfold(0, move |i| async m
