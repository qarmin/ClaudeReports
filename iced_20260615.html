                     new_size.0 * internal.hint_factor,\n  567 |                     new_line_height.0 * internal.hint_factor,\n  568 |                 ));","lines":10}]},{"id":"LOGIC_75","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `change_line`, the boundary test `snapshot <= self.caches.len()` admits the case `snapshot == self.caches.len()`, where `self.caches.truncate(snapshot)` is a no-op (truncate only shrinks) and the code then pushes a duplicate of the last cache, growing the cache vector by one with a redundant entry and leaving `current_line` set to `snapshot * LINES_PER_SNAPSHOT` even though no new snapshot boundary state was actually saved. Combined with `truncate(snapshot)` dropping the snapshot's own starting state (index `snapshot`), the retained state can be one snapshot earlier than intended. This matches upstream iced behavior and is not a hard panic, but it is fragile index math worth tightening.","fix":"Use `if snapshot < self.caches.len()` and `self.caches.truncate(snapshot + 1)` so the snapshot's own boundary state is retained and a duplicate is not pushed when snapshot equals the length.","locations":[{"ref":"highlighter/src/lib.rs:66-85","code":"   66 |     fn change_line(&mut self, line: usize) {\n   67 |         let snapshot = line / LINES_PER_SNAPSHOT;\n   68 | \n   69 |         if snapshot <= self.caches.len() {\n   70 |             self.caches.truncate(snapshot);\n   71 |             self.current_line = snapshot * LINES_PER_SNAPSHOT;\n   72 |         } else {\n   73 |             self.caches.truncate(1);\n   74 |             self.current_line = 0;\n   75 |         }\n   76 | \n   77 |         let (parser, stack) = self.caches.last().cloned().unwrap_or_else(|| {\n   78 |             (\n   79 |                 parsing::ParseState::new(self.syntax),\n   80 |                 parsing::ScopeStack::new(),\n   81 |             )\n   82 |         });\n   83 | \n   84 |         self.caches.push((parser, stack));\n   85 |     }","lines":20}]},{"id":"LOGIC_76","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The default `title()` implementation tries to capitalize the first letter of each name part via `part.get_mut(0..1)`. `str::get_mut(0..1)` returns `None` when byte index 1 is not a UTF-8 char boundary, i.e. whenever the first character is a multi-byte (non-ASCII) character. In that case the part is left entirely un-capitalized rather than capitalizing the first character. For an ASCII-only program name this is fine, but for names beginning with a non-ASCII letter the intended capitalization is silently skipped.","fix":"Capitalize by char instead of by byte, e.g. take `part.chars()`, uppercase the first `char`, and rebuild the string, or use `char_indices` to find the first char boundary before slicing.","locations":[{"ref":"program/src/lib.rs:71-73","code":"   71 |                     if let Some(first_letter) = part.get_mut(0..1) {\n   72 |                         first_letter.make_ascii_uppercase();\n   73 |                     }","lines":3}]},{"id":"LOGIC_77","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Task::then` (and therefore `map`, `discard`, `and_then`) propagates only `self.units` and discards the work units of the tasks returned by the closure `f`. Tasks produced inside `then` contribute nothing to the reported unit count, so `Task::units()` under-reports the total amount of work for any chained/mapped task. This skews any progress/spinner UI that relies on `units()`.","fix":"Document that `then` cannot know the units of dynamically produced tasks, or track units at runtime as sub-streams are flattened. At minimum the limitation should be acknowledged so callers do not rely on a stable unit count across `then`.","locations":[{"ref":"runtime/src/task.rs:135-149","code":"  135 |         Task {\n  136 |             stream: match self.stream {\n  137 |                 None => None,\n  138 |                 Some(stream) => Some(boxed_stream(stream.flat_map(move |action| {\n  139 |                     match action.output() {\n  140 |                         Ok(output) => f(output)\n  141 |                             .stream\n  142 |                             .unwrap_or_else(|| boxed_stream(stream::empty())),\n  143 |                         Err(action) => boxed_stream(stream::once(async move { action })),\n  144 |                     }\n  145 |                 }))),\n  146 |             },\n  147 |             units: self.units,\n  148 |         }\n  149 |     }","lines":15}]},{"id":"LOGIC_78","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"After the overlay event loop, `self.overlay = Some(Overlay { layout, interaction })` is set unconditionally even when the overlay was closed during the loop (`maybe_overlay` is `None` after the `break`). This stores a phantom overlay carrying a stale layout for an overlay that no longer exists. It happens to be harmless in `draw` (which re-queries `root.overlay()` and finds `None`), but it leaves `UserInterface` in an inconsistent state and is fragile for any future code that trusts `self.overlay`.","fix":"Only set `self.overlay = Some(...)` when `maybe_overlay.is_some()`; otherwise set `self.overlay = None`.","locations":[{"ref":"runtime/src/user_interface.rs:303-306","code":"  303 |             self.overlay = Some(Overlay {\n  304 |                 layout,\n  305 |                 interaction,\n  306 |             });","lines":4}]},{"id":"LOGIC_79","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The reported line number for an invalid instruction is off by one. metadata.lines().count() counts\nthe metadata lines (e.g. 3: viewport, mode, preset). Adding `+ 1` accounts only for the single `-`\nconsumed by split_once, but the real file has a full `-----` separator line and the first\ninstruction sits one line lower than computed. With the example syntax the first instruction is on\nfile line 5 but the error reports line 4 (the separator line). Misleads users debugging tests.","fix":"Compute the instruction's true file line using the byte offset of `rest` within `content` (e.g. count newlines before `rest`), or track the separator length precisely instead of hardcoding `+ 1`.","locations":[{"ref":"test/src/ice.rs:127-138","code":"  127 |         let instructions = rest\n  128 |             .lines()\n  129 |             .skip(1)\n  130 |             .enumerate()\n  131 |             .map(|(i, line)| {\n  132 |                 Instruction::parse(line).map_err(|error| ParseError::InvalidInstruction {\n  133 |                     line: metadata.lines().count() + 1 + i,\n  134 |                     instruction: line.to_owned(),\n  135 |                     error,\n  136 |                 })\n  137 |             })\n  138 |             .collect::<Result<Vec<_>, _>>()?;","lines":12}]},{"id":"LOGIC_80","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the Tester `Playing` state, on each `Ready` the code increments `current`, dispatches\n`instructions[current-1]`, and then immediately sets `outcome = Success` whenever\n`current >= instructions.len()`. For the final instruction this marks the test Success before that\ninstruction's own result (Ready/Failed) has come back from the emulator. If the last instruction\nlater fails, the subsequent `Failed` event overwrites it to Failed, so the final outcome is correct,\nbut the UI flashes Success prematurely and a genuine last-step failure is briefly misreported.","fix":"Only mark Success once the instruction iterator is exhausted AND the last instruction's Ready has been received, e.g. detect `self.instructions.get(*current - 1).is_none()` (no more instructions to run) before setting Success, rather than `*current >= len` on the same Ready that dispatched the last instruction.","locations":[{"ref":"tester/src/lib.rs:452-462","code":"  452 |                         emulator::Event::Ready => {\n  453 |                             *current += 1;\n  454 | \n  455 |                             if let Some(instruction) = self.instructions.get(*current - 1) {\n  456 |                                 emulator.run(program, instruction);\n  457 |                             }\n  458 | \n  459 |                             if *current >= self.instructions.len() {\n  460 |                                 *outcome = Outcome::Success;\n  461 |                             }\n  462 |                         }","lines":11}]},{"id":"LOGIC_81","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"smoothstep divides by (b - a). For a shadow with blur_radius == 0 (still drawn because color.a > 0), a == b == 0, producing 0.0/0.0 = NaN; clamp(NaN, 0, 1) yields NaN, so shadow_alpha = 1 - NaN = NaN and the shadow color becomes garbage/undefined.","fix":"In smoothstep, guard against b == a (return 0.0 or 1.0 based on sign of x-a), or skip the shadow pass entirely when blur_radius == 0 (treat it as a hard-edged fill).","locations":[{"ref":"tiny_skia/src/engine.rs:102-107","code":"  102 |                         let shadow_alpha = 1.0\n  103 |                             - smoothstep(\n  104 |                                 -shadow.blur_radius * transformation.scale_factor(),\n  105 |                                 shadow.blur_radius * transformation.scale_factor(),\n  106 |                                 shadow_distance,\n  107 |                             );","lines":6},{"ref":"tiny_skia/src/engine.rs:756-760","code":"  756 | fn smoothstep(a: f32, b: f32, x: f32) -> f32 {\n  757 |     let x = ((x - a) / (b - a)).clamp(0.0, 1.0);\n  758 | \n  759 |     x * x * (3.0 - 2.0 * x)\n  760 | }","lines":5}]},{"id":"LOGIC_82","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the non-simple-border branch the temporary pixmap and mask are sized from the UNSCALED quad.bounds (quad.bounds.width/height as u32) but the stroke is drawn with the scaled `transform` and the result blitted at quad.bounds.x/y with that same transform. Under a scale_factor > 1 the temp pixmap is too small for the scaled border, clipping the rounded corners; under scale < 1 it wastes space. Border rendering for non-simple radii is therefore wrong at non-unity scale factors.","fix":"Size temp_pixmap and quad_mask from the physical (scaled) bounds, build the mask/stroke paths in physical space (or pre-apply scale to the bounds), and blit at the physical origin with an identity transform.","locations":[{"ref":"tiny_skia/src/engine.rs:229-280","code":"  229 |             } else {\n  230 |                 // Draw corners that have too small border radii as having no border radius,\n  231 |                 // but mask them with the rounded rectangle with the correct border radius.\n  232 |                 let mut temp_pixmap =\n  233 |                     tiny_skia::Pixmap::new(quad.bounds.width as u32, quad.bounds.height as u32)\n  234 |                         .unwrap();\n  235 | \n  236 |                 let mut quad_mask =\n  237 |                     tiny_skia::Mask::new(quad.bounds.width as u32, quad.bounds.height as u32)\n  238 |                         .unwrap();\n  239 | \n  240 |                 let zero_bounds = Rectangle {\n  241 |                     x: 0.0,\n  242 |                     y: 0.0,\n  243 |                     width: quad.bounds.width,\n  244 |                     height: quad.bounds.height,\n  245 |                 };\n  246 |                 let path = rounded_rectangle(zero_bounds, fill_border_radius);\n  247 | \n  248 |                 quad_mask.fill_path(&path, tiny_skia::FillRule::EvenOdd, true, transform);\n  249 |                 let path_bounds = Rectangle {\n  250 |                     x: border_width / 2.0,\n  251 |                     y: border_width / 2.0,\n  252 |                     width: quad.bounds.width - border_width,\n  253 |                     height: quad.bounds.height - border_width,\n  254 |                 };\n  255 | \n  256 |                 let border_radius_path = rounded_rectangle(path_bounds, border_radius);\n  257 | \n  258 |                 temp_pixmap.stroke_path(\n  259 |                     &border_radius_path,\n  260 |                     &tiny_skia::Paint {\n  261 |                         shader: tiny_skia::Shader::SolidColor(into_color(quad.border.color)),\n  262 |                         anti_alias: true,\n  263 |                         ..tiny_skia::Paint::default()\n  264 |                     },\n  265 |                     &tiny_skia::Stroke {\n  266 |                         width: border_width,\n  267 |                         ..tiny_skia::Stroke::default()\n  268 |                     },\n  269 |                     transform,\n  270 |                     Some(&quad_mask),\n  271 |                 );\n  272 | \n  273 |                 pixels.draw_pixmap(\n  274 |                     quad.bounds.x as i32,\n  275 |                     quad.bounds.y as i32,\n  276 |                     temp_pixmap.as_ref(),\n  277 |                     &tiny_skia::PixmapPaint::default(),\n  278 |                     transform,\n  279 |                     clip_mask,\n  280 |                 );","lines":52}]},{"id":"LOGIC_83","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"GlyphCache::trim shrinks the maps to CAPACITY_LIMIT (16K) but the trigger condition `recently_used.len() >= CAPACITY_LIMIT` means trimming only fires after the cache already reached the limit; combined with the TRIM_INTERVAL counter, between trims the entries map can grow unbounded if more than 16K distinct glyph keys are produced within TRIM_INTERVAL frames, since retain only runs at trim time. Not a leak (cleared eventually) but the 'CAPACITY_LIMIT' is not an actual cap on gr  316 |                             atlas_entry,\n  317 |                             &mut self.nearest_instances,\n  318 |                         );","lines":9}]},{"id":"LOGIC_85","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`State::render` (image) silently does nothing when the requested layer index is out of range (`self.layers.get(layer)` returns None). Combined with `prepare` incrementing `prepare_layer` only on success and `trim` resetting it, a mismatch between the layer index requested by the compositor and the prepared layers results in missing images with no diagnostic. This mirrors the text path where a similar mismatch instead indexes `self.renderers[start + layer_count]` directly (which would panic). The two paths handle the same class of desync inconsistently.","fix":"Make the two paths consistent: either both bounds-check and log on desync, or document the invariant. Prefer a checked access with a debug log in the text path to avoid a panic.","locations":[{"ref":"wgpu/src/image/mod.rs:351-357","code":"  351 |         if let Some(layer) = self.layers.get(layer) {\n  352 |             render_pass.set_pipeline(&pipeline.raw);\n  353 | \n  354 |             render_pass.set_scissor_rect(bounds.x, bounds.y, bounds.width, bounds.height);\n  355 | \n  356 |             layer.render(render_pass);\n  357 |         }","lines":7},{"ref":"wgpu/src/text.rs:402-402","code":"  402 |                     let renderer = &self.renderers[start + layer_count];","lines":1}]},{"id":"LOGIC_86","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`viewport_dimensions` and the SVG upload use `size.width() as u32` (and `Pixmap::new(size.width, size.height)`) without guarding against zero. If an SVG reports a zero (or sub-pixel rounding-to-zero) viewport, `Pixmap::new(0, ...)` returns None and `upload` returns None (handled), but `viewport_dimensions` can return `Size::new(0, 0)`, which then flows into `measure_svg` and downstream layout/scaling (`bounds.width / size.width`) producing NaN/Inf or zero-area allocations.","fix":"Clamp reported viewport dimensions to a minimum of 1 (as the NotFound branch already does): `Size::new((size.width() as u32).max(1), (size.height() as u32).max(1))`.","locations":[{"ref":"wgpu/src/image/vector.rs:22-31","code":"   22 |     pub fn viewport_dimensions(&self) -> Size<u32> {\n   23 |         match self {\n   24 |             Svg::Loaded(tree) => {\n   25 |                 let size = tree.size();\n   26 | \n   27 |                 Size::new(size.width() as u32, size.height() as u32)\n   28 |             }\n   29 |             Svg::NotFound => Size::new(1, 1),\n   30 |         }\n   31 |     }","lines":10}]},{"id":"LOGIC_87","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Storage::prepare` for a freshly inserted (vacant) mesh upload sets `version: 0` unconditionally rather than\n`cache.version()`. On the next frame the occupied branch compares `upload.version != cache.version()`; if the\ncache's real version happens to already be 0 this is fine, but if a cache is inserted while its version is\nnon-zero, the upload is recorded as version 0, so the very next frame re-uploads the identical data once\nneedlessly (version mismatch 0 vs real). Minor wasted GPU upload, not a correctness bug, but the asymmetry\n(insert uses 0, the occupied branch later stores `cache.version()`) is a latent inconsistency.","fix":"Set `version: cache.version()` when inserting the new `Upload`, matching the occupied-branch update.","locations":[{"ref":"wgpu/src/triangle.rs:102-107","code":"  102 |                 let _ = entry.insert(Upload {\n  103 |                     layer,\n  104 |                     transformation: new_transformation,\n  105 |                     version: 0,\n  106 |                     batch: cache.batch().clone(),\n  107 |                 });","lines":6}]},{"id":"LOGIC_88","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Canvas::draw` early-returns when `bounds.width < 1.0 || bounds.height < 1.0`, but `Shader::draw` has no such guard and unconditionally calls `renderer.draw_primitive` for zero/sub-pixel bounds. Inconsistent handling; sub-pixel shader bounds may produce degenerate or wasted GPU work.","fix":"Add the same `if bounds.width < 1.0 || bounds.height < 1.0 { return; }` guard to `Shader::draw`, or document why the shader path intentionally renders sub-pixel bounds.","locations":[{"ref":"widget/src/canvas.rs:286-288","code":"  286 |         if bounds.width < 1.0 || bounds.height < 1.0 {\n  287 |             return;\n  288 |         }","lines":3},{"ref":"widget/src/shader.rs:129-143","code":"  129 |     fn draw(\n  130 |         &self,\n  131 |         tree: &widget::Tree,\n  132 |         renderer: &mut Renderer,\n  133 |         _theme: &Theme,\n  134 |         _style: &renderer::Style,\n  135 |         layout: Layout<'_>,\n  136 |         cursor_position: mouse::Cursor,\n  137 |         _viewport: &Rectangle,\n  138 |     ) {\n  139 |         let bounds = layout.bounds();\n  140 |         let state = tree.state.downcast_ref::<P::State>();\n  141 | \n  142 |         renderer.draw_primitive(bounds, self.program.draw(state, cursor_position, bounds));\n  143 |     }","lines":15}]},{"id":"LOGIC_89","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ComboBox initializes `hovered_option` to `Some(0)` in `state()` and resets it to `Some(0)` on every text change, but never validates it against the (possibly now shorter) filtered list before it is used for the focus-time `on_option_hovered` publish. The reads are guarded by `.get(index)` so there is no panic, but a `Some(0)` on an empty filtered list represents a phantom hover that simply produces no message; combined with the wraparound logic this means after filtering down to zero matches the hovered index is a stale 0. Minor, but the index is never cleared to `None` when the filtered list becomes empty.","fix":"When the filtered list is empty set `hovered_option = None`; otherwise clamp it into `0..filtered_options.len()` so navigation resumes from a valid position.","locations":[{"ref":"widget/src/combo_box.rs:523-530","code":"  523 |     fn state(&self) -> widget::tree::State {\n  524 |         widget::tree::State::new(Menu::<T> {\n  525 |             menu: menu::State::new(),\n  526 |             filtered_options: Filtered::empty(),\n  527 |             hovered_option: Some(0),\n  528 |             new_selection: None,\n  529 |         })\n  530 |     }","lines":8},{"ref":"widget/src/combo_box.rs:593-602","code":"  593 |             self.state.with_inner_mut(|state| {\n  594 |                 menu.hovered_option = Some(0);\n  595 |                 state.value = new_value;\n  596 | \n  597 |                 state.filtered_options.update(\n  598 |                     search(&self.state.options, &state.option_matchers, &state.value)\n  599 |                         .cloned()\n  600 |                         .collect(),\n  601 |                 );\n  602 |             });","lines":10}]},{"id":"LOGIC_90","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The ArrowDown / Tab match arm `(key::Named::ArrowDown, _) | (key::Named::Tab, false) if !modifiers.shift()` carries a redundant-yet-also-overbroad guard. The tuple already matches on `shift_modifier` via the second element, but the arm uses `_` for ArrowDown and additionally guards the whole arm with `if !modifiers.shift()`. This means ArrowDown with Shift held falls through to `_ => {}` and does nothing, which is inconsistent with ArrowUp (which matches `(ArrowUp, _)` and works regardless of Shift). Shift+ArrowDown is silently ignored while Shift+ArrowUp navigates.","fix":"Make ArrowDown behave symmetrically with ArrowUp: match `(key::Named::ArrowDown, _) | (key::Named::Tab, false)` and drop the extra `if !modifiers.shift()` guard, since the tuple's second element already distinguishes Tab-with-shift from Tab-without-shift.","locations":[{"ref":"widget/src/combo_box.rs:644-644","code":"  644 |                         (key::Named::ArrowUp, _) | (key::Named::Tab, true) => {","lines":1},{"ref":"widget/src/combo_box.rs:668-669","code":"  668 |                         (key::Named::ArrowDown, _) | (key::Named::Tab, false)\n  669 |                             if !modifiers.shift() =>","lines":2}]},{"id":"LOGIC_91","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Float::layout returns the content's intrinsic layout unchanged and Float::diff/size/state all delegate to content, but when `is_floating()` is true the widget's `update`, `draw` and `mouse_interaction` early-return and rely solely on the overlay. `is_floating` is evaluated against `layout.bounds()`/`viewport` in those methods while the overlay path re-evaluates `translate(bounds + offset, viewport)`. Because the in-place methods pass raw `layout.bounds()` (no parent offset) and the overlay passes `bounds + offset`, a `translate` closure that depends on absolute position can disagree: the in-place path may consider it non-floating (drawing/handling in place) while the overlay also draws it, or vice-versa, causing double-draw or a dead (non-interactive) widget.","fix":"Compute the floating decision once from the same bounds (including parent offset) used by the overlay, or store it in widget state during layout, so the in-place methods and the overlay path never disagree.","locations":[{"ref":"widget/src/float.rs:73-79","code":"   73 |     fn is_floating(&self, bounds: Rectangle, viewport: Rectangle) -> bool {\n   74 |         self.scale > 1.0\n   75 |             || self\n   76 |                 .translate\n   77 |                 .as_ref()\n   78 |                 .is_some_and(|translate| translate(bounds, viewport) != Vector::ZERO)\n   79 |     }","lines":7},{"ref":"widget/src/float.rs:123-130","code":"  123 |         if self.is_floating(layout.bounds(), *viewport) {\n  124 |             return;\n  125 |         }\n  126 | \n  127 |         self.content\n  128 |             .as_widget_mut()\n  129 |             .update(tree, event, layout, cursor, renderer, shell, viewport);\n  130 |     }","lines":8},{"ref":"widget/src/float.rs:204-211","code":"  204 |         let bounds = layout.bounds();\n  205 | \n  206 |         let translation = self\n  207 |             .translate\n  208 |             .as_ref()\n  209 |             .map(|translate| translate(bounds + offset, *viewport))\n  210 |             .unwrap_or(Vector::ZERO);\n  211 | ","lines":8}]},{"id":"LOGIC_92","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Float::Overlay::index returns `self.float.scale * 0.5` as the overlay z-index hint. For a Float that floats only due to `translate` (scale left at the default 1.0) this yields 0.5, the same constant for every such float regardless of intended stacking, and for scale < 1.0 (allowed by the `scale(f32)` setter, only `> 1.0` triggers floating but a translate-only float may still have an arbitrary scale set) it can be near 0, potentially ordering a floating element below non-floating content.","fix":"Return a meaningful, monotonic index (e.g. a fixed high constant for floats, or derive it from layering needs) rather than scaling by 0.5; document why 0.5 is chosen if intentional.","locations":[{"ref":"widget/src/float.rs:358-360","code":"  358 |     fn index(&self) -> f32 {\n  359 |         self.float.scale * 0.5\n  360 |     }","lines":3}]},{"id":"LOGIC_93","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Grid::layout's `Constraint::MaxWidth` computes `cells_per_row = ((available.width + spacing) / (pixels.0 + spacing)).ceil() as usize`. Using `ceil` means each cell is allowed to become NARROWER than the requested `max_width` is never violated, but it actually produces MORE columns than fit at exactly max_width (ceil rounds up the column count), so the resulting `cell_width` can be smaller than intended and, with very large/unbounded `available.width`, the cast `inf/NaN as usize` saturates to usize::MAX, after which `self.spacing * (cells_per_row - 1)` overflows to inf and cell sizes become NaN.","fix":"Use `.floor()` (or `.max(1.0)` then floor) so columns never get narrower than `max_width`, and clamp `cells_per_row` to a sane upper bound (e.g. `children.len()`) to avoid the saturating-cast overflow when width is unbounded.","locations":[{"ref":"widget/src/grid.rs:176-178","code":"  176 |             Constraint::MaxWidth(pixels) => {\n  177 |                 ((available.width + self.spacing) / (pixels.0 + self.spacing)).ceil() as usize\n  178 |             }","lines":3},{"ref":"widget/src/grid.rs:186-187","code":"  186 |         let cell_width =\n  187 |             (available.width - self.spacing * (cells_per_row - 1) as f32) / cells_per_row as f32;","lines":2}]},{"id":"LOGIC_94","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Viewer::update`'s `CursorMoved` pan clamps the offset to `hidden_width`/`hidden_height` computed as `(scaled_size.width - bounds.width / 2.0).max(0.0)`, i.e. it subtracts only HALF of the viewport width. The same half-bounds formula is duplicated in `State::offset`. Subtracting half the bounds (instead of the full bounds, or `(scaled - bounds)/2`) lets the user pan the image until only the viewport center is covered, allowing roughly a quarter of the viewport to show empty space past the image edges. This looks like an off-by-factor error in the visible-region math.","fix":"The maximum hidden extent should be `(scaled_size.width - bounds.width).max(0.0) / 2.0` (half of the overflow), not `scaled_size.width - bounds.width / 2.0`. Fix both the inline computation and `State::offset` consistently.","locations":[{"ref":"widget/src/image/viewer.rs:245-247","code":"  245 |                     let hidden_width = (scaled_size.width - bounds.width / 2.0).max(0.0).round();\n  246 | \n  247 |                     let hidden_height = (scaled_size.height - bounds.height / 2.0).max(0.0).round();","lines":3},{"ref":"widget/src/image/viewer.rs:377-379","code":"  377 |         let hidden_width = (image_size.width - bounds.width / 2.0).max(0.0).round();\n  378 | \n  379 |         let hidden_height = (image_size.height - bounds.height / 2.0).max(0.0).round();","lines":3}]},{"id":"LOGIC_95","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Keyed column's draw iterates all children and draws them unconditionally, unlike the plain `column`/`row`/`grid` whose draw filters children by `layout.bounds().intersects(viewport)` and honors `clip`. For a long keyed_column (the documented use case is `0..=100` items and larger) every off-screen child is drawn each frame, a measurable performance regression versus the equivalent non-keyed column.","fix":"Mirror column::draw: intersect `layout.bounds()` with the viewport and `filter(|(_, layout)| layout.bounds().intersects(viewport))` before drawing.","locations":[{"ref":"widget/src/keyed/column.rs:331-351","code":"  331 |     fn draw(\n  332 |         &self,\n  333 |         tree: &Tree,\n  334 |         renderer: &mut Renderer,\n  335 |         theme: &Theme,\n  336 |         style: &renderer::Style,\n  337 |         layout: Layout<'_>,\n  338 |         cursor: mouse::Cursor,\n  339 |         viewport: &Rectangle,\n  340 |     ) {\n  341 |         for ((child, state), layout) in self\n  342 |             .children\n  343 |             .iter()\n  344 |             .zip(&tree.children)\n  345 |             .zip(layout.children())\n  346 |         {\n  347 |             child\n  348 |                 .as_widget()\n  349 |                 .draw(state, renderer, theme, style, layout, cursor, viewport);\n  350 |         }\n  351 |     }","lines":21}]},{"id":"LOGIC_96","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `push_str`, when the accumulated leftover ends with `|` (a table row being typed), the trailing `|` is stripped before parsing (`input`), and `leftover[input.len()..]` (the stripped `|` plus any trailing whitespace) is pushed back as the new leftover. But `produce` may also set `state.leftover = markdown[source.start..]` (line 599) during parsing of `input`, and line 134 then *appends* the stripped suffix to that. If a top-level item was produced, leftover becomes `last_item_tail + \"|\"`; if not, it is just the stripped suffix. The two sources of leftover are concatenated without a clear invariant, which can duplicate or misorder buffered text across successive `push_str` calls in streaming scenarios.","fix":"Unify leftover accounting: either `produce` owns leftover entirely or `push_str` does, not both. Add tests that stream a table row split across multiple `push_str` chunks.","locations":[{"ref":"widget/src/markdown.rs:110-134","code":"  110 |         let input = if leftover.trim_end().ends_with('|') {\n  111 |             leftover.trim_end().trim_end_matches('|')\n  112 |         } else {\n  113 |             leftover.as_str()\n  114 |         };\n  115 | \n  116 |         // Pop the last item\n  117 |         let _ = self.items.pop();\n  118 | \n  119 |         // Re-parse last item and new text\n  120 |         for (item, source, broken_links) in parse_with(&mut self.state, input) {\n  121 |             if !broken_links.is_empty() {\n  122 |                 let _ = self.incomplete.insert(\n  123 |                     self.items.len(),\n  124 |                     Section {\n  125 |                         content: source.to_owned(),\n  126 |                         broken_links,\n  127 |                     },\n  128 |                 );\n  129 |             }\n  130 | \n  131 |             self.items.push(item);\n  132 |         }\n  133 | \n  134 |         self.state.leftover.push_str(&leftover[input.len()..]);","lines":25},{"ref":"widget/src/markdown.rs:598-606","code":"  598 |         } else {\n  599 |             state.leftover = markdown[source.start..].to_owned();\n  600 | \n  601 |             Some((\n  602 |                 item,\n  603 |                 &markdown[source.start..source.end],\n  604 |                 broken_links.take(),\n  605 |             ))\n  606 |         }","lines":9}]},{"id":"LOGIC_97","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the non-highlighter code-block text path, each line span is built with the current `strong`, `emphasis`, `strikethrough`, and `link` inline-formatting flags. Inside a fenced code block these inline flags should not apply (pulldown-cmark does not emit Strong/Emphasis inside code, but `link` and the table-head `strong=true` can still be active when a code block is entered, e.g. a code block inside a table cell), so code lines may be rendered bold/linked incorrectly. The highlighter path (line 906-910) correctly ignores these flags.","fix":"Hard-code `strong=false, emphasis=false, strikethrough=false, link=None` for code-block line spans, matching the semantics of code content.","locations":[{"ref":"widget/src/markdown.rs:912-922","code":"  912 |                 #[cfg(not(feature = \"highlighter\"))]\n  913 |                 for line in text.lines() {\n  914 |                     code_lines.push(Text::new(vec![Span::Standard {\n  915 |                         text: line.to_owned(),\n  916 |                         strong,\n  917 |                         emphasis,\n  918 |                         strikethrough,\n  919 |                         link: link.clone(),\n  920 |                         code: false,\n  921 |                     }]));\n  922 |                 }","lines":11}]},{"id":"LOGIC_98","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"grid_interaction (the resize-cursor hover detection) recomputes split_regions and probes hovered_split, but only when on_resize is set; that is correct. However the returned interaction maps Axis::Horizontal -> ResizingVertically and Axis::Vertical -> ResizingHorizontally. This inversion is intentional (a horizontal split is dragged vertically), but it is unexplained and is the kind of mapping that invites a future copy-paste regression. Worth an inline comment to prevent an 'obvious fix' that breaks it.","fix":"Add a one-line comment explaining that a Horizontal axis split (top/bottom) is resized by vertical cursor movement, hence ResizingVertically, and vice versa.","locations":[{"ref":"widget/src/pane_grid.rs:327-332","code":"  327 |         if let Some(resize_axis) = resize_axis {\n  328 |             return Some(match resize_axis {\n  329 |                 Axis::Horizontal => mouse::Interaction::ResizingVertically,\n  330 |                 Axis::Vertical => mouse::Interaction::ResizingHorizontally,\n  331 |             });\n  332 |         }","lines":6}]},{"id":"LOGIC_99","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the maximized state, on_drag and on_resize are disabled at builder time (on_drag/on_resize early-out when internal.maximized().is_some()), and PaneGrid::layout collapses non-maximized panes to Size::ZERO. But `layout` still calls `content.layout(...)` for the maximized pane with `Limits::new(size, size)` where size comes from `regions.get(pane)`. The region map is computed from `self.internal.layout()` which, when maximized, returns `Cow::Owned(Node::Pane(pane))` (a single-pane tree) - so regions contains only the maximized pane and `regions.get(pane)` succeeds. For every non-maximized pane the closure returns Size::ZERO before the lookup, so no panic. This is correct but relies on a subtle interaction between Internal::layout() returning a single-pane node and the filter; if Internal::layout() and the maximized filter ever diverge, regions.get returns None and the pane is silently dropped from layout (filter_map), desyncing children count from tree/contents.","fix":"Document the coupling, or make the maximized handling explicit in one place (e.g. layout only the maximized pane full-size and skip others) rather than relying on regions derived from the maximized single-pane node combined with the per-pane filter.","locations":[{"ref":"widget/src/pane_grid.rs:404-432","code":"  404 |         let regions = self\n  405 |             .internal\n  406 |             .layout()\n  407 |             .pane_regions(self.spacing, self.min_size, bounds);\n  408 | \n  409 |         let children = self\n  410 |             .panes\n  411 |             .iter_mut()\n  412 |             .zip(&mut self.contents)\n  413 |             .zip(tree.children.iter_mut())\n  414 |             .filter_map(|((pane, content), tree)| {\n  415 |                 if self\n  416 |                     .internal\n  417 |                     .maximized()\n  418 |                     .is_some_and(|maximized| maximized != *pane)\n  419 |                 {\n  420 |                     return Some(layout::Node::new(Size::ZERO));\n  421 |                 }\n  422 | \n  423 |                 let region = regions.get(pane)?;\n  424 |                 let size = Size::new(region.width, region.height);\n  425 | \n  426 |                 let node = content.layout(tree, renderer, &layout::Limits::new(size, size));\n  427 | \n  428 |                 Some(node.move_to(Point::new(region.x, region.y)))\n  429 |             })\n  430 |             .collect();\n  431 | \n  432 |         layout::Node::with_children(bounds, children)","lines":29}]},{"id":"LOGIC_100","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Axis::split can produce negative pane dimensions when the available space is smaller than the sum of the two minimum sizes plus spacing  If the region passed in has a zero dimension (e.g. a collapsed/empty grid, or a degenerate region produced by the negative-size issue above), the division yields NaN/Inf. That NaN ratio is then stored back via resize/hash and used in subsequent layout math, corrupting the layout. No guard against zero-size regions exists.","fix":"Guard against zero dimension before dividing: if `rectangle.height <= 0.0` (resp. width) return the input ratio unchanged or 0.5, instead of computing `x / 0.0`.","locations":[{"ref":"widget/src/pane_grid/axis.rs:32-32","code":"   32 |                 let ratio = (height_top + spacing / 2.0) / rectangle.height;","lines":1},{"ref":"widget/src/pane_grid/axis.rs:55-55","code":"   55 |                 let ratio = (width_left + spacing / 2.0) / rectangle.width;","lines":1}]},{"id":"LOGIC_102","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Node::resize returns a bool indicating whether the split was found, but State::resize discards it with `let _ =`. Resizing a non-existent / stale Split id is therefore a silent no-op with no feedback. Combined with the lack of ratio clamping, a caller passing a wrong Split gets no indication the operation did nothing.","fix":"Either return the bool from State::resize so callers can detect a missing split, or document that resize silently ignores unknown splits. At minimum keep the return value usefully exposed.","locations":[{"ref":"widget/src/pane_grid/state.rs:283-283","code":"  283 |         let _ = self.internal.layout.resize(split, ratio);","lines":1}]},{"id":"LOGIC_103","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ProgressBar::draw` does not guard `self.value` against NaN, and `range_start >= range_end` is the only special-case. If `value` is NaN (callers pass an arbitrary `f32`; the constructor clamps via `value.clamp(start, end)` but `f32::clamp` returns NaN when the input is NaN), then `active_progress_length` becomes NaN, `active_progress_length > 0.0` is `false`, so the bar simply never draws its fill — a silent rendering failure rather than a clamped value. The constructor's clamp gives a false sense of safety.","fix":"Sanitize in the constructor: replace NaN with `*range.start()` before clamping (e.g. `if value.is_nan() { *range.start() } else { value }.clamp(...)`).","locations":[{"ref":"widget/src/progress_bar.rs:78-81","code":"   78 |     pub fn new(range: RangeInclusive<f32>, value: f32) -> Self {\n   79 |         ProgressBar {\n   80 |             value: value.clamp(*range.start(), *range.end()),\n   81 |             range,","lines":4},{"ref":"widget/src/progress_bar.rs:184-201","code":"  184 |         let active_progress_length = if range_start >= range_end {\n  185 |             0.0\n  186 |         } else {\n  187 |             length * (self.value - range_start) / (range_end - range_start)\n  188 |         };\n  189 | \n  190 |         let style = theme.style(&self.class);\n  191 | \n  192 |         renderer.fill_quad(\n  193 |             renderer::Quad {\n  194 |                 bounds: Rectangle { ..bounds },\n  195 |                 border: style.border,\n  196 |                 ..renderer::Quad::default()\n  197 |             },\n  198 |             style.background,\n  199 |         );\n  200 | \n  201 |         if active_progress_length > 0.0 {","lines":18}]},{"id":"LOGIC_104","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Rule::layout` always lays out a vertical rule as `Length::Fill` height and a horizontal rule as `Length::Fill` width via `size()`. Combined with `FillMode::Percent`, when `percent` is negative or NaN the `fill` helper does not clamp the lower bound: `FillMode::Percent(-50.0)` computes `percent_width = (space * -0.5).round()` which is negative, and the centering offset `((space - percent_width) / 2.0)` then exceeds `space`, producing a rule drawn with negative width (clamped to the `snap` unit) but positioned outside its own bounds. The documented valid range is `[0.0, 100.0]` but nothing enforces or clamps the lower end.","fix":"Clamp `percent` to `[0.0, 100.0]` at the start of the `Percent` arm (`let percent = percent.clamp(0.0, 100.0);`) before computing `percent_width`.","locations":[{"ref":"widget/src/rule.rs:241-249","code":"  241 |             FillMode::Percent(percent) => {\n  242 |                 if percent >= 100.0 {\n  243 |                     (0.0, space)\n  244 |                 } else {\n  245 |                     let percent_width = (space * percent / 100.0).round();\n  246 | \n  247 |                     (((space - percent_width) / 2.0).round(), percent_width)\n  248 |                 }\n  249 |             }","lines":9}]},{"id":"LOGIC_105","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Scrollbar::scroll_percentage_y`/`scroll_percentage_x` divide by `(self.bounds.height - scroller.bounds.height)` / `(... width ...)`. The scroller size has a floor of 2.0px (`.max(2.0)` in `Scrollbars::new`) but the rail (`scrollbar_bounds`) height/width can be smaller than the scroller in degenerate layouts (very small viewport), making the denominator zero or negative and producing inf/NaN percentages. `scroll_y_to`/`scroll_x_to` clamp the result to 0..1, so it does not panic, but a NaN clamps unpredictably and dragging jumps.","fix":"Guard the divisor: if `bounds.height - scroller.bounds.height <= 0.0` return the clamped extreme (0.0 or 1.0) instead of dividing.","locations":[{"ref":"widget/src/scrollable.rs:1981-2010","code":" 1981 |         pub fn scroll_percentage_y(&self, grabbed_at: f32, cursor_position: Point) -> f32 {\n 1982 |             if let Some(scroller) = self.scroller {\n 1983 |                 let percentage =\n 1984 |                     (cursor_position.y - self.bounds.y - scroller.bounds.height * grabbed_at)\n 1985 |                         / (self.bounds.height - scroller.bounds.height);\n 1986 | \n 1987 |                 match self.alignment {\n 1988 |                     Anchor::Start => percentage,\n 1989 |                     Anchor::End => 1.0 - percentage,\n 1990 |                 }\n 1991 |             } else {\n 1992 |                 0.0\n 1993 |             }\n 1994 |         }\n 1995 | \n 1996 |         /// Returns the x-axis scrolled percentage from the cursor position.\n 1997 |         pub fn scroll_percentage_x(&self, grabbed_at: f32, cursor_position: Point) -> f32 {\n 1998 |             if let Some(scroller) = self.scroller {\n 1999 |                 let percentage =\n 2000 |                     (cursor_position.x - self.bounds.x - scroller.bounds.width * grabbed_at)\n 2001 |                         / (self.bounds.width - scroller.bounds.width);\n 2002 | \n 2003 |                 match self.alignment {\n 2004 |                     Anchor::Start => percentage,\n 2005 |                     Anchor::End => 1.0 - percentage,\n 2006 |                 }\n 2007 |             } else {\n 2008 |                 0.0\n 2009 |             }\n 2010 |         }","lines":30}]},{"id":"LOGIC_106","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Sensor::update` calls `self.on_hide.take()` to fire the hide message, which moves the message out of `self.on_hide`, leaving it `None`. Because `update` takes `&mut self`, if the same `Sensor` widget instance is reused across frames (e.g. retained outside the normal per-`view` rebuild, or if the tree is updated multiple times before a re-`view`), the hide handler is consumed and will never fire again. Unlike `on_show`/`on_resize` which are borrowed (`&self.on_show`), `on_hide` is destructively taken, which is an asymmetric and surprising treatment.","fix":"Borrow instead of taking: `if let Some(on_hide) = &self.on_hide { shell.publish(on_hide.clone()); }` (adding a `Message: Clone` bound), consistent with how `on_show`/`on_resize` are handled.","locations":[{"ref":"widget/src/sensor.rs:228-229","code":"  228 |                     } else if let Some(on_hide) = self.on_hide.take() {\n  229 |                         shell.publish(on_hide);","lines":2},{"ref":"widget/src/sensor.rs:224-226","code":"  224 |                     if *has_popped_in {\n  225 |                         if let Some(on_show) = &self.on_show {\n  226 |                             shell.publish(on_show(layout.bounds().size()));","lines":3}]},{"id":"LOGIC_107","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Both sliders divide by `step` without guarding against a zero step. `Slider::step` accepts any `AsPrimitive<f64>` and `VerticalSlider::step` accepts any `T`, so a caller can pass `0`. In `locate`, `(percent * (end - start) / step).round()` then yields `inf`/`NaN`; in `increment`/`decrement`, `(value.as_() / step).round()` does the same. `T::from_f64(NaN)` typically returns `None` (silently doing nothing) and `inf` produces wildly out-of-range values, so dragging or stepping a zero-step slider misbehaves rather than being a no-op. The clamp `value.min(end)` in `locate` does not catch `NaN` because `NaN.min(end)` returns `NaN`.","fix":"Treat `step <= 0.0` as a continuous slider: skip quantization and use the raw `percent`-derived value, or clamp `step` to a small positive minimum in the `step`/`shift_step` setters.","locations":[{"ref":"widget/src/slider.rs:281-284","code":"  281 |                     let steps = (percent * (end - start) / step).round();\n  282 |                     let value = steps * step + start;\n  283 | \n  284 |                     T::from_f64(value.min(end))","lines":4},{"ref":"widget/src/vertical_slider.rs:282-285","code":"  282 |                 let steps = (percent * (end - start) / step).round();\n  283 |                 let value = steps * step + start;\n  284 | \n  285 |                 T::from_f64(value.min(end))","lines":4}]},{"id":"LOGIC_108","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`locate` in both sliders clamps the computed value to the range end (`value.min(end)`) but never to the range start. This is safe only as long as the surrounding branch guarantees `percent >= 0`. It is, because the `cursor_position.x <= bounds.x` (horizontal) / `cursor_position.y >= bounds.y + bounds.height` (vertical) early-returns handle the low end. However the asymmetry (clamp high, not low) is fragile: a future change to the step grid (see the start-offset finding) could push the quantized value below `start`. The clamp should be symmetric for robustness.","fix":"Use `T::from_f64(value.clamp(start, end))` so the result is bounded on both ends regardless of step grid alignment.","locations":[{"ref":"widget/src/slider.rs:284-284","code":"  284 |                     T::from_f64(value.min(end))","lines":1},{"ref":"widget/src/vertical_slider.rs:285-285","code":"  285 |                 T::from_f64(value.min(end))","lines":1}]},{"id":"LOGIC_109","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In both sliders, `increment`/`decrement` quantize the current value to the step grid via `(value.as_() / step).round()` WITHOUT accounting for the range start offset, whereas `locate` quantizes relative to `start` (`steps * step + start`). When `range.start()` is not an integer multiple of `step` (e.g. range `0.5..=10.5` with step `1.0`), keyboard/scroll increments snap to a different grid than mouse dragging, so the reachable values differ depending on input method and may never hit the exact start/end. This affects both `slider.rs` and `vertical_slider.rs` identically.","fix":"Offset by the range start before quantizing, e.g. `let steps = ((value.as_() - start) / step).round();` and `let new_value = step * (steps + 1.0) + start;`, mirroring the grid used in `locate`.","locations":[{"ref":"widget/src/slider.rs:295-296","code":"  295 |                 let steps = (value.as_() / step).round();\n  296 |                 let new_value = step * (steps + 1.0);","lines":2},{"ref":"widget/src/slider.rs:312-313","code":"  312 |                 let steps = (value.as_() / step).round();\n  313 |                 let new_value = step * (steps - 1.0);","lines":2},{"ref":"widget/src/vertical_slider.rs:297-298","code":"  297 |             let steps = (value.as_() / step).round();\n  298 |             let new_value = step * (steps + 1.0);","lines":2},{"ref":"widget/src/vertical_slider.rs:315-316","code":"  315 |             let steps = (value.as_() / step).round();\n  316 |             let new_value = step * (steps - 1.0);","lines":2}]},{"id":"LOGIC_110","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Slider`/`VerticalSlider` `draw` cast values through `as f32` after converting `T -> f64` (`self.value.as_() as f32`, `start.as_() as f32`, `end.as_() as f32`). For large-magnitude `T` (e.g. `i64`/`u64`/`f64` ranges) this double-narrowing loses precision and, for values exceeding `f32::MAX`, yields `inf`, making `(value - range_start) / (range_end - range_start)` produce `NaN` and the handle offset `NaN` (handle drawn at an undefined position). The module docs only warn about `f64` precision, not the additional `f32` narrowing in rendering.","fix":"Compute the offset ratio in `f64` and only narrow the final pixel offset to `f32`, avoiding the intermediate `f64 -> f32` narrowing of each large value.","locations":[{"ref":"widget/src/slider.rs:440-451","code":"  440 |         let value = self.value.as_() as f32;\n  441 |         let (range_start, range_end) = {\n  442 |             let (start, end) = self.range.clone().into_inner();\n  443 | \n  444 |             (start.as_() as f32, end.as_() as f32)\n  445 |         };\n  446 | \n  447 |         let offset = if range_start >= range_end {\n  448 |             0.0\n  449 |         } else {\n  450 |             (bounds.width - handle_width) * (value - range_start) / (range_end - range_start)\n  451 |         };","lines":12},{"ref":"widget/src/vertical_slider.rs:440-451","code":"  440 |         let value = self.value.as_() as f32;\n  441 |         let (range_start, range_end) = {\n  442 |             let (start, end) = self.range.clone().into_inner();\n  443 | \n  444 |             (start.as_() as f32, end.as_() as f32)\n  445 |         };\n  446 | \n  447 |         let offset = if range_start >= range_end {\n  448 |             0.0\n  449 |         } else {\n  450 |             (bounds.height - handle_width) * (value - range_end) / (range_start - range_end)\n  451 |         };","lines":12}]},{"id":"LOGIC_111","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Content::line_ending()` returns the line ending of line 0 as if it were representative of the whole document, but each line carries its own `ending` and `text()` (line 433-437) treats `LineEnding::None` specially per line. Documenting/returning only line 0's ending is misleading when lines have mixed endings (e.g. a CRLF file whose first line ended up as None).","fix":"Either document that this samples only the first line, or compute the predominant ending across lines.","locations":[{"ref":"widget/src/text_editor.rs:450-452","code":"  450 |     pub fn line_ending(&self) -> Option<LineEnding> {\n  451 |         Some(self.line(0)?.ending)\n  452 |     }","lines":3}]},{"id":"LOGIC_112","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Single-click cursor placement only calls `find_cursor_position` when `target > 0.0`, otherwise it forces position 0. With right- or center-aligned text the click X minus the alignment offset can legitimately be small/zero at the visual start of the text without the user intending position 0, and clicks at exactly the first character boundary collapse to 0. More importantly the `> 0.0` guard is an optimization that subtly differs from the drag path (lines 796-798) which always calls `find_cursor_position`, so click vs drag can land on different positions for the same X.","fix":"Use `target >= 0.0` (or always call `find_cursor_position` and let it clamp) so click and drag share identical positioning logic.","locations":[{"ref":"widget/src/text_input.rs:705-718","code":"  705 |                         click::Kind::Single => {\n  706 |                             let position = if target > 0.0 {\n  707 |                                 let value = if self.is_secure {\n  708 |                                     self.value.secure()\n  709 |                                 } else {\n  710 |                                     self.value.clone()\n  711 |                                 };\n  712 | \n  713 |                                 find_cursor_position(text_layout.bounds(), &value, state, target)\n  714 |                             } else {\n  715 |                                 None\n  716 |                             }\n  717 |                             .unwrap_or(0);\n  718 | ","lines":14}]},{"id":"LOGIC_113","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`measure_cursor_and_scroll_offset` hardcodes a magic `+ 5.0` padding when computing the scroll offset: `((grapheme_position.x + 5.0) - text_bounds.width).max(0.0)`. This constant is undocumented and unrelated to the actual caret width (which elsewhere is computed from `scale_factor`). It causes the text to scroll 5px earlier than the caret reaching the right edge; with very narrow inputs (width < 5) it can keep an offset even when the caret is at the start.","fix":"Replace the bare `5.0` with a named constant tied to the caret width, or document why 5px is used; clamp so it cannot exceed the content width.","locations":[{"ref":"widget/src/text_input.rs:1522-1534","code":" 1522 | fn measure_cursor_and_scroll_offset(\n 1523 |     paragraph: &impl text::Paragraph,\n 1524 |     text_bounds: Rectangle,\n 1525 |     cursor_index: usize,\n 1526 | ) -> (f32, f32) {\n 1527 |     let grapheme_position = paragraph\n 1528 |         .grapheme_position(0, cursor_index)\n 1529 |         .unwrap_or(Point::ORIGIN);\n 1530 | \n 1531 |     let offset = ((grapheme_position.x + 5.0) - text_bounds.width).max(0.0);\n 1532 | \n 1533 |     (grapheme_position.x, offset)\n 1534 | }","lines":13}]},{"id":"LOGIC_114","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Themer`'s overlay `draw` recomputes `default_theme` and substitutes `self.theme`, but unlike the widget `draw` it never applies `text_color`/`background` overrides to the overlay's `style`. Overlays spawned from themed content (e.g. a pick-list menu) will therefore ignore the Themer's `text_color`, producing inconsistent theming between the inline content and its overlay.","fix":"Thread the `text_color`/`background` overrides into the overlay wrapper and apply them in the overlay `draw`, mirroring the widget implementation.","locations":[{"ref":"widget/src/themer.rs:191-205","code":"  191 |             fn draw(\n  192 |                 &self,\n  193 |                 renderer: &mut Renderer,\n  194 |                 theme: &AnyTheme,\n  195 |                 style: &renderer::Style,\n  196 |                 layout: Layout<'_>,\n  197 |                 cursor: mouse::Cursor,\n  198 |             ) {\n  199 |                 let default_theme = theme::Base::default(theme.mode());\n  200 |                 let theme = self.theme.as_ref().unwrap_or(&default_theme);\n  201 | \n  202 |                 self.content\n  203 |                     .as_overlay()\n  204 |                     .draw(renderer, theme, style, layout, cursor);\n  205 |             }","lines":15},{"ref":"widget/src/themer.rs:143-164","code":"  143 |         if let Some(background) = self.background {\n  144 |             container::draw_background(\n  145 |                 renderer,\n  146 |                 &container::Style {\n  147 |                     background: Some(background(theme)),\n  148 |                     ..container::Style::default()\n  149 |                 },\n  150 |                 layout.bounds(),\n  151 |             );\n  152 |         }\n  153 | \n  154 |         let style = if let Some(text_color) = self.text_color {\n  155 |             renderer::Style {\n  156 |                 text_color: text_color(theme),\n  157 |             }\n  158 |         } else {\n  159 |             *style\n  160 |         };\n  161 | \n  162 |         self.content\n  163 |             .as_widget()\n  164 |             .draw(tree, renderer, theme, &style, layout, cursor, viewport);","lines":22}]},{"id":"LOGIC_115","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Toggler::update returns early when `on_toggle` is `None` (disabled), before computing and storing `last_status`. Because of the early return, a disabled Toggler never records `Status::Disabled` into `self.last_status` and never requests a redraw on hover changes. The status-tracking block below the early return is therefore unreachable for disabled togglers, so a disabled toggler that should repaint (e.g. theme changes or window redraw recording) keeps `last_status == None`, and `draw` falls back to the `Disabled` default - functionally close but the redraw-on-status-change path is dead for the disabled state, unlike Checkbox which does not early-return.","fix":"Mirror Checkbox: do not early-return; instead guard only the click handling on `on_toggle.is_some()` and always run the status computation/redraw bookkeeping at the bottom.","locations":[{"ref":"widget/src/toggler.rs:323-338","code":"  323 |         let Some(on_toggle) = &self.on_toggle else {\n  324 |             return;\n  325 |         };\n  326 | \n  327 |         match event {\n  328 |             Event::Mouse(mouse::Event::ButtonPressed(mouse::Button::Left))\n  329 |             | Event::Touch(touch::Event::FingerPressed { .. }) => {\n  330 |                 let mouse_over = cursor.is_over(layout.bounds());\n  331 | \n  332 |                 if mouse_over {\n  333 |                     shell.publish(on_toggle(!self.is_toggled));\n  334 |                     shell.capture_event();\n  335 |                 }\n  336 |             }\n  337 |             _ => {}\n  338 |         }","lines":16}]},{"id":"LOGIC_116","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Tooltip::update` only re-evaluates tooltip state on `Event::Mouse` and `RedrawRequested`. The `FollowCursor` reposition branch compares `last_position != cursor_position`. When the cursor stops moving while inside the area, no further `Mouse` events arrive, which is fine; but on `RedrawRequested` with an unchanged cursor it falls into `(State::Open { .. }, Some(_))` => `()` and does nothing — correct. However, the delay branch `(State::Hovered { at, .. }, _) if at.elapsed() < self.delay` requests a redraw but never transitions to `Open` on the redraw itself if the cursor is simultaneously gone; the earlier `(State::Hovered, None) => Idle` arm handles that. The subtle issue is ordering: the guard arm `at.elapsed() < self.delay` is matched before the `(State::Hovered, Some(cursor_position))` open arm, so as long as `cursor_position` is `Some` and the delay has NOT elapsed it keeps rescheduling — but if the cursor leaves and returns within the delay window, `at` is not reset, so the tooltip may open earlier than a full `delay` after the most recent hover start. Minor timing inaccuracy.","fix":"When transitioning back into `Hovered` after the cursor re-enters, reset `at` to `now`; or document that the delay is measured from first hover, not most recent.","locations":[{"ref":"widget/src/tooltip.rs:197-238","code":"  197 |             match (*state, cursor_position) {\n  198 |                 (State::Idle, Some(cursor_position)) => {\n  199 |                     if self.delay == Duration::ZERO {\n  200 |                         *state = State::Open { cursor_position };\n  201 |                         shell.invalidate_layout();\n  202 |                     } else {\n  203 |                         *state = State::Hovered { at: now };\n  204 |                     }\n  205 | \n  206 |                     shell.request_redraw_at(now + self.delay);\n  207 |                 }\n  208 |                 (State::Hovered { .. }, None) => {\n  209 |                     *state = State::Idle;\n  210 |                 }\n  211 |                 (State::Hovered { at, .. }, _) if at.elapsed() < self.delay => {\n  212 |                     shell.request_redraw_at(now + self.delay - at.elapsed());\n  213 |                 }\n  214 |                 (State::Hovered { .. }, Some(cursor_position)) => {\n  215 |                     *state = State::Open { cursor_position };\n  216 |                     shell.invalidate_layout();\n  217 |                 }\n  218 |                 (\n  219 |                     State::Open {\n  220 |                         cursor_position: last_position,\n  221 |                     },\n  222 |                     Some(cursor_position),\n  223 |                 ) if self.position == Position::FollowCursor\n  224 |                     && last_position != cursor_position =>\n  225 |                 {\n  226 |                     *state = State::Open { cursor_position };\n  227 |                     shell.request_redraw();\n  228 |                 }\n  229 |                 (State::Open { .. }, None) => {\n  230 |                     *state = State::Idle;\n  231 |                     shell.invalidate_layout();\n  232 | \n  233 |                     if !matches!(event, Event::Window(window::Event::RedrawRequested(_)),) {\n  234 |                         shell.request_redraw();\n  235 |                     }\n  236 |                 }\n  237 |                 (State::Open { .. }, Some(_)) | (State::Idle, None) => (),\n  238 |             }","lines":42}]},{"id":"LOGIC_117","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`new_events(StartCause::Init)` requests a redraw for every window, but at Init time the\n`window_manager` is typically empty (windows are created later via `Control::CreateWindow`),\nso the loop is a no-op and the comment-implied intent (initial redraw) is not actually\nachieved through this path. Initial redraw instead relies on the `Event::WindowCreated`\nhandler. The Init arm is effectively dead for the common path and obscures where the real\ninitial-redraw scheduling happens.","fix":"Either remove the Init arm (initial redraw is handled at window creation) or document that it only matters for windows already present at Init, to avoid implying it drives the first paint.","locations":[{"ref":"winit/src/lib.rs:689-693","code":"  689 |                     event::Event::NewEvents(event::StartCause::Init) => {\n  690 |                         for (_id, window) in window_manager.iter_mut() {\n  691 |                             window.raw.request_redraw();\n  692 |                         }\n  693 |                     }","lines":5}]},{"id":"LOGIC_118","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`GetScaleFactor` returns the raw OS scale factor (`window.raw.scale_factor() as f32`) only,\nignoring the program-supplied scale factor that `State` multiplies in everywhere else\n(`viewport.scale_factor() == os_scale * program_scale`). Every other size/cursor computation\nuses the composed scale, so a program that sets a custom scale_factor will get an inconsistent\nvalue back from `GetScaleFactor` (the OS value, not the effective one used for layout). This is\nan easy source of confusion when a program tries to convert between logical and physical units.","fix":"Return `window.state.scale_factor()` (the composed/effective factor) instead of `window.raw.scale_factor() as f32`, matching the value used for all layout/cursor math.","locations":[{"ref":"winit/src/lib.rs:1467-1473","code":" 1467 |             window::Action::GetScaleFactor(id, channel) => {\n 1468 |                 if let Some(window) = window_manager.get_mut(id) {\n 1469 |                     let scale_factor = window.raw.scale_factor();\n 1470 | \n 1471 |                     let _ = channel.send(scale_factor as f32);\n 1472 |                 }\n 1473 |             }","lines":7}]},{"id":"LOGIC_119","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Preedit::draw` clamps `bounds.x`/`bounds.y` with\n`.max(viewport.x).min(viewport.x + viewport.width - bounds.width)`. When the preedit paragraph\nis wider than the viewport (`bounds.width > viewport.width`), the `min` argument becomes smaller\nthan the `max` argument, so `max(...).min(...)` yields `viewport.x + viewport.width - bounds.width`\n(a negative/left-of-viewport coordinate) rather than clamping to the visible region. For an\noverlong IME preedit the popup is positioned partly off-screen to the left/top.","fix":"Guard against the inverted-clamp case, e.g. compute the upper bound as `(viewport.x + viewport.width - bounds.width).max(viewport.x)` before applying `.min`, so the result never goes left/above the viewport origin.","locations":[{"ref":"winit/src/window.rs:394-402","code":"  394 |         bounds.x = bounds\n  395 |             .x\n  396 |             .max(viewport.x)\n  397 |             .min(viewport.x + viewport.width - bounds.width);\n  398 | \n  399 |         bounds.y = bounds\n  400 |             .y\n  401 |             .max(viewport.y)\n  402 |             .min(viewport.y + viewport.height - bounds.height);","lines":9}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"`Color::invert` is broken. It writes into `self.b` using the old `self.g`, then writes\ninto `self.g` using the *already-mutated* `self.b`. The result is that green is left\nuntouched (it ends up equal to `1 - (1 - g) = g`-ish only by coincidence of the bug) and\nblue is set from green. Concretely: after the function, `self.b == 1.0 - g_old` and\n`self.g == 1.0 - self.b == 1.0 - (1.0 - g_old) == g_old`, so green is NOT inverted and blue\nis wrong. The correct behavior is to invert each of r, g, b independently (as the sibling\nmethod `inverse` correctly does on line 171).","fix":"Invert each channel from its own original value: `self.r = 1.0 - self.r; self.g = 1.0 - self.g; self.b = 1.0 - self.b;` (or just implement it as `*self = self.inverse();`).","locations":[{"ref":"core/src/color.rs:163-167","code":"  163 |     pub const fn invert(&mut self) {\n  164 |         self.r = 1.0f32 - self.r;\n  165 |         self.b = 1.0f32 - self.g;\n  166 |         self.g = 1.0f32 - self.b;\n  167 |     }","lines":5}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"`Slider` and `VerticalSlider` diverge in how they detect the modifier that resets the slider to its default value on click. Both widgets document the behavior identically as \"reset to this value when ctrl-clicked or command-clicked\", and `VerticalSlider` checks `control() || command()`, but `Slider` only checks `command()`. On macOS `command()` maps to Cmd (not Ctrl), so a Ctrl+click on a horizontal `Slider` will NOT reset to the default value, contradicting its own documentation and diverging from the vertical variant. This is a classic copy-paste bug where one widget was fixed and the other was not.","fix":"Change the `Slider` condition at line 334 to `if state.keyboard_modifiers.control() || state.keyboard_modifiers.command()` to match `VerticalSlider` and the documented behavior.","locations":[{"ref":"widget/src/slider.rs:334-334","code":"  334 |                         if state.keyboard_modifiers.command() {","lines":1},{"ref":"widget/src/vertical_slider.rs:337-337","code":"  337 |                     if state.keyboard_modifiers.control() || state.keyboard_modifiers.command() {","lines":1},{"ref":"widget/src/slider.rs:154-154","code":"  154 |     /// If set, the [`Slider`] will reset to this value when ctrl-clicked or command-clicked.","lines":1}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"Backend::From<String> uses `Self::Custom(backend)` directly, but Backend::default does `Self::Custom(backend.to_owned())` on a value (`backend`) that is already an owned `String` returned by `env::var`. The `.to_owned()` is a redundant clone of an owned String.","fix":"Drop the redundant `.to_owned()`: `return Self::Custom(backend);` (the `let Ok(backend)` binding already owns the String).","locations":[{"ref":"core/src/backend.rs:106","code":"  106 |         Self::Custom(backend.to_owned())","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"The wire size prefix is read from the network with `stream.read_u64().await? as usize` and then used directly in `buffer.resize(size, 0)` with no upper bound. A malicious or corrupted peer can send a size of up to u64::MAX, causing an attempt to allocate gigabytes of memory and aborting the process (OOM / DoS). The connection is otherwise untrusted (it parses arbitrary bytes), so the size must be validated against a sane maximum before resizing.","fix":"Reject or clamp implausibly large sizes before resizing, e.g. `if size > MAX_MESSAGE_SIZE { return Err(...) }` with a reasonable constant cap, before `buffer.resize(size, 0)`.","locations":[{"ref":"beacon/src/client.rs:252-256","code":"  252 |     let size = stream.read_u64().await? as usize;\n  253 | \n  254 |     if buffer.len() < size {\n  255 |         buffer.resize(size, 0);\n  256 |     }","lines":5},{"ref":"beacon/src/lib.rs:286-290","code":"  286 |     let size = stream.read_u64().await? as usize;\n  287 | \n  288 |     if buffer.len() < size {\n  289 |         buffer.resize(size, 0);\n  290 |     }","lines":5}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Spawn errors are silently swallowed across backends. `tokio` discards the `JoinHandle` returned by `Runtime::spawn` (`let _ = ...`), so a panicking spawned task is never observed. `smol` calls `.detach()` on its task, also discarding completion/panic. `thread_pool` uses `spawn_ok` which ignores spawn failure. In `runtime.rs::send` and `run`, send errors are reduced to a warning at best (`run`) or fully ignored (`send`: `let _ = sender.send(message).await;`). A failed `send` in `send()` means the message is dropped with no diagnostic at all.","fix":"At minimum log when a `send` fails in `Runtime::send` (mirror the `run` warning). For spawned tasks, consider wrapping futures to catch/log panics, or document that detached tasks swallow panics. Detaching is intentional for fire-and-forget but the lack of any diagnostic on send failure is a real gap.","locations":[{"ref":"futures/src/backend/native/tokio.rs:11-14","code":"   11 |     #[allow(clippy::let_underscore_future)]\n   12 |     fn spawn(&self, future: impl Future<Output = ()> + Send + 'static) {\n   13 |         let _ = tokio::runtime::Runtime::spawn(self, future);\n   14 |     }","lines":4},{"ref":"futures/src/backend/native/smol.rs:12-14","code":"   12 |     fn spawn(&self, future: impl Future<Output = ()> + Send + 'static) {\n   13 |         smol::spawn(future).detach();\n   14 |     }","lines":3},{"ref":"futures/src/runtime.rs:76-82","code":"   76 |     pub fn send(&mut self, message: Message) {\n   77 |         let mut sender = self.sender.clone();\n   78 | \n   79 |         self.executor.spawn(async move {\n   80 |             let _ = sender.send(message).await;\n   81 |         });\n   82 |     }","lines":7}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`task::widget` creates a bounded mpsc channel of capacity 1 and pushes operation outputs with `sender.clone().try_send(value)`, discarding the result with `let _ =`. If the widget operation produces a value before the runtime polls the receiver, or produces more than one value, `try_send` returns `Err(Full)`/`Err(Disconnected)` and the value is silently dropped. This is the path behind `is_focused`, `find`, and `find_all`; a produced result can be lost with no error surfaced to the caller, making the resulting `Task` hang or yield nothing.","fix":"Increase the channel capacity (or use an unbounded channel) for the widget-operation path, and/or stop silently discarding the `try_send` result - at minimum log when a value is dropped. A oneshot is more appropriate for single-output operations like `find`/`is_focused`.","locations":[{"ref":"runtime/src/task.rs:403-409","code":"  403 |     channel(move |sender| {\n  404 |         let operation = widget::operation::map(Box::new(operation), move |value| {\n  405 |             let _ = sender.clone().try_send(value);\n  406 |         });\n  407 | \n  408 |         Action::Widget(Box::new(operation))\n  409 |     })","lines":7},{"ref":"runtime/src/task.rs:440","code":"  440 |     let (sender, receiver) = mpsc::channel(1);","lines":1}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In the SVG `upload`, when `resvg::render` panics it is caught and only logged, then execution continues and uploads whatever partial/blank pixels are in `img`. The half- rendered (or empty) result is then inserted into `rasterized` and cached as a successful entry keyed by (id,size,color). On subsequent frames the broken cached bitmap is returned forever (cache hit) and never re-attempted, so a transient render failure becomes a permanent blank/corrupt image.","fix":"On render panic, return None (or insert a NotFound-style marker that is not treated as a valid cached bitmap) instead of caching the partial pixmap as a successful rasterization.","locations":[{"ref":"wgpu/src/image/vector.rs:146-176","code":"  146 |                 let render = panic::catch_unwind(panic::AssertUnwindSafe(|| {\n  147 |                     resvg::render(tree, transform, &mut img.as_mut());\n  148 |                 }));\n  149 | \n  150 |                 if let Err(error) = render {\n  151 |                     log::warn!(\"SVG rendering for {handle:?} panicked: {error:?}\");\n  152 |                 }\n  153 | \n  154 |                 let mut rgba = img.take();\n  155 | \n  156 |                 if let Some(color) = color {\n  157 |                     rgba.chunks_exact_mut(4).for_each(|rgba| {\n  158 |                         if rgba[3] > 0 {\n  159 |                             rgba[0] = color[0];\n  160 |                             rgba[1] = color[1];\n  161 |                             rgba[2] = color[2];\n  162 |                         }\n  163 |                     });\n  164 |                 }\n  165 | \n  166 |                 let allocation =\n  167 |                     atlas.upload(device, encoder, belt, size.width, size.height, &rgba)?;\n  168 | \n  169 |                 log::debug!(\"allocating {id} {}x{}\", size.width, size.height);\n  170 | \n  171 |                 let _ = self.svg_hits.insert(id);\n  172 |                 let _ = self.rasterized_hits.insert(key);\n  173 |                 let _ = self.rasterized.insert(key, allocation);\n  174 |                 self.should_trim = true;\n  175 | \n  176 |                 self.rasterized.get(&key)","lines":31}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Linear::add_stop` calls `stop.offset.partial_cmp(&offset).unwrap()` inside the\n`binary_search_by` comparator. `offset` is already checked `is_finite()`, but the stops being\ncompared (`stop.offset`) come from previously stored ColorStops; if any stored offset were NaN\n(possible if a ColorStop is constructed directly via the public struct and added through some\nother path, or via `add_stops` which routes through add_stop and is finite-checked - so\nnarrow) the `unwrap()` panics. The risk is low because add_stop guards new offsets, but the\ncomparator's unwrap is a latent panic that assumes an invariant not enforced by the type.","fix":"Use `partial_cmp(...).unwrap_or(Ordering::Equal)` (or `total_cmp`) to avoid any possibility of panic in the comparator.","locations":[{"ref":"core/src/gradient.rs:66-81","code":"   66 |     pub fn add_stop(mut self, offset: f32, color: Color) -> Self {\n   67 |         if offset.is_finite() && (0.0..=1.0).contains(&offset) {\n   68 |             let (Ok(index) | Err(index)) = self.stops.binary_search_by(|stop| match stop {\n   69 |                 None => Ordering::Greater,\n   70 |                 Some(stop) => stop.offset.partial_cmp(&offset).unwrap(),\n   71 |             });\n   72 | \n   73 |             if index < 8 {\n   74 |                 self.stops[index] = Some(ColorStop { offset, color });\n   75 |             }\n   76 |         } else {\n   77 |             log::warn!(\"Gradient color stop must be within 0.0..=1.0 range.\");\n   78 |         };\n   79 | \n   80 |         self\n   81 |     }","lines":16}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"icon::Debug formats the pixel count as `self.rgba.len() / 4`. If the internal invariant (`rgba.len()` divisible by 4) were ever broken (e.g. by a future constructor that bypasses from_rgba), this silently truncates. More importantly, the Debug impl duplicates the `/ 4` magic constant that from_rgba expresses as `PIXEL_SIZE`, so the two can drift.","fix":"Reuse a shared `PIXEL_SIZE` constant (or store the pixel count) instead of the literal `4` in the Debug impl.","locations":[{"ref":"core/src/win
