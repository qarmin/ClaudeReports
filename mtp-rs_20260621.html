 starting the `Instant::now()` timer.","locations":[{"ref":"benchmarks/mtp-rs-vs-libmtp/src/mtp_rs_backend.rs:58-104","code":"   58 |     /// Helper: get a fresh Storage reference for the stored storage ID.\n   59 |     async fn storage(&self) -> Result<mtp_rs::mtp::Storage, Box<dyn std::error::Error>> {\n   60 |         Ok(self.device.storage(self.storage_id).await?)\n   61 |     }\n   62 | \n   63 |     /// Upload `data` as `filename` into the benchmark folder. Returns the object handle.\n   64 |     pub async fn upload(\n   65 |         &self,\n   66 |         filename: &str,\n   67 |         data: &[u8],\n   68 |     ) -> Result<ObjectHandle, Box<dyn std::error::Error>> {\n   69 |         let storage = self.storage().await?;\n   70 |         let info = NewObjectInfo::file(filename, data.len() as u64);\n   71 | \n   72 |         // Build a single-item stream of bytes for the upload.\n   73 |         let data_vec = data.to_vec();\n   74 |         let stream = SingleChunkStream::new(data_vec);\n   75 | \n   76 |         let handle = storage\n   77 |             .upload(Some(self.bench_folder_handle), info, stream)\n   78 |             .await?;\n   79 |         Ok(handle)\n   80 |     }\n   81 | \n   82 |     /// Download the file at `handle`, returning all bytes.\n   83 |     pub async fn download(\n   84 |         &self,\n   85 |         handle: ObjectHandle,\n   86 |     ) -> Result<Vec<u8>, Box<dyn std::error::Error>> {\n   87 |         let storage = self.storage().await?;\n   88 |         let data = storage.download(handle).await?;\n   89 |         Ok(data)\n   90 |     }\n   91 | \n   92 |     /// List objects in the root of the first storage. Returns the count.\n   93 |     pub async fn list_objects(&self) -> Result<usize, Box<dyn std::error::Error>> {\n   94 |         let storage = self.storage().await?;\n   95 |         let objects = storage.list_objects(None).await?;\n   96 |         Ok(objects.len())\n   97 |     }\n   98 | \n   99 |     /// Delete a single object.\n  100 |     pub async fn delete(&self, handle: ObjectHandle) -> Result<(), Box<dyn std::error::Error>> {\n  101 |         let storage = self.storage().await?;\n  102 |         storage.delete(handle).await?;\n  103 |         Ok(())\n  104 |     }","lines":47,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/benchmarks/mtp-rs-vs-libmtp/src/mtp_rs_backend.rs#L58-L104"},{"ref":"benchmarks/mtp-rs-vs-libmtp/src/runner.rs:88-113","code":"   88 |         let elapsed = match operation {\n   89 |             Operation::Download => {\n   90 |                 // Setup: upload a test file (not timed).\n   91 |                 let handle = backend\n   92 |                     .upload(\"bench-download-file.bin\", &test_data)\n   93 |                     .await?;\n   94 |                 let start = Instant::now();\n   95 |                 let _data = backend.download(handle).await?;\n   96 |                 let elapsed = start.elapsed();\n   97 |                 backend.delete(handle).await?;\n   98 |                 elapsed\n   99 |             }\n  100 |             Operation::Upload => {\n  101 |                 let filename = format!(\"bench-upload-{}.bin\", i);\n  102 |                 let start = Instant::now();\n  103 |                 let handle = backend.upload(&filename, &test_data).await?;\n  104 |                 let elapsed = start.elapsed();\n  105 |                 backend.delete(handle).await?;\n  106 |                 elapsed\n  107 |             }\n  108 |             Operation::ListFiles => {\n  109 |                 let start = Instant::now();\n  110 |                 let _count = backend.list_objects().await?;\n  111 |                 start.elapsed()\n  112 |             }\n  113 |         };","lines":26,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/benchmarks/mtp-rs-vs-libmtp/src/runner.rs#L88-L113"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`RemotePath` resolution in `path.rs` has no caching: `resolve_existing`\nwalks a path one component at a time, issuing one `Storage::list_objects`\nUSB round trip per path level (each of which, per the library's own docs,\ndoes a `GetObjectHandles` + per-handle `GetObjectInfo` loop that can take\nseconds on large folders, e.g. 1k+-entry Android directories). Commands\nlike `cp` and `mv` resolve the source path and the destination path\nindependently via separate top-level calls (`existing_object` then\n`resolve_object_destination` -> `resolve_upload_target` -> another\n`resolve_existing` for the destination's parent, plus a final\n`list_objects` for the name-collision/existing-folder check). For paths\nthat share a common prefix (e.g. `cp /A/B/C/file.txt /A/B/D/file2.txt`),\nthe shared ancestor folders (`/A`, `/A/B`) are listed twice from scratch\nwith no reuse of the first listing's result, multiplying wall-clock time on\nslow devices for no protocol-level reason.","fix":"Thread a small per-invocation cache (HashMap<Option<ObjectHandle>, Vec<ObjectInfo>>) through path resolution, or resolve common ancestor prefixes once and reuse the listing for both source and destination lookups.","locations":[{"ref":"crates/mtp-rs-cli/src/cli/path.rs:87-128","code":"   87 | pub async fn resolve_existing(\n   88 |     storage: &Storage,\n   89 |     path: &RemotePath,\n   90 |     verbose: bool,\n   91 | ) -> Result<ExistingRemote, CliError> {\n   92 |     if path.is_root() {\n   93 |         return Ok(ExistingRemote::Root);\n   94 |     }\n   95 | \n   96 |     let mut parent = None;\n   97 |     let mut found = None;\n   98 |     for (index, component) in path.components().iter().enumerate() {\n   99 |         let objects = storage\n  100 |             .list_objects(parent)\n  101 |             .await\n  102 |             .map_err(|e| CliError::from_mtp(\"list remote folder\", e, verbose))?;\n  103 |         let object = objects\n  104 let destination_path = RemotePath::parse(&args.destination_path)?;\n   30 |     let source = existing_object(&storage, &source_path, cli.verbose).await?;\n   31 |     let source_name = source.filename.clone();\n   32 |     let source_kind = if source.is_folder() { \"folder\" } else { \"file\" };\n   33 |     let target =","lines":6,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs-cli/src/cli/commands/cp.rs#L28-L33"},{"ref":"crates/mtp-rs-cli/src/cli/commands/mv.rs:27-33","code":"   27 |     let source_path = RemotePath::parse(&args.source_path)?;\n   28 |     let destination_path = RemotePath::parse(&args.destination_path)?;\n   29 |     let source = existing_object(&storage, &source_path, cli.verbose).await?;\n   30 |     let source_name = source.filename.clone();\n   31 |     let source_kind = if source.is_folder() { \"folder\" } else { \"file\" };\n   32 |     let target =\n   33 |         resolve_object_destination(&storage, &destination_path, &source_name, cli.verbose).await?;","lines":7,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs-cli/src/cli/commands/mv.rs#L27-L33"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"`read_partial` (shared by GetPartialObject and GetPartialObject64) allocates `vec![0u8; max_bytes]` where `max_bytes` is taken directly from an unvalidated wire parameter (a `u32` cast to `usize`, or for GetPartialObject64 an arbitrary `offset` built from two `u32`s with no bound at all) with no upper-bound clamp against the actual remaining file size or any sane maximum. A single crafted/fuzzed command (e.g. max_bytes = 0xFFFF_FFFF) causes an immediate ~4 GB allocation attempt before any data is read, which is a real DoS/OOM risk for property-based fuzzing of this protocol path (the project runs proptest fuzzing across the workspace per AGENTS.md) and for any consumer that doesn't                     .response_queue\n  331 |                         .push_back(build_response(GENERAL_ERROR, tx_id, &[]));\n  332 |                 }\n  333 |             }\n  334 |         }\n  335 |         Err(_) => {\n  336 |             state\n  337 |                 .response_queue\n  338 |                 .push_back(build_response(GENERAL_ERROR, tx_id, &[]));\n  339 |         }\n  340 |     }\n  341 | }","lines":53,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/handlers.rs#L289-L341"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"scan_dir() and rescan_dir() both perform an O(n) linear scan over the entire `objects` HashMap (`self.objects.iter().find(...)`) for every single directory entry, to check whether that entry already has a tracked handle. For a directory with N entries, that's O(N^2) just to dedupe one directory's listing; rescan_backing_dirs() does this for every directory in the tree, making a full rescan O(M*N) where M is total object count and N is the largest directory's entry count. For Android-scale folders (the kind of 1k+ entry listing this project explicitly optimizes for elsewhere, e.g. the CancelToken work for list/delete), a rescan or scan_all() over the virtual device becomes quadratic and slow enough to dominate test run time.","fix":"Maintain a secondary HashMap<(StorageId, PathBuf), u32> (rel_path -> handle) alongside `objects` and keep both in sync on insert/remove/rekey. Both lookups become O(1), and rescan/scan_all become linear in the number of filesystem entries instead of quadratic.","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/state.rs:223-227","code":"  223 |             // Check if we already have a handle for this path in this storage\n  224 |             let existing = self\n  225 |                 .objects\n  226 |                 .iter()\n  227 | dir_size(&config.backing_dir);\n  121 |     config.capacity.saturating_sub(used)\n  122 | }\n  123 | \n  124 | /// Recursively compute total size of all files in a directory.\n  125 | fn dir_size(path: &std::path::Path) -> u64 {\n  126 |     if !path.is_dir() {\n  127 |         return 0;\n  128 |     }\n  129 |     let mut total = 0u64;\n  130 |     if let Ok(entries) = std::fs::read_dir(path) {\n  131 |         for entry in entries.flatten() {\n  132 |             let ft = match entry.file_type() {\n  133 |                 Ok(ft) => ft,\n  134 |                 Err(_) => continue,\n  135 |             };\n  136 |             if ft.is_file() {\n  137 |                 total += entry.metadata().map(|m| m.len()).unwrap_or(0);\n  138 |             } else if ft.is_dir() {\n  139 |                 total += dir_size(&entry.path());\n  140 |             }\n  141 |         }\n  142 |     }\n  143 |     total\n  144 | }","lines":27,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/builders.rs#L118-L144"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The `fuzz_bytes_with_type!` macro in `test_utils.rs` is fully implemented and documented (with a usage example in its doc comment) but is never invoked anywhere in the codebase. The two-arg `from_bytes(bytes, type_hint)` parsers it targets (`PropertyValue::from_bytes`, `PropertyRange::from_bytes`) already have hand-written fuzz coverage via standalone `proptest!` blocks in `properties.rs` (`fuzz_property_value_truncated`, `fuzz_property_range_truncated`, etc.), so the macro was apparently superseded but never removed.","fix":"Either delete the unused macro, or replace the hand-written fuzz_property_value_truncated / fuzz_property_range_truncated proptest blocks in properties.rs with calls to it to eliminate the duplication.","locations":[{"ref":"crates/mtp-rs/src/ptp/test_utils.rs:54-82","code":"   54 | /// Generate proptest for types with two-argument `from_bytes(bytes, type_hint)`.\n   55 | ///\n   56 | /// Used for parsers that need a type discriminator, like PropertyValue or PropertyRange.\n   57 | ///\n   58 | /// # Usage\n   59 | ///\n   60 | /// ```ignore\n   61 | /// fuzz_bytes_with_type!(\n   62 | ///     fuzz_property_value,\n   63 | ///     PropertyValue,\n   64 | ///     PropertyDataType,\n   65 | ///     [Int8, Uint8, Int16, Uint16, Int32, Uint32, Int64, Uint64, String],\n   66 | ///     20\n   67 | /// );\n   68 | /// ```\n   69 | #[cfg(test)]\n   70 | #[macro_export]\n   71 | macro_rules! fuzz_bytes_with_type {\n   72 |     ($test_name:ident, $type:ty, $hint_type:ty, [$($variant:ident),+ $(,)?], $max_size:expr) => {\n   73 |         proptest::proptest! {\n   74 |             #[test]\n   75 |             fn $test_name(bytes in proptest::collection::vec(proptest::arbitrary::any::<u8>(), 0..$max_size)) {\n   76 |                 $(\n   77 |                     let _ = <$type>::from_bytes(&bytes, <$hint_type>::$variant);\n   78 |                 )+\n   79 |             }\n   80 |         }\n   81 |     };\n   82 | }","lines":29,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/test_utils.rs#L54-L82"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`ptp_diagnose.rs`'s `test_props` array pairs each `DevicePropertyCode` with an `_expected_type: PropertyDataType`, but the loop destructures it as `(prop, _expected_type)` and never uses the type for validation (e.g. checking that `desc.current_value` actually matches the expected `PropertyDataType`). The field is purely decorative/unused, which is misleading in a diagnostic tool whose entire purpose is to validate device property behavior.","fix":"Either use _expected_type to flag a mismatch between the declared type and the PropertyValue variant actually returned (useful diagnostic signal), or drop the column entirely to avoid implying a check that doesn't happen.","locations":[{"ref":"crates/mtp-rs/examples/ptp_diagnose.rs:59-103","code":"   59 |     let test_props = [\n   60 |         (DevicePropertyCode::BatteryLevel, PropertyDataType::Uint8),\n   61 |         (DevicePropertyCode::FNumber, PropertyDataType::Uint16),\n   62 |         (DevicePropertyCode::ExposureTime, PropertyDataType::Uint32),\n   63 |         (DevicePropertyCode::ExposureIndex, PropertyDataType::Uint16),\n   64 |         (\n   65 |             DevicePropertyCode::ExposureProgramMode,\n   66 |             PropertyDataType::Uint16,\n   67 |         ),\n   68 |         (DevicePropertyCode::WhiteBalance, PropertyDataType::Uint16),\n   69 |         (DevicePropertyCode::FocusMode, PropertyDataType::Uint16),\n   70 |         (DevicePropertyCode::DateTime, PropertyDataType::String),\n   71 |     ];\n   72 | \n   73 |     for (prop, _expected_type) in test_props {\n   74 |         print!(\"{:?}: \", prop);\n   75 |         match session.get_device_prop_desc(prop).await {\n   76 |             Ok(desc) => {\n   77 |                 println!(\n   78 |                     \"{:?} ({})\",\n   79 |                     desc.current_value,\n   80 |                     if desc.writable {\n   81 |                         \"writable\"\n   82 |                     } else {\n   83 |                         \"read-only\"\n   84 |                     }\n   85 |                 );\n   86 |                 if let Some(ref range) = desc.range {\n   87 |                     println!(\n   88 |                         \"    Range: {:?} to {:?}, step {:?}\",\n   89 |                         range.min, range.max, range.step\n   90 |                     );\n   91 |                 }\n   92 |                 if let Some(vals) = &desc.enum_values {\n   93 |                     let count = vals.len();\n   94 |                     if count <= 10 {\n   95 |                         println!(\"    Allowed: {  rather than draining it promptly; prefer cancel() for promptness, not correctness.","locations":[{"ref":"crates/mtp-rs/src/mtp/stream.rs:50-55","code":"   50 | /// # Important\n   51 | ///\n   52 | /// The MTP session is locked while this download is active. You must either\n   53 | /// consume the entire download or call [`cancel()`](Self::cancel) before\n   54 | /// dropping it. Dropping mid-download without cancelling corrupts the USB\n   55 | /// session.","lines":6,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/mtp/stream.rs#L50-L55"},{"ref":"crates/mtp-rs/src/mtp/stream.rs:81-82","code":"   81 | #[must_use = \"dropping a FileDownload mid-transfer corrupts the USB session; \\\n   82 |                consume it fully or call cancel()\"]","lines":2,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/mtp/stream.rs#L81-L82"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":true,"description":"The multi-transfer accumulation loop for receiving a PTP Data container that may span several USB bulk transfers (documented in AGENTS.md as a required convention because of the Garmin Forerunner 955 quirk) is duplicated almost verbatim between `PtpSession::execute_with_receive` (crates/mtp-rs/src/ptp/session/mod.rs:421-467) and `PtpDevice::get_device_info`'s session-less receive loop (crates/mtp-rs/src/ptp/device.rs:114-156). Both independently: read a chunk via `receive_bulk`, check for empty bytes, branch on `container_type`, read `total_length` from the header and loop calling `receive_bulk` again until `bytes.len() >= total_length`, then parse with `DataContainer::from_bytes` and append `.payload` to an accumulator, with a `ContainerType::Response` arm that finalizes. Because this exact accumulation logic is called out in AGENTS.md as correctness-critical (\"Any new code path that calls receive_bulk() and expects a DataContainer must accumulate transfers... Skipping this loop breaks GetDeviceInfo on spec-compliant devices that split\"), having it live in two places risks the two copies drifting apart if one is fixed/changed and the other is forgotten.","fix":"Extract the multi-transfer Data-container accumulation loop into a shared free function or associated function on Transport/DataContainer (e.g. `receive_data_container(transport: &dyn Transport, expected_tx_id: Option<u32>) -> Result<(ResponseContainer, Vec<u8>), Error>`) and call it from both PtpSession::execute_with_receive and PtpDevice::get_device_info, parameterizing the optional transaction-ID check (device.rs's session-less path doesn't check tx_id since it's always 0).","locations":[{"ref":"crates/mtp-rs/src/ptp/session/mod.rs:419-467","code":"  419 |         let mut data = Vec::new();\n  420 | \n  421 |         loop {\n  422 |             let mut bytes = self.transport.receive_bulk(64 * 1024).await?;\n  423 |             if bytes.is_empty() {\n  424 |                 return Err(Error::invalid_data(\"Empty response\"));\n  425 |             }\n  426 | \n  427 |             let ct = container_type(&bytes)?;\n  428 |             match ct {\n  429 |                 ContainerType::Data => {\n  430 |                     // Check if we need to receive more data for this container.\n  431 |                     // The length field in the header tells us the total container size.\n  432 |                     if bytes.len() >= 4 {\n  433 |                         let total_length = unpack_u32(&bytes[0..4])? as usize;\n  434 |                         // Keep receiving until we have the complete container\n  435 |                         while bytes.len() < total_length {\n  436 |                             let more = self.transport.receive_bulk(64 * 1024).await?;\n  437 |                             if more.is_empty() {\n  438 |                                 return Err(Error::invalid_data(\n  439 |  }","lines":101,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/types/objects.rs#L75-L175"},{"ref":"crates/mtp-rs/src/ptp/types/properties.rs:253-322","code":"  253 |     pub fn from_bytes(buf: &[u8]) -> Result<Self, crate::Error> {\n  254 |         let mut offset = 0;\n  255 | \n  256 |         // 1. PropertyCode (u16)\n  257 |         let property_code = DevicePropertyCode::from(unpack_u16(&buf[offset..])?);\n  258 |         offset += 2;\n  259 | \n  260 |         // 2. DataType (u16)\n  261 |         let data_type = PropertyDataType::from(unpack_u16(&buf[offset..])?);\n  262 |         offset += 2;\n  263 | \n  264 |         // 3. GetSet (u8): 0x00 = read-only, 0x01 = read-write\n  265 |         if buf.len() <= offset {\n  266 |             return Err(crate::Error::invalid_data(\n  267 |                 \"DevicePropDesc: insufficient bytes for GetSet\",\n  268 |             ));\n  269 |         }\n  270 |         let writable = buf[offset] != 0x00;\n  271 |         offset += 1;\n  272 | \n  273 |         // 4. DefaultValue (variable size based on data type)\n  274 |         let (default_value, consumed) = PropertyValue::from_bytes(&buf[offset..], data_type)?;\n  275 |         offset += consumed;\n  276 | \n  277 |         // 5. CurrentValue (variable size based on data type)\n  278 |         let (current_value, consumed) = PropertyValue::from_bytes(&buf[offset..], data_type)?;\n  279 |         offset += consumed;\n  280 | \n  281 |         // 6. FormFlag (u8)\n  282 |         if buf.len() <= offset {\n  283 |             return Err(crate::Error::invalid_data(\n  284 |                 \"DevicePropDesc: insufficient bytes for FormFlag\",\n  285 |             ));\n  286 |         }\n  287 |         let form_type = PropertyFormType::from_code(buf[offset]);\n  288 |         offset += 1;\n  289 | \n  290 |         // 7. Form data (depends on form_type)\n  291 |         let (enum_values, range) = match form_type {\n  292 |             PropertyFormType::None | PropertyFormType::Unknown(_) => (None, None),\n  293 |             PropertyFormType::Range => {\n  294 |                 let (range, _consumed) = PropertyRange::from_bytes(&buf[offset..], data_type)?;\n  295 |                 (None, Some(range))\n  296 |             }\n  297 |             PropertyFormType::Enumeration => {\n  298 |                 // Number of values (u16)\n  299 |                 let count = unpack_u16(&buf[offset..])? as usize;\n  300 |                 offset += 2;\n  301 | \n  302 |                 let mut values = Vec::with_capacity(count);\n  303 |                 for _ in 0..count {\n  304 |                     let (val, consumed) = PropertyValue::from_bytes(&buf[offset..], data_type)?;\n  305 |                     values.push(val);\n  306 |                     offset += consumed;\n  307 |                 }\n  308 |                 (Some(values), None)\n  309 |             }\n  310 |         };\n  311 | \n  312 |         Ok(DevicePropDesc {\n  313 |             property_code,\n  314 |             data_type,\n  315 |             writable,\n  316 |             default_value,\n  317 |             current_value,\n  318 |             form_type,\n  319 |             enum_values,\n  320 |             range,\n  321 |         })\n  322 |     }","lines":70,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/types/properties.rs#L253-L322"}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"medium","easy":false,"description":"Cooperative cancellation (`CancelToken`) is threaded through `list_objects`, `list_objects_stream`, and `delete`, but not through any of the three recursive-listing methods (`list_objects_recursive`, `list_objects_recursive_native`, `list_objects_recursive_manual`). `list_objects_recursive_manual` in particular performs an unbounded number of sequential `list_objects()` calls (one per folder, building up `folders_to_visit` as it goes) - on a deeply nested Android tree with many subfolders this is exactly the kind of long-running, many-roundtrip operation the CancelToken mechanism in AGENTS.md was designed for (\"the CancelToken short-circuits the per-handle for-loop, which is where 1k-entry Android folder listings actually spend their 15+ seconds\"). A consumer building a cancellable \"scan whole device\" feature has no way to abort an in-progress recursive listing once started, even though the flat listing and delete paths it's built from both support it.","fix":"Add list_objects_recursive_with_cancel (and manual/native variants) that thread Option<&CancelToken> through to the inner list_objects_with_cancel calls and check it between folder pops in the manual-traversal loop.","locations":[{"ref":"crates/mtp-rs/src/mtp/storage.rs:343-409","code":"  343 |     pub async fn list_objects_recursive(\n  344 |         &self,\n  345 |         parent: Option<ObjectHandle>,\n  346 |     ) -> Result<Vec<ObjectInfo>, Error> {\n  347 |         if self.inner.is_android() {\n  348 |             return self.list_objects_recursive_manual(parent).await;\n  349 |         }\n  350 | \n  351 |         let native_result = self.list_objects_recursive_native(parent).await?;\n  352 | \n  353 |         // Heuristic: if we only got folders and no files, native listing\n  354 |         // probably didn't work - fall back to manual traversal\n  355 |         let has_files = native_result.iter().any(|o| o.is_file());\n  356 |         if !native_result.is_empty() && !has_files {\n  357 |             return self.list_objects_recursive_manual(parent).await;\n  358 |         }\n  359 | \n  360 |         Ok(native_result)\n  361 |     }\n  362 | \n  363 |     /// List objects recursively using native MTP recursive listing.\n  364 |     pub async fn list_objects_recursive_native(\n  365 |         &self,\n  366 |         parent: Option<ObjectHandle>,\n  367 |     ) -> Result<Vec<ObjectInfo>, Error> {\n  368 |         let recursive_parent = if parent.is_none() {\n  369 |             Some(ObjectHandle::ALL)\n  370 |         } else {\n  371 |             parent\n  372 |         };\n  373 | \n  374 |         let handles = self\n  375 |             .inner\n  376 |             .session\n  377 |             .get_object_handles(self.id, None, recursive_parent)\n  378 |             .await?;\n  379 | \n  380 |         let mut objects = Vec::with_capacity(handles.len());\n  381 |         for handle in handles {\n  382 |             let mut info = self.inner.session.get_object_info_full(handle).await?;\n  383 |             info.handle = handle;\n  384 |             objects.push(info);\n  385 |         }\n  386 |         Ok(objects)\n  387 |     }\n  388 | \n  389 |     /// List objects recursively using manual folder traversal.\n  390 |     pub async fn list_objects_recursive_manual(\n  391 |         &self,\n  392 |         parent: Option<ObjectHandle>,\n  393 |     ) -> Result<Vec<ObjectInfo>, Error> {\n  394 |         let mut result = Vec::new();\n  395 |         let mut folders_to_visit = vec![parent];\n  396 | \n  397 |         while let Some(current_parent) = folders_to_visit.pop() {\n  398 |             let objects = self.list_objects(current_parent).await?;\n  399 | \n  400 |             for obj in objects {\n  401 |                 if obj.is_folder() {\n  402 |                     folders_to_visit.push(Some(obj.handle));\n  403 |                 }\n  404 |                 result.push(obj);\n  405 |             }\n  406 |         }\n  407 | \n  408 |         Ok(result)\n  409 |     }","lines":67,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/mtp/storage.rs#L343-L409"}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"medium","easy":true,"description":"`find_writable_folder`'s priority list (used by all destructive integration tests) puts \"Music\" ahead of \"Pictures\"/\"Documents\". The comment labels it \"Android, Garmin music-capable watches\", but on a real Android phone with no Download/Downloads folder, this will pick the user's actual Music library folder for test scratch space ahead of less personally-significant folders like Pictures or Documents. Tests only add/delete their own uniquely-named files (mtp-rs-test.txt, mtp-rs-stream-{pid}.bin, etc.) so they don't touch existing content under normal completion, but a test that panics or is killed mid-run (e.g. `test_create_delete_folder` panicking between create and delete, or a process kill during `test_streaming_upload`) leaves stray `mtp-rs-*` artifacts inside the user's real Music collection folder rather than a more disposable folder.","fix":"Either reorder the candidate list to prefer less personally-significant folders (Download > Downloads > Pictures > Documents > documents > Audiobooks > Podcasts > Music), or have the helper create its own throwaway subfolder (e.g. \"mtp-rs-test\") inside the first matching folder and operate entirely within that, so a crash leaves one clearly-named folder instead of loose files mixed into Music.","locations":[{"ref":"crates/mtp-rs/tests/integration.rs:341-355","code":"  341 |     } else {\n  342 |         [\n  343 |             \"Download\",   // Android (most common)\n  344 |             \"Downloads\",  // Android (alt)\n  345 |             \"Music\",      // Android, Garmin music-capable watches\n  346 |             \"Documents\",  // Android (capitalized)\n  347 |             \"documents\",  // Kindle (lowercase)\n  348 |             \"Pictures\",   // Android\n  349 |             \"Audiobooks\", // Garmin\n  350 |             \"Podcasts\",   // Garmin\n  351 |         ]\n  352 |         .iter()\n  353 |         .map(|s| (*s).to_string())\n  354 |         .collect()\n  355 |     };","lines":15,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/tests/integration.rs#L341-L355"}]},{"id":"ARCH_3","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`PtpSession::execute_with_receive` (crates/mtp-rs/src/ptp/session/mod.rs:397-468) loops accepting an unbounded number of `ContainerType::Data` containers before it sees the final `ContainerType::Response` (the `loop { ... }` at mod.rs:421 has no upper bound on iterations or total accumulated `data` size). Per the PTP spec a single operation's data phase is exactly one Data container (which may itself span multiple USB bulk transfers, correctly handled by the inner `while bytes.len() < total_length` loop) followed by one Response container. The outer loop accepting *multiple* Data containers is defensive code beyond spec (the comment \"Continue to receive more containers or response\" at mod.rs:447 suggests this is intentional leniency) but has no cap on the number of containers or on `data.len()`. Combined with the session's documented self-healing recovery mechanism, a sequence of stale/misdirected Data containers from a desynced pipe (the exact failure mode this recovery layer exists to prevent, but only fully effective once `recover_if_needed` has run) could in principle keep this loop spinning and accumulating memory until a Response container or transport error eventually appears. This is a defensive-depth/DoS- hardening gap rather than a functional bug under normal operation.","fix":"Consider capping the number of Data containers accepted per execute_with_receive call (PTP spec allows exactly one) and/or capping total accumulated data.len() for this non-streaming helper, since callers needing large/unbounded payloads should use the streaming API (execute_with_receive_stream) instead.","locations":[{"ref":"crates/mtp-rs/src/ptp/session/mod.rs:421-467","code":"  421 |         loop {\n  422 |             let mut bytes = self.transport.receive_bulk(64 * 1024).await?;\n  423 |             if bytes.is_empty() {\n  424 |                 return Err(Error::invalid_data(\"Empty response\"));\n  425 |             }\n  426 | \n  427 |             let ct = container_type(&bytes)?;\n  428 |             match ct {\n  429 |                 ContainerType::Data => {\n  430 |                     // Check if we need to receive more data for this container.\n  431 |                     // The length field in the header tells us the total container size.\n  432 |                     if bytes.len() >= 4 {\n  433 |                         let total_length = unpack_u32(&bytes[0..4])? as usize;\n  434 |                         // Keep receiving until we have the complete container\n  435 |                         while bytes.len() < total_length {\n  436 |                             let more = self.transport.receive_bulk(64 * 1024).await?;\n  437 |                             if more.is_empty() {\n  438 |                                 return Err(Error::invalid_data(\n  439 |                                     \"Incomplete data container: device stopped sending\",\n  440 |                                 ));\n  441 |                             }\n  442 |                             bytes.extend_from_slice(&more);\n  443 |                         }\n  444 |                     }\n  445 |                     let container = DataContainer::from_bytes(&bytes)?;\n  446 |                     data.extend_from_slice(&container.payload);\n  447 |                     // Continue to receive more containers or response\n  448 |                 }\n  449 |                 ContainerType::Response => {\n  450 |                     let response = ResponseContainer::from_bytes(&bytes)?;\n  451 |                     if response.transaction_id != tx_id {\n  452 |                         return Err(Error::invalid_data(format!(\n  453 |                             \"Transaction ID mismatch: expected {}, got {}\",\n  454 |                             tx_id, response.transaction_id\n  455 |                         )));\n  456 |                     }\n  457 |                     scope.disarm();\n  458 |                     return Ok((response, data));\n  459 |                 }\n  460 |                 _ => {\n  461 |                     return Err(Error::invalid_data(format!(\n  462 |                         \"Unexpected container type: {:?}\",\n  463 |                         ct\n  464 |                     )));\n  465 |                 }\n  466 |             }\n  467 |         }","lines":47,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/session/mod.rs#L421-L467"}]},{"id":"ARCH_4","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"receive_bulk's resume-on-timeout behavior (documented at lines 686-688, 695-698, 722-726: a transfer left pending after a timeout is silently picked up by the *next* call) is invoked with a fresh `max_size` argument each time, but if a transfer is already pending from a prior timed-out call, the new call's `max_size` is completely ignored - the pending transfer's buffer was sized from the *original* call's max_size/alignment. A caller that times out once with a small max_size and retries with a much larger max_size (expecting more headroom) will silently get the original, smaller buffer back. receive_interrupt has the same resume-pending pattern (lines 734-739) but its INTERRUPT_BUFFER_SIZE is constant so the mismatch can't occur there. This is a minor surprising-behavior gap rather than a crash, and is only reachable if a consumer actually varies max_size across retries on the same transport instance.","fix":"Either document explicitly that a retried call's max_size is ignored while a transfer is pending (the comment at 686-688 only explains 'why', not 'what the caller should expect'), or assert/debug_assert that the aligned size of a fresh call's max_size matches the already-pending buffer's requested length so mismatches are caught in development.","locations":[{"ref":"crates/mtp-rs/src/transport/nusb.rs:683-729","code":"  683 |     async fn receive_bulk(&self, max_size: usize) -> Result<Vec<u8>, crate::Error> {\n  684 |         let mut ep = self.bulk_in.lock().await;\n  685 | \n  686 |         // If there's no pending transfer from a previous timed-out call,\n  687 |         // submit a new one. Otherwise, the pending transfer already has our\n  688 |         // data in flight and we just need to wait for it.\n  689 |         if ep.pending() == 0 {\n  690 |             let max_packet_size = ep.max_packet_size();\n  691 |             let aligned_size = align_to_packet_size(max_size, max_packet_size);\n  692 |             ep.submit(Buffer::new(aligned_size));\n  693 |         }\n  694 | \n  695 |         // Wait for the transfer to complete OR the timeout to expire.\n  696 |         // next_complete() is cancel-safe: dropping its future does NOT cancel\n  697 |         // the underlying USB transfer. On timeout we leave the transfer pending\n  698 |         // so a subsequent call picks up the in-flight data.\n  699 |         //\n  700 |         // The select result is unwrapped inside a block so the Either (which\n  701 |         // borrows `ep` through the next_complete future) is dropped before we\n  702 |         // need `ep` again for halt clearing.\n  703 |         let completed = {\n  704 |             let selected = futures::future::select(\n  705 |                 Box::pin(ep.next_complete()),\n  706 |                 Box::pin(Delay::new(self.timeout)),\n  707 |             )\n  708 |             .await;\n  709 |             match selected {\n  710 |                 futures::future::Either::Left((comp, _)) => Some(comp),\n  711 |                 futures::future::Either::Right((_, _)) => None,\n  712 |             }\n  713 |         };\n  714 | \n  715 |         match completed {\n  716 |             Some(comp) => {\n  717 |                 if let Err(e) = comp.status {\n  718 |                     return Err(clear_halt_if_stalled(&mut ep, e));\n  719 |                 }\n  720 |                 Ok(comp.buffer[..comp.actual_len].to_vec())\n  721 |             }\n  722 |             None => {\n  723 |                 // Don't cancel the transfer — it stays pending in the endpoint.\n  724 |                 // next_complete() is cancel-safe, so dropping its future is fine.\n  725 |                 // On retry, the next call will find pending() > 0 and pick it up.\n  726 |                 Err(crate::Error::Timeout)\n  727 |             }\n  728 |         }\n  729 |     }","lines":47,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/nusb.rs#L683-L729"}]},{"id":"ARCH_5","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"Three independent global registries are involved in virtual-device lifecycle: the discovery registry (`registry()` / Vec<VirtualRegistration>, keyed by location_id), the active-state registry (`active_states()` / Vec<ActiveEntry>, keyed by serial), and the per-device `VirtualDeviceState` itself. Both global registries use a Vec scanned linearly on every lookup (O(n) per call: register_virtual_device, find_virtual_config_by_location, find_virtual_config_by_serial, register_active_state, unregister_active_state, and every pause_watcher/dropped_paths_since_pause/clear_dropped_paths/rescan_virtual_device/rekey_virtual_object call). For typical test-suite device counts this is fine, but it's worth flagging that a long-running process registering/unregistering many virtual devices (e.g. a stress-test loop) pays O(n) per call with no upper bound, and a unregister bug in one registry would leave a permanent entry that the other forgets, which there's no consistency check between the two registries to detect.","fix":"If this ever becomes a bottleneck (currently unlikely given test-only scope), switch both Vecs to HashMap<u64, ...> / HashMap<String, ...> for O(1) lookup/removal. Not urgent given current usage patterns, but noting it as the registries are both linear-scan-of-Vec, not the same global registry shared by mistake (potential confusion point for readers).","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/registry.rs:22-37","code":"   22 | /// Holds registered devices and a monotonically increasing index for unique location IDs.\n   23 | struct Registry {\n   24 |     devices: Vec<VirtualRegistration>,\n   25 |     next_index: u64,\n   26 | }\n   27 | \n   28 | /// Access the global registry singleton.\n   29 | fn registry() -> &'static Mutex<Registry> {\n   30 |     static REGISTRY: OnceLock<Mutex<Registry>> = OnceLock::new();\n   31 |     REGISTRY.get_or_init(|| {\n   32 |         Mutex::new(Registry {\n   33 |             devices: Vec::new(),\n   34 |             next_index: 0,\n   35 |         })\n   36 |     })\n   37 | }","lines":16,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/registry.rs#L22-L37"},{"ref":"crates/mtp-rs/src/transport/virtual_device/registry.rs:106-127","code":"  106 | /// An entry in the active-states registry: (serial, shared state).\n  107 | type ActiveEntry = (String, Arc<Mutex<VirtualDeviceState>>);\n  108 | \n  109 | /// Access the global active-states registry.\n  110 | fn active_states() -> &'static Mutex<Vec<ActiveEntry>> {\n  111 |     static ACTIVE: OnceLock<Mutex<Vec<ActiveEntry>>> = OnceLock::new();\n  112 |     ACTIVE.get_or_init(|| Mutex::new(Vec::new()))\n  113 | }\n  114 | \n  115 | /// Register an active virtual device's state (called by `VirtualTransport::new`).\n  116 | pub(super) fn register_active_state(serial: String, state: Arc<Mutex<VirtualDeviceState>>) {\n  117 |     let mut active = active_states().lock().unwrap();\n  118 |     active.push((serial, state));\n  119 | }\n  120 | \n  121 | /// Unregister an active virtual device's state (called when `VirtualTransport` is dropped).\n  122 | pub(super) fn unregister_active_state(serial: &str) {\n  123 |     let mut active = active_states().lock().unwrap();\n  124 |     if let Some(pos) = active.iter().position(|(s, _)| s == serial) {\n  125 |         active.remove(pos);\n  126 |     }\n  127 | }","lines":22,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/registry.rs#L106-L127"}]},{"id":"ARCH_6","type":"architecture","type_label":"Architecture","severity":"negligible","easy":false,"description":"ContainerType/type_code validation, the `buf.len() < HEADER_SIZE` minimum-size check, and the header field extraction (length/type_code/code/transaction_id) are duplicated nearly verbatim across CommandContainer (implicitly, via to_bytes only), DataContainer::from_bytes, ResponseContainer::from_bytes, and EventContainer::from_bytes. This is how the ResponseContainer length-underflow bug (see separate finding) was able to slip in: the four parsers are supposed to be structurally identical but have silently drifted out of sync since there's no shared helper enforcing the same validation order/completeness across all of them.","fix":"Extract a shared `fn parse_header(buf: &[u8], expected_type: ContainerType) -> Result<(usize, u16, u32), Error>` (returning length, code, transaction_id) used by all three from_bytes implementations, so the HEADER_SIZE lower-bound check on `length` is written once and can't be omitted for one variant while present in the others.","locations":[{"ref":"crates/mtp-rs/src/ptp/container.rs:137-184","code":"  137 |     pub fn from_bytes(buf: &[u8]) -> Result<Self, crate::Error> {\n  138 |         if buf.len() < HEADER_SIZE {\n  139 |             return Err(crate::Error::invalid_data(format!(\n  140 |                 \"data container too small: need at least {} bytes, have {}\",\n  141 |                 HEADER_SIZE,\n  142 |                 buf.len()\n  143 |             )));\n  144 |         }\n  145 | \n  146 |         let length nment (must be multiple of 4 bytes after header)\n  327 |         let param_bytes = length - HEADER_SIZE;\n  328 |         if param_bytes % 4 != 0 {\n  329 |             return Err(crate::Error::invalid_data(format!(\n  330 |                 \"event parameter bytes not aligned: {} bytes\",\n  331 |                 param_bytes\n  332 |             )));\n  333 |         }\n  334 | \n  335 |         // Validate buffer has enough data\n  336 |         if buf.len() < length {\n  337 |             return Err(crate::Error::invalid_data(format!(\n  338 |                 \"event container buffer too small: need {}, have {}\",\n  339 |                 length,\n  340 |                 buf.len()\n  341 |             )));\n  342 |         }\n  343 | \n  344 |         // Parse parameters (0-3), defaulting missing ones to 0\n  345 |         let param_count = param_bytes / 4;\n  346 |         let param1 = if param_count >= 1 {\n  347 |             unpack_u32(&buf[12..16])?\n  348 |         } else {\n  349 |             0\n  350 |         };\n  351 |         let param2 = if param_count >= 2 {\n  352 |             unpack_u32(&buf[16..20])?\n  353 |         } else {\n  354 |             0\n  355 |         };\n  356 |         let param3 = if param_count >= 3 {\n  357 |             unpack_u32(&buf[20..24])?\n  358 |         } else {\n  359 |             0\n  360 |         };\n  361 | \n  362 |         Ok(EventContainer {\n  363 |             code: code.into(),\n  364 |             transaction_id,\n  365 |             params: [param1, param2, param3],\n  366 |         })\n  367 |     }","lines":75,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/container.rs#L293-L367"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","easy":false,"description":"rescan_dir() and scan_all() decide whether to recurse into a directory entry using Path::is_dir(), which follows symlinks (unlike DirEntry::file_type(), which uses lstat and does not). Neither function tracks visited canonical paths or limits recursion depth. A symlink inside a backing directory that points back at one of its own ancestors (a cycle) causes rescan_dir to recurse forever, overflowing the stack; scan_all's BFS would loop indefinitely re-walking the same cyclic subtree. Both rescan_backing_dirs() (called from the public rescan_virtual_device(serial) API) and scan_all() (used for recursive listings) are reachable with attacker- or test-fixture-controlled backing-dir contents, so a single bad symlink in the backing directory can crash or hang the virtual device.","fix":"Track canonical paths already visited in a HashSet during the recursive/BFS walk and skip any directory entry whose canonicalized path was already visited, or simply use DirEntry::file_type() (lstat-based, does not follow symlinks) instead of full_path.is_dir() so symlinked directories are never recursed into at all (matches how a real MTP device backing store has no symlink concept).","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/state.rs:366-419","code":"  366 |     fn rescan_dir(\n  367 |         &mut self,\n  368 |         storage_id: StorageId,\n  369 |         backing_dir: &std::path::Path,\n  370 |         dir_path: &std::path::Path,\n  371 |         parent: ObjectHandle,\n  372 |     ) -> u32 {\n  373 |         let entries = match std::fs::read_dir(dir_path) {\n  374 |             Ok(e) => e,\n  375 |             Err(_) => return 0,\n  376 |         };\n  377 | \n  378 |         let mut added = 0u32;\n  379 | \n  380 |         for entry in entries.flatten() {\n  381 |             let full_path = entry.path();\n  382 |             let rel_path = match full_path.strip_prefix(backing_dir) {\n  383 |                 Ok(r) => r.to_path_buf(),\n  384 |                 Err(_) => continue,\n  385 |             };\n  386 | \n  387 |             // Check if already tracked.\n  388 |             let existing = self\n  389 | severity":"negligible","easy":true,"description":"`ParentFilter::AndroidRoot` is named after Android but is applied generically to any device that takes the `parent=0xFFFFFFFF` root fast-path or the Samsung recursive-fallback path - not just Android. The crate's own test `stream_kindle_root_uses_fast_path` exercises this exact variant against a non-Android (Kindle/WMDRMPD) vendor extension string. The filter's actual semantics (\"parent is 0 or 0xFFFFFFFF\") are device-agnostic; the name implies an Android-specific special case, which could mislead a future maintainer into thinking it's gated on `is_android()` (it isn't - it's reached purely via the parent-value fast path / Samsung fallback, independent of vendor detection).","fix":"Rename ParentFilter::AndroidRoot to something device-agnostic like ParentFilter::RootSentinel or ParentFilter::ZeroOrAll to reflect that it's a generic root-detection heuristic, not an Android-specific code path.","locations":[{"ref":"crates/mtp-rs/src/mtp/storage.rs:58-64","code":"   58 | /// Describes how to filter objects by parent handle.\n   59 | enum ParentFilter {\n   60 |     /// Accept objects whose parent matches exactly.\n   61 |     Exact(ObjectHandle),\n   62 |     /// Android root: accept parent 0 or 0xFFFFFFFF.\n   63 |     AndroidRoot,\n   64 | }","lines":7,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/mtp/storage.rs#L58-L64"},{"ref":"crates/mtp-rs/src/mtp/storage.rs:267-276","code":"  267 |             match fast {\n  268 |                 Ok(handles) => {\n  269 |                     return Ok(ObjectListing {\n  270 |                         inner: Arc::clone(&self.inner),\n  271 |                         handles,\n  272 |                         cursor: 0,\n  273 |                         parent_filter: Some(ParentFilter::AndroidRoot),\n  274 |                         cancel: cancel.cloned(),\n  275 |                     });\n  276 |                 }","lines": method awaits **indefinitely** until an event is received from the USB\n  444 |     /// interrupt endpoint. Events are asynchronous notifications from the device\n  445 |     /// about changes such as objects being added/removed, storage changes, etc.\n  446 |     /// Callers should wrap this in an async timeout to avoid blocking forever.\n  447 |     ///\n  448 |     /// Note: This method does not require the operation lock since events are\n  449 |     /// received on the interrupt endpoint, which is independent of bulk transfers.\n  450 |     ///\n  451 |     /// # Returns\n  452 |     ///\n  453 |     /// - `Ok(Some(container))` - An event was received\n  454 |     /// - `Ok(None)` - No event (unreachable in practice; kept for API compatibility)\n  455 |     /// - `Err(_)` - Communication error\n  456 |     pub async fn poll_event(&self) -> Result<Option<EventContainer>, Error> {\n  457 |         match self.transport.receive_interrupt().await {\n  458 |             Ok(bytes) => {\n  459 |                 let container = EventContainer::from_bytes(&bytes)?;\n  460 |                 Ok(Some(container))\n  461 |             }\n  462 |             Err(Error::Timeout) => Ok(None),\n  463 |             Err(e) => Err(e),\n  464 |         }\n  465 |     }","lines":25,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/session/operations.rs#L441-L465"}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"negligible","easy":true,"description":"In `handle_send_object_info`, `state.alloc_handle()` is called and the handle is provisionally recorded in `pending_send` before the destination path is validated via `validate_path_within`. If validation fails, `pending_send` is correctly cleared and an error is returned, but the allocated handle number itself is never reused - it's simply skipped forever in `next_handle`'s monotonic counter. This is not a functional bug (the u32 handle space is enormous relative <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
