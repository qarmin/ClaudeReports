<!DOCTYPE html>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}

.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}

.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}

.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`ResponseContainer::from_bytes` (crates/mtp-rs/src/ptp/container.rs:198-249, called from every response-receiving path in my slice: PtpSession::execute, execute_with_receive, execute_with_send, execute_with_send_stream, and ReceiveStream::next_chunk) reads the device-supplied `length` field and later computes `let param_bytes = length - HEADER_SIZE;` (container.rs:232) without first checking `length >= HEADER_SIZE`. It only validates `buf.len() < length` (i.e. the *received* buffer is at least `length` bytes), not that `length` itself is at least 12. A device (or a desynced/corrupted read caused by the very recovery scenarios this session layer is designed to handle) that returns a Response container with a `length` field between 0 and 11 while the actual buffer is >= 12 bytes causes `length - HEADER_SIZE` to underflow as `usize`: panics in debug builds (overflow check), and in release wraps to a value near `usize::MAX`, which is then divided by 4 for `param_count` and passed to `Vec::with_capacity(param_count)` -- an allocation that will abort the process (capacity overflow) or attempt a huge allocation. This is reachable from every call site in this audit slice that parses a response off the wire (mod.rs:358, mod.rs:450, mod.rs:523, streaming.rs:168, streaming.rs:342, device.rs uses ResponseContainer::from_bytes indirectly via session-less path at device.rs:140). For comparison, the sibling `DataContainer::from_bytes` (container.rs:158-161) and `EventContainer::from_bytes` (container.rs, range-checks `(HEADER_SIZE..=MAX_EVENT_SIZE).contains(&length)`) both correctly guard against `length < HEADER_SIZE` before subtracting -- `ResponseContainer` is the one outlier missing this check, confirming it's an oversight rather than a deliberate design choice.","fix":"Add a check `if length < HEADER_SIZE { return Err(...) }` immediately after validating type_code, mirroring the pattern already used in DataContainer::from_bytes (container.rs:158-161) and EventContainer::from_bytes's range check, before computing `param_bytes = length - HEADER_SIZE`.","locations":[{"ref":"crates/mtp-rs/src/ptp/container.rs:198-249","code":"  198 |     /// Parse a response container from bytes.\n  199 |     pub fn from_bytes(buf: &[u8]) -> Result<Self, crate::Error> {\n  200 |         if buf.len() < HEADER_SIZE {\n  201 |             return Err(crate::Error::invalid_data(format!(\n  202 |                 \"response container too small: need at least {} bytes, have {}\",\n  203 |                 HEADER_SIZE,\n  204 |                 buf.len()\n  205 |             )));\n  206 |         }\n  207 | \n  208 |         let length = unpack_u32(&buf[0..4])? as usize;\n  209 |         let type_code = unpack_u16(&buf[4..6])?;\n  210 |         let code = unpack_u16(&buf[6..8])?;\n  211 |         let transaction_id = unpack_u32(&buf[8..12])?;\n  212 | \n  213 |         // Validate container type\n  214 |         if type_code != ContainerType::Response.to_code() {\n  215 |             return Err(crate::Error::invalid_data(format!(\n  216 |                 \"expected Response container type ({}), got {}\",\n  217 |                 ContainerType::Response.to_code(),\n  218 |                 type_code\n  219 |             )));\n  220 |         }\n  221 | \n  222 |         // Validate length\n  223 |         if buf.len() < length {\n  224 |             return Err(crate::Error::invalid_data(format!(\n  225 |                 \"response container length mismatch: header says {}, have {}\",\n  226 |                 length,\n  227 |                 buf.len()\n  228 |             )));\n  229 |         }\n  230 | \n  231 |         // Parse parameters\n  232 |         let param_bytes = length - HEADER_SIZE;\n  233 |         if param_bytes % 4 != 0 {\n  234 |             return Err(crate::Error::invalid_data(format!(\n  235 |                 \"response parameter bytes not aligned: {} bytes\",\n  236 |                 param_bytes\n  237 |             )));\n  238 |         }\n  239 | \n  240 |         let param_count = param_bytes / 4;\n  241 |         let mut params = Vec::with_capacity(param_count);\n  242 |         for i in 0..param_count {\n  243 |             let offset = HEADER_SIZE + i * 4;\n  244 |             params.push(unpack_u32(&buf[offset..])?);\n  245 |         }\n  246 | \n  247 |         Ok(ResponseContainer {\n  248 |             code: code.into(),\n  249 |             transaction_id,","lines":52,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/container.rs#L198-L249"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"send_bulk_streaming divides by ep.max_packet_size() (transfer_size.div_ceil(max_packet_size)) without checking it's non-zero. max_packet_size() is read straight from the device's USB endpoint descriptor (a u16 field) with no validation elsewhere in this file. A malformed or buggy device descriptor reporting 0 (or a mock/fake nusb backend used in fuzzing/testing) makes this panic with a divide-by-zero. Contrast with align_to_packet_size (same file, lines 1016-1028) which explicitly guards packet_size == 0 - that defensive check was added there but not duplicated here, so the two functions handle the same untrusted input inconsistently.","fix":"Guard against max_packet_size == 0 the same way align_to_packet_size does, e.g. let max_packet_size = ep.max_packet_size().max(1); before the div_ceil, or early-return crate::Error::invalid_data(...) if it's zero.","locations":[{"ref":"crates/mtp-rs/src/transport/nusb.rs:614-617","code":"  614 |         let max_packet_size = ep.max_packet_size();\n  615 |         let transfer_size: usize = 256 * 1024; // 256KB per USB transfer\n  616 |                                                // Round up to max_packet_size boundary.\n  617 |         let transfer_size = (transfer_size.div_ceil(max_packet_size)).max(1) * max_packet_size;","lines":4,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/nusb.rs#L614-L617"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`test_download_with_progress` computes `download.bytes_received() * 100 / total` directly instead of using the library's own zero-guarded `download.progress()` helper (which returns 1.0 when size is 0). If `total` (download.size()) is ever 0 — e.g. a device reports a zero-byte file, or a future test reuses this pattern with a different size range that allows 0 — this divides by zero and panics. In the current call site `find_suitable_file` is invoked with `min_size = 100_000`, so it isn't reachable today, but the pattern is copy-pasteable into future tests/examples without that guarantee, and the crate already provides the safe alternative right next to it.","fix":"Use `download.progress() * 100.0` (already zero-guarded in mtp/stream.rs) instead of manually recomputing the percentage from bytes_received()/size().","locations":[{"ref":"crates/mtp-rs/tests/integration.rs:507-518","code":"  507 |         let mut download = try_device!(storage.download_stream(handle).await, \"start download\");\n  508 |         let total = download.size();\n  509 |         let mut last_percent = 0u64;\n  510 | \n  511 |         while let Some(result) = download.next_chunk().await {\n  512 |             result.expect(\"download error\");\n  513 |             let percent = download.bytes_received() * 100 / total;\n  514 |             if percent >= last_percent + 10 {\n  515 |                 tlog!(\"  {}%\", percent);\n  516 |                 last_percent = percent;\n  517 |             }\n  518 |         }","lines":12,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/tests/integration.rs#L507-L518"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","easy":true,"description":"ResponseContainer::from_bytes computes `param_bytes = length - HEADER_SIZE` without first validating `length >= HEADER_SIZE`, unlike its siblings DataContainer::from_bytes (explicit `if length < HEADER_SIZE` check) and EventContainer::from_bytes (`(HEADER_SIZE..=MAX_EVENT_SIZE).contains(&length)` check). The only guard present is `if buf.len() < length`, which does NOT prevent `length` from being smaller than HEADER_SIZE when the actual buffer is >= HEADER_SIZE bytes long (e.g. a 12-byte buffer with a header `length` field of 0, 1, ... 11). This is a length value parsed directly from untrusted device input.\n\nVerified by reproduction: a 12-byte buffer with bytes [0,0,0,0, 0x03,0x00, 0x01,0x20, 0,0,0,0] (type=Response, code=Ok, length field = 0) panics with \"attempt to subtract with overflow\" at container.rs:232 in debug builds (the project has no profile.dev overflow-checks override, so this is the default `cargo test`/`cargo run --debug` behavior). In release builds (no overflow checks), `0usize.wrapping_sub(12)` wraps to `usize::MAX - 11`; `param_count = param_bytes / 4` becomes astronomically large and the subsequent `Vec::with_capacity(param_count)` will abort the process on allocation failure. Either way this is a denial-of-service: any malformed or malicious PTP response container (or buggy device that echoes a degenerate header) reaching ResponseContainer::from_bytes crashes the client. ResponseContainer::from_bytes is on the hot path for every PTP operation (session/mod.rs, session/streaming.rs, device.rs all call it directly on bytes read off the wire).","fix":"Add the same lower-bound check the other three container parsers already have, before the subtraction, e.g.:\n    if length < HEADER_SIZE {\n        return Err(crate::Error::invalid_data(format!(\n            \"response container length too small: {} < header size {}\",\n            length, HEADER_SIZE\n        )));\n    }\nplaced immediately after the type_code validation (around line 220), mirroring DataContainer::from_bytes's existing check at container.rs:161-166. Add a regression/property test (or extend the existing `fuzz_response_container` macro coverage) asserting `ResponseContainer::from_bytes` returns Err rather than panicking for header `length` values in 0..HEADER_SIZE, matching the existing `fuzz_data_container_length_underflow` and `fuzz_event_container_invalid_length` proptest cases that already cover this for the other two container types but conspicuously have no Response-container equivalent.","locations":[{"ref":"crates/mtp-rs/src/ptp/container.rs:222-232","code":"  222 |         // Validate length\n  223 |         if buf.len() < length {\n  224 |             return Err(crate::Error::invalid_data(format!(\n  225 |                 \"response container length mismatch: header says {}, have {}\",\n  226 |                 length,\n  227 |                 buf.len()\n  228 |             )));\n  229 |         }\n  230 | \n  231 |         // Parse parameters\n  232 |         let param_bytes = length - HEADER_SIZE;","lines":11,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/container.rs#L222-L232"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`FileDownload::collect_with_progress` allocates `Vec::with_capacity(self.size as usize)` where `self.size` is a `u64` taken directly from the device-reported `ObjectInfo.size` (or its `GetObjectPropValue` resolution for >4GB files) with no upper-bound sanity check. A malfunctioning or malicious device that reports an implausibly large size (e.g. spoofed multi-terabyte value) causes an allocation request that either aborts the process (Rust's global allocator aborts on allocation failure rather than returning an error) or, on 32-bit targets, silently truncates `size as usize`, producing a capacity far smaller than the real transfer and causing repeated reallocation rather than a crash. This is reachable purely from device-supplied data, with no user input on the host side.","fix":"Clamp the initial capacity to a sane maximum (e.g. a few tens of MB) and let the Vec grow via extend_from_slice for the remainder, instead of trusting the device-reported size verbatim for the allocation request.","locations":[{"ref":"crates/mtp-rs/src/mtp/stream.rs:178","code":"  178 |         let mut data = Vec::with_capacity(self.size as usize);","lines":1,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/mtp/stream.rs#L178"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"DataContainer::to_bytes computes `total_len = HEADER_SIZE + self.payload.len()` as a `usize` and then casts it with `total_len as u32` when packing the length header field. For payloads >= ~4 GiB (`u32::MAX - HEADER_SIZE` bytes), this cast silently truncates/wraps instead of erroring, producing a container whose declared length field does not match the actual number of payload bytes appended (which are written in full via `buf.extend_from_slice(&self.payload)`). Reproduced numerically: `(12 + 4_300_000_000usize) as u32 == 5_032_716`, a value wildly inconsistent with the real ~4.3 GB of payload bytes that follow it on the wire.\n\nSeverity is low because the streaming upload path (`Transport::send_bulk_streaming`, documented in AGENTS.md) is the intended mechanism for large files and does not go through DataContainer::to_bytes; this method is used by the non-streaming `execute_with_send` path (crates/mtp-rs/src/ptp/session/mod.rs), so a >4GB payload would have to be deliberately routed through the buffered (non-streaming) send path to trigger this, which is an unusual but not impossible caller choice (e.g. mistakenly buffering instead of streaming a large file before calling a send-data API).","fix":"Either return a Result and validate `total_len <= u32::MAX as usize` before casting, erroring clearly (\"payload too large for non-streaming send, use send_bulk_streaming\"), or at minimum add a debug_assert!/doc comment making the 4 GiB ceiling of the buffered path explicit so a future caller doesn't trip over silent corruption. The companion CommandContainer::to_bytes is not at risk since params are capped at a handful of u32s and can never approach u32::MAX bytes.","locations":[{"ref":"crates/mtp-rs/src/ptp/container.rs:117-134","code":"  117 | impl DataContainer {\n  118 |     /// Serialize the data container to bytes.\n  119 |     pub fn to_bytes(&self) -> Vec<u8> {\n  120 |         let total_len = HEADER_SIZE + self.payload.len();\n  121 | \n  122 |         let mut buf = Vec::with_capacity(total_len);\n  123 | \n  124 |         // Header\n  125 |         buf.extend_from_slice(&pack_u32(total_len as u32));\n  126 |         buf.extend_from_slice(&pack_u16(ContainerType::Data.to_code()));\n  127 |         buf.extend_from_slice(&pack_u16(self.code.into()));\n  128 |         buf.extend_from_slice(&pack_u32(self.transaction_id));\n  129 | \n  130 |         // Payload\n  131 |         buf.extend_from_slice(&self.payload);\n  132 | \n  133 |         buf\n  134 |     }","lines":18,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/container.rs#L117-L134"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In `PtpSession::execute_with_send`'s split-header branch (crates/mtp-rs/src/ptp/session/mod.rs:502), `let total_len = (HEADER_SIZE + data.len()) as u32;` silently truncates if `HEADER_SIZE + data.len()` exceeds `u32::MAX` (~4GB), producing a wrong (wrapped) length value in the container header sent to the device. The sibling streaming method `execute_with_send_stream` (streaming.rs:135-139) explicitly guards this case: `if container_length <= u32::MAX as u64 { ... } else { header.extend_from_slice(&pack_u32(0xFFFFFFFF)); }` using the PTP spec's documented sentinel for oversized containers. `execute_with_send` takes `data: &[u8]` (an already-fully-buffered in-memory slice) so reaching exactly 4GB requires the caller to already hold that much data in RAM, making this a low-probability but real correctness gap and an inconsistency between the two sibling send paths -- the non-streaming one silently corrupts the header instead of using the same sentinel convention. (Note `DataContainer::to_bytes()` in container.rs has the identical pre-existing `as u32` truncation for the non-split combined-mode path at mod.rs:518, but that file is outside this audit's scope; flagging the in-scope split-header occurrence here since it sits right next to the stream version that already does this correctly.)","fix":"Apply the same u32::MAX sentinel check used in execute_with_send_stream (streaming.rs:135-139) to the split-header branch of execute_with_send, or reuse a shared header-building helper (see the related duplicate_code finding) so both paths get the guard for free.","locations":[{"ref":"crates/mtp-rs/src/ptp/session/mod.rs:502","code":"  502 |             let total_len = (HEADER_SIZE + data.len()) as u32;","lines":1,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/session/mod.rs#L502"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"VirtualDeviceState::alloc_handle() increments `next_handle: u32` with a plain `+= 1` and no overflow check. After u32::MAX allocations in a single device's lifetime (every upload, scan, rescan, and rekey calls this), it wraps to 0 in release builds (silently reusing/colliding with handle 0, which collides with the ROOT/invalid-handle sentinel checked elsewhere as `parent.0 == 0`) or panics on overflow in debug builds. Unlikely to be hit in practice given the volume required, but it's an unchecked invariant on a value used as a HashMap key and compared against ObjectHandle::ROOT semantics elsewhere.","fix":"Use checked_add and return an error (or saturate and log) instead of an unchecked +=, or at minimum add a debug_assert that next_handle != 0 after increment so a wrap is caught in CI/test builds rather than silently colliding with the root sentinel in release.","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/state.rs:129-133","code":"  129 |     pub fn alloc_handle(&mut self) -> ObjectHandle {\n  130 |         let h = self.next_handle;\n  131 |         self.next_handle += 1;\n  132 |         ObjectHandle(h)\n  133 |     }","lines":5,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/state.rs#L129-L133"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","easy":true,"description":"pack_string truncates the 1-byte MTP string length prefix via `result.push(len as u8)` with no bounds check, where `len = utf16.len() + 1` is a `usize` that can exceed 255. For any string whose UTF-16 encoding is 255 or more code units (commonly reachable via long filenames, keywords, or other free-form metadata fields packed by ObjectInfo::to_bytes / PropertyValue::String / Storage rename operations), `len as u8` silently wraps modulo 256 instead of erroring.\n\nVerified by reproduction: `pack_string(&\"a\".repeat(300))` (UTF-16 length 300, declared length = 301) produces a 603-byte buffer but writes a length-prefix byte of `45` (301 % 256 = 45) instead of 301. Round-tripping through `unpack_string` silently truncates the string to 45 chars/22 code units (it stops reading after `len=45` code units) and reports `consumed = 91`, leaving 512 bytes of orphaned payload data in the stream — any subsequent field packed after this string in the same dataset (e.g. the rest of an ObjectInfo: DateCreated, DateModified, Keywords after Filename) will desync, since the receiver thinks the field ended 512 bytes earlier than it actually did. No error is raised anywhere in this path; the corruption is silent.\n\nThis is the send-side counterpart of the receive-side string handling and is reachable in practice: ObjectInfo::to_bytes (crates/mtp-rs/src/ptp/types/objects.rs:236) calls `pack_string(&self.filename)` directly on a caller-supplied filename with no length validation upstream, so uploading a file whose name is >= 255 UTF-16 code units corrupts the SendObjectInfo payload silently instead of failing loudly.","fix":"Validate `utf16.len() + 1 <= u8::MAX as usize` (i.e. utf16.len() <= 254) before packing, and return `Result<Vec<u8>, crate::Error>` instead of `Vec<u8>` (mirroring pack_datetime's existing fallible signature), erroring out for over-length strings rather than silently truncating the length byte. This will require updating the few call sites that currently treat pack_string as infallible (objects.rs:236/253, session/operations.rs:369, types/properties.rs:56, and the virtual_device builders) to propagate the error. Add a unit/property test asserting pack_string errors (or otherwise cannot silently corrupt) for strings with usize length >= 255 UTF-16 code units, matching the existing boundary-testing style used elsewhere in this file (e.g. fuzz_large_array_count).","locations":[{"ref":"crates/mtp-rs/src/ptp/pack/mod.rs:161-187","code":"  161 | pub fn pack_string(s: &str) -> Vec<u8> {\n  162 |     if s.is_empty() {\n  163 |         return vec![0x00];\n  164 |     }\n  165 | \n  166 |     // Encode to UTF-16\n  167 |     let utf16: Vec<u16> = s.encode_utf16().collect();\n  168 | \n  169 |     // Length includes the null terminator\n  170 |     let len = utf16.len() + 1;\n  171 | \n  172 |     // Allocate result: 1 byte length + (len * 2) bytes for UTF-16 data\n  173 |     let mut result = Vec::with_capacity(1 + len * 2);\n  174 | \n  175 |     // Length byte (number of characters including null terminator)\n  176 |     result.push(len as u8);\n  177 | \n  178 |     // UTF-16LE encoded characters\n  179 |     for code_unit in &utf16 {\n  180 |         result.extend_from_slice(&code_unit.to_le_bytes());\n  181 |     }\n  182 | \n  183 |     // Null terminator\n  184 |     result.extend_from_slice(&[0x00, 0x00]);\n  185 | \n  186 |     result\n  187 | }","lines":27,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/pack/mod.rs#L161-L187"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `mv` and `cp`, when the destination already exists and `--replace` is\npassed, the CLI deletes the existing destination object BEFORE attempting\n`move_object`/`copy_object` on the source. If the move/copy then fails\n(device disconnects, storage full, protocol error, transaction desync,\netc.), the original destination object is already permanently deleted while\nthe source was never relocated/duplicated - net data loss with no recovery\npath. The delete should happen only after the move/copy has succeeded (or\nthe operation should be restructured so the original destination is not\nremoved until the replacement is confirmed in place).","fix":"Perform move_object/copy_object first (e.g. to a temp name or just into the parent), confirm success, and only then delete the pre-existing destination object - or document/accept the risk explicitly and warn the user before deleting.","locations":[{"ref":"crates/mtp-rs-cli/src/cli/commands/mv.rs:40-58","code":"   40 |     if let Some(existing) = &target.existing {\n   41 |         ensure_not_same_object(source.handle, existing.handle)?;\n   42 |         if !args.replace {\n   43 |             return Err(CliError::new(\n   44 |                 CliErrorKind::RemotePath,\n   45 |                 \"destination already exists; pass --replace to delete it first\",\n   46 |             ));\n   47 |         }\n   48 |         storage\n   49 |             .delete(existing.handle)\n   50 |             .await\n   51 |             .map_err(|e| CliError::from_mtp(\"delete existing destination\", e, cli.verbose))?;\n   52 |     }\n   53 | \n   54 |     let parent = target.parent.unwrap_or(ObjectHandle::ROOT);\n   55 |     storage\n   56 |         .move_object(source.handle, parent, None)\n   57 |         .await\n   58 |         .map_err(|e| CliError::from_mtp(\"move remote object\", e, cli.verbose))?;","lines":19,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs-cli/src/cli/commands/mv.rs#L40-L58"},{"ref":"crates/mtp-rs-cli/src/cli/commands/cp.rs:41-59","code":"   41 |     if let Some(existing) = &target.existing {\n   42 |         ensure_not_same_object(source.handle, existing.handle)?;\n   43 |         if !args.replace {\n   44 |             return Err(CliError::new(\n   45 |                 CliErrorKind::RemotePath,\n   46 |                 \"destination already exists; pass --replace to delete it first\",\n   47 |             ));\n   48 |         }\n   49 |         storage\n   50 |             .delete(existing.handle)\n   51 |             .await\n   52 |             .map_err(|e| CliError::from_mtp(\"delete existing destination\", e, cli.verbose))?;\n   53 |     }\n   54 | \n   55 |     let parent = target.parent.unwrap_or(ObjectHandle::ROOT);\n   56 |     let new_handle = storage\n   57 |         .copy_object(source.handle, parent, None)\n   58 |         .await\n   59 |         .map_err(|e| CliError::from_mtp(\"copy remote object\", e, cli.verbose))?;","lines":19,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs-cli/src/cli/commands/cp.rs#L41-L59"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`handle_move_object` (handlers.rs) treats ANY failure of `std::fs::rename(&src_path, &dest_path)` as a cross-device move and falls through to a copy-then-delete-source fallback. `std::fs::rename` can fail for reasons that have nothing to do with crossing filesystems - e.g. the destination already exists as a non-empty directory, a permission error, or a transient I/O error. In every one of those cases the code still runs `copy_dir_all`/`std::fs::copy` from `src_path` to `dest_path` and then deletes `src_path` on success. This can silently overwrite an existing file/directory at the destination and then destroy the only copy of the source data, instead of surfacing the real error to the caller. The fallback should only trigger for an actual cross-device error (e.g. by matching on `io::ErrorKind` or, where available, `ErrorKind::CrossesDevices`/the raw OS error for EXDEV), and any other rename failure should be reported as `GENERAL_ERROR` without attempting the copy+delete fallback.","fix":"Only fall back to copy+delete when the rename error indicates a genuine cross-device move (e.g. raw OS error EXDEV / io::ErrorKind::CrossesDevices on nightly, or a targeted check), and otherwise return GENERAL_ERROR directly from the rename failure without touching the destination or deleting the source.","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/handlers.rs:751-773","code":"  751 |     if std::fs::rename(&src_path, &dest_path).is_err() {\n  752 |         // Cross-device move: copy + delete\n  753 |         let copy_result = if src_path.is_dir() {\n  754 |             copy_dir_all(&src_path, &dest_path)\n  755 |         } else {\n  756 |             std::fs::copy(&src_path, &dest_path).map(|_| ())\n  757 |         };\n  758 |         match copy_result {\n  759 |             Ok(()) => {\n  760 |                 let _ = if src_path.is_dir() {\n  761 |                     std::fs::remove_dir_all(&src_path)\n  762 |                 } else {\n  763 |                     std::fs::remove_file(&src_path)\n  764 |                 };\n  765 |             }\n  766 |             Err(_) => {\n  767 |                 state\n  768 |                     .response_queue\n  769 |                     .push_back(build_response(GENERAL_ERROR, tx_id, &[]));\n  770 |                 return;\n  771 |             }\n  772 |         }\n  773 |     }","lines":23,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/handlers.rs#L751-L773"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Storage::list_objects_recursive`'s fallback heuristic only catches one failure mode of native recursive listing being broken: \"got at least one folder and zero files at all\". If a device's native `ObjectHandle::ALL` recursive listing is broken in a different way - e.g. it returns some files but silently omits an entire nested subtree, or misses files in deeper folders while still returning a mix of files and folders at shallower levels - the heuristic (`has_files` true) accepts the result as correct and returns a silently incomplete listing. The same risk exists for a storage whose recursive listing legitimately returns folders containing only further folders many levels deep before any file appears (not actually broken, but matching the \"no files\" heuristic). The heuristic is a coarse proxy for correctness rather than a real verification, e.g. it does not cross-check the manual-traversal object count against the native one, or vice-versa.","fix":"If feasible, prefer always doing manual traversal for devices not already known-good, or strengthen the heuristic by also cross-checking folder count consistency. At minimum, document the heuristic's known blind spot (partial-but-nonempty native results are trusted as-is) so callers needing strong completeness guarantees know to call list_objects_recursive_manual directly.","locations":[{"ref":"crates/mtp-rs/src/mtp/storage.rs:343-361","code":"  343 |     pub async fn list_objects_recursive(\n  344 |         &self,\n  345 |         parent: Option<ObjectHandle>,\n  346 |     ) -> Result<Vec<ObjectInfo>, Error> {\n  347 |         if self.inner.is_android() {\n  348 |             return self.list_objects_recursive_manual(parent).await;\n  349 |         }\n  350 | \n  351 |         let native_result = self.list_objects_recursive_native(parent).await?;\n  352 | \n  353 |         // Heuristic: if we only got folders and no files, native listing\n  354 |         // probably didn't work - fall back to manual traversal\n  355 |         let has_files = native_result.iter().any(|o| o.is_file());\n  356 |         if !native_result.is_empty() && !has_files {\n  357 |             return self.list_objects_recursive_manual(parent).await;\n  358 |         }\n  359 | \n  360 |         Ok(native_result)\n  361 |     }","lines":19,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/mtp/storage.rs#L343-L361"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`ReceiveStream::next_chunk` (crates/mtp-rs/src/ptp/session/streaming.rs:267-380) parses a Data container header at lines 329-338 and stores `self.container_length = length` directly from the wire (`unpack_u32(&self.buffer[0..4])`) without validating `length >= HEADER_SIZE` (12). Compare this to the non-streaming sibling path `DataContainer::from_bytes` (container.rs:158-161), which explicitly checks `length < HEADER_SIZE` and errors out, and to `execute_with_receive`'s use of `DataContainer::from_bytes` (mod.rs:445) which inherits that same protection. The streaming path bypasses `DataContainer::from_bytes` entirely (it hand-rolls the buffer bookkeeping for memory-efficiency) and therefore loses this validation. If a device sends a Data container whose `length` header field is less than 12 (e.g. 4) while more bytes are already buffered, then at streaming.rs:276 `payload_end = min(buffer.len(), container_length)` becomes smaller than `payload_start = HEADER_SIZE + payload_yielded` (12), so the `if payload_start < payload_end` branch is skipped, falling into the `else if self.buffer.len() >= self.container_length` branch (streaming.rs:295-301) which drains only `container_length` (e.g. 4) bytes from the front of the buffer. This under-drains the actual 12-byte container header, leaving 8 garbage header bytes at the front of `self.buffer` that get misinterpreted as the start of a new container on the next loop iteration, corrupting the rest of the stream parse (manifesting as spurious \"Unexpected container type\" or further data corruption, not a panic, but a confusing/wrong result for what should be a clean protocol error).","fix":"Validate `length >= HEADER_SIZE` when parsing the Data container header in ReceiveStream::next_chunk (right after `unpack_u32(&self.buffer[0..4])` at streaming.rs:330), returning Error::invalid_data and setting `self.done = true` otherwise -- mirroring the guard already present in DataContainer::from_bytes.","locations":[{"ref":"crates/mtp-rs/src/ptp/session/streaming.rs:329-338","code":"  329 |                     ContainerType::Data => {\n  330 |                         let length = match unpack_u32(&self.buffer[0..4]) {\n  331 |                             Ok(l) => l as usize,\n  332 |                             Err(e) => {\n  333 |                                 self.done = true;\n  334 |                                 return Some(Err(e));\n  335 |                             }\n  336 |                         };\n  337 |                         self.container_length = length;\n  338 |                         self.header_parsed = true;","lines":10,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/session/streaming.rs#L329-L338"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `DevicePropDesc::from_bytes`, the `PropertyFormType::Range` arm parses a `PropertyRange` via `PropertyRange::from_bytes(&buf[offset..], data_type)?` but discards the returned byte count (`let (range, _consumed) = ...`) instead of adding it to `offset`. The sibling `PropertyFormType::Enumeration` arm correctly does `offset += consumed` per element. Today this is dormant because the match arm is the last thing computed before the function returns (no later field reads `offset`), so no incorrect value is currently produced. But it breaks the invariant that `offset` always tracks total bytes consumed, and `DevicePropDesc::from_bytes` has no return value indicating consumed length (unlike `PropertyRange::from_bytes` / `PropertyValue::from_bytes`, which both return `(T, usize)`). The moment anyone parses trailing data after a `DevicePropDesc` in a larger buffer, or refactors this function to return the consumed length, Range-typed properties will silently report the wrong offset while Enumeration-typed ones report it correctly - a property-form-dependent corruption that is easy to miss because all existing tests call `from_bytes` on a buffer containing exactly one descriptor.","fix":"Change line 294 to `let (range, consumed) = PropertyRange::from_bytes(&buf[offset..], data_type)?;` and add `offset += consumed;` before building the tuple, mirroring the Enumeration arm. Add a `#[allow(unused_assignments)]`-free pattern, or simply keep the assignment so `offset` stays correct as a forward-compatibility invariant even though it isn't read again in the current implementation.","locations":[{"ref":"crates/mtp-rs/src/ptp/types/properties.rs:291-310","code":"  291 |         let (enum_values, range) = match form_type {\n  292 |             PropertyFormType::None | PropertyFormType::Unknown(_) => (None, None),\n  293 |             PropertyFormType::Range => {\n  294 |                 let (range, _consumed) = PropertyRange::from_bytes(&buf[offset..], data_type)?;\n  295 |                 (None, Some(range))\n  296 |             }\n  297 |             PropertyFormType::Enumeration => {\n  298 |                 // Number of values (u16)\n  299 |                 let count = unpack_u16(&buf[offset..])? as usize;\n  300 |                 offset += 2;\n  301 | \n  302 |                 let mut values = Vec::with_capacity(count);\n  303 |                 for _ in 0..count {\n  304 |                     let (val, consumed) = PropertyValue::from_bytes(&buf[offset..], data_type)?;\n  305 |                     values.push(val);\n  306 |                     offset += consumed;\n  307 |                 }\n  308 |                 (Some(values), None)\n  309 |             }\n  310 |         };","lines":20,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/ptp/types/properties.rs#L291-L310"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In send_bulk_streaming, when the chunk stream produces zero total bytes (e.g. an upload of a genuinely empty payload with no header prepended), both ZLP branches are skipped: final_len > 0 is false (nothing was ever copied into current_buf), and total_sent > 0 is also false (no full transfer_size buffer was ever submitted). The function returns Ok(()) having submitted nothing at all - not even a zero-length packet. This violates the documented invariant (AGENTS.md: 'A ZLP must be sent after the final transfer if its size is a multiple of max_packet_size... Without this, Android devices hang waiting for more data') since 0 is trivially a multiple of max_packet_size. The only current caller (ptp/session/streaming.rs execute_with_send_stream) always prepends a 12-byte header via stream::once().chain(data), so this path is unreachable today, but it's a latent bug in the public Transport::send_bulk_streaming contract that would bite any future caller (or direct test) that calls it with a truly empty stream.","fix":"Change the final 'else if' to also cover the just-started, nothing-sent case: send a ZLP whenever final_len == 0 AND total_sent == 0 as well, i.e. drop the total_sent > 0 guard (0 % max_packet_size is always 0, so any all-empty stream should still terminate with a ZLP) or special-case it explicitly with a comment.","locations":[{"ref":"crates/mtp-rs/src/transport/nusb.rs:647-678","code":"  647 |         // Send remaining data.\n  648 |         let final_len = current_buf.len();\n  649 |         if final_len > 0 {\n  650 |             ep.submit(current_buf);\n  651 |             let completion = ep\n  652 |                 .wait_next_complete(self.timeout)\n  653 |                 .ok_or(crate::Error::Timeout)?;\n  654 |             if let Err(e) = completion.status {\n  655 |                 return Err(clear_halt_if_stalled(&mut ep, e));\n  656 |             }\n  657 | \n  658 |             // If the final transfer was a multiple of max_packet_size, send ZLP\n  659 |             // so the device sees a short packet delimiter.\n  660 |             if final_len % max_packet_size == 0 {\n  661 |                 ep.submit(Buffer::new(0));\n  662 |                 let completion = ep\n  663 |                     .wait_next_complete(self.timeout)\n  664 |                     .ok_or(crate::Error::Timeout)?;\n  665 |                 if let Err(e) = completion.status {\n  666 |                     return Err(clear_halt_if_stalled(&mut ep, e));\n  667 |                 }\n  668 |             }\n  669 |         } else if total_sent > 0 && total_sent % max_packet_size == 0 {\n  670 |             // All data fit in full transfers. Send ZLP to terminate.\n  671 |             ep.submit(Buffer::new(0));\n  672 |             let completion = ep\n  673 |                 .wait_next_complete(self.timeout)\n  674 |                 .ok_or(crate::Error::Timeout)?;\n  675 |             if let Err(e) = completion.status {\n  676 |                 return Err(clear_halt_if_stalled(&mut ep, e));\n  677 |             }\n  678 |         }","lines":32,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/nusb.rs#L647-L678"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In cancel_transfer's interrupt-pipe drain (step 3), the single next_complete() result is only inspected via `matches!(..., Either::Right(_))` to detect a timeout; when data DOES arrive (Either::Left), the Completion (including its `status: Result<(), TransferError>`) is discarded without being checked. If the interrupt endpoint stalls while consuming the CancelTransaction event, the error is silently swallowed and clear_halt is never called on interrupt_in - unlike every other bulk/interrupt completion site in this file, which all funnel errors through clear_halt_if_stalled. clear_bulk_halt_by_address (called later from settle_after_cancel) only ever locks bulk_in/bulk_out, never interrupt_in, so a stalled interrupt endpoint from this code path has no recovery path at all until the next receive_interrupt() call (which does check status) - and per AGENTS.md, GoPro-class devices are exactly the ones sensitive to an unread/mishandled interrupt event during cancel.","fix":"Check completion.status when Either::Left is hit: on Err(TransferError::Stall), call ep.clear_halt().wait() (synchronously, matching the rest of the file) before continuing, mirroring the pattern used for bulk_in/bulk_out elsewhere in this function.","locations":[{"ref":"crates/mtp-rs/src/transport/nusb.rs:900-918","code":"  900 | \n  901 |             let timed_out = {\n  902 |                 let complete_fut = ep.next_complete();\n  903 |                 let timeout_fut = Delay::new(idle_timeout);\n  904 |                 futures::pin_mut!(complete_fut, timeout_fut);\n  905 | \n  906 |                 matches!(\n  907 |                     futures::future::select(complete_fut, timeout_fut).await,\n  908 |                     futures::future::Either::Right(_)\n  909 |                 )\n  910 |             };\n  911 | \n  912 |             if timed_out {\n  913 |                 ep.cancel_all();\n  914 |                 while ep.pending() > 0 {\n  915 |                     let _ = ep.next_complete().await;\n  916 |                 }\n  917 |             }\n  918 |         }","lines":19,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/nusb.rs#L900-L918"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`handle_move_object` only updates the moved object's own `rel_path`/`storage_id`/`parent` entry in `state.objects` (lines 776-781). When the moved object is a folder that has previously-listed children (tracked in `state.objects` from an earlier `GetObjectHandles`/`scan_dir` call), those children's `rel_path` values are never updated to reflect the new parent location. After the move, `resolve_path()` for any such child still computes a path under the OLD (now-nonexistent) location, so subsequent `GetObjectInfo`/`GetObject`/`DeleteObject`/etc. on those previously-cached child handles will fail (file not found) even though the files still exist on disk under the new path. Compare with `handle_delete_object`, which explicitly walks and updates/removes all descendants via `rel_path.starts_with(...)`, and `VirtualDeviceState::rekey_object`, which explicitly re-parents direct children - `handle_move_object` has no equivalent fix-up step.","fix":"After a successful move of a directory, walk state.objects for all entries whose old rel_path starts_with the object's old rel_path (like handle_delete_object already does) and rewrite their rel_path prefix (and storage_id, if storages differ) to the new location, the same way rekey_object re-parents direct children.","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/handlers.rs:683-799","code":"  683 | fn handle_move_object(state: &mut VirtualDeviceState, tx_id: u32, params: &[u32]) {\n  684 |     let handle = ObjectHandle(params.first().copied().unwrap_or(0));\n  685 |     let dest_storage = StorageId(params.get(1).copied().unwrap_or(0));\n  686 |     let dest_parent = ObjectHandle(params.get(2).copied().unwrap_or(0));\n  687 | \n  688 |     let obj = match state.objects.get(&handle.0) {\n  689 |         Some(o) => o.clone(),\n  690 |         None => {\n  691 |             state\n  692 |                 .response_queue\n  693 |                 .push_back(build_response(INVALID_OBJECT_HANDLE, tx_id, &[]));\n  694 |             return;\n  695 |         }\n  696 |     };\n  697 | \n  698 |     if state.is_read_only(obj.storage_id) || state.is_read_only(dest_storage) {\n  699 |         state\n  700 |             .response_queue\n  701 |             .push_back(build_response(STORE_READ_ONLY, tx_id, &[]));\n  702 |         return;\n  703 |     }\n  704 | \n  705 |     let src_path = match state.resolve_path(handle) {\n  706 |         Some(p) => p,\n  707 |         None => {\n  708 |             state\n  709 |                 .response_queue\n  710 |                 .push_back(build_response(GENERAL_ERROR, tx_id, &[]));\n  711 |             return;\n  712 |         }\n  713 |     };\n  714 | \n  715 |     let dest_storage_state = match state.find_storage(dest_storage) {\n  716 |         Some(s) => s,\n  717 |         None => {\n  718 |             state\n  719 |                 .response_queue\n  720 |                 .push_back(build_response(INVALID_STORAGE_ID, tx_id, &[]));\n  721 |             return;\n  722 |         }\n  723 |     };\n  724 | \n  725 |     let filename = obj.rel_path.file_name().unwrap_or_default().to_os_string();\n  726 | \n  727 |     let dest_parent_rel = if dest_parent == ObjectHandle::ROOT || dest_parent.0 == 0 {\n  728 |         PathBuf::new()\n  729 |     } else {\n  730 |         match state.objects.get(&dest_parent.0) {\n  731 |             Some(o) => o.rel_path.clone(),\n  732 |             None => {\n  733 |                 state\n  734 |                     .response_queue\n  735 |                     .push_back(build_response(INVALID_PARENT, tx_id, &[]));\n  736 |                 return;\n  737 |             }\n  738 |         }\n  739 |     };\n  740 | \n  741 |     let new_rel = dest_parent_rel.join(filename);\n  742 |     let dest_path = dest_storage_state.config.backing_dir.join(&new_rel);\n  743 | \n  744 |     if validate_path_within(&dest_storage_state.config.backing_dir, &dest_path).is_err() {\n  745 |         state\n  746 |             .response_queue\n  747 |             .push_back(build_response(GENERAL_ERROR, tx_id, &[]));\n  748 |         return;\n  749 |     }\n  750 | \n  751 |     if std::fs::rename(&src_path, &dest_path).is_err() {\n  752 |         // Cross-device move: copy + delete\n  753 |         let copy_result = if src_path.is_dir() {\n  754 |             copy_dir_all(&src_path, &dest_path)\n  755 |         } else {\n  756 |             std::fs::copy(&src_path, &dest_path).map(|_| ())\n  757 |         };\n  758 |         match copy_result {\n  759 |             Ok(()) => {\n  760 |                 let _ = if src_path.is_dir() {\n  761 |                     std::fs::remove_dir_all(&src_path)\n  762 |                 } else {\n  763 |                     std::fs::remove_file(&src_path)\n  764 |                 };\n  765 |             }\n  766 |             Err(_) => {\n  767 |                 state\n  768 |                     .response_queue\n  769 |                     .push_back(build_response(GENERAL_ERROR, tx_id, &[]));\n  770 |                 return;\n  771 |             }\n  772 |         }\n  773 |     }\n  774 | \n  775 |     // Update object's storage and path\n  776 |     let src_storage = obj.storage_id;\n  777 |     if let Some(obj) = state.objects.get_mut(&handle.0) {\n  778 |         obj.rel_path = new_rel;\n  779 |         obj.storage_id = dest_storage;\n  780 |         obj.parent = dest_parent;\n  781 |     }\n  782 | \n  783 |     state\n  784 |         .event_queue\n  785 |         .push_back(build_event(EventCode::ObjectInfoChanged, &[handle.0]));\n  786 |     state\n  787 |         .event_queue\n  788 |         .push_back(build_event(EventCode::StorageInfoChanged, &[src_storage.0]));\n  789 |     if dest_storage != src_storage {\n  790 |         state.event_queue.push_back(build_event(\n  791 |             EventCode::StorageInfoChanged,\n  792 |             &[dest_storage.0],\n  793 |         ));\n  794 |     }\n  795 | \n  796 |     state\n  797 |         .response_queue\n  798 |         .push_back(build_response(OK, tx_id, &[]));\n  799 | }","lines":117,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/handlers.rs#L683-L799"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In runner.rs, the 2-second \"let USB device settle\" sleep runs after every (operation, size, backend) iteration unconditionally, including after the very last scenario of the entire benchmark run when there is no following scenario to protect. This doesn't affect correctness of results, but it adds an unnecessary final delay (and a slightly misleading \"(waiting 2s for USB device to settle...)\" log line) right before the program exits.","fix":"Skip the trailing sleep when the current (operation, size, backend) tuple is the last one in the iteration, or move the sleep to only run between scenarios that actually reconnect a different backend/device.","locations":[{"ref":"benchmarks/mtp-rs-vs-libmtp/src/runner.rs:53-58","code":"   53 | \n   54 |                 // Brief pause after each scenario to let the USB device settle\n   55 |                 // before the next backend/size reconnects.\n   56 |                 eprintln!(\"  (waiting 2s for USB device to settle...)\");\n   57 |                 tokio::time::sleep(Duration::from_secs(2)).await;\n   58 |             }","lines":6,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/benchmarks/mtp-rs-vs-libmtp/src/runner.rs#L53-L58"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `mv` and `cp`, after a successful `move_object`/`copy_object`, if the\nfilename differs from the source name (destination resolved to a different\nfinal component than the source's name) the code calls `storage.rename()`\nas a separate step. If that rename call fails, the object has already been\nmoved/copied into the new parent but keeps its old name - a partial,\ninconsistent end state that's reported to the user only as a generic\n\"rename moved/copied object\" error, with no indication that the\nmove/copy itself actually succeeded and the object now lives at\n`<destination_folder>/<original_name>` rather than at the path the user\nasked for or its original location.","fix":"On rename failure after a successful move/copy, include the actual resulting location (parent + original filename) in the error message so the user knows where to find the object, since it's not where they asked for it nor where it started.","locations":[{"ref":"crates/mtp-rs-cli/src/cli/commands/mv.rs:54-64","code":"   54 |     let parent = target.parent.unwrap_or(ObjectHandle::ROOT);\n   55 |     storage\n   56 |         .move_object(source.handle, parent, None)\n   57 |         .await\n   58 |         .map_err(|e| CliError::from_mtp(\"move remote object\", e, cli.verbose))?;\n   59 |     if renamed {\n   60 |         storage\n   61 |             .rename(source.handle, &target.filename)\n   62 |             .await\n   63 |             .map_err(|e| CliError::from_mtp(\"rename moved object\", e, cli.verbose))?;\n   64 |     }","lines":11,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs-cli/src/cli/commands/mv.rs#L54-L64"},{"ref":"crates/mtp-rs-cli/src/cli/commands/cp.rs:55-65","code":"   55 |     let parent = target.parent.unwrap_or(ObjectHandle::ROOT);\n   56 |     let new_handle = storage\n   57 |         .copy_object(source.handle, parent, None)\n   58 |         .await\n   59 |         .map_err(|e| CliError::from_mtp(\"copy remote object\", e, cli.verbose))?;\n   60 |     if renamed {\n   61 |         storage\n   62 |             .rename(new_handle, &target.filename)\n   63 |             .await\n   64 |             .map_err(|e| CliError::from_mtp(\"rename copied object\", e, cli.verbose))?;\n   65 |     }","lines":11,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs-cli/src/cli/commands/cp.rs#L55-L65"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`fuji_capture.rs` Step 4 polls AFStatus and, on status == 3 (\"Focus FAILED\"), only prints a message and `break`s out of the polling loop — it does not return/abort the program. Execution falls through to Step 5/6 which unconditionally sets capture control to SHOOT and calls InitiateCapture again, firing the shutter even though the focus phase explicitly reported failure. As example/copy-paste code for camera capture sequences, a reader adapting this for real automated capture would likely want the shutter step gated on focus success.","fix":"After the AF polling loop, check whether the last observed status was 2 (focus OK) before proceeding to Step 5/6, and skip/early-return with a clear message on focus failure or polling timeout (the loop can also exhaust all 50 attempts without ever seeing status != 1, which silently falls through to shooting as well).","locations":[{"ref":"crates/mtp-rs/examples/fuji_capture.rs:59-117","code":"   59 |     // Step 4: Poll AFStatus until ready\n   60 |     println!(\"\\nStep 4: Polling AFStatus (0xD209)...\");\n   61 |     for i in 0..50 {\n   62 |         tokio::time::sleep(tokio::time::Duration::from_millis(100)).await;\n   63 |         match session.get_device_prop_desc(prop_0xd209).await {\n   64 |             Ok(desc) => {\n   65 |                 println!(\"  Attempt {}: {:?}\", i + 1, desc.current_value);\n   66 |                 if let PropertyValue::Uint16(status) = desc.current_value {\n   67 |                     if status != 0x0001 {\n   68 |                         if status == 2 {\n   69 |                             println!(\"  -> Focus OK!\");\n   70 |                         } else if status == 3 {\n   71 |                             println!(\"  -> Focus FAILED (out of focus?)\");\n   72 |                         }\n   73 |                         break;\n   74 |                     }\n   75 |                 }\n   76 |             }\n   77 |             Err(e) => {\n   78 |                 println!(\"  Error polling: {}\", e);\n   79 |                 break;\n   80 |             }\n   81 |         }\n   82 |     }\n   83 | \n   84 |     // Step 5: Set 0xD208 to 0x0304 (shoot)\n   85 |     println!(\"\\nStep 5: Setting capture control to SHOOT (0xD208 = 0x0304)...\");\n   86 |     match session\n   87 |         .set_device_prop_value_typed(prop_0xd208, &PropertyValue::Uint16(0x0304))\n   88 |         .await\n   89 |     {\n   90 |         Ok(()) => println!(\"  OK\"),\n   91 |         Err(e) => println!(\"  Error: {}\", e),\n   92 |     }\n   93 | \n   94 |     // Step 6: InitiateCapture (triggers shutter)\n   95 |     println!(\"\\nStep 6: InitiateCapture (shoot phase)...\");\n   96 |     match session\n   97 |         .initiate_capture(StorageId(0), ObjectFormatCode::Undefined)\n   98 |         .await\n   99 |     {\n  100 |         Ok(()) => {\n  101 |             println!(\"  SUCCESS! Shutter should fire now.\");\n  102 |             // Wait for capture to complete\n  103 |             tokio::time::sleep(tokio::time::Duration::from_secs(2)).await;\n  104 |         }\n  105 |         Err(e) => println!(\"  Error: {:?}\", e),\n  106 |     }\n  107 | \n  108 |     // Reset priority mode\n  109 |     println!(\"\\nResetting priority mode (0xD207 = 1)...\");\n  110 |     let _ = session\n  111 |         .set_device_prop_value_typed(prop_0xd207, &PropertyValue::Uint16(1))\n  112 |         .await;\n  113 | \n  114 |     session.close().await?;\n  115 |     println!(\"\\n=== Done ===\");\n  116 |     Ok(())\n  117 | }","lines":59,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/examples/fuji_capture.rs#L59-L117"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `fuji_capture.rs` Step 4, the polling loop only breaks on `status != 0x0001` or on an `Err` from `get_device_prop_desc`. If the AF status never leaves 0x0001 (busy/focusing) within all 50 attempts (5 seconds total), the loop simply exhausts and falls through silently with no \"timed out\" message, then proceeds straight to the SHOOT step as if focus had succeeded.","fix":"Track whether the loop exited via break (focus resolved) vs. exhausting all 50 iterations, and print/handle a timeout case distinctly before proceeding to the shoot phase.","locations":[{"ref":"crates/mtp-rs/examples/fuji_capture.rs:61-82","code":"   61 |     for i in 0..50 {\n   62 |         tokio::time::sleep(tokio::time::Duration::from_millis(100)).await;\n   63 |         match session.get_device_prop_desc(prop_0xd209).await {\n   64 |             Ok(desc) => {\n   65 |                 println!(\"  Attempt {}: {:?}\", i + 1, desc.current_value);\n   66 |                 if let PropertyValue::Uint16(status) = desc.current_value {\n   67 |                     if status != 0x0001 {\n   68 |                         if status == 2 {\n   69 |                             println!(\"  -> Focus OK!\");\n   70 |                         } else if status == 3 {\n   71 |                             println!(\"  -> Focus FAILED (out of focus?)\");\n   72 |                         }\n   73 |                         break;\n   74 |                     }\n   75 |                 }\n   76 |             }\n   77 |             Err(e) => {\n   78 |                 println!(\"  Error polling: {}\", e);\n   79 |                 break;\n   80 |             }\n   81 |         }\n   82 |     }","lines":22,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/examples/fuji_capture.rs#L61-L82"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In cancel_transfer's bulk-IN drain loop (step 2), `Err(_) => Ok(true)` treats ANY transfer error (including TransferError::Stall) as 'drain complete' without ever calling clear_halt on bulk_in. The loop then just calls cancel_all()/drains pending and breaks - the halt is left in place. Recovery only happens later if settle_after_cancel's GET_DEVICE_STATUS response happens to report the stalled endpoint address in its parameters (step 4) - but AGENTS.md explicitly notes Android does not implement GET_DEVICE_STATUS at all ('Android doesn't implement the request; its failure is ignored'), so on Android specifically a Stall surfacing during this drain leaves bulk_in halted when cancel_transfer returns Ok(()). The very next receive_bulk call will hit the stall and self-heal via clear_halt_if_stalled, so the practical impact is one extra failed round-trip rather than a permanent wedge, but it's inconsistent with the file's own stated invariant that 'every bulk completion site clears the halt via clear_halt on STALL.'","fix":"Special-case Err(TransferError::Stall) to call ep.clear_halt().wait() before treating the drain as done, the same way clear_halt_if_stalled does at every other transfer-completion site in this file.","locations":[{"ref":"crates/mtp-rs/src/transport/nusb.rs:843-864","code":"  843 |                         futures::future::Either::Left((completion, _)) => {\n  844 |                             match completion.status {\n  845 |                                 Ok(()) => {\n  846 |                                     // Check for Response container (type code 3 at bytes [4..6]).\n  847 |                                     if completion.actual_len >= 6 {\n  848 |                                         let type_code = u16::from_le_bytes([\n  849 |                                             completion.buffer[4],\n  850 |                                             completion.buffer[5],\n  851 |                                         ]);\n  852 |                                         if type_code == 3 {\n  853 |                                             Ok(true) // Response received, done\n  854 |                                         } else {\n  855 |                                             Ok(false) // Data, keep draining\n  856 |                                         }\n  857 |                                     } else {\n  858 |                                         Ok(false) // keep draining\n  859 |                                     }\n  860 |                                 }\n  861 |                                 Err(TransferError::Cancelled) => Ok(true),\n  862 |                                 Err(TransferError::Disconnected) => Err(crate::Error::Disconnected),\n  863 |                                 Err(_) => Ok(true),\n  864 |                             }","lines":22,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/nusb.rs#L843-L864"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`read_partial` calls `file.read(&mut buf)` exactly once and assumes the returned byte count is final (`buf.truncate(n)`). `Read::read` is permitted by its trait contract to perform a short read (returning fewer bytes than the buffer even when more data is available and EOF has not been reached); relying on a single call to fill the buffer is not guaranteed to produce a full max_bytes-sized read in all cases. For local regular files this rarely manifests with std's default implementations, but it's not a spec-guaranteed invariant, and `download_partial`/`download_partial_64` tests in mod.rs assert exact byte ranges are returned, baking in the (currently incidental) assumption that one read() call fills the request.","fix":"Use std::io::Read::read_to_end on a Take adapter (file.take(max_bytes as u64)) or loop read() until either the buffer is full or 0 bytes are returned, instead of relying on a single read() call.","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/handlers.rs:317-320","code":"  317 |             let mut buf = vec![0u8; max_bytes];\n  318 |             match file.read(&mut buf) {\n  319 |                 Ok(n) => {\n  320 |                     buf.truncate(n);","lines":4,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/handlers.rs#L317-L320"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `VirtualTransport::send_bulk` (mod.rs), when a COMMAND container arrives for SendObjectInfo, SendObject, or SetObjectPropValue, the command is unconditionally stashed into `state.pending_command` without first checking `state.session_open`. The actual \"session must be open\" check only happens later, inside `handlers::dispatch`, which is not invoked until the matching DATA container arrives and the pending command is dispatched. This means a client that sends one of these three commands without an open session receives no response at all until it also sends a data phase - unlike every other operation, which is rejected immediately with SESSION_NOT_OPEN by `dispatch`. This is a protocol-layer behavior gap: real devices (and this virtual device for all other opcodes) respond to a command immediately when it's invalid, rather than silently waiting for a data phase that may never come.","fix":"Before stashing a data-phase command as pending, check state.session_open (mirroring the check at the top of handlers::dispatch) and immediately queue a SESSION_NOT_OPEN response without setting pending_command if the session isn't open.","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/mod.rs:149-165","code":"  149 |                 // Check if this operation expects a data phase from the host.\n  150 |                 // If so, don't dispatch yet -- store the command and wait for data.\n  151 |                 let op = crate::ptp::OperationCode::from(code);\n  152 |                 if matches!(\n  153 |                     op,\n  154 |                     crate::ptp::OperationCode::SendObjectInfo\n  155 |                         | crate::ptp::OperationCode::SendObject\n  156 |                         | crate::ptp::OperationCode::SetObjectPropValue\n  157 |                 ) {\n  158 |                     state.pending_command = Some(PendingCommand {\n  159 |                         code,\n  160 |                         tx_id,\n  161 |                         params,\n  162 |                     });\n  163 |                 } else {\n  164 |                     handlers::dispatch(&mut state, code, tx_id, &params, None);\n  165 |                 }","lines":17,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/mod.rs#L149-L165"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`VirtualTransport::send_bulk` silently overwrites `state.pending_command` if a new COMMAND container for SendObjectInfo/SendObject/SetObjectPropValue arrives while a previous one is still pending (i.e. its data phase was never sent). The first pending command is dropped with no response ever queued for its transaction ID, which would desync transaction IDs for any client that hit this path (e.g. a buggy or adversarial sequence, or a fuzz test). There is no detection or rejection of this out-of-protocol sequence.","fix":"If state.pending_command is already Some when a new data-phase-expecting command arrives, either reject the new command (e.g. respond GENERAL_ERROR/SESSION_NOT_OPEN style for the abandoned tx_id) or explicitly document/assert that this sequence is unsupported, instead of silently losing the earlier command's response.","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/mod.rs:152-165","code":"  152 |                 if matches!(\n  153 |                     op,\n  154 |                     crate::ptp::OperationCode::SendObjectInfo\n  155 |                         | crate::ptp::OperationCode::SendObject\n  156 |                         | crate::ptp::OperationCode::SetObjectPropValue\n  157 |                 ) {\n  158 |                     state.pending_command = Some(PendingCommand {\n  159 |                         code,\n  160 |                         tx_id,\n  161 |                         params,\n  162 |                     });\n  163 |                 } else {\n  164 |                     handlers::dispatch(&mut state, code, tx_id, &params, None);\n  165 |                 }","lines":14,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/mod.rs#L152-L165"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"find_storage_for_path() picks the first storage_map entry whose backing dir is a prefix of the event path, via `storage_map.iter().find(...)`. If two configured storages have nested backing directories (e.g. storage A backed by `/tmp/a` and storage B backed by `/tmp/a/sub`), a filesystem event under `/tmp/a/sub/foo.txt` matches whichever storage happens to appear first in `state.storages` (insertion order from config), not necessarily the most specific (deepest) match. This can attribute a watcher-detected file to the wrong storage ID, silently corrupting the object tree for one of the two storages. VirtualDeviceConfig does not validate that backing dirs are non-overlapping.","fix":"Either document that overlapping/nested backing directories are unsupported and validate against it in VirtualDeviceConfig construction, or pick the longest (most specific) matching prefix instead of the first one (e.g. max_by_key(|(dir, _)| dir.as_os_str().len())).","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/watcher.rs:238-246","code":"  238 | fn find_storage_for_path<'a>(\n  239 |     path: &std::path::Path,\n  240 |     storage_map: &'a StorageMap,\n  241 | ) -> Option<(StorageId, &'a PathBuf)> {\n  242 |     storage_map\n  243 |         .iter()\n  244 |         .find(|(dir, _)| path.starts_with(dir))\n  245 |         .map(|(dir, sid)| (*sid, dir))\n  246 | }","lines":9,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/watcher.rs#L238-L246"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`doctor` is meant to be a diagnostic command and explicitly prints a\nstructured JSON report on two of its three failure paths (no devices found;\ndevice-open failure) before returning the error, so a `--json` consumer\nalways gets a report. However, if `device.storages()` fails (line 82-85) or\n`storage.list_objects(None)` fails while iterating storages (line 100-103),\nthe function returns the error via `?` with no JSON ever printed, even\nthough `--json` was requested. This is copy-paste drift relative to the\nother two failure branches in the same function, and leaves JSON consumers\nof `doctor` with empty output (just a process exit code) on these paths,\ndefeating the command's diagnostic purpose.","fix":"Wrap the storages() and list_objects() calls the same way the open_selected_device() call is handled: on error, build and print the partial DoctorRow (with whatever storage_rows were already collected) when cli.json is set, then return the error.","locations":[{"ref":"crates/mtp-rs-cli/src/cli/commands/doctor.rs:82-103","code":"   82 |     let storages = device\n   83 |         .storages()\n   84 |         .await\n   85 |         .map_err(|e| CliError::from_mtp(\"list storages\", e, cli.verbose))?;\n   86 |     let mut storage_rows = Vec::new();\n   87 |     if !cli.json {\n   88 |         println!(\"storages: {}\", storages.len());\n   89 |     }\n   90 |     for (index, storage) in storages.iter().enumerate() {\n   91 |         if !cli.json {\n   92 |             println!(\n   93 |                 \"  [{}] {} free={} access={:?}\",\n   94 |                 index,\n   95 |                 storage.info().description,\n   96 |                 storage.info().free_space_bytes,\n   97 |                 storage.info().access_capability\n   98 |             );\n   99 |         }\n  100 |         let root = storage\n  101 |             .list_objects(None)\n  102 |             .await\n  103 |             .map_err(|e| CliError::from_mtp(\"list storage root\", e, cli.verbose))?;","lines":22,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs-cli/src/cli/commands/doctor.rs#L82-L103"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`MtpDevice::close()`'s doc comment says \"Close the connection (also happens on drop).\" Neither claim holds: there is no `Drop` impl for `PtpSession` or `MtpDeviceInner` anywhere in the crate (verified via grep for `impl Drop`), so `CloseSession` is never sent automatically when an `MtpDevice` is dropped - contrary to both this doc comment and the equivalent claim in docs/architecture.md (\"Session cleanup: When MtpDevice is dropped, CloseSession is sent automatically\"). Additionally, `close()` itself silently no-ops (returns `Ok(())` without sending `CloseSession`) whenever any other `Arc<MtpDeviceInner>` reference is alive - which happens routinely, since every live `Storage` returned by `device.storages()` holds its own clone of the same `Arc`. A caller who calls `.close()` while a `Storage` is still in scope gets `Ok(())` but the device session is never told to close.","fix":"Either document the silent-no-op-on-shared-Arc behavior explicitly (e.g. \"returns Ok(()) without sending CloseSession if any Storage or other clone is still alive\"), or change the doc comment to drop the false \"(also happens on drop)\" claim. Consider also fixing docs/architecture.md's matching claim.","locations":[{"ref":"crates/mtp-rs/src/mtp/device.rs:291-300","code":"  291 |     /// Close the connection (also happens on drop).\n  292 |     pub async fn close(self) -> Result<(), Error> {\n  293 |         // Try to close gracefully, but Arc might have multiple references\n  294 |         if let Ok(inner) = Arc::try_unwrap(self.inner) {\n  295 |             if let Ok(session) = Arc::try_unwrap(inner.session) {\n  296 |                 session.close().await?;\n  297 |             }\n  298 |         }\n  299 |         Ok(())\n  300 |     }","lines":10,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/mtp/device.rs#L291-L300"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"Error::Io(std::io::Error) is declared without #[source] (and without #[from], unlike Error::Usb(#[from] nusb::Error) two lines above). thiserror only wires up std::error::Error::source() for fields annotated #[source]/#[from]; without it, callers walking the error's causal chain (e.g. anyhow/eyre context printers, structured loggers) cannot see the wrapped io::Error that low-level transport failures (STALL, disconnects, timeouts converted via convert_transfer_error) carry. This degrades diagnosability for exactly the hardware-failure paths this crate cares most about.","fix":"Annotate the field: Io(#[source] std::io::Error), so the wrapped error participates in the standard source chain (no behavior change needed elsewhere since callers already construct it via explicit Error::Io(...), not `?`).","locations":[{"ref":"crates/mtp-rs/src/error.rs:29-31","code":"   29 |     /// I/O error\n   30 |     #[error(\"I/O error: {0}\")]\n   31 |     Io(std::io::Error),","lines":3,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/error.rs#L29-L31"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"pause_watcher() increments the pause refcount via `state_arc.lock().unwrap()`, which panics if the mutex is poisoned (e.g., a prior panic while a handler held the state lock mid-mutation). WatcherGuard::drop(), by contrast, uses `if let Ok(mut state) = self.state.lock()` and silently no-ops on poison. This asymmetry means: once the mutex is poisoned, every future pause_watcher() call panics (propagating the poison to the caller, likely a test harness), while any *already-held* guard's decrement silently does nothing on drop instead of surfacing the poisoned state. The two halves of the same refcount protocol handle the identical failure mode in opposite ways.","fix":"Make both sides consistent: either have pause_watcher() also tolerate poison (e.g. via `.unwrap_or_else(|e| e.into_inner())` to recover the lock and keep going, matching the guard's lenient behavior), or have both sides propagate/panic so a poisoned virtual device fails loudly everywhere instead of being silently inert in Drop only.","locations":[{"ref":"crates/mtp-rs/src/transport/virtual_device/registry.rs:184","code":"  184 |     state_arc.lock().unwrap().pause_count += 1;","lines":1,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/registry.rs#L184"},{"ref":"crates/mtp-rs/src/transport/virtual_device/registry.rs:142-148","code":"  142 | impl Drop for WatcherGuard {\n  143 |     fn drop(&mut self) {\n  144 |         if let Ok(mut state) = self.state.lock() {\n  145 |             state.pause_count = state.pause_count.saturating_sub(1);\n  146 |         }\n  147 |     }\n  148 | }","lines":7,"link":"https://github.com/vdavid/mtp-rs/blob/3b01ed8fed6d790fd9b3e199cd390f07a0a30491/crates/mtp-rs/src/transport/virtual_device/registry.rs#L142-L148"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"The mtp-rs benchmark backend (MtpRsBackend) re-fetches Storage via `self.storage().await` (which issues a real GetStorageInfo PTP command over USB) as the FIRST line inside `upload`, `download`, and `list_objects`. In runner.rs, `Instant::now()` is started immediately before calling these methods for the Upload, Download, and ListFiles scenarios, so the extra GetStorageInfo USB round-trip is included inside every single timed measurement for the mtp-rs backend. The libmtp backend's equivalent calls (`pool.files_and_folders`, `pool.get_file_to_handler`) reuse an already-cached `storage_pool()` with no per-call metadata round trip. This asymmetry systematically biases the benchmark against mtp-rs, making it look slower than it actually is, especially for small files and the ListFiles scenario where the GetStorageInfo overhead is a large fraction of the total time.","fix":"Cache the `Storage` handle once in `MtpRsBackend::connect()` (e.g. behind a `Mutex` or by storing it directly instead of re-deriving it from `storage_id` every call), or move the `self.storage().await?` call outside the timed region by exposing a `storage()`/prepare step that callers in runner.rs invoke before
