<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"RLE decode paths unconditionally write pixel[0], pixel[1] and pixel[2] for every output pixel, but when set_indexed_color(true) is enabled num_channels() returns 1, so each pixel slice from row.chunks_exact_mut(num_channels) has length 1. Decoding any RLE4/RLE8/RLE24 image with indexed_color set therefore indexes out of bounds and panics. set_indexed_color is public, so this is reachable from untrusted input. The non-RLE palettized path handles indexed_color (clone_from_slice of indices), but the RLE path has no such handling.","fix":"Either reject indexed_color combined with RLE image types early (return an error in read_image_data_impl), or add an indexed/skip-palette branch to read_rle_data that writes a single index byte per pixel like read_palettized_pixel_data does.","locations":[{"ref":"src/codecs/bmp/decoder.rs:2250-2312","code":" 2250 |                                     ImageType::RLE24 => {\n 2251 |                                         for _ in 0..count {\n 2252 |                                             let b = rle_reader.read_byte()?;\n 2253 |                                             let g = rle_reader.read_byte()?;\n 2254 |                                             let r = rle_reader.read_byte()?;\n 2255 |                                             if let Some(pixel) = pixel_iter.next() {\n 2256 |                                                 pixel[0] = r;\n 2257 |                                                 pixel[1] = g;\n 2258 |                                                 pixel[2] = b;\n 2259 |                                             }\n 2260 |                                         }\n 2261 |                                         // RLE24 absolute mode pads to word (2-byte) boundary.\n 2262 |                                         if !(count * 3).is_multiple_of(2) {\n 2263 |                                             rle_reader.read_byte()?;\n 2264 |                                         }\n 2265 |                                     }\n 2266 |                                     _ => unreachable!(),\n 2267 |                                 }\n 2268 |                                 x += count as u32;\n 2269 |                             }\n 2270 |                         }\n 2271 |                     }\n 2272 |                     _ => {\n 2273 |                         // Encoded run: pixel data differs by RLE type.\n 2274 |                         let n_pixels = control_byte as usize;\n 2275 |                         match image_type {\n 2276 |                             ImageType::RLE8 => {\n 2277 |                                 // Clamp to row length for compat with imagemagick:\n 2278 |                                 // https://github.com/image-rs/image/issues/2321\n 2279 |                                 let palette_index = rle_reader.read_byte()?;\n 2280 |                                 let repeat_pixel: [u8; 3] = p.unwrap()[palette_index as usize];\n 2281 |                                 (&mut pixel_iter).take(n_pixels).for_each(|p| {\n 2282 |                                     p[0] = repeat_pixel[0];\n 2283 |                                     p[1] = repeat_pixel[1];\n 2284 |                                     p[2] = repeat_pixel[2];\n 2285 |                                 });\n 2286 |                             }\n 2287 |                             ImageType::RLE4 => {\n 2288 |                                 let palette_index = rle_reader.read_byte()?;\n 2289 |                                 // Silently truncate if run overflows the row\n 2290 |                                 // (matches RLE8 encoded run behavior).\n 2291 |                                 let success = set_4bit_pixel_run(\n 2292 |                                     &mut pixel_iter,\n 2293 |                                     p.unwrap(),\n 2294 |                                     repeat(&palette_index),\n 2295 |                                     n_pixels,\n 2296 |                                 );\n 2297 |                                 if self.spec_strictness == SpecCompliance::Strict && !success {\n 2298 |                                     return Err(DecoderError::CorruptRleData.into());\n 2299 |                                 }\n 2300 |                             }\n 2301 |                             ImageType::RLE24 => {\n 2302 |                                 let b = rle_reader.read_byte()?;\n 2303 |                                 let g = rle_reader.read_byte()?;\n 2304 |                                 let r = rle_reader.read_byte()?;\n 2305 |                                 for _ in 0..n_pixels {\n 2306 |                                     if let Some(pixel) = pixel_iter.next() {\n 2307 |                                         pixel[0] = r;\n 2308 |                                         pixel[1] = g;\n 2309 |                                         pixel[2] = b;\n 2310 |                                     }\n 2311 |                                 }\n 2312 |                             }","lines":63},{"ref":"src/codecs/bmp/decoder.rs:822-868","code":"  822 | fn set_8bit_pixel_run<'a, T: Iterator<Item = &'a u8>>(\n  823 |     pixel_iter: &mut ChunksExactMut<u8>,\n  824 |     palette: &[[u8; 3]],\n  825 |     indices: T,\n  826 |     n_pixels: usize,\n  827 | ) -> bool {\n  828 |     for idx in indices.take(n_pixels) {\n  829 |         if let Some(pixel) = pixel_iter.next() {\n  830 |             let rgb = palette[*idx as usize];\n  831 |             pixel[0] = rgb[0];\n  832 |             pixel[1] = rgb[1];\n  833 |             pixel[2] = rgb[2];\n  834 |         } else {\n  835 |             return false;\n  836 |         }\n  837 |     }\n  838 |     true\n  839 | }\n  840 | \n  841 | fn set_4bit_pixel_run<'a, T: Iterator<Item = &'a u8>>(\n  842 |     pixel_iter: &mut ChunksExactMut<u8>,\n  843 |     palette: &[[u8; 3]],\n  844 |     indices: T,\n  845 |     mut n_pixels: usize,\n  846 | ) -> bool {\n  847 |     for idx in indices {\n  848 |         macro_rules! set_pixel {\n  849 |             ($i:expr) => {\n  850 |                 if n_pixels == 0 {\n  851 |                     break;\n  852 |                 }\n  853 |                 if let Some(pixel) = pixel_iter.next() {\n  854 |                     let rgb = palette[$i as usize];\n  855 |                     pixel[0] = rgb[0];\n  856 |                     pixel[1] = rgb[1];\n  857 |                     pixel[2] = rgb[2];\n  858 |                 } else {\n  859 |                     return false;\n  860 |                 }\n  861 |                 n_pixels -= 1;\n  862 |             };\n  863 |         }\n  864 |         set_pixel!(idx >> 4);\n  865 |         set_pixel!(idx & 0xf);\n  866 |     }\n  867 |     true\n  868 | }","lines":47}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`Pixels::next` (the default `GenericImageView::pixels` iterator) panics on any image with `width == 0` and `height > 0`. When `self.x >= self.width` (always true since both are 0) it sets `x = 0` and increments `y`. It only returns `None` when `y >= height`, so for a 0-wide image with height > 0 it proceeds to call `self.image.get_pixel(0, 1)`, which is out of bounds and panics. The analogous `ImageBuffer::EnumeratePixels` avoids this only because it is backed by an (empty) slice iterator; any other `GenericImageView` implementation using the trait default will panic.","fix":"Guard the width==0 case, e.g. return `None` immediately if `self.width == 0` (or `self.x >= self.width && self.y + 1 >= self.height`), mirroring the empty-row handling in the buffer iterators.","locations":[{"ref":"src/images/generic_image.rs:159-175","code":"  159 |     fn next(&mut self) -> Option<(u32, u32, I::Pixel)> {\n  160 |         if self.x >= self.width {\n  161 |             self.x = 0;\n  162 |             self.y += 1;\n  163 |         }\n  164 | \n  165 |         if self.y >= self.height {\n  166 |             None\n  167 |         } else {\n  168 |             let pixel = self.image.get_pixel(self.x, self.y);\n  169 |             let p = (self.x, self.y, pixel);\n  170 | \n  171 |             self.x += 1;\n  172 | \n  173 |             Some(p)\n  174 |         }\n  175 |     }","lines":17}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In the TIFF planar interleave path, `plane_stride` is taken as `layout.plane_stride.map_or(0, |n| n.get())`, defaulting to 0 when the layout reports no stride. The value is then passed directly to `bytes.as_bytes().chunks_exact(plane_stride)`. `slice::chunks_exact(0)` panics ('chunk size must be non-zero'). Since this code runs only for `layout.planes > 1` (multi-plane TIFFs derived from untrusted input), a crafted planar TIFF that yields planes>1 with no stride can panic the decoder.","fix":"Validate that `plane_stride` is non-zero (and matches the expected per-plane byte size) before calling `chunks_exact`; return a DecodingError instead of panicking when it is 0/None.","locations":[{"ref":"src/codecs/tiff.rs:225-231","code":"  225 |         let plane_stride = layout.plane_stride.map_or(0, |n| n.get());\n  226 |         let bytes = self.buffer.as_buffer(0);\n  227 | \n  228 |         let planes = bytes\n  229 |             .as_bytes()\n  230 |             .chunks_exact(plane_stride)\n  231 |             .collect::<Vec<_>>();","lines":7},{"ref":"src/codecs/tiff.rs:483-487","code":"  483 |         if layout.planes > 1 {\n  484 |             // Note that we do not support planar layouts if we have to do conversion. Yet. See a\n  485 |             // more detailed comment in the implementation.\n  486 |             self.interleave_planes(info, layout, buf)?;\n  487 |             return Ok(DecodedImageAttributes::default());","lines":5}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"Both `ImageBuffer::copy_within` and the default `GenericImage::copy_within` start with `assert!(sx < self.width() && dx < self.width())` and the same for height. For an empty image (`width == 0` or `height == 0`) these asserts always fail, so calling `copy_within` on an empty image panics instead of returning `false` or `true` for a zero-area copy. A zero-area source rect at the origin of a non-empty image also hits the underflow/assert paths.","fix":"Handle the empty-image / zero-area cases explicitly (return early) before the asserts, or relax the asserts to `<=`/range checks that tolerate a degenerate copy.","locations":[{"ref":"src/images/buffer.rs:1416-1417","code":" 1416 |         assert!(sx < self.width() && dx < self.width());\n 1417 |         assert!(sy < self.height() && dy < self.height());","lines":2},{"ref":"src/images/generic_image.rs:294-295","code":"  294 |         assert!(sx < self.width() && dx < self.width());\n  295 |         assert!(sy < self.height() && dy < self.height());","lines":2}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`read_image` asserts `assert_eq!(u64::try_from(buf.len()), Ok(prepared.total_bytes()))` and asserts the bit depth, turning a caller-supplied buffer-size mismatch into a panic rather than a returned `ImageError`. For a decoder that handles untrusted input via a public-ish API surface, a wrong buffer length should be a recoverable error, not an abort.","fix":"Return an ImageError (e.g. a parameter/limits error) on buffer-size mismatch instead of asserting.","locations":[{"ref":"src/codecs/avif/decoder.rs:437-445","code":"  437 |     fn read_image(&mut self, buf: &mut [u8]) -> ImageResult<DecodedImageAttributes> {\n  438 |         let prepared = self.prepare_image()?;\n  439 |         assert_eq!(u64::try_from(buf.len()), Ok(prepared.total_bytes()));\n  440 | \n  441 |         let bit_depth = self.picture.bit_depth();\n  442 | \n  443 |         // Normally this should never happen,\n  444 |         // if this happens then there is an incorrect implementation somewhere else\n  445 |         assert!(bit_depth == 8 || bit_depth == 10 || bit_depth == 12);","lines":9}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"read_metadata_in_ico_format halves self.height (self.height /= 2) after metadata parsing. For a malformed ICO/DIB whose declared (doubled) height is 0 or 1, the halved height becomes 0. Subsequent decode computes last_row = (self.height - 1).try_into::<u32>().unwrap(), which panics on -1, and prepare_image reports a zero-height image. The overflow/size check ran on the pre-halved height, so this case is not caught earlier.","fix":"After halving, validate that height >= 1 (return a decoding error otherwise) before allowing image-data reads.","locations":[{"ref":"src/codecs/bmp/decoder.rs:1729-1732","code":" 1729 |         // The height field in an ICO file is doubled to account for the AND mask\n 1730 |         // (whether or not an AND mask is actually present).\n 1731 |         self.height /= 2;\n 1732 |         Ok(())","lines":4},{"ref":"src/codecs/bmp/decoder.rs:1853","code":" 1853 |         let last_row: u32 = (self.height - 1).try_into().unwrap();","lines":1},{"ref":"src/codecs/bmp/decoder.rs:1925","code":" 1925 |         let last_row: u32 = (height - 1).try_into().unwrap();","lines":1}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"encode_pixels computes line_bytes/marker buffers and iterates height scanlines but relies on assert! to guarantee enough pixels per scanline. If the ExactSizeIterator's reported len() is inaccurate (a misbehaving custom iterator), the per-scanline copy loop silently writes fewer pixels (zip stops early) producing corrupt output, or the assert at line 89 panics. The encoder trusts iterator len() rather than the actually produced items.","fix":"Either rely solely on the produced items (detect short scanlines and error) or document that len() must be exact; do not panic on encode of an otherwise valid call.","locations":[{"ref":"src/codecs/hdr/encoder.rs:88-102","code":"   88 |             for _scanline_index in 0..height {\n   89 |                 assert!(flattened_rgbe_pixels.len() >= width); // may reduce the bound checks\n   90 | \n   91 |                 for ((((r, g), b), e), pixel) in bufr\n   92 |                     .iter_mut()\n   93 |                     .zip(bufg.iter_mut())\n   94 |                     .zip(bufb.iter_mut())\n   95 |                     .zip(bufe.iter_mut())\n   96 |                     .zip(&mut flattened_rgbe_pixels)\n   97 |                 {\n   98 |                     *r = pixel.c[0];\n   99 |                     *g = pixel.c[1];\n  100 |                     *b = pixel.c[2];\n  101 |                     *e = pixel.e;\n  102 |                 }","lines":15}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The rgba_channels setter closure calls index_in_display_window.to_usize(\"index bug\").unwrap(). Although guarded by the preceding non-negative and bounds checks, this unwrap will panic if the exr library's coordinate invariants are ever violated for a crafted file, turning a malformed-input case into a process abort inside the decode callback.","fix":"Propagate a decoding error instead of unwrapping, or document why the conversion is infallible given the preceding bounds checks.","locations":[{"ref":"src/codecs/openexr.rs:196-203","code":"  196 |                         let index_in_display_window =\n  197 |                             index_in_display_window.to_usize(\"index bug\").unwrap();\n  198 |                         let first_f32_index =\n  199 |                             index_in_display_window.flat_index_for_size(display_window.size);\n  200 | \n  201 |                         buffer[first_f32_index * channel_count\n  202 |                             ..(first_f32_index + 1) * channel_count]\n  203 |                             .copy_from_slice(&[r, g, b, a_or_1][0..channel_count]);","lines":8}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"ImageLayout::total_bytes_overflows_u64 divides by `bytes_per_pixel` without guarding against zero. For the current ColorType enum bytes_per_pixel is always >= 1 so it cannot panic today, but the method is a `pub(crate)` helper with no documented precondition; if a zero-bpp color type is ever added (or this is reused for ExtendedColorType / Unknown(0)) it becomes a division-by-zero panic. The sibling method total_bytes() uses saturating_mul and is safe.","fix":"Guard the divisor (e.g. return false / saturate when bytes_per_pixel == 0) or compute via checked/saturating multiplication like total_bytes() does instead of dividing u64::MAX by bpp.","locations":[{"ref":"src/io.rs:103-107","code":"  103 |     pub(crate) fn total_bytes_overflows_u64(&self) -> bool {\n  104 |         let &ImageLayout { width, height, .. } = self;\n  105 |         let bytes_per_pixel: u8 = self.color.bytes_per_pixel();\n  106 |         u64::from(width) * u64::from(height) > u64::MAX / u64::from(bytes_per_pixel)\n  107 |     }","lines":5}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"Limits::free_usize panics deliberately ('we should have exited earlier when the reserve failed') when an amount exceeds u64 range while max_alloc is set. This couples free_usize correctness to the assumption that a matching reserve_usize was always called first and succeeded; a caller that frees without a prior reserve (or frees a different/larger amount) on a 128-bit-capable usize platform would trigger a panic in resource-cleanup code. This is reachable as a public API misuse rather than an invariant the type can enforce.","fix":"Saturate or no-op instead of panicking; free is best-effort accounting and should never abort the program even on misuse.","locations":[{"ref":"src/io/limits.rs:167-177","code":"  167 |     pub fn free_usize(&mut self, amount: usize) {\n  168 |         match u64::try_from(amount) {\n  169 |             Ok(n) => self.free(n),\n  170 |             Err(_) if self.max_alloc.is_some() => {\n  171 |                 panic!(\"max_alloc is set, we should have exited earlier when the reserve failed\");\n  172 |             }\n  173 |             Err(_) => {\n  174 |                 // Out of bounds, but we weren't asked to consider any limit.\n  175 |             }\n  176 |         }\n  177 |     }","lines":11}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"read_icc_profile allocates vec![0u8; icc.profile_size as usize] where profile_size is a u32 read directly from the (untrusted) V5 header, before any data is read. A malformed file can declare a profile size of up to ~4 GiB, causing a large eager allocation (DoS) even when the actual file is tiny. Other allocation sites in this file deliberately use vec_try_with_capacity / allocate_row_buffer for OOM protection; this one does not.","fix":"Use vec_try_with_capacity (mapping failure to a graceful error) and/or clamp profile_size against the remaining file length before allocating.","locations":[{"ref":"src/codecs/bmp/decoder.rs:1460-1466","code":" 1460 |     fn read_icc_profile(&mut self, icc: &ParsedIccProfile) -> ImageResult<()> {\n 1461 |         self.reader.seek(SeekFrom::Start(icc.profile_offset))?;\n 1462 |         let mut profile_data = vec![0u8; icc.profile_size as usize];\n 1463 |         self.reader.read_exact(&mut profile_data)?;\n 1464 |         self.icc_profile = Some(profile_data);\n 1465 |         Ok(())\n 1466 |     }","lines":7}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`ImageBuffer::copy_within` computes `self.pixel_indices_unchecked(sx + width - 1, sy)` to find the end of the source row. If `source.width == 0` this underflows (`sx + 0 - 1`), panicking in debug builds and computing a wildly out-of-range index (and thus an out-of-bounds `copy_within`) in release. The early `if self.width() - dx.max(sx) < width` check does not reject `width == 0`. The generic default implementation in generic_image.rs does not have this problem because it iterates `0..width` instead of computing `width - 1`.","fix":"Return `true` early (nothing to copy) when `width == 0 || height == 0`, or compute the source range as `start..start + width*channels` instead of using `pixel_indices_unchecked(sx + width - 1, ...)`.","locations":[{"ref":"src/images/buffer.rs:1418-1439","code":" 1418 |         if self.width() - dx.max(sx) < width || self.height() - dy.max(sy) < height {\n 1419 |             return false;\n 1420 |         }\n 1421 | \n 1422 |         if sy < dy {\n 1423 |             for y in (0..height).rev() {\n 1424 |                 let sy = sy + y;\n 1425 |                 let dy = dy + y;\n 1426 |                 let Range { start, .. } = self.pixel_indices_unchecked(sx, sy);\n 1427 |                 let Range { end, .. } = self.pixel_indices_unchecked(sx + width - 1, sy);\n 1428 |                 let dst = self.pixel_indices_unchecked(dx, dy).start;\n 1429 |                 self.data.copy_within(start..end, dst);\n 1430 |             }\n 1431 |         } else {\n 1432 |             for y in 0..height {\n 1433 |                 let sy = sy + y;\n 1434 |                 let dy = dy + y;\n 1435 |                 let Range { start, .. } = self.pixel_indices_unchecked(sx, sy);\n 1436 |                 let Range { end, .. } = self.pixel_indices_unchecked(sx + width - 1, sy);\n 1437 |                 let dst = self.pixel_indices_unchecked(dx, dy).start;\n 1438 |                 self.data.copy_within(start..end, dst);\n 1439 |             }","lines":22}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Delay::closest_bounded_fraction computes the initial guess as `(u64::from(nom * 2 > denom), 1u64)` using `nom * 2` in u32 arithmetic before widening. The function asserts only `nom < denom` and `0 < denom`, allowing nom up to ~u32::MAX-1, in which case `nom * 2` overflows u32 (debug panic / release wrap) and yields a wrong initial Farey guess. The current sole caller passes nom = submillis (< 1_000_000) so it is not reachable today, but the function is a general helper and the surrounding code deliberately widens everything else to u64 to avoid exactly this class of bug.","fix":"Compute the comparison in u64: `(u64::from(nom) * 2 > u64::from(denom)) as u64`.","locations":[{"ref":"src/animation.rs:204-235","code":"  204 |     fn closest_bounded_fraction(denom_bound: u32, nom: u32, denom: u32) -> (u32, u32) {\n  205 |         use std::cmp::Ordering::*;\n  206 |         assert!(0 < denom);\n  207 |         assert!(0 < denom_bound);\n  208 |         assert!(nom < denom);\n  209 | \n  210 |         // Avoid a few type troubles. All intermediate results are bounded by `denom_bound` which\n  211 |         // is in turn bounded by u32::MAX. Representing with u64 allows multiplication of any two\n  212 |         // values without fears of overflow.\n  213 | \n  214 |         // Compare two fractions whose parts fit into a u32.\n  215 |         fn compare_fraction((an, ad): (u64, u64), (bn, bd): (u64, u64)) -> Ordering {\n  216 |             (an * bd).cmp(&(bn * ad))\n  217 |         }\n  218 | \n  219 |         // Computes the nominator of the absolute difference between two such fractions.\n  220 |         fn abs_diff_nom((an, ad): (u64, u64), (bn, bd): (u64, u64)) -> u64 {\n  221 |             let c0 = an * bd;\n  222 |             let c1 = ad * bn;\n  223 | \n  224 |             let d0 = c0.max(c1);\n  225 |             let d1 = c0.min(c1);\n  226 |             d0 - d1\n  227 |         }\n  228 | \n  229 |         let exact = (u64::from(nom), u64::from(denom));\n  230 |         // The lower bound fraction, numerator and denominator.\n  231 |         let mut lower = (0u64, 1u64);\n  232 |         // The upper bound fraction, numerator and denominator.\n  233 |         let mut upper = (1u64, 1u64);\n  234 |         // The closest approximation for now.\n  235 |         let mut guess = (u64::from(nom * 2 > denom), 1u64);","lines":32}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In the size-precondition checks, the error-constructing branch recomputes `stride * height` with an unchecked multiplication. This branch is only ever reached when `stride.checked_mul(height)` returned None (i.e. the multiplication overflows usize), so building the `ErrorSize.expected` value will panic in debug builds and silently wrap in release builds. The whole point of the check is to reject such inputs gracefully, but it panics instead.","fix":"Store the result of `checked_mul` and reuse it; in the failure branch report the requested `stride` and `height` (or a saturating product) instead of recomputing `stride * height`.","locations":[{"ref":"src/codecs/avif/yuv.rs:92-103","code":"   92 |     if Some(plane.len()) != stride.checked_mul(height) {\n   93 |         return Err(ImageError::Decoding(DecodingError::new(\n   94 |             ImageFormat::Avif.into(),\n   95 |             YuvConversionError::YuvPlaneSizeMismatch(\n   96 |                 plane_definition,\n   97 |                 ErrorSize {\n   98 |                     expected: stride * height,\n   99 |                     received: plane.len(),\n  100 |                 },\n  101 |             ),\n  102 |         )));\n  103 |     }","lines":12},{"ref":"src/codecs/avif/yuv.rs:113-121","code":"  113 |     if Some(rgb_data.len()) != stride.checked_mul(height) {\n  114 |         return Err(ImageError::Decoding(DecodingError::new(\n  115 |             ImageFormat::Avif.into(),\n  116 |             YuvConversionError::RgbDestinationSizeMismatch(ErrorSize {\n  117 |                 expected: stride * height,\n  118 |                 received: rgb_data.len(),\n  119 |             }),\n  120 |         )));\n  121 |     }","lines":9}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"read_scanline computes end_pos - current_pos as an unchecked u64 subtraction. On a truncated file with large declared dimensions, the decoder seeks past EOF for the final scanline, so current_pos > end_pos and the subtraction underflows: in debug builds this panics, in release it wraps to a huge value (the comparison then simply fails and falls through to read_exact). It should use a checked/saturating subtraction.","fix":"Replace end_pos - current_pos with end_pos.checked_sub(current_pos) and treat None as 'not the short-by-one case', falling through to read_exact.","locations":[{"ref":"src/codecs/bmp/decoder.rs:720-734","code":"  720 |     if is_last_row && spec_strictness == SpecCompliance::Lenient {\n  721 |         let current_pos = reader.stream_position()?;\n  722 |         let end_pos = reader.seek(SeekFrom::End(0))?;\n  723 |         reader.seek(SeekFrom::Start(current_pos))?;\n  724 | \n  725 |         let Some((last, head)) = buf.split_last_mut() else {\n  726 |             // Empty row, nothing to read.\n  727 |             return Ok(());\n  728 |         };\n  729 | \n  730 |         if Ok(head.len()) == usize::try_from(end_pos - current_pos) {\n  731 |             reader.read_exact(head)?;\n  732 |             *last = b'\\0';\n  733 |             return Ok(());\n  734 |         }","lines":15}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In to_rgbe8, channel quantization uses f32::trunc(sv / mul * 256.0) as u8. For a channel whose value is negative (possible when one channel is negative but another is positive so mx > 0), the float result is negative and the 'as u8' saturating cast clamps to 0, silently losing the (already invalid) negative magnitude. More importantly NaN inputs become 0 silently. This is benign but the truncating/saturating cast hides malformed input rather than handling it explicitly.","fix":"Clamp inputs explicitly (e.g. max(0.0)) and handle NaN before casting, or document the saturation behavior; consider clamping the computed byte to 0..=255 range deliberately.","locations":[{"ref":"src/codecs/hdr/encoder.rs:289-296","code":"  289 |         let mut conv = [0u8; 3];\n  290 |         for (cv, &sv) in conv.iter_mut().zip(pix.iter()) {\n  291 |             *cv = f32::trunc(sv / mul * 256.0) as u8;\n  292 |         }\n  293 |         Rgbe8Pixel {\n  294 |             c: conv,\n  295 |             e: (exp + 128) as u8,\n  296 |         }","lines":8}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"read_ycbcr_coefficients only rejects rationals whose denominator is 0, but a luminance-green coefficient of exactly 0 (e.g. encoded as 0/N) is accepted. In ycbcr_to_rgb8 this yields `inv_lg = 1.0 / 0.0 = +inf`, and `g = (...) * inf` becomes inf/NaN for every pixel. The float-to-u8 cast saturates so there is no UB, but the entire green channel is corrupted from attacker-controlled tag data.","fix":"Reject (or clamp) YCbCr coefficients whose green/luminance component is 0, and guard against non-finite `inv_lg` before using it.","locations":[{"ref":"src/codecs/tiff.rs:303-339","code":"  303 | fn read_ycbcr_coefficients<R: BufRead + Seek>(decoder: &mut Decoder<R>) -> ImageResult<[f32; 3]> {\n  304 |     let value = decoder\n  305 |         .find_tag(TAG_YCBCR_COEFFICIENTS)\n  306 |         .map_err(ImageError::from_tiff_decode)?;\n  307 | \n  308 |     const DEFAULT_YCBCR_COEFFICIENTS: [f32; 3] = [0.299, 0.587, 0.114];\n  309 |     let Some(value) = value else {\n  310 |         return Ok(DEFAULT_YCBCR_COEFFICIENTS);\n  311 |     };\n  312 | \n  313 |     let list = match value {\n  314 |         Value::List(list) if list.len() == 3 => list,\n  315 |         _ => {\n  316 |             return Err(ImageError::Decoding(DecodingError::new(\n  317 |                 ImageFormat::Tiff.into(),\n  318 |                 \"YCbCrCoefficients tag (529) must contain exactly 3 rational values\".to_string(),\n  319 |             )));\n  320 |         }\n  321 |     };\n  322 | \n  323 |     let mut coefficients = [0.0f32; 3];\n  324 |     for (i, value) in list.iter().enumerate() {\n  325 |         match value {\n  326 |             Value::Rational(num, denom) if *denom != 0 => {\n  327 |                 coefficients[i] = *num as f32 / *denom as f32\n  328 |             }\n  329 |             _ => {\n  330 |                 return Err(ImageError::Decoding(DecodingError::new(\n  331 |                     ImageFormat::Tiff.into(),\n  332 |                     \"YCbCrCoefficients tag (529) contains an invalid rational value\".to_string(),\n  333 |                 )));\n  334 |             }\n  335 |         }\n  336 |     }\n  337 | \n  338 |     Ok(coefficients)\n  339 | }","lines":37},{"ref":"src/codecs/tiff.rs:596-613","code":"  596 | fn ycbcr_to_rgb8(ycbcr: &[[u8; 3]], lr: f32, lg: f32, lb: f32, out: &mut [[u8; 3]]) {\n  597 |     let coeff_r = 2.0 * (1.0 - lr);\n  598 |     let coeff_b = 2.0 * (1.0 - lb);\n  599 |     let inv_lg = 1.0 / lg;\n  600 | \n  601 |     for (src, dst) in ycbcr.iter().zip(out.iter_mut()) {\n  602 |         let y = f32::from(src[0]);\n  603 |         let cb = f32::from(src[1]) - 128.0;\n  604 |         let cr = f32::from(src[2]) - 128.0;\n  605 | \n  606 |         let r = y + cr * coeff_r;\n  607 |         let b = y + cb * coeff_b;\n  608 |         let g = (y - lr * r - lb * b) * inv_lg;\n  609 | \n  610 |         dst[0] = (r + 0.5) as u8;\n  611 |         dst[1] = (g + 0.5) as u8;\n  612 |         dst[2] = (b + 0.5) as u8;\n  613 |     }","lines":18}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"ExtendedColorType::bits_per_pixel returns u16 and Unknown(bpp) returns `bpp as u16`. buffer_size then computes `width as u64 * bpp` where bpp can be up to 255 bits; this is fine. But ColorType::bits_per_pixel multiplies bytes_per_pixel() (u8, max 16) by 8 as u16 (max 128) - safe. The concern is ExtendedColorType::buffer_size: row_pitch = (width*bpp).div_ceil(8) uses width as u64 so no overflow, and saturating_mul on height - this path is safe. No action needed beyond noting buffer_size is the only correctly-saturating size helper while ImageLayout::total_bytes and total_bytes_overflows_u64 use different (inconsistent) overflow strategies.","fix":"Unify the three size-computation helpers (ExtendedColorType::buffer_size, ImageLayout::total_bytes, total_bytes_overflows_u64) on one saturating implementation to avoid divergent overflow behavior.","locations":[{"ref":"src/color.rs:303-313","code":"  303 |     /// Returns the number of bytes required to hold a `width x height` image of this color type.\n  304 |     ///\n  305 |     /// Each pixel row occupies exactly `width * bits_per_pixel()` bits, rounded **up to the\n  306 |     /// nearest byte** (no additional row padding is added). The total is `row_bytes * height`,\n  307 |     /// saturating at [`u64::MAX`] for astronomically large inputs.\n  308 |     pub fn buffer_size(self, width: u32, height: u32) -> u64 {\n  309 |         let bpp = self.bits_per_pixel() as u64;\n  310 |         let row_pitch = (width as u64 * bpp).div_ceil(8);\n  311 |         row_pitch.saturating_mul(height as u64)\n  312 |     }\n  313 | }","lines":11},{"ref":"src/io.rs:91-107","code":"   91 |     pub fn total_bytes(&self) -> u64 {\n   92 |         let ImageLayout { width, height, .. } = *self;\n   93 |         let total_pixels = u64::from(width) * u64::from(height);\n   94 |         let bytes_per_pixel = u64::from(self.color.bytes_per_pixel());\n   95 |         total_pixels.saturating_mul(bytes_per_pixel)\n   96 |     }\n   97 | \n   98 |     /// Checks if the provided dimensions would overflow a `u64`.\n   99 |     ///\n  100 |     /// FIXME: instead have `try_total_bytes() -> Result<u64, _>`? But should it return an\n  101 |     /// unsupported error (as formats that use this do) or should it instead return another error\n  102 |     /// since the method is then unrelated to a format.\n  103 |     pub(crate) fn total_bytes_overflows_u64(&self) -> bool {\n  104 |         let &ImageLayout { width, height, .. } = self;\n  105 |         let bytes_per_pixel: u8 = self.color.bytes_per_pixel();\n  106 |         u64::from(width) * u64::from(height) > u64::MAX / u64::from(bytes_per_pixel)\n  107 |     }","lines":17}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","easy":true,"description":"The vertical sampling accumulator is initialized to `Rgba([1.0; 4])` instead of `[0.0; 4]`. Because the kernel weights sum to 1.0, every output channel ends up as `1.0 + weighted_average` instead of `weighted_average`. This adds a constant +1.0 (i.e. +1 in the 0..255 u8 range) to every channel of every pixel produced by the public `imageops::resize` (and any resize routed through `vertical_sample`/`horizontal_sample`). Verified empirically: resizing a constant Luma image of value 100 yields 101. Channels beyond the input's channel count also remain at 1.0 but are dropped downstream.","fix":"Initialize the accumulator to zero: `let mut pix = crate::Rgba([0.0; 4]);`.","locations":[{"ref":"src/imageops/sample.rs:547","code":"  547 |             let mut pix = crate::Rgba([1.0; 4]);","lines":1}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`huerotate`/`huerotate_in_place` hardcode `let max = 255f64;` when clamping the rotated R/G/B channels, regardless of the subpixel type. For 16-bit images (Rgb16/Rgba16) every channel is clamped to 255 instead of 65535, and for f32 images (values nominally in 0..1) all positive values are passed through unclamped while the 255 ceiling is meaningless. This severely corrupts hue rotation for any non-u8 image, which the generic signature `huerotate<I, P, S: Primitive>` explicitly supports.","fix":"Use the type's real maximum: `let max: f64 = NumCast::from(S::DEFAULT_MAX_VALUE).unwrap();` and clamp against that (mirroring `contrast`/`brighten`).","locations":[{"ref":"src/imageops/colorops.rs:279-283","code":"  279 |         let max = 255f64;\n  280 | \n  281 |         channels[0] = NumCast::from(clamp(new_r, 0.0, max)).unwrap();\n  282 |         channels[1] = NumCast::from(clamp(new_g, 0.0, max)).unwrap();\n  283 |         channels[2] = NumCast::from(clamp(new_b, 0.0, max)).unwrap();","lines":5},{"ref":"src/imageops/colorops.rs:337-341","code":"  337 |             let max = 255f64;\n  338 | \n  339 |             channels[0] = NumCast::from(clamp(new_r, 0.0, max)).unwrap();\n  340 |             channels[1] = NumCast::from(clamp(new_g, 0.0, max)).unwrap();\n  341 |             channels[2] = NumCast::from(clamp(new_b, 0.0, max)).unwrap();","lines":5}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"ImageReader::decode_to_dynimage reserves the output buffer size from the reader's `max_alloc` limit (self.limits.reserve) but never calls `free` afterwards. Each call permanently consumes the limit. When iterating an animation via into_frames (which repeatedly calls decode_to_dynimage), the non-strict allocation limit is decremented once per frame and never returned, so a long animation will eventually fail with InsufficientMemory even though only one frame's worth of memory is live at a time. Contrast with skip_image which correctly pairs reserve with free.","fix":"After the image data has been decoded in decode_to_dynimage, call self.limits.free(layout.total_bytes()) to release the reservation (the buffer is owned by the returned DynamicImage, not the reader), or restructure so the reader does not permanently account for the caller-owned output buffer.","locations":[{"ref":"src/io/image_reader_type.rs:541-566","code":"  541 |     pub(crate) fn decode_to_dynimage(\n  542 |         &mut self,\n  543 |         image: &mut DynamicImage,\n  544 |     ) -> ImageResult<DecodedImageMetadata<'_>> {\n  545 |         let layout = self.inner.prepare_image()?;\n  546 |         self.fill_header_metadata_if_any();\n  547 | \n  548 |         // This is technically redundant but it's also cheap.\n  549 |         self.limits.check_layout_dimensions(&layout)?;\n  550 |         // Check that we do not allocate a bigger buffer than we are allowed to\n  551 |         // FIXME: should this rather go in `DynamicImage::from_decoder` somehow?\n  552 |         self.limits.reserve(layout.total_bytes())?;\n  553 | \n  554 |         // Retrieve the raw image data as indicated by the layout.\n  555 |         self.last_attributes = image.decode_raw(self.inner.as_mut(), layout)?;\n  556 | \n  557 |         let mut meta = DecodedImageMetadata {\n  558 |             inner: self.inner.as_mut(),\n  559 |             attributes: &mut self.last_attributes,\n  560 |             metadata_buffers: &mut self.metadata_buffers,\n  561 |         };\n  562 | \n  563 |         meta.apply_metdata(&self.settings, image)?;\n  564 | \n  565 |         Ok(meta)\n  566 |     }","lines":26},{"ref":"src/io/image_reader_type.rs:619-646","code":"  619 |     pub fn skip_image(&mut self) -> ImageResult<()> {\n  620 |         // TODO: with `viewbox` (temporarily removed) we can inform the decoder that no data is\n  621 |         // required which may be quite efficient. Other variants of achieving the same may also be\n  622 |         // possible. We can just try out until one works.\n  623 | \n  624 |         // Som me = DynamicImage::default();\n  839 |             let frame_decoded = match self.decode_to_dynimage(&mut frame) {\n  840 |                 Ok(frame) => frame,\n  841 |                 Err(ref err) if is_end_reached(err) => return None,\n  842 |                 Err(err) => return Some(Err(err)),\n  843 |             };\n  844 | \n  845 |             let x = frame_decoded.attributes().x;\n  846 |             let y = frame_decoded.attributes().y;\n  847 |             let delay = frame_decoded.attributes().delay.unwrap_or(no_delay);\n  848 |             let frame = frame.into_rgba8();\n  849 | \n  850 |             let frame = Frame::from_parts(frame, x, y, delay);\n  851 |             Some(Ok(frame))\n  852 |         });\n  853 | \n  854 |         Frames::new(Box::new(iter))\n  855 |     }","lines":35}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The moxcms transform closures call `tr.transform(...).expect(\"transform failed\")` (and several similar `.expect` calls in build_transforms and select-transform paths). These closures are stored in CicpTransform and invoked at color-conversion time on user image data of arbitrary size. If moxcms returns an error at runtime (e.g. an internal length/precision check) the whole process panics instead of surfacing an ImageError. Since CicpTransform is applied to decoded image buffers, this turns a recoverable conversion failure into an abort, which is a denial-of-service vector when processing untrusted images that trigger such a path.","fix":"Validate buffer lengths up front so the transform cannot fail at call time, or propagate the error through a fallible transform API instead of panicking inside the stored closures.","locations":[{"ref":"src/metadata/moxcms.rs:166-171","code":"  166 |         // rgb-rgb transforms are done directly via moxcms.\n  167 |         let slices = trs.clone().map(|tr| {\n  168 |             Arc::new(move |input: &[P], output: &mut [P ion":"For the YCgCo matrix, the 4:2:0 and 4:2:2 row worker `process_halved_chroma_row_cgco` always calls `ycgco_execute_limited` regardless of the actual intensity range. The 4:4:4 path (`ycgco444_to_rgbx_impl`) correctly branches between `ycgco_execute_limited` (Tv) and `ycgco_execute_full` (Pc). As a result, full-range (PC) YCgCo 420/422 images are decoded through the limited-range scaling/rounding path instead of the dedicated full-range path, producing subtly different (incorrect) pixel values than the 444 full-range case. The range argument is threaded all the way down but then ignored for the subsampled formats.","fix":"Make the halved-chroma YCgCo worker honor the range: branch on `range.range` (Tv vs Pc) and call `ycgco_execute_full` for full range, mirroring `ycgco444_to_rgbx_impl`, or pass the range into the worker so both subsampled and 444 paths agree.","locations":[{"ref":"src/codecs/avif/ycgco.rs:92-179","code":"   92 | #[inline(always)]\n   93 | fn process_halved_chroma_row_cgco<\n   94 |     V: Copy + AsPrimitive<i32> + 'static + Sized,\n   95 |     const PRECISION: i32,\n   96 |     const CHANNELS: usize,\n   97 |     const BIT_DEPTH: usize,\n   98 | >(\n   99 |     image: YuvPlanarImage<V>,\n  100 |     rgba: &mut [V],\n  101 |     _: &CbCrInverseTransform<i32>,\n  102 |     range: &YuvChromaRange,\n  103 | ) where\n  104 |     i32: AsPrimitive<V>,\n  105 | {\n  106 |     let max_value = (1i32 << BIT_DEPTH) - 1;\n  107 | \n  108 |     // If the stride is larger than the plane size,\n  109 |     // it might contain junk data beyond the actual valid region.\n  110 |     // To avoid processing artifacts when working with odd-sized images,\n  111 |     // the buffer is reshaped to its actual size,\n  112 |     // preventing accidental use of invalid values from the trailing region.\n  113 | \n  114 |     let y_plane = &image.y_plane[..image.width];\n  115 |     let chroma_size = image.width.div_ceil(2);\n  116 |     let u_plane = &image.u_plane[..chrom v();\n  166 | \n  167 |         for (((y_src, u_src), v_src), rgb_dst) in\n  168 |             y_left.iter().zip(u_iter).zip(v_iter).zip(rgb_chunks)\n  169 |         {\n  170 |             let y_value = y_src.as_() - bias_y;\n  171 |             let cg_value = u_src.as_() - bias_uv;\n  172 |             let co_value = v_src.as_() - bias_uv;\n  173 | \n  174 |             ycgco_execute_limited::<V, PRECISION, CHANNELS, BIT_DEPTH>(\n  175 |                 rgb_dst, y_value, cg_value, co_value, scale_coef,\n  176 |             );\n  177 |         }\n  178 |     }\n  179 | }","lines":88},{"ref":"src/codecs/avif/ycgco.rs:248-281","code":"  248 |     // All branches on generic const will be optimized out.\n  249 |     for (((y_src, u_src), v_src), rgb) in y_iter.zip(u_iter).zip(v_iter).zip(rgb_iter) {\n  250 |         let rgb_chunks = rgb.as_chunks_mut::<CHANNELS>().0.iter_mut();\n  251 |         match yuv_range {\n  252 |             YuvIntensityRange::Tv => {\n  253 |                 let y_coef =\n  254 |                     ((max_value as f32 / range.range_y as f32) * (1 << PRECISION) as f32) as i32;\n  255 |                 for (((y_src, u_src), v_src), rgb_dst) in\n  256 |                     y_src.iter().zip(u_src).zip(v_src).zip(rgb_chunks)\n  257 |                 {\n  258 |                     let y_value = y_src.as_() - bias_y;\n  259 |                     let cg_value = u_src.as_() - bias_uv;\n  260 |                     let co_value = v_src.as_() - bias_uv;\n  261 | \n  262 |                     ycgco_execute_limited::<V, PRECISION, CHANNELS, BIT_DEPTH>(\n  263 |                         rgb_dst, y_value, cg_value, co_value, y_coef,\n  264 |                     );\n  265 |                 }\n  266 |             }\n  267 |             YuvIntensityRange::Pc => {\n  268 |                 for (((y_src, u_src), v_src), rgb_dst) in\n  269 |                     y_src.iter().zip(u_src).zip(v_src).zip(rgb_chunks)\n  270 |                 {\n  271 |                     let y_value = y_src.as_() - bias_y;\n  272 |                     let cg_value = u_src.as_() - bias_uv;\n  273 |                     let co_value = v_src.as_() - bias_uv;\n  274 | \n  275 |                     ycgco_execute_full::<V, PRECISION, CHANNELS, BIT_DEPTH>(\n  276 |                         rgb_dst, y_value, cg_value, co_value,\n  277 |                     );\n  278 |                 }\n  279 |             }\n  280 |         }\n  281 |     }","lines":34}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`YuvIntensityRange::get_yuv_range` computes biases/ranges with `16 << (depth - 8)`, `1 << (depth - 1)`, `(1 << depth) - 1`, etc. These shifts assume `depth >= 8`. The decoder validates bit depth to be 8/10/12 before reaching the converters, but `get_yuv_range` is a `pub(crate)` const fn with no internal guard; any future caller passing depth < 8 triggers a shift underflow (`depth - 8` and `depth - 1` underflow u32) and panics. The invariant is enforced only at a distant call site.","fix":"Add a debug_assert!(depth >= 8) (and ideally depth <= 16) inside get_yuv_range, or document the precondition explicitly.","locations":[{"ref":"src/codecs/avif/yuv.rs:173-192","code":"  173 | impl YuvIntensityRange {\n  174 |     pub(crate) const fn get_yuv_range(self, depth: u32) -> YuvChromaRange {\n  175 |         match self {\n  176 |             YuvIntensityRange::Tv => YuvChromaRange {\n  177 |                 bias_y: 16 << (depth - 8),\n  178 |                 bias_uv: 1 << (depth - 1),\n  179 |                 range_y: 219 << (depth - 8),\n  180 |                 range_uv: 224 << (depth - 8),\n  181 |                 range: self,\n  182 |             },\n  183 |             YuvIntensityRange::Pc => YuvChromaRange {\n  184 |                 bias_y: 0,\n  185 |                 bias_uv: 1 << (depth - 1),\n  186 |                 range_uv: (1 << depth) - 1,\n  187 |                 range_y: (1 << depth) - 1,\n  188 |                 range: self,\n  189 |             },\n  190 |         }\n  191 |     }\n  192 | }","lines":20}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The MAX_WIDTH_HEIGHT (0xFFFF) soft limit is bypassed for top-down images. The check at line 163 only rejects positive heights greater than the limit; a large negative height (top-down DIB), e.g. -0xFFFFFF, passes the check, is then negated to a magnitude far above MAX_WIDTH_HEIGHT, and is never re-validated. This lets top-down files declare dimensions much larger than the intended cap, which the caller will then allocate an output buffer for (height*width*channels).","fix":"After negating a negative height to obtain top_down, re-check height.abs() against MAX_WIDTH_HEIGHT (or perform the magnitude check before establishing sign), so the soft limit applies uniformly to top-down and bottom-up images.","locations":[{"ref":"src/codecs/bmp/decoder.rs:161-177","code":"  161 |         if width < 0 {\n  162 |             return Err(DecoderError::NegativeWidth(width).into());\n  163 |         } else if width > MAX_WIDTH_HEIGHT || height > MAX_WIDTH_HEIGHT {\n  164 |             return Err(DecoderError::ImageTooLarge(width, height).into());\n  165 |         }\n  166 | \n  167 |         if height == i32::MIN {\n  168 |             return Err(DecoderError::InvalidHeight.into());\n  169 |         }\n  170 | \n  171 |         // A negative height indicates a top-down DIB\n  172 |         let top_down = if height < 0 {\n  173 |             height = -height;\n  174 |             true\n  175 |         } else {\n  176 |             false\n  177 |         };","lines":17}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"For L1 with a custom palette, written_pixel_info reports palette_color_count = palette.len(), and encode_with_palette uses that value both for the BITMAPINFOHEADER colors-used field and for computing palette_size / image_data_offset. But encode_1bit_palette always writes exactly 2 palette entries (take(2) plus padding to 2). When the supplied palette length is not exactly 2 (e.g. 1, or 3+), the declared palette count and reserved palette size do not match the bytes actually written, producing a corrupt BMP whose image data offset is wrong.","fix":"For L1 always report a palette_color_count of 2 (the format has exactly two colors), or validate that the supplied L1 palette has exactly 2 entries and reject otherwise, keeping the header count and the written bytes consistent.","locations":[{"ref":"src/codecs/bmp/encoder.rs:386-390","code":"  386 |         ExtendedColorType::L1 => (\n  387 |             BITMAPINFOHEADER_SIZE,\n  388 |             1,\n  389 |             u32::try_from(palette.map(|p| p.len()).unwrap_or(2)).ok(),\n  390 |         ),","lines":5},{"ref":"src/codecs/bmp/encoder.rs:310-345","code":"  310 |     fn encode_1bit_palette(\n  311 |         &mut self,\n  312 |         image: &[u8],\n  313 |         width: u32,\n  314 |         _height: u32,\n  315 |         row_padding: u32,\n  316 |         palette: Option<&[[u8; 3]]>,\n  317 |     ) -> io::Result<()> {\n  318 |         // write 2-color palette (1-bit images have exactly 2 colors)\n  319 |         if let Some(palette) = palette {\n  320 |             // Use custom palette (should have exactly 2 colors)\n  321 |             for item in palette.iter().take(2) {\n  322 |                 // each color is written as BGRA, where A is always 0\n  323 |                 self.writer.write_all(&[item[2], item[1], item[0], 0])?;\n  324 |             }\n  325 |             // If palette has less than 2 colors, pad with black\n  326 |             for _ in palette.len()..2 {\n  327 |                 self.writer.write_all(&[0, 0, 0, 0])?;\n  328 |             }\n  329 |         } else {\n  330 |             // Default palette: black and white\n  331 |             self.writer.write_all(&[0 ame_delay = img_frame.delay().into_ratio().to_integer();\n  581 |         // convert img_frame into RgbaImage\n  582 |         let mut rbga_frame = img_frame.into_buffer();\n  583 |         let (width, height) = self.gif_dimensions(rbga_frame.width(), rbga_frame.height())?;\n  584 | \n  585 |         // Create the gif::Frame from the animation::Frame\n  586 |         let mut frame = Frame::from_rgba_speed(width, height, &mut rbga_frame, self.speed);\n  587 |         // Saturate the conversion to u16::MAX instead of returning an error as that\n  588 |         // would require a new special cased variant in ParameterErrorKind which most\n  589 |         // likely couldn't be reused for other cases. This isn't a bad trade-off given\n  590 |         // that the current algorithm is already lossy.\n  591 |         frame.delay = (frame_delay / 10).try_into().unwrap_or(u16::MAX);\n  592 | \n  593 |         Ok(frame)\n  594 |     }","lines":20}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"FromColor<Rgba<S>> for Luma<T> and FromColor<LumaA<S>> for Luma<T> drop the alpha channel without premultiplication, and FromColor<Rgb/Rgba> for LumaA copies/derives luma but the Rgb->LumaA path sets alpha to DEFAULT_MAX_VALUE while Rgba->LumaA passes alpha through. This is internally consistent, but rgb_to_luma is documented/implemented as an sRGB-coefficient luma even though these FromColor impls are used generically for any primitive including f32 linear data and 16-bit data, applying sRGB luma weights to data that may not be sRGB-encoded. The conversion silently assumes sRGB regardless of the buffer's actual color space (acknowledged by the FIXME on IntoColor).","fix":"At minimum document the sRGB assumption on these public FromColor impls; longer term route luma derivation through the color-space-aware CICP path rather than the fixed sRGB coefficients.","locations":[{"ref":"src/color.rs:683-691","code":"  683 | impl<S: Primitive, T: Primitive> FromColor<Rgba<S>> for Luma<T>\n  684 | where\n  685 |     T: FromPrimitive<S>,\n  686 | {\n  687 |     fn from_color(&mut self, other: &Rgba<S>) {\n  688 |         let [r, g, b, _a] = other.0;\n  689 |         self.0[0] = T::from_primitive(RgbToLuma::rgb_to_luma(r, g, b));\n  690 |     }\n  691 | }","lines":9},{"ref":"src/color.rs:624-650","code":"  624 | /// Provides color conversions for the different pixel types.\n  625 | pub trait FromColor<Other> {\n  626 |     /// Changes `self` to represent `Other` in the color space of `Self`\n  627 |     #[allow(clippy::wrong_self_convention)]\n  628 |     fn from_color(&mut self, _: &Other);\n  629 | }\n  630 | \n  631 | /// Copy-based conversions to target pixel types using `FromColor`.\n  632 | // FIXME: this trait should be removed and replaced with real color space models\n  633 | // rather than assuming sRGB.\n  634 | pub(crate) trait IntoColor<Other> {\n  635 |     /// Constructs a pixel of the target type and converts this pixel into it.\n  636 |     #[allow(clippy::wrong_self_convention)]\n  637 |     fn into_color(&self) -> Other;\n  638 | }\n  639 | \n  640 | impl<O, S> IntoColor<O> for S\n  641 | where\n  642 |     O: Pixel + FromColor<S>,\n  643 | {\n  644 |     #[allow(clippy::wrong_self_convention)]\n  645 |     fn into_color(&self) -> O {\n  646 |         let mut pix = O::broadcast(Zero::zero());\n  647 |         pix.from_color(self);\n  648 |         pix\n  649 |     }\n  650 | }","lines":27}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`filter_symmetric_row` and `filter_symmetric_column` read the kernel center sample at offset `half_len * N`. After `prepare_symmetric_kernel` trims leading/trailing zero pairs a kernel can be reduced to length 1 (e.g. an input like `[0, 1, 0]`), giving `half_len == 0`. The arena is always built with `pad_w = (kernel_len/2).max(1) >= 1` pixels of left padding, so the center read at offset 0 lands on the replicated padding pixel instead of the true pixel at offset `pad_w*N`. This shifts the output by one pixel for any kernel that collapses to length 1.","fix":"Account for the actual left padding when indexing the center/taps (offset by `pad_w` minus `half_len`), or skip convolution entirely and copy when the scanned kernel collapses to a single non-trivial tap. Note both kernels are trimmed independently, so handle the row and column cases separately.","locations":[{"ref":"src/imageops/filter_1d.rs:344-389","code":"  344 |     for (x, dst) in dst_row_chunks.iter_mut().enumerate() {\n  345 |         let v_cx = x * 4;\n  346 |         let src = &src[v_cx..];\n  347 | \n  348 |         let chunk = &src[half_len * N..half_len * N + 4];\n  349 | \n  350 |         let mut k0 = chunk[0].as_() * hc;\n  351 |         let mut k1 = chunk[1].as_() * hc;\n  352 |         let mut k2 = chunk[2].as_() * hc;\n  353 |         let mut k3 = chunk[3].as_() * hc;\n  354 | \n  355 |         // Note why here is no window operators:\n  356 |         // https://github.com/image-rs/image/pull/2496#discussion_r2155171034\n  357 |         for (i, &coeff) in scanned_kernel.iter().take(half_len).enumerate() {\n  358 |             let other_side = length - i - 1;\n  359 |             let fw = &src[(i * N)..(i * N) + 4];\n  360 |             let bw = &src[(other_side * N)..(other_side * N) + 4];\n  361 |             k0 = multiply_accumulate(k0, fw[0].as_() + bw[0].as_(), coeff);\n  362 |             k1 = multiply_accumulate(k1, fw[1].as_() + bw[1].as_(), coeff);\n  363 |             k2 = multiply_accumulate(k2, fw[2].as_() + bw[2].as_(), coeff);\n  364 |             k3 = multiply_accumulate(k3, fw[3].as_() + bw[3].as_(), coeff);\n  365 |         }\n  366 | \n  367 |         dst[0] = k0.to_();\n  368 |         dst[1] = k1.to_();\n  369 |         dst[2] = k2.to_();\n  370 |         dst[3] = k3.to_();\n  371 |     }\n  372 | \n  373 |     let dzx = dst_row_chunks.len() * 4;\n  374 | \n  375 |     for (x, dst) in remainder.iter_mut().enumerate() {\n  376 |         let v_cx = x + dzx;\n  377 |         let src = &src[v_cx..];\n  378 | \n  379 |         let mut k0 = src[half_len * N].as_() * hc;\n  380 | \n  381 |         for (i, &coeff) in scanned_kernel.iter().take(half_len).enumerate() {\n  382 |             let other_side = length - i - 1;\n  383 |             let fw = &src[(i * N)..(i * N) + 1];\n  384 |             let bw = &src[(other_side * N)..(other_side * N) + 1];\n  385 |             k0 = multiply_accumulate(k0, fw[0].as_() + bw[0].as_(), coeff);\n  386 |         }\n  387 | \n  388 |         *dst = k0.to_();\n  389 |     }","lines":46},{"ref":"src/imageops/filter_1d.rs:512","code":"  512 |     let pad_w = (row_kernel.len() / 2).max(1);","lines":1},{"ref":"src/imageops/filter_1d.rs:683","code":"  683 |     let pad_w = (scanned_row_kernel.len() / 2).max(1);","lines":1}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the huge-block branch of `thumbnail_sample_block`, the returned divisor is `((right-left)/STEP) * ((top-bottom)/STEP)` using truncating integer division, but the nested loops actually iterate over `ceil((right-left)/STEP) * ceil((top-bottom)/STEP)` sub-blocks (a trailing partial sub-block is still summed). When a dimension is not a multiple of STEP_SIZE=256, the sum contains more sub-block averages than the divisor accounts for, producing a too-bright result. The existing `thumbnail_huge_block` test only passes because the constant 255 input saturates on clamp and hides the error.","fix":"Either weight each sub-block by its actual pixel count, or compute the divisor as the number of sub-blocks actually summed (ceil division) while summing per-sub-block averages, or accumulate raw pixel sums across sub-blocks and divide once by the true total pixel count.","locations":[{"ref":"src/imageops/sample.rs:695-727","code":"  695 |     let sample_count = if pixel_count > 256 * 256 {\n  696 |         // edge case where huge blocks need to be split into smaller blocks\n  697 |         // Blocks are currently split into 256x256 sub-blocks (or smaller).\n  698 |         // Note that this does not make overflow impossible. It simply adds 16 bits of headroom.\n  699 |         // So u8 now supports blocks with up to 2^40 pixels and u16 supports blocks with up to 2^32 pixels.\n  700 |         // This should be enough to prevent overflow in practice.\n  701 |         const STEP_SIZE: u32 = 256;\n  702 | \n  703 |         for y in (bottom..top).step_by(STEP_SIZE as usize) {\n  704 |             for x in (left..right).step_by(STEP_SIZE as usize) {\n  705 |                 let k = thumbnail_sample_block(\n  706 |                     image,\n  707 |                     x,\n  708 |                     x.saturating_add(STEP_SIZE).min(right),\n  709 |                     y,\n  710 |                     y.saturating_add(STEP_SIZE).min(top),\n  711 |                 );\n  712 |                 sum.add_pixel(k);\n  713 |             }\n  714 |         }\n  715 | \n  716 |         ((right - left) as u64 / STEP_SIZE as u64) * ((top - bottom) as u64 / STEP_SIZE as u64)\n  717 |     } else {\n  718 |         // standard case where all pixels are summed directly\n  719 |         for y in bottom..top {\n  720 |             for x in left..right {\n  721 |                 let k = image.get_pixel(x, y);\n  722 |                 sum.add_pixel(k);\n  723 |             }\n  724 |         }\n  725 | \n  726 |         pixel_count\n  727 |     };","lines":33}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ImageReader::skip_image reads images with total_bytes < 512 into a 512-byte stack buffer slice `&mut stack[..bytes as usize]`. This path does not call check the allocation limit nor verify the decoder actually wrote a sensible amount, but more importantly the small-image branch bypasses the reserve/free accounting entirely while the large branch performs it; the asymmetry means tiny frames are never counted against limits. More subtly, total_bytes() saturates to u64::MAX on overflow, and for a value in [0,512) the cast is fine, but a decoder reporting bytes==0 produces an empty slice that some decoders may reject or mishandle.","fix":"Unify the two branches' limit accounting, and consider routing all sizes through a single buffered read path; document/justify why the <512 path skips reserve.","locations":[{"ref":"src/io/image_reader_type.rs:619-646","code":"  619 |     pub fn skip_image(&mut self) -> ImageResult<()> {\n  620 |         // TODO: with `viewbox` (temporarily removed) we can inform the decoder that no data is\n  621 |         // required which may be quite efficient. Other variants of achieving the same may also be\n  622 |         // possible. We can just try out until one works.\n  623 | \n  624 |         // Some decoders may still want a buffer, so we can't fully ignore it.\n  625 |         let layout = self.inner.prepare_image()?;\n  626 |         self.fill_header_metadata_if_any();\n  627 | \n  628 |         // This is technically redundant but it's also cheap.\n  629 |         self.limits.check_layout_dimensions(&layout)?;\n  630 |         let bytes = layout.total_bytes();\n  631 | \n  632 |         if bytes < 512 {\n  633 |             let mut stack = [0u8; 512];\n  634 |             self.inner.read_image(&mut stack[..bytes as usize])?;\n  635 |         } else {\n  636 |             // Check that we do not allocate a bigger buffer than we are allowed to\n  637 |             // FIXME: should this rather go in `DynamicImage::from_decoder` somehow?\n  638 |             // Or should we make an extension method on `ImageDecoder`?\n  639 |             let mut placeholder = DynamicImage::default();\n  640 |             self.limits.reserve(bytes)?;\n  641 |             placeholder.decode_raw(self.inner.as_mut(), layout)?;\n  642 |             self.limits.free(bytes);\n  643 |         }\n  644 | \n  645 |         Ok(())\n  646 |     }","lines":28}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"InjectedReader::more_images test helper uses `Some(self.image) < self.xmp_per_image.len().checked_sub(1)`. When xmp_per_image is empty, checked_sub(1) is None, and Some(0) < None is false, so it reports None (end) - acceptable. But the comparison `Some(self.image) < Some(len-1)` ends iteration one frame BEFORE the last element is reached when used as written, meaning the final injected frame is never produced in the more-images-driven loop. This is test-only code but the off-by-one means the test's coverage of the last frame's metadata is weaker than intended.","fix":"Use `self.image < self.xmp_per_image.len()` (or `<= len-1`) so the last frame is included before signaling SequenceControl::None.","locations":[{"ref":"src/io/image_reader_type.rs:1046-1052","code":" 1046 |         fn more_images(&self) -> SequenceControl {\n 1047 |             if Some(self.image) < self.xmp_per_image.len().checked_sub(1) {\n 1048 |                 SequenceControl::MaybeMore\n 1049 |             } else {\n 1050 |                 SequenceControl::None\n 1051 |             }\n 1052 |         }","lines":7}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Orientation::locate_orientation_entry reads each IFD entry assuming the value fits in the inline 4-byte value field and reads it as a single u16 (`reader.read_u16`). For tag 0x112 (orientation) with format==3 (SHORT) and count==1 this is correct, but the loop unconditionally reads exactly 12 bytes per entry (2+2+4+2+2) without validating that `entries` and `ifd_offset` are within the chunk; an attacker-controlled EXIF chunk with a huge `entries` count simply makes the loop read_u16 fail and return None (safe), but a malformed ifd_offset that seeks past the buffer also just yields read failures. The remove_from_exif_chunk path then unwraps write_u16 at the located offset; the offset is `position()-4` and is guaranteed in-bounds only because reads succeeded, which holds. No panic, but the parser does not validate the TIFF IFD structure (e.g. entries pointing outside the chunk) which is brittle for untrusted EXIF.","fix":"Bounds-check ifd_offset and entries against the chunk length before iterating, and document that only inline SHORT orientation values are supported.","locations":[{"ref":"src/metadata.rs:147-168","code":"  147 |     fn locate_orientation_entry<B>(reader: &mut Cursor<&[u8]>) -> Option<(Self, u64)>\n  148 |     where\n  149 |         B: byteorder_lite::ByteOrder,\n  150 |     {\n  151 |         let ifd_offset = reader.read_u32::<B>().ok()?;\n  152 |         reader.set_position(u64::from(ifd_offset));\n  153 |         let entries = reader.read_u16::<B>().ok()?;\n  154 |         for _ in 0..entries {\n  155 |             let tag = reader.read_u16::<B>().ok()?;\n  156 |             let format = reader.read_u16::<B>().ok()?;\n  157 |             let count = reader.read_u32::<B>().ok()?;\n  158 |             let value = reader.read_u16::<B>().ok()?;\n  159 |             let _padding = reader.read_u16::<B>().ok()?;\n  160 |             if tag == 0x112 && format == 3 && count == 1 {\n  161 |                 let offset = reader.position() - 4; // we've read 4 bytes (2 * u16) past the start of the value\n  162 |                 let orientation = Self::from_exif(value.min(255) as u8);\n  163 |                 return orientation.map(|orient| (orient, offset));\n  164 |             }\n  165 |         }\n  166 |         // If we reached this point without returning early, there was no orientation\n  167 |         None\n  168 |     }","lines":22},{"ref":"src/metadata.rs:109-122","code":"  109 |     pub fn remove_from_exif_chunk(chunk: &mut [u8]) -> Option<Self> {\n  110 |         if let Some((orientation, offset, endian)) = Self::from_exif_chunk_inner(chunk) {\n  111 |             let mut writer = Cursor::new(chunk);\n  112 |             writer.set_position(offset);\n  113 |             let no_orientation: u16 = Self::NoTransforms.to_exif().into();\n  114 |             match endian {\n  115 |                 ExifEndian::Big => writer.write_u16::<BigEndian>(no_orientation).unwrap(),\n  116 |                 ExifEndian::Little => writer.write_u16::<LittleEndian>(no_orientation).unwrap(),\n  117 |             }\n  118 |             Some(orientation)\n  119 |         } else {\n  120 |             None\n  121 |         }\n  122 |     }","lines":14}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Cicp::derived_luminance assigns the SmpteRp431 (DCI P3 theatrical) primaries to moxcms::ColorPrimaries::DISPLAY_P3, the same as SmpteRp432. SmpteRp431 uses the DCI white point (~0.314,0.351, set correctly in the whitepoint match) but DCI-P3 theatrical and Display-P3 share the same RGB primaries, so the chromaticities are the same; however mapping both to moxcms DISPLAY_P3 means the primaries constant is reused while only the whitepoint differs. This is likely correct (same primaries, different whitepoint) but the comment/structure makes it easy to mistakenly assume RP431 and RP432 are fully identical; verify moxcms DISPLAY_P3 primaries match the RP431 theatrical primaries and that transform_to_xyz uses the supplied whitepoint rather than the profile's built-in one.","fix":"Confirm and document that DCI-P3 (RP431) and Display-P3 (RP432) share primaries and only differ by whitepoint; add a test for the RP431 derived luminance to lock the behavior.","locations":[{"ref":"src/metadata/cicp.rs:1240-1277","code":" 1240 |     pub(crate) fn derived_luminance(&self) -> Option<[f32; 3]> {\n 1241 |         let primaries = match self.primaries {\n 1242 |             CicpColorPrimaries::SRgb => moxcms::ColorPrimaries::BT_709,\n 1243
