.enumerate() {\n  746 |             if (y as i64 - pad_h as i64 + k as i64) < 0 {\n  747 |                 *row = &top_pad[(pad_h - k - 1) * src_stride..];\n  748 |             } else if (y as i64 - pad_h as i64 + k as i64) as usize >= image_size.height {\n  749 |                 *row = &bottom_pad[(k - pad_h - 1) * src_stride..];\n  750 |             } else {\n  751 |                 let fy = (y as i64 + k as i64 - pad_h as i64) as usize;\n  752 |                 let start_offset = src_stride * fy;\n  753 |                 *row = &transient_image_slice[start_offset..(start_offset + src_stride)];\n  754 |             }\n  755 |         }","lines":13}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`DynamicImage::apply_color_space` clones the entire image (`let mut target = self.clone();`) and then copies color-converted data back into it, doubling peak memory for what is conceptually an in-place transform. The code comment acknowledges this is a stopgap. For large images this is a significant temporary allocation.","fix":"Perform the transform in place using a small scratch chunk (as `ImageBuffer::apply_color_space` already does) for the same-color-type fast path, avoiding the full clone.","locations":[{"ref":"src/images/dynimage.rs:1543-1563","code":" 1543 |     pub fn apply_color_space(\n 1544 |         &mut self,\n 1545 |         cicp: Cicp,\n 1546 |         options: ConvertColorOptions,\n 1547 |     ) -> ImageResult<()> {\n 1548 |         // If the color space is already set, we can just return.\n 1549 |         if self.color_space() == cicp {\n 1550 |             return Ok(());\n 1551 |         }\n 1552 | \n 1553 |         // We could conceivably do this in-place faster but to handle the Luma conversion as we\n 1554 |         // want this requires the full machinery as `CicpTransform::transform_dynamic` which is\n 1555 |         // quite the replication. Let's just see if it is fast enough. Feel free to PR something if\n 1556 |         // it is easy enough to review.\n 1557 |         let mut target = self.clone();\n 1558 |         target.set_color_space(cicp)?;\n 1559 |         target.copy_from_color_space(self, options)?;\n 1560 | \n 1561 |         *self = target;\n 1562 |         Ok(())\n 1563 |     }","lines":21}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"MetadataBlock::get clones the entire buffered metadata Vec<u8> on every successful access (icc/exif/xmp/iptc). apply_metdata calls icc_profile() and exif_metadata() on each decode, and users may call these accessors repeatedly, so large ICC profiles or EXIF blocks are copied each time even though the data is immutable and could be returned by reference or cloned once.","fix":"Return a borrowed slice / Cow, or have callers take the buffer once, to avoid repeatedly cloning potentially large metadata blocks.","locations":[{"ref":"src/io/image_reader_type.rs:437-440","code":"  437 |     fn get(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  438 |         match self {\n  439 |             MetadataBlock::None => Ok(None),\n  440 |             MetadataBlock::Ok(data) => Ok(Some(data.clone())),","lines":4}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"ImageReader::fill_header_metadata_if_any calls self.inner.format_attributes() (which clones a FormatAttributes struct for Box<dyn>) on every decode, and DecodedImageMetadata's exif/icc/xmp/iptc accessors each call self.inner.format_attributes() again individually, so format_attributes() is invoked up to 5 times per image. For decoders whose format_attributes is non-trivial this is redundant work.","fix":"Fetch format_attributes() once per decode and reuse the result across the metadata accessors.","locations":[{"ref":"src/io/image_reader_type.rs:658-718","code":"  658 |     fn fill_header_metadata_if_any(&mut self) {\n  659 |         type MetadataFn<'a> =\n  660 |             fn(&mut (dyn ImageDecoder + 'a)) -> Result<Option<Vec<u8>>, ImageError>;\n  661 | \n  662 |         // We retrieve `InHeader` metadata only once, before reading any our images.\n  663 |         let first_meta_retrieved = self.metadata_buffers.first_meta_retrieved;\n  664 |         let format_attrs = self.inner.format_attributes();\n  665 | \n  666 |         let attributes = [\n  667 |             (\n  668 |                 format_attrs.exif,\n  669 |                 &mut self.metadata_buffers.exif,\n  670 |                 <dyn ImageDecoder + '_>::exif_metadata as MetadataFn,\n  671 |             ),\n  672 |             (\n  673 |                 format_attrs.icc,\n  674 |                 &mut self.metadata_buffers.icc,\n  675 |                 <dyn ImageDecoder + '_>::icc_profile as MetadataFn,\n  676 |             ),\n  677 |             (\n  678 |                 format_attrs.xmp,\n  679 |                 &mut self.metadata_buffers.xmp,\n  680 |                 <dyn ImageDecoder + '_>::xmp_metadata as MetadataFn,\n  681 |             ),\n  682 |             (\n  683 |                 format_attrs.iptc,\n  684 |                 &mut self.metadata_buffers.iptc,\n  685 |                 <dyn ImageDecoder + '_>::iptc_metadata as MetadataFn,\n  686 |             ),\n  687 |         ];\n  688 | \n  689 |         for (hint, buffer, getter) in attributes {\n  690 |             let should_buffer_now = match hint {\n  691 |                 DecodedMetadataHint::InHeader => !first_meta_retrieved,\n  692 |                 DecodedMetadataHint::PerImage => true,\n  693 |                 DecodedMetadataHint::Unsupported | DecodedMetadataHint::None => false,\n  694 |             };\n  695 | \n  696 |             if !should_buffer_now {\n  697 |                 continue;\n  698 |             }\n  699 | \n  700 |             // We might have already tried this and succeeded. Expect the same result as last time\n  701 |             // but avoids the allocation associated with that. A repeated `None` should be cheap,\n  702 |             // most probably. This holds for variants that retrieve it once.\n  703 |             if matches!(hint, DecodedMetadataHint::InHeader) && buffer.is_not_none() {\n  704 |                 continue;\n  705 |             }\n  706 | \n  707 |             match getter(self.inner.as_mut()) {\n  708 |                 Ok(None) => *buffer = MetadataBlock::None,\n  709 |                 Ok(Some(metadata)) => *buffer = MetadataBlock::Ok(metadata),\n  710 |                 Err(err) => {\n  711 |                     *buffer = MetadataBlock::Err(err);\n  712 |                 }\n  713 |             }\n  714 |         }\n  715 | \n  716 |         // Note: on error we do not set this flag. You can try again.\n  717 |         self.metadata_buffers.first_meta_retrieved = true;\n  718 |     }","lines":61},{"ref":"src/io/image_reader_type.rs:867-904","code":"  867 |     pub fn exif_metadata(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  868 |         Self::access_block_with(\n  869 |             &mut self.metadata_buffers.exif,\n  870 |             self.inner.format_attributes().exif,\n  871 |             self.inner,\n  872 |             <dyn ImageDecoder + '_>::exif_metadata,\n  873 |         )\n  874 |     }\n  875 | \n  876 |     /// Get the ICC profile of the previous image if any.\n  877 |     pub fn icc_profile(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  878 |         Self::access_block_with(\n  879 |             &mut self.metadata_buffers.icc,\n  880 |             self.inner.format_attributes().icc,\n  881 |             self.inner,\n  882 |             <dyn ImageDecoder + '_>::icc_profile,\n  883 |         )\n  884 |     }\n  885 | \n  886 |     /// Get the XMP metadata of the previous image if any.\n  887 |     pub fn xmp_metadata(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  888 |         Self::access_block_with(\n  889 |             &mut self.metadata_buffers.xmp,\n  890 |             self.inner.format_attributes().xmp,\n  891 |             self.inner,\n  892 |             <dyn ImageDecoder + '_>::xmp_metadata,\n  893 |         )\n  894 |     }\n  895 | \n  896 |     /// Get the IPTC metadata of the previous image if any.\n  897 |     pub fn iptc_metadata(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  898 |         Self::access_block_with(\n  899 |             &mut self.metadata_buffers.iptc,\n  900 |             self.inner.format_attributes().iptc,\n  901 |             self.inner,\n  902 |             <dyn ImageDecoder + '_>::iptc_metadata,\n  903 |         )\n  904 |     }","lines":38}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In read_full_byte_pixel_data the per-pixel format match is re-evaluated inside the inner loop for every pixel (the offset computation does a nested `match *format`), even though *format is loop-invariant. For wide images this branches once per pixel instead of being hoisted out of the loop.","fix":"Compute the per-pixel stride and the alpha-handling mode once before the row loop (or specialize the loop per FormatFullBytes variant) so the match is not re-evaluated per pixel.","locations":[{"ref":"src/codecs/bmp/decoder.rs:2073-2094","code":" 2073 |                 for (i, pixel) in row.chunks_mut(num_channels).enumerate() {\n 2074 |                     let offset = match *format {\n 2075 |                         FormatFullBytes::Format888 => i * 4 + 1, // Skip first byte\n 2076 |                         _ => {\n 2077 |                             i * match *format {\n 2078 |                                 FormatFullBytes::RGB24 => 3,\n 2079 |                                 _ => 4,\n 2080 |                             }\n 2081 |                         }\n 2082 |                     };\n 2083 | \n 2084 |                     // Read the colour values (b, g, r) and reverse to (r, g, b)\n 2085 |                     pixel[0..3].copy_from_slice(&row_buffer[offset..offset + 3]);\n 2086 |                     pixel[0..3].reverse();\n 2087 | \n 2088 |                     // Read the alpha channel if present\n 2089 |                     if *format == FormatFullBytes::RGBA32 {\n 2090 |                         pixel[3] = row_buffer[offset + 3];\n 2091 |                     } else if num_channels == 4 {\n 2092 |                         pixel[3] = ALPHA_OPAQUE;\n 2093 |                     }\n 2094 |                 }","lines":22}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"GifEncoder::encode for Rgba8 calls `data.to_owned()` to create a mutable copy for `Frame::from_rgba_speed`, allocating a full copy of every frame's pixel data on each encode call even though the source could potentially be reused. For large frames this doubles peak memory during encoding.","fix":"If the API allows, pass a mutable buffer through without a fresh allocation per frame (e.g. reuse a scratch buffer on the encoder), or document the unavoidable copy required by from_rgba_speed.","locations":[{"ref":"src/codecs/gif.rs:519-524","code":"  519 |             ExtendedColorType::Rgba8 => self.encode_gif(Frame::from_rgba_speed(\n  520 |                 width,\n  521 |                 height,\n  522 |                 &mut data.to_owned(),\n  523 |                 self.speed,\n  524 |             )),","lines":6}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"When decoding color-mapped or 15-bit TGA images, `read_image` allocates a full second copy of the raw pixel data (`rawbuf`) before expanding into `buf`. The code itself acknowledges in a comment that this allocation could be avoided by expanding per-row or in place. For large color-mapped images this is an avoidable full-image temporary allocation.","fix":"Expand the color map / 15-bit values per row into the output buffer (working backwards in place where the index is narrower than the output pixel) to avoid the whole-image temporary buffer.","locations":[{"ref":"src/codecs/tga/decoder.rs:434-453","code":"  434 |         if let Some(ref color_map) = self.color_map {\n  435 |             // This allocation could be avoided by expanding each row (or block of pixels) as it is\n  436 |             // read, or by doing the color map expansion in-place. But those may be more effort than\n  437 |             // it is worth.\n  438 |             let mut rawbuf = vec_try_with_capacity(num_raw_bytes)?;\n  439 |             rawbuf.extend_from_slice(&buf[..num_raw_bytes]);\n  440 | \n  441 |             self.expand_color_map(&rawbuf, buf, color_map)?;\n  442 |         } else if self.original_color_type == Some(ExtendedColorType::Rgb5x1) {\n  443 |             // Expand the 15-bit to 24-bit representation for non-color-mapped images;\n  444 |             // the expansion for color-mapped 15-bit images was already done in the color map\n  445 |             let mut rawbuf = vec_try_with_capacity(num_raw_bytes)?;\n  446 |             rawbuf.extend_from_slice(&buf[..num_raw_bytes]);\n  447 | \n  448 |             let rawbuf_chunks = rawbuf.as_chunks::<2>().0.iter();\n  449 |             let buf_chunks = buf.as_chunks_mut::<3>().0.iter_mut();\n  450 |             for (&src, dst) in rawbuf_chunks.zip(buf_chunks) {\n  451 |                 *dst = expand_rgb15_to_rgb24(src);\n  452 |             }\n  453 |         }","lines":20}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"ColorType::channel_count constructs an ExtendedColorType via `let e: ExtendedColorType = self.into();` and delegates, rather than matching directly. This is a trivial indirection but channel_count is on a hot metadata path; a direct match would be clearer and avoids relying on the From conversion staying in sync.","fix":"Match on `self` directly to return the channel count for the 12 ColorType variants.","locations":[{"ref":"src/color.rs:88-92","code":"   88 |     #[must_use]\n   89 |     pub fn channel_count(self) -> u8 {\n   90 |         let e: ExtendedColorType = self.into();\n   91 |         e.channel_count()\n   92 |     }","lines":5}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`gaussian_blur_indirect_impl` matches on `CN` inside the per-pixel copy loop to decide how many channels to copy, re-evaluating the match for every pixel even though `CN` is a const generic known at compile time. The match arms are redundant with the const generic and add branch noise to the hot conversion loop.","fix":"Replace the inner match with a `for c in 0..CN { dst[c] = NumCast::from(px[c]).unwrap(); }` loop; the compiler will fully unroll it per monomorphization.","locations":[{"ref":"src/imageops/sample.rs:1511-1534","code":" 1511 |     for (pixel, dst) in image.pixels().zip(transient_chunks) {\n 1512 |         let px = pixel.2.channels();\n 1513 |         match CN {\n 1514 |             1 => {\n 1515 |                 dst[0] = NumCast::from(px[0]).unwrap();\n 1516 |             }\n 1517 |             2 => {\n 1518 |                 dst[0] = NumCast::from(px[0]).unwrap();\n 1519 |                 dst[1] = NumCast::from(px[1]).unwrap();\n 1520 |             }\n 1521 |             3 => {\n 1522 |                 dst[0] = NumCast::from(px[0]).unwrap();\n 1523 |                 dst[1] = NumCast::from(px[1]).unwrap();\n 1524 |                 dst[2] = NumCast::from(px[2]).unwrap();\n 1525 |             }\n 1526 |             4 => {\n 1527 |                 dst[0] = NumCast::from(px[0]).unwrap();\n 1528 |                 dst[1] = NumCast::from(px[1]).unwrap();\n 1529 |                 dst[2] = NumCast::from(px[2]).unwrap();\n 1530 |                 dst[3] = NumCast::from(px[3]).unwrap();\n 1531 |             }\n 1532 |             _ => unreachable!(),\n 1533 |         }\n 1534 |     }","lines":24}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In read_image, the local binding `let _blocks_in_header = reader.headers()[...].chunk_count as u64;` is computed and immediately discarded (underscore-prefixed, never used). It performs an indexing access and a cast for no effect.","fix":"Remove the unused _blocks_in_header binding.","locations":[{"ref":"src/codecs/openexr.rs:148","code":"  148 |         let _blocks_in_header = reader.headers()[self.header_index].chunk_count as u64;","lines":1}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`AvifEncoder::set_color` takes a color argument, ignores it, and its body is a single commented-out line. It is documented as 'Does not currently do anything. Mirrors behaviour of old config function.' It is pure dead code kept only for historical mirroring.","fix":"Remove `set_color` and its call site at write_image, or implement the intended color-space configuration.","locations":[{"ref":"src/codecs/avif/encoder.rs:142-146","code":"  142 | impl<W: Write> AvifEncoder<W> {\n  143 |     // Does not currently do anything. Mirrors behaviour of old config function.\n  144 |     fn set_color(&mut self, _color: ExtendedColorType) {\n  145 |         // self.config.color_space = ColorSpace::RGB;\n  146 |     }","lines":5}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"OpenExrEncoder is annotated with a comment '// TODO is this struct and trait actually used anywhere?'. The struct exists only as a thin wrapper around write_buffer and its usefulness is explicitly in question, indicating possible dead/unverified public API surface that should be confirmed or removed.","fix":"Confirm whether OpenExrEncoder is part of the supported public API; if unused, deprecate or remove it, otherwise remove the TODO.","locations":[{"ref":"src/codecs/openexr.rs:303-342","code":"  303 | // TODO is this struct and trait actually used anywhere?\n  304 | /// A thin wrapper that implements `ImageEncoder` for OpenEXR images. Will behave like `image::codecs::openexr::write_buffer`.\n  305 | #[derive(Debug)]\n  306 | pub struct OpenExrEncoder<W>(W);\n  307 | \n  308 | impl<W> OpenExrEncoder<W> {\n  309 |     /// Create an `ImageEncoder`. Does not write anything yet. Writing later will behave like `image::codecs::openexr::write_buffer`.\n  310 |     // use constructor, not public field, for future backwards-compatibility\n  311 |     pub fn new(write: W) -> Self {\n  312 |         Self(write)\n  313 |     }\n  314 | }\n  315 | \n  316 | impl<W> ImageEncoder for OpenExrEncoder<W>\n  317 | where\n  318 |     W: Write + Seek,\n  319 | {\n  320 |     /// Writes the complete image.\n  321 |     ///\n  322 |     /// Assumes the writer is buffered. In most cases, you should wrap your writer in a `BufWriter`\n  323 |     /// for best performance.\n  324 |     #[track_caller]\n  325 |     fn write_image(\n  326 |         self,\n  327 |         buf: &[u8],\n  328 |         width: u32,\n  329 |         height: u32,\n  330 |         color_type: ExtendedColorType,\n  331 |     ) -> ImageResult<()> {\n  332 |         let expected_buffer_len = color_type.buffer_size(width, height);\n  333 |         assert_eq!(\n  334 |             expected_buffer_len,\n  335 |             buf.len() as u64,\n  336 |             \"Invalid buffer length: expected {expected_buffer_len} got {} for {width}x{height} image\",\n  337 |             buf.len(),\n  338 |         );\n  339 | \n  340 |         write_buffer(self.0, buf, width, height, color_type)\n  341 |     }\n  342 | }","lines":40}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"PngEncoder::encode_inner computes `CompressionType::Level(_) => png::Compression::Fast` for `comp` with the comment 'whatever, will be overridden', but for Level(1..) the override only happens via set_deflate_compression; for an out-of-range Level it relies on advanced_comp being Some. The base `comp` value for Level(n>=1) is always discarded, making the Fast mapping for Level dead/confusing.","fix":"Restructure so the Level case clearly sets only the deflate compression, or document that the base `comp` is intentionally a placeholder superseded by set_deflate_compression.","locations":[{"ref":"src/codecs/png.rs:801-815","code":"  801 |         let comp = match self.compression {\n  802 |             CompressionType::Balanced => png::Compression::Balanced,\n  803 |             CompressionType::Best => png::Compression::High,\n  804 |             CompressionType::Fast => png::Compression::Fast,\n  805 |             CompressionType::Uncompressed => png::Compression::NoCompression,\n  806 |             CompressionType::Level(0) => png::Compression::NoCompression,\n  807 |             CompressionType::Level(_) => png::Compression::Fast, // whatever, will be overridden\n  808 |         };\n  809 | \n  810 |         let advanced_comp = match self.compression {\n  811 |             // Do not set level 0 as a Zlib level to avoid Zlib backend variance.\n  812 |             // For example, in miniz_oxide level 0 is very slow.\n  813 |             CompressionType::Level(n @ 1..) => Some(DeflateCompression::Level(n)),\n  814 |             _ => None,\n  815 |         };","lines":15}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"The stale TODO comment block above `impl ImageBuffer<P, Vec<P::Subpixel>>` claims rustc 'does not see this impl any more' and that `into_vec` is redundant, but `into_vec`/`new`/`from_vec`/`from_pixel`/`from_fn` are all still defined and used in this very impl block. The comment is misleading about the current state of the code.","fix":"Remove or rewrite the outdated comment to reflect that this Vec-specific impl is intentional and live.","locations":[{"ref":"src/images/buffer.rs:1450-1455","code":" 1450 | // TODO: I think that rustc does not \"see\" this impl any more: the impl with\n 1451 | // Container meets the same requirements. At least, I got compile errors that\n 1452 | // there is no such function as `into_vec`, whereas `into_raw` did work, and\n 1453 | // `into_vec` is redundant anyway, because `into_raw` will give you the vector,\n 1454 | // and it is more generic.\n 1455 | impl<P: Pixel> ImageBuffer<P, Vec<P::Subpixel>> {","lines":6}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"LimitSupport is an empty non_exhaustive struct and Limits::check_support always returns Ok(()), ignoring its argument. The documentation extensively describes strict-limit support negotiation, but the mechanism is entirely inert: a decoder that cannot uphold a strict limit has no way to signal it through this API, so the documented guarantee that strict limits are enforced is not actually backed by code here.","fix":"Either implement the support negotiation (populate LimitSupport and have check_support compare against set strict limits) or trim the documentation to match the current no-op behavior.","locations":[{"ref":"src/io/limits.rs:3-7","code":"    3 | /// Set of supported strict limits for a decoder.\n    4 | #[derive(Clone, Debug, Default, Eq, PartialEq, Hash)]\n    5 | #[allow(missing_copy_implementations)]\n    6 | #[non_exhaustive]\n    7 | pub struct LimitSupport {}","lines":5},{"ref":"src/io/limits.rs:69-72","code":"   69 |     /// This function checks that all currently set strict limits are supported.\n   70 |     pub fn check_support(&self, _supported: &LimitSupport) -> ImageResult<()> {\n   71 |         Ok(())\n   72 |     }","lines":4}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The GIF module doc example opens the output file with `File::open(\"out.gif\")`, which opens for reading only and will fail (or not allow writing) when the encoder writes. For an encode example it must use `File::create`. The example also discards the result of `encode_frames(...)` (an ImageResult) without `?` or handling.","fix":"Change to `File::create(\"out.gif\")?` and handle/propagate the result of `encode_frames`.","locations":[{"ref":"src/codecs/gif.rs:24-27","code":"   24 | //! let mut file_out = File::open(\"out.gif\")?;\n   25 | //! let mut encoder = GifEncoder::new(file_out);\n   26 | //! encoder.encode_frames(frames.into_iter());\n   27 | //! # Ok(())","lines":4}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In read_scanline the comment states 'decode_component guarantees that offset is within 0 .. width therefore we can skip bounds checking here, but we will not'. The closures use buf[offset] with normal (checked) indexing, so the claim about skipping bounds checks is misleading: no bounds checks are actually skipped, and the safety reasoning describes behavior the code does not implement.","fix":"Reword the comment to reflect that indexing is checked, or remove the stale claim about skipping bounds checks.","locations":[{"ref":"src/codecs/hdr/decoder.rs:356-363","code":"  356 |     if fb.c[0] == 2 && fb.c[1] == 2 && fb.c[2] < 128 {\n  357 |         // denormalized pixel value (2,2,<128,_) indicates new per component RLE method\n  358 |         // decode_component guarantees that offset is within 0 .. width\n  359 |         // therefore we can skip bounds checking here, but we will not\n  360 |         decode_component(r, width, |offset, value| buf[offset].c[0] = value)?;\n  361 |         decode_component(r, width, |offset, value| buf[offset].c[1] = value)?;\n  362 |         decode_component(r, width, |offset, value| buf[offset].c[2] = value)?;\n  363 |         decode_component(r, width, |offset, value| buf[offset].e = value)?;","lines":8}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on the `NonAsciiByteInHeader` enum variant reads \"More than the exactly one allowed plane specified by the format\", which is a leftover copy-paste from an unrelated variant. The variant actually signals a non-ASCII byte encountered while parsing a header number, which is exactly what the next variant's comment also describes. The wrong comment is misleading to future maintainers.","fix":"Replace the comment with something accurate, e.g. \"A non-ASCII byte was encountered while parsing a number in the header\".","locations":[{"ref":"src/codecs/pnm/decoder.rs:25-26","code":"   25 |     /// More than the exactly one allowed plane specified by the format\n   26 |     NonAsciiByteInHeader(u8),","lines":2}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `overlay_bounds_ext` states access 2 as `top.get_pixel(origin_top_y + [0..x_range), origin_top_y + [0..y_range))` — the x access incorrectly uses `origin_top_y` where it should be `origin_top_x`. Misleading for anyone reasoning about the bounds proof.","fix":"Change to `top.get_pixel(origin_top_x + [0..x_range), origin_top_y + [0..y_range))`.","locations":[{"ref":"src/imageops/mod.rs:135","code":"  135 | /// 2. `top.get_pixel(origin_top_y + [0..x_range), origin_top_y + [0..y_range))`","lines":1}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Both `transmute_y_plane16` and `transmute_chroma_plane16` carry the identical doc comment 'This is correct to transmute FFI data for Y plane and Alpha plane', but the second function transmutes the chroma (U/V) planes, not Y/Alpha. The comment was copy-pasted and not updated.","fix":"Update the chroma function's doc comment to describe chroma plane handling.","locations":[{"ref":"src/codecs/avif/decoder.rs:224-225","code":"  224 | /// This is correct to transmute FFI data for Y plane and Alpha plane\n  225 | fn transmute_y_plane16<'data>(","lines":2},{"ref":"src/codecs/avif/decoder.rs:266-267","code":"  266 | /// This is correct to transmute FFI data for Y plane and Alpha plane\n  267 | fn transmute_chroma_plane16<'data>(","lines":2}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment introducing the >8-bit branch reads '// // 8+ bit-depth case' with a doubled comment marker, and the surrounding doc/comment refers to '8+ bit-depth' while the branch actually handles only the 10/12-bit (i.e. strictly greater than 8) case. Minor but misleading typo/comment.","fix":"Fix the doubled `//` and reword to 'higher than 8-bit depth (10/12-bit) case'.","locations":[{"ref":"src/codecs/avif/decoder.rs:554-555","code":"  554 |         } else {\n  555 |             // // 8+ bit-depth case","lines":2}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment says 'PNG delays are rations in seconds' - 'rations' is a typo for 'ratios', and the unit is misleading: delay_num/delay_den is in seconds but the code multiplies the numerator by 1000 to express milliseconds, which the comment does not explain.","fix":"Fix typo to 'ratios' and clarify that the value is converted to milliseconds (num * 1000 over denom).","locations":[{"ref":"src/codecs/png.rs:228-237","code":"  228 |     let delay = info.frame_control().map(|fc| {\n  229 |         // PNG delays are rations in seconds.\n  230 |         let num = u32::from(fc.delay_num) * 1_000u32;\n  231 |         let denom = match fc.delay_den {\n  232 |             // The standard dictates to replace by 100 when the denominator is 0.\n  233 |             0 => 100,\n  234 |             d => u32::from(d),\n  235 |         };\n  236 | \n  237 |         Delay::from_ratio(Ratio::new(num, denom))","lines":10}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment in `AutoBreak::drop` says \"internal writer flushed automatically by Drop\", but `flush_buf` only writes the line buffer to the wrapped writer; it never calls `wrapped.flush()`, and there is no guarantee the wrapped writer flushes on drop (e.g. a wrapping `BufWriter` would not be flushed by this Drop). The comment overstates what happens.","fix":"Either flush the wrapped writer in Drop or correct the comment to state only the line buffer is flushed and the caller is responsible for flushing the wrapped writer.","locations":[{"ref":"src/codecs/pnm/autobreak.rs:84-90","code":"   84 | impl<W: io::Write> Drop for AutoBreak<W> {\n   85 |     fn drop(&mut self) {\n   86 |         if !self.panicked {\n   87 |             let _r = self.flush_buf();\n   88 |             // internal writer flushed automatically by Drop\n   89 |         }\n   90 |     }","lines":7}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Copy-paste doc artifact: `BiLevel::has_lookup` carries the comment '/// Indicate `NeuQuant` implements `lookup`.' even though this is the `BiLevel` color map, not NeuQuant.","fix":"Change the comment to reference `BiLevel`.","locations":[{"ref":"src/imageops/colorops.rs:423","code":"  423 |     /// Indicate `NeuQuant` implements `lookup`.","lines":1}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`bc_cubic_spline`'s comment says 'Calculate a splice based on the b and c parameters' — 'splice' is a typo for 'spline', and the kernel functions are described as Mitchell-Netravali. Minor but misleading.","fix":"Fix the typo: 'Calculate a spline based on the b and c parameters.'","locations":[{"ref":"src/imageops/sample.rs:146","code":"  146 | // Calculate a splice based on the b and c parameters.","lines":1}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Two test functions (`copy_heightstride_view`, `copy_widthstride_view`) carry the comment \"Each row has capacity for 5 channels, of which 4 are used.\" This is copy-pasted: in `copy_widthstride_view` the buffer uses `width_stride = 3`, `height_stride = 6` with 18 samples (6 channels of capacity per row), not 5, so the comment is wrong for that test.","fix":"Update or remove the inaccurate per-test comment so it reflects the actual stride/capacity of each test buffer.","locations":[{"ref":"src/images/flat.rs:2049-2061","code":" 2049 |         // Each row has capacity for 5 channels, of which 4 are used.\n 2050 |         let mut buffer = FlatSamples {\n 2051 |             samples: [0; 18],\n 2052 |             layout: SampleLayout {\n 2053 |                 channels: 2,\n 2054 |                 channel_stride: 1,\n 2055 |                 width: 2,\n 2056 |                 width_stride: 3,\n 2057 |                 height: 3,\n 2058 |                 height_stride: 6,\n 2059 |             },\n 2060 |             color_hint: None,\n 2061 |         };","lines":13}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"decode_into doc example comment says 'This image also has IPTC metadata' and uses tests/images/png/iptc.png, duplicating the decode() example; more importantly the decode_to_dynimage doc example block is marked ```ignore with the note 'Enable if exposed' but references reader.decode_to_dynimage which is pub(crate) and can never be called by external doctests, so the example is misleading to readers of the public docs.","fix":"Mark the pub(crate) method's example clearly as internal or move it to a normal comment, since it cannot function as a public doctest.","locations":[{"ref":"src/io/image_reader_type.rs:517-541","code":"  517 |     /// Decode an image into a provided buffer and retrieve metadata.\n  518 |     ///\n  519 |     /// # Examples\n  520 |     ///\n  521 |     /// ```ignore\n  522 |     /// // Enable if exposed.\n  523 |     /// use image::{DynamicImage, ImageReader};\n  524 |     /// use glob::glob;\n  525 |     ///\n  526 |     /// let mut buffer = DynamicImage::default();\n  527 |     ///\n  528 |     /// for entry in glob(\"tests/images/**/*.png\").unwrap() {\n  529 |     ///     let Ok(path) = entry else {\n  530 |     ///         continue;\n  531 |     ///     };\n  532 |     ///\n  533 |     ///     let mut reader = ImageReader::open(path)?;\n  534 |     ///     let mut meta = reader.decode_to_dynimage(&mut buffer)?;\n  535 |     ///     // …\n  536 |     /// # break; // Avoid actually looping in the test here.\n  537 |     /// }\n  538 |     ///\n  539 |     /// # Ok::<_, image::error::ImageError>(())\n  540 |     /// ```\n  541 |     pub(crate) fn decode_to_dynimage(","lines":25}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"In Rect::from_xy_ranges the second debug_assert! (for the y range) prints x.start and x.end in its message instead of y.start / y.end, so a failure on the y range reports the wrong values, making the diagnostic misleading.","fix":"Change the format arguments of the y-range debug_assert to y.start and y.end.","locations":[{"ref":"src/math/rect.rs:43-48","code":"   43 |         debug_assert!(\n   44 |             y.start <= y.end,\n   45 |             \"Range for y is incorrectly empty: {}..{}\",\n   46 |             x.start,\n   47 |             x.end\n   48 |         );","lines":6}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"`transmute_y_plane16` and `transmute_chroma_plane16` are near-identical: both compute `stride >> 1`, both branch on stride evenness, both attempt a borrowed bytemuck cast and fall back to `reshape_plane`. One uses `stride.is_multiple_of(2)` and the other `stride & 1 == 0` for the same test. The only real difference is the chroma stride/height computation. The duplication invites the two from diverging (and the inconsistent even-check style hints they were copy-pasted).","fix":"Factor the shared borrow-or-reshape logic into one helper parameterized by a closure/values that produce the target stride and height, and use a single consistent evenness check.","locations":[{"ref":"src/codecs/avif/decoder.rs:225-264","code":"  225 | fn transmute_y_plane16<'data>(\n  226 |     plane: &'data dav1d::Plane,\n  227 |     stride: u32,\n  228 |     width: u32,\n  229 |     height: u32,\n  230 |     limits: &mut Limits,\n  231 | ) -> Result<Plane16View<'data>, ImageError> {\n  232 |     let mut y_plane_stride = stride >> 1;\n  233 | \n  234 |     let mut bind_y = vec![];\n  235 |     let plane_ref = plane.as_ref();\n  236 | \n  237 |     let mut shape_y_plane = || {\n  238 |         y_plane_stride = width;\n  239 |         bind_y = reshape_plane(plane_ref, stride, width, height, limits)?;\n  240 |         Ok::<_, ImageError>(())\n  241 |     };\n  242 | \n  243 |     if stride.is_multiple_of(2) {\n  244 |         match bytemuck::try_cast_slice(plane_ref) {\n  245 |             Ok(slice) => Ok(Plane16View {\n  246 |                 data: std::borrow::Cow::Borrowed(slice),\n  247 |                 stride: y_plane_stride as usize,\n  248 |             }),\n  249 |             Err(_) => {\n  250 |                 shape_y_plane()?;\n  251 |                 Ok(Plane16View {\n  252 |                     data: std::borrow::Cow::Owned(bind_y),\n  253 |                     stride: y_plane_stride as usize,\n  254 |                 })\n  255 |             }\n  256 |         }\n  257 |     } else {\n  258 |         shape_y_plane()?;\n  259 |         Ok(Plane16View {\n  260 |             data: std::borrow::Cow::Owned(bind_y),\n  261 |             stride: y_plane_stride as usize,\n  262 |         })\n  263 |     }\n  264 | 3","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`flat.rs` re-exposes nearly every `SampleLayout` method a second time as an inherent method on `FlatSamples<Buffer>` (strides_cwh, extents, bounds, min_length, fits, has_aliased_samples, is_normal, in_bounds, index, index_ignoring_bounds, in_bounds_index, shrink_to) with the full doc comments duplicated verbatim, including the long multi-paragraph `min_length` explanation that appears twice in the same file. This is ~150 lines of duplicated documentation that will drift out of sync.","fix":"Replace the duplicated doc blocks with short `See [`SampleLayout::method`]` references, keeping the canonical documentation in one place.","locations":[{"ref":"src/images/flat.rs:218-277","code":"  218 |     /// Get the minimum length of a buffer such that all in-bounds samples have valid indices.\n  219 |     ///\n  220 |     /// This method will allow zero strides, allowing compact representations of monochrome images.\n  221 |     /// To check that no aliasing occurs, try `check_alias_invariants`. For compact images (no\n  222 |     /// aliasing and no unindexed samples) this is `width*height*channels`. But for both of the\n  223 |     /// other cases, the reasoning is slightly more involved.\n  224 |     ///\n  225 |     /// # Explanation\n  226 |     ///\n  227 |     /// Note that there is a difference between `min_length` and the index of the sample\n  228 |     /// 'one-past-the-end'. This is due to strides that may be larger than the dimension below.\n  229 |     ///\n  230 |     /// ## Example with holes\n  231 |     ///\n  232 |     /// Let's look at an example of a grayscale image with\n  233 |     /// * `width_stride = 1`\n  234 |     /// * `width = 2`\n  235 |     /// * `height_stride = 3`\n  236 |     /// * `height = 2`\n  237 |     ///\n  238 |     /// ```text\n  239 |     /// | x x   | x x m | $\n  240 |     ///  min_length m ^\n  241 |     ///                   ^ one operation. Shrinking could also lead to an non-aliasing image when\n  976 |     /// samples had aliased each other before.\n  977 |     pub fn shrink_to(&mut self, channels: u8, width: u32, height: u32) {\n  978 |         self.layout.shrink_to(channels, width, height);\n  979 |     }\n  980 | }","lines":123}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":true,"description":"The ICO entry validation thresholds are surprisingly loose and inconsistent with their own documentation: `num_color_planes > 256` is rejected (comment says the value should be \"0 or 1\"), and `bits_per_pixel > 256` is only rejected in strict mode. A bits-per-pixel value up to 256 is nonsensical for any real icon, so these checks accept clearly invalid headers. This is not a memory-safety bug (downstream BMP/PNG decoders re-validate), but the validation is weaker than the comments imply.","fix":"Tighten the thresholds to realistic ranges (e.g. planes in {0,1}, bpp <= 32) or update the comments to reflect that these are deliberately lenient CUR-hotspot-tolerant bounds.","locations":[{"ref":"src/codecs/ico/decoder.rs:188-198","code":"  188 |     // buf[4..6]: may be color planes (0 or 1) or horizontal hotspot for CUR files\n  189 |     let num_color_planes = u16::from_le_bytes(buf[4..6].try_into().unwrap());\n  190 |     if num_color_planes > 256 {\n  191 |         return Err(DecoderError::IcoEntryTooManyPlanesOrHotspot.into());\n  192 |     }\n  193 | \n  194 |     // buf[6..8]: may be bit depth (0 = unspecified) or vertical hotspot for CUR files\n  195 |     let mut bits_per_pixel = u16::from_le_bytes(buf[6..8].try_into().unwrap());\n  196 |     if spec == SpecCompliance::Strict && bits_per_pixel > 256 {\n  197 |         return Err(DecoderError::IcoEntryTooManyBitsPerPixelOrHotspot.into());\n  198 |     }","lines":11}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"negligible","easy":true,"description":"DecoderError::WrongScanlineLength is constru const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};

}

// URL hash — debounced so rapid filter changes don't thrash history

function loadHash() {

  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }

function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);

  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
