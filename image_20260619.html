0 |             CicpColorPrimaries::Unspecified => return None,\n 1271 |         };\n 1272 | \n 1273 |         let matrix = primaries.transform_to_xyz(whitepoint);\n 1274 | \n 1275 |         // Our result is the Y row of this matrix.\n 1276 |         Some(matrix.v[1])\n 1277 |     }","lines":38}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The full-range GBR (identity) path writes the raw Y/U/V samples straight into the RGB buffer without clamping to `(1<<BIT_DEPTH)-1`. For the >8-bit case the result is later fed into the bit-depth expansion `(*px << shl) | (*px >> shr)` in the decoder. If dav1d ever returns a sample that exceeds the nominal bit depth (untrusted/edge input), the left shift can set bits above the intended range; the limited-range branch is protected by `qrshr` clamping but the PC branch is not.","fix":"Clamp the PC-range GBR outputs to `max_value` before storing (or mask to BIT_DEPTH bits), consistent with the clamping done in every other conversion path.","locations":[{"ref":"src/codecs/avif/yuv.rs:1258-1273","code":" 1258 |         YuvIntensityRange::Pc => {\n 1259 |             for (((y_src, u_src), v_src), rgb) in y_iter.zip(u_iter).zip(v_iter).zip(rgb_iter) {\n 1260 |                 let rgb_chunks = rgb.as_chunks_mut::<CHANNELS>().0.iter_mut();\n 1261 | \n 1262 |                 for (((&y_src, &u_src), &v_src), rgb_dst) in\n 1263 |                     y_src.iter().zip(u_src).zip(v_src).zip(rgb_chunks)\n 1264 |                 {\n 1265 |                     rgb_dst[0] = v_src;\n 1266 |                     rgb_dst[1] = y_src;\n 1267 |                     rgb_dst[2] = u_src;\n 1268 |                     if CHANNELS == 4 {\n 1269 |                         rgb_dst[3] = max_value.as_();\n 1270 |                     }\n 1271 |                 }\n 1272 |             }\n 1273 |         }","lines":16},{"ref":"src/codecs/avif/decoder.rs:743-748","code":"  743 |         // Expand current bit depth to target 16\n  744 |         let shl = 16 - bit_depth;\n  745 |         let shr = bit_depth - shl;\n  746 |         for px in target.iter_mut() {\n  747 |             *px = (*px << shl) | (*px >> shr);\n  748 |         }","lines":6}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"set_limits only reserves one scanline's worth of bytes (width * size_of::<Rgbe8Pixel>) via limits.reserve, but it does not account for the output buffer or reset/track the larger Rgb<f32> allocation. The reserved amount (4 bytes/pixel for one row) understates actual transient memory; more importantly reserve() is not paired with a corresponding free, so the limit accounting is approximate and may not reflect true peak usage during read_image.","fix":"Document the intent, or reserve an amount that reflects the actual transient working set; ensure the limits accounting matches the allocation lifecycle used elsewhere in the crate.","locations":[{"ref":"src/codecs/hdr/decoder.rs:312-319","code":"  312 |     fn set_limits(&mut self, mut limits: Limits) -> ImageResult<()> {\n  313 |         limits.check_support(&crate::LimitSupport::default())?;\n  314 |         limits.check_dimensions(self.meta.width, self.meta.height)?;\n  315 | \n  316 |         let scanline_space = (self.meta.width as u64) * (size_of::<Rgbe8Pixel>() as u64);\n  317 |         limits.reserve(scanline_space)?;\n  318 |         Ok(())\n  319 |     }","lines":8}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `read_samples`, sample rescaling for sub-byte and bitmap types relies on Rust's saturating float-to-int cast to stay correct. For PBM/BlackAndWhite, `from_ascii` already emits final 0/255 values, then the rescale step multiplies by `factor = 255/maxval = 255` giving 255*255 which only stays correct because `as u8` saturates. The code path is functionally correct today but is fragile and non-obvious: the same scaling loop is run over already-expanded values and depends entirely on cast saturation.","fix":"Skip the rescale step for the bit/bitmap sample types (which already produce final 0/255 values), or make the expansion and scaling steps mutually exclusive and document the invariant.","locations":[{"ref":"src/codecs/pnm/decoder.rs:684-701","code":"  684 |         // Scale samples if 8bit or 16bit is not saturated\n  685 |         let current_sample_max = self.header.maximal_sample();\n  686 |         let target_sample_max = 256_u32.pow(S::sample_size()) - 1;\n  687 | \n  688 |         if current_sample_max != target_sample_max {\n  689 |             let factor = target_sample_max as f32 / current_sample_max as f32;\n  690 | \n  691 |             if S::sample_size() == 1 {\n  692 |                 for v in buf.iter_mut() {\n  693 |                     *v = (f32::from(*v) * factor).round() as u8;\n  694 |                 }\n  695 |             } else if S::sample_size() == 2 {\n  696 |                 for chunk in buf.as_chunks_mut::<2>().0.iter_mut() {\n  697 |                     let v = (f32::from(u16::from_ne_bytes(*chunk)) * factor).round() as u16;\n  698 |                     chunk.copy_from_slice(&v.to_ne_bytes());\n  699 |                 }\n  700 |             }\n  701 |         }","lines":18},{"ref":"src/codecs/pnm/decoder.rs:837-856","code":"  837 |     fn from_ascii(reader: &mut dyn Read, output_buf: &mut [u8]) -> ImageResult<()> {\n  838 |         #[allow(clippy::unbuffered_bytes)]\n  839 |         let mut bytes = reader.bytes();\n  840 |         for b in output_buf {\n  841 |             loop {\n  842 |                 let byte = bytes\n  843 |                     .next()\n  844 |                     .ok_or_else::<ImageError, _>(|| DecoderError::InputTooShort.into())??;\n  845 |                 match byte {\n  846 |                     b'\\t' | b'\\n' | b'\\x0b' | b'\\x0c' | b'\\r' | b' ' => continue,\n  847 |                     b'0' => *b = 255,\n  848 |                     b'1' => *b = 0,\n  849 |                     c => return Err(DecoderError::UnexpectedByteInRaster(c).into()),\n  850 |                 }\n  851 |                 break;\n  852 |             }\n  853 |         }\n  854 | \n  855 |         Ok(())\n  856 |     }","lines":20}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the TGA RLE decoder's repeat branch, `index` is advanced by the full `repeat_count * raw_bytes_per_pixel` even though `chunks_exact_mut(...).take(repeat_count)` only writes as many whole chunks as fit in the remaining buffer. Unlike the raw branch (which clamps with `.min(buf.len() - index)`), an over-long run that extends past the end of the row/image is silently accepted and just truncated rather than reported as malformed. No memory-safety issue, but malformed RLE streams that overrun the declared image size are decoded without error.","fix":"Clamp the repeat count to the remaining buffer (mirroring the raw branch) and/or return a decoding error when an RLE run would exceed the image bounds, instead of silently truncating.","locations":[{"ref":"src/codecs/tga/decoder.rs:262-281","code":"  262 |             if (run_packet & 0x80) != 0 {\n  263 |                 // high bit set, so we will repeat the data\n  264 |                 let repeat_count = ((run_packet & !0x80) + 1) as usize;\n  265 |                 self.r.read_exact(repeat_buf)?;\n  266 | \n  267 |                 for chunk in buf[index..]\n  268 |                     .chunks_exact_mut(self.raw_bytes_per_pixel)\n  269 |                     .take(repeat_count)\n  270 |                 {\n  271 |                     chunk.copy_from_slice(repeat_buf);\n  272 |                 }\n  273 |                 index += repeat_count * self.raw_bytes_per_pixel;\n  274 |             } else {\n  275 |                 // not set, so `run_packet+1` is the number of non-encoded pixels\n  276 |                 let num_raw_bytes =\n  277 |                     ((run_packet + 1) as usize * self.raw_bytes_per_pixel).min(buf.len() - index);\n  278 | \n  279 |                 self.r.read_exact(&mut buf[index..][..num_raw_bytes])?;\n  280 |                 index += num_raw_bytes;\n  281 |             }","lines":20}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"WebPDecoder::more_images returns MaybeMore for a non-animated (static) image before it has been read: `self.current` starts at 0 while `self.inner.num_frames()` for a single still image is 1, so 0 != 1 yields MaybeMore. The NoMoreData guard in read_image only triggers when `is_animated`, so a sequence-style consumer can be told there may be more images for a still WebP and attempt a second read against a non-animated decoder.","fix":"Treat non-animated images explicitly: return SequenceControl::None once a static image has been read (or whenever !is_animated && current >= 1), and ensure read_image rejects a second call on a static image.","locations":[{"ref":"src/codecs/webp/decoder.rs:129-135","code":"  129 |     fn more_images(&self) -> SequenceControl {\n  130 |         if self.current == self.inner.num_frames() {\n  131 |             SequenceControl::None\n  132 |         } else {\n  133 |             SequenceControl::MaybeMore\n  134 |         }\n  135 |     }","lines":7},{"ref":"src/codecs/webp/decoder.rs:74-106","code":"   74 |     fn read_image(&mut self, buf: &mut [u8]) -> ImageResult<DecodedImageAttributes> {\n   75 |         let is_animated = self.inner.is_animated();\n   76 | \n   77 |         if is_animated && self.current == self.inner.num_frames() {\n   78 |             return Err(ImageError::Parameter(ParameterError::from_kind(\n   79 |                 ParameterErrorKind::NoMoreData,\n   80 |             )));\n   81 |         }\n   82 | \n   83 |         let layout = self.prepare_image()?;\n   84 |         assert_eq!(u64::try_from(buf.len()), Ok(layout.total_bytes()));\n   85 | \n   86 |         // `read_frame` panics if the image is not animated.\n   87 |         let delay = if is_animated {\n   88 |             let delay = self\n   89 |                 .inner\n   90 |                 .read_frame(buf)\n   91 |                 .map_err(ImageError::from_webp_decode)?;\n   92 |             Some(Delay::from_numer_denom_ms(delay, 1))\n   93 |         } else {\n   94 |             self.inner\n   95 |                 .read_image(buf)\n   96 |                 .map_err(ImageError::from_webp_decode)?;\n   97 |             None\n   98 |         };\n   99 | \n  100 |         self.current += 1;\n  101 | \n  102 |         Ok(DecodedImageAttributes {\n  103 |             delay,\n  104 |             ..DecodedImageAttributes::default()\n  105 |         })\n  106 |     }","lines":33}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"handle_nan_before_conversion maps NaN and all values >1.0 to 1.0 via float.min(1.0), but negative values are left unchanged and then rely on the `as u8`/`as u16` saturating cast to clamp to 0. The comment claims NaN handling but does not mention that the +0.5 bias is applied AFTER the min, so an input of exactly 1.0 becomes 1.0*255+0.5 = 255.5 -> 255 (correct), while NaN -> 1.0 -> 255 (intended). This is fine, but FromPrimitive<f32> for u8/u16 does not clamp the lower bound before the bias: a value like -0.5 yields -127+0.5 = -127 which casts to 0 (ok via saturation). The behavior is correct but the reliance on cast saturation for the negative side is undocumented and fragile if the cast semantics are ever changed.","fix":"Add a comment noting that negative/lower-bound clamping relies on the saturating `as` cast, mirroring the existing upper-bound comment, to prevent future regressions.","locations":[{"ref":"src/color.rs:567-583","code":"  567 | #[inline]\n  568 | fn handle_nan_before_conversion(float: f32) -> f32 {\n  569 |     float.min(1.0)\n  570 | }\n  571 | \n  572 | impl FromPrimitive<f32> for u8 {\n  573 |     fn from_primitive(float: f32) -> Self {\n  574 |         let x = handle_nan_before_conversion(float);\n  575 |         (x * u8::MAX as f32 + 0.5) as u8\n  576 |     }\n  577 | }\n  578 | \n  579 | impl FromPrimitive<f32> for u16 {\n  580 |     fn from_primitive(float: f32) -> Self {\n  581 |         let x = handle_nan_before_conversion(float);\n  582 |         (x * u16::MAX as f32 + 0.5) as u16\n  583 |     }","lines":17}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ImageFormatHint Display for PathExtension formats as `\".{ext:?}\"` using the Debug formatting of an OsStr/PathBuf, yielding output like `.\"png\"` (with embedded quotes) rather than `.png`. This leaks Debug quoting into user-facing error messages.","fix":"Format the extension with its Display/lossy representation (e.g. ext.to_string_lossy()) instead of Debug to avoid quote characters in the message.","locations":[{"ref":"src/error.rs:542-551","code":"  542 | impl fmt::Display for ImageFormatHint {\n  543 |     fn fmt(&self, fmt: &mut fmt::Formatter) -> Result<(), fmt::Error> {\n  544 |         match self {\n  545 |             ImageFormatHint::Exact(format) => write!(fmt, \"{format:?}\"),\n  546 |             ImageFormatHint::Name(name) => write!(fmt, \"`{name}`\"),\n  547 |             ImageFormatHint::PathExtension(ext) => write!(fmt, \"`.{ext:?}`\"),\n  548 |             ImageFormatHint::Unknown => write!(fmt, \"`Unknown`\"),\n  549 |         }\n  550 |     }\n  551 | }","lines":10}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`filter_2d_separable` selects the fast ring-queue path based on the original `column_kernel.len()` (pre-scan length) rather than the trimmed `scanned_column_kernel.len()`. A kernel padded with leading/trailing zeros (so its raw length is >= RING_QUEUE_CIRCULAR_CUTOFF but its effective length is small, or vice versa) takes the wrong code path. Both paths are correct in isolation, so this is only a performance/threshold inconsistency, but the intent was clearly to compare effective kernel size.","fix":"Compare `scanned_column_kernel.len() < RING_QUEUE_CIRCULAR_CUTOFF` to match the kernel that is actually used.","locations":[{"ref":"src/imageops/filter_1d.rs:673","code":"  673 |     if column_kernel.len() < RING_QUEUE_CIRCULAR_CUTOFF {","lines":1}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`new_anisotropic_kernel_size` validates `y_axis_kernel_size` three times (once with `> 0.`, twice with `is_normal()`) but never checks `x_axis_kernel_size.is_normal()`. A subnormal/NaN/infinite `x_axis_kernel_size` that is still `> 0.` (e.g. `f32::INFINITY`) bypasses validation, unlike every sibling constructor which rejects non-normal inputs. Looks like a copy-paste slip where the x-axis `is_normal` assert was replaced by a duplicated y-axis assert.","fix":"Add `assert!(x_axis_kernel_size.is_normal(), ...)` for the x axis and remove the duplicated y-axis assert.","locations":[{"ref":"src/imageops/sample.rs:1176-1191","code":" 1176 |         assert!(\n 1177 |             x_axis_kernel_size > 0.,\n 1178 |             \"Kernel size do not allow infinities, zeros, NaNs or subnormals or negatives\"\n 1179 |         );\n 1180 |         assert!(\n 1181 |             y_axis_kernel_size.is_normal(),\n 1182 |             \"Kernel size do not allow infinities, zeros, NaNs or subnormals or negatives\"\n 1183 |         );\n 1184 |         assert!(\n 1185 |             y_axis_kernel_size > 0.,\n 1186 |             \"Kernel size do not allow infinities, zeros, NaNs or subnormals or negatives\"\n 1187 |         );\n 1188 |         assert!(\n 1189 |             y_axis_kernel_size.is_normal(),\n 1190 |             \"Kernel size do not allow infinities, zeros, NaNs or subnormals or negatives\"\n 1191 |         );","lines":16}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`unsharpen` clamps using `let max: i32 = NumCast::from(S::DEFAULT_MAX_VALUE)` and works entirely in i32. For f32 images `DEFAULT_MAX_VALUE` is 1.0, so `max` becomes 1 and `diff`/`threshold` arithmetic is done in integers, collapsing the [0,1] f32 range to {0,1}. The inline FIXME comment 'what does this do for f32? clamp 0-1 integers??' acknowledges the function is broken for floating-point subpixels.","fix":"Perform the unsharp computation in floating point using the real max value, or document/restrict the function to integer subpixel types.","locations":[{"ref":"src/imageops/sample.rs:1625-1647","code":" 1625 |     let max = S::DEFAULT_MAX_VALUE;\n 1626 |     let max: i32 = NumCast::from(max).unwrap();\n 1627 |     let (width, height) = image.dimensions();\n 1628 | \n 1629 |     for y in 0..height {\n 1630 |         for x in 0..width {\n 1631 |             let a = image.get_pixel(x, y);\n 1632 |             let b = tmp.get_pixel_mut(x, y);\n 1633 | \n 1634 |             let p = a.map2(b, |c, d| {\n 1635 |                 let ic: i32 = NumCast::from(c).unwrap();\n 1636 |                 let id: i32 = NumCast::from(d).unwrap();\n 1637 | \n 1638 |                 let diff = ic - id;\n 1639 | \n 1640 |                 if diff.abs() > threshold {\n 1641 |                     let e = clamp(ic + diff, 0, max); // FIXME what does this do for f32? clamp 0-1 integers??\n 1642 | \n 1643 |                     NumCast::from(e).unwrap()\n 1644 |                 } else {\n 1645 |                     c\n 1646 |                 }\n 1647 |             });","lines":23}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`SubImage::view` and `SubImage::sub_image` translate the requested rect into parent coordinates with `saturating_add` (`self.inner.xoffset.saturating_add(rect.x)`). Because `assert_in_bounds_of` is checked against the subimage (relative) coordinates only, a saturation would silently clamp the absolute offset to `u32::MAX` rather than panic, producing an out-of-bounds view request that is then re-validated only by the inner image. Saturation here masks the overflow instead of surfacing it; for any realistic image the sum cannot saturate, but the silent clamp is the wrong failure mode.","fix":"Use checked addition and panic with a clear message on overflow, or document why saturation is acceptable given the prior in-bounds assertion.","locations":[{"ref":"src/images/sub_image.rs:140-145","code":"  140 |     pub fn view(&self, mut rect: Rect) -> SubImage<&I::Target> {\n  141 |         rect.assert_in_bounds_of(&self.inner);\n  142 |         rect.x = self.inner.xoffset.saturating_add(rect.x);\n  143 |         rect.y = self.inner.yoffset.saturating_add(rect.y);\n  144 |         SubImage::new(&*self.inner.image, rect)\n  145 |     }","lines":6},{"ref":"src/images/sub_image.rs:161-166","code":"  161 |     pub fn sub_image(&mut self, mut rect: Rect) -> SubImage<&mut I::Target> {\n  162 |         rect.assert_in_bounds_of(&self.inner);\n  163 |         rect.x = self.inner.xoffset.saturating_add(rect.x);\n  164 |         rect.y = self.inner.yoffset.saturating_add(rect.y);\n  165 |         SubImage::new(&mut *self.inner.image, rect)\n  166 |     }","lines":6}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ImageReader::set_limits halves max_alloc giving 'half for ourselves, half to the decoder', but this halving is applied every time set_limits is called. ImageReaderOptions::into_reader calls reader.set_limits(self.limits) once, which is fine, but ImageReader::set_limits is also public; calling it repeatedly (or after from_decoder which already set Limits::default) compounds the halving, silently shrinking the effective limit each call. There is also no re-addition of the decoder's half if the decoder ignores it.","fix":"Halve based on the original caller-provided limit rather than the current (already-halved) stored value, or document that set_limits must be called at most once.","locations":[{"ref":"src/io/image_reader_type.rs:800-810","code":"  800 |     /// Reconfigure the limits for decoding.\n  801 |     pub fn set_limits(&mut self, mut limits: Limits) -> ImageResult<()> {\n  802 |         if let Some(max_alloc) = &mut limits.max_alloc {\n  803 |             // We'll take half for ourselves, half to the decoder.\n  804 |             *max_alloc /= 2;\n  805 |         }\n  806 | \n  807 |         self.inner.set_limits(limits.clone())?;\n  808 |         self.limits = limits;\n  809 |         Ok(())\n  810 |     }","lines":11}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Rect::shrink_to_bounds_of computes `width - x` and `height - y` after clamping x/y to width/height with cmp::min. When self.x == width (clamped), width - x == 0 which is fine, but the intent is unclear and there is no overflow because x<=width and y<=height by construction; however the result keeps the original (out-of-bounds) x/y clamped to the edge, producing a zero-area rect at the boundary rather than an empty rect at the original position. This is easy to misuse silently. Worth confirming callers expect a boundary-clamped rect.","fix":"Add a doc note clarifying the boundary-clamping semantics, or return an explicitly empty Rect (width/height 0) when the origin is fully out of bounds.","locations":[{"ref":"src/math/rect.rs:99-114","code":"   99 |     pub(crate) fn shrink_to_bounds_of(&self, image: &impl GenericImageView) -> Rect {\n  100 |         let (width, height) = image.dimensions();\n  101 | \n  102 |         let x = cmp::min(self.x, width);\n  103 |         let y = cmp::min(self.y, height);\n  104 | \n  105 |         let width = cmp::min(self.width, width - x);\n  106 |         let height = cmp::min(self.height, height - y);\n  107 | \n  108 |         Rect {\n  109 |             x,\n  110 |             y,\n  111 |             width,\n  112 |             height,\n  113 |         }\n  114 |     }","lines":16}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"`get_inverse_transform` asserts `kg != 0` with `assert_ne!`. `kg = 1 - kr - kb` is computed from compile-time-constant matrix coefficients (all built-in matrices have kg != 0), so this assert can never fire for the current callers; it is effectively dead defensive code that would only matter if a zero-kg matrix were ever added. Not a bug, but the assert message and runtime check give a false impression that untrusted data could reach it.","fix":"Either drop the runtime assert (the matrices are constants) or convert it to a compile-time/const assertion to document the true invariant.","locations":[{"ref":"src/codecs/avif/yuv.rs:138-139","code":"  138 |     let kg = 1.0f32 - kr - kb;\n  139 |     assert_ne!(kg, 0., \"1.0f - kr - kb must not be 0\");","lines":2}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"TiffDecoder::read_image clamps the EXIF Orientation tag value with `v.into_u16().ok()?.min(255) as u8` before calling Orientation::from_exif. Valid orientation values are only 1..=8; clamping to 255 then casting passes large bogus values (9..=255) to from_exif which presumably returns None anyway, so the `.min(255)` is misleading dead-ish defensive code that hides the intent (it does not actually validate the 1..=8 range).","fix":"Either pass the u16 through a proper 1..=8 validation, or drop the `.min(255)` and let from_exif handle out-of-range values; document the chosen contract.","locations":[{"ref":"src/codecs/tiff.rs:554-557","code":"  554 |         let orientation = reader\n  555 |             .find_tag(Tag::Orientation)\n  556 |             . Cast::from(clamp(new_g, 0.0, max)).unwrap();\n  283 |         channels[2] = NumCast::from(clamp(new_b, 0.0, max)).unwrap();\n  284 | \n  285 |         *outpixel = pixel;\n  286 |     }\n  287 | \n  288 |     out\n  289 | }","lines":56},{"ref":"src/imageops/colorops.rs:294-346","code":"  294 | pub fn huerotate_in_place<I>(image: &mut I, value: i32)\n  295 | where\n  296 |     I: GenericImage,\n  297 | {\n  298 |     if <I::Pixel as Pixel>::CHANNEL_COUNT < 3 {\n  299 |         // ignore grayscale and gray+alpha images\n  300 |         return;\n  301 |     }\n  302 | \n  303 |     let (width, height) = image.dimensions();\n  304 | \n  305 |     let angle: f64 = NumCast::from(value).unwrap();\n  306 | \n  307 |     let cosv = angle.to_radians().cos();\n  308 |     let sinv = angle.to_radians().sin();\n  309 |     let matrix: [f64; 9] = [\n  310 |         // Reds\n  311 |         0.213 + cosv * 0.787 - sinv * 0.213,\n  312 |         0.715 - cosv * 0.715 - sinv * 0.715,\n  313 |         0.072 - cosv * 0.072 + sinv * 0.928,\n  314 |         // Greens\n  315 |         0.213 - cosv * 0.213 + sinv * 0.143,\n  316 |         0.715 + cosv * 0.285 + sinv * 0.140,\n  317 |         0.072 - cosv * 0.072 - sinv * 0.283,\n  318 |         // Blues\n  319 |         0.213 - cosv * 0.213 - sinv * 0.787,\n  320 |         0.715 - cosv * 0.715 + sinv * 0.715,\n  321 |         0.072 + cosv * 0.928 + sinv * 0.072,\n  322 |     ];\n  323 | \n  324 |     // TODO find a way to use pixels?\n  325 |     for y in 0..height {\n  326 |         for x in 0..width {\n  327 |             let mut pixel = image.get_pixel(x, y);\n  328 |             let channels = pixel.channels_mut();\n  329 | \n  330 |             let r = channels[0].to_f64().unwrap();\n  331 |             let g = channels[1].to_f64().unwrap();\n  332 |             let b = channels[2].to_f64().unwrap();\n  333 | \n  334 |             let new_r = matrix[0] * r + matrix[1] * g + matrix[2] * b;\n  335 |             let new_g = matrix[3] * r + g DecoderOptions (e.g. memory/size limits) and apply them before decoding, or document clearly that JPEG decoding does not enforce allocation limits.","locations":[{"ref":"src/codecs/jpeg/decoder.rs:173-179","code":"  173 |     fn set_limits(&mut self, limits: Limits) -> ImageResult<()> {\n  174 |         limits.check_support(&crate::LimitSupport::default())?;\n  175 |         let layout = self.prepare_image()?;\n  176 |         limits.check_layout_dimensions(&layout)?;\n  177 |         self.limits = limits;\n  178 |         Ok(())\n  179 |     }","lines":7},{"ref":"src/codecs/jpeg/decoder.rs:34-49","code":"   34 |     pub(crate) fn with_spec_compliance(r: R, spec: SpecCompliance) -> JpegDecoder<R> {\n   35 |         let options = zune_core::options::DecoderOptions::default()\n   36 |             .set_strict_mode(matches!(spec, SpecCompliance::Strict))\n   37 |             .set_max_width(usize::MAX)\n   38 |             .set_max_height(usize::MAX);\n   39 | \n   40 |         let decoder = zune_jpeg::JpegDecoder::new_with_options(r, options);\n   41 |         // Limits are disabled by default in the constructor for all decoders\n   42 |         let limits = Limits::no_limits();\n   43 | \n   44 |         JpegDecoder {\n   45 |             decoder,\n   46 |             header: None,\n   47 |             limits,\n   48 |         }\n   49 |     }","lines":16}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"read_image asserts the output buffer size with assert!(!has_invalid_size_or_overflowed, ...), panicking if the buffer length does not match width*height*bytes_per_pixel. Since prepare_image() dimensions come from untrusted file metadata (display_window.size) and the buffer is allocated by the caller based on those same dimensions, a mismatch is a programming/contract error in normal flow, but using assert! (rather than a returned ImageError) means any inconsistency aborts the process instead of yielding a recoverable decode error.","fix":"Return an ImageError (ParameterError/DecodingError) instead of asserting when the buffer size does not match the expected size.","locations":[{"ref":"src/codecs/openexr.rs:160-178","code":"  160 |         {\n  161 |             // check whether the buffer is large enough for the dimensions of the file\n  162 |             let bytes_per_pixel = usize::from(layout.layout.color.bytes_per_pixel());\n  163 |             let expected_byte_count = (width as usize)\n  164 |                 .checked_mul(height as usize)\n  165 |                 .and_then(|size| size.checked_mul(bytes_per_pixel));\n  166 | \n  167 |             // if the width and height does not match the length of the bytes, the arguments are invalid\n  168 |             let has_invalid_size_or_overflowed = expected_byte_count\n  169 |                 .map(|expected_byte_count| unaligned_bytes.len() != expected_byte_count)\n  170 |                 // otherwise, size calculation overflowed, is bigger than memory,\n  171 |                 // therefore data is too small, so it is invalid.\n  172 |                 .unwrap_or(true);\n  173 | \n  174 |             assert!(\n  175 |                 !has_invalid_size_or_overflowed,\n  176 |                 \"byte buffer not large enough for the specified dimensions and f32 pixels\"\n  177 |             );\n  178 |         }","lines":19}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`fast_blur` panics (via `panic!` in the `Err` arm) when width*height*channels overflows pointer size, and `test_radius_size` panics on radius overflow. These are reachable from a public, infallible API (`fast_blur`) on attacker-controlled image dimensions, turning a recoverable size error into an unconditional panic. The neighbouring `safe_mul`/`safe_add` machinery exists specifically to return `Result`, but it is discarded here.","fix":"Either document the panic clearly, or have `fast_blur` clamp/return the input unchanged on overflow rather than panicking (the function already early-returns clones for degenerate inputs).","locations":[{"ref":"src/imageops/fast_blur.rs:130-136","code":"  130 |     let destination_size = match (width as usize)\n  131 |         .safe_mul(height as usize)\n  132 |         .and_then(|x| x.safe_mul(P::CHANNEL_COUNT as usize))\n  133 |     {\n  134 |         Ok(s) => s,\n  135 |         Err(_) => panic!(\"Width and height and channels count exceeded pointer size\"),\n  136 |     };","lines":7},{"ref":"src/imageops/fast_blur.rs:193-199","code":"  193 | #[inline]\n  194 | fn test_radius_size(bound: usize, radius: usize) {\n  195 |     match bound.safe_add(radius) {\n  196 |         Ok(_) => {}\n  197 |         Err(_) => panic!(\"Radius overflowed maximum possible size\"),\n  198 |     }\n  199 | }","lines":7}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"ImageReader::animation_attributes ignores the result of prepare_image with `let _ = self.inner.prepare_image();`. If prepare_image fails (malformed header) the error is silently dropped and animation_attributes() is then queried on a decoder that may be in an unprepared/inconsistent state, returning possibly bogus attributes instead of surfacing the failure.","fix":"Propagate the prepare_image error (change the signature to ImageResult<Option<...>>), or at minimum return None when prepare_image fails rather than querying the decoder regardless.","locations":[{"ref":"src/io/image_reader_type.rs:649-652","code":"  649 |     pub fn animation_attributes(&mut self) -> Option<DecodedAnimationAttributes> {\n  650 |         let _ = self.inner.prepare_image();\n  651 |         self.inner.animation_attributes()\n  652 |     }","lines":4}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the ICO BMP branch, when applying the AND mask the code reads mask bytes with `r.read_u8()?` row by row, but it has already verified only that `data_end >= image_end + mask_length` (i.e. that enough bytes exist according to the directory entry's declared `image_length`). If the underlying stream is actually shorter than the entry claims, the `read_u8` calls return an IO error rather than a clean format error. This is mostly cosmetic (still an error, no panic) but yields a less specific error than the surrounding `InvalidDataSize` handling.","fix":"Read the full mask region up front (bounded by `mask_length`) into a buffer and surface a `DecoderError::InvalidDataSize` on short reads, instead of per-byte `read_u8` that converts to a generic IO error.","locations":[{"ref":"src/codecs/ico/decoder.rs:402-440","code":"  402 |                 if data_end >= image_end + mask_length {\n  403 |                     if width == 0 {\n  404 |                         return Ok(DecodedImageAttributes::default());\n  405 |                     }\n  406 | \n  407 |                     // 32bpp BMPs already have a native alpha channel, so the\n  408 |                     // AND mask is ignored.\n  409 |                     // For lower bit depths, read and apply the AND mask.\n  410 |                     if self.selected_entry.bits_per_pixel < 32 {\n  411 |                         let rgba = buf.as_chunks_mut::<4>().0;\n  412 |                         let rows = rgba.chunks_exact_mut(width as usize);\n  413 | \n  414 |                         if rows.len() != height as usize {\n  415 |                             return Err(DecoderError::InvalidDataSize.into());\n  416 |                         }\n  417 | \n  418 |                         // If there's an AND mask following the image, read and apply it.\n  419 |                         // This from the bottom up (in terms of our coordinates).\n  420 |                         for row in rows.rev() {\n  421 |                             let mut x = 0;\n  422 | \n  423 |                             // Apply the bits of each byte until we reach the end of the row.\n  424 |                             for _ in 0..mask_row_bytes {\n  425 |                                 let mask_byte = r.read_u8()?;\n  426 |                                 for bit in (0..8).rev() {\n  427 |                                     if x >= width {\n  428 |                                         break;\n  429 |                                     }\n  430 | \n  431 |                                     if mask_byte & (1 << bit) != 0 {\n  432 |                                         // Set alpha channel to transparent.\n  433 |                                         row[x as usize][3] = 0;\n  434 |                                     }\n  435 | \n  436 |                                     x += 1;\n  437 |                                 }\n  438 |                             }\n  439 |                         }\n  440 |                     }","lines":39}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"PngDecoder::ensure_reader_and_header uses `self.reader.as_mut().ok_or_else(|| unreachable!())`. The closure body `unreachable!()` is evaluated to produce the error value only in the None branch, so this is effectively `expect`-by-panic. The surrounding comment acknowledges it is unreachable, but using unreachable!() inside ok_or_else is an obscure idiom that panics rather than returning an error and is easy to misread.","fix":"Replace with a direct `return Ok(self.reader.as_mut().unwrap())` guarded by the is_some() check, or restructure to avoid the unreachable closure entirely for clarity.","locations":[{"ref":"src/codecs/png.rs:67-72","code":"   67 |     fn ensure_reader_and_header(&mut self) -> ImageResult<&mut png::Reader<R>> {\n   68 |         if self.reader.is_some() {\n   69 |             // We do this for borrow-checking issues, do not borrow self outside the conditional\n   70 |             // branch. So the None/Err case here is not reachable.\n   71 |             return self.reader.as_mut().ok_or_else(|| unreachable!());\n   72 |         }","lines":6}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"ApngDecoder::animation_attributes uses `NonZeroU32::new(actl.num_plays).expect(\"num_plays should be non-zero\")`, but the only guard against zero is the preceding match arm `Some(actl) if actl.num_plays == 0`. This is correct today, yet the expect is a latent panic that depends entirely on the guard ordering; any refactor of the match arms turns attacker-controlled num_plays into a panic.","fix":"Use NonZeroU32::new(...).map(LoopCount::Finite).unwrap_or(LoopCount::Infinite) so a zero value can never panic regardless of arm ordering.","locations":[{"ref":"src/codecs/png.rs:654-660","code":"  654 |         let loop_count = match count {\n  655 |             None => LoopCount::Infinite,\n  656 |             Some(actl) if actl.num_plays == 0 => LoopCount::Infinite,\n  657 |             Some(actl) => LoopCount::Finite(\n  658 |                 NonZeroU32::new(actl.num_plays).expect(\"num_plays should be non-zero\"),\n  659 |             ),\n  660 |         };","lines":7}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The QOI decoder's `prepare_image` returns the width/height straight from the QOI header without any dimension/overflow validation of its own, unlike the farbfeld and PNM decoders which explicitly reject dimensions whose total byte size overflows u64. QOI robustness therefore relies entirely on the external `qoi` crate's internal limits. If those limits ever change this could allow oversized allocations to be attempted by callers using `prepare_image().total_bytes()` directly.","fix":"Mirror the other decoders by checking `layout.total_bytes_overflows_u64()` (or applying limits) in `prepare_image`/`new` and returning an Unsupported error for dimensions that are too large.","locations":[{"ref":"src/codecs/qoi.rs:27-39","code":"   27 |     fn prepare_image(&mut self) -> ImageResult<DecoderPreparedImage> {\n   28 |         let header = self.decoder.header();\n   29 |         let color = match header.channels {\n   30 |             qoi::Channels::Rgb => ColorType::Rgb8,\n   31 |             qoi::Channels::Rgba => ColorType::Rgba8,\n   32 |         };\n   33 | \n   34 |         Ok(DecoderPreparedImage::new(\n   35 |             header.width,\n   36 |             header.height,\n   37 |             color,\n   38 |         ))\n   39 |     }","lines":13}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"TiffDecoder::icc_profile silently swallows all errors via `decoder.get_tag_u8_vec(Tag::IccProfile).ok()`, mapping any failure (including a genuine I/O error or a malformed-but-present ICC tag) to `None` as if no profile existed. A real read error is indistinguishable from absence and is hidden from the caller.","fix":"Distinguish 'tag not found' from real errors: return Ok(None) only for the RequiredTagNotFound case (as xmp_metadata already does) and propagate other TiffErrors via ImageError::from_tiff_decode.","locations":[{"ref":"src/codecs/tiff.rs:404-410","code":"  404 |     fn icc_profile(&mut self) -> ImageResult<Option<Vec<u8>>> {\n  405 |         if let Some(decoder) = &mut self.inner {\n  406 |             Ok(decoder.get_tag_u8_vec(Tag::IccProfile).ok())\n  407 |         } else {\n  408 |             Ok(None)\n  409 |         }\n  410 |     }","lines":7}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`gaussian_blur_dyn_image` and `gaussian_blur_indirect_impl` call `.unwrap()` on every `filter_2d_sep_*` result and on `ImageBuffer::from_raw`. The filter functions return `Err` for dimension/overflow conditions; on a very large image these unwraps convert a `LimitError` into a panic in code reachable from the public `blur`/`blur_advanced` APIs.","fix":"Propagate the error or pre-validate dimensions and fall back gracefully instead of unwrapping in an infallible public API path.","locations":[{"ref":"src/imageops/sample.rs:1326","code":" 1326 |             .unwrap();","lines":1},{"ref":"src/imageops/sample.rs:1561","code":" 1561 |             .unwrap();","lines":1},{"ref":"src/imageops/sample.rs:1596-1601","code":" 1596 |     let mut out = image.buffer_like();\n 1597 |     let transient_dst_chunks = transient_dst.as_chunks_mut::<CN>().0.iter_mut();\n 1598 |     for (dst, src) in out.pixels_mut().iter_mut().zip(transient_dst_chunks) {\n 1599 |         let pix = src.map(NearestFrom::<f32>::nearest_from);\n 1600 |         *dst = *Pixel::from_slice(&pix);\n 1601 |     }","lines":6}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`SubImageInner::to_pixel_view` / `to_pixel_view_mut` rewrite `layout.width`/`layout.height` to the subimage stride but leave the parent's `width_stride`/`height_stride` and total length unchanged, then rely on `into_view().ok()` / `into_view_mut().ok()` to silently discard failures. When the offset-adjusted slice is shorter than the parent's `min_length` (a normal situation for a sub-rectangle that does not extend to the bottom-right corner) the `fits` check fails and the fast sample-view path is silently abandoned, falling back to per-pixel access without any indication. This defeats the optimization for most non-trivial subimages.","fix":"Recompute `min_length` for the cropped dimensions (the descriptor only needs enough samples for the new width/height with the existing strides) and/or truncate `samples` to the correct cropped extent before calling `into_view`, so the fast path succeeds for in-bounds subimages.","locations":[{"ref":"src/images/sub_image.rs:221-233","code":"  221 |     fn to_pixel_view(&self) -> Option<ViewOfPixel<'_, Self::Pixel>> {\n  222 |         let inner = self.image.to_pixel_view()?;\n  223 | \n  224 |         // Now pivot the inner descriptor.\n  225 |         let mut descriptor = inner.into_inner();\n  226 | \n  227 |         let offset = descriptor.index(0, self.xoffset, self.yoffset)?;\n  228 |         descriptor.samples = descriptor.samples.get(offset..)?;\n  229 |         descriptor.layout.width = self.xstride;\n  230 |         descriptor.layout.height = self.ystride;\n  231 | \n  232 |         descriptor.into_view().ok()\n  233 |     }","lines":13},{"ref":"src/images/sub_image.rs:257-269","code":"  257 |     fn to_pixel_view_mut(&mut self) -> Option<ViewMutOfPixel<'_, Self::Pixel>> {\n  258 |         let inner = self.image.to_pixel_view_mut()?;\n  259 | \n  260 |         // Now pivot the inner descriptor.\n  261 |         let mut descriptor = inner.into_inner();\n  262 | \n  263 |         let offset = descriptor.index(0, self.xoffset, self.yoffset)?;\n  264 |         descriptor.samples = descriptor.samples.get_mut(offset..)?;\n  265 |         descriptor.layout.width = self.xstride;\n  266 |         descriptor.layout.height = self.ystride;\n  267 | \n  268 |         descriptor.into_view_mut().ok()\n  269 |     }","lines":13}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"The default ImageDecoder::set_limits implementation calls prepare_image() and checks dimensions, but completely ignores max_alloc. A custom decoder relying on the default impl will silently never enforce the memory limit, and since set_limits is the documented place to apply limits, callers may assume max_alloc is honored. The ImageReader layer compensates for built-in decoders, but third-party Box<dyn ImageDecoder> using the default get no memory limiting.","fix":"Document clearly that the default set_limits does not enforce max_alloc, or have the default reserve based on the prepared layout where feasible.","locations":[{"ref":"src/io/decoder.rs:44-49","code":"   44 |     fn set_limits(&mut self, limits: crate::Limits) -> ImageResult<()> {\n   45 |         limits.check_support(&crate::LimitSupport::default())?;\n   46 |         let layout = self.prepare_image()?;\n   47 |         limits.check_layout_dimensions(&layout)?;\n   48 |         Ok(())\n   49 |     }","lines":6}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"decoder_to_vec calls decoder.prepare_image()?.total_bytes() then checks `total_bytes.is_err() || total_bytes.unwrap() > isize::MAX`, and later divides by size_of::<T>() to size the Vec. It checks the byte count fits isize but does not verify total_bytes is a multiple of size_of::<T>(); if a decoder reports a total_bytes not divisible by the element size, the integer division silently under-allocates and read_image is handed a buffer whose byte length (len*size_of::<T>) is smaller than total_bytes, leading to a potential out-of-range write panic or truncated decode depending on the decoder.","fix":"Assert or error when total_bytes % size_of::<T>() != 0 before allocating, ensuring the cast slice length exactly matches the reported total_bytes.","locations":[{"ref":"src/io/free_functions.rs:170-186","code":"  170 | pub(crate) fn decoder_to_vec<T>(\n  171 |     decoder: &mut (impl ImageDecoder + ?Sized),\n  172 | ) -> ImageResult<(Vec<T>, DecodedImageAttributes)>\n  173 | where\n  174 |     T: crate::traits::Primitive + bytemuck::Pod,\n  175 | {\n  176 |     let total_bytes = usize::try_from(decoder.prepare_image()?.total_bytes());\n  177 |     if total_bytes.is_err() || total_bytes.unwrap() > isize::MAX as usize {\n  178 |         return Err(ImageError::Limits(LimitError::from_kind(\n  179 |             LimitErrorKind::InsufficientMemory,\n  180 |         )));\n  181 |     }\n  182 | \n  183 |     let mut buf = vec![num_traits::Zero::zero(); total_bytes.unwrap() / size_of::<T>()];\n  184 |     let attr = decoder.read_image(bytemuck::cast_slice_mut(buf.as_mut_slice()))?;\n  185 |     Ok((buf, attr))\n  186 | }","lines":17}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"HdrEncoder::encode and encode_pixels validate the pixel count with assert!(flattened_rgbe_pixels.len() >= width * height, ...), which panics on too few pixels rather than returning an error. The comment at write_image (\"the length will be checked inside encode_pixels\") implies a recoverable check, but a caller of the public encode() that passes a slice smaller than width*height gets a panic instead of an ImageResult error. Also width * height itself can overflow usize for hostile width/height arguments, producing a wrong bound or a panic in debug builds.","fix":"Return a proper ImageError (e.g. ParameterError/DimensionError) when the provided pixel count is insufficient, and compute the required count with checked_mul to avoid overflow.","locations":[{"ref":"src/codecs/hdr/encoder.rs:63-66","code":"   63 |         assert!(\n   64 |             flattened_rgbe_pixels.len() >= width * height,\n   65 |             \"not enough pixels provided\"\n   66 |         ); // bonus: this might elide some bounds checks","lines":4},{"ref":"src/codecs/hdr/encoder.rs:28-30","code":"   28 | \n   29 |                 // the length will be checked inside encode_pixels\n   30 |                 self.encode_pixels(rgbe_pixels, width as usize, height as usize)","lines":3}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In `process_16bit_picture`, when the destination buffer is unaligned the code allocates `aligned_store = vec![0u16; buf.len() / 2]` and later writes back with `buf.as_chunks_mut::<2>().0`. If `buf.len()` is odd, the integer division silently drops the trailing byte and the final odd byte of `buf` is never written. The outer `read_image` asserts `buf.len() == total_bytes` and RGBA16 sizes are always even, so this is currently unreachable, but the code does not document or assert the evenness invariant it relies on.","fix":"Assert `buf.len()` is even (or that it is a multiple of 2) before the division, to make the invariant explicit and fail loudly if it is ever violated.","locations":[{"ref":"src/codecs/avif/decoder.rs:559-567","code":"  559 |             } else {\n  560 |                 // If buffer from Decoder is unaligned\n  561 |                 let mut aligned_store = vec![0u16; buf.len() / 2];\n  562 |                 self.process_16bit_picture(&mut aligned_store, yuv_range, matrix_strategy)?;\n  563 |                 let buf_chunks = buf.as_chunks_mut::<2>().0.iter_mut();\n  564 |                 for (dst, src) in buf_chunks.zip(aligned_store.iter()) {\n  565 |                     *dst = src.to_ne_bytes();\n  566 |                 }\n  567 |             }","lines":9}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"From<&Path> for ImageFormatHint and ImageFormat::from_path both use path.extension(); from_path filters empty extensions but the ImageFormatHint From impl does not, so a path like '.gitignore' or a trailing-dot path can yield ImageFormatHint::PathExtension with an empty/odd OsStr, producing a confusing error message ('The file extension `.\"\"` ...').","fix":"Filter empty extensions consistently in the From<&Path> for ImageFormatHint impl, matching open_impl's `.filter(|ext| !ext.is_empty())`.","locations":[{"ref":"src/error.rs:333-340","code":"  333 | impl From<&'_ std::path::Path> for ImageFormatHint {\n  334 |     fn from(path: &'_ std::path::Path) -> Self {\n  335 |         match path.extension() {\n  336 |             Some(ext) => ImageFormatHint::PathExtension(ext.into()),\n  337 |             None => ImageFormatHint::Unknown,\n  338 |         }\n  339 |     }\n  340 | }","lines":8},{"ref":"src/io/image_reader_type.rs:370-382","code":"  370 |     fn open_impl(path: &Path) -> io::Result<Self> {\n  371 |         let format = path\n  372 |             .extension()\n  373 |             .filter(|ext| !ext.is_empty())\n  374 |             .map(|ext| Format::Extension(ext.to_owned()));\n  375 | \n  376 |         Ok(ImageReaderOptions {\n  377 |             inner: BufReader::new(File::open(path)?),\n  378 |             format,\n  379 |             limits: Limits::default(),\n  380 |             spec_compliance: SpecCompliance::default(),\n  381 |         })\n  382 |     }","lines":13}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`filter3x3` recomputes the full 9-tap convolution for every pixel with per-channel `NumCast::from(...).unwrap()` conversions inside the innermost loop, and re-derives the kernel each pixel. The TODO at the call site acknowledges this. For large images this is significantly slower than a separable or sliding-window approach and the repeated trait-object-free but generic NumCast calls dominate.","fix":"Hoist channel conversions, and for separable/box kernels use an incremental sliding sum, or at minimum cache the converted source rows to avoid re-fetching/re-converting neighbouring pixels for every output pixel.","locations":[{"ref":"src/imageops/sample.rs:927-953","code":"  927 |     for y in 1..height - 1 {\n  928 |         for x in 1..width - 1 {\n  929 |             let mut t = [0.0; MAX_CHANNEL];\n  930 | \n  931 |             // TODO: There is no need to recalculate the kernel for each pixel.\n  932 |             // Only a subtract and addition is needed for pixels after the first\n  933 |             // in each row.\n  934 |             for (&k, &(a, b)) in kernel.iter().zip(taps.iter()) {\n  935 |                 let x0 = x as isize + a;\n  936 |                 let y0 = y as isize + b;\n  937 | \n  938 |                 let p = image.get_pixel(x0 as u32, y0 as u32);\n  939 | \n  940 |                 for (tc, &c) in t.iter_mut().zip(p.channels()) {\n  941 |                     *tc += <f32 as NumCast>::from(c).unwrap() * k;\n  942 |                 }\n  943 |             }\n  944 | \n  945 |             let channel_avg = t\n  946 |                 .map(|ti| ti * inverse_sum)\n  947 |                 .map(|ti| NumCast::from(clamp(ti, 0.0, max)).unwrap());\n  948 | \n  949 |             let pix = *Pixel::from_slice(&channel_avg[..P::CHANNEL_COUNT as usize]);\n  950 | \n  951 |             out.put_pixel(x, y, pix);\n  952 |         }\n  953 |     }","lines":27}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`View::get_pixel` and `ViewMut::get_pixel` allocate a fixed 256-element stack array `[Zero::zero(); 256]` on every single pixel access, then copy `P::CHANNEL_COUNT` (<= 4 in practice) elements into it before constructing the pixel. For a pixel type with subpixel `u16`/`f32` this is 512/1024 bytes zero-initialized per call inside the hot `get_pixel` loop used by all generic copy/iteration paths over flat views, which is a large and avoidable cost.","fix":"Use a buffer sized to `P::CHANNEL_COUNT` via a small `MaybeUninit`/`array::from_fn` over the channel count, or read channels directly via `P::from_slice` when `channel_stride == 1` (the common, validated case for a `View`).","locations":[{"ref":"src/images/flat.rs:1643-1663","code":" 1643 |     fn get_pixel(&self, x: u32, y: u32) -> Self::Pixel {\n 1644 |         if !self.inner.in_bounds(0, x, y) {\n 1645 |             panic_pixel_out_of_bounds((x, y), self.dimensions())\n 1646 |         }\n 1647 | \n 1648 |         let image = self.inner.samples.as_ref();\n 1649 |         let base_index = self.inner.in_bounds_index(0, x, y);\n 1650 |         let channels = hitecture/ordering issue for untrusted input handling.","fix":"Defer the expensive dav1d decode until after limits are known (e.g. on first read_image / prepare_image call), or at minimum document that decode happens in `new` and is not bounded by `Limits`.","locations":[{"ref":"src/codecs/avif/decoder.rs:84-145","code":"   84 | impl<R: Read> AvifDecoder<R> {\n   85 |     /// Create a new decoder that reads its input from `r`.\n   86 |     pub fn new(mut r: R) -> ImageResult<Self> {\n   87 |         let ctx = read_avif(&mut r, ParseStrictness::Permissive).map_err(error_map)?;\n   88 |         let coded = ctx.primary_item_coded_data().unwrap_or_default();\n   89 | \n   90 |         let mut primary_decoder = dav1d::Decoder::new().map_err(error_map)?;\n   91 |         primary_decoder\n   92 |             .send_data(coded.to_vec(), None, None, None)\n   93 |             .map_err(error_map)?;\n   94 |         let picture = read_until_ready(&mut primary_decoder)?;\n   95 |         let alpha_item = ctx.alpha_item_coded_data().unwrap_or_default();\n   96 |         let alpha_picture = if !alpha_item.is_empty() {\n   97 |             let mut alpha_decoder = dav1d::Decoder::new().map_err(error_map)?;\n   98 |             alpha_decoder\n   99 |                 .send_data(alpha_item.to_vec(), None, None, None)\n  100 |                 .map_err(error_map)?;\n  101 |             Some(read_until_ready(&mut alpha_decoder)?)\n  102 |         } else {\n  103 |             None\n  104 |         };\n  105 |         let icc_profile = ctx\n  106 |             .icc_colour_information()\n  107 |             .map(|x| x.ok().unwrap_or_default())\n  108 |             .map(|x| x.to_vec());\n  109 | \n  110 |         match picture.bit_depth() {\n  111 |             8 => (),\n  112 |             10 | 12 => (),\n  113 |             _ => {\n  114 |                 return ImageResult::Err(ImageError::Decoding(DecodingError::new(\n  115 |                     ImageFormatHint::Exact(ImageFormat::Avif),\n  116 |                     format!(\n  117 |                         \"Avif format does not support {} bit depth\",\n  118 |                         picture.bit_depth()\n  119 |                     ),\n  120 |                 )))\n  121 |             }\n  122 |         };\n  123 |         let rotation = ctx.image_rotation().map_err(error_map)?;\n  124 |         // mp4parse does not expose a safe wrapper around the pointer :(\n  125 |         let mirror_ptr = ctx.image_mirror_ptr().map_err(error_map)?;\n  126 |         let mirror: Option<ImageMirror> = if mirror_ptr.is_null() {\n  127 |             None\n  128 |         } else {\n  129 |             // SAFETY: we have verified above that the pointer is non-null.\n  130 |             // We trust mp4parse to return a pointer that is not dangling.\n  131 |             // We immediately copy/move the value, so no issues with lifetimes.\n  132 |             unsafe { Some(std::ptr::read_unaligned(mirror_ptr)) }\n  133 |         };\n  134 | \n  135 |         let orientation = convert_orientation(rotation, mirror);\n  136 |         Ok(AvifDecoder {\n  137 |             inner: PhantomData,\n  138 |             picture,\n  139 |             alpha_picture,\n  140 |             icc_profile,\n  141 |             orientation,\n  142 |             limits: Limits::default(),\n  143 |         })\n  144 |     }\n  145 | }","lines":62},{"ref":"src/codecs/avif/decoder.rs:413-417","code":"  413 | impl<R: Read> ImageDecoder for AvifDecoder<R> {\n  414 |     fn set_limits(&mut self, limits: Limits) -> ImageResult<()> {\n  415 |         self.limits = limits;\n  416 |         Ok(())\n  417 |     }","lines":5}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In the limited-range branch of `ycgco444_to_rgbx_impl`, `y_coef` is recomputed (including a float division and a float-to-int cast) once per image row inside the outer row loop, even though it depends only on values fixed for the whole image. This is redundant work proportional to the image height.","fix":"Hoist the `y_coef` computation (and the `match yuv_range` decision) out of the per-row loop; compute it once before iterating rows.","locations":[{"ref":"src/codecs/avif/ycgco.rs:249-265","code":"  249 |     for (((y_src, u_src), v_src), rgb) in y_iter.zip(u_iter).zip(v_iter).zip(rgb_iter) {\n  250 |         let rgb_chunks = rgb.as_chunks_mut::<CHANNELS>().0.iter_mut();\n  251 |         match yuv_range {\n  252 |             YuvIntensityRange::Tv => {\n  253 |                 let y_coef =\n  254 |                     ((max_value as f32 / range.range_y as f32) * (1 << PRECISION) as f32) as i32;\n  255 |                 for (((y_src, u_src), v_src), rgb_dst) in\n  256 |                     y_src.iter().zip(u_src).zip(v_src).zip(rgb_chunks)\n  257 |                 {\n  258 |                     let y_value = y_src.as_() - bias_y;\n  259 |                     let cg_value = u_src.as_() - bias_uv;\n  260 |                     let co_value = v_src.as_() - bias_uv;\n  261 | \n  262 |                     ycgco_execute_limited::<V, PRECISION, CHANNELS, BIT_DEPTH>(\n  263 |                         rgb_dst, y_value, cg_value, co_value, y_coef,\n  264 |                     );\n  265 |                 }","lines":17}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"read_image always allocates a fresh f32 buffer of display_window.size.area() * channel_count inside the rgba_channels create-closure and then copy_from_slice's the entire result into the caller's unaligned_bytes. The comment at line 214 acknowledges 'this copy is strictly not necessary'. For large EXR images this doubles peak memory (full intermediate buffer plus the destination) and adds a full-image memcpy.","fix":"If/when the exr API permits, read directly into the caller-provided buffer to avoid the extra allocation and copy.","locations":[{"ref":"src/codecs/openexr.rs:180- :IoError(io::ErrorKind::UnexpectedEof.into()));\n  468 |         }\n  469 | \n  470 |         Ok(value)\n  471 |     }","lines":54}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"For RGB8/RGBA8 input the TGA encoder always allocates a full copy of the entire image buffer (`Vec::from(buf)`) just to swap the R and B channels in place, for both the RLE and the uncompressed paths. For large images this doubles peak memory usage and adds a full copy. The BGR swap could be done while streaming/chunking instead of copying the whole image up front.","fix":"Swap channels per-pixel while iterating during the write/RLE pass, or process in fixed-size chunks, instead of cloning the whole `buf` into a new `Vec` first.","locations":[{"ref":"src/codecs/tga/encoder.rs:204-217","code":"  204 |                     ExtendedColorType::Rgb8 | ExtendedColorType::Rgba8 => {\n  205 |                         let mut image = Vec::from(buf);\n  206 | \n  207 |                         for pixel in image.chunks_mut(usize::from(color_type.bits_per_pixel() / 8))\n  208 |                         {\n  209 |                             pixel.swap(0, 2);\n  210 |                         }\n  211 | \n  212 |                         self.run_length_encode(&image, color_type)?;\n  213 |                     }\n  214 |                     _ => {\n  215 |                         self.run_length_encode(buf, color_type)?;\n  216 |                     }\n  217 |                 }","lines":14},{"ref":"src/codecs/tga/encoder.rs:222-236","code":"  222 |                 match color_type {\n  223 |                     ExtendedColorType::Rgb8 | ExtendedColorType::Rgba8 => {\n  224 |                         let mut image = Vec::from(buf);\n  225 | \n  226 |                         for pixel in image.chunks_mut(usize::from(color_type.bits_per_pixel() / 8))\n  227 |                         {\n  228 |                             pixel.swap(0, 2);\n  229 |
