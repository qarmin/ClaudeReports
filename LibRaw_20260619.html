<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"OpenMP build of wavelet_denoise(): when iheight*iwidth >= 0x15550000 the malloc is skipped and fimg stays NULL, but execution still computes temp = fimg + size*3 and the parallel region dereferences fimg (image data written/read), causing a NULL-pointer dereference / crash. The non-OpenMP variant correctly returns early for large sizes (line 43); the OpenMP variant lacks the early return.","fix":"Mirror the non-OpenMP guard: if size is too large (or malloc returns NULL) return immediately before using fimg; check the malloc result.","locations":[{"ref":"src/postprocessing/postprocessing_aux.cpp:140-150","code":"  140 |   if (iwidth < 65 || iheight < 65)\n  141 |     return;\n  142 | \n  143 |   while (maximum << scale < 0x10000)\n  144 |     scale++;\n  145 |   maximum <<= --scale;\n  146 |   black <<= scale;\n  147 |   FORC4 cblack[c] <<= scale;\n  148 |   if ((size = iheight * iwidth) < 0x15550000)\n  149 |     fimg = (float *)malloc((size * 3 + iheight + iwidth) * sizeof *fimg);\n  150 |   temp = fimg + size * 3;","lines":11}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"kodak_thumb_loader() allocates t_hist (calloc) and t_curve (calloc) and imgdata.image; if any function called between those allocations and their frees throws (e.g. gamma_curve, flip_index path, or calloc returning NULL leading to deref), t_hist/t_curve are leaked because they are freed only on the straight-line success path (no try/catch around lines 134-235). The earlier load_raw is wrapped in try/catch but the color-conversion / histogram section is not.","fix":"Wrap the post-load section in try/catch (or use RAII) to free t_hist/t_curve/imgdata.image on exception, and check calloc results for NULL.","locations":[{"ref":"src/utils/thumb_utils.cpp:134-235","code":"  134 |   int(*t_hist)[LIBRAW_HISTOGRAM_SIZE] =\n  135 |       (int(*)[LIBRAW_HISTOGRAM_SIZE])calloc(sizeof(*t_hist), 4);\n  136 | \n  137 |   if (imgdata.idata.maker_index == LIBRAW_CAMERAMAKER_Canon) // Skip color conversion for canon PPM tiffs\n  138 |   {\n  139 |     for (img = imgdata.image[0], row = 0; row < S.height; row++)\n  140 |       for (col = 0; col < S.width; col++, img += 4)\n  141 |         for (int c = 0; c < P1.colors; c++)\n  142 |           t_hist[c][img[c] >> 3]++;\n  143 |   }\n  144 |   else\n  145 |   {\n  146 |     float out[3], out_cam[3][4] = {{2.81761312f, -1.98369181f, 0.166078627f, 0},\n  147 |                                    {-0.111855984f, 1.73688626f, -0.625030339f, 0},\n  148 |                                    {-0.0379119813f, -0.891268849f, 1.92918086f, 0}};\n  149 |     \n  150 | \tfor (img = imgdata.image[0], row = 0; row < S.height; row++)\n  151 |       for (col = 0; col < S.width; col++, img += 4)\n  152 |       {\n  153 |         out[0] = out[1] = out[2] = 0;\n  154 |         int c;\n  155 |         for (c = 0; c < 3; c++)\n  156 |         {\n  157 |           out[0] += out_cam[0][c] * img[c];\n  158 |           out[1] += out_cam[1][c] * img[c];\n  159 |           out[2] += out_cam[2][c] * img[c];\n  160 |         }\n  161 |         for (c = 0; c < 3; c++)\n  162 |           img[c] = CLIP((int)out[c]);\n  163 |         for (c = 0; c < P1.colors; c++)\n  164 |           t_hist[c][img[c] >> 3]++;\n  165 |       }\n  166 |   }\n  167 | \n  168 |   // from gamma_lut\n  169 |   int(*save_hist)[LIBRAW_HISTOGRAM_SIZE] =\n  170 |       libraw_internal_data.output_data.histogram;\n  171 |   libraw_internal_data.output_data.histogram = t_hist;\n  172 | \n  173 |   // make curve output curve!\n  174 |   ushort *t_curve = (ushort *)calloc(sizeof(C.curve), 1);\n  175 |   memmove(t_curve, C.curve, sizeof(C.curve));\n  176 |   memset(C.curve, 0, sizeof(C.curve));\n  177 |   {\n  178 |     int perc, val, total, t_white = 0x2000, c;\n  179 | \n  180 |     perc = int(S.width * S.height * 0.01f); /* 99th percentile white level */\n  181 |     if (IO.fuji_width)\n  182 |       perc /= 2;\n  183 |     if (!((O.highlight & ~2) || O.no_auto_bright))\n  184 |       for (t_white = c = 0; c < P1.colors; c++)\n  185 |       {\n  186 |         for (val = 0x2000, total = 0; --val > 32;)\n  187 |           if ((total += libraw_internal_data.output_data.histogram[c][val]) >\n  188 |               perc)\n  189 |             break;\n  190 |         if (t_white < val)\n  191 |           t_white = val;\n  192 |       }\n  193 |     gamma_curve(O.gamm[0], O.gamm[1], 2, int((t_white << 3) / O.bright));\n  194 |   }\n  195 | \n  196 |   libraw_internal_data.output_data.histogram = save_hist;\n  197 |   free(t_hist);\n  198 | \n  199 |   // from write_ppm_tiff - copy pixels into bitmap\n  200 | \n  201 |   int s_flip = imgdata.sizes.flip;\n  202 |   if (imgdata.rawparams.options & LIBRAW_RAWOPTIONS_NO_ROTATE_FOR_KODAK_THUMBNAILS)\n  203 |     imgdata.sizes.flip = 0;\n  204 | \n  205 |   S.iheight = S.height;\n  206 |   S.iwidth = S.width;\n  207 |   if (S.flip & 4)\n  208 |     SWAP(S.height, S.width);\n  209 | \n  210 |   if (T.thumb)\n  211 |     free(T.thumb);\n  212 |   T.thumb = (char *)calloc(S.width * S.height, P1.colors);\n  213 |   T.tlength = S.width * S.height * P1.colors;\n  214 | \n  215 |   // from write_tiff_ppm\n  216 |   {\n  217 |     int soff = flip_index(0, 0);\n  218 |     int cstep = flip_index(0, 1) - soff;\n  219 |     int rstep = flip_index(1, 0) - flip_index(0, S.width);\n  220 | \n  221 |     for (int rr = 0; rr < S.height; rr++, soff += rstep)\n  222 |     {\n  223 |       char *ppm = T.thumb + rr * S.width * P1.colors;\n  224 |       for (int cc = 0; cc < S.width; cc++, soff += cstep)\n  225 |         for (int c = 0; c < P1.colors; c++)\n  226 |           ppm[cc * P1.colors + c] =\n  227 |               imgdata.color.curve[imgdata.image[soff][c]] >> 8;\n  228 |     }\n  229 |   }\n  230 | \n  231 |   memmove(C.curve, t_curve, sizeof(C.curve));\n  232 |   free(t_curve);\n  233 | \n  234 |   // restore variables\n  235 |   free(imgdata.image);","lines":102}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In crxDecodeLineWithIQuantization the legacy (qStep==0) path indexes q_step_tbl[band->qParam % 6] and shifts by `6 - band->qParam/6`. band->qParam comes from the file header bits ((bitData>>19)&0xFF, range 0..255) and is further mutated by crxUpdateQparam with signed deltas, so it can be negative or large. Negative qParam gives a negative q_step_tbl index (OOB read); large qParam makes the shift count negative or >=32 (UB); the qParam/6>=6 branch computes `1 << (band->qParam/6 + 26)` which overflows int and is UB.","fix":"Validate band->qParam to a bounded non-negative range after every update (crxUpdateQparam already limits kParam but not qParam) and before indexing q_step_tbl; reject corrupt values.","locations":[{"ref":"src/decoders/crx.cpp:1115-1121","code":" 1115 |     int32_t qScale = q_step_tbl[band->qParam % 6] >> (6 - band->qParam / 6);\n 1116 |     if (band->qParam / 6 >= 6)\n 1117 |       qScale = q_step_tbl[band->qParam % 6] * (1 << (band->qParam / 6 + 26));\n 1118 | \n 1119 |     if (qScale != 1)\n 1120 |       for (int32_t i = 0; i < band->width; ++i)\n 1121 |         bandBuf[i] *= qScale;","lines":7}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"crxSetupSubbandData computes compDataSize as a `long` by summing per-subband sizes (width*4) plus wavelet line-buffer sizes (8*4*width), all derived from attacker-controlled tile/subband widths, with no overflow check and no comparison against max_raw_memory_mb before malloc(compDataSize). On 32-bit `long` this can wrap; even on 64-bit a huge value is passed straight to malloc. The subband widths themselves are not validated against the tile dimensions, so band->width can be inconsistent with the later buffer use.","fix":"Accumulate sizes in a 64-bit unsigned type, check each addition for overflow, and compare the total against imgdata.rawparams.max_raw_memory_mb before allocating; bail out on overflow or oversize.","locations":[{"ref":"src/decoders/crx.cpp:1785-1810","code":" 1785 |   for (int32_t subbandNum = 0; subbandNum < toSubbands; subbandNum++)\n 1786 |   {\n 1787 |     subbands[subbandNum].bandSize = subbands[subbandNum].width * sizeof(int32_t); // 4bytes\n 1788 |     compDataSize += subbands[subbandNum].bandSize;\n 1789 |   }\n 1790 | \n 1791 |   if (img->levels)\n 1792 |   {\n 1793 |     int32_t encLevels = img->levels ? img->levels : 1;\n 1794 |     waveletDataOffset = (compDataSize + 7) & ~7;\n 1795 |     compDataSize = (sizeof(CrxWaveletTransform) * encLevels + waveletDataOffset + 7) & ~7;\n 1796 |     compCoeffDataOffset = compDataSize;\n 1797 | \n 1798 |     // calc wavelet line buffer sizes (always at one level up from current)\n 1799 |     for (int level = 0; level < img->levels; ++level)\n 1800 |       if (level < img->levels - 1)\n 1801 |         compDataSize += 8 * sizeof(int32_t) * planeComp->subBands[3 * (level + 1) + 2].width;\n 1802 |       else\n 1803 |         compDataSize += 8 * sizeof(int32_t) * tile->width;\n 1804 |   }\n 1805 |     // buffer allocation\n 1806 |     planeComp->compBuf = (uint8_t *)\n 1807 | #ifdef LIBRAW_CR3_MEMPOOL\n 1808 |                              img->memmgr.\n 1809 | #endif\n 1810 |                          malloc(compDataSize);","lines":26}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"q_step_tbl is declared with 6 initialised entries and indexed with `quantVal % 6` / `*qpTable % 6` where the values originate from QP data decoded from the untrusted bitstream (crxDecodeGolombTop/Normal add signed deltas, then +4). In C++ the % operator keeps the sign of the dividend, so a negative quantVal yields a negative index into q_step_tbl -> out-of-bounds read. The same code also does `>> (6 - quantVal/6)`; for negative or large quantVal the shift amount can be negative or >=32, which is undefined behaviour.","fix":"Clamp/validate quantVal and *qpTable to a sane non-negative range (e.g. 0..N) before using them as an index and shift amount; reject the file if out of range. Compute the modulo with an explicitly non-negative value.","locations":[{"ref":"src/decoders/crx.cpp:2032-2038","code":" 2032 |         int32_t quantVal = qpTable[row0Idx++] + qpTable[row1Idx++] + qpTable[row2Idx++] + qpTable[row3Idx++];\n 2033 |         // not sure about this nonsense - why is it not just avg like with 2 levels?\n 2034 |         quantVal = ((quantVal < 0) * 3 + quantVal) >> 2;\n 2035 |         if (quantVal / 6 >= 6)\n 2036 |           *qStepTbl = q_step_tbl[quantVal % 6] << ((quantVal / 6 - 6 ) & 0x1f);\n 2037 |         else\n 2038 |           *qStepTbl = q_step_tbl[quantVal % 6] >> (6 - quantVal / 6);","lines":7},{"ref":"src/decoders/crx.cpp:2054-2058","code":" 2054 |         int32_t quantVal = (qpTable[row0Idx++] + qpTable[row1Idx++]) / 2;\n 2055 |         if (quantVal / 6 >= 6)\n 2056 |           *qStepTbl = q_step_tbl[quantVal % 6] << ((quantVal / 6 - 6) & 0x1f);\n 2057 |         else\n 2058 |           *qStepTbl = q_step_tbl[quantVal % 6] >> (6 - quantVal / 6);","lines":5},{"ref":"src/decoders/crx.cpp:2068-2072","code":" 2068 |       for (int qpCol = 0; qpCol < qpWidth; ++qpCol, ++qStepTbl, ++qpTable)\n 2069 |         if (*qpTable / 6 >= 6)\n 2070 |           *qStepTbl = q_step_tbl[*qpTable % 6] << ((*qpTable / 6 - 6) & 0x1f);\n 2071 |         else\n 2072 |           *qStepTbl = q_step_tbl[*qpTable % 6] >> (6 - *qpTable / 6);","lines":5}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Heap OOB write in kodak_thumb_load_raw(): colors is set from `thumb_misc >> 5`, which equals the TIFF SamplesPerPixel value (masked only to 0..7 in tiff.cpp:634). It then does read_shorts(image[row*width+col], colors) into image slots that are ushort[4]. A crafted TIFF/DNG thumbnail IFD with SamplesPerPixel in {5,6,7} (compression=1, bps>8, non-Imacon) routes to LIBRAW_INTERNAL_THUMBNAIL_KODAK_THUMB and writes 5-7 shorts into a 4-short slot, overflowing the heap image buffer by up to 6 bytes per pixel.","fix":"Clamp/validate colors to 1..4 (e.g. `colors = LIM(thumb_misc >> 5, 1, 4);`) before the read loop, or reject thumbnails with samples>4 in kodak_thumb_loader().","locations":[{"ref":"src/decoders/kodak_decoders.cpp:516-526","code":"  516 | void LibRaw::kodak_thumb_load_raw()\n  517 | {\n  518 |   if (!image)\n  519 |     throw LIBRAW_EXCEPTION_IO_CORRUPT;\n  520 |   int row, col;\n  521 |   colors = thumb_misc >> 5;\n  522 |   for (row = 0; row < height; row++)\n  523 |     for (col = 0; col < width; col++)\n  524 |       read_shorts(image[row * width + col], colors);\n  525 |   maximum = (1 << (thumb_misc & 31)) - 1;\n  526 | }","lines":11}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"DHT allocation size computed with int arithmetic. nr_height and nr_width are int (iheight/iwidth + 8). The size expression nr_height * nr_width * sizeof(float3) at line 220 (and nr_height * nr_width at line 222, and the loop bound nr_height * nr_width at line 227) is evaluated as int * int before being widened to size_t. For large dimensions (product exceeding INT_MAX) this overflows to a small or negative value, leading to an undersized buffer while the subsequent fill loop and all nr_offset() accesses assume the full size -> heap buffer overflow. nr_offset() (line 58-61) likewise computes row*nr_width+col as int.","fix":"Use size_t for nr_height*nr_width products (e.g. (size_t)nr_height * nr_width * sizeof(float3)) and validate dimensions against a sane maximum before allocating.","locations":[{"ref":"src/demosaic/dht_demosaic.cpp:216-228","code":"  216 | DHT::DHT(LibRaw &_libraw) : libraw(_libraw)\n  217 | {\n  218 |   nr_height = libraw.imgdata.sizes.iheight + nr_topmargin * 2;\n  219 |   nr_width = libraw.imgdata.sizes.iwidth + nr_leftmargin * 2;\n  220 |   nraw = (float3 *)malloc(nr_height * nr_width * sizeof(float3));\n  221 |   int iwidth = libraw.imgdata.sizes.iwidth;\n  222 |   ndir = (char *)calloc(nr_height * nr_width, 1);\n  223 |   channel_maximum[0] = channel_maximum[1] = channel_maximum[2] = 0;\n  224 |   channel_minimum[0] = libraw.imgdata.image[0][0];\n  225 |   channel_minimum[1] = libraw.imgdata.image[0][1];\n  226 |   channel_minimum[2] = libraw.imgdata.image[0][2];\n  227 |   for (int i = 0; i < nr_height * nr_width; ++i)\n  228 |     nraw[i][0] = nraw[i][1] = nraw[i][2] = 0.5;","lines":13},{"ref":"src/demosaic/dht_demosaic.cpp:58-61","code":"   58 |   inline int nr_offset(int row, int col) throw()\n   59 |   {\n   60 |     return (row * nr_width + col);\n   61 |   }","lines":4}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"LibRaw_buffer_datastream::scanf_one() guards only with `if (streampos > streamsize) return 0;` and then calls sscanf((char*)(buf + streampos), fmt, val). When streampos == streamsize the pointer is one past the end of the caller-supplied buffer, and sscanf reads forward until it finds a digit/terminator, causing an out-of-bounds read past the buffer. There is also no guarantee the buffer is NUL-terminated (it is an external user buffer for open_buffer), so even for streampos < streamsize sscanf can run off the end. The buffer is attacker-controlled via open_buffer().","fix":"Reject when streampos >= streamsize, and bound the scan to a NUL-terminated temporary copy of at most a few dozen bytes (as the loop already assumes <=24) rather than calling sscanf directly on the raw buffer.","locations":[{"ref":"src/libraw_datastream.cpp:417-440","code":"  417 | int LibRaw_buffer_datastream::scanf_one(const char *fmt, void *val)\n  418 | {\n  419 |   int scanf_res;\n  420 |   if (streampos > streamsize)\n  421 |     return 0;\n  422 | #ifndef WIN32SECURECALLS\n  423 |   scanf_res = sscanf((char *)(buf + streampos), fmt, val);\n  424 | #else\n  425 |   scanf_res = sscanf_s((char *)(buf + streampos), fmt, val);\n  426 | #endif\n  427 |   if (scanf_res > 0)\n  428 |   {\n  429 |     int xcnt = 0;\n  430 |     while (streampos < streamsize-1)\n  431 |     {\n  432 |       streampos++;\n  433 |       xcnt++;\n  434 |       if (buf[streampos] == 0 || buf[streampos] == ' ' ||\n  435 |           buf[streampos] == '\\t' || buf[streampos] == '\\n' || xcnt > 24)\n  436 |         break;\n  437 |     }\n  438 |   }\n  439 |   return scanf_res;\n  440 | }","lines":24}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Canon CameraOrientation fallback scan: `for (i = 2; (sget2(CameraInfo+i) != 0xbbbb) && i < (int)maxlen; i++)`. The `&&` short-circuits left-to-right, so sget2(CameraInfo+i) is evaluated BEFORE the `i < maxlen` test. When i == maxlen-1 the 2-byte sget2 reads CameraInfo[maxlen-1] and CameraInfo[maxlen], i.e. 1 byte past the end of the CameraInfo buffer. Untrusted maxlen comes from the tag length.","fix":"Swap the condition order so the bound is checked first: `for (i = 2; i + 1 < (int)maxlen && sget2(CameraInfo+i) != 0xbbbb; i++)`.","locations":[{"ref":"src/metadata/canon.cpp:508","code":"  508 |     for (i = 2; (sget2(CameraInfo+i) != 0xbbbb) && i < (int)maxlen; i++);","lines":1}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Canon CameraOrientation inner loop: `while (i < int(maxlen - 5)) if ((sget4(CameraInfo+i) == 257) && ((c = CameraInfo[i+8]) < 3))`. The guard only ensures i < maxlen-5, but the body reads CameraInfo[i+8]. With i as large as maxlen-6, i+8 == maxlen+2, reading up to 3 bytes past the end of CameraInfo. Out-of-bounds read driven by untrusted tag length/content.","fix":"Tighten the loop bound to guarantee the i+8 access stays in range, e.g. `while (i + 8 < (int)maxlen)`.","locations":[{"ref":"src/metadata/canon.cpp:510-514","code":"  510 |     while (i < int(maxlen - 5))\n  511 |       if ((sget4(CameraInfo+i) == 257) && ((c = CameraInfo[i+8]) < 3)) {\n  512 |         imCanon.MakernotesFlip = \"065\"[c] - '0';\n  513 |         break;\n  514 |       } else i+=4;","lines":5}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"selectCRXFrame() reads hdr->stsc_data[stsc_index] and hdr->stsc_data[stsc_index+1] without verifying stsc_index < stsc_count. The while loop `while((stsc_index < hdr->stsc_count) && (i+1 == hdr->stsc_data[stsc_index+1].first))` accesses stsc_data[stsc_index+1] which is OOB when stsc_index+1 == stsc_count. Worse, after the loop, `hdr->stsc_data[stsc_index].count` is dereferenced; if stsc_count is 0 (no stsc atom parsed) stsc_data is NULL, causing a NULL+offset read / crash. chunk_count, sample_count and stsc_count are independently attacker-controlled from separate atoms.","fix":"Guard stsc_data != NULL and stsc_count > 0 before the loop; ensure (stsc_index+1) < stsc_count before reading stsc_data[stsc_index+1]; bound stsc_index < stsc_count before reading stsc_data[stsc_index].count.","locations":[{"ref":"src/metadata/cr3_parser.cpp:42-45","code":"   42 |     while((stsc_index < hdr->stsc_count) && (i+1 == hdr->stsc_data[stsc_index+1].first))\n   43 |       stsc_index++;\n   44 | \n   45 |     for (unsigned j = 0; j < hdr->stsc_data[stsc_index].count; j++)","lines":4}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"selectCRXFrame() off-by-one out-of-bounds read of hdr->sample_sizes[]. The guard `if (current_sample > hdr->sample_count) return -1;` permits current_sample == sample_count, but sample_sizes[] was allocated with exactly sample_count (== \"entries\") elements in parseCR3 (case stsz). When the loop reaches current_sample == sample_count and sample_size is variable (hdr->sample_size == 0), `hdr->sample_sizes[current_sample]` reads one element past the end of the heap allocation. Attacker-controlled stsc/stsz tables can drive current_sample up to sample_count.","fix":"Use `if (current_sample >= hdr->sample_count) return -1;` and additionally bound-check current_sample < hdr->sample_count before indexing sample_sizes[].","locations":[{"ref":"src/metadata/cr3_parser.cpp:45-50","code":"   45 |     for (unsigned j = 0; j < hdr->stsc_data[stsc_index].count; j++)\n   46 |     {\n   47 |       if (current_sample > hdr->sample_count)\n   48 |         return -1;\n   49 | \n   50 |       sample_size = hdr->sample_size > 0 ? hdr->sample_size : hdr->sample_sizes[current_sample];","lines":6}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"process_Sony_0x9400() reads buf[0] unconditionally before any length check. The buffer is allocated with calloc(len,1) in parseSonyMakernotes (tag 0x9400) and process_Sony_0x9400 is invoked inline whenever ilm.CamID is set, with no guard on len. A crafted ARW with a zero-length (or len==0) 0x9400 tag yields calloc(0,1) and the immediate buf[0] dereference is an out-of-bounds read on a zero-size allocation. All the subsequent version branches do check len, but the very first read is unguarded.","fix":"Add a length guard at the top of process_Sony_0x9400 (e.g. `if (len < 1) return;`) before reading buf[0], mirroring the other process_Sony_* helpers.","locations":[{"ref":"src/metadata/sony.cpp:928","code":"  928 |   uchar bufx = buf[0];","lines":1},{"ref":"src/metadata/sony.cpp:1952-1962","code":" 1952 |   else if (tag == 0x9400 && len < 256000)\n 1953 |   {\n 1954 |     table_buf_0x9400 = (uchar *)calloc(len,1);\n 1955 |     table_buf_0x9400_len = len;\n 1956 |     fread(table_buf_0x9400, len, 1, ifp);\n 1957 |     if (ilm.CamID)\n 1958 |     {\n 1959 |       process_Sony_0x9400(table_buf_0x9400, table_buf_0x9400_len, unique_id);\n 1960 |       free(table_buf_0x9400);\n 1961 |       table_buf_0x9400_len = 0;\n 1962 |     }","lines":11}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"tiff_get(): integer overflow in the data-size computation `*len * tagtype_dataunit_bytes[...]`. *len is an unsigned read directly from the file via get4() (full 32-bit range) and is multiplied by a per-type unit size (up to 8). The 32-bit unsigned multiply can wrap, so a crafted large len whose product wraps to <= 4 will skip the `fseek(get4()+base)` redirection and leave the file pointer at the inline value, causing later parsers to read len elements from the wrong (small) location, or to mis-handle the tag entirely. The product should be done in 64-bit.","fix":"Compute the size as INT64: `if ((INT64)(*len) * tagtype_dataunit_bytes[idx] > 4)`; also sanity-check *len against file size.","locations":[{"ref":"src/utils/utils_dcraw.cpp:328-329","code":"  328 |   if (*len * tagtype_dataunit_bytes[(*type <= LIBRAW_EXIFTAG_TYPE_IFD8) ? *type : 0] > 4)\n  329 |     fseek(ifp, INT64(get4()) + base, SEEK_SET);","lines":2}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"LibRaw::tiff_sget() computes `*tag_dataoffset = sget4(pos) - save` and `*tag_datalen = sget4(pos)` (both unsigned), then checks `(*tag_dataoffset + *tag_datalen) > buf_len`. All operands are unsigned (INT64 tag_dataoffset, unsigned tag_datalen, unsigned buf_len). A malicious tag with sget4 < save makes tag_dataoffset a huge value (or wraps), and `tag_dataoffset + tag_datalen` can overflow/wrap so the bounds check passes while the real offset is out of range; also `*tag_datalen * (*tag_dataunitlen)` (both small ints/unsigned) can overflow. Callers then read at buf + tag_dataoffset. The checked_buffer_t::tiff_sget variant (utils_libraw.cpp:717) has the same pattern against _len.","fix":"Compute in 64-bit signed, validate sget4(pos) >= save, reject if tag_dataoffset < 0 or tag_dataoffset > buf_len or tag_datalen > buf_len or tag_dataoffset + tag_datalen > buf_len (no unsigned wrap), and check tag_datalen * tag_dataunitlen for overflow before comparing with 4.","locations":[{"ref":"src/utils/utils_libraw.cpp:592-611","code":"  592 | short LibRaw::tiff_sget (unsigned save, uchar *buf, unsigned buf_len, INT64 *tag_offset,\n  593 |                          unsigned *tag_id, unsigned *tag_type, INT64 *tag_dataoffset,\n  594 |                          unsigned *tag_datalen, int *tag_dataunitlen) {\n  595 |   uchar *pos = buf + *tag_offset;\n  596 |   if ((((*tag_offset) + 12) > buf_len) || (*tag_offset < 0)) { // abnormal, tag buffer overrun\n  597 |     return -1;\n  598 |   }\n  599 |   *tag_id      = sget2(pos); pos += 2;\n  600 |   *tag_type    = sget2(pos); pos += 2;\n  601 |   *tag_datalen = sget4(pos); pos += 4;\n  602 |   *tag_dataunitlen = tagtype_dataunit_bytes[(*tag_type <= LIBRAW_EXIFTAG_TYPE_IFD8) ? *tag_type : 0];\n  603 |   if ((*tag_datalen * (*tag_dataunitlen)) > 4) {\n  604 |     *tag_dataoffset = sget4(pos) - save;\n  605 |     if ((*tag_dataoffset + *tag_datalen) > buf_len) { // abnormal, tag data buffer overrun\n  606 |       return -2;\n  607 |     }\n  608 |   } else *tag_dataoffset = *tag_offset + 8;\n  609 |   *tag_offset += 12;\n  610 |   return 0;\n  611 | }","lines":20},{"ref":"src/utils/utils_libraw.cpp:717-744","code":"  717 | int checked_buffer_t::tiff_sget(unsigned save, INT64 *tag_offset, unsigned *tag_id, unsigned *tag_type, INT64 *tag_dataoffset,\n  718 |               unsigned *tag_datalen, int *tag_dataunitlen)\n  719 | {\n  720 |   if ((((*tag_offset) + 12) > _len) || (*tag_offset < 0))\n  721 |   { // abnormal, tag buffer overrun\n  722 |     return -1;\n  723 |   }\n  724 |   int pos = int(*tag_offset);\n  725 |   *tag_id = sget2(pos);\n  726 |   pos += 2;\n  727 |   *tag_type = sget2(pos);\n  728 |   pos += 2;\n  729 |   *tag_datalen = sget4(pos);\n  730 |   pos += 4;\n  731 |   *tag_dataunitlen = libraw_tagtype_dataunit_bytes(*tag_type);\n  732 |   if ((*tag_datalen * (*tag_dataunitlen)) > 4)\n  733 |   {\n  734 |     *tag_dataoffset = sget4(pos) - save;\n  735 |     if ((*tag_dataoffset + *tag_datalen) > _len)\n  736 |     { // abnormal, tag data buffer overrun\n  737 |       return -2;\n  738 |     }\n  739 |   }\n  740 |   else\n  741 |     *tag_dataoffset = *tag_offset + 8;\n  742 |   *tag_offset += 12;\n  743 |   return 0;\n  744 | }","lines":28}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"x3f_load_raw computes datasize = S.raw_height * S.raw_width * 3 * sizeof(unsigned short) where raw_height/raw_width are ints (from ID->rows/columns, up to 65535 each). The multiply 'S.raw_height * S.raw_width * 3' is performed in int and can overflow before promotion to size_t, yielding a small datasize; malloc(datasize) then under-allocates and the subsequent memmove(raw_alloc, data, datasize) plus the Quattro/Polaroid copy loops (indexed up to raw_height*raw_width) write/read past the buffer. The source buffers (x3rgb16) were sized in 64-bit so the mismatch is exploitable.","fix":"Compute datasize in size_t/INT64 (cast operands), and validate raw_width*raw_height*3*2 against a sane limit before malloc.","locations":[{"ref":"src/x3f/x3f_parse_process.cpp:621-641","code":"  621 |     size_t datasize = S.raw_height * S.raw_width * 3 * sizeof(unsigned short);\n  622 |     S.raw_pitch = S.raw_width * 3 * sizeof(unsigned short);\n  623 |     if (!(imgdata.rawdata.raw_alloc = malloc(datasize)))\n  624 |       throw LIBRAW_EXCEPTION_ALLOC;\n  625 | \n  626 |     imgdata.rawdata.color3_image = (ushort(*)[3])imgdata.rawdata.raw_alloc;\n  627 |     // swap R/B channels for known old cameras\n  628 |     if (!strcasecmp(P1.make, \"Polaroid\") && !strcasecmp(P1.model, \"x530\"))\n  629 |     {\n  630 |       ushort(*src)[3] = (ushort(*)[3])data;\n  631 |       for (int p = 0; p < S.raw_height * S.raw_width; p++)\n  632 |       {\n  633 |         imgdata.rawdata.color3_image[p][0] = src[p][2];\n  634 |         imgdata.rawdata.color3_image[p][1] = src[p][1];\n  635 |         imgdata.rawdata.color3_image[p][2] = src[p][0];\n  636 |       }\n  637 |     }\n  638 |     else if (HUF)\n  639 |       memmove(imgdata.rawdata.raw_alloc, data, datasize);\n  640 |     else if (TRU && (!Q || !Q->quattro_layout))\n  641 |       memmove(imgdata.rawdata.raw_alloc, data, datasize);","lines":21}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"x3f_limited_calloc computes the product n*sz in 64-bit BEFORE comparing against the limit, but the multiplication itself can overflow UINT64 (or, more practically, the two file-derived 32-bit values multiply to a value that wraps under the limit while the actual calloc still allocates a small/garbage amount). The check 'sz * n > LIMIT' is performed on the wrapped product, so a crafted (n, sz) pair can pass the limit check yet calloc may either fail to allocate the intended size or, if calloc itself overflows, return a tiny buffer that callers then write past. The limit check must be done on the operands, not on their (overflow-prone) product.","fix":"Check each operand and the product safely, e.g. if (n != 0 && sz > LIMIT_BYTES / n) throw TOOBIG; before multiplying. Or compute the product in a checked manner and compare against the byte limit.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:63-71","code":"   63 | static void *x3f_limited_calloc(UINT64 n, UINT64 sz)\n   64 | {\n   65 |   if (sz * n > LIBRAW_X3F_ALLOC_LIMIT_MB * 1024ULL * 1024ULL)\n   66 |     throw LIBRAW_EXCEPTION_TOOBIG;\n   67 |   void *ret = calloc(n, sz);\n   68 |   if (!ret)\n   69 |     throw LIBRAW_EXCEPTION_ALLOC;\n   70 |   return ret;\n   71 | }","lines":9}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In x3f_load_true the TRUE plane base pointers are computed cumulatively from file-supplied plane_size values: plane_address[i] = plane_address[i-1] + roundup16(plane_size[i-1]). These are never bounds-checked against ID->data + ID->data_size. true_decode_one_color then calls set_bit_state on plane_address[color] and the huffman bit reader walks memory from there with no end pointer, so crafted plane sizes (or an undersized data block) make the decoder read arbitrarily far past the heap buffer.","fix":"Validate that each plane_address[i] and the maximum bytes the decoder can consume per plane stay within [ID->data, ID->data + ID->data_size]; pass an end pointer into the bit reader and treat overruns as corrupt.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:1391-1394","code":" 1391 |   TRU->plane_address[0] = (uint8_t *)ID->data;\n 1392 |   for (i = 1; i < TRUE_PLANES; i++)\n 1393 |     TRU->plane_address[i] = TRU->plane_address[i - 1] +\n 1394 |                             (((TRU->plane_size.element[i - 1] + 15) / 16) * 16);","lines":4},{"ref":"src/x3f/x3f_utils_patched.cpp:980-1033","code":"  980 |   set_bit_state(&BS, TRU->plane_address[color]);\n  981 | \n  982 |   row_start_acc[0][0] = seed;\n  983 |   row_start_acc[0][1] = seed;\n  984 |   row_start_acc[1][0] = seed;\n  985 |   row_start_acc[1][1] = seed;\n  986 | \n  987 |   if (ID->type_format == X3F_IMAGE_RAW_QUATTRO ||\n  988 |       ID->type_format == X3F_IMAGE_RAW_SDQ ||\n  989 |       ID->type_format == X3F_IMAGE_RAW_SDQH ||\n  990 |       ID->type_format == X3F_IMAGE_RAW_SDQH2)\n  991 |   {\n  992 |     rows = Q->plane[color].rows;\n  993 |     cols = Q->plane[color].columns;\n  994 | \n  995 |     if (Q->quattro_layout && color == 2)\n  996 |     {\n  997 |       area = &Q->top16;\n  998 |       dst = area->data;\n  999 |     }\n 1000 |   }\n 1001 |   else\n 1002 |   {\n 1003 |   }\n 1004 | \n 1005 |   if (rows != area->rows || cols < area->columns)\n 1006 |     throw LIBRAW_EXCEPTION_IO_CORRUPT;\n 1007 | \n 1008 |   for (row = 0; row < (int)rows; row++)\n 1009 |   {\n 1010 |     int col;\n 1011 |     bool_t odd_row = row & 1;\n 1012 |     int32_t acc[2];\n 1013 | \n 1014 |     for (col = 0; col < (int)cols; col++)\n 1015 |     {\n 1016 |       bool_t odd_col = col & 1;\n 1017 |       int32_t diff = get_true_diff(&BS, tree);\n 1018 |       int32_t prev = col < 2 ? row_start_acc[odd_row][odd_col] : acc[odd_col];\n 1019 |       int32_t value = prev + diff;\n 1020 | \n 1021 |       acc[odd_col] = value;\n 1022 |       if (col < 2)\n 1023 |         row_start_acc[odd_row][odd_col] = value;\n 1024 | \n 1025 |       /* Discard additional data at the right for binned Quattro plane 2 */\n 1026 |       if (col >= (int)area->columns)\n 1027 |         continue;\n 1028 | \n 1029 |       *dst = value;\n 1030 |       dst += area->channels;\n 1031 |     }\n 1032 |   }\n 1033 | }","lines":54}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"x3f_load_camf_decode_type4 and type5 build the huffman element table by walking CAMF->data with 'for (p = CAMF->data; *p != 0; ...) { code_size = *p++; code = *p++; }'. There is no bound tying the scan to CAMF->data_size, so a CAMF data block that contains no zero byte (or whose terminating zero lies after the buffer) walks past the end of the allocated buffer, reading two bytes per iteration out of bounds and reallocating an ever-growing element array until it crashes or hits the alloc limit.","fix":"Pass data_size in and stop the loop when p reaches CAMF->data + CAMF->data_size; throw LIBRAW_EXCEPTION_IO_CORRUPT if no terminator is found within bounds.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:1752-1760" nt8_t *)CAMF->data + CAMF_T4_DATA_OFFSET;","lines":5},{"ref":"src/x3f/x3f_utils_patched.cpp:1831-1835","code":" 1831 | #define CAMF_T5_DATA_SIZE_OFFSET 28\n 1832 | #define CAMF_T5_DATA_OFFSET 32\n 1833 |   CAMF->decoding_size =\n 1834 |       *(uint32_t *)((uint8_t *)CAMF->data + CAMF_T5_DATA_SIZE_OFFSET);\n 1835 |   CAMF->decoding_start = (uint8_t *)CAMF->data + CAMF_T5_DATA_OFFSET;","lines":5}]},{"id":"OVF_19","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"x3f_setup_camf_text_entry reads text_size = *(uint32*)value_address and sets text = value_address+4 with no check that 4+text_size lies within the entry/decoded_data. Consumers using text_size then read out of bounds. value_address itself (p + value_offset) is also not validated to be inside decoded_data.","fix":"Verify value_offset+4 <= entry_size and value_offset+4+text_size <= entry_size (and value_address within decoded_data) before exposing text/text_size.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:1849-1853","code":" 1849 | static void x3f_setup_camf_text_entry(camf_entry_t *entry)\n 1850 | {\n 1851 |   entry->text_size = *(uint32_t *)entry->value_address;\n 1852 |   entry->text = (char *)entry->value_address + 4;\n 1853 | }","lines":5}]},{"id":"OVF_20","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"x3f_setup_camf_property_entry reads num and off from the value buffer (num = *(uint32*)v, off = *(uint32*)(v+4)) and then loops i<num reading two uint32 at v+8+8*i, writing property_name[i]/property_value[i] from e+name_off/e+value_off. num is fully attacker-controlled and unbounded; the calloc 'num * sizeof(uint8_t*)' can integer-overflow (num*8 wraps on 32-bit size computation) yielding a small allocation followed by num out-of-bounds writes, and the loop reads v+8+8*i past the value buffer. name_off/value_off are also unchecked, producing wild pointers stored in the table.","fix":"Validate that 8 + 8*num <= value_size before the loop; use the limited calloc with separate (num, sizeof) args so its own overflow check applies; bound name_off/value_off against the entry size.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:1855-1874","code":" 1855 | static void x3f_setup_camf_property_entry(camf_entry_t *entry)\n 1856 | {\n 1857 |   int i;\n 1858 |   uint8_t *e = (uint8_t *)entry->entry;\n 1859 |   uint8_t *v = (uint8_t *)entry->value_address;\n 1860 |   uint32_t num = entry->property_num = *(uint32_t *)v;\n 1861 |   uint32_t off = *(uint32_t *)(v + 4);\n 1862 | \n 1863 |   entry->property_name = (char **)x3f_limited_calloc(num * sizeof(uint8_t *), 1);\n 1864 |   entry->property_value = (uint8_t **)x3f_limited_calloc(num * sizeof(uint8_t *), 1);\n 1865 | \n 1866 |   for (i = 0; i < (int)num; i++)\n 1867 |   {\n 1868 |     uint32_t name_off = off + *(uint32_t *)(v + 8 + 8 * i);\n 1869 |     uint32_t value_off = off + *(uint32_t *)(v + 8 + 8 * i + 4);\n 1870 | \n 1871 |     entry->property_name[i] = (char *)(e + name_off);\n 1872 |     entry->property_value[i] = e + value_off;\n 1873 |   }\n 1874 | }","lines":20}]},{"id":"OVF_21","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"x3f_setup_camf_matrix_entry reads dim from the entry and loops i<dim reading 12 bytes each at v+12+12*i without verifying these stay within the entry/value buffer. dim is attacker-controlled (uint32 from decoded data), so large dim reads far OOB. Additionally totalsize is accumulated as a signed int via 'totalsize *= size' with size unchecked, overflowing to a small or zero value; matrix_estimated_element_size = matrix_used_space / totalsize then divides by zero, and get_matrix_copy allocates size = sizeof(...) * elements (elements = totalsize) which can be a tiny buffer while memcpy/loops copy matrix_data of the real (large) extent -> heap overflow / OOB read of matrix_data.","fix":"Bound dim so that 12+12*dim 62 |       break;\n 1963 |     case M_UINT:\n 1964 |       for (i = 0; i < (int)elements; i++)\n 1965 |         ((uint32_t *)entry->matrix_decoded)[i] =\n 1966 |             (uint32_t)((uint8_t *)entry->matrix_data)[i];\n 1967 |       break;\n 1968 |     default:\n 1969 |       throw LIBRAW_EXCEPTION_IO_CORRUPT;\n 1970 |     }\n 1971 |     break;\n 1972 |   default:\n 1973 |     throw LIBRAW_EXCEPTION_IO_CORRUPT;\n 1974 |   }\n 1975 | }","lines":66}]},{"id":"OVF_22","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"x3f_setup_camf_entries iterates entries from decoded_data but trusts entry_size and the name/value offsets entirely. entry[i].entry_size is read from the buffer and 'p += entry[i].entry_size' advances the cursor; a zero entry_size makes p never advance (infinite loop / unbounded realloc) and a huge or unaligned entry_size lets the per-type setup functions (property/text/matrix) read far past 'end'. There is no validation that entry header (5 uint32 = 20 bytes) fits before reading *p4++ five times, nor that entry+entry_size stays within decoded_data_size.","fix":"Before reading the 5-word header verify (end - p) >= 20. Validate entry_size >= 20 and p + entry_size <= end. Validate name_offset <= value_offset <= entry_size. Reject (throw) on violation instead of continuing.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:2017-2084","code":" 2017 | static void x3f_setup_camf_entries(x3f_camf_t *CAMF)\n 2018 | {\n 2019 |   uint8_t *p = (uint8_t *)CAMF->decoded_data;\n 2020 |   uint8_t *end = p + CAMF->decoded_data_size;\n 2021 |   camf_entry_t *entry = NULL;\n 2022 |   int i;\n 2023 | \n 2024 |   for (i = 0; p < end; i++)\n 2025 |   {\n 2026 |     uint32_t *p4 = (uint32_t *)p;\n 2027 | \n 2028 |     switch (*p4)\n 2029 |     {\n 2030 |     case X3F_CMbP:\n 2031 |     case X3F_CMbT:\n 2032 |     case X3F_CMbM:\n 2033 |       break;\n 2034 |     default:\n 2035 |       goto stop;\n 2036 |     }\n 2037 y":false,"description":"decode_S_type drives an iiq_bitstream_t over (uint32_t*)datavec.data(); iiq_bitstream_t::fill() does '*input++' with no upper bound. The number of bytes actually read into datavec (readsz) can be smaller than the buffer and far smaller than the bits the decoder consumes for out_width pixels on corrupt input, so fill() can read 4-byte words past the valid/allocated region of datavec. There is no per-read bounds check tying consumption to readsz.","fix":"Track an end pointer in iiq_bitstream_t (size in 32-bit words) and stop/throw when input would advance past it; size datavec to a strict upper bound and zero-pad.","locations":[{"ref":"src/decoders/decoders_libraw.cpp:754-784","code":"  754 | \tvoid fill()\n  755 |     {\n  756 |       if (used <= 32)\n  757 |       {\n  758 |         uint64_t bitpump_next = *input++;\n  759 |         curr = (curr << 32) | bitpump_next;\n  760 |         used += 32;\n  761 |       }\n  762 |     }\n  763 |     uint64_t peek(uint8_t len)\n  764 |     {\n  765 |       if (len >= used)\n  766 |         fill();\n  767 | \n  768 | \t  uint64_t res = curr >> (used - len);\n  769 |       return res & ((1 << (uint8_t)len) - 1);\n  770 |     }\n  771 | \n  772 |     void consume(uint8_t len)\n  773 |     {\n  774 |       peek(len); // fill buffer if needed\n  775 |       used -= len;\n  776 |     }\n  777 | \n  778 |     uint64_t get(char len)\n  779 |     {\n  780 |       uint64_t val = peek(len);\n  781 |       consume(len);\n  782 |       return val;\n  783 |     }\n  784 | ","lines":31},{"ref":"src/decoders/decoders_libraw.cpp:909-924","code":"  909 | \tINT64 maxsz = imgdata.sizes.raw_width * 3 + 2; // theor max: 17 bytes per 8 pix + row header\n  910 | \tstd::vector<uint8_t> datavec(maxsz);\n  911 | \n  912 | \tfor (unsigned row = 0; row < imgdata.sizes.raw_height; row++)\n  913 | \t{\n  914 | \t\tif (stripes[row].row >= imgdata.sizes.raw_height) continue; \n  915 | \t\tushort *datap = imgdata.rawdata.raw_image + st w_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"CR3 0xf00c Fuji RAFData WB parsing indexes rafdata[] with offsets computed from file data without a tight upper bound. `for (...; ofst += 3) { icWBC[...]=rafdata[ofst]; rafdata[ofst+1]; rafdata[ofst+2]; }` only checks the loop counter wb_ind < Fuji_wb_list1.size(), not that ofst+2 stays within lenRAFData. rafdata is allocated with lenRAFData+1 ushorts; ofst starts at fi-15 (fi found by matching), so a crafted RAFData can make ofst+2 exceed the buffer, an OOB read.","fix":"Bound every rafdata access: require ofst+2 < lenRAFData inside the wb_ind loop (as is partially done for the CCT loop at lines 1238-1239).","locations":[{"ref":"src/metadata/tiff.cpp:1213-1223","code":" 1213 | \t\t\t\tif (fi >= 15)\n 1214 | \t\t\t\t{\n 1215 | \t\t\t\t\tfor (int wb_ind = 0, ofst = fi - 15; wb_ind < (int)Fuji_wb_list1.size();\n 1216 | \t\t\t\t\t\twb_ind++, ofst += 3)\n 1217 | \t\t\t\t\t{\n 1218 | \t\t\t\t\t\ticWBC[Fuji_wb_list1[wb_ind]][1] =\n 1219 | \t\t\t\t\t\t\ticWBC[Fuji_wb_list1[wb_ind]][3] = rafdata[ofst];\n 1220 | \t\t\t\t\t\ticWBC[Fuji_wb_list1[wb_ind]][0] = rafdata[ofst + 1];\n 1221 | \t\t\t\t\t\ticWBC[Fuji_wb_list1[wb_ind]][2] = rafdata[ofst + 2];\n 1222 | \t\t\t\t\t}\n 1223 | \t\t\t\t}","lines":11}]},{"id":"OVF_47","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"CR3 0xf00c: rafdata Tungsten-search loop bound is off. `for (int fi = 0; fi < int(lenRAFData - 3); fi++)` then reads rafdata[fi], rafdata[fi+1], rafdata[fi+2]; the cast to int of (lenRAFData-3) is fine, but later `fi += 24; fi += 96;` jumps fi forward and the subsequent loop `for (fj = fi; fj < fi+15; fj+=3)` only guards `if (fj > lenRAFData - 3) break;` using a signed/unsigned mixed comparison (lenRAFData is unsigned; fj is int). If lenRAFData < 3 the unsigned subtraction wraps to a huge value, defeating the guard. Reachable because the outer guard at lines 1146-1147 only requires lenRAFData > 3, but the post-jump indices can exceed it.","fix":"Use signed 64-bit comparisons for all rafdata bound checks and validate fi/fj+2 < lenRAFData before each access.","locations":[{"ref":"src/metadata/tiff.cpp:1226-1245","code":" 1226 |                   fi += 24;\n 1227 |                 fi += 96;\n 1228 |                 for (fj = fi; fj < (fi + 15); fj += 3) // looking for the end of the WB table\n 1229 |                 {\n 1230 | \t\t\t\t\tif (fj > libraw_internal_data.unpacker_data.lenRAFData - 3)\n 1231 | \t\t\t\t\t\tbreak;\n 1232 |                   if (rafdata[fj] != rafdata[fi])\n 1233 |                   {\n 1234 |                     fj -= 93;\n 1235 |                     if (is34)\n 1236 |                       fj -= 9;\n 1237 | //printf (\"wb start in DNG: 0x%04x\\n\", fj*2-0x4e);\n 1238 |                     for (int iCCT = 0, ofst = fj; iCCT < 31 \n 1239 | \t\t\t\t\t\t&& ofst < libraw_internal_data.unpacker_data.lenRAFData - 3;\n 1240 |                          iCCT++, ofst += 3)\n 1241 |                     {\n 1242 |                       icWBCCTC[iCCT][0] = float(FujiCCT_K[iCCT]);\n 1243 |                       icWBCCTC[iCCT][1] = rafdata[ofst + 1];\n 1244 |                       icWBCCTC[iCCT][2] = icWBCCTC[iCCT][4] = rafdata[ofst];\n 1245 |                       icWBCCTC[iCCT][3] = rafdata[ofst + 2];","lines":20}]},{"id":"OVF_48","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"stride and ds are computed with int/unsigned arithmetic: stride = width*(bps/8)*colors; ds = height*stride. With large parsed width/height and 16-bit, multi-channel output these can overflow, so the malloc(sizeof(header)+ds) under-allocates while copy_mem_image writes width*height*colors samples, causing a heap buffer overflow.","fix":"Compute stride and ds in 64-bit (INT64/size_t), validate against a sane maximum, and fail allocation if it overflows.","locations":[{"ref":"src/postprocessing/mem_image.cpp:282-285","code":"  282 |   int stride = width * (bps / 8) * colors;\n  283 |   unsigned ds = height * stride;\n  284 |   libraw_processed_image_t *ret = (libraw_processed_image_t *)::malloc(\n  285 |       sizeof(libraw_processed_image_t) + ds);","lines":4}]},{"id":"OVF_49","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"size is computed as int (iheight*iwidth) and used as malloc element count; the multiply (size*3 + ...) is done in int arithmetic before being passed to malloc. For large but allowed dimensions this can overflow to a small/negative value, under-allocating fimg while the loops index up to size*3, causing heap overflow. The non-OpenMP path caps pixel count at 0x15540000 but still does int math for the malloc size argument.","fix":"Compute size and the allocation byte count in size_t/int64 and validate before malloc; reject oversized inputs.","locations":[{"ref":"src/postprocessing/postprocessing_aux.cpp:50-52","code":"   50 |   size = iheight * iwidth;\n   51 |   fimg = (float *)malloc((size * 3 + iheight + iwidth + 128) * sizeof *fimg);\n   52 |   temp = fimg + size * 3;","lines":3},{"ref":"src/postprocessing/postprocessing_aux.cpp:148-150","code":"  148 |   if ((size = iheight * iwidth) < 0x15550000)\n  149 |     fimg = (float *)malloc((size * 3 + iheight + iwidth) * sizeof *fimg);\n  150 |   temp = fimg + size * 3;","lines":3}]},{"id":"OVF_50","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"kodak_thumb_loader() allocates imgdata.image with `calloc(S.iheight * S.iwidth, sizeof(*imgdata.image))` where S.iheight/S.iwidth are ushort set from T.theight/T.twidth. The product S.iheight*S.iwidth is computed in int and can overflow for large dimensions before the byte size (*16) is applied; the preceding guards cap twidth/theight at 8192 each and theight*twidth at LIBRAW_MAX_THUMBNAIL_MB*1M, which mitigates but the multiplication itself is still int and relies on those caps being present/consistent. Also `T.thumb = calloc(S.width * S.height, P1.colors)` and `T.tlength = S.width*S.height*P1.colors` (line 212-213) recompute in int with no overflow guard after S.width/S.height were swapped.","fix":"Compute allocation sizes in size_t/INT64 and validate the product against LIBRAW_MAX_THUMBNAIL_MB before calloc; keep the dimension caps.","locations":[{"ref":"src/utils/thumb_utils.cpp:69-70","code":"   69 |   imgdata.image =\n   70 |       (ushort(*)[4])calloc(S.iheight * S.iwidth, sizeof(*imgdata.image));","lines":2},{"ref":"src/utils/thumb_utils.cpp:212-213","code":"  212 |   T.thumb = (char *)calloc(S.width * S.height, P1.colors);\n  213 |   T.tlength = S.width * S.height * P1.colors;","lines":2}]},{"id":"OVF_51","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"LibRaw::tiff_get() multiplies `*len * tagtype_dataunit_bytes[...]` (unsigned * int) without overflow check when deciding whether to follow the value offset. A crafted len near UINT_MAX can wrap the product so the `> 4` test is bypassed (or wrongly taken). Combined with get4()+base as the new seek target (also unbounded), parsing proceeds from an attacker-chosen file position. The IOSPACE_CHECK guard is compile-time optional and only checks 12 bytes from current pos.","fix":"Cast to 64-bit (INT64) before multiplying and compare against 4, and bound-check the resulting seek target (get4()+base) against file size.","locations":[{"ref":"src/utils/utils_dcraw.cpp:315-330","code":"  315 | void LibRaw::tiff_get(INT64 base, unsigned *tag, unsigned *type,\n  316 |                       unsigned *len, INT64 *save)\n  317 | {\n  318 | #ifdef LIBRAW_IOSPACE_CHECK\n  319 |   INT64 pos = ftell(ifp);\n  320 |   INT64 fsize = ifp->size();\n  321 |   if (fsize < 12 || (fsize - pos) < 12)\n  322 |     throw LIBRAW_EXCEPTION_IO_EOF;\n  323 | #endif\n  324 |   *tag = get2();\n  325 |   *type = get2();\n  326 |   *len = get4();\n  327 |   *save = ftell(ifp) + 4LL;\n  328 |   if (*len * tagtype_dataunit_bytes[(*type <= LIBRAW_EXIFTAG_TYPE_IFD8) ? *type : 0] > 4)\n  329 |     fseek(ifp, INT64(get4()) + base, SEEK_SET);\n  330 | }","lines":16}]},{"id":"OVF_52","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"new_huffman_tree allocates HUF_TREE_MAX_NODES(1<<bits) = 28 * (1<<bits) nodes. For the TRUE/CAMF paths bits is hardcoded to 8 (fine), but x3f_load_huffman is called with bits up to whatever the image type dictates and GET_TABLE(HUF->table, GET4, 1<<bits, ...) allocates 1<<bits uint32 plus mapping. bits is fixed (8/10) in current callers so not directly attacker-controlled, but '1 << bits' as a signed int and the node multiply (28 * (1<<bits) * sizeof(node)) are unchecked for overflow should bits ever grow; relies solely on x3f_limited_calloc which has its own overflow bug (see first finding).","fix":"Bound bits explicitly (e.g. <= 12) and compute node count in 64-bit; rely on a corrected x3f_limited_calloc.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:210-218","code":"  210 | static void new_huffman_tree(x3f_hufftree_t *HTP, int bits)\n  211 | {\n  212 |   int leaves = 1 << bits;\n  213 | \n  214 |   HTP->free_node_index = 0;\n  215 |   HTP->total_node_index = HUF_TREE_MAX_NODES(leaves);\n  216 |   HTP->nodes = (x3f_huffnode_t *)x3f_limited_calloc(1, HUF_TREE_MAX_NODES(leaves) *\n  217 |                                                sizeof(x3f_huffnode_t));\n  218 | }","lines":9},{"ref":"src/x3f/x3f_utils_patched.cpp:1463-1466","code":" 1463 |   int table_size = 1 << bits;\n 1464 |   int row_offsets_size = ID->rows * sizeof(HUF->row_offsets.element[0]);\n 1465 | \n 1466 |   GET_TABLE(HUF->table, GET4, table_size, uint32_t);","lines":4}]},{"id":"OVF_53","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In x3f_new_from_file the per-entry bounds check is 'if (DE->input.offset + DE->input.size > fsize * 2) goto _err'. Two problems: (1) offset+size are uint32 and can wrap, and (2) the threshold is fsize*2 rather than fsize, so an entry may legitimately point up to 2x past EOF and still pass, defeating the purpose of the check. Later seeks/reads to these offsets then operate beyond the file.","fix":"Use 64-bit: if ((INT64)DE->input.offset + (INT64)DE->input.size > fsize) goto _err; (compare against fsize, not fsize*2).","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:435-438","code":"  435 |       GET4(DE->input.offset);\n  436 |       GET4(DE->input.size);\n  437 |       if (DE->input.offset + DE->input.size > fsize * 2)\n  438 |         goto _err;","lines":4}]},{"id":"OVF_54","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"get_bit / set_bit_state implement a bit reader with no end-of-buffer awareness: get_bit dereferences *BS->next_address and increments without any bound. All decoders (TRUE, huffman, CAMF type4/5) rely on the decode loop terminating before the data is exhausted, but a crafted stream that never terminates a code (or whose row/col counts exceed the data) reads past the end of the heap allocation. This is the common sink behind several of the plane/CAMF findings.","fix":"Carry an end pointer in bit_state_t; in get_bit, throw LIBRAW_EXCEPTION_IO_CORRUPT when next_address reaches end.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:886-909","code":"  886 | static void set_bit_state(bit_state_t *BS, uint8_t *address)\n  887 | {\n  888 |   BS->next_address = address;\n  889 |   BS->bit_offset = 8;\n  890 | }\n  891 | \n  892 | static uint8_t get_bit(bit_state_t *BS)\n  893 | {\n  894 |   if (BS->bit_offset == 8)\n  895 |   {\n  896 |     uint8_t byte = *BS->next_address;\n  897 |     int i;\n  898 | \n  899 |     for (i = 7; i >= 0; i--)\n  900 |     {\n  901 |       BS->bits[i] = byte & 1;\n  902 |       byte = byte >> 1;\n  903 |     }\n  904 |     BS->next_address++;\n  905 |     BS->bit_offset = 0;\n  906 |   }\n  907 | \n  908 |   return BS->bits[BS->bit_offset++];\n  909 | }","lines":24}]},{"id":"OVF_55","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"read_data_block computes 'size = DE->input.size + DE->input.offset - fpos - footer' in uint32 arithmetic. If footer (or fpos) exceeds the remaining bytes, the subtraction underflows to a huge uint32. The guard 'fpos + size > file->size()' can itself overflow (fpos + huge size wraps) and fpos was masked with 0x7fffffff, dropping the high bit of a >2GB tell. A crafted directory entry (small size/offset, large header/footer) can yield a near-4GB size that passes the check and is handed to x3f_limited_malloc / GETN.","fix":"Compute everything in 64-bit (INT64), reject if input.offset+input.size > filesize, if fpos < input.offset, or if footer > (input.offset+input.size - fpos); only then compute size and validate fpos+size <= filesize without overflow.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:1260-1274","code":" 1260 | static uint32_t read_data_block(void **data, x3f_info_t *I,\n 1261 |                                 x3f_directory_entry_t *DE, uint32_t footer)\n 1262 | {\n 1263 |   uint32_t fpos = (I->input.file->tell() & 0x7fffffffU) ;\n 1264 |   uint32_t size = DE->input.size + DE->input.offset - fpos - footer;\n 1265 | \n 1266 |   if (fpos + size > I->input.file->size())\n 1267 |     throw LIBRAW_EXCEPTION_IO_CORRUPT;\n 1268 |  \n 1269 |   *data = (void *)x3f_limited_malloc(size);\n 1270 | \n 1271 |   GETN(*data, size);\n 1272 | \n 1273 |   return size;\n 1274 | }","lines":15}]},{"id":"OVF_56","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"canon_load_raw uses 'pixel[(block<<6)+i]' where pixel = raw_image + row*raw_width and nblocks = MIN(8,raw_height-row)*raw_width>>6. For the final partial group of 8 rows the product may not be a multiple of 64; block<<6+i can address up to nblocks*64 entries which can slightly exceed the 8*raw_width pixels of the current band but stays within the global raw_image only because of the +8 row allocation margin. Relies on the allocation margin rather than an explicit bound.","fix":"Bound the write index against raw_width*raw_height (or the band) explicitly instead of relying on the +8 row over-allocation.","locations":[{"ref":"src/decoders/decoders_dcraw.cpp:218-251","code":"  218 |     for (row = 0; row < raw_height; row += 8)\n  219 |     {\n  220 |       checkCancel();\n  221 |       pixel = raw_image + row * raw_width;\n  222 |       nblocks = MIN(8, raw_height - row) * raw_width >> 6;\n  223 |       for (block = 0; block < nblocks; block++)\n  224 |       {\n  225 |         memset(diffbuf, 0, sizeof diffbuf);\n  226 |         for (i = 0; i < 64; i++)\n  227 |         {\n  228 |           leaf = gethuff(huff[i > 0]);\n  229 |           if (leaf == 0 && i)\n  230 |             break;\n  231 |           if (leaf == 0xff)\n  232 |             continue;\n  233 |           i += leaf >> 4;\n  234 |           len = leaf & 15;\n  235 |           if (len == 0)\n  236 |             continue;\n  237 |           diff = getbits(len);\n  238 |           if ((diff & (1 << (len - 1))) == 0)\n  239 |             diff -= (1 << len) - 1;\n  240 |           if (i < 64)\n  241 |             diffbuf[i] = diff;\n  242 |         }\n  243 |         diffbuf[0] += carry;\n  244 |         carry = diffbuf[0];\n  245 |         for (i = 0; i < 64; i++)\n  246 |         {\n  247 |           if (pnum++ % raw_width == 0)\n  248 |             base[0] = base[1] = 512;\n  249 |           if ((pixel[(block << 6) + i] = base[i & 1] += diffbuf[i]) >> 10)\n  250 |             derror();\n  251 |         }","lines":34}]},{"id":"OVF_57","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"pe o [0,6] explicitly, e.g. nWBs = (nWBs < 0) ? 0 : MIN(nWBs, 6), and treat the count as unsigned before comparison.","locations":[{"ref":"src/metadata/fuji.cpp:1302-1306","code":" 1302 |       int nWBs = get4();\n 1303 |       nWBs = MIN(nWBs, 6);\n 1304 |       for (int wb_ind = LIBRAW_WBI_Custom1; wb_ind < LIBRAW_WBI_Custom1+nWBs; wb_ind++) {\n 1305 |         FORC4 icWBC[wb_ind][GRGB_2_RGBG(c)] = get2();\n 1306 |         if ((len >= unsigned(4+16*nWBs)) && average_WBData) {","lines":5},{"ref":"src/metadata/fuji.cpp:282-287","code":"  282 |         int nWBs = MIN(PrivateMknBuf.sget4(posPrivateMknBuf), 6);\n  283 |         posWB = posPrivateMknBuf + 4;\n  284 |         for (int wb_ind = LIBRAW_WBI_Custom1; wb_ind < LIBRAW_WBI_Custom1+nWBs; wb_ind++) {\n  285 |           FORC4 icWBC[wb_ind][GRGB_2_RGBG(c)] =\n  286 | \t\t\t  PrivateMknBuf.sget2(posWB + (c << 1));\n  287 |           if ((PrivateTagBytes >= unsigned(4+16*nWBs)) && average_WBData) {","lines":6}]},{"id":"OVF_61","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"NOKIARAW branch: `tiff_bps = i * 8 / (width*height)` and `raw_height = height + (top_margin = i/(width*tiff_bps/8) - height)`. width/height are validated to <=16000 and i <= 2*width*height, but width*height is computed as int and 16000*16000 = 256,000,000 fits in int; i*8 (2*256e6*8) overflows 32-bit signed int (~4.1e9) -> UB. Use 64-bit for these products.","fix":"Compute i*8 and width*height as 64-bit (INT64) before the division.","locations":[{"ref":"src/metadata/identify.cpp:657-678","code":"  657 |     i = get4(); // bytes count\n  658 |     width = get2();\n  659 |     height = get2();\n  660 | \n  661 |     // Data integrity check\n  662 |     if (width < 1 || width > 16000 || height < 1 || height > 16000 ||\n  663 |         i < (width * height) || i > (2 * width * height))\n  664 |       throw LIBRAW_EXCEPTION_IO_CORRUPT;\n  665 | \n  666 |     switch (tiff_bps = i * 8 / (width * height))\n  667 |     {\n  668 |     case 8:\n  669 |       load_raw = &LibRaw::eight_bit_load_raw;\n  670 |       break;\n  671 |     case 10:\n  672 |       load_raw = &LibRaw::nokia_load_raw;\n  673 |       break;\n  674 |     case 0:\n  675 |       throw LIBRAW_EXCEPTION_IO_CORRUPT;\n  676 |       break;\n  677 |     }\n  678 |     raw_height = height + (top_margin = i / (width * tiff_bps / 8) - height);","lines":22}]},{"id":"OVF_62","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In parse_minolta, 'order = fgetc(ifp) * 0x101' uses the result of fgetc which can be EOF (-1) on truncated input, setting order to -257 (an invalid byte order) that is then used for all subsequent get2/get4 calls. Earlier fgetc()-'M'/'R' checks can also misbehave on EOF.","fix":"Read the 4 signature/order bytes into a buffer with a checked fread and validate before computing order.","locations":[{"ref":"src/metadata/minolta.cpp:28-31","code":"   28 |   if (fgetc(ifp) || fgetc(ifp) - 'M' || fgetc(ifp) - 'R')\n   29 |     return;\n   30 |   order = fgetc(ifp) * 0x101;\n   31 |   offset = base + get4() + 8;","lines":4}]},{"id":"OVF_63","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In parse_rollei, data_offset = thumb_offset + thumb_width * thumb_height * 2 is computed from atoi() values taken directly from the file (TX/TY/HDR fields). thumb_width*thumb_height*2 is a signed int multiplication that can overflow, yielding a bogus/negative data_offset later used as a file offset.","fix":"Validate thumb_width/thumb_height ranges and compute the offset in 64-bit with overflow checks before assigning to data_offset.","locations":[{"ref":"src/metadata/misc_parsers.cpp:301-304","code":"  301 |     if (!strcmp(line, \"TX \"))\n  302 |       thumb_width = atoi(val);\n  303 |     if (!strcmp(line, \"TY \"))\n  304 |       thumb_height = atoi(val);","lines":4},{"ref":"src/metadata/misc_par
