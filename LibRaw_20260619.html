     int dsize = T.tlength + mk_exif * (sizeof(exif) + sizeof(tiff_hdr));\n   85 | \n   86 |     libraw_processed_image_t *ret = (libraw_processed_image_t *)::malloc(\n   87 |         sizeof(libraw_processed_image_t) + dsize);","lines":4}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"crxSetupImageData does not validate hdr->nPlanes (used as img->nPlanes, an attacker-controlled value from crxParseImageHeader where nPlanes = cmp1TagData[25]>>4, range 0..15). outBufs is a 4-entry array and several code paths assume nPlanes is 1 or 4. crxReadImageHeaders allocates comps/bands sized by nPlanes, but crxConvertPlaneLine and crxLoadDecodeLoop (results[4]) and the cfaLayout switch assume nPlanes<=4. A crafted nPlanes (e.g. 2,3,5..15) leads to inconsistent buffer sizing vs. the >4 results[] write in crxLoadDecodeLoop and mismatched plane handling.","fix":"Reject any nPlanes other than 1 or 4 in crxSetupImageData (crxParseImageHeader checks this for the header it parses, but crxSetupImageData should defensively re-validate) before allocating and before crxLoadDecodeLoop writes results[plane].","locations":[{"ref":"src/decoders/crx.cpp:2518-2525","code":" 2518 |   img->nPlanes = hdr->nPlanes;\n 2519 |   img->nBits = hdr->nBits;\n 2520 |   img->encType = hdr->encType;\n 2521 |   img->samplePrecision = hdr->nBits + IncrBitTable[4 * hdr->encType + 2] + 1;\n 2522 |   img->mdatOffset = mdatOffset + hdr->mdatHdrSize;\n 2523 |   img->mdatSize = mdatSize;\n 2524 |   img->planeBuf = 0;\n 2525 |   img->outBufs[0] = img->outBufs[1] = img->outBufs[2] = img->outBufs[3] = 0;","lines":8},{"ref":"src/decoders/crx.cpp:2623-2643","code":" 2623 | void LibRaw::crxLoadDecodeLoop(void *img, int nPlanes)\n 2624 | {\n 2625 | #ifdef LIBRAW_USE_OPENMP\n 2626 |   int results[4] ={0,0,0,0}; // nPlanes is always <= 4\n 2627 | #pragma omp parallel for\n 2628 |   for (int32_t plane = 0; plane < nPlanes; ++plane)\n 2629 |    try {\n 2630 |     results[plane] = crxDecodePlane(img, plane);\n 2631 |    } catch (...) {\n 2632 |     results[plane] = 1;\n 2633 |    }\n 2634 | \n 2635 |   for (int32_t plane = 0; plane < nPlanes; ++plane)\n 2636 |     if (results[plane])\n 2637 |       derror();\n 2638 | #else\n 2639 |   for (int32_t plane = 0; plane < nPlanes; ++plane)\n 2640 |     if (crxDecodePlane(img, plane))\n 2641 |       derror();\n 2642 | #endif\n 2643 | }","lines":21}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"decode_ljpeg_422() unconditionally accesses sof.components[0..2] and dhts[components[i].dc_tbl] but never verifies that sof.cps >= 3. parse_sof() allows cps in 1..4, and decode_sony() dispatches into decode_ljpeg_422 purely on the subsample flags of component[0]; a crafted SOF3 with cps==1 or 2 plus subsample_h==2,subsample_v==1 reaches this function and reads components[1]/components[2] out of bounds of the std::vector.","fix":"At the top of decode_ljpeg_422 verify sof.cps >= 3 (and sof.components.size() >= 3) and return false otherwise.","locations":[{"ref":"src/decompressors/losslessjpeg.cpp:218-220","code":"  218 |   HuffTable &h1 = dhts[sof.components[0].dc_tbl];\n  219 |   HuffTable &h2 = dhts[sof.components[1].dc_tbl];\n  220 |   HuffTable &h3 = dhts[sof.components[2].dc_tbl];","lines":3},{"ref":"src/decompressors/losslessjpeg.cpp:203-216","code":"  203 | bool LibRaw_LjpegDecompressor::decode_ljpeg_422(std::vector<uint16_t> &_dest, int width, int height)\n  204 | {\n  205 |   if (sof.width * 3u != unsigned(width) || sof.height != unsigned(height))\n  206 |     return false;\n  207 |   if (width % 2 || width % 6 || height % 2)\n  208 |     return false;\n  209 | \n  210 |   if (_dest.size() < size_t(width * height))\n  211 |     return false;\n  212 | \n  213 |   if(width < 1 || height < 1)\n  214 |     return false;\n  215 | \n  216 |   uint16_t *dest = _dest.data();","lines":14}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"cr3 selectCRXTrack(): the bitcount-based RAW track ranking and the tiff_idx selection at lines 224-229 use t_height squared instead of width*height: `INT64(tiff_ifd[i].t_height) * INT64(tiff_ifd[i].t_height) > tpixels`. This is almost certainly a copy-paste bug (should be t_width * t_height) and causes the wrong IFD (hence wrong flip) to be selected; not memory-unsafe but a correctness defect controllable by input.","fix":"Use `INT64(tiff_ifd[i].t_width) * INT64(tiff_ifd[i].t_height)` for the pixel-count comparison.","locations":[{"ref":"src/metadata/cr3_parser.cpp:224-229","code":"  224 |     for (unsigned i = 0; i < tiff_nifds && i < LIBRAW_IFD_MAXCOUNT; i++)\n  225 |       if (INT64(tiff_ifd[i].t_height) * INT64(tiff_ifd[i].t_height) > tpixels)\n  226 |       {\n  227 |         tpixels = INT64(tiff_ifd[i].t_height) * INT64(tiff_ifd[i].t_height);\n  228 |         tiff_idx = i;\n  229 |       }","lines":6}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"parseCR3() reads stsz with `int sample_count = entries; current_track.sample_count = entries;` where entries is `get4()` assigned to a signed int. For fixed sample_size (sample_size != 0) the `entries < 1 || entries > 1000000` validation is SKIPPED entirely (it is inside the else branch). So with sample_size != 0, sample_count is set to an arbitrary 32-bit file value (including negative/huge). selectCRXFrame/selectCRXTrack then use sample_count (e.g. `frameIndex >= hdr->sample_count`, framecounts[i]=d->sample_count) and selectCRXFrame loops over sample_count with sample_sizes possibly NULL (fixed size path), enabling logic errors and large loops.","fix":"Validate entries range (1..1000000) for both fixed and variable sample_size paths before storing into sample_count.","locations":[{"ref":"src/metadata/cr3_parser.cpp:835-844","code":"  835 |         int sample_size = get4();\n  836 |         int entries = get4();\n  837 |         current_track.sample_count = entries;\n  838 | \n  839 |         // if sample size is zero sample size is fixed\n  840 |         if (sample_size)\n  841 |         {\n  842 |            current_track.MediaSize = sample_size;\n  843 |            current_track.sample_size = sample_size;\n  844 |         }","lines":10}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Missing break statements cause case fall-through in parse_phase_one. case 0x0203 (reads imPhaseOne.Software) falls into 0x0204 (overwrites imPhaseOne.SystemType from the same/wrong stream position) and then into 0x0210 (re-interprets 'data' as SensorTemperature). The file position is wrong after stmread, so SystemType and SensorTemperature are populated with garbage whenever tag 0x0203 or 0x0204 is present. case 0x0301 also falls into 0x0401, recomputing CurAp from leftover 'data'/'type'.","fix":"Add break; at the end of case 0x0203, case 0x0204, and case 0x0301 (after the existing code blocks).","locations":[{"ref":"src/metadata/mediumformat.cpp:124-130","code":"  124 |     case 0x0203:\n  125 |       stmread(imPhaseOne.Software, len, ifp);\n  126 |     case 0x0204:\n  127 |       stmread(imPhaseOne.SystemType, len, ifp);\n  128 |     case 0x0210:\n  129 |       ph1.tag_210 = int_to_float(data);\n  130 |       imCommon.SensorTemperature = ph1.tag_210;","lines":7},{"ref":"src/metadata/mediumformat.cpp:160-207","code":"  160 |     case 0x0301:\n  161 |       model[63] = 0;\n  162 |       fread(imPhaseOne.FirmwareString, 1, 255, ifp);\n  163 |       imPhaseOne.FirmwareString[255] = 0;\n  164 |       memcpy(model, imPhaseOne.FirmwareString, 63);\n  165 | \t  model[63] = 0;\n  166 |       if ((cp = strstr(model, \" camera\")))\n  167 |         *cp = 0;\n  168 |       else if ((cp = strchr(model, ',')))\n  169 |         *cp = 0;\n  170 |       /* minus and the letter after it are not always present\n  171 |         if present, last letter means:\n  172 |           C : Contax 645AF\n  173 |           H : Hasselblad H1 / H2\n  174 |           M : Mamiya\n  175 |           V : Hasselblad 555ELD / 553ELX / 503CW / 501CM; not included below\n  176 |         because of adapter conflicts (Mamiya RZ body) if not present, Phase One\n  177 |         645 AF, Mamiya 645AFD Series, or anything\n  178 |        */\n  179 |       strcpy(imPhaseOne.SystemModel, model);\n  180 |       if ((cp = strchr(model, '-')))\n  181 |       {\n  182 |         if (cp[1] == 'C')\n  183 |         {\n  184 |           strcpy(ilm.body, \"Contax 645AF\");\n  185 |           ilm.CameraMount = LIBRAW_MOUNT_Contax645;\n  186 |           ilm.CameraFormat = LIBRAW_FORMAT_645;\n  187 |         }\n  188 |         else if (cp[1] == 'M')\n  189 |         {\n  190 |           strcpy(ilm.body, \"Mamiya 645\");\n  191 |           ilm.CameraMount = LIBRAW_MOUNT_Mamiya645;\n  192 |           ilm.CameraFormat = LIBRAW_FORMAT_645;\n  193 |         }\n  194 |         else if (cp[1] == 'H')\n  195 |         {\n  196 |           strcpy(ilm.body, \"Hasselblad H1/H2\");\n  197 |           ilm.CameraMount = LIBRAW_MOUNT_Hasselblad_H;\n  198 |           ilm.CameraFormat = LIBRAW_FORMAT_645;\n  199 |         }\n  200 |         *cp = 0;\n  201 |       }\n  202 |     case 0x0401:\n  203 |       if (tagtypeIs(LIBRAW_EXIFTAG_TYPE_LONG))\n  204 |         ilm.CurAp = libraw_powf64l(2.0f, (int_to_float(data) / 2.0f));\n  205 |       else\n  206 |         ilm.CurAp = libraw_powf64l(2.0f, getrealf(type) / 2.0f);\n  207 |       break;","lines":48}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"x3f_thumb_loader BITMAP branch allocates ID->columns*ID->rows*3 as an int (line 374-375) computed in 32-bit int arithmetic even though the size was checked as INT64. columns/rows are uint32 capped at 65535 in x3f_load_image, so columns*rows*3 can be up to ~1.27e10 which overflows 'int' (the malloc argument 'ID->columns * ID->rows * 3' is int*int) producing a small allocation; the per-row memmove loop then writes rows*columns*3 bytes -> heap overflow. The INT64 alloc_size check earlier does not protect the actual malloc which recomputes the size in int.","fix":"Allocate using the validated INT64 alloc_size (cast to size_t) and use 64-bit for the destination offset 'row * ID->columns * 3'.","locations":[{"ref":"src/x3f/x3f_parse_process.cpp:368-385","code":"  368 |       INT64 alloc_size = INT64(ID->columns) * INT64(ID->rows) * 3LL;\n  369 | \t  if ((alloc_size > 2 * checked_size) ||\n  370 |           (alloc_size > 1024LL * 1024LL * LIBRAW_MAX_THUMBNAIL_MB)) throw LIBRAW_EXCEPTION_TOOBIG;\n  371 |       if (alloc_size < 64LL)\n  372 |         throw LIBRAW_EXCEPTION_IO_CORRUPT;\n  373 | \n  374 |       imgdata.thumbnail.tlength = ID->columns * ID->rows * 3;\n  375 |       imgdata.thumbnail.thumb = (char *)malloc(ID->columns * ID->rows * 3);\n  376 |       char *src0 = (char *)ID->data;\n  377 |       for (int row = 0; row < (int)ID->rows; row++)\n  378 |       {\n  379 |         int offset = row * ID->row_stride;\n  380 |         if (offset + ID->columns * 3 > ID->data_size)\n  381 |           break;\n  382 |         char *dest = &imgdata.thumbnail.thumb[row * ID->columns * 3];\n  383 |         char *src = &src0[offset];\n  384 |         memmove(dest, src, ID->columns * 3);\n  385 |       }","lines":18}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"huffman_decode_row bounds only the row START offset (HUF->row_offsets.element[row] vs data_size-1) but the actual decode then reads bits forward for ID->columns*3 codes with no end check, and writes into HUF->x3rgb16.data / rgb8.data using index 3*(row*columns+col)+color. The output buffers were sized columns*rows*3 in x3f_load_huffman from ID->columns/ID->rows, but row_offsets has ID->rows entries read from the file independently; there is no guarantee the decoded extent matches. Combined with the unbounded bit reader this is an OOB read of ID->data and a potential OOB pattern.","fix":"Bound the bit reader with an end pointer (data + data_size); also validate row_offsets are monotonic and within data_size.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:1073-1124","code":" 1073 | static void huffman_decode_row(x3f_info_t * /*I*/, x3f_directory_entry_t *DE,\n 1074 |                                int /*bits*/, int row, int offset, int *minimum)\n 1075 | {\n 1076 |   x3f_directory_entry_header_t *DEH = &DE->header;\n 1077 |   x3f_image_data_t *ID = &DEH->data_subsection.image_data;\n 1078 |   x3f_huffman_t *HUF = ID->huffman;\n 1079 | \n 1080 |   int16_t c[3] = {(int16_t)offset, (int16_t)offset, (int16_t)offset};\n 1081 |   int col;\n 1082 |   bit_state_t BS;\n 1083 | \n 1084 |   if (HUF->row_offsets.element[row] > ID->data_size - 1)\n 1085 | \t  throw LIBRAW_EXCEPTION_IO_CORRUPT;\n 1086 |   set_bit_state(&BS, (uint8_t *)ID->data + HUF->row_offsets.element[row]);\n 1087 | \n 1088 |   for (col = 0; col < (int)ID->columns; col++)\n 1089 |   {\n 1090 |     int color;\n 1091 | \n 1092 |     for (color = 0; color < 3; color++)\n 1093 |     {\n 1094 |       uint16_t c_fix;\n 1095 | \n 1096 |       c[color] += get_huffman_diff(&BS, &HUF->tree);\n 1097 |       if (c[color] < 0)\n 1098 |       {\n 1099 |         c_fix = 0;\n 1100 |         if (c[color] < *minimum)\n 1101 |           *minimum = c[color];\n 1102 |       }\n 1103 |       else\n 1104 |       {\n 1105 |         c_fix = c[color];\n 1106 |       }\n 1107 | \n 1108 |       switch (ID->type_format)\n 1109 |       {\n 1110 |       case X3F_IMAGE_RAW_HUFFMAN_X530:\n 1111 |       case X3F_IMAGE_RAW_HUFFMAN_10BIT:\n 1112 |         HUF->x3rgb16.data[3 * (row * ID->columns + col) + color] =\n 1113 |             (uint16_t)c_fix;\n 1114 |         break;\n 1115 |       case X3F_IMAGE_THUMB_HUFFMAN:\n 1116 |         HUF->rgb8.data[3 * (row * ID->columns + col) + color] = (uint8_t)c_fix;\n 1117 |         break;\n 1118 |       default:\n 1119 |         /* TODO: Shouldn't this be treated as a fatal error? */\n 1120 |         throw LIBRAW_EXCEPTION_IO_CORRUPT;\n 1121 |       }\n 1122 |     }\n 1123 |   }\n 1124 | }","lines":52}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"crxReadSubbandHeaders validates only `*mdatSize < 4` before reading a 2-byte sign and 2-byte size, but then unconditionally reads `(*subbandMdatPtr)[8]` (and for the new header sgetn at +10, +12, +16, +18). The `*mdatSize < hdrSize + 4` check guarantees enough bytes only for the chosen hdrSize, but the curSubband index byte at offset 8 is read before that relationship is rechecked for the old 8-byte header is fine (8+4=12>8), however the code reads offset 8 even when validating; combined with sgetn reads up to +18 for new headers this is correct only because hdrSize==16 ->20 bytes. The genuine bug: when the curSubband mismatch check fails it sets band->dataSize = subbandSize and then returns -1 (dead store on an error path) - a copy/paste leftover that can also leave a partially-initialised band.","fix":"Remove the dead `band->dataSize = subbandSize;` assignment on the error path (or fully initialise the band) since the function returns -1 immediately afterwards.","locations":[{"ref":"src/decoders/crx.cpp:2203-2209","code":" 2203 |     int32_t subbandSize = LibRaw::sgetn(4, *subbandMdatPtr + 4);\n 2204 | \n 2205 |     if (curSubband != ((*subbandMdatPtr)[8] & 0xF0) >> 4)\n 2206 |     {\n 2207 |       band->dataSize = subbandSize;\n 2208 |       return -1;\n 2209 |     }","lines":7}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"crxReadImageHeaders reads tile->mdatExtraSize and tile->mdatQPDataSize from the file and later crxDecodePlane computes tileMdatOffset = tile->dataOffset + tile->mdatQPDataSize + tile->mdatExtraSize + planeComp->dataOffset, all 32-bit-ish file values added into a uint64_t and used as a seek/read base for the bitstream. None of these offsets are validated to stay within the mdat region (img->mdatSize), so a crafted file can point the bitstream reader at an arbitrary file offset; combined with subbandDataSize this drives how much is read. Only crxFillBuffer's EOF check stops truly out-of-file reads.","fix":"Validate tileSize, mdatQPDataSize, mdatExtraSize, compSize and subband dataOffset/dataSize cumulatively against img->mdatSize and reject when any offset+size exceeds the declared mdat bounds.","locations":[{"ref":"src/decoders/crx.cpp:2374-2394","code":" 2374 |     tile->tileSize = LibRaw::sgetn(4, dataPtr + 4);\n 2375 |     tile->dataOffset = tileOffset;\n 2376 |     tile->qStep = 0;\n 2377 |     if (hdrSize == 16)\n 2378 |     {\n 2379 |       // extended header data - terminated by 0 bytes\n 2380 |       if (LibRaw::sgetn(2, dataPtr + 18) != 0)\n 2381 |         return -1;\n 2382 |       tile->hasQPData = true;\n 2383 |       tile->mdatQPDataSize = LibRaw::sgetn(4, dataPtr + 12);\n 2384 |       tile->mdatExtraSize = LibRaw::sgetn(2, dataPtr + 16);\n 2385 |     }\n 2386 |     else\n 2387 |     {\n 2388 |       tile->hasQPData = false;\n 2389 |       tile->mdatQPDataSize = 0;\n 2390 |       tile->mdatExtraSize = 0;\n 2391 |     }\n 2392 | \n 2393 |     dataPtr += hdrSize + 4;\n 2394 |     tileOffset += tile->tileSize;","lines":21},{"ref":"src/decoders/crx.cpp:1900-1906","code":" 1900 |       CrxTile *tile = img->tiles + tRow * img->tileCols + tCol;\n 1901 |       CrxPlaneComp *planeComp = tile->comps + planeNumber;\n 1902 |       uint64_t tileMdatOffset = tile->dataOffset + tile->mdatQPDataSize + tile->mdatExtraSize + planeComp->dataOffset;\n 1903 | \n 1904 |       // decode single tile\n 1905 |       if (crxSetupSubbandData(img, planeComp, tile, tileMdatOffset))\n 1906 |         return -1;","lines":7}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"X-Trans green-extrema pass has a fragile manual loop-index manipulation that can run out of array bounds. In the loop over row/col (lines 104-147) the body conditionally does row++/col-- (case 1) and col += 2 / row-- (case 2), mutating the loop variables inside the body. The retrycount guard (line 142-143) prevents an infinite loop but the index juggling combined with pix = image + row*width + col (line 113) and pix[hex[c]] (line 122) relies on allhex offsets being in range; if the allhex validation is defeated (see the minh/maxh copy-paste bug) these accesses read out of bounds. Even with valid hex, the col/row rewinding is hard to reason about and not clearly bounded against width/height for every branch.","fix":"Restructure to avoid mutating loop counters in the body, or add explicit bounds assertions on row/col and on pix+hex[c] before each access.","locations":[{"ref":"src/demosaic/xtrans_demosaic.cpp:104-147","code":"  104 |   for (int row = 2; row < height - 2; row++)\n  105 |   {\n  106 |       int col;\n  107 |       ushort min, max;\n  108 |       for (col = 2, max = 0u, min = 0xffffu; col < int(width) - 2; col++)\n  109 |       {\n  110 |           if (fcol(row, col) == 1 && (min = ~(max = 0)))\n  111 |               continue;\n  112 |           ushort(*pix)[4];\n  113 |           pix = image + row * width + col;\n  114 |           short* hex = allhex[row % 3][col % 3][0];\n  115 |           if (!max)\n  116 |           {\n  117 |               int c;\n  118 |               FORC(6)\n  119 |               {\n  120 |                   int val = pix[hex[c]][1];\n  121 |                   if (min > val)\n  122 |                       min = val;\n  123 |                   if (max < val)\n  124 |                       max = val;\n  125 |               }\n  126 |           }\n  127 |           pix[0][1] = min;\n  128 |           pix[0][3] = max;\n  129 |           switch ((row - sgrow) % 3)\n  130 |           {\n  131 |           case 1:\n  132 |               if (row < height - 3)\n  133 |               {\n  134 |                   row++;\n  135 |                   col--;\n  136 |               }\n  137 |               break;\n  138 |           case 2:\n  139 |               if ((min = ~(max = 0)) && (col += 2) < width - 3 && row > 2)\n  140 |               {\n  141 |                   row--;\n  142 |                   if (retrycount++ > width * height)\n  143 |                       throw LIBRAW_EXCEPTION_IO_CORRUPT;\n  144 |               }\n  145 |           }\n  146 |       }\n  147 |   }","lines":44}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"LibRaw_file_datastream::read() uses `nmemb * size` for the byte count (sgetn) but divides by size to get the element count. When size*nmemb overflows size_t, the read is short while the division still yields a large count. Also seek() casts the 64-bit offset to (long) (`f->pubseekoff((long)o, dir)`), truncating offsets >2GB on LLP64/ILP32 platforms, so large-file seeks silently land at a wrong position.","fix":"Validate size*nmemb does not overflow before reading; use std::streamoff/INT64 (not long) for pubseekoff to preserve >2GB offsets.","locations":[{"ref":"src/libraw_datastream.cpp:228-240","code":"  228 | int LibRaw_file_datastream::read(void *ptr, size_t size, size_t nmemb)\n  229 | {\n  230 | /* Visual Studio 2008 marks sgetn as insecure, but VS2010 does not. */\n  231 | #if defined(WIN32SECURECALLS) && (_MSC_VER < 1600)\n  232 |   LR_STREAM_CHK();\n  233 |   return int(f->_Sgetn_s(static_cast<char *>(ptr), nmemb * size, nmemb * size) /\n  234 |              (size > 0 ? size : 1));\n  235 | #else\n  236 |   LR_STREAM_CHK();\n  237 |   return int(f->sgetn(static_cast<char *>(ptr), std::streamsize(nmemb * size)) /\n  238 |              (size > 0 ? size : 1));\n  239 | #endif\n  240 | }","lines":13},{"ref":"src/libraw_datastream.cpp:266","code":"  266 |   return f->pubseekoff((long)o, dir) < 0;","lines":1}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"LibRaw_bigfile_buffered_datastream::seek() does not clamp _fpos. SEEK_SET stores o verbatim (negative or beyond EOF), SEEK_CUR adds o with no bounds, SEEK_END computes `_fsize + o`. A negative resulting _fpos is only caught later in fillBufferAt (off<0 returns false) and readAt (Offset built from off, ReadFile fails), but tell() then returns a negative/garbage position and read()'s `_fpos + count > _fsize` arithmetic uses an out-of-range _fpos, making `MAX(0, _fsize - _fpos)` mis-size the fallback read. Other datastream seeks (buffer, file) clamp; this one does not.","fix":"Clamp _fpos to [0, _fsize] after computing it for every whence (matching LibRaw_buffer_datastream::seek), and validate whence.","locations":[{"ref":"src/libraw_datastream.cpp:878-885","code":"  878 | int LibRaw_bigfile_buffered_datastream::seek(INT64 o, int whence)\n  879 | {\n  880 |     LR_BF_CHK();\n  881 |     if (whence == SEEK_SET) _fpos = o;\n  882 |     else if (whence == SEEK_END) _fpos = o > 0 ? _fsize : _fsize + o;\n  883 |     else if (whence == SEEK_CUR) _fpos += o;\n  884 |     return 0;\n  885 | }","lines":8}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In parse_exif tag 0x927c ccm parsing, the normalization sum is accumulated from the transposed element cmatrix[c][l] while values are written to cmatrix[l][c]. The inner loop variable c iterates 0..2 with l fixed, so 'num += cmatrix[c][l]' sums a column rather than the row just written; the subsequent FORC3 cmatrix[l][c] /= num then divides by a sum of different elements, producing an incorrect color matrix.","fix":"Accumulate num += cmatrix[l][c] (matching the element being written) instead of cmatrix[c][l].","locations":[{"ref":"src/metadata/exif_gps.cpp:276-293","code":"  276 |               for (l = 0; l < 3; l++) // skip last row\n  277 |               {\n  278 |                 num = 0.0;\n  279 |                 for (c = 0; c < 3; c++)\n  280 |                 {\n  281 |                   cmatrix[l][c] = (float)atoi(pos);\n  282 |                   num += cmatrix[c][l];\n  283 | #ifdef LIBRAW_WIN32_CALLS\n  284 |                   pos = strtok(NULL, \",\");\n  285 | #else\n  286 |                   pos = strtok_r(NULL, \",\", &last);\n  287 | #endif\n  288 |                   if (!pos)\n  289 |                     goto end; // broken\n  290 |                 }\n  291 |                 if (num > 0.01)\n  292 |                     FORC3 cmatrix[l][c] = cmatrix[l][c] / num;\n  293 |               }","lines":18}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"trimSpaces() calls isspace() on plain char values (p[l-1], *p) without casting to unsigned char. For inputs with bytes >= 0x80 (common in attacker-controlled make/model/EXIF strings) this is undefined behavior per the C standard and can misbehave on platforms where char is signed. Same unguarded isspace pattern elsewhere uses the (unsigned char) cast (remove_trailing_spaces does), so trimSpaces is inconsistent.","fix":"Cast to (unsigned char) before passing to isspace().","locations":[{"ref":"src/metadata/identify_tools.cpp:84-87","code":"   84 |   while (isspace(p[l - 1]))\n   85 |     p[--l] = 0; /* trim trailing spaces */\n   86 |   while (*p && isspace(*p))\n   87 |     ++p, --l;   /* trim leading spaces */","lines":4}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Nikon tag 0x008b lens f-stops: `imgdata.lens.nikon.LensFStops = uc1 * uc2 * (12 / uc3);` uses integer division 12/uc3 which truncates for uc3 not dividing 12 (e.g. uc3=5 -> 12/5=2), producing a wrong/zero result rather than the intended (uc1*uc2*12)/uc3. uc3==0 is correctly guarded. Not a memory-safety bug but a precision/correctness defect inconsistent with the float computation that follows.","fix":"Compute as `(uc1 * uc2 * 12) / uc3` (or in float) to avoid premature truncation.","locations":[{"ref":"src/metadata/nikon.cpp:681-684","code":"  681 |       if (uc3)\n  682 |       {\n  683 |         imgdata.lens.nikon.LensFStops = uc1 * uc2 * (12 / uc3);\n  684 |         ilm.LensFStops = (float)imgdata.lens.nikon.LensFStops / 12.0f;","lines":4}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"parseSonyLensFeatures early-return condition is a tautology that is almost always false-negative: `if ((ilm.LensMount == LIBRAW_MOUNT_Canon_EF) || (ilm.LensMount != LIBRAW_MOUNT_Sigma_X3F) || !features) return;`. The middle term `LensMount != Sigma_X3F` is true for virtually every mount, so the function returns early for almost all inputs unless LensMount happens to equal Sigma_X3F (in which case the first term is false and middle is false). The intent was almost certainly `&&` between the first two terms (return only when mount is Canon_EF, i.e. not a Sony/Minolta lens). As written, lens-feature parsing is effectively dead for normal Sony lenses.","fix":"Review intended logic; likely `if ((ilm.LensMount == LIBRAW_MOUNT_Canon_EF) || (ilm.LensMount == LIBRAW_MOUNT_Sigma_X3F) || !features) return;` (early-return for adapter mounts), matching the comment semantics.","locations":[{"ref":"src/metadata/sony.cpp:575-577","code":"  575 |   if ((ilm.LensMount == LIBRAW_MOUNT_Canon_EF) ||\n  576 |       (ilm.LensMount != LIBRAW_MOUNT_Sigma_X3F) || !features)\n  577 |     return;","lines":3}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Signedness mismatch in fread length comparisons: `if (fread(cbuf,1,len,ifp) != (int)len)` (Sinar tag) and several `int items = fread(...); if (items == sony_length)` where sony_length/SR2SubIFDLength are unsigned. f extrasamples > 0 && tiff_ifd[raw].samples > 3)\n 2329 |           is_raw = 0; // SKIP RGB+Alpha IFDs","lines":17}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"convert_to_rgb() writes ICC profile description into oprof using sprintf(prof_desc.data(), ...) sized via snprintf, but then copies it with strcpy((char*)oprof + pbody[5] + 12, prof_desc.data()) guarded only by 'pbody[5]+12+prof_desc.size() < phead[0]'. oprof is calloc(phead[0]=1024). Earlier strcpy at oprof+pbody[2]+8 ('auto-generated by dcraw') and the pbody/oprof[oprof[0]/4] index writes (lines 72-84) assume the fixed pbody layout fits in 1024 bytes; output_color indexes name[output_color-1] with output_color validated to 1..8 at line 55, so that part is safe, but the profile description guard silently drops the description rather than being a hard invariant. Low memory-safety risk but fragile; worth hardening.","fix":"Assert/verify the computed oprof[0] size never exceeds phead[0], and bound all writes into oprof explicitly.","locations":[{"ref":"src/postprocessing/postprocessing_utils_dcrdefs.cpp:61-97","code":"   61 |     prof_desc_len = snprintf(NULL, 0, \"%s gamma %g toe slope %g\", name[output_color - 1],\n   62 |                              floor(1000. / gamm[0] + .5) / 1000., floor(gamm[1] * 1000.0 + .5) / 1000.) +\n   63 |                     1;\n   64 |     prof_desc.resize(prof_desc_len);\n   65 |     sprintf(prof_desc.data(), \"%s gamma %g toe slope %g\", name[output_color - 1], floor(1000. / gamm[0] + .5) / 1000.,\n   66 |             floor(gamm[1] * 1000.0 + .5) / 1000.);\n   67 | \n   68 | \toprof = (unsigned *)calloc(phead[0], 1);\n   69 |     memcpy(oprof, phead, sizeof phead);\n   70 |     if (output_color == 5)\n   71 |       oprof[4] = oprof[5];\n   72 |     oprof[0] = 132 + 12 * pbody[0];\n   73 |     for (i = 0; i < (int)pbody[0]; i++)\n   74 |     {\n   75 |       oprof[oprof[0] / 4] = i ? (i > 1 ? 0x58595a20 : 0x6 ory header */\n  413 |     DS = &x3f->directory_section;\n  414 |     GET4(DS->identifier);\n  415 |     GET4(DS->version);\n  416 |     GET4(DS->num_directory_entries);\n  417 | \n  418 |     if (DS->num_directory_entries > 50)\n  419 |       goto _err; // too much direntries, most likely broken file\n  420 | \n  421 |     if (DS->num_directory_entries > 0)\n  422 |     {\n  423 |       size_t size = DS->num_directory_entries * sizeof(x3f_directory_entry_t);\n  424 |       DS->directory_entry = (x3f_directory_entry_t *)x3f_limited_calloc(1, size);\n  425 |     }","lines":18}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"true_decode_one_color guards 'if (rows != area->rows || cols < area->columns) throw'. The x3rgb16 buffer is allocated with columns = ID->columns (or Q->plane[0].columns) but for the Quattro plane-2 path 'area' is switched to Q->top16 whose rows/columns come from Q->plane[2] read from the file; the write 'dst += area->channels' over rows*area->columns elements is only safe if the allocation used the same plane[2] dims. The relationship between plane[2].rows/columns and the top16 allocation (which used plane[2] too) holds, but the guard compares against area->columns AFTER possibly switching area, while rows/cols were overwritten from Q->plane[color] - a mismatch between plane[2] and plane[0] dimensions for color==2 vs the buffer is not fully validated. Worth hardening: confirm cols/rows used for the loop never exceed the allocated area extent for every color.","fix":"Explicitly validate, per color, that rows*area->row_stride (or rows, cols vs area->rows/columns/channels) fit the allocated buffer before writing.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:987-1033","code":"  987 |   if (ID->type_format == X3F_IMAGE_RAW_QUATTRO ||\n  988 |       ID->type_format == X3F_IMAGE_RAW_SDQ ||\n  989 |       ID->type_format == X3F_IMAGE_RAW_SDQH ||\n  990 |       ID->type_format == X3F 25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In crxDecodeLineNoRefPrevLine the guard `else if (i > param->subbandWidth) return -1;` (when the leading bit is 0) can never be true at that point because the loop condition is `i < subbandWidth-1`, so i is always < subbandWidth-1 there. This dead/incorrect check suggests the intended bounds guard (i >= subbandWidth) is missing, leaving the subsequent memset(lineBuf1+i+1, ...) and index increments without a proper upper-bound assertion against subbandWidth.","fix":"Replace the impossible `i > subbandWidth` test with a correct bound and verify nSyms cannot push writes past lineBuf1/lineBuf2 allocations (paramLength = 2*subbandWidth+4).","locations":[{"ref":"src/decoders/crx.cpp:612-619","code":"  612 |       else if (i > param->subbandWidth)\n  613 |         return -1;\n  614 | \n  615 |       if (nSyms > 0)\n  616 |       {\n  617 |         memset(param->lineBuf1 + i + 1, 0, nSyms * sizeof(int32_t));\n  618 |         memset(param->lineBuf2 + i, 0, nSyms * sizeof(int32_t));\n  619 |         i += nSyms;","lines":8}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"crxLoadRaw passes (int16_t *)imgdata.rawdata.raw_image to crxSetupImageData as outBuf but does not verify raw_image is allocated large enough for planeWidth*planeHeight*(planes layout) for this header. The allocation of raw_image happens elsewhere based on sizes that may differ from the CR3 header values used here, and crxConvertPlaneLine writes via outBufs offsets with no size argument, so a mismatch is an OOB write.","fix":"Pass the raw_image buffer size into the crx code and bound-check every outBufs write, or assert planeWidth/planeHeight match the dimensions raw_image was allocated for.","locations":[{"ref":"src/decoders/crx.cpp:2704-2707","code":" 2704 |   if (crxSetupImageData(&hdr, &img, (int16_t *)imgdata.rawdata.raw_image,\n 2705 | \t  libraw "severity":"low","easy":false,"description":"lossless_jpeg_load_raw validates 'if (row > raw_height) throw' (note: > not >=) before the RAW(row,col) guard, and uses cr2_slice[1+j] as a divisor after a NULL-ish check '!cr2_slice[1+j]'. The off-by-one in the row>raw_height check is harmless only because the subsequent '(unsigned)row<raw_height' guard gates the actual write, making the earlier throw misleading/inconsistent.","fix":"Make the early check 'row >= raw_height' for clarity/consistency, or remove it and rely solely on the unsigned write guard.","locations":[{"ref":"src/decoders/decoders_dcraw.cpp:588-595","code":"  588 |         if (raw_width == 3984 && (col -= 2) < 0)\n  589 |           col += (row--, raw_width);\n  590 |         if (row > raw_height)\n  591 |           throw LIBRAW_EXCEPTION_IO_CORRUPT;\n  592 |         if (((unsigned)row < raw_height) && ((unsigned)col < raw_width))\n  593 |           RAW(row, col) = val;\n  594 |         if (++col >= raw_width)\n  595 |           col = (row++, 0);","lines":8}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"panasonicC7_load_raw computes rowbytes = raw_width/pixperblock*16 and reads rowbytes*rowstep into iobuf, then the per-row loop advances bytes += 16 for each block of pixperblock columns. Because rowbytes uses integer truncation of raw_width/pixperblock, a raw_width not divisible by pixperblock leaves the final columns of each row undecoded while the bytes pointer marches across the shared iobuf for all 16 rows; there is no check that bytes stays within rowbytes*rowstep, relying on the truncation matching. calloc result is also unchecked.","fix":"Check calloc result; assert bytes offset < rowbytes*rowstoread each block, or bound the column loop precisely to the decoded block count.","locations":[{"ref":"src/decoders/decoders_libraw.cpp:538-593","code":"  538 | void LibRaw::panasonicC7_load_raw()\n  539 | {\n  540 |   const int rowstep = 16;\ error","type_label":"Logic Error","severity":"low","easy":false,"description":"In olympus_load_raw(), the inner `int32_t gcode` declared at the decode call shadows the outer `gcode` declared at function top. The outer gcode is only ever assigned glc and read as `p` (previous code), while all arithmetic and the predictor update (lpred = gcode + N) use the inner one. The shadowing makes the intent fragile and the outer variable effectively just a one-iteration delayed copy of glc; a future edit could easily mis-wire predictor state. Also line 290 contains a redundant self-assignment `NW = NW = raw_image[...]`.","fix":"Rename the inner variable (e.g. decoded_code) to remove shadowing and clarify which value feeds the predictor; remove the redundant `NW =` self-assignment on line 290.","locations":[{"ref":"src/decoders/olympus14.cpp:237-312","code":"  237 | \tint32_t lpred = 0, pred1 = 0, glc = 0, gcode=0;\n  238 | \n  239 | \tfor (uint32_t row = 0; row < imgdata.sizes.raw_height; row++)\n  240 | \t{\n  241 | \t\tcheckCancel();\n  242 | \t\tfor (uint32_t col = 0; col < raw_width; col++)\n  243 | \t\t{\n  244 |           int32_t wbits, vbits, t640bits, t643bits;\n  245 |           int32_t p = gcode;\n  246 | \t\t  gcode = glc;\n  247 | \t\t  int32_t psel = ((col>1) && one_shl_tag645 >= p) ? context[3] + 1 : 0;\n  248 | \t\t  context[3] = context[2];\n  249 | \t\t  context[2] = psel;\n  250 |           if (col>1)\n  251 |           {\n  252 |             int highbitcount = bitcounts[p & 0xffff];\n  253 |             int32_t T1 = ((col > 1) && (psel >= tag0x646)) ? tag0x648 : tag0x650;\n  254 |             int32_t T2 = ((col > 1) && (psel >= tag0x646)) ? tag0x647 : tag0x649;\n  255 |             int32_t TT = MAX((highbitcount - T1),-1);\n  256 |             wbits = T2 + TT + 1;\n  257 |           }\n  258 | \t\t  else\n  259 | \t\t\t  wbits = tag0x649;\n  260 | \n  261 | \t\t  if (wbits > tag0x651) \n  262 |             wbits = tag0x651;\n  263 | \n  264 |           if (wb n  312 |           lpred = gcode + N;","lines":76},{"ref":"src/decoders/olympus14.cpp:290","code":"  290 |           int32_t NW = (row < 2 || col < 2)? tag0x642 : NW = raw_image[(row - 2) * raw_width + col - 2] >> tag0x640;","lines":1}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In DecodeC8 (pana8), `bool _extrahuff = (extrahuff.size() >= 0x10000);` and `gammatable` selection use >= comparisons that are fine, but the dead `#ifdef PANA8_FULLY_BUFFERED` branch references `source` which is not a member of the class/function scope; that code path would not compile if the macro were defined. It is effectively dead/unmaintained code carrying a latent build break.","fix":"Remove the PANA8_FULLY_BUFFERED dead branch or fix it to reference a valid buffer; keep only the bufio path.","locations":[{"ref":"src/decoders/pana8.cpp:198-203","code":"  198 | #ifdef PANA8_FULLY_BUFFERED\n  199 |   const uint8_t\t*inputbyteptr = source.data();\n  200 |   uint32_t\tjobsz_in_qwords = source.size() >> 3;\n  201 | #else\n  202 |   uint32_t jobsz_in_qwords = bufio.size() >> 3;\n  203 | #endif","lines":6}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"smal_decode_segment indexes hist[s][bin+5] in the search loop 'for (bin=0; hist[s][bin+5] > count; bin++)'. hist[s] has 13 entries; termination relies on a trailing 0 entry (index 12 for s=0/1, index 8 for s=2) being <= count. If count becomes negative (count is derived from file-driven data/range/high via signed integer division and can be < 0), no hist entry satisfies '<= count' and bin increments until bin+5 reads past hist[s] (stack OOB read), and the later hist[s][i+5] updates then write OOB.","fix":"Clamp count to >= 0 (or bound bin to < 8) before/within the search loop and validate high>>4 != 0 to avoid the division producing an out-of-range count.","locations":[{"ref":"src/decoders/smal.cpp:58-64","code":" {"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In parse_ciff type 0x080a, after fread(make,64,1) and make[63]=0 it does fseek(ifp, strbuflen(make)-63, SEEK_CUR). strbuflen(make) <= 63 so the seek offset is <= 0, i.e. it seeks backward (or not at all) before reading model. This effectively reads 'model' from inside the 'make' field rather than the byte following the 64-byte make region, likely a logic bug in field positioning.","fix":"Recompute the intended offset; if make/model are adjacent fixed 64-byte fields, drop the fseek and read model directly, or seek by the actual consumed length.","locations":[{"ref":"src/metadata/ciff.cpp:123-130","code":"  123 |     else if (type == 0x080a)\n  124 |     {\n  125 |       fread(make, 64, 1, ifp);\n  126 |       make[63] = 0;\n  127 |       fseek(ifp, strbuflen(make) - 63, SEEK_CUR);\n  128 |       fread(model, 64, 1, ifp);\n  129 |       model[63] = 0;\n  130 | ","lines":8}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"parseFujiMakernotes() serial parsing (tag 0x0010): ystr[16] is not zero-initialized before the hex-decode loop \"for (j=...) ystr[j/2]=c\". Only even indices are written and then ystr[ynum_len+1]=0 terminates, but if the loop terminates early (sscanf fails) intermediate ystr bytes between the last written index and ynum_len+1 remain uninitialized, and that buffer is then strcpy'd into model2 and embedded via snprintf. Bounded (all indices < 16) but produces nondeterministic output bytes.","fix":"Zero-initialize ystr (char ystr[16] = {0};) before the decode loop.","locations":[{"ref":"src/metadata/fuji.cpp:947-952","code":"  947 |         for (int j = 0; ynum[j] && ynum[j + 1] && sscanf(ynum + j, \"%2x\", &c);\n  948 |              j += 2)\n  949 |           ystr[j / 2] = c;\n  950 |         ynum_len /= 2;\n  951 |         ystr[ynum_len + 1] = 0;\n  952 |         strcpy(model2, ystr) or","severity":"low","easy":true,"description":"normalize_model.cpp Fujifilm alias loop: when fujialias[i] is a non-'@' alias that matches model, it does strcpy(normalized_model, orig). But orig is only updated inside the fujialias loop indirectly - it is the static const char* shared across all maker blocks and is set to fujialias[i]+1 only when a '@' entry is seen. The first table entry \"@DBP for GX680\" sets orig, so a match on the very first data alias works, but the loop relies on orig having been set by the immediately preceding '@' header in the same table; this is correct only because every group starts with '@'. It is a fragile pattern (a leading non-@ entry would copy a stale orig from a previous maker's table). Same shared-orig pattern repeats for nikon/oly/pana/leaf/phase1/samsung/KonicaMinolta alias loops.","fix":"Make orig a local variable per alias loop (or assert the first table entry is always a '@' header) to avoid cross-table stale-pointer copies.","locations":[{"ref":"src/metadata/normalize_model.cpp:404-414","code":"  404 |   static const char *orig;\n  405 | \n  406 |   static const char fujialias[][16] = {\n  407 |     \"@DBP for GX680\", \"DX-2000\",\n  408 |     \"@F500EXR\", \"F505EXR\",\n  409 |     \"@F600EXR\", \"F605EXR\",\n  410 |     \"@F770EXR\", \"F775EXR\",\n  411 |     \"@HS10\", \"HS10 HS11\",\n  412 |     \"@HS20EXR\", \"HS22EXR\",\n  413 |     \"@HS30EXR\", \"HS33EXR\", \"HS35EXR\",\n  414 |     \"@S5100\", \"S5500\",","lines":11},{"ref":"src/metadata/normalize_model.cpp:800-814","code":"  800 |   else if (makeIs(LIBRAW_CAMERAMAKER_Fujifilm))\n  801 |   {\n  802 |     for (i = 0; i < int(sizeof fujialias / sizeof *fujialias); i++)\n  803 |     {\n  804 |       if (fujialias[i][0] == '@')\n  805 |       {\n  806 |         orig = fujialias[i] + 1;\n  807 |         if (!strcmp(model, orig)) break;\n  808 |       }\n  809 |       else if (!strcmp(model, fujialias[i]))\n  810 |       {\n  811 |         strcpy(normalized_model, orig);\n  812 |         break;\n  813 |       }\n  814 |     }","lines":15}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"parseOlympusMakernotes(): the case block for 0x20300108 / 0x20310109 (ColorSpace) has no break before the next label case 0x20500209. After parsing ColorSpace it falls through and executes imOly.AutoFocus = get2(); break;, performing an extra get2() and setting AutoFocus from whatever bytes follow. These are live tags (they do not match the 0x2010/0x2020/0x2040/0x3000 range guards and so reach this switch).","fix":"Add a break; at the end of the 0x20300108/0x20310109 case (after the closing brace of the if/switch, line 734) before case 0x20500209.","locations":[{"ref":"src/metadata/olympus.cpp:716-737","code":"  716 | \t\t\tcase 0x20300108:\n  717 | \t\t\tcase 0x20310109:\n  718 | \t\t\t\tif (dng_writer == nonDNG) {\n  719 |           imOly.ColorSpace = get2();\n  720 |           switch (imOly.ColorSpace) {\n  721 |           case 0:\n  722 |             imCommon.ColorSpace = LIBRAW_COLORSPACE_sRGB;\n  723 |             break;\n  724 |           case 1:\n  725 |             imCommon.ColorSpace = LIBRAW_COLORSPACE_AdobeRGB;\n  726 |             break;\n  727 |           case 2:\n  728 |             imCommon.ColorSpace = LIBRAW_COLORSPACE_ProPhotoRGB;\n  729 |             break;\n  730 |           default:\n  731 |             imCommon.ColorSpace = LIBRAW_COLORSPACE_Unknown;\n  732 |             break;\n  733 |           }\n  734 | \t\t\t\t}\n  735 | \t\t\tcase 0x20500209:\n  736 | \t\t\t\timOly.AutoFocus = get2();\n  737 | \t\t\t\tbreak;","lines":22}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"parseRicohMakernotes() tag 0x0005 fallback: sprintf(BodySerial, \"%02x%02x%02x%02x\", buffer[4], buffer[5], buffer[6], buffer[7]) passes plain char values (buffer is char[17], char is signed on most platforms) to a %02x conversion t ow_stride even though the 64-bit 'offset' was validated; the actual pointer arithmetic uses the 32-bit product.","fix":"Use the already-computed 64-bit 'offset' for the pointer: (unsigned char*)ID->data + offset, not 'row * row_stride' in int.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:1162-1170","code":" 1162 |   uint64_t needed = uint64_t(ID->columns) * sizeof(uint32_t);\n 1163 |   uint64_t offset = uint64_t(row) * uint64_t(row_stride);\n 1164 | \n 1165 |   if (row_stride < needed)\n 1166 |     throw LIBRAW_EXCEPTION_IO_CORRUPT;\n 1167 |   if (offset > uint64_t(ID->data_size) || needed > uint64_t(ID->data_size) - offset)\n 1168 |     throw LIBRAW_EXCEPTION_IO_CORRUPT;\n 1169 | \n 1170 |   uint32_t *data = (uint32_t *)((unsigned char *)ID->data + row * row_stride);","lines":9}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"In rpi_load_raw8 the inner pixel loop writes RAW(row, col + c) and reads dp[c], but c is never set inside this loop - it still holds the value dwide left over from the preceding FORC(dwide) byte-reorder loop. So every pixel is read from dp[dwide] (out of the intended position) and written to RAW(row, col + dwide), an out-of-bounds write far past the row. The sibling functions rpi_load_raw12/14/16 correctly use col only. Reachable when compiled with USE_6BY9RPI for RaspberryPi 8-bit raws.","fix":"Use 'RAW(row, col) = dp[0];' (drop the stray c), matching the intended 1-byte-per-pixel layout.","locations":[{"ref":"src/decoders/decoders_libraw_dcrdefs.cpp:302-303","code":"  302 | \t\tfor (dp = data, col = 0; col < raw_width; dp++, col++)\n  303 | \t\t\tRAW(row, col + c) = dp[c];","lines":2}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"X-Trans allhex bounds tracking copy-paste bug. minh/maxh are computed from v (the vertical component) instead of h (the horizontal component): lines 85-86 use MIN/MAX(v, ...) where they must use h. allhex entries are h + v*width (line 87), and the validation at lines 98-99 checks them against [minh + minv*width - 1, maxh + maxv*width + 1]. Because minh/maxh actually mirror minv/maxv (the v-range) rather than the h-range, the validation bound is wrong: a pattern whose h offset exceeds the v range will pass the check yet produce an allhex offset that, when used as a pixel pointer offset (pix[hex[c]] etc.), reads out of the image buffer. dcraw uses minh = MIN(h, minh)/maxh = MAX(h, maxh). This is a real OOB-read enabler from an untrusted X-Trans pattern.","fix":"Change line 85 to minh = MIN(h, minh); and line 86 to maxh = MAX(h, maxh);","locations":[{"ref":"src/demosaic/xtrans_demosaic.cpp:85-86","code":"   85 |                 minh = MIN(v, minh);\n   86 |                 maxh = MAX(v, maxh);","lines":2},{"ref":"src/demosaic/xtrans_demosaic.cpp:98-100","code":"   98 |           if (allhex[i][j][k][l] > maxh + maxv * width + 1 ||\n   99 |               allhex[i][j][k][l] < minh + minv * width - 1)\n  100 |             throw LIBRAW_EXCEPTION_IO_CORRUPT;","lines":3}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"libraw_sgetreal_static() reads from the wrong buffer position for DOUBLE and the default case. For LIBRAW_EXIFTAG_TYPE_DOUBLE it does `u.c[i ^ rev] = *(s+1)` inside the loop over i (0..7), copying the same byte (s[1]) eight times instead of `*(s+i)`; the default case returns `*(s+1)` instead of `*s`. This is a copy of the file-based getreal() which uses fgetc(ifp) sequentially. Result: DOUBLE EXIF/maker-note values parsed via the static (buffer) path are decoded from garbage, and only one source byte is bounds-relevant though sgetreal callers (checked_buffer_t::sgetreal) only validate `offset+sz`, so the reads stay in-buffer but the value is wrong.","fix":"Use `u.c[i ^ rev] = *(s + i)` in the DOUBLE loop and `return *s` (or *(s+0)) in the default case, matching getreal().","locations":[{"ref":"src/utils/read_utils.cpp:159-166","code":"  159 |   case LIBRAW_EXIFTAG_TYPE_DOUBLE:\n  160 |     rev = 7 * ((_order == 0x4949) == (ntohs(0x1234) == 0x1234));\n  161 |     for (i = 0; i < 8; i++)\n  162 |       u.c[i ^ rev] = *(s+1);\n  163 |     return u.d;\n  164 |   default:\n  165 |     return *(s+1);\n  166 |   }","lines":8}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In the PPM thumbnail color-recalculation branch, the size comparisons use T.tlength where T.theight is clearly intended: `total_size == T.twidth * T.tlength * 3` and `total_size == T.twidth * T.tlength`. T.tlength is a byte length, not the image height, so the colors recalculation (tcolors=3 vs 1) is computed from the wrong quantity. This is a logic/copy-paste bug affecting color-channel detection (not directly memory-unsafe because T.tlength is later set to total_size and bounded).","fix":"Use T.theight: `if (total_size == (INT64)T.twidth * T.theight * 3) T.tcolors = 3; else if (total_size == (INT64)T.twidth * T.theight) T.tcolors = 1;`","locations":[{"ref":"src/decoders/unpack_thumb.cpp:313-319","code":"  313 |             if (total_size != (unsigned)t_length) // recalculate colors\n  314 |             {\n  315 |               if (total_size == T.twidth * T.tlength * 3)\n  316 |                 T.tcolors = 3;\n  317 |               else if (total_size == T.twidth * T.tlength)\n  318 |                 T.tcolors = 1;\n  319 |             }","lines":7}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"parse_fuji() tag 0x2f00: the WB-correction block writes to icWBC[LIBRAW_WBI_Custom1 + wb_ind] but wb_ind is itself the loop variable already ranging over LIBRAW_WBI_Custom1..LIBRAW_WBI_Custom1+nWBs (i.e. 90..95). So it reads/writes icWBC[180..185] instead of the entries just filled at icWBC[wb_ind]. The correctly-written sibling code in parseAdobeRAFMakernote() (0x2f00 / get_average_WB) uses icWBC[wb_ind][...] without the extra +LIBRAW_WBI_Custom1. Result is corruption of unrelated WB slots and the correction never applied to the intended slot. (No OOB since icWBC is [256][4], but a clear logic/copy-paste bug; only triggers for S2Pro/S20Pro/F700/S5000/S7000/DBP/DX-2000.)","fix":"Drop the LIBRAW_WBI_Custom1 offset: use icWBC[wb_ind][0] and icWBC[wb_ind][2], matching the indexed form used in parseAdobeRAFMakernote().","locations":[{"ref":"src/metadata/fuji.cpp:1304-1313","code":" 1304 |       for (int wb_ind = LIBRAW_WBI_Custom1; wb_ind < LIBRAW_WBI_Custom1+nWBs; wb_ind++) {\n 1305 |         FORC4 icWBC[wb_ind][GRGB_2_RGBG(c)] = get2();\n 1306 |         if ((len >= unsigned(4+16*nWBs)) && average_WBData) {\n 1307 |           FORC4 icWBC[wb_ind][GRGB_2_RGBG(c)] =\n 1308 |                   (icWBC[wb_ind][GRGB_2_RGBG(c)] +get2()) /2;\n 1309 |         }\n 1310 |         if (use_WBcorr_coeffs) {\n 1311 |           icWBC[LIBRAW_WBI_Custom1 + wb_ind][0] = int(icWBC[LIBRAW_WBI_Custom1 + wb_ind][0] * wbR_corr);\n 1312 |           icWBC[LIBRAW_WBI_Custom1 + wb_ind][2] = int(icWBC[LIBRAW_WBI_Custom1 + wb_ind][2] * wbB_corr);\n 1313 |         }","lines":10}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"malloc_omp_buffers may return buffers whose entries are NULL, and AHD uses them unchecked. malloc_omp_buffers (src/utils/utils_libraw.cpp:644-653) calloc's each per-thread buffer without checking the result and never propagates failure. ahd_interpolate stores the returned array (line 306) and immediately casts/derefs buffer (lines 335-347) inside the tile loop with no NULL check, so a failed per-thread allocation yields a NULL-pointer write into rgb/lab/homo.","fix":"Make malloc_omp_buffers check each calloc and signal failure (return NULL / free partial), and have ahd_interpolate verify buffers and each buffer[i] before use, throwing LIBRAW_EXCEPTION_ALLOC otherwise.","locations":[{"ref":"src/demosaic/ahd_demosaic.cpp:306-347","code":"  306 |     char** buffers = malloc_omp_buffers(buffer_count, buffer_size);\n  307 | \n  308 | #ifdef LIBRAW_USE_OPENMP\n  309 | #pragma omp parallel for schedule(dynamic) default(none) shared(terminate_flag) firstprivate(buffers)\n  310 | #endif\n  311 |     for (int top = 2; top < height - 5; top += LIBRAW_AHD_TILE - 6)\n  312 |     {\n  313 | #ifdef LIBRAW_USE_OPENMP\n  314 |         if (0 == omp_get_thread_num())\n  315 | #endif\n  316 |             if (callbacks.progress_cb)\n  317 |             {\n  318 |                 int rr = (*callbacks.progress_cb)(callbacks.progresscb_data,\n  319 |                     LIBRAW_PROGRESS_INTERPOLATE,\n  320 |                     top - 2, height - 7);\n  321 |                 if (rr)\n  322 |                     terminate_flag = 1;\n  323 |             }\n  324 | \n  325 | #if defined(LIBRAW_USE_OPENMP)\n  326 |         char* buffer = buffers[omp_get_thread_num()];\n  327 | #else\n  328 |         char* buffer = buffers[0];\n  329 | #endif\n  330 | \n  331 |         ushort(*rgb)[LIBRAW_AHD_TILE][LIBRAW_AHD_TILE][3];\n  332 |         short(*lab)[LIBRAW_AHD_TILE][LIBRAW_AHD_TILE][3];\n  333 |         char(*homo)[LIBRAW_AHD_TILE][2];\n  334 | \n  335 |         rgb = (ushort(*)[LIBRAW_AHD_TILE][LIBRAW_AHD_TILE][3])buffer;\n  336 |         lab = (short(*)[LIBRAW_AHD_TILE][LIBRAW_AHD_TILE][3])(\n  337 |             buffer + 12 * LIBRAW_AHD_TILE * LIBRAW_AHD_TILE);\n  338 |         homo = (char(*)[LIBRAW_AHD_TILE][2])(buffer + 24 * LIBRAW_AHD_TILE *\n  339 |             LIBRAW_AHD_TILE);\n  340 | \n  341 |         for (int left = 2; !terminate_flag && (left < width - 5);\n  342 |             left += LIBRAW_AHD_TILE - 6)\n  343 |         {\n  344 |             ahd_interpolate_green_h_and_v(top, left, rgb);\n  345 |             ahd_interpolate_r_and_b_and_convert_to_cielab(top, left, rgb, lab);\n  346 |             ahd_interpolate_build_homogeneity_map(top, left, lab, homo);\n  347 |             ahd_interpolate_combine_homogeneous_pixels(top, left, rgb, homo);","lines":42},{"ref":"src/utils/utils_libraw.cpp:644-652","code":"  644 | char** LibRaw::malloc_omp_buffers(int buffer_count, size_t buffer_size)\n  645 | {\n  646 |     char** buffers = (char**)calloc(sizeof(char*), buffer_count);\n  647 | \n  648 |     for (int i = 0; i < buffer_count; i++)\n  649 |     {\n  650 |         buffers[i] = (char*)calloc(buffer_size,1);\n  651 |     }\n  652 |     return buffers;","lines":9}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"DHT constructor allocations are unchecked for NULL. nraw = malloc(...) (line 220) and ndir = calloc(...) (line 222) are never tested. On a large/crafted image where the allocation fails, the very next loops dereference nraw (lines 224-228 read image[0] then write nraw[i][0..2]) and later ndir, causing a NULL dereference / crash. All other demosaic allocators in this tree either check (AAHD) or should; DHT does not.","fix":"After each allocation, test for NULL; if either fails (free the other) and throw LIBRAW_EXCEPTION_ALLOC.","locations":[{"ref":"src/demosaic/dht_demosaic.cpp:220-228","code":"  220 |   nraw = (float3 *)malloc(nr_height * nr_width * sizeof(float3));\n  221 |   int iwidth = libraw.imgdata.sizes.iwidth;\n  222 |   ndir = (char *)calloc(nr_height * nr_width, 1);\n  223 |   channel_maximum[0] = channel_maximum[1] = channel_maximum[2] = 0;\n  224 |   channel_minimum[0] = libraw.imgdata.image[0][0];\n  225 |   channel_minimum[1] = libraw.imgdata.image[0][1];\n  226 |   channel_minimum[2] = libraw.imgdata.image[0][2];\n  227 |   for (int i = 0; i < nr_height * nr_width; ++i)\n  228 |     nraw[i][0] = nraw[i][1] = nraw[i][2] = 0.5;","lines":9}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"X-Trans interpolate uses malloc_omp_buffers result without NULL checks. buffers = malloc_omp_buffers(...) at line 175; the per-thread buffer is cast and dereferenced at lines 193-207 (memcpy into rgb) with no validation. Since malloc_omp_buffers does not check its inner calloc, an allocation failure on a large image leads to a NULL write. buffer_size = LIBRAW_AHD_TILE*LIBRAW_AHD_TILE*(ndir*11+6) is large (>~3MB) so failure is plausible under memory pressure.","fix":"Validate buffers and buffers[thread] for NULL before use; throw LIBRAW_EXCEPTION_ALLOC on failure (and fix malloc_omp_buffers to detect allocation failure).","locations":[{"ref":"src/demosaic/xtrans_demosaic.cpp:174-207","code":"  174 |   size_t buffer_size = LIBRAW_AHD_TILE * LIBRAW_AHD_TILE * (ndir * 11 + 6);\n  175 |   char** buffers = malloc_omp_buffers(buffer_count, buffer_size);\n  176 | \n  177 | #if defined(LIBRAW_USE_OPENMP)\n  178 | # pragma omp parallel for schedule(dynamic) default(none) firstprivate(buffers, allhex, passes, sgrow, sgcol, ndir) shared(dir) \n  179 | #endif\n  180 |     for (int top = 3; top < height - 19; top += LIBRAW_AHD_TILE - 16)\n  181 |     {\n  182 | #if defined(LIBRAW_USE_OPENMP)\n  183 |         char* buffer = buffers[omp_get_thread_num()];\n  184 | #else\n  185 |         char* buffer = buffers[0];\n  186 | #endif\n  187 | \n  188 |         ushort(*rgb)[LIBRAW_AHD_TILE][LIBRAW_AHD_TILE][3], (*rix)[3];\n  189 |         short(*lab)[LIBRAW_AHD_TILE][3], (*lix)[3];\n  190 |         float(*drv)[LIBRAW_AHD_TILE][LIBRAW_AHD_TILE];\n  191 |         char(*homo)[LIBRAW_AHD_TILE][LIBRAW_AHD_TILE];\n  192 | \n  193 |         rgb = (ushort(*)[LIBRAW_AHD_TILE][LIBRAW_AHD_TILE][3])buffer;\n  194 |         lab = (short(*)[LIBRAW_AHD_TILE][3])(\n  195 |             buffer + LIBRAW_AHD_TILE * LIBRAW_AHD_TILE * (ndir * 6));\n  196 |         drv = (float(*)[LIBRAW_AHD_TILE][LIBRAW_AHD_TILE])(\n  197 |             buffer + LIBRAW_AHD_TILE * LIBRAW_AHD_TILE * (ndir * 6 + 6));\n  198 |         homo = (char(*)[LIBRAW_AHD_TILE][LIBRAW_AHD_TILE])(\n  199 |             buffer + LIBRAW_AHD_TILE * LIBRAW_AHD_TILE * (ndir * 10 + 6));\n  200 | \n  201 |         for (int left = 3; left < width - 19; left += LIBRAW_AHD_TILE - 16)\n  202 |         {\n  203 |             int mrow = MIN(top + LIBRAW_AHD_TILE, height - 3);\n  204 |             int mcol = MIN(left + LIBRAW_AHD_TILE, width - 3);\n  205 |             for (int row = top; row < mrow; row++)\n  206 |                 for (int col = left; col < mcol; col++)\n  207 |                     memcpy(rgb[0][row - top][col - left], image[row * width + col], 6);","lines":34}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"Multiple Sony/Canon/Nikon code paths call calloc()/malloc() for makernote tables and immediately fread/index them without checking the allocation result for NULL. Examples: parseSonyMakernotes calloc(len,1) for tag tables (0x9050, 0x9400, etc.), process_Sony_0x940e malloc(len) at line 1117, Canon afdata calloc at canon.cpp:886, Nikon ShotInfo_buf calloc at nikon.cpp:694 and LensData_buf calloc at nikon.cpp:827. On allocation failure these dereference a NULL pointer (crash / DoS) on crafted large or fragmented inputs. len is bounded (<256000 in Sony) but allocation can still fail under memory pressure.","fix":"Check each allocation for NULL and bail out (return / skip tag) before fread/indexing, as is done elsewhere in LibRaw via throw LIBRAW_EXCEPTION_ALLOC.","locations":[{"ref":"src/metadata/sony.cpp:1117-1119","code":" 1117 |     imCommon.afdata[imCommon.afcount].AFInfoData = (uchar *)malloc(imCommon.afdata[imCommon.afcount].AFInfoData_length);\n 1118 |     FORC((int)imCommon.afdata[imCommon.afcount].AFInfoData_length)\n 1119 |       imCommon.afdata[imCommon.afcount].AFInfoData[c] = SonySubstitution[buf[c]];","lines":3},{"ref":"src/metadata/canon.cpp:885-888","code":"  885 |         imCommon.afdata[imCommon.afcount].AFInfoData =\n  886 |             (uchar *)calloc(imCommon.afdata[imCommon.afcount].AFInfoData_length+1, 1);\n  887 |         fread(imCommon.afdata[imCommon.afcount].AFInfoData, imCommon.afdata[imCommon.afcount].AFInfoData_length, 1,\n  888 |               ifp);","lines":4},{"ref":"src/metadata/nikon.cpp:694-701","code":"  694 |       ShotInfo_buf = (uchar *)calloc(ShotInfo_len+1,1);\n  695 | \n  696 | /* for dump:\n  697 | cj_block = (uchar *)malloc(ShotInfo_len);\n  698 | ck_block = (uchar *)malloc(ShotInfo_len);\n  699 | */\n  700 | \n  701 |       fread(ShotInfo_buf, ShotInfo_len, 1, ifp);","lines":8},{"ref":"src/metadata/nikon.cpp:827-828","code":"  827 |         LensData_buf = (uchar *)calloc(LensData_len+1,1);\n  828 |         fread(LensData_buf, LensData_len, 1, ifp);","lines":2}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"realloc() return value is assigned directly to imgdata.image and then memset() unconditionally. If realloc fails it returns NULL: the original buffer is leaked and memset(NULL, ...) dereferences a null pointer (crash). The calloc branch is also unchecked, so a subsequent NULL imgdata.image is written through in the copy loops. allocate_sz is attacker-controlled via parsed iheight/iwidth, making allocation failure trivially reachable.","fix":"Use a temporary pointer for realloc/calloc, check for NULL, free old buffer and throw LIBRAW_EXCEPTION_ALLOC on failure before any memset/use.","locations":[{"ref":"src/preprocessing/raw2image.cpp:90-97","code":"   90 |     if (imgdata.image)\n   91 |     {\n   92 |       imgdata.image = (ushort(*)[4])realloc(imgdata.image, allocate_sz * sizeof(*imgdata.image));\n   93 |       memset(imgdata.image, 0, allocate_sz * sizeof(*imgdata.image));\n   94 |     }\n   95 |     else\n   96 |       imgdata.image =\n   97 |           (ushort(*)[4])calloc(allocate_sz, sizeof(*imgdata.image));","lines":8}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"Same unchecked realloc/calloc + unconditional memset pattern as raw2image(). realloc result stored in imgdata.image then memset without NULL check; calloc result also unchecked. alloc_sz derives from parsed dimensions and crop box, so failure is reachable; result is NULL-deref / leak.","fix":"Use temporary pointer, check NULL, throw LIBRAW_EXCEPTION_ALLOC; do not memset on failure.","locations":[{"ref":"src/preprocessing/raw2image.cpp:411-418","code":"  411 |     if (imgdata.image)\n  412 |     {\n  413 |       imgdata.image = (ushort(*)[4])realloc(imgdata.image,\n  414 |                                             alloc_sz * sizeof(*imgdata.image));\n  415 |       memset(imgdata.image, 0, alloc_sz * sizeof(*imgdata.image));\n  416 |     }\n  417 |     else\n  418 |       imgdata.image = (ushort(*)[4])calloc(alloc_sz, sizeof(*imgdata.image));","lines":8}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"crxDecodePlane returns 0 (success) from the middle of the nested tile loop when the levels==0 branch finds a subband with no data (dataSize==0). This `return 0` abandons decoding of all remaining tiles/columns/rows for the plane and reports success, leaving the rest of the output buffer undecoded while callers believe the plane decoded fine. It should continue to the next tile, not return.","fix":"Replace `return 0;` with logic that zeroes this tile's band buffer and continues the tile loop (mirror the per-line handling in crxDecodeLineWithIQuantization).","locations":[{"ref":"src/decoders/crx.cpp:1922-1928","code":" 1922 |       {\n 1923 |         // we have the only subband in this case\n 1924 |         if (!planeComp->subBands->dataSize)\n 1925 |         {\n 1926 |           memset(planeComp->subBands->bandBuf, 0, planeComp->subBands->bandSize);\n 1927 |           return 0;\n 1928 |         }","lines":7}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"Several load_raw helpers calloc a per-row/work buffer and immediately use it without a NULL check, so an allocation failure (size derived from untrusted raw_width) causes a NULL dereference rather than a clean LIBRAW_EXCEPTION_ALLOC.","fix":"Check the result of each calloc/malloc for NULL and throw LIBRAW_EXCEPTION_ALLOC before using the buffer.","locations":[{"ref":"src/decoders/decoders_libraw.cpp:244-256","code":"  244 |   unsigned char *buf = (unsigned char *)calloc(linelen,1);\n  245 |   for (int row = 0; row < S.raw_height; row++)\n  246 |   {\n  247 |     unsigned bytesread =\n  248 |         libraw_internal_data.internal_data.input->read(buf, 1, linelen);\n  249 | \tif (cps == 1)\n  250 | \t{\n  251 | \t\tunsigned short *dest = &imgdata.rawdata.raw_image[pitch * row];\n  252 | \t\t// swab32arr((unsigned *)buf, bytesread / 4);\n  253 | \t\tfor (unsigned int sp = 0, dp = 0;\n  254 | \t\t\tdp < pitch - 3 && sp < linelen - 6 && sp < bytesread - 6;\n  255 | \t\t\tsp += 7, dp += 4)\n  256 | \t\t\tunpack7bytesto4x16_nikon(buf + sp, dest + dp);","lines":13},{"ref":"src/decoders/decoders_libraw.cpp:275-281","code":"  275 |   unsigned char *buf = (unsigned char *)calloc(linelen,1);\n  276 | \n  277 |   for (int row = 0; row < S.raw_height; row++)\n  278 |   {\n  279 |     unsigned bytesread =\n  280 |         libraw_internal_data.internal_data.input->read(buf, 1, linelen);\n  281 |     unsigned short *dest = &imgdata.rawdata.raw_image[pitch * row];","lines":7},{"ref":"src/decoders/decoders_libraw.cpp:543-551","code":"  543 |   unsigned char *iobuf = (unsigned char *)calloc(rowbytes * rowstep,1);\n  544 |   for (int row = 0; row < imgdata.sizes.raw_height - rowstep + 1;\n  545 |        row += rowstep)\n  546 |   {\n  547 |     int rowstoread = MIN(rowstep, imgdata.sizes.raw_height - row);\n  548 |     if (libraw_internal_data. essing/postprocessing_utils.cpp:31","code":"   31 |   unsigned short *lut = (ushort *)malloc((TBLN + 1) * sizeof(unsigned short));","lines":1}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"apply_profile(): output-profile path reads a 4-byte size then calloc(size,1) and fread(oprof,1,size,fp) with the fread return ignored and calloc result unchecked; size is fully attacker-controlled (file content) so a huge value causes a failed/NULL allocation that is then passed to cmsOpenProfileFromMem, and a short file leaves oprof partly uninitialized. Additionally hTransform = cmsCreateTransform(...) is not checked for NULL before cmsDoTransform, and a pre-existing oprof is leaked by the reassignment.","fix":"Check fread return and calloc result, bound size, free any existing oprof first, and verify hTransform != NULL before cmsDoTransform.","locations":[{"ref":"src/write/apply_profile.cpp:47-68","code":"   47 |   else if ((fp = fopen(output, \"rb\")))\n   48 |   {\n   49 |     fread(&size, 4, 1, fp);\n   50 |     fseek(fp, 0, SEEK_SET);\n   51 |     oprof = (unsigned *)calloc(size = ntohl(size),1);\n   52 |     fread(oprof, 1, size, fp);\n   53 |     fclose(fp);\n   54 |     if (!(hOutProfile = cmsOpenProfileFromMem(oprof, size)))\n   55 |     {\n   56 |       free(oprof);\n   57 |       oprof = 0;\n   58 |     }\n   59 |   }\n   60 |   if (!hOutProfile)\n   61 |   {\n   62 |     imgdata.process_warnings |= LIBRAW_WARN_BAD_OUTPUT_PROFILE;\n   63 |     goto quit;\n   64 |   }\n   65 |   RUN_CALLBACK(LIBRAW_PROGRESS_APPLY_PROFILE, 0, 2);\n   66 |   hTransform = cmsCreateTransform(hInProfile, TYPE_RGBA_16, hOutProfile,\n   67 |                                   TYPE_RGBA_16, INTENT_PERCEPTUAL, 0);\n   68 |   cmsDoTransform(hTransform, image, image, width * height);","lines":22}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"x3f_new_from_file's _err / catch cleanup frees DS->directory_entry and x3f, but the per-entry SECp/SECi/SECc handlers may already have allocated nothing here (they only set pointers to NULL), so that is fine; however on the catch path it does NOT call cleanup of any partially built tables and, more importantly, after the directory_entry array is allocated but an exception fires mid-loop, only directory_entry and x3f are freed - acceptable, but the loop also can throw from GETs leaving fields uninitialised that x3f_delete (if ever called on a half-built object) would walk. The real issue: DS->num_directory_entries was already set to the file value before allocation succeeds; if allocation throws, the catch frees directory_entry (NULL) - ok. Minor: inconsistent cleanup paths (_err vs catch) duplicate logic and risk divergence.","fix":"Unify the two cleanup paths into one helper; ensure num_directory_entries is only committed after the array is allocated and zeroed.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:523-540","code":"  523 |   _err:\n  524 |     if (x3f)\n  525 |     {\n  526 |       DS = &x3f->directory_section;\n  527 |       if (DS && DS->directory_entry)\n  528 |         free(DS->directory_entry);\n  529 |       free(x3f);\n  530 |     }\n  531 |     return NULL;\n  532 |   }\n  533 |   catch (...)\n  534 |   {\n  535 |     x3f_directory_section_t *DS = &x3f->directory_section;\n  536 |     if (DS && DS->directory_entry)\n  537 |       free(DS->directory_entry);\n  538 |     free(x3f);\n  539 |     return NULL;\n  540 |   }","lines":18}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"x3f_setup_camf_entries leaves CAMF->entry_table.size = i and element = entry even when a per-type setup (x3f_setup_camf_matrix/property_entry) threw partway, but those throws propagate out of x3f_load_camf without entry_table being attached to CAMF yet (it is set only after the loop). Therefore on exception the partially-built 'entry' array and any property_name/value/matrix allocations inside the entries are leaked (entry is a local not yet stored in CAMF->entry_table). Memory leak on crafted CAMF that throws mid-setup.","fix":"Store entry into CAMF->entry_table incrementally (or use RAII/try-catch) so x3f_delete can free partially built entries; free 'entry' on the exception path.","locations":[{"ref":"src/x3f/x3f_utils_patched.cpp:2017-2090","code":" 2017 | static void x3f_setup_camf_entries(x3f_camf_t *CAMF)\n 2018 | {\n 2019 |   uint8_t *p = (uint8_t *)CAMF->decoded_data;\n 2020 |   uint8_t *end = p + CAMF->decoded_data_size;\n 2021 |   camf_entry_t *entry = NULL;\n 2022 |   int i;\n 2023 | \n 2024 |   for (i = 0; p < end; i++)\n 2025 |   {\n 2026 |     uint32_t *p4 = (uint32_t *)p;\n 2027 | \n 2028 |     switch (*p4)\n 2029 |     {\n 2030 |     case X3F_CMbP:\n 2031 |     case X3F_CMbT:\n 2032 |     case X3F_CMbM:\n 2033 |       break;\n 2034 |     default:\n 2035 |       goto stop;\n 2036 |     }\n 2037 | \n 2038 |     /* TODO: lots of realloc - may be inefficient */\n 2039 |     entry = (camf_entry_t *)x3f_limited_realloc(entry, (i + 1) * sizeof(camf_entry_t));\n 2040 | \n 2041 |     /* Pointer */\n 2042 |     entry[i].entry = p;\n 2043 | \n 2044 |     /* Header */\n 2045 |     entry[i].id = *p4++;\n 2046 |     entry[i].version = *p4++;\n 2047 |     entry[i].entry_size = *p4++;\n 2048 |     entry[i].name_offset = *p4++;\n 2049 |     entry[i].value_offset = *p4++;\n 2050 | \n 2051 |     /* Compute addresses and sizes */\n 2052 |     entry[i].name_address = (char *)(p + entry[i].name_offset);\n 2053 |     entry[i].value_address = p + entry[i].value_offset;\n 2054 |     entry[i].name_size = entry[i].value_offset - entry[i].name_offset;\n 2055 |     entry[i].value_size = entry[i].entry_size - entry[i].value_offset;\n 2056 | \n 2057 |     entry[i].text_size = 0;\n 2058 |     entry[i].text = NULL;\n 2059 |     entry[i].property_num = 0;\n 2060 |     entry[i].property_name = NULL;\n 2061 |     entry[i].property_value = NULL;\n 2062 |     entry[i].matrix_type = 0;\n 2063 |     entry[i].matrix_dim = 0;\n 2064 |     entry[i].matrix_data_off = 0;\n 2065 |     entry[i].matrix_data = NULL;\n 2066 |     entry[i].matrix_dim_entry = NULL;\n 2067 | \n 2068 |     entry[i].matrix_decoded = NULL;\n 2069 | \n 2070 |     switch (entry[i].id)\n 2071 |     {\n 2072 |     case X3F_CMbP:\n 2073 |       x3f_setup_camf_property_entry(&entry[i]);\n 2074 |       break;\n 2075 |     case X3F_CMbT:\n 2076 |       x3f_setup_camf_text_entry(&entry[i]);\n 2077 |       break;\n 2078 |     case X3F_CMbM:\n 2079 |       x3f_setup_camf_matrix_entry(&entry[i]);\n 2080 |       break;\n 2081 |     }\n 2082 | \n 2083 |     p += entry[i].entry_size;\n 2084 |   }\n 2085 | \n 2086 | stop:\n 2087 | \n 2088 |   CAMF->entry_table.size = i;\n 2089 |   CAMF->entry_table.element = entry;\n 2090 | }","lines":74},{"ref":"src/x3f/x3f_utils_patched.cpp:2092-2122","code":" 2092 | static void x3f_load_camf(x3f_info_t *I, x3f_directory_entry_t *DE)\n 2093 | {\n 2094 |   x3f_directory_entry_header_t *DEH = &DE->header;\n 2095 |   x3f_camf_t *CAMF = &DEH->data_subsection.camf;\n 2096 | \n 2097 |   read_data_set_offset(I, DE, X3F_CAMF_HEADER_SIZE);\n 2098 | \n 2099 |   if (!CAMF->data_size)\n 2100 |     CAMF->data_size = read_data_block(&CAMF->data, I, DE, 0);\n 2101 | \n 2102 |   switch (CAMF->type)\n 2103 |   {\n 2104 |   case 2: /* Older SD9-SD14 */\n 2105 |     x3f_load_camf_decode_type2(CAMF);\n 2106 |     break;\n 2107 |   case 4: /* TRUE ... Merrill */\n 2108 |     x3f_load_camf_decode_type4(CAMF);\n 2109 |     break;\n 2110 |   case 5: /* Quattro ... */\n 2111 |     x3f_load_camf_decode_type5(CAMF);\n 2112 |     break;\n 2113 |   default:\n 2114 |     /* TODO: Shouldn't this be treated as a fatal error? */\n 2115 |     throw LIBRAW_EXCEPTION_IO_CORRUPT;\n 2116 |   }\n 2117 | \n 2118 |   if (CAMF->decoded_data != NULL)\n 2119 |     x3f_setup_camf_entries(CAMF);\n 2120 |   else\n 2121 |     throw LIBRAW_EXCEPTION_IO_CORRUPT;\n 2122 | }","lines":31}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"crxBitstreamGetZeros and crxBitstreamGetBits have `break; // error` paths when the buffer is exhausted, but instead of signalling an error they fall through and return a value computed from stale/zero data (e.g. _BitScanReverse on nextData==0). _BitScanReverse(__builtin_clzl) with a zero mask is undefined, so a truncated stream that reaches the byte-at-a-time error break with nextData==0 invokes UB and returns garbage rather than throwing.","fix":"On the exhaustion `break` paths, throw LIBRAW_EXCEPTION_IO_EOF (as crxFillBuffer does) instead of falling through to _BitScanReverse on a possibly-zero value.","locations":[{"ref":"src/decoders/crx.cpp:261-272","code":"  261 |       if (bitStrm->curBufSize < bitStrm->curPos + 1)\n  262 |         break; // error\n  263 |       nextData = bitStrm->mdatBuf[bitStrm->curPos++];\n  264 |       crxFillBuffer(bitStrm);\n  265 |       if (nextData)\n  266 |         break;\n  267 |       bitsLeft += 8;\n  268 |     }\n  269 |     _BitScanReverse((DWORD *)&nonZeroBit, (DWORD)nextData);\n  270 |     result = (uint32_t)(bitsLeft + 7 - nonZeroBit);\n  271 |     bitStrm->bitData = uint32_t((nextData << (32 - nonZeroBit)) & 0xffffffffu);\n  272 |     bitStrm->bitsLeft = nonZeroBit;","lines":12},{"ref":"src/decoders/crx.cpp:299-308","code":"  299 |     do\n  300 |     {\n  301 |       if (bitStrm->curPos >= bitStrm->curBufSize)\n  302 |         break; // error\n  303 |       bitsLeft += 8;\n  304 |       nextByte = bitStrm->mdatBuf[bitStrm->curPos++];\n  305 |       crxFillBuffer(bitStrm);\n  306 |       bitData |= nextByte << (32 - bitsLeft);\n  307 |     } while (bitsLeft < bits);\n  308 |   }","lines":10}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorre
