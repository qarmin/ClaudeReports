<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"reload_net_wm_user_time_window() dereferences a potentially-NULL window. prev_owner is looked up from a client-supplied window id, then prev_owner_priv = meta_window_x11_get_private (META_WINDOW_X11 (prev_owner)) is computed BEFORE the NULL check on the next line (if (prev_owner && ...)). meta_window_x11_get_private() calls g_type_instance_get_private(), which dereferences the instance pointer; passing NULL crashes. A client can set _NET_WM_USER_TIME_WINDOW to any (unmanaged) window id to trigger this.","fix":"Reorder: only compute prev_owner_priv after confirming prev_owner != NULL, e.g. if (prev_owner) { prev_owner_priv = meta_window_x11_get_private(...); if (prev_owner_priv->user_time_window == value->v.xwindow) { ... } }.","locations":[{"ref":"src/x11/window-props.c:478-486","code":"  478 |       prev_owner = meta_x11_display_lookup_x_window (window->display->x11_display,\n  479 |                                                      value->v.xwindow);\n  480 |       prev_owner_priv = meta_window_x11_get_private (META_WINDOW_X11 (prev_owner));\n  481 |       if (prev_owner && prev_owner_priv->user_time_window == value->v.xwindow)\n  482 |         {\n  483 |           meta_x11_display_unregister_x_window (window->display->x11_display,\n  484 |                                                 value->v.xwindow);\n  485 |           prev_owner_priv->user_time_window = None;\n  486 |         }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"Incorrect cleanup on the winsys context_init failure path in cogl_context_new uses g_free() on a GObject. The context was created with g_object_new (a GObject with refcount 1), but on this error branch it is released with 'g_free (context)' instead of g_object_unref. This skips dispose/finalize entirely, leaking everything already initialized and the GType instance, and frees the GObject memory without running its destructor chain (memory corruption risk if any class data was set up). Note the two later error branches correctly use g_object_unref(context).","fix":"Replace 'g_object_unref (display); g_free (context);' with 'g_object_unref (context);' (dispose already does g_clear_object(&context->display), so do not unref display separately).","locations":[{"ref":"cogl/cogl/cogl-context.c:360-365","code":"  360 |   if (!winsys_class->context_init (winsys, context, error))\n  361 |     {\n  362 |       g_object_unref (display);\n  363 |       g_free (context);\n  364 |       return NULL;\n  365 |     }"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"Touch slot handling can abort or corrupt state on events for unknown touch ids. get_slot() returns GPOINTER_TO_INT(NULL) == 0 when the touch id is not in slot_map, which is indistinguishable from a real slot 0. handle_touch_up() then calls release_slot(device, 0), whose 'g_assert(device->slots[slot].is_acquired)' will abort the compositor if slot 0 isn't acquired, or wrongly release another touch's slot. Additionally, acquire_slot() can return -1 when all MAX_SLOTS are in use; handle_touch_down() does not check this and passes slot=-1 to clutter_virtual_input_device_notify_touch_down(). These events come from EIS clients.","fix":"Make get_slot() return -1 for a missing id (e.g. by storing slot+1 in the hash table, or checking g_hash_table_contains). Bail out of handle_touch_motion/handle_touch_up when get_slot() < 0, and bail out of handle_touch_down when acquire_slot() returns -1.","locations":[{"ref":"src/backends/meta-eis-client.c:696-714","code":"  696 | static int\n  697 | get_slot (MetaEisDevice *device,\n  698 |           uint32_t       touch_id)\n  699 | {\n  700 |   return GPOINTER_TO_INT (g_hash_table_lookup (device->slot_map,\n  701 |                                                GUINT_TO_POINTER (touch_id)));\n  702 | }\n  703 | \n  704 | static void\n  705 | release_slot (MetaEisDevice *device,\n  706 |               int            slot)\n  707 | {\n  708 |   g_assert (device->slots[slot].is_acquired);\n  709 | \n  710 |   device->slots[slot].is_acquired = FALSE;\n  711 |   g_hash_table_remove (device->slot_map,\n  712 |                        GUINT_TO_POINTER (device->slots[slot].eis_touch_id));\n  713 |   device->slots[slot].eis_touch_id = 0;\n  714 | }"},{"ref":"src/backends/meta-eis-client.c:716-785","code":"  716 | static void\n  717 | handle_touch_down (MetaEisClient    *client,\n  718 |                    struct eis_event *event)\n  719 | {\n  720 |   struct eis_device *eis_device = eis_event_get_device (event);\n  721 |   MetaEisDevice *device = eis_device_get_user_data (eis_device);\n  722 |   MetaEisViewport *viewport;\n  723 |   double x, y;\n  724 |   int slot;\n  725 | \n  726 |   x = eis_event_touch_get_x (event);\n  727 |   y = eis_event_touch_get_y (event);\n  728 | \n  729 |   viewport = find_viewport (device, x, y);\n  730 |   if (!viewport)\n  731 |     return;\n  732 | \n  733 |   if (!meta_eis_viewport_transform_coordinate (viewport, x, y, &x, &y))\n  734 |     return;\n  735 | \n  736 |   slot = acquire_slot (device, eis_event_touch_get_id (event));\n  737 |   clutter_virtual_input_device_notify_touch_down (device->device,\n  738 |                                                   g_get_monotonic_time (),\n  739 |                                                   slot,\n  740 |                                                   x, y);\n  741 | }\n  742 | \n  743 | static void\n  744 | handle_touch_motion (MetaEisClient    *client,\n  745 |                      struct eis_event *event)\n  746 | {\n  747 |   struct eis_device *eis_device = eis_event_get_device (event);\n  748 |   MetaEisDevice *device = eis_device_get_user_data (eis_device);\n  749 |   MetaEisViewport *viewport;\n  750 |   double x, y;\n  751 |   int slot;\n  752 | \n  753 |   x = eis_event_touch_get_x (event);\n  754 |   y = eis_event_touch_get_y (event);\n  755 | \n  756 |   viewport = find_viewport (device, x, y);\n  757 |   if (!viewport)\n  758 |     return;\n  759 | \n  760 |   if (!meta_eis_viewport_transform_coordinate (viewport, x, y, &x, &y))\n  761 |     return;\n  762 | \n  763 |   slot = get_slot (device, eis_event_touch_get_id (event));\n  764 | \n  765 |   clutter_virtual_input_device_notify_touch_motion (device->device,\n  766 |                                                     g_get_monotonic_time (),\n  767 |                                                     slot,\n  768 |                                                     x, y);\n  769 | }\n  770 | \n  771 | static void\n  772 | handle_touch_up (MetaEisClient    *client,\n  773 |                  struct eis_event *event)\n  774 | {\n  775 |   struct eis_device *eis_device = eis_event_get_device (event);\n  776 |   MetaEisDevice *device = eis_device_get_user_data (eis_device);\n  777 |   int slot;\n  778 | \n  779 |   slot = get_slot (device, eis_event_touch_get_id (event));\n  780 |   release_slot (device, slot);\n  781 | \n  782 |   clutter_virtual_input_device_notify_touch_up (device->device,\n  783 |                                                 g_get_monotonic_time (),\n  784 |                                                 slot);\n  785 | }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"meta_window_actor_capture_into() unconditionally dereferences the result of meta_window_actor_get_image(). meta_window_actor_get_image() can return NULL (e.g. when priv->surface is NULL, when actor width/height is 0, when the intersected clip is empty, or when offscreen framebuffer creation fails). The subsequent cairo_image_surface_get_data(image)/get_width/etc. and cairo_surface_destroy(NULL) on a NULL surface cause a crash or critical warnings during screen casting.","fix":"After image = meta_window_actor_get_image (...), check 'if (!image) return;' (and consider zero-filling the caller-provided buffer) before using the surface.","locations":[{"ref":"src/compositor/meta-window-actor.c:1428-1465","code":" 1428 |   image = meta_window_actor_get_image (window_actor, bounds);\n 1429 |   cr_data = cairo_image_surface_get_data (image);\n 1430 |   cr_width = cairo_image_surface_get_width (image);\n 1431 |   cr_height = cairo_image_surface_get_height (image);\n 1432 |   cr_stride = cairo_image_surface_get_stride (image);\n 1433 | \n 1434 |   if (cr_width == bounds->width && cr_height == bounds->height)\n 1435 |     {\n 1436 |       memcpy (data, cr_data, cr_height * cr_stride);\n 1437 |     }\n 1438 |   else\n 1439 |     {\n 1440 |       int width = MIN (bounds->width, cr_width);\n 1441 |       int height = MIN (bounds->height, cr_height);\n 1442 |       int stride = width * bpp;\n 1443 |       uint8_t *src, *dst;\n 1444 | \n 1445 |       src = cr_data;\n 1446 |       dst = data;\n 1447 | \n 1448 |       for (int i = 0; i < height; i++)\n 1449 |         {\n 1450 |           memcpy (dst, src, stride);\n 1451 |           if (width < bounds->width)\n 1452 |             memset (dst + stride, 0, (bounds->width * bpp) - stride);\n 1453 | \n 1454 |           src += cr_stride;\n 1455 |           dst += bounds->width * bpp;\n 1456 |         }\n 1457 | \n 1458 |       for (int i = height; i < bounds->height; i++)\n 1459 |         {\n 1460 |           memset (dst, 0, bounds->width * bpp);\n 1461 |           dst += bounds->width * bpp;\n 1462 |         }\n 1463 |     }\n 1464 | \n 1465 |   cairo_surface_destroy (image);"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","description":"clutter_frame_clock_record_flip_time() dereferences frame_clock->prev_dispatch (`Frame *new_frame = frame_clock->prev_dispatch; new_frame->flip_time_us = ...`) with no NULL check. prev_dispatch is only set inside clutter_frame_clock_dispatch(); if record_flip_time() is ever called before the first dispatch (or after a path that cleared prev_dispatch) this is a NULL dereference / crash. Other accessors of these Frame pointers (e.g. notify_presented) guard with g_return_if_fail.","fix":"Add `g_return_if_fail (frame_clock->prev_dispatch != NULL);` (or guard with `if (!new_frame) return;`) before dereferencing prev_dispatch.","locations":[{"ref":"clutter/clutter/clutter-frame-clock.c:1755-1762","code":" 1755 | void\n 1756 | clutter_frame_clock_record_flip_time (ClutterFrameClock *frame_clock,\n 1757 |                                       int64_t            flip_time_us)\n 1758 | {\n 1759 |   Frame *new_frame = frame_clock->prev_dispatch;\n 1760 | \n 1761 |   new_frame->flip_time_us = flip_time_us;\n 1762 | }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","description":"Division by zero if lut_size == 1 when generating gamma LUTs: both generate_gamma_lut() and generate_gamma_lut_from_vcgt() compute with '/ (lut_size - 1)' (and '/ (lut->size - 1)'), which divides by zero when lut_size is 1. lut_size originates from CRTC gamma sizes; a device reporting a gamma ramp size of 1 would crash.","fix":"Guard against lut_size <= 1 (return an identity/clamped LUT) before dividing by (lut_size - 1).","locations":[{"ref":"src/backends/meta-color-profile.c:448-462","code":"  448 |   for (i = 0; i < lut_size; i++)\n  449 |     {\n  450 |       cmsFloat32Number in;\n  451 | \n  452 |       in = (cmsFloat32Number) ((double) i / (double) (lut_size - 1));\n  453 |       lut->red[i] =\n  454 |         (uint16_t) (cmsEvalToneCurveFloat (vcgt[0], in) *\n  455 |                     blackbody_color.R * (double) 0xffff);\n  456 |       lut->green[i] =\n  457 |         (uint16_t) (cmsEvalToneCurveFloat (vcgt[1], in) *\n  458 |                     blackbody_color.G * (double) 0xffff);\n  459 |       lut->blue[i] =\n  460 |         (uint16_t) (cmsEvalToneCurveFloat (vcgt[2], in) *\n  461 |                     blackbody_color.B * (gdouble) 0xffff);\n  462 |     }"},{"ref":"src/backends/meta-color-profile.c:488-496","code":"  488 |   for (i = 0; i < lut_size; i++)\n  489 |     {\n  490 |       uint16_t in;\n  491 | \n  492 |       in = (i * 0xffff) / (lut->size - 1);\n  493 |       lut->red[i] = (uint16_t) (in * blackbody_color.R);\n  494 |       lut->green[i] = (uint16_t) (in * blackbody_color.G);\n  495 |       lut->blue[i] = (uint16_t) (in * blackbody_color.B);\n  496 |     }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","description":"page_flip_feedback_ready() and page_flip_feedback_discarded() call cogl_onscreen_peek_head_frame_info() and immediately dereference frame_info->flags without a NULL check, whereas the sibling handlers notify_view_crtc_presented() (g_return_if_fail) and swap_buffer_result_feedback()/finish_frame_result_feedback() explicitly guard against a NULL frame_info (e.g. after resume-from-suspend empties the frame_info queue, per the comments there). The inconsistency means these two callbacks can NULL-deref under the same conditions the others defensively handle.","fix":"Add a NULL check on frame_info in page_flip_feedback_ready() and page_flip_feedback_discarded() consistent with the other feedback handlers before dereferencing frame_info->flags.","locations":[{"ref":"src/backends/native/meta-onscreen-native.c:530-533","code":"  530 |   CoglFrameInfo *frame_info;\n  531 | \n  532 |   frame_info = cogl_onscreen_peek_head_frame_info (onscreen);\n  533 |   frame_info->flags |= COGL_FRAME_INFO_FLAG_SYMBOLIC;"},{"ref":"src/backends/native/meta-onscreen-native.c:586-587","code":"  586 |   frame_info = cogl_onscreen_peek_head_frame_info (onscreen);\n  587 |   frame_info->flags |= COGL_FRAME_INFO_FLAG_SYMBOLIC;"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"find_index_of_edge_near_position() and find_nearest_position() unconditionally read element 0 of the edges array (g_array_index(edges, MetaEdge*, 0)) before the binary-search loop, with only a comment claiming 'the array only has one element'. If an edge GArray is ever empty (len == 0) this is an out-of-bounds read. The arrays are sized by num_left+num_right etc.; with zero relevant edges the array can be empty, so callers rely on monitor/screen edges always being present. This is a latent OOB if that invariant breaks.","fix":"Guard against edges->len == 0 at the start of both functions (return -1 / edges->len, or the appropriate boundary), instead of reading index 0 unconditionally.","locations":[{"ref":"src/compositor/edge-resistance.c:98-100","code":"   98 |   mid  = 0;\n   99 |   edge = g_array_index (edges, MetaEdge*, mid);\n  100 |   compare = horizontal ? edge->rect.x : edge->rect.y;"},{"ref":"src/compositor/edge-resistance.c:201-203","code":"  201 |   mid  = 0;\n  202 |   edge = g_array_index (edges, MetaEdge*, mid);\n  203 |   compare = horizontal ? edge->rect.x : edge->rect.y;"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"constrain_custom_rule() unconditionally dereferences the transient parent: parent = meta_window_get_transient_for(window); parent_rect = meta_window_config_get_rect(parent->config). Unlike constrain_modal_dialog() (which guards with `if (!parent ... ) return TRUE;`), there is no NULL check. In current code a placement rule is only ever set on xdg-popups which require a parent, so the invariant holds, but the asymmetry with the sibling constraint and the lack of any defensive check make this fragile against future callers/clients that set a placement rule without a transient-for.","fix":"Add a guard mirroring constrain_modal_dialog: `if (!parent) return TRUE;` after fetching the placement rule and before dereferencing parent->config.","locations":[{"ref":"src/core/constraints.c:948-953","code":"  948 |   placement_rule = meta_window_get_placement_rule (window);\n  949 |   if (!placement_rule)\n  950 |     return TRUE;\n  951 | \n  952 |   parent = meta_window_get_transient_for (window);\n  953 |   parent_rect = meta_window_config_get_rect (parent->config);"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"In subsurface_place, if the sibling surface_resource's user_data is NULL (its wl_surface was destroyed but the wl_subsurface request still references it), is_valid_sibling(surface, NULL) returns FALSE and the error branch dereferences sibling->resource (wl_resource_get_id (sibling->resource)) with sibling == NULL, causing a NULL pointer dereference. The required sibling_resource argument is non-NULL but its associated MetaWaylandSurface can be NULL after surface destruction.","fix":"Guard against a NULL sibling before building the error message (use wl_resource_get_id (sibling_resource) instead of sibling->resource, or reject early when sibling is NULL).","locations":[{"ref":"src/wayland/meta-wayland-subsurface.c:376-396","code":"  376 | static void\n  377 | subsurface_place (struct wl_client               *client,\n  378 |                   struct wl_resource             *resource,\n  379 |                   struct wl_resource             *sibling_resource,\n  380 |                   MetaWaylandSubsurfacePlacement  placement)\n  381 | {\n  382 |   MetaWaylandSurface *surface = wl_resource_get_user_data (resource);\n  383 |   MetaWaylandSurface *sibling = wl_resource_get_user_data (sibling_resource);\n  384 |   MetaWaylandSurfaceState *pending_state;\n  385 |   MetaWaylandSubsurfacePlacementOp *op;\n  386 | \n  387 |   if (!is_valid_sibling (surface, sibling))\n  388 |     {\n  389 |       wl_resource_post_error (resource, WL_SUBSURFACE_ERROR_BAD_SURFACE,\n  390 |                               \"wl_subsurface::place_%s: wl_surface@%d is \"\n  391 |                               \"not a valid parent or sibling\",\n  392 |                               placement == META_WAYLAND_SUBSURFACE_PLACEMENT_ABOVE ?\n  393 |                               \"above\" : \"below\",\n  394 |                               wl_resource_get_id (sibling->resource));\n  395 |       return;\n  396 |     }"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","description":"utf8_list_from_results() reads results->prop[results->n_items - 1] unconditionally. validate_or_free_results() is called with must_have_items=FALSE, so n_items can be 0. When n_items==0 this indexes prop[-1], a 1-byte out-of-bounds read before the heap buffer (prop is g_malloc(length+1) with length==0). A client can produce a zero-length UTF8 property to trigger it.","fix":"Guard the trailing-byte check: only do 'if (results->n_items > 0 && results->prop[results->n_items - 1] != '\\0') ++n_strings;' and otherwise treat the empty list as zero strings.","locations":[{"ref":"src/x11/xprops.c:408-418","code":"  408 |   i = 0;\n  409 |   n_strings = 0;\n  410 |   while (i < (int) results->n_items)\n  411 |     {\n  412 |       if (results->prop[i] == '\\0')\n  413 |         ++n_strings;\n  414 |       ++i;\n  415 |     }\n  416 | \n  417 |   if (results->prop[results->n_items - 1] != '\\0')\n  418 |     ++n_strings;"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"xdg_activation_token_v1.set_surface adds the embedded wl_listener 'token->surface_listener' as a destroy listener of the surface resource every time it is called, but never removes a previously registered one. The protocol permits a client to call set_surface multiple times (last call wins). On the second call, the same wl_listener (a single struct embedded in MetaXdgActivationToken) is re-inserted via wl_resource_add_destroy_listener, which links its .link into a second resource's listener list while it is still linked in the first. This corrupts both wl_list chains; when either surface is destroyed (token_handle_surface_destroy / token destructor calls wl_list_remove on a node that is also linked elsewhere) the list becomes inconsistent, leading to memory corruption / use-after-free. Fully client-triggerable.","fix":"In token_set_surface, before re-registering, remove any prior registration: if (token->surface) wl_list_remove (&token->surface_listener.link); then set token->surface and call wl_resource_add_destroy_listener once. (The destructor at line 225 already guards removal with 'if (token->surface)', so keep that invariant consistent.)","locations":[{"ref":"src/wayland/meta-wayland-activation.c:96-107","code":"   96 | static void\n   97 | token_set_surface (struct wl_client   *client,\n   98 |                    struct wl_resource *resource,\n   99 |                    struct wl_resource *surface_resource)\n  100 | {\n  101 |   MetaXdgActivationToken *token = wl_resource_get_user_data (resource);\n  102 |   MetaWaylandSurface *surface = wl_resource_get_user_data (surface_resource);\n  103 | \n  104 |   token->surface = surface;\n  105 |   wl_resource_add_destroy_listener (surface_resource,\n  106 |                                     &token->surface_listener);\n  107 | }"},{"ref":"src/wayland/meta-wayland-activation.c:225-242","code":"  225 |   if (token->surface)\n  226 |     wl_list_remove (&token->surface_listener.link);\n  227 | \n  228 |   g_free (token->app_id);\n  229 |   g_free (token->token);\n  230 |   g_free (token);\n  231 | }\n  232 | \n  233 | static void\n  234 | token_handle_surface_destroy (struct wl_listener *listener,\n  235 |                               void               *data)\n  236 | {\n  237 |   MetaXdgActivationToken *token = wl_container_of (listener, token,\n  238 |                                                    surface_listener);\n  239 | \n  240 |   token->surface = NULL;\n  241 |   wl_list_remove (&token->surface_listener.link);\n  242 | }"}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"Double-unref of the display on two cogl_context_new error paths. The display is reffed into context->display (g_object_ref(display) at line 355), and cogl_context_dispose does g_clear_object(&context->display). On the driver-context-init failure path (lines 371-376) and the fallback-texture failure path (lines 447-452) the code calls BOTH g_object_unref(display) AND g_object_unref(context). g_object_unref(context) triggers dispose which already unrefs display, so display is unref'd one time too many, corrupting the display's refcount (potential use-after-free of the still-shared CoglDisplay).","fix":"Drop the standalone 'g_object_unref (display);' on these branches; rely on g_object_unref(context) -> dispose -> g_clear_object(&context->display) to release the reference exactly once.","locations":[{"ref":"cogl/cogl/cogl-context.c:371-376","code":"  371 |       g_object_unref (display);\n  372 |       g_object_unref (context);\n  373 |       g_set_error (error, G_IO_ERROR, G_IO_ERROR_FAILED,\n  374 |                    \"Failed to initialize context\");\n  375 |       return NULL;\n  376 |     }"},{"ref":"cogl/cogl/cogl-context.c:445-452","code":"  445 |   if (!context->default_gl_texture_2d_tex)\n  446 |     {\n  447 |       g_object_unref (display);\n  448 |       g_free (context);\n  449 |       g_propagate_prefixed_error (error, local_error,\n  450 |                                   \"Failed to create 1x1 fallback texture: \");\n  451 |       return NULL;\n  452 |     }"}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"low","description":"In meta_kms_impl_device_atomic_process_update(), drmModeAtomicFree(req) is called at line 1258 and the freed 'req' pointer is then passed to process_entries(...) at lines 1260-1267 for the page-flip-listener pass. It currently happens to be harmless only because process_page_flip_listener() ignores its 'req' argument, but passing a dangling pointer is fragile and will become a real use-after-free the moment that callback touches req.","fix":"Move the page-flip-listener process_entries() call before drmModeAtomicFree(req), or pass NULL for the req argument in that pass since it is not used after the commit.","locations":[{"ref":"src/backends/native/meta-kms-impl-device-atomic.c:1258-1267","code":" 1258 |   drmModeAtomicFree (req);\n 1259 | \n 1260 |   process_entries (impl_device,\n 1261 |                    update,\n 1262 |                    req,\n 1263 |                    blob_ids,\n 1264 |                    meta_kms_update_get_page_flip_listeners (update),\n 1265 |                    NULL,\n 1266 |                    process_page_flip_listener,\n 1267 |                    NULL);"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"frame_sync_wm_name() assigns frame->wm_name = text_property_to_utf8(...) without first freeing any previous value. Every time WM_NAME changes on the client window the old wm_name string is leaked. (Other frame_sync_* handlers g_clear_pointer the field first.)","fix":"Add g_clear_pointer (&frame->wm_name, g_free); before assigning frame->wm_name.","locations":[{"ref":"src/frames/meta-frame.c:321-351","code":"  321 | static void\n  322 | frame_sync_wm_name (GtkWindow *window,\n  323 |                     Window     client_window)\n  324 | {\n  325 |   MetaFrame *frame = META_FRAME (window);\n  326 |   GdkDisplay *display;\n  327 |   XTextProperty text_prop;\n  328 |   int retval;\n  329 | \n  330 |   display = gtk_widget_get_display (GTK_WIDGET (frame));\n  331 | \n  332 |   G_GNUC_BEGIN_IGNORE_DEPRECATIONS\n  333 | \n  334 |   gdk_x11_display_error_trap_push (display);\n  335 | \n  336 |   retval = XGetWMName (gdk_x11_display_get_xdisplay (display),\n  337 |                        client_window,\n  338 |                        &text_prop);\n  339 | \n  340 |   if (gdk_x11_display_error_trap_pop (display))\n  341 |     return;\n  342 | \n  343 |   G_GNUC_END_IGNORE_DEPRECATIONS\n  344 | \n  345 |   if (retval == 0)\n  346 |     return;\n  347 | \n  348 |   frame->wm_name = text_property_to_utf8 (display, &text_prop);\n  349 |   update_frame_title (frame);\n  350 |   XFree (text_prop.value);\n  351 | }"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"In meta_x11_selection_input_stream_xevent() SelectionNotify handling, when the selection property type is INCR, the GBytes 'bytes' read from get_selection_property() (the INCR marker chunk) is never unref'd nor pushed to the queue: the code sets priv->incr=TRUE and calls flush, leaving 'bytes' leaked. Only the non-INCR branch pushes it to priv->chunks, and the NULL branch has nothing to free.","fix":"In the INCR branch, g_bytes_unref (bytes); after setting priv->incr = TRUE (the INCR marker payload is not selection data).","locations":[{"ref":"src/x11/meta-x11-selection-input-stream.c:487-506","code":"  487 |             if (bytes == NULL)\n  488 |               {\n  489 |                 meta_x11_selection_input_stream_complete (stream);\n  490 |               }\n  491 |             else\n  492 |               {\n  493 |                 if (priv->xtype == XInternAtom (priv->x11_display->xdisplay, \"INCR\", False))\n  494 |                   {\n  495 |                     /* The remainder of the selection will come through PropertyNotify\n  496 |                        events on xwindow */\n  497 |                     priv->incr = TRUE;\n  498 |                     meta_x11_selection_input_stream_flush (stream);\n  499 |                   }\n  500 |                 else\n  501 |                   {\n  502 |                     g_async_queue_push (priv->chunks, bytes);\n  503 | \n  504 |                     meta_x11_selection_input_stream_complete (stream);\n  505 |                   }\n  506 |               }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"copy_shared_framebuffer_primary_gpu() creates a CoglOffscreen framebuffer (dmabuf_fb) wrapping the secondary-GPU dumb buffer via meta_renderer_native_create_dma_buf_framebuffer(), but only unrefs it on the blit-failure paths. On the success path the function falls through to 'return g_object_ref (buffer)' without ever unreffing or storing dmabuf_fb. In a multi-GPU setup using the PRIMARY copy mode this leaks one CoglOffscreen (plus its texture, EGLImage is destroyed inside the helper) every single frame, growing GPU/CPU memory and FD usage unbounded over time.","fix":"Wrap dmabuf_fb in g_autoptr(CoglFramebuffer) or explicitly g_object_unref(dmabuf_fb) before the final 'return g_object_ref (buffer);' (and remove the now-redundant per-error unrefs, or keep them with a single cleanup label).","locations":[{"ref":"src/backends/native/meta-onscreen-native.c:1430-1484","code":" 1430 |   dmabuf_fb =\n 1431 |     meta_renderer_native_create_dma_buf_framebuffer (renderer_native,\n 1432 |                                                      width,\n 1433 |                                                      height,\n 1434 |                                                      drm_format,\n 1435 |                                                      1,\n 1436 |                                                      &dmabuf_fd,\n 1437 |                                                      &stride,\n 1438 |                                                      &offset,\n 1439 |                                                      &modifier,\n 1440 |                                                      &error);\n 1441 | \n 1442 |   if (error)\n 1443 |     {\n 1444 |       meta_topic (META_DEBUG_KMS,\n 1445 |                   \"Failed to create DMA buffer for blitting: %s\",\n 1446 |                   error->message);\n 1447 |       return NULL;\n 1448 |     }\n 1449 | \n 1450 |   n_rectangles = mtk_region_num_rectangles (region);\n 1451 |   if (n_rectangles == 0 || n_rectangles > MAX_DAMAGE_RECTANGLES)\n 1452 |     {\n 1453 |       if (!cogl_framebuffer_blit (framebuffer, COGL_FRAMEBUFFER (dmabuf_fb),\n 1454 |                                   0, 0, 0, 0,\n 1455 |                                   width, height,\n 1456 |                                   &error))\n 1457 |         {\n 1458 |           g_object_unref (dmabuf_fb);\n 1459 |           return NULL;\n 1460 |         }\n 1461 |     }\n 1462 |   else\n 1463 |     {\n 1464 |       int i;\n 1465 | \n 1466 |       for (i = 0; i < n_rectangles; ++i)\n 1467 |         {\n 1468 |           MtkRectangle rectangle = mtk_region_get_rectangle (region, i);\n 1469 | \n 1470 |           if (!cogl_framebuffer_blit (framebuffer, COGL_FRAMEBUFFER (dmabuf_fb),\n 1471 |                                       rectangle.x, rectangle.y,\n 1472 |                                       rectangle.x, rectangle.y,\n 1473 |                                       rectangle.width, rectangle.height,\n 1474 |                                       &error))\n 1475 |             {\n 1476 |               g_object_unref (dmabuf_fb);\n 1477 |               return NULL;\n 1478 |             }\n 1479 |         }\n 1480 |     }\n 1481 | \n 1482 |   secondary_gpu_state->cpu.current_dumb_fb = buffer_dumb;\n 1483 | \n 1484 |   return g_object_ref (buffer);"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In meta_dnd_actor_drag_finish() failure path, the actor is destroyed only by drag_failed_complete(), which is connected to the \"opacity\" transition's \"stopped\" signal. clutter_actor_get_transition(actor, \"opacity\") can return NULL (e.g. if the opacity value did not actually change, or animations are disabled), in which case g_signal_connect(NULL, ...) emits a critical and the DnD actor is never destroyed, leaking it and leaving a stale feedback actor on screen.","fix":"Handle the NULL transition case: if no transition exists, destroy the actor directly (or ensure an opacity transition is always created before connecting).","locations":[{"ref":"src/compositor/meta-dnd-actor.c:237-241","code":"  237 |       transition = clutter_actor_get_transition (actor, \"opacity\");\n  238 |       g_signal_connect (transition, \"stopped\",\n  239 |                         G_CALLBACK (drag_failed_complete), self);\n  240 | \n  241 |       clutter_actor_restore_easing_state (actor);"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"Off-by-one out-of-bounds access on device->button_state. The button_state bitfield is sized '(MAX_BUTTON + 7) / 8' = 16 bytes, covering bits 0..127. handle_button() guards with 'if (button > MAX_BUTTON) return;' which allows button == MAX_BUTTON == 128. bit_set/bit_is_set/bit_clear with bit=128 access array[128/8] = array[16], one byte past the 16-byte array. The button value is derived from eis_event_button_get_button() via meta_evdev_button_to_clutter() (which returns unbounded values for unknown evdev codes), so an EIS client can drive button to 128, causing an OOB read+write.","fix":"Use '>=' instead of '>': 'if (button >= MAX_BUTTON) return;'. (Sizing the array as (MAX_BUTTON + 8) / 8 would also work but the off-by-one guard is the real bug.)","locations":[{"ref":"src/backends/meta-eis-client.c:623-648","code":"  623 | static void\n  624 | handle_button (MetaEisClient    *client,\n  625 |                struct eis_event *event)\n  626 | {\n  627 |   struct eis_device *eis_device = eis_event_get_device (event);\n  628 |   MetaEisDevice *device = eis_device_get_user_data (eis_device);\n  629 |   uint32_t button;\n  630 |   gboolean is_press = eis_event_button_get_is_press (event);\n  631 | \n  632 |   button = eis_event_button_get_button (event);\n  633 |   button = meta_evdev_button_to_clutter (button);\n  634 | \n  635 |   if (button > MAX_BUTTON)\n  636 |     return;\n  637 | \n  638 |   if (is_press && !bit_is_set (device->button_state, button))\n  639 |     bit_set (device->button_state, button);\n  640 |   else if (!is_press && bit_is_set (device->button_state, button))\n  641 |     bit_clear (device->button_state, button);\n  642 |   else\n  643 |     return; /* Duplicate press/release, should've been filtered by libeis */\n  644 | \n  645 |   notify_button (device,\n  646 |                  button,\n  647 |                  eis_event_button_get_is_press (event));\n  648 | }"},{"ref":"src/backends/meta-eis-client.c:44","code":"   44 |   guchar button_state[(MAX_BUTTON + 7) / 8];"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"Stack buffer overflow in read_int(): strncpy(buf, text, text_len) copies up to text_len bytes into the 64-byte stack buffer 'buf'. text and text_len come from the monitors.xml config file via GMarkup and are not bounded to 64. If a number field (width/height/x/y/etc.) is longer than 64 chars, strncpy overruns the stack buffer. The following 'buf[MIN(63, text_len)] = 0' only NUL-terminates after the overrun has already happened. Same defect in read_float().","fix":"Clamp the copy length, e.g. 'gsize n = MIN (text_len, sizeof (buf) - 1); memcpy (buf, text, n); buf[n] = 0;' before parsing, in both read_int and read_float.","locations":[{"ref":"src/backends/meta-monitor-config-store.c:1718-1744","code":" 1718 | static gboolean\n 1719 | read_int (const char  *text,\n 1720 |           gsize        text_len,\n 1721 |           gint        *out_value,\n 1722 |           GError     **error)\n 1723 | {\n 1724 |   char buf[64];\n 1725 |   int64_t value;\n 1726 |   char *end;\n 1727 | \n 1728 |   strncpy (buf, text, text_len);\n 1729 |   buf[MIN (63, text_len)] = 0;\n 1730 | \n 1731 |   value = g_ascii_strtoll (buf, &end, 10);\n 1732 | \n 1733 |   if (*end || value < 0 || value > G_MAXINT16)\n 1734 |     {\n 1735 |       g_set_error (error, G_MARKUP_ERROR, G_MARKUP_ERROR_INVALID_CONTENT,\n 1736 |                    \"Expected a number, got %s\", buf);\n 1737 |       return FALSE;\n 1738 |     }\n 1739 |   else\n 1740 |     {\n 1741 |       *out_value = value;\n 1742 |       return TRUE;\n 1743 |     }\n 1744 | }"},{"ref":"src/backends/meta-monitor-config-store.c:1746-1772","code":" 1746 | static gboolean\n 1747 | read_float (const char  *text,\n 1748 |             gsize        text_len,\n 1749 |             float       *out_value,\n 1750 |             GError     **error)\n 1751 | {\n 1752 |   char buf[64];\n 1753 |   float value;\n 1754 |   char *end;\n 1755 | \n 1756 |   strncpy (buf, text, text_len);\n 1757 |   buf[MIN (63, text_len)] = 0;\n 1758 | \n 1759 |   value = (float) g_ascii_strtod (buf, &end);\n 1760 | \n 1761 |   if (*end)\n 1762 |     {\n 1763 |       g_set_error (error, G_MARKUP_ERROR, G_MARKUP_ERROR_INVALID_CONTENT,\n 1764 |                    \"Expected a number, got %s\", buf);\n 1765 |       return FALSE;\n 1766 |     }\n 1767 |   else\n 1768 |     {\n 1769 |       *out_value = value;\n 1770 |       return TRUE;\n 1771 |     }\n 1772 | }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"Potential heap buffer overflow when rendering the screen-cast cursor sprite. The cursor SPA meta buffer is allocated for a fixed 384x384 bitmap (CURSOR_META_SIZE(384,384)), but set_cursor_sprite_metadata() computes bitmap_width/bitmap_height from the cursor texture size / viewport dst size / src rect multiplied by view_scale, with no clamp to 384. draw_cursor_sprite_via_offscreen() then writes bitmap_width*bitmap_height*4 bytes (via cogl_framebuffer_read_pixels) into the fixed-size bitmap_data. A large cursor combined with a high fractional view scale can produce dimensions > 384, overrunning the buffer. None of the four stream-src subclasses clamp the size before calling set_cursor_sprite_metadata.","fix":"Clamp bitmap_width and bitmap_height to 384 (and scale the matrix/hotspot accordingly), or skip drawing the cursor sprite when the computed size exceeds the allocated CURSOR_META_SIZE dimensions.","locations":[{"ref":"src/backends/meta-screen-cast-stream-src.c:609-737","code":"  609 | void\n  610 | meta_screen_cast_stream_src_set_cursor_sprite_metadata (MetaScreenCastStreamSrc *src,\n  611 |                                                         struct spa_meta_cursor  *spa_meta_cursor,\n  612 |                                                         ClutterCursor           *cursor,\n  613 |                                                         int                      x,\n  614 |                                                         int                      y,\n  615 |                                                         float                    view_scale)\n  616 | {\n  617 |   CoglTexture *cursor_texture;\n  618 |   struct spa_meta_bitmap *spa_meta_bitmap;\n  619 |   int hotspot_x, hotspot_y;\n  620 |   int texture_width, texture_height;\n  621 |   int bitmap_width, bitmap_height;\n  622 |   int dst_width, dst_height;\n  623 |   uint8_t *bitmap_data;\n  624 |   float cursor_scale;\n  625 |   MtkMonitorTransform cursor_transform;\n  626 |   const graphene_rect_t *src_rect;\n  627 |   graphene_matrix_t matrix;\n  628 |   GError *error = NULL;\n  629 | \n  630 |   cursor_texture = clutter_cursor_get_texture (cursor, &hotspot_x, &hotspot_y);\n  631 |   if (!cursor_texture)\n  632 |     {\n  633 |       meta_screen_cast_stream_src_set_empty_cursor_sprite_metadata (src,\n  634 |                                                                     spa_meta_cursor,\n  635 |                                                                     x, y);\n  636 |       return;\n  637 |     }\n  638 | \n  639 |   spa_meta_cursor->id = 1;\n  640 |   spa_meta_cursor->position.x = x;\n  641 |   spa_meta_cursor->position.y = y;\n  642 | \n  643 |   spa_meta_cursor->bitmap_offset = sizeof (struct spa_meta_cursor);\n  644 | \n  645 |   spa_meta_bitmap = SPA_MEMBER (spa_meta_cursor,\n  646 |                                 spa_meta_cursor->bitmap_offset,\n  647 |                                 struct spa_meta_bitmap);\n  648 |   spa_meta_bitmap->format = SPA_VIDEO_FORMAT_RGBA;\n  649 |   spa_meta_bitmap->offset = sizeof (struct spa_meta_bitmap);\n  650 | \n  651 |   texture_width = cogl_texture_get_width (cursor_texture);\n  652 |   texture_height = cogl_texture_get_height (cursor_texture);\n  653 | \n  654 |   cursor_scale = clutter_cursor_get_texture_scale (cursor);\n  655 |   cursor_transform = clutter_cursor_get_texture_transform (cursor);\n  656 |   src_rect = clutter_cursor_get_viewport_src_rect (cursor);\n  657 | \n  658 |   if (clutter_cursor_get_viewport_dst_size (cursor,\n  659 |                                             &dst_width,\n  660 |                                             &dst_height))\n  661 |     {\n  662 |       float cursor_scale_x, cursor_scale_y;\n  663 |       float scaled_hotspot_x, scaled_hotspot_y;\n  664 | \n  665 |       cursor_scale_x = (float) dst_width / texture_width;\n  666 |       cursor_scale_y = (float) dst_height / texture_height;\n  667 | \n  668 |       scaled_hotspot_x = roundf (hotspot_x * cursor_scale_x);\n  669 |       scaled_hotspot_y = roundf (hotspot_y * cursor_scale_y);\n  670 | \n  671 |       bitmap_width = (int) ceilf (dst_width * view_scale);\n  672 |       bitmap_height = (int) ceilf (dst_height * view_scale);\n  673 |       spa_meta_cursor->hotspot.x = (int32_t) ceilf (scaled_hotspot_x * view_scale);\n  674 |       spa_meta_cursor->hotspot.y = (int32_t) ceilf (scaled_hotspot_y * view_scale);\n  675 |     }\n  676 |   else if (src_rect)\n  677 |     {\n  678 |       float scale_x, scale_y;\n  679 | \n  680 |       scale_x = (float) src_rect->size.width / texture_width * view_scale;\n  681 |       scale_y = (float) src_rect->size.height / texture_height * view_scale;\n  682 | \n  683 |       bitmap_width = (int) ceilf (src_rect->size.width * view_scale);\n  684 |       bitmap_height = (int) ceilf (src_rect->size.height * view_scale);\n  685 |       spa_meta_cursor->hotspot.x = (int32_t) roundf (hotspot_x * scale_x);\n  686 |       spa_meta_cursor->hotspot.y = (int32_t) roundf (hotspot_y * scale_y);\n  687 |     }\n  688 |   else\n  689 |     {\n  690 |       float scale;\n  691 | \n  692 |       scale = cursor_scale * view_scale;\n  693 | \n  694 |       if (mtk_monitor_transform_is_rotated (cursor_transform))\n  695 |         {\n  696 |           bitmap_width = (int) ceilf (texture_height * scale);\n  697 |           bitmap_height = (int) ceilf (texture_width * scale);\n  698 |         }\n  699 |       else\n  700 |         {\n  701 |           bitmap_width = (int) ceilf (texture_width * scale);\n  702 |           bitmap_height = (int) ceilf (texture_height * scale);\n  703 |         }\n  704 | \n  705 |       spa_meta_cursor->hotspot.x = (int32_t) ceilf (hotspot_x * scale);\n  706 |       spa_meta_cursor->hotspot.y = (int32_t) ceilf (hotspot_y * scale);\n  707 |     }\n  708 | \n  709 |   graphene_matrix_init_identity (&matrix);\n  710 |   mtk_compute_viewport_matrix (&matrix,\n  711 |                                texture_width,\n  712 |                                texture_height,\n  713 |                                cursor_scale,\n  714 |                                cursor_transform,\n  715 |                                src_rect);\n  716 | \n  717 |   spa_meta_bitmap->size.width = bitmap_width;\n  718 |   spa_meta_bitmap->size.height = bitmap_height;\n  719 |   spa_meta_bitmap->stride = bitmap_width * 4;\n  720 | \n  721 |   bitmap_data = SPA_MEMBER (spa_meta_bitmap,\n  722 |                             spa_meta_bitmap->offset,\n  723 |                             uint8_t);\n  724 | \n  725 |   if (!meta_screen_cast_stream_src_draw_cursor_into (src,\n  726 |                                                      cursor_texture,\n  727 |                                                      bitmap_width,\n  728 |                                                      bitmap_height,\n  729 |                                                      &matrix,\n  730 |                                                      bitmap_data,\n  731 |                                                      &error))\n  732 |     {\n  733 |       g_warning (\"Failed to draw cursor: %s\", error->message);\n  734 |       g_error_free (error);\n  735 |       spa_meta_cursor->id = 0;\n  736 |     }\n  737 | }"},{"ref":"src/backends/meta-screen-cast-stream-src.c:64-66","code":"   64 | #define CURSOR_META_SIZE(width, height) \\\n   65 |         (sizeof (struct spa_meta_cursor) + \\\n   66 |          sizeof (struct spa_meta_bitmap) + width * height * 4)"},{"ref":"src/backends/meta-screen-cast-stream-src.c:2149","code":" 2149 |     SPA_PARAM_META_size, SPA_POD_Int (CURSOR_META_SIZE (384, 384)));"},{"ref":"src/backends/meta-screen-cast-stream-src.c:459-520","code":"  459 | static gboolean\n  460 | draw_cursor_sprite_via_offscreen (MetaScreenCastStreamSrc  *src,\n  461 |                                   CoglTexture              *cursor_texture,\n  462 |                                   int                       bitmap_width,\n  463 |                                   int                       bitmap_height,\n  464 |                                   const graphene_matrix_t  *matrix,\n  465 |                                   uint8_t                  *bitmap_data,\n  466 |                                   GError                  **error)\n  467 | {\n  468 |   MetaScreenCastStream *stream = meta_screen_cast_stream_src_get_stream (src);\n  469 |   MetaScreenCastSession *session = meta_screen_cast_stream_get_session (stream);\n  470 |   MetaScreenCast *screen_cast =\n  471 |     meta_screen_cast_session_get_screen_cast (session);\n  472 |   MetaBackend *backend = meta_screen_cast_get_backend (screen_cast);\n  473 |   ClutterBackend *clutter_backend = meta_backend_get_clutter_backend (backend);\n  474 |   CoglContext *cogl_context =\n  475 |     clutter_backend_get_cogl_context (clutter_backend);\n  476 |   CoglTexture *bitmap_texture;\n  477 |   CoglOffscreen *offscreen;\n  478 |   CoglFramebuffer *fb;\n  479 |   CoglPipeline *pipeline;\n  480 |   CoglColor clear_color;\n  481 | \n  482 |   bitmap_texture = cogl_texture_2d_new_with_size (cogl_context,\n  483 |                                                   bitmap_width, bitmap_height);\n  484 |   cogl_texture_2d_set_auto_mipmap (COGL_TEXTURE_2D (bitmap_texture), FALSE);\n  485 |   if (!cogl_texture_allocate (bitmap_texture, error))\n  486 |     {\n  487 |       g_object_unref (bitmap_texture);\n  488 |       return FALSE;\n  489 |     }\n  490 | \n  491 |   offscreen = cogl_offscreen_new_with_texture (bitmap_texture);\n  492 |   fb = COGL_FRAMEBUFFER (offscreen);\n  493 |   g_object_unref (bitmap_texture);\n  494 |   if (!cogl_framebuffer_allocate (fb, error))\n  495 |     {\n  496 |       g_object_unref (fb);\n  497 |       return FALSE;\n  498 |     }\n  499 | \n  500 |   pipeline = cogl_pipeline_new (cogl_context);\n  501 |   cogl_pipeline_set_layer_texture (pipeline, 0, cursor_texture);\n  502 |   cogl_pipeline_set_layer_filters (pipeline, 0,\n  503 |                                    COGL_PIPELINE_FILTER_LINEAR,\n  504 |                                    COGL_PIPELINE_FILTER_LINEAR);\n  505 | \n  506 |   cogl_pipeline_set_layer_matrix (pipeline, 0, matrix);\n  507 | \n  508 |   cogl_color_init_from_4f (&clear_color, 0.0, 0.0, 0.0, 0.0);\n  509 |   cogl_framebuffer_clear (fb, COGL_BUFFER_BIT_COLOR, &clear_color);\n  510 |   cogl_framebuffer_draw_rectangle (fb, pipeline,\n  511 |                                    -1, 1, 1, -1);\n  512 |   g_object_unref (pipeline);\n  513 | \n  514 |   cogl_framebuffer_read_pixels (fb,\n  515 |                                 0, 0,\n  516 |                                 bitmap_width, bitmap_height,\n  517 |                                 COGL_PIXEL_FORMAT_RGBA_8888_PRE,\n  518 |                                 bitmap_data);\n  519 |   g_object_unref (fb);\n  520 | "}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"update_button_count_in_impl() indexes virtual_native->impl_state->button_count[KEY_CNT] with the full uint32_t 'button'/'key' value coming straight from the public ClutterVirtualInputDevice API (notify_key). The only validation is get_button_type(event->key), whose parameter is uint16_t, so the upper 16 bits of event->key are truncated for validation but the un-truncated 32-bit value is then used as the array index. A client passing e.g. key = 0x10000 | KEY_ESC passes the EVDEV_BUTTON_TYPE_KEY check (truncates to KEY_ESC) yet indexes button_count[0x10001], an out-of-bounds read AND write (the function does ++/-- on the slot). This is a writable OOB reachable from a misbehaving/hostile virtual-input client.","fix":"Bound-check 'button' against G_N_ELEMENTS(button_count) (i.e. KEY_CNT) inside update_button_count_in_impl, or reject event->key >= KEY_CNT in notify_key_in_impl before calling get_button_type/update_button_count_in_impl (get_button_type should also take the full uint32_t to avoid silent truncation).","locations":[{"ref":"src/backends/native/meta-virtual-input-device-native.c:114-119","code":"  114 | {\n  115 |   if (state)\n  116 |     return ++virtual_native->impl_state->button_count[button];\n  117 |   else\n  118 |     return --virtual_native->impl_state->button_count[button];\n  119 | }"},{"ref":"src/backends/native/meta-virtual-input-device-native.c:407-413","code":"  407 |   if (get_button_type (event->key) != EVDEV_BUTTON_TYPE_KEY)\n  408 |     {\n  409 |       g_warning (\"Unknown/invalid virtual device key 0x%x pressed\", event->key);\n  410 |       goto out;\n  411 |     }\n  412 | \n  413 |   key_count = update_button_count_in_impl (virtual_native, event->key, event->key_state);"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"window_would_mostly_be_covered_by_always_above_window() computes window_area = frame_rect.width * frame_rect.height and then divides: (100 * visible_area) / window_area. If the window has zero width or height (window_area == 0) this is an integer division by zero (SIGFPE / crash). Window geometry is generally clamped to >=1 for X11 in setup_constraint_info but Wayland windows and freshly-created windows can transiently have zero-sized config rects.","fix":"Guard against an empty rect: `if (window_area <= 0) return FALSE;` (or TRUE depending on desired semantics) before the division.","locations":[{"ref":"src/core/window.c:2234-2241","code":" 2234 |   window_area = frame_rect.width * frame_rect.height;\n 2235 | \n 2236 |   mtk_region_intersect_rectangle (region, &frame_rect);\n 2237 |   intersection_area = calculate_region_area (region);\n 2238 |   visible_area = window_area - intersection_area;\n 2239 | \n 2240 | #define REQUIRED_VISIBLE_AREA_PERCENT 40\n 2241 |   if ((100 * visible_area) / window_area > REQUIRED_VISIBLE_AREA_PERCENT)"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"_XcursorReadFileHeader() computes 'skip = head.header - XCURSOR_FILE_HEADER_LEN' with unsigned ints. If a malicious cursor file declares head.header < 16, skip underflows to a huge unsigned value passed to seek(). Harmless on a regular file (fseek just fails or moves far), but it is an unvalidated value derived from file input; combined with the unchecked header it is sloppy parsing of untrusted data.","fix":"Validate head.header >= XCURSOR_FILE_HEADER_LEN before computing skip; bail out otherwise.","locations":[{"ref":"src/third_party/xcursor/xcursor.c:606-629","code":"  606 | static XcursorFileHeader *\n  607 | _XcursorReadFileHeader (XcursorFile *file)\n  608 | {\n  609 |   XcursorFileHeader head, *fileHeader;\n  610 |   unsigned int skip;\n  611 |   unsigned int n;\n  612 | \n  613 |   if (!file)\n  614 |     return NULL;\n  615 | \n  616 |   if (!_XcursorReadUInt (file, &head.magic))\n  617 |     return NULL;\n  618 |   if (head.magic != XCURSOR_MAGIC)\n  619 |     return NULL;\n  620 |   if (!_XcursorReadUInt (file, &head.header))\n  621 |     return NULL;\n  622 |   if (!_XcursorReadUInt (file, &head.version))\n  623 |     return NULL;\n  624 |   if (!_XcursorReadUInt (file, &head.ntoc))\n  625 |     return NULL;\n  626 |   skip = head.header - XCURSOR_FILE_HEADER_LEN;\n  627 |   if (skip)\n  628 |     if ((*file->seek)(file, skip, SEEK_CUR) == EOF)\n  629 |       return NULL;"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"meta_wayland_dma_buf_fds_for_wayland_buffer writes dma_buf->fds[i] for i in [0, gbm_bo_get_plane_count(gbm_bo)) with no check that the plane count does not exceed META_WAYLAND_DMA_BUF_MAX_FDS (4). dma_buf->fds, ->strides, ->offsets are fixed-size arrays of META_WAYLAND_DMA_BUF_MAX_FDS. If gbm ever reports more planes than the array size, this is an out-of-bounds write. In practice gbm currently caps at 4, but the bound is unenforced.","fix":"Clamp the loop: n_planes = MIN (gbm_bo_get_plane_count (gbm_bo), META_WAYLAND_DMA_BUF_MAX_FDS); (or bail out / warn if the count exceeds the maximum) before iterating.","locations":[{"ref":"src/wayland/meta-wayland-dma-buf.c:908-912","code":"  908 |   n_planes = gbm_bo_get_plane_count (gbm_bo);\n  909 |   for (i = 0; i < n_planes; i++)\n  910 |     dma_buf->fds[i] = gbm_bo_get_fd_for_plane (gbm_bo, i);\n  911 |   while (i < META_WAYLAND_DMA_BUF_MAX_FDS)\n  912 |     dma_buf->fds[i++] = -1;"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Wrong variable cast in fast read-pixel clip check. In try_checking_point_hits_entry_after_clipping the loop iterates clip_entry (a CoglClipStack*), but the rect downcast uses 'entry' (the CoglJournalEntry* parameter): 'CoglClipStackRect *rect_entry = (CoglClipStackRect *)entry;'. It then reads rect_entry->can_be_scissor, which is actually reading arbitrary bytes of the CoglJournalEntry struct reinterpreted as a clip-rect. This makes the needs_software_clip decision essentially random, so the fast read-pixel path may skip required software clipping (returning a wrong pixel) or do unnecessary work. It should cast clip_entry.","fix":"Use 'CoglClipStackRect *rect_entry = (CoglClipStackRect *)clip_entry;' instead of casting 'entry'.","locations":[{"ref":"cogl/cogl/cogl-journal.c:1773-1782","code":" 1773 |       if (clip_entry->type == COGL_CLIP_STACK_RECT)\n 1774 |         {\n 1775 |           CoglClipStackRect *rect_entry = (CoglClipStackRect *)entry;\n 1776 | \n 1777 |           if (rect_entry->can_be_scissor == FALSE)\n 1778 |             needs_software_clip = TRUE;\n 1779 |           /* If can_be_scissor is TRUE then we know it's screen\n 1780 |            * aligned and the hit test we did above has determined\n 1781 |            * that we are inside this clip. */\n 1782 |         }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Inverted n_planes guard in the sliced-texture waste-fill path. The comment says 'We only support single plane formats here' but the code returns FALSE (an error/abort of the waste fill) when the format IS single-plane (== 1), and proceeds for multi-plane formats (which it claims not to support). As written, every single-plane texture that has waste (the only formats the surrounding code actually handles, since bpp/rowstride math below assumes a single plane) fails its waste fill, while a multi-plane format would fall through to plane-0-only math that is wrong. The condition is backwards; it should bail when n_planes != 1.","fix":"Change the test to 'if (cogl_pixel_format_get_n_planes (source_format) != 1) return FALSE;' so the function only proceeds for the single-plane formats the rest of the code assumes.","locations":[{"ref":"cogl/cogl/cogl-texture-2d-sliced.c:449-451","code":"  449 |       /* We only support single plane formats here */\n  450 |       if (cogl_pixel_format_get_n_planes (source_format) == 1)\n  451 |         return FALSE;"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The GLSL source string for the IDENTITY_LIMITED YUV->RGB coefficients has unbalanced parentheses. Each of the three lines opens two parens but closes only one: e.g. \"res.x = (255.0/219.0 * (yuva.x - 16.0/255.0);\" is missing a closing ')'. If a buffer ever uses META_MULTI_TEXTURE_COEFFICIENTS_IDENTITY_LIMITED, this snippet is compiled into the fragment shader and GLSL compilation fails, breaking rendering of such surfaces. Also the math itself omits a divisor the other coefficient shaders have.","fix":"Fix the parentheses, e.g. \"res.x = 255.0/219.0 * (yuva.x - 16.0/255.0);\" for x/y/z, matching the style of the other coefficient shaders.","locations":[{"ref":"src/compositor/meta-multi-texture-format.c:34-43","code":"   34 | static const char coeffs_identity_limited_shader[] =\n   35 |   \"vec4 identity_limited_to_rgb(vec4 yuva)\\n\"\n   36 |   \"{\\n\"\n   37 |   \"  vec4 res;\\n\"\n   38 |   \"  res.x = (255.0/219.0 * (yuva.x - 16.0/255.0);\\n\"\n   39 |   \"  res.y = (255.0/219.0 * (yuva.y - 16.0/255.0);\\n\"\n   40 |   \"  res.z = (255.0/219.0 * (yuva.z - 16.0/255.0);\\n\"\n   41 |   \"  res.w = yuva.w;\\n\"\n   42 |   \"  return res;\\n\"\n   43 |   \"}\\n\";"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"color_representation_surface_set_alpha_mode posts a protocol error in the 'default' (invalid alpha mode) branch but only breaks out of the switch; it then falls through to set pending->premult = META_MULTI_TEXTURE_ALPHA_MODE_NONE and pending->has_new_premult = TRUE on a resource that has just been flagged with a fatal protocol error. State should not be mutated after wl_resource_post_error.","fix":"Add 'return;' after wl_resource_post_error in the default branch (e.g. change the default case to post the error and return) so pending state is not modified on the error path.","locations":[{"ref":"src/wayland/meta-wayland-color-representation.c:256-274","code":"  256 |   switch (alpha_mode)\n  257 |     {\n  258 |     case WP_COLOR_REPRESENTATION_SURFACE_V1_ALPHA_MODE_PREMULTIPLIED_ELECTRICAL:\n  259 |       premult = META_MULTI_TEXTURE_ALPHA_MODE_PREMULT_ELECTRICAL;\n  260 |       break;\n  261 |     case WP_COLOR_REPRESENTATION_SURFACE_V1_ALPHA_MODE_STRAIGHT:\n  262 |       premult = META_MULTI_TEXTURE_ALPHA_MODE_STRAIGHT;\n  263 |       break;\n  264 |     default:\n  265 |       wl_resource_post_error (\n  266 |         resource,\n  267 |         WP_COLOR_REPRESENTATION_SURFACE_V1_ERROR_ALPHA_MODE,\n  268 |         \"Unsupported alpha mode\");\n  269 |       break;\n  270 |     }\n  271 | \n  272 |   pending = meta_wayland_surface_get_pending_state (surface);\n  273 |   pending->premult = premult;\n  274 |   pending->has_new_premult = TRUE;"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"color_representation_surface_set_coefficients_and_range posts WP_COLOR_REPRESENTATION_SURFACE_V1_ERROR_COEFFICIENTS when the requested coefficients/range combination is unsupported, but does not return. Execution continues and sets pending->coeffs = META_MULTI_TEXTURE_COEFFICIENTS_NONE and pending->has_new_coeffs = TRUE on the doomed resource, mutating surface pending state after a fatal protocol error.","fix":"Add 'return;' immediately after the wl_resource_post_error call in the unsupported-coefficients block.","locations":[{"ref":"src/wayland/meta-wayland-color-representation.c:309-319","code":"  309 |   if (surface_coeffs == META_MULTI_TEXTURE_COEFFICIENTS_NONE)\n  310 |     {\n  311 |       wl_resource_post_error (\n  312 |         resource,\n  313 |         WP_COLOR_REPRESENTATION_SURFACE_V1_ERROR_COEFFICIENTS,\n  314 |         \"Unsupported coefficients\");\n  315 |     }\n  316 | \n  317 |   pending = meta_wayland_surface_get_pending_state (surface);\n  318 |   pending->coeffs = surface_coeffs;\n  319 |   pending->has_new_coeffs = TRUE;"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"color_representation_surface_set_chroma_location posts a protocol error in the 'default' (invalid chroma location) branch but only breaks out of the switch and then sets pending->chroma_loc = META_MULTI_TEXTURE_CHROMA_LOC_NONE and pending->has_new_chroma_loc = TRUE. State is mutated after a fatal protocol error. (Additionally it uses WL_DISPLAY_ERROR_INVALID_OBJECT rather than a wp_color_representation-specific error code, which is a misleading error.)","fix":"Add 'return;' after wl_resource_post_error in the default branch so pending state is not modified on the error path.","locations":[{"ref":"src/wayland/meta-wayland-color-representation.c:342-360","code":"  342 |   switch (chroma_loc)\n  343 |     {\n  344 |     case WP_COLOR_REPRESENTATION_SURFACE_V1_CHROMA_LOCATION_TYPE_0:\n  345 |     case WP_COLOR_REPRESENTATION_SURFACE_V1_CHROMA_LOCATION_TYPE_1:\n  346 |     case WP_COLOR_REPRESENTATION_SURFACE_V1_CHROMA_LOCATION_TYPE_2:\n  347 |     case WP_COLOR_REPRESENTATION_SURFACE_V1_CHROMA_LOCATION_TYPE_3:\n  348 |     case WP_COLOR_REPRESENTATION_SURFACE_V1_CHROMA_LOCATION_TYPE_4:\n  349 |     case WP_COLOR_REPRESENTATION_SURFACE_V1_CHROMA_LOCATION_TYPE_5:\n  350 |       loc = META_MULTI_TEXTURE_CHROMA_LOC_DEFINED;\n  351 |       break;\n  352 |     default:\n  353 |       wl_resource_post_error (resource, WL_DISPLAY_ERROR_INVALID_OBJECT,\n  354 |                               \"Invalid chroma location\");\n  355 |       break;\n  356 |     }\n  357 | \n  358 |   pending = meta_wayland_surface_get_pending_state (surface);\n  359 |   pending->chroma_loc = loc;\n  360 |   pending->has_new_chroma_loc = TRUE;"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"meta_window_shape_new() declares and resets max_line_xspan_x1/x2 to -1 INSIDE the per-rectangle loop body instead of once per scanline. They are therefore reinitialized for every rectangle, so the accumulation of the widest horizontal span across a line never happens: the comparison 'iter.rectangle.width > max_line_xspan_x2 - max_line_xspan_x1' always compares against (-1)-(-1)=0 and just takes the current rectangle. This breaks the intended 'widest x span per line' computation used to derive the shape's left/right borders and the central scalable region.","fix":"Declare max_line_xspan_x1/x2 outside the loop and reset them to -1 at the start of each line (e.g. after handling iter.line_end), matching the original Xlib/mutter logic, so the per-line maximum span is actually accumulated.","locations":[{"ref":"src/x11/meta-window-shape.c:69-104","code":"   69 |   for (mtk_region_iterator_init (&iter, region);\n   70 |        !mtk_region_iterator_at_end (&iter);\n   71 |        mtk_region_iterator_next (&iter))\n   72 |     {\n   73 |       int max_line_xspan_x1 = -1;\n   74 |       int max_line_xspan_x2 = -1;\n   75 | \n   76 |       if (iter.rectangle.width > max_line_xspan_x2 - max_line_xspan_x1)\n   77 |         {\n   78 |           max_line_xspan_x1 = iter.rectangle.x;\n   79 |           max_line_xspan_x2 = iter.rectangle.x + iter.rectangle.width;\n   80 |         }\n   81 | \n   82 |       if (iter.line_end)\n   83 |         {\n   84 |           if (iter.rectangle.height > max_yspan_y2 - max_yspan_y1)\n   85 |             {\n   86 |               max_yspan_y1 = iter.rectangle.y;\n   87 |               max_yspan_y2 = iter.rectangle.y + iter.rectangle.height;\n   88 |             }\n   89 | \n   90 |           if (max_xspan_x1 < 0) /* First line */\n   91 |             {\n   92 |               max_xspan_x1 = max_line_xspan_x1;\n   93 |               max_xspan_x2 = max_line_xspan_x2;\n   94 |             }\n   95 |           else\n   96 |             {\n   97 |               max_xspan_x1 = MAX (max_xspan_x1, max_line_xspan_x1);\n   98 |               max_xspan_x2 = MIN (max_xspan_x2, max_line_xspan_x2);\n   99 | \n  100 |               if (max_xspan_x2 < max_xspan_x1)\n  101 |                 max_xspan_x2 = max_xspan_x1;\n  102 |             }\n  103 |         }\n  104 |     }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In clutter_flow_layout_allocate(), when wrapping to a new line the code guards adding spacing with `if (line_index >= 0)`. Since line_index is initialized to 0 and only ever incremented, this condition is always true, so it is dead/misleading code. It looks like the intent was `if (line_index > 0)` (i.e. do not add leading spacing before the first wrap) or it should simply be unconditional. As written it adds row/col spacing on every wrap including effectively meaningless guarding, and the always-true branch obscures intent.","fix":"Either remove the always-true `if (line_index >= 0)` guard (making the spacing addition unconditional) or replace it with the intended `if (line_index > 0)` condition; clarify with a comment which semantics are desired.","locations":[{"ref":"clutter/clutter/clutter-flow-layout.c:631-632","code":"  631 |               if (line_index >= 0)\n  632 |                 item_y += self->row_spacing;"},{"ref":"clutter/clutter/clutter-flow-layout.c:666-667","code":"  666 |               if (line_index >= 0)\n  667 |                 item_x += self->col_spacing;"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"clutter_timeline_skip() collapses any forward overshoot to elapsed_time = 1 (and any backward overshoot to duration - 1) rather than clamping to the valid endpoint. So skipping a forward timeline past its duration jumps it almost back to the start (1 ms) instead of to the end (duration), which is surprising and inconsistent with clutter_timeline_advance() which CLAMPs to [0, duration]. The wrap-to-1 behavior looks like a leftover/loop heuristic rather than a correct skip.","fix":"Clamp elapsed_time to the valid range instead of resetting to 1 / duration-1, e.g. on forward overshoot set elapsed_time = priv->duration (or implement explicit modulo/repeat handling) and analogously 0 for backward; mirror clutter_timeline_advance() semantics.","locations":[{"ref":"clutter/clutter/clutter-timeline.c:1361-1387","code":" 1361 | void\n 1362 | clutter_timeline_skip (ClutterTimeline *timeline,\n 1363 |                        guint            msecs)\n 1364 | {\n 1365 |   ClutterTimelinePrivate *priv;\n 1366 | \n 1367 |   g_return_if_fail (CLUTTER_IS_TIMELINE (timeline));\n 1368 | \n 1369 |   priv = clutter_timeline_get_instance_private (timeline);\n 1370 | \n 1371 |   if (priv->direction == CLUTTER_TIMELINE_FORWARD)\n 1372 |     {\n 1373 |       priv->elapsed_time += msecs;\n 1374 | \n 1375 |       if (priv->elapsed_time > priv->duration)\n 1376 |         priv->elapsed_time = 1;\n 1377 |     }\n 1378 |   else if (priv->direction == CLUTTER_TIMELINE_BACKWARD)\n 1379 |     {\n 1380 |       priv->elapsed_time -= msecs;\n 1381 | \n 1382 |       if (priv->elapsed_time < 1)\n 1383 |         priv->elapsed_time = priv->duration - 1;\n 1384 |     }\n 1385 | \n 1386 |   priv->msecs_delta = 0;\n 1387 | }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Insertion-position computation in mapping_helper_add() is incorrect. The intent is to insert 'info' into device_maps ordered by descending 'best' score, but the loop sets 'pos = i' for every element whose best > info.best without breaking, so pos ends up as the index of the LAST element with best > info.best (and stays 0 if none/only the first matches), not the correct sorted insertion index. This mis-orders which input device gets first pick of outputs when several devices compete for the same monitor.","fix":"Find the first element with best <= info.best and insert there (break on the first match), or collect all candidates and sort once with g_array_sort by best descending.","locations":[{"ref":"src/backends/meta-input-mapper.c:554-581","code":"  554 | static void\n  555 | mapping_helper_add (MappingHelper       *helper,\n  556 | \t\t    MetaMapperInputInfo *input,\n  557 |                     MetaInputMapper     *mapper)\n  558 | {\n  559 |   DeviceCandidates info = { 0, };\n  560 |   guint i, pos = 0;\n  561 | \n  562 |   info.input = input;\n  563 |   info.matches = g_array_new (FALSE, TRUE, sizeof (DeviceMatch));\n  564 | \n  565 |   guess_candidates (mapper, input, &info);\n  566 | \n  567 |   for (i = 0; i < helper->device_maps->len; i++)\n  568 |     {\n  569 |       DeviceCandidates *elem;\n  570 | \n  571 |       elem = &g_array_index (helper->device_maps, DeviceCandidates, i);\n  572 | \n  573 |       if (elem->best > info.best)\n  574 |         pos = i;\n  575 |     }\n  576 | \n  577 |   if (pos >= helper->device_maps->len)\n  578 |     g_array_append_val (helper->device_maps, info);\n  579 |   else\n  580 |     g_array_insert_val (helper->device_maps, pos, info);\n  581 | }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"meta_drm_buffer_do_ensure_fb_id() declares 'uint8_t depth; uint8_t bpp;' and assigns them inside a switch over fb_args->format that only has cases for DRM_FORMAT_XRGB8888 and DRM_FORMAT_ARGB8888 with no default. The path is reachable only after an earlier guard rejects all other formats, so it is currently safe, but the switch has no default and relies entirely on that distant guard staying in sync; any future format added to the guard but not the switch would use uninitialized depth/bpp in drmModeAddFB().","fix":"Initialize depth/bpp at declaration or add a default: case with g_assert_not_reached() to the switch to make the invariant explicit and crash-safe.","locations":[{"ref":"src/backends/native/meta-drm-buffer.c:125-161","code":"  125 |       uint8_t depth;\n  126 |       uint8_t bpp;\n  127 | \n  128 |       if (fb_args->format != DRM_FORMAT_XRGB8888 &&\n  129 |           fb_args->format != DRM_FORMAT_ARGB8888)\n  130 |         {\n  131 |           g_set_error (error,\n  132 |                        G_IO_ERROR,\n  133 |                        g_io_error_from_errno (errno),\n  134 |                        \"drmModeAddFB2 failed (%s) and drmModeAddFB cannot be \"\n  135 |                        \"used as a fallback because format=0x%x (%s).\",\n  136 |                        g_strerror (errno),\n  137 |                        fb_args->format,\n  138 |                        meta_drm_format_to_string (&tmp, fb_args->format));\n  139 |           return FALSE;\n  140 |         }\n  141 | \n  142 |       switch (fb_args->format)\n  143 |         {\n  144 |         case DRM_FORMAT_XRGB8888:\n  145 |           depth = 24;\n  146 |           bpp = 32;\n  147 |           break;\n  148 |         case DRM_FORMAT_ARGB8888:\n  149 |           depth = 32;\n  150 |           bpp = 32;\n  151 |           break;\n  152 |         }\n  153 | \n  154 |       if (drmModeAddFB (fd,\n  155 |                         fb_args->width,\n  156 |                         fb_args->height,\n  157 |                         depth,\n  158 |                         bpp,\n  159 |                         fb_args->strides[0],\n  160 |                         fb_args->handles[0],\n  161 |                         &fb_id))"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"hints_have_changed() duplicates the META_SIZE_HINTS_USER_POSITION check in the 'flags unset' block (lines 1227 and 1228 are identical) and never checks FLAG_TOGGLED_OFF for META_SIZE_HINTS_USER_SIZE. Consequently, a window clearing only its USER_SIZE flag (without other changes) will not be detected as 'changed'.","fix":"Replace the duplicated USER_POSITION line with FLAG_TOGGLED_OFF (old, new, META_SIZE_HINTS_USER_SIZE).","locations":[{"ref":"src/x11/window-props.c:1227-1236","code":" 1227 |   return FLAG_TOGGLED_OFF (old, new, META_SIZE_HINTS_USER_POSITION) ||\n 1228 |          FLAG_TOGGLED_OFF (old, new, META_
