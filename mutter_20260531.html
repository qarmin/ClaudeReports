SIZE_HINTS_USER_POSITION) ||\n 1229 |          FLAG_TOGGLED_OFF (old, new, META_SIZE_HINTS_PROGRAM_POSITION) ||\n 1230 |          FLAG_TOGGLED_OFF (old, new, META_SIZE_HINTS_PROGRAM_SIZE) ||\n 1231 |          FLAG_TOGGLED_OFF (old, new, META_SIZE_HINTS_PROGRAM_MIN_SIZE) ||\n 1232 |          FLAG_TOGGLED_OFF (old, new, META_SIZE_HINTS_PROGRAM_MAX_SIZE) ||\n 1233 |          FLAG_TOGGLED_OFF (old, new, META_SIZE_HINTS_PROGRAM_RESIZE_INCREMENTS) ||\n 1234 |          FLAG_TOGGLED_OFF (old, new, META_SIZE_HINTS_PROGRAM_ASPECT) ||\n 1235 |          FLAG_TOGGLED_OFF (old, new, META_SIZE_HINTS_PROGRAM_BASE_SIZE) ||\n 1236 |          FLAG_TOGGLED_OFF (old, new, META_SIZE_HINTS_PROGRAM_WIN_GRAVITY);"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"frame_sync_net_wm_name() clears the wrong field: it does g_clear_pointer(&frame->net_wm_visible_name, g_free) but then assigns frame->net_wm_name. As a result (1) the previous frame->net_wm_name string is overwritten without being freed (memory leak on every _NET_WM_NAME change), and (2) net_wm_visible_name is wrongly cleared, corrupting title precedence (update_frame_title prefers visible_name over name). This is a clear copy-paste from frame_sync_net_wm_visible_name().","fix":"Clear the correct field: g_clear_pointer (&frame->net_wm_name, g_free); before assigning frame->net_wm_name.","locations":[{"ref":"src/frames/meta-frame.c:277-287","code":"  277 | static void\n  278 | frame_sync_net_wm_name (GtkWindow *window,\n  279 |                         Window     client_window)\n  280 | {\n  281 |   MetaFrame *frame = META_FRAME (window);\n  282 | \n  283 |   g_clear_pointer (&frame->net_wm_visible_name, g_free);\n  284 |   frame->net_wm_name =\n  285 |     get_utf8_string_prop (window, client_window, frame->atom__NET_WM_NAME);\n  286 |   update_frame_title (frame);\n  287 | }"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"In clutter_flow_layout_get_preferred_height(), the non-overflowing/vertical branch computes total inter-row spacing as `self->col_spacing * self->line_count`. This is wrong twice: (a) it uses col_spacing instead of row_spacing even though it is stacking lines vertically (rows), and (b) it multiplies by line_count instead of (line_count - 1). Every other equivalent block in the file (the horizontal height branch at line 516, and both width branches at lines 325 and 342) correctly uses `* (line_count - 1)` with the matching spacing axis. The result is an over-reported natural height (one spurious spacing unit) using the wrong spacing property, leading to incorrect preferred-height reporting for vertically-overflowing flow layouts.","fix":"Change the else branch to use `total_spacing = self->row_spacing * (self->line_count - 1);` to match the width branches and the orientation.","locations":[{"ref":"clutter/clutter/clutter-flow-layout.c:522-538","code":"  522 |   else\n  523 |     {\n  524 |       g_array_append_val (self->line_min, line_min_height);\n  525 |       g_array_append_val (self->line_natural, line_natural_height);\n  526 | \n  527 |       self->line_count = line_count;\n  528 | \n  529 |       if (self->line_count > 0)\n  530 |         {\n  531 |           gfloat total_spacing;\n  532 | \n  533 |           total_spacing = self->col_spacing * self->line_count;\n  534 | \n  535 |           total_min_height += total_spacing;\n  536 |           total_natural_height += total_spacing;\n  537 |         }\n  538 |     }"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"Copy-paste error computing the Y origin of the damage source rectangle: the Y term divides by layout->width instead of layout->height. This distorts accumulated damage Y coordinates whenever the layout is not square (the common case), leading to incorrect/missing screen-cast damage regions and visual artifacts. The X term correctly uses layout->width.","fix":"Change the divisor on the Y line to layout->height: 'src_rect.origin.y = roundf ((float) -layout->y * priv->video_format.size.height / layout->height);'.","locations":[{"ref":"src/backends/meta-screen-cast-stream-src.c:1180-1183","code":" 1180 |       src_rect.origin.x = roundf ((float) -layout->x *\n 1181 |                                   priv->video_format.size.width / layout->width);\n 1182 |       src_rect.origin.y = roundf ((float) -layout->y *\n 1183 |                                   priv->video_format.size.height / layout->width);"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"meta_shaped_texture_get_property() returns the wrong field for PROP_COLOR_STATE: it calls g_value_set_object(value, stex->clutter_context) instead of stex->color_state. Any code reading the \"color-state\" property gets the ClutterContext object (or a type-mismatched object), which is incorrect and can lead to wrong behavior or warnings.","fix":"Return stex->color_state: g_value_set_object (value, stex->color_state);","locations":[{"ref":"src/compositor/meta-shaped-texture.c:173-175","code":"  173 |     case PROP_COLOR_STATE:\n  174 |       g_value_set_object (value, stex->clutter_context);\n  175 |       break;"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"cogl_indices_new can return NULL (when cogl_buffer_set_data fails), but cogl_context_get_rectangle_indices stores that return value unconditionally and returns it. The byte path calls cogl_context_set_rectangle_byte_indices with a possibly-NULL pointer (then returns it), and the short path likewise stores it; the journal flush then dereferences the result. A failed index-buffer upload thus turns into a NULL CoglIndices used for drawing rather than a handled error.","fix":"Check the return of cogl_indices_new and propagate/handle the NULL case (e.g. g_warn_if_fail and bail) instead of caching and returning a NULL CoglIndices.","locations":[{"ref":"cogl/cogl/cogl-indices.c:153-164","code":"  153 |           rectangle_byte_indices\n  154 |             = cogl_indices_new (ctx,\n  155 |                                 COGL_INDICES_TYPE_UNSIGNED_BYTE,\n  156 |                                 byte_array,\n  157 |                                 256 / 4 * 6);\n  158 | \n  159 |           cogl_context_set_rectangle_byte_indices (ctx, rectangle_byte_indices);\n  160 | \n  161 |           g_free (byte_array);\n  162 |         }\n  163 | \n  164 |       return rectangle_byte_indices;"},{"ref":"cogl/cogl/cogl-indices.c:203-215","code":"  203 |           CoglIndices *new_indices = cogl_indices_new (ctx,\n  204 |                                                        COGL_INDICES_TYPE_UNSIGNED_SHORT,\n  205 |                                                        short_array,\n  206 |                                                        rectangle_short_indices_len);\n  207 |           cogl_context_set_rectangle_short_indices (ctx, new_indices);\n  208 | \n  209 |           g_free (short_array);\n  210 |         }\n  211 | \n  212 |       cogl_context_set_rectangle_short_indices_len (ctx,\n  213 |                                                     rectangle_short_indices_len);\n  214 | \n  215 |       return cogl_context_get_rectangle_short_indices (ctx);"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"create_gbm_bo_egl_image() has return type EGLImageKHR but returns the boolean literal FALSE on the gbm_bo_get_fd() error path (line 63). FALSE happens to equal NULL/EGL_NO_IMAGE so callers behave correctly today, but returning a gboolean from an EGLImageKHR-typed function is type-confused and misleading.","fix":"Return EGL_NO_IMAGE_KHR instead of FALSE on the error path for clarity and type-correctness.","locations":[{"ref":"src/backends/native/meta-egl-gbm.c:58-64","code":"   58 |   shared_bo_fd = gbm_bo_get_fd (shared_bo);\n   59 |   if (shared_bo_fd < 0)\n   60 |     {\n   61 |       g_set_error (error, G_IO_ERROR, G_IO_ERROR_FAILED,\n   62 |                    \"Failed to export gbm_bo: %s\", strerror (errno));\n   63 |       return FALSE;\n   64 |     }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"meta_drm_timeline_set_property() calls fcntl(fd, F_DUPFD_CLOEXEC, 0) for both drm-fd and syncobj-fd but ignores the return value when it is -1 (e.g. EMFILE/EBADF). The failed dup leaves timeline->drm / drm_syncobj_fd at -1 silently; later operations then fail with confusing errors instead of reporting the real failure at construction time.","fix":"Check the fcntl() result; on -1, leave the field at -1 and record/propagate an error (or at least g_warning) so initable_init can fail cleanly.","locations":[{"ref":"src/common/meta-drm-timeline.c:103-110","code":"  103 |     case PROP_DRM_FD:\n  104 |       fd = g_value_get_int (value);\n  105 |       timeline->drm = fcntl (fd, F_DUPFD_CLOEXEC, 0);\n  106 |       break;\n  107 |     case PROP_SYNCOBJ_FD:\n  108 |       fd = g_value_get_int (value);\n  109 |       timeline->drm_syncobj_fd = fcntl (fd, F_DUPFD_CLOEXEC, 0);\n  110 |       break;"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"meta_texture_mipmap_get_paint_texture() may return NULL when ensure_mipmap_texture() fails to allocate the offscreen texture/framebuffer (the early-return paths in ensure_mipmap_texture leave mipmap_texture NULL). In meta_shaped_texture do_paint_content(), the returned value is assigned to paint_tex and then used in meta_multi_texture_get_n_planes(paint_tex) and meta_multi_texture_get_plane(paint_tex, i). meta_multi_texture_get_n_planes(NULL) hits g_return_val_if_fail and returns 0 (so the plane loop is skipped), but the window then paints nothing for that frame with a stream of CRITICAL warnings rather than falling back to the base texture.","fix":"In do_paint_content(), if meta_texture_mipmap_get_paint_texture() returns NULL, fall back to stex->texture (and use COGL_PIPELINE_FILTER_LINEAR) instead of using the NULL mipmap texture.","locations":[{"ref":"src/compositor/meta-texture-mipmap.c:275-283","code":"  275 | MetaMultiTexture *\n  276 | meta_texture_mipmap_get_paint_texture (MetaTextureMipmap *mipmap)\n  277 | {\n  278 |   g_return_val_if_fail (mipmap != NULL, NULL);\n  279 | \n  280 |   ensure_mipmap_texture (mipmap);\n  281 | \n  282 |   return mipmap->mipmap_texture;\n  283 | }"},{"ref":"src/compositor/meta-shaped-texture.c:903-912","code":"  903 |       if (stex->create_mipmaps &&\n  904 |           transforms.x_scale < 0.5 &&\n  905 |           transforms.y_scale < 0.5 &&\n  906 |           texture_width >= 8 &&\n  907 |           texture_height >= 8)\n  908 |         {\n  909 |           paint_tex = meta_texture_mipmap_get_paint_texture (stex->texture_mipmap);\n  910 |           min_filter = COGL_PIPELINE_FILTER_LINEAR_MIPMAP_NEAREST;\n  911 |         }\n  912 |     }"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"meta_frame_query_borders() accepts the property data when res==Success && nitems==4 but never verifies that 'type' is XA_CARDINAL or that 'format' is 32. If a misbehaving/hostile client sets _GTK_FRAME_EXTENTS or _MUTTER_FRAME_EXTENTS with a different format (e.g. 8 or 16) but 4 items, the code casts data to (long*) and reads 4 longs (up to 32 bytes) from a buffer that may be only 4 or 8 bytes, causing an out-of-bounds read.","fix":"Also require type == XA_CARDINAL && format == 32 before interpreting data as longs.","locations":[{"ref":"src/x11/meta-x11-frame.c:321-350","code":"  321 |   res = XGetWindowProperty (x11_display->xdisplay,\n  322 |                             frame->xwindow,\n  323 |                             x11_display->atom__GTK_FRAME_EXTENTS,\n  324 |                             0, 4,\n  325 |                             False, XA_CARDINAL,\n  326 |                             &type, &format,\n  327 |                             &nitems, &bytes_after,\n  328 |                             (unsigned char **) &data);\n  329 | \n  330 |   if (mtk_x11_error_trap_pop_with_return (x11_display->xdisplay) == Success &&\n  331 |       res == Success && nitems == 4)\n  332 |     {\n  333 |       int left, right, top, bottom;\n  334 | \n  335 |       meta_window_protocol_to_stage_size (window,\n  336 |                                           ((long *) data)[0],\n  337 |                                           ((long *) data)[1],\n  338 |                                           &left,\n  339 |                                           &right);\n  340 |       meta_window_protocol_to_stage_size (window,\n  341 |                                           ((long *) data)[2],\n  342 |                                           ((long *) data)[3],\n  343 |                                           &top,\n  344 |                                           &bottom);\n  345 | \n  346 |       borders->invisible.left = left;\n  347 |       borders->invisible.right = right;\n  348 |       borders->invisible.top = top;\n  349 |       borders->invisible.bottom = bottom;\n  350 |     }"},{"ref":"src/x11/meta-x11-frame.c:360-388","code":"  360 |   res = XGetWindowProperty (x11_display->xdisplay,\n  361 |                             frame->xwindow,\n  362 |                             x11_display->atom__MUTTER_FRAME_EXTENTS,\n  363 |                             0, 4,\n  364 |                             False, XA_CARDINAL,\n  365 |                             &type, &format,\n  366 |                             &nitems, &bytes_after,\n  367 |                             (unsigned char **) &data);\n  368 | \n  369 |   if (mtk_x11_error_trap_pop_with_return (x11_display->xdisplay) == Success &&\n  370 |       res == Success && nitems == 4)\n  371 |     {\n  372 |       int left, right, top, bottom;\n  373 | \n  374 |       meta_window_protocol_to_stage_size (window,\n  375 |                                           ((long *) data)[0],\n  376 |                                           ((long *) data)[1],\n  377 |                                           &left,\n  378 |                                           &right);\n  379 |       meta_window_protocol_to_stage_size (window,\n  380 |                                           ((long *) data)[2],\n  381 |                                           ((long *) data)[3],\n  382 |                                           &top,\n  383 |                                           &bottom);\n  384 |       borders->visible.left = left;\n  385 |       borders->visible.right = right;\n  386 |       borders->visible.top = top;\n  387 |       borders->visible.bottom = bottom;\n  388 |     }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"get_utf8_string_prop() returns memory allocated by Xlib's XGetWindowProperty (must be released with XFree), but the returned pointer is stored in frame->net_wm_name / frame->net_wm_visible_name and later released with g_free (in meta_frame_finalize and the g_clear_pointer(..., g_free) calls in the frame_sync_* functions). Mixing XFree-allocated memory with g_free is undefined behavior and can corrupt the heap.","fix":"Either copy the string into glib-owned memory (e.g. g_strdup) and XFree the Xlib buffer inside get_utf8_string_prop(), or consistently free these fields with XFree.","locations":[{"ref":"src/frames/meta-frame.c:208-246","code":"  208 | static char *\n  209 | get_utf8_string_prop (GtkWindow *window,\n  210 |                       Window     client_window,\n  211 |                       Atom       prop)\n  212 | {\n  213 |   MetaFrame *frame = META_FRAME (window);\n  214 |   GdkDisplay *display;\n  215 |   char *str = NULL;\n  216 |   int format;\n  217 |   Atom type;\n  218 |   unsigned long nitems, bytes_after;\n  219 | \n  220 |   G_GNUC_BEGIN_IGNORE_DEPRECATIONS\n  221 | \n  222 |   display = gtk_widget_get_display (GTK_WIDGET (frame));\n  223 | \n  224 |   gdk_x11_display_error_trap_push (display);\n  225 | \n  226 |   if (XGetWindowProperty (gdk_x11_display_get_xdisplay (display),\n  227 |                           client_window,\n  228 |                           prop,\n  229 |                           0, G_MAXLONG, False,\n  230 |                           gdk_x11_get_xatom_by_name_for_display (display,\n  231 |                                                                  \"UTF8_STRING\"),\n  232 |                           &type, &format,\n  233 |                           &nitems, &bytes_after,\n  234 |                           (unsigned char **) &str) != Success)\n  235 |     {\n  236 |       gdk_x11_display_error_trap_pop_ignored (display);\n  237 |       return NULL;\n  238 |     }\n  239 | \n  240 |   if (gdk_x11_display_error_trap_pop (display))\n  241 |     return NULL;\n  242 | \n  243 |   G_GNUC_END_IGNORE_DEPRECATIONS\n  244 | \n  245 |   return str;\n  246 | }"},{"ref":"src/frames/meta-frame.c:271-273","code":"  271 |   g_clear_pointer (&frame->net_wm_visible_name, g_free);\n  272 |   frame->net_wm_visible_name =\n  273 |     get_utf8_string_prop (window, client_window, frame->atom__NET_WM_VISIBLE_NAME);"},{"ref":"src/frames/meta-frame.c:510-511","code":"  510 |   g_clear_pointer (&frame->net_wm_visible_name, g_free);\n  511 |   g_clear_pointer (&frame->net_wm_name, g_free);"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"clutter_flow_layout_get_preferred_width()/get_preferred_height() unconditionally free and reallocate the line_min and line_natural GArrays (g_array_free + g_array_sized_new) on every measurement pass. These functions are called repeatedly in the layout hot path (and allocate() calls both again when the available size differs from the cached request). Re-creating the two arrays each call adds avoidable allocator churn; the arrays could be reset with g_array_set_size(arr, 0) and reused.","fix":"Allocate line_min/line_natural once (lazily) and clear them with g_array_set_size(arr, 0) at the start of each measurement instead of freeing and reallocating.","locations":[{"ref":"clutter/clutter/clutter-flow-layout.c:206-217","code":"  206 |   if (self->line_min != NULL)\n  207 |     g_array_free (self->line_min, TRUE);\n  208 | \n  209 |   if (self->line_natural != NULL)\n  210 |     g_array_free (self->line_natural, TRUE);\n  211 | \n  212 |   self->line_min = g_array_sized_new (FALSE, FALSE,\n  213 |                                       sizeof (gfloat),\n  214 |                                       16);\n  215 |   self->line_natural = g_array_sized_new (FALSE, FALSE,\n  216 |                                           sizeof (gfloat),\n  217 |                                           16);"},{"ref":"clutter/clutter/clutter-flow-layout.c:397-408","code":"  397 |   if (self->line_min != NULL)\n  398 |     g_array_free (self->line_min, TRUE);\n  399 | \n  400 |   if (self->line_natural != NULL)\n  401 |     g_array_free (self->line_natural, TRUE);\n  402 | \n  403 |   self->line_min = g_array_sized_new (FALSE, FALSE,\n  404 |                                       sizeof (gfloat),\n  405 |                                       16);\n  406 |   self->line_natural = g_array_sized_new (FALSE, FALSE,\n  407 |                                           sizeof (gfloat),\n  408 |                                           16);"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"negligible","description":"In clutter_flow_layout_allocate() the cache-invalidation check `(self->req_width >= 0 && avail_width != self->req_width)` is effectively always satisfiable because req_width/req_height default to 0 (never initialized to a sentinel like -1 in _init) and `>= 0` includes 0. Combined with the fact that for_width/for_height passed to the preferred-size functions can legitimately be 0, the guard does not reliably avoid the recompute it was intended to skip. Minor wasted relayout work in some cases.","fix":"Initialize req_width/req_height to -1 in clutter_flow_layout_init() and treat -1 as 'no cached request', so the avail-size comparison only triggers a recompute when a genuine prior request exists.","locations":[{"ref":"clutter/clutter/clutter-flow-layout.c:578-591","code":"  578 |   /* blow the cached preferred size and re-compute with the given\n  579 |    * available size in case the FlowLayout wasn't given the exact\n  580 |    * size it requested\n  581 |    */\n  582 |   if ((self->req_width >= 0 && avail_width != self->req_width) ||\n  583 |       (self->req_height >= 0 && avail_height != self->req_height))\n  584 |     {\n  585 |       clutter_flow_layout_get_preferred_width (manager, container,\n  586 |                                                avail_height,\n  587 |                                                NULL, NULL);\n  588 |       clutter_flow_layout_get_preferred_height (manager, container,\n  589 |                                                 avail_width,\n  590 |                                                 NULL, NULL);\n  591 |     }"},{"ref":"clutter/clutter/clutter-flow-layout.c:1028-1042","code":" 1028 | static void\n 1029 | clutter_flow_layout_init (ClutterFlowLayout *self)\n 1030 | {\n 1031 |   self->orientation = CLUTTER_ORIENTATION_HORIZONTAL;\n 1032 | \n 1033 |   self->col_spacing = 0;\n 1034 |   self->row_spacing = 0;\n 1035 | \n 1036 |   self->min_col_width = self->min_row_height = 0;\n 1037 |   self->max_col_width = self->max_row_height = -1;\n 1038 | \n 1039 |   self->line_min = NULL;\n 1040 |   self->line_natural = NULL;\n 1041 |   self->snap_to_grid = TRUE;\n 1042 | }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","description":"create_attribute_cb allocates a fresh attribute name string with g_strdup_printf for every layer beyond index 7 on every journal flush (the first 8 names are static). For pipelines using more than 8 texture layers this re-allocates and frees the same constant strings on each flush in the draw hot path. Minor, only affects >8-layer pipelines.","fix":"Cache the generated 'cogl_tex_coordN_in' names (e.g. in a per-context array indexed by layer) instead of recreating them on every flush.","locations":[{"ref":"cogl/cogl/cogl-journal.c:497-513","code":"  497 |   name = layer_number < 8 ? (char *)names[layer_number] :\n  498 |     g_strdup_printf (\"cogl_tex_coord%d_in\", layer_number);\n  499 | \n  500 |   /* XXX: it may be worth having some form of static initializer for\n  501 |    * attributes... */\n  502 |   *attribute_entry =\n  503 |     cogl_attribute_new (flush_state->attribute_buffer,\n  504 |                         name,\n  505 |                         flush_state->stride,\n  506 |                         flush_state->array_offset +\n  507 |                         (POS_STRIDE + COLOR_STRIDE) * 4 +\n  508 |                         TEX_STRIDE * 4 * state->current,\n  509 |                         2,\n  510 |                         COGL_ATTRIBUTE_TYPE_FLOAT);\n  511 | \n  512 |   if (layer_number >= 8)\n  513 |     g_free (name);"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","description":"create_pipeline() in meta-background.c mutates the cached static template pipeline on every call (cogl_pipeline_set_layer_filters before cogl_pipeline_copy). Setting filters on the shared template each time is redundant work and means the template carries state that only matters before the copy; it would be cleaner and marginally cheaper to set the filters once at template creation time.","fix":"Move the cogl_pipeline_set_layer_filters() call inside the 'if (templates[type] == NULL)' block so it only runs at template creation.","locations":[{"ref":"src/compositor/meta-background.c:614-637","code":"  614 | static CoglPipeline *\n  615 | create_pipeline (CoglContext  *cogl_context,\n  616 |                  PipelineType  type)\n  617 | {\n  618 |   const char * const blend_strings[3] = {\n  619 |     [PIPELINE_REPLACE] = \"RGBA = ADD (SRC_COLOR, 0)\",\n  620 |     [PIPELINE_ADD] = \"RGBA = ADD (SRC_COLOR, DST_COLOR)\",\n  621 |     [PIPELINE_OVER_REVERSE] = \"RGBA = ADD (SRC_COLOR * (1 - DST_COLOR[A]), DST_COLOR)\",\n  622 |   };\n  623 |   static CoglPipeline *templates[3];\n  624 | \n  625 |   if (templates[type] == NULL)\n  626 |     {\n  627 |       templates[type] = meta_create_texture_pipeline (cogl_context, NULL);\n  628 |       cogl_pipeline_set_blend (templates[type], blend_strings[type], NULL);\n  629 |     }\n  630 | \n  631 |   cogl_pipeline_set_layer_filters (templates[type],\n  632 |                                    0,\n  633 |                                    COGL_PIPELINE_FILTER_LINEAR_MIPMAP_LINEAR,\n  634 |                                    COGL_PIPELINE_FILTER_LINEAR);\n  635 | \n  636 |   return cogl_pipeline_copy (templates[type]);\n  637 | }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","description":"find_first_fit() calls rectangle_overlaps_some_window() inside both the below-each-window and right-of-each-window loops, each call iterating all windows; combined with the two g_list_copy + multiple g_list_sort passes per placement this is O(n^2) work executed every time an un-positioned window is placed. The accompanying comment in get_minimal_spanning_set acknowledges algorithmic cost elsewhere; here n is typically small so impact is negligible, but on workspaces with many windows window placement can become noticeably slow.","fix":"If this ever shows on profiles, precompute a spatial index (e.g. interval/segment structure) of existing window frame rects once per placement instead of re-scanning the full list for every candidate position.","locations":[{"ref":"src/core/place.c:632-757","code":"  632 | static gboolean\n  633 | find_first_fit (MetaWindow         *window,\n  634 |                 /* visible windows on relevant workspaces */\n  635 |                 GList              *windows,\n  636 |                 MetaLogicalMonitor *logical_monitor,\n  637 |                 int                 width,\n  638 |                 int                 height,\n  639 |                 int                *new_x,\n  640 |                 int                *new_y)\n  641 | {\n  642 |   /* This algorithm is limited - it just brute-force tries\n  643 |    * to fit the window in a small number of locations that are aligned\n  644 |    * with existing windows. It tries to place the window on\n  645 |    * the bottom of each existing window, and then to the right\n  646 |    * of each existing window, aligned with the left/top of the\n  647 |    * existing window in each of those cases.\n  648 |    */\n  649 |   int retval;\n  650 |   GList *below_sorted;\n  651 |   GList *end_sorted;\n  652 |   GList *tmp;\n  653 |   MtkRectangle rect = MTK_RECTANGLE_INIT (0, 0, width, height);\n  654 |   MtkRectangle work_area;\n  655 |   gboolean ltr = clutter_get_text_direction () == CLUTTER_TEXT_DIRECTION_LTR;\n  656 | \n  657 |   retval = FALSE;\n  658 | \n  659 |   /* Below each window */\n  660 |   below_sorted = g_list_copy (windows);\n  661 |   below_sorted = g_list_sort (below_sorted, ltr ? leftmost_cmp : rightmost_cmp);\n  662 |   below_sorted = g_list_sort (below_sorted, topmost_cmp);\n  663 | \n  664 |   /* To the right of each window */\n  665 |   end_sorted = g_list_copy (windows);\n  666 |   end_sorted = g_list_sort (end_sorted, topmost_cmp);\n  667 |   end_sorted = g_list_sort (end_sorted, ltr ? leftmost_cmp : rightmost_cmp);\n  668 | \n  669 | #ifdef WITH_VERBOSE_MODE\n  670 |   {\n  671 |     char monitor_location_string[RECT_LENGTH];\n  672 | \n  673 |     meta_rectangle_to_string (&logical_monitor->rect,\n  674 |                               monitor_location_string);\n  675 |     meta_topic (META_DEBUG_PLACEMENT,\n  676 |                 \"Natural monitor is %s\",\n  677 |                 monitor_location_string);\n  678 |   }\n  679 | #endif\n  680 | \n  681 |   meta_window_get_work_area_for_logical_monitor (window,\n  682 |                                                  logical_monitor,\n  683 |                                                  &work_area);\n  684 | \n  685 |   center_tile_rect_in_area (&rect, &work_area);\n  686 | \n  687 |   if (mtk_rectangle_contains_rect (&work_area, &rect) &&\n  688 |       !rectangle_overlaps_some_window (&rect, windows))\n  689 |     {\n  690 |       *new_x = rect.x;\n  691 |       *new_y = rect.y;\n  692 | \n  693 |       retval = TRUE;\n  694 | \n  695 |       goto out;\n  696 |     }\n  697 | \n  698 |   /* try below each window */\n  699 |   tmp = below_sorted;\n  700 |   while (tmp != NULL)\n  701 |     {\n  702 |       MetaWindow *w = tmp->data;\n  703 |       MtkRectangle frame_rect;\n  704 | \n  705 |       meta_window_get_frame_rect (w, &frame_rect);\n  706 | \n  707 |       rect.x = frame_rect.x;\n  708 |       rect.y = frame_rect.y + frame_rect.height;\n  709 | \n  710 |       if (mtk_rectangle_contains_rect (&work_area, &rect) &&\n  711 |           !rectangle_overlaps_some_window (&rect, below_sorted))\n  712 |         {\n  713 |           *new_x = rect.x;\n  714 |           *new_y = rect.y;\n  715 | \n  716 |           retval = TRUE;\n  717 | \n  718 |           goto out;\n  719 |         }\n  720 | \n  721 |       tmp = tmp->next;\n  722 |     }\n  723 | \n  724 |   /* try to the right (or left in RTL environment) of each window */\n  725 |   tmp = end_sorted;\n  726 |   while (tmp != NULL)\n  727 |     {\n  728 |       MetaWindow *w = tmp->data;\n  729 |       MtkRectangle frame_rect;\n  730 | \n  731 |       meta_window_get_frame_rect (w, &frame_rect);\n  732 | \n  733 |       if (ltr)\n  734 |         rect.x = frame_rect.x + frame_rect.width;\n  735 |       else\n  736 |         rect.x = frame_rect.x - rect.width;\n  737 |       rect.y = frame_rect.y;\n  738 | \n  739 |       if (mtk_rectangle_contains_rect (&work_area, &rect) &&\n  740 |           !rectangle_overlaps_some_window (&rect, end_sorted))\n  741 |         {\n  742 |           *new_x = rect.x;\n  743 |           *new_y = rect.y;\n  744 | \n  745 |           retval = TRUE;\n  746 | \n  747 |           goto out;\n  748 |         }\n  749 | \n  750 |       tmp = tmp->next;\n  751 |     }\n  752 | \n  753 | out:\n  754 |   g_list_free (below_sorted);\n  755 |   g_list_free (end_sorted);\n  756 |   return retval;\n  757 | }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"meta_drm_buffer_gbm_new_take() takes a GError **error parameter but never reads or sets it (the function cannot fail), so the out-parameter is dead. Callers in meta-cursor-renderer-native.c pass &error and then test the returned buffer for NULL, which can never carry an error message, making error reporting on that path misleading.","fix":"Drop the unused GError **error parameter from meta_drm_buffer_gbm_new_take() (and update callers), since construction here cannot fail.","locations":[{"ref":"src/backends/native/meta-drm-buffer-gbm.c:253-268","code":"  253 | MetaDrmBufferGbm *\n  254 | meta_drm_buffer_gbm_new_take (MetaDeviceFile      *device_file,\n  255 |                               struct gbm_bo       *bo,\n  256 |                               MetaDrmBufferFlags   flags,\n  257 |                               GError             **error)\n  258 | {\n  259 |   MetaDrmBufferGbm *buffer_gbm;\n  260 | \n  261 |   buffer_gbm = g_object_new (META_TYPE_DRM_BUFFER_GBM,\n  262 |                              \"device-file\", device_file,\n  263 |                              \"flags\", flags,\n  264 |                              NULL);\n  265 |   buffer_gbm->bo = bo;\n  266 | \n  267 |   return buffer_gbm;\n  268 | }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Duplicated/incorrect comment when building per-window resistance edges. The block that computes the TOP edge of the window (META_SIDE_TOP, derived from rect.y + height) is prefixed with the comment \"Top side of this window is resistance for the bottom edge of the window being moved.\" which is copy-pasted verbatim from the preceding META_SIDE_BOTTOM block. The comment should describe the bottom side acting as resistance for the top edge.","fix":"Update the comment to read e.g. \"Bottom side of this window is resistance for the top edge of the window being moved.\"","locations":[{"ref":"src/compositor/edge-resistance.c:1021-1030","code":" 1021 |           /* Top side of this window is resistance for the bottom edge of\n 1022 |            * the window being moved.\n 1023 |            */\n 1024 |           new_edge = g_new (MetaEdge, 1);\n 1025 |           new_edge->rect = reduced;\n 1026 |           new_edge->rect.y += new_edge->rect.height;\n 1027 |           new_edge->rect.height = 0;\n 1028 |           new_edge->side_type = META_SIDE_TOP;\n 1029 |           new_edge->edge_type = META_EDGE_WINDOW;\n 1030 |           new_edges = g_list_prepend (new_edges, new_edge);"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In stack_do_relayer(), when a window's layer changes the code sets both need_resort and need_constrain to TRUE, but the immediately-following comment claims the opposite: \"don't need to constrain as constraining purely operates in terms of stack_position not layer\". The comment directly contradicts the line above it (need_constrain = TRUE) and is misleading to anyone modifying relayer/constrain interaction.","fix":"Either remove the contradictory comment or rewrite it to explain why constraining IS needed after a layer change (ensure_above() promotes layers based on transiency, so a layer change can require re-running constraints). Recommended: delete the stale comment.","locations":[{"ref":"src/core/stack.c:754-760","code":"  754 |           stack->need_resort = TRUE;\n  755 |           stack->need_constrain = TRUE;\n  756 |           /* don't need to constrain as constraining\n  757 |            * purely operates in terms of stack_position\n  758 |            * not layer\n  759 |            */\n  760 |         }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"reload_wm_protocols() ends with a meta_topic() that logs 'New _NET_STARTUP_ID \"%s\" for %s' using window->startup_id. This is copy-pasted from reload_net_startup_id(); it has nothing to do with WM_PROTOCOLS and prints an unrelated/misleading message in the WM_PROTOCOLS reload path.","fix":"Remove the misplaced meta_topic() call or replace it with a message describing the WM_PROTOCOLS reload.","locations":[{"ref":"src/x11/window-props.c:1348-1351","code":" 1348 |   meta_topic (META_DEBUG_X11,\n 1349 |               \"New _NET_STARTUP_ID \\\"%s\\\" for %s\",\n 1350 |               window->startup_id ? window->startup_id : \"unset\",\n 1351 |               window->desc);"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","description":"stage_has_key_focus() returns TRUE when clutter_stage_get_key_focus() == NULL, i.e. it returns TRUE precisely when the stage does NOT have a focused actor. The name asserts the opposite of what it computes. Callers compensate with extra negations (e.g. get_window_for_event uses it as 'no actor focus => use display->focus_window', and line 271 uses !stage_has_key_focus). The double-negation is confusing and a refactor could easily introduce a real focus-routing bug.","fix":"Rename to stage_has_no_key_focus() (or invert the body to actually mean 'has key focus') and adjust the two call sites accordingly so the name matches the semantics.","locations":[{"ref":"src/core/events.c:54-60","code":"   54 | static gboolean\n   55 | stage_has_key_focus (MetaDisplay *display)\n   56 | {\n   57 |   ClutterStage *stage = stage_from_display (display);\n   58 | \n   59 |   return clutter_stage_get_key_focus (stage) == NULL;\n   60 | }"},{"ref":"src/core/events.c:271","code":"  271 |       if (IS_KEY_EVENT (event_type) && !stage_has_key_focus (display))"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"negligible","description":"clutter_event_copy() takes a reference on the new event's source_device via g_set_object(&new_event->any.source_device, ...) and then immediately overwrites the entire struct with `*new_event = *event;`. The g_set_object write to new_event->any.source_device is clobbered by the struct copy. It happens to remain correct (the ref taken by g_set_object covers the identical pointer copied by the struct assignment), but the ordering is fragile and misleading: a future reader could swap the two lines and introduce a missing-ref/leak. The reference acquisition should follow the bulk copy.","fix":"Do `*new_event = *event;` first, then `new_event->any.source_device = NULL; g_set_object (&new_event->any.source_device, event->any.source_device);` (or g_object_ref the field after the struct copy) so the reference is unambiguously owned by new_event.","locations":[{"ref":"clutter/clutter/clutter-event.c:821-824","code":"  821 |   new_event = clutter_event_new (CLUTTER_NOTHING);\n  822 | \n  823 |   g_set_object (&new_event->any.source_device, event->any.source_device);\n  824 |   *new_event = *event;"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"negligible","description":"MAX_SIZE for screen-cast video is defined as SPA_RECTANGLE (16384, 16386); the height 16386 is an apparent typo (the matching width is 16384). The asymmetric, non-power-of-two height limit looks unintentional.","fix":"Make the height match the width: SPA_RECTANGLE (16384, 16384).","locations":[{"ref":"src/backends/meta-screen-cast-stream-src.c:71","code":"   71 | #define MAX_SIZE SPA_RECTANGLE (16384, 16386)"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"negligible","description":"META_WAYLAND_SHM_MAX_PLANES is defined as 4, but the SHM plane offset/stride arrays in multi_texture_from_shm and process_shm_buffer_damage are sized 3 (shm_offset[3], shm_stride[3]). get_offset_and_stride writes indices [0, n_planes-1]. This is safe today only because no supported SHM MetaMultiTextureFormat has more than 3 planes; if a 4-plane SHM format were added, get_offset_and_stride would write shm_offset[3]/shm_stride[3] out of bounds. The unused/misleading MAX_PLANES=4 constant masks this latent fragility.","fix":"Size the local shm_offset/shm_stride arrays by META_WAYLAND_SHM_MAX_PLANES (or COGL_PIXEL_FORMAT_MAX_PLANES) instead of the hardcoded 3, so the constant and the buffers stay consistent.","locations":[{"ref":"src/wayland/meta-wayland-buffer.c:73","code":"   73 | #define META_WAYLAND_SHM_MAX_PLANES 4"},{"ref":"src/wayland/meta-wayland-buffer.c:351-352","code":"  351 |   int shm_offset[3] = { 0 };\n  352 |   int shm_stride[3] = { 0 };"},{"ref":"src/wayland/meta-wayland-buffer.c:790-791","code":"  790 |   int shm_offset[3] = { 0 };\n  791 |   int shm_stride[3] = { 0 };"}]}]</script>
<div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-31 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
