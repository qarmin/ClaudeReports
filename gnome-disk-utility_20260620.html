t at 464 is left, and dispose handles it - but the take() at 488 happens unconditionally even when copy_disk_image returned early/erred, meaning uninhibit may be called while the suspend inhibit is still desired conceptually. More concretely, line 488 unwraps via `?` on take(): if the cookie were already None it silently returns None from the whole function mid-cleanup, skipping the close().","fix":"Do not use `?` on the cookie take during cleanup; uninhibit only if Some, and ensure the cleanup/close path always runs regardless of cookie state.","locations":[{"ref":"src/disks/restore_disk_image_dialog.rs:455-503","code":"  455 |         let inhibit_cookie = application.inhibit(\n  456 |             self.native().and_downcast_ref::<gtk::Window>(),\n  457 |             gtk::ApplicationInhibitFlags::SUSPEND | gtk::ApplicationInhibitFlags::LOGOUT,\n  458 |             // Translators: Reason why suspend/logout is being inhibited\n  459 |             Some(&pgettext(\n  460 |                 \"restore-inhibit-message\",\n  461 |                 \"Copying disk image to device\",\n  462 |             )),\n  463 |         );\n  464 |         imp.inhibit_cookie.set(Some(inhibit_cookie));\n  465 | \n  466 |         libgdu::ensure_unused(&self.client(), &self.window()?, object)\n  467 |             .await\n  468 |             .ok()?;\n  469 | \n  470 |         let local_job = ffi::create_local_job(object);\n  471 |         local_job.set_operation(\"x-gdu-restore-disk-image\");\n  472 |         // Translators: this is the description of the job\n  473 |         local_job.set_description(gettext(\"Restoring Disk Image\"));\n  474 |         local_job.set_progress_valid(true);\n  475 |         local_job.set_cancelable(true);\n  476 |         imp.local_job.replace(Some(local_job));\n  477 | \n  478 |         let block = imp.block.borrow().clone()?;\n  479 |         let res = self\n  480 |             .copy_disk_image(\n  481 |                 block,\n  482 |                 &mut futures::io::AllowStdIo::new(input_stream),\n  483 |                 input_size,\n  484 |             )\n  485 |             .await;\n  486 | \n  487 |         self.play_complete_sound();\n  488 |         application.uninhibit(imp.inhibit_cookie.take()?);\n  489 | \n  490 |         if let Err(err) = res {\n  491 |             libgdu::show_error(self, &gettext(\"Error restoring disk image\"), err).await;\n  492 |         } else {\n  493 |             // successfully written image to device\n  494 |             self.update_job(None, true);\n  495 |             // clear job\n  496 |             if let Some(job) = imp.local_job.take() {\n  497 |                 ffi::destroy_local_job(job);\n  498 |             }\n  499 |         }\n  500 | \n  501 |         self.set_visible(false);\n  502 |         self.close();\n  503 |         Some(())","lines":49,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/restore_disk_image_dialog.rs#L455-503"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_utils_can_check guards the flush with 'if (flush && cache != NULL)' while the sibling functions (can_resize/can_repair/can_format) guard with just 'if (flush)'. g_clear_pointer already handles NULL, so the inconsistency is harmless functionally but signals copy-paste drift; more importantly it shows these four near-identical ~40-line functions are duplicated and should be unified to avoid exactly this kind of divergence.","fix":"Extract a single helper parameterized by the udisks can_* call and variant signature; removes ~120 lines of duplication.","locations":[{"ref":"src/libgdu/gduutils.c:793-795","code":"  793 |     G_LOCK (can_check_lock);\n  794 |     if (flush && cache != NULL)\n  795 |         g_clear_pointer (&cache, g_hash_table_destroy);","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.c#L793-795"},{"ref":"src/libgdu/gduutils.c:662-664","code":"  662 |     G_LOCK (can_resize_lock);\n  663 |     if (flush)\n  664 |         g_clear_pointer (&cache, g_hash_table_destroy);","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.c#L662-664"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_utils_get_pretty_uri builds '~/%s' from ret + strlen(homedir) + 1 whenever ret has homedir as a prefix. If the path equals homedir exactly (no trailing slash, e.g. '/home/user'), ret[strlen(homedir)] is the NUL terminator and +1 reads one byte past the string. Also a path like '/home/username2' has prefix '/home/user' and would be wrongly rewritten to '~/name2'. The prefix test must ensure the next char is '/' or end.","fix":"Only rewrite when ret[strlen(homedir)] == '/' (or the string ends there), and handle the exact-match case to avoid reading past the terminator.","locations":[{"ref":"src/libgdu/gduutils.c:908-912","code":"  908 |         if (g_str_has_prefix (ret, homedir)) {\n  909 |             s = ret;\n  910 |             ret = g_strdup_printf (\"~/%s\", ret + strlen (homedir) + 1);\n  911 |             g_free (s);\n  912 |         }","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.c#L908-912"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"is_same_size never tracks the minimum size. min_size is initialized to u64::MIN (0); the check `if block_size < min_size` can never be true since nothing is below 0, so min_size stays 0 forever. The function then returns (false-or-true, 0) and the divergence test `max_size - min_size > min_size * 101 / 100` degenerates (min_size*... is always 0), so it reports same-size based only on whether max_size exceeds 1 MiB. The minimum-size semantics are completely broken.","fix":"Initialize min_size to u64::MAX so the first block sets it, and reconsider the divergence formula (the C original compares (max-min) against thresholds relative to max/min).","locations":[{"ref":"src/libgdu/gduutils.rs:749-772","code":"  749 | pub async fn is_same_size(blocks: &[udisks::block::BlockProxy<'static>]) -> (bool, u64) {\n  750 |     if blocks.is_empty() {\n  751 |         return (false, u64::MAX);\n  752 |     }\n  753 |     let mut min_size = u64::MIN;\n  754 |     let mut max_size = 0;\n  755 | \n  756 |     for block in blocks {\n  757 |         let block_size = block.size().await.unwrap_or(0);\n  758 |         if block_size > max_size {\n  759 |             max_size = block_size;\n  760 |         }\n  761 |         if block_size < min_size {\n  762 |             min_size = block_size;\n  763 |         }\n  764 |     }\n  765 | \n  766 |     // bail if there is more than 1% difference and at least 1MiB\n  767 |     if max_size - min_size > min_size * 101 / 100 && max_size - min_size > 1048576 {\n  768 |         return (false, min_size);\n  769 |     }\n  770 | \n  771 |     (true, min_size)\n  772 | }","lines":24,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.rs#L749-772"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"open() logs 'File ... does not exists' and continues on a non-existent file, but query_exists with Cancellable::NONE is a blocking sync stat in the open handler; more importantly the error message and the early continue mean dropped files are silently ignored with only a log line, giving the user no feedback. Minor UX/robustness issue.","fix":"Surface a user-visible error (or at least present a window with an error) when a passed file does not exist, rather than only logging.","locations":[{"ref":"src/disk-image-mounter/application.rs:29-40","code":"   29 |         fn open(&self, files: &[gio::File], _hint: &str) {\n   30 |             for file in files {\n   31 |                 if !file.query_exists(gio::Cancellable::NONE) {\n   32 |                     log::error!(\n   33 |                         \"File {:?} does not exists\",\n   34 |                         file.path().as_ref().map(|path| path.display())\n   35 |                     );\n   36 |                     continue;\n   37 |                 }\n   38 |                 ImageMounterWindow::new(&self.obj(), file).present();\n   39 |             }\n   40 |         }","lines":12,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disk-image-mounter/application.rs#L29-40"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"mountable() comment vs. behavior: the doc says 'true when the file is (directly) mountable' but the implementation returns true for everything except one specific xz-compressed mime type. Files that are not disk images at all (e.g. text files) are reported mountable. This is an intentional allow-list-by-denylist per the inline comment, but the function name/doc are misleading and a genuinely non-image file will be attempted to be loop-mounted and fail later.","fix":"Rename/clarify the doc to 'not known to be unmountable', or tighten the check; at minimum align the doc comment with the deny-list behavior.","locations":[{"ref":"src/disk-image-mounter/window.rs:184-193","code":"  184 |     /// Returns `true` when the given file is (directly) mountable.\n  185 |     #[template_callback]\n  186 |     fn mountable(&self, file: Option<&gio::File>) -> bool {\n  187 |         let Some(file) = file else { return false };\n  188 |         // may return wrong type, see https://github.com/gtk-rs/gtk-rs-core/issues/1257\n  189 |         let (content_type, _uncertain) = gio::content_type_guess(file.path( ,\n  208 |                                                  opt_restore_disk_image);\n  209 |             goto out;\n  210 |         }\n  211 |     }\n  212 | \n  213 |     g_application_activate (G_APPLICATION (app));\n  214 | \n  215 |     /* gtk4 todo: after using GtkSelectionModel or so */\n  216 |     /* if (object_to_select != NULL) */\n  217 |     /*   { */\n  218 |     /*     gdu_window_select_object (app->window, object_to_select); */\n  219 |     /*     if (opt_format) */\n  220 |     /*       gdu_create_format_show (app->client, GTK_WINDOW (app->window), object_to_select, */\n  221 |     /*                               FALSE, 0, 0); */\n  222 |     /*   } */\n  223 | \n  224 |     if (opt_restore_disk_image != NULL) {\n  225 |         gdu_rs_restore_disk_image_dialog_show (GTK_WINDOW (app->window), NULL, opt_restore_disk_image);\n  226 |     }\n  227 | \n  228 |     ret = 0;\n  229 | \n  230 | out:\n  231 |     g_clear_object (&object_to_select);\n  232 |     return ret;\n  233 | }","lines":38,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-application.c#L196-233"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"on_dialog_closed() is the handler for the dialog's \"closed\" signal yet calls adw_dialog_close(dialog) again, and dialog_data_unref() also calls adw_dialog_close() when the last ref drops. Re-closing an already-closed dialog from its own closed handler is redundant and can re-enter the close path.","fix":"Remove the adw_dialog_close() call from on_dialog_closed(); set data->dialog = NULL there (or before unref) so dialog_data_unref does not try to close it again.","locations":[{"ref":"src/disks/gdu-ata-smart-dialog.c:1305-1315","code":" 1305 | static void\n 1306 | on_dialog_closed (AdwDialog *dialog, gpointer user_data)\n 1307 | {\n 1308 |     DialogData *data = user_data;\n 1309 | \n 1310 |     adw_dialog_close (dialog);\n 1311 | \n 1312 |     g_clear_handle_id (&data->timeout_id, g_source_remove);\n 1313 |     g_clear_signal_handler (&data->notify_id, data->ata);\n 1314 |     dialog_data_unref (data);\n 1315 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-ata-smart-dialog.c#L1305-1315"},{"ref":"src/disks/gdu-ata-smart-dialog.c:100-103","code":"  100 |     if (g_atomic_int_dec_and_test (&data->ref_count)) {\n  101 |         if (data->dialog != NULL) {\n  102 |             adw_dialog_close (ADW_DIALOG (data->dialog));\n  103 |         }","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-ata-smart-dialog.c#L100-103"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"draw_curve() computes total_samples = graph_data->total_samples - 1 and uses it as the x-axis denominator. total_samples is a guint set from a GSettings int; if it is 0 the subtraction underflows to UINT_MAX, and if it is 1 the denominator is 0 causing division by zero in the x coordinate computation.","fix":"Validate total_samples >= 2 before drawing, or clamp the denominator to at least 1.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:566","code":"  566 |     total_samples = graph_data->total_samples - 1;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L566"},{"ref":"src/disks/gdu-benchmark-dialog.c:602-603","code":"  602 |         x0 = graph_data->graph_x + (((double) n / total_samples) * graph_data->graph_width);\n  603 |         x3 = graph_data->graph_x + ((((double) (n + 1)) / total_samples) * graph_data->graph_width);","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L602-
