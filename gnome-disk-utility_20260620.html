:163","code":"  163 |     gchar *fstab_device = NULL;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-mount-options-dialog.c#L163"},{"ref":"src/disks/gdu-mount-options-dialog.c:202","code":"  202 |         g_variant_lookup (self->orig_fstab_entry, \"fsname\", \"^ay\", &fstab_device);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-mount-options-dialog.c#L202"}]},{"id":"MEM_31","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In create_new_disk, even when g_seekable_truncate fails, the code falls through and still proceeds to close the stream and call dialog_attach_disk_image_helper on a possibly-incomplete file. The error is shown but execution is not aborted (no return after the truncate failure), so the loop continues to attach a bad image.","fix":"Return after showing the truncate error (after closing the stream), do not attach the image.","locations":[{"ref":"src/disks/gdu-new-disk-image-dialog.c:147-161","code":"  147 |     if (!g_seekable_truncate (G_SEEKABLE (out_file_stream), size, NULL, &error)) {\n  148 |         if (error) {\n  149 |             g_warning (\"Error truncating file output stream: %s (%s, %d)\", error->message,\n  150 |                        g_quark_to_string (error->domain), error->code);\n  151 |         }\n  152 |         gdu_utils_show_error (gdu_new_disk_image_dialog_get_window (self), _(\"Error writing file\"), error);\n  153 |     }\n  154 | \n  155 |     if (!g_output_stream_close (G_OUTPUT_STREAM (out_file_stream), NULL, &error)) {\n  156 |         g_warning (\"Error closing file output stream: %s (%s, %d)\", error->message, g_quark_to_string (error->domain),\n  157 |                    error->code);\n  158 |     }\n  159 | \n  160 |     /* load loop device */\n  161 |     dialog_attach_disk_image_helper (self, out_filename, FALSE);","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-new-disk-image-dialog.c#L147-161"}]},{"id":"MEM_32","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"unlock_dialog_keyfiles_set_cb retrieves each keyfile with g_list_model_get_item (returns a new reference) inside the label-building loop but never unrefs the returned GFile. Each iteration leaks one GFile reference. (The earlier 'keyfile' from gtk_file_dialog_open_finish is appended to the store, transferring ownership, which is fine; the leak is the loop variable reused at line 110.)","fix":"Wrap the loop GFile in g_autoptr or g_object_unref it after g_file_get_basename. Also note g_file_get_basename returns an allocated string that is leaked - free it too (or use g_autofree).","locations":[{"ref":"src/disks/gdu-unlock-dialog.c:109-114","code":"  109 |     for (guint i = 0; i < n_items; i++) {\n  110 |         keyfile = g_list_model_get_item (G_LIST_MODEL (self->key_files_store), i);\n  111 |         if (i > 0)\n  112 |             g_string_append_c (new_label, ',');\n  113 |         g_string_append (new_label, g_file_get_basename (keyfile));\n  114 |     }","lines":6,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-unlock-dialog.c#L109-114"}]},{"id":"MEM_33","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In unlock_dialog_keyfiles_set_cb, g_file_get_basename(keyfile) returns a newly-allocated string passed directly to g_string_append; the returned string is never freed -> one leak per keyfile per relabel.","fix":"Store the basename in a g_autofree char* (or free it) before appending.","locations":[{"ref":"src/disks/gdu-unlock-dialog.c:113","code":"  113 |         g_string_append (new_label, g_file_get_basename (keyfile));","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-unlock-dialog.c#L113"}]},{"id":"MEM_34","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"self->keyfiles is assigned a floating GVariant from g_variant_new(\"as\", builder) and stored as a struct member. It is never sunk and never freed (finalize does not clear it). g_variant_ref on a still-floating variant in do_unlock does not sink it either. The floating reference leaks. In practice the dialog is closed immediately after, but the member is leaked memory and the pattern is fragile.","fix":"Use g_variant_ref_sink (g_variant_new (...)) when assigning self->keyfiles, and add g_clear_pointer (&self->keyfiles, g_variant_unref) in gdu_unlock_dialog_finalize.","locations":[{"ref":"src/disks/gdu-unlock-dialog.c:195","code":"  195 |             self->keyfiles = g_variant_new (\"as\", builder);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-unlock-dialog.c#L195"},{"ref":"src/disks/gdu-unlock-dialog.c:222-233","code":"  222 | static void\n  223 | gdu_unlock_dialog_finalize (GObject *object)\n  224 | {\n  225 |     GduUnlockDialog *self = (GduUnlockDialog *) object;\n  226 | \n  227 |     g_clear_object (&self->udisks_object);\n  228 |     g_clear_object (&self->udisks_block);\n  229 |     g_clear_object (&self->udisks_encrypted);\n  230 |     g_clear_object (&self->key_files_store);\n  231 | \n  232 |     G_OBJECT_CLASS (gdu_unlock_dialog_parent_class)->finalize (object);\n  233 | }","lines":12,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-unlock-dialog.c#L222-233"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"Unchecked subtraction b.value - a.value in the estimator speed calculation. Samples are only meaningfully ordered if completed_bytes is monotonic, but add_sample does not enforce that an advancing sample is strictly greater, and after the inverted-guard bug is fixed a non-monotonic source could still produce b.value < a.value. On u64 this underflows and panics in debug or yields a huge bogus speed in release. Same risk for b.time_usec - a.time_usec.","fix":"Use saturating_sub for both deltas, or guard with checked_sub and skip the window when negative.","locations":[{"ref":"src/disks/estimator.rs:79-86","code":"   79 |             let (num_speeds, sum_of_speeds) = self.samples.borrow().iter().tuple_windows().fold(\n   80 |                 (0, 0.0),\n   81 |                 |(num_speeds, sum_of_speeds), (a, b)| {\n   82 |                     let speed = (b.value - a.value) as f64\n   83 |                         / ((b.time_usec - a.time_usec) as f64 / glib::ffi::G_USEC_PER_SEC as f64);\n   84 |                     (num_speeds + 1, sum_of_speeds + speed)\n   85 |                 },\n   86 |             );","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/estimator.rs#L79-86"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"sample_size_mib is a gint read from GSettings; sample_size_mib * 1024 * 1024 + page_size is computed in int arithmetic before being passed to g_new0(guchar, ...). A sample size of >= 2048 MiB (or a corrupted/large setting) overflows the int multiplication, producing a tiny or negative allocation while the benchmark loop reads sample_size bytes into it -> heap buffer overflow.","fix":"Cast to gsize/guint64 before multiplying, e.g. (gsize) sample_size_mib * 1024 * 1024, and validate the setting against a sane maximum.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:1066-1067","code":" 1066 |     buffer_unaligned = g_new0 (guchar, sample_size_mib * 1024 * 1024 + page_size);\n 1067 |     buffer = (guchar *) (((gintptr) (buffer_unaligned + page_size)) & (~(page_size - 1)));","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L1066-1067"},{"ref":"src/disks/gdu-benchmark-dialog.c:849-850","code":"  849 |     sample_size = g_settings_get_int (self->settings, \"sample-size-mib\");\n  850 |     sample_size = sample_size * 1024 * 1024;","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L849-850"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Disk image size is computed as adw_spin_row_get_value() (a gdouble) multiplied by unit_sizes[cur_unit_num] (guint64). The gdouble value times a large unit (e.g. TB = 1e12) is converted to guint64; for very large user inputs this can lose precision or overflow. The result is then used in g_seekable_truncate. A user entering a huge size in TB units could produce an unexpected/truncated size.","fix":"Clamp/validate the size, compute in integer domain where possible, and bound-check against a sane maximum before truncating.","locations":[{"ref":"src/disks/gdu-new-disk-image-dialog.c:144","code":"  144 |     size = adw_spin_row_get_value (ADW_SPIN_ROW (self->size_entry)) * unit_sizes[self->cur_unit_num];","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-new-disk-image-dialog.c#L144"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"gdu_resize_volume_dialog_update formats sizes with %ld and the expression self->max_size / unit_sizes[...] where max_size is guint64 and the division yields guint64. On 32-bit platforms long is 32-bit, so %ld with a 64-bit guint64 argument is undefined behavior and prints wrong values. Should use a 64-bit format or cast. Also the result of g_strdup_printf is passed straight to adw_action_row_set_subtitle and leaked (set_subtitle copies its argument).","fix":"Use G_GUINT64_FORMAT (or cast to guint64 and use %\" G_GUINT64_FORMAT \") and wrap each g_strdup_printf in g_autofree (or use g_strdup_printf into a temp freed after the call).","locations":[{"ref":"src/disks/gdu-resize-volume-dialog.c:72-77","code":"   72 |     adw_action_row_set_subtitle (ADW_ACTION_ROW (self->max_size_row),\n   73 |                                  g_strdup_printf (\"%ld %s\", self->max_size / unit_sizes[self->cur_unit_num], unit));\n   74 |     adw_action_row_set_subtitle (ADW_ACTION_ROW (self->min_size_row),\n   75 |                                  g_strdup_printf (\"%ld %s\", self->min_size / unit_sizes[self->cur_unit_num], unit));\n   76 |     adw_action_row_set_subtitle (ADW_ACTION_ROW (self->current_size_row),\n   77 |                                  g_strdup_printf (\"%ld %s\", self->current_size / unit_sizes[self->cur_unit_num], unit));","lines":6,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-resize-volume-dialog.c#L72-77"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"calc_space_to_grow / calc_space_to_shrink_extended do unchecked u64 subtraction (next_pos - partition.offset(), minimum - partition.offset()). If udisks reports an offset greater than the computed next_pos/minimum (inconsistent partition data), this underflows: panic in debug, gigantic bogus size in release that then drives a resize operation.","fix":"Use saturating_sub or validate that next_pos/minimum >= offset and return an error otherwise.","locations":[{"ref":"src/libgdu/gduutils.rs:967","code":"  967 |     Ok(next_pos - partition.offset().await?)","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.rs#L967"},{"ref":"src/libgdu/gduutils.rs:990","code":"  990 |     Ok(minimum - partition.offset().await?)","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.rs#L990"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"Same int-overflow pattern in start_benchmark(): sample_size = sample_size * 1024 * 1024 done in gint. Used only for display here, but mirrors the dangerous computation elsewhere and can show a negative/garbage size.","fix":"Compute in gsize/guint64.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:1105-1106","code":" 1105 |     sample_size = g_settings_get_int (self->settings, \"sample-size-mib\");\n 1106 |     sample_size = sample_size * 1024 * 1024;","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L1105-1106"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gdu_block_row_update_mount_point_label() sets the level bar range using 'size / 1000' and 'value (size - free_space) / 1000'. For a filesystem where free_space transiently exceeds size (multi-device BTRFS where gdu_item_get_size returns the aggregate total but gdu_block_get_unused_size returns a per-block figure, or vice versa), (size - free_space) underflows guint64 to a huge number, making the level bar value massively exceed the max. Dividing by 1000 also silently loses sub-KB precision and is an arbitrary scale.","fix":"Clamp: used = (free_space <= size) ? size - free_space : size; and consider using gtk_level_bar fractions (0..1) instead of dividing by 1000.","locations":[{"ref":"src/disks/gdu-block-row.c:212-216","code":"  212 |     size = gdu_item_get_size (GDU_ITEM (self->block));\n  213 |     free_space = gdu_block_get_unused_size (self->block);\n  214 | \n  215 |     gtk_level_bar_set_max_value (GTK_LEVEL_BAR (self->space_level_bar), size / 1000);\n  216 |     gtk_level_bar_set_value (GTK_LEVEL_BAR (self->space_level_bar), (size - free_space) / 1000);","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L212-216"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gdu_block_get_size_str() computes '100.0 * (size - unused) / size'. If unused > size (see the size-source mismatch between gdu_item_get_size, which may return the multi-device filesystem total, and gdu_block_get_unused_size, which queries the individual block) the subtraction underflows guint64 before the float conversion, producing a nonsensical percentage.","fix":"Clamp unused to <= size before computing the percentage, or compute used as a signed/double quantity with a guard.","locations":[{"ref":"src/disks/gdu-block.c:532-541","code":"  532 |     unused = gdu_block_get_unused_size (self);\n  533 |     unused_str = g_format_size (unused);\n  534 | \n  535 |     /* Translators: Shown in 'Size' field for a filesystem where we know the amount of unused\n  536 |      *              space.\n  537 |      *              The first %s is a short string with the size (e.g. '69 GB (68,719,476,736 bytes)').\n  538 |      *              The second %s is a short string with the space free (e.g. '43 GB').\n  539 |      *              The %f is the percentage in use (e.g. 62.2).\n  540 |      */\n  541 |     return g_strdup_printf (_(\"%s — %s free (%.1f%% full)\"), size_str, unused_str, 100.0 * (size - unused) / size);","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block.c#L532-541"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gdu_create_partition_page_get_size returns gtk_adjustment_get_value(...) * unit_sizes[cur_unit_num] computed in double then cast to guint64. For large disks (TB/PB) the double multiplication loses precision below the byte level, so the requested partition size can differ from what the user sees by potentially many bytes (rounding), and very large values approach the limits of exact double integer representation (2^53).","fix":"Round explicitly (e.g. (guint64) (value * unit_sizes[...] + 0.5)) and/or clamp to max_size; document the precision limit. Consider snapping to sector size.","locations":[{"ref":"src/disks/gdu-create-partition-page.c:52-56","code":"   52 | guint64\n   53 | gdu_create_partition_page_get_size (GduCreatePartitionPage *self)\n   54 | {\n   55 |     return gtk_adjustment_get_value (self->size_adjustment) * unit_sizes[self->cur_unit_num];\n   56 | }","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-partition-page.c#L52-56"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"size and position_offset are computed in gdouble then truncated to gint. For partitions whose proportional pixel size legitimately fits in gint this is fine, but the comment 'Add 128KB to the size to account for floating point errors' adds bytes (128*1024) to a byte count before scaling, not pixels; the addition is negligible relative to typical disk sizes and the comment misleads about what it compensates for. Also no clamping if total_size is 0 (division by zero -> inf -> undefined gint conversion).","fix":"Guard total_size == 0 before dividing; clamp size/position_offset into [0, width]; clarify the comment.","locations":[{"ref":"src/disks/gdu-space-allocation-bar.c:96-98","code":"   96 |         /* Add 128KB to the size to account for floating point errors */\n   97 |         size = width * (gdouble) (gdu_item_get_size (GDU_ITEM (block)) + 128 * 1024) / (gdouble) total_size;\n   98 |         position_offset = width * (gdouble) gdu_block_get_offset (block) / (gdouble) total_size;","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-space-allocation-bar.c#L96-98"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In gdu_dvd_support_new() block_offset/seek values from libdvdcss are gint and dvdcss_seek return is compared to (int) vob_sector_offset. vob_sector_offset is guint32 holding a sector index; on very large discs (offset*2048 in range->start uses 2048ULL correctly, but the sector index passed to dvdcss_seek is implicitly converted to gint) values above INT_MAX would wrap negative. Practically rare for DVDs but unchecked.","fix":"Validate vob_sector_offset fits in gint before passing to dvdcss_seek, or use the appropriate width.","locations":[{"ref":"src/disks/gdudvdsupport.c:191-196","code":"  191 |             vob_sector_offset = UDFFindFile (support->dvd, vob_filename, &vob_size);\n  192 |             if (vob_sector_offset == 0)\n  193 |                 continue;\n  194 | \n  195 |             if (dvdcss_seek (support->dvdcss, vob_sector_offset, DVDCSS_SEEK_KEY) != (int) vob_sector_offset)\n  196 |                 goto fail;","lines":6,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdudvdsupport.c#L191-196"},{"ref":"src/disks/gdudvdsupport.c:206-207","code":"  206 |             range->start = vob_sector_offset * 2048ULL;\n  207 |             range->end = range->start + rounded_vob_size;","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdudvdsupport.c#L206-207"}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gdu_util_is_same_size computes 'min_size * 101LL / 100LL'. min_size is guint64; multiplying a near-G_MAXUINT64 block size by 101 overflows. For realistic disk sizes this is unreachable, but the percentage check silently wraps for pathological sizes, defeating the 1%% tolerance test.","fix":"Compare via division to avoid overflow: '(max_size - min_size) > min_size / 100' (with the 1MiB floor), or use a 128-bit / floating intermediate.","locations":[{"ref":"src/libgdu/gduutils.c:883","code":"  883 |     if (max_size - min_size > min_size * 101LL / 100LL && max_size - min_size > 1048576)","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.c#L883"}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"is_inside_dos_extended computes partition_offset + size without overflow protection; a malformed partition table with size near u64::MAX would overflow and panic in debug builds.","fix":"Use checked_add / saturating_add for the upper bound comparison.","locations":[{"ref":"src/libgdu/gduutils.rs:419-426","code":"  419 |     for partition in client.partitions(table).await {\n  420 |         if partition.is_container().await.is_ok_and(|v| v) {\n  421 |             let partition_offset = partition.offset().await.unwrap_or(0);\n  422 |             let size = partition.size().await.unwrap_or(0);\n  423 |             if offset >= partition_offset && offset < partition_offset + size {\n  424 |                 return true;\n  425 |             }\n  426 |         }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.rs#L419-426"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","easy":true,"description":"Inverted progress guard in the estimator. add_sample returns early when completed_bytes >= the previously stored value, i.e. exactly when real forward progress is made. The intent (a monotonic-progress guard rejecting samples that go backwards) requires the opposite comparison. As written, the first sample is always accepted (0 >= 0) and then every subsequent advancing sample is dropped, so the estimator never accumulates more than one sample, num_speeds stays 0, and bytes_per_sec / usec_remaining are always 0. Speed/ETA reporting during a restore is permanently broken.","fix":"Change the condition to return early only when completed_bytes <= self.completed_bytes.get() (or < for strict), so backwards/duplicate samples are skipped and advancing samples are recorded.","locations":[{"ref":"src/disks/estimator.rs:58-62","code":"   58 |         pub fn add_sample(&self, completed_bytes: u64) {\n   59 |             if completed_bytes >= self.completed_bytes.get() {\n   60 |                 return;\n   61 |             }\n   62 |             self.completed_bytes.set(completed_bytes);","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/estimator.rs#L58-62"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Sample timestamps are stored in seconds but treated as microseconds. add_sample stores SystemTime::...as_secs() into Sample.time_usec (a field named and documented as microseconds). update() then computes speed as delta_value / (delta_time_usec / G_USEC_PER_SEC). Because delta_time is actually in seconds, dividing by 1_000_000 makes the denominator a million times too small, so bytes_per_sec is overstated by ~1e6 and usec_remaining is correspondingly wrong. Either as_secs() should be as_micros(), or the divisor must match the unit.","fix":"Use .as_micros() (cast to u64) when filling time_usec, or store seconds consistently and divide by 1.0 instead of G_USEC_PER_SEC. Keep the unit consistent with the field name.","locations":[{"ref":"src/disks/estimator.rs:68-74","code":"   68 |             samples.push(Sample {\n   69 |                 time_usec: std::time::SystemTime::now()\n   70 |                     .duration_since(std::time::UNIX_EPOCH)\n   71 |                     .expect(\"`now()` should be after `UNIX_EPOCH`\")\n   72 |                     .as_secs(),\n   73 |                 value: completed_bytes,\n   74 |             });","lines":7,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/estimator.rs#L68-74"},{"ref":"src/disks/estimator.rs:82-83","code":"   82 |                     let speed = (b.value - a.value) as f64\n   83 |                         / ((b.time_usec - a.time_usec) as f64 / glib::ffi::G_USEC_PER_SEC as f64);","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/estimator.rs#L82-83"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"gdu_rs_has_local_jobs returns the negation of its intended meaning. The function is named has_local_jobs but returns map.is_empty(), so it reports true when there are NO jobs and false when there ARE jobs. Any C caller using this to decide whether jobs are pending (e.g. to block quit) will behave backwards.","fix":"Return !map.is_empty().","locations":[{"ref":"src/disks/ffi/mod.rs:37-43","code":"   37 | #[unsafe(no_mangle)]\n   38 | pub extern \"C\" fn gdu_rs_has_local_jobs() -> bool {\n   39 |     GLOBAL_MAP.with(|map| {\n   40 |         let map = map.lock().expect(\"poisoned lock\");\n   41 |         map.is_empty()\n   42 |     })\n   43 | }","lines":7,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/ffi/mod.rs#L37-43"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"gdu_application_quit closes the window when there are no running jobs but does not return afterwards. It then continues to build and present the 'Stop running jobs?' confirmation dialog unconditionally, even though no jobs exist. The user is asked to confirm stopping jobs that are not running, and the window is closed twice.","fix":"Add a 'return;' after gtk_window_close in the no-jobs branch, e.g. wrap it: if (...) { gtk_window_close (...); return; }","locations":[{"ref":"src/disks/gdu-application.c:287-298","code":"  287 |     if ((app->local_jobs == NULL || g_hash_table_size (app->local_jobs) == 0) && !gdu_rs_has_local_jobs ())\n  288 |         gtk_window_close (GTK_WINDOW (app->window));\n  289 | \n  290 |     data = g_new0 (ConfirmationDialogData, 1);\n  291 |     data->message = _(\"Stop running jobs?\");\n  292 |     data->description = _(\"Closing now stops the running jobs and leads to a corrupt result.\");\n  293 |     data->response_verb = _(\"Stop\");\n  294 |     data->response_appearance = ADW_RESPONSE_DESTRUCTIVE;\n  295 |     data->callback = application_quit_response_cb;\n  296 |     data->user_data = app;\n  297 | \n  298 |     gdu_utils_show_confirmation (GTK_WIDGET (app->window), data, NULL);","lines":12,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-application.c#L287-298"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"change_passphrase_cb shows an error if udisks_encrypted_call_change_passphrase fails, but does not return. Execution falls through and, when has_passphrase_in_conf is true, it proceeds to rewrite /etc/crypttab with the new passphrase even though the on-disk passphrase was never actually changed. This leaves the crypttab passphrase out of sync with the real LUKS passphrase.","fix":"On failure, after showing the error, 'adw_dialog_close (ADW_DIALOG (self)); return;' before attempting the configuration update.","locations":[{"ref":"src/disks/gdu-change-passphrase-dialog.c:116-122","code":"  116 |     if (!udisks_encrypted_call_change_passphrase_finish (self->udisks_encrypted, res, &error))\n  117 |         gdu_utils_show_error (gdu_change_passphrase_dialog_get_window (self), _(\"Error changing passphrase\"), error);\n  118 | \n  119 |     if (!self->has_passphrase_in_conf) {\n  120 |         adw_dialog_close (ADW_DIALOG (self));\n  121 |         return;\n  122 |     }","lines":7,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-change-passphrase-dialog.c#L116-122"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"num_bytes_completed is advanced by num_bytes_to_read (the requested amount) rather than by num_bytes_read (the amount actually read). copy_span pads short reads with zeroes and writes the full requested span, so the output file offset stays consistent, but the loop treats every requested span as fully completed. This is acceptable here because of padding, however the estimator/progress sample at line 586 uses num_bytes_completed which may overstate progress when reads are short. More importantly, on a genuine read error region this silently substitutes zeroes and marches on, which is the intended behavior but the progress accounting can mislead. Verify the intent; if short reads should retry, this is a bug.","fix":"If padding-and-continue is intended, leave as-is but document it. If not, advance by num_bytes_read and re-read the remaining bytes of the span.","locations":[{"ref":"src/disks/gdu-create-disk-image-dialog.c:601-607","code":"  601 |         if (num_bytes_read < num_bytes_to_read) {\n  602 |             guint64 num_bytes_skipped = num_bytes_to_read - num_bytes_read;\n  603 |             g_mutex_lock (&self->copy_lock);\n  604 |             self->num_error_bytes += num_bytes_skipped;\n  605 |             g_mutex_unlock (&self->copy_lock);\n  606 |         }\n  607 |         num_bytes_completed += num_bytes_to_read;","lines":7,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-disk-image-dialog.c#L601-607"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In gdu_create_format_show, self->udisks_drive is set twice: first via udisks_object_get_drive(object) (line 411, a new ref), then unconditionally overwritten via udisks_client_get_drive_for_block (line 419, another new ref) without unref'ing the first. The first drive reference is leaked. If object had a drive interface, that ref is orphaned.","fix":"g_clear_object(&self->udisks_drive) before reassigning, or only fetch the drive once.","locations":[{"ref":"src/disks/gdu-format-volume-dialog.c:411-419","code":"  411 |     self->udisks_drive = udisks_object_get_drive (object);\n  412 |     self->udisks_block = udisks_object_get_block (object);\n  413 | \n  414 |     // in case the object passed was from a gdu drive get block from drive\n  415 |     if (self->udisks_block == NULL && self->udisks_drive != NULL)\n  416 |         self->udisks_block = udisks_client_get_block_for_drive (self->udisks_client, self->udisks_drive, FALSE);\n  417 | \n  418 |     // in case the object passed was from gdu-block get drive from block\n  419 |     self->udisks_drive = udisks_client_get_drive_for_block (client, self->udisks_block);","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-format-volume-dialog.c#L411-419"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The reverse loop 'for (n = g_list_model_get_n_items(self->model) - 1; n >= 0; n--)' uses n declared as guint (line 166: guint n). g_list_model_get_n_items returns guint, and n >= 0 is always true for unsigned, so when n reaches 0 and decrements it wraps to UINT_MAX, causing gtk_string_list_get_string to be called with a huge index (out-of-bounds, returns NULL or asserts) and an infinite/very long loop. This is a classic unsigned-underflow bug.","fix":"Use a signed gint loop index, or rewrite as: for (n = count; n > 0; ) { n--; ... }.","locations":[{"ref":"src/disks/gdu-mount-options-dialog.c:166","code":"  166 |     guint n;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-mount-options-dialog.c#L166"},{"ref":"src/disks/gdu-mount-options-dialog.c:203-209","code":"  203 |         for (n = g_list_model_get_n_items (self->model) - 1; n >= 0; n--) {\n  204 |             item = gtk_string_list_get_string (GTK_STRING_LIST (self->model), n);\n  205 |             if (g_strcmp0 (fstab_device, item) == 0) {\n  206 |                 selected = n;\n  207 |                 break;\n  208 |             }\n  209 |         }","lines":7,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-mount-options-dialog.c#L203-209"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In gdu_resize_dialog_show, when a filesystem is present and mounted-state needs computing, calculate_usage(self) is called once synchronously (line 642); if it returns G_SOURCE_CONTINUE a timeout is started. But separately, if the filesystem is NOT mounted (mount_points length 0) a mount is started (lines 650-655). The mount completion resize_get_usage_mount_cb only handles the ERROR case (returns on success). On successful mount nothing re-triggers calculate_usage beyond the already-running timeout; that is intended, but resize_get_usage_mount_cb on success leaves mount_cancellable allocated and never cleared, and never stops anything. Minor but mount_cancellable leaks on the success path.","fix":"Clear self->mount_cancellable on the success path of resize_get_usage_mount_cb and ensure it is freed in finalize.","locations":[{"ref":"src/disks/gdu-resize-volume-dialog.c:137-154","code":"  137 | resize_get_usage_mount_cb (GObject *source_object, GAsyncResult *res, gpointer user_data)\n  138 | {\n  139 |     GduResizeVolumeDialog *self = GDU_RESIZE_VOLUME_DIALOG (user_data);\n  140 |     UDisksFilesystem *filesystem = UDISKS_FILESYSTEM (source_object);\n  141 |     g_autoptr(GError) error = NULL;\n  142 | \n  143 |     if (udisks_filesystem_call_mount_finish (filesystem, NULL, res, &error))\n  144 |         return;\n  145 | \n  146 |     g_clear_handle_id (&self->running_id, g_source_remove);\n  147 | \n  148 |     g_clear_object (&self->mount_cancellable);\n  149 | \n  150 |     gdu_utils_show_error (gdu_resize_volume_dialog_get_window (self),\n  151 |                           _(\"Error mounting filesystem to calculate minimum size\"), error);\n  152 | \n  153 |     adw_dialog_close (ADW_DIALOG (self));\n  154 | }","lines":18,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-resize-volume-dialog.c#L137-154"},{"ref":"src/disks/gdu-resize-volume-dialog.c:635-655","code":"  635 |     if (self->filesystem != NULL) {\n  636 |         gboolean available;\n  637 | \n  638 |         available =\n  639 |             gdu_utils_can_resize (self->client, udisks_block_get_id_type (self->block), FALSE, &self->support, NULL);\n  640 |         g_assert (available);\n  641 | \n  642 |         if (calculate_usage (self) == G_SOURCE_CONTINUE) {\n  643 |             gtk_widget_set_visible (GTK_WIDGET (self->spinner), TRUE);\n  644 |             self->running_id = g_timeout_add (FILESYSTEM_WAIT_STEP_MS, calculate_usage, self);\n  645 |         }\n  646 |     }\n  647 | \n  648 |     mount_points = self->filesystem != NULL ? udisks_filesystem_get_mount_points (self->filesystem) : NULL;\n  649 | \n  650 |     if (self->filesystem != NULL && g_strv_length ((gchar **) mount_points) == 0) {\n  651 |         /* mount FS to aquire fill level */\n  652 |         self->mount_cancellable = g_cancellable_new ();\n  653 |         udisks_filesystem_call_mount (self->filesystem, g_variant_new (\"a{sv}\", NULL), /* options */\n  654 |                                       self->mount_cancellable, resize_get_usage_mount_cb, self);\n  655 |     }","lines":21,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-resize-volume-dialog.c#L635-655"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"_gtk_entry_buffer_truncate_bytes deletes by character position using a byte count. gtk_entry_buffer_delete_text takes a character position, not a byte offset, yet max_utf8_length is initialized to max_bytes and used as the start position. For multi-byte UTF-8 content, the byte length exceeds character count, so the delete start position is past the end and the loop just decrements max_utf8_length until it happens to land in range, producing incorrect truncation (cutting too much or mid-content). The variable name 'max_utf8_length' is also misleading since it holds bytes.","fix":"Truncate based on character count using g_utf8 byte accounting: compute the character index whose cumulative byte length <= max_bytes and delete from there, rather than treating the byte count as a character position.","locations":[{"ref":"src/libgdu/gduutils.c:841-852","code":"  841 | gboolean\n  842 | _gtk_entry_buffer_truncate_bytes (GtkEntryBuffer *gtk_entry_buffer, guint max_bytes)\n  843 | {\n  844 |     guint max_utf8_length = max_bytes;\n  845 | \n  846 |     while (gtk_entry_buffer_get_bytes (gtk_entry_buffer) > max_bytes) {\n  847 |         gtk_entry_buffer_delete_text (gtk_entry_buffer, max_utf8_length, -1);\n  848 |         max_utf8_length--;\n  849 |     }\n  850 | \n  851 |     return max_utf8_length != max_bytes;\n  852 | }","lines":12,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.c#L841-852"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"draw_curve() divides by prev_slope (a = prev_m / prev_slope; b = m / prev_slope) without guarding prev_slope == 0. For the first iteration prev_slope is initialized to 0, and any flat segment sets prev_slope = 0, producing division by zero (inf/NaN). NaN propagates into the bezier control points and the path, corrupting the rendered curve.","fix":"Guard against prev_slope == 0 (and slope == 0) before dividing; skip the monotonicity scaling when slopes are zero.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:557","code":"  557 |     gdouble prev_slope = 0, prev_m = 0;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L557"},{"ref":"src/disks/gdu-benchmark-dialog.c:621-634","code":"  621 |         if (slope == 0) {\n  622 |             prev_slope = 0;\n  623 |             m = 0;\n  624 |         }\n  625 | \n  626 |         a = prev_m / prev_slope;\n  627 |         b = m / prev_slope;\n  628 | \n  629 |         // scale down tangents to ensure monotonicity\n  630 |         if ((a * a + b * b) > 3 * 3) {\n  631 |             r = 3 / sqrt (a * a + b * b);\n  632 |             prev_m = r * a * prev_slope;\n  633 |             m = r * b * prev_slope;\n  634 |         }","lines":14,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L621-634"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"open_for_benchmark() ignores the GError out-param of g_unix_fd_list_get() (passes NULL) and does not check the returned fd. If extracting the fd fails, *fd is set to -1 but the function returns NULL (success), so benchmark_thread proceeds; the subsequent g_assert(fd != -1) in benchmark_transfer_rate aborts the process instead of reporting an error.","fix":"Pass &error to g_unix_fd_list_get() and return that error if the call fails (fd == -1).","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:831-833","code":"  831 |     *fd = g_unix_fd_list_get (fd_list, g_variant_get_handle (fd_index), NULL);\n  832 | \n  833 |     return NULL;","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L831-833"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_block_row_update_features() hides the block menu button when features==0, but in the non-zero branch it only ever shows the create_partition_button (when CREATE_PARTITION is set). The block_menu_button is never re-shown for non-free-space blocks. Because rows are recycled by gtk_list_box_bind_model and the widget is created once per GduBlock, a row that previously had its menu button hidden (features became 0) and later gains features again will keep the menu hidden. The if/else-if also means a block that has both CREATE_PARTITION and other features is handled only by the first matching branch.","fix":"Set block_menu_button visibility explicitly based on (features != 0) and set create_partition_button visibility explicitly based on (features & GDU_FEATURE_CREATE_PARTITION), using two independent if statements rather than if/else-if.","locations":[{"ref":"src/disks/gdu-block-row.c:116-125","code":"  116 |     features = gdu_item_get_features (GDU_ITEM (self->block));\n  117 |     if (!features) {\n  118 |         /* Hide the block menu button if there are no features\n  119 |          * This usually happens when the block is a free space\n  120 |          * or the parent is mounted as read only.\n  121 |          */\n  122 |         gtk_widget_set_visible (self->block_menu_button, FALSE);\n  123 |     } else if (features & GDU_FEATURE_CREATE_PARTITION) {\n  124 |         gtk_widget_set_visible (self->create_partition_button, TRUE);\n  125 |     }","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L116-125"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_block_row_update_features() unconditionally prepends a Mount/Unmount/Lock/Unlock menu entry on every update if the corresponding feature bit is set, but it only removes the existing item 0 when item 0 is one of those four actions. On repeated 'changed' updates where the state stays e.g. mounted, the removal matches and works, but the prepend logic can accumulate duplicate entries in edge transitions (e.g. when item 0 is some other action), since removal is conditional while prepend is not.","fix":"Rebuild the dynamic portion of the menu deterministically: always remove the previously-inserted dynamic item (track it) before prepending, or clear and rebuild the submenu each update.","locations":[{"ref":"src/disks/gdu-block-row.c:127-143","code":"  127 |     menu_item_attribute =\n  128 |         g_menu_model_get_item_attribute_value (self->volume_actions_submenu, 0, \"action\", g_variant_type_new (\"s\"));\n  129 | \n  130 |     if ((g_strcmp0 (g_variant_get_string (menu_item_attribute, NULL), \"row.unmount\") == 0)\n  131 |         || (g_strcmp0 (g_variant_get_string (menu_item_attribute, NULL), \"row.mount\") == 0)\n  132 |         || (g_strcmp0 (g_variant_get_string (menu_item_attribute, NULL), \"row.lock\") == 0)\n  133 |         || (g_strcmp0 (g_variant_get_string (menu_item_attribute, NULL), \"row.unlock\") == 0))\n  134 |         g_menu_remove (G_MENU (self->volume_actions_submenu), 0);\n  135 | \n  136 |     if (features & GDU_FEATURE_CAN_MOUNT)\n  137 |         g_menu_prepend (G_MENU (self->volume_actions_submenu), _(\"Mount\"), \"row.mount\");\n  138 |     else if (features & GDU_FEATURE_CAN_UNMOUNT)\n  139 |         g_menu_prepend (G_MENU (self->volume_actions_submenu), _(\"Unmount\"), \"row.unmount\");\n  140 |     else if (features & GDU_FEATURE_CAN_LOCK)\n  141 |         g_menu_prepend (G_MENU (self->volume_actions_submenu), _(\"Lock\"), \"row.lock\");\n  142 |     else if (features & GDU_FEATURE_CAN_UNLOCK)\n  143 |         g_menu_prepend (G_MENU (self->volume_actions_submenu), _(\"Unlock\"), \"row.unlock\");","lines":17,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L127-143"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_block_get_features() caches into self->features and early-returns it on subsequent calls (lines 237-238), but for free-space blocks (block==NULL) it returns 'drive_features & GDU_FEATURE_CREATE_PARTITION' at line 245 WITHOUT caching. If that value is 0 (drive cannot create partitions) the function recomputes every call (minor), but more importantly the cache check at 237 happens AFTER the expensive parent-walk loop (228-233), so even cached calls still walk the parent chain on every invocation. The early-return optimization is largely defeated.","fix":"Move the 'if (self->features) return self->features;' check to the very top of the function before walking parents, and cache the free-space result too.","locations":[{"ref":"src/disks/gdu-block.c:228-245","code":"  228 |     drive = gdu_item_get_parent (item);\n  229 | \n  230 |     while (!GDU_IS_DRIVE (drive)) {\n  231 |         g_assert (drive);\n  232 |         drive = gdu_item_get_parent (drive);\n  233 |     }\n  234 | \n  235 |     g_assert (GDU_IS_DRIVE (drive));\n  236 | \n  237 |     if (self->features)\n  238 |         return self->features;\n  239 | \n  240 |     drive_features = gdu_item_get_features (drive);\n  241 |     object = self->object;\n  242 |     block = self->block;\n  243 | \n  244 |     if (block == NULL)\n  245 |         return drive_features & GDU_FEATURE_CREATE_PARTITION;","lines":18,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block.c#L228-245"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_block_needs_unmount() dereferences self->file_system (udisks_filesystem_get_mount_points) and self->block (udisks_block_get_id_type) without NULL checks, unlike every other accessor in this file which guards on self->block. It is currently only reached from gdu_block_set_fs_label_async after a !self->file_system||!self->block early return, but as a public-looking helper it is a latent NULL deref if called on a free-space block.","fix":"Add guards: if (!self->file_system || !self->block) return false; at the top.","locations":[{"ref":"src/disks/gdu-block.c:595-617","code":"  595 | bool\n  596 | gdu_block_needs_unmount (GduBlock *self)\n  597 | {\n  598 |     const gchar *const *mount_points;\n  599 |     const gchar *fs_type;\n  600 |     bool needs_unmount = false;\n  601 | \n  602 |     g_return_val_if_fail (GDU_IS_BLOCK (self), false);\n  603 | \n  604 |     mount_points = udisks_filesystem_get_mount_points (self->file_system);\n  605 |     fs_type = udisks_block_get_id_type (self->block);\n  606 | \n  607 |     /* Needs to unmount if there's at least one mount point ... */\n  608 |     if (mount_points && *mount_points)\n  609 |         needs_unmount = true;\n  610 | \n  611 |     /* ... and if they are not ext2, ext3, nor ext4 */\n  612 |     if (needs_unmount\n  613 |         && (g_strcmp0 (fs_type, \"ext2\") == 0 || g_strcmp0 (fs_type, \"ext3\") == 0 || g_strcmp0 (fs_type, \"ext4\") == 0))\n  614 |         needs_unmount = false;\n  615 | \n  616 |     return needs_unmount;\n  617 | }","lines":23,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block.c#L595-617"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_block_emit_updated() recurses up the parent chain (calls gdu_block_emit_updated on parent if parent is a GduBlock) AND gdu_drive_block_changed() separately calls gdu_block_emit_updated on the block plus its before/after siblings, each of which may again recurse to parents. This can cause the same parent block to be updated/emit 'changed' multiple times per change, and combined with the row's 'changed'->gdu_block_row_update handler triggers redundant full UI rebuilds. No cycle (tree), but O(depth*siblings) redundant work and repeated menu-rebuild side effects (compounding the menu-duplication finding).","fix":"Emit 'changed' once per affected item; let the view coalesce updates, or avoid re-emitting on parents already handled in the same pass.","locations":[{"ref":"src/disks/gdu-block.c:735-759","code":"  735 | void\n  736 | gdu_block_emit_updated (GduBlock *self)\n  737 | {\n  738 |     g_clear_pointer (&self->description, g_free);\n  739 |     g_clear_pointer (&self->partition_type, g_free);\n  740 |     self->features = 0;\n  741 | \n  742 |     if (self->partition) {\n  743 |         self->size = udisks_partition_get_size (self->partition);\n  744 |         self->start_offset = udisks_partition_get_offset (self->partition);\n  745 |     } else if (self->block) {\n  746 |         self->size = udisks_block_get_size (self->block);\n  747 |         if (GDU_IS_BLOCK (self->parent))\n  748 |             self->start_offset = gdu_block_get_offset (GDU_BLOCK (self->parent));\n  749 |         else\n  750 |             self->start_offset = 0;\n  751 |     }\n  752 | \n  753 |     /* If it's a block, update every parent as some changes (like partition size changes)\n  754 |        also affects its parents */\n  755 |     if (GDU_IS_BLOCK (self->parent))\n  756 |         gdu_block_emit_updated (GDU_BLOCK (self->parent));\n  757 | \n  758 |     gdu_item_changed (GDU_ITEM (self));\n  759 | }","lines":25,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block.c#L735-759"},{"ref":"src/disks/gdu-drive.c:1034-1061","code":" 1034 | void\n 1035 | gdu_drive_block_changed (GduDrive *self, gpointer block)\n 1036 | {\n 1037 |     g_autoptr(GduBlock) before = NULL;\n 1038 |     g_autoptr(GduBlock) after = NULL;\n 1039 |     guint position;\n 1040 | \n 1041 |     g_return_if_fail (GDU_IS_DRIVE (self));\n 1042 |     g_return_if_fail (GDU_IS_BLOCK (block));\n 1043 | \n 1044 |     if (!g_list_store_find (self->partitions, block, &position))\n 1045 |         g_return_if_reached ();\n 1046 | \n 1047 |     gdu_block_emit_updated (block);\n 1048 | \n 1049 |     /* Update siblings as some changes (like partition size changes)\n 1050 |        also affects siblings */\n 1051 |     /* fixme: This won't work if the siblings is just freespace without any block associated */\n 1052 |     if (position > 0) {\n 1053 |         before = g_list_model_get_item (G_LIST_MODEL (self->partitions), position - 1);\n 1054 |         gdu_block_emit_updated (before);\n 1055 |     }\n 1056 | \n 1057 |     after = g_list_model_get_item (G_LIST_MODEL (self->partitions), position + 1);\n 1058 | \n 1059 |     if (after)\n 1060 |         gdu_block_emit_updated (after);\n 1061 | }","lines":28,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L1034-1061"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"on_success accesses self->estimator (line 321) and self->num_error_bytes (line 314) without holding copy_lock, even though the copy thread writes these under the lock. on_success runs on the main loop via idle; by that point the thread has finished, but estimator is never set to NULL and gdu_estimator_get_target_bytes is called on it. If estimator is still NULL (e.g. thread errored before creating it) this is a NULL deref; more relevantly the percentage divide-by-target can divide by an estimator that was created with block_device_size but the access is unsynchronized.","fix":"Guard estimator access with copy_lock and null-check self->estimator before calling gdu_estimator_get_target_bytes.","locations":[{"ref":"src/disks/gdu-create-disk-image-dialog.c:314-321","code":"  314 |     if (self->num_error_bytes > 0) {\n  315 |         dialog = adw_alert_dialog_new (/* Translators: Heading in dialog shown if some data was unreadable while\n  316 |                                           creating a disk image */\n  317 |                                        _(\"Unrecoverable Read Errors\"), NULL);\n  318 | \n  319 |         s = g_format_size (self->num_error_bytes);\n  320 |         percentage =\n  321 |             100.0 * ((gdouble) self->num_error_bytes) / ((gdouble) gdu_estimator_get_target_bytes (self->estimator));","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-disk-image-dialog.c#L314-321"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_create_other_page_new builds the rows by iterating i from 0..N_OTHER_FS-1 and calls g_enum_get_value(eclass, (GduOtherFsType) i). This assumes the enum values are 0..N-1 in declaration order and that the enum value order matches the other_fs_title_desc array order. The enum is declared XFS, SWAP, BTRFS, F2FS, EXFAT, UDF, EMPTY; if GDU_OTHER_FS_TYPE_* values are not 0-based contiguous (or are ever reordered), g_enum_get_value(eclass, i) returns the wrong nick or NULL, and value->value_nick would NULL-deref. The code couples array index, loop index and enum numeric value with no assertion linking them.","fix":"Iterate over the enum class values directly (eclass->values[i]) or add g_assert(value != NULL), and assert N_OTHER_FS == eclass->n_values to keep the title/desc array in sync.","locations":[{"ref":"src/disks/gdu-create-other-page.c:165-178","code":"  165 |     for (guint i = 0; i < N_OTHER_FS; i++) {\n  166 |         GtkWidget *row;\n  167 |         GtkWidget *checkbox;\n  168 |         GEnumValue *value;\n  169 |         GEnumClass *eclass;\n  170 | \n  171 |         eclass = G_ENUM_CLASS (g_type_class_peek (GDU_TYPE_OTHER_FS_TYPE));\n  172 |         value = g_enum_get_value (eclass, (GduOtherFsType) i);\n  173 | \n  174 |         row = adw_action_row_new ();\n  175 |         checkbox = gtk_check_button_new ();\n  176 | \n  177 |         gtk_actionable_set_action_name (GTK_ACTIONABLE (checkbox), \"update_fs_type\");\n  178 |         gtk_actionable_set_action_target_value (GTK_ACTIONABLE (checkbox), g_variant_new_string (value->value_nick));","lines":14,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-other-page.c#L165-178"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"compute_configuration gates the Standby and APM writes on udisks_drive_ata_get_pm_supported, but APM should be gated on udisks_drive_ata_get_apm_supported (PM-supported is for standby). Using pm_supported for the APM branch means APM config may be written when only standby (PM) is supported but APM is not, or skipped when APM is supported but PM is not. The disable_unused_widgets uses the correct distinct getters (apm_supported, aam_supported), so this is an inconsistency/bug in compute_configuration.","fix":"Gate APM on udisks_drive_ata_get_apm_supported and AAM on udisks_drive_ata_get_aam_supported, matching disable_unused_widgets.","locations":[{"ref":"src/disks/gdu-disk-settings-dialog.c:191-206","code":"  191 |     if (gtk_switch_get_active (GTK_SWITCH (data->apm_switch))) {\n  192 |         if (udisks_drive_ata_get_pm_supported (data->ata)) {\n  193 |             gint value = (gint) gtk_adjustment_get_value (data->apm_adjustment);\n  194 |             g_variant_builder_add (&builder, \"{sv}\", \"ata-apm-level\", g_variant_new_int32 (value));\n  195 |         }\n  196 |     }\n  197 | \n  198 |     /* AAM */\n  199 |     if (gtk_switch_get_active (GTK_SWITCH (data->aam_switch))) {\n  200 |         if (udisks_drive_ata_get_pm_supported (data->ata)) {\n  201 |             gint value = (gint) gtk_adjustment_get_value (data->aam_adjustment);\n  202 |             if (value < 128)\n  203 |                 value = 0;\n  204 |             g_variant_builder_add (&builder, \"{sv}\", \"ata-aam-level\", g_variant_new_int32 (value));\n  205 |         }\n  206 |     }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-disk-settings-dialog.c#L191-206"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"on_ok_clicked is connected to the ok_button 'clicked' signal but its signature is on_ok_clicked(AdwAlertDialog *dialog, gpointer user_data). For a GtkButton::clicked signal the first argument is the GtkButton, not an AdwAlertDialog. The 'dialog' parameter is mis-typed (it is actually the button) and is then passed as the source_object equivalent into on_set_configuration_cb via dialog_data_ref(data) - actually it is unused, so no crash, but the misleading type is a latent bug if someone uses 'dialog'.","fix":"Correct the first parameter type to GtkButton* (or GtkWidget*) and do not treat it as an AdwAlertDialog.","locations":[{"ref":"src/disks/gdu-disk-settings-dialog.c:361-370","code":"  361 | static void\n  362 | on_ok_clicked (AdwAlertDialog *dialog, gpointer user_data)\n  363 | {\n  364 |     DialogData *data = user_data;\n  365 | \n  366 |     udisks_drive_call_set_configuration (data->drive, compute_configuration (data), /* consumes floating */\n  367 |                                          g_variant_new (\"a{sv}\", NULL),             /* options */\n  368 |                                          NULL,                                      /* cancellable */\n  369 |                                          on_set_configuration_cb, dialog_data_ref (data));\n  370 | }","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-disk-settings-dialog.c#L361-370"},{"ref":"src/disks/gdu-disk-settings-dialog.c:535","code":"  535 |     g_signal_connect (data->ok_button, \"clicked\", G_CALLBACK (on_ok_clicked), data);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-disk-settings-dialog.c#L535"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_drive_set_child() returns early (line 604-605) if the block size is 0, AFTER it has already called g_list_store_remove_all(self->partitions) at line 602. So a partition table whose backing block reports size 0 leaves the partition list permanently empty even though gdu_drive_new may have populated a whole-disk block earlier. Combined with the fact that gdu_drive_changed calls gdu_drive_set_child on every change, a transient size-0 report wipes the UI.","fix":"Move the size==0 early return before remove_all, or repopulate a sensible default after clearing.","locations":[{"ref":"src/disks/gdu-drive.c:602-605","code":"  602 |     g_list_store_remove_all (self->partitions);\n  603 | \n  604 |     if (udisks_block_get_size (udisks_object_peek_block (udisk_object)) == 0)\n  605 |         return;","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L602-605"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Default-to-MBR heuristic uses udisks_drive_get_size() < 2000000000000 (2 TB decimal) for removable drives. The comment says '< 2TB' but GPT vs MBR limit is 2^32 sectors which at 512-byte sectors is ~2.2 TB (2199023255552). Using the decimal 2e12 boundary is an approximation; drives between 2.0e12 and 2.2e12 that are removable will be defaulted to DOS/MBR even though MBR can address them, and the threshold does not account for sector size. Minor correctness nit.","fix":"Document the threshold rationale or compute it from the actual MBR addressable limit (2^32 * logical sector size).","locations":[{"ref":"src/disks/gdu-format-disk-dialog.c:372-375","code":"  372 |     if (self->udisks_drive != NULL && udisks_drive_get_removable (self->udisks_drive)\n  373 |         && udisks_drive_get_size (self->udisks_drive) < (guint64) (2000000000000ULL)) {\n  374 |         self->partitioning_type = GDU_PARTITIONING_TYPE_DOS;\n  375 |     }","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-format-disk-dialog.c#L372-375"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In ensure_unused_cb (format-volume), if gdu_utils_ensure_unused_finish fails the function returns early and the dialog was already closed by the caller, but self is leaked (see related finding) and the user gets no error feedback - the unmount failure is silently swallowed (NULL passed for error).","fix":"Capture and show the error from gdu_utils_ensure_unused_finish, and release the ref.","locations":[{"ref":"src/disks/gdu-format-volume-dialog.c:210-212","code":"  210 |     if (!gdu_utils_ensure_unused_finish (client, res, NULL)) {\n  211 |         return;\n  212 |     }","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-format-volume-dialog.c#L210-212"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"should_log: the branch 'if (any_domain && domains)' handling 'all' uses 'if (log_level & ~GDU_LOG_LEVEL_TRACE) return TRUE;'. GDU_LOG_LEVEL_TRACE is a single bit; ~GDU_LOG_LEVEL_TRACE is almost all bits, so any log_level that has ANY bit other than exactly the TRACE bit returns TRUE - including levels that should be filtered by verbosity. The intent ('show up to debug regardless of verbosity, but gate trace by verbosity') is not what the mask expresses; a DEBUG message returns TRUE here even when it carries no other bits, which is fine, but the test is a fragile bitmask abuse rather than a level comparison.","fix":"Compare against the trace level explicitly: 'if (log_level != GDU_LOG_LEVEL_TRACE) return TRUE; return verbosity >= 2;' (after masking custom flags).","locations":[{"ref":"src/disks/gdu-log.c:110-117","code":"  110 |     if (any_domain && domains) {\n  111 |         /* If domain is “all” show logs upto debug regardless of the verbosity */\n  112 |         if (log_level & ~GDU_LOG_LEVEL_TRACE)\n  113 |             return TRUE;\n  114 | \n  115 |         /* If the log is trace level, log if verbosity >= 2 */\n  116 |         return verbosity >= 2;\n  117 |     }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-log.c#L110-117"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_log_to_file uses g_assert(ostream) to validate the result of g_fopen. With G_DISABLE_ASSERT (release builds) the assert compiles out, leaving ostream NULL on open failure; subsequent fprintf(ostream, ...) in gdu_log_write dereferences NULL. Using g_assert for runtime I/O error handling is incorrect.","fix":"Handle the fopen failure with a real error path (warn and fall back to stdout) rather than g_assert.","locations":[{"ref":"src/disks/gdu-log.c:433-449","code":"  433 | void\n  434 | gdu_log_to_file (const gchar *file_path, gboolean append)\n  435 | {\n  436 |     gboolean file_exists;\n  437 | \n  438 |     g_assert (file_path && *file_path);\n  439 |     g_assert (!ostream);\n  440 | \n  441 |     file_exists = g_file_test (file_path, G_FILE_TEST_IS_REGULAR);\n  442 |     ostream = g_fopen (file_path, append ? \"a\" : \"w\");\n  443 |     g_assert (ostream);\n  444 | \n  445 |     if (file_exists && append) {\n  446 |         fprintf (ostream, \"\\n\\n\\n\\n\");\n  447 |         fflush (ostream);\n  448 |     }\n  449 | }","lines":17,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-log.c#L433-449"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"interface_properties_changed_cb fetches block = udisks_object_get_block(object_proxy) and, in the loop branch, computes size = udisks_block_get_size(block) without checking block for NULL. A loop object may transiently lack a Block interface; udisks_block_get_size(NULL) would crash. Note get_block returns a new ref that is also leaked (see separate finding).","fix":"Check block != NULL before calling udisks_block_get_size, and treat missing block as size 0 / not-added.","locations":[{"ref":"src/disks/gdu-manager.c:251-266","code":"  251 |     loop = udisks_object_get_loop ((gpointer) object_proxy);\n  252 |     block = udisks_object_get_block ((gpointer) object_proxy);\n  253 | \n  254 |     if (loop) {\n  255 |         const gchar *file;\n  256 |         gint64 size;\n  257 | \n  258 |         file = udisks_loop_get_backing_file (loop);\n  259 |         size = udisks_block_get_size (block);\n  260 | \n  261 |         if (file && *file && size)\n  262 |             object_added_cb (self, (gpointer) object_proxy);\n  263 |         else if ((!file || !*file) && !size)\n  264 |             object_removed_cb (self, (gpointer) object_proxy);\n  265 | \n  266 |         return;","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-manager.c#L251-266"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_manager_open_loop_async opens the file with O_RDWR (then O_RDONLY fallback) and passes g_variant_new_handle(0) to loop_setup, but only sets the 'read-only' loop option when the caller passed read_only=TRUE. When the file could only be opened O_RDONLY (write access denied) but read_only was requested as FALSE, the loop device is set up read-write over a read-only fd, which fails or misbehaves at write time. The actual open mode is not reflected back into the read-only option.","fix":"Track whether the fd was opened read-only and set the 'read-only' option accordingly (read_only || opened O_RDONLY).","locations":[{"ref":"src/disks/gdu-manager.c:428-439","code":"  428 |     fd = open (path, O_RDWR);\n  429 |     if (fd == -1)\n  430 |         fd = open (path, O_RDONLY);\n  431 | \n  432 |     if (fd == -1) {\n  433 |         g_task_return_new_error (task, G_IO_ERROR, g_io_error_from_errno (errno), \"%s\", strerror (errno));\n  434 |         return;\n  435 |     }\n  436 | \n  437 |     g_variant_builder_init (&options_builder, G_VARIANT_TYPE_VARDICT);\n  438 |     if (read_only)\n  439 |         g_variant_builder_add (&options_builder, \"{sv}\", \"read-only\", g_variant_new_boolean (TRUE));","lines":12,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-manager.c#L428-439"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_mount_options_dialog_get_new_fstab uses g_variant_new_bytestring on fsname/mountpoint/fstype/mountopts. These come from GtkEditable text (UTF-8 strings). g_variant_new_bytestring expects a NUL-terminated byte array and is fine for ASCII, but the original entry was read with '^ay' (bytestring) which is consistent. However mountopts/mountpoint from the user could contain arbitrary bytes; not a leak. The actual issue: fsname from gtk_string_list_get_string(model, selected) can be NULL if selected is out of range (e.g. -1 from adw_combo_row_get_selected returning GTK_INVALID_LIST_POSITION), and g_variant_new_bytestring(NULL) crashes. The 'if (fsname)' guard at line 146 mitigates fsname, but selected could be GTK_INVALID_LIST_POSITION (a huge guint) making get_string return NULL - handled. Low risk but worth a guard on selected.","fix":"Validate selected != GTK_INVALID_LIST_POSITION before gtk_string_list_get_string.","locations":[{"ref":"src/disks/gdu-mount-options-dialog.c:134-147","code":"  134 |     selected = adw_combo_row_get_selected (ADW_COMBO_ROW (self->device_combo_row));\n  135 |     fsname = gtk_string_list_get_string (GTK_STRING_LIST (self->model), selected);\n  136 |     mountpoint = gtk_editable_get_text (GTK_EDITABLE (self->mount_point_row));\n  137 |     fstype = gtk_editable_get_text (GTK_EDITABLE (self->filesystem_type_row));\n  138 |     mountopts = gtk_editable_get_text (GTK_EDITABLE (self->mount_options_row));\n  139 | \n  140 |     if (self->orig_fstab_entry != NULL) {\n  141 |         g_variant_lookup (self->orig_fstab_entry, \"freq\", \"i\", &freq);\n  142 |         g_variant_lookup (self->orig_fstab_entry, \"passno\", \"i\", &passno);\n  143 |     }\n  144 | \n  145 |     g_variant_builder_init (&variant_builder, G_VARIANT_TYPE_VARDICT);\n  146 |     if (fsname)\n  147 |         g_variant_builder_add (&variant_builder, \"{sv}\", \"fsname\", g_variant_new_bytestring (fsname));","lines":14,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-mount-options-dialog.c#L134-147"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"new_disk_image_details_changed_cb checks size_value > 0 for can_proceed and size_value == 0 for the error CSS. For a fractional value like 0.0 < v < 1 truncation is not involved here (gdouble), but the create button enable logic and the error styling use different predicates (>0 vs ==0) which agree only by accident; a negative adjustment (if min is not clamped) would be can_proceed=FALSE yet not flagged as error. Minor inconsistency.","fix":"Use a single consistent predicate (size_value > 0) for both enabling and error styling.","locations":[{"ref":"src/disks/gdu-new-disk-image-dialog.c:306-320","code":"  306 |     if (filename && *filename && size_value > 0) {\n  307 |         can_proceed = TRUE;\n  308 |     }\n  309 | \n  310 |     if (filename && *filename) {\n  311 |         gtk_widget_remove_css_class (self->name_entry, \"error\");\n  312 |     } else {\n  313 |         gtk_widget_add_css_class (self->name_entry, \"error\");\n  314 |     }\n  315 | \n  316 |     if (size_value == 0) {\n  317 |         gtk_widget_add_css_class (self->size_entry, \"error\");\n  318 |     } else {\n  319 |         gtk_widget_remove_css_class (self->size_entry, \"error\");\n  320 |     }","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-new-disk-image-dialog.c#L306-320"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In gdu_resize_dialog_show, calculate_usage is invoked directly (line 642) before the spinner is made visible and before any mount has been attempted. calculate_usage calls gdu_utils_get_unused_for_block which for an unmounted filesystem returns -1 (G_SOURCE_CONTINUE), starting a 500ms poll. Meanwhile the mount is only kicked off afterwards at line 653. If the filesystem is unmounted, the poll will keep returning -1 until the async mount (started later) completes - acceptable, but the spinner-visible logic (line 643) only runs when calculate_usage returns CONTINUE on the very first synchronous call, coupling two independent code paths in a fragile way.","fix":"Restructure so usage calculation begins only after a successful mount, and manage spinner visibility independently.","locations":[{"ref":"src/disks/gdu-resize-volume-dialog.c:635-655","code":"  635 |     if (self->filesystem != NULL) {\n  636 |         gboolean available;\n  637 | \n  638 |         available =\n  639 |             gdu_utils_can_resize (self->client, udisks_block_get_id_type (self->block), FALSE, &self->support, NULL);\n  640 |         g_assert (available);\n  641 | \n  642 |         if (calculate_usage (self) == G_SOURCE_CONTINUE) {\n  643 |             gtk_widget_set_visible (GTK_WIDGET (self->spinner), TRUE);\n  644 |             self->running_id = g_timeout_add (FILESYSTEM_WAIT_STEP_MS, calculate_usage, self);\n  645 |         }\n  646 |     }\n  647 | \n  648 |     mount_points = self->filesystem != NULL ? udisks_filesystem_get_mount_points (self->filesystem) : NULL;\n  649 | \n  650 |     if (self->filesystem != NULL && g_strv_length ((gchar **) mount_points) == 0) {\n  651 |         /* mount FS to aquire fill level */\n  652 |         self->mount_cancellable = g_cancellable_new ();\n  653 |         udisks_filesystem_call_mount (self->filesystem, g_variant_new (\"a{sv}\", NULL), /* options */\n  654 |                                       self->mount_cancellable, resize_get_usage_mount_cb, self);\n  655 |     }","lines":21,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-resize-volume-dialog.c#L635-655"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"on_unlock_clicked_cb only builds and sets self->keyfiles for type crypto_TCRYPT / crypto_unknown. But the keyfile chooser UI (keyfile_chooser) is made visible only for those types too, so OK there; however do_unlock unconditionally adds self->keyfiles if non-NULL. Since self->keyfiles is never reset between unlock attempts and the dialog is single-use this is benign, but combined with the floating-ref handling at line 195 the keyfiles 'as' built from filenames obtained via g_file_get_path can include NULL entries: g_file_get_path returns NULL for non-local files, and g_variant_builder_add(builder, \"s\", NULL) aborts. A user selecting a keyfile on a remote/gvfs location would crash.","fix":"Check filename != NULL before g_variant_builder_add; skip or reject non-local keyfiles with a user-visible message.","locations":[{"ref":"src/disks/gdu-unlock-dialog.c:184-196","code":"  184 |         for (guint i = 0; i < n_items; i++) {\n  185 |             g_autoptr(GFile) file = NULL;\n  186 |             g_autofree char *filename = NULL;\n  187 | \n  188 |             file = g_list_model_get_item (G_LIST_MODEL (self->key_files_store), i);\n  189 |             filename = g_file_get_path (file);\n  190 | \n  191 |             g_variant_builder_add (builder, \"s\", filename);\n  192 |         }\n  193 | \n  194 |         if (n_items)\n  195 |             self->keyfiles = g_variant_new (\"as\", builder);\n  196 |     }","lines":13,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-unlock-dialog.c#L184-196"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_dvd_support_read(): if the initial range search loop finds no range containing offset, n equals support->num_ranges and the while loop body emits a warning and returns -1 (correct). But the cached fast path sets n = last_read_range - ranges; if support->last_read_range happens to point outside the current ranges array (e.g. after ranges were rebuilt) the index would be wrong. last_read_range is a raw pointer into the ranges array with no invalidation guard.","fix":"Store last_read_range as an index, or clear it whenever ranges are reallocated; the bounds check on n already guards the loop but not the cached path.","locations":[{"ref":"src/disks/gdudvdsupport.c:325-334","code":"  325 |     if (support->last_read_range != NULL && offset >= support->last_read_range->start\n  326 |         && offset < support->last_read_range->end) {\n  327 |         n = support->last_read_range - support->ranges;\n  328 |     } else {\n  329 |         /* Otherwise look through all ranges, starting form the first */\n  330 |         for (n = 0; n < support->num_ranges; n++) {\n  331 |             if (offset >= support->ranges[n].start && offset < support->ranges[n].end)\n  332 |                 break;\n  333 |         }\n  334 |     }","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdudvdsupport.c#L325-334"},{"ref":"src/disks/gdudvdsupport.c:346-350","code":"  346 |         if (G_UNLIKELY (n == support->num_ranges)) {\n  347 |             g_warning (\"Requested offset %\" G_GUINT64_FORMAT \" is out of range\", offset);\n  348 |             ret = -1;\n  349 |             goto out;\n  350 |         }","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdudvdsupport.c#L346-350"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdu_xz_decompressor_get_uncompressed_size() validates stream_flags.backward_size > len - 12 but then computes index = footer - stream_flags.backward_size and passes footer - index (== backward_size) as the buffer length to lzma_index_buffer_decode, while the actual mapped bytes before 'footer' are len - 12. If backward_size is large but the index data is corrupt/truncated, lzma_index_buffer_decode may read up to backward_size bytes which is bounded by len-12 (ok), but there is no check that
