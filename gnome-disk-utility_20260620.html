<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"should_include_block calls udisks_object_peek_block(object) into 'block' and immediately passes it to gdu_utils_has_userspace_mount_option(block, ...) and udisks_block_get_device(block) with no NULL check. manager_add_drive only calls should_include_block when 'block' is non-NULL, but object_added_cb and sort_objects route objects here too; sort_objects calls should_include_block(a) only after confirming block != NULL, however an interface-added signal for a non-block object reaching this path would crash. The function documents itself as block-oriented but does not defend against a NULL block.","fix":"Return false early if udisks_object_peek_block (object) == NULL before using block.","locations":[{"ref":"src/disks/gdu-manager.c:74-91","code":"   74 | static bool\n   75 | should_include_block (UDisksObject *object)\n   76 | {\n   77 |     UDisksBlock *block;\n   78 |     UDisksLoop *loop;\n   79 |     const gchar *device;\n   80 |     const gchar *drive;\n   81 |     const gchar *crypto_backing_device;\n   82 |     guint64 size;\n   83 | \n   84 |     block = udisks_object_peek_block (object);\n   85 |     loop = udisks_object_peek_loop (object);\n   86 | \n   87 |     if (gdu_utils_has_userspace_mount_option (block, \"x-gdu.hide\"))\n   88 |         return false;\n   89 | \n   90 |     /* RAM devices are useless */\n   91 |     device = udisks_block_get_device (block);","lines":18,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-manager.c#L74-91"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In file_dialog_open_cb, when the user cancels the folder chooser, gtk_file_dialog_select_folder_finish returns NULL and sets error with code GTK_DIALOG_ERROR_DISMISSED. The code then does g_warning(\"Error selecting folder: %s\", error->message) unconditionally. On cancellation error is set so this is fine, but if finish returns NULL without setting error (not guaranteed but defensive) this would deref NULL. More concretely, the user-cancel case is logged as an error every time the user dismisses the dialog, which is noise.","fix":"Check error != NULL before dereferencing error->message and skip the warning for the dismissed/cancelled code.","locations":[{"ref":"src/disks/gdu-new-disk-image-dialog.c:181-194","code":"  181 | file_dialog_open_cb (GObject *source_object, GAsyncResult *res, gpointer user_data)\n  182 | {\n  183 |     GduNewDiskImageDialog *self = GDU_NEW_DISK_IMAGE_DIALOG (user_data);\n  184 |     GtkFileDialog *file_dialog = GTK_FILE_DIALOG (source_object);\n  185 |     g_autoptr (GError) error = NULL;\n  186 | \n  187 |     self->directory = gtk_file_dialog_select_folder_finish (file_dialog, res, &error);\n  188 |     if (!self->directory) {\n  189 |         g_warning (\"Error selecting folder: %s\", error->message);\n  190 |         return;\n  191 |     }\n  192 | \n  193 |     new_disk_image_set_directory (self);\n  194 | }","lines":14,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-new-disk-image-dialog.c#L181-194"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"destination_row_selected_cb indexes destination_drives with the combo row's selected index without bounds checking. combo_row.selected() returns GTK_INVALID_LIST_POSITION (u32::MAX) when nothing is selected (e.g. model cleared/empty), and the model and the drives Vec can also fall out of sync. Indexing the Vec with that value panics.","fix":"Guard against selected() == gtk::INVALID_LIST_POSITION and use destination_drives.get(idx) with an early return instead of direct indexing.","locations":[{"ref":"src/disks/restore_disk_image_dialog.rs:359-369","code":"  359 |     #[template_callback]\n  360 |     async fn destination_row_selected_cb(\n  361 |         &self,\n  362 |         _param: &glib::ParamSpec,\n  363 |         combo_row: &adw::ComboRow,\n  364 |     ) {\n  365 |         let selected_drive =\n  366 |             self.imp().destination_drives.borrow()[combo_row.selected() as usize].clone();\n  367 |         self.set_destination_object(selected_drive).await;\n  368 |         self.display_size_warning();\n  369 |     }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/restore_disk_image_dialog.rs#L359-369"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"create_local_job / destroy_local_job take the inner Mutex with .expect(\"poisoned lock\") and destroy_local_job additionally unwraps job.object(). object is a nullable property (RefCell<Option<...>>); if it was cleared the unwrap panics. These run on the FFI boundary from C and a panic unwinding into C is UB.","fix":"Handle a None object gracefully (e.g. fall back to iterating the map to remove by Rc identity), and avoid panicking across the FFI boundary; consider catch_unwind or returning early.","locations":[{"ref":"src/disks/ffi/mod.rs:30-35","code":"   30 | pub fn destroy_local_job(job: Rc<LocalJob>) {\n   31 |     GLOBAL_MAP.with(|map| {\n   32 |         let mut map = map.lock().expect(\"poisoned lock\");\n   33 |         let _ = map.remove(job.object().unwrap().0.object_path());\n   34 |     })\n   35 | }","lines":6,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/ffi/mod.rs#L30-35"},{"ref":"src/disks/ffi/mod.rs:20-28","code":"   20 | pub fn create_local_job(object: &udisks::Object) -> Rc<LocalJob> {\n   21 |     let local_job = Rc::new(LocalJob::new(object.clone()));\n   22 |     GLOBAL_MAP.with(|map| {\n   23 |         let mut map = map.lock().expect(\"poisoned lock\");\n   24 |         map.entry(object.object_path().clone())\n   25 |             .or_insert_with(|| local_job)\n   26 |             .clone()\n   27 |     })\n   28 | }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/ffi/mod.rs#L20-28"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"FFI entry points panic across the C boundary. gdu_rs_restore_disk_image_dialog_show calls .expect(\"Failed to create udisks client\") inside the spawned future and asserts window_ptr non-null. A panic propagating from Rust into the C caller (and from an async task) is undefined behavior and will at best abort. udisks::Client::new failing (no service running) is a realistic runtime condition.","fix":"Replace expect with error logging and an early return; wrap the extern fn body in std::panic::catch_unwind so panics never unwind into C.","locations":[{"ref":"src/disks/ffi/mod.rs:66-93","code":"   66 | #[unsafe(no_mangle)]\n   67 | pub extern \"C\" fn gdu_rs_restore_disk_image_dialog_show(\n   68 |     window_ptr: *mut gtk::ffi::GtkWindow,\n   69 |     object_path: *const c_char,\n   70 |     disk_image_filename: *const c_char,\n   71 | ) {\n   72 |     assert!(!window_ptr.is_null(), \"`window_ptr` must be non-null\");\n   73 | \n   74 |     //SAFETY: the C side has already initialized GTK\n   75 |     unsafe { gtk::set_initialized() }\n   76 |     let parent_window = unsafe { gtk::Window::from_glib_borrow(window_ptr) };\n   77 |     let disk_image_filename = read_nullable_cstr(disk_image_filename);\n   78 |     let object_path = read_nullable_cstr(object_path);\n   79 | \n   80 |     glib::MainContext::default().spawn_local(async move {\n   81 |         let client = udisks::Client::new()\n   82 |             .await\n   83 |             .expect(\"Failed to create udisks client\");\n   84 |         let object = object_path.and_then(|p| client.object(p).ok());\n   85 | \n   86 |         GduRestoreDiskImageDialog::show(\n   87 |             parent_window.as_ref(),\n   88 |             object.as_ref(),\n   89 |             client,\n   90 |             disk_image_filename.as_deref(),\n   91 |         )\n   92 |         .await;\n   93 |     });","lines":28,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/ffi/mod.rs#L66-93"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"gdu_application_object_from_block_device calls udisks_object_peek_block(object) and passes the result directly to udisks_block_get_crypto_backing_device without a NULL check. If the looked-up object has no Block interface, peek_block returns NULL and crypto_backing_device dereferences NULL. Also udisks_client_get_object can return NULL when crypto_backing_device is '/'; that case is handled, but the prior peek_block NULL is not.","fix":"Check the result of udisks_object_peek_block (object) for NULL before passing it to udisks_block_get_crypto_backing_device.","locations":[{"ref":"src/disks/gdu-application.c:124-132","code":"  124 |     object = UDISKS_OBJECT (g_dbus_interface_dup_object (G_DBUS_INTERFACE (block)));\n  125 |     g_object_unref (block);\n  126 | \n  127 |     crypto_backing_device = udisks_block_get_crypto_backing_device ((udisks_object_peek_block (object)));\n  128 |     crypto_backing_object = udisks_client_get_object (app->client, crypto_backing_device);\n  129 |     if (crypto_backing_object != NULL) {\n  130 |         g_object_unref (object);\n  131 |         object = crypto_backing_object;\n  132 |     }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-application.c#L124-132"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"gdu_block_row_update_features() reads attribute 0 of volume_actions_submenu via g_menu_model_get_item_attribute_value() and then unconditionally calls g_variant_get_string(menu_item_attribute, NULL) four times. If the menu has no item 0 or item 0 has no string 'action' attribute, menu_item_attribute is NULL and g_variant_get_string(NULL, ...) dereferences NULL, crashing.","fix":"Guard with 'if (menu_item_attribute != NULL)' before calling g_variant_get_string(), or use g_menu_model_get_n_items() to confirm item 0 exists.","locations":[{"ref":"src/disks/gdu-block-row.c:127-134","code":"  127 |     menu_item_attribute =\n  128 |         g_menu_model_get_item_attribute_value (self->volume_actions_submenu, 0, \"action\", g_variant_type_new (\"s\"));\n  129 | \n  130 |     if ((g_strcmp0 (g_variant_get_string (menu_item_attribute, NULL), \"row.unmount\") == 0)\n  131 |         || (g_strcmp0 (g_variant_get_string (menu_item_attribute, NULL), \"row.mount\") == 0)\n  132 |         || (g_strcmp0 (g_variant_get_string (menu_item_attribute, NULL), \"row.lock\") == 0)\n  133 |         || (g_strcmp0 (g_variant_get_string (menu_item_attribute, NULL), \"row.unlock\") == 0))\n  134 |         g_menu_remove (G_MENU (self->volume_actions_submenu), 0);","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L127-134"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"gdu_drive_changed() at line 269 calls g_dbus_interface_get_object((gpointer) block) and then g_object_ref(object)/g_set_object without checking that block (from udisks_client_get_block_for_drive, which can return NULL) is non-NULL. If block is NULL, g_dbus_interface_get_object(NULL) and the subsequent g_object_ref(NULL) inside g_set_object can crash or assert. gdu_drive_set_child guards similar code; this path does not.","fix":"Check 'if (block != NULL)' before taking its object, mirroring the guard used elsewhere.","locations":[{"ref":"src/disks/gdu-drive.c:264-271","code":"  264 |     if (self->drive) {\n  265 |         g_autoptr(UDisksBlock) block = NULL;\n  266 |         UDisksObject *object;\n  267 | \n  268 |         block = udisks_client_get_block_for_drive (self->client, self->drive, false);\n  269 |         object = (gpointer) g_dbus_interface_get_object ((gpointer) block);\n  270 |         g_set_object (&self->partition_table, g_object_ref (object));\n  271 |     }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L264-271"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"gdu_edit_partition_dialog_get_new_type calls adw_combo_row_get_selected_item then immediately g_object_get_data on the result. If the combo model is empty (e.g. udisks_client_get_partition_type_infos returns no usable entries for the table type), get_selected_item returns NULL and g_object_get_data(G_OBJECT(NULL), ...) dereferences NULL -> crash. This is reached on confirm and on every property-change callback.","fix":"Guard against item == NULL and return NULL/empty string, or ensure the model is always populated before the dialog is interactive.","locations":[{"ref":"src/disks/gdu-edit-partition-dialog.c:54-58","code":"   54 | \n   55 |     item = adw_combo_row_get_selected_item (ADW_COMBO_ROW (self->type_row));\n   56 |     type = g_strdup (g_object_get_data (G_OBJECT (item), \"type\"));\n   57 | \n   58 |     return type;","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-edit-partition-dialog.c#L54-58"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"gdu_format_disk_dialog_get_property and set_property switch only on PROP_PARTITIONING_TYPE and have no default case; for any unknown property_id they silently do nothing instead of warning via G_OBJECT_WARN_INVALID_PROPERTY_ID. Not a crash today but masks bugs and the get_property leaves value uninitialized for unknown ids.","fix":"Add a default case calling G_OBJECT_WARN_INVALID_PROPERTY_ID(object, property_id, pspec).","locations":[{"ref":"src/disks/gdu-format-disk-dialog.c:280-302","code":"  280 | static void\n  281 | gdu_format_disk_dialog_get_property (GObject *object, guint property_id, GValue *value, GParamSpec *pspec)\n  282 | {\n  283 |     GduFormatDiskDialog *self = GDU_FORMAT_DISK_DIALOG (object);\n  284 | \n  285 |     switch ((GduFormatDiskDialogProps) property_id) {\n  286 |     case PROP_PARTITIONING_TYPE:\n  287 |         g_value_set_enum (value, self->partitioning_type);\n  288 |         break;\n  289 |     }\n  290 | }\n  291 | \n  292 | static void\n  293 | gdu_format_disk_dialog_set_property (GObject *object, guint property_id, const GValue *value, GParamSpec *pspec)\n  294 | {\n  295 |     GduFormatDiskDialog *self = GDU_FORMAT_DISK_DIALOG (object);\n  296 | \n  297 |     switch ((GduFormatDiskDialogProps) property_id) {\n  298 |     case PROP_PARTITIONING_TYPE:\n  299 |         self->partitioning_type = g_value_get_enum (value);\n  300 |         break;\n  301 |     }\n  302 | }","lines":23,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-format-disk-dialog.c#L280-302"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"g_dbus_interface_get_object is called on self->udisks_block (line 422) before the g_assert(self->udisks_block != NULL) at line 424. If udisks_block is NULL (both object has no block and drive lookup failed), g_dbus_interface_get_object((gpointer)NULL) is invoked before the assert, causing a NULL-cast crash. The assert is also after udisks_object_get_partition_table(block_object) where block_object could be NULL.","fix":"Move the g_assert(self->udisks_block != NULL) before the g_dbus_interface_get_object call.","locations":[{"ref":"src/disks/gdu-format-volume-dialog.c:421-424","code":"  421 |     // get dbus inteface for the block\n  422 |     block_object = (gpointer) g_dbus_interface_get_object ((gpointer) self->udisks_block);\n  423 |     self->udisks_table = udisks_object_get_partition_table (block_object);\n  424 |     g_assert (self->udisks_block != NULL);","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-format-volume-dialog.c#L421-424"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"set_drive permits a NULL drive (the precondition explicitly allows !drive). When drive is NULL, gdu_item_get_partitions (GDU_ITEM (self->drive)) is called with NULL: GDU_ITEM(NULL) fails its type check and gdu_item_get_partitions returns NULL, then g_signal_connect_swapped is called on a NULL instance, which triggers a critical and the connection silently fails. update_space_allocation_bar then calls g_list_model_get_n_items(NULL).","fix":"Guard the signal connection and update on self->drive != NULL, and make update_space_allocation_bar handle a NULL partitions model (skip the loop).","locations":[{"ref":"src/disks/gdu-space-allocation-bar.c:144-158","code":"  144 | void\n  145 | gdu_space_allocation_bar_set_drive (GduSpaceAllocationBar *self, GduDrive *drive)\n  146 | {\n  147 |     g_return_if_fail (GDU_IS_SPACE_ALLOCATION_BAR (self));\n  148 |     g_return_if_fail (!drive || GDU_IS_DRIVE (drive));\n  149 | \n  150 |     if (self->drive == drive)\n  151 |         return;\n  152 | \n  153 |     g_set_object (&self->drive, drive);\n  154 | \n  155 |     g_signal_connect_swapped (gdu_item_get_partitions (GDU_ITEM (self->drive)), \"items-changed\",\n  156 |                               G_CALLBACK (update_space_allocation_bar), self);\n  157 |     update_space_allocation_bar (self);\n  158 | }","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-space-allocation-bar.c#L144-158"},{"ref":"src/disks/gdu-space-allocation-bar.c:43-52","code":"   43 |     partitions = gdu_item_get_partitions (GDU_ITEM (self->drive));\n   44 | \n   45 |     child = gtk_widget_get_first_child (GTK_WIDGET (self));\n   46 |     while (child) {\n   47 |         GtkWidget *next = gtk_widget_get_next_sibling (child);\n   48 |         gtk_widget_unparent (child);\n   49 |         child = next;\n   50 |     }\n   51 | \n   52 |     for (guint i = 0; i < g_list_model_get_n_items (partitions); i++) {","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-space-allocation-bar.c#L43-52"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In update(), speed is computed as (b->value - a->value) / ((b->time_usec - a->time_usec) / G_USEC_PER_SEC). If two consecutive samples share the same g_get_real_time() microsecond timestamp (possible under fast successive add_sample calls or coarse clock), the divisor is 0.0, yielding inf/NaN, which then propagates into bytes_per_sec (cast to guint64 -> undefined) and usec_remaining.","fix":"Skip samples where b->time_usec == a->time_usec (or guard delta > 0) before dividing; only accumulate valid speeds.","locations":[{"ref":"src/disks/gduestimator.c:103-119","code":"  103 |     for (n = 1; n < estimator->num_samples; n++) {\n  104 |         Sample *a = &estimator->samples[n - 1];\n  105 |         Sample *b = &estimator->samples[n];\n  106 |         gdouble speed;\n  107 |         speed = (b->value - a->value) / (((gdouble) (b->time_usec - a->time_usec)) / G_USEC_PER_SEC);\n  108 |         sum_of_speeds += speed;\n  109 |         num_speeds++;\n  110 |     }\n  111 |     estimator->bytes_per_sec = 0;\n  112 |     estimator->usec_remaining = 0;\n  113 |     if (num_speeds > 0) {\n  114 |         gdouble speed;\n  115 |         speed = sum_of_speeds / num_speeds;\n  116 |         estimator->bytes_per_sec = speed;\n  117 |         if (estimator->bytes_per_sec > 0) {\n  118 |             guint64 remaining_bytes = estimator->target_bytes - estimator->completed_bytes;\n  119 |             estimator->usec_remaining = G_USEC_PER_SEC * remaining_bytes / estimator->bytes_per_sec;","lines":17,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gduestimator.c#L103-119"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"show() unconditionally unwraps object.block() via .expect when setting the destination object, and set_destination_object also expect()s block(). A udisks object that is a drive whose block lookup fails, or any object lacking a Block interface, makes this panic. mount/restore flows construct destinations from get_managed_objects where not every entry has a usable block.","fix":"Return a Result/Option from set_destination_object and handle the missing-block case gracefully instead of expect().","locations":[{"ref":"src/disks/restore_disk_image_dialog.rs:180-186","code":"  180 |         let block = object.block().await.expect(\"`block` should be Ok\");\n  181 |         let drive = self.client().drive_for_block(&block).await;\n  182 |         imp.object.replace(Some(object));\n  183 |         imp.drive.replace(drive.ok());\n  184 | \n  185 |         //TODO: use a method call for this so it works on e.g. floppy drives where e.g. we don't know the size\n  186 |         imp.block_size.set(block.size().await.unwrap_or_default());","lines":7,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/restore_disk_image_dialog.rs#L180-186"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"populate_destination_combobox unwraps info.one_liner. object_info's one_liner is an Option and other code in this same file treats it as possibly-None (unwrap_or_default at line 160). For a device without a one-liner description this unwrap panics while building the combobox.","fix":"Use info.one_liner.unwrap_or_default() (or fall back to another field) consistently with set_destination_object.","locations":[{"ref":"src/disks/restore_disk_image_dialog.rs:305-307","code":"  305 |             let info = client.object_info(&object).await;\n  306 |             drive_names.append(&info.one_liner.unwrap());\n  307 |             let object = client.object(block.inner().path().to_owned()).unwrap();","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/restore_disk_image_dialog.rs#L305-307"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In main(), g_object_unref (monitor) is called unconditionally after the main loop exits. monitor is only set in name_acquired_handler; if the bus name is never acquired (e.g. name_lost fires, or the loop is quit before acquisition), monitor is still NULL and g_object_unref(NULL) emits a critical. name_lost_handler also g_clear_object's it, so after a lost-name path monitor is NULL at this point.","fix":"Use g_clear_object (&monitor) instead of g_object_unref (monitor).","locations":[{"ref":"src/notify/main.c:58","code":"   58 |     g_object_unref (monitor);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/notify/main.c#L58"},{"ref":"src/notify/main.c:39","code":"   39 |     GduSdMonitor *monitor = NULL;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/notify/main.c#L39"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"open_in_disks unwraps OwnedObjectPath::try_from(\"/org/gnome/DiskUtility\") and the dialog code unwraps similar constants. These are constant valid paths so they won't fail in practice, but they are unchecked unwraps; if the literal is ever edited to an invalid path it becomes a runtime panic with no compile-time guard.","fix":"Prefer expect with a descriptive message, or build the path via a checked const; low risk as-is.","locations":[{"ref":"src/disk-image-mounter/window.rs:439","code":"  439 |                     OwnedObjectPath::try_from(\"/org/gnome/DiskUtility\").unwrap(),","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disk-image-mounter/window.rs#L439"},{"ref":"src/disk-image-mounter/window.rs:248-268","code":"  248 |     async fn on_continue_button(&self, button: &gtk::Button) {\n  249 |         button.set_sensitive(false);\n  250 |         let action_result = match self.continue_action() {\n  251 |             Action::OpenInFiles => self.open_in_files(true).await,\n  252 |             Action::OpenInFilesWritable => self.open_in_files(false).await,\n  253 |             Action::Unmount => self.unmount().await,\n  254 |             Action::Write => self.write_image().await,\n  255 |             Action::Inspect => self.inspect().await,\n  256 |         };\n  257 | \n  258 |         button.set_sensitive(true);\n  259 |         match action_result {\n  260 |             Ok(_) => self.close(),\n  261 |             Err(err) => {\n  262 |                 log::error!(\"{}\", err);\n  263 |                 self.imp()\n  264 |                     .toast_overlay\n  265 |                     .add_toast(adw::Toast::new(&self.user_visible_error_msg()));\n  266 |             }\n  267 |         };\n  268 |     }","lines":21,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disk-image-mounter/window.rs#L248-268"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"can_format_cb: if udisks_manager_call_can_format_finish fails (returns FALSE), out_available stays NULL and g_variant_get is skipped, leaving 'available' FALSE and 'util' NULL. The code then builds a tooltip via g_strdup_printf(_(\"The utility %s is missing.\"), util) with util==NULL, printing '(null)' to the user. Not a crash (glib printf handles NULL %s) but a misleading message that hides the real D-Bus error.","fix":"On the finish-failure path, show the actual error or a generic message rather than formatting a NULL util into the missing-utility string.","locations":[{"ref":"src/disks/gdu-create-other-page.c:42-60","code":"   42 | static void\n   43 | can_format_cb (UDisksManager *manager, GAsyncResult *res, gpointer user_data)\n   44 | {\n   45 |     GtkWidget *row = user_data;\n   46 |     g_autoptr(GVariant) out_available = NULL;\n   47 |     g_autofree char *util = NULL;\n   48 |     gboolean available = FALSE;\n   49 | \n   50 |     if (udisks_manager_call_can_format_finish (manager, &out_available, res, NULL)) {\n   51 |         g_variant_get (out_available, \"(bs)\", &available, &util);\n   52 |     }\n   53 | \n   54 |     if (!available) {\n   55 |         g_autofree char *tooltip = NULL;\n   56 | \n   57 |         gtk_widget_set_sensitive (row, FALSE);\n   58 |         tooltip = g_strdup_printf (_(\"The utility %s is missing.\"), util);\n   59 |         gtk_widget_set_tooltip_text (row, tooltip);\n   60 |     }","lines":19,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-other-page.c#L42-60"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"update_standby_label can leave s as NULL: the if/else-if chain covers 0, <241, <252, ==252, ==253, ==254, ==255 but value comes from a gdouble adjustment cast to gint64 and there is no else. A value in (255, ...] or a fractional rounding edge leaves s NULL, then gtk_label_set_text(label, NULL) is called (which clears the label, not a crash) - but the missing else is a latent gap. The adjustment is presumably bounded 0..255, so low severity.","fix":"Add a final else clause assigning a sensible default string.","locations":[{"ref":"src/disks/gdu-disk-settings-dialog.c:264-287","code":"  264 | static void\n  265 | update_standby_label (DialogData *data)\n  266 | {\n  267 |     gint64 value;\n  268 |     g_autofree gchar *s = NULL;\n  269 | \n  270 |     value = gtk_adjustment_get_value (data->standby_adjustment);\n  271 |     if (value == 0) {\n  272 |         s = g_strdup (C_(\"standby-value\", \"Never\"));\n  273 |     } else if (value < 241) {\n  274 |         s = gdu_utils_format_duration_usec (value * 5 * G_USEC_PER_SEC, GDU_FORMAT_DURATION_FLAGS_NONE);\n  275 |     } else if (value < 252) {\n  276 |         s = gdu_utils_format_duration_usec ((value - 240) * 30 * 60 * G_USEC_PER_SEC, GDU_FORMAT_DURATION_FLAGS_NONE);\n  277 |     } else if (value == 252) {\n  278 |         s = gdu_utils_format_duration_usec (21 * 60 * G_USEC_PER_SEC, GDU_FORMAT_DURATION_FLAGS_NONE);\n  279 |     } else if (value == 253) {\n  280 |         s = g_strdup (C_(\"standby-value\", \"Vendor-defined\"));\n  281 |     } else if (value == 254) {\n  282 |         s = g_strdup (C_(\"standby-value\", \"Reserved\"));\n  283 |     } else if (value == 255) {\n  284 |         s = gdu_utils_format_duration_usec ((21 * 60 + 15) * G_USEC_PER_SEC, GDU_FORMAT_DURATION_FLAGS_NONE);\n  285 |     }\n  286 |     gtk_label_set_text (GTK_LABEL (data->standby_value_label), s);\n  287 | }","lines":24,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-disk-settings-dialog.c#L264-287"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"gdu_drive_block_changed() computes 'after' via g_list_model_get_item(..., position + 1) where position came from g_list_store_find. If 'block' is the last item, position+1 is out of range and g_list_model_get_item returns NULL (handled). But 'before' is fetched only when position > 0 (correct). The risk is integer wrap is impossible here, so this is fine — however the comment admits siblings that are pure free-space won't be updated, meaning adjacent free-space visuals can become stale after a resize.","fix":"Refresh the whole partition list (or all siblings) on a structural change rather than only the immediate neighbors; at minimum, update free-space pseudo-blocks too.","locations":[{"ref":"src/disks/gdu-drive.c:1048-1060","code":" 1048 | \n 1049 |     /* Update siblings as some changes (like partition size changes)\n 1050 |        also affects siblings */\n 1051 |     /* fixme: This won't work if the siblings is just freespace without any block associated */\n 1052 |     if (position > 0) {\n 1053 |         before = g_list_model_get_item (G_LIST_MODEL (self->partitions), position - 1);\n 1054 |         gdu_block_emit_updated (before);\n 1055 |     }\n 1056 | \n 1057 |     after = g_list_model_get_item (G_LIST_MODEL (self->partitions), position + 1);\n 1058 | \n 1059 |     if (after)\n 1060 |         gdu_block_emit_updated (after);","lines":13,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L1048-1060"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"gdu_item_changed lacks the g_return_if_fail (GDU_IS_ITEM (self)) guard that every other public method in this file has. Passing NULL or a non-GduItem dereferences via GDU_ITEM_GET_CLASS, crashing instead of warning.","fix":"Add g_return_if_fail (GDU_IS_ITEM (self)); at the top of gdu_item_changed.","locations":[{"ref":"src/disks/gdu-item.c:160-164","code":"  160 | void\n  161 | gdu_item_changed (GduItem *self)\n  162 | {\n  163 |     GDU_ITEM_GET_CLASS (self)->changed (self);\n  164 | }","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-item.c#L160-164"}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"gdu_dvd_support_free() dereferences support->ranges (g_free(support->ranges)) and support->dvdcss without first checking support != NULL. It is a public function (declared in the header) and is also called internally; any NULL argument crashes.","fix":"Add an early return if (support == NULL) return; at the top of gdu_dvd_support_free().","locations":[{"ref":"src/disks/gdudvdsupport.c:296-305","code":"  296 | void\n  297 | gdu_dvd_support_free (GduDVDSupport *support)\n  298 | {\n  299 |     g_free (support->ranges);\n  300 |     if (support->dvdcss != NULL)\n  301 |         dvdcss_close (support->dvdcss);\n  302 |     if (support->dvd != NULL)\n  303 |         DVDClose (support->dvd);\n  304 |     g_free (support);\n  305 | }","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdudvdsupport.c#L296-305"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"gdu_utils_unfuse_path: when home == '/' (home_len == 1) the home_len > 2 guard skips correctly, but for a home dir of exactly two characters the check 'home_len > 2' rejects valid replacement; more importantly when home has a trailing slash and home_len becomes 2 after decrement, ret[home_len] indexing is fine, but the '~/%s' build uses tmp + home_len + 1 which can read one past a path that equals home exactly (ret[home_len] would be '\\0', condition false, so safe). The real latent issue: the home_len > 2 lower bound is arbitrary and silently disables tilde substitution for short home paths.","fix":"Replace the magic 'home_len > 2' guard with a correct boundary check (home_len >= 1) and verify ret length before indexing ret[home_len].","locations":[{"ref":"src/libgdu/gduutils.c:144-157","code":"  144 |     /* Re ser_data back to GduDriveView and use self->drive; if the view is destroyed while the confirmation dialog is open, self is dangling -> use-after-free. The async completion callbacks DO take a ref (g_object_ref(self)) and free via g_autoptr, but the gap between showing the confirmation and the user responding is unprotected. ConfirmationDialogData is also never freed.","fix":"g_object_ref(self) into data->user_data and unref in the response callback (or use a GWeakRef), and ensure the data struct is freed.","locations":[{"ref":"src/disks/gdu-drive-view.c:366-376","code":"  366 |     data = g_new0 (ConfirmationDialogData, 1);\n  367 |     /* Translators: Heading for ejecting a device with multiple drives */\n  368 |     data->message = _(\"Are you sure you want to eject the drives?\");\n  369 |     /* Translators: Message for ejecting a device with multiple drives */\n  370 |     data->description = _(\"This operation will prepare the system for the following drives to be ejected.\");\n  371 |     data->response_verb = _(\"_Eject\");\n  372 |     data->response_appearance = ADW_RESPONSE_DEFAULT;\n  373 |     data->callback = eject_confirmation_response_cb;\n  374 |     data->user_data = self;\n  375 | \n  376 |     gdu_utils_show_confirmation (drive_view_get_window (self), data, affected_devices_widget);","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive-view.c#L366-376"},{"ref":"src/disks/gdu-drive-view.c:429-440","code":"  429 |     data = g_new0 (ConfirmationDialogData, 1);\n  430 |     /* Translators: Heading for powering off a device with multiple drives */\n  431 |     data->message = _(\"Are you sure you want to power off the drives?\");\n  432 |     /* Translators: Message for powering off a device with multiple drives */\n  433 |     data->description =\n  434 |         _(\"This operation will prepare the system for the following drives to be powered down and removed.\");\n f, NULL) which (non-add_partition branch) calls g_object_ref(self) and schedules another async op, but when create_partition_cb returns the g_autoptr unref drops the ref taken when create_partition was invoked. The ref accounting across the recursive format step is fragile; additionally partition_object is assigned to self->udisks_object after g_object_unref(self->udisks_object) - if udisks_client_get_object returned NULL (line 323), partition_block check at 329 dereferences via udisks_object_get_block(NULL) causing a NULL-arg warning/crash.","fix":"Null-check partition_object before udisks_object_get_block; carefully audit ref ownership through the recursive on_forward path.","locations":[{"ref":"src/disks/gdu-format-volume-dialog.c:307-345","code":"  307 | create_partition_cb (GObject *source_object, GAsyncResult *res, gpointer user_data)\n  308 | {\n  309 |     g_autoptr(GduFormatVolumeDialog) self = user_data;\n  310 |     g_autoptr(GError) error = NULL;\n  311 |     g_autofree char *created_partition_object_path = NULL;\n  312 |     UDisksObject *partition_object = NULL;\n  313 |     UDisksBlock *partition_block;\n  314 | \n  315 |     if (!udisks_partition_table_call_create_partition_finish (UDISKS_PARTITION_TABLE (source_object),\n  316 |                                                               &created_partition_object_path, res, &error)) {\n  317 |         gdu_utils_show_error (gdu_format_volume_dialog_get_window (self), _(\"Error creating partition\"), error);\n  318 |         return;\n  319 |     }\n  320 | \n  321 |     udisks_client_settle (self->udisks_client);\n  322 | \n  323 |     partition_object = udisks_client_get_object (self->udisks_client, created_partition_object_path);\n  324 |     /* gtk4 todo: to be done with GtkSelectionModel */\n  325 |     /* gdu_window_select_object (GDU_WINDOW (self->parent_window),\n  326 |      * partition_object); */\n  327 | \n  328 |     partition_block = udisks_object_get_block (partition_object);\n  329 |     if (partition_block == NULL) {\n  330 |         g_warning (\"Created partition has no block interface\");\n  331 |         adw_dialog_close (ADW_DIALOG (self));\n  332 |         g_clear_object (&partition_object);\n  333 |         return;\n  334 |     }\n  335 | \n  336 |     /* Create a filesystem now on partition if not an extended partition */\n  337 |     if (g_strcmp0 (gdu_format_volume_dialog_get_fs_type (self), \"dos_extended\") != 0) {\n  338 |         self->add_partition = FALSE;\n  339 |         g_object_unref (self->udisks_block);\n  340 |         self->udisks_block = partition_block;\n  341 |         g_object_unref (self->udisks_object);\n  342 |         self->udisks_object = partition_object;\n  343 |         on_forward_button_clicked_cb (self, NULL);\n  344 |     }\n  345 | }","lines":39,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-format-volume-dialog.c#L307-345"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":false,"description":"In on_forward_button_clicked_cb (non-add_partition path), gdu_utils_ensure_unused is called with g_object_ref(self) as user_data, then adw_dialog_close(self) is called immediately afterwards. ensure_unused_cb later calls udisks_block_call_format with format_cb that does g_object_unref(self). This balances one ref. But the dialog close happens while an async op holds a ref - acceptable. The genuine bug: if gdu_utils_ensure_unused_finish fails, ensure_unused_cb returns early WITHOUT unref'ing self (the g_object_ref taken at line 264 is leaked) and without ever reaching format_cb.","fix":"In ensure_unused_cb, g_object_unref(self) before returning on the failure path (or use g_autoptr semantics).","locations":[{"ref":"src/disks/gdu-format-volume-dialog.c:260-267","code":"  260 |     if (!self->add_partition) {\n  261 |         /* ensure the volume is unused (e.g. unmounted) before formatting it */\n  262 |         gdu_utils_ensure_unused (self->udisks_client, gdu_format_volume_dialog_get_window (self), self->udisks_object,\n  263 |                                  (GAsyncReadyCallback) ensure_unused_cb, NULL, /* GCancellable */\n  264 |                                  g_object_ref (self));\n  265 |         adw_dialog_close (ADW_DIALOG (self));\n  266 |         return;\n  267 |     }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-format-volume-dialog.c#L260-267"},{"ref":"src/disks/gdu-format-volume-dialog.c:204-212","code":"  204 | ensure_unused_cb (UDisksClient *client, GAsyncResult *res, GduFormatVolumeDialog *self)\n  205 | {\n  206 |     GVariantBuilder options_builder;\n  207 |     const gchar *fs_type;\n  208 |     const gchar *erase_type;\n  209 | \n  210 |     if (!gdu_utils_ensure_unused_finish (client, res, NULL)) {\n  211 |         return;\n  212 |     }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-format-volume-dialog.c#L204-212"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":false,"description":"gdu_mount_options_dialog_populate_device_combo_row appends g_strdup_printf results (UUID=... and LABEL=...) into the GtkStringList via gtk_string_list_append. gtk_string_list_append copies the string, so the strdup'd buffers are leaked every time the combo is populated.","fix":"Use g_autofree temporaries or g_strdup_printf into a freed variable; or use gtk_string_list_take if available (it isn't), so free after append.","locations":[{"ref":"src/disks/gdu-mount-options-dialog.c:193","code":"  193 |         gtk_string_list_append (GTK_STRING_LIST (self->model), g_strdup_printf (\"UUID=%s\", item));","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-mount-options-dialog.c#L193"},{"ref":"src/disks/gdu-mount-options-dialog.c:198","code":"  198 |         gtk_string_list_append (GTK_STRING_LIST (self->model), g_strdup_printf (\"LABEL=%s\", item));","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-mount-options-dialog.c#L198"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"g_list_model_get_item() returns a new reference (transfer full) to the GduBlock, but the returned 'block' is never unreferenced. size_allocate runs on every layout pass, so this leaks one GduBlock reference per partition on every resize/relayout.","fix":"Wrap block in g_autoptr(GduBlock) or call g_object_unref (block) at the end of the loop body.","locations":[{"ref":"src/disks/gdu-space-allocation-bar.c:95-102","code":"   95 |         block = g_list_model_get_item (partitions, i);\n   96 |         /* Add 128KB to the size to account for floating point errors */\n   97 |         size = width * (gdouble) (gdu_item_get_size (GDU_ITEM (block)) + 128 * 1024) / (gdouble) total_size;\n   98 |         position_offset = width * (gdouble) gdu_block_get_offset (block) / (gdouble) total_size;\n   99 | \n  100 |         gtk_widget_allocate (child, size, height, baseline,\n  101 |                              gsk_transform_translate (NULL, &GRAPHENE_POINT_INIT (position_offset, 0)));\n  102 |         gtk_widget_add_css_class (child, g_object_get_data (G_OBJECT (block), \"color\"));","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-space-allocation-bar.c#L95-102"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"gdu_application_ensure_client is called once from gdu_application_command_line and again from gdu_application_activate (which command_line triggers via g_application_activate). Each call overwrites app->client (and app->disk_manager) with a new ref from gdu_manager_get_client (which g_object_ref's the client) without unref-ing the previous value, leaking a UDisksClient reference on every invocation. Also app->disk_manager is a borrowed singleton but client is owned, so repeated assignment leaks the owned ref.","fix":"Guard ensure_client so it only runs once (e.g. 'if (app->client != NULL) return;'), or g_clear_object (&app->client) before reassigning.","locations":[{"ref":"src/disks/gdu-application.c:92-101","code":"   92 | static void\n   93 | gdu_application_ensure_client (GduApplication *app)\n   94 | {\n   95 |     g_autoptr(GError) error = NULL;\n   96 | \n   97 |     app->disk_manager = gdu_manager_get_default (&error);\n   98 |     app->client = gdu_manager_get_client (app->disk_manager);\n   99 |     if (error)\n  100 |         g_error (\"Error getting udisks client: %s\", error->message);\n  101 | }","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-application.c#L92-101"},{"ref":"src/disks/gdu-application.c:194","code":"  194 |     gdu_application_ensure_client (app);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-application.c#L194"},{"ref":"src/disks/gdu-application.c:242","code":"  242 |     gdu_application_ensure_client (app);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-application.c#L242"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In gdu_ata_smart_dialog_show() the GSimpleActionGroup 'group' and each GSimpleAction created are never unref'd. g_action_map_add_action() takes its own ref on the action, and gtk_widget_insert_action_group() takes a ref on the group, so the local references created by g_simple_action_new()/g_simple_action_group_new() leak each time the dialog is opened.","fix":"g_object_unref each action after adding it, and g_object_unref(group) after inserting it (or use g_autoptr).","locations":[{"ref":"src/disks/gdu-ata-smart-dialog.c:1446-1460","code":" 1446 |     group = g_simple_action_group_new ();\n 1447 | \n 1448 |     action = g_simple_action_new (\"short\", NULL);\n 1449 |     g_signal_connect (action, \"activate\", G_CALLBACK (on_selftest_short), data);\n 1450 |     g_action_map_add_action (G_ACTION_MAP (group), G_ACTION (action));\n 1451 | \n 1452 |     action = g_simple_action_new (\"extended\", NULL);\n 1453 |     g_signal_connect (action, \"activate\", G_CALLBACK (on_selftest_extended), data);\n 1454 |     g_action_map_add_action (G_ACTION_MAP (group), G_ACTION (action));\n 1455 | \n 1456 |     action = g_simple_action_new (\"conveyance\", NULL);\n 1457 |     g_signal_connect (action, \"activate\", G_CALLBACK (on_selftest_conveyance), data);\n 1458 |     g_action_map_add_action (G_ACTION_MAP (group), G_ACTION (action));\n 1459 | \n 1460 |     gtk_widget_insert_action_group (GTK_WIDGET (data->dialog), \"test\", G_ACTION_GROUP (group));","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-ata-smart-dialog.c#L1446-1460"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"get_max_min_avg() calls g_list_model_get_item() which returns a new reference, but never unrefs the returned GduBenchmarkSample. Every sample is leaked once per stats computation, and update_dialog() runs this repeatedly during a benchmark.","fix":"Wrap the item in g_autoptr(GduBenchmarkSample) or call g_object_unref(s) at the end of each loop iteration.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:161-166","code":"  161 |     for (n = 0; n < n_items; n++) {\n  162 |         GduBenchmarkSample *s = g_list_model_get_item (G_LIST_MODEL (list), n);\n  163 | d straight into g_strdup_printf(\"%s/s\", ...) and never freed, leaking on every call for non-atime stats.","fix":"Store the g_format_size() result in a temporary g_autofree gchar* (or g_autoptr) and use that in the format string so it is freed.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:695-696","code":"  695 |     s = is_atime ? g_strdup_printf (\"%.2f msec\", stat * 1000.0)\n  696 |                  : g_strdup_printf (\"%s/s\", g_format_size ((guint64) stat));","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L695-696"}]},{"id":"MEM_9","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"GduBenchmarkDialog takes references on self->object and self->parent_window (and owns self->settings, self->cancellable, self->benchmark_cancellable) but the finalize handler only removes the update timeout. The object, parent_window, settings and cancellables are never released, leaking on every dialog close.","fix":"In gdu_benchmark_dialog_finalize() add g_clear_object() for object, parent_window, settings, cancellable and benchmark_cancellable.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:1226-1234","code":" 1226 | static void\n 1227 | gdu_benchmark_dialog_finalize (GObject *object)\n 1228 | {\n 1229 |     GduBenchmarkDialog *self = GDU_BENCHMARK_DIALOG (object);\n 1230 | \n 1231 |     g_clear_handle_id (&self->benchmark_update_timeout_id, g_source_remove);\n 1232 | \n 1233 |     G_OBJECT_CLASS (gdu_benchmark_dialog_parent_class)->finalize (object);\n 1234 | }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L1226-1234"},{"ref":"src/disks/gdu-benchmark-dialog.c:1274-1276","code":" 1274 |     self->settings = g_settings_new (\"org.gnome.Disks.benchmark\");\n 1275 |     self->benchmark_cancellable = g_cancellable_new   GduBlockRow *self = GDU_BLOCK_ROW (widget);\n  548 |     ConfirmationDialogData *data;\n  549 | \n  550 |     data = g_new0 (ConfirmationDialogData, 1);\n  551 |     data->message = _(\"Confirm Check?\");\n  552 |     data->description = _(\"The check may take a long time, especially if the partition contains a lot of data.\");\n  553 |     data->response_verb = _(\"Check\");\n  554 |     data->response_appearance = ADW_RESPONSE_SUGGESTED;\n  555 |     data->callback = on_check_message_dialog_response;\n  556 |     data->user_data = self;\n  557 | \n  558 |     gdu_utils_show_confirmation (block_row_get_window (self), data, NULL);\n  559 | }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L544-559"},{"ref":"src/disks/gdu-block-row.c:642-660","code":"  642 | static void\n  643 | repair_fs_cb (GtkWidget *widget, const gchar *action_name, GVariant *parameter)\n  644 | {\n  645 |     GduBlockRow *self = GDU_BLOCK_ROW (widget);\n  646 |     ConfirmationDialogData *data;\n  647 | \n  648 |     data = g_new0 (ConfirmationDialogData, 1);\n  649 |     data->message = _(\"Repair Filesystem?\");\n  650 |     data->description = _(\"A filesystem repair is not always possible and can \"\n  651 |                         \"cause data loss. Consider backing it up first in order \"\n  652 |                         \"to use forensic recovery tools that retrieve lost files. \"\n  653 |                         \"The operation may take a long time, especially if the partition contains a lot of data.\");\n  654 |     data->response_verb = _(\"Repair\");\n  655 |     data->response_appearance = ADW_RESPONSE_DESTRUCTIVE;\n  656 |     data->callback = on_repair_message_dialog_response;\n  657 |     data->user_data = self;\n  658 | \n  659 |     gdu_utils_show_confirmation (block_row_get_window (self), data, NULL);\n  660 | }","lines":19,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L642-660"}]},{"id":"MEM_12","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"self->drive is acquired via udisks_client_get_drive_for_block() (returns a new ref) and stored on the struct, but it is never released. The finalize() only clears update_id/completion_id and does not unref drive, block, object, output_file, directory, estimator, cancellable, or client. Multiple GObject refs and allocations leak each time the dialog is shown.","fix":"In gdu_create_disk_image_dialog_finalize, g_clear_object the drive, block, object, output_file, directory, cancellable; clear the estimator and mutex; and free copy_error if set.","locations":[{"ref":"src/disks/gdu-create-disk-image-dialog.c:862-870","code":"  862 | gdu_create_disk_image_dialog_finalize (GObject *object)\n  863 | {\n  864 |     GduCreateDiskImageDialog *self = GDU_CREATE_DISK_IMAGE_DIALOG (object);\n  865 | \n  866 |     g_clear_handle_id (&self->update_id, g_source_remove);\n  867 |     g_clear_handle_id (&self->completion_id, g_source_remove);\n  868 | \n  869 |     G_OBJECT_CLASS (gdu_create_disk_image_dialog_parent_class)->finalize (object);\n  870 | }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-disk-image-dialog.c#L862-870"},{"ref":"src/disks/gdu-create-disk-image-dialog.c:909-913","code":"  909 |     self->client = client;\n  910 |     self->object = g_object_ref (object);\n  911 |     self->block = udisks_object_get_block (object);\n  912 |     g_assert (self->block != NULL);\n  913 |     self->drive = udisks_client_get_drive_for_block (client, self->block);","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-disk-image-dialog.c#L909-913"}]},{"id":"MEM_13","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"gdu_disk_settings_dialog_show stores data->drive and data->ata via udisks_object_peek_drive / udisks_object_peek_drive_ata (peek = borrowed, no ref) which is fine, but data->cancellable is allocated nowhere yet declared, and more importantly dialog_data_unref does not handle data->cancellable (never created here so ok). The real leak: data->client is borrowed (ok), but nothing unrefs the GtkBuilder-created widgets - those are owned by the builder which is cleared, ok. Net: structure is mostly fine, but data->cancellable field is dead (declared, never used).","fix":"Remove the unused cancellable field, or initialize/use and free it.","locations":[{"ref":"src/disks/gdu-disk-settings-dialog.c:30","code":"   30 |     GCancellable *cancellable;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-disk-settings-dialog.c#L30"},{"ref":"src/disks/gdu-disk-settings-dialog.c:125-150","code":"  125 | static DialogData *\n  126 | dialog_data_ref (DialogData *data)\n  127 | {\n  128 |     g_atomic_int_inc (&data->ref_count);\n  129 |     return data;\n  130 | }\n  131 | \n  132 | static void\n  133 | dialog_data_unref (DialogData *data)\n  134 | {\n  135 |     if (g_atomic_int_dec_and_test (&data->ref_count)) {\n  136 |         if (data->dialog != NULL) {\n  137 |             adw_dialog_close (ADW_DIALOG (data->dialog));\n  138 |             data->dialog = NULL;\n  139 |         }\n  140 | \n  141 |         g_clear_object (&data->object);\n  142 |         g_clear_object (&data->window);\n  143 |         g_clear_object (&data->builder);\n  144 | \n  145 |         if (data->orig_drive_configuration != NULL)\n  146 |             g_variant_unref (data->orig_drive_configuration);\n  147 | \n  148 |         g_free (data);\n  149 |     }\n  150 | }","lines":26,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-disk-settings-dialog.c#L125-150"}]},{"id":"MEM_14","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"gdu_drive_changed() does block = udisks_client_get_block_for_drive(...) which returns a NEW reference (transfer full), then takes object via g_dbus_interface_get_object(block) and stores g_object_ref(object) into partition_table via g_set_object. The block (g_autoptr UDisksBlock) is freed at scope end, fine. But self->drive is reassigned at line 276 with udisks_client_get_drive_for_block (transfer full) after a g_clear_object, which is correct; however the earlier branch at 264-271 fetches a block whose object ref is taken with an extra g_object_ref inside g_set_object — g_set_object already refs, so g_object_ref(object) passed to g_set_object double-refs and leaks one reference to the partition-table object on every drive 'changed'.","fix":"Use g_set_object (&self->partition_table, object); without the extra g_object_ref().","locations":[{"ref":"src/disks/gdu-drive.c:264-271","code":"  264 |     if (self->drive) {\n  265 |         g_autoptr(UDisksBlock) block = NULL;\n  266 |         UDisksObject *object;\n  267 | \n  268 |         block = udisks_client_get_block_for_drive (self->client, self->drive, false);\n  269 |         object = (gpointer) g_dbus_interface_get_object ((gpointer) block);\n  270 |         g_set_object (&self->partition_table, g_object_ref (object));\n  271 |     }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L264-271"}]},{"id":"MEM_15","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"gdu_drive_set_child() likewise stores partition_table via 'g_set_object (&self->partition_table, udisk_object)'. Elsewhere (gdu_drive_changed) an extra ref pattern is used; the inconsistency aside, note gdu_drive_finalize() frees self->table (line 312) and self->partition_table is NEVER freed in finalize. self->partition_table holds a strong reference (set via g_set_object) that is leaked when the drive is finalized, and dispose only clears the 'gdu-drive' data, not partition_table.","fix":"Add g_clear_object (&self->partition_table); to gdu_drive_finalize(). (And note self->table appears unused — it is freed but never assigned a real value.)","locations":[{"ref":"src/disks/gdu-drive.c:299-316","code":"  299 | static void\n  300 | gdu_drive_finalize (GObject *object)\n  301 | {\n  302 |     GduDrive *self = (GduDrive *) object;\n  303 | \n  304 |     g_list_store_remove_all (self->partitions);\n  305 |     g_clear_object (&self->partitions);\n  306 | \n  307 |     g_clear_object (&self->client);\n  308 |     g_clear_object (&self->object);\n  309 |     g_clear_object (&self->info);\n  310 |     g_clear_object (&self->block);\n  311 |     g_clear_object (&self->drive);\n  312 |     g_clear_object (&self->table);\n  313 |     g_clear_object (&self->file_system);\n  314 | \n  315 |     G_OBJECT_CLASS (gdu_drive_parent_class)->finalize (object);\n  316 | }","lines":18,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L299-316"},{"ref":"src/disks/gdu-drive.c:601","code":"  601 |     g_set_object (&self->partition_table, udisk_object);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L601"}]},{"id":"MEM_16","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"gdu_encryption_options_dialog_get_new_crypttab declares 'g_autofree char *s;' uninitialized. If the first g_strdup_printf at line 72 were ever skipped the autofree would free garbage, but more concretely: 's' is g_strdup_printf'd at line 72, used, then g_free(s) at line 78, then reassigned at line 80/82 and used. The manual g_free at line 78 combined with g_autofree on the same variable means s is freed twice at scope exit if the function returned between 72 and the reassignment? It does not return there, so the immediate risk is the uninitialized declaration; if any future early-return is added before line 80, g_autofree frees an already-freed pointer (double free).","fix":"Initialize 's' to NULL at declaration. Prefer g_clear_pointer/g_steal_pointer patterns or drop the manual g_free at line 78 and rely on reassignment, to avoid mixing manual free with g_autofree.","locations":[{"ref":"src/disks/gdu-encryption-options-dialog.c:58","code":"   58 |     g_autofree char *s;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-encryption-options-dialog.c#L58"},{"ref":"src/disks/gdu-encryption-options-dialog.c:72-82","code":"   72 |     s = g_strdup_printf (\"UUID=%s\", udisks_block_get_id_uuid (self->udisks_block));\n   73 |     g_variant_builder_add (&builder, \"{sv}\", \"device\", g_variant_new_bytestring (s));\n   74 | \n   75 |     g_variant_builder_add (&builder, \"{sv}\", \"name\", g_variant_new_bytestring (name));\n   76 |     g_variant_builder_add (&builder, \"{sv}\", \"options\", g_variant_new_bytestring (options));\n   77 | \n   78 |     g_free (s);\n   79 |     if (strlen (passphrase) > 0)\n   80 |         s = old_passphrase_path ? g_strdup (old_passphrase_path) : g_strdup_printf (\"/etc/luks-keys/%s\", name);\n   81 |     else\n   82 |         s = g_strdup (\"\");","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-encryption-options-dialog.c#L72-82"}]},{"id":"MEM_17","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"gdu_format_disk_dialog never takes/holds a ref preventing leaks, but more concretely udisks_client_get_drive_for_block (line 359) returns a new ref stored in udisks_drive and is properly cleared in finalize; however s
