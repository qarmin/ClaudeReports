re_append (GDU_BENCHMARK_GRAPH (self->benchmark_graph)->atime_samples, sample);\n 1015 |                 G_UNLOCK (benchmark_lock);\n 1016 |             }\n 1017 |             prev_offset = sample_offset;\n 1018 |         }","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L1009-1018"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gdu_block_row_update_depth_label() never hides the depth label when depth == 0. Because rows/widgets may be reused and the label defaults hidden, this is usually fine, but if a block's depth transitions from >0 to 0 on a 'changed' update, the previously-shown depth string (┗━━╸) remains visible and stale.","fix":"Add an else branch that sets gtk_widget_set_visible(self->partition_depth_label, FALSE) when depth == 0.","locations":[{"ref":"src/disks/gdu-block-row.c:170-193","code":"  170 | static void\n  171 | gdu_block_row_update_depth_label (GduBlockRow *self)\n  172 | {\n  173 |     GduItem *parent;\n  174 |     gint depth = 0;\n  175 | \n  176 |     parent = gdu_item_get_parent (GDU_ITEM (self->block));\n  177 |     while ((parent = gdu_item_get_parent (parent)) != NULL) {\n  178 |         depth++;\n  179 |     }\n  180 | \n  181 |     if (depth > 0) {\n  182 |         g_autoptr(GString) depth_str = NULL;\n  183 | \n  184 |         depth_str = g_string_new (\"┗\");\n  185 | \n  186 |         while (--depth)\n  187 |             g_string_append_len (depth_str, \"━\", strlen (\"━\"));\n  188 | \n  189 |         g_string_append_len (depth_str, \"╸\", strlen (\"╸\"));\n  190 |         gtk_label_set_label (GTK_LABEL (self->partition_depth_label), depth_str->str);\n  191 |         gtk_widget_set_visible (self->partition_depth_label, TRUE);\n  192 |     }\n  193 | }","lines":24,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L170-193"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"update_password_strength enables/disables the confirm_password_entry based on strength only when verify is empty (strlen(verify)==0). If the user types a confirm password while the main password is weak (strength_level 0), the confirm entry stays sensitive but the main entry is flagged error; once they clear the confirm field it becomes disabled again. The interaction between on_password_changed (which unconditionally adds the 'error' css at line 171 then maybe removes it) and update_password_strength toggling sensitivity is convoluted and can leave the confirm entry in an inconsistent enabled/disabled state.","fix":"Drive confirm-entry sensitivity from a single computed predicate (password non-empty and strength>0) rather than only when verify is empty, and avoid unconditionally adding the error class then conditionally removing it.","locations":[{"ref":"src/disks/gdu-create-password-page.c:149-159","code":"  149 |     if (strength_level > 0) {\n  150 |         gtk_widget_remove_css_class (self->password_entry, \"error\");\n  151 |     } else {\n  152 |         gtk_widget_add_css_class (self->password_entry, \"error\");\n  153 |     }\n  154 | \n  155 |     verify = gtk_editable_get_text (GTK_EDITABLE (self->confirm_password_entry));\n  156 |     if (strlen (verify) == 0) {\n  157 |         gtk_widget_set_sensitive (self->confirm_password_entry, strength_level > 0);\n  158 |     }\n  159 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-password-page.c#L149-159"},{"ref":"src/disks/gdu-create-password-page.c:171","code":"  171 |     gtk_widget_add_css_class (self->password_entry, \"error\");","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-password-page.c#L171"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gdu_drive_view_set_mobile() emits g_object_notify only inside the 'if (self->mobile != mobile)' block, but then sets the header layout name UNCONDITIONALLY afterward. On the first call where mobile is already the default FALSE and is set to FALSE, the notify is skipped (correct) but the layout is still applied (harmless). However if set_mobile is called with an unchanged value, it redundantly re-applies the layout each time; more importantly the property and the visual state can diverge if set_layout_name fails, since the property is the source of truth but layout is set as a side effect outside the change guard.","fix":"Apply the layout inside the change guard, or derive layout purely from the property value to keep them in sync.","locations":[{"ref":"src/disks/gdu-drive-view.c:451-463","code":"  451 | static void\n  452 | gdu_drive_view_set_mobile (GduDriveView *self, gboolean mobile)\n  453 | {\n  454 |     if (self->mobile != mobile) {\n  455 |         self->mobile = mobile;\n  456 |         g_object_notify_by_pspec (G_OBJECT (self), properties[PROP_MOBILE]);\n  457 |     }\n  458 | \n  459 |     if (self->mobile)\n  460 |         gdu_drive_header_set_layout_name (self->drive_header, \"vertical\");\n  461 |     else\n  462 |         gdu_drive_header_set_layout_name (self->drive_header, \"horizontal\");\n  463 | }","lines":13,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive-view.c#L451-463"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gdu_drive_get_features() recomputes a local 'drive' from udisks_block_get_drive(block) at lines 228-234 and uses it for the media-change-detected test, but the earlier ATA/SMART/eject/poweroff logic used self->drive. If self->drive and the block's drive differ (or self->drive is NULL while the block resolves a drive), the two halves of the feature computation use inconsistent drive objects.","fix":"Resolve the drive object once at the top and use it consistently.","locations":[{"ref":"src/disks/gdu-drive.c:194-237","code":"  194 |     if (self->drive) {\n  195 |         if (udisks_drive_get_ejectable (self->drive) && udisks_drive_get_media_removable (self->drive))\n  196 |             features |= GDU_FEATURE_EJECT;\n  197 | \n  198 |         if (udisks_drive_get_can_power_off (self->drive))\n  199 |             features |= GDU_FEATURE_POWEROFF;\n  200 |     }\n  201 | \n  202 |     if (self->loop) {\n  203 |         features |= GDU_FEATURE_DETACH;\n  204 |     }\n  205 | \n  206 |     block = self->block;\n  207 |     drive = self->drive;\n  208 |     object = self->object;\n  209 | \n  210 |     if (udisks_object_peek_drive_ata (object) && !udisks_drive_get_media_removable (drive)) {\n  211 |         g_autofree char *s = NULL;\n  212 |         UDisksDriveAta *ata;\n  213 |         gboolean smart_is_supported;\n  214 | \n  215 |         ata = udisks_object_peek_drive_ata (object);\n  216 |         s = gdu_ata_smart_get_one_liner_assessment (ata, &smart_is_supported, NULL /* out_warning */);\n  217 |         if (smart_is_supported)\n  218 |             features |= GDU_FEATURE_SMART;\n  219 |     }\n  220 | \n  221 |     if (gdu_disk_settings_dialog_should_show (object))\n  222 |         features |= GDU_FEATURE_SETTINGS;\n  223 | \n  224 |     if (block == NULL)\n  225 |         return features;\n  226 | \n  227 |     read_only = udisks_block_get_read_only (block);\n  228 |     drive_object = (UDisksObject *) g_dbus_object_manager_get_object (udisks_client_get_object_manager (self->client),\n  229 |                                                                       udisks_block_get_drive (block));\n  230 | \n  231 |     if (drive_object != NULL) {\n  232 |         drive = udisks_object_peek_drive (drive_object);\n  233 |         g_object_unref (drive_object);\n  234 |     }\n  235 | \n  236 |     /* TODO: don't show on CD-ROM drives etc. */\n  237 |     if (udisks_block_get_size (block) > 0 || (drive != NULL && !udisks_drive_get_media_change_detected (drive))) {","lines":44,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L194-237"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gdu_drive_get_model() builds self->model lazily and caches it in the GString, but the cache is never invalidated on 'changed'. If the drive's vendor/model/revision change (e.g. media swap on a card reader, or a loop device backing-file change), gdu_drive_get_model keeps returning the stale first-computed string because it short-circuits on self->model->len != 0.","fix":"Clear self->model (g_string_set_size(self->model, 0)) in gdu_drive_changed so it is recomputed.","locations":[{"ref":"src/disks/gdu-drive.c:458-485","code":"  458 | const gchar *\n  459 | gdu_drive_get_model (GduDrive *self)\n  460 | {\n  461 |     g_return_val_if_fail (GDU_IS_DRIVE (self), NULL);\n  462 | \n  463 |     if (self->model->len)\n  464 |         return self->model->str;\n  465 | \n  466 |     if (!self->model->len && self->drive) {\n  467 |         const gchar *vendor, *model, *revision;\n  468 | \n  469 |         vendor = udisks_drive_get_vendor (self->drive);\n  470 |         model = udisks_drive_get_model (self->drive);\n  471 |         revision = udisks_drive_get_revision (self->drive);\n  472 | \n  473 |         if (!vendor || !*vendor)\n  474 |             g_string_append (self->model, model);\n  475 |         else if (!model || !*model)\n  476 |             g_string_append (self->model, vendor);\n  477 |         else\n  478 |             g_string_append_printf (self->model, \"%s %s\", vendor, model);\n  479 |         if (revision && *revision)\n  480 |             g_string_append_printf (self->model, \" (%s)\", revision);\n  481 |     } else if (!self->model->len)\n  482 |         g_string_append (self->model, \"Loop Device\");\n  483 | \n  484 |     return self->model->str;\n  485 | }","lines":28,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L458-485"}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"block_get_parent() returns the first partition whose [offset_start, offset_end] fully contains the block range. Because partitions are iterated in list order (which includes already-added free-space blocks and the whole-disk block), a block exactly matching the whole disk could pick the whole-disk pseudo-block as its own parent, or an extended partition and a logical partition with identical bounds could mis-nest. The containment test uses '>=' and '<=' so a zero-size or coincident-boundary block matches multiple candidates and the FIRST wins, which depends on insertion order rather than nesting depth.","fix":"Select the SMALLEST containing partition (deepest nesting) rather than the first, and exclude self / equal-bounds free-space pseudo-blocks from candidacy.","locations":[{"ref":"src/disks/gdu-drive.c:546-575","code":"  546 | static GduItem *\n  547 | block_get_parent (GduDrive *self, guint64 block_begin_offset, guint64 block_end_offset)\n  548 | {\n  549 |     GListModel *partitions;\n  550 |     guint64 n_items;\n  551 | \n  552 |     g_assert (GDU_IS_DRIVE (self));\n  553 | \n  554 |     partitions = G_LIST_MODEL (self->partitions);\n  555 |     n_items = g_list_model_get_n_items (partitions);\n  556 | \n  557 |     /*\n  558 |      * Iterate over all preceding partitions and if their offsets overlap,\n  559 |      * consider the partition as parent.\n  560 |      */\n  561 |     for (guint i = 0; i < n_items; i++) {\n  562 |         g_autoptr(GduItem) partition = NULL;\n  563 |         guint64 offset_start, offset_end;\n  564 | \n  565 |         partition = g_list_model_get_item (partitions, i);\n  566 |         offset_start = gdu_block_get_offset (GDU_BLOCK (partition));\n  567 |         offset_end = offset_start + gdu_item_get_size (GDU_ITEM (partition));\n  568 | \n  569 |         if (block_begin_offset >= offset_start && block_end_offset <= offset_end)\n  570 |             return partition;\n  571 |     }\n  572 | \n  573 |     /* We found no overlapping offsets, return the drive as the parent */\n  574 |     return GDU_ITEM (self);\n  575 | }","lines":30,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L546-575"}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"should_show_log_for_level returns TRUE for G_LOG_LEVEL_INFO and G_LOG_LEVEL_MESSAGE unconditionally, ignoring verbosity_level entirely. INFO messages are therefore always shown even at verbosity 0, contradicting the verbosity-gated design of the surrounding function and the DEBUG/TRACE handling just above.","fix":"Gate INFO behind a verbosity threshold consistent with the rest of the scheme (or document that INFO is intentionally always shown).","locations":[{"ref":"src/disks/gdu-log.c:59-78","code":"   59 | static gboolean\n   60 | should_show_log_for_level (GLogLevelFlags log_level, gint verbosity_level)\n   61 | {\n   62 |     if (verbosity_level >= 3)\n   63 |         return TRUE;\n   64 | \n   65 |     if (log_level & GDU_LOG_LEVEL_TRACE)\n   66 |         return verbosity_level >= 2;\n   67 | \n   68 |     if (log_level & G_LOG_LEVEL_DEBUG)\n   69 |         return verbosity_level >= 1;\n   70 | \n   71 |     if (log_level & G_LOG_LEVEL_INFO)\n   72 |         return TRUE;\n   73 | \n   74 |     if (log_level & G_LOG_LEVEL_MESSAGE)\n   75 |         return TRUE;\n   76 | \n   77 |     return FALSE;\n   78 | }","lines":20,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-log.c#L59-78"}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"matches_domain uses g_str_has_prefix(domain, domain_list[i]) so a configured domain of e.g. 'gdu' matches 'gdu-window' but also 'gduxyz', and an empty-ish entry from a trailing comma in G_MESSAGES_DEBUG ('a,') produces an empty string element; g_str_has_prefix(domain, \"\") is always TRUE, so a trailing comma makes every domain match. Splitting on ',' with -1 keeps empty tokens.","fix":"Skip empty tokens (continue when *domain_list[i] == '\\0'), and consider exact match or prefix-with-boundary instead of raw prefix.","locations":[{"ref":"src/disks/gdu-log.c:80-96","code":"   80 | static gboolean\n   81 | matches_domain (const gchar *log_domains, const gchar *domain)\n   82 | {\n   83 |     g_auto(GStrv) domain_list = NULL;\n   84 | \n   85 |     if (!log_domains || !*log_domains || !domain || !*domain)\n   86 |         return FALSE;\n   87 | \n   88 |     domain_list = g_strsplit (log_domains, \",\", -1);\n   89 | \n   90 |     for (guint i = 0; domain_list[i]; i++) {\n   91 |         if (g_str_has_prefix (domain, domain_list[i]))\n   92 |             return TRUE;\n   93 |     }\n   94 | \n   95 |     return FALSE;\n   96 | }","lines":17,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-log.c#L80-96"}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gdu_log_write formats sub-second precision as (now % G_USEC_PER_SEC) / 100 printed with %04d, intending centi/deci precision. now % G_USEC_PER_SEC yields 0..999999; dividing by 100 yields 0..9999, which fits %04d, but the label/comment intent of '.%04d' implies fractional seconds where the value is really hundredths-of-millisecond units (0-9999), an unusual and misleading time format.","fix":"Divide by 1000 for milliseconds and print with %03d, or document the chosen sub-second unit.","locations":[{"ref":"src/disks/gdu-log.c:243","code":"  243 |         g_string_append_printf (log_str, \"%s.%04d \", buffer, (int) ((now % G_USEC_PER_SEC) / 100));","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-log.c#L243"}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"fstab_on_device_combo_row_changed proposes a mount point /mnt/<basename>. When fsname is of the form UUID=xxxx or LABEL=xxxx, strrchr('/') returns NULL and it falls back to strrchr('=') giving the value after '='; for a raw /dev/sda1 path it gives 'sda1'. But if fsname has neither '/' nor '=', s defaults to \"/disk\" and then s+1 = \"disk\", yielding /mnt/disk - fine. Edge: a device path ending in '/' would make s+1 point at an empty string giving /mnt/. Minor.","fix":"Handle the trailing-slash / empty-basename case explicitly.","locations":[{"ref":"src/disks/gdu-mount-options-dialog.c:433-441","code":"  433 |         fsname = gtk_string_object_get_string (fsname_obj);\n  434 |         s = strrchr (fsname, '/');\n  435 |         if (s == NULL)\n  436 |             s = strrchr (fsname, '=');\n  437 |         if (s == NULL)\n  438 |             s = \"/disk\";\n  439 |         proposed_mount_point = g_strdup_printf (\"/mnt/%s\", s + 1);\n  440 | \n  441 |         gtk_editable_set_text (GTK_EDITABLE (self->mount_point_row), proposed_mount_point);","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-mount-options-dialog.c#L433-441"}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"unlock_dialog_update_unlock_button_cb parses the PIM with strtoul into self->pim (a gulong) and rejects pim > G_MAXUINT32, but the value is only re-validated here on entry changes. If the PIM entry is not visible, the else branch at line 84 does not reset self->pim to 0, so a previously-entered PIM from a now-hidden row could still be sent in do_unlock. Minor, since visibility does not toggle after construction, but the stale-state coupling is a latent bug.","fix":"Reset self->pim = 0 in the else branch when the PIM row is not visible / empty.","locations":[{"ref":"src/disks/gdu-unlock-dialog.c:71-86","code":"   71 |     pim_str = gtk_editable_get_text (GTK_EDITABLE (self->pim_entry_row));\n   72 |     if (gtk_widget_is_visible (GTK_WIDGET (self->pim_entry_row)) && pim_str && *pim_str) {\n   73 |         gchar *end;\n   74 | \n   75 |         errno = 0;\n   76 |         self->pim = strtoul (pim_str, &end, 10);\n   77 |         if (*end || errno || self->pim == 0 || self->pim > G_MAXUINT32) {\n   78 |             gtk_widget_add_css_class (GTK_WIDGET (self->pim_entry_row), \"error\");\n   79 |             self->pim = 0;\n   80 |             can_unlock = FALSE;\n   81 |         } else {\n   82 |             gtk_widget_remove_css_class (GTK_WIDGET (self->pim_entry_row), \"error\");\n   83 |         }\n   84 |     } else {\n   85 |         gtk_widget_remove_css_class (GTK_WIDGET (self->pim_entry_row), \"error\");\n   86 |     }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-unlock-dialog.c#L71-86"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gdu_window_load_state is called from gdu_window_init BEFORE gtk_widget_init_template. Setting the default size before the template/children exist is generally fine for window size, but reading gdu_window_state (a brand-new GSettings) and applying maximize before the window is realized relies on ordering that is easy to break; more notably load_state runs in init while unmap saves state, and there is no symmetric place — if init order changes, size restore silently stops working.","fix":"Apply saved size after template init / on map, and keep load/save symmetric and documented.","locations":[{"ref":"src/disks/gdu-window.c:170-177","code":"  170 | static void\n  171 | gdu_window_init (GduWindow *self)\n  172 | {\n  173 |     gdu_window_state = g_settings_new (\"org.gnome.Disks.window-state\");\n  174 | \n  175 |     gdu_window_load_state (self);\n  176 |     gtk_widget_init_template (GTK_WIDGET (self));\n  177 | }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-window.c#L170-177"}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"display_size_warning's warning/error precedence can hide the oversize error. The else-if chain checks `block_left_over_size > 1MB` (image smaller than device) before checking `size > block_size` (image bigger). block_left_over_size = block_size - size, so when the image is bigger this is negative and the warning branch is skipped, reaching the bigger-than branch correctly. But the size==0 case sets restore_error then the chain stops (good). The subtle issue: when block_size is unknown (0, from unwrap_or_default in set_destination_object), block_left_over_size = -size, never >1MB, and size>0 path falsely reports the image is bigger than the (zero) device, blocking restore even though size is genuinely unknown.","fix":"Special-case unknown/zero block_size (don't show a 'bigger than target' error when the target size is unknown), matching the TODO at line 185.","locations":[{"ref":"src/disks/restore_disk_image_dialog.rs:244-258","code":"  244 |         let block_left_over_size = imp.block_size.get() as i64 - size as i64;\n  245 |         if size == 0 {\n  246 |             restore_error = Some(gettext(\"Cannot restore image of size 0\"));\n  247 |         } else if block_left_over_size > 1000 * 1000 {\n  248 |             // Only complain if slack is bigger than 1MB\n  249 |             restore_warning = Some(gettext_f(\n  250 |                 \"The disk image is {} smaller than the target device\",\n  251 |                 [client.size_for_display(block_left_over_size.unsigned_abs(), false, false)],\n  252 |             ));\n  253 |         } else if size > imp.block_size.get() {\n  254 |             restore_error = Some(gettext_f(\n  255 |                 \"The disk image is {} bigger than the target device\",\n  256 |                 [client.size_for_display(size - imp.block_size.get(), false, false)],\n  257 |             ));\n  258 |         }","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/restore_disk_image_dialog.rs#L244-258"},{"ref":"src/disks/restore_disk_image_dialog.rs:185-187","code":"  185 |         //TODO: use a method call for this so it works on e.g. floppy drives where e.g. we don't know the size\n  186 |         imp.block_size.set(block.size().await.unwrap_or_default());\n  187 |         imp.block.replace(Some(block));","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/restore_disk_image_dialog.rs#L185-187"}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gdu_utils_format_duration_usec assigns floating-point USEC_PER_YEAR/MONTH (defined with 365.25 and /12.0) into guint64 arithmetic via 't -= years * USEC_PER_YEAR'. years is guint64 and USEC_PER_YEAR is a double, so years*USEC_PER_YEAR is double and the subtraction from guint64 't' is done in double then truncated back, accumulating rounding error across the chain and potentially yielding off-by-one seconds/ms for large durations.","fix":"Use integer constants for the per-unit microsecond counts (accepting that month/year are approximations) or carry the remainder in double consistently rather than mixing guint64 and double subtraction.","locations":[{"ref":"src/libgdu/gduutils.c:354-401","code":"  354 | #define USEC_PER_YEAR (G_USEC_PER_SEC * 60LL * 60 * 24 * 365.25)\n  355 | #define USEC_PER_MONTH (G_USEC_PER_SEC * 60LL * 60 * 24 * 365.25 / 12.0)\n  356 | #define USEC_PER_DAY (G_USEC_PER_SEC * 60LL * 60 * 24)\n  357 | #define USEC_PER_HOUR (G_USEC_PER_SEC * 60LL * 60)\n  358 | #define USEC_PER_MINUTE (G_USEC_PER_SEC * 60LL)\n  359 | #define MSEC_PER_USEC (1000LL)\n  360 | \n  361 | gchar *\n  362 | gdu_utils_format_duration_usec (guint64 usec, GduFormatDurationFlags flags)\n  363 | {\n  364 |     gchar *ret;\n  365 |     guint64 years = 0;\n  366 |     guint64 months = 0;\n  367 |     guint64 days = 0;\n  368 |     guint64 hours = 0;\n  369 |     guint64 minutes = 0;\n  370 |     guint64 seconds = 0;\n  371 |     guint64 milliseconds = 0;\n  372 |     gchar *years_str = NULL;\n  373 |     gchar *months_str = NULL;\n  374 |     gchar *days_str = NULL;\n  375 |     gchar *hours_str = NULL;\n  376 |     gchar *minutes_str = NULL;\n  377 |     gchar *seconds_str = NULL;\n  378 |     gchar *milliseconds_str = NULL;\n  379 |     guint64 t;\n  380 | \n  381 |     t = usec;\n  382 | \n  383 |     years = floor (t / USEC_PER_YEAR);\n  384 |     t -= years * USEC_PER_YEAR;\n  385 | \n  386 |     months = floor (t / USEC_PER_MONTH);\n  387 |     t -= months * USEC_PER_MONTH;\n  388 | \n  389 |     days = floor (t / USEC_PER_DAY);\n  390 |     t -= days * USEC_PER_DAY;\n  391 | \n  392 |     hours = floor (t / USEC_PER_HOUR);\n  393 |     t -= hours * USEC_PER_HOUR;\n  394 | \n  395 |     minutes = floor (t / USEC_PER_MINUTE);\n  396 |     t -= minutes * USEC_PER_MINUTE;\n  397 | \n  398 |     seconds = floor (t / G_USEC_PER_SEC);\n  399 |     t -= seconds * G_USEC_PER_SEC;\n  400 | \n  401 |     milliseconds = floor (t / MSEC_PER_USEC);","lines":48,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.c#L354-401"}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gettext_f / pgettext_f replace one %s per argument with replacen(_, _, 1). If a substituted argument value itself contains the literal %s, the next argument will be inserted into that text instead of the next placeholder, producing corrupted output. User/device-supplied strings (file names, device descriptions) flow into these as args.","fix":"Replace placeholders by scanning left-to-right and substituting at placeholder positions without re-scanning already-substituted text, or use a real formatting library / positional specifiers.","locations":[{"ref":"src/libgdu/gettext.rs:39-44","code":"   39 | fn arg_replace(mut s: String, args: impl IntoIterator<Item = impl AsRef<str>>) -> String {\n   40 |     for arg in args {\n   41 |         s = s.replacen(\"%s\", arg.as_ref(), 1);\n   42 |     }\n   43 |     s\n   44 | }","lines":6,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gettext.rs#L39-44"}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"diff_sorted_lists treats order<0 as 'removed' (item only in list1) and order>0 as 'added' (item only in list2). The names suggest list1 is old and list2 is new, which matches the caller (*problem_list vs want). This is correct, but ptr_compare orders by raw pointer address; identity of UDisksObject across update() calls relies on the object manager returning the same GObject pointers. If udisks ever returns fresh proxy objects, every object would appear removed+added and notifications would flicker. Fragile coupling worth noting.","fix":"Compare by stable identity (object path via g_dbus_object_get_object_path) rather than raw pointer to be robust against proxy re-creation.","locations":[{"ref":"src/notify/gdusdmonitor.c:100-128","code":"  100 | diff_sorted_lists (GList *list1, GList *list2, GCompareFunc compare, GList **added, GList **removed)\n  101 | {\n  102 |     gint order;\n  103 | \n  104 |     *added = *removed = NULL;\n  105 | \n  106 |     while (list1 != NULL && list2 != NULL) {\n  107 |         order = (*compare) (list1->data, list2->data);\n  108 |         if (order < 0) {\n  109 |             *removed = g_list_prepend (*removed, list1->data);\n  110 |             list1 = list1->next;\n  111 |         } else if (order > 0) {\n  112 |             *added = g_list_prepend (*added, list2->data);\n  113 |             list2 = list2->next;\n  114 |         } else { /* same item */\n  115 |             list1 = list1->next;\n  116 |             list2 = list2->next;\n  117 |         }\n  118 |     }\n  119 | \n  120 |     while (list1 != NULL) {\n  121 |         *removed = g_list_prepend (*removed, list1->data);\n  122 |         list1 = list1->next;\n  123 |     }\n  124 |     while (list2 != NULL) {\n  125 |         *added = g_list_prepend (*added, list2->data);\n  126 |         list2 = list2->next;\n  127 |     }\n  128 | }","lines":29,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/notify/gdusdmonitor.c#L100-128"},{"ref":"src/notify/gdusdmonitor.c:161-163","code":"  161 |     want = g_list_sort (want, ptr_compare);\n  162 |     *problem_list = g_list_sort (*problem_list, ptr_compare);\n  163 |     diff_sorted_lists (*problem_list, want, ptr_compare, &added, &removed);","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/notify/gdusdmonitor.c#L161-163"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The write-cache block in compute_configuration is preceded by a comment '/* AAM */' (line 208) - a copy-paste leftover from the AAM block above. Misleading comment.","fix":"Change the comment to '/* Write Cache */'.","locations":[{"ref":"src/disks/gdu-disk-settings-dialog.c:208-216","code":"  208 |     /* AAM */\n  209 |     if (gtk_switch_get_active (GTK_SWITCH (data->write_cache_switch))) {\n  210 |         if (udisks_drive_ata_get_write_cache_supported (data->ata)) {\n  211 |             gboolean enabled = FALSE;\n  212 |             if (gtk_combo_box_get_active (GTK_COMBO_BOX (data->write_cache_comboboxtext)) == 0)\n  213 |                 enabled = TRUE;\n  214 |             g_variant_builder_add (&builder, \"{sv}\", \"ata-write-cache-enabled\", g_variant_new_boolean (enabled));\n  215 |         }\n  216 |     }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-disk-settings-dialog.c#L208-216"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"gdu_application_ensure_client assigns app->client from gdu_manager_get_client(app->disk_manager) before checking whether disk_manager creation failed. If gdu_manager_get_default returned NULL (error set), gdu_manager_get_client receives NULL and hits g_return_val_if_fail (returns NULL), and only afterwards does the code check 'if (error)'. The order also means client lookup is attempted on a NULL manager before the fatal g_error. Check error / disk_manager == NULL before calling gdu_manager_get_client.","fix":"Check 'if (error || app->disk_manager == NULL) g_error(...)' immediately after gdu_manager_get_default, before calling gdu_manager_get_client.","locations":[{"ref":"src/disks/gdu-application.c:92-101","code":"   92 | static void\n   93 | gdu_application_ensure_client (GduApplication *app)\n   94 | {\n   95 |     g_autoptr(GError) error = NULL;\n   96 | \n   97 |     app->disk_manager = gdu_manager_get_default (&error);\n   98 |     app->client = gdu_manager_get_client (app->disk_manager);\n   99 |     if (error)\n  100 |         g_error (\"Error getting udisks client: %s\", error->message);\n  101 | }","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-application.c#L92-101"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"Inverted error check: add_configuration_item only reports an error when the user DISMISSED the auth dialog, and silently swallows all real failures. The sibling functions and the analogous code in gdu-mount-options-dialog.c correctly use '!g_error_matches(...DISMISSED)' (show error unless dismissed). Here the '!' is missing, so genuine errors writing /etc/crypttab are hidden and the user thinks the operation succeeded.","fix":"Change the condition to 'if (!g_error_matches (error, UDISKS_ERROR, UDISKS_ERROR_NOT_AUTHORIZED_DISMISSED))' to match the remove branch at line 125.","locations":[{"ref":"src/disks/gdu-encryption-options-dialog.c:138-141","code":"  138 |             if (g_error_matches (error, UDISKS_ERROR, UDISKS_ERROR_NOT_AUTHORIZED_DISMISSED))\n  139 |                 gdu_utils_show_error (gdu_encryption_options_dialog_get_window (self),\n  140 |                                       _(\"Error adding /etc/crypttab entry\"), error);\n  141 |         }","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-encryption-options-dialog.c#L138-141"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"Same inverted error check as above, in the update_configuration_item branch. Real errors when updating /etc/crypttab are silently swallowed; the error dialog is only shown when the user cancelled the polkit prompt.","fix":"Change the condition to 'if (!g_error_matches (error, UDISKS_ERROR, UDISKS_ERROR_NOT_AUTHORIZED_DISMISSED))'.","locations":[{"ref":"src/disks/gdu-encryption-options-dialog.c:153-156","code":"  153 |             if (g_error_matches (error, UDISKS_ERROR, UDISKS_ERROR_NOT_AUTHORIZED_DISMISSED))\n  154 |                 gdu_utils_show_error (gdu_encryption_options_dialog_get_window (self),\n  155 |                                       _(\"Error updating /etc/crypttab entry\"), error);\n  156 |         }","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-encryption-options-dialog.c#L153-156"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"After udisks_block_call_open_for_backup_sync succeeds, g_unix_fd_list_get is called and its error checked, but fd_index is only unref'd and fd_list cleared inside the success path after the error check. On the g_unix_fd_list_get error path (goto out at line 500) fd_index (a floating/owned GVariant from the call) and fd_list are leaked. Also g_variant_get_handle is called twice on fd_index.","fix":"Free fd_index and fd_list before the goto out on the error path (or use g_autoptr/g_clear_object and g_clear_pointer).","locations":[{"ref":"src/disks/gdu-create-disk-image-dialog.c:496-505","code":"  496 |         fd = g_unix_fd_list_get (fd_list, g_variant_get_handle (fd_index), &error);\n  497 |         if (error != NULL) {\n  498 |             g_prefix_error (&error,\n  499 |                             \"Error extracing fd with handle %d from D-Bus message: \", g_variant_get_handle (fd_index));\n  500 |             goto out;\n  501 |         }\n  502 |         if (fd_index != NULL)\n  503 |             g_variant_unref (fd_index);\n  504 |         g_clear_object (&fd_list);\n  505 |     }","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-disk-image-dialog.c#L496-505"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"file_dialog_open_cb ignores the GError from gtk_file_dialog_select_folder_finish (passes NULL). A genuine error vs. user cancellation cannot be distinguished, but more importantly any error is silently swallowed. Minor compared to the new-disk-image variant which dereferences error->message unconditionally.","fix":"Pass a GError and handle/log it; ignore only G_IO_ERROR_CANCELLED / GTK_DIALOG_ERROR_DISMISSED.","locations":[{"ref":"src/disks/gdu-create-disk-image-dialog.c:783-796","code":"  783 | file_dialog_open_cb (GObject *object, GAsyncResult *res, gpointer user_data)\n  784 | {\n  785 |     GduCreateDiskImageDialog *self = GDU_CREATE_DISK_IMAGE_DIALOG (user_data);\n  786 |     g_autofree char *path = NULL;\n  787 |     GFile *directory = NULL;\n  788 |     GtkFileDialog *file_dialog = GTK_FILE_DIALOG (object);\n  789 | \n  790 |     directory = gtk_file_dialog_select_folder_finish (file_dialog, res, NULL);\n  791 |     if (directory) {\n  792 |         g_clear_object (&self->directory);\n  793 |         self->directory = directory;\n  794 |         create_disk_image_dialog_update_directory (self);\n  795 |     }\n  796 | }","lines":14,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-disk-image-dialog.c#L783-796"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"gdu_dvd_support_new() treats a disc with no VOB files (scrambled_ranges == NULL) as 'fail', running the fail path which frees support and returns NULL. A perfectly valid unscrambled DVD then cannot be read through this support object, conflating 'no decryption needed' with 'error'.","fix":"Distinguish the two cases: for an unscrambled disc, build a single unscrambled range covering the whole device and return the support object, rather than failing.","locations":[{"ref":"src/disks/gdudvdsupport.c:219-221","code":"  219 |     /* If there are no VOB files on the disc, we don't need to decrypt - just bail */\n  220 |     if (scrambled_ranges == NULL)\n  221 |         goto fail;","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdudvdsupport.c#L219-221"},{"ref":"src/disks/gdudvdsupport.c:290-293","code":"  290 | fail:\n  291 |     gdu_dvd_support_free (support);\n  292 |     support = NULL;\n  293 |     goto out;","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdudvdsupport.c#L290-293"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In gdu_estimator update(), only bytes-per-sec and usec-remaining are notified, but completed_bytes is updated in gdu_estimator_add_sample (which calls update) and a 'completed-bytes' property exists. Observers bound to 'completed-bytes' never receive a change notification. Additionally the freeze/thaw notify wrapper around only two notifies that are not interdependent provides no benefit.","fix":"Emit g_object_notify_by_pspec for PROP_COMPLETED_BYTES when completed_bytes changes (e.g. in add_sample), include it inside the freeze/thaw block, or document that completed-bytes is poll-only.","locations":[{"ref":"src/disks/gduestimator.c:122-127","code":"  122 | \n  123 |     g_object_freeze_notify (G_OBJECT (estimator));\n  124 |     g_object_notify_by_pspec (G_OBJECT (estimator), props[PROP_BYTES_PER_SEC]);\n  125 |     g_object_notify_by_pspec (G_OBJECT (estimator), props[PROP_USEC_REMAINING]);\n  126 |     g_object_thaw_notify (G_OBJECT (estimator));\n  127 | }","lines":6,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gduestimator.c#L122-127"},{"ref":"src/disks/gduestimator.c:200-211","code":"  200 |     estimator->completed_bytes = completed_bytes;\n  201 | \n  202 |     if (estimator->num_samples == MAX_SAMPLES) {\n  203 |         memmove (estimator->samples, estimator->samples + 1, sizeof (Sample) * (MAX_SAMPLES - 1));\n  204 |         estimator->num_samples -= 1;\n  205 |     }\n  206 |     sample = &estimator->samples[estimator->num_samples++];\n  207 | \n  208 |     sample->time_usec = g_get_real_time ();\n  209 |     sample->value = completed_bytes;\n  210 | \n  211 |     update (estimator);","lines":12,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gduestimator.c#L200-211"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"is_in_use considers an object in use whenever is_in_full_use returns Ok, regardless of the actual boolean result. is_in_full_use returns Ok((None, None, true)) for an object that is NOT in use, but .is_ok() is true in that case too, so is_in_use returns true for unused objects and only returns false on a D-Bus error. The function is effectively inverted/meaningless.","fix":"Inspect the tuple: return matches where filesystem or encrypted is Some, e.g. is_in_full_use(...).map(|(fs, enc, _)| fs.is_some() || enc.is_some()).unwrap_or(false).","locations":[{"ref":"src/libgdu/gduutils.rs:872-874","code":"  872 | pub async fn is_in_use(client: &udisks::Client, object: &udisks::Object) -> bool {\n  873 |     is_in_full_use(client, object, false).await.is_ok()\n  874 | }","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.rs#L872-874"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"write_image swaps the names of the channel ends, making the code confusing and fragile. async_channel::bounded returns (sender, receiver) but here it is bound as `(rx, tx)`, then rx.send(...) (rx is actually the sender) and tx.recv() (tx is actually the receiver). It works, but the inverted naming is a copy/paste-style hazard for future edits.","fix":"Bind as (tx, rx) matching (sender, receiver) so send/recv read correctly.","locations":[{"ref":"src/disk-image-mounter/window.rs:413-420","code":"  413 |         let (rx, tx) = async_channel::bounded(1);\n  414 |         dialog.connect_closed(move |_dialog| {\n  415 |             let rx = rx.clone();\n  416 |             glib::spawn_future_local(async move {\n  417 |                 let _ = rx.send(()).await;\n  418 |             });\n  419 |         });\n  420 |         tx.recv().await?;","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disk-image-mounter/window.rs#L413-420"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In update_dialog() when udisks_drive_ata_call_smart_get_attributes_sync() fails, the error is only logged with g_warning and the code continues to call update_attributes_list(data, attributes) with attributes==NULL, silently clearing the table as if there were no attributes. The user gets an empty list with no on-screen indication of the failure.","fix":"On failure, show the error in the UI (or leave previous data) rather than silently rendering an empty attribute list.","locations":[{"ref":"src/disks/gdu-ata-smart-dialog.c:1086-1107","code":" 1086 |         if (!udisks_drive_ata_call_smart_get_attributes_sync (udisks_object_peek_drive_ata (data->object),\n 1087 |                                                               g_variant_new (\"a{sv}\", NULL), /* options */\n 1088 |                                                               &attributes, NULL,             /* GCancellable */\n 1089 |                                                               &error)) {\n 1090 |             g_warning (\"Error getting ATA SMART information: %s (%s, %d)\", error->message,\n 1091 |                        g_quark_to_string (error->domain), error->code);\n 1092 |         }\n 1093 | \n 1094 |         s = calculate_self_test (data->ata, &selftest_running);\n 1095 |         gtk_label_set_text (GTK_LABEL (data->self_test_label), s);\n 1096 |         g_clear_pointer (&s, g_free);\n 1097 | \n 1098 |         if (selftest_running) {\n 1099 |             gtk_widget_set_visible (data->start_selftest_button, FALSE);\n 1100 |             gtk_widget_set_visible (data->stop_selftest_button, TRUE);\n 1101 |         } else {\n 1102 |             gtk_widget_set_visible (data->start_selftest_button, TRUE);\n 1103 |             gtk_widget_set_visible (data->stop_selftest_button, FALSE);\n 1104 |         }\n 1105 |         gtk_widget_set_visible (data->refresh_button, TRUE);\n 1106 | \n 1107 |         update_attributes_list (data, attributes);","lines":22,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-ata-smart-dialog.c#L1086-1107"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"ensure_unused_cb() passes NULL for the GError out-param of gdu_utils_ensure_unused_finish(); when ensuring-unused fails the benchmark is silently skipped with no feedback. The user clicked Start, the page switched to results, but nothing happens and no error is shown.","fix":"Capture the GError and surface it via gdu_utils_show_error(), and/or revert the stack back to the configuration page on failure.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:1116-1123","code":" 1116 | static void\n 1117 | ensure_unused_cb (GtkWindow *window, GAsyncResult *res, gpointer user_data)\n 1118 | {\n 1119 |     GduBenchmarkDialog *self = user_data;\n 1120 | \n 1121 |     if (gdu_utils_ensure_unused_finish (self->client, res, NULL))\n 1122 |         start_benchmark (self);\n 1123 | }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L1116-1123"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"mount_cb() calls udisks_object_peek_filesystem(object) and immediately passes filesystem to udisks_filesystem_call_mount without a NULL check. Similarly several action callbacks peek the filesystem/partition without verifying non-NULL. If the underlying object changed (filesystem disappeared) between feature computation and the user click, filesystem is NULL and the D-Bus call dereferences NULL.","fix":"Check 'if (filesystem == NULL) return;' (optionally show an error) before the call, here and in the analogous callbacks.","locations":[{"ref":"src/disks/gdu-block-row.c:329-341","code":"  329 | mount_cb (GtkWidget *widget, const gchar *action_name, GVariant *parameter)\n  330 | {\n  331 |     GduBlockRow *self = GDU_BLOCK_ROW (widget);\n  332 |     UDisksObject *object;\n  333 |     UDisksFilesystem *filesystem;\n  334 | \n  335 |     object = gdu_block_get_object (self->block);\n  336 |     filesystem = udisks_object_peek_filesystem (object);\n  337 | \n  338 |     udisks_filesystem_call_mount (filesystem, g_variant_new (\"a{sv}\", NULL), /* options */\n  339 |                                   NULL,                                      /* cancellable */\n  340 |                                   (GAsyncReadyCallback) mount_complete_cb, self);\n  341 | }","lines":13,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L329-341"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"unmount_cb (row) calls gdu_block_get_object(self->block) and passes object to gdu_utils_ensure_unused with NULL callbacks; the same action ('row.lock') is wired to unmount_cb in the action table (line 838), so triggering 'Lock' actually performs an unmount, not a lock. This is a copy-paste wiring bug: row.lock should invoke a lock operation, not unmount_cb.","fix":"Wire 'row.lock' to a dedicated lock callback that calls udisks_encrypted_call_lock (or the appropriate lock helper), not unmount_cb.","locations":[{"ref":"src/disks/gdu-block-row.c:837-838","code":"  837 |         { \"row.unmount\", unmount_cb },\n  838 |         { \"row.lock\", unmount_cb },","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L837-838"},{"ref":"src/disks/gdu-block-row.c:304-313","code":"  304 | static void\n  305 | unmount_cb (GtkWidget *widget, const gchar *action_name, GVariant *parameter)\n  306 | {\n  307 |     GduBlockRow *self = GDU_BLOCK_ROW (widget);\n  308 |     UDisksObject *object;\n  309 | \n  310 |     object = gdu_block_get_object (self->block);\n  311 | \n  312 |     gdu_utils_ensure_unused (block_row_get_client (), block_row_get_window (self), object, NULL, NULL, NULL);\n  313 | }","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L304-313"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"unmount_fs_cb logs error->message with g_debug after gdu_utils_ensure_unused_list_finish failed, then calls g_task_return_error(task, error). But the final g_debug at line 670 ('Unmounting fs %s', !error) runs in BOTH branches; in the success branch 'error' is NULL (fine), but in the failure branch the task and error have already been consumed/returned, so the trailing log re-reads 'error' after ownership conceptually moved to the task. error is still a valid pointer until the task frees it, so not a UAF, but the dual-purpose log line is misleading.","fix":"Move the summary g_debug into each branch, or compute the bool before returning the error.","locations":[{"ref":"src/disks/gdu-block.c:659-671","code":"  659 |     if (gdu_utils_ensure_unused_list_finish (self->client, result, &error)) {\n  660 |         udisks_filesystem_call_set_label (self->file_system, label, g_variant_new (\"a{sv}\", NULL), /* options */\n  661 |                                           NULL,                                                    /* cancellable */\n  662 |                                           change_fs_label_cb, g_steal_pointer (&task));\n  663 |     } else {\n  664 |         g_debug (\"Unmount fs error: %s\", error->message);\n  665 | \n  666 |         self->in_progress = false;\n  667 |         g_task_return_error (task, error);\n  668 |     }\n  669 | \n  670 |     g_debug (\"Unmounting fs %s\", gdu_log_bool_str (!error, true));\n  671 | }","lines":13,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block.c#L659-671"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"get_pwq calls g_error() if pwquality_read_config fails. g_error() aborts the process (it is fatal by default). A malformed system pwquality.conf would crash gnome-disk-utility entirely when the password page is first used, rather than degrading gracefully.","fix":"Use g_warning() and fall back to default settings (pwquality_default_settings already returns usable defaults), or free err and continue, instead of g_error().","locations":[{"ref":"src/disks/gdu-create-password-page.c:84-91","code":"   84 |         settings = pwquality_default_settings ();\n   85 |         if (pwquality_read_config (settings, NULL, (gpointer) &err) < 0) {\n   86 |             g_error (\"Failed to read pwquality configuration: %s\\n\", err);\n   87 |         }\n   88 |     }\n   89 | \n   90 |     return settings;\n   91 | }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-password-page.c#L84-91"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"gdu_drive_get_size() falls through to g_return_val_if_reached(0) if neither drive nor block is set, but gdu_drive_new calls gdu_item_get_size very early; for an object that is neither a drive nor a block this triggers a runtime warning. More subtly, a drive with size 0 (no media) falls through from the drive branch to the block branch and may return the block size, which for removable media without media is 0 — acceptable, but the reached-assert masks legitimate zero-size devices as programmer errors.","fix":"Return 0 normally (without g_return_val_if_reached) when size is genuinely unknown, reserving the assert for true never-happens cases.","locations":[{"ref":"src/disks/gdu-drive.c:149-166","code":"  149 | static guint64\n  150 | gdu_drive_get_size (GduItem *item)\n  151 | {\n  152 |     GduDrive *self = (GduDrive *) item;\n  153 | \n  154 |     g_assert (GDU_IS_DRIVE (self));\n  155 | \n  156 |     if (self->drive) {\n  157 |         guint64 drive_size = udisks_drive_get_size (self->drive);\n  158 |         if (drive_size)\n  159 |             return drive_size;\n  160 |     }\n  161 | \n  162 |     if (self->block)\n  163 |         return udisks_block_get_size (self->block);\n  164 | \n  165 |     g_return_val_if_reached (0);\n  166 | }","lines":18,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L149-166"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In on_done_clicked_cb, gdu_encryption_options_dialog_get_new_crypttab can return a crypttab that adds an empty 'passphrase-path'/'passphrase-contents' even when the passphrase is empty, and the add branch is only taken when crypttab_config == NULL. But more importantly the function never closes the dialog after success/failure of add/update/remove (no adw_dialog_close), unlike the change-passphrase and edit-partition dialogs. The dialog stays open after a successful Done.","fix":"Add adw_dialog_close(ADW_DIALOG(self)) on the success paths (and after handled errors) so the dialog dismisses after the action completes.","locations":[{"ref":"src/disks/gdu-encryption-options-dialog.c:110-159","code":"  110 | on_done_clicked_cb (GduEncryptionOptionsDialog *self)\n  111 | {\n  112 |     g_autoptr(GError) error = NULL;\n  113 |     g_autoptr(GVariant) old_crypttab = NULL;\n  114 |     g_autoptr(GVariant) new_crypttab = NULL;\n  115 |     gboolean use_defaults;\n  116 | \n  117 |     use_defaults = adw_switch_row_get_active (ADW_SWITCH_ROW (self->use_defaults_switch));\n  118 | \n  119 |     if (self->crypttab_config != NULL && use_defaults) {\n  120 |         if (!udisks_block_call_remove_configuration_item_sync (\n  121 |                 self->udisks_block, g_variant_new (\"(s@a{sv})\", \"crypttab\", self->crypttab_config),\n  122 |                 g_variant_new (\"a{sv}\", NULL), /* options */\n  123 |                 NULL,                          /* GCancellable */\n  124 |                 &error)) {\n  125 |             if (!g_error_matches (error, UDISKS_ERROR, UDISKS_ERROR_NOT_AUTHORIZED_DISMISSED))\n  126 |                 gdu_utils_show_error (gdu_encryption_options_dialog_get_window (self),\n  127 |                                       _(\"Error removing /etc/crypttab entry\"), error);\n  128 |         }\n  129 |         return;\n  130 |     }\n  131 | \n  132 |     new_crypttab = gdu_encryption_options_dialog_get_new_crypttab (self);\n  133 |     if (self->crypttab_config == NULL && new_crypttab != NULL) {\n  134 |         if (!udisks_block_call_add_configuration_item_sync (self->udisks_block, new_crypttab,\n  135 |                                                             g_variant_new (\"a{sv}\", NULL), /* options */\n  136 |                                                             NULL,                          /* GCancellable */\n  137 |                                                             &error)) {\n  138 |             if (g_error_matches (error, UDISKS_ERROR, UDISKS_ERROR_NOT_AUTHORIZED_DISMISSED))\n  139 |                 gdu_utils_show_error (gdu_encryption_options_dialog_get_window (self),\n  140 |                                       _(\"Error adding /etc/crypttab entry\"), error);\n  141 |         }\n  142 |         return;\n  143 |     }\n  144 | \n  145 |     if (self->crypttab_config != NULL)\n  146 |         old_crypttab = g_variant_new (\"(s@a{sv})\", \"crypttab\", self->crypttab_config);\n  147 | \n  148 |     if (old_crypttab != NULL && new_crypttab != NULL) {\n  149 |         if (!udisks_block_call_update_configuration_item_sync (self->udisks_block, old_crypttab, new_crypttab,\n  150 |                                                                g_variant_new (\"a{sv}\", NULL), /* options */\n  151 |                                                                NULL,                          /* GCancellable */\n  152 |                                                                &error)) {\n  153 |             if (g_error_matches (error, UDISKS_ERROR, UDISKS_ERROR_NOT_AUTHORIZED_DISMISSED))\n  154 |                 gdu_utils_show_error (gdu_encryption_options_dialog_get_window (self),\n  155 |                                       _(\"Error updating /etc/crypttab entry\"), error);\n  156 |         }\n  157 |         return;\n  158 |     }\n  159 | }","lines":50,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-encryption-options-dialog.c#L110-159"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"gdu_manager_open_loop_async uses strerror(errno) (not thread-safe) for the error message and passes it through %s; also it calls g_io_error_from_errno(errno) and strerror(errno) as two separate reads of errno across function-call sequence points - if g_io_error_from_errno perturbs errno the second read is stale. Minor but real.","fix":"Capture 'int saved_errno = errno;' immediately after open fails and use it for both calls; use g_strerror (thread-safe) instead of strerror.","locations":[{"ref":"src/disks/gdu-manager.c:432-434","code":"  432 |     if (fd == -1) {\n  433 |         g_task_return_new_error (task, G_IO_ERROR, g_io_error_from_errno (errno), \"%s\", strerror (errno));\n  434 |         return;","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-manager.c#L432-434"}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"loop_setup_cb (new disk image) on success calls udisks_client_settle but never closes anything or signals completion beyond adding to recent manager; on failure it shows the error but the dialog was already closed by create_new_disk (line 163 closes the dialog before the async loop setup finishes). So an attach error is shown via gdu_new_disk_image_dialog_get_window(self) which walks up from a widget that may already be removed from its window, potentially returning NULL and showing the error parented to NULL.","fix":"Do not close the dialog until the async loop setup completes, or parent the error to a still-valid window.","locations":[{"ref":"src/disks/gdu-new-disk-image-dialog.c:60-84","code":"   60 | static void\n   61 | loop_setup_cb (UDisksManager *manager, GAsyncResult *res, gpointer user_data)\n   62 | {\n   63 |     GduNewDiskImageDialog *self;\n   64 |     g_autoptr(GTask) task = user_data;\n   65 |     g_autoptr(GError) error = NULL;\n   66 |     g_autofree char *uri = NULL;\n   67 |     g_autofree char *out_loop_device_object_path = NULL;\n   68 |     gchar *filename;\n   69 | \n   70 |     self = g_task_get_source_object (task);\n   71 |     filename = g_task_get_task_data (task);\n   72 | \n   73 |     if (!udisks_manager_call_loop_setup_finish (manager, &out_loop_device_object_path, NULL, res, &error)) {\n   74 |         gdu_utils_show_error (gdu_new_disk_image_dialog_get_window (self), _(\"Error attaching disk image\"), error);\n   75 |         return;\n   76 |     }\n   77 | \n   78 |     /* This is to make it appear in the file chooser's \"Recently Used\" list\n   79 |      */\n   80 |     uri = g_strdup_printf (\"file://%s\", filename);\n   81 |     gtk_recent_manager_add_item (gtk_recent_manager_get_default (), uri);\n   82 | \n   83 |     udisks_client_settle (self->client);\n   84 | }","lines":25,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-new-disk-image-dialog.c#L60-84"},{"ref":"src/disks/gdu-new-disk-image-dialog.c:160-163","code":"  160 |     /* load loop device */\n  161 |     dialog_attach_disk_image_helper (self, out_filename, FALSE);\n  162 | \n  163 |     adw_dialog_close (ADW_DIALOG (self));","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-new-disk-image-dialog.c#L160-163"}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"file_dialog_open_cb passes NULL as the GError** to gtk_file_dialog_open_finish and silently returns on NULL file. A genuine error (vs user cancel) is indistinguishable and swallowed with no logging, making attach failures invisible.","fix":"Capture a GError, ignore G_IO_ERROR_CANCELLED / GTK_DIALOG_ERROR_DISMISSED, and surface other errors via gdu_utils_show_error.","locations":[{"ref":"src/disks/gdu-window.c:78-93","code":"   78 | static void\n   79 | file_dialog_open_cb (GObject *source_object, GAsyncResult *res, gpointer user_data)\n   80 | {\n   81 |     GduWindow *self = GDU_WINDOW (user_data);\n   82 |     GtkFileDialog *file_dialog = GTK_FILE_DIALOG (source_object);\n   83 |     GFile *file = NULL;\n   84 | \n   85 |     g_assert (GDU_IS_WINDOW (self));\n   86 | \n   87 |     file = gtk_file_dialog_open_finish (file_dialog, res, NULL);\n   88 | \n   89 |     if (!file)\n   90 |         return;\n   91 | \n   92 |     gdu_manager_open_loop_async (self->manager, file, TRUE, loop_open_cb, g_object_ref (self));\n   93 | }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-window.c#L78-93"}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"gdu_dvd_support_read(): on dvdcss_seek failure (line 383) and lseek failure (line 403) the code does 'goto out' leaving ret at its initial -1 even if some bytes were already read in earlier iterations, discarding the partial progress that other error paths deliberately return (size - num_left). Inconsistent partial-read accounting.","fix":"On these seek failures set ret = size - num_left (matching the partial-read handling used elsewhere) before goto out, or return -1 consistently for all failures.","locations":[{"ref":"src/disks/gdudvdsupport.c:383-384","code":"  383 |             if (dvdcss_seek (support->dvdcss, block_offset, flags) != block_offset)\n  384 |                 goto out;","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdudvdsupport.c#L383-384"},{"ref":"src/disks/gdudvdsupport.c:403-404","code":"  403 |             if (lseek (fd, cur_offset, SEEK_SET) == (off_t) -1)\n  404 |                 goto out;","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdudvdsupport.c#L403-404"},{"ref":"src/disks/gdudvdsupport.c:313","code":"  313 |     gssize ret = -1;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdudvdsupport.c#L313"}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"gdu_local_job_finalize calls g_object_unref (job->object) directly. The 'object' property is CONSTRUCT_ONLY and normally set, but g_value_dup_object in set_property could leave it NULL if constructed without the object; g_object_unref(NULL) would then crash. Other fields use the NULL-safe g_free.","fix":"Use g_clear_object (&job->object) for symmetry and NULL safety.","locations":[{"ref":"src/disks/gdulocaljob.c:53-63","code":"   53 | static void\n   54 | gdu_local_job_finalize (GObject *object)\n   55 | {\n   56 |     GduLocalJob *job = GDU_LOCAL_JOB (object);\n   57 | \n   58 |     g_object_unref (job->object);\n   59 |     g_free (job->description);\n   60 |     g_free (job->extra_markup);\n   61 | \n   62 |     G_OBJECT_CLASS (gdu_local_job_parent_class)->finalize (object);\n   63 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdulocaljob.c#L53-63"}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"gdu_local_job get/set_property switch statements have no default case and do not call G_OBJECT_WARN_INVALID_PROPERTY_ID. An out-of-range property_id silently does nothing (get leaves value unset) instead of warning, masking bugs.","fix":"Add a default: case calling G_OBJECT_WARN_INVALID_PROPERTY_ID (object, property_id, pspec).","locations":[{"ref":"src/disks/gdulocaljob.c:65-104","code":"   65 | static void\n   66 | gdu_local_job_get_property (GObject *object, guint property_id, GValue *value, GParamSpec *pspec)\n   67 | {\n   68 |     GduLocalJob *job = GDU_LOCAL_JOB (object);\n   69 | \n   70 |     switch ((GduLocalJobProps) property_id) {\n   71 |     case PROP_OBJECT:\n   72 |         g_value_set_object (value, gdu_local_job_get_object (job));\n   73 |         break;\n   74 | \n   75 |     case PROP_DESCRIPTION:\n   76 |         g_value_set_string (value, gdu_local_job_get_description (job));\n   77 |         break;\n   78 | \n   79 |     case PROP_EXTRA_MARKUP:\n   80 |         g_value_set_string (value, gdu_local_job_get_extra_markup (job));\n   81 |         break;\n   82 |     }\n   83 | }\n   84 | \n   85 | static void\n   86 | gdu_local_job_set_property (GObject *object, guint property_id, const GValue *value, GParamSpec *pspec)\n   87 | {\n   88 |     GduLocalJob *job = GDU_LOCAL_JOB (object);\n   89 | \n   90 |     switch ((GduLocalJobProps) property_id) {\n   91 |     case PROP_OBJECT:\n   92 |         g_assert (job->object == NULL);\n   93 |         job->object = g_value_dup_object (value);\n   94 |         break;\n   95 | \n   96 |     case PROP_DESCRIPTION:\n   97 |         gdu_local_job_set_description (job, g_value_get_string (value));\n   98 |         break;\n   99 | \n  100 |     case PROP_EXTRA_MARKUP:\n  101 |         gdu_local_job_set_extra_markup (job, g_value_get_string (value));\n  102 |         break;\n  103 |     }\n  104 | }","lines":40,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdulocaljob.c#L65-104"}]},{"id":"ERR_24","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"init_lzma() reports a failed lzma_stream_decoder() init only via g_critical and then returns; the decompressor object is still constructed and used. A subsequent gdu_xz_decompressor_convert() will operate on an uninitialized/half-initialized lzma_stream, producing undefined behavior rather than a clean error.","fix":"Propagate the init failure (e.g. store a flag and fail convert() with G_IO_ERROR), or use a constructor that can return NULL on failure.","locations":[{"ref":"src/disks/gduxzdecompressor.c:48-63","code":"   48 | static void\n   49 | init_lzma (GduXzDecompressor *decompressor)\n   50 | {\n   51 |     lzma_ret ret;\n   52 |     memset (&decompressor->stream, 0, sizeof decompressor->stream);\n   53 |     ret = lzma_stream_decoder (&decompressor->stream, UINT64_MAX, /* memlimit */\n   54 |                                0);                                /* flags */\n   55 |     if (ret != LZMA_OK)\n   56 |         g_critical (\"Error initalizing lzma decoder: %u\", ret);\n   57 | }\n   58 | \n   59 | static void\n   60 | gdu_xz_decompressor_init (GduXzDecompressor *decompressor)\n   61 | {\n   62 |     init_lzma (decompressor);\n   63 | }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gduxzdecompressor.c#L48-63"}]},{"id":"ERR_25","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"set_destination_object uses object_path() identity comparison to early-return, but compares Option<ObjectPath> from a borrow against a freshly cloned path; this is correct, however the surrounding expect()/ok() drops the block-for-drive error silently (drive.ok()) so a failure to resolve the drive leaves imp.drive as None with no diagnostic, later surfacing as a confusing missing-drive UI rather than an error.","fix":"Log the drive_for_block error before discarding it with .ok().","locations":[{"ref":"src/disks/restore_disk_image_dialog.rs:173-188","code":"  173 |     async fn set_destination_object(&self, object: udisks::Object) {\n  174 |         let imp = self.imp();\n  175 |         if imp.object.borrow().as_ref().map(|v| v.object_path()) == Some(object.object_path()) {\n  176 |             // object is the same as is currently displayed, nothing
