        log::error!(\"Error rescanning device: {}\", err);\n  579 |         };\n  580 | \n  581 |         Ok(copy_result?)","lines":12,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/restore_disk_image_dialog.rs#L570-581"}]},{"id":"ERR_27","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"g_app_info_create_from_commandline can return NULL on error, but its return value is passed straight to g_app_info_launch without a NULL check. A NULL app_info would trigger a critical inside g_app_info_launch. The GError for create_from_commandline is also passed as NULL, discarding the reason.","fix":"Pass a GError to create_from_commandline and check app_info != NULL before launching; log and return on failure.","locations":[{"ref":"src/notify/gdusdmonitor.c:216-218","code":"  216 |     app_info = g_app_info_create_from_commandline (command_line, NULL, /* application name */\n  217 |                                                    G_APP_INFO_CREATE_SUPPORTS_STARTUP_NOTIFICATION, NULL);\n  218 |     if (!g_app_info_launch (app_info, NULL, NULL, &error)) {","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/notify/gdusdmonitor.c#L216-218"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"benchmark_thread() runs on a worker thread (g_thread_new), yet end_benchmark() touches GTK/UI state directly from that thread: gtk_widget_set_visible(self->cancel_button, FALSE) and gtk_application_uninhibit(). GTK is not thread-safe; widget calls must run on the main loop. This can corrupt GTK state or crash. Only update_dialog() is correctly deferred to the main thread via bmt_schedule_update()/g_timeout_add.","fix":"Move all UI mutations (set_visible, uninhibit, and the benchmark_in_progress flag clearing) into the main-thread timeout callback (bmt_on_timeout) or schedule them with g_idle_add, rather than performing them inside the worker thread.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:788-808","code":"  788 | static gpointer\n  789 | end_benchmark (GduBenchmarkDialog *self, GError *error, gint fd, guint inhibit_cookie)\n  790 | {\n  791 |     if (fd != -1)\n  792 |         close (fd);\n  793 |     self->benchmark_in_progress = FALSE;\n  794 |     gtk_widget_set_visible (self->cancel_button, FALSE);\n  795 | \n  796 |     if (inhibit_cookie != 0)\n  797 |         gtk_application_uninhibit ((gpointer) g_application_get_default (), inhibit_cookie);\n  798 | \n  799 |     if (error != NULL) {\n  800 |         G_LOCK (benchmark_lock);\n  801 |         self->benchmark_error = error;\n  802 |         G_UNLOCK (benchmark_lock);\n  803 |     }\n  804 | \n  805 |     bmt_schedule_update (self);\n  806 | \n  807 |     return NULL;\n  808 | }","lines":21,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L788-808"},{"ref":"src/disks/gdu-benchmark-dialog.c:1027-1084","code":" 1027 | benchmark_thread (gpointer user_data)\n 1028 | {\n 1029 |     GduBenchmarkDialog *self = user_data;\n 1030 |     GError *error = NULL;\n 1031 |     guchar *buffer = NULL;\n 1032 |     g_autofree guchar *buffer_unaligned = NULL;\n 1033 |     gint fd = -1;\n 1034 |     glong page_size;\n 1035 |     guint64 disk_size;\n 1036 |     guint inhibit_cookie;\n 1037 |     gint sample_size_mib = 0;\n 1038 | \n 1039 |     sample_size_mib = g_settings_get_int (self->settings, \"sample-size-mib\");\n 1040 | \n 1041 |     inhibit_cookie = gtk_application_inhibit ((gpointer) g_application_get_default (), self->parent_window,\n 1042 |                                               GTK_APPLICATION_INHIBIT_SUSPEND | GTK_APPLICATION_INHIBIT_LOGOUT,\n 1043 |                                               /* Translators: Reason why suspend/logout is being inhibited */\n 1044 |                                               \"Benchmark in progress\");\n 1045 | \n 1046 |     error = open_for_benchmark (self, &fd);\n 1047 |     if (error != NULL) {\n 1048 |         return end_benchmark (self, error, fd, inhibit_cookie);\n 1049 |     }\n 1050 | \n 1051 |     /* We can't use udisks_block_get_size() because the media may have\n 1052 |      * changed and udisks may not have noticed. TODO: maybe have a\n 1053 |      * Block.GetSize() method instead...\n 1054 |      */\n 1055 |     if (ioctl (fd, BLKGETSIZE64, &disk_size) != 0) {\n 1056 |         g_set_error (&error, G_IO_ERROR, g_io_error_from_errno (errno), \"Error getting size of device: %m\");\n 1057 |         return end_benchmark (self, error, fd, inhibit_cookie);\n 1058 |     }\n 1059 | \n 1060 |     page_size = sysconf (_SC_PAGESIZE);\n 1061 |     if (page_size < 1) {\n 1062 |         g_set_error (&error, G_IO_ERROR, g_io_error_from_errno (errno), \"Error getting page size: %m\\n\");\n 1063 |         return end_benchmark (self, error, fd, inhibit_cookie);\n 1064 |     }\n 1065 | \n 1066 |     buffer_unaligned = g_new0 (guchar, sample_size_mib * 1024 * 1024 + page_size);\n 1067 |     buffer = (guchar *) (((gintptr) (buffer_unaligned + page_size)) & (~(page_size - 1)));\n 1068 | \n 1069 |     G_LOCK (benchmark_lock);\n 1070 |     GDU_BENCHMARK_GRAPH (self->benchmark_graph)->benchmark_size = disk_size;\n 1071 |     G_UNLOCK (benchmark_lock);\n 1072 | \n 1073 |     error = benchmark_transfer_rate (self, buffer, fd, page_size, disk_size);\n 1074 |     if (error != NULL) {\n 1075 |         return end_benchmark (self, error, fd, inhibit_cookie);\n 1076 |     }\n 1077 | \n 1078 |     error = benchmark_access_time (self, buffer, fd, page_size, disk_size);\n 1079 |     if (error != NULL) {\n 1080 |         return end_benchmark (self, error, fd, inhibit_cookie);\n 1081 |     }\n 1082 | \n 1083 |     return end_benchmark (self, error, fd, inhibit_cookie);\n 1084 | }","lines":58,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L1027-1084"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":true,"description":"g_return_val_if_fail() takes (condition, return_value) but here the arguments are swapped: -1 (the intended return value) is passed as the condition and the real check as the second argument. Since -1 is always truthy the guard never fires, so the actual preconditions (buffer != NULL, valid output stream, valid cancellable, *error == NULL) are never enforced. If any precondition is violated the function proceeds instead of returning -1, potentially dereferencing NULL.","fix":"Swap the arguments to g_return_val_if_fail(condition, -1), e.g. g_return_val_if_fail(buffer != NULL, -1). Also remove the duplicate buffer != NULL check (lines 373 and 375 are identical).","locations":[{"ref":"src/disks/gdu-create-disk-image-dialog.c:373-377","code":"  373 |     g_return_val_if_fail (-1, buffer != NULL);\n  374 |     g_return_val_if_fail (-1, G_IS_OUTPUT_STREAM (output_stream));\n  375 |     g_return_val_if_fail (-1, buffer != NULL);\n  376 |     g_return_val_if_fail (-1, cancellable == NULL || G_IS_CANCELLABLE (cancellable));\n  377 |     g_return_val_if_fail (-1, error == NULL || *error == NULL);","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-disk-image-dialog.c#L373-377"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"partition_cmp() is used as a GCompareFunc for g_list_sort() but is not a valid total-order comparator: when offset_a <= offset_b it returns -1 in almost all cases (and the container/contained branch can return 1 for a==b-style relations) without ever returning 0 for equal elements, and the ordering is not antisymmetric. An inconsistent comparator yields undefined sort results and, on some libc qsort/GLib mergesort paths, can misorder partitions (visible as wrong free-space placement / wrong parent nesting).","fix":"Return a proper -1/0/+1 ordering: compare offsets first (return -1/0/+1), and only use the container/contained relationship as a tie-breaker when offsets are equal. Ensure cmp(a,b) == -cmp(b,a).","locations":[{"ref":"src/disks/gdu-drive.c:529-544","code":"  529 | static gint\n  530 | partition_cmp (gpointer a, gpointer b)\n  531 | {\n  532 |     gint64 offset_a, offset_b;\n  533 | \n  534 |     offset_a = udisks_partition_get_offset (a);\n  535 |     offset_b = udisks_partition_get_offset (b);\n  536 | \n  537 |     if (offset_a > offset_b)\n  538 |         return 1;\n  539 | \n  540 |     if (udisks_partition_get_is_container (b) && udisks_partition_get_is_contained (a))\n  541 |         return 1;\n  542 | \n  543 |     return -1;\n  544 | }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L529-544"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"GtkWidget::measure is documented to receive the out-parameters (*minimum, *natural, *minimum_baseline, *natural_baseline) uninitialized; the implementation must set all of them. Here *minimum and *natural are read with MAX() before being initialized (relying on undefined caller state), and minimum_baseline/natural_baseline are never written at all. For a widget with no children, none of the four outputs are set.","fix":"Initialize *minimum = 0; *natural = 0; at the top, and explicitly set *minimum_baseline = -1; *natural_baseline = -1; (or guard against NULL pointers and set them) before/after the loop.","locations":[{"ref":"src/disks/gdu-space-allocation-bar.c:62-76","code":"   62 | static void\n   63 | gdu_space_allocation_bar_measure (GtkWidget *widget, GtkOrientation orientation, gint for_size, gint *minimum,\n   64 |                                   gint *natural, gint *minimum_baseline, gint *natural_baseline)\n   65 | {\n   66 |     GtkWidget *child;\n   67 | \n   68 |     for (child = gtk_widget_get_first_child (widget); child; child = gtk_widget_get_next_sibling (child)) {\n   69 |         gint child_min, child_nat;\n   70 | \n   71 |         gtk_widget_measure (child, orientation, for_size, &child_min, &child_nat, NULL, NULL);\n   72 | \n   73 |         *minimum = MAX (*minimum, child_min);\n   74 |         *natural = MAX (*natural, child_nat);\n   75 |     }\n   76 | }","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-space-allocation-bar.c#L62-76"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"gdu_space_allocation_bar_set_drive connects to the 'items-changed' signal of the partitions model every time it is called but never disconnects the previous connection. Calling set_drive more than once (e.g. reusing the widget for another drive) accumulates duplicate signal handlers, each invoking update_space_allocation_bar, causing redundant rebuilds and keeping 'self' referenced by the old model.","fix":"Disconnect the handler from the old drive's partitions model before switching drives (store the handler id or use g_signal_handlers_disconnect_by_data on the old model in finalize and before reconnecting).","locations":[{"ref":"src/disks/gdu-space-allocation-bar.c:144-158","code":"  144 | void\n  145 | gdu_space_allocation_bar_set_drive (GduSpaceAllocationBar *self, GduDrive *drive)\n  146 | {\n  147 |     g_return_if_fail (GDU_IS_SPACE_ALLOCATION_BAR (self));\n  148 |     g_return_if_fail (!drive || GDU_IS_DRIVE (drive));\n  149 | \n  150 |     if (self->drive == drive)\n  151 |         return;\n  152 | \n  153 |     g_set_object (&self->drive, drive);\n  154 | \n  155 |     g_signal_connect_swapped (gdu_item_get_partitions (GDU_ITEM (self->drive)), \"items-changed\",\n  156 |                               G_CALLBACK (update_space_allocation_bar), self);\n  157 |     update_space_allocation_bar (self);\n  158 | }","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-space-allocation-bar.c#L144-158"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"g_settings_get_int returns gint but is assigned to guint num_samples / cast to guint, and used as the loop bound. A negative setting value becomes a huge unsigned count. Also adw_spin_row_get_value returns gdouble and is implicitly truncated into gint in save_options; combined with no clamping, out-of-range settings drive the benchmark loops and allocation sizes.","fix":"Validate/clamp values read from GSettings to documented sane ranges before using them as counts or sizes.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:848","code":"  848 |     num_samples = (guint) g_settings_get_int (self->settings, \"num-samples\");","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L848"},{"ref":"src/disks/gdu-benchmark-dialog.c:974","code":"  974 |     num_access_samples = (guint) g_settings_get_int (self->settings, \"num-access-samples\");","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L974"},{"ref":"src/disks/gdu-benchmark-dialog.c:134-137","code":"  134 |     num_samples = adw_spin_row_get_value (ADW_SPIN_ROW (self->sample_row));\n  135 |     sample_size_mib = adw_spin_row_get_value (ADW_SPIN_ROW (self->sample_size_row));\n  136 |     num_access_samples = adw_spin_row_get_value (ADW_SPIN_ROW (self->access_samples_row));\n  137 |     write_benchmark = adw_switch_row_get_active (ADW_SWITCH_ROW (self->write_bench_switch));","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L134-137"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"self->client is stored without taking a reference (unlike object and parent_window which are ref'd). It is later used in the async ensure_unused_cb callback. If the UDisksClient is released before the async operation completes, this is a use-after-free.","fix":"Take a reference: self->client = g_object_ref (client); and release it in finalize.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:1287","code":" 1287 |     self->client = client;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L1287"},{"ref":"src/disks/gdu-benchmark-dialog.c:1117-1123","code":" 1117 | ensure_unused_cb (GtkWindow *window, GAsyncResult *res, gpointer user_data)\n 1118 | {\n 1119 |     GduBenchmarkDialog *self = user_data;\n 1120 | \n 1121 |     if (gdu_utils_ensure_unused_finish (self->client, res, NULL))\n 1122 |         start_benchmark (self);\n 1123 | }","lines":7,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L1117-1123"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"gdu_drive_get_features() at line 210/216 calls udisks_object_peek_drive_ata(object) and passes the result to gdu_ata_smart_get_one_liner_assessment when 'drive' may be NULL: the guard is '!udisks_drive_get_media_removable(drive)' with drive possibly NULL (self->drive can be NULL for block-only objects). udisks_drive_get_media_removable(NULL) will assert/crash. The ata branch is entered based on peek_drive_ata(object) AND drive media-removable, but drive nullness is not checked first.","fix":"Add 'drive != NULL &&' before udisks_drive_get_media_removable(drive) in the condition.","locations":[{"ref":"src/disks/gdu-drive.c:206-219","code":"  206 |     block = self->block;\n  207 |     drive = self->drive;\n  208 |     object = self->object;\n  209 | \n  210 |     if (udisks_object_peek_drive_ata (object) && !udisks_drive_get_media_removable (drive)) {\n  211 |         g_autofree char *s = NULL;\n  212 |         UDisksDriveAta *ata;\n  213 |         gboolean smart_is_supported;\n  214 | \n  215 |         ata = udisks_object_peek_drive_ata (object);\n  216 |         s = gdu_ata_smart_get_one_liner_assessment (ata, &smart_is_supported, NULL /* out_warning */);\n  217 |         if (smart_is_supported)\n  218 |             features |= GDU_FEATURE_SMART;\n  219 |     }","lines":14,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L206-219"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"gdu_format_volume_dialog_finalize clears udisks_object, udisks_block and udisks_drive but never clears self->udisks_table, which is acquired via udisks_object_get_partition_table (a new ref) in gdu_create_format_show. The partition table GObject leaks.","fix":"g_clear_object(&self->udisks_table) in finalize.","locations":[{"ref":"src/disks/gdu-format-volume-dialog.c:358-368","code":"  358 | static void\n  359 | gdu_format_volume_dialog_finalize (GObject *object)\n  360 | {\n  361 |     GduFormatVolumeDialog *self = (GduFormatVolumeDialog *) object;\n  362 | \n  363 |     g_clear_object (&self->udisks_object);\n  364 |     g_clear_object (&self->udisks_block);\n  365 |     g_clear_object (&self->udisks_drive);\n  366 | \n  367 |     G_OBJECT_CLASS (gdu_format_volume_dialog_parent_class)->finalize (object);\n  368 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-format-volume-dialog.c#L358-368"},{"ref":"src/disks/gdu-format-volume-dialog.c:422-423","code":"  422 |     block_object = (gpointer) g_dbus_interface_get_object ((gpointer) self->udisks_block);\n  423 |     self->udisks_table = udisks_object_get_partition_table (block_object);","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-format-volume-dialog.c#L422-423"}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"gdu_manager_get_default uses a static GduManager *self plus g_object_add_weak_pointer to NULL it on finalize, but returns the same singleton to all callers without taking a reference. gdu_application_ensure_client stores it in app->disk_manager (never unref'd) and gdu_window keeps a ref to the manager separately. The weak pointer means if the last external ref drops, self becomes NULL and a later gdu_manager_get_default rebuilds a fresh client/manager, silently dropping all the drive state and signal connections. This singleton-with-weak-pointer pattern is fragile and the returned pointer ownership is undocumented.","fix":"Either return a full reference and document caller ownership, or hold a strong static ref for the process lifetime instead of a weak pointer.","locations":[{"ref":"src/disks/gdu-manager.c:357-380","code":"  357 | GduManager *\n  358 | gdu_manager_get_default (GError **error)\n  359 | {\n  360 |     static GduManager *self;\n  361 | \n  362 |     if (!self) {\n  363 |         UDisksClient *client;\n  364 | \n  365 |         g_return_val_if_fail (!error || !*error, NULL);\n  366 | \n  367 |         if (!(client = udisks_client_new_sync (NULL, error)))\n  368 |             return NULL;\n  369 | \n  370 |         self = g_object_new (GDU_TYPE_MANAGER, NULL);\n  371 |         g_object_add_weak_pointer (G_OBJECT (self), (gpointer *) &self);\n  372 |         self->udisks_client = client;\n  373 | \n  374 |         g_signal_connect_object (client, \"notify::object-manager\", G_CALLBACK (manager_load_drives), self,\n  375 |                                  G_CONNECT_SWAPPED);\n  376 |         manager_load_drives (self);\n  377 |     }\n  378 | \n  379 |     return self;\n  380 | }","lines":24,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-manager.c#L357-380"}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"gdu_unlock_dialog_show: in the crypttab auto-unlock path it calls do_unlock(self) and returns without ever presenting the dialog or keeping ownership clear. self has a single reference from g_object_new; do_unlock passes self as user_data to the async unlock call and unlock_cb does g_object_unref(self). This consumes the only reference, so the dialog object is destroyed when the async call completes - but the AdwDialog was never added to any parent, so this relies on the async call always completing. If udisks_encrypted_call_unlock never invokes its callback (e.g. process teardown), the dialog leaks; conversely the GObject lifetime is managed via the async callback rather than the widget hierarchy, which is fragile and differs from the presented path.","fix":"Make ownership explicit: in the crypttab path call do_unlock(g_object_ref(self)) for symmetry with on_unlock_clicked_cb, and ensure the single g_object_new reference has a clear owner.","locations":[{"ref":"src/disks/gdu-unlock-dialog.c:284-287","code":"  284 |     if (gdu_utils_has_configuration (self->udisks_block, \"crypttab\", &password_in_crypttab) && password_in_crypttab) {\n  285 |         do_unlock (self);\n  286 |         return;\n  287 |     }","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-unlock-dialog.c#L284-287"},{"ref":"src/disks/gdu-unlock-dialog.c:131-142","code":"  131 | unlock_cb (GObject *source_object, GAsyncResult *result, gpointer user_data)\n  132 | {\n  133 |     UDisksEncrypted *encrypted = UDISKS_ENCRYPTED (source_object);\n  134 |     GduUnlockDialog *self = user_data;\n  135 |     g_autoptr(GError) error = NULL;\n  136 | \n  137 |     if (!udisks_encrypted_call_unlock_finish (encrypted, NULL, /* out_cleartext_device */\n  138 |                                               result, &error))\n  139 |         gdu_utils_show_error (GTK_WINDOW (self->parent_window), _(\"Error unlocking device\"), error);\n  140 | \n  141 |     g_object_unref (self);\n  142 | }","lines":12,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-unlock-dialog.c#L131-142"}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"notify_notification_add_action passes 'monitor' as user_data to on_examine_action_clicked without taking a reference and without a GDestroyNotify. If the monitor is finalized while the notification is still shown and the user later clicks the action, the callback dereferences a freed GduSdMonitor (use-after-free). The notification is owned by the monitor, so in normal flow it is closed in finalize, but the lifetime is not guaranteed by the API contract.","fix":"Ensure the notification is always closed/cleared before the monitor is finalized (it is in finalize, so document the invariant), or pass a ref with a g_object_unref GDestroyNotify.","locations":[{"ref":"src/notify/gdusdmonitor.c:242-244","code":"  242 |             notify_notification_add_action (*notification, action, action_label,\n  243 |                                             (NotifyActionCallback) on_examine_action_clicked, monitor, NULL);\n  244 |             notify_notification_show (*notification, NULL);","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/notify/gdusdmonitor.c#L242-244"}]},{"id":"API_13","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"freeze_notify guard in estimator.update() is acquired AFTER the property values have already been set via Cell::set, but the notify() calls are emitted inside the frozen scope. Freezing only batches notifications; since set() on a plain Cell does not emit notify, the freeze_notify here only groups the two explicit notify() calls. That is harmless but the comment implies it is preventing intermediate notifications that never occur, so the guard adds complexity without real benefit.","fix":"Either remove the freeze_notify (two notifies don't need batching) or document that it is purely cosmetic.","locations":[{"ref":"src/disks/estimator.rs:100-105","code":"  100 |             {\n  101 |                 // freezes notifications until the guard is dropped at the end of the scope\n  102 |                 let _notify_guard = self.obj().freeze_notify();\n  103 |                 self.obj().notify(\"bytes-per-sec\");\n  104 |                 self.obj().notify(\"usec-remaining\");\n  105 |             }","lines":6,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/estimator.rs#L100-105"}]},{"id":"API_14","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Several checks use 'g_strcmp0 (missing_util, \"\") > 0' to test for a non-empty missing-utility string. g_strcmp0's positive/negative magnitude is not contractually 1/-1; relying on '> 0' to mean 'non-empty' works only because the second arg is the empty string (any non-empty string sorts after \"\"), but it is fragile and obscure, and also treats a NULL missing_util (g_strcmp0(NULL,\"\") == -1) as 'no utility missing' which may differ from intent.","fix":"Replace with an explicit check such as (missing_util != NULL && *missing_util != '\\0').","locations":[{"ref":"src/disks/gdu-block.c:334","code":"  334 |                 || g_strcmp0 (fs_resize_missing_utility, \"\") > 0))","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block.c#L334"},{"ref":"src/disks/gdu-block.c:339","code":"  339 |                 || g_strcmp0 (fs_repair_missing_utility, \"\") > 0))","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block.c#L339"},{"ref":"src/disks/gdu-block.c:346","code":"  346 |             || g_strcmp0 (fs_check_missing_utility, \"\") > 0)","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block.c#L346"},{"ref":"src/disks/gdu-block-row.c:451","code":"  451 |     if (g_strcmp0 (missing_util, \"\") > 0) {","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block-row.c#L451"}]},{"id":"API_15","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"gdu_create_confirm_page_new, gdu_create_partition_page_new, gdu_create_other_page_new and gdu_create_filesystem_page_new store the passed UDisksClient/UDisksObject/UDisksBlock/UDisksPartitionTable pointers as struct members without taking references, and none of these classes define a finalize that clears them. They rely entirely on the parent dialog outliving these pages. This is a fragile borrowed-pointer ownership model; if a page ever outlives its client/object it dereferences freed memory.","fix":"Either document the borrow contract clearly, or take references and clear them in a finalize override for each page.","locations":[{"ref":"src/disks/gdu-create-confirm-page.c:142-144","code":"  142 |     self->client = client;\n  143 |     self->object = object;\n  144 |     self->block = block;","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-confirm-page.c#L142-144"},{"ref":"src/disks/gdu-create-partition-page.c:238-241","code":"  238 |     self->client = client;\n  239 |     self->table = table;\n  240 |     self->max_size = max_size;\n  241 |     self->offset = offset;","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-partition-page.c#L238-241"},{"ref":"src/disks/gdu-create-other-page.c:162-163","code":"  162 |     self = g_object_new (GDU_TYPE_CREATE_OTHER_PAGE, NULL);\n  163 |     self->client = client;","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-other-page.c#L162-163"}]},{"id":"API_16","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"set_size_entry_unit_cb declares its user_data parameter as 'gpointer *user_data' (pointer-to-pointer) instead of 'gpointer'. It happens to work because the value is just cast via GDU_CREATE_PARTITION_PAGE, but the signature is wrong for the GtkSpinButton::output style callback and is misleading/fragile.","fix":"Change the parameter type to 'gpointer user_data'.","locations":[{"ref":"src/disks/gdu-create-partition-page.c:105-108","code":"  105 | static gboolean\n  106 | set_size_entry_unit_cb (AdwSpinRow *spin_row, gpointer *user_data)\n  107 | {\n  108 |     GduCreatePartitionPage *self = GDU_CREATE_PARTITION_PAGE (user_data);","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-create-partition-page.c#L105-108"}]},{"id":"API_17","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"g_object_set_data (udisk_object, \"gdu-drive\", self) in gdu_drive_new stores a non-owning pointer to self on the UDisksObject; gdu_drive_dispose clears it. But gdu_drive_new is called before the object is fully owned by a list, and if two GduDrive instances are ever created for the same udisk_object the data is silently overwritten and the first drive's dispose will clear data that now points to the second drive (or NULL it prematurely). Same pattern in gdu_block_new with 'gdu-block'.","fix":"Document/enforce the single-wrapper-per-object invariant, or in dispose only clear the data if it still points to self: if (g_object_get_data(obj,key)==self) g_object_set_data(obj,key,NULL).","locations":[{"ref":"src/disks/gdu-drive.c:367","code":"  367 |     g_object_set_data (udisk_object, \"gdu-drive\", self);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L367"},{"ref":"src/disks/gdu-block.c:426","code":"  426 |     g_object_set_data (G_OBJECT (udisk_object), \"gdu-block\", self);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block.c#L426"},{"ref":"src/disks/gdu-block.c:360-361","code":"  360 |     if (self->object)\n  361 |         g_object_set_data (G_OBJECT (self->object), \"gdu-block\", NULL);","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-block.c#L360-361"}]},{"id":"API_18","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"gdu_drive_get_siblings() passes self->drive to udisks_client_get_drive_siblings() without checking self->drive != NULL. For a block-only object (e.g. a loop/partition-table object where drive was never resolved) self->drive can be NULL, and the udisks call / subsequent iteration may misbehave. Also the g_return_val_if_fail returns 'false' (0) typed as GList* which is fine but stylistically wrong.","fix":"Return NULL early if self->drive == NULL; and use NULL (not false) as the failure return value for a pointer-returning function.","locations":[{"ref":"src/disks/gdu-drive.c:507-527","code":"  507 | GList *\n  508 | gdu_drive_get_siblings (GduDrive *self)\n  509 | {\n  510 |     GList *objects = NULL;\n  511 |     GList *siblings;\n  512 | \n  513 |     g_return_val_if_fail (GDU_IS_DRIVE (self), false);\n  514 | \n  515 |     siblings = udisks_client_get_drive_siblings (self->client, self->drive);\n  516 |     for (GList *l = siblings; l != NULL; l = l->next) {\n  517 |         UDisksDrive *sibling = UDISKS_DRIVE (l->data);\n  518 |         UDisksObject *sibling_object = (UDisksObject *) g_dbus_interface_get_object (G_DBUS_INTERFACE (sibling));\n  519 | \n  520 |         if (sibling_object != NULL)\n  521 |             objects = g_list_append (objects, sibling_object);\n  522 |     }\n  523 | \n  524 |     g_list_free_full (siblings, g_object_unref);\n  525 | \n  526 |     return objects;\n  527 | }","lines":21,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive.c#L507-527"}]},{"id":"API_19","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"self->udisks_drive is set from udisks_object_peek_drive(drive_object), which returns a borrowed pointer owned by drive_object. drive_object is a g_autoptr freed when gdu_encryption_options_dialog_show returns. self->udisks_drive is a struct member; although it is currently only read during the same call (in _update at line 357), storing a borrowed pointer that outlives its owner is a latent dangling-pointer bug if any later code reads self->udisks_drive.","fix":"Either use udisks_object_get_drive (returns a new ref) and clear it in finalize, or keep a ref to drive_object, or use the drive only as a local variable rather than a struct member.","locations":[{"ref":"src/disks/gdu-encryption-options-dialog.c:327-330","code":"  327 |     drive_object = (UDisksObject *) g_dbus_object_manager_get_object (udisks_client_get_object_manager (client),\n  328 |                                                                       udisks_block_get_drive (self->udisks_block));\n  329 |     if (drive_object)\n  330 |         self->udisks_drive = udisks_object_peek_drive (drive_object);","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-encryption-options-dialog.c#L327-330"}]},{"id":"API_20","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"gdu_item_real_get_icon calls g_assert_not_reached() and returns nothing for a function declared to return GIcon*. If a subclass forgets to override get_icon, in a build with assertions disabled (G_DISABLE_ASSERT) this falls off the end of a non-void function returning an indeterminate pointer that the caller will dereference.","fix":"Return NULL after g_assert_not_reached(), or g_return_val_if_reached (NULL).","locations":[{"ref":"src/disks/gdu-item.c:45-49","code":"   45 | static GIcon *\n   46 | gdu_item_real_get_icon (GduItem *self)\n   47 | {\n   48 |     g_assert_not_reached ();\n   49 | }","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-item.c#L45-49"}]},{"id":"API_21","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"gdu_item_real_changed re-emits the 'changed' signal via g_signal_emit_by_name (self, \"changed\", 0) passing a spurious trailing '0' argument. The 'changed' signal is declared with zero parameters (G_TYPE_NONE, 0 in g_signal_new), so the extra 0 is ignored at best and is misleading. Using emit_by_name (string lookup) is also slower than g_signal_emit with the cached signal id.","fix":"Use g_signal_emit (self, signals[CHANGED], 0); without the bogus extra argument.","locations":[{"ref":"src/disks/gdu-item.c:76-79","code":"   76 | gdu_item_real_changed (GduItem *self)\n   77 | {\n   78 |     g_signal_emit_by_name (self, \"changed\", 0);\n   79 | }","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-item.c#L76-79"},{"ref":"src/disks/gdu-item.c:95-96","code":"   95 |     signals[CHANGED] =\n   96 |         g_signal_new (\"changed\", G_TYPE_FROM_CLASS (klass), G_SIGNAL_RUN_LAST, 0, NULL, NULL, NULL, G_TYPE_NONE, 0);","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-item.c#L95-96"}]},{"id":"API_22","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"gdu_log_write calls localtime(&sec_now) and dereferences the result (*localtime(...)) with no NULL check. localtime can return NULL (e.g. out-of-range time_t), which would crash. localtime is also not thread-safe; the log writer can be invoked from multiple threads via GLib structured logging.","fix":"Use localtime_r and check its return value before use.","locations":[{"ref":"src/disks/gdu-log.c:238-241","code":"  238 |         now = g_get_real_time ();\n  239 |         sec_now = now / G_USEC_PER_SEC;\n  240 |         tm_now = *localtime (&sec_now);\n  241 |         strftime (buffer, sizeof (buffer), \"%H:%M:%S\", &tm_now);","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-log.c#L238-241"}]},{"id":"API_23","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"gdu_window_init creates gdu_window_state = g_settings_new(...) and stores it in a file-scope global GSettings* that is never unref'd and is overwritten if a second window is ever created, leaking the previous GSettings. gdu_window_unmap also writes settings using this global; tying window state to a single mutable global is fragile for an app that conceptually could have multiple windows.","fix":"Store the GSettings as an instance field on GduWindow, create once, and clear it in finalize.","locations":[{"ref":"src/disks/gdu-window.c:46","code":"   46 | GSettings *gdu_window_state;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-window.c#L46"},{"ref":"src/disks/gdu-window.c:170-177","code":"  170 | static void\n  171 | gdu_window_init (GduWindow *self)\n  172 | {\n  173 |     gdu_window_state = g_settings_new (\"org.gnome.Disks.window-state\");\n  174 | \n  175 |     gdu_window_load_state (self);\n  176 |     gtk_widget_init_template (GTK_WIDGET (self));\n  177 | }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-window.c#L170-177"}]},{"id":"API_24","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"g_get_real_time() returns wall-clock time which can jump backwards (NTP adjustment, manual clock change). A backward jump makes (b->time_usec - a->time_usec) negative, producing a negative speed that skews the average and can yield a nonsensical estimate. A monotonic clock is appropriate for measuring elapsed throughput.","fix":"Use g_get_monotonic_time() instead of g_get_real_time() for sample timestamps.","locations":[{"ref":"src/disks/gduestimator.c:107","code":"  107 |         speed = (b->value - a->value) / (((gdouble) (b->time_usec - a->time_usec)) / G_USEC_PER_SEC);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gduestimator.c#L107"},{"ref":"src/disks/gduestimator.c:208","code":"  208 |     sample->time_usec = g_get_real_time ();","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gduestimator.c#L208"}]},{"id":"API_25","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"gdu_xz_decompressor_convert() writes to *bytes_read and *bytes_written only on the success path (LZMA_OK/STREAM_END). The GConverterIface contract expects these out-params handled, and callers may read them; on the LZMA_BUF_ERROR+FLUSH 'flushed' return they are left untouched. Returning G_CONVERTER_FLUSHED without setting bytes_read/bytes_written can leave callers with stale values.","fix":"Set *bytes_read and *bytes_written (to the consumed/produced counts, which may be 0) before every non-error return, including the FLUSHED path.","locations":[{"ref":"src/disks/gduxzdecompressor.c:122-138","code":"  122 |     if (res == LZMA_BUF_ERROR) {\n  123 |         if (flags & G_CONVERTER_FLUSH)\n  124 |             return G_CONVERTER_FLUSHED;\n  125 | \n  126 |         /* LZMA_FINISH not set, so this means no progress could be made\n  127 |          * We do have output space, so this should only happen if we\n  128 |          * have no input but need some.\n  129 |          */\n  130 | \n  131 |         g_set_error_literal (error, G_IO_ERROR, G_IO_ERROR_PARTIAL_INPUT, _(\"Need more input\"));\n  132 |         return G_CONVERTER_ERROR;\n  133 |     }\n  134 | \n  135 |     g_assert (res == LZMA_OK || res == LZMA_STREAM_END);\n  136 | \n  137 |     *bytes_read = inbuf_size - decompressor->stream.avail_in;\n  138 |     *bytes_written = outbuf_size - decompressor->stream.avail_out;","lines":17,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gduxzdecompressor.c#L122-138"}]},{"id":"API_26","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"gdu_drive_header.c includes \"glib.h\" and \"gtk/gtk.h\" with double quotes (local-include form) rather than angle brackets for system headers. Minor portability/style issue; can pick up a same-named project header unexpectedly.","fix":"Use #include <glib.h> and #include <gtk/gtk.h>, or rely on adwaita.h which already pulls them in.","locations":[{"ref":"src/disks/gdu-drive-header.c:15-16","code":"   15 | #include \"glib.h\"\n   16 | #include \"gtk/gtk.h\"","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-drive-header.c#L15-16"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"draw_scatterplot() and draw_curve() allocate a fresh GskPathBuilder/GskStroke and build a separate GskPath per sample (scatterplot adds one circle per iteration in a new builder). For benchmarks with many access-time samples this creates O(n) path objects per snapshot, redundant work on every redraw.","fix":"Build a single path containing all circles (one builder, add all circles, one append_stroke/append_fill) instead of one path object per sample.","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:530-545","code":"  530 |     for (n = 0; n < n_samples; n++) {\n  531 |         GduBenchmarkSample *sample = g_list_model_get_item (G_LIST_MODEL (graph_data->samples), n);\n  532 |         graphene_point_t p;\n  533 | \n  534 |         p.x = graph_data->graph_x + (((double) sample->offset / max_offset) * graph_data->graph_width);\n  535 |         p.y = graph_data->graph_y\n  536 |               + (graph_data->graph_height - (sample->value / maximum_value * graph_data->graph_height));\n  537 | \n  538 |         builder = gsk_path_builder_new ();\n  539 |         gsk_path_builder_add_circle (builder, &p, 2);\n  540 | \n  541 |         path = gsk_path_builder_free_to_path (g_steal_pointer (&builder));\n  542 |         stroke = gsk_stroke_new (GRID_LINE_WIDTH);\n  543 |         gtk_snapshot_append_stroke (snapshot, path, stroke, graph_data->color);\n  544 |         gtk_snapshot_append_fill (snapshot, path, GSK_FILL_RULE_WINDING, graph_data->color);\n  545 |     }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L530-545"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"gdu_utils_can_resize/can_repair/can_format/can_check each hold a global lock while building the cache, and the cache build issues a synchronous D-Bus call (udisks_manager_call_*_sync) per supported filesystem under the lock. The first call for each (or after flush) blocks the calling thread on N synchronous round-trips while holding G_LOCK, serializing all callers. can_resize also reads the cache via g_hash_table_lookup AFTER releasing the lock (line 687), a data race if another thread flushes concurrently.","fix":"Perform the hash_table_lookup while still holding the lock, and consider caching results asynchronously or once at startup rather than under a held lock during synchronous D-Bus calls.","locations":[{"ref":"src/libgdu/gduutils.c:654-695","code":"  654 | gboolean\n  655 | gdu_utils_can_resize (UDisksClient *client, const gchar *fstype, gboolean flush, ResizeFlags *mode_out,\n  656 |                       gchar **missing_util_out)\n  657 | {\n  658 |     static GHashTable *cache = NULL;\n  659 |     const gchar *const *supported_fs;\n  660 |     UtilCacheEntry *result;\n  661 | \n  662 |     G_LOCK (can_resize_lock);\n  663 |     if (flush)\n  664 |         g_clear_pointer (&cache, g_hash_table_destroy);\n  665 | \n  666 |     if (cache == NULL) {\n  667 |         cache = g_hash_table_new_full (g_str_hash, g_str_equal, g_free, (GDestroyNotify) util_cache_entry_free);\n  668 |         supported_fs = udisks_manager_get_supported_filesystems (udisks_client_get_manager (client));\n  669 |         for (gsize i = 0; supported_fs[i] != NULL; i++) {\n  670 |             GVariant *out_available;\n  671 | \n  672 |             if (udisks_manager_call_can_resize_sync (udisks_client_get_manager (client), supported_fs[i],\n  673 |                                                      &out_available, NULL, NULL)) {\n  674 |                 UtilCacheEntry *entry;\n  675 |                 guint64 m = 0;\n  676 | \n  677 |                 entry = g_new0 (UtilCacheEntry, 1);\n  678 |                 g_variant_get (out_available, \"(bts)\", &entry->available, &m, &entry->missing_util);\n  679 |                 g_variant_unref (out_available);\n  680 |                 entry->mode = (ResizeFlags) m;\n  681 |                 g_hash_table_insert (cache, g_strdup (supported_fs[i]), entry);\n  682 |             }\n  683 |         }\n  684 |     }\n  685 |     G_UNLOCK (can_resize_lock);\n  686 | \n  687 |     result = g_hash_table_lookup (cache, fstype);\n  688 |     if (mode_out != NULL)\n  689 |         *mode_out = result ? result->mode : 0;\n  690 | \n  691 |     if (missing_util_out != NULL)\n  692 |         *missing_util_out = result ? g_strdup (result->missing_util) : NULL;\n  693 | \n  694 |     return result ? result->available : FALSE;\n  695 | }","lines":42,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.c#L654-695"},{"ref":"src/libgdu/gduutils.c:687-694","code":"  687 |     result = g_hash_table_lookup (cache, fstype);\n  688 |     if (mode_out != NULL)\n  689 |         *mode_out = result ? result->mode : 0;\n  690 | \n  691 |     if (missing_util_out != NULL)\n  692 |         *missing_util_out = result ? g_strdup (result->missing_util) : NULL;\n  693 | \n  694 |     return result ? result->available : FALSE;","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.c#L687-694"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"estimator add_sample rotates the whole Vec left then pops to drop the oldest sample when at capacity (samples.rotate_left(1); samples.pop()). rotate_left(1) is O(n) and shifts every element; with MAX_SAMPLES=50 it is trivial, but a VecDeque (push_back / pop_front) would express the ring buffer intent in O(1) and avoid the misleading rotate-then-pop dance.","fix":"Use a VecDeque and pop_front when full, or simply samples.remove(0); the current rotate_left+pop is an unusual way to drop the front.","locations":[{"ref":"src/disks/estimator.rs:64-67","code":"   64 |             if samples.len() == MAX_SAMPLES {\n   65 |                 samples.rotate_left(1);\n   66 |                 samples.pop();\n   67 |             }","lines":4,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/estimator.rs#L64-67"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"lookup_cleartext_device_for_crypto_device() enumerates ALL DBus objects (g_dbus_object_manager_get_objects) for every crypto block on every gdu_block_get_features() call to find a cleartext backing device. UDisks provides udisks_client_get_cleartext_block() which is O(1)-ish; the manual O(N) scan is run per block and per feature recompute.","fix":"Use udisks_client_get_cleartext_block() (already used in gdu_drive_add_decrypted) instead of scanning all objects.","locations":[{"ref":"src/disks/gdu-block.c:181-211","code":"  181 | static UDisksObject *\n  182 | lookup_cleartext_device_for_crypto_device (UDisksClient *client, const gchar *object_path)\n  183 | {\n  184 |     GDBusObjectManager *object_manager;\n  185 |     UDisksObject *ret;\n  186 |     GList *objects;\n  187 |     GList *l;\n  188 | \n  189 |     ret = NULL;\n  190 | \n  191 |     object_manager = udisks_client_get_object_manager (client);\n  192 |     objects = g_dbus_object_manager_get_objects (object_manager);\n  193 |     for (l = objects; l != NULL; l = l->next) {\n  194 |         UDisksObject *object = UDISKS_OBJECT (l->data);\n  195 |         UDisksBlock *block;\n  196 | \n  197 |         block = udisks_object_peek_block (object);\n  198 |         if (block == NULL)\n  199 |             continue;\n  200 | \n  201 |         if (g_strcmp0 (udisks_block_get_crypto_ba l":"Dead Code","severity":"low","easy":false,"description":"pretty_uri is an unimplemented public function containing todo!() and a comment calling it a duplicate of unfuse_path. If any code path ever reaches it, it panics. It is dead/unfinished API exposed publicly.","fix":"Remove pretty_uri, or implement it as a thin wrapper over unfuse_path.","locations":[{"ref":"src/libgdu/gduutils.rs:774-776","code":"  774 | pub fn pretty_uri(_file: gio::File) -> Option<String> {\n  775 |     todo!(\"Duplicate of unfuse_path\")\n  776 | }","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.rs#L774-776"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"attr_format_long_desc() takes a 'name' arg and declares localized_name which it never uses (only localized_desc is needed). attr_format_desc has a similar minor mismatch. Minor clutter / misleading.","fix":"Remove the unused localized_name variable and pass NULL for that out-param.","locations":[{"ref":"src/disks/gdu-ata-smart-dialog.c:626-640","code":"  626 | static gchar *\n  627 | attr_format_long_desc (gint id, const gchar *name)\n  628 | {\n  629 |     const gchar *localized_name;\n  630 |     const gchar *localized_desc;\n  631 |     gchar *ret;\n  632 | \n  633 |     if (!attribute_get_details (name, &localized_name, &localized_desc)) {\n  634 |         ret = g_strdup_printf (_(\"No description for attribute %d\"), id);\n  635 |     } else {\n  636 |         ret = g_strdup (localized_desc);\n  637 |     }\n  638 | \n  639 |     return ret;\n  640 | }","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-ata-smart-dialog.c#L626-640"}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"on_tree_selection_changed() is an empty callback (body fully e":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"#define _GNU_SOURCE appears after all #include directives, so it has no effect (feature-test macros must be defined before including system headers). It is effectively dead/misleading.","fix":"Move _GNU_SOURCE to the very top of the file before any includes, or remove it if not needed.","locations":[{"ref":"src/disks/gdu-new-disk-image-dialog.c:25","code":"   25 | #define _GNU_SOURCE","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-new-disk-image-dialog.c#L25"}]},{"id":"DEAD_10","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"Commented-out '#define MAX_SAMPLES 100' left above the active definition; leftover dead code.","fix":"Remove the commented-out line.","locations":[{"ref":"src/disks/gduestimator.c:18-19","code":"   18 | // #define MAX_SAMPLES 100\n   19 | #define MAX_SAMPLES 50","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gduestimator.c#L18-19"}]},{"id":"DEAD_11","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"gduutils.c has a stray '#pragma GCC diagnostic pop' guarded by __GNUC_PREREQ with no matching 'push' anywhere in the file. This is leftover/dead preprocessor code that does nothing meaningful (an unbalanced pop) and is confusing.","fix":"Remove the orphaned diagnostic pop block, or restore the matching push if it was intended.","locations":[{"ref":"src/libgdu/gduutils.c:856-860","code":"  856 | #ifdef __GNUC_PREREQ\n  857 | #if __GNUC_PREREQ(4, 6)\n  858 | #pragma GCC diagnostic pop\n  859 | #endif\n  860 | #endif","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/libgdu/gduutils.c#L856-860"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The monotonic cubic interpolation comment in draw_curve() describes tangent init as 'm_k = (s_k-1 / s_k) / 2' and factors 'a_k = (m_k-1 / s_k)', but the code computes m = (prev_slope + slope) / 2.0 (an average, i.e. a sum, not a division of slopes) and a = prev_m / prev_slope. The comment's formulas contradict the implementation and will mislead maintainers.","fix":"Correct the comment to match the actual Fritsch-Carlson formulas used (averaged secant slopes, alpha=prev_m/prev_slope, beta=m/prev_slope).","locations":[{"ref":"src/disks/gdu-benchmark-dialog.c:570-585","code":"  570 |     /*\n  571 |      * For smoothing, use monotonic cubic interpolation\n  572 |      * Step 1: Compute slopes of the secant line between successive points\n  573 |      *         s_k = (y_k+1 - y_k) / (x_k+1 - x_k)\n  574 |      * Step 2: Initialize tangent as the average of successive secant slopes\n  575 |      *         m_k = (s_k-1 / s_k) / 2\n  576 |      * Step 3: Initialize factors alpha and beta as\n  577 |      *         a_k = (m_k-1 / s_k), b_k = (m_k / s_k)\n  578 |      * Step 4: The function a_k - ((2a_k + b_k - 3) ^ 2 / 3(a_k + b_k - 2)) must be positive\n  579 |      *         to ensure monotonicity\n  580 |      * Step 5: Easy way to do this is by scaling the vector (a_k, b_k) to a circle of radius 3\n  581 |      *         by some factor r\n  582 |      * Step 6: Rescale the tangents (m_k and m_k-1) by the factor r\n  583 |      * Step 7: Now you have the tangents to get a hermite spline. Use it to find the bezier\n  584 |      *         Control Points for the curve\n  585 |      */","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L570-585"},{"ref":"src/disks/gdu-benchmark-dialog.c:609-641","code":"  609 |         slope = (y3 - y0) / (x3 - x0);\n  610 | \n  611 |         // initialize tangents as average of slopes\n  612 |         if (n == 0 || n == n_samples - 1) {\n  613 |             m = slope;\n  614 |         } else {\n  615 |             if ((prev_slope > 0 && slope < 0) || (prev_slope < 0 && slope > 0))\n  616 |                 m = 0;\n  617 |             else\n  618 |                 m = (prev_slope + slope) / 2.0;\n  619 |         }\n  620 | \n  621 |         if (slope == 0) {\n  622 |             prev_slope = 0;\n  623 |             m = 0;\n  624 |         }\n  625 | \n  626 |         a = prev_m / prev_slope;\n  627 |         b = m / prev_slope;\n  628 | \n  629 |         // scale down tangents to ensure monotonicity\n  630 |         if ((a * a + b * b) > 3 * 3) {\n  631 |             r = 3 / sqrt (a * a + b * b);\n  632 |             prev_m = r * a * prev_slope;\n  633 |             m = r * b * prev_slope;\n  634 |         }\n  635 | \n  636 |         // calculate bezier control points\n  637 |         x1 = x0 + (x3 - x0) / 3;\n  638 |         x2 = x3 - (x3 - x0) / 3;\n  639 | \n  640 |         y1 = y0 + ((1.0 / 3.0) * (x3 - x0) * prev_m);\n  641 |         y2 = y3 - ((1.0 / 3.0) * (x3 - x0) * m);","lines":33,"link":"https://gitlab.gnome.org/GNOME/gnome-disk-utility/-/blob/afcfbccbfe28d14f7a8e45f40407380423a29d21/src/disks/gdu-benchmark-dialog.c#L609-641"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment says 'Add 128KB to the size to account for floating point errors' but the value added (128*1024) is in bytes added to a byte size, not a correction in pixel space; the rationale is inaccurate and confusing for maintainers.","fix":"Reword the comment to describe the actual intent, or remove the fudge factor and round the pixel result instead.","locations":[{"ref":"src/disks/gdu-space-allocation-bar.c:96-97","code":"   96 |         /* Add 128KB to the size to account for floating point errors */\n   97 |         size = width * (gdouble) (gdu_item_get_size (GDU_ITEM (block)) + 128
