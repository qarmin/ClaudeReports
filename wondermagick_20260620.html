<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"crop_on_load() calls image.crop(rect) with a rect built directly from user-supplied geometry without bounds-checking. The code's own comment acknowledges this can panic later because `image` does not clamp the crop rectangle (image-rs/image#2296). A crop offset/size extending past the image bounds is reachable from CLI input and will panic deep inside the image crate.","fix":"Clamp the rect to the image bounds before calling crop: clamp x/y to [0, width/height) and width/height to the remaining extent, or detect out-of-bounds and return a MagickError. Do not rely on the upstream crate to validate.","locations":[{"ref":"src/operations/crop.rs:9-25","code":"    9 |     // Sadly this doesn't check bounds right now, so we can get panics later on because of wrong crop parameters:\n   10 |     // https://github.com/image-rs/image/issues/2296\n   11 |     // TODO: change this in `image` because I don't want to emulate this on the client side\n   12 |     // and pretend the problem doesn't exist for anyone else\n   13 |     let rect = image::math::Rect {\n   14 |         x: geom.xoffset,\n   15 |         y: geom.yoffset,\n   16 |         width: geom.width,\n   17 |         height: geom.height,\n   18 |     };\n   19 |     // crop_in_place exists but doesn't shrink the backing buffer,\n   20 |     // so we have to either allocate the large buffer and keep it around forever\n   21 |     // (lower peak memory usage) or allocate both large and small buffer but drop the large one\n   22 |     // (higher peak memory usage, quickly goes down later).\n   23 |     // This takes the second option, but we might reconsider later if there's compelling evidence.\n   24 |     let cropped = image.crop(rect);\n   25 |     *image = cropped;","lines":17,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/crop.rs#L9-L25"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"crop() panics outright on two reachable, user-triggerable code paths: percentage crop geometry (`panic!(\"Percentage crop is not yet implemented\")`) and negative crop offsets (`.expect(\"negative crop offsets are not yet implemented\")` on the try_into of xoffset/yoffset). Both percentage mode and negative offsets are valid ImageMagick crop geometries that a user can type on the command line, so this aborts the whole process with a panic instead of returning a MagickError.","fix":"Return a MagickError (wm_err!) for the not-yet-implemented cases instead of panicking, so the CLI reports a clean error and exits with a non-zero status.","locations":[{"ref":"src/operations/crop.rs:31-33","code":"   31 |     if geom.percentage_mode {\n   32 |         panic!(\"Percentage crop is not yet implemented\")\n   33 |     }","lines":3,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/crop.rs#L31-L33"},{"ref":"src/operations/crop.rs:40-49","code":"   40 |         xoffset: area\n   41 |             .xoffset\n   42 |             .unwrap_or(0)\n   43 |             .try_into()\n   44 |             .expect(\"negative crop offsets are not yet implemented\"),\n   45 |         yoffset: area\n   46 |             .yoffset\n   47 |             .unwrap_or(0)\n   48 |             .try_into()\n   49 |             .expect(\"negative crop offsets are not yet implemented\"),","lines":10,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/crop.rs#L40-L49"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"resize_impl() uses `ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap()` in ten branches. This unwraps None if the resampler returns a buffer whose length does not match dst_width*dst_height*channels. While normally the resampler returns a correctly sized buffer, the unwrap turns any size mismatch (e.g. an upstream resampler bug or a zero-dimension edge case) into a panic rather than a recoverable error.","fix":"Replace the .unwrap() with an explicit check that returns a MagickError (e.g. \"internal resize size mismatch\") when from_raw returns None, or assert the invariant with a descriptive message.","locations":[{"ref":"src/operations/resize.rs:91-144","code":"   91 |     match image {\n   92 |         DynamicImage::ImageLuma8(src) => {\n   93 |             let resized = wm_try!(resize_plane8(src.as_raw(), src_size, dst_size, alg));\n   94 |             *src = ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap();\n   95 |         }\n   96 |         DynamicImage::ImageLumaA8(src) => {\n   97 |             let resized = wm_try!(resize_plane8_with_alpha(\n   98 |                 src.as_raw(),\n   99 |                 src_size,\n  100 |                 dst_size,\n  101 |                 alg\n  102 |             ));\n  103 |             *src = ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap();\n  104 |         }\n  105 |         DynamicImage::ImageRgb8(src) => {\n  106 |             let resized = wm_try!(resize_rgb8(src.as_raw(), src_size, dst_size, alg));\n  107 |             *src = ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap();\n  108 |         }\n  109 |         DynamicImage::ImageRgba8(src) => {\n  110 |             let resized = wm_try!(resize_rgba8(src.as_raw(), src_size, dst_size, alg));\n  111 |             *src = ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap();\n  112 |         }\n  113 |         DynamicImage::ImageLuma16(src) => {\n  114 |             let resized = wm_try!(resize_plane16(src.as_raw(), src_size, dst_size, 16, alg));\n  115 |             *src = ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap();\n  116 |         }\n  117 |         DynamicImage::ImageLumaA16(src) => {\n  118 |             let resized = wm_try!(resize_plane16_with_alpha(\n  119 |                 src.as_raw(),\n  120 |                 src_size,\n  121 |                 dst_size,\n  122 |                 16,\n  123 |                 alg\n  124 |             ));\n  125 |             *src = ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap();\n  126 |         }\n  127 |         DynamicImage::ImageRgb16(src) => {\n  128 |             let resized = wm_try!(resize_rgb16(src.as_raw(), src_size, dst_size, 16, alg));\n  129 |             *src = ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap();\n  130 |         }\n  131 |         DynamicImage::ImageRgba16(src) => {\n  132 |             let resized = wm_try!(resize_rgba16(src.as_raw(), src_size, dst_size, 16, alg));\n  133 |             *src = ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap();\n  134 |         }\n  135 |         DynamicImage::ImageRgb32F(src) => {\n  136 |             let resized = wm_try!(resize_rgb_f32(src.as_raw(), src_size, dst_size, alg));\n  137 |             *src = ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap();\n  138 |         }\n  139 |         DynamicImage::ImageRgba32F(src) => {\n  140 |             let resized = wm_try!(resize_rgba_f32(src.as_raw(), src_size, dst_size, alg));\n  141 |             *src = ImageBuffer::from_raw(dst_width, dst_height, resized).unwrap();\n  142 |         }\n  143 |         _ => unreachable!(),\n  144 |     }","lines":54,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/resize.rs#L91-L144"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"Frame selection on an input file (e.g. `wm-convert 'in.png[5]' out.png`) reaches an explicit `panic!(\"frame selection is not yet supported\")`. This is a normal, user-reachable CLI input path, so it aborts with a panic and backtrace instead of producing a clean `wondermagick:`-prefixed error like every other unsupported option.","fix":"Return a `MagickError` (via `wm_err!`) for unsupported frame selection instead of `panic!`. `add_input_file` would need to return `Result` so the error can propagate, matching the rest of the argument-handling flow.","locations":[{"ref":"src/plan.rs:288-291","code":"  288 |                 FrameSelect(s) => {\n  289 |                     if s != OsStr::new(\"0\") {\n  290 |                         panic!(\"frame selection is not yet supported\");\n  291 |                     }","lines":4,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/plan.rs#L288-L291"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Ok(false) => unreachable!()` assumes that any regular (non-directory) file was already returned by an earlier `ready_to_return` check. That holds only if `is_dir` is a pure function returning identical results across the multiple calls. In production `is_dir` performs real filesystem I/O (`std::fs::metadata`), so a TOCTOU race - a file appearing at `path` between the earlier `ready_to_return` check and this final `is_dir` call - makes the final `is_dir` return `Ok(false)` and aborts the process via the `unreachable!` panic on attacker/environment-controlled input.","fix":"Replace `unreachable!()` with a graceful fallback, e.g. return the path as a `Location::Path` (the decoder will handle it later) or return a normal error, instead of panicking.","locations":[{"ref":"src/arg_parsers/filename.rs:177-178","code":"  177 |             // A normal file would have been returned earlier\n  178 |             Ok(false) => unreachable!(),","lines":2,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/filename.rs#L177-L178"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`is_opaque` has an `unreachable!()` fallback arm. It is only safe because it enumerates all current `DynamicImage` variants. If the `image` crate adds a new color variant (the project tracks `image` from git and the commit message notes upcoming metadata interface changes), `to_8bit_rgb_maybe_a` -> `is_opaque` can reach the `unreachable!()` and panic at runtime on a perfectly valid image. The same fragility exists in `dynimage_to_color`'s `unreachable!()`.","fix":"Replace `unreachable!()` with a graceful fallback (e.g. treat unknown formats as not-opaque / convert via to_rgba8), or assert the exhaustiveness at compile time, so a new upstream variant cannot panic the CLI.","locations":[{"ref":"src/encoders/common/pixel_format_optimization.rs:62","code":"   62 |         _ => unreachable!(),","lines":1,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/common/pixel_format_optimization.rs#L62"},{"ref":"src/encoders/common/pixel_format_optimization.rs:187","code":"  187 |             _ => unreachable!(),","lines":1,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/common/pixel_format_optimization.rs#L187"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"unpremultiply_alpha() ends its match with `_ => todo!()` while the parallel functions premultiply_alpha() and has_constant_alpha() use `_ => unreachable!()`. Both are reached for the same set of color types, so the `todo!()` is inconsistent and, if ever hit (e.g. a new DynamicImage variant), produces a misleading 'not yet implemented' panic instead of the intended 'unreachable' invariant.","fix":"Change `_ => todo!()` to `_ => unreachable!()` to match the sibling match arms and express the actual invariant.","locations":[{"ref":"src/operations/resize.rs:197","code":"  197 |         _ => todo!(),","lines":1,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/resize.rs#L197"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Parsed floating-point dimensions are converted to integers with `f.round() as u32` / `as u64`. Rust's float-to-int `as` cast saturates rather than panicking, so a user-supplied dimension like `5000000000` silently becomes `u32::MAX` and a value like `1e300@` becomes `u64::MAX`, producing a wildly wrong target size instead of an error. Negative offsets are clamped to 0 for unsigned crop fields. The silent saturation can lead to absurd allocations or wrong output rather than a clean rejection.","fix":"Range-check the rounded float before casting (e.g. reject if it exceeds the target integer's max, or use `try_into`/explicit bounds) so out-of-range dimensions become a parse error matching ImageMagick rather than silently saturating.","locations":[{"ref":"src/arg_parsers/resize.rs:166","code":"  166 |                 target = ResizeTarget::Area(width.round() as u64);","lines":1,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/resize.rs#L166"},{"ref":"src/arg_parsers/resize.rs:202-213","code":"  202 |                 let width = geom.width.map(|f| f.round() as u32);\n  203 |                 let height = geom.height.map(|f| f.round() as u32);\n  204 |                 // passing any single dimension (width or height) will cause imagemagick\n  205 |                 // to apply this rule to both dimensions\n  206 |                 let width = width.unwrap_or_else(|| height.unwrap());\n  207 |                 let height = height.unwrap_or(width);\n  208 |                 target = ResizeTarget::FullyCover { width, height }\n  209 |             }\n  210 |         } else {\n  211 |             // convert floats that imagemagick FOR SOME REASON accepts as dimensions to integers\n  212 |             let width = geom.width.map(|f| f.round() as u32); // imagemagick rounds to nearest\n  213 |             let height = geom.height.map(|f| f.round() as u32); // imagemagick rounds to nearest","lines":12,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/resize.rs#L202-L213"},{"ref":"src/arg_parsers/crop.rs:47-50","code":"   47 |             width: geom.width.map(|f| f.round() as u32),\n   48 |             height: geom.height.map(|f| f.round() as u32),\n   49 |             xoffset: geom.xoffset.map(|f| f.round() as i32),\n   50 |             yoffset: geom.yoffset.map(|f| f.round() as i32),","lines":4,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/crop.rs#L47-L50"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In thumbnail() the target dimensions are multiplied by 5 (`dst_width * 5`, `dst_height * 5`) with plain u32 arithmetic. For very large requested thumbnail dimensions (dst_width > 858_993_459) this multiplication overflows u32. In debug builds it panics; in release builds it wraps to a small value, silently producing a wrong intermediate downscale size. Resize geometry can legally request dimensions up to u32::MAX, so this is reachable from user input.","fix":"Use saturating arithmetic, e.g. `dst_width.saturating_mul(5)` and `dst_height.saturating_mul(5)`, or compute in u64 and clamp back to u32.","locations":[{"ref":"src/operations/resize.rs:53-54","code":"   53 |     let width = image.width().min(dst_width * 5);\n   54 |     let height = image.height().min(dst_height * 5);","lines":2,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/resize.rs#L53-L54"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"apply_blue_noise_scatter() computes the error-buffer length as `(width + 2) as usize * height as usize`. `width + 2` is evaluated in u32 before the cast, so for width >= u32::MAX-1 the addition overflows (debug panic / release wrap). The same `(width + 2)` u32 expression is recomputed inside the hot loop at the index math. Such widths are not allocatable as an actual image, but the arithmetic is still unguarded.","fix":"Cast width to usize before adding 2, e.g. `let stride = width as usize + 2;` and reuse `stride` throughout, so the addition cannot overflow u32.","locations":[{"ref":"src/operations/monochrome.rs:162","code":"  162 |     let mut errors = vec![0.0f32; (width + 2) as usize * height as usize];","lines":1,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/monochrome.rs#L162"},{"ref":"src/operations/monochrome.rs:166","code":"  166 |             let idx = (y * (width + 2) + x + 1) as usize;","lines":1,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/monochrome.rs#L166"},{"ref":"src/operations/monochrome.rs:206-207","code":"  206 |                 errors[idx + (width + 2) as usize - 1] += tuned_error * 0.25; // Bottom-Left\n  207 |                 errors[idx + (width + 2) as usize] += tuned_error * 0.25; // Bottom","lines":2,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/monochrome.rs#L206-L207"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":true,"description":"`Fraction::to_float` casts `u32` numerator/denominator to f64 and divides without checking for a zero denominator. `Fraction::new` and `reciprocal` impose no non-zero invariant (reciprocal of 0/x produces x/0), so `to_float` can produce inf/NaN silently, and `cross_multiply`-based Ord/Eq on a denominator-0 fraction yields a meaningless ordering. No panic, but it is an unguarded math invariant that callers may not expect.","fix":"Document the zero-denominator behavior, or guard `new`/`reciprocal` against a zero denominator, so downstream comparisons and to_float cannot silently produce NaN/inf.","locations":[{"ref":"src/utils/fraction.rs:57-60","code":"   57 |     pub fn to_float(&self) -> f64 {\n   58 |         // We could reduce the fraction first for greater precision, but it's not clear if this will matter in practice\n   59 |         self.numerator as f64 / self.denominator as f64\n   60 |     }","lines":4,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/utils/fraction.rs#L57-L60"},{"ref":"src/utils/fraction.rs:17-22","code":"   17 |     pub fn reciprocal(&self) -> Self {\n   18 |         Fraction {\n   19 |             numerator: self.denominator,\n   20 |             denominator: self.numerator,\n   21 |         }\n   22 |     }","lines":6,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/utils/fraction.rs#L17-L22"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The `rgb` colorspace is mapped to `ColorModel::Luma` (grayscale), not `ColorModel::Rgb`. In ImageMagick `-colorspace RGB` is linear-light RGB and `-colorspace sRGB` is gamma-encoded RGB; neither is grayscale. Only `gray`/`lineargray` should map to Luma. This looks like a copy-paste from the `gray`/`lineargray` arms and will silently convert color images to grayscale when the user asks for the RGB colorspace. The `srgb`/`displayp3` arms correctly use `ColorModel::Rgb`, making `rgb` clearly inconsistent.","fix":"Change the `rgb` arm to use `color: ColorModel::Rgb` (keeping `Cicp::SRGB_LINEAR`), so linear RGB stays a 3-channel color model rather than collapsing to Luma.","locations":[{"ref":"src/arg_parsers/colorspace.rs:46-49","code":"   46 |             \"rgb\" => Ok(Colorspace {\n   47 |                 cicp: Cicp::SRGB_LINEAR,\n   48 |                 color: ColorModel::Luma,\n   49 |             }),","lines":4,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/colorspace.rs#L46-L49"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"AVIF quality is converted with `modifiers.quality.map(|q| q as u8)` with no range clamping. AVIF expects quality in 0..=100, but `q as u8` is a saturating cast to u8: a quality of e.g. 200 becomes 200 (out of the valid 0..=100 range), 300 saturates to 255, and a negative quality becomes 0. Unlike the JPEG encoder (which has a dedicated convert_quality that clamps to 0..=100), AVIF passes garbage straight to the encoder. The TODO on the preceding line acknowledges it may not be bug-compatible with imagemagick, but the lack of clamping is an outright correctness issue.","fix":"Clamp/convert the quality the same way JPEG does, e.g. reuse a shared `convert_quality` helper that maps the f64 into 0..=100 before casting to u8, instead of `q as u8`.","locations":[{"ref":"src/encoders/avif.rs:13-15","code":"   13 |     // TODO: quality conversion might not be bug-compatible with imagemagick\n   14 |     let quality = modifiers.quality.map(|q| q as u8).unwrap_or(50);\n   15 |     let mut encoder = AvifEncoder::new_with_speed_quality(writer, 4, quality);","lines":3,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/avif.rs#L13-L15"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"JPEG output runs `optimize_pixel_format` (the variant that deliberately does NOT reduce 16-bit to 8-bit) on the pixels before handing them to JpegEncoder. JPEG is fundamentally an 8-bit format, so any 16-bit input is passed to the encoder still at 16 bits, relying on the encoder to silently down-convert. This both (a) wastes the grayscale/alpha optimization opportunity at the right bit depth and (b) leaves the actual 16->8 reduction to whatever the encoder does, which may differ from imagemagick. Compare png.rs which explicitly coerces precision first. The choice of the non-precision-reducing variant for an 8-bit-only format looks unintended.","fix":"Use `optimize_pixel_format_and_precision` for JPEG (it is an 8-bit format), or otherwise explicitly coerce to 8-bit before encoding, matching the precision handling done for PNG.","locations":[{"ref":"src/encoders/jpeg.rs:22-23","code":"   22 |     let pixels_to_write = optimize_pixel_format(&image.pixels);\n   23 |     wm_try!(pixels_to_write.write_with_encoder(encoder));","lines":2,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/jpeg.rs#L22-L23"},{"ref":"src/encoders/common/pixel_format_optimization.rs:25-27","code":"   25 | pub(crate) fn optimize_pixel_format(image: &DynamicImage) -> Cow<'_, DynamicImage> {\n   26 |     optimize_pixel_format_inner(image, false)\n   27 | }","lines":3,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/common/pixel_format_optimization.rs#L25-L27"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"WebP quality is taken as `modifiers.quality.unwrap_or(75.0) as f32` with no range validation. A negative quality (e.g. -50) or an out-of-range quality (>100) is passed straight to `EncoderConfig::quality`, which expects 0.0..=100.0. JPEG and PNG validate/clamp quality; WebP does not. Also `lossless` is only enabled when quality is *exactly* 100.0, so 99.9 or any quality the user expects to be near-lossless silently becomes lossy.","fix":"Clamp the quality into 0.0..=100.0 (and reject/normalize negatives) before passing to EncoderConfig, mirroring the validation done in jpeg.rs and png.rs.","locations":[{"ref":"src/encoders/webp.rs:16-20","code":"   16 |     let lossless = modifiers.quality == Some(100.0);\n   17 |     // default quality is not documented, was determined experimentally\n   18 |     let quality = modifiers.quality.unwrap_or(75.0) as f32;\n   19 | \n   20 |     let mut config = EncoderConfig::new().quality(quality).lossless(lossless);","lines":5,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/webp.rs#L16-L20"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"combine() lets the first image dictate the output dimensions (width/height from first.pixels), then for every subsequent image inserts its grayscale data using that image's own width (`insert_w`) as the source row stride while writing into rows of the output stride (`width`). When a later image has a different width or height than the first, insert_channel zips mismatched row lengths, so pixels are written misaligned (shifted/garbled) rather than cropped or rejected. There is no validation that the images share dimensions.","fix":"Either require all input images to share the first image's dimensions (return a MagickError otherwise) or correctly crop/pad each source plane to the output dimensions before inserting, instead of relying on zip truncation.","locations":[{"ref":"src/operations/combine.rs:82-139","code":"   82 |     let (width, height) = first.pixels.dimensions();\n   83 |     let pixels = image::DynamicImage::new(width, height, color_type);\n   84 | \n   85 |     let mut image = Image {\n   86 |         format: first.format,\n   87 |         exif: core::mem::take(&mut first.exif),\n   88 |         xmp: core::mem::take(&mut first.xmp),\n   89 |         icc: core::mem::take(&mut first.icc),\n   90 |         pixels,\n   91 |         properties: first.properties.clone(),\n   92 |     };\n   93 |     image.properties.color_type = color_type.into();\n   94 | \n   95 |     // We store this as bytes to avoid monomorphizing the channel iteration loop itself over the\n   96 |     // channel types that we support, which would be unnecessary code bloat.\n   97 |     let pixel_bytes = as_mut_bytes(&mut image.pixels);\n   98 | \n   99 |     for (idx, img) in images.iter().enumerate() {\n  100 |         // The first image dictates the size of the output image.\n  101 |         let (insert_w, _h) = img.pixels.dimensions();\n  102 |         let (im_l8, im_l16, im_l32f);\n  103 | \n  104 |         match ch_type {\n  105 |             ChannelType::U8 => {\n  106 |                 im_l8 = img.pixels.to_luma8();\n  107 |                 insert_channel_with_count::<u8>(\n  108 |                     ch_count,\n  109 |                     idx,\n  110 |                     bytemuck::cast_slice_mut(pixel_bytes),\n  111 |                     width as usize,\n  112 |                     im_l8.as_raw(),\n  113 |                     insert_w as usize,\n  114 |                 );\n  115 |             }\n  116 |             ChannelType::U16 => {\n  117 |                 im_l16 = img.pixels.to_luma16();\n  118 |                 insert_channel_with_count::<u16>(\n  119 |                     ch_count,\n  120 |                     idx,\n  121 |                     bytemuck::cast_slice_mut(pixel_bytes),\n  122 |                     width as usize,\n  123 |                     im_l16.as_raw(),\n  124 |                     insert_w as usize,\n  125 |                 );\n  126 |             }\n  127 |             ChannelType::U32 => {\n  128 |                 im_l32f = img.pixels.to_luma32f();\n  129 |                 insert_channel_with_count::<f32>(\n  130 |                     ch_count,\n  131 |                     idx,\n  132 |                     bytemuck::cast_slice_mut(pixel_bytes),\n  133 |                     width as usize,\n  134 |                     im_l32f.as_raw(),\n  135 |                     insert_w as usize,\n  136 |                 );\n  137 |             }\n  138 |         };\n  139 |     }","lines":58,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/combine.rs#L82-L139"},{"ref":"src/operations/combine.rs:167-196","code":"  167 | fn insert_channel<Ch: Copy, const CHANNELS: usize>(\n  168 |     idx: usize,\n  169 |     matrix: &mut [Ch],\n  170 |     stride: usize,\n  171 |     data: &[Ch],\n  172 |     width: usize,\n  173 | ) {\n  174 |     assert!(idx < CHANNELS);\n  175 |     let (matrix, tail) = matrix[idx..].as_chunks_mut::<CHANNELS>();\n  176 | \n  177 |     // *not* `chunks_exact_mut` because the last row of pixels may be incomplete from the `idx`\n  178 |     // index shift.\n  179 |     let lhs_rows = matrix.chunks_mut(stride);\n  180 |     let rhs_rows = data.chunks_exact(width);\n  181 | \n  182 |     // The last pixel (group of CHANNELS samples) is incomplete in `lhs_rows` if `idx > 0`. If it\n  183 |     // should be assigned to then we need to handle it separately. It is not assigned if we do not\n  184 |     // have enough rows or if the grayscale width is smaller than the stride.\n  185 |     let assigns_tail = rhs_rows.len() >= lhs_rows.len() && stride >= width;\n  186 | \n  187 |     for (lhs_row, rhs_row) in lhs_rows.zip(rhs_rows) {\n  188 |         for (target, source) in lhs_row.iter_mut().zip(rhs_row) {\n  189 |             target[0] = *source;\n  190 |         }\n  191 |     }\n  192 | \n  193 |     if assigns_tail && !tail.is_empty() {\n  194 |         tail[0] = *data.last().unwrap();\n  195 |     }\n  196 | }","lines":30,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/combine.rs#L167-L196"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"monochrome() hardcodes tuning constants that intentionally diverge from the IM6 -monochrome algorithm it claims to replicate: THRESHOLD_JITTER = 100.0 adds heavy blue-noise jitter to the threshold, and the dither distribution uses a 'Sierra Lite' kernel (0.5 right, 0.25 bottom-left, 0.25 bottom) instead of Floyd-Steinberg. The doc comment says it matches ImageMagick 6, but the output will differ noticeably. Either the comment or the implementation is wrong.","fix":"Reconcile the implementation with the documented IM6 behavior (use Floyd-Steinberg and a zero or documented jitter), or correct the doc comments to state that the output is an approximation, not a match.","locations":[{"ref":"src/operations/monochrome.rs:14-18","code":"   14 | //   0.0: Pure Math (No Jitter)\n   15 | //  20.0 to 60.0: Subtle Breakup\n   16 | //  80.0 to 140.0: The \"Film Grain\" Sweet Spot\n   17 | // 150.0 to 255.0: Heavy Noise\n   18 | const THRESHOLD_JITTER: f32 = 100.0;","lines":5,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/monochrome.rs#L14-L18"},{"ref":"src/operations/monochrome.rs:200-208","code":"  200 | \n  201 |             // Tight Sierra Lite distribution\n  202 |             if x < width - 1 {\n  203 |                 errors[idx + 1] += tuned_error * 0.5; // Right\n  204 |             }\n  205 |             if y < height - 1 {\n  206 |                 errors[idx + (width + 2) as usize - 1] += tuned_error * 0.25; // Bottom-Left\n  207 |                 errors[idx + (width + 2) as usize] += tuned_error * 0.25; // Bottom\n  208 |             }","lines":9,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/monochrome.rs#L200-L208"},{"ref":"src/operations/monochrome.rs:41-53","code":"   41 | /// Two-color quantization matching ImageMagick 6's `-monochrome` behavior.\n   42 | ///\n   43 | /// IM6 does not dither between pure 0 and 255. Instead it finds two\n   44 | /// representative gray levels (cluster centroids) from the image histogram,\n   45 | /// then dithers only between those. Pixels darker than the dark centroid\n   46 | /// are hard-thresholded to black, pixels brighter than the light centroid\n   47 | /// are hard-thresholded to white, and only the tones in between get dithered.\n   48 | ///\n   49 | /// The DITHER_BAND_SHADOW_EXPANSION and DITHER_BAND_HIGHLIGHT_EXPANSION\n   50 | /// constants let you widen the dither range beyond the centroids.\n   51 | /// At 0.0 you get the IM6-like hard threshold at the extremes.\n   52 | /// At 1.0 the dither band reaches all the way to 0 or 255, giving\n   53 | /// full graduation in shadows or highlights respectively.","lines":13,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/monochrome.rs#L41-L53"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"negate() calls image.pixels.invert(), which on RGBA/LumaA images also inverts the alpha channel in the image crate. ImageMagick's -negate by default negates only the color channels and leaves alpha untouched (alpha is only negated with the +channel/-channel alpha selector). This makes transparent regions become opaque and vice versa, diverging from ImageMagick behavior.","fix":"Negate only the color channels, preserving the alpha channel, to match ImageMagick's default -negate semantics.","locations":[{"ref":"src/operations/negate.rs:3-6","code":"    3 | pub fn negate(image: &mut Image) -> Result<(), MagickError> {\n    4 |     image.pixels.invert();\n    5 |     Ok(())\n    6 | }","lines":4,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/negate.rs#L3-L6"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The blur-geometry parser swallows a failed radius parse silently: in the two-part `AxB` case, when radius fails to parse but sigma succeeds, it returns `Ok` with a default radius instead of an error. So `fooxbar`-style garbage in the radius position (`abcx1.5`) is accepted rather than rejected. Combined with the empty-string error message at line 24 claiming the value must be 'ASCII only' (the check is actually `is_empty`, unrelated to ASCII), the error reporting here is misleading.","fix":"Decide intentionally whether an unparseable radius should be ignored; if not, propagate the error. Fix the empty-input message to say the value must be non-empty (the ASCII check is separate).","locations":[{"ref":"src/arg_parsers/blur_geometry.rs:44-47","code":"   44 |                     (Err(_), Ok(sigma)) => Ok(Self {\n   45 |                         sigma,\n   46 |                         ..Default::default()\n   47 |                     }),","lines":4,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/blur_geometry.rs#L44-L47"},{"ref":"src/arg_parsers/blur_geometry.rs:22-26","code":"   22 |         if s.is_empty() {\n   23 |             return Err(ArgParseErr::with_msg(\n   24 |                 \"blur geometry must be non-empty and ASCII only\",\n   25 |             ));\n   26 |         }","lines":5,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/blur_geometry.rs#L22-L26"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Metadata extraction errors from the decoder are silently swallowed: `exif_metadata()`, `xmp_metadata()`, and `icc_profile()` all return `Result<Option<_>>`, but `.unwrap_or(None)` collapses a genuine read error (e.g. a malformed EXIF/ICC block) into 'no metadata'. For a tool that advertises metadata correctness/privacy as a feature, silently dropping a profile the user may expect to be preserved is surprising and undiagnosable.","fix":"At minimum, distinguish error from absence - log a diagnostic to stderr when the result is `Err`, or propagate it where appropriate. If silent dropping is the intended IM-compatible behavior, add a comment stating so.","locations":[{"ref":"src/decode.rs:44-46","code":"   44 |     let exif = decoder.exif_metadata().unwrap_or(None);\n   45 |     let xmp = decoder.xmp_metadata().unwrap_or(None);\n   46 |     let icc = decoder.icc_profile().unwrap_or(None);","lines":3,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/decode.rs#L44-L46"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The GIF encoder ignores image metadata entirely: it never calls `write_metadata`, so EXIF/XMP/ICC present on the input `Image` are silently dropped on GIF output, whereas every other encoder (jpeg, png, tiff, avif, webp) preserves it. GIF can carry application/comment extension blocks, so at minimum this is silently lossy and inconsistent with the other encoders. The `_modifiers` argument is also completely ignored (quality has no effect).","fix":"Document explicitly why metadata cannot be embedded for GIF (if the `image` crate's GifEncoder genuinely cannot), or call write_metadata where supported. At minimum add a comment explaining the intentional drop so it isn't mistaken for an oversight.","locations":[{"ref":"src/encoders/gif.rs:7-15","code":"    7 | pub fn encode<W: Write>(\n    8 |     image: &Image,\n    9 |     writer: &mut W,\n   10 |     _modifiers: &Modifiers,\n   11 | ) -> Result<(), MagickError> {\n   12 |     // speed needs to be set manually due to https://github.com/image-rs/image/issues/2506\n   13 |     let encoder = GifEncoder::new_with_speed(writer, 10);\n   14 |     wm_try!(image.pixels.write_with_encoder(encoder));\n   15 |     Ok(())","lines":9,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/gif.rs#L7-L15"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"identify_impl() for Var::ImageFileFormat silently writes nothing when image.format is None (the `if let Some(...)` has no else). With the default template this leaves a stray double space in the output line where the format token should be, producing malformed identify output instead of a placeholder or error, diverging from ImageMagick which prints the detected/declared format.","fix":"Emit a placeholder (e.g. the file extension or 'unknown') when the format is None, matching ImageMagick output, instead of writing nothing.","locations":[{"ref":"src/operations/identify.rs:61-65","code":"   61 |             Token::Var(Var::ImageFileFormat) => {\n   62 |                 if let Some(format) = image.format.map(|f| f.extensions_str()[0].to_uppercase()) {\n   63 |                     wm_try!(write!(writer, \"{}\", format));\n   64 |                 }\n   65 |             }","lines":5,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/identify.rs#L61-L65"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":true,"description":"`parse_numeric_arg` discards the underlying parse error twice (`map_err(|_e| ArgParseErr::new())`), producing an `ArgParseErr` with no message. Since the surrounding error display falls back to echoing the raw value, the user gets no hint about why a numeric argument was rejected (e.g. overflow vs. non-numeric).","fix":"Propagate a descriptive message via `ArgParseErr::with_msg(e)` so the failure reason is preserved, consistent with the other parsers in this module.","locations":[{"ref":"src/arg_parsers/numbers.rs:10-11","code":"   10 |     let string: &str = input.try_into().map_err(|_e| ArgParseErr::new())?;\n   11 |     strip_and_parse_number(string).map_err(|_e| ArgParseErr::new())","lines":2,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/numbers.rs#L10-L11"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"unsharpen() ignores the parsed gain/amount field of UnsharpenGeometry (the field is marked unused) and calls image.unsharpen(sigma, threshold). ImageMagick's unsharpen formula scales the high-pass mask by the gain/amount parameter, so any user-supplied amount (e.g. `-unsharpen 2x1.5+0.8+0.05`) is silently discarded and the sharpening strength is wrong compared to ImageMagick.","fix":"Apply the gain/amount parameter to the unsharpen result (or document the limitation and warn), rather than parsing it and dropping it on the floor.","locations":[{"ref":"src/operations/unsharpen.rs:3-6","code":"    3 | pub fn unsharpen(image: &mut Image, geom: &UnsharpenGeometry) -> Result<(), MagickError> {\n    4 |     image.pixels = image.pixels.unsharpen(geom.sigma, geom.threshold);\n    5 |     Ok(())\n    6 | }","lines":4,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/unsharpen.rs#L3-L6"},{"ref":"src/arg_parsers/unsharpen_geometry.rs:8","code":"    8 |     gain: f32,          // unused, only present to satisfy ImageMagick's CLI","lines":1,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/unsharpen_geometry.rs#L8"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`write_metadata` clones every metadata buffer (exif, xmp, icc) via `.clone()` purely to hand ownership to the encoder, even though the buffers can be large (ICC profiles are commonly several KB to MB). Since the encoders consume the bytes, these are avoidable heap allocations + copies on every encode.","fix":"Take `image` by a form that allows moving the metadata out, or have the Image expose the buffers by reference where the encoder API accepts a slice, to avoid cloning multi-MB ICC profiles on each write.","locations":[{"ref":"src/encoders/common.rs:12-22","code":"   12 | pub fn write_metadata(encoder: &mut impl ImageEncoder, image: &Image) {\n   13 |     if let Some(exif) = image.exif.clone() {\n   14 |         let _ = encoder.set_exif_metadata(exif); // ignore UnsupportedError\n   15 |     };\n   16 |     if let Some(xmp) = image.xmp.clone() {\n   17 |         let _ = encoder.set_xmp_metadata(xmp); // ignore UnsupportedError\n   18 |     };\n   19 |     if let Some(icc) = image.icc.clone() {\n   20 |         let _ = encoder.set_icc_profile(icc); // ignore UnsupportedError\n   21 |     };\n   22 | }","lines":11,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/common.rs#L12-L22"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"apply_blue_noise_scatter() reads and writes each pixel via image.get_pixel(x, y) and image.put_pixel(x, y, color) inside the per-pixel hot loop. These do per-call bounds-checked coordinate-to-index multiplication. Iterating over rows/pixels_mut or indexing the raw buffer directly would avoid the repeated coordinate math in the inner loop.","fix":"Iterate the underlying buffer directly (e.g. enumerate over image.as_mut().chunks, or row-major raw indexing) to remove the per-pixel get_pixel/put_pixel coordinate computation.","locations":[{"ref":"src/operations/monochrome.rs:164-189","code":"  164 |     for y in 0..height {\n  165 |         for x in 0..width {\n  166 |             let idx = (y * (width + 2) + x + 1) as usize;\n  167 | \n  168 |             // Fetch the pre-stretched pixel\n  169 |             let original_luma = image.get_pixel(x, y).0[0] as f32;\n  170 |             let current_val = original_luma + errors[idx];\n  171 | \n  172 |             // Fetch blue noise and normalize\n  173 |             let noise_u8 = get_noise(x, y);\n  174 |             let noise = (noise_u8 as f32 / 255.0) - 0.5;\n  175 | \n  176 |             // Jitter Attenuation (Noise Roll-off)\n  177 |             let distance_from_center = (original_luma - 127.5).abs();\n  178 |             let attenuation = 1.0 - (distance_from_center / 127.5).clamp(0.0, 1.0);\n  179 | \n  180 |             // Modulate the threshold\n  181 |             let dynamic_threshold = 127.5 + (noise * THRESHOLD_JITTER * attenuation);\n  182 | \n  183 |             // Thresholding\n  184 |             let (new_val, color) = if current_val > dynamic_threshold {\n  185 |                 (255.0, Luma([255]))\n  186 |             } else {\n  187 |                 (0.0, Luma([0]))\n  188 |             };\n  189 |             image.put_pixel(x, y, color);","lines":26,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/monochrome.rs#L164-L189"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"has_constant_alpha_integer() is the documented fast path, but has_constant_alpha_f32() falls back to the naive per-pixel branchy `.all()` over every pixel. For large 32-bit-float RGBA images this scans the whole buffer with a branch per pixel before resize even begins, on top of the resize itself. The cost is paid for every f32 resize even when alpha turns out constant.","fix":"Consider a branchless reduction (e.g. accumulate XOR of bit patterns or compare via SIMD-friendly fold) as is done for the integer path, accepting the NaN caveat, or short-circuit early once a divergent alpha is found (the current .all() already short-circuits but still branches per element).","locations":[{"ref":"src/operations/resize.rs:249-260","code":"  249 | #[must_use]\n  250 | fn has_constant_alpha_f32(img: &ImageBuffer<image::Rgba<f32>, Vec<f32>>) -> bool {\n  251 |     // Optimizing correctly in presence of NaNs and infinities is tricky, so just do the naive thing for now\n  252 |     let first_pixel_alpha = match img.pixels().iter().next() {\n  253 |         Some(pixel) => pixel.alpha(),\n  254 |         None => return true, // empty input image\n  255 |     };\n  256 |     img.pixels()\n  257 |         .iter()\n  258 |         .map(|pixel| pixel.channels().last().unwrap())\n  259 |         .all(|alpha| *alpha == first_pixel_alpha)\n  260 | }","lines":12,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/resize.rs#L249-L260"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`try_finish_literal` clones the whole `literal_accumulator` (`Vec<u8>`) just to feed `String::from_utf8`, then clears the original. The clone is unnecessary - the accumulator is cleared right after - so the bytes can be moved instead of copied.","fix":"Use `String::from_utf8(std::mem::take(&mut self.literal_accumulator))` to move the bytes and avoid both the clone and the explicit `.clear()`.","locations":[{"ref":"src/arg_parsers/identify_format/parser.rs:57-63","code":"   57 |     fn try_finish_literal(&mut self) -> Result<(), ArgParseErr> {\n   58 |         if !self.literal_accumulator.is_empty() {\n   59 |             let literal = String::from_utf8(self.literal_accumulator.clone())\n   60 |                 .map_err(|_e| ArgParseErr::new())?;\n   61 |             self.tokens.push(Token::Literal(literal));\n   62 |             self.literal_accumulator.clear();\n   63 |         }","lines":7,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/identify_format/parser.rs#L57-L63"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`string.to_string_lossy().as_bytes().to_owned()` allocates an owned `Vec<u8>` copy of the lossy string just to iterate it byte by byte. The `Cow<str>` could be iterated directly via `.bytes()` without the extra heap allocation.","fix":"Iterate `string.to_string_lossy().bytes()` (or `.as_bytes()` borrowed for the loop) instead of materializing a separate owned `Vec<u8>`.","locations":[{"ref":"src/arg_parsers/identify_format/parser.rs:130-134","code":"  130 |     let format_bytes = string.to_string_lossy().as_bytes().to_owned();\n  131 | \n  132 |     for char in format_bytes {\n  133 |         parser.try_parse_char(&char)?;\n  134 |     }","lines":5,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/identify_format/parser.rs#L130-L134"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The branch `if filter == FilterType::NoFilter && compression == CompressionType::Fast` is unreachable. The `compression` value is produced solely by the match on `quality / 10` (lines 38-41), which only ever yields `CompressionType::Level(n)` or `CompressionType::Level(9)` - never `CompressionType::Fast`. `Fast` is only produced by the early-return arms for filters 8 and 9, which return immediately and never reach this comparison. Therefore the `Ok((CompressionType::Fast, FilterType::Up))` body on line 61 is dead code.","fix":"Remove the dead conditional and just return `Ok((compression, filter))`, since `compression` can never be `Fast` at that point.","locations":[{"ref":"src/encoders/png.rs:58-64","code":"   58 |         if filter == FilterType::NoFilter && compression == CompressionType::Fast {\n   59 |             // CompressionType::Fast needs filtering for a reasonable compression ratio.\n   60 |             // When using it, use the fastest filter instead of no filter at all.\n   61 |             Ok((CompressionType::Fast, FilterType::Up))\n   62 |         } else {\n   63 |             Ok((compression, filter))\n   64 |         }","lines":7,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/png.rs#L58-L64"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`BlurGeometry.radius` and `UnsharpenGeometry.radius`/`gain` are private fields documented as present 'only to match ImageMagick's CLI' / 'unused'. They are written but never read outside tests, so they are effectively dead state carried through the parser. This is acknowledged in comments but worth flagging for cleanup; the parsed values are also never validated for being meaningful.","fix":"If the values are truly unused, parse-and-discard them (or use a `#[expect(dead_code)]` like elsewhere in the module) rather than storing them; otherwise wire them up.","locations":[{"ref":"src/arg_parsers/blur_geometry.rs:6","code":"    6 |     radius: usize, // only to match imagemagick's cli behaviour, acutal value is ignored","lines":1,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/blur_geometry.rs#L6"},{"ref":"src/arg_parsers/unsharpen_geometry.rs:6-8","code":"    6 |     radius: usize, // unused, only present to satisfy ImageMagick's CLI\n    7 |     pub sigma: f32,\n    8 |     gain: f32,          // unused, only present to satisfy ImageMagick's CLI","lines":3,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/unsharpen_geometry.rs#L6-L8"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"A 4096-byte blue-noise.bin (64x64) sits next to monochrome.rs but is never referenced; only blue-noise-256.bin is include_bytes!'d. The 64x64 file is leftover/dead data.","fix":"Delete the unused blue-noise.bin file, or wire it up and remove the 256 version, whichever is intended.","locations":[{"ref":"src/operations/monochrome.rs:229","code":"  229 | const NOISE_DATA: &[u8] = include_bytes!(\"blue-noise-256.bin\");","lines":1,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/monochrome.rs#L229"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `strip_and_parse_number` contains a stray closing code-fence ```` ``` ```` on the last line with no opening fence, which produces a malformed/empty doc code block. It also documents an `# Arguments`/`# Returns` contract (`Err(T::Err)`) that is fine, but the dangling fence is invalid rustdoc.","fix":"Remove the stray ``` line (or add a matching opening fence with a real example) so the doc comment renders correctly.","locations":[{"ref":"src/arg_parsers/numbers.rs:30","code":"   30 | /// ```","lines":1,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/arg_parsers/numbers.rs#L30"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `optimize_pixel_format` states the function's no-precision-reduction behavior is useful 'when imagemagick does not optimize format and we mimick that behavior (e.g. TIFF)', implying TIFF output goes through `optimize_pixel_format`. However tiff.rs never calls any pixel-format optimization - it writes `image.pixels` directly. The comment references a code path that does not exist, which is misleading to a future maintainer.","fix":"Either wire `optimize_pixel_format` into tiff.rs (if the format optimization is actually desired) or update the doc comment to stop citing TIFF as a user of this function.","locations":[{"ref":"src/encoders/common/pixel_format_optimization.rs:22-24","code":"   22 | /// The behavior of this function over [optimize_pixel_format_and_precision] is useful\n   23 | /// when the image will be converted to 8 bits anyway (e.g. BMP),\n   24 | /// or when imagemagick does not optimize format and we mimick that behavior (e.g. TIFF)","lines":3,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/common/pixel_format_optimization.rs#L22-L24"},{"ref":"src/encoders/tiff.rs:13-15","code":"   13 |     let mut encoder = TiffEncoder::new(writer);\n   14 |     write_metadata(&mut encoder, image);\n   15 |     wm_try!(image.pixels.write_with_encoder(encoder));","lines":3,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/encoders/tiff.rs#L13-L15"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The blue-noise generation comment block instructs generating a 64x64 noise file (`--size 64 ... blue-noise.bin`), but the code includes blue-noise-256.bin and sets NOISE_DATA_WIDTH_AND_HEIGHT = 256. The documented regeneration recipe does not match the file actually used, so following the instructions yields a wrong-sized buffer and an out-of-bounds read via get_noise.","fix":"Update the comment to use --size 256 and output blue-noise-256.bin so the regeneration recipe matches NOISE_DATA and NOISE_DATA_WIDTH_AND_HEIGHT.","locations":[{"ref":"src/operations/monochrome.rs:213-230","code":"  213 | // Generate blue noise data with the following sequence of commands:\n  214 | // * Clone or checkout the following commit:\n  215 | //   https://github.com/mblode/blue-noise-rust/commit/aea756b5853828ac6401937ee39bea27b2f39898\n  216 | // * Modify the src/generator.rs file to output raw bytes instead of PNG, e.g. by editing the\n  217 | //   `save_blue_noise_to_png` to contain the following code:\n  218 | //\n  219 | //  ```\n  220 | //  let raw = img.into_raw();\n  221 | //  BufWriter::new(File::create(&filename).expect(\"do so\"))\n  222 | //    .write_all(&raw)\n  223 | //    .expect(\"write failed\");\n  224 | //  ```\n  225 | //  * Run `cargo build --release`\n  226 | //  * Generate the blue noise file with:\n  227 | //    `./target/release/blue-noise generate --size 64 --output blue-noise.bin`\n  228 | //  * Copy the binary next to this source file.\n  229 | const NOISE_DATA: &[u8] = include_bytes!(\"blue-noise-256.bin\");\n  230 | const NOISE_DATA_WIDTH_AND_HEIGHT: usize = 256;","lines":18,"link":"https://github.com/Shnatsel/wondermagick/blob/dfdf8a91b58269a5813a915e976a960d6815e0c5/src/operations/monochrome.rs#L213-L230"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"`blur_geometry.rs` and `unsharpen_geometry.rs` are near-identical parsers: same empty/ASCII guard, same `try_into` conversion, same `split('x')` structure, and identical `parse_radius`/`parse_sigma` helper functions (and `parse_gain` mirrors them). The two files share a large block of structurally duplicated logic that must be kept in sync by hand.","fix":"Extract the shared scaffolding (ASCII/empty guard, `OsStr`->`&str` conversion, and the numeric sub-parsers) into a common helper module reused by both geometry parsers.","locations":[{"ref":"src/arg_parsers/blur_geometry.rs:18-62","code":"   18 | impl TryFrom<&OsStr> for BlurGeometry {\n   19 |     type Error = ArgParseErr;\n   20 | \n   21 |     fn try_from(s: &OsStr) -> Result<Self, Self::Error> {\n   22 |         if s.is_empty() {\n   23 |             return Err(ArgParseErr::with_msg(\n   24 |                 \"blur geometry must be non-empty and ASCII only\",\n   25 |             ));\n   26 |         }\n   27 | \n   28 |         let string: &str = s\n   29 |             .try_into()\n   30 |             .map_err(|_e| ArgParseErr::with_msg(\"invalid blur geometry\"))?;\n   31 |         let parts: Vec<&str> = string.split('x').collect();\n   32 | \n   33 |         match parts.len() {\n   34 |             1 => parse_radius(string).map(|radius| Self {\n   35 |                 radius,\n   36 |                 sigma: 1.2, // no science behind the value, just eyeballed to match ImageMagick's default\n   37 |             }),\n   38 |             2 => {\n   39 |                 match (\n   40 |                     parse_radius(parts.first().unwrap()),\n   41 |                     parse_sigma(parts.get(1).unwrap()),\n   42 |                 ) {\n   43 |
