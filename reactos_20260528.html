nformationEx(\n 1503 |     PIRP Irp,\n 1504 |     PIO_STACK_LOCATION IrpSp)\n 1505 | /*\n 1506 |  * FUNCTION: TDI SetInformationEx handler\n 1507 |  * ARGUMENTS:\n 1508 |  *     Irp   = Pointer to I/O request packet\n 1509 |  *     IrpSp = Pointer to current stack location of Irp\n 1510 |  * RETURNS:\n 1511 |  *     Status of operation\n 1512 |  */\n 1513 | {\n 1514 |     PTRANSPORT_CONTEXT TranContext;\n 1515 |     PTCP_REQUEST_SET_INFORMATION_EX Info;\n 1516 |     TDI_REQUEST Request;\n 1517 |     TDI_STATUS Status;\n 1518 | \n 1519 |     TI_DbgPrint(DEBUG_IRP, (\"Called.\\n\"));\n 1520 | \n 1521 |     TranContext = (PTRANSPORT_CONTEXT)IrpSp->FileObject->FsContext;\n 1522 |     Info        = (PTCP_REQUEST_SET_INFORMATION_EX)Irp->AssociatedIrp.SystemBuffer;\n 1523 | \n 1524 |     switch ((ULONG_PTR)IrpSp->FileObject->FsContext2) {\n 1525 |     case TDI_TRANSPORT_ADDRESS_FILE:\n 1526 |         Request.Handle.AddressHandle = TranContext->Handle.AddressHandle;\n 1527 |         break;\n 1528 | \n 1529 |     case TDI_CONNECTION_FILE:\n 1530 |         Request.Handle.ConnectionContext = TranContext->Handle.ConnectionContext;\n 1531 |         break;\n 1532 | \n 1533 |     case TDI_CONTROL_CHANNEL_FILE:\n 1534 |         Request.Handle.ControlChannel = TranContext->Handle.ControlChannel;\n 1535 |         break;\n 1536 | \n 1537 |     default:\n 1538 |         Irp->IoStatus.Status      = STATUS_INVALID_PARAMETER;\n 1539 |         Irp->IoStatus.Information = 0;\n 1540 | \n 1541 |         TI_DbgPrint(DEBUG_IRP, (\"Completing IRP at (0x%X).\\n\", Irp));\n 1542 | \n 1543 |         return Irp->IoStatus.Status;\n 1544 |     }\n 1545 | \n 1546 |     Request.RequestNotifyObject = NULL;\n 1547 |     Request.RequestContext      = NULL;\n 1548 | \n 1549 |     Status = InfoTdiSetInformationEx(&Request, &Info->ID,\n 1550 |             &Info->Buffer, Info->BufferSize);\n 1551 | \n 1552 |     return Status;\n 1553 | }"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"high","description":"NtGdiSetDIBitsToDeviceInternal allocates `pbmiSafe` of size `cjMaxInfo` (user-supplied UINT) and copies `cjMaxInfo` bytes from user, but never validates `cjMaxInfo >= sizeof(BITMAPINFOHEADER)` before subsequently reading `bmi->bmiHeader.biSizeImage`, `biHeight`, `biWidth`, `biBitCount`, etc. With `cjMaxInfo` as low as 4, the kernel reads beyond the copied data into uninitialized pool memory.","fix":"Before the allocation, validate `if (cjMaxInfo < sizeof(BITMAPINFOHEADER)) return 0;` and cap `cjMaxInfo` to a sane maximum (e.g. `sizeof(BITMAPV5HEADER) + 256 * sizeof(RGBQUAD)`) as the Get-variant does.","locations":[{"ref":"win32ss/gdi/ntgdi/dibobj.c:467-529","code":"  467 | W32KAPI\n  468 | INT\n  469 | APIENTRY\n  470 | NtGdiSetDIBitsToDeviceInternal(\n  471 |     IN HDC hDC,\n  472 |     IN INT XDest,\n  473 |     IN INT YDest,\n  474 |     IN DWORD Width,\n  475 |     IN DWORD Height,\n  476 |     IN INT XSrc,\n  477 |     IN INT YSrc,\n  478 |     IN DWORD StartScan,\n  479 |     IN DWORD ScanLines,\n  480 |     IN LPBYTE Bits,\n  481 |     IN LPBITMAPINFO bmi,\n  482 |     IN DWORD ColorUse,\n  483 |     IN UINT cjMaxBits,\n  484 |     IN UINT cjMaxInfo,\n  485 |     IN BOOL bTransformCoordinates,\n  486 |     IN OPTIONAL HANDLE hcmXform)\n  487 | {\n  488 |     INT ret;\n  489 |     PDC pDC = NULL;\n  490 |     HBITMAP hSourceBitmap = NULL, hMaskBitmap = NULL;\n  491 |     SURFOBJ *pDestSurf, *pSourceSurf = NULL, *pMaskSurf = NULL;\n  492 |     SURFACE *pSurf;\n  493 |     RECTL rcDest;\n  494 |     POINTL ptSource;\n  495 |     //INT DIBWidth;\n  496 |     SIZEL SourceSize;\n  497 |     EXLATEOBJ exlo;\n  498 |     PPALETTE ppalDIB = NULL;\n  499 |     LPBITMAPINFO pbmiSafe;\n  500 |     BOOL bResult;\n  501 | \n  502 |     if (!Bits) return 0;\n  503 | \n  504 |     pbmiSafe = ExAllocatePoolWithTag(PagedPool, cjMaxInfo, 'pmTG');\n  505 |     if (!pbmiSafe) return 0;\n  506 | \n  507 |     _SEH2_TRY\n  508 |     {\n  509 |         ProbeForRead(bmi, cjMaxInfo, 1);\n  510 |         ProbeForRead(Bits, cjMaxBits, 1);\n  511 |         RtlCopyMemory(pbmiSafe, bmi, cjMaxInfo);\n  512 |         bmi = pbmiSafe;\n  513 |     }\n  514 |     _SEH2_EXCEPT(EXCEPTION_EXECUTE_HANDLER)\n  515 |     {\n  516 |         ret = 0;\n  517 |         goto Exit;\n  518 |     }\n  519 |     _SEH2_END;\n  520 | \n  521 |     DPRINT(\"StartScan %d ScanLines %d Bits %p bmi %p ColorUse %d\\n\"\n  522 |            \"    Height %d Width %d biSizeImage %d\\n\"\n  523 |            \"    biHeight %d biWidth %d biBitCount %d\\n\"\n  524 |            \"    XSrc %d YSrc %d XDest %d YDest %d\\n\",\n  525 |            StartScan, ScanLines, Bits, bmi, ColorUse,\n  526 |            Height, Width, bmi->bmiHeader.biSizeImage,\n  527 |            bmi->bmiHeader.biHeight, bmi->bmiHeader.biWidth,\n  528 |            bmi->bmiHeader.biBitCount,\n  529 |            XSrc, YSrc, XDest, YDest);"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"`wcsncpy` does NOT guarantee NUL termination when source length >= n. Here File1/File2 are sized `_MAX_PATH + 1` but the count passed to wcsncpy is `_MAX_PATH`, so if the user passes a `_MAX_PATH`-or-longer path, File1[_MAX_PATH-1] is the last copied char and File1[_MAX_PATH] (the last buffer slot) was never zeroed — subsequent `_wfopen(File1, ...)` reads off the end of the buffer.","fix":"Use `StringCchCopyW(File1, _countof(File1), argv[...]);` (truncates safely with NUL), or explicitly force `File1[_MAX_PATH] = 0;` after the wcsncpy.","locations":[{"ref":"base/applications/cmdutils/comp/comp.c:66-67","code":"   66 |     WCHAR File1[_MAX_PATH + 1], // File paths\n   67 |           File2[_MAX_PATH + 1];"},{"ref":"base/applications/cmdutils/comp/comp.c:108-112","code":"  108 |     if (argc - NumberOfOptions == 3)\n  109 |     {\n  110 |         wcsncpy(File1, argv[1 + NumberOfOptions], _MAX_PATH);\n  111 |         wcsncpy(File2, argv[2 + NumberOfOptions], _MAX_PATH);\n  112 |     }"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"FileCompareBothWild closes the find handle with CloseHandle instead of FindClose when the second FindFirstFileW fails. find handles must be released with FindClose; using CloseHandle leaks the find state on Win32 and can cause undefined behaviour on some implementations.","fix":"Change `CloseHandle(hFind0);` at line 464 to `FindClose(hFind0);`.","locations":[{"ref":"base/applications/cmdutils/fc/fc.c:461-468","code":"  461 |     hFind1 = FindFirstFileW(pFC->file[1], &find1);\n  462 |     if (hFind1 == INVALID_HANDLE_VALUE)\n  463 |     {\n  464 |         CloseHandle(hFind0);\n  465 |         ConResPrintf(StdErr, IDS_CANNOT_OPEN, pFC->file[1]);\n  466 |         ConPuts(StdOut, L\"\\n\");\n  467 |         return FCRET_CANT_FIND;\n  468 |     }"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"`SaveString` writes a REG_SZ value without including the trailing NUL in the byte count: `_tcslen(pszValue) * sizeof(*pszValue)`. Per MSDN, for REG_SZ the cbData passed to RegSetValueEx MUST include the terminating NUL, otherwise readers that rely on the embedded NUL (incl. `QueryString` here, which expects null-terminated content) may read garbage from adjacent bytes if the value is later read into a buffer larger than the stored size.","fix":"Change the cbData expression to `(_tcslen(pszValue) + 1) * sizeof(*pszValue)`.","locations":[{"ref":"base/applications/notepad/settings.c:226-229","code":"  226 | static BOOL SaveString(HKEY hKey, LPCTSTR pszValueNameT, LPCTSTR pszValue)\n  227 | {\n  228 |     return RegSetValueEx(hKey, pszValueNameT, 0, REG_SZ, (LPBYTE) pszValue, (DWORD) _tcslen(pszValue) * sizeof(*pszValue)) == ERROR_SUCCESS;\n  229 | }"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"CheckForLiveCD reads `CmdLine` REG_SZ into a fixed WCHAR[MAX_PATH] buffer but never enforces NUL termination after RegQueryValueExW. The registry API does not guarantee a terminator when the stored value is missing one. The subsequent wcsstr() will then read past the buffer end.","fix":"After the RegQueryValueExW call succeeds, force NUL termination: `CommandLine[min(dwSize/sizeof(WCHAR), ARRAYSIZE(CommandLine)-1)] = L'\\0';` and reject REG_MULTI_SZ.","locations":[{"ref":"base/system/services/services.c:90-110","code":"   90 |     /* Read the CmdLine value */\n   91 |     dwSize = sizeof(CommandLine);\n   92 |     dwError = RegQueryValueExW(hSetupKey,\n   93 |                                L\"CmdLine\",\n   94 |                                NULL,\n   95 |                                &dwType,\n   96 |                                (LPBYTE)CommandLine,\n   97 |                                &dwSize);\n   98 | \n   99 |     if (dwError != ERROR_SUCCESS ||\n  100 |         (dwType != REG_SZ &&\n  101 |          dwType != REG_EXPAND_SZ &&\n  102 |          dwType != REG_MULTI_SZ))\n  103 |         goto done;\n  104 | \n  105 |     /* Check for the '-mini' option */\n  106 |     if (wcsstr(CommandLine, L\" -mini\") != NULL)\n  107 |     {\n  108 |         DPRINT1(\"Running on LiveCD\\n\");\n  109 |         ScmLiveSetup = TRUE;\n  110 |     }"}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"wcsncpy(DevInstallParams.DriverPath, ..., MAX_PATH) does not guarantee NUL termination when the source is MAX_PATH or longer wchars. `DriverPath` in SP_DEVINSTALL_PARAMS_W is exactly MAX_PATH wchars. If the user supplies a directory or INF path of length >= MAX_PATH-1, the field is not NUL-terminated and SetupDiSetDeviceInstallParamsW reads past the field looking for the terminator — undefined behaviour and potential information disclosure in the param struct.","fix":"Use `StringCchCopyW(DevInstallParams.DriverPath, _countof(DevInstallParams.DriverPath), InfFile);` (guarantees NUL-terminated, truncates safely), or follow the wcsncpy with `DevInstallParams.DriverPath[_countof(DevInstallParams.DriverPath) - 1] = 0;`.","locations":[{"ref":"dll/win32/newdev/newdev.c:279","code":"  279 |         wcsncpy(DevInstallParams.DriverPath, InfFile, MAX_PATH);"},{"ref":"dll/win32/newdev/newdev.c:284","code":"  284 |         wcsncpy(DevInstallParams.DriverPath, Directory, MAX_PATH);"}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"USBSTOR_HandleDeviceControl handlers for IOCTL_SCSI_GET_INQUIRY_DATA and IOCTL_SCSI_GET_ADDRESS write to Irp->AssociatedIrp.SystemBuffer without validating IoStack->Parameters.DeviceIoControl.OutputBufferLength. A caller supplying OutputBufferLength=0 results in NULL SystemBuffer or an undersized buffer, leading to a NULL-deref BSOD or pool overflow when SCSI_ADAPTER_BUS_INFO + SCSI_INQUIRY_DATA + INQUIRYDATA is written.","fix":"Before writing, verify OutputBufferLength >= sizeof(SCSI_ADAPTER_BUS_INFO) + sizeof(SCSI_INQUIRY_DATA) + sizeof(INQUIRYDATA) - 1 (and sizeof(SCSI_ADDRESS) respectively) and fail with STATUS_BUFFER_TOO_SMALL otherwise.","locations":[{"ref":"drivers/usb/usbstor/disk.c:496-545","code":"  496 |         case IOCTL_SCSI_GET_INQUIRY_DATA:\n  497 |         {\n  498 |             PDODeviceExtension = (PPDO_DEVICE_EXTENSION)DeviceObject->DeviceExtension;\n  499 |             ASSERT(PDODeviceExtension);\n  500 |             ASSERT(PDODeviceExtension->Common.IsFDO == FALSE);\n  501 | \n  502 |             // get parameters\n  503 |             BusInfo = Irp->AssociatedIrp.SystemBuffer;\n  504 |             ScsiInquiryData = (PSCSI_INQUIRY_DATA)(BusInfo + 1);\n  505 |             InquiryData = (PINQUIRYDATA)ScsiInquiryData->InquiryData;\n  506 | \n  507 | \n  508 |             BusInfo->NumberOfBuses = 1;\n  509 |             BusInfo->BusData[0].NumberOfLogicalUnits = 1; //FIXME\n  510 |             BusInfo->BusData[0].InitiatorBusId = 0;\n  511 |             BusInfo->BusData[0].InquiryDataOffset = sizeof(SCSI_ADAPTER_BUS_INFO);\n  512 | \n  513 |             ScsiInquiryData->PathId = 0;\n  514 |             ScsiInquiryData->TargetId = 0;\n  515 |             ScsiInquiryData->Lun = PDODeviceExtension->LUN & MAX_LUN;\n  516 |             ScsiInquiryData->DeviceClaimed = PDODeviceExtension->Claimed;\n  517 |             ScsiInquiryData->InquiryDataLength = sizeof(INQUIRYDATA);\n  518 |             ScsiInquiryData->NextInquiryDataOffset = 0;\n  519 | \n  520 |             // Note: INQUIRYDATA structure is larger than INQUIRYDATABUFFERSIZE\n  521 |             RtlZeroMemory(InquiryData, sizeof(INQUIRYDATA));\n  522 |             RtlCopyMemory(InquiryData, &PDODeviceExtension->InquiryData, sizeof(PDODeviceExtension->InquiryData));\n  523 | \n  524 |             InquiryData->Versions = 0x04;\n  525 |             InquiryData->ResponseDataFormat = 0x02; // some devices set this to 1\n  526 | \n  527 |             Irp->IoStatus.Information = sizeof(SCSI_ADAPTER_BUS_INFO) + sizeof(SCSI_INQUIRY_DATA) + sizeof(INQUIRYDATA) - 1;\n  528 |             Status = STATUS_SUCCESS;\n  529 | \n  530 |             break;\n  531 |         }\n  532 |         case IOCTL_SCSI_GET_ADDRESS:\n  533 |         {\n  534 |             PSCSI_ADDRESS Address = Irp->AssociatedIrp.SystemBuffer;\n  535 | \n  536 |             Address->Length = sizeof(SCSI_ADDRESS);\n  537 |             Address->PortNumber = 0;\n  538 |             Address->PathId = 0;\n  539 |             Address->TargetId = 0;\n  540 |             Address->Lun = (((PPDO_DEVICE_EXTENSION)DeviceObject->DeviceExtension)->LUN & MAX_LUN);\n  541 |             Irp->IoStatus.Information = sizeof(SCSI_ADDRESS);\n  542 | \n  543 |             Status = STATUS_SUCCESS;\n  544 | \n  545 |             break;"}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"`BufferKeyLength = sizeof(PKEY_VALUE_PARTIAL_INFORMATION) + (256 * sizeof(WCHAR));` uses sizeof of a POINTER (4 or 8 bytes) where the author clearly intended sizeof of the STRUCTURE. The expression evaluates to 516 or 520 bytes which is — by coincidence — still enough to hold KEY_VALUE_PARTIAL_INFORMATION plus 256 WCHARs of data because the struct header is small (~13 bytes); but the code reads as a bug and is fragile to future changes in the structure layout.","fix":"Use `FIELD_OFFSET(KEY_VALUE_PARTIAL_INFORMATION, Data[0]) + (256 * sizeof(WCHAR))`, or `sizeof(KEY_VALUE_PARTIAL_INFORMATION) + (256 * sizeof(WCHAR))` — both produce a correct, intent-matching size and remain valid if the struct definition changes.","locations":[{"ref":"ntoskrnl/rtl/misc.c:93-96","code":"   93 |     NTSTATUS Status;\n   94 |     PKEY_VALUE_PARTIAL_INFORMATION BufferKey;\n   95 |     ULONG BufferKeyLength = sizeof(PKEY_VALUE_PARTIAL_INFORMATION) + (256 * sizeof(WCHAR));\n   96 |     UNICODE_STRING NtProductType;"}]},{"id":"API_13","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"IntInsertClipboardData reallocates pClipBase by allocating pNewClip and unconditionally calling `memcpy(pNewClip, pWinStaObj->pClipBase, pWinStaObj->cNumClipFormats * sizeof(CLIP))`. On the very first insertion `pClipBase` is NULL and `cNumClipFormats` is 0; calling memcpy with a NULL source pointer is undefined behavior per the C standard (even with length zero).","fix":"Guard the memcpy: `if (pWinStaObj->pClipBase != NULL && pWinStaObj->cNumClipFormats != 0) memcpy(pNewClip, pWinStaObj->pClipBase, pWinStaObj->cNumClipFormats * sizeof(CLIP));`.","locations":[{"ref":"win32ss/user/ntuser/clipboard.c:95-119","code":"   95 |         /* Allocate bigger clipboard if needed. We could use lists but Windows uses array */\n   96 |         if (pWinStaObj->cNumClipFormats % 4 == 0)\n   97 |         {\n   98 |             PCLIP pNewClip;\n   99 | \n  100 |             /* Allocate new clipboard */\n  101 |             pNewClip = ExAllocatePoolWithTag(PagedPool,\n  102 |                                              (pWinStaObj->cNumClipFormats + 4) * sizeof(CLIP),\n  103 |                                              USERTAG_CLIPBOARD);\n  104 |             if (!pNewClip)\n  105 |             {\n  106 |                 EngSetLastError(ERROR_NOT_ENOUGH_MEMORY);\n  107 |                 return NULL;\n  108 |             }\n  109 | \n  110 |             /* Copy data */\n  111 |             memcpy(pNewClip, pWinStaObj->pClipBase, pWinStaObj->cNumClipFormats * sizeof(CLIP));\n  112 | \n  113 |             /* Free old clipboard */\n  114 |             if (pWinStaObj->pClipBase)\n  115 |                 ExFreePoolWithTag(pWinStaObj->pClipBase, USERTAG_CLIPBOARD);\n  116 | \n  117 |             /* Update WinSta */\n  118 |             pWinStaObj->pClipBase = pNewClip;\n  119 |         }"}]},{"id":"API_14","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"In CopyMsgToKernelMem (handles WM_WININICHANGE special case), the kernel reads `sizeof(lParamMsg)` bytes from `(WCHAR*)UserModeMsg->lParam` via RtlCopyMemory inside SEH but without a preceding ProbeForRead and without any alignment check. If lParam points to the last few bytes of a valid user page followed by an unmapped page, the kernel takes a fault.","fix":"Replace the unchecked SEH-wrapped RtlCopyMemory with `ProbeForRead((PVOID)UserModeMsg->lParam, sizeof(lParamMsg), sizeof(WCHAR));` before the copy, or use MmCopyFromCaller.","locations":[{"ref":"win32ss/user/ntuser/message.c:485-512","code":"  485 |             /* Don't do extra testing for 1 word messages. For examples see\n  486 |              * https://wiki.winehq.org/List_Of_Windows_Messages and\n  487 |              * we are just handling WM_WININICHANGE here. */\n  488 |             if (Size > 1 && UserModeMsg->lParam &&\n  489 |                 KernelModeMsg->message == WM_WININICHANGE)\n  490 |             {\n  491 |                 WCHAR lParamMsg[_countof(StrUserKernel[0]) + 1] = { 0 };\n  492 |                 _SEH2_TRY\n  493 |                 {\n  494 |                     RtlCopyMemory(lParamMsg, (WCHAR*)UserModeMsg->lParam, sizeof(lParamMsg));\n  495 |                 }\n  496 |                 _SEH2_EXCEPT(EXCEPTION_EXECUTE_HANDLER)\n  497 |                 {\n  498 |                     _SEH2_YIELD(return STATUS_ACCESS_VIOLATION);\n  499 |                 }\n  500 |                 _SEH2_END;\n  501 | \n  502 |                 /* Make sure that we have a UNICODE_NULL within lParamMsg */\n  503 |                 lParamMsg[ARRAYSIZE(lParamMsg) - 1] = UNICODE_NULL;\n  504 | \n  505 |                 if (!UserModeMsg->wParam && PosInArray(lParamMsg) >= 0)\n  506 |                 {\n  507 |                     TRACE(\"Copy String '%S' from usermode buffer\\n\", lParamMsg);\n  508 |                     wcscpy(KernelMem, lParamMsg);\n  509 |                     return STATUS_SUCCESS;\n  510 |                 }\n  511 |             }\n  512 | "}]},{"id":"API_15","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"`LCMapStringW(LOCALE_USER_DEFAULT, LCMAP_LOWERCASE, UsrBuf, UsrSiz, UsrBuf, MAX_PATH)` passes the same buffer as both source and destination. MSDN explicitly warns that the source and destination strings cannot be the same — behaviour is undefined.","fix":"Allocate a second buffer of MAX_PATH chars, write the lowercased string into it, and either return that buffer or copy it back over UsrBuf with wcscpy after.","locations":[{"ref":"base/applications/cmdutils/whoami/whoami.c:65-68","code":"   65 |     if (GetUserNameExW(NameFormat, UsrBuf, &UsrSiz))\n   66 |     {\n   67 |         LCMapStringW(LOCALE_USER_DEFAULT, LCMAP_LOWERCASE, UsrBuf, UsrSiz, UsrBuf, MAX_PATH);\n   68 |         return UsrBuf;"}]},{"id":"API_16","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"RegQueryValueExW writes the data into `szShell` and updates `cbShell` to the number of bytes written. The code then calls `StrStrIW(szShell, szExplorer)` without ensuring szShell is NUL-terminated. If a registry tool wrote a REG_SZ value without an embedded NUL (which violates spec but is reachable via raw API), StrStrIW reads past the buffer searching for a terminator. This is benign for properly-written registry data but defensive code should NUL-terminate explicitly.","fix":"After RegQueryValueExW success, set `szShell[min(cbShell / sizeof(WCHAR), _countof(szShell) - 1)] = L'\\0';` to guarantee termination before calling StrStrIW.","locations":[{"ref":"base/shell/explorer/explorer.cpp:115-148","code":"  115 | static BOOL\n  116 | IsExplorerSystemShell()\n  117 | {\n  118 |     BOOL bIsSystemShell = TRUE; // Assume we are the system shell by default.\n  119 |     WCHAR szPath[MAX_PATH];\n  120 | \n  121 |     if (!GetModuleFileNameW(NULL, szPath, _countof(szPath)))\n  122 |         return FALSE;\n  123 | \n  124 |     LPWSTR szExplorer = PathFindFileNameW(szPath);\n  125 | \n  126 |     HKEY hKeyWinlogon;\n  127 |     if (RegOpenKeyExW(HKEY_LOCAL_MACHINE,\n  128 |                       L\"Software\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\Winlogon\",\n  129 |                       0, KEY_READ, &hKeyWinlogon) == ERROR_SUCCESS)\n  130 |     {\n  131 |         LSTATUS Status;\n  132 |         DWORD dwType;\n  133 |         WCHAR szShell[MAX_PATH];\n  134 |         DWORD cbShell = sizeof(szShell);\n  135 | \n  136 |         // TODO: Add support for paths longer than MAX_PATH\n  137 |         Status = RegQueryValueExW(hKeyWinlogon, L\"Shell\", 0, &dwType, (LPBYTE)szShell, &cbShell);\n  138 |         if (Status == ERROR_SUCCESS)\n  139 |         {\n  140 |             if ((dwType != REG_SZ && dwType != REG_EXPAND_SZ) || !StrStrIW(szShell, szExplorer))\n  141 |                 bIsSystemShell = FALSE;\n  142 |         }\n  143 | \n  144 |         RegCloseKey(hKeyWinlogon);\n  145 |     }\n  146 | \n  147 |     return bIsSystemShell;\n  148 | }"}]},{"id":"API_17","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"In LdrGetDllHandleEx, the trailing-period trim uses `pRedirectName->Buffer[Length / sizeof(WCHAR) - sizeof(ANSI_NULL)]`. sizeof(ANSI_NULL) is 1 (byte), but the indexed array is WCHAR; the intent is element-count arithmetic. It works only because sizeof(ANSI_NULL) happens to equal 1.","fix":"Replace with `pRedirectName->Buffer[Length / sizeof(WCHAR) - 1]`.","locations":[{"ref":"dll/ntdll/ldr/ldrapi.c:656-665","code":"  656 |         Length = pRedirectName->Length;\n  657 |         if (Length)\n  658 |         {\n  659 |             /* Check and remove trailing period */\n  660 |             if (pRedirectName->Buffer[Length / sizeof(WCHAR) - sizeof(ANSI_NULL)] == '.')\n  661 |             {\n  662 |                 /* Decrease the size */\n  663 |                 pRedirectName->Length -= sizeof(WCHAR);\n  664 |             }\n  665 |         }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"PrintAllJobs returns 0 without calling NetApiBufferFree(pBuffer) when dwTotal == 0 (no jobs). The PAT_ENUM buffer returned by NetScheduleJobEnum is leaked on every successful empty enumeration.","fix":"Call `NetApiBufferFree(pBuffer);` before `return 0;` in the `dwTotal == 0` branch.","locations":[{"ref":"base/applications/cmdutils/at/at.c:565-581","code":"  565 |     Status = NetScheduleJobEnum(pszComputerName,\n  566 |                                 (PBYTE*)&pBuffer,\n  567 |                                 MAX_PREFERRED_LENGTH,\n  568 |                                 &dwRead,\n  569 |                                 &dwTotal,\n  570 |                                 &dwResume);\n  571 |     if (Status != NERR_Success)\n  572 |     {\n  573 |         PrintErrorMessage(Status);\n  574 |         return 1;\n  575 |     }\n  576 | \n  577 |     if (dwTotal == 0)\n  578 |     {\n  579 |         ConResPrintf(StdOut, IDS_NO_ENTRIES);\n  580 |         return 0;\n  581 |     }"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"enumerate_processes leaks the toolhelp snapshot handle when Process32FirstW fails or when realloc() returns NULL inside the loop; it returns FALSE before reaching CloseHandle(snapshot). Also, the pkill_list allocation in wmain uses `sizeof(unsigned int*)` (pointer size) instead of `sizeof(unsigned int)` — on x64 this over-allocates 2x.","fix":"Add CloseHandle(snapshot) before each `return FALSE;` in enumerate_processes. Change `process_count * sizeof(unsigned int*)` to `process_count * sizeof(unsigned int)`.","locations":[{"ref":"base/applications/cmdutils/taskkill/taskkill.c:162-196","code":"  162 | static BOOL enumerate_processes(void)\n  163 | {\n  164 |     unsigned int alloc_count = 128;\n  165 |     void *realloc_list;\n  166 |     HANDLE snapshot;\n  167 | \n  168 |     snapshot = CreateToolhelp32Snapshot(TH32CS_SNAPPROCESS, 0);\n  169 |     if (snapshot == INVALID_HANDLE_VALUE)\n  170 |         return FALSE;\n  171 | \n  172 |     process_list = malloc(alloc_count * sizeof(*process_list));\n  173 |     if (!process_list)\n  174 |         return FALSE;\n  175 | \n  176 |     process_list[0].p.dwSize = sizeof(process_list[0].p);\n  177 |     if (!Process32FirstW(snapshot, &process_list[0].p))\n  178 |         return FALSE;\n  179 | \n  180 |     do\n  181 |     {\n  182 |         process_list[process_count].is_numeric = FALSE;\n  183 |         process_list[process_count++].matched = FALSE;\n  184 |         if (process_count == alloc_count)\n  185 |         {\n  186 |             alloc_count *= 2;\n  187 |             realloc_list = realloc(process_list, alloc_count * sizeof(*process_list));\n  188 |             if (!realloc_list)\n  189 |                 return FALSE;\n  190 |             process_list = realloc_list;\n  191 |         }\n  192 |         process_list[process_count].p.dwSize = sizeof(process_list[process_count].p);\n  193 |     } while (Process32NextW(snapshot, &process_list[process_count].p));\n  1 m","description":"`SHELL_FindExecutableByVerb` opens `hkeyClass` with RegOpenKeyExW, but when `HCR_GetDefaultVerbW` returns false the function returns SE_ERR_NOASSOC without closing the handle, leaking the registry key handle on every association lookup failure.","fix":"Move `RegCloseKey(hkeyClass);` to before the `return SE_ERR_NOASSOC;` on line 974, or use a single end-label cleanup.","locations":[{"ref":"dll/win32/shell32/shlexec.cpp:966-975","code":"  966 | static UINT SHELL_FindExecutableByVerb(LPCWSTR lpVerb, LPWSTR key, LPWSTR classname, LPWSTR command, LONG commandlen)\n  967 | {\n  968 |     HKEY hkeyClass;\n  969 |     WCHAR verb[MAX_PATH];\n  970 | \n  971 |     if (RegOpenKeyExW(HKEY_CLASSES_ROOT, classname, 0, KEY_READ, &hkeyClass))\n  972 |         return SE_ERR_NOASSOC;\n  973 |     if (!HCR_GetDefaultVerbW(hkeyClass, lpVerb, verb, ARRAY_SIZE(verb)))\n  974 |         return SE_ERR_NOASSOC;\n  975 |     RegCloseKey(hkeyClass);"}]},{"id":"RES_7","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"OpenInputDevice calls ZwOpenFile (which creates a kernel handle in *pHandle) and then ObReferenceObjectByHandle. If ObReferenceObjectByHandle fails, the function returns its failure Status, but the freshly opened handle in *pHandle is never closed — leaking a kernel handle. The ASSERT provides no actual protection in retail builds.","fix":"On ObReferenceObjectByHandle failure, ZwClose(*pHandle), set *pHandle = NULL, and return the failure Status. Replace the ASSERT with proper error handling.","locations":[{"ref":"win32ss/user/ntuser/input.c:102-132","code":"  102 | static\n  103 | NTSTATUS NTAPI\n  104 | OpenInputDevice(PHANDLE pHandle, PFILE_OBJECT *ppObject, CONST WCHAR *pszDeviceName)\n  105 | {\n  106 |     UNICODE_STRING DeviceName;\n  107 |     OBJECT_ATTRIBUTES ObjectAttributes;\n  108 |     NTSTATUS Status;\n  109 |     IO_STATUS_BLOCK Iosb;\n  110 | \n  111 |     RtlInitUnicodeString(&DeviceName, pszDeviceName);\n  1 ded);\n  638 |                     }"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"`_alloca(dwResultSize)` declares the local as `LPVOID *pTemp` (pointer-to-pointer) but uses it as `LPVOID` / `LPBYTE`. While the misuse is benign (sizeof returns the same on all pointer types), the type confusion can mislead static analyzers and future readers. Memory itself does not leak — _alloca is stack — but the type signature is wrong.","fix":"Declare as `LPVOID pTemp = _alloca(dwResultSize);` (no pointer-to-pointer).","locations":[{"ref":"base/applications/notepad/settings.c:46-63","code":"   46 | QueryGeneric(HKEY hKey, LPCTSTR pszValueNameT, DWORD dwExpectedType,\n   47 |              LPVOID pvResult, DWORD dwResultSize)\n   48 | {\n   49 |     DWORD dwType, cbData;\n   50 |     LPVOID *pTemp = _alloca(dwResultSize);\n   51 | \n   52 |     ZeroMemory(pTemp, dwResultSize);\n   53 | \n   54 |     cbData = dwResultSize;\n   55 |     if (RegQueryValueEx(hKey, pszValueNameT, NULL, &dwType, (LPBYTE) pTemp, &cbData) != ERROR_SUCCESS)\n   56 |         return FALSE;\n   57 | \n   58 |     if (dwType != dwExpectedType)\n   59 |         return FALSE;\n   60 | \n   61 |     memcpy(pvResult, pTemp, cbData);\n   62 |     return TRUE;\n   63 | }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment on line 287 says `/* Will free(arrFile) */` above the second DrawTree call, but DrawTree never calls free on its array argument. The actual free happens at lines 290-291 (`free(arrFolder); free(arrFile);`). The misleading comment was probably copy-pasted from a different revision.","fix":"Delete the two `/* Will free(arrFile) */` lines.","locations":[{"ref":"base/applications/cmdutils/tree/tree.c:281-291","code":"  281 |     if (bShowFiles)\n  282 |     {\n  283 |         /* Will free(arrFile) */\n  284 |         DrawTree(strPath, arrFile, arrFilesz, width, prevLine, FALSE);\n  2 ach malloc. Consider using `_snwprintf` or `StringCchPrintfW` for safety on the print itself.","locations":[{"ref":"base/applications/cmdutils/reg/reg.c:200-205","code":"  200 |     WCHAR *subkey_path;\n  201 | \n  202 |     subkey_path = malloc((path_len + subkey_len + 2) * sizeof(WCHAR));\n  203 |     swprintf(subkey_path, L\"%s\\\\%s\", path, subkey_name);\n  204 | \n  205 |     return subkey_path;"},{"ref":"base/applications/cmdutils/reg/reg.c:222-231","code":"  222 |     {\n  223 |         long_key = malloc((len + 1) * sizeof(WCHAR));\n  224 |         lstrcpyW(long_key, root_rels[i].long_name);\n  225 |         return long_key;\n  226 |     }\n  227 | \n  228 |     len += lstrlenW(path) + 1; /* add one for the concatenating backslash */\n  229 |     long_key = malloc((len + 1) * sizeof(WCHAR));\n  230 |     swprintf(long_key, L\"%s\\\\%s\", root_rels[i].long_name, path);\n  231 |     return long_key;"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"Three consecutive HeapAlloc calls (finddata, inputpath, outputpath) and the malloc/lstrcpy pair in XCOPY_CreateDirectory have no return-value checks. On any allocation failure, the next line dereferences NULL or `lstrcpyW(NULL, path)` derefs and crashes. xcopy of a large file tree can plausibly exhaust the process heap; today the result is a crash instead of an error message + clean exit.","fix":"After every Heap/malloc call, check for NULL, free anything already allocated in that scope, and either return an error code or `goto cleanup`. The function-level cleanup pattern already exists for FindFirstFileW, just extend it to the allocations.","locations":[{"ref":"base/applications/cmdutils/xcopy/xcopy.c:209-210","code":"  209 |     new_path = HeapAlloc(GetProcessHeap(),0, sizeof(WCHAR) * (lstrlenW(path)+1));\n  210 |     lstrcpyW(new_path,path);"},{"ref":"base/applications/cmdutils/xcopy/xcopy.c:279-284","code":"  279 |           thisEntry = HeapAlloc(GetProcessHeap(), 0, sizeof(EXCLUDELIST));\n  280 |           thisEntry->next = excludeList;\n  281 |           excludeList = thisEntry;\n  282 |           thisEntry->name = HeapAlloc(GetProcessHeap(), 0,\n  283 |                                       (length * sizeof(WCHAR))+1);\n  284 |           lstrcpyW(thisEntry->name, buffer);"},{"ref":"base/applications/cmdutils/xcopy/xcopy.c:361-363","code":"  361 |     finddata = HeapAlloc(GetProcessHeap(), 0, sizeof(WIN32_FIND_DATAW));\n  362 |     inputpath = HeapAlloc(GetProcessHeap(), 0, MAX_PATH * sizeof(WCHAR));\n  363 |     outputpath = HeapAlloc(GetProcessHeap(), 0, MAX_PATH * sizeof(WCHAR));"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"ScmGetNoInteractiveServicesValue calls RegQueryValueExW without resetting dwKeySize between attempts and without validating the returned dwType. The local lError variable is assigned the result but never inspected before returning.","fix":"Initialize NoInteractiveServices to a known safe default; validate dwType == REG_DWORD and dwKeySize == sizeof(DWORD) after the call; explicitly reset NoInteractiveServices on failure.","locations":[{"ref":"base/system/services/database.c:1158-1182","code":" 1158 | static\n 1159 | VOID\n 1160 | ScmGetNoInteractiveServicesValue(VOID)\n 1161 | {\n 1162 |     HKEY hKey;\n 1163 |     DWORD dwKeySize;\n 1164 |     LONG lError;\n 1165 | \n 1166 |     lError = RegOpenKeyExW(HKEY_LOCAL_MACHINE,\n 1167 |                            L\"SYSTEM\\\\CurrentControlSet\\\\Control\\\\Windows\",\n 1168 |                            0,\n 1169 |                            KEY_READ,\n 1170 |                            &hKey);\n 1171 |     if (lError == ERROR_SUCCESS)\n 1172 |     {\n 1173 |         dwKeySize = sizeof(NoInteractiveServices);\n 1174 |         lError = RegQueryValueExW(hKey,\n 1175 |                                   L\"NoInteractiveServices\",\n 1176 |                                   0,\n 1177 |                                   NULL,\n 1178 |                                   (LPBYTE)&NoInteractiveServices,\n 1179 |                                   &dwKeySize);\n 1180 |         RegCloseKey(hKey);\n 1181 |     }\n 1182 | }"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"ScmInitNamedPipeCriticalSection reads `ServicesPipeTimeout` from HKLM but ignores the return status of RegQueryValueExW and never validates that the returned type is REG_DWORD or that dwKeySize == sizeof(DWORD). A misconfigured registry value silently corrupts adjacent globals or leaves PipeTimeout half-written.","fix":"Capture the return value into dwError, check the returned type is REG_DWORD and size is sizeof(DWORD); fall back to a safe default otherwise.","locations":[{"ref":"base/system/services/database.c:2399-2414","code":" 2399 |     dwError = RegOpenKeyExW(HKEY_LOCAL_MACHINE,\n 2400 |                             L\"SYSTEM\\\\CurrentControlSet\\\\Control\",\n 2401 |                             0,\n 2402 |                             KEY_READ,\n 2403 |                             &hKey);\n 2404 |    if (dwError == ERROR_SUCCESS)\n 2405 |    {\n 2406 |         dwKeySize = sizeof(PipeTimeout);\n 2407 |         RegQueryValueExW(hKey,\n 2408 |                          L\"ServicesPipeTimeout\",\n 2409 |                          0,\n 2410 |                          NULL,\n 2411 |                          (LPBYTE)&PipeTimeout,\n 2412 |                          &dwKeySize);\n 2413 |        RegCloseKey(hKey);\n 2414 |    }"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In `RegEnumValueA`, when the value is a string type and lpData is non-NULL, `DataBuffer = RtlAllocateHeap(..., *lpcbData * sizeof(WCHAR));` allocates without checking for failure. If the allocation returns NULL, `RegEnumValueW` is invoked with a NULL output buffer plus a non-zero size, leading to NULL-pointer writes.","fix":"After the alloc, check `if (lpData && !DataBuffer) { ErrorCode = ERROR_NOT_ENOUGH_MEMORY; goto Exit; }` before calling RegEnumValueW.","locations":[{"ref":"dll/win32/advapi32/reg/reg.c:2731-2772","code":" 2731 |     if (is_string(LocalType) && lpcbData)\n 2732 |     {\n 2733 |         /* We must allocate a buffer to get the unicode data */\n 2734 |         DWORD DataBufferSize = *lpcbData * sizeof(WCHAR);\n 2735 |         WCHAR* DataBuffer = NULL;\n 2736 |         DWORD DataLength = *lpcbData;\n 2737 |         LPSTR DataStr = (LPSTR)lpData;\n 2738 | \n 2739 |         if (lpData)\n 2740 |             DataBuffer = RtlAllocateHeap(RtlGetProcessHeap(), 0, *lpcbData * sizeof(WCHAR));\n 2741 | \n 2742 |         /* Do the real call */\n 2743 |         ErrorCode = RegEnumValueW(\n 2744 |             hKey,\n 2745 |             dwIndex,\n 2746 |             NameBuffer,\n 2747 |             &NameBufferSize,\n 2748 |             lpdwReserved,\n 2749 |             lpdwType,\n 2750 |             (LPBYTE)DataBuffer,\n 2751 |             &DataBufferSize);\n 2752 | \n 2753 |         *lpcbData = DataBufferSize / sizeof(WCHAR);\n 2754 | \n 2755 |         if (ErrorCode != ERROR_SUCCESS)\n 2756 |         {\n 2757 |             RtlFreeHeap(RtlGetProcessHeap(), 0, DataBuffer);\n 2758 |             goto Exit;\n 2759 |         }\n 2760 | \n 2761 |         /* Copy the data whatever the error code is */\n 2762 |         if (lpData)\n 2763 |         {\n 2764 |             /* Do the data conversion */\n 2765 |             RtlUnicodeToMultiByteN(DataStr, DataLength, 0, DataBuffer, DataBufferSize);\n 2766 |             /* NULL-terminate if there is enough room */\n 2767 |             if ((DataLength > *lpcbData) && (DataStr[*lpcbData - 1] != '\\0'))\n 2768 |                 DataStr[*lpcbData] = '\\0';\n 2769 |         }\n 2770 | \n 2771 |         RtlFreeHeap(RtlGetProcessHeap(), 0, DataBuffer);\n 2772 |     }"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"USBPORT_GetUnicodeName has no upper bound on Length, so a misbehaving Get*Name worker that keeps returning UsbUserBufferTooSmall with monotonically increasing ActualBufferLength leads to unbounded pool consumption (DoS) and eventual pool exhaustion.","fix":"Cap the retry loop (e.g. at most 2-3 iterations or a maximum Length such as 64 KiB) and abort with STATUS_INSUFFICIENT_RESOURCES if the worker keeps requesting more space.","locations":[{"ref":"drivers/usb/usbport/ioctl.c:209-304","code":"  209 | NTSTATUS\n  210 | NTAPI\n  211 | USBPORT_GetUnicodeName(IN PDEVICE_OBJECT FdoDevice,\n  212 |                        IN PIRP Irp,\n  213 |                        IN PULONG_PTR Information)\n  214 | {\n  215 |     PUSB_HCD_DRIVERKEY_NAME DriverKey;\n  216 |     PIO_STACK_LOCATION IoStack;\n  217 |     ULONG OutputBufferLength;\n  218 |     ULONG IoControlCode;\n  219 |     ULONG Length;\n  220 |     PUSBUSER_CONTROLLER_UNICODE_NAME ControllerName;\n  221 |     PUSB_UNICODE_NAME UnicodeName;\n  222 |     ULONG ActualLength;\n  223 | \n  224 |     DPRINT(\"USBPORT_GetUnicodeName: ... \\n\");\n  225 | \n  226 |     *Information = 0;\n  227 |     DriverKey = Irp->AssociatedIrp.SystemBuffer;\n  228 | \n  229 |     IoStack = IoGetCurrentIrpStackLocation(Irp);\n  230 |     OutputBufferLength = IoStack->Parameters.DeviceIoControl.OutputBufferLength;\n  231 |     IoControlCode = IoStack->Parameters.DeviceIoControl.IoControlCode;\n  232 | \n  233 |     if (OutputBufferLength < sizeof(USB_UNICODE_NAME))\n  234 |     {\n  235 |         return STATUS_BUFFER_TOO_SMALL;\n  236 |     }\n  237 | \n  238 |     Length = sizeof(USBUSER_CONTROLLER_UNICODE_NAME);\n  239 | \n  240 |     while (TRUE)\n  241 |     {\n  242 |         ControllerName = ExAllocatePoolWithTag(PagedPool,\n  243 |                                                Length,\n  244 |                                                USB_PORT_TAG);\n  245 | \n  246 |         if (!ControllerName)\n  247 |         {\n  248 |             return STATUS_INSUFFICIENT_RESOURCES;\n  249 |         }\n  250 | \n  251 |         RtlZeroMemory(ControllerName, Length);\n  252 | \n  253 |         ControllerName->Header.RequestBufferLength = Length;\n  254 |         UnicodeName = &ControllerName->UnicodeName;\n  255 | \n  256 |         if (IoControlCode == IOCTL_GET_HCD_DRIVERKEY_NAME)\n  257 |         {\n  258 |             ControllerName->Header.UsbUserRequest = USBUSER_GET_CONTROLLER_DRIVER_KEY;\n  259 |             USBPORT_UserGetHcName(FdoDevice, ControllerName, UnicodeName);\n  260 |         }\n  261 |         else\n  262 |         {\n  263 |             ControllerName->Header.UsbUserRequest = USBUSER_GET_ROOTHUB_SYMBOLIC_NAME;\n  264 |             USBPORT_UserGetRootHubName(FdoDevice, ControllerName, UnicodeName);\n  265 |         }\n  266 | \n  267 |         if (ControllerName->Header.UsbUserStatusCode != UsbUserBufferTooSmall)\n  268 |         {\n  269 |             break;\n  270 |         }\n  271 | \n  272 |         Length = ControllerName->Header.ActualBufferLength;\n  273 | \n  274 |         ExFreePoolWithTag(ControllerName, USB_PORT_TAG);\n  275 |     }\n  276 | \n  277 |     if (ControllerName->Header.UsbUserStatusCode != UsbUserSuccess)\n  278 |     {\n  279 |         ExFreePoolWithTag(ControllerName, USB_PORT_TAG);\n  280 |         return STATUS_UNSUCCESSFUL;\n  281 |     }\n  282 | \n  283 |     ActualLength = sizeof(ULONG) + ControllerName->UnicodeName.Length;\n  284 | \n  285 |     DriverKey->ActualLength = ActualLength;\n  286 | \n  287 |     if (OutputBufferLength < ActualLength)\n  288 |     {\n  289 |         DriverKey->DriverKeyName[0] = UNICODE_NULL;\n  290 |         *Information = sizeof(USB_UNICODE_NAME);\n  291 |     }\n  292 |     else\n  293 |     {\n  294 |         RtlCopyMemory(DriverKey->DriverKeyName,\n  295 |                       ControllerName->UnicodeName.String,\n  296 |                       ControllerName->UnicodeName.Length);\n  297 | \n  298 |         *Information = DriverKey->ActualLength;\n  299 |     }\n  300 | \n  301 |     ExFreePoolWithTag(ControllerName, USB_PORT_TAG);\n  302 | \n  303 |     return STATUS_SUCCESS;\n  304 | }"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"User32 callback dispatch checks `if (! MsgiKMToUMMessage(...)) { }` and `if (! MsgiKMToUMReply(...)) { }` with empty bodies — the conversion failure return value is examined but never acted on, and execution proceeds to call the window proc / use UMMsg as if the conversion succeeded. On HeapAlloc failure inside the converter, garbage/uninitialised UMMsg fields are dispatched.","fix":"On conversion failure, return early (or set CallbackArgs->Result to a sensible value) instead of falling through with possibly-stale UMMsg contents.","locations":[{"ref":"win32ss/user/user32/windows/message.c:3008-3025","code":" 3008 |   if (! MsgiKMToUMMessage(&KMMsg, &UMMsg))\n 3009 |     {\n 3010 |     }\n 3011 | \n 3012 |   if (pci->CallbackWnd.hWnd == UMMsg.hwnd)\n 3013 |      pWnd = pci->CallbackWnd.pWnd;\n 3014 | \n 3015 |   CallbackArgs->Result = IntCallWindowProcW( CallbackArgs->IsAnsiProc,\n 3016 |                                              CallbackArgs->Proc,\n 3017 |                                              pWnd,\n 3018 |                                              UMMsg.hwnd,\n 3019 |                                              UMMsg.message,\n 3020 |                                              UMMsg.wParam,\n 3021 |                                              UMMsg.lParam);\n 3022 | \n 3023 |   if (! MsgiKMToUMReply(&KMMsg, &UMMsg, &CallbackArgs->Result))\n 3024 |     {\n 3025 |     }"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`StringCchPrintfExW` return value is captured in `hRes` but never checked. On failure (e.g. buffer overflow), the function leaves `offNewFilePart` in an indeterminate state, then immediately computes `offNewFilePart = EnumCtx->cchBuffer - offNewFilePart;` — a meaningless value — and recurses into `EnumFilesWorker` with a corrupted offset. The next StringCchCopy could then write off the end of the buffer.","fix":"Check `if (FAILED(hRes)) { /* skip this entry or warn */ continue; }` before computing the new offset and recursing.","locations":[{"ref":"base/applications/cmdutils/attrib/attrib.c:213-219","code":"  213 |             hRes = StringCchPrintfExW(pFilePart, cchRemaining,\n  214 |                                       NULL, &offNewFilePart, 0,\n  215 |                                       L\"%s\\\\\", findFileName);\n  216 |             /* Offset to the new file name part */\n  217 |             offNewFilePart = EnumCtx->cchBuffer - offNewFilePart;\n  218 | \n  219 |             bFound |= EnumFilesWorker(EnumCtx, offNewFilePart);"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`ReadFile(hFileSrc, buffer, BUFF_SIZE, &dwRead, NULL);` ignores the function's return value. On a hardware read error or a closed handle, ReadFile returns FALSE and (per MSDN) the value of *lpNumberOfBytesRead is not necessarily defined. The next line checks `if (dwRead == 0) break;` but the loop may also dispatch garbled WriteFile calls or loop forever on partially-defined dwRead values. In practice ReadFile sets dwRead to 0 on most failures, but explicit checks are required.","fix":"Capture and check the result: `if (!ReadFile(...)) { /* report and break with error */ }`. Same for the WriteFile call.","locations":[{"ref":"base/applications/cmdutils/replace/replace.c:170-192","code":"  170 |     do\n  171 |     {\n  172 |         /* Read data from source */\n  173 |         ReadFile(hFileSrc, buffer, BUFF_SIZE, &dwRead, NULL);\n  174 | \n  175 |         /* Done? */\n  176 |         if (dwRead == 0)\n  177 |             break;\n  178 | \n  179 |         /* Write to destination file */\n  180 |         WriteFile(hFileDest, buffer, dwRead, &dwWritten, NULL);\n  181 | \n  182 |         /* Done! or ctrl break! */\n  183 |         if (dwWritten != dwRead || bCtrlBreak)\n  184 |         {\n  185 |             ConOutResPuts(STRING_COPY_ERROR3);\n  186 |             VirtualFree(buffer, 0, MEM_RELEASE);\n  187 |             CloseHandle(hFileDest);\n  188 |             CloseHandle(hFileSrc);\n  189 |             return 0;\n  190 |         }\n  191 |     }\n  192 |     while (!bEof);"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`BOOL bEof = FALSE;` is declared and tested in `while (!bEof);` but is never assigned anywhere in the function — the loop only exits via the explicit `break` on dwRead == 0 or via the error-return on write mismatch. The bEof variable is effectively dead state and the while-condition is equivalent to `while (TRUE)`. Misleading to readers.","fix":"Either remove `bEof` and write the loop as `while (TRUE)` (or `for (;;)`), or actually set `bEof = TRUE;` next to the existing `break;` and remove the explicit break. Pick one consistent style.","locations":[{"ref":"base/applications/cmdutils/replace/replace.c:38-201","code":"   38 | INT replace(TCHAR source[MAX_PATH], TCHAR dest[MAX_PATH], DWORD dwFlags, BOOL *doMore)\n   39 | {\n   40 |     TCHAR d[MAX_PATH];\n   41 |     TCHAR s[MAX_PATH];\n   42 |     HANDLE hFileSrc, hFileDest;\n   43 |     DWORD  dwAttrib, dwRead, dwWritten;\n   44 |     LPBYTE buffer;\n   45 |     BOOL   bEof = FALSE;\n   46 |     FILETIME srcCreationTime, destCreationTime, srcLastAccessTime, destLastAccessTime;\n   47 |     FILETIME srcLastWriteTime, destLastWriteTime;\n   48 |     GetPathCase(source, s);\n   49 |     GetPathCase(dest, d);\n   50 |     s[0] = _totupper(s[0]);\n   51 |     d[0] = _totupper(d[0]);\n   52 |     // ConOutPrintf(_T(\"old-src:  %s\\n\"), s);\n   53 |     // ConOutPrintf(_T(\"old-dest: %s\\n\"), d);\n   54 |     // ConOutPrintf(_T(\"src:  %s\\n\"), source);\n   55 |     // ConOutPrintf(_T(\"dest: %s\\n\"), dest);\n   56 | \n   57 |     /* Open up the sourcefile */\n   58 |     hFileSrc = CreateFile(source, GENERIC_READ, FILE_SHARE_READ,NULL, OPEN_EXISTING, 0, NULL);\n   59 |     if (hFileSrc == INVALID_HANDLE_VALUE)\n   60 |     {\n   61 |         ConOutResPrintf(STRING_COPY_ERROR1, source);\n   62 |         return 0;\n   63 |     }\n   64 | \n   65 |     /*\n   66 |      * Get the time from source file to be used in the comparison\n   67 |      * with dest time if update switch is set.\n   68 |      */\n   69 |     GetFileTime(hFileSrc, &srcCreationTime, &srcLastAccessTime, &srcLastWriteTime);\n   70 | \n   71 |     /*\n   72 |      * Retrieve the source attributes so that they later on\n   73 |      * can be inserted in to the destination.\n   74 |      */\n   75 |     dwAttrib = GetFileAttributes(source);\n   76 | \n   77 |     if (IsExistingFile(dest))\n   78 |     {\n   79 |         /*\n   80 |          * Resets the attributes to avoid problems with read only files,\n   81 |          * checks for read only has been made earlier.\n   82 |          */\n   83 |         SetFileAttributes(dest,FILE_ATTRIBUTE_NORMAL);\n   84 |         /*\n   85 |          * Is the update flas set? The time has to be controled so that\n   86 |          * only older files are replaced.\n   87 |          */\n   88 |         if (dwFlags & REPLACE_UPDATE)\n   89 |         {\n   90 |             /* Read destination time */\n   91 |             hFileDest = CreateFile(dest, GENERIC_READ, FILE_SHARE_READ, NULL, OPEN_EXISTING,\n   92 |                 0, NULL);\n   93 | \n   94 |             if (hFileDest == INVALID_HANDLE_VALUE)\n   95 |             {\n   96 |                 ConOutResPrintf(STRING_COPY_ERROR1, dest);\n   97 |                 CloseHandle(hFileSrc);\n   98 |                 return 0;\n   99 |             }\n  100 | \n  101 |             /* Compare time */\n  102 |             GetFileTime(hFileDest, &destCreationTime, &destLastAccessTime, &destLastWriteTime);\n  103 |             if (!((srcLastWriteTime.dwHighDateTime > destLastWriteTime.dwHighDateTime) ||\n  104 |                     (srcLastWriteTime.dwHighDateTime == destLastWriteTime.dwHighDateTime &&\n  105 |                      srcLastWriteTime.dwLowDateTime > destLastWriteTime.dwLowDateTime)))\n  106 |             {\n  107 |                 CloseHandle(hFileSrc);\n  108 |                 CloseHandle(hFileDest);\n  109 |                 return 0;\n  110 |             }\n  111 |             CloseHandle(hFileDest);\n  112 |         }\n  113 |         /* Delete the old file */\n  114 |         DeleteFile(dest);\n  115 |     }\n  116 | \n  117 |     /* Check confirm flag, and take appropriate action */\n  118 |     if (dwFlags & REPLACE_CONFIRM)\n  119 |     {\n  120 |         /* Output depending on add flag */\n  121 |         if (dwFlags & REPLACE_ADD)\n  122 |             ConOutResPrintf(STRING_REPLACE_HELP9, dest);\n  123 |         else\n  124 |             ConOutResPrintf(STRING_REPLACE_HELP10, dest);\n  125 |         if (!FilePromptYNA(0))\n  126 |         {\n  127 |             CloseHandle(hFileSrc);\n  128 |             return 0;\n  129 |         }\n  130 |     }\n  131 | \n  132 |     /* Output depending on add flag */\n  133 |     if (dwFlags & REPLACE_ADD)\n  134 |         ConOutResPrintf(STRING_REPLACE_HELP11, dest);\n  135 |     else\n  136 |         ConOutResPrintf(STRING_REPLACE_HELP5, dest);\n  137 | \n  138 |     /* Make sure source and destination is not the same */\n  139 |     if (!_tcscmp(s, d))\n  140 |     {\n  141 |         ConOutResPrintf(STRING_REPLACE_ERROR7);\n  142 |         CloseHandle(hFileSrc);\n  143 |         *doMore = FALSE;\n  144 |         return 0;\n  145 |     }\n  146 | \n  147 |     /* Open destination file to write to */\n  148 |     hFileDest "type":"dead_code","type_label":"Dead Code","severity":"low","description":"In both A->W and W->A WM_GETDLGCODE handlers the code does `MSG newmsg = *(MSG *)UnicodeMsg->lParam; newmsg.wParam = map_wparam_AtoW(...);` (or `_WtoA`) and then discards `newmsg`. The translated wParam is never written back to the original message via `UnicodeMsg->lParam`, so the conversion is a no-op.","fix":"Either remove the dead block or write the translated wParam back: `((MSG*)UnicodeMsg->lParam)->wParam = newmsg.wParam;`.","locations":[{"ref":"win32ss/user/user32/windows/message.c:681-687","code":"  681 |     case WM_GETDLGCODE:\n  682 |       if (UnicodeMsg->lParam)\n  683 |       {\n  684 |          MSG newmsg = *(MSG *)UnicodeMsg->lParam;\n  685 |          newmsg.wParam = map_wparam_AtoW( newmsg.message, newmsg.wParam);\n  686 |       }\n  687 |       break;"},{"ref":"win32ss/user/user32/windows/message.c:1106-1123","code":" 1106 |       case WM_GETDLGCODE:\n 1107 |         if (UnicodeMsg->lParam)\n 1108 |         {\n 1109 |            MSG newmsg = *(MSG *)UnicodeMsg->lParam;\n 1110 |            switch(newmsg.message)\n 1111 |            {\n 1112 |               case WM_CHAR:\n 1113 |               case WM_DEADCHAR:\n 1114 |               case WM_SYSCHAR:\n 1115 |               case WM_SYSDEADCHAR:\n 1116 |                 newmsg.wParam = map_wparam_char_WtoA( newmsg.wParam, 1 );\n 1117 |                 break;\n 1118 |               case WM_IME_CHAR:\n 1119 |                 newmsg.wParam = map_wparam_char_WtoA( newmsg.wParam, 2 );\n 1120 |                 break;\n 1121 |            }\n 1122 |         }\n 1123 |         break;"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"critical","description":"AfdSelect IOCTL handler passes user-supplied handles to ObReferenceObjectByHandle with KernelMode access mode. A user-mode caller can convert any kernel handle (file objects, processes, threads, etc.) into a referenced kernel pointer, then have AFD treat it as a PFI low","description":"TrimLeftRightWhitespace computes `pStr = String + wcslen(String) - 1;` then loops while `pStr >= String`. When the input string is empty after left-trim, `String + 0 - 1` is a pointer one before the buffer — forming this pointer is undefined behaviour per C99 §6.5.6p8 (a pointer must not point more than one past the end). The subsequent comparison `pStr >= String` is implementation-defined for that UB pointer. Most compilers handle it benignly, but the standard does not guarantee it.","fix":"Compute the length first, branch on emptiness: `size_t len = wcslen(String); if (len == 0) return String; PWSTR pStr = String + len - 1; ...`.","locations":[{"ref":"base/applications/cmdutils/eventcreate/eventcreate.c:690-708","code":"  690 | static PWSTR\n  691 | TrimLeftRightWhitespace(\n  692 |     IN PWSTR String)\n  693 | {\n  694 |     PWSTR pStr;\n  695 | \n  696 |     /* Trim whitespace on left (just advance the pointer) */\n  697 |     while (*String && iswspace(*String))\n  698 |         ++String;\n  699 | \n  700 |     /* Trim whitespace on right (NULL-terminate) */\n  701 |     pStr = String + wcslen(String) - 1;\n  702 |     while (pStr >= String && iswspace(*pStr))\n  703 |         --pStr;\n  704 |     *++pStr = L'\\0';\n  705 | \n  706 |     /* Return the modified pointer */\n  707 |     return String;\n  708 | }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"On revert-on-failure, the code calls `CliSaveImeHotKey(dwID, uVirtualKey, uModifiers, hKL, TRUE)` but the function signature is `CliSaveImeHotKey(DWORD dwID, UINT uModifiers, UINT uVirtualKey, HKL hKL, BOOL bDelete)` — the 2nd and 3rd arguments are swapped. Because bDelete=TRUE means only `dwID` is used, the bug currently has no functional impact, but it is clearly a copy-paste error and will silently misbehave if the function is changed to use those args.","fix":"Swap the arguments: `CliSaveImeHotKey(dwID, uModifiers, uVirtualKey, hKL, TRUE);`.","locations":[{"ref":"win32ss/user/user32/windows/input.c:252-253","code":"  252 |     if (bRevertOnFailure)\n  253 |         CliSaveImeHotKey(dwID, uVirtualKey, uModifiers, hKL, TRUE);"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"AfdSetDisconnectOptionsSize frees FCB->DisconnectOptions without setting the pointer to NULL; if the subsequent ExAllocatePoolWithTag fails the FCB is left holding a dangling pointer with size 0. A later AfdSetDisconnectOptionsSize call will hit the `if (FCB->DisconnectOptions)` branch and ExFreePoolWithTag the same address again (double free). The identical pattern exists in AfdSetDisconnectDataSize.","fix":"After ExFreePoolWithTag set FCB->DisconnectOptions / FCB->DisconnectData to NULL (matching the correct pattern in AfdSetDisconnectData at lines 91-97).","locations":[{"ref":"drivers/network/afd/afd/main.c:138-149","code":"  138 |     if (FCB->DisconnectOptions)\n  139 |     {\n  140 |         ExFreePoolWithTag(FCB->DisconnectOptions, TAG_AFD_DISCONNECT_OPTIONS);\n  141 |         FCB->DisconnectOptionsSize = 0;\n  142 |         FCB->FilledDisconnectOptions = 0;\n  143 |     }\n  144 | \n  145 |     FCB->DisconnectOptions = ExAllocatePoolWithTag(PagedPool,\n  146 |                                                    *DisconnectOptionsSize,\n  147 |                                                    TAG_AFD_DISCONNECT_OPTIONS);\n  148 | \n  149 |     if (!FCB->DisconnectOptions) return UnlockAndMaybeComplete(FCB, STATUS_NO_MEMORY, Irp, 0);"},{"ref":"drivers/network/afd/afd/main.c:250-262","code":"  250 |     if (FCB->DisconnectData)\n  251 |     {\n  252 |         ExFreePoolWithTag(FCB->DisconnectData, TAG_AFD_DISCONNECT_DATA);\n  253 |         FCB->DisconnectDataSize = 0;\n  254 |         FCB->FilledDisconnectData = 0;\n  255 |     }\n  256 | \n  257 |     FCB->DisconnectData = ExAllocatePoolWithTag(PagedPool,\n  258 |                                                 *Discon <div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-28 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
