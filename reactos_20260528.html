<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"ParseModes() in mode.c always returns NULL unconditionally regardless of whether parsing succeeded. Every caller (BuildNewCommDCB at TO=, XON=, ODSR=, OCTS=, DTR=, RTS=, IDSR=) checks `if (!argStr) return FALSE;`, so the new-style serial port mode setting is completely broken — these flags cannot ever be configured via `mode COMx ...`.","fix":"Change the final `return NULL;` to `return argStr;` so the function returns the advanced pointer on success.","locations":[{"ref":"base/applications/cmdutils/mode/mode.c:641-666","code":"  641 | static PCWSTR\n  642 | ParseModes(PCWSTR argStr, PBYTE Mode)\n  643 | {\n  644 |     if (_wcsnicmp(argStr, L\"OFF\", 3) == 0)\n  645 |     {\n  646 |         argStr += 3;\n  647 |         *Mode = 0;\n  648 |     }\n  649 |     else if (_wcsnicmp(argStr, L\"ON\", 2) == 0)\n  650 |     {\n  651 |         argStr += 2;\n  652 |         *Mode = 1;\n  653 |     }\n  654 |     else if (_wcsnicmp(argStr, L\"HS\", 2) == 0)\n  655 |     {\n  656 |         argStr += 2;\n  657 |         *Mode = 2;\n  658 |     }\n  659 |     else if (_wcsnicmp(argStr, L\"TG\", 2) == 0)\n  660 |     {\n  661 |         argStr += 2;\n  662 |         *Mode = 3;\n  663 |     }\n  664 | \n  665 |     return NULL;\n  666 | }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"RtlLargeIntegerArithmeticShift is broken in two ways. The function exists to compute an arithmetic (sign-preserving) right shift of a 64-bit value by 0..63 bits. (1) For Shift >= 32 it does `RC.u.HighPart = (LargeInteger.u.HighPart & 0x80000000);` — this preserves only the sign bit in its original position (bit 31), it does NOT sign-extend; the proper result needs HighPart to be all-ones for negative inputs and all-zeros for non-negatives. The current code produces a value with only bit 31 set (a giant negative-looking number even when the result should be `-1`). (2) `RC.u.LowPart = LargeInteger.u.HighPart >> Shift;` where Shift is in 32..63 is undefined behavior — shifting a 32-bit value by >= its width is UB. Both issues vanish entirely if the function just does `RC.QuadPart = LargeInteger.QuadPart >> Shift;` for all valid Shift values (compilers emit arithmetic-shift for signed 64-bit on all supported targets). Kernel-mode callers using this API for arithmetic right-shifts get wrong results when shifting by 32+ bits.","fix":"Replace the entire if/else body with `RC.QuadPart = LargeInteger.QuadPart >> Shift;` (LargeInteger.QuadPart is LONGLONG; signed right shift is arithmetic on all supported architectures and the standard guarantees implementation-defined-but-typically-arithmetic behaviour). Drop the Shift<32/>=32 split.","locations":[{"ref":"sdk/lib/rtl/largeint.c:244-266","code":"  244 | RtlLargeIntegerArithmeticShift (\n  245 |    LARGE_INTEGER LargeInteger,\n  246 |    CCHAR  ShiftCount\n  247 | )\n  248 | {\n  249 |    LARGE_INTEGER RC;\n  250 |    CHAR Shift;\n  251 | \n  252 |    Shift = ShiftCount % 64;\n  253 | \n  254 |    if (Shift < 32)\n  255 |    {\n  256 |       RC.QuadPart = LargeInteger.QuadPart >> Shift;\n  257 |    }\n  258 |    else\n  259 |    {\n  260 |       /* copy the sign bit */\n  261 |       RC.u.HighPart = (LargeInteger.u.HighPart & 0x80000000);\n  262 |       RC.u.LowPart = LargeInteger.u.HighPart >> Shift;\n  263 |    }\n  264 | \n  265 |    return RC;\n  266 | }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Option parsing in `comp.c` assumes all `/A` and `/L` options come before the two file names. The argv-walk increments `NumberOfOptions` for each `/` arg anywhere in argv, then unconditionally reads `argv[1 + NumberOfOptions]` and `argv[2 + NumberOfOptions]` as the file names. If the user runs `comp file1 /a file2`, NumberOfOptions=1, so File1 is set from argv[2] = \"/a\" and File2 from argv[3] = \"file2\" — the option string gets used as a path.","fix":"Walk argv once and accumulate non-option positional arguments into a separate index list (or two pointers `pFile1 / pFile2`), then validate that exactly two were collected. Don't conflate the option count with the file-name index.","locations":[{"ref":"base/applications/cmdutils/comp/comp.c:80-117","code":"   80 |     for (i = 1; i < argc; i++)\n   81 |     {\n   82 |         if (argv[i][0] == L'/')\n   83 |         {\n   84 |             switch (towlower(argv[i][1]))\n   85 |             {\n   86 |                 case L'a':\n   87 |                     bAscii = TRUE;\n   88 |                     NumberOfOptions++;\n   89 |                     break;\n   90 | \n   91 |                 case L'l':\n   92 |                     bLineNos = TRUE;\n   93 |                     NumberOfOptions++;\n   94 |                     break;\n   95 | \n   96 |                 case L'?':\n   97 |                     ConResPuts(StdOut, IDS_HELP);\n   98 |                     return EXIT_SUCCESS;\n   99 | \n  100 |                 default:\n  101 |                     ConResPrintf(StdErr, IDS_INVALIDSWITCH, argv[i][1]);\n  102 |                     ConResPuts(StdOut, IDS_HELP);\n  103 |                     return EXIT_FAILURE;\n  104 |             }\n  105 |         }\n  106 |     }\n  107 | \n  108 |     if (argc - NumberOfOptions == 3)\n  109 |     {\n  110 |         wcsncpy(File1, argv[1 + NumberOfOptions], _MAX_PATH);\n  111 |         wcsncpy(File2, argv[2 + NumberOfOptions], _MAX_PATH);\n  112 |     }\n  113 |     else\n  114 |     {\n  115 |         ConResPuts(StdErr, IDS_BADSYNTAX);\n  116 |         return EXIT_FAILURE;\n  117 |     }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Switch fall-through in EDIT_WndProc: the `case WM_KEYUP:` block updates the caret/caption then falls through (no `break` after the inner switch) into `case WM_LBUTTONUP:`. Every key event therefore calls `DIALOG_StatusBarUpdateCaretPos()` twice (once from the inner default branch, once from the LBUTTONUP body) and gives keystrokes side effects intended only for mouse clicks. Minor visible effect today, but easy to introduce a regression when adding logic to either case.","fix":"Add `break;` after the closing brace of the inner switch (between line 315 and `case WM_LBUTTONUP:`). Each outer case should explicitly `break;`.","locations":[{"ref":"base/applications/notepad/main.c:294-323","code":"  294 | LRESULT CALLBACK EDIT_WndProc(HWND hWnd, UINT msg, WPARAM wParam, LPARAM lParam)\n  295 | {\n  296 |     switch (msg)\n  297 |     {\n  298 |         case WM_KEYDOWN:\n  299 |         case WM_KEYUP:\n  300 |         {\n  301 |             switch (wParam)\n  302 |             {\n  303 |                 case VK_UP:\n  304 |                 case VK_DOWN:\n  305 |                 case VK_LEFT:\n  306 |                 case VK_RIGHT:\n  307 |                     DIALOG_StatusBarUpdateCaretPos();\n  308 |                     break;\n  309 |                 default:\n  310 |                 {\n  311 |                     UpdateWindowCaption(FALSE);\n  312 |                     break;\n  313 |                 }\n  314 |             }\n  315 |         }\n  316 |         case WM_LBUTTONUP:\n  317 |         {\n  318 |             DIALOG_StatusBarUpdateCaretPos();\n  319 |             break;\n  320 |         }\n  321 |     }\n  322 |     return CallWindowProc( Globals.EditProc, hWnd, msg, wParam, lParam);\n  323 | }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"PerfDataGetCommandLine treats UNICODE_STRING.Length (a byte count) as a WCHAR count. cache->len/CommandLineStr.Length is set to the byte length, but then used as the count argument to wcsncpy() and in CMD_LINE_MIN comparisons against nMaxCount (a WCHAR count). The CMD_LINE_MIN macro `(a < b ? a - sizeof(WCHAR) : b)` also underflows when `a` is unsigned and less than sizeof(WCHAR).","fix":"Store cache->len in WCHAR units. Guard CMD_LINE_MIN against underflow with an explicit `if (a == 0) return 0;` check. Verify min >= wcslen(ellipsis) before computing the offset.","locations":[{"ref":"base/applications/taskmgr/perfdata.c:38","code":"   38 | #define CMD_LINE_MIN(a, b) (a < b ? a - sizeof(WCHAR) : b)"},{"ref":"base/applications/taskmgr/perfdata.c:560-645","code":"  560 |         if (cache->idx == Index && cache->str != NULL)\n  561 |         {\n  562 |             /* Found it. Use it, and add some ellipsis at the very end to make it cute */\n  563 |             wcsncpy(lpCommandLine, cache->str, CMD_LINE_MIN(nMaxCount, cache->len));\n  564 |             wcscpy(lpCommandLine + CMD_LINE_MIN(nMaxCount, cache->len) - wcslen(ellipsis), ellipsis);\n  565 |             return TRUE;\n  566 |         }\n  567 | \n  568 |         cache = cache->pnext;\n  569 |     }\n  570 | \n  571 |     /* [B] We don't; let's allocate and load a value from the process mem... and cache it */\n  572 |     ProcessId = PerfDataGetProcessId(Index);\n  573 | \n  574 |     /* Default blank command line in case things don't work out */\n  575 |     wcsncpy(lpCommandLine, L\"\", nMaxCount);\n  576 | \n  577 |     /* Ask for a handle to the target process so that we can read its memory and query stuff */\n  578 |     hProcess = OpenProcess(PROCESS_QUERY_INFORMATION | PROCESS_VM_READ, FALSE, ProcessId);\n  579 |     if (!hProcess)\n  580 |         goto cleanup;\n  581 | \n  582 |     /* First off, get the ProcessEnvironmentBlock location in that process' address space */\n  583 |     Status = NtQueryInformationProcess(hProcess, 0, &pbi, sizeof(pbi), NULL);\n  584 |     if (!NT_SUCCESS(Status))\n  585 |         goto cleanup;\n  586 | \n  587 |     /* Then get the PEB.ProcessParameters member pointer */\n  588 |     result = ReadProcessMemory(hProcess,\n  589 |                                (PVOID)((ULONG_PTR)pbi.PebBaseAddress + FIELD_OFFSET(PEB, ProcessParameters)),\n  590 |                                &ProcessParams,\n  591 |                                sizeof(ProcessParams),\n  592 |                                NULL);\n  593 |     if (!result)\n  594 |         goto cleanup;\n  595 | \n  596 |     /* Then copy the PEB->ProcessParameters.CommandLine member\n  597 |        to get the pointer to the string buffer and its size */\n  598 |     result = ReadProcessMemory(hProcess,\n  599 |                                (PVOID)((ULONG_PTR)ProcessParams + FIELD_OFFSET(RTL_USER_PROCESS_PARAMETERS, CommandLine)),\n  600 |                                &CommandLineStr,\n  601 |                                sizeof(CommandLineStr),\n  602 |                                NULL);\n  603 |     if (!result)\n  604 |         goto cleanup;\n  605 | \n  606 |     /* Allocate the next cache entry and its accompanying string in one go */\n  607 |     new_entry = HeapAlloc(GetProcessHeap(),\n  608 |                           HEAP_ZERO_MEMORY,\n  609 |                           sizeof(CMD_LINE_CACHE) + CommandLineStr.Length + sizeof(UNICODE_NULL));\n  610 |     if (!new_entry)\n  611 |         goto cleanup;\n  612 | \n  613 |     new_string = (LPWSTR)((ULONG_PTR)new_entry + sizeof(CMD_LINE_CACHE));\n  614 | \n  615 |     /* Bingo, the command line should be stored there,\n  616 |        copy the string from the other process */\n  617 |     result = ReadProcessMemory(hProcess,\n  618 |                                CommandLineStr.Buffer,\n  619 |                                new_string,\n  620 |                                CommandLineStr.Length,\n  621 |                                NULL);\n  622 |     if (!result)\n  623 |     {\n  624 |         /* Weird, after successfully reading the mem of that process\n  625 |            various times it fails now, forget it and bail out */\n  626 |         HeapFree(GetProcessHeap(), 0, new_entry);\n  627 |         goto cleanup;\n  628 |     }\n  629 | \n  630 |     /* Add our pointer to the cache... */\n  631 |     new_entry->idx = Index;\n  632 |     new_entry->str = new_string;\n  633 |     new_entry->len = CommandLineStr.Length;\n  634 | \n  635 |     if (!global_cache)\n  636 |         global_cache = new_entry;\n  637 |     else\n  638 |         cache->pnext = new_entry;\n  639 | \n  640 |     /* ... and print the buffer for the first time */\n  641 |     wcsncpy(lpCommandLine, new_string, CMD_LINE_MIN(nMaxCount, CommandLineStr.Length));\n  642 | \n  643 | cleanup:\n  644 |     if (hProcess) CloseHandle(hProcess);\n  645 |     return TRUE;"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The `bTouch` branch inverts the success/failure semantics of SetFileTime. SetFileTime returns non-zero on SUCCESS, but here the success branch sets `nErrorLevel = 1` and returns 1, while the failure branch (else) returns 0. As a result, `copy /b ... ,,` (touch syntax) reports failure when it succeeds and success when it fails, leaving the shell's ERRORLEVEL inverted.","fix":"Invert the if/else. The intended logic is `if (SetFileTime(...)) { CloseHandle(hFileSrc); return 1; } else { CloseHandle(hFileSrc); nErrorLevel = 1; return 0; }` (assuming the existing convention that `return 1` means OK in this function — confirm by checking the caller; otherwise swap the return values accordingly).","locations":[{"ref":"base/shell/cmd/copy.c:87-100","code":"   87 |         GetSystemTime(&CurrentTime);\n   88 |         SystemTimeToFileTime(&CurrentTime, &NewFileTime);\n   89 |         if (SetFileTime(hFileSrc,(LPFILETIME) NULL, (LPFILETIME) NULL, &NewFileTime))\n   90 |         {\n   91 |             CloseHandle(hFileSrc);\n   92 |             nErrorLevel = 1;\n   93 |             return 1;\n   94 | \n   95 |         }\n   96 |         else\n   97 |         {\n   98 |             CloseHandle(hFileSrc);\n   99 |             return 0;\n  100 |         }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`if exist <empty-string>` triggers an out-of-bounds read. After StripQuotes, if the user passes `IF EXIST \"\" ...`, the resulting Right buffer is empty, so `Size = _tcslen(Right)` is 0 and `Right[Size - 1]` (== `Right[-1]`) reads one wchar before the buffer. The same `Right[Size - 1] = 0;` on line 127 then performs a one-byte write before the buffer. Reachable from any batch file.","fix":"Guard with `if (Size == 0) { IsDir = FALSE; } else { IsDir = (Right[Size - 1] == '\\\\'); if (IsDir) Right[Size - 1] = 0; }`. Restore on line 148 with the same `if (IsDir && Size != 0)` guard.","locations":[{"ref":"base/shell/cmd/if.c:121-149","code":"  121 |         /* IF EXIST filename: check if file exists (wildcards allowed) */\n  122 |         StripQuotes(Right);\n  123 | \n  124 |         Size = _tcslen(Right);\n  125 |         IsDir = (Right[Size - 1] == '\\\\');\n  126 |         if (IsDir)\n  127 |             Right[Size - 1] = 0;\n  128 | \n  129 |         hFind = FindFirstFile(Right, &f);\n  130 |         if (hFind != INVALID_HANDLE_VALUE)\n  131 |         {\n  132 |             attrs = f.dwFileAttributes;\n  133 |             FindClose(hFind);\n  134 |         }\n  135 |         else\n  136 |         {\n  137 |             /* FindFirstFile fails at the root directory. */\n  138 |             attrs = GetFileAttributes(Right);\n  139 |         }\n  140 | \n  141 |         if (attrs == INVALID_FILE_ATTRIBUTES)\n  142 |             result = FALSE;\n  143 |         else if (IsDir)\n  144 |             result = ((attrs & FILE_ATTRIBUTE_DIRECTORY) == FILE_ATTRIBUTE_DIRECTORY);\n  145 |         else\n  146 |             result = TRUE;\n  147 | \n  148 |         if (IsDir)\n  149 |             Right[Size - 1] = '\\\\';"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","description":"KiUserExceptionDispatcher sets NestedExceptionRecord.NumberParameters to the NTSTATUS returned by NtContinue/NtRaiseException. NumberParameters is the count of ExceptionInformation entries (max EXCEPTION_MAXIMUM_PARAMETERS=15) and ExceptionInformation is left uninitialized. Setting it to an arbitrary NTSTATUS value causes downstream code that walks ExceptionInformation to read garbage stack memory.","fix":"Set `NestedExceptionRecord.NumberParameters = 0;` (and leave ExceptionInformation untouched). The actual status should be conveyed via ExceptionCode, which is already set.","locations":[{"ref":"dll/ntdll/dispatch/dispatch.c:44-51","code":"   44 |     /* Setup the Exception record */\n   45 |     NestedExceptionRecord.ExceptionCode = Status;\n   46 |     NestedExceptionRecord.ExceptionFlags = EXCEPTION_NONCONTINUABLE;\n   47 |     NestedExceptionRecord.ExceptionRecord = ExceptionRecord;\n   48 |     NestedExceptionRecord.NumberParameters = Status;\n   49 | \n   50 |     /* Raise the exception */\n   51 |     RtlRaiseException(&NestedExceptionRecord);"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In LdrFindEntryForAddress, the NextEntry advancement is inside the `if (NtHeader)` block. If RtlImageNtHeader returns NULL for any module's DllBase (e.g. a corrupted/unmapped image), the loop never advances and becomes an infinite loop, hanging the thread (and the loader lock if held).","fix":"Move `NextEntry = NextEntry->Flink;` out of the `if (NtHeader)` branch so the list is advanced unconditionally on every iteration.","locations":[{"ref":"dll/ntdll/ldr/ldrapi.c:466-489","code":"  466 |     while (NextEntry != ListHead)\n  467 |     {\n  468 |         /* Get the entry and NT Headers */\n  469 |         LdrEntry = CONTAINING_RECORD(NextEntry, LDR_DATA_TABLE_ENTRY, InMemoryOrderLinks);\n  470 |         NtHeader = RtlImageNtHeader(LdrEntry->DllBase);\n  471 |         if (NtHeader)\n  472 |         {\n  473 |             /* Get the Image Base */\n  474 |             DllBase = (ULONG_PTR)LdrEntry->DllBase;\n  475 |             DllEnd = DllBase + NtHeader->OptionalHeader.SizeOfImage;\n  476 | \n  477 |             /* Check if they match */\n  478 |             if (((ULONG_PTR)Address >= DllBase) &&\n  479 |                 ((ULONG_PTR)Address < DllEnd))\n  480 |             {\n  481 |                 /* Return it */\n  482 |                 *Module = LdrEntry;\n  483 |                 return STATUS_SUCCESS;\n  484 |             }\n  485 | \n  486 |             /* Next Entry */\n  487 |             NextEntry = NextEntry->Flink;\n  488 |         }\n  489 |     }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","description":"When the user input causes the (ULONG_PTR)AtomName-as-integer-atom check to fail (Atom >= MAXINTATOM), the function sets the last error and DPRINTs — but then *falls through and returns Atom* (the too-large value). The companion `InternalAddAtom` correctly returns `INVALID_ATOM` in the analogous branch. As written, FindAtom for an out-of-range integer atom appears to succeed and returns a bogus atom value to user code.","fix":"Inside the `if (Atom >= MAXINTATOM)` branch in InternalFindAtom, change the body to: `BaseSetLastNTError(STATUS_INVALID_PARAMETER); DPRINT1(\"Invalid atom\\n\"); return INVALID_ATOM;`.","locations":[{"ref":"dll/win32/kernel32/client/atom.c:144-156","code":"  144 |     if ((ULONG_PTR)AtomName <= 0xFFFF)\n  145 |     {\n  146 |         /* Convert the name to an atom */\n  147 |         Atom = (ATOM)PtrToShort((PVOID)AtomName);\n  148 |         if (Atom >= MAXINTATOM)\n  149 |         {\n  150 |             /* Fail, atom number too large */\n  151 |             BaseSetLastNTError(STATUS_INVALID_PARAMETER);\n  152 |             DPRINT1(\"Invalid atom\\n\");\n  153 |         }\n  154 | \n  155 |         /* Return it */\n  156 |         return Atom;"},{"ref":"dll/win32/kernel32/client/atom.c:43-55","code":"   43 |     if ((ULONG_PTR)AtomName <= 0xFFFF)\n   44 |     {\n   45 |         /* Convert the name to an atom */\n   46 |         Atom = (ATOM)PtrToShort((PVOID)AtomName);\n   47 |         if (Atom >= MAXINTATOM)\n   48 |         {\n   49 |             /* Fail, atom number too large */\n   50 |             BaseSetLastNTError(STATUS_INVALID_PARAMETER);\n   51 |             return INVALID_ATOM;\n   52 |         }\n   53 | \n   54 |         /* Return it */\n   55 |         return Atom;"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Loop condition order is wrong. The while-loop tests `CurrentRegion->Length <= RemainingLength` BEFORE `CurrentEntry != RegionListHead`. When the iteration reaches the list head, CurrentRegion is `CONTAINING_RECORD(RegionListHead, MM_REGION, RegionListEntry)` — a synthetic pointer whose `->Length` is whatever happens to sit at that offset of the list-head struct. We read garbage memory, then *maybe* exit. Subtle: even if the wrap is correctly detected the cycle still reads garbage once.","fix":"Reorder the condition: `while (CurrentEntry != RegionListHead && RemainingLength > 0 && CurrentRegion->Length <= RemainingLength)`. C `&&` short-circuits left-to-right so this prevents the bogus CONTAINING_RECORD dereference.","locations":[{"ref":"ntoskrnl/mm/region.c:161-180","code":"  161 |     while (RemainingLength > 0 && CurrentRegion->Length <= RemainingLength &&\n  162 |             CurrentEntry != RegionListHead)\n  163 |     {\n  164 |         if (CurrentRegion->Type != NewType ||\n  165 |                 CurrentRegion->Protect != NewProtect)\n  166 |         {\n  167 |             AlterFunc(AddressSpace, CurrentBaseAddress, CurrentRegion->Length,\n  168 |                       CurrentRegion->Type, CurrentRegion->Protect,\n  169 |                       NewType, NewProtect);\n  170 |         }\n  171 | \n  172 |         CurrentBaseAddress = (PVOID)((ULONG_PTR)CurrentBaseAddress + CurrentRegion->Length);\n  173 |         NewRegion->Length += CurrentRegion->Length;\n  174 |         RemainingLength -= CurrentRegion->Length;\n  175 |         CurrentEntry = CurrentEntry->Flink;\n  176 |         RemoveEntryList(&CurrentRegion->RegionListEntry);\n  177 |         ExFreePoolWithTag(CurrentRegion, TAG_MM_REGION);\n  178 |         CurrentRegion = CONTAINING_RECORD(CurrentEntry, MM_REGION,\n  179 |                                           RegionListEntry);\n  180 |     }"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"high","description":"RtlGenerate8dot3Name: the tilde-truncation indicator for a truncated extension is never inserted. The loop builds the extension and at the end does `Char = UNICODE_NULL;` on every iteration. After the loop, the check `if (Char != UNICODE_NULL) Context->ExtensionBuffer[Context->ExtensionLength - 1] = L'~';` always sees UNICODE_NULL — so the `~` is never written, even when the extension was truncated because the 4-character ExtensionBuffer filled up before the source ran out. Generated 8.3 names lose the truncation marker, which can cause naming collisions on filesystems that rely on this convention.","fix":"Track truncation explicitly: declare `BOOL Truncated = FALSE;` before the loop, set it when exiting due to `Context->ExtensionLength >= 4` while there are still source chars left, and after the loop write `~` only if `Truncated`. Remove the `Char = UNICODE_NULL` line — it had no observable effect anyway.","locations":[{"ref":"sdk/lib/rtl/dos8dot3.c:134-161","code":"  134 |         Context->ExtensionLength = 0;\n  135 |         if (DotPos < Length)\n  136 |         {\n  137 |             Context->ExtensionBuffer[0] = L'.';\n  138 |             Context->ExtensionLength = 1;\n  139 | \n  140 |             while (DotPos < Length && Context->ExtensionLength < 4)\n  141 |             {\n  142 |                 Char = Name->Buffer[DotPos];\n  143 | \n  144 |                 if ((Char > L' ') && (Char != L'.') &&\n  145 |                     ((Char < 127) || (AllowExtendedCharacters && RtlIsValidOemCharacter(&Char))))\n  146 |                 {\n  147 |                     if (RtlpIsShortIllegal(Char))\n  148 |                         Char = L'_';\n  149 |                     else if (Char >= L'a' && Char <= L'z')\n  150 |                         Char = RtlpUpcaseUnicodeChar(Char);\n  151 | \n  152 |                     Context->ExtensionBuffer[Context->ExtensionLength++] = Char;\n  153 |                 }\n  154 | \n  155 |                 Char = UNICODE_NULL;\n  156 |                 ++DotPos;\n  157 |             }\n  158 | \n  159 |             if (Char != UNICODE_NULL)\n  160 |                 Context->ExtensionBuffer[Context->ExtensionLength - 1] = L'~';\n  161 |         }"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"ParseLines in fc text.h always advances by `ichNext * sizeof(WCHAR)` when bumping pib->QuadPart, regardless of whether TCHAR is WCHAR or CHAR. In ANSI builds (texta.c, _MBCS) TCHAR is char (1 byte), but the offset is multiplied by sizeof(WCHAR)=2, so the parser skips twice as many bytes as it consumed and misaligns/skips half the file for ANSI text compare.","fix":"Change `pib->QuadPart += ichNext * sizeof(WCHAR);` to `pib->QuadPart += ichNext * sizeof(TCHAR);`.","locations":[{"ref":"base/applications/cmdutils/fc/text.h:305","code":"  305 |     pib->QuadPart += ichNext * sizeof(WCHAR);"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"When the input file's last line ends without a trailing newline (no '\\n'), `fgets` still leaves the buffer with no newline to strip — but `temp[strlen(temp) - 1] = '\\0'` unconditionally truncates the final character. The last data character of the last line is silently dropped from the sort output.","fix":"Only strip if the last char is a newline: `size_t len = strlen(temp); if (len && temp[len-1] == '\\n') temp[len-1] = '\\0';`","locations":[{"ref":"base/applications/cmdutils/sort/sort.c:143-151","code":"  143 |         if (fgets(temp, MAXLEN, stdin) == NULL)\n  144 |         {\n  145 |             break;\n  146 |         }\n  147 | \n  148 |         if(strlen(temp))\n  149 |         {\n  150 |             temp[strlen(temp) - 1] = '\\0';\n  151 |         }"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Same last-line truncation bug as in sort.c. When the EXCLUDE file's final line has no trailing newline, `length = lstrlenW(buffer)` measures the data without newline, and `buffer[length-1] = 0;` truncates the last data character. The truncated string is then added to the exclude list, so a filename pattern like `\\bin` (without trailing newline) becomes `\\bi`, and matching is broken.","fix":"Only strip if the last char is actually CR or LF: `if (length > 0 && (buffer[length-1] == L'\\n' || buffer[length-1] == L'\\r')) buffer[length-1] = 0;`. Also handle the `\\r\\n` case if needed.","locations":[{"ref":"base/applications/cmdutils/xcopy/xcopy.c:272-287","code":"  272 |     while (fgetws(buffer, ARRAY_SIZE(buffer), inFile) != NULL) {\n  273 |         EXCLUDELIST *thisEntry;\n  274 |         int length = lstrlenW(buffer);\n  275 | \n  276 |         /* If more than CRLF */\n  277 |         if (length > 1) {\n  278 |           buffer[length-1] = 0;  /* strip CRLF */\n  279 |           thisEntry = HeapAlloc(GetProcessHeap(), 0, sizeof(EXCLUDELIST));\n  280 |           thisEntry->next = excludeList;\n  281 |           excludeList = thisEntry;\n  282 |           thisEntry->name = HeapAlloc(GetProcessHeap(), 0,\n  283 |                                       (length * sizeof(WCHAR))+1);\n  284 |           lstrcpyW(thisEntry->name, buffer);\n  285 |           CharUpperBuffW(thisEntry->name, length);\n  286 |           WINE_TRACE(\"Read line : '%s'\\n\", wine_dbgstr_w(thisEntry->name));\n  287 |         }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"findstr.c parses options only up to the first positional argument: once `needle` is assigned, the outer `while ((--argc) && (needle == NULL))` terminates and any later options (e.g. `findstr foo /i bar.txt`) are silently treated as filenames. This is the same option-after-positional-argument bug pattern as comp.c.","fix":"Restructure the argument loop so options can appear anywhere on the command line.","locations":[{"ref":"base/applications/findstr/findstr.c:160-232","code":"  160 |   /* Scan the command line */\n  161 |   while ((--argc) && (needle == NULL))\n  162 |     {\n  163 |       if (*(opt = *++argv) == '/')\n  164 |         {\n  165 |           switch (opt[1])\n  166 | \t    {\n  167 | \t      case 'b':\n  168 | \t      case 'B':\t\t/* Matches pattern if at the beginning of a line */\n  169 | \t        at_start = 1;\n  170 | \t        break;\n  171 | \n  172 | \t      //case 'c':\n  173 | \t      //case 'C':\t\t/* Literal? */\n  174 | \t      //  literal_search = 1;\n  175 | \t      //  break;\n  176 | \n  177 | \t      case 'e':\n  178 | \t      case 'E':\t\t/* matches pattern if at end of line */\n  179 | \t        at_end = 1;\n  180 | \t        break;\n  181 | \n  182 | \t      case 'i':\n  183 | \t      case 'I':\t\t/* Ignore */\n  184 | \t        ignore_case = 1;\n  185 | \t        break;\n  186 | \n  187 | \t      case 'm':\n  188 | \t      case 'M':\t\t/* only filename */\n  189 | \t        only_fname = 1;\n  190 | \t        break;\n  191 | \n  192 | \t      case 'n':\n  193 | \t      case 'N':\t\t/* Number */\n  194 | \t        number_output = 1;\n  195 | \t        break;\n  196 | \n  197 | \t      case 'r':\n  198 | \t      case 'R':\t\t/* search strings as regular expressions */\n  199 | \t        reg_express = 1;\n  200 | \t        break;\n  201 | \n  202 | \t      case 's':\n  203 | \t      case 'S':\t\t/* search files in child directory too*/\n  204 | \t        sub_dirs = 1;\n  205 | \t        break;\n  206 | \n  207 | \t      case 'v':\n  208 | \t      case 'V':\t\t/* Not with */\n  209 | \t        invert_search = 1;\n  210 | \t        break;\n  211 | \n  212 | \t      case 'x':\n  213 | \t      case 'X':\t\t/* exact match */\n  214 | \t        exact_match = 1;\n  215 | \t        break;\n  216 | \n  217 | \t      default:\n  218 | \t        usage ();\n  219 | \t        exit (2);\t\t/* syntax error .. return error 2 */\n  220 | \t        break;\n  221 | \t    }\n  222 |         }\n  223 |       else\n  224 |         {\n  225 |           /* Get the string */\n  226 | \t  if (needle == NULL)\n  227 | \t    {\n  228 |               /* Assign the string to find */\n  229 |               needle = *argv;\n  230 | \t    }\n  231 | \t}\n  232 |     }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`NOTEPAD_ReplaceAll` calls `NOTEPAD_FindNext(... bReplace=TRUE ...)` in a loop. If the replacement string contains the search pattern as a substring (e.g. replace `a` with `aa`), `FindNext` finds the just-inserted text on the next iteration and replaces it again — infinite loop / hang and unbounded text growth.","fix":"After EM_REPLACESEL in FindNext (line ~160), advance the next search position past the inserted replacement (use `dwBegin + len(replaceWith)`), or use a 'replace-and-skip' mode that does not search inside freshly inserted text.","locations":[{"ref":"base/applications/notepad/main.c:218-230","code":"  218 |  *           NOTEPAD_ReplaceAll\n  219 |  */\n  220 | static VOID NOTEPAD_ReplaceAll(FINDREPLACE *pFindReplace)\n  221 | {\n  222 |     BOOL bShowAlert = TRUE;\n  223 | \n  224 |     SendMessage(Globals.hEdit, EM_SETSEL, 0, 0);\n  225 | \n  226 |     while (NOTEPAD_FindNext(pFindReplace, TRUE, bShowAlert))\n  227 |     {\n  228 |         bShowAlert = FALSE;\n  229 |     }\n  230 | }"},{"ref":"base/applications/notepad/main.c:165-176","code":"  165 |     if (pFindReplace->Flags & FR_DOWN)\n  166 |     {\n  167 |         /* Find Down */\n  168 |         dwPosition = dwEnd;\n  169 |         while(dwPosition < (DWORD) iTextLength)\n  170 |         {\n  171 |             bMatches = NOTEPAD_FindTextAt(pFindReplace, pszText, iTextLength, dwPosition);\n  172 |             if (bMatches)\n  173 |                 break;\n  174 |             dwPosition++;\n  175 |         }\n  176 |     }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"LdrpSnapIAT's forwarder-chain loop has a wasted/wrong `FirstThunk++` inside the SEH _SEH2_TRY block. The forwarder chain iterates by ForwarderChain index, and the next iteration recomputes OriginalThunk and FirstThunk from `IatEntry->FirstThunk + ForwarderChain * sizeof(IMAGE_THUNK_DATA)`. The post-increment is therefore dead.","fix":"Remove `FirstThunk++;` from the forwarder-chain branch (line 174).","locations":[{"ref":"dll/ntdll/ldr/ldrpe.c:143-184","code":"  143 |         /* Loop them */\n  144 |         while (ForwarderChain != -1)\n  145 |         {\n  146 |             /* Get the cached thunk VA*/\n  147 |             OriginalThunk = (PIMAGE_THUNK_DATA)\n  148 |                             ((ULONG_PTR)ImportLdrEntry->DllBase +\n  149 |                              IatEntry->OriginalFirstThunk +\n  150 |                              (ForwarderChain * sizeof(IMAGE_THUNK_DATA)));\n  151 | \n  152 |             /* Get the first thunk */\n  153 |             FirstThunk = (PIMAGE_THUNK_DATA)\n  154 |                          ((ULONG_PTR)ImportLdrEntry->DllBase +\n  155 |                           IatEntry->FirstThunk +\n  156 |                           (ForwarderChain * sizeof(IMAGE_THUNK_DATA)));\n  157 | \n  158 |             /* Get the Forwarder from the thunk */\n  159 |             ForwarderChain = (ULONG)FirstThunk->u1.Ordinal;\n  160 | \n  161 |             /* Snap the thunk */\n  162 |             _SEH2_TRY\n  163 |             {\n  164 |                 Status = LdrpSnapThunk(ExportLdrEntry->DllBase,\n  165 |                                        ImportLdrEntry->DllBase,\n  166 |                                        OriginalThunk,\n  167 |                                        FirstThunk,\n  168 |                                        ExportDirectory,\n  169 |                                        ExportSize,\n  170 |                                        TRUE,\n  171 |                                        ImportName);\n  172 | \n  173 |                 /* Move to the next thunk */\n  174 |                 FirstThunk++;\n  175 |             } _SEH2_EXCEPT(EXCEPTION_EXECUTE_HANDLER)\n  176 |             {\n  177 |                 /* Fail with the SEH error */\n  178 |                 Status = _SEH2_GetExceptionCode();\n  179 |             } _SEH2_END;\n  180 | \n  181 |             /* If we messed up, exit */\n  182 |             if (!NT_SUCCESS(Status)) break;\n  183 |         }\n  184 |     }"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"LockHandles short-circuits the loop after the first ObReferenceObjectByHandle failure: once Status becomes a failure code, the `if (NT_SUCCESS(Status))` guard prevents referencing any remaining handles, but the caller still gets back a partially-populated array (most entries Handle==0). The function returns NULL which makes AfdSelect bail with STATUS_NO_MEMORY for any single bad handle, instead of the documented per-handle semantics.","fix":"Reset Status to STATUS_SUCCESS inside the loop (or use a local NTSTATUS) so that one bad handle does not poison the rest.","locations":[{"ref":"drivers/network/afd/afd/lock.c:318-345","code":"  318 |     for( i = 0; FileObjects && i < HandleCount; i++ ) {\n  319 |         FileObjects[i].Status = 0;\n  320 |         FileObjects[i].Events = HandleArray[i].Events;\n  321 |         FileObjects[i].Handle = 0;\n  322 |         if( !HandleArray[i].Handle ) continue;\n  323 |         if( NT_SUCCESS(Status) ) {\n  324 |                 Status = ObReferenceObjectByHandle\n  325 |                     ( (PVOID)HandleArray[i].Handle,\n  326 |                       FILE_ALL_ACCESS,\n  327 |                       NULL,\n  328 |                        KernelMode,\n  329 |                        (PVOID*)&FileObjects[i].Handle,\n  330 |                        NULL );\n  331 |         }\n  332 | \n  333 |         if( !NT_SUCCESS(Status) )\n  334 |         {\n  335 |             AFD_DbgPrint(MIN_TRACE,(\"Failed to reference handles (0x%x)\\n\", Status));\n  336 |             FileObjects[i].Handle = 0;\n  337 |         }\n  338 |     }\n  339 | \n  340 |     if( !NT_SUCCESS(Status) ) {\n  341 |         UnlockHandles( FileObjects, HandleCount );\n  342 |         return NULL;\n  343 |     }\n  344 | \n  345 |     return FileObjects;"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"When exactly MAXRECORDS lines are read from stdin and EOF then follows, the loop exits with `nr == MAXRECORDS`. The code then reports 'number of records exceeds maximum' and exits with status 4 — even though no records were actually discarded. The error fires on a boundary that is not actually exceeded.","fix":"Detect overflow by trying one extra read after the loop, OR change the loop bound to MAXRECORDS+1 and only flag the error if the (N+1)th read succeeded.","locations":[{"ref":"base/applications/cmdutils/sort/sort.c:141-183","code":"  141 |     for (nr = 0; nr < MAXRECORDS; nr++)\n  142 |     {\n  143 |         if (fgets(temp, MAXLEN, stdin) == NULL)\n  144 |         {\n  145 |             break;\n  146 |         }\n  147 | \n  148 |         if(strlen(temp))\n  149 |         {\n  150 |             temp[strlen(temp) - 1] = '\\0';\n  151 |         }\n  152 | \n  153 |         list[nr] = (char *) malloc(strlen(temp) + 1);\n  154 |         if (list[nr] == NULL)\n  155 |         {\n  156 |             fputs(\"SORT: Insufficient memory\\n\", stderr);\n  157 | \n  158 |             /* Cleanup memory */\n  159 |             for (i = 0; i < nr; i++)\n  160 |             {\n  161 |                 free(list[i]);\n  162 |             }\n  163 |             free(list);\n  164 |             exit(3);\n  165 |         }\n  166 | \n  167 |         strcpy(list[nr], temp);\n  168 |     }\n  169 | \n  170 |     if (nr == MAXRECORDS)\n  171 |     {\n  172 |         fputs(\"SORT: number of records exceeds maximum\\n\", stderr);\n  173 | \n  174 |         /* Cleanup memory */\n  175 |         for (i = 0; i < nr; i++)\n  176 |         {\n  177 |             free(list[i]);\n  178 |         }\n  179 |         free(list);\n  180 | \n  181 |         /* Bail out */\n  182 |         exit(4);\n  183 |     }"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Static `WCHAR str[STR_MAX]` is declared inside `DrawTree` and used to build the per-row label. DrawTree calls GetDirectoryStructure (line 200), which recurses back into DrawTree — at which point the inner level overwrites `str`. The current code does `wcscat(consoleOut, str)` BEFORE the recursive call, so the corruption is not observed today, but the design is fragile: any future change that defers use of `str` past the recursion will silently break.","fix":"Drop `static` from `str`; let it be on the stack (it is already STR_MAX = 2048 wchars, still acceptable). Or move the recursion into a separate phase after all `str` usage is complete.","locations":[{"ref":"base/applications/cmdutils/tree/tree.c:99-205","code":"   99 |     for (i = 0; i < szArr; ++i)\n  100 |     {\n  101 |         PWSTR consoleOut = (PWSTR)malloc(STR_MAX * sizeof(WCHAR));\n  102 |         UINT j = 0;\n  103 |         static WCHAR str[STR_MAX];\n  104 | \n  105 |         /* As we do not seem to have the _s functions properly set up, use the non-secure version for now */\n  106 |         //wcscpy_s(consoleOut, STR_MAX, L\"\");\n  107 |         //wcscpy_s(str, STR_MAX, L\"\");\n  108 |         wcscpy(consoleOut, L\"\");\n  109 |         wcscpy(str, L\"\");\n  110 | \n  111 |         for (j = 0; j < width - 1; ++j)\n  112 |         {\n  113 |             /* If the previous line has '├' or '│' then the current line will\n  114 |                add '│' to continue the connecting line */\n  115 |             if (prevLine[j] == L'\\x251C' || prevLine[j] == L'\\x2502' ||\n  116 |                 prevLine[j] == L'+' || prevLine[j] == L'|')\n  117 |             {\n  118 |                 if (!bUseAscii)\n  119 |                 {\n  120 |                     wcscat(consoleOut, L\"\\x2502\");\n  121 |                 }\n  122 |                 else\n  123 |                 {\n  124 |                     wcscat(consoleOut, L\"|\");\n  125 |                 }\n  126 |             }\n  127 |             else\n  128 |             {\n  129 |                 wcscat(consoleOut, L\" \");\n  130 |             }\n  131 |         }\n  132 | \n  133 |         if (szArr - 1 != i)\n  134 |         {\n  135 |             if (drawfolder)\n  136 |             {\n  137 |                 /* Add '├───Folder name' (\\xC3\\xC4\\xC4\\xC4 or \\x251C\\x2500\\x2500\\x2500) */\n  138 |                 if (bUseAscii)\n  139 |                     _swprintf(str, L\"+---%s\", arrFolder[i].cFileName);\n  140 |                 else\n  141 |                     _swprintf(str, L\"\\x251C\\x2500\\x2500\\x2500%s\", arrFolder[i].cFileName);\n  142 |             }\n  143 |             else\n  144 |             {\n  145 |                 if (bHasSubFolder)\n  146 |                 {\n  147 |                     /* Add '│   FileName' (\\xB3 or \\x2502) */\n  148 |                     // This line is added to connect the below-folder sub-structure\n  149 |                     if (bUseAscii)\n  150 |                         _swprintf(str, L\"|   %s\", arrFolder[i].cFileName);\n  151 |                     else\n  152 |                         _swprintf(str, L\"\\x2502   %s\", arrFolder[i].cFileName);\n  153 |                 }\n  154 |                 else\n  155 |                 {\n  156 |                     /* Add '    FileName' */\n  157 |                     _swprintf(str, L\"    %s\", arrFolder[i].cFileName);\n  158 |                 }\n  159 |             }\n  160 |         }\n  161 |         else\n  162 |         {\n  163 |             if (drawfolder)\n  164 |             {\n  165 |                 /* '└───Folder name' (\\xC0\\xC4\\xC4\\xC4 or \\x2514\\x2500\\x2500\\x2500) */\n  166 |                 if (bUseAscii)\n  167 |                     _swprintf(str, L\"\\\\---%s\", arrFolder[i].cFileName);\n  168 |                 else\n  169 |                     _swprintf(str, L\"\\x2514\\x2500\\x2500\\x2500%s\", arrFolder[i].cFileName);\n  170 |             }\n  171 |             else\n  172 |             {\n  173 |                 if (bHasSubFolder)\n  174 |                 {\n  175 |                     /* '│   FileName' (\\xB3 or \\x2502) */\n  176 |                     if (bUseAscii)\n  177 |                         _swprintf(str, L\"|   %s\", arrFolder[i].cFileName);\n  178 |                     else\n  179 |                         _swprintf(str, L\"\\x2502   %s\", arrFolder[i].cFileName);\n  180 |                 }\n  181 |                 else\n  182 |                 {\n  183 |                     /* '    FileName' */\n  184 |                     _swprintf(str, L\"    %s\", arrFolder[i].cFileName);\n  185 |                 }\n  186 |             }\n  187 |         }\n  188 | \n  189 |         wcscat(consoleOut, str);\n  190 |         ConPrintf(StdOut, L\"%s\\n\", consoleOut);\n  191 | \n  192 |         if (drawfolder)\n  193 |         {\n  194 |             PWSTR str = (PWSTR)malloc(STR_MAX * sizeof(WCHAR));\n  195 |             ZeroMemory(str, STR_MAX * sizeof(WCHAR));\n  196 | \n  197 |             wcscat(str, strPath);\n  198 |             wcscat(str, L\"\\\\\");\n  199 |             wcscat(str, arrFolder[i].cFileName);\n  200 |             GetDirectoryStructure(str, width + 4, consoleOut);\n  201 | \n  202 |             free(str);\n  203 |         }\n  204 |         free(consoleOut);\n  205 |     }"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`col = ((ich < 0) ? 0 : (dwStart - ich));` mixes signed and unsigned. `dwStart` is DWORD; if EM_LINEINDEX returned a valid `ich > dwStart` somehow, `dwStart - ich` underflows into a huge unsigned value that StringCchPrintf formats as a giant column number. Unlikely in practice for a valid edit control state but the check is one-sided.","fix":"Compute via signed: `col = ((ich < 0 || (int)dwStart < ich) ? 0 : (int)(dwStart - ich));`.","locations":[{"ref":"base/applications/notepad/dialog.c:933-948","code":"  933 | VOID DIALOG_StatusBarUpdateCaretPos(VOID)\n  934 | {\n  935 |     int line, ich, col;\n  936 |     TCHAR buff[MAX_PATH];\n  937 |     DWORD dwStart, dwSize;\n  938 | \n  939 |     SendMessage(Globals.hEdit, EM_GETSEL, (WPARAM)&dwStart, (LPARAM)&dwSize);\n  940 |     line = (int)SendMessage(Globals.hEdit, EM_LINEFROMCHAR, (WPARAM)dwStart, 0);\n  941 |     ich = (int)SendMessage(Globals.hEdit, EM_LINEINDEX, (WPARAM)line, 0);\n  942 | \n  943 |     /* EM_LINEINDEX can return -1 on failure */\n  944 |     col = ((ich < 0) ? 0 : (dwStart - ich));\n  945 | \n  946 |     StringCchPrintf(buff, _countof(buff), Globals.szStatusBarLineCol, line + 1, col + 1);\n  947 |     SendMessage(Globals.hStatusBar, SB_SETTEXT, SBPART_CURPOS, (LPARAM)buff);\n  948 | }"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The fall-through write in the UTF-16BE case writes up to `sizeof(buffer)` bytes per iteration (1024 bytes / 512 wchars) from a *shared* stack `buffer`, but on each iteration it copies a fresh slice of pszText into the *start* of buffer. Combined with the `&buffer[dwPos]` bug already reported (PANIC), this would produce a torn/garbled output once the file is >512 wchars even if `&buffer[dwPos]` were replaced with `buffer` — because the WriteFile sends only the first dwByteCount bytes from buffer, but the outer `do { ... } while` in `WriteText` is the line-by-line loop that calls WriteEncodedText with arbitrary line lengths; long lines would still need to be cycled in chunks but the `while(dwPos < dwTextLen)` loop already handles that. Worth re-verifying the whole UTF-16BE path end-to-end.","fix":"Audit the UTF-16BE write path with a >512-character test file and confirm output byte-by-byte matches the input with BOM. Probably also collapse buffer indexing to `pBytes = buffer;` and advance dwPos correctly (already covered by the PANIC finding).","locations":[{"ref":"base/applications/notepad/text.c:354-427","code":"  354 |     while(dwPos < dwTextLen)\n  355 |     {\n  356 |         switch(encFile)\n  357 |         {\n  358 |             case ENCODING_UTF16LE:\n  359 |                 pBytes = (LPBYTE) &pszText[dwPos];\n  360 |                 dwByteCount = (dwTextLen - dwPos) * sizeof(WCHAR);\n  361 |                 dwPos = dwTextLen;\n  362 |                 break;\n  363 | \n  364 |             case ENCODING_UTF16BE:\n  365 |                 dwByteCount = (dwTextLen - dwPos) * sizeof(WCHAR);\n  366 |                 if (dwByteCount > sizeof(buffer))\n  367 |                     dwByteCount = sizeof(buffer);\n  368 | \n  369 |                 memcpy(buffer, &pszText[dwPos], dwByteCount);\n  370 |                 for (i = 0; i < dwByteCount; i += 2)\n  371 |                 {\n  372 |                     b = buffer[i+0];\n  373 |                     buffer[i+0] = buffer[i+1];\n  374 |                     buffer[i+1] = b;\n  375 |                 }\n  376 |                 pBytes = (LPBYTE) &buffer[dwPos];\n  377 |                 dwPos += dwByteCount / sizeof(WCHAR);\n  378 |                 break;\n  379 | \n  380 |             case ENCODING_ANSI:\n  381 |             case ENCODING_UTF8:\n  382 |             case ENCODING_UTF8BOM:\n  383 |                 if (encFile == ENCODING_UTF8 || encFile == ENCODING_UTF8BOM)\n  384 |                     iCodePage = CP_UTF8;\n  385 |                 else\n  386 |                     iCodePage = CP_ACP;\n  387 | \n  388 |                 iRequiredBytes = WideCharToMultiByte(iCodePage, 0, &pszText[dwPos], dwTextLen - dwPos, NULL, 0, NULL, NULL);\n  389 |                 if (iRequiredBytes <= 0)\n  390 |                 {\n  391 |                     goto done;\n  392 |                 }\n  393 |                 else if (iRequiredBytes < sizeof(buffer))\n  394 |                 {\n  395 |                     pBytes = buffer;\n  396 |                     iBufferSize = sizeof(buffer);\n  397 |                 }\n  398 |                 else\n  399 |                 {\n  400 |                     pAllocBuffer = (LPBYTE) HeapAlloc(GetProcessHeap(), 0, iRequiredBytes);\n  401 |                     if (!pAllocBuffer)\n  402 |                         return FALSE;\n  403 |                     pBytes = pAllocBuffer;\n  404 |                     iBufferSize = iRequiredBytes;\n  405 |                 }\n  406 | \n  407 |                 dwByteCount = WideCharToMultiByte(iCodePage, 0, &pszText[dwPos], dwTextLen - dwPos, (LPSTR) pBytes, iBufferSize, NULL, NULL);\n  408 |                 if (!dwByteCount)\n  409 |                     goto done;\n  410 | \n  411 |                 dwPos = dwTextLen;\n  412 |                 break;\n  413 | \n  414 |             default:\n  415 |                 goto done;\n  416 |         }\n  417 | \n  418 |         if (!WriteFile(hFile, pBytes, dwByteCount, &dwDummy, NULL))\n  419 |             goto done;\n  420 | \n  421 |         /* free the buffer, if we have allocated one */\n  422 |         if (pAllocBuffer)\n  423 |         {\n  424 |             HeapFree(GetProcessHeap(), 0, pAllocBuffer);\n  425 |             pAllocBuffer = NULL;\n  426 |         }\n  427 |     }"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","description":"MultiByte-aware substring search across REG_MULTI_SZ data is wrong. The function calls `MatchString(pv1, cb1/sizeof(WCHAR), s_szFindWhat, ...)` treating REG_MULTI_SZ as a single contiguous buffer, but REG_MULTI_SZ contains multiple NUL-terminated strings concatenated together, ending with a double-NUL. CompareStringW with the full length will match a needle that crosses the embedded NUL boundary (e.g., a needle of `X\\0Y` matches across two consecutive REG_MULTI_SZ entries). Should iterate per string.","fix":"For REG_MULTI_SZ, walk the buffer in chunks separated by NUL terminators and call MatchString on each chunk individually.","locations":[{"ref":"base/applications/regedit/find.c:99-105","code":"   99 | static BOOL MatchData(DWORD dwType, LPCVOID pv1, DWORD cb1)\n  100 | {\n  101 |     if (dwType == REG_SZ || dwType == REG_EXPAND_SZ || dwType == REG_MULTI_SZ)\n  102 |         return MatchString(pv1, (INT)(cb1 / sizeof(WCHAR)), s_szFindWhat, lstrlenW(s_szFindWhat));\n  103 | \n  104 |     return FALSE;\n  105 | }"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","description":"RegFindRecurse handles `c == 0` (no subkeys/values) as a malloc failure. `malloc(0)` is implementation-defined: glibc/MSVCRT may return NULL. The function then `goto err` and returns FALSE, missing the chance to walk the (legitimate) empty key. Today the consequence is that the find operation prematurely fails on keys with no values OR no subkeys when it should just continue searching.","fix":"Short-circuit before malloc: `if (c == 0) { /* skip enumeration */ } else { ppszNames = malloc(c * sizeof(LPWSTR)); if (!ppszNames) goto err; ... }`. Or replace `malloc(c * sizeof(LPWSTR))` with `malloc(max(c, 1) * sizeof(LPWSTR))`.","locations":[{"ref":"base/applications/regedit/find.c:146-148","code":"  146 |     ppszNames = (LPWSTR *) malloc(c * sizeof(LPWSTR));\n  147 |     if (ppszNames == NULL)\n  148 |         goto err;"},{"ref":"base/applications/regedit/find.c:235-237","code":"  235 |     ppszNames = (LPWSTR *) malloc(c * sizeof(LPWSTR));\n  236 |     if (ppszNames == NULL)\n  237 |         goto err;"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`szFileName[_tcslen(szFileName) - 1]` and `szFileName[_tcslen(szFileName) - 2]` are indexed without first ensuring `_tcslen >= 2`. If `FileName` was an empty string the underflow indexes far before the buffer. Realistically the caller never passes empty, but the function is also reached via `del C:` which routes to `GetRootPath`; on certain error paths an empty result is possible.","fix":"Cache the length once: `size_t len = _tcslen(szFileName); if (len >= 2 && szFileName[len-2] == '\\\\' && szFileName[len-1] == '*') { ... }`.","locations":[{"ref":"base/shell/cmd/del.c:168","code":"  168 |         if (szFileName[_tcslen(szFileName) -  1] != _T('\\\\'))"},{"ref":"base/shell/cmd/del.c:176","code":"  176 |         (szFileName[_tcslen(szFileName) -  2] == _T('\\\\') && szFileName[_tcslen(szFileName) -  1] == _T('*')))"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Ext2GetRetrievalPointers performs ProbeForRead/ProbeForWrite inside an inner SEH, then accesses SVIB->StartingVcn (and writes through RPSB) outside that SEH. ProbeFor* only validates the address range; if the user later unmaps/changes protections (or hands a kernel address through Type3InputBuffer) the subsequent dereferences can still raise an unhandled exception.","fix":"Copy the StartingVcn into a kernel-local variable inside the same SEH that performs the Probe, and perform all RPSB writes inside SEH wrappers that translate exceptions to STATUS_INVALID_USER_BUFFER.","locations":[{"ref":"drivers/filesystems/ext2/src/fsctl.c:1019-1090","code":" 1019 |         _SEH2_TRY {\n 1020 |             if (Irp->RequestorMode != KernelMode) {\n 1021 |                 ProbeForRead (SVIB, InputSize,  sizeof(UCHAR));\n 1022 |                 ProbeForWrite(RPSB, OutputSize, sizeof(UCHAR));\n 1023 |             }\n 1024 |         } _SEH2_EXCEPT(EXCEPTION_EXECUTE_HANDLER) {\n 1025 |             Status = STATUS_INVALID_USER_BUFFER;\n 1026 |         } _SEH2_END;\n 1027 | \n 1028 |         if (!NT_SUCCESS(Status)) {\n 1029 |             _SEH2_LEAVE;\n 1030 |         }\n 1031 | \n 1032 |         UsedSize = FIELD_OFFSET(RETRIEVAL_POINTERS_BUFFER, Extents[0]);\n 1033 | \n 1034 |         /* request size beyonds whole file size ? */\n 1035 |         DEBUG(DL_DBG, (\"Ext2GetRetrievalPointers: Startin from Vbn: %I64xh\\n\",\n 1036 |                        SVIB->StartingVcn.QuadPart));\n 1037 |         Vbn = (SVIB->StartingVcn.QuadPart << BLOCK_BITS);\n 1038 |         if (Vbn >= Fcb->Header.AllocationSize.QuadPart ) {\n 1039 |             Status = STATUS_END_OF_FILE;\n 1040 |             _SEH2_LEAVE;\n 1041 |         }\n 1042 | \n 1043 |         /* now building all the request extents */\n 1044 |         while (Vbn < Fcb->Header.AllocationSize.QuadPart) {\n 1045 | \n 1046 |             ASSERT(Chain == NULL);\n 1047 |             Length = 0x80000000; /* 2g bytes */\n 1048 |             if (Fcb->Header.AllocationSize.QuadPart < Vbn + Length) {\n 1049 |                 Length = (ULONG)(Fcb->Header.AllocationSize.QuadPart - Vbn);\n 1050 |             }\n 1051 | \n 1052 |             /* build extents for sub-range */\n 1053 |             Status = Ext2BuildExtents(\n 1054 |                          IrpContext,\n 1055 |                          Vcb,\n 1056 |                          Fcb->Mcb,\n 1057 |                          Vbn,\n 1058 |                          Length,\n 1059 |                          FALSE,\n 1060 |                          &Chain);\n 1061 | \n 1062 |             if (!NT_SUCCESS(Status)) {\n 1063 |                 DbgBreak();\n 1064 |                 _SEH2_LEAVE;\n 1065 |             }\n 1066 | \n 1067 |             /* fill user buffer of RETRIEVAL_POINTERS_BUFFER */\n 1068 |             Extent = Chain;\n 1069 |             while (Extent) {\n 1070 | \n 1071 |                 DEBUG(DL_MAP, (\"Ext2GetRetrievalPointers: %wZ %d Vbn = %I64xh Lbn = %I64xh\\n\",\n 1072 |                                &Fcb->Mcb->FullName, i,\n 1073 |                                ((Vbn + Extent->Offset) >> BLOCK_BITS),\n 1074 |                                Extent->Lba));\n 1075 | \n 1076 |                 RPSB->Extents[i].Lcn.QuadPart = (Extent->Lba >> BLOCK_BITS);\n 1077 |                 RPSB->Extents[i].NextVcn.QuadPart = ((Vbn + Extent->Offset + Extent->Length) >> BLOCK_BITS);\n 1078 |                 if (i == 0) {\n 1079 |                     RPSB->StartingVcn.QuadPart = ((Vbn + Extent->Offset) >> BLOCK_BITS);\n 1080 |                 } else {\n 1081 |                     ASSERT(RPSB->Extents[i-1].NextVcn.QuadPart == ((Vbn + Extent->Offset) >> BLOCK_BITS));\n 1082 |                 }\n 1083 |                 if (UsedSize + sizeof(RETRIEVAL_POINTERS_BUFFER) > OutputSize) {\n 1084 |                     Status = STATUS_BUFFER_OVERFLOW;\n 1085 |                     _SEH2_LEAVE;\n 1086 |                 }\n 1087 |                 UsedSize += sizeof(LARGE_INTEGER) * 2;\n 1088 |                 Irp->IoStatus.Information = (ULONG_PTR)UsedSize;\n 1089 |                 RPSB->ExtentCount = ++i;\n 1090 |                 Extent = Extent->Next;"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`GetAsyncKeyState` validates the virtual-key code with `if (vKey < 0 || vKey > 256)` and then passes it to NtUserGetAsyncKeyState. Valid VK codes are 0..255; `> 256` lets the boundary value 256 through (off-by-one).","fix":"Change the bound to `vKey > 255` (or `vKey >= 256`).","locations":[{"ref":"win32ss/user/user32/windows/input.c:530-538","code":"  530 | SHORT\n  531 | WINAPI\n  532 | DECLSPEC_HOTPATCH\n  533 | GetAsyncKeyState(int vKey)\n  534 | {\n  535 |     if (vKey < 0 || vKey > 256)\n  536 |         return 0;\n  537 |     return (SHORT)NtUserGetAsyncKeyState((DWORD)vKey);\n  538 | }"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"`BlankArgument(int argc, WCHAR* argv[])` is named with `argc` for what is actually an array index (`i`). The caller passes `BlankArgument(i, argv)` — naming the parameter argc invites confusion or future misuse where a caller might pass an actual argc value and overflow `argv[argc]`.","fix":"Rename parameter from `argc` to `index`. Optionally also accept `argc` and check `index < argc` defensively.","locations":[{"ref":"base/applications/cmdutils/whoami/whoami.c:50-53","code":"   50 | void BlankArgument(int argc, WCHAR* argv[])\n   51 | {\n   52 |     argv[argc] = L\"\";\n   53 | }"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"`if (cchText <= 0)` where `cchText` is an unsigned DWORD: the `<= 0` test is equivalent to `== 0`. Not a bug today, but writing `<=` on unsigned is a code smell suggesting the author thought it was signed (and may add a real comparison later).","fix":"Either `if (cchText == 0)` for clarity, or change cchText to `int` to match GetWindowTextLengthW's documented return type semantics (cchText is assigned the raw return value here).","locations":[{"ref":"base/applications/notepad/dialog.c:269-273","code":"  269 |     cchText = GetWindowTextLengthW(Globals.hEdit);\n  270 |     if (cchText <= 0)\n  271 |     {\n  272 |         bRet = TRUE;\n  273 |     }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","description":"Classic unsigned-underflow bug in case-insensitive substring search. `cch1` and `cch2` are both UINT. When the search string is longer than the haystack (`cch1 < cch2`), the expression `cch1 - cch2` wraps to a near-UINT_MAX value, so `for (i = 0; i <= cch1 - cch2; ++i)` iterates billions of times reading far past the end of the input buffer with `pszStr + i`. Reachable from any `find /i \"longer string\" file` invocation where any line in the file is shorter than the pattern.","fix":"Add `if (cch1 < cch2) return NULL;` immediately after computing cch2, OR change the loop bound to `for (i = 0; cch2 + (UINT)i <= cch1; ++i)` (signed-aware). Also consider changing `i` to UINT to match the comparison's type.","locations":[{"ref":"base/applications/cmdutils/find/find.c:64-79","code":"   64 |         cch1 = (UINT)wcslen(pszStr);\n   65 |         cch2 = (UINT)wcslen(pszSearch);\n   66 | \n   67 |         if (cch2 == 0)\n   68 |             return (PWSTR)pszStr;\n   69 | \n   70 |         for (i = 0; i <= cch1 - cch2; ++i)\n   71 |         {\n   72 |             if (CompareStringW(LocaleId /* LOCALE_SYSTEM_DEFAULT */,\n   73 |                                NORM_IGNORECASE /* | NORM_LINGUISTIC_CASING */,\n   74 |                                pszStr + i, cch2, pszSearch, cch2) == CSTR_EQUAL)\n   75 |             {\n   76 |                 return (PWSTR)(pszStr + i);\n   77 |             }\n   78 |         }\n   79 |         return NULL;"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","description":"In CAB decompression, `data[len+1] = data[len+2] = 0;` clears two bytes after the just-read block, but the intent indicated by the comment and lzx-overflow buffer header is to clear data[len] and data[len+1]. As written, data[len+2] writes one byte past the end of the inbuf[CAB_INPUTMAX+2] array whenever a malicious/malformed CAB reports a block of exactly CAB_INPUTMAX bytes. Untrusted CAB input can corrupt the next fields in fdi_decomp_state.","fix":"Change to `data[len] = data[len+1] = 0;`.","locations":[{"ref":"dll/win32/cabinet/fdi.c:1976-1984","code":" 1976 |       data = CAB(inbuf) + inlen;\n 1977 |       len = EndGetI16(buf+cfdata_CompressedSize);\n 1978 |       inlen += len;\n 1979 |       if (inlen > CAB_INPUTMAX) return DECR_INPUT;\n 1980 |       if (CAB(fdi)->read(cab->cabhf, data, len) != len)\n 1981 |         return DECR_INPUT;\n 1982 | \n 1983 |       /* clear two bytes after read-in data */\n 1984 |       data[len+1] = data[len+2] = 0;"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","description":"NtGdiExtCreateRegion validates `Count` against `sizeof(RGNDATAHEADER) + nCount * sizeof(RECT)` where `nCount` is taken verbatim from user-supplied RGNDATA header. The `nCount * sizeof(RECT)` multiplication can overflow a 32-bit DWORD, causing the bounds check to pass for a tiny `Count`, after which `nCount` is used to size and iterate the region buffer — out-of-bounds read of the user-mode rects array and out-of-bounds writes into the much smaller kernel `Region` buffer via REGION_UnionRectWithRgn.","fix":"Use checked arithmetic: `if (nCount > (Count - sizeof(RGNDATAHEADER)) / sizeof(RECT)) return NULL;` and additionally cap `nCount` to a sane upper bound.","locations":[{"ref":"win32ss/gdi/ntgdi/region.c:3805-3858","code":" 3805 | HRGN\n 3806 | APIENTRY\n 3807 | NtGdiExtCreateRegion(\n 3808 |     OPTIONAL LPXFORM Xform,\n 3809 |     DWORD Count,\n 3810 |     LPRGNDATA RgnData)\n 3811 | {\n 3812 |     HRGN hRgn;\n 3813 |     PREGION Region;\n 3814 |     DWORD nCount = 0;\n 3815 |     DWORD iType = 0;\n 3816 |     DWORD dwSize = 0;\n 3817 |     UINT i;\n 3818 |     RECT* rects;\n 3819 |     NTSTATUS Status = STATUS_SUCCESS;\n 3820 |     MATRIX matrix;\n 3821 |     XFORMOBJ xo;\n 3822 | \n 3823 |     DPRINT(\"NtGdiExtCreateRegion\\n\");\n 3824 |     _SEH2_TRY\n 3825 |     {\n 3826 |         ProbeForRead(RgnData, Count, 1);\n 3827 |         nCount = RgnData->rdh.nCount;\n 3828 |         iType = RgnData->rdh.iType;\n 3829 |         dwSize = RgnData->rdh.dwSize;\n 3830 |         rects = (RECT*)RgnData->Buffer;\n 3831 |     }\n 3832 |     _SEH2_EXCEPT(EXCEPTION_EXECUTE_HANDLER)\n 3833 |     {\n 3834 |         Status = _SEH2_GetExceptionCode();\n 3835 |     }\n 3836 |     _SEH2_END;\n 3837 | \n 3838 |     if (!NT_SUCCESS(Status))\n 3839 |     {\n 3840 |         SetLastNtError(Status);\n 3841 |         return NULL;\n 3842 |     }\n 3843 | \n 3844 |     /* Check parameters, but don't set last error here */\n 3845 |     if ((Count < sizeof(RGNDATAHEADER) + nCount * sizeof(RECT)) ||\n 3846 |         (iType != RDH_RECTANGLES) ||\n 3847 |         (dwSize != sizeof(RGNDATAHEADER)))\n 3848 |     {\n 3849 |         return NULL;\n 3850 |     }\n 3851 | \n 3852 |     Region = REGION_AllocUserRgnWithHandle(nCount);\n 3853 | \n 3854 |     if (Region == NULL)\n 3855 |     {\n 3856 |         EngSetLastError(ERROR_NOT_ENOUGH_MEMORY);\n 3857 |         return FALSE;\n 3858 |     }"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"Unsigned underflow → out-of-bounds write. `wcslen(tmpBuffer)` returns size_t (unsigned). When no attribute bit is set in `Attributes`, none of the four `StringCchCat` calls run, so tmpBuffer remains empty (it was just ZeroMemory'd). Then `wcslen(tmpBuffer) - 2` underflows to SIZE_MAX-1. `max(SIZE_MAX-1, 0)` evaluates to SIZE_MAX-1 (because `0` is widened to size_t in the comparison), and `tmpBuffer[SIZE_MAX-1] = UNICODE_NULL` writes far outside the 666-element stack buffer — likely a crash or stack corruption.","fix":"Guard the trim: `size_t len = wcslen(tmpBuffer); if (len >= 2) tmpBuffer[len - 2] = UNICODE_NULL;`. The `max(..., 0)` idiom does not work for unsigned types and should not be used to clamp.","locations":[{"ref":"base/applications/cmdutils/whoami/whoami.c:575-587","code":"  575 |             ZeroMemory(tmpBuffer, sizeof(tmpBuffer));\n  576 | \n  577 |             if (pGroupInfo->Groups[dwIndex].Attributes & SE_GROUP_MANDATORY)\n  578 |                 StringCchCat(tmpBuffer, _countof(tmpBuffer), WhoamiLoadRcString(IDS_ATTR_GROUP_MANDATORY));\n  579 |             if (pGroupInfo->Groups[dwIndex].Attributes & SE_GROUP_ENABLED_BY_DEFAULT)\n  580 |                 StringCchCat(tmpBuffer, _countof(tmpBuffer), WhoamiLoadRcString(IDS_ATTR_GROUP_ENABLED_BY_DEFAULT));\n  581 |             if (pGroupInfo->Groups[dwIndex].Attributes & SE_GROUP_ENABLED)\n  582 |                 StringCchCat(tmpBuffer, _countof(tmpBuffer), WhoamiLoadRcString(IDS_ATTR_GROUP_ENABLED));\n  583 |             if (pGroupInfo->Groups[dwIndex].Attributes & SE_GROUP_OWNER)\n  584 |                 StringCchCat(tmpBuffer, _countof(tmpBuffer), WhoamiLoadRcString(IDS_ATTR_GROUP_OWNER));\n  585 | \n  586 |             /* remove the last comma (', ' which is 2 wchars) of the buffer, let's keep it simple */\n  587 |             tmpBuffer[max(wcslen(tmpBuffer) - 2, 0)] = UNICODE_NULL;"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"In `RegQueryValueExA`, the condition `total_size - info_size <= *count - sizeof(WCHAR)` uses unsigned (DWORD) arithmetic. When the caller passes `*count == 0` or `*count == 1` (smaller than sizeof(WCHAR)), `*count - sizeof(WCHAR)` underflows to a near-MAX_DWORD value, making the condition spuriously true. The subsequent write `*ptr = 0` then writes a WCHAR into a buffer that may be only 0 or 1 byte long.","fix":"Reorder to avoid underflow: `if (is_string(info->Type) && *count >= sizeof(WCHAR) && total_size - info_size <= *count - sizeof(WCHAR))`.","locations":[{"ref":"dll/win32/advapi32/reg/reg.c:4187-4191","code":" 4187 |             if (is_string(info->Type) && total_size - info_size <= *count-sizeof(WCHAR))\n 4188 |             {\n 4189 |                 WCHAR *ptr = (WCHAR *)(data + total_size - info_size);\n 4190 |                 if (ptr > (WCHAR *)data && ptr[-1]) *ptr = 0;\n 4191 |             }"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"In `append_multi_sz_value`, the buffer is allocated as `size + str_size * sizeof(WCHAR)` bytes. The call `RegSetValueExW(... buffer, total + sizeof(WCHAR))` writes one WCHAR more than the buffer holds when all strings fit exactly, causing a 2-byte out-of-bounds read.","fix":"Allocate `size + (str_size + 1) * sizeof(WCHAR)` so there is room for the trailing extra NUL, and pass `total` (not `total + sizeof(WCHAR)`) to RegSetValueExW.","locations":[{"ref":"dll/win32/setupapi/install.c:223-260","code":"  223 | static void append_multi_sz_value( HKEY hkey, const WCHAR *value, const WCHAR *strings,\n  224 |                                    DWORD str_size )\n  225 | {\n  226 |     DWORD size, type, total;\n  227 |     WCHAR *buffer, *p;\n  228 | \n  229 |     if (RegQueryValueExW( hkey, value, NULL, &type, NULL, &size )) return;\n  230 |     if (type != REG_MULTI_SZ) return;\n  231 | \n  232 |     size = size + str_size * sizeof(WCHAR) ;\n  233 |     if (!(buffer = HeapAlloc( GetProcessHeap(), 0, size))) return;\n  234 |     if (RegQueryValueExW( hkey, value, NULL, NULL, (BYTE *)buffer, &size )) goto done;\n  235 | \n  236 |     /* compare each string against all the existing ones */\n  237 |     total = size;\n  238 |     while (*strings)\n  239 |     {\n  240 |         int len = strlenW(strings) + 1;\n  241 | \n  242 |         for (p = buffer; *p; p += strlenW(p) + 1)\n  243 |             if (!strcmpiW( p, strings )) break;\n  244 | \n  245 |         if (!*p)  /* not found, need to append it */\n  246 |         {\n  247 |             memcpy( p, strings, len * sizeof(WCHAR) );\n  248 |             p[len] = 0;\n  249 |             total += len * sizeof(WCHAR);\n  250 |         }\n  251 |         strings += len;\n  252 |     }\n  253 |     if (total != size)\n  254 |     {\n  255 |         TRACE( \"setting value %s to %s\\n\", debugstr_w(value), debugstr_w(buffer) );\n  256 |         RegSetValueExW( hkey, value, 0, REG_MULTI_SZ, (BYTE *)buffer, total + sizeof(WCHAR) );\n  257 |     }\n  258 |  done:\n  259 |     HeapFree( GetProcessHeap(), 0, buffer );\n  260 | }"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"LockHandles allocates HandleCount * sizeof(AFD_HANDLE) bytes where HandleCount comes from a user-controlled AFD_POLL_INFO. The multiplication is performed in a 32-bit ULONG and is unchecked; a large HandleCount wraps to a small allocation, after which the loop writes HandleCount AFD_HANDLE entries past the end of the buffer, corrupting non-paged pool.","fix":"Use RtlULongMult / RtlSizeTMult (or an explicit ceiling such as HandleCount <= AFD_MAX_POLL_HANDLES) before calling ExAllocatePoolWithTag, and validate HandleCount against IrpSp->Parameters.DeviceIoControl.InputBufferLength.","locations":[{"ref":"drivers/network/afd/afd/lock.c:310-338","code":"  310 | PAFD_HANDLE LockHandles( PAFD_HANDLE HandleArray, UINT HandleCount ) {\n  311 |     UINT i;\n  312 |     NTSTATUS Status = STATUS_SUCCESS;\n  313 | \n  314 |     PAFD_HANDLE FileObjects = ExAllocatePoolWithTag(NonPagedPool,\n  315 |                                                     HandleCount * sizeof(AFD_HANDLE),\n  316 |                                                     TAG_AFD_POLL_HANDLE);\n  317 | \n  318 |     for( i = 0; FileObjects && i < HandleCount; i++ ) {\n  319 |         FileObjects[i].Status = 0;\n  320 |         FileObjects[i].Events = HandleArray[i].Events;\n  321 |         FileObjects[i].Handle = 0;\n  322 |         if( !HandleArray[i].Handle ) continue;\n  323 |         if( NT_SUCCESS(Status) ) {\n  324 |                 Status = ObReferenceObjectByHandle\n  325 |                     ( (PVOID)HandleArray[i].Handle,\n  326 |                       FILE_ALL_ACCESS,\n  327 |                       NULL,\n  328 |                        KernelMode,\n  329 |                        (PVOID*)&FileObjects[i].Handle,\n  330 |                        NULL );\n  331 |         }\n  332 | \n  333 |         if( !NT_SUCCESS(Status) )\n  334 |         {\n  335 |             AFD_DbgPrint(MIN_TRACE,(\"Failed to reference handles (0x%x)\\n\", Status));\n  336 |             FileObjects[i
