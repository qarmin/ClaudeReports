].Handle = 0;\n  337 |         }\n  338 |     }"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"GDIOBJ_bLockMultipleObjects has `ASSERT(ulCount <= 3)` but no lower-bound check. The outer sort loop `for (i = 0; i < ulCount - 1; i++)` underflows when `ulCount == 0` (UINT - 1 = UINT_MAX) and iterates for ~4 billion times, indexing past the end of the 3-element auiIndices array. The ASSERT is compiled out in release builds.","fix":"Add `if (ulCount == 0) return TRUE;` (or `return FALSE;`) at the top of the function, or change `ASSERT` to a runtime check that returns early when ulCount is out of [1,3].","locations":[{"ref":"win32ss/gdi/ntgdi/gdiobj.c:1036-1091","code":" 1036 | BOOL\n 1037 | NTAPI\n 1038 | GDIOBJ_bLockMultipleObjects(\n 1039 |     IN ULONG ulCount,\n 1040 |     IN HGDIOBJ* ahObj,\n 1041 |     OUT PGDIOBJ* apObj,\n 1042 |     IN UCHAR objt)\n 1043 | {\n 1044 |     UINT auiIndices[3] = {0, 1, 2};\n 1045 |     UINT i, j, tmp;\n 1046 | \n 1047 |     ASSERT(ulCount <= 3);\n 1048 | \n 1049 |     /* Sort the handles */\n 1050 |     for (i = 0; i < ulCount - 1; i++)\n 1051 |     {\n 1052 |         for (j = i + 1; j < ulCount; j++)\n 1053 |         {\n 1054 |             if ((ULONG_PTR)ahObj[auiIndices[i]] <\n 1055 |                 (ULONG_PTR)ahObj[auiIndices[j]])\n 1056 |             {\n 1057 |                 tmp = auiIndices[i];\n 1058 |                 auiIndices[i] = auiIndices[j];\n 1059 |                 auiIndices[j] = tmp;\n 1060 |             }\n 1061 |         }\n 1062 |     }\n 1063 | \n 1064 |     /* Lock the objects in safe order */\n 1065 |     for (i = 0; i < ulCount; i++)\n 1066 |     {\n 1067 |         /* Skip NULL handles */\n 1068 |         if (ahObj[auiIndices[i]] == NULL)\n 1069 |         {\n 1070 |             apObj[auiIndices[i]] = NULL;\n 1071 |             continue;\n 1072 |         }\n 1073 | \n 1074 |         /* Lock the object */\n 1075 |         apObj[auiIndices[i]] = GDIOBJ_LockObject(ahObj[auiIndices[i]], objt);\n 1076 | \n 1077 |         /* Check for failure */\n 1078 |         if (apObj[auiIndices[i]] == NULL)\n 1079 |         {\n 1080 |             /* Cleanup */\n 1081 |             while (i--)\n 1082 |             {\n 1083 |                 if (apObj[auiIndices[i]])\n 1084 |                     GDIOBJ_vUnlockObject(apObj[auiIndices[i]]);\n 1085 |             }\n 1086 |             return FALSE;\n 1087 |         }\n 1088 |     }\n 1089 | \n 1090 |     return TRUE;\n 1091 | }"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"REGION_AllocRgnWithHandle multiplies `nReg` (a signed INT, attacker-influenced) by `sizeof(RECT)` (16) when calling ExAllocatePoolWithTag. On 32-bit builds, `nReg >= 0x10000000` overflows the SIZE_T argument to zero or to a small value, after which `pReg->rdh.nCount = nReg` and downstream code iterates `nReg` rectangles into a tiny allocation.","fix":"Validate `nReg` against a maximum: `if (nReg < 0 || (SIZE_T)nReg > (MAXULONG / sizeof(RECT))) return NULL;`. Prefer RtlULongMult / RtlSIZETMult.","locations":[{"ref":"win32ss/gdi/ntgdi/region.c:2204-2243","code":" 2204 | REGION_AllocRgnWithHandle(\n 2205 |     INT nReg)\n 2206 | {\n 2207 |     //HRGN hReg;\n 2208 |     PREGION pReg;\n 2209 | \n 2210 |     pReg = (PREGION)GDIOBJ_AllocateObject(GDIObjType_RGN_TYPE,\n 2211 |                                           sizeof(REGION),\n 2212 |                                           BASEFLAG_LOOKASIDE);\n 2213 |     if (pReg == NULL)\n 2214 |     {\n 2215 |         DPRINT1(\"Could not allocate a palette.\\n\");\n 2216 |         return NULL;\n 2217 |     }\n 2218 | \n 2219 |     //hReg = pReg->BaseObject.hHmgr;\n 2220 | \n 2221 |     if ((nReg == 0) || (nReg == 1))\n 2222 |     {\n 2223 |         /* Testing shows that > 95% of all regions have only 1 rect.\n 2224 |            Including that here saves us from having to do another allocation */\n 2225 |         pReg->Buffer = &pReg->rdh.rcBound;\n 2226 |     }\n 2227 |     else\n 2228 |     {\n 2229 |         pReg->Buffer = ExAllocatePoolWithTag(PagedPool,\n 2230 |                                              nReg * sizeof(RECT),\n 2231 |                                              TAG_REGION);\n 2232 |         if (pReg->Buffer == NULL)\n 2233 |         {\n 2234 |             DPRINT1(\"Could not allocate region buffer\\n\");\n 2235 |             GDIOBJ_vDeleteObject(&pReg->BaseObject);\n 2236 |             return NULL;\n 2237 |         }\n 2238 |     }\n 2239 | \n 2240 |     EMPTY_REGION(pReg);\n 2241 |     pReg->rdh.dwSize = sizeof(RGNDATAHEADER);\n 2242 |     pReg->rdh.nCount = nReg;\n 2243 |     pReg->rdh.nRgnSize = nReg * sizeof(RECT);"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In SmpGetVolumeFreeSpace, `SizeInfo.AvailableAllocationUnits.QuadPart * SizeInfo.SectorsPerAllocationUnit` and subsequently `... * SizeInfo.BytesPerSector` use signed 64-bit multiplication with no overflow guard. On a maliciously crafted file system the result wraps to a negative QuadPart, after which `FinalFreeSpace.QuadPart <= MINIMUM_TO_KEEP_FREE` is interpreted incorrectly.","fix":"Use unsigned ULONGLONG arithmetic and detect overflow, or use safe-multiply helpers and treat overflow as `FreeSpace = ULLONG_MAX`.","locations":[{"ref":"base/system/smss/pagefile.c:449-465","code":"  449 |     /* Compute how much free space we have */\n  450 |     FreeSpace.QuadPart = SizeInfo.AvailableAllocationUnits.QuadPart *\n  451 |                          SizeInfo.SectorsPerAllocationUnit;\n  452 |     FinalFreeSpace.QuadPart = FreeSpace.QuadPart * SizeInfo.BytesPerSector;\n  453 | \n  454 |     /* Check if there is less than 32 MB free so we don't starve the disk */\n  455 |     if (FinalFreeSpace.QuadPart <= MINIMUM_TO_KEEP_FREE)\n  456 |     {\n  457 |         /* In this case, act as if there is no free space */\n  458 |         Volume->FreeSpace.QuadPart = 0;\n  459 |     }\n  460 |     else\n  461 |     {\n  462 |         /* Trim off 32 MB to give the disk a bit of breathing room */\n  463 |         Volume->FreeSpace.QuadPart = FinalFreeSpace.QuadPart -\n  464 |                                      MINIMUM_TO_KEEP_FREE;\n  465 |     }"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"SmpInitializeKnownDllPath casts the caller-provided byte length to USHORT and subtracts sizeof(UNICODE_NULL) without validating bounds. If Length is 0 or 1, the unsigned subtraction wraps to USHORT_MAX (≈64 KB), producing a UNICODE_STRING whose Length is far larger than the allocated buffer.","fix":"Validate `Length >= sizeof(UNICODE_NULL)` (and `Length <= USHRT_MAX`) at the top of the function and return STATUS_INVALID_PARAMETER otherwise.","locations":[{"ref":"base/system/smss/sminit.c:437-446","code":"  437 |     DllPath->Buffer = RtlAllocateHeap(RtlGetProcessHeap(), SmBaseTag, Length);\n  438 |     if (DllPath->Buffer)\n  439 |     {\n  440 |         /* Fill out the rest of the string */\n  441 |         DllPath->MaximumLength = (USHORT)Length;\n  442 |         DllPath->Length = (USHORT)Length - sizeof(UNICODE_NULL);\n  443 | \n  444 |         /* Copy the actual path and return success */\n  445 |         RtlCopyMemory(DllPath->Buffer, Buffer, Length);\n  446 |         Status = STATUS_SUCCESS;"}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In `LookupAccountSidA`, after RtlUnicodeStringToAnsiString fills the caller-supplied lpName buffer, `NameA.Buffer[NameA.Length] = '\\0';` unconditionally appends a terminator. With `NameA.MaximumLength = dwName` and the Rtl function able to write up to MaximumLength bytes, NameA.Length can equal dwName, causing the NUL to be written one byte past the user buffer.","fix":"Set MaximumLength to `dwName - 1`, or skip the explicit NUL when Length already equals MaximumLength.","locations":[{"ref":"dll/win32/advapi32/sec/misc.c:485-508","code":"  485 |             ANSI_STRING NameA;\n  486 | \n  487 |             NameA.Length = 0;\n  488 |             NameA.MaximumLength = ((dwName <= 0xFFFF) ? (USHORT)dwName : 0xFFFF);\n  489 |             NameA.Buffer = lpName;\n  490 | \n  491 |             RtlInitUnicodeString(&NameW, NameBuffer);\n  492 |             RtlUnicodeStringToAnsiString(&NameA, &NameW, FALSE);\n  493 |             NameA.Buffer[NameA.Length] = '\\0';\n  494 |         }\n  495 | \n  496 |         if (lpReferencedDomainName != NULL)\n  497 |         {\n  498 |             ANSI_STRING ReferencedDomainNameA;\n  499 | \n  500 |             ReferencedDomainNameA.Length = 0;\n  501 |             ReferencedDomainNameA.MaximumLength = ((dwReferencedDomainName <= 0xFFFF) ?\n  502 |                                                    (USHORT)dwReferencedDomainName : 0xFFFF);\n  503 |             ReferencedDomainNameA.Buffer = lpReferencedDomainName;\n  504 | \n  505 |             RtlInitUnicodeString(&ReferencedDomainNameW, ReferencedDomainNameBuffer);\n  506 |             RtlUnicodeStringToAnsiString(&ReferencedDomainNameA, &ReferencedDomainNameW, FALSE);\n  507 |             ReferencedDomainNameA.Buffer[ReferencedDomainNameA.Length] = '\\0';\n  508 |         }"}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In `CertRDNValueToStrW`, the loop fills `psz` up to `csz` characters: `for (i = 0; i < pValue->cbData && ptr - psz < csz; ...)`. If the input exactly fills the buffer (ret == csz), the subsequent unconditional `*(psz + ret) = '\\0';` writes the NUL one WCHAR past the end of the caller-supplied buffer. Same issue in CertRDNValueToStrA.","fix":"Reserve one slot for the terminator inside the loop (`ptr - psz < csz - 1`) or skip the terminator write when `ret >= csz`.","locations":[{"ref":"dll/win32/crypt32/str.c:120-158","code":"  120 |         if (!psz || !csz)\n  121 |             ret = len;\n  122 |         else\n  123 |         {\n  124 |             WCHAR *ptr = psz;\n  125 | \n  126 |             for (i = 0; i < pValue->cbData && ptr - psz < csz; ptr++, i++)\n  127 |                 *ptr = pValue->pbData[i];\n  128 |             ret = ptr - psz;\n  129 |         }\n  130 |         break;\n  131 |     case CERT_RDN_BMP_STRING:\n  132 |     case CERT_RDN_UTF8_STRING:\n  133 |         strLen = len = pValue->cbData / sizeof(WCHAR);\n  134 |         if (!psz || !csz)\n  135 |             ret = len;\n  136 |         else\n  137 |         {\n  138 |             WCHAR *ptr = psz;\n  139 | \n  140 |             for (i = 0; i < strLen && ptr - psz < csz; ptr++, i++)\n  141 |                 *ptr = ((LPCWSTR)pValue->pbData)[i];\n  142 |             ret = ptr - psz;\n  143 |         }\n  144 |         break;\n  145 |     default:\n  146 |         FIXME(\"string type %d unimplemented\\n\", dwValueType);\n  147 |     }\n  148 |     if (psz && csz)\n  149 |     {\n  150 |         *(psz + ret) = '\\0';\n  151 |         csz--;\n  152 |         ret++;\n  153 |     }\n  154 |     else\n  155 |         ret++;\n  156 |     TRACE(\"returning %d (%s)\\n\", ret, debugstr_w(psz));\n  157 |     return ret;\n  158 | }"},{"ref":"dll/win32/crypt32/str.c:52-98","code":"   52 |         len = pValue->cbData;\n   53 |         if (!psz || !csz)\n   54 |             ret = len;\n   55 |         else\n   56 |         {\n   57 |             DWORD chars = min(len, csz - 1);\n   58 | \n   59 |             if (chars)\n   60 |             {\n   61 |                 memcpy(psz, pValue->pbData, chars);\n   62 |                 ret += chars;\n   63 |                 csz -= chars;\n   64 |             }\n   65 |         }\n   66 |         break;\n   67 |     case CERT_RDN_BMP_STRING:\n   68 |     case CERT_RDN_UTF8_STRING:\n   69 |         len = WideCharToMultiByte(CP_ACP, 0, (LPCWSTR)pValue->pbData,\n   70 |          pValue->cbData / sizeof(WCHAR), NULL, 0, NULL, NULL);\n   71 |         if (!psz || !csz)\n   72 |             ret = len;\n   73 |         else\n   74 |         {\n   75 |             DWORD chars = min(pValue->cbData / sizeof(WCHAR), csz - 1);\n   76 | \n   77 |             if (chars)\n   78 |             {\n   79 |                 ret = WideCharToMultiByte(CP_ACP, 0, (LPCWSTR)pValue->pbData,\n   80 |                  chars, psz, csz - 1, NULL, NULL);\n   81 |                 csz -= ret;\n   82 |             }\n   83 |         }\n   84 |         break;\n   85 |     default:\n   86 |         FIXME(\"string type %d unimplemented\\n\", dwValueType);\n   87 |     }\n   88 |     if (psz && csz)\n   89 |     {\n   90 |         *(psz + ret) = '\\0';\n   91 |         csz--;\n   92 |         ret++;\n   93 |     }\n   94 |     else\n   95 |         ret++;\n   96 |     TRACE(\"returning %d (%s)\\n\", ret, debugstr_a(psz));\n   97 |     return ret;\n   98 | }"}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In `add_line`, the new section size is computed with `int size = sizeof(*section) - sizeof(section->lines) + 2*section->alloc_lines*sizeof(*line);`. With `section->alloc_lines` potentially growing across many doublings, the int multiplication can overflow a 32-bit signed int, leading to a tiny HeapReAlloc and subsequent out-of-bounds writes when adding more lines.","fix":"Use `size_t size = sizeof(*section) - sizeof(section->lines) + (size_t)2 * section->alloc_lines * sizeof(*line);` and bail if it exceeds a sanity cap.","locations":[{"ref":"dll/win32/setupapi/parser.c:225-245","code":"  225 | static struct line *add_line( struct inf_file *file, int section_index )\n  226 | {\n  227 |     struct section *section;\n  228 |     struct line *line;\n  229 | \n  230 |     ASSERT( section_index >= 0 && section_index < file->nb_sections );\n  231 | \n  232 |     section = file->sections[section_index];\n  233 |     if (section->nb_lines == section->alloc_lines)  /* need to grow the section */\n  234 |     {\n  235 |         int size = sizeof(*section) - sizeof(section->lines) + 2*section->alloc_lines*sizeof(*line);\n  236 |         if (!(section = HeapReAlloc( GetProcessHeap(), 0, section, size ))) return NULL;\n  237 |         section->alloc_lines *= 2;\n  238 |         file->sections[section_index] = section;\n  239 |     }\n  240 |     line = &section->lines[section->nb_lines++];\n  241 |     line->first_field = file->nb_fields;\n  242 |     line->nb_fields   = 0;\n  243 |     line->key_field   = -1;\n  244 |     return line;\n  245 | }"}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In `concat_W`, when `src1` is NULL/empty but `src2` is a non-NULL empty string, the code enters the second block, copies an empty string at `buffer`, then evaluates `buffer[-1] != '\\\\'` which reads one WCHAR *before* the caller-supplied buffer. The same applies to the src3 block when neither src1 nor src2 produced any output.","fix":"Track whether the buffer is empty (e.g. a `len` counter or compare `buffer == start`) and only inspect `buffer[-1]` when something has actually been written.","locations":[{"ref":"dll/win32/setupapi/queue.c:121-142","code":"  121 | static void concat_W( WCHAR *buffer, const WCHAR *src1, const WCHAR *src2, const WCHAR *src3 )\n  122 | {\n  123 |     *buffer = 0;\n  124 |     if (src1 && *src1)\n  125 |     {\n  126 |         strcpyW( buffer, src1 );\n  127 |         buffer += strlenW(buffer );\n  128 |         if (buffer[-1] != '\\\\') *buffer++ = '\\\\';\n  129 |         if (src2) while (*src2 == '\\\\') src2++;\n  130 |     }\n  131 | \n  132 |     if (src2)\n  133 |     {\n  134 |         strcpyW( buffer, src2 );\n  135 |         buffer += strlenW(buffer );\n  136 |         if (buffer[-1] != '\\\\') *buffer++ = '\\\\';\n  137 |         if (src3) while (*src3 == '\\\\') src3++;\n  138 |     }\n  139 | \n  140 |     if (src3)\n  141 |         strcpyW( buffer, src3 );\n  142 | }"}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In SHCopyKeyW, `if (dwMaxKeyLen++ > MAX_PATH - 1) lpszName = HeapAlloc(...)`. The post-increment means dwMaxKeyLen is always incremented after the comparison. When the initial dwMaxKeyLen equals MAX_PATH - 1 (== 259), the condition is false so no heap buffer is allocated, but dwMaxKeyLen becomes 260. The later RegEnumKeyExW/RegEnumValueW calls then pass `dwSize = 260` into the stack buffer `szName[MAX_PATH]` (= 260 slots), allowing the API to write a 260-char name plus NUL — one WCHAR past the stack buffer.","fix":"Pre-increment or split: `dwMaxKeyLen++; if (dwMaxKeyLen > MAX_PATH) lpszName = HeapAlloc(...)`.","locations":[{"ref":"dll/win32/shlwapi/reg.c:2335-2353","code":" 2335 |         if (dwMaxKeyLen++ > MAX_PATH - 1)\n 2336 |           lpszName = HeapAlloc(GetProcessHeap(), 0, dwMaxKeyLen * sizeof(WCHAR));\n 2337 | \n 2338 |         if (dwMaxDataLen > sizeof(buff))\n 2339 |           lpBuff = HeapAlloc(GetProcessHeap(), 0, dwMaxDataLen);\n 2340 | \n 2341 |         if (!lpszName || !lpBuff)\n 2342 |           dwRet = ERROR_NOT_ENOUGH_MEMORY;\n 2343 |       }\n 2344 |     }\n 2345 |   }\n 2346 | \n 2347 |   /* Copy all the sub keys */\n 2348 |   for(i = 0; i < dwKeyCount && !dwRet; i++)\n 2349 |   {\n 2350 |     HKEY hSubKeySrc, hSubKeyDst;\n 2351 |     DWORD dwSize = dwMaxKeyLen;\n 2352 | \n 2353 |     dwRet = RegEnumKeyExW(hKeySrc, i, lpszName, &dwSize, NULL, NULL, NULL, NULL);"}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"NtUserGetClipboardFormatName computes `cchMaxCount * sizeof(WCHAR)` where cchMaxCount is a signed INT controlled by the caller. While `cchMaxCount < 1` is rejected, large positive values (e.g. 0x40000001) cause signed INT overflow when multiplied by 2; the resulting size is then passed to ProbeForWrite. Similar pattern at line 842 (`cFormats * sizeof(UINT)`).","fix":"Bound the count first: `if (cchMaxCount < 1 || cchMaxCount > (INT_MAX / (INT)sizeof(WCHAR))) { EngSetLastError(ERROR_INVALID_PARAMETER); goto cleanup; }`. Use `(SIZE_T)cchMaxCount * sizeof(WCHAR)` to avoid signed-overflow UB.","locations":[{"ref":"win32ss/user/ntuser/clipboard.c:735-773","code":"  735 | INT APIENTRY\n  736 | NtUserGetClipboardFormatName(UINT fmt, LPWSTR lpszFormatName, INT cchMaxCount)\n  737 | {\n  738 |     INT iRet = 0;\n  739 | \n  740 |     UserEnterShared();\n  741 | \n  742 |     /* If the format is built-in we fail */\n  743 |     if (fmt < 0xc000 || fmt > 0xffff)\n  744 |     {\n  745 |         /* Registetrated formats are >= 0xc000 */\n  746 |         goto cleanup;\n  747 |     }\n  748 | \n  749 |     if (cchMaxCount < 1 || !lpszFormatName)\n  750 |     {\n  751 |         EngSetLastError(ERROR_INVALID_PARAMETER);\n  752 |         goto cleanup;\n  753 |     }\n  754 | \n  755 |     _SEH2_TRY\n  756 |     {\n  757 |         ProbeForWrite(lpszFormatName, cchMaxCount * sizeof(WCHAR), 1);\n  758 | \n  759 |         iRet = IntGetAtomName((RTL_ATOM)fmt,\n  760 |                               lpszFormatName,\n  761 |                               cchMaxCount * sizeof(WCHAR));\n  762 |         iRet /= sizeof(WCHAR);\n  763 |     }\n  764 |     _SEH2_EXCEPT(EXCEPTION_EXECUTE_HANDLER)\n  765 |     {\n  766 |         SetLastNtError(_SEH2_GetExceptionCode());\n  767 |     }\n  768 |     _SEH2_END;\n  769 | \n  770 | cleanup:\n  771 |     UserLeave();\n  772 | \n  773 |     return iRet;"},{"ref":"win32ss/user/ntuser/clipboard.c:822-868","code":"  822 | INT APIENTRY\n  823 | NtUserGetPriorityClipboardFormat(UINT *paFormatPriorityList, INT cFormats)\n  824 | {\n  825 |     INT i, iRet = 0;\n  826 |     PWINSTATION_OBJECT pWinStaObj;\n  827 | \n  828 |     UserEnterShared();\n  829 | \n  830 |     pWinStaObj = IntGetWinStaForCbAccess();\n  831 |     if (!pWinStaObj)\n  832 |         goto cleanup;\n  833 | \n  834 |     if (pWinStaObj->pClipBase == NULL)\n  835 |     {\n  836 |         iRet = 0;\n  837 |     }\n  838 |     else\n  839 |     {\n  840 |         _SEH2_TRY\n  841 |         {\n  842 |             ProbeForRead(paFormatPriorityList, cFormats * sizeof(UINT), sizeof(UINT));\n  843 | \n  844 |             iRet = -1;\n  845 | \n  846 |             for (i = 0; i < cFormats; ++i)\n  847 |             {\n  848 |                 if (IntIsFormatAvailable(pWinStaObj, paFormatPriorityList[i]))\n  849 |                 {\n  850 |                     iRet = paFormatPriorityList[i];\n  851 |                     break;\n  852 |                 }\n  853 |             }\n  854 |         }\n  855 |         _SEH2_EXCEPT(EXCEPTION_EXECUTE_HANDLER)\n  856 |         {\n  857 |             SetLastNtError(_SEH2_GetExceptionCode());\n  858 |         }\n  859 |         _SEH2_END;\n  860 |     }\n  861 | \n  862 |     ObDereferenceObject(pWinStaObj);\n  863 | \n  864 | cleanup:\n  865 |     UserLeave();\n  866 | \n  867 |     return iRet;\n  868 | "}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"UserExtTextOutW computes `ArgumentLength += sizeof(WCHAR) * (count + 2)` where `count` is a UINT controlled by callers. With sufficiently large `count`, the addition `count + 2` wraps, or `sizeof(WCHAR) * (count + 2)` overflows ULONG, leading IntCbAllocateMemory to allocate a buffer much smaller than what `RtlStringCchCopyNW((LPWSTR)pStringBuffer, count + 1, lpString, count)` will write into.","fix":"Validate count against a maximum (e.g. `if (count > 0x10000) goto fallback;`) and/or use checked arithmetic helpers.","locations":[{"ref":"win32ss/user/rtl/text.c:958-1014","code":"  958 | BOOL UserExtTextOutW(HDC hdc,\n  959 |                      INT x,\n  960 |                      INT y,\n  961 |                      UINT flags,\n  962 |                      PRECTL lprc,\n  963 |                      LPCWSTR lpString,\n  964 |                      UINT count)\n  965 | {\n  966 |     PVOID ResultPointer;\n  967 |     ULONG ResultLength;\n  968 |     ULONG ArgumentLength;\n  969 |     ULONG_PTR pStringBuffer;\n  970 |     NTSTATUS Status;\n  971 |     PLPK_CALLBACK_ARGUMENTS Argument;\n  972 |     BOOL bResult;\n  973 | \n  974 |     ArgumentLength = sizeof(LPK_CALLBACK_ARGUMENTS);\n  975 | \n  976 |     pStringBuffer = ArgumentLength;\n  977 |     ArgumentLength += sizeof(WCHAR) * (count + 2);\n  978 | \n  979 |     Argument = IntCbAllocateMemory(ArgumentLength);\n  980 | \n  981 |     if (!Argument)\n  982 |     {\n  983 |         goto fallback;\n  984 |     }\n  985 | \n  986 |     /* Initialize struct members */\n  987 |     Argument->hdc   = hdc;\n  988 |     Argument->x     = x;\n  989 |     Argument->y     = y;\n  990 |     Argument->flags = flags;\n  991 |     Argument->count = count;\n  992 | \n  993 |     if (lprc)\n  994 |     {\n  995 |         Argument->rect = *lprc;\n  996 |         Argument->bRect = TRUE;\n  997 |     }\n  998 |     else\n  999 |     {\n 1000 |         Argument->bRect = FALSE;\n 1001 |     }\n 1002 | \n 1003 |     /* Align lpString\n 1004 |        mimicks code from co_IntClientLoadLibrary */\n 1005 |     Argument->lpString = (LPWSTR)pStringBuffer;\n 1006 |     pStringBuffer += (ULONG_PTR)Argument;\n 1007 | \n 1008 |     Status = RtlStringCchCopyNW((LPWSTR)pStringBuffer, count + 1, lpString, count);\n 1009 | \n 1010 |     if (!NT_SUCCESS(Status))\n 1011 |     {\n 1012 |         IntCbFreeMemory(Argument);\n 1013 |         goto fallback;\n 1014 |     }"},{"ref":"win32ss/user/rtl/text.c:1217-1227","code":" 1217 |     if (flags & DT_MODIFYSTRING)\n 1218 |     {\n 1219 |         size_retstr = (count + 4) * sizeof (WCHAR);\n 1220 | #ifdef _WIN32K_\n 1221 |         retstr = ExAllocatePoolWithTag(PagedPool, size_retstr, USERTAG_RTL);\n 1222 | #else\n 1223 |         retstr = HeapAlloc(GetProcessHeap(), 0, size_retstr);\n 1224 | #endif\n 1225 |         if (!retstr) return 0;\n 1226 |         memcpy (retstr, str, size_retstr);\n 1227 |     }"}]},{"id":"OVF_19","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"PerfDataRefresh computes process delta values as `labs((LONG)pSPI->WorkingSetSize - (LONG)pPDOld->WorkingSetSizeBytes)`. SIZE_T (64-bit on x64) is cast to LONG (32-bit), truncating the high bits; the signed subtraction can overflow producing implementation-defined results, and labs(LONG_MIN) is undefined behaviour.","fix":"Use SIZE_T arithmetic: `delta = (cur >= old) ? (cur - old) : (old - cur);` and store delta as SIZE_T (or ULONGLONG) in PERFDATA.","locations":[{"ref":"base/applications/taskmgr/perfdata.c:350-358","code":"  350 |         if (pPDOld)\n  351 |             pPerfData[Idx].WorkingSetSizeDelta = labs((LONG)pSPI->WorkingSetSize - (LONG)pPDOld->WorkingSetSizeBytes);\n  352 |         else\n  353 |             pPerfData[Idx].WorkingSetSizeDelta = 0;\n  354 |         pPerfData[Idx].PageFaultCount = pSPI->PageFaultCount;\n  355 |         if (pPDOld)\n  356 |             pPerfData[Idx].PageFaultCountDelta = labs((LONG)pSPI->PageFaultCount - (LONG)pPDOld->PageFaultCount);\n  357 |         else\n  358 |             pPerfData[Idx].PageFaultCountDelta = 0;"}]},{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"`HasSubFolder` never checks the return value of `FindFirstFileW`. If the path does not exist (or the call fails for any reason), `hFind == INVALID_HANDLE_VALUE` and `FindFileData` is uninitialized, but the `do { ... } while (FindNextFileW(hFind, &FindFileData));` block still runs at least once — reading uninitialized struct members and then passing INVALID_HANDLE_VALUE to FindNextFileW/FindClose. This is reachable: e.g. `tree some-nonexistent-path` invoked indirectly.","fix":"After `FindFirstFileW`, add `if (hFind == INVALID_HANDLE_VALUE) return FALSE;` before entering the do-while. Also change `do/while` to `while/do` so an immediately-failing FindNextFile doesn't run the body once with stale data.","locations":[{"ref":"base/applications/cmdutils/tree/tree.c:37-67","code":"   37 | static BOOL HasSubFolder(PCWSTR strPath1)\n   38 | {\n   39 |     BOOL ret = FALSE;\n   40 |     WIN32_FIND_DATAW FindFileData;\n   41 |     HANDLE hFind = NULL;\n   42 |     static WCHAR strPath[STR_MAX] = L\"\";\n   43 |     ZeroMemory(strPath, sizeof(strPath));\n   44 | \n   45 |     wcscat(strPath, strPath1);\n   46 |     wcscat(strPath, L\"\\\\*.\");\n   47 | \n   48 |     hFind = FindFirstFileW(strPath, &FindFileData);\n   49 |     do\n   50 |     {\n   51 |         if (FindFileData.dwFileAttributes & FILE_ATTRIBUTE_DIRECTORY)\n   52 |         {\n   53 |             if (wcscmp(FindFileData.cFileName, L\".\") == 0 ||\n   54 |                 wcscmp(FindFileData.cFileName, L\"..\") == 0 )\n   55 |             {\n   56 |                 continue;\n   57 |             }\n   58 | \n   59 |             ret = TRUE;  // Sub-folder found\n   60 |             break;\n   61 |         }\n   62 |     }\n   63 |     while (FindNextFileW(hFind, &FindFileData));\n   64 | \n   65 |     FindClose(hFind);\n   66 |     return ret;\n   67 | }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"On UTF-16BE write, `pBytes` is computed as `(LPBYTE)&buffer[dwPos]` where `dwPos` is a character offset into the *input text* (pszText), not into the local 1024-byte `buffer`. On the first iteration `dwPos == 0` so it accidentally works, but for any text > 512 wchars the loop runs again with `dwPos >= 512`, indexing past the end of `buffer` and feeding garbage (or a crash) to WriteFile. Saving any non-trivial UTF-16-BE file is broken.","fix":"Replace `pBytes = (LPBYTE) &buffer[dwPos];` with `pBytes = buffer;`. The byte-swapped data is at the start of `buffer`, not at an offset.","locations":[{"ref":"base/applications/notepad/text.c:364-378","code":"  364 |             case ENCODING_UTF16BE:\n  365 |                 dwByteCount = (dwTextLen - dwPos) * sizeof(WCHAR);\n  366 |                 if (dwByteCount > sizeof(buffer))\n  367 |                     dwByteCount = sizeof(buffer);\n  368 | \n  369 |                 memcpy(buffer, &pszText[dwPos], dwByteCount);\n  370 |                 for (i = 0; i < dwByteCount; i += 2)\n  371 |                 {\n  372 |                     b = buffer[i+0];\n  373 |                     buffer[i+0] = buffer[i+1];\n  374 |                     buffer[i+1] = b;\n  375 |                 }\n  376 |                 pBytes = (LPBYTE) &buffer[dwPos];\n  377 |                 dwPos += dwByteCount / sizeof(WCHAR);\n  378 |                 break;"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"AddToFavoritesDlgProc uses an uninitialized local `path` if GetWindowTextW fails. The `failed:` label is reached via `goto failed;` from the GetWindowTextW failure block before `path = GetItemFullPath(...)` runs, so the subsequent `free(path);` frees garbage stack memory.","fix":"Initialize `LPWSTR path = NULL;` at the top of the IDOK case. free(NULL) is then safe.","locations":[{"ref":"base/applications/regedit/framewnd.c:867-895","code":"  867 |             switch (LOWORD(wParam))\n  868 |             {\n  869 |                 case IDOK:\n  870 |                     {\n  871 |                         LPWSTR path;\n  872 |                         HKEY hKey;\n  873 |                         DWORD err;\n  874 |                         if (!GetWindowTextW(hName, name, _countof(name)))\n  875 |                         {\n  876 |                             err = GetLastError();\n  877 |                             goto failed;\n  878 |                         }\n  879 |                         path = GetItemFullPath(NULL);\n  880 |                         if (!path)\n  881 |                         {\n  882 |                             err = ERROR_NOT_ENOUGH_MEMORY;\n  883 |                             goto failed;\n  884 |                         }\n  885 |                         err = RegCreateKeyExW(HKEY_CURRENT_USER, s_szFavoritesRegKey, 0,\n  886 |                                               NULL, 0, KEY_SET_VALUE, NULL, &hKey, NULL);\n  887 |                         if (err)\n  888 |                             goto failed;\n  889 |                         err = RegSetValueExW(hKey, name, 0, REG_SZ, (BYTE*)path, (lstrlenW(path) + 1) * sizeof(WCHAR));\n  890 |                         RegCloseKey(hKey);\n  891 |                         if (err) failed:\n  892 |                             ErrorBox(hWnd, err);\n  893 |                         free(path);\n  894 |                         return EndDialog(hWnd, err);\n  895 |                     }"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"prepare_hex_string_data() reads `data[len - 1]` (and `data[parser->data_size - 1]` for ANSI) without checking that the data size is non-zero. Importing a `.reg` file containing `hex(1):` / `hex(2):` / `hex(7):` with no bytes triggers an OOB read at index -1 and an OOB write at index 0 of a possibly-NULL buffer.","fix":"Before dereferencing, return early when `parser->data_size == 0`. Allocate at least 1 WCHAR (or 1 byte) and store a single L'\\0' for empty REG_SZ/EXPAND_SZ/MULTI_SZ.","locations":[{"ref":"base/applications/regedit/regproc.c:492-527","code":"  492 | static void prepare_hex_string_data(struct parser *parser)\n  493 | {\n  494 |     if (parser->data_type == REG_EXPAND_SZ || parser->data_type == REG_MULTI_SZ ||\n  495 |         parser->data_type == REG_SZ)\n  496 |     {\n  497 | #ifdef __REACTOS__\n  498 |         if (parser->is_unicode || (!parser->is_unicode && parser->unicode_in_asc))\n  499 | #else\n  500 |         if (parser->is_unicode)\n  501 | #endif\n  502 |         {\n  503 |             WCHAR *data = parser->data;\n  504 |             DWORD len = parser->data_size / sizeof(WCHAR);\n  505 | \n  506 |             if (data[len - 1] != 0)\n  507 |             {\n  508 |                 data[len] = 0;\n  509 |                 parser->data_size += sizeof(WCHAR);\n  510 |             }\n  511 |         }\n  512 |         else\n  513 |         {\n  514 |             BYTE *data = parser->data;\n  515 | \n  516 |             if (data[parser->data_size - 1] != 0)\n  517 |             {\n  518 |                 data[parser->data_size] = 0;\n  519 |                 parser->data_size++;\n  520 |             }\n  521 | \n  522 |             parser->data = GetWideStringN(parser->data, parser->data_size, &parser->data_size);\n  523 |             parser->data_size *= sizeof(WCHAR);\n  524 |             free(data);\n  525 |         }\n  526 |     }\n  527 | }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"format_filelist_filename writes `*(pos_basename - 1) = 0;` and `*(pos_basename - 1) = '\\\\';` without checking that file_basename() returned a position > path. file_basename returns the original `path` pointer when the input has no slash/backslash (e.g. a bare filename), making `pos_basename - 1` one before the buffer.","fix":"Check `if (pos_basename == file) { lstrcpyW(out, file); return; }` early in format_filelist_filename before any `pos_basename - 1` access.","locations":[{"ref":"base/applications/wordpad/registry.c:150-207","code":"  150 | static void format_filelist_filename(LPWSTR file, LPWSTR out)\n  151 | {\n  152 |     LPWSTR pos_basename;\n  153 |     LPWSTR truncpos1, truncpos2;\n  154 |     WCHAR myDocs[MAX_PATH];\n  155 | \n  156 |     SHGetFolderPathW(NULL, CSIDL_PERSONAL, NULL, SHGFP_TYPE_CURRENT, myDocs);\n  157 |     pos_basename = file_basename(file);\n  158 |     truncpos1 = NULL;\n  159 |     truncpos2 = NULL;\n  160 | \n  161 |     *(pos_basename-1) = 0;\n  162 |     if(!lstrcmpiW(file, myDocs) || (lstrlenW(pos_basename) > FILELIST_ENTRY_LENGTH))\n  163 |     {\n  164 |         truncpos1 = pos_basename;\n  165 |         *(pos_basename-1) = '\\\\';\n  166 |     } else\n  167 |     {\n  168 |         LPWSTR pos;\n  169 |         BOOL morespace = FALSE;\n  170 | \n  171 |         *(pos_basename-1) = '\\\\';\n  172 | \n  173 |         for(pos = file; pos < pos_basename; pos++)\n  174 |         {\n  175 |             if(*pos == '\\\\' || *pos == '/')\n  176 |             {\n  177 |                 if(truncpos1)\n  178 |                 {\n  179 |                     if((pos - file + lstrlenW(pos_basename)) > FILELIST_ENTRY_LENGTH)\n  180 |                         break;\n  181 | \n  182 |                     truncpos1 = pos;\n  183 |                     morespace = TRUE;\n  184 |                     break;\n  185 |                 }\n  186 | \n  187 |                 if((pos - file + lstrlenW(pos_basename)) > FILELIST_ENTRY_LENGTH)\n  188 |                     break;\n  189 | \n  190 |                 truncpos1 = pos;\n  191 |             }\n  192 |         }\n  193 | \n  194 |         if(morespace)\n  195 |         {\n  196 |             for(pos = pos_basename; pos >= truncpos1; pos--)\n  197 |             {\n  198 |                 if(*pos == '\\\\' || *pos == '/')\n  199 |                 {\n  200 |                     if((truncpos1 - file + lstrlenW(pos_basename) + pos_basename - pos) > FILELIST_ENTRY_LENGTH)\n  201 |                         break;\n  202 | \n  203 |                     truncpos2 = pos;\n  204 |                 }\n  205 |             }\n  206 |         }\n  207 |     }"},{"ref":"base/applications/wordpad/wordpad.c:212-226","code":"  212 | LPWSTR file_basename(LPWSTR path)\n  213 | {\n  214 |     LPWSTR pos = path + lstrlenW(path);\n  215 | \n  216 |     while(pos > path)\n  217 |     {\n  218 |         if(*pos == '\\\\' || *pos == '/')\n  219 |         {\n  220 |             pos++;\n  221 |             break;\n  222 |         }\n  223 |         pos--;\n  224 |     }\n  225 |     return pos;\n  226 | }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","description":"In `FDI_read_string`, `maxlen = cabsize - base` is computed where both operands are size_t-like. If the file pointer has advanced past the declared cabinet size (attacker-supplied CAB), `cabsize - base` underflows to a huge size_t. The subsequent `if (len > maxlen) len = maxlen;` then never caps the buffer size and the loop keeps doubling `len`.","fix":"Guard against `base >= cabsize` and return NULL/error immediately.","locations":[{"ref":"dll/win32/cabinet/fdi.c:476-510","code":"  476 | static char *FDI_read_string(FDI_Int *fdi, INT_PTR hf, long cabsize)\n  477 | {\n  478 |   size_t len=256,\n  479 |          base = FDI_getoffset(fdi, hf),\n  480 |          maxlen = cabsize - base;\n  481 |   BOOL ok = FALSE;\n  482 |   unsigned int i;\n  483 |   cab_UBYTE *buf = NULL;\n  484 | \n  485 |   TRACE(\"(fdi == %p, hf == %ld, cabsize == %ld)\\n\", fdi, hf, cabsize);\n  486 | \n  487 |   do {\n  488 |     if (len > maxlen) len = maxlen;\n  489 |     if (!(buf = fdi->alloc(len))) break;\n  490 |     if (!fdi->read(hf, buf, len)) break;\n  491 | \n  492 |     /* search for a null terminator in what we've just read */\n  493 |     for (i=0; i < len; i++) {\n  494 |       if (!buf[i]) {ok=TRUE; break;}\n  495 |     }\n  496 | \n  497 |     if (!ok) {\n  498 |       if (len == maxlen) {\n  499 |         ERR(\"cabinet is truncated\\n\");\n  500 |         break;\n  501 |       }\n  502 |       /* The buffer is too small for the string. Reset the file to the point\n  503 |        * where we started, free the buffer and increase the size for the next try\n  504 |        */\n  505 |       fdi->seek(hf, base, SEEK_SET);\n  506 |       fdi->free(buf);\n  507 |       buf = NULL;\n  508 |       len *= 2;\n  509 |     }\n  510 |   } while (!ok);"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","description":"In `FDICopy` (fdi.c), when iterating files `fol = CAB(firstfol)` is assigned then dereferenced via `while (fol->next) fol = fol->next;` without first verifying that `fol != NULL`. A malformed CAB header with `cFiles > 0` but `cFolders == 0` will leave `firstfol == NULL` while still entering this loop on the first file marked `cffileCONTINUED_TO_NEXT`, causing a NULL pointer dereference.","fix":"Before the while/for loops, check `if (!fol) { goto bail_and_fail; }`.","locations":[{"ref":"dll/win32/cabinet/fdi.c:2666-2676","code":" 2666 |       fol = CAB(firstfol);\n 2667 |       if ((file->index & cffileCONTINUED_TO_NEXT) == cffileCONTINUED_TO_NEXT) {\n 2668 |         /* pick the last folder */\n 2669 |         while (fol->next) fol = fol->next;\n 2670 |       } else {\n 2671 |         unsigned int i2;\n 2672 | \n 2673 |         for (i2 = 0; (i2 < file->index); i2++)\n 2674 |           if (fol->next) /* bug resistance, should always be true */\n 2675 |             fol = fol->next;\n 2676 |       }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","description":"`heap_strdupW` and `heap_strdupAtoW` call `lstrcpyW(ret, str)` / `MultiByteToWideChar(... ret, len)` immediately after `Alloc(...)` without checking whether the allocation returned NULL. If Alloc fails, both helpers dereference a NULL pointer.","fix":"Wrap the copy in `if (ret) { ... }` (or return NULL early when alloc fails) to avoid NULL deref.","locations":[{"ref":"dll/win32/comctl32/propsheet.c:177-195","code":"  177 | static WCHAR *heap_strdupW(const WCHAR *str)\n  178 | {\n  179 |     int len = lstrlenW(str) + 1;\n  180 |     WCHAR *ret = Alloc(len * sizeof(WCHAR));\n  181 |     lstrcpyW(ret, str);\n  182 |     return ret;\n  183 | }\n  184 | \n  185 | static WCHAR *heap_strdupAtoW(const char *str)\n  186 | {\n  187 |     WCHAR *ret;\n  188 |     INT len;\n  189 | \n  190 |     len = MultiByteToWideChar(CP_ACP, 0, str, -1, 0, 0);\n  191 |     ret = Alloc(len * sizeof(WCHAR));\n  192 |     MultiByteToWideChar(CP_ACP, 0, str, -1, ret, len);\n  193 | \n  194 |     return ret;\n  195 | }"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"high","description":"`Base64WithHeaderAndTrailerToBinaryA` blindly decrements past `dataBegins` when checking for CR/LF. If `trailerBegins == dataBegins` (empty body) or `trailerBegins == pszString` (malformed input), the first dereference reads one byte before `pszString`. A crafted PEM with adjacent BEGIN/END markers triggers an out-of-bounds read in setup/installer code paths.","fix":"Guard each decrement: `if (trailerBegins > pszString && *(trailerBegins-1) == '\\n') trailerBegins--;` and likewise for '\\r'.","locations":[{"ref":"dll/win32/crypt32/base64.c:668-678","code":"  668 |     if (!(trailerBegins = strstr(dataBegins, trailer)))\n  669 |     {\n  670 |         return ERROR_INVALID_DATA;\n  671 |     }\n  672 |     if (*(trailerBegins-1) == '\\n') trailerBegins--;\n  673 |     if (*(trailerBegins-1) == '\\r') trailerBegins--;\n  674 | \n  675 |     if (pdwSkip)\n  676 |        *pdwSkip = headerBegins - pszString;\n  677 | \n  678 |     dataLength = trailerBegins - dataBegins;"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"high","description":"Path-building helpers in userenv's CopyDirectory / RecursiveRemoveDir blindly `wcscpy` + `wcscat` into a fixed `WCHAR szPath[MAX_PATH]` buffer. The source path comes from the caller (e.g. a profile path supplied by the registry or a network share), and `cFileName` from FindFirstFile may itself be near MAX_PATH long. Concatenating `lpPath + L\"\\\\\" + cFileName` can exceed MAX_PATH and overflow the stack buffer. The recursion in RecursiveRemoveDir compounds the risk (each frame consumes 520 bytes of stack).","fix":"Use `StringCchCopyW` / `StringCchCatW` with `_countof(szPath)`, return FALSE with ERROR_FILENAME_EXCED_RANGE if any concatenation would exceed the buffer. Consider allocating szPath on the heap and limiting recursion depth.","locations":[{"ref":"dll/win32/userenv/directory.c:96-97","code":"   96 |     wcscpy(szFileName, lpSourcePath);\n   97 |     wcscat(szFileName, L\"\\\\*.*\");"},{"ref":"dll/win32/userenv/directory.c:244-261","code":"  244 |     wcscpy(szPath, lpPath);\n  245 |     wcscat(szPath, L\"\\\\*.*\");\n  246 |     DPRINT(\"Search path: '%S'\\n\", szPath);\n  247 | \n  248 |     hFind = FindFirstFileW(szPath,\n  249 |                            &FindData);\n  250 |     if (hFind == INVALID_HANDLE_VALUE)\n  251 |         return FALSE;\n  252 | \n  253 |     bResult = TRUE;\n  254 |     while (TRUE)\n  255 |     {\n  256 |         if (wcscmp(FindData.cFileName, L\".\") &&\n  257 |             wcscmp(FindData.cFileName, L\"..\"))\n  258 |         {\n  259 |             wcscpy(szPath, lpPath);\n  260 |             wcscat(szPath, L\"\\\\\");\n  261 |             wcscat(szPath, FindData.cFileName);"},{"ref":"dll/win32/userenv/directory.c:196","code":"  196 |     wcscpy(szPath, lpPathName);"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"high","description":"AfdGetDisconnectOptions / AfdGetDisconnectData write directly to Irp->UserBuffer with RtlCopyMemory for IOCTLs that use METHOD_NEITHER. The user pointer is never validated with ProbeForWrite and the copy is not wrapped in an SEH handler, so a malicious caller can pass a kernel address or unmapped page and cause an arbitrary kernel write or BSOD at PASSIVE level.","fix":"Wrap the RtlCopyMemory in _SEH2_TRY / _SEH2_EXCEPT and call ProbeForWrite(Irp->UserBuffer, BufferSize, sizeof(UCHAR)) first when Irp->RequestorMode != KernelMode.","locations":[{"ref":"drivers/network/afd/afd/main.c:46-72","code":"   46 | AfdGetDisconnectOptions(PDEVICE_OBJECT DeviceObject, PIRP Irp,\n   47 |                         PIO_STACK_LOCATION IrpSp)\n   48 | {\n   49 |     PFILE_OBJECT FileObject = IrpSp->FileObject;\n   50 |     PAFD_FCB FCB = FileObject->FsContext;\n   51 |     UINT BufferSize = IrpSp->Parameters.DeviceIoControl.OutputBufferLength;\n   52 | \n   53 |     UNREFERENCED_PARAMETER(DeviceObject);\n   54 | \n   55 |     if (!SocketAcquireStateLock(FCB)) return LostSocket(Irp);\n   56 | \n   57 |     if (FCB->DisconnectOptionsSize == 0)\n   58 |     {\n   59 |         AFD_DbgPrint(MIN_TRACE,(\"Invalid parameter\\n\"));\n   60 |         return UnlockAndMaybeComplete(FCB, STATUS_INVALID_PARAMETER, Irp, 0);\n   61 |     }\n   62 | \n   63 |     ASSERT(FCB->DisconnectOptions);\n   64 | \n   65 |     if (FCB->FilledDisconnectOptions < BufferSize) BufferSize = FCB->FilledDisconnectOptions;\n   66 | \n   67 |     RtlCopyMemory(Irp->UserBuffer,\n   68 |                   FCB->DisconnectOptions,\n   69 |                   BufferSize);\n   70 | \n   71 |     return UnlockAndMaybeComplete(FCB, STATUS_SUCCESS, Irp, BufferSize);\n   72 | }"},{"ref":"drivers/network/afd/afd/main.c:156-184","code":"  156 | NTSTATUS NTAPI\n  157 | AfdGetDisconnectData(PDEVICE_OBJECT DeviceObject, PIRP Irp,\n  158 |                   PIO_STACK_LOCATION IrpSp)\n  159 | {\n  160 |     PFILE_OBJECT FileObject = IrpSp->FileObject;\n  161 |     PAFD_FCB FCB = FileObject->FsContext;\n  162 |     UINT BufferSize = IrpSp->Parameters.DeviceIoControl.OutputBufferLength;\n  163 | \n  164 |     UNREFERENCED_PARAMETER(DeviceObject);\n  165 | \n  166 |     if (!SocketAcquireStateLock(FCB)) return LostSocket(Irp);\n  167 | \n  168 |     if (FCB->DisconnectDataSize == 0)\n  169 |     {\n  170 |         AFD_DbgPrint(MIN_TRACE,(\"Invalid parameter\\n\"));\n  171 |         return UnlockAndMaybeComplete(FCB, STATUS_INVALID_PARAMETER, Irp, 0);\n  172 |     }\n  173 | \n  174 |     ASSERT(FCB->DisconnectData);\n  175 | \n  176 |     if (FCB->FilledDisconnectData < BufferSize)\n  177 |         BufferSize = FCB->FilledDisconnectData;\n  178 | \n  179 |     RtlCopyMemory(Irp->UserBuffer,\n  180 |                   FCB->DisconnectData,\n  181 |                   BufferSize);\n  182 | \n  183 |     return UnlockAndMaybeComplete(FCB, STATUS_SUCCESS, Irp, BufferSize);\n  184 | }"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"high","description":"MmAlterRegion does not check the return value of MmFindRegion before dereferencing. MmFindRegion explicitly returns NULL when StartAddress is not contained in any region of the list (see region.c:284), but the caller immediately reads `InitialRegion->Type` and `InitialRegion->Protect`. A bad address range passed to MmAlterRegion — e.g. via a buggy or hostile driver — produces a NULL deref bugcheck instead of a clean STATUS_INVALID_ADDRESS.","fix":"After the MmFindRegion call: `if (InitialRegion == NULL) return STATUS_NOT_FOUND;` (or an appropriate error). Same defensive check is needed in the loop body if MmFindRegion-style failures can occur there.","locations":[{"ref":"ntoskrnl/mm/region.c:124-129","code":"  124 |     InitialRegion = MmFindRegion(BaseAddress, RegionListHead, StartAddress,\n  125 |                                  &InitialBaseAddress);\n  126 |     /*\n  127 |      * If necessary then split the region into the affected and unaffected parts.\n  128 |      */\n  129 |     if (InitialRegion->Type != NewType || InitialRegion->Protect != NewProtect)"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"high","description":"In NtUserGetMessage, after the SEH block copies the message to user-mode buffer, the code accesses `pMsg->message` outside any SEH protection. `pMsg` is an unverified user-mode pointer, so a malicious or concurrent process that unmaps the page between the probe and this read will cause a kernel bugcheck.","fix":"Move the `(WM_QUIT != pMsg->message)` check inside the SEH _TRY block (reading from the kernel-side `Msg` local instead of `pMsg`), or read `Msg.message` (the captured copy) directly.","locations":[{"ref":"win32ss/user/ntuser/message.c:2342-2384","code":" 2342 | BOOL APIENTRY\n 2343 | NtUserGetMessage(PMSG pMsg,\n 2344 |                   HWND hWnd,\n 2345 |                   UINT MsgFilterMin,\n 2346 |                   UINT MsgFilterMax )\n 2347 | {\n 2348 |     MSG Msg;\n 2349 |     BOOL Ret;\n 2350 | \n 2351 |     if ( (MsgFilterMin|MsgFilterMax) & ~WM_MAXIMUM )\n 2352 |     {\n 2353 |         EngSetLastError(ERROR_INVALID_PARAMETER);\n 2354 |         return FALSE;\n 2355 |     }\n 2356 | \n 2357 |     UserEnterExclusive();\n 2358 | \n 2359 |     RtlZeroMemory(&Msg, sizeof(MSG));\n 2360 | \n 2361 |     Ret = co_IntGetPeekMessage(&Msg, hWnd, MsgFilterMin, MsgFilterMax, PM_REMOVE, TRUE);\n 2362 | \n 2363 |     UserLeave();\n 2364 | \n 2365 |     if (Ret)\n 2366 |     {\n 2367 |         _SEH2_TRY\n 2368 |         {\n 2369 |             ProbeForWrite(pMsg, sizeof(MSG), 1);\n 2370 |             RtlCopyMemory(pMsg, &Msg, sizeof(MSG));\n 2371 |         }\n 2372 |         _SEH2_EXCEPT(EXCEPTION_EXECUTE_HANDLER)\n 2373 |         {\n 2374 |             SetLastNtError(_SEH2_GetExceptionCode());\n 2375 |             Ret = FALSE;\n 2376 |         }\n 2377 |         _SEH2_END;\n 2378 |     }\n 2379 | \n 2380 |     if ((INT)Ret != -1)\n 2381 |        Ret = Ret ? (WM_QUIT != pMsg->message) : FALSE;\n 2382 | \n 2383 |     return Ret;\n 2384 | }"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"high","description":"NtUserMessageCall FNID_BROADCASTSYSTEMMESSAGE dereferences `lParam` (a raw user-mode pointer) via `_wcsicmp((WCHAR*)lParam, L\"Environment\")` without any ProbeForRead / SEH protection. A malicious caller can pass a kernel address or an unmapped user address to crash the kernel or leak kernel memory contents.","fix":"Wrap the `_wcsicmp` test in `_SEH2_TRY/_SEH2_EXCEPT` after a `ProbeForRead(lParam, sizeof(L\"Environment\"), sizeof(WCHAR))`.","locations":[{"ref":"win32ss/user/ntuser/message.c:2761-2766","code":" 2761 |                      if (lParam && !wParam && _wcsicmp((WCHAR*)lParam, L\"Environment\") == 0)\n 2762 |                      {\n 2763 |                          /* Handle Broadcast of WM_SETTINGCHAGE for Environment */\n 2764 |                          co_IntDoSendMessage(HWND_BROADCAST, WM_SETTINGCHANGE,\n 2765 |                                              0, (LPARAM)L\"Environment\", 0);\n 2766 |                      }"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","description":"Multiple unbounded `strcpy`/`strcat` into fixed-size buffers using argv-derived data. `argv[2]` (user-controlled) is copied with `strcpy` into a 255-byte `cmd[255]` buffer, and a `test[300]` buffer is constructed via `strcpy` + `strcat` with no length check. A long command-line argument causes stack-buffer overflow. Reachable trivially via `dbgprint --winetest <long_path>`.","fix":"Use `StringCchCopyA/StringCchCatA` with the buffer sizes, or `snprintf`. Better: validate `wcslen(argv[2])` against the buffer size up-front and bail out with an error message if too long.","locations":[{"ref":"base/applications/cmdutils/dbgprint/dbgprint.c:35-77","code":"   35 |     if (_tcsstr(argv[1], \"--winetest\") && (argc == 3))\n   36 |     {\n   37 |         char   psBuffer[128];\n   38 |         char   psBuffer2[128];\n   39 |         char   *nlptr2;\n   40 |         char   cmd[255];\n   41 |         char   test[300];\n   42 |         FILE   *pPipe;\n   43 |         FILE   *pPipe2;\n   44 | \n   45 |         /* get available tests */\n   46 |         strcpy(cmd, argv[2]);\n   47 |         strcat(cmd, \" --list\");\n   48 |         pPipe = _tpopen(cmd, \"r\");\n   49 |         if (pPipe != NULL)\n   50 |         {\n   51 |             while(fgets(psBuffer, 128, pPipe))\n   52 |             {\n   53 |                 if (psBuffer[0] == ' ')\n   54 |                 {\n   55 |                     strcpy(cmd, argv[2]);\n   56 |                     strcat(cmd, \" \");\n   57 |                     strcat(cmd, psBuffer+4);\n   58 |                     /* run the current test */\n   59 |                     strcpy(test, \"\\n\\nRunning \");\n   60 |                     strcat(test, cmd);\n   61 |                     OutputDebugStringA(test);\n   62 |                     pPipe2 = _popen(cmd, \"r\") |     len += lstrlenW(path) + 1; /* add one for the concatenating backslash */\n  229 |     long_key = malloc((len + 1) * sizeof(WCHAR));\n  230 |     swprintf(long_key, L\"%s\\\\%s\", root_rels[i].long_name, path);\n  231 |     return long_key;\n  232 | }"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","description":"In the tab-handling branch, `charMetrics` is not assigned (it is only set in the 'Normal char' branch on a previous iteration). When the very first character drawn is a tab, the subsequent check `if (xLeft + charMetrics.cx >= printRect.right)` reads uninitialized memory. Behaviour is unpredictable — pages may wrap prematurely or never.","fix":"Initialize `charMetrics.cx = 0;` at function entry (line ~218), or skip the right-edge check entirely for the tab branch since the tab-stop math already handles wrap.","locations":[{"ref":"base/applications/notepad/printing.c:215-285","code":"  215 |     INT xLeft = printRect.left, yTop = printRect.top + pData->cyHeader + pData->cySpacing;\n  216 |     INT xStart, tabWidth;\n  217 |     DWORD ichStart;\n  218 |     SIZE charMetrics;\n  219 |     TEXTMETRIC tmText;\n  220 | \n  221 |     /* Calculate a tab width */\n  222 | #define TAB_STOP 8\n  223 |     GetTextMetrics(pPrinter->hDC, &tmText);\n  224 |     tabWidth = TAB_STOP * tmText.tmAveCharWidth;\n  225 | \n  226 | #define DO_FLUSH() do { \\\n  227 |     if (ichStart < pData->ich && !bSkipPage) { \\\n  228 |         TextOut(pPrinter->hDC, xStart, yTop, &pData->pszText[ichStart], pData->ich - ichStart); \\\n  229 |     } \\\n  230 |     ichStart = pData->ich; \\\n  231 |     xStart = xLeft; \\\n  232 |     if (pData->status == STRING_PRINTCANCELING) return FALSE; \\\n  233 | } while (0)\n  234 | \n  235 |     /* The drawing-body loop */\n  236 |     for (ichStart = pData->ich, xStart = xLeft; pData->ich < pData->cchText; )\n  237 |     {\n  238 |         TCHAR ch = pData->pszText[pData->ich];\n  239 | \n  240 |         if (ch == _T('\\r'))\n  241 |         {\n  242 |             DO_FLUSH();\n  243 | \n  244 |             pData->ich++; /* Next char */\n  245 |             ichStart = pData->ich;\n  246 |             continue;\n  247 |         }\n  248 | \n  249 |         if (ch == _T('\\n'))\n  250 |         {\n  251 |             DO_FLUSH();\n  252 | \n  253 |             /* Next line */\n  254 |             yTop += tmText.tmHeight;\n  255 |             xLeft = xStart = printRect.left;\n  256 |         }\n  257 |         else\n  258 |         {\n  259 |             if (ch == _T('\\t'))\n  260 |             {\n  261 |                 INT nStepWidth = tabWidth - ((xLeft - printRect.left) % tabWidth);\n  262 | \n  263 |                 DO_FLUSH();\n  264 | \n  265 |                 /* Go to the next tab stop */\n  266 |                 xLeft += nStepWidth;\n  267 |                 xStart = xLeft;\n  268 |             }\n  269 |             else /* Normal char */\n  270 |             {\n  271 |                 GetTextExtentPoint32(pPrinter->hDC, &ch, 1, &charMetrics);\n  272 |                 xLeft += charMetrics.cx;\n  273 |             }\n  274 | \n  275 |             /* Insert a line break if the next position reached the right edge */\n  276 |             if (xLeft + charMetrics.cx >= printRect.right)\n  277 |             {\n  278 |                 if (ch != _T('\\t'))\n  279 |                     DO_FLUSH();\n  280 | \n  281 |                 /* Next line */\n  282 |                 yTop += tmText.tmHeight;\n  283 |                 xLeft = xStart = printRect.left;\n  284 |             }\n  285 |         }"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","description":"AddEntryToList builds a space-separated REG_MULTI_SZ string but relies on the source registry buffer being properly double-NUL terminated. The `while(*src != L'\\0') { ... src += wcslen(src) + 1; }` loop walks past the dwCount-byte buffer if the source is malformed (no embedded final NUL), reading OOB len);\n 1615 |                 wcscat(lines, src);\n 1616 |                 wcscat(lines, L\"\\r\\n\");\n 1617 |                 src += llen + 1;\n 1618 |             }"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","description":"`buffer[65536]` is declared on the kernel-style call stack of `RemoveFile`. The default Win32 stack is 1 MiB, so 64 KiB is large but usually fits; however RemoveFile is reached from recursive ProcessDirectory calls (DEL /S), and during deep recursion the cumulative stack use can blow the stack and crash cmd.exe. The check `for (i = 0; i < (FileSize.QuadPart - BufferSize); i += BufferSize)` also misbehaves when FileSize.QuadPart < BufferSize — the loop is skipped (good) but the percent-progress message `(i * 100) / FileSize.QuadPart` divides by zero if the file is empty (FileSize == 0).","fix":"Allocate the wipe buffer on the heap (HeapAlloc/cmd_alloc) and free it before return. Skip the entire wipe block when FileSize.QuadPart == 0, or guard the progress print with `if (FileSize.QuadPart > 0)`.","locations":[{"ref":"base/shell/cmd/del.c:116-144","code":"  116 |     if (dwFlags & DEL_WIPE)\n  117 |     {\n  118 |         HANDLE file;\n  119 |         DWORD temp;\n  120 | #define BufferSize 65536\n  121 |         BYTE buffer[BufferSize];\n  122 |         LONGLONG i;\n  123 |         LARGE_INTEGER FileSize;\n  124 | \n  125 |         FileSize.u.HighPart = f->nFileSizeHigh;\n  126 |         FileSize.u.LowPart = f->nFileSizeLow;\n  127 | \n  128 |         for(i = 0; i < BufferSize; i++)\n  129 |         {\n  130 |             buffer[i]=rand() % 256;\n  131 |         }\n  132 |         file = CreateFile (lpFileName, GENERIC_WRITE, 0, NULL, OPEN_EXISTING,  FILE_FLAG_WRITE_THROUGH, NULL);\n  133 |         if (file != INVALID_HANDLE_VALUE)\n  134 |         {\n  135 |             for(i = 0; i < (FileSize.QuadPart - BufferSize); i += BufferSize)\n  136 |             {\n  137 |                 WriteFile (file, buffer, BufferSize, &temp, NULL);\n  138 |                 ConOutPrintf (_T(\"%I64d%% %s\\r\"),(i * (LONGLONG)100)/FileSize.QuadPart,szDeleteWipe);\n  139 |             }\n  140 |             WriteFile (file, buffer, (DWORD)(FileSize.QuadPart - i), &temp, NULL);\n  141 |             ConOutPrintf (_T(\"100%% %s\\n\"),szDeleteWipe);\n  142 |             CloseHandle (file);\n  143 |         }\n  144 |     }"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"medium","description":"`LISTVIEW_EndEditLabelT` allocates `pszText` only when `len++` is non-zero. If the edit control is empty, `pszText` stays NULL, but line 6034 calls `lstrcmpW(dispInfo.item.pszText, pszText)` (and line 6038 calls `textdupTtoW(pszText, FALSE)` which goes on to `MultiByteToWideChar` with `LPCSTR`=NULL). This is a NULL deref/UB when the user clears the label text.","fix":"Special-case `pszText == NULL` (empty new text) before the comparison: treat it as equal to an empty string, or allocate a 1-WCHAR buffer holding L\"\" so the lstrcmpW/textdupTtoW calls remain valid.","locations":[{"ref":"dll/win32/comctl32/listview.c:5999-6045","code":" 5999 |     WCHAR *pszText = NULL;\n 6000 |     BOOL res;\n 6001 | \n 6002 |     if (storeText)\n 6003 |     {\n 6004 |         DWORD len = isW ? GetWindowTextLengthW(infoPtr->hwndEdit) : GetWindowTextLengthA(infoPtr->hwndEdit);\n 6005 | \n 6006 |         if (len++)\n 6007 |         {\n 6008 |             if (!(pszText = Alloc(len * (isW ? sizeof(WCHAR) : sizeof(CHAR)))))\n 6009 |                 return FALSE;\n 6010 | \n 6011 |             if (isW)\n 6012 |                 GetWindowTextW(infoPtr->hwndEdit, pszText, len);\n 6013 |             else\n 6014 |                 GetWindowTextA(infoPtr->hwndEdit, (CHAR*)pszText, len);\n 6015 |         }\n 6016 |     }\n 6017 | \n 6018 |     TRACE(\"(pszText=%s, isW=%d)\\n\", debugtext_t(pszText, isW), isW);\n 6019 | \n 6020 |     ZeroMemory(&dispInfo, sizeof(dispInfo));\n 6021 |     dispInfo.item.mask = LVIF_PARAM | LVIF_STATE | LVIF_TEXT;\n 6022 |     dispInfo.item.iItem = editedItem;\n 6023 |     dispInfo.item.iSubItem = 0;\n 6024 |     dispInfo.item.stateMask = ~0;\n 6025 |     dispInfo.item.pszText = szDispText;\n 6026 |     dispInfo.item.cchTextMax = DISP_TEXT_SIZE;\n 6027 |     if (!LISTVIEW_GetItemT(infoPtr, &dispInfo.item, isW))\n 6028 |     {\n 6029 |        res = FALSE;\n 6030 |        goto cleanup;\n 6031 |     }\n 6032 | \n 6033 |     if (isW)\n 6034 |         same = (lstrcmpW(dispInfo.item.pszText, pszText) == 0);\n 6035 |     else\n 6036 |     {\n 6037 |         LPWSTR tmp = textdupTtoW(pszText, FALSE);\n 6038 |         same = (lstrcmpW(dispInfo.item.pszText, tmp) == 0);\n 6039 |         textfreeT(tmp, FALSE);\n 6040 |     }\n 6041 | \n 6042 |     /* add the text from the edit in */\n 6043 |     dispInfo.item.mask |= LVIF_TEXT;\n 6044 |     dispInfo.item.pszText = same ? NULL : pszText;\n 6045 |     dispInfo.item.cchTextMax = textlenT(dispInfo.item.pszText, isW);"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"medium","description":"In `PROPSHEET_CollectSheetInfoA`, `caption = Alloc(len*sizeof(WCHAR));` is followed unconditionally by `MultiByteToWideChar(... caption, len);` without a NULL check, so an OOM Alloc results in a NULL write. The same pattern occurs in `PROPSHEET_SetTitleW` (line 2162) and `PROPSHEET_RemovePage` (line 2442).","fix":"After each `Alloc`, check the return value and bail out cleanly if NULL before using the pointer.","locations":[{"ref":"dll/win32/comctl32/propsheet.c:335-340","code":"  335 |         int len = MultiByteToWideChar(CP_ACP, 0, lppsh->pszCaption, -1, NULL, 0);\n  336 |         WCHAR *caption = Alloc( len*sizeof (WCHAR) );\n  337 | \n  338 |         MultiByteToWideChar(CP_ACP, 0, lppsh->pszCaption, -1, caption, len);\n  339 |         psInfo->ppshheader.pszCaption = caption;\n  340 |      }"},{"ref":"dll/win32/comctl32/propsheet.c:2162-2166","code":" 2162 |     dest = Alloc( (lentitle + lenprop + 1)*sizeof ( sues the IOCTL with OutputBufferLength == 0 the SystemBuffer pointer can be NULL, causing a NULL dereference; even when non-NULL the zeroing wastes work on a buffer that will be rejected one line later.","fix":"Move the size check above the RtlZeroMemory call so the buffer is only touched after validation succeeds.","locations":[{"ref":"drivers/usb/usbhub/ioctl.c:682-709","code":"  682 | NTSTATUS\n  683 | NTAPI\n  684 | USBH_IoctlGetNodeInformation(IN PUSBHUB_FDO_EXTENSION HubExtension,\n  685 |                              IN PIRP Irp)\n  686 | {\n  687 |     PUSB_NODE_INFORMATION NodeInfo;\n  688 |     PIO_STACK_LOCATION IoStack;\n  689 |     ULONG BufferLength;\n  690 |     NTSTATUS Status;\n  691 |     BOOLEAN HubIsBusPowered;\n  692 | \n  693 |     DPRINT(\"USBH_IoctlGetNodeInformation ... \\n\");\n  694 | \n  695 |     Status = STATUS_SUCCESS;\n  696 | \n  697 |     NodeInfo = Irp->AssociatedIrp.SystemBuffer;\n  698 | \n  699 |     IoStack = IoGetCurrentIrpStackLocation(Irp);\n  700 |     BufferLength = IoStack->Parameters.DeviceIoControl.OutputBufferLength;\n  701 | \n  702 |     RtlZeroMemory(Irp->AssociatedIrp.SystemBuffer, BufferLength);\n  703 | \n  704 |     if (BufferLength < sizeof(USB_NODE_INFORMATION))\n  705 |     {\n  706 |         Status = STATUS_BUFFER_TOO_SMALL;\n  707 |         USBH_CompleteIrp(Irp, Status);\n  708 |         return Status;\n  709 |     }"}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"medium","description":"`DIALOG_CreateControls32` (ANSI branch) and `DIALOG_CreateIndirect` both allocate `class_tmp`/`caption_tmp` with HeapAlloc and immediately call WideCharToMultiByte writing into the allocation without verifying it is non-NULL. If HeapAlloc fails, the conversion call dereferences a NULL destination pointer.","fix":"Check `class_tmp`/`caption_tmp` for NULL before calling WideCharToMultiByte, and clean up (free already-allocated buffer, return failure) on failure.","locations":[{"ref":"win32ss/user/user32/windows/dialog.c:319-332","code":"  319 |             if (!IS_INTRESOURCE(class))\n  320 |             {\n  321 |                 DWORD len = WideCharToMultiByte( CP_ACP, 0, info.className, -1, NULL, 0, NULL, NULL );\n  322 |                 class = HeapAlloc( GetProcessHeap(), 0, len );\n  323 |                 if (class != NULL)\n  324 |                     WideCharToMultiByte( CP_ACP, 0, info.className, -1, class, len, NULL, NULL );\n  325 |             }\n  326 |             if (!IS_INTRESOURCE(caption))\n  327 |             {\n  328 |                 DWORD len = WideCharToMultiByte( CP_ACP, 0, info.windowName, -1, NULL, 0, NULL, NULL );\n  329 |                 caption = HeapAlloc( GetProcessHeap(), 0, len );\n  330 |                 if (caption != NULL)\n  331 |                     WideCharToMultiByte( CP_ACP, 0, info.windowName, -1, caption, len, NULL, NULL );\n  332 |             }"},{"ref":"win32ss/user/user32/windows/dialog.c:956-969","code":"  956 |         if (!IS_INTRESOURCE(class))\n  957 |         {\n  958 |             DWORD len = WideCharToMultiByte( CP_ACP, 0, template.className, -1, NULL, 0, NULL, NULL );\n  959 |             class_tmp = HeapAlloc( GetProcessHeap(), 0, len );\n  960 |             WideCharToMultiByte( CP_ACP, 0, template.className, -1, class_tmp, len, NULL, NULL );\n  961 |             class = class_tmp;\n  962 |         }\n  963 |         if (!IS_INTRESOURCE(caption))\n  964 |         {\n  965 |             DWORD len = WideCharToMultiByte( CP_ACP, 0, template.caption, -1, NULL, 0, NULL, NULL );\n  966 |             caption_tmp = HeapAlloc( GetProcessHeap(), 0, len );\n  967 |             WideCharToMultiByte( CP_ACP, 0, template.caption, -1, caption_tmp, len, NULL, NULL );\n  968 |             caption = caption_tmp;\n  969 |         }"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"medium","description":"`GetKeyNameTextA` writes `lpString[iRet] = 0;` to terminate the converted string, but `iRet` is the return value of `WideCharToMultiByte` which can equal `nSize` (no room for terminator). In that case the write goes one past the end of `lpString`. Also, with `nSize == 0` the helper still writes `lpString[0] = 0` into a zero-sized buffer.","fix":"Bound-check before terminating: `if (iRet < nSize) lpString[iRet] = 0; else if (nSize > 0) lpString[nSize-1] = 0;`, and early-return if nSize <= 0.","locations":[{"ref":"win32ss/user/user32/windows/input.c:564-587","code":"  564 | int WINAPI\n  565 | GetKeyNameTextA(LONG lParam,\n  566 |                 LPSTR lpString,\n  567 |                 int nSize)\n  568 | {\n  569 |     LPWSTR pwszBuf;\n  570 |     UINT cchBuf = 0;\n  571 |     int iRet = 0;\n  572 |     BOOL defChar = FALSE;\n  573 | \n  574 |     pwszBuf = HeapAlloc(GetProcessHeap(), 0, nSize * sizeof(WCHAR));\n  575 |     if (!pwszBuf)\n  576 |         return 0;\n  577 | \n  578 |     cchBuf = NtUserGetKeyNameText(lParam, pwszBuf, nSize);\n  579 | \n  580 |     iRet = WideCharToMultiByte(CP_ACP, 0,\n  581 |                               pwszBuf, cchBuf,\n  582 |                               lpString, nSize, \".\", &defChar); // FIXME: do we need defChar?\n  583 |     lpString[iRet] = 0;\n  584 |     HeapFree(GetProcessHeap(), 0, pwszBuf);\n  585 | \n  586 |     return iRet;\n  587 | }"}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"low","description":"`PopDirectory()` dereferences `lpStackTop` without checking for NULL. Today the only on-stack callers (`CommandPopd`, `DestroyDirectoryStack`) guard with `nStackDepth` first, so the bug is unreachable, but PopDirectory is exported as a static helper that any future caller could misuse — and the function offers no defence.","fix":"Add an early `if (lpStackTop == NULL) return;` at the start of PopDirectory, or ASSERT(lpStackTop != NULL) for debug builds.","locations":[{"ref":"base/shell/cmd/dirstack.c:61-74","code":"   61 | static VOID\n   62 | PopDirectory (VOID)\n   63 | {\n   64 |     LPDIRENTRY lpDir = lpStackTop;\n   65 |     lpStackTop = lpDir->next;\n   66 |     if (lpStackTop != NULL)\n   67 |         lpStackTop->prev = NULL;\n   68 |     else\n   69 |         lpStackBottom = NULL;\n   70 | \n   71 |     cmd_free (lpDir);\n   72 | \n   73 |     nStackDepth--;\n   74 | }"}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"low","description":"`pFileName[1]` is dereferenced before any length check. For an empty filename (`pFileName[0] == '\\0'`), reading `pFileName[1]` is reading past the end of the string. In practice callers always pass at least a one-character name, but the check is structurally unsafe.","fix":"Reorder: `if (pFileName[0] && (pFileName[1] == _T(':') || _tcschr(pFileName, _T('\\\\'))))`.","locations":[{"ref":"base/shell/cmd/where.c:189","code":"  189 |     if (pFileName[1] == _T(':') || _tcschr(pFileName, _T('\\\\')))"}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"low","description":"In `UrlIsA`/`UrlIsW` for `URLIS_DIRECTORY`, `last = pszUrl + strlen(pszUrl) - 1` forms a pointer to one element before the array when pszUrl is empty. The subsequent `last >= pszUrl` check catches this logically, but creating the out-of-bounds pointer is undefined behavior — modern compilers may optimize away the `>=` check.","fix":"Check emptiness first: `size_t len = strlen(pszUrl); if (!len) return FALSE; last = pszUrl + len - 1;`.","locations":[{"ref":"dll/win32/shlwapi/url.c:1912-1914","code":" 1912 |     case URLIS_DIRECTORY:\n 1913 |         last = pszUrl + strlen(pszUrl) - 1;\n 1914 |         return (last >= pszUrl && (*last == '/' || *last == '\\\\' ));"},{"ref":"dll/win32/shlwapi/url.c:1966-1968","code":" 1966 |     case URLIS_DIRECTORY:\n 1967 |         last = pszUrl + strlenW(pszUrl) - 1;\n 1968 |         return (last >= pszUrl && (*last == '/' || *last == '\\\\'));"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","description":"CachedGetUserFromSid (and several similar sites) uses t the same as the file name, so we need to store\n  225 |         the file name here */\n  226 |         static WCHAR file1[MAX_PATH], file2[MAX_PATH], file3[MAX_PATH], file4[MAX_PATH];\n  227 |         WCHAR numFormat[] = {'&','%','d',' ',0};\n  228 |         LPWSTR pFile[] = {file1, file2, file3, file4};\n  229 |         DWORD pathSize = MAX_PATH*sizeof(WCHAR);\n  230 |         int i;\n  231 |         WCHAR key[6];\n  232 |         MENUITEMINFOW mi;\n  233 |         HMENU hMenu = GetMenu(hMainWnd);\n  234 | \n  235 |         mi.cbSize = sizeof(MENUITEMINFOW);\n  236 |         mi.fMask = MIIM_ID | MIIM_DATA | MIIM_STRING | MIIM_FTYPE;\n  237 |         mi.fType = MFT_STRING;\n  238 |         mi.dwTypeData = itemText;\n  239 |         mi.wID = ID_FILE_RECENT1;\n  240 | \n  241 |         RemoveMenu(hMenu, ID_FILE_RECENT_SEPARATOR, MF_BYCOMMAND);\n  242 |         for(i = 0; i < FILELIST_ENTRIES; i++)\n  243 |         {\n  244 |             wsprintfW(key, var_file, i+1);\n  245 |             RemoveMenu(hMenu, ID_FILE_RECENT1+i, MF_BYCOMMAND);\n  246 |             if(RegQueryValueExW(hFileKey, (LPWSTR)key, 0, NULL, (LPBYTE)pFile[i], &pathSize)\n  247 |                != ERROR_SUCCESS)\n  248 |                 break;\n  249 | \n  250 |             mi.dwItemData = (ULONG_PTR)pFile[i];\n  251 |             wsprintfW(itemText, numFormat, i+1);\n  252 | \n  253 |             lstrcpyW(buffer, pFile[i]);\n  254 | \n  255 |             format_filelist_filename(buffer, itemText);\n  256 | \n  257 |             InsertMenuItemW(hMenu, ID_FILE_EXIT, FALSE, &mi);\n  258 |             mi.wID++;\n  259 |             pathSize = MAX_PATH*sizeof(WCHAR);\n  260 |         }\n  261 |         mi.fType = MFT_SEPARATOR;\n  262 |         mi.fMask = MIIM_FTYPE | MIIM_ID;\n  263 |         InsertMenuItemW(hMenu, ID_FILE_EXIT, FALSE, &mi);\n  264 | \n  265 |         RegCloseKey(hFileKey);\n  266 |     }\n  267 | }"},{"ref":"base/applications/regedit/edit.c:1549-1583","code":" 1549 |     if (EditBin == FALSE && ((type == REG_SZ) || (type == REG_EXPAND_SZ)))\n 1550 |     {\n 1551 |         if (valueDataLen > 0)\n 1552 |         {\n 1553 |             if (!(stringValueData = HeapAlloc(GetProcessHeap(), 0, valueDataLen)))\n 1554 |             {\n 1555 |                 error(hwnd, IDS_TOO_BIG_VALUE, valueDataLen);\n 1556 |                 goto done;\n 1557 |             }\n 1558 |             lRet = RegQueryValueExW(hKey, valueName, 0, 0, (LPBYTE)stringValueData, &valueDataLen);\n 1559 |             if (lRet != ERROR_SUCCESS)\n 1560 |             {\n 1561 |                 error(hwnd, IDS_BAD_VALUE, valueName);\n 1562 |                 goto done;\n 1563 |             }\n 1564 |         }\n 1565 |         else\n 1566 |         {\n 1567 |             stringValueData = NULL;\n 1568 |         }\n 1569 | \n 1570 |         if (DialogBoxW(0, MAKEINTRESOURCEW(IDD_EDIT_STRING), hwnd, modify_string_dlgproc) == IDOK)\n 1571 |         {\n 1572 |             if (stringValueData)\n 1573 |             {\n 1574 |                 lRet = RegSetValueExW(hKey, valueName, 0, type, (LPBYTE)stringValueData, (DWORD)(wcslen(stringValueData) + 1) * sizeof(WCHAR));\n 1575 |             }\n 1576 |             else\n 1577 |             {\n 1578 |                 lRet = RegSetValueExW(hKey, valueName, 0, type, NULL, 0);\n 1579 |             }\n 1580 |             if (lRet == ERROR_SUCCESS)\n 1581 |                 result = TRUE;\n 1582 |         }\n 1583 |     }"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"high","description":"GetMenuItemInfoW receives `info.cch = sizeof string` where `string` is `WCHAR[0x80]`, so `sizeof string` is 256 (bytes) but `cch` expects a count in characters (should be 128). This tells the API the buffer holds 256 WCHARs and can overflow the 128-WCHAR stack buffer when a menu item's text is long.","fix":"Change `info.cch = sizeof string;` to `info.cch = ARRAY_SIZE(string);` (or `_countof(string)`).","locations":[{"ref":"dll/win32/shell32
