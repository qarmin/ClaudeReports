<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}

.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>

<script type="application/json" id="D">[{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"When unpacking the zero-padding gap of a GNU sparse file, `EntryIo::Pad`'s length (a `u64` derived directly from attacker-controlled 12-byte sparse `offset`/`numbytes` header fields, only bounded by `checked_add`/`checked_sub` against archive-wide overflow) is cast with `as i64` before being used as `SeekFrom::Current`. The `TODO: checked cast to i64` comment already acknowledges this. For a crafted sparse header producing a gap length greater than `i64::MAX`, the cast reinterprets the bit pattern as negative, so `SeekFrom::Current` receives a negative offset. In practice `File::seek` then returns an `InvalidInput`-style I/O error rather than corrupting data, but the failure mode is an opaque I/O error instead of a clear 'sparse offset too large' error, and the cast is silently lossy for any value above 2^63.","fix":"Use `i64::try_from(d.limit())` and propagate a descriptive `other(\"sparse pad offset too large\")` error on failure instead of the raw `as i64` cast, so corrupted/malicious sparse headers fail with a clear error rather than an unrelated seek error.","locations":[{"ref":"src/entry.rs:663-678","code":"  663 |             for io in self.data.drain(..) {\n  664 |                 match io {\n  665 |                     EntryIo::Data(mut d) => {\n  666 |                         let expected = d.limit();\n  667 |                         if io::copy(&mut d, &mut f)? != expected {\n  668 |                             return Err(other(\"failed to write entire file\"));\n  669 |                         }\n  670 |                     }\n  671 |                     EntryIo::Pad(d) => {\n  672 |                         // TODO: checked cast to i64\n  673 |                         let to = SeekFrom::Current(d.limit() as i64);\n  674 |                         let size = f.seek(to)?;\n  675 |                         f.set_len(size)?;\n  676 |                     }\n  677 |                 }\n  678 |             }","lines":16}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The `archive` fuzz target never feeds raw/arbitrary bytes directly into `Archive::new`. Instead it builds the tar archive itself via the library's own `Builder` (which always produces well-formed headers, correct checksums, and sanitized paths via `prepare_header_path`/`set_path`), then reads that self-built, always-valid archive back. This means the fuzzer almost never exercises the header-parsing/corruption-handling code paths that matter most for untrusted-input safety (malformed checksums, truncated headers, invalid UTF-8/path-traversal bytes, bad size fields, corrupted PAX/GNU extensions). It is effectively fuzzing 'build then read your own valid output' rather than fuzzing the archive reader against adversarial bytes, which is the actual security-relevant attack surface.","fix":"Add a code path (or a second fuzz target) that constructs `Archive::new(Cursor::new(data))` directly over the raw fuzzer-provided byte slice (as `tar.rs` does), so malformed/corrupted archive bytes reach the parser without first being laundered through `Builder`.","locations":[{"ref":"fuzz/fuzz_targets/archive.rs:57-118","code":"   57 |     let mut builder = Builder::new(Vec::new());\n   58 | \n   59 |     // Iterate through the archive entries to build a tar structure\n   60 |     for entry in &input.entries {\n   61 |         let mut header = Header::new_gnu();\n   62 | \n   63 |         // Ensure content size is reasonable to avoid potential overflow issues\n   64 |         let file_size = entry.content.len() as u64;\n   65 |         if file_size > u32::MAX as u64 {\n   66 |             continue;\n   67 |         }\n   68 |         header.set_size(file_size);\n   69 | \n   70 |         // Determine the entry type from fuzzed data\n   71 |         let entry_type = match entry.entry_type % 5 {\n   72 |             0 => EntryType::Regular,\n   73 |             1 => EntryType::Directory,\n   74 |             2 => EntryType::Symlink,\n   75 |             3 => EntryType::hard_link(),\n   76 |             _ => EntryType::character_special(),\n   77 |         };\n   78 |         header.set_entry_type(entry_type);\n   79 | \n   80 |         // Process entry types using cap_std sandbox\n   81 |         match entry_type {\n   82 |             EntryType::Directory => {\n   83 |                 if let Err(_) = sandbox_dir.create_dir_all(&entry.path) {\n   84 |                     continue;\n   85 |                 }\n   86 |                 if builder.append_dir(&entry.path, &entry.path).is_err() {\n   87 |                     continue;\n   88 |                 }\n   89 |             }\n   90 |             EntryType::Regular => {\n   91 |                 let mut cursor = Cursor::new(entry.content.clone());\n   92 |                 if builder.append_data(&mut header, entry.path.as_str(), &mut cursor).is_err() {\n   93 |                     continue;\n   94 |                 }\n   95 |             }\n   96 |             _ => {\n   97 |                 // Handle other types with appropriate mock content or skip unsupported\n   98 |                 let mut cursor = Cursor::new(entry.content.clone());\n   99 |                 if builder.append_data(&mut header, entry.path.as_str(), &mut cursor).is_err() {\n  100 |                     continue;\n  101 |                 }\n  102 |             }\n  103 |         }\n  104 |     }\n  105 | \n  106 |     // Write the builder content to the temporary tar file within the sandbox\n  107 |     if let Ok(mut temp_file) = sandbox_dir.create(temp_file_path) {\n  108 |         if temp_file.write_all(&builder.into_inner().unwrap_or_default()).is_ok() {\n  109 |             let mut archive = Archive::new(temp_file);\n  110 |             if let Ok(entries) = archive.entries() {\n  111 |                 for entry in entries {\n  112 |                     if entry.is_err() {\n  113 |                         return;\n  114 |                     }\n  115 |                 }\n  116 |             }\n  117 |         }\n  118 |     }","lines":62}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"After building the tar archive, `archive.rs` only checks `entry.is_err()` for each entry and returns early on the first error; it never calls `unpack`/`unpack_in`, never reads entry contents, and never inspects `path()`/`link_name()`/`pax_extensions()`. This means the extraction/unpacking code (the highest-risk code for path traversal, symlink handling, etc.) is completely untested by this fuzz target, despite cap_std sandboxing being set up specifically to make such testing safe.","fix":"Exercise `entry.unpack_in(&sandbox_dir-backed-path)` (or equivalent path-confined unpack) and read entry contents/pax extensions inside the loop, instead of only checking for read errors.","locations":[{"ref":"fuzz/fuzz_targets/archive.rs:109-118","code":"  109 |             let mut archive = Archive::new(temp_file);\n  110 |             if let Ok(entries) = archive.entries() {\n  111 |                 for entry in entries {\n  112 |                     if entry.is_err() {\n  113 |                         return;\n  114 |                     }\n  115 |                 }\n  116 |             }\n  117 |         }\n  118 |     }","lines":10}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the `tar` fuzz target, `dst_path` is built with `temp_dir.path().join(&input.file_name)` where `input.file_name` is an unconstrained fuzzer-controlled `&str` (see Arbitrary impl at lines 35-46). Per `Path::join` semantics, if `file_name` is an absolute path (e.g. starts with `/`) the `temp_dir` prefix is discarded entirely, and `entry.unpack(&dst_path)` is documented as NOT sanitizing `dst` (unlike `unpack_in`, which is the path-traversal-safe variant). This lets a crafted fuzz input cause the fuzz target to write/overwrite arbitrary files anywhere on the host filesystem running the fuzzer, unlike `archive.rs` which confines all I/O to a cap_std sandboxed directory.","fix":"Either reject/sanitize `input.file_name` to a relative, non-traversal path before joining (e.g. strip leading `/` and reject `..` components), or switch to `entry.unpack_in(temp_dir.path())` only and drop the unsandboxed `entry.unpack(&dst_path)` call, or move this fuzz target onto cap_std the way `archive.rs` does.","locations":[{"ref":"fuzz/fuzz_targets/tar.rs:118-119","code":"  118 |             let dst_path = temp_dir.path().join(&input.file_name);\n  119 |             let _ = entry.unpack(&dst_path).ok();","lines":2}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Builder::finish() sets `self.finished = true` before attempting `self.get_mut().write_all(&[0; 1024])`. If that write fails (e.g. transient I/O error), the error is correctly returned once, but `finished` is already true, so any subsequent call to `finish()` (directly, or implicitly via `into_inner`'s `self.finish()?` followed by `Drop::drop` on the early return path) short-circuits to `Ok(())` without retrying the write. The archive trailer is permanently lost with no further error signaled, and the underlying writer (consumed by `into_inner`/`Drop`) cannot be recovered to fix it up.","fix":"Only set `self.finished = true` after `write_all` succeeds (e.g. `self.get_mut().write_all(&[0; 1024])?; self.finished = true; Ok(())`), so a failed finish can be retried instead of silently becoming a permanent no-op.","locations":[{"ref":"src/builder.rs:561-567","code":"  561 |     pub fn finish(&mut self) -> io::Result<()> {\n  562 |         if self.finished {\n  563 |             return Ok(());\n  564 |         }\n  565 |         self.finished = true;\n  566 |         self.get_mut().write_all(&[0; 1024])\n  567 |     }","lines":7}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In append_file's sparse-file path, `pad_zeroes(dst, sparse_entries.on_disk_size)` pads based on the on-disk size computed earlier by find_sparse_entries_seek (a SEEK_HOLE/SEEK_DATA scan taken before any data is copied). The subsequent copy loop reads each sparse entry's `num_bytes` via `file.take(entry.num_bytes)`; if the file is concurrently truncated or otherwise modified between the scan and the copy (a TOCTOU race), `io::copy` will return fewer bytes than `entry.num_bytes` with no error (take() just yields EOF early), but the header's `size` field and the padding written afterward are still computed from the original `on_disk_size`. The result is a structurally valid but silently corrupted entry: less real data than the sparse map and header size claim, backfilled with extra zero padding, with no error returned to the caller. This contrasts with the non-sparse branch a few lines below, which correctly pads based on the actual bytes `io::copy` returns.","fix":"Track actual bytes copied per sparse entry (sum the return values of the io::copy calls) and either error out if the total differs from the expected on_disk_size, or pad based on the actual total copied instead of the precomputed `sparse_entries.on_disk_size`.","locations":[{"ref":"src/builder.rs:804-814","code":"  804 |     if let Some(sparse_entries) = sparse_entries {\n  805 |         append_extended_sparse_headers(dst, &sparse_entries)?;\n  806 |         for entry in sparse_entries.entries {\n  807 |             file.seek(io::SeekFrom::Start(entry.offset))?;\n  808 |             io::copy(&mut file.take(entry.num_bytes), dst)?;\n  809 |         }\n  810 |         pad_zeroes(dst, sparse_entries.on_disk_size)?;\n  811 |     } else {\n  812 |         let len = io::copy(file, dst)?;\n  813 |         pad_zeroes(dst, len)?;\n  814 |     }","lines":11}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"PaxExtensions::new splits the entire pax data blob on every raw '\\n' byte, instead of using the decimal length prefix at the start of each record to delimit it (the format spec requires the latter, since a record's length is self-describing and a value is permitted to contain arbitrary bytes, including embedded newlines). For a record whose value legitimately contains a newline byte (e.g. a `SCHILY.xattr.*` value holding binary data, or a `comment` field), the naive split breaks the record into two pieces. The first piece's length will then disagree with its own declared length prefix, so the `next()` length-consistency check on line 106 fails and the whole iterator yields `Err(\"malformed pax extension\")` for that record - or, if the byte after the broken record happens to look like a digit again, can desynchronize parsing of all subsequent records too. This affects parsing of any pax-extended archive (e.g. created by bsdtar/libarchive) that stores xattrs or other metadata containing a raw 0x0A byte.","fix":"Parse pax records by reading the decimal length prefix up to the first space, then consuming exactly that many bytes as the record (the record's own trailing '\\n' is included in the count), advancing the cursor by that length rather than splitting the whole buffer on '\\n' up front. This matches the documented PAX extended header format and correctly handles values containing embedded newlines.","locations":[{"ref":"src/pax.rs:46-56","code":"   46 | impl<'entry> PaxExtensions<'entry> {\n   47 |     /// Create new pax extensions iterator from the given entry data.\n   48 |     pub fn new(a: &'entry [u8]) -> Self {\n   49 |         fn is_newline(a: &u8) -> bool {\n   50 |             *a == b'\\n'\n   51 |         }\n   52 |         PaxExtensions {\n   53 |             data: a.split(is_newline),\n   54 |         }\n   55 |     }\n   56 | }","lines":11},{"ref":"src/pax.rs:87-122","code":"   87 | impl<'entry> Iterator for PaxExtensions<'entry> {\n   88 |     type Item = io::Result<PaxExtension<'entry>>;\n   89 | \n   90 |     fn next(&mut self) -> Option<io::Result<PaxExtension<'entry>>> {\n   91 |         let line = match self.data.next() {\n   92 |             Some([]) => return None,\n   93 |             Some(line) => line,\n   94 |             None => return None,\n   95 |         };\n   96 | \n   97 |         Some(\n   98 |             line.iter()\n   99 |                 .position(|b| *b == b' ')\n  100 |                 .and_then(|i| {\n  101 |                     str::from_utf8(&line[..i])\n  102 |                         .ok()\n  103 |                         .and_then(|len| len.parse::<usize>().ok().map(|j| (i + 1, j)))\n  104 |                 })\n  105 |                 .and_then(|(kvstart, reported_len)| {\n  106 |                     if line.len() + 1 == reported_len {\n  107 |                         line[kvstart..]\n  108 |                             .iter()\n  109 |                             .position(|b| *b == b'=')\n  110 |                             .map(|equals| (kvstart, equals))\n  111 |                     } else {\n  112 |                         None\n  113 |                     }\n  114 |                 })\n  115 |                 .map(|(kvstart, equals)| PaxExtension {\n  116 |                     key: &line[kvstart..kvstart + equals],\n  117 |                     value: &line[kvstart + equals + 1..],\n  118 |                 })\n  119 |                 .ok_or_else(|| other(\"malformed pax extension\")),\n  120 |         )\n  121 |     }\n  122 | }","lines":36}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`tar_directory_containing_symlink_to_directory` only asserts the symlink setup precondition (lines 1673-1674) and then calls `append_dir_all(...).unwrap()` / `finish().unwrap()` with no further assertions on the resulting archive's contents. The test verifies the call sequence doesn't error/panic but never checks what `append_dir_all` actually wrote for the symlink-to-directory case (e.g. whether it stored a symlink entry or wrongly recursed into the target, or whether the entry type/size/link target are correct), which is exactly the area most likely to harbor a real bug.","fix":"Read back the produced archive and assert the symlink entry's type (EntryType::Symlink), link_name, and that the target directory's contents were not erroneously inlined.","locations":[{"ref":"tests/all.rs:1662-1677","code":" 1662 | #[test]\n 1663 | #[cfg(unix)]\n 1664 | fn tar_directory_containing_symlink_to_directory() {\n 1665 |     use std::os::unix::fs::symlink;\n 1666 | \n 1667 |     let td = TempBuilder::new().prefix(\"tar-rs\").tempdir().unwrap();\n 1668 |     let dummy_src = TempBuilder::new().prefix(\"dummy_src\").tempdir().unwrap();\n 1669 |     let dummy_dst = td.path().join(\"dummy_dst\");\n 1670 |     let mut ar = Builder::new(Vec::new());\n 1671 |     symlink(dummy_src.path().display().to_string(), &dummy_dst).unwrap();\n 1672 | \n 1673 |     assert!(dummy_dst.read_link().is_ok());\n 1674 |     assert!(dummy_dst.read_link().unwrap().is_dir());\n 1675 |     ar.append_dir_all(\"symlinks\", td.path()).unwrap();\n 1676 |     ar.finish().unwrap();\n 1677 | }","lines":16}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`append_long_multibyte` builds 512 entries with growing multibyte (4-byte UTF-8) filenames that cross the GNU 100-byte header name boundary, but only asserts that `append_data(...).unwrap()` does not error/panic for any of them. It never reads the archive back to confirm the long-name extension correctly preserves the multibyte filename without corrupting it at a byte split that lands mid-codepoint, which is the actual risk this kind of boundary test is meant to catch.","fix":"After the loop (or for a representative subset), parse the archive back and assert `path_bytes()`/`path()` round-trips correctly for names whose multibyte boundary falls near the 100-byte and 512-byte block marks.","locations":[{"ref":"tests/all.rs:1703-1714","code":" 1703 | #[test]\n 1704 | fn append_long_multibyte() {\n 1705 |     let mut x = tar::Builder::new(Vec::new());\n 1706 |     let mut name = String::new();\n 1707 |     let data: &[u8] = &[];\n 1708 |     for _ in 0..512 {\n 1709 |         name.push('a');\n 1710 |         name.push('𑢮');\n 1711 |         x.append_data(&mut Header::new_gnu(), &name, data).unwrap();\n 1712 |         name.pop();\n 1713 |     }\n 1714 | }","lines":12}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`tar_directory_containing_special_files` creates a FIFO and appends a FIFO, a recursive directory containing the FIFO, and a character device (`/dev/null`) to a Builder, but never reads back the resulting archive bytes or asserts anything about entry type, rdev major/minor, or mode. The test only confirms the `.unwrap()` calls do not return `Err`/panic; it provides no protection against `append_path`/`append_dir_all` silently mis-encoding special-file metadata.","fix":"Parse the resulting `ar.into_inner()` bytes with `Archive` and assert each entry's `entry_type()` (Fifo/Char) and that round-tripping preserves the expected attributes.","locations":[{"ref":"tests/all.rs:1743-1770","code":" 1743 | #[test]\n 1744 | #[cfg(target_os = \"linux\")]\n 1745 | fn tar_directory_containing_special_files() {\n 1746 |     use std::env;\n 1747 |     use std::ffi::CString;\n 1748 | \n 1749 |     let td = TempBuilder::new().prefix(\"tar-rs\").tempdir().unwrap();\n 1750 |     let fifo = td.path().join(\"fifo\");\n 1751 | \n 1752 |     unsafe {\n 1753 |         let fifo_path = CString::new(fifo.to_str().unwrap()).unwrap();\n 1754 |         let ret = libc::mknod(fifo_path.as_ptr(), libc::S_IFIFO | 0o644, 0);\n 1755 |         if ret != 0 {\n 1756 |             libc::perror(fifo_path.as_ptr());\n 1757 |             panic!(\"Failed to create a FIFO file\");\n 1758 |         }\n 1759 |     }\n 1760 | \n 1761 |     env::set_current_dir(td.path()).unwrap();\n 1762 |     let mut ar = Builder::new(Vec::new());\n 1763 |     // append_path has a different logic for processing files, so we need to test it as well\n 1764 |     ar.append_path(\"fifo\").unwrap();\n 1765 |     ar.append_dir_all(\"special\", td.path()).unwrap();\n 1766 |     env::set_current_dir(\"/dev/\").unwrap();\n 1767 |     // CI systems seem to have issues with creating a chr device\n 1768 |     ar.append_path(\"null\").unwrap();\n 1769 |     ar.finish().unwrap();\n 1770 | }","lines":28}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`patch_config_flag` interpolates `tar_rs_root.display()` directly into a double-quoted TOML string passed to `cargo --config`. On Windows, paths contain backslashes, which are escape characters inside TOML basic strings (`\\U`, `\\u`, etc.); an unlucky path segment (e.g. containing `\\U` followed by hex-looking characters) could produce malformed TOML or a corrupted path, causing `cargo --config` to fail to parse or to patch the wrong path.","fix":"Escape backslashes and quotes in the path before interpolating (e.g. `path.to_string_lossy().replace('\\\\', \"\\\\\\\\\").replace('\"', \"\\\\\\\"\")`), or use a TOML literal string (single quotes) where backslashes are not special, if the path can't contain a single quote.","locations":[{"ref":"xtask/src/revdep_test.rs:100-103","code":"  100 | fn patch_config_flag(tar_rs_root: &Path) -> String {\n  101 |     let path = tar_rs_root.display();\n  102 |     format!(\"patch.crates-io.tar.path=\\\"{path}\\\"\")\n  103 | }","lines":4}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In append_path_with_name, the file/dir/symlink branches all archive the entry under `ar_name` (the caller-requested rename), but the special-file branch (sockets/fifos/char/block devices on unix) calls `append_special(dst, path, ...)` using the original filesystem `path` instead of `ar_name`. Calling `append_path_with_name(path, name)` on a fifo/device silently ignores the requested archive name and stores the original source path instead, with no error.","fix":"Change line 731 to `append_special(dst, ar_name, &stat, options.mode, options.preserve_absolute)` to match the other three branches.","locations":[{"ref":"src/builder.rs:706-737","code":"  706 |     let ar_name = name.unwrap_or(path);\n  707 |     if stat.is_file() {\n  708 |         append_file(dst, ar_name, &mut fs::File::open(path)?, options)\n  709 |     } else if stat.is_dir() {\n  710 |         append_fs(\n  711 |             dst,\n  712 |             ar_name,\n  713 |             &stat,\n  714 |             options.mode,\n  715 |             options.preserve_absolute,\n  716 |             None,\n  717 |         )\n  718 |     } else if stat.file_type().is_symlink() {\n  719 |         let link_name = fs::read_link(path)?;\n  720 |         append_fs(\n  721 |             dst,\n  722 |             ar_name,\n  723 |             &stat,\n  724 |             options.mode,\n  725 |             options.preserve_absolute,\n  726 |             Some(&link_name),\n  727 |         )\n  728 |     } else {\n  729 |         #[cfg(unix)]\n  730 |         {\n  731 |             append_special(dst, path, &stat, options.mode, options.preserve_absolute)\n  732 |         }\n  733 |         #[cfg(not(unix))]\n  734 |         {\n  735 |             Err(other(&format!(\"{} has unknown file type\", path.display())))\n  736 |         }\n  737 |     }","lines":32}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":false,"description":"prepare_header_path, on a too-long path, truncates the path and writes it back into `header` via `set_truncated_path_for_gnu_header` before emitting the GNU long-name extension entry, leaving the main header's `name` field in a defined, truncated state. prepare_header_link has no equivalent step: when `header.set_link_name(link_name)` fails, the code goes straight to emitting the `K` (long-link) extension without ever overwriting `header`'s `linkname` field. Since `copy_path_into` (used internally by `set_link_name`) writes path components into the destination slice incrementally and can fail partway through a multi-component path, a failed `set_link_name` call can leave `header.linkname` containing a partial/inconsistent fragment of the link target rather than a clean truncated value or empty field.","fix":"Mirror prepare_header_path: after detecting that set_link_name failed because the target is too long, compute a truncated link name and write it into the header (e.g. via a truncated link-name setter analogous to set_truncated_path_for_gnu_header) before appending the long-link extension entry.","locations":[{"ref":"src/builder.rs:898-914","code":"  898 | fn prepare_header_link(\n  899 |     dst: &mut dyn Write,\n  900 |     header: &mut Header,\n  901 |     link_name: &Path,\n  902 | ) -> io::Result<()> {\n  903 |     // Same as previous function but for linkname\n  904 |     if let Err(e) = header.set_link_name(link_name) {\n  905 |         let data = path2bytes(link_name)?;\n  906 |         if data.len() < header.as_old().linkname.len() {\n  907 |             return Err(e);\n  908 |         }\n  909 |         let header2 = prepare_header(data.len() as u64, b'K');\n  910 |         let mut data2 = data.chain(io::repeat(0).take(1));\n  911 |         append(dst, &header2, &mut data2)?;\n  912 |     }\n  913 |     Ok(())\n  914 | }","lines":17}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In `extracting_malicious_tarball`, the negative assertions for the absolute-path traversal cases check `/tmp/abs_evil.txt2`, `.txt3`, `.txt4`, `.txt5`, `.txt6` (suffix appended after `.txt`), but the actual malicious filenames built by the `append()` closure are `//tmp/abs_evil2.txt`, `///tmp/abs_evil3.txt`, etc. (the digit is before `.txt`, matching the positive checks at lines 845-857: `tmp/abs_evil2.txt`). These five negative assertions check paths that were never written by the test in the first place, so they would pass trivially even if `tar-rs` had a path-traversal regression that wrote outside the sandboxed extraction directory to the *correctly* named `/tmp/abs_evilN.txt`. Only the first negative assertion (`/tmp/abs_evil.txt`, no suffix) actually corresponds to a real malicious filename in the archive.","fix":"Fix the negative assertions to use the same filenames as the malicious archive / the positive checks below, e.g. `assert!(fs::metadata(\"/tmp/abs_evil2.txt\").is_err());` through `abs_evil6.txt`, removing the duplicate no-op check on line 826.","locations":[{"ref":"tests/all.rs:819-826","code":"  819 |     assert!(fs::metadata(\"/tmp/abs_evil.txt\").is_err());\n  820 |     assert!(fs::metadata(\"/tmp/abs_evil.txt2\").is_err());\n  821 |     assert!(fs::metadata(\"/tmp/abs_evil.txt3\").is_err());\n  822 |     assert!(fs::metadata(\"/tmp/abs_evil.txt4\").is_err());\n  823 |     assert!(fs::metadata(\"/tmp/abs_evil.txt5\").is_err());\n  824 |     assert!(fs::metadata(\"/tmp/abs_evil.txt6\").is_err());\n  825 |     assert!(fs::metadata(\"/tmp/rel_evil.txt\").is_err());\n  826 |     assert!(fs::metadata(\"/tmp/rel_evil.txt\").is_err());","lines":8}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"EntryWriter's doc comment says an entry \"must be finalized either by explicitly calling finish or by letting it drop\", presenting both as equivalent, but Drop::drop discards any I/O error from do_finish() via `let _ = self.do_finish()`. A write/seek failure during the implicit drop-finish (e.g. disk full, broken pipe) is silently swallowed with no panic, log, or other signal, unlike calling finish() explicitly which surfaces the error.","fix":"Update the doc comment to warn that dropping without calling finish() silently discards I/O errors, and recommend always calling finish() explicitly when error handling matters.","locations":[{"ref":"src/builder.rs:580-586","code":"  580 | /// A writer for a single entry in a tar archive.\n  581 | ///\n  582 | /// This struct is returned by [`Builder::append_writer`] and provides a\n  583 | /// [`Write`] implementation for adding content to an archive entry.\n  584 | ///\n  585 | /// After writing all data to the entry, it must be finalized either by\n  586 | /// explicitly calling [`EntryWriter::finish`] or by letting it drop.","lines":7},{"ref":"src/builder.rs:663-667","code":"  663 | impl Drop for EntryWriter<'_> {\n  664 |     fn drop(&mut self) {\n  665 |         let _ = self.do_finish();\n  666 |     }\n  667 | }","lines":5}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"examples/write.rs never calls Builder::finish() or into_inner(), relying instead on the implicit Drop impl. Builder's own Drop impl (src/builder.rs:1236-1240) discards the Result of finish() with `let _ = self.finish();`, so any I/O error while writing the final archive trailer (e.g. disk full) is silently swallowed. The library's own docs for EntryWriter (src/builder.rs:585-586) and finish() (src/builder.rs:556-558) explicitly recommend calling finish()/into_inner() explicitly to surface such errors. Since this is example code users copy verbatim, it propagates a silent-data-loss pattern.","fix":"Call `a.finish().unwrap();` (or use `into_inner()`) explicitly at the end of main() instead of relying on Drop, matching the guidance already documented in src/builder.rs.","locations":[{"ref":"examples/write.rs:6-13","code":"    6 | fn main() {\n    7 |     let file = File::create(\"foo.tar\").unwrap();\n    8 |     let mut a = Builder::new(file);\n    9 | \n   10 |     a.append_path(\"README.md\").unwrap();\n   11 |     a.append_file(\"lib.rs\", &mut File::open(\"src/lib.rs\").unwrap())\n   12 |         .unwrap();\n   13 | }","lines":8}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"examples/extract_file.rs and examples/list.rs/raw_list.rs use `extern crate tar;` (and write.rs/extract_file.rs use `extern crate tempfile;` is absent but `extern crate tar;` appears) which is unnecessary boilerplate in 2018+ edition Rust; harmless but stale style carried over from pre-2018-edition examples.","fix":"Remove the redundant `extern crate tar;` lines since Rust 2018+ edition resolves crates automatically; purely cosmetic cleanup.","locations":[{"ref":"examples/write.rs:1","code":"    1 | extern crate tar;","lines":1},{"ref":"examples/list.rs:5","code":"    5 | extern crate tar;","lines":1},{"ref":"examples/extract_file.rs:7","code":"    7 | extern crate tar;","lines":1},{"ref":"examples/raw_list.rs:5","code":"    5 | extern crate tar;","lines":1}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment \"Would not match without `Deterministic`\" sits directly above an assert_eq! that checks the mtimes DO match (both headers were built with HeaderMode::Deterministic). The test never actually constructs a header without Deterministic mode to demonstrate the contrast, so the comment describes a scenario that is not exercised anywhere in the test and could mislead a future maintainer into thinking the assertion proves something it doesn't.","fix":"Reword the comment to state what is actually being verified, e.g. \"With Deterministic mode, mtime is fixed regardless of actual file mtime/readonly state\", or add a contrasting non-deterministic case if the original intent was a side-by-side comparison.","locations":[{"ref":"tests/header/mod.rs:212-214","code":"  212 |     // Would not match without `Deterministic`.\n  213 |     assert_eq!(one.mtime().unwrap(), two.mtime().unwrap());\n  214 |     assert_eq!(one.mtime().unwrap(), 1153704088);","lines":3}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":false,"description":"When prepare_header_path's GNU-long-name fallback fires on a non-GNU header (e.g. a UStar or old-format Header passed in by a caller via append_data/append_writer/append_link), set_truncated_path_for_gnu_header still routes through set_path_inner, which checks `as_ustar_mut()` first and, for UStar headers, calls the ordinary (non-GNU) ustar path setter rather than ever touching the GNU long-name machinery. The result is a `././@LongLink` GNU extension entry immediately followed by a main entry whose magic/version bytes say UStar (or plain old format), an internally inconsistent mix of GNU and UStar/old conventions in the same archive. This crate's own reader tolerates it (long_pathname/long_linkname are applied independent of the following header's format byte), but other tar implementations are not guaranteed to.","fix":"Either force the main header to GNU format when emitting a GNU long-name/long-link extension (so magic/version are consistent with the `L`/`K` extension entries), or document that prepare_header_path's GNU fallback assumes the caller is using a GNU-style Header.","locations":[{"ref":"src/builder.rs:851-896","code":"  851 | fn prepare_header_path(\n  852 |     dst: &mut dyn Write,\n  853 |     header: &mut Header,\n  854 |     path: &Path,\n  855 |     allow_absolute: bool,\n  856 | ) -> io::Result<()> {\n  857 |     // Try to encode the path directly in the header, but if it ends up not\n  858 |     // working (probably because it's too long) then try to use the GNU-specific\n  859 |     // long name extension by emitting an entry which indicates that it's the\n  860 |     // filename.\n  861 |     let res (function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
