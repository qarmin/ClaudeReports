urn@ensureBackgroundThread\n  736 |             loadingOlderMessages = true\n  737 |             isJumpingToMessage = true\n  738 | \n  739 |             var cutoff = messages.firstOrNull()?.date ?: Int.MAX_VALUE\n  740 |             var found = false\n  741 |             var loops = 0\n  742 | \n  743 |             // not the best solution, but this will do for now.\n  744 |             while (!found && !allMessagesFetched) {\n  745 |                 if (fetchOlderMessages(cutoff).isEmpty() || loops >= 1000) break\n  746 |                 cutoff = messages.first().date\n  747 |                 found = messages.any { it.id == messageId }\n  748 |                 loops++\n  749 |             }\n  750 | \n  751 |             threadItems = getThreadItems()\n  752 |             runOnUiThread {\n  753 |                 loadingOlderMessages = false\n  754 |                 val index = threadItems.indexOfFirst { (it as? Message)?.id == messageId }\n  755 |                 getOrCreateThreadAdapter().updateMessages(\n  756 |                     newMessages = threadItems, scrollPosition = index, smoothScroll = true\n  757 |                 )\n  758 |                 isJumpingToMessage = false\n  759 |             }\n  760 |         }\n  761 |     }","lines":28}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"ThreadAdapter.setupView and setupReceivedMessageView/setupSentMessageView do heavy per-bind work: build a fresh ConstraintSet, clone() the whole layout and applyTo() on every bind; build a SimpleContactsHelper, generate a contact letter icon, build RequestOptions and kick off a Glide load; inflate attachment item views (ItemAttachmentImageBinding/Vcard/Document) and removeAllViews/addView for every attachment. All of this runs in onBindViewHolder on the main thread for each row scrolled, causing scroll jank in long threads.","fix":"Cache/reuse ConstraintSets and SimpleContactsHelper, avoid re-inflating attachment views every bind, and move icon generation off the bind path where possible.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/ThreadAdapter.kt:366-407","code":"  366 |     private fun setupView(holder: ViewHolder, view: View, message: Message) {\n  367 |         ItemMessageBinding.bind(view).apply {\n  368 |             threadMessageHolder.isSelected = selectedKeys.contains(message.getSelectionKey())\n  369 |             threadMessageBody.apply {\n  370 |                 text = message.body\n  371 |                 setTextSize(TypedValue.COMPLEX_UNIT_PX, fontSize)\n  372 |                 beVisibleIf(message.body.isNotEmpty())\n  373 |                 setOnLongClickListener {\n  374 |                     holder.viewLongClicked()\n  375 |                     true\n  376 |                 }\n  377 | \n  378 |                 setOnClickListener {\n  379 |                     holder.viewClicked(message)\n  380 |                 }\n  381 |             }\n  382 | \n  383 |             if (message.isReceivedMessage()) {\n  384 |                 setupReceivedMessageView(messageBinding = this, message = message)\n  385 |             } else {\n  386 |                 setupSentMessageView(messageBinding = this, message = message)\n  387 |             }\n  388 | \n  389 |             if (message.attachment?.attachments?.isNotEmpty() == true) {\n  390 |                 threadMessageAttachmentsHolder.beVisible()\n  391 |                 threadMessageAttachmentsHolder.removeAllViews()\n  392 |                 for (attachment in message.attachment.attachments) {\n  393 |                     val mimetype = attachment.mimetype\n  394 |                     when {\n  395 |                         mimetype.isImageMimeType() || mimetype.isVideoMimeType() -> setupImageView(holder, binding = this, message, attachment)\n  396 |                         mimetype.isVCardMimeType() -> setupVCardView(holder, threadMessageAttachmentsHolder, message, attachment)\n  397 |                         else -> setupFileView(holder, threadMessageAttachmentsHolder, message, attachment)\n  398 |                     }\n  399 | \n  400 |                     threadMessagePlayOutline.beVisibleIf(mimetype.startsWith(\"video/\"))\n  401 |                 }\n  402 |             } else {\n  403 |                 threadMessageAttachmentsHolder.beGone()\n  404 |                 threadMessagePlayOutline.beGone()\n  405 |             }\n  406 |         }\n  407 |     }","lines":42},{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/ThreadAdapter.kt:409-491","code":"  409 |     private fun setupReceivedMessageView(messageBinding: ItemMessageBinding, message: Message) {\n  410 |         messageBinding.apply {\n  411 |             with(ConstraintSet()) {\n  412 |                 clone(threadMessageHolder)\n  413 |                 clear(threadMessageWrapper.id, ConstraintSet.END)\n  414 |                 connect(threadMessageWrapper.id, ConstraintSet.START, ConstraintSet.PARENT_ID, ConstraintSet.START)\n  415 |                 applyTo(threadMessageHolder)\n  416 |             }\n  417 | \n  418 |             threadMessageSenderPhoto.beVisible()\n  419 |             threadMessageSenderPhoto.setOnClickListener {\n  420 |                 val contact = message.getSender()!!\n  421 |                 activity.getContactFromAddress(contact.phoneNumbers.first().normalizedNumber) {\n  422 |                     if (it != null) {\n  423 |                         activity.startContactDetailsIntent(it)\n  424 |                     }\n  425 |                 }\n  426 |             }\n  427 | \n  428 |             threadMessageBody.apply {\n  429 |                 background = AppCompatResources.getDrawable(activity, R.drawable.item_received_background)\n  430 |                 setTextColor(textColor)\n  431 |                 setLinkTextColor(activity.getProperPrimaryColor())\n  432 |             }\n  433 | \n  434 |             if (!activity.isFinishing && !activ nd.applyColorFilter(primaryColor)\n  473 |                 setTextColor(contrastColor)\n  474 |                 setLinkTextColor(contrastColor)\n  475 | \n  476 |                 if (message.isScheduled) {\n  477 |                     typeface = Typeface.create(FontHelper.getTypeface(activity), Typeface.ITALIC)\n  478 |                     val scheduledDrawable = AppCompatResources.getDrawable(activity, org.fossify.commons.R.drawable.ic_clock_vector)?.apply {\n  479 |                         applyColorFilter(contrastColor)\n  480 |                         val size = lineHeight\n  481 |                         setBounds(0, 0, size, size)\n  482 |                     }\n  483 | \n  484 |                     setCompoundDrawables(null, null, scheduledDrawable, null)\n  485 |                 } else {\n  486 |                     typeface = FontHelper.getTypeface(activity)\n  487 |                     setCompoundDrawables(null, null, null, null)\n  488 |                 }\n  489 |             }\n  490 |         }\n  491 |     }","lines":83}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`writeMmsMessage` resolves the thread id and message id through repeated content-provider queries for every single MMS. `getMmsThreadId` calls `Utils.getOrCreateThreadId` (a provider lookup). It is invoked at line 55, again inside `mmsExist` -> `getMmsId` -> `getMmsThreadId` (line 58), and yet again in the direct `getMmsId` call (line 62). So importing one MMS triggers `getOrCreateThreadId` 3+ times plus 2 separate `Mms._ID` lookups. For a large backup (thousands of MMS) this is a large amount of redundant provider IO.","fix":"Compute threadId once in writeMmsMessage and pass it down to getMmsId/mmsExist instead of recomputing it inside each helper.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesWriter.kt:50-68","code":"   50 |     fun writeMmsMessage(mmsBackup: MmsBackup) {\n   51 |         // 1. write mms msg, get the msg_id, check if mms exists before writing\n   52 |         // 2. write parts - parts depend on the msg id, check if part exist before writing, write data if it is a non-text part\n   53 |         // 3. write the addresses, address depends on msg id too, check if address exist before writing\n   54 |         val contentValues = mmsBackup.toContentValues()\n   55 |         val threadId = getMmsThreadId(mmsBackup)\n   56 |         if (threadId != INVALID_ID) {\n   57 |             contentValues.put(Mms.THREAD_ID, threadId)\n   58 |             if (!mmsExist(mmsBackup)) {\n   59 |                 modifiedThreadIds.add(threadId)\n   60 |                 contentResolver.insert(Mms.CONTENT_URI, contentValues)\n   61 |             }\n   62 |             val messageId = getMmsId(mmsBackup)\n   63 |             if (messageId != INVALID_ID) {\n   64 |                 mmsBackup.parts.forEach { writeMmsPart(it, messageId) }\n   65 |                 mmsBackup.addresses.forEach { writeMmsAddress(it, messageId) }\n   66 |             }\n   67 |         }\n   68 |     }","lines":19},{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesWriter.kt:82-103","code":"   82 |     private fun getMmsId(mmsBackup: MmsBackup): Long {\n   83 |         val threadId = getMmsThreadId(mmsBackup)\n   84 |         val uri = Mms.CONTENT_URI\n   85 |         val projection = arrayOf(Mms._ID)\n   86 |         val selection = \"${Mms.DATE} = ? AND ${Mms.DATE_SENT} = ? AND ${Mms.THREAD_ID} = ? AND ${Mms.MESSAGE_BOX} = ?\"\n   87 |         val selectionArgs = arrayOf(\n   88 |             mmsBackup.date.toString(),\n   89 |             mmsBackup.dateSent.toString(),\n   90 |             threadId.toString(),\n   91 |             mmsBackup.messageBox.toString()\n   92 |         )\n   93 |         var id = INVALID_ID\n   94 |         context.queryCursor(uri, projection, selection, selectionArgs) {\n   95 |             id = it.getLongValue(Mms._ID)\n   96 |         }\n n  132 |         binding.conversationsFastscroller.updateColors(properPrimaryColor)\n  133 |         binding.conversationsProgressBar.setIndicatorColor(properPrimaryColor)\n  134 |         binding.conversationsProgressBar.trackColor = properPrimaryColor.adjustAlpha(LOWER_ALPHA)\n  135 |         checkShortcut()\n  136 |     }","lines":28}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"updateBlockedKeywords() creates a brand-new ManageBlockedKeywordsAdapter and assigns it to\nthe RecyclerView on every refresh (including after every add/edit/import). The existing\nadapter is never updated in place, defeating RecyclerView item-level diffing/recycling and\ncausing a full re-layout each time.","fix":"Create the adapter once and call an update method (e.g. updateKeywords) on subsequent\nrefreshes, mirroring the getOrCreateConversationsAdapter pattern used elsewhere.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ManageBlockedKeywordsActivity.kt:198-217","code":"  198 |     private fun updateBlockedKeywords() {\n  199 |         ensureBackgroundThread {\n  200 |             val blockedKeywords = config.blockedKeywords.sorted().toArrayList()\n  201 |             runOnUiThread {\n  202 |                 ManageBlockedKeywordsAdapter(\n  203 |                     activity = this,\n  204 |                     blockedKeywords = blockedKeywords,\n  205 |                     listener = this,\n  206 |                     recyclerView = binding.manageBlockedKeywordsList\n  207 |                 ) {\n  208 |                     addOrEditBlockedKeyword(it as String)\n  209 |                 }.apply {\n  210 |                     binding.manageBlockedKeywordsList.adapter = this\n  211 |                 }\n  212 | \n  213 |                 binding.manageBlockedKeywordsPlaceholder.beVisibleIf(blockedKeywords.isEmpty())\n  214 |                 binding.manageBlockedKeywordsPlaceholder2.beVisibleIf(blockedKeywords.isEmpty())\n  215 |             }\n  216 |         }\n  217 |     }","lines":20}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"isMmsMessage, updateMessageType and checkSendMessageAvailability each call getAttachmentSelections() which walks adapter state; checkSendMessageAvailability calls it up to three times in a single boolean expression (line 1512). These run on every onTextChangeListener keystroke, recomputing attachment lists repeatedly per character typed.","fix":"Cache getAttachmentSelections() in a local val within each function and avoid recomputing it multiple times per call.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1510-1524","code":" 1510 |     private fun checkSendMessageAvailability() {\n 1511 |         binding.messageHolder.apply {\n 1512 |             if (threadTypeMessage.text!!.isNotEmpty() || (getAttachmentSelections().isNotEmpty() && !getAttachmentSelections().any { it.isPending })) {\n 1513 |                 threadSendMessage.isEnabled = true\n 1514 |                 threadSendMessage.isClickable = true\n 1515 |                 threadSendMessage.alpha = 0.9f\n 1516 |             } else {\n 1517 |                 threadSendMessage.isEnabled = false\n 1518 |                 threadSendMessage.isClickable = false\n 1519 |                 threadSendMessage.alpha = 0.4f\n 1520 |             }\n 1521 |         }\n 1522 | \n 1523 |         updateMessageType()\n 1524 |     }","lines":15},{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:857-868","code":"  857 |             threadTypeMessage.onTextChangeListener {\n  858 |                 messageToResend = null\n  859 |                 checkSendMessageAvailability()\n  860 |                 val messageString = if (config.useSimpleCharacters) {\n  861 |                     it.normalizeString()\n  862 |                 } else {\n  863 | ","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/BaseConversationsAdapter.kt:194-207","code":"  194 |             setupBadgeCount(unreadCountBadge, isUnread, conversation.unreadCount)\n  195 |             // at group conversations we use an icon as the placeholder, not any letter\n  196 |             val placeholder = if (conversation.isGroupConversation) {\n  197 |                 SimpleContactsHelper(activity).getColoredGroupIcon(conversation.title)\n  198 |             } else {\n  199 |                 null\n  200 |             }\n  201 | \n  202 |             SimpleContactsHelper(activity).loadContactImage(\n  203 |                 path = conversation.photoUri,\n  204 |                 imageView = conversationImage,\n  205 |                 placeholderName = conversation.title,\n  206 |                 placeholderImage = placeholder\n  207 |             )","lines":14},{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/BaseConversationsAdapter.kt:185-192","code":"  185 |             val customTypeface = FontHelper.getTypeface(activity)\n  186 |             conversationAddress.setTypeface(customTypeface, style)\n  187 |             conversationBodyShort.setTypeface(customTypeface, style)\n  188 |             conversationDate.setTypeface(customTypeface, style)\n  189 | \n  190 |             arrayListOf(conversationAddress, conversationBodyShort, conversationDate).forEach {\n  191 |                 it.setTextColor(textColor)\n  192 |             }","lines":8}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"ThreadAdapter.getSelectableItemCount() does currentList.filterIsInstance<Message>().size, allocating a filtered list every call. getSelectableItemCount is called by the selection framework potentially frequently (e.g. on each selection change / select-all).","fix":"Use currentList.count { it is Message } to avoid the intermediate list allocation.","locations":[{"ref":"app  up to 50 rows and recomputes trimToComparableNumber for the same numbers repeatedly.","fix":"Maintain a HashSet<String> of already-seen trimToComparableNumber() values and check/add against it in O(1).","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:769-772","code":"  769 |         if (!contacts.map { it.phoneNumbers.first().normalizedNumber.trimToComparableNumber() }\n  770 |                 .contains(senderNumber.trimToComparableNumber())) {\n  771 |             contacts.add(contact)\n  772 |         }","lines":4}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`importBlockedKeywords` adds each keyword with a separate `config.addBlockedKeyword(keyword)` call. Each call does `blockedKeywords = blockedKeywords.plus(keyword)`, which reads the full StringSet from SharedPreferences, copies it, and commits a new write via `prefs.edit().apply()`. For a file with N keywords this is N read-modify-write prefs cycles instead of one.","fix":"Accumulate all keywords and assign once: `activity.config.blockedKeywords = activity.config.blockedKeywords + keywords.toSet()`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/BlockedKeywordsImporter.kt:24-26","code":"   24 |                 keywords.forEach { keyword: String ->\n   25 |                     activity.config.addBlockedKeyword(keyword)\n   26 |                 }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/Config.kt:83-85","code":"   83 |     fun addBlockedKeyword(keyword: String) {\n   84 |         blockedKeywords = blockedKeywords.plus(keyword)\n   85 |     }","lines":3}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"SmsReceiver.handleMessageSync opens a MyContacts cursor twice for the same address: once implicitly via nothing, and explicitly at line 107 `context.getMyContactsCursor(...)` to resolve senderName. Additionally getThreadId, getPhotoUriFromPhoneNumber, getNameFromAddress and getNotificationBitmap each do independent contact/provider lookups for the same single incoming message. For the SMS hot path this is several redundant content-provider queries per received message; the contacts cursor in particular could be opened once and reused.","fix":"Open the MyContacts cursor once and pass it to both the existence check and getNameFromAddress; cache the photo/name lookups for the single address.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/SmsReceiver.kt:89-119","code":"   89 |         val photoUri = SimpleContactsHelper(context).getPhotoUriFromPhoneNumber(address)\n   90 |         val bitmap = context.getNotificationBitmap(photoUri)\n   91 | \n   92 |         val newMessageId = context.insertNewSMS(\n   93 |             address = address,\n   94 |             subject = subject,\n   95 |             body = body,\n   96 |             date = date,\n   97 |             read = read,\n   98 |             threadId = threadId,\n   99 |             type = type,\n  100 |             subscriptionId = subscriptionId\n  101 |         )\n  102 | \n  103 |         context.getConversations(threadId).firstOrNull()?.let { conv ->\n  104 |             runCatching { context.insertOrUpdateConversation(conv) }\n  105 |         }\n  106 | \n  107 |         val senderName = context.getMyContactsCursor(favoritesOnly = false, withPhoneNumbersOnly = true).use {\n  108 |             context.getNameFromAddress(address, it)\n  109 |         }\n  110 | \n  111 |         val participant = SimpleContact(\n  112 |             rawId = 0,\n  113 |             contactId = 0,\n  114 |             name = senderName,\n  115 |             photoUri = photoUri,\n  116 |             phoneNumbers = arrayListOf(PhoneNumber(value = address, type = 0, label = \"\", normalizedNumber = address)),\n  117 |             birthdays = ArrayList(),\n  118 |             anniversaries = ArrayList()\   return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');

      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
