<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"renameConversation rebuilds the list with `set(indexOf(conversation), updatedConv)`. `indexOf` uses Conversation.equals (data class), and the `conversation` captured here is the pre-edit instance. If the underlying list was refreshed in the meantime (new message, read-state change) the element no longer equals the captured instance and indexOf returns -1, so `set(-1, updatedConv)` throws IndexOutOfBoundsException / ArrayIndexOutOfBoundsException.","fix":"Locate the target by threadId (indexOfFirst { it.threadId == conversation.threadId }) and guard against -1 before calling set().","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/ConversationsAdapter.kt:234-247","code":"  234 |     private fun renameConversation(conversation: Conversation) {\n  235 |         RenameConversationDialog(activity, conversation) {\n  236 |             ensureBackgroundThread {\n  237 |                 val updatedConv = activity.renameConversation(conversation, newTitle = it)\n  238 |                 activity.runOnUiThread {\n  239 |                     finishActMode()\n  240 |                     currentList.toMutableList().apply {\n  241 |                         set(indexOf(conversation), updatedConv)\n  242 |                         updateConversations(this as ArrayList<Conversation>)\n  243 |                     }\n  244 |                 }\n  245 |             }\n  246 |         }\n  247 |     }","lines":14}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"updateLastConversationMessage indexes the result of getConversations(threadId) with `[0]`. getConversations can legitimately return an empty list (e.g. the thread has 0 messages, all recipients are blocked, or the thread no longer exists after the delete trigger above), causing an IndexOutOfBoundsException. It is inside a try/catch that swallows everything, so the failure is silent and the conversation snippet/date simply never updates - but it still aborts the whole loop over `threadIds`, so subsequent threads in the same call are skipped.","fix":"Use getConversations(threadId).firstOrNull()?.let { insertOrUpdateConversation(it) }, and ideally move it out of the broad catch so per-thread failures don't abort the rest of the loop.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:1178-1185","code":" 1178 |     try {\n 1179 |         contentResolver.delete(uri, selection, null)\n 1180 |         for (threadId in threadIds) {\n 1181 |             val newConversation = getConversations(threadId)[0]\n 1182 |             insertOrUpdateConversation(newConversation)\n 1183 |         }\n 1184 |     } catch (_: Exception) {\n 1185 |     }","lines":8}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`readSms` parses untrusted XML backup attributes with non-null-asserting, throwing conversions: `getAttributeValue(null, \"date\").toLong()`, `.toInt()` on `locked`, `read`, `status`, `type`, and `address = getAttributeValue(null, \"address\")` assigned to a non-null `String`. If any of these attributes are missing or malformed in the backup file, `getAttributeValue` returns null and `.toLong()`/`.toInt()` throw NumberFormatException/NullPointerException, or the SmsBackup constructor gets a null `address`. Per-message this is caught in the importXml loop (counted as a failed message), but a missing/empty `date` attribute on a single record silently drops that message rather than handling it gracefully, and the whole-record failure for any single bad attribute is harsh. Use nullable parsing with sensible defaults.","fix":"Use safe parsing: `getAttributeValue(null, \"date\")?.toLongOrNull() ?: 0L`, `getAttributeValue(null, \"type\")?.toIntOrNull() ?: Telephony.Sms.MESSAGE_TYPE_INBOX`, and provide a default empty string for a null address. This keeps individual malformed fields from discarding an otherwise-valid record.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesImporter.kt:171-187","code":"  171 |     private fun XmlPullParser.readSms(): SmsBackup {\n  172 |         require(XmlPullParser.START_TAG, null, \"sms\")\n  173 | \n  174 |         return SmsBackup(\n  175 |             subscriptionId = 0,\n  176 |             address = getAttributeValue(null, \"address\"),\n  177 |             body = getAttributeValue(null, \"body\"),\n  178 |             date = getAttributeValue(null, \"date\").toLong(),\n  179 |             dateSent = getAttributeValue(null, \"date\").toLong(),\n  180 |             locked = getAttributeValue(null, \"locked\").toInt(),\n  181 |             protocol = getAttributeValue(null, \"protocol\"),\n  182 |             read = getAttributeValue(null, \"read\").toInt(),\n  183 |             status = getAttributeValue(null, \"status\").toInt(),\n  184 |             type = getAttributeValue(null, \"type\").toInt(),\n  185 |             serviceCenter = getAttributeValue(null, \"service_center\")\n  186 |         )\n  187 |     }","lines":17}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"saveAttachments dereferences resultData.data!! (line 1481) before the null guard on the next line (destinationUri = resultData.data ?: return). If data is null the !! throws NPE before the guard can run. Also the non-tree branch uses pendingAttachmentsToSave!!.first() (line 1498) which throws if pendingAttachmentsToSave is null or empty.","fix":"Guard resultData.data once at the top (val uri = resultData.data ?: return) and use it everywhere; guard pendingAttachmentsToSave for null/empty before .first().","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1480-1498","code":" 1480 |         applicationContext.contentResolver.takePersistableUriPermission(\n 1481 |             resultData.data!!, FLAG_GRANT_READ_URI_PERMISSION or FLAG_GRANT_WRITE_URI_PERMISSION\n 1482 |         )\n 1483 |         val destinationUri = resultData.data ?: return\n 1484 |         ensureBackgroundThread {\n 1485 |             try {\n 1486 |                 if (DocumentsContract.isTreeUri(destinationUri)) {\n 1487 |                     val outputDir = DocumentFile.fromTreeUri(this, destinationUri)\n 1488 |                         ?: return@ensureBackgroundThread\n 1489 |                     pendingAttachmentsToSave?.forEach { attachment ->\n 1490 |                         val documentFile = outputDir.createFile(\n 1491 |                             attachment.mimetype,\n 1492 |                             attachment.filename.takeIf { it.isNotBlank() }\n 1493 |                                 ?: attachment.uriString.getFilenameFromPath()\n 1494 |                         ) ?: return@forEach\n 1495 |                         copyToUri(src = attachment.getUri(), dst = documentFile.uri)\n 1496 |                     }\n 1497 |                 } else {\n 1498 |                     copyToUri(pendingAttachmentsToSave!!.first().getUri(), resultData.data!!)","lines":19}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"AutoCompleteTextViewAdapter.getView calls contact.phoneNumbers.first() with no empty check. A SimpleContact with an empty phoneNumbers list (possible for contacts surfaced by name match in the filter, which only checks doesContainPhoneNumber OR name.contains) throws NoSuchElementException during binding of the dropdown row.","fix":"Use phoneNumbers.firstOrNull()?.normalizedNumber.orEmpty().","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/AutoCompleteTextViewAdapter.kt:42","code":"   42 |                 itemContactNumber.text = contact.phoneNumbers.first().normalizedNumber","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ThreadAdapter received-message photo click does `message.getSender()!!` then `.phoneNumbers.first()`. getSender() can return null (participants empty), and even when non-null phoneNumbers may be empty, so the click handler can throw NPE or NoSuchElementException.","fix":"Null-check getSender() and use phoneNumbers.firstOrNull() before launching the contact lookup.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/ThreadAdapter.kt:419-426","code":"  419 |             threadMessageSenderPhoto.setOnClickListener {\n  420 |                 val contact = message.getSender()!!\n  421 |                 activity.getContactFromAddress(contact.phoneNumbers.first().normalizedNumber) {\n  422 |                     if (it != null) {\n  423 |                         activity.startContactDetailsIntent(it)\n  424 |                     }\n  425 |                 }\n  426 |             }","lines":8}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`getSenderOrReceiverPhoneNumbers()` calls `it.phoneNumbers.first().value` for every participant of an outgoing message. `SimpleContact.phoneNumbers` is a list that can be empty (e.g. a group-conversation participant resolved without a phone number), in which case `first()` throws NoSuchElementException and the Message Details dialog crashes.","fix":"Use `it.phoneNumbers.firstOrNull()?.value.orEmpty()` (or skip participants with no number) instead of `it.phoneNumbers.first().value`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/dialogs/MessageDetailsDialog.kt:47-50","code":"   47 |             participants.joinToString(\", \") {\n   48 |                 formatContactInfo(it.name, it.phoneNumbers.first().value)\n   49 |             }\n   50 |         }","lines":4}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`compressImage` uses several non-null assertions on operations that legitimately return null: `contentResolver.getType(uri)!!` (line 41) and `contentResolver.openInputStream(uri)?.readBytes()!!` (line 43). For an unreadable/unknown URI these throw NPE. They are inside the outer try/catch so the app does not crash, but the catch maps every failure to `callback.invoke(null)`, masking distinct error conditions. More importantly, `openInputStream(uri)?.readBytes()` reads the entire image into memory before compression even begins, defeating the point of compression for very large images and risking OOM.","fix":"Handle null mimeType/stream explicitly and avoid reading the whole file into a byte array; decode bounds first or copy via streams.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/ImageCompressor.kt:39-46","code":"   39 |                 val fileSize = context.getFileSizeFromUri(uri)\n   40 |                 if (fileSize > compressSize) {\n   41 |                     val mimeType = contentResolver.getType(uri)!!\n   42 |                     if (mimeType.isImageMimeType()) {\n   43 |                         val byteArray = contentResolver.openInputStream(uri)?.readBytes()!!\n   44 |                         var imageFile = File(outputDirectory, System.currentTimeMillis().toString().plus(mimeType.getExtensionFromMimeType()))\n   45 |                         imageFile.writeBytes(byteArray)\n   46 |                         val bitmap = loadBitmap(imageFile)","lines":8}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"XmlPullParser.readSms() parses several attributes with non-null `toLong()`/`toInt()` on the result of `getAttributeValue(...)`. If any of the attributes (`date`, `locked`, `read`, `status`, `type`) is missing the value is null and `.toLong()`/`.toInt()` throws NPE, and if present but non-numeric it throws NumberFormatException. These construct the SmsBackup model from arbitrary external XML. The per-`<sms>` try/catch in importXml catches it (counting it as failed), so it is not fatal, but malformed input silently drops every affected message rather than handling it gracefully.","fix":"Use null-safe parsing with defaults, e.g. `getAttributeValue(null, \"date\")?.toLongOrNull() ?: 0L` and `...?.toIntOrNull() ?: 0`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesImporter.kt:174-186","code":"  174 |         return SmsBackup(\n  175 |             subscriptionId = 0,\n  176 |             address = getAttributeValue(null, \"address\"),\n  177 |             body = getAttributeValue(null, \"body\"),\n  178 |             date = getAttributeValue(null, \"date\").toLong(),\n  179 |             dateSent = getAttributeValue(null, \"date\").toLong(),\n  180 |             locked = getAttributeValue(null, \"locked\").toInt(),\n  181 |             protocol = getAttributeValue(null, \"protocol\"),\n  182 |             read = getAttributeValue(null, \"read\").toInt(),\n  183 |             status = getAttributeValue(null, \"status\").toInt(),\n  184 |             type = getAttributeValue(null, \"type\").toInt(),\n  185 |             serviceCenter = getAttributeValue(null, \"service_center\")\n  186 |         )","lines":13}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"MmsReceiver.handleMmsMessage dereferences `mms.attachment!!.attachments.first()` with a not-null assertion on attachment and `.first()` on the attachments list. A received MMS with no attachment (e.g. text-only MMS, or a notification-only / undownloaded MMS) makes attachment null (NPE) or the attachments list empty (NoSuchElementException). Although the Glide block is wrapped in try/catch (only catching Exception around the .get()), the `mms.attachment!!` and `.first()` evaluation happen inside building the load() argument and would be caught here, but the resulting null bitmap path is fine - the real risk is the attachment!! assertion when attachment is genuinely null.","fix":"Use safe access: `mms.attachment?.attachments?.firstOrNull()?.getUri()` and skip the Glide load when null.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/MmsReceiver.kt:63-72","code":"   63 |         val glideBitmap = try {\n   64 |             Glide.with(context)\n   65 |                 .asBitmap()\n   66 |                 .load(mms.attachment!!.attachments.first().getUri())\n   67 |                 .centerCrop()\n   68 |                 .into(size, size)\n   69 |                 .get()\n   70 |         } catch (e: Exception) {\n   71 |             null\n   72 |         }","lines":10}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In both SmsStatusSentReceiver.updateAppDatabase and SmsStatusDeliveredReceiver.updateAppDatabase, the message id is parsed with `messageUri.lastPathSegment?.toLong() ?: 0L`. String.toLong() throws NumberFormatException if the last path segment is not a valid number. The send/delivery status intent's data URI is constructed in SmsSender as `Uri.parse(\"${Sms.CONTENT_URI}/${messageId}\")`, so normally it is numeric, but any malformed/unexpected URI (or a content URI whose last segment is not the id) will crash the receiver. The `?: 0L` only guards a null segment, not a non-numeric one. Use toLongOrNull().","fix":"Use `messageUri.lastPathSegment?.toLongOrNull() ?: 0L` (and ideally skip processing when 0L).","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/SmsStatusSentReceiver.kt:44-46","code":"   44 |         val messageUri = intent.data\n   45 |         if (messageUri != null) {\n   46 |             val messageId = messageUri.lastPathSegment?.toLong() ?: 0L","lines":3},{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/SmsStatusDeliveredReceiver.kt:89-91","code":"   89 |         val messageUri: Uri? = intent.data\n   90 |         if (messageUri != null) {\n   91 |             val messageId = messageUri.lastPathSegment?.toLong() \n  290 | \n  291 |         DeleteConfirmationDialog(activity, question, activity.config.useRecycleBin && !isRecycleBin) { skipRecycleBin ->\n  292 |             ensureBackgroundThread {\n  293 |                 val messagesToRemove = getSelectedItems()\n  294 |                 if (messagesToRemove.isNotEmpty()) {\n  295 |                     val toRecycleBin = !skipRecycleBin && activity.config.useRecycleBin && !isRecycleBin\n  296 |                     deleteMessages(messagesToRemove.filterIsInstance<Message>(), toRecycleBin, false)\n  297 |                 }\n  298 |             }\n  299 |         }\n  300 |     }","lines":28},{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/ThreadAdapter.kt:302-324","code":"  302 |     private fun askConfirmRestore() {\n  303 |         val itemsCnt = selectedKeys.size\n  304 | \n  305 |         // not sure how we can get UnknownFormatConversionException here, so show the error and hope that someone reports it\n  306 |         val items = try {\n  307 |             resources.getQuantityString(R.plurals.delete_messages, itemsCnt, itemsCnt)\n  308 |         } catch (e: Exception) {\n  309 |             activity.showErrorToast(e)\n  310 |             return\n  311 |         }\n  312 | \n  313 |         val baseString = R.string.restore_confirmation\n  314 |         val question = String.format(resources.getString(baseString), items)\n  315 | \n  316 |         ConfirmationDialog(activity, question) {\n  317 |             ensureBackgroundThread {\n  318 |                 val messagesToRestore = getSelectedItems()\n  319 |                 if (messagesToRestore.isNotEmpty()) {\n  320 |                     deleteMessages(messagesToRestore.filterIsInstance<Message>(), false, true)\n  321 |                 }\n  322 |             }\n  323 |         }\n  324 |     }","lines":23}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"getSelectedItems() selects any item whose `(it as? Message)?.getSelectionKey() ?: 0` is contained in selectedKeys. The fallback `?: 0` means: if selectedKeys ever contains 0 (a legitimate selection key, e.g. a Message whose getSelectionKey() computes to 0), every non-Message item (ThreadDateTime/ThreadError/ThreadSending/ThreadSent) in the list would also be treated as selected. The downstream filterIsInstance<Message>() masks the worst effects, but selectedKeys.size based counts (askConfirmDelete itemsCnt) and selection state become wrong.","fix":"Only test the key for actual Message items, e.g. filter { it is Message && selectedKeys.contains(it.getSelectionKey()) }, avoiding the `?: 0` collision.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/ThreadAdapter.kt:341-345","code":"  341 |     private fun getSelectedItems(): ArrayList<ThreadItem> {\n  342 |         return currentList.filter {\n  343 |             selectedKeys.contains((it as? Message)?.getSelectionKey() ?: 0)\n  344 |         } as ArrayList<ThreadItem>\n  345 |     }","lines":5}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The Room database is built with both `fallbackToDestructiveMigration()` and an explicit migration chain. `fallbackToDestructiveMigration()` means that if any migration is missing or fails (or for any future version with no path), Room silently DROPS all tables and recreates them, destroying the user's locally cached conversations/messages/recycle-bin/drafts. This masks migration bugs as silent data loss rather than a hard failure during development.","fix":"Remove fallbackToDestructiveMigration() (or restrict it) so that a missing migration fails loudly instead of wiping user data, given all migrations 1..10 are already provided.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/databases/MessagesDatabase.kt:55-70","code":"   55 |                         db = Room.databaseBuilder(\n   56 |                             context = context.applicationContext,\n   57 |                             klass = MessagesDatabase::class.java,\n   58 |                             name = \"conversations.db\"\n   59 |                         )\n   60 |                             .fallbackToDestructiveMigration()\n   61 |                             .addMigrations(MIGRATION_1_2)\n   62 |                             .addMigrations(MIGRATION_2_3)\n   63 |                             .addMigrations(MIGRATION_3_4)\n   64 |                             .addMigrations(MIGRATION_4_5)\n   65 |                             .addMigrations(MIGRATION_5_6)\n   66 |                             .addMigrations(MIGRATION_6_7)\n   67 |                             .addMigrations(MIGRATION_7_8)\n   68 |                             .addMigrations(MIGRATION_8_9)\n   69 |                             .addMigrations(MIGRATION_9_10)\n   70 |                             .build()","lines":16}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ManageBlockedKeywordsAdapter uses `blockedKeyword.hashCode()` of the String as the selection key. Two distinct blocked keywords with colliding String hashCodes (or, more practically, duplicate keyword strings) map to the same selection key. The overflow-menu path executeItemMenuOperation adds/removes that hashCode in selectedKeys and getSelectedItems() returns blockedKeywords.filter { selectedKeys.contains(it.hashCode()) } - so a popup action on one keyword would act on ALL keywords sharing that hashCode (e.g. duplicates), and copy/delete operate on the wrong/extra items.","fix":"Key selection by stable position/index or a unique id rather than String.hashCode(); deduplicate keywords on input.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/dialogs/ManageBlockedKeywordsAdapter.kt:48-50","code":"   48 |     override fun getItemSelectionKey(position: Int) = blockedKeywords.getOrNull(position)?.hashCode()\n   49 | \n   50 |     override fun getItemKeyPosition(key: Int) = blockedKeywords.indexOfFirst { it.hashCode() == key }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/messages/dialogs/ManageBlockedKeywordsAdapter.kt:71","code":"   71 |     private fun getSelectedItems() = blockedKeywords.filter { selectedKeys.contains(it.hashCode()) }","lines":1},{"ref":"app/src/main/kotlin/org/fossify/messages/dialogs/ManageBlockedKeywordsAdapter.kt:121-131","code":"  121 |     private fun executeItemMenuOperation(blockedKeywordId: Int, callback: () -> Unit) {\n  122 |         selectedKeys.add(blockedKeywordId)\n  123 |         callback()\n  124 |         selectedKeys.remove(blockedKeywordId)\n  125 |     }\n  126 | \n  127 |     private fun copyKeywordToClipboard() {\n  128 |         val selectedKeyword = getSelectedItems().firstOrNull() ?: return\n  129 |         activity.copyToClipboard(selectedKeyword)\n  130 |         finishActMode()\n  131 |     }","lines":11}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Inconsistent date units passed from getMessages to getMMS. getMessages receives dateFrom in seconds and uses `dateFrom.toLong() * 1000` for the SMS query (line 133), but then passes the same raw `dateFrom` (seconds) to getMMS (line 197). getMMS treats dateFrom as MMS-native units with no scaling (lines 240/245, with a comment explicitly saying not to multiply by 1000). Since MMS DATE is in seconds this happens to line up, but the SMS and MMS paths are using two different interpretations of the same `dateFrom` argument, which is fragile and undocumented at the call site.","fix":"Document the unit contract of dateFrom explicitly, and make both paths derive their threshold from a single clearly-named seconds/millis value rather than two inline conversions.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:133-197","code":"  133 |     val rangeQuery = if (dateFrom == -1) \"\" el C_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"getThreadSnippet compares SMS DATE against the MMS date with mismatched units. The SMS query uses `${Sms.DATE} > ?` with selectionArgs containing `latestMms?.date?.toString()`. SMS DATE is stored in milliseconds, but Message.date (and thus latestMms.date) is the MMS date which getMMS stores in seconds (line 254, `getLongValue(Mms.DATE).toInt()` with no /1000). So the threshold is ~1000x too small and effectively always matches, meaning the SMS body almost always overrides the MMS snippet regardless of which is actually newer.","fix":"Normalize both to the same unit before comparing (convert the MMS seconds value to milliseconds for the SMS DATE comparison, or compare both in seconds), then pick the newer of the two snippets.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:566-591","code":"  566 | fun Context.getThreadSnippet(threadId: Long): String {\n  567 |     val sortOrder = \"${Mms.DATE} DESC LIMIT 1\"\n  568 |     val latestMms = getMMS(threadId, sortOrder).firstOrNull()\n  569 |     var snippet = latestMms?.body ?: \"\"\n  570 | \n  571 |     val uri = Sms.CONTENT_URI\n  572 |     val projection = arrayOf(\n  573 |         Sms.BODY\n  574 |     )\n  575 | \n  576 |     val selection = \"${Sms.THREAD_ID} = ? AND ${Sms.DATE} > ?\"\n  577 |     val selectionArgs = arrayOf(\n  578 |         threadId.toString(),\n  579 |         latestMms?.date?.toString() ?: \"0\"\n  580 |     )\n  581 |     try {\n  582 |         val cursor = contentResolver.query(uri, projection, selection, selectionArgs, sortOrder)\n  583 |         cursor?.use {\n  584 |             if (cursor.moveToFirst()) {\n  585 |                 snippet = cursor.getStringValue(Sms.BODY)\n  586 |             }\n  587 |         }\n  588 |     } catch (_: Exception) {\n  589 |     }\n  590 |     return snippet\n  591 | }","lines":26}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`generateRandomId` seeds a new `Random(millis)` with the current epoch millis on every call. Two calls within the same millisecond (e.g. queueing several scheduled messages or failure notifications in a tight loop) produce the same seed and therefore the same \"random\" id, causing id collisions for scheduled messages / notification ids. Seeding Random with a wall-clock value defeats the purpose of randomness.","fix":"Use a shared `Random` instance (or `Random.Default` / `SecureRandom`) instead of re-seeding from `millis` each call.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/Constants.kt:111-116","code":"  111 | /** Not to be used with real messages persisted in the telephony db. This is for internal use only (e.g. scheduled messages, notification ids etc). */\n  112 | fun generateRandomId(length: Int = 9): Long {\n  113 |     val millis = DateTime.now(DateTimeZone.UTC).millis\n  114 |     val random = abs(Random(millis).nextLong())\n  115 |     return random.toString().takeLast(length).toLong()\n  116 | }","lines":6}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The Android 14 subscriptionId workaround (resetting `subscriptionId = -1` so messages import on devices with a different SIM, see #191) is applied only in the JSON import path (`importJson`). The XML import path (`readSms`) always hard-codes `subscriptionId = 0` and never applies the isUpsideDownCakePlus() reset. XML-imported messages on Android 14+ can therefore hit the same import failure the workaround was meant to fix.","fix":"Apply the same subscriptionId normalization for XML-imported messages, or set subscriptionId to -1 in readSms when isUpsideDownCakePlus().","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesImporter.kt:60-71","code":"   60 |             val messages = if (isUpsideDownCakePlus()) {\n   61 |                 deserializedList.map { message ->\n   62 |                     // workaround for messages not being imported on Android 14 when the device\n   63 |                     // has a different subscriptionId (see #191)\n   64 |                     when (message) {\n   65 |                         is SmsBackup -> message.copy(subscriptionId = -1)\n   66 |                         is MmsBackup -> message.copy(subscriptionId = -1)\n   67 |                     }\n   68 |                 }\n   69 |             } else {\n   70 |                 deserializedList\n   71 |             }","lines":12},{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesImporter.kt:174-186","code":"  174 |         return SmsBackup(\n  175 |             subscriptionId = 0,\n  176 |             address = getAttributeValue(null, \"address\"),\n  177 |             body = getAttributeValue(null, \"body\"),\n  178 |             date = getAttributeValue(null, \"date\").toLong(),\n  179 |             dateSent = getAttributeValue(null, \"date\").toLong(),\n  180 |             locked = getAttributeValue(null, \"locked\").toInt(),\n  181 |             protocol = getAttributeValue(null, \"protocol\"),\n  182 |             read = getAttributeValue(null, \"read\").toInt(),\n  183 |             status = getAttributeValue(null, \"status\").toInt(),\n  184 |             type = getAttributeValue(null, \"type\").toInt(),\n  185 |             serviceCenter = getAttributeValue(null, \"service_center\")\n  186 |         )","lines":13}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"MmsReceiver.onMessageReceived calls context.getLatestMMS() to obtain the just-received MMS, then processes it. This is a TOCTOU / wrong-message hazard: getLatestMMS returns whatever is currently the newest MMS row, not necessarily the one identified by the passed-in `messageUri`. If two MMS arrive close together, or an outgoing MMS is persisted in between, the notification/conversation update can be built from the wrong message. The messageUri parameter that precisely identifies the received message is ignored.","fix":"Resolve the MMS from the provided messageUri instead of querying the globally-latest MMS.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/MmsReceiver.kt:44-51","code":"   44 |     override fun onMessageReceived(context: Context, messageUri: Uri) {\n   45 |         val mms = context.getLatestMMS() ?: return\n   46 |         val address = mms.getSender()?.phoneNumbers?.firstOrNull()?.normalizedNumber ?: \"\"\n   47 |         val size = context.resources.getDimension(R.dimen.notification_large_icon_size).toInt()\n   48 |         ensureBackgroundThread {\n   49 |             handleMmsMessage(context, mms, size, address)\n   50 |         }\n   51 |     }","lines":8}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ScheduledMessageReceiver.handleIntent dispatches the actual send onto the main thread via Handler(Looper.getMainLooper()).post { sendMessageCompat(...) }, then immediately proceeds to delete the scheduled message/conversation and refresh, all OUTSIDE that posted block. The deletion therefore runs before (and independently of) the send actually executing, and the try/catch surrounding the block cannot catch exceptions thrown by sendMessageCompat (they occur later on the main thread). If the send fails, the scheduled message has already been deleted, so it is lost with no failed-status record. Posting a blocking send to the main thread is also questionable since the receiver is already on a background thread (ensureBackgroundThread) holding a wakelock.","fix":"Call sendMessageCompat directly on the background thread (no main-thread post), and only delete the scheduled message/conversation after a successful send, so failures are catchable and the message is not lost.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/ScheduledMessageReceiver.kt:60-77","code":"   60 |         try {\n   61 |             Handler(Looper.getMainLooper()).post {\n   62 |                 context.sendMessageCompat(message.body, addresses, message.subscriptionId, attachments)\n   63 |             }\n   64 | \n   65 |             // delete temporary conversation and message as it's already persisted to the telephony db now\n   66 |             context.deleteScheduledMessage(messageId)\n   67 |             context.conversationsDB.deleteThreadId(messageId)\n   68 |             refreshMessages()\n   69 |             refreshConversations()\n   70 |         } catch (e: Exception) {\n   71 |             context.showErrorToast(e)\n   72 |         } catch (e: Error) {\n   73 |             context.showErrorToast(\n   74 |                 e.localizedMessage ?: context.getString(org.fossify.commons.R.string.unknown_error_occurred)\n   75 |             )\n   76 |         }\n   77 |     }","lines":18}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"participants is a lateinit var assigned only inside the background thread in onCreate. If the\nbackground work has not completed (or the activity is recreated and onResume runs before the\nbackground block finishes), any code path reaching setupParticipants before assignment would\nthrow UninitializedPropertyAccessException. setupParticipants is only called from inside the\nsame background continuation so it is currently safe, but the lateinit + background assignment\nis fragile.","fix":"Initialize participants to an empty ArrayList by default instead of lateinit, so any\nunexpected early access degrades gracefully.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ConversationDetailsActivity.kt:41-69","code":"   41 |     private lateinit var participants: ArrayList<SimpleContact>\n   42 | \n   43 |     private val binding by viewBinding(ActivityConversationDetailsBinding::inflate)\n   44 | \n   45 |     override fun onCreate(savedInstanceState: Bundle?) {\n   46 |         super.onCreate(savedInstanceState)\n   47 |         setContentView(binding.root)\n   48 | \n   49 |         setupEdgeToEdge(padBottomSystem = listOf(binding.conversationDetailsNestedScrollview))\n   50 |         setupMaterialScrollListener(\n   51 |             scrollingView = binding.conversationDetailsNestedScrollview,\n   52 |             topAppBar = binding.conversationDetailsAppbar,\n   53 |         )\n   54 | \n   55 |         threadId = intent.getLongExtra(THREAD_ID, 0L)\n   56 |         ensureBackgroundThread {\n   57 |             conversation = conversationsDB.getConversationWithThreadId(threadId)\n   58 |             participants = if (conversation != null && conversation!!.isScheduled) {\n   59 |                 val message = messagesDB.getThreadMessages(conversation!!.threadId).firstOrNull()\n   60 |                 message?.participants ?: arrayListOf()\n   61 |             } else {\n   62 |                 getThreadParticipants(threadId, null)\n   63 |             }\n   64 |             runOnUiThread {\n   65 |                 setupTextViews()\n   66 |                 setupParticipants()\n   67 |                 setupCustomNotifications()\n   68 |             }\n   69 |         }","lines":29}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In setupConversations, sortedConversations is recomputed and passed to updateConversations,\nbut the cached-first-run progress logic uses conversations.isEmpty() while the placeholder\ncallback uses currentList.isEmpty(). The progress vs placeholder decision relies on\nconfig.appRunCount == 1 which is only true for the very first run; on later runs with an\nempty DB and slow telephony load the user sees the 'no conversations found' placeholder\nimmediately instead of a loading state, which can look like data loss.","fix":"S nchecked cast is not guaranteed by contract and the same unchecked cast\npattern is repeated for conversationsDB results (e.g. getNonArchived() as\nArrayList<Conversation>). If the DAO ever returns a non-ArrayList List, this throws\nClassCastException.","fix":"Use ArrayList(list) to construct a concrete ArrayList instead of casting, or change the\nfunction signatures to accept List<Conversation>.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/MainActivity.kt:402-411","code":"  402 |     private fun setupConversations(\n  403 |         conversations: ArrayList<Conversation>,\n  404 |         cached: Boolean = false,\n  405 |     ) {\n  406 |         val sortedConversations = conversations\n  407 |             .sortedWith(\n  408 |                 compareByDescending<Conversation> {\n  409 |                     config.pinnedConversations.contains(it.threadId.toString())\n  410 |                 }.thenByDescending { it.date }\n  411 |             ).toMutableList() as ArrayList<Conversation>","lines":10},{"ref":"app/src/main/kotlin/org/fossify/messages/activities/MainActivity.kt:289-313","code":"  289 |     private fun getCachedConversations() {\n  290 |         ensureBackgroundThread {\n  291 |             val conversations = try {\n  292 |                 conversationsDB.getNonArchived().toMutableList() as ArrayList<Conversation>\n  293 |             } catch (_: Exception) {\n  294 |                 ArrayList()\n  295 |             }\n  296 | \n  297 |             val archived = try {\n  298 |                 conversationsDB.getAllArchived()\n  299 |             } catch (_: Exception) {\n  300 |                 listOf()\n  301 |             }\n  302 | \n  303 |             runOnUiThread {\n  304 |                 setupConversations(conversations, cached = true)\n  305 |                 getNewConversations(\n  306 |                     (conversations + archived).toMutableList() as ArrayList<Conversation>\n  307 |                 )\n  308 | tries_for_exporting)\n  162 |             } else {\n  163 |                 BlockedKeywordsExporter.exportBlockedKeywords(blockedKeywords, outputStream) {\n  164 |                     toast(\n  165 |                         when (it) {\n  166 |                             ExportResult.EXPORT_OK -> org.fossify.commons.R.string.exporting_successful\n  167 |                             else -> org.fossify.commons.R.string.exporting_failed\n  168 |                         }\n  169 |                     )\n  170 |                 }\n  171 |             }\n  172 |         }\n  173 |     }","lines":17}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"tryExportBlockedNumbers (method name says 'Numbers') actually exports blocked keywords. The\nmisnomer is a copy-paste leftover from the blocked-numbers feature and is misleading for\nmaintainers.","fix":"Rename to tryExportBlockedKeywords for clarity.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ManageBlockedKeywordsActivity.kt:175-192","code":"  175 |     private fun tryExportBlockedNumbers() {\n  176 |         ExportBlockedKeywordsDialog(\n  177 |             activity = this,\n  178 |             path = config.lastBlockedKeywordExportPath,\n  179 |             hidePath = true\n  180 |         ) { file ->\n  181 |             try {\n  182 |                 createDocument.launch(file.name)\n  183 |             } catch (_: ActivityNotFoundException) {\n  184 |                 toast(\n  185 |                     org.fossify.commons.R.string.system_service_disabled,\n  186 |                     Toast.LENGTH_LONG\n  187 |                 )\n  188 |             } catch (e: Exception) {\n  189 |                 showErrorToast(e)\n  190 |             }\n  191 |         }\n  192 |     }","lines":18}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The 'use English' toggle calls exitProcess(0) immediately after persisting config.useEnglish.\nForce-killing the process is a heavy-handed way to apply a locale change and bypasses normal\nactivity teardown; any pending writes (e.g. SharedPreferences applied asynchronously) may be\nfine here because config uses commit, but abruptly killing the process is poor UX and can\nlose other unsaved state in the app.","fix":"Recreate the activity/task or use AppCompatDelegate locale APIs instead of exitProcess(0),\nor at minimum restart the launcher activity rather than killing the process.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/SettingsActivity.kt:178-189","code":"  178 |     private fun setupUseEnglish() = binding.apply {\n  179 |         settingsUseEnglishHolder.beVisibleIf(\n  180 |             (config.wasUseEnglishToggled || Locale.getDefault().language != \"en\")\n  181 |                     && !isTiramisuPlus()\n  182 |         )\n  183 |         settingsUseEnglish.isChecked = config.useEnglish\n  184 |         settingsUseEnglishHolder.setOnClickListener {\n  185 |             settingsUseEnglish.toggle()\n  186 |             config.useEnglish = settingsUseEnglish.isChecked\n  187 |             exitProcess(0)\n  188 |         }\n  189 |     }","lines":12}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"setupSIMSelector appends discovered SIMs into the activity-level availableSIMCards list without clearing it first (line 1026). setupSIMSelector is called from setupCachedMessages, setupThread, and refreshMessages, so on each refresh the same SIM cards are appended again, duplicating entries and breaking the modulo cycling in the click handler (currentSIMCardIndex = (currentSIMCardIndex + 1) % availableSIMCards.size) and the sim-id label shown.","fix":"Call availableSIMCards.clear() at the start of setupSIMSelector before repopulating.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1019-1027","code":" 1019 |         if (availableSIMs.size > 1) {\n 1020 |             availableSIMs.forEachIndexed { index, subscriptionInfo ->\n 1021 |                 var label = subscriptionInfo.displayName?.toString() ?: \"\"\n 1022 |                 if (subscriptionInfo.number?.isNotEmpty() == true) {\n 1023 |                     label += \" (${subscriptionInfo.number})\"\n 1024 |                 }\n 1025 |                 val simCard = SIMCard(index + 1, subscriptionInfo.subscriptionId, label)\n 1026 |                 availableSIMCards.add(simCard)\n 1027 |             }","lines":9},{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1045-1057","code":" 1045 |             if (availableSIMCards.isNotEmpty()) {\n 1046 |                 binding.messageHolder.threadSelectSimIcon.setOnClickListener {\n 1047 |                     currentSIMCardIndex = (currentSIMCardIndex + 1) % availableSIMCards.size\n 1048 |                     val currentSIMCard = availableSIMCards[currentSIMCardIndex]\n 1049 |                     @SuppressLint(\"SetTextI18n\")\n 1050 |                     binding.messageHolder.threadSelectSimNumber.text = currentSIMCard.id.toString()\n 1051 |                     val currentSubscriptionId = currentSIMCard.subscriptionId\n 1052 |                     numbers.forEach {\n 1053 |                         config.saveUseSIMIdAtNumber(it, currentSubscriptionId)\n 1054 |                     }\n 1055 |                     toast(currentSIMCard.label)\n 1056 |                 }\n 1057 |             }","lines":13}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"copyNumberToClipboard uses conversation?.phoneNumber?.ifEmpty { ... } ?: return. If conversation is null the whole expression returns early (nothing copied) even though a participant phone number may be available; the participant fallback only fires when conversation is non-null but its phoneNumber is empty. The menu item visibility (copy_number) is gated on participants, not conversation, so a null conversation with valid participants yields a silent no-op.","fix":"Fall back to the participant number when conversation is null: (conversation?.phoneNumber?.ifEmpty { null }) ?: participants.firstOrNull()?.phoneNumbers?.firstOrNull()?.value ?: return.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1179-1184","code":" 1179 |     private fun copyNumberToClipboard() {\n 1180 |         val phoneNumber = conversation?.phoneNumber\n 1181 |             ?.ifEmpty { participants.firstOrNull()?.phoneNumbers?.firstOrNull()?.value }\n 1182 |             ?: return\n 1183 |         copyToClipboard(phoneNumber)\n 1184 |     }","lines":6}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"sendNormalMessage shadows the member `messages` with a local val messages = getMessages(...) (line 1597) used only for the filter, then calls insertOrUpdateMessage(message) which mutates the member `messages`. The reuse of the same name for a local that captures the member in its own filterNotInByKey(messages) is confusing and brittle: the local list is computed from the member at that instant, but readers can easily misattribute which `messages` is meant.","fix":"Rename the local (e.g. newMessages) to avoid shadowing the member field.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1596-1602","code":" 1596 |             ensureBackgroundThread {\n 1597 |                 val messages = getMessages(threadId, limit = maxOf(1, attachments.size))\n 1598 |                     .filterNotInByKey(messages) { it.getStableId() }\n 1599 |                 for (message in messages) {\n 1600 |                     insertOrUpdateMessage(message)\n 1601 |                 }\n 1602 |             }","lines":7}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"fixParticipantNumbers rebuilds each participant's phoneNumbers list once per number in properNumbers (nested loop, lines 1722-1735). On the second and later iterations the previously-matched-and-replaced numbers are reset back to plain PhoneNumber(it.normalizedNumber,...) in the else branch, so with multiple properNumbers earlier replacements (including the name fix) can be undone, keeping only the match for the last processed number.","fix":"Iterate participants once and, per phone number, match against the whole properNumbers set, replacing in place without overwriting prior matches.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1718-1739","code":" 1718 |     private fun fixParticipantNumbers(\n 1719 |         participants: ArrayList<SimpleContact>,\n 1720 |         properNumbers: ArrayList<String>,\n 1721 |     ): ArrayList<SimpleContact> {\n 1722 |         for (number in properNumbers) {\n 1723 |             for (participant in participants) {\n 1724 |                 participant.phoneNumbers = participant.phoneNumbers.map {\n 1725 |                     val numberWithoutPlus = number.replace(\"+\", \"\")\n 1726 |                     if (numberWithoutPlus == it.normalizedNumber.trim()) {\n 1727 |                         if (participant.name == it.normalizedNumber) {\n 1728 |                             participant.name = number\n 1729 |                         }\n 1730 |                         PhoneNumber(number, 0, \"\", number)\n 1731 |                     } else {\n 1732 |                         PhoneNumber(it.normalizedNumber, 0, \"\", it.normalizedNumber)\n 1733 |                     }\n 1734 |                 } as ArrayList<PhoneNumber>\n 1735 |             }\n 1736 |         }\n 1737 | \n 1738 |         return participants\n 1739 |     }","lines":22}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"AttachmentsAdapter performs image compression inside setupMediaPreview (called from onBindViewHolder). It mutates the shared `attachments` list (attachments.find { it.uri == ... }?.isPending = false, attachments.remove/addAttachment) from the Glide/compression callback. Because binding happens per scroll and the callback resolves asynchronously, a recycled holder can complete compression for an item that has since been removed or rebound, and addAttachment(copy(...)) re-submits the list mid-bind, risking duplicate/lost entries and 'cannot call submitList during layout' style inconsistencies.","fix":"Drive compression from the data layer (ViewModel) not from onBindViewHolder; key the result back to the attachment by identity and only mutate the list when the item still exists, off the bind path.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/AttachmentsAdapter.kt:121-170","code":"  121 |     private fun setupMediaPreview(binding: ItemAttachmentMediaPreviewBinding, attachment: AttachmentSelection) {\n  122 |         binding.apply {\n  123 |             mediaAttachmentHolder.background.applyColorFilter(primaryColor.darkenColor())\n  124 |             mediaAttachmentHolder.setOnClickListener {\n  125 |                 activity.launchViewIntent(attachment.uri, attachment.mimetype, attachment.filename)\n  126 |             }\n  127 | \n  128 |             removeAttachmentButtonHolder.removeAttachmentButton.apply {\n  129 |                 beVisible()\n  130 |                 background.applyColorFilter(primaryColor)\n  131 |                 setOnClickListener {\n  132 |                     removeAttachment(attachment)\n  133 |                 }\n  134 |             }\n  135 | \n  136 |             val compressImage = attachment.mimetype.isImageMimeType() && !attachment.mimetype.isGifMimeType()\n  137 |             if (compressImage && attachment.isPending && config.mmsFileSizeLimit != FILE_SIZE_NONE) {\n  138 |                 thumbnail.beGone()\n  139 |                 compressionProgress.beVisible()\n  140 | \n  141 |                 imageCompressor.compressImage(attachment.uri, config.mmsFileSizeLimit) { compressedUri ->\n  142 |                     activity.runOnUiThread {\n  143 |                         when (compressedUri) {\n  144 |                             attachment.uri -> {\n  145 |                                 attachments.find { it.uri == attachment.uri }?.isPending = false\n  146 |                                 loadMediaPreview(this, attachment)\n  147 |                             }\n  148 | \n  149 |                             null -> {\n  150 |                                 activity.toast(R.string.compress_error)\n  151 |                                 removeAttachment(attachment)\n  152 |                             }\n  153 | \n  154 |                             else -> {\n  155 |                                 attachments.remove(attachment)\n  156 |                                 addAttachment(attachment.copy(uri = compressedUri, isPending = false))\n  157 |                             }\n  158 |                         }\n  159 |                         onReady()\n  160 |                     }\n  161 |                 }\n  162 |             } else {\n  163 |                 if (attachment.isPending) {\n  164 |                     attachments.find { it.uri == attachment.uri }?.isPending = false\n  165 |                     onReady()\n  166 |                 }\n  167 |                 loadMediaPreview(this, attachment)\n  168 |             }\n  169 |         }\n  170 |     }","lines":50}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"SearchResultsAdapter.updateItems decides whether to refresh by comparing ArrayList.hashCode() of old vs new results. Two different result lists can share a hashCode (or, conversely, equal-content lists differing only in highlight handled separately), so a genuinely changed result set with a colliding hashCode would not refresh. ContactsAdapter.updateContacts has the same hashCode-equality pattern.","fix":"Compare lists with structural equality (newItems != searchResults) or use DiffUtil/ListAdapter instead of hashCode comparison + notifyDataSetChanged.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/SearchResultsAdapter.kt:57-66","code":"   57 |     fun updateItems(newItems: ArrayList<SearchResult>, highlightText: String = \"\") {\n   58 |         if (newItems.hashCode() != searchResults.hashCode()) {\n   59 |             searchResults = newItems.clone() as ArrayList<SearchResult>\n   60 |             textToHighlight = highlightText\n   61 |             notifyDataSetChanged()\n   62 |         } else if (textToHighlight != highlightText) {\n   63 |             textToHighlight = highlightText\n   64 |             notifyDataSetChanged()\n   65 |         }\n   66 |     }","lines":10},{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/ContactsAdapter.kt:55-62","code":"   55 |     fun updateContacts(newContacts: ArrayList<SimpleContact>) {\n   56 |         val oldHashCode = contacts.hashCode()\n   57 |         val newHashCode = newContacts.hashCode()\n   58 |         if (newHashCode != oldHashCode) {\n   59 |             contacts = newContacts\n   60 |             notifyDataSetChanged()\n   61 |         }\n   62 |     }","lines":8}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"DiffUtil callbacks compare classes with `oldItem::class.java != newItem::class.java`. For Message (a Room data class) and the ThreadItem subclasses this is fine, but areContentsTheSame for ThreadSending returns `true` unconditionally - two different ThreadSending items (different messageId) that pass areItemsTheSame because messageId matched will never report a content change. That is acceptable for a static 'sending' row but means any future field on ThreadSending will silently never trigger a rebind.","fix":"If ThreadSending gains state, compare it; otherwise leave a comment that the row is intentionally static.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/ThreadAdapter.kt:656-665","code":"  656 |     override fun areContentsTheSame(oldItem: ThreadItem, newItem: ThreadItem): Boolean {\n  657 |         if (oldItem::class.java != newItem::class.java) return false\n  658 |         return when (oldItem) {\n  659 |             is ThreadSending -> true\n  660 |             is ThreadDateTime -> oldItem.simID == (newItem as ThreadDateTime).simID\n  661 |             is ThreadError -> oldItem.messageText == (newItem as ThreadError).messageText\n  662 |             is ThreadSent -> oldItem.delivered == (newItem as ThreadSent).delivered\n  663 |             is Message -> Message.areContentsTheSame(oldItem, newItem as Message)\n  664 |         }\n  665 |     }","lines":10}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ManageBlockedKeywordsAdapter uses `String.hashCode()` as the stable selection key for each keyword (getItemSelectionKey, getItemKeyPosition, selectedKeys membership checks, getSelectedItems). Two distinct keywords that hash-collide would share a selection key, causing the wrong row(s) to be selected/copied/deleted. getItemKeyPosition also returns the first matching index, so duplicate-hash keywords map to a single position.","fix":"Use a stable unique key (e.g. the item's index/position, or a generated id stored alongside each keyword) instead of String.hashCode().","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/dialogs/ManageBlockedKeywordsAdapter.kt:48-50","code":"   48 |     override fun getItemSelectionKey(position: Int) = blockedKeywords.getOrNull(position)?.hashCode()\n   49 | \n   50 |     override fun getItemKeyPosition(key: Int) = blockedKeywords.indexOfFirst { it.hashCode() == key }","lines":3},{"ref":"app/src/main/ko
