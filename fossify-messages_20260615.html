essagingCache.participantsCache keyed by threadId. The post-loop population of contactsMap by rawId is redundant with the work already done inside getThreadParticipants for cached threads, and for SMS-derived participants (rawId 0 in some paths) could collide on key 0.","fix":"Rely on getThreadParticipants' own caching, or ensure contactsMap is only populated with genuinely unique rawIds; avoid keying on rawId 0.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:259-296","code":"  259 |         val participants = getThreadParticipants(threadId, contactsMap)\n  260 | \n  261 |         val isMMS = true\n  262 |         val attachment = getMmsAttachment(mmsId)\n  263 |         val body = attachment.text\n  264 |         var senderNumber = \"\"\n  265 |         var senderName = \"\"\n  266 |         var senderPhotoUri = \"\"\n  267 | \n  268 |         if (type != Mms.MESSAGE_BOX_SENT && type != Mms.MESSAGE_BOX_FAILED) {\n  269 |             senderNumber = getMMSSender(mmsId)\n  270 |             val namePhoto = getNameAndPhotoFromPhoneNumber(senderNumber)\n  271 |             senderName = namePhoto.name\n  272 |             senderPhotoUri = namePhoto.photoUri ?: \"\"\n  273 |         }\n  274 | \n  275 |         val message =\n  276 |             Message(\n  277 |                 id = mmsId,\n  278 |                 body = body,\n  279 |                 type = type,\n  280 |                 status = status,\n  281 |                 participants = participants,\n  282 |                 date = date,\n  283 |                 read = read,\n  284 |                 threadId = threadId,\n  285 |                 isMMS = isMMS,\n  286 |                 attachment = attachment,\n  287 |                 senderPhoneNumber = senderNumber,\n  288 |                 senderName = senderName,\n  289 |                 senderPhotoUri = senderPhotoUri,\n  290 |                 subscriptionId = subscriptionId\n  291 |             )\n  292 |         messages.add(message)\n  293 | \n  294 |         participants.forEach {\n  295 |             contactsMap[it.rawId] = it\n  296 |         }","lines":38}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"getConversations recurses into itself after setting config.isArchiveAvailable = false when it hits the 'no such column: archived' SQLiteException (line 452). On the retry, the previously-collected partial `conversations` list is discarded (a fresh recursive call builds a new one), which is correct, but there is no guard against repeated recursion if the condition re-triggers, and the recursive call re-runs getUnreadCountsByThread and getBlockedNumbers (two extra full queries) on every fallback.","fix":"Since config.isArchiveAvailable is now false the retry cannot re-trigger the same branch, but consider passing already-computed blockedNumbers/unreadMap into the retry to avoid redundant queries.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:446-458","code":"  446 |     } catch (sqliteException: SQLiteException) {\n  447 |         if (\n  448 |             sqliteException.message?.contains(\"no such column: archived\") == true\n  449 |             && archiveAvailable\n  450 |         ) {\n  451 |             config.isArchiveAvailable = false\n  452 |             return getConversations(threadId, privateContacts)\n  453 |         } else {\n  454 |             showErrorToast(sqliteException)\n  455 |         }\n  456 |     } catch (e: Exception) {\n  457 |         showErrorToast(e)\n  458 |     }","lines":13}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`importBlockedKeywords` splits the file content on the delimiter without filtering blanks. If the file is empty (after trimEnd) or contains a trailing/leading delimiter, `split(\",\")` yields list entries containing empty strings (e.g. \"\" or \"a,,b\"). These empty strings are then added as blocked keywords. An empty blocked keyword makes `ReceiverUtils.isMessageFilteredOut` match every message (`body.contains(\"\")` is always true), silently blocking all incoming SMS. Also note `keywords.isNotEmpty()` is always true because split never returns an empty list, so the IMPORT_FAIL branch for empty content is unreachable.","fix":"Filter blanks: `.split(DELIMITER).map { it.trim() }.filter { it.isNotEmpty() }`, and treat an empty result as IMPORT_FAIL.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/BlockedKeywordsImporter.kt:18-30","code":"   18 |             val inputStream = File(path).inputStream()\n   19 |             val keywords = inputStream.bufferedReader().use {\n   20 |                 val content = it.readText().trimEnd().split(BLOCKED_KEYWORDS_EXPORT_DELIMITER)\n   21 |                 content\n   22 |             }\n   23 |             if (keywords.isNotEmpty()) {\n   24 |                 keywords.forEach { keyword: String ->\n   25 |                     activity.config.addBlockedKeyword(keyword)\n   26 |                 }\n   27 |                 ImportResult.IMPORT_OK\n   28 |             } else {\n   29 |                 ImportResult.IMPORT_FAIL\n   30 |             }","lines":13},{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/ReceiverUtils.kt:8-16","code":"    8 |     fun isMessageFilteredOut(context: Context, body: String): Boolean {\n    9 |         for (blockedKeyword in context.config.blockedKeywords) {\n   10 |             if (body.contains(blockedKeyword, ignoreCase = true)) {\n   11 |                 return true\n   12 |             }\n   13 |         }\n   14 | \n   15 |         return false\n   16 |     }","lines":9}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`determineImageRotation` maps EXIF orientation 8 (ROTATE_270 / 90 CCW) to `postRotate(270f)`. ORIENTATION_ROTATE_270 means the image needs a 270-degree clockwise rotation to display correctly, which this does, but orientation values 2/4/5/7 (the mirrored/flipped variants) are ignored entirely, so flipped images are restored with wrong orientation. The `when` silently passes through unhandled orientations without comment.","fix":"Handle the mirrored EXIF orientation cases (2,4,5,7) with appropriate Matrix.postScale/postRotate, or document that only the common cases are supported.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/ImageCompressor.kt:124-134","code":"  124 |     private fun determineImageRotation(imageFile: File, bitmap: Bitmap): Bitmap {\n  125 |         val exif = ExifInterface(imageFile.absolutePath)\n  126 |         val orientation = exif.getAttributeInt(ExifInterface.TAG_ORIENTATION, 0)\n  127 |         val matrix = Matrix()\n  128 |         when (orientation) {\n  129 |             6 -> matrix.postRotate(90f)\n  130 |             3 -> matrix.postRotate(180f)\n  131 |             8 -> matrix.postRotate(270f)\n  132 |         }\n  133 |         return Bitmap.createBitmap(bitmap, 0, 0, bitmap.width, bitmap.height, matrix, true)\n  134 |     }","lines":11}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`isFileXml` only checks whether the first line starts with `<?xml`. A valid XML backup that omits the XML declaration (starts directly with `<smses>`) is misclassified as JSON and handed to `Json.decodeFromStream`, failing the import. Conversely the detection opens a second InputStream just to read one line (the file is then reopened for the actual import), doubling IO.","fix":"Detect XML more robustly (e.g. trim leading whitespace and check for a leading '<') and reuse a single stream where possible.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesImporter.kt:210-215","code":"  210 |     private fun isFileXml(uri: Uri): Boolean {\n  211 |         val inputStream = getInputStreamFromUri(uri)\n  212 |         return inputStream?.bufferedReader()?.use { reader ->\n  213 |             reader.readLine()?.startsWith(\"<?xml\") == true\n  214 |         } == true\n  215 |     }","lines":6}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`smsExist` builds its dedup selection from `smsBackup.address`, but a restored SMS can legitimately have a null/empty address (e.g. some system messages). With a null address the selection arg array contains a non-null String requirement; `arrayOf(..., smsBackup.address, ...)` where address is the non-null model field is fine for SMS (address is non-null in SmsBackup), but the same dedup ignores `body` and `service_center`, so two distinct messages with identical date+address+type (common for split/concatenated SMS arriving in the same second) are treated as duplicates and the second is dropped during import.","fix":"Include body (and ideally dateSent) in the duplicate-detection selection to avoid dropping legitimately distinct messages.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesWriter.kt:35-48","code":"   35 |     private fun smsExist(smsBackup: SmsBackup): Boolean {\n   36 |         val uri = Sms.CONTENT_URI\n   37 |         val projection = arrayOf(Sms._ID)\n   38 |         val selection = \"${Sms.DATE} = ? AND ${Sms.ADDRESS} = ? AND ${Sms.TYPE} = ?\"\n   39 |         val selectionArgs = arrayOf(\n   40 |             smsBackup.date.toString(), smsBackup.address, smsBackup.type.toString()\n   41 |         )\n   42 | \n   43 |         var exists = false\n   44 |         context.queryCursor(uri, projection, selection, selectionArgs) {\n   45 |             exists = it.count > 0\n   46 |         }\n   47 |         return exists\n   48 |     }","lines":14}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`mmsPartExist` and `writeMmsAddress`/`mmsAddressExist` use `.toString()` on nullable fields when building selection args: `mmsPart.contentLocation.toString()` and `mmsPart.contentId.toString()`. When these fields are null, `.toString()` yields the literal string \"null\" rather than a SQL NULL, so the existence check compares the column against the string \"null\" and will not match real NULL rows. This can cause duplicate part insertion for parts whose contentLocation/contentId are null.","fix":"Handle null fields explicitly (use IS NULL clauses) instead of stringifying null into the literal \"null\".","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesWriter.kt:165-181","code":"  165 |     private fun mmsPartExist(mmsPart: MmsPart, messageId: Long): Boolean {\n  166 |         val uri = Uri.parse(\"content://mms/${messageId}/part\")\n  167 |         val projection = arrayOf(Mms.Part._ID)\n  168 |         val selection = \"${Mms.Part.CONTENT_LOCATION} = ? AND ${Mms.Part.CONTENT_TYPE} = ? AND ${Mms.Part.MSG_ID} = ? AND ${Mms.Part.CONTENT_ID} = ?\"\n  169 |         val selectionArgs = arrayOf(\n  170 |             mmsPart.contentLocation.toString(),\n  171 |             mmsPart.contentType,\n  172 |             messageId.toString(),\n  173 |             mmsPart.contentId.toString()\n  174 |         )\n  175 | \n  176 |         var exists = false\n  177 |         context.queryCursor(uri, projection, selection, selectionArgs) {\n  178 |             exists = it.count > 0\n  179 |         }\n  180 |         return exists\n  181 |     }","lines":17}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`showSendingFailedNotification` derives its notificationId from `generateRandomId().hashCode()`. Because `generateRandomId` reseeds Random from current millis (see related finding), and because hashing the truncated id further collapses the range, rapid consecutive send failures can collide on the same notificationId and overwrite each other's failure notification.","fix":"Use a guaranteed-unique id source (atomic counter or full random long) for transient notification ids.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/NotificationHelper.kt:199","code":"  199 |         val notificationId = generateRandomId().hashCode()","lines":1}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`getScheduledMessageWithId` returns a non-null `Message` from a query that can match zero rows. Room generates code that throws if the cursor is empty when the return type is non-nullable, so requesting a scheduled message id that no longer exists crashes instead of returning null.","fix":"Declare the return type nullable: `fun getScheduledMessageWithId(threadId: Long, messageId: Long): Message?`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/interfaces/MessagesDao.kt:50-51","code":"   50 |     @Query(\"SELECT * FROM messages WHERE thread_id = :threadId AND id = :messageId AND is_scheduled = 1\")\n   51 |     fun getScheduledMessageWithId(threadId: Long, messageId: Long): Message","lines":2}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"SmsSender.sendInternal computes the part id as `if (messageCount <= 1) 0 else i + 1`, used as the requestCode for both the sent and delivered PendingIntents. The same partId is used for the sent intent AND (on the last part) the delivered intent. Because the two intents differ only by action/component, PendingIntent equality differs, so they don't collide with each other; however reusing requestCode 0 for the single-part case across concurrent sends to different messageUris with FLAG_UPDATE_CURRENT means a second concurrent single-part send can overwrite the first send's PendingIntent target (the data URI is part of equality, so different URIs are distinct - this mitigates it). The fragile reliance on URI-in-equality plus a constant requestCode is worth hardening.","fix":"Derive requestCode from a value unique per message (e.g. message id / uri hash) combined with the part index, instead of a constant 0 for single-part messages.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/messaging/SmsSender.kt:66-89","code":"   66 |         for (i in 0 until messageCount) {\n   67 |             // Make pending intents different for each message part\n   68 |             val partId = if (messageCount <= 1) 0 else i + 1\n   69 |             if (requireDeliveryReport && i == messageCount - 1) {\n   70 |                 deliveryIntents.add(\n   71 |                     PendingIntent.getBroadcast(\n   72 |                         app,\n   73 |                         partId,\n   74 |                         getDeliveredStatusIntent(messageUri, subId),\n   75 |                         flags\n   76 |                     )\n   77 |                 )\n   78 |             } else {\n   79 |                 deliveryIntents.add(null)\n   80 |             }\n   81 |             sentIntents.add(\n   82 |                 PendingIntent.getBroadcast(\n   83 |                     app,\n   84 |                     partId,\n   85 |                     getSendStatusIntent(messageUri, subId),\n   86 |                     flags\n   87 |                 )\n   88 |             )\n   89 |         }","lines":24}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Conversation.areContentsTheSame() omits `isScheduled`, `usesCustomTitle` and `isArchived` from the comparison. If a conversation's scheduled/custom-title/archived state changes while snippet/date/read/title/photo/group/phone/unreadCount stay equal, DiffUtil will treat the items as identical and not rebind the row, so the UI can show stale state. Note Message.areContentsTheSame does compare its `isScheduled`, making the two models inconsistent.","fix":"Add `old.isScheduled == new.isScheduled && old.usesCustomTitle == new.usesCustomTitle && old.isArchived == new.isArchived` to areContentsTheSame (whichever of these affect the rendered row).","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/models/Conversation.kt:29-38","code":"   29 |         fun areContentsTheSame(old: Conversation, new: Conversation): Boolean {\n   30 |             return old.snippet == new.snippet &&\n   31 |                 old.date == new.date &&\n   32 |                 old.read == new.read &&\n   33 |                 old.title == new.title &&\n   34 |                 old.photoUri == new.photoUri &&\n   35 |                 old.isGroupConversation == new.isGroupConversation &&\n   36 |                 old.phoneNumber == new.phoneNumber &&\n   37 |                 old.unreadCount == new.unreadCount\n   38 |         }","lines":10}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"SmsReceiver reads the subscription id with `intent.getIntExtra(\"subscription\", -1)`. The literal \"subscription\" is the legacy/OEM key and is not guaranteed across devices/Android versions; the platform commonly delivers the subscription via Telephony.Sms.Intents extras / the SubscriptionManager EXTRA. When the extra is absent, subscriptionId defaults to -1 and is then stored on the message and used for SIM attribution, so incoming messages can be attributed to the wrong/unknown SIM on dual-SIM devices.","fix":"Read the subscription id from the documented extra (e.g. \"android.telephony.extra.SUBSCRIPTION_INDEX\") with the legacy \"subscription\" key as fallback.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/SmsReceiver.kt:59","code":"   59 |                 val subscriptionId = intent.getIntExtra(\"subscription\", -1)","lines":1}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"HeadlessSmsSendService strips URI scheme prefixes but the mms prefix is `\"mms\"` (no colon) while the others are `\"sms:\"`, `\"smsto:\"`, `\"mmsto:\"`. Stripping the bare `\"mms\"` (rather than `\"mms:\"`) means an `mms:` URI is reduced to `:12345...` (the leading colon remains), producing a malformed number; and a number that legitimately begins with the letters \"mms\" would also be corrupted. Inconsistent with the other prefixes.","fix":"Use `.removePrefix(\"mms:\")` to match the other scheme prefixes.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/services/HeadlessSmsSendService.kt:18","code":"   18 |             val number = Uri.decode(intent.dataString!!.removePrefix(\"sms:\").removePrefix(\"smsto:\").removePrefix(\"mms\").removePrefix(\"mmsto:\").trim())","lines":1}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"getMessages applies `.takeLast(limit)` (line 212) after sorting ascending by date, but the SMS query already applied `LIMIT $limit` and the MMS path is unbounded except via the passed sortOrder. After merging SMS (<=limit), all MMS, and scheduled messages, takeLast(limit) keeps only the newest `limit` items. This means MMS-heavy threads can crowd out the limited SMS set fetched, and the effective fetched window is not exactly `limit` messages of the conversation - the SMS LIMIT and the post-merge takeLast can interact to drop recently-fetched SMS.","fix":"Apply a consistent LIMIT to the MMS query as well (it already accepts sortOrder with LIMIT for some callers), so the merged-then-trimmed window is predictable.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:197-213","code":"  197 |     messages.addAll(getMMS(threadId, sortOrder, dateFrom))\n  198 | \n  199 |     if (includeScheduledMessages) {\n  200 |         try {\n  201 |             val scheduledMessages = messagesDB.getScheduledThreadMessages(threadId)\n  202 |             messages.addAll(scheduledMessages)\n  203 |         } catch (e: Exception) {\n  204 |             e.printStackTrace()\n  205 |         }\n  206 |     }\n  207 | \n  208 |     messages = messages\n  209 |         .filter { it.participants.isNotEmpty() }\n  210 |         .filterNot { it.isScheduled && it.millis() < System.currentTimeMillis() }\n  211 |         .sortedWith(compareBy<Message> { it.date }.thenBy { it.id })\n  212 |         .takeLast(limit)\n  213 |         .toMutableList() as ArrayList<Message>","lines":17}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"When importing the SMS Backup & Restore XML format, `dateSent` is read from the wrong XML attribute. Both `date` and `dateSent` are parsed from the `\"date\"` attribute; `dateSent` should be parsed from `\"date_sent\"`. As a result every imported SMS loses its real sent timestamp and gets the received timestamp instead. This directly populates the SmsBackup model's `dateSent` field.","fix":"Change line 179 to `dateSent = getAttributeValue(null, \"date_sent\")?.toLongOrNull() ?: 0L,` (and similarly guard the other toLong/toInt calls against missing attributes).","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesImporter.kt:178-179","code":"  178 |             date = getAttributeValue(null, \"date\").toLong(),\n  179 |             dateSent = getAttributeValue(null, \"date\").toLong(),","lines":2}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":false,"description":"In getMessages, when building the participants list for an SMS, each participant's photoUri is set to `photoUri` - the variable holding the *sender's* photo (line 153) - instead of the participant's own photo. The per-participant photo is even computed into `participantPhoto` (line 165) and used for the name, but its `.photoUri` is then ignored. For group SMS this assigns the wrong avatar to every participant.","fix":"Use the per-participant photo: `photoUri = participantPhoto.photoUri ?: \"\"` instead of `photoUri = photoUri`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:163-175","code":"  163 |         val participants = senderNumber.split(ADDRESS_SEPARATOR).map { number ->\n  164 |             val phoneNumber = PhoneNumber(number, 0, \"\", number)\n  165 |             val participantPhoto = getNameAndPhotoFromPhoneNumber(number)\n  166 |             SimpleContact(\n  167 |                 rawId = 0,\n  168 |                 contactId = 0,\n  169 |                 name = participantPhoto.name,\n  170 |                 photoUri = photoUri,\n  171 |                 phoneNumbers = arrayListOf(phoneNumber),\n  172 |                 birthdays = ArrayList(),\n  173 |                 anniversaries = ArrayList()\n  174 |             )\n  175 |         }","lines":13}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"When importing SMS messages from XML backups (the SMS Backup & Restore format), the `dateSent` field is read from the `date` attribute instead of the `date_sent` attribute. Both `date` and `dateSent` end up holding the same value, so the original \"sent\" timestamp is lost on every XML-imported SMS. This is a classic copy-paste bug: the attribute name was not changed on the second line.","fix":"Read `dateSent` from the correct attribute:\n    date = getAttributeValue(null, \"date\").toLong(),\n    dateSent = getAttributeValue(null, \"date_sent\")?.toLongOrNull() ?: 0L,","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesImporter.kt:178-179","code":"  178 |             date = getAttributeValue(null, \"date\").toLong(),\n  179 |             dateSent = getAttributeValue(null, \"date\").toLong(),","lines":2}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"HeadlessSmsSendService.onStartCommand wraps the entire send path in `catch (ignored: Exception) {}`, silently swallowing every failure (including the sendMessageCompat send error). This service is the standard entry point used by other apps (e.g. car/Bluetooth, the 'respond via message' dialer flow) to send an SMS via the default messaging app. If anything throws, the message is silently lost with no toast, no failed-message persistence, and no log. Additionally `intent.dataString!!` uses a not-null assertion: a caller that starts the service with a null data URI (intent != null but dataString == null) triggers a NullPointerException - which is then also swallowed, so the failure is invisible.","fix":"Null-check intent.dataString before use, and at minimum log/report the exception instead of swallowing it silently; consider surfacing a failure notification.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/services/HeadlessSmsSendService.kt:12-29","code":"   12 |     override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {\n   13 |         try {\n   14 |             if (intent == null) {\n   15 |                 return START_NOT_STICKY\n   16 |             }\n   17 | \n   18 |             val number = Uri.decode(intent.dataString!!.removePrefix(\"sms:\").removePrefix(\"smsto:\").removePrefix(\"mms\").removePrefix(\"mmsto:\").trim())\n   19 |             val text = intent.getStringExtra(Intent.EXTRA_TEXT)\n   20 |             if (!text.isNullOrEmpty()) {\n   21 |                 val addresses = listOf(number)\n   22 |                 val subId = Settings.DEFAULT_SUBSCRIPTION_ID\n   23 |                 sendMessageCompat(text, addresses, subId, emptyList())\n   24 |             }\n   25 |         } catch (ignored: Exception) {\n   26 |         }\n   27 | \n   28 |         return super.onStartCommand(intent, flags, startId)\n   29 |     }","lines":18}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"URLDecoder.decode(String) is called with the single-arg overload, which is deprecated and\nuses the platform default charset, and is invoked without a try/catch. A malformed escape\nsequence in the recipient (e.g. a stray '%' not part of a valid %XX) throws\nIllegalArgumentException, crashing the activity when handling a third-party SEND intent.\nThe replace(\"+\", \"%2b\") hack to preserve '+' is also brittle.","fix":"Use URLDecoder.decode(value, \"UTF-8\") wrapped in a try/catch, falling back to the raw\nrecipients string on failure, or avoid URL-decoding phone numbers entirely.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/NewConversationActivity.kt:138-152","code":"  138 |     private fun isThirdPartyIntent(): Boolean {\n  139 |         val result = SmsIntentParser.parse(intent)\n  140 | \n  141 |         if (result != null && (result.first.isNotEmpty() || result.second.isNotEmpty())) {\n  142 |             val (body, recipients) = result\n  143 |             launchThreadActivity(\n  144 |                 phoneNumber = URLDecoder.decode(recipients.replace(\"+\", \"%2b\").trim()),\n  145 |                 name = \"\",\n  146 |                 body = body\n  147 |             )\n  148 |             finish()\n  149 |             return true\n  150 |         }\n  151 |         return false\n  152 |     }","lines":15}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"sendNormalMessage catches Error (java.lang.Error) in addition to Exception. Catching Error swallows serious unrecoverable conditions (OutOfMemoryError, StackOverflowError, etc.) and merely toasts them, which can leave the process in an inconsistent state instead of crashing cleanly.","fix":"Catch only Exception (and specific subtypes) here; do not catch Error.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1605-1611","code":" 1605 |         } catch (e: Exception) {\n 1606 |             showErrorToast(e)\n 1607 |         } catch (e: Error) {\n 1608 |             showErrorToast(\n 1609 |                 e.localizedMessage ?: getString(org.fossify.commons.R.string.unknown_error_occurred)\n 1610 |             )\n 1611 |         }","lines":7}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"markMessageRead performs contentResolver.update with no try/catch. Unlike most sibling functions here (deleteMessage, updateConversationArchivedStatus, etc.) it lets exceptions propagate. A provider error (e.g. message already deleted, permission/provider issue) will throw and the caller is typically on a background thread but the throw also skips messagesDB.markRead(id). The function name implies a best-effort operation.","fix":"Wrap the update + DB call in try/catch like the other mutation helpers, or at minimum guard the contentResolver.update.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:984-994","code":"  984 | fun Context.markMessageRead(id: Long, isMMS: Boolean) {\n  985 |     val uri = if (isMMS) Mms.CONTENT_URI else Sms.CONTENT_URI\n  986 |     val contentValues = ContentValues().apply {\n  987 |         put(Sms.READ, 1)\n  988 |         put(Sms.SEEN, 1)\n  989 |     }\n  990 |     val selection = \"${Sms._ID} = ?\"\n  991 |     val selectionArgs = arrayOf(id.toString())\n  992 |     contentResolver.update(uri, contentValues, selection, selectionArgs)\n  993 |     messagesDB.markRead(id)\n  994 | }","lines":11}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`usePart` swallows all `IOException`s and returns an empty string when a part stream cannot be read. During export this silently produces an MMS part with empty `data` (empty text or empty base64 blob) with no indication anything went wrong, so a backup can quietly contain corrupt/empty attachments. The failure is indistinguishable from a genuinely empty part.","fix":"Log the exception and/or surface a per-part read failure so the export can warn the user rather than silently writing empty attachment data.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesReader.kt:253-269","code":"  253 |     @SuppressLint(\"NewApi\")\n  254 |     private fun usePart(partId: Long, block: (InputStream) -> String): String {\n  255 |         val partUri = if (isQPlus()) {\n  256 |             Mms.Part.CONTENT_URI.buildUpon().appendPath(partId.toString()).build()\n  257 |         } else {\n  258 |             Uri.parse(\"content://mms/part/$partId\")\n  259 |         }\n  260 | \n  261 |         try {\n  262 |             val stream = context.contentResolver.openInputStream(partUri) ?: return \"\"\n  263 |             stream.use {\n  264 |                 return block(stream)\n  265 |             }\n  266 |         } catch (e: IOException) {\n  267 |             return \"\"\n  268 |         }\n  269 |     }","lines":17}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`writeMmsPart` writes the decoded attachment bytes inside a `try { ... } catch (e: Exception) {}` with a completely empty catch block. If `Base64.decode` fails (corrupt/untrusted backup data) or the output stream write fails, the error is silently swallowed: the part row has already been inserted (line 148) but its binary data is missing, leaving a half-written attachment with no error reported and no rollback. The empty catch also hides the `it!!` NPE if openOutputStream returns null.","fix":"Log/propagate the exception so the importer counts the message as failed; consider deleting the orphan part row when the data write fails. Avoid the non-null assertion on the output stream.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesWriter.kt:142-162","code":"  142 |     @SuppressLint(\"NewApi\")\n  143 |     private fun writeMmsPart(mmsPart: MmsPart, messageId: Long) {\n  144 |         if (!mmsPartExist(mmsPart, messageId)) {\n  145 |             val uri = Uri.parse(\"content://mms/${messageId}/part\")\n  146 |             val contentValues = mmsPart.toContentValues()\n  147 |             contentValues.put(Mms.Part.MSG_ID, messageId)\n  148 |             val partUri = contentResolver.insert(uri, contentValues)\n  149 |             try {\n  150 |                 if (partUri != null) {\n  151 |                     if (mmsPart.isNonText()) {\n  152 |                         contentResolver.openOutputStream(partUri).use {\n  153 |                             val arr = Base64.decode(mmsPart.data, Base64.DEFAULT)\n  154 |                             it!!.write(arr)\n  155 |                         }\n  156 |                     }\n  157 |                 }\n  158 |             } catch (e: Exception) {\n  159 | \n  160 |             }\n  161 |         }\n  162 |     }","lines":21}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`parseVCardFromUri` passes the InputStream from `openInputStream` directly to `Ezvcard.parse(inputStream).all()` with no try/catch and without closing the stream. (1) `Ezvcard.parse(...).all()` throws IOException on malformed/oversized untrusted vCard input, which is uncaught here and propagates on the background thread. (2) The InputStream is never closed -> resource leak on every vCard preview/parse. Only the `openInputStream` call itself is wrapped in try/catch.","fix":"Wrap the parse in try/catch returning emptyList() on failure, and use `inputStream.use { Ezvcard.parse(it).all() }` to guarantee the stream is closed.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/VCardParser.kt:9-20","code":"    9 | fun parseVCardFromUri(context: Context, uri: Uri, callback: (vCards: List<VCard>) -> Unit) {\n   10 |     ensureBackgroundThread {\n   11 |         val inputStream = try {\n   12 |             context.contentResolver.openInputStream(uri)\n   13 |         } catch (e: Exception) {\n   14 |             callback(emptyList())\n   15 |             return@ensureBackgroundThread\n   16 |         }\n   17 |         val vCards = Ezvcard.parse(inputStream).all()\n   18 |         callback(vCards)\n   19 |     }\n   20 | }","lines":12}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"MessagingUtils.sendSmsMessage iterates over multiple addresses and, on the first send failure, marks that message FAILED and rethrows, aborting the loop. Any addresses after the failing one are never attempted - their telephony rows were not yet inserted, so for a multi-recipient (non-group) SMS the remaining recipients silently get no message and no failed entry. Combined with the group branch above (which inserts only a single dummy row), partial-failure handling for multi-recipient sends is inconsistent: some recipients are sent, the failing one is marked failed, the rest are dropped.","fix":"Decide on per-recipient semantics: continue the loop and collect failures rather than aborting on the first exception, so each recipient gets an inserted row and an accurate sent/failed status.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/messaging/MessagingUtils.kt:88-124","code":"   88 |     fun sendSmsMessage(\n   89 |         text: String,\n   90 |         addresses: Set<String>,\n   91 |         subId: Int,\n   92 |         requireDeliveryReport: Boolean,\n   93 |         messageId: Long? = null\n   94 |     ) {\n   95 |         if (addresses.size > 1) {\n   96 |             // insert a dummy message for this thread if it is a group message\n   97 |             val broadCastThreadId = context.getThreadId(addresses.toSet())\n   98 |             val mergedAddresses = addresses.joinToString(ADDRESS_SEPARATOR)\n   99 |             insertSmsMessage(\n  100 |                 subId = subId, dest = mergedAddresses, text = text,\n  101 |                 timestamp = System.currentTimeMillis(), threadId = broadCastThreadId,\n  102 |                 status = Sms.Sent.STATUS_COMPLETE, type = Sms.Sent.MESSAGE_TYPE_SENT,\n  103 |                 messageId = messageId\n  104 |             )\n  105 |         }\n  106 | \n  107 |         for (address in addresses) {\n  108 |             val threadId = context.getThreadId(address)\n  109 |             val messageUri = insertSmsMessage(\n  110 |                 subId = subId, dest = address, text = text,\n  111 |                 timestamp = System.currentTimeMillis(), threadId = threadId,\n  112 |                 messageId = messageId\n  113 |             )\n  114 |             try {\n  115 |                 context.smsSender.sendMessage(\n  116 |                     subId = subId, destination = address, body = text, serviceCenter = null,\n  117 |                     requireDeliveryReport = requireDeliveryReport, messageUri = messageUri\n  118 |                 )\n  119 |             } catch (e: Exception) {\n  120 |                 updateSmsMessageSendingStatus(messageUri, Sms.Outbox.MESSAGE_TYPE_FAILED)\n  121 |                 throw e // propagate error to caller\n  122 |             }\n  123 |         }\n  124 |     }","lines":37}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"MessagingUtils.sendMmsMessage catches and swallows the send failure: `transaction.sendNewMessage(message)` is wrapped in catch (e: Exception) { context.showErrorToast(e) }, returning normally afterwards. Unlike the SMS path (which marks the message FAILED and rethrows), an MMS send failure here only shows a toast; the persisted message is not marked failed and the caller (sendMessageCompat) has no way to know it failed. The attachment-reading block similarly swallows exceptions and then proceeds to send an MMS with no media attached.","fix":"On attachment-read failure, abort the send rather than sending media-less; on send failure, mark the message FAILED (consistent with the SMS path) instead of only toasting.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/messaging/MessagingUtils.kt:160-200","code":"  160 |     @Deprecated(\"TODO: Move/rewrite MMS code into the app.\")\n  161 |     fun sendMmsMessage(\n  162 |         text: String,\n  163 |         addresses: List<String>,\n  164 |         attachment: Attachment?,\n  165 |         settings: Settings,\n  166 |         messageId: Long? = null\n  167 |     ) {\n  168 |         val transaction = Transaction(context, settings)\n  169 |         val message = Message(text, addresses.toTypedArray())\n  170 | \n  171 |         if (attachment != null) {\n  172 |             try {\n  173 |                 val uri = attachment.getUri()\n  174 |                 context.contentResolver.openInputStream(uri)?.use {\n  175 |                     val bytes = it.readBytes()\n  176 |                     val mimeType = if (attachment.mimetype.isPlainTextMimeType()) {\n  177 |                         \"application/txt\"\n  178 |                     } else {\n  179 |                         attachment.mimetype\n  180 |                     }\n  181 |                     val name = attachment.filename\n  182 |                     message.addMedia(bytes, mimeType, name, name)\n  183 |                 }\n  184 |             } catch (e: Exception) {\n  185 |                 context.showErrorToast(e)\n  186 |             } catch (e: Error) {\n  187 |                 context.showErrorToast(e.localizedMessage ?: context.getString(org.fossify.commons.R.string.unknown_error_occurred))\n  188 |             }\n  189 |         }\n  190 | \n  191 |         val mmsSentIntent = Intent(context, MmsSentReceiver::class.java)\n  192 |         mmsSentIntent.putExtra(MmsSentReceiver.EXTRA_ORIGINAL_RESENT_MESSAGE_ID, messageId)\n  193 |         transaction.setExplicitBroadcastForSentMms(mmsSentIntent)\n  194 | \n  195 |         try {\n  196 |             transaction.sendNewMessage(message)\n  197 |         } catch (e: Exception) {\n  198 |             context.showErrorToast(e)\n  199 |         }\n  200 |     }","lines":41}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"SmsManager.getSmsManager has confused/over-nested error handling. Inside the `if (subId != DEFAULT_SUBSCRIPTION_ID)` branch it assigns `smsManagerInstance = getSmsManagerForSubscriptionId(...)` inside a try, and on exception only calls e.printStackTrace(). The subsequent expression `smsManagerInstance ?: SmsManager.getDefault()` is then assigned again to smsManagerInstance via the outer `smsManagerInstance = if (...)`. The inner assignment to smsManagerInstance is redundant with the outer one and makes the control flow hard to follow. More importantly, if a previous call had already cached a non-null smsManagerInstance for a different subId and the new lookup throws, the stale instance (`smsManagerInstance ?:`) is silently reused for the wrong subId, sending on the wrong SIM. The cache key check only compares subId, so the fallback path can bind the wrong subscription.","fix":"Use a local variable for the lookup result, don't reassign the shared field inside the try, and on failure fall back to getDefault() rather than reusing a stale cached instance bound to a different subId.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/messaging/SmsManager.kt:9-25","code":"    9 | @Suppress(\"DEPRECATION\")\n   10 | fun getSmsManager(subId: Int): SmsManager {\n   11 |     if (smsManagerInstance == null || subId != associatedSubId) {\n   12 |         smsManagerInstance = if (subId != Settings.DEFAULT_SUBSCRIPTION_ID) {\n   13 |             try {\n   14 |                 smsManagerInstance = SmsManager.getSmsManagerForSubscriptionId(subId)\n   15 |             } catch (e: Exception) {\n   16 |                 e.printStackTrace()\n   17 |             }\n   18 |             smsManagerInstance ?: SmsManager.getDefault()\n   19 |         } else {\n   20 |             SmsManager.getDefault()\n   21 |         }\n   22 |         associatedSubId = subId\n   23 |     }\n   24 |     return smsManagerInstance!!\n   25 | }","lines":17}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In tryImportBlockedKeywordsFromFile, the 'content' branch opens an InputStream and a\nFileOutputStream but never closes either. copyTo does not close its streams. On exception or\nsuccess the file descriptors leak. Also inputStream!! will NPE (uncaught beyond the local\ncatch) if openInputStream returns null.","fix":"Wrap the streams in use { } blocks (contentResolver.openInputStream(uri)?.use { input ->\nFileOutputStream(tempFile).use { out -> input.copyTo(out) } }) and handle the null input case.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ManageBlockedKeywordsActivity.kt:120-142","code":"  120 |     private fun tryImportBlockedKeywordsFromFile(uri: Uri) {\n  121 |         when (uri.scheme) {\n  122 |             \"file\" -> importBlockedKeywords(uri.path!!)\n  123 |             \"content\" -> {\n  124 |                 val tempFile = getTempFile(\"blocked\", \"blocked_keywords.txt\")\n  125 |                 if (tempFile == null) {\n  126 |                     toast(org.fossify.commons.R.string.unknown_error_occurred)\n  127 |                     return\n  128 |                 }\n  129 | \n  130 |                 try {\n  131 |                     val inputStream = contentResolver.openInputStream(uri)\n  132 |                     val out = FileOutputStream(tempFile)\n  133 |                     inputStream!!.copyTo(out)\n  134 |                     importBlockedKeywords(tempFile.absolutePath)\n  135 |                 } catch (e: Exception) {\n  136 |                     showErrorToast(e)\n  137 |                 }\n  138 |             }\n  139 | \n  140 |             else -> toast(org.fossify.commons.R.string.invalid_file_format)\n  141 |         }\n  142 |     }","lines":23}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"AttachmentsAdapter.loadMediaPreview's Glide onLoadFailed calls removeAttachment(attachment) and shows a toast. onLoadFailed runs during the load lifecycle which can occur inside a layout/bind pass; removeAttachment calls submitList synchronously, which can collide with the ongoing RecyclerView layout and is a common source of 'Cannot call this method while RecyclerView is computing a layout' crashes.","fix":"Post the removeAttachment to the next frame (recyclerView.post { ... }) rather than mutating the list inside the Glide callback.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/adapters/AttachmentsAdapter.kt:185-198","code":"  185 |             .listener(object : RequestListener<Drawable> {\n  186 |                 override fun onLoadFailed(e: GlideException?, model: Any?, target: Target<Drawable>, isFirstResource: Boolean): Boolean {\n  187 |                     removeAttachment(attachment)\n  188 |                     activity.toast(org.fossify.commons.R.string.unknown_error_occurred)\n  189 |                     return false\n  190 |                 }\n  191 | \n  192 |                 override fun onResourceReady(dr: Drawable, a: Any, t: Target<Drawable>, d: DataSource, i: Boolean): Boolean {\n  193 |                     binding.thumbnail.beVisible()\n  194 |                     binding.playIcon.beVisibleIf(attachment.mimetype.isVideoMimeType())\n  195 |                     binding.compressionProgress.beGone()\n  196 |                     return false\n  197 |                 }\n  198 |             })","lines":14}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"ExportMessagesDialog.export() uses a `success` flag, but inside the getMessagesToExport callback the empty-list branch (line 96-100) returns early after calling `dismiss()` without setting success. The `finally` block then runs with `success == false` and tries to `DocumentsContract.deleteDocument(...)` on the user's chosen URI. Choosing an existing document with no messages to export would delete that document even though no real error occurred.","fix":"Set `success = true` (or use a separate flag) in the empty-messages branch before returning, so a deliberately-empty export does not delete the target document.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/dialogs/ExportMessagesDialog.kt:88-123","code":"   88 |     private fun export(uri: Uri) {\n   89 |         ensureBackgroundThread {\n   90 |             var success = false\n   91 |             try {\n   92 |                 MessagesReader(activity).getMessagesToExport(\n   93 |                     getSms = config.exportSms,\n   94 |                     getMms = config.exportMms\n   95 |                 ) { messagesToExport ->\n   96 |                     if (messagesToExport.isEmpty()) {\n   97 |                         activity.toast(org.fossify.commons.R.string.no_entries_for_exporting)\n   98 |                         dismiss()\n   99 |                         return@getMessagesToExport\n  100 |                     }\n  101 |                     val json = Json { encodeDefaults = true }\n  102 |                     activity.contentResolver.openOutputStream(uri)!!.buffered()\n  103 |                         .use { outputStream ->\n  104 |                             json.encodeToStream(messagesToExport, outputStream)\n  105 |                         }\n  106 |                     success = true\n  107 |                     activity.toast(org.fossify.commons.R.string.exporting_successful)\n  108 |                 }\n  109 |             } catch (e: Throwable) {\n  110 |                 activity.showErrorToast(e.toString())\n  111 |             } finally {\n  112 |                 if (!success) {\n  113 |                     // delete the file to avoid leaving behind an empty/corrupt file\n  114 |                     try {\n  115 |                         DocumentsContract.deleteDocument(activity.contentResolver, uri)\n  116 |                     } catch (_: Exception) {\n  117 |                         // ignored because we don't want to show two error messages\n  118 |                     }\n  119 |                 }\n  120 | \n  121 |                 dismiss()\n  122 |             }\n  123 |         }","lines":36}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"markThreadMessagesUnread issues two contentResolver.update calls (SMS and MMS) with no try/catch. If the first update throws (provider failure), the second update and conversationsDB.markUnread are skipped, leaving the unread state half-applied.","fix":"Wrap each provider update in its own try/catch so one failing URI doesn't abort the rest of the operation.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:1019-1030","code":" 1019 | fun Context.markThreadMessagesUnread(threadId: Long) {\n 1020 |     arrayOf(Sms.CONTENT_URI, Mms.CONTENT_URI).forEach { uri ->\n 1021 |         val contentValues = ContentValues().apply {\n 1022 |             put(Sms.READ, 0)\n 1023 |             put(Sms.SEEN, 0)\n 1024 |         }\n 1025 |         val selection = \"${Sms.THREAD_ID} = ?\"\n 1026 |         val selectionArgs = arrayOf(threadId.toString())\n 1027 |         contentResolver.update(uri, contentValues, selection, selectionArgs)\n 1028 |     }\n 1029 |     conversationsDB.markUnread(threadId)\n 1030 | } ","lines":12}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Json.decodeFromStream<List<MessagesBackup>>` uses the default Json configuration, which does NOT set `ignoreUnknownKeys`. Any backup file produced by a newer app version (with extra fields) or by another tool that includes additional JSON keys will throw SerializationException and the entire import is rejected as \"invalid file format\", even though the known fields are perfectly parseable. This makes backups forward-incompatible.","fix":"Use a configured Json instance: `Json { ignoreUnknownKeys = true }` for decoding backups.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesImporter.kt:47-53","code":"   47 |     @OptIn(kotlinx.serialization.ExperimentalSerializationApi::class)\n   48 |     private fun importJson(uri: Uri) {\n   49 |         try {\n   50 |             val deserializedList =\n   51 |                 activity.contentResolver.openInputStream(uri)!!.buffered().use { inputStream ->\n   52 |                     Json.decodeFromStream<List<MessagesBackup>>(inputStream)\n   53 |                 }","lines":7}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`importXml` wraps the entire parse loop in a single outer `catch (_: Exception)` that maps any failure to a generic `invalid_file_format` toast and discards the exception. If parsing fails partway after some messages were already written, `refreshConversations()` (line 156) is never reached and the user sees only \"invalid file format\" despite a partial import having occurred, with no detail. The exception is fully swallowed (no logging).","fix":"Log the swallowed exception and reflect partial-import state; move refreshConversations to a finally block so already-written messages are surfaced.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/helpers/MessagesImporter.kt:118-168","code":"  118 |     private fun InputStream.importXml() {\n  119 |         try {\n  120 |             bufferedReader().use { reader ->\n  121 |                 val xmlParser = Xml.newPullParser().apply {\n  122 |                     setInput(reader)\n  123 |                 }\n  124 | \n  125 |                 xmlParser.nextTag()\n  126 |                 xmlParser.require(XmlPullParser.START_TAG, null, \"smses\")\n  127 | \n  128 |                 var depth = 1\n  129 |                 while (depth != 0) {\n  130 |                     when (xmlParser.next()) {\n  131 |                         XmlPullParser.END_TAG -> depth--\n  132 |                         XmlPullParser.START_TAG -> depth++\n  133 |                     }\n  134 | \n  135 |                     if (xmlParser.eventType != XmlPullParser.START_TAG) {\n  136 |                         continue\n  137 |                     }\n  138 | \n  139 |                     try {\n  140 |                         if (xmlParser.name == \"sms\") {\n  141 |                             if (config.importSms) {\n  142 |                                 val message = xmlParser.readSms()\n  143 |                                 messageWriter.writeSmsMessage(message)\n  144 |                                 messagesImported++\n  145 |                             } else {\n  146 |                                 xmlParser.skip()\n  147 |                             }\n  148 |                         } else {\n  149 |                             xmlParser.skip()\n  150 |                         }\n  151 |                     } catch (e: Exception) {\n  152 |                         activity.showErrorToast(e)\n  153 |                         messagesFailed++\n  154 |                     }\n  155 |                 }\n  156 |                 refreshConversations()\n  157 |             }\n  158 |             when {\n  159 |                 messagesFailed > 0 && messagesImported > 0 -> {\n  160 |                     activity.toast(org.fossify.commons.R.string.importing_some_entries_failed)\n  161 |                 }\n  162 | \n  163 |                 messagesFailed > 0 -> activity.toast(org.fossify.commons.R.string.importing_failed)\n  164 |                 else -> activity.toast(org.fossify.commons.R.string.importing_successful)\n  165 |             }\n  166 |         } catch (_: Exception) {\n  167 |             activity.toast(org.fossify.commons.R.string.invalid_file_format)\n  168 |         }","lines":51}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"SmsStatusDeliveredReceiver.updateSmsStatusAndDateSent calls resolver.update / resolver.query with no try/catch, unlike the analogous MessagingUtils.updateSmsMessageSendingStatus which guards with try/catch. A SQLite/provider exception here (e.g. revoked permission, deleted row) propagates up through updateAndroidDatabase into the ensureBackgroundThread body of SendStatusReceiver.onReceive, where it is uncaught and crashes that worker (and updateAppDatabase never runs, so the app DB status is never updated).","fix":"Wrap the resolver update/query in try/catch (mirroring updateSmsMessageSendingStatus) so a delivery-report DB failure does not crash the worker or skip updateAppDatabase.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/SmsStatusDeliveredReceiver.kt:62-86","code":"   62 |     private fun updateSmsStatusAndDateSent(context: Context, messageUri: Uri?, timeSentInMillis: Long = -1L) {\n   63 |         val resolver = context.contentResolver\n   64 |         val values = ContentValues().apply {\n   65 |             if (status != Sms.Sent.STATUS_NONE) {\n   66 |                 put(Sms.Sent.STATUS, status)\n   67 |             }\n   68 |             put(Sms.Sent.DATE_SENT, timeSentInMillis)\n   69 |         }\n   70 | \n   71 |         if (messageUri != null) {\n   72 |             resolver.update(messageUri, values, null, null)\n   73 |         } else {\n   74 |             // mark latest sms as delivered, need to check if this is still necessary (or reliable)\n   75 |             val cursor = resolver.query(Sms.Sent.CONTENT_URI, null, null, null, \"date desc\")\n   76 |             cursor?.use {\n   77 |                 if (cursor.moveToFirst()) {\n   78 |                     @SuppressLint(\"Range\")\n   79 |                     val id = cursor.getString(cursor.getColumnIndex(Sms.Sent._ID))\n   80 |                     val selection = \"${Sms._ID} = ?\"\n   81 |                     val selectionArgs = arrayOf(id.toString())\n   82 |                     resolver.update(Sms.Sent.CONTENT_URI, values, selection, selectionArgs)\n   83 |                 }\n   84 |             }\n   85 |         }\n   86 |     }","lines":25}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"onNewIntent() calls finish() then startActivity(intent) with the same Intent object that was just delivered. The thread is fully torn down and recreated on every new intent (e.g. tapping a notification while the thread is open), losing scroll position, draft state and any in-memory caches, and causing a visible activity restart flicker. Reusing the activity in-place (re-running loadConversation with the new extras) would be far cheaper and is the conventional singleTop pattern.","fix":"Instead of finish()+startActivity, set intent = intent, update threadId/extras and re-run loadConversation() in place, or only restart when the thread id actually changed.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:234-238","code":"  234 |     override fun onNewIntent(intent: Intent) {\n  235 |         super.onNewIntent(intent)\n  236 |         finish()\n  237 |         startActivity(intent)\n  238 |     }","lines":5}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"SmsStatusSentReceiver.updateAndroidDatabase reads the BroadcastReceiver result code via the property `val resultCode = resultCode` (i.e. BroadcastReceiver.getResultCode()) instead of using the `receiverResultCode` parameter that was explicitly captured for this purpose. updateAndroidDatabase is invoked from inside ensureBackgroundThread{} in the base class SendStatusReceiver.onReceive, which runs AFTER onReceive() has returned. getResultCode() is only valid during onReceive(); once onReceive returns, the receiver's pending-result state is finished and getResultCode() no longer reflects the broadcast's actual result. This can mark a successfully sent SMS as FAILED (or vice-versa) and trigger spurious error toasts. The base class already captures the correct value into `receiverResultCode` precisely to avoid this; updateAppDatabase in the same class correctly uses `receiverResultCode`.","fix":"Use the passed-in parameter: `val resultCode = receiverResultCode` (and drop the property read), matching how updateAppDatabase already uses receiverResultCode.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/SmsStatusSentReceiver.kt:26-41","code":"   26 |     override fun updateAndroidDatabase(context: Context, intent: Intent, receiverResultCode: Int) {\n   27 |         val messageUri: Uri? = intent.data\n   28 |         val resultCode = resultCode\n   29 |         val messagingUtils = context.messagingUtils\n   30 | \n   31 |         val type = if (resultCode == Activity.RESULT_OK) {\n   32 |             Sms.MESSAGE_TYPE_SENT\n   33 |         } else {\n   34 |             Sms.MESSAGE_TYPE_FAILED\n   35 |         }\n   36 |         messagingUtils.updateSmsMessageSendingStatus(messageUri, type)\n   37 |         messagingUtils.maybeShowErrorToast(\n   38 |             resultCode = resultCode,\n   39 |             errorCode = intent.getIntExtra(EXTRA_ERROR_CODE, NO_ERROR_CODE)\n   40 |         )\n   41 |     }","lines":16},{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/SendStatusReceiver.kt:15-21","code":"   15 |     override fun onReceive(context: Context, intent: Intent) {\n   16 |         val resultCode = resultCode\n   17 |         ensureBackgroundThread {\n   18 |             updateAndroidDatabase(context, intent, resultCode)\n   19 |             updateAppDatabase(context, intent, resultCode)\n   20 |         }\n   21 |     }","lines":7}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"EventBus is registered every time the conversations are loaded. loadArchivedConversations()\nis called from both onCreate() and onResume(), and each call executes bus.register(this).\nEventBus.register throws EventBusException if the subscriber is already registered; the\nexception is silently swallowed by the surrounding try/catch, so it 'works' by accident.\nRe-registering on every onResume is fragile and relies on exception-swallowing for\ncorrectness. The same pattern exists in RecycleBinConversationsActivity.","fix":"Register the bus once in onCreate (or guard with EventBus.getDefault().isRegistered(this))\nand keep the data-loading logic separate from registration. Do not rely on a swallowed\nexception to prevent double registration.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ArchivedConversationsActivity.kt:49-95","code":"   49 |     override fun onResume() {\n   50 |         super.onResume()\n   51 |         setupTopAppBar(binding.archiveAppbar, NavigationIcon.Arrow)\n   52 |         loadArchivedConversations()\n   53 |     }\n   54 | \n   55 |     override fun onDestroy() {\n   56 |         super.onDestroy()\n   57 |         bus?.unregister(this)\n   58 |     }\n   59 | \n   60 |     private fun setupOptionsMenu() {\n   61 |         binding.archiveToolbar.inflateMenu(R.menu.archive_menu)\n   62 |         binding.archiveToolbar.setOnMenuItemClickListener { menuItem ->\n   63 |             when (menuItem.itemId) {\n   64 |                 R.id.empty_archive -> removeAll()\n   65 |                 else -> return@setOnMenuItemClickListener false\n   66 |             }\n   67 |             return@setOnMenuItemClickListener true\n   68 |         }\n   69 |     }\n   70 | \n   71 |     private fun updateOptionsMenu(conversations: ArrayList<Conversation>) {\n   72 |         binding.archiveToolbar.menu.apply {\n   73 |             findItem(R.id.empty_archive).isVisible = conversations.isNotEmpty()\n   74 |         }\n   75 |     }\n   76 | \n   77 |     private fun loadArchivedConversations() {\n   78 |         ensureBackgroundThread {\n   79 |             val conversations = try {\n   80 |                 conversationsDB.getAllArchived().toMutableList() as ArrayList<Conversation>\n   81 |             } catch (e: Exception) {\n   82 |                 ArrayList()\n   83 |             }\n   84 | \n   85 |             runOnUiThread {\n   86 |                 setupConversations(conversations)\n   87 |             }\n   88 |         }\n   89 | \n   90 |         bus = EventBus.getDefault()\n   91 |         try {\n   92 |             bus!!.register(this)\n   93 |         } catch (ignored: Exception) {\n   94 |         }\n   95 |     }","lines":47},{"ref":"app/src/main/kotlin/org/fossify/messages/activities/RecycleBinConversationsActivity.kt:48-95","code":"   48 |     override fun onResume() {\n   49 |         super.onResume()\n   50 |         setupTopAppBar(binding.recycleBinAppbar, NavigationIcon.Arrow)\n   51 |         loadRecycleBinConversations()\n   52 |     }\n   53 | \n   54 |     override fun onDestroy() {\n   55 |         super.onDestroy()\n   56 |         bus?.unregister(this)\n   57 |     }\n   58 | \n   59 |     private fun setupOptionsMenu() {\n   60 |         binding.recycleBinToolbar.inflateMenu(R.menu.recycle_bin_menu)\n   61 |         binding.recycleBinToolbar.setOnMenuItemClickListener { menuItem ->\n   62 |             when (menuItem.itemId) {\n   63 |                 R.id.em ed on an invalid row position and throws; the throw is caught by the inner try/catch returning FILE_SIZE_NONE, so it works, but relying on an exception for the empty-cursor case is fragile and obscures intent.","fix":"Guard with `if (!cursor.moveToFirst()) return@use FILE_SIZE_NONE` before reading the column.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Context.kt:1203-1217","code":" 1203 |         return contentResolver.query(uri, arrayOf(OpenableColumns.SIZE), null, null, null)\n 1204 |             ?.use { cursor ->\n 1205 |                 // maybe shouldn't trust ContentResolver for size:\n 1206 |                 // https://stackoverflow.com/questions/48302972/content-resolver-returns-wrong-size\n 1207 |                 val sizeIndex = cursor.getColumnIndex(OpenableColumns.SIZE)\n 1208 |                 if (sizeIndex == -1) {\n 1209 |                     return@use FILE_SIZE_NONE\n 1210 |                 }\n 1211 |                 cursor.moveToFirst()\n 1212 |                 return try {\n 1213 |                     cursor.getLong(sizeIndex)\n 1214 |                 } catch (_: Throwable) {\n 1215 |                     FILE_SIZE_NONE\n 1216 |                 }\n 1217 |             } ?: FILE_SIZE_NONE","lines":15}]},{"id":"API_15","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Cursor.rowsToJson handles FIELD_TYPE_INTEGER, FLOAT, STRING and NULL but silently drops FIELD_TYPE_BLOB columns (no branch in the when). A BLOB column simply won't appear in the resulting JSON object, which can produce silently incomplete serialization.","fix":"Add a FIELD_TYPE_BLOB branch (e.g. base64-encode getBlob(i)) or explicitly document/assert that blobs are unsupported.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/extensions/Cursor.kt:12-17","code":"   12 |         when (getType(i)) {\n   13 |             Cursor.FIELD_TYPE_INTEGER -> obj.addProperty(key, getLong(i))\n   14 |             Cursor.FIELD_TYPE_FLOAT -> obj.addProperty(key, getFloat(i))\n   15 |             Cursor.FIELD_TYPE_STRING -> obj.addProperty(key, getString(i))\n   16 |             Cursor.FIELD_TYPE_NULL -> obj.add(key, JsonNull.INSTANCE)\n   17 |         }","lines":6}]},{"id":"API_16","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`getMessagesWithText` / `getConversationsWithText` take a `text` parameter used directly as the right-hand side of a `LIKE` (`body LIKE :text`). The `%` wildcards must be supplied by the caller, and any user-typed `%` or `_` in a search term is treated as a wildcard (search semantics surprise). Also, callers that forget to wrap the term in `%...%` get exact-match behaviour. Not SQL injection (parameter is bound), but a fragile contract.","fix":"Escape LIKE metacharacters in the search term and add the wildcards inside the query (e.g. `LIKE '%' || :text || '%' ESCAPE '\\\\'`).","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/interfaces/MessagesDao.kt:56-57","code":"   56 |     @Query(\"SELECT * FROM messages WHERE body LIKE :text\")\n   57 |     fun getMessagesWithText(text: String): List<Message>","lines":2},{"ref":"app/src/main/kotlin/org/fossify/messages/interfaces/ConversationsDao.kt:42-43","code":"   42 |     @Query(\"SELECT * FROM conversations WHERE title LIKE :text\")\n   43 |     fun getConversationsWithText(text: String): List<Conversation>","lines":2}]},{"id":"API_17","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Context.cancelScheduleSendPendingIntent recreates the PendingIntent with FLAG_UPDATE_CURRENT before cancelling it. Because the requested PendingIntent may not exist, FLAG_UPDATE_CURRENT will create a brand-new PendingIntent and immediately cancel it, which does not cancel any previously scheduled alarm if the original intent did not exactly match. Also note the original schedule intent carried THREAD_ID/SCHEDULED_MESSAGE_ID extras while this one carries none; extras are not part of PendingIntent equality so matching still works, but the correct flag for a cancel/lookup is FLAG_NO_CREATE so that no spurious PendingIntent is created when none exists.","fix":"Use FLAG_NO_CREATE (or FLAG_NO_CREATE or FLAG_IMMUTABLE) when retrieving the PendingIntent to cancel, and null-check the result before calling cancel().","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/messaging/ScheduledMessage.kt:34-38","code":"   34 | fun Context.cancelScheduleSendPendingIntent(messageId: Long) {\n   35 |     val intent = Intent(this, ScheduledMessageReceiver::class.java)\n   36 |     val flags = PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE\n   37 |     PendingIntent.getBroadcast(this, messageId.toInt(), intent, flags).cancel()\n   38 | }","lines":5}]},{"id":"API_18","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"SmsStatusSentReceiver.showSendingFailedNotification posts to the main thread, checks ProcessLifecycleOwner state, then starts another ensureBackgroundThread. This is invoked from within updateAppDatabase which itself already runs inside ensureBackgroundThread (from SendStatusReceiver / its own block). The receiver's goAsync-style pending result is not used here (SendStatusReceiver.onReceive does not call goAsync at all - it just spawns a background thread), meaning the process can be killed before these nested async hops complete, dropping the failed-send notification and the DB update.","fix":"Use goAsync() in SendStatusReceiver.onReceive and finish() the pending result only after the async work completes, so the system keeps the process alive for the status update.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/SendStatusReceiver.kt:15-21","code":"   15 |     override fun onReceive(context: Context, intent: Intent) {\n   16 |         val resultCode = resultCode\n   17 |         ensureBackgroundThread {\n   18 |             updateAndroidDatabase(context, intent, resultCode)\n   19 |             updateAppDatabase(context, intent, resultCode)\n   20 |         }\n   21 |     }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/messages/receivers/SmsStatusSentReceiver.kt:43-75","code":"   43 |     override fun updateAppDatabase(context: Context, intent: Intent, receiverResultCode: Int) {\n   44 |         val messageUri = intent.data\n   45 |         if (messageUri != null) {\n   46 |             val messageId = messageUri.lastPathSegment?.toLong() ?: 0L\n   47 |             ensureBackgroundThread {\n   48 |                 val type = if (receiverResultCode == Activity.RESULT_OK) {\n   49 |                     Sms.MESSAGE_TYPE_SENT\n   50 |                 } else {\n   51 |                     showSendingFailedNotification(context, messageId)\n   52 |                     Sms.MESSAGE_TYPE_FAILED\n   53 |                 }\n   54 | \n   55 |                 context.messagesDB.updateType(messageId, type)\n   56 |                 refreshMessages()\n   57 |                 refreshConversations()\n   58 |             }\n   59 |         }\n   60 |     }\n   61 | \n   62 |     private fun showSendingFailedNotification(context: Context, messageId: Long) {\n   63 |         Handler(Looper.getMainLooper()).post {\n   64 |             if (ProcessLifecycleOwner.get().lifecycle.currentState.isAtLeast(Lifecycle.State.RESUMED)) {\n   65 |                 return@post\n   66 |             }\n   67 |             val privateCursor = context.getMyContactsCursor(favoritesOnly = false, withPhoneNumbersOnly = true)\n   68 |             ensureBackgroundThread {\n   69 |                 val address = context.getMessageRecipientAddress(messageId)\n   70 |                 val threadId = context.getThreadId(address)\n   71 |                 val recipientName = context.getNameFromAddress(address, privateCursor)\n   72 |                 context.notificationHelper.showSendingFailedNotification(recipientName, threadId)\n   73 |             }\n   74 |         }\n   75 |     }","lines":33}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"getThreadItems() performs database writes inside a tight loop over every message: for each unread message it calls markMessageRead() AND conversationsDB.markRead(threadId), and getThreadItems() is itself invoked from many UI-thread paths (insertOrUpdateMessage runs runOnUiThread before/around it, deleteMessages, etc.). conversationsDB.markRead(threadId) is redundantly issued once per unread message instead of once total, producing N identical DB updates. getThreadItems also mutates persistent state (marking read) despite its name implying a pure transform.","fix":"Collect unread message ids in the loop, then issue a single batched markMessagesRead and one conversationsDB.markRead(threadId) after the loop. Move side effects out of getThreadItems into a dedicated function, and ensure it runs off the main thread.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1312-1316","code":" 1312 |             if (!message.read) {\n 1313 |                 hadUnreadItems = true\n 1314 |                 markMessageRead(message.id, message.isMMS)\n 1315 |                 conversationsDB.markRead(threadId)\n 1316 |             }","lines":5}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"The TYPE_SEND branch of showScheduledMessageInfo runs on the UI thread (RadioGroupDialog callback) and calls extractAttachments(message) -> addAttachment(uri) for every attachment. addAttachment performs contentResolver.getType(uri) and getFileSizeFromUri(uri) synchronously on the main thread, which open/stat the content provider and can cause jank or ANR for MMS attachments.","fix":"Move the content-resolver/file-size work in addAttachment onto a background thread (ensureBackgroundThread) and only touch the adapter/UI via runOnUiThread.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1843-1848","code":" 1843 |                 TYPE_SEND -> {\n 1844 |                     messages.removeAll { message.id == it.id }\n 1845 |                     extractAttachments(message)\n 1846 |                     sendNormalMessage(message.body, message.subscriptionId)\n 1847 |                     cancelScheduledMessageAndRefresh(message.id)\n 1848 |                 }","lines":6},{"ref":"app/src/main/kotlin/org/fossify/messages/activities/ThreadActivity.kt:1429-1477","code":" 1429 |     private fun addAttachment(uri: Uri) {\n 1430 |         val id = uri.toString()\n 1431 |         if (getAttachmentSelections().any { it.id == id }) {\n 1432 |             toast(R.string.duplicate_item_warning)\n 1433 |             return\n 1434 |         }\n 1435 | \n 1436 |         val mimeType = contentResolver.getType(uri)\n 1437 |         if (mimeType == null) {\n 1438 |             toast(org.fossify.commons.R.string.unknown_error_occurred)\n 1439 |             return\n 1440 |         }\n 1441 |         val isImage = mimeType.isImageMimeType()\n 1442 |         val isGif = mimeType.isGifMimeType()\n 1443 |         if (isGif || !isImage) {\n 1444 |             // is it assumed that images will always be compressed below the max MMS size limit\n 1445 |             val fileSize = getFileSizeFromUri(uri)\n 1446 |             val mmsFileSizeLimit = config.mmsFileSizeLimit\n 1447 |             if (mmsFileSizeLimit != FILE_SIZE_NONE && fileSize > mmsFileSizeLimit) {\n 1448 |                 toast(R.string.attachment_sized_exceeds_max_limit, length = Toast.LENGTH_LONG)\n 1449 |                 return\n 1450 |             }\n 1451 |         }\n 1452 | \n 1453 |         var adapter = getAttachmentsAdapter()\n 1454 |         if (adapter == null) {\n 1455 |             adapter = AttachmentsAdapter(\n 1456 |                 activity = this,\n 1457 |                 recyclerView = binding.messageHolder.threadAttachmentsRecyclerview,\n 1458 |                 onAttachmentsRemoved = {\n 1459 |                     binding.messageHolder.threadAttachmentsRecyclerview.beGone()\n 1460 |                     checkSendMessageAvailability()\n 1461 |                 },\n 1462 |                 onReady = { checkSendMessageAvailability() }\n 1463 |             )\n 1464 |             binding.messageHolder.threadAttachmentsRecyclerview.adapter = adapter\n 1465 |         }\n 1466 | \n 1467 |         binding.messageHolder.threadAttachmentsRecyclerview.beVisible()\n 1468 |         val attachment = AttachmentSelection(\n 1469 |             id = id,\n 1470 |             uri = uri,\n 1471 |             mimetype = mimeType,\n 1472 |             filename = getFilenameFromUri(uri),\n 1473 |             isPending = isImage && !isGif\n 1474 |         )\n 1475 |         adapter.addAttachment(attachment)\n 1476 |         checkSendMessageAvailability()\n 1477 |     }","lines":49}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"getMyContactsCursor() is called on the main thread. getCachedConversations() runs on a\nbackground thread, but switches to runOnUiThread before calling getNewConversations(), and\ngetNewConversations() executes getMyContactsCursor(...) (a ContentResolver query against the\nprivate-contacts provider) directly on the UI thread before it enters ensureBackgroundThread.\nThis blocks the main thread on a cross-process content-provider query.","fix":"Move the getMyContactsCursor() call inside the ensureBackgroundThread block in\ngetNewConversations(), or obtain the cursor while still on the background thread in\ngetCachedConversations() instead of inside runOnUiThread.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/MainActivity.kt:303-316","code":"  303 |             runOnUiThread {\n  304 |                 setupConversations(conversations, cached = true)\n  305 |                 getNewConversations(\n  306 |                     (conversations + archived).toMutableList() as ArrayList<Conversation>\n  307 |                 )\n  308 |             }\n  309 |             conversations.forEach {\n  310 |                 clearExpiredScheduledMessages(it.threadId)\n  311 |             }\n  312 |         }\n  313 |     }\n  314 | \n  315 |     private fun getNewConversations(cachedConversations: ArrayList<Conversation>) {\n  316 |         val privateCursor = getMyContactsCursor(favoritesOnly = false, withPhoneNumbersOnly = true)","lines":14}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"launchThreadActivity() calls getThreadId(numbers) on the main thread (it is invoked from\nclick listeners / setupAdapter callbacks on the UI thread). getThreadId() ultimately calls\nTelephony Threads.getOrCreateThreadId(), a synchronous ContentResolver/IPC call that can\nblock the UI thread, especially for new threads that must be created.","fix":"Resolve the thread id on a background thread (ensureBackgroundThread) and then start the\nactivity via runOnUiThread, or pass only the numbers and let ThreadActivity resolve the\nthread id off the main thread.","locations":[{"ref":"app/src/main/kotlin/org/fossify/messages/activities/NewConversationActivity.kt:268-291","code":"  268 |     private fun launchThreadActivity(phoneNumber: String, name: String, body: String = \"\") {\n  269 |         hideKeyboard()\n  270 |         val numbers = phoneNumber.split(\";\").toSet()\n  271 |         val number = if (numbers.size == 1) phoneNumber else Gson().toJson(numbers)\n  272 |         Intent(this, ThreadActivity::class.java).apply {\n  273 |             putExtra(THREAD_ID, getThreadId(numbers))\n  274 |             putExtra(THREAD_TITLE, name)\n  275 |             putExtra(THREAD_TEXT, body.ifEmpty { intent.getStringExtra(Intent.EXTRA_TEXT) })\n  276 |             putExtra(THREAD_NUMBER, number)
