isualSim = 0f;\n 1370 | \t\t\tdouble sourceSec = (source.mediaInfo?.Duration ?? TimeSpan.Zero).TotalSeconds;\n 1371 | \t\t\tdouble clipSec = (clip.mediaInfo?.Duration ?? TimeSpan.Zero).TotalSeconds;\n 1372 | \t\t\tif (sourceSec <= 0 || clipSec <= 0) return true;\n 1373 | \n 1374 | \t\t\t// Sample times in clip-local seconds. Avoid the very edges so intros/outros\n 1375 | \t\t\t// (often black or text-only) don't dominate the result.\n 1376 | \t\t\tvar clipTimes = new List<double>(3);\n 1377 | \t\t\tif (clipSec >= 9.0) {\n 1378 | \t\t\t\tclipTimes.Add(clipSec * 0.25);\n 1379 | \t\t\t\tclipTimes.Add(clipSec * 0.50);\n 1380 | \t\t\t\tclipTimes.Add(clipSec * 0.75);\n 1381 | \t\t\t}\n 1382 | \t\t\telse if (clipSec >= 3.0) {\n 1383 | \t\t\t\tclipTimes.Add(clipSec * 0.33);\n 1384 | \t\t\t\tclipTimes.Add(clipSec * 0.66);\n 1385 | \t\t\t}\n 1386 | \t\t\telse {\n 1387 | \t\t\t\tclipTimes.Add(clipSec * 0.5);\n 1388 | \t\t\t}\n 1389 | \n 1390 | \t\t\tbool useP = Settings.UsePHashing;\n 1391 | \t\t\tdouble threshold = Settings.PartialClipVisualThreshold;\n 1392 | \t\t\tint comparisons = 0;\n 1393 | \t\t\tfloat simSum = 0f;\n 1394 | \n 1395 | \t\t\t// Collect the usable sample times first so each file is decoded in a single\n 1396 | \t\t\t// batched session instead of one decoder open per frame.\n 1397 | \t\t\tvar srcSampleTimes = new List<double>(clipTimes.Count);\n 1398 | \t\t\tvar clipSampleTimes = new List<double>(clipTimes.Count);\n 1399 | \t\t\tforeach (double t in clipTimes) {\n 1400 | \t\t\t\tdouble srcAt = offsetSec + t;\n 1401 | \t\t\t\tif (srcAt >= sourceSec - 0.1 || t >= clipSec - 0.1) continue;\n 1402 | \t\t\t\tsrcSampleTimes.Add(srcAt);\n 1403 | \t\t\t\tclipSampleTimes.Add(t);\n 1404 | \t\t\t}\n 1405 | \t\t\tif (srcSampleTimes.Count == 0) return true;\n 1406 | \n 1407 | \t\t\tbyte[]?[] srcFrames = FfmpegEngine.GetGrayFrames(source.Path, srcSampleTimes, Settings.ExtendedFFToolsLogging);\n 1408 | \t\t\tbyte[]?[] clipFrames = FfmpegEngine.GetGrayFrames(clip.Path, clipSampleTimes, Settings.ExtendedFFToolsLogging);\n 1409 | \n 1410 | \t\t\tfor (int i = 0; i < srcSampleTimes.Count; i++) {\n 1411 | \t\t\t\tbyte[]? srcFrame = srcFrames[i];\n 1412 | \t\t\t\tbyte[]? clipFrame = clipFrames[i];\n 1413 | \t\t\t\tif (srcFrame == null || clipFrame == null) continue;\n 1414 | \n 1415 | \t\t\t\tfloat pairSim;\n 1416 | \t\t\t\tif (useP) {\n 1417 | \t\t\t\t\tulong hSrc = pHash.PerceptualHash.ComputePHashFromGray32x32(srcFrame);\n 1418 | \t\t\t\t\tulong hClip = pHash.PerceptualHash.ComputePHashFromGray32x32(clipFrame);\n 1419 | \t\t\t\t\tpHash.PHashCompare.IsDuplicateByPercent(hSrc, hClip, out pairSim, threshold, strict: true);\n 1420 | \t\t\t\t}\n 1421 | \t\t\t\telse {\n 1422 | \t\t\t\t\tfloat diff = GrayBytesUtils.PercentageDifference(srcFrame, clipFrame);\n 1423 | \t\t\t\t\tpairSim = 1f - diff;\n 1424 | \t\t\t\t}\n 1425 | \t\t\t\tsimSum += pairSim;\n 1426 | \t\t\t\tcomparisons++;\n 1427 | \t\t\t}\n 1428 | \n 1429 | \t\t\tif (comparisons == 0) return true;\n 1430 | \t\t\tvisualSim = simSum / comparisons;\n 1431 | \t\t\treturn visualSim >= threshold;\n 1432 | \t\t}","lines":65,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ScanEngine.cs#L1368-L1432"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"VerifyGrayScaleValues computes `100d / data.Length * darkPixels` with no guard for data.Length==0, producing a divide-by-zero -> Infinity/NaN if ever called with an empty array. Current callers pass fixed 1024-byte buffers so it does not fire today, but it is an unguarded public method.","fix":"Return true (or false) early when data.Length == 0, e.g. `if (data.Length == 0) return true;`.","locations":[{"ref":"VDF.Core/Utils/GrayBytesUtils.cs:33-41","code":"   33 | \t\tpublic static bool VerifyGrayScaleValues(byte[] data, double darkProcent = 80) {\n   34 | \t\t\tint darkPixels = 0;\n   35 | \t\t\t// ReSharper disable once LoopCan \tint changed = 0;\n   44 | \t\t\tforeach (var fe in entries) {\n   45 | \t\t\t\tvar full = Path.GetFullPath(fe.Path);\n   46 | \t\t\t\tif (full.StartsWith(oldPrefix, comparison)) {\n   47 | \t\t\t\t\tvar suffix = full.Substring(oldPrefix.Length);\n   48 | \t\t\t\t\tvar newPath = Path.Combine(newPrefix, suffix);\n   49 | \t\t\t\t\tfe.Path = newPath;\n   50 | \t\t\t\t\tchanged++;\n   51 | \t\t\t\t}\n   52 | \t\t\t}\n   53 | \t\t\treturn changed;\n   54 | \t\t}","lines":17,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Data/PathRelocator.cs#L38-L54"},{"ref":"VDF.GUI/ViewModels/RelocateFilesDialogVM.cs:207-233","code":"  207 | \t\tvoid BuildPreviewPrefix() {\n  208 | \t\t\t// Normalize\n  209 | \t\t\tstring oldP = PathRelocator.NormalizePrefixPublic(OldPrefix);\n  210 | \t\t\tstring newP = PathRelocator.NormalizePrefixPublic(NewPrefix);\n  211 | \t\t\tif (string.IsNullOrWhiteSpace(oldP) || string.IsNullOrWhiteSpace(newP)) return;\n  212 | \n  213 | \t\t\tvar comparison = (CoreUtils.IsWindows ? StringComparison.OrdinalIgnoreCase : StringComparison.Ordinal);\n  214 | \n  215 | \t\t\tList<RelocateCandidate> candidates = new();\n  216 | \n  217 | \t\t\tforeach (var e in _entries) {\n  218 | \t\t\t\tvar full = Path.GetFullPath(e.Path);\n  219 | \t\t\t\tif (full.StartsWith(oldP, comparison)) {\n  220 | \t\t\t\t\tvar suffix = full.Substring(oldP.Length);\n  221 | \t\t\t\t\tvar newPath = Path.Combine(newP, suffix);\n  222 | \n  223 | \t\t\t\t\tvar cand = new RelocateCandidate(e) {\n  224 | \t\t\t\t\t\tNewPath = newPath,\n  225 | \t\t\t\t\t\tConfidence = RelocateConfidence.Prefix,\n  226 | \t\t\t\t\t\tNote = \"Prefix replace\",\n  227 | \t\t\t\t\t\tSelected = true\n  228 | \t\t\t\t\t};\n  229 | \t\t\t\t\tcandidates.Add(cand);\n  230 | \t\t\t\t}\n  231 | \t\t\t}\n  232 | \t\t\tPreview.AddRange(candidates);\n  233 | \t\t}","lines":27,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/RelocateFilesDialogVM.cs#L207-L233"}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"SettingsFile.LoadSettings can set the static 'instance' to null: JsonSerializer.Deserialize returns null for the literal JSON 'null' or certain malformed content, and the result is assigned directly to instance with no null-guard. A subsequent SettingsFile.Instance access would then call the parameterless constructor and silently create a fresh default settings object, discarding the user's (corrupt-but-present) file without any error, and any in-flight references to the old instance are orphaned.","fix":"Assign to a local, and only overwrite instance if the deserialized value is non-null; otherwise log and keep defaults.","locations":[{"ref":"VDF.GUI/Data/SettingsFile.cs:562-570","code":"  562 | \t\tpublic static void LoadSettings(string? path = null) {\n  563 | \t\t\tpath ??= settingsPath;\n  564 | \t\t\tif ((path == null || path.EndsWith(\".xml\", StringComparison.OrdinalIgnoreCase)) && LoadOldSettings(path))\n  565 | \t\t\t\treturn;\n  566 | \n  567 | \t\t\tpath = ResolveSettingsPath(path);\n  568 | \t\t\tif (!File.Exists(path)) return;\n  569 | \t\t\tinstance = JsonSerializer.Deserialize(File.ReadAllBytes(path), GuiJsonContext.Default.SettingsFile);\n  570 | \t\t}","lines":9,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Data/SettingsFile.cs#L562-L570"}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"LoadOldSettings parses legacy <Percent> as int (int.TryParse) and assigns to Instance.Percent which is a float defaulting to 95. Old settings that stored a fractional percent would fail int.TryParse and be silently dropped, and the XML migration then deletes the .xml file (File.Delete at line 639) regardless of whether every value migrated, so any unparsed/legacy-on er, not against the mutating workers.","fix":"Do not serialize the live database from worker threads. Either snapshot under a lock that also blocks entry mutation, or signal a single dedicated thread to checkpoint at a safe point, or skip in-scan checkpoints. At minimum guard SaveDatabase with the same lock that protects entry writes.","locations":[{"ref":"VDF.Core/ScanEngine.cs:151-162","code":"  151 | \t\tvoid TryDatabaseCheckpoint() {\n  152 | \t\t\tif (Settings.DatabaseCheckpointIntervalMinutes <= 0) return;\n  153 | \t\t\tvar interval = TimeSpan.FromMinutes(Settings.DatabaseCheckpointIntervalMinutes);\n  154 | \t\t\tif (DateTime.UtcNow - lastCheckpointTime < interval) return;\n  155 | \t\t\tlock (checkpointLock) {\n  156 | \t\t\t\t// Re-check after acquiring lock to avoid duplicate saves from racing threads\n  157 | \t\t\t\tif (DateTime.UtcNow - lastCheckpointTime < interval) return;\n  158 | \t\t\t\tlastCheckpointTime = DateTime.UtcNow;\n  159 | \t\t\t\tDatabaseUtils.SaveDatabase();\n  160 | \t\t\t\tLogger.Instance.Info(T(\"Log.DatabaseCheckpoint\", DatabaseUtils.Database.Count));\n  161 | \t\t\t}\n  162 | \t\t}","lines":12,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ScanEngine.cs#L151-L162"},{"ref":"VDF.Core/ScanEngine.cs:127","code":"  127 | \t\t\tTryDatabaseCheckpoint();","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ScanEngine.cs#L127"},{"ref":"VDF.Core/Utils/DatabaseUtils.cs:143-152","code":"  143 | \t\tinternal static void SaveDatabase() {\n  144 | \t\t\tLogger.Instance.Info($\"Save scanned files to disk ({Database.Count:N0} files).\");\n  145 | \n  146 | \t\t\tusing (FileStream stream = new(TempDatabasePath, FileMode.Create)) {\n  147 | \t\t\t\tstream.Write(FormatMagic);\n  148 | \t\t\t\tMemoryPackSerializer.SerializeAsync(stream, DbWrapper).AsTask().GetAwaiter().GetResult();\n  149 | \t\t\t}\n  150 | \t\t\t//Reason: ang past the 15s timeout window because WaitForExit(TimeoutDuration) is only checked once and on success path no second WaitForExit happens; minor compared to the bigger issue: the second WaitForExit() (line 76) has no timeout, so if FFprobe writes to stderr but never exits after producing stdout, this blocks forever.","fix":"Bound the post-stream WaitForExit() with a timeout (e.g. WaitForExit(TimeoutDuration)) and kill the process if it does not return.","locations":[{"ref":"VDF.Core/FFTools/FFProbeEngine.cs:73-77","code":"   73 | \t\t\t\tif (!process.WaitForExit(TimeoutDuration))\n   74 | \t\t\t\t\tthrow new TimeoutException($\"FFprobe timed out on file: {file}\");\n   75 | \t\t\t\telse if (extendedLogging)\n   76 | \t\t\t\t\tprocess.WaitForExit(); // Because of asynchronous event handlers, see: https://github.com/dotnet/runtime/issues/18789\n   77 | ","lines":5,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFProbeEngine.cs#L73-L77"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"StartSearch, StartCompare, CleanupDatabase and RetrieveThumbnails are declared 'async void'. Exceptions thrown before/after the awaited work (e.g. PrepareSearch throwing FFNotFoundException, or DatabaseUtils.SaveDatabase throwing) propagate to the synchronization context as unobservable exceptions that callers cannot catch, typically crashing the process. PrepareSearch explicitly throws FFNotFoundException, which an async void StartSearch cannot surface to the caller.","fix":"Return Task from these methods (async Task) so callers can await and observe exceptions, or wrap the bodies in try/catch that routes failures to a fault event. async void should be reserved for event handlers only.","locations":[{"ref":"VDF.Core/ScanEngine.cs:175-204","code":"  175 | \t\tpublic async void StartSearch(bool searchAndCompare = true) {\n  176 | 88 | \t\t\t\t}\n   89 | \t\t\t\tLogger.Instance.Info($\"Importing previously scanned files has failed because of: {ex}\");\n   90 | \t\t\t\ttry {\n   91 | \t\t\t\t\tFile.Move(databaseFile.FullName, Path.ChangeExtension(databaseFile.FullName, \"_DAMAGED.db\"), true);\n   92 | \t\t\t\t}\n   93 | \t\t\t\tcatch (Exception) { }\n   94 | \t\t\t\treturn false;\n   95 | \t\t\t}","lines":16,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/DatabaseUtils.cs#L80-L95"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Constructor swallows the thumbnail-cache provider setup exception with an empty catch that sets Provider=null, but TempDirectory may already be assigned (or not) - if TempExtractionManager.Register threw, TempDirectory stays null and later code (ExportScanResults line 880, StartScanCommand line 1429 reassigns) tolerates null, but InvalidateIfWidthChanged/ThumbPack.Open failures silently disable thumbnails for the whole session with no user feedback or log entry.","fix":"Log the exception (Logger.Instance.Info) inside the catch instead of swallowing it silently.","locations":[{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:331-337","code":"  331 | \t\t\ttry {\n  332 | \t\t\t\tTempDirectory = TempExtractionManager.Register(new(\"VDF-\"));\n  333 | \t\t\t\t// Invalidate thumbnail cache if the configured width has changed\n  334 | \t\t\t\tUtils.ThumbCacheHelpers.InvalidateIfWidthChanged(TempDirectory.Path, SettingsFile.Instance.ThumbnailMaxWidth);\n  335 | \t\t\t\tUtils.ThumbCacheHelpers.Provider = Utils.ThumbPack.Open(TempDirectory.Path);\n  336 | \t\t\t}\n  337 | \t\t\tcatch { Utils.ThumbCacheHelpers.Provider = null; }","lines":7,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L331-L337"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"ExportScanResults sets IsBusy=false inside the catch AND in the finally, but the success path relies only on finally. More importantly, when serialization throws mid-write the partially written 'tmp' is deleted in finally, but if File.Move(tmp, path, overwrite:true) itself throws after a successful serialize, the original 'path' may be left intact while tmp is deleted - acceptable - yet the catch shows the raw exception object via string.Format(...,ex) producing a full stack trace in a user dialog. Low-quality UX error surface.","fix":"Show ex.Message to the user and log the full ex; remove the redundant IsBusy=false in catch since finally already does it.","locations":[{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:901-910","code":"  901 | \t\t\tcatch (Exception ex) {\n  902 | \t\t\t\tIsBusy = false;\n  903 | \t\t\t\tstring error = string.Format(App.Lang[\"Message.ExportScanResultsFailed\"], ex);\n  904 | \t\t\t\tLogger.Instance.Info(error);\n  905 | \t\t\t\tawait MessageBoxService.Show(error);\n  906 | \t\t\t}\n  907 | \t\t\tfinally {\n  908 | \t\t\t\ttry { if (File.Exists(tmp)) File.Delete(tmp); } catch { /* ignore */ }\n  909 | \t\t\t\tIsBusy = false;\n  910 | \t\t\t}","lines":10,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L901-L910"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"BuildPreviewImpl unconditionally sets CanApply = true after building the preview, regardless of whether any rows were produced or selected. The inline comment claims 'Auto-enable apply if there is at least one selected row', but nothing checks Preview.Count or any Selected flag. The Apply button becomes enabled even when the preview is empty (e.g. prefix typo, no scan roots, or no missing files matched). Apply then iterates an empty selection and still rewrites/imports the database for no reason.","fix":"Set CanApply = Preview.Any(p => p.Selected && !string.IsNullOrWhiteSpace(p.NewPath)); after building, instead of unconditional true.","locations":[{"ref":"VDF.GUI/ViewModels/RelocateFilesDialogVM.cs:191-205","code":"  191 | \t\tasync void BuildPreviewImpl() {\n  192 | \t\t\tPreview.Clear();\n  193 | \t\t\tCanApply = false;\n  194 | \t\t\tif (IsModePrefix) {\n  195 | \t\t\t\tBuildPreviewPrefix();\n  196 | \t\t\t}\n  197 | \t\t\telse {\n  198 | \t\t\t\tIsLoading = true;\n  199 | \t\t\t\tawait Task.Run(BuildPreviewRescan);\n  200 | \t\t\t\tIsLoading = false;\n  201 | \t\t\t}\n  202 | \n  203 | \t\t\t// Auto-enable apply if there is at least one selected row\n  204 | \t\t\tCanApply = true;\n  205 | \t\t}","lines":15,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/RelocateFilesDialogVM.cs#L191-L205"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"ThumbnailComparerVM.LoadThumbnailsAsync's retry-wait loop (lines 571-578) busy-polls ApplicationHelpers.MainWindowDataContext every second. ApplicationHelpers.MainWindowDataContext casts MainWindow.DataContext and dereferences ApplicationHelpers.MainWindow which itself force-casts Application.Current.ApplicationLifetime.MainWindow. During shutdown MainWindow can be null/disposed, and these accessors will throw NullReference/InvalidCast inside the loop; the catch only breaks the loop, but the surrounding try only catches OperationCanceledException, so a non-cancellation throw from the property access propagates as an unhandled task exception.","fix":"Wrap the property reads in the loop in try/catch (already partly done) and broaden the outer catch, or capture the MainWindowVM reference once before the loop.","locations":[{"ref":"VDF.GUI/ViewModels/ThumbnailComparerVM.cs:571-596","code":"  571 | \t\t\t\t\twhile (!ct.IsCancellationRequested) {\n  572 | \t\t\t\t\t\ttry {\n  573 | \t\t\t\t\t\t\tif (!ApplicationHelpers.MainWindowDataContext.ShowThumbnailRetrievalProgressBar &&\n  574 | \t\t\t\t\t\t\t\t!ApplicationHelpers.MainWindowDataContext.IsScanning) break;\n  575 | \t\t\t\t\t\t\tawait Task.Delay(1000, ct);\n  576 | \t\t\t\t\t\t}\n  577 | \t\t\t\t\t\tcatch { break; }\n  578 | \t\t\t\t\t}\n  579 | \t\t\t\t\tct.ThrowIfCancellationRequested();\n  580 | \n  581 | \t\t\t\t\t// Final retry now that main window is done\n  582 | \t\t\t\t\tIsLoadingThumbnails = true;\n  583 | \t\t\t\t\tLoadProgress = 0;\n  584 | \t\t\t\t\tthis.RaisePropertyChanged(nameof(LoadProgressText));\n  585 | \t\t\t\t\tIsMessageVisible = false;\n  586 | \n  587 | \t\t\t\t\tawait LoadItemsWithRetry(maxParallel, 1, ct, failed);\n  588 | \t\t\t\t}\n  589 | \n  590 | \t\t\t\tIsLoadingThumbnails = false;\n  591 | \t\t\t\tAssignDefaultSelections();\n  592 | \t\t\t}\n  593 | \t\t\tcatch (OperationCanceledException) {\n  594 | \t\t\t\tIsLoadingThumbnails = false;\n  595 | \t\t\t}\n  596 | \t\t}","lines":26,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/ThumbnailComparerVM.cs#L571-L596"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Both thumbnail endpoints call `Path.GetFullPath(path)` on the raw, attacker/client-controlled `path` query string before any validation. `Path.GetFullPath` throws (ArgumentException for invalid path characters, PathTooLongException, NotSupportedException) on malformed input, producing an unhandled exception and a 500 response instead of a clean 400. A client can trivially trigger this with `?path=` containing null bytes or `|` etc.","fix":"Wrap `Path.GetFullPath(path)` in a try/catch that returns 400 on failure, or validate the path before normalizing. The subsequent whitelist check against `scan.Duplicates` is good, but it must be reached without throwing.","locations":[{"ref":"VDF.Web/Program.cs:108","code":"  108 | \tpath = Path.GetFullPath(path);","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L108"},{"ref":"VDF.Web/Program.cs:144","code":"  144 | \tpath = Path.GetFullPath(path);","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L144"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`CompareCommand` and `ScanAndCompareCommand` write results with `File.WriteAllText(outFile.FullName, output)` with no try/catch. If the output path is not writable (permission denied, directory missing, disk full) the command throws an unhandled exception and returns a nonzero exit via the framework's default handler, but with a raw stack trace rather than a clean error message. CompareCommand additionally does not return an explicit exit code from its action at all (the lambda returns void/Task, not Task<int>), so it always exits 0 even though scan/scan-and-compare were specifically changed to return exit codes.","fix":"Wrap the file write in try/catch, print a clean error to stderr, and return exit code 1. Make CompareCommand's action return an int exit code consistent with the other commands.","locations":[{"ref":"VDF.CLI/Commands/CompareCommand.cs:36-58","code":"   36 | \t\t\tcmd.SetAction(async (parseResult, ct) => {\n   37 | \t\t\t\tvar engine = new ScanEngine();\n   38 | \t\t\t\tSharedOptions.ApplyToSettings(engine.Settings, parseResult);\n   39 | \t\t\t\t// 'compare' has no --include option; without this, the empty include list\n   40 | \t\t\t\t// would make the inclusion filter skip every database entry (0 results, #790).\n   41 | \t\t\t\tif (engine.Settings.IncludeList.Count == 0)\n   42 | \t\t\t\t\tengine.Settings.ScanAgainstEntireDatabase = true;\n   43 | \t\t\t\tScanRunner.WireProgress(engine);\n   44 | \n   45 | \t\t\t\tvar duplicates = await ScanRunner.RunCompareAsync(engine, ct);\n   46 | \n   47 | \t\t\t\tvar format = Enum.TryParse<OutputFormat>(parseResult.GetValue(SharedOptions.Format), true, out var fmt) ? fmt : OutputFormat.Text;\n   48 | \t\t\t\tvar outFile = parseResult.GetValue(SharedOptions.Output);\n   49 | \t\t\t\tstring output = ResultFormatter.Format(duplicates, format);\n   50 | \n   51 | \t\t\t\tif (outFile != null) {\n   52 | \t\t\t\t\tFile.WriteAllText(outFile.FullName, output);\n   53 | \t\t\t\t\tConsole.Error.WriteLine($\"Results written to: {outFile.FullName}\");\n   54 | \t\t\t\t}\n   55 | \t\t\t\telse {\n   56 | \t\t\t\t\tConsole.Write(output);\n   57 | \t\t\t\t}\n   58 | \t\t\t});","lines":23,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Commands/CompareCommand.cs#L36-L58"},{"ref":"VDF.CLI/Commands/ScanAndCompareCommand.cs:86-94","code":"   86 | \t\tstatic void WriteOutput(string content, FileInfo? outFile) {\n   87 | \t\t\tif (outFile != null) {\n   88 | \t\t\t\tFile.WriteAllText(outFile.FullName, content);\n   89 | \t\t\t\tConsole.Error.WriteLine($\"Results written to: {outFile.FullName}\");\n   90 | \t\t\t}\n   91 | \t\t\telse {\n   92 | \t\t\t\tConsole.Write(content);\n   93 | \t\t\t}\n   94 | \t\t}","lines":9,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Commands/ScanAndCompareCommand.cs#L86-L94"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"FFProbeEngine.GetMediaInfo references process.StartInfo.ArgumentList at line 95 to build the diagnostic message inside the post-catch logging block; this is fine, but the message-building only happens when extendedLogging is true while the condition to log (errOut.Length>0) can be true even without extended logging in the mediaInfo!=null WARNING case. Since errOut is only ever appended to under extendedLogging or in the catch, a non-extended success can still produce errOut via the catch (line 84) - then logs a WARNING/ERROR without the args, which is intended, so low. Real issue: ReadToEnd vs CopyTo - GetMediaInfo reads stdout to a MemoryStream while not reading stderr unless extendedLogging, so a large stderr (not redirected) is fine; consistent.","fix":"No change required; documented for completeness. If desired, always capture stderr like FfmpegEngine.GetThumbnail for debuggability.","locations":[{"ref":"VDF.Core/FFTools/FFProbeEngine.cs:92-98","code":"   92 | \t\t\tif (mediaInfo == null || errOut.Length > 0) {\n   93 | \t\t\t\tstring message = $\"{((mediaInfo == null) ? \"ERROR: Failed to retrieve\" : \"WARNING: Problems while retrieving\")} media info from: {file}\";\n   94 | \t\t\t\tif (extendedLogging) {\n   95 | \t\t\t\t\tvar args = string.Join(\" \", process.StartInfo.ArgumentList);\n   96 | \t\t\t\t\tmessage += $\":{Environment.NewLine}{FFprobePath} {args}\";\n   97 | \t\t\t\t}\n   98 | \t\t\t\tLogger.Instance.Info($\"{message}{errOut}\");","lines":7,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFProbeEngine.cs#L92-L98"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"FFProbeJsonReader casts dictionary values with hard casts: (int)streams[i]['width'], (string)streams[i]['codec_name'], (string)format['bit_rate'], etc. The dictionary stores int, long, bool, string or a placeholder 'new object()' (when a key appeared as PropertyName but its value token type was unhandled, e.g. an array/object value like 'disposition'). If FFprobe emits width as a string, or a key like 'bit_rate' arrives as a number rather than string, these casts throw InvalidCastException and the whole probe fails. e.g. long.TryParse((string)streams[i]['bit_rate']) at line 172 throws if bit_rate was parsed as a Number into an int/long.","fix":"Use pattern matching / TryGetValue with type checks (value is string s) before casting, defaulting gracefully when the stored type differs.","locations":[{"ref":"VDF.Core/FFTools/FFProbeJsonReader.cs:172-196","code":"  172 | \t\t\t\tif (streams[i].ContainsKey(\"bit_rate\") && long.TryParse((string)streams[i][\"bit_rate\"], out var bitrate)) {\n  173 | \t\t\t\t\tfoundBitRate = true;\n  174 | \t\t\t\t\tinfo.Streams[i].BitRate = bitrate;\n  175 | \t\t\t\t}\n  176 | \t\t\t\tif (streams[i].ContainsKey(\"width\"))\n  177 | \t\t\t\t\tinfo.Streams[i].Width = (int)streams[i][\"width\"];\n  178 | \t\t\t\tif (streams[i].ContainsKey(\"height\"))\n  179 | \t\t\t\t\tinfo.Streams[i].Height = (int)streams[i][\"height\"];\n  180 | \t\t\t\tif (streams[i].ContainsKey(\"codec_name\"))\n  181 | \t\t\t\t\tinfo.Streams[i].CodecName = (string)streams[i][\"codec_name\"];\n  182 | \t\t\t\tif (streams[i].ContainsKey(\"codec_long_name\"))\n  183 | \t\t\t\t\tinfo.Streams[i].CodecLongName = (string)streams[i][\"codec_long_name\"];\n  184 | \t\t\t\tif (streams[i].ContainsKey(\"codec_type\"))\n  185 | \t\t\t\t\tinfo.Streams[i].CodecType = (string)streams[i][\"codec_type\"];\n  186 | \t\t\t\tif (streams[i].ContainsKey(\"channel_layout\"))\n  187 | \t\t\t\t\tinfo.Streams[i].ChannelLayout = (string)streams[i][\"channel_layout\"];\n  188 | \t\t\t\tif (streams[i].ContainsKey(\"channels\"))\n  189 | \t\t\t\t\tinfo.Streams[i].Channels = (int)streams[i][\"channels\"];\n  190 | \n  191 | \t\t\t\tif (streams[i].ContainsKey(\"pix_fmt\"))\n  192 | \t\t\t\t\tinfo.Streams[i].PixelFormat = (string)streams[i][\"pix_fmt\"];\n  193 | \t\t\t\tif (streams[i].ContainsKey(\"sample_rate\") && int.TryParse((string)streams[i][\"sample_rate\"], out var sample_rate))\n  194 | \t\t\t\t\tinfo.Streams[i].SampleRate = sample_rate;\n  195 | \t\t\t\tif (streams[i].ContainsKey(\"index\"))\n  196 | \t\t\t\t\tinfo.Streams[i].Index = ((int)streams[i][\"index\"]).ToString();","lines":25,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFProbeJsonReader.cs#L172-L196"},{"ref":"VDF.Core/FFTools/FFProbeJsonReader.cs:214","code":"  214 | \t\t\tif (!foundBitRate && info.Streams.Length > 0 && format.ContainsKey(\"bit_rate\") && long.TryParse((string)format[\"bit_rate\"], out var formatBitrate))","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFProbeJsonReader.cs#L214"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"FfmpegEngine.EncodeJpegFromBgra CLI fallback writes the entire input synchronously (process.StandardInput...Write of width*height*4 bytes) and uses readTask.Wait(TimeoutDuration) but ignores its result; if the read task times out it proceeds to WaitForExit and may read a truncated/empty ms producing a wrong JPEG, and the writing thread can still block on a full pipe if the async read stalled. The timeout on readTask is not propagated as a failure.","fix":"Check readTask.Wait result and the WaitForExit result; treat timeout as failure and kill the process before returning.","locations":[{"ref":"VDF.Core/FFTools/FfmpegEngine.cs:780-792","code":"  780 | \t\t\t\tusing var ms = new MemoryStream();\n  781 | \t\t\t\t// Write input and read output concurrently to avoid pipe-buffer deadlocks.\n  782 | \t\t\t\tvar readTask = process.StandardOutput.BaseStream.CopyToAsync(ms);\n  783 | \t\t\t\tprocess.StandardInput.BaseStream.Write(bgra, 0, width * height * 4);\n  784 | \t\t\t\tprocess.StandardInput.BaseStream.Flush();\n  785 | \t\t\t\tprocess.StandardInput.Close();\n  786 | \t\t\t\treadTask.Wait(TimeoutDuration);\n  787 | \t\t\t\tif (!process.WaitForExit(TimeoutDuration))\n  788 | \t\t\t\t\tthrow new TimeoutException(\"FFmpeg timed out encoding JPEG from raw pixels.\");\n  789 | \t\t\t\tif (process.ExitCode != 0)\n  790 | \t\t\t\t\tthrow new FFInvalidExitCodeException($\"FFmpeg exited with: {process.ExitCode}\");\n  791 | \t\t\t\tbyte[] jpeg = ms.ToArray();\n  792 | \t\t\t\treturn jpeg.Length > 0 ? jpeg : null;","lines":13,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FfmpegEngine.cs#L780-L792"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"ExportDatabaseToJson / ImportDatabaseFromJson are not atomic. Export uses File.Create directly on the target path; a crash or serialization failure mid-write leaves a truncated/corrupt JSON export overwriting any previous good file. AtomicJsonWriter exists in the same Utils namespace precisely for this, but the database export does not use it (the import then fails on the corrupt file).","fix":"Write the export via AtomicJsonWriter (temp file + atomic rename) so a failed export cannot clobber a previously valid one.","locations":[{"ref":"VDF.Core/Utils/DatabaseUtils.cs:172-191","code":"  172 | \t\tinternal static bool ExportDatabaseToJson(string jsonFile, JsonSerializerOptions options) {\n  173 | \t\t\ttry {\n  174 | \t\t\t\t// File.Create, not OpenWrite: overwriting a previously larger export with\n  175 | \t\t\t\t// OpenWrite leaves trailing garbage that breaks re-import.\n  176 | \t\t\t\tusing var stream = File.Create(jsonFile);\n  177 | \t\t\t\tJsonSerializer.Serialize(stream, DbWrapper, options.WriteIndented\n  178 | \t\t\t\t\t? CoreJsonPrettyContext.Default.DatabaseWrapper\n  179 | \t\t\t\t\t: CoreJsonContext.Default.DatabaseWrapper);\n  180 | \t\t\t\tstream.Close();\n  181 | \t\t\t}\n  182 | \t\t\tcatch (JsonException e) {\n  183 | \t\t\t\tLogger.Instance.Info($\"Failed to serialize database to json because: {e}\");\n  184 | \t\t\t\treturn false;\n  185 | \t\t\t}\n  186 | \t\t\tcatch (Exception e) {\n  187 | \t\t\t\tLogger.Instance.Info($\"Failed to export database to json because: {e}\");\n  188 | \t\t\t\treturn false;\n  189 | \t\t\t}\n  190 | \t\t\treturn true;\n  191 | \t\t}","lines":20,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/DatabaseUtils.cs#L172-L191"},{"ref":"VDF.Core/Utils/AtomicJsonWriter.cs:26-48","code":"   26 | \tpublic static class AtomicJsonWriter {\n   27 | \t\t// Only the JsonTypeInfo overload exists: the JsonSerializerOptions-based one\n   28 | \t\t// carried RequiresUnreferencedCode and was unused.\n   29 | \t\tpublic static async Task WriteAsync<T>(\n   30 | \t\t\tstring path,\n   31 | \t\t\tT value,\n   32 | \t\t\tSystem.Text.Json.Serialization.Metadata.JsonTypeInfo<T> typeInfo,\n   33 | \t\t\tCancellationToken ct = default) {\n   34 | \n   35 | \t\t\tstring dir = Path.GetDirectoryName(path)!;\n   36 | \t\t\tstring tmp = Path.Combine(dir, Path.GetFileName(path) + \".tmp\");\n   37 | \n   38 | \t\t\ttry {\n   39 | \t\t\t\tawait using (var fs = new FileStream(tmp, FileMode.Create, FileAccess.Write, FileShare.None, 64 * 1024, useAsync: true)) {\n   40 | \t\t\t\t\tawait JsonSerializer.SerializeAsync(fs, value, typeInfo, ct);\n   41 | \t\t\t\t}\n   42 | \t\t\t\tFile.Move(tmp, path, overwrite: true);\n   43 | \t\t\t}\n   44 | \t\t\tfinally {\n   45 | \t\t\t\ttry { if (File.Exists(tmp)) File.Delete(tmp); } catch { /* ignore */ }\n   46 | \t\t\t}\n   47 | \t\t}\n   48 | \t}","lines":23,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/AtomicJsonWriter.cs#L26-L48"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"ExifReader JPEG segment walk assumes every marker after SOI carries a 2-byte length. It does not skip JPEG fill bytes (a run of 0xFF before a marker is legal) - the `if (hdr[0] != 0xFF) return null;` aborts parsing the moment a fill byte lands in hdr[0]. It also treats standalone markers (RSTn 0xD0-0xD7, TEM 0x01) as length-prefixed. In practice these rarely appear in the APPn header region, but a conformant-but-padded JPEG can cause EXIF extraction to silently fail (date-taken lost).","fix":"Before reading marker+length, consume any run of 0xFF fill bytes; and skip the length read for standalone markers (0x01, 0xD0-0xD7) instead of treating them as segments.","locations":[{"ref":"VDF.Core/Utils/ExifReader.cs:84-102","code":"   84 | \t\t\tif (sig[0] == 0xFF && sig[1] == 0xD8) {\n   85 | \t\t\t\tfs.Position = 2;\n   86 | \t\t\t\tSpan<byte> hdr = stackalloc byte[4];\n   87 | \t\t\t\twhile (true) {\n   88 | \t\t\t\t\tif (fs.Read(hdr) < 4) return null;\n   89 | \t\t\t\t\tif (hdr[0] != 0xFF) return null;\n   90 | \t\t\t\t\tbyte marker = hdr[1];\n   91 | \t\t\t\t\tif (marker == 0xDA || marker == 0xD9) return null; // start of scan / EOI — no EXIF\n   92 | \t\t\t\t\tint segLen = (hdr[2] << 8 | hdr[3]) - 2;\n   93 | \t\t\t\t\tif (segLen < 0) return null;\n   94 | \t\t\t\t\tif (marker == 0xE1 && segLen >= 6) {\n   95 | \t\t\t\t\t\tbyte[] seg = new byte[segLen];\n   96 | \t\t\t\t\t\tfs.ReadExactly(seg, 0, segLen);\n   97 | \t\t\t\t\t\tif (seg[0] == 'E' && seg[1] == 'x' && seg[2] == 'i' && seg[3] == 'f' && seg[4] == 0 && seg[5] == 0)\n   98 | \t\t\t\t\t\t\treturn seg[6..];\n   99 | \t\t\t\t\t\tcontinue; // some encoders emit XMP in an earlier APP1 — keep scanning\n  100 | \t\t\t\t\t}\n  101 | \t\t\t\t\tfs.Position += segLen;\n  102 | \t\t\t\t}","lines":19,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/ExifReader.cs#L84-L102"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"FileUtils.IsOnSameFileSystem returns true on any exception ('assume same filesystem'), and GetMountPoint falls back to '/' for unmatched paths. On a misconfigured DriveInfo enumeration this makes MoveToTrash believe a cross-volume file is local, then File.Move throws (caught) and trashing fails - acceptable - but the optimistic default could also let a genuinely cross-device move be attempted, doing a slow copy+delete via File.Move's fallback for the trash path. Behavior is safe-ish but the optimistic default partly defeats the cross-filesystem guard the function exists to provide.","fix":"On error prefer the conservative answer (return false, i.e. skip trash and fall back to permanent delete) rather than assuming same filesystem, so the cross-volume guard is not silently bypassed.","locations":[{"ref":"VDF.Core/Utils/FileUtils.cs:286-305","code":"  286 | \t\tinternal static bool IsOnSameFileSystem(string path1, string path2) {\n  287 | \t\t\ttry {\n  288 | \t\t\t\tstring fullPath1 = Path.GetFullPath(path1);\n  289 | \t\t\t\tstring fullPath2 = Path.GetFullPath(path2);\n  290 | \t\t\t\tvar drives = DriveInfo.GetDrives();\n  291 | \t\t\t\treturn GetMountPoint(fullPath1, drives) == GetMountPoint(fullPath2, drives);\n  292 | \t\t\t}\n  293 | \t\t\tcatch {\n  294 | \t\t\t\treturn true; // assume same filesystem on error — let File.Move decide\n  295 | \t\t\t}\n  296 | \t\t}\n  297 | \n  298 | \t\tstatic string GetMountPoint(string fullPath, DriveInfo[] drives) {\n  299 | \t\t\tstring bestMatch = \"/\";\n  300 | \t\t\tforeach (var drive in drives) {\n  301 | \t\t\t\tif (fullPath.StartsWith(drive.Name, StringComparison.Ordinal) && drive.Name.Length > bestMatch.Length)\n  302 | \t\t\t\t\tbestMatch = drive.Name;\n  303 | \t\t\t}\n  304 | \t\t\treturn bestMatch;\n  305 | \t\t}","lines":20,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/FileUtils.cs#L286-L305"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Logger uses a non-thread-safe singleton: `instance ??= new Logger()` in the Instance getter is a read lComparerVM.cs#L432-L484"},{"ref":"VDF.GUI/ViewModels/ThumbnailComparerVM.cs:706-745","code":"  706 | \t\tpublic Bitmap? ExtractFrameAtOffset(int thumbnailIndex, int offset) {\n  707 | \t\t\tif (offset == 0) return GetFrame(thumbnailIndex);\n  708 | \n  709 | \t\t\tvar key = (thumbnailIndex, offset);\n  710 | \t\t\tlock (_offsetFrameCache) {\n  711 | \t\t\t\tif (_offsetFrameCache.TryGetValue(key, out var cached))\n  712 | \t\t\t\t\treturn cached;\n  713 | \t\t\t}\n  714 | \n  715 | \t\t\tif (Item.ItemInfo.IsImage) return GetFrame(thumbnailIndex);\n  716 | \t\t\tif (thumbnailIndex < 0 || thumbnailIndex >= Item.ItemInfo.ThumbnailTimestamps.Count)\n  717 | \t\t\t\treturn null;\n  718 | \n  719 | \t\t\tvar fps = Item.ItemInfo.Fps;\n  720 | \t\t\tif (fps <= 0) fps = 30;\n  721 | \t\t\tvar baseTimestamp = Item.ItemInfo.ThumbnailTimestamps[thumbnailIndex];\n  722 | \t\t\tvar targetTimestamp = baseTimestamp + TimeSpan.FromSeconds(offset / (double)fps);\n  723 | \n  724 | \t\t\tif (targetTimestamp < TimeSpan.Zero) targetTimestamp = TimeSpan.Zero;\n  725 | \t\t\tif (Item.ItemInfo.Duration > TimeSpan.Zero && targetTimestamp > Item.ItemInfo.Duration)\n  726 | \t\t\t\ttargetTimestamp = Item.ItemInfo.Duration;\n  727 | \n  728 | \t\t\tvar b = FfmpegEngine.GetThumbnail(new FfmpegSettings {\n  729 | \t\t\t\tFile = Item.ItemInfo.Path,\n  730 | \t\t\t\tPosition = targetTimestamp,\n  731 | \t\t\t\tGrayScale = 0,\n  732 | \t\t\t\tFullsize = 1\n  733 | \t\t\t}, SettingsFile.Instance.ExtendedFFToolsLogging);\n  734 | \n  735 | \t\t\tBitmap? bmp = null;\n  736 | \t\t\tif (b != null && b.Length > 0) {\n  737 | \t\t\t\tusing var byteStream = new MemoryStream(b);\n  738 | \t\t\t\tbmp = new Bitmap(byteStream);\n  739 | \t\t\t}\n  740 | \n  741 | \t\t\tlock (_offsetFrameCache) {\n  742 | \t\t\t\t_offsetFrameCache[key] = bmp;\n  743 | \t\t\t}\n  744 | \t\t\treturn bmp;\n  745 | \t\t}","lines":40,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/ThumbnailComparerVM.cs#L706-L745"}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"MessageBoxService.Show busy-waits 'while (ApplicationHelpers.MainWindow == null) await Task.Delay(500)'. ApplicationHelpers.MainWindow force-casts Application.Current.ApplicationLifetime.MainWindow with '!' - if MainWindow is genuinely never set (headless/test/early startup) this loops forever; and the cast can throw NullReferenceException via the '!' on ApplicationLifetime before the null check on MainWindow ever helps. There is no timeout.","fix":"Add a bounded retry/timeout and null-check ApplicationLifetime; the MainWindow accessor itself can throw rather than return null.","locations":[{"ref":"VDF.GUI/Views/MessageBoxView.xaml.cs:30-32","code":"   30 | \t\t\twhile (ApplicationHelpers.MainWindow == null) {\n   31 | \t\t\t\tawait Task.Delay(500);\n   32 | \t\t\t}","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Views/MessageBoxView.xaml.cs#L30-L32"},{"ref":"VDF.GUI/ApplicationHelpers.cs:25-26","code":"   25 | \t\tpublic static MainWindow MainWindow =>\n   26 | \t\t\t(MainWindow)((IClassicDesktopStyleApplicationLifetime)Application.Current!.ApplicationLifetime!)!.MainWindow!;","lines":2,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ApplicationHelpers.cs#L25-L26"}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`AuthService.LoadOrGeneratePassword` and `SavePassword` swallow all exceptions with empty `catch { }`. If the credentials file is corrupt, a new password is silently generated (existing sessions/expectations broken with no log). If `SavePassword` fails (e.g. read-only config dir), the generated password is used for this run but not persisted, so it silently changes on every restart with no diagnostic. At minimum these should log.","fix":"Log a warning in the catch blocks (the class already has an ILogger) so administrators can diagnose why the password keeps changing or won't persist.","locations":[{"ref":"VDF.Web/Services/AuthService.cs:117","code":"  117 | \t\t\t\tcatch { }","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/AuthService.cs#L117"},{"ref":"VDF.Web/Services/AuthService.cs:126-133","code":"  126 | \t\tvoid SavePassword(string password) {\n  127 | \t\t\ttry {\n  128 | \t\t\t\tDirectory.CreateDirectory(Path.GetDirectoryName(_credentialsPath)!);\n  129 | \t\t\t\tFile.WriteAllText(_credentialsPath,\n  130 | \t\t\t\t\tJsonSerializer.Serialize(new StoredCredentials { Password = password }, WebJsonContext.Default.StoredCredentials));\n  131 | \t\t\t}\n  132 | \t\t\tcatch { }\n  133 | \t\t}","lines":8,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/AuthService.cs#L126-L133"}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`FFmpegSetupService.DownloadFfmpegAsync` only catches `HttpRequestException` inside the per-plan loop (line 140). A failure during checksum verification (`InvalidOperationException` on mismatch), extraction (`IOException`), or file copy throws out of the loop to the outer catch (line 149), aborting all remaining plans even though a different plan/mirror might succeed. The loop's intent (try multiple plans) is defeated for any non-network failure, and a genuine checksum-mismatch (possible tampering) is reported as a generic 'FFmpeg setup failed' rather than the specific security-relevant message.","fix":"Catch a broader exception type per-plan (record lastError and continue), but surface checksum-mismatch distinctly so a tampered download is not silently retried/ma Hash}, got {actualHash}. The download may be corrupted or tampered with.\");","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/FFmpegSetupService.cs#L320-L322"}]},{"id":"ERR_24","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`VerifyChecksumAsync` treats a missing checksums file or a missing entry as a soft warning and proceeds with the install (lines 310-313, 324-327). Combined with the per-plan exception handling above, the checksum verification is effectively best-effort: an attacker who can serve the archive but suppress/alter checksums.sha256 bypasses verification entirely. The comment says the archive 'is checksum-verified' (FFmpegSetupService.cs:369) but that guarantee does not hold when the checksum step is skipped.","fix":"If integrity is a real requirement, fail the install when the checksum cannot be verified (or pin known-good hashes). At minimum correct the misleading comment that claims the archive is always checksum-verified.","locations":[{"ref":"VDF.Web/Services/FFmpegSetupService.cs:310-313","code":"  310 | \t\t\tif (expectedHash == null) {\n  311 | \t\t\t\t// Archive not listed in checksums file — warn but continue\n  312 | \t\t\t\tLogger.Instance.Info($\"FFmpeg download: no checksum entry found for '{archiveFileName}', skipping verification\");\n  313 | \t\t\t\treturn;","lines":4,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/FFmpegSetupService.cs#L310-L313"},{"ref":"VDF.Web/Services/FFmpegSetupService.cs:324-327","code":"  324 | \t\tcatch (HttpRequestException) {\n  325 | \t\t\t// Checksums file not available — warn but continue (don't block install)\n  326 | \t\t\tLogger.Instance.Info(\"FFmpeg download: could not fetch checksums.sha256, skipping verification\");\n  327 | \t\t}","lines":4,"link":"https://github.com/0x90d/videodupl abel":"Api Misuse","severity":"medium","easy":false,"description":"AudioStreamDecoder.ConvertAndDeliver sizes the output buffer as outSamples*2 bytes (line 216) assuming exactly 1 output channel (mono). This is correct for the configured mono output but is implicit and brittle: swr_get_out_samples returns per-channel samples; if TargetChannels/out layout ever changes to >1 the buffer underflows and swr_convert writes past _outBuf, corrupting memory. The '2' conflates 's16 bytes-per-sample' with 'mono channel count'.","fix":"Compute bytes as outSamples * bytesPerSample * outChannels and the short span as converted * outChannels; derive channel count from the configured out layout.","locations":[{"ref":"VDF.Core/FFTools/FFmpegNative/AudioStreamDecoder.cs:213-229","code":"  213 | \t\t\tint outSamples = ffmpeg.swr_get_out_samples(_pSwrContext, inputSamples);\n  214 | \t\t\tif (outSamples <= 0) return 0;\n  215 | \n  216 | \t\t\tint requiredBytes = outSamples * 2; // s16 = 2 bytes per sample\n  217 | \t\t\tif (_outBuf.Length < requiredBytes)\n  218 | \t\t\t\t_outBuf = new byte[requiredBytes];\n  219 | \n  220 | \t\t\tint converted;\n  221 | \t\t\tfixed (byte* outPtr = _outBuf) {\n  222 | \t\t\t\tbyte* outBuf = outPtr;\n  223 | \t\t\t\tconverted = ffmpeg.swr_convert(_pSwrContext,\n  224 | \t\t\t\t\t&outBuf, outSamples,\n  225 | \t\t\t\t\tinputData, inputSamples);\n  226 | \t\t\t}\n  227 | \t\t\tif (converted <= 0) return 0;\n  228 | \n  229 | \t\t\tvar span = MemoryMarshal.Cast<byte, short>(_outBuf.AsSpan(0, converted * 2));","lines":17,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFmpegNative/AudioStreamDecoder.cs#L213-L229"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"VideoStreamDecoder constructor allocates _pReceivedFrame BEFORE avformat_open_input but the av_hwdevice_ctx_create at line 62 writes into &_pCodecContext->hw_device_ctx t frame has been downloaded with av_hwframe_transfer_data — only then\n   72 | \t\t\t// do we know the real sw_format (e.g. P010LE for 10-bit HEVC vs NV12 for\n   73 | \t\t\t// 8-bit). Guessing before decode breaks 10-bit content.\n   74 | \t\t\tPixelFormat = HWDeviceType == AVHWDeviceType.AV_HWDEVICE_TYPE_NONE\n   75 | \t\t\t\t? _pCodecContext->pix_fmt\n   76 | \t\t\t\t: AVPixelFormat.AV_PIX_FMT_NONE;\n   77 | \t\t\tIsHardwareDecode = HWDeviceType != AVHWDeviceType.AV_HWDEVICE_TYPE_NONE;","lines":20,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFmpegNative/VideoStreamDecoder.cs#L58-L77"},{"ref":"VDF.Core/FFTools/FFmpegNative/VideoStreamDecoder.cs:209-211","code":"  209 | \t\t\tif (_pCodecContext->hw_device_ctx != null) {\n  210 | \t\t\t\tffmpeg.av_hwframe_transfer_data(_pReceivedFrame, _pFrame, 0).ThrowExceptionIfError();\n  211 | \t\t\t\tframe = *_pReceivedFrame;","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFmpegNative/VideoStreamDecoder.cs#L209-L211"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"VideoStreamDecoder.TryDecodeFrame: after the seek-and-decode loop reaches maxIterations without ever hitting the target PTS or breaking, control falls through to the hw-transfer/return-true block at line 209-216 and returns the last decoded frame as success even though the target position was never reached. Also if the for-loop exits via exhausting iterations with _pFrame unref'd (line 206), frame may reference an unref'd (empty) frame yet still return true.","fix":"On loop exhaustion, return false (or verify _pFrame has valid data) instead of falling through to a success return.","locations":[{"ref":"VDF.Core/FFTools/FFmpegNative/VideoStreamDecoder.cs:157-216","code":"  157 | \t\t\tfor (int iter = 0; iter < maxIterations; iter++) {\n  158 | \t\t\t\tint e  \t\t\t}\n  208 | \n  209 | \t\t\tif (_pCodecContext->hw_device_ctx != null) {\n  210 | \t\t\t\tffmpeg.av_hwframe_transfer_data(_pReceivedFrame, _pFrame, 0).ThrowExceptionIfError();\n  211 | \t\t\t\tframe = *_pReceivedFrame;\n  212 | \t\t\t}\n  213 | \t\t\telse\n  214 | \t\t\t\tframe = *_pFrame;\n  215 | \n  216 | \t\t\treturn true;","lines":60,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFmpegNative/VideoStreamDecoder.cs#L157-L216"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"ThumbPack.OpenKey opens a brand-new FileStream on _packPath for every call and wraps it in a StreamSlice with leaveOpen:true. Because leaveOpen is true, StreamSlice.Dispose never closes that FileStream. Each Thumbnail load that misses the LRU cache opens a file handle that is leaked until process exit / finalization. With many thumbnails this exhausts file handles.","fix":"Pass leaveOpen:false so the per-key FileStream is closed when the StreamSlice (and the Bitmap that consumed it) is disposed, or read the slice into a MemoryStream and return that.","locations":[{"ref":"VDF.GUI/Utils/ThumbnailStore.cs:159-165","code":"  159 | \t\tpublic Stream? OpenKey(string key) {\n  160 | \t\t\tlock (_gate) {\n  161 | \t\t\t\tif (!_idx.TryGetValue(key, out var e)) return null;\n  162 | \t\t\t\tvar rfs = new FileStream(_packPath, FileMode.Open, FileAccess.Read, FileShare.ReadWrite, 128 * 1024, useAsync: false);\n  163 | \t\t\t\treturn new StreamSlice(rfs, e.off, e.len, leaveOpen: true);\n  164 | \t\t\t}\n  165 | \t\t}","lines":7,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Utils/ThumbnailStore.cs#L159-L165"},{"ref":"VDF.GUI/Utils/ThumbnailStore.cs:194-224","code":"  194 | \t\tpublic StreamSlice(FileStream fs, long start, int len, bool leaveOpen) {\n  195 | \t\t\t_fs = fs; _start = start; _len = len; _pos = 0; _leaveOpen = leaveOpen;\n  196 | \t\t}\n  197 | \t\tpublic override bool CanRead => true;\n  198 | \t\tpublic override bool CanSeek => true;\n  199 | \t\tpublic override bool CanWrite => false;\n  200 | \t\tpublic override long Length => _len;\n  201 | \t\tpublic override long Position { get => _pos; set => Seek(value, SeekOrigin.Begin); }\n  202 | \t\tpublic override void Flush() { }\n  203 | \t\tpublic override int Read(byte[] buffer, int offset, int count) {\n  204 | \t\t\tcount = (int)Math.Min(count, _len - _pos);\n  205 | \t\t\tif (count <= 0) return 0;\n  206 | \t\t\tlock (_fs) {\n  207 | \t\t\t\t_fs.Seek(_start + _pos, SeekOrigin.Begin);\n  208 | \t\t\t\tint n = _fs.Read(buffer, offset, count);\n  209 | \t\t\t\t_pos += n; return n;\n  210 | \t\t\t}\n  211 | \t\t}\n  212 | \t\tpublic override long Seek(long offset, SeekOrigin origin) {\n  213 | \t\t\tlong np = origin switch {\n  214 | \t\t\t\tSeekOrigin.Begin => offset,\n  215 | \t\t\t\tSeekOrigin.Current => _pos + offset,\n  216 | \t\t\t\tSeekOrigin.End => _len + offset,\n  217 | \t\t\t\t_ => _pos\n  218 | \t\t\t};\n  219 | \t\t\t_pos = Math.Max(0, Math.Min(_len, np));\n  220 | \t\t\treturn _pos;\n  221 | \t\t}\n  222 | \t\tpublic override void SetLength(long value) => throw new NotSupportedException();\n  223 | \t\tpublic override void Write(byte[] buffer, int offset, int count) => throw new NotSupportedException();\n  224 | \t\tprotected override void Dispose(bool disposing) { if (!disposing || _leaveOpen) return; try { _fs.Dispose(); } catch { } }","lines":31,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Utils/ThumbnailStore.cs#L194-L224"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"ImportScanResultsIncludingThumbnails opens the file twice: File.OpenRead(path) into 'stream' (used for nothing except stream.Close() at line 986) and ZipFile.OpenRead(path) into 'zip'. The 'stream' is opened with default sharing and held in a using for the whole method but never read; it only serves to be closed. On the JsonException/Exception catch paths 'stream' is disposed by using, but the dead handle can block other access during the import and is pure confusion.","fix":"Remove the unused File.OpenRead(path)/stream entirely; ZipFile.OpenRead already opens the file.","locations":[{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:937","code":"  937 | \t\t\t\tusing var stream = File.OpenRead(path);","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L937"},{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:986","code":"  986 | \t\t\t\tstream.Close();","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L986"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`AppDomain.CurrentDomain.UnhandledException` and `TaskScheduler.UnobservedTaskException` are wired to a single shared singleton `ScanService.SetError`, routing ALL process-wide unhandled/unobserved exceptions into the scan UI as a scan error. An unrelated background exception (e.g. from the FFmpeg download task, or any library) will flip the scan State to Error and overwrite ErrorMessage even when no scan is running, producing misleading UI state. `UnhandledException` for a truly unhandled exception also does not prevent process termination — the handler runs but the process still crashes.","fix":"Only surface the error in the UI when a scan is actually running (guard on State), and scope the handlers more narrowly. Do not assume every unobserved task exception belongs to the scan.","locations":[{"ref":"VDF.Web/Program.cs:38-49","code":"   38 | AppDomain.CurrentDomain.UnhandledException += (_, e) => {\n   39 | \tvar ex = e.ExceptionObject as Exception\n   40 | \t\t?? new Exception(e.ExceptionObject?.ToString() ?? \"Unknown error\");\n   41 | \tapp.Logger.LogError(ex, \"Unhandled exception in background thread\");\n   42 | \tscanService.SetError(ex);\n   43 | };\n   44 | \n   45 | TaskScheduler.UnobservedTaskException += (_, e) => {\n   46 | \tapp.Logger.LogError(e.Exception, \"Unobserved task exception\");\n   47 | \tscanService.SetError(e.Exception);\n   48 | \te.SetObserved();\n   49 | };","lines":12,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L38-L49"},{"ref":"VDF.Web/Services/ScanService.cs:128-134","code":"  128 | \t\t/// <summary>Called from global exception handlers to surface post-await async void exceptions.<\/summary>\n  129 | \t\tpublic void SetError(Exception ex) {\n  130 | \t\t\tState = ScanState.Error;\n  131 | \t\t\tErrorMessage = ex.Message;\n  132 | \t\t\tLastProgress = null;\n  133 | \t\t\tNotify();\n  134 | \t\t}","lines":7,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/ScanService.cs#L128-L134"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"The two thumbnail `Task.Run(() => ScanEngine.ExtractThumbnailJpeg(...))` calls have no cache stampede protection: concurrent requests for the same uncached cacheKey each spawn their own FFmpeg extraction (CPU/IO heavy) and then all `TryAdd` the same key. The scan-thread may also be mutating `scan.Duplicates` (a `HashSet`, see ScanService.Duplicates) while these endpoints enumerate it via `FirstOrDefault`; HashSet is not thread-safe for concurrent read+write and `FirstOrDefault` can throw `InvalidOperationException` (collection modified) if a thumbnail request arrives during an active scan.","fix":"Snapshot or lock around `scan.Duplicates` reads, or expose a thread-safe lookup on ScanService. Consider a per-key async lock to coalesce duplicate extractions.","locations":[{"ref":"VDF.Web/Program.cs:109","code":"  109 | \tvar item = scan.Duplicates.FirstOrDefault(d => d.Path == path);","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L109"},{"ref":"VDF.Web/Program.cs:127","code":"  127 | \t\tjpeg = await Task.Run(() => ScanEngine.ExtractThumbnailJpeg(path, position, width, quality));","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L127"},{"ref":"VDF.Web/Program.cs:145","code":"  145 | \tvar item = scan.Duplicates.FirstOrDefault(d => d.Path == path);","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L145"},{"ref":"VDF.Web/Program.cs:155","code":"  155 | \t\tjpeg = await Task.Run(() => ScanEngine.ExtractThumbnailJpeg(path, position, 0));","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L155"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`ScanService.RemoveFromResults`, `DropSingletonGroups`, and the file-op methods mutate `_engine.Duplicates` (a non-thread-safe `HashSet`) from background `Task.Run` threads and Blazor render threads, while the thumbnail/CSV-export HTTP endpoints read the same `HashSet` concurrently. There is no locking around the shared `HashSet`. Concurrent enumeration + mutation can throw `InvalidOperationException` or corrupt the set. The class is a registered singleton shared across all connections, so this is reachable whenever a user triggers a file operation while another tab loads thumbnails or exports CSV.","fix":"Guard all access to `_engine.Duplicates` with a lock, or expose immutable snapshots to readers. A singleton mutable HashSet read/written from multiple threads needs synchronization.","locations":[{"ref":"VDF.Web/Services/ScanService.cs:160-177","code":"  160 | \t\tpublic void RemoveFromResults(IEnumerable<DuplicateItem> items) {\n  161 | \t\t\tforeach (var item in items.ToList())\n  162 | \t\t\t\t_engine.Duplicates.Remove(item);\n  163 | \t\t\tDropSingletonGroups();\n  164 | \t\t\tNotify();\n  165 | \t\t}\n  166 | \n  167 | \t\t/// <summary>Drops groups that have shrunk to a single item — a group of one is not a duplicate.<\/summary>\n  168 | \t\tvoid DropSingletonGroups() {\n  169 | \t\t\tvar keep = _engine.Duplicates\n  170 | \t\t\t\t.GroupBy(d => d.GroupId)\n  171 | \t\t\t\t.Where(g => g.Count() > 1)\n  172 | \t\t\t\t.Select(g => g.Key)\n  173 | \t\t\t\t.ToHashSet();\n  174 | \t\t\tforeach (var d in _engine.Duplicates.ToList())\n  175 | \t\t\t\tif (!keep.Contains(d.GroupId))\n  176 | \t\t\t\t\t_engine.Duplicates.Remove(d);\n  177 | \t\t}","lines":18,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/ScanService.cs#L160-L177"},{"ref":"VDF.Web/Services/ScanService.cs:257","code":"  257 | \t\t\t\t\t\t\t_engine.Duplicates.Remove(item);","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/ScanService.cs#L257"},{"ref":"VDF.Web/Services/ScanService.cs:363","code":"  363 | \t\t\t\t\t\t\t_engine.Duplicates.Remove(item);","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/ScanService.cs#L363"},{"ref":"VDF.Web/Program.cs:181-182","code":"  181 | \tforeach (var group in scan.Duplicates.GroupBy(i => i.GroupId))\n  182 | \t\tforeach (var item in group)","lines":2,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L181-L182"}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"JpegFrameEncoder.Encode calls avcodec_send_frame(ctx, &localFrame) then immediately avcodec_send_frame(ctx, null) to flush, then a single avcodec_receive_packet. For MJPEG one frame yields one packet so this works, but sending the flush null before receiving means if the encoder were to need draining in two steps the second packet (and any error from the flush send, whose return is unchecked at line 69) is silently lost. The flush send return value is discarded.","fix":"Receive the packet before flushing, or loop receive until EOF; at minimum check the flush send return.","locations":[{"ref":"VDF.Core/FFTools/FFmpegNative/JpegFrameEncoder.cs:68-70","code":"   68 | \t\t\t\tffmpeg.avcodec_send_frame(ctx, &localFrame).ThrowExceptionIfError();\n   69 | \t\t\t\tffmpeg.avcodec_send_frame(ctx, null); // flush — single-frame encode\n   70 | \t\t\t\tffmpeg.avcodec_receive_packet(ctx, packet).ThrowExceptionIfError();","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFmpegNative/JpegFrameEncoder.cs#L68-L70"}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"CoreUtils static constructor sets CurrentFolder = Path.GetDirectoryName(Environment.ProcessPath)! with a null-forgiving operator. Environment.ProcessPath can legitimately be null (e.g. some single-file/hosted scenarios), and Path.GetDirectoryName of a root path returns null - either makes CurrentFolder null despite the non-null annotation, and every downstream Path.Combine(CurrentFolder, ...) then throws ArgumentNullException during type init (a TypeInitializationException that is hard to diagnose).","fix":"Fall back to AppContext.BaseDirectory or Environment.CurrentDirectory when ProcessPath/GetDirectoryName is null, instead of suppressing the null with !.","locations":[{"ref":"VDF.Core/Utils/CoreUtils.cs:23-26","code":"   23 | \t\tstatic CoreUtils() {\n   24 | \t\t\tIsWindows = RuntimeInformation.IsOSPlatform(OSPlatform.Windows);\n   25 | \t\t\tCurrentFolder = Path.GetDirectoryName(Environment.ProcessPath)!;\n   26 | \t\t}","lines":4,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/CoreUtils.cs#L23-L26"}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"DatabaseUtils.SaveDatabase, LoadDatabase, ExportDatabaseToJson and ImportDatabaseFromJson call SerializeAsync/DeserializeAsync(...).AsTask().GetAwaiter().GetResult() — sync-over-async. This blocks a thread on the thread pool and can deadlock under a single-threaded synchronization context; it also defeats the point of the async API. SaveDatabase is additionally invoked from parallel worker threads via the checkpoint path.","fix":"Use the synchronous MemoryPackSerializer.Serialize/Deserialize(Span/Stream) overloads, or make the database methods truly async and await them.","locations":[{"ref":"VDF.Core/Utils/DatabaseUtils.cs:68-69","code":"   68 | \t\t\t\t\tDbWrapper = MemoryPackSerializer.DeserializeAsync<DatabaseWrapper>(file)\n   69 | \t\t\t\t\t\t.AsTask().GetAwaiter().GetResult() ?? new DatabaseWrapper();","lines":2,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/DatabaseUtils.cs#L68-L69"},{"ref":"VDF.Core/Utils/DatabaseUtils.cs:148","code":"  148 | \t\t\t\tMemoryPackSerializer.SerializeAsync(stream, DbWrapper).AsTask().GetAwaiter().GetResult();","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/DatabaseUtils.cs#L148"}]},{"id":"API_13","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"App.OnFrameworkInitializationCompleted registers SafeCleanup on ProcessExit, ShutdownRequested, and Exit, AND OnUnhandledException calls SafeCleanup. SafeCleanup disposes ThumbCacheHelpers.Provider and calls TempExtractionManager.DisposeAll with no synchronization; multiple of these can fire (e.g. unhandled exception then process exit), causing double-dispose. ThumbPack.Dispose disposes _fs (idempotent-ish) but TempExtractionManager.DisposeAll iterates and clears under lock so it's safe; ThumbPack.Dispose called twice will FlushIndex twice and _fs.Dispose twice (the second throws ObjectDisposedException, swallowed by outer try). Mostly benign but the double-fire is unguarded.","fix":"Guard SafeCleanup with a run-once flag (Interlocked.Exchange) so it executes a single time regardless of which lifecycle event fires.","locations":[{"ref":"VDF.GUI/App.xaml.cs:41-46","code":"   41 | \t\t\t\tdesktop.ShutdownRequested += OnShutdownRequested;\n   42 | \t\t\t\tdesktop.Exit += OnExitCleanup; //fallback\n   43 | \t\t\t\tAppDomain.CurrentDomain.ProcessExit += (_, __) => SafeCleanup();\n   44 | \t\t\t\tAppDomain.CurrentDomain.UnhandledException += OnUnhandledException;\n   45 | \t\t\t\tDispatcher.UIThread.UnhandledException += OnDispatcherUnhandledException;\n   46 | \t\t\t\tTaskScheduler.UnobservedTaskException += OnUnobservedTaskException;","lines":6,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/App.xaml.cs#L41-L46"},{"ref":"VDF.GUI/App.xaml.cs:76-86","code":"   76 | \t\tprivate static void SafeCleanup() {\n   77 | \t\t\ttry {\n   78 | \t\t\t\ttry { VDF.GUI.Utils.ThumbCacheHelpers.Provider?.Dispose(); }\n   79 | \t\t\t\tcatch { /* ignore */ }\n   80 | \t\t\t\tVDF.GUI.Utils.ThumbCacheHelpers.Provider = null;\n   81 | \n   82 | \t\t\t\ttry { TempExtractionManager.DisposeAll(); }\n   83 | \t\t\t\tcatch { /* ignore */ }\n   84 | \t\t\t}\n   85 | \t\t\tcatch { /* last resort */ }\n   86 | \t\t}","lines":11,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/App.xaml.cs#L76-L86"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"The DuplicateItem constructor performs a synchronous filesystem stat (new FileInfo(Path); fi.Exists; fi.Length) for every duplicate item. DuplicateItem instances are created inside MergeDuplicate, which runs under the duplicateDict lock during the parallel comparison hot path. A blocking disk stat (especially on network drives) while holding the global merge lock serializes all comparison threads and can stall the whole compare phase.","fix":"FileEntry already carries FileSize; reuse it instead of re-stating, or compute SizeLong outside the lock before constructing the DuplicateItem. Avoid filesystem access while holding duplicateDict.","locations":[{"ref":"VDF.Core/ViewModels/DuplicateItem.cs:86-88","code":"   86 | \t\t\tvar fi = new FileInfo(Path);\n   87 | \t\t\tDateCreated = file.DateCreated;\n   88 | \t\t\tSizeLong = fi.Exists ? fi.Length : -1;","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ViewModels/DuplicateItem.cs#L86-L88"},{"ref":"VDF.Core/ScanEngine.cs:927-989","code":"  927 | \t\t\tvoid MergeDuplicate(FileEntry entry, FileEntry compItem, float difference, DuplicateFlags flags) {\n  928 | \t\t\t\tlock (duplicateDict) {\n  929 | \t\t\t\t\tbool foundBase = duplicateDict.TryGetValue(entry.Path, out DuplicateItem? existingBase);\n  930 | \t\t\t\t\tbool foundComp = duplicateDict.TryGetValue(compItem.Path, out DuplicateItem? existingComp);\n  931 | \n  932 | \t\t\t\t\tif (foundBase && foundComp) {\n  933 | \t\t\t\t\t\t//this happens with 4+ identical items:\n  934 | \t\t\t\t\t\t//first, 2+ duplicate groups are found independently, they are merged in this branch\n  935 | \t\t\t\t\t\tif (existingBase!.GroupId != existingComp!.GroupId) {\n  936 | \t\t\t\t\t\t\t// Before merging two groups, verify that the representative\n  937 | \t\t\t\t\t\t\t// of each group is similar to the other group's representative.\n  938 | \t\t\t\t\t\t\t// This prevents daisy-chain merging where a single bridging\n  939 | \t\t\t\t\t\t\t// pair pulls two unrelated groups together.\n  940 | \t\ ep, null, null, entry, out _)) {\n  972 | \t\t\t\t\t\t\tmergesBlocked++;\n  973 | \t\t\t\t\t\t\treturn;\n  974 | \t\t\t\t\t\t}\n  975 | \t\t\t\t\t\tvar newItem = new DuplicateItem(entry, difference, existingComp!.GroupId, flags);\n  976 | \t\t\t\t\t\tif (duplicateDict.TryAdd(entry.Path, newItem))\n  977 | \t\t\t\t\t\t\tgroupMembers[existingComp.GroupId].Add(newItem);\n  978 | \t\t\t\t\t}\n  979 | \t\t\t\t\telse {\n  980 | \t\t\t\t\t\tvar groupId = Guid.NewGuid();\n  981 | \t\t\t\t\t\tvar compDup = new DuplicateItem(compItem, difference, groupId, flags);\n  982 | \t\t\t\t\t\tvar entryDup = new DuplicateItem(entry, difference, groupId, DuplicateFlags.None);\n  983 | \t\t\t\t\t\tduplicateDict.TryAdd(compItem.Path, compDup);\n  984 | \t\t\t\t\t\tduplicateDict.TryAdd(entry.Path, entryDup);\n  985 | \t\t\t\t\t\tgroupMembers[groupId] = new List<DuplicateItem> { compDup, entryDup };\n  986 | \t\t\t\t\t\tgroupRepresentatives[groupId] = entry;\n  987 | \t\t\t\t\t}\n  988 | \t\t\t\t}\n  989 | \t\t\t}","lines":63,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ScanEngine.cs#L927-L989"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"DropHardLinkDuplicates calls HardLinkUtils.AreSameFile (a filesystem stat/open per pair) inside an O(items^2) nested loop per group, and is invoked synchronously on the UI thread after every delete when ExcludeHardLinks is on. For large groups this performs many blocking filesystem calls on the UI thread, freezing the window.","fix":"Run DropHardLinkDuplicates (and the AreSameFile checks) on a worker thread, then apply removals on the UI thread; or gate AreSameFile by a cheap inode/file-id grouping first.","locations":[{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:1872-1897","code":" 1872 | \t\tprivate void DropHardLinkDuplicates() {\n 1873 | \t\t\tvar toRemove = new List<DuplicateItemVM>();\n 1874 | \t\t\tforeach (var group in ation, run synchronously after the scan. A 10k-member group is 100M comparisons and ~100MB of bool matrix.","fix":"Cap the group size eligible for daisy-chain splitting, or short-circuit/parallelize the matrix build, and consider a bitset instead of bool[,].","locations":[{"ref":"VDF.Core/ScanEngine.cs:1561-1606","code":" 1561 | \t\tvoid SplitDaisyChainGroups() {\n 1562 | \t\t\t// Build a fast lookup from path -> FileEntry for re-comparing pairs.\n 1563 | \t\t\tvar dbLookup = new Dictionary<string, FileEntry>(\n 1564 | \t\t\t\tCoreUtils.IsWindows ? StringComparer.OrdinalIgnoreCase : StringComparer.Ordinal);\n 1565 | \t\t\tforeach (FileEntry fe in DatabaseUtils.Database)\n 1566 | \t\t\t\tdbLookup[fe.Path] = fe;\n 1567 | \n 1568 | \t\t\t// Group duplicates by GroupId; only process groups with 3+ members.\n 1569 | \t\t\tvar groups = Duplicates\n 1570 | \t\t\t\t.GroupBy(d => d.GroupId)\n 1571 | \t\t\t\t.Where(g => g.Count() >= 3)\n 1572 | \t\t\t\t.ToList();\n 1573 | \n 1574 | \t\t\tif (groups.Count == 0) return;\n 1575 | \n 1576 | \t\t\tint groupsSplit = 0;\n 1577 | \t\t\tint itemsRemoved = 0;\n 1578 | \n 1579 | \t\t\tforeach (var group in groups) {\n 1580 | \t\t\t\tvar members = group.ToList();\n 1581 | \t\t\t\tint n = members.Count;\n 1582 | \n 1583 | \t\t\t\t// Resolve FileEntry for each member; skip group if any entry is missing\n 1584 | \t\t\t\t// or lacks a compare snapshot (defensive — all visual duplicates stem\n 1585 | \t\t\t\t// from the snapshot-validated scan list).\n 1586 | \t\t\t\tvar entries = new FileEntry[n];\n 1587 | \t\t\t\tbool allFound = true;\n 1588 | \t\t\t\tfor (int i = 0; i < n; i++) {\n 1589 | \t\t\t\t\tif (!dbLookup.TryGetValue(members[i].Path, out var fe) || fe.compareGray == null) {\n 1590 | \t\t\t\t\t\tallFound = false;\n 1591 | \t\t\t\t\t\tbreak;\n 1592 | \t\t\t\t\t}\n 1593 | \t\t\t\t\tentries[i] = fe;\n 1594 | \t\t\t\t}\n 1595 | \t\t\t\tif (!allFound) continue;\n 1596 | \n 1597 | \t\t\t\t// Build pairwise similarity matrix.\n 1598 | \t\t\t\tvar similar = new bool[n, n];\n 1599 | \t\t\t\tfor (int i = 0; i < n; i++) {\n 1600 | \t\t\t\t\tsimilar[i, i] = true;\n 1601 | \t\t\t\t\tfor (int j = i + 1; j < n; j++) {\n 1602 | \t\t\t\t\t\tbool isSimilar = CheckIfDuplicate(entries[i], null, null, entries[j], out _);\n 1603 | \t\t\t\t\t\tsimilar[i, j] = isSimilar;\n 1604 | \t\t\t\t\t\tsimilar[j, i] = isSimilar;\n 1605 | \t\t\t\t\t}\n 1606 | \t\t\t\t}","lines":46,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ScanEngine.cs#L1561-L1606"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"LRUBitmapCache never disposes evicted bitmaps (eviction code at lines 288-292 explicitly leaves them for the UI). Evicted bitmaps are removed from the map and from currentBytes accounting, but their unmanaged Skia memory is only reclaimed when the UI also drops its last reference and the finalizer runs. Under heavy thumbnail churn the effective RAM/VRAM use can far exceed MaxBytes (128 MB) because the cap only governs the cache's own references, not the leaked-but-still-displayed evicted entries.","fix":"Track displayed references (e.g. weak references) so evicted bitmaps can be disposed once no UI element holds them, or lower the cap; at minimum document that real memory use can exceed MaxBytes.","locations":[{"ref":"VDF.GUI/Utils/ThumbnailStore.cs:284-294","code":"  284 | \t\tstatic void EvictIfNeeded() {\n  285 | \t\t\twhile (currentBytes > MaxBytes && lru.Last != null) {\n  286 | \t\t\t\tvar key = lru.Last.Value;\n  287 | \t\t\t\tlru.RemoveLast();\n  288 | \t\t\t\tif (map.Remove(key, out var e)) {\n  289 | \t\t\t\t\tcurrentBytes -= e.size;\n  290 | \t\t\t\t\t// Important: do not dispose – UI may still display the bitmap.\n  291 | \t\t\t\t\t//try { e.bmp.Dispose(); } catch { }\n  292 | \t\t\t\t}\n  293 | \t\t\t}\n  294 | \t\t}","lines":11,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b ar dupY = (DuplicateItemVM)y;\n   48 | \t\t\tlong totalSizeX, totalSizeY;\n   49 | \t\t\tif (guidMap.ContainsKey(dupX.ItemInfo.GroupId)) {\n   50 | \t\t\t\ttotalSizeX = guidMap[dupX.ItemInfo.GroupId];\n   51 | \t\t\t}\n   52 | \t\t\telse {\n   53 | \t\t\t\ttotalSizeX = mainVM.Duplicates.Where(a => a.ItemInfo.GroupId == dupX.ItemInfo.GroupId).Sum(a => a.ItemInfo.SizeLong);\n   54 | \t\t\t\tguidMap[dupX.ItemInfo.GroupId] = totalSizeX;\n   55 | \t\t\t}\n   56 | \t\t\tif (guidMap.ContainsKey(dupY.ItemInfo.GroupId)) {\n   57 | \t\t\t\ttotalSizeY = guidMap[dupY.ItemInfo.GroupId];\n   58 | \t\t\t}\n   59 | \t\t\telse {\n   60 | \t\t\t\ttotalSizeY = mainVM.Duplicates.Where(a => a.ItemInfo.GroupId == dupY.ItemInfo.GroupId).Sum(a => a.ItemInfo.SizeLong);\n   61 | \t\t\t\tguidMap[dupY.ItemInfo.GroupId] = totalSizeY;\n   62 | \t\t\t}\n   63 | \t\t\treturn totalSizeX.CompareTo(totalSizeY);\n   64 | \t\t}\n   65 | \t}","lines":27,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM_Filter.cs#L39-L65"},{"ref":"VDF.GUI/ViewModels/MainWindowVM_Filter.cs:66-92","code":"   66 | \tpublic sealed class GroupSizeComparer : System.Collections.IComparer {\n   67 | \t\t\treadonly MainWindowVM mainVM;\n   68 | \t\t\tprivate readonly Dictionary<Guid, int> guidMap = new();\n   69 | \t\t\tpublic GroupSizeComparer(MainWindowVM vm) => mainVM = vm;\n   70 | \t\t\tpublic int Compare(object? x, object? y) {\n   71 | \t\t\t\tif (x == null || y == null)\n   72 | \t\t\t\t\treturn -1;\n   73 | \t\t\t\tvar dupX = (DuplicateItemVM)x;\n   74 | \t\t\t\tvar dupY = (DuplicateItemVM)y;\n   75 | \t\t\t\tint groupSizeX, groupSizeY;\n   76 | \t\t\t\tif (guidMap.ContainsKey(dupX.ItemInfo.GroupId)) {\n   77 | \t\t\t\t\tgroupSizeX = guidMap[dupX.ItemInfo.GroupId];\n   78 | \t\t\t\t}\n   79 | \t\t\t\telse {\n   80 | \t\t\t\t\tgroupSizeX = mainVM.Duplicates.Where(a => a.ItemInfo.GroupId == dupX.ItemInfo.GroupId).Count();\n   81 | \t\t\t\t\tg
