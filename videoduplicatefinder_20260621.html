<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"DuplicateItem constructor does fi.Extension[1..] for images. When an image file has no extension (FileInfo.Extension returns an empty string), the range operator [1..] throws ArgumentOutOfRangeException, which crashes the scan/grouping while building results. IsImage is derived from extension matching so this is unlikely for normal images, but a renamed/extensionless file that was force-added (or a path whose extension was stripped) will throw inside the duplicate-grouping path.","fix":"Guard: Format = fi.Extension.Length > 1 ? fi.Extension[1..] : fi.Extension; (or use Path.GetExtension and TrimStart('.')).","locations":[{"ref":"VDF.Core/ViewModels/DuplicateItem.cs:89-90","code":"   89 | \t\t\tif (file.IsImage)\n   90 | \t\t\t\tFormat = fi.Extension[1..];","lines":2,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ViewModels/DuplicateItem.cs#L89-L90"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":false,"description":"VideoFrameConverter.Convert returns a by-value AVFrame struct whose data/linesize pointers alias the converter's internal _pConvertedFrame buffers. The struct stays valid only until the next Convert call or Dispose. In TryGetGrayBytesFromVideoNativeBatch and GetGrayFrames the converter may be rebuilt (Dispose + new) inside the loop when source layout changes; any AVFrame captured from a prior Convert would dangle. Currently saved by extracting immediately, but the API hands out a struct that points into soon-to-be-freed memory with no lifetime guard.","fix":"Document that the returned AVFrame is only valid until the next Convert/Dispose, or return the data via a copied buffer; have callers extract before any rebuild/dispose.","locations":[{"ref":"VDF.Core/FFTools/FFmpegNative/VideoFrameConverter.cs:84-95","code":"   84 | \t\tpublic AVFrame Convert(AVFrame sourceFrame) {\n   85 | \t\t\tffmpeg.av_frame_make_writable(_pConvertedFrame).ThrowExceptionIfError();\n   86 | \t\t\tffmpeg.sws_scale(_pConvertContext,\n   87 | \t\t\t\tsourceFrame.data,\n   88 | \t\t\t\tsourceFrame.linesize,\n   89 | \t\t\t\t0,\n   90 | \t\t\t\tsourceFrame.height,\n   91 | \t\t\t\t_pConvertedFrame->data,\n   92 | \t\t\t\t_pConvertedFrame->linesize).ThrowExceptionIfError();\n   93 | \n   94 | \t\t\treturn *_pConvertedFrame;\n   95 | \t\t}","lines":12,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFmpegNative/VideoFrameConverter.cs#L84-L95"}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"VideoFrameConverter.Dispose frees _pConvertedFrame and the SwsContext but does not null them, and the class is not guarded against double-Dispose. Calling Dispose twice (e.g. the rebuild path in GetGrayFrames disposes, then the finally disposes again on the same reference if assignment is reordered) would double-free. The sibling decoder classes deliberately null pointers to prevent exactly this; VideoFrameConverter does not.","fix":"Null _pConvertContext/_pConvertedFrame after freeing and guard against re-entry (or make them non-readonly and check for null).","locations":[{"ref":"VDF.Core/FFTools/FFmpegNative/VideoFrameConverter.cs:78-82","code":"   78 | \t\tpublic void Dispose() {\n   79 | \t\t\tAVFrame* convertedFrame = _pConvertedFrame;\n   80 | \t\t\tffmpeg.av_frame_free(&convertedFrame);\n   81 | \t\t\tffmpeg.sws_freeContext(_pConvertContext);\n   82 | \t\t}","lines":5,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFmpegNative/VideoFrameConverter.cs#L78-L82"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":false,"description":"VideoFrameConverter.Dispose is not exception-safe and has no finalizer. If the constructor throws after sws_getContext succeeds but before/at av_frame_get_buffer (line 75 ThrowExceptionIfError), the partially-constructed object is never Disposed and has no finalizer, leaking the SwsContext and the allocated AVFrame. VideoStreamDecoder/AudioStreamDecoder both have finalizers as a safety net; this class does not, so a throw in its ctor leaks native memory.","fix":"Add a finalizer that frees the SwsContext/AVFrame, or wrap ctor body in try/catch that frees on failure; null the pointers in Dispose to make it idempotent.","locations":[{"ref":"VDF.Core/FFTools/FFmpegNative/VideoFrameConverter.cs:33-82","code":"   33 | \t\tpublic VideoFrameConverter(Size sourceSize,\n   34 | \t\t\tAVPixelFormat sourcePixelFormat,\n   35 | \t\t\tSize destinationSize,\n   36 | \t\t\tAVPixelFormat destinationPixelFormat,\n   37 | \t\t\tScaleQuality quality = ScaleQuality.Bicubic,\n   38 | \t\t\tbool bitExact = false) {\n   39 | \n   40 | \t\t\tint flags = quality switch {\n   41 | \t\t\t\tScaleQuality.FastBilinear => (int)SwsFlags.SWS_FAST_BILINEAR,\n   42 | \t\t\t\tScaleQuality.Bilinear => (int)SwsFlags.SWS_BILINEAR,\n   43 | \t\t\t\tScaleQuality.Bicubic => (int)SwsFlags.SWS_BICUBIC,\n   44 | \t\t\t\tScaleQuality.Lanczos => (int)SwsFlags.SWS_LANCZOS,\n   45 | \t\t\t\tScaleQuality.Spline => (int)SwsFlags.SWS_SPLINE,\n   46 | \t\t\t\tScaleQuality.Area => (int)SwsFlags.SWS_AREA,\n   47 | \t\t\t\t_ => (int)SwsFlags.SWS_BICUBIC\n   48 | \t\t\t};\n   49 | \n   50 | \t\t\tif (bitExact) flags |= (int)SwsFlags.SWS_BITEXACT;\n   51 | \n   52 | \t\t\t_pConvertContext = ffmpeg.sws_getContext(sourceSize.Width,\n   53 | \t\t\t\tsourceSize.Height,\n   54 | \t\t\t\tsourcePixelFormat,\n   55 | \t\t\t\tdestinationSize.Width,\n   56 | \t\t\t\tdestinationSize.Height,\n   57 | \t\t\t\tdestinationPixelFormat,\n   58 | \t\t\t\tflags,\n   59 | \t\t\t\tnull,\n   60 | \t\t\t\tnull,\n   61 | \t\t\t\tnull);\n   62 | \t\t\tif (_pConvertContext == null)\n   63 | \t\t\t\tthrow new FFInvalidExitCodeException(\"Could not initialize the conversion context.\");\n   64 | \n   65 | \t\t\t_pConvertedFrame = ffmpeg.av_frame_alloc();\n   66 | \t\t\tif (_pConvertedFrame == null)\n   67 | \t\t\t\tthrow new FFInvalidExitCodeException(\"Failed to allocate destination AVFrame.\");\n   68 | \n   69 | \t\t\t_pConvertedFrame->format = (int)destinationPixelFormat;\n   70 | \t\t\t_pConvertedFrame->width = destinationSize.Width;\n   71 | \t\t\t_pConvertedFrame->height = destinationSize.Height;\n   72 | \n   73 | \t\t\t// Give swscale a real padded destination frame instead of a tightly packed align=1 buffer.\n   74 | \t\t\t// Passing 0 lets FFmpeg pick the alignment that fits the current CPU (recommended by libavutil).\n   75 | \t\t\tffmpeg.av_frame_get_buffer(_pConvertedFrame, 0).ThrowExceptionIfError();\n   76 | \t\t}\n   77 | \n   78 | \t\tpublic void Dispose() {\n   79 | \t\t\tAVFrame* convertedFrame = _pConvertedFrame;\n   80 | \t\t\tffmpeg.av_frame_free(&convertedFrame);\n   81 | \t\t\tffmpeg.sws_freeContext(_pConvertContext);\n   82 | \t\t}","lines":50,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FFTools/FFmpegNative/VideoFrameConverter.cs#L33-L82"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"DatabaseViewerVM writes TempDatabaseFile in its constructor (line 42-44) but only deletes it inside Save(). Save() is invoked from DatabaseViewer_Closing. If Save() throws before reaching the File.Delete (e.g. SerializeToUtf8Bytes or ImportDataBaseFromJson fails - those calls are NOT wrapped in try/catch, only the Delete is), the temp file leaks. Opening the viewer also always creates a fresh random temp file each time, so repeated opens accumulate leaked files on any error path.","fix":"Wrap the whole Save() body in try/finally and delete the temp file in the finally; also delete it if the user closes without a successful import.","locations":[{"ref":"VDF.GUI/ViewModels/DatabaseViewerVM.cs:42-44","code":"   42 | \t\t\tTempDatabaseFile = Path.Combine(Path.GetTempPath(), Path.GetRandomFileName());\n   43 | \t\t\tScanEngine.ExportDataBaseToJson(TempDatabaseFile, serializerOptions);\n   44 | \t\t\t DbWrapper = JsonSerializer.Deserialize(File.ReadAllBytes(TempDatabaseFile), VDF.Core.Utils.CoreJsonContext.Default.DatabaseWrapper)!;","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/DatabaseViewerVM.cs#L42-L44"},{"ref":"VDF.GUI/ViewModels/DatabaseViewerVM.cs:80-91","code":"   80 | \t\tpublic void Save() {\n   81 | \t\t\tDbWrapper.Entries = new HashSet<FileEntry>(DatabaseFiles);\n   82 | \t\t\tFile.WriteAllBytes(TempDatabaseFile, JsonSerializer.SerializeToUtf8Bytes(DbWrapper, VDF.Core.Utils.CoreJsonContext.Default.DatabaseWrapper));\n   83 | \t\t\tScanEngine.ImportDataBaseFromJson(TempDatabaseFile, serializerOptions);\n   84 | \t\t\tScanEngine.SaveDatabase();\n   85 | \t\t\ttry {\n   86 | \t\t\t\tFile.Delete(TempDatabaseFile);\n   87 | \t\t\t}\n   88 | \t\t\tcatch (Exception e) {\n   89 | \t\t\t\tLogger.Instance.Info($\"Failed to delete temporarily database file '{TempDatabaseFile}', because of {e}\");\n   90 | \t\t\t}\n   91 | \t\t}","lines":12,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/DatabaseViewerVM.cs#L80-L91"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"RelocateFilesDialogVM writes a temp database file (TempDatabaseFile) in its constructor via ScanEngine.ExportDataBaseToJson, but the file is only deleted at the end of ApplyImpl. If the user opens the dialog and closes/cancels it (Cancel command just calls _owner.Close()), the temp file is leaked into the OS temp directory permanently. The same file is also leaked if ApplyImpl returns early on a write exception (line 348 returns before any cleanup).","fix":"Delete TempDatabaseFile on dialog close (handle _owner.Closing) and in a finally/catch in ApplyImpl, or write to an in-memory stream instead of a temp file.","locations":[{"ref":"VDF.GUI/ViewModels/RelocateFilesDialogVM.cs:87-93","code":"   87 | \t\tpublic RelocateFilesDialogVM(Window owner) {\n   88 | \t\t\t_owner = owner;\n   89 | \t\t\tTempDatabaseFile = Path.Combine(Path.GetTempPath(), Path.GetRandomFileName());\n   90 | \t\t\tScanEngine.ExportDataBaseToJson(TempDatabaseFile, serializerOptions);\n   91 | \t\t\tDbWrapper = JsonSerializer.Deserialize(File.ReadAllBytes(TempDatabaseFile), VDF.Core.Utils.CoreJsonContext.Default.DatabaseWrapper)!;\n   92 | \t\t\t_entries = [.. DbWrapper.Entries];\n   93 | \t\t}","lines":7,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/RelocateFilesDialogVM.cs#L87-L93"},{"ref":"VDF.GUI/ViewModels/RelocateFilesDialogVM.cs:171","code":"  171 | \t\tpublic ReactiveCommand<Unit, Unit> Cancel => ReactiveCommand.Create(() => _owner.Close());","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/RelocateFilesDialogVM.cs#L171"},{"ref":"VDF.GUI/ViewModels/RelocateFilesDialogVM.cs:343-358","code":"  343 | \t\t\ttry {\n  344 | \t\t\t\tFile.WriteAllBytes(TempDatabaseFile, JsonSerializer.SerializeToUtf8Bytes(DbWrapper, VDF.Core.Utils.CoreJsonContext.Default.DatabaseWrapper));\n  345 | \t\t\t}\n  346 | \t\t\tcatch (Exception e) {\n  347 | \t\t\t\tLogger.Instance.Info($\"Failed to save changes to database file, because of {e}\");\n  348 | \t\t\t\treturn;\n  349 | \t\t\t}\n  350 | \t\t\tScanEngine.ImportDataBaseFromJson(TempDatabaseFile, serializerOptions);\n  351 | \t\t\tScanEngine.SaveDatabase();\n  352 | \t\t\ttry {\n  353 | \t\t\t\tFile.Delete(TempDatabaseFile);\n  354 | \t\t\t}\n  355 | \t\t\tcatch (Exception e) {\n  356 | \t\t\t\tLogger.Instance.Info($ \t\t\tDirectory.CreateDirectory(targetFolder);\n   82 | \t\t\t\t\t\tvar targetLibFolder = RuntimeInformation.IsOSPlatform(OSPlatform.Linux)\n   83 | \t\t\t\t\t\t\t? Path.Combine(CoreUtils.CurrentFolder, \"lib\")\n   84 | \t\t\t\t\t\t\t: targetFolder;\n   85 | \t\t\t\t\t\tDirectory.CreateDirectory(targetLibFolder);\n   86 | \t\t\t\t\t\tCopyFfmpegFiles(extractedFolder, targetFolder, targetLibFolder);\n   87 | \t\t\t\t\t\tdownloadSucceeded = true;\n   88 | \t\t\t\t\t\tbreak;\n   89 | \t\t\t\t\t}\n   90 | \t\t\t\t\tcatch (HttpRequestException ex) {\n   91 | \t\t\t\t\t\terrorMessage = string.Format(CultureInfo.InvariantCulture, App.Lang[\"Message.FfmpegDownloadFailed\"], ex.Message);\n   92 | \t\t\t\t\t}\n   93 | \t\t\t\t}","lines":31,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM_FfmpegDownloader.cs#L63-L93"},{"ref":"VDF.GUI/ViewModels/MainWindowVM_FfmpegDownloader.cs:231-255","code":"  231 | \t\tasync Task DownloadFileAsync(Uri downloadUrl, string destinationPath, FfmpegDownloadPlan plan) {\n  232 | \t\t\tusing var client = new HttpClient { Timeout = TimeSpan.FromMinutes(10) };\n  233 | \t\t\tusing var response = await client.GetAsync(downloadUrl, HttpCompletionOption.ResponseHeadersRead);\n  234 | \t\t\tif (!response.IsSuccessStatusCode)\n  235 | \t\t\t\tthrow new HttpRequestException($\"{(int)response.StatusCode} {response.ReasonPhrase}\");\n  236 | \n  237 | \t\t\tvar totalBytes = response.Content.Headers.ContentLength;\n  238 | \t\t\tif (totalBytes > MaxDownloadBytes)\n  239 | \t\t\t\tthrow new HttpRequestException($\"Download too large ({totalBytes} bytes, max {MaxDownloadBytes})\");\n  240 | \n  241 | \t\t\tawait using var sourceStream = await response.Content.ReadAsStreamAsync();\n  242 | \t\t\tawait using var destinationStream = new FileStream(destinationPath, FileMode.Create, FileAccess.Write, FileShare.None);\n  243 | \n  244 | \t\t\tvar buffer = new byte[81920];\n  245 | \t\ .GetObservable(Visual.IsVisibleProperty).Subscribe(_ => {\n   82 | \t\t\t\t\t\t\tif (canvas.IsVisible) {\n   83 | \t\t\t\t\t\t\t\tvm.ViewportWidth = canvas.Bounds.Width;\n   84 | \t\t\t\t\t\t\t\tvm.ViewportHeight = canvas.Bounds.Height;\n   85 | \t\t\t\t\t\t\t}\n   86 | \t\t\t\t\t\t});\n   87 | \t\t\t\t\t}\n   88 | \t\t\t\t}\n   89 | \n   90 | \t\t\t\tTrackCanvas(\"CompareCanvas\");\n   91 | \t\t\t\tTrackCanvas(\"StackedCanvas\");\n   92 | \t\t\t}","lines":21,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Views/ThumbnailComparer.xaml.cs#L72-L92"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"BytesToMegaBytes converts via single-precision float: `(long)((byteCount / 1024f) / 1024f)`. float has ~7 significant decimal digits, so for byteCount above a few GB the intermediate loses precision and the returned megabyte count is wrong by potentially many MB (e.g. for tens/hundreds of GB files). Integer or double division would be exact.","fix":"Use integer math: `byteCount / (1024L * 1024L)` (or divide by 1024d/1024d as double if a rounding behavior must be preserved).","locations":[{"ref":"VDF.Core/Utils/Extensions.cs:59","code":"   59 | \t\tpublic static long BytesToMegaBytes(this long byteCount) => (long)((byteCount / 1024f) / 1024f);","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/Extensions.cs#L59"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"IncrementProgress and ReportStage compute remaining time as DateTime.UtcNow.Subtract(startTime).Ticks * (scanProgressMaxValue - (processedFiles + 1)) / (processedFiles + 1). For a long scan (large elapsed ticks) multiplied by a large remaining-file count, the long multiplication can overflow before the divide, yielding a negative/garbage Remaining TimeSpan shown to the user. Ticks for hours * tens of thousands of files can exceed long range in extreme cases.","fix":"Compute elapsed-per-file as a double first (elapsed.TotalSeconds / processed) then multiply by remaining count, avoiding the large intermediate tick product.","locations":[{"ref":"VDF.Core/ScanEngine.cs:116-117","code":"  116 | \t\t\tvar timeRemaining = TimeSpan.FromTicks(DateTime.UtcNow.Subtract(startTime).Ticks *\n  117 | \t\t\t\t\t\t\t\t\t(scanProgressMaxValue - (processedFiles + 1)) / (processedFiles + 1));","lines":2,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ScanEngine.cs#L116-L117"},{"ref":"VDF.Core/ScanEngine.cs:136-137","code":"  136 | \t\t\tvar timeRemaining = TimeSpan.FromTicks(DateTime.UtcNow.Subtract(startTime).Ticks *\n  137 | \t\t\t\t\t\t\t\t\t(scanProgressMaxValue - (processedFiles + 1)) / (processedFiles + 1));","lines":2,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ScanEngine.cs#L136-L137"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"GrayBytesUtils SIMD diff/count accumulators are Vector256<ushort>. Each PSADBW lane can hold up to 8*255=2040 per 32-byte block; for the fixed 1024-byte gray buffers (32 blocks) the worst-case per-lane sum is ~65280, just under ushort max (65535). The code only works because the buffer is exactly 1024 bytes - it would overflow/wrap for any larger image passed through this generic byte[] API, silently corrupting the difference percentage.","fix":"Either document/assert the 1024-byte size invariant, or widen the horizontal accumulation (periodically fold the ushort SAD results into 32/64-bit accumulators) so larger inputs cannot overflow.","locations":[{"ref":"VDF.Core/Utils/GrayBytesUtils.cs:69-101","code":"   69 | \t\t\t\tVector256<ushort> diffVec = Vector256<ushort>.Zero;\n   70 | \t\t\t\tVector256<ushort> countVec = Vector256<ushort>.Zero;\n   71 | \n   72 | \t\t\t\tSpan<Vector256<byte>> vImg1 = MemoryMarshal.Cast<byte, Vector256<byte>>(img1.AsSpan());\n   73 | \t\t\t\tSpan<Vector256<byte>> vImg2 = MemoryMarshal.Cast<byte, Vector256<byte>>(img2.AsSpan());\n   74 | \n   75 | \t\t\t\tfor (int i = 0; i < vImg1.Length; i++) {\n   76 | \t\t\t\t\tvar v1 = vImg1[i];\n   77 | \t\t\t\t\tvar v2 = vImg2[i];\n   78 | \n   79 | \t\t\t\t\tVector256<byte> validMask = Vector256<byte>.AllBitsSet;\n   80 | \n   81 | \t\t\t\t\tif (ignoreBlackPixels) {\n   82 | \t\t\t\t\t\t// \"Black\" ⇔ v ≤ BlackPixelLimit ⇔ SubtractSaturate(v, blackThr) == 0.\n   83 | \t\t\t\t\t\tvar v1IsBlack = Avx2.CompareEqual(Avx2.SubtractSaturate(v1, blackThr), zero);\n   84 | \t\t\t\t\t\tvar v2IsBlack = Avx2.CompareEqual(Avx2.SubtractSaturate(v2, blackThr), zero);\n   85 | \t\t\t\t\t\tvar anyBlack = Avx2.Or(v1IsBlack, v2IsBlack);\n   86 | \t\t\t\t\t\tvalidMask = Avx2.AndNot(anyBlack, validMask);\n   87 | \t\t\t\t\t}\n   88 | \t\t\t\t\tif (ignoreWhitePixels) {\n   89 | \t\t\t\t\t\t// \"Not white\" ⇔ v < WhitePixelLimit ⇔ v ≤ WhitePixelLimit-1\n   90 | \t\t\t\t\t\t// ⇔ SubtractSaturate(v, whiteMinus1) == 0.\n   91 | \t\t\t\t\t\tvar v1NotWhite = Avx2.CompareEqual(Avx2.SubtractSaturate(v1, whiteMinus1), zero);\n   92 | \t\t\t\t\t\tvar v2NotWhite = Avx2.CompareEqual(Avx2.SubtractSaturate(v2, whiteMinus1), zero);\n   93 | \t\t\t\t\t\tvar bothNotWhite = Avx2.And(v1NotWhite, v2NotWhite);\n   94 | \t\t\t\t\t\tvalidMask = Avx2.And(validMask, bothNotWhite);\n   95 | \t\t\t\t\t}\n   96 | \n   97 | \t\t\t\t\tvar v1Masked = Avx2.And(v1, validMask);\n   98 | \t\t\t\t\tvar v2Masked = Avx2.And(v2, validMask);\n   99 | \t\t\t\t\tdiffVec = Avx2.Add(diffVec, Avx2.SumAbsoluteDifferences(v1Masked, v2Masked));\n  100 | \t\t\t\t\tcountVec = Avx2.Add(countVec, Avx2.SumAbsoluteDifferences(validMask, zero));\n  101 | \t\t\t\t}","lines":33,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/GrayBytesUtils.cs#L69-L101"},{"ref":"VDF.Core/Utils/GrayBytesUtils.cs:130-138","code":"  130 | \t\t\t\tVector256<ushort> vec = Vector256<ushort>.Zero;\n  131 | \t\t\t\tSpan<Vector256<byte>> vImg1 = MemoryMarshal.Cast<byte, Vector256<byte>>(img1.AsSpan());\n  132 | \t\t\t\tSpan<Vector256<byte>> vImg2 = MemoryMarshal.Cast<byte, Vector256<byte>>(img2.AsSpan());\n  133 | \n  134 | \t\t\t\tfor (int i = 0; i < vImg1.Length; i++)\n  135 | \t\t\t\t\tvec = Avx2.Add(vec, Avx2.SumAbsoluteDifferences(vImg2[i], vImg1[i]));\n  136 | \n  137 | \t\t\t\tfor (int i = 0; i < Vector256<ushort>.Count; i++)\n  138 | \t\t\t\t\tdiff += Math.Abs(vec.GetElement(i));","lines":9,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/GrayBytesUtils.cs#L130-L138"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`mark --strategy 100-percent-only` is unusable as a deletion strategy because of the `DeletionStrategy.SelectForDeletion` design combined with the keeper choice. For HundredPercentOnly the keeper is `PickHighestQuality` (default branch of PickKeeper). When all items are exactly 100% similar, only quality differentiates them, but the documented intent of `100-percent-only` is to delete only exact duplicates. More importantly: a group of N truly-100%-identical files will delete N-1 of them keeping the highest bitrate. That is fine, but combined with the `mark --dry-run` default bug above, the strategy never executes. Lower severity on its own; flagged because the two interact and the strategy is the most dangerous one.","fix":"Verify the intended keeper for HundredPercentOnly and document it. Primarily fix the dry-run default (separate finding) so the strategy can run at all.","locations":[{"ref":"VDF.CLI/Actions/DeletionStrategy.cs:86-93","code":"   86 | \t\t\t\tif (strategy == Strategy.HundredPercentOnly) {\n   87 | \t\t\t\t\t// Skip groups that are not all 100% similar\n   88 | \t\t\t\t\tif (items.Any(i => i.Similarity < 100f))\n   89 | \t\t\t\t\t\tcontinue;\n   90 | \t\t\t\t}\n   91 | \n   92 | \t\t\t\tDuplicateItem keeper = PickKeeper(items, strategy);\n   93 | \t\t\t\ttoDelete.AddRange(items.Where(i => i != keeper));","lines":8,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Actions/DeletionStrategy.cs#L86-L93"},{"ref":"VDF.CLI/Actions/DeletionStrategy.cs:99-106","code":"   99 | \t\tstatic DuplicateItem PickKeeper(List<DuplicateItem> items, Strategy strategy) =>\n  100 | \t\t\tstrategy switch {\n  101 | \t\t\t\tStrategy.SmallestFile => items.OrderByDescending(i => i.SizeLong).First(),\n  102 | \t\t\t\tStrategy.ShortestDuration => items.OrderByDescending(i => i.Duration).First(),\n  103 | \t\t\t\tStrategy.WorstResolution => items.OrderByDescending(i => i.FrameSizeInt).First(),\n  104 | \t\t\t\t// LowestQuality and HundredPercentOnly: keep the highest overall quality item\n  105 | \t\t\t\t_ => PickHighestQuality(items)\n  106 | \t\t\t};","lines":8,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Actions/DeletionStrategy.cs#L99-L106"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The `mark` command can never actually delete files. `--dry-run` is given `DefaultValueFactory = _ => true`, and the effective dry-run flag is computed as `dryRun = !doDelete || parseResult.GetValue(dryRunOpt)`. When the user passes `--delete` (or `--delete-permanent`), `doDelete` is true so `!doDelete` is false, but `GetValue(dryRunOpt)` still returns the default `true`, so `dryRun` is `false || true == true`. The deletion branch is therefore never reached and the command only ever prints `[dry-run] would delete`. The user would have to pass an explicit `--dry-run false` to delete, which is unintuitive and undocumented. Note `scan-and-compare` does NOT have this bug because its `--dry-run` option has no default (defaults to false).","fix":"Drop the `DefaultValueFactory = _ => true` on `dryRunOpt` (matching ScanAndCompareCommand) so that an explicit `--delete`/`--delete-permanent` actually deletes, while a bare `mark` with neither flag still defaults to dry-run via `!doDelete`. Alternatively compute `dryRun = parseResult.GetValue(dryRunOpt) || !doDelete` only when the user explicitly set --dry-run; the cleanest fix is removing the default.","locations":[{"ref":"VDF.CLI/Commands/MarkCommand.cs:38-41","code":"   38 | \t\t\tvar dryRunOpt = new Option<bool>(\"--dry-run\") {\n   39 | \t\t\t\tDescription = \"Print which files would be deleted without deleting anything (default).\",\n   40 | \t\t\t\tDefaultValueFactory = _ => true\n   41 | \t\t\t};","lines":4,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Commands/MarkCommand.cs#L38-L41"},{"ref":"VDF.CLI/Commands/MarkCommand.cs:83-85","code":"   83 | \t\t\t\tbool doPermanent = parseResult.GetValue(deletePermanentOpt);\n   84 | \t\t\t\tbool doDelete = parseResult.GetValue(deleteOpt) || doPermanent;\n   85 | \t\t\t\tbool dryRun = !doDelete || parseResult.GetValue(dryRunOpt);","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Commands/MarkCommand.cs#L83-L85"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"ImageUtils.JoinImages(IReadOnlyList<Bitmap>) does not validate input like the byte[] overload does. It reads images[0].PixelSize.Height as the strip height and sums widths, but never checks for zero/negative dimensions, never caps the total size against MaxCompositeBufferBytes / MaxDisplayableCompositeWidth, and creates a RenderTargetBitmap of (w, h) directly. If images have differing heights, frames taller than images[0] are clipped; if w or h is 0 the scription":"`CompareCommand` registers no `--include` option but `ApplyToSettings` still reads `Include` via `r.GetValue(Include)`. For an option not registered on the command, GetValue returns the option's default (an empty array for `Option<string[]>` with OneOrMore arity, or possibly null), so the loop is a no-op — the code relies on `IncludeList.Count == 0` to then set `ScanAgainstEntireDatabase = true`. This works but is fragile: `ApplyToSettings` reads many options (`Exclude`, `NoSubdirs`, `UsePhash`, `NativeFfmpeg`, `HardwareAccel`, `CustomFfArgs`, `CheckpointInterval`, partial-clip options) that `compare` never registers, silently overwriting any values loaded from a settings file with hardcoded defaults (e.g. `IncludeSubDirectories = !false = true`, `MaxDegreeOfParallelism` remapped, `HardwareAccelerationMode = none`). A user who set these in a --settings file for compare would have them clobbered.","fix":"ApplyToSettings should only overwrite a setting when the corresponding option is actually present/registered on the parse result (check `r.GetResult(option)` for an explicit token), or compare should use a dedicated apply method that only touches the options it registers.","locations":[{"ref":"VDF.CLI/Commands/CompareCommand.cs:38","code":"   38 | \t\t\t\tSharedOptions.ApplyToSettings(engine.Settings, parseResult);","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Commands/CompareCommand.cs#L38"},{"ref":"VDF.CLI/Commands/SharedOptions.cs:126-162","code":"  126 | \t\tinternal static void ApplyToSettings(Settings s, ParseResult r) {\n  127 | \t\t\tvar includes = r.GetValue(Include);\n  128 | \t\t\tif (includes != null)\n  129 | \t\t\t\tforeach (var p in includes) s.IncludeList.Add(p);\n  130 | \n  131 | \t\t\tvar excludes = r.GetValue(Exclude);\n  132 | \t\t\tif (excludes != null)\n  133 | \t\t\t\tforeach (var p in excludes) s.BlackList.Add(p);\n  134 | \n  135 | \t\t\ts.Threshhold = r.GetValue(Threshold);\n  136 | \t\t\ts.Percent = r.GetValue(Percent);\n  137 | \t\t\t// Commands that don't register --parallelism (e.g. 'compare') get default(int) == 0\n  138 | \t\t\t// back from GetValue, and 0 is the one value ParallelOptions rejects (#804). Remap\n  139 | \t\t\t// only that sentinel to the documented default of 1; -1 (unbounded) and any positive\n  140 | \t\t\t// value the user actually passed are left untouched.\n  141 | \t\t\tint parallelism = r.GetValue(Parallelism);\n  142 | \t\t\ts.MaxDegreeOfParallelism = parallelism == 0 ? 1 : parallelism;\n  143 | \t\t\ts.IncludeSubDirectories = !r.GetValue(NoSubdirs);\n  144 | \t\t\ts.IncludeImages = r.GetValue(IncludeImages);\n  145 | \t\t\ts.UsePHashing = r.GetValue(UsePhash);\n  146 | \t\t\ts.UseNativeFfmpegBinding = r.GetValue(NativeFfmpeg);\n  147 | \t\t\ts.HardwareAccelerationMode = r.GetValue(HardwareAccel);\n  148 | \n  149 | \t\t\tvar db = r.GetValue(Database);\n  150 | \t\t\tif (db != null) s.CustomDatabaseFolder = db;\n  151 | \n  152 | \t\t\tvar ffArgs = r.GetValue(CustomFfArgs);\n  153 | \t\t\tif (ffArgs != null) s.CustomFFArguments = ffArgs;\n  154 | \n  155 | \t\t\ts.DatabaseCheckpointIntervalMinutes = r.GetValue(CheckpointInterval);\n  156 | \t\t\ts.IncludeNonExistingFiles = r.GetValue(IncludeNonExistingFiles);\n  157 | \t\t\ts.EnablePartialClipDetection = r.GetValue(EnablePartialClipDetection);\n  158 | \t\t\ts.PartialClipMinRatio = r.GetValue(PartialClipMinRatio);\n  159 | \t\t\ts.PartialClipSimilarityThreshold = r.GetValue(PartialClipSimilarityThreshold);\n  160 | \t\t\ts.PartialClipRequireVisualMatch = r.GetValue(PartialClipRequireVisualMatch);\n  161 | \t\t\ts.PartialClipVisualThreshold = r.GetValue(PartialClipVisualThreshold);\n  162 | \t\t}","lines":37,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Commands/SharedOptions.cs#L126-L162"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`SharedOptions.ApplyToSettings` overwrites every mapped setting with the option value (or its default) unconditionally, even though the `--settings` file is loaded first in scan-and-compare. The documented contract is 'Individual flags override values from this file', but because GetValue returns the option default when the user did not pass the flag, defaults silently overwrite file-provided values for any boolean/valued option the user omitted. E.g. a settings file with `IncludeImages=true` is overwritten to false unless the user also passes `--include-images`. Only `Include`, `Exclude`, `Database`, and `CustomFfArgs` are guarded with null checks; all the bool/numeric options are not.","fix":"For each option, only apply when the user explicitly supplied it (`r.GetResult(opt) is { Implicit: false }` / check the token source). Otherwise leave the value loaded from the settings file untouched. This is the core bug behind the '--settings is ignored for unspecified flags' behavior.","locations":[{"ref":"VDF.CLI/Commands/SharedOptions.cs:135-161","code":"  135 | \t\t\ts.Threshhold = r.GetValue(Threshold);\n  136 | \t\t\ts.Percent = r.GetValue(Percent);\n  137 | \t\t\t// Commands that don't register --parallelism (e.g. 'compare') get default(int) == 0\n  138 | \t\t\t// back from GetValue, and 0 is the one value ParallelOptions rejects (#804). Remap\n  139 | \t\t\t// only that sentinel to the documented default of 1; -1 (unbounded) and any positive\n  140 | \t\t\t// value the user actually passed are left untouched.\n  141 | \t\t\tint parallelism = r.GetValue(Parallelism);\n  142 | \t\t\ts.MaxDegreeOfParallelism = parallelism == 0 ? 1 : parallelism;\n  143 | \t\t\ts.IncludeSubDirectories = !r.GetValue(NoSubdirs);\n  144 | \t\t\ts.IncludeImages = r.GetValue(IncludeImages);\n  145 | \t\t\ts.UsePHashing = r.GetValue(UsePhash);\n  146 | \t\t\ts.UseNativeFfmpegBinding = r.GetValue(NativeFfmpeg);\n  147 | \t\t\ts.HardwareAccelerationMode = r.GetValue(Ha "}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"IncrementProgress mutates shared state (processedFiles++ and lastProgressUpdate) with no synchronization, yet it is called from inside Parallel.ForEachAsync (GatherInfos) and Parallel.For/ForEach (ScanForDuplicates) workers. The non-atomic increment loses counts under contention, so the reported progress and the final processedFiles == scanProgressMaxValue completion condition can drift, and the throttling read/write of lastProgressUpdate races. Impact: inaccurate progress/ETA and occasionally a missed final progress push.","fix":"Use Interlocked.Increment(ref processedFiles) and read it into a local; guard lastProgressUpdate reads/writes with the same atomic exchange pattern already used in RetrieveThumbnails (Interlocked.Exchange), or accept a slightly stale throttle but make the counter atomic.","locations":[{"ref":"VDF.Core/ScanEngine.cs:110-128","code":"  110 | \t\tvoid IncrementProgress(string path) {\n  111 | \t\t\tprocessedFiles++;\n  112 | \t\t\tvar pushUpdate = processedFiles == scanProgressMaxValue ||\n  113 | \t\t\t\t\t\t\t\tlastProgressUpdate + progressUpdateIntervall < DateTime.UtcNow;\n  114 | \t\t\tif (!pushUpdate) return;\n  115 | \t\t\tlastProgressUpdate = DateTime.UtcNow;\n  116 | \t\t\tvar timeRemaining = TimeSpan.FromTicks(DateTime.UtcNow.Subtract(startTime).Ticks *\n  117 | \t\t\t\t\t\t\t\t\t(scanProgressMaxValue - (processedFiles + 1)) / (processedFiles + 1));\n  118 | \t\t\tProgress?.Invoke(this,\n  119 | \t\t\t\t\t\t\tnew ScanProgressChangedEventArgs {\n  120 | \t\t\t\t\t\t\t\tCurrentPosition = processedFiles,\n  121 | \t\t\t\t\t\t\t\tCurrentFile = path,\n  122 | \t\t\t\t\t\t\t\tElapsed = ElapsedTimer.Elapsed,\n  123 | \t\t\t\t\t\t\t\tRemaining = timeRemaining,\n  124 | \t\t\t\t\t\t\t\tMaxPosition = scanProgressMaxValue,\n  125 | \t\t\t\t\t\t\t\tCurrentStage = string.Empty,\n  126 | \t\t\t\t\t\t\t});\n  127 | \t\t\tTryDatabas he return is (float)0 / 0 / 256 = NaN in BOTH the SIMD and scalar paths. That NaN then flows into the duplicate-distance comparison; NaN compared against any threshold is always false, so such frames silently never match (or, depending on caller, distort averaging). A degenerate fully-excluded frame should compare as 0 difference (identical) or be skipped, not produce NaN.","fix":"After accumulating, guard: `if (counter == 0) return 0f;` (or return a sentinel the caller treats as 'no comparable pixels') before computing `(float)diff / counter / brightnessScalePerPixel`.","locations":[{"ref":"VDF.Core/Utils/GrayBytesUtils.cs:123","code":"  123 | \t\t\treturn (float)diff / counter / brightnessScalePerPixel;","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/GrayBytesUtils.cs#L123"},{"ref":"VDF.Core/Utils/GrayBytesUtils.cs:107-123","code":"  107 | \t\t\t\tcounter /= 255; // PSADBW(mask, 0) accumulated 255 per surviving byte.\n  108 | \t\t\t}\n  109 | \t\t\telse {\n  110 | \t\t\t\tfor (int i = 0; i < img1.Length; i++) {\n  111 | \t\t\t\t\tbool isValid = true;\n  112 | \t\t\t\t\tif (ignoreBlackPixels)\n  113 | \t\t\t\t\t\tisValid = img1[i] > BlackPixelLimit && img2[i] > BlackPixelLimit;\n  114 | \t\t\t\t\tif (!isValid) continue;\n  115 | \t\t\t\t\tif (ignoreWhitePixels)\n  116 | \t\t\t\t\t\tisValid = img1[i] < WhitePixelLimit && img2[i] < WhitePixelLimit;\n  117 | \t\t\t\t\tif (!isValid) continue;\n  118 | \t\t\t\t\tdiff += Math.Abs(img1[i] - img2[i]);\n  119 | \t\t\t\t\tcounter++;\n  120 | \t\t\t\t}\n  121 | \t\t\t}\n  122 | \n  123 | \t\t\treturn (float)diff / counter / brightnessScalePerPixel;","lines":17,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/GrayBytesUtils.cs#L107-L123"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"DuplicateItem.Equals/GetHashCode are not overridden, so Duplicates (a HashSet<DuplicateItem>) uses reference equality. In ScanForPartialDuplicates the same source FileEntry can be added as a brand-new DuplicateItem across different groups (addedSources guards only within one assignment pass) and Duplicates.Add of a logically-equal item is never deduplicated. More importantly, building 'new HashSet<DuplicateItem>(duplicateDict.Values)' then adding partial-clip items by reference means an item can appear in two groups, since nothing enforces one-group-per-path at the Duplicates level.","fix":"Either deduplicate partial-clip additions against the already-grouped paths (the alreadyGrouped set excludes visual dups but not other partial-clip sources), or define value equality on Path so the HashSet enforces uniqueness.","locations":[{"ref":"VDF.Core/ViewModels/DuplicateItem.cs:26","code":"   26 | \tpublic class DuplicateItem : ViewModelBase {","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ViewModels/DuplicateItem.cs#L26"},{"ref":"VDF.Core/ScanEngine.cs:1341-1356","code":" 1341 | \t\t\tvar addedSources = new HashSet<int>();\n 1342 | \n 1343 | \t\t\tforeach (var (si, ci, sim, offsetSec, groupId) in assignments) {\n 1344 | \t\t\t\tFileEntry source = videos[si];\n 1345 | \t\t\t\tFileEntry clip = videos[ci];\n 1346 | \n 1347 | \t\t\t\tif (Settings.ExtendedFFToolsLogging)\n 1348 | \t\t\t\t\tLogger.Instance.Info($\"[Partial] {System.IO.Path.GetFileName(clip.Path)} in {System.IO.Path.GetFileName(source.Path)}: sim={sim:P1} @ {offsetSec}s (threshold {Settings.PartialClipSimilarityThreshold:P0}, fp {clip.AudioFingerprint!.Length}/{source.AudioFingerprint!.Length} blocks)\");\n 1349 | \n 1350 | \t\t\t\tif (addedSources.Add(si))\n 1351 | \t\t\t\t\tDuplicates.Add(new DuplicateItem(source, 0f, groupId, DuplicateFlags.None));\n 1352 | \n 1353 | \t\t\t\tDuplicates.Add(new DuplicateItem(clip, 1f - sim, groupId, DuplicateFlags.PartialClip) {\n 1354 | stFrameSize = items.Max(d => d.FrameSizeInt);\n 2093 | \t\t\t\tforeach (DuplicateItem d in items)\n 2094 | \t\t\t\t\tif (d.FrameSizeInt == bestFrameSize) d.IsBestFrameSize = true;","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/ScanEngine.cs#L2092-L2094"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"KeyboardShortcutManager.ApplyBindings builds KeyBindings from GetEffectiveGesture but does nothing to detect duplicate gestures across actions at apply time; combined with SetGesture which clears the conflicting binding only via ShortcutBindingVM.ApplyGesture (UI path). Shortcuts loaded from settings that conflict (e.g. a user hand-edits Settings.json, or defaults overlap after a future edit) are all added as KeyBindings with the same Gesture, and Avalonia will invoke whichever it matches first - silent, order-dependent behavior with no conflict resolution on the load path.","fix":"De-duplicate gestures when building _effectiveMap in Reload (last-wins or drop later duplicates) and/or skip adding a KeyBinding whose gesture was already bound in ApplyBindings.","locations":[{"ref":"VDF.GUI/Data/KeyboardShortcutManager.cs:30-45","code":"   30 | \t\tpublic void Reload() {\n   31 | \t\t\t_effectiveMap.Clear();\n   32 | \t\t\tforeach (var kvp in KeyboardShortcutDefaults.MainWindowDefaults)\n   33 | \t\t\t\t_effectiveMap[kvp.Key] = kvp.Value;\n   34 | \t\t\tforeach (var kvp in KeyboardShortcutDefaults.DatabaseViewerDefaults)\n   35 | \t\t\t\t_effectiveMap[kvp.Key] = kvp.Value;\n   36 | \n   37 | \t\t\tvar overrides = SettingsFile.Instance.KeyboardShortcuts;\n   38 | \t\t\tforeach (var kvp in overrides) {\n   39 | \t\t\t\tif (_effectiveMap.ContainsKey(kvp.Key))\n   40 | \t\t\t\t\t_effectiveMap[kvp.Key] = kvp.Value;\n   41 | \t\t\t}\n   42 | \n   43 | \t\t\tthis.RaisePropertyChanged(\"Item[]\");\n   44 | \t\t\tShortcutsChanged?.Invoke();\n   45 | \t\t}","lines":16,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Data/KeyboardShortcutManager.cs#L30-L45"},{"ref":"VDF.GUI/Data/KeyboardShortcutManager.cs:113-120","code":"  113 | \t\tpublic void ApplyBindings(Control target, Dictionary<string, ICommand> commandMap) {\n  114 | \t\t\ttarget.KeyBindings.Clear();\n  115 | \t\t\tforeach (var kvp in commandMap) {\n  116 | \t\t\t\tvar gesture = GetEffectiveGesture(kvp.Key);\n  117 | \t\t\t\tif (gesture != null)\n  118 | \t\t\t\t\ttarget.KeyBindings.Add(new KeyBinding { Command = kvp.Value, Gesture = gesture });\n  119 | \t\t\t}\n  120 | \t\t}","lines":8,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Data/KeyboardShortcutManager.cs#L113-L120"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"SettingsFile.SaveSettings serializes the static 'instance' field directly (JsonSerializer.Serialize(instance, ...)). If SaveSettings is called before Instance has ever been accessed (instance still null), it serializes null and writes the literal 'null' to Settings.json, corrupting the settings file. MainWindow_Exit calls SaveSettings on exit; most paths touch Instance first, but this is a latent footgun since SaveSettings does not go through the Instance accessor.","fix":"Serialize Instance (the property) instead of the instance field so it is lazily initialized, or guard against null.","locations":[{"ref":"VDF.GUI/Data/SettingsFile.cs:354-357","code":"  354 | \t\tpublic static void SaveSettings(string? path = null) {\n  355 | \t\t\tpath = ResolveSettingsPath(path);\n  356 | \t\t\tFile.WriteAllText(path, JsonSerializer.Serialize(instance, GuiJsonContext.Default.SettingsFile));\n  357 | \t\t}","lines":4,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Data/SettingsFile.cs#L354-L357"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"FileUtils.CopyFile's collision-avoidance loop starts counter at 0 and builds 'name_0', 'name_1', ... but on File.Move/File.Copy it passes pOverwriteDest. If pOverwriteDest is true, the whole uniquifying loop is pointless work, and worse: the loop already guarantees temppath does not exist, yet still passes overwrite:true - if a concurrent process created the file between the While check and the Move, overwrite:true would clobber it. Conversely with pOverwriteDest=false the loop is correct. The overwrite flag and the dedup loop are contradictory semantics.","fix":"Decide one strategy: if overwrite requested, skip the dedup loop and target name+ext directly; otherwise keep the loop and pass overwrite:false.","locations":[{"ref":"VDF.GUI/Utils/FileUtils.cs:38-48","code":"   38 | \t\t\t\t\tstring temppath = Path.Combine(pDest, name + ext);\n   39 | \t\t\t\t\tvar counter = 0;\n   40 | \t\t\t\t\twhile (File.Exists(temppath)) {\n   41 | \t\t\t\t\t\ttemppath = Path.Combine(pDest, name + '_' + counter + ext);\n   42 | \t\t\t\t\t\tcounter++;\n   43 | \t\t\t\t\t}\n   44 | \n   45 | \t\t\t\t\tif (pMove)\n   46 | \t\t\t\t\t\tFile.Move(s.ItemInfo.Path, temppath, pOverwriteDest);\n   47 | \t\t\t\t\telse\n   48 | \t\t\t\t\t\tFile.Copy(s.ItemInfo.Path, temppath, pOverwriteDest);","lines":11,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Utils/FileUtils.cs#L38-L48"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ThumbCacheHelpers.InvalidateIfWidthChanged: when the marker file exists but contains a DIFFERENT width, it calls DeletePackFolder then immediately Directory.CreateDirectory and writes the new marker. But the active ThumbPack (Provider) may have the thumbs.pack/thumbs.idx file streams OPEN on that folder at this time, so the recursive delete can fail (handle in use) on Windows, leaving stale thumbs while the marker now claims the new width - serving mismatched-width thumbnails. There is no coordination with SetActiveProvider/Dispose.","fix":"Ensure the provider for that folder is disposed before invalidating, and verify the delete succeeded before writing the new marker.","locations":[{"ref":"VDF.GUI/Utils/ThumbnailStore.cs:58-72","code":"   58 | \t\tpublic static void InvalidateIfWidthChanged(string packFolder, int currentWidth) {\n   59 | \t\t\ttry {\n   60 | \t\t\t\tvar markerPath = Path.Combine(packFolder, \"thumbwidth.txt\");\n   61 | \t\t\t\tif (File.Exists(markerPath)) {\n   62 | \t\t\t\t\tvar stored = File.ReadAllText(markerPath).Trim();\n   63 | \t\t\t\t\tif (int.TryParse(stored, out var oldWidth) && oldWidth == currentWidth)\n   64 | \t\t\t\t\t\treturn; // width unchanged, cache is valid\n   65 | \t\t\t\t}\n   66 | \t\t\t\t// Width changed or marker doesn't exist — delete the pack so it regenerates\n   67 | \t\t\t\tDeletePackFolder(packFolder);\n   68 | \t\t\t\tDirectory.CreateDirectory(packFolder);\n   69 | \t\t\t\tFile.WriteAllText(Path.Combine(packFolder, \"thumbwidth.txt\"), currentWidth.ToString());\n   70 | \t\t\t}\n   71 | \t\t\tcatch { /* ignore */ }\n   72 | \t\t}","lines":15,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Utils/ThumbnailStore.cs#L58-L72"},{"ref":"VDF.GUI/Utils/ThumbnailStore.cs:74-80","code":"   74 | \t\tpublic static void SetActiveProvider(ThumbPack? provider) {\n   75 | \t\t\tvar path = Provider?.GetDirectory();\n   76 | \t\t\ttry { Provider?.Dispose(); } catch { }\n   77 | \t\t\tDeletePackFolder(path);\n   78 | \n   79 | \t\t\tProvider = provider;\n   80 | \t\t}","lines":7,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Utils/ThumbnailStore.cs#L74-L80"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"AppendIfMissing seeks _fs to End and reserves an offset, then if the producer writes 0 bytes it returns (off, 0) WITHOUT recording the entry (correct), but it has already advanced the file position by 0 so that is fine. The real issue: when len > 0 the bytes were written directly to the shared _fs but FlushIndex (which persists _idx mapping key->offset) is only called on Dispose. If the process crashes after data is appended but before Dispose, the pack file grows but the idx never records the new keys, and on next Open the orphaned bytes are dead weight; conversely a partially written idx is never reconciled against actual pack length.","fix":"Periodically FlushIndex (e.g. after N appends or on a timer) and/or validate idx offsets against pack length on Open, discarding entries that point past EOF.","locations":[{"ref":"VDF.GUI/Utils/ThumbnailStore.cs:130-150","code":"  130 | \t\tpublic (long off, int len) AppendIfMissing(string key, Action<Stream> writeJpeg) {\n  131 | \t\t\tlock (_gate) {\n  132 | \t\t\t\tif (_idx.TryGetValue(key, out var e) && e.Item2 > 0) return e;\n  133 | \t\t\t\t_fs.Seek(0, SeekOrigin.End);\n  134 | \t\t\t\tlong off = _fs.Position;\n  135 | \t\t\t\tusing (var limiting = new LengthCountingStream(_fs)) {\n  136 | \t\t\t\t\twriteJpeg(limiting);\n  137 | \t\t\t\t\tlimiting.Flush();\n  138 | \t\t\t\t\tint len = checked((int)limiting.BytesWritten);\n  139 | \t\t\t\t\tif (len == 0) {\n  140 | \t\t\t\t\t\t// Don't record an empty entry. Leaving _idx untouched (or unchanged\n  141 | \t\t\t\t\t\t// if a previous empty entry existed) means OpenKey returns null, the\n  142 | \t\t\t\t\t\t// Thumbnail getter sees no key match, and the next retry re-attempts\n  143 | \t\t\t\t\t\t// extraction instead of serving back broken data forever.\n  144 | \t\t\t\t\t\treturn (off, 0);\n  145 | \t\t\t\t\t}\n  146 | \t\t\t\t\t_idx[key] = (off, len);\n  147 | \t\t\t\t\treturn (off, len);\n  148 | \t\t\t\t}\n  149 | \t\t\t}\n  150 | \t\t}","lines":21,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Utils/ThumbnailStore.cs#L130-L150"},{"ref":"VDF.GUI/Utils/ThumbnailStore.cs:166-182","code":"  166 | \t\tpublic void FlushIndex() {\n  167 | \t\t\tlock (_gate) {\n  168 | \t\t\t\tvar json = System.Text.Json.JsonSerializer.Serialize(_idx, Data.GuiJsonFieldsContext.Default.ThumbPackIndex);\n  169 | \t\t\t\tFile.WriteAllText(_idxPath, json);\n  170 | \t\t\t}\n  171 | \t\t}\n  172 | \n  173 | \t\tpublic void CopyTo(Stream destination) {\n  174 | \t\t\tlock (_gate) {\n  175 | \t\t\t\t_fs.Flush();\n  176 | \t\t\t\t_fs.Seek(0, SeekOrigin.Begin);\n  177 | \t\t\t\t_fs.CopyTo(destination);\n  178 | \t\t\t\t_fs.Seek(0, SeekOrigin.End);\n  179 | \t\t\t}\n  180 | \t\t}\n  181 | \n  182 | \t\tpublic void Dispose() { FlushIndex(); _fs.Dispose(); }","lines":17,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/Utils/ThumbnailStore.cs#L166-L182"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"DatabaseViewerVM subscribes to GetDataGrid.BeginningEdit/CellEditEnded/RowEditEnded and DatabaseFilesView.Filter, but never unsubscribes. The VM holds the DataGrid; the DataGrid (via its DataContext) holds the VM. When the DatabaseViewer window closes, Save() runs but nothing detaches these handlers, so the VM is kept alive by the still-referenced DataGrid control until that control is GC'd, and the closure on TextFilter keeps the whole collection alive. Repeated open/close of the viewer leaks a VM + database copy each time.","fix":"Detach the event handlers and the Filter delegate in a Dispose/cleanup invoked from DatabaseViewer_Closing.","locations":[{"ref":"VDF.GUI/ViewModels/DatabaseViewerVM.cs:46-51","code":"   46 | \t\t\tDatabaseFilesView = new DataGridCollectionView(DatabaseFiles);\n   47 | \t\t\tDatabaseFilesView.Filter += TextFilter;\n   48 | \t\t\tGetDataGrid.BeginningEdit += GetDataGrid_BeginningEdit;\n   49 | \t\t\tGetDataGrid.CellEditEnded += GetDataGrid_CellEditEnded;\n   50 | \t\t\tGetDataGrid.RowEditEnded += GetDataGrid_RowEditEnded;\n   51 | \t\t}","lines":6,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/DatabaseViewerVM.cs#L46-L51"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"DuplicateItemVM.WireThumbnailUpdates attaches a new lambda to ItemInfo.ThumbnailsUpdated every time it is called. It is called from BOTH the parameterized constructor AND OnDeserialized. For an object created via the (DuplicateItem) constructor that is then also deserialized, or re-deserialized, multiple handlers stack on the same ItemInfo event, so each thumbnail update fires the append/RaisePropertyChanged work N times. The handler is never detached.","fix":"Guard against double-subscription (track a bool, or detach before re-attaching), and ensure only one of the constructor/OnDeserialized paths wires the handler.","locations":[{"ref":"VDF.GUI/ViewModels/DuplicateItemVM.cs:36-73","code":"   36 | \t\tpublic DuplicateItemVM(DuplicateItem item) {\n   37 | \t\t\tItemInfo = item;\n   38 | \t\t\tWireThumbnailUpdates();\n   39 | \t\t}\n   40 | \n   41 | \t\t// When a DuplicateItemVM is restored from a saved scan results backup it is created\n   42 | \t\t// through the parameterless constructor, so the ThumbnailsUpdated handler below would\n   43 | \t\t// never be attached. Without it an explicit \"load thumbnails\" pass fills ItemInfo.ImageList\n   44 | \t\t// but never writes the thumbnail pack, sets ThumbnailKey, or raises the UI, leaving restored\n   45 | \t\t// rows blank forever (issue #775). Re-wire it once deserialization has populated ItemInfo.\n   46 | \t\tpublic void OnDeserialized() => WireThumbnailUpdates();\n   47 | \n   48 | \t\tvoid WireThumbnailUpdates() {\n   49 | \t\t\tif (ItemInfo == null) return;\n   50 | \t\t\tItemInfo.ThumbnailsUpdated += () => {\n   51 | \t\t\t\ttry {\n   52 | \n   53 | \t\t\t\t\t// Width is part of the key so thumbnails generated at different\n   54 | \t\t\t\t\t// ThumbnailMaxWidth values don't collide. Without it, re-scanning at a\n   55 | \t\t\t\t\t// larger width keeps serving the old, lower-resolution JPEG (AppendIfMissing\n   56 | \t\t\t\t\t// never overwrites), which the UI then upscales -> fuzzy/pixelated (issue #776).\n   57 | \t\t\t\t\tvar key = ThumbCacheHelpers.XxHash64Hex(\n   58 | \t\t\t\t\t\tItemInfo.Path + \"|w=\" + SettingsFile.Instance.ThumbnailMaxWidth);\n   59 | \n   60 | \t\t\t\t\tThumbCacheHelpers.Provider?.AppendIfMissing(key, stream => {\n   61 | \t\t\t\t\t\tvar uiBmp = ImageUtils.JoinImages(ItemInfo.ImageList, stream);\n   62 | \t\t\t\t\t\tif (uiBmp != null) {\n   63 | \t\t\t\t\t\t\tLRUBitmapCache.GetOrCreate(key, () => uiBmp);\n   64 | \t\t\t\t\t\t}\n   65 | \t\t\t\t\t});\n   66 | \t\t\t\t\tThumbnailKey = key;\n   67 | \n   68 | \t\t\t\t}\n   69 | \t\t\t\tcatch { /* ignore */ }\n   70 | \t\t\t\tDispatcher.UIThread.Post(() => this.RaisePropertyChanged(nameof(Thumbnail)), DispatcherPriority.Render);\n   71 | \n   72 | \t\t\t};\n   73 | \t\t}","lines":38,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/DuplicateItemVM.cs#L36-L73"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Scanner_ScanDone adds all Scanner.Duplicates to the Duplicates collection one-by-one (foreach Duplicates.Add). Each Add raises CollectionChanged, which runs Duplicates_CollectionChanged subscribing handlers and adjusting counters per item - acceptable - but it happens on the UI thread inside InvokeAsync with no batching, so thousands of items produce thousands of individual change notifications and per-item counter updates while the grid is bound, a known UI-freeze pattern. ImportScanResults has the same per-item Add loop.","fix":"Populate a temporary list and use AddRange (AvaloniaList supports it) or suspend notifications during bulk add, then refresh once.","locations":[{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:610-611","code":"  610 | \t\t\t\tforeach (var item in Scanner.Duplicates)\n  611 | \t\t\t\t\tDuplicates.Add(new DuplicateItemVM(item));","lines":2,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L610-L611"},{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:979-981","code":"  979 | \t\t\t\tDuplicates.Clear();\n  980 | \t\t\t\tforeach (var item in items)\n  981 | \t\t\t\t\tDuplicates.Add(item);","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L979-L981"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"VerifyChecksumAsync silently skips verification when the checksum file cannot be fetched (catch HttpRequestException -> log + return) OR when no matching entry is found. Combined with DownloadSharedFfmpegAsync, a download whose checksum server is unreachable proceeds to extract and copy unverified binaries. The 'tamper protection' is best-effort and silently degrades to none, which undermines the security rationale stated in CheckCustomCommand's nearby comments and the Zip-Slip guards.","fix":"At minimum surface a warning to the user when verification is skipped; consider failing closed (refuse install) when the checksum cannot be obtained, given the binaries are executed.","locations":[{"ref":"VDF.GUI/ViewModels/MainWindowVM_FfmpegDownloader.cs:356-387","code":"  356 | \t\tstatic async Task VerifyChecksumAsync(Uri downloadUrl, string filePath, string archiveFileName) {\n  357 | \t\t\tvar checksumUrl = new Uri(downloadUrl, \"checksums.sha256\");\n  358 | \t\t\ttry {\n  359 | \t\t\t\tusing var client = new dVerifying\"];\n   76 | \t\t\t\t\t\tawait VerifyChecksumAsync(plan.DownloadUrl, downloadPath, plan.ArchiveFileName);\n   77 | \t\t\t\t\t\tIsBusyOverlayText = App.Lang[\"Message.FfmpegDownloadExtracting\"];\n   78 | \t\t\t\t\t\tExtractArchive(downloadPath, extractedFolder, plan.ArchiveKind);","lines":6,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM_FfmpegDownloader.cs#L73-L78"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"FilterByPath setter does NOT call view?.Refresh(); it only raises PropertyChanged. The refresh is driven indirectly by the WhenAnyValue(FilterByPath).Throttle(500ms) subscription in the constructor, which calls RebuildSearchPathIndex() + view.Refresh(). But that subscription is the ONLY thing that rebuilds _groupsWithPathHit. If a new results view is built (BuildDuplicatesView) while a path filter is active and the throttle does not re-fire (value unchanged), _groupsWithPathHit can be stale relative to the new Duplicates contents. RebuildSearchPathIndex is called in Scanner_ScanDone but NOT after import unless FilterByPath changes.","fix":"Call RebuildSearchPathIndex() in BuildDuplicatesView() (or right after import) so the path-hit group index always matches the current Duplicates list.","locations":[{"ref":"VDF.GUI/ViewModels/MainWindowVM_Filter.cs:171-179","code":"  171 | \t\tstring _FilterByPath = string.Empty;\n  172 | \t\tpublic string FilterByPath {\n  173 | \t\t\tget => _FilterByPath;\n  174 | \t\t\tset {\n  175 | \t\t\t\tif (value == _FilterByPath) return;\n  176 | \t\t\t\t_FilterByPath = value;\n  177 | \t\t\t\tthis.RaisePropertyChanged(nameof(FilterByPath));\n  178 | \t\t\t}\n  179 | \t\t}","lines":9,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM_Filter.cs#L171-L179"},{"ref":"VDF.GUI/ViewModels/MainWind tton { Content = \"Compare\", Classes = { \"group-action\" } };\n  318 | \t\t\tvar keepBestBtn = new Button { Content = \"Keep Best\", Classes = { \"group-action\" } };\n  319 | \n  320 | \t\t\tcompareBtn.Click += (_, _) => {\n  321 | \t\t\t\tvar id = GetGroupId();\n  322 | \t\t\t\tif (id != Guid.Empty) vm.CompareGroup(id);\n  323 | \t\t\t};\n  324 | \t\t\tkeepBestBtn.Click += (_, _) => {\n  325 | \t\t\t\tvar id = GetGroupId();\n  326 | \t\t\t\tif (id != Guid.Empty) vm.KeepBestInGroup(id);\n  327 | \t\t\t};\n  328 | \n  329 | \t\t\tvar panel = new StackPanel {\n  330 | \t\t\t\tOrientation = Orientation.Horizontal,\n  331 | \t\t\t\tSpacing = 4,\n  332 | \t\t\t\tMargin = new Thickness(8, 0, 4, 0),\n  333 | \t\t\t\tVerticalAlignment = VerticalAlignment.Center,\n  334 | \t\t\t\tChildren = { compareBtn, keepBestBtn }\n  335 | \t\t\t};\n  336 | \n  337 | \t\t\t// Shown in place of the raw GroupId GUID (\"4 files · 3.2 GB\").\n  338 | \t\t\tvar summaryText = new TextBlock { VerticalAlignment = VerticalAlignment.Center };\n  339 | \t\t\tvoid UpdateHeaderSummary() {\n  340 | \t\t\t\tif (header.DataContext is not Avalonia.Collections.DataGridCollectionViewGroup g) return;\n  341 | \t\t\t\tint count = 0;\n  342 | \t\t\t\tlong totalSize = 0;\n  343 | \t\t\t\tforeach (var item in g.Items.OfType<DuplicateItemVM>()) {\n  344 | \t\t\t\t\tcount++;\n  345 | \t\t\t\t\tif (item.ItemInfo.SizeLong > 0)\n  346 | \t\t\t\t\t\ttotalSize += item.ItemInfo.SizeLong;\n  347 | \t\t\t\t}\n  348 | \t\t\t\tsummaryText.Text = string.Format(App.Lang[\"GroupHeader.Summary\"], count, totalSize.BytesToString());\n  349 | \t\t\t}\n  350 | \t\t\t// Recycled headers keep our injected controls but get a new group.\n  351 | \t\t\theader.DataContextChanged += (_, _) => UpdateHeaderSummary();\n  352 | \n  353 | \t\t\t// Inject buttons into the header's visual tree once it's loaded\n  354 | \t\t\theader.Loaded += (_, _) => {\n  355 | \t\t\t\t// Walk visual tree to find the root Grid and append our button panel\n  but file names should match exactly).","fix":"Match the exact static file paths (`path == \"/app.css\"`, `path == \"/app.js\"`) instead of `StartsWith`, or serve them from a clearly-prefixed directory.","locations":[{"ref":"VDF.Web/Program.cs:63-72","code":"   63 | \tif (!authService.AuthEnabled\n   64 | \t\t|| path.StartsWith(\"/login\", StringComparison.OrdinalIgnoreCase)\n   65 | \t\t|| path.StartsWith(\"/auth/\", StringComparison.OrdinalIgnoreCase)\n   66 | \t\t|| path.StartsWith(\"/_framework\", StringComparison.OrdinalIgnoreCase)\n   67 | \t\t|| path.StartsWith(\"/_blazor\", StringComparison.OrdinalIgnoreCase)\n   68 | \t\t|| path.StartsWith(\"/app.css\", StringComparison.OrdinalIgnoreCase)\n   69 | \t\t|| path.StartsWith(\"/app.js\", StringComparison.OrdinalIgnoreCase)) {\n   70 | \t\tawait next();\n   71 | \t\treturn;\n   72 | \t}","lines":10,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L63-L72"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The HQ thumbnail cache is cleared wholesale when it reaches 4096 entries (`if (scan.HqThumbCache.Count >= 4096) scan.HqThumbCache.Clear();`). Because this is a `ConcurrentDictionary` accessed concurrently by many request threads with no coordination, multiple requests can each observe Count >= 4096 and each call Clear(), and Clear() also throws away every other in-flight cache entry. This is a thundering-herd / cache-stampede pattern: at the threshold, throughput collapses as the cache is repeatedly emptied and every concurrent request re-runs FFmpeg. Same pattern with the 64-entry full-res cache.","fix":"Use a bounded LRU cache (e.g. MemoryCache with a size limit) instead of clear-on-threshold, or at minimum evict a fraction rather than Clear() the whole dictionary. Avoid recomputing on every concurrent miss.","locations":[{"ref":"VDF.Web/Program.cs:129-131","code":"  129 | \t\tif (scan.HqThumbCache.Count >= 4096)\n  130 | \t\t\tscan.HqThumbCache.Clear();\n  131 | \t\tscan.HqThumbCache.TryAdd(cacheKey, jpeg);","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L129-L131"},{"ref":"VDF.Web/Program.cs:158-160","code":"  158 | \t\tif (scan.FullThumbCache.Count >= 64)\n  159 | \t\t\tscan.FullThumbCache.Clear();\n  160 | \t\tscan.FullThumbCache.TryAdd(cacheKey, jpeg);","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Program.cs#L158-L160"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`StrategyParser.Parse` (the CustomParser for the required, non-nullable `mark --strategy`) returns `default` when `ParseToken` returns null on invalid input: `=> ParseToken(result) ?? default`. `default(Strategy)` is `LowestQuality` (enum value 0). `ParseToken` does call `result.AddError(...)` so System.CommandLine should fail the parse before the value is used, but if any future refactor consumes the bound value despite the error, an invalid `--strategy` would silently bind to `LowestQuality` rather than failing. The `?? default` masks the error rather than rethrowing.","fix":"Since an error is already added, the fallback value is cosmetic, but `?? default` is misleading; consider returning the parsed strategy only and relying on the framework's error handling, or document that the value is unused on error.","locations":[{"ref":"VDF.CLI/Actions/DeletionStrategy.cs:55","code":"   55 | \t\tpublic static Strategy Parse(ArgumentResult result) => ParseToken(result) ?? default;","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Actions/DeletionStrategy.cs#L55"},{"ref":"VDF.CLI/Actions/DeletionStrategy.cs:60-66","code":"   60 | \t\tstatic Strategy? ParseToken(ArgumentResult result) {\n   61 | \t\t\tstring? token = result.Tokens.Count > 0 ? result.Tokens[0].Value : null;\n   62 | \t\t\tif (TryParse(token, out var strategy))\n   63 | \t\t\t\treturn strategy;\n   64 | \t\t\tresult.AddError($\"Invalid strategy '{token}'. Valid values: {string.Join(\", \", Names)}.\");\n   65 | \t\t\treturn null;\n   66 | \t\t}","lines":7,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Actions/DeletionStrategy.cs#L60-L66"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`MarkCommand.MoveToTrash` Linux/macOS branches do not implement the XDG trash `.trashinfo` metadata files, so files moved to `~/.local/share/Trash/files/` are not properly recognized/restorable by desktop trash tooling (no entry in `Trash/info/`). They also collision-rename within the trash dir but never record the original path, making 'restore' impossible. Functionally the file is removed from its location (the user's goal) but calling it 'moved to trash' overstates recoverability.","fix":"Write a corresponding `.trashinfo` file under `Trash/info/` with the original Path and DeletionDate per the XDG Trash spec, or document that CLI trashing is not desktop-restorable.","locations":[{"ref":"VDF.CLI/Commands/MarkCommand.cs:150-167","code":"  150 | \t\t\telse if (OperatingSystem.IsLinux()) {\n  151 | \t\t\t\t// XDG trash specification: move to ~/.local/share/Trash/files/\n  152 | \t\t\t\tstring trashDir = Path.Combine(\n  153 | \t\t\t\t\tEnvironment.GetFolderPath(Environment.SpecialFolder.UserProfile),\n  154 | \t\t\t\t\t\".local\", \"share\", \"Trash\", \"files\");\n  155 | \t\t\t\tDirectory.CreateDirectory(trashDir);\n  156 | \t\t\t\t// Skip trash for cross-filesystem files (e.g. network shares) to avoid downloading\n  157 | \t\t\t\tif (!VDF.Core.Utils.FileUtils.IsOnSameFileSystem(path, trashDir)) {\n  158 | \t\t\t\t\tFile.Delete(path);\n  159 | \t\t\t\t\treturn;\n  160 | \t\t\t\t}\n  161 | \t\t\t\tstring dest = Path.Combine(trashDir, Path.GetFileName(path));\n  162 | \t\t\t\t// Avoid overwriting existing trash entries\n  163 | \t\t\t\tint n = 1;\n  164 | \t\t\t\twhile (File.Exists(dest))\n  165 | \t\t\t\t\tdest = Path.Combine(trashDir, $\"{Path.GetFileNameWithoutExtension(path)}_{n++}{Path.GetExtension(path)}\");\n  166 | \t\t\t\tFile.Move(path, dest);\n  167 | \t\t\t}","lines":18,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Commands/MarkCommand.cs#L150-L167"},{"ref":"VDF.CLI/Commands/MarkCommand.cs:168-184","code":"  168 | \t\t\telse if (OperatingSystem.IsMacOS()) {\n  169 | \t\t\t\t// macOS: move to ~/.Trash/\n  170 | \t\t\t\tstring trashDir = Path.Combine(\n  171 | \t\t\t\t\tEnvironment.GetFolderPath(Environment.SpecialFolder.UserProfile),\n  172 | \t\t\t\t\t\".Trash\");\n  173 | \t\t\t\tDirectory.CreateDirectory(trashDir);\n  174 | \t\t\t\t// Skip trash for cross-volume files to avoid cross-volume copy\n  175 | \t\t\t\tif (!VDF.Core.Utils.FileUtils.IsOnSameFileSystem(path, trashDir)) {\n  176 | \t\t\t\t\tFile.Delete(path);\n  177 | \t\t\t\t\treturn;\n  178 | \t\t\t\t}\n  179 | \t\t\t\tstring dest = Path.Combine(trashDir, Path.GetFileName(path));\n  180 | \t\t\t\tint n = 1;\n  181 | \t\t\t\twhile (File.Exists(dest))\n  182 | \t\t\t\t\tdest = Path.Combine(trashDir, $\"{Path.GetFileNameWithoutExtension(path)}_{n++}{Path.GetExtension(path)}\");\n  183 | \t\t\t\tFile.Move(path, dest);\n  184 | \t\t\t}","lines":17,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.CLI/Commands/MarkCommand.cs#L168-L184"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ScanRunner.RunScanAndCompareAsync` runs `RunSearchAsync` then `RunCompareAsync`, but `WireProgress` and the per-run methods both subscribe to `ScanAborted`. In `RunSearchAsync` the abort handler `OnAborted` cancels the search TCS; the same `ScanAborted` is also subscribed by `WireProgress` (printing 'Aborted'). That is intended. However, `RunSearchAsync` subscribes `ScanAborted` and unsubscribes it after the search; if an abort fires during the COMPARE phase, `RunCompareAsync` handles it. Fine — but if `engine.Stop()` is invoked via the cancellation-token Register callback during RunSearchAsync, `tcs.TrySetCanceled()` is also called directly AND the engine may later raise ScanAborted, double-signaling. The TrySet* guards make this benign, but the cancellation path both calls Stop() and cancels the TCS without waiting for the engine to actually wind down, so the engine may still be running after the await returns.","fix":"On cancellation, prefer letting the engine's ScanAborted event complete the TCS rather than also force-cancelling it, so the await does not return while the engine thread is still active (which can race the subsequent SaveDatabase).","locations":[{"ref":"VDF.CLI/Commands/ScanRunner.cs:31-50","code":"   31 | \t\tinternal static async Task RunSearchAsync(ScanEngine engine, CancellationToken ct) {\n   32 | \t\t\tvar tcs = new TaskCompletionSource(TaskCreationOptions.RunContinuationsAsynchronously);\n   33 | \n   34 | \t\t\tengine.BuildingHashesDone += OnDone;\n   35 | \t\t\tengine.ScanAborted += OnAborted;\n   36 | \t\t\tct.Register(() => { engine.Stop(); tcs.TrySetCanceled(); });\n   37 | \n   38 | \t\t\t// searchAndCompare:false — the CLI drives comparison as a separate awaitable step\n   39 | \t\t\t// (RunCompareAsync). Letting StartSearch auto-chain into StartCompare would run the\n   40 | \t\t\t// comparison twice, and the two concurrent SaveDatabase calls crash on the temp\n   41 | \t\t\t// database file (#803).\n   42 | \t\t\tengine.StartSearch(searchAndCompare: false);\n   43 | \t\t\tawait tcs.Task;\n   44 | \n   45 | \t\t\tengine.BuildingHashesDone -= OnDone;\n   46 | \t\t\tengine.ScanAborted -= OnAborted;\n   47 | \n   48 | \t\t\tvoid OnDone(object? s, EventArgs e)
