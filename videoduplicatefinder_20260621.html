e full candidate list with OrderBy/OrderByDescending (O(n log n), plus LINQ allocations) for every criterion just to take .First(); it only needs the max/min element. For large duplicate groups across many criteria this is needlessly allocation-heavy.","fix":"Replace OrderBy(...).First() / OrderByDescending(...).First() with a single MinBy/MaxBy pass (no full sort, no intermediate ordered enumerable).","locations":[{"ref":"VDF.Core/Utils/QualityRanker.cs:63-65","code":"   63 | \t\t\t\tkeep = criterion.Ascending\n   64 | \t\t\t\t\t? candidates.OrderBy(criterion.Accessor).First()\n   65 | \t\t\t\t\t: candidates.OrderByDescending(criterion.Accessor).First();","lines":3,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Utils/QualityRanker.cs#L63-L65"}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"WriteScanResultsCsv's Escape uses up to four separate s.Contains calls per field plus a Replace; minor, runs off the UI thread on a snapshot, so impact is low. Noted for completeness only.","fix":"Use s.IndexOfAny(new[]{',','\"','\\n','\\r'}) >= 0 to decide quoting in one pass.","locations":[{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:800-805","code":"  800 | \t\t\tstatic string Escape(string? s) {\n  801 | \t\t\t\ts ??= string.Empty;\n  802 | \t\t\t\treturn s.Contains(',') || s.Contains('\"') || s.Contains('\\n') || s.Contains('\\r')\n  803 | \t\t\t\t\t? \"\\\"\" + s.Replace(\"\\\"\", \"\\\"\\\"\") + \"\\\"\"\n  804 | \t\t\t\t\t: s;\n  805 | \t\t\t}","lines":6,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L800-L805"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"medium","easy":false,"description":"`ScanService._cts` (CancellationTokenSource) is created in the constructor and recreated in `StartScanAndCompare`, and cancelled in `Stop`, but its token is never passed to `_engine.StartSearch()` nor observed anywhere. Cancellation is actually performed by `_engine.Stop()`. The CTS is therefore pure dead state — `_cts.Cancel()` has no effect and `Dispose()` only disposes an unused object. A maintainer could believe cancellation is plumbed through the token when it is not.","fix":"Either remove `_cts` entirely (rely on `_engine.Stop()`), or wire the token into the engine so cancellation flows through it. As written it is misleading dead code.","locations":[{"ref":"VDF.Web/Services/ScanService.cs:50","code":"   50 | \t\tCancellationTokenSource _cts = new();","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/ScanService.cs#L50"},{"ref":"VDF.Web/Services/ScanService.cs:109-126","code":"  109 | \t\tpublic void StartScanAndCompare() {\n  110 | \t\t\tif (State == ScanState.Scanning || State == ScanState.Comparing) return;\n  111 | \t\t\t_cts = new CancellationTokenSource();\n  112 | \t\t\tState = ScanState.Scanning;\n  113 | \t\t\tErrorMessage = null;\n  114 | \t\t\tLastProgress = null;\n  115 | \t\t\tFilesHashed = 0;\n  116 | \t\t\t_engine.Duplicates.Clear();\n  117 | \t\t\tClearThumbnailCaches();\n  118 | \t\t\ttry {\n  119 | \t\t\t\t_engine.StartSearch();\n  120 | \t\t\t}\n  121 | \t\t\tcatch (Exception ex) {\n  122 | \t\t\t\tSetError(ex);\n  123 | \t\t\t\treturn;\n  124 | \t\t\t}\n  125 | \t\t\tNotify();\n  126 | \t\t}","lines":18,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/ScanService.cs#L109-L126"},{"ref":"VDF.Web/Services/ScanService.cs:139-142","code":"  139 | \t\tpublic void Stop() {\n  140 | \t\t\t_engine.Stop();\n  141 | \t\t\t_cts.Cancel();\n  142 | \t\t}","lines":4,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/ScanService.cs#L139-L142"},{"ref":"VDF.Web/Services/ScanService.cs:416" /blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Chromaprint/Pipeline/Chroma.cs#L59-L61"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"FileEntry exposes a typo'd public property HasThubmanilError ('Thubmanil' = Thumbnail) and Settings exposes a typo'd public field Threshhold (double 'h'). These are part of the public/serialized API surface; renaming is a breaking change but the typos are confusing and easy to misuse. Threshhold appears unused by the audited code (Percent drives the similarity threshold).","fix":"Add correctly-spelled aliases and mark the misspelled members [Obsolete], or rename if a serialization break is acceptable. Confirm Threshhold is truly unused before removing.","locations":[{"ref":"VDF.Core/FileEntry.cs:118-123","code":"  118 | \t\t[MemoryPackIgnore]\n  119 | \t\tpublic bool HasThubmanilError {\n  120 | \t\t\t[MethodImpl(MethodImplOptions.AggressiveInlining)]\n  121 | \t\t\tget => Flags.Has(EntryFlags.ThumbnailError);\n  122 | \t\t\tprotected set => Flags.Set(EntryFlags.ThumbnailError, value);\n  123 | \t\t}","lines":6,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/FileEntry.cs#L118-L123"},{"ref":"VDF.Core/Settings.cs:51","code":"   51 | \t\tpublic byte Threshhold = 5;","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Core/Settings.cs#L51"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"FileTypeFilter.cs ... wait, CompareBy.cs is effectively empty: it has all the usings but an empty 'namespace VDF.GUI.Data { }' body. The file declares nothing - it is entirely dead and should be removed (or its intended type added).","fix":"Delete the empty CompareBy.cs file.","locations":[{"ref":"VDF.GUI/Data/CompareBy.cs:24-26","code":"   24 | namespace VDF.GUI.Data {\n   25 | \t\n   26 | }","li id SplitDaisyChainGroups() {\n 1562 | \t\t\t// Build a fast lookup from path -> FileEntry for re-comparing pairs.\n 1563 | \t\t\tvar dbLookup = new Dictionary<string, FileEntry>(\n 1564 | \t\t\t\tCoreUtils.IsWindows ? StringComparer.OrdinalIgnoreCase : StringComparer.Ordinal);\n 1565 | \t\t\tforeach (FileEntry fe in DatabaseUtils.Database)\n 1566 | \t\t\t\tdbLookup[fe.Path] = fe;\n 1567 | \n 1568 | \t\t\t// Group duplicates by GroupId; only process groups with 3+ members.\n 1569 | \t\t\tvar groups = Duplicates\n 1570 | \t\t\t\t.GroupBy(d => d.GroupId)\n 1571 | \t\t\t\t.Where(g => g.Count() >= 3)\n 1572 | \t\t\t\t.ToList();\n 1573 | \n 1574 | \t\t\tif (groups.Count == 0) return;\n 1575 | \n 1576 | \t\t\tint groupsSplit = 0;\n 1577 | \t\t\tint itemsRemoved = 0;\n 1578 | \n 1579 | \t\t\tforeach (var group in groups) {\n 1580 | \t\t\t\tvar members = group.ToList();\n 1581 | \t\t\t\tint n = members.Count;\n 1582 | \n 1583 | \t\t\t\t// Resolve FileEntry for each member; skip group if any entry is missing\n 1584 | \t\t\t\t// or lacks a compare snapshot (defensive — all visual duplicates stem\n 1585 | \t\t\t\t// from the snapshot-validated scan list).\n 1586 | \t\t\t\tvar entries = new FileEntry[n];\n 1587 | \t\t\t\tbool allFound = true;\n 1588 | \t\t\t\tfor (int i = 0; i < n; i++) {\n 1589 | \t\t\t\t\tif (!dbLookup.TryGetValue(members[i].Path, out var fe) || fe.compareGray == null) {\n 1590 | \t\t\t\t\t\tallFound = false;\n 1591 | \t\t\t\t\t\tbreak;\n 1592 | \t\t\t\t\t}\n 1593 | \t\t\t\t\tentries[i] = fe;\n 1594 | \t\t\t\t}\n 1595 | \t\t\t\tif (!allFound) continue;\n 1596 | \n 1597 | \t\t\t\t// Build pairwise similarity matrix.\n 1598 | \t\t\t\tvar similar = new bool[n, n];\n 1599 | \t\t\t\tfor (int i = 0; i < n; i++) {\n 1600 | \t\t\t\t\tsimilar[i, i] = true;\n 1601 | \t\t\t\t\tfor (int j = i + 1; j < n; j++) {\n 1602 | \t\t\t\t\t\tbool isSimilar = CheckIfDuplicate(entries[i], null, null, entries[j], out _);\n 1603 | \t\t\t\t\t\tsimilar[i, j] = isSimilar;\n 1604 | \t\t\t\ "https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L659"},{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:683-689","code":"  683 | \t\tprivate DuplicateItemVM? GetSelectedDuplicateItem() {\n  684 | \t\t\treturn GetDataGrid.SelectedItem as DuplicateItemVM;\n  685 | \t\t}\n  686 | \n  687 | \t\tprivate List<DuplicateItemVM> GetSelectedDuplicates() {\n  688 | \t\t\treturn GetDataGrid.SelectedItems?.Cast<DuplicateItemVM>().ToList() ?? new();\n  689 | \t\t}","lines":7,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L683-L689"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","easy":false,"description":"Multiple public event handlers and commands are 'async void', so exceptions thrown after the first await are unobservable and crash or are swallowed: LoadDatabase (async void, calls Environment.Exit on failure), Thumbnails_ValueChanged (async void), ImportScanResultsIncludingThumbnails (async void), OpenItems/OpenItemsInFolder (async void), DeleteInternal (async void, the core delete pipeline). An exception escaping DeleteInternal after 'await Task.Run' (e.g. MessageBoxService.Show throwing) propagates to the synchronization context as an unhandled exception with no catch, since the command wrappers fire it via Dispatcher.UIThread.InvokeAsync without awaiting.","fix":"Convert to async Task and await them (commands can be CreateFromTask). Where a fire-and-forget UI handler is required, wrap the body in try/catch and log/show errors.","locations":[{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:449","code":"  449 | \t\tpublic async void Thumbnails_ValueChanged(object? sender, NumericUpDownValueChangedEventArgs e) {","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L449"},{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:504","code":"  504 | \t\tpublic async void LoadDatabase() {","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L504"},{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:922","code":"  922 | \t\tasync void ImportScanResultsIncludingThumbnails(string? path = null) {","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L922"},{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:1076","code":" 1076 | \t\tpublic async void OpenItems() {","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L1076"},{"ref":"VDF.GUI/ViewModels/MainWindowVM.cs:1666","code":" 1666 | \t\tasync void DeleteInternal(bool fromDisk,","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.GUI/ViewModels/MainWindowVM.cs#L1666"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"high","easy":false,"description":"Auth tokens are stored only in an in-memory `HashSet<string> _validTokens` that is never persisted. The auth cookie is issued with a 30-day MaxAge, but on every process restart the in-memory set is empty, so every previously-issued cookie is immediately invalid and all users are logged out. More subtly, the set grows unbounded — every login (including repeated logins, bots hitting /auth/login with the correct password) adds a 32-byte token that is never expired or evicted, a slow memory leak. There is also no server-side token expiry: a token stays valid for the process lifetime regardless of the cookie's 30-day claim.","fix":"Persist tokens (or use a signed/expiring token such as a data-protected payload or JWT) so cookies survive restarts and carry real expiry, and cap or expire the in-memory set to avoid unbounded growth.","locations":[{"ref":"VDF.Web/Services/AuthService.cs:40","code":"   40 | \t\treadonly HashSet<string> _validTokens = new();","lines":1,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/AuthService.cs#L40"},{"ref":"VDF.Web/Services/AuthService.cs:80-91","code":"   80 | \t\tpublic string IssueToken() {\n   81 | \t\t\tvar token = Convert.ToBase64String(RandomNumberGenerator.GetBytes(32));\n   82 | \t\t\tlock (_validTokens)\n   83 | \t\t\t\t_validTokens.Add(token);\n   84 | \t\t\treturn token;\n   85 | \t\t}\n   86 | \n   87 | \t\tpublic bool ValidateToken(string? token) {\n   88 | \t\t\tif (string.IsNullOrEmpty(token)) return false;\n   89 | \t\t\tlock (_validTokens)\n   90 | \t\t\t\treturn _validTokens.Contains(token);\n   91 | \t\t}","lines":12,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/AuthService.cs#L80-L91"},{"ref":"VDF.Web/Services/AuthService.cs:98-107","code":"   98 | \t\tpublic void SetAuthCookie(HttpContext ctx, string token, bool persistent = true) {\n   99 | \t\t\tctx.Response.Cookies.Append(CookieName, token, new CookieOptions {\n  100 | \t\t\t\tHttpOnly = true,\n  101 | \t\t\t\tSameSite = SameSiteMode.Strict,\n  102 | \t\t\t\t// Persistent: survives browser restarts for 30 days.\n  103 | \t\t\t\t// Otherwise: session cookie, gone when the browser closes.\n  104 | \t\t\t\tMaxAge = persistent ? CookieMaxAge : null,\n  105 | \t\t\t\tIsEssential = true,\n  106 | \t\t\t});\n  107 | \t\t}","lines":10,"link":"https://github.com/0x90d/videoduplicatefinder/blob/178333c5f8b47b5a2f0c1505696788d8b409277d/VDF.Web/Services/AuthService.cs#L98-L107"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"medium","easy":false,"description":"FfmpegEngine native-health state (_nativeConsecutiveFailures, _nativeDisabledForSession, _vulkanNativeWarningLogged) and the _FFmpegPath cache are mutable statics accessed from GetThumbnail/GetGrayFrames which run concurrently across worker threads during a scan. Increment (++_nativeConsecutiveFailures), reads, and the warning-once flag are not synchronized, so the circuit breaker count is racy (lost increments) and the 'once per scan' Vulkan/disable messages can be logged multiple times or the threshold tripped inconsistently.","fix":"Use Interlocked for the counter and a lock or Interlocked.Exchange for the boolean latches, or accept the raciness explicitly with a comment if benign.","locations":[{"ref":"VDF.Core/FFTools/FfmpegEngine.cs:62-86","code":"   62 | \t\tstatic int _nativeConsecutiveFailures;\n   63 | \t\tstatic bool _nativeDisabledForSession;\n   64 | \t\tconst int NativeFailureThreshold = 5;\n   65 | \n   66 | \t\t/// <summary>True when a native FFmpeg operation should be attempted.<\/summary>\n   67 | \t\tstatic bool ShouldUseNativeBinding =>\n   68 | \t\t\tUseNativeBinding && !_nativeDisabledForSession && FFmpegNative.FFmpegHelper.CanLoadNativeLibraries;\n   69 | \n   70 | \t\tstatic void RecordNativeSuccess() => _nativeConsecutiveFailures = 0;\n   71 | \n   72 | \t\tstatic void RecordNativeFailure(string file, Exception e) {\n   73 | \t\t\tif (_nativeDisabledForSession)\n   74 | \t\t\t\treturn;\n   75 | \t\t\tint n = ++_nativeConsecutiveFailures;\n   76 | \t\t\tif (n >= NativeFailureThreshold) {\n   77 | \t\t\t\t_nativeDisabledForSession = true;\n   78 | \t\t\t\tLogger.Instance.Info(\n   79 | \t\t\t\t\t$\"Native FFmpeg binding failed on {n} consecutive files; using process mode for the rest of this scan. \" +\n   80 | \t\t\t\t\t$\"Last error on '{file}': {e.GetType().Name}: {e.Message}. \" +\n   81 | \t\t\t\t\t$\"If this persists, set hardware acceleration to 'none' or disable 'Use native FFmpeg binding'.\");\n   82 | \t\t\t}\n   83 | \t\t\telse {\n   84 | \t\t\t\tLogger.Instance.Info($\"Failed using native FFmpeg binding on '{file}', switching to process mode. Exception: {e}\");\n   85 | \t\t\t}\n   86 | \t\t}","lines":25,"link":"https://github.com/0x90d/videod <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
