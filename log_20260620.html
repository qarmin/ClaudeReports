<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The test-only helper `Inner::to_test_token` calls `unimplemented!()` for the `I128`, `U128`, `Debug`, and `Display` variants. `to_test_token` is reached through the `pub(crate)` `Value::to_token` helper used across the crate's tests (e.g. source.rs tests). Any future test that builds a `Value` from an i128/u128/debug/display and calls `to_token()` will panic at runtime rather than fail with a clear assertion, which is an easy footgun for contributors. Not a shipping-code defect (cfg(test) only).","fix":"Either return a dedicated `Token` variant for 128-bit/debug/display values, or have `to_test_token` return an `Option`/`Result` so callers handle the unsupported case explicitly instead of panicking.","locations":[{"ref":"src/kv/value.rs:1032-1047","code":" 1032 |         #[cfg(test)]\n 1033 |         pub fn to_test_token(&self) -> Token<'_> {\n 1034 |             match self {\n 1035 |                 Inner::None => Token::None,\n 1036 |                 Inner::Bool(v) => Token::Bool(*v),\n 1037 |                 Inner::Str(v) => Token::Str(*v),\n 1038 |                 Inner::Char(v) => Token::Char(*v),\n 1039 |                 Inner::I64(v) => Token::I64(*v),\n 1040 |                 Inner::U64(v) => Token::U64(*v),\n 1041 |                 Inner::F64(v) => Token::F64(*v),\n 1042 |                 Inner::I128(_) => unimplemented!(),\n 1043 |                 Inner::U128(_) => unimplemented!(),\n 1044 |                 Inner::Debug(_) => unimplemented!(),\n 1045 |                 Inner::Display(_) => unimplemented!(),\n 1046 |             }\n 1047 |         }","lines":16,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/kv/value.rs#L1032-L1047"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`count_default` takes its source by value (`source: impl Source`) while the analogous `get_default` takes it by reference (`&(impl Source + ?Sized)`). The `Source::count` default calls `count_default(self)`, so for the by-value path the only callable bound is the blanket `&T: Source` impl, meaning a reference is moved in - harmless in practice but inconsistent with `get_default` and prevents `count_default` from being called directly on an unsized `Source`.","fix":"Make `count_default` take `source: &(impl Source + ?Sized)` to mirror `get_default`, and call `count_default(self)` (self is already `&Self`).","locations":[{"ref":"src/kv/source.rs:113-128","code":"  113 | /// The default implementation of `Source::count`.\n  114 | fn count_default(source: impl Source) -> usize {\n  115 |     struct Count(usize);\n  116 | \n  117 |     impl<'kvs> VisitSource<'kvs> for Count {\n  118 |         fn visit_pair(&mut self, _: Key<'kvs>, _: Value<'kvs>) -> Result<(), Error> {\n  119 |             self.0 += 1;\n  120 | \n  121 |             Ok(())\n  122 |         }\n  123 |     }\n  124 | \n  125 |     let mut count = Count(0);\n  126 |     let _ = source.visit(&mut count);\n  127 |     count.0\n  128 | }","lines":16,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/kv/source.rs#L113-L128"},{"ref":"src/kv/source.rs:90-111","code":"   90 | /// The default implementation of `Source::get`\n   91 | fn get_default<'v>(source: &'v (impl Source + ?Sized), key: Key) -> Option<Value<'v>> {\n   92 |     struct Get<'k, 'v> {\n   93 |         key: Key<'k>,\n   94 |         found: Option<Value<'v>>,\n   95 |     }\n   96 | \n   97 |     impl<'k, 'kvs> VisitSource<'kvs> for Get<'k, 'kvs> {\n   98 |         fn visit_pair(&mut self, key: Key<'kvs>, value: Value<'kvs>) -> Result<(), Error> {\n   99 |             if self.key == key {\n  100 |                 self.found = Some(value);\n  101 |             }\n  102 | \n  103 |             Ok(())\n  104 |         }\n  105 |     }\n  106 | \n  107 |     let mut get = Get { key, found: None };\n  108 | \n  109 |     let _ = source.visit(&mut get);\n  110 |     get.found\n  111 | }","lines":22,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/kv/source.rs#L90-L111"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"Several `From` impls for the dependency-free `Inner` perform no-op casts to their own type. `From<i64>` does `Inner::I64(v as i64)` where `v` is already `i64`, and `From<u64>` does `Inner::U64(v as u64)` where `v` is already `u64`. The casts are pointless (unlike the `i8`/`i16`/`i32` cases where the widening cast is real) and can mislead a reader into thinking a conversion is happening.","fix":"Drop the redundant `as i64` / `as u64` casts: `Inner::I64(v)` and `Inner::U64(v)`.","locations":[{"ref":"src/kv/value.rs:831-835","code":"  831 |     impl<'v> From<i64> for Inner<'v> {\n  832 |         fn from(v: i64) -> Self {\n  833 |             Inner::I64(v as i64)\n  834 |         }\n  835 |     }","lines":5,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/kv/value.rs#L831-L835"},{"ref":"src/kv/value.rs:861-865","code":"  861 |     impl<'v> From<u64> for Inner<'v> {\n  862 |         fn from(v: u64) -> Self {\n  863 |             Inner::U64(v as u64)\n  864 |         }\n  865 |     }","lines":5,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/kv/value.rs#L861-L865"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The `increment_severity`/`decrement_severity` methods and their docs invert the meaning of \"severity\" relative to the rest of the file. `Level::iter`'s own doc says iteration goes \"from more severe to less severe\" (Error -> Trace), i.e. Error is the most severe. Yet `increment_severity` walks Info -> Debug -> Trace and documents Trace as \"the highest level\", and `decrement_severity` documents Error as \"already lowest level\". So calling `increment_severity` actually DEcreases severity. A caller trusting the names/docs to raise the severity of a message will get the opposite. The names track the numeric discriminant, not severity.","fix":"Either rename to `increment_verbosity`/`decrement_verbosity` (which is what they actually do), or flip the implementations so `increment_severity` moves toward `Error`. At minimum, fix the docs so \"highest\"/\"lowest\" are stated as verbosity, not severity, and note the inversion explicitly.","locations":[{"ref":"src/lib.rs:583-623","code":"  583 |     /// Get the next-highest `Level` from this one.\n  584 |     ///\n  585 |     /// If the current `Level` is at the highest level, the returned `Level` will be the same as the\n  586 |     /// current one.\n  587 |     ///\n  588 |     /// # Examples\n  589 |     ///\n  590 |     /// ```\n  591 |     /// use log::Level;\n  592 |     ///\n  593 |     /// let level = Level::Info;\n  594 |     ///\n  595 |     /// assert_eq!(Level::Debug, level.increment_severity());\n  596 |     /// assert_eq!(Level::Trace, level.increment_severity().increment_severity());\n  597 |     /// assert_eq!(Level::Trace, level.increment_severity().increment_severity().increment_severity()); // max level\n  598 |     /// ```\n  599 |     pub fn increment_severity(&self) -> Self {\n  600 |         let current = *self as usize;\n  601 |         Self::from_usize(current + 1).unwrap_or(*self)\n  602 |     }\n  603 | \n  604 |     /// Get the next-lowest `Level` from this one.\n  605 |     ///\n  606 |     /// If the current `Level` is at the lowest level, the returned `Level` will be the same as the\n  607 |     /// current one.\n  608 |     ///\n  609 |     /// # Examples\n  610 |     ///\n  611 |     /// ```\n  612 |     /// use log::Level;\n  613 |     ///\n  614 |     /// let level = Level::Info;\n  615 |     ///\n  616 |     /// assert_eq!(Level::Warn, level.decrement_severity());\n  617 |     /// assert_eq!(Level::Error, level.decrement_severity().decrement_severity());\n  618 |     /// assert_eq!(Level::Error, level.decrement_severity().decrement_severity().decrement_severity()); // min level\n  619 |     /// ```\n  620 |     pub fn decrement_severity(&self) -> Self {\n  621 |         let current = *self as usize;\n  622 |         Self::from_usize(current.saturating_sub(1)).unwrap_or(*self)\n  623 |     }","lines":41,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/lib.rs#L583-L623"},{"ref":"src/lib.rs:736-777","code":"  736 |     /// Get the next-highest `LevelFilter` from this one.\n  737 |     ///\n  738 |     /// If the current `LevelFilter` is at the highest level, the returned `LevelFilter` will be the\n  739 |     /// same as the current one.\n  740 |     ///\n  741 |     /// # Examples\n  742 |     ///\n  743 |     /// ```\n  744 |     /// use log::LevelFilter;\n  745 |     ///\n  746 |     /// let level_filter = LevelFilter::Info;\n  747 |     ///\n  748 |     /// assert_eq!(LevelFilter::Debug, level_filter.increment_severity());\n  749 |     /// assert_eq!(LevelFilter::Trace, level_filter.increment_severity().increment_severity());\n  750 |     /// assert_eq!(LevelFilter::Trace, level_filter.increment_severity().increment_severity().increment_severity()); // max level\n  751 |     /// ```\n  752 |     pub fn increment_severity(&self) -> Self {\n  753 |         let current = *self as usize;\n  754 |         Self::from_usize(current + 1).unwrap_or(*self)\n  755 |     }\n  756 | \n  757 |     /// Get the next-lowest `LevelFilter` from this one.\n  758 |     ///\n  759 |     /// If the current `LevelFilter` is at the lowest level, the returned `LevelFilter` will be the\n  760 |     /// same as the current one.\n  761 |     ///\n  762 |     /// # Examples\n  763 |     ///\n  764 |     /// ```\n  765 |     /// use log::LevelFilter;\n  766 |     ///\n  767 |     /// let level_filter = LevelFilter::Info;\n  768 |     ///\n  769 |     /// assert_eq!(LevelFilter::Warn, level_filter.decrement_severity());\n  770 |     /// assert_eq!(LevelFilter::Error, level_filter.decrement_severity().decrement_severity());\n  771 |     /// assert_eq!(LevelFilter::Off, level_filter.decrement_severity().decrement_severity().decrement_severity());\n  772 |     /// assert_eq!(LevelFilter::Off, level_filter.decrement_severity().decrement_severity().decrement_severity().decrement_severity()); // min level\n  773 |     /// ```\n  774 |     pub fn decrement_severity(&self) -> Self {\n  775 |         let current = *self as usize;\n  776 |         Self::from_usize(current.saturating_sub(1)).unwrap_or(*self)\n  777 |     }","lines":42,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/lib.rs#L736-L777"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on `Value::to_cow_str` reads `Try convert this value into a string.` while the sibling method `to_borrowed_str` is documented as `Try to convert this value into a borrowed string.`. The `to_cow_str` wording drops the word `to` (`Try convert` vs `Try to convert`) - a minor grammatical inconsistency repeated from the macro-generated `impl_value_to_primitive` docs. Cosmetic only.","fix":"Normalize the doc strings to `Try to convert this value into ...` across these methods.","locations":[{"ref":"src/kv/value.rs:466-471","code":"  466 |     impl<'v> Value<'v> {\n  467 |         /// Try convert this value into a string.\n  468 |         pub fn to_cow_str(&self) -> Option<Cow<'v, str>> {\n  469 |             self.inner.to_str()\n  470 |         }\n  471 |     }","lines":6,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/kv/value.rs#L466-L471"},{"ref":"src/kv/value.rs:359-374","code":"  359 | impl_value_to_primitive![\n  360 |     #[doc = \"Try convert this value into a `u64`.\"]\n  361 |     to_u64 -> u64,\n  362 |     #[doc = \"Try convert this value into a `i64`.\"]\n  363 |     to_i64 -> i64,\n  364 |     #[doc = \"Try convert this value into a `u128`.\"]\n  365 |     to_u128 -> u128,\n  366 |     #[doc = \"Try convert this value into a `i128`.\"]\n  367 |     to_i128 -> i128,\n  368 |     #[doc = \"Try convert this value into a `f64`.\"]\n  369 |     to_f64 -> f64,\n  370 |     #[doc = \"Try convert this value into a `char`.\"]\n  371 |     to_char -> char,\n  372 |     #[doc = \"Try convert this value into a `bool`.\"]\n  373 |     to_bool -> bool,\n  374 | ];","lines":16,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/kv/value.rs#L359-L374"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The `__log` macro has two arms. The first arm (key-value form) carries the comment showing a call with key-value pairs, and the second arm carries the comment for the plain form. Both example comments use `logger: my_logger` even though `__log` is an internal macro that is only ever invoked by `log!` after it has already resolved the logger via `__log_logger!` (so the real first token is always an expression like `&(...)` or `GlobalLogger`, never the literal `my_logger`). The comments are illustrative rather than wrong per se, but they can mislead a maintainer into thinking `__log` accepts a user logger token directly.","fix":"Clarify the comments to note that `$logger` here is the already-resolved logger expression produced by `__log_logger!`, not a raw user token.","locations":[{"ref":"src/macros.rs:120-121","code":"  120 |     // log!(logger: my_logger, target: \"my_target\", Level::Info, key1:? = 42, key2 = true; \"a {} event\", \"log\");\n  121 |     (logger: $logger:expr, target: $target:expr, $lvl:expr, $($key:tt $(:$capture:tt)? $(= $value:expr)?),+; $($arg:tt)+) => ({","lines":2,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/macros.rs#L120-L121"},{"ref":"src/macros.rs:134-134","code":"  134 |     // log!(logger: my_logger, target: \"my_target\", Level::Info, \"a {} event\", \"log\");","lines":1,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/macros.rs#L134"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The `Source` impls for `Box<S>`, `Arc<S>`, `Rc<S>`, and `Vec<S>` (and the blanket `&T` impl) are byte-for-byte identical three-method forwarders (`visit`/`get`/`count` each just delegate to `&**self`). Five near-identical copies are maintained by hand; a copy-paste mistake in one would silently change behavior for that wrapper only and be hard to spot.","fix":"Introduce a macro (e.g. `forward_source_deref!`) that generates the three forwarding methods, and invoke it for `&T`, `Box<S>`, `Arc<S>`, `Rc<S>`, and `Vec<S>` so the forwarding logic lives in exactly one place.","locations":[{"ref":"src/kv/source.rs:288-354","code":"  288 |     impl<S> Source for Box<S>\n  289 |     where\n  290 |         S: Source + ?Sized,\n  291 |     {\n  292 |         fn visit<'kvs>(&'kvs self, visitor: &mut dyn VisitSource<'kvs>) -> Result<(), Error> {\n  293 |             Source::visit(&**self, visitor)\n  294 |         }\n  295 | \n  296 |         fn get(&self, key: Key) -> Option<Value<'_>> {\n  297 |             Source::get(&**self, key)\n  298 |         }\n  299 | \n  300 |         fn count(&self) -> usize {\n  301 |             Source::count(&**self)\n  302 |         }\n  303 |     }\n  304 | \n  305 |     impl<S> Source for Arc<S>\n  306 |     where\n  307 |         S: Source + ?Sized,\n  308 |     {\n  309 |         fn visit<'kvs>(&'kvs self, visitor: &mut dyn VisitSource<'kvs>) -> Result<(), Error> {\n  310 |             Source::visit(&**self, visitor)\n  311 |         }\n  312 | \n  313 |         fn get(&self, key: Key) -> Option<Value<'_>> {\n  314 |             Source::get(&**self, key)\n  315 |         }\n  316 | \n  317 |         fn count(&self) -> usize {\n  318 |             Source::count(&**self)\n  319 |         }\n  320 |     }\n  321 | \n  322 |     impl<S> Source for Rc<S>\n  323 |     where\n  324 |         S: Source + ?Sized,\n  325 |     {\n  326 |         fn visit<'kvs>(&'kvs self, visitor: &mut dyn VisitSource<'kvs>) -> Result<(), Error> {\n  327 |             Source::visit(&**self, visitor)\n  328 |         }\n  329 | \n  330 |         fn get(&self, key: Key) -> Option<Value<'_>> {\n  331 |             Source::get(&**self, key)\n  332 |         }\n  333 | \n  334 |         fn count(&self) -> usize {\n  335 |             Source::count(&**self)\n  336 |         }\n  337 |     }\n  338 | \n  339 |     impl<S> Source for Vec<S>\n  340 |     where\n  341 |         S: Source,\n  342 |     {\n  343 |         fn visit<'kvs>(&'kvs self, visitor: &mut dyn VisitSource<'kvs>) -> Result<(), Error> {\n  344 |             Source::visit(&**self, visitor)\n  345 |         }\n  346 | \n  347 |         fn get(&self, key: Key) -> Option<Value<'_>> {\n  348 |             Source::get(&**self, key)\n  349 |         }\n  350 | \n  351 |         fn count(&self) -> usize {\n  352 |             Source::count(&**self)\n  353 |         }\n  354 |     }","lines":67,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/kv/source.rs#L288-L354"},{"ref":"src/kv/source.rs:130-145","code":"  130 | impl<T> Source for &T\n  131 | where\n  132 |     T: Source + ?Sized,\n  133 | {\n  134 |     fn visit<'kvs>(&'kvs self, visitor: &mut dyn VisitSource<'kvs>) -> Result<(), Error> {\n  135 |         Source::visit(&**self, visitor)\n  136 |     }\n  137 | \n  138 |     fn get(&self, key: Key) -> Option<Value<'_>> {\n  139 |         Source::get(&**self, key)\n  140 |     }\n  141 | \n  142 |     fn count(&self) -> usize {\n  143 |         Source::c :tt)+) => ({\n  175 |         $crate::log!(logger: $crate::__log_logger!($logger), $crate::Level::Error, $($arg)+)\n  176 |     });","lines":9,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/macros.rs#L168-L176"},{"ref":"src/macros.rs:207-215","code":"  207 |     (logger: $logger:expr, target: $target:expr, $($arg:tt)+) => ({\n  208 |         $crate::log!(logger: $crate::__log_logger!($logger), target: $target, $crate::Level::Warn, $($arg)+)\n  209 |     });\n  210 | \n  211 |     // warn!(logger: my_logger, key1 = 42, key2 = true; \"a {} event\", \"log\")\n  212 |     // warn!(logger: my_logger, \"a {} event\", \"log\")\n  213 |     (logger: $logger:expr, $($arg:tt)+) => ({\n  214 |         $crate::log!(logger: $crate::__log_logger!($logger), $crate::Level::Warn, $($arg)+)\n  215 |     });","lines":9,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/macros.rs#L207-L215"},{"ref":"src/macros.rs:255-263","code":"  255 |     (logger: $logger:expr, target: $target:expr, $($arg:tt)+) => ({\n  256 |         $crate::log!(logger: $crate::__log_logger!($logger), target: $target, $crate::Level::Info, $($arg)+)\n  257 |     });\n  258 | \n  259 |     // info!(logger: my_logger, key1 = 42, key2 = true; \"a {} event\", \"log\")\n  260 |     // info!(logger: my_logger, \"a {} event\", \"log\")\n  261 |     (logger: $logger:expr, $($arg:tt)+) => ({\n  262 |         $crate::log!(logger: $crate::__log_logger!($logger), $crate::Level::Info, $($arg)+)\n  263 |     });","lines":9,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/macros.rs#L255-L263"},{"ref":"src/macros.rs:295-303","code":"  295 |     (logger: $logger:expr, target: $target:expr, $($arg:tt)+) => ({\n  296 |         $crate::log!(logger: $crate::__log_logger!($logger), target: $target, $crate::Level::Debug, $($arg)+)\n  297 |     });\n  298 | \n  299 |     // debug!(logger: my_logger, key1 = 42, key2 = true; \"a {} event\", \"log\")\n  300 |     // debug!(logger: my_logger, \"a {} event\", \"log\")\n  301 |     (logger: $logger:expr, $($arg:tt)+) => ({\n  302 |         $crate::log!(logger: $crate::__log_logger!($logger), $crate::Level::Debug, $($arg)+)\n  303 |     });","lines":9,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/macros.rs#L295-L303"},{"ref":"src/macros.rs:339-347","code":"  339 |     (logger: $logger:expr, target: $target:expr, $($arg:tt)+) => ({\n  340 |         $crate::log!(logger: $crate::__log_logger!($logger), target: $target, $crate::Level::Trace, $($arg)+)\n  341 |     });\n  342 | \n  343 |     // trace!(logger: my_logger, key1 = 42, key2 = true; \"a {} event\", \"log\")\n  344 |     // trace!(logger: my_logger, \"a {} event\", \"log\")\n  345 |     (logger: $logger:expr, $($arg:tt)+) => ({\n  346 |         $crate::log!(logger: $crate::__log_logger!($logger), $crate::Level::Trace, $($arg)+)\n  347 |     });","lines":9,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/macros.rs#L339-L347"},{"ref":"src/macros.rs:77-94","code":"   77 |     (logger: $logger:expr, target: $target:expr, $lvl:expr, $($arg:tt)+) => ({\n   78 |         $crate::__log!(\n   79 |             logger: $crate::__log_logger!($logger),\n   80 |             target: $target,\n   81 |             $lvl,\n   82 |             $($arg)+\n   83 |         )\n   84 |     });\n   85 | \n   86 |     // log!(logger: my_logger, Level::Info, \"a log event\")\n   87 |     (logger: $logger:expr, $lvl:expr, $($arg:tt)+) => ({\n   88 |         $crate::__log!(\n   89 |             logger: $crate::__log_logger!($logger),\n   90 |             target: $crate::__private_api::module_path!(),\n   91 |             $lvl,\n   92 |             $($arg)+\n   93 |         )\n   94 |     });","lines":18,"link":"https://github.com/rust-lang/log/blob/87e062162e051d54bb553aacae3f0c6c4c213e59/src/macros.rs#L77-L94"}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"value.rs is a ~1500 line monolith mixing many distinct responsibilities: the public `Value` type and its constructors, all `ToValue`/`From` primitive impls (via macros), the `VisitValue` trait and its forwarding impl, TWO complete alternative `Inner` backends (the `value-bag` wrapper and the dependency-free fallback enum), `std_support`, a large block of deprecated `kv_unstable` shims and exported macros, and an extensive test module. The two `inner` modules in particular must be kept behaviorally in lockstep (the fallback module documents this requirement in its header comment), which is fragile when they live in one giant file. This hurts readability and raises the risk of the two backends drifting apart.","fix":"Split value.rs into submodules: e.g. `value/mod.rs` (the `Value` type + ToValue/From impls), `value/visit.rs` (VisitValue), `value/inner_value_bag.rs` and `value/inner_fallback.rs` (the two backends), and `value/deprecated.rs` for the kv_unstable shims. Keep tests alongside their unit.","locations":[{"ref":"src/kv/value.rs:1-1499","code":"    1 | //! Structured values.\n    2 | //!\n    3 | //! This module defines the [`Value`] type and supporting APIs for\n    4 | //! capturing and serializing them.\n    5 | \n    6 | use std::fmt;\n    7 | \n    8 | pub use crate::kv::Error;\n    9 | \n   10 | /// A type that can be converted into a [`Value`](struct.Value.html).\n   11 | pub trait ToValue {\n   12 |     /// Perform the conversion.\n   13 |     fn to_value(&self) -> Value<'_>;\n   14 | }\n   15 | \n   16 | impl<T> ToValue for &T\n   17 | where\n   18 |     T: ToValue + ?Sized,\n   19 | {\n   20 |     fn to_value(&self) -> Value<'_> {\n   21 |         (**self).to_value()\n   22 |     }\n   23 | }\n   24 | \n   25 | impl<'v> ToValue for Value<'v> {\n   26 |     fn to_value(&self) -> Value<'_> {\n   27 |         Value {\n   28 |             inner: self.inner.clone(),\n   29 |         }\n   30 |     }\n   31 | }\n   32 | \n   33 | /// A value in a key-value.\n   34 | ///\n   35 | /// Values are an anonymous bag containing some structured datum.\n   36 | ///\n   37 | /// # Capturing values\n   38 | ///\n   39 | /// There are a few ways to capture a value:\n   40 | ///\n   41 | /// - Using the `Value::from_*` methods.\n   42 | /// - Using the `ToValue` trait.\n   43 | /// - Using the standard `From` trait.\n   44 | ///\n   45 | /// ## Using the `Value::from_*` methods\n   46 | ///\n   47 | /// `Value` offers a few constructor methods that capture values of different kinds.\n   48 | ///\n   49 | /// ```\n   50 | /// use log::kv::Value;\n   51 | ///\n   52 | /// let value = Value::from_debug(&42i32);\n   53 | ///\n   54 | /// assert_eq!(None, value.to_i64());\n   55 | /// ```\n   56 | ///\n   57 | /// ## Using the `ToValue` trait\n   58 | ///\n   59 | /// The `ToValue` trait can be used to capture values generically.\n   60 | /// It's the bound used by `Source`.\n   61 | ///\n   62 | /// ```\n   63 | /// # use log::kv::ToValue;\n   64 | /// let value = 42i32.to_value();\n   65 | ///\n   66 | /// assert_eq!(Some(42), value.to_i64());\n   67 | /// ```\n   68 | ///\n   69 | /// ## Using the standard `From` trait\n   70 | ///\n   71 | /// Standard types that implement `ToValue` also implement `From`.\n   72 | ///\n   73 | /// ```\n   74 | /// use log::kv::Value;\n   75 | ///\n   76 | /// let value = Value::from(42i32);\n   77 | ///\n   78 | /// assert_eq!(Some(42), value.to_i64());\n   79 | /// ```\n   80 | ///\n   81 | /// # Data model\n   82 | ///\n   83 | /// Values can hold one of a number of types:\n   84 | ///\n   85 | /// - **Null:** The absence of any other meaningful value. Note that\n   86 | ///   `Some(Value::null())` is not the same as `None`. The former is\n   87 | ///   `null` while the latter is `undefined`. This is important to be\n   88 | ///   able to tell the difference between a key-value that was logged,\n   89 | ///   but its value was empty (`Some(Value::null())`) and a key-value\n   90 | ///   that was never logged at all (`None`).\n   91 | /// - **Strings:** `str`, `char`.\n   92 | /// - **Booleans:** `bool`.\n   93 | /// - **Integers:** `u8`-`u128`, `i8`-`i128`, `NonZero*`.\n   94 | /// - **Floating point numbers:** `f32`-`f64`.\n   95 | /// - **Errors:** `dyn (Error + 'static)`.\n   96 | /// - **`serde`:** Any type in `serde`'s data model.\n   97 | /// - **`sval`:** Any type in `sval`'s data model.\n   98 | ///\n   99 | /// # Serialization\n  100 | ///\n  101 | /// Values provide a number of ways to be serialized.\n  102 | ///\n  103 | /// For basic types the [`Value::visit`] method can be used to extract the\n  104 | /// underlying typed value. However, this is limited in the amount of types\n  105 | /// supported (see the [`VisitValue`] trait methods).\n  106 | ///\n  107 | /// For more complex types one of the following traits can be used:\n  108 | ///  * `sval::Value`, requires the `kv_sval` feature.\n  109 | ///  * `serde::Serialize`, requires the `kv_serde` feature.\n  110 | ///\n  111 | /// You don't need a visitor to serialize values through `serde` or `sval`.\n  112 | ///\n  113 | /// A value can always be serialized using any supported framework, regardless\n  114 | /// of how it was captured. If, for example, a value was captured using its\n  115 | /// `Display` implementation, it will serialize through `serde` as a string. If it was\n  116 | /// captured as a struct using `serde`, it will also serialize as a struct\n  117 | /// through `sval`, or can be formatted using a `Debug`-compatible representation.\n  118 | #[derive(Clone)]\n  119 | pub struct Value<'v> {\n  120 |     inner: inner::Inner<'v>,\n  121 | }\n  122 | \n  123 | impl<'v> Value<'v> {\n  124 |     /// Get a value from a type implementing `ToValue`.\n  125 |     pub fn from_any<T>(value: &'v T) -> Self\n  126 |     where\n  127 |         T: ToValue,\n  128 |     {\n  129 |         value <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
