<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","description":"The blocking API initializes a global Tokio Runtime with Runtime::new().unwrap(). If runtime creation fails (e.g. due to resource limits), the LazyLock initializer panics, taking down any caller of the blocking API instead of returning a Result.","fix":"Build the runtime fallibly and surface the error through the public functions' Result, or document/justify the panic; at minimum use .expect with a clear message.","locations":[{"ref":"postgresql_extensions/src/blocking/extensions.rs:9","code":"    9 | static RUNTIME: LazyLock<Runtime> = LazyLock::new(|| Runtime::new().unwrap());"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","description":"The blocking API builds its global Tokio runtime with Runtime::new().unwrap(); if runtime construction fails (e.g. resource exhaustion) the first use of any blocking function panics inside a LazyLock initializer rather than returning the crate's Result error type.","fix":"Either document the panic, or construct the runtime lazily inside each function and propagate the error via crate::Result.","locations":[{"ref":"postgresql_archive/src/blocking/archive.rs:6","code":"    6 | static RUNTIME: LazyLock<Runtime> = LazyLock::new(|| Runtime::new().unwrap());"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"negligible","description":"GitHub header construction uses .parse().unwrap() for the API-version header, User-Agent, and Authorization bearer value. The token comes from the GITHUB_TOKEN env var; a token containing characters invalid for an HTTP header value (e.g. control chars/newlines) would panic instead of producing an error.","fix":"Use HeaderValue::from_str(...) and map the error into crate::Error, or sanitize/validate the token before inserting it into the header map.","locations":[{"ref":"postgresql_archive/src/repository/github/repository.rs:204-214","code":"  204 |     fn headers() -> HeaderMap {\n  205 |         let mut headers = HeaderMap::new();\n  206 |         headers.append(\n  207 |             GITHUB_API_VERSION_HEADER,\n  208 |             GITHUB_API_VERSION.parse().unwrap(),\n  209 |         );\n  210 |         headers.append(\"User-Agent\", USER_AGENT.parse().unwrap());\n  211 |         if let Some(token) = &*GITHUB_TOKEN {\n  212 |             headers.append(\"Authorization\", format!(\"Bearer {token}\").parse().unwrap());\n  213 |         }\n  214 |         headers"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"acquire_lock does not implement mutual exclusion. It opens the lock file with create(true).truncate(true).write(true), which succeeds whether or not the file already exists (and truncates an existing lock held by another process). The open therefore never fails for contention, the 30-iteration retry/sleep loop is effectively dead, and two concurrent processes both 'acquire' the lock and extract simultaneously. Duplicated in both theseus and zonky extractors.","fix":"Use OpenOptions::new().create_new(true).write(true) so creation fails with AlreadyExists when another process holds the lock; only then retry/sleep. Remove the unconditional truncate.","locations":[{"ref":"postgresql_archive/src/configuration/theseus/extractor.rs:97-114","code":"   97 |     for _ in 0..30 {\n   98 |         let lock = std::fs::OpenOptions::new()\n   99 |             .create(true)\n  100 |             .truncate(true)\n  101 |             .write(true)\n  102 |             .open(&lock_file);\n  103 | \n  104 |         match lock {\n  105 |             Ok(_) => {\n  106 |                 debug!(\"Lock acquired: {}\", lock_file.to_string_lossy());\n  107 |                 return Ok(lock_file);\n  108 |             }\n  109 |             Err(error) => {\n  110 |                 warn!(\"unable to acquire lock: {error}\");\n  111 |                 sleep(Duration::from_secs(1));\n  112 |             }\n  113 |         }\n  114 |     }"},{"ref":"postgresql_archive/src/configuration/zonky/extractor.rs:117-134","code":"  117 |     for _ in 0..30 {\n  118 |         let lock = std::fs::OpenOptions::new()\n  119 |             .create(true)\n  120 |             .truncate(true)\n  121 |             .write(true)\n  122 |             .open(&lock_file);\n  123 | \n  124 |         match lock {\n  125 |             Ok(_) => {\n  126 |                 debug!(\"Lock acquired: {}\", lock_file.to_string_lossy());\n  127 |                 return Ok(lock_file);\n  128 |             }\n  129 |             Err(error) => {\n  130 |                 warn!(\"unable to acquire lock: {error}\");\n  131 |                 sleep(Duration::from_secs(1));\n  132 |             }\n  133 |         }\n  134 |     }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"high","description":"Ephemeral port allocation is a TOCTOU race. A TcpListener is bound to port 0 to discover a free port, then immediately dropped/closed; the port number is later handed to pg_ctl which re-binds it. Between closing the listener and PostgreSQL binding, any other process (or another parallel test/instance) can grab the same port, causing intermittent startup failures.","fix":"Reduce the window or detect collisions: retry start() on bind/address-in-use errors with a fresh port, or use SO_REUSEADDR-free probing combined with a retry loop. At minimum document the race and retry start on EADDRINUSE.","locations":[{"ref":"postgresql_embedded/src/postgresql.rs:279-282","code":"  279 |         if self.settings.port == 0 {\n  280 |             let listener = TcpListener::bind((\"0.0.0.0\", 0))?;\n  281 |             self.settings.port = listener.local_addr()?.port();\n  282 |         }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"Drop attempts to stop the server only when status()==Started, but status relies on the unreliable pid-file check. If the pid file is missing/stale (e.g. server still starting, or temporary=false path), a live child PostgreSQL process is never stopped and becomes orphaned. Combined with temporary cleanup, the data dir may also be removed out from under a running server.","fix":"Make stop best-effort unconditional on drop (ignore errors if already stopped) and ensure the server is actually terminated before removing temporary data/socket directories.","locations":[{"ref":"postgresql_embedded/src/postgresql.rs:501-521","code":"  501 | impl Drop for PostgreSQL {\n  502 |     fn drop(&mut self) {\n  503 |         if self.status() == Status::Started {\n  504 |             let mut pg_ctl = PgCtlBuilder::from(&self.settings)\n  505 |                 .mode(Stop)\n  506 |                 .pgdata(&self.settings.data_dir)\n  507 |                 .shutdown_mode(Fast)\n  508 |                 .wait()\n  509 |                 .build();\n  510 | \n  511 |             let _ = pg_ctl.output();\n  512 |         }\n  513 | \n  514 |         if self.settings.temporary {\n  515 |             let _ = remove_dir_all(&self.settings.data_dir);\n  516 |             let _ = remove_file(&self.settings.password_file);\n  517 |             if let Some(ref socket_dir) = self.settings.socket_dir {\n  518 |                 let _ = remove_dir_all(socket_dir);\n  519 |             }\n  520 |         }\n  521 |     }"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"Settings::new() uses tempfile::tempdir().keep(), which deliberately leaks the TempDir guard so the OS never auto-cleans it. When temporary is false (or the process exits before Drop runs), the data dir and the .pgpass parent tempdir are left behind permanently, accumulating on disk across runs.","fix":"Document that callers are responsible for cleanup when temporary=false, or track and remove these directories; avoid keep() unless cleanup is guaranteed elsewhere.","locations":[{"ref":"postgresql_embedded/src/settings.rs:75-92","code":"   75 |         let password_file = if let Ok(dir) = tempfile::tempdir() {\n   76 |             dir.keep().join(password_file_name)\n   77 |         } else {\n   78 |             let current_dir = current_dir().unwrap_or(PathBuf::from(\".\"));\n   79 |             current_dir.join(password_file_name)\n   80 |         };\n   81 |         let data_dir = if let Ok(dir) = tempfile::tempdir() {\n   82 |             dir.keep()\n   83 |         } else {\n   84 |             let temp_dir: String = rand::rng()\n   85 |                 .sample_iter(&Alphanumeric)\n   86 |                 .take(16)\n   87 |                 .map(char::from)\n   88 |                 .collect();\n   89 | \n   90 |             let data_dir = current_dir().unwrap_or(PathBuf::from(\".\"));\n   91 |             data_dir.join(temp_dir)\n   92 |         };"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"uninstall() removes the files of EVERY installed extension, not just the one being uninstalled. The inner file-deletion loop runs unconditionally for every extension in the configuration, while only the matched extension is excluded from the kept list. Uninstalling one extension therefore deletes the on-disk .so/.control/.sql files of all other installed extensions, leaving their config entries pointing at missing files.","fix":"Move the file-removal loop into the branch that matches the target extension, e.g. change the condition so files are only deleted when extension.namespace() == namespace && extension.name() == name; otherwise just clone the extension into the kept list.","locations":[{"ref":"postgresql_extensions/src/extensions.rs:110-128","code":"  110 |     let mut extensions = Vec::new();\n  111 |     for extension in configuration.extensions() {\n  112 |         if extension.namespace() != namespace || extension.name() != name {\n  113 |             extensions.push(extension.clone());\n  114 |         }\n  115 | \n  116 |         for file in extension.files() {\n  117 |             if file.exists() {\n  118 |                 debug!(\"Removing file: {file:?}\");\n  119 |                 #[cfg(feature = \"tokio\")]\n  120 |                 tokio::fs::remove_file(file)\n  121 |                     .await\n  122 |                     .map_err(|error| IoError(error.to_string()))?;\n  123 |                 #[cfg(not(feature = \"tokio\"))]\n  124 |                 std::fs::remove_file(file)\n  125 |                     .map_err(|error| crate::error::Error::IoError(error.to_string()))?;\n  126 |             }\n  127 |         }\n  128 |     }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Archive extractors perform no path-traversal (zip-slip / tar-slip) protection. tar_gz/tar_xz build the output path by pushing the (untrusted) entry header path onto the target directory; an entry containing '..' components or an absolute path can escape extract_dir and overwrite arbitrary files. Symlink entries are also created verbatim from archive-controlled link targets. A malicious or compromised archive can write outside the intended directory.","fix":"After computing entry_name, canonicalize and verify it remains within extract_dir (reject entries containing ParentDir/RootDir components). Validate symlink targets stay within the extraction root before creating them.","locations":[{"ref":"postgresql_archive/src/extractor/tar_gz_extractor.rs:31-66","code":"   31 |         let entry_header_path = entry_header.path()?.to_path_buf();\n   32 |         let prefix = match entry_header_path.components().next() {\n   33 |             Some(component) => component.as_os_str().to_str().unwrap_or_default(),\n   34 |             None => {\n   35 |                 return Err(Unexpected(\n   36 |                     \"Failed to get file header path prefix\".to_string(),\n   37 |                 ));\n   38 |             }\n   39 |         };\n   40 |         let stripped_entry_header_path = entry_header_path.strip_prefix(prefix)?.to_path_buf();\n   41 |         let Ok(extract_dir) = extract_directories.get_path(prefix) else {\n   42 |             continue;\n   43 |         };\n   44 |         let mut entry_name = extract_dir.clone();\n   45 |         entry_name.push(stripped_entry_header_path);\n   46 | \n   47 |         if entry_type.is_dir() || entry_name.is_dir() {\n   48 |             create_dir_all(&entry_name)?;\n   49 |         } else if entry_type.is_file() {\n   50 |             let mut output_file = File::create(&entry_name)?;\n   51 |             copy(&mut entry, &mut output_file)?;\n   52 |             extracted_bytes += entry_size;\n   53 | \n   54 |             #[cfg(unix)]\n   55 |             {\n   56 |                 use std::os::unix::fs::PermissionsExt;\n   57 |                 output_file.set_permissions(std::fs::Permissions::from_mode(file_mode))?;\n   58 |             }\n   59 |             files.push(entry_name);\n   60 |         } else if entry_type.is_symlink() {\n   61 |             #[cfg(unix)]\n   62 |             if let Some(symlink_target) = entry.link_name()? {\n   63 |                 let symlink_path = entry_name.clone();\n   64 |                 std::os::unix::fs::symlink(symlink_target.as_ref(), symlink_path)?;\n   65 |                 files.push(entry_name);\n   66 |             }"},{"ref":"postgresql_archive/src/extractor/tar_xz_extractor.rs:31-69","code":"   31 |         let entry_header_path = entry_header.path()?.to_path_buf();\n   32 |         let prefix = match entry_header_path.components().next() {\n   33 |             Some(component) => component.as_os_str().to_str().unwrap_or_default(),\n   34 |             None => {\n   35 |                 return Err(Unexpected(\n   36 |                     \"Failed to get file header path prefix\".to_string(),\n   37 |                 ));\n   38 |             }\n   39 |         };\n   40 |         let Ok(extract_dir) = extract_directories.get_path(prefix) else {\n   41 |             continue;\n   42 |         };\n   43 |         let mut entry_name = extract_dir.clone();\n   44 |         entry_name.push(entry_header_path);\n   45 | \n   46 |         if entry_type.is_dir() || entry_name.is_dir() {\n   47 |             create_dir_all(&entry_name)?;\n   48 |         } else if entry_type.is_file() {\n   49 |             if let Some(parent) = entry_name.parent() {\n   50 |                 create_dir_all(parent)?;\n   51 |             }\n   52 |             let mut output_file = File::create(&entry_name)?;\n   53 |             copy(&mut entry, &mut output_file)?;\n   54 |             extracted_bytes += entry_size;\n   55 | \n   56 |             #[cfg(unix)]\n   57 |             {\n   58 |                 use std::os::unix::fs::PermissionsExt;\n   59 |                 output_file.set_permissions(std::fs::Permissions::from_mode(file_mode))?;\n   60 |             }\n   61 |             files.push(entry_name);\n   62 |         } else if entry_type.is_symlink() {\n   63 |             #[cfg(unix)]\n   64 |             if let Some(symlink_target) = entry.link_name()? {\n   65 |                 let symlink_path = entry_name.clone();\n   66 |                 std::os::unix::fs::symlink(symlink_target.as_ref(), symlink_path)?;\n   67 |                 files.push(entry_name);\n   68 |             }\n   69 |         }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Maven archive download picks the WEAKEST hasher. The loop iterates extensions in preference order [sha512, sha256, sha1, md5] but never breaks; each successful hasher::registry::get overwrites hasher_result, so the final iteration (md5) always wins when available. The comment says extensions are 'ordered by preference', but the code selects the last match, defeating the stronger checksums and weakening integrity verification.","fix":"Add a `break;` inside the `if let Ok(...)` block so the first (strongest) available hasher is selected, matching the stated preference order.","locations":[{"ref":"postgresql_archive/src/repository/maven/repository.rs:116-122","code":"  116 |         let mut hasher_result = None;\n  117 |         // Try to find a hasher for the archive; the extensions are ordered by preference.\n  118 |         for extension in &[\"sha512\", \"sha256\", \"sha1\", \"md5\"] {\n  119 |             if let Ok(hasher_fn) = hasher::registry::get(&self.url, &(*extension).to_string()) {\n  120 |                 hasher_result = Some((extension, hasher_fn));\n  121 |             }\n  122 |         }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The execute() implementations log the full command via debug!(\"Executing command: {}\", self.to_command_string()). For std::process::Command and tokio::process::Command, the Debug/to_command_string representation includes environment variables set via .envs(), so PGPASSWORD (the database password injected by every builder.get_envs) is written verbatim into the tracing debug output. The crate own test at pg_dump.rs:858 confirms the command string contains PGPASSWORD=\"password\". This leaks credentials to logs.","fix":"Redact known secret env vars (PGPASSWORD) before logging, or log only the program path and arguments rather than the full Debug of the Command including envs.","locations":[{"ref":"postgresql_commands/src/traits.rs:208","code":"  208 |         debug!(\"Executing command: {}\", self.to_command_string());"},{"ref":"postgresql_commands/src/traits.rs:249","code":"  249 |         debug!(\"Executing command: {}\", self.to_command_string());"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"is_running() only checks for the existence of postmaster.pid in the data dir. A stale pid file (left after a crash or kill -9) makes status() report Started when no server is running. Drop then issues a pg_ctl stop against a dead server, and start() can be skipped/misbehave because the lifecycle state is wrong.","fix":"Verify liveness instead of trusting the file: parse the PID from postmaster.pid and check the process exists (and is a postgres process), or attempt a lightweight connection, rather than relying solely on file existence.","locations":[{"ref":"postgresql_embedded/src/postgresql.rs:148-151","code":"  148 |     fn is_running(&self) -> bool {\n  149 |         let pid_file = self.settings.data_dir.join(\"postmaster.pid\");\n  150 |         pid_file.exists()\n  151 |     }"},{"ref":"postgresql_embedded/src/postgresql.rs:76-86","code":"   76 |     pub fn status(&self) -> Status {\n   77 |         if self.is_running() {\n   78 |             Status::Started\n   79 |         } else if self.is_initialized() {\n   80 |             Status::Stopped\n   81 |         } else if self.installed_dir().is_some() {\n   82 |             Status::Installed\n   83 |         } else {\n   84 |             Status::NotInstalled\n   85 |         }\n   86 |     }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Many Steampipe extensions are hosted under non-turbot GitHub orgs (francois2metz, theapsgroup, ip2location, ernw, solacelabs, etc.), but Steampipe::initialize() only registers the matcher and GitHub repository for URLs starting with URL = \"https://github.com/turbot\". get_archive() builds the download URL from extension.url, so archives for the ~14 non-turbot orgs never match the registered repository/matcher and installation of those extensions fails.","fix":"Register the repository/matcher for the broader prefix \"https://github.com/\" (or register each distinct org prefix), so all Steampipe extension URLs are handled, not only turbot-hosted ones.","locations":[{"ref":"postgresql_extensions/src/repository/steampipe/repository.rs:34-44","code":"   34 |     pub fn initialize() -> Result<()> {\n   35 |         postgresql_archive::matcher::registry::register(\n   36 |             |url| Ok(url.starts_with(URL)),\n   37 |             tar_gz_matcher,\n   38 |         )?;\n   39 |         postgresql_archive::repository::registry::register(\n   40 |             |url| Ok(url.starts_with(URL)),\n   41 |             Box::new(GitHub::new),\n   42 |         )?;\n   43 |         Ok(())\n   44 |     }"},{"ref":"postgresql_extensions/src/repository/steampipe/mod.rs:4","code":"    4 | pub const URL: &str = \"https://github.com/turbot\";"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"installed_dir() returns Some(installation_dir) whenever trust_installation_dir is true, without checking that the directory actually exists. status() therefore reports Status::Installed (and setup() skips install) even when nothing is installed there, leading to a confusing failure later at initialize/start instead of a clear NotInstalled state.","fix":"When trust_installation_dir is set, still verify installation_dir (or its bin dir) exists before returning Some; otherwise return None so status reflects NotInstalled.","locations":[{"ref":"postgresql_embedded/src/postgresql.rs:98-101","code":"   98 |     fn installed_dir(&self) -> Option<PathBuf> {\n   99 |         if self.settings.trust_installation_dir {\n  100 |             return Some(self.settings.installation_dir.clone());\n  101 |         }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Settings::url emits the password (and username) into the URL without percent-encoding. Default passwords are random alphanumeric so they happen to be URL-safe, but users may set arbitrary passwords/usernames via SettingsBuilder or from_url; characters like @ : / ? # will produce a malformed URL that get_pool/PgPool::connect cannot parse, breaking create_database/database_exists/drop_database.","fix":"Percent-encode username and password (url::form_urlencoded / percent_encoding) when building the URL, consistent with how socket_dir is already encoded.","locations":[{"ref":"postgresql_embedded/src/settings.rs:134-161","code":"  134 |     pub fn url<S: AsRef<str>>(&self, database_name: S) -> String {\n  135 |         match &self.socket_dir {\n  136 |             Some(socket_dir) => {\n  137 |                 let socket_str = socket_dir.to_string_lossy();\n  138 |                 let encoded: String =\n  139 |                     url::form_urlencoded::byte_serialize(socket_str.as_bytes()).collect();\n  140 |                 format!(\n  141 |                     \"postgresql://{}:{}@{}:{}/{}?host={}\",\n  142 |                     self.username,\n  143 |                     self.password,\n  144 |                     self.host,\n  145 |                     self.port,\n  146 |                     database_name.as_ref(),\n  147 |                     encoded\n  148 |                 )\n  149 |             }\n  150 |             None => {\n  151 |                 format!(\n  152 |                     \"postgresql://{}:{}@{}:{}/{}\",\n  153 |                     self.username,\n  154 |                     self.password,\n  155 |                     self.host,\n  156 |                     self.port,\n  157 |                     database_name.as_ref()\n  158 |                 )\n  159 |             }\n  160 |         }\n  161 |     }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"get_postgresql_version() parses the version with regex r\"PostgreSQL\\)\\s(\\d+\\.\\d+)\", which assumes the `postgres --version` output contains a literal \")\" before the version (the EnterpriseDB/packaged format like \"postgres (PostgreSQL) 16.3\"). Vanilla server builds emit \"postgres (PostgreSQL) 16.3\" but some distributions print \"PostgreSQL 16.3\" without the parenthesis, which would fail to match and abort installation.","fix":"Loosen the regex to tolerate output without the closing parenthesis, e.g. r\"PostgreSQL\\)?\\s*(\\d+\\.\\d+)\" or extract the first \\d+\\.\\d+ token after 'PostgreSQL'.","locations":[{"ref":"postgresql_extensions/src/extensions.rs:217-227","code":"  217 |     let re = Regex::new(r\"PostgreSQL\\)\\s(\\d+\\.\\d+)\")?;\n  218 |     let Some(captures) = re.captures(&stdout) else {\n  219 |         return Err(IoError(format!(\n  220 |             \"Failed to obtain postgresql version from {stdout}\"\n  221 |         )));\n  222 |     };\n  223 |     let Some(version) = captures.get(1) else {\n  224 |         return Err(IoError(format!(\n  225 |             \"Failed to match postgresql version from {stdout}\"\n  226 |         )));\n  227 |     };"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The regex helper wraps the key as [\\W_]{key}[\\W_], requiring a non-word/underscore delimiter on BOTH sides of the token. A token that appears at the very start or very end of the asset name will not match (e.g. a name beginning with the target triple, or ending in the arch right before the extension boundary that is itself a word char). This makes the platform/version matching unnecessarily fragile and can reject otherwise valid asset names.","fix":"Use proper word-boundary anchoring that also accepts string start/end, e.g. (^|[\\W_]){key}([\\W_]|$), or match against the name split on delimiters.","locations":[{"ref":"postgresql_extensions/src/matcher.rs:104-107","code":"  104 | fn regex(key: &str) -> Result<Regex> {\n  105 |     let regex = Regex::new(format!(r\"[\\W_]{key}[\\W_]\").as_str())?;\n  106 |     Ok(regex)\n  107 | }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Settings::url emits the socket directory as a `host=` query parameter, but from_url never reads a `host=` query parameter back into socket_dir (it only reads the dedicated `socket_dir` param and the URL host component). A URL produced by url() for a socket-configured instance does not round-trip through from_url back to the same socket configuration.","fix":"Make url()/from_url symmetric: either emit socket_dir under a parameter from_url reads, or have from_url interpret the `host=` query parameter as a socket path when it looks like a filesystem path.","locations":[{"ref":"postgresql_embedded/src/settings.rs:134-161","code":"  134 |     pub fn url<S: AsRef<str>>(&self, database_name: S) -> String {\n  135 |         match &self.socket_dir {\n  136 |             Some(socket_dir) => {\n  137 |                 let socket_str = socket_dir.to_string_lossy();\n  138 |                 let encoded: String =\n  139 |                     url::form_urlencoded::byte_serialize(socket_str.as_bytes()).collect();\n  140 |                 format!(\n  141 |                     \"postgresql://{}:{}@{}:{}/{}?host={}\",\n  142 |                     self.username,\n  143 |                     self.password,\n  144 |                     self.host,\n  145 |                     self.port,\n  146 |                     database_name.as_ref(),\n  147 |                     encoded\n  148 |                 )\n  149 |             }\n  150 |             None => {\n  151 |                 format!(\n  152 |                     \"postgresql://{}:{}@{}:{}/{}\",\n  153 |                     self.username,\n  154 |                     self.password,\n  155 |                     self.host,\n  156 |                     self.port,\n  157 |                     database_name.as_ref()\n  158 |                 )\n  159 |             }\n  160 |         }\n  161 |     }"},{"ref":"postgresql_embedded/src/settings.rs:197-228","code":"  197 |         if let Some(host) = parsed_url.host() {\n  198 |             settings.host = host.to_string();\n  199 |         }\n  200 |         if let Some(port) = parsed_url.port() {\n  201 |             settings.port = port;\n  202 |         }\n  203 |         if !parsed_url.username().is_empty() {\n  204 |             settings.username = parsed_url.username().to_string();\n  205 |         }\n  206 |         if let Some(password) = parsed_url.password() {\n  207 |             settings.password = password.to_string();\n  208 |         }\n  209 |         if let Some(temporary) = query_parameters.get(\"temporary\") {\n  210 |             settings.temporary = temporary == \"true\";\n  211 |         }\n  212 |         if let Some(timeout) = query_parameters.get(\"timeout\") {\n  213 |             settings.timeout = match timeout.parse::<u64>() {\n  214 |                 Ok(timeout) => Some(Duration::from_secs(timeout)),\n  215 |                 Err(error) => {\n  216 |                     return Err(Error::InvalidUrl {\n  217 |                         url: url.as_ref().to_string(),\n  218 |                         message: error.to_string(),\n  219 |                     });\n  220 |                 }\n  221 |             };\n  222 |         }\n  223 |         if let Some(trust_installation_dir) = query_parameters.get(\"trust_installation_dir\") {\n  224 |             settings.trust_installation_dir = trust_installation_dir == \"true\";\n  225 |         }\n  226 |         if let Some(socket_dir) = query_parameters.get(\"socket_dir\") {\n  227 |             settings.socket_dir = Some(PathBuf::from(socket_dir));\n  228 |         }"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"from_url parses booleans as `value == \"true\"`, so any other string (e.g. temporary=1, temporary=TRUE, temporary=yes, or a typo) is silently treated as false rather than reported as an invalid value. This makes misconfiguration silent.","fix":"Parse with str::parse::<bool>() and return Error::InvalidUrl on failure, consistent with how timeout/version parse errors are handled.","locations":[{"ref":"postgresql_embedded/src/settings.rs:209-211","code":"  209 |         if let Some(temporary) = query_parameters.get(\"temporary\") {\n  210 |             settings.temporary = temporary == \"true\";\n  211 |         }"},{"ref":"postgresql_embedded/src/settings.rs:223-225","code":"  223 |         if let Some(trust_installation_dir) = query_parameters.get(\"trust_installation_dir\") {\n  224 |             settings.trust_installation_dir = trust_installation_dir == \"true\";\n  225 |         }"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"zip_matcher carries #[expect(clippy::case_sensitive_file_extension_comparisons)] for its name.ends_with(\".zip\") check, but tar_gz_matcher does the same case-sensitive name.ends_with(\".tar.gz\") without the attribute. Beyond the lint inconsistency, both matchers reject uppercase or mixed-case extensions (e.g. .TAR.GZ, .ZIP) that some release assets use, silently filtering valid archives.","fix":"Use a case-insensitive suffix check (lowercase the name before comparison) for both matchers, and apply consistent lint handling.","locations":[{"ref":"postgresql_extensions/src/matcher.rs:13-18","code":"   13 | pub fn tar_gz_matcher(url: &str, name: &str, version: &Version) -> Result<bool> {\n   14 |     if !matcher(url, name, version)? {\n   15 |         return Ok(false);\n   16 |     }\n   17 | \n   18 |     Ok(name.ends_with(\".tar.gz\"))"},{"ref":"postgresql_extensions/src/matcher.rs:26-33","code":"   26 | #[expect(clippy::case_sensitive_file_extension_comparisons)]\n   27 | pub fn zip_matcher(url: &str, name: &str, version: &Version) -> Result<bool> {\n   28 |     if !matcher(url, name, version)? {\n   29 |         return Ok(false);\n   30 |     }\n   31 | \n   32 |     Ok(name.ends_with(\".zip\"))\n   33 | }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"PgBenchBuilder has two distinct builder methods that emit the exact same CLI flag. no_vacuum_bench() (field no_vacuum_bench) pushes \"--no-vacuum\" (line 533), identical to no_vacuum() which also pushes \"--no-vacuum\" (line 441). The doc comments differ (during initialization vs before tests) but pgbench cannot be told them apart; one of the two is a copy-paste error and the intended distinct behavior is unreachable.","fix":"Determine the correct distinct semantics: pgbench uses -n/--no-vacuum for the benchmark phase; remove the redundant no_vacuum_bench field/method or map the init-phase option to its real flag.","locations":[{"ref":"postgresql_commands/src/pgbench.rs:532-534","code":"  532 |         if self.no_vacuum_bench {\n  533 |             args.push(\"--no-vacuum\".into());\n  534 |         }"},{"ref":"postgresql_commands/src/pgbench.rs:440-442","code":"  440 |         if self.no_vacuum {\n  441 |             args.push(\"--no-vacuum\".into());\n  442 |         }"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"PgBenchBuilder::scale_bench() (field scale_bench, doc 'report this scale factor in output') emits \"--scale\" (line 551), the identical flag emitted by scale() (line 449). Two builder methods collapse to the same flag, so report-scale cannot be set independently of the initialization scale; this is a copy-paste mistake.","fix":"Map scale_bench to its real distinct pgbench option or remove the duplicate field; verify against pgbench's actual CLI which option was intended.","locations":[{"ref":"postgresql_commands/src/pgbench.rs:550-553","code":"  550 |         if let Some(scale) = &self.scale_bench {\n  551 |             args.push(\"--scale\".into());\n  552 |             args.push(scale.to_string().into());\n  553 |         }"},{"ref":"postgresql_commands/src/pgbench.rs:448-451","code":"  448 |         if let Some(scale) = &self.scale {\n  449 |             args.push(\"--scale\".into());\n  450 |             args.push(scale.to_string().into());\n  451 |         }"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"tar_gz_extractor strips the leading path component (prefix) before joining to the output dir (uses stripped_entry_header_path), but tar_xz_extractor computes prefix and stripped path logic differently: it does NOT strip and pushes the full entry_header_path. The two extractors therefore produce different on-disk layouts for the same archive structure, which is almost certainly an unintended divergence from copy-paste editing.","fix":"Make the two extractors consistent: either both strip the top-level prefix or neither do. Factor the shared tar entry-handling logic into one helper to prevent further drift.","locations":[{"ref":"postgresql_archive/src/extractor/tar_gz_extractor.rs:40-45","code":"   40 |         let stripped_entry_header_path = entry_header_path.strip_prefix(prefix)?.to_path_buf();\n   41 |         let Ok(extract_dir) = extract_directories.get_path(prefix) else {\n   42 |             continue;\n   43 |         };\n   44 |         let mut entry_name = extract_dir.clone();\n   45 |         entry_name.push(stripped_entry_header_path);"},{"ref":"postgresql_archive/src/extractor/tar_xz_extractor.rs:40-44","code":"   40 |         let Ok(extract_dir) = extract_directories.get_path(prefix) else {\n   41 |             continue;\n   42 |         };\n   43 |         let mut entry_name = extract_dir.clone();\n   44 |         entry_name.push(entry_header_path);"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"Both `debugging_level` and `override_debugging_level` emit the same `-d` option, so the two distinct builder fields collapse onto one flag. `postgres` only has a single `-d <level>` debug option; the second field is a copy-paste of the first and emits a duplicate/conflicting `-d` rather than any distinct flag.","fix":"Remove the redundant `override_debugging_level` field/setter, or map it to the actually intended distinct postgres option; do not emit a second `-d`.","locations":[{"ref":"postgresql_commands/src/postgres.rs:319-322","code":"  319 |         if let Some(level) = &self.debugging_level {\n  320 |             args.push(\"-d\".into());\n  321 |             args.push(level.to_string().into());\n  322 |         }"},{"ref":"postgresql_commands/src/postgres.rs:417-420","code":"  417 |         if let Some(level) = &self.override_debugging_level {\n  418 |             args.push(\"-d\".into());\n  419 |             args.push(level.to_string().into());\n  420 |         }"}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"The extractor registry singleton struct is named RepositoryRegistry (with a doc comment 'repository registry') instead of an extractor-specific name. This is leftover copy-paste from repository/registry.rs and is misleading when reading the extractor module.","fix":"Rename the struct to ExtractorRegistry and fix the Default doc comment to reference extractors.","locations":[{"ref":"postgresql_archive/src/extractor/registry.rs:11-29","code":"   11 | static REGISTRY: LazyLock<Arc<Mutex<RepositoryRegistry>>> =\n   12 |     LazyLock::new(|| Arc::new(Mutex::new(RepositoryRegistry::default())));\n   13 | \n   14 | type SupportsFn = fn(&str) -> Result<bool>;\n   15 | type ExtractFn = fn(&Vec<u8>, &ExtractDirectories) -> Result<Vec<PathBuf>>;\n   16 | \n   17 | /// Singleton struct to store extractors\n   18 | #[expect(clippy::type_complexity)]\n   19 | struct RepositoryRegistry {\n   20 |     extractors: Vec<(Arc<RwLock<SupportsFn>>, Arc<RwLock<ExtractFn>>)>,\n   21 | }\n   22 | \n   23 | impl RepositoryRegistry {\n   24 |     /// Creates a new extractor registry.\n   25 |     fn new() -> Self {\n   26 |         Self {\n   27 |             extractors: Vec::new(),\n   28 |         }\n   29 |     }"},{"ref":"postgresql_archive/src/extractor/registry.rs:60-62","code":"   60 | impl Default for RepositoryRegistry {\n   61 |     /// Creates a new repository registry with the default repositories registered.\n   62 |     fn default() -> Self {"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","description":"Maven hash verification compares the locally computed lowercase-hex digest against the raw HTTP response body without trimming or parsing. Maven checksum files frequently contain a trailing newline (and some contain '<hash>  <filename>'). Any trailing whitespace makes `archive_hash != hash` true, producing a spurious ArchiveHashMismatch even for a valid download. GitHub's equivalent path extracts the hash with a regex; Maven does not.","fix":"Extract the hex digest from the response (e.g. trim and take the leading hex token, or use a regex like the GitHub path) before comparing, and compare case-insensitively.","locations":[{"ref":"postgresql_archive/src/repository/maven/repository.rs:135-160","code":"  135 |         let hash = response.text().await?;\n  136 |         debug!(\"Archive hash {archive_hash_url} downloaded: {}\", hash.len(),);\n  137 | \n  138 |         debug!(\"Downloading archive {archive_url}\");\n  139 |         let request = client.get(&archive_url).headers(Self::headers());\n  140 |         let response = request.send().await?.error_for_status()?;\n  141 |         #[cfg(feature = \"indicatif\")]\n  142 |         let span = tracing::Span::current();\n  143 |         #[cfg(feature = \"indicatif\")]\n  144 |         {\n  145 |             let content_length = response.content_length().unwrap_or_default();\n  146 |             span.pb_set_length(content_length);\n  147 |         }\n  148 |         let mut bytes = Vec::new();\n  149 |         let mut source = response.bytes_stream();\n  150 |         while let Some(chunk) = source.next().await {\n  151 |             bytes.write_all(&chunk?)?;\n  152 |             #[cfg(feature = \"indicatif\")]\n  153 |             span.pb_set_position(bytes.len() as u64);\n  154 |         }\n  155 |         debug!(\"Archive {archive_url} downloaded: {}\", bytes.len(),);\n  156 | \n  157 |         let archive_hash = hasher_fn(&bytes)?;\n  158 |         if archive_hash != hash {\n  159 |             return Err(ArchiveHashMismatch { archive_hash, hash });\n  160 |         }"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"GitHub API model structs mark optional fields as required non-nullable Strings. In particular Asset.label is frequently null in real GitHub release payloads, and several Release fields may be absent. Deserializing such a response with response.json::<Vec<Release>>() fails, breaking get_release for valid releases.","fix":"Make optional/nullable fields Option<String> (at minimum label), and drop unused fields. Add #[serde(default)] where appropriate so missing fields don't fail deserialization.","locations":[{"ref":"postgresql_archive/src/repository/github/models.rs:6-31","code":"    6 | pub(crate) struct Release {\n    7 |     pub url: String,\n    8 |     pub assets_url: String,\n    9 |     pub upload_url: String,\n   10 |     pub html_url: String,\n   11 |     pub id: i64,\n   12 |     pub tag_name: String,\n   13 |     pub name: String,\n   14 |     pub draft: bool,\n   15 |     pub prerelease: bool,\n   16 |     pub assets: Vec<Asset>,\n   17 | }\n   18 | \n   19 | /// Represents a GitHub asset\n   20 | #[derive(Clone, Debug, Deserialize, Serialize)]\n   21 | pub(crate) struct Asset {\n   22 |     pub url: String,\n   23 |     pub id: i64,\n   24 |     pub node_id: String,\n   25 |     pub name: String,\n   26 |     pub label: String,\n   27 |     pub content_type: String,\n   28 |     pub state: String,\n   29 |     pub size: i64,\n   30 |     pub browser_download_url: String,\n   31 | }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"Maven version resolution aborts on the first non-semver version string: `Version::parse(version)?` propagates the error out of get_artifact, so one malformed <version> entry in maven-metadata.xml fails the entire lookup. The GitHub repository handles this correctly by skipping unparseable tags with `continue`.","fix":"Skip versions that fail to parse (log and continue) instead of returning the parse error, mirroring GitHub's get_release behavior.","locations":[{"ref":"postgresql_archive/src/repository/maven/repository.rs:66-77","code":"   66 |         for version in &metadata.versioning.versions.version {\n   67 |             let version = Version::parse(version)?;\n   68 |             if version_req.matches(&version) {\n   69 |                 if let Some(result_version) = result.clone() {\n   70 |                     if version > result_version {\n   71 |                         result = Some(version);\n   72 |                     }\n   73 |                 } else {\n   74 |                     result = Some(version);\n   75 |                 }\n   76 |             }\n   77 |         }"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In bundle.rs the releases-URL selection is inverted/buggy: when POSTGRESQL_RELEASES_URL is set but default_releases_url is empty (theseus feature disabled), the `if !default_releases_url.is_empty()` guard fails, so the user-supplied custom URL is silently discarded and the code falls through to register_theseus_repository with an empty URL, guaranteeing a download failure. The custom URL should be honored regardless of whether the theseus default is empty.","fix":"Match on env::var(\"POSTGRESQL_RELEASES_URL\") alone: if set, register the custom repository and use it; otherwise fall back to the theseus default. Do not gate the custom branch on default_releases_url being non-empty.","locations":[{"ref":"postgresql_embedded/build/bundle.rs:27-36","code":"   27 |     let releases_url = match env::var(\"POSTGRESQL_RELEASES_URL\") {\n   28 |         Ok(custom_url) if !default_releases_url.is_empty() => {\n   29 |             register_custom_repository()?;\n   30 |             custom_url\n   31 |         }\n   32 |         _ => {\n   33 |             register_theseus_repository()?;\n   34 |             default_releases_url\n   35 |         }\n   36 |     };"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"RepositoryRegistry::default() calls PortalCorp::initialize(), Steampipe::initialize(), and TensorChord::initialize() and silently discards their Results with `let _ =`. If registering the archive matcher/repository in postgresql_archive fails (e.g. poisoned lock), the registry is created in a half-initialized state and later get_archive/install calls will fail with confusing downstream errors instead of a clear initialization error.","fix":"Propagate or at least log the initialization errors (warn!) instead of discarding them with `let _`, so failures to register matchers/repositories are observable.","locations":[{"ref":"postgresql_extensions/src/repository/registry.rs:56-70","code":"   56 |         #[cfg(feature = \"portal-corp\")]\n   57 |         {\n   58 |             registry.register(\"portal-corp\", Box::new(PortalCorp::new));\n   59 |             let _ = PortalCorp::initialize();\n   60 |         }\n   61 |         #[cfg(feature = \"steampipe\")]\n   62 |         {\n   63 |             registry.register(\"steampipe\", Box::new(Steampipe::new));\n   64 |             let _ = Steampipe::initialize();\n   65 |         }\n   66 |         #[cfg(feature = \"tensor-chord\")]\n   67 |         {\n   68 |             registry.register(\"tensor-chord\", Box::new(TensorChord::new));\n   69 |             let _ = TensorChord::initialize();\n   70 |         }"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Error::IoError stores only error.to_string(), discarding the original std::io::Error (its ErrorKind and source). Callers cannot match on io::ErrorKind (e.g. NotFound when a binary is missing) or use std::error::Error::source, degrading error handling throughout the crate.","fix":"Store the std::io::Error itself (e.g. IoError(#[from] std::io::Error)) so the kind and source are preserved.","locations":[{"ref":"postgresql_commands/src/error.rs:11-12","code":"   11 |     #[error(\"{0}\")]\n   12 |     IoError(String),"},{"ref":"postgresql_commands/src/error.rs:19-23","code":"   19 | impl From<std::io::Error> for Error {\n   20 |     fn from(error: std::io::Error) -> Self {\n   21 |         Error::IoError(error.to_string())\n   22 |     }\n   23 | }"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In Drop, pg_ctl.output() result is discarded with `let _ =`. If the graceful stop fails, the error is silently swallowed and there is no fallback (e.g. kill), so a stuck server is neither reported nor force-terminated.","fix":"Log a warning on stop failure during drop and consider a forced shutdown fallback so failures are observable.","locations":[{"ref":"postgresql_embedded/src/postgresql.rs:504-512","code":"  504 |             let mut pg_ctl = PgCtlBuilder::from(&self.settings)\n  505 |                 .mode(Stop)\n  506 |                 .pgdata(&self.settings.data_dir)\n  507 |                 .shutdown_mode(Fast)\n  508 |                 .wait()\n  509 |                 .build();\n  510 | \n  511 |             let _ = pg_ctl.output();\n  512 |         }"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"get_library_path() and get_shared_path() fall back to deriving the directory from the binary dir's parent when pg_config fails, but when the parent cannot be determined they default to PathBuf::from(\".\") (the process current directory). Installing extensions then writes .so/.control/.sql files into ./lib and ./share relative to wherever the process happens to be running, which is almost never the intended PostgreSQL install location and silently corrupts the working directory.","fix":"Return an error instead of silently defaulting to the current directory when neither pg_config nor a binary parent directory yields a usable install path.","locations":[{"ref":"postgresql_extensions/src/extensions.rs:156-167","code":"  156 |             let binary_dir = settings.get_binary_dir();\n  157 |             let install_dir = if let Some(parent) = binary_dir.parent() {\n  158 |                 parent.to_path_buf()\n  159 |             } else {\n  160 |                 debug!(\n  161 |                     \"Failed to get parent directory of binary directory; defaulting to current directory\"\n  162 |                 );\n  163 |                 PathBuf::from(\".\")\n  164 |             };\n  165 |             let library_dir = install_dir.join(\"lib\");\n  166 |             debug!(\"Using library directory: {library_dir:?}\");\n  167 |             Ok(library_dir)"},{"ref":"postgresql_extensions/src/extensions.rs:182-193","code":"  182 |             let binary_dir = settings.get_binary_dir();\n  183 |             let install_dir = if let Some(parent) = binary_dir.parent() {\n  184 |                 parent.to_path_buf()\n  185 |             } else {\n  186 |                 debug!(\n  187 |                     \"Failed to get parent directory of binary directory; defaulting to current directory\"\n  188 |                 );\n  189 |                 PathBuf::from(\".\")\n  190 |             };\n  191 |             let share_dir = install_dir.join(\"share\");\n  192 |             debug!(\"Using share directory: {share_dir:?}\");\n  193 |             Ok(share_dir)"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"`ClusterDbBuilder::program_dir` is declared `fn` (private) instead of `pub fn` like every other builder in this crate. External callers therefore cannot call `.program_dir(...)`; only the in-crate `from()` and the test module can set it, making the public builder API inconsistent and incomplete.","fix":"Make the method `pub fn program_dir` to match all the other command builders.","locations":[{"ref":"postgresql_commands/src/clusterdb.rs:51-55","code":"   51 |     #[must_use]\n   52 |     fn program_dir<P: Into<PathBuf>>(mut self, path: P) -> Self {\n   53 |         self.program_dir = Some(path.into());\n   54 |         self\n   55 |     }"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"PsqlBuilder::help takes a value and emits it as a separate argument: args.push(\"--help\"); args.push(help). psql's --help does not accept a space-separated value; the topic form is --help=topic (or -? topic is not valid). Passing e.g. help(\"options\") produces `--help options`, where psql ignores/errors on the trailing token. The test asserts this incorrect output.","fix":"Emit a single argument of the form --help=<topic> when a topic is provided, or make help() a no-arg boolean flag.","locations":[{"ref":"postgresql_commands/src/psql.rs:385-388","code":"  385 |         if let Some(help) = &self.help {\n  386 |             args.push(\"--help\".into());\n  387 |             args.push(help.into());\n  388 |         }"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"get_host/get_username/get_password call String::parse::<OsString>().expect(...). OsString's FromStr is infallible, so the expect can never trigger; the .expect calls are misleading dead error-handling that implies fallibility. More importantly, parse() is a roundabout way to build an OsString from a String.","fix":"Use OsString::from(self.host.clone()) (and likewise for username/password) instead of parse().expect().","locations":[{"ref":"postgresql_embedded/src/settings.rs:250-264","code":"  250 |     fn get_host(&self) -> OsString {\n  251 |         self.host.parse().expect(\"host\")\n  252 |     }\n  253 | \n  254 |     fn get_port(&self) -> u16 {\n  255 |         self.port\n  256 |     }\n  257 | \n  258 |     fn get_username(&self) -> OsString {\n  259 |         self.username.parse().expect(\"username\")\n  260 |     }\n  261 | \n  262 |     fn get_password(&self) -> OsString {\n  263 |         self.password.parse().expect(\"password\")\n  264 |     }"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"RepositoryRegistry stores constructor closures as Arc<RwLock<NewFn>> but the closures are only ever read/invoked, never mutated. Wrapping an immutable Fn in a RwLock adds lock acquisition (and a fallible .read() that maps to PoisonedLock) on every get() with no benefit. An Arc<NewFn> would suffice.","fix":"Change the value type to Arc<NewFn> and drop the RwLock wrapping and the .read() call in get().","locations":[{"ref":"postgresql_extensions/src/repository/registry.rs:20-49","code":"   20 |     repositories: HashMap<String, Arc<RwLock<NewFn>>>,\n   21 | }\n   22 | \n   23 | impl RepositoryRegistry {\n   24 |     /// Creates a new repository registry.\n   25 |     fn new() -> Self {\n   26 |         Self {\n   27 |             repositories: HashMap::new(),\n   28 |         }\n   29 |     }\n   30 | \n   31 |     /// Registers a repository. Newly registered repositories take precedence over existing ones.\n   32 |     fn register(&mut self, namespace: &str, new_fn: Box<NewFn>) {\n   33 |         let namespace = namespace.to_string();\n   34 |         self.repositories\n   35 |             .insert(namespace, Arc::new(RwLock::new(new_fn)));\n   36 |     }\n   37 | \n   38 |     /// Gets a repository that supports the specified namespace\n   39 |     ///\n   40 |     /// # Errors\n   41 |     /// * If the namespace is not supported.\n   42 |     fn get(&self, namespace: &str) -> Result<Box<dyn Repository>> {\n   43 |         let namespace = namespace.to_string();\n   44 |         let Some(new_fn) = self.repositories.get(&namespace) else {\n   45 |             return Err(UnsupportedNamespace(namespace.to_string()));\n   46 |         };\n   47 |         let new_function = new_fn.read()?;\n   48 |         new_function()\n   49 |     }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"The zip extractor reads each entry fully into an in-memory Vec (`out`) via io::copy and then fs::write, instead of streaming the entry directly to the output file. PostgreSQL/zonky archives can be large, so this doubles peak memory and adds an unnecessary copy. The tar extractors correctly stream with copy() into a File.","fix":"Open the destination File and io::copy(&mut file, &mut output_file) directly, streaming to disk instead of buffering the whole entry in memory.","locations":[{"ref":"postgresql_archive/src/extractor/zip_extractor.rs:32-36","code":"   32 |         let mut out = Vec::new();\n   33 |         io::copy(&mut file, &mut out)?;\n   34 |         extracted_bytes += out.len() as u64;\n   35 |         let path = PathBuf::from(&extract_dir).join(file_path);\n   36 |         fs::write(&path, out)?;"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"Steampipe get_archive() and get_available_extensions() call steampipe::extensions::get() and then linearly scan/iterate the 143-element Vec for every lookup. get_archive does a find() by name on each install. Given the data is a static LazyLock built once, a HashMap<name, extension> would make lookups O(1); the linear scan is repeated per call.","fix":"Store the extensions in a LazyLock<HashMap<String, SteampipeExtension>> (or add a secondary index) so get_archive name lookups are O(1) instead of O(n).","locations":[{"ref":"postgresql_extensions/src/repository/steampipe/repository.rs:73-79","code":"   73 |         let Some(extension) = steampipe::extensions::get()\n   74 |             .iter()\n   75 |             .find(|extension| extension.name == name)\n   76 |         else {\n   77 |             let extension = format!(\"{}:{}:{}\", self.name(), name, version);\n   78 |             return Err(ExtensionNotFound(extension));\n   79 |         };"},{"ref":"postgresql_extensions/src/repository/steampipe/extensions.rs:743-745","code":"  743 | pub fn get<'a>() -> &'a Vec<SteampipeExtension> {\n  744 |     &EXTENSIONS\n  745 | }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","description":"install() in each repository does `let bytes = &archive.to_vec();` which clones the entire downloaded archive into a new Vec purely to pass &[u8] to the extractor, even though archive is already &[u8]. This is an unnecessary full-buffer copy of potentially large archives.","fix":"Pass archive directly to the extractor (zip_extract(archive, ...) / tar_gz_extract(archive, ...)) and drop the to_vec() copy.","locations":[{"ref":"postgresql_extensions/src/repository/steampipe/repository.rs:95-96","code":"   95 |         let bytes = &archive.to_vec();\n   96 |         let files = tar_gz_extract(bytes, &extract_directories)?;"},{"ref":"postgresql_extensions/src/repository/portal_corp/repository.rs:82-83","code":"   82 |         let bytes = &archive.to_vec();\n   83 |         let files = zip_extract(bytes, &extract_directories)?;"},{"ref":"postgresql_extensions/src/repository/tensor_chord/repository.rs:82-83","code":"   82 |         let bytes = &archive.to_vec();\n   83 |         let files = zip_extract(bytes, &extract_directories)?;"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`warn` is imported from tracing in all three extractor modules but never used, producing unused-import warnings (or relying on allow attributes elsewhere).","fix":"Remove the unused `warn` import from each extractor's tracing use statement.","locations":[{"ref":"postgresql_archive/src/extractor/tar_gz_extractor.rs:9","code":"    9 | use tracing::{debug, instrument, warn};"},{"ref":"postgresql_archive/src/extractor/tar_xz_extractor.rs:9","code":"    9 | use tracing::{debug, instrument, warn};"},{"ref":"postgresql_archive/src/extractor/zip_extractor.rs:7","code":"    7 | use tracing::{debug, instrument, warn};"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"matcher() takes a _version: &Version parameter that is never used; the function only inspects the URL query parameter postgresql_version and the asset name. The doc comments on tar_gz_matcher/zip_matcher/matcher claim matching against 'the postgresql major version' but the semver Version argument plays no role, making the parameter and comments misleading.","fix":"Either remove the unused version parameter from matcher (and update tar_gz_matcher/zip_matcher signatures) or actually use it; update the doc comments to reflect that matching is driven by the URL query parameter, not the Version argument.","locations":[{"ref":"postgresql_extensions/src/matcher.rs:40-51","code":"   40 | pub fn matcher(url: &str, name: &str, _version: &Version) -> Result<bool> {\n   41 |     let Ok(url) = Url::parse(url) else {\n   42 |         return Ok(false);\n   43 |     };\n   44 |     let query_parameters: HashMap<String, String> = url.query_pairs().into_owned().collect();\n   45 |     let Some(postgresql_version) = query_parameters.get(\"postgresql_version\") else {\n   46 |         return Ok(false);\n   47 |     };\n   48 |     let postgresql_major_version = match postgresql_version.split_once('.') {\n   49 |         None => return Ok(false),\n   50 |         Some((major, _)) => major,\n   51 |     };"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","description":"lib.rs documents 'This crate uses #![forbid(unsafe_code)]', but no such attribute exists in lib.rs (or anywhere in the crate). The safety guarantee advertised to users is not actually enforced by the compiler.","fix":"Add #![forbid(unsafe_code)] to lib.rs (the unix fs calls used are safe wrappers, so it should compile), or remove/soften the documentation claim.","locations":[{"ref":"postgresql_archive/src/lib.rs:105-107","code":"  105 | //! ## Safety\n  106 | //!\n  107 | //! This crate uses `#![forbid(unsafe_code)]` to ensure everything is implemented in 100% safe Rust."}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The From<semver::Error> impl is documented as converting into ParseError ('Converts a semver::Error into an ParseError'), but the body actually constructs Error::IoError. The conversion target is inconsistent with the other parse-related conversions (regex, url, parse-int all map to ParseError) and with its own doc comment.","fix":"Map semver::Error to Error::ParseError (or Error::InvalidVersion) to match the documentation and the other parse conversions.","locations":[{"ref":"postgresql_archive/src/error.rs:95-100","code":"   95 | /// Converts a [`semver::Error`] into an [`ParseError`](Error::ParseError)\n   96 | impl From<semver::Error> for Error {\n   97 |     fn from(error: semver::Error) -> Self {\n   98 |         Error::IoError(error.to_string())\n   99 |     }\n  100 | }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"ExtractDirectories::get_path doc comment states 'If no regex matches, then the file path is returned.' The implementation instead returns Err(Error::Unexpected(...)) when no regex matches, so the documented fallback behavior is wrong and could mislead callers about error handling.","fix":"Update the doc comment to state that an error is returned when no mapping matches.","locations":[{"ref":"postgresql_archive/src/extractor/model.rs:25-39","code":"   25 |     /// Returns the path associated with the first regex that matches the file path.\n   26 |     /// If no regex matches, then the file path is returned.\n   27 |     ///\n   28 |     /// # Errors\n   29 |     /// Returns an error if the file path cannot be converted to a string.\n   30 |     pub fn get_path(&self, file_path: &str) -> Result<PathBuf> {\n   31 |         for (regex, path) in &self.mappings {\n   32 |             if regex.is_match(file_path) {\n   33 |                 return Ok(path.clone());\n   34 |             }\n   35 |         }\n   36 |         Err(Error::Unexpected(format!(\n   37 |             \"No regex matched the file path: {file_path}\"\n   38 |         )))\n   39 |     }"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"PgDumpBuilder::exclude_schema doc comment reads 'Do not output commands to set ownership of objects to match the original database' which is copied verbatim from no_owner and is wrong; the method actually excludes a schema from the dump (--exclude-schema).","fix":"Replace the doc comment with an accurate description such as 'Do NOT dump the named schema(s)'.","locations":[{"ref":"postgresql_commands/src/pg_dump.rs:187-188","code":"  187 |     /// Do not output commands to set ownership of objects to match the original database\n  188 |     #[must_use]"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"PgDumpBuilder::attribute_inserts has the doc comment 'Dump data as INSERT commands with column names', identical to column_inserts. The two emit different flags (--column-inserts vs --attribute-inserts), so the duplicated comment is misleading about what attribute_inserts does.","fix":"Give attribute_inserts a distinct doc comment reflecting that --attribute-inserts is the deprecated alias of --column-inserts.","locations":[{"ref":"postgresql_commands/src/pg_dump.rs:271-272","code":"  271 |     /// Dump data as INSERT commands with column names\n  272 |     #[must_use]"},{"ref":"postgresql_commands/src/pg_dump.rs:264-265","code":"  264 |     /// Dump data as INSERT commands with column names\n  265 |     #[must_use]"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The field backing `backup_details()` is misspelled `backkup_details` (double k) in the struct definition and in `get_args`. Behavior is unaffected because the typo is internally consistent, but it is a confusing copy-paste-style identifier typo for a public-facing builder field.","fix":"Rename the field to `backup_details` for consistency with the `backup_details()` setter.","locations":[{"ref":"postgresql_commands/src/pg_waldump.rs:12","code":"   12 |     backkup_details: bool,"},{"ref":"postgresql_commands/src/pg_waldump.rs:53-56","code":"   53 |     pub fn backup_details(mut self) -> Self {\n   54 |         self.backkup_details = true;\n   55 |         self\n   56 |     }"},{"ref":"postgresql_commands/src/pg_waldump.rs:193-195","code":"  193 |         if self.backkup_details {\n  194 |             args.push(\"--bkp-details\".into());\n  195 |         }"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The blocking start() doc comment omits the Unix-socket behavior that the async start() documents, and does not mention socket_dir, even though it delegates to the same implementation. Minor doc drift between the blocking wrapper and the async API.","fix":"Keep the blocking wrapper doc comments in sync with the async methods (or reference them) so socket behavior is documented consistently.","locations":[{"ref":"postgresql_embedded/src/blocking/postgresql.rs:48-58","code":"   48 |     /// Start the database and wait for the startup to complete.\n   49 |     /// If the port is set to `0`, the database will be started on a random port.\n   50 |     ///\n   51 |     /// # Errors\n   52 |     ///\n   53 |     /// Returns an error if the startup fails.\n   54 |     pub fn start(&mut self) -> Result<()> {\n   55 |         RUNTIME\n   56 |             .handle()\n   57 |             .block_on(async move { self.inner.start().await })\n   58 |     }"}]},{"id":"CMT_8"," try {\n   30 |     /// Creates a new hasher registry.\n   31 |     fn new() -> Self {\n   32 |         Self {\n   33 |             hashers: Vec::new(),\n   34 |         }\n   35 |     }\n   36 | \n   37 |     /// Registers a hasher for a supports function. Newly registered hashers will take precedence\n   38 |     /// over existing ones.\n   39 |     fn register(&mut self, supports_fn: SupportsFn, hasher_fn: HasherFn) {\n   40 |         self.hashers.insert(\n   41 |             0,\n   42 |             (\n   43 |                 Arc::new(RwLock::new(supports_fn)),\n   44 |                 Arc::new(RwLock::new(hasher_fn)),\n   45 |             ),\n   46 |         );\n   47 |     }\n   48 | \n   49 |     /// Get a hasher for the specified url and extension.\n   50 |     ///\n   51 |     /// # Errors\n   52 |     /// * If the registry is poisoned.\n   53 |     fn get<S: AsRef<str>>(&self, url: S, extension: S) -> Result<HasherFn> {\n   54 |         let url = url.as_ref();\n   55 |         let extension = extension.as_ref();\n   56 |         for (supports_fn, hasher_fn) in &self.hashers {\n   57 |             let supports_function = supports_fn.read()?;\n   58 |             if supports_function(url, extension)? {\n   59 |                 let hasher_function = hasher_fn.read()?;\n   60 |                 return Ok(*hasher_function);\n   61 |             }\n   62 |         }\n   63 | \n   64 |         Err(UnsupportedHasher(url.to_string()))\n   65 |     }\n   66 | }"},{"ref":"postgresql_archive/src/matcher/registry.rs:17-58","code":"   17 | #[expect(clippy::type_complexity)]\n   18 | struct MatchersRegistry {\n   19 |     matchers: Vec<(Arc<RwLock<SupportsFn>>, Arc<RwLock<MatcherFn>>)>,\n   20 | }\n   21 | \n   22 | impl MatchersRegistry {\n   23 |     /// Creates a new matcher registry.\n   24 |     fn new() -> Self {\n   25 |         Self {\n   26 |             matchers: Vec::new(),\n   27 |         }\n   28 |     }\n   29 | \n   30 |     /// Registers a matcher for a supports function. Newly registered matchers will take precedence\n   31 |     /// over existing ones.\n   32 |     fn register(&mut self, supports_fn: SupportsFn, matcher_fn: MatcherFn) {\n   33 |         self.matchers.insert(\n   34 |             0,\n   35 |             (\n   36 |                 Arc::new(RwLock::new(supports_fn)),\n   37 |                 Arc::new(RwLock::new(matcher_fn)),\n   38 |             ),\n   39 |         );\n   40 |     }\n   41 | \n   42 |     /// Get a matcher for the specified URL.\n   43 |     ///\n   44 |     /// # Errors\n   45 |     /// * If the registry is poisoned.\n   46 |     fn get<S: AsRef<str>>(&self, url: S) -> Result<MatcherFn> {\n   47 |         let url = url.as_ref();\n   48 |         for (supports_fn, matcher_fn) in &self.matchers {\n   49 |             let supports_function = supports_fn.read()?;\n   50 |             if supports_function(url)? {\n   51 |                 let matcher_function = matcher_fn.read()?;\n   52 |                 return Ok(*matcher_function);\n   53 |             }\n   54 |         }\n   55 | \n   56 |         Err(UnsupportedMatcher(url.to_string()))\n   57 |     }\n   58 | }"},{"ref":"postgresql_archive/src/repository/registry.rs:19-57","code":"   19 | #[expect(clippy::type_complexity)]\n   20 | struct RepositoryRegistry {\n   21 |     repositories: Vec<(Arc<RwLock<SupportsFn>>, Arc<RwLock<NewFn>>)>,\n   22 | }\n   23 | \n   24 | impl RepositoryRegistry {\n   25 |     /// Creates a new repository registry.\n   26 |     fn new() -> Self {\n   27 |         Self {\n   28 |             repositories: Vec::new(),\n   29 |         }\n   30 |     }\n   31 | \n   32 |     /// Registers a repository. Newly registered repositories take precedence over existing ones.\n   33 |     fn register(&mut self, supports_fn: SupportsFn, new_fn: Box<NewFn>) {\n   34 |         self.repositories.insert(\n   35 |             0,\n   36 |             (\n   37 |                 Arc::new(RwLock::new(supports_fn)),\n   38 |
