he unescaped source, so the two paths are inconsistent.","fix":"Return a concise error (e.g. the cgu name and exit status) and surface the child's stderr instead of echoing the whole source; make both branches consistent.","locations":[{"ref":"src/global_asm.rs:213-215","code":"  213 |         if !status.success() {\n  214 |             return Err(format!(\"Failed to assemble `{}`\", global_asm));\n  215 |         }"},{"ref":"src/global_asm.rs:263-266","code":"  263 |         let status = child.wait().expect(\"Failed to wait for `as`.\");\n  264 |         if !status.success() {\n  265 |             return Err(format!(\"Failed to assemble `{}`\", global_asm));\n  266 |         }"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"ctlz_nonzero and cttz_nonzero are documented by FIXME comments as needing to trap on a zero argument, but the code shares the arm with ctlz/cttz and does not trap. Passing zero to these *_nonzero intrinsics is UB in Rust; silently returning the bit width instead of trapping hides programmer errors that LLVM would catch in debug builds.","fix":"For the *_nonzero variants, emit a debug-assert/trap when the argument is zero (guard with the existing debug-assertions logic), or at least document that the trap is intentionally omitted.","locations":[{"ref":"src/intrinsics/mod.rs:697-716","code":"  697 |         sym::ctlz | sym::ctlz_nonzero => {\n  698 |             intrinsic_args!(fx, args => (arg); intrinsic);\n  699 |             let val = arg.load_scalar(fx);\n  700 | \n  701 |             // FIXME trap on `ctlz_nonzero` with zero arg.\n  702 |             let res = fx.bcx.ins().clz(val);\n  703 |             let res = clif_intcast(fx, res, types::I32, false);\n  704 |             let res = CValue::by_val(res, ret.layout());\n  705 |             ret.write_cvalue(fx, res);\n  706 |         }\n  707 |         sym::cttz | sym::cttz_nonzero => {\n  708 |             intrinsic_args!(fx, args => (arg); intrinsic);\n  709 |             let val = arg.load_scalar(fx);\n  710 | \n  711 |             // FIXME trap on `cttz_nonzero` with zero arg.\n  712 |             let res = fx.bcx.ins().ctz(val);\n  713 |             let res = clif_intcast(fx, res, types::I32, false);\n  714 |             let res = CValue::by_val(res, ret.layout());\n  715 |             ret.write_cvalue(fx, res);\n  716 |         }"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`simd_bitmask` (and `simd_select_bitmask`) does not validate that the input vector `a` is actually a SIMD type before calling `a.layout().ty.simd_size_and_type(fx.tcx)`. Every other arm guards with `if !x.layout().ty.is_simd() { report_simd_type_validation_error(...) }`, but `simd_bitmask` calls `simd_size_and_type` directly at line 893, which will ICE on a non-SIMD input instead of emitting the proper diagnostic.","fix":"Add the same `if !a.layout().ty.is_simd() { report_simd_type_validation_error(...); return; }` guard before computing lane_count/lane_ty.","locations":[{"ref":"src/intrinsics/simd.rs:890-893","code":"  890 |         sym::simd_bitmask => {\n  891 |             intrinsic_args!(fx, args => (a); intrinsic);\n  892 | \n  893 |             let (lane_count, lane_ty) = a.layout().ty.simd_size_and_type(fx.tcx);"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`write_ir_file` swallows the directory-creation error for any kind other than `AlreadyExists` by calling `res.unwrap()`, which panics during what is a best-effort debug-output operation (`-Cllvm-args`/LlvmAssembly output). A read-only or full output directory turns a diagnostic dump into a compiler crash, whereas the actual file write a few lines later is handled with `early_warn`.","fix":"Handle the create_dir error the same way as the file-write error (emit `early_warn` and return) instead of `unwrap`.","locations":[{"ref":"src/pretty_clif.rs:256-260","code":"  256 |     match std::fs::create_dir(&clif_output_dir) {\n  257 |         Ok(()) => {}\n  258 |         Err(err) if err.kind() == std::io::ErrorKind::AlreadyExists => {}\n  259 |         res @ Err(_) => res.unwrap(),\n  260 |     }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"main sets process-global environment variables (RUST_BACKTRACE, CG_CLIF_DISABLE_INCR_CACHE, CARGO_TARGET_DIR, RUSTC, RUSTDOC) via env::set_var. env::set_var is not thread-safe and in newer Rust editions is unsafe; more importantly setting RUSTC/RUSTDOC to bogus sentinel strings (\"rustc_should_be_set_explicitly\") globally means any code path that forgets to override them will execute a nonexistent binary with a cryptic error rather than failing fast and clearly.","fix":"Document the sentinel approach, and ensure all spawned cargo/rustc commands explicitly set RUSTC/RUSTDOC; consider asserting at spawn sites. Be aware env::set_var thread-safety constraints for future edition upgrades.","locations":[{"ref":"build_system/main.rs:59-62","code":"   59 |     if env::var_os(\"RUST_BACKTRACE\").is_none() {\n   60 |         env::set_var(\"RUST_BACKTRACE\", \"1\");\n   61 |     }\n   62 |     env::set_var(\"CG_CLIF_DISABLE_INCR_CACHE\", \"1\");"},{"ref":"build_system/main.rs:190-199","code":"  190 |     {\n  191 |         // Make sure we always explicitly specify the target dir\n  192 |         let target = dirs.build_dir.join(\"target_dir_should_be_set_explicitly\");\n  193 |         env::set_var(\"CARGO_TARGET_DIR\", &target);\n  194 |         let _ = std::fs::remove_file(&target);\n  195 |         std::fs::File::create(target).unwrap();\n  196 |     }\n  197 | \n  198 |     env::set_var(\"RUSTC\", \"rustc_should_be_set_explicitly\");\n  199 |     env::set_var(\"RUSTDOC\", \"rustdoc_should_be_set_explicitly\");"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"`MeasuremeProfiler::start_pass` stores a `SelfProfilerRef` in a `ManuallyDrop` and then forms a `'static` reference to it via a raw-pointer cast (`&*(... as *const SelfProfilerRef)`) so it can attach a `'static` `TimingGuard` that actually borrows from the same boxed struct (a self-referential struct). Correctness relies entirely on `TimingGuard::drop` dropping `inner` before the `ManuallyDrop<SelfProfilerRef>`, which the manual `Drop` impl does, but this is fragile unsafe self-reference: any future reordering or added field that drops the profiler first is instant UB (dangling reference).","fix":"Avoid the self-referential `'static` transmute by owning the `TimingGuard` differently (e.g. box the profiler separately and store an `Arc`/owned guard), or add a prominent safety comment documenting the exact drop-order invariant that must be preserved.","locations":[{"ref":"src/driver/mod.rs:56-82","code":"   56 | struct TimingGuard {\n   57 |     profiler: std::mem::ManuallyDrop<SelfProfilerRef>,\n   58 |     inner: Option<rustc_data_structures::profiling::TimingGuard<'static>>,\n   59 | }\n   60 | \n   61 | impl Drop for TimingGuard {\n   62 |     fn drop(&mut self) {\n   63 |         self.inner.take();\n   64 |         unsafe {\n   65 |             std::mem::ManuallyDrop::drop(&mut self.profiler);\n   66 |         }\n   67 |     }\n   68 | }\n   69 | \n   70 | impl cranelift_codegen::timing::Profiler for MeasuremeProfiler {\n   71 |     fn start_pass(&self, pass: cranelift_codegen::timing::Pass) -> Box<dyn std::any::Any> {\n   72 |         let mut timing_guard = Box::new(TimingGuard {\n   73 |             profiler: std::mem::ManuallyDrop::new(self.0.clone()),\n   74 |             inner: None,\n   75 |         });\n   76 |         timing_guard.inner = Some(\n   77 |             unsafe { &*(&*timing_guard.profiler as &SelfProfilerRef as *const SelfProfilerRef) }\n   78 |                 .generic_activity(pass.description()),\n   79 |         );\n   80 |         timing_guard\n   81 |     }\n   82 | }"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"`simd_gather` (line 1084) and `simd_scatter` (line 1173) access memory with `MemFlags::trusted()`, which tells the backend the access is both non-trapping AND naturally aligned. The element pointers come from a `Simd<*const T>`/`Simd<*mut T>` and the masked variants (`simd_masked_load`/`simd_masked_store`) deliberately use `with_notrap()` and respect an alignment generic instead. If gathered/scattered pointers are not guaranteed naturally aligned, `trusted()` lets the backend emit aligned-only instructions, which is unsound. Inconsistent with the masked paths.","fix":"If the per-lane alignment is not guaranteed, use `MemFlags::new()` for these loads/stores instead of `MemFlags::trusted()`, matching the masked load/store behaviour.","locations":[{"ref":"src/intrinsics/simd.rs:1083-1085","code":" 1083 |                 fx.bcx.switch_to_block(if_enabled);\n 1084 |                 let res = fx.bcx.ins().load(lane_clif_ty, MemFlags::trusted(), ptr_lane, 0);\n 1085 |                 fx.bcx.ins().jump(next, &[res.into()]);"},{"ref":"src/intrinsics/simd.rs:1172-1173","code":" 1172 |                 fx.bcx.switch_to_block(if_enabled);\n 1173 |                 fx.bcx.ins().store(MemFlags::trusted(), val_lane, ptr_lane, 0);"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"config::get_bool calls load_config_file() on every invocation, and load_config_file re-reads and re-parses config.txt from disk each time. run_testsuite calls config::get_bool(config) once per test case (dozens of times), and run_tests calls it several more times. The file is read and parsed from scratch on every single check.","fix":"Parse config.txt once (e.g. into a OnceLock<Vec<(String, Option<String>)>>) and look up keys against the cached structure.","locations":[{"ref":"build_system/config.rs:3-35","code":"    3 | fn load_config_file() -> Vec<(String, Option<String>)> {\n    4 |     fs::read_to_string(\"config.txt\")\n    5 |         .unwrap()\n    6 |         .lines()\n    7 |         .map(|line| if let Some((line, _comment)) = line.split_once('#') { line } else { line })\n    8 |         .map(|line| line.trim())\n    9 |         .filter(|line| !line.is_empty())\n   10 |         .map(|line| {\n   11 |             if let Some((key, val)) = line.split_once('=') {\n   12 |                 (key.trim().to_owned(), Some(val.trim().to_owned()))\n   13 |             } else {\n   14 |                 (line.to_owned(), None)\n   15 |             }\n   16 |         })\n   17 |         .collect()\n   18 | }\n   19 | \n   20 | pub(crate) fn get_bool(name: &str) -> bool {\n   21 |     let values = load_config_file()\n   22 |         .into_iter()\n   23 |         .filter(|(key, _)| key == name)\n   24 |         .map(|(_, val)| val)\n   25 |         .collect::<Vec<_>>();\n   26 |     if values.is_empty() {\n   27 |         false\n   28 |     } else {\n   29 |         if values.iter().any(|val| val.is_some()) {\n   30 |             eprintln!(\"Boolean config `{}` has a value\", name);\n   31 |             process::exit(1);\n   32 |         }\n   33 |         true\n   34 |     }\n   35 | }"},{"ref":"build_system/tests.rs:406-409","code":"  406 |             let _guard = if !config::get_bool(config)\n  407 |                 || (is_jit_test && !self.jit_supported)\n  408 |                 || self.skip_tests.contains(config)\n  409 |             {"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"get_file_name spawns rustc with `--print file-names` each time it is called, and the comment at line 73 (\"FIXME call once for each target and pass result around in struct\") acknowledges it is invoked repeatedly (build_sysroot wrappers loop, bench computes three names, build_backend). Each call is a separate process spawn for information that is constant per (rustc, crate_type).","fix":"Cache the file-name template per target/crate_type, or compute the `____` template once and do string substitution as build_sysroot already does for wrappers.","locations":[{"ref":"build_system/rustc_info.rs:73-93","code":"   73 | // FIXME call once for each target and pass result around in struct\n   74 | pub(crate) fn get_file_name(rustc: &Path, crate_name: &str, crate_type: &str) -> String {\n   75 |     let file_name = Command::new(rustc)\n   76 |         .stderr(Stdio::inherit())\n   77 |         .args([\n   78 |             \"--crate-name\",\n   79 |             crate_name,\n   80 |             \"--crate-type\",\n   81 |             crate_type,\n   82 |             \"--print\",\n   83 |             \"file-names\",\n   84 |             \"-\",\n   85 |         ])\n   86 |         .output()\n   87 |         .unwrap()\n   88 |         .stdout;\n   89 |     let file_name = String::from_utf8(file_name).unwrap().trim().to_owned();\n   90 |     assert!(!file_name.contains('\\n'));\n   91 |     assert!(file_name.contains(crate_name));\n   92 |     file_name\n   93 | }"},{"ref":"build_system/bench.rs:45-62","code":"   45 |     let raytracer_cg_llvm = dirs\n   46 |         .build_dir\n   47 |         .join(get_file_name(&compiler.rustc, \"raytracer_cg_llvm\", \"bin\"))\n   48 |         .to_str()\n   49 |         .unwrap()\n   50 |         .to_owned();\n   51 |     let raytracer_cg_clif = dirs\n   52 |         .build_dir\n   53 |         .join(get_file_name(&compiler.rustc, \"raytracer_cg_clif\", \"bin\"))\n   54 |         .to_str()\n   55 |         .unwrap()\n   56 |         .to_owned();\n   57 |     let raytracer_cg_clif_opt = dirs\n   58 |         .build_dir\n   59 |         .join(get_file_name(&compiler.rustc, \"raytracer_cg_clif_opt\", \"bin\"))\n   60 |         .to_str()\n   61 |         .unwrap()\n   62 |         .to_owned();"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"In the `SwitchInt` terminator lowering, `targets.iter().count()` is computed up to three times (once in the `use_bool_opt` condition, once in the `assert_eq!`, and `targets.iter().next()` separately). `iter().count()` walks the entire target list each call. This runs for every `SwitchInt` in every function during codegen, a hot path.","fix":"Compute the count once into a local (e.g. `let target_count = targets.iter().count();`) and reuse it, or use `targets.all_targets().len()` / the cheaper available accessor instead of repeatedly iterating.","locations":[{"ref":"src/base.rs:456-460","code":"  456 |                 let use_bool_opt = switch_ty.kind() == fx.tcx.types.bool.kind()\n  457 |                     || (targets.iter().count() == 1 && targets.iter().next().unwrap().0 == 0);\n  458 |                 if use_bool_opt {\n  459 |                     assert_eq!(targets.iter().count(), 1);\n  460 |                     let (then_value, then_block) = targets.iter().next().unwrap();"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"In `run_jit`, all mono items across all CGUs are flattened into a `FxHashMap` purely to deduplicate, then collected back into a `Vec`. This builds a full hash map (hashing every `MonoItem`) and discards iteration determinism. Since `items_in_deterministic_order` already yields per-CGU ordering, a large program pays a needless hashing/allocation pass; the resulting `Vec` order is also nondeterministic which can affect symbol-definition order in JIT.","fix":"Deduplicate with a cheaper structure that preserves order (e.g. `FxIndexSet`) or dedup per-item with a visited set while iterating in deterministic order, avoiding the map round-trip.","locations":[{"ref":"src/driver/jit.rs:47-54","code":"   47 |     let cgus = tcx.collect_and_partition_mono_items(()).codegen_units;\n   48 |     let mono_items = cgus\n   49 |         .iter()\n   50 |         .map(|cgu| cgu.items_in_deterministic_order(tcx).into_iter())\n   51 |         .flatten()\n   52 |         .collect::<FxHashMap<_, _>>()\n   53 |         .into_iter()\n   54 |         .collect::<Vec<(_, _)>>();"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"allocate_stack_slots always reserves clobber-save stack slots for every used register, but generate_asm_wrapper only emits the save/restore of clobbered registers when the asm is not NORETURN. For NORETURN asm blocks the clobber slots are never written or read, so stack_slot_size (and thus the allocated stack frame, rounded up to a multiple of 16) is larger than necessary. allocate_stack_slots has no access to `self.options` to skip them.","fix":"Skip clobber slot allocation when `self.options.contains(InlineAsmOptions::NORETURN)` so the reserved frame matches what generate_asm_wrapper actually uses.","locations":[{"ref":"src/inline_asm.rs:395-423","code":"  395 |         // Allocate stack slots for saving clobbered registers\n  396 |         let abi_clobber = InlineAsmClobberAbi::parse(\n  397 |             self.arch,\n  398 |             &self.tcx.sess.target,\n  399 |             &self.tcx.sess.unstable_target_features,\n  400 |             sym::C,\n  401 |         )\n  402 |         .unwrap()\n  403 |         .clobbered_regs();\n  404 |         for (i, reg) in self.registers.iter().enumerate().filter_map(|(i, r)| r.map(|r| (i, r))) {\n  405 |             let mut need_save = true;\n  406 |             // If the register overlaps with a register clobbered by function call, then\n  407 |             // we don't need to save it.\n  408 |             for r in abi_clobber {\n  409 |                 r.overlapping_regs(|r| {\n  410 |                     if r == reg {\n  411 |                         need_save = false;\n  412 |                     }\n  413 |                 });\n  414 | \n  415 |                 if !need_save {\n  416 |                     break;\n  417 |                 }\n  418 |             }\n  419 | \n  420 |             if need_save {\n  421 |                 slots_clobber[i] = Some(new_slot(reg.reg_class()));\n  422 |             }\n  423 |         }"},{"ref":"src/inline_asm.rs:503-512","code":"  503 |         if !self.options.contains(InlineAsmOptions::NORETURN) {\n  504 |             for (reg, slot) in self\n  505 |                 .registers\n  506 |                 .iter()\n  507 |                 .zip(self.stack_slots_clobber.iter().copied())\n  508 |                 .filter_map(|(r, s)| r.zip(s))\n  509 |             {\n  510 |                 Self::save_register(&mut generated_asm, self.arch, reg, slot);\n  511 |             }\n  512 |         }"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"`llvm.x86.sse2.pavg.b`/`pavg.w`, `psra.w`, `psad.bw`, `pmadd.*`, `pmul.hr.sw` and the comparison/abs intrinsics are all lowered with scalar per-lane loops (`simd_for_each_lane`/`simd_pair_for_each_lane`) as noted by the repeated `// FIXME use vector instructions when possible` comments. For hot SIMD code this produces far slower code than native vector instructions.","fix":"Lower these to Cranelift vector ops (e.g. `avg_round`, `sshr`, vector `iabs`, etc.) operating on full vector values where Cranelift supports them, instead of scalarizing.","locations":[{"ref":"src/intrinsics/llvm_x86.rs:481-514","code":"  481 |         \"llvm.x86.sse2.pavg.b\" | \"llvm.x86.sse2.pavg.w\" => {\n  482 |             intrinsic_args!(fx, args => (a, b); intrinsic);\n  483 | \n  484 |             // FIXME use vector instructions when possible\n  485 |             simd_pair_for_each_lane(\n  486 |                 fx,\n  487 |                 a,\n  488 |                 b,\n  489 |                 ret,\n  490 |                 &|fx, _lane_ty, _res_lane_ty, a_lane, b_lane| {\n  491 |                     // (a + b + 1) >> 1\n  492 |                     let lane_ty = fx.bcx.func.dfg.value_type(a_lane);\n  493 |                     let a_lane = fx.bcx.ins().uextend(lane_ty.double_width().unwrap(), a_lane);\n  494 |                     let b_lane = fx.bcx.ins().uextend(lane_ty.double_width().unwrap(), b_lane);\n  495 |                     let sum = fx.bcx.ins().iadd(a_lane, b_lane);\n  496 |                     let num_plus_one = fx.bcx.ins().iadd_imm(sum, 1);\n  497 |                     let res = fx.bcx.ins().ushr_imm(num_plus_one, 1);\n  498 |                     fx.bcx.ins().ireduce(lane_ty, res)\n  499 |                 },\n  500 |             );\n  501 |         }\n  502 |         \"llvm.x86.sse2.psra.w\" => {\n  503 |             intrinsic_args!(fx, args => (a, count); intrinsic);\n  504 | \n  505 |             let count_lane = count.force_stack(fx).0.load(fx, types::I64, MemFlags::trusted());\n  506 |             let lane_ty = fx.clif_type(a.layout().ty.simd_size_and_type(fx.tcx).1).unwrap();\n  507 |             let max_count = fx.bcx.ins().iconst(types::I64, i64::from(lane_ty.bits() - 1));\n  508 |             let saturated_count = fx.bcx.ins().umin(count_lane, max_count);\n  509 | \n  510 |             // FIXME use vector instructions when possible\n  511 |             simd_for_each_lane(fx, a, ret, &|fx, _lane_ty, _res_lane_ty, a_lane| {\n  512 |                 fx.bcx.ins().sshr(a_lane, saturated_count)\n  513 |             });\n  514 |         }"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","description":"`codegen_i128::maybe_codegen` computes `let is_signed = type_sign(lhs.layout().ty);` unconditionally near the top, but it is only used inside the `Div | Rem` arm; every other arm returns `None`/`unreachable!` without using it. Minor wasted work on the hot binop path.","fix":"Move the `type_sign` call inside the `BinOp::Div | BinOp::Rem` arm where it is used.","locations":[{"ref":"src/codegen_i128.rs:21-21","code":"   21 |     let is_signed = type_sign(lhs.layout().ty);"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","description":"GccExceptTable::write recomputes call_sites.encoded_size() and actions.encoded_size() on every iteration of the type_info alignment-padding loop (each call re-walks and re-encodes the entire table into a LenWriter). The loop runs at most 3 iterations and tables are tiny, so impact is minor, but the encoded sizes are loop-invariant and could be hoisted.","fix":"Compute call_sites.encoded_size() and actions.encoded_size() once before the while loop and reuse them inside the closure.","locations":[{"ref":"src/debuginfo/gcc_except_table.rs:32-50","code":"   32 |             let class_info_offset_no_padding = self.call_sites.encoded_size()\n   33 |                 + self.actions.encoded_size()\n   34 |                 + self.type_info.encoded_size(encoding);\n   35 | \n   36 |             let type_info_is_aligned = |type_info_padding: u64| {\n   37 |                 (class_info_offset_field_offset\n   38 |                     + gimli::leb128::write::uleb128_size(\n   39 |                         class_info_offset_no_padding + type_info_padding,\n   40 |                     ) as u64\n   41 |                     + self.call_sites.encoded_size()\n   42 |                     + self.actions.encoded_size()\n   43 |                     + type_info_padding)\n   44 |                     .is_multiple_of(4)\n   45 |             };\n   46 | \n   47 |             let mut type_info_padding = 0;\n   48 |             while !type_info_is_aligned(type_info_padding) {\n   49 |                 type_info_padding += 1;\n   50 |             }"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"negligible","description":"fmuladdf16/f32/f64/f128 are lowered to a real fma libcall (or codegen_f16_f128::fma_f16). The intrinsic only permits, but does not require, fused behavior; on targets without hardware FMA this forces expensive software fma emulation, as already noted by the FIXME at line 353. fmuladd could instead be lowered to a separate mul+add.","fix":"Lower fmuladd to a plain fmul followed by fadd (or a cranelift fma when the target has the feature) instead of always calling the fma libcall.","locations":[{"ref":"src/intrinsics/mod.rs:353-357","code":"  353 |         // FIXME: calling `fma` from libc without FMA target feature uses expensive sofware emulation\n  354 |         sym::fmuladdf16 => (\"fmaf16\", 3, fx.tcx.types.f16, types::F16), // FIXME: use cranelift intrinsic analogous to llvm.fmuladd.f16\n  355 |         sym::fmuladdf32 => (\"fmaf\", 3, fx.tcx.types.f32, types::F32), // FIXME: use cranelift intrinsic analogous to llvm.fmuladd.f32\n  356 |         sym::fmuladdf64 => (\"fma\", 3, fx.tcx.types.f64, types::F64), // FIXME: use cranelift intrinsic analogous to llvm.fmuladd.f64\n  357 |         sym::fmuladdf128 => (\"fmaf128\", 3, fx.tcx.types.f128, types::F128), // FIXME: use cranelift intrinsic analogous to llvm.fmuladd.f128"},{"ref":"src/intrinsics/mod.rs:424-430","code":"  424 |     let res = match intrinsic {\n  425 |         sym::fmaf16 | sym::fmuladdf16 => {\n  426 |             CValue::by_val(codegen_f16_f128::fma_f16(fx, args[0], args[1], args[2]), layout)\n  427 |         }\n  428 |         sym::fmaf32 | sym::fmaf64 | sym::fmuladdf32 | sym::fmuladdf64 => {\n  429 |             CValue::by_val(fx.bcx.ins().fma(args[0], args[1], args[2]), layout)\n  430 |         }"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","description":"raw_eq and compare_bytes always call out to memcmp for the large/non-power-of-two case; the FIXME notes emit_small_memcmp is not used. For small fixed sizes this is slower than an inlined comparison, but correctness is fine.","fix":"Use a small-memcmp emitter for known small sizes as the FIXME suggests; low priority.","locations":[{"ref":"src/intrinsics/mod.rs:1462-1505","code":" 1462 |         sym::raw_eq => {\n 1463 |             intrinsic_args!(fx, args => (lhs_ref, rhs_ref); intrinsic);\n 1464 |             let lhs_ref = lhs_ref.load_scalar(fx);\n 1465 |             let rhs_ref = rhs_ref.load_scalar(fx);\n 1466 | \n 1467 |             let size = fx.layout_of(generic_args.type_at(0)).layout.size();\n 1468 |             // FIXME add and use emit_small_memcmp\n 1469 |             let is_eq_value = if size == Size::ZERO {\n 1470 |                 // No bytes means they're trivially equal\n 1471 |                 fx.bcx.ins().iconst(types::I8, 1)\n 1472 |             } else if let Some(clty) = size.bits().try_into().ok().and_then(Type::int) {\n 1473 |                 // Can't use `trusted` for these loads; they could be unaligned.\n 1474 |                 let mut flags = MemFlags::new();\n 1475 |                 flags.set_notrap();\n 1476 |                 let lhs_val = fx.bcx.ins().load(clty, flags, lhs_ref, 0);\n 1477 |                 let rhs_val = fx.bcx.ins().load(clty, flags, rhs_ref, 0);\n 1478 |                 fx.bcx.ins().icmp(IntCC::Equal, lhs_val, rhs_val)\n 1479 |             } else {\n 1480 |                 // Just call `memcmp` (like slices do in core) when the\n 1481 |                 // size is too large or it's not a power-of-two.\n 1482 |                 let signed_bytes = i64::try_from(size.bytes()).unwrap();\n 1483 |                 let bytes_val = fx.bcx.ins().iconst(fx.pointer_type, signed_bytes);\n 1484 |                 let params = vec![AbiParam::new(fx.pointer_type); 3];\n 1485 |                 let returns = vec![AbiParam::new(types::I32)];\n 1486 |                 let args = &[lhs_ref, rhs_ref, bytes_val];\n 1487 |                 let cmp = fx.lib_call(\"memcmp\", params, returns, args)[0];\n 1488 |                 fx.bcx.ins().icmp_imm(IntCC::Equal, cmp, 0)\n 1489 |             };\n 1490 |             ret.write_cvalue(fx, CValue::by_val(is_eq_value, ret.layout()));\n 1491 |         }\n 1492 | \n 1493 |         sym::compare_bytes => {\n 1494 |             intrinsic_args!(fx, args => (lhs_ptr, rhs_ptr, bytes_val); intrinsic);\n 1495 |             let lhs_ptr = lhs_ptr.load_scalar(fx);\n 1496 |             let rhs_ptr = rhs_ptr.load_scalar(fx);\n 1497 |             let bytes_val = bytes_val.load_scalar(fx);\n 1498 | \n 1499 |             let params = vec![AbiParam::new(fx.pointer_type); 3];\n 1500 |             let returns = vec![AbiParam::new(types::I32)];\n 1501 |             let args = &[lhs_ptr, rhs_ptr, bytes_val];\n 1502 |             // Here we assume that the `memcmp` provided by the target is a NOP for size 0.\n 1503 |             let cmp = fx.lib_call(\"memcmp\", params, returns, args)[0];\n 1504 |             ret.write_cvalue(fx, CValue::by_val(cmp, ret.layout()));\n 1505 |         }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"A large `#[cfg(false)]` block (`_clif_guard`) is permanently disabled and never compiled. It is debugging scaffolding that bit-rots silently (it references APIs that are never type-checked). It clutters `compile_fn` with ~27 lines of unreachable code.","fix":"Either remove the block, or gate it behind a real cargo feature so it is actually compiled/maintained, rather than `#[cfg(false)]`.","locations":[{"ref":"src/base.rs:170-196","code":"  170 |     #[cfg(false)]\n  171 |     let _clif_guard = {\n  172 |         use std::fmt::Write;\n  173 | \n  174 |         let func_clone = context.func.clone();\n  175 |         let clif_comments_clone = clif_comments.clone();\n  176 |         let mut clif = String::new();\n  177 |         for flag in module.isa().flags().iter() {\n  178 |             writeln!(clif, \"set {}\", flag).unwrap();\n  179 |         }\n  180 |         write!(clif, \"target {}\", module.isa().triple().architecture.to_string()).unwrap();\n  181 |         for isa_flag in module.isa().isa_flags().iter() {\n  182 |             write!(clif, \" {}\", isa_flag).unwrap();\n  183 |         }\n  184 |         writeln!(clif, \"\\n\").unwrap();\n  185 |         writeln!(clif, \"; symbol {}\", codegened_func.symbol_name).unwrap();\n  186 |         crate::PrintOnPanic(move || {\n  187 |             let mut clif = clif.clone();\n  188 |             ::cranelift_codegen::write::decorate_function(\n  189 |                 &mut &clif_comments_clone,\n  190 |                 &mut clif,\n  191 |                 &func_clone,\n  192 |             )\n  193 |             .unwrap();\n  194 |             clif\n  195 |         })\n  196 |     };"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In DebugContext::new the `(name, file_info)` match hardcodes `file_info` to None in both arms, so `file_has_md5 = file_info.is_some()` is always false and `line_program.file_has_md5 = file_has_md5` always sets false. The MD5 hash of the primary compilation source file is therefore never propagated into the line program's primary file entry; per-file md5 is only later AND-folded in line_info.rs add_source_file. The variable, the comment-implied intent, and the assignment are effectively dead/misleading.","fix":"Either compute a real FileInfo (with md5/source) for the primary file via make_file_info-style logic, or remove the file_info/file_has_md5 plumbing here and document that primary-file md5 is intentionally omitted.","locations":[{"ref":"src/debuginfo/mod.rs:113-131","code":"  113 |         let (name, file_info) = match tcx.sess.local_crate_source_file() {\n  114 |             Some(path) => {\n  115 |                 let name =\n  116 |                     path.path(RemapPathScopeComponents::DEBUGINFO).to_string_lossy().into_owned();\n  117 |                 (name, None)\n  118 |             }\n  119 |             None => (tcx.crate_name(LOCAL_CRATE).to_string(), None),\n  120 |         };\n  121 | \n  122 |         let file_has_md5 = file_info.is_some();\n  123 |         let mut line_program = LineProgram::new(\n  124 |             encoding,\n  125 |             LineEncoding::default(),\n  126 |             LineString::new(comp_dir.as_bytes(), encoding, &mut dwarf.line_strings),\n  127 |             None,\n  128 |             LineString::new(name.as_bytes(), encoding, &mut dwarf.line_strings),\n  129 |             file_info,\n  130 |         );\n  131 |         line_program.file_has_md5 = file_has_md5;"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","description":"A ~50-line block of commented-out code implementing sshl/sqshl/sqshlu/sqshrn/sqshrun is left inline in the match. Dead commented code rots; the sqshrn/sqshrun versions also hardcode types::I32 in their fallback iconst which would be wrong for non-i32 lane types, so resurrecting it as-is would introduce a bug.","fix":"Delete the commented-out block; if the functionality is wanted, track it in an issue rather than as dead code.","locations":[{"ref":"src/intrinsics/llvm_aarch64.rs:447-496","code":"  447 |         /*\n  448 |         _ if intrinsic.starts_with(\"llvm.aarch64.neon.sshl.v\")\n  449 |             || intrinsic.starts_with(\"llvm.aarch64.neon.sqshl.v\")\n  450 |             // FIXME split this one out once saturating is implemented\n  451 |             || intrinsic.starts_with(\"llvm.aarch64.neon.sqshlu.v\") =>\n  452 |         {\n  453 |             intrinsic_args!(fx, args => (a, b); intrinsic);\n  454 | \n  455 |             simd_pair_for_each_lane(fx, a, b, ret, &|fx, _lane_ty, _res_lane_ty, a, b| {\n  456 |                 // FIXME saturate?\n  457 |                 fx.bcx.ins().ishl(a, b)\n  458 |             });\n  459 |         }\n  460 | \n  461 |         _ if intrinsic.starts_with(\"llvm.aarch64.neon.sqshrn.v\") => {\n  462 |             let (a, imm32) = match args {\n  463 |                 [a, imm32] => (a, imm32),\n  464 |                 _ => bug!(\"wrong number of args for intrinsic {intrinsic}\"),\n  465 |             };\n  466 |             let a = codegen_operand(fx, a);\n  467 |             let imm32 = crate::constant::mir_operand_get_const_val(fx, imm32)\n  468 | d be replaced by `std::mem::forget`-style handling. Minor: the field is genuinely read in `Drop`, so this is borderline, but the assignment-then-immediate-drop is a slightly confusing pattern.","fix":"Either keep as-is (it is correct) or restructure so `finished()` clearly documents that setting the flag is what disarms the Drop guard.","locations":[{"ref":"src/concurrency_limiter.rs:80-97","code":"   80 |     pub(crate) fn finished(mut self) {\n   81 |         self.helper_thread.take();\n   82 | \n   83 |         // Assert that all jobs have finished\n   84 |         let state = Mutex::get_mut(Arc::get_mut(&mut self.state).unwrap()).unwrap();\n   85 |         state.assert_done();\n   86 | \n   87 |         self.finished = true;\n   88 |     }\n   89 | }\n   90 | \n   91 | impl Drop for ConcurrencyLimiter {\n   92 |     fn drop(&mut self) {\n   93 |         if !self.finished && !std::thread::panicking() {\n   94 |             panic!(\"Forgot to call finished() on ConcurrencyLimiter\");\n   95 |         }\n   96 |     }\n   97 | }"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`int.size().truncate(int.to_bits(int.size()))` truncates a value that `to_bits` already returns truncated to the same size, so the outer `truncate` is a no-op. Harmless but misleading about intent.","fix":"Use `int.to_bits(int.size())` directly (the result is already masked to the integer's size).","locations":[{"ref":"src/constant.rs:116","code":"  116 |                     let raw_val = int.size().truncate(int.to_bits(int.size()));"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"Stray leftover comment listing three intrinsic names with no associated code, sitting between the main match function and `llvm_add_sub`. It is meaningless and misleading.","fix":"Remove the three comment lines.","locations":[{"ref":"src/intrinsics/llvm_x86.rs:1364-1366","code":" 1364 | // llvm.x86.avx2.vperm2i128\n 1365 | // llvm.x86.ssse3.pshuf.b.128\n 1366 | // llvm.x86.avx2.pshuf.b"}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In `codegen_float_binop`, the F16 `Rem` arm builds a tuple whose `lhs`/`rhs` are the already-f32-converted values (the conversion happened earlier at the top of the function), accompanied by a multi-line comment with commented-out `fpromote` calls. The comment is stale/misleading and the special F16 tuple entry is identical in behavior to the F32 arm.","fix":"Drop the F16-specific `Rem` arm (let it fall through to the F32 case) and remove the obsolete commented-out fpromote lines.","locations":[{"ref":"src/num.rs:373-389","code":"  373 |         BinOp::Rem => {\n  374 |             let (name, ty, lhs, rhs) = match in_lhs.layout().ty.kind() {\n  375 |                 ty::Float(FloatTy::F16) => (\n  376 |                     \"fmodf\",\n  377 |                     types::F32,\n  378 |                     // FIXME(bytecodealliance/wasmtime#8312): Already converted\n  379 |                     // by the FIXME above.\n  380 |                     // fx.bcx.ins().fpromote(types::F32, lhs),\n  381 |                     // fx.bcx.ins().fpromote(types::F32, rhs),\n  382 |                     lhs,\n  383 |                     rhs,\n  384 |                 ),\n  385 |                 ty::Float(FloatTy::F32) => (\"fmodf\", types::F32, lhs, rhs),\n  386 |                 ty::Float(FloatTy::F64) => (\"fmod\", types::F64, lhs, rhs),\n  387 |                 ty::Float(FloatTy::F128) => (\"fmodf128\", types::F128, lhs, rhs),\n  388 |                 _ => bug!(),\n  389 |             };"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment \"Ignore exit code as the repo may already have been checked out\" is misleading: immediately above, `fs::remove_dir_all(download_dir)` deletes any pre-existing checkout, so the repo can never already be checked out at this point. The rationale in the comment does not match the code.","fix":"Update or remove the comment to reflect that the directory was just deleted, and handle clone failure explicitly.","locations":[{"ref":"build_system/prepare.rs:176-183","code":"  176 |     match fs::remove_dir_all(download_dir) {\n  177 |         Ok(()) => {}\n  178 |         Err(err) if err.kind() == io::ErrorKind::NotFound => {}\n  179 |         Err(err) => panic!(\"Failed to remove {path}: {err}\", path = download_dir.display()),\n  180 |     }\n  181 | \n  182 |     // Ignore exit code as the repo may already have been checked out\n  183 |     git_command(None, \"clone\").arg(repo).arg(download_dir).spawn().unwrap().wait().unwrap();"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"A stray comment '// llvm.aarch64.neon.sqshl.v*i*' sits at the top of the match but the sqshl/sqshlu/sqshrn/sqshrun handling it refers to is entirely commented out below. The comment is misleading because it suggests sqshl is supported when it is not.","fix":"Remove the stale comment, and either remove the large commented-out sqshl/sqshrn block or convert it into a tracked FIXME with an issue reference.","locations":[{"ref":"src/intrinsics/llvm_aarch64.rs:17-17","code":"   17 |     // llvm.aarch64.neon.sqshl.v*i*"},{"ref":"src/intrinsics/llvm_aarch64.rs:447-496","code":"  447 |         /*\n  448 |         _ if intrinsic.starts_with(\"llvm.aarch64.neon.sshl.v\")\n  449 |             || intrinsic.starts_with(\"llvm.aarch64.neon.sqshl.v\")\n  450 |             // FIXME split this one out once saturating is implemented\n  451 |             || intrinsic.starts_with(\"llvm.aarch64.neon.sqshlu.v\") =>\n  452 |         {\n  453 |             intrinsic_args!(fx, args => (a, b); intrinsic);\n  454 | \n  455 |             simd_pair_for_each_lane(fx, a, b, ret, &|fx, _lane_ty, _res_lane_ty, a, b| {\n  456 |                 // FIXME saturate?\n  457 |                 fx.bcx.ins().ishl(a, b)\n  458 |             });\n  459 |         }\n  460 | \n  461 |         _ if intrinsic.starts_with(\"llvm.aarch64.neon.sqshrn.v\") => {\n  462 |             let (a, imm32) = match args {\n  463 |                 [a, imm32] => (a, imm32),\n  464 |                 _ => bug!(\"wrong number of args for intrinsic {intrinsic}\"),\n  465 |             };\n  466 |             let a = codegen_operand(fx, a);\n  467 |             let imm32 = crate::constant::mir_operand_get_const_val(fx, imm32)\n  468 |                 .expect(\"llvm.aarch64.neon.sqshrn.v* imm32 not const\");\n  469 | \n  470 |             simd_for_each_lane(fx, a, ret, &|fx, _lane_ty, _res_lane_ty, lane| match imm32\n  471 |                 .try_to_bits(Size::from_bytes(4))\n  472 |                 .unwrap_or_else(|| panic!(\"imm32 not scalar: {:?}\", imm32))\n  473 |             {\n  474 |                 imm32 if imm32 < 32 => fx.bcx.ins().sshr_imm(lane, i64::from(imm32 as u8)),\n  475 |                 _ => fx.bcx.ins().iconst(types::I32, 0),\n  476 |             });\n  477 |         }\n  478 | \n  479 |         _ if intrinsic.starts_with(\"llvm.aarch64.neon.sqshrun.v\") => {\n  480 |             let (a, imm32) = match args {\n  481 |                 [a, imm32] => (a, imm32),\n  482 |                 _ => bug!(\"wrong number of args for intrinsic {intrinsic}\"),\n  483 |             };\n  484 |             let a = codegen_operand(fx, a);\n  485 |             let imm32 = crate::constant::mir_operand_get_const_val(fx, imm32)\n  486 |                 .expect(\"llvm.aarch64.neon.sqshrn.v* imm32 not const\");\n  487 | \n  488 |             simd_for_each_lane(fx, a, ret, &|fx, _lane_ty, _res_lane_ty, lane| match imm32\n  489 |                 .try_to_bits(Size::from_bytes(4))\n  490 |                 .unwrap_or_else(|| panic!(\"imm32 not scalar: {:?}\", imm32))\n  491 |             {\n  492 |                 imm32 if imm32 < 32 => fx.bcx.ins().ushr_imm(lane, i64::from(imm32 as u8)),\n  493 |                 _ => fx.bcx.ins().iconst(types::I32, 0),\n  494 |             });\n  495 |         }\n  496 |         */"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment on `enable_verifier` says it returns true \"when `-Zverify-llvm-ir` is passed, the `CG_CLIF_ENABLE_VERIFIER` env var is set to 1 or when cg_clif is compiled with debug assertions enabled\". The order in prose differs from code and, more importantly, it omits that `regalloc_checker` is also gated on the same value; minor, but the comment also implies independence of conditions whereas they are OR-combined. Low impact but the comment is slightly stale relative to behavior.","fix":"Reword the comment to match the actual OR of the three conditions, or drop the redundant enumeration.","locations":[{"ref":"src/lib.rs:246-254","code":"  246 | /// Determine if the Cranelift ir verifier should run.\n  247 | ///\n  248 | /// Returns true when `-Zverify-llvm-ir` is passed, the `CG_CLIF_ENABLE_VERIFIER` env var is set to\n  249 | /// 1 or when cg_clif is compiled with debug assertions enabled or false otherwise.\n  250 | fn enable_verifier(sess: &Session) -> bool {\n  251 |     sess.verify_llvm_ir()\n  252 |         || cfg!(debug_assertions)\n  253 |         || env::var(\"CG_CLIF_ENABLE_VERIFIER\").as_deref() == Ok(\"1\")\n  254 | }"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment on `lib_call`'s Windows i128 handling says i128 arguments are passed by-ref \"on Windows\", but the by-ref transformation is gated on `self.tcx.sess.target.is_like_windows` while the i128 *return* handling has separate Windows (I64X2) and s390x (return-area pointer) cases. The single leading comment understates that the function performs three distinct ABI adjustments (Windows arg by-ref, Windows i128 return via vector, s390x i128 return via pointer).","fix":"Expand the comment to describe all three ABI adjustments, or move per-branch comments to each case.","locations":[{"ref":"src/abi/mod.rs:141-184","code":"  141 |         // Pass i128 arguments by-ref on Windows.\n  142 |         let (params, args): (Vec<_>, Cow<'_, [_]>) = if self.tcx.sess.target.is_like_windows {\n  143 |             let (params, args): (Vec<_>, Vec<_>) = params\n  144 |                 .into_iter()\n  145 |                 .zip(args)\n  146 |                 .map(|(param, &arg)| {\n  147 |                     if param.value_type == types::I128 {\n  148 |                         let arg_ptr = self.create_stack_slot(16, 16);\n  149 |                         arg_ptr.store(self, arg, MemFlags::trusted());\n  150 |                         (AbiParam::new(self.pointer_type), arg_ptr.get_addr(self))\n  151 |                     } else {\n  152 |                         (param, arg)\n  153 |                     }\n  154 |                 })\n  155 |                 .unzip();\n  156 | \n  157 |             (params, args.into())\n  158 |         } else {\n  159 |             (params, args.into())\n  160 |         };\n  161 | \n  162 |         let ret_single_i128 = returns.len() == 1 && returns[0].value_type == types::I128;\n  163 |         if ret_single_i128 && self.tcx.sess.target.is_like_windows {\n  164 |             // Return i128 using the vector ABI on Windows\n  165 |             returns[0].value_type = types::I64X2;\n  166 | \n  167 |             let ret = self.lib_call_unadjusted(name, params, returns, &args)[0];\n  168 | \n  169 |             Cow::Owned(vec![codegen_bitcast(self, types::I128, ret)])\n  170 |         } else if ret_single_i128 && self.tcx.sess.target.arch == Arch::S390x {\n  171 |             // Return i128 using a return area pointer on s390x.\n  172 |             let mut params = params;\n  173 |             let mut args = args.to_vec();\n  174 | \n  175 |             params.insert(0, AbiParam::new(self.pointer_type));\n  176 |             let ret_ptr = self.create_stack_slot(16, 16);\n  177 |             args.insert(0, ret_ptr.get_addr(self));\n  178 | \n  179 |             self.lib_call_unadjusted(name, params, vec![], &args);\n  180 | \n  181 |             Cow::Owned(vec![ret_ptr.load(self, types::I128, MemFlags::trusted())])\n  182 |         } else {\n  183 |             Cow::Borrowed(self.lib_call_unadjusted(name, params, returns, &args))\n  184 |         }"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The `bug!` message in `pointer_ty` reads `\"ptr_sized_integer: unknown pointer bit size {}\"`, but the function is named `pointer_ty` and there is no `ptr_sized_integer` symbol. The message is a leftover/copy-paste from a differently named helper and is misleading when it fires.","fix":"Change the message to reference `pointer_ty`, e.g. `bug!(\"pointer_ty: unknown pointer bit size {}\", bits)`.","locations":[{"ref":"src/common.rs:22","code":"   22 |         bits => bug!(\"ptr_sized_integer: unknown pointer bit size {}\", bits),"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment in WriterRelocate::write_eh_pointer states the Constant arm was 'copied from gimli', but it actually diverges from gimli's implementation (reversed pcrel subtraction, see the copy_paste finding). The comment is misleading and obscures the divergence/bug.","fix":"Update the comment to either accurately reflect that it intentionally differs from gimli (and why) or fix the code to actually match gimli, then keep the comment.","locations":[{"ref":"src/debuginfo/emit.rs:190-199","code":"  190 |             // Address::Constant arm copied from gimli\n  191 |             Address::Constant(val) => {\n  192 |                 // Indirect doesn't matter here.\n  193 |                 let val = match eh_pe.application() {\n  194 |                     gimli::DW_EH_PE_absptr => val,\n  195 | other","type_label":"Other","severity":"low","description":"frecpe.v4f32, frecps.v4f32 and fcvtns.v4i32.v4f32 are emitted with InlineAsmOptions::NOSTACK only and without PURE, even though they are pure data transforms; meanwhile the crc32/crypto arms correctly mark PURE|NOMEM. More importantly these three are matched only for the exact .v4f32 mangling, so any other vector width (e.g. v2f32) falls through to the unsupported trap rather than being handled, which is an undocumented limitation.","fix":"Document that only the 128-bit f32x4 forms are supported (or generalize them), and consider marking the asm PURE since the result depends only on inputs.","locations":[{"ref":"src/intrinsics/llvm_aarch64.rs:56-169","code":"   56 |         \"llvm.aarch64.neon.fcvtns.v4i32.v4f32\" => {\n   57 |             intrinsic_args!(fx, args => (a); intrinsic);\n   58 | \n   59 |             // Note: Using inline asm instead of fcvt_to_sint as the latter rounds to zero rather than to nearest\n   60 | \n   61 |             let a_ptr = a.force_stack(fx).0.get_addr(fx);\n   62 |             let res_place = CPlace::new_stack_slot(fx, ret.layout());\n   63 |             let res_ptr = res_place.to_ptr().get_addr(fx);\n   64 | \n   65 |             codegen_inline_asm_inner(\n   66 |                 fx,\n   67 |                 &[InlineAsmTemplatePiece::String(\n   68 |                     \"ldr     q0, [x0]\n   69 |                      fcvtns  v0.4s, v0.4s\n   70 |                      str     q0, [x1]\"\n   71 |                         .into(),\n   72 |                 )],\n   73 |                 &[\n   74 |                     CInlineAsmOperand::In {\n   75 |                         reg: InlineAsmRegOrRegClass::Reg(InlineAsmReg::AArch64(\n   76 |                             AArch64InlineAsmReg::x0,\n   77 |                         )),\n   78 |                         value: a_ptr,\n   79 |                     },\n   80 |                     CInlineAsmOperand::In {\n   81 |   if (!q) return esc(text);

    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
