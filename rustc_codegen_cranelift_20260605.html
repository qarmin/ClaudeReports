<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"`BackendConfig::from_opts` panics outright when the `CG_CLIF_JIT_ARGS` env var contains non-Unicode bytes. This is user-controlled input parsed during `init`, so a malformed env var aborts the compiler with an ugly panic/backtrace instead of a clean diagnostic. All other config errors in this function are returned as `Err(String)` and surfaced via `sess.dcx().fatal(err)`.","fix":"Return `Err(format!(\"CG_CLIF_JIT_ARGS is not valid Unicode: {:?}\", s))` for the `NotUnicode` case instead of `panic!`, matching the existing error-propagation style of the function.","locations":[{"ref":"src/config.rs:20-26","code":"   20 |             jit_args: match std::env::var(\"CG_CLIF_JIT_ARGS\") {\n   21 |                 Ok(args) => args.split(' ').map(|arg| arg.to_string()).collect(),\n   22 |                 Err(std::env::VarError::NotPresent) => vec![],\n   23 |                 Err(std::env::VarError::NotUnicode(s)) => {\n   24 |                     panic!(\"CG_CLIF_JIT_ARGS not unicode: {:?}\", s);\n   25 |                 }\n   26 |             },"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"get_toolchain_name parses `rustup show active-toolchain` output with `.split_once(' ').unwrap()`. When no toolchain override is active in some rustup versions/configurations, or output formatting differs, `split_once(' ')` can return None and panic. Also `String::from_utf8(...).unwrap()` panics on non-UTF8 output. This is the path taken whenever CARGO/RUSTC/RUSTDOC are not all set (the common developer case).","fix":"Handle the None case from split_once with a descriptive error message (e.g. suggesting the user set RUSTC/CARGO/RUSTDOC or install rustup), and report a clear error if rustup is missing rather than an opaque unwrap panic.","locations":[{"ref":"build_system/rustc_info.rs:14-22","code":"   14 | pub(crate) fn get_toolchain_name() -> String {\n   15 |     let active_toolchain = Command::new(\"rustup\")\n   16 |         .stderr(Stdio::inherit())\n   17 |         .args([\"show\", \"active-toolchain\"])\n   18 |         .output()\n   19 |         .unwrap()\n   20 |         .stdout;\n   21 |     String::from_utf8(active_toolchain).unwrap().trim().split_once(' ').unwrap().0.to_owned()\n   22 | }"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"`ConcurrencyLimiterState::job_finished` does `self.pending_jobs -= 1; self.active_jobs -= 1;` on `usize`. If a `ConcurrencyLimiterToken` is ever dropped more times than `try_start_job` succeeded (e.g. due to the acknowledged 'don't panic when a worker thread panics' FIXME, or a future double-drop / token created without a started job), this underflows and panics in debug or wraps in release, corrupting the limiter state. The invariant is enforced only by `assert_invariants`/`assert_done` which run after the subtraction.","fix":"Use checked subtraction with an explicit assert (`self.pending_jobs = self.pending_jobs.checked_sub(1).expect(...)`) before mutating, and address the existing FIXME so a panicking worker thread cannot leave the counts inconsistent.","locations":[{"ref":"src/concurrency_limiter.rs:178-185","code":"  178 |         pub(super) fn job_finished(&mut self) {\n  179 |             self.assert_invariants();\n  180 |             self.pending_jobs -= 1;\n  181 |             self.active_jobs -= 1;\n  182 |             self.assert_invariants();\n  183 |             self.drop_excess_capacity();\n  184 |             self.assert_invariants();\n  185 |         }"},{"ref":"src/concurrency_limiter.rs:6","code":"    6 | // FIXME don't panic when a worker thread panics"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","description":"build_clif_sysroot_for_triple and bench.rs assume rustflags/paths are valid UTF-8: `path.to_str().unwrap()` for the codegen-backend path (build_sysroot.rs:221) and CG_CLIF_STDLIB_REMAP_PATH_PREFIX prefix (build_sysroot.rs:236). A non-UTF8 path (download/out dir with non-UTF8 bytes on Linux) panics. Low likelihood but a hard panic with no context.","fix":"Either accept that paths must be UTF-8 and assert with a clear message, or pass these via OsStr-aware mechanisms where possible.","locations":[{"ref":"build_system/build_sysroot.rs:219-237","code":"  219 |     match cg_clif_dylib_path {\n  220 |         CodegenBackend::Local(path) => {\n  221 |             rustflags.push(format!(\"-Zcodegen-backend={}\", path.to_str().unwrap()));\n  222 |         }\n  223 |         CodegenBackend::Builtin(name) => {\n  224 |             rustflags.push(format!(\"-Zcodegen-backend={name}\"));\n  225 |         }\n  226 |     };\n  227 |     rustflags.push(\"--sysroot=/dev/null\".to_owned());\n  228 | \n  229 |     // Incremental compilation by default disables mir inlining. This leads to both a decent\n  230 |     // compile perf and a significant runtime perf regression. As such forcefully enable mir\n  231 |     // inlining.\n  232 |     rustflags.push(\"-Zinline-mir\".to_owned());\n  233 | \n  234 |     if let Some(prefix) = env::var_os(\"CG_CLIF_STDLIB_REMAP_PATH_PREFIX\") {\n  235 |         rustflags.push(\"--remap-path-prefix\".to_owned());\n  236 |         rustflags.push(format!(\"library/={}/library\", prefix.to_str().unwrap()));\n  237 |     }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","description":"get_patches does `path.file_name().unwrap().to_str().unwrap().split_once(\"-\").unwrap().1`. Any patch filename in the patches directory that lacks a '-' will panic. This is a hidden contract on patch file naming with no validation/clear error; a stray .patch file without a dash aborts the whole prepare step.","fix":"Skip (with a warning) patch files that don't match the expected `NNN-cratename...` naming instead of unwrapping, or report a clear error naming the offending file.","locations":[{"ref":"build_system/prepare.rs:217-235","code":"  217 | fn get_patches(dirs: &Dirs, crate_name: &str) -> Vec<PathBuf> {\n  218 |     let mut patches: Vec<_> = fs::read_dir(dirs.source_dir.join(\"patches\"))\n  219 |         .unwrap()\n  220 |         .map(|entry| entry.unwrap().path())\n  221 |         .filter(|path| path.extension() == Some(OsStr::new(\"patch\")))\n  222 |         .filter(|path| {\n  223 |             path.file_name()\n  224 |                 .unwrap()\n  225 |                 .to_str()\n  226 |                 .unwrap()\n  227 |                 .split_once(\"-\")\n  228 |                 .unwrap()\n  229 |                 .1\n  230 |                 .starts_with(crate_name)\n  231 |         })\n  232 |         .collect();\n  233 |     patches.sort();\n  234 |     patches\n  235 | }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","description":"All rustc_info helpers (get_host_triple, get_cargo_path, get_rustc_path, get_rustdoc_path, get_default_sysroot, get_file_name) call `.output().unwrap()` then `String::from_utf8(...).unwrap()`. If the rustc/rustup/cargo binary is missing or not executable, `.output()` returns Err and panics with a raw OS error instead of a helpful message. This is reachable in misconfigured environments.","fix":"Wrap command spawning in a helper that reports which binary failed to run and why (e.g. \"failed to run rustc: not found\") before exiting.","locations":[{"ref":"build_system/rustc_info.rs:4-93","code":"    4 | pub(crate) fn get_host_triple(rustc: &Path) -> String {\n    5 |     let version_info = Command::new(rustc)\n    6 |         .stderr(Stdio::inherit())\n    7 |         .args([\"--print\", \"host-tuple\"])\n    8 |         .output()\n    9 |         .unwrap()\n   10 |         .stdout;\n   11 |     String::from_utf8(version_info).unwrap().trim().to_owned()\n   12 | }\n   13 | \n   14 | pub(crate) fn get_toolchain_name() -> String {\n   15 |     let active_toolchain = Command::new(\"rustup\")\n   16 |         .stderr(Stdio::inherit())\n   17 |         .args([\"show\", \"active-toolchain\"])\n   18 |         .output()\n   19 |         .unwrap()\n   20 |         .stdout;\n   21 |     String::from_utf8(active_toolchain).unwrap().trim().split_once(' ').unwrap().0.to_owned()\n   22 | }\n   23 | \n   24 | pub(crate) fn get_cargo_path() -> PathBuf {\n   25 |     if let Ok(cargo) = std::env::var(\"CARGO\") {\n   26 |         return PathBuf::from(cargo);\n   27 |     }\n   28 |     let cargo_path = Command::new(\"rustup\")\n   29 |         .stderr(Stdio::inherit())\n   30 |         .args([\"which\", \"cargo\"])\n   31 |         .output()\n   32 |         .unwrap()\n   33 |         .stdout;\n   34 |     Path::new(String::from_utf8(cargo_path).unwrap().trim()).to_owned()\n   35 | }\n   36 | \n   37 | pub(crate) fn get_rustc_path() -> PathBuf {\n   38 |     if let Ok(rustc) = std::env::var(\"RUSTC\") {\n   39 |         return PathBuf::from(rustc);\n   40 |     }\n   41 |     let rustc_path = Command::new(\"rustup\")\n   42 |         .stderr(Stdio::inherit())\n   43 |         .args([\"which\", \"rustc\"])\n   44 |         .output()\n   45 |         .unwrap()\n   46 |         .stdout;\n   47 |     Path::new(String::from_utf8(rustc_path).unwrap().trim()).to_owned()\n   48 | }\n   49 | \n   50 | pub(crate) fn get_rustdoc_path() -> PathBuf {\n   51 |     if let Ok(rustdoc) = std::env::var(\"RUSTDOC\") {\n   52 |         return PathBuf::from(rustdoc);\n   53 |     }\n   54 |     let rustc_path = Command::new(\"rustup\")\n   55 |         .stderr(Stdio::inherit())\n   56 |         .args([\"which\", \"rustdoc\"])\n   57 |         .output()\n   58 |         .unwrap()\n   59 |         .stdout;\n   60 |     Path::new(String::from_utf8(rustc_path).unwrap().trim()).to_owned()\n   61 | }\n   62 | \n   63 | pub(crate) fn get_default_sysroot(rustc: &Path) -> PathBuf {\n   64 |     let default_sysroot = Command::new(rustc)\n   65 |         .stderr(Stdio::inherit())\n   66 |         .args([\"--print\", \"sysroot\"])\n   67 |         .output()\n   68 |         .unwrap()\n   69 |         .stdout;\n   70 |     Path::new(String::from_utf8(default_sysroot).unwrap().trim()).to_owned()\n   71 | }\n   72 | \n   73 | // FIXME call once for each target and pass result around in struct\n   74 | pub(crate) fn get_file_name(rustc: &Path, crate_name: &str, crate_type: &str) -> String {\n   75 |     let file_name = Command::new(rustc)\n   76 |         .stderr(Stdio::inherit())\n   77 |         .args([\n   78 |             \"--crate-name\",\n   79 |             crate_name,\n   80 |             \"--crate-type\",\n   81 |             crate_type,\n   82 |             \"--print\",\n   83 |             \"file-names\",\n   84 |             \"-\",\n   85 |         ])\n   86 |         .output()\n   87 |         .unwrap()\n   88 |         .stdout;\n   89 |     let file_name = String::from_utf8(file_name).unwrap().trim().to_owned();\n   90 |     assert!(!file_name.contains('\\n'));\n   91 |     assert!(file_name.contains(crate_name));\n   92 |     file_name\n   93 | }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","description":"set_cross_linker_and_runner falls through to the `_ =>` arm and only prints \"Unknown non-native platform\" to stderr without exiting, leaving runner empty and no linker set. The subsequent cross build will then fail later with a less clear linker error. For an unsupported cross target this is a confusing two-stage failure rather than a single clear message.","fix":"Either exit with a clear error for unknown cross targets, or document that the default host linker/runner is intentionally used and silence is expected.","locations":[{"ref":"build_system/utils.rs:58-61","code":"   58 |             _ => {\n   59 |                 eprintln!(\"Unknown non-native platform\");\n   60 |             }\n   61 |         }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"split_path_dir_and_file panics if the final path component is not Component::Normal (e.g. a path ending in '..', '/', or a prefix/root only). Source file paths from RemapPathScopeComponents could in principle be remapped to such forms, and the panic aborts the whole compilation with a confusing message rather than degrading gracefully.","fix":"Handle non-Normal trailing components gracefully (e.g. fall back to using the full path string as the file name and an empty directory) instead of panicking.","locations":[{"ref":"src/debuginfo/line_info.rs:19-33","code":"   19 | fn split_path_dir_and_file(path: &Path) -> (&Path, &OsStr) {\n   20 |     let mut iter = path.components();\n   21 |     let file_name = match iter.next_back() {\n   22 |         Some(Component::Normal(p)) => p,\n   23 |         component => {\n   24 |             panic!(\n   25 |                 \"Path component {:?} of path {} is an invalid filename\",\n   26 |                 component,\n   27 |                 path.display()\n   28 |             );\n   29 |         }\n   30 |     };\n   31 |     let parent = iter.as_path();\n   32 |     (parent, file_name)\n   33 | }"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"`reuse_workproduct_for_cgu` does `work_product.saved_files.get(\"o\").expect(\"no saved object file in work product\")`. If the incremental cache work product is corrupt or missing the \"o\" entry, the compiler panics instead of reporting a recoverable error / recompiling the CGU.","fix":"Treat a missing saved object file as a cache miss (return an Err so the CGU is recompiled) rather than panicking via `expect`.","locations":[{"ref":"src/driver/aot.rs:236-238","code":"  236 |         tcx.sess,\n  237 |         work_product.saved_files.get(\"o\").expect(\"no saved object file in work product\"),\n  238 |     );"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"Each CString for the JIT program arguments is built with `CString::new(arg).unwrap()`. An argument containing an interior NUL byte (possible via `CG_CLIF_JIT_ARGS`) panics rather than reporting a clean error.","fix":"Map the `CString::new` error to a fatal diagnostic explaining the argument contains an interior NUL byte.","locations":[{"ref":"src/driver/jit.rs:92-95","code":"   92 |     let args = std::iter::once(&*tcx.crate_name(LOCAL_CRATE).as_str().to_string())\n   93 |         .chain(jit_args.iter().map(|arg| &**arg))\n   94 |         .map(|arg| CString::new(arg).unwrap())\n   95 |         .collect::<Vec<_>>();"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","description":"In JIT mode every imported dylib is loaded with `libloading::Library::new(&path).unwrap()`. A dependency dylib that fails to load (missing file, ABI mismatch, etc.) panics instead of producing a compiler diagnostic, unlike the static-lib path right above which emits a proper error.","fix":"Handle the `Err` from `Library::new` and emit `sess.dcx().err(...)` / fatal with the path and error message rather than unwrapping.","locations":[{"ref":"src/driver/jit.rs:200-205","code":"  200 |     let imported_dylibs = Box::leak(\n  201 |         dylib_paths\n  202 |             .into_iter()\n  203 |             .map(|path| unsafe { libloading::Library::new(&path).unwrap() })\n  204 |             .collect::<Box<[_]>>(),\n  205 |     );"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","description":"Several immediate-taking intrinsics read the immediate via `mir_operand_get_const_val` then `.to_u8()` (e.g. pcmpestri/pcmpestrm/pclmulqdq/aeskeygenassist/sha1rnds4) or `.to_u32()` (vcvtps2ph). If the constant fails to evaluate they emit a proper `span_fatal`, which is good. But `llvm.x86.sse.cmp.ps` reads `kind.try_to_bits(Size::from_bytes(1)).unwrap_or_else(|| panic!(...))` and then `.try_into().unwrap()` — an ICE-style panic rather than a user diagnostic if the kind operand is not a 1-byte scalar constant.","fix":"Replace the `panic!`/`unwrap` with `fx.tcx.dcx().span_fatal(...)` to surface a clean diagnostic, consistent with the other immediate-handling arms.","locations":[{"ref":"src/intrinsics/llvm_x86.rs:211-216","code":"  211 |             let flt_cc = match kind\n  212 |                 .try_to_bits(Size::from_bytes(1))\n  213 |                 .unwrap_or_else(|| panic!(\"kind not scalar: {:?}\", kind))\n  214 |                 .try_into()\n  215 |                 .unwrap()\n  216 |             {"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","description":"`llvm.x86.sse.cmp.ps` / `llvm.x86.sse2.cmp.pd` map the comparison predicates `_CMP_FALSE_OQ`/`_CMP_FALSE_OS` and `_CMP_TRUE_UQ`/`_CMP_TRUE_US` to `todo!()`. These are valid immediates (0x0b, 0x1b, 0x0f, 0x1f) that user code can pass via `_mm_cmp_ps`/`_mm_cmp_pd` with the corresponding `_CMP_*` constant, causing a compiler panic (ICE) rather than correct codegen producing all-zeros / all-ones lanes.","fix":"Handle FALSE by writing all-zero result lanes and TRUE by writing all-ones result lanes instead of `todo!()`.","locations":[{"ref":"src/intrinsics/llvm_x86.rs:228-232","code":"  228 |                 _CMP_FALSE_OQ | _CMP_FALSE_OS => todo!(),\n  229 |                 _CMP_NEQ_OQ | _CMP_NEQ_OS => FloatCC::OrderedNotEqual,\n  230 |                 _CMP_GE_OS | _CMP_GE_OQ => FloatCC::GreaterThanOrEqual,\n  231 |                 _CMP_GT_OS | _CMP_GT_OQ => FloatCC::GreaterThan,\n  232 |                 _CMP_TRUE_UQ | _CMP_TRUE_US => todo!(),"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","description":"clif_vector_type uses `unreachable!()` if the layout is not a SimdVector, and `.unwrap()` on `.by(...)` and on `u32::try_from(count)`. These are reachable only via internal misuse, but a malformed/unsupported vector type would crash codegen with an opaque panic rather than a diagnostic.","fix":"Keep the asserts for the SimdVector case but consider emitting a proper compiler error (span_bug/fatal) instead of bare unreachable!/unwrap so the failure is attributable.","locations":[{"ref":"src/intrinsics/mod.rs:57-64","code":"   57 | pub(crate) fn clif_vector_type<'tcx>(tcx: TyCtxt<'tcx>, layout: TyAndLayout<'tcx>) -> Type {\n   58 |     let (element, count) = match layout.backend_repr {\n   59 |         BackendRepr::SimdVector { element, count } => (element, count),\n   60 |         _ => unreachable!(),\n   61 |     };\n   62 | \n   63 |     scalar_to_clif_type(tcx, element).by(u32::try_from(count).unwrap()).unwrap()\n   64 | }"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"`ConcurrencyLimiter::acquire` calls `request_token()` on the helper thread while already holding the `state` mutex, then immediately blocks on `available_token_condvar.wait(state)`. The helper-thread callback also locks `state`. Lock ordering is consistent so this is not a classic deadlock, but `request_token` is invoked on every loop iteration including spurious condvar wakeups, so a flurry of unnecessary jobserver token requests can be issued, and the helper thread can deliver tokens that are immediately dropped by `drop_excess_capacity`, wasting jobserver round-trips.","fix":"Only call `request_token()` when `try_start_job` returned `Ok(false)` AND no request is already outstanding (track an `outstanding_requests` counter), avoiding redundant requests on every wakeup.","locations":[{"ref":"src/concurrency_limiter.rs:73-77","code":"   73 |             }\n   74 | \n   75 |             self.helper_thread.as_ref().unwrap().lock().unwrap().request_token();\n   76 |             state = self.available_token_condvar.wait(state).unwrap();\n   77 |         }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"negligible","description":"LogGroup uses a global AtomicBool IN_GROUP with `assert!(!IN_GROUP.swap(true, ...))` to enforce that only one log group is active at a time. This is a single-threaded build orchestrator so the assertion is effectively a structural invariant check, but it makes nested or concurrent LogGroup usage a hard panic. If the tool ever parallelizes, this global flag becomes a correctness hazard.","fix":"Document the single-active-group invariant; if parallelism is added, replace the global flag with a per-thread or scoped mechanism.","locations":[{"ref":"build_system/utils.rs:227-252","code":"  227 | static IN_GROUP: AtomicBool = AtomicBool::new(false);\n  228 | pub(crate) struct LogGroup {\n  229 |     is_gha: bool,\n  230 | }\n  231 | \n  232 | impl LogGroup {\n  233 |     pub(crate) fn guard(name: &str) -> LogGroup {\n  234 |         let is_gha = env::var(\"GITHUB_ACTIONS\").is_ok();\n  235 | \n  236 |         assert!(!IN_GROUP.swap(true, Ordering::SeqCst));\n  237 |         if is_gha {\n  238 |             eprintln!(\"::group::{name}\");\n  239 |         }\n  240 | \n  241 |         LogGroup { is_gha }\n  242 |     }\n  243 | }\n  244 | \n  245 | impl Drop for LogGroup {\n  246 |     fn drop(&mut self) {\n  247 |         if self.is_gha {\n  248 |             eprintln!(\"::endgroup::\");\n  249 |         }\n  250 |         IN_GROUP.store(false, Ordering::SeqCst);\n  251 |     }\n  252 | }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"`dep_symbol_lookup_fn` deliberately `Box::leak`s every loaded dylib `Library` so symbols stay valid for the lifetime of the JITed program. This is intentional (the process `exit`s in `run_jit`), but it is a permanent leak of OS library handles; if `run_jit` were ever made to return rather than `process::exit`, these handles would never be unloaded.","fix":"Document the intentional leak more explicitly, or store the libraries in a long-lived owner tied to the JIT session instead of leaking, so the lifetime is explicit and unloadable if the driver stops calling `process::exit`.","locations":[{"ref":"src/driver/jit.rs:200-205","code":"  200 |     let imported_dylibs = Box::leak(\n  201 |         dylib_paths\n  202 |             .into_iter()\n  203 |             .map(|path| unsafe { libloading::Library::new(&path).unwrap() })\n  204 |             .collect::<Box<[_]>>(),\n  205 |     );"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"call_site.ret_addr is a CodeOffset (u32) and `call_site.ret_addr - 1` is computed unconditionally in three places. If ret_addr were ever 0 this underflows and panics in debug builds (and wraps to u32::MAX in release). A return address of 0 is not expected for a real call site, but there is no guard or comment justifying the assumption.","fix":"Add a debug_assert!(call_site.ret_addr > 0) with a comment, or use ret_addr.saturating_sub(1)/checked_sub, documenting that ret_addr points just past the call so the call instruction start is ret_addr-1.","locations":[{"ref":"src/debuginfo/unwind.rs:167-167","code":"  167 |                                 start: u64::from(call_site.ret_addr - 1),"},{"ref":"src/debuginfo/unwind.rs:179-179","code":"  179 |                                                 start: u64::from(call_site.ret_addr - 1),"},{"ref":"src/debuginfo/unwind.rs:187-187","code":"  187 |                                                 start: u64::from(call_site.ret_addr - 1),"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`args.len() as c_int` truncates the argument count to a 32-bit `c_int`. With a pathologically large `CG_CLIF_JIT_ARGS` (more than i32::MAX args) the value wraps to a negative/garbage argc passed to the JITed `main`. Practically unreachable but it is an unchecked truncating cast on user-controlled data.","fix":"Use `c_int::try_from(args.len()).unwrap()` so an unexpected overflow aborts cleanly instead of silently truncating.","locations":[{"ref":"src/driver/jit.rs:117","code":"  117 |     let ret = f(args.len() as c_int, argv.as_ptr());"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"In `create_stack_slot`, the over-aligned path computes `size + align` as `u32`. `new_stack_slot` only caps the *size* at `u32::MAX - 16`; if a type has size close to that cap and an alignment greater than 16 (over-aligned), `size + align` overflows `u32` (panic in debug, wrap in release producing a too-small slot). Practically unreachable (requires a ~4 GiB over-aligned stack value) but the arithmetic is unchecked.","fix":"Use `size.checked_add(align)` and emit the existing \"too big to store on the stack\" fatal error on overflow, or perform the addition in `u64` with a bound check before truncating to `u32`.","locations":[{"ref":"src/common.rs:396-401","code":"  396 |             let stack_slot = self.bcx.create_sized_stack_slot(StackSlotData {\n  397 |                 kind: StackSlotKind::ExplicitSlot,\n  398 |                 size: size + align,\n  399 |                 align_shift: abi_align.ilog2().try_into().unwrap(),\n  400 |                 key: None,\n  401 |             });"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In the F128 -> small-int (i8/i16) cast path the soft-float libcall return type is declared as `AbiParam::new(to_ty)` (I8 or I16), but the chosen builtin is `__fix(uns)tfsi`/etc. selected via `ret_ty` which is I32 when `to_ty.bits() < 32`. The libcall actually returns a 32-bit integer, yet the signature claims an 8/16-bit return. Worse, the saturating-clamp code that follows builds `min_val`/`max_val` as I32 and does `icmp_imm`/`select` against `ret`, then `ireduce(to_ty, val)`, all of which assume `ret` is I32. With `ret` typed I8/I16 this yields an ABI mismatch and a Cranelift type-verifier error (operands of mixed width) for `f128 as u8/i8/u16/i16`.","fix":"Declare the libcall return as `AbiParam::new(ret_ty)` (matching the `__fix...si`/`...di`/`...ti` builtin that was selected), exactly like the analogous f32/f64 path in `clif_int_or_float_cast` uses I32 for I8/I16 targets.","locations":[{"ref":"src/codegen_f16_f128.rs:241-279","code":"  241 |     } else if from_ty == types::F128 && to_ty.is_int() {\n  242 |         let ret_ty = if to_ty.bits() < 32 { types::I32 } else { to_ty };\n  243 |         let name = format!(\n  244 |             \"__fix{sign}tf{size}i\",\n  245 |             sign = if to_signed { \"\" } else { \"uns\" },\n  246 |             size = match ret_ty {\n  247 |                 types::I32 => 's',\n  248 |                 types::I64 => 'd',\n  249 |                 types::I128 => 't',\n  250 |                 _ => unreachable!(\"{from_ty:?}\"),\n  251 |             },\n  252 |         );\n  253 |         let ret =\n  254 |             fx.lib_call(&name, vec![AbiParam::new(from_ty)], vec![AbiParam::new(to_ty)], &[from])\n  255 |                 [0];\n  256 |         let val = if ret_ty == to_ty {\n  257 |             ret\n  258 |         } else {\n  259 |             let (min, max) = match (to_ty, to_signed) {\n  260 |                 (types::I8, false) => (0, i64::from(u8::MAX)),\n  261 |                 (types::I16, false) => (0, i64::from(u16::MAX)),\n  262 |                 (types::I8, true) => (i64::from(i8::MIN as u32), i64::from(i8::MAX as u32)),\n  263 |                 (types::I16, true) => (i64::from(i16::MIN as u32), i64::from(i16::MAX as u32)),\n  264 |                 _ => unreachable!(\"{to_ty:?}\"),\n  265 |             };\n  266 |             let min_val = fx.bcx.ins().iconst(types::I32, min);\n  267 |             let max_val = fx.bcx.ins().iconst(types::I32, max);\n  268 | \n  269 |             let val = if to_signed {\n  270 |                 let has_underflow = fx.bcx.ins().icmp_imm(IntCC::SignedLessThan, ret, min);\n  271 |                 let has_overflow = fx.bcx.ins().icmp_imm(IntCC::SignedGreaterThan, ret, max);\n  272 |                 let bottom_capped = fx.bcx.ins().select(has_underflow, min_val, ret);\n  273 |                 fx.bcx.ins().select(has_overflow, max_val, bottom_capped)\n  274 |             } else {\n  275 |                 let has_overflow = fx.bcx.ins().icmp_imm(IntCC::UnsignedGreaterThan, ret, max);\n  276 |                 fx.bcx.ins().select(has_overflow, max_val, ret)\n  277 |             };\n  278 |             fx.bcx.ins().ireduce(to_ty, val)\n  279 |         };"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"PMULHRSW (`llvm.x86.ssse3.pmul.hr.sw.128`) computes `(a*b >> 14)` using `ushr_imm` (logical shift right) on a signed i32 product. The product of two i16 values can be negative (e.g. -32768 * 32767 = -1073709056), whose i32 representation has bit 31 set. A logical shift fills with zeros instead of the sign bit, so negative products yield completely wrong results. The instruction is defined with an arithmetic shift. The subsequent `>> 1` on line 650 is also logical but is correct only because after `+1` the value is small/non-negative in the correct path; the primary `>> 14` must be arithmetic.","fix":"Use `fx.bcx.ins().sshr_imm(mul, 14)` for the first shift so the sign is preserved. After `iadd_imm(.., 1)` the `>> 1` should also be arithmetic (`sshr_imm`) to match hardware, since the intermediate can be negative for negative products.","locations":[{"ref":"src/intrinsics/llvm_x86.rs:647-652","code":"  647 |                 let mul: Value = fx.bcx.ins().imul(a_lane, b_lane);\n  648 |                 let shifted = fx.bcx.ins().ushr_imm(mul, 14);\n  649 |                 let incremented = fx.bcx.ins().iadd_imm(shifted, 1);\n  650 |                 let shifted_again = fx.bcx.ins().ushr_imm(incremented, 1);\n  651 | \n  652 |                 let res_lane = fx.bcx.ins().ireduce(types::I16, shifted_again);"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In main, when the command is CheckTodo, `todo::run()` is called inside the `if` at line 145-147. todo::run() has return type `!` and exits the process, so execution never falls through. However the later `match command` arm `Command::Prepare | Command::CheckTodo => {}` (lines 212-214) is effectively dead for CheckTodo, AND more importantly all the toolchain/sysroot setup between lines 149-210 (including build_backend) is unreachable for CheckTodo only by virtue of run() being `!`. If todo::run() were ever changed to return normally, CheckTodo would fall through and needlessly build the backend. The control flow relies on an implicit `!` return rather than an explicit exit/early-return, which is fragile.","fix":"Make CheckTodo explicitly `process::exit` after todo::run() in the early block (like Prepare does), or restructure so command dispatch that needs no backend returns before build_backend is invoked.","locations":[{"ref":"build_system/main.rs:145-147","code":"  145 |     if command == Command::CheckTodo {\n  146 |         todo::run();\n  147 |     }"},{"ref":"build_system/main.rs:211-214","code":"  211 |     match command {\n  212 |         Command::Prepare | Command::CheckTodo => {\n  213 |             // Handled above\n  214 |         }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"compile_global_asm strips LLVM-style `//` comments by naively cutting each line at the first `//` occurrence. This also truncates lines where `//` legitimately appears inside an assembler string literal (e.g. `.ascii \"http://...\"` or a `.string` containing `//`), silently corrupting the emitted assembly and producing wrong object code or assembler errors. The comment stripping is not literal-aware.","fix":"Only strip `//` when it is not inside a string literal, or restrict stripping to lines that are not within `.ascii`/`.asciz`/`.string`/`.byte` data, or document and gate this behavior. At minimum, track quote state while scanning the line before cutting at `//`.","locations":[{"ref":"src/global_asm.rs:193-199","code":"  193 |     // Remove all LLVM style comments\n  194 |     let mut global_asm = global_asm\n  195 |         .lines()\n  196 |         .map(|line| if let Some(index) = line.find(\"//\") { &line[0..index] } else { line })\n  197 |         .collect::<Vec<_>>()\n  198 |         .join(\"\\n\");\n  199 |     global_asm.push('\\n');"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`get_toolchain_binary` derives tool names via a chain of `String::replace` calls on the linker file name. Because each `replace` operates on the result of the previous one, the substitutions interact: e.g. replacing \"ld\" then \"clang\" etc. on a name like \"clang\" or a path containing overlapping substrings can produce a wrong tool name. The substring `cc` also matches inside `clang`/`gcc` fragments after earlier replacements, and `ld` matches inside many unrelated names. This can silently point the compiler at the wrong (or nonexistent) toolchain binary.","fix":"Match the known linker basename exactly (e.g. via a match on the recognized linker names / flavor) and substitute the whole filename, instead of running several order-dependent substring replacements.","locations":[{"ref":"src/toolchain.rs:18-26","code":"   18 |     } else {\n   19 |         let tool_file_name = linker_file_name\n   20 |             .replace(\"ld\", tool)\n   21 |             .replace(\"gcc\", tool)\n   22 |             .replace(\"clang\", tool)\n   23 |             .replace(\"cc\", tool);\n   24 | \n   25 |         linker.set_file_name(tool_file_name)\n   26 |     }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"config.txt line parsing: `.map(|line| if let Some((line, _comment)) = line.split_once('#') { line } else { line })` strips everything after the first '#'. A '#' that appears inside a value (e.g. a key=value where value legitimately contains '#') will be silently truncated. For a boolean-only config this is currently harmless, but the comment-stripping is unconditional and would corrupt any value-bearing entry containing '#'.","fix":"If values may contain '#', only treat '#' as a comment when it starts a line or follows whitespace; otherwise document that '#' is always a comment delimiter.","locations":[{"ref":"build_system/config.rs:7","code":"    7 |         .map(|line| if let Some((line, _comment)) = line.split_once('#') { line } else { line })"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","description":"hash_dir uses `entry.file_name().to_str().unwrap()` for BTreeMap keys and `hash_file` reads with `read(file).unwrap()`. A filename that is not valid UTF-8 (possible on Linux) causes a panic during checksum verification of downloaded repos. Downloaded third-party repos (rand, regex, graviola, abi-cafe) could in principle contain such names, aborting the build with an unwrap panic instead of a clear error.","fix":"Hash file_name() via its OsStr/bytes representation instead of requiring UTF-8, or surface a clear error if a non-UTF8 name is encountered.","locations":[{"ref":"build_system/prepare.rs:43-58","code":"   43 | fn hash_dir(dir: &std::path::Path) -> u64 {\n   44 |     let mut sub_hashes = std::collections::BTreeMap::new();\n   45 |     for entry in std::fs::read_dir(dir).unwrap() {\n   46 |         let entry = entry.unwrap();\n   47 |         if entry.file_type().unwrap().is_dir() {\n   48 |             sub_hashes.insert(\n   49 |                 entry.file_name().to_str().unwrap().to_owned(),\n   50 |                 hash_dir(&entry.path()).to_le(),\n   51 |             );\n   52 |         } else {\n   53 |             sub_hashes.insert(\n   54 |                 entry.file_name().to_str().unwrap().to_owned(),\n   55 |                 hash_file(&entry.path()).to_le(),\n   56 |             );\n   57 |         }\n   58 |     }"},{"ref":"build_system/prepare.rs:31-41","code":"   31 | fn hash_file(file: &std::path::Path) -> u64 {\n   32 |     let contents = std::fs::read(file).unwrap();\n   33 |     #[allow(deprecated)]\n   34 |     let mut hasher = std::hash::SipHasher::new();\n   35 |     // The following is equivalent to\n   36 |     //   std::hash::Hash::hash(&contents, &mut hasher);\n   37 |     // but gives the same result independent of host byte order.\n   38 |     hasher.write_usize(contents.len().to_le());\n   39 |     Hash::hash_slice(&contents, &mut hasher);\n   40 |     std::hash::Hasher::finish(&hasher)\n   41 | }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In fetch(), when a source lockfile does NOT exist it asserts `target_lockfile.exists()` (the cloned repo must ship a Cargo.lock). For repos without a committed Cargo.lock this assertion aborts prepare with an opaque panic. Conversely when the source lockfile exists it asserts the target does NOT exist; if a repo ships its own Cargo.lock and a patch lockfile also exists, prepare panics. These are brittle invariants surfaced as bare asserts.","fix":"Replace the asserts with descriptive error messages explaining the lockfile expectation, so misconfigured patch/repo combinations produce actionable diagnostics.","locations":[{"ref":"build_system/prepare.rs:149-157","code":"  149 |         let source_lockfile =\n  150 |             dirs.source_dir.join(\"patches\").join(format!(\"{}-lock.toml\", self.patch_name));\n  151 |         let target_lockfile = download_dir.join(\"Cargo.lock\");\n  152 |         if source_lockfile.exists() {\n  153 |             assert!(!target_lockfile.exists());\n  154 |             fs::copy(source_lockfile, target_lockfile).unwrap();\n  155 |         } else {\n  156 |             assert!(target_lockfile.exists());\n  157 |         }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In run_testsuite, the source basename for run_out_command is computed with `source.split('/').last().unwrap().split('.').next().unwrap()`. This assumes forward-slash path separators and that the binary name is the source filename minus its first extension. It is correct for the hardcoded \"example/foo.rs\" entries, but the split('.').next() also breaks if a source filename contained an embedded dot before the real component; more notably split('/') is non-portable if entries ever used OS separators. Minor since inputs are static.","fix":"Use Path::new(source).file_stem() to derive the binary name robustly and portably.","locations":[{"ref":"build_system/tests.rs:426-432","code":"  426 |                 TestCaseCmd::BuildBinAndRun { source, args } => {\n  427 |                     self.run_rustc([source]);\n  428 |                     self.run_out_command(\n  429 |                         source.split('/').last().unwrap().split('.').next().unwrap(),\n  430 |                         args,\n  431 |                     );\n  432 |                 }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ensure_empty_dir first does `fs::create_dir_all(path).unwrap()` and then matches the NotFound error of the subsequent read_dir to early-return. After a successful create_dir_all the directory exists, so the NotFound branch on read_dir is effectively unreachable dead code; if create_dir_all failed it would already have panicked. The defensive branch is misleading.","fix":"Remove the unreachable NotFound branch, or restructure to not create_dir_all first if the intent is to tolerate a missing dir.","locations":[{"ref":"build_system/utils.rs:180-190","code":"  180 | pub(crate) fn ensure_empty_dir(path: &Path) {\n  181 |     fs::create_dir_all(path).unwrap();\n  182 |     let read_dir = match fs::read_dir(path) {\n  183 |         Ok(read_dir) => read_dir,\n  184 |         Err(err) if err.kind() == io::ErrorKind::NotFound => {\n  185 |             return;\n  186 |         }\n  187 |         Err(err) => {\n  188 |             panic!(\"Failed to read contents of {path}: {err}\", path = path.display())\n  189 |         }\n  190 |     };"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`clif_int_or_float_cast` routes any cast where `from_ty` is F16/F128 into `codegen_f16_f128::codegen_cast`. If `from_ty == to_ty == F16` (or both F128), `codegen_cast`'s float->float match has no `(F16,F16)`/`(F128,F128)` arm and hits `unreachable!`, panicking the compiler. Identity float casts are normally not emitted by MIR so this is hard to reach, but the dispatch condition is asymmetric: the `from_ty != to_ty` guard is only applied to the `to_ty` branch (due to `&&` binding tighter than `||`), not the `from_ty` branch.","fix":"Add an early `if from_ty == to_ty { return from; }` guard in `clif_int_or_float_cast`, or handle the identity F16/F128 case in `codegen_cast`'s float->float match.","locations":[{"ref":"src/cast.rs:42-46","code":"   42 |     if matches!(from_ty, types::F16 | types::F128)\n   43 |         || matches!(to_ty, types::F16 | types::F128) && from_ty != to_ty\n   44 |     {\n   45 |         return codegen_f16_f128::codegen_cast(fx, from, from_signed, to_ty, to_signed);\n   46 |     }"},{"ref":"src/codegen_f16_f128.rs:198-211","code":"  198 |     if from_ty.is_float() && to_ty.is_float() {\n  199 |         let name = match (from_ty, to_ty) {\n  200 |             (types::F16, types::F32) => return f16_to_f32(fx, from),\n  201 |             (types::F16, types::F64) => return f16_to_f64(fx, from),\n  202 |             (types::F16, types::F128) => \"__extendhftf2\",\n  203 |             (types::F32, types::F128) => \"__extendsftf2\",\n  204 |             (types::F64, types::F128) => \"__extenddftf2\",\n  205 |             (types::F128, types::F64) => \"__trunctfdf2\",\n  206 |             (types::F128, types::F32) => \"__trunctfsf2\",\n  207 |             (types::F128, types::F16) => \"__trunctfhf2\",\n  208 |             (types::F64, types::F16) => return f64_to_f16(fx, from),\n  209 |             (types::F32, types::F16) => return f32_to_f16(fx, from),\n  210 |             _ => unreachable!(\"{from_ty:?} -> {to_ty:?}\"),\n  211 |         };"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`bitcast` calls in the f16/f128 sign/abs/copysign helpers use `MemFlags::new()` (default little-endian-ish flags without explicit endianness) rather than the endianness-aware `codegen_bitcast` used elsewhere in the codebase (common.rs). On a big-endian target a raw `bitcast` between F16/I16 or F128/I128 via `MemFlags::new()` may not match the expected lane/byte ordering that `codegen_bitcast` sets via `flags.set_endianness`.","fix":"Audit whether these bitcasts need endianness flags; if so, route them through `codegen_bitcast` (which sets `flags.set_endianness` from `tcx.data_layout.endian`) for correctness on big-endian targets.","locations":[{"ref":"src/codegen_f16_f128.rs:141-188","code":"  141 | pub(crate) fn neg_f16(fx: &mut FunctionCx<'_, '_, '_>, value: Value) -> Value {\n  142 |     let bits = fx.bcx.ins().bitcast(types::I16, MemFlags::new(), value);\n  143 |     let bits = fx.bcx.ins().bxor_imm(bits, 0x8000);\n  144 |     fx.bcx.ins().bitcast(types::F16, MemFlags::new(), bits)\n  145 | }\n  146 | \n  147 | pub(crate) fn neg_f128(fx: &mut FunctionCx<'_, '_, '_>, value: Value) -> Value {\n  148 |     let bits = fx.bcx.ins().bitcast(types::I128, MemFlags::new(), value);\n  149 |     let (low, high) = fx.bcx.ins().isplit(bits);\n  150 |     let high = fx.bcx.ins().bxor_imm(high, 0x8000_0000_0000_0000_u64 as i64);\n  151 |     let bits = fx.bcx.ins().iconcat(low, high);\n  152 |     fx.bcx.ins().bitcast(types::F128, MemFlags::new(), bits)\n  153 | }\n  154 | \n  155 | pub(crate) fn abs_f16(fx: &mut FunctionCx<'_, '_, '_>, value: Value) -> Value {\n  156 |     let bits = fx.bcx.ins().bitcast(types::I16, MemFlags::new(), value);\n  157 |     let bits = fx.bcx.ins().band_imm(bits, 0x7fff);\n  158 |     fx.bcx.ins().bitcast(types::F16, MemFlags::new(), bits)\n  159 | }\n  160 | \n  161 | pub(crate) fn abs_f128(fx: &mut FunctionCx<'_, '_, '_>, value: Value) -> Value {\n  162 |     let bits = fx.bcx.ins().bitcast(types::I128, MemFlags::new(), value);\n  163 |     let (low, high) = fx.bcx.ins().isplit(bits);\n  164 |     let high = fx.bcx.ins().band_imm(high, 0x7fff_ffff_ffff_ffff_u64 as i64);\n  165 |     let bits = fx.bcx.ins().iconcat(low, high);\n  166 |     fx.bcx.ins().bitcast(types::F128, MemFlags::new(), bits)\n  167 | }\n  168 | \n  169 | pub(crate) fn copysign_f16(fx: &mut FunctionCx<'_, '_, '_>, lhs: Value, rhs: Value) -> Value {\n  170 |     let lhs = fx.bcx.ins().bitcast(types::I16, MemFlags::new(), lhs);\n  171 |     let rhs = fx.bcx.ins().bitcast(types::I16, MemFlags::new(), rhs);\n  172 |     let res = fx.bcx.ins().band_imm(lhs, 0x7fff);\n  173 |     let sign = fx.bcx.ins().band_imm(rhs, 0x8000);\n  174 |     let res = fx.bcx.ins().bor(res, sign);\n  175 |     fx.bcx.ins().bitcast(types::F16, MemFlags::new(), res)\n  176 | }\n  177 | \n  178 | pub(crate) fn copysign_f128(fx: &mut FunctionCx<'_, '_, '_>, lhs: Value, rhs: Value) -> Value {\n  179 |     let lhs = fx.bcx.ins().bitcast(types::I128, MemFlags::new(), lhs);\n  180 |     let rhs = fx.bcx.ins().bitcast(types::I128, MemFlags::new(), rhs);\n  181 |     let (low, lhs_high) = fx.bcx.ins().isplit(lhs);\n  182 |     let (_, rhs_high) = fx.bcx.ins().isplit(rhs);\n  183 |     let high = fx.bcx.ins().band_imm(lhs_high, 0x7fff_ffff_ffff_ffff_u64 as i64);\n  184 |     let sign = fx.bcx.ins().band_imm(rhs_high, 0x8000_0000_0000_0000_u64 as i64);\n  185 |     let high = fx.bcx.ins().bor(high, sign);\n  186 |     let res = fx.bcx.ins().iconcat(low, high);\n  187 |     fx.bcx.ins().bitcast(types::F128, MemFlags::new(), res)\n  188 | }"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"When `CG_CLIF_JIT_ARGS` is set to an empty string, `\"\".split(' ')` yields a single empty string element, so `jit_args` becomes `vec![\"\"]` (one bogus empty argument passed to the JITed program) rather than an empty vec. The intended no-args case only works when the variable is unset, not when set empty.","fix":"Special-case an empty string to produce an empty vec, e.g. `if args.is_empty() { vec![] } else { args.split(' ').map(str::to_string).collect() }`.","locations":[{"ref":"src/config.rs:20-22","code":"   20 |             jit_args: match std::env::var(\"CG_CLIF_JIT_ARGS\") {\n   21 |                 Ok(args) => args.split(' ').map(|arg| arg.to_string()).collect(),\n   22 |                 Err(std::env::VarError::NotPresent) => vec![],"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In mir_operand_get_const_val the `Rvalue::Cast` arm guards against a local being assigned twice (`if computed_scalar_int.is_some() { return None; }`) and propagates failure via `?`, but the sibling `Rvalue::Use` arm does neither: it unconditionally overwrites `computed_scalar_int` with the result of the recursive call, even if a previous assignment was already found, and if the recursive call returns `None` it silently resets to `None` and keeps scanning instead of bailing out. With multiple assigning statements to the same place this can return a stale/incorrect constant or miss a `None` that should have aborted the search.","fix":"Mirror the Cast arm: bail with `return None` if `computed_scalar_int.is_some()`, and treat a `None` recursive result as a hard failure (`return None`) rather than overwriting.","locations":[{"ref":"src/constant.rs:596-598","code":"  596 |                                 Rvalue::Use(operand, _) => {\n  597 |                                     computed_scalar_int = mir_operand_get_const_val(fx, operand)\n  598 |                                 }"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"LenWriter::write_at asserts `offset + bytes.len() < self.0` with a strict less-than. The gimli Writer contract (and EndianVec's implementation) permits writing exactly up to the current length, i.e. offset + bytes.len() == len is valid. The strict `<` rejects a legitimate boundary write and could spuriously panic. Additionally `offset + bytes.len()` is a plain usize addition with no overflow guard. LenWriter is only used for size pre-computation (no write_at is currently issued during sizing), so this is latent, but the assertion is incorrect versus the trait contract.","fix":"Use `assert!(offset + bytes.len() <= self.0)` (or offset.checked_add(bytes.len()).is_some_and(|e| e <= self.0)) to match the gimli write_at contract that allows writing up to and including the current length.","locations":[{"ref":"src/debuginfo/gcc_except_table.rs:267-270","code":"  267 |     fn write_at(&mut self, offset: usize, bytes: &[u8]) -> gimli::write::Result<()> {\n  268 |         assert!(offset + bytes.len() < self.0);\n  269 |         Ok(())\n  270 |     }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","description":"create_debug_lines calls end_sequence with the `end` of the last MachSrcLoc (func_end accumulated in the loop), but then returns mcr.buffer.total_size() as the function length used for DW_AT_high_pc and the unit range list. If the final source-located region does not extend to the true end of the emitted code (e.g. trailing padding or unannotated code), the line-program sequence will be shorter than the function's actual extent reported elsewhere, leaving a gap at the tail of the function in the line table. The two length sources are inconsistent.","fix":"Use mcr.buffer.total_size() (the same value returned) for end_sequence so the line-program sequence end matches the DW_AT_high_pc / range-list length, or document why the last srcloc end is intentionally used.","locations":[{"ref":"src/debuginfo/line_info.rs:167-187","code":"  167 |         let mut func_end = 0;\n  168 | \n  169 |         let mcr = context.compiled_code().unwrap();\n  170 |         for &MachSrcLoc { start, end, loc } in mcr.buffer.get_srclocs_sorted() {\n  171 |             debug_context.dwarf.unit.line_program.row().address_offset = u64::from(start);\n  172 |             if !loc.is_default() {\n  173 |                 let source_loc = self.source_loc_set[loc.bits() as usize];\n  174 |                 create_row_for_span(debug_context, source_loc);\n  175 |             } else {\n  176 |                 create_row_for_span(debug_context, self.function_source_loc);\n  177 |             }\n  178 |             func_end = end;\n  179 |         }\n  180 | \n  181 |         debug_context.dwarf.unit.line_program.end_sequence(u64::from(func_end));\n  182 | \n  183 |         let func_end = mcr.buffer.total_size();\n  184 | \n  185 |         assert_ne!(func_end, 0);\n  186 | \n  187 |         func_end"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In the tbl1 arms the boolean computed for out-of-range indices is named `is_zero` but actually means 'index is out of range' (idx >= 16). The select then writes 0 for out-of-range lanes. The variable name is misleading and obscures the actual TBL semantics (out-of-range -> 0).","fix":"Rename `is_zero` to `out_of_range` (or `is_oob`) for clarity; behavior is otherwise correct.","locations":[{"ref":"src/intrinsics/llvm_aarch64.rs:421-430","code":"  421 |             let zero = fx.bcx.ins().iconst(types::I8, 0);\n  422 |             for i in 0..8 {\n  423 |                 let idx_lane = idx.value_lane(fx, i).load_scalar(fx);\n  424 |                 let is_zero =\n  425 |                     fx.bcx.ins().icmp_imm(IntCC::UnsignedGreaterThanOrEqual, idx_lane, 16);\n  426 |                 let t_idx = fx.bcx.ins().uextend(fx.pointer_type, idx_lane);\n  427 |                 let t_lane = t.value_lane_dyn(fx, t_idx).load_scalar(fx);\n  428 |                 let res = fx.bcx.ins().select(is_zero, zero, t_lane);\n  429 |                 ret.place_lane(fx, i).to_ptr().store(fx, res, MemFlags::trusted());\n  430 |             }"},{"ref":"src/intrinsics/llvm_aarch64.rs:435-444","code":"  435 |             let zero = fx.bcx.ins().iconst(types::I8, 0);\n  436 |             for i in 0..16 {\n  437 |                 let idx_lane = idx.value_lane(fx, i).load_scalar(fx);\n  438 |                 let is_zero =\n  439 |                     fx.bcx.ins().icmp_imm(IntCC::UnsignedGreaterThanOrEqual, idx_lane, 16);\n  440 |                 let t_idx = fx.bcx.ins().uextend(fx.pointer_type, idx_lane);\n  441 |                 let t_lane = t.value_lane_dyn(fx, t_idx).load_scalar(fx);\n  442 |                 let res = fx.bcx.ins().select(is_zero, zero, t_lane);\n  443 |                 ret.place_lane(fx, i).to_ptr().store(fx, res, MemFlags::trusted());\n  444 |             }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`simd_select_bitmask` computes `expected_int_bits = lane_count.max(8)` but does not round up to a power of two. For a vector of e.g. 24 lanes, `expected_int_bits` would be 24 and `Type::int(24)` is constructed at line 852; Cranelift only supports integer types of width 8/16/32/64/128, so `Type::int(24).unwrap()` would panic. Mask widths that are not 8/16/32/64/128 (any lane count not equal to such after max(8)) will ICE. The `simd_bitmask` path avoids this by using `int_with_byte_size`/`expected_bytes`, but the select_bitmask `Uint` path uses raw `expected_int_bits`.","fix":"Validate/round `expected_int_bits` to a supported Cranelift integer width, or use `Type::int_with_byte_size(expected_bytes)` consistently as in `simd_bitmask`, and reject unsupported lane counts with a diagnostic instead of an `unwrap` panic.","locations":[{"ref":"src/intrinsics/simd.rs:838-855","code":"  838 |             let expected_int_bits = lane_count.max(8);\n  839 |             let expected_bytes = expected_int_bits / 8 + ((expected_int_bits % 8 > 0) as u64);\n  840 | \n  841 |             let m = match m.layout().ty.kind() {\n  842 |                 ty::Uint(i) if i.bit_width() == Some(expected_int_bits) => m.load_scalar(fx),\n  843 |                 ty::Array(elem, len)\n  844 |                     if matches!(elem.kind(), ty::Uint(ty::UintTy::U8))\n  845 |                         && len\n  846 |                             .try_to_target_usize(fx.tcx)\n  847 |                             .expect(\"expected monomorphic const in codegen\")\n  848 |                             == expected_bytes =>\n  849 |                 {\n  850 |                     m.force_stack(fx).0.load(\n  851 |                         fx,\n  852 |                         Type::int(expected_int_bits as u16).unwrap(),\n  853 |                         MemFlags::trusted(),\n  854 |                     )\n  855 |                 }"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `target_config`, `unstable_target_features` is set to a clone of `target_features`. The adjacent FIXME ('do `unstable_target_features` properly') confirms this is a placeholder: reporting the stable feature set as the unstable set is incorrect and, combined with the FIXME on `target_features` not being the actually-used features, can make `#[cfg(target_feature)]` evaluate incorrectly for Cranelift builds.","fix":"Compute the real enabled feature set from the built ISA flags and populate both fields accordingly (tracked by the existing FIXMEs).","locations":[{"ref":"src/lib.rs:156-173","code":"  156 |         // FIXME return the actually used target features. this is necessary for #[cfg(target_feature)]\n  157 |         let target_features = match sess.target.arch {\n  158 |             Arch::X86_64 if sess.target.os != Os::None => {\n  159 |                 // x86_64 mandates SSE2 support and rustc requires the x87 feature to be enabled\n  160 |                 vec![sym::fxsr, sym::sse, sym::sse2, Symbol::intern(\"x87\")]\n  161 |             }\n  162 |             Arch::AArch64 => match &sess.target.os {\n  163 |                 Os::None => vec![],\n  164 |                 // On macOS the aes, sha2 and sha3 features are enabled by default and ring\n  165 |                 // fails to compile on macOS when they are not present.\n  166 |                 Os::MacOs => vec![sym::neon, sym::aes, sym::sha2, sym::sha3],\n  167 |                 // AArch64 mandates Neon support\n  168 |                 _ => vec![sym::neon],\n  169 |             },\n  170 |             _ => vec![],\n  171 |         };\n  172 |         // FIXME do `unstable_target_features` properly\n  173 |         let unstable_target_features = target_features.clone();"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"main computes `out_dir = current_dir.join(out_dir)` (main.rs:130). If --out-dir is given an absolute path, Path::join correctly returns it; if relative, it is joined to cwd. That is fine. However out_dir is also initialized to `current_dir().unwrap()` at line 80, so when no --out-dir is passed, line 130 computes `current_dir.join(current_dir)` which, because the default is absolute, yields current_dir unchanged. It works but relies on join's absolute-path override behavior; the double-current_dir is confusing.","fix":"Default out_dir to a relative PathBuf (e.g. PathBuf::from(\".\")) or skip the join when no flag was provided, to make the intent explicit.","locations":[{"ref":"build_system/main.rs:80","code":"   80 |     let mut out_dir = std::env::current_dir().unwrap();"},{"ref":"build_system/main.rs:129-130","code":"  129 |     let current_dir = std::env::current_dir().unwrap();\n  130 |     out_dir = current_dir.join(out_dir);"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"In WriterRelocate::write_eh_pointer, the Address::Constant + DW_EH_PE_pcrel arm computes offset.wrapping_sub(val), but PC-relative encoding must be target minus PC, i.e. val.wrapping_sub(offset). gimli's own reference implementation (which the comment claims this was 'copied from') computes val.wrapping_sub(offset). The operands are reversed here, producing a negated PC-relative displacement. This path is currently only avoided because type_info is emitted with DW_EH_PE_udata4 rather than a pcrel constant, but any future use of a pcrel constant eh_pointer would emit a wrong relocation-free offset.","fix":"Replace offset.wrapping_sub(val) with val.wrapping_sub(offset) to match the DWARF pcrel definition (target address minus current PC), as gimli does.","locations":[{"ref":"src/debuginfo/emit.rs:195-199","code":"  195 |                     gimli::DW_EH_PE_pcrel => {\n  196 |                         // FIXME better handling of sign\n  197 |                         let offset = self.len() as u64;\n  198 |                         offset.wrapping_sub(val)\n  199 |                     }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"clone_repo runs `git clone` and explicitly ignores its exit status (`.spawn().unwrap().wait().unwrap()` discards the resulting ExitStatus). The comment claims this is safe because the repo may already be checked out, but the directory is unconditionally removed with remove_dir_all just before, so the repo never pre-exists. If the clone fails (e.g. no network, bad URL), the function silently proceeds to the next git commands which then fail with confusing errors (or the subsequent `git checkout`/`submodule update` runs against an empty/partial dir). A genuine clone failure should be reported clearly.","fix":"Check the ExitStatus of the clone like the other git commands (use spawn_and_wait), or at least error out with a clear message if the clone failed and the directory is missing/empty. Remove the now-inaccurate comment.","locations":[{"ref":"build_system/prepare.rs:182-183","code":"  182 |     // Ignore exit code as the repo may already have been checked out\n  183 |     git_command(None, \"clone\").arg(repo).arg(download_dir).spawn().unwrap().wait().unwrap();"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`emit_module` uses `file.metadata().unwrap().len()` and `tmp_file.file_name().unwrap()` when recording the artifact size for self-profiling. The object file write just succeeded, but `metadata()` is a fresh syscall that can still fail (e.g. file removed by a concurrent process), turning a profiling-only operation into a hard panic during codegen. Other I/O in the same function is handled gracefully with `Result`.","fix":"Fall back gracefully (skip recording or use the already-known written byte count) instead of unwrapping the metadata call; the byte length is already obtainable without an extra fallible syscall.","locations":[{"ref":"src/driver/aot.rs:207-213","code":"  207 |     if prof.enabled() {\n  208 |         prof.artifact_size(\n  209 |             \"object_file\",\n  210 |             tmp_file.file_name().unwrap().to_string_lossy(),\n  211 |             file.metadata().unwrap().len(),\n  212 |         );\n  213 |     }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"benchmark checks for hyperfine via `Command::new(\"hyperfine\").output()` and treats any Err as 'not installed'. But .output() also runs hyperfine with no args, which prints usage to stderr and returns a non-success status (not an Err). The is_err() check only catches the binary being absent; it does not validate it actually works. Running hyperfine with no args is also wasteful/odd as a presence probe.","fix":"Probe with `hyperfine --version` (and optionally check status), or use a which-style lookup, to detect presence without executing a real benchmark invocation.","locations":[{"ref":"build_system/bench.rs:21-25","code":"   21 |     if std::process::Command::new(\"hyperfine\").output().is_err() {\n   22 |         eprintln!(\"Hyperfine not installed\");\n   23 |         eprintln!(\"Hint: Try `cargo install hyperfine` to install hyperfine\");\n   24 |         std::process::exit(1);\n   25 |     }"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"bench.rs opens GITHUB_STEP_SUMMARY with append+open and `.unwrap()`, and later reads the hyperfine markdown output and writes to it with `.unwrap()` at several points. If the markdown export file was not produced (e.g. hyperfine partially failed but exited 0, or path issue), `std::fs::read(bench_compile_markdown).unwrap()` panics. These IO unwraps in the GHA-summary path turn a benign reporting step into a hard failure.","fix":"Handle missing/unreadable markdown gracefully (log a warning and skip the summary append) instead of unwrapping.","locations":[{"ref":"build_system/bench.rs:32-36","code":"   32 |     let mut gha_step_summary = if let Ok(file) = std::env::var(\"GITHUB_STEP_SUMMARY\") {\n   33 |         Some(std::fs::OpenOptions::new().append(true).open(file).unwrap())\n   34 |     } else {\n   35 |         None\n   36 |     };"},{"ref":"build_system/bench.rs:105-133","code":"  105 |     if let Some(gha_step_summary) = gha_step_summary.as_mut() {\n  106 |         gha_step_summary.write_all(b\"## Compile ebobby/simple-raytracer\\n\\n\").unwrap();\n  107 |         gha_step_summary.write_all(&std::fs::read(bench_compile_markdown).unwrap()).unwrap();\n  108 |         gha_step_summary.write_all(b\"\\n\").unwrap();\n  109 |     }\n  110 | \n  111 |     eprintln!(\"[BENCH RUN] ebobby/simple-raytracer\");\n  112 | \n  113 |     let bench_run_markdown = dirs.build_dir.join(\"bench_run.md\");\n  114 | \n  115 |     let mut bench_run = hyperfine_command(\n  116 |         0,\n  117 |         bench_runs,\n  118 |         None,\n  119 |         &[\n  120 |             (\"build/raytracer_cg_llvm\", &raytracer_cg_llvm),\n  121 |             (\"build/raytracer_cg_clif\", &raytracer_cg_clif),\n  122 |             (\"build/raytracer_cg_clif_opt\", &raytracer_cg_clif_opt),\n  123 |         ],\n  124 |         &bench_run_markdown,\n  125 |     );\n  126 |     bench_run.current_dir(&dirs.build_dir);\n  127 |     spawn_and_wait(bench_run);\n  128 | \n  129 |     if let Some(gha_step_summary) = gha_step_summary.as_mut() {\n  130 |         gha_step_summary.write_all(b\"## Run ebobby/simple-raytracer\\n\\n\").unwrap();\n  131 |         gha_step_summary.write_all(&std::fs::read(bench_run_markdown).unwrap()).unwrap();\n  132 |         gha_step_summary.write_all(b\"\\n\").unwrap();\n  133 |     }"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"benchmark builds shell command strings by interpolating paths (manifest_path, target_dir, raytracer_cg_* output paths) directly into `sh -c`-style strings passed to hyperfine. These paths derive from dirs.build_dir which is `current_dir().join(out_dir)`. If any path contains spaces or shell metacharacters, the generated shell commands (`cargo build --target-dir {target_dir} && ... ln {target_dir}/debug/main {raytracer_cg_llvm}`) break or misbehave. Build/out dirs with spaces are realistic on developer machines.","fix":"Quote interpolated paths in the shell command strings, or avoid shelling out for the link/clean steps and perform them in Rust before/after invoking hyperfine on simple commands.","locations":[{"ref":"build_system/bench.rs:64-87","code":"   64 |     let clean_cmd = format!(\n   65 |         \"RUSTC=rustc cargo clean --manifest-path {manifest_path} --target-dir {target_dir}\",\n   66 |         manifest_path = manifest_path.display(),\n   67 |         target_dir = target_dir.display(),\n   68 |     );\n   69 |     let llvm_build_cmd = format!(\n   70 |         \"RUSTC=rustc cargo build --manifest-path {manifest_path} --target-dir {target_dir} && (rm {raytracer_cg_llvm} || true) && ln {target_dir}/debug/main {raytracer_cg_llvm}\",\n   71 |         manifest_path = manifest_path.display(),\n   72 |         target_dir = target_dir.display(),\n   73 |     );\n   74 |     let clif_build_cmd = format!(\n   75 |         \"RUSTC={rustc_clif} CARGO_ENCODED_RUSTFLAGS=\\\"{rustflags}\\\" {cargo_clif} build --manifest-path {manifest_path} --target-dir {target_dir} && (rm {raytracer_cg_clif} || true) && ln {target_dir}/debug/main {raytracer_cg_clif}\",\n   76 |         cargo_clif = cargo_clif.display(),\n   77 |         rustc_clif = rustc_clif.display(),\n   78 |         manifest_path = manifest_path.display(),\n   79 |         target_dir = target_dir.display(),\n   80 |     );\n   81 |     let clif_build_opt_cmd = format!(\n   82 |         \"RUSTC={rustc_clif} CARGO_ENCODED_RUSTFLAGS=\\\"{rustflags}\\\" CARGO_BUILD_INCREMENTAL=true {cargo_clif} build --manifest-path {manifest_path} --target-dir {target_dir} --release && (rm {raytracer_cg_clif_opt} || true) && ln {target_dir}/release/main {raytracer_cg_clif_opt}\",\n   83 |         cargo_clif = cargo_clif.display(),\n   84 |         rustc_clif = rustc_clif.display(),\n   85 |         manifest_path = manifest_path.display(),\n   86 |         target_dir = target_dir.display(),\n   87 |     );"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"config::load_config_file does `fs::read_to_string(\"config.txt\").unwrap()` using a relative path with no context. If config.txt is missing (e.g. invoked from the wrong directory) it panics with a bare \"No such file\" error and no hint that the build system must be run from the project root or that config.txt is required.","fix":"Report a clear error mentioning config.txt and the expected working directory, and/or resolve the path relative to the known source_dir instead of cwd.","locations":[{"ref":"build_system/config.rs:4","code":"    4 |     fs::read_to_string(\"config.txt\")"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"try_hard_link falls back to fs::copy when hard_link fails, but only `.unwrap()`s the copy. If both hard link and copy fail (e.g. destination dir missing, permissions), the error message from copy is a bare OS error with no src/dst context, unlike copy_dir_recursively which includes paths. The #[track_caller] helps but the message is still uninformative about which files were involved.","fix":"Use unwrap_or_else with a panic message including src and dst paths, matching copy_dir_recursively's style.","locations":[{"ref":"build_system/utils.rs:161-168","code":"  161 | #[track_caller]\n  162 | pub(crate) fn try_hard_link(src: impl AsRef<Path>, dst: impl AsRef<Path>) {\n  163 |     let src = src.as_ref();\n  164 |     let dst = dst.as_ref();\n  165 |     if fs::hard_link(src, dst).is_err() {\n  166 |         fs::copy(src, dst).unwrap(); // Fallback to copying if hardlinking failed\n  167 |     }\n  168 | }"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"When `module.declare_function` returns an unexpected `ModuleError` variant, the code does `Err::<_, _>(err).unwrap()`, which panics with a terse `called Result::unwrap() on an Err` message instead of emitting a proper diagnostic like the other arms (which use `tcx.dcx().fatal(...)`). This produces an opaque ICE for users.","fix":"Replace `Err::<_, _>(err).unwrap()` with `tcx.dcx().fatal(format!(\"failed to declare `{name}`: {err:?}\"))` to surface a readable error.","locations":[{"ref":"src/abi/mod.rs:117","code":"  117 |         Err(err) => Err::<_, _>(err).unwrap(),"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"When writing the generated assembly to the child `as`/rustc process stdin, `write_all(...).unwrap()` will panic if the child exits early (e.g. the assembler rejects input and closes its stdin), turning a recoverable broken-pipe into a hard panic of the codegen process instead of a proper diagnostic.","fix":"Handle the write/IO error by joining the child and reporting its exit status and stderr as an Err, rather than unwrapping the BrokenPipe.","locations":[{"ref":"src/global_asm.rs:211","code":"  211 |         child.stdin.take().unwrap().write_all(global_asm.as_bytes()).unwrap();"},{"ref":"src/global_asm.rs:241-261","code":"  241 |         stdin\n  242 |             .write_all(\n  243 |                 br####\"\n  244 |                 #![feature(decl_macro, no_core, rustc_attrs)]\n  245 |                 #![allow(internal_features)]\n  246 |                 #![no_core]\n  247 |                 #[rustc_builtin_macro]\n  248 |                 #[rustc_macro_transparency = \"semiopaque\"]\n  249 |                 macro global_asm() { /* compiler built-in */ }\n  250 |                 global_asm!(r###\"\n  251 |                 \"####,\n  252 |             )\n  253 |             .unwrap();\n  254 |         stdin.write_all(global_asm.as_bytes()).unwrap();\n  255 |         stdin\n  256 |             .write_all(\n  257 |                 br####\"\n  258 |                 \"###);\n  259 |                 \"####,\n  260 |             )\n  261 |             .unwrap();"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"On assembly failure compile_global_asm returns an error string that embeds the entire (in the non-GNU path, brace-escaped `{{`/`}}` and macro-wrapped) `global_asm` source rather than the assembler's actual diagnostic. The escaped text differs from what was fed to the assembler and is misleading; for large global_asm it also produces an enormous error message. The GNU path returns t
