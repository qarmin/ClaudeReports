as \"128 + signal\" exit statuses, the `& 0xff` of e.g. 130 is 130 which is > typical upper bound so it falls through to the checked_sub(128) branch correctly; but for an input like 256 (0x100), `256 & 0xff == 0`, which is <= upper bound and returns signal 0, masking the intended out-of-range error. GNU `kill -l 256` reports an invalid signal rather than printing signal 0.","fix":"Only apply the low-8-bits masking for values that are not already representable as a direct/offset signal, or reject values where `signal_value > 0xff` unless they decode via the 128+ offset rule, to match GNU error reporting.","locations":[{"ref":"src/uu/kill/src/kill.rs:163-174","code":"  163 | fn normalize_list_signal_value(signal_value: usize) -> Option<usize> {\n  164 |     // `kill -l` also accepts wait-status-like values and decodes the signal\n  165 |     // number from the low 8 bits.\n  166 |     let lower_8_bits = signal_value & 0xff;\n  167 |     if lower_8_bits <= signal_number_upper_bound() {\n  168 |         return Some(lower_8_bits);\n  169 |     }\n  170 | \n  171 |     signal_value\n  172 |         .checked_sub(OFFSET)\n  173 |         .filter(|value| *value <= signal_number_upper_bound())\n  174 | }","lines":12}]},{"id":"LOGIC_72","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `kill()`, when `sig == 0` and the named-signal fast path is taken, the match arms are guarded by `_ if sig == 0 =>` placed before the `Some(s)` arm; but `named` is computed as `None` whenever `sig == 0` (the `(sig != 0).then(...)` guard), so the `Some(s)` arms for sig 0 are dead. This is harmless but the `_ if sig == 0` guards inside `match named` are redundant/confusing: the `None` arm already handles sig 0 via raw_kill, yet the guard short-circuits to the rustix test_* path. The dual encoding (guard + None) makes the control flow hard to verify.","fix":"Handle `sig == 0` explicitly before the per-pid match (single `test_*` dispatch) rather than threading `_ if sig == 0` guards through every arm of `match named`, removing the now-impossible `Some(s)` combination with sig 0.","locations":[{"ref":"src/uu/kill/src/kill.rs:263-296","code":"  263 |     let named = (sig != 0)\n  264 |         .then(|| i32::try_from(sig).ok().and_then(Signal::from_named_raw))\n  265 |         .flatten();\n  266 |     for &pid in pids {\n  267 |         let result = match pid.cmp(&0) {\n  268 |             Ordering::Equal => match named {\n  269 |                 _ if sig == 0 => rustix_to_io(test_kill_current_process_group()),\n  270 |                 Some(s) => rustix_to_io(kill_current_process_group(s)),\n  271 |                 None => raw_kill(0, sig),\n  272 |             },\n  273 |             Ordering::Greater => {\n  274 |                 let pid = Pid::from_raw(pid).expect(\"pid > 0 guaranteed by Ordering::Greater\");\n  275 |                 match named {\n  276 |                     _ if sig == 0 => rustix_to_io(test_kill_process(pid)),\n  277 |                     Some(s) => rustix_to_io(kill_process(pid, s)),\n  278 |                     None => raw_kill(pid.as_raw_nonzero().get(), sig),\n  279 |                 }\n  280 |             }\n  281 |             Ordering::Less => {\n  282 |                 let Some(abs_pid) = pid.checked_neg() else {\n  283 |                     show!(USimpleError::new(\n  284 |                         1,\n  285 |                         translate!(\"kill-error-sending-signal\", \"pid\" => pid),\n  286 |                     ));\n  287 |                     continue;\n  288 |                 };\n  289 |                 let pid =\n  290 |                     Pid::from_raw(abs_pid).expect(\"abs_pid > 0 since pid < 0 and pid != i32::MIN\");\n  291 |                 match named {\n  292 |                     _ if sig == 0 => rustix_to_io(test_kill_process_group(pid)),\n  293 |                     Some(s) => rustix_to_io(kill_process_group(pid, s)),\n  294 |                     None => raw_kill(-pid.as_raw_nonzero().get(), sig),\n  295 |                 }\n  296 |             }","lines":34}]},{"id":"LOGIC_73","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"mknod() returns errno=0 from a successful mknod even though it can still fail later in the SELinux/SMACK context block (it returns 1 in that case, which is correct). However, when use_umask is false and mknod fails, the umask is restored and an error printed, but the function still proceeds to evaluate the SELinux/SMACK blocks against a file that was never created. set_selinux_security_context on a nonexistent path will fail and then `std::fs::remove_file` is attempted on a path that does not exist, and the function returns 1 - masking the original mknod error code (-1) and changing the reported failure. The post-mknod context blocks should be skipped when mknod itself failed.","fix":"Guard the SELinux/SMACK blocks with `if mknod_err.is_none()` (or early-return after the mknod failure) so context handling only runs when the node was actually created.","locations":[{"ref":"src/uu/mknod/src/mknod.rs:75-134","code":"   75 | fn mknod(file_name: &str, config: Config) -> i32 {\n   76 |     // set umask to 0 and store previous umask\n   77 |     let have_prev_umask = if config.use_umask {\n   78 |         None\n   79 |     } else {\n   80 |         Some(nix_umask(Mode::empty()))\n   81 |     };\n   82 | \n   83 |     let mknod_err = nix_mknod(\n   84 |         file_name,\n   85 |         config.file_type.as_sflag(),\n   86 |         config.mode,\n   87 |         config.dev as _,\n   88 |     )\n   89 |     .err();\n   90 |     let errno = if mknod_err.is_some() { -1 } else { 0 };\n   91 | \n   92 |     // set umask back to original value\n   93 |     if let Some(prev_umask) = have_prev_umask {\n   94 |         nix_umask(prev_umask);\n   95 |     }\n   96 | \n   97 |     if let Some(err) = mknod_err {\n   98 |         let _ = writeln!(\n   99 |             io::stderr(),\n  100 |             \"{}: {}\",\n  101 |             uucore::execution_phrase(),\n  102 |             io::Error::from(err)\n  103 |         );\n  104 |     }\n  105 | \n  106 |     // Apply SELinux context if requested\n  107 |     #[cfg(all(feature = \"selinux\", any(target_os = \"android\", target_os = \"linux\")))]\n  108 |     if config.set_security_context {\n  109 |         if let Err(e) = uucore::selinux::set_selinux_security_context(\n  110 |             std::path::Path::new(file_name),\n  111 |             config.context.as_ref(),\n  112 |         ) {\n  113 |             // if it fails, delete the file\n  114 |             let _ = std::fs::remove_file(file_name);\n  115 |             let _ = writeln!(io::stderr(), \"mknod: {e}\");\n  116 |             return 1;\n  117 |         }\n  118 |     }\n  119 | \n  120 |     // Apply SMACK context if requested\n  121 |     #[cfg(all(feature = \"smack\", target_os = \"linux\"))]\n  122 |     if config.set_security_context {\n  123 |         if let Err(e) =\n  124 |             uucore::smack::set_smack_label_and_cleanup(file_name, config.context.as_ref(), |p| {\n  125 |                 std::fs::remove_file(p)\n  126 |             })\n  127 |         {\n  128 |             let _ = writeln!(io::stderr(), \"mknod: {e}\");\n  129 |             return 1;\n  130 |         }\n  131 |     }\n  132 | \n  133 |     errno\n  134 | }","lines":60}]},{"id":"LOGIC_74","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"mknod parses MAJOR and MINOR with clap value_parser!(u32) and then casts to makedev(maj as _, min as _). On systems where device numbers are encoded with more than 32 bits, or simply for major/minor values that GNU mknod accepts (it parses as uintmax and validates against dev_t), large but valid arguments are rejected at parse time with a generic clap error rather than mknod's own range diagnostic. This is a behavioral divergence from GNU mknod for large device numbers.","fix":"Parse major/minor as the widest integer type and validate the resulting dev_t range explicitly, matching GNU mknod error messages.","locations":[{"ref":"src/uu/mknod/src/mknod.rs:240-251","code":"  240 |         .arg(\n  241 |             Arg::new(options::MAJOR)\n  242 |                 .value_name(options::MAJOR)\n  243 |                 .help(translate!(\"mknod-help-major\"))\n  244 |                 .value_parser(value_parser!(u32)),\n  245 |         )\n  246 |         .arg(\n  247 |             Arg::new(options::MINOR)\n  248 |                 .value_name(options::MINOR)\n  249 |                 .help(translate!(\"mknod-help-minor\"))\n  250 |                 .value_parser(value_parser!(u32)),\n  251 |         )","lines":12},{"ref":"src/uu/mknod/src/mknod.rs:168-187","code":"  168 |     let dev = match (\n  169 |         file_type,\n  170 |         matches.get_one::<u32>(options::MAJOR),\n  171 |         matches.get_one::<u32>(options::MINOR),\n  172 |     ) {\n  173 |         (FileType::Fifo, None, None) => 0,\n  174 |         (FileType::Fifo, _, _) => {\n  175 |             return Err(UUsageError::new(\n  176 |                 1,\n  177 |                 translate!(\"mknod-error-fifo-no-major-minor\"),\n  178 |             ));\n  179 |         }\n  180 |         (_, Some(&major), Some(&minor)) => makedev(major as _, minor as _) as u64,\n  181 |         _ => {\n  182 |             return Err(UUsageError::new(\n  183 |                 1,\n  184 |                 translate!(\"mknod-error-special-require-major-minor\"),\n  185 |             ));\n  186 |         }\n  187 |     };","lines":20}]},{"id":"LOGIC_75","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In mktemp, when a `--suffix` is given but the template has too few Xs, the error message is supposed to show the template \"without the suffix\" (per the comment), but the code does `template_str.chars().take(template_str.len()).collect()` which takes the entire string and is a no-op. The suffix comes from a separate `--suffix` option and is never embedded in `template_str`, so this branch produces exactly the same string as the `None` branch. The whole `match options.suffix` is dead/misleading logic.","fix":"Remove the special-casing and just use `template_str.clone()` for the TooFewXs error, or, if a suffix really should be stripped from the displayed value, strip the actual suffix bytes.","locations":[{"ref":"src/uu/mktemp/src/mktemp.rs:247-256","code":"  247 |         let Some((i, j)) = find_last_contiguous_block_of_xs(&template_str) else {\n  248 |             let s = match options.suffix {\n  249 |                 // If a suffix is specified, the error message includes the template without the suffix.\n  250 |                 Some(_) => template_str\n  251 |                     .chars()\n  252 |                     .take(template_str.len())\n  253 |                     .collect::<String>(),\n  254 |                 None => template_str.clone(),\n  255 |             };\n  256 |             return Err(MkTempError::TooFewXs(s));","lines":10}]},{"id":"LOGIC_76","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The status-bar percentage uses `lower_mark = (upper_mark + content_rows).min(lines.len() - 1)` and\nindexes `cumulative_line_sizes[lower_mark]`. When `--squeeze` collapses blank lines, the number of\ninput lines consumed to fill the screen is larger than `content_rows` (the squeezed lines are\ncounted in `lines_squeezed`, not added here), so the reported percentage lags behind the actual\nread position. The computation ignores `lines_squeezed`.","fix":"Account for squeezed lines when computing `lower_mark`, e.g. add `self.lines_squeezed` to the\nwindow span before clamping, mirroring how `page_up` already incorporates `lines_squeezed`.","locations":[{"ref":"src/uu/more/src/more.rs:851-883","code":"  851 |     fn draw_status_bar(&mut self, wrong_key: Option<char>) -> std::io::Result<()> {\n  852 |         // Calculate the index of the last visible line\n  853 |         let lower_mark =\n  854 |             (self.upper_mark + self.content_rows).min(self.lines.len().saturating_sub(1));\n  855 |         // Determine progress information to display\n  856 |         // - Show next file name when at EOF and there is a next file\n  857 |         // - Otherwise show percentage of the file read (if available)\n  858 |         let progress_info = if self.eof_reached {\n  859 |             self.next_file\n  860 |                 .as_ref()\n  861 |                 .map(|next_file| format!(\" (Next file: {next_file})\"))\n  862 |                 .unwrap_or_default()\n  863 |         } else if let Some(file_size) = self.input.len() {\n  864 |             // For files, show percentage or END\n  865 |             let position = self\n  866 |                 .cumulative_line_sizes\n  867 |                 .get(lower_mark)\n  868 |                 .copied()\n  869 |                 .unwrap_or_default();\n  870 |             if file_size == 0 {\n  871 |                 \" (END)\".to_string()\n  872 |             } else {\n  873 |                 let percentage = (position as f64 / file_size as f64 * 100.0).round() as u16;\n  874 |                 if percentage >= 100 {\n  875 |                     \" (END)\".to_string()\n  876 |                 } else {\n  877 |                     format!(\" ({percentage}%)\")\n  878 |                 }\n  879 |             }\n  880 |         } else {\n  881 |             // For stdin, don't show percentage\n  882 |             String::new()\n  883 |         };","lines":33}]},{"id":"LOGIC_77","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `draw_status_bar`, when EOF is reached but there is no next file, `progress_info` becomes the\nempty string (the `next_file` map/`unwrap_or_default`), so the status bar shows neither a percentage\nnor \"(END)\". GNU more shows \"(END)\" at end-of-file. The END marker is only produced in the\nnon-EOF percentage branch (when `percentage >= 100`), which is not taken once `eof_reached` is set.","fix":"When `eof_reached` and there is no next file, fall back to displaying the \"(END)\" marker instead of\nan empty progress string.","locations":[{"ref":"src/uu/more/src/more.rs:858-883","code":"  858 |         let progress_info = if self.eof_reached {\n  859 |             self.next_file\n  860 |                 .as_ref()\n  861 |                 .map(|next_file| format!(\" (Next file: {next_file})\"))\n  862 |                 .unwrap_or_default()\n  863 |         } else if let Some(file_size) = self.input.len() {\n  864 |             // For files, show percentage or END\n  865 |             let position = self\n  866 |                 .cumulative_line_sizes\n  867 |                 .get(lower_mark)\n  868 |                 .copied()\n  869 |                 .unwrap_or_default();\n  870 |             if file_size == 0 {\n  871 |                 \" (END)\".to_string()\n  872 |             } else {\n  873 |                 let percentage = (position as f64 / file_size as f64 * 100.0).round() as u16;\n  874 |                 if percentage >= 100 {\n  875 |                     \" (END)\".to_string()\n  876 |                 } else {\n  877 |                     format!(\" ({percentage}%)\")\n  878 |                 }\n  879 |             }\n  880 |         } else {\n  881 |             // For stdin, don't show percentage\n  882 |             String::new()\n  883 |         };","lines":26}]},{"id":"LOGIC_78","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"assert_not_same_file calls absolute(source)? / absolute(target)? up to four times each (lines 470-499) and canonicalize repeatedly, doing redundant filesystem work and re-deriving the same absolute paths. Besides the performance cost, the repeated `absolute(target)?` in the `_ =>` fallback (line 499) can diverge from the value computed at line 493 if the cwd-relative resolution is non-deterministic under concurrent cwd changes (it is not, but the duplication is fragile).","fix":"Compute absolute(source) and absolute(target) once into locals and reuse them.","locations":[{"ref":"src/uu/mv/src/mv.rs:463-501","code":"  463 | fn assert_not_same_file(\n  464 |     source: &Path,\n  465 |     target: &Path,\n  466 |     target_is_dir: bool,\n  467 |     opts: &Options,\n  468 | ) -> UResult<()> {\n  469 |     // we'll compare canonicalized_source and canonicalized_target for same file detection\n  470 |     let canonicalized_source = match canonicalize(\n  471 |         absolute(source)?,\n  472 |         MissingHandling::Normal,\n  473 |         ResolveMode::Logical,\n  474 |     ) {\n  475 |         Ok(source) if source.exists() => source,\n  476 |         _ => absolute(source)?, // file or symlink target doesn't exist but its absolute path is still used for comparison\n  477 |     };\n  478 | \n  479 |     // special case if the target exists, is a directory, and the `-T` flag wasn't used\n  480 |     let target_is_dir = target_is_dir && !opts.no_target_dir;\n  481 |     let canonicalized_target = if target_is_dir {\n  482 |         // `mv source_file target_dir` => target_dir/source_file\n  483 |         // canonicalize the path that exists (target directory) and join the source file name\n  484 |         canonicalize(\n  485 |             absolute(target)?,\n  486 |             MissingHandling::Normal,\n  487 |             ResolveMode::Logical,\n  488 |         )?\n  489 |         .join(source.file_name().unwrap_or_default())\n  490 |     } else {\n  491 |         // `mv source target_dir/target` => target_dir/target\n  492 |         // we canonicalize target_dir and join /target\n  493 |         match absolute(target)?.parent() {\n  494 |             Some(parent) if parent.to_str() != Some(\"\") => {\n  495 |                 canonicalize(parent, MissingHandling::Normal, ResolveMode::Logical)?\n  496 |                     .join(target.file_name().unwrap_or_default())\n  497 |             }\n  498 |             // path.parent() returns Some(\"\") or None if there's no parent\n  499 |             _ => absolute(target)?, // absolute paths should always have a parent, but we'll fall back just in case\n  500 |         }\n  501 |     };","lines":39}]},{"id":"LOGIC_79","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In rename_with_fallback the decision to fall back to copy+delete is `matches!(err.raw_os_error(), Some(EXDEV)) || (from.is_file() && can_delete_file(from))`. On non-windows can_delete_file always returns false, so the second clause is dead on unix; but on windows the clause `from.is_file() && can_delete_file(from)` triggers a copy+delete fallback for ANY rename error on a file that is openable with DELETE access, including transient errors that should propagate. This can convert a recoverable rename failure into a destructive copy+delete.","fix":"On Windows, restrict the fallback to the specific access-denied/sharing-violation case described in the comment rather than any error when the file is delete-openable.","locations":[{"ref":"src/uu/mv/src/mv.rs:826-834","code":"  826 |         // We will only copy if:\n  827 |         // 1. Files are on different devices (EXDEV error)\n  828 |         // 2. On Windows, if the target file exists and source file is opened by another process\n  829 |         //    (MoveFileExW fails with \"Access Denied\" even if the source file has FILE_SHARE_DELETE permission)\n  830 |         let should_fallback =\n  831 |             matches!(err.raw_os_error(), Some(EXDEV)) || (from.is_file() && can_delete_file(from));\n  832 |         if !should_fallback {\n  833 |             return Err(err);\n  834 |         }","lines":9}]},{"id":"LOGIC_80","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"rename_fifo_fallback (cross-device fifo move) creates a new fifo at dest with a hardcoded mode 0o666 (subject to umask) and then removes the source, discarding the source fifo permissions and ownership entirely. Unlike copy_file_with_hardlinks_helper which calls preserve_ownership after mkfifo, this standalone fallback does not preserve ownership or mode, silently changing the moved fifo metadata.","fix":"After mkfifo, restore source mode and ownership (mirror copy_file_with_hardlinks_helper) before removing the source.","locations":[{"ref":"src/uu/mv/src/mv.rs:882-890","code":"  882 | #[cfg(unix)]\n  883 | fn rename_fifo_fallback(from: &Path, to: &Path) -> io::Result<()> {\n  884 |     if to.try_exists()? {\n  885 |         fs::remove_file(to)?;\n  886 |     }\n  887 |     // rustix::fs::mkfifoat is linux only\n  888 |     nix::unistd::mkfifo(to, nix::sys::stat::Mode::from_bits_truncate(0o666))?;\n  889 |     fs::remove_file(from)\n  890 | }","lines":9}]},{"id":"LOGIC_81","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `transform_to` the large-precision guard is applied inconsistently. The `None`\n(no-suffix) branch guards `precision <= u16::MAX.into()` before formatting, but the\n`Some(s)` (with-suffix) branch at line 636 formats `{i2:.precision$}` with no upper bound on\n`precision`. A user-supplied `--format=%.<huge>f` together with a `--to` unit therefore\nattempts an unbounded allocation/format. The guard semantics also appear based on the\n65535 inline-format-string limit, which does not apply to the runtime `.precision$` form,\nso the two branches diverge for no clear reason.","fix":"Apply the same precision bound (or a single shared sane cap) to both the suffix and\nno-suffix formatting branches, and document why the cap exists.","locations":[{"ref":"src/uu/numfmt/src/format.rs:626-654","code":"  626 |     Ok(match s {\n  627 |         None if opts.to == Unit::None => localize(format!(\n  628 |             \"{:.precision$}\",\n  629 | ctly\" but it does not make the numeric interpretation correct for the platform long double layout.","fix":"Decode according to the actual platform long double format (or document that od only supports the binary128 interpretation), and fix the comment to not overstate correctness.","locations":[{"ref":"src/uu/od/src/input_decoder.rs:169-223","code":"  169 |     /// Returns a long double from the internal buffer at position `start`.\n  170 |     /// We read 16 bytes as u128 (respecting endianness) and convert to f64.\n  171 |     /// This ensures that endianness swapping works correctly even if we lose precision.\n  172 |     pub fn read_long_double(&self, start: usize) -> f64 {\n  173 |         let bits = self.byte_order.read_u128(&self.data[start..start + 16]);\n  174 |         u128_to_f64(bits)\n  175 |     }\n  176 | }\n  177 | \n  178 | fn u128_to_f64(u: u128) -> f64 {\n  179 |     let sign = (u >> 127) as u64;\n  180 |     let exp = ((u >> 112) & 0x7FFF) as u64;\n  181 |     let mant = u & ((1 << 112) - 1);\n  182 | \n  183 |     if exp == 0x7FFF {\n  184 |         // Infinity or NaN\n  185 |         if mant == 0 {\n  186 |             if sign == 0 {\n  187 |                 f64::INFINITY\n  188 |             } else {\n  189 |                 f64::NEG_INFINITY\n  190 |             }\n  191 |         } else {\n  192 |             f64::NAN\n  193 |         }\n  194 |     } else if exp == 0 {\n  195 |         // Subnormal or zero\n  196 |         if mant == 0 {\n  197 |             if sign == 0 { 0.0 } else { -0.0 }\n  198 |         } else {\n  199 |             // Subnormal f128 is too small for f64, flush to zero\n  200 |             if sign == 0 { 0.0 } else { -0.0 }\n  201 |         }\n  202 |     } else {\n  203 |         // Normal\n  204 |         let new_exp = exp as i64 - 16383 + 1023;\n  205 |         if new_exp >= 2047 {\n  206 |             // Overflow to infinity\n  207 |             if sign == 0 {\n  208 |                 f64::INFINITY\n  209 |             } else {\n  210 |                 f64::NEG_INFINITY\n  211 |             }\n  212 |         } else if new_exp <= 0 {\n  213 |             // Underflow to zero\n  214 |             if sign == 0 { 0.0 } else { -0.0 }\n  215 |         } else {\n  216 |             // Normal f64\n  217 |             // Mantissa: take top 52 bits of 112-bit mantissa\n  218 |             let new_mant = (mant >> (112 - 52)) as u64;\n  219 |             let bits = (sign << 63) | ((new_exp as u64) << 52) | new_mant;\n  220 |             f64::from_bits(bits)\n  221 |         }\n  222 |     }\n  223 | }","lines":55},{"ref":"src/uu/od/src/prn_float.rs:212-238","code":"  212 | fn format_long_double(f: f64) -> String {\n  213 |     // On most platforms, long double is either 64-bit (same as f64) or 80-bit/128-bit\n  214 |     // Since we're reading it as f64, we format it with extended precision\n  215 |     // Width is 39 (40 - 1 for leading space), precision is 21 significant digits\n  216 |     let width: usize = 39;\n  217 |     let precision: usize = 21;\n  218 | \n  219 |     // Handle special cases\n  220 |     if f.is_nan() {\n  221 |         return format!(\"{:>width$}\", \"NaN\");\n  222 |     }\n  223 |     if f.is_infinite() {\n  224 |         if f.is_sign_negative() {\n  225 |             return format!(\"{:>width$}\", \"-inf\");\n  226 |         }\n  227 |         return format!(\"{:>width$}\", \"inf\");\n  228 |     }\n  229 |     if f == 0.0 {\n  230 |         if f.is_sign_negative() {\n  231 |             return format!(\"{:>width$}\", \"-0\");\n  232 |         }\n  233 |         return format!(\"{:>width$}\", \"0\");\n  234 |     }\n  235 | \n  236 |     // For normal numbers, format with appropriate precision using exponential notation\n  237 |     format!(\"{f:>width$.precision$e}\")\n  238 | }","lines":27}]},{"id":"LOGIC_83","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In strings mode, `current_offset` is initialized to `skip_bytes` unconditionally, even when the skip phase hit EOF early and fewer than `skip_bytes` bytes were actually consumed. In that case no strings will be emitted anyway (read returns 0), so impact is limited, but if the underlying stream position and the assumed offset diverge the printed offsets would be wrong. The offset bookkeeping assumes the full skip always succeeds.","fix":"Track the number of bytes actually skipped and base `current_offset` on that, or bail out (see the skip-past-EOF finding) when the requested skip cannot be satisfied.","locations":[{"ref":"src/uu/od/src/od.rs:589-613","code":"  589 |     let mut skipped = 0u64;\n  590 |     while skipped < skip_bytes {\n  591 |         let to_skip = cmp::min(8192, skip_bytes - skipped);\n  592 |         let mut skip_buf = vec![0u8; to_skip as usize];\n  593 |         match mf.read(&mut skip_buf) {\n  594 |             Ok(0) => break, // EOF reached\n  595 |             Ok(n) => skipped += n as u64,\n  596 |             Err(_) => break,\n  597 |         }\n  598 |     }\n  599 | \n  600 |     // Helper function to format and print a string\n  601 |     let mut print_string = |offset: u64, string: &[u8]| -> std::io::Result<()> {\n  602 |         let string_content = String::from_utf8_lossy(string);\n  603 |         match radix {\n  604 |             Radix::NoPrefix => writeln!(writer, \"{string_content}\"),\n  605 |             Radix::Decimal => writeln!(writer, \"{offset:07} {string_content}\"),\n  606 |             Radix::Hexadecimal => writeln!(writer, \"{offset:07x} {string_content}\"),\n  607 |             Radix::Octal => writeln!(writer, \"{offset:07o} {string_content}\"),\n  608 |         }\n  609 |     };\n  610 | \n  611 |     let mut current_string = Vec::new();\n  612 |     let mut string_start_offset = 0u64;\n  613 |     let mut current_offset = skip_bytes;","lines":25}]},{"id":"LOGIC_84","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"option_display_name scans args for a token starting with the short form (e.g. \"-j\") to decide whether to echo the short or long flag in error messages. The check `!arg.starts_with(\"--\") && arg.starts_with(&short_form)` will match a clustered/unrelated argument that merely begins with the same letter combination (e.g. for short \"-w\" it would match \"-width\"-like tokens, or a bundled \"-vw16\" matches \"-w\"? no, but \"-j...\" for skip would match any arg starting \"-j\"). More notably, for an option whose value is given separately it matches the flag token, which is fine, but for bundled short flags the heuristic can misattribute which flag triggered the error. This only affects the cosmetic flag name shown in error messages.","fix":"Match the short flag more precisely (e.g. ensure the matched character is an actual cluster member), or derive the display name from the clap matched argument id rather than re-scanning raw args.","locations":[{"ref":"src/uu/od/src/od.rs:785-804","code":"  785 | fn option_display_name(args: &[String], option_name: &str, short: Option<char>) -> String {\n  786 |     let long_form = format!(\"--{option_name}\");\n  787 |     let long_form_with_eq = format!(\"{long_form}=\");\n  788 |     if let Some(short_char) = short {\n  789 |         let short_form = format!(\"-{short_char}\");\n  790 |         for arg in args.iter().skip(1) {\n  791 |             if !arg.starts_with(\"--\") && arg.starts_with(&short_form) {\n  792 |                 return short_form;\n  793 |             }\n  794 |         }\n  795 |         for arg in args.iter().skip(1) {\n  796 |             if arg == &long_form || arg.starts_with(&long_form_with_eq) {\n  797 |                 return long_form;\n  798 |             }\n  799 |         }\n  800 |         short_form\n  801 |     } else {\n  802 |         long_form\n  803 |     }\n  804 | }","lines":20}]},{"id":"LOGIC_85","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In parse_inputs, when an offset-like operand fails to parse, the code reconstructs the expected ERANGE message string via std::io::Error::from_raw_os_error(libc::ERANGE) and compares the localized/stripped error string to decide whether to propagate an overflow error or fall through to treating it as a filename. This string-equality dispatch is fragile: parse_offset_operand already knows whether the failure was an overflow vs a parse failure, but that information is discarded and then reconstructed by comparing human-readable (potentially localized) strings. A locale change or message-format change in either place silently breaks the overflow-detection branch.","fix":"Have parse_offset_operand return a typed error (e.g. an enum distinguishing Overflow from ParseFailure) instead of a pre-formatted String, and branch on the variant in parse_inputs rather than comparing reconstructed message strings.","locations":[{"ref":"src/uu/od/src/parse_inputs.rs:86-97","code":"   86 |                 Err(e) => {\n   87 |                     // If it's an overflow error, propagate it\n   88 |                     // Otherwise, treat it as a filename\n   89 |                     let err = std::io::Error::from_raw_os_error(libc::ERANGE);\n   90 |                     let msg = err.to_string();\n   91 |                     let expected_msg = msg.split(\" (os error\").next().unwrap_or(&msg).to_string();\n   92 | \n   93 |                     if e == expected_msg {\n   94 |                         return Err(format!(\"{}: {e}\", input_strings[input_strings.len() - 1]));\n   95 |                     }\n   96 |                 }\n   97 |             }","lines":12},{"ref":"src/uu/od/src/parse_inputs.rs:206-233","code":"  206 |     match u64::from_str_radix(&s[start..len], radix) {\n  207 |         Ok(i) => {\n  208 |             // Check for overflow during multiplication\n  209 |             if let Some(result) = i.checked_mul(multiply) {\n  210 |                 Ok(result)\n  211 |             } else {\n  212 |                 let err = std::io::Error::from_raw_os_error(libc::ERANGE);\n  213 |                 let msg = err.to_string();\n  214 |                 // Strip \"(os error N)\" if present to match Perl's $!\n  215 |                 let msg = msg.split(\" (os error\").next().unwrap_or(&msg).to_string();\n  216 |                 Err(msg)\n  217 |             }\n  218 |         }\n  219 |         Err(e) => {\n  220 |             // Distinguish between overflow and parse failure\n  221 |             // from_str_radix returns IntErrorKind::PosOverflow for overflow\n  222 |             use std::num::IntErrorKind;\n  223 |             match e.kind() {\n  224 |                 IntErrorKind::PosOverflow => {\n  225 |                     let err = std::io::Error::from_raw_os_error(libc::ERANGE);\n  226 |                     let msg = err.to_string();\n  227 |                     let msg = msg.split(\" (os error\").next().unwrap_or(&msg).to_string();\n  228 |                     Err(msg)\n  229 |                 }\n  230 |                 _ => Err(translate!(\"od-error-parse-failed\")),\n  231 |             }\n  232 |         }\n  233 |     }","lines":28}]},{"id":"LOGIC_86","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"format_ascii_dump indexes C_CHARS[*c as usize] directly for bytes in 0x20..=0x7e. This is safe because C_CHARS has 128 entries and the range is within bounds, but it is inconsistent with format_item_c which uses C_CHARS.get(...) defensively. The direct index relies on the exact magic range matching the table size; a future edit to the range bound (e.g. raising to 0x7f or 0x80) would introduce an out-of-bounds panic that the .get() pattern would have avoided.","fix":"Use C_CHARS.get(*c as usize) with a fallback, mirroring format_item_c, to make the bounds safety independent of the literal range check.","locations":[{"ref":"src/uu/od/src/prn_char.rs:64-78","code":"   64 | pub fn format_ascii_dump(bytes:  total_len > POSIX_PATH_MAX {\n  147 |         writeln!(\n  148 |             std::io::stderr(),\n  149 |             \"{}\",\n  150 |             translate!(\"pathchk-error-posix-path-length-exceeded\", \"limit\" => POSIX_PATH_MAX, \"length\" => total_len, \"path\" => joined_path)\n  151 |         );\n  152 |         return false;\n  153 |     } else if total_len == 0 {\n  154 |         writeln!(\n  155 |             std::io::stderr(),\n  156 |             \"{}\",\n  157 |             translate!(\"pathchk-error-empty-file-name\")\n  158 |         );\n  159 |         return false;\n  160 |     }\n  161 |     // components: character portability and length\n  162 |     for p in path {\n  163 |         let component_len = p.len();\n  164 |         if component_len > POSIX_NAME_MAX {\n  165 |             writeln!(\n  166 |                 std::io::stderr(),\n  167 |                 \"{}\",\n  168 |                 translate!(\"pathchk-error-posix-name-length-exceeded\", \"limit\" => POSIX_NAME_MAX, \"length\" => component_len, \"component\" => p.quote())\n  169 |             );\n  170 |             return false;\n  171 |         }\n  172 |         if !check_portable_chars(p) {\n  173 |             return false;\n  174 |         }\n  175 |     }\n  176 |     // permission checks\n  177 |     check_searchable(&joined_path)\n  178 | }","lines":37}]},{"id":"LOGIC_89","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In pinky long format `write_long`, when `Passwd::locate` succeeds the project and plan files are copied to the writer via `io::copy` with no length/trust limits and without checking that the file is regular. A user could point their home directory `.project`/`.plan` at a FIFO or huge/streaming file (e.g. a symlink to /dev/zero), causing pinky to block or stream unbounded output. GNU pinky reads these but the lack of any file-type guard is a mild robustness issue.","fix":"Open with O_NONBLOCK / check file type, or bound guments[pos] = \"-e\\t8\".to_string();","lines":2}]},{"id":"LOGIC_91","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"pr line-width/display-length accounting only special-cases tab characters (`tab_count * 7`) and otherwise uses `complete_line.len()` (byte length). For multi-byte UTF-8 content this overestimates display width, and `complete_line.chars().take(min_width)` then truncates by char count while `min_width` was derived from a byte-ish length, so column truncation/padding is inconsistent for non-ASCII input. The code even carries a TODO about non-UTF-8 bytes.","fix":"Compute display width using a width-aware measure (e.g. unicode-width) consistently for both the padding decision and the truncation, rather than mixing byte length and char counts.","locations":[{"ref":"src/uu/pr/src/pr.rs:1341-1349","code":" 1341 |     // TODO: support non-UTF-8 bytes (currently replaced with U+FFFD)\n 1342 |     let content = String::from_utf8_lossy(&file_line.line_content);\n 1343 |     let mut complete_line = format!(\"{formatted_line_number}{content}\");\n 1344 | \n 1345 |     let offset_spaces = &options.offset_spaces;\n 1346 | \n 1347 |     let tab_count = complete_line.chars().filter(|i| i == &TAB).count();\n 1348 | \n 1349 |     let display_length = complete_line.len() + (tab_count * 7);","lines":9},{"ref":"src/uu/pr/src/pr.rs:1368-1368","code":" 1368 |                 complete_line.chars().take(min_width).collect()","lines":1}]},{"id":"LOGIC_92","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`canonicalize_relative` only forces the \"not a directory\" error (`abs.read_dir()?`) when\n`can_mode == MissingHandling::Existing` (realpath `-e`). For the default mode and `-m`, a\n`--relative-to`/`--relative-base` argument that resolves to a regular file is silently accepted\nas a directory base, whereas GNU realpath rejects a non-directory `--relative-base`/`--relative-to`.\nThis can yield surprising relative paths instead of a clear diagnostic.","fix":"Verify `abs.is_dir()` (and raise the not-a-directory error) regardless of `can_mode`, matching\nGNU behavior, rather than gating it behind `MissingHandling::Existing`.","locations":[{"ref":"src/uu/realpath/src/realpath.rs:264-274","code":"  264 | fn canonicalize_relative(\n  265 |     r: &Path,\n  266 |     can_mode: MissingHandling,\n  267 |     resolve: ResolveMode,\n  268 | ) -> std::io::Result<PathBuf> {\n  269 |     let abs = canonicalize(r, can_mode, resolve)?;\n  270 |     if can_mode == MissingHandling::Existing && !abs.is_dir() {\n  271 |         abs.read_dir()?; // raise not a directory error\n  272 |     }\n  273 |     Ok(abs)\n  274 | }","lines":11}]},{"id":"LOGIC_93","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"count_files (used only to size the --progress bar) double-walks the tree: count_files / count_files_in_directory does a full recursive read_dir of every directory before the actual removal also reads every directory. Besides the extra I/O, the count and the real traversal can disagree (TOCTOU between counting and removing), so the progress bar can finish early or never reach 100%. Not a correctness bug for the removal itself, but the pre-walk roughly doubles syscalls for large trees when -g is set.","fix":"Make the progress bar use an indeterminate spinner, or increment a running total during the single real traversal instead of pre-counting.","locations":[{"ref":"src/uu/rm/src/rm.rs:471-488","code":"  471 | fn count_files(paths: &[&OsStr], recursive: bool) -> u64 {\n  472 |     let mut total = 0;\n  473 |     for p in paths {\n  474 |         let path = Path::new(p);\n  475 |         if let Ok(md) = fs::symlink_metadata(path) {\n  476 |             if md.is_dir() && !is_symlink_dir(&md) {\n  477 |                 if recursive {\n  478 |                     total += count_files_in_directory(path);\n  479 |                 }\n  480 |             } else {\n  481 |                 total += 1;\n  482 |             }\n  483 |         }\n  484 |         // If we can't access the file, skip it for counting\n  485 |         // This matches the behavior where -f suppresses errors for missing files\n  486 |     }\n  487 |     total\n  488 | }","lines":18},{"ref":"src/uu/rm/src/rm.rs:491-504","code":"  491 | fn count_files_in_directory(p: &Path) -> u64 {\n  492 |     let entries_count = fs::read_dir(p).map_or(0, |entries| {\n  493 |         entries\n  494 |             .flatten()\n  495 |             .map(|entry| match entry.file_type() {\n  496 |                 Ok(ft) if ft.is_dir() => count_files_in_directory(&entry.path()),\n  497 |                 Ok(_) => 1,\n  498 |                 Err(_) => 0,\n  499 |             })\n  500 |             .sum()\n  501 |     });\n  502 | \n  503 |     1 + entries_count\n  504 | }","lines":14}]},{"id":"LOGIC_94","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"shred `create_test_compatible_sequence` seeks the random-source file to position 0 and reads up to 1024 bytes to detect the test pattern, advancing the shared file offset. Because the per-pass `RandomFile` writer is created later by `try_clone()` (which shares the OS file offset on Unix), the actual random data consumed for passes starts at offset 1024 rather than 0. This makes the consumed random bytes depend on this detection read, which is surprising and can desynchronize output from what a fresh read at offset 0 would produce.","fix":"Re-seek the random source back to 0 (or to the intended starting offset) after the detection read, or read into a buffer without disturbing the shared offset used by the pass writers.","locations":[{"ref":"src/uu/shred/src/shred.rs:509-547","code":"  509 |     if let Some(file_cell) = random_source {\n  510 |         // Check if this is the 'U'-filled random source used by test compatibility\n  511 |         file_cell\n  512 |             .borrow_mut()\n  513 |             .seek(SeekFrom::Start(0))\n  514 |             .map_err_context(|| translate!(\"shred-failed-to-seek-file\"))?;\n  515 |         let mut buffer = [0u8; 1024];\n  516 |         if let Ok(bytes_read) = file_cell.borrow_mut().read(&mut buffer) {\n  517 |             if bytes_read > 0 && buffer[..bytes_read].iter().all(|&b| b == 0x55) {\n  518 |                 // This is the test scenario - replicate exact algorithm\n  519 |                 let test_patterns = vec![\n  520 |                     0xFFF, 0x924, 0x888, 0xDB6, 0x777, 0x492, 0xBBB, 0x555, 0xAAA, 0x6DB, 0x249,\n  521 |                     0x999, 0x111, 0x000, 0xB6D, 0xEEE, 0x333,\n  522 |                 ];\n  523 | \n  524 |                 if num_passes >= 3 {\n  525 |                     let mut sequence = Vec::new();\n  526 |                     let n_random = (num_passes / 10).max(3);\n  527 |                     let n_pattern = num_passes - n_random;\n  528 | \n  529 |                     // Standard algorithm: first random, patterns with middle random(s), final random\n  530 |                     sequence.push(PassType::Random);\n  531 | \n  532 |                     let middle_randoms = n_random - 2;\n  533 |                     let mut pattern_sequence = generate_patterns_with_middle_randoms(\n  534 |                         &test_patterns,\n  535 |                         n_pattern,\n  536 |                         middle_randoms,\n  537 |                         num_passes,\n  538 |                     );\n  539 |                     sequence.append(&mut pattern_sequence);\n  540 | \n  541 |                     sequence.push(PassType::Random);\n  542 | \n  543 |                     return Ok(sequence);\n  544 |                 }\n  545 |             }\n  546 |         }\n  547 |     }","lines":39},{"ref":"src/uu/shred/src/shred.rs:195-203","code":"  195 |                 Some(file_cell) => {\n  196 |                     // We need to create a new file handle that shares the position\n  197 |                     // For now, we'll duplicate the file descriptor to maintain position\n  198 |                     let new_file = file_cell.borrow_mut().try_clone()?;\n  199 |                     Ok(Self::RandomFile {\n  200 |                         rng_file: new_file,\n  201 |                         buffer: [0; BLOCK_SIZE],\n  202 |                     })\n  203 |                 }","lines":9}]},{"id":"LOGIC_95","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In shuf, `head_count` is computed by taking the `min()` of all `-n` values (GNU bug-compatible per the comment) defaulting to `u64::MAX`. With `Mode::InputRange` and `--repeat`, `head_count` defaults to `u64::MAX` and `shuf_exec` loops `for _ in 0..opts.head_count`, i.e. up to 2^64 iterations producing effectively infinite output. This matches GNU `shuf -r -i...` (infinite), so it is intended, but combined with the `usize::try_from(amount).unwrap_or(usize::MAX)` saturations elsewhere, the u64/usize boundary on 32-bit targets silently caps output at usize::MAX rather than erroring.","fix":"No action required for GNU compatibility; document the 32-bit saturation behavior.","locations":[{"ref":"src/uu/shuf/src/shuf.rs:110-115","code":"  110 |         head_count: matches\n  111 |             .get_many::<u64>(options::HEAD_COUNT)\n  112 |             .unwrap_or_default()\n  113 |             .copied()\n  114 |             .min()\n  115 |             .unwrap_or(u64::MAX),","lines":6},{"ref":"src/uu/shuf/src/shuf.rs:412-416","code":"  412 |         for _ in 0..opts.head_count {\n  413 |             let r = input.choose(rng)?;\n  414 |             r.write_all_to(output).map_err(handle_write_error)?;\n  415 |             output.write_all(&sep).map_err(handle_write_error)?;\n  416 |         }","lines":5}]},{"id":"LOGIC_96","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In shuf `parse_range`, the accepted condition is `begin <= end || begin == end + 1`. The `begin == end + 1` clause is intentional (an empty range like 5-4 is allowed per GNU), but `begin == end + 1` will overflow/panic check is avoided only because `end + 1` cannot overflow for typical inputs; however if `to` parses to `u64::MAX`, `end + 1` overflows and panics in debug builds (wraps in release). E.g. `shuf -i 0-18446744073709551615` is fine, but `shuf -i 18446744073709551615-18446744073709551614` triggers `end + 1` where end = u64::MAX-1 (ok); the genuine overflow is `shuf -i X-18446744073709551615` with begin>end requiring `end+1` = MAX+1.","fix":"Use `begin == end.wrapping_add(1)` or restructure as `begin <= end || begin.checked_sub(1) == Some(end)` to avoid the potential overflow panic in debug builds.","locations":[{"ref":"src/uu/shuf/src/shuf.rs:435-439","code":"  435 |         if begin <= end || begin == end + 1 {\n  436 |             Ok(begin..=end)\n  437 |         } else {\n  438 |             Err(translate!(\"shuf-error-start-exceeds-end\"))\n  439 |         }","lines":5}]},{"id":"LOGIC_97","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The automatic buffer-size heuristic test `desired_buffer_caps_at_max_for_large_inputs`\nand the `desired_file_buffer_bytes` \"small input\" branch multiply by 12\n(`total_bytes.saturating_mul(12)`) which can overflow into the `clamp` argument\nordering: `clamp(total_bytes, max)`. If `total_bytes > max` the `.clamp(low=total_bytes, high=max)`\nhas `low > high`, which panics in `u128::clamp`. This branch is only reached\nwhen `total_bytes <= max`, so it is currently safe, but the invariant is\nimplicit and fragile - a future change to the `total_bytes <= max` guard would\nturn this into a panic.","fix":"Use `total_bytes.saturating_mul(12).min(max).max(total_bytes)` or assert the\n`total_bytes <= max` precondition explicitly to make the no-panic invariant\nrobust against refactoring.","locations":[{"ref":"src/uu/sort/src/buffer_hint.rs:78-80","code":"   78 |     if total_bytes <= max {\n   79 |         return total_bytes.saturating_mul(12).clamp(total_bytes, max);\n   80 |     }","lines":3}]},{"id":"LOGIC_98","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`get_range`'s `resolve_index` applies the character offset by counting raw\nbytes (`.nth(position.char - 1)`) and similarly skips blanks byte-by-byte. For\nmulti-byte UTF-8 input a character key offset (e.g. `-k1.3`) lands on a byte\nboundary, not a character boundary, so `-k` char positions disagree with GNU\nsort in non-ASCII data and can split a slice mid-codepoint (the resulting\nsub-slice may not be valid UTF-8, though comparisons operate on bytes so it does\nnot panic). This is consistent within the byte-oriented design but is a real\nbehavioral divergence worth documenting or fixing.","fix":"If GNU char-offset semantics are desired, iterate by UTF-8 char boundaries when\nthe input is valid UTF-8; otherwise document explicitly that char offsets are\nbyte offsets.","locations":[{"ref":"src/uu/sort/src/sort.rs:1272-1289","code":" 1272 |                 if position.ignore_blanks {\n 1273 |                     idx += line[idx..]\n 1274 |                         .iter()\n 1275 |                         .enumerate()\n 1276 |                         .find(|(_, c)| !c.is_ascii_whitespace())\n 1277 |                         .map_or(line[idx..].len(), |(idx, _)| idx);\n 1278 |                 }\n 1279 |                 // apply the character index\n 1280 |                 idx += line[idx..]\n 1281 |                     .iter()\n 1282 |                     .enumerate()\n 1283 |                     .nth(position.char - 1)\n 1284 |                     .map_or(line[idx..].len(), |(idx, _)| idx);\n 1285 |                 if idx >= line.len() {\n 1286 |                     Resolution::TooHigh\n 1287 |                 } else {\n 1288 |                     Resolution::StartOfChar(idx)\n 1289 |                 }","lines":18}]},{"id":"LOGIC_99","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`general_numeric_compare` does `a.partial_cmp(b).unwrap()`. This relies on the\nderived `PartialOrd` for `GeneralBigDecimalParseResult` never returning `None`.\nToday that holds because every variant (including `BigDecimal`) is totally\nordered, but the `unwrap` encodes an invariant that is not enforced by the type\n(the enum derives `PartialOrd`, not `Ord`). A future variant carrying an\n`f64`/NaN-like payload would turn this into a panic in the hot comparison path.","fix":"Either derive `Ord` for `GeneralBigDecimalParseResult` and use `cmp`, or fall\nback to a defined ordering (e.g. `Ordering::Equal`) instead of `unwrap()` so an\naccidental partial order cannot panic the sorter.","locations":[{"ref":"src/uu/sort/src/sort.rs:2958-2963","code":" 2958 | fn general_numeric_compare(\n 2959 |     a: &GeneralBigDecimalParseResult,\n 2960 |     b: &GeneralBigDecimalParseResult,\n 2961 | ) -> Ordering {\n 2962 |     a.partial_cmp(b).unwrap()\n 2963 | }","lines":6}]},{"id":"LOGIC_100","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The auto-width suffix-length pre-calculation uses floating-point `((start + chunks) as f64).log(radix).ceil() as usize` to compute the required suffix length. For large chunk counts near f64 precision limits, log/ceil rounding can yield a length that is off by one (either too small, allowing a later overflow on FilenameIterator, or too large). GNU computes this with integer arithmetic. Realistic chunk counts are small so impact is low, but the float path is imprecise by construction.","fix":"Compute the required width with an integer loop (repeatedly divide (start+chunks-1) by radix) instead of f64 log/ceil.","locations":[{"ref":"src/uu/split/src/filenames.rs:205-221","code":"  205 |             let required_length = ((start as u64 + chunks) as f64)\n  206 |                 .log(stype.radix() as f64)\n  207 |                 .ceil() as usize;\n  208 | \n  209 |             if (start as u64) < chunks && !(is_length_cmd_opt && length > 0) {\n  210 |                 // with auto-width ON the auto-widening is OFF\n  211 |                 auto_widening = false;\n  212 | \n  213 |                 // do not reduce suffix length with auto-width\n  214 |                 if length < required_length {\n  215 |                     length = required_length;\n  216 |                 }\n  217 |             }\n  218 | \n  219 |             if length < required_length {\n  220 |                 return Err(SuffixError::TooSmall(required_length));\n  221 |             }","lines":17}]},{"id":"LOGIC_101","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"SettingsError::requires_usage returns true for Suffix(ContainsSeparator) so a usage message is shown, but the other SuffixError variants (NotParsable, TooSmall) and StrategyError variants other than MultipleWays do not. GNU split prints a usage hint for invalid suffix length too. This is a behavioral nit: some argument-validation errors get a usage message and similar ones do not, which is inconsistent.","fix":"Audit which SettingsError variants should trigger a usage message to match GNU behavior and make the set consistent.","locations":[{"ref":"src/uu/split/src/split.rs:462-471","code":"  462 | impl SettingsError {\n  463 |     /// Whether the error demands a usage message.\n  464 |     fn requires_usage(&self) -> bool {\n  465 |         matches!(\n  466 |             self,\n  467 |             Self::Strategy(StrategyError::MultipleWays)\n  468 |                 | Self::Suffix(SuffixError::ContainsSeparator(_))\n  469 |         )\n  470 |     }\n  471 | }","lines":10}]},{"id":"LOGIC_102","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In n_chunks_by_line the separator is re-appended to a line only when `(num_bytes_written + line.len()) < num_bytes`. `reader.split(sep)` strips the separator from every record, so for a genuine middle line whose end coincides exactly with the running total reaching num_bytes (possible when chunk accounting and the final line boundary align) the condition can be false and the separator is dropped even though the original input had one there. The intended check is \"is this the final record and did the input lack a trailing separator\", but it is approximated purely by byte position, which is fragile. GNU split keys this off whether the split iterator actually consumed a delimiter.","fix":"Use a lines iterator that reports whether the delimiter was present (like the LinesWithSep helper already in this file) instead of inferring it from byte offsets.","locations":[{"ref":"src/uu/split/src/split.rs:1294-1302","code":" 1294 |     for line_result in reader.split(sep) {\n 1295 |         let mut line = line_result?;\n 1296 |         // add separator back in at the end of the line,\n 1297 |         // since `reader.split(sep)` removes it,\n 1298 |         // except if the last line did not end with separator character\n 1299 |         if (num_bytes_written + line.len() as u64) < num_bytes {\n 1300 |             line.push(sep);\n 1301 |         }\n 1302 |         let bytes = line.as_slice();","lines":9}]},{"id":"LOGIC_103","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The non-`--all` branch of `print_control_chars` prints control chars that differ from their sane\ndefaults but never prints the `min`/`time` (VMIN/VTIME) pair, whereas the `--all` branch does\n(lines 883-886). GNU stty prints `min N; time N;` in the default output too when they differ from\nsane values, so the default listing can omit information GNU shows.","fix":"In the non-all branch, also compare VMIN/VTIME against their sane defaults and emit the min/time line\nwhen they differ, consistent with the --all branch and GNU.","locations":[{"ref":"src/uu/stty/src/stty.rs:858-874","code":"  858 |     if !opts.all {\n  859 |         // Print only control chars that differ from sane defaults\n  860 |         let mut printer = WrappedPrinter::new(term_size);\n  861 |         for (text, cc_index) in CONTROL_CHARS {\n  862 |             let current_val = termios.control_chars[*cc_index as usize];\n  863 |             let sane_val = get_sane_control_char(*cc_index);\n  864 | \n  865 |             if current_val != sane_val {\n  866 |                 printer.print(&format!(\n  867 |                     \"{text} = {};\",\n  868 |                     control_char_to_string(current_val)?\n  869 |                 ));\n  870 |             }\n  871 |         }\n  872 |         printer.flush();\n  873 |         return Ok(());\n  874 |     }","lines":17},{"ref":"src/uu/stty/src/stty.rs:883-886","code":"  883 |     printer.print(&translate!(\"stty-output-min-time\",\n  884 |         \"min\" => termios.control_chars[S::VMIN as usize],\n  885 |         \"time\" => termios.control_chars[S::VTIME as usize]\n  886 |     ));","lines":4}]},{"id":"LOGIC_104","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`string_to_control_char` recognizes an octal prefix via `strip_prefix(\"0\")` and a hex prefix via\n`strip_prefix(\"0x\")`, but only lowercase `0x` is handled. An input like `0X41` falls through to the\noctal branch (`strip_prefix(\"0\")` -> `\"X41\"`), which fails to parse as octal and is then treated as a\nliteral multi-char string error rather than a hex value. GNU stty accepts upper-case `0X`.","fix":"Match the hex prefix case-insensitively, e.g. test both `0x` and `0X` (or lowercase the input prefix)\nbefore falling back to the octal branch.","locations":[{"ref":"src/uu/stty/src/stty.rs:1083-1094","code":" 1083 |     // try to parse integer (hex, octal, or decimal)\n 1084 |     let ascii_num = if let Some(hex) = s.strip_prefix(\"0x\") {\n 1085 |         u32::from_str_radix(hex, 16).ok()\n 1086 |     } else if let Some(octal) = s.strip_prefix(\"0\") {\n 1087 |         if octal.is_empty() {\n 1088 |             Some(0)\n 1089 |         } else {\n 1090 |             u32::from_str_radix(octal, 8).ok()\n 1091 |         }\n 1092 |     } else {\n 1093 |         s.parse::<u32>().ok()\n 1094 |     };","lines":12}]},{"id":"LOGIC_105","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"tac translate_regex_flavor silently DROPS any non-ASCII byte that appears inside a [...] character class (the first match arm `inside_brackets && !b.is_ascii()` does `i += 1; continue;` without emitting anything). A user separator regex like `-r` with a class containing a multibyte UTF-8 char will have those bytes removed from the class, changing the matched set without any error. The doc comment claims it leaves \"only ASCII bytes inside []\" which is accurate but the silent removal can produce a surprising/incorrect pattern.","fix":"Either error out on non-ASCII bytes inside a bracket class, or translate them to an explicit byte escape inside the class, rather than silently discarding them.","locations":[{"ref":"src/uu/tac/src/tac.rs:247-250","code":"  247 |             _ if inside_brackets && !b.is_ascii() => {\n  248 |                 i += 1;\n  249 |                 continue;\n  250 |             }","lines":4}]},{"id":"LOGIC_106","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`Settings::from` sets `verbose` twice. Line 227 initializes `verbose` from the `--verbose` flag in\nthe struct literal, then lines 282-285 overwrite it with\n`(verbose_flag || inputs.len() > 1) && !quiet_flag`. The first assignment at 227 is entirely dead -\nits value is unconditionally replaced. Harmless but confusing; a reader may believe the 227 value\nmatters.","fix":"Drop `verbose` from the struct literal at line 227 (it is set unconditionally afterwards), or fold the final computation into the literal.","locations":[{"ref":"src/uu/tail/src/args.rs:227","code":"  227 |             verbose: matches.get_flag(options::verbosity::VERBOSE),","lines":1},{"ref":"src/uu/tail/src/args.rs:282-285","code":"  282 |         settings.verbose = (matches.get_flag(options::verbosity::VERBOSE)\n  283 |             || settings.inputs.len() > 1)\n  284 |             && !matches.get_flag(options::verbosity::QUIET);\n  285 | ","lines":4}]},{"id":"LOGIC_107","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`tail_file` always calls `file.metadata()?` (line 169) and computes `blksize_limit` and seekability,\nbut for an explicitly `--presume-input-pipe` run the seekable/bounded path is skipped anyway\n(line 173 short-circuits on `!settings.presume_input_pipe`). More importantly, `is_seekable` (and\nhead's `is_seekable`) performs a real `seek(End(0))` then restores position as a *side effect* just\nto test seekability; for a growing followed file this races with appends - the End(0) probe and the\nrestore bracket a window in which `bounded_tail` then re-derives size, so the \"last N\" computation\ncan be based on a size that changed between probe and read.","fix":"Probe seekability without moving the cursor where possible (e.g. attempt `stream_position`/`fstat` and rely on metadata().is_file()), and read the size once and reuse it through bounded_tail rather than re-seeking End(0) multiple times.","locations":[{"ref":"src/uu/tail/src/paths.rs:149-157","code":"  149 | impl FileExtTail for File {\n  150 |     /// Test if File is seekable.\n  151 |     /// Set the current position offset to `current_offset`.\n  152 |     fn is_seekable(&mut self, current_offset: u64) -> bool {\n  153 |         self.stream_position().is_ok()\n  154 |             && self.seek(SeekFrom::End(0)).is_ok()\n  155 |             && self.seek(SeekFrom::Start(current_offset)).is_ok()\n  156 |     }\n  157 | }","lines":9},{"ref":"src/uu/tail/src/tail.rs:169-182","code":"  169 |                 let st = file.metadata()?;\n  170 |                 let blksize_limit = uucore::fs::sane_blksize::sane_blksize_from_metadata(&st);\n  171 |                 header_printer.print_input(input);\n  172 |                 let mut reader;\n  173 |                 if !settings.presume_input_pipe\n  174 |                     && file.is_seekable(if input.is_stdin() { offset } else { 0 })\n  175 |                     && (!st.is_file() || st.len() > blksize_limit)\n  176 |                 {\n  177 |                     bounded_tail(&mut file, settings)?;\n  178 |                     reader = BufReader::new(file);\n  179 |                 } else {\n  180 |                     reader = BufReader::new(file);\n  181 |                     unbounded_tail(&mut reader, settings)?;\n  182 |                 }","lines":14}]},{"id":"LOGIC_108","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`MetadataExtTail::got_truncated` returns `other.len() < self.len() && other.modified()? != self.modified()?`.\nThis requires the modified time to differ to treat a shrink as truncation. On filesystems with\ncoarse mtime granularity (1s), a truncate-and-rewrite within the same second leaves an unchanged\nmtime, so a genuinely truncated file whose new length is smaller is NOT detected as truncated, and\ntail will not reset the reader to offset 0 - silently skipping data or printing stale offsets. GNU\ntail keys truncation detection on size decrease alone.","fix":"Detect truncation on size decrease alone (`Ok(other.len() < self.len())`), matching GNU, or additionally compare inode/size rather than relying on mtime resolution.","locations":[{"ref":"src/uu/tail/src/paths.rs:181-184","code":"  181 |     #[cfg(not(target_os = \"wasi\"))]\n  182 |     fn got_truncated(&self, other: &Metadata) -> UResult<bool> {\n  183 |         Ok(other.len() < self.len() && other.modified()? != self.modified()?)\n  184 |     }","lines":4}]},{"id":"LOGIC_109","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`PathExtTail::is_stdin` compares the path against the *localized* stdin header\n(`translate!(\"tail-stdin-header\")`, paths.rs:220). The stdin header is a translated, user-facing\nstring (\"standard input\" in en-US). Using a localized display string as a path-identity check is\nfragile: under a non-English locale the comparison silently stops matching, so a path that should be\ntreated as stdin no longer is. Path identity should not depend on the UI language.","fix":"Compare only against the stable sentinels (DASH, DEV_STDIN, FD0) and drop the localized-header comparison, or track stdin via the InputKind enum rather than by string-matching a translated label.","locations":[{"ref":"src/uu/tail/src/paths.rs:217-221","code":"  217 |     fn is_stdin(&self) -> bool {\n  218 |         self.eq(Self::new(text::DASH))\n  219 |             || self.eq(Self::new(text::DEV_STDIN))\n  220 |             || self.eq(Self::new(&translate!(\"tail-stdin-header\")))\n  221 |     }","lines":5}]},{"id":"LOGIC_110","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In timeout, when an external signal is received during the wait (e.g. SIGINT) and no `kill_after` is set, the code returns `ExitStatus::SignalSent(received_sig)` (128 + sig). GNU timeout, when it forwards a signal and the child then dies, generally reports 128+sig only after re-confirming; more importantly the `is_external_signal` path ignores `preserve_status`, so even with --preserve-status the child's own exit status is discarded in favor of 128+sig. This diverges from GNU --preserve-status handling for the interrupted case.","fix":"When `preserve_status` is set, prefer the awaited child status over the synthesized `SignalSent(received_sig)` value in the external-signal branch, matching the natural-timeout preserve-status branch.","locations":[{"ref":"src/uu/timeout/src/timeout.rs:440-486","code":"  440 |         Ok(None) => {\n  441 |             let received_sig = RECEIVED_SIGNAL.load(atomic::Ordering::Relaxed);\n  442 |             let is_external_signal = received_sig > 0 && received_sig != libc::SIGALRM;\n  443 |             let signal_to_send = if is_external_signal {\n  444 |                 received_sig as usize\n  445 |             } else {\n  446 |                 signal\n  447 |             };\n  448 | \n  449 |             report_if_verbose(signal_to_send, &cmd[0], verbose);\n  450 |             send_signal(process, signal_to_send, foreground);\n  451 | \n  452 |             if let Some(kill_after) = kill_after {\n  453 |                 return match wait_or_kill_process(\n  454 |                     process,\n  455 |                     &cmd[0],\n  456 |                     kill_after,\n  457 |                     preserve_status,\n  458 |                     foreground,\n  459 |                     verbose,\n  460 |                 ) {\n  461 |                     Ok(status) => Err(status.into()),\n  462 |                     Err(e) => Err(USimpleError::new(\n  463 |                         ExitStatus::TimeoutFailed.into(),\n  464 |                         e.to_string(),\n  465 |                     )),\n  466 |                 };\n  467 |             }\n  468 | \n  469 |             let status = process.wait()?;\n  470 |             if is_external_signal {\n  471 |                 Err(ExitStatus::SignalSent(received_sig as usize).into())\n  472 |             } else if SIGNALED.load(atomic::Ordering::Relaxed) {\n  473 |                 Err(ExitStatus::CommandTimedOut.into())\n  474 |             } else if preserve_status {\n  475 |                 Err(status\n  476 |                     .code()\n  477 |                     .or_else(|| {\n  478 |                         status\n  479 |                             .signal()\n  480 |                             .map(|s| ExitStatus::SignalSent(s as usize).into())\n  481 |                     })\n  482 |                     .unwrap_or(ExitStatus::CommandTimedOut.into())\n  483 |                     .into())\n  484 |             } else {\n  485 |                 Err(ExitStatus::CommandTimedOut.into())\n  486 |             }","lines":47}]},{"id":"LOGIC_111","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"is_first_filename_timestamp / parse_timestamp two-digit-year handling: get_year subtracts b prime0 from raw bytes assuming ASCII digits, and is_timestamp gates len==10 on (69..=99).contains(get_year), but the 8-digit case (MMDDhhmm with current year) is accepted unconditionally for the obsolete POSIX path. A purely numeric 8-char filename (e.g. \"12345678\") is silently consumed as a timestamp operand instead of a file when _POSIX2_VERSION=199209, even if it was meant as a filename. This matches obscure POSIX behavior but get_year is only valid for digit strings; callers must guarantee all_digits first (they do via is_timestamp), so it is correct but fragile.","fix":"Add a debug_assert!(all_digits(s)) in get_year to document the precondition and prevent future misuse from underflowing the b prime0 subtraction.","locations":[{"ref":"src/uu/touch/src/touch.rs:155-182","code":"  155 | fn get_year(s: &str) -> u8 {\n  156 |     let bytes = s.as_bytes();\n  157 |     let n = bytes.len();\n  158 |     let y1 = bytes[n - 2] - b'0';\n  159 |     let y2 = bytes[n - 1] - b'0';\n  160 |     10 * y1 + y2\n  161 | }\n  162 | \n  163 | /// Whether the first filename should be interpreted as a timestamp.\n  164 | fn is_first_filename_timestamp(\n  165 |     reference: Option<&OsString>,\n  166 |     date: Option<&str>,\n  167 |     timestamp: Option<&str>,\n  168 |     files: &[&OsString],\n  169 | ) -> bool {\n  170 |     timestamp.is_none()\n  171 |         && reference.is_none()\n  172 |         && date.is_none()\n  173 |         && files.len() >= 2\n  174 |         // env check is last as the slowest op\n  175 |         && matches!(std::env::var(\"_POSIX2_VERSION\").as_deref(), Ok(\"199209\"))\n  176 |         && files[0].to_str().is_some_and(is_timestamp)\n  177 | }\n  178 | \n  179 | // Check if string is a valid POSIX timestamp (8 digits or 10 digits with valid year range)\n  180 | fn is_timestamp(s: &str) -> bool {\n  181 |     all_digits(s) && (s.len() == 8 || (s.len() == 10 && (69..=99).contains(&get_year(s))))\n  182 | }","lines":28}]},{"id":"LOGIC_112","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"pathbuf_from_stdout on Windows: GetFinalPathNameByHandleW returns the required buffer length INCLUDING the null terminator when the buffer is too small, but here a non-zero, non-error return is treated directly as the character count to slice (file_path_buffer[0..buffer_size]). If the returned value equals or exceeds MAX_PATH (buffer too small), buffer_size could index past the written region or include uninitialized zeros, producing a wrong/truncated path rather than an error.","fix":"Check whether ret >= file_path_buffer.len() (buffer too small) and treat that as an error or re-call with a larger buffer, before slicing.","locations":[{"ref":"src/uu/touch/src/touch.rs:855-887","code":"  855 |         let ret = unsafe {\n  856 |             GetFinalPathNameByHandleW(\n  857 |                 handle,\n  858 |                 file_path_buffer.as_mut_ptr(),\n  859 |                 file_path_buffer.len() as u32,\n  860 |                 FILE_NAME_OPENED,\n  861 |             )\n  862 |         };\n  863 | \n  864 |         let buffer_size = match ret {\n  865 |             ERROR_PATH_NOT_FOUND | ERROR_NOT_ENOUGH_MEMORY | ERROR_INVALID_PARAMETER => {\n  866 |                 return Err(TouchError::WindowsStdoutPathError(\n  867 |                     translate!(\"touch-error-windows-stdout-path-failed\", \"code\" => ret),\n  868 |                 ));\n  869 |             }\n  870 |             0 => {\n  871 |                 return Err(TouchError::WindowsStdoutPathError(translate!(\n  872 |                 \"touch-error-windows-stdout-path-failed\",\n  873 |                     \"code\".to_string() =>\n  874 |                     format!(\n  875 |                         \"{}\",\n  876 |                         // SAFETY: GetLastError is thread-safe and has no documented memory unsafety.\n  877 |                         unsafe { GetLastError() }\n  878 |                     ),\n  879 |                 )));\n  880 |             }\n  881 |             e => e as usize,\n  882 |         };\n  883 | \n  884 |         // Don't include the null terminator\n  885 |         Ok(String::from_utf16(&file_path_buffer[0..buffer_size])\n  886 |             .map_err(|e| TouchError::WindowsStdoutPathError(e.to_string()))?\n  887 |             .into())","lines":33}]},{"id":"LOGIC_113","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"tr equivalence class `[=c=]` is parsed by `parse_char_equal` into a single `Sequence::Char(c)`, i.e. it is treated as exactly the one character `c`. POSIX specifies an equivalence class expands to all characters collating equally to `c`. In the C/POSIX locale this happens to be just `c` so behavior is correct there, but the implementation silently ignores locale-based equivalence entirely; the name \"equivalence class\" is misleading for any non-C locale.","fix":"Document that only C-locale single-character equivalence is supported, or expand the equivalence class using locale collation data if locale awareness is intended.","locations":[{"ref":"src/uu/tr/src/operation.rs:558-587","code":"  558 |     fn parse_char_equal(input: &[u8]) -> IResult<&[u8], Result<Self, BadSequence>> {\n  559 |         preceded(\n  560 |             tag(\"[=\"),\n  561 |             (\n  562 |                 alt((\n  563 |                     value(Err(()), peek(tag(\"=]\"))),\n  564 |                     map(Self::parse_backslash_or_char, Ok),\n  565 | pe":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In yes `repeat_content_to_capacity`, `target_size = line_len * (buf.capacity() / line_len)` can overflow `usize` if `line_len` is very large relative to capacity (it cannot exceed capacity here so it is bounded), but more importantly when `line_len > buf.capacity()` the expression yields 0 and the function silently does nothing - which is intended - yet the buffer was allocated with `Vec::with_capacity(BUF_SIZE)` while `buf.len()` (a single very long line) may already exceed BUF_SIZE, so `capacity()` may be larger than BUF_SIZE and the doubling loop still runs; behavior is correct but the reliance on `capacity()` (an allocator-defined value) rather than a fixed target makes the output buffer size non-deterministic across allocators.","fix":"Base the target size on a fixed constant (e.g. BUF_SIZE) rather than the allocator-reported `capacity()` to keep behavior deterministic.","locations":[{"ref":"src/uu/yes/src/yes.rs:86-96","code":"   86 | fn repeat_content_to_capacity(buf: &mut Vec<u8>) {\n   87 |     let line_len = buf.len();\n   88 |     debug_assert!(line_len > 0, \"buffer is not empty since we have newline\");\n   89 |     let target_size = line_len * (buf.capacity() / line_len); // 0 if line_len is already large enough\n   90 | \n   91 |     while buf.len() < target_size {\n   92 |         let to_copy = std::cmp::min(target_size - buf.len(), buf.len());\n   93 |         debug_assert_eq!(to_copy % line_len, 0);\n   94 |         buf.extend_from_within(..to_copy);\n   95 |     }\n   96 | }","lines":11}]},{"id":"LOGIC_117","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"determine_backup_suffix only rejects a suffix containing '/', falling back to the\ndefault '~'. It does not strip/reject other path-affecting content; more importantly\nthe rejection is silent. GNU rejects suffixes containing a slash, so behavior is\nroughly compatible, but a backslash or other separator is not handled and on Windows\n'/' is not the only separator. Minor cross-platform inconsistency.","fix":"Document that only '/' is filtered, and consider also rejecting MAIN_SEPARATOR on\nnon-unix targets for parity.","locations":[{"ref":"src/uucore/src/lib/features/backup_control.rs:259-263","code":"  259 |     if suffix.contains('/') {\n  260 |         DEFAULT_BACKUP_SUFFIX.to_owned()\n  261 |     } else {\n  262 |         suffix\n  263 |     }","lines":5}]},{"id":"LOGIC_118","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`unescape_filename` silently drops a trailing lone backslash: when the final byte is `\\` and\n`byte_iter.next()` returns `None`, the `_ => {}` arm discards it entirely. GNU's checksum reader treats a\ndangling backslash literally. Combined with `escape_filename`, a filename ending in a single backslash will\nnot round-trip (it is doubled on escape but the lone-trailing case on the unescape side is lost), which can\ncause a `--check` line for such a file to mismatch its computed name.","fix":"In the `_ => {}` arm (when `\\` is the last byte), push the literal backslash:\n`None => unescaped.push(b'\\\\')`.","locations":[{"ref":"src/uucore/src/lib/features/checksum/compute.rs:638-659","code":"","lines":22}]},{"id":"LOGIC_119","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"next_char coerces a char argument to a byte with `*c as u8`, silently truncating any non-ASCII\ncode point (e.g. 'é' (U+00E9) becomes 0xE9, '€' becomes 0x20AC truncated to 0xAC). For `%c` GNU\nprintf emits the full multibyte encoding of the character. Truncating to a single byte produces\nincorrect output for non-ASCII char arguments.","fix":"Either encode the char as UTF-8 bytes (c.encode_utf8) when writing %c, or document/normalize that\nonly the first byte is used. At minimum avoid the lossy `as u8` cast for multibyte chars.","locations":[{"ref":"src/uucore/src/lib/features/format/argument.rs:76-85","code":"   76 |     pub fn next_char(&mut self, position: ArgumentLocation) -> u8 {\n   77 |         match self.next_arg(position) {\n   78 |             Some(FormatArgument::Char(c)) => *c as u8,\n   79 |             Some(FormatArgument::Unparsed(os)) => match os_str_as_bytes(os) {\n   80 |                 Ok(bytes) => bytes.first().copied().unwrap_or(b'\\0'),\n   81 |                 Err(_) => b'\\0',\n   82 |             },\n   83 |             _ => b'\\0',\n   84 |         }\n   85 |     }","lines":10}]},{"id":"LOGIC_120","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"canonicalize: at line 421 `FileInformation::from_path(result.parent().unwrap(), false).unwrap()`\ndouble-unwraps inside the symlink-loop-detection branch. If `result` has no parent (e.g. the\nsymlink resolved to a bare root component) parent() is None and this panics; likewise from_path\ncan fail (race / permission) and the unwrap aborts. This is on the >20-symlink slow path so it\nis rarely hit, but it is a panic in a core path-resolution routine used by realpath/readlink/ln.","fix":"Handle None parent and from_path errors by returning an io::Error (the loop-detection\npath can conservatively treat failure as \"too many levels\" or propagate the io error).","locations":[{"ref":"src/uucore/src/lib/features/fs.rs:417-432","code":"  417 |                 if followed_symlinks < SYMLINKS_TO_LOOK_FOR_LOOPS {\n  418 |                     followed_symlinks += 1;\n  419 |                 } else {\n  420 |                     let file_info =\n  421 |                         FileInformation::from_path(result.parent().unwrap(), false).unwrap();\n  422 |                     let mut path_to_follow = PathBuf::new();\n  423 |                     for part in &parts {\n  424 |                         path_to_follow.push(part.as_os_str());\n  425 |                     }\n  426 |                     if !visited_files.
