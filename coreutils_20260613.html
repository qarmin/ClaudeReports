return true/false\ninconsistently with `get`, leading either to a missed event or to a panic in `get().unwrap()`.","fix":"Make `contains_key` canonicalize the path like the other accessors: `self.map.contains_key(&Self::canonicalize_path(k))`.","locations":[{"ref":"src/uu/tail/src/follow/files.rs:81-83","code":"   81 |     pub fn contains_key(&self, k: &Path) -> bool {\n   82 |         self.map.contains_key(k)\n   83 |     }","lines":3},{"ref":"src/uu/tail/src/follow/watch.rs:551-554","code":"  551 |             if let Some(event_path) = event.paths.first() {\n  552 |                 if observer.files.contains_key(event_path) {\n  553 |                     // Handle Event if it is about a path that we are monitoring\n  554 |                     let new_paths = observer.handle_event(&event, settings)?;","lines":4},{"ref":"src/uu/tail/src/follow/watch.rs:305-307","code":"  305 |         let event_path = event.paths.first().unwrap();\n  306 |         let mut paths: Vec<PathBuf> = vec![];\n  307 |         let display_name = self.files.get(event_path).display_name.clone();","lines":3}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `follow()`, when `use_polling` is true the code overwrites `paths` with *all* watched keys on\nevery loop iteration (lines 631-636), then `tail_file`s each. This is the documented PollWatcher\nrename workaround, but combined with `BytesChunkBuffer::new(u64::MAX)` in `tail_file`\n(files.rs:139), each poll re-reads from the current reader position. If the reader was reset to None\n(reset_reader) but the file later reappears without `update_reader` being driven (e.g. descriptor\nmode where reset happens but reopen does not), `tail_file` returns false silently and the appeared\ndata is lost. The polling path's \"consider all files dirty\" also defeats the per-event header\ndedup, since header logic relies on `last` ordering across many forced reads.","fix":"In the polling fan-out, skip paths whose reader is None (nothing to read) and ensure reset readers are re-opened before being re-tailed; only mark a file dirty when its metadata actually changed.","locations":[{"ref":"src/uu/tail/src/follow/watch.rs:631-641","code":"  631 |         if observer.use_polling && settings.follow.is_some() {\n  632 |             // Consider all files to potentially have new content.\n  633 |             // This is a workaround because `Notify::PollWatcher`\n  634 |             // does not recognize the \"renaming\" of files.\n  635 |             paths = observer.files.keys().cloned().collect::<Vec<_>>();\n  636 |         }\n  637 | \n  638 |         // main print loop\n  639 |         for path in &paths {\n  640 |             _read_some = observer.files.tail_file(path, settings.verbose)?;\n  641 |         }","lines":11},{"ref":"src/uu/tail/src/follow/files.rs:138-159","code":"  138 |     pub fn tail_file(&mut self, path: &Path, verbose: bool) -> UResult<bool> {\n  139 |         let mut chunks = BytesChunkBuffer::new(u64::MAX);\n  140 |         if let Some(reader) = self.get_mut(path).reader.as_mut() {\n  141 |             chunks.fill(reader)?;\n  142 |         }\n  143 |         if chunks.has_data() {\n  144 |             if self.needs_header(path, verbose) {\n  145 |                 let display_name = self.get(path).display_name.clone();\n  146 |                 self.header_printer.print(display_name.as_str());\n  147 |             }\n  148 | \n  149 |             let mut writer = BufWriter::new(stdout().lock());\n  150 |             chunks.write(&mut writer)?;\n  151 |             writer.flush()?;\n  152 | \n  153 |             self.last.replace(path.to_owned());\n  154 |             self.update_metadata(path, None);\n  155 |             Ok(true)\n  156 |         } else {\n  157 |             Ok(false)\n  158 |         }\n  159 |     }","lines":22}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `tail_stdin`, after `input.resolve()` returns `None` (the pipe/FIFO branch), the code re-checks\n`paths::stdin_is_bad_fd()` at line 304. But the very top of the function (line 274) already returned\nearly with the same bad-fd handling for *all* stdin cases. Since `stdin_is_bad_fd()` is a pure\nfunction of process state that cannot change between line 274 and line 304, the inner check at\n304-315 is dead code: it can never be true. The follow-specific \"reading file\" message it guards is\ntherefore unreachable.","fix":"Remove the redundant `stdin_is_bad_fd()` block at 304-315 (keep the `else` body), or, if the intent was to emit the follow-mode \"reading\" message for a bad stdin fd, move that logic into the single early-return at 274-282.","locations":[{"ref":"src/uu/tail/src/tail.rs:273-282","code":"  273 |     // Check if stdin was closed before Rust reopened it as /dev/null\n  274 |     if paths::stdin_is_bad_fd() {\n  275 |         set_exit_code(1);\n  276 |         show_error!(\n  277 |             \"{}\",\n  278 |             translate!(\"tail-error-cannot-fstat\", \"file\" => translate!(\"tail-stdin-header\").quote(), \"error\" => translate!(\"tail-bad-fd\"))\n  279 |         );\n  280 |         show_error!(\"{}\", translate!(\"tail-no-files-remaining\"));\n  281 |         return Ok(());\n  282 |     }","lines":10},{"ref":"src/uu/tail/src/tail.rs:304-315","code":"  304 |         if paths::stdin_is_bad_fd() {\n  305 |             set_exit_code(1);\n  306 |             show_error!(\n  307 |                 \"{}\",\n  308 |                 translate!(\"tail-error-cannot-fstat\", \"file\" => translate!(\"tail-stdin-header\"), \"error\" => translate!(\"tail-bad-fd\"))\n  309 |             );\n  310 |             if settings.follow.is_some() {\n  311 |                 show_error!(\n  312 |                     \"{}\",\n  313 |                     translate!(\"tail-error-reading-file\", \"file\" => translate!(\"tail-stdin-header\"), \"error\" => translate!(\"tail-bad-fd\"))\n  314 |                 );\n  315 |             }","lines":12}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In timeout, when the child is killed after `kill_after` elapses, `wait_or_kill_process` always returns `ExitStatus::SignalSent(SIGKILL)` (137), even when `preserve_status` is set. GNU timeout with --preserve-status reports the child's actual termination status. The `preserve_status` parameter is accepted by `wait_or_kill_process` but only consulted on the Ok(Some(status)) (child exited on its own) branch; the Ok(None) (had to SIGKILL) branch ignores it and the docstring's \"137 is returned\" contradicts --preserve-status semantics.","fix":"In the Ok(None) branch of `wait_or_kill_process`, when `preserve_status` is true, derive the exit code from the awaited child status (code/signal) instead of unconditionally returning `SignalSent(KILL)`.","locations":[{"ref":"src/uu/timeout/src/timeout.rs:321-327","code":"  321 |         Ok(None) => {\n  322 |             let signal = signal_by_name_or_value(\"KILL\").unwrap();\n  323 |             report_if_verbose(signal, cmd, verbose);\n  324 |             send_signal(process, signal, foreground);\n  325 |             process.wait()?;\n  326 |             Ok(ExitStatus::SignalSent(signal).into())\n  327 |         }","lines":7}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"update_times for ChangeTimes::AtimeOnly/MtimeOnly re-stats the file with stat(path, !opts.no_deref) to fetch the time being preserved, but this happens AFTER touch_file may have just created the file. For a freshly created file the preserved time is read back from disk; this is generally fine, but if the file was created via create_without_truncate and then a TOCTOU symlink swap occurs, the stat here follows a possibly different target than the one created, and the preserved time could come from an attacker-controlled file. The earlier create path was hardened against truncation but this re-stat path is not similarly hardened.","fix":"Open the file once (O_NOFOLLOW where appropriate) and operate on the FD for both the stat-to-preserve and the futimens call, rather than re-resolving the path, to keep the create/stat/set sequence race-free.","locations":[{"ref":"src/uu/touch/src/touch.rs:582-593","code":"  582 |             stat(path, !opts.no_deref)\n  583 |                 .map_err_context(\n  584 |                     || translate!(\"touch-error-failed-to-get-attributes\", \"path\" => path.quote()),\n  585 |                 )?\n  586 |                 .1,\n  587 |         ),\n  588 |         ChangeTimes::MtimeOnly => (\n  589 |             stat(path, !opts.no_deref)\n  590 |                 .map_err_context(\n  591 |                     || translate!(\"touch-error-failed-to-get-attributes\", \"path\" => path.quote()),\n  592 |                 )?\n  593 |                 .0,","lines":12}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"parse_timestamp leap-second handling only fixes the case where jiff clamped a \".60\" to second 59. The condition is dt.second() == 59 && ts.ends_with(\".60\"). If jiff instead rejects \".60\" outright (parse error) for some format, the +1.second() fixup is never reached and a valid GNU leap-second timestamp like YYYYMMDDhhmm.60 fails. Also, the fixup assumes clamping to 59; if a future jiff clamps differently the silent assumption breaks.","fix":"Detect the trailing \".60\" before parsing, strip it to \".59\" (or \".00\" with a carried minute), parse, then add the one second explicitly, rather than relying on jiff clamping to exactly 59.","locations":[{"ref":"src/uu/touch/src/touch.rs:798-800","code":"  798 |     if dt.second() == 59 && ts.ends_with(\".60\") {\n  799 |         dt += 1.second();\n  800 |     }","lines":3}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"tsort detect_cycle shares a single `stack` Vec across all DFS root iterations, but `dfs` pushes the root node onto the stack BEFORE checking if it is already Closed and returns early (without popping) when it is. After the first full DFS pass closes many nodes, every subsequent `dfs(root)` call on an already-Closed node leaves a stale `(node, successors)` entry on the shared stack. These stale entries are never cleared and get drained into a later traversal, so the eventually-reported cycle path can contain unrelated nodes. This corrupts the cycle list printed on stderr when the graph has a cycle.","fix":"Pop the just-pushed entry before the early `return false` at the Closed check (or clear/reset `stack` at the start of each outer loop iteration in `detect_cycle`). E.g. `if state == VisitedState::Closed { stack.pop(); return false; }`.","locations":[{"ref":"src/uu/tsort/src/tsort.rs:344-357","code":"  344 |         let mut visited = FxHashMap::default();\n  345 |         let mut stack = Vec::with_capacity(self.nodes.len());\n  346 |         for &node in &nodes {\n  347 |             if self.dfs(node, &mut visited, &mut stack) {\n  348 |                 let (loop_entry, _) = stack.pop().expect(\"loop is not empty\");\n  349 | \n  350 |                 return stack\n  351 |                     .into_iter()\n  352 |                     .map(|(node, _)| node)\n  353 |                     .skip_while(|&node| node != loop_entry)\n  354 |                     .collect();\n  355 |             }\n  356 |         }\n  357 |         unreachable!(\"detect_cycle is expected to be called only on graphs with cycles\");","lines":14},{"ref":"src/uu/tsort/src/tsort.rs:366-376","code":"  366 |         stack.push((\n  367 |             node,\n  368 |             self.nodes\n  369 |                 .get(&node)\n  370 |                 .map_or(&[], |n: &Node| &n.successor_tokens),\n  371 |         ));\n  372 |         let state = *visited.entry(node).or_insert(VisitedState::Opened);\n  373 | \n  374 |         if state == VisitedState::Closed {\n  375 |             return false;\n  376 |         }","lines":11}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"unexpand measures non-ASCII UTF-8 characters by their byte length instead of their display width. `next_char_info` returns `(Other, nbytes, nbytes)` for valid multi-byte UTF-8, so a 2-/3-/4-byte character is counted as 2/3/4 columns. This desynchronizes column accounting from the actual terminal width (expand correctly uses `UnicodeWidthChar::width`), causing incorrect tab insertion/alignment on lines containing multi-byte characters such as accented letters or CJK.","fix":"Decode the character and return its `UnicodeWidthChar::width(...).unwrap_or(...)` as the width (the second tuple element) while keeping `nbytes` as the byte length, mirroring expand's `classify_char`.","locations":[{"ref":"src/uu/unexpand/src/unexpand.rs:416-416","code":"  416 |             return (Other, nbytes, nbytes);","lines":1}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Operator-precedence bug in remote-filesystem detection. The expression\n`dev_name.starts_with(\"//\") && fs_type == \"smbfs\" || fs_type == \"cifs\"` parses\nas `(dev_name.starts_with(\"//\") && fs_type == \"smbfs\") || (fs_type == \"cifs\")`.\nGNU's `me_remote` intends `dev_name.starts_with(\"//\") && (fs_type == \"smbfs\" || fs_type == \"cifs\")`.\nAs written, every cifs filesystem is reported remote regardless of dev_name, and\nthe `//` requirement is silently dropped for cifs. This affects `df` remote/local\nclassification and any caller relying on MountInfo.remote.","fix":"Group the disjunction: `dev_name.starts_with(\"//\") && (fs_type == \"smbfs\" || fs_type == \"cifs\")`.","locations":[{"ref":"src/uucore/src/lib/features/fsext.rs:413-417","code":"  413 | fn is_remote_filesystem(dev_name: &str, fs_type: &str) -> bool {\n  414 |     dev_name.find(':').is_some()\n  415 |         || (dev_name.starts_with(\"//\") && fs_type == \"smbfs\" || fs_type == \"cifs\")\n  416 |         || dev_name == \"-hosts\"\n  417 | }","lines":5}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"get_acl_perm_bits_from_xattr skips only 3 header bytes (`value.split_at(3).1`)\neven though the documentation in the same function (and the kernel ABI) states\nthe posix_acl_xattr header is 4 bytes. The function only happens to produce the\nright answer because every 0xFF byte is filtered out before the 4-byte chunking,\nso the misalignment is masked for the typical layout where e_id == -1 (0xFFFFFFFF).\nThis is fragile: any ACL entry whose e_id is not all-0xFF, or whose tag/perm bytes\nlegitimately contain 0xFF, will desynchronize the chunking and yield wrong\npermission bits. The 255-filtering approach is itself incorrect parsing of a\nbinary struct.","fix":"Parse the structure explicitly: skip the 4-byte header, then for each 8-byte\nposix_acl_entry read e_tag (u16 LE), e_perm (u16 LE), e_id (u32 LE) and accumulate\npermissions by tag, instead of filtering out 0xFF bytes and chunking by 4.","locations":[{"ref":"src/uucore/src/lib/features/fsxattr.rs:225-237","code":"  225 |             let acl_entries = value\n  226 |                 .split_at(3)\n  227 |                 .1\n  228 |                 .iter()\n  229 |                 .filter(|&x| *x != 255)\n  230 |                 .copied()\n  231 |                 .collect::<Vec<u8>>();\n  232 | \n  233 |             for entry in acl_entries.chunks_exact(4) {\n  234 |                 // Third byte and fourth byte will be the perm bits\n  235 |                 perm = (perm << 3) | u32::from(entry[2]) | u32::from(entry[3]);\n  236 |             }\n  237 |             return perm;","lines":13}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"get_locale_from_env does not skip empty environment variables. find_map uses std::env::var(key).ok() with no emptiness filter, so an empty LC_ALL (i.e. LC_ALL=\"\") is accepted as the locale source and stops the LC_ALL/LC_COLLATE/LANG search chain. An empty variable then parses to (DEFAULT_LOCALE, Ascii). POSIX/glibc treat an empty locale variable as unset and fall through to the next variable. Notably the sibling module charmap.rs::get_encoding does filter empties (.filter(|v| !v.is_empty())), so the two locale resolvers disagree on the same environment, producing inconsistent encoding decisions for collation/numeric vs. charmap.","fix":"Filter out empty values when scanning env vars, matching charmap.rs: `.find_map(|&key| std::env::var(key).ok().filter(|v| !v.is_empty()))`.","locations":[{"ref":"src/uucore/src/lib/features/i18n/mod.rs:38-42","code":"   38 | pub fn get_locale_from_env(locale_name: &str) -> (Locale, UEncoding) {\n   39 |     let locale_var = [\"LC_ALL\", locale_name, \"LANG\"]\n   40 |         .iter()\n   41 |         .find_map(|&key| std::env::var(key).ok());\n   42 | ","lines":5}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"parse_change handles the 'u'/'g'/'o' copy-source operands by breaking out of the\nloop after the first one and setting pos=1, so a symbolic clause like \"u=go\" or\n\"a+ug\" silently ignores everything after the first copy letter rather than erroring\nor combining. Also, a copy letter that is not the first character (pos != 0) is\nsilently dropped (the `break` at pos!=0 leaves srwx from prior r/w/x bits but\ndiscards the copy semantics). GNU chmod treats e.g. \"u+rg\" by combining, and rejects\nsome of these. The single-letter restriction comment acknowledges this is a partial\nimplementation, but the silent truncation can produce a wrong mode without an error.","fix":"Match GNU semantics: when a copy operand (u/g/o) appears, it must be the sole\n\"perms\" token; otherwise error. Verify against GNU chmod for mixed forms like \"u+rg\".","locations":[{"ref":"src/uucore/src/lib/features/mode.rs:104-139","code":"  104 | fn parse_change(mode: &str, fperm: u32, considering_dir: bool) -> (u32, usize) {\n  105 |     let mut srwx = 0;\n  106 |     let mut pos = 0;\n  107 |     for ch in mode.chars() {\n  108 |         match ch {\n  109 |             'r' => srwx |= 0o444,\n  110 |             'w' => srwx |= 0o222,\n  111 |             'x' => srwx |= 0o111,\n  112 |             'X' => {\n  113 |                 if considering_dir || (fperm & 0o0111) != 0 {\n  114 |                     srwx |= 0o111;\n  115 |                 }\n  116 |             }\n  117 |             's' => srwx |= 0o4000 | 0o2000,\n  118 |             't' => srwx |= 0o1000,\n  119 |             'u' => srwx = (fperm & 0o700) | ((fperm >> 3) & 0o070) | ((fperm >> 6) & 0o007),\n  120 |             'g' => srwx = ((fperm << 3) & 0o700) | (fperm & 0o070) | ((fperm >> 3) & 0o007),\n  121 |             'o' => srwx = ((fperm << 6) & 0o700) | ((fperm << 3) & 0o070) | (fperm & 0o007),\n  122 |             _ => break,\n  123 |         }\n  124 |         if ch == 'u' || ch == 'g' || ch == 'o' {\n  125 |             // symbolic modes only allows perms to be a single letter of 'ugo'\n  126 |             // therefore this must either be the first char or it is unexpected\n  127 |             if pos != 0 {\n  128 |                 break;\n  129 |             }\n  130 |             pos = 1;\n  131 |             break;\n  132 |         }\n  133 |         pos += 1;\n  134 |     }\n  135 |     if pos == 0 {\n  136 |         srwx = 0;\n  137 |     }\n  138 |     (srwx, pos)\n  139 | }","lines":36}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"parse_signed_num does NOT strip leading zeros before calling parse_size_u64, while its sibling\nparse_signed_num_max DOES (size_string.trim_start_matches('0')). Because parse_size interprets a\nleading-zero decimal string as octal, the two entry points disagree: parse_signed_num(\"010\")\nreturns 8 (octal), but parse_signed_num_max(\"010\") returns 10 (decimal). head/tail style args such\nas \"-010\" would therefore be interpreted differently depending on which function the caller uses,\nwhich is almost certainly unintended and diverges from GNU behavior (these args are decimal).","fix":"Make parse_signed_num strip leading zeros the same way parse_signed_num_max does (trim_start_matches('0')\nwith an all-zeros special case), so both paths treat the value as decimal consistently.","locations":[{"ref":"src/uucore/src/lib/features/parser/parse_signed_num.rs:104-118","code":"  104 | pub fn parse_signed_num(src: &str) -> Result<SignedNum, ParseSizeError> {\n  105 |     let (sign, size_string) = strip_sign_prefix(src);\n  106 | \n  107 |     // Empty string after stripping sign is an error\n  108 |     if size_string.is_empty() {\n  109 |         return Err(ParseSizeError::ParseFailure(src.to_string()));\n  110 |     }\n  111 | \n  112 |     // Use parse_size_u64 but on failure, create our own error with the raw string\n  113 |     // (without quotes) so callers can format it as needed\n  114 |     let value = parse_size_u64(size_string)\n  115 |         .map_err(|_| ParseSizeError::ParseFailure(size_string.to_string()))?;\n  116 | \n  117 |     Ok(SignedNum { value, sign })\n  118 | }","lines":15},{"ref":"src/uucore/src/lib/features/parser/parse_signed_num.rs:85-92","code":"   85 |     // Remove leading zeros so size is interpreted as decimal, not octal\n   86 |     let trimmed = size_string.trim_start_matches('0');\n   87 |     let value = if trimmed.is_empty() {\n   88 |         // All zeros (e.g., \"000\" or \"0\")\n   89 |         0\n   90 |     } else {\n   91 |         parse_size_u64_max(trimmed)?\n   92 |     };","lines":8}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Parser::parse percentage branch computes `(number / 100) * total`, performing integer division\nbefore multiplication. Because number is integer, ANY percentage below 100 truncates to 0:\n\"50%\" yields `(50/100)*total = 0*total = 0` bytes, and \"150%\" yields `1*total` instead of\n`1.5*total`. So `--buffer-size=50%` etc. silently resolves to 0. GNU computes the fraction\ncorrectly (multiply first).","fix":"Multiply before dividing using a wider type or checked arithmetic:\n`number.checked_mul(total).map(|v| v / 100)`, guarding against overflow, so e.g. 150% gives 1.5*total.","locations":[{"ref":"src/uucore/src/lib/features/parser/parse_size.rs:255-261","code":"  255 |         if unit == \"%\" {\n  256 |             let number: u128 = Self::parse_number(&numeric_string, 10, size)?;\n  257 |             return match total_physical_memory() {\n  258 |                 Ok(total) => Ok((number / 100) * total),\n  259 |                 Err(_) => Err(ParseSizeError::PhysicalMem(size.to_string())),\n  260 |             };\n  261 |         }","lines":7}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"create_dest_restrictive documents that on a pre-existing file O_TRUNC empties contents\nwhile the existing inode mode is preserved (0o600 only applies to freshly created\ninodes). This is correct, but safe_copy_file relies on it: when the destination already\nexists with a permissive mode (e.g. 0o666 world-writable), safe_copy_file truncates and\nwrites through it WITHOUT narrowing the mode, defeating the documented anti-leak\nguarantee for the pre-existing-file case. The security comment in the module header\nimplies the destination is always created restrictively, but the existing-inode path\nsilently retains whatever mode was there.","fix":"Document this caveat at safe_copy_file too, and have security-sensitive callers\nfchmod the fd to 0o600 immediately after open when the dest pre-existed, or unlink-then-create.","locations":[{"ref":"src/uucore/src/lib/features/safe_copy.rs:61-82","code":"   61 | /// Create `path` with the restrictive [`DEST_INITIAL_MODE`].\n   62 | ///\n   63 | /// On a pre-existing file `O_TRUNC` empties the contents but the existing\n   64 | /// inode's mode is preserved; the restrictive mode only applies to a\n   65 | /// freshly created inode. Callers that need to widen the destination to\n   66 | /// the source's permissions should do so via `set_permissions` *after*\n   67 | /// the content copy completes.\n   68 | ///\n   69 | /// With `nofollow = true`, an existing symlink at `path` causes `ELOOP`\n   70 | /// rather than truncating the symlink's target. Pass `true` whenever the\n   71 | /// caller has not just unlinked `path` itself: without it, an attacker\n   72 | /// who plants `path` as a symlink between the caller's check and this\n   73 | /// open can redirect the truncate (and the subsequent write) to any file\n   74 | /// the caller has permission to write.\n   75 | pub fn create_dest_restrictive<P: AsRef<Path>>(path: P, nofollow: bool) -> io::Result<File> {\n   76 |     let mut flags = DEST_FLAGS;\n   77 |     if nofollow {\n   78 |         flags |= OFlags::NOFOLLOW;\n   79 |     }\n   80 |     let fd: OwnedFd = open(path.as_ref(), flags, Mode::RUSR.union(Mode::WUSR))?;\n   81 |     Ok(File::from(fd))\n   82 | }","lines":22},{"ref":"src/uucore/src/lib/features/safe_copy.rs:84-108","code":"   84 | /// Like [`std::fs::copy`] but uses [`open_source`] and\n   85 | /// [`create_dest_restrictive`]. The same `nofollow` flag is applied to\n   86 | /// both ends, so an attacker-planted symlink at either path returns\n   87 | /// `ELOOP` instead of being followed.\n   88 | ///\n   89 | /// Intentionally does *not* preserve source permissions on the\n   90 | /// destination — doing so would widen the destination's mode mid-copy\n   91 | /// and reopen the race that `DEST_INITIAL_MODE` closes. The caller is\n   92 | /// expected to call `set_permissions` later, once content has been\n   93 | /// fully written.\n   94 | ///\n   95 | /// On error from `io::copy`, a partial destination file may remain on\n   96 | /// disk (truncated to whatever was written before the failure, or empty\n   97 | /// if the failure was in `create_dest_restrictive`). Cleanup of `dest`\n   98 | /// on `Err` is the caller's responsibility — symmetric with\n   99 | /// [`std::fs::copy`].\n  100 | pub fn safe_copy_file<P: AsRef<Path>, Q: AsRef<Path>>(\n  101 |     source: P,\n  102 |     dest: Q,\n  103 |     nofollow: bool,\n  104 | ) -> io::Result<u64> {\n  105 |     let mut src = open_source(source, nofollow)?;\n  106 |     let mut dst = create_dest_restrictive(dest, nofollow)?;\n  107 |     io::copy(&mut src, &mut dst)\n  108 | }","lines":25}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"find_existing_ancestor + create_dir_all_safe: when the deepest existing ancestor is\nreached via a pre-existing symlink-to-directory, DirFd::open(existing_ancestor,\nSymlinkBehavior::Follow) follows it (intended, GNU behavior). But find_existing_ancestor\nuses fs::metadata (follows symlinks) to classify each ancestor, so a dangling symlink in\nthe middle of the path is classified as NotFound and recorded as a component-to-create;\nopen_or_create_subdir then stat_at's it NoFollow, sees S_IFLNK, and tries\nopen_subdir(Follow) which fails on the dangling target. The error path is correct, but\nthe residual TOCTOU window between find_existing_ancestor's path-based metadata and the\nsubsequent fd-anchored open is wider than the doc comment implies for the ancestor\ndiscovery phase (the ancestor itself is resolved purely by path, not fd).","fix":"Acceptable trade-off (documented), but the doc on create_dir_all_safe should make\nexplicit that ancestor discovery is fully path-based and only the creation phase is\nfd-anchored.","locations":[{"ref":"src/uucore/src/lib/features/safe_traversal.rs:473-535","code":"  473 | fn find_existing_ancestor(path: &Path) -> io::Result<(PathBuf, Vec<OsString>)> {\n  474 |     let mut current = path.to_path_buf();\n  475 |     let mut components: Vec<OsString> = Vec::new();\n  476 | \n  477 |     loop {\n  478 |         // Use metadata (follow symlinks) so that symlinks to directories are\n  479 |         // treated as existing ancestors rather than components to create.\n  480 |         match fs::metadata(&current) {\n  481 |             Ok(meta) => {\n  482 |                 if meta.is_dir() {\n  483 |                     // Found a directory (real or via symlink)\n  484 |                     components.reverse();\n  485 |                     return Ok((current, components));\n  486 |                 }\n  487 |                 // It's a file or other non-directory - treat as needing creation\n  488 |                 if let Some(file_name) = current.file_name() {\n  489 |                     components.push(file_name.to_os_string());\n  490 |                 }\n  491 |                 if let Some(parent) = current.parent() {\n  492 |                     if parent.as_os_str().is_empty() {\n  493 |                         // Reached empty parent (for relative paths), use \".\"\n  494 |                         components.reverse();\n  495 |                         return Ok((PathBuf::from(\".\"), components));\n  496 |                     }\n  497 |                     current = parent.to_path_buf();\n  498 |                 } else {\n  499 |                     // Reached filesystem root\n  500 |                     let root = if path.is_absolute() {\n  501 |                         PathBuf::from(\"/\")\n  502 |                     } else {\n  503 |                         PathBuf::from(\".\")\n  504 |                     };\n  505 |                     components.reverse();\n  506 |                     return Ok((root, components));\n  507 |                 }\n  508 |             }\n  509 |             Err(e) if e.kind() == io::ErrorKind::NotFound => {\n  510 |                 // Doesn't exist, record component and move up to parent\n  511 |                 if let Some(file_name) = current.file_name() {\n  512 |                     components.push(file_name.to_os_string());\n  513 |                 }\n  514 |                 if let Some(parent) = current.parent() {\n  515 |                     if parent.as_os_str().is_empty() {\n  516 |                         // Reached empty parent (for relative paths), use \".\"\n  517 |                         components.reverse();\n  518 |                         return Ok((PathBuf::from(\".\"), components));\n  519 |                     }\n  520 |                     current = parent.to_path_buf();\n  521 |                 } else {\n  522 |                     // Reached filesystem root\n  523 |                     let root = if path.is_absolute() {\n  524 |                         PathBuf::from(\"/\")\n  525 |                     } else {\n  526 |                         PathBuf::from(\".\")\n  527 |                     };\n  528 |                     components.reverse();\n  529 |                     return Ok((root, components));\n  530 |                 }\n  531 |             }\n  532 |             Err(e) => return Err(e),\n  533 |         }\n  534 |     }\n  535 | }","lines":63},{"ref":"src/uucore/src/lib/features/safe_traversal.rs:606-615","code":"  606 | pub fn create_dir_all_safe(path: &Path, mode: u32) -> io::Result<DirFd> {\n  607 |     let (existing_ancestor, components_to_create) = find_existing_ancestor(path)?;\n  608 |     let mut dir_fd = DirFd::open(&existing_ancestor, SymlinkBehavior::Follow)?;\n  609 | \n  610 |     for component in &components_to_create {\n  611 |         dir_fd = open_or_create_subdir(&dir_fd, component.as_os_str(), mode)?;\n  612 |     }\n  613 | \n  614 |     Ok(dir_fd)\n  615 | }","lines":10}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`signal_by_name_or_value` parses a numeric input with `signal_name_upcase.parse()` whose target type is\ninferred as `usize` from the later `is_signal(value)` call. A negative or otherwise non-usize numeric string\nwill simply fail to parse and fall through to the name-matching branch. More importantly, on the realtime\npath it accepts any value in `[rtmin, rtmax]`, but the plain numeric branch (line 398-405) only validates\nagainst `is_signal` (i.e. `< ALL_SIGNALS.len()`) OR the realtime range, while `signal_list_value_by_name_or_number`\n(line 470-472) accepts ANY value `<= signal_number_upper_bound()` including the gap between the static table\nend and rtmin. These two public entry points therefore disagree on which numeric signal values are valid,\nwhich can let `kill`-style callers accept a number through one path that the other rejects.","fix":"Unify numeric validation between `signal_by_name_or_value` and `signal_list_value_by_name_or_number` (decide\nexplicitly whether numbers in the table/rtmin gap are valid) so both entry points agree.","locations":[{"ref":"src/uucore/src/lib/features/signals.rs:396-417","code":"  396 | pub fn signal_by_name_or_value(signal_name_or_value: &str) -> Option<usize> {\n  397 |     let signal_name_upcase = signal_name_or_value.to_uppercase();\n  398 |     if let Ok(value) = signal_name_upcase.parse() {\n  399 |         if is_signal(value) {\n  400 |             return Some(value);\n  401 |         }\n  402 |         return realtime_signal_bounds()\n  403 |             .filter(|&(rtmin, rtmax)| value >= rtmin && value <= rtmax)\n  404 |             .map(|_| value);\n  405 |     }\n  406 |     let signal_name = signal_name_upcase.trim_start_matches(\"SIG\");\n  407 | \n  408 |     if let Some(pos) = ALL_SIGNALS.iter().position(|&s| s == signal_name) {\n  409 |         return Some(pos);\n  410 |     }\n  411 | \n  412 |     realtime_signal_bounds().and_then(|(rtmin, rtmax)| match signal_name {\n  413 |         \"RTMIN\" => Some(rtmin),\n  414 |         \"RTMAX\" => Some(rtmax),\n  415 |         _ => None,\n  416 |     })\n  417 | }","lines":22},{"ref":"src/uucore/src/lib/features/signals.rs:467-484","code":"  467 | pub fn signal_list_value_by_name_or_number(spec: &str) -> Option<usize> {\n  468 |     let spec_upcase = spec.to_uppercase();\n  469 | \n  470 |     if let Ok(value) = spec_upcase.parse::<usize>() {\n  471 |         return (value <= signal_number_upper_bound()).then_some(value);\n  472 |     }\n  473 | \n  474 |     if let Some(value) = signal_by_name_or_value(&spec_upcase) {\n  475 |         return Some(value);\n  476 |     }\n  477 | \n  478 |     let signal_name = spec_upcase.trim_start_matches(\"SIG\");\n  479 |     realtime_signal_bounds().and_then(|(rtmin, rtmax)| match signal_name {\n  480 |         \"RTMIN\" => Some(rtmin),\n  481 |         \"RTMAX\" => Some(rtmax),\n  482 |         _ => None,\n  483 |     })\n  484 | }","lines":18}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`translate!` coerces every substitution argument through `value.to_string()` and then\nre-parses it: if it parses as `i64` it is stored as an integer, else if it parses as `f64`\nit is stored as a float, otherwise as a string. This silently reinterprets user-controlled\nstrings. A filename or value that happens to look numeric (e.g. `\"007\"`, `\"1e3\"`, `\"1.50\"`,\n`\"+5\"`, `\"0x10\"` is left as string but `\"1e3\"` becomes the float 1000) is no longer rendered\nverbatim. Fluent then applies locale-aware number formatting (grouping separators, decimal\nnormalization), so e.g. a \"name\" or path argument can come out as `1,000` or `1.5` instead\nof the original text. The macro cannot distinguish \"this argument is conceptually a number\"\nfrom \"this argument is a string that looks like a number\".","fix":"Do not guess the type from the string contents. Either pass values with their real type\ninto `FluentArgs` at the call site (the caller knows whether it is a count vs a name), or\nalways store the argument as a string unless the caller explicitly opts into numeric\nformatting (e.g. a separate `translate_num!` arm). At minimum, restrict numeric coercion to\nexact round-trip cases (re-format the parsed number and compare to the original).","locations":[{"ref":"src/uucore/src/lib/mods/locale.rs:632-648","code":"  632 |     ($id:expr, $($key:expr => $value:expr),+ $(,)?) => {\n  633 |         {\n  634 |             let mut args = fluent::FluentArgs::new();\n  635 |             $(\n  636 |                 let value_str = $value.to_string();\n  637 |                 if let Ok(num_val) = value_str.parse::<i64>() {\n  638 |                     args.set($key, num_val);\n  639 |                 } else if let Ok(float_val) = value_str.parse::<f64>() {\n  640 |                     args.set($key, float_val);\n  641 |                 } else {\n  642 |                     // Keep as string if not a number\n  643 |                     args.set($key, value_str);\n  644 |                 }\n  645 |             )+\n  646 |             $crate::locale::get_message_with_args($id, args)\n  647 |         }\n  648 |     };","lines":17}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"build.rs lowercases each cargo feature env key (`key[ENV_FEATURE_PREFIX.len()..].to_lowercase()`) to derive the crate/util name. Cargo feature names are matched case-insensitively and exported uppercased in CARGO_FEATURE_*, so two features differing only in case (or a feature containing characters that don't round-trip through lowercasing) would map to the same util name and silently overwrite each other in the phf map via `entries.sort_by_key` + later `phf_map.entry`. There is no duplicate-key detection; a collision would either panic inside phf_codegen or silently produce a wrong mapping. Low likelihood given current naming, but unguarded.","fix":"Detect and reject duplicate derived util names explicitly (e.g. assert the entry name is unique before pushing), so a feature-name collision fails the build with a clear message rather than relying on phf's behavior.","locations":[{"ref":"build.rs:41-63","code":"   41 |     for (key, val) in env::vars() {\n   42 |         if val == \"1\" && key.starts_with(ENV_FEATURE_PREFIX) {\n   43 |             let krate = key[ENV_FEATURE_PREFIX.len()..].to_lowercase();\n   44 |             // Allow this as we have a bunch of info in the comments\n   45 |             #[allow(clippy::match_same_arms)]\n   46 |             match krate.as_ref() {\n   47 |                 #[cfg(not(any(target_os = \"linux\", target_os = \"android\")))]\n   48 |                 \"chcon\" | \"runcon\" => {\n   49 |                     continue;\n   50 |                 }\n   51 |                 \"default\" | \"macos\" | \"unix\" | \"windows\" | \"selinux\" | \"zip\" | \"clap_complete\"\n   52 |                 | \"clap_mangen\" | \"fluent_syntax\" => continue, // common/standard feature names\n   53 |                 \"nightly\" | \"test_unimplemented\" | \"expensive_tests\" | \"test_risky_names\" => {\n   54 |                     continue;\n   55 |                 } // crate-local custom features\n   56 |                 \"uudoc\" => continue, // is not a utility\n   57 |                 \"test\" => continue, // over-ridden with 'uu_test' to avoid collision with rust core crate 'test'\n   58 |                 s if s.starts_with(FEATURE_PREFIX) => continue, // crate feature sets\n   59 |                 _ => {}             // util feature name\n   60 |             }\n   61 |             crates.push(krate);\n   62 |         }\n   63 |     }","lines":23},{"ref":"build.rs:104-108","code":"  104 |     entries.sort_by_key(|(name, _)| *name);\n  105 | \n  106 |     for (name, value) in entries {\n  107 |         phf_map.entry(name, value);\n  108 |     }","lines":5}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The multicall name resolution treats any binary whose stem ends with the literal string \"utils\" as the coreutils dispatcher (`is_coreutils = binary_as_util.ends_with(\"utils\")`) and any stem ending with \"box\" as a busybox-style dispatcher. A user hardlink/rename such as `myutils`, `cutils`, or `toolbox` is therefore silently interpreted as the multi-call binary (consuming argv[1] as the util name) rather than reporting 'unknown program'. The intent is to match exactly `coreutils`/`*box`, not an arbitrary `*utils` suffix.","fix":"Match the dispatcher name explicitly (e.g. `binary_as_util == \"coreutils\"`) instead of a broad `ends_with(\"utils\")`, and similarly tighten the `*box` check, or document that the suffix match is intentional.","locations":[{"ref":"src/bin/coreutils.rs:64","code":"   64 |     let is_coreutils = binary_as_util.ends_with(\"utils\");","lines":1},{"ref":"src/bin/coreutils.rs:72","code":"   72 |     } else if is_coreutils || binary_as_util.ends_with(\"box\") {","lines":1},{"ref":"src/bin/coreutils.rs:143","code":"  143 |         if binary_as_util.ends_with(\"box\") {","lines":1}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"post_process_manpage's escape-sequence fix does two sequential string replacements: `replace(\"\\\\\\\\0\", \"\\e0\")` then `replace(\"\\\\0\", \"\\e0\")`. Because the four-backslash pattern is a superset prefix of the two-backslash pattern, runs of backslashes are collapsed in an order-dependent way (e.g. an odd run of >4 backslashes before a 0 leaves stray backslashes), so the rewrite is not robust for inputs other than the exact cases covered by the tests. It happens to pass the current tests but is fragile.","fix":"Use a single regex that matches one-or-more backslashes followed by 0 and emits the intended `\\e0`, e.g. `Regex::new(r\"\\\\+0\")`, to make the transformation unambiguous.","locations":[{"ref":"src/bin/uudoc.rs:82-86","code":"   82 |     // Fix escape sequence issues\n   83 |     // \\\\\\\\0 appears when trying to represent literal \\0 string\n   84 |     // In man pages, use \\e for literal backslash\n   85 |     result = result.replace(\"\\\\\\\\\\\\\\\\0\", \"\\\\e0\");\n   86 |     result = result.replace(\"\\\\\\\\0\", \"\\\\e0\");","lines":5}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `chmod_file_internal`, when the entry is a symlink and `dereference` is false, the code\ncorrectly skips calling `change_file` (lines 747-756), but then unconditionally falls through\nto the \"umask would have removed a permission\" check at line 761. Because `new_mode` and\n`naively_expected_new_mode` were computed from the symlink's reported mode, this can emit a\nspurious `NewPermissions` error for a symlink that was intentionally left untouched. The check\nshould only run when the file was actually modified (the `else` branch).","fix":"Move the `if (new_mode & !naively_expected_new_mode) != 0` check inside the `else` branch\n(lines 757-759) so it only applies when `change_file` was actually invoked.","locations":[{"ref":"src/uu/chmod/src/chmod.rs:746-768","code":"  746 |             // Special handling for symlinks when not dereferencing\n  747 |             if file.is_symlink() && !dereference {\n  748 |                 // TODO: On most Unix systems, symlink permissions are ignored by the kernel,\n  749 |                 // so changing them has no effect. We skip this operation for compatibility.\n  750 |                 // Note that \"chmod without dereferencing\" effectively does nothing on symlinks.\n  751 |                 if self.verbose {\n  752 |                     println!(\n  753 |                         \"neither symbolic link {} nor referent has been changed\",\n  754 |                         file.quote()\n  755 |                     );\n  756 |                 }\n  757 |             } else {\n  758 |                 self.change_file(fperm, new_mode, file)?;\n  759 |             }\n  760 |             // if a permission would have been removed if umask was 0, but it wasn't because umask was not 0, print an error and fail\n  761 |             if (new_mode & !naively_expected_new_mode) != 0 {\n  762 |                 return Err(ChmodError::NewPermissions(\n  763 |                     file.into(),\n  764 |                     display_permissions_unix(new_mode, false),\n  765 |                     display_permissions_unix(naively_expected_new_mode, false),\n  766 |                 )\n  767 |                 .into());\n  768 |             }","lines":23}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"comm LineReader::read_line unconditionally pushes a line terminator onto buf, including at EOF when read_until returns 0 and buf is empty. This injects a spurious \"\\n\" (or \"\\0\") into an otherwise empty buffer. It is currently masked because callers gate on the returned byte count (na/nb != 0) and never read the buffer when the count is 0, but it is a latent trap: any future caller that inspects buf after a 0-length read will see phantom content.","fix":"Only append the terminator when bytes were actually read, e.g. guard with `if result.as_ref().is_ok_and(|&n| n > 0) && !buf.ends_with(&[line_ending])`.","locations":[{"ref":"src/uu/comm/src/comm.rs:83-96","code":"   83 |     fn read_line(&mut self, buf: &mut Vec<u8>) -> io::Result<usize> {\n   84 |         let line_ending = self.line_ending.into();\n   85 | \n   86 |         let result = match &mut self.input {\n   87 |             Input::Stdin(r) => r.read_until(line_ending, buf),\n   88 |             Input::FileIn(r) => r.read_until(line_ending, buf),\n   89 |         };\n   90 | \n   91 |         if !buf.ends_with(&[line_ending]) {\n   92 |             buf.push(line_ending);\n   93 |         }\n   94 | \n   95 |         result\n   96 |     }","lines":14}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"backup_dest copies the destination file with fs::copy for non-symlink backups (`fs::copy(dest, backup_path)`). fs::copy follows symlinks and copies contents/permissions but not ownership/xattrs/timestamps, so a backup created this way differs from the original in metadata. For directories fs::copy fails outright. The TODO comment acknowledges this should perhaps use copy_file. As a backup mechanism that may precede destructive overwrite, losing the backup metadata fidelity is a data-integrity concern.","fix":"Use rename where safe, or a full attribute-preserving copy for the backup, and handle the directory case.","locations":[{"ref":"src/uu/cp/src/cp.rs:1984-1994","code":" 1984 | /// Implements a simple backup copy for the destination file .\n 1985 | /// if `is_dest_symlink` flag is set to true dest will be renamed to `backup_path`\n 1986 | /// TODO: for the backup, should this function be replaced by `copy_file(...)`?\n 1987 | fn backup_dest(dest: &Path, backup_path: &Path, is_dest_symlink: bool) -> CopyResult<()> {\n 1988 |     if is_dest_symlink {\n 1989 |         fs::rename(dest, backup_path)?;\n 1990 |     } else {\n 1991 |         fs::copy(dest, backup_path)?;\n 1992 |     }\n 1993 |     Ok(())\n 1994 | }","lines":11}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"aligned_ancestors slices source_ancestors[1..n-1] and dest_ancestors[1..=k]. If source has only one component (n == 1), `n - 1 == 0` and the range 1..0 would panic (slice index start > end) / or for n==0 underflow. source.ancestors() always yields at least the path itself plus \"\" so n>=2 in normal use, but a source like an empty path or root could make n==1, panicking. This is reachable via --parents with unusual source paths.","fix":"Guard against source_ancestors.len() < 2 (and dest shorter than k) before slicing, returning an empty vec.","locations":[{"ref":"src/uu/cp/src/cp.rs:2196-2223","code":" 2196 | fn aligned_ancestors<'a>(source: &'a Path, dest: &'a Path) -> Vec<(&'a Path, &'a Path)> {\n 2197 |     // Collect the ancestors of each. For example, if `source` is\n 2198 |     // \"a/b/c\", then the ancestors are \"a/b/c\", \"a/b\", \"a/\", and \"\".\n 2199 |     let source_ancestors: Vec<&Path> = source.ancestors().collect();\n 2200 |     let dest_ancestors: Vec<&Path> = dest.ancestors().collect();\n 2201 | \n 2202 |     // For this particular application, we don't care about the null\n 2203 |     // path \"\" and we don't care about the full path (e.g. \"a/b/c\"),\n 2204 |     // so we exclude those.\n 2205 |     let n = source_ancestors.len();\n 2206 |     let source_ancestors = &source_ancestors[1..n - 1];\n 2207 | \n 2208 |     // Get the matching number of elements from the ancestors of the\n 2209 |     // destination path (for example, get \"d/a\" and \"d/a/b\").\n 2210 |     let k = source_ancestors.len();\n 2211 |     let dest_ancestors = &dest_ancestors[1..=k];\n 2212 | \n 2213 |     // Now we have two slices of the same length, so we zip them.\n 2214 |     let mut result = vec![];\n 2215 |     for (x, y) in source_ancestors\n 2216 |         .iter()\n 2217 |         .rev()\n 2218 |         .zip(dest_ancestors.iter().rev())\n 2219 |     {\n 2220 |         result.push((*x, *y));\n 2221 |     }\n 2222 |     result\n 2223 | }","lines":28}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"copy_file dangling-symlink protection special-cases std::env::var_os(\"POSIXLY_CORRECT\").is_none(): when POSIXLY_CORRECT is set, cp proceeds to write through a dangling dest symlink without the safety error. Reading process env on every file copy is also a per-file syscall-ish cost. More importantly the behavior flip is undocumented in the surrounding error message and could surprise users into following a dangling link.","fix":"Read POSIXLY_CORRECT once into Options at startup and document the behavior; verify it matches GNU semantics.","locations":[{"ref":"src/uu/cp/src/cp.rs:2483-2496","code":" 2483 |         let copy_contents = options.dereference(source_in_command_line) || !source_is_symlink;\n 2484 |         if copy_contents\n 2485 |             && !dest_target_exists\n 2486 |             && !matches!(\n 2487 |                 options.overwrite,\n 2488 |                 OverwriteMode::Clobber(ClobberMode::RemoveDestination)\n 2489 |             )\n 2490 |             && !is_symlink_loop(dest)\n 2491 |             && std::env::var_os(\"POSIXLY_CORRECT\").is_none()\n 2492 |         {\n 2493 |             return Err(CpError::Error(\n 2494 |                 translate!(\"cp-error-not-writing-dangling-symlink\", \"dest\" => dest.quote()),\n 2495 |             ));\n 2496 |         }","lines":14}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"create_dest_restrictive is opened with nofollow=false in the linux/other_unix copy_on_write helpers (fs_copy, sparse_copy, clone, copy_stream all pass false). The surrounding comments emphasize O_NOFOLLOW on the source to close a TOCTOU window (#10017), but the destination open deliberately follows symlinks. A path-swap that replaces dest with a symlink to an attacker-chosen file between the existence checks in copy_file and the open here can cause cp to write through to that target. The source side is protected but the dest side TOCTOU remains for the follow-existing-symlink case.","fix":"Where dest is not expected to be a pre-existing symlink, open it with O_NOFOLLOW | O_CREAT; only follow when GNU semantics specifically require writing through an existing dest symlink, and re-validate the inode after open.","locations":[{"ref":"src/uu/cp/src/platform/linux.rs:27-86","code":"   27 | fn fs_copy<P, Q>(source: P, dest: Q, source_nofollow: bool) -> std::io::Result<()>\n   28 | where\n   29 |     P: AsRef<Path>,\n   30 |     Q: AsRef<Path>,\n   31 | {\n   32 |     let mut src = open_source(source, source_nofollow)?;\n   33 |     let mut dst = create_dest_restrictive(dest, false)?;\n   34 |     std::io::copy(&mut src, &mut dst).map(|_| ())\n   35 | }\n   36 | \n   37 | /// The fallback behavior for [`clone`] on failed system call.\n   38 | #[derive(Clone, Copy)]\n   39 | enum CloneFallback {\n   40 |     /// Raise an error.\n   41 |     Error,\n   42 | \n   43 |     /// Use [`std::fs::copy`].\n   44 |     FSCopy,\n   45 | \n   46 |     /// Use [`sparse_copy`]\n   47 |     SparseCopy,\n   48 | \n   49 |     /// Use [`sparse_copy_without_hole`]\n   50 |     SparseCopyWithoutHole,\n   51 | }\n   52 | \n   53 | /// Type of method used for copying files\n   54 | #[derive(Clone, Copy)]\n   55 | enum CopyMethod {\n   56 |     /// Do a sparse copy\n   57 |     SparseCopy,\n   58 |     /// Use [`std::fs::copy`].\n   59 |     FSCopy,\n   60 |     /// Default (can either be [`CopyMethod::SparseCopy`] or [`CopyMethod::FSCopy`])\n   61 |     Default,\n   62 |     /// Use [`sparse_copy_without_hole`]\n   63 |     SparseCopyWithoutHole,\n   64 | }\n   65 | \n   66 | /// Use the Linux `ioctl_ficlone` API to do a copy-on-write clone.\n   67 | ///\n   68 | /// `fallback` controls what to do if the system call fails.\n   69 | fn clone<P>(source: P, dest: P, fallback: CloneFallback, nofollow: bool) -> std::io::Result<()>\n   70 | where\n   71 |     P: AsRef<Path>,\n   72 | {\n   73 |     let src_file = open_source(&source, nofollow)?;\n   74 |     let dst_file = create_dest_restrictive(&dest, false)?;\n   75 |     if ioctl_ficlone(dst_file, src_file).is_err() {\n   76 |         return match fallback {\n   77 |             CloneFallback::Error => Err(std::io::Error::last_os_error()),\n   78 |             CloneFallback::FSCopy => fs_copy(source, dest, nofollow),\n   79 |             CloneFallback::SparseCopy => sparse_copy(source, dest, nofollow),\n   80 |             CloneFallback::SparseCopyWithoutHole => {\n   81 |                 sparse_copy_without_hole(source, dest, nofollow)\n   82 |             }\n   83 |         };\n   84 |     }\n   85 |     Ok(())\n   86 | }","lines":60},{"ref":"src/uu/cp/src/platform/other_unix.rs:43-71","code":"   43 |     if source_is_stream {\n   44 |         let mut src_file = open_source(source, nofollow)\n   45 |             .map_err(|e| CpError::IoErrContext(e, context.to_owned()))?;\n   46 |         let mut dst_file = create_dest_restrictive(dest, false)\n   47 |             .map_err(|e| CpError::IoErrContext(e, context.to_owned()))?;\n   48 | \n   49 |         let dest_is_stream = is_stream(&dst_file.metadata()?);\n   50 |         if !dest_is_stream {\n   51 |             // `copy_stream` doesn't clear the dest file, if dest is not a stream, we should clear it manually.\n   52 |             dst_file.set_len(0)?;\n   53 |         }\n   54 | \n   55 |         buf_copy::copy_stream(&mut src_file, &mut dst_file)\n   56 |             .map_err(|_| std::io::Error::from(std::io::ErrorKind::Other))\n   57 |             .map_err(|e| CpError::IoErrContext(e, context.to_owned()))?;\n   58 | \n   59 |         return Ok(copy_debug);\n   60 |     }\n   61 | \n   62 |     // Replacement for fs::copy: restrictive 0o600 dest mode (#10011) and\n   63 |     // O_NOFOLLOW on the *source* under -P (#10017). The destination open\n   64 |     // intentionally does not use O_NOFOLLOW so that an existing symlink at\n   65 |     // dest is followed, matching GNU cp.\n   66 |     let mut src_file =\n   67 |         open_source(source, nofollow).map_err(|e| CpError::IoErrContext(e, context.to_owned()))?;\n   68 |     let mut dst_file = create_dest_restrictive(dest, false)\n   69 |         .map_err(|e| CpError::IoErrContext(e, context.to_owned()))?;\n   70 |     std::io::copy(&mut src_file, &mut dst_file)\n   71 |         .map_err(|e| CpError::IoErrContext(e, context.to_owned()))?;","lines":29}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"check_for_data reads metadata.blksize() bytes for the size==0 special case, but ignores the number of bytes actually read: `let _ = src_file.read(&mut buf)?` then scans the whole buf (initialized to zeros). If read returns fewer bytes than buf.len() (short read on a pipe/virtual file), the uninitialized-tail (here zero-filled) is scanned, which is harmless for zero detection but means a file whose only data is beyond the first blksize bytes is reported as having no data. The discarded read length makes the \"has data\" result unreliable for multi-block virtual files.","fix":"Use the returned read length to bound the slice scanned (`buf[..n].iter().any(...)`); optionally loop to read more for virtual files.","locations":[{"ref":"src/uu/cp/src/platform/linux.rs:97-102","code":"   97 |     // checks edge case of virtual files in /proc which have a size of zero but contains data\n   98 |     if size == 0 {\n   99 |         let mut buf: Vec<u8> = vec![0; metadata.blksize() as usize]; // Directly use metadata.blksize()\n  100 |         let _ = src_file.read(&mut buf)?;\n  101 |         return Ok((buf.iter().any(|&x| x != 0x0), size, 0));\n  102 |     }","lines":6}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"check_sparse_detection uses the heuristic blocks < size / 512 with integer division. For files where size is not a multiple of 512 the division truncates, so a file whose allocated blocks exactly match its rounded-down size can be misclassified at the boundary (e.g. size 1000 -> size/512 = 1, so a single-block 1000-byte file is treated as non-sparse even though 1000 bytes needs 2 x 512 logical blocks). This is a known crude heuristic but the truncating division skews it toward \"not sparse\".","fix":"Compare against size rounded up to the 512-byte block count, e.g. blocks * 512 < size, to avoid the truncation bias.","locations":[{"ref":"src/uu/cp/src/platform/linux.rs:108-117","code":"  108 | /// Checks whether a file is sparse i.e. it contains holes, uses the crude heuristic blocks < size / 512\n  109 | /// Reference:`<https://doc.rust-lang.org/std/os/unix/fs/trait.MetadataExt.html#tymethod.blocks>`\n  110 | fn check_sparse_detection(source: &Path, nofollow: bool) -> Result<bool, std::io::Error> {\n  111 |     let src_file = open_source(source, nofollow)?;\n  112 |     let metadata = src_file.metadata()?;\n  113 |     let size = metadata.size();\n  114 |     let blocks = metadata.blocks();\n  115 | \n  116 |     Ok(blocks < size / 512)\n  117 | }","lines":10}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The \"1-2 digits for hour offset\" comment is not enforced consistently. additional_hours is produced by parsing the entire remaining substring with chars.as_str().parse(), but the only length guard is s.len() > 3. A 2-digit value like 99 is accepted, and the digit-count is never actually capped at the documented 1-2 range in a meaningful way (e.g. it permits hour offsets far outside any real military-zone usage), feeding the DayDelta bug above.","fix":"Validate that the digit portion is at most 2 digits and within a sane range, or treat values that cross more than one day boundary explicitly (see the DayDelta finding).","locations":[{"ref":"src/uu/date/src/date.rs:251-259","code":"  251 |     // Parse optional digits (1-2 digits for hour offset)\n  252 |     let additional_hours: i32 = if let Some(rest) = chars.as_str().chars().next() {\n  253 |         if !rest.is_ascii_digit() {\n  254 |             return None;\n  255 |         }\n  256 |         chars.as_str().parse().ok()?\n  257 |     } else {\n  258 |         0\n  259 |     };","lines":9}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"parse_military_timezone_with_offset computes DayDelta as a single-day step (Same/Previous/Next), but when the additional hour offset is large the true UTC time can cross more than one day boundary. For input \"m99\" the length check (s.len() > 3) accepts it: tz_offset=12, additional_hours=99, so the true offset from local midnight is 99-12=87 hours (~3.6 days), yet day_delta only yields DayDelta::Next (advances exactly one day). The composed date is therefore off by ~2 days. The same single-step limitation applies to other letter/offset combinations whose magnitude exceeds 24h.","fix":"Compute the number of whole days to shift from (additional_hours - tz_offset).div_euclid(24) and apply that many days to the base date, instead of a one-of-three DayDelta enum. Alternatively, restrict additional_hours to a single digit (GNU only allows a small offset) and reject 2-digit values that overflow a day.","locations":[{"ref":"src/uu/date/src/date.rs:270-278","code":"  270 |     let day_delta = match additional_hours - tz_offset {\n  271 |         h if h < 0 => DayDelta::Previous,\n  272 |         h if h >= 24 => DayDelta::Next,\n  273 |         _ => DayDelta::Same,\n  274 |     };\n  275 | \n  276 |     // Calculate total hours: midnight (0) + tz_offset + additional_hours\n  277 |     // Midnight in timezone X converted to UTC\n  278 |     let hours_from_midnight = (0 - tz_offset + additional_hours).rem_euclid(24);","lines":9}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In date.rs uumain, the OPT_ISO_8601 default uses iter.next().unwrap_or(&DATE.to_string()) which allocates a temporary String(\"date\") and takes a reference to it inside unwrap_or; this borrows a value that is dropped at the end of the statement only because .as_str().into() converts immediately. It works but relies on temporary-lifetime extension and is fragile/confusing; clippy may flag the needless allocation on the default path.","fix":"Use unwrap_or(DATE) with a &str default (DATE is already &str) instead of &DATE.to_string(): map(|mut iter| iter.next().map(String::as_str).unwrap_or(DATE).into()).","locations":[{"ref":"src/uu/date/src/date.rs:340-341","code":"  340 |         .get_many::<String>(OPT_ISO_8601)\n  341 |         .map(|mut iter| iter.next().unwrap_or(&DATE.to_string()).as_str().into())","lines":2}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"For Format::Resolution / DateSource::Resolution the date is zoned with TimeZone::system(), and FileMtime uses TimeZone::try_system().unwrap_or(TimeZone::UTC). When -u/--utc is given, the later loop re-zones with with_time_zone(TimeZone::UTC) for the display path, but the resolution format \"%s.%N\" is timezone-independent so this is fine; however the inconsistent use of system() (which can panic on a broken tz) vs try_system() across these two arms is an avoidable inconsistency.","fix":"Use TimeZone::try_system().unwrap_or(TimeZone::UTC) consistently in both the FileMtime and Resolution arms to avoid a potential panic from TimeZone::system().","locations":[{"ref":"src/uu/date/src/date.rs:526-528","code":"  526 |                 )\n  527 |             })?;\n  528 |             let date = ts.to_zoned(TimeZone::try_system().unwrap_or(TimeZone::UTC));","lines":3},{"ref":"src/uu/date/src/date.rs:532-534","code":"  532 |         DateSource::Resolution => {\n  533 |             let resolution = get_clock_resolution();\n  534 |             let date = resolution.to_zoned(TimeZone::system());","lines":3}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In apply_modifiers the swap-case (#) branch lowercases when every char is non-alpha-or-uppercase and uppercases only when not every char is non-alpha-or-lowercase. For an all-numeric value (e.g. \"%#m\" -> \"06\") the first predicate is true, so to_lowercase() runs (a no-op), but for mixed/empty results the two predicates can both be false, leaving the string unchanged. The logic is convoluted and the # flag on numeric specifiers silently does nothing rather than being rejected, diverging subtly from GNU which applies case only to text fields.","fix":"Apply case transforms only for text specifiers (is_text_specifier), and simplify the swap-case to a per-character case flip, which is what GNU # actually does.","locations":[{"ref":"src/uu/date/src/format_modifiers.rs:412-424","code":"  412 |     } else if swap_case {\n  413 |         if result\n  414 |             .chars()\n  415 |             .all(|c| !c.is_alphabetic() || c.is_uppercase())\n  416 |         {\n  417 |             result = result.to_lowercase();\n  418 |         } else if !result\n  419 |             .chars()\n  420 |             .all(|c| !c.is_alphabetic() || c.is_lowercase())\n  421 |         {\n  422 |             result = result.to_uppercase();\n  423 |         }\n  424 |     }","lines":13}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ensure_timezone_in_format inserts \"%Z \" before the first %Y/%y, but if the locale format already contains %z (lowercase numeric offset) and not %Z, it still appends/inserts a literal %Z, producing duplicated timezone output (numeric offset plus abbreviation). The check only looks for \"%Z\", not \"%z\".","fix":"Treat both %Z and %z as already containing timezone info: if format.contains(\"%Z\") || format.contains(\"%z\") return unchanged.","locations":[{"ref":"src/uu/date/src/locale.rs:93-109","code":"   93 |     fn ensure_timezone_in_format(format: &str) -> String {\n   94 |         if format.contains(\"%Z\") {\n   95 |             return format.to_string();\n   96 |         }\n   97 | \n   98 |         // Try to insert %Z before year specifier (%Y or %y)\n   99 |         if let Some(pos) = format.find(\"%Y\").or_else(|| format.find(\"%y\")) {\n  100 |             let mut result = String::with_capacity(format.len() + 3);\n  101 |             result.push_str(&format[..pos]);\n  102 |             result.push_str(\"%Z \");\n  103 |             result.push_str(&format[pos..]);\n  104 |             result\n  105 |         } else {\n  106 |             // No year found, append %Z at the end\n  107 |             format.to_string() + \" %Z\"\n  108 |         }\n  109 |     }","lines":17}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `Source::skip` for `StdinFile`, after a successful seek the code checks `if pos > file_len` and prints \"cannot skip to specified offset\", then still returns `Ok(n)` (the requested amount) rather than the bytes actually skipped. `file_len` is fetched as `f.metadata().map_or(u64::MAX, ...)`; if metadata fails it defaults to u64::MAX, suppressing the warning entirely. Returning `Ok(n)` (not the real position) can mis-report records when seeking past EOF on a seekable stdin.","fix":"Return the actual seeked distance (or clamp to file_len) instead of the requested `n`, and treat a metadata failure as not-skippable rather than silently assuming u64::MAX.","locations":[{"ref":"src/uu/dd/src/dd.rs:261-273","code":"  261 |                 // Get file length before seeking to avoid race condition\n  262 |                 let file_len = f.metadata().as_ref().map_or(u64::MAX, Metadata::len);\n  263 |                 // Try seek first; fall back to read if not seekable\n  264 |                 match n.try_into().ok().map(|n| f.seek(SeekFrom::Current(n))) {\n  265 |                     Some(Ok(pos)) => {\n  266 |                         if pos > file_len {\n  267 |                             show_error!(\n  268 |                                 \"{}\",\n  269 |                                 translate!(\"dd-error-cannot-skip-offset\", \"file\" => \"standard input\")\n  270 |                             );\n  271 |                         }\n  272 |                         Ok(n)\n  273 |                     }","lines":13}]},{"id":"LOGIC_62","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `numbers::SuffixType::base_and_suffix`, the comparison `bases[i + 1] - bases[i] < n` tests the *gap* between successive bases rather than `bases[i + 1] <= n`. This only coincidentally produces correct suffix selection because each base is large relative to its predecessor (gap ~= bases[i+1]). It is misleading and could select the wrong suffix near boundary values, and it is the same expression that risks the OOB noted above.","fix":"Compare against the next base directly: `while i + 1 < suffixes.len() && bases[i + 1] <= n { i += 1; }`.","locations":[{"ref":"src/uu/dd/src/numbers.rs:27","code":"   27 |         while bases[i + 1] - bases[i] < n && i < suffixes.len() {","lines":1}]},{"id":"LOGIC_63","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`to_magnitude_and_suffix` evaluates `bases[i + 1] - bases[i]` before the `i < suffixes.len()`\nbound in the loop condition `while bases[i + 1] - bases[i] < n && i < suffixes.len()`. It\nhappens to stay in-bounds today only because `bases` has 11 elements and `suffixes` has 9, so\n`i` stops at 9 and `bases[10]` is the last valid index. This is fragile: the index bound that\nkeeps it safe is on the right-hand side of the `&&` and is checked second, while the array\naccess is on the left. Any change to the suffix/base table lengths could turn this into an\nout-of-bounds panic. The comparison `bases[i+1] - bases[i] < n` is also a non-obvious\nexpression (it relies on the gap between consecutive powers approximating the next power).","fix":"Reorder the condition so the bound is checked first, e.g.\n`while i + 1 < suffixes.len() && bases[i + 1] - bases[i] < n`, and consider a clearer\ncomparison against the threshold value.","locations":[{"ref":"src/uu/df
