 Comment","severity":"low","easy":false,"description":"The doc comment on need_copy states \"Crashes the program if a nonexistent owner or group is specified in _b_.\" This is stale: behavior() now falls back to parsing the owner/group as a numeric id and only returns an InvalidUser/InvalidGroup error (no crash). The comment misleads readers into thinking need_copy can abort.","fix":"Remove or rewrite the \"# Errors / Crashes the program\" note to reflect that invalid users/groups are rejected earlier in behavior().","locations":[{"ref":"src/uu/install/src/install.rs:1212-1229","code":" 1212 | /// Return true if a file is necessary to copy. This is the case when:\n 1213 | ///\n 1214 | /// - _from_ or _to_ is nonexistent;\n 1215 | /// - either file has a sticky bit or set\\[ug\\]id bit, or the user specified one;\n 1216 | /// - either file isn't a regular file;\n 1217 | /// - the sizes of _from_ and _to_ differ;\n 1218 | /// - _to_'s owner differs from intended; or\n 1219 | /// - the contents of _from_ and _to_ differ.\n 1220 | ///\n 1221 | /// # Parameters\n 1222 | ///\n 1223 | /// _from_ and _to_, if existent, must be non-directories.\n 1224 | ///\n 1225 | /// # Errors\n 1226 | ///\n 1227 | /// Crashes the program if a nonexistent owner or group is specified in _b_.\n 1228 | ///\n 1229 | fn need_copy(from: &Path, to: &Path, b: &Behavior) -> bool {","lines":18}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Several format_f* helper comments mislabel branches as \"subnormal numbers\". In format_float the final `else` branch (general exponential formatting for large/small normal magnitudes) is annotated \"// subnormal numbers\", and the earlier `format_f64_exp(f, width)` call for non-normal finite values is also labeled \"// subnormal numbers\". These branches handle normal numbers outside the fixed-notation range, not subnormals; the misleading comments make the precision/exponent logic harder to reason about.","fix":"Replace the \"subnormal numbers\" comments with accurate descriptions (e.g. \"values needing exponential notation\" / \"subnormal/denormal special case\" only where genuinely subnormal).","locations":[{"ref":"src/uu/od/src/prn_float.rs:192-208","code":"  192 |         return format_f64_exp(f, width); // subnormal numbers\n  193 |     }\n  194 | \n  195 |     let mut l = f.abs().log10().floor() as i32;\n  196 | \n  197 |     let r = 10f64.powi(l);\n  198 |     if (f > 0.0 && r > f) || (f < 0.0 && -r < f) {\n  199 |         // fix precision error\n  200 |         l -= 1;\n  201 |     }\n  202 | \n  203 |     if l >= 0 && l <= (precision as i32 - 1) {\n  204 |         format!(\"{f:width$.dec$}\", dec = (precision - 1) - l as usize)\n  205 |     } else if l == -1 {\n  206 |         format!(\"{f:width$.precision$}\")\n  207 |     } else {\n  208 |         format_f64_exp_precision(f, width, precision - 1) // subnormal numbers","lines":17}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The comment \"// close stdin by dropping it\" is misleading/incorrect: the following statement (`self.shell_process.stdin.as_mut()`) does not drop or close stdin, it merely creates a temporary mutable borrow. The comment documents behavior the code does not perform.","fix":"Either fix the code to actually take/drop the owned stdin and keep the comment, or correct the comment to match reality.","locations":[{"ref":"src/uu/split/src/platform/unix.rs:104-107","code":"  104 |         {\n  105 |             // close stdin by dropping it\n  106 |             let _stdin = self.shell_process.stdin.as_mut();\n  107 |         }","lines":4}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment on `BytesChunk::from_chunk` says \"If the offset is larger or equal to `chunk.lines`\nthen a new empty `BytesChunk` is returned.\" `BytesChunk` has no `lines` field; the code compares\nagainst `chunk.bytes` (line 161). The comment is copy-pasted from the line-oriented variant and is\nmisleading.","fix":"Change 'chunk.lines' to 'chunk.bytes' in the comment.","locations":[{"ref":"src/uu/tail/src/chunks.rs:135-138","code":"  135 |     /// Create a new chunk from an existing chunk. The new chunk's buffer will be copied from the\n  136 |     /// old chunk's buffer, copying the slice `[offset..old_chunk.bytes]` into the new chunk's\n  137 |     /// buffer but starting at 0 instead of offset. If the offset is larger or equal to\n  138 |     /// `chunk.lines` then a new empty `BytesChunk` is returned.","lines":4}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment for compute_number_width / the Inputs::Files0From branch says \"[Inputs::Files0From], [MINIMUM_WIDTH] is returned\", but the code returns 1 for the Files0From case, not MINIMUM_WIDTH. The comment contradicts the implementation.","fix":"Update the doc comment to say that Files0From returns a width of 1, or change the code if MINIMUM_WIDTH was intended.","locations":[{"ref":"src/uu/wc/src/wc.rs:713","code":"  713 | /// For [`Inputs::Files0From`], [`MINIMUM_WIDTH`] is returned.","lines":1},{"ref":"src/uu/wc/src/wc.rs:729","code":"  729 |         Inputs::Files0From(_) => 1,","lines":1}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment claims start is updated \"if we have a carry, or if inc > start\". `inc` is the increment byte slice and `start` is a buffer index, so \"inc > start\" is a meaningless/incorrect comparison. The actual condition is that start shrinks when the incremented number needs more digits than the current [start..end] region (i.e. when inc is longer than the current number, or a carry overflows it). The same wrong phrasing is duplicated in fast_inc_one.","fix":"Reword to: \"Updates `start` if the result needs more digits than the current [start..end] region (carry overflow or inc longer than the current number).\"","locations":[{"ref":"src/uucore/src/lib/features/fast_inc.rs:11","code":"   11 | /// Updates `start` if we have a carry, or if inc > start.","lines":1},{"ref":"src/uucore/src/lib/features/fast_inc.rs:73","code":"   73 | /// Updates `start` if we have a carry, or if inc > start.","lines":1}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The comment on lines 58-60 states 'If locale parsing failed, parse the encoding part of the locale', but the code does the opposite: the encoding is only inspected when parsing SUCCEEDED (locale != DEFAULT_LOCALE) or when bcp47 == \"C\". The comment describes inverted logic and is misleading to future maintainers.","fix":"Rewrite the comment to reflect that the encoding suffix is only parsed when the locale parsed successfully (or for the C special case), e.g. 'Only honor the encoding suffix when the locale name parsed to a real locale.'","locations":[{"ref":"src/uucore/src/lib/features/i18n/mod.rs:58-69","code":"   58 |             // If locale parsing failed, parse the encoding part of the\n   59 |             // locale. Treat the special case of the given locale being \"C\"\n   60 |             // which becomes the default locale.\n   61 |             let encoding = if (locale != DEFAULT_LOCALE || bcp47 == \"C\")\n   62 |                 && split.next().is_some_and(|enc| {\n   63 |                     let lower = enc.to_lowercase();\n   64 |                     lower == \"utf-8\" || lower == \"utf8\"\n   65 |                 }) {\n   66 |                 UEncoding::Utf8\n   67 |             } else {\n   68 |                 UEncoding::Ascii\n   69 |             };","lines":12}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The `Digest::output_bits()` implementations for the legacy algorithms report values that do not match the\nactual emitted output. `Bsd::output_bits` returns 128 (line 334-336) for a 16-bit checksum, `SysV` returns\n512 (line 367-369) for a 16-bit checksum, and `Crc` returns 256 (line 262-264) for a 32-bit value. These\ntypes override `result()` so the wrong value is not currently used for buffer sizing, but the default\n`result()`/`output_bytes()` path (`vec![0; output_bytes()]` then `hash_finalize`) would `copy_from_slice`\na 2-byte value into a much larger buffer and panic if ever invoked. The numbers are misleading and a latent\nhazard.","fix":"Make `output_bits()` return the true output width (16 for Bsd/SysV, 32 for Crc), or document why these\nreturn block-size-related values; ensure the default `result()` path would not be misused.","locations":[{"ref":"src/uucore/src/lib/features/sum.rs:334-336","code":"  334 |     fn output_bits(&self) -> usize {\n  335 |         128\n  336 |     }","lines":3},{"ref":"src/uucore/src/lib/features/sum.rs:367-369","code":"  367 |     fn output_bits(&self) -> usize {\n  368 |         512\n  369 |     }","lines":3},{"ref":"src/uucore/src/lib/features/sum.rs:262-264","code":"  262 |     fn output_bits(&self) -> usize {\n  263 |         256\n  264 |     }","lines":3}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"determine_update_mode doc comment states that \"the `ReplaceAll` mode is returned unconditionally\" when the required options are absent. There is no `ReplaceAll` variant in UpdateMode; the function actually returns UpdateMode::All. The comment is also imprecise: All is returned only in the no-option branch, not unconditionally.","fix":"Replace \"ReplaceAll\" with \"All\" and clarify that All is the default when neither --update nor -u is present.","locations":[{"ref":"src/uucore/src/lib/features/update_control.rs:104-105","code":"  104 | /// from [`arguments::update()`] or [`arguments::update_no_args()`]. Otherwise\n  105 | /// the `ReplaceAll` mode is returned unconditionally.","lines":2}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment for post_process_manpage claims it 'Removes trailing whitespace from all lines' and 'Fixes the TH header by uppercasing command names and adding a proper date', but the bullet also says it removes the date, while the code actually *replaces* the existing TH trailing content with a fresh quoted date (it does not merely remove it). The first test's comment (line 712) even says 'date is removed', which contradicts the expected output that adds a date. Minor doc/comment drift that can mislead future readers about behavior.","fix":"Reword the comments to state that the TH header's trailing fields are replaced with `1 \"<date>\"`, not that the date is removed.","locations":[{"ref":"src/bin/uudoc.rs:39-45","code":"   39 | /// This function:\n   40 | /// - Fixes the TH header by uppercasing command names and adding a proper date\n   41 | /// - Removes trailing whitespace from all lines\n   42 | /// - Fixes redundant .br paragraph macros that cause mandoc warnings\n   43 | /// - Removes .br before empty lines to avoid \"br before sp\" warnings\n   44 | /// - Removes .br after empty lines to avoid \"br after sp\" warnings\n   45 | /// - Fixes escape sequences (e.g., \\\\\\\\0 to \\\\0) to avoid \"undefined escape\" warnings","lines":7},{"ref":"src/bin/uudoc.rs:711-712","code":"  711 |     fn test_post_process_manpage_fixes_th_header() {\n  712 |         // Test that command names are uppercased and date is removed","lines":2}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"In cat, the comment for `LINE_NUMBER_BUF_SIZE` claims 32 digits is \"enough for billions of universe lifetimes\"; the buffer is 32 bytes total but holds the leading spaces, the digits, and the trailing tab, so the usable digit capacity is less than 32. The fast_inc logic moves `print_start` so overflow past the initial width is handled, but the comment overstates the fixed-size guarantee.","fix":"Clarify the comment to reflect that the buffer grows leftward via fast_inc and 32 bytes is simply a generous fixed allocation.","locations":[{"ref":"src/uu/cat/src/cat.rs:26-29","code":"   26 | // Allocate 32 digits for the line number.\n   27 | // An estimate is that we can print about 1e8 lines/seconds, so 32 digits\n   28 | // would be enough for billions of universe lifetimes.\n   29 | const LINE_NUMBER_BUF_SIZE: usize = 32;","lines":4}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doctest-style example comment for `ProgUpdate::write_io_lines` shows expected output `b\"1+2 records in\\n3 truncated records\\n4+5 records out\\n\"` (truncated-records line between in and out), but the actual implementation writes read_stat, then write_stat, then the truncated-records line last. The real ordering (verified by test_prog_update_write_io_lines) is `1+2 records in\\n4+5 records out\\n3 truncated records\\n`. The doc comment is wrong about ordering.","fix":"Update the example comment to match the actual order: records in, records out, then truncated records.","locations":[{"ref":"src/uu/dd/src/progress.rs:78-98","code":"   78 |     /// ```rust,ignore\n   79 |     /// use std::io::Cursor;\n   80 |     /// use std::time::Duration;\n   81 |     /// use crate::progress::{ProgUpdate, ReadStat, WriteStat};\n   82 |     ///\n   83 |     /// let read_stat = ReadStat::new(1, 2, 3, 999);\n   84 |     /// let write_stat = WriteStat::new(4, 5, 6);\n   85 |     /// let duration = Duration::new(789, 0);\n   86 |     /// let prog_update = ProgUpdate {\n   87 |     ///     read_stat,\n   88 |     ///     write_stat,\n   89 |     ///     duration,\n   90 |     /// };\n   91 |     ///\n   92 |     /// let mut cursor = Cursor::new(vec![]);\n   93 |     /// prog_update.write_io_lines(&mut cursor).unwrap();\n   94 |     /// assert_eq!(\n   95 |     ///     cursor.get_ref(),\n   96 |     ///     b\"1+2 records in\\n3 truncated records\\n4+5 records out\\n\"\n   97 |     /// );\n   98 |     /// ```","lines":21},{"ref":"src/uu/dd/src/progress.rs:99-110","code":"   99 |     fn write_io_lines(&self, w: &mut impl Write) -> std::io::Result<()> {\n  100 |         self.read_stat.report(w)?;\n  101 |         self.write_stat.report(w)?;\n  102 |         match self.read_stat.records_truncated {\n  103 |             0 => {}\n  104 |             count => {\n  105 |                 let message = translate!(\"dd-progress-truncated-record\", \"count\" => count);\n  106 |                 writeln!(w, \"{message}\")?;\n  107 |             }\n  108 |         }\n  109 |         Ok(())\n  110 |     }","lines":12}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The comment block above `du_regular` states it is \"Only used on non-Linux platforms\" and\n\"Used on non-Linux platforms and as fallback for symlinks on Linux\". This is misleading: on\nLinux/Unix `du_regular` is the path taken whenever `-L`/`--dereference` is used (the entire\n`Deref::All` traversal), not merely a \"fallback for symlinks\". The function is the primary\ndereferencing traversal on all platforms.","fix":"Update the comment to reflect that `du_regular` is used on non-Unix platforms and for the\n`-L`/`--dereference` (Deref::All) case on Unix.","locations":[{"ref":"src/uu/du/src/du.rs:565-568","code":"  565 | // this takes `my_stat` to avoid having to stat files multiple times.\n  566 | // Only used on non-Linux platforms\n  567 | // Regular traversal using std::fs\n  568 | // Used on non-Linux platforms and as fallback for symlinks on Linux","lines":4}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"A stale leftover debugging comment `// BUG?  printing egid={euid} ?` sits above the `egid`\nprint block. The code is in fact correct (it prints `egid={egid}` using the egid value), so the\ncomment is misleading and should be removed.","fix":"Delete the misleading `// BUG?` comment.","locations":[{"ref":"src/uu/id/src/id.rs:680","code":"  680 |         // BUG?  printing egid={euid} ?","lines":1}]},{"id":"CMT_17","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment in `write_line` claims it writes \"prefix bytes + line bytes + newline\", but the function only writes the line bytes and a newline; there is no prefix handling here (the prefix/padding is written separately by the caller in `nl`). The comment is misleading.","fix":"Update the comment to \"Write line bytes followed by a newline.\" to match the implementation.","locations":[{"ref":"src/uu/nl/src/nl.rs:383-387","code":"  383 | /// Helper to write: prefix bytes + line bytes + newline\n  384 | fn write_line(writer: &mut impl Write, line: &[u8]) -> io::Result<()> {\n  385 |     writer.write_all(line)?;\n  386 |     writeln!(writer)\n  387 | }","lines":5}]},{"id":"CMT_18","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"In format_f32 the doc comment states \"always returns a string of 14 characters\", but the function uses width 15 (and format_float pads to width); the returned strings in the tests are 15 characters wide (e.g. \"      1.0000000\" is 15). The documented length is off by one and does not match the actual padding width.","fix":"Correct the comment to state the actual width (15) or describe the width as the configured `width` constant.","locations":[{"ref":"src/uu/od/src/prn_float.rs:166-178","code":"  166 | /// formats float with 8 significant digits, eg 12345678 or -1.2345678e+12\n  167 | /// always returns a string of 14 characters\n  168 | fn format_f32(f: f32) -> String {\n  169 |     let width: usize = 15;\n  170 |     let precision: usize = 8;\n  171 | \n  172 |     if f.classify() == FpCategory::Subnormal {\n  173 |         // subnormal numbers will be normal as f64, so will print with a wrong precision\n  174 |         format_f32_exp(f, width) // subnormal numbers\n  175 |     } else {\n  176 |         format_float(f64::from(f), width, precision)\n  177 |     }\n  178 | }","lines":13}]},{"id":"CMT_19","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on `ascii_case_insensitive_cmp` says \"We upper each byte on the\nfly so that binary input (including NUL) stays untouched\" - but `fold` calls\n`to_ascii_uppercase`, which does transform ASCII letters; only non-letter bytes\nare untouched. The phrase \"stays untouched\" is misleading about what folding\ndoes to the comparison.","fix":"Reword to clarify that only the comparison key is folded (ASCII letters\nupper-cased) while non-ASCII/NUL bytes pass through unchanged and the original\nline bytes are never mutated.","locations":[{"ref":"src/uu/sort/src/sort.rs:2814-2821","code":" 2814 | /// Compare two byte slices in ASCII case-insensitive order without allocating.\n 2815 | /// We upper each byte on the fly so that binary input (including `NUL`) stays\n 2816 | /// untouched and we avoid locale-sensitive routines such as `strcasecmp`.\n 2817 | fn ascii_case_insensitive_cmp(a: &[u8], b: &[u8]) -> Ordering {\n 2818 |     #[inline]\n 2819 |     fn fold(byte: u8) -> u8 {\n 2820 |         byte.to_ascii_uppercase()\n 2821 |     }","lines":8}]},{"id":"CMT_20","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on `parse_rows_cols` says it \"Returns `None` if parsing fails or value exceeds\nu32::MAX\", but the code parses into `u64` and rejects values that do not fit in `u32`\n(`u32::try_from(n).is_ok()`). So the real bound is `> u32::MAX`, not `u64`; the phrase \"exceeds\nu32::MAX\" is correct but the surrounding text implying it parses u32 then wraps is slightly\ninconsistent with the u64 parse. Minor wording mismatch with the implementation.","fix":"Reword the comment to state it parses as u64 and rejects anything that does not fit in u32 before\nwrapping to u16, so the doc matches the code.","locations":[{"ref":"src/uu/stty/src/stty.rs:501-510","code":"  501 | /// Parse an integer with hex (0x/0X) and octal (0) prefix support, wrapping to u16.\n  502 | ///\n  503 | /// GNU stty uses an unsigned 32-bit integer for row/col sizes, then wraps to 16 bits.\n  504 | /// Returns `None` if parsing fails or value exceeds u32::MAX.\n  505 | fn parse_rows_cols(arg: &str) -> Option<u16> {\n  506 |     u64::extended_parse(arg)\n  507 |         .ok()\n  508 |         .filter(|&n| u32::try_from(n).is_ok())\n  509 |         .map(|n| (n % (u16::MAX as u64 + 1)) as u16)\n  510 | }","lines":10}]},{"id":"CMT_21","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"In test `integers`, the doc comment says \"`b` is the left hand side\" for the `b` parameter, but `b` is the right-hand side (only `a` is the left-hand side). Copy-paste error in the doc comment.","fix":"Change the second line of the comment to \"`b` is the right hand side\".","locations":[{"ref":"src/uu/test/src/test.rs:181-184","code":"  181 | /// Operations to compare integers\n  182 | /// `a` is the left hand side\n  183 | /// `b` is the left hand side\n  184 | /// `op` the operation (ex: -eq, -lt, etc)","lines":4}]},{"id":"CMT_22","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on `wait_or_kill_process` states \"If the child process terminates within the given time period and `preserve_status` is `false`, then 124 is returned\" and \"If the child does not terminate within the time period, then 137 is returned\". The 124 claim contradicts the actual code path that returns `CommandTimedOut` (124) only when preserve_status is false, and the 137 claim is unconditional regardless of preserve_status, which the function's own preserve_status parameter contradicts (see related logic finding).","fix":"Rewrite the docstring to match actual behavior (and fix the behavior so preserve_status is honored on the kill path).","locations":[{"ref":"src/uu/timeout/src/timeout.rs:277-296","code":"  277 | /// Wait for a child process and send a kill signal if it does not terminate.\n  278 | ///\n  279 | /// This function waits for the child `process` for the time period\n  280 | /// given by `duration`. If the child process does not terminate\n  281 | /// within that time, we send the `SIGKILL` signal to it. If `verbose`\n  282 | /// is `true`, then a message is printed to `stderr` when that\n  283 | /// happens.\n  284 | ///\n  285 | /// If the child process terminates within the given time period and\n  286 | /// `preserve_status` is `true`, then the status code of the child\n  287 | /// process is returned. If the child process terminates within the\n  288 | /// given time period and `preserve_status` is `false`, then 124 is\n  289 | /// returned. If the child does not terminate within the time period,\n  290 | /// then 137 is returned. Finally, if there is an error while waiting\n  291 | /// for the child process to terminate, then 124 is returned.\n  292 | ///\n  293 | /// # Errors\n  294 | ///\n  295 | /// If there is a problem sending the `SIGKILL` signal or waiting for\n  296 | /// the process after that signal is sent.","lines":20}]},{"id":"CMT_23","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"In the format module, the doc comments mis-describe lengths/contents: YYYYMMDDHHMMSS is commented \"%Y-%m-%d %H:%M:%S.%SS 12 chars\" but the constant is \"%Y-%m-%d %H:%M:%S.%f\" and is far more than 12 chars; YYYYMMDDHHMMS is commented \"12 chars\" but is \"%Y-%m-%d %H:%M:%S\" (17 chars). The \"%SS\" notation is also not a real specifier. These comments are misleading.","fix":"Correct the comments to reflect the actual format strings and lengths, and remove the bogus \"%SS\" notation.","locations":[{"ref":"src/uu/touch/src/touch.rs:123-126","code":"  123 |     // \"%Y-%m-%d %H:%M:%S.%SS\" 12 chars\n  124 |     pub(crate) const YYYYMMDDHHMMSS: &str = \"%Y-%m-%d %H:%M:%S.%f\";\n  125 |     // \"%Y-%m-%d %H:%M:%S\" 12 chars\n  126 |     pub(crate) const YYYYMMDDHHMMS: &str = \"%Y-%m-%d %H:%M:%S\";","lines":4}]},{"id":"CMT_24","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment \"-b doesn't ignores the VERSION_CONTROL environment variable\" has a\ndouble-negative/grammar error; the test actually asserts -b DOES honor the env var.","fix":"Reword to \"-b does not ignore the VERSION_CONTROL environment variable\".","locations":[{"ref":"src/uucore/src/lib/features/backup_control.rs:601","code":"  601 |     // -b doesn't ignores the \"VERSION_CONTROL\" environment variable","lines":1}]},{"id":"CMT_25","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment says \"Vary line length slightly for realism\" implying lines get both longer and shorter than avg_line_length. The expression `avg_line_length + (line_num % 40).saturating_sub(20)` only ever adds 0..=19 (the saturating_sub clamps the negative half to 0), so line length is never reduced below avg_line_length and is biased upward; it does not vary symmetrically as the comment suggests.","fix":"Either compute a signed offset (e.g. `avg_line_length as isize + ((line_num % 40) as isize - 20)` clamped to >=1) to vary both directions, or fix the comment to state that length only increases.","locations":[{"ref":"src/uucore/src/lib/features/benchmark.rs:88-89","code":"   88 |             // Vary line length slightly for realism\n   89 |             let line_length = avg_line_length + (line_num % 40).saturating_sub(20);","lines":2}]},{"id":"CMT_26","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on ExtendedParserError::Underflow uses `//` line comments (lines 120-121) instead\nof `///` doc comments, unlike the other variants which use `///`. As written the comment does not\ndocument the variant. Minor but inconsistent and the rustdoc for the variant is silently missing.","fix":"Change the two `//` lines to `///` so the Underflow variant is documented like the others.","locations":[{"ref":"src/uucore/src/lib/features/parser/num_parser.rs:120-122","code":"  120 |     // The value has underflowed the float storage (and is now 0.0 or -0.0).\n  121 |     // Does not apply to integer parsing.\n  122 |     Underflow(T),","lines":3}]},{"id":"CMT_27","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment \"Only return true  we're about to \"accidentally\" recurse on \"/\".\" in the\ntest is grammatically broken (missing \"if\") and a duplicated/garbled version of the\ncomment above it; minor, but it obscures intent of test_symlink_no_slash.","fix":"Reword to \"Only return true if we're about to accidentally recurse on '/'.\"","locations":[{"ref":"src/uucore/src/lib/features/perms.rs:1071","code":" 1071 |         // Only return true  we're about to \"accidentally\" recurse on \"/\".","lines":1}]},{"id":"CMT_28","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on `UUsageError` reads \"Wrapper type around [`std::io::Error`].\" but the\nstruct contains only a `code: i32` and a `message: String` and has nothing to do with\n`std::io::Error`. This is a copy-paste of the `UIoError` doc comment (which is itself also\nduplicated). Misleading documentation for a public type.","fix":"Replace the comment with an accurate description, e.g. \"A usage error type with an exit code\nand a message that prints a short usage hint.\"","locations":[{"ref":"src/uucore/src/lib/mods/error.rs:322-330","code":"  322 | /// Wrapper type around [`std::io::Error`].\n  323 | #[derive(Debug)]\n  324 | pub struct UUsageError {\n  325 |     /// Exit code of the error.\n  326 |     pub code: i32,\n  327 | \n  328 |     /// Error message.\n  329 |     pub message: String,\n  330 | }","lines":9}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"dir.rs and vdir.rs are byte-for-byte identical in their uumain bodies except for the default format applied (`Format::Columns` vs `Format::Long`) and a comment. The whole \"detect whether the user overrode quoting/format style, build Config, apply defaults, collect locs, call list\" block is duplicated.","fix":"Factor the shared logic into a helper in uu_ls (e.g. `run_dir_like(matches, default_format)`) that both dir and vdir call with their respective default Format.","locations":[{"ref":"src/uu/dir/src/dir.rs:18-57","code":"   18 |     let mut default_quoting_style = false;\n   19 |     let mut default_format_style = false;\n   20 | \n   21 |     // We check if any options on formatting or quoting style have been given.\n   22 |     // If not, we will use dir default formatting and quoting style options\n   23 | \n   24 |     if !matches.contains_id(options::QUOTING_STYLE)\n   25 |         && !matches.get_flag(options::quoting::C)\n   26 |         && !matches.get_flag(options::quoting::ESCAPE)\n   27 |         && !matches.get_flag(options::quoting::LITERAL)\n   28 |     {\n   29 |         default_quoting_style = true;\n   30 |     }\n   31 |     if !matches.contains_id(options::FORMAT)\n   32 |         && !matches.get_flag(options::format::ACROSS)\n   33 |         && !matches.get_flag(options::format::COLUMNS)\n   34 |         && !matches.get_flag(options::format::COMMAS)\n   35 |         && !matches.get_flag(options::format::LONG)\n   36 |         && !matches.get_flag(options::format::LONG_NO_GROUP)\n   37 |         && !matches.get_flag(options::format::LONG_NO_OWNER)\n   38 |         && !matches.get_flag(options::format::LONG_NUMERIC_UID_GID)\n   39 |         && !matches.get_flag(options::format::ONE_LINE)\n   40 |     {\n   41 |         default_format_style = true;\n   42 |     }\n   43 | \n   44 |     let mut config = Config::from(&matches)?;\n   45 | \n   46 |     if default_quoting_style {\n   47 |         config.quoting_style = QuotingStyle::C_NO_QUOTES;\n   48 |     }\n   49 |     if default_format_style {\n   50 |         config.format = Format::Columns;\n   51 |     }\n   52 | \n   53 |     let locs = matches\n   54 |         .get_many::<OsString>(options::PATHS)\n   55 |         .map_or_else(|| vec![Path::new(\".\")], |v| v.map(Path::new).collect());\n   56 | \n   57 |     uu_ls::list(locs, &config)","lines":40},{"ref":"src/uu/vdir/src/vdir.rs:19-57","code":"   19 |     let mut default_quoting_style = false;\n   20 |     let mut default_format_style = false;\n   21 | \n   22 |     // We check if any options on formatting or quoting style have been given.\n   23 |     // If not, we will use dir default formatting and quoting style options\n   24 | \n   25 |     if !matches.contains_id(options::QUOTING_STYLE)\n   26 |         && !matches.get_flag(options::quoting::C)\n   27 |         && !matches.get_flag(options::quoting::ESCAPE)\n   28 |         && !matches.get_flag(options::quoting::LITERAL)\n   29 |     {\n   30 |         default_quoting_style = true;\n   31 |     }\n   32 |     if !matches.contains_id(options::FORMAT)\n   33 |         && !matches.get_flag(options::format::ACROSS)\n   34 |         && !matches.get_flag(options::format::COLUMNS)\n   35 |         && !matches.get_flag(options::format::COMMAS)\n   36 |         && !matches.get_flag(options::format::LONG)\n   37 |         && !matches.get_flag(options::format::LONG_NO_GROU k(0) => break, // EOF reached\n  595 |             Ok(n) => skipped += n as u64,\n  596 |             Err(_) => break,\n  597 |         }\n  598 |     }\n  599 | \n  600 |     // Helper function to format and print a string\n  601 |     let mut print_string = |offset: u64, string: &[u8]| -> std::io::Result<()> {\n  602 |         let string_content = String::from_utf8_lossy(string);\n  603 |         match radix {\n  604 |             Radix::NoPrefix => writeln!(writer, \"{string_content}\"),\n  605 |             Radix::Decimal => writeln!(writer, \"{offset:07} {string_content}\"),\n  606 |             Radix::Hexadecimal => writeln!(writer, \"{offset:07x} {string_content}\"),\n  607 |             Radix::Octal => writeln!(writer, \"{offset:07o} {string_content}\"),\n  608 |         }\n  609 |     };\n  610 | \n  611 |     let mut current_string = Vec::new();\n  612 |     let mut string_start_offset = 0u64;\n  613 |     let mut current_offset = skip_bytes;\n  614 |     let mut bytes_read = 0u64;\n  615 |     let mut buf = [0u8; 1];\n  616 | \n  617 |     loop {\n  618 |         // Check if we've reached the read_bytes limit\n  619 |         if read_bytes.is_some_and(|l| bytes_read >= l) {\n  620 |             // Special case: when -N limit is reached with a pending string\n  621 |             // that meets min_length, output it even without null terminator\n  622 |             if current_string.len() >= min_length {\n  623 |                 print_string(string_start_offset, &current_string)?;\n  624 |             }\n  625 |             break;\n  626 |         }\n  627 | \n  628 |         // Read one byte at a time\n  629 |         match mf.read(&mut buf) {\n  630 |             Ok(0) => break, // EOF\n  631 |             Ok(_) => {\n  632 |                 bytes_read += 1;\n  633 |                 let byte = buf[0];\n  634 | \n  635 |                 // Check if it's a printable character (including space)\n  636 |                 if (0x20..=0x7E).contains(&byte) {\n  637 |                     if current_string.is_empty() {\n  638 |                         string_start_offset = current_offset;\n  639 |                     }\n  640 |                     current_string.push(byte);\n  641 |                 } else {\n  642 |                     // Either null terminator or non-printable character\n  643 |                     if byte == 0 && current_string.len() >= min_length {\n  644 |                         // Null terminator found with valid string\n  645 |                         print_string(string_start_offset, &current_string)?;\n  646 |                     }\n  647 |                     current_string.clear();\n  648 |                 }\n  649 | \n  650 |                 current_offset += 1;\n  651 |             }\n  652 |             Err(e) => {\n  653 |                 // Note: GNU od does not output unterminated strings at EOF\n  654 |                 // Strings must be null-terminated to be output\n  655 |                 if mf.has_error() {\n  656 |                     show_error!(\"{e}\");\n  657 |                     return Err(1.into());\n  658 |                 }\n  659 |                 break;\n  660 |             }\n  661 |         }\n  662 |     }\n  663 | \n  664 |     // GNU od doesn't output an offset when strings mode finds no valid strings\n  665 |     // This includes cases with only unterminated or too-short strings\n  666 | \n  667 |     if mf.has_error() {\n  668 |         Err(1.into())\n  669 |     } else {\n  670 |         Ok(())\n  671 |     }\n  672 | }","lines":97}]},{"id":"ARCH_7","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"copy_stream has divergent return types across platforms. On Linux/Android it returns io::Result<()>, but the non-Linux path re-exports `std::io::copy as copy_stream`, which returns io::Result<u64>. Current callers happen to discard the Ok value via map_err(...)? or `?`, so it compiles everywhere, but any caller that reads the byte count would compile only on non-Linux and break on Linux (or vice versa). This is a fragile cross-platform API surface.","fix":"Wrap the non-Linux path in an explicit function with the same io::Result<()> signature, e.g. `pub fn copy_stream(src, dest) -> io::Result<()> { std::io::copy(src, dest)?; Ok(()) }`, so both platforms expose an identical signature.","locations":[{"ref":"src/uucore/src/lib/features/buf_copy.rs:15-30","code":"   15 | pub fn copy_stream(\n   16 |     src: &mut (impl std::io::Read + AsFd),\n   17 |     dest: &mut impl AsFd,\n   18 | ) -> std::io::Result<()> {\n   19 |     // try to splice() system call for throughput\n   20 |     if crate::pipes::splice_unbounded_auto(src, dest)?.is_err() {\n   21 |         // fall back on writing \"without buffering\", or order of output would be wrong\n   22 |         // unrelated for cp /dev/stdin since cp does not have multiple input? <https://github.com/uutils/coreutils/issues/5186>\n   23 |         // RawWriter also removes io::copy's specialization slower than our splice\n   24 |         std::io::copy(src, &mut crate::io::RawWriter(dest))?;\n   25 |     }\n   26 |     Ok(())\n   27 | }\n   28 | \n   29 | #[cfg(not(any(target_os = \"linux\", target_os = \"android\")))]\n   30 | pub use std::io::copy as copy_stream;","lines":16}]},{"id":"ARCH_8","type":"architecture","type_label":"Architecture","severity":"negligible","easy":false,"description":"Both src/bin/coreutils.rs and src/bin/uudoc.rs use `include!(concat!(env!(\"OUT_DIR\"), \"/uutils_map.rs\"))` to textually inline the generated util map, and each re-declares the same `UtilityMap`/`util_map` definitions. The generated file is shared by include rather than via a real module/crate item, so the type and function are duplicated into every binary and cannot be referenced through a normal path. This is a deliberate codegen pattern but couples both binaries tightly to the exact generated symbol names (UtilityMap, util_map, Command, Args), which the build script must keep in lockstep.","fix":"Consider generating the map into a small generated module type-checked once (e.g. via a generated lib module) instead of include!-ing raw source into multiple binaries, to reduce the implicit name coupling.","locations":[{"ref":"src/bin/coreutils.rs:17","code":"   17 | include!(concat!(env!(\"OUT_DIR\"), \"/uutils_map.rs\"));","lines":1},{"ref":"src/bin/uudoc.rs:35","code":"   35 | include!(concat!(env!(\"OUT_DIR\"), \"/uutils_map.rs\"));","lines":1},{"ref":"build.rs:66-111","code":"   66 |     let mut mf = File::create(Path::new(&out_dir).join(\"uutils_map.rs\")).unwrap();\n   67 | \n   68 |     mf.write_all(\n   69 |         \"type UtilityMap<T> = phf::OrderedMap<&'static str, (fn(T) -> i32, fn() -> Command)>;\\n\\\n   70 |          \\n\\\n   71 |          #[allow(clippy::too_many_lines)]\n   72 |          #[allow(clippy::unreadable_literal)]\n   73 |          fn util_map<T: Args>() -> UtilityMap<T> {\\n\"\n   74 |             .as_bytes(),\n   75 |     )\n   76 |     .unwrap();\n   77 | \n   78 |     let mut phf_map = phf_codegen::OrderedMap::<&str>::new();\n   79 |     let mut entries = Vec::new();\n   80 | \n   81 |     for krate in &crates {\n   82 |         let map_value = format!(\"({krate}::uumain, {krate}::uu_app)\");\n   83 |         match krate.as_ref() {\n   84 |             // 'test' is named uu_test to avoid collision with rust core crate 'test'.\n   85 |             // It can also be invoked by name '[' for the '[ expr ] syntax'.\n   86 |             \"uu_test\" => {\n   87 |                 entries.push((\"test\", map_value.clone()));\n   88 |                 entries.push((\"[\", map_value.clone()));\n   89 |             }\n   90 |             k if k.starts_with(OVERRIDE_PREFIX) => {\n   91 |                 entries.push((&k[OVERRIDE_PREFIX.len()..], map_value.clone()));\n   92 |             }\n   93 |             \"false\" | \"true\" => {\n   94 |                 entries.push((\n   95 |                     krate.as_str(),\n   96 |                     format!(\"(r#{krate}::uumain, r#{krate}::uu_app)\"),\n   97 |                 ));\n   98 |             }\n   99 |             _ => {\n  100 |                 entries.push((krate.as_str(), map_value.clone()));\n  101 |             }\n  102 |         }\n  103 |     }\n  104 |     entries.sort_by_key(|(name, _)| *name);\n  105 | \n  106 |     for (name, value) in entries {\n  107 |         phf_map.entry(name, value);\n  108 |     }\n  109 | \n  110 |     write!(mf, \"{}\", phf_map.build()).unwrap();\n  111 |     mf.write_all(b\"\\n}\\n\").unwrap();","lines":46}]},{"id":"ARCH_9","type":"architecture","type_label":"Architecture","severity":"negligible","easy":false,"description":"display_dir_entry_size returns a bare 6-tuple `(usize, usize, usize, usize, usize, usize)` (nlink, uname, group, size, major, minor lengths) that callers destructure positionally. This is error-prone (easy to swap two same-typed fields) and obscures meaning at call sites.","fix":"Return a small named struct with the six fields instead of a positional tuple.","locations":[{"ref":"src/uu/ls/src/display.rs:246-274","code":"  246 | fn display_dir_entry_size(\n  247 |     entry: &PathData,\n  248 |     config: &Config,\n  249 |     state: &mut ListState,\n  250 | ) -> (usize, usize, usize, usize, usize, usize) {\n  251 |     // TODO: Cache/memorize the display_* results so we don't have to recalculate them.\n  252 |     if let Some(md) = entry.metadata() {\n  253 |         let (size_len, major_len, minor_len) = match display_len_or_rdev(md, config) {\n  254 |             SizeOrDeviceId::Device(major, minor) => {\n  255 |                 (major.len() + minor.len() + 2usize, major.len(), minor.len())\n  256 |             }\n  257 |             SizeOrDeviceId::Size(size) => (size.len(), 0usize, 0usize),\n  258 |         };\n  259 |         #[cfg(unix)]\n  260 |         let nlink_len = digits(md.nlink());\n  261 |         #[cfg(not(unix))]\n  262 |         let nlink nd_env(&mut command, \"_STDBUF_E\", &options.stderr);\n  212 |     command.args(command_params);\n  213 | \n  214 |     // Replace the current process with the target program (no fork) using exec.\n  215 |     #[cfg(unix)]\n  216 |     let e = command.exec();","lines":12},{"ref":"src/uu/stdbuf/src/stdbuf.rs:133-145","code":"  133 | #[cfg(not(feature = \"feat_external_libstdbuf\"))]\n  134 | fn get_preload_env(tmp_dir: &TempDir) -> UResult<(String, PathBuf)> {\n  135 |     use std::fs::File;\n  136 |     use std::io::Write;\n  137 | \n  138 |     let (preload, extension) = preload_strings();\n  139 |     let inject_path = tmp_dir.path().join(\"libstdbuf\").with_extension(extension);\n  140 | \n  141 |     let mut file = File::create(&inject_path)?;\n  142 |     file.write_all(STDBUF_INJECT)?;\n  143 | \n  144 |     Ok((preload.to_owned(), inject_path))\n  145 | }","lines":13}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":false,"description":"encoding_from_name maps the EUC-TW encoding names ('euc-tw'/'euctw') to MbEncoding::Big5 and routes them through big5_len. Big5 and EUC-TW are different multi-byte encodings (EUC-TW uses CNS 11643 with SS2 0x8E lead and up to 4-byte sequences in plane form), so big5_len will compute wrong character lengths for genuine EUC-TW data, mis-segmenting multibyte characters in paste's -d delimiter handling.","fix":"Either implement a dedicated euctw_len (handle 0x8E SS2 4-byte and [A1-FE][A1-FE] 2-byte forms) or, if EUC-TW support is out of scope, drop 'euc-tw'/'euctw' from the Big5 arm so they fall back to the safer 1-byte/UTF-8 default rather than being silently mis-decoded as Big5.","locations":[{"ref":"src/uucore/src/lib/features/i18n/charmap.rs:25","code":"   25 |         \"big5\" | \"big5-hkscs\" | \"big5hkscs\" | \"euc-tw\" | \"euctw\" => MbEncoding::Big5,","lines":1},{"ref":"src/uucore/src/lib/features/i18n/charmap.rs:130-140","code":"  130 | // 2-byte: [81-FE][40-7E,A1-FE]\n  131 | fn big5_len(b: &[u8], b0: u8) -> usize {\n  132 |     if (0x81..=0xFE).contains(&b0)\n  133 |         && b.len() >= 2\n  134 |         && ((0x40..=0x7E).contains(&b[1]) || (0xA1..=0xFE).contains(&b[1]))\n  135 |     {\n  136 |         2\n  137 |     } else {\n  138 |         1\n  139 |     }\n  140 | }","lines":11}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","easy":false,"description":"The doc example for init_locale_collation imports `uucore::i18n::collator::init_locale_collation`, but the entire collator module is gated behind the i18n-collator cargo feature (mod.rs: `#[cfg(feature = \"i18n-collator\")] pub mod collator;`). When doctests are compiled without that feature enabled the import fails to resolve and the doctest does not compile. The example is also misleading: it equates a false return with 'C/POSIX locale', but false is also returned when collator initialization fails for a UTF-8 locale.","fix":"Mark the example as `no_run`/`ignore` or gate it, and reword the comment so a false return is described as 'locale-aware collation not active (C/POSIX locale or initialization failed)'.","locations":[{"ref":"src/uucore/src/lib/features/i18n/collator.rs:50-60","code":"   50 | /// # Example\n   51 | ///\n   52 | /// ```\n   53 | /// use uucore::i18n::collator::init_locale_collation;\n   54 | ///\n   55 | /// if init_locale_collation() {\n   56 | ///     // Using locale-aware collation\n   57 | /// } else {\n   58 | ///     // Using byte comparison (C/POSIX locale)\n   59 | /// }\n   60 | /// ```","lines":11}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","easy":false,"description":"Duplicate license/copyright header. Lines 1-4 already contain the standard SPDX-style header, and lines 38-41 repeat the exact same header comment in the middle of the file (right after the `use` import and before the UTILITY_IS_SECOND_ARG static). This is a stray copy-paste artifact.","fix":"Remove the duplicated header comment block at lines 38-41. <script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
