 String> {\n  798 |     let mut map = HashMap::new();\n  799 | \n  800 |     let tzdb = TimeZoneDatabase::from_env(); // spell-checker:disable-line\n  801 |     // spell-checker:disable-next-line\n  802 |     for tz_name in tzdb.available() {\n  803 |         let tz_str = tz_name.as_str();\n  804 |         // Use last component as potential abbreviation\n  805 |         // e.g., \"Pacific/Fiji\" could map to \"FIJI\"\n  806 |         if let Some(last_part) = tz_str.split('/').next_back() {\n  807 |             let potential_abbrev = last_part.to_uppercase();\n  808 |             // Only add if it looks like an abbreviation (2-5 uppercase chars)\n  809 |             if potential_abbrev.len() >= 2\n  810 |                 && potential_abbrev.len() <= 5\n  811 |                 && potential_abbrev.chars().all(|c| c.is_ascii_uppercase())\n  812 |             {\n  813 |                 map.entry(potential_abbrev)\n  814 |                     .or_insert_with(|| tz_str.to_string());\n  815 |             }\n  816 |         }\n  817 |     }\n  818 | \n  819 |     map\n  820 | }","lines":24}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `Input::fill_blocks`, when a short read occurs the padding is inserted with `buf.splice(base_idx + rlen..next_blk, padding)` after allocating a temporary `vec![pad; target_len - rlen]`. `splice` on a Vec shifts all subsequent elements; since the replacement length equals the removed range length here it only overwrites in place, so the allocation of the temporary `padding` Vec and the splice machinery are unnecessary overhead on every partial read.","fix":"Fill in place with `buf[base_idx + rlen..next_blk].fill(pad);` instead of allocating a padding Vec and calling splice.","locations":[{"ref":"src/uu/dd/src/dd.rs:562-567","code":"  562 |                 rlen if rlen < target_len => {\n  563 |                     bytes_total += rlen;\n  564 |                     reads_partial += 1;\n  565 |                     let padding = vec![pad; target_len - rlen];\n  566 |                     buf.splice(base_idx + rlen..next_blk, padding);\n  567 |                 }","lines":6}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `read_helper`, when a conversion mode is active the code does `*buf = conv_block_unblock_helper(buf.clone(), mode, &mut rstat)`. The `buf.clone()` allocates and copies the entire block buffer every read iteration purely to satisfy the by-value signature of `conv_block_unblock_helper`, then the result replaces `*buf` (another allocation). For large block sizes with conv= this doubles memory traffic on the hot path.","fix":"Change `conv_block_unblock_helper` to take `buf: &[u8]` (it already produces a fresh Vec) and pass `buf` directly, avoiding the clone; or have it take ownership of the existing buffer via `std::mem::take(buf)`.","locations":[{"ref":"src/uu/dd/src/dd.rs:1397-1403","code":" 1397 |     match i.settings.iconv.mode {\n 1398 |         Some(ref mode) => {\n 1399 |             *buf = conv_block_unblock_helper(buf.clone(), mode, &mut rstat);\n 1400 |             Ok(rstat)\n 1401 |         }\n 1402 |         None => Ok(rstat),\n 1403 |     }","lines":7},{"ref":"src/uu/dd/src/blocks.rs:77-116","code":"   77 | pub(crate) fn conv_block_unblock_helper(\n   78 |     buf: Vec<u8>,\n   79 |     mode: &ConversionMode,\n   80 |     rstat: &mut ReadStat,\n   81 | ) -> Vec<u8> {\n   82 |     fn apply_conversion(buf: Vec<u8>, ct: &ConversionTable) -> impl Iterator<Item = u8> + '_ {\n   83 |         buf.into_iter().map(|b| ct[b as usize])\n   84 |     }\n   85 | \n   86 |     match mode {\n   87 |         ConversionMode::ConvertOnly(ct) => apply_conversion(buf, ct).collect(),\n   88 |         ConversionMode::BlockThenConvert(ct, cbs, sync) => {\n   89 |             let blocks = block(&buf, *cbs, *sync, rstat);\n   90 |             blocks\n   91 |                 .into_iter()\n   92 |                 .flat_map(|block| apply_conversion(block, ct))\n   93 |                 .collect()\n   94 |         }\n   95 |         ConversionMode::ConvertThenBlock(ct, cbs, sync) => {\n   96 |             let buf: Vec<_> = apply_conversion(buf, ct).collect();\n   97 |             block(&buf, *cbs, *sync, rstat)\n   98 |                 .into_iter()\n   99 |                 .flatten()\n  100 |                 .collect()\n  101 |         }\n  102 |         ConversionMode::BlockOnly(cbs, sync) => block(&buf, *cbs, *sync, rstat)\n  103 |             .into_iter()\n  104 |             .flatten()\n  105 |             .collect(),\n  106 |         ConversionMode::UnblockThenConvert(ct, cbs) => {\n  107 |             let buf = unblock(&buf, *cbs);\n  108 |             apply_conversion(buf, ct).collect()\n  109 |         }\n  110 |         ConversionMode::ConvertThenUnblock(ct, cbs) => {\n  111 |             let buf: Vec<_> = apply_conversion(buf, ct).collect();\n  112 |             unblock(&buf, *cbs)\n  113 |         }\n  114 |         ConversionMode::UnblockOnly(cbs) => unblock(&buf, *cbs),\n  115 |     }\n  116 | }","lines":40}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`write_result` builds the non-exponent factorization output with\n`format!(\" {factor}\").repeat(n)`. For a `BigUint` input that is a large power of a small\nprime (e.g. a huge power of 2), `n` (the multiplicity) can be enormous, so `repeat(n)`\nallocates a single gigantic string in memory before writing. The exponent-printing path\n(`-h`) avoids this. A loop writing `n` times would bound memory.","fix":"Write the factor `n` times in a loop (`for _ in 0..n { write!(w, \" {factor}\")?; }`) instead\nof materializing `format!(...).repeat(n)`.","locations":[{"ref":"src/uu/factor/src/factor.rs:142","code":"  142 |             w.write_all(format!(\" {factor}\").repeat(n).as_bytes())?;","lines":1}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In fold, `emit_output` recomputes the column count of the entire remaining buffer from scratch via `compute_col_count(ctx.output, ctx.mode)` after every emitted line. With `-s` (where the remainder is retained) and many short folds on a long line, this is repeated full re-scans of the residual buffer, giving roughly O(n^2) behavior on pathological inputs.","fix":"Track the residual column count incrementally (subtract the consumed prefix's contribution) instead of rescanning the whole remaining buffer each emit.","locations":[{"ref":"src/uu/fold/src/fold.rs:332-332","code":"  332 |     *ctx.col_count = compute_col_count(ctx.output, ctx.mode);","lines":1}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`id` always calls `entries::get_groups_gnu(Some(gid))?` (a `getgroups`/lookup syscall) even\nwhen a user was specified on the command line, in which case the result is immediately thrown\naway and replaced by `possible_pw.belongs_to()`. Additionally, in the non-user-specified branch\nit calls `groups.clone()` on a freshly-owned `Vec` that is about to be shadowed, which is a\npointless allocation. When users are specified this work is done once per user in the loop.","fix":"Only fetch `get_groups_gnu` in the `else` (non-user-specified) branch, and drop the redundant\n`.clone()`: e.g. `let groups = if state.user_specified { possible_pw.as_ref().map(Passwd::belongs_to).unwrap() } else { entries::get_groups_gnu(Some(gid))? };`","locations":[{"ref":"src/uu/id/src/id.rs:318-323","code":"  318 |         let groups = entries::get_groups_gnu(Some(gid))?;\n  319 |         let groups = if state.user_specified {\n  320 |             possible_pw.as_ref().map(Passwd::belongs_to).unwrap()\n  321 |         } else {\n  322 |             groups.clone()\n  323 |         };","lines":6}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Strings mode reads the input one byte at a time via `mf.read(&mut buf)` with a 1-byte buffer, calling through MultifileReader (and ultimately a raw unbuffered file/stdin read) for every single byte. For large inputs this is extremely slow compared to the main od path, which uses a BufReader. The non-strings path is buffered; the strings path is not.","fix":"Wrap the MultifileReader in a BufReader (as open_input_peek_reader does) or read into a larger buffer and iterate over it, instead of issuing one syscall-sized read per byte.","locations":[{"ref":"src/uu/od/src/od.rs:615-662","code":"  615 |     let mut buf = [0u8; 1];\n  616 | \n  617 |     loop {\n  618 |         // Check if we've reached the read_bytes limit\n  619 |         if read_bytes.is_some_and(|l| bytes_read >= l) {\n  620 |             // Special case: when -N limit is reached with a pending string\n  621 |             // that meets min_length, output it even without null terminator\n  622 |             if current_string.len() >= min_length {\n  623 |                 print_string(string_start_offset, &current_string)?;\n  624 |             }\n  625 |             break;\n  626 |         }\n  627 | \n  628 |         // Read one byte at a time\n  629 |         match mf.read(&mut buf) {\n  630 |             Ok(0) => break, // EOF\n  631 |             Ok(_) => {\n  632 |                 bytes_read += 1;\n  633 |                 let byte = buf[0];\n  634 | \n  635 |                 // Check if it's a printable character (including space)\n  636 |                 if (0x20..=0x7E).contains(&byte) {\n  637 |                     if current_string.is_empty() {\n  638 |                         string_start_offset = current_offset;\n  639 |                     }\n  640 |                     current_string.push(byte);\n  641 |                 } else {\n  642 |                     // Either null terminator or non-printable character\n  643 |                     if byte == 0 && current_string.len() >= min_length {\n  644 |                         // Null terminator found with valid string\n  645 |                         print_string(string_start_offset, &current_string)?;\n  646 |                     }\n  647 |                     current_string.clear();\n  648 |                 }\n  649 | \n  650 |                 current_offset += 1;\n  651 |             }\n  652 |             Err(e) => {\n  653 |                 // Note: GNU od does not output unterminated strings at EOF\n  654 |                 // Strings must be null-terminated to be output\n  655 |                 if mf.has_error() {\n  656 |                     show_error!(\"{e}\");\n  657 |                     return Err(1.into());\n  658 |                 }\n  659 |                 break;\n  660 |             }\n  661 |         }\n  662 |     }","lines":48}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"write_bytes builds each output line by repeatedly push_str-ing freshly allocated String results returned by the per-item formatter functions (format_item_oct16 etc. each allocate and return a String per element). For wide lines and large inputs this allocates one String per formatted item per line. The leading spacing is also emitted via write!(\"{:>width$}\", \"\") formatting an empty string for padding on every item.","fix":"Have formatters write into a provided &mut String / fmt::Write target instead of returning owned Strings, to avoid per-item allocation in the hot loop.","locations":[{"ref":"src/uu/od/src/od.rs:682-718","code":"  682 |     for f in output_info.spaced_formatters_iter() {\n  683 |         let mut output_text = String::new();\n  684 | \n  685 |         let mut b = 0;\n  686 |         while b < input_decoder.length() {\n  687 |             write!(\n  688 |                 output_text,\n  689 |                 \"{:>width$}\",\n  690 |                 \"\",\n  691 |                 width = f.spacing[b % output_info.byte_size_block]\n  692 |             )\n  693 |             .unwrap();\n  694 | \n  695 |             match f.formatter_item_info.formatter {\n  696 |                 FormatWriter::IntWriter(func) => {\n  697 |                     let p = input_decoder.read_uint(b, f.formatter_item_info.byte_size);\n  698 |                     output_text.push_str(&func(p));\n  699 |                 }\n  700 |                 FormatWriter::FloatWriter(func) => {\n  701 |                     let p = input_decoder.read_float(b, f.formatter_item_info.byte_size);\n  702 |                     output_text.push_str(&func(p));\n  703 |                 }\n  704 |                 FormatWriter::LongDoubleWriter(func) => {\n  705 |                     let p = input_decoder.read_long_double(b);\n  706 |                     output_text.push_str(&func(p));\n  707 |                 }\n  708 |                 FormatWriter::BFloatWriter(func) => {\n  709 |                     let p = input_decoder.read_bfloat(b);\n  710 |                     output_text.push_str(&func(p));\n  711 |                 }\n  712 |                 FormatWriter::MultibyteWriter(func) => {\n  713 |                     output_text.push_str(&func(input_decoder.get_full_buffer(b)));\n  714 |                 }\n  715 |             }\n  716 | \n  717 |             b += f.formatter_item_info.byte_size;\n  718 |         }","lines":37},{"ref":"src/uu/od/src/prn_int.rs:31-63","code":"   31 | macro_rules! int_writer_unsigned {\n   32 |     ($NAME:ident, $byte_size:expr, $print_width:expr, $function:ident, $format_str:expr) => {\n   33 |         fn $function(p: u64) -> String {\n   34 |             format!($format_str, p, width = $print_width - 1)\n   35 |         }\n   36 | \n   37 |         pub static $NAME: FormatterItemInfo = FormatterItemInfo {\n   38 |             byte_size: $byte_size,\n   39 |             print_width: $print_width,\n   40 |             formatter: FormatWriter::IntWriter($function),\n   41 |         };\n   42 |     };\n   43 | }\n   44 | \n   45 | /// defines a static struct of type `FormatterItemInfo` called `$NAME`\n   46 | ///\n   47 | /// Used to format signed integer types with help of a function called `$function`\n   48 | /// `$byte_size` is the size of the type, `$print_width` is the maximum width in\n   49 | /// human-readable format. `$format_str` should be DEC\n   50 | macro_rules! int_writer_signed {\n   51 |     ($NAME:ident, $byte_size:expr, $print_width:expr, $function:ident, $format_str:expr) => {\n   52 |         fn $function(p: u64) -> String {\n   53 |             let s = sign_extend(p, $byte_size);\n   54 |             format!($format_str, s, width = $print_width - 1)\n   55 |         }\n   56 | \n   57 |         pub static $NAME: FormatterItemInfo = FormatterItemInfo {\n   58 |             byte_size: $byte_size,\n   59 |             print_width: $print_width,\n   60 |             formatter: FormatWriter::IntWriter($function),\n   61 |         };\n   62 |     };\n   63 | }","lines":33}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In ptx `format_dumb_line`, the padding computation uses `left_part_len` (length excluding a single trunc_str) for the subtraction but compares `left_part.len()` (the full length) against `half_width` to decide whether to pad. These two lengths can differ when the trunc_str is present, so the padding amount and the pad/no-pad decision are computed from inconsistent values, which can yield slightly misaligned columns.","fix":"Use a single consistent length (presumably `left_part_len`) for both the `<` comparison and the subtraction.","locations":[{"ref":"src/uu/ptx/src/ptx.rs:669-682","code":"  669 |     let half_width = cmp::max(config.line_width / 2, config.gap_size);\n  670 | \n  671 |     let left_part_len = if left_part.contains(&config.trunc_str) {\n  672 |         left_part.len() - config.trunc_str.len()\n  673 |     } else {\n  674 |         left_part.len()\n  675 |     };\n  676 | \n  677 |     // Right-justify the left part within the left half\n  678 |     let padding = if left_part.len() < half_width {\n  679 |         half_width - left_part_len\n  680 |     } else {\n  681 |         0\n  682 |     };","lines":14}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In ptx `format_dumb_line`, `left_part.contains(&config.trunc_str)` searches the whole left part for the truncation string, but truncation strings are only ever prepended (at the start). For long lines this is a needless full-substring scan; `starts_with` would suffice and also avoids false positives where trunc_str legitimately appears inside the text.","fix":"Use `left_part.starts_with(&config.trunc_str)` to match the actual placement of the truncation marker.","locations":[{"ref":"src/uu/ptx/src/ptx.rs:671-675","code":"  671 |     let left_part_len = if left_part.contains(&config.trunc_str) {\n  672 |         left_part.len() - config.trunc_str.len()\n  673 |     } else {\n  674 |         left_part.len()\n  675 |     };","lines":5}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`desired_file_buffer_bytes` returns `quarter.max(max)` for inputs larger than\n`MAX_AUTOMATIC_BUF_SIZE`, but every caller funnels the result through\n`clamp_hint`, which clamps to `[MIN, MAX]`. Any value above `max` (the entire\n`quarter`/large-input branch) is therefore immediately clamped back down to\n`max`, making the branch's computation dead - it can never produce a buffer\nlarger than `max`. The function's apparent intent (scale buffer with very large\ninputs) is silently defeated.","fix":"Either drop the unused `quarter` branch and just return `max` for large inputs,\nor stop clamping the file hint to `max` in `clamp_hint`/`file_size_hint` so the\nintended scaling actually takes effect. As written the code is misleading.","locations":[{"ref":"src/uu/sort/src/buffer_hint.rs:71-84","code":"   71 | fn desired_file_buffer_bytes(total_bytes: u128) -> u128 {\n   72 |     if total_bytes == 0 {\n   73 |         return 0;\n   74 |     }\n   75 | \n   76 |     let max = crate::MAX_AUTOMATIC_BUF_SIZE as u128;\n   77 | \n   78 |     if total_bytes <= max {\n   79 |         return total_bytes.saturating_mul(12).clamp(total_bytes, max);\n   80 |     }\n   81 | \n   82 |     let quarter = total_bytes / 4;\n   83 |     quarter.max(max)\n   84 | }","lines":14}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Line::write_debug` re-runs `tokenize` for every selector-bearing line and\nallocates a fresh `Vec` for the transformed line plus `\" \".repeat(indent)` /\n`\"_\".repeat(len)` strings per selector. Although debug output is documented as\nnon-performance-critical, the per-line re-tokenization duplicates work already\ndone during `Line::create` for the same line, and the comment claiming \"there\naren't any special performance optimizations here\" understates that the cost is\nsuper-linear in number of selectors.","fix":"If debug output ever needs to scale, reuse the already-computed token buffer /\nselections instead of re-tokenizing per line. Otherwise the comment is fine but\nthe re-tokenization is genuinely redundant.","locations":[{"ref":"src/uu/sort/src/sort.rs:732-738","code":"  732 |         let mut fields = vec![];\n  733 |         tokenize(\n  734 |             self.line,\n  735 |             settings.separator,\n  736 |             &mut fields,\n  737 |             &settings.precomputed,\n  738 |         );","lines":7}]},{"id":"PERF_21","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"n_chunks_by_line_round_robin allocates a fresh `Vec` for every single input line (`let line = &mut Vec::new();` inside the loop). For inputs with many short lines this is one heap allocation per line. The buffer could be allocated once outside the loop and cleared each iteration.","fix":"Hoist `let mut line = Vec::new();` above the loop and call `line.clear();` at the start of each iteration before `read_until`.","locations":[{"ref":"src/uu/split/src/split.rs:1400-1402","code":" 1400 |     loop {\n 1401 |         let line = &mut Vec::new();\n 1402 |         let num_bytes_read = reader.by_ref().read_until(sep, line)?;","lines":3}]},{"id":"PERF_22","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The follow loop drains pending events with a fixed 100-iteration busy spin that combines\n`std::thread::yield_now()` and `std::hint::spin_loop()` on every outer event. When events arrive\nsteadily this burns CPU yielding 100 times per batch even after the queue is empty, and the\ncomment's justification (\"give the notify background thread chances to deliver\") is a timing hack\nrather than a synchronization mechanism - it can both waste CPU and still miss events under load.","fix":"Drain with a short blocking `recv_timeout` (e.g. a few ms) instead of a 100x spin, or break out of the drain loop as soon as `try_recv` returns `Empty` once rather than spinning a fixed count.","locations":[{"ref":"src/uu/tail/src/follow/watch.rs:573-583","code":"  573 |                 // background thread chances to deliver pending events.\n  574 |                 for _ in 0..100 {\n  575 |                     while let Ok(Ok(event)) =\n  576 |                         observer.watcher_rx.as_mut().unwrap().receiver.try_recv()\n  577 |                     {\n  578 |                         process_event(&mut observer, event, settings, &mut paths)?;\n  579 |                     }\n  580 |                     // Use both yield and spin hint for broader CPU support\n  581 |                     std::thread::yield_now();\n  582 |                     std::hint::spin_loop();\n  583 |                 }","lines":11}]},{"id":"PERF_23","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`uu_tail` clones the entire inputs vector on every invocation: `for input in &settings.inputs.clone()`.\nThe clone is only needed because `observer`/`printer` are borrowed mutably inside the loop while\n`settings` is borrowed immutably; iterating `&settings.inputs` directly would borrow-conflict. The\nclone of all `Input` structs (each owning a `String` display_name) is avoidable.","fix":"Iterate by index (`for i in 0..settings.inputs.len()`) or restructure so the inputs slice is borrowed without cloning, avoiding allocating a full copy of every Input.","locations":[{"ref":"src/uu/tail/src/tail.rs:79","code":"   79 |     for input in &settings.inputs.clone() {","lines":1}]},{"id":"PERF_24","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"tr `solve_set_characters` recomputes the expanded prefix length for class matching with `set.iter().take(pos).flat_map(flatten).count()` inside nested loops over set2 and set1 positions, giving O(n^2) (or worse) re-expansion of the same prefixes for every class encountered. For sets containing classes plus large explicit ranges this redundantly re-flattens ranges repeatedly.","fix":"Precompute a running prefix-length array for set1 and set2 once, then index into it instead of re-flattening prefixes on each iteration.","locations":[{"ref":"src/uu/tr/src/operation.rs:265-294","code":"  265 |         // For every upper/lower in set2, there must be an upper/lower in set1 at the same position. The position is calculated by expanding everything before the upper/lower in both sets\n  266 |         for (set2_pos, set2_item) in set2.iter().enumerate() {\n  267 |             if matches!(set2_item, Self::Class(_)) {\n  268 |                 let mut set2_part_solved_len = 0;\n  269 |                 if set2_pos >= 1 {\n  270 |                     set2_part_solved_len =\n  271 |                         set2.iter().take(set2_pos).flat_map(Self::flatten).count();\n  272 |                 }\n  273 | \n  274 |                 let mut class_matches = false;\n  275 |                 for (set1_pos, set1_item) in set1.iter().enumerate() {\n  276 |                     if matches!(set1_item, Self::Class(_)) {\n  277 |                         let mut set1_part_solved_len = 0;\n  278 |                         if set1_pos >= 1 {\n  279 |                             set1_part_solved_len =\n  280 |                                 set1.iter().take(set1_pos).flat_map(Self::flatten).count();\n  281 |                         }\n  282 | \n  283 |                         if set1_part_solved_len == set2_part_solved_len {\n  284 |                             class_matches = true;\n  285 |                             break;\n  286 |                         }\n  287 |                     }\n  288 |                 }\n  289 | \n  290 |                 if !class_matches {\n  291 |                     return Err(BadSequence::ClassInSet2NotMatchedBySet1);\n  292 |                 }\n  293 |             }\n  294 |         }","lines":30}]},{"id":"PERF_25","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"uniq key_end_index runs std::str::from_utf8 over the entire remainder of the line for every line when -w/--check-chars is used in a non-C locale, then walks char_indices up to the limit. For very long lines this validates the whole tail even though only `limit` characters are needed. Minor but avoidable.","fix":"Validate/iterate incrementally only up to `limit` characters (e.g. use char_indices on the byte slice via from_utf8 lazily or std::str utilities that stop early) instead of validating the full remainder.","locations":[{"ref":"src/uu/uniq/src/uniq.rs:197-227","code":"  197 |     fn key_end_index(&self, line: &[u8], key_start: usize) -> usize {\n  198 |         let remainder = &line[key_start..];\n  199 |         match self.slice_stop {\n  200 |             None => line.len(),\n  201 |             Some(limit) => {\n  202 |                 if remainder.is_empty() {\n  203 |                     return key_start;\n  204 |                 }\n  205 |                 if Self::is_c_locale() {\n  206 |                     // for C or POSIX we count bytes\n  207 |                     key_start + remainder.len().min(limit)\n  208 |                 } else if let Ok(valid) = std::str::from_utf8(remainder) {\n  209 |                     // for UTF-8 we count characters\n  210 |                     let prefix_len = Self::char_prefix_len(valid, limit);\n  211 |                     key_start + prefix_len\n  212 |                 } else {\n  213 |                     // for invalid UTF-8 we count bytes\n  214 |                     key_start + remainder.len().min(limit)\n  215 |                 }\n  216 |             }\n  217 |         }\n  218 |     }\n  219 | \n  220 |     fn char_prefix_len(text: &str, limit: usize) -> usize {\n  221 |         for (count, (idx, _)) in text.char_indices().enumerate() {\n  222 |             if count == limit {\n  223 |                 return idx;\n  224 |             }\n  225 |         }\n  226 |         text.len()\n  227 |     }","lines":31}]},{"id":"PERF_26","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"numbered_backup_path performs a linear scan calling fs::symlink_metadata for every\ncandidate index starting at 1, on each invocation. existing_backup_path also probes\n\".~1~\" and then re-runs the full scan from 1. For a target that already has many\nnumbered backups (N existing), creating one backup is O(N) stat syscalls, and a\nbatch of M files becomes O(M*N). This matches GNU's simple approach but is a known\nquadratic cost for large backup counts.","fix":"Acceptable for typical use; if hot, cache the last used index per directory or\nprobe with exponential search before linear refinement.","locations":[{"ref":"src/uucore/src/lib/features/backup_control.rs:442-455","code":"  442 | fn numbered_backup_path(path: &Path) -> PathBuf {\n  443 |     let mut i: u64 = 1;\n  444 |     loop {\n  445 |         let new_path = simple_backup_path(path, OsString::from(format!(\".~{i}~\")));\n  446 |         // Use `symlink_metadata` rather than `exists()` so that a dangling\n  447 |         // symlink still counts as an existing backup (avoiding a silent\n  448 |         // overwrite), and so we do not report a live symlink as missing when\n  449 |         // the target cannot be stat'd.\n  450 |         if fs::symlink_metadata(&new_path).is_err() {\n  451 |             return new_path;\n  452 |         }\n  453 |         i += 1;\n  454 |     }\n  455 | }","lines":14},{"ref":"src/uucore/src/lib/features/backup_control.rs:457-463","code":"  457 | fn existing_backup_path<S: AsRef<OsStr>>(path: &Path, suffix: S) -> PathBuf {\n  458 |     let test_path = simple_backup_path(path, OsString::from(\".~1~\"));\n  459 |     if fs::symlink_metadata(&test_path).is_ok() {\n  460 |         return numbered_backup_path(path);\n  461 |     }\n  462 |     simple_backup_path(path, suffix.as_ref())\n  463 | }","lines":7}]},{"id":"PERF_27","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`LineFormat::validate_checksum_format` loops `for index in 0..checksum.len()` and on each iteration\nre-slices `checksum[index..]` and pattern-matches it. This is O(n) overall (each match only inspects the\nfirst 1-3 bytes), so it is not quadratic, but reslicing the whole tail every iteration and matching against\nthe 3 explicit `[b'=', ...]` end-padding patterns (which require the remaining slice length to equal the\npattern length) is needlessly indirect. A single pass over the bytes with index-based lookahead for the\ntrailing `=` run is clearer and avoids constructing tail subslices.","fix":"Iterate over bytes directly, tracking whether base64-specific chars were seen, and validate the trailing\n'=' padding (1-3 chars, only at end) with an explicit suffix check rather than per-index tail slicing.","locations":[{"ref":"src/uucore/src/lib/features/checksum/validate.rs:397-434","code":"  397 |     fn validate_checksum_format(checksum: &[u8]) -> Option<String> {\n  398 |         if checksum.is_empty() {\n  399 |             return None;\n  400 |         }\n  401 | \n  402 |         let mut is_base64 = false;\n  403 | \n  404 |         for index in 0..checksum.len() {\n  405 |             match checksum[index..] {\n  406 |                 // ASCII alphanumeric\n  407 |                 [b'A'..=b'Z' | b'a'..=b'z' | b'0'..=b'9', ..] => (),\n  408 |                 // Base64 special character\n  409 |                 [b'+' | b'/', ..] => is_base64 = true,\n  410 |                 // Base64 end of string padding\n  411 |                 [b'='] | [b'=', b'='] | [b'=', b'=', b'='] => {\n  412 |                     is_base64 = true;\n  413 |                     break;\n  414 |                 }\n  415 |                 // Any other character means the checksum is wrong\n  416 |                 _ => return None,\n  417 |             }\n  418 |         }\n  419 | \n  420 |         // If base64 characters were encountered, make sure the checksum has a\n  421 |         // length multiple of 4.\n  422 |         //\n  423 |         // This check is not enough because it may allow base64-encoded\n  424 |         // checksums that are fully alphanumeric. Another check happens later\n  425 |         // when we are provided with a length hint to detect ambiguous\n  426 |         // base64-encoded checksums.\n  427 |         if is_base64 && !checksum.len().is_multiple_of(4) {\n  428 |             return None;\n  429 |         }\n  430 | \n  431 |         // SAFETY: we just validated the contents of checksum, we can unsafely make a\n  432 |         // String from it\n  433 |         Some(unsafe { String::from_utf8_unchecked(checksum.to_vec()) })\n  434 |     }","lines":38}]},{"id":"PERF_28","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"get_locale_from_env uses enc.to_lowercase() (full Unicode case folding, allocates a String) to compare an encoding token against \"utf-8\"/\"utf8\". Encoding names are ASCII; charmap.rs deliberately uses to_ascii_lowercase for the same purpose. The Unicode path is needlessly heavier and inconsistent with the sibling module.","fix":"Use enc.eq_ignore_ascii_case(\"utf-8\") || enc.eq_ignore_ascii_case(\"utf8\") to avoid the allocation and match charmap.rs.","locations":[{"ref":"src/uucore/src/lib/features/i18n/mod.rs:62-65","code":"   62 |                 && split.next().is_some_and(|enc| {\n   63 |                     let lower = enc.to_lowercase();\n   64 |                     lower == \"utf-8\" || lower == \"utf8\"\n   65 |                 }) {","lines":4}]},{"id":"PERF_29","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Both CQuoter (push_char) and LiteralQuoter (push_char) collect each escaped character into a freshly heap-allocated String and then copy its bytes into the output buffer. This allocates and frees a String for every single character of every filename, and CQuoter::push_invalid does the same per invalid byte. On large directory listings (ls) this is a hot path; the intermediate String is pure overhead since the iterator yields chars that could be written straight into the buffer.","fix":"Write the EscapedChar iterator output directly into self.buffer without an intermediate String, e.g. iterate and push each char's UTF-8 bytes via a small `[u8; 4]` encode buffer (or a reusable scratch String stored on the quoter).","locations":[{"ref":"src/uucore/src/lib/features/quoting_style/c_quoter.rs:35-47","code":"   35 |     fn push_char(&mut self, input: char) {\n   36 |         let escaped: String = EscapedChar::new_c(input, self.quotes, self.dirname)\n   37 |             .hide_control()\n   38 |             .collect();\n   39 |         self.buffer.extend_from rs:142-160","code":"  142 |                 self.buffer.extend(x.to_string().as_bytes());\n  143 |             }\n  144 |             EscapeState::ForceQuote(x) => {\n  145 |                 self.exit_dollar();\n  146 |                 self.must_quote = true;\n  147 |                 self.buffer.extend(x.to_string().as_bytes());\n  148 |             }\n  149 |             // Single quotes are not put in dollar expressions, but are escaped\n  150 |             // if the string also contains double quotes. In that case, they\n  151 |             // must be handled separately.\n  152 |             EscapeState::Backslash('\\'') => {\n  153 |                 self.must_quote = true;\n  154 |                 self.in_dollar = false;\n  155 |                 self.buffer.extend(b\"'\\\\''\");\n  156 |             }\n  157 |             _ => {\n  158 |                 self.enter_dollar();\n  159 |                 self.must_quote = true;\n  160 |                 self.buffer.extend(escaped.collect::<String>().as_bytes());","lines":19}]},{"id":"PERF_31","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"read_dir_entries dup()s the directory fd and builds a fresh nix::dir::Dir on every\nDirFd::read_dir call. In recursive chown (safe_traverse_dir) this is one extra dup + a\nfull directory open per directory visited. The dup is needed because Dir takes\nownership, but a single read could reuse the fd via fdopendir semantics or read entries\nwith getdents directly to avoid the dup and the second open of the directory stream.","fix":"Minor; if profiling shows it matters, read entries with rustix::fs::Dir/getdents\non a borrowed fd instead of dup + nix::dir::Dir.","locations":[{"ref":"src/uucore/src/lib/features/safe_traversal.rs:112-128","code":"  112 | fn read_dir_entries(fd: &OwnedFd) -> io::Result<Vec<OsString>> {\n  113 |     let mut entries = Vec::new();\n  114 | \n  115 |     // Duplicate the fd for Dir (it takes ownership)\n  116 |     let dup_fd = nix::unistd::dup(fd).map_err(|e| io::Error::from_raw_os_error(e as i32))?;\n  117 |     let mut dir = Dir::from_fd(dup_fd).map_err(|e| io::Error::from_raw_os_error(e as i32))?;\n  118 |     for entry_result in dir.iter() {\n  119 |         let entry = entry_result.map_err(|e| io::Error::from_raw_os_error(e as i32))?;\n  120 |         let name = entry.file_name();\n  121 |         let name_os = OsStr::from_bytes(name.to_bytes());\n  122 |         if name_os != \".\" && name_os != \"..\" {\n  123 |             entries.push(name_os.to_os_string());\n  124 |         }\n  125 |     }\n  126 | \n  127 |     Ok(entries)\n  128 | }","lines":17}]},{"id":"PERF_32","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"extract_fluent_value re-parses the entire .ftl file content (`parser::parse(content.clone())`) on every call, and it is called separately for usage, about, after-help, and once per option help key. For a utility with many options this re-parses (and clones) the same Fluent resource many times while generating a single page. The cost is small for a build-time doc generator but is avoidable repeated work.","fix":"Parse the Fluent resource once per MDWriter (e.g. cache the parsed body or a key->value HashMap) and look keys up from the cache instead of re-parsing for each key.","locations":[{"ref":"src/bin/uudoc.rs:441-472","code":"  441 |     fn extract_fluent_value(&self, key: &str) -> Option<String> {\n  442 |         let content = self.fluent.as_ref()?;\n  443 |         let resource = parser::parse(content.clone()).ok()?;\n  444 | \n  445 |         for entry in resource.body {\n  446 |             if let Entry::Message(Message {\n  447 |                 id,\n  448 |                 value: Some(Pattern { elements }),\n  449 |                 ..\n  450 |             }) = entry\n  451 |             {\n  452 |                 if id.name == key {\n  453 |                     // Simple text extraction - just concatenate text elements\n  454 |                     let mut result = String::new();\n  455 |                     for element in elements {\n  456 |                         if let TextElement { ref value } = element {\n  457 |                             result.push_str(value);\n  458 |                         }\n  459 |                         if let Placeable {\n  460 |                             expression:\n  461 |                                 Expression::Inline(InlineExpression::StringLiteral { ref value }),\n  462 |                         } = element\n  463 |                         {\n  464 |                             result.push_str(value);\n  465 |                         }\n  466 |                     }\n  467 |                     return Some(result);\n  468 |                 }\n  469 |             }\n  470 |         }\n  471 |         None\n  472 |     }","lines":32},{"ref":"src/bin/uudoc.rs:522-630","code":"  522 |         if let Some(usage) = self.extract_fluent_value(&format!(\"{}-usage\", self.fluent_key)) {\n  523 |             let usage = fix_usage(self.name, usage);\n  524 |             writeln!(self.w, \"\\n```\")?;\n  525 |             writeln!(self.w, \"{usage}\")?;\n  526 |             writeln!(self.w, \"```\")\n  527 |         } else {\n  528 |             Ok(())\n  529 |         }\n  530 |     }\n  531 | \n  532 |     /// # Errors\n  533 |     /// Returns an error if the writer fails.\n  534 |     fn about(&mut self) -> io::Result<()> {\n  535 |         if let Some(about) = self.extract_fluent_value(&format!(\"{}-about\", self.fluent_key)) {\n  536 |             writeln!(self.w, \"{about}\")\n  537 |         } else {\n  538 |             Ok(())\n  539 |         }\n  540 |     }\n  541 | \n  542 |     /// # Errors\n  543 |     /// Returns an error if the writer fails.\n  544 |     fn after_help(&mut self) -> io::Result<()> {\n  545 |         if let Some(after_help) =\n  546 |             self.extract_fluent_value(&format!(\"{}-after-he            write!(self.w, \"<\/code>\")?;\n  595 |             }\n  596 |             for s in arg.get_short_and_visible_aliases().unwrap_or_default() {\n  597 |                 if first {\n  598 |                     first = false;\n  599 |                 } else {\n  600 |                     write!(self.w, \", \")?;\n  601 |                 }\n  602 |                 write!(self.w, \"<code>\")?;\n  603 |                 write!(self.w, \"-{s}\")?;\n  604 |                 if let Some(names) = arg.get_value_names() {\n  605 |                     write!(\n  606 |                         self.w,\n  607 |                         \" {}\",\n  608 |                         names\n  609 |                             .iter()\n  610 |                             .map(|x| format!(\"&lt;{x}&gt;\"))\n  611 |                             .collect::<Vec<_>>()\n  612 |                             .join(\" \")\n  613 |                     )?;\n  614 |                 }\n  615 |                 write!(self.w, \"<\/code>\")?;\n  616 |             }\n  617 |             writeln!(self.w, \"<\/dt>\")?;\n  618 |             let help_text = arg.get_help().unwrap_or_default().to_string();\n  619 |             // Try to resolve Fluent key if it looks like one, otherwise use as-is\n  620 |             let resolved_help = if help_text.starts_with(&format!(\"{}-help-\", self.fluent_key)) {\n  621 |                 self.extract_fluent_value(&help_text).unwrap_or(help_text)\n  622 |             } else {\n  623 |                 help_text\n  624 |             };\n  625 |             writeln!(\n  626 |                 self.w,\n  627 |                 \"<dd>\\n\\n{}\\n\\n<\/dd>\",\n  628 |                 resolved_help.replace('\\n', \"<br />\")\n  629 |             )?;\n  630 |         }","lines":109}]},{"id":"PERF_33","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"escape_invalid_bytes builds a Vec<u8> per byte via flat_map returning vec![b] or format!(\"\\\\{b:03o}\").into_bytes(), allocating a small Vec for every single byte of the input. This is only on the invalid-UTF-8 error path so impact is negligible, but it is needlessly allocation-heavy.","fix":"Build a single String with a reserved capacity and push chars / write octal escapes directly, avoiding a per-byte Vec allocation.","locations":[{"ref":"src/uu/date/src/date.rs:174-188","code":"  174 | fn escape_invalid_bytes(bytes: &[u8]) -> String {\n  175 |     let escaped = bytes\n  176 |         .iter()\n  177 |         .flat_map(|&b| {\n  178 |             // Preserve printable ASCII except backslash\n  179 |             if (0x20..0x7f).contains(&b) && b != b'\\\\' {\n  180 |                 vec![b]\n  181 |             } else {\n  182 |                 // Escape as octal: \\NNN\n  183 |                 format!(\"\\\\{b:03o}\").into_bytes()\n  184 |             }\n  185 |         })\n  186 |         .collect::<Vec<u8>>();\n  187 |     String::from_utf8_lossy(&escaped).into_owned()\n  188 | }","lines":15}]},{"id":"PERF_34","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`get_all_filesystems` calls `is_best(&mounts, &mi)` inside the loop over the mount list, which\nis linear in the number of accepted mounts, making the loop O(n^2) in the number of mounts.\nThe existing TODO comment acknowledges this. Usually harmless (few mounts) but can matter on\nmachines with thousands of mounts/containers.","fix":"If this becomes a hotspot, index `mounts` by `dev_id` (e.g. a HashMap from dev_id to the current\nbest MountInfo) so `is_best` is O(1) amortized.","locations":[{"ref":"src/uu/df/src/df.rs:295-321","code":"  295 | fn get_all_filesystems(opt: &Options) -> UResult<Vec<Filesystem>> {\n  296 |     let mut mounts = vec![];\n  297 |     for mut mi in read_fs_list()? {\n  298 |         // TODO The running time of the `is_best()` function is linear\n  299 |         // in the length of `result`. That makes the running time of\n  300 |         // this loop quadratic in the length of `vmi`. This could be\n  301 |         // improved by a more efficient implementation of `is_best()`,\n  302 |         // but `vmi` is probably not very long in practice.\n  303 |         if is_included(&mi, opt) && is_best(&mounts, &mi) {\n  304 |             let dev_path: &Path = Path::new(&mi.dev_name);\n  305 |             // Only check is_symlink() for absolute paths. For non-absolute paths\n  306 |             // like \"tmpfs\", \"sysfs\", etc., is_symlink() would resolve relative to\n  307 |             // the current working directory, which is extremely slow in deeply\n  308 |             // nested directories (O(n) syscalls where n is the directory depth).\n  309 |             if dev_path.is_absolute() && dev_path.is_symlink() {\n  310 |                 if let Ok(canonicalized_symlink) = uucore::fs::canonicalize(\n  311 |                     dev_path,\n  312 |                     uucore::fs::MissingHandling::Existing,\n  313 |                     uucore::fs::ResolveMode::Logical,\n  314 |                 ) {\n  315 |                     mi.dev_name = canonicalized_symlink.to_string_lossy().to_string();\n  316 |                 }\n  317 |             }\n  318 | \n  319 |             mounts.push(mi);\n  320 |         }\n  321 |     }","lines":27}]},{"id":"PERF_35","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`draw_lines` clones each visible line on every redraw (`self.lines[index].clone()`) even when there\nis no pattern to highlight, and `search_pattern_in_file` clones the whole pattern string on every\ncall. For large screens / frequent redraws this is unnecessary allocation. The pattern-replace path\nalso re-runs `String::replace` (allocating) for every visible line each frame.","fix":"Only clone/allocate when a pattern is present (write the borrowed line directly otherwise), and take\nthe pattern by reference instead of cloning it in `search_pattern_in_file`.","locations":[{"ref":"src/uu/more/src/more.rs:608-609","code":"  608 |     fn search_pattern_in_file(&mut self) -> Option<usize> {\n  609 |         let pattern = self.pattern.clone().expect(\"pattern should be set\");","lines":2},{"ref":"src/uu/more/src/more.rs:822-827","code":"  822 |             let mut line = self.lines[index].clone();\n  823 |             if let Some(pattern) = &self.pattern {\n  824 |                 let highlighted = self.highlight_text(pattern);\n  825 |                 line = line.replace(pattern, &highlighted);\n  826 |             }\n  827 |             self.stdout.write_all(format!(\"\\r{line}\\n\").as_bytes())?;","lines":6}]},{"id":"PERF_36","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`si_bases_f64()` and `iec_bases_f64()` recompute the 11-element f64 conversion of the base\narrays on every call. They are invoked inside hot paths (`remove_suffix`, `consider_suffix`,\n`transform_*`) once per formatted field. The arrays are constant, so this is redundant work\non each line.","fix":"Cache the converted arrays in a `static`/`OnceLock<[f64; 11]>` (or make them `const` with\nexplicit literals) and return a reference, avoiding per-call recomputation.","locations":[{"ref":"src/uu/numfmt/src/units.rs:10-17","code":"   10 | pub fn si_bases_f64() -> [f64; 11] {\n   11 |     SI_BASES.map(|b| b as f64)\n   12 | }\n   13 | \n   14 | /// `f64` view of [`uucore::parser::parse_size::IEC_BASES`].\n   15 | pub fn iec_bases_f64() -> [f64; 11] {\n   16 |     IEC_BASES.map(|b| b as f64)\n   17 | }","lines":8}]},{"id":"PERF_37","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In ptx `read_word_filter_file`, the whole filter file is read line by line into a `HashSet<String>` with `reader.lines()`. This is fine, but `create_word_set` recompiles `filter.word_regex` and `config.context_regex` once per call (not per line), which is fine; however `prepare_line_chunks` recomputes character positions with repeated `line[..pos].chars().count()` scans for every word match on a line, which is O(n) per match and O(n*m) per line. For pathological long lines with many matches this is quadratic.","fix":"Cache the byte->char position mapping per line (it is already materialized as `chars_line`) instead of re-scanning the prefix for every match.","locations":[{"ref":"src/uu/ptx/src/ptx.rs:747-752","code":"  747 |     // Convert byte positions to character positions\n  748 |     let ref_char_position = line[..word_ref.position].chars().count();\n  749 |     let char_position_end = ref_char_position\n  750 |         + line[word_ref.position..word_ref.position_end]\n  751 |             .chars()\n  752 |             .count();","lines":6}]},{"id":"PERF_38","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"is_root_path() calls path.canonicalize() (a full pathname resolution syscall chain) for every directory operand passed to handle_dir, even in the common case where the path is plainly not root. For `rm -r` over many top-level directory arguments this adds an avoidable canonicalize per argument.","fix":"Short-circuit: only canonicalize when the cheap literal-root check is inconclusive and the path could plausibly be a symlink to root (e.g. skip canonicalize for multi-component relative paths), or cache the result.","locations":[{"ref":"src/uu/rm/src/rm.rs:724-736","code":"  724 | fn is_root_path(path: &Path) -> bool {\n  725 |     // Check simple case: literal \"/\" path\n  726 |     if path.has_root() && path.parent().is_none() {\n  727 |         return true;\n  728 |     }\n  729 | \n  730 |     // Check if path resolves to \"/\" after following symlinks\n  731 |     if let Ok(canonical) = path.canonicalize() {\n  732 |         canonical.has_root() && canonical.parent().is_none()\n  733 |     } else {\n  734 |         false\n  735 |     }\n  736 | }","lines":13}]},{"id":"PERF_39","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In `chunks::read`, when the carry-over is larger than the recycled buffer, the\nbuffer is grown with `extend_from_slice(&carry_over[buffer.len()..])`\n(chunks.rs:206) and then the full carry-over is copied again over\n`buffer[..carry_over.len()]` (chunks.rs:208). The bytes appended by the\n`extend` are immediately overwritten by the second copy, so the tail of the\ncarry-over is copied twice.","fix":"Grow the buffer with `buffer.resize(carry_over.len(), 0)` (no data copy) before\nthe single `copy_from_slice`, avoiding the duplicated tail copy.","locations":[{"ref":"src/uu/sort/src/chunks.rs:204-208","code":"  204 |     if buffer.len() < carry_over.len() {\n  205 |         // Separate carry_over and copy them to avoid cost of 0 fill buffer\n  206 |         buffer.extend_from_slice(&carry_over[buffer.len()..]);\n  207 |     }\n  208 |     buffer[..carry_over.len()].copy_from_slice(carry_over);","lines":5}]},{"id":"PERF_40","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"LinesWithSep::next and LinesWithNewlines::next both allocate a new Vec per line read. Same per-line allocation pattern as above; acceptable for correctness but a measurable cost on large line-heavy inputs.","fix":"Consider reusing a buffer where the iterator contract allows, or document that the allocation is intentional.","locations":[{"ref":"src/uu/split/src/split.rs:1446-1453","code":" 1446 |     fn next(&mut self) -> Option<Self::Item> {\n 1447 |         let mut buf = vec![];\n 1448 |         match self.inner.read_until(self.separator, &mut buf) {\n 1449 |             Ok(0) => None,\n 1450 |             Ok(_) => Some(Ok(buf)),\n 1451 |             Err(e) => Some(Err(e)),\n 1452 |         }\n 1453 |     }","lines":8},{"ref":"src/uu/csplit/src/csplit.rs:87-100","code":"   87 |     fn next(&mut self) -> Option<Self::Item> {\n   88 |         fn ret(v: Vec<u8>) -> io::Result<String> {\n   89 |             String::from_utf8(v).map_err(|_| {\n   90 |                 io::Error::new(ErrorKind::InvalidData, translate!(\"csplit-stream-not-utf8\"))\n   91 |             })\n   92 |         }\n   93 | \n   94 |         let mut v = Vec::new();\n   95 |         match self.inner.read_until(b'\\n', &mut v) {\n   96 |             Ok(0) => None,\n   97 |             Ok(_) => Some(ret(v)),\n   98 |             Err(e) => Some(Err(e)),\n   99 |         }\n  100 |     }","lines":14}]},{"id":"PERF_41","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`find_mount_point` calls `p.as_ref().canonicalize()` on every `%m` directive evaluation for\nevery file. The mount list itself is cached via `OnceCell`, but the per-file canonicalize plus\nthe linear scan over all mount points is not a concern for typical use; flagged only as a minor\nnote for very large file lists.","fix":"Acceptable as-is; no change required unless profiling shows it matters.","locations":[{"ref":"src/uu/stat/src/stat.rs:1011-1035","code":" 1011 |     fn find_mount_point<P: AsRef<Path>>(&self, p: P) -> Option<&OsString> {\n 1012 |         if !self.mount_list_needed {\n 1013 |             return None;\n 1014 |         }\n 1015 | \n 1016 |         let mount_list = self.mount_list.get_or_init(|| {\n 1017 |             match Self::populate_mount_list() {\n 1018 |                 Ok(list) => Some(list),\n 1019 |                 Err(e) => {\n 1020 |                     // Show warning like GNU does when mount information cannot be read\n 1021 |                     show_warning!(\n 1022 |                         \"{}\",\n 1023 |                         translate!(\"stat-error-cannot-read-filesystem\", \"error\" => e.to_string())\n 1024 |                     );\n 1025 |                     None\n 1026 |                 }\n 1027 |             }\n 1028 |         });\n 1029 | \n 1030 |         let path = p.as_ pe":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`stat_split` allocates an owned `String::from(stat)` copy of the whole stat line at the very start\n(line 375) even though the input is already `&str` and the early branch only needs to read it. The owned\ncopy is only ever used through `&str` views; the function then also does `.replace(' ', \"$$\")` and a second\n`.replace(\"$$\", \" \")` per field. For the dead-code `walk_process` path this is minor, but the leading\n`String::from` is pure waste.","fix":"Drop the `let stat = String::from(stat);` copy and operate on the `&str` directly; the buffer `buf` already\nholds the only owned data that is needed.","locations":[{"ref":"src/uucore/src/lib/features/proc_info.rs:374-397","code":"  374 | fn stat_split(stat: &str) -> Vec<String> {\n  375 |     let stat = String::from(stat);\n  376 | \n  377 |     let mut buf = String::with_capacity(stat.len());\n  378 | \n  379 |     let l = stat.find('(');\n  380 |     let r = stat.find(')');\n  381 |     let content = if let (Some(l), Some(r)) = (l, r) {\n  382 |         let replaced = stat[(l + 1)..r].replace(' ', \"$$\");\n  383 | \n  384 |         buf.push_str(&stat[..l]);\n  385 |         buf.push_str(&replaced);\n  386 |         buf.push_str(&stat[(r + 1)..stat.len()]);\n  387 | \n  388 |         &buf\n  389 |     } else {\n  390 |         &stat\n  391 |     };\n  392 | \n  393 |     content\n  394 |         .split_whitespace()\n  395 |         .map(|it| it.replace(\"$$\", \" \"))\n  396 |         .collect()\n  397 | }","lines":24}]},{"id":"PERF_47","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Range::merge` removes overlapping ranges from the middle of the `Vec` with `ranges.remove(j)`\ninside a loop, which is O(n) per removal and thus O(n^2) for the merge of many overlapping\nranges. For the typical small range lists passed to `cut`/`fold` etc. this is irrelevant, but\nit is an avoidable quadratic on pathological input.","fix":"Build the merged result into a new `Vec` in a single forward pass (push or extend the current\nrange's `high`) instead of repeatedly removing from the middle of the original vector.","locations":[{"ref":"src/uucore/src/lib/features/ranges.rs:97-110","code":"   97 |     fn merge(mut ranges: Vec<Self>) -> Vec<Self> {\n   98 |         ranges.sort();\n   99 | \n  100 |         // merge overlapping ranges\n  101 |         for i in 0..ranges.len() {\n  102 |             let j = i + 1;\n  103 | \n  104 |             while j < ranges.len() && ranges[j].low <= ranges[i].high {\n  105 |                 let j_high = ranges.remove(j).high;\n  106 |                 ranges[i].high = max(ranges[i].high, j_high);\n  107 |             }\n  108 |         }\n  109 |         ranges\n  110 |     }","lines":14}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"Inside `safe_du`, the branch that skips symlinks when `options.dereference == Deref::All`\n(the `is_symlink && options.dereference == Deref::All` check) can never be taken. `safe_du`\nis only invoked when `use_safe_traversal` is true, and that is defined as\n`traversal_options.dereference != Deref::All`. Therefore `options.dereference` is guaranteed\nto not be `Deref::All` for the entire `safe_du` call tree, making this conditional and its\ncomment unreachable dead code.","fix":"Remove the `is_symlink && options.dereference == Deref::All` block from `safe_du` (and its\nmisleading comment), since `Deref::All` is always handled by the regular traversal path.","locations":[{"ref":"src/uu/du/src/du.rs:449-456","code":"  449 |         // Handle symlinks with -L option\n  450 |         // For safe traversal with -L, we skip symlinks to directories entirely\n  451 |         // and let the non-safe traversal handle them at the top level\n  452 |         if is_symlink && options.dereference == Deref::All {\n  453 |             / tion are used). It duplicates try_init_collator except for panicking when the collator was already set. As exported-but-unused API it is effectively dead code.","fix":"Remove init_collator, or document why a panicking variant is retained; if kept, route try_init_collator and init_collator through a shared private constructor to avoid the duplicated try_new call.","locations":[{"ref":"src/uucore/src/lib/features/i18n/collator.rs:26-31","code":"   26 | /// Will initialize the collator and panic if already initialized.\n   27 | pub fn init_collator(opts: CollatorOptions) {\n   28 |     COLLATOR\n   29 |         .set(CollatorBorrowed::try_new(get_collating_locale().0.clone().into(), opts).unwrap())\n   30 |         .expect(\"Collator already initialized\");\n   31 | }","lines":6}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"The condition `bcp47 == \"C\"` in the encoding check can never be true. The case simple == \"C\" (and \"POSIX\") is already handled and returned earlier at line 48, and bcp47 is derived from simple solely by replacing '_' with '-'; since \"C\" contains no underscore, bcp47 == \"C\" implies simple == \"C\", which already returned. The branch is unreachable dead code that obscures intent.","fix":"Remove the `|| bcp47 == \"C\"` disjunct from the condition on line 61, leaving just `locale != DEFAULT_LOCALE`.","locations":[{"ref":"src/uucore/src/lib/features/i18n/mod.rs:48-69","code":"   48 |             if simple == \"C\" || simple == \"POSIX\" {\n   49 |                 return (DEFAULT_LOCALE, UEncoding::Ascii);\n   50 |             }\n   51 | \n   52 |             // Naively convert the locale name to BCP47 tag format.\n   53 |             //\n   54 |             // See https://en.wikipedia.org/wiki/IETF_language_tag\n   55 |             let bcp47 = simple.replace('_', \"-\");\n   56 |             let locale = Locale::try_from_str(&bcp47).unwrap_or(DEFAULT_LOCALE);\n   57 | \n   58 | f::other(format!(\n   96 |                 \"Failed to preserve hardlink: {} -> {}\",\n   97 |                 source.quote(),\n   98 |                 target.quote()\n   99 |             )),\n  100 | \n  101 |             HardlinkError::Metadata { path, error } => Self::other(format!(\n  102 |                 \"Metadata access error for {}: {error}\",\n  103 |                 path.quote(),\n  104 |             )),\n  105 |         }\n  106 |     }\n  107 | }","lines":65}]},{"id":"DEAD_13","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"InputSource::Stream(Box<dyn io::Read>) is only constructed in test modules; it is annotated #[allow(dead_code)] for non-test builds. Likewise byteorder_io generates write_* and read_i16/i32/i64/f-write variants for every type via the macro, all marked #[allow(dead_code)]; only the read_u*/read_f*/read_u128 paths are actually used by od. This is a sizeable amount of generated, never-exercised code carried for API symmetry.","fix":"Consider trimming the generated byteorder ops to the read operations actually used (read_u16/u32/u64/u128, read_f32/f64), and gating InputSource::Stream behind #[cfg(test)] since it is test-only.","locations":[{"ref":"src/uu/od/src/multifile_reader.rs:16-17","code":"   16 |     #[allow(dead_code)]\n   17 |     Stream(Box<dyn io::Read>),","lines":2},{"ref":"src/uu/od/src/byteorder_io.rs:20-57","code":"   20 | macro_rules! gen_byte_order_ops {\n   21 |     ($($read_name:ident, $write_name:ident -> $tpe:ty),+) => {\n   22 |         impl ByteOrder {\n   23 |             $(\n   24 |             #[allow(dead_code)]\n   25 |             #[inline]\n   26 |             pub fn $read_name(self, source: &[u8]) -> $tpe {\n   27 |                 match self {\n   28 |                     ByteOrder::Little => LittleEndian::$read_name(source),\n   29 |                     ByteOrder::Big => BigEndian::$read_name(source),\n   30 |                     ByteOrder::Native => NativeE n   11 |     /// returns all command line parameters which do not belong to an option.\n   12 |     fn inputs(&self) -> Vec<&str>;\n   13 |     /// tests if any of the specified options is present.\n   14 |     fn opts_present(&self, _: &[&str]) -> bool;\n   15 | }\n   16 | \n   17 | /// Implementation for `getopts`\n   18 | impl CommandLineOpts for ArgMatches {\n   19 |     fn inputs(&self) -> Vec<&str> {\n   20 |         self.get_many::<String>(options::FILENAME)\n   21 |             .map(|values| values.map(String::as_str).collect())\n   22 |             .unwrap_or_default()\n   23 |     }\n   24 | \n   25 |     fn opts_present(&self, opts: &[&str]) -> bool {\n   26 |         opts.iter()\n   27 |             .any(|opt| self.value_source(opt) == Some(clap::parser::ValueSource::CommandLine))\n   28 |     }\n   29 | }","lines":21}]},{"id":"DEAD_15","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`chunks.rs` carries a module-level `#![allow(dead_code)]` (with a comment that\nonly mentions `borrow_buffer` in `Chunk`). This blanket allow suppresses\ndead-code warnings for the entire file, so genuinely unused items (e.g. helper\nmethods, the `line_count_hint` plumbing on non-threaded paths) can accumulate\nundetected.","fix":"Replace the file-wide `#![allow(dead_code)]` with a targeted\n`#[allow(dead_code)]` on the specific item(s) that are conditionally unused so\nthe rest of the module keeps dead-code detection.","locations":[{"ref":"src/uu/sort/src/chunks.rs:9-10","code":"    9 | #![allow(dead_code)]\n   10 | // Ignores non-used warning for `borrow_buffer` in `Chunk`","lines":2}]},{"id":"DEAD_16","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"Number::digits is annotated `#[allow(dead_code)]` and is only used by unit tests; the production code never calls it. The allow attribute masks that the method is non-test dead code.","fix":"Move the method behind #[cfg(test)] alongside the tests that use it, or remove it if not needed.","locations":[{"ref":"src/uu/split/src/number.rs:103-109","code":"  103 |     #[allow(dead_code)]\n  104 |     fn digits(&self) -> Vec<u8> {\n  105 |         match self {\n  106 |             Self::FixedWidth(number) => number.digits(),\n  107 |             Self::DynamicWidth(number) => number.digits(),\n  108 |         }\n  109 |     }","lines":7}]},{"id":"DEAD_17","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In `control_char_to_string`, after the `cc >= 0x80` adjustment `code` is at most `0xff - 0x80 = 0x7f`,\nand when `cc < 0x80` `code == cc <= 0x7f`. Therefore the `_ => Err(nix::errno::Errno::ERANGE)` arm\nmatching codes above `0x7f` is unreachable; the function can never return ERANGE. The comment\n\"Out of range (above 8 bits)\" is also misleading since `cc_t` is 8 bits here.","fix":"Drop the unreachable ERANGE arm (and make the match exhaustive over 0..=0x7f), or document why it is\nretained for non-u8 cc_t platforms; update the misleading \"above 8 bits\" comment.","locations":[{"ref":"src/uu/stty/src/stty.rs:839-848","code":"  839 |     let (ctrl_prefix, character) = match code {\n  840 |         // Control characters in ASCII range\n  841 |         0..=0x1f => Ok((\"^\", (b'@' + code) as char)),\n  842 |         // Printable ASCII characters\n  843 |         0x20..=0x7e => Ok((\"\", code as char)),\n  844 |         // DEL character\n  845 |         0x7f => Ok((\"^\", '?')),\n  846 |         // Out of range (above 8 bits)\n  847 |         _ => Err(nix::errno::Errno::ERANGE),\n  848 |     }?;","lines":10}]},{"id":"DEAD_18","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"The `follow()` loop maintains `timeout_counter` (incremented on every RecvTimeout, reset on event)\nand compares it to `settings.max_unchanged_stats` at line 643, but the body of that `if` is empty\n(only a TODO comment). The entire `timeout ied arm is redundant since the wildcard yields the same value.","fix":"Collapse to `ErrorKind::NotFound => CommandNotFound, _ => CannotInvoke` to remove the redundant arm.","locations":[{"ref":"src/uu/timeout/src/timeout.rs:408-413","code":"  408 |     let process = &mut cmd_builder.spawn().map_err(|err| {\n  409 |         let status_code = match err.kind() {\n  410 |             ErrorKind::NotFound => ExitStatus::CommandNotFound.into(),\n  411 |             ErrorKind::PermissionDenied => ExitStatus::CannotInvoke.into(),\n  412 |             _ => ExitStatus::CannotInvoke.into(),\n  413 |         };","lines":6}]},{"id":"DEAD_20","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"The InputFile enum and Stdout variant doc comment says \"--no-dereference will be ignored in this case\", and pathbuf_from_stdout has a target_os = \"wasi\" arm, but uu_app/uumain build InputFile only from filenames; the WASI arm and several cfg branches are only reachable on platforms not built/tested here. Not a bug, but the WASI branch duplicates the unix \"/dev/stdout\" path and could be merged.","fix":"Merge the wasi and unix arms (both return /dev/stdout) to reduce duplication.","locations":[{"ref":"src/uu/touch/src/touch.rs:75-75","code":"   75 |     /// Touch stdout. `--no-dereference` will be ignored in this case.","lines":1},{"ref":"src/uu/touch/src/touch.rs:889-892","code":"  889 |     #[cfg(target_os = \"wasi\")]\n  890 |     {\n  891 |         Ok(PathBuf::from(\"/dev/stdout\"))\n  892 |     }","lines":4}]},{"id":"DEAD_21","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"The io_blocks flag is fully parsed and threaded through truncate() but the parameter is bound to `_` and never used; -o/--io-blocks is a documented no-op (the help text says NOT IMPLEMENTED). The plumbing (uumain reading the flag, passing it in) is dead weight that can mislead a reader into thinking the option does somethin
