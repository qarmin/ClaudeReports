ups.min(groups.len()))`).","locations":[{"ref":"src/uucore/src/lib/features/entries.rs:183-211","code":"  183 |     pub fn belongs_to(&self) -> Vec<gid_t> {\n  184 |         let mut ngroups: c_int = 8;\n  185 |         let mut ngroups_old: c_int;\n  186 |         let mut groups = vec![0; ngroups.try_into().unwrap()];\n  187 |         let name = CString::new(self.name.as_bytes()).unwrap();\n  188 |         loop {\n  189 |             ngroups_old = ngroups;\n  190 |             if unsafe {\n  191 |                 getgrouplist(\n  192 |                     name.as_ptr(),\n  193 |                     self.gid,\n  194 |                     groups.as_mut_ptr(),\n  195 |                     &raw mut ngroups,\n  196 |                 )\n  197 |             } == -1\n  198 |             {\n  199 |                 if ngroups == ngroups_old {\n  200 |                     ngroups *= 2;\n  201 |                 }\n  202 |                 groups.resize(ngroups.try_into().unwrap(), 0);\n  203 |             } else {\n  204 |                 break;\n  205 |             }\n  206 |         }\n  207 |         let ngroups = ngroups.try_into().unwrap();\n  208 |         assert!(ngroups <= groups.len());\n  209 |         groups.truncate(ngroups);\n  210 |         groups\n  211 |     }","lines":29}]},{"id":"PANIC_38","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"EscapeOctal::from_char calls c.encode_utf8(&mut buf) into a fixed `[u8; 2]` buffer (line 91-92). char::encode_utf8 panics if the buffer is too small, so passing any 3- or 4-byte char panics rather than 'silently truncating'. The doc comment 'Only supports characters up to 2 bytes long in UTF-8' understates this: it is a hard panic, not a soft limitation. Currently unreachable because the only callers pass chars that are is_control() (C0/C1, at most 2 bytes in UTF-8), but it is a latent panic with no guard, and any future reuse of from_char with a wider char would crash.","fix":"Size the buffer to char::MAX (`let mut buf = [0u8; 4];`) and store all len_utf8() bytes, or debug_assert!(c.len_utf8() <= 2) plus a documented invariant; emit octal for every byte of the encoding instead of only two.","locations":[{"ref":"src/uucore/src/lib/features/quoting_style/escaped_char.rs:85-98","code":"   85 | impl EscapeOctal {\n   86 |     fn from_char(c: char) -> Self {\n   87 |         if c.len_utf8() == 1 {\n   88 |             return Self::from_byte(c as u8);\n   89 |         }\n   90 | \n   91 |         let mut buf = [0; 2];\n   92 |         let _s = c.encode_utf8(&mut buf);\n   93 |         Self {\n   94 |             c: buf,\n   95 |             idx: 2,\n   96 |             state: EscapeOctalState::FirstBackslash,\n   97 |         }\n   98 |     }","lines":14}]},{"id":"PANIC_39","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`get_canonical_util_name` blindly slices `&util_name[3..]` to strip a `\"uu_\"` prefix. If it is\never called with a name shorter than 3 bytes, or whose first 3 bytes are not an ASCII\nboundary, this panics (byte-index slicing). It is currently only fed `stringify!($util)` from\nthe `bin_inner!` macro so it is safe in practice, but it is a public function with no guard or\ndocumented precondition.","fix":"Use `util_name.strip_prefix(\"uu_\").unwrap_or(util_name)` instead of unchecked byte slicing.","locations":[{"ref":"src/uucore/src/lib/lib.rs:175-187","code":"  175 | pub fn get_canonical_util_name(util_name: &str) -> &str {\n  176 |     // remove the \"uu_\" prefix\n  177 |     let util_name = &util_name[3..];\n  178 |     match util_name {\n  179 |         // uu_test aliases - '[' is an alias for test\n  180 |         \"[\" => \"test\",\n  181 |         \"dir\" => \"ls\",  // dir is an alias for ls\n  182 |         \"vdir\" => \"ls\", // vdir is an alias for ls\n  183 | \n  184 |         // Default case - return the util name as is\n  185 |         _ => util_name,\n  186 |     }\n  187 | }","lines":13}]},{"id":"PANIC_40","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"SplitWriter::writeln panics with `panic!(...)` if called while current_writer is None and not dev_null. This is an internal-invariant assertion (a writer is always created before writeln), but it is a hard panic reachable only via a logic bug; it is acceptable defensively but worth noting as a potential abort path rather than a returned error.","fix":"Return an io::Error / CsplitError instead of panicking, or convert to debug_assert! if the invariant is guaranteed.","locations":[{"ref":"src/uu/csplit/src/csplit.rs:293-304","code":"  293 |     fn writeln(&mut self, line: &str) -> io::Result<()> {\n  294 |         if !self.dev_null {\n  295 |             if let Some(ref mut current_writer) = self.current_writer {\n  296 |                 let bytes = line.as_bytes();\n  297 |                 current_writer.write_all(bytes)?;\n  298 |                 self.size += bytes.len();\n  299 |             } else {\n  300 |                 panic!(\"{}\", translate!(\"csplit-write-split-not-created\"))\n  301 |             }\n  302 |         }\n  303 |         Ok(())\n  304 |     }","lines":12}]},{"id":"PANIC_41","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"TextOutput::new computes `SystemTime::now() - Duration::new(31_556_952 / 2, 0)` for the recent-time range. If the system clock is set to within ~6 months of the Unix epoch (or earlier), this SystemTime subtraction can panic on platforms where SystemTime cannot represent pre-epoch instants. Extremely unlikely in practice but unguarded.","fix":"Use `SystemTime::now().checked_sub(Duration::new(31_556_952 / 2, 0)).unwrap_or(UNIX_EPOCH)` to avoid the potential panic.","locations":[{"ref":"src/uu/ls/src/ls.rs:1056-1057","code":" 1056 |                 recent_time_range: (SystemTime::now() - Duration::new(31_556_952 / 2, 0))\n 1057 |                     ..=SystemTime::now(),","lines":2}]},{"id":"PANIC_42","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"In mktemp `exec`, after creating the temp file/dir, `path.file_name()` is `.unwrap()`ed and then `.to_str().unwrap()` is called. If tempfile ever returns a path whose final component is non-UTF-8 (possible when prefix/suffix carry non-UTF-8 via the `-t` lossy path), `to_str().unwrap()` panics. The Params path uses lossy conversion for `-t`, so the random part is ASCII and prefix/suffix are already valid UTF-8 strings, making this currently unreachable, but it is a latent panic.","fix":"Handle the non-UTF-8 case by joining the OsStr file_name directly instead of converting through `to_str().unwrap()`.","locations":[{"ref":"src/uu/mktemp/src/mktemp.rs:615-616","code":"  615 |     let filename = path.file_name();\n  616 |     let filename = filename.unwrap().to_str().unwrap();","lines":2}]},{"id":"PANIC_43","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"In ptx `write_traditional_output`, `Regex::new(&config.context_regex).unwrap()` will panic if the context regex is invalid. The default and `--traditional` values are valid, and there is no CLI option that sets `context_regex` to arbitrary user input, so this is currently unreachable, but the `.unwrap()` is a latent panic if a future option ever feeds user input into `context_regex`.","fix":"Propagate the error instead of unwrapping, or document the invariant.","locations":[{"ref":"src/uu/ptx/src/ptx.rs:794","code":"  794 |     let context_reg = Regex::new(&config.context_regex).unwrap();","lines":1}]},{"id":"PANIC_44","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"translate_regex_flavor ends with String::from_utf8(result).expect(\"produces ASCII bytes\"). The invariant holds today (all pushed bytes are ASCII or ASCII hex escapes), but it is an unchecked expect tied to a non-local invariant: any future edit that pushes a raw non-ASCII byte into `result` turns a bad regex into a process panic instead of a clean error.","fix":"Build the result as a String directly (push chars / write! into a String) so the type system guarantees valid UTF-8, removing the runtime expect.","locations":[{"ref":"src/uu/tac/src/tac.rs:321","code":"  321 |     String::from_utf8(result).expect(\"produces ASCII bytes\")","lines":1}]},{"id":"PANIC_45","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"In `report_if_verbose`, `signal_list_name_by_value(signal).unwrap()` will panic if called with a signal value that has no name. The current call sites pass either SIGKILL or a value derived from a received signal / configured signal, so in practice the value is always valid, but an out-of-range realtime/unknown signal forwarded via the external-signal path (`received_sig as usize`) could in principle yield `None`.","fix":"Use `unwrap_or_else(|| signal.to_string())` so an unnamed signal degrades to its numeric form instead of panicking.","locations":[{"ref":"src/uu/timeout/src/timeout.rs:226-229","code":"  226 |             \"0\".to_string()\n  227 |         } else {\n  228 |             signal_list_name_by_value(signal).unwrap()\n  229 |         };","lines":4}]},{"id":"PANIC_46","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"tr `Sequence::from_str` unwraps the nom parser result with `.unwrap()`. The fallback alternative (`parse_backslash_or_char_with_warning` -> `single_char` via `take(1)`) always consumes one byte on non-empty input and `many0` returns Ok on empty input, so this currently cannot fail, but a panic would occur if any sub-parser were changed to error mid-input. There is no test asserting this invariant.","fix":"Replace `.unwrap()` with explicit error handling that maps a parse failure to a BadSequence variant.","locations":[{"ref":"src/uu/tr/src/operation.rs:352-369","code":"  352 |     pub fn from_str(input: &[u8]) -> Result<Vec<Self>, BadSequence> {\n  353 |         many0(alt((\n  354 |             Self::parse_char_range,\n  355 |             Self::parse_char_star,\n  356 |             Self::parse_char_repeat,\n  357 |             Self::parse_class,\n  358 |             Self::parse_char_equal,\n  359 |             // NOTE: This must be the last one\n  360 |             map(Self::parse_backslash_or_char_with_warning, |s| {\n  361 |                 Ok(Self::Char(s))\n  362 |             }),\n  363 |         )))\n  364 |         .parse(input)\n  365 |         .map(|(_, r)| r)\n  366 |         .unwrap()\n  367 |         .into_iter()\n  368 |         .collect::<Result<Vec<_>, _>>()\n  369 |     }","lines":18}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `Num::to_bytes`, `Self::Blocks(n) => n * block_size` is an unchecked `u64` multiply. It is called for skip and seek (parseargs.rs lines 244-247 and 256-259) with `n` up to `u64::MAX` (parse_bytes_with_opt_multiplier can return u64::MAX) and `block_size` up to `usize::MAX`. The product can overflow: in debug builds it panics, in release it wraps and may yield a small value that then passes the subsequent `> i64::MAX` validation, silently using a wrong skip/seek offset.","fix":"Use `n.checked_mul(block_size)` (saturating to u64::MAX or returning a parse error) so an overflowing blocks-to-bytes conversion is rejected with the \"Value too large\" error rather than wrapping or panicking.","locations":[{"ref":"src/uu/dd/src/dd.rs:162-167","code":"  162 |     fn to_bytes(self, block_size: u64) -> u64 {\n  163 |         match self {\n  164 |             Self::Blocks(n) => n * block_size,\n  165 |             Self::Bytes(n) => n,\n  166 |         }\n  167 |     }","lines":6},{"ref":"src/uu/dd/src/parseargs.rs:244-266","code":"  244 |         let skip = self\n  245 |             .skip\n  246 |             .force_bytes_if(self.iflag.skip_bytes)\n  247 |             .to_bytes(ibs as u64);\n  248 |         // GNU coreutils has a limit of i64 (intmax_t)\n  249 |         if skip > i64::MAX as u64 {\n  250 |             return Err(ParseError::InvalidNumberWithErrMsg(\n  251 |                 format!(\"{skip}\"),\n  252 |                 \"Value too large for defined data type\".to_string(),\n  253 |             ));\n  254 |         }\n  255 | \n  256 |         let seek = self\n  257 |             .seek\n  258 |             .force_bytes_if(self.oflag.seek_bytes)\n  259 |             .to_bytes(obs as u64);\n  260 |         // GNU coreutils has a limit of i64 (intmax_t)\n  261 |         if seek > i64::MAX as u64 {\n  262 |             return Err(ParseError::InvalidNumberWithErrMsg(\n  263 |                 format!(\"{seek}\"),\n  264 |                 \"Value too large for defined data type\".to_string(),\n  265 |             ));\n  266 |         }","lines":23}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`Row::from_filesystem` computes byte totals as `blocks * blocksize`, `bused * blocksize`, and\n`bavail * blocksize`, all `u64 * u64` with no overflow protection. For large filesystems these\nproducts can exceed `u64::MAX` (e.g. a multi-exabyte reported size, or bogus values from a\nbuggy/remote statfs). In debug builds this panics; in release it silently wraps to a wrong size.\nGNU df clamps such values rather than wrapping.","fix":"Use `saturating_mul` (or compute in u128 then clamp) for `blocks * blocksize`,\n`bused * blocksize`, and `bavail * blocksize`.","locations":[{"ref":"src/uu/df/src/table.rs:159-168","code":"  159 |         let bused = blocks.saturating_sub(bfree);\n  160 |         let fused = files.saturating_sub(ffree);\n  161 |         Self {\n  162 |             file: fs.file,\n  163 |             fs_device: dev_name,\n  164 |             fs_type,\n  165 |             fs_mount: mount_dir,\n  166 |             bytes: BytesCell::new(blocks * blocksize, row_block_size),\n  167 |             bytes_used: BytesCell::new(bused * blocksize, row_block_size),\n  168 |             bytes_avail: BytesCell::new(bavail * blocksize, row_block_size),","lines":10}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`Options::from` computes `Some(n + 1)` for the `--lines`/`--number` value where `n: u16`. The clap\nvalue parser allows the full u16 range (`value_parser!(u16).range(0..)`), so `--lines 65535` makes\n`n + 1` overflow. In a debug build this panics; in release it wraps to 0, which then makes\n`content_rows` collapse to 1 line. Either way the user-supplied maximum is mishandled.","fix":"Use a saturating/checked add, e.g. `Some(n.saturating_add(1))`, or cap the parser range below\nu16::MAX so the +1 cannot overflow.","locations":[{"ref":"src/uu/more/src/more.rs:120-128","code":"  120 |         let lines = match (\n  121 |             matches.get_one::<u16>(options::LINES).copied(),\n  122 |             matches.get_one::<u16>(options::NUMBER).copied(),\n  123 |         ) {\n  124 |             // We add 1 to the number of lines to display because the last line\n  125 |             // is used for the banner\n  126 |             (Some(n), _) | (None, Some(n)) if n > 0 => Some(n + 1),\n  127 |             _ => None, // Use terminal height\n  128 |         };","lines":9}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`parse_unit_size` multiplies the parsed leading integer by the suffix multiplier with a\nplain `n * multiplier` and no overflow check. The multiplier for `E` is 10^18, so an\nargument like `--from-unit=100E` (n = 100, multiplier = 1e18) overflows `usize`:\npanic in debug builds, silent wraparound in release. `try_scale_exact_int_with_from_unit`\nelsewhere correctly uses `checked_mul`, so this site is inconsistent as well.","fix":"Use `n.checked_mul(multiplier)` and return the `numfmt-error-invalid-unit-size` error on\n`None` instead of `n * multiplier`.","locations":[{"ref":"src/uu/numfmt/src/numfmt.rs:203-205","code":"  203 |             if let Ok(n) = number.parse::<usize>() {\n  204 |                 return Ok(n * multiplier);\n  205 |             }","lines":3}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `get_line_for_printing`, `min_width = (i - (columns - 1)) / columns` underflows (usize subtraction) and panics when the page/column width `i` is smaller than `columns - 1`. With column mode the width comes from `-w`/column width (which only rejects 0), so e.g. `pr --columns 10 -w 2` makes `i = 2`, `columns = 10`, and `2 - 9` panics.","fix":"Use saturating arithmetic and clamp to at least 1, e.g. `let min_width = (i.saturating_sub(columns - 1)) / columns;` then guard against `min_width == 0`, or validate that width is large enough for the requested number of columns up front.","locations":[{"ref":"src/uu/pr/src/pr.rs:1361-1361","code":" 1361 |                 let min_width = (i - (columns - 1)) / columns;","lines":1}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"TruncateMode::to_size for the Extend (`+N`) mode computes `fsize + size` with an unchecked add. If the reference/file size plus the requested extension exceeds u64::MAX it panics in debug builds and silently wraps to a small value in release builds (producing a wrong, tiny truncation target). Every other arm uses saturating/checked arithmetic; only Extend is unguarded. GNU truncate reports an overflow error here instead.","fix":"Use checked_add and surface an error (or saturate to u64::MAX) instead of `fsize + size`, e.g. `Self::Extend(size) => fsize.checked_add(*size)` and treat None as an overflow error in file_truncate.","locations":[{"ref":"src/uu/truncate/src/truncate.rs:71-81","code":"   71 |     fn to_size(&self, fsize: u64) -> Option<u64> {\n   72 |         match self {\n   73 |             Self::Absolute(size) => Some(*size),\n   74 |             Self::Extend(size) => Some(fsize + size),\n   75 |             Self::Reduce(size) => Some(fsize.saturating_sub(*size)),\n   76 |             Self::AtMost(size) => Some(fsize.min(*size)),\n   77 |             Self::AtLeast(size) => Some(fsize.max(*size)),\n   78 |             Self::RoundDown(size) => fsize.checked_rem(*size).map(|remainder| fsize - remainder),\n   79 |             Self::RoundUp(size) => fsize.checked_next_multiple_of(*size),\n   80 |         }\n   81 |     }","lines":11}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"sparse_copy converts the source size to usize via .try_into().unwrap() and then ftruncate(size.try_into().unwrap()). On 32-bit targets a file larger than usize::MAX panics. The non-hole variant sparse_copy_without_hole avoids this by keeping u64 offsets, so this path is inconsistent and can panic on large files.","fix":"Keep offsets/size as u64 (as sparse_copy_without_hole does) and avoid try_into().unwrap(); only the per-iteration buffer length needs to be usize.","locations":[{"ref":"src/uu/cp/src/platform/linux.rs:155-181","code":"  155 | fn sparse_copy<P>(source: P, dest: P, nofollow: bool) -> std::io::Result<()>\n  156 | where\n  157 |     P: AsRef<Path>,\n  158 | {\n  159 |     let mut src_file = open_source(source, nofollow)?;\n  160 |     let dst_file = create_dest_restrictive(dest, false)?;\n  161 | \n  162 |     let size: usize = src_file.metadata()?.size().try_into().unwrap();\n  163 |     ftruncate(&dst_file, size.try_into().unwrap())?;\n  164 | \n  165 |     let blksize = dst_file.metadata()?.blksize();\n  166 |     let mut buf: Vec<u8> = vec![0; blksize.try_into().unwrap()];\n  167 |     let mut current_offset: usize = 0;\n  168 | \n  169 |     // TODO Perhaps we can employ the \"fiemap ioctl\" API to get the\n  170 |     // file extent mappings:\n  171 |     // https://www.kernel.org/doc/html/latest/filesystems/fiemap.html\n  172 |     while current_offset < size {\n  173 |         let this_read = src_file.read(&mut buf)?;\n  174 |         let buf = &buf[..this_read];\n  175 |         if buf.iter().any(|&x| x != 0) {\n  176 |             dst_file.write_all_at(buf, current_offset.try_into().unwrap())?;\n  177 |         }\n  178 |         current_offset += this_read;\n  179 |     }\n  180 |     Ok(())\n  181 | }","lines":27}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `calc_loop_bsize`, the Blocks branch computes `rremain * ibs as u64` with an unchecked multiply. `rremain` is bounded by `count` and `ibs` is bounded by usize, but a large `count=` combined with a large `ibs=` can overflow u64 (panic in debug, wrap in release). The result is only used via `cmp::min` against `ideal_bsize`, but a wrapped value can produce a too-small or zero loop buffer size.","fix":"Use `rremain.saturating_mul(ibs as u64)` so the min() with ideal_bsize still yields the correct (clamped) value.","locations":[{"ref":"src/uu/dd/src/dd.rs:1428-1432","code":" 1428 |         Some(Num::Blocks(rmax)) => {\n 1429 |             let rsofar = rstat.reads_complete + rstat.reads_partial;\n 1430 |             let rremain = rmax - rsofar;\n 1431 |             cmp::min(ideal_bsize as u64, rremain * ibs as u64) as usize\n 1432 |         }","lines":5}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`BytesCell::add` and the `inodes`/`inodes_used`/`inodes_free` additions in `Row::add_assign`\nadd raw `u64`/`u128` totals with the `+` operator across all filesystems for the `--total`\nrow. The `BytesCell { bytes, scaled }` additions are plain `u64 + u64`; summing many large\nfilesystems can overflow u64 (panic in debug, wrap in release). The inode sums use u128 so are\neffectively safe, but the byte sums are not.","fix":"Use `saturating_add` for the `bytes`/`scaled` fields in `BytesCell::add`, matching the\nsaturating handling already used elsewhere, so the total row cannot overflow.","locations":[{"ref":"src/uu/df/src/table.rs:226-235","code":"  226 | impl Add for BytesCell {\n  227 |     type Output = Self;\n  228 | \n  229 |     fn add(self, rhs: Self) -> Self {\n  230 |         Self {\n  231 |             bytes: self.bytes + rhs.bytes,\n  232 |             scaled: self.scaled + rhs.scaled,\n  233 |         }\n  234 |     }\n  235 | }","lines":10},{"ref":"src/uu/df/src/table.rs:103-108","code":"  103 |     fn add_assign(&mut self, rhs: Self) {\n  104 |         let bytes = self.bytes + rhs.bytes;\n  105 |         let bytes_used = self.bytes_used + rhs.bytes_used;\n  106 |         let bytes_avail = self.bytes_avail + rhs.bytes_avail;\n  107 |         let inodes = self.inodes + rhs.inodes;\n  108 |         let inodes_used = self.inodes_used + rhs.inodes_used;","lines":6}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`parse_unit_size_suffix` casts the u128 base array entries to usize: `SI_BASES[i + 1] as usize`\nand `IEC_BASES[i + 1] as usize`. On a 32-bit target `usize` is 32 bits and any suffix from\n`T`/`Ti` upward (1e12 / 1024^4 and larger) silently truncates, yielding a wrong (small)\nmultiplier with no error. On 64-bit targets the `E` value (1e18) still fits, but the cast is\nfragile and platform-dependent.","fix":"Compute in u128 (or u64) and convert with `usize::try_from(...).ok()?`, returning None on\noverflow so the caller emits an invalid-unit-size error rather than silently truncating.","locations":[{"ref":"src/uu/numfmt/src/numfmt.rs:226-231","code":"  226 | \n  227 |     match s.len() {\n  228 |         1 => Some(SI_BASES[i + 1] as usize),\n  229 |         2 if s.ends_with('i') => Some(IEC_BASES[i + 1] as usize),\n  230 |         _ => None,\n  231 |     }","lines":6}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"InputOffset::increase_position does self.byte_pos += n and label = Some(l + n) with unchecked u64 additions. byte_pos starts at skip_bytes (which may be up to u64::MAX from a label/offset operand) and increases by each line length. With a very large --skip-bytes or label plus a large file, these additions can overflow and panic in debug builds (silently wrap in release). The label addition in particular combines a user-supplied label with the running position.","fix":"Use wrapping_add or saturating_add (GNU od wraps the printed offset), or document and bound the inputs so overflow cannot occur.","locations":[{"ref":"src/uu/od/src/input_offset.rs:37-42","code":"   37 |     pub fn increase_position(&mut self, n: u64) {\n   38 |         self.byte_pos += n;\n   39 |         if let Some(l) = self.label {\n   40 |             self.label = Some(l + n);\n   41 |         }\n   42 |     }","lines":6}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"parse_number_of_bytes does `len -= 1` (and `len -= 2` for the B-suffix case) on the byte length. For the B-suffix branch with a single-character-after-prefix input these decrements could underflow usize if `len` were < 2, but in practice `len` always includes the leading 0/0x so it is >= 2 before any decrement. The B-branch then parses `s[start..len]`; if the input is exactly \"0B\" this yields start=0,len=0 and `s[0..0]` parses as an error (empty), so no panic. The arithmetic is safe today only because of the guaranteed prefix length, which is an implicit invariant.","fix":"Use checked_sub or validate the remaining length before subtracting, to make the suffix-stripping robust against malformed short inputs independent of the prefix invariant.","locations":[{"ref":"src/uu/od/src/parse_nrofbytes.rs:54-68","code":"   54 |         Some('B') if radix != 16 => {\n   55 |             len -= 2;\n   56 |             multiply = match ends_with.next() {\n   57 |                 Some('k' | 'K') => 1000,\n   58 |                 Some('m' | 'M') => 1000 * 1000,\n   59 |                 Some('G') => 1000 * 1000 * 1000,\n   60 |                 #[cfg(target_pointer_width = \"64\")]\n   61 |                 Some('T') => 1000 * 1000 * 1000 * 1000,\n   62 |                 #[cfg(target_pointer_width = \"64\")]\n   63 |                 Some('P') => 1000 * 1000 * 1000 * 1000 * 1000,\n   64 |                 #[cfg(target_pointer_width = \"64\")]\n   65 |                 Some('E') => 1000 * 1000 * 1000 * 1000 * 1000 * 1000,\n   66 |                 _ => return Err(ParseSizeError::ParseFailure(s.to_string())),\n   67 |             }\n   68 |         }","lines":15}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`bounded_tail` computes `file.seek(SeekFrom::End(-(*count as i64)))` for `Bytes(Negative(count))`.\n`count` is a `u64`; for values above `i64::MAX` the `as i64` cast wraps to a negative number and\n`-(...)` may overflow/produce an unintended offset. Similarly `backwards_thru_file` casts the\nin-block index `(i + 1) as i64` (bounded, safe) but the byte-count path relies on the seek. With a\npathological `-c` value the seek offset is wrong rather than failing cleanly; in practice the\n`is_err()` branch only catches genuine seek failures, not the silent wrap.","fix":"Clamp `count` to the file size (or to `i64::MAX`) before negating, e.g. seek from Start using `size.saturating_sub(count)` instead of negating a possibly-overflowing `i64`.","locations":[{"ref":"src/uu/tail/src/tail.rs:475-480","code":"  475 |         FilterMode::Bytes(Signum::Negative(count)) => {\n  476 |             if file.seek(SeekFrom::End(-(*count as i64))).is_err() {\n  477 |                 file.seek(SeekFrom::Start(0)).unwrap();\n  478 |             }\n  479 |             limit = Some(*count);\n  480 |         }","lines":6}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"size_mb * 1024 * 1024 can overflow usize on 32-bit targets and will panic in debug or wrap in release. While these are benchmark helpers, the multiplication is unchecked and a large size_mb passed by a caller silently produces a wrong-sized allocation (release) or panics. Same pattern in text_data::generate_by_size (size_mb * 1024 * 1024).","fix":"Use checked_mul or compute as `(size_mb as u64) * 1024 * 1024` with an explicit conversion/assert, or document the precondition. For bench code low priority, but at minimum prefer saturating/checked arithmetic.","locations":[{"ref":"src/uucore/src/lib/features/benchmark.rs:306","code":"  306 |         let buffer = vec![pattern; size_mb * 1024 * 1024];","lines":1},{"ref":"src/uucore/src/lib/features/benchmark.rs:57","code":"   57 |         let total_size = size_mb * 1024 * 1024;","lines":1}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"fast_inc performs `inc[inc_pos] + carry` and `new_val += val[pos] - b'0'` on u8 values with no checked/wrapping handling. The function documents the precondition that val and inc are well-formed ASCII digits, under which no overflow occurs; but if a caller violates the contract (non-digit byte, or a digit < b'0' making the subtraction underflow), this silently wraps in release builds and panics only in debug. There is no validation, so malformed input corrupts the buffer silently in release.","fix":"If misuse is a realistic risk, use wrapping_/checked_ arithmetic with a debug_assert on the digit range, or add a debug_assert!(inc[inc_pos].is_ascii_digit()) and debug_assert!(val[pos].is_ascii_digit()) to surface contract violations during development.","locations":[{"ref":"src/uucore/src/lib/features/fast_inc.rs:45-56","code":"   45 |         let mut new_val = inc[inc_pos] + carry;\n   46 |         // Be careful here, only add existing digit of val.\n   47 |         if pos >= *start {\n   48 |             new_val += val[pos] - b'0';\n   49 |         }\n   50 |         if new_val > b'9' {\n   51 |             carry = 1;\n   52 |             new_val -= 10;\n   53 |         } else {\n   54 |             carry = 0;\n   55 |         }\n   56 |         val[pos] = new_val;","lines":12}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In format_float_hexadecimal the decimal exponent is cast to u32 via `exp10 as u32` /\n`-exp10 as u32` when raising 5 to a power (`5.to_bigint().unwrap().pow(exp10 as u32)`).\nexp10 is an i64 derived from the BigDecimal scale; an exponent outside u32 range wraps the cast\nto a wrong (small) power, silently producing an incorrect result rather than failing. The code\ncomment at lines 591-593 explicitly acknowledges this (\"we should probably detect this and fail\ngracefully though\") but it remains unhandled.","fix":"Detect exp10 (and the derived margin) values that exceed u32::MAX before the `as u32` casts and\nreturn/propagate an error (or saturate to inf/0) instead of wrapping the exponent.","locations":[{"ref":"src/uucore/src/lib/features/format/num_format.rs:589-630","code":"  589 |     // Convert to the form frac10 * 10^exp\n  590 |     let (frac10, p) = bd.as_bigint_and_exponent();\n  591 |     // We cast this to u32 below, but we probably do not care about exponents\n  592 |     // that would overflow u32. We should probably detect this and fail\n  593 |     // gracefully though.\n  594 |     let exp10 = -p;\n  595 | \n  596 |     // We want something that looks like this: frac2 * 2^exp2,\n  597 |     // without losing precision.\n  598 |     // frac10 * 10^exp10 = (frac10 * 5^exp10) * 2^exp10 = frac2 * 2^exp2\n  599 | \n  600 |     // TODO: this is most accurate, but frac2 will grow a lot for large\n  601 |     // precision or exponent, and formatting will get very slow.\n  602 |     // The precision can't technically be a very large number (up to 32-bit int),\n  603 |     // but we can trim some of the lower digits, if we want to only keep what a\n  604 |     // `long double` (80-bit or 128-bit at most) implementation would be able to\n  605 |     // display.\n  606 |     // The exponent is less of a problem if we matched `long double` implementation,\n  607 |     // as a 80/128-bit floats only covers a 15-bit exponent.\n  608 | \n  609 |     let (mut frac2, mut exp2) = if exp10 >= 0 {\n  610 |         // Positive exponent. 5^exp10 is an integer, so we can just multiply.\n  611 |         (frac10 * 5.to_bigint().unwrap().pow(exp10 as u32), exp10)\n  612 |     } else {\n  613 |         // Negative exponent: We're going to need to divide by 5^-exp10,\n  614 |         // so we first shift left by some margin to make sure we do not lose digits.\n  615 | \n  616 |         // We want to make sure we have at least precision+1 hex digits to start with.\n  617 |         // Then, dividing by 5^-exp10 loses at most -exp10*3 binary digits\n  618 |         // (since 5^-exp10 < 8^-exp10), so we add that, and another bit for\n  619 |         // rounding.\n  620 |         let margin =\n  621 |             ((max_precision + 1) as i64 * 4 - frac10.bits() as i64).max(0) + -exp10 * 3 + 1;\n  622 | \n  623 |         // frac10 * 10^exp10 = frac10 * 2^margin * 10^exp10 * 2^-margin =\n  624 |         // (frac10 * 2^margin * 5^exp10) * 2^exp10 * 2^-margin =\n  625 |         // (frac10 * 2^margin / 5^-exp10) * 2^(exp10-margin)\n  626 |         (\n  627 |             (frac10 << margin) / 5.to_bigint().unwrap().pow(-exp10 as u32),\n  628 |             exp10 - margin,\n  629 |         )\n  630 |     };","lines":42}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"comm total counters total_col_1/2/3 are inferred as i32 (from the `0` literals and `+= 1`). With more than 2^31 lines in a column they overflow, panicking in debug builds and wrapping in release. GNU comm uses an unsigned max-width integer for --total.","fix":"Declare the counters as u64 (e.g. `let mut total_col_1: u64 = 0;`).","locations":[{"ref":"src/uu/comm/src/comm.rs:223-225","code":"  223 |     let mut total_col_1 = 0;\n  224 |     let mut total_col_2 = 0;\n  225 |     let mut total_col_3 = 0;","lines":3},{"ref":"src/uu/comm/src/comm.rs:303-311","code":"  303 |     if opts.get_flag(options::TOTAL) {\n  304 |         let line_ending = LineEnding::from_zero_flag(opts.get_flag(options::ZERO_TERMINATED));\n  305 |         write!(\n  306 |             writer,\n  307 |             \"{total_col_1}{delim}{total_col_2}{delim}{total_col_3}{delim}{}{line_ending}\",\n  308 |             translate!(\"comm-total\")\n  309 |         )\n  310 |         .map_err_context(|| translate!(\"comm-error-write\"))?;\n  311 |     }","lines":9}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"In nice, `niceness += adjustment` adds two i32 values without explicit clamping. In practice `niceness` comes from getpriority (a small range) and `adjustment` is bounded to +/-NICE_BOUND_NO_OVERFLOW (50) only on parse overflow; a valid in-range adjustment like 2000000000 combined with a small niceness could overflow in debug builds (panic) since only PosOverflow/NegOverflow of the i32 parse are clamped, not large-but-valid i32 values.","fix":"Use `niceness = niceness.saturating_add(adjustment)` so an in-range but large adjustment cannot overflow; the kernel clamps the effective priority anyway.","locations":[{"ref":"src/uu/nice/src/nice.rs:126-147","code":"  126 |         match nstr.parse::<i32>() {\n  127 |             Ok(num) => num,\n  128 |             Err(e) => match e.kind() {\n  129 |                 IntErrorKind::PosOverflow => NICE_BOUND_NO_OVERFLOW,\n  130 |                 IntErrorKind::NegOverflow => -NICE_BOUND_NO_OVERFLOW,\n  131 |                 _ => {\n  132 |                     return Err(USimpleError::new(\n  133 |                         125,\n  134 |                         translate!(\"nice-error-invalid-number\", \"value\" => nstr.clone(), \"error\" => e),\n  135 |                     ));\n  136 |                 }\n  137 |             },\n  138 |         }\n  139 |     } else {\n  140 |         if !matches.contains_id(options::COMMAND) {\n  141 |             writeln!(stdout(), \"{niceness}\")?;\n  142 |             return Ok(());\n  143 |         }\n  144 |         10_i32\n  145 |     };\n  146 | \n  147 |     niceness += adjustment;","lines":22}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"After a copy succeeds, if preserving a required attribute fails, copy_attributes_result.inspect_err truncates the destination to zero length via fs::File::create(dest).map(|f| f.set_len(0)).ok(). The errors from create/set_len are swallowed with .ok(), and File::create itself follows symlinks and re-creates/truncates. If dest is a symlink the truncation hits the link target; if dest happens to be the same file as source (corner cases with hardlinks/symlinks) this can silently destroy data while the original failure is the one reported. The comment claims GNU behavior but the unconditional truncation of a symlink target and the silent error discard are risky.","fix":"Truncate via the already-open destination descriptor or with O_NOFOLLOW semantics, only when dest is a regular file that this invocation created, and avoid discarding the truncation error silently.","locations":[{"ref":"src/uu/cp/src/cp.rs:2671-2674","code":" 2671 |     // GNU cp truncates the destination when a required attribute cannot be preserved\n 2672 |     copy_attributes_result.inspect_err(|_| {\n 2673 |         fs::File::create(dest).map(|f| f.set_len(0)).ok();\n 2674 |     })?;","lines":4}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In the Unix safe-traversal path (`safe_du`), every directory entry's `Stat` is given the\nPARENT directory's metadata via `metadata: my_stat.metadata.clone()` (for both the directory\nand file branches). The `--time`/`--time-style` output is later produced from `stat.metadata`\nin `StatPrinter::print_stat` (via `metadata_get_time`). Because safe traversal is the default\non Linux/Unix (it is used whenever `--dereference`/-L is not given), `du --time` prints the\nparent directory's timestamp for every entry instead of the entry's own atime/ctime/mtime.\nThe file size is taken from the real `st_*` fields, but the time is taken from the cloned\nparent metadata, so the times are simply wrong.","fix":"Stop reusing the parent's `Metadata`. Either carry the real per-entry time fields obtained from\nthe safe `stat_at` result (extend `Stat` to hold the time fields directly, or store an\n`Option<SystemTime>` per metadata-time-field), or fetch the entry's own metadata when `--time`\nis requested. The printer should read time from the entry, not the parent.","locations":[{"ref":"src/uu/du/src/du.rs:470-495","code":"  470 |         let this_stat = if is_dir {\n  471 |             // For directories, recurse using safe_du\n  472 |             Stat {\n  473 |                 path: path.join(&entry_name),\n  474 |                 size: 0,\n  475 |                 #[allow(clippy::unnecessary_cast)]\n  476 |                 blocks: entry_stat.st_blocks as u64,\n  477 |                 inodes: 1,\n  478 |                 inode: file_info,\n  479 |                 // We need a fake metadata - create one from symlink_metadata of parent\n  480 |                 // This is a workaround since we can't get real metadata without the full path\n  481 |                 metadata: my_stat.metadata.clone(),\n  482 |             }\n  483 |         } else {\n  484 |             // For files\n  485 |             Stat {\n  486 |                 path: path.join(&entry_name),\n  487 |                 #[allow(clippy::unnecessary_cast)]\n  488 |                 size: entry_stat.st_size as u64,\n  489 |                 #[allow(clippy::unnecessary_cast)]\n  490 |                 blocks: entry_stat.st_blocks as u64,\n  491 |                 inodes: 1,\n  492 |                 inode: file_info,\n  493 |                 metadata: my_stat.metadata.clone(),\n  494 |             }\n  495 |         };","lines":26},{"ref":"src/uu/du/src/du.rs:875-896","code":"  875 |     fn print_stat(&self, stat: &Stat, size: u64) -> UResult<()> {\n  876 |         print!(\"{}\\t\", self.convert_size(size));\n  877 | \n  878 |         if let Some(md_time) = &self.time {\n  879 |             if let Some(time) = metadata_get_time(&stat.metadata, *md_time) {\n  880 |                 format_system_time(\n  881 |                     &mut stdout(),\n  882 |                     time,\n  883 |                     &self.time_format,\n  884 |                     FormatSystemTimeFallback::IntegerError,\n  885 |                 )?;\n  886 |                 print!(\"\\t\");\n  887 |             } else {\n  888 |                 print!(\"???\\t\");\n  889 |             }\n  890 |         }\n  891 | \n  892 |         print_verbatim(&stat.path).unwrap();\n  893 |         print!(\"{}\", self.line_ending);\n  894 | \n  895 |         Ok(())\n  896 |     }","lines":22}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In the cross-device copy fallback, rename_file_fallback copies the source to the destination and then unconditionally fs::remove_file(from). If the copy partially succeeds but a later step is treated as success, or if remove_file fails after a successful copy, the error handling does not roll back; more importantly the source is removed even though the copy used best-effort ownership/permission/xattr steps whose failures are ignored (let _ = ...). For mv this means the moved file can silently lose ownership, mode bits, or xattrs while the source is deleted, with no diagnostic.","fix":"Surface failures of preserve_ownership / set_permissions / xattr copy at least as warnings, and ensure the source is only removed after a fully verified copy; consider not deleting the source if critical metadata could not be transferred.","locations":[{"ref":"src/uu/mv/src/mv.rs:1296-1336","code":" 1296 |     // Open src/dst with O_NOFOLLOW and keep the fds alive across copy,\n 1297 |     // chown, xattr, and chmod so a concurrent path-swap can't redirect any\n 1298 |     // step to a different inode.\n 1299 |     #[cfg(unix)]\n 1300 |     {\n 1301 |         use std::fs::Permissions;\n 1302 |         use std::os::unix::fs::{MetadataExt, PermissionsExt};\n 1303 |         use uucore::safe_copy::{create_dest_restrictive, open_source};\n 1304 |         let src_file = open_source(from, /* nofollow */ true)\n 1305 |             .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?;\n 1306 |         let src_mode = src_file\n 1307 |             .metadata()\n 1308 |             .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?\n 1309 |             .mode()\n 1310 |             & 0o7777;\n 1311 |         let mut dst_file = create_dest_restrictive(to, /* nofollow */ true)\n 1312 |             .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?;\n 1313 |         io::copy(&mut &src_file, &mut dst_file)\n 1314 |             .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?;\n 1315 | \n 1316 |         #[cfg(not(any(target_os = \"macos\", target_os = \"redox\")))]\n 1317 |         {\n 1318 |             let _ = fsxattr::copy_xattrs_fd_ignore_unsupported(&src_file, &dst_file);\n 1319 |         }\n 1320 | \n 1321 |         // chown before chmod: chown(2) clears setuid/setgid for non-root,\n 1322 |         // so the final mode must be applied last to preserve those bits.\n 1323 |         let _ = preserve_ownership(from, to);\n 1324 |         let _ = dst_file.set_permissions(Permissions::from_mode(src_mode));\n 1325 |     }\n 1326 | \n 1327 |     #[cfg(not(unix))]\n 1328 |     {\n 1329 |         fs::copy(from, to)\n 1330 |             .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?;\n 1331 |     }\n 1332 | \n 1333 |     fs::remove_file(from)\n 1334 |         .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?;\n 1335 |     Ok(())\n 1336 | }","lines":41}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Data loss in column-down mode for a \"short\" page. `to_table_short_file` computes `num_rows = lines.len() / columns` (integer division) and only places indices `0..num_rows*columns`. Any remainder lines (`lines.len() % columns`) are silently dropped and never printed. Example: 5 input lines with `--columns 2` yields `num_rows = 2`, so only 4 lines are emitted and the 5th disappears. This path is taken whenever `lines.len() < content_lines_per_page * columns` in non-across, non-merge mode.","fix":"Use `num_rows = lines.len().div_ceil(columns)` so the final partial column is included, matching GNU pr which places leftover lines in the first columns.","locations":[{"ref":"src/uu/pr/src/pr.rs:1229-1229","code":" 1229 |     let num_rows = lines.len() / columns;","lines":1}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"FilterWriter::drop claims to close the child shell stdin by dropping it, but `let _stdin = self.shell_process.stdin.as_mut();` only takes (and immediately drops) an `Option<&mut ChildStdin>` borrow. The actual ChildStdin is never taken/dropped, so the write end of the pipe stays open inside `shell_process`. The subsequent `self.shell_process.wait()` can therefore block forever for any filter command that reads its stdin to EOF (e.g. `--filter=cat`), because the child never sees EOF. To actually close stdin the code must `self.shell_process.stdin.take()` (and drop the owned value), not borrow it.","fix":"Replace the borrow with an owned take so the pipe is closed before wait: `{ let _stdin = self.shell_process.stdin.take(); }` then `self.shell_process.wait()`.","locations":[{"ref":"src/uu/split/src/platform/unix.rs:103-107","code":"  103 |     fn drop(&mut self) {\n  104 |         {\n  105 |             // close stdin by dropping it\n  106 |             let _stdin = self.shell_process.stdin.as_mut();\n  107 |         }","lines":5}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The #[uucore::main] proc-macro emits the SIGPIPE-restoration block (`if !uucore::signals::sigpipe_was_ignored() { enable_pipe_errors() }`) gated only on `#[cfg(unix)]`, but it gates the `init_startup_state_capture!()` invocation on `#[cfg(all(#signals, unix))]`. For utilities invoked with `no_signals` (pwd, arch, who, tty, logname, link, unlink, printenv, readlink, users, ...), the `.init_array` constructor that sets `SIGPIPE_WAS_IGNORED` is never emitted, so `sigpipe_was_ignored()` always reads its default `false`. As a result `enable_pipe_errors()` is unconditionally called for those utilities, restoring SIGPIPE to its default even when the parent process explicitly ignored SIGPIPE - defeating the very GNU-compat behavior the comment on lines 41-44 describes.","fix":"Gate the restoration block consistently with the capture macro. Either also emit the capture for no_signals utils, or guard the restoration with `#[cfg(all(#signals, unix))]` so that no_signals utilities neither capture nor restore SIGPIPE state.","locations":[{"ref":"src/uucore_procs/src/lib.rs:31-48","code":"   31 |     let new = quote!(\n   32 |         // Initialize SIGPIPE state capture at process startup (Unix only).\n   33 |         // This must be at module level to set up the .init_array static that runs\n   34 |         // before main() to capture whether SIGPIPE was ignored by the parent process.\n   35 |         #[cfg(all(#signals, unix))]\n   36 |         uucore::init_startup_state_capture!();\n   37 | \n   38 |         pub fn uumain(args: impl uucore::Args) -> i32 {\n   39 |             #stream\n   40 | \n   41 |             // Restore SIGPIPE to default if it wasn't explicitly ignored by parent.\n   42 |             // The Rust runtime ignores SIGPIPE, but we need to respect the parent's\n   43 |             // signal disposition for proper pipeline behavior (GNU compatibility).\n   44 |             // needed even for true --version\n   45 |             #[cfg(unix)]\n   46 |             if !uucore::signals::sigpipe_was_ignored() {\n   47 |                 let _ = uucore::signals::enable_pipe_errors();\n   48 |             }","lines":18},{"ref":"src/uucore/src/lib/features/signals.rs:540-604","code":"  540 | static SIGPIPE_WAS_IGNORED: AtomicBool = AtomicBool::new(false);\n  541 | \n  542 | #[cfg(unix)]\n  543 | static STARTUP_STATE_WAS_CAPTURED: AtomicBool = AtomicBool::new(false);\n  544 | \n  545 | /// Captures stdio and SIGPIPE state at process initialization, before main() runs.\n  546 | ///\n  547 | /// # Safety\n  548 | /// Called from `.init_array` before main(). Only reads current state.\n  549 | #[cfg(unix)]\n  550 | #[allow(clippy::missing_safety_doc)]\n  551 | pub unsafe extern \"C\" fn capture_startup_state() {\n  552 |     use nix::libc;\n  553 |     use std::mem::MaybeUninit;\n  554 |     use std::ptr;\n  555 | \n  556 |     // No spinlock because we're single-threaded at this point\n  557 |     if STARTUP_STATE_WAS_CAPTURED.swap(true, Ordering::Relaxed) {\n  558 |         return;\n  559 |     }\n  560 | \n  561 |     // Capture stdio state\n  562 |     unsafe {\n  563 | asy":false,"description":"In base32/base_common `fast_decode_stream`, when an invalid (non-alphabet, non-garbage) byte is encountered, the code first flushes/decodes already-buffered chunks and then returns the \"invalid input\" error. But in the non-partial-decode branch it drains in units of `decode_in_chunks_of_size` via `while buffer.len() >= decode_in_chunks_of_size`, leaving a partial (already-valid) remainder in `buffer` undecoded and silently dropped before the error return. The buffer-based `fast_decode_buffer` does not have this pre-error flush at all, so the two paths emit different amounts of valid output before reporting the same error, an inconsistency.","fix":"Make the pre-error flush behavior consistent between the streaming and buffered decoders (either both flush all decodable bytes before erroring, or neither does), matching GNU base32/base64 output-on-error semantics.","locations":[{"ref":"src/uu/base32/src/base_common.rs:830-851","code":"  830 |                 } else {\n  831 |                     if supports_partial_decode {\n  832 |                         flush_ready_chunks(\n  833 |                             &mut buffer,\n  834 |                             decode_in_chunks_of_size,\n  835 |                             valid_multiple,\n  836 |                             supports_fast_decode_and_encode,\n  837 |                             &mut decoded_buffer,\n  838 |                             output,\n  839 |                         )?;\n  840 |                     } else {\n  841 |                         while buffer.len() >= decode_in_chunks_of_size {\n  842 |                             decode_in_chunks_to_buffer(\n  843 |                                 supports_fast_decode_and_encode,\n  844 |                                 &buffer[..decode_in_chunks_of_size],\n  845 |                                 &mut decoded_buffer,\n  846 |                             )?;\n  847 |                             write_to_output(&mut decoded_b erwriteMode::Clobber(ClobberMode::Force) {\n 2288 |                     fs::remove_file(dest)?;\n 2289 |                 }\n 2290 |             }","lines":12}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"disk_usage / disk_usage_directory (used to size the --progress bar) use fs::metadata (follows symlinks) and recurse into entry.file_type().is_dir(). With symlinks in the tree this can follow symlinked directories and even loop infinitely on a symlink cycle, hanging cp before any copying starts. WalkDir-based copying does not follow links by default, so the size estimate and the actual traversal disagree, and a malicious/looping symlink directory causes a denial-of-service / stack overflow in disk_usage_directory.","fix":"Use symlink_metadata and skip (or do not recurse into) symlinked directories, matching the WalkDir traversal semantics; guard against cycles.","locations":[{"ref":"src/uu/cp/src/cp.rs:2927-2956","code":" 2927 | fn disk_usage(paths: &[PathBuf], recursive: bool) -> io::Result<u64> {\n 2928 |     let mut total = 0;\n 2929 |     for p in paths {\n 2930 |         let md = fs::metadata(p)?;\n 2931 |         if md.file_type().is_dir() {\n 2932 |             if recursive {\n 2933 |                 total += disk_usage_directory(p)?;\n 2934 |             }\n 2935 |         } else {\n 2936 |             total += md.len();\n 2937 |         }\n 2938 |     }\n 2939 |     Ok(total)\n 2940 | }\n 2941 | \n 2942 | /// A helper for `disk_usage` specialized for directories.\n 2943 | fn disk_usage_directory(p: &Path) -> io::Result<u64> {\n 2944 |     let mut total = 0;\n 2945 | \n 2946 |     for entry in fs::read_dir(p)? {\n 2947 |         let entry = entry?;\n 2948 |         if entry.file_type()?.is_dir() {\n 2949 |             total += disk_usage_directory(&entry.path())?;\n 2950 |         } else {\n 2951 |             total += entry.metadata()?.len();\n 2952 |         }\n 2953 |     }\n 2954 | \n 2955 |     Ok(total)\n 2956 | }","lines":30}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"try_parse_with_abbreviation treats any trailing 2-5 char uppercase token as a timezone abbreviation, and build_tz_abbrev_map derives \"abbreviations\" from the last path component of every IANA zone (e.g. \"Europe/Rome\" -> \"ROME\", \"Pacific/Fiji\" -> \"FIJI\", \"Indian/Chagos\" maps via CHAGO is filtered by length but many 2-5 char ones survive). A date string whose final word happens to be such an all-uppercase token (e.g. a user-entered label) can be silently reinterpreted as a timezone, changing the parsed instant. This is a surprising, locale/tzdb-dependent behavior not present in GNU date.","fix":"Restrict the IANA-derived fallback to a curated allowlist of real abbreviations, or only attempt abbreviation parsing when the leading date part parses successfully AND the token is a recognized zone abbreviation, rather than any uppercase last component of a zone path.","locations":[{"ref":"src/uu/date/src/date.rs:834-875","code":"  834 | fn try_parse_with_abbreviation<S: AsRef<str>>(date_str: S, now: &Zoned) -> Option<Zoned> {\n  835 |     let s = date_str.as_ref();\n  836 | \n  837 |     // Look for timezone abbreviation at the end of the string\n  838 |     // Pattern: ends with uppercase letters (2-5 chars)\n  839 |     if let Some(last_word) = s.split_whitespace().last() {\n  840 |         // Check if it's a potential timezone abbreviation (all uppercase, 2-5 chars)\n  841 |         if last_word.len() >= 2\n  842 |             && last_word.len() <= 5\n  843 |             && last_word.chars().all(|c| c.is_ascii_uppercase())\n  844 |         {\n  845 |             let tz = if let Some(&(_, offset_secs)) = FIXED_OFFSET_ABBREVIATIONS\n  846 |                 .iter()\n  847 |                 .find(|(abbr, _)| *abbr == last_word)\n  848 |             {\n  849 |                 Offset::from_seconds(offset_secs " could map to \"FIJI\"\n  806 |         if let Some(last_part) = tz_str.split('/').next_back() {\n  807 |             let potential_abbrev = last_part.to_uppercase();\n  808 |             // Only add if it looks like an abbreviation (2-5 uppercase chars)\n  809 |             if potential_abbrev.len() >= 2\n  810 |                 && potential_abbrev.len() <= 5\n  811 |                 && potential_abbrev.chars().all(|c| c.is_ascii_uppercase())\n  812 |             {\n  813 |                 map.entry(potential_abbrev)\n  814 |                     .or_insert_with(|| tz_str.to_string());\n  815 |             }\n  816 |         }\n  817 |     }\n  818 | \n  819 |     map\n  820 | }","lines":24}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The `buffered` setting is computed as `self.bs.is_none() || self.is_conv_specified`, and `is_conv_specified` is set to true for ANY `conv=` operand (see parse_operand `\"conv\"` arm). But GNU dd only buffers partial blocks when a *data-transforming* conv is given. Output-only / non-transforming conv flags such as `conv=notrunc`, `conv=nocreat`, `conv=excl`, `conv=sparse`, `conv=noerror`, `conv=fsync`, `conv=fdatasync` are not data transformations. With e.g. `dd bs=N conv=notrunc`, GNU copies each (possibly partial) read straight to output, but this code enables partial-block buffering, changing record-out accounting and write timing versus GNU.","fix":"Set `is_conv_specified` (or a separate `is_data_transforming_conv`) only when one of the transforming convs is present: ascii/ebcdic/ibm/block/unblock/lcase/ucase/swab/sync. Non-transforming convs should not force buffering.","locations":[{"ref":"src/uu/dd/src/parseargs.rs:234-242","code":"  234 |         // Whether to buffer partial output blocks until they are completed.\n  235 |         //\n  236 |         // From the GNU `dd` documentation for the `bs=BYTES` option:\n  237 |         //\n  238 |         // > [...]
