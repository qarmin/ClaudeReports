 |                     }","lines":5}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"expand fast path drops column tracking across read buffers. When a 4096-byte read chunk contains no tab/backspace (and, in UTF-8 mode, regardless of CR), `expand_buf` writes the chunk verbatim and only updates `*col` if the chunk contains a newline. If a single physical input line is longer than the read buffer and the first chunk has no newline, `col` is left unchanged; a tab appearing in a later chunk of the same line then computes the wrong number of spaces to the next tab stop, producing misaligned output.","fix":"When there is no newline in the chunk, advance `*col` by the display width of the trailing segment (after the last newline, or the whole chunk), not just on the newline branch. Track the partial-line column like the slow path does.","locations":[{"ref":"src/uu/expand/src/expand.rs:416-421","code":"  416 |     if !buf.contains(&b'\\t') && !buf.contains(&b'\\x08') && (options.utf8 || !buf.contains(&b'\\r')) {\n  417 |         output.write_all(buf)?;\n  418 |         if let Some(n) = buf.iter().rposition(|&b| b == b'\\n') {\n  419 |             *col = buf.len() - n - 1;\n  420 |         }\n  421 |         return Ok(());","lines":6}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"The `HeadError::ParseError` and `HeadError::Clap` variants interpolate a literal `0` into their\ntranslation messages instead of the actual error. The translation strings `head-error-parse-error`\n(`parse error: {$err}`) and `head-error-clap` (`clap error: {$err}`) expect the `err` value, but the\nattribute passes `\"err\" => 0`. As a result every parse/clap error is rendered as \"parse error: 0\" /\n\"clap error: 0\", discarding the real diagnostic that the code carefully built (e.g. the translated\nmessage constructed at arg_iterate, head.rs:113-115). User-facing error messages are useless.","fix":"Interpolate the actual payload, e.g. `\"err\" => 0` should be the variant field. For the tuple variant use a named field and reference it: `ParseError { err: String }` with `\"err\" => err`, and `Clap { err }` with `\"err\" => err`. The `MatchOption(String)` variant at line 53-54 already does this correctly with `\"{0}\"`.","locations":[{"ref":"src/uu/head/src/head.rs:44-45","code":"   44 |     #[error(\"{}\", translate!(\"head-error-parse-error\", \"err\" => 0))]\n   45 |     ParseError(String),","lines":2},{"ref":"src/uu/head/src/head.rs:50-51","code":"   50 |     #[error(\"{}\", translate!(\"head-error-clap\", \"err\" => 0))]\n   51 |     Clap(#[from] clap::Error),","lines":2}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`uu_head` toggles `first` in two places that fight each other. Inside `print_header` (a closure),\n`first` is only set to `false` when a header is actually printed (line 465), and that only happens\nwhen the header condition holds. But at the end of the per-file loop body, `first = false` is set\nunconditionally (line 529). For the stdin branch the header is printed using a separate code path\n(lines 408-413) that never updates `first`. The net effect: when the first file is stdin printed\nwithout a header (single `-`, not verbose), the separator-newline logic for a subsequent file may be\ncomputed from a stale `first`. The header/separator placement across mixed stdin+file inputs is\nfragile and not clearly correct.","fix":"Unify header bookkeeping: have a single place that decides whether a leading newline is needed and that flips `first`, used by both the stdin and file branches, rather than mutating `first` from inside the closure and again at loop end.","locations":[{"ref":"src/uu/head/src/head.rs:405-413","code":"  405 |     let mut first = true;\n  406 |     for file in &options.files {\n  407 |         let res = if file == \"-\" {\n  408 |             if (options.files.len() > 1 && !options.quiet) || options.verbose {\n  409 |                 if !first {\n  410 |                     writeln!(stdout)?;\n  411 |                 }\n  412 |                 writeln!(stdout, \"{}\", translate!(\"head-header-stdin\"))?;\n  413 |             }","lines":9},{"ref":"src/uu/head/src/head.rs:457-466","code":"  457 |             let mut print_header = || -> UResult<()> {\n  458 |                 if (options.files.len() > 1 && !options.quiet) || options.verbose {\n  459 |                     if !first {\n  460 |                         writeln!(stdout)?;\n  461 |                     }\n  462 |                     write!(stdout, \"==> \")?;\n  463 |                     print_verbatim(file).unwrap();\n  464 |                     writeln!(stdout, \" <==\")?;\n  465 |                     first = false;\n  466 |                 }","lines":10},{"ref":"src/uu/head/src/head.rs:529","code":"  529 |         first = false;","lines":1}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"On a panic, the installed panic hook only prints `\\r` and the panic message; it never calls\n`reset_term()`. Because `std::panic` unwinding does run `Drop` for `TerminalGuard`, the guard would\nnormally restore the terminal - but the guard is created inside `more()` and any panic before/outside\nthat scope (e.g. in `setup_term`, argument handling, or after `setup_term` succeeds but before the\nguard is constructed at line 434-436) leaves the terminal in raw mode / alternate screen with the\ncursor hidden. The window between `setup_term()?` (line 434) and `let _guard = TerminalGuard;`\n(line 436) is a real gap where a panic leaves the tty corrupted.","fix":"Construct the `TerminalGuard` before (or in the same statement as) `setup_term`, and/or have the\npanic hook call `reset_term()` so the terminal is always restored regardless of where the panic\noriginates.","locations":[{"ref":"src/uu/more/src/more.rs:151-154","code":"  151 |     set_hook(Box::new(|panic_info| {\n  152 |         print!(\"\\r\");\n  153 |         println!(\"{panic_info}\");\n  154 |     }));","lines":4},{"ref":"src/uu/more/src/more.rs:434-436","code":"  434 |     let out = setup_term()?;\n  435 |     // Ensure raw mode is disabled on drop\n  436 |     let _guard = TerminalGuard;","lines":3}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"HardlinkTracker::check_hardlink inserts the destination into inode_map on first sighting of every file regardless of nlink, but only treats a later file as a hardlink if the scanner recorded the group with len > 1. The scanner (scan_single_path / scan_directory_recursive) only records files with nlink() > 1 at scan time. There is a TOCTOU gap: link count can change between scan and move, and more importantly the tracker uses source.metadata() (follows symlinks) for the key while the scanner also uses metadata() - but files are inserted into inode_map keyed on the SOURCE dev/ino while the stored value is the DEST path; if two distinct source files share dev/ino only because one is a bind/loop artifact, the second is hardlinked to the first dest incorrectly. The reliance on a pre-scan that can miss concurrently-created links makes hardlink preservation unreliable.","fix":"Key tracking on the source inode and only hardlink when the destination of the prior occurrence still exists and the current source genuinely shares the same inode; consider detecting nlink>1 at move time rather than relying solely on the pre-scan.","locations":[{"ref":"src/uu/mv/src/hardlink.rs:115-161","code":"  115 |     pub fn check_hardlink(\n  116 |         &mut self,\n  117 |         source: &Path,\n  118 |         dest: &Path,\n  119 |         scanner: &HardlinkGroupScanner,\n  120 |         options: &HardlinkOptions,\n  121 |     ) -> Option<PathBuf> {\n  122 |         use std::os::unix::fs::MetadataExt;\n  123 | \n  124 |         let metadata = match source.metadata() {\n  125 |             Ok(meta) => meta,\n  126 |             Err(e) => {\n  127 |                 // Gracefully handle metadata errors by logging and continuing without hardlink tracking\n  128 |                 if options.verbose {\n  129 |                     eprintln!(\"warning: cannot get metadata for {}: {e}\", source.quote());\n  130 |                 }\n  131 |                 return None;\n  132 |             }\n  133 |         };\n  134 | \n  135 |         let key = (metadata.dev(), metadata.ino());\n  136 | \n  137 |         // Check if we've already processed a file with this inode\n  138 |         if let Some(existing_path) = self.inode_map.get(&key) {\n  139 |             // Check if this file is part of a hardlink group from the scanner\n  140 |             let has_hardlinks = scanner\n  141 |                 .hardlink_groups\n  142 |                 .get(&key)\n  143 |                 .is_some_and(|group| group.len() > 1);\n  144 | \n  145 |             if has_hardlinks {\n  146 |                 if options.verbose {\n  147 |                     eprintln!(\n  148 |                         \"preserving hardlink {} -> {} (hardlinked)\",\n  149 |                         source.quote(),\n  150 |                         existing_path.quote()\n  151 |                     );\n  152 |                 }\n  153 |                 return Some(existing_path.clone());\n  154 |             }\n  155 |         }\n  156 | \n  157 |         // This is the first time we see this file, record its destination\n  158 |         self.inode_map.insert(key, dest.to_path_buf());\n  159 | \n  160 |         None\n  161 |     }","lines":47},{"ref":"src/uu/mv/src/hardlink.rs:204-243","code":"  204 |     fn scan_single_path(&mut self, path: &Path) -> io::Result<()> {\n  205 |         use std::os::unix::fs::MetadataExt;\n  206 | \n  207 |         if path.is_dir() {\n  208 |             // Recursively scan directory contents\n  209 |             self.scan_directory_recursive(path)?;\n  210 |         } else {\n  211 |             let metadata = path.metadata()?;\n  212 |             if metadata.nlink() > 1 {\n  213 |                 let key = (metadata.dev(), metadata.ino());\n  214 |                 self.hardlink_groups\n  215 |                     .entry(key)\n  216 |                     .or_default()\n  217 |                     .push(path.to_path_buf());\n  218 |             }\n  219 |         }\n  220 |         Ok(())\n  221 |     }\n  222 | \n  223 |     /// Recursively scan a directory for hardlinked files\n  224 |     fn scan_directory_recursive(&mut self, dir: &Path) -> io::Result<()> {\n  225 |         use std::os::unix::fs::MetadataExt;\n  226 | \n  227 |         let entries = std::fs::read_dir(dir)?;\n  228 |         for entry in entries {\n  229 |             let entry = entry?;\n  230 |             let path = entry.path();\n  231 | \n  232 |             if path.is_dir() {\n  233 |                 self.scan_directory_recursive(&path)?;\n  234 |             } else {\n  235 |                 let metadata = path.metadata()?;\n  236 |                 if metadata.nlink() > 1 {\n  237 |                     let key = (metadata.dev(), metadata.ino());\n  238 |                     self.hardlink_groups.entry(key).or_default().push(path);\n  239 |                 }\n  240 |             }\n  241 |         }\n  242 |         Ok(())\n  243 |     }","lines":40}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In rename() the IfOlder update check uses fs::metadata(from) and fs::metadata(to) which both follow symlinks. When moving a symlink (mv preserves symlinks elsewhere via symlink_metadata), the timestamp comparison is taken from the link targets, not the links, so an up-to-date symlink pointing at an old target may be wrongly skipped, or vice versa. handle_two_paths uses symlink_metadata to detect source existence but rename then dereferences.","fix":"Use symlink_metadata for the source/target modification-time comparison so symlinks are compared as links, consistent with mv preserving them.","locations":[{"ref":"src/uu/mv/src/mv.rs:709-713","code":"  709 |         if (opts.update == UpdateMode::IfOlder)\n  710 |             && fs::metadata(from)?.modified()? <= fs::metadata(to)?.modified()?\n  711 |         {\n  712 |             return Ok(());\n  713 |         }","lines":5}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"rename_dir_fallback retrieves xattrs of the top-level source dir before copying and applies them with fsxattr::apply_xattrs(to, xattrs)? AFTER copy_dir_contents but BEFORE checking `result?`. If the recursive copy failed, the code still applies xattrs to a partially-copied destination and only then propagates the copy error; combined with the later fs::remove_dir_all(from) only running on success, a partial destination tree is left behind with source intact, but the ordering of apply_xattrs vs error propagation is inverted relative to intent.","fix":"Propagate the copy result before applying xattrs (move `result?;` above apply_xattrs), so attributes are only applied to a fully successful copy.","locations":[{"ref":"src/uu/mv/src/mv.rs:1049-1071","code":" 1049 |     #[cfg(all(unix, not(any(target_os = \"macos\", target_os = \"redox\"))))]\n 1050 |     let xattrs = fsxattr::retrieve_xattrs(from).unwrap_or_else(|_| FxHashMap::default());\n 1051 | \n 1052 |     // Use directory copying (with or without hardlink support)\n 1053 |     let result = copy_dir_contents(\n 1054 |         from,\n 1055 |         to,\n 1056 |         #[cfg(unix)]\n 1057 |         hardlink_tracker,\n 1058 |         #[cfg(unix)]\n 1059 |         hardlink_scanner,\n 1060 |         verbose,\n 1061 |         progress_bar.as_ref(),\n 1062 |         display_manager,\n 1063 |     );\n 1064 | \n 1065 |     #[cfg(all(unix, not(any(target_os = \"macos\", target_os = \"redox\"))))]\n 1066 |     fsxattr::apply_xattrs(to, xattrs)?;\n 1067 | \n 1068 |     result?;\n 1069 | \n 1070 |     // Remove the source directory after successful copy\n 1071 |     fs::remove_dir_all(from)?;","lines":23}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"copy_dir_contents only performs the recursive copy when both hardlink_tracker and hardlink_scanner are Some (the `if let (Some(tracker), Some(scanner))` arm). On unix, if either is None the function silently creates the empty destination directory, preserves its ownership, and returns Ok(()) without copying any directory contents - a silent data loss on the cross-device directory move path. The non-unix branch always copies. Given rename_dir_fallback then removes the source directory, contents could be lost.","fix":"Always perform the recursive copy on unix; fall back to with_optional_hardlink_context or a dummy tracker/scanner when none is supplied, rather than skipping the copy entirely.","locations":[{"ref":"src/uu/mv/src/mv.rs:1089-1112","code":" 1089 |     #[cfg(unix)]\n 1090 |     {\n 1091 |         // Preserve ownership (uid/gid) of the top-level directory\n 1092 |         let _ = preserve_ownership(from, to);\n 1093 | \n 1094 |         if let (Some(tracker), Some(scanner)) = (hardlink_tracker, hardlink_scanner) {\n 1095 |             copy_dir_contents_recursive(\n 1096 |                 from,\n 1097 |                 to,\n 1098 |                 tracker,\n 1099 |                 scanner,\n 1100 |                 verbose,\n 1101 |                 progress_bar,\n 1102 |                 display_manager,\n 1103 |             )?;\n 1104 |         }\n 1105 |     }\n 1106 |     #[cfg(not(unix))]\n 1107 |     {\n 1108 |         copy_dir_contents_recursive(from, to, verbose, progress_bar, display_manager)?;\n 1109 |     }\n 1110 | \n 1111 |     Ok(())\n 1112 | }","lines":24}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Duplicate-line detection compares `memory_decoder.get_buffer(0) == &previous_bytes[..]` only when `length == line_bytes`, and stores previous_bytes only for full lines. A subtle correctness point: previous_bytes is cloned via clone_buffer which resizes to used_normal_length, but get_buffer(0) returns a slice of len used_normal_length. On the very first full line, previous_bytes is empty so the comparison is false (correct). However, the \"*\" duplicate suppression compares the raw decoded buffer bytes, which for the final partial line is zero-padded by zero_out_buffer before the comparison branch is even reached (the length != line_bytes branch runs first and mutates the buffer); since the duplicate check requires length == line_bytes it never sees padded data, so this is fine. No bug, but the ordering coupling (zero_out_buffer mutating the shared buffer before the duplicate comparison) is fragile and undocumented.","fix":"Add a comment documenting that the partial-line zero-fill must precede, and is mutually exclusive with, the full-line duplicate comparison; or restructure so the duplicate check operates on an explicitly full-length buffer.","locations":[{"ref":"src/uu/od/src/od.rs:525-549","code":"  525 |                 // not enough byte for a whole element, this should only happen on the last line.\n  526 |                 if length != line_bytes {\n  527 |                     // set zero bytes in the part of the buffer that will be used, but is not filled.\n  528 |                     let mut max_used = length + output_info.byte_size_block;\n  529 |                     if max_used > line_bytes {\n  530 |                         max_used = line_bytes;\n  531 |                     }\n  532 | \n  533 |                     memory_decoder.zero_out_buffer(length, max_used);\n  534 |                 }\n  535 | \n  536 |                 if !output_info.output_duplicates\n  537 |                     && length == line_bytes\n  538 |                     && memory_decoder.get_buffer(0) == &previous_bytes[..]\n  539 |                 {\n  540 |                     if !duplicate_line {\n  541 |                         duplicate_line = true;\n  542 |                         writeln!(writer, \"*\")?;\n  543 |                     }\n  544 |                 } else {\n  545 |                     duplicate_line = false;\n  546 |                     if length == line_bytes {\n  547 |                         // save a copy of the input unless it is the last line\n  548 |                         memory_decoder.clone_buffer(&mut previous_bytes);\n  549 |                     }","lines":25}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"parse_number_of_bytes: when the input starts with \"0x\"/\"0X\", `start` is set to 2 but `radix` stays at its initialized value 16, so hex parsing works; however the suffix handling guards the b, B and E suffix arms with `if radix != 16` to forbid those suffixes on hex. But for the plain-decimal branch (input not starting with 0/0x), the function early-returns via parse_size_u64 and never applies the od-specific 0x/0-octal semantics consistently, meaning a value like \"0\" is treated as octal radix 8 (parsing \"0\" fine) while \"8\" goes through parse_size_u64 as decimal. This mixed dispatch (octal for leading-0, hex for 0x, decimal otherwise, with suffix multipliers only on the 0/0x paths) is correct for GNU od but the suffix multipliers (k/m/G/T/P) are silently NOT supported on the decimal parse_size_u64 path the same way, so \"16k\" and \"0x10k\" take different code paths with potentially different overflow/suffix behavior.","fix":"Audit that the decimal (parse_size_u64) path and the octal/hex path accept exactly the same suffix set and overflow behavior; add tests for decimal inputs with k/m/G/b suffixes to confirm parity, or route all inputs through one consistent parser.","locations":[{"ref":"src/uu/od/src/parse_nrofbytes.rs:7-79","code":"    7 | pub fn parse_number_of_bytes(s: &str) -> Result<u64, ParseSizeError> {\n    8 |     let mut start = 0;\n    9 |     let mut len = s.len();\n   10 |     let mut radix = 16;\n   11 |     let mut multiply = 1;\n   12 | \n   13 |     if s.starts_with(\"0x\") || s.starts_with(\"0X\") {\n   14 |         start = 2;\n   15 |     } else if s.starts_with('0') {\n   16 |         radix = 8;\n   17 |     } else {\n   18 |         return parse_size_u64(&s[start..]);\n   19 |     }\n   20 | \n   21 |     let mut ends_with = s.chars().rev();\n   22 |     match ends_with.next() {\n   23 |         Some('b') if radix != 16 => {\n   24 |             multiply = 512;\n   25 |             len -= 1;\n   26 |         }\n   27 |         Some('k' | 'K') => {\n   28 |             multiply = 1024;\n   29 |             len -= 1;\n   30 |         }\n   31 |         Some('m' | 'M') => {\n   32 |             multiply = 1024 * 1024;\n   33 |             len -= 1;\n   34 |         }\n   35 |         Some('G') => {\n   36 |             multiply = 1024 * 1024 * 1024;\n   37 |             len -= 1;\n   38 |         }\n   39 |         #[cfg(target_pointer_width = \"64\")]\n   40 |         Some('T') => {\n   41 |             multiply = 1024 * 1024 * 1024 * 1024;\n   42 |             len -= 1;\n   43 |         }\n   44 |         #[cfg(target_pointer_width = \"64\")]\n   45 |         Some('P') => {\n   46 |             multiply = 1024 * 1024 * 1024 * 1024 * 1024;\n   47 |             len -= 1;\n   48 |         }\n   49 |         #[cfg(target_pointer_width = \"64\")]\n   50 |         Some('E') if radix != 16 => {\n   51 |             multiply = 1024 * 1024 * 1024 * 1024 * 1024 * 1024;\n   52 |             len -= 1;\n   53 |         }\n   54 |         Some('B') if radix != 16 => {\n   55 |             len -= 2;\n   56 |             multiply = match ends_with.next() {\n   57 |                 Some('k' | 'K') => 1000,\n   58 |                 Some('m' | 'M') => 1000 * 1000,\n   59 |                 Some('G') => 1000 * 1000 * 1000,\n   60 |                 #[cfg(target_pointer_width = \"64\")]\n   61 |                 Some('T') => 1000 * 1000 * 1000 * 1000,\n   62 |                 #[cfg(target_pointer_width = \"64\")]\n   63 |                 Some('P') => 1000 * 1000 * 1000 * 1000 * 1000,\n   64 |                 #[cfg(target_pointer_width = \"64\")]\n   65 |                 Some('E') => 1000 * 1000 * 1000 * 1000 * 1000 * 1000,\n   66 |                 _ => return Err(ParseSizeError::ParseFailure(s.to_string())),\n   67 |             }\n   68 |         }\n   69 |         _ => {}\n   70 |     }\n   71 | \n   72 |     let factor = match u64::from_str_radix(&s[start..len], radix) {\n   73 |         Ok(f) => f,\n   74 |         Err(e) => return Err(ParseSizeError::ParseFailure(e.to_string())),\n   75 |     };\n   76 |     factor\n   77 |         .checked_mul(multiply)\n   78 |         .ok_or_else(|| ParseSizeError::SizeTooBig(s.to_string()))\n   79 | }","lines":73}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Round-robin chunking miscounts closed writers. `closed_writers` is incremented every time `custom_write_all` returns false (a BrokenPipe on a `--filter` child), but the same broken writer is written to once per full round (every `num_chunks` lines). A single permanently-closed filter pipe therefore keeps incrementing `closed_writers` on each round and can reach `num_chunks` while the other N-1 writers are still open, causing the loop to terminate early and silently drop the rest of the input. The intended semantics is to stop only when ALL distinct writers are closed; counting per-write rather than per-writer is wrong.","fix":"Track closed state per writer index (e.g. a `vec![false; num_chunks]` set on first BrokenPipe for that index) and only increment the closed count on the transition from open
