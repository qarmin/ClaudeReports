<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"parse_time_style calls `field.chars().next().unwrap()` on a string that can be empty. A time-style value of exactly \"posix-\" (via `--time-style=posix-` or the `TIME_STYLE` env var) is stripped by `strip_prefix(\"posix-\")` to an empty string; when the locale is not POSIX, that empty `field` falls through to the catch-all arm and `unwrap()` panics. Confirmed: `ls -l --time-style=posix-` and `TIME_STYLE=posix- ls -l` both abort with a panic (exit 101).","fix":"Match on `field.chars().next()` with a `None` arm that returns `Err(LsError::TimeStyleParseError(field.into()))` instead of unwrapping, so an empty/invalid style produces the normal user-facing error.","locations":[{"ref":"src/uu/ls/src/config.rs:1057-1069","code":" 1057 |                 _ => match field.chars().next().unwrap() {\n 1058 |                     '+' => {\n 1059 |                         // recent/older formats are (optionally) separated by a newline\n 1060 |                         let mut it = field[1..].split('\\n');\n 1061 |                         let recent = it.next().unwrap_or_default();\n 1062 |                         let older = it.next();\n 1063 |                         match it.next() {\n 1064 |                             None => ok((recent, older)),\n 1065 |                             Some(_) => Err(LsError::TimeStyleParseError(String::from(field))),\n 1066 |                         }\n 1067 |                     }\n 1068 |                     _ => Err(LsError::TimeStyleParseError(String::from(field))),\n 1069 |                 },","lines":13}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In merge mode (`mpr` -> `get_file_line_groups` -> `group_lines`), if every input file is empty then `all_lines` is empty, the for-loop never executes, `current_key` stays `None`, and the final `result.push((current_key.unwrap(), current_group))` panics on `None.unwrap()`. The code even carries a \"TODO Handle empty file\" comment right above the unwrap. Reachable with e.g. `pr -m emptyfile1 emptyfile2`.","fix":"Guard the final push: only push when `current_key` is `Some`, e.g. `if let Some(key) = current_key { result.push((key, current_group)); }`, or return early when `lines` is empty.","locations":[{"ref":"src/uu/pr/src/pr.rs:1084-1085","code":" 1084 |     // TODO Handle empty file.\n 1085 |     result.push((current_key.unwrap(), current_group));","lines":2}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`Utmpx::login_time()` calls `.unwrap()` on `time::OffsetDateTime::from_unix_timestamp_nanos(ts_nanos)`.\nThe nanosecond timestamp is computed from the raw `ut_tv.tv_sec`/`tv_usec` fields read directly out of\nthe utmp/utmpx file via an unsafe `ptr::read`. A corrupt or hostile utmp record (or simply a record with\nan out-of-range tv_sec on a system with a 64-bit time_t) can produce a timestamp outside the range that\n`time` accepts, which makes this `.unwrap()` panic and abort utilities like `who`, `uptime`, `last`, etc.\nNote the systemd equivalent (`systemd_logind.rs:314-318`) deliberately uses `unwrap_or_else`, so the\nbehavior is also inconsistent between the two backends.","fix":"Replace `.unwrap()` with a graceful fallback, mirroring `SystemdLoginRecord::login_time_offset`\n(e.g. `.unwrap_or_else(|_| OffsetDateTime::UNIX_EPOCH)` or clamp ts_nanos to the valid range), so a\nmalformed utmp entry cannot crash the process.","locations":[{"ref":"src/uucore/src/lib/features/utmpx.rs:257-267","code":"  257 |     pub fn login_time(&self) -> time::OffsetDateTime {\n  258 |         #[allow(clippy::unnecessary_cast)]\n  259 |         let ts_nanos: i128 = (1_000_000_000_i64 * self.inner.ut_tv.tv_sec as i64\n  260 |             + 1_000_i64 * self.inner.ut_tv.tv_usec as i64)\n  261 |             .into();\n  262 |         let local_offset = time::OffsetDateTime::now_local()\n  263 |             .map_or_else(|_| time::UtcOffset::UTC, time::OffsetDateTime::offset);\n  264 |         time::OffsetDateTime::from_unix_timestamp_nanos(ts_nanos)\n  265 |             .unwrap()\n  266 |             .to_offset(local_offset)\n  267 |     }","lines":11}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In usage(), the terminal width is computed as `cmp::min(textwrap::termwidth(), 100) - 8`. `textwrap::termwidth()` returns the real terminal column count (falling back to 80 only when no terminal is detected). On a terminal narrower than 8 columns the subtraction underflows: it panics in debug builds and wraps to a gigantic usize in release builds (then passed to textwrap::fill as the wrap width). Running `coreutils --help` (or any path that calls usage) under a very narrow terminal therefore aborts or produces broken wrapping.","fix":"Use a saturating/clamped width, e.g. `let width = cmp::min(textwrap::termwidth(), 100).saturating_sub(8).max(1);` so the width is never zero or wrapped.","locations":[{"ref":"src/bin/coreutils.rs:21-22","code":"   21 |     let width = cmp::min(textwrap::termwidth(), 100) - 8; // (opinion/heuristic) max 100 chars wide with 4 character side indentions\n   22 |     let indent_list = textwrap::indent(&textwrap::fill(&display_list, width), \"    \");","lines":2}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Same underflow as in coreutils.rs: `std::cmp::min(termwidth(), 100) - 4 * 2` underflows when the terminal is narrower than 8 columns, panicking in debug or producing a huge wrap width in release when `uudoc --help` is run in a narrow terminal.","fix":"Clamp with saturating_sub and a minimum, e.g. `let width = std::cmp::min(termwidth(), 100).saturating_sub(8).max(1);`.","locations":[{"ref":"src/bin/uudoc.rs:109","code":"  109 |     let width = std::cmp::min(termwidth(), 100) - 4 * 2;","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In CopyMode::Link, when dereferencing a symlinked source, canonicalize(source, MissingHandling::Missing, ResolveMode::Physical).unwrap() is called. canonicalize can return Err (e.g. inaccessible parent component, ELOOP), which panics instead of producing a diagnostic. Elsewhere in this file canonicalize results are handled with .ok() fallbacks.","fix":"Handle the canonicalize error: propagate it as a CpError, or fall back to hard-linking the source path directly as done in the dereference attribute path (line 2644).","locations":[{"ref":"src/uu/cp/src/cp.rs:2291-2294","code":" 2291 |             if options.dereference(source_in_command_line) && source.is_symlink() {\n 2292 |                 let resolved =\n 2293 |                     canonicalize(source, MissingHandling::Missing, ResolveMode::Physical).unwrap();\n 2294 |                 fs::hard_link(resolved, dest)","lines":4}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"CopyMode::AttrOnly opens the destination with OpenOptions::open(dest).unwrap(). Any error (e.g. parent directory missing, permission denied, dest is a directory, read-only filesystem) panics the process instead of returning a CpError. All other copy modes propagate errors via `?`.","fix":"Replace `.unwrap()` with `.map_err(|e| CpError::IoErrContext(e, context.to_owned()))?` (or similar) so the error is reported rather than panicking.","locations":[{"ref":"src/uu/cp/src/cp.rs:2386-2393","code":" 2386 |         CopyMode::AttrOnly => {\n 2387 |             OpenOptions::new()\n 2388 |                 .write(true)\n 2389 |                 .truncate(false)\n 2390 |                 .create(true)\n 2391 |                 .open(dest)\n 2392 |                 .unwrap();\n 2393 |         }","lines":8}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In the `safe_du` subdirectory branch, when `fs::symlink_metadata(path)` fails the code falls\nback to `fs::symlink_metadata(\"/\").expect(\"root should be accessible\")`. If `/` cannot be\nstat-ed (sandboxed/chrooted/limited environments, or a platform where this fails) the process\npanics instead of reporting an error. du should never abort the whole run because one entry's\nmetadata could not be read.","fix":"Avoid the unconditional `expect`. Either propagate the original error through `print_tx`\n(as the other error arms do), or change `Stat::metadata` to an `Option<Metadata>` so a missing\nmetadata does not require a fake root stat.","locations":[{"ref":"src/uu/du/src/du.rs:319-323","code":"  319 |                 let std_metadata = fs::symlink_metadata(path).unwrap_or_else(|_| {\n  320 |                     // If we can't get std metadata, create a minimal fake one\n  321 |                     // This should rarely happen but provides a fallback\n  322 |                     fs::symlink_metadata(\"/\").expect(\"root should be accessible\")\n  323 |                 });","lines":5}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In parse_time_style, when both `--full-time` and a time style are present, the code does `options.indices_of(options::TIME_STYLE).unwrap()`. The `field` value can originate from the `TIME_STYLE` environment variable (via the `.env(\"TIME_STYLE\")` on the arg or the explicit `or_else` env read). clap does not assign command-line indices to env-sourced values, so `indices_of` can return `None`, making the `unwrap()` panic. (The companion `indices_of(FULL_TIME).unwrap()` is safe because it is guarded by `get_flag(FULL_TIME)`.)","fix":"Use `options.indices_of(options::TIME_STYLE).and_then(|mut it| it.next_back())` (returning `Option`) and compare the two Options directly, treating a missing index (env-sourced) as \"older\" than an explicit CLI `--full-time`.","locations":[{"ref":"src/uu/ls/src/config.rs:1027-1029","code":" 1027 |         if options.get_flag(options::FULL_TIME)\n 1028 |             && options.indices_of(options::FULL_TIME).unwrap().next_back()\n 1029 |                 > options.indices_of(options::TIME_STYLE).unwrap().next_back()","lines":3}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"is_hidden on Windows unwraps the result of `file_path.metadata()`. A DirEntry whose metadata cannot be read (e.g. a dangling symlink, a file deleted between readdir and the stat, or a permission error) makes ls panic instead of degrading gracefully. The Unix branch correctly avoids any metadata call.","fix":"Replace `.unwrap()` with a fallback, e.g. `file_path.metadata().map_or(false, |m| (m.file_attributes() & 0x2) > 0)`, treating unreadable entries as non-hidden.","locations":[{"ref":"src/uu/ls/src/display.rs:1217-1223","code":" 1217 | fn is_hidden(file_path: &DirEntry) -> bool {\n 1218 |     #[cfg(windows)]\n 1219 |     {\n 1220 |         let metadata = file_path.metadata().unwrap();\n 1221 |         let attr = metadata.file_attributes();\n 1222 |         (attr & 0x2) > 0\n 1223 |     }","lines":7}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`page_up` indexes `self.lines.get(self.upper_mark).expect(\"line should exist\")` while squeezing.\n`upper_mark` is only guaranteed to be a valid index for lines that have already been read into\n`self.lines`. After navigation patterns that leave `upper_mark >= self.lines.len()` (for example a\npage_down that hit EOF then a page_up that does not reduce far enough, or content shorter than the\nwindow), the `expect` will panic and tear down the terminal via the loose panic hook. The squeeze\nloop should bound-check instead of asserting the line exists.","fix":"Replace the `expect` with a graceful check: `let Some(line) = self.lines.get(self.upper_mark) else { break; };`\nso an out-of-range upper_mark stops the loop instead of panicking.","locations":[{"ref":"src/uu/more/src/more.rs:768-777","code":"  768 |         if self.squeeze {\n  769 |             // Move upper mark to the first non-empty line\n  770 |             while self.upper_mark > 0 {\n  771 |                 let line = self.lines.get(self.upper_mark).expect(\"line should exist\");\n  772 |                 if !line.trim().is_empty() {\n  773 |                     break;\n  774 |                 }\n  775 |                 self.upper_mark = self.upper_mark.saturating_sub(1);\n  776 |             }\n  777 |         }","lines":10}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`chunks::read` unwraps the result of `sender.send(payload?)`. If the receiving\nthread (sorter/merger/checker) has already terminated - e.g. because it hit an\nerror and dropped its receiver - this `unwrap()` panics on the reader thread\ninstead of returning gracefully. The threaded ext_sort `sorter` deliberately\nhandles this exact situation by returning silently on send failure, but the\nreader side does not, so a panic (and the accompanying \"thread panicked\" noise\nplus possible abort) can replace clean error propagation.","fix":"Return a `UResult` error (or simply `Ok(false)`/stop) when `sender.send` fails\ninstead of `unwrap()`, mirroring how the sorter thread treats a closed channel\nas a benign shutdown signal.","locations":[{"ref":"src/uu/sort/src/chunks.rs:257","code":"  257 |         sender.send(payload?).unwrap();","lines":1}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`check_bound` slices the format string by byte range `slice[beg..end]`, but `beg`/`end`\n(passed as `old` and `j`) are CHARACTER indices into the `chars: Vec<char>` array, not byte\nindices. `bound` is also `chars.len()` (a char count). For any `--printf`/`-c` format string\nthat contains a multibyte (non-ASCII) character before an invalid directive, this slice will\neither panic (slicing at a non-char-boundary) or extract the wrong substring. The rest of\n`handle_percent_case` is careful to convert char indices to byte indices via\n`char_index_to_byte_index`, but `check_bound` was missed.","fix":"Convert the indices before slicing, e.g. take `format_str` plus the char indices and do\n`let b = char_index_to_byte_index(slice, beg); let e = char_index_to_byte_index(slice, end);\nslice[b..e]`, or build the directive string from the `chars` slice like the sibling code at\nline 789 does (`chars[beg..end].iter().collect()`).","locations":[{"ref":"src/uu/stat/src/stat.rs:83-94","code":"   83 | fn check_bound(slice: &str, bound: usize, beg: usize, end: usize) -> UResult<()> {\n   84 |     if end >= bound {\n   85 |         return Err(USimpleError::new(\n   86 |             1,\n   87 |             StatError::InvalidDirective {\n   88 |                 directive: slice[beg..end].quote().to_string(),\n   89 |             }\n   90 |             .to_string(),\n   91 |         ));\n   92 |     }\n   93 |     Ok(())\n   94 | }","lines":12},{"ref":"src/uu/stat/src/stat.rs:799-816","code":"  799 |         check_bound(format_str, bound, old, j)?;\n  800 | \n  801 |         if chars[j] == '.' {\n  802 |             j += 1;\n  803 |             check_bound(format_str, bound, old, j)?;\n  804 | \n  805 |             let j_byte = Self::char_index_to_byte_index(format_str, j);\n  806 |             match format_str[j_byte..].scan_num::<i32>() {\n  807 |                 Some((value, offset)) => {\n  808 |                     if value >= 0 {\n  809 |                         precision = Precision::Number(value as usize);\n  810 |                     }\n  811 |                     j += offset;\n  812 |                 }\n  813 |                 None => precision = Precision::NoNumber,\n  814 |             }\n  815 |             check_bound(format_str, bound, old, j)?;\n  816 |         }","lines":18}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`handle_event` calls `self.files.get(event_path)` (line 307) and later `get_mut`/`remove` which all\n`.unwrap()` on the `HashMap` lookup. While the primary caller (`process_event`) guards with\n`contains_key`, the `RenameMode::Both` branch (lines 460-473) removes `event_path` and inserts under\n`new_path`, then for descriptor-follow watches `new_path`'s parent. A subsequent event for the old\n`event_path` (still possible due to queued inotify events on the parent dir) would hit\n`self.files.get(event_path)` at line 307 and panic, because the entry was removed. The\n`display_name` fetch at 307 happens before any kind-specific guard.","fix":"Fetch the entry once with a fallible lookup at the top of `handle_event` and return early (Ok(vec![])) when the path is no longer tracked, instead of unwrapping via `get`.","locations":[{"ref":"src/uu/tail/src/follow/watch.rs:305-307","code":"  305 |         let event_path = event.paths.first().unwrap();\n  306 |         let mut paths: Vec<PathBuf> = vec![];\n  307 |         let display_name = self.files.get(event_path).display_name.clone();","lines":3},{"ref":"src/uu/tail/src/follow/watch.rs:460-473","code":"  460 |                 if self.follow_descriptor() => {\n  461 |                     let new_path = event.paths.last().unwrap();\n  462 |                     paths.push(new_path.clone());\n  463 | \n  464 |                     let new_data = PathData::from_other_with_path(self.files.remove(event_path), new_path);\n  465 |                     self.files.insert(\n  466 |                         new_path,\n  467 |                         new_data,\n  468 |                         self.files.get_last().unwrap() == event_path\n  469 |                     );\n  470 | \n  471 |                     // Unwatch old path and watch new path\n  472 |                     let _ = self.watcher_rx.as_mut().unwrap().unwatch(event_path);\n  473 |                     self.watcher_rx.as_mut().unwrap().watch_with_parent(new_path)?;","lines":14}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In resolve_asterisk_width, a negative asterisk width is negated with `-(nb as isize)`.\nWhen the argument is i64::MIN (e.g. `printf '%*d' -9223372036854775808 1`), `nb as isize`\nis i64::MIN and `-(i64::MIN)` overflows, which panics in debug builds and wraps to a huge\nnegative value in release builds (then `usize::try_from` fails and silently yields 0).\nThis is reachable from user-controlled printf input.","fix":"Negate using the unsigned magnitude, e.g. `nb.unsigned_abs()` on the i64:\n`Some((usize::try_from(nb.unsigned_abs()).unwrap_or(usize::MAX), true))`,\nwhich is well defined for i64::MIN.","locations":[{"ref":"src/uucore/src/lib/features/format/spec.rs:519-520","code":"  519 |             if nb < 0 {\n  520 |                 Some((usize::try_from(-(nb as isize)).ok().unwrap_or(0), true))","lines":2}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"MountInfo::new for /proc/self/mountinfo unwraps the position of the `-` separator\nfield: `.position(|c| *c == b\"-\").unwrap()`. A malformed or truncated mountinfo\nline (or one that does not contain a standalone \"-\" token after FIELDS_OFFSET, e.g.\nbecause of unexpected kernel formatting or a short line) makes the unwrap panic,\ntaking down df/any caller of read_fs_list. Real-world mountinfo is normally\nwell-formed, but this is parsing untrusted-ish system input with an unchecked unwrap.","fix":"Replace the unwrap with a `?`/early-return None when the separator or required\nfields are absent, so a bad line is skipped (consistent with filter_map in read_fs_list).","locations":[{"ref":"src/uucore/src/lib/features/fsext.rs:234-239","code":"  234 |                 let after_fields = raw[FIELDS_OFFSET..]\n  235 |                     .iter()\n  236 |                     .position(|c| *c == b\"-\")\n  237 |                     .unwrap()\n  238 |                     + FIELDS_OFFSET\n  239 |                     + 1;","lines":6}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`ProcessInformation::run_state()` does `self.stat().get(2).unwrap()`. Every other accessor in this file\n(`start_time`, `ppid`, `get_uid_or_gid_field`, etc.) returns `io::Error` when the expected stat field is\nmissing, but `run_state` panics instead. A truncated or unusual `/proc/<pid>/stat` (which can legitimately\nhappen for kernel threads/zombies, or be raced away mid-read) makes this index `.unwrap()` panic rather\nthan return the declared `Err`.","fix":"Return an error instead of unwrapping, e.g.\n`RunState::try_from(self.stat().get(2).ok_or(io::ErrorKind::InvalidData)?.as_str())`.","locations":[{"ref":"src/uucore/src/lib/features/proc_info.rs:295-297","code":"  295 |     pub fn run_state(&mut self) -> Result<RunState, io::Error> {\n  296 |         RunState::try_from(self.stat().get(2).unwrap().as_str())\n  297 |     }","lines":3}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"gen_manpage and several MDWriter methods unwrap/expect liberally: `String::from_utf8(buffer).expect(\"Invalid UTF-8 in manpage\")` (line 169), `man.render(...).expect(...)` (166), `io::stdout().write_all(...).unwrap()` and `flush().unwrap()` (177-179), and `self.command.render_version().split_once(' ').unwrap().1` (515). The version().unwrap() in particular panics if render_version() ever returns a string without a space. These are documented as panics in some doc-comments but make uudoc abort with a panic (and a broken-pipe write_all also panics) rather than returning the io::Result the surrounding code uses.","fix":"Propagate errors via `?` where the function returns io::Result, and replace the version split_once unwrap with a graceful fallback (e.g. strip a known prefix or default to the full string) so malformed/edge version strings do not abort the generator.","locations":[{"ref":"src/bin/uudoc.rs:166-179","code":"  166 |     man.render(&mut buffer).expect(\"Man page generation failed\");\n  167 | \n  168 |     // Convert to string for processing\n  169 |     let manpage = String::from_utf8(buffer).expect(\"Invalid UTF-8 in manpage\");\n  170 | \n  171 |     // Post-process the manpage to fix mandoc lint issues\n  172 |     let date = Zoned::now().strftime(\"%Y-%m-%d\").to_string();\n  173 |     let processed_manpage = post_process_manpage(manpage, &date);\n  174 | \n  175 |     // Write the processed manpage to stdout\n  176 |     io::stdout()\n  177 |         .write_all(processed_manpage.as_bytes())\n  178 |         .unwrap();\n  179 |     io::stdout().flush().unwrap();","lines":14},{"ref":"src/bin/uudoc.rs:511-517","code":"  511 |     fn version(&mut self) -> io::Result<()> {\n  512 |         writeln!(\n  513 |             self.w,\n  514 |             \"<div class=\\\"version\\\">v{}<\/div>\",\n  515 |             self.command.render_version().split_once(' ').unwrap().1\n  516 |         )\n  517 |     }","lines":7}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The Linux/Android non-musl binary_path() does `let argv0 = args.next().unwrap();` and will panic if the argument iterator is empty. The other (musl / non-Linux) implementation of the same function deliberately handles the empty case by falling back to `std::env::current_exe()`. This inconsistency means an empty argv aborts with a Rust panic on Linux glibc instead of using the kernel execfn fallback that is otherwise available here.","fix":"Fall back to the kernel execfn when argv is empty, e.g. `let argv0 = args.next().unwrap_or_else(|| exec_path.as_os_str().to_owned());`, matching the graceful handling in the other cfg branch.","locations":[{"ref":"src/common/validation.rs:101","code":"  101 |     let argv0 = args.next().unwrap();","lines":1},{"ref":"src/common/validation.rs:81-87","code":"   81 | pub fn binary_path(args: &mut impl Iterator<Item = OsString>) -> PathBuf {\n   82 |     match args.next() {\n   83 |         Some(ref s) if !s.is_empty() => PathBuf::from(s),\n   84 |         // the fallback is valid only for hardlinks\n   85 |         _ => std::env::current_exe().unwrap(),\n   86 |     }\n   87 | }","lines":7}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"InputSplitter::shrink_buffer_to_size and drain_buffer call `line.unwrap()` on the buffered `UResult<String>`, and add_line_to_buffer stores `Ok(line)` then later unwraps. If a buffered item were ever an `Err`, these would panic. In practice an Err line is consumed and `?`-propagated before being buffered, so the invariant holds, but it is an unchecked assumption that a future refactor could break, and it is undocumented.","fix":"Buffer plain `String` values rather than `UResult<String>` (the iterator yields the result; unwrap/propagate the error once at buffering time), eliminating the later unwraps.","locations":[{"ref":"src/uu/csplit/src/csplit.rs:562-576","code":"  562 |     fn shrink_buffer_to_size(&mut self) -> impl Iterator<Item = String> + '_ {\n  563 |         let shrink_offset = if self.buffer.len() > self.size {\n  564 |             self.buffer.len() - self.size\n  565 |         } else {\n  566 |             0\n  567 |         };\n  568 |         self.buffer\n  569 |             .drain(..shrink_offset)\n  570 |             .map(|(_, line)| line.unwrap())\n  571 |     }\n  572 | \n  573 |     /// Drain the content of the buffer.\n  574 |     fn drain_buffer(&mut self) -> impl Iterator<Item = String> + '_ {\n  575 |         self.buffer.drain(..).map(|(_, line)| line.unwrap())\n  576 |     }","lines":15},{"ref":"src/uu/csplit/src/csplit.rs:586-598","code":"  586 |     fn add_line_to_buffer(&mut self, ln: usize, line: String) -> Option<String> {\n  587 |         if self.rewind {\n  588 |             self.buffer.insert(0, (ln, Ok(line)));\n  589 |             None\n  590 |         } else if self.buffer.len() >= self.size {\n  591 |             let (_, head_line) = self.buffer.remove(0);\n  592 |             self.buffer.push((ln, Ok(line)));\n  593 |             Some(head_line.unwrap())\n  594 |         } else {\n  595 |             self.buffer.push((ln, Ok(line)));\n  596 |             None\n  597 |         }\n  598 |     }","lines":13}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`BufferedOutput::flush` does `let n = wstat.bytes_total.try_into().unwrap()` converting a u128 to usize and then `self.buf.drain(0..n)`. The buffer is at most `obs` bytes so n fits in practice, but the unwrap is an unguarded u128->usize narrowing, and if `write_blocks` ever reported more bytes than buffered (it should not), `drain(0..n)` would panic on an out-of-range range.","fix":"Use `usize::try_from(wstat.bytes_total).unwrap_or(self.buf.len()).min(self.buf.len())` for the drain bound to be robust.","locations":[{"ref":"src/uu/dd/src/bufferedoutput.rs:47-51","code":"   47 |     pub(crate) fn flush(&mut self) -> std::io::Result<WriteStat> {\n   48 |         let wstat = self.inner.write_blocks(&self.buf)?;\n   49 |         let n = wstat.bytes_total.try_into().unwrap();\n   50 |         self.buf.drain(0..n);\n   51 |         Ok(wstat)","lines":5}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Several `n.try_into().unwrap()` / `.try_into().unwrap()` calls convert u64 offsets to i64 for seeking and will panic if the value exceeds i64::MAX. `Source::skip` for plain files (line 296) and `Dest::seek` for files (line 665) rely on parseargs having already rejected skip/seek > i64::MAX, but the conversion is unguarded. The `discard_cache` offset conversions at lines 1234, 1258-1259 convert accumulated `write_offset`/lengths with `.unwrap()` and have no such guarantee; with a transfer larger than i64::MAX bytes (u64 counters) they would panic.","fix":"Use checked/`try_into()` with proper error propagation (return an io::Error) instead of `.unwrap()` for these offset conversions, especially the discard_cache offsets which are derived from runtime byte counts.","locations":[{"ref":"src/uu/dd/src/dd.rs:296","code":"  296 |             Self::File(f) => f.seek(SeekFrom::Current(n.try_into().unwrap())),","lines":1},{"ref":"src/uu/dd/src/dd.rs:665","code":"  665 |                 f.seek(SeekFrom::Current(n.try_into().unwrap()))","lines":1},{"ref":"src/uu/dd/src/dd.rs:1234","code":" 1234 |                 o.discard_cache(write_offset.try_into().unwrap(), 0);","lines":1},{"ref":"src/uu/dd/src/dd.rs:1258-1259","code":" 1258 |             let offset = write_offset.try_into().unwrap();\n 1259 |             let len = write_len.try_into().unwrap();","lines":2}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In `SuffixType::base_and_suffix`, the loop `while bases[i + 1] - bases[i] < n && i < suffixes.len()` evaluates the array index `bases[i + 1]` BEFORE the bound check `i < suffixes.len()`, and increments `i` inside the body. `bases`/`SI_BASES`/`IEC_BASES` have length 11 but `suffixes` has length 9. If the loop ever advances `i` to 9 (requires `n` larger than the gap `bases[9]-bases[8]`, i.e. ~9e26 for SI), the function returns `suffixes[9]`, which is out of bounds (valid indices 0..=8) and panics. `bytes_total` is a `u128`, so although unrealistic for real transfers it is reachable for huge values. The bound check should also use `i + 1 < bases.len()` and `i < suffixes.len() - 1`.","fix":"Clamp the index: loop while `i + 1 < suffixes.len() && bases[i + 1] <= n` (or `bases[i+1]-bases[i] < n`), so `i` can never exceed `suffixes.len() - 1`, and check the bound before indexing.","locations":[{"ref":"src/uu/dd/src/numbers.rs:26-31","code":"   26 |         let mut i = 0;\n   27 |         while bases[i + 1] - bases[i] < n && i < suffixes.len() {\n   28 |             i += 1;\n   29 |         }\n   30 |         (bases[i], suffixes[i])\n   31 |     }","lines":6}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"relative_path() calls `dst.parent().unwrap()`. Path::parent() returns None for the filesystem root (\"/\") and for the empty path. `ln -s -r <src> /` (linking with the root as the destination path) would hit this unwrap and panic. The non-relative path does not have this issue.","fix":"Handle the None case explicitly, e.g. `let Some(parent) = dst.parent() else { return src.into(); };` before canonicalizing.","locations":[{"ref":"src/uu/ln/src/ln.rs:388-399","code":"  388 | fn relative_path<'a>(src: &'a Path, dst: &Path) -> Cow<'a, Path> {\n  389 |     if let Ok(src_abs) = canonicalize(src, MissingHandling::Missing, ResolveMode::Physical) {\n  390 |         if let Ok(dst_abs) = canonicalize(\n  391 |             dst.parent().unwrap(),\n  392 |             MissingHandling::Missing,\n  393 |             ResolveMode::Physical,\n  394 |         ) {\n  395 |             return make_path_relative_to(src_abs, dst_abs).into();\n  396 |         }\n  397 |     }\n  398 |     src.into()\n  399 | }","lines":12}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"StyleManager::get_style_code does `ret.truncate(ret.len() - 4)` to strip a 4-byte ANSI reset suffix produced by nu-ansi-term. This assumes `paint(\"\")` always yields at least 4 trailing bytes. If a Style ever paints to an empty (or <4 byte) string - e.g. a default/empty style reaching this path - `ret.len() - 4` underflows and the truncate panics. Not reachable through current LS_COLORS inputs tested, but relies on an undocumented invariant of the formatting crate.","fix":"Guard the truncation: `if let Some(n) = ret.len().checked_sub(4) { ret.truncate(n); }`, or strip a known reset suffix via `ret.strip_suffix(\"\\x1b[0m\")`.","locations":[{"ref":"src/uu/ls/src/colors.rs:204-212","code":"  204 |     pub(crate) fn get_style_code(&mut self, new_style: &Style) -> String {\n  205 |         self.current_style = Some(*new_style);\n  206 |         let mut nu_a_style = new_style.to_nu_ansi_term_style();\n  207 |         nu_a_style.prefix_with_reset = false;\n  208 |         let mut ret = nu_a_style.paint(\"\").to_string();\n  209 |         // remove the suffix reset\n  210 |         ret.truncate(ret.len() - 4);\n  211 |         ret\n  212 |     }","lines":9}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In display_items (non-long path) leading info is rendered into a byte buffer and then converted with `String::from_utf8(s).unwrap()`. The comment asserts it is \"Should always be UTF-8\". Today the only leading info is inode/allocation-size digits (ASCII), so it holds, but it is a latent panic: any future leading-info field that can contain non-UTF-8 bytes would crash ls.","fix":"Use `String::from_utf8_lossy(&s).into_owned()` (or keep the bytes as an OsString) instead of `unwrap()`.","locations":[{"ref":"src/uu/ls/src/display.rs:382-386","code":"  382 |             let more_info = if should_display_leading_info {\n  383 |                 let mut s = Vec::new();\n  384 |                 display_additional_leading_info(i, &padding, config, &mut s)?;\n  385 |                 Some(String::from_utf8(s).unwrap()) // Should always be UTF-8\n  386 |             } else {","lines":5}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`NumberFormat::RightZero::format_to` calls `number.abs()` on the negative branch. If the line number is `i64::MIN` (reachable via `nl -v -9223372036854775808 -n rz`), `i64::abs` overflows and panics in debug builds (wraps to a negative in release, producing a malformed number).","fix":"Use `number.unsigned_abs()` (returns u64) for formatting the magnitude, which handles `i64::MIN` without overflow.","locations":[{"ref":"src/uu/nl/src/nl.rs:143-145","code":"  143 |             Self::RightZero if number < 0 => {\n  144 |                 writer.write_all(b\"-\")?;\n  145 |                 let num = buffer.format(number.abs());","lines":3}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In `find_stdout()`, `home_out.to_str().unwrap()` panics if the `HOME` environment variable contains non-UTF-8 bytes (legal on Unix). nohup would abort with a Rust panic (exit 101) instead of producing the intended nohup error/exit code when falling back to $HOME/nohup.out.","fix":"Avoid the lossy `to_str().unwrap()`. Work with the `PathBuf`/`OsStr` directly (e.g. open via the path, and use `home_out.to_string_lossy()` only for the error message), so a non-UTF-8 HOME does not panic.","locations":[{"ref":"src/uu/nohup/src/nohup.rs:146-147","code":"  146 |         let home_out = PathBuf::from(home).join(NOHUP_OUT);\n  147 |         let home_out = home_out.to_str().unwrap();","lines":2}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`find_valid_number_with_suffix` mixes byte length and char count. `numeric_part.len()` is a\nbyte count, but it is used in `s.chars().skip(numeric_part.len())` (char-based skip) and in\nthe inclusive slice `&s[..=numeric_part.len()]` / `&s[..numeric_part.len() + 2]`. These are\nonly safe because the numeric prefix is currently expected to be pure ASCII. The locale\ndecimal separator returned by ICU can be multibyte (e.g. it is not guaranteed ASCII); if a\nmultibyte separator ends up inside `numeric_part`, the inclusive slice can land in the middle\nof a UTF-8 sequence and panic, and the `skip` count becomes wrong.","fix":"Index by bytes consistently: instead of `s.chars().skip(numeric_part.len())`, work from\n`s[numeric_part.len()..].chars()`, and build the returned slices with explicit byte ranges\nvalidated to fall on char boundaries (or use `s.get(..end)`).","locations":[{"ref":"src/uu/numfmt/src/format.rs:56-82","code":"   56 | fn find_valid_number_with_suffix(s: &str, unit: Unit) -> Option<&str> {\n   57 |     let numeric_part = find_numeric_beginning(s)?;\n   58 | \n   59 |     let accepts_suffix = unit != Unit::None;\n   60 |     let accepts_i = [Unit::Auto, Unit::Iec(true)].contains(&unit);\n   61 | \n   62 |     let mut characters = s.chars().skip(numeric_part.len());\n   63 |     let potential_suffix = characters.next();\n   64 |     let potential_i = characters.next();\n   65 | \n   66 |     if !accepts_suffix {\n   67 |         return Some(numeric_part);\n   68 |     }\n   69 | \n   70 |     match (potential_suffix, potential_i) {\n   71 |         (Some(suffix), None) if RawSuffix::try_from(&suffix).is_ok() => {\n   72 |             Some(&s[..=numeric_part.len()])\n   73 |         }\n   74 |         (Some(suffix), Some('i')) if accepts_i && RawSuffix::try_from(&suffix).is_ok() => {\n   75 |             Some(&s[..numeric_part.len() + 2])\n   76 |         }\n   77 |         (Some(suffix), Some(_)) if RawSuffix::try_from(&suffix).is_ok() => {\n   78 |             Some(&s[..=numeric_part.len()])\n   79 |         }\n   80 |         _ => Some(numeric_part),\n   81 |     }\n   82 | }","lines":27}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"format_item_c indexes bytes[0] without checking that the slice is non-empty. It is reached via MultibyteWriter with get_full_buffer(b), and in normal operation b < length so the slice is non-empty, but the function is a public-ish formatter taking an arbitrary &[u8] and will panic on an empty slice. The accompanying doc comment \"item-bytes == 1\" documents the precondition but it is not enforced.","fix":"Guard against an empty slice (e.g. `let Some(&b) = bytes.first() else { return String::new(); }`) or document/assert the invariant explicitly.","locations":[{"ref":"src/uu/od/src/prn_char.rs:48-50","code":"   48 | fn format_item_c(bytes: &[u8]) -> String {\n   49 |     // item-bytes == 1\n   50 |     let b = bytes[0];","lines":3}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"shred `wipe_name` panics via `.expect()` if the renamed file cannot be opened or synced during WipeSync (lines 820-821), and calls `orig_path.file_name().unwrap()` (line 790) which panics if the path ends in `..` or is the root. Additionally the `Err` branch of `fs::rename` calls `std::process::exit(1)` directly (line 831) rather than returning an error, bypassing the caller`s error handling and any cleanup; this is also flagged by an in-code TODO.","fix":"Propagate these as `io::Error`/`UResult` instead of `.expect()` and `process::exit`. Guard `file_name()` against `None`. Let `wipe_file`/`do_remove` surface the error to the per-file `show_if_err!` loop.","locations":[{"ref":"src/uu/shred/src/shred.rs:790","code":"  790 |     let file_name_len = orig_path.file_name().unwrap().len();","lines":1},{"ref":"src/uu/shred/src/shred.rs:817-821","code":"  817 |                         let new_file = OpenOptions::new()\n  818 |                             .write(true)\n  819 |                             .open(new_path.clone())\n  820 |                             .expect(\"Failed to open renamed file for syncing\");\n  821 |                         new_file.sync_all().expect(\"Failed to sync renamed file\");","lines":5},{"ref":"src/uu/shred/src/shred.rs:827-832","code":"  827 |                 Err(e) => {\n  828 |                     let msg = translate!(\"shred-couldnt-rename\", \"file\" => last_path.maybe_quote(), \"new_name\" => new_path.quote(), \"error\" => e);\n  829 |                     show_error!(\"{msg}\");\n  830 |                     // TODO: replace with our error management\n  831 |                     std::process::exit(1);\n  832 |                 }","lines":6}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In `uumain`, when reading the `--files0-from` list, each NUL-separated entry is\ndecoded with `std::str::from_utf8(&line).expect(...)`. A non-UTF-8 file name in\nthe list (perfectly legal on Unix) causes a hard panic instead of a proper\ndiagnostic. The value is also decoded twice (once for the match, once for the\npush), so the same panic site is duplicated.","fix":"Build the `OsString` directly from the raw bytes (e.g. via\n`OsStr::from_bytes` on Unix) instead of going through `str::from_utf8().expect`,\nand only special-case the `-`/empty checks on the byte slice. This avoids the\npanic and the redundant double decode.","locations":[{"ref":"src/uu/sort/src/sort.rs:2045-2046","code":" 2045 |             let f = std::str::from_utf8(&line)\n 2046 |                 .expect(\"Could not parse string from zero terminated input.\");","lines":2},{"ref":"src/uu/sort/src/sort.rs:2061-2064","code":" 2061 |             files.push(OsString::from(\n 2062 |                 std::str::from_utf8(&line)\n 2063 |                     .expect(\"Could not parse string from zero terminated input.\"),\n 2064 |             ));","lines":4}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`ReverseChunks::new` unconditionally unwraps several seek/stream_position calls\n(`file.stream_position().unwrap()`, `file.seek(SeekFrom::End(0)).unwrap()`), and `next()` unwraps\n`seek` and `read_exact`. `backwards_thru_file` likewise unwraps every `file.seek(...).unwrap()`.\nThese are reached from `bounded_tail`, which is only entered after `is_seekable` succeeded, so in\nthe common case they hold. However a concurrent truncation/replacement of the file between the\nseekability probe and these reads (a real possibility for the files tail targets) turns a transient\nI/O error into a process abort instead of a graceful error. `read_exact` will also panic-abort if\nthe file shrinks mid-read.","fix":"Propagate errors instead of unwrapping. `ReverseChunks::next` and `backwards_thru_file` should return `io::Result` (the latter already returns nothing) and `bounded_tail` should forward the error via `?` rather than aborting.","locations":[{"ref":"src/uu/tail/src/chunks.rs:50-55","code":"   50 |         let current = if cfg!(unix) {\n   51 |             file.stream_position().unwrap()\n   52 |         } else {\n   53 |             0\n   54 |         };\n   55 |         let size = file.seek(SeekFrom::End(0)).unwrap() - current;","lines":6},{"ref":"src/uu/tail/src/chunks.rs:88-99","code":"   88 |         let pos = self\n   89 |             .file\n   90 |             .seek(SeekFrom::Current(-(block_size as i64)))\n   91 |             .unwrap();\n   92 |         self.file\n   93 |             .read_exact(&mut buf[0..(block_size as usize)])\n   94 |             .unwrap();\n   95 |         let pos2 = self\n   96 |             .file\n   97 |             .seek(SeekFrom::Current(-(block_size as i64)))\n   98 |             .unwrap();\n   99 |         assert_eq!(pos, pos2);","lines":12},{"ref":"src/uu/tail/src/tail.rs:413-451","code":"  413 | fn backwards_thru_file(file: &mut File, num_delimiters: u64, delimiter: u8) {\n  414 |     if num_delimiters == 0 {\n  415 |         file.seek(SeekFrom::End(0)).unwrap();\n  416 |         return;\n  417 |     }\n  418 |     // This variable counts the number of delimiters found in the file\n  419 |     // so far (reading from the end of the file toward the beginning).\n  420 |     let mut counter = 0;\n  421 |     let mut first_slice = true;\n  422 |     for slice in ReverseChunks::new(file) {\n  423 |         // Iterate over each byte in the slice in reverse order.\n  424 |         let mut iter = memrchr_iter(delimiter, &slice);\n  425 | \n  426 |         // Ignore a trailing newline in the last block, if there is one.\n  427 |         if first_slice {\n  428 |             if slice.last().is_some_and(|&c| c == delimiter) {\n  429 |                 iter.next();\n  430 |             }\n  431 |             first_slice = false;\n  432 |         }\n  433 | \n  434 |         // For each byte, increment the count of the number of\n  435 |         // delimiters found. If we have found more than the specified\n  436 |         // number of delimiters, terminate the search and seek to the\n  437 |         // appropriate location in the file.\n  438 |         for i in iter {\n  439 |             counter += 1;\n  440 |             if counter >= num_delimiters {\n  441 |                 // We should never over-count - assert that.\n  442 |                 assert_eq!(counter, num_delimiters);\n  443 |                 // After each iteration of the outer loop, the\n  444 |                 // cursor in the file is at the *beginning* of the\n  445 |                 // block, so seeking forward by `i + 1` bytes puts\n  446 |                 // us right after the found delimiter.\n  447 |                 file.seek(SeekFrom::Current((i + 1) as i64)).unwrap();\n  448 |                 return;\n  449 |             }\n  450 |         }\n  451 |     }","lines":39}]},{"id":"PANIC_34","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In test, the `-nt` and `-ot` file comparison operators call `f_a.modified().unwrap()` / `f_b.modified().unwrap()`. `Metadata::modified()` returns an error on platforms/filesystems that do not expose a modification time, which would panic instead of producing a clean error. The same pattern appears in `path()` for `-N` (`accessed().unwrap()` and `modified().unwrap()`).","fix":"Handle the `Err` case of `modified()`/`accessed()` gracefully (treat the comparison as false / unsupported) instead of unwrapping, or map it to a ParseError.","locations":[{"ref":"src/uu/test/src/test.rs:224-227","code":"  224 |         (Some(\"-nt\"), Ok(f_a), Ok(f_b)) => f_a.modified().unwrap() > f_b.modified().unwrap(),\n  225 |         (Some(\"-nt\"), Ok(_), _) => true,\n  226 |         (Some(\"-ot\"), Ok(f_a), Ok(f_b)) => f_a.modified().unwrap() < f_b.modified().unwrap(),\n  227 |         (Some(\"-ot\"), _, Ok(_)) => true,","lines":4},{"ref":"src/uu/test/src/test.rs:307-309","code":"  307 |         PathCondition::ExistsModifiedLastRead => {\n  308 |             metadata.accessed().unwrap() < metadata.modified().unwrap()\n  309 |         }","lines":3}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"tr `parse_octal_up_to_three_digits_with_warning` indexes `input[0..2]` and `input[2]` (and `char::from_u32(input[2]).unwrap()`) inside the warning branch. This relies on `input` having at least 3 bytes, which currently holds because the branch only fires after `recognize(many_m_n(1,3,...))` matched 3 octal digits, but the slicing is done on the original `input` rather than the recognized span, so the coupling is fragile and would panic if the parser combinator is ever refactored.","fix":"Use the recognized digit slice (the `out` argument already in scope is the matched bytes) for indexing/length checks instead of re-slicing the raw `input`, and use `.get(..)`/pattern matching rather than direct indexing.","locations":[{"ref":"src/uu/tr/src/operation.rs:402-424","code":"  402 |     fn parse_octal_up_to_three_digits_with_warning(input: &[u8]) -> IResult<&[u8], u8> {\n  403 |         map_opt(\n  404 |             recognize(many_m_n(1, 3, one_of(\"01234567\"))),\n  405 |             |out: &[u8]| {\n  406 |                 let str_to_parse = std::str::from_utf8(out).unwrap();\n  407 |                 let result = u8::from_str_radix(str_to_parse, 8).ok();\n  408 |                 if result.is_none() {\n  409 |                     if let Ok(origin_octal) = std::str::from_utf8(input) {\n  410 |                         let actual_octal_tail: &str = std::str::from_utf8(&input[0..2]).unwrap();\n  411 |                         let outstand_char: char = char::from_u32(input[2] as u32).unwrap();\n  412 |
