se leading\nop characters are already removed, a value like \"+04000\" has mode == \"04000\"\n(len 5) which is treated as >=5 (drops preserved bits) - intended - but a value\nwith internal whitespace or a different op offset could make len() not equal the\noctal-digit count. Relying on string length rather than the parsed numeric magnitude\nis brittle and can misclassify when the string has unusual but parseable form.","fix":"Base the 5-digit decision on the count of octal digits actually consumed, not the\nraw trimmed string length.","locations":[{"ref":"src/uucore/src/lib/features/mode.rs:13-33","code":"   13 | pub fn parse_numeric(fperm: u32, mut mode: &str, considering_dir: bool) -> Result<u32, String> {\n   14 |     let (op, pos) = parse_op(mode).map_or_else(|_| (None, 0), |(op, pos)| (Some(op), pos));\n   15 |     mode = mode[pos..].trim();\n   16 |     let change = if mode.is_empty() {\n   17 |         0\n   18 |     } else {\n   19 |         u32::from_str_radix(mode, 8).map_err(|e| e.to_string())?\n   20 |     };\n   21 |     if change > 0o7777 {\n   22 |         Err(format!(\"mode is too large ({change:o} > 7777)\"))\n   23 |     } else {\n   24 |         Ok(match op {\n   25 |             Some('+') => fperm | change,\n   26 |             Some('-') => fperm & !change,\n   27 |             // If this is a directory, we keep the setgid and setuid bits,\n   28 |             // unless the mode contains 5 or more octal digits or the mode is \"=\"\n   29 |             None if considering_dir && mode.len() < 5 => change | (fperm & (0o4000 | 0o2000)),\n   30 |             None | Some('=') => change,\n   31 |             Some(_) => unreachable!(),\n   32 |         })\n   33 |     }","lines":21}]},{"id":"LOGIC_123","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"determine_number_system / parse only support a \"0x\"/\"0X\" lowercase-prefix check via\n`size.starts_with(\"0x\")`, but the numeric extraction in parse() for Hexa _gid.to_string()),\n  771 |                             entries::uid2usr(dest_uid).unwrap_or_else(|_| dest_uid.to_string()),\n  772 |                             entries::gid2grp(dest_gid).unwrap_or_else(|_| dest_gid.to_string())\n  773 |                         )\n  774 |                     };\n  775 |                     show_error!(\"{output}\");\n  776 |                 }\n  777 |                 _ => (),\n  778 |             }\n  779 |         } else if self.verbosity.level == VerbosityLevel::Verbose {\n  780 |             let output = if self.verbosity.groups_only {\n  781 |                 format!(\n  782 |                     \"group of {} retained as {}\",\n  783 |                     path.quote(),\n  784 |                     entries::gid2grp(dest_gid).unwrap_or_default()\n  785 |                 )\n  786 |             } else {\n  787 |                 format!(\n  788 |                     \"ownership of {} retained as {}:{}\",\n  789 |                     path.quote(),\n  790 |                     entries::uid2usr(dest_uid).unwrap_or_else(|_| dest_uid.to_string()),\n  791 |                     entries::gid2grp(dest_gid).unwrap_or_else(|_| dest_gid.to_string())\n  792 |                 )\n  793 |             };\n  794 |             show_error!(\"{output}\");\n  795 |         }\n  796 |         0\n  797 |     }","lines":57}]},{"id":"LOGIC_126","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"configure_symlink_and_recursion: when not recursive, traverse_symlinks is forced to\nNone but `dereference` is left as the user/default value and the function returns\n`dereference.unwrap_or(true)`. For a non-recursive `-h`/`--no-dereference` chgrp on a\nsymlink this is fine, but the interaction `-R --dereference` requiring `-H`/`-L`\n(line 864-866) only errors when traverse_symlinks==None AND dereference==Some(true);\nif the user passes `-R -L --dereference` it is allowed (correct), but `-R -H\n--no-dereference` silently kee easy":true,"description":"`finalize_shell_quoter` mixes a bitwise OR with `&&`: `if must_quote | contains_quote_chars\n&& quotes != Quotes::None`. Rust precedence makes this `(must_quote | contains_quote_chars)\n&& (quotes != Quotes::None)`. Since `contains_quote_chars` is itself defined two lines above\nas `must_quote || bytes_start_with(...)`, the `must_quote |` term is fully redundant, and the\nuse of the bitwise `|` operator on bools (instead of `||`) is misleading. It happens to\nproduce the correct result today, but the expression is fragile and obscures intent.","fix":"Simplify to `if contains_quote_chars && quotes != Quotes::None` (the `must_quote` is already\nfolded into `contains_quote_chars`), and use logical `||`/`&&` consistently rather than `|`.","locations":[{"ref":"src/uucore/src/lib/features/quoting_style/shell_quoter.rs:231-233","code":"  231 |     let contains_quote_chars = must_quote || bytes_start_with(reference, SPECIAL_SHELL_CHARS_START);\n  232 | \n  233 |     if must_quote | contains_quote_chars && quotes != Quotes::None {","lines":3}]},{"id":"LOGIC_128","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"selinux_error_description walks only `error.source()` chains and never includes the\ntop-level error's own message - it starts by immediately calling error.source(), so\nthe description of the passed-in error is dropped and only its causes are recorded.\nFor an error with no source, the returned description is an empty string, producing\nempty SELinux error messages like \"Failed to set context: \".","fix":"Seed the description with `error.to_string()` (trimmed of the os-error suffix)\nbefore iterating sources, or append the final source's message when the chain is empty.","locations":[{"ref":"src/uucore/src/lib/features/selinux.rs:66-79","code":"   66 | pub fn selinux_error_description(mut error: &dyn Error) -> String {\n   67 |     let mut description = String::new();\n   68 |     while let Some(so d `seat` (lines 411-416), then later\nre-prefixes the seat with '?' via `format!(\"?{seat}\")` (lines 477, 494). The earlier stripping is therefore\npointless for seats whose systemd value legitimately starts with '?', and for a TTY that starts with '?'\nthe '?' is silently removed and never restored, changing the device name. Given systemd seat/tty values do\nnot normally start with '?', this stripping looks like dead/incorrect normalization that can corrupt unusual\nvalues.","fix":"Remove the unconditional '?' stripping (or document the exact systemd value it is meant to handle); rely on\nthe explicit formatting performed later when records are created.","locations":[{"ref":"src/uucore/src/lib/features/systemd_logind.rs:410-416","code":"  410 |         // Strip any existing prefixes from systemd values (if any)\n  411 |         if tty.starts_with('?') {\n  412 |             tty = tty[1..].to_string();\n  413 |         }\n  414 |         if seat.starts_with('?') {\n  415 |             seat = seat[1..].to_string();\n  416 |         }","lines":7}]},{"id":"LOGIC_131","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"system_time_to_sec encodes pre-epoch times ambiguously: for a time less than one second before UNIX_EPOCH it returns secs == 0 with a positive nsecs magnitude (e.g. -0.5s yields (0, 500000000)), losing the sign. The Float fallback in format_system_time only corrects the sign when secs < 0, so a sub-second negative timestamp prints as a positive value (\"0.500000000\" instead of \"-0.500000000\"). Only reachable via the out-of-jiff-range fallback path, hence low impact, but the (secs, nsecs) contract is broken for the (-1s, 0s) open interval.","fix":"Either return a signed nanosecond component, or document/handle the case where secs == 0 but the time is before the epoch (e.g. by normalizing to secs = -1, nsecs = 1e9 - frac when the original time < UNIX_EPOCH and the fractional part is non-zero).","locations":[{"ref":"src/uucore/src/lib/features/time.rs:29-37","code":"   29 | pub fn system_time_to_sec(time: SystemTime) -> (i64, u32) {\n   30 |     if time > UNIX_EPOCH {\n   31 |         let d = time.duration_since(UNIX_EPOCH).unwrap();\n   32 |         (d.as_secs() as i64, d.subsec_nanos())\n   33 |     } else {\n   34 |         let d = UNIX_EPOCH.duration_since(time).unwrap();\n   35 |         (-(d.as_secs() as i64), d.subsec_nanos())\n   36 |     }\n   37 | }","lines":9},{"ref":"src/uucore/src/lib/features/time.rs:77-83","code":"   77 |             FormatSystemTimeFallback::Float => {\n   78 |                 if secs < 0 && nsecs != 0 {\n   79 |                     secs -= 1;\n   80 |                     nsecs = 1_000_000_000 - nsecs;\n   81 |                 }\n   82 |                 out.write_fmt(format_args!(\"{secs}.{nsecs:09}\"))?;\n   83 |             }","lines":7}]},{"id":"LOGIC_132","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`chars2string!` builds the string with `*i as u8 as char`, mapping each `c_char` byte directly to a\n`char` codepoint (Latin-1 style), not decoding UTF-8. Any utmp field (user, host, tty, id) containing\nmultibyte UTF-8 will be mangled into mojibake instead of the correct characters. GNU `who`/`uptime`\noutput UTF-8 hostnames/usernames verbatim, so this diverges for non-ASCII data.","fix":"Collect the bytes up to the first NUL into a Vec<u8> and decode with `String::from_utf8_lossy` (or\n`OsStr`-based handling) instead of casting each byte to `char`.","locations":[{"ref":"src/uucore/src/lib/features/utmpx.rs:77-85","code":"   77 | // In case the c_char array doesn't end with NULL\n   78 | macro_rules! chars2string {\n   79 |     ($arr:expr) => {\n   80 |         $arr.iter()\n   81 |             .take_while(|i| **i > 0)\n   82 |             .map(|&i| i as u8 as char)\n   83 |             .collect::<String>()\n   84 |     };\n   85 | }","lines":9}]},{"id":"LOGIC_133","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`canon_host` returns the bare `hostname` (without re-attaching the `:display` suffix) when `getaddrinfo`\nfails (line 316-319), but returns the full original `host` (with suffix) when `getaddrinfo` succeeds yet\nyields no `canonname`. So for an input like \"host:0\", a DNS failure yields \"host\" while a DNS success with\nno canonical name yields \"host:0\". The display-suffix handling is inconsistent across the two non-canonical\npaths.","fix":"Make the fallback paths consistent: either always reattach `:display` or never do, matching GNU `who --lookup`\nbehavior for both the getaddrinfo-error and no-canonname cases.","locations":[{"ref":"src/uucore/src/lib/features/utmpx.rs:291-323","code":"  291 |     /// Canonicalize host name using DNS\n  292 |     pub fn canon_host(&self) -> IOResult<String> {\n  293 |         let host = self.host();\n  294 | \n  295 |         let (hostname, display) = host.split_once(':').unwrap_or((&host, \"\"));\n  296 | \n  297 |         if !hostname.is_empty() {\n  298 |             use dns_lookup::{AddrInfoHints, getaddrinfo};\n  299 | \n  300 |             const AI_CANONNAME: i32 = 0x2;\n  301 |             let hints = AddrInfoHints {\n  302 |                 flags: AI_CANONNAME,\n  303 |                 ..AddrInfoHints::default()\n  304 |             };\n  305 |             if let Ok(sockets) = getaddrinfo(Some(hostname), None, Some(hints)) {\n  306 |                 let sockets = sockets.collect::<IOResult<Vec<_>>>()?;\n  307 |                 for socket in sockets {\n  308 |                     if let Some(ai_canonname) = socket.canonname {\n  309 |                         return Ok(if display.is_empty() {\n  310 |                             ai_canonname\n  311 |                         } else {\n  312 |                             format!(\"{ai_canonname}:{display}\")\n  313 |                         });\n  314 |                     }\n  315 |                 }\n  316 |             } else {\n  317 |                 // GNU coreutils has this behavior\n  318 |                 return Ok(hostname.to_string());\n  319 |             }\n  320 |         }\n  321 | \n  322 |         Ok(host)\n  323 |     }","lines":33}]},{"id":"LOGIC_134","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the numeric phase of `version_cmp`, after the non-digit prefixes compare Equal, the code\nadvances `b` using `a`'s numeric-start index: `b = &b[a_numerical_start..];` (line 130). This\nrelies on the unstated invariant that equal non-digit prefixes implies\n`a_numerical_start == b_numerical_start`. The invariant holds today (equal prefixes have equal\nlength), but `b_numerical_start` is computed and then never used, which is a code smell and a\ntrap: any future change to `version_non_digit_cmp` that allows differing-length \"equal\"\nprefixes would silently mis-slice `b` (potential wrong ordering or out-of-bounds panic).","fix":"Use `b = &b[b_numerical_start..];` so each slice is advanced by its own computed index, or add\na `debug_assert_eq!(a_numerical_start, b_numerical_start)` to document and enforce the\ninvariant.","locations":[{"ref":"src/uucore/src/lib/features/version_cmp.rs:118-130","code":"  118 |         let a_numerical_start = a.iter().position(u8::is_ascii_digit).unwrap_or(a.len());\n  119 |         let b_numerical_start = b.iter().position(u8::is_ascii_digit).unwrap_or(b.len());\n  120 | \n  121 |         let a_str = &a[..a_numerical_start];\n  122 |         let b_str = &b[..b_numerical_start];\n  123 | \n  124 |         match version_non_digit_cmp(a_str, b_str) {\n  125 |             Ordering::Equal => {}\n  126 |             ord => return ord,\n  127 |         }\n  128 | \n  129 |         a = &a[a_numerical_start..];\n  130 |         b = &b[a_numerical_start..];","lines":13}]},{"id":"LOGIC_135","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`handle_mi                 // Print the missing arguments\n  270 |                 for line in lines.iter().skip(1) {\n  271 |                     if line.starts_with(\"  \") {\n  272 |                         let _ = writeln!(stderr(), \"{line}\");\n  273 |                     } else if line.starts_with(\"Usage:\") || line.starts_with(\"For more information\")\n  274 |                     {\n  275 |                         break;\n  276 |                     }\n  277 |                 }\n  278 |                 let _ = writeln!(stderr());\n  279 | \n  280 |                 // Print usage\n  281 |                 lines\n  282 |                     .iter()\n  283 |                     .skip_while(|line| !line.starts_with(\"Usage:\"))\n  284 |                     .for_each(|line| {\n  285 |                         if line.starts_with(\"For more information, try '--help'.\") {\n  286 |                             let _ = writeln!(stderr(), \"{}\", translate!(\"common-help-suggestion\"));\n  287 |                         } else {\n  288 |                             let _ = writeln!(stderr(), \"{line}\");\n  289 |                         }\n  290 |                     });\n  291 |             }\n  292 |             _ => eprint!(\"{}\", err.render()),\n  293 |         }","lines":44},{"ref":"src/uucore/src/lib/mods/clap_localization.rs:333-352","code":"  333 |     fn print_clap_tips(&self, err: &Error) {\n  334 |         let rendered_str = err.render().to_string();\n  335 |         for line in rendered_str.lines() {\n  336 |             let trimmed = line.trim_start();\n  337 |             if trimmed.starts_with(\"tip:\") && !line.contains(\"similar argument\") {\n  338 |                 let tip_word = translate!(\"common-tip\");\n  339 |                 if let Some(colon_pos) = trimmed.find(':') {\n  340 |                     let after_colon = &trimmed[colon_pos..];\n  341 |                     let _ = writeln!(\n  342 |                         stderr(),\n  343 |                         \"  {}{after_colon}\",\n  344 |                         self.color_mgr.colorize(&tip_word, Color::Green)\n  345 |                     );\n  346 |                 } else {\n  347 |                     let _ = writeln!(stderr(), \"{line}\");\n  348 |                 }\n  349 |                 let _ = writeln!(stderr());\n  350 |             }\n  351 |         }\n  352 |     }","lines":20}]},{"id":"LOGIC_136","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`create_english_bundle_from_embedded` decides whether to also load checksum_common strings\nwith `util_name.ends_with(\"sum\")`, whereas the filesystem path `create_bundle` uses an\nexplicit allow-list of the eight checksum utilities. The `ends_with(\"sum\")` heuristic will\nalso match unrelated future utilities whose names end in \"sum\" (and conceptually any util the\nuser names so), loading checksum strings into their bundle. The two code paths therefore use\ninconsistent logic for the same decision.","fix":"Share one predicate (e.g. a single `is_checksum_util(util_name)` helper using the explicit\nallow-list) between the embedded and filesystem bundle builders.","locations":[{"ref":"src/uucore/src/lib/mods/locale.rs:165-178","code":"  165 |     if [\n  166 |         \"cksum\",\n  167 |         \"b2sum\",\n  168 |         \"md5sum\",\n  169 |         \"sha1sum\",\n  170 |         \"sha224sum\",\n  171 |         \"sha256sum\",\n  172 |         \"sha384sum\",\n  173 |         \"sha512sum\",\n  174 |     ]\n  175 |     .contains(&util_name)\n  176 |     {\n  177 |         try_add_resource_from(get_locales_dir(\"checksum_common\").ok());\n  178 |     }","lines":14},{"ref":"src/uucore/src/lib/mods/locale.rs:286-291","code":"  286 |     if util_name.ends_with(\"sum\")\n  287 |         && let Some(uucore_content) = get_embedded_locale(\"checksum_common/en-US.ftl\")\n  288 |     {\n  289 |         let uucore_resource = parse_fluent_resource(uucore_content, &CHECKSUM_FLUENT)?;\n  290 |         bundle.add_resource_overriding(uucore_resource);\n  291 |     }","lines":6}]},{"id":"LOGIC_137","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"is_broken_pipe only inspects panic payloads that downcast to String, but std panics from broken-pipe I/O errors (e.g. unwrap() on an io::Result, or the default panic message produced by libstd flushing stdout) often carry a &'static str payload rather than a String. A &str payload (downcast_ref::<&str>()) is never checked, so some genuine BrokenPipe panics are not silenced by mute_sigpipe_panic, causing a spurious panic backtrace and a non-zero exit instead of clean termination. The doc example `seq inf | head -n 1` relies on this working.","fix":"Also attempt to downcast the payload to &'static str (and check that string), e.g. match both String and &str payloads: `if let Some(s) = info.payload().downcast_ref::<String>() { ... } else if let Some(s) = info.payload().downcast_ref::<&str>() { ... }` and apply the same contains() checks.","locations":[{"ref":"src/uucore/src/lib/mods/panic.rs:19-23","code":"   19 | fn is_broken_pipe(info: &PanicHookInfo) -> bool {\n   20 |     info.payload()\n   21 |         .downcast_ref::<String>()\n   22 |         .is_some_and(|res| res.contains(\"BrokenPipe\") || res.contains(\"Broken pipe\"))\n   23 | }","lines":5}]},{"id":"LOGIC_138","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In chroot `parse_group_list`, the heuristic for an invalid numeric group name (`trimmed_name.starts_with(char::is_numeric) && trimmed_name.ends_with(|c| !c.is_numeric())`) flags only names that start numeric and end non-numeric (e.g. \"0trail\"), but accepts mixed names like \"0tr8\" (ends in a digit) or \"1a2\" as valid group names, which GNU would treat as invalid. The code itself notes \"TODO Figure out a better condition here.\"","fix":"Use a stricter rule: if the name starts with a digit it 162 |                     low_idx = last;\n  163 |                     fields_pos = high + 1;\n  164 |                 } else {","lines":17}]},{"id":"LOGIC_140","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In `read_and_discard`, the initial reservation `buf.try_reserve(buf_size.min(n as usize))` casts the u64 `n` to usize. On 32-bit targets a `skip`/seek value larger than usize::MAX truncates, potentially reserving less than `buf_size`; the loop still works (it re-reads), but the capacity hint is wrong. Negligible on 64-bit.","fix":"Reserve `buf_size` directly (it is the cap on per-iteration reads) rather than min-ing with a possibly-truncated `n as usize`.","locations":[{"ref":"src/uu/dd/src/dd.rs:177-178","code":"  177 |     let mut buf = Vec::new();\n  178 |     buf.try_reserve(buf_size.min(n as usize))?; // try_with_capacity is unstable <https://github.com/rust-lang/rust/issues/91913>","lines":2}]},{"id":"LOGIC_141","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In `get_char_from_native_int` on Windows, `char::decode_utf16([ni;1]).next().unwrap()` is called on a single u16; a lone surrogate (0xD800-0xDFFF) yields a decode error which is mapped to None via `.ok()`, which is fine, but the outer `.unwrap()` on the iterator is safe only because the iterator always yields one item for a one-element input. This is correct but fragile; the same pattern on Unix uses single-byte UTF-8 which rejects continuation/multibyte leads via from_utf8 error -> None.","fix":"No behavioral change required; consider a comment clarifying that one input code unit always yields exactly one decode result, so the iterator `.unwrap()` cannot panic.","locations":[{"ref":"src/uu/env/src/native_int_str.rs:192-211","code":"  192 | pub fn get_char_from_native_int(ni: NativeCharInt) -> Option<(char, NativeCharInt)> {\n  193 |     let c_opt;\n  194 |     #[cfg(target_os = \"windows\")]\n  195 |     {\n  196 |         c_opt = char::decode_utf16([ni; 1]).next().unwrap().ok();\n  197 |     };\n  198 | \n  199 |     #[cfg(not(target_os = \"windows\"))]\n  200 |     {\n  201 |         c_opt = std::str::from_utf8(&[ni; 1])\n  202 |             .ok()\n  203 |             .map(|x| x.chars().next().unwrap());\n  204 |     };\n  205 | \n  206 |     if let Some(c) = c_opt {\n  207 |         return Some((c, ni));\n  208 |     }\n  209 | \n  210 |     None\n  211 | }","lines":20}]},{"id":"LOGIC_142","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"expr substr evaluation computes `length.checked_sub(1)` purely as a guard to reject length == 0 (returning the empty string), then discards the result and passes the original `length` to `locale_aware_substr`. This works but is non-obvious: the `Some(_)` binding is a length>=1 test in disguise. A future edit could mistakenly use the subtracted value.","fix":"Replace the `checked_sub(1)` guard with an explicit `pos >= 1 && length >= 1` check (using `pos - 1` for the 0-based start) to make the intent clear.","locations":[{"ref":"src/uu/expr/src/syntax_tree.rs:703-719","code":"  703 |                     let pos = pos?\n  704 |                         .eval_as_bigint()\n  705 |                         .ok()\n  706 |                         .and_then(|n| n.to_usize())\n  707 |                         .unwrap_or(0);\n  708 |                     let length = length?\n  709 |                         .eval_as_bigint()\n  710 |                         .ok()\n  711 |                         .and_then(|n| n.to_usize())\n  712 |                         .unwrap_or(0);\n  713 | \n  714 |                     if let (Some(pos), Some(_)) = (pos.checked_sub(1), length.checked_sub(1)) {\n  715 |                         let result = locale_aware_substr(string, pos, length);\n  716 |                         result_stack.insert(node.id, Ok(result.into()));\n  717 |                     } else {\n  718 |                         result_stack.insert(node.id, Ok(String::new().into()));\n  719 |                     }","lines":17}]},{"id":"LOGIC_143","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In logname, `get_userlogin` uses libc::getlogin() and converts via `String::from_utf8_lossy`, which replaces invalid bytes with U+FFFD. A login name with non-UTF-8 bytes would be printed lossily rather than verbatim, unlike most other utils here that use println_verbatim/OsString to preserve raw bytes. Minor, since login names are essentially always ASCII.","fix":"Preserve raw bytes by emitting the CStr bytes verbatim instead of lossy UTF-8 conversion, for consistency.","locations":[{"ref":"src/uu/logname/src/logname.rs:14-21","code":"   14 | fn get_userlogin() -> Option<String> {\n   15 |     let login_ptr = unsafe { libc::getlogin() };\n   16 |     if login_ptr.is_null() {\n   17 |         None\n   18 |     } else {\n   19 |         Some(String::from_utf8_lossy(unsafe { CStr::from_ptr(login_ptr) }.to_bytes()).to_string())\n   20 |     }\n   21 | }","lines":8}]},{"id":"LOGIC_144","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`reset_term` for the non-tty (pipe) case queues `Clear(ClearType::CurrentLine)` and writes `\\r` to\nstdout. When more's output is piped, emitting an ANSI clear-line escape sequence into the downstream\npipe is the kind of leak the `clear_line` helper was specifically written to avoid (it guards on\n`is_tty`). Here the pipe branch still writes the clear escape, contradicting that design intent.","fix":"In the non-tty branch of reset_term, avoid queuing the ANSI Clear sequence (only write `\\r`, or\nnothing), matching the leak-avoidance rationale documented on `clear_line`.","locations":[{"ref":"src/uu/more/src/more.rs:398-409","code":"  398 | fn reset_term() -> UResult<()> {\n  399 |     let mut stdout = stdout();\n  400 |     if stdout.is_tty() {\n  401 |         stdout.queue(Show)?.queue(LeaveAlternateScreen)?;\n  402 |         terminal::disable_raw_mode()?;\n  403 |     } else {\n  404 |         stdout.queue(Clear(ClearType::CurrentLine))?;\n  405 |         write!(stdout, \"\\r\")?;\n  406 |     }\n  407 |     stdout.flush()?;\n  408 |     Ok(())\n  409 | }","lines":12},{"ref":"src/uu/more/src/more.rs:512-519","code":"  512 |     /// Queue a line clear only when stdout is a tty; no-op otherwise so ANSI bytes\n  513 |     /// don't leak into downstream pipes.\n  514 |     fn clear_line(&mut self) -> std::io::Result<()> {\n  515 |         if self.stdout.is_tty() {\n  516 |             self.stdout.queue(Clear(ClearType::CurrentLine))?;\n  517 |         }\n  518 |         Ok(())\n  519 |     }","lines":8}]},{"id":"LOGIC_145","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In nproc, `OMP_NUM_THREADS` is split with `split_terminator(\\x27,\\x27).next()`; an empty string `OMP_NUM_THREADS=\"\"` yields `None` from `next()` and falls back to `available_parallelism()`, while `OMP_NUM_THREADS=\",\"` yields an empty first field that parses as Err and also falls back. This is consistent, but `OMP_NUM_THREADS=\"0,4\"` correctly rejects 0 and falls back rather than using 4; GNU behavior here is to take the first value as authoritative, so the fallback-on-zero is a minor divergence worth confirming against GNU.","fix":"Confirm against GNU nproc whether a leading 0 in OMP_NUM_THREADS should fall back to detection or be treated as an error/limit; adjust if divergent.","locations":[{"ref":"src/uu/nproc/src/nproc.rs:53-67","code":"   53 |         match env::var(\"OMP_NUM_THREADS\") {\n   54 |             // Uses the OpenMP variable to force the number of threads\n   55 |             // If the parsing fails, returns the number of CPU\n   56 |             Ok(threads) => {\n   57 |                 // In some cases, OMP_NUM_THREADS can be \"x,y,z\"\n   58 |                 // In this case, only take the first one (like GNU)\n   59 |                 // If OMP_NUM_THREADS=0, rejects the value\n   60 |                 match threads.split_terminator(',').next() {\n   61 |                     None => available_parallelism(),\n   62 |                     Some(s) => match s.trim().parse() {\n   63 |                         Ok(0) | Err(_) => available_parallelism(),\n   64 |                         Ok(n) => n,\n   65 |                     },\n   66 |                 }\n   67 |             }","lines":15}]},{"id":"LOGIC_146","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"parse_special_value lowercases the whole input with input.to_ascii_lowercase() and matches the\nprefix against the lowercase table, but then slices the ORIGINAL input with `&input[str.len()..]`\nto parse the suffix multiplier. This is correct only because the matched prefixes are pure ASCII\n(same byte length lowercase/uppercase); it is a latent coupling that would break if a non-ASCII\nor case-changing-length token were ever added to MATCH_TABLE. Worth a guard/comment.","fix":"Slice the lowercased copy (input_lc) for the remainder, or add an assertion/comment that table\nentries must be ASCII so prefix byte-lengths match between cases.","locations":[{"ref":"src/uucore/src/lib/features/parser/num_parser.rs:358-374","code":"  358 |     let input_lc = input.to_ascii_lowercase();\n  359 | \n  360 |     for (str, ebd) in MATCH_TABLE {\n  361 |         if input_lc.starts_with(str) {\n  362 |             let mut special = ebd.clone();\n  363 |             if negative {\n  364 |                 special = -special;\n  365 |             }\n  366 | \n  367 |             // \"infs\" is a valid duration, so parse suffix multiplier in the original input string, but ignore the multiplier.\n  368 |             let (_, rest) = parse_suffix_multiplier(&input[str.len()..], allowed_suffixes);\n  369 | \n  370 |             return if rest.is_emp `__stdbuf_get_stderr()` returns the `_stderr` field of the reentrant struct, but the code returns `(*__getreent())._stdin` instead. This is a copy-paste error: stderr buffering requests (`_STDBUF_E`) would be applied to the stdin stream rather than stderr, silently breaking `stdbuf -e ... cmd` on Cygwin and potentially mis-buffering stdin.","fix":"Return `(*__getreent())._stderr` in `__stdbuf_get_stderr()` for the cygwin branch.","locations":[{"ref":"src/uu/stdbuf/src/libstdbuf/src/libstdbuf.rs:189","code":"  189 |         unsafe { (*__getreent())._stdin }","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"In the macOS copy_on_write path, after calling clonefile via the dynamically resolved function pointer (error = pfn(...)), the code unconditionally inspects std::io::Error::last_os_error().kind() == AlreadyExists. last_os_error() reads the thread-global errno, which is only meaningful when pfn actually failed (returned -1). When pfn succeeds (error == 0) errno may hold a stale AlreadyExists value from an unrelated earlier syscall, causing the code to spuriously remove the destination file and re-clone, or to mis-handle the result. The errno check should be guarded by error != 0.","fix":"Only consult last_os_error() when the clonefile call failed, e.g. `if error != 0 && std::io::Error::last_os_error().kind() == AlreadyExists && source != dest { ... }`.","locations":[{"ref":"src/uu/cp/src/platform/macos.rs:66-93","code":"   66 |             error = pfn(src.as_ptr(), dst.as_ptr(), 0);\n   67 |             if std::io::Error::last_os_error().kind() == std::io::ErrorKind::AlreadyExists\n   68 |                 // Only remove the `dest` if the `source` and `dest` are not the same\n   69 |                 && source != dest\n   70 |             {\n   71 |                 // clonefile(2) fails if the destination exists.  Remove it and try again.  Do not\n   72 |                 // bother to check if removal worked because we're going to try to clone again.\n   73 |                 // first lets make sure the dest file is not read only.\n   74 |                 //\n   75 |                 // If dest is a symlink, GNU cp follows it and writes through to\n   76 |                 // the target rather than replacing the link itself. Removing\n   77 |                 // dest here would unlink the symlink and the retry would\n   78 |                 // clonefile a regular file in its place. Skip the retry — the\n   79 |                 // AlreadyExists error stays in `error` and we fall through to\n   80 |                 // fs::copy below, which follows the symlink via O_TRUNC.\n   81 |                 let dest_is_symlink =\n   82 |                     fs::symlink_metadata(dest).is_ok_and(|md| md.file_type().is_symlink());\n   83 |                 if !dest_is_symlink\n   84 |                     && fs::metadata(dest).is_ok_and(|md| !md.permissions().readonly())\n   85 |                 {\n   86 |                     // remove and copy again\n   87 |                     // TODO: rewrite this to better match linux behavior\n   88 |                     // linux first opens the source file and destination file then uses the file\n   89 |                     // descriptors to do the clone.\n   90 |                     let _ = fs::remove_file(dest);\n   91 |                     error = pfn(src.as_ptr(), dst.as_ptr(), 0);\n   92 |                 }\n   93 |             }","lines":28}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"The numfmt output writers call `writer.write_all(...).unwrap()` in many places even\nthough both functions return `Result<()>` precisely so I/O errors can be propagated.\nAny write failure (most commonly a broken pipe, e.g. `numfmt ... | head`) will panic\nthe process instead of producing a clean error/exit. GNU numfmt exits gracefully on a\nbroken pipe. Affected calls write the delimiter, formatted fields, unselected fields,\nthe inter-field space, and the EOL byte.","fix":"Replace each `write_all(...).unwrap()` with `write_all(...).map_err(|e| e.to_string())?`\n(or convert the functions to return `std::io::Result` and `?` the errors), so the error\nflows back up through `format_and_write`/`uumain` and is reported instead of panicking.","locations":[{"ref":"src/uu/numfmt/src/format.rs:803","code":"  803 |             writer.write_all(delimiter).unwrap();","lines":1},{"ref":"src/uu/numfmt/src/format.rs:812","code":"  812 |             writer.write_all(formatted.as_bytes()).unwrap();","lines":1},{"ref":"src/uu/numfmt/src/format.rs:815","code":"  815 |             writer.write_all(field).unwrap();","lines":1},{"ref":"src/uu/numfmt/src/format.rs:820","code":"  820 |         writer.write_all(&[eol]).unwrap();","lines":1},{"ref":"src/uu/numfmt/src/format.rs:843","code":"  843 |                 writer.write_all(b\" \").unwrap();","lines":1},{"ref":"src/uu/numfmt/src/format.rs:856","code":"  856 |             writer.write_all(formatted.as_bytes()).unwrap();","lines":1},{"ref":"src/uu/numfmt/src/format.rs:860","code":"  860 |                 writer.write_all(b\" \").unwrap();","lines":1},{"ref":"src/uu/numfmt/src/format.rs:866-867","code":"  866 |             writer.write_all(prefix.as_bytes()).unwrap();\n  867 |             writer.write_all(field.as_bytes()).unwrap();","lines":2},{"ref":"src/uu/numfmt/src/format.rs:872","code":"  872 |         writer.write_all(&[eol]).unwrap();","lines":1}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"rename_file_fallback (the cross-device / copy+delete path used by mv) maps every error from open_source, create_dest_restrictive, io::copy, set_permissions context and the final remove_file to the generic translated string \"mv-error-permission-denied\", discarding the real error kind/message. A failed copy due to ENOSPC, EIO, etc. is reported as \"permission denied\", which is misleading and can mask data-loss conditions (e.g. a partial copy followed by removal of the source).","fix":"Preserve the original io::Error message/context instead of overwriting it with a fixed \"permission denied\" string; only the kind that is genuinely a permission failure should use that message.","locations":[{"ref":"src/uu/mv/src/mv.rs:1262-1335","code":" 1262 | fn rename_file_fallback(\n 1263 |     from: &Path,\n 1264 |     to: &Path,\n 1265 |     #[cfg(unix)] hardlink_tracker: Option<&mut HardlinkTracker>,\n 1266 |     #[cfg(unix)] hardlink_scanner: Option<&HardlinkGroupScanner>,\n 1267 | ) -> io::Result<()> {\n 1268 |     // Remove existing target file if it exists\n 1269 |     if to.is_symlink() {\n 1270 |         fs::remove_file(to).map_err(|err| {\n 1271 |             let inter_device_msg = translate!(\"mv-error-inter-device-move-failed\", \"from\" => from.quote(), \"to\" => to.quote(), \"err\" => err);\n 1272 |             io::Error::new(err.kind(), inter_device_msg)\n 1273 |         })?;\n 1274 |     } else if to.exists() {\n 1275 |         // For non-symlinks, just remove the file without special error handling\n 1276 |         fs::remove_file(to)?;\n 1277 |     }\n 1278 | \n 1279 |     // Check if this file is part of a hardlink group and if so, create a hardlink instead of copying\n 1280 |     #[cfg(unix)]\n 1281 |     {\n 1282 |         if let (Some(tracker), Some(scanner)) = (hardlink_tracker, hardlink_scanner) {\n 1283 |             use crate::hardlink::HardlinkOptions;\n 1284 |             let hardlink_options = HardlinkOptions::default();\n 1285 |             if let Some(existing_target) =\n 1286 |                 tracker.check_hardlink(from, to, scanner, &hardlink_options)\n 1287 |             {\n 1288 |                 // Create a hardlink to the first moved file instead of copying\n 1289 |                 fs::hard_link(&existing_target, to)?;\n 1290 |                 fs::remove_file(from)?;\n 1291 |                 return Ok(());\n 1292 |             }\n 1293 |         }\n 1294 |     }\n 1295 | \n 1296 |     // Open src/dst with O_NOFOLLOW and keep the fds alive across copy,\n 1297 |     // chown, xattr, and chmod so a concurrent path-swap can't redirect any\n 1298 |     // step to a different inode.\n 1299 |     #[cfg(unix)]\n 1300 |     {\n 1301 |         use std::fs::Permissions;\n 1302 |         use std::os::unix::fs::{MetadataExt, PermissionsExt};\n 1303 |         use uucore::safe_copy::{create_dest_restrictive, open_source};\n 1304 |         let src_file = open_source(from, /* nofollow */ true)\n 1305 |             .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?;\n 1306 |         let src_mode = src_file\n 1307 |             .metadata()\n 1308 |             .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?\n 1309 |             .mode()\n 1310 |             & 0o7777;\n 1311 |         let mut dst_file = create_dest_restrictive(to, /* nofollow */ true)\n 1312 |             .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?;\n 1313 |         io::copy(&mut &src_file, &mut dst_file)\n 1314 |             .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?;\n 1315 | \n 1316 |         #[cfg(not(any(target_os = \"macos\", target_os = \"redox\")))]\n 1317 |         {\n 1318 |             let _ = fsxattr::copy_xattrs_fd_ignore_unsupported(&src_file, &dst_file);\n 1319 |         }\n 1320 | \n 1321 |         // chown before chmod: chown(2) clears setuid/setgid for non-root,\n 1322 |         // so the final mode must be applied last to preserve those bits.\n 1323 |         let _ = preserve_ownership(from, to);\n 1324 |         let _ = dst_file.set_permissions(Permissions::from_mode(src_mode));\n 1325 |     }\n 1326 | \n 1327 |     #[cfg(not(unix))]\n 1328 |     {\n 1329 |         fs::copy(from, to)\n 1330 |             .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?;\n 1331 |     }\n 1332 | \n 1333 |     fs::remove_file(from)\n 1334 |         .map_err(|err| io::Error::new(err.kind(), translate!(\"mv-error-permission-denied\")))?;\n 1335 |     Ok(())","lines":74}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"MultifileReader::read swallows all underlying I/O errors: on a read Err it prints \"I/O: {e}\", sets any_err, and breaks, then returns Ok(xfrd). The doc comment states \"Handles io errors itself, thus always returns OK\". Combined with the comment \"If any call returns short (< buf.len()), all subsequent calls will return Ok<0>\" this means a transient/recoverable error on one file silently truncates the entire concatenated stream and is only surfaced as an exit code via has_error(). A mid-file read error is indistinguishable from clean EOF to the decoder, so partial/incorrect output can be produced before the error code is reported.","fix":"Consider distinguishing recoverable from fatal errors, or at minimum ensure the loss of data on a mid-stream error is acceptable; document clearly that any read error aborts all remaining input. The current behavior is by design but the silent truncation is a sharp edge worth surfacing.","locations":[{"ref":"src/uu/od/src/multifile_reader.rs:107-142","code":"  107 | impl io::Read for MultifileReader<'_> {\n  108 |     /// Fill buf with bytes read from the list of files\n  109 |     /// Returns `Ok(<number of bytes read>)`\n  110 |     /// Handles io errors itself, thus always returns OK\n  111 |     /// Fills the provided buffer completely, unless it has run out of input.\n  112 |     /// If any call returns short (`< buf.len()`), all subsequent calls will return Ok<0>\n  113 |     fn read(&mut self, buf: &mut [u8]) -> io::Result<usize> {\n  114 |         let mut xfrd = 0;\n  115 |         // while buffer we are filling is not full.. May go through several files.\n  116 |         'fillloop: while xfrd < buf.len() {\n  117 |             match self.curr_file {\n  118 |                 None => break,\n  119 |                 Some(ref mut curr_file) => {\n  120 |                     loop {\n  121 |                         // stdin may return on 'return' (enter), even though the buffer isn't full.\n  122 |                         xfrd += match curr_file.read(&mut buf[xfrd..]) {\n  123 |                             Ok(0) => break,\n  124 |                             Ok(n) => n,\n  125 |                             Err(e) => {\n  126 |                                 show_error!(\"I/O: {e}\");\n  127 |                                 self.any_err = true;\n  128 |                                 break;\n  129 |                             }\n  130 |                         };\n  131 |                         if xfrd == buf.len() {\n  132 |                             // transferred all that was asked for.\n  133 |                             break 'fillloop;\n  134 |                         }\n  135 |                     }\n  136 |                 }\n  137 |             }\n  138 |             self.next_file();\n  139 |         }\n  140 |         Ok(xfrd)\n  141 |     }\n  142 | }","lines":36}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In strings mode (-S), the skip loop reads and discards bytes via the raw MultifileReader, but it treats any read error as EOF: `Err(_) => break`. Because MultifileReader::read never returns Err (it swallows I/O errors and sets any_err), the only way the inner read errors is impossible here, but more importantly an `Ok(0)` short-read caused by an underlying I/O error silently stops skipping and then the code proceeds to read/emit strings from a position that was not fully skipped. The error is never surfaced from the skip phase (only later reads check has_error). This diverges from the non-strings path which propagates skip-past-EOF as an UnexpectedEof error.","fix":"After the skip loop, check `mf.has_error()` and/or detect that `skipped < skip_bytes` (premature EOF) and return an error consistent with the PartialReader \"od-error-skip-past-end\" handling, instead of silently continuing.","locations":[{"ref":"src/uu/od/src/od.rs:588-598","code":"  588 |     // Apply skip_bytes by reading and discarding\n  589 |     let mut skipped = 0u64;\n  590 |     while skipped < skip_bytes {\n  591 |         let to_skip = cmp::min(8192, skip_bytes - skipped);\n  592 |         let mut skip_buf = vec![0u8; to_skip as usize];\n  593 |         match mf.read(&mut skip_buf) {\n  594 |             Ok(0) => break, // EOF reached\n  595 |             Ok(n) => skipped += n as u64,\n  596 |             Err(_) => break,\n  597 |         }\n  598 |     }","lines":11}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"paste opens all input files eagerly before producing any output: the loop in `paste()` calls `File::open(path)?` for every filename up front. A failure to open the Nth file aborts with `?` before any of the already-openable inputs are processed, and the error is the raw `std::io::Error` rather than a context-quoted message like the other utilities produce. GNU paste reports the per-file error (with the filename) and continues/handles streaming. Opening everything up front also defeats streaming for the multi-file case.","fix":"Open each file lazily as it is consumed, and wrap open errors with `.map_err_context(|| filename.maybe_quote().to_string())` so the offending filename is reported.","locations":[{"ref":"src/uu/paste/src/paste.rs:107-107","code":"  107 |             let file = File::open(path)?;","lines":1}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`check_child_success` treats both `Err(_)` from `child.wait()` and a `None`\nexit code (terminated by signal) as success via the\n`Ok(Some(0) | None) | Err(_)` match. A compression program that fails to be\nwaited on, or that is killed by a signal (e.g. SIGSEGV), is therefore reported\nas having succeeded, so corrupted/incomplete temp data can be silently used as\nif it were valid sorted output.","fix":"Only treat `Ok(Some(0))` as success. Map signal terminations (`Ok(None)`) and\nwait errors (`Err(_)`) to `CompressProgTerminatedAbnormally` (or a dedicated\nerror) so abnormal compressor exits abort the sort instead of being ignored.","locations":[{"ref":"src/uu/sort/src/merge.rs:404-413","code":"  404 | fn check_child_success(mut child: Child, program: &str) -> UResult<()> {\n  405 |     if matches!(child.wait().map(|e| e.code()), Ok(Some(0) | None) | Err(_)) {\n  406 |         Ok(())\n  407 |     } else {\n  408 |         Err(SortError::CompressProgTerminatedAbnormally {\n  409 |             prog: program.to_owned(),\n  410 |         }\n  411 |         .into())\n  412 |     }\n  413 | }","lines":10}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"get_input_size treats a finite input whose size is exactly equal to read_limit as \"could not determine size\". When `num_bytes == read_limit` for stdin (\"-\"), the function returns the \"cannot determine input size\" error even though the stream actually EOFed at exactly read_limit bytes (read_to_end returns once EOF is hit, and take() merely caps the maximum). A piped input whose total length happens to equal the block size limit is wrongly rejected.","fix":"Distinguish \"hit the limit but more data may remain\" from \"reached EOF exactly at the limit\". For example read up to read_limit+1, or after filling to read_limit attempt one more `read` and only error if it returns >0 bytes.","locations":[{"ref":"src/uu/split/src/split.rs:635-654","code":"  635 |     let num_bytes = reader\n  636 |         .by_ref()\n  637 |         .take(read_limit)\n  638 |         .read_to_end(buf)\n  639 |         .map(|n| n as u64)?;\n  640 | \n  641 |     if num_bytes < read_limit {\n  642 |         // Finite file or STDIN stream that fits entirely\n  643 |         // into a buffer within the limit\n  644 |         // Note: files like /dev/null or similar,\n  645 |         // empty STDIN stream,\n  646 |         // and files with true file size 0\n  647 |         // will also fit here\n  648 |         Ok(num_bytes)\n  649 |     } else if input == \"-\" {\n  650 |         // STDIN stream that did not fit all content into a buffer\n  651 |         // Most likely continuous/infinite input stream\n  652 |         Err(io::Error::other(\n  653 |             translate!(\"split-error-cannot-determine-input-size\", \"input\" => input.maybe_quote()),\n  654 |         ))","lines":20}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In touch::parse_date the ISO_8601 branch and the POSIX/other-format branches use TimeZone::UTC for the first set of formats but TimeZone::system() for the ISO 8601 (%Y-%m-%d) branch. This means a bare \"2023-05-10\" is interpreted in the local zone while \"2023-05-10 12:00:00\" is interpreted as UTC. The same logical date string yields timestamps that differ by the local UTC offset depending only on whether a time component is present, which is an inconsistent and surprising timezone semantics for -d.","fix":"Use a single consistent timezone interpretation (GNU touch -d uses local time) for all of these strtime fallback formats, or document and justify why the date-only form differs.","locations":[{"ref":"src/uu/touch/src/touch.rs:711-720","code":"  711 |     if let Ok(filetime) = strtime::parse(format::ISO_8601, s)\n  712 |         .and_then(|tm| tm.to_date())\n  713 |         .and_then(|date| {\n  714 |             TimeZone::system()\n  715 |                 .to_ambiguous_zoned(date.to_datetime(Time::midnight()))\n  716 |                 .unambiguous()\n  717 |         })\n  718 |         .map(|zdt| timestamp_to_filetime(zdt.timestamp()))\n  719 |     {\n  720 |         return Ok(filetime);","lines":10},{"ref":"src/uu/touch/src/touch.rs:685-689","code":"  685 |     if let Ok(parsed) = strtime::parse(format::POSIX_LOCALE, s)\n  686 |         .and_then(|tm| tm.to_datetime())\n  687 |         .and_then(|dt| TimeZone::UTC.to_zoned(dt))\n  688 |     {\n  689 |         return Ok(timestamp_to_filetime(parsed.timestamp()));","lines":5}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `process_checksum_file`, the per-line `FileNotFound` outcome is only counted as a failed open when\n`!opts.ignore_missing` (line 938). But the `total` counter is incremented for `FileNotFound` lines because\nthe first match arm (line 908-912) increments `total` for everything that is not `UError`/`Skipped`. With\n`--ignore-missing`, a checksum file consisting solely of lines whose files are missing yields\n`total_properly_formatted() > 0` and `correct == 0`, which then takes the `ignore_missing && correct == 0`\nbranch (line 965) and reports \"no file was verified\" + failure. That matches GNU, but a missing file under\n`--ignore-missing` still inflates `total`, so a file mixing one good line and many ignored-missing lines is\nfine, yet the bookkeeping (missing counted toward `total` but never toward `failed_open_file`) is fragile and\neasy to break. Worth a hard look / explicit test because the dual-match structure hides the coupling.","fix":"Handle the `FileNotFound` + `ignore_missing` case explicitly (e.g. treat it like `Skipped` so it does not\ncontribute to `total`), or add a comment/test pinning the intended counting semantics.","locations":[{"ref":"src/uucore/src/lib/features/checksum/validate.rs:906-941","code":"  906 |         // Match a first time to elude critical UErrors, and increment the total\n  907 |         // in all cases except on skipped.\n  908 |         match line_result {\n  909 |             Err(UError(e)) => return Err(e.into()),\n  910 |             Err(Skipped) => (),\n  911 |             _ => res.total += 1,\n  912 |         }\n  913 | \n  914 |         // Match a second time to update the right field of `res`.\n  915 |         match line_result {\n  916 |             Ok(()) => res.correct += 1,\n  917 |             Err(DigestMismatch) => res.failed_cksum += 1,\n  918 |             Err(ImproperlyFormatted) => {\n  919 |                 res.bad_format += 1;\n  920 | \n  921 |                 if opts.verbose.at_least_warning() {\n  922 |                     let algo = if let Some(algo_name_input) = cli_algo_kind {\n  923 |                         algo_name_input.to_uppercase()\n  924 |                     } else if let Some(algo) = &last_algo {\n  925 |                         algo.as_str()\n  926 |                     } else {\n  927 |                         \"Unknown algorithm\"\n  928 |                     };\n  929 |                     let _ = writeln!(\n  930 |                         stderr(),\n  931 |                         \"{}: {}\",\n  932 |                         util_name(),\n  933 |                         translate!(\"checksum-error-algo-bad-format\", \"file\" => filename_input.maybe_quote(), \"line\" => i + 1, \"algo\" => algo)\n  934 |                     );\n  935 |                 }\n  936 |             }\n  937 |             Err(CantOpenFile | FileIsDirectory) => res.failed_open_file += 1,\n  938 |             Err(FileNotFound) if !opts.ignore_missing => res.failed_open_file += 1,\n  939 |             _ => (),\n  940 |         }\n  941 |     }","lines":36}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"try_init_collator and init_collator call CollatorBorrowed::try_new(...).unwrap()/.expect on the ICU result. If ICU cannot construct a collator for the resolved locale (e.g. missing/unsupported collation data), the process panics. init_locale_collation feeds these with a locale derived from arbitrary user-controlled env vars (any UTF-8 locale), so a hostile or unusual LC_COLLATE could turn a graceful sort into a panic. This also contradicts the documented contract of locale_cmp ('Fall back to byte comparison if collator is not available'), which implies graceful degradation rather than an init-time panic.","fix":"Handle the try_new error instead of unwrapping: return false (no collator initialized) on Err so callers fall back to byte comparison, e.g. `match CollatorBorrowed::try_new(...) { Ok(c) => COLLATOR.set(c).is_ok(), Err(_) => false }`.","locations":[{"ref":"src/uucore/src/lib/features/i18n/collator.rs:20-31","code":"   20 | pub fn try_init_collator(opts: CollatorOptions) -> bool {\n   21 |     COLLATOR\n   22 |         .set(CollatorBorrowed::try_new(get_collating_locale().0.clone().into(), opts).unwrap())\n   23 |         .is_ok()\n   24 | }\n   25 | \n   26 | /// Will initialize the collator and panic if already initialized.\n   27 | pub fn init_collator(opts: CollatorOptions) {\n   28 |     COLLATOR\n   29 |         .set(CollatorBorrowed::try_new(get_collating_locale().0.clone().into(), opts).unwrap())\n   30 |         .expect(\"Collator already initialized\");\n   31 | }","lines":12}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In ChownExecutor::traverse, when the path is a directory on Linux and DirFd::open\nfails (e.g. permission denied opening the directory itself), the error arm returns\n`Ok(String::new())` and the directory chown is silently treated as success, with a\ncomment claiming safe_dive_into will report the error. But safe_dive_into calls\ntry_open_dir which opens with SymlinkBehavior::Follow and only reports if it also\nfails; if the directory is openable for reading but the *root* chown via fchown\nwould have failed, that root failure is masked. The net effect is the top-level\ndirectory's own ownership-change failure is never reported when DirFd::open errors\nyet later succeeds, diverging from the non-Linux path which reports via wrap_chown.","fix":"Distinguish \"cannot open dir\" (report and set ret=1) from \"dir opened, chown the\nfd\". Do not swallow DirFd::open errors as Ok; surface them like wrap_chown does.","locations":[{"ref":"src/uucore/src/lib/features/perms.rs:317-328","code":"  317 |             let chown_result = if meta.is_dir() {\n  318 |                 // For directories on Linux, use safe traversal from the start\n  319 |                 match DirFd::open(path, SymlinkBehavior::Follow) {\n  320 |                     Ok(dir_fd) => self\n  321 |                         .safe_chown_dir(&dir_fd, path, &meta)\n  322 |                         .map(|_| String::new()),\n  323 |                     Err(_e) => {\n  324 |                         // Don't show error here - let safe_dive_into handle directory traversal errors\n  325 |                         // This prevents duplicate error messages\n  326 |                         Ok(String::new())\n  327 |                     }\n  328 |                 }","lines":12}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`detect_system_locale` only consults the `LANG` environment variable. POSIX locale resolution\ngives precedence to `LC_ALL`, then the specific category (here `LC_MESSAGES` for translated\nprogram messages), and only then `LANG`. As a result, a user who sets `LC_ALL=fr_FR.UTF-8`\n(or `LC_MESSAGES`) but leaves `LANG` unset/`C` will get untranslated output, contrary to\nstandard locale behavior and to what GNU coreutils does. Note this is inconsistent with\n`get_time_locale`/`get_locale_from_env` elsewhere in the crate which read specific LC_*\nvariables.","fix":"Resolve the locale following POSIX precedence: check `LC_ALL`, then `LC_MESSAGES`, then `LANG`,\nfalling back to `DEFAULT_LOCALE`, before splitting off the `.<codeset>` suffix.","locations":[{"ref":"src/uucore/src/lib/mods/locale.rs:416-426","code":"  416 | fn detect_system_locale() -> Result<LanguageIdentifier, LocalizationError> {\n  417 |     let locale_str = std::env::var(\"LANG\")\n  418 |         .unwrap_or_else(|_| DEFAULT_LOCALE.to_string())\n  419 |         .split('.')\n  420 |         .next()\n  421 |         .unwrap_or(DEFAULT_LOCALE)\n  422 |         .to_string();\n  423 |     LanguageIdentifier::from_str(&locale_str).map_err(|_| {\n  424 |         LocalizationError::ParseLocale(format!(\"Failed to parse locale: {locale_str}\"))\n  425 |     })\n  426 | }","lines":11}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"uudoc's main() collects args via `uucore::args_os_filtered()`, which silently drops empty arguments. The dispatch then keys off `args.get(1)` as the subcommand. An invocation like `uudoc \"\" manpage cat` (empty first real arg) has its empty arg filtered out, shifting `manpage` into the argv[1] slot and changing which mode runs. For a documentation generator this is benign, but the filtering is an unexpected, undocumented argument-shifting behavior at the dispatch layer.","fix":"Use unfiltered `uucore::args_os()` for command dispatch in uudoc, or document that empty arguments are intentionally ignored.","locations":[{"ref":"src/bin/uudoc.rs:221","code":"  221 |     let args: Vec<OsString> = uucore::args_os_filtered().collect();","lines":1},{"ref":"src/bin/uudoc.rs:228-229","code":"  228 |     if args.len() > 1 {\n  229 |         let command = args.get(1).and_then(|s| s.to_str()).unwrap_or_default();","lines":2}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In copy_directory --parents fixup, `let dest = target.join(root.file_name().unwrap())`. root.file_name() is None for paths ending in `..` or `/`, causing a panic. Earlier code uses root.file_name().unwrap_or(root.as_os_str()) for the same root in the self-copy check (line 389), so the unwrap here is inconsistent and reachable.","fix":"Use the same unwrap_or(root.as_os_str()) fallback as line 389, or handle None explicitly.","locations":[{"ref":"src/uu/cp/src/copydir.rs:574-575","code":"  574 |     if options.parents {\n  575 |         let dest = target.join(root.file_name().unwrap());","lines":2}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"copy_socket binds a UnixListener at dest to \"copy\" a socket, but the listener is dropped immediately at end of function. Depending on platform, dropping the listener may not unlink the socket file (Rust does not unlink AF_UNIX paths on drop), but the resulting dest is a fresh listening socket inode rather than a faithful copy; more importantly any bind error is wrapped only as a bare io error without the source/dest context other copy paths provide.","fix":"Wrap the bind error with context (cp-error-cannot-create...) consistent with copy_fifo/copy_node; confirm the intended semantics of recreating a socket file.","locations":[{"ref":"src/uu/cp/src/cp.rs:2841-2849","code":" 2841 | fn copy_socket(dest: &Path, overwrite: OverwriteMode, debug: bool) -> CopyResult<()> {\n 2842 |     if dest.exists() {\n 2843 |         overwrite.verify(dest, debug)?;\n 2844 |         fs::remove_file(dest)?;\n 2845 |     }\n 2846 | \n 2847 |     UnixListener::bind(dest)?;\n 2848 |     Ok(())\n 2849 | }","lines":9}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `read_and_discard`, the EINTR branch `Err(e) if e.kind() == io::ErrorKind::Interrupted => {}` retries the read, but the surrounding `take(to_read)` adapter is recreated each loop iteration from `to_read = min(remaining, buf_size)`, which is correct; however on an interrupted `read_to_end` that already appended some bytes into `buf`, those bytes are discarded by the next `buf.clear()` without being counted, so an EINTR mid-read silently loses the partial count accounting (total under-reports). In practice read_to_end handles EINTR internally so this path is rarely hit, but the handling is still inconsistent.","fix":"On Interrupted, add the bytes already read into buf to `total`/decrement `remaining` (or rely solely on read_to_end which already retries EINTR and drop the explicit Interrupted arm).","locations":[{"ref":"src/uu/dd/src/dd.rs:181-193","code":"  181 |     while remaining > 0 {\n  182 |         let to_read = cmp::min(remaining, buf_size as u64);\n  183 |         buf.clear();\n  184 |         match reader.by_ref().take(to_read).read_to_end(&mut buf) {\n  185 |             Ok(0) => break, // EOF\n  186 |             Ok(bytes_read) => {\n  187 |                 total += bytes_read as u64;\n  188 |                 remaining -= bytes_read as u64;\n  189 |             }\n  190 |             Err(e) if e.kind() == io::ErrorKind::Interrupted => {}\n  191 |             Err(e) => return Err(e),\n  192 |         }\n  193 |     }","lines":13}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `Output::write` (Dest::File branch), the O_DIRECT fallback only triggers when `e.kind() == InvalidInput && e.raw_os_error() == Some(libc::EINVAL)`. `handle_o_direct_write` permanently leaves O_DIRECT cleared if `fcntl_setfl` to restore it fails (only logs a warning). Subsequent writes then proceed without O_DIRECT semantics silently. Also `f.write(buf)` in the retry is a single write that may be partial; the partial-write retry loop in `write_block` will then re-enter this path. The comment claims \"we will be safer\" by restoring, but a restore failure degrades behavior without surfacing an error.","fix":"Consider returning an error (or at least setting a nonzero exit code) when O_DIRECT cannot be restored, and document that the retry write may be partial so callers must not assume full-block semantics.","locations":[{"ref":"src/uu/dd/src/dd.rs:725-760","code":"  725 | fn handle_o_direct_write(f: &mut File, buf: &[u8], original_error: io::Error) -> io::Result<usize> {\n  726 |     use rustix::fs::{OFlags, fcntl_getfl, fcntl_setfl};\n  727 | \n  728 |     // Get current flags\n  729 |     let Ok(oflags) = fcntl_getfl(&*f) else {\n  730 |         return Err(original_error);\n  731 |     };\n  732 | \n  733 |     // If O_DIRECT is set, try removing it temporarily\n  734 |     if oflags.contains(OFlags::DIRECT) {\n  735 |         let flags_without_direct = oflags & !OFlags::DIRECT;\n  736 | \n  737 |         // Remove O_DIRECT flag\n  738 |         if fcntl_setfl(&*f, flags_without_direct).is_err() {\n  739 |             return Err(original_error);\n  740 |         }\n  741 | \n  742 |         // Retry the write without O_DIRECT\n  743 |         let write_result = f.write(buf);\n  744 | \n  745 |         // Restore O_DIRECT flag (GNU doesn't restore it, but we'll be safer)\n  746 |         // Log any restoration errors without failing the operation\n  747 |         if let Err(os_err) = fcntl_setfl(&*f, oflags) {\n  748 |             // Just log the error, don't fail the whole operation\n  749 |             show_error!(\n  750 |                 \"Failed to restore O_DIRECT flag: {}\",\n  751 |                 io::Error::from(os_err)\n  752 |             );\n  753 |         }\n  754 | \n  755 |         write_result\n  756 |     } else {\n  757 |         // O_DIRECT wasn't set, return original error\n  758 |         Err(original_error)\n  759 |     }\n  760 | }","lines":36},{"ref":"src/uu/dd/src/dd.rs:783-797","code":"  783 |             Self::File(f, _) => {\n  784 |                 // Try the write first\n  785 |                 match f.write(buf) {\n  786 |                     Ok(len) => Ok(len),\n  787 |                     Err(e)\n  788 |                         if e.kind() == io::ErrorKind::InvalidInput\n  789 |                             && e.raw_os_error() == Some(libc::EINVAL) =>\n  790 |                     {\n  791 |                         // This might be an O_DIRECT alignment issue.\n  792 |                         // Try removing O_DIRECT temporarily and retry.\n  793 |                         handle_o_direct_write(f, buf, e)\n  794 |                     }\n  795 |                     Err(e) => Err(e),\n  796 |                 }\n  797 |             }","lines":15}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the `count=0` early-exit path, `dd_copy` calls `flush_caches_full_length` but never installs the SIGUSR1 handler nor spawns the alarm, which is fine; however it returns via `finalize` which sends a Final ProgUpdate and joins the output thread. The progress thread for non-progress status levels is correct, but note the SIGUSR1 handler is only installed AFTER the count=0 check, so a `count=0` invocation cannot report status on SIGUSR1. This is a minor behavioral divergence rather than a crash.","fix":"If matching GNU behavior for SIGUSR1 on count=0 matters, install the handler before the early return; otherwise document the intentional difference.","locations":[{"ref":"src/uu/dd/src/dd.rs:1157-1190","code":" 1157 |     if let Some(Num::Blocks(0) | Num::Bytes(0)) = i.settings.count {\n 1158 |         // Even though we are not reading anything from the input\n 1159 |         // file, we still need to honor the `nocache` flag, which\n 1160 |         // requests that we inform the system that we no longer\n 1161 |         // need the contents of the input file in a system cache.\n 1162 |         //\n 1163 |         flush_caches_full_length(&i, &o);\n 1164 |         return finalize(\n 1165 |             BlockWriter::Unbuffered(o),\n 1166 |             rstat,\n 1167 |             wstat,\n 1168 |             start,\n 1169 |             &prog_tx,\n 1170 |             output_thread,\n 1171 |             truncate,\n 1172 |         );\n 1173 |     }\n 1174 | \n 1175 |     // Spawn a timer thread to provide a scheduled signal indicating when we\n 1176 |     // should send an update of our progress to the reporting thread.\n 1177 |     //\n 1178 |     // This avoids the need to query the OS monotonic clock for every block.\n 1179 |     let alarm = Alarm::with_interval(Duration::from_secs(1));\n 1180 | \n 1181 |     #[cfg(target_os = \"linux\")]\n 1182 |     if let Err(e) = install_sigusr1_handler()\n 1183 |         && i.settings.status != Some(StatusLevel::None)\n 1184 |     {\n 1185 |         let _ = writeln!(\n 1186 |             io::stderr(),\n 1187 |             \"{}\\n\\t{e}\",\n 1188 |             translate!(\"dd-warning-signal-handler\")\n 1189 |         );\n 1190 |     }","lines":34}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `dd_copy` the read path uses `read_helper(...)?` and the write path `o.write_blocks(&buf)?`, so an I/O error aborts the loop and is propagated, but the in-flight `rstat`/`wstat` accumulated for the current partial iteration are lost and never sent as a final ProgUpdate (the `?` returns before `finalize`). GNU dd reports the records transferred so far even on a fatal write error. Here an error returns from dd_copy without flushing final stats, so partial progress is not reported.","fix":"On read/write error, still send a Final ProgUpdate (or route through finalize) so records-in/records-out are reported before returning the error, matching GNU.","locations":[{"ref":"src/uu/dd/src/dd.rs:1228","code":" 1228 |         let rstat_update = read_helper(&mut i, &mut buf, loop_bsize)?;","lines":1},{"ref":"src/uu/dd/src/dd.rs:1238","code":" 1238 |         let wstat_update = o.write_blocks(&buf)?;","lines":1}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`StatPrinter::print_stat` uses `print_verbatim(&stat.path).unwrap()` for the path output.\nAn I/O failure on stdout (e.g. broken pipe when piping `du | head`) will panic the printing\nthread instead of terminating cleanly; the surrounding code already returns `UResult` and the\npreceding `format_system_time` call propagates errors with `?`, so the `unwrap` is inconsistent\nand can turn an ordinary EPIPE into a panic + \"printing thread panicked\" error.","fix":"Propagate the error with `?` (map the io::Error into a UError) instead of `unwrap`, consistent\nwith the other writes in the same function.","locations":[{"ref":"src/uu/du/src/du.rs:892","code":"  892 |         print_verbatim(&stat.path).unwrap();","lines":1}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In env `run_program`, the Unix exec path maps the `EACCES` errno to exit code 126 but maps every other non-ENOENT errno (the final `Err(_)` arm) also to 126 with a generic \"execvp failed\" message that drops the underlying errno detail. Errors such as ENOEXEC or ELOOP lose their specific cause, and the message is a fixed string rather than the actual OS error, hindering diagnosis.","fix":"Include the actual errno/`std::io::Error` text in the generic branch message instead of the hardcoded \"execvp failed\" literal.","locations":[{"ref":"src/uu/env/src/env.rs:853-862","code":"  853 |                 Err(_) => {\n  854 |                     uucore::show_error!(\n  855 |                         \"{}\",\n  856 |                         translate!(\n  857 |                             \"env-error-unknown\",\n  858 |                             \"error\" => \"execvp failed\"\n  859 |                         )\n  860 |                     );\n  861 |                     Err(126.into())\n  862 |                 }","lines":10}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`print_verbatim(file).unwrap()` in head's header printer will panic if writing the filename to\nstdout fails (e.g. broken pipe / EPIPE when output is piped to `head`-like consumers). Every other\nwrite in this loop uses `?` and is converted into a graceful `HeadError::Io`. The lone `.unwrap()`\non a stdout write turns a normal broken-pipe condition into a panic-abort.","fix":"Replace `.unwrap()` with `?` and let the surrounding closure return the `io::Error` (the closure already returns `UResult<()>`).","locations":[{"ref":"src/uu/head/src/head.rs:462-464","code":"  462 |                     write!(stdout, \"==> \")?;\n  463 |                     print_verbatim(file).unwrap();\n  464 |                     writeln!(stdout, \" <==\")?;","lines":3}]},{"id":"ERR_24","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `id`, `entries::get_groups_gnu(Some(gid))?` propagates an I/O error with `?` from the middle\nof the per-user loop. If fetching supplementary groups fails for one specified user, the whole\ncommand aborts immediately, skipping any remaining users, instead of reporting the failure for\nthat user and continuing (the established pattern elsewhere in this loop, e.g. unknown user,\nwhich does `set_exit_code(1); continue;`).","fix":"Handle the error per-user: on failure, emit an error, `set_exit_code(1)`, and continue to the\nnext user rather than returning early with `?`.","locations":[{"ref":"src/uu/id/src/id.rs:318","code":"  318 |         let groups = entries::get_groups_gnu(Some(gid))?;","lines":1}]},{"id":"ERR_25","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In PathData::metadata, when metadata cannot be obtained the code locks and flushes the raw stdout (`stdout().lock(); out.flush();`) to order the error before buffered output. But the actual buffered listing is written through the separate `ListState::out` BufWriter, which is not flushed here. Flushing the raw stdout lock does nothing for the BufWriter`s pending bytes, so the error message can still appear out of order relative to already-buffered listing output. The code itself flags this as a FIXME.","fix":"Plumb the output sink (or its BufWriter) into the metadata lazy-init path so the real buffer is flushed before `show!`, or defer/collect the error and emit it from the caller that owns the BufWriter.","locations":[{"ref":"src/uu/ls/src/ls.rs:924-944","code":"  924 |                     Err(err) => {\n  925 |                         // FIXME: A bit tricky to propagate the result here\n  926 |                         let mut out: std::io::StdoutLock<'static> = stdout().lock();\n  927 |                         let _ = out.flush();\n  928 |                         let errno = err.raw_os_error().unwrap_or(1i32);\n  929 |                         // a bad fd will throw an error when dereferenced,\n  930 |                         // but GNU will not throw an error until a bad fd \"dir\"\n  931 |                         // is entered, here we match that GNU behavior, by handing\n  932 |                         // back the non-dereferenced metadata upon an EBADF\n  933 |                         if self.must_dereference && errno == 9i32 {\n  934 |                             if let Ok(file) = self.path().read_link() {\n  935 |                                 return file.symlink_metadata().ok();\n  936 |                             }\n  937 |                         }\n  938 |                         show!(LsError::
