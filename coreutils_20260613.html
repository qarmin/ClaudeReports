rget_os = \"linux\", target_os = \"android\")))]\n   66 |             {\n   67 |                 let set_security_context = matches.get_flag(options::SECURITY_CONTEXT);\n   68 |                 let context = matches.get_one::<String>(options::CONTEXT);\n   69 | \n   70 |                 if set_security_context || context.is_some() {\n   71 |                     use std::path::Path;\n   72 |                     if let Err(e) =\n   73 |                         uucore::selinux::set_selinux_security_context(Path::new(&f), context)\n   74 |                     {\n   75 |                         let _ = std::fs::remove_file(f);\n   76 |                         return Err(USimpleError::new(1, e.to_string()));\n   77 |                     }\n   78 |                 }\n   79 |             }\n   80 | \n   81 |             // Apply SMACK context if requested\n   82 |             #[cfg(all(feature = \"smack\", target_os = \"linux\"))]\n   83 |             {\n   84 |                 let set_security_context = matches.get_flag(options::SECURITY_CONTEXT);\n   85 |                 let context = matches.get_one::<String>(options::CONTEXT);\n   86 |                 if set_security_context || context.is_some() {\n   87 |                     uucore::smack::set_smack_label_and_cleanup(&f, context, |p| {\n   88 |                         std::fs::remove_file(p)\n   89 |                     })?;\n   90 |                 }\n   91 |             }\n   92 |         }\n   93 |     }","lines":46}]},{"id":"ERR_27","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In ptx `get_config`, when an invalid `--sentence-regexp` is given, `Regex::new(&regex)` is only checked for the empty-match case; if the regex fails to compile the `Ok(re)` arm is skipped and the invalid regex is stored anyway. Later in `read_input`, `Regex::new(re_str).ok()` silently turns the compile failure into `None`, so a bad sentence regex is silently ignored rather than reported as an error.","fix":"Return a usage error when the sentence regex fails to compile, instead of swallowing the error with `.ok()`.","locations":[{"ref":"src/uu/ptx/src/ptx.rs:214-227","code":"  214 |     if let Some(regex) = matches.remove_one::<String>(options::SENTENCE_REGEXP) {\n  215 |         // TODO: The regex crate used here is not fully compatible with GNU's regex implementation.\n  216 |         // For example, it does not support backreferences.\n  217 |         // In the future, we might want to switch to the onig crate (like expr does) for better compatibility.\n  218 | \n  219 |         // Verify regex is valid and doesn't match empty string\n  220 |         if let Ok(re) = Regex::new(&regex) {\n  221 |             if re.is_match(\"\") {\n  222 |                 return Err(USimpleError::new(1, translate!(\"ptx-error-empty-regexp\")));\n  223 |             }\n  224 |         }\n  225 | \n  226 |         config.sentence_regex = Some(regex);\n  227 |     }","lines":14},{"ref":"src/uu/ptx/src/ptx.rs:288-291","code":"  288 |     let sentence_splitter = config\n  289 |         .sentence_regex\n  290 |         .as_ref()\n  291 |         .and_then(|re_str| Regex::new(re_str).ok());","lines":4}]},{"id":"ERR_28","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In ptx `create_word_set`, if either the word regex or the context regex fails to compile, the function returns an empty `BTreeSet` (`return BTreeSet::new()`) and the program then produces no output and exits successfully, silently hiding an invalid regex supplied via `--word-regexp`. A user-supplied invalid regex should be a hard error.","fix":"Propagate a UResult error when regex compilation fails rather than returning an empty set.","locations":[{"ref":"src/uu/ptx/src/ptx.rs:340-345","code":"  340 |     let Some(reg) = Regex::new(&filter.word_regex).ok() else {\n  341 |         return BTreeSet::new();\n  342 |     };\n  343 |     let Some(ref_reg) = Regex::new(&config.context_regex).ok() else {\n  344 |         return BTreeSet::new();\n  345 |     };","lines":6}]},{"id":"ERR_29","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"shred `get_size` calls `std::process::exit(1)` on an invalid `--size` value instead of returning a UError. This aborts the whole process even when multiple files are supplied and bypasses the normal error-reporting path; an in-code TODO acknowledges this.","fix":"Return `UResult<Option<u64>>` from `get_size` and propagate the error up through `uumain` so it is reported via the standard error machinery.","locations":[{"ref":"src/uu/shred/src/shred.rs:405-420","code":"  405 | fn get_size(size_str_opt: Option<String>) -> Option<u64> {\n  406 |     size_str_opt\n  407 |         .as_ref()\n  408 |         .and_then(|size| parse_size_u64(size.as_str()).ok())\n  409 |         .or_else(|| {\n  410 |             if let Some(size) = size_str_opt {\n  411 |                 show_error!(\n  412 |                     \"{}\",\n  413 |                     translate!(\"shred-invalid-file-size\", \"size\" => size.quote())\n  414 |                 );\n  415 |                 // TODO: replace with our error management\n  416 |                 std::process::exit(1);\n  417 |             }\n  418 |             None\n  419 |         })\n  420 | }","lines":16}]},{"id":"ERR_30","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"copy() maps any `ErrorKind::Other` from the chunk writer to a generic USimpleError, relying on the writer using ErrorKind::Other to signal \"suffixes exhausted\". This couples the suffix-exhaustion path to a non-specific error kind: any unrelated `Error::other(...)` produced deeper in the writer stack (e.g. the would-overwrite-input check, unable-to-open-file, unable-to-reopen-file - all created via Error::other) is also caught here and reported with code 1 but without the io-error wrapper/context, conflating distinct failures. The TODO comment acknowledges the fragility.","fix":"Use a dedicated sentinel (custom error type or a distinguishable wrapper) for suffix exhaustion rather than overloading ErrorKind::Other.","locations":[{"ref":"src/uu/split/src/split.rs:1586-1604","code":" 1586 | fn copy(reader: &mut impl Read, writer: &mut impl Write) -> UResult<()> {\n 1587 |     match io::copy(reader, writer) {\n 1588 |         Ok(_) => Ok(()),\n 1589 |         // TODO Since the writer object controls the creation of\n 1590 |         // new files, we need to rely on the `io::Result`\n 1591 |         // returned by its `write()` method to communicate any\n 1592 |         // errors to this calling scope. If a new file cannot be\n 1593 |         // created because we have exceeded the number of\n 1594 |         // allowable filenames, we use `ErrorKind::Other` to\n 1595 |         // indicate that. A special error message needs to be\n 1596 |         // printed in that case.\n 1597 |         Err(e) if e.kind() == ErrorKind::Other => Err(USimpleError::new(1, format!(\"{e}\"))),\n 1598 |         Err(e) => Err(uio_error!(\n 1599 |             e,\n 1600 |             \"{}\",\n 1601 |             translate!(\"split-error-input-output-error\")\n 1602 |         )),\n 1603 |     }\n 1604 | }","lines":19}]},{"id":"ERR_31","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In stdbuf `uumain`, the spawn/exec error mapping uses a wildcard `_ => USimpleError::new(1, ...)`. GNU stdbuf returns 125 for its own failures and 126/127 for the command. Mapping miscellaneous exec errors to exit code 1 (rather than 126 \"cannot invoke\") diverges from GNU and from the other tools in this group, which use 126 for generic exec failures.","fix":"Map the fallback exec error to exit code 126 (\"cannot invoke\") to match GNU stdbuf and the sibling utilities.","locations":[{"ref":"src/uu/stdbuf/src/stdbuf.rs:235-239","code":"  235 |         _ => Err(USimpleError::new(\n  236 |             1,\n  237 |             translate!(\"stdbuf-error-failed-to-execute\", \"error\" => e),\n  238 |         )),\n  239 |     }","lines":5}]},{"id":"ERR_32","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the settings parser, an unrecognized token that happens to parse as a saved-state string is\naccepted, but if `parse_saved_state` returns `None` the code falls through the `if let Some(state)`\ninto the control-char / baud / flag / combo chain. That is intended, but note the saved-state branch\nsilently swallows malformed-but-colon-containing tokens: any token with the wrong number of colon\nparts is not reported as \"invalid saved state\", it is reinterpreted as a (likely invalid) flag,\nproducing a confusing \"invalid argument\" error rather than a saved-state-specific diagnostic. This is\nan error-message-quality issue versus GNU.","fix":"Distinguish \"looks like a saved state but is malformed\" (contains ':') from \"ordinary token\" so a\nclearer error can be emitted, matching GNU's behavior for invalid saved states.","locations":[{"ref":"src/uu/stty/src/stty.rs:363-416","code":"  363 |                 _ => {\n  364 |                     // Try to parse saved format (hex string like \"6d02:5:4bf:8a3b:...\")\n  365 |                     if let Some(state) = parse_saved_state(arg) {\n  366 |                         valid_args.push(ArgOptions::SavedState(state));\n  367 |                     }\n  368 |                     // control char\n  369 |                     else if let Some(char_index) = cc_to_index(arg) {\n  370 |                         if let Some(mapping) = args_iter.next() {\n  371 |                             let cc_mapping = string_to_control_char(mapping).map_err(|e| {\n  372 |                                 let message = match e {\n  373 |                                     ControlCharMappingError::IntOutOfRange(val) => {\n  374 |                                         translate!(\n  375 |                                             \"stty-error-invalid-integer-argument-value-too-large\",\n  376 |                                             \"value\" => format!(\"'{val}'\")\n  377 |                                         )\n  378 |                                     }\n  379 |                                     ControlCharMappingError::MultipleChars(val) => {\n  380 |                                         translate!(\n  381 |                                             \"stty-error-invalid-integer-argument\",\n  382 |                                             \"value\" => format!(\"'{val}'\")\n  383 |                                         )\n  384 |                                     }\n  385 |                                 };\n  386 |                                 UUsageError::new(1, message)\n  387 |                             })?;\n  388 |                             valid_args.push(ArgOptions::Mapping((char_index, cc_mapping)));\n  389 |                         } else {\n  390 |                             return missing_arg(arg);\n  391 |                         }\n  392 |                     // baud rate\n  393 |                     } else if let Some(baud_flag) = string_to_baud(arg, flags::BaudType::Both) {\n  394 |                         valid_args.push(ArgOptions::Flags(baud_flag));\n  395 |                     // non control char flag\n  396 |                     } else if let Some(flag) = string_to_flag(arg) {\n  397 |                         let remove_group = match flag {\n  398 |                             AllFlags::Baud(_, _) => false,\n  399 |                             AllFlags::ControlFlags((flag, remove)) => {\n  400 |                                 check_flag_group(flag, remove)\n  401 |                             }\n  402 |                             AllFlags::InputFlags((flag, remove)) => check_flag_group(flag, remove),\n  403 |                             AllFlags::LocalFlags((flag, remove)) => check_flag_group(flag, remove),\n  404 |                             AllFlags::OutputFlags((flag, remove)) => check_flag_group(flag, remove),\n  405 |                         };\n  406 |                         if remove_group {\n  407 |                             return invalid_arg(arg);\n  408 |                         }\n  409 |                         valid_args.push(flag.into());\n  410 |                     // combination setting\n  411 |                     } else if let Some(combo) = string_to_combo(arg) {\n  412 |                         valid_args.append(&mut combo_to_flags(combo));\n  413 |                     } else {\n  414 |                         return invalid_arg(arg);\n  415 |                     }\n  416 |                 }","lines":54},{"ref":"src/uu/stty/src/stty.rs:521-547","code":"  521 | fn parse_saved_state(arg: &str) -> Option<Vec<u32>> {\n  522 |     let parts: Vec<&str> = arg.split(':').collect();\n  523 |     let expected_parts = 4 + nix::libc::NCCS;\n  524 | \n  525 |     // GNU requires exactly the right number of parts for this platform\n  526 |     if parts.len() != expected_parts {\n  527 |         return None;\n  528 |     }\n  529 | \n  530 |     // Validate all parts are non-empty valid hex\n  531 |     let mut values = Vec::with_capacity(expected_parts);\n  532 |     for (i, part) in parts.iter().enumerate() {\n  533 |         if part.is_empty() {\n  534 |             return None; // GNU rejects empty hex values\n  535 |         }\n  536 |         let val = u32::from_str_radix(part, 16).ok()?;\n  537 | \n  538 |         // Control characters (indices 4+) must fit in u8\n  539 |         if i >= 4 && val > 255 {\n  540 |             return None;\n  541 |         }\n  542 | \n  543 |         values.push(val);\n  544 |     }\n  545 | \n  546 |     Some(values)\n  547 | }","lines":27}]},{"id":"ERR_33","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`forwards_thru_file` is called in `bounded_tail` with `.unwrap()` (tail.rs:469), turning any read\nerror while scanning forward for `+N` line mode into a panic-abort. `bounded_tail` returns\n`UResult<()>` and could propagate the error. The seek that follows is also unwrapped (line 470).\nThis contradicts the careful error propagation elsewhere in `tail_file`.","fix":"Propagate with `?` instead of `.unwrap()` on `forwards_thru_file` and `seek` in `bounded_tail`.","locations":[{"ref":"src/uu/tail/src/tail.rs:468-471","code":"  468 |         FilterMode::Lines(Signum::Positive(count), delimiter) if count > &1 => {\n  469 |             let i = forwards_thru_file(file, *count - 1, *delimiter).unwrap();\n  470 |             file.seek(SeekFrom::Start(i as u64)).unwrap();\n  471 |         }","lines":4}]},{"id":"ERR_34","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In timeout `wait_or_kill_process`, the final `Err(_)` arm of `process.wait_or_timeout` maps any wait error to `ExitStatus::CommandTimedOut` (124). An error while waiting for the child is not a timeout; GNU returns 125 (TimeoutFailed) for internal failures. The same questionable mapping appears in the docstring (\"if there is an error while waiting ... then 124 is returned\").","fix":"Return `ExitStatus::TimeoutFailed` (125) for the wait-error case to distinguish an internal failure from a genuine timeout, and update the docstring.","locations":[{"ref":"src/uu/timeout/src/timeout.rs:328-329","code":"  328 |         Err(_) => Ok(ExitStatus::CommandTimedOut.into()),\n  329 |     }","lines":2}]},{"id":"ERR_35","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In touch::touch the Source::Now Linux branch sets atime=mtime=UTIME_NOW only when opts.date.is_none(). When a date IS given, it uses Timestamp::now() and then parse_date offsets from that. But filetime_to_zoned(&atime) is called on the UTIME_NOW sentinel only in the no-date case (where the date block is skipped), so it is fine; however if opts.date is Some and the Now branch produced a real timestamp, both atime and mtime are the same now value, and parse_date is applied independently to each, doubling the relative-date parse cost. Minor duplicate work, not a correctness bug.","fix":"When atime == mtime and date is Some, parse the date once and reuse the result for both.","locations":[{"ref":"src/uu/touch/src/touch.rs:390-395","code":"  390 |             {\n  391 |                 if opts.date.is_none() {\n  392 |                     now = FileTime::from_unix_time(0, libc::UTIME_NOW as u32);\n  393 |                 } else {\n  394 |                     now = timestamp_to_filetime(Timestamp::now());\n  395 |                 }","lines":6}]},{"id":"ERR_36","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"try_futimens_via_write_fd opens the file write-only and on success returns Ok, on any error returns Err and the caller silently falls back to set_file_times. This means real errors (e.g. EACCES on the FD open for a file the user can stat but not open write) are masked: the open failure is discarded and the slower path is taken, which may then succeed or fail with a different error message. The fast path swallows the original errno.","fix":"Only fall back to set_file_times for the specific errors that justify it (e.g. ENOSYS, EISDIR, ETXTBSY, open-for-write not permitted); propagate other errors instead of silently retrying.","locations":[{"ref":"src/uu/touch/src/touch.rs:626-644","code":"  626 | fn try_futimens_via_write_fd(path: &Path, atime: FileTime, mtime: FileTime) -> std::io::Result<()> {\n  627 |     let file = OpenOptions::new()\n  628 |         .write(true)\n  629 |         // Avoid blocking on special files (e.g. FIFOs) before we can inspect metadata.\n  630 |         .custom_flags(O_NONBLOCK)\n  631 |         .open(path)?;\n  632 | \n  633 |     let timestamps = Timestamps {\n  634 |         last_access: rustix::fs::Timespec {\n  635 |             tv_sec: atime.unix_seconds(),\n  636 |             tv_nsec: atime.nanoseconds() as _,\n  637 |         },\n  638 |         last_modification: rustix::fs::Timespec {\n  639 |             tv_sec: mtime.unix_seconds(),\n  640 |             tv_nsec: mtime.nanoseconds() as _,\n  641 |         },\n  642 |     };\n  643 | \n  644 |     futimens(&file, &timestamps).map_err(|e| Error::from_raw_os_error(e.raw_os_error()))","lines":19}]},{"id":"ERR_37","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In truncate, file_truncate swallows all metadata() errors with `Err(_) => 0` (line 223). When the file exists but stat fails for a non-NotFound reason (e.g. EACCES on the path, EOVERFLOW), the code silently treats the file size as 0. For relative modes this yields a wrong target size (e.g. `truncate -s +10` on an unreadable existing file would size it to 10 rather than report the stat error). GNU truncate reports the stat failure.","fix":"Match on the error kind: only treat ErrorKind::NotFound as size 0 (relevant when creating a new file); propagate other errors via map_err_context.","locations":[{"ref":"src/uu/truncate/src/truncate.rs:202-224","code":"  202 | fn file_truncate(\n  203 |     no_create: bool,\n  204 |     reference_size: Option<u64>,\n  205 |     mode: &TruncateMode,\n  206 |     filename: &OsString,\n  207 | ) -> UResult<()> {\n  208 |     let path = Path::new(filename);\n  209 | \n  210 |     // Get the length of the file.\n  211 |     let file_size = match metadata(path) {\n  212 |         Ok(metadata) => {\n  213 |             // A pipe has no length. Do this check here to avoid duplicate `stat()` syscall.\n  214 |             #[cfg(unix)]\n  215 |             if metadata.file_type().is_fifo() {\n  216 |                 return Err(USimpleError::new(\n  217 |                     1,\n  218 |                     translate!(\"truncate-error-cannot-open-no-device\", \"filename\" => filename.to_string_lossy().quote()),\n  219 |                 ));\n  220 |             }\n  221 |             metadata.len()\n  222 |         }\n  223 |         Err(_) => 0,\n  224 |     };","lines":23}]},{"id":"ERR_38","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In wc(), when print_stats fails for a single input (e.g. broken pipe), the code shows the error and then `return Ok(())`, abandoning all remaining inputs and skipping the total line, yet exiting with success unless set_exit_code was set elsewhere. A transient write error on one file silently drops the rest of the work.","fix":"Either propagate a non-zero exit code on print failure, or continue with the next input rather than returning Ok(()) early.","locations":[{"ref":"src/uu/wc/src/wc.rs:987-991","code":"  987 |             if let Err(err) = print_stats(settings, &word_count, maybe_title_str, number_width) {\n  988 |                 let title = maybe_title_str.unwrap_or(OsStr::new(\"<stdin>\"));\n  989 |                 show!(err.map_err_context(|| translate!(\"wc-error-failed-to-print-result\", \"title\" => title.to_string_lossy())));\n  990 |                 return Ok(());\n  991 |             }","lines":5}]},{"id":"ERR_39","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"extract_value treats every ExtendedParserError::PartialMatch that starts with a quote as a\nsuccess: it calls set_exit_code(0) and only emits a warning. But set_exit_code(0) unconditionally\n*overwrites* any exit code a previous argument may have already set to 1 (e.g. a prior NotNumeric\narg in the same printf invocation). The reset to 0 should not clobber an existing error code.","fix":"Do not call set_exit_code(0) here. A character-constant-with-trailing-junk is a warning only;\nleave the exit code untouched so an earlier genuine error (exit code 1) is preserved.","locations":[{"ref":"src/uucore/src/lib/features/format/argument.rs:226-237","code":"  226 |                 ExtendedParserError::PartialMatch(v, rest) => {\n  227 |                     if quote_start {\n  228 |                         set_exit_code(0);\n  229 |                         show_warning!(\n  230 |                             \"{rest}: character(s) following character constant have been ignored\"\n  231 |                         );\n  232 |                     } else {\n  233 |                         show_error!(\"{}: value not completely converted\", input.quote());\n  234 |                     }\n  235 | \n  236 |                     v\n  237 |                 }","lines":12}]},{"id":"ERR_40","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In Spec::write for EscapedString (%b), when a parsed escape char returns ControlFlow::Break (the\n`\\c` end marker), the code only `break`s out of the inner loop and continues processing the rest of\nthe format string. The TODO at line 398-399 notes this \"should break the entire execution of\nprintf\". As-is, `printf '%b after' 'x\\cy'` will still print \" after\", diverging from GNU which\nstops all output at `\\c`.","fix":"Propagate the Break out of Spec::write (e.g. return a ControlFlow to FormatItem::write/printf_writer)\nso `\\c` terminates the whole printf run, matching GNU behavior.","locations":[{"ref":"src/uucore/src/lib/features/format/spec.rs:394-403","code":"  394 |                 for c in parse_escape_only(bytes, OctalParsing::ThreeDigits) {\n  395 |                     match c.write(&mut parsed)? {\n  396 |                         ControlFlow::Continue(()) => {}\n  397 |                         ControlFlow::Break(()) => {\n  398 |                             // TODO: This should break the _entire execution_ of printf\n  399 |                             break;\n  400 |                         }\n  401 |                     }\n  402 |                 }\n  403 |                 writer.write_all(&parsed).map_err(FormatError::IoError)","lines":10}]},{"id":"ERR_41","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"read_fs_list on Windows can spin in an infinite loop. When a volume name fails the\n`starts_with(\"\\\\\\\\?\\\\\") || ends_with('\\\\')` validation, it `continue`s the loop\nWITHOUT calling FindNextVolumeW first, so volume_name_buf is never advanced and the\nsame bad volume is re-validated forever (also re-emitting the warning endlessly).","fix":"On the bad-path branch, call FindNextVolumeW (and break on ERROR_NO_MORE_FILES)\nbefore continuing, or restructure the loop so the advance always happens.","locations":[{"ref":"src/uucore/src/lib/features/fsext.rs:509-517","code":"  509 |         loop {\n  510 |             let volume_name = LPWSTR2String(&volume_name_buf);\n  511 |             if !volume_name.starts_with(\"\\\\\\\\?\\\\\") || !volume_name.ends_with('\\\\') {\n  512 |                 show_warning!(\"A bad path was skipped: {volume_name}\");\n  513 |                 continue;\n  514 |             }\n  515 |             if let Some(m) = MountInfo::new(volume_name) {\n  516 |                 mounts.push(m);\n  517 |             }","lines":9}]},{"id":"ERR_42","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Both separator lookups call `icu_decimal::provider::Baked.load(request).unwrap()`. For an unusual/unsupported numeric locale the load can fail, panicking the process during number formatting instead of degrading (e.g. to the 'und'/default separators). The locale originates from user-controlled LC_NUMERIC/LANG.","fix":"Fall back to the default/und locale (or '.'/'') on load error rather than unwrapping, so number formatting never panics on an exotic locale.","locations":[{"ref":"src/uucore/src/lib/features/i18n/decimal.rs:23-24","code":"   23 |     let response: DataResponse<DecimalSymbolsV1> =\n   24 |         icu_decimal::provider::Baked.load(request).unwrap();","lines":2},{"ref":"src/uucore/src/lib/features/i18n/decimal.rs:49-50","code":"   49 |     let response: DataResponse<DecimalSymbolsV1> =\n   50 |         icu_decimal::provider::Baked.load(request).unwrap();","lines":2}]},{"id":"ERR_43","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"send_signal_group temporarily installs SigHandler::SigIgn, sends the signal to the process group, then restores the previous handler with `let _ = unsafe { signal(...) }`, silently discarding any error from the restore. If restoring the original disposition fails, the process is left ignoring that signal permanently with no indication, which can mask later signal-delivery bugs in long-running utilities (timeout, etc.).","fix":"At minimum log/propagate the restore failure; ideally use an RAII guard that restores the handler on drop so the restore happens even on early return/panic.","locations":[{"ref":"src/uucore/src/lib/features/process.rs:129-134","code":"  129 |         let old_handler = unsafe { nix_signal::signal(signal, SigHandler::SigIgn) }\n  130 |             .map_err(|e| io::Error::from_raw_os_error(e as i32))?;\n  131 |         let result = nix_signal::kill(Pid::from_raw(0), Some(signal));\n  132 |         // Restore the old handler\n  133 |         let _ = unsafe { nix_signal::signal(signal, old_handler) };\n  134 |         result.map_err(|e| io::Error::from_raw_os_error(e as i32))","lines":6}]},{"id":"ERR_44","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"preserve_security_context's doc comment says \"If SELinux is not enabled ... the\nfunction returns success without making any changes\", but the implementation returns\n`Err(SeLinuxError::SELinuxNotEnabled)` when SELinux is disabled. The comment directly\ncontradicts the code, and the function name/return contract is misleading for callers\nthat copied the documented behavior.","fix":"Either return Ok(()) when SELinux is disabled (matching the doc) or fix the doc\ncomment to state it errors with SELinuxNotEnabled.","locations":[{"ref":"src/uucore/src/lib/features/selinux.rs:322-342","code":"  322 | ///\n  323 | /// * `Ok(())` - If the context was successfully preserved or if SELinux is not enabled.\n  324 | /// * `Err(SeLinuxError)` - If an error occurred during context retrieval or application.\n  325 | ///\n  326 | /// # Examples\n  327 | ///\n  328 | /// ```\n  329 | /// use std::path::Path;\n  330 | /// use uucore::selinux::preserve_security_context;\n  331 | ///\n  332 | /// // Preserve the SELinux context from source to destination\n  333 | /// match preserve_security_context(Path::new(\"/path/to/source\"), Path::new(\"/path/to/destination\")) {\n  334 | ///     Ok(_) => println!(\"Context preserved successfully (or SELinux is not enabled)\"),\n  335 | ///     Err(err) => eprintln!(\"Failed to preserve context: {err}\"),\n  336 | /// }\n  337 | /// ```\n  338 | pub fn preserve_security_context(from_path: &Path, to_path: &Path) -> Result<(), SeLinuxError> {\n  339 |     // If SELinux is not enabled, return success without doing anything\n  340 |     if !is_selinux_enabled() {\n  341 |         return Err(SeLinuxError::SELinuxNotEnabled);\n  342 |     }","lines":21}]},{"id":"ERR_45","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`iter_all_records_from` does `CString::new(path.as_ref().as_os_str().as_bytes()).unwrap()`. A path\ncontaining an interior NUL byte makes `CString::new` return `Err`, so this `.unwrap()` panics. Paths are\nuser-controllable (e.g. `who <file>`), so a crafted argument with an embedded NUL crashes the utility\ninstead of producing the \"pray\"/no-error behavior the surrounding comment promises.","fix":"Handle the `CString::new` error gracefully (return an empty iterator or skip the `utmpxname` call) instead\nof unwrapping.","locations":[{"ref":"src/uucore/src/lib/features/utmpx.rs:367-393","code":"  367 |     pub fn iter_all_records_from<P: AsRef<Path>>(path: P) -> UtmpxIter {\n  368 |         #[cfg(feature = \"feat_systemd_logind\")]\n  369 |         {\n  370 |             // Use systemd-logind for default utmp file when feature is enabled\n  371 |             if path.as_ref() == Path::new(DEFAULT_FILE) {\n  372 |                 return UtmpxIter::new_systemd();\n  373 |             }\n  374 |         }\n  375 | \n  376 |         let iter = UtmpxIter::new();\n  377 |         let path = CString::new(path.as_ref().as_os_str().as_bytes()).unwrap();\n  378 |         unsafe {\n  379 |             // In glibc, utmpxname() only fails if there's not enough memory\n  380 |             // to copy the string.\n  381 |             // Solaris returns 1 on success instead of 0. Supposedly there also\n  382 |             // exist systems where it returns void.\n  383 |             // GNU who on Debian seems to output nothing if an invalid filename\n  384 |             // is specified, no warning or anything.\n  385 |             // So this function is pretty crazy and we don't try to detect errors.\n  386 |             // Not much we can do besides pray.\n  387 |             #[cfg_attr(target_env = \"musl\", allow(deprecated))]\n  388 |             utmpxname(path.as_ptr());\n  389 |             #[cfg_attr(target_env = \"musl\", allow(deprecated))]\n  390 |             setutxent();\n  391 |         }\n  392 |         iter\n  393 |     }","lines":27}]},{"id":"ERR_46","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`read_os_string_lines` converts each byte line with `os_string_from_vec(bl).expect(\"UTF-8\nerror\")`. On non-Unix/non-WASI platforms `os_string_from_vec` returns `Err` for invalid UTF-8,\nso this `.expect` will panic on input that contains non-UTF-8 bytes, despite the surrounding\nAPI (`read_byte_lines`) being explicitly designed to avoid panicking on non-UTF-8 input. The\ndoc comment even claims it \"won't panic on non UTF-8 characters on Unix, but it still will on\nWindows\" - so the panic is acknowledged but it is still a hard crash on otherwise-valid file\ncontents on Windows.","fix":"Propagate the conversion error as an `io::Error` (map the `UError` into\n`io::ErrorKind::InvalidData`) instead of `.expect`, so callers can handle non-UTF-8 lines on\nnon-Unix platforms gracefully.","locations":[{"ref":"src/uucore/src/lib/lib.rs:563-568","code":"  563 | pub fn read_os_string_lines<R: std::io::Read>(\n  564 |     buf_reader: BufReader<R>,\n  565 | ) -> impl Iterator<Item = std::io::Result<OsString>> {\n  566 |     read_byte_lines(buf_reader)\n  567 |         .map(|byte_line_res| byte_line_res.map(|bl| os_string_from_vec(bl).expect(\"UTF-8 error\")))\n  568 | }","lines":6}]},{"id":"ERR_47","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"In install copy_file, when removing a pre-existing destination fails for a reason other than NotFound, the error is only printed via show_error! and execution continues to create_new(true).open(to), which will then fail with AlreadyExists and produce a second, less clear error. The first message references the removal failure but the install still proceeds, leading to a confusing two-error sequence.","fix":"Return the removal error (or skip the create attempt) when remove_file fails with something other than NotFound, instead of falling through to create_new.","locations":[{"ref":"src/uu/install/src/install.rs:963-1002","code":"  963 | fn copy_file(from: &Path, to: &Path) -> UResult<()> {\n  964 |     use std::os::unix::fs::OpenOptionsExt;\n  965 |     if let Ok(to_abs) = to.canonicalize()\n  966 |         && from.canonicalize()? == to_abs\n  967 |     {\n  968 |         return Err(InstallError::SameFile(from.to_path_buf(), to.to_path_buf()).into());\n  969 |     }\n  970 | \n  971 |     if to.is_dir() && !from.is_dir() {\n  972 |         return Err(InstallError::OverrideDirectoryFailed(\n  973 |             to.to_path_buf().clone(),\n  974 |             from.to_path_buf().clone(),\n  975 |         )\n  976 |         .into());\n  977 |     }\n  978 | \n  979 |     // Remove existing file (create_new below provides TOCTOU protection)\n  980 |     if let Err(e) = fs::remove_file(to)\n  981 |         && e.kind() != std::io::ErrorKind::NotFound\n  982 |     {\n  983 |         show_error!(\n  984 |             \"{}\",\n  985 |             translate!(\"install-error-failed-to-remove\", \"path\" => to.quote(), \"error\" => format!(\"{e:?}\"))\n  986 |         );\n  987 |     }\n  988 | \n  989 |     let mut handle = File::open(from)?;\n  990 |     // create_new provides TOCTOU protection\n  991 |     let mut dest = OpenOptions::new()\n  992 |         .write(true)\n  993 |         .create_new(true)\n  994 |         .mode(0o600)\n  995 |         .open(to)?;\n  996 | \n  997 |     copy_stream(&mut handle, &mut dest).map_err(|err| {\n  998 |         InstallError::InstallFailed(from.to_path_buf(), to.to_path_buf(), err.to_string())\n  999 |     })?;\n 1000 | \n 1001 |     Ok(())\n 1002 | }","lines":40}]},{"id":"ERR_48","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"In nohup, after `libc::signal(SIGHUP, SIG_IGN)` the return value is discarded with no check. If SIG_IGN installation fails (returns SIG_ERR), nohup proceeds to exec the child without actually ignoring SIGHUP, defeating its sole purpose, without any diagnostic.","fix":"Check the return of `libc::signal` against `SIG_ERR` and emit a warning (or fail) if installing the SIGHUP ignore handler did not succeed.","locations":[{"ref":"src/uu/nohup/src/nohup.rs:81","code":"   81 |     unsafe { libc::signal(libc::SIGHUP, libc::SIG_IGN) };","lines":1}]},{"id":"ERR_49","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`Output::into_write` truncates an existing output file with\n`let _ = file.set_len(0);`, discarding any error. If truncation fails (e.g. the\nfile became read-only between open and write), stale trailing bytes from a\nprevious longer file can remain after the freshly written sorted content,\nproducing silently corrupt output.","fix":"Propagate the `set_len(0)` error (return `UResult`) or at least `show_error!`\nthe failure rather than ignoring it, so a failed truncate does not yield\ncorrupt output.","locations":[{"ref":"src/uu/sort/src/sort.rs:252-260","code":"  252 |     fn into_write(self) -> BufWriter<Box<dyn Write>> {\n  253 |         BufWriter::new(match self.file {\n  254 |             Some((_name, file)) => {\n  255 |                 // truncate the file\n  256 |                 let _ = file.set_len(0);\n  257 |                 Box::new(file)\n  258 |             }\n  259 |             None => Box::new(stdout()),\n  260 |         })","lines":9}]},{"id":"ERR_50","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"Benchmark helpers pervasively use .unwrap() on File::create/write_all/sync_all/create_dir/set_permissions. Acceptable in bench-only code, but create_test_file does an extra File::open(&file_path).unwrap().sync_all() after already flushing and dropping the BufWriter; the reopen+sync_all is redundant with the writer's drop on most platforms and adds an unnecessary syscall round-trip. The comment \"Ensure data is fully written to disk\" overstates what flush() (which does not fsync) guarantees, so the reopen is the only real durability step but is awkwardly placed.","fix":"Call file.sync_all() (or writer.get_ref().sync_all()) directly via the original handle before drop instead of reopening; or keep the BufWriter, flush, then sync_all on the inner File, avoiding a second open.","locations":[{"ref":"src/uucore/src/lib/features/benchmark.rs:23-26","code":"   23 |     writer.flush().unwrap();\n   24 |     // Ensure data is fully written to disk before returning\n   25 |     drop(writer);\n   26 |     File::open(&file_path).unwrap().sync_all().unwrap();","lines":4}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`Source::stdin_as_file` does `File::from_raw_fd(io::stdin().as_raw_fd())`, taking ownership of fd 0 via `FromRawFd`. When this `File` (held inside `Source::StdinFile`) is dropped it will `close(0)`, closing the process stdin file descriptor even though `io::Stdin` does not own it being closed here. This is the classic double-ownership-of-fd hazard; subsequent code/libraries expecting fd 0 open could misbehave. dd typically runs to process exit so it is usually benign, but it is unsound fd ownership.","fix":"Use `BorrowedFd`/`try_clone_to_owned()` (as the windows path does with as_handle().try_clone_to_owned()) or wrap in `ManuallyDrop`/`std::mem::forget` semantics so the borrowed stdin fd is not closed by File::drop.","locations":[{"ref":"src/uu/dd/src/dd.rs:227-232","code":"  227 |     #[cfg(unix)]\n  228 |     fn stdin_as_file() -> Self {\n  229 |         let fd = io::stdin().as_raw_fd();\n  230 |         let f = unsafe { File::from_raw_fd(fd) };\n  231 |         Self::StdinFile(f)\n  232 |     }","lines":6}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"RingBuffer uses VecDeque::with_capacity(size) and then enforces its size limit via self.data.capacity() in push_back. The std contract for with_capacity only guarantees room for AT LEAST `size` elements; the allocator is free to return a larger capacity. If it ever does, the ring buffer will silently hold MORE than `size` elements before it starts evicting, breaking the documented fixed-size / last-N semantics (e.g. tail -n). It happens to be exact for small sizes on the current allocator, so this is a latent correctness bug rather than a guaranteed one.","fix":"Store the requested size in a dedicated field (e.g. `size: usize`) and compare self.data.len() against that stored size instead of self.data.capacity(). Keep with_capacity only as an allocation hint.","locations":[{"ref":"src/uucore/src/lib/features/ringbuffer.rs:50-53","code":"   50 |     pub fn new(size: usize) -> Self {\n   51 |         Self {\n   52 |             data: VecDeque::with_capacity(size),\n   53 |         }","lines":4},{"ref":"src/uucore/src/lib/features/ringbuffer.rs:98-109","code":"   98 |     pub fn push_back(&mut self, value: T) -> Option<T> {\n   99 |         if self.data.capacity() == 0 {\n  100 |             return Some(value);\n  101 |         }\n  102 |         let result = if self.data.len() == self.data.capacity() {\n  103 |             self.data.pop_front()\n  104 |         } else {\n  105 |             None\n  106 |         };\n  107 |         self.data.push_back(value);\n  108 |         result\n  109 |     }","lines":12}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"get_locale_format_string calls setlocale(LC_TIME, \"\") and nl_langinfo, then caches the result in a process-wide OnceLock (DEFAULT_FORMAT_CACHE) via Box::leak. setlocale is process-global and not thread-safe; outside tests there is no synchronization (the LOCALE_MUTEX is #[cfg(test)] only). If another thread calls any locale function concurrently during the first get_locale_default_format call, this is a data race. The leaked &'static str also permanently leaks one allocation per process (acceptable once, but it is a deliberate leak).","fix":"Document the single-call-at-startup assumption, or guard the setlocale/nl_langinfo sequence with a non-test mutex; the leak is acceptable given OnceLock but should be noted.","locations":[{"ref":"src/uu/date/src/locale.rs:67-89","code":"   67 |     fn get_locale_format_string() -> Option<String> {\n   68 |         // In tests, acquire mutex to prevent race conditions with setlocale()\n   69 |         // which is process-global and not thread-safe\n   70 |         #[cfg(test)]\n   71 |         let _lock = LOCALE_MUTEX.lock().unwrap();\n   72 | \n   73 |         unsafe {\n   74 |             // Set locale from environment variables\n   75 |             libc::setlocale(libc::LC_TIME, c\"\".as_ptr());\n   76 | \n   77 |             // Get the date/time format string\n   78 |             let d_t_fmt_ptr = libc::nl_langinfo(DATE_FMT);\n   79 |             if d_t_fmt_ptr.is_null() {\n   80 |                 return None;\n   81 |             }\n   82 | \n   83 |             let format = CStr::from_ptr(d_t_fmt_ptr).to_str().ok()?;\n   84 |             if format.is_empty() {\n   85 |                 return None;\n   86 |             }\n   87 | \n   88 |             Some(format.to_string())\n   89 |         }","lines":23},{"ref":"src/uu/date/src/locale.rs:46-46","code":"   46 |     static LOCALE_MUTEX: Mutex<()> = Mutex::new(());","lines":1}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`read_files_from` uses `uucore::os_str_from_bytes(&path).unwrap()`. While the input bytes come\nfrom a file split on NUL and on Unix any byte sequence is a valid `OsStr`, on platforms where\n`os_str_from_bytes` can fail (non-Unix WTF-8 validation) a malformed `--files0-from` file would\npanic instead of reporting an error.","fix":"Handle the error case from `os_str_from_bytes` (skip the entry with a diagnostic and set exit\ncode 1) rather than unwrapping.","locations":[{"ref":"src/uu/du/src/du.rs:941","code":"  941 |             let p = PathBuf::from(&*uucore::os_str_from_bytes(&path).unwrap());","lines":1}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In `kill()` the dispatch builds `named` once for all pids, but for `sig == 0` it relies on rustix `test_kill_*` to merely check permission/existence. For a process group target (`pid < 0`) with a realtime signal that rustix's `Signal::from_named_raw` rejects, `named` is `None` and the code falls back to `raw_kill(-pid, sig)`. That is correct, but `raw_kill` is also used for the `pid == 0` (current process group) and group cases by passing a negated pid to `libc::kill`; passing `0` to `libc::kill` (the current process group case, `raw_kill(0, sig)`) sends to the caller's own process group, which is intended, but there is no guard preventing a realtime signal value larger than `i32::MAX as usize` other than the `try_from` in raw_kill - acceptable, but the realtime fallback path is untested and easy to break.","fix":"Add explicit tests for the realtime-signal fallback (named == None) across pid==0, pid>0 and pid<0, and consider centralizing the \"named vs raw\" decision into a single helper to avoid divergence between the three Ordering arms.","locations":[{"ref":"src/uu/kill/src/kill.rs:260-302","code":"  260 | fn kill(sig: usize, pids: &[i32]) {\n  261 |     // Standard named signals use rustix's typed API; anything its safe\n  262 |     // constructor doesn't recognize (realtime/reserved) falls back to libc.\n  263 |     let named = (sig != 0)\n  264 |         .then(|| i32::try_from(sig).ok().and_then(Signal::from_named_raw))\n  265 |         .flatten();\n  266 |     for &pid in pids {\n  267 |         let result = match pid.cmp(&0) {\n  268 |             Ordering::Equal => match named {\n  269 |                 _ if sig == 0 => rustix_to_io(test_kill_current_process_group()),\n  270 |                 Some(s) => rustix_to_io(kill_current_process_group(s)),\n  271 |                 None => raw_kill(0, sig),\n  272 |             },\n  273 |             Ordering::Greater => {\n  274 |                 let pid = Pid::from_raw(pid).expect(\"pid > 0 guaranteed by Ordering::Greater\");\n  275 |                 match named {\n  276 |                     _ if sig == 0 => rustix_to_io(test_kill_process(pid)),\n  277 |                     Some(s) => rustix_to_io(kill_process(pid, s)),\n  278 |                     None => raw_kill(pid.as_raw_nonzero().get(), sig),\n  279 |                 }\n  280 |             }\n  281 |             Ordering::Less => {\n  282 |                 let Some(abs_pid) = pid.checked_neg() else {\n  283 |                     show!(USimpleError::new(\n  284 |                         1,\n  285 |                         translate!(\"kill-error-sending-signal\", \"pid\" => pid),\n  286 |                     ));\n  287 |                     continue;\n  288 |                 };\n  289 |                 let pid =\n  290 |                     Pid::from_raw(abs_pid).expect(\"abs_pid > 0 since pid < 0 and pid != i32::MIN\");\n  291 |                 match named {\n  292 |                     _ if sig == 0 => rustix_to_io(test_kill_process_group(pid)),\n  293 |                     Some(s) => rustix_to_io(kill_process_group(pid, s)),\n  294 |                     None => raw_kill(-pid.as_raw_nonzero().get(), sig),\n  295 |                 }\n  296 |             }\n  297 |         };\n  298 |         if let Err(e) = result {\n  299 |             show!(e.map_err_context(|| translate!(\"kill-error-sending-signal\", \"pid\" => pid)));\n  300 |         }\n  301 |     }\n  302 | }","lines":43}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"unpredictable_function_pointer_comparisons is suppressed and FormatWriter derives PartialEq/Eq over function pointers. Equality of fn pointers is not guaranteed to be meaningful (the compiler may merge/deduplicate identical functions or emit distinct thunks), so comparing two FormatterItemInfo for equality (used heavily in parse_formats tests) can in principle yield false negatives/positives. It happens to work today because each formatter is a distinct function, but the equality semantics are relying on unspecified behavior.","fix":"Avoid deriving Eq/PartialEq on the fn-pointer-containing enum for production logic; for tests compare a stable discriminant/identifier (e.g. byte_size + print_width + a format-type tag) instead of the raw fn pointers.","locations":[{"ref":"src/uu/od/src/formatter_item_info.rs:9-18","code":"    9 | #[allow(clippy::enum_variant_names)]\n   10 | #[allow(unpredictable_function_pointer_comparisons)]\n   11 | #[derive(Clone, Copy, PartialEq, Eq)]\n   12 | pub enum FormatWriter {\n   13 |     IntWriter(fn(u64) -> String),\n   14 |     FloatWriter(fn(f64) -> String),\n   15 |     LongDoubleWriter(fn(f64) -> String), // On most platforms, long double is f64 or emulated\n   16 |     BFloatWriter(fn(f64) -> String),\n   17 |     MultibyteWriter(fn(&[u8]) -> String),\n   18 | }","lines":10}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`TmpDirWrapper` resets `HANDLER_INSTALLED` to `false` if `ctrlc::set_handler`\nfails (tmp_dir.rs:87), but the documented contract is that a process may only\ninstall the handler once - a second attempt will also fail because ctrlc\nalready considers a handler installed (the very reason `TmpDirWrapper` is\ndocumented as single-instance). Resetting the flag therefore invites repeated\nfailing `set_handler` calls on every subsequent `init_tmp_dir`, each doing work\nand discarding the error, rather than remembering the permanent failure.","fix":"On `set_handler` failure, leave `HANDLER_INSTALLED` true (or use a tri-state)\nso the one-shot attempt is not retried; signal-based cleanup is best-effort\nanyway and the error is already non-fatal at the call site.","locations":[{"ref":"src/uu/sort/src/tmp_dir.rs:55-92","code":"   55 |     if HANDLER_INSTALLED\n   56 |         .compare_exchange(false, true, Ordering::AcqRel, Ordering::Acquire)\n   57 |         .is_err()\n   58 |     {\n   59 |         return Ok(());\n   60 |     }\n   61 | \n   62 |     let handler_state = state.clone();\n   63 |     if let Err(e) = ctrlc::set_handler(move || {\n   64 |         // Load the latest lock/path snapshot so the handler cleans the active temp dir.\n   65 |         let (lock, path) = {\n   66 |             let state = handler_state.lock().unwrap();\n   67 |             (state.lock.clone(), state.path.clone())\n   68 |         };\n   69 | \n   70 |         if let Some(lock) = lock {\n   71 |             let _guard = lock.lock().unwrap();\n   72 |             if let Some(path) = path {\n   73 |                 if let Err(e) = remove_tmp_dir(&path) {\n   74 |                     show_error!(\n   75 |                         \"{}\",\n   76 |                         translate!(\n   77 |                             \"sort-failed-to-delete-temporary-directory\",\n   78 |                             \"error\" => e\n   79 |                         )\n   80 |                     );\n   81 |                 }\n   82 |             }\n   83 |         }\n   84 | \n   85 |         std::process::exit(2)\n   86 |     }) {\n   87 |         HANDLER_INSTALLED.store(false, Ordering::Release);\n   88 |         return Err(USimpleError::new(\n   89 |             2,\n   90 |             translate!(\"sort-failed-to-set-up-signal-handler\", \"error\" => e),\n   91 |         ));\n   92 |     }","lines":38}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"WithEnvVarSet sets the FILE env var via unsafe env::set_var and restores it on Drop, but in FilterWriter::new the guard is bound to `_with_env_var_set`, a name that begins with underscore. A binding named exactly `_` would drop immediately; `_with_env_var_set` does live until end of scope, so this happens to be correct - but it is a well-known footgun and the process-global env mutation is not thread-safe (split is single-threaded today, so impact is low). Worth a comment that the binding name is load-bearing.","fix":"Keep the non-underscore-prefixed-or-bare binding and add a brief comment that the guard must outlive the spawn; the env mutation is sound only because the program is single-threaded.","locations":[{"ref":"src/uu/split/src/platform/unix.rs:86-98","code":"   86 |     fn new(command: &str, filepath: &OsStr) -> Result<Self> {\n   87 |         // set $FILE, save previous value (if there was one)\n   88 |         let _with_env_var_set = WithEnvVarSet::new(\"FILE\", filepath);\n   89 | \n   90 |         let shell_process =\n   91 |             Command::new(env::var(\"SHELL\").unwrap_or_else(|_| \"/bin/sh\".to_owned()))\n   92 |                 .arg(\"-c\")\n   93 |                 .arg(command)\n   94 |                 .stdin(Stdio::piped())\n   95 |                 .spawn()?;\n   96 | \n   97 |         Ok(Self { shell_process })\n   98 |     }","lines":13}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`Observer::start` matches the \"too many open files\" condition by string-comparing the error display\n(`e.to_string().starts_with(\"Too many open files\")`). This is locale/version fragile - the notify\ncrate or underlying OS message wording can change, and a localized libc could produce a different\nstring, silently breaking the fallback-to-polling path. The adjacent comment even acknowledges the\nproper ErrorKind is `Uncategorized` and unmatchable, but string matching is not a robust substitute.","fix":"Match on `notify::ErrorKind::MaxFilesWatch` / `Io(e)` with `e.raw_os_error() == Some(libc::EMFILE | libc::ENFILE)` instead of the localized message text.","locations":[{"ref":"src/uu/tail/src/follow/watch.rs:215-231","code":"  215 |             match RecommendedWatcher::new(tx, notify: ,"locations":[{"ref":"src/uucore/src/lib/features/checksum/compute.rs:152-164","code":"  152 |         (SizedAlgoKind::Sysv, DigestOutput::U16(sum)) => write!(\n  153 |             w,\n  154 |             \"{prefix}{sum} {}\",\n  155 |             size.div_ceil(options.algo_kind.bitlen()),\n  156 |         )?,\n  157 |         (SizedAlgoKind::Bsd, DigestOutput::U16(sum)) => {\n  158 |             // The BSD checksum output is 5 digit integer\n  159 |             let bsd_width = 5;\n  160 |             write!(\n  161 |                 w,\n  162 |                 \"{prefix}{sum:0bsd_width$} {:bsd_width$}\",\n  163 |                 size.div_ceil(options.algo_kind.bitlen()),\n  164 |             )?;","lines":13},{"ref":"src/uucore/src/lib/features/checksum/mod.rs:420-436","code":"  420 |     pub fn bitlen(&self) -> usize {\n  421 |         match self {\n  422 |             Self::Sysv => 512,\n  423 |             Self::Bsd => 1024,\n  424 |             Self::Crc => 256,\n  425 |             Self::Crc32b => 32,\n  426 |             Self::Md5 => 128,\n  427 |             Self::Sm3 => 512,\n  428 |             Self::Sha1 => 160,\n  429 |             Self::Sha2(len) => len.as_usize(),\n  430 |             Self::Sha3(len) => len.as_usize(),\n  431 |             Self::Blake2b(len) => len.as_bits(),\n  432 |             Self::Blake3(len) => len.as_bits(),\n  433 |             Self::Shake128(len) => len.map_or(Shake128::DEFAULT_BIT_SIZE, HashLength::as_bits),\n  434 |             Self::Shake256(len) => len.map_or(Shake256::DEFAULT_BIT_SIZE, HashLength::as_bits),\n  435 |         }\n  436 |     }","lines":17}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"The Locate macro `f!` reads the raw passwd/group struct via `ptr::read(data.cast_const())`\nunder PW_LOCK, then constructs the owned Passwd/Group inside the unsafe block while the\npointed-to C strings are still owned by libc's static buffer - this is correct only as\nlong as no other code calls getpw*/getgr* without taking PW_LOCK. The comment at\nlines 246-248 explicitly notes this invariant is not enforced. Any direct libc::getpwuid\ncall elsewhere in the codebase (or in a dependency) races with this and can yield\nuse-after-overwrite of the static buffer. This is an architectural fragility, not a\nguaranteed bug.","fix":"Prefer the reentrant getpwuid_r/getgrgid_r variants (caller-supplied buffer) to\neliminate the global-lock invariant entirely.","locations":[{"ref":"src/uucore/src/lib/features/entries.rs:241-309","code":"  241 | // These functions are not thread-safe:\n  242 | // > The return value may point to a static area, and may be\n  243 | // > overwritten by subsequent calls to getpwent(3), getpwnam(),\n  244 | // > or getpwuid().\n  245 | // This applies not just to the struct but also the strings it points\n  246 | // to, so we must copy all the data we want before releasing the lock.\n  247 | // (Technically we must also ensure that the raw functions aren't being called\n  248 | // anywhere else in the program.)\n  249 | static PW_LOCK: Mutex<()> = Mutex::new(());\n  250 | \n  251 | macro_rules! f {\n  252 |     ($fnam:ident, $fid:ident, $t:ident, $st:ident) => {\n  253 |         impl Locate<$t> for $st {\n  254 |             fn locate(k: $t) -> IOResult<Self> {\n  255 |                 let _guard = PW_LOCK.lock();\n  256 |                 // SAFETY: We're holding PW_LOCK.\n  257 |                 unsafe {\n  258 |                     let data = $fid(k);\n  259 |                     if !data.is_null() {\n  260 |                         Ok($st::from_raw(ptr::read(data.cast_const())))\n  261 |                     } else {\n  262 |                         // FIXME: Resource limits, signals and I/O failure may\n  263 |                         // cause this too. See getpwnam(3).\n  264 |                         // errno must be set to zero before the call. We can\n  265 |                         // use libc::__errno_location() on some platforms.\n  266 |                         // The same applies for the two cases below.\n  267 |                         Err(IOError::new(\n  268 |                             ErrorKind::NotFound,\n  269 |                             format!(\"No such id: {k}\"),\n  270 |                         ))\n  271 |                     }\n  272 |                 }\n  273 |             }\n  274 |         }\n  275 | \n  276 |         impl<'a> Locate<&'a str> for $st {\n  277 |             fn locate(k: &'a str) -> IOResult<Self> {\n  278 |                 let _guard = PW_LOCK.lock();\n  279 |                 // SAFETY: We're holding PW_LOCK.\n  280 |                 unsafe {\n  281 |                     let cstring = CString::new(k)?;\n  282 |                     // try to get user or group with name matching the input with these tow lines:\n  283 |                     // f!(getpwnam, getpwuid, uid_t, Passwd);\n  284 |                     // f!(getgrnam, getgrgid, gid_t, Group);\n  285 |                     let data = $fnam(cstring.as_ptr());\n  286 |                     if !data.is_null() {\n  287 |                         return Ok($st::from_raw(ptr::read(data.cast_const())));\n  288 |                     }\n  289 |                     if let Ok(id) = k.parse::<$t>() {\n  290 |                         let data = $fid(id);\n  291 |                         if !data.is_null() {\n  292 |                             Ok($st::from_raw(ptr::read(data.cast_const())))\n  293 |                         } else {\n  294 |                             Err(IOError::new(\n  295 |                                 ErrorKind::NotFound,\n  296 |                                 format!(\"No such id: {id}\"),\n  297 |                             ))\n  298 |                         }\n  299 |                     } else {\n  300 |                         Err(IOError::new(ErrorKind::NotFound, format!(\"Not found: {k}\")))\n  301 |                     }\n  302 |                 }\n  303 |             }\n  304 |         }\n  305 |     };\n  306 | }\n  307 | \n  308 | f!(getpwnam, getpwuid, uid_t, Passwd);\n  309 | f!(getgrnam, getgrgid, gid_t, Group);","lines":69}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"FsMeta::fs_type for non-statfs (statvfs) platforms is `unimplemented!()`, which panics\nat runtime if ever called on those targets (e.g. solaris/illumos via df --print-type).\nA library function reachable from a CLI flag should return an error, not panic.","fix":"Return a sentinel (0) or a Result instead of unimplemented!(), so df degrades\ngracefully on statvfs-only platforms.","locations":[{"ref":"src/uucore/src/lib/features/fsext.rs:818-827","code":"  818 |     #[cfg(not(any(\n  819 |         target_os = \"linux\",\n  820 |         target_os = \"android\",\n  821 |         target_vendor = \"apple\",\n  822 |         target_os = \"freebsd\"\n  823 |     )))]\n  824 |     fn fs_type(&self) -> i64 {\n  825 |         // FIXME: statvfs doesn't have an equivalent, so we need to do something else\n  826 |         unimplemented!()\n  827 |     }","lines":10}]},{"id":"API_13","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"DirFd::from_raw_fd takes a RawFd and wraps it in OwnedFd via from_raw_fd after only a\n`fd < 0` check. It does not verify the fd is actually a directory (O_DIRECTORY), so a\nDirFd built from an arbitrary fd will later fail opaquely in read_dir/openat. Given the\ntype's safety purpose (directory traversal), accepting a non-directory fd is an API\nfoot-gun; the public constructor should fstat and reject non-directories.","fix":"fstat the fd and return InvalidInput if it is not S_IFDIR, mirroring DirFd::open's\nO_DIRECTORY guarantee.","locations":[{"ref":"src/uucore/src/lib/features/safe_traversal.rs:454-465","code":"  454 |     /// Create a DirFd from an existing file descriptor (takes ownership)\n  455 |     pub fn from_raw_fd(fd: RawFd) -> io::Result<Self> {\n  456 |         if fd < 0 {\n  457 |             return Err(io::Error::new(\n  458 |                 io::ErrorKind::InvalidInput,\n  459 |                 translate!(\"safe-traversal-error-invalid-fd\"),\n  460 |             ));\n  461 |         }\n  462 |         // SAFETY: We've verified fd >= 0, and the caller is transferring ownership\n  463 |         let owned_fd = unsafe { OwnedFd::from_raw_fd(fd) };\n  464 |         Ok(Self { fd: owned_fd })\n  465 |     }","lines":12}]},{"id":"API_14","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"In kill `table()`, the format spec `\"{signal_value: >#2}\"` applies the alternate-form flag `#` to an integer with no base prefix, which has no effect for plain decimal and is misleading; the intent is right-aligned width 2. The `#` flag is inert here and suggests a misunderstanding.","fix":"Use `\"{signal_value:>2}\"` (drop the no-op `#` and the redundant leading space) to express right-aligned width 2.","locations":[{"ref":"src/uu/kill/src/kill.rs:158","code":"  158 |             println!(\"{signal_value: >#2} {signal_name}\");","lines":1}]},{"id":"API_15","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"In tee `tee()` and `MultiWriter`, control flow relies on `ErrorKind::Other` as a sentinel to signal \"all writers exited\". The code comments acknowledge std will never raise this kind, but `ErrorKind::Other` is a public, broadly-used error kind; if any underlying writer (e.g. a custom File impl or future std change) ever returns `ErrorKind::Other` for a real I/O failure, it would be misinterpreted as the normal all-writers-gone termination and the error would be silently swallowed.","fix":"Use an explicit internal enum/return value to signal \"all writers gone\" rather than overloading io::ErrorKind::Other.","locations":[{"ref":"src/uu/tee/src/tee.rs:98-113","code":"   98 |     let res = match output.copy_unbuffered() {\n   99 |         // ErrorKind::Other is raised by MultiWriter when all writers\n  100 |         // have exited, so that copy will abort. It's equivalent to\n  101 |         // success of this part (if there was an error that should\n  102 |         // cause a failure from any writer, that error would have been\n  103 |         // returned instead).\n  104 |         Err(e) if e.kind() != ErrorKind::Other => Err(e),\n  105 |         _ => Ok(()),\n  106 |     };\n  107 | \n  108 |     if had_open_errors || res.is_err() || output.error_occurred() {\n  109 |         Err(Error::from(ErrorKind::Other))\n  110 |     } else {\n  111 |         Ok(())\n  112 |     }\n  113 | }","lines":16},{"ref":"src/uu/tee/src/tee.rs:217-223","code":"  217 |         match self.aborted.take() {\n  218 |             Some(e) => Err(e),\n  219 |             // This error kind will never be raised by std, so we can use it for termination when all writers exited\n  220 |             None if self.writers.is_empty() => Err(Error::from(ErrorKind::Other)),\n  221 |             None => Ok(()),\n  222 |         }\n  223 |     }","lines":7}]},{"id":"API_16","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"into_f64 calls `bd.to_f64().unwrap()`. BigDecimal::to_f64 returns Option and, while it currently\nyields Some for all finite BigDecimals, relying on unwrap couples correctness to an external crate's\nimplementation detail; a future bigdecimal change returning None would turn a parse into a panic in\ncore shared code used by many utilities.","fix":"Handle the None case explicitly (e.g. map to Overflow(inf) with appropriate sign, or NotNumeric)\ninstead of unwrap.","locations":[{"ref":"src/uucore/src/lib/features/parser/num_parser.rs:254-262","code":"  254 |                 ExtendedBigDecimal::BigDecimal(bd) => {\n  255 |                     let f = bd.to_f64().unwrap();\n  256 |                     if f.is_infinite() {\n  257 |                         return Err(ExtendedParserError::Overflow(f));\n  258 |                     }\n  259 |                     if f.is_zero() && !bd.is_zero() {\n  260 |                         return Err(ExtendedParserError::Underflow(f));\n  261 |                     }\n  262 |                     f","lines":9}]},{"id":"API_17","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"`get_macos_boot_time_sysctl` shells out to the `sysctl` command-line tool and parses its stdout, despite\nthe doc comment claiming this \"avoids any unsafe code\". Spawning a subprocess to read `kern.boottime` is\nfragile (depends on `sysctl` being on PATH, on its exact output format, and on the C locale) and far\nslower/less robust than the `sysctlbyname` libc call the rest of the codebase could use. The comment framing\nthis as the safe canonical approach is misleading.","fix":"Use `libc::sysctl`/`sysctlbyname(CTL_KERN, KERN_BOOTTIME)` in a small unsafe block (like the rest of the\nunix code paths) instead of parsing `Command::new(\"sysctl\")` output, and fix the doc comment.","locations":[{"ref":"src/uucore/src/lib/features/uptime.rs:57-88","code":"   57 | #[cfg(target_os = \"macos\")]\n   58 | fn get_macos_boot_time_sysctl() -> Option<time_t> {\n   59 |     use std::process::Command;\n   60 | \n   61 |     // Execute sysctl command to get boot time\n   62 |     let output = Command::new(\"sysctl\")\n   63 |         .arg(\"-n\")\n   64 |         .arg(\"kern.boottime\")\n   65 |         .output();\n   66 | \n   67 |     if let Ok(output) = output {\n   68 |         if output.status.success() {\n   69 |             // Parse output format: { sec = 1729338352, usec = 0 } Wed Oct 19 08:25:52 2025\n   70 |             // We need to extract the seconds value from the structured output\n   71 |             let stdout = String::from_utf8_lossy(&output.stdout);\n   72 | \n   73 |             // Extract the seconds from the output\n   74 |             // Look for \"sec = \" pattern\n   75 |             if let Some(sec_start) = stdout.find(\"sec = \") {\n   76 |                 let sec_part = &stdout[sec_start + 6..];\n   77 |                 if let Some(sec_end) = sec_part.find(',') {\n   78 |                     let sec_str = &sec_part[..sec_end];\n   79 |                     if let Ok(boot_time) = sec_str.trim().parse::<i64>() {\n   80 |                         return Some(boot_time as time_t);\n   81 |                     }\n   82 |                 }\n   83 |             }\n   84 |         }\n   85 |     }\n   86 | \n   87 |     None\n   88 | }","lines":32}]},{"id":"API_18","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"preserve_inherited_sigpipe calls libc::signal and std::env::remove_var inside unsafe blocks during startup. remove_var is process-global and unsound if other threads exist; relying on the RUST_SIGPIPE env var as an out-of-band channel (set by env.rs) is a fragile cross-module coupling. This is by design but the remove_var is the documented-unsafe-in-multithread API and there is no guarantee no threads have been spawned yet at the call site.","fix":"Document the single-threaded-startup invariant at the call site, and consider gating the remove_var on actually being early in main before any thread spawn; or pass the intent through a non-env mechanism.","locations":[{"ref":"src/uucore/src/lib/mods/panic.rs:51-60","code":"   51 | pub fn preserve_inherited_sigpipe() {\n   52 |     use nix::libc;\n   53 | \n   54 |     // Check if parent specified that SIGPIPE should be default\n   55 |     if std::env::var_os(\"RUST_SIGPIPE\").is_some_and(|v| v == \"default\") {\n   56 |         unsafe { libc::signal(libc::SIGPIPE, libc::SIG_DFL) };\n   57 |         // Remove the environment variable so child processes don't inherit it incorrectly\n   58 |         unsafe { std::env::remove_var(\"RUST_SIGPIPE\") };\n   59 |     }\n   60 | }","lines":10}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"comm, by default (when neither --check-order nor --nocheck-order is given), calls are_files_identical() which reads BOTH input files in their entirety (8 KiB at a time) just to decide whether to skip order checking. For two large but non-identical files of equal size this doubles the I/O and reads files fully up front before the streaming comm loop even starts. GNU comm does not do this; it just checks for the same-file case.","fix":"Drop the are_files_identical() full-content comparison from the should_check_order decision; rely only on paths_refer_to_same_file (a stat-based check). Order checking against an identical file is harmless anyway since identical content is sorted-consistent.","locations":[{"ref":"src/uu/comm/src/comm.rs:131-186","code":"  131 | pub fn are_files_identical(path1: &Path, path2: &Path) -> io::Result<bool> {\n  132 |     // First compare file sizes\n  133 |     let metadata1 = metadata(path1)?;\n  134 |     let metadata2 = metadata(path2)?;\n  135 | \n  136 |     if metadata1.len() != metadata2.len() {\n  137 |         return Ok(false);\n  138 |     }\n  139 | \n  140 |     // only proceed if both are regular files\n  141 |     if !metadata1.is_file() || !metadata2.is_file() {\n  142 |         return Ok(false);\n  143 |     }\n  144 | \n  145 |     let file1 = File::open(path1)?;\n  146 |     let file2 = File::open(path2)?;\n  147 | \n  148 |     let mut reader1 = BufReader::new(file1);\n  149 |     let mut reader2 = BufReader::new(file2);\n  150 | \n  151 |     let mut buffer1 = [0; 8192];\n  152 |     let mut buffer2 = [0; 8192];\n  153 | \n  154 |     loop {\n  155 |         // Read from first file with EINTR retry handling\n  156 |         // This loop retries the read operation if it's interrupted by signals (e.g., SIGUSR1)\n  157 |         // instead of failing, which is the POSIX-compliant way to handle interrupted I/O\n  158 |         let bytes1 = loop {\n  159 |             match reader1.read(&mut buffer1) {\n  160 |                 Err(e) if e.kind() == io::ErrorKind::Interrupted => {}\n  161 |                 result => break result?,\n  162 |             }\n  163 |         };\n  164 | \n  165 |         // Read from second file with EINTR retry handling\n  166 |         // Same retry logic as above for the second file to ensure consistent behavior\n  167 |         let bytes2 = loop {\n  168 |             match reader2.read(&mut buffer2) {\n  169 |                 Err(e) if e.kind() == io::ErrorKind::Interrupted => {}\n  170 |                 result => break result?,\n  171 |             }\n  172 |         };\n  173 | \n  174 |         if bytes1 != bytes2 {\n  175 |             return Ok(false);\n  176 |         }\n  177 | \n  178 |         if bytes1 == 0 {\n  179 |             return Ok(true);\n  180 |         }\n  181 | \n  182 |         if buffer1[..bytes1] != buffer2[..bytes2] {\n  183 |             return Ok(false);\n  184 |         }\n  185 |     }\n  186 | }","lines":56},{"ref":"src/uu/comm/src/comm.rs:231-235","code":"  231 |     let should_check_order = !no_check_order\n  232 |         && (check_order\n  233 |             || !(paths_refer_to_same_file(filename1.as_os_str(), filename2.as_os_str(), true)\n  234 |                 || are_files_identical(Path::new(filename1), Path::new(filename2))\n  235 |                     .unwrap_or(false)));","lines":5}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`Table::write_to` allocates a fresh `Vec<u8>` for every padding run via\n`iter::repeat_n(b' ', pad_width).collect::<Vec<_>>()` and writes it. This happens for every\nleft- and right-aligned cell of every row, allocating once per cell purely to emit spaces.","fix":"Write padding without allocating, e.g. keep a static/`const` buffer of spaces and write slices\nof it in a loop, or use `write!` with a width specifier. Avoid the per e handle (`Ok(_) => ...`); the directory is then re-opened with `fs::read_dir(&entry.path)` when the stack entry is later processed. This doubles the directory-open (and first-readdir) syscalls for every directory in a recursive (`-R`) traversal.","fix":"Push the already-opened `ReadDir` handle onto the stack alongside the path (or carry it via an `Option<ReadDir>` like the `initial_read_dir` handling) instead of opening, dropping, and reopening.","locations":[{"ref":"src/uu/ls/src/ls.rs:1401-1418","code":" 1401 |         let mut current_read_dir = if entry.is_first {\n 1402 |             initial_read_dir\n 1403 |                 .take()\n 1404 |                 .expect(\"initial read_dir is present for first entry\")\n 1405 |         } else {\n 1406 |             match fs::read_dir(&entry.path) {\n 1407 |                 Err(err) => {\n 1408 |                     output.flush()?;\n 1409 |                     show!(LsError::IOErrorContext(\n 1410 |                         entry.path.clone(),\n 1411 |                         err,\n 1412 |                         entry.command_line,\n 1413 |                     ));\n 1414 |                     continue;\n 1415 |                 }\n 1416 |                 Ok(rd) => rd,\n 1417 |             }\n 1418 |         };","lines":18},{"ref":"src/uu/ls/src/ls.rs:1433-1457","code":" 1433 |                 match fs::read_dir(&child_path) {\n 1434 |                     Err(err) => {\n 1435 |                         output.flush()?;\n 1436 |                         show!(LsError::IOErrorContext(\n 1437 |                             child_path.clone(),\n 1438 |                             err,\n 1439 |                             child_command_line,\n 1440 |                         ));\n 1441 |                     }\n 1442 |                     Ok(_) => {\n 1443 |                         if listed_ancestors.insert(FileInformation::from_path(\n 1444 |                             &child_path,\n 1445 |                             child_must_dereference,\n 1446 |                         )?) {\n 1447 |                             stack.push(StackEntry {\n 1448 |                                 path: child_path,\n 1449 |                                 command_line: child_command_line,\n 1450 |                                 is_first: false,\n 1451 |                             });\n 1452 |                         } else {\n 1453 |                             output.flush()?;\n 1454 |                             show!(LsError::AlreadyListedError(child_path));\n 1455 |                         }\n 1456 |                     }\n 1457 |                 }","lines":25}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"tac regex mode is O(n^2) on the input size. For every byte index i from the end of the buffer down to 0, it calls pattern.find_at(&data[..this_line_end], i), which performs a regex scan that can examine the whole remaining prefix. On a large file with the -r option this becomes quadratic and effectively hangs on multi-megabyte inputs, even though the non-regex path (memmem::rfind_iter) is linear.","fix":"Use regex find_iter over the whole buffer once to collect all match (start,end) positions (left-to-right), then iterate that collected list in reverse to emit lines, instead of re-running find_at for every byte offset.","locations":[{"ref":"src/uu/tac/src/tac.rs:146-167","code":"  146 |     for i in (0..data.len()).rev() {\n  147 |         // Determine if there is a match for `pattern` starting at index\n  148 |         // `i` in `data`. Only search up to the line ending that was\n  149 |         // found previously.\n  150 |         if let Some(match_) = pattern.find_at(&data[..this_line_end], i)\n  151 |             && match_.start() == i\n  152 |         {\n  153 |             // Record this index as the ending of the current line.\n  154 |             this_line_end = i;\n  155 | \n  156 |             // The length of the match _symlink(), dest.symlink_metadata(), dest.try_exists(), and later fs::metadata(source)/fs::symlink_metadata(source) plus paths_refer_to_same_file (which stats both) and are_hardlinks_to_same_file (stats both) repeatedly. A single regular-file copy performs roughly a dozen stat-family syscalls on the same two paths before any data is moved, and the file referenced in the TODO at line 1596 (issue #6658) is never addressed for the source side.","fix":"Cache source and dest symlink_metadata once and pass it through the helper functions instead of re-statting at each step.","locations":[{"ref":"src/uu/cp/src/cp.rs:2460-2552","code":" 2460 |     let source_is_symlink = source.is_symlink();\n 2461 |     let initial_dest_metadata = dest.symlink_metadata().ok();\n 2462 |     let dest_is_symlink = initial_dest_metadata\n 2463 |         .as_ref()\n 2464 |         .is_some_and(|md| md.file_type().is_symlink());\n 2465 |     let dest_target_exists = dest.try_exists().unwrap_or(false);\n 2466 |     // Fail if dest is a dangling symlink or a symlink this program created previously\n 2467 |     if dest_is_symlink {\n 2468 |         if FileInformation::from_path(dest, false).is_ok_and(|info| symlinked_files.contains(&info))\n 2469 |         {\n 2470 |             return Err(CpError::Error(\n 2471 |                 translate!(\"cp-error-will-not-copy-through-symlink\", \"source\" => source.quote(), \"dest\" => dest.quote()),\n 2472 |             ));\n 2473 |         }\n 2474 |         // Fail if cp tries to copy two sources of the same name into a single symlink\n 2475 |         // Example: \"cp file1 dir1/file1 tmp\" where \"tmp\" is a directory containing a symlink \"file1\" pointing to a file named \"foo\".\n 2476 |         // foo will contain the contents of \"file1\" and \"dir1/file1\" will not be copied over to \"tmp/file1\"\n 2477 |         if copied_destinations.contains(dest) {\n 2478 |             return Err(CpError::Error(\n 2479 |                 translate!(\"cp-error-wil
