<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"For 32 bits-per-sample FLAC streams using a stereo decorrelation channel assignment (LeftSide/MidSide/RightSide), the Side (difference) channel is decoded with `bits_per_sample + 1` = 33 bits. `decode_constant`/`decode_verbatim`/`decode_rice_partition` then call `read_bits_leq32(33)`. `read_bits_leq32` only `debug_assert!`s `bit_width <= 32`, so this panics in debug/fuzzing builds and silently computes a wrong/garbage shift (`32 - 33` underflows) in release builds. `header.bits_per_sample` can legitimately be 32 (frame-header bps encoding 0x7), making this reachable from untrusted input. libFLAC handles this via 64-bit reads.","fix":"When the per-sample bit width can reach 33 (i.e. a side channel of a 32-bit stream), decode warm-up/constant/verbatim/binary-residual samples using a 64-bit read path (read_bits_leq64) instead of read_bits_leq32, or reject 32-bit bps combined with side-channel assignments with a decode_error.","locations":[{"ref":"symphonia-bundle-flac/src/decoder.rs:195-227","code":"  195 |                 ChannelAssignment::LeftSide => {\n  196 |                     let (left, side) = self\n  197 |                         .buf\n  198 |                         .plane_pair_mut(0, 1)\n  199 |                         .ok_or(Error::DecodeError(\"flac: unexpected channel assignment\"))?;\n  200 | \n  201 |                     read_subframe(&mut bs, bits_per_sample, left)?;\n  202 |                     read_subframe(&mut bs, bits_per_sample + 1, side)?;\n  203 | \n  204 |                     decorrelate_left_side(left, side);\n  205 |                 }\n  206 |                 ChannelAssignment::MidSide => {\n  207 |                     let (mid, side) = self\n  208 |                         .buf\n  209 |                         .plane_pair_mut(0, 1)\n  210 |                         .ok_or(Error::DecodeError(\"flac: unexpected channel assignment\"))?;\n  211 | \n  212 |                     read_subframe(&mut bs, bits_per_sample, mid)?;\n  213 |                     read_subframe(&mut bs, bits_per_sample + 1, side)?;\n  214 | \n  215 |                     decorrelate_mid_side(mid, side);\n  216 |                 }\n  217 |                 ChannelAssignment::RightSide => {\n  218 |                     let (side, right) = self\n  219 |                         .buf\n  220 |                         .plane_pair_mut(0, 1)\n  221 |                         .ok_or(Error::DecodeError(\"flac: unexpected channel assignment\"))?;\n  222 | \n  223 |                     read_subframe(&mut bs, bits_per_sample + 1, side)?;\n  224 |                     read_subframe(&mut bs, bits_per_sample, right)?;\n  225 | \n  226 |                     decorrelate_right_side(right, side);\n  227 |                 }","lines":33},{"ref":"symphonia-bundle-flac/src/decoder.rs:411-427","code":"  411 | fn decode_constant<B: ReadBitsLtr>(bs: &mut B, bps: u32, buf: &mut [i32]) -> Result<()> {\n  412 |     let const_sample = sign_extend_leq32_to_i32(bs.read_bits_leq32(bps)?, bps);\n  413 | \n  414 |     for sample in buf.iter_mut() {\n  415 |         *sample = const_sample;\n  416 |     }\n  417 | \n  418 |     Ok(())\n  419 | }\n  420 | \n  421 | fn decode_verbatim<B: ReadBitsLtr>(bs: &mut B, bps: u32, buf: &mut [i32]) -> Result<()> {\n  422 |     for sample in buf.iter_mut() {\n  423 |         *sample = sign_extend_leq32_to_i32(bs.read_bits_leq32(bps)?, bps);\n  424 |     }\n  425 | \n  426 |     Ok(())\n  427 | }","lines":17}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"ADPCM decode_inner computes `block_count = packet.block_dur().get() / frames_per_block` and then `self.buf.render_uninit(Some(block_count * frames_per_block))`. The audio buffer capacity is `max_frames_per_packet`. `render_uninit` asserts `num_frames <= capacity` and panics with \"capacity will be exceeded\" otherwise. `block_dur` is derived from the packet/demuxer (attacker influenced) and is not validated against `max_frames_per_packet`, so a packet claiming a large block duration triggers a reachable panic.","fix":"Clamp/validate `block_count * frames_per_block` against `self.buf.capacity()` (return a decode_error if it would exceed), and use checked arithmetic for `block_count * frames_per_block`.","locations":[{"ref":"symphonia-codec-adpcm/src/lib.rs:122-133","code":"  122 |     fn decode_inner(&mut self, packet: &PacketRef<'_>) -> Result<()> {\n  123 |         let mut stream = packet.as_buf_reader();\n  124 | \n  125 |         let frames_per_block = match self.params.frames_per_block {\n  126 |             Some(v) => v as usize,\n  127 |             None => return decode_error(\"adpcm: missing frames_per_block\"),\n  128 |         };\n  129 | \n  130 |         let block_count = packet.block_dur().get() as usize / frames_per_block;\n  131 | \n  132 |         self.buf.clear();\n  133 |         self.buf.render_uninit(Some(block_count * frames_per_block));","lines":12}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"`lookup1_values` uses `assert!` (not debug_assert!) on attacker-controlled `entries`/`dimensions`. The asserts call `value.pow(dimensions)` and `(value+1).pow(dimensions)` where `dimensions` can be up to 65535. In debug builds `u32::pow` panics on overflow; in release it wraps, which can make the asserts evaluate false and panic via `assert!`. Either way a crafted codebook (lookup_type 1) triggers a reachable panic / abort.","fix":"Replace the asserts with fallible logic returning a decode_error, and compute the power with checked_pow to detect overflow instead of asserting. Validate dimensions/entries ranges before computing.","locations":[{"ref":"symphonia-codec-vorbis/src/codebook.rs:34-44","code":"   34 | fn lookup1_values(entries: u32, dimensions: u16) -> u32 {\n   35 |     // (value ^ dimensions) <= entries\n   36 |     // [(value ^ dimensions) ^ (1 / dimensions)] = lower[entries ^ (1 / dimensions)]\n   37 |     // value = lower[entries ^ (1 / dimensions)]\n   38 |     let value = (entries as f32).powf(1.0f32 / f32::from(dimensions)).floor() as u32;\n   39 | \n   40 |     assert!(value.pow(u32::from(dimensions)) <= entries);\n   41 |     assert!((value + 1).pow(u32::from(dimensions)) > entries);\n   42 | \n   43 |     value\n   44 | }","lines":11}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"Floor0 `read_channel` reads the codebook-list index using `ilog(floor0_number_of_books)` bits, but indexes a fixed `[u8; 16]` array with it. `floor0_number_of_books` can be up to 16 (4-bit field + 1), so `ilog(16) == 5`, meaning 5 bits are read, yielding an index of 0..=31. Indices 16..=31 read out of bounds of `floor0_book_list` and panic. This is reachable directly from attacker-controlled setup-header data.","fix":"Bounds-check `floor_book_idx` against `floor0_number_of_books` (return a decode_error if `floor_book_idx >= floor0_number_of_books`) before indexing `floor0_book_list`. Per spec the value must be < number_of_books.","locations":[{"ref":"symphonia-codec-vorbis/src/floor.rs:219-223","code":"  219 |             let floor_book_idx_bits = ilog(u32::from(self.setup.floor0_number_of_books));\n  220 |             let floor_book_idx = io_try_or_ret!(bs.read_bits_leq32(floor_book_idx_bits)) as usize;\n  221 | \n  222 |             // Get the actual codebook index from the floor's codebook list.\n  223 |             let codebook_idx = self.setup.floor0_book_list[floor_book_idx] as usize;","lines":5}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"AudioBuffer::new divides by `std::mem::size_of::<S>() * num_channels` in its capacity assertion. When the buffer is created with a channel set that has zero channels (e.g. `Channels::None`, an empty `Channels::Discrete(0)`, or an empty positioned mask), `num_channels` is 0 and the multiplication is 0, causing an integer division-by-zero panic. Both `AudioBuffer::new` and `GenericAudioBuffer::new` are public and reachable from demuxers/decoders that derive channel counts from untrusted stream headers.","fix":"Guard the divisor: if `num_channels == 0` (or `size_of::<S>() == 0`), skip the capacity check (or treat the max capacity as `usize::MAX`). E.g. `let per = std::mem::size_of::<S>().saturating_mul(num_channels); assert!(per == 0 || capacity <= usize::MAX / per, ...);`.","locations":[{"ref":"symphonia-core/src/audio/buf.rs:79-86","code":"   79 |         let num_channels = spec.channels().count();\n   80 | \n   81 |         // As a matter of practicality, it is not possible to allocate more than usize::MAX bytes\n   82 |         // of audio samples.\n   83 |         assert!(\n   84 |             capacity <= (usize::MAX / (std::mem::size_of::<S>() * num_channels)),\n   85 |             \"capacity too large\"\n   86 |         );","lines":8}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","description":"`fetch_bits_partial` is `todo!()` for both `BitStreamLtr` and `BitStreamRtl`. These are public types implementing the public `ReadBitsLtr`/`ReadBitsRtl` traits. `read_codebook` (a default trait method) calls `fetch_bits_partial()` whenever `num_bits_left() < codebook.max_code_len`, which is the normal case for any codebook with codewords longer than 8 bits. Any caller using `BitStreamLtr`/`BitStreamRtl` with `read_codebook` will hit an unconditional panic.","fix":"Implement `fetch_bits_partial` for the streaming bit readers (read available bytes one at a time and append them to the cache, mirroring the slice-based `BitReaderLtr`/`BitReaderRtl` implementations), or document/remove `read_codebook` support for the streaming variants.","locations":[{"ref":"symphonia-core/src/io/bit.rs:837-840","code":"  837 |     #[inline(always)]\n  838 |     fn fetch_bits_partial(&mut self) -> io::Result<()> {\n  839 |         todo!()\n  840 |     }","lines":4},{"ref":"symphonia-core/src/io/bit.rs:1277-1280","code":" 1277 |     #[inline(always)]\n 1278 |     fn fetch_bits_partial(&mut self) -> io::Result<()> {\n 1279 |         todo!()\n 1280 |     }","lines":4}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","description":"In a track fragment run (trun), `is_first_sample_duration_present()` tests bit 0x4 of the per-sample `first_sample_flags` value, and when true `total_duration()`, `sample_timing()` index `self.sample_duration[0]`. However `sample_duration` is only populated when the SAMPLE_DURATION_PRESENT (0x100) trun flag is set. A crafted trun that sets FIRST_SAMPLE_FLAGS_PRESENT (so first_sample_flags is Some with bit 0x4 set) but does NOT set SAMPLE_DURATION_PRESENT leaves `sample_duration` empty, so `self.sample_duration[0]` panics with an out-of-bounds index. Reachable from MoofSegment::sample_timing during normal fragmented playback. The size variants (`is_first_sample_size_present`/`sample_size[0]`) have the identical defect.","fix":"Guard every `sample_duration[0]`/`sample_size[0]` access with `!self.sample_duration.is_empty()` (and likewise for sample_size), or fix `is_first_sample_*_present` to only return true when the corresponding per-sample vector was actually read. The `first_sample_flags` bit semantics are also wrong (see separate logic_error finding).","locations":[{"ref":"symphonia-format-isomp4/src/atoms/trun.rs:84-99","code":"   84 |     pub fn total_duration(&self, default_dur: u32) -> u64 {\n   85 |         if self.is_sample_duration_present() {\n   86 |             self.total_sample_duration\n   87 |         }\n   88 |         else {\n   89 |             // The duration of all samples in the track fragment are not explictly known.\n   90 |             if self.sample_count > 0 && self.is_first_sample_duration_present() {\n   91 |                 // The first sample has an explictly recorded duration.\n   92 |                 u64::from(self.sample_duration[0])\n   93 |                     + u64::from(self.sample_count - 1) * u64::from(default_dur)\n   94 |             }\n   95 |             else {\n   96 |                 // All samples have the default duration.\n   97 |                 u64::from(self.sample_count) * u64::from(default_dur)\n   98 |             }\n   99 |         }","lines":16},{"ref":"symphonia-format-isomp4/src/atoms/trun.rs:103-114","code":"  103 |     pub fn total_size(&self, default_size: u32) -> u64 {\n  104 |         if self.is_sample_size_present() {\n  105 |             self.total_sample_size\n  106 |         }\n  107 |         else if self.sample_count > 0 && self.is_first_sample_size_present() {\n  108 |             u64::from(self.sample_size[0])\n  109 |                 + u64::from(self.sample_count - 1) * u64::from(default_size)\n  110 |         }\n  111 |         else {\n  112 |             u64::from(self.sample_count) * u64::from(default_size)\n  113 |         }\n  114 |     }","lines":12},{"ref":"symphonia-format-isomp4/src/atoms/trun.rs:139-147","code":"  139 |             let ts = if sample_num_rel > 0 && self.is_first_sample_duration_present() {\n  140 |                 // The first sample has a unique duration.\n  141 |                 u64::from(self.sample_duration[0])\n  142 |                     + u64::from(sample_num_rel - 1) * u64::from(default_dur)\n  143 |             }\n  144 |             else {\n  145 |                 // Zero or more samples with identical durations.\n  146 |                 u64::from(sample_num_rel) * u64::from(default_dur)\n  147 |             };","lines":9},{"ref":"symphonia-format-isomp4/src/atoms/trun.rs:190-198","code":"  190 |             let offset = if sample_num_rel > 0 && self.is_first_sample_size_present() {\n  191 |                 // The first sample has a unique size.\n  192 |                 u64::from(self.sample_size[0])\n  193 |                     + u64::from(sample_num_rel - 1) * u64::from(default_size)\n  194 |             }\n  195 |             else {\n  196 |                 // Zero or more identically sized samples.\n  197 |                 u64::from(sample_num_rel) * u64::from(default_size)\n  198 |             };","lines":9}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","description":"TrunAtom::read sums per-sample sizes/durations with non-checked `+=` into u64 accumulators and pushes into unbounded Vecs while iterating `0..sample_count` where sample_count is an attacker-controlled u32 (up to ~4.29e9). Although the iterator's bounds-checked reads will eventually fail for an undersized atom, an atom that genuinely declares a huge sample_count with enough payload (or on a non-seekable/streamed source) drives unbounded `Vec` growth (sample_duration/sample_size/sample_flags), and `total_sample_size`/`total_sample_duration` use plain `+=` that can overflow and panic in debug builds. Downstream `traf.rs` also does `total_sample_count += trun.sample_count` with plain `+=` (u32), which can overflow.","fix":"Use checked_add for the running totals (return a decode error on overflow) and use Vec::with_capacity(MAX_TABLE_INITIAL_CAPACITY.min(sample_count as usize)) like the other table atoms to cap pre-allocation; consider validating sample_count against remaining atom data before looping.","locations":[{"ref":"symphonia-format-isomp4/src/atoms/trun.rs:267-297","code":"  267 |         let mut sample_duration = Vec::new();\n  268 |         let mut sample_size = Vec::new();\n  269 |         let mut sample_flags = Vec::new();\n  270 | \n  271 |         let mut total_sample_size = 0;\n  272 |         let mut total_sample_duration = 0;\n  273 | \n  274 |         for _ in 0..sample_count {\n  275 |             if (flags & TrunAtom::SAMPLE_DURATION_PRESENT) != 0 {\n  276 |                 let duration = it.read_u32()?;\n  277 |                 total_sample_duration += u64::from(duration);\n  278 |                 sample_duration.push(duration);\n  279 |             }\n  280 | \n  281 |             if (flags & TrunAtom::SAMPLE_SIZE_PRESENT) != 0 {\n  282 |                 let size = it.read_u32()?;\n  283 |                 total_sample_size += u64::from(size);\n  284 |                 sample_size.push(size);\n  285 |             }\n  286 | \n  287 |             if (flags & TrunAtom::SAMPLE_FLAGS_PRESENT) != 0 {\n  288 |                 sample_flags.push(it.read_u32()?);\n  289 |             }\n  290 | \n  291 |             // Ignoring composition time for now since it's a video thing...\n  292 |             if (flags & TrunAtom::SAMPLE_COMPOSITION_TIME_OFFSETS_PRESENT) != 0 {\n  293 |                 // For version 0, this is a u32.\n  294 |                 // For version 1, this is a i32.\n  295 |                 let _ = it.read_u32()?;\n  296 |             }\n  297 |         }","lines":31},{"ref":"symphonia-format-isomp4/src/atoms/traf.rs:38-42","code":"   38 | \n   39 |                     // Increment the total sample count.\n   40 |                     total_sample_count += trun.sample_count;\n   41 | \n   42 |                     truns.push(trun);","lines":5}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"high","description":"The `--seek-ts` argument is registered with `value_parser!(i64)` (stored as i64 in clap), but it is retrieved via `args.get_one::<Timestamp>(\"seek-ts\")`. clap's `get_one` downcasts to the requested type and panics (via MatchesError) when the stored type does not match. `Timestamp` is a distinct newtype `struct Timestamp(i64)`, not `i64`, so any invocation of `symphonia-play --seek-ts <N>` will panic at startup instead of seeking. The feature is effectively broken and crashes.","fix":"Retrieve the value as the stored type and convert: `args.get_one::<i64>(\"seek-ts\").map(|&ts| SeekPosition::Timestamp(Timestamp::from(ts)))`. Alternatively register a custom `value_parser` that produces a `Timestamp` directly.","locations":[{"ref":"symphonia-play/src/main.rs:65-74","code":"   65 |         .arg(\n   66 |             Arg::new(\"seek-ts\")\n   67 |                 .long(\"seek-ts\")\n   68 |                 .short('S')\n   69 |                 .value_name(\"TIMESTAMP\")\n   70 |                 .value_parser(clap::value_parser!(i64))\n   71 |                 .allow_hyphen_values(true)\n   72 |                 .help(\"Seek to the timestamp in timebase units\")\n   73 |                 .conflicts_with_all([\"seek\", \"decode-only\", \"probe-only\", \"verify\", \"verify-only\"]),\n   74 |         )","lines":10},{"ref":"symphonia-play/src/main.rs:228","code":"  228 |                     args.get_one::<Timestamp>(\"seek-ts\").map(|&ts| SeekPosition::Timestamp(ts))","lines":1}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"ADPCM MS `decode_mono` unconditionally writes `buffer[0]` and `buffer[1]` before the loop. `frames_per_block` is only validated to be non-zero (lib.rs line 88), so a value of 1 produces a per-block buffer slice of length 1 and `buffer[1] = ...` panics with an out-of-bounds index. Reachable from a crafted container with frames_per_block == 1.","fix":"Validate that frames_per_block >= 2 for MS ADPCM (and generally that frames_per_block is large enough for the preamble samples) before decoding, returning a decode_error otherwise.","locations":[{"ref":"symphonia-codec-adpcm/src/codec_ms.rs:102-114","code":"  102 | pub(crate) fn decode_mono<B: ReadBytes>(\n  103 |     stream: &mut B,\n  104 |     buffer: &mut [i32],\n  105 |     frames_per_block: usize,\n  106 | ) -> Result<()> {\n  107 |     let mut status = AdpcmMsBlockStatus::read_mono_preamble(stream)?;\n  108 |     buffer[0] = from_i16_shift!(status.sample2);\n  109 |     buffer[1] = from_i16_shift!(status.sample1);\n  110 |     for byte in 1..(frames_per_block / 2) {\n  111 |         let nibbles = stream.read_u8()?;\n  112 |         buffer[byte * 2] = status.expand_nibble(nibbles, Nibble::Upper);\n  113 |         buffer[byte * 2 + 1] = status.expand_nibble(nibbles, Nibble::Lower);\n  114 |     }","lines":13},{"ref":"symphonia-codec-adpcm/src/lib.rs:88-90","code":"   88 |         if params.frames_per_block.is_none_or(|v| v == 0) {\n   89 |             return unsupported_error(\"adpcm: valid frames per block is required\");\n   90 |         }","lines":3}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","description":"`unpack_vq_lookup_type1`/`type2` allocate `vec![0.0; codebook_entries as usize * codebook_dimensions as usize]` from attacker-controlled values. `codebook_entries` (24-bit, up to 16M) times `codebook_dimensions` (up to 65535) can be ~1.1e12 elements * 4 bytes, an unbounded multi-terabyte allocation that aborts the process (OOM). No upper bound is enforced relative to the actual setup-header size.","fix":"Bound the total VQ table size (entries*dimensions) to a sane maximum, or stream-validate it against the number of multiplicands actually readable from the bitstream, returning a decode_error otherwise.","locations":[{"ref":"symphonia-codec-vorbis/src/codebook.rs:56-56","code":"   56 |     let mut vq_lookup = vec![0.0; codebook_entries as usize * codebook_dimensions as usize];","lines":1},{"ref":"symphonia-codec-vorbis/src/codebook.rs:89-89","code":"   89 |     let mut vq_lookup = vec![0.0; codebook_entries as usize * codebook_dimensions as usize];","lines":1}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","description":"`Probe::register` panics (`panic!(\"invalid marker length...\")`) when a registered format/metadata reader supplies a marker shorter than 2 or longer than 16 bytes. Although markers come from first-party `probe_data()`, this is a hard panic reachable purely from (mis)configuration of a registered reader rather than a `Result`, so a single malformed marker in any registered crate aborts the whole process at `Probe` construction time. Markers of length 0/1 are plausible (e.g., single-byte sync codes).","fix":"Return a `Result` from `register`/`register_*` (or silently skip and `warn!`) instead of panicking, and document the 2..=16 byte constraint. At minimum, handle len < 2 and len > 16 gracefully rather than aborting.","locations":[{"ref":"symphonia-core/src/formats/probe.rs:407-416","code":"  407 |         for marker in candidate.spec.markers {\n  408 |             let mut prefix = [0u8; 2];\n  409 | \n  410 |             match marker.len() {\n  411 |                 2..=16 => prefix.copy_from_slice(&marker[0..2]),\n  412 |                 _ => panic!(\"invalid marker length (only 2-16 bytes supported).\"),\n  413 |             }\n  414 | \n  415 |             self.filter.insert(&prefix);\n  416 |         }","lines":10}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","description":"`read_codebook` indexes `codebook.table[base + ...]` and computes `bit_shift = u64::BITS - bits_per_block` (LTR) or `bit_mask = (1 << bits_per_block) - 1` (RTL) without guarding against an empty codebook. For an empty `Codebook` (`table` empty, `bits_per_block == 0`), the LTR path does `bits >> 64` (panic in debug, defined-but-wrong in release) and then indexes `table[0]` on an empty Vec (panic). `Codebook` is publicly constructible empty via `CodebookBuilder::make(&[],&[],&[])`.","fix":"Return an error (or debug_assert) when `codebook.is_empty()` at the start of `read_codebook`, or guard the bit-shift/index against an empty table.","locations":[{"ref":"symphonia-core/src/io/bit.rs:784-790","code":"  784 |         let bits_per_block = codebook.bits_per_block;\n  785 |         let bit_shift = u64::BITS - bits_per_block;\n  786 | \n  787 |         let mut base = 0;\n  788 | \n  789 |         loop {\n  790 |             match codebook.table[base + (bits >> bit_shift) as usize] {","lines":7},{"ref":"symphonia-core/src/io/bit.rs:1224-1230","code":" 1224 |         let bits_per_block = codebook.bits_per_block;\n 1225 |         let bit_mask = (1 << bits_per_block) - 1;\n 1226 | \n 1227 |         let mut base = 0;\n 1228 | \n 1229 |         loop {\n 1230 |             match codebook.table[base + (bits & bit_mask) as usize] {","lines":7}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","description":"MoofSegment::sample_timing/ts_sample/sample_data index `mvex.trexs[track_num]` directly. track_num ranges over `mvex.trexs.len()` when the segment is built, but moov.rs only warns (does not error) when a trak has no matching trex, and the demuxer only checks `mvex.trexs.len() == moov.traks.len()` (count equality, not id matching). If trex/trak counts are equal but ids mismatch, MoofSegment::new (stream.rs:97) iterates trexs by index and the resulting seq has len == trexs.len(); a subsequent index into trexs[track_num] is in-bounds, but `mvex.trexs[track_num]` in the StreamSegment methods is indexed by the same track_num so is consistent. The real risk: try_get_traf uses `self.seq[track_num]` and `self.moof.trafs[idx]` where idx came from another moof; an index built from a different moof is not re-validated. Indexing self.moof.trafs[idx] is safe (idx was produced from this moof), but seq[track_num] relies on callers always passing track_num < trexs.len().","fix":"Replace the `[track_num]` indexing of mvex.trexs with `.get(track_num)` returning a decode error, to be robust if track_num ever exceeds trexs length, and tighten the moov/mvex consistency check to require an id match per track rather than only count equality.","locations":[{"ref":"symphonia-format-isomp4/src/stream.rs:155-162","code":"  155 |         let mvex = match self.moov.mvex.as_ref() {\n  156 |             Some(v) => v,\n  157 |             None => return decode_error(\"isomp4: fragmented stream missing mvex atom\"),\n  158 |         };\n  159 |         let default_dur = traf\n  160 |             .tfhd\n  161 |             .default_sample_duration\n  162 |             .unwrap_or(mvex.trexs[track_num].default_sample_duration);","lines":8},{"ref":"symphonia-format-isomp4/src/stream.rs:191-198","code":"  191 |         let mvex = match self.moov.mvex.as_ref() {\n  192 |             Some(v) => v,\n  193 |             None => return decode_error(\"isomp4: fragmented stream missing mvex atom\"),\n  194 |         };\n  195 |         let default_dur = traf\n  196 |             .tfhd\n  197 |             .default_sample_duration\n  198 |             .unwrap_or(mvex.trexs[track_num].default_sample_duration);","lines":8},{"ref":"symphonia-format-isomp4/src/stream.rs:240-245","code":"  240 |         let mvex = match self.moov.mvex.as_ref() {\n  241 |             Some(v) => v,\n  242 |             None => return decode_error(\"isomp4: fragmented stream missing mvex atom\"),\n  243 |         };\n  244 |         let default_size =\n  245 |             traf.tfhd.default_sample_size.unwrap_or(mvex.trexs[track_num].default_sample_size);","lines":6}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","description":"Reachable panics on attacker-controlled Vorbis codebook data in lookup1_values. The two `assert!`s validate a floating-point nth-root computation against the entries/dimensions read from the setup header; crafted values can make the asserts fail and panic. Additionally `value.pow(dimensions)` / `(value+1).pow(dimensions)` can overflow u32 and panic in debug builds. This is reachable from the untrusted setup header via skip_codebook -> lookup1_values.","fix":"Replace the asserts with graceful error returns (return Result), and use checked_pow / u64 arithmetic so malformed dimensions/entries produce a decode error rather than a panic.","locations":[{"ref":"symphonia-format-ogg/src/mappings/vorbis.rs:731-740","code":"  731 | fn lookup1_values(entries: u32, dimensions: u16) -> u32 {\n  732 |     // (value ^ dimensions) <= entries\n  733 |     // [(value ^ dimensions) ^ (1 / dimensions)] = lower[entries ^ (1 / dimensions)]\n  734 |     // value = lower[entries ^ (1 / dimensions)]\n  735 |     let value = (entries as f32).powf(1.0f32 / f32::from(dimensions)).floor() as u32;\n  736 | \n  737 |     assert!(value.pow(u32::from(dimensions)) <= entries);\n  738 |     assert!((value + 1).pow(u32::from(dimensions)) > entries);\n  739 | \n  740 |     value","lines":10}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","description":"ALAC `read_rice_code` calls `bs.read_bits_leq32(kb)` (and the zero-run path uses k.min(self.kb)). `kb` originates from `config.kb` (a u8 from the magic cookie, up to 255). `read_bits_leq32` only `debug_assert!`s `bit_width <= 32`, so a magic cookie with kb > 32 panics in debug/fuzzing builds and computes garbage via a shift-amount underflow in release builds. The ALAC decoder does not validate kb/mb/pb ranges from the cookie.","fix":"Validate that config.kb (and mb, pb) are within sane bounds (kb <= 32) in AlacDecoder::try_new, returning unsupported_error otherwise, or clamp k/kb to 32 before calling read_bits_leq32.","locations":[{"ref":"symphonia-codec-alac/src/lib.rs:605-639","code":"  605 | fn read_rice_code<B: ReadBitsLtr>(bs: &mut B, k: u32, kb: u32) -> Result<u32> {\n  606 |     let prefix = bs.read_unary_ones_capped(9)?;\n  607 | \n  608 |     // If the prefix is > 8, the value is read as an arbitrary width unsigned integer.\n  609 |     let value = if prefix > 8 {\n  610 |         bs.read_bits_leq32(kb)?\n  611 |     }\n  612 |     else if k > 1 {\n  613 |         // The reference decoder specifies prefix to be multiplied by a parameter `m`. The parameter\n  614 |         // `m` is always `(1<<k)-1` which is `2^k - 1`. This can be rewritten using a bit-shift.\n  615 |         let value = (prefix << k) - prefix;\n  616 | \n  617 |         // Ideally, we need to read, but not consume, `k` bits here. This is because if the value is\n  618 |         // less-than 2 we must only consume `k-1` bits. The bit reader does not support peeking,\n  619 |         // therefore, we read the `k-1` top-most bits. If the value is > 0, then the `k`-bit value\n  620 |         // would be > 2. In that case, we'll then read the least-significant bit in a second read\n  621 |         // operation.\n  622 |         let suffix = bs.read_bits_leq32(k - 1)?;\n  623 | \n  624 |         if suffix > 0 {\n  625 |             // Shift suffix left by 1 because it is missing its LSb, and then read the missing bit.\n  626 |             value + (suffix << 1) + bs.read_bit()? - 1\n  627 |         }\n  628 |         else {\n  629 |             value\n  630 |         }\n  631 |     }\n  632 |     else if k == 1 {\n  633 |         prefix\n  634 |     }\n  635 |     else {\n  636 |         0\n  637 |     };\n  638 | \n  639 |     Ok(value)","lines":35},{"ref":"symphonia-codec-alac/src/lib.rs:100-110","code":"  100 |         Ok(ElementChannel {\n  101 |             pred_bits: u32::from(pred_bits),\n  102 |             kb: u32::from(config.kb),\n  103 |             mb: u32::from(config.mb),\n  104 |             mode,\n  105 |             shift,\n  106 |             pb_factor,\n  107 |             lpc_order,\n  108 |             lpc_coeffs,\n  109 |         })\n  110 |     }","lines":11}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","description":"`RandomNoise::from` computes `random >> (32 - n_bits)`. It is a public function with no bound on `n_bits`. Calling it with `n_bits == 0` shifts an i32 by 32 (shift overflow: panic in debug, masked-shift garbage in release), and `n_bits > 32` underflows the `32 - n_bits` u32 subtraction producing a huge shift. The built-in dither algorithms never pass these values, but the API allows it.","fix":"Document and/or assert `1 <= n_bits <= 32`, or saturate: `if n_bits == 0 { return RandomNoise(0); }` and clamp `n_bits` to 32.","locations":[{"ref":"symphonia-core/src/audio/conv.rs:99-103","code":"   99 |         /// Instantiate a noise sample from a random 32-bit source.\n  100 |         pub fn from(random: i32, n_bits: u32) -> Self {\n  101 |             RandomNoise(random >> (32 - n_bits))\n  102 |         }\n  103 |     }","lines":5}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","description":"`TextChunk::parse` matches the 4-byte tag and uses `_ => unreachable!()` for the std_tag, relying on the caller (`parse_tag`) to only dispatch NAME/AUTH/(c) /ANNO. This coupling means any future addition of a Text tag in parse_tag without updating this match becomes a guaranteed panic on attacker input. Defensive maintainability hazard.","fix":"Replace `unreachable!()` with a decode_error fallback so an unexpected tag cannot panic.","locations":[{"ref":"symphonia-format-riff/src/aiff/chunks.rs:439-445","code":"  439 |         let std_tag = match &tag {\n  440 |             b\"NAME\" => StandardTag::TrackTitle(value.clone()),\n  441 |             b\"AUTH\" => StandardTag::Encoder(value.clone()),\n  442 |             b\"(c) \" => StandardTag::Copyright(value.clone()),\n  443 |             b\"ANNO\" => StandardTag::Comment(value.clone()),\n  444 |             _ => unreachable!(),\n  445 |         };","lines":7}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","description":"`decode_unsynchronisation` computes `len - 1` and loops `while src < len - 1`. If called with an empty slice (len == 0), `len - 1` underflows and panics in debug (wraps to usize::MAX in release, then indexes `buf[src]` out of bounds -> panic). The only current caller (read_id3v2p4_frame) guarantees a non-empty buffer, but the function is `pub` within the crate and the precondition is undocumented, making this fragile.","fix":"Guard the empty case at the top: `if buf.is_empty() { return buf; }`, or restructure the loop to avoid `len - 1`.","locations":[{"ref":"symphonia-metadata/src/id3v2/unsync.rs:31-53","code":"   31 | pub fn decode_unsynchronisation(buf: &mut [u8]) -> &mut [u8] {\n   32 |     let len = buf.len();\n   33 |     let mut src = 0;\n   34 |     let mut dst = 0;\n   35 | \n   36 |     // Decode the unsynchronisation scheme in-place.\n   37 |     while src < len - 1 {\n   38 |         buf[dst] = buf[src];\n   39 |         dst += 1;\n   40 |         src += 1;\n   41 | \n   42 |         if buf[src - 1] == 0xff && buf[src] == 0x00 {\n   43 |             src += 1;\n   44 |         }\n   45 |     }\n   46 | \n   47 |     if src < len {\n   48 |         buf[dst] = buf[src];\n   49 |         dst += 1;\n   50 |     }\n   51 | \n   52 |     &mut buf[..dst]\n   53 | }","lines":23}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","description":"`pad_key` slices the key string with `key.split_at(pad - 2)` using a byte offset derived from a character-count-based pad (`optimal_tag_key_pad` measures with `chars().count()`). For tag keys containing multi-byte UTF-8 characters, `pad - 2` may not fall on a char boundary, causing `split_at` to panic. Tag keys come from arbitrary media metadata, so this is attacker/file controllable, though only reachable in the printing path of a CLI tool.","fix":"Truncate by characters rather than bytes, e.g. use `key.char_indices().nth(pad - 2)` to find a valid boundary, or build the truncated string from `key.chars().take(pad - 2)`. Also guard against `pad < 2`.","locations":[{"ref":"symphonia-play/src/ui.rs:626-634","code":"  626 | fn pad_key(key: &str, pad: usize) -> String {\n  627 |     if key.len() <= pad {\n  628 |         format!(\"{key:<pad$}\")\n  629 |     }\n  630 |     else {\n  631 |         // Key length too large.\n  632 |         format!(\"{:.<pad$}\", key.split_at(pad - 2).0)\n  633 |     }\n  634 | }","lines":9}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"CAF ChannelLayout::read reads `channel_description_count` as an unchecked u32 and builds the Vec via `(0..count).map(...).collect()`. The range iterator reports an exact size_hint, so `collect` pre-reserves capacity for `count` ChannelDescription structs (28 bytes each) before reading anything. A crafted `chan` chunk with count == u32::MAX requests a multi-gigabyte allocation up-front (potential OOM / abort), independent of the actual chunk size. The PacketTable code already guards against this with MAX_TABLE_INITIAL_CAPACITY; ChannelLayout does not.","fix":"Validate `channel_description_count` against the remaining chunk_size (each description is 20 bytes on disk) and/or cap the pre-reserved capacity (e.g. with_capacity(count.min(CAP)) and push in a loop), returning a decode_error for inconsistent sizes.","locations":[{"ref":"symphonia-format-caf/src/chunks.rs:329-342","code":"  329 |     pub fn read(reader: &mut MediaSourceStream<'_>, chunk_size: i64) -> Result<Self> {\n  330 |         if chunk_size < 12 {\n  331 |             return invalid_chunk_size_error(\"Channel Layout\", chunk_size);\n  332 |         }\n  333 | \n  334 |         let channel_layout = reader.read_be_u32()?;\n  335 |         let channel_bitmap = reader.read_be_u32()?;\n  336 |         let channel_description_count = reader.read_be_u32()?;\n  337 |         let channel_descriptions: Vec<ChannelDescription> = (0..channel_description_count)\n  338 |             .map(|_| ChannelDescription::read(reader))\n  339 |             .collect::<Result<_>>()?;\n  340 | \n  341 |         Ok(Self { channel_layout, channel_bitmap, channel_descriptions })\n  342 |     }","lines":14}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"`RefProcess` wraps a `std::process::Child` but never calls `wait()` or `kill()`. When `run_test` returns (success or error) the `RefProcess` is dropped; `Child` does not kill or reap the child on drop, leaving the reference decoder (ffmpeg/flac/mpg123/oggdec) as a zombie or, if it is blocked writing to a now-closed pipe, potentially lingering. For a long-running or repeatedly invoked check this leaks process handles.","fix":"Implement `Drop` for `RefProcess` (or explicitly at the end of `run_test`) that calls `child.kill()` followed by `child.wait()` to terminate and reap the reference process.","locations":[{"ref":"symphonia-check/src/main.rs:120-136","code":"  120 | struct RefProcess {\n  121 |     child: std::process::Child,\n  122 | }\n  123 | \n  124 | impl RefProcess {\n  125 |     fn try_spawn(decoder: RefDecoder, gapless: bool, path: &Path) -> Result<RefProcess> {\n  126 |         let mut cmd = match decoder {\n  127 |             RefDecoder::Ffmpeg => build_ffmpeg_command(path, gapless),\n  128 |             RefDecoder::Flac => build_flac_command(path),\n  129 |             RefDecoder::Mpg123 => build_mpg123_command(path, gapless),\n  130 |             RefDecoder::Oggdec => build_oggdec_command(path),\n  131 |         };\n  132 | \n  133 |         let child = cmd.spawn()?;\n  134 |         Ok(RefProcess { child })\n  135 |     }\n  136 | }","lines":17},{"ref":"symphonia-check/src/main.rs:349-373","code":"  349 | fn run_test(path: &Path, opts: &TestOptions, result: &mut TestResult) -> Result<()> {\n  350 |     // 1. Start the reference decoder process.\n  351 |     let mut ref_process = RefProcess::try_spawn(opts.ref_decoder, opts.gapless, path)?;\n  352 | \n  353 |     // 2. Instantiate a Symphonia decoder for the reference process output.\n  354 |     let ref_ms = Box::new(ReadOnlySource::new(match ref_process.child.stdout.take() {\n  355 |         Some(s) => s,\n  356 |         None => return unsupported_error(\"reference decoder has no stdout\"),\n  357 |     }));\n  358 |     let ref_mss = MediaSourceStream::new(ref_ms, Default::default());\n  359 | \n  360 |     let mut ref_inst = DecoderInstance::try_open(ref_mss, Default::default(), Default::default())?;\n  361 | \n  362 |     // 3. Instantiate a Symphonia decoder for the test target.\n  363 |     let tgt_ms = Box::new(File::open(path)?);\n  364 |     let tgt_mss = MediaSourceStream::new(tgt_ms, Default::default());\n  365 | \n  366 |     let tgt_fmt_opts = Default::default();\n  367 |     let tgt_dec_opts = AudioDecoderOptions::default().gapless(opts.gapless);\n  368 | \n  369 |     let mut tgt_inst = DecoderInstance::try_open(tgt_mss, tgt_fmt_opts, tgt_dec_opts)?;\n  370 | \n  371 |     // 4. Begin check.\n  372 |     run_check(&mut ref_inst, &mut tgt_inst, opts, result)\n  373 | }","lines":25}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"Codebook VQ lookup_type 2 computes `lookup_values = codebook_entries * u32::from(codebook_dimensions)`. `codebook_entries` is a 24-bit value (up to ~16M) and `codebook_dimensions` is up to 65535, so the multiplication overflows u32. In debug this panics; in release it wraps to a small value, producing a too-small `multiplicands`/`vq_lookup` and then a mismatched `unpack_vq_lookup_type2` (which indexes `multiplicands[offset]` with offset up to entries*dim) leading to either wrong output or an out-of-bounds slice panic.","fix":"Use checked_mul and return a decode_error on overflow. Also sanity-bound the resulting allocation size against the available bitstream length.","locations":[{"ref":"symphonia-codec-vorbis/src/codebook.rs:319-323","code":"  319 |                 let lookup_values = match lookup_type {\n  320 |                     1 => lookup1_values(codebook_entries, codebook_dimensions),\n  321 |                     2 => codebook_entries * u32::from(codebook_dimensions),\n  322 |                     _ => unreachable!(),\n  323 |                 };","lines":5}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`BufReader::read_buf_bytes_ref` computes `self.pos + len > self.buf.len()` where `len` is a caller-supplied `usize` derived from parsed input. If `len` is large enough, `self.pos + len` overflows `usize` (panic in debug, wrap in release), and on wrap the bounds check passes, leading to an out-of-bounds slice `&self.buf[self.pos - len..self.pos]` or incorrect behavior.","fix":"Use a non-overflowing check, e.g. `if len > self.buf.len() - self.pos { return underrun_error(); }` (pos is always <= buf.len()).","locations":[{"ref":"symphonia-core/src/io/buf_reader.rs:80-86","code":"   80 |     pub fn read_buf_bytes_ref(&mut self, len: usize) -> io::Result<&'a [u8]> {\n   81 |         if self.pos + len > self.buf.len() {\n   82 |             return underrun_error();\n   83 |         }\n   84 |         self.pos += len;\n   85 |         Ok(&self.buf[self.pos - len..self.pos])\n   86 |     }","lines":7}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In `MediaSourceStream::seek`, `SeekFrom::Current(delta_pos)` computes `delta_pos - self.unread_buffer_len() as i64`. With an attacker-influenced large positive `delta_pos` (close to i64::MAX) this subtraction is unchecked and can overflow i64, panicking in debug builds and producing a wrong seek target in release. Seek deltas can be derived from untrusted container offsets.","fix":"Use `delta_pos.checked_sub(self.unread_buffer_len() as i64)` and return an error on overflow, or perform the arithmetic in a wider/saturating manner.","locations":[{"ref":"symphonia-core/src/io/media_source_stream.rs:224-227","code":"  224 |             io::SeekFrom::Current(delta_pos) => {\n  225 |                 let delta = delta_pos - self.unread_buffer_len() as i64;\n  226 |                 self.inner.seek(io::SeekFrom::Current(delta))\n  227 |             }","lines":4}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`read_audio_description_chunk` computes `(desc.bytes_per_packet * 8) / desc.channels_per_frame` to derive bits_per_coded_sample. `bytes_per_packet` is an attacker-controlled u32 read directly from the file; `bytes_per_packet * 8` overflows u32 for values > 0x1FFF_FFFF, panicking in debug/fuzzing builds and wrapping to a wrong value in release builds.","fix":"Use checked/widened arithmetic, e.g. `(u64::from(desc.bytes_per_packet) * 8) / u64::from(desc.channels_per_frame)` and validate it fits in u32, or saturate.","locations":[{"ref":"symphonia-format-caf/src/chunks.rs:153-153","code":"  153 |         let bytes_per_packet = reader.read_be_u32()?;","lines":1},{"ref":"symphonia-format-caf/src/demuxer.rs:386-389","code":"  386 |             .for_codec(desc.codec_id()?)\n  387 |             .with_sample_rate(desc.sample_rate as u32)\n  388 |             .with_bits_per_sample(desc.bits_per_channel)\n  389 |             .with_bits_per_coded_sample((desc.bytes_per_packet * 8) / desc.channels_per_frame);","lines":4}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"SidxAtom::read computes segment offsets as `anchor + u64::from(read_u32())` (v0) or `anchor + read_u64()` (v1) with unchecked addition. `anchor` is the atom end position (header.pos()+atom_len), and the added value is fully attacker-controlled, so the addition can overflow u64 and panic in debug builds (and wrap in release), producing a bogus first_offset.","fix":"Use checked_add and return decode_error on overflow for both the earliest_pts/first_offset computations.","locations":[{"ref":"symphonia-format-isomp4/src/atoms/sidx.rs:57-61","code":"   57 |         let (earliest_pts, first_offset) = match version {\n   58 |             0 => (u64::from(it.read_u32()?), anchor + u64::from(it.read_u32()?)),\n   59 |             1 => (it.read_u64()?, anchor + it.read_u64()?),\n   60 |             _ => return decode_error(\"isomp4 (sidx): invalid version\"),\n   61 |         };","lines":5}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"MoofSegment timing/positioning helpers accumulate with unchecked arithmetic on values derived from file-controlled trun fields: `trun_ts_offset + ts`, `ts_accum + trun_dur`, `trun_offset += trun_size`, and the negative data-offset path `traf_base_pos - u64::from(offset.wrapping_abs() as u32)`. The subtraction can underflow (panic in debug, wrap in release) when a fragment supplies a negative data offset larger than the base position; the additions can overflow for large declared durations/sizes.","fix":"Use checked_add/checked_sub (or saturating variants where appropriate) and surface a decode error on overflow/underflow instead of relying on wrapping behaviour.","locations":[{"ref":"symphonia-format-isomp4/src/stream.rs:168-176","code":"  168 |                 let (ts, dur) = trun.sample_timing(sample_num_rel, default_dur);\n  169 |                 return Ok(Some(SampleTiming { ts: trun_ts_offset + ts, dur }));\n  170 |             }\n  171 | \n  172 |             let trun_dur = trun.total_duration(default_dur);\n  173 | \n  174 |             sample_num_rel -= trun.sample_count;\n  175 |             trun_ts_offset += trun_dur;\n  176 |         }","lines":9},{"ref":"symphonia-format-isomp4/src/stream.rs:204-213","code":"  204 |             // If the timestamp after the track run is greater than the desired timestamp, then the\n  205 |             // desired sample must be in this run of samples.\n  206 |             if ts_accum + trun_dur > ts {\n  207 |                 sample_num += trun.ts_sample(ts - ts_accum, default_dur);\n  208 |                 return Ok(Some(sample_num));\n  209 |             }\n  210 | \n  211 |             sample_num += trun.sample_count;\n  212 |             ts_accum += trun_dur;\n  213 |         }","lines":10},{"ref":"symphonia-format-isomp4/src/stream.rs:251-281","code":"  251 |             if let Some(offset) = trun.data_offset {\n  252 |                 // The offset for the run is relative to the anchor-point defined in the track\n  253 |                 // fragment header.\n  254 |                 trun_offset = if offset.is_negative() {\n  255 |                     traf_base_pos - u64::from(offset.wrapping_abs() as u32)\n  256 |                 }\n  257 |                 else {\n  258 |                     traf_base_pos + off        let lookup_values = match lookup_type {\n  501 |                 1 => lookup1_values(codebook_entries, codebook_dimensions),\n  502 |                 2 => codebook_entries * u32::from(codebook_dimensions),\n  503 |                 _ => unreachable!(),\n  504 |             };\n  505 | \n  506 |             // Multiplicands\n  507 |             bs.ignore_bits(lookup_values * value_bits)?;","lines":8}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In the APEv2 header parser, `let real_size = size + if has_header { 32 } else { 0 };` adds 32 to an attacker-controlled `u32` size without checking for overflow. A crafted APEv2 footer with size near u32::MAX and the has_header flag set overflows in release builds (wrapping `real_size` to a small value), which then feeds the seek at line 366 (`-(i64::from(header.size))`) and footer/size consistency checks, producing incorrect framing. In debug builds this panics.","fix":"Use checked/saturating arithmetic: `let real_size = size.saturating_add(if has_header { 32 } else { 0 });`, or validate the size against the remaining stream length before use.","locations":[{"ref":"symphonia-metadata/src/ape.rs:225-228","code":"  225 |                 // The header size is not included in the size written to the tag.\n  226 |                 let real_size = size + if has_header { 32 } else { 0 };\n  227 | \n  228 |                 (real_size, has_footer, has_header, is_header)","lines":4}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`read_flac_application_block` computes `block_length as usize - 4` to size the data read. `block_length` is attacker-controlled (FLAC metadata block length). If `block_length < 4`, this subtraction underflows. In release builds this wraps to a huge usize, causing `read_boxed_slice_exact` to attempt an enormous allocation/read (DoS); in debug builds it panics. A 4-byte application block (only the identifier, no data) is legal.","fix":"Validate `block_length >= 4` before subtracting, e.g. `let data_len = block_length.checked_sub(4).ok_or_else(|| decode_error(...))? as usize;` and return a decode error otherwise.","locations":[{"ref":"symphonia-metadata/src/embedded/flac.rs:171-181","code":"  171 | pub fn read_flac_application_block<B: ReadBytes>(\n  172 |     reader: &mut B,\n  173 |     block_length: u32,\n  174 | ) -> Result<VendorDataAttachment> {\n  175 |     // Read the application identifier. Usually this is just 4 ASCII characters, but it is not\n  176 |     // limited to that. Non-printable ASCII characters must be escaped to create a valid UTF8\n  177 |     // string.\n  178 |     let ident = escape_identifier(&reader.read_quad_bytes()?);\n  179 |     let data = reader.read_boxed_slice_exact(block_length as usize - 4)?;\n  180 |     Ok(VendorDataAttachment { ident, data })\n  181 | }","lines":11}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In `preseek_coarse`, after a coarse seek the absolute frame position is computed as `seek_pos = (seek_pos_rel + first_packet_pos).saturating_sub(MAX_MPEG_FRAME_SIZE)`. When seeking close to the start of the audio, `seek_pos` can end up *before* `first_packet_pos`. The subsequent resync (`read_mpeg_frame_strict`) may then sync to a frame whose position is below `first_packet_pos`, after which `self.reader.pos() - self.first_packet_pos` (line 541) and `byte_len - self.first_packet_pos` (line 504) underflow, panicking in debug builds and wrapping to a huge value in release builds. Reachable on a seekable but unusual/malformed stream.","fix":"Clamp the resync seek target to be `>= first_packet_pos`, and/or use `saturating_sub`/`checked_sub` when computing `reader.pos() - first_packet_pos` and `byte_len - first_packet_pos`.","locations":[{"ref":"symphonia-bundle-mp3/src/demuxer.rs:529-545","code":"  529 |         let seek_pos = (seek_pos_rel + u128::from(self.first_packet_pos))\n  530 |             .saturating_sub(MAX_MPEG_FRAME_SIZE as u128);\n  531 | \n  532 |         // Seek the media source stream.\n  533 |         self.reader.seek(SeekFrom::Start(\n  534 |             seek_pos.try_into().map_err(|_| Error::SeekError(SeekErrorKind::OutOfRange))?,\n  535 |         ))?;\n  536 | \n  537 |         // Resync to the start of the next MPEG frame.\n  538 |         let (header, _) = read_mpeg_frame_strict(&mut self.reader)?;\n  539 | \n  540 |         // The byte position of the next MPEG frame relative to the start of the audio data.\n  541 |         let audio_byte_pos = u128::from(self.reader.pos() - self.first_packet_pos);\n  542 | \n  543 |         // Calculate, roughly, the duration from the start of the audio of the packet based on the\n  544 |         // byte position after resync.\n  545 |         let dur_to_pkt = Duration::from(((audio_byte_pos * total_dur) / audio_byte_len) as u64);","lines":17}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"ADTS approximate-duration multiplication can overflow u64. `remaining_len / (n_bytes / parsed_n_frames) * SAMPLES_PER_AAC_PACKET.get()` multiplies an attacker-influenced frame-count estimate by 1024 with no overflow check; for very large/contrived files the product can wrap, yielding a bogus num_frames/duration. Division precedes multiplication, mitigating but not eliminating the risk.","fix":"Use saturating_mul (and saturating_div guards) when computing the estimated frame count, or compute in u128 and clamp.","locations":[{"ref":"symphonia-codec-aac/src/adts.rs:484-487","code":"  484 |     match parsed_n_frames {\n  485 |         0 => Ok(None),\n  486 |         _ => Ok(Some(remaining_len / (n_bytes / parsed_n_frames) * SAMPLES_PER_AAC_PACKET.get())),\n  487 |     }","lines":4}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`render_point` computes `x - x0` and `adx = x1 - x0` on u32 without checking ordering. While current call sites (floor1 x_list always contains 0 and the max value as the first two entries) make x0<x1 and x>=x0 hold in practice, the function is unguarded; a future change to neighbor selection or x_list construction would silently underflow (debug panic / release wraparound) and feed a huge value into `err / adx`.","fix":"Use saturating/checked subtraction, or assert the ordering invariant explicitly to make the precondition clear and fail loudly in debug.","locations":[{"ref":"symphonia-codec-vorbis/src/floor.rs:776-782","code":"  776 | fn render_point(x0: u32, y0: i32, x1: u32, y1: i32, x: u32) -> i32 {\n  777 |     let dy = y1 - y0;\n  778 |     let adx = x1 - x0;\n  779 |     let err = dy.unsigned_abs() * (x - x0);\n  780 |     let off = err / adx;\n  781 |     if dy < 0 { y0 - off as i32 } else { y0 + off as i32 }\n  782 | }","lines":7}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"The arithmetic operator impls for `i24`/`u24` (Add, Sub, Mul, Div, Shl, etc.) use the plain non-wrapping operators on the inner integer (`self.0 + other.0`, `self.0 * other.0`, ...). Unlike the conversion code which deliberately uses `wrapping_*`, these will panic on overflow in debug builds and silently produce out-of-24-bit-range values in release builds. Because the result is not re-clamped to 24 bits, even non-overflowing operations can yield an `i24`/`u24` whose inner value falls outside the documented valid range, which later `clamped()`-free code may mishandle.","fix":"Decide on consistent semantics: either use `wrapping_*` (matching conv.rs) and re-clamp where a valid range is required, or document that these ops operate on the raw inner i32/u32 and may exceed 24 bits.","locations":[{"ref":"symphonia-core/src/audio/sample.rs:290-315","code":"  290 | impl core::ops::Add<i24> for i24 {\n  291 |     type Output = i24;\n  292 | \n  293 |     #[inline]\n  294 |     fn add(self, other: Self) -> Self {\n  295 |         i24(self.0 + other.0)\n  296 |     }\n  297 | }\n  298 | \n  299 | impl core::ops::Sub<i24> for i24 {\n  300 |     type Output = i24;\n  301 | \n  302 |     #[inline]\n  303 |     fn sub(self, other: Self) -> Self {\n  304 |         i24(self.0 - other.0)\n  305 |     }\n  306 | }\n  307 | \n  308 | impl core::ops::Mul<i24> for i24 {\n  309 |     type Output = i24;\n  310 | \n  311 |     #[inline]\n  312 |     fn mul(self, other: Self) -> Self {\n  313 |         i24(self.0 * other.0)\n  314 |     }\n  315 | }","lines":26},{"ref":"symphonia-core/src/audio/sample.rs:475-500","code":"  475 | impl core::ops::Add<u24> for u24 {\n  476 |     type Output = u24;\n  477 | \n  478 |     #[inline]\n  479 |     fn add(self, other: Self) -> Self {\n  480 |         u24(self.0 + other.0)\n  481 |     }\n  482 | }\n  483 | \n  484 | impl core::ops::Sub<u24> for u24 {\n  485 |     type Output = u24;\n  486 | \n  487 |     #[inline]\n  488 |     fn sub(self, other: Self) -> Self {\n  489 |         u24(self.0 - other.0)\n  490 |     }\n  491 | }\n  492 | \n  493 | impl core::ops::Mul<u24> for u24 {\n  494 |     type Output = u24;\n  495 | \n  496 |     #[inline]\n  497 |     fn mul(self, other: Self) -> Self {\n  498 |         u24(self.0 * other.0)\n  499 |     }\n  500 | }","lines":26}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`BufReader::ignore_bytes` checks `self.buf.len() - self.pos < count as usize`. On 32-bit targets, `count: u64` is truncated by `count as usize`; a `count` whose low 32 bits are small but whose value exceeds `u32::MAX` would pass the bounds check and then `self.pos += count as usize` advances by the truncated amount, silently desynchronizing the stream position instead of returning an error.","fix":"Compare in u64 space: `if (self.buf.len() - self.pos) as u64 < count { return underrun_error(); }` before truncating to usize.","locations":[{"ref":"symphonia-core/src/io/buf_reader.rs:179-185","code":"  179 |     fn ignore_bytes(&mut self, count: u64) -> io::Result<()> {\n  180 |         if self.buf.len() - self.pos < count as usize {\n  181 |             return underrun_error();\n  182 |         }\n  183 | \n  184 |         self.pos += count as usize;\n  185 |         Ok(())","lines":7}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In the CAF PacketTable variable-size branches, `packet_offset += size` accumulates u64 packet sizes with no overflow check (the code even flags `// TODO: This could overflow...`). With many large variable-length sizes this can wrap, producing incorrect `data_offset` values used later for seeking (read_boxed_slice at a wrong position). `current_frame` uses checked_add, but the byte offset does not.","fix":"Use `packet_offset = packet_offset.checked_add(size).ok_or(...)?` in all three variable branches.","locations":[{"ref":"symphonia-format-caf/src/chunks.rs:500-547","code":"  500 |                 for _ in 0..total_packets {\n  501 |                     let size = read_variable_length_integer(reader)?;\n  502 |                     let frames = Duration::from(read_variable_length_integer(reader)?);\n  503 |                     packets.push(CafPacket {\n  504 |                         size,\n  505 |                         frames,\n  506 |                         start_frame: current_frame,\n  507 |                         data_offset: packet_offset,\n  508 |                     });\n  509 |                     current_frame = current_frame\n  510 |                         .checked_add(frames)\n  511 |                         .ok_or(Error::Unsupported(\"track too long\"))?;\n  512 |                     packet_offset += size; // TODO: This could overflow...\n  513 |                 }\n  514 |             }\n  515 |             // Variable bytes per packet, constant number of frames\n  516 |             (0, frames_per_packet) => {\n  517 |                 for _ in 0..total_packets {\n  518 |                     let size = read_variable_length_integer(reader)?;\n  519 |                     let frames = Duration::from(frames_per_packet);\n  520 |                     packets.push(CafPacket {\n  521 |                         size,\n  522 |                         frames,\n  523 |                         start_frame: current_frame,\n  524 |                         data_offset: packet_offset,\n  525 |                     });\n  526 |                     current_frame = current_frame\n  527 |                         .checked_add(frames)\n  528 |                         .ok_or(Error::Unsupported(\"track too long\"))?;\n  529 |                     packet_offset += size;\n  530 |                 }\n  531 |             }\n  532 |             // Constant bytes per packet, variable number of frames\n  533 |             (bytes_per_packet, 0) => {\n  534 |                 for _ in 0..total_packets {\n  535 |                     let size = bytes_per_packet as u64;\n  536 |                     let frames = Duration::from(read_variable_length_integer(reader)?);\n  537 |                     packets.push(CafPacket {\n  538 |                         size,\n  539 |                         frames,\n  540 |                         start_frame: current_frame,\n  541 |                         data_offset: packet_offset,\n  542 |                     });\n  543 |                     current_frame = current_frame\n  544 |                         .checked_add(frames)\n  545 |                         .ok_or(Error::Unsupported(\"track too long\"))?;\n  546 |                     packet_offset += size;\n  547 |                 }","lines":48}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`EbmlElementHeader::size`/`end` add `data_size + header_size` and `pos + size` without overflow checks. `data_size` is read from the file (up to ~2^56) and `pos` can be large; the additions could wrap. In practice `next_header` later compares `child_end > parent_end` and discards, but the unchecked arithmetic in `size()`/`end()` can produce a wrapped small value that defeats that bounds check for crafted inputs.","fix":"Use `checked_add` and return `None` (unknown/invalid) on overflow in both `size()` and `end()`.","locations":[{"ref":"symphonia-format-mkv/src/ebml.rs:191-199","code":"  191 |     pub(crate) fn end(&self) -> Option<u64> {\n  192 |         self.size().map(|size| self.pos + size)\n  193 |     }\n  194 | \n  195 |     /// If the data size of the element is known, returns the total size of the element including\n  196 |     /// the element header.\n  197 |     pub(crate) fn size(&self) -> Option<u64> {\n  198 |         self.data_size.map(|data_size| data_size + u64::from(self.header_size))\n  199 |     }","lines":9}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"EBML lace size delta accumulation can overflow. In `read_ebml_sizes`, each successive size is computed as `(last_size as i64 + delta) as u64`. With attacker-controlled signed VINT deltas this addition can overflow i64 (panic in debug builds, wraparound in release) and the `as u64` cast can produce a nonsensical huge size that is then passed to `read_boxed_slice_exact`. The subsequent total-size check is the only guard and is itself weak (see lacing.rs:170-177).","fix":"Use `last_size.checked_add_signed(delta)` and return a decode error on overflow/underflow rather than casting through i64.","locations":[{"ref":"symphonia-format-mkv/src/lacing.rs:34-48","code":"   34 | fn read_ebml_sizes<R: ReadBytes>(mut reader: R, num_frames: usize) -> Result<Vec<u64>> {\n   35 |     let mut sizes = Vec::with_capacity(num_frames);\n   36 |     for _ in 0..num_frames {\n   37 |         if let Some(last_size) = sizes.last().copied() {\n   38 |             let delta = read_signed_vint(&mut reader)?;\n   39 |             sizes.push((last_size as i64 + delta) as u64)\n   40 |         }\n   41 |         else {\n   42 |             let size = read_unsigned_vint(&mut reader)?;\n   43 |             sizes.push(size);\n   44 |         }\n   45 |     }\n   46 | \n   47 |     Ok(sizes)\n   48 | }","lines":15}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"Potential subtraction underflow in skip_mapping_type0_setup. `let max_ch = audio_channels - 1;` underflows (panic in debug, wrap in release) if audio_channels is 0. Currently the only caller passes ident.n_channels which read_ident_header rejects when 0, so it is not reachable today, but the function takes audio_channels as a parameter with no local guard, making it fragile to future callers.","fix":"Guard with `if audio_channels == 0 { return decode_error(...) }` (or use checked/saturating_sub) inside the function so it is robust regardless of caller.","locations":[{"ref":"symphonia-format-ogg/src/mappings/vorbis.rs:656-667","code":"  656 | fn skip_mapping_type0_setup(bs: &mut BitReaderRtl<'_>, audio_channels: u8) -> Result<()> {\n  657 |     let num_submaps = if bs.read_bool()? { bs.read_bits_leq32(4)? + 1 } else { 1 };\n  658 | \n  659 |     if bs.read_bool()? {\n  660 |         // Number of channel couplings (up-to 256).\n  661 |         let coupling_steps = bs.read_bits_leq32(8)? as u16 + 1;\n  662 | \n  663 |         // The maximum channel number.\n  664 |         let max_ch = audio_channels - 1;\n  665 | \n  666 |         // The number of bits to read for the magnitude and angle channel numbers. Never exceeds 8.\n  667 |         let coupling_bits = ilog(u32::from(max_ch));","lines":12}]},{"id":"OVF_19","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`FormatPcm::make_packet_info` and `FormatExtensible::make_packet_info` compute `frame_len = (bits_per_sample / 8) * num_channels` in u16. With bits_per_sample up to 65535 and num_channels up to 26+, this can overflow u16 (debug panic, release wrap) producing a wrong/zero frame length. num_channels is bounded but the product is not validated.","fix":"Compute frame_len in u32/u64, or validate bits_per_sample*num_channels fits in the target type before multiplying.","locations":[{"ref":"symphonia-format-riff/src/common.rs:213-217","code":"  213 |     pub fn make_packet_info(&self) -> Result<PacketInfo> {\n  214 |         let num_channels = self.channels.count() as u16;\n  215 |         let frame_len = (self.bits_per_sample / 8) * num_channels;\n  216 |         PacketInfo::without_blocks(u32::from(frame_len))\n  217 |     }","lines":5},{"ref":"symphonia-format-riff/src/common.rs:294-299","code":"  294 |     pub fn make_packet_info(&self) -> Result<PacketInfo> {\n  295 |         // NOTE: This is only valid for compressed sub-types.\n  296 |         let num_channels = self.channels.count() as u16;\n  297 |         let frame_len = (self.bits_per_sample / 8) * num_channels;\n  298 |         PacketInfo::without_blocks(u32::from(frame_len))\n  299 |     }","lines":6}]},{"id":"OVF_20","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In the PNG indexed-palette parser, `reader.ignore_bytes(u64::from(chunk_len + 4))` adds 4 to an attacker-controlled `u32` chunk length before widening to u64. If `chunk_len` is within 4 of u32::MAX, the `chunk_len + 4` addition overflows (panic in debug, wrap in release). The widening should happen before the addition.","fix":"Widen first: `reader.ignore_bytes(u64::from(chunk_len) + 4)?;`.","locations":[{"ref":"symphonia-metadata/src/utils/images.rs:155-156","code":"  155 |                 // Skip chunk data and CRC.\n  156 |                 reader.ignore_bytes(u64::from(chunk_len + 4))?;","lines":2}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In the Layer 1 decoder the bit-allocation read loop always iterates over both channel slots (`for chan in &mut alloc`) regardless of the actual channel count. For a mono (single channel) Layer 1 frame `num_channels == 1` but `bound == 32`, so this loop reads 4-bit allocations for 64 sub-band/channel slots instead of 32. This over-reads 32 nibbles (128 bits) and completely misaligns the rest of the bitstream, so every mono MPEG-1 Layer 1 frame is decoded into garbage (and likely errors out). The equivalent Layer 2 code correctly uses `&mut alloc[..num_channels]` (layer2/mod.rs:266), making this a copy/paste inconsistency.","fix":"Iterate only over the active channels, e.g. `for chan in &mut alloc[..num_channels]`, matching the Layer 2 implementation.","locations":[{"ref":"symphonia-bundle-mp3/src/layer1/mod.rs:102-112","code":"  102 |         for sb in 0..bound {\n  103 |             for chan in &mut alloc {\n  104 |                 let bits = bs.read_bits_leq32(4)? as u8;\n  105 | \n  106 |                 if bits > 0xe {\n  107 |                     return decode_error(\"mp1: invalid bit allocation\");\n  108 |                 }\n  109 | \n  110 |                 chan[sb] = if bits != 0 { bits + 1 } else { 0 };\n  111 |             }\n  112 |         }","lines":11}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`PacketBuilder::trimmed_dur` computes local `trim_start`/`trim_end` from the block duration and end PTS, but when computing the resulting `dur` it subtracts `self.trim_start` and `self.trim_end` (the builder's previously-set fields, which default to `Duration::ZERO`) instead of the freshly computed locals. As a result, `dur` does NOT have the trimmed regions removed: a packet built via `trimmed_dur` will report `dur == block_dur` while also carrying non-zero `trim_start`/`trim_end`, double-counting trimmed frames. This breaks the documented invariant `dur + trim_start + trim_end == block_dur` and corrupts gapless-playback timing for any reader that uses this helper.","fix":"Use the computed locals: `let dur = block_dur.saturating_sub(trim_start).saturating_sub(trim_end);`.","locations":[{"ref":"symphonia-core/src/packet.rs:330-342","code":"  330 |             let trim_start = negative.min(block_dur);\n  331 |             let mut trim_end = Duration::ZERO;\n  332 | \n  333 |             // It is only possible to trim the end of a packet if the end PTS is known.\n  334 |             if let Some(end_pts) = end_pts {\n  335 |                 if let Some(pkt_end_pts) = pts.0.checked_add(block_dur) {\n  336 |                     trim_end = pkt_end_pts.duration_from(end_pts).unwrap_or(Duration::ZERO);\n  337 |                 }\n  338 |             }\n  339 | \n  340 |             let dur = block_dur.saturating_sub(self.trim_start).saturating_sub(self.trim_end);\n  341 | \n  342 |             PacketBuilder { track_id, pts, dur: HasDur(dur), buf, dts, trim_start, trim_end }","lines":13}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In the VariableAudioPacket seek path, `partition_point` is run on the sub-slice `packets[search_range]`, returning an index RELATIVE to that sub-slice. When seeking forward, `search_range` starts at `*current_packet_index` (non-zero), but the returned `packet_after_ts` (after saturating_sub(1)) is then used to index the FULL `packets` slice (`&packets[seek_packet_index]`). This yields the wrong packet (off by `current_packet_index`) for any forward seek that is not from the very start, producing incorrect seek positions / timestamps.","fix":"Add `search_range.start` back to the partition_point result before using it as an absolute index, e.g. `let abs = search_range.start + packet_after_ts; let seek_packet_index = abs.saturating_sub(1);`.","locations":[{"ref":"symphonia-format-caf/src/demuxer.rs:266-278","code":"  266 |                 let search_range = if current_ts < required_ts {\n  267 |                     *current_pa
