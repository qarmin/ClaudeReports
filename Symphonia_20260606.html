cket_index..packets.len()\n  268 |                 }\n  269 |                 else {\n  270 |                     0..*current_packet_index\n  271 |                 };\n  272 | \n  273 |                 let packet_after_ts = packets[search_range]\n  274 |                     .partition_point(|packet| packet.start_frame < required_ts);\n  275 |                 let seek_packet_index = packet_after_ts.saturating_sub(1);\n  276 |                 let seek_packet = &packets[seek_packet_index];\n  277 | \n  278 |                 let seek_pos = self.data_start_pos + seek_packet.data_offset;","lines":13}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Unit mismatch when filtering meta-seek positions. `seek_positions` holds Segment-relative positions taken from SeekHead `Seek\\SeekPosition` elements (positions relative to the start of the Segment's data, as used later by `seek_to_child`, which adds the segment data position). However the retain filter compares them against `it.pos()`, which is the ABSOLUTE stream position. For any real file the absolute position is larger than the relative seek positions, so this filter discards most/all SeekHead entries, silently skipping meta-seek loading of Tracks/Info/Cues/Tags/Attachments/Chapters that appear after the current position.","fix":"Compare in the same coordinate space: subtract the segment data position from `it.pos()` before comparing (i.e. filter on `sp.1 >= it.pos() - segment_pos`), or convert seek positions to absolute before filtering. Capture `segment_pos` (already computed earlier) for the conversion.","locations":[{"ref":"symphonia-format-mkv/src/demuxer.rs:165-171","code":"  165 |         if is_seekable {\n  166 |             // All elements preceeding the element iterator's current position have already been\n  167 |             // read and do not need to be revisited.\n  168 |             seek_positions.retain(|sp| sp.1 >= it.pos());\n  169 |             // Make sure we don't jump backwards unnecessarily.\n  170 |             seek_positions.sort_by_key(|sp| sp.1);\n  171 | ","lines":7}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Infinite loop / hang during seek. In do_seek, `peek_logical_packet()` returns the front packet of the *current page's* logical stream. Every packet in a stream has `track_id` equal to that page's serial. When the current page belongs to a serial other than the one being sought, the branch `if packet.track_id != serial { continue; }` is taken, but the packet is never consumed and no new page is read (read_page is only in the `_ =>` arm). The loop therefore spins forever on the same peeked packet, hanging the demuxer on attacker-crafted chained/multiplexed OGG streams.","fix":"When the peeked packet does not belong to the sought serial, advance the stream/read a new page instead of `continue`-ing on the same peeked packet, e.g. call self.discard_logical_packet() (or fall through to read_page) so progress is guaranteed. Better: only peek packets from the stream matching `serial`.","locations":[{"ref":"symphonia-format-ogg/src/demuxer.rs:263-278","code":"  263 |         let actual_ts = loop {\n  264 |             match self.peek_logical_packet() {\n  265 |                 Some(packet) => {\n  266 |                     // Skip packets not belonging to the stream being seeked.\n  267 |                     if packet.track_id != serial {\n  268 |                         continue;\n  269 |                     }\n  270 | \n  271 |                     match packet.pts.checked_add(packet.dur) {\n  272 |                         Some(next_packet_ts) if next_packet_ts < target_ts => (),\n  273 |                         // Packet exceeds the requested timestamp, or the representable range.\n  274 |                         _ => break packet.pts,\n  275 |                     };\n  276 | \n  277 |                     self.discard_logical_packet();\n  278 |                 }","lines":16}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`is_first_sample_duration_present()` and `is_first_sample_size_present()` test the per-sample sample-flags bitfield value (`first_sample_flags`) against FIRST_SAMPLE_FLAGS_PRESENT (0x4) and SAMPLE_SIZE_PRESENT (0x200). Those constants are trun *flags* bits (positions in the trun header `flags` field), not bits within a per-sample sample_flags value. A per-sample flags word has an entirely different layout (is_leading / sample_depends_on / sample_has_redundancy / degradation priority, etc.). So these predicates test meaningless bits of the wrong field, producing incorrect timing/size for the first sample of a run and feeding the OOB panic above.","fix":"There is no 'first sample has explicit duration/size' concept in the trun first_sample_flags. Remove these predicates and the special-casing of the first sample; the first sample uses an explicit value only when SAMPLE_DURATION_PRESENT / SAMPLE_SIZE_PRESENT is set (i.e. the whole per-sample vector is present), which is already handled by is_sample_duration_present()/is_sample_size_present().","locations":[{"ref":"symphonia-format-isomp4/src/atoms/trun.rs:50-69","code":"   50 |     // Indicates if the duration of the first sample is provided.\n   51 |     pub fn is_first_sample_duration_present(&self) -> bool {\n   52 |         match self.first_sample_flags {\n   53 |             Some(flags) => flags & TrunAtom::FIRST_SAMPLE_FLAGS_PRESENT != 0,\n   54 |             None => false,\n   55 |         }\n   56 |     }\n   57 | \n   58 |     /// Indicates if sample sizes are provided.\n   59 |     pub fn is_sample_size_present(&self) -> bool {\n   60 |         self.flags & TrunAtom::SAMPLE_SIZE_PRESENT != 0\n   61 |     }\n   62 | \n   63 |     /// Indicates if the size for the first sample is provided.\n   64 |     pub fn is_first_sample_size_present(&self) -> bool {\n   65 |         match self.first_sample_flags {\n   66 |             Some(flags) => flags & TrunAtom::SAMPLE_SIZE_PRESENT != 0,\n   67 |             None => false,\n   68 |         }\n   69 |     }","lines":20}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Weak / misleading laced-frame size validation. The total laced size check only verifies `sum(sizes) <= block.len()`, but it ignores the bytes already consumed from the block (track number VINT, 2-byte relative timestamp, flags byte, lace-count byte, and the encoded lace size bytes) and ignores that an additional final frame is read to the end of the block. The comment claims the total 'should not exceed the block they will be read from', but the check does not actually guarantee the laced frames plus the final frame fit. It does not panic (read_boxed_slice_exact errors on short reads) but the check gives false assurance and permits malformed inputs to proceed further than intended.","fix":"Validate against the bytes remaining after the lacing header: `sum(sizes) <= block.len() - reader.pos()`, and account for the implicit final frame (>= 0 bytes).","locations":[{"ref":"symphonia-format-mkv/src/lacing.rs:170-177","code":"  170 |             // The total of all decoded frame sizes should not exceed the block they will be read\n  171 |             // from.\n  172 |             let total_laced_size = sizes.iter().try_fold(0u64, |acc, &size| acc.checked_add(size));\n  173 | \n  174 |             match total_laced_size {\n  175 |                 Some(size) if size <= block.len() as u64 => (),\n  176 |                 _ => return decode_error(\"mkv: total of laced frame sizes exceeds block\"),\n  177 |             }","lines":8}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"AIFF SoundChunk::parse: `len < 8` is rejected, then `offset > len - 8` is checked, then returns `len - offset - 8`. The arithmetic is fine, but the parent ChunksReader only guarantees `chunk_len` does not exceed the parent; it does not guarantee the underlying stream actually contains `len` bytes. `ignore_bytes(offset)` will error if truncated (good), but `data_start_pos` and the reported `len` are then used to compute `data_end_pos = data_start_pos + len`, which for a streamed file can point far beyond EOF; next_packet relies on read errors to stop. This is acceptable but the `len`/offset trust should be documented; more importantly there is no validation that `num_sample_frames`/sample_size are consistent with the SSND length.","fix":"Document the trust boundary; optionally cross-check SSND data length against num_sample_frames * frame_len when both are known to detect malformed files early.","locations":[{"ref":"symphonia-format-riff/src/aiff/chunks.rs:311-336","code":"  311 | impl ParseChunk for SoundChunk {\n  312 |     fn parse<B: ReadBytes>(reader: &mut B, _: [u8; 4], len: u32) -> Result<SoundChunk> {\n  313 |         // Validate minimum size.\n  314 |         if len < 8 {\n  315 |             return decode_error(\"aiff: invalid chunk size for sound chunk\");\n  316 |         }\n  317 | \n  318 |         let offset = reader.read_be_u32()?;\n  319 |         let block_size = reader.read_be_u32()?;\n  320 | \n  321 |         if block_size != 0 {\n  322 |             return unsupported_error(\"aiff: no support for aiff block-aligned data\");\n  323 |         }\n  324 | \n  325 |         if offset > len - 8 {\n  326 |             return decode_error(\"aiff: sound data offset too large\");\n  327 |         }\n  328 | \n  329 |         reader.ignore_bytes(u64::from(offset))?;\n  330 | \n  331 |         let data_start_pos = reader.pos();\n  332 | \n  333 |         // TODO: FFmpeg seems to set the chunk length to 0 when streaming. This, however, doesn't\n  334 |         // appear to be well supported, event by FFmpeg.\n  335 |         Ok(SoundChunk { len: Some(len - offset - 8), offset, block_size, data_start_pos })\n  336 |     }","lines":26}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `next` of ChunksReader, after reading an unknown chunk the code calls `reader.ignore_bytes(chunk_len)` but `self.consumed` was already advanced by `saturating_add(chunk_len)`. If `chunk_len` is large but the underlying reader is shorter (e.g. truncated/streamed file where parent `len` is None), `consumed` no longer reflects bytes actually skipped and the error from ignore_bytes propagates — acceptable — but when parent `len` is Some, the earlier validation prevents this. The real issue: `saturating_add` masks overflow silently so an attacker-set chunk_len near u64::MAX could make `consumed` saturate and then the `len - self.consumed` check on the *next* iteration is computed from a saturated value, potentially mis-bounding subsequent chunks.","fix":"Track consumed against parent len with checked arithmetic and treat saturation as an error; or recompute remaining = len - consumed once and validate chunk_len <= remaining before consuming.","locations":[{"ref":"symphonia-format-riff/src/common.rs:99-127","code":"   99 |             // Check if the ChunkReader has enough unread bytes to fully read the chunk body.\n  100 |             if let Some(len) = self.len {\n  101 |                 // Warning: The formulation of this conditional is critical because chunk_len is an\n  102 |                 // untrusted input, it may overflow when if added to anything.\n  103 |                 if len - self.consumed < u64::from(chunk_len) {\n  104 |                     debug!(\n  105 |                         \"chunk length of {} exceeds parent (list) chunk length\",\n  106 |                         String::from_utf8_lossy(&tag)\n  107 |                     );\n  108 |                     return decode_error(\"riff: chunk length exceeds parent (list) chunk length\");\n  109 |                 }\n  110 |             }\n  111 | \n  112 |             // The length of the chunk has been validated, so \"consume\" the chunk.\n  113 |             self.consumed = self.consumed.saturating_add(u64::from(chunk_len));\n  114 | \n  115 |             match T::parse_tag(tag, chunk_len) {\n  116 |                 Some(chunk) => return Ok(Some(chunk)),\n  117 |                 None => {\n  118 |                     // As per the RIFF spec, unknown chunks are to be ignored.\n  119 |                     info!(\n  120 |                         \"ignoring unknown chunk: tag={}, len={}.\",\n  121 |                         String::from_utf8_lossy(&tag),\n  122 |                         chunk_len\n  123 |                     );\n  124 | \n  125 |                     reader.ignore_bytes(u64::from(chunk_len))?\n  126 |                 }\n  127 |             }","lines":29}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `read_id3v2`, the unsynchronisation decoder is only applied when `header.major_version < 4`. For ID3v2.4, whole-tag unsync is deprecated in favor of per-frame unsync, so the tag-level `unsynchronisation` header flag is ignored entirely. If a (non-conformant but real-world) ID3v2.4 tag sets the tag-level unsync flag without per-frame flags, the body is parsed as raw bytes and frames will be misread. This is a spec-edge behavior choice but is undocumented at the call site and can silently corrupt parsing of such tags.","fix":"Document the deliberate ignoring of the tag-level unsync flag for v2.4, or honor it defensively when no per-frame unsync flags are present.","locations":[{"ref":"symphonia-metadata/src/id3v2/mod.rs:369-386","code":"  369 |     // If the unsynchronisation flag is set in the header, all tag data must be passed through the\n  370 |     // unsynchronisation decoder before being read for verions < 4 of ID3v2.\n  371 |     let mut scoped = if header.unsynchronisation && header.major_version < 4 {\n  372 |         let mut unsync = UnsyncStream::new(ScopedStream::new(reader, u64::from(header.size)));\n  373 | \n  374 |         read_id3v2_body(&mut unsync, &header, metadata, side_data)?;\n  375 | \n  376 |         unsync.into_inner()\n  377 |     }\n  378 |     // Otherwise, read the data as-is. Individual frames may be unsynchronised for major versions\n  379 |     // >= 4.\n  380 |     else {\n  381 |         let mut scoped = ScopedStream::new(reader, u64::from(header.size));\n  382 | \n  383 |         read_id3v2_body(&mut scoped, &header, metadata, side_data)?;\n  384 | \n  385 |         scoped\n  386 |     };","lines":18}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Misleading/likely-buggy requant in pulse synthesis. The branch is selected on the sign of `bval = val / scale`, but the power function is applied to `val` (not `bval`): `if bval >= 0.0 { val.powf(3.0/4.0) } else { -((-val).powf(3.0/4.0)) }`. When scale is negative, val and bval differ in sign, so `val.powf(3.0/4.0)` would be applied to a negative value (NaN). Scales are currently always non-negative (derived from 2^x / 0.5^x tables), so it is latent, but the inconsistency between the tested value and the operated value is a bug waiting to surface and contradicts the inverse-of-iquant intent.","fix":"Operate on `bval` consistently: `if bval >= 0.0 { bval.powf(3.0/4.0) } else { -((-bval).powf(3.0/4.0)) }`, matching iquant's structure, or document why val is intended.","locations":[{"ref":"symphonia-codec-aac/src/aac/ics/pulse.rs:25-31","code":"   25 | fn requant(val: f32, scale: f32) -> f32 {\n   26 |     if scale == 0.0 {\n   27 |         return 0.0;\n   28 |     }\n   29 |     let bval = val / scale;\n   30 |     if bval >= 0.0 { val.powf(3.0 / 4.0) } else { -((-val).powf(3.0 / 4.0)) }\n   31 | }","lines":7}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In the MPEG object-descriptor parsers the descriptor loop condition is `while scoped.bytes_available() > MIN_OBJECT_DESCRIPTOR_SIZE` (strict `>`), where MIN_OBJECT_DESCRIPTOR_SIZE is the minimum header size (2). A trailing descriptor that occupies exactly the minimum size (tag byte + single length byte = 2 bytes) will be skipped rather than parsed, so a minimal valid DecoderSpecificInfo/SL descriptor at the very end of the scope can be missed.","fix":"Use `>= MIN_OBJECT_DESCRIPTOR_SIZE` so a descriptor occupying exactly the minimum header size is still parsed.","locations":[{"ref":"symphonia-common/src/mpeg/formats/mod.rs:195-210","code":"  195 |         while scoped.bytes_available() > MIN_OBJECT_DESCRIPTOR_SIZE {\n  196 |             let (tag, desc_len) = read_object_descriptor_header(&mut scoped)?;\n  197 | \n  198 |             match tag {\n  199 |                 ClassTag::DecoderConfigDescriptor => {\n  200 |                     dec_config = Some(DecoderConfigDescriptor::read(&mut scoped, desc_len)?);\n  201 |                 }\n  202 |                 ClassTag::SlConfigDescriptor => {\n  203 |                     sl_config = Some(SLConfigDescriptor::read(&mut scoped, desc_len)?);\n  204 |                 }\n  205 |                 other => {\n  206 |                     debug!(\"skipping {other:?} object in es descriptor\");\n  207 |                     scoped.ignore_bytes(desc_len)?;\n  208 |                 }\n  209 |             }\n  210 |         }","lines":16},{"ref":"symphonia-common/src/mpeg/formats/mod.rs:277-289","code":"  277 |         while scoped.bytes_available() > MIN_OBJECT_DESCRIPTOR_SIZE {\n  278 |             let (tag, desc_len) = read_object_descriptor_header(&mut scoped)?;\n  279 | \n  280 |             match tag {\n  281 |                 ClassTag::DecoderSpecificInfo => {\n  282 |                     dec_specific_config = Some(DecoderSpecificInfo::read(&mut scoped, desc_len)?);\n  283 |                 }\n  284 |                 other => {\n  285 |                     debug!(\"skipping {other:?} object in decoder config descriptor\");\n  286 |                     scoped.ignore_bytes(desc_len)?;\n  287 |                 }\n  288 |             }\n  289 |         }","lines":13}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`SeekIndex::insert` silently discards seek points whose timestamp equals the last inserted timestamp (`ts == last_ts`): the first branch requires `ts > last_ts`, the second requires `ts < last_ts`, and the equal case falls through with no insertion. If a format legitimately has two distinct byte offsets at the same frame timestamp (or re-inserts a boundary point), it is dropped without warning, which can degrade seek accuracy. The guard `if i < self.points.len() || i == 0` in the out-of-order branch is also dead/odd: in that branch `ts < last_ts`, so the partition point can never equal `points.len()`, making the `i < len` check always true.","fix":"Decide and document the dedup policy explicitly for `ts == last_ts` (insert vs. skip), and simplify/correct the insertion-index guard so it reflects the actual reachable cases.","locations":[{"ref":"symphonia-core/src/formats/mod.rs:736-752","code":"  736 |             // the last entry in the index, then simply append it to the index.\n  737 |             if ts > last_ts && byte_offset >= last_offset {\n  738 |                 self.points.push(seek_point)\n  739 |             }\n  740 |             else if ts < last_ts {\n  741 |                 // If the seek point has a timestamp less-than the last entry in the index, then the\n  742 |                 // insertion point must be found. This case should rarely occur.\n  743 |                 let i = self\n  744 |                     .points\n  745 |                     .partition_point(|p| ts > p.frame_ts && byte_offset >= p.byte_offset);\n  746 | \n  747 |                 // Insert if the point found or if the points are empty\n  748 |                 if i < self.points.len() || i == 0 {\n  749 |                     self.points.insert(i, seek_point);\n  750 |                 }\n  751 |             }\n  752 |         }","lines":17}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `Probe::probe`, when `probe_trailing` is run, metadata read from the trailing scan is appended to `fmt_opts.external_data` before the position is restored, but the trailing scan and the forward scan can match and read the SAME metadata block twice (e.g. an ID3v2 trailer that the forward `next()` loop also encounters). There is no de-duplication between trailing and forward metadata, so the same revision may be appended twice to the metadata log.","fix":"Track byte ranges already consumed by trailing metadata and skip re-reading them in the forward `next()` loop, or otherwise de-duplicate metadata revisions before appending.","locations":[{"ref":"symphonia-core/src/formats/probe.rs:438-467","code":"  438 |         if mss.is_seekable() {\n  439 |             if let Some(end) = mss.byte_len() {\n  440 |                 // The initial position of the stream will be restored after probing for trailing\n  441 |                 // metadata.\n  442 |                 let init_pos = mss.pos();\n  443 | \n  444 |                 mss = self.probe_trailing(mss, end, &mut fmt_opts, meta_opts)?;\n  445 | \n  446 |                 // Restore position.\n  447 |                 mss.seek(SeekFrom::Start(init_pos))?;\n  448 |             }\n  449 |         }\n  450 | \n  451 |         // Loop over all elements in the stream until a container format is found.\n  452 |         loop {\n  453 |             match self.next(&mut mss, hint)? {\n  454 |                 // If a container format is found, return an instance to it's reader.\n  455 |                 ProbeMatch::Format { factory, .. } => {\n  456 |                     // Instantiate the format reader.\n  457 |                     return factory(mss, fmt_opts);\n  458 |                 }\n  459 |                 // If metadata was found, instantiate the metadata reader, read the metadata, and\n  460 |                 // push it onto the metadata log.\n  461 |                 ProbeMatch::Metadata { factory, .. } => {\n  462 |                     let mut reader = factory(mss, meta_opts)?;\n  463 |                     read_and_append_metadata(&mut reader, &mut fmt_opts)?;\n  464 |                     mss = reader.into_inner();\n  465 |                 }\n  466 |             }\n  467 |         }","lines":30}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`MediaSourceStream::fetch` only reads when the ring buffer is fully exhausted (`is_buffer_exhausted()`). When the inner reader returns a short read (fewer than `read_block_len` bytes but >0), the buffer is not empty, so a subsequent single-byte read can succeed while a larger `read_buf`/`read_buf_exact` may stall against a partially filled buffer until exhausted again. More importantly, `actual_read_len == 0` (EOF) is silently accepted; callers rely on `fetch_or_eof` to detect EOF, but `fetch` itself never distinguishes EOF from a successful zero-progress fetch, so loops in `io::Read::read`/`read_buf_exact` depend on the `Ok(0)` break path which is correct only because `continguous_buf` is empty.","fix":"Document the short-read/zero-read behavior explicitly; consider looping the inner read to better amortize, and ensure EOF detection does not rely on incidental empty-slice reads.","locations":[{"ref":"symphonia-core/src/io/media_source_stream.rs:101-136","code":"  101 |     fn fetch(&mut self) -> io::Result<()> {\n  102 |         // Only fetch when the ring buffer is empty.\n  103 |         if self.is_buffer_exhausted() {\n  104 |             // Split the vector at the write position to get slices of the two contiguous regions of\n  105 |             // the ring buffer.\n  106 |             let (vec1, vec0) = self.ring.split_at_mut(self.write_pos);\n  107 | \n  108 |             // If the first contiguous region of the ring buffer starting from the write position\n  109 |             // has sufficient space to service the entire read do a simple read into that region's\n  110 |             // slice.\n  111 |             let actual_read_len = if vec0.len() >= self.read_block_len {\n  112 |                 self.inner.read(&mut vec0[..self.read_block_len])?\n  113 |             }\n  114 |             else {\n  115 |                 // Otherwise, perform a vectored read into the two contiguous region slices.\n  116 |                 let rem = self.read_block_len - vec0.len();\n  117 | \n  118 |                 let ring_vectors = &mut [IoSliceMut::new(vec0), IoSliceMut::new(&mut vec1[..rem])];\n  119 | \n  120 |                 self.inner.read_vectored(ring_vectors)?\n  121 |             };\n  122 | \n  123 |             // Increment the write position, taking into account wrap-around.\n  124 |             self.write_pos = (self.write_pos + actual_read_len) & self.ring_mask;\n  125 | \n  126 |             // Update the stream position accounting.\n  127 |             self.abs_pos += actual_read_len as u64;\n  128 |             self.rel_pos += actual_read_len as u64;\n  129 | \n  130 |             // Grow the read block length exponentially to reduce the overhead of buffering on\n  131 |             // consecutive seeks.\n  132 |             self.read_block_len = cmp::min(self.read_block_len << 1, Self::MAX_BLOCK_LEN);\n  133 |         }\n  134 | \n  135 |         Ok(())\n  136 |     }","lines":36}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`MediaSourceStream::read_buffer_len` computes `cmp::min(self.ring.len(), self.rel_pos as usize) - unread_len`. `rel_pos` is a u64 count of bytes read since the last seek; casting to usize truncates on 32-bit targets, and the result is the number of seekback-able bytes. If `unread_len` (also bounded by ring length) somehow exceeds `min(ring.len(), rel_pos)`, this subtraction underflows (panic in debug). While invariants normally prevent this, the relationship is non-obvious and untested at the boundary.","fix":"Use saturating_sub and compute in u64 before truncating, with a debug_assert documenting the invariant.","locations":[{"ref":"symphonia-core/src/io/media_source_stream.rs:418-422","code":"  418 |     fn read_buffer_len(&self) -> usize {\n  419 |         let unread_len = self.unread_buffer_len();\n  420 | \n  421 |         cmp::min(self.ring.len(), self.rel_pos as usize) - unread_len\n  422 |     }","lines":5}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In CAF next_packet for FixedAudioPacket with unknown data_len (data_len == None), `bytes_remaining` is set to `max_bytes_to_read`, so the function keeps returning packets reading `bytes_to_read` bytes every call and only stops on a read error. There is no end-of-stream detection other than the underlying reader EOF; if the reader returns a short/zero read without an error, this could loop or produce a malformed final packet. Lower severity because most readers return UnexpectedEof.","fix":"When data_len is unknown, detect a short read from read_boxed_slice (returned buffer length < bytes_to_read) and return Ok(None) / a final partial packet rather than relying solely on an IO error.","locations":[{"ref":"symphonia-format-caf/src/demuxer.rs:112-146","code":"  112 |                 let bytes_remaining = if let Some(data_len) = self.data_len {\n  113 |                     data_len.saturating_sub(data_pos)\n  114 |                 }\n  115 |                 else {\n  116 |                     max_bytes_to_read\n  117 |                 };\n  118 | \n  119 |                 if bytes_remaining == 0 {\n  120 |                     return Ok(None);\n  121 |                 }\n  122 | \n  123 |                 let bytes_to_read = max_bytes_to_read.min(bytes_remaining);\n  124 | \n  125 |                 // Calculate the packet duration.\n  126 |                 let Some(dur) = (bytes_to_read / bytes_per_packet)\n  127 |                     .checked_mul(frames_per_packet)\n  128 |                     .map(Duration::new)\n  129 |                 else {\n  130 |                     warn!(\"packet duration exceeds maximum representable duration\");\n  131 |                     return Ok(None);\n  132 |                 };\n  133 | \n  134 |                 // Calculate the packet PTS by offsetting the duration read so far from the start\n  135 |                 // PTS.\n  136 |                 let Some(pts) = (data_pos / bytes_per_packet)\n  137 |                     .checked_mul(frames_per_packet)\n  138 |                     .and_then(|offset| start_pts.checked_add(Duration::from(offset)))\n  139 |                 else {\n  140 |                     warn!(\"media exceeds maximum representable duration\");\n  141 |                     return Ok(None);\n  142 |                 };\n  143 | \n  144 |                 let buf = self.reader.read_boxed_slice(bytes_to_read as usize)?;\n  145 | \n  146 |                 Ok(Some(Packet::new(0, pts, dur, buf)))","lines":35}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","description":"add_rating_tag clamps with `value >= 0 && value <= 100` then stores StandardTag::Rating(10_000 * rating). 10_000 * 100 = 1_000_000 fits u32, so no overflow, but the clippy-style `value >= 0` on a SignedInt is always paired oddly and the scaling factor 10_000 is an undocumented magic number with no bounds comment. Minor maintainability/logic clarity issue. Confirm Rating's expected scale (0..=100 vs 0..=1_000_000).","fix":"Document the 10_000 scale factor and the intended Rating range, and use `(0..=100).contains(&value)`.","locations":[{"ref":"symphonia-format-isomp4/src/atoms/ilst.rs:509-523","code":"  509 |             let rating = match raw_value {\n  510 |                 RawValue::SignedInt(value) if value >= 0 && value <= 100 => Some(value as u32),\n  511 |                 _ => {\n  512 |                     warn!(\"invalid data for rating tag\");\n  513 |                     None\n  514 |                 }\n  515 |             };\n  516 | \n  517 |             if let Some(rating) = rating {\n  518 |                 let raw_key = get_raw_tag_key(tag.atom_type);\n  519 | \n  520 |                 builder.add_tag(Tag::new_std(\n  521 |                     RawTag::new(raw_key, raw_value),\n  522 |                     StandardTag::Rating(10_000 * rating),\n  523 |                 ));","lines":15}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In trun.rs ts_sample, the branch handling a unique first-sample duration does `ts_delta -= ts_delta;` (sets ts_delta to 0) when ts_delta < first_sample_dur, which is correct, but it does NOT increment sample_num, then unconditionally adds `ts_delta.checked_div(default_dur)` (now 0) — fine — however the first branch when `ts_delta >= first_sample_dur` decrements by first_sample_dur and increments sample_num, then divides the remainder by default_dur. If default_dur is 0 the checked_div guards it. The dead `ts_delta -= ts_delta;` is a confusing no-op-equivalent (just set to 0). Combined with the bogus is_first_sample_duration_present predicate this whole first-sample branch is suspect.","fix":"Replace `ts_delta -= ts_delta;` with `ts_delta = 0;` for clarity, and re-derive the first-sample handling once the is_first_sample_duration_present semantics are corrected.","locations":[{"ref":"symphonia-format-isomp4/src/atoms/trun.rs:221-236","code":"  221 |         else {\n  222 |             if self.sample_count > 0 && self.is_first_sample_duration_present() {\n  223 |                 // The first sample duration is unique.\n  224 |                 let first_sample_dur = u64::from(self.sample_duration[0]);\n  225 | \n  226 |                 if ts_delta >= first_sample_dur {\n  227 |                     ts_delta -= first_sample_dur;\n  228 |                     sample_num += 1;\n  229 |                 }\n  230 |                 else {\n  231 |                     ts_delta -= ts_delta;\n  232 |                 }\n  233 |             }\n  234 | \n  235 |             sample_num += ts_delta.checked_div(u64::from(default_dur)).unwrap_or(0) as u32;\n  236 |         }","lines":16}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`FrameDurationIter::next` divides by `self.num_frames` without guarding against zero (`accumulator / self.num_frames` and `accumulator %= self.num_frames`). All current callers pass a non-zero divisor (FixedSize: read_byte()+1; Xiph/Ebml: num_frames+1; None: 1), so it is not presently reachable, but the struct is fragile: any future caller passing 0, or a refactor, yields a divide-by-zero panic. The constructor accepts an arbitrary `num_frames: u64`.","fix":"Store `num_frames` as a `NonZeroU64`, or guard the divisor (return 0 duration when num_frames == 0), to make the panic structurally impossible.","locations":[{"ref":"symphonia-format-mkv/src/lacing.rs:123-129","code":"  123 |     fn next(&mut self) -> TrackTicks {\n  124 |         // Accumulate the remainder after each computation since integer division rounds down.\n  125 |         self.accumulator = self.accumulator.saturating_add(self.block_dur.get());\n  126 |         let dur = TrackTicks::from(self.accumulator / self.num_frames);\n  127 |         self.accumulator %= self.num_frames;\n  128 |         dur\n  129 |     }","lines":7}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`read_binary_into` (used by SeekId parsing) requires the element to fit in the caller buffer and returns BufferTooSmall otherwise. SeekId passes an 8-byte buffer, so a SeekId element larger than 8 bytes aborts the whole SeekHead read with an error instead of skipping the malformed entry. A single oversized/garbage SeekId in an otherwise valid SeekHead makes `read_master_element::<SeekHeadElement>` fail and (via `?`) abort container probing for that segment, rather than degrading gracefully.","fix":"Treat an over-long or malformed SeekId as a skippable/ignored seek entry rather than propagating a hard error, so one bad SeekHead entry does not fail the entire seek-head/segment parse.","locations":[{"ref":"symphonia-format-mkv/src/segment.rs:762-773","code":"  762 |                 MkvElement::SeekId => {\n  763 |                     // Read\n  764 |                     let mut raw = [0u8; 8];\n  765 | \n  766 |                     seek_id = match it.read_binary_into(&mut raw)? {\n  767 |                         len @ 1..=8 => {\n  768 |                             let mut buf = [0u8; 8];\n  769 |                             buf[8 - len..].copy_from_slice(&raw[..len]);\n  770 |                             Some(u64::from_be_bytes(buf))\n  771 |                         }\n  772 |                         _ => return Err(EbmlError::ElementError(\"mkv: invalid seek element id\")),\n  773 |                     };","lines":12}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"AIFF `read_alaw_pcm_fmt`/`read_mulaw_pcm_fmt`/`read_fl32_fmt`/`read_fl64_fmt` accept any sample_size and only emit a debug! message when it is unexpected (e.g. alaw not 16-bit, fl32 not 32-bit), then proceed. For a-law/u-law the bits_per_sample is dropped entirely, but a malformed sample_size will still produce a track; combined with FormatPcm path elsewhere this silent acceptance can yield inconsistent codec parameters. Comment in read_in24_fmt also says 'invalid for in14' (copy-paste typo, should be in24).","fix":"Decide whether non-conforming sample sizes are errors and enforce consistently; fix the 'in14' comment typo to 'in24'.","locations":[{"ref":"symphonia-format-riff/src/aiff/chunks.rs:65-83","code":"   65 |     fn read_alaw_pcm_fmt(bits_per_sample: u16, num_channels: u16) -> Result<FormatData> {\n   66 |         if bits_per_sample != 16 {\n   67 |             debug!(\"bits per sample not 16 for alaw\");\n   68 |         }\n   69 |         let channels = map_aiff_channel_count(num_channels)?;\n   70 |         Ok(FormatData::ALaw(FormatALaw { codec: CODEC_ID_PCM_ALAW, channels }))\n   71 |     }\n   72 | \n   73 |     fn read_mulaw_pcm_fmt(bits_per_sample: u16, num_channels: u16) -> Result<FormatData> {\n   74 |         if bits_per_sample != 16 {\n   75 |             debug!(\"bits per sample not 16 for u-law\");\n   76 |         }\n   77 |         let channels = map_aiff_channel_count(num_channels)?;\n   78 |         Ok(FormatData::MuLaw(FormatMuLaw { codec: CODEC_ID_PCM_MULAW, channels }))\n   79 |     }\n   80 | \n   81 |     fn read_in24_fmt(bits_per_sample: u16, num_channels: u16) -> Result<FormatData> {\n   82 |         if bits_per_sample != 24 {\n   83 |             return decode_error(\"aifc: bits per sample invalid for in14\");","lines":19}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","description":"AIFF CommonChunk Display: the `FormatData::ALaw` arm prints the label `MuLaw {` (copy-paste from the MuLaw arm), so a-law common chunks are mislabeled in debug output.","fix":"Change the ALaw arm's writeln label from 'MuLaw {' to 'ALaw {'.","locations":[{"ref":"symphonia-format-riff/src/aiff/chunks.rs:227-231","code":"  227 |             FormatData::ALaw(ref alaw) => {\n  228 |                 writeln!(f, \"\\tformat_data: MuLaw {{\")?;\n  229 |                 writeln!(f, \"\\t\\tchannels: {},\", alaw.channels)?;\n  230 |                 writeln!(f, \"\\t\\tcodec: {},\", alaw.codec)?;\n  231 |             }","lines":5}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`read_utf8_value` error message reads \"ape: item value is valid not utf-8\" (word order swapped). User-facing decode error text is garbled.","fix":"Change message to \"ape: item value is not valid utf-8\".","locations":[{"ref":"symphonia-metadata/src/ape.rs:482-487","code":"  482 | fn read_utf8_value<B: ReadBytes>(reader: &mut B, len: usize) -> Result<String> {\n  483 |     match String::from_utf8(reader.read_boxed_slice_exact(len)?.into_vec()) {\n  484 |         Ok(value) => Ok(value),\n  485 |         Err(_) => decode_error(\"ape: item value is valid not utf-8\"),\n  486 |     }\n  487 | }","lines":6}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `read_id3v2_body`, the loop reads a frame, then checks `if reader.bytes_available() < min_frame_size { break; }` AFTER processing. On the very first iteration there is no pre-check, so when fewer than `min_frame_size` bytes remain but more than zero, the version-specific frame reader is invoked anyway and relies on read errors to bail. This works but is inconsistent with the documented intent (\"Read frames until there is not enough bytes available ... for another frame\") and the comparable CHAP/CTOC readers which pre-check with `while reader.bytes_available() >= min_frame_size`.","fix":"Convert to a pre-checked loop (e.g. `while reader.bytes_available() >= min_frame_size`) for consistency with read_chap_frame/read_ctoc_frame and to avoid invoking frame readers on a known-too-short remainder.","locations":[{"ref":"symphonia-metadata/src/id3v2/mod.rs:301-351","code":"  301 |     loop {\n  302 |         // Read frames based on the major version of the tag.\n  303 |         let frame = match header.major_version {\n  304 |             2 => read_id3v2p2_frame(reader),\n  305 |             3 => read_id3v2p3_frame(reader),\n  306 |             4 => read_id3v2p4_frame(reader),\n  307 |             _ => break,\n  308 |         };\n  309 | \n  310 |         match frame {\n  311 |             // The frame was skipped for some reason.\n  312 |             Ok(FrameResult::Skipped) => (),\n  313 |             // The padding has been reached, don't parse any further.\n  314 |             Ok(FrameResult::Padding) => break,\n  315 |             // A frame was parsed into a tag, add it to the tag collection.\n  316 |             Ok(FrameResult::Tag(tag)) => {\n  317 |                 metadata.add_tag(tag);\n  318 |             }\n  319 |             // A frame was parsed into multiple tags, add them all to the tag collection.\n  320 |             Ok(FrameResult::MultipleTags(tags)) => {\n  321 |                 for tag in tags {\n  322 |                     metadata.add_tag(tag);\n  323 |                 }\n  324 |             }\n  325 |             // A frame was parsed into a visual, add it to the visual collection.\n  326 |             Ok(FrameResult::Visual(visual)) => {\n  327 |                 metadata.add_visual(visual);\n  328 |             }\n  329 |             // A chapter was encountered, save it for post-processing.\n  330 |             Ok(FrameResult::Chapter(chap)) => {\n  331 |                 chap_builder.add_chapter(chap);\n  332 |             }\n  333 |             // A table of contents was encountered, save it for post-processing.\n  334 |             Ok(FrameResult::TableOfContents(toc)) => {\n  335 |                 chap_builder.add_toc(toc);\n  336 |             }\n  337 |             Err(_) => {\n  338 |                 // The read frame functions suppress any errors that occur while reading the content\n  339 |                 // of a frame. Any errors that are returned are related to the frame's structure and\n  340 |                 // result in a fatal error since the structure of the overall tag becomes\n  341 |                 // compromised.\n  342 |                 warn!(\"fatal error reading id3v2 frame, skipping remainder of tag\");\n  343 |                 break;\n  344 |             }\n  345 |         };\n  346 | \n  347 |         // Read frames until there is not enough bytes available in the ID3v2 tag for another frame.\n  348 |         if reader.bytes_available() < min_frame_size {\n  349 |             break;\n  350 |         }\n  351 |     }","lines":51}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`parse_id3v2_genre` regex `^(?P<num0>[0-9]+)$|(?:\\((?P<num1>[0-9]+)\\))?(?P<name>.+)?$` parses a parenthesised numeric genre like \"(145)\" into a genre name via lookup, but a pure-numeric value that fails the u8 lookup (e.g. \"255\", \"145333\") falls through to `Some(genre)` using the original string (confirmed by tests). However, when `num0`/`num1` parse succeeds but `get_genre_name` returns None (number 192..=255 has no mapping yet still parses as u8), `name` becomes None and the code falls back to the original full value `v` — which for input like \"(192)\" yields the genre \"(192)\" rather than \"192\". Minor inconsistency in fallback formatting, not a crash.","fix":"When a numeric genre code is recognized but unmapped, decide on a consistent fallback (either keep the raw value verbatim including parentheses, or strip to the bare number); document the chosen behavior.","locations":[{"ref":"symphonia-metadata/src/utils/std_tag.rs:348-384","code":"  348 | pub fn parse_id3v2_genre(v: Arc<String>) -> StandardTagPair {\n  349 |     use regex_lite::Regex;\n  350 | \n  351 |     use crate::utils::id3v1::get_genre_name;\n  352 | \n  353 |     // Regex that will match the following strings:\n  354 |     //\n  355 |     // \"<NUMBER>\"\n  356 |     // \"<NAME>\"\n  357 |     // \"(<NUMBER>)\"\n  358 |     // \"(<NUMBER)<NAME>\"\n  359 |     let re = Regex::new(r\"^(?P<num0>[0-9]+)$|(?:\\((?P<num1>[0-9]+)\\))?(?P<name>.+)?$\")\n  360 |         .expect(\"valid regex\");\n  361 | \n  362 |     // The regex always matches (even an empty string).\n  363 |     let caps = re.captures(v.as_str()).expect(\"regex always matches\");\n  364 | \n  365 |     let name = if let Some(name) = caps.name(\"name\") {\n  366 |         // A user-defined genre name provided.\n  367 |         Some(name.as_str().to_owned())\n  368 |     }\n  369 |     else if let Some(num) = caps.name(\"num0\").or_else(|| caps.name(\"num1\")) {\n  370 |         // Only genre number provided. Parse to u8, then lookup the genre name.\n  371 |         num.as_str().parse::<u8>().ok().and_then(get_genre_name)\n  372 |     }\n  373 |     else {\n  374 |         // Empty string.\n  375 |         None\n  376 |     };\n  377 | \n  378 |     // Fallback to the original value for the genre if one could not be parsed.\n  379 |     let genre = name\n  380 |         .map(|name| StandardTag::Genre(Arc::new(name)))\n  381 |         .unwrap_or_else(|| StandardTag::Genre(v));\n  382 | \n  383 |     [Some(genre), None]\n  384 | }","lines":37}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"`SignedTrackTicks::checked_sub_unsigned` is documented to subtract the provided ticks but actually calls `self.0.checked_add_unsigned(other.0)` — it ADDS instead of subtracting. This is the only subtraction helper and it is used in `calculate_block_pts` (lacing.rs:91) to apply the codec delay: `ts.checked_sub_unsigned(codec_delay)`. As a result the codec delay is added to every block PTS instead of being subtracted, so all presentation timestamps are wrong for any track that defines a CodecDelay (e.g. Opus). A clear copy-paste error from `checked_add_unsigned`.","fix":"Use a subtracting operation, e.g. `self.0.checked_sub(other.0 as i64)` with appropriate overflow handling, or `self.0.checked_sub_unsigned(other.0)` (i64 has `checked_sub_unsigned` on recent Rust). Add a unit test covering codec delay.","locations":[{"ref":"symphonia-format-mkv/src/segment.rs:316-320","code":"  316 |     /// Subtract the provided track ticks to `self`, returning `None` if an overflow occurred.\n  317 |     #[inline]\n  318 |     pub fn checked_sub_unsigned(self, other: TrackTicks) -> Option<Self> {\n  319 |         self.0.checked_add_unsigned(other.0).map(SignedTrackTicks)\n  320 |     }","lines":5}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"get_raw_tag_key maps both ComposerTag and WriterTag to \"\\u{a9}wrt\". The composer atom is '\\xa9com' (mapped to ComposerTag in mod.rs:412), so the raw key for a composer tag is emitted as the writer four-cc '\\u{a9}wrt' instead of '\\u{a9}com'. This mislabels the raw key of every composer metadata tag.","fix":"Change the ComposerTag arm to return \"\\u{a9}com\" (matching the b\"\\xa9com\" mapping in mod.rs), leaving WriterTag as \"\\u{a9}wrt\".","locations":[{"ref":"symphonia-format-isomp4/src/atoms/ilst.rs:958","code":"  958 |         AtomType::ComposerTag => \"\\u{a9}wrt\",","lines":1},{"ref":"symphonia-format-isomp4/src/atoms/ilst.rs:1016","code":" 1016 |         AtomType::WriterTag => \"\\u{a9}wrt\",","lines":1}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"Misspelled tag key in standard-tag mapping: `\"SOME@REPLAYGAIN_PEAK\"` should be `\"SONG@REPLAYGAIN_PEAK\"` (matching the `\"TRACK@REPLAYGAIN_PEAK\"` arm and the `\"SONG@REPLAYGAIN_GAIN\"` arm just above). As written, ReplayGain track peak tags scoped to a SONG target are never recognized.","fix":"Change `\"SOME@REPLAYGAIN_PEAK\"` to `\"SONG@REPLAYGAIN_PEAK\"`.","locations":[{"ref":"symphonia-format-mkv/src/tags.rs:168-170","code":"  168 |             \"TRACK@REPLAYGAIN_PEAK\" | \"SOME@REPLAYGAIN_PEAK\" => {\n  169 |                 StandardTag::ReplayGainTrackPeak(value)\n  170 |             }","lines":3}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"Trailing space in match pattern: `\"SESSION \"` (with a space) in `map_subtitle` will never match the tag target name `\"SESSION\"`, so DiscSubtitle is never produced for SESSION targets.","fix":"Remove the trailing space: `\"PART\" | \"SESSION\" => StandardTag::DiscSubtitle(value),`.","locations":[{"ref":"symphonia-format-mkv/src/tags.rs:507-514","code":"  507 | fn map_subtitle(value: Arc<String>, target: &str) -> Option<StandardTag> {\n  508 |     let std = match target {\n  509 |         \"PART\" | \"SESSION \" => StandardTag::DiscSubtitle(value),\n  510 |         \"TRACK\" => StandardTag::TrackSubtitle(value),\n  511 |         _ => return None,\n  512 |     };\n  513 |     Some(std)\n  514 | }","lines":8}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"In the APE tag parser map, the \"movementtotal\" key is mapped to `parse_mood` instead of `parse_movement_total`. This means a movement total tag from an APE file is incorrectly parsed into a Mood standard tag, silently corrupting the metadata. Additionally \"movement\" is mapped to `parse_movement_total`, which is questionable (APE's \"Movement\" is typically the movement number/name, not a total).","fix":"Change `m.insert(\"movementtotal\", parse_mood);` to `m.insert(\"movementtotal\", parse_movement_total);`. Review the \"movement\" mapping; it likely should map to `parse_movement_name` or `parse_movement_number` rather than `parse_movement_total`.","locations":[{"ref":"symphonia-metadata/src/ape.rs:85-87","code":"   85 |         m.insert(\"movement\"                    , parse_movement_total);\n   86 |         m.insert(\"movementname\"                , parse_movement_name);\n   87 |         m.insert(\"movementtotal\"               , parse_mood);","lines":3}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"In the iTunes tag parser map, the key \"com.apple.itunes:musicbrainz original album id\" is mapped to `parse_musicbrainz_album_id` instead of `parse_musicbrainz_original_album_id`. The original-album MusicBrainz ID is therefore stored as the (non-original) album ID standard tag, conflating two distinct identifiers.","fix":"Change the value to `parse_musicbrainz_original_album_id` to match the key, consistent with how APEv2 and Vorbis maps handle the same field.","locations":[{"ref":"symphonia-metadata/src/utils/itunes.rs:49","code":"   49 |         m.insert(\"com.apple.itunes:musicbrainz original album id\", parse_musicbrainz_album_id);","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`ScopedStream::read_buf_exact` increments `self.read += buf.len()` *before* delegating to `self.inner.read_buf_exact(buf)`. If the inner read fails (returns Err), `read` has already been advanced by the full requested length even though the bytes were not (fully) consumed, leaving `bytes_read()`/`bytes_available()` inconsistent and possibly over-counting beyond `len`.","fix":"Advance `self.read` only after the inner read succeeds (and ideally by the number of bytes actually consumed), or roll back on error.","locations":[{"ref":"symphonia-core/src/io/scoped_stream.rs:120-127","code":"  120 |     fn read_buf_exact(&mut self, buf: &mut [u8]) -> io::Result<()> {\n  121 |         if self.len - self.read < buf.len() as u64 {\n  122 |             return out_of_bounds_error();\n  123 |         }\n  124 | \n  125 |         self.read += buf.len() as u64;\n  126 |         self.inner.read_buf_exact(buf)\n  127 |     }","lines":8}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"FLAC frame-header CRC validation is bypassed under `cfg(fuzzing)` (`crc8_expected != crc8_computed && cfg!(not(fuzzing))`). While intended to let fuzzers reach decode logic, this means under a fuzzing build the decoder accepts frames it would normally reject, so panics/OOB found while fuzzing may not be reproducible/valid in a normal (CRC-checked) build. Worth flagging so triage accounts for it.","fix":"Keep the bypass but ensure fuzz findings are re-validated against a non-fuzzing build, or gate it behind a more explicit feature so it is not silently active. (No code change strictly required; documentation/triage note.)","locations":[{"ref":"symphonia-bundle-flac/src/decoder.rs:211-213","code":"  211 | \n  212 |                     read_subframe(&mut bs, bits_per_sample, mid)?;\n  213 |                     read_subframe(&mut bs, bits_per_sample + 1, side)?;","lines":3}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"decode_noise can produce NaN/Inf spectral coefficients. `let scale = sf / energy.sqrt();` divides by the square root of the accumulated energy of the random sequence. If energy is 0 (all generated samples are zero — possible since the LCG output can yield 0 for the i16 cast), scale becomes inf/NaN and propagates into the PCM output. Not memory-unsafe but corrupts decode output deterministically from crafted input.","fix":"Guard the division: if energy == 0.0 (or below an epsilon), set the band to zeros (or skip scaling) instead of dividing.","locations":[{"ref":"symphonia-codec-aac/src/aac/ics/mod.rs:467-481","code":"  467 | fn decode_noise(lcg: &mut Lcg, sf: f32, dst: &mut [f32]) {\n  468 |     let mut energy = 0.0;\n  469 | \n  470 |     for spec in dst.iter_mut() {\n  471 |         // The random number generator outputs i32, but the largest signed\n  472 |         // integer that can convert to f32 is i16.\n  473 |         *spec = f32::from((lcg.next() >> 16) as i16);\n  474 |         energy += *spec * *spec;\n  475 |     }\n  476 | \n  477 |     let scale = sf / energy.sqrt();\n  478 | \n  479 |     for spec in dst.iter_mut() {\n  480 |         *spec *= scale;\n  481 |     }","lines":15}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`impl std::error::Error for Error` overrides the deprecated `cause()` method instead of `source()`. Since Rust 1.33 `source()` is the canonical accessor; `cause()` is deprecated and is not what callers using `error.source()` (or `anyhow`/`?` chains) will consult, so the underlying `io::Error` is effectively hidden from modern error-chain tooling.","fix":"Implement `fn source(&self) -> Option<&(dyn error::Error + 'static)>` returning the inner `io::Error` for `IoError`, and drop the `cause` override.","locations":[{"ref":"symphonia-core/src/errors.rs:82-93","code":"   82 | impl std::error::Error for Error {\n   83 |     fn cause(&self) -> Option<&dyn error::Error> {\n   84 |         match *self {\n   85 |             Error::IoError(ref err) => Some(err),\n   86 |             Error::DecodeError(_) => None,\n   87 |             Error::SeekError(_) => None,\n   88 |             Error::Unsupported(_) => None,\n   89 |             Error::LimitError(_) => None,\n   90 |             Error::ResetRequired => None,\n   91 |         }\n   92 |     }\n   93 | }","lines":12}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`ScopedStream::scan_bytes_aligned` rejects the scan when `self.len - self.read < buf.len()`, i.e. it requires the *entire* buffer length to fit within the remaining scoped bytes. A scan that would match well before the end of the scope is wrongly rejected with an out-of-bounds error whenever the caller passes a buffer larger than the remaining scope, even though fewer bytes than `buf.len()` would actually be read.","fix":"Limit the scan to `min(buf.len(), remaining)` bytes (pass a truncated buffer to the inner scan) rather than failing outright when the buffer is longer than the remaining scope.","locations":[{"ref":"symphonia-core/src/io/scoped_stream.rs:129-143","code":"  129 |     #[inline(always)]\n  130 |     fn scan_bytes_aligned<'a>(\n  131 |         &mut self,\n  132 |         pattern: &[u8],\n  133 |         align: usize,\n  134 |         buf: &'a mut [u8],\n  135 |     ) -> io::Result<&'a mut [u8]> {\n  136 |         if self.len - self.read < buf.len() as u64 {\n  137 |             return out_of_bounds_error();\n  138 |         }\n  139 | \n  140 |         let result = self.inner.scan_bytes_aligned(pattern, align, buf)?;\n  141 |         self.read += result.len() as u64;\n  142 |         Ok(result)\n  143 |     }","lines":15}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"EsdsAtom::read only attempts to parse the ES descriptor when `size > MIN_OBJECT_DESCRIPTOR_SIZE`; if the descriptor is exactly MIN_OBJECT_DESCRIPTOR_SIZE bytes it is skipped and the function returns 'missing es descriptor'. The boundary should be `>=` (or the descriptor min-size semantics clarified). Minor: an off-by-one in the size guard.","fix":"Use `size >= MIN_OBJECT_DESCRIPTOR_SIZE` (verify the intended inclusive bound against the descriptor format) so a minimally-sized descriptor is still parsed.","locations":[{"ref":"symphonia-format-isomp4/src/atoms/esds.rs:38-56","code":"   38 |         if size > MIN_OBJECT_DESCRIPTOR_SIZE {\n   39 |             // Read into buffer to be able to use a buffer reader.\n   40 |             let buf = it.read_boxed_slice_exact(size as usize)?;\n   41 | \n   42 |             let mut reader = BufReader::new(&buf);\n   43 | \n   44 |             // Read the object descriptor header.\n   45 |             let (desc_tag, desc_len) = read_object_descriptor_header(&mut reader)?;\n   46 | \n   47 |             // Read the ES descriptor.\n   48 |             if desc_tag == ClassTag::EsDescriptor {\n   49 |                 descriptor = Some(ESDescriptor::read(&mut reader, desc_len)?);\n   50 |             }\n   51 |         }\n   52 | \n   53 |         let Some(es_desc) = descriptor\n   54 |         else {\n   55 |             return decode_error(\"isomp4 (esds): missing es descriptor in esds\");\n   56 |         };","lines":19}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Several metadata reads cast a file-controlled atom size directly to usize and read that many bytes with no metadata-size cap, despite TODO comments acknowledging it: MetaTagDataAtom (data payload), MetaTagNamespaceAtom (mean/name string). On a 32-bit target the `size as usize` could also truncate. While the iterator bounds reads to the atom, a single attacker-sized tag atom can force a large allocation.","fix":"Apply a configurable metadata size limit (as the TODOs note) and validate `size` fits in usize before allocating; reject or truncate oversized tag payloads.","locations":[{"ref":"symphonia-format-isomp4/src/atoms/ilst.rs:596-604","code":"  596 |         // The data payload is the remainder of the atom.\n  597 |         let data = {\n  598 |             // TODO: Apply the metadata limit.\n  599 |             let size = it\n  600 |                 .data_left()?\n  601 |                 .ok_or(Error::DecodeError(\"isomp4 (data): expected atom size to be known\"))?;\n  602 | \n  603 |             it.read_boxed_slice_exact(size as usize)?\n  604 |         };","lines":9},{"ref":"symphonia-format-isomp4/src/atoms/ilst.rs:621-626","code":"  621 |         let size = it\n  622 |             .data_left()?\n  623 |             .ok_or(Error::DecodeError(\"isomp4 (ilst): expected atom size to be known\"))?;\n  624 | \n  625 |         // TODO: Apply a metadata limit.\n  626 |         let buf = it.read_boxed_slice_exact(size as usize)?;","lines":6}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"next_sample_info returns Ok(None) (interpreted as end-of-stream) when a sample timestamp cannot be converted to a Timestamp or to a Time (lines 362-370). A single sample with an out-of-range timestamp in one track will silently terminate decoding of ALL tracks instead of reporting an error or skipping that track, truncating playback.","fix":"Distinguish 'no more samples' from 'sample present but unrepresentable': continue/skip the offending track or return a decode error rather than signalling global end-of-stream.","locations":[{"ref":"symphonia-format-isomp4/src/demuxer.rs:360-370","code":"  360 |                 if let Some(timing) = seg.sample_timing(state.track_num, state.next_sample)? {\n  361 |                     // Calculate the presentation time using the timestamp.\n  362 |                     let Some(ts) = timing.ts.try_into().ok()\n  363 |                     else {\n  364 |                         return Ok(None);\n  365 |                     };\n  366 | \n  367 |                     let Some(sample_time) = tb.calc_time(ts)\n  368 |                     else {\n  369 |                         return Ok(None);\n  370 |                     };","lines":11}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Typo in user-facing/log error strings. The decode error for an invalid track number in a block reads 'mkv: unvalid track number for block' ('unvalid'). Additionally, `AudioElement` BitDepth validation reports 'mkv: invalid (0) track number' when the offending element is actually the audio bit depth, which is a copy-paste of the wrong message and would mislead debugging.","fix":"Fix 'unvalid' -> 'invalid', and change the BitDepth error message to 'mkv: invalid (0) audio bit depth'.","locations":[{"ref":"symphonia-format-mkv/src/lacing.rs:147","code":"  147 |         tracks.get(&track_num).ok_or(Error::DecodeError(\"mkv: unvalid track number for block\"))?;","lines":1},{"ref":"symphonia-format-mkv/src/segment.rs:596-602","code":"  596 |                 MkvElement::BitDepth => {\n  597 |                     // Non-mandatory element. Must not be 0. No schema-defined default.\n  598 |                     let val = NonZeroU64::new(it.read_u64_no_default()?)\n  599 |                         .ok_or(EbmlError::ElementError(\"mkv: invalid (0) track number\"))?;\n  600 | \n  601 |                     bit_depth = Some(val);\n  602 |                 }","lines":7}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"WAVE `read_pcm_fmt` and `read_ieee_fmt` accept fmt chunk lengths of exactly 16/18/40 but a fmt chunk with len between those (e.g. 17, 20, 41) is rejected as malformed even though the extra bytes could simply be ignored. More importantly, for len > 40 (some encoders pad), valid files are rejected. The extensible reader uses `len < 40` (>= allowed) but the basic/ieee readers use exact-equality, an inconsistency.","fix":"Accept len >= the required minimum and rely on parse_and_skip_unread / ChunkParser to discard the remainder, matching the extensible path.","locations":[{"ref":"symphonia-format-riff/src/wave/chunks.rs:62-77","code":"   62 |         match len {\n   63 |             // Basic WavFormat struct, no extension.\n   64 |             16 => (),\n   65 |             // WaveFormatEx with extension data length field present, but no extension data.\n   66 |             18 => {\n   67 |                 // Extension data length should be 0.\n   68 |                 let _extension_len = reader.read_be_u16()?;\n   69 |             }\n   70 |             // WaveFormatEx with extension data length field present, and extension data.\n   71 |             40 => {\n   72 |                 // Extension data length should be either 0 or 22 (if valid data is present).\n   73 |                 let _extension_len = reader.read_u16()?;\n   74 |                 reader.ignore_bytes(22)?;\n   75 |             }\n   76 |             _ => return decode_error(\"wav: malformed fmt_pcm chunk\"),\n   77 |         }","lines":16},{"ref":"symphonia-format-riff/src/wave/chunks.rs:158-173","code":"  158 |         match len {\n  159 |             16 => (),\n  160 |             18 => {\n  161 |                 let extra_size = reader.read_u16()?;\n  162 |                 if extra_size != 0 {\n  163 |                     return decode_error(\"wav: extra data not expected for fmt_ieee chunk\");\n  164 |                 }\n  165 |             }\n  166 |             40 => {\n  167 |                 // WAVEFORMATEXTENSIBLE is used for formats having more than two channels\n  168 |                 // or higher sample resolutions than allowed by WAVEFORMATEX but for now\n  169 |                 // we just ignore it\n  170 |                 let _ = reader.ignore_bytes(40 - 16);\n  171 |             }\n  172 |             _ => return decode_error(\"wav: malformed fmt_ieee chunk\"),\n  173 |         }","lines":16}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `read_ieee_fmt`, the 40-byte branch does `let _ = reader.ignore_bytes(40 - 16);` discarding the Result of an IO operation with `let _`. If the stream is truncated here the error is silently swallowed and parsing continues with the reader at an unexpected position, unlike the 18-byte branch which checks the read. The `read_alaw_pcm_fmt`/`read_mulaw_pcm_fmt` paths propagate errors correctly, so this is inconsistent.","fix":"Propagate the error with `reader.ignore_bytes(40 - 16)?;` instead of discarding it.","locations":[{"ref":"symphonia-format-riff/src/wave/chunks.rs:166-171","code":"  166 |             40 => {\n  167 |                 // WAVEFORMATEXTENSIBLE is used for formats having more than two channels\n  168 |                 // or higher sample resolutions than allowed by WAVEFORMATEX but for now\n  169 |                 // we just ignore it\n  170 |                 let _ = reader.ignore_bytes(40 - 16);\n  171 |             }","lines":6}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`read_string` / `read_string_list` cast `reader.bytes_available()` (a u64) to usize for `max_len` and loop conditions. On a 32-bit target a frame body larger than usize::MAX bytes could truncate, but more importantly the broader pattern of `as usize` casts on attacker-controlled lengths (e.g. Vorbis `comment_length as usize`, FLAC `media_type_len`/`desc_len`/`data_len as usize`, APE item `len`) performs no upper bound check before allocating. The code comments themselves flag this with repeated `// TODO: Apply a limit.` markers, confirming unbounded allocation from attacker-controlled sizes is a known gap.","fix":"Validate declared lengths against the remaining bytes in the enclosing scoped stream before allocating (FiniteStream::bytes_available), and/or impose a configurable maximum allocation size, so a small malformed file cannot trigger multi-GB allocations.","locations":[{"ref":"symphonia-metadata/src/embedded/vorbis.rs:389-395","code":"  389 |         let comment_length = reader.read_u32()?;\n  390 | \n  391 |         // TODO: Apply a limit.\n  392 | \n  393 |         // Read the comment string.\n  394 |         let mut comment_data = vec![0; comment_length as usize];\n  395 |         reader.read_buf_exact(&mut comment_data)?;","lines":7},{"ref":"symphonia-metadata/src/embedded/flac.rs:62-120","code":"   62 | pub fn read_flac_picture_block<B: ReadBytes>(reader: &mut B) -> Result<Visual> {\n   63 |     let type_enc = reader.read_be_u32()?;\n   64 | \n   65 |     // Read the Media Type length in bytes.\n   66 |     // TODO: Apply a limit.\n   67 |     let media_type_len = reader.read_be_u32()? as usize;\n   68 | \n   69 |     // Read the Media Type bytes\n   70 |     let media_type_buf = reader.read_boxed_slice_exact(media_type_len)?;\n   71 | \n   72 |     // Convert Media Type bytes to an ASCII string. Non-printable ASCII characters are invalid.\n   73 |     let media_type = match printable_ascii_to_string(&media_type_buf) {\n   74 |         Some(s) => {\n   75 |             // Return None if the media-type string is empty.\n   76 |             Some(s).filter(|s| !s.is_empty())\n   77 |         }\n   78 |         None => return decode_error(\"meta (flac): picture mime-type contains invalid characters\"),\n   79 |     };\n   80 | \n   81 |     let mut tags = vec![];\n   82 | \n   83 |     // Read the description length in bytes.\n   84 |     // TODO: Apply a limit.\n   85 |     let desc_len = reader.read_be_u32()? as usize;\n   86 | \n   87 |     // Read the description bytes.\n   88 |     let desc_buf = reader.read_boxed_slice_exact(desc_len)?;\n   89 | \n   90 |     // Convert to a UTF-8 string.\n   91 |     let desc = String::from_utf8_lossy(&desc_buf);\n   92 | \n   93 |     if !desc.is_empty() {\n   94 |         let desc = Arc::new(desc.into_owned());\n   95 |         let tag =\n   96 |             Tag::new_from_parts(\"DESCRIPTION\", desc.clone(), Some(StandardTag::Description(desc)));\n   97 | \n   98 |         tags.push(tag);\n   99 |     }\n  100 | \n  101 |     // Read the width, and height of the visual.\n  102 |     let width = reader.read_be_u32()?;\n  103 |     let height = reader.read_be_u32()?;\n  104 | \n  105 |     // If either the width or height is 0, then the size is invalid.\n  106 |     let dimensions = if width > 0 && height > 0 { Some(Size { width, height }) } else { None };\n  107 | \n  108 |     // Read bits-per-pixel of the visual.\n  109 |     let _bits_per_pixel = NonZeroU8::new(reader.read_be_u32()? as u8);\n  110 | \n  111 |     // Indexed colours is only valid for image formats that use an indexed colour palette. If it is\n  112 |     // 0, the image does not used indexed colours.\n  113 |     let _color_mode = reader.read_be_u32()?;\n  114 | \n  115 |     // Read the image data length in bytes.\n  116 |     // TODO: Apply a limit.\n  117 |     let data_len = reader.read_be_u32()? as usize;\n  118 | \n  119 |     // Read the image data.\n  120 |     let data = reader.read_boxed_slice_exact(data_len)?;","lines":59},{"ref":"symphonia-metadata/src/ape.rs:251-273","code":"  251 |     fn read<B: ReadBytes>(reader: &mut B, header: &ApeHeader) -> Result<ApeItem> {\n  252 |         // The length of the value in bytes.\n  253 |         let len = reader.read_u32()? as usize;\n  254 | \n  255 |         // Read flags.\n  256 |         let flags hing `RegisterableAudioDecoder` / `RegisterableVideoDecoder`). The bound is on `SubtitleDecoder`, so the participle 'Decoded' is clearly a typo. Although gated behind the experimental `exp-subtitle-codecs` feature, it is part of the public API surface.","fix":"Rename the trait to `RegisterableSubtitleDecoder` throughout.","locations":[{"ref":"symphonia-core/src/codecs/registry.rs:80","code":"   80 | pub trait RegisterableSubtitleDecoded: SubtitleDecoder {","lines":1},{"ref":"symphonia-core/src/codecs/registry.rs:301","code":"  301 |     pub fn register_subtitle_decoder<C: RegisterableSubtitleDecoded>(&mut self) {","lines":1},{"ref":"symphonia-core/src/codecs/registry.rs:310","code":"  310 |     pub fn register_subtitle_decoder_at_tier<C: RegisterableSubtitleDecoded>(","lines":1}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"Inconsistent builder method naming on `Hint`: the extension setter is `with_extension(&mut self, ...)` while the MIME setter is `mime_type(&mut self, ...)` (no `with_` prefix). This asymmetry is surprising for an API and easy to get wrong; one of the two should be renamed for consistency.","fix":"Rename `mime_type` to `with_mime_type` (keeping a deprecated alias if needed) so both setters follow the same convention.","locations":[{"ref":"symphonia-core/src/formats/probe.rs:272-282","code":"  272 |     /// Add a file extension hint.\n  273 |     pub fn with_extension(&mut self, extension: &str) -> &mut Self {\n  274 |         self.extension = Some(extension.to_owned());\n  275 |         self\n  276 |     }\n  277 | \n  278 |     /// Add a MIME/Media-type hint.\n  279 |     pub fn mime_type(&mut self, mime_type: &str) -> &mut Self {\n  280 |         self.mime_type = Some(mime_type.to_owned());\n  281 |         self\n  282 |     }","lines":11}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","description":"Unbounded, attacker-controlled eager allocation. `read_binary`/`read_string`/`read_binary_into` and `read_boxed_slice_exact` allocate `data_size` bytes up-front via `vec![0u8; len]` (see symphonia-core io::mod.rs read_boxed_slice_exact). `data_size` is read directly from the EBML element header. For elements whose parent has a known size, `next_header` bounds child_end <= parent_end, but the Segment and Cluster elements are declared EBML_UNKNOWN size, and for non-seekable streams the document length is `None`, so there is no upper bound. A crafted SimpleBlock/Block/CodecPrivate/FileData with a huge VINT data size (up to ~2^56) triggers a multi-petabyte `Vec` allocation (OOM / abort) before any byte is read.","fix":"Cap element data sizes against the remaining bytes of the stream/parent before allocating, or read incrementally in bounded chunks (read into a growable buffer with a sane per-element cap). Reject data sizes exceeding remaining stream length when known, and impose an absolute maximum for unknown-size parents.","locations":[{"ref":"symphonia-format-mkv/src/ebml.rs:837-853","code":"  837 |     pub(crate) fn read_binary(&mut self) -> Result<Box<[u8]>> {\n  838 |         let element = self.current_or_err()?;\n  839 | \n  840 |         match element.element_info {\n  841 |             Some(info) => match info.data_type() {\n  842 |                 EbmlDataType::Master => Err(EbmlError::ExpectedNonMasterElement),\n  843 |                 EbmlDataType::Binary => {\n  844 |                     let size = element.data_size.ok_or(EbmlError::UnknownElementDataSize)? as usize;\n  845 |                     let data = self.reader.read_boxed_slice_exact(size)?;\n  846 |                     self.discard_current();\n  847 |                     Ok(data)\n  848 |                 }\n  849 |                 _ => Err(EbmlError::UnexpectedElementDataType),\n  850 |             },\n  851 |             _ => Err(EbmlError::UnknownElement),\n  852 |         }\n  853 |     }","lines":17},{"ref":"symphonia-format-mkv/src/ebml.rs:793-818","code":"  793 |     pub(crate) fn read_string(&mut self) -> Result<Option<String>> {\n  794 |         let element = self.current_or_err()?;\n  795 | \n  796 |         match element.element_info {\n  797 |             Some(info) => match info.data_type() {\n  798 |                 EbmlDataType::Master => Err(EbmlError::ExpectedNonMasterElement),\n  799 |                 EbmlDataType::String => {\n  800 |                     let size = element.data_size.ok_or(EbmlError::UnknownElementDataSize)? as usize;\n  801 |                     match size {\n  802 |                         0 => {\n  803 |                             self.discard_current();\n  804 |                             Ok(None)\n  805 |                         }\n  806 |                         _ => {\n  807 |                             let data = self.reader.read_boxed_slice_exact(size)?;\n  808 |                             self.discard_current();\n  809 |                             let bytes = data.split(|b| *b == 0).next().unwrap_or(&data);\n  810 |                             Ok(Some(String::from_utf8_lossy(bytes).into_owned()))\n  811 |                         }\n  812 |                     }\n  813 |                 }\n  814 |                 _ => Err(EbmlError::UnexpectedElementDataType),\n  815 |             },\n  816 |             _ => Err(EbmlError::UnknownElement),\n  817 |         }\n  818 |     }","lines":26}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"`requantize_long` and `requantize_short` both call `f64::powf(2.0, 0.25 * f64::from(a - b))` once per scale-factor band, on the decode hot path. The exponent argument `0.25 * (a - b)` is always a multiple of 0.25 over a bounded integer range, so this could be replaced with a small precomputed power-of-two lookup table (as is commonly done in MP3 decoders) or with `exp2`, avoiding the relatively expensive generic `powf` for every band of every granule.","fix":"Precompute a lookup table of `2^(0.25
