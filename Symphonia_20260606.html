plement by-8 method.`), unlike `Crc16Ansi` and `Crc32` which use the slice-by-8 tables. For CRC over large buffers (e.g. per-frame checks) this is several times slower than necessary.","fix":"Implement a slice-by-8 (or at least slice-by-4) loop using the additional precomputed tables, as done for `Crc16Ansi`/`Crc32`.","locations":[{"ref":"symphonia-core/src/checksum/crc16.rs:406-412","code":"  406 |     fn process_buf_bytes(&mut self, buf: &[u8]) {\n  407 |         // TODO: Implement by-8 method.\n  408 |         for byte in buf.iter() {\n  409 |             self.process_byte(*byte);\n  410 |         }\n  411 |     }\n  412 | }","lines":7}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"`Probe::register_metadata_at_tier` re-sorts and re-dedups the entire `self.anchors` vector inside the per-`probe_data` loop every time a metadata reader with anchors is registered (`sort_by` + `dedup` on each iteration). For N anchored entries this is O(N^2 log N) over registration. Registration is one-time, but with many anchored metadata readers it is needless repeated work.","fix":"Accumulate all anchors during registration and perform a single sort+dedup lazily (e.g. before the first probe, or once after all registrations), rather than on every insertion.","locations":[{"ref":"symphonia-core/src/formats/probe.rs:387-398","code":"  387 |             match data.anchors {\n  388 |                 Anchors::Exclusive(anchors) | Anchors::Supplemental(anchors) => {\n  389 |                     self.anchors.extend_from_slice(anchors);\n  390 |                     // Iterating a stream backwards is very inefficient because a seek backwards\n  391 |                     // invalidates the entire lookahead buffer. Therefore, the list of anchors is\n  392 |                     // sorted from largest to smallest offset so that the iteration can be in the\n  393 |                     // forward direction.\n  394 |                     self.anchors.sort_by(|a, b| b.cmp(a));\n  395 |                     self.anchors.dedup();\n  396 |                 }\n  397 |                 _ => (),\n  398 |             }","lines":12}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"MoovSegment uses linear O(N) scans for sample timing/lookup: SttsAtom::find_timing_for_sample and find_sample_for_timestamp iterate all entries per query, and these are called once per packet from next_sample_info/seek. For large files with many stts entries, next_packet becomes O(N) per sample and seeking becomes O(N) per segment scan. The stts table could be preprocessed into cumulative arrays to enable O(log N) binary search like stsc already does.","fix":"Precompute cumulative sample-count and cumulative-duration prefix sums for the stts entries at parse time and binary-search them, mirroring StscAtom::find_entry_for_sample.","locations":[{"ref":"symphonia-format-isomp4/src/atoms/stts.rs:28-72","code":"   28 |     pub fn find_timing_for_sample(&self, sample_num: u32) -> Option<(u64, u32)> {\n   29 |         let mut ts = 0;\n   30 |         let mut next_entry_first_sample = 0;\n   31 | \n   32 |         // The Stts atom compactly encodes a mapping between number of samples and sample duration.\n   33 |         // Iterate through each entry until the entry containing the next sample is found. The next\n   34 |         // packet timestamp is then the sum of the product of sample count and sample duration for\n   35 |         // the n-1 iterated entries, plus the product of the number of consumed samples in the n-th\n   36 |         // iterated entry and sample duration.\n   37 |         for entry in &self.entries {\n   38 |             next_entry_first_sample += entry.sample_count;\n   39 | \n   40 |             if sample_num < next_entry_first_sample {\n   41 |                 let entry_sample_offset = sample_num + entry.sample_count - next_entry_first_sample;\n   42 |                 ts += u64::from(entry.sample_delta) * u64::from(entry_sample_offset);\n   43 | \n   44 |                 return Some((ts, entry.sample_delta));\n   45 |             }\n   46 | \n   47 |             ts += u64::from(entry.sample_count) * u64::from(entry.sample_delta);\n   48 |         }\n   49 | \n   50 |         None\n   51 |     }\n   52 | \n   53 |     /// Get the sample that contains the timestamp indicated by `ts`. Note, the returned `sample_num`\n   54 |     /// is indexed relative to the `SttsAtom`. Complexity of this function in O(N).\n   55 |     pub fn find_sample_for_timestamp(&self, ts: u64) -> Option<u32> {\n   56 |         let mut ts_accum = 0;\n   57 |         let mut sample_num = 0;\n   58 | \n   59 |         for entry in &self.entries {\n   60 |             let delta = u64::from(entry.sample_delta) * u64::from(entry.sample_count);\n   61 | \n   62 |             if ts_accum + delta > ts {\n   63 |                 sample_num += ((ts - ts_accum) / u64::from(entry.sample_delta)) as u32;\n   64 |                 return Some(sample_num);\n   65 |             }\n   66 | \n   67 |             ts_accum += delta;\n   68 |             sample_num += entry.sample_count;\n   69 |         }\n   70 | \n   71 |         None\n   72 |     }","lines":45},{"ref":"symphonia-format-isomp4/src/stream.rs:365-385","code":"  365 |     fn sample_timing(&self, track_num: usize, sample_num: u32) -> Result<Option<SampleTiming>> {\n  366 |         // Get the trak atom associated with track_num.\n  367 |         debug_assert!(track_num < self.moov.traks.len());\n  368 | \n  369 |         let trak = &self.moov.traks[track_num];\n  370 | \n  371 |         // Find the sample timing. Note, complexity of O(N).\n  372 |         let timing = trak.mdia.minf.stbl.stts.find_timing_for_sample(sample_num);\n  373 | \n  374 |         if let Some((ts, dur)) = timing { Ok(Some(SampleTiming { ts, dur })) } else { Ok(None) }\n  375 |     }\n  376 | \n  377 |     fn ts_sample(&self, track_num: usize, ts: u64) -> Result<Option<u32>> {\n  378 |         // Get the trak atom associated with track_num.\n  379 |         debug_assert!(track_num < self.moov.traks.len());\n  380 | \n  381 |         let trak = &self.moov.traks[track_num];\n  382 | \n  383 |         // Find the sample timestamp. Note, complexity of O(N).\n  384 |         Ok(trak.mdia.minf.stbl.stts.find_sample_for_timestamp(ts))\n  385 |     }","lines":21}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"MoovSegment::sample_data computes a variable-size sample offset by summing every preceding sample size in the chunk on each call (entries[chunk_first_sample..sample_num].iter().sum()). When seeking/advancing within large chunks this is O(samples_in_chunk) per query, making sequential reads of a big chunk O(n^2) overall.","fix":"Cache the running offset within the current chunk in TrackState (the demuxer already advances next_sample_pos sequentially), or precompute per-sample cumulative offsets, to avoid re-summing on every sample.","locations":[{"ref":"symphonia-format-isomp4/src/stream.rs:436-447","code":"  436 |                 SampleSize::Variable(ref entries) => {\n  437 |                     // For variable size samples, sum the sizes of all the samples preceeding the\n  438 |                     // desired sample in the chunk.\n  439 |                     let chunk_first_sample = (sample_num - sample_in_chunk) as usize;\n  440 | \n  441 |                     if let Some(samples) = entries.get(chunk_first_sample..sample_num as usize) {\n  442 |                         samples.iter().map(|&size| u64::from(size)).sum()\n  443 |                     }\n  444 |                     else {\n  445 |                         return decode_error(\"isomp4: missing one or more stsz entries\");\n  446 |                     }\n  447 |                 }","lines":12}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"`UnsyncStream::ignore_bytes` skips bytes one at a time via `self.inner.read_byte()` in a loop. For large skipped regions (e.g. an unsupported compressed frame inside an unsynchronised ID3v2.2/2.3 tag, where the body can be megabytes), this is a per-byte virtual call loop instead of a bulk skip.","fix":"Delegate to a bulk skip on the inner stream where unsynchronisation semantics permit, or read in chunks rather than byte-by-byte. Note unsync expansion means the count is in decoded bytes, so a correct bulk implementation must still honor 0xFF 0x00 collapsing.","locations":[{"ref":"symphonia-metadata/src/id3v2/unsync.rs:174-179","code":"  174 |     fn ignore_bytes(&mut self, count: u64) -> io::Result<()> {\n  175 |         for _ in 0..count {\n  176 |             self.inner.read_byte()?;\n  177 |         }\n  178 |         Ok(())\n  179 |     }","lines":6}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","description":"`copy_to_vecs_planar` and `copy_bytes_to_vecs_planar*` resize the outer vector with `Default::default()` (an empty Vec) and then resize each inner vector to the needed length in a second pass. If the outer vector was previously shorter, the newly pushed empty inner vectors are immediately grown again, and any pre-existing-but-too-long inner vectors are silently shrunk without reusing freed capacity meaningfully. For repeated calls with a reused destination this is fine, but the two-phase resize re-walks every plane each call even when nothing changed.","fix":"This is acceptable as written; if it shows up in profiles, skip the inner resize when `vec.len()` already matches the target length.","locations":[{"ref":"symphonia-core/src/audio/mod.rs:307-320","code":"  307 |     fn copy_to_vecs_planar<Sout>(&self, dst: &mut Vec<Vec<Sout>>)\n  308 |     where\n  309 |         Sout: Sample + FromSample<S>,\n  310 |     {\n  311 |         // Ensure there is one vector per plane.\n  312 |         dst.resize(self.num_planes(), Default::default());\n  313 | \n  314 |         // Ensure the vector for each plane is the correct length.\n  315 |         for vec in dst.iter_mut() {\n  316 |             vec.resize(self.samples_planar(), Sout::MID);\n  317 |         }\n  318 | \n  319 |         self.copy_to_slice_planar(dst);\n  320 |     }","lines":14},{"ref":"symphonia-core/src/audio/mod.rs:585-622","code":"  585 |     fn copy_bytes_to_vecs_planar(&self, dst: &mut Vec<Vec<u8>>) {\n  586 |         // Ensure there is one vector per plane.\n  587 |         dst.resize(self.num_planes(), Default::default());\n  588 | \n  589 |         // Ensure the vector for each plane is the correct length.\n  590 |         for vec in dst.iter_mut() {\n  591 |             vec.resize(self.byte_len_per_plane(), 0);\n  592 |         }\n  593 | \n  594 |         self.copy_bytes_planar(dst);\n  595 |     }\n  596 | \n  597 |     /// Copy audio planes as bytes to discrete byte vectors after converting to a different sample\n  598 |     /// format.\n  599 |     ///\n  600 |     /// This function takes a mutable reference to a vector of vectors. The outer vector is resized\n  601 |     /// to match the number of audio planes being copied. Each inner byte vector is resized to\n  602 |     /// match the number of bytes per plane.\n  603 |     ///\n  604 |     /// # Realtime Safety\n  605 |     ///\n  606 |     /// This function allocates if either the outer vector is not long enough, or if an audio plane\n  607 |     /// vector is not long enough. Allocations can be avoided if all vectors have capacity reserved\n  608 |     /// ahead of time.\n  609 |     fn copy_bytes_to_vecs_planar_as<Sout>(&self, dst: &mut Vec<Vec<u8>>)\n  610 |     where\n  611 |         Sout: SampleBytes + FromSample<S>,\n  612 |     {\n  613 |         // Ensure there is one vector per plane.\n  614 |         dst.resize(self.num_planes(), Default::default());\n  615 | \n  616 |         // Ensure the vector for each plane is the correct length.\n  617 |         for vec in dst.iter_mut() {\n  618 |             vec.resize(self.byte_len_per_plane_as::<Sout>(), 0);\n  619 |         }\n  620 | \n  621 |         self.copy_bytes_planar_as::<Sout, _>(dst);\n  622 |     }","lines":38}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"info","description":"PagePackets::partial_packet recomputes the sum of all remaining packet lengths by iterating the lens slice each time it is called. This is O(n) over the packet count and is invoked per page during normal demuxing. Minor, but the total page body length and consumed length are already known elsewhere and could be tracked directly.","fix":"Track the total consumed length while iterating packets (or store the body length already accounted for) instead of summing the lens slice on each partial_packet call.","locations":[{"ref":"symphonia-format-ogg/src/page.rs:97-102","code":"   97 |     pub fn partial_packet(self) -> Option<&'a [u8]> {\n   98 |         // Consume the rest of the packets.\n   99 |         let discard = usize::from(self.lens.sum::<u16>());\n  100 | \n  101 |         if self.data.len() > discard { Some(&self.data[discard..]) } else { None }\n  102 |     }","lines":6}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"info","description":"`map_discrete` and `map_positioned` (PulseAudio path) and the per-tag formatting match in ui.rs are large, but the notable maintainability item is `fmt_tag`: a ~250-line match with one arm per StandardTag variant. This is acceptable for a CLI but is a copy-paste-prone monster; several arms also contain typos in the displayed label (\"Art Directory\" for ArtDirector, \"Assisstant Director\", \"Choregrapher\") indicating the hand-maintained list is error-prone.","fix":"Consider deriving the display name from the enum via a macro or table to reduce duplication and typos; at minimum fix the visible label typos (Art Director, Assistant Director, Choreographer).","locations":[{"ref":"symphonia-play/ SO/IEC 14496-3 4.6.3 (pulse data); requant should be requant(val) = (val/scale)^(3/4) keeping sign, then re-applied via iquant*scale.","locations":[{"ref":"symphonia-codec-aac/src/aac/ics/pulse.rs:24-31","code":"   24 | #[inline(always)]\n   25 | fn requant(val: f32, scale: f32) -> f32 {\n   26 |     if scale == 0.0 {\n   27 |         return 0.0;\n   28 |     }\n   29 |     let bval = val / scale;\n   30 |     if bval >= 0.0 { val.powf(3.0 / 4.0) } else { -((-val).powf(3.0 / 4.0)) }\n   31 | }","lines":8},{"ref":"symphonia-codec-aac/src/aac/ics/pulse.rs:91-103","code":"   91 |             let mut base = coeffs[k];\n   92 | \n   93 |             if base != 0.0 {\n   94 |                 base = requant(coeffs[k], scale);\n   95 |             }\n   96 | \n   97 |             if base > 0.0 {\n   98 |                 base += f32::from(self.pulse_amp[pno]);\n   99 |             }\n  100 |             else {\n  101 |                 base -= f32::from(self.pulse_amp[pno]);\n  102 |             }\n  103 |             coeffs[k] = iquant(base) * scale;","lines":13}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"The `unset` method of the bitset macro is fully commented out, and the accompanying `TODO: Should be -1?` in find_neighbors plus the commented-out KSDATAFORMAT_SUBTYPE_ADPCM block are stale dead code/comments that add noise.","fix":"Remove the commented-out `unset` method (and the stale ADPCM GUID block in wave/chunks.rs) or convert to a documented decision. Resolve the `-1?` TODO.","locations":[{"ref":"symphonia-codec-vorbis/src/common.rs:68-74","code":"   68 |             // #[inline(always)]\n   69 |             // pub fn unset(&mut self, idx: usize) {\n   70 |             //     if self.is_set(idx) {\n   71 |             //         self.bits[idx >> 5] &= !(1 << (idx & 0x1f));\n   72 |             //         self.bit_count -= 1;\n   73 |             //     }\n   74 |             // }","lines":7},{"ref":"symphonia-codec-vo ad_code)]\n  353 | #[derive(Debug)]\n  354 | pub(crate) struct TrackElement {\n  355 |     pub(crate) number: NonZeroU64,\n  356 |     pub(crate) uid: NonZeroU64,\n  357 |     pub(crate) lang: String,\n  358 |     pub(crate) lang_bcp47: Option<String>,\n  359 |     pub(crate) codec_id: String,\n  360 |     pub(crate) codec_private: Option<Box<[u8]>>,\n  361 |     pub(crate) codec_delay: MatroskaTicks,\n  362 |     pub(crate) block_addition_mappings: Vec<BlockAdditionMappingElement>,\n  363 |     pub(crate) audio: Option<AudioElement>,\n  364 |     pub(crate) video: Option<VideoElement>,\n  365 |     pub(crate) default_duration: Option<NonZeroMatroskaTicks>,\n  366 |     pub(crate) default_decoded_field_duration: Option<NonZeroMatroskaTicks>,\n  367 |     pub(crate) track_timestamp_scale: f64,\n  368 |     pub(crate) seek_pre_roll: MatroskaTicks,\n  369 |     pub(crate) flags: TrackFlags,\n  370 | }","lines":19}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","description":"RiffInfoListChunks always parses every chunk as an InfoChunk regardless of tag (parse_tag ignores the tag and unconditionally returns Info), with a TODO acknowledging it does not validate the chunk is an info chunk. This means arbitrary sub-chunks inside a LIST/INFO are read into memory as info entries; combined with `// TODO: Apply limit.` in InfoChunk::parse (read_boxed_slice_exact of attacker-controlled len with no cap) this is an unbounded allocation per info chunk.","fix":"Validate the info sub-chunk tag and apply a sane size limit (the TODO) before allocating with read_boxed_slice_exact.","locations":[{"ref":"symphonia-format-riff/src/wave/chunks.rs:648-656","code":"  648 | impl ParseChunkTag for RiffInfoListChunks {\n  649 |     fn parse_tag(tag: [u8; 4], len: u32) -> Option<Self> {\n  650 |         // Right now it is assumed all list chunks are INFO chunks, but that's not really\n  651 |         // guaranteed.\n  652 |         //\n  653 |         // TODO: Actually validate that the chunk is an info chunk.\n  654 |         parser!(RiffInfoListChunks::Info, InfoChunk, tag, len)\n  655 |     }\n  656 | }","lines":9},{"ref":"symphonia-format-riff/src/wave/chunks.rs:599-605","code":"  599 | impl ParseChunk for InfoChunk {\n  600 |     fn parse<B: ReadBytes>(reader: &mut B, tag: [u8; 4], len: u32) -> Result<InfoChunk> {\n  601 |         // TODO: Apply limit.\n  602 |         let buf = reader.read_boxed_slice_exact(len as usize)?;\n  603 |         Ok(InfoChunk { tag, buf })\n  604 |     }\n  605 | }","lines":7}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`parse_disc_number_exclusive` is defined in std_tag.rs but there is also `parse_disc_number` (m-of-n form). The exclusive variant is used by Vorbis (\"disc\"/\"disk\"), which is fine, but std_tag.rs carries a large block of commented-out parsers (parse_musicbrainz_genre_id, parse_musicbrainz_label_id, parse_original_writer, parse_purchase_date, the entire TV episode/season/network/show block) that are dead commented code. While the file already `#![allow(dead_code)]` for feature-gating, these commented blocks are stale scaffolding rather than feature-gated live code.","fix":"Remove the commented-out parser definitions, or move them behind a tracked TODO/issue rather than leaving large commented blocks inline.","locations":[{"ref":"symphonia-metadata/src/utils/std_tag.rs:183-184","code":"  183 | // noop_parser!(parse_musicbrainz_genre_id, StandardTag::MusicBrainzGenreId);\n  184 | // noop_parser!(parse_musicbrainz_label_id, StandardTag::MusicBrainzLabelId);","lines":2},{"ref":"symphonia-metadata/src/utils/std_tag.rs:305-318","code":"  305 | // pub fn parse_tv_episode(v: Arc<String>) -> StandardTagPair {\n  306 | //     let tv_episode = v.parse::<u64>().ok().map(StandardTag::TvEpisode);\n  307 | //     [tv_episode, None]\n  308 | // }\n  309 | \n  310 | // noop_parser!(parse_tv_episode_title, StandardTag::TvEpisodeTitle);\n  311 | // noop_parser!(parse_tv_network, StandardTag::TvNetwork);\n  312 | \n  313 | // pub fn parse_tv_season(v: Arc<String>) -> StandardTagPair {\n  314 | //     let tv_season = v.parse::<u64>().ok().map(StandardTag::TvSeason);\n  315 | //     [tv_season, None]\n  316 | // }\n  317 | \n  318 | // noop_parser!(parse_tv_show_title, StandardTag::TvShowTitle);","lines":14}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In `render_with`, the success return value `num_new_frames - (end - self.num_frames)` always evaluates to `num_new_frames`: the `while self.num_frames < end` loop only exits normally when `self.num_frames == end` (the error path returns early via `?`), so `end - self.num_frames` is always 0. The subtraction is dead and obscures intent (it reads as if a partial render could be returned, but it never is).","fix":"Return `num_new_frames` directly, or restructure so that an early-terminated render genuinely returns the partial count if that is the intended behavior.","locations":[{"ref":"symphonia-core/src/audio/buf.rs:337-345","code":"  337 |         while self.num_frames < end {\n  338 |             // Render frame.\n  339 |             f(self.num_frames, &mut planes)?;\n  340 | \n  341 |             // Commit frame.\n  342 |             self.num_frames += 1;\n  343 |         }\n  344 | \n  345 |         Ok(num_new_frames - (end - self.num_frames))","lines":9}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`MediaSourceStream::read_double_bytes`, `read_triple_bytes`, and `read_quad_bytes` each end their `if/else` block with a `;` after the closing brace (`};`) for a statement that is not a let-binding. Harmless, but the trailing semicolons on the `if` expressions are inconsistent (read_double_bytes uses `};` while the surrounding style elsewhere omits it) and one is even on a plain block. Minor stylistic dead punctuation.","fix":"Remove the redundant trailing ":"info","description":"Large blocks of commented-out code left in source. The page header debug! log (page.rs) and the AacDecoder::flush method plus the NACodecInfoRef field comment are commented out rather than removed, adding noise and risk of drift. The flush comment references fields/behavior that may no longer match the current Ics layout.","fix":"Remove the dead commented code (rely on git history) or, if intentionally kept as documentation, convert to proper doc comments explaining why.","locations":[{"ref":"symphonia-format-ogg/src/page.rs:189-201","code":"  189 |         // debug!(\n  190 |         //     \"page {{ version={}, absgp={}, serial={}, sequence={}, crc={:#x}, n_segments={}, \\\n  191 |         //         is_first={}, is_last={}, is_continuation={} }}\",\n  192 |         //     header.version,\n  193 |         //     header.absgp,\n  194 |         //     header.serial,\n  195 |         //     header.sequence,\n  196 |         //     header.crc,\n  197 |         //     header.n_segments,\n  198 |         //     header.is_first_page,\n  199 |         //     header.is_last_page,\n  200 |         //     header.is_continuation,\n  201 |         // );","lines":13},{"ref":"symphonia-codec-aac/src/aac/mod.rs:224-229","code":"  224 |     // fn flush(&mut self) {\n  225 |     //     for pair in self.pairs.iter_mut() {\n  226 |     //         pair.ics[0].delay = [0.0; 1024];\n  227 |     //         pair.ics[1].delay = [0.0; 1024];\n  228 |     //     }\n  229 |     // }","lines":6},{"ref":"symphonia-codec-aac/src/aac/mod.rs:42-43","code":"   42 | pub struct AacDecoder {\n   43 |     // info: NACodecInfoRef,","lines":2}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc-comment block for ChannelAssignment is broken: line 35 uses `//` instead of `///`, so the paragraph describing LeftSide/RightSide/MidSide difference encoding is not attached to the enum as documentation. The surrounding lines (32-34, 36-39) are `///`.","fix":"Change the `//` on line 35 to `///` so the full description is a single doc comment.","locations":[{"ref":"symphonia-bundle-flac/src/decoder.rs:32-39","code":"   32 | fn decorrelate_left_side(left: &[i32], side: &mut [i32]) {\n   33 |     for (s, l) in side.iter_mut().zip(left) {\n   34 |         *s = *l - *s;\n   35 |     }\n   36 | }\n   37 | \n   38 | fn decorrelate_mid_side(mid: &mut [i32], side: &mut [i32]) {\n   39 |     for (m, s) in mid.iter_mut().zip(side) {","lines":8}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment for `lookup1_values` claims it returns the greatest integer whose `dimensions`-th power is <= entries, but the doc text contains a stray smart-quote and the function actually relies on a float `powf().floor()` which can be off-by-one for large inputs; the asserts (themselves a panic hazard) are the only correctness guard. The comment does not mention the float-precision caveat that motivates the asserts.","fix":"Document the floating-point approximation and the correction needed for large entries/dimensions, and fix the typographic quote in the doc comment.","locations":[{"ref":"symphonia-codec-vorbis/src/codebook.rs:29-44","code":"   29 | /// As defined in section 9.2.3 of the Vorbis I specification.\n   30 | ///\n   31 | /// The return value for this function is defined to be ’the greatest integer value for which the\n   32 | /// return value to the power of `dimensions` is less than or equal to `entries`.\n   33 | #[inline(always)]\n   34 | fn lookup1_values(entries: u32, dimensions: u16) -> u32 {\n   35 |     // (value ^ dimensions) <= entries\n   36 |     // [(value ^ dimensions) ^ (1 / dimensions)] = lower[entries ^ (1 / dimensions)]\n   37 |     // value = lower[entries ^ (1 / dimensions)]\n   38 |     let value = (entries as f32).powf(1.0f32 / f32::from(dimensions)).floor() as u32;\n   39 | \n   40 |     assert!(value.pow(u32::from(dimensions)) <= entries);\n   41 |     assert!((value + 1).pow(u32::from(dimensions)) > entries);\n   42 | \n   43 |     value\n   44 | }","lines":16}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The ALAC version-compatibility error message says \"not compatible with alac version 0\" but the check rejects versions GREATER than 0 (`config.compatible_version > ALAC_VERSION`, ALAC_VERSION == 0). The message is misleading: it is rejecting versions newer than 0, i.e. it only supports version 0.","fix":"Reword the message, e.g. \"common (alac): unsupported alac version (only version 0 is supported)\".","locations":[{"ref":"symphonia-common/src/apple/audio/alac.rs:72-75","code":"   72 |         // Only support up-to the currently implemented ALAC version.\n   73 |         if config.compatible_version > ALAC_VERSION {\n   74 |             return unsupported_error(\"common (alac): not compatible with alac version 0\");\n   75 |         }","lines":4}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Copy-paste typo in `SubtitleCodecId` doc comment: it states \"An `SubtitleCodecId` is a unique identifier used to identify a specific video codec.\" It should say subtitle codec, not video codec.","fix":"Replace \"video codec\" with \"subtitle codec\" in the doc comment.","locations":[{"ref":"symphonia-core/src/codecs/subtitle.rs:22","code":"   22 | /// An `SubtitleCodecId` is a unique identifier used to identify a specific video codec.","lines":1}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Copy-paste typo in well-known video codec table: `CODEC_ID_MPEG4` is documented as \"MPEG-4 Video (MPEG-2 Part 2)\". MPEG-4 Video is MPEG-4 Part 2, not MPEG-2 Part 2.","fix":"Change the comment to \"MPEG-4 Video (MPEG-4 Part 2)\".","locations":[{"ref":"symphonia-core/src/codecs/video.rs:260-261","code":"  260 |     /// MPEG-4 Video (MPEG-2 Part 2)\n  261 |     pub const CODEC_ID_MPEG4: VideoCodecId = VideoCodecId(0xa02);","lines":2}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Garbled / misleading comment in `probe_trailing`. The comment reads \"Skip anchor if the anchor offset exceeds the source length, or intersects the last read preceeds the end of the last successful read.\" which is incoherent (duplicated clause, typo 'preceeds'). It obscures the actual condition being checked (`anchor > end || end - anchor < last_reader_end`).","fix":"Rewrite to: \"Skip the anchor if it lies beyond the start of the source, or if it falls before the end of the last successfully read region.\"","locations":[{"ref":"symphonia-core/src/formats/probe.rs:489-494","code":"  489 |             // Skip anchor if the anchor offset exceeds the source length, or intersects the last\n  490 |             // read preceeds the end of the last successful read.\n  491 |             if anchor > end || end - anchor < last_reader_end {\n  492 |                 debug!(\"skipping trailing metadata offset -{anchor}\");\n  493 |                 continue;\n  494 |             }","lines":6}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Copy-paste documentation error: both `METADATA_ID_WAVE` and `METADATA_ID_AIFF` are documented as \"RIFF tags\". The AIFF constant's doc comment should describe AIFF (FORM/AIFF) tags, not RIFF.","fix":"Change the doc comment on `METADATA_ID_AIFF` to \"AIFF tags\" (or similar).","locations":[{"ref":"symphonia-core/src/meta.rs:938-941","code":"  938 |     /// RIFF tags\n  939 |     pub const METADATA_ID_WAVE: MetadataId = MetadataId(0x400);\n  940 |     /// RIFF tags\n  941 |     pub const METADATA_ID_AIFF: MetadataId = MetadataId(0x401);","lines":4}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `mask_range(upper, lower)` doc comment claims it masks bits \"in positions less than upper, but greater than or equal to lower (upper < bit <= lower)\". The parenthetical range is inverted and inconsistent with the prose and the tests: e.g. `mask_range(5, 2) == 0b0001_1100` sets bits at indices 2,3,4, i.e. `lower <= bit < upper`. The `(upper < bit <= lower)` notation is simply wrong.","fix":"Fix the parenthetical to `(lower <= bit < upper)` to match the implementation and tests.","locations":[{"ref":"symphonia-core/src/util.rs:83-90","code":"   83 |     /// Masks out all bits in positions less than upper, but greater than or equal to lower\n   84 |     /// (upper < bit <= lower)\n   85 |     #[inline(always)]\n   86 |     pub fn mask_range(upper: u32, lower: u32) -> u8 {\n   87 |         debug_assert!(upper <= 8);\n   88 |         debug_assert!(lower <= 8);\n   89 |         ((0xff_u32 << upper) ^ (0xff_u32 << lower)) as u8\n   90 |     }","lines":8}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment for `clamp_i16` says it clamps to the range `[-32_767, 32_768]`, but the function (and its test) clamp to the i16 range `[-32_768, 32_767]`. The stated bounds are both off and swapped.","fix":"Correct the comment to `[-32_768, 32_767]`.","locations":[{"ref":"symphonia-core/src/util.rs:211","code":"  211 |     /// Clamps the given value to the [-32_767, 32_768] range.","lines":1}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Comment on nested SimpleTag handling is inconsistent with the code. The comment states simple tags exist at 'depth >= 3' and that only '3 levels of nesting' are supported, but the guard is `if hdr.depth() < 6`, which allows nesting up to document depth 6 (3 levels of SimpleTag nesting starting at base depth 3). The numeric reference '3' in the comment does not correspond to the literal `6` in the code, making the intent unclear.","fix":"Update the comment to state the actual depth limit (document depth < 6, i.e. up to 3 nested SimpleTag levels) and explain how the literal 6 is derived.","locations":[{"ref":"symphonia-format-mkv/src/segment.rs:1608-1614","code":" 1608 |                 MkvElement::SimpleTag => {\n 1609 |                     // Simple tag elements exist at a depth >= 3. Only support 3 levels of nesting\n 1610 |                     // as this is enough to support Matroska's standardized tagging scheme.\n 1611 |                     if hdr.depth() < 6 {\n 1612 |                         sub_tags.push(it.read_master_element::<SimpleTagElement>()?);\n 1613 |                     }\n 1614 |                 }","lines":7}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Misspelled/incorrect comments and labels: 'Process comments cjunk' (cjunk), 'Saver makers chunk' (Saver makers), tag literal 'COMMMENT' (three Ms) used as the tag key for comments, and 'mapping number must be exist'. The 'COMMMENT' string in particular is a user-visible tag key bug.","fix":"Fix the typos; change the tag key 'COMMMENT' to 'COMMENT'.","locations":[{"ref":"symphonia-format-riff/src/aiff/mod.rs:285-291","code":"  285 |     // Process comments cjunk.\n  286 |     if let Some(comt) = comt {\n  287 |         for comment in comt.comments {\n  288 |             let value = Arc::new(comment.text);\n  289 | \n  290 |             let tag =\n  291 |                 Tag::new_from_parts(\"COMMMENT\", value.clone(), Some(StandardTag::Comment(value)));","lines":7},{"ref":"symphonia-format-riff/src/aiff/mod.rs:153-154","code":"  153 |                     // Saver makers chunk for post-processing.\n  154 |                     mark = Some(chunk.parse(&mut mss)?)","lines":2}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Doc comment on `read_atxt_frame` reads \"Reads an `ATXT` (audio encryption) frame.\" but ATXT is the audio text frame, not audio encryption (AENC is audio encryption). Copy-paste artifact from `read_aenc_frame`.","fix":"Change the comment to \"Reads an `ATXT` (audio text) frame.\".","locations":[{"ref":"symphonia-metadata/src/id3v2/frames/readers.rs:353","code":"  353 | /// Reads an `ATXT` (audio encryption) frame.","lines":1}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Doc comment on `read_user_frame` says \"Reads a USER (terms of use) frame.\" which is correct, but `read_uslt_frame`'s comment says \"Reads a `USLT` (unsynchronized comment) frame.\" USLT is the unsynchronised lyric/text transcription frame, not a comment (COMM is the comment frame). Minor but misleading.","fix":"Change to \"Reads a `USLT` (unsynchronized lyrics/text) frame.\".","locations":[{"ref":"symphonia-metadata/src/id3v2/frames/readers.rs:952","code":"  952 | /// Reads a `USLT` (unsynchronized comment) frame.","lines":1}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The mismatch between `key.len()` (bytes) on line 627 and the char-count padding computed elsewhere is also a latent layout bug: for multi-byte keys the `<pad` comparison and padding width are computed in different units, so column alignment of printed tags will be wrong for non-ASCII keys.","fix":"Compute key length consistently in characters (`key.chars().count()`) and use a char-aware padding/truncation routine.","locations":[{"ref":"symphonia-play/src/ui.rs:626-633","code":"  626 | fn pad_key(key: &str, pad: usize) -> String {\n  627 |     if key.len() <= pad {\n  628 |         format!(\"{key:<pad$}\")\n  629 |     }\n  630 |     else {\n  631 |         // Key length too large.\n  632 |         format!(\"{:.<pad$}\", key.split_at(pad - 2).0)\n  633 |     }","lines":8},{"ref":"symphonia-play/src/ui.rs:621-623","code":"  621 | fn optimal_tag_key_pad(tags: &[Tag], min: usize, max: usize) -> usize {\n  622 |     tags.iter().map(|tag| fmt_tag(tag).key.chars().count()).max().unwrap_or(min).clamp(min, max)\n  623 | }","lines":3}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment typos/wrong text: the `i8` to `u32` converter is annotated `// u3` instead of `// u32`; the `get_sub_range` end-overflow panic message reads `audio buffer slice slice up to maximum usize` (the word `slice` is duplicated). Minor but these are user-visible (the panic message) or confusing.","fix":"Fix `// u3` to `// u32` and remove the duplicated `slice` word in the panic message.","locations":[{"ref":"symphonia-core/src/audio/conv.rs:464","code":"  464 | impl_convert!(i8, u32, s, (i8_to_u8(s) as u32) << 24); // u3","lines":1},{"ref":"symphonia-core/src/audio/util.rs:85-87","code":"   85 |     const fn panic_end_index_overflow() -> usize {\n   86 |         panic!(\"attempted to index audio buffer slice slice up to maximum usize\")\n   87 |     }","lines":3}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Two `// Safety:` comments justify `bytemuck::cast_slice_mut` calls, but those calls are entirely safe Rust (no `unsafe` block is present). A `// Safety:` comment conventionally documents an `unsafe` invariant; using it on safe code is misleading. The reasoning about 1-byte alignment is also redundant because `cast_slice_mut` already returns an error/panics on misalignment rather than relying on this invariant.","fix":"Rename the comment to a plain `// Note:` explaining why the cast cannot fail in practice, since the code is not `unsafe`.","locations":[{"ref":"symphonia-core/src/audio/util.rs:258-263","code":"  258 |     // Safety: This will never panic because `Sin::RawType` is bound by the `ByteAligned` marker\n  259 |     // trait. This trait is only implemented for types that have 1-byte alignment. Therefore,\n  260 |     // since `RawType` can only be assigned one of these types, `RawType` must also have 1-byte\n  261 |     // alignment. In practice, this means that `RawType` will always be an array of `u8`. Therefore,\n  262 |     // it is safe to cast between `&[u8]` and `&[RawType]`.\n  263 |     let dst: &mut [Sout::RawType] = bytemuck::cast_slice_mut(dst.as_mut());","lines":6},{"ref":"symphonia-core/src/audio/util.rs:321-322","code":"  321 |         // Safety: See note in copy_bytes_interleaved.\n  322 |         let dst: &mut [Sout::RawType] = bytemuck::cast_slice_mut(dst.as_mut());","lines":2}]},{"id":"CMT_17","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In `Md5::md5`, the comment states \"The message digest is in big-endian\", but the digest bytes are produced with `state[i].to_le_bytes()` (little-endian), which is the correct MD5 output. The comment contradicts the (correct) code.","fix":"Change the comment to state the digest words are emitted little-endian.","locations":[{"ref":"symphonia-core/src/checksum/md5.rs:222-227","code":"  222 |         // The message digest is in big-endian.\n  223 |         let mut hash = [0; 16];\n  224 |         hash[0..4].copy_from_slice(&state[0].to_le_bytes());\n  225 |         hash[4..8].copy_from_slice(&state[1].to_le_bytes());\n  226 |         hash[8..12].copy_from_slice(&state[2].to_le_bytes());\n  227 |         hash[12..16].copy_from_slice(&state[3].to_le_bytes());","lines":6}]},{"id":"CMT_18","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Doc comment for `read_f64`/`read_be_f64` says \"Reads four bytes from the stream\" but these read eight bytes (a 64-bit float).","fix":"Change \"four bytes\" to \"eight bytes\" in both doc comments.","locations":[{"ref":"symphonia-core/src/io/mod.rs:314-320","code":"  314 |     /// Reads four bytes from the stream and interprets them as a 64-bit little-endian IEEE-754\n  315 |     /// floating-point value.\n  316 |     #[inline(always)]\n  317 |     fn read_f64(&mut self) -> io::Result<f64> {\n  318 |         let mut buf = [0u8; mem::size_of::<u64>()];\n  319 |         self.read_buf_exact(&mut buf)?;\n  320 |         Ok(f64::from_le_bytes(buf))","lines":7},{"ref":"symphonia-core/src/io/mod.rs:323-329","code":"  323 |     /// Reads four bytes from the stream and interprets them as a 64-bit big-endian IEEE-754\n  324 |     /// floating-point value.\n  325 |     #[inline(always)]\n  326 |     fn read_be_f64(&mut self) -> io::Result<f64> {\n  327 |         let mut buf = [0u8; mem::size_of::<u64>()];\n  328 |         self.read_buf_exact(&mut buf)?;\n  329 |         Ok(f64::from_be_bytes(buf))","lines":7}]},{"id":"CMT_19","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The `mask_range` doc comment says it masks bits in positions \"less than upper, but greater than or equal to lower (upper < bit <= lower)\". The inequality notation is contradictory/backwards: the function actually sets bits with index in `[lower, upper)` (lower <= bit < upper), as the tests confirm (e.g. mask_range(5,2) == 0b0001_1100).","fix":"Rewrite the comment to `lower <= bit < upper`.","locations":[{"ref":"symphonia-core/src/util.rs:83-90","code":"   83 |     /// Masks out all bits in positions less than upper, but greater than or equal to lower\n   84 |     /// (upper < bit <= lower)\n   85 |     #[inline(always)]\n   86 |     pub fn mask_range(upper: u32, lower: u32) -> u8 {\n   87 |         debug_assert!(upper <= 8);\n   88 |         debug_assert!(lower <= 8);\n   89 |         ((0xff_u32 << upper) ^ (0xff_u32 << lower)) as u8\n   90 |     }","lines":8}]},{"id":"CMT_20","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment in `clamp_i8` claims `0x7f ^ 0xff = 0x10 (-128)`. `0x7f ^ 0xff` is `0x80`, which is -128 as i8, not `0x10`. The code is correct; only the worked example in the comment is wrong.","fix":"Fix the example to `0x7f ^ 0xff = 0x80 (-128)`.","locations":[{"ref":"symphonia-core/src/util.rs:199-201","code":"  199 |             //  E.g., 0x7f ^ 0x00 = 0x7f (127)\n  200 |             //  E.g., 0x7f ^ 0xff = 0x10 (-128)\n  201 |             0x7f ^ val.wrapping_shr(15) as i8","lines":3}]},{"id":"CMT_21","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In IlstAtom comments and a doc-comment, MetaTagDataAtom/MetaTagNamespaceAtom and IlstAtom are documented as 'User data atom' (copied from udta). IlstAtom is the metadata item-list atom, not user data. Also stsd.rs:444 `if num_channels < 1` is dead (num_channels is u32, can never be < 1 except 0; the intent '== 0' is fine but the `< 1` phrasing is misleading), and stream.rs:430 comment 'Calculat' is a typo.","fix":"Correct the doc comment on IlstAtom to 'Metadata item list atom', change `num_channels < 1` to `num_channels == 0`, and fix the 'Calculat' typo.","locations":[{"ref":"symphonia-format-isomp4/src/atoms/ilst.rs:734-739","code":"  734 | /// User data atom.\n  735 | #[allow(dead_code)]\n  736 | pub struct IlstAtom {\n  737 |     /// Metadata revision.\n  738 |     pub metadata: MetadataRevision,\n  739 | }","lines":6},{"ref":"symphonia-format-isomp4/src/atoms/stsd.rs:442-445","code":"  442 | fn lpcm_channels(num_channels: u32) -> Result<Channels> {\n  443 |     if num_channels < 1 {\n  444 |         return decode_error(\"isomp4: invalid number of channels\");\n  445 |     }","lines":4},{"ref":"symphonia-format-isomp4/src/stream.rs:430","code":"  430 |             // Calculat the byte offset of the sample relative to the chunk containing it.","lines":1}]},{"id":"CMT_22","type":"invalid_comment","type_label":"Invalid Comment","severity":"info","description":"The comment on the qlp_precision field says the precision range is \"(1-16)\", but the code below rejects 16 via `if qlp_precision > 15`. The effective accepted range is 1..=15 (a raw value of 0b1111 is the FLAC escape/reserved value). The comment is misleading about the enforced range.","fix":"Update the comment to state precision is 1-15 (value 16 / raw 0b1111 is reserved and rejected).","locations":[{"ref":"symphonia-bundle-flac/src/decoder.rs:466-471","code":"  466 |     // Quantized linear predictor (QLP) coefficients precision in bits (1-16).\n  467 |     let qlp_precision = bs.read_bits_leq32(4)? + 1;\n  468 | \n  469 |     if qlp_precision > 15 {\n  470 |         return decode_error(\"flac: qlp precision set to reserved value\");\n  471 |     }","lines":6}]},{"id":"CMT_23","type":"invalid_comment","type_label":"Invalid Comment","severity":"info","description":"The comment in `requantize_long` states: \"Since scalefac_shift was multiplies by 4 above, the final equation becomes 2^{ 0.25 * (A - B) }.\" but `scalefac_shift` is set to 1 or 2 (requantize.rs:261), not multiplied by 4; the factor-of-4 actually comes from the `0.25 *` in the exponent combined with the bit shift. The comment is confusingly worded / inaccurate (the `requantize_short` comment at line 340-342 has the same issue). Minor, but misleading when auditing the quantization math.","fix":"Reword the comment to accurately describe how the 0.25 exponent scaling and the `scalefac_shift` bit shift combine, rather than claiming scalefac_shift is multiplied by 4.","locations":[{"ref":"symphonia-bundle-mp3/src/layer3/requantize.rs:277-279","code":"  277 |         // Calculate 2^(0.25*A) * 2^(-B). This can be rewritten as 2^{ 0.25 * (A - 4 * B) }.\n  278 |         // Since scalefac_shift was multiplies by 4 above, the final equation becomes\n  279 |         // 2^{ 0.25 * (A - B) }.","lines":3},{"ref":"symphonia-bundle-mp3/src/layer3/requantize.rs:340-342","code":"  340 |         // Calculate 2^(0.25*A) * 2^(-B). This can be rewritten as 2^{ 0.25 * (A - 4 * B) }.\n  341 |         // Since scalefac_shift multiplies by 4 above, the final equation becomes\n  342 |         // 2^{ 0.25 * (A - B) }.","lines":3}]},{"id":"CMT_24","type":"invalid_comment","type_label":"Invalid Comment","severity":"info","description":"In symphonia-check the per-sample failure print labels the within-frame sample index column as `plane` but it is computed as `acct.n_samples % samples_per_frame`, i.e. the interleaved sample/channel index within a frame, not a plane index. The header string `plane=` is misleading.","fix":"Rename the column label to reflect that it is the channel/sample index within the frame (e.g. `ch=` or `idx=`).","locations":[{"ref":"symphonia-check/src/main.rs:298-308","code":"  298 |                         println!(\n  299 |                             \"[FAIL] packet={:>8}, frame={:>10} ({:>4}), plane={:>3}, dec={:+.8}, ref={:+.8} ({:+.8})\",\n  300 |                             acct.n_packets,\n  301 |                             acct.n_frames,\n  302 |                             acct.n_frames - frame_num_base,\n  303 |                             acct.n_samples % samples_per_frame,\n  304 |                             t,\n  305 |                             r,\n  306 |                             r - t\n  307 |                         );\n  308 |                     }","lines":11}]},{"id":"CMT_25","type":"invalid_comment","type_label":"Invalid Comment","severity":"info","description":"Stale/contradictory comment in NORMAL_SCF_TABLE doc. The doc says the table is `2^(0.25 * (x - 156))` and indexed relative to -100 so input 0 corresponds to -100, but the code computes `2.0f32.powf(0.25 * f32::from(i as i16 - 56 + NORMAL_SCALE_MIN))` where NORMAL_SCALE_MIN = -100, i.e. exponent uses `i - 156`. The `-156` constant is split as `-56 + NORMAL_SCALE_MIN` which is correct, but the comment's framing (`x - 156` vs offset -100) is easy to misread and the magic `-56` is unexplained.","fix":"Clarify the comment to state the effective exponent (i - 156) and explain the -56 term, so the relationship between the documented offset and the literal is unambiguous.","locations":[{"ref":"symphonia-codec-aac/src/aac/ics/mod.rs:55-66","code":"   55 | lazy_static! {\n   56 |     /// Pre-computed table of y = 2^(0.25 * (x - 156)) for decoding scale factors for normal bands.\n   57 |     /// This table is indexed relative to -100, the minimum encoded scale factor value for normal\n   58 |     /// bands. Therefore, an input of 0 corresponds to -100.\n   59 |     static ref NORMAL_SCF_TABLE: Box<[f32; NORMAL_SCF_TABLE_LEN]> = {\n   60 |         let table: Vec<f32> = (0..NORMAL_SCF_TABLE_LEN)\n   61 |             .map(|i| 2.0f32.powf(0.25 * f32::from(i as i16 - 56 + NORMAL_SCALE_MIN)))\n   62 |             .collect();\n   63 | \n   64 |         table.into_boxed_slice().try_into().expect(\"vec initialized to correct table length\")\n   65 |     };\n   66 | }","lines":12}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","description":"GenericAudioBuffer, GenericAudioBufferRef, and GenericAudioSlice each re-implement the same ~25 forwarding methods (spec, num_planes, frames, copy_to*, copy_bytes_*, byte_len_*, samples_*) with byte-for-byte identical bodies aside from the dispatch macro name. This is several hundred lines of near-identical code that must be kept in sync by hand; a change to one wrapper's API silently diverges from the others.","fix":"Generate the three wrappers' shared method set from a single declarative macro that takes the enum name and dispatch macro, or factor the forwarding methods into a macro invoked once per wrapper, so the method list lives in exactly one place.","locations":[{"ref":"symphonia-core/src/audio/generic.rs:61-367","code":"   61 | impl GenericAudioBuffer {\n   62 |     pub fn new(format: SampleFormat, spec: AudioSpec, capacity: usize) -> Self {\n   63 |         match format {\n   64 |             SampleFormat::U8 => GenericAudioBuffer::U8(AudioBuffer::new(spec, capacity)),\n   65 |             SampleFormat::U16 => GenericAudioBuffer::U16(AudioBuffer::new(spec, capacity)),\n   66 |             SampleFormat::U24 => GenericAudioBuffer::U24(AudioBuffer::new(spec, capacity)),\n   67 |             SampleFormat::U32 => GenericAudioBuffer::U32(AudioBuffer::new(spec, capacity)),\n   68 |             SampleFormat::S8 => GenericAudioBuffer::S8(AudioBuffer::new(spec, capacity)),\n   69 |             SampleFormat::S16 => GenericAudioBuffer::S16(AudioBuffer::new(spec, capacity)),\n   70 |             SampleFormat::S24 => GenericAudioBuffer::S24(AudioBuffer::new(spec, capacity)),\n   71 |             SampleFormat::S32 => GenericAudioBuffer::S32(AudioBuffer::new(spec, capacity)),\n   72 |             SampleFormat::F32 => GenericAudioBuffer::F32(AudioBuffer::new(spec, capacity)),\n   73 |             SampleFormat::F64 => GenericAudioBuffer::F64(AudioBuffer::new(spec, capacity)),\n   74 |         }\n   75 |     }\n   76 | \n   77 |     /// Get the audio specification.\n   78 |     pub fn spec(&self) -> &AudioSpec {\n   79 |         impl_generic_func!(self, buf, buf.spec())\n   80 |     }\n   81 | \n   82 |     /// Get the total number of audio planes.\n   83 |     pub fn num_planes(&self) -> usize {\n   84 |         impl_generic_func!(self, buf, buf.num_planes())\n   85 |     }\n   86 | \n   87 |     /// Returns `true` if there are no audio frames.\n   88 |     pub fn is_empty(&self) -> bool {\n   89 |         impl_generic_func!(self, buf, buf.is_empty())\n   90 |     }\n   91 | \n   92 |     /// Gets the number of audio frames in the buffer.\n   93 |     pub fn frames(&self) -> usize {\n   94 |         impl_generic_func!(self, buf, buf.frames())\n   95 |     }\n   96 | \n   97 |     /// Returns `true` if the `AudioBuffer` is unused.\n   98 |     ///\n   99 |     /// An unused `AudioBuffer` has either a capacity of 0, or no channels.\n  100 |     pub fn is_unused(&self) -> bool {\n  101 |         impl_generic_func!(self, buf, buf.is_unused())\n  102 |     }\n  103 | \n  104 |     /// Gets the total capacity of the buffer. The capacity is the maximum number of audio frames\n  105 |     /// the buffer can store.\n  106 |     pub 72 |         }","lines":18}]},{"id":"DUPLIC_10","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The in-place unsynchronisation decoding loop is duplicated almost verbatim between the standalone `decode_unsynchronisation` function (used for ID3v2.4 per-frame unsync) and `UnsyncStream::read_buf_exact` (used for whole-tag unsync in ID3v2.2/2.3). Both implement the same 0xFF 0x00 collapse algorithm with the same src/dst index pattern, so a bug fix in one can be missed in the other.","fix":"Extract the core in-place collapse into a single helper that both call sites use (the streaming version can pass its carry `byte` state in/out).","locations":[{"ref":"symphonia-metadata/src/id3v2/unsync.rs:31-53","code":"   31 | pub fn decode_unsynchronisation(buf: &mut [u8]) -> &mut [u8] {\n   32 |     let len = buf.len();\n   33 |     let mut src = 0;\n   34 |     let mut dst = 0;\n   35 | \n   36 |     // Decode the unsynchronisation scheme in-place.\n   37 |     while src < len - 1 {\n   38 |         buf[dst] = buf[src];\n   39 |         dst += 1;\n   40 |         src += 1;\n   41 | \n   42 |         if buf[src - 1] == 0xff && buf[src] == 0x00 {\n   43 |             src += 1;\n   44 |         }\n   45 |     }\n   46 | \n   47 |     if src < len {\n   48 |         buf[dst] = buf[src];\n   49 |         dst += 1;\n   50 |     }\n   51 | \n   52 |     &mut buf[..dst]\n   53 | }","lines":23},{"ref":"symphonia-metadata/src/id3v2/unsync.rs:120-162","code":"  120 |     fn read_buf_exact(&mut self, buf: &mut [u8]) -> io::Result<()> {\n  121 |         let len = buf.len();\n  122 | \n  123 |         if len > 0 {\n  124 |             // Fill the provided buffer directly from the underlying reader.\n  125 |             self.inner.read_buf_exact(buf)?;\n  126 | \n  127 |             // If the last seen byte was 0xff, and the first byte in buf is 0x00, skip the first\n  128 |             // byte of buf.\n  129 |             let mut src = usize::from(self.byt      type IndexType: Copy + Default + TryFrom<u32> + Into<u32>;\n   48 |         /// The type of a value in the codebook.\n   49 |         type ValueType: Copy;\n   50 |     }\n   51 | \n   52 |     macro_rules! decl_entry {\n   53 |         (\n   54 |             #[doc = $expr:expr]\n   55 |             $name:ident, $value_type:ty, $index_type:ty\n   56 |         ) => {\n   57 |             #[doc = $expr]\n   58 |             #[derive(Copy, Clone, Default)]\n   59 |             pub struct $name;\n   60 | \n   61 |             impl CodebookEntry for $name {\n   62 |                 type IndexType = $index_type;\n   63 |                 type ValueType = $value_type;\n   64 |             }\n   65 |         };\n   66 |     }\n   67 | \n   68 |     decl_entry!(\n   69 |         /// `Entry8x8` is a codebook entry for 8-bit values with codes up-to 8-bits.\n   70 |         Entry8x8,\n   71 |         u8,\n   72 |         u8\n   73 |     );\n   74 | \n   75 |     decl_entry!(\n   76 |         /// `Entry8x16` is a codebook entry for 8-bit values with codes up-to 16-bits.\n   77 |         Entry8x16,\n   78 |         u8,\n   79 |         u16\n   80 |     );\n   81 | \n   82 |     decl_entry!(\n   83 |         /// `Entry8x32` is a codebook entry for 8-bit values with codes up-to 32-bits.\n   84 |         Entry8x32,\n   85 |         u8,\n   86 |         u32\n   87 |     );\n   88 | \n   89 |     decl_entry!(\n   90 |         /// `Entry16x8` is a codebook entry for 16-bit values with codes up-to 8-bits.\n   91 |         Entry16x8,\n   92 |         u16,\n   93 |         u8\n   94 |     );\n   95 | \n   96 |     decl_entry!(\n   97 |         /// `Entry16x16` is a codebook entry for 16-bit values with codes up-to 16-bits.\n   98 |         Entry16x16,\n   99 |         u16,\n  100 |         u16\n  101 |     );\n  102 | \n  103 |     decl_entry!(\n  104 |         /// `Entry16x32` is a codebook entry for 16-bit values with codes up-to 32-bits.\n  105 |         Entry16x32,\n  106 | up of codebook table entries whose codewords share\n  199 |     /// the same set of prefix bits upto this block.\n  200 |     struct CodebookBlock<E: CodebookEntry> {\n  201 |         /// The number of prefix bits the block consumes.\n  202 |         width: u8,\n  203 |         /// Map of unique child block prefixes to indicies in the codebook table.\n  204 |         nodes: BTreeMap<u16, usize>,\n  205 |         /// Codebook value entries whose codewords terminate in this block.\n  206 |         values: Vec<CodebookValue<E>>,\n  207 |     }\n  208 | \n  209 |     impl<E: CodebookEntry> CodebookBlock<E> {\n  210 |         fn new(width: u8) -> Self {\n  211 |             Self { width, nodes: Default::default(), values: Default::default() }\n  212 |         }\n  213 |     }\n  214 | \n  215 |     /// `CodebookBuilder` generates a `Codebook` using a provided codebook specification and\n  216 |     /// description.\n  217 |     pub struct CodebookBuilder {\n  218 |         bits_per_block: u8,\n  219 |         bit_order: BitOrder,\n  220 |     }\n  221 | \n  222 |     impl CodebookBuilder {\n  223 |         /// Instantiates a new `CodebookBuilder`.\n  224 |         ///\n  225 |         /// The `bit_order` parameter specifies if the codeword bits should be reversed when\n  226 |         /// constructing the codebook. If the `BitReader` or `BitStream` reading the constructed\n  227 |         /// codebook reads bits in an order different from the order of the provided codewords,\n  228 |         /// then this option can be used to make them compatible.\n  229 |         pub fn new(bit_order: BitOrder) -> Self {\n  230 |             CodebookBuilder { bits_per_block: 4, bit_order }\n  231 |         }\n  232 | \n  233 |         /// Specify the number of bits that should be consumed from the source at a time. This value\n  234 |         /// must be within the range 1 <= `bits_per_read` <= 16. Values outside of this range will\n  235 |         /// cause this function to panic. If not provided, a value will be automatically chosen.\n  236 |         pub fn bits_per_read(&mut self, bits_per_read: u8) -> &mut Self {\n  237 |             assert!(bits_per_read <= 16);\n  238 |             assert!(bits_per_read > 0);\n  239 |             self.bits_per_block = bits_per_read;\n  240 |             self\n  241 |         }\n  242 | \n  243 |         fn generate_lut<E: CodebookEntry>(\n  244 |             bit_order: BitOrder,\n  245 |             blocks: &[CodebookBlock<E>],\n  246 |         ) -> io::Result<Vec<Entry<E>>> {\n  247 |             // The codebook table.\n  248 |             let mut table = Vec::new();\n  249 | \n  250 |             let mut queue = VecDeque::new();\n  251 | \n  252 |             // The computed end of the table given the blocks in the queue.\n  253 |             let mut table_end = 0u32;\n  254 | \n  255 |             // If the table is not empty, prepare for the recursion.\n  256 |             if let Some(block) = blocks.first() {\n  257 |                 // Start traversal at the first block.\n  258 |                 queue.push_front(0);\n  259 |                 // New blocks will begin after the end of the first block.\n  260 |                 table_end += 1 << block.width;\n  261 |             }\n  262 | \n  263 |             // Traverse the tree in breadth-first order.\n  264 |             while let Some(block_id) = queue.pop_front() {\n  265 |                 // Count of the total number of entries added to the table by this block.\n  266 |                 let mut entry_count = 0;\n  267 | \n  268 |                 // Get the block at the front of the queue.\n  269 |                 let block = &blocks[block_id];\n  270 |                 let block_len = 1 << block.width;\n  271 | \n  272 |                 // The starting index of the current block.\n  273 |                 let table_base = table.len();\n  274 | \n  275 |                 // Resize the table to accomodate all entries within the block.\n  276 |                 table.resize(table_base + block_len, Default::default());\n  277 | \n  278 |                 // Push child blocks onto the queue and record the jump entries in the table. Jumps\n  279 |                 // will be in order of increasing prefix because of the implicit sorting provided\n  280 |                 // by BTreeMap, thus traversing a level of the tree left-to-right.\n  281 |                 for (&child_block_prefix, &child_block_id) in block.nodes.iter() {\n  282 |                     queue.push_back(child_block_id);\n  283 | \n  284 |                     // The width of the child block in bits.\n  285 |                     let child_block_width = blocks[child_block_id].width;\n  286 | \n  287 |                     // Try to create the jump entry. Return an error if the upper-bound of the\n  288 |                     // jump's index type is exceeded.\n  289 |                     let jump_entry = match Entry::<E>::new_jump(table_end) {\n  290 |                         Some(e) => e,\n  291 |                         _ => return codebook_error(\"core (io): codebook overflow\"),\n  292 |                     };\n  293 | \n  294 |                     // Determine the offset into the table depending on the bit-order.\n  295 |                     let offset = match bit_order {\n  296 |                         BitOrder::Verbatim => child_block_prefix,\n  297 |                         BitOrder::Reverse => {\n  298 |                             child_block_prefix.reverse_bits().rotate_left(u32::from(block.width))\n  299 |                         }\n  300 |                     } as usize;\n  301 | \n  302 |                     table[table_base + offset] = jump_entry;\n  303 | \n  304 |                     // Add the length of the child block to the end of the table.\n  305 |                     table_end += 1 << child_block_width;\n  306 | \n  307 |                     // Update the entry count.\n  308 |                     entry_count += 1;\n  309 |                 }\n  310 | \n  311 |                 // Add value entries into the table. If a value has a prefix width less than the\n  312 |                 // block width, then do-not-care bits must added to the end of the prefix to pad it\n  313 |                 // to the block width.\n  314 |                 for value in block.values.iter() {\n  315 |                     // The number of do-not-care bits to add to the value's prefix.\n  316 |                     let num_dnc_bits = block.width - value.width;\n  317 | \n  318 |                     // Extend the value's prefix to the block's width.\n  319 |                     let base_prefix = (value.prefix << num_dnc_bits) as usize;\n  320 | \n  321 |                     // Using the base prefix, synthesize all prefixes for this value.\n  322 |                     let count = 1 << num_dnc_bits;\n  323 | \n  324 |                     // The value entry that will be duplicated.\n  325 |                     let value_entry = Entry::<E>::new_value(value.value, value.code_len);\n  326 | \n  327 |                     match bit_order {\n  328 |                         BitOrder::Verbatim => {\n  329 |                             // For verbatim bit order, the do-not-care bits are in the LSb\n  330 |                             // position.\n  331 |                             let start = table_base + base_prefix;\n  332 |                             let end = start + count;\n  333 | \n  334 |                             for entry in table[start..end].iter_mut() {\n  335 |                                 *entry = value_entry;\n  336 |                             }\n  337 |                         }\n  338 |                         BitOrder::Reverse => {\n  339 |                             // For reverse bit order, the do-not-care bits are in the MSb position.\n  340 |                             let start = base_prefix;\n  341 |                             let end = start + count;\n  342 | \n  343 |                             for prefix in start..end {\n  344 |                                 let offset =\n  345 |                                     prefix.reverse_bits().rotate_left(u32::from(block.width));\n  346 | \n  347 |                                 table[table_base + offset] = value_entry;\n  348 |                             }\n  349 |                         }\n  350 |                     }\n  351 | \n  352 |                     // Update the entry count.\n  353 |                     entry_count += count;\n  354 |                 }\n  355 | \n  356 |                 // The number of entries added to the table should equal the block length. It is a\n  357 |                 // fatal error if this is not true.\n  358 |                 if entry_count != block_len {\n  359 |                     return codebook_error(\"core (io): codebook is incomplete\");\n  360 |                 }\n  361 |             }\n  362 | \n  363 |             Ok(table)\n  364 |         }\n  365 | \n  366 |         /// Construct a `Codebook` using the given codewords, their respective lengths in number of\n  367 |         /// bits, and associated values.\n  368 |         ///\n  369 |         /// This function may fail if the provided codewords do not form a complete VLC tree, or if\n  370 |         /// the `CodebookEntry` is undersized.\n  371 |         ///\n  372 |         /// # Panics\n  373 |         ///\n  374 |         /// Panics if the number of codewords, code lengths, and values differ.\n  375 |         pub fn make<E: CodebookEntry>(\n  376 |             &mut self,\n  377 |             codes: &[u32],\n  378 |             code_lens: &[u8],\n  379 |             values: &[E::ValueType],\n  380 |         ) -> io::Result<Codebook<E>> {\n  381 |             assert!(codes.len() == code_lens.len());\n  382 |             assert!(codes.len() == values.len());\n  383 | \n  384 |             let mut blocks = Vec::<CodebookBlock<E>>::new();\n  385 | \n  386 |             let mut max_code_len = 0;\n  387 | \n  388 |             // Only attempt to generate something if there are code words.\n  389 |             if !codes.is_empty() {\n  390 |                 let prefix_mask = !(!0 << self.bits_per_block);\n  391 | \n  392 |                 // Push a root block.\n  393 |                 blocks.push(CodebookBlock::new(self.bits_per_block));\n  394 | \n  395 |                 // Populate the tree\n  396 |                 for ((&code, &code_len), &value) in codes.iter().zip(code_lens).zip(values) {\n  397 |                     let mut parent_block_id = 0;\n  398 | \n  399 |                     // A zero length code if not allowed.\n  400 |                     let code_len = match NonZero::<u8>::new(code_len) {\n  401 |                         Some(len) => len,\n  402 |                         _ => return codebook_error(\"core (io): zero length codeword\"),\n  403 |                     };\n  404 | \n  405 |                     let mut len = code_len.get();\n  406 | \n  407 |                     while len > self.bits_per_block {\n  408 |                         len -= self.bits_per_block;\n  409 | \n  410 |                         let prefix = ((code >> len) & prefix_mask) as u16;\n  411 | \n  412 |                         // Recurse down the tree.\n  413 |                         if let Some(&block_id) = blocks[parent_block_id].nodes.get(&prefix) {\n  414 |                             parent_block_id = block_id;\n  415 |                         }\n  416 |                         else {\n  417 |                             // Add a child block to the parent block.\n  418 |                             let block_id = blocks.len();\n  419 | \n  420 |                             let block = &mut blocks[parent_block_id];\n  421 | \n  422 |                             block.nodes.insert(prefix, block_id);\n  423 | \n  424 |                             // Append the new block.\n  425 |                             blocks.push(CodebookBlock::new(self.bits_per_block));\n  426 | \n  427 |      if let Some(raw_value) = parse_tag_value(value_atom.data_type, &value_atom.data) {\n  272 |             let std_tag = map(&raw_value);\n  273 |             builder.add_tag(Tag::new_from_parts(raw_key, raw_value, std_tag));\n  274 |         }\n  275 |         else {\n  276 |             warn!(\"unsupported data type {:?} for {:?} tag\", value_atom.data_type, tag.atom_type);\n  277 |         }\n  278 |     }\n  279 | \n  280 |     Ok(())\n  281 | }\n  282 | \n  283 | fn add_flag_tag<R: ReadAtom>(\n  284 |     iter: &mut AtomIterator<R>,\n  285 |     builder: &mut MetadataBuilder,\n  286 |     map: fn(&RawValue) -> Option<StandardTag>,\n  287 | ) -> Result<()> {\n  288 |     let tag = iter.read_atom::<MetaTagAtom>()?;\n  289 | \n  290 |     // There should be exactly 1 value.\n  291 |     if let Some(value_atom) = tag.values.first() {\n  292 |         // Parse the value atom's data to get the raw value of the flag.\n  293 |         if let Some(raw_value) = parse_tag_value(value_atom.data_type, &value_atom.data) {\n  294 |             let raw_key = get_raw_tag_key(tag.atom_type);\n  295 |             let std_tag = map(&raw_value);\n  296 |             builder.add_tag(Tag::new_from_parts(raw_key, raw_value, std_tag));\n  297 |         }\n  298 |     }\n  299 | \n  300 |     Ok(())\n  301 | }\n  302 | \n  303 | fn add_pair_tag<R: ReadAtom>(\n  304 |     iter: &mut AtomIterator<R>,\n  305 |     builder: &mut MetadataBuilder,\n  306 |     map0: fn(&RawValue) -> Option<StandardTag>,\n  307 |     map1: fn(&RawValue) -> Option<StandardTag>,\n  308 | ) -> Result<()> {\n  309 |     let tag = iter.read_atom::<MetaTagAtom>()?;\n  310 | \n  311 |     // There should be exactly 1 value.\n  312 |     if let Some(value) = tag.values.first() {\n  313 |         let data_len = value.data.len();\n  314 | \n  315 |         // The \"trkn\"/\"disk\" atoms contain a 8/6 byte value buffer consisting of 4/3-tuple of 16-bit\n  316 |         // big-endian values. The data type is no-type.\n  317 |         if data_len == 8 || data_len == 6 {\n  318 |             let raw_key = get_raw_tag_key(tag.atom_type);\n  319 | \n  320 |             // The first value is reserved, the second value is the track or disk number, the third\n  321 |             // value is the track or disk total, and the fourth is reserved (if present).\n  322 |             let d0 =\n  323 |                 u16::from_be_bytes(value.data[2..4].try_into().expect(\"slice is exactly 2 bytes\"));\n  324 |             let d1 =\n  325 |                 u16::from_be_bytes(value.data[4..6].try_into().expect(\"slice is exactly 2 bytes\"));\n  326 | \n  327 |             // Ignore a track/disk number of 0.\n  328 |             if d0 > 0 {\n  329 |                 let rv0 = RawValue::from(d0);\n  330 |                 builder.add_tag(Tag::new_from_parts(raw_key, rv0.clone(), map0(&rv0)));\n  331 |             }\n  332 | \n  333 |             // Ignore a track/disk total of 0.\n  334 |             if d1 > 0 {\n  335 |                 let rv1 = RawValue::from(d1);\n  336 |                 builder.add_tag(Tag::new_from_parts(raw_key, rv1.clone(), map1(&rv1)));\n  337 |             }\n  338 |         }\n  339 |     }\n  340 | \n  341 |     Ok(())\n  342 | }\n  343 | \n  344 | fn add_visual_tag<R: ReadAtom>(\n  345 |     iter: &mut AtomIterator<R>,\n  346 |     builder: &mut MetadataBuilder,\n  347 | ) -> Result<()> {\n  348 |     let tag = iter.read_atom::<MetaTagAtom>()?;\n  349 | \n  350 |     // There could be more than one attached image.\n  351 |     for value in tag.values {\n  352 |         let image_info = try_get_image_info(&value.data);\n  353 | \n  354 |         builder.add_visual(Visual {\n  355 |             media_type: image_info.as_ref().map(|info| info.media_type.clone()),\n  356 |             dimensions: image_info.as_ref().map(|info| info.dimensions),\n  357 |             color_mode: image_info.as_ref().map(|info| info.color_mode),\n  358 |             usage: Some(StandardVisualKey::
