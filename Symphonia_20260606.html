mType::UrlPodcastTag => \"purl\",\n 1015 |         AtomType::WorkTag => \"\\u{a9}wrk\",\n 1016 |         AtomType::WriterTag => \"\\u{a9}wrt\",\n 1017 |         AtomType::XidTag => \"xid \",\n 1018 |         _ => \"\",\n 1019 |     }\n 1020 | }","lines":1021}]},{"id":"ARCHIT_7","type":"architecture","type_label":"Architecture","severity":"low","description":"`frames/readers.rs` is a 1311-line file mixing many responsibilities: low-level primitive readers (read_date, read_lang_code, read_play_counter, read_string*), per-frame body parsers for ~30 distinct frame types, the StandardTagPair dispatch helper, and two large lazy_static parser lookup tables (TXXX_DESC_PARSERS, TIPL_FUNC_PARSERS), plus an extensive test module. Combined with frames.rs (742 lines, holding LEGACY_FRAME_MAP and FRAME_READERS tables and the three version-specific frame header parsers), the ID3v2 frame layer is hard to navigate and the duplicated dispatch logic noted elsewhere is a direct symptom.","fix":"Split primitive readers, frame-body readers, and the lookup tables into separate submodules; centralize the StandardTagPair-to-Tag dispatch in one place shared by readers and std_tag.","locations":[{"ref":"symphonia-metadata/src/id3v2/frames/readers.rs:1-1311","code":"    1 | // Symphonia\n    2 | // Copyright (c) 2019-2026 The Project Symphonia Developers.\n    3 | //\n    4 | // This Source Code Form is subject to the terms of the Mozilla Public\n    5 | // License, v. 2.0. If a copy of the MPL was not distributed with this\n    6 | // file, You can obtain one at https://mozilla.org/MPL/2.0/.\n    7 | \n    8 | //! Frame body readers.\n    9 | \n   10 | use std::char;\n   11 | use std::collections::HashMap;\n   12 | use std::io;\n   13 | use std::str;\n   14 | use std::sync::Arc;\n   15 | \n   16 | use symphonia_core::errors::{Result, decode_error, unsupported_error};\n   17 | use symphonia_core::io::{BufReader, FiniteStream, ReadBytes};\n   18 | use symphonia_core::meta::RawTag;\n   19 | use symphonia_core::meta::RawTagSubField;\n   20 | use symphonia_core::meta::{Chapter, RawValue, StandardTag, Tag, Visual};\n   21 | use symphonia_core::units::Time;\n   22 | use symphonia_core::util::text;\n   23 | \n   24 | use lazy_static::lazy_static;\n   25 | use log::debug;\n   26 | use smallvec::{SmallVec, smallvec};\n   27 | \n   28 | use crate::id3v2::frames::{FrameResult, Id3v2Chapter, Id3v2TableOfContents};\n   29 | use crate::id3v2::sub_fields::*;\n   30 | use crate::utils::id3v2::get_visual_key_from_picture_type;\n   31 | use crate::utils::std_tag::*;\n   32 | \n   33 | use crate::utils::images::try_get_image_info;\n   34 | \n   35 | /// Function pointer to an ID3v2 frame reader.\n   36 | pub type FrameReader = fn(BufReader<'_>, &FrameInfo<'_>) -> Result<FrameResult>;\n   37 | \n   38 | /// Map of 4 character ID3v2 frame IDs to a frame reader and optional raw tag parser pair.\n   39 | pub type FrameReaderMap = HashMap<&'static [u8; 4], (FrameReader, Option<RawTagParser>)>;\n   40 | \n   41 | /// Useful information about a frame for a frame reader.\n   42 | pub struct FrameInfo<'a> {\n   43 |     /// The original ID of the frame as written in the frame.\n   44 |     id: &'a str,\n   45 |     /// The major version of the ID3v2 tag containing the frame.\n   46 |     major_version: u8,\n   47 |     /// An optional raw tag parser to be applied if the frame is generic.\n   48 |     raw_tag_parser: Option<RawTagParser>,\n   49 | }\n   50 | \n   51 | impl<'a> FrameInfo<'a> {\n   52 |     /// Create new frame information from a pre-validated frame ID, tag version and optional\n   53 |     /// raw tag parser.\n   54 |     ///\n   55 |     /// Panics if the frame ID is invalid.\n   56 |     pub fn new(id: &'a [u8], major_version: u8, raw_tag_parser: Option<RawTagParser>) -> Self {\n   57 |         FrameInfo {\n   58 |             id: std::str::from_utf8(id).expect(\"validated frame id bytes\"),\n   59 |             major_version,\n   60 |             raw_tag_parser,\n   61 |         }\n   62 |     }\n   63 | }\n   64 | \n   65 | /// Enumeration of valid encodings for text fields in ID3v2 tags\n   66 | #[derive(Copy, Clone, Debug, PartialEq, Eq)]\n   67 | enum Encoding {\n   68 |     /// ISO-8859-1 (aka Latin-1) characters in the range 0x20-0xFF.\n   69 |     Iso8859_1,\n   70 |     /// UTF-16 (or UCS-2) with a byte-order-mark (BOM). If the BOM is missing, big-endian encoding\n   71 |     /// is assumed.\n   72 |     Utf16Bom,\n   73 |     /// UTF-16 big-endian without a byte-order-mark (BOM).\n   74 |     Utf16Be,\n   75 |     /// UTF-8.\n   76 |     Utf8,\n   77 | }\n   78 | \n   79 | impl Encoding {\n   80 |     fn parse(encoding: u8) -> Option<Encoding> {\n   81 |         match encoding {\n   82 |             // ISO-8859-1 terminated with 0x00.\n   83 |             0 => Some(Encoding::Iso8859_1),\n   84 |             // UTF-16 with byte order marker (BOM), terminated with 0x00 0x00.\n   85 |             1 => Some(Encoding::Utf16Bom),\n   86 |             // UTF-16BE without byte order marker (BOM), terminated with 0x00 0x00.\n   87 |             2 => Some(Encoding::Utf16Be),\n   88 |             // UTF-8 terminated with 0x00.\n   89 |             3 => Some(Encoding::Utf8),\n   90 |             // Invalid encoding.\n   91 |             _ => None,\n   92 |         }\n   93 |     }\n   94 | }\n   95 | \n   96 | /// Decodes a slice of bytes containing encoded text into a `String`.\n   97 | ///\n   98 | /// The ID3v2 specification forbids all control characters other than line-feed on the\n   99 | /// ISO/IEC 8859-1 text encoding, however, does not state if the same limitation applies to the\n  100 | /// Unicode encodings. Therefore, this restriction is not applied to other encodings.\n  101 | fn decode_string_buf(buf: &[u8], encoding: Encoding) -> String {\n  102 |     match encoding {\n  103 |         Encoding::Iso8859_1 => {\n  104 |             // Decode as an ID3v2-specific variant of ISO/IEC 8859-1 that allows the line-feed\n  105 |             // control character.\n  106 |             decode_id3v2_iso8859_1(buf).collect()\n  107 |         }\n  108 |         Encoding::Utf8 => {\n  109 |             // Decode as UTF-8.\n  110 |             String::from_utf8_lossy(buf).into_owned()\n  111 |         }\n  112 |         Encoding::Utf16Bom | Encoding::Utf16Be => {\n  113 |             // Decode as UTF-16. If a byte-order-mark is present, it will be respected. Otherwise,\n  114 |             // big-endian is assumed.\n  115 |             text::decode_utf16be_lossy(buf).collect()\n  116 |         }\n  117 |     }\n  118 | }\n  119 | \n  120 | fn decode_id3v2_iso8859_1(buf: &[u8]) -> impl Iterator<Item = char> + '_ {\n  121 |     buf.iter().map(|&c| {\n  122 |         match c {\n  123 |             // C0 control codes excluding line-feed.\n  124 |             0x00..=0x09 | 0x0b..=0x1f => char::REPLACEMENT_CHARACTER,\n  125 |             // C1 control codes.\n  126 |             0x80..=0x9f => char::REPLACEMENT_CHARACTER,\n  127 |             // All other non-control characters.\n  128 |             _ => char::from(c),\n  129 |         }\n  130 |     })\n  131 | }\n  132 | \n  133 | // Primitive value readers (keep sorted in alphabetical order)\n  134 | //------------------------------------------------------------\n  135 | \n  136 | /// Read and validate a date.\n  137 | fn read_date(reader: &mut BufReader<'_>) -> Result<String> {\n  138 |     // Read an 8 character unterminated date string in the format \"YYYYMMDD\".\n  139 |     let mut date = [0; 8];\n  140 |     reader.read_buf_exact(&mut date)?;\n  141 | \n  142 |     // All characters must be digits.\n  143 |     if date.iter().any(|c| !c.is_ascii_digit()) {\n  144 |         return decode_error(\"date format is invalid\");\n  145 |     }\n  146 | \n  147 |     // Safety: The data array only contains ASCII digits.\n  148 |     Ok(str::from_utf8(&date).expect(\"date contains only ASCII digits\").to_string())\n  149 | }\n  150 | \n  151 | /// Read and validate an encoding indicator.\n  152 | fn read_encoding(reader: &mut BufReader<'_>) -> Result<Encoding> {\n  153 |     match Encoding::parse(reader.read_byte()?) {\n  154 |         Some(encoding) => Ok(encoding),\n  155 |         _ => decode_error(\"invalid text encoding\"),\n  156 |     }\n  157 | }\n  158 | \n  159 | /// Read and validate a language code.\n  160 | ///\n  161 | /// Language codes must conform to the ISO-639-2 standard. All codes should be composed of 3\n  162 | /// alphabetic characters. ID3v2 further specifies a language code of \"XXX\" indicates an unknown or\n  163 | /// unspecified language.\n  164 | fn read_lang_code(reader: &mut BufReader<'_>) -> Result<Option<String>> {\n  165 |     let code = reader.read_triple_bytes()?;\n  166 | \n  167 |     if code.iter().any(|&c| !c.is_ascii_alphabetic()) {\n  168 |         return decode_error(\"invalid language code\");\n  169 |     }\n  170 | \n  171 |     let code = if code.eq_ignore_ascii_case(b\"XXX\") {\n  172 |         // Unknown language code.\n  173 |         None\n  174 |     }\n  175 |     else {\n  176 |         // Convert to lowercase string.\n  177 |         Some(\n  178 |             std::str::from_utf8(&code)\n  179 |                 .expect(\"lang code contains only ASCII alphabetic chars\")\n  180 |                 .to_ascii_lowercase(),\n  181 |         )\n  182 |     };\n  183 | \n  184 |     Ok(code)\n  185 | }\n  186 | \n  187 | /// Read and validate the remainder of the buffer as a variably sized play counter.\n  188 | fn read_play_counter(reader: &mut BufReader<'_>) -> Result<Option<u64>> {\n  189 |     let len = reader.bytes_available() as usize;\n  190 | \n  191 |     // A length of 0 indicates no play counter.\n  192 |     if len == 0 {\n  193 |         return Ok(None);\n  194 |     }\n  195 | \n  196 |     // A valid play counter must be a minimum of 4 bytes long.\n  197 |     if len < 4 {\n  198 |         return decode_error(\"play counter must be a minimum of 32 bits\");\n  199 |     }\n  200 | \n  201 |     // However it may be extended by an arbitrary amount of bytes (or so it would seem).\n  202 |     // Practically, a 4-byte (32-bit) count is way more than enough, but we'll support up-to an\n  203 |     // 8-byte (64bit) count.\n  204 |     if len > 8 {\n  205 |         return unsupported_error(\"play counter greater-than 64 bits are not supported\");\n  206 |     }\n  207 | \n  208 |     // The play counter is stored as an N-byte big-endian integer. Read N bytes into an 8-byte\n  209 |     // buffer, making sure the missing bytes are zeroed, and then reinterpret as a 64-bit integer.\n  210 |     let mut buf = [0u8; 8];\n  211 |     reader.read_buf_exact(&mut buf[8 - len..])?;\n  212 | \n  213 |     Ok(Some(u64::from_be_bytes(buf)))\n  214 | }\n  215 | \n  216 | /// Read a null-terminated string of the specified encoding from the stream. If the stream ends\n  217 | /// before the null-terminator is reached, all the bytes up-to that point are interpreted as the\n  218 | /// string.\n  219 | fn read_string(reader: &mut BufReader<'_>, encoding: Encoding) -> io::Result<String> {\n  220 |     let max_len = reader.bytes_available() as usize;\n  221 | \n  222 |     let buf = match encoding {\n  223 |         Encoding::Iso8859_1 | Encoding::Utf8 => {\n  224 |             // Byte aligned encodings. The null-terminator is 1 byte.\n  225 |             let buf = reader.scan_bytes_aligned_ref(&[0x00], 1, max_len)?;\n  226 |             // Trim the trailing null-terminator, if present.\n  227 |             match buf.last() {\n  228 |                 Some(b'\\0') => &buf[..buf.len() - 1],\n  229 |                 _ => buf,\n  230 |             }\n  231 |         }\n  232 |         Encoding::Utf16Bom | Encoding::Utf16Be => {\n  233 |             // Two-byte aligned encodings. The null-terminator is 2 bytes.\n  234 |             let buf = reader.scan_bytes_aligned_ref(&[0x00, 0x00], 2, max_len)?;\n  235 |             // Trim the trailing null-terminator, if present.\n  236 |             match buf.last_chunk::<2>() {\n  237 |                 Some(b\"\\0\\0\") => &buf[..buf.len() - 2],\n  238 |                 _ => buf,\n  239 |             }\n  240 |         }\n  241 |     };\n  242 | \n  243 |     Ok(decode_string_buf(buf, encoding))\n  244 | }\n  245 | \n  246 | /// Same behaviour as `read_string`, but ignores empty strings.\n  247 | fn read_string_ignore_empty(\n  248 |     reader: &mut BufReader<'_>,\n  249 |     encoding: Encoding,\n  250 | ) -> io::Result<Option<String>> {\n  251 |     Ok(Some(read_string(reader, encoding)?).filter(|text| !text.is_empty()))\n  252 | }\n  253 | \n  254 | /// Reads a list of strings where each string is null-terminated.\n  255 | fn read_string_list(reader: &mut BufReader<'_>, encoding: Encoding) -> Result<RawValue> {\n  256 |     // Optimize for the single string case.\n  257 |     let mut items: SmallVec<[String; 1]> = Default::default();\n  258 | \n  259 |     // Read the first string. If the reader is empty, this will push an empty string.\n  260 |     items.push(read_string(reader, encoding)?);\n  261 | \n  262 |     // Read additional strings.\n  263 |     while reader.bytes_available() > 0 {\n  264 |         items.push(read_string(reader, encoding)?);\n  265 |     }\n  266 | \n  267 |     let value = match items.len() {\n  268 |         0 => unreachable!(),\n  269 |         1 => RawValue::from(items.remove(0)),\n  270 |         _ => RawValue::from(items.into_vec()),\n  271 |     };\n  272 | \n  273 |     Ok(value)\n  274 | }\n  275 | \n  276 | // Frame Readers (keep sorted in alphabetical order)\n  277 | //--------------------------------------------------\n  278 | \n  279 | /// Reads an `AENC` (audio encryption) frame.\n  280 | pub fn read_aenc_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  281 |     // The owner identifier string.\n  282 |     let owner = read_string(&mut reader, Encoding::Iso8859_1)?;\n  283 |     // Unencypted, \"preview\", audio start position in frames.\n  284 |     let preview_start = reader.read_be_u16()?;\n  285 |     // Unencrypted, \"preview\", audio length in frames.\n  286 |     let preview_length = reader.read_be_u16()?;\n  287 |     // The remainder of the frame is the binary encryption information.\n  288 |     let encrypt_info = reader.read_buf_bytes_available_ref();\n  289 | \n  290 |     let sub_fields = vec![\n  291 |         RawTagSubField::new(AENC_OWNER, owner),\n  292 |         RawTagSubField::new(AENC_PREVIEW_START, preview_start),\n  293 |         RawTagSubField::new(AENC_PREVIEW_LENGTH, preview_length),\n  294 |     ];\n  295 | \n  296 |     // Create the tag.\n  297 |     let raw = RawTag::new_with_sub_fields(frame.id, encrypt_info, sub_fields.into_boxed_slice());\n  298 | \n  299 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  300 | }\n  301 | \n  302 | /// Reads an `APIC` (attached picture) frame.\n  303 | pub fn read_apic_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  304 |     // The first byte of the frame is the encoding of the text description.\n  305 |     let encoding = read_encoding(&mut reader)?;\n  306 | \n  307 |     // Image format/media type\n  308 |     let media_type = if frame.id == \"PIC\" {\n  309 |         // Legacy PIC frames use a 3 character identifier. Only JPG and PNG are well-defined.\n  310 |         match &reader.read_triple_bytes()? {\n  311 |             b\"JPG\" => Some(\"image/jpeg\"),\n  312 |             b\"PNG\" => Some(\"image/png\"),\n  313 |             b\"BMP\" => Some(\"image/bmp\"),\n  314 |             b\"GIF\" => Some(\"image/gif\"),\n  315 |             _ => None,\n  316 |         }\n  317 |         .map(|s| s.to_string())\n  318 |     }\n  319 |     else {\n  320 |         // APIC frames use a null-terminated ASCII media-type string.\n  321 |         read_string_ignore_empty(&mut reader, Encoding::Iso8859_1)?\n  322 |     };\n  323 | \n  324 |     // Image usage.\n  325 |     let usage = get_visual_key_from_picture_type(u32::from(reader.read_u8()?));\n  326 | \n  327 |     let mut tags = vec![];\n  328 | \n  329 |     // Null-teriminated image description in specified encoding.\n  330 |     if let Some(desc) = read_string_ignore_empty(&mut reader, encoding)? {\n  331 |         tags.push(Tag::new_from_parts(\"\", \"\", Some(StandardTag::Description(Arc::from(desc)))));\n  332 |     }\n  333 | \n  334 |     // The remainder of the APIC frame is the image data.\n  335 |     // TODO: Apply a limit.\n  336 |     let data = Box::from(reader.read_buf_bytes_available_ref());\n  337 | \n  338 |     // Try to get information about the image.\n  339 |     let image_info = try_get_image_info(&data);\n  340 | \n  341 |     let visual = Visual {\n  342 |         media_type: image_info.as_ref().map(|info| info.media_type.clone()).or(media_type),\n  343 |         dimensions: image_info.as_ref().map(|info| info.dimensions),\n  344 |         color_mode: image_info.as_ref().map(|info| info.color_mode),\n  345 |         usage,\n  346 |         tags,\n  347 |         data,\n  348 |     };\n  349 | \n  350 |     Ok(FrameResult::Visual(visual))\n  351 | }\n  352 | \n  353 | /// Reads an `ATXT` (audio encryption) frame.\n  354 | pub fn read_atxt_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  355 |     // The encoding.\n  356 |     let encoding = read_encoding(&mut reader)?;\n  357 |     // The audio data mime-type.\n  358 |     let mime_type = read_string(&mut reader, Encoding::Iso8859_1)?;\n  359 |     // Single flag indicating if the audio data is scrambled.\n  360 |     let is_scrambled = reader.read_u8()? & 1 != 0;\n  361 |     // Text equivalent to what is spoken in the audio data.\n  362 |     let equivalent_text = read_string(&mut reader, encoding)?;\n  363 |     // The audio clip.\n  364 |     let mut audio_data: Box<[u8]> = Box::from(reader.read_buf_bytes_available_ref());\n  365 | \n  366 |     // Unscramble the audio data if it has been scrambled.\n  367 |     if is_scrambled {\n  368 |         let mut prbs = 0xfe;\n  369 |         for byte in audio_data.iter_mut() {\n  370 |             *byte ^= prbs;\n  371 |             // Advance the pseudorandom binary sequence.\n  372 |             prbs = (((prbs << 1) ^ (prbs << 2)) & 0xfc) | (((prbs >> 6) ^ (prbs >> 4)) & 0x3);\n  373 |         }\n  374 |     }\n  375 | \n  376 |     let sub_fields = vec![\n  377 |         RawTagSubField::new(ATXT_EQUIVALENT_TEXT, equivalent_text),\n  378 |         RawTagSubField::new(ATXT_MIME_TYPE, mime_type),\n  379 |     ];\n  380 | \n  381 |     // Create the tag.\n  382 |     let raw = RawTag::new_with_sub_fields(frame.id, audio_data, sub_fields.into_boxed_slice());\n  383 | \n  384 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  385 | }\n  386 | \n  387 | /// Reads a `CHAP` (chapter) frame.\n  388 | pub fn read_chap_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  389 |     use crate::id3v2::frames::{\n  390 |         min_frame_size, read_id3v2p2_frame, read_id3v2p3_frame, read_id3v2p4_frame,\n  391 |     };\n  392 | \n  393 |     // Read the element ID.\n  394 |     let id = read_string(&mut reader, Encoding::Iso8859_1)?;\n  395 | \n  396 |     // Start time in ms.\n  397 |     let start_ms = reader.read_be_u32()?;\n  398 |     // End time in ms.\n  399 |     let end_ms = reader.read_be_u32()?;\n  400 |     // Optional start position in bytes.\n  401 |     let start_byte = match reader.read_be_u32()? {\n  402 |         u32::MAX => None,\n  403 |         start_byte => Some(u64::from(start_byte)),\n  404 |     };\n  405 |     // Optional end position in bytes.\n  406 |     let end_byte = match reader.read_be_u32()? {\n  407 |         u32::MAX => None,\n  408 |         end_byte => Some(u64::from(end_byte)),\n  409 |     };\n  410 | \n  411 |     // Read supplemental tags.\n  412 |     let mut tags = vec![];\n  413 |     let mut visuals = vec![];\n  414 | \n  415 |     while reader.bytes_available() >= min_frame_size(frame.major_version) {\n  416 |         let frame = match frame.major_version {\n  417 |             2 => read_id3v2p2_frame(&mut reader),\n  418 |             3 => read_id3v2p3_frame(&mut reader),\n  419 |             4 => read_id3v2p4_frame(&mut reader),\n  420 |             _ => break,\n  421 |         }?;\n  422 | \n  423 |         match frame {\n  424 |             FrameResult::MultipleTags(tag_list) => tags.extend(tag_list),\n  425 |             FrameResult::Tag(mut tag) => {\n  426 |                 // The TIT2 (track title) and TIT3 (track subtitle/description) ID3v2 frames are\n  427 |                 // repurposed for chapter title and description, respectively.\n  428 |                 tag.std = match tag.std.take() {\n  429 |                     Some(StandardTag::TrackTitle(title)) => Some(StandardTag::ChapterTitle(title)),\n  430 |                     Some(StandardTag::TrackSubtitle(desc)) => Some(StandardTag::Description(desc)),\n  431 |                     other => other,\n  432 |                 };\n  433 | \n  434 |                 tags.push(tag)\n  435 |             }\n  436 |             FrameResult::Visual(visual) => visuals.push(visual),\n  437 |             _ => {}\n  438 |         }\n  439 |     }\n  440 | \n  441 |     let chapter = Id3v2Chapter {\n  442 |         id,\n  443 |         read_order: 0,\n  444 |         chapter: Chapter {\n  445 |             start_time: Time::from_millis(i64::from(start_ms)),\n  446 |             end_time: Some(Time::from_millis(i64::from(end_ms))),\n  447 |             start_byte,\n  448 |             end_byte,\n  449 |             tags,\n  450 |             visuals,\n  451 |         },\n  452 |     };\n  453 | \n  454 |     Ok(FrameResult::Chapter(chapter))\n  455 | }\n  456 | \n  457 | /// Reads a `COMM` (comment) frame.\n  458 | pub fn read_comm_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  459 |     // The first byte of the frame is the encoding of the description.\n  460 |     let encoding = read_encoding(&mut reader)?;\n  461 | \n  462 |     let mut sub_fields = Vec::new();\n  463 | \n  464 |     // The next three bytes are the language.\n  465 |     if let Some(lang) = read_lang_code(&mut reader)? {\n  466 |         sub_fields.push(RawTagSubField::new(COMM_LANGUAGE, lang));\n  467 |     }\n  468 | \n  469 |     // Optional content description.\n  470 |     if let Some(desc) = read_string_ignore_empty(&mut reader, encoding)? {\n  471 |         sub_fields.push(RawTagSubField::new(COMM_SHORT_DESCRIPTION, desc));\n  472 |         // TODO: A description of \"iTunNORM\" means the comment contains iTunes normalization data.\n  473 |     }\n  474 | \n  475 |     // The lyrics.\n  476 |     let text = read_string(&mut reader, encoding)?;\n  477 | \n  478 |     // Create the tag.\n  479 |     let raw = RawTag::new_with_sub_fields(frame.id, text, sub_fields.into_boxed_slice());\n  480 | \n  481 |     Ok(map_raw_tag(raw, Some(parse_comment)))\n  482 | }\n  483 | \n  484 | /// Reads a `COMR` (commercial) frame.\n  485 | pub fn read_comr_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  486 |     // The first byte of the frame is the encoding of the terms of use text.\n  487 |     let encoding = read_encoding(&mut reader)?;\n  488 | \n  489 |     // The price in the format: \"<CURRENCY CODE 1><PRICE 1>[[/<CURRENCY CODE 2><PRICE 2>] ...]\"\n  490 |     let price = read_string(&mut reader, Encoding::Iso8859_1)?;\n  491 | \n  492 |     let mut sub_fields = vec![\n  493 |         // Price valid through this date.\n  494 |         RawTagSubField::new(COMR_VALID_UNTIL, read_date(&mut reader)?),\n  495 |         // Seller contact information (email address, URL, etc.)\n  496 |         RawTagSubField::new(COMR_CONTACT_URL, read_string(&mut reader, Encoding::Iso8859_1)?),\n  497 |         // How the audio was delivered. Takes one of the following values:\n  498 |         // - 0x0  Other\n  499 |         // - 0x1  Standard CD album with other songs\n  500 |         // - 0x2  Compressed audio on CD\n  501 |         // - 0x3  File over the Internet\n  502 |         // - 0x4  Stream over the Internet\n  503 |         // - 0x5  As note sheets\n  504 |         // - 0x6  As note sheets in a book with other sheets\n  505 |         // - 0x7  Music on other media\n  506 |         // - 0x8  Non-musical merchandise\n  507 |         RawTagSubField::new(COMR_RECEIVED_AS, reader.read_u8()?),\n  508 |         // The seller name.\n  509 |         RawTagSubField::new(COMR_SELLER_NAME, read_string(&mut reader, encoding)?),\n  510 |         // The description of the product.\n  511 |         RawTagSubField::new(COMR_DESCRIPTION, read_string(&mut reader, encoding)?),\n  512 |     ];\n  513 | \n  514 |     // Optional mime-type for the seller logo.\n  515 |     let mime_type = read_string_ignore_empty(&mut reader, Encoding::Iso8859_1)?;\n  516 |     // Optional seller logo.\n  517 |     let logo = reader.read_buf_bytes_available_ref();\n  518 | \n  519 |     if !logo.is_empty() {\n  520 |         // Add the mime-type if it was provided.\n  521 |         if let Some(mime_type) = mime_type {\n  522 |             sub_fields.push(RawTagSubField::new(COMR_MIME_TYPE, mime_type));\n  523 |         }\n  524 |         // Add the seller logo data.\n  525 |         sub_fields.push(RawTagSubField::new(COMR_SELLER_LOGO, logo));\n  526 |     }\n  527 | \n  528 |     // Create the tag.\n  529 |     let raw = RawTag::new_with_sub_fields(frame.id, price, sub_fields.into_boxed_slice());\n  530 | \n  531 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  532 | }\n  533 | \n  534 | /// Reads a `CRM` (encrypted meta) frame.\n  535 | pub fn read_crm_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  536 |     let owner = match read_string_ignore_empty(&mut reader, Encoding::Iso8859_1)? {\n  537 |         Some(owner) => owner,\n  538 |         None => {\n  539 |             // Frame should be ignored if an owner is not specified.\n  540 |             return Ok(FrameResult::Skipped);\n  541 |         }\n  542 |     };\n  543 | \n  544 |     let desc = read_string_ignore_empty(&mut reader, Encoding::Iso8859_1)?;\n  545 |     let data = reader.read_buf_bytes_available_ref();\n  546 | \n  547 |     let mut sub_fields = vec![RawTagSubField::new(CRM_OWNER, owner)];\n  548 | \n  549 |     if let Some(desc) = desc {\n  550 |         sub_fields.push(RawTagSubField::new(CRM_DESRIPTION, desc));\n  551 |     }\n  552 | \n  553 |     // Create the tag.\n  554 |     let raw = RawTag::new_with_sub_fields(frame.id, data, sub_fields.into_boxed_slice());\n  555 | \n  556 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  557 | }\n  558 | \n  559 | /// Reads a `CTOC` (table of contents) frame.\n  560 | pub fn read_ctoc_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  561 |     use crate::id3v2::frames::{\n  562 |         min_frame_size, read_id3v2p2_frame, read_id3v2p3_frame, read_id3v2p4_frame,\n  563 |     };\n  564 | \n  565 |     // Read for the element ID.\n  566 |     let id = read_string(&mut reader, Encoding::Iso8859_1)?;\n  567 | \n  568 |     // Read the flags.\n  569 |     // - Bit 0 is the \"ordered\" bit. Indicates if the items should be played in order, or\n  570 |     //   individually.\n  571 |     // - Bit 1 is the \"top-level\" bit. Indicates if this table of contents is the root.\n  572 |     let flags = reader.read_u8()?;\n  573 |     // The number of items in this table of contents\n  574 |     let entry_count = reader.read_u8()?;\n  575 | \n  576 |     // Read child item element IDs.\n  577 |     let mut items = Vec::with_capacity(usize::from(entry_count));\n  578 | \n  579 |     for _ in 0..entry_count {\n  580 |         let name = read_string(&mut reader, Encoding::Iso8859_1)?;\n  581 |         items.push(name);\n  582 |     }\n  583 | \n  584 |     // Read supplemental tags.\n  585 |     let mut tags = Vec::new();\n  586 |     let mut visuals = Vec::new();\n  587 | \n  588 |     while reader.bytes_available() >= min_frame_size(frame.major_version) {\n  589 |         let frame = match frame.major_version {\n  590 |             2 => read_id3v2p2_frame(&mut reader),\n  591 |             3 => read_id3v2p3_frame(&mut reader),\n  592 |             4 => read_id3v2p4_frame(&mut reader),\n  593 |             _ => break,\n  594 |         }?;\n  595 | \n  596 |         match frame {\n  597 |             FrameResult::MultipleTags(tag_list) => tags.extend(tag_list),\n  598 |             FrameResult::Tag(tag) => tags.push(tag),\n  599 |             FrameResult::Visual(visual) => visuals.push(visual),\n  600 |             _ => {}\n  601 |         }\n  602 |     }\n  603 | \n  604 |     let toc = Id3v2TableOfContents {\n  605 |         id,\n  606 |         top_level: flags & 2 != 0,\n  607 |         ordered: flags & 1 != 0,\n  608 |         items,\n  609 |         tags,\n  610 |         visuals,\n  611 |     };\n  612 | \n  613 |     Ok(FrameResult::TableOfContents(toc))\n  614 | }\n  615 | \n  616 | /// Reads an ENCR (encryption method registration) frame.\n  617 | pub fn read_encr_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  618 |     // The owner identifier string.\n  619 |     let owner = read_string(&mut reader, Encoding::Iso8859_1)?;\n  620 |     // The encryption method symbol.\n  621 |     let method = reader.read_u8()?;\n  622 |     // The remainder of the frame is encryption method data.\n  623 |     let encryption_data = reader.read_buf_bytes_available_ref();\n  624 | \n  625 |     let sub_fields = vec![\n  626 |         RawTagSubField::new(ENCR_OWNER, owner),\n  627 |         RawTagSubField::new(ENCR_ENCRYPTION_DATA, encryption_data),\n  628 |     ];\n  629 | \n  630 |     // Create the tag.\n  631 |     let raw = RawTag::new_with_sub_fields(frame.id, method, sub_fields.into_boxed_slice());\n  632 | \n  633 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  634 | }\n  635 | \n  636 | /// Reads a GEOB (general encapsulated object) frame.\n  637 | pub fn read_geob_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  638 |     // The first byte of the frame is the encoding.\n  639 |     let encoding = read_encoding(&mut reader)?;\n  640 |     // The mime-type. This is mandatory.\n  641 |     let mime_type = read_string(&mut reader, Encoding::Iso8859_1)?;\n  642 |     // Optional filename.\n  643 |     let file_name = read_string_ignore_empty(&mut reader, encoding)?;\n  644 |     // Optional content description.\n  645 |     let desc = read_string_ignore_empty(&mut reader, encoding)?;\n  646 |     // The object data.\n  647 |     let object = reader.read_buf_bytes_available_ref();\n  648 | \n  649 |     let mut sub_fields = Vec::new();\n  650 | \n  651 |     sub_fields.push(RawTagSubField::new(GEOB_MIME_TYPE, mime_type));\n  652 | \n  653 |     if let Some(file_name) = file_name {\n  654 |         sub_fields.push(RawTagSubField::new(GEOB_FILE_NAME, file_name));\n  655 |     }\n  656 | \n  657 |     if let Some(desc) = desc {\n  658 |         sub_fields.push(RawTagSubField::new(GEOB_DESCRIPTION, desc));\n  659 |     }\n  660 | \n  661 |     // Create the tag.\n  662 |     let raw = RawTag::new_with_sub_fields(frame.id, object, sub_fields.into_boxed_slice());\n  663 | \n  664 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  665 | }\n  666 | \n  667 | /// Reads a GRID (group ID) frame.\n  668 | pub fn read_grid_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  669 |     // The owner identifier string.\n  670 |     let owner = read_string(&mut reader, Encoding::Iso8859_1)?;\n  671 |     // The group ID/symbol.\n  672 |     let group_id = reader.read_u8()?;\n  673 |     // The remainder of the frame is group data.\n  674 |     let group_data = reader.read_buf_bytes_available_ref();\n  675 | \n  676 |     let sub_fields = vec![\n  677 |         RawTagSubField::new(GRID_OWNER, owner),\n  678 |         RawTagSubField::new(GRID_GROUP_DATA, group_data),\n  679 |     ];\n  680 | \n  681 |     // Create the tag.\n  682 |     let raw = RawTag::new_with_sub_fields(frame.id, group_id, sub_fields.into_boxed_slice());\n  683 | \n  684 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  685 | }\n  686 | \n  687 | /// Reads a `MCDI` (music CD identifier) frame.\n  688 | pub fn read_mcdi_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  689 |     // The entire frame is a binary dump of a CD-DA TOC.\n  690 |     let buf = reader.read_buf_bytes_ref(reader.byte_len() as usize)?;\n  691 | \n  692 |     // TODO: Parse binary MCDI into hex-string based format as specified for the StandardTag.\n  693 | \n  694 |     // Create the tag.\n  695 |     let tag = Tag::new_from_parts(frame.id, buf, None);\n  696 | \n  697 |     Ok(FrameResult::Tag(tag))\n  698 | }\n  699 | \n  700 | /// Reads a `OWNE` (terms of use) frame.\n  701 | pub fn read_owne_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  702 |     // The first byte of the frame is the encoding of the terms of use text.\n  703 |     let encoding = read_encoding(&mut reader)?;\n  704 |     // The price paid in the format: \"<CURRENCY CODE><PRICE>\".\n  705 |     let price_paid = read_string(&mut reader, Encoding::Iso8859_1)?;\n  706 | \n  707 |     let sub_fields = vec![\n  708 |         // The date of purchase.\n  709 |         RawTagSubField::new(OWNE_PURCHASE_DATE, read_date(&mut reader)?),\n  710 |         // The name of the seller.\n  711 |         RawTagSubField::new(OWNE_SELLER_NAME, read_string(&mut reader, encoding)?),\n  712 |     ];\n  713 | \n  714 |     // Create the tag.\n  715 |     let raw = RawTag::new_with_sub_fields(frame.id, price_paid, sub_fields.into_boxed_slice());\n  716 | \n  717 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  718 | }\n  719 | \n  720 | /// Reads a `PCNT` (total file play count) frame.\n  721 | pub fn read_pcnt_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  722 |     // Read the mandatory play counter.\n  723 |     let play_count = match read_play_counter(&mut reader)? {\n  724 |         Some(count) => count,\n  725 |         _ => return decode_error(\"pcnt: invalid play counter\"),\n  726 |     };\n  727 | \n  728 |     // Create the tag.\n  729 |     let tag = Tag::new_std(RawTag::new(frame.id, play_count), StandardTag::PlayCounter(play_count));\n  730 | \n  731 |     Ok(FrameResult::Tag(tag))\n  732 | }\n  733 | \n  734 | /// Reads a `POPM` (popularimeter) frame.\n  735 | pub fn read_popm_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  736 |     let mut sub_fields = vec![\n  737 |         // The email of the user this frame belongs to.\n  738 |         RawTagSubField::new(POPM_EMAIL, read_string(&mut reader, Encoding::Iso8859_1)?),\n  739 |     ];\n  740 | \n  741 |     // Read the rating.\n  742 |     let rating = reader.read_u8()?;\n  743 | \n  744 |     // Read the optional play counter. Add it to the sub-fields of the tag.\n  745 |     if let Some(play_counter) = read_play_counter(&mut reader)? {\n  746 |         sub_fields.push(RawTagSubField::new(POPM_PLAY_COUNTER, play_counter));\n  747 |     }\n  748 | \n  749 |     // The primary value of this frame is the rating as it is mandatory whereas the play counter is\n  750 |     // not. Add the user's email and play counter as sub-fields.\n  751 |     let raw = RawTag::new_with_sub_fields(frame.id, rating, sub_fields.into_boxed_slice());\n  752 | \n  753 |     // Create the tag.\n  754 |     let tag = Tag::new(raw);\n  755 | \n  756 |     Ok(FrameResult::Tag(tag))\n  757 | }\n  758 | \n  759 | /// Reads a `POSS` (position synchronisation) frame.\n  760 | pub fn read_poss_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  761 |     // The units used for the position.\n  762 |     let units = reader.read_u8()?;\n  763 |     // The position.\n  764 |     let position = reader.read_be_u32()?;\n  765 | \n  766 |     let sub_fields = vec![RawTagSubField::new(POSS_POSITION_UNITS, units)];\n  767 | \n  768 |     // Create the tag.\n  769 |     let raw = RawTag::new_with_sub_fields(frame.id, position, sub_fields.into_boxed_slice());\n  770 | \n  771 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  772 | }\n  773 | \n  774 | /// Reads a `PRIV` (private) frame.\n  775 | pub fn read_priv_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  776 |     let sub_fields = vec![\n  777 |         // Read the owner identifier.\n  778 |         RawTagSubField::new(PRIV_OWNER, read_string(&mut reader, Encoding::Iso8859_1)?),\n  779 |     ];\n  780 | \n  781 |     // The remainder of the frame is binary data.\n  782 |     let data = reader.read_buf_bytes_ref(reader.bytes_available() as usize)?;\n  783 | \n  784 |     // Create the tag.\n  785 |     let tag = Tag::new(RawTag::new_with_sub_fields(frame.id, data, sub_fields.into_boxed_slice()));\n  786 | \n  787 |     Ok(FrameResult::Tag(tag))\n  788 | }\n  789 | \n  790 | /// Reads the body of a frame into a buffer, and return it as a tag with the frame ID as the key.\n  791 | pub fn read_raw_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  792 |     let data = reader.read_buf_bytes_available_ref();\n  793 |     Ok(FrameResult::Tag(Tag::new_from_parts(frame.id, data, None)))\n  794 | }\n  795 | \n  796 | /// Reads a `SIGN` (signature) frame.\n  797 | pub fn read_sign_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  798 |     // The group ID this signature belongs to.\n  799 |     let group_id = reader.read_u8()?;\n  800 |     // The remainder of the frame is the signature data.\n  801 |     let signature = reader.read_buf_bytes_available_ref();\n  802 | \n  803 |     let sub_fields = vec![RawTagSubField::new(SIGN_GROUP_ID, group_id)];\n  804 | \n  805 |     // Create the tag.\n  806 |     let raw = RawTag::new_with_sub_fields(frame.id, signature, sub_fields.into_boxed_slice());\n  807 | \n  808 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  809 | }\n  810 | \n  811 | /// Reads all text frames frame except for `TXXX`.\n  812 | pub fn read_text_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  813 |     // The first byte of the frame is the encoding.\n  814 |     let encoding = read_encoding(&mut reader)?;\n  815 |     // Read 1 or more strings.\n  816 |     let text = read_string_list(&mut reader, encoding)?;\n  817 | \n  818 |     Ok(map_raw_tag(RawTag::new(frame.id, text), frame.raw_tag_parser))\n  819 | }\n  820 | \n  821 | /// Reads a `TIPL` (involved people frame).\n  822 | pub fn read_tipl_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  823 |     // The first byte of the frame is the encoding.\n  824 |     let encoding = read_encoding(&mut reader)?;\n  825 |     // Read 1 or more strings.\n  826 |     let text = read_string_list(&mut reader, encoding)?;\n  827 | \n  828 |     // This frame should contain a list of pairs, where the first item in each pair is the function,\n  829 |     // and the second item is the person (or persons) involved in that function.\n  830 |     //\n  831 |     // Parsing this frame into standard tags could be error prone. If any of the following criteria\n  832 |     // are not met, then the frame will be treated as a text frame with no standard tag(s) assigned:\n  833 |     //\n  834 |     //   1. The raw value MUST be a string list.\n  835 |     //   2. The string list MUST contain an even number of elements.\n  836 |     //   3. For each pair, the first item MUST map to a raw tag parser.\n  837 |     //\n  838 |     // Pre-validate these conditions to prevent doing extra work in the case all conditions do not\n  839 |     / 882 | /// Reads a `TXXX` (user defined) text frame.\n  883 | pub fn read_txxx_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  884 |     // The first byte of the frame is the encoding.\n  885 |     let encoding = read_encoding(&mut reader)?;\n  886 |     // A description of the contents of the frame.\n  887 |     let desc = read_string(&mut reader, encoding)?;\n  888 |     // Read 1 or more strings.\n  889 |     let text = read_string_list(&mut reader, encoding)?;\n  890 | \n  891 |     // Some TXXX frames may be mapped to standard tags. Try to find a parser based on the\n  892 |     // description string.\n  893 |     let raw_tag_parser = TXXX_DESC_PARSERS.get(desc.to_ascii_lowercase().as_str()).copied();\n  894 | \n  895 |     let sub_fields = vec![RawTagSubField::new(TXXX_DESCRIPTION, desc)];\n  896 | \n  897 |     let raw = RawTag::new_with_sub_fields(frame.id, text, sub_fields.into_boxed_slice());\n  898 | \n  899 |     Ok(map_raw_tag(raw, raw_tag_parser))\n  900 | }\n  901 | \n  902 | /// Readers an `UFID` (unique file identifier) frame.\n  903 | pub fn read_ufid_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  904 |     // The owner identifier.\n  905 |     let owner = read_string(&mut reader, Encoding::Iso8859_1)?;\n  906 |     // An up-to 64-byte identifier fills the rest of the frame.\n  907 |     let id = reader.read_buf_bytes_available_ref();\n  908 | \n  909 |     // 64-bytes is the limit of the identifier.\n  910 |     if id.len() > 64 {\n  911 |         return decode_error(\"ufid: ufid indentifier exceeds 64 bytes\");\n  912 |     }\n  913 | \n  914 |     let sub_fields = vec![RawTagSubField::new(UFID_OWNER, owner)];\n  915 | \n  916 |     // Create the tag.\n  917 |     let raw = RawTag::new_with_sub_fields(frame.id, id, sub_fields.into_boxed_slice());\n  918 | \n  919 |     Ok(FrameResult::Tag(Tag::new(raw)))\n  920 | }\n  921 | \n  922 | /// Reads all URL frames except for `WXXX` |         sub_fields.push(RawTagSubField::new(USLT_DESCRIPTION, desc));\n  967 |     }\n  968 | \n  969 |     // The lyrics.\n  970 |     let lyrics = read_string(&mut reader, encoding)?;\n  971 | \n  972 |     // Create the tag.\n  973 |     let raw = RawTag::new_with_sub_fields(frame.id, lyrics, sub_fields.into_boxed_slice());\n  974 | \n  975 |     Ok(map_raw_tag(raw, Some(parse_lyrics)))\n  976 | }\n  977 | \n  978 | /// Reads a `WXXX` (user defined) URL frame.\n  979 | pub fn read_wxxx_frame(mut reader: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  980 |     // The first byte of the WXXX frame is the encoding of the description.\n  981 |     let encoding = read_encoding(&mut reader)?;\n  982 | \n  983 |     let sub_fields = vec![\n  984 |         // Read the description string.\n  985 |         RawTagSubField::new(WXXX_DESCRIPTION, read_string(&mut reader, encoding)?),\n  986 |     ];\n  987 | \n  988 |     // Read the ISO-8859-1 URL string.\n  989 |     let url = read_string(&mut reader, Encoding::Iso8859_1)?;\n  990 | \n  991 |     // Create the tag.\n  992 |     let raw = RawTag::new_with_sub_fields(frame.id, url, sub_fields.into_boxed_slice());\n  993 | \n  994 |     Ok(map_raw_tag(raw, frame.raw_tag_parser))\n  995 | }\n  996 | \n  997 | /// Skip the frame.\n  998 | pub fn skip_frame(_: BufReader<'_>, frame: &FrameInfo<'_>) -> Result<FrameResult> {\n  999 |     debug!(\"skipping '{}' frame\", frame.id);\n 1000 |     Ok(FrameResult::Skipped)\n 1001 | }\n 1002 | \n 1003 | /// Attempt to map the raw tag into one or more standard tags.\n 1004 | fn map_raw_tag(raw: RawTag, parser: Option<RawTagParser>) -> FrameResult {\n 1005 |     if let Some(parser) = parser {\n 1006 |         // A parser was provided.\n 1007 |         if let RawValue::String(value) = &raw.value {\n 1008 |             // Parse and return frame result.\n 1009 |             match parser(value.clone()) {\n 1010 |                 [Some(std), None] => {\n 1011 |                     // One raw tag yielded one standard tag.\n 1012 |                     return FrameResult::Tag(Tag::new_std(raw, std));\n 1013 |                 }\n 1014 |                 [None, Some(std)] => {\n 1015 |                     // One raw tag yielded one standard tag.\n 1016 |                     return FrameResult::Tag(Tag::new_std(raw, std));\n 1017 |                 }\n 1018 |                 [Some(std0), Some(std1)] => {\n 1019 |                     // One raw tag yielded two standards tags.\n 1020 |                     let tags = smallvec![Tag::new_std(raw.clone(), std0), Tag::new_std(raw, std1)];\n 1021 |                     return FrameResult::MultipleTags(tags);\n 1022 |                 }\n 1023 |                 // The raw value could not be parsed.\n 1024 |                 _ => (),\n 1025 |             }\n 1026 |         }\n 1027 |     }\n 1028 | \n 1029 |     // Could not parse, add a raw tag.\n 1030 |     FrameResult::Tag(Tag::new(raw))\n 1031 | }\n 1032 | \n 1033 | // Loopup tables.\n 1034 | \n 1035 | // Mapping TXXX descriptions to raw tag parsers.\n 1036 | lazy_static! {\n 1037 |     static ref TXXX_DESC_PARSERS: RawTagParserMap = {\n 1038 |         let mut m: RawTagParserMap = HashMap::new();\n 1039 |         m.insert(\"acoustid fingerprint\", parse_acoustid_fingerprint);\n 1040 |         m.insert(\"acoustid id\", parse_acoustid_id);\n 1041 |         m.insert(\"albumartistsort\", parse_sort_album_artist);\n 1042 |         m.insert(\"asin\", parse_ident_asin);\n 1043 |         m.insert(\"barcode\", parse_ident_barcode);\n 1044 |         m.insert(\"catalognumber\", parse_ident_catalog_number);\n 1045 |         m.insert(\"composersort\", parse_sort_composer);\n 1046 |         m.insert(\"itunesadvistory\", parse_itunes_content_advisory);\n 1047 |         m.insert(\"license\", parse_license);\n 1048 |         m.insert(\"musicbrainz album artist id\", parse_musicbrainz_album_artist_id);\n 1049 |         m.insert(\"musicbrainz album id\", parse_musicbrainz_ // Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
