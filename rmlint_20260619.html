<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"Runner.run() calls Gio.DataInputStream.new(self.process.get_stdout_pipe()) and self.process.wait_check_async() immediately after _create_rmlint_process(), which returns None whenever spawning rmlint fails (binary missing, ENOEXEC, or any GLib.Error - see lines 218-227). This raises an unguarded AttributeError ('NoneType' object has no attribute 'get_stdout_pipe'), crashing the scan trigger instead of showing the user a friendly error.","fix":"Check `if self.process is None: return` (and optionally emit 'process-finished' with an error message) right after calling _create_rmlint_process(), before touching self.process further.","locations":[{"ref":"gui/shredder/runner.py:327-341","code":"  327 |     def run(self):\n  328 |         \"\"\"Trigger the run of the rmlint process.\n  329 |         Returns: a `Script` instance.\n  330 |         \"\"\"\n  331 |         self.was_replayed = False\n  332 |         self.process = _create_rmlint_process(\n  333 |             self.settings, self._tmpdir.name,\n  334 |             self.untagged_paths, self.tagged_paths\n  335 |         )\n  336 |         self._data_stream = Gio.DataInputStream.new(\n  337 |             self.process.get_stdout_pipe()\n  338 |         )\n  339 | \n  340 |         # We want to get notified once the child dies\n  341 |         self.process.wait_check_async(None, self.on_process_termination)","lines":15}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"rm_digest_paranoid_copy() allocates the copy with g_slice_new0() and only sets copy->shadow_hash; it never initializes copy->incoming_twin_candidates (left NULL). rm_digest_paranoid_free(), which is unconditionally invoked on every paranoid digest via rm_digest_free(), calls g_async_queue_unref(paranoid->incoming_twin_candidates) without a NULL check, so freeing any digest produced by rm_digest_copy() on a RM_DIGEST_PARANOID-type digest crashes (NULL passed to a GAsyncQueue API that does not tolerate NULL). The same NULL queue is also used unguarded by rm_digest_paranoid_buffered_update() (g_async_queue_try_pop) and rm_digest_send_match_candidate() (g_async_queue_push) if either is ever invoked on a copied paranoid digest. This is reachable in production: shredder.c's rm_shred_create_rejects() calls rm_digest_copy(group->digest) where group->digest can be RM_DIGEST_PARANOID (used when splitting/rejecting paranoid shred groups).","fix":"In rm_digest_paranoid_copy(), allocate a fresh incoming_twin_candidates queue with g_async_queue_new() (mirroring rm_digest_paranoid_new()), or add NULL guards before g_async_queue_unref/push/try_pop calls in the paranoid helper functions.","locations":[{"ref":"lib/checksum.c:703-709","code":"  703 | static RmParanoid *rm_digest_paranoid_copy(RmParanoid *paranoid) {\n  704 |     RmParanoid *copy = g_slice_new0(RmParanoid);\n  705 |     if(paranoid->shadow_hash != NULL) {\n  706 |         copy->shadow_hash = rm_digest_copy(paranoid->shadow_hash);\n  707 |     }\n  708 |     return copy;\n  709 | }","lines":7},{"ref":"lib/checksum.c:711-717","code":"  711 | static void rm_digest_paranoid_free(RmParanoid *paranoid) {\n  712 |     rm_digest_free(paranoid->shadow_hash);\n  713 |     rm_digest_paranoid_release_buffers(paranoid);\n  714 |     g_async_queue_unref(paranoid->incoming_twin_candidates);\n  715 |     g_slist_free(paranoid->rejects);\n  716 |     g_slice_free(RmParanoid, paranoid);\n  717 | }","lines":7},{"ref":"lib/checksum.c:757-758","code":"  757 |     while(!paranoid->twin_candidate && (paranoid->twin_candidate = g_async_queue_try_pop(\n  758 |                                             paranoid->incoming_twin_candidates))) {","lines":2},{"ref":"lib/checksum.c:1070","code":" 1070 |     g_async_queue_push(paranoid->incoming_twin_candidates, candidate);","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"rm_trie_build_path_unlocked() copies path elements into the caller-supplied buffer with g_stpcpy(), which performs an unbounded copy. The surrounding while loop only checks the running offset against buf_len *before* each iteration, not before/during the actual copy, so once the check passes near the boundary the subsequent '/' + g_stpcpy of a full path element can write past buf+buf_len. Additionally, reconstructing a path that was originally truncated to exactly PATH_MAX by rm_path_iter_init requires PATH_MAX+1 bytes (one extra leading '/' is prepended on rebuild), which already overflows a PATH_MAX-sized destination buffer by construction (all real callers pass PATH_MAX as buf_len).","fix":"Track remaining space explicitly and use a bounded copy (e.g. g_strlcpy/snprintf with the remaining length) for each element instead of unbounded g_stpcpy; stop or truncate cleanly when an element would not fit.","locations":[{"ref":"lib/pathtricia.c:210-215","code":"  210 |     /* copy collected elements into *buf */\n  211 |     char *buf_ptr = buf;\n  212 |     while(n_elements && (size_t)(buf_ptr - buf) < buf_len) {\n  213 |         *buf_ptr = '/';\n  214 |         buf_ptr = g_stpcpy(buf_ptr + 1, (char *)elements[--n_elements]);\n  215 |     }","lines":6}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"rm_parrot_try_next() reads 'parent_path' with json_object_get_string_member() (no json_object_has_member/get_member NULL check) when lint_type is RM_LINT_TYPE_PART_OF_DIRECTORY, then passes the result straight into rm_trie_search()/rm_trie_insert(). Both rm_trie_search_node() and rm_trie_insert() in lib/pathtricia.c start with g_assert(path), which aborts the process if path is NULL. A crafted/malformed --replay JSON file with a 'part_of_directory' entry missing the 'parent_path' field causes json_object_get_string_member to return NULL (logged as a GLib critical, not fatal by itself) and then a hard crash via g_assert in the trie. This is reachable purely from untrusted JSON input.","fix":"Check json_object_has_member(object, \"parent_path\") (or check the returned string for NULL) before calling rm_trie_search/rm_trie_insert; treat a missing parent_path as a parse error for that entry (skip/destroy the file) instead of crashing.","locations":[{"ref":"lib/replay.c:329-338","code":"  329 |     if(file->lint_type == RM_LINT_TYPE_PART_OF_DIRECTORY) {\n  330 |         const char *parent_path = json_object_get_string_member(object, \"parent_path\");\n  331 |         GQueue *children = rm_trie_search(&polly->directory_trie, parent_path);\n  332 |         if(children == NULL) {\n  333 |             children = g_queue_new();\n  334 |             rm_trie_insert(&polly->directory_trie, parent_path, children);\n  335 |         }\n  336 | \n  337 |         g_queue_push_tail(children, file);\n  338 |     }","lines":10}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"When --follow-symlinks is used, rm_traverse_file() resolves the symlink target via rm_traverse_rel_realpath(), which wraps realpath(). realpath() returns NULL on common, attacker/environment-triggerable conditions: a dangling target, ELOOP (an actual symlink loop/cycle - exactly the case this traversal is supposed to handle gracefully), permission-denied on a path component, or ENAMETOOLONG. The NULL return is stored into `path` and used unchecked: `path = resolved_path; ... RmFile *file = rm_file_new(session, path, statp, ...)`. rm_file_new() calls rm_file_set_path() -> rm_trie_insert(&trie, path, file), which does `g_assert(path)` followed immediately by `rm_path_iter_init()` dereferencing `*path`. The result is a hard crash (assertion abort, or a NULL-deref segfault in builds with assertions disabled) triggered by a single broken or cyclic symlink anywhere in the scanned tree when --follow-symlinks is active. This is a denial-of-service in normal usage, not just a corner case mentioned in the file's own bug-tracker comment (issue #333) about relative symlink targets needing realpath resolution at all - the original feature never handled realpath() failure.","fix":"After calling rm_traverse_rel_realpath(), check `if(resolved_path == NULL) { rm_log_debug_line(\"failed to resolve symlink target of %s\", path); return; }` before assigning it to `path` and calling rm_file_new(). Treat unresolvable symlinks the same way as a failed readlink() (log and skip, optionally emit RM_LINT_TYPE_BADLINK if cfg->find_badlinks).","locations":[{"ref":"lib/traverse.c:113-130","code":"  113 | static char *rm_traverse_rel_realpath(char *link_path, char *pointing_to) {\n  114 |     if(pointing_to == NULL) {\n  115 |         return NULL;\n  116 |     }\n  117 | \n  118 |     // Most links will already be absolute.\n  119 |     if(g_path_is_absolute(pointing_to))  {\n  120 |         return realpath(pointing_to, NULL);\n  121 |     }\n  122 | \n  123 |     char *link_dir_path = g_path_get_dirname(link_path);\n  124 |     char *full_path = g_build_path(G_DIR_SEPARATOR_S, link_dir_path, pointing_to, NULL);\n  125 |     char *clean_path = realpath(full_path, NULL);\n  126 | \n  127 |     g_free(link_dir_path);\n  128 |     g_free(full_path);\n  129 |     return clean_path;\n  130 | }","lines":18},{"ref":"lib/traverse.c:178-199","code":"  178 |     if(is_symlink && cfg->follow_symlinks) {\n  179 |         char *new_path_buf = g_malloc0(PATH_MAX + 1);\n  180 |         if(readlink(path, new_path_buf, PATH_MAX) == -1) {\n  181 |             rm_log_debug_line(\"failed to follow symbolic link of %s: %s\", path, g_strerror(errno));\n  182 |             g_free(new_path_buf);\n  183 |             return;\n  184 |         }\n  185 | \n  186 |         char *resolved_path = rm_traverse_rel_realpath(path, new_path_buf);\n  187 |         g_free(new_path_buf);\n  188 | \n  189 |         path = resolved_path;\n  190 |         is_symlink = false;\n  191 |         path_needs_free = true;\n  192 |     }\n  193 | \n  194 |     RmFile *file =\n  195 |         rm_file_new(session, path, statp, file_type, is_prefd, path_index, depth);\n  196 | \n  197 |     if(path_needs_free) {\n  198 |         g_free(path);\n  199 |     }","lines":22},{"ref":"lib/file.c:102-104","code":"  102 | void rm_file_set_path(RmFile *file, char *path) {\n  103 |     file->folder = rm_trie_insert(&file->session->cfg->file_trie, path, file);\n  104 | }","lines":3},{"ref":"lib/pathtricia.c:100-110","code":"  100 | static void rm_path_iter_init(RmPathIter *iter, const char *path) {\n  101 |     if(*path == '/') {\n  102 |         path++;\n  103 |     }\n  104 | \n  105 |     strncpy(iter->path_buf, path, PATH_MAX);\n  106 |     if (iter->path_buf[PATH_MAX - 1]) {\n  107 |         iter->path_buf[PATH_MAX - 1] = 0;\n  108 |         rm_log_error(\"path too long, truncated to: %s\", iter->path_buf);\n  109 |     }\n  110 | ","lines":11},{"ref":"lib/pathtricia.c:125-128","code":"  125 | RmNode *rm_trie_insert(RmTrie *self, const char *path, void *value) {\n  126 |     g_assert(self);\n  127 |     g_assert(path);\n  128 | ","lines":4}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"rm_util_get_groupname() calls getpwuid(geteuid()) and immediately dereferences the result (user->pw_gid) without checking for NULL, unlike the sibling function rm_util_get_username() which does check. If getpwuid() fails (e.g. the effective uid has no passwd entry, common in containers/chroots), this is a NULL pointer dereference and crashes the program.","fix":"Check `if(user == NULL) return NULL;` before calling getgrgid(user->pw_gid), mirroring rm_util_get_username().","locations":[{"ref":"lib/utilities.c:365-373","code":"  365 | char *rm_util_get_groupname(void) {\n  366 |     struct passwd *user = getpwuid(geteuid());\n  367 |     struct group *grp = getgrgid(user->pw_gid);\n  368 |     if(grp) {\n  369 |         return grp->gr_name;\n  370 |     } else {\n  371 |         return NULL;\n  372 |     }\n  373 | }","lines":9}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"remove_color_escapes() in src/rmlint.c crashes with SIGSEGV if a log message contains an ESC byte (0x1b) that is not followed anywhere later in the string by the character 'm'. strchr(src, 'm') returns NULL in that case, src is set to NULL, and the for-loop's post-expression `src++` then executes on a NULL pointer, producing an invalid pointer (e.g. 0x1) that is dereferenced by the loop condition `*src` on the next iteration, causing a segfault. This function is invoked from logging_callback() in src/rmlint.c whenever cfg->with_stderr_color is false, which happens by default whenever stderr is not a tty (e.g. output redirected/piped) or when -W/--no-with-color is passed. Since rmlint logs raw file paths via format strings like \"Can't open directory or file \\\"%s\\\"\", a file name containing a lone/truncated ESC byte (with no subsequent 'm' anywhere in the rest of the message) reaches this code path and crashes the whole process. Verified by reproducing the exact loop logic in a standalone test compiled with ASan/UBSan: confirmed SIGSEGV reading address 0x1.","fix":"After `src = strchr(src, 'm')` returns NULL, break out of the loop immediately instead of letting the for-loop's increment run on a NULL pointer, e.g.: `if(*src == '\\x1b') { src = strchr(src, 'm'); if(!src) break; } else { ... }`.","locations":[{"ref":"src/rmlint.c:38-52","code":"   38 | static char *remove_color_escapes(char *message) {\n   39 |     char *dst = message;\n   40 |     for(char *src = message; src && *src; src++) {\n   41 |         if(*src == '\\x1b') {\n   42 |             src = strchr(src, 'm');\n   43 |         } else {\n   44 |             *dst++ = *src;\n   45 |         }\n   46 |     }\n   47 | \n   48 |     if(dst) {\n   49 |         *dst = 0;\n   50 |     }\n   51 |     return message;\n   52 | }","lines":15},{"ref":"src/rmlint.c:54-68","code":"   54 | static void logging_callback(_UNUSED const gchar *log_domain,\n   55 |                              GLogLevelFlags log_level,\n   56 |                              const gchar *message,\n   57 |                              gpointer user_data) {\n   58 |     RmSession *session = user_data;\n   59 |     if(session->cfg->verbosity >= log_level) {\n   60 |         char *tmp = NULL;\n   61 |         if(!session->cfg->with_stderr_color) {\n   62 |             tmp = g_strdup(message);\n   63 |             message = remove_color_escapes(tmp);\n   64 |         }\n   65 |         fputs(message, stderr);\n   66 |         g_free(tmp);\n   67 |     }\n   68 | }","lines":15}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"RingChart._hit() computes `cos = x / xy_abs` where xy_abs = sqrt(x*x + y*y) and x, y are the mouse position relative to the chart's center. If the user moves the mouse (or clicks) on the exact center pixel of the chart, xy_abs is 0.0 and this raises ZeroDivisionError inside the 'motion-notify-event'/'button-press-event' GTK signal handlers (on_motion/on_button_press_event), which propagates as an unhandled exception out of the GTK callback on every such event.","fix":"Guard against xy_abs == 0 (e.g. `if xy_abs == 0: return (True, None)` before computing cos) to treat the exact center as a no-hit / root-segment case.","locations":[{"ref":"gui/shredder/chart.py:474-490","code":"  474 |     def _hit(self, area, event, click_only=False):\n  475 |         \"\"\"Check what segments were hitten by a GdkEvent\"\"\"\n  476 |         alloc = area.get_allocation()\n  477 |         mid_x, mid_y = alloc.width / 2, alloc.height / 2\n  478 | \n  479 |         # Calculate the degree between the vectors\n  480 |         # a = (event.x + m, event.y + m) and (0, 1)\n  481 |         x, y = event.x - mid_x, event.y - mid_y\n  482 |         xy_abs = math.sqrt(x * x + y * y)\n  483 |         cos = x / xy_abs\n  484 | \n  485 |         if y < 0:\n  486 |             # upper half\n  487 |             selected_deg = (2 * math.pi) - math.acos(cos)\n  488 |         else:\n  489 |             # lower half\n  490 |             selected_deg = math.acos(cos)","lines":17}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"Runner.replay(allowed_paths=None) documents None as a valid argument ('allowed_paths is a dictionary of paths to booleans') and its own default value is None, but the loop unconditionally executes `point['is_original'] = allowed_paths[path]` once the `allowed_paths is None or path in allowed_paths` condition is true. When allowed_paths is None, this raises TypeError: 'NoneType' object is not subscriptable on the very first data point.","fix":"Use `point['is_original'] = allowed_paths[path] if allowed_paths is not None else True` (or equivalent), matching the documented behavior that None means 'allow everything'.","locations":[{"ref":"gui/shredder/runner.py:377-384","code":"  377 |         for point in data:\n  378 |             path = point['path']\n  379 |             if path is None:\n  380 |                 continue\n  381 | \n  382 |             if allowed_paths is None or path in allowed_paths:\n  383 |                 point['is_original'] = allowed_paths[path]\n  384 |                 results.append(point)","lines":8}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"Runner.replay() calls _create_rmlint_process() again to regenerate output formatters and immediately calls process.wait_check_async() without checking for None. If rmlint fails to spawn during replay (binary removed mid-session, resource exhaustion, etc.), this raises AttributeError on a None process.","fix":"Check the return value of _create_rmlint_process() for None before calling wait_check_async(), and surface an error via LOGGER/infobar instead.","locations":[{"ref":"gui/shredder/runner.py:394-405","code":"  394 |         process = _create_rmlint_process(\n  395 |             self.settings,\n  396 |             self._tmpdir.name,\n  397 |             self.untagged_paths, self.tagged_paths,\n  398 |             replay_path=replay_path,\n  399 |             outputs=[\n  400 |                 ('sh', self.get_sh_path()),\n  401 |                 ('csv', self.get_csv_path()),\n  402 |                 ('json', self.get_json_path())\n  403 |             ]\n  404 |         )\n  405 |         process.wait_check_async(None, self.on_replay_finish)","lines":12}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"paranoid_interface.update is set to NULL (it has no generic per-byte update function; updates only happen via rm_digest_paranoid_buffered_update()). rm_digest_new(RM_DIGEST_PARANOID, seed) will call `interface->update(digest->state, ...)` through this NULL pointer whenever a non-zero seed is supplied, crashing immediately. All current call sites pass seed=0, but the public API (rm_digest_new takes an RmOff seed for any RmDigestType, and rm_digest_sum()/rm_digest_new() do not special-case or reject RM_DIGEST_PARANOID with a seed) gives no indication this combination is unsafe.","fix":"In rm_digest_new(), skip the seed-update call (or assert/return an error) when type == RM_DIGEST_PARANOID and seed != 0, since paranoid digests cannot be seeded through the generic update path.","locations":[{"ref":"lib/checksum.c:801-809","code":"  801 | static const RmDigestInterface paranoid_interface = {\n  802 |     .name = \"paranoid\",\n  803 |     .bits = 64, /* must match shadow hash length */\n  804 |     .len = NULL,\n  805 |     .new = (RmDigestNewFunc)rm_digest_paranoid_new,\n  806 |     .free = (RmDigestFreeFunc)rm_digest_paranoid_free,\n  807 |     .update = NULL,\n  808 |     .copy = (RmDigestCopyFunc)rm_digest_paranoid_copy,\n  809 |     .steal = (RmDigestStealFunc)rm_digest_paranoid_steal};","lines":9},{"ref":"lib/checksum.c:899-911","code":"  899 | RmDigest *rm_digest_new(RmDigestType type, RmOff seed) {\n  900 |     const RmDigestInterface *interface = rm_digest_get_interface(type);\n  901 | \n  902 |     RmDigest *digest = g_slice_new0(RmDigest);\n  903 |     digest->type = type;\n  904 |     digest->bytes = interface->bits / 8;\n  905 |     digest->state = interface->new();\n  906 |     if(seed) {\n  907 |         interface->update(digest->state, (const unsigned char *)&seed, sizeof(seed));\n  908 |     }\n  909 | \n  910 |     return digest;\n  911 | }","lines":13}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"rm_digest_hash() asserts `bytes >= sizeof(guint)` after stealing the digest (line 975) and aborts the process if not. For RM_DIGEST_EXT digests, digest->bytes is set from state->len = strlen(hex_checksum)/2, which is fully attacker/user-controlled: it comes directly from the \"checksum\" string field of a replay JSON file (lib/replay.c:313-318) with no minimum-length validation. A replay file with a checksum string shorter than 8 hex characters (4 bytes) makes digest->bytes < 4, and rm_digest_hash() is used as the GHashFunc for a GHashTable in lib/replay.c:871, so simply loading such a (corrupted or maliciously crafted) replay/equal JSON file aborts the whole program via g_assert.","fix":"Replace the g_assert with a graceful fallback (e.g. hash whatever bytes are available, or treat short digests as a fixed low-quality hash) instead of aborting on attacker-controlled input length; alternatively validate/reject overly-short checksum strings when parsing replay JSON.","locations":[{"ref":"lib/checksum.c:966-980","code":"  966 | guint rm_digest_hash(RmDigest *digest) {\n  967 |     guint8 *buf = NULL;\n  968 |     gsize bytes = 0;\n  969 |     guint hash = 0;\n  970 | \n  971 |     buf = rm_digest_steal(digest);\n  972 |     bytes = digest->bytes;\n  973 | \n  974 |     if(buf != NULL) {\n  975 |         g_assert(bytes >= sizeof(guint));\n  976 |         hash = *(guint *)buf;\n  977 |         g_slice_free1(bytes, buf);\n  978 |     }\n  979 |     return hash;\n  980 | }","lines":15},{"ref":"lib/replay.c:279","code":"  279 |     file->digest = rm_digest_new(RM_DIGEST_EXT, 0);","lines":1},{"ref":"lib/replay.c:312-318","code":"  312 |     /* Fake the checksum using RM_DIGEST_EXT */\n  313 |     const JsonNode *cksum_node = json_object_get_member(object, \"checksum\");\n  314 |     if(cksum_node != NULL) {\n  315 |         const char *cksum = json_object_get_string_member(object, \"checksum\");\n  316 |         if(cksum != NULL) {\n  317 |             rm_digest_update(file->digest, (unsigned char *)cksum, strlen(cksum));\n  318 |         }","lines":7}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"When a JSON entry has a 'hardlink_of' member but no preceding entry had 'is_original': true, polly->last_original is still NULL (zero-initialized in rm_parrot_open). rm_file_hardlink_add(polly->last_original, file) is then called with a NULL 'original' argument; rm_file_hardlink_add() in lib/file.c dereferences head->hardlinks unconditionally with no NULL check, causing a NULL-pointer dereference. A malformed/reordered --replay JSON (untrusted input) can trigger this crash.","fix":"Before calling rm_file_hardlink_add, check `polly->last_original != NULL`; if NULL, log a warning and skip the hardlink linkage for that entry instead of dereferencing a NULL original.","locations":[{"ref":"lib/replay.c:322-327","code":"  322 |     const JsonNode *hardlink_of = json_object_get_member(object, \"hardlink_of\");\n  323 |     if(hardlink_of != NULL) {\n  324 |         rm_file_hardlink_add(polly->last_original, file);\n  325 |     } else {\n  326 |         g_assert(!file->hardlinks);\n  327 |     }","lines":6}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"rm_mounts_can_reflink() asserts g_assert(dest_part) after a plain g_hash_table_lookup for the dest device in self->part_table. Unlike source (guaranteed present because it was just confirmed to be a key of reflinkfs_table, which is always populated alongside part_table for the same dev), dest has no such guarantee: a caller can pass any dev_t (e.g. for a destination path/subvolume that was never stat'd through rm_mounts_get_disk_id). If dest_part is not found, g_assert aborts the whole process instead of returning an error.","fix":"Replace the g_assert(dest_part) with a graceful `if(!source_part || !dest_part) return false;` check.","locations":[{"ref":"lib/utilities.c:969-972","code":"  969 |             RmPartitionInfo *dest_part =\n  970 |                 g_hash_table_lookup(self->part_table, GINT_TO_POINTER(dest));\n  971 |             g_assert(source_part);\n  972 |             g_assert(dest_part);","lines":4}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"rm_file_lint_type_to_string() clamps the array index with MIN(type, sizeof(LINT_TYPES)/sizeof(const char*)), but the valid index range for an array of N elements is [0, N-1]; when type is N or larger (any out-of-range/corrupted RmLintType), MIN(type, N) yields N, which reads LINT_TYPES[N] - one element past the end of the array. All current callers pass file->lint_type, which is always set to a valid enum constant in this codebase, so the OOB read is not currently reached, but the clamp itself is off-by-one and would misbehave the moment an invalid/corrupted lint_type reaches this function (e.g. via future code paths or memory corruption elsewhere).","fix":"Clamp with MIN(type, sizeof(LINT_TYPES)/sizeof(const char*) - 1) so the maximum index used is the last valid element.","locations":[{"ref":"lib/file.c:164-166","code":"  164 | const char *rm_file_lint_type_to_string(RmLintType type) {\n  165 |     return LINT_TYPES[MIN(type, sizeof(LINT_TYPES) / sizeof(const char *))];\n  166 | }","lines":3}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"rm_session_dedupe_main() calls fstat(source_fd, &source_stat) without checking its return value. If fstat() fails (e.g. the fd was somehow invalidated between open() and fstat(), or under unusual filesystem error conditions), source_stat is left uninitialized, and source_stat.st_size is subsequently used as the loop bound controlling how many bytes get deduped (`while(bytes_deduped < source_stat.st_size ...)`), reading uninitialized stack memory as a trusted size value.","fix":"Check the fstat() return value and bail out with an error message/EXIT_FAILURE if it fails, before using source_stat.st_size.","locations":[{"ref":"lib/session.c:246","code":"  246 |     fstat(source_fd, &source_stat);","lines":1}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In rm_hasher_main() (lib/hash-utility.c), when paths are read from stdin (tag.paths == NULL branch), each line is resolved with `realpath(strtok_r(path_buf, \"\\n\", &tokbuf), NULL)` and the result is pushed into the GPtrArray unconditionally, even when realpath() fails and returns NULL (e.g. for a nonexistent path piped on stdin - silently, with no warning to the user). The resulting char** array therefore can contain an embedded NULL in the middle, not just at the very end. Later, g_strv_length(tag.paths) (used to size buf_size for read_succesful/completed_digests_buffer) and the main processing loop `for(int i = 0; tag.paths && tag.paths[i]; ++i)` both stop at the first NULL entry, silently dropping/never-processing every path that came after the failed one. g_strfreev(tag.paths) at the end of rm_hasher_main also stops at the same embedded NULL, so any later valid path strings (and the array tail itself) are leaked. Reproduced the g_strv_length/array truncation behavior with a standalone GLib test confirming len=1 reported for a 3-element array with an embedded NULL, even though a valid string exists at index 2.","fix":"Skip/report failed realpath() calls instead of pushing NULL into the array (e.g. print a warning and `continue`), so the resulting char** stays free of embedded NULLs and only has the real terminator at the end.","locations":[{"ref":"lib/hash-utility.c:175-187","code":"  175 |     if(tag.paths == NULL) {\n  176 |         /* read paths from stdin */\n  177 |         char path_buf[PATH_MAX];\n  178 |         char *tokbuf = NULL;\n  179 |         GPtrArray *paths = g_ptr_array_new();\n  180 | \n  181 |         while(fgets(path_buf, PATH_MAX, stdin)) {\n  182 |             char *abs_path = realpath(strtok_r(path_buf, \"\\n\", &tokbuf), NULL);\n  183 |             g_ptr_array_add(paths, abs_path);\n  184 |         }\n  185 | \n  186 |         tag.paths = (char **)g_ptr_array_free(paths, FALSE);\n  187 |     }","lines":13},{"ref":"lib/hash-utility.c:202-209","code":"  202 |     int buf_size = (g_strv_length(tag.paths) + 1) * sizeof(RmDigest *);\n  203 |     tag.read_succesful = g_slice_alloc0(buf_size);\n  204 | \n  205 |     if(tag.print_in_order) {\n  206 |         /* allocate buffer to collect results */\n  207 |         tag.completed_digests_buffer = g_slice_alloc0(buf_size);\n  208 |         tag.path_index = 0;\n  209 |     }","lines":8},{"ref":"lib/hash-utility.c:222-246","code":"  222 |     for(int i = 0; tag.paths && tag.paths[i]; ++i) {\n  223 |         /* check it is a regular file */\n  224 | \n  225 |         RmStat stat_buf;\n  226 |         if(rm_sys_stat(tag.paths[i], &stat_buf) == -1) {\n  227 |             rm_log_warning_line(_(\"Can't open directory or file \\\"%s\\\": %s\"),\n  228 |                                 tag.paths[i], strerror(errno));\n  229 |         } else if(S_ISDIR(stat_buf.st_mode)) {\n  230 |             rm_log_warning_line(_(\"Directories are not supported: %s\"), tag.paths[i]);\n  231 |         } else if(S_ISREG(stat_buf.st_mode)) {\n  232 |             RmHasherTask *task = rm_hasher_task_new(hasher, NULL, GINT_TO_POINTER(i));\n  233 |             tag.read_succesful[i] =\n  234 |                 rm_hasher_task_hash(task, tag.paths[i], 0, stat_buf.st_size, FALSE, NULL);\n  235 | \n  236 |             rm_hasher_task_finish(task);\n  237 |             continue;\n  238 |         } else {\n  239 |             rm_log_warning_line(_(\"%s: Unknown file type\"), tag.paths[i]);\n  240 |         }\n  241 | \n  242 |         /* dummy callback for failed paths */\n  243 |         g_free(tag.paths[i]);\n  244 |         tag.paths[i] = NULL;\n  245 |         rm_hasher_callback(hasher, NULL, &tag, GINT_TO_POINTER(i));\n  246 |     }","lines":25},{"ref":"lib/hash-utility.c:257","code":"  257 |     g_strfreev(tag.paths);","lines":1}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"rm_xattr_list() can return NULL when rm_sys_listxattr() fails (line 333-337). Both rm_xattr_is_deduplicated() and rm_xattr_mark_deduplicated() pass this possibly-NULL 'map' straight into g_hash_table_iter_init(&iter, map) and later g_hash_table_destroy(map) without a NULL check. glib's g_return_if_fail guards in these functions will log a CRITICAL warning every call (and abort the process if G_DEBUG=fatal-warnings is set, a common debug/test configuration), instead of the functions failing cleanly.","fix":"Check `if(map == NULL) return false;` (or EXIT_FAILURE for the mark function) immediately after calling rm_xattr_list(), before initializing the iterator or destroying it.","locations":[{"ref":"lib/xattr.c:416-420","code":"  416 |     char *key = NULL, *value = NULL;\n  417 |     GHashTable *map = rm_xattr_list(path, follow_symlinks);\n  418 |     GHashTableIter iter;\n  419 | \n  420 |     g_hash_table_iter_init(&iter, map);","lines":5},{"ref":"lib/xattr.c:451","code":"  451 |     g_hash_table_destroy(map);","lines":1},{"ref":"lib/xattr.c:466-469","code":"  466 |     GHashTable *map = rm_xattr_list(path, follow_symlinks);\n  467 |     GHashTableIter iter;\n  468 | \n  469 |     g_hash_table_iter_init(&iter, map);","lines":4},{"ref":"lib/xattr.c:490","code":"  490 |     g_hash_table_destroy(map);","lines":1}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"rm_digest_copy() allocates `copy` via g_slice_copy(sizeof(RmDigest), digest) before checking whether interface->copy is NULL; if it is NULL, the function returns NULL directly without freeing the already-allocated `copy` slice, leaking sizeof(RmDigest) bytes. Currently unreachable since every registered RmDigestInterface in this file defines a non-NULL .copy function, but the early-return path is dead-but-buggy code that will leak if a future digest type is added without a copy implementation.","fix":"Free `copy` with g_slice_free(RmDigest, copy) before returning NULL when interface->copy is NULL, or restructure to check interface->copy before allocating copy.","locations":[{"ref":"lib/checksum.c:944-956","code":"  944 | RmDigest *rm_digest_copy(RmDigest *digest) {\n  945 |     g_assert(digest);\n  946 | \n  947 |     RmDigest *copy = g_slice_copy(sizeof(RmDigest), digest);\n  948 | \n  949 |     const RmDigestInterface *interface = rm_digest_get_interface(digest->type);\n  950 |     if(interface->copy == NULL) {\n  951 |         return NULL;\n  952 |     }\n  953 | \n  954 |     copy->state = interface->copy(digest->state);\n  955 |     return copy;\n  956 | }","lines":13}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"rm_cmd_start_gui() in lib/cmdline.c opens a temp file descriptor bootstrap_fd via g_file_open_tmp() and, if the subsequent write() fails (line 179), logs a warning and returns at line 182 without closing bootstrap_fd or removing/freeing bootstrap_path - both the fd and the temp file (and the bootstrap_path string allocated by GLib) leak. This is reachable if writing the bootstrap script to the temp file fails (e.g. disk full, tmp directory not writable after the fd was already opened).","fix":"On the write() failure path, also close(bootstrap_fd), g_unlink(bootstrap_path), and g_free(bootstrap_path) before returning.","locations":[{"ref":"lib/cmdline.c:163-185","code":"  163 | static void rm_cmd_start_gui(int argc, const char **argv) {\n  164 |     const char *commands[] = {\"python3\", \"python\", NULL};\n  165 |     const char **command = &commands[0];\n  166 | \n  167 |     GError *error = NULL;\n  168 |     gchar *bootstrap_path = NULL;\n  169 |     int bootstrap_fd =\n  170 |         g_file_open_tmp(\".shredder-bootstrap.py.XXXXXX\", &bootstrap_path, &error);\n  171 | \n  172 |     if(bootstrap_fd < 0) {\n  173 |         rm_log_warning(\"Could not bootstrap gui: Unable to create tempfile: %s\",\n  174 |                        error->message);\n  175 |         g_error_free(error);\n  176 |         return;\n  177 |     }\n  178 | \n  179 |     if(write(bootstrap_fd, rm_py_bootstrap, sizeof(rm_py_bootstrap) - 1) < 0) {\n  180 |         rm_log_warning_line(\"Could not bootstrap gui: Unable to write to tempfile: %s\",\n  181 |                             g_strerror(errno));\n  182 |         return;\n  183 |     }\n  184 | \n  185 |     close(bootstrap_fd);","lines":23}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"rm_cmd_size_range_string_to_bytes() in lib/cmdline.c calls g_strsplit(range_spec, \"-\", 2) which, for a range_spec starting with '-' (e.g. \"-100\"), allocates split[0] as an empty string \"\". The very next check `if(*range_spec == '-') { split[0] = g_strdup(\"0\"); }` overwrites that pointer with a newly allocated \"0\" string without freeing the original empty-string allocation first, leaking it. Reproduced with a standalone GLib test: g_strsplit(\"-100\", \"-\", 2) returns split[0]=\"\" (heap-allocated), split[1]=\"100\".","fix":"Free the old split[0] before overwriting it: `g_free(split[0]); split[0] = g_strdup(\"0\");`.","locations":[{"ref":"lib/cmdline.c:405-411","code":"  405 |     range_spec = (const char *)g_strstrip((char *)range_spec);\n  406 |     gchar **split = g_strsplit(range_spec, \"-\", 2);\n  407 | \n  408 |     if(*range_spec == '-') {\n  409 |         /* Act like it was \"0-...\" */\n  410 |         split[0] = g_strdup(\"0\");\n  411 |     }","lines":7}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"rm_cmd_parse_timestamp_file() in lib/cmdline.c opens stamp_file with fopen() (line 867). If rm_cmd_parse_timestamp() (called at line 877) fails (returns false), the function returns false immediately at line 885 without calling fclose(stamp_file) first - the fclose() at line 891 is only reached on the success path. This leaks a FILE* on a malformed timestamp file, reachable via `rmlint -n <stampfile>` where the stamp file's first line is not a valid plain or ISO8601 timestamp.","fix":"fclose(stamp_file) before the early `return false;` on line 885, or restructure with a single cleanup path (e.g. goto or moving fclose before the success/failure check).","locations":[{"ref":"lib/cmdline.c:863-907","code":"  863 | static gboolean rm_cmd_parse_timestamp_file(const char *option_name,\n  864 |                                             const gchar *timestamp_path,\n  865 |                                             RmSession *session, GError **error) {\n  866 |     bool plain = true, success = false;\n  867 |     FILE *stamp_file = fopen(timestamp_path, \"r\");\n  868 | \n  869 |     /* Assume failure */\n  870 |     session->cfg->filter_mtime = false;\n  871 | \n  872 |     if(stamp_file) {\n  873 |         char stamp_buf[1024];\n  874 |         memset(stamp_buf, 0, sizeof(stamp_buf));\n  875 | \n  876 |         if(fgets(stamp_buf, sizeof(stamp_buf), stamp_file) != NULL) {\n  877 |             success = rm_cmd_parse_timestamp(\n  878 |                 option_name,\n  879 |                 g_strstrip(stamp_buf),\n  880 |                 session,\n  881 |                 error\n  882 |             );\n  883 | \n  884 |             if(!success) {\n  885 |                 return false;\n  886 |             }\n  887 | \n  888 |             plain = rm_cmd_timestamp_is_plain(stamp_buf);\n  889 |         }\n  890 | \n  891 |         fclose(stamp_file);\n  892 |     } else {\n  893 |         /* Cannot read a stamp file, assume we have to create it. */\n  894 |         plain = false;\n  895 |         success = true;\n  896 |         rm_log_info_line(_(\"No stamp file at `%s`, will create one after this run.\"), timestamp_path);\n  897 |     }\n  898 | \n  899 |     rm_fmt_add(session->formats, \"stamp\", timestamp_path);\n  900 |     if(!plain) {\n  901 |         /* Enable iso8601 timestamp output */\n  902 |         rm_fmt_set_config_value(session->formats, \"stamp\", g_strdup(\"iso8601\"),\n  903 |                                 g_strdup(\"true\"));\n  904 |     }\n  905 | \n  906 |     return success;\n  907 | }","lines":45}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"RM_LINT_TYPE_PART_OF_DIRECTORY RmFile objects are allocated in rm_parrot_try_next() and stored only inside polly->directory_trie's per-directory GQueues (replay.c:331-337). When directories are later unpacked (rm_parrot_iter_dir_children, replay.c:343-366), each child is *copied* via rm_file_copy() into the unpacker, and the original queue is cleared with g_queue_clear() (line 364) - which does not free its elements. rm_parrot_close()/rm_parrot_dir_trie_clear_children() (replay.c:114-120) likewise only frees the GQueue containers via g_queue_free(), never the RmFile elements inside. The original PART_OF_DIRECTORY RmFile objects placed in directory_trie are therefore never destroyed: a per-replay memory leak proportional to the number of files inside duplicate directories in the loaded json.","fix":"Free the RmFile contents of directory_trie's queues, e.g. change rm_parrot_dir_trie_clear_children to g_queue_free_full(children, (GDestroyNotify)rm_file_destroy), and ensure rm_parrot_iter_dir_children does not leave the original files referenced elsewhere before they are freed (or skip copying and transfer ownership directly when safe).","locations":[{"ref":"lib/replay.c:329-338","code":"  329 |     if(file->lint_type == RM_LINT_TYPE_PART_OF_DIRECTORY) {\n  330 |         const char *parent_path = json_object_get_string_member(object, \"parent_path\");\n  331 |         GQueue *children = rm_trie_search(&polly->directory_trie, parent_path);\n  332 |         if(children == NULL) {\n  333 |             children = g_queue_new();\n  334 |             rm_trie_insert(&polly->directory_trie, parent_path, children);\n  335 |         }\n  336 | \n  337 |         g_queue_push_tail(children, file);\n  338 |     }","lines":10},{"ref":"lib/replay.c:343-366","code":"  343 | static int rm_parrot_iter_dir_children(_UNUSED RmTrie *self, RmNode *node, _UNUSED int level, void *user_data) {\n  344 |     RmUnpackedDirectory *unpacker = user_data;\n  345 | \n  346 |     char buf[PATH_MAX] = {0};\n  347 |     rm_trie_build_path_unlocked(node, buf, PATH_MAX);\n  348 | \n  349 |     GQueue *children = node->data;\n  350 |     if(children == NULL) {\n  351 |         return 0;\n  352 |     }\n  353 | \n  354 |     for(GList *iter = children->head; iter; iter = iter->next) {\n  355 |         // Mask that RM_LINT_TYPE_PART_OF_DIRECTORY as normal duplicate.\n  356 |         RmFile *child_file = rm_file_copy(iter->data);\n  357 |         child_file->lint_type = RM_LINT_TYPE_DUPE_CANDIDATE;\n  358 |         rm_unpacked_directory_add(unpacker, child_file);\n  359 |     }\n  360 | \n  361 |     // Make sure to clear the queue. This is important in case a more top-level\n  362 |     // directory contains
